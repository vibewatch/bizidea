name = "bizidea-scheduler"
main = "worker.js"
compatibility_date = "2026-05-08"

# Fire once per day at 07:00 UTC, matching the previous GitHub Actions cron.
[triggers]
crons = ["0 7 * * *"]

[vars]
GITHUB_REF = "main"
BIZIDEA_CAP = "5"
BIZIDEA_TIME_WINDOW = "yesterday"

# Secrets are NOT stored here. Set them via:
#   npx wrangler secret put GITHUB_TOKEN
#   npx wrangler secret put GITHUB_REPO
#
# GITHUB_TOKEN - fine-grained PAT: Actions: Read & Write on the target repo
# GITHUB_REPO  - "owner/repo", e.g. "vibewatch/bizidea"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true