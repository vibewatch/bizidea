    isEstimate: true
    sourceRefs:
    - 6
    - 7
    - 10
    - 11
  som:
    value: $2.6M
    rationale: 第 3 年可触达情形：通过 pilot 驱动销售，拿下 30 家生产客户，每家约 $85k ACV，对应约 $2.6M ARR 等价收入。
    isEstimate: true
    sourceRefs:
    - 10
    - 14
