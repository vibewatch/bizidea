    - 20
    - 21
    - 23
    - 24
    - 33
  - point: 围绕幻觉、延迟、策略违规和升级的失败模式，会让产品逐渐学会哪些群组必须保留闭源模型回退。
    sourceRefs:
    - 31
    - 32
    - 34
  geographicConsiderations:
  - point: 北美和欧洲是最合适的首批市场，因为那里的企业买家最在意 AI 治理、数据驻留和可审计性。
    sourceRefs:
    - 18
    - 28
    - 35
    - 36
  - point: 通用云路由在多语言客服场景下仍不完美；Amazon 也明确说明 Bedrock prompt routing 只对英文做了优化，这反而支持先把切口收窄。
    sourceRefs:
    - 33
  sensitivityCases:
  - case: 闭源模型价格战压缩节省空间
    impact: 如果 Anthropic 等服务商降价速度快于开源模型成本下探，单纯靠降本的 ROI 会收窄，公司就必须更强调路由控制、审批和模型组合管理。
    sourceRefs:
    - 18
    - 19
    - 20
    - 21
    - 23
  - case: 开源模型在长尾客服意图上表现不稳
    impact: 如果高风险工单上的质量仍不稳定，采用范围就会被限制在摘要、草拟和低风险分诊，短期 SAM 会缩小，扩张也会变慢。
    sourceRefs:
    - 9
    - 11
    - 33
    - 38
  - case: 云厂商和工具型现有玩家把工作流能力打包得更完整
    impact: 如果 Bedrock、Vertex、Portkey 或 Braintrust 补上更多原生业务评分和路由自动化，这家创业公司就可能沦为一层薄服务封装，除非它掌握客服专属数据。
    sourceRefs:
    - 24
    - 25
    - 26
    - 28
    - 33
    - 37
  validationPlan:
  - priority: 高
    question: 今天到底有多少客服软件厂商在摘要、草拟和 AI Agent 流量上，每月模型支出已超过 $100k？
    evidenceToGather: 访谈 15 位客服 SaaS 厂商的 AI 平台负责人，了解其月度 token 支出区间、核心工作流，以及 2026 年续约带来的定价压力。
  - priority: 高
    question: 哪些客服意图最适合作为首批迁移对象，既不伤害 QA，也不会拉高升级率？
    evidenceToGather: 在真实但匿名化的工单群组上做 shadow evaluation，覆盖摘要、宏草拟、分类和低风险订单状态流程；并把质量与处理时长、升级率等指标对比。
  - priority: 中
    question: 买家会愿意把第三方迁移层放进生产链路吗？
    evidenceToGather: 和一家共创客户先做被动 shadow mode，再做带即时回退的金丝雀路由；同时衡量它与内部自建栈相比的上线速度。
