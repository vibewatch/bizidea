    - 36
competitors:
- name: Portkey
  stage: 成长期
  wedge: 面向生产 AI 的网关，提供路由、可观测性、提示词管理和 guardrails。
  pricing: 免费层；Growth 从 $49/月起，另有超额收费；企业版定制。
  strength: 多服务商流量的控制平面原语很强。
  weaknessVsUs: 它是通用流量层，而不是客服意图迁移审批与节省工作流。
  sourceRefs:
  - 24
  - 25
- name: Braintrust
  stage: 成长期
  wedge: AI 评估、追踪、监控，以及正在形成中的模型比较和生产可观测性网关。
  pricing: 免费层；Pro $249/月加用量收费；企业版定制。
  strength: 评估工作流和评分语言体系很深。
  weaknessVsUs: 更擅长实验和测量，不擅长真实客服工作流的切流与回滚。
  sourceRefs:
  - 26
  - 27
- name: Humanloop
  stage: 成长期
  wedge: 面向企业的提示词管理、评估和可观测性平台。
  pricing: 免费试用 / 企业版定制。
  strength: 工程师与业务专家之间的协作工作流做得好，也具备企业合规姿态。
  weaknessVsUs: 在流量迁移、回退策略和客服专属业务 KPI 上没有那么强的产品主张。
  sourceRefs:
  - 28
  - 29
- name: Amazon Bedrock
  stage: 现有厂商
  wedge: 托管式模型目录，提供路由、guardrails 和企业采购信任。
  pricing: 按量平台定价。
  strength: 默认云分发、模型接入和治理原语占优。
  weaknessVsUs: Amazon 自己也说 prompt routing 不是按应用场景定制，而且只对英文优化；guardrails 是安全/隐私工具，不是客服迁移决策引擎。
  sourceRefs:
  - 33
  - 34
- name: LiteLLM + vLLM
  stage: 开源
  wedge: 自托管路由加高效开源模型服务。
  pricing: 开源软件 + 基础设施成本。
  strength: 对能力强的平台团队来说，锁定度低、可配置性高。
  weaknessVsUs: 需要内部工程投入，也不自带客服意图 benchmark、审批包或面向买家的 ROI 工作流。
  sourceRefs:
  - 30
  - 31
  - 38
regulatoryTechnicalConstraints:
- point: 产品必须围绕 PII、不安全输出和人工接管给出可审计控制，而不能只把自己包装成一个纯粹的成本路由器。
  sourceRefs:
  - 34
  - 35
  - 36
- point: 通用路由引擎在多语言或高度专业化提示词上能力更弱，因此首个产品必须把首批群组收得更窄。
  sourceRefs:
  - 33
- point: 买家会要求它既兼容托管 API，也兼容自托管开源模型栈。
  sourceRefs:
  - 30
  - 33
  - 37
  - 38
- point: 推理服务商的定价和可用性变化很快，因此节省逻辑必须持续更新。
  sourceRefs:
  - 18
  - 19
  - 20
  - 21
  - 23
validationSignals:
- point: Moonshot 的 $2B 融资和 $200M+ ARR 说明，开源权重模型供给已经在规模化变现。
  sourceRefs:
  - 1
- point: Decagon、Sierra 和 Forethought 说明，客服 AI 依然是一个融资活跃、战略动作频繁的品类。
  sourceRefs:
  - 2
  - 3
  - 4
- point: Intercom、Freshworks 和 Gorgias 已经在直接按 AI 服务结果收费，证明买家接受客服场景里按使用量计价的 AI 经济模型。
  sourceRefs:
  - 10
  - 14
  - 15
- point: 云和开源栈已经把构建迁移产品所需的路由、服务和 guardrail 原语都暴露出来了。
  sourceRefs:
  - 20
  - 21
  - 30
  - 33
  - 37
  - 38
  - 39
openQuestions:
- 今天真正每月 LLM 支出超过 $100k 的客服软件厂商，到底有多少家，而不是只是“希望未来达到”？
- 最先能跑出节省、且质量风险最低的工单群组到底是哪类：摘要、草拟、分诊、订单状态，还是邮件分流？
- 买家会不会足够信任外部迁移层，让它自动执行生产路由，还是只愿意先看分析式报告？
- 闭源模型降价会多快压缩 ROI 切口，还是反过来让模型组合控制变得更有价值？
