topRisks:
  - name: Closed model price war
    description: Frontier API vendors could cut pricing fast enough to narrow the savings delta for migration.
    mitigation: Focus on workflow-level ROI, fallback control, and portfolio management value that still matters when prices compress.
  - name: Weak migration accuracy
    description: Open-weight models may underperform on edge-case support tickets and create customer-quality regressions.
    mitigation: Start with low-risk intents, require shadow-mode evidence before cutover, and keep instant fallback to incumbent models.
  - name: Platform teams build in-house
    description: Sophisticated AI vendors may try to assemble their own eval and routing stack instead of buying.
    mitigation: Win on time-to-value with prebuilt support-specific cohorts, KPI templates, and savings dashboards that are expensive to reproduce.
