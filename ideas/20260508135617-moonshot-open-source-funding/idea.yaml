differentiator: >-
  This is not a generic LLM gateway or model benchmark lab. The wedge is
  intent-level migration for one painful economic workflow: support traffic that
  is high volume, repetitive, and easy to score against operational KPIs.
  Defensibility comes from workflow-specific evaluation corpora, observed
  fallback behavior, and ROI histories that compound into a proprietary playbook
  for where open-weight models are safe to deploy first.
