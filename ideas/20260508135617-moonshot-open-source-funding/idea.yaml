problem: >-
  AI support-software vendors are under pressure to keep AI gross margins
  healthy, but many still serve most production traffic through expensive
  frontier APIs because moving to open-weight models is risky. They lack a
  workflow-specific way to prove which ticket types can be downgraded safely,
  what the savings will be, and when to fall back before customer experience
  slips.
targetUser:
  primary: >-
    Head of AI Platform at a Series B+ customer support software vendor running
    high-volume summarization, drafting, and reply-suggestion workloads
  secondary: >-
    GM or VP Product responsible for AI gross margin at a customer support
    automation platform
  buyer: VP Engineering or GM of AI products
startupThesis:
  nonObviousInsight: >-
    The real bottleneck in the shift to open-weight AI is no longer model
    availability; it is migration confidence at the workflow level. As
    open-weight vendors prove real ARR and lower-memory serving, the winning
    product is the system that decides which production requests are safe to
    move off premium closed APIs and enforces that decision continuously.
  beachhead: >-
    Customer support SaaS vendors with $100k+ monthly LLM spend that want to
    replatform repetitive ticket summarization and draft-reply flows onto
    open-weight models without risking QA or escalation rates
  wedge: >-
    An intent-level migration autopilot that shadows live support traffic,
    benchmarks open-weight candidates against business KPIs, and ships guarded
    routing plus instant fallback for low-risk ticket classes
  whyNowCatalyst: >-
    Moonshot's funding, ARR growth, and lower-memory model advances indicate
    open-weight supply is now good and cheap enough that AI vendors need a fast
    path to switch production traffic, not another year of lab testing.
  ventureScalePath: >-
    Start with support-ticket flows, then expand the same migration and margin
    control plane into sales assistants, document copilots, claims operations,
    and any enterprise workflow that needs a portfolio of closed and open
    models managed by business outcome rather than model brand.
solution: >-
  Open Weight Margin Autopilot plugs into a support vendor's existing prompt
  and telemetry stack, mirrors production requests, and groups traffic by
  intent, risk, and failure tolerance. For each cohort, it runs offline and
  canary evaluations on open-weight endpoints, estimates savings, and produces
  an approval pack tied to handle time, escalation rate, CSAT proxy, and human
  override rate. Once approved, it activates guarded routing policies with
  automatic fallback to the incumbent frontier model whenever quality or latency
  drifts. Over time, it becomes the margin-control layer for every AI workflow
  the vendor ships.
goToMarketSeed:
  firstCustomer: >-
    A Series B-C helpdesk or customer-support automation vendor serving
    ecommerce and SaaS customers, spending more than $100k per month on LLM
    inference, and actively repricing AI features for 2026 contracts
  buyingTrigger: >-
    Quarterly gross-margin review or annual pricing reset that exposes frontier
    model costs as the blocker to expanding AI feature usage
  currentAlternative: >-
    Staying on OpenAI or Anthropic APIs while doing spreadsheet benchmarking,
    manual prompt tests, and ad hoc fallback logic in-house
  switchingReason: >-
    The product proves savings on real ticket cohorts before cutover and gives
    engineering teams a reversible production path, which is faster and less
    risky than building their own evaluation, routing, and rollback stack
  pricingHypothesis: >-
    Platform fee plus a usage-based charge on migrated requests, with ROI sold
    against net inference savings captured
