competitors:
- name: Portkey
  stage: scale-up
  wedge: Production AI gateway with routing, observability, prompt management, and guardrails.
  pricing: Free tier; Growth from $49/month plus overages; enterprise custom.
  strength: Strong control-plane primitives for multi-provider traffic.
  weaknessVsUs: Generic traffic layer rather than support-intent migration approval and savings workflows.
  sourceRefs:
  - 24
  - 25
- name: Braintrust
  stage: scale-up
  wedge: AI eval, tracing, monitoring, and emerging gateway for model comparison and production observability.
  pricing: Free tier; Pro $249/month plus usage; enterprise custom.
  strength: Deep evaluation workflow and scoring vocabulary.
  weaknessVsUs: Optimizes experimentation and measurement more than live support-workflow cutover and rollback.
  sourceRefs:
  - 26
  - 27
- name: Humanloop
  stage: scale-up
  wedge: Enterprise prompt management, evaluation, and observability platform.
  pricing: Free trial / enterprise custom.
  strength: Good cross-functional workflow between engineers and domain experts plus enterprise compliance posture.
  weaknessVsUs: Less opinionated about traffic migration, fallback policy, and support-specific business KPIs.
  sourceRefs:
  - 28
  - 29
- name: Amazon Bedrock
  stage: incumbent
  wedge: Managed model catalog with routing, guardrails, and enterprise procurement trust.
  pricing: Usage-based platform pricing.
  strength: Default cloud distribution, model access, and governance primitives.
  weaknessVsUs: Amazon says prompt routing is not application-specific and only optimized for English; guardrails are safety/privacy tools, not support-migration decision engines.
  sourceRefs:
  - 33
  - 34
- name: LiteLLM + vLLM
  stage: open-source
  wedge: Self-hosted routing plus efficient open-model serving.
  pricing: Open source plus infrastructure cost.
  strength: Low lock-in and high configurability for capable platform teams.
  weaknessVsUs: Requires internal engineering and does not ship support-intent benchmark sets, approval packs, or buyer-friendly ROI workflows.
  sourceRefs:
  - 30
  - 31
  - 38
