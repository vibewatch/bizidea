openQuestions:
- How many support-software vendors truly exceed $100k per month in LLM spend today, rather than aspiring to it?
- 'Which first ticket cohorts produce the fastest savings with minimal quality risk: summaries, drafting, triage, order status, or email deflection?'
- Will buyers trust an external migration layer enough to let it automate production routing, or will they demand analyst-style reporting first?
- How quickly will closed-model price cuts narrow the ROI wedge versus making portfolio control even more valuable?
