  sensitivityCases:
  - case: Closed-model price war compresses the savings delta
    impact: If Anthropic and similar providers cut pricing faster than open-model costs fall, pure cost-reduction ROI narrows and the startup must lean harder on routing control, approvals, and portfolio management.
    sourceRefs:
