  validationPlan:
  - priority: high
    question: How many support-software vendors already exceed $100k per month in model spend on summarization, drafting, and AI-agent traffic?
    evidenceToGather: Interview 15 AI platform leaders at support SaaS vendors; ask for monthly token spend bands, top workflows, and pricing pressure from 2026 contract renewals.
  - priority: high
    question: Which support intents are safe to migrate first without hurting QA or escalations?
    evidenceToGather: Run shadow evaluations on live but anonymized ticket cohorts for summaries, macro drafting, classification, and low-risk order-status flows; compare quality against handle-time and escalation metrics.
  - priority: medium
    question: Will buyers trust a third-party migration layer inside production?
    evidenceToGather: Pilot with one design partner using passive shadow mode, then canary routing with instant fallback; measure rollout speed versus an in-house stack.
