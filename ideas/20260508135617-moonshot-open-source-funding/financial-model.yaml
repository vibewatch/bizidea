scenarios:
  downside:
    description: "Pilot conversions slip, ARPU lands closer to the lower end of the pricing band, and churn stays elevated because buyers treat the product as a tool rather than a system of record."
    y3RevenueK: 1339.8
    y3EbitdaK: -792.2
    cashLowPointK: 49.1
    keyAssumptionChanges:
      - "Blended annual ARPU drops to about $91.2K."
      - "Monthly churn rises to 2.5%."
      - "Gross new-customer adds slow meaningfully in Y2 and Y3."
      - "Gross margin compresses to 72%."
  base:
    description: "Founder-led pilots convert steadily, the first partner channel starts contributing in Y2, and the company reaches roughly 30 production customers by Q4Y3 while turning Q4 EBITDA positive."
    y3RevenueK: 2002.2
    y3EbitdaK: -288.6
    cashLowPointK: 745.5
    keyAssumptionChanges:
      - "Blended annual ARPU holds at about $100.8K."
      - "Monthly churn stays near 1.8%."
      - "Gross new-customer adds reach 3 in Y1, 9 in Y2, and 24 in Y3."
      - "Gross margin remains at the 75% target."
  upside:
    description: "Referral sourcing and repeatable onboarding arrive earlier, letting the team convert more pilots and upsell more migrated-request volume without meaningfully increasing churn."
    y3RevenueK: 2744.9
    y3EbitdaK: 286.4
    cashLowPointK: 1412.0
    keyAssumptionChanges:
      - "Blended annual ARPU rises to about $108.0K."
      - "Monthly churn improves to 1.5%."
      - "The partner-assisted new-customer ramp accelerates from Y2 onward."
      - "Gross margin improves to 77%."
sensitivity:
  - variable: ARPU
    downsideCase: "$91.2K annual blended ARPU"
    baseCase: "$100.8K annual blended ARPU"
    upsideCase: "$108.0K annual blended ARPU"
    y3RevenueImpactK: -190.7
    cashImpactK: -186.2
  - variable: CAC
    downsideCase: "CAC rises about 20% to roughly $34K as more effort is needed per win."
    baseCase: "$28.3K CAC"
    upsideCase: "CAC falls about 10% to roughly $25K as referrals contribute."
    y3RevenueImpactK: 0.0
    cashImpactK: -219.3
  - variable: churn
    downsideCase: "2.5% monthly churn"
    baseCase: "1.8% monthly churn"
    upsideCase: "1.2% monthly churn"
    y3RevenueImpactK: -107.3
    cashImpactK: -100.8
  - variable: sales cycle
    downsideCase: "New logos land about one quarter later than planned."
    baseCase: "Pilot-led sales motion converts on the modeled timeline."
    upsideCase: "Partner referrals and repeatable onboarding pull bookings forward."
    y3RevenueImpactK: -159.9
    cashImpactK: -155.0
  - variable: gross margin
    downsideCase: "72% gross margin"
    baseCase: "75% gross margin"
    upsideCase: "78% gross margin"
    y3RevenueImpactK: 0.0
    cashImpactK: -82.9
  - variable: hiring pace
    downsideCase: "Second sales hire and third engineer are pulled one quarter earlier."
    baseCase: "Commercial and engineering hires follow the modeled timeline."
    upsideCase: "Those two hires are delayed one quarter until conversion proof is stronger."
    y3RevenueImpactK: 0.0
    cashImpactK: -75.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Outbound["Founder-led outbound"] --> Pilots["Paid pilots"]
      Pilots --> Production["Production customers"]
      Production --> Revenue["Subscription + usage revenue"]
      Revenue --> GrossProfit["75% gross profit"]
      GrossProfit --> Cash["Runway for hiring"]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from reaching about 30 production customers by Q4Y3 at roughly $100.8K blended annual ARPU after founder-led pilots convert into recurring subscriptions."
  - checkName: Must go right
    finding: "The model depends on low-risk support cohorts proving enough savings and quality stability for pilot-to-production conversion to stay near the business-plan target."
  - checkName: Model breaks if
    finding: "If ARPU slips toward the low end of the range and sales cycles lengthen, the downside case drives cash close to zero before the business can self-fund."
  - checkName: Next-round proof
    finding: "The next financing is justified when the company can show 3 paid design partners, one production canary cohort, and the first repeatable referral source."
sanityChecks:
  ruleOf40: "Y3 growth 219% + EBITDA margin -14% = 205%."
  burnMultiple: "Y3 burn multiple about 0.21x = $288.6K EBITDA burn on $1.37M of net new annual revenue versus Y2."
  revenuePerFte: "$195K Y3 on average 10.25 FTE (benchmark roughly $200–400K for early SaaS)."
  flags:
    - "The support-only beachhead is intentionally narrow, so the model still needs adjacent workflow expansion after Y3 for venture-scale upside."
    - "ARPU assumes buyers accept about $100.8K blended annual spend, which is above the researched $85K SOM anchor and therefore depends on strong measured savings."
    - "Cash assumes in-period collections; enterprise net-60 or procurement delays would reduce the modeled cash low point."
    - "Y3 revenue per FTE is only around the low end of early SaaS efficiency, so hiring ahead of proof would pressure the funding need."
    - "Full-year Y3 EBITDA remains negative even though Q4Y3 turns positive, so the model still requires disciplined hiring through the seed stage."
