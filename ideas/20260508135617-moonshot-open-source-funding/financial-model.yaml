slug: open-weight-margin-autopilot
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: Model start month
    value: 2026-06
    unit: YYYY-MM
    source: "[business-plan.yaml date] startup-finance heuristic: first full month after plan issuance."
  - id: A2
    name: Opening cash at M1
    value: $2.50M
    unit: USD
    source: "[business-plan.yaml fundingAsk.targetFundingRangeUsd] assumes a $2.40M pre-seed closes near model start plus roughly $100K of founder/existing cash."
  - id: A3
    name: Blended annual ARPU
    value: $100.8K
    unit: USD/customer/year
    source: "[business-plan.yaml investorMemo.firstCustomer.initialContract; business-plan.yaml market.som; research.yaml bottomUpSizingDrivers] modeled at $8.4K MRR, above the $85K SOM floor because production accounts also pay usage-linked fees after migration goes live."
  - id: A4
    name: Monthly churn
    value: 1.8%
    unit: pct/month
    source: "[business-plan.yaml businessModel + milestones] startup-finance heuristic for early vertical infrastructure sold on annual contracts but still proving pilot-to-production stickiness."
  - id: A5
    name: Gross new-customer ramp
    value: "Y1 gross adds 3; Y2 gross adds 9; Y3 gross adds 24."
    unit: customers/year
    source: "[business-plan.yaml milestones; business-plan.yaml gtm.funnelTargets; research.yaml market.som] paced to reach ~3 paying accounts by Y1 end, ~10 production accounts by Y2 end, and ~30 by Q4Y3."
  - id: A6
    name: Gross margin target
    value: 75%
    unit: pct of revenue
    source: "[business-plan.yaml businessModel.targetGrossMarginPct] modeled as 25% COGS on recognized revenue."
  - id: A7
    name: Founder / CEO loaded annual cash cost
    value: $108K
    unit: USD/year
    source: "[business-plan.yaml team Founder CEO] startup-finance heuristic: modest $90K cash salary plus 20% payroll tax and benefits."
  - id: A8
    name: Founding engineer loaded annual cash cost
    value: $168K
    unit: USD/year
    source: "[business-plan.yaml team Founding eng] startup-finance heuristic: $140K salary plus 20% load."
  - id: A9
    name: Product lead loaded annual cash cost
    value: $150K
    unit: USD/year
    source: "[business-plan.yaml team Product lead] startup-finance heuristic: $125K salary plus 20% load."
  - id: A10
    name: Full-stack platform engineer loaded annual cash cost
    value: $156K
    unit: USD/year
    source: "[business-plan.yaml team Full-stack platform engineer] startup-finance heuristic: $130K salary plus 20% load."
  - id: A11
    name: Solutions engineer loaded annual cash cost
    value: $126K
    unit: USD/year
    source: "[business-plan.yaml team Solutions engineer] startup-finance heuristic: $105K salary plus 20% load."
  - id: A12
    name: Sales / partnerships hire loaded annual cash cost
    value: $144K
    unit: USD/year
    source: "[business-plan.yaml gtm channels + funnelTargets] startup-finance heuristic for the first commercial hire at $120K base-equivalent plus 20% load; variable selling cost sits in S&M."
  - id: A13
    name: Customer success / implementation loaded annual cash cost
    value: $120K
    unit: USD/year
    source: "[business-plan.yaml operations + milestones] startup-finance heuristic: $100K salary plus 20% load."
  - id: A14
    name: G&A / ops loaded annual cash cost
    value: $102K
    unit: USD/year
    source: "[business-plan.yaml operations] startup-finance heuristic: lean $85K salary plus 20% load."
  - id: A15
    name: Hiring timeline
    value: "M1 founder CEO + founding engineer; M3 product lead; M4 full-stack engineer; M6 solutions engineer; M15 first sales hire; M18 second engineer; M19 customer success; M22 G&A; M28 second sales hire; M33 third engineer."
    unit: timeline
    source: "[business-plan.yaml team] first five hires follow the plan; later hires are conservative startup-finance extensions matched to the Y2 and Y3 milestones."
  - id: A16
    name: Non-payroll sales and marketing spend
    value: "$4K/mo in Y1, $8K/mo in Y2, $10K/mo in Y3, plus 5% of revenue."
    unit: USD/month
    source: "[business-plan.yaml gtm channels] startup-finance heuristic for founder-led outbound, partner travel, collateral, and light commissions without paid demand-gen scale."
  - id: A17
    name: Non-payroll R&D spend
    value: "$5K/mo in Y1, $7K/mo in Y2, $9K/mo in Y3."
    unit: USD/month
    source: "[business-plan.yaml product + operations] startup-finance heuristic for cloud, security, testing, and dev tooling outside COGS."
  - id: A18
    name: Non-payroll G&A spend
    value: "$4K/mo in Y1, $5K/mo in Y2, $6K/mo in Y3."
    unit: USD/month
    source: "[business-plan.yaml operations] startup-finance heuristic for legal, accounting, insurance, and admin software."
  - id: A19
    name: CAC calculation convention
    value: $28.3K
    unit: USD/new customer
    source: "[model calc] Y2-Y3 sales and marketing spend of roughly $935.5K divided by 33 gross new paying customers."
  - id: A20
    name: Cash collection timing
    value: In-period collection
    unit: policy
    source: "Startup-finance heuristic; flagged because enterprise procurement and payment terms could lag revenue recognition."
  - id: A21
    name: Funding ask sizing
    value: $2.4M pre-seed
    unit: USD
    source: "[business-plan.yaml fundingAsk; business-plan.yaml milestones; model calc] sized to fund 18 months through 3 paid design partners, first production proof, and one partner/referral channel with a 6-month buffer."
