fundingAsk:
  round: pre-seed
  amountM: 2.4
  runwayMonths: 18
  milestone: 拿下 3 家付费共创客户，证实一个金丝雀群组能进入生产，并展示足够的转化证据，以支持围绕 10 家生产客户的 seed 融资。
  useOfFunds:
    - bucket: 工程
      amountUsd: 1080000
      percentage: 45
    - bucket: GTM
      amountUsd: 600000
      percentage: 25
    - bucket: G&A
      amountUsd: 240000
      percentage: 10
    - bucket: 缓冲（6 个月）
      amountUsd: 480000
      percentage: 20
scenarios:
  downside:
    description: pilot 转化变慢，ARPU 更接近定价区间下沿，同时由于买家把产品当工具而不是系统记录，流失率始终偏高。
    y3RevenueK: 1339.8
    y3EbitdaK: -792.2
    cashLowPointK: 49.1
    keyAssumptionChanges:
      - 综合年度 ARPU 降到约 $91.2K。
      - 月流失率升至 2.5%。
      - 第 2 年和第 3 年的新增客户显著放缓。
      - 毛利率压缩到 72%。
  base:
    description: 创始人主导的 pilot 稳步转化，第 2 年开始有首个伙伴渠道贡献，公司到第 3 年 Q4 约能做到 30 家生产客户，并在当季实现 EBITDA 转正。
    y3RevenueK: 2002.2
    y3EbitdaK: -288.6
    cashLowPointK: 745.5
    keyAssumptionChanges:
      - 综合年度 ARPU 维持在约 $100.8K。
      - 月流失率维持在约 1.8%。
      - 新增客户数在第 1 年达到 3 家、第 2 年 9 家、第 3 年 24 家。
      - 毛利率维持在 75% 目标。
  upside:
    description: 转介绍获客和可复制 onboarding 更早跑通，让团队在不显著抬高流失率的前提下，转化更多 pilot，并卖出更多迁移请求量。
    y3RevenueK: 2744.9
    y3EbitdaK: 286.4
    cashLowPointK: 1412
    keyAssumptionChanges:
      - 综合年度 ARPU 拉升到约 $108.0K。
      - 月流失率改进至 1.5%。
      - 从第 2 年开始，伙伴辅助获客显著加速。
      - 毛利率拉升到 77%。
sensitivity:
  - variable: ARPU
    downsideCase: 年度综合 ARPU 为 $91.2K
    baseCase: 年度综合 ARPU 为 $100.8K
    upsideCase: 年度综合 ARPU 为 $108.0K
    y3RevenueImpactK: -190.7
    cashImpactK: -186.2
  - variable: CAC
    downsideCase: CAC 上升约 20% 至约 $34K，由于每次赢单都需要更多投入。
    baseCase: $28.3K CAC
    upsideCase: 由于转介绍开始贡献，CAC 下降约 10% 至约 $25K。
    y3RevenueImpactK: 0
    cashImpactK: -219.3
  - variable: 流失率
    downsideCase: 月流失率 2.5%
    baseCase: 月流失率 1.8%
    upsideCase: 月流失率 1.2%
    y3RevenueImpactK: -107.3
    cashImpactK: -100.8
  - variable: 销售周期
    downsideCase: 新客户签约时间比计划晚约一个季度。
    baseCase: 由 pilot 驱动的销售打法按模型设定的时间线转化。
    upsideCase: 伙伴转介绍和可复制 onboarding 让签约提前。
    y3RevenueImpactK: -159.9
    cashImpactK: -155
  - variable: 毛利率
    downsideCase: 72% 毛利率
    baseCase: 75% 毛利率
    upsideCase: 78% 毛利率
    y3RevenueImpactK: 0
    cashImpactK: -82.9
  - variable: 招聘节奏
    downsideCase: 第二位销售和第三位工程师提前一个季度入职。
    baseCase: 商业化和工程岗位按模型设定的时间线招聘。
    upsideCase: 这两个岗位推迟一个季度，等转化证据更强后再招。
    y3RevenueImpactK: 0
    cashImpactK: -75
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Outbound[创始人主导外呼] --> Pilots[付费 pilot]
      Pilots --> Production[生产客户]
      Production --> Revenue[订阅费 + 按量收入]
      Revenue --> GrossProfit[75% 毛利]
      GrossProfit --> Cash[支撑招聘的现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形下的收入，来自创始人主导的 pilot 转成经常性订阅后，到第 3 年 Q4 做到约 30 家生产客户，并实现约 $100.8K 的综合年度 ARPU。
  - checkName: 必须成立的前提
    finding: 这个模型成立的前提是：低风险客服群组必须证实足够的节省空间和质量稳定性，才能让 pilot 到生产的转化接近商业计划设定。
  - checkName: 模型失效条件
    finding: 如果 ARPU 滑向区间下沿，同时销售周期拉长，下行情景下现金会在业务实现自我供血前接近耗尽。
  - checkName: 下一轮融资证实点
    finding: 当公司能展示 3 家付费共创客户、1 个生产金丝雀群组，以及第一个可复制的转介绍来源时，下一轮融资才算站得住。
sanityChecks:
  ruleOf40: 第 3 年增长 219% + EBITDA 利润率 -14% = 205%。
  burnMultiple: 第 3 年 burn multiple 约 0.21x = 以相对第 2 年新增的 $1.37M 年度收入，换来 $288.6K 的 EBITDA 亏损。
  revenuePerFte: 第 3 年人均收入约 $195K，对应平均 10.25 名 FTE（前期 SaaS 基准约为 $200–400K）。
  flags:
    - 客服单一滩头市场是刻意收窄的，因此若想获得风险投资级别的上行空间，第 3 年后仍必须扩到相邻流程。
    - ARPU 假设买家愿意接受约 $100.8K 的综合年度支出，这高于研究中的 $85K SOM 锚点，因此依赖于强而可量化的节省证据。
    - 现金测算假设当期回款；如果企业客户采用 net-60 或采购延期，模型中的现金低点会进一步下探。
    - 第 3 年的人均收入只在前期 SaaS 效率区间的低端附近，因此若在证据不足时提前扩招，会抬高融资需求。
    - 尽管第 3 年 Q4 已转正，不过全年 EBITDA 仍为负，因此 seed 阶段仍需要严格控制招聘节奏。
