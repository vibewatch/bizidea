slug: open-weight-margin-autopilot
date: 2026-05-08
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: 模型启动月份。
    value: 2026-06
    unit: YYYY-MM
    source: "[business-plan.yaml date] 创业财务经验法则：从计划出具后的第一个完整月份开始计算。"
  - id: A2
    name: M1 期初现金
    value: $2.50M
    unit: USD
    source: >-
      [business-plan.yaml fundingAsk.targetFundingRangeUsd] 假设在模型启动前后完成一轮 $2.40M pre-seed 融资，另有约 $100K
      的创始人/存量现金。
  - id: A3
    name: 综合年度 ARPU
    value: $100.8K
    unit: USD/customer/year
    source: >-
      [business-plan.yaml investorMemo.firstCustomer.initialContract; business-plan.yaml market.som;
      research.yaml bottomUpSizingDrivers] 模型按 $8.4K MRR 计算，高于 $85K 的 SOM 下限，由于迁移上线后，生产客户还会付费与用量挂钩的费用。
  - id: A4
    name: 月流失率
    value: 1.8%
    unit: pct/month
    source: "[business-plan.yaml businessModel + milestones] 创业财务经验法则：适用于按年合约出售、但仍在证实从 pilot 到生产粘性的前期垂直基础设施公司。"
  - id: A5
    name: 新增客户爬坡
    value: 第 1 年新增 3 家；第 2 年新增 9 家；第 3 年新增 24 家。
    unit: customers/year
    source: >-
      [business-plan.yaml milestones; business-plan.yaml gtm.funnelTargets; research.yaml market.som] 节奏设定为第 1
      年底约 3 家付费客户、第 2 年底约 10 家生产客户、到第 3 年 Q4 约 30 家。
  - id: A6
    name: 目标毛利率
    value: 75%
    unit: pct of revenue
    source: "[business-plan.yaml businessModel.targetGrossMarginPct] 假设已确认收入对应 25% COGS。"
  - id: A7
    name: 创始人/CEO 全口径年度现金成本
    value: $108K
    unit: USD/year
    source: "[business-plan.yaml team 创始人/CEO] 创业财务经验法则：按较克制的 $90K 现金薪资，加上 20% 的薪税和福利。"
  - id: A8
    name: 创始工程师全口径年度现金成本
    value: $168K
    unit: USD/year
    source: "[business-plan.yaml team 创始工程师] 创业财务经验法则：$140K 薪资，加上 20% 全口径负担。"
  - id: A9
    name: 产品负责人全口径年度现金成本
    value: $150K
    unit: USD/year
    source: "[business-plan.yaml team 产品负责人] 创业财务经验法则：$125K 薪资，加上 20% 全口径负担。"
  - id: A10
    name: 全栈平台工程师全口径年度现金成本
    value: $156K
    unit: USD/year
    source: "[business-plan.yaml team 全栈平台工程师] 创业财务经验法则：$130K 薪资，加上 20% 全口径负担。"
  - id: A11
    name: 解决方案工程师全口径年度现金成本
    value: $126K
    unit: USD/year
    source: "[business-plan.yaml team 解决方案工程师] 创业财务经验法则：$105K 薪资，加上 20% 全口径负担。"
  - id: A12
    name: 销售/合作伙伴岗位全口径年度现金成本
    value: $144K
    unit: USD/year
    source: >-
      [business-plan.yaml gtm channels + funnelTargets] 创业财务经验法则：第一位商业化岗位按 $120K 基础等价薪酬，加上 20% 全口径负担；浮动销售成本计入
      S&M。
  - id: A13
    name: 客户成功/实施岗位全口径年度现金成本
    value: $120K
    unit: USD/year
    source: "[business-plan.yaml operations + milestones] 创业财务经验法则：$100K 薪资，加上 20% 全口径负担。"
  - id: A14
    name: 行政与运营岗位全口径年度现金成本
    value: $102K
    unit: USD/year
    source: "[business-plan.yaml operations] 创业财务经验法则：按精简配置估算，$85K 薪资，加上 20% 全口径负担。"
  - id: A15
    name: 招聘时间线
    value: >-
      M1 创始人/CEO + 创始工程师；M3 产品负责人；M4 全栈平台工程师；M6 解决方案工程师；M15 第一位销售；M18 第二位工程师；M19 客户成功；M22 行政与管理；M28 第二位销售；M33
      第三位工程师。
    unit: 时间线
    source: "[business-plan.yaml team] 前五个岗位按计划招聘；后续岗位是在第 2 年和第 3 年里程碑基础上的保守创业财务外推。"
  - id: A16
    name: 非薪酬销售与营销支出
    value: 第 1 年每月 $4K，第 2 年每月 $8K，第 3 年每月 $10K，外加收入的 5%。
    unit: USD/month
    source: "[business-plan.yaml gtm channels] 创业财务经验法则：覆盖创始人主导外呼、伙伴差旅、销售物料和轻量佣金，不包含大规模付费获客。"
  - id: A17
    name: 非薪酬研发支出
    value: 第 1 年每月 $5K，第 2 年每月 $7K，第 3 年每月 $9K。
    unit: USD/month
    source: "[business-plan.yaml product + operations] 创业财务经验法则：覆盖 COGS 之外的云成本、安全、测试和开发工具。"
  - id: A18
    name: 非薪酬 G&A 支出
    value: 第 1 年每月 $4K，第 2 年每月 $5K，第 3 年每月 $6K。
    unit: USD/month
    source: "[business-plan.yaml operations] 创业财务经验法则：覆盖法务、会计、保险和行政软件。"
  - id: A19
    name: CAC 计算口径
    value: $28.3K
    unit: USD/new customer
    source: "[model calc] 第 2 年到第 3 年约 $935.5K 的销售与营销支出，除以 33 家新增付费客户。"
  - id: A20
    name: 回款时点
    value: 当期回款
    unit: 政策
    source: 创业财务经验法则；之所以单独标注，是由于企业采购和付款账期可能落后于收入确认。
  - id: A21
    name: 融资需求规模
    value: $2.4M pre-seed
    unit: USD
    source: >-
      [business-plan.yaml fundingAsk; business-plan.yaml milestones; model calc] 这笔融资规模按 18 个月测算，目标是撑到 3
      家付费共创客户、首个生产证实点和一个伙伴/转介渠道落地，并保留 6 个月缓冲。
