jobsToBeDone:
- job: 当我们的 AI 客服功能把模型预算打穿时，帮助平台团队把安全的工单群组迁到更便宜的开源权重模型上，这样他们就能在不伤害服务质量的前提下守住毛利率。
  currentAlternative: 继续在现有前沿 API 之上做内部 benchmark，并手写路由逻辑
  successMetric: 推理成本下降 30%+，同时升级率或 QA 失败率没有明显上升
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这个信号簇同时体现了真实收入、企业 API 需求，以及围绕开源权重供给的强资本形成。
  painIntensity:
    score: 4
    rationale: 一旦推理支出上来，AI 软件厂商就会直接感受到毛利率压力，即便原始信号簇没有点出某一次急性事故。
  wedgeClarity:
    score: 5
    rationale: 工单迁移是一个狭窄但可量化的首个工作流，节省空间和回滚逻辑都很清晰。
  defensibility:
    score: 3
    rationale: 这个赛道竞争激烈，但专有的群组数据、迁移策略和 ROI 历史仍有机会形成切换成本。
  ventureScale:
    score: 5
    rationale: 所有企业 AI 产品最终都要管理一组闭源与开源模型，因此这会成为超越客服场景的广义控制平面机会。
topRisks:
- name: 闭源模型价格战
  description: 前沿 API 厂商可能会快速降价，从而压缩迁移带来的节省空间。
  mitigation: 把价值主张放在工作流级 ROI、回退控制和模型组合管理上；即便价格继续下压，这些能力仍然重要。
- name: 迁移精度不足
  description: 开源权重模型在长尾客服工单上可能表现不稳，进而造成客户体验回退。
  mitigation: 先从低风险意图切入，切流前必须有 shadow mode 证据，并保留对现有模型的即时回退。
- name: 平台团队选择内部自建
  description: 成熟的 AI 厂商可能会尝试自己拼出评估与路由栈，而不是采购。
  mitigation: 靠预构建的客服专属群组、KPI 模板和节省仪表盘赢下时间价值比，这些东西复制起来并不便宜。
