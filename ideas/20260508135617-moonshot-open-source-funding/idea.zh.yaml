problem: AI 客服软件厂商必须守住 AI 毛利率，但很多公司仍把大部分生产流量跑在昂贵的前沿 API 上，因为迁往开源权重模型风险太高。它们缺的不是模型，而是一套按工作流验证的方法：哪些工单类型可以安全降配、能省多少钱、以及在客户体验下滑前该在什么时点回退。
targetUser:
  primary: Series B+ 客服软件厂商的 AI 平台负责人，负责高吞吐的摘要、草拟和回复建议类工作负载
  secondary: 负责客服自动化平台 AI 毛利率的 GM 或 VP Product
  buyer: VP Engineering 或 AI 产品线 GM
startupThesis:
  nonObviousInsight: 从闭源模型切到开源权重模型，真正卡住的已经不是模型供给，而是工作流层面的迁移信心。随着开源权重厂商证明了真实 ARR 和更低内存的服务能力，真正能胜出的产品，会是那套持续判断哪些生产请求可以安全迁出高价闭源 API、并把这套判断长期执行下去的系统。
  beachhead: 每月 LLM 支出超过 $100k 的客服 SaaS 厂商，希望把重复性的工单摘要和回复草拟流程迁到开源权重模型上，又不愿冒 QA 或升级率恶化的风险
  wedge: 一套按意图粒度运行的迁移自动驾驶层：它旁路跟踪真实客服流量，按业务 KPI 对开源权重候选模型做基准测试，并为低风险工单类别上线带防护的路由和即时回退
  whyNowCatalyst: Moonshot 的融资、ARR 增长和更低内存模型的进展都说明，开源权重供给已经足够好、也足够便宜。AI 厂商现在需要的是一条能快速切换生产流量的路径，而不是再做一年的实验室测试。
  ventureScalePath: 先拿下客服工单流程，再把同一套迁移与毛利控制平面扩展到销售助手、文档 Copilot、理赔运营，以及任何需要按业务结果而不是模型品牌来管理闭源与开源模型组合的企业工作流。
solution: Open Weight Margin Autopilot 接入客服厂商现有的提示词和遥测栈，镜像生产请求，并按意图、风险和容错度给流量分群。针对每个群组，它会在开源权重端点上做离线与金丝雀评估，估算节省空间，并生成一套与处理时长、升级率、CSAT 代理指标和人工接管率挂钩的审批包。获批后，系统会启用带防护的路由策略；一旦质量或延迟漂移，就自动回退到现有的前沿模型。时间一长，它会变成厂商所有 AI 工作流的毛利控制层。
goToMarketSeed:
  firstCustomer: 一家服务电商和 SaaS 客户的 Series B-C 工单系统或客服自动化厂商，每月在 LLM 推理上花费超过 $100k，并且正在为 2026 年合同重定价 AI 功能
  buyingTrigger: 季度毛利复盘或年度价格重置暴露出前沿模型成本已经成为 AI 功能扩张的主要障碍
  currentAlternative: 继续使用 OpenAI 或 Anthropic API，同时在内部用表格做 benchmark、人工测试提示词，并临时拼接回退逻辑
  switchingReason: 产品能先在真实工单群组上证明节省效果，再完成切流，并给工程团队一条可逆的生产上线路径；相比自建评估、路由和回滚栈，这条路更快、风险也更低
  pricingHypothesis: 平台费加已迁移请求的按量收费，ROI 直接锚定实际拿到手的推理成本节省
