openQuestions:
- 大型结构钢制造商是否愿意多接受一个工位侧工作流步骤，只要它能减少下游人工救援焊接；还是说几乎所有输入采集都必须自动化？
- 在首个接头类型上，什么样的最小传感组合——手动量规、照片、激光间隙测量，还是全量扫描——最能准确预测自主焊接就绪度？
- OEM 和集成商会把中立预检层当作合作产品，还是会把它视为近期功能蚕食？
- 滩头需求里，有多少来自专门服务数据中心的供应商，又有多少来自商业项目结构更混杂的一般结构钢车间？
