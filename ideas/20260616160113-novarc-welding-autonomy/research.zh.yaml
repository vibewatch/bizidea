  adoptionFrictionMatrix:
  - friction: 装配工位要多做数据采集
    severity: 高
    affectedBuyer: 车间主管
    mitigation: 先把采集包收缩到最少的测量值加照片；只有在首个接头类型证明 ROI 后，再自动化更多采集。
