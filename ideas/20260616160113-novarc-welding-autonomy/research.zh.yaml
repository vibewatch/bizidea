competitors:
- name: Novarc
  stage: 扩张期
  wedge: 围绕焊接单元，通过 SWR 和 NovAI 提供自适应机器人焊接与 AI 自主能力。
  pricing: 定制报价 / 系统销售；无公开标价。
  strength: 焊接领域可信度深，且在自主能力、生产率和企业级焊接智能上有清晰产品聚焦。
  weaknessVsUs: 重心仍在单元内执行；拟议中的创业公司更早切入工作流，而且能横跨混合机群保持 OEM 中立。
  sourceRefs:
  - 1
  - 31
  - 32
- name: Path Robotics
  stage: 扩张期
  wedge: 面向大型或高变异焊件的智能焊接单元与 physical AI 自主能力，商业模式偏 RaaS。
  pricing: RaaS / 报价式商业模式。
  strength: 自主焊接品牌强，在矿业、造船和重型制造场景里已有可信牵引。
  weaknessVsUs: Path 通过拥有整套单元取胜；拟议中的创业公司则可以靠“在任何品牌单元之前先把工件筛出来”取胜。
  sourceRefs:
  - 12
  - 13
  - 14
  - 33
- name: Hirebotics
  stage: 扩张期
  wedge: 易部署的协作机器人焊接方案，叠加 Beacon 云软件、ROI 工具和应用式编程。
  pricing: 以计算器和演示驱动的定价方式，强调 ROI 与回本周期，而非公开标价。
  strength: 部署简单、编程快，对不想碰传统机器人复杂度的车间很有吸引力。
  weaknessVsUs: 它优化的是“简单重复焊接快速上线”，不是面向结构钢的装配资质认定和跨单元异常分流。
  sourceRefs:
  - 15
  - 17
  - 18
  - 20
  - 34
- name: Yaskawa Motoman
  stage: 现有厂商
  wedge: 机器人本体、预制 ArcWorld 单元、焊缝查找配件，以及集成商和培训生态。
  pricing: OEM 与集成商报价制销售。
  strength: 装机基础大、伙伴渠道成熟、焊接 know-how 深，工业信誉广。
  weaknessVsUs: Yaskawa 擅长把单元跑好，但并不掌控“这个接头到底该不该进单元”的 OEM 中立就绪度决策。
  sourceRefs:
  - 21
  - 22
  - 23
- name: FANUC America
  stage: 现有厂商
  wedge: 面向制造商的焊接协作机器人、视觉、监控以及更广泛的自动化生态。
  pricing: OEM 与集成商报价模式。
  strength: 自动化覆盖面广，传感选项多，生产率工具完善。
  weaknessVsUs: 它提供的是通用自动化栈和效率层，而不是装配就绪度与分流工作流。
  sourceRefs:
