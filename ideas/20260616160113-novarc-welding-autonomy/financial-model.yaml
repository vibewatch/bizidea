modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Fabricators[Structural-steel fabricators\n2-6 robotic cells] --> Discovery[Discovery and\ndesign-partner]
      Discovery --> Pilot[Paid pilot\n$55K one-time]
      Pilot --> Conversion{67% convert}
      Conversion -->|yes| Production[Annual subscription\n$100K per plant per year]
      Conversion -->|no| Lost[Lost opportunity]
      Production --> GrossProfit[Gross profit\n70-77% GM by Y3]
      GrossProfit --> EBITDA[EBITDA breakeven\nQ2Y3]
      EBITDA --> Cash[Cash floor\n$1.4M Q1Y3\nno new capital needed]
      Production --> Expansion[Expand cells\nand plants]
      Expansion --> Production

modelSanity:
  - checkName: Revenue engine
    finding: "Blended pilot-then-subscription model: $55K one-time pilot fees provide early cash while $100K/year per-plant subscriptions compound from 3 plants (Y1) to 40 plants (Y3), with ARR reaching $4.0M and EBITDA turning positive in Q2Y3 on pre-seed alone."
  - checkName: Must go right
    finding: "Pilot-to-production conversion must hold at 67%+ across diverse structural-steel fabricators, because the entire 3-to-10-to-40-plant ramp depends on paid pilots converting rather than stalling as one-off proof-of-concepts that never reach annual subscription."
  - checkName: Model breaks if
    finding: "ARPU compresses below $75K/plant—either because OEMs bundle basic fit-up checks or pricing resistance forces seat-based packaging—which cuts Y3 revenue by $780K+, pushes EBITDA breakeven into Y4, and reduces cash to a $900K floor that may require a bridge."
  - checkName: Next-round proof
    finding: "Reaching 10 production plants with $1.0M ARR and a proven deployment template by Y2 end demonstrates repeatable beachhead economics and a credible path to the $4.8M SOM, justifying a $5M+ seed round to accelerate the 10-to-40-plant sprint."

sanityChecks:
  ruleOf40: "Y3 revenue growth 204.6% (from $1.1M Y2 to $3.4M Y3) + Y3 EBITDA margin 7.9% = 212.5%; well above 40 threshold indicating high-growth early-stage; EBITDA margin will improve as subscription base matures"
  burnMultiple: "Y2 net burn $713K divided by Y2 net new ARR $700K (7 new plants x $100K) = 1.0x; Y3 is EBITDA positive so burn multiple turns negative; Y1 burn multiple 2.6x ($794K burn / $300K ARR added) is acceptable for pre-revenue proof period"
  revenuePerFte: "$285K Y3 average (15 FTEs year-end, 12 average, $3.4M revenue); within $200-400K SaaS benchmark; tightens to $228K if year-end FTE count used but still within range"
  flags:
    - "Y1 gross margin 57% is below 70% target due to pilot-heavy revenue mix (65% one-time fees); margin normalises to 75-77% by Y2-Y3 as subscription dominates"
    - "Cash floor of $1.4M in Q1Y3 (month 27) leaves only 7-8 months of then-current operating runway; any Y3 revenue miss or unplanned opex spike could require an emergency bridge before Q2Y3 cashflow-positive inflection"
    - "Structural-steel beachhead SOM $4.8M at 40 plants may be too small for Series A metrics without demonstrated adjacent-sector expansion into heavy equipment or shipbuilding by late Y2"
    - "Pilot conversion rate of 67% is an unproven assumption; BP kill criteria require 50%+ and BP funnelTargets state 50%+ as the floor; model is sensitive to even a 10-point conversion drop (see sensitivity row 3)"
    - "No seed round is modelled in the base case; the company reaches EBITDA breakeven organically in Q2Y3 but a seed round would be required to accelerate to the upside 50-plant scenario and reduce cash-floor risk"
