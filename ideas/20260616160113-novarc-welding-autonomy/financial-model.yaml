scenarios:
  downside:
    description: "Pilot-to-production conversion drops to 40% and OEM feature creep compresses ARPU to $75K/plant, limiting Y3 to 22 production plants and requiring slower hiring to preserve cash."
    y3RevenueK: 2180.0
    y3EbitdaK: -380.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
      - "Pilot conversion 40% vs 67% base"
      - "ARPU $75K vs $100K base due to OEM pricing pressure"
      - "Y3 plant count 22 vs 40 base"
      - "Two fewer Y2 sales hires to conserve cash"
  base:
    description: "Pilot-to-production conversion at 67%, $100K ARPU per plant, 40 plants by Y3 end; EBITDA breakeven achieved in Q2Y3 on pre-seed alone."
    y3RevenueK: 3425.7
    y3EbitdaK: 272.4
    cashLowPointK: 1435.6
    keyAssumptionChanges:
      - "Pilot conversion 67% and pilot fee $55K as modeled"
      - "ARPU $100K/plant consistent with BP pricing range"
      - "40 plants 120 cells at Y3 matching BP SOM target"
  upside:
    description: "80% pilot conversion, $120K ARPU from premium analytics adoption, and a $5M seed in Q1Y3 accelerates to 50 plants matching the $4.8M SOM ceiling."
    y3RevenueK: 4600.0
    y3EbitdaK: 980.0
    cashLowPointK: 1492.9
    keyAssumptionChanges:
      - "Pilot conversion 80% vs 67% base"
      - "ARPU $120K vs $100K via multi-plant benchmark and audit module uptake"
      - "50 plants 150 cells vs 40 base"
      - "$5M seed raised Q1Y3 to accelerate sales and solutions hiring"

