  ruleOf40: "Y3 收入增长 204.6%（从 Y2 $1.1M 增至 Y3 $3.4M）+ Y3 EBITDA 利润率 7.9% = 212.5%；远超 40 基准，表明高增长早期阶段；随订阅基数成熟，EBITDA 利润率将持续改善"
  burnMultiple: "Y2 净消耗 $713K 除以 Y2 净新增 ARR $700K（7 家新工厂×$100K）= 1.0x；Y3 EBITDA 为正，消耗倍数转负；Y1 消耗倍数 2.6x（$794K 消耗/$300K 新增 ARR）在预营收验证期可接受"
  revenuePerFte: "Y3 平均 $285K（年末 15 名 FTE，年均 12 名，收入 $3.4M）；在 $200–400K SaaS 基准范围内；若用年末 FTE 数计算降至 $228K，仍在范围内"
  flags:
