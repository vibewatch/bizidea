slug: weld-fitup-preflight
date: '2026-06-16'
currency: USD
modelStartMonth: '2026-07'

assumptions:
  - id: A1
    name: Pre-seed 融资金额
    value: "3000"
    unit: thousandUSD
    source: "[BP fundingAsk targetFundingRangeUsd $2–4M；取中值 $3M；现金模型确认含收入情况下实际跑道 24 个月]"
  - id: A2
    name: 每生产工厂年度订阅 ARPU
    value: "100"
    unit: thousandUSD
    source: "[BP pricing $80K–$160K ACV（2–4 个单元）；中间值 3 个单元×$25K 单元费+$25K 部署/分析费=$100K；research SAM $40M/400 制造商×2.5 个单元=$40K/单元×2.5=$100K/工厂]"
  - id: A3
    name: 每工厂月度订阅费
    value: "8.3"
    unit: thousandUSD
    source: "[A2/12=$8,333；模型取 $8.3K 以保持取整一致性]"
  - id: A4
    name: 付费试点一次性费用
    value: "55"
    unit: thousandUSD
    source: "[BP firstCustomer initialContract $35K–$75K 付费试点；基准情景取中值 $55K]"
  - id: A5
    name: 试点 COGS 比率
    value: "35"
    unit: percent
    source: "[创业财务启发式：工业 B2B 试点 COGS 30–40%，含解决方案工程差旅、OEM 接口设置和 KPI 基线建立工时；随部署模板成熟，Y2 收敛至 25%]"
  - id: A6
    name: 订阅 COGS 稳态比率
    value: "15"
    unit: percent
    source: "[创业财务启发式：纯 SaaS 云+支持=10–20% COGS；BP targetGrossMarginPct 70 意味着混合 COGS 最高 30%；部署模板化后订阅线目标 15%]"
  - id: A7
    name: 云和基础设施月度基础费用
    value: "3"
    unit: thousandUSD
    source: "[创业财务启发式：早期 B2B SaaS 云支出 $2–5K/月（规模化前）；随客户增长，Y3 扩大至 $6K/月]"
  - id: A8
    name: 创始工程师月度全成本薪酬
    value: "15.6"
    unit: thousandUSD
    source: "[基础薪资 $150K×1.25 雇主负担/12；美国远程工程负责人；创业财务启发式]"
  - id: A9
    name: 创始销售负责人月度全成本薪酬
    value: "13.5"
    unit: thousandUSD
    source: "[基础薪资 $130K×1.25/12；创始人现金薪酬偏低、股权偏重；创业财务启发式]"
  - id: A10
    name: 领域与产品负责人月度全成本薪酬
    value: "14.6"
    unit: thousandUSD
    source: "[基础薪资 $140K×1.25/12；焊接领域专业知识享有溢价；创业财务启发式]"
  - id: A11
    name: 解决方案工程师月度全成本薪酬
    value: "12.5"
    unit: thousandUSD
    source: "[基础薪资 $120K×1.25/12；现场部署与传感器集成岗位；工业 SaaS 创业财务启发式]"
  - id: A12
    name: 计算机视觉/工业数据工程师月度全成本薪酬
    value: "15.1"
    unit: thousandUSD
    source: "[基础薪资 $145K×1.25/12；机器视觉与工业数据专业化；创业财务启发式]"
  - id: A13
    name: 客户成功与合作伙伴负责人月度全成本薪酬
    value: "12.5"
    unit: thousandUSD
    source: "[基础薪资 $120K×1.25/12；客户成功与渠道开发岗位；创业财务启发式]"
  - id: A14
    name: 解决方案工程师入职时间
    value: "3"
    unit: month
    source: "[BP team startTiming Month 3]"
  - id: A15
    name: 计算机视觉/数据工程师入职时间
    value: "6"
    unit: month
    source: "[BP team startTiming Month 6]"
  - id: A16
    name: 客户成功与合作伙伴负责人入职时间
    value: "9"
    unit: month
    source: "[BP team startTiming Month 9]"
  - id: A17
    name: 首个付费试点在第 4 月成交
    value: "4"
    unit: month
    source: "[BP milestones 0–12 个月关闭 3 个试点；M1–M3 共创客户发现，M4 首个试点与 BP experimentRoadmap 0–90 天签约试点目标一致]"
  - id: A18
    name: Y2 每季度试点数量
    value: "2"
    unit: count
    source: "[BP milestones 12–24 个月目标 8–12 个生产工厂，需要 Y2 约 8 个新合格试点；2/季度×4=8 个总计；BP funnelTargets 发现→试点 25–35%]"
  - id: A19
    name: 试点转正率
    value: "67"
    unit: percent
    source: "[BP funnelTargets 付费试点→年度生产 50%+；BP mustBeTrue 至少半数转化；基准情景使用 2/3（67%）作为高于 50% 底线的中间值]"
  - id: A20
    name: Y2 销售代表月度全成本薪酬
    value: "14.6"
    unit: thousandUSD
    source: "[基础薪资 $140K×1.25/12；B2B 工业 SaaS 现场销售招聘；创业财务启发式]"
  - id: A21
    name: Y2 第二解决方案工程师月度全成本薪酬
    value: "13.0"
    unit: thousandUSD
    source: "[基础薪资 $125K×1.25/12；资历较浅的第二解决方案工程师；创业财务启发式]"
  - id: A22
    name: Y2 第二软件工程师月度全成本薪酬
    value: "15.1"
    unit: thousandUSD
    source: "[基础薪资 $145K×1.25/12；产品平台工程招聘；创业财务启发式]"
  - id: A23
    name: 生产账户月度流失率
    value: "1.5"
    unit: percent
    source: "[创业财务启发式：嵌入质量工作流的 B2B 工业 SaaS=1–2%/月；模型使用 1.5%/月；审计记录集成后的高切换成本部分抵消工业采购风险]"
  - id: A24
    name: 每生产工厂混合 CAC
    value: "75"
    unit: thousandUSD
    source: "[Y1 销售营销支出 $237K/3 个生产客户=$79K；Y2 销售营销约 $523K/7 个新客户=$74.7K；混合 $75K；与研究购买触发器所示的 6 个月创始人主导销售周期加试点转化模型吻合]"
  - id: A25
    name: BP SOM 的 Y3 生产工厂目标
    value: "40"
    unit: count
    source: "[BP market.som 40 家工厂和 120 个付费单元；BP milestones 24–36 个月]"
  - id: A26
    name: 模型起始月度 G&A 固定成本
    value: "7"
    unit: thousandUSD
    source: "[创业财务启发式：早期 B2B SaaS G&A=$6–10K/月，涵盖法务、会计和运营工具；随生产客户数增长，Y3Q4 扩大至 $13K/月，合规和报告需求上升]"
  - id: A27
    name: Y3 年末总员工数
    value: "15"
    unit: count
    source: "[6 名创始团队+3 名 Y2 招募+6 名 Y3 招募=15；来自 BP milestones 要求 40 家工厂需要解决方案、销售和客户成功覆盖；B2B 工业 SaaS 基准 $200–400K 收入/FTE；模型 Y3 达到 $285K/FTE]"

