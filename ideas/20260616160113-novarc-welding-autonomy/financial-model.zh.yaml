scenarios:
  downside:
    description: "试点转正率降至 40%，OEM 功能蚕食将 ARPU 压缩至 $75K/工厂，Y3 限于 22 个生产工厂，需放缓招聘以保存现金。"
    y3RevenueK: 2180.0
    y3EbitdaK: -380.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
      - "试点转化率 40% vs 基准 67%"
      - "ARPU $75K vs 基准 $100K（OEM 定价压力）"
      - "Y3 工厂数 22 vs 基准 40"
      - "Y2 减少两个销售招聘以节省现金"
  base:
    description: "试点转正率 67%，每工厂 ARPU $100K，Y3 末达到 40 家工厂；仅凭 pre-seed 资金，EBITDA 盈亏平衡在 Q2Y3 实现。"
    y3RevenueK: 3425.7
    y3EbitdaK: 272.4
    cashLowPointK: 1435.6
    keyAssumptionChanges:
      - "按模型，试点转化率 67%，试点费 $55K"
      - "ARPU $100K/工厂，与 BP 定价区间一致"
      - "Y3 达 40 家工厂、120 个单元，与 BP SOM 目标匹配"
  upside:
    description: "试点转化率 80%，高级分析采用带动 ARPU 升至 $120K，Q1Y3 完成 $5M seed 融资，加速达到 50 家工厂，触及 $4.8M SOM 上限。"
    y3RevenueK: 4600.0
    y3EbitdaK: 980.0
    cashLowPointK: 1492.9
    keyAssumptionChanges:
      - "试点转化率 80% vs 基准 67%"
      - "ARPU $120K vs $100K（多工厂基准与审计模块采用）"
      - "50 家工厂、150 个单元 vs 基准 40"
      - "Q1Y3 完成 $5M seed，加速销售和解决方案招聘"

sensitivity:
  - variable: ARPU
    downsideCase: "$75K/工厂——若 OEM 捆绑基础装配检查或买家抵制按单元定价"
    baseCase: "$100K/工厂（3 个单元×$25K 加部署和分析费）"
    upsideCase: "$120K/工厂——高级多工厂基准测试和审计报告模块"
    y3RevenueImpactK: -780.0
    cashImpactK: -780.0
  - variable: churn
    downsideCase: "3%/月——若操作员在部署摩擦或救援焊接 ROI 证据不足后绕过工作流"
    baseCase: "1.5%/月（B2B 工业 SaaS，嵌入质量体系，切换成本高）"
    upsideCase: "0.8%/月——若审计轨迹集成将产品嵌入正式 AISC 和 AWS 质量记录"
    y3RevenueImpactK: -500.0
    cashImpactK: -500.0
  - variable: sales cycle
    downsideCase: "试点转化率 40%，Y3 仅 22 家工厂——若责任顾虑或内部审批延误拖慢生产上线"
    baseCase: "转化率 67%，Y3 40 家工厂，符合 BP 漏斗目标"
    upsideCase: "转化率 80%，50 家工厂——合作伙伴来源介绍缩短信任建立时间"
    y3RevenueImpactK: -800.0
    cashImpactK: -800.0
  - variable: gross margin
    downsideCase: "60%——若早期部署持续服务密集，部署模板标准化在 Y1 后停滞"
    baseCase: "Y3 实际混合毛利率 73%（高于 70% 目标），订阅收入占主导"
    upsideCase: "80%——若传感器集成自动化采集并减少每账户解决方案工程部署工时"
    y3RevenueImpactK: 0.0
    cashImpactK: -460.0
  - variable: hiring pace
    downsideCase: "Y3 末 12 名 FTE——若未完成 seed 融资；限制销售产能，拖慢工厂增长"
    baseCase: "Y3 末 15 名 FTE，由 pre-seed 和自然现金流支撑"
    upsideCase: "Y3 末 20 名 FTE——$5M seed 支持更快并行销售动作"
    y3RevenueImpactK: -400.0
    cashImpactK: 400.0
  - variable: CAC
    downsideCase: "$120K/工厂——若销售周期延长至 9 个月或合作伙伴介绍未能落地"
    baseCase: "$75K/工厂混合值（Y1 $79K，随模板优化 Y2 改善至 $75K）"
    upsideCase: "$45K/工厂——首批参考案例后 OEM 和集成商联合销售动作规模化"
    y3RevenueImpactK: 0.0
    cashImpactK: -375.0

modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Fabricators[Structural-steel fabricators\n2-6 robotic cells] --> Discovery[Discovery and\ndesign-partner]
      Discovery --> Pilot[Paid pilot\n$55K one-time]
      Pilot --> Conversion{67% convert}
      Conversion -->|yes| Production[Annual subscription\n$100K per plant per year]
      Conversion -->|no| Lost[Lost opportunity]
      Production --> GrossProfit[Gross profit\n70-77% GM by Y3]
      GrossProfit --> EBITDA[EBITDA breakeven\nQ2Y3]
      EBITDA --> Cash[Cash floor\n$1.4M Q1Y3\nno new capital needed]
