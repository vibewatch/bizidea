modelSanity:
  - checkName: 收入引擎
    finding: "混合试点加订阅模式：$55K 一次性试点费提供早期现金，每工厂 $100K/年订阅从 Y1 3 家工厂复利增长至 Y3 40 家工厂，ARR 达到 $4.0M，EBITDA 仅凭 pre-seed 资金在 Q2Y3 转正。"
  - checkName: 必须做对的事
    finding: "试点转正率必须在多样化结构钢制造商中维持在 67% 以上，因为整个 3→10→40 家工厂的增长曲线依赖付费试点转化为年度订阅，而不是停留在一次性概念验证阶段。"
  - checkName: 模型崩溃条件
    finding: "ARPU 压缩至 $75K/工厂以下——无论是因为 OEM 捆绑基础装配检查还是定价阻力迫使按席位打包——都会导致 Y3 收入减少 $780K+，EBITDA 盈亏平衡推迟至 Y4，现金降至 $900K 底线，可能需要过桥融资。"
  - checkName: 下轮融资证明
    finding: "Y2 末达到 10 个生产工厂、$1.0M ARR 并有经过验证的部署模板，证明了可复制的滩头市场经济性和 $4.8M SOM 的可信路径，为加速 10→40 家工厂冲刺的 $5M+ seed 融资提供依据。"

