    - "Q1Y3（第 27 个月）现金底线 $1.4M，仅剩 7–8 个月当期运营跑道；任何 Y3 收入未达预期或计划外支出激增都可能在 Q2Y3 现金流转正拐点前需要紧急过桥融资"
    - "结构钢滩头市场 SOM $4.8M（40 家工厂）可能对 A 轮指标而言过小，除非在 Y2 末前向重型设备或造船等邻近行业展示扩展"
    - "67% 的试点转化率是未经验证的假设；BP 淘汰标准要求 50%+，BP 漏斗目标将 50%+ 设为下限；模型对转化率下降 10 个百分点敏感（见敏感性分析第 3 行）"
    - "基准情景未建模 seed 融资；公司在 Q2Y3 有机达到 EBITDA 盈亏平衡，但若要加速至上行情景 50 家工厂并降低现金底线风险，需要 seed 融资"
