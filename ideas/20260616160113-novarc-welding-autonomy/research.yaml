  - case: OEM feature creep
    impact: If Yaskawa, FANUC, or autonomous-cell vendors bundle basic fit-up checks, the startup’s wedge compresses toward cross-cell analytics, auditability, and mixed-fleet routing rather than raw sensing alone.
