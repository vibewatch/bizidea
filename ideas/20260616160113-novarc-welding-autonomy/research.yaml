openQuestions:
- Will large structural-steel fabricators accept one more station-side workflow step if it saves downstream rescue welding, or must nearly all input capture be automated?
- What is the minimum sensor package—manual gauges, photos, laser gap measurement, or full scan—that predicts autonomous-weld readiness accurately on the first joint family?
- Do OEMs and integrators want a neutral preflight layer as a partner product, or will they treat it as near-term feature creep?
- How much beachhead demand sits in dedicated data-center suppliers versus general structural shops with mixed commercial backlog?
