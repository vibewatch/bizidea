competitors:
- name: Novarc
  stage: scale-up
  wedge: Adaptive robotic welding and AI autonomy around the welding cell via SWR and NovAI.
  pricing: Custom quote / system sale; no public list price.
  strength: Deep welding-domain credibility and clear product focus on autonomy, productivity, and enterprise welding intelligence.
  weaknessVsUs: Center of gravity is still in-cell execution; the proposed startup is earlier in the workflow and can stay OEM-neutral across mixed fleets.
  sourceRefs:
  - 1
  - 31
  - 32
- name: Path Robotics
  stage: scale-up
  wedge: Intelligent welding cells and physical-AI autonomy for large or variable weldments, with RaaS-style commercial framing.
  pricing: RaaS / quote-based commercial model.
  strength: Strong autonomy brand and credible traction in mining, shipbuilding, and heavy manufacturing use cases.
  weaknessVsUs: Path wins by owning the cell, while the proposed startup can win by qualifying work before it reaches any brand of cell.
  sourceRefs:
  - 12
  - 13
  - 14
  - 33
- name: Hirebotics
  stage: scale-up
  wedge: Easy-deploy cobot welding plus Beacon cloud software, ROI tools, and app-first programming.
  pricing: Calculator-led / demo-led pricing with ROI and break-even framing rather than public list price.
  strength: Simple deployment, fast programming, and strong resonance with shops that want automation without traditional robot complexity.
  weaknessVsUs: Optimized for easy repetitive welding, not for structural-steel-specific fit-up qualification and cross-cell exception routing.
  sourceRefs:
  - 15
  - 17
  - 18
  - 20
  - 34
- name: Yaskawa Motoman
  stage: incumbent
  wedge: Robots, pre-engineered ArcWorld cells, seam-finding accessories, and integrator/training ecosystem.
  pricing: Quote-based OEM and integrator sale.
  strength: Installed base, partner channel, welding know-how, and broad industrial credibility.
  weaknessVsUs: Yaskawa helps the cell perform; it does not own the OEM-neutral readiness decision for whether the joint should enter the cell at all.
  sourceRefs:
  - 21
  - 22
  - 23
- name: FANUC America
  stage: incumbent
  wedge: Welding cobots, vision, monitoring, and broader automation ecosystem for fabricators.
  pricing: Quote-based OEM and integrator model.
  strength: Broad automation footprint, sensing options, and productivity tooling.
  weaknessVsUs: Generic automation stack and productivity layer rather than a fit-up-readiness and routing workflow.
  sourceRefs:
  - 24
  - 25
  - 30
