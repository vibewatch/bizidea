  validationPlan:
  - priority: high
    question: How much operator input can a fit-up station tolerate before the workflow is ignored?
    evidenceToGather: Shadow one robotic structural-steel line and time current fit-up checks, rework loops, and station staffing by shift.
  - priority: high
    question: What minimum sensing package predicts auto-weld readiness on the first joint family?
    evidenceToGather: Run a pilot on one beam or bracket family using manual gap/tack capture, photos, and one low-cost sensor option, then compare prediction accuracy with downstream weld outcomes.
  - priority: medium
    question: Will OEMs and integrators partner or see the product as feature creep?
    evidenceToGather: Test co-sell interest with two integrators and one OEM partner already active in job-shop or structural-steel welding cells.
