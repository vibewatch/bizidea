slug: weld-fitup-preflight
date: '2026-06-16'
executiveSummary: >-
  Weld Fit-up Preflight 应从一个面向北美结构钢制造商的 OEM 中立决策层起步——这些制造商已在重复性数据中心和模块化组件上运行机器人焊接单元，但仍靠主管判断处理临界接头。核心痛点不在于如何编程机器人，而在于弧焊开始前判断一个存在间隙漂移、点焊偏差或轻微错位的真实接头是否适合自动焊接、需要少量预处理步骤，还是应绕过单元。首个产品应在装配工位采集最小测量值和照片包，对特定接头类型下特定机器人-夹具-焊接程序组合的就绪度进行评分，并创建与下游质量结果绑定的可审计分流记录。第一批买家应是拥有 200–1,000 名员工、2–6 个机器人单元、承接梁、支架或底板组件重复工作的制造商的运营副总裁或焊接自动化总监。定价应锚定活跃机器人焊接单元数量加接头类型资质认定部署费，因为买家已习惯用开机率、返工、打磨和劳动力成本而非席位数来评估自动化价值。核心战略选择是在拓展至更重的制造类别或 OEM 已在追求的单元内执行功能之前，先在结构钢领域赢得一个窄幅的上游工作流。市场证据在痛点、买家触发和邻近竞争方面较强，但在可接受的操作员输入负担和能预测下游缺陷的精确就绪度阈值上仍偏弱。公司应将前 12–18 个月视为工作流采用、混合机群兼容性和试点转正率的验证期，而不是假设这一品类已经存在。
problem:
  - 结构钢工厂现在已能购置自适应焊接单元，但在装配工位，他们仍靠经验规则、手动量规和目视判断决定机器人就绪、预处理还是人工分流。
  - 一次错误的分流决策会带来高成本的下游连锁反应，包括过焊、打磨、废料、人工救援，以及对机器人焊接 ROI 的信任降低。
solution:
  - 构建一个焊前资质认定层，采集间隙和点焊测量值、照片、接头规格和历史单元结果，以判断给定组件是否落在自主焊接的经过验证的工艺窗口内。
  - 在单元消耗时间之前，推荐最小纠正动作（如重新点焊、垫片调整、打磨或人工分流），然后存储关联实际接头状态、分流选择和质量结果的可追溯记录。
whyWeWin:
  - 产品拥有 OEM 软件和焊接监控工具通常不跨混合机群拥有的上游"放行/拒焊"分流决策。
  - 若能积累跨项目的接头状态、预处理动作、分流路径和焊接结果数据集，就能构建内部规则手册和单单元供应商所没有的工艺窗口库和审计轨迹。
strategicChoices:
  beachhead: 北美结构钢制造商中用于超大规模数据中心外壳和模块化建造项目的重复性柱梁连接、底板和支架组件。
  wedgeRationale: 这一切片的购买触发器最清晰——新单元上线和明显的废料激增已迫使工厂管理层为机器人 ROI 辩护，而接头类型重复频率足以让软件比在定制工厂中学得更快。
  sequencingRationale: 从一个接头类型、一个装配工位和只读审计轨迹起步，因为客户首先需要证明采集摩擦低且建议能改善首次良品率；只有这一证明成立后，才应增加更深的传感集成、多单元推广和邻近行业扩展。
  notYet:
    - 结构钢参考案例存在之前进入重型设备、矿业、农业和造船账户
    - 单元内闭环机器人执行或焊接路径生成
    - 将全 3D 扫描硬件包作为默认部署模式
    - 几何形状高度定制且夹具纪律薄弱的小型工厂
market:
  tam: "$240.0M——估算 TAM：北美约 2,000 家有合理机器人焊接预检需求的重型制造工厂，每家 3 个合格单元，每个活跃单元年度 ACV 约 $40K。"
  sam: "$40.0M——估算 SAM：滩头市场中约 400 家结构钢、数据中心和模块化聚焦型制造商，每家约 2.5 个单元，年度 ACV 约 $40K。"
  som: "$4.8M——估算第三年 SOM：40 家工厂、120 个付费单元，前提是单一接头类型试点通过 OEM 和集成商关系转化并扩展。"
  segments:
    - 在数据中心和模块化项目上运行重复性机器人焊接的北美结构钢制造商
    - 具有类似装配偏差和机器人单元利用率压力的邻近重型制造工厂
  buyingProcess: >-
    采购流程始于制造商上线新自适应焊接单元，或在重复性组件系列上看到明显的打磨、废料或人工救援激增。日常推动者是焊接工程经理和质量负责人，经济审批通常在试点证明开机率、首次良品率和可追溯性收益且不干扰现有单元软件后，由运营副总裁、工厂经理或焊接自动化总监拍板。
product:
  mvp: >-
    MVP 是针对单一重复接头类型的装配工位工作流。它采集最小测量值、照片、点焊位置和零件元数据，对特定机器人-夹具-焊接程序组合进行就绪度评分，在需要时推荐预处理或人工分流，并记录每个决策及人工确认。
  sixMonth: 签约 2–3 个共创客户，交付每接头采集不超过一分钟的规则型就绪度评分，并在一个实际组件系列上证明人工救援或打磨的可量化减少。
  twelveMonth: 增加摩擦最低的传感器和单元数据集成，将成功试点转化为 2–4 个付费生产部署，并标准化部署模板，使新账户无需每次定制工程。
  twentyFourMonth: 通过增加组合基准测试、多工厂工艺窗口库和向同样具有重复接头类型的邻近重型制造行业扩展，成为结构钢机器人焊接的混合机群预检系统级记录平台。
  keyBets:
    - 最小测量值加照片包在无需昂贵传感硬件之前，足以准确预测分流决策。
    - 如果能可靠地减少下游救援焊接并提供可审计证据，工厂会接受多一道上游工作流步骤。
    - 混合机群 OEM 中立性对买家的价值高于更紧密但单一供应商的集成。
    - 结构钢部署可被模板化到足以在早期试点后维持软件级毛利率的程度。
gtm:
  wedge: 围绕实际机器人开机率问题，在一个重复性组件系列上销售付费试点，将其定位为焊接单元的预检保险而非泛化 AI 自动化，以更少打磨、更少人工救援和更好的首次良品率定义成功。
  channels:
    - 创始人向目标制造商的运营副总裁、焊接自动化负责人和焊接工程经理直接销售
    - OEM、集成商和单元建造商介绍，面向上线或扩展机器人焊接的混合机群账户
    - 能降低装配工位采集摩擦的视觉、测量和焊缝跟踪合作伙伴
  funnelTargets: "目标：发现→现场工作流调研 40%+，调研→付费试点 25–35%，付费试点→年度生产 50%+，生产账户→12 个月内扩展至第二个单元或第二家工厂的比例在 50%+ 的成功账户中实现。"
  pricing: 每个活跃机器人焊接单元年度订阅费，加按合格接头类型和装配工位数量定价的部署费；这与买家已有的机器人 ROI 建模方式匹配，支持从 $35K–$75K 付费试点到 2–4 个单元初始部署加部署费约 $80K–$160K 年度生产 ACV 的可信路径。
businessModel:
  revenueStreams:
    - 每个活跃机器人焊接单元的年度软件订阅费
    - 接头类型资质认定、装配工作流设置和工艺窗口验证的付费部署与校准费
    - 多工厂基准测试、可追溯性报告和混合机群分流洞察的高级分析服务
  unitOfValue: 通过预检工作流管理的活跃机器人焊接单元和合格接头类型数量。
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一工厂内从单一接头类型扩展至更多组件
    - 在同一制造商内从单一工厂扩展至多工厂标准化
    - 在结构钢验证后增加邻近重型制造行业及高级审计或基准模块
strategyMap:
  northStarMetric: 通过平台分流的自主焊接接头中，无需人工救援即达到首次验收的数量。
  inputMetrics:
    - 装配工位每个接头的采集时间
    - 焊接工程或质量负责人的建议接受率
    - 目标接头类型的人工救援和打磨工时
    - 试点转正率
    - 从首个单元扩展至更多单元或工厂的生产账户数
  moatsToBuild:
    - 跨客户积累的接头级数据集，关联实际状态、预处理动作、分流选择和下游焊接质量
    - 将装配状态转化为跨混合机群分流决策的 OEM 中立工艺窗口库
    - 在 AISC 和 AWS 监管制造环境的质量工作流中内嵌可审计性
  killCriteria:
    - 专注滩头市场销售 12 个月内付费试点不足 3 个
    - 没有一个试点在上线 90 天内在目标系列上实现人工救援或打磨工时至少 15% 的减少
    - 操作员每接头中位采集时间无法在不绕过工作流的情况下控制在 60 秒以内
    - 付费试点转正率不足 50%，因为买家将产品视为非必要或功能蚕食
  mermaid: |
    flowchart LR
      Wedge[Structural steel preflight wedge] --> MVP[Fit-up station MVP]
      MVP --> Proof[Lower rescue welding and auditable routing]
      Proof --> Expansion[More cells plants and adjacent heavy fabrication]
investorMemo:
  verdict:
    call: 观察
    conviction: 痛点强烈、工作流切入口可信，但在公司证明低摩擦工位采用和混合机群工厂的试点转化之前，信念上限受限。
    whyBelieve: 买家已为废料削减、开机率和可追溯性付费，而且没有现有厂商明确拥有跨多机器人技术栈的 OEM 中立焊前就绪决策。
    whyDoubt: 如果产品需要过多手动采集，或 OEM 将足够好的分流功能捆绑进自有技术栈，公司可能沦为服务密集型功能，而非持久平台。
    nextDiligence: 看到一个付费结构钢试点证明低摩擦工作流采用、人工救援或打磨至少减少 15%，以及向基于单元的年度订阅收入的可信转化路径。
  firstCustomer:
    title: 结构钢机器人焊接项目负责人
    profile: 拥有 200–1,000 名员工的北美制造商，2–6 个机器人焊接单元，重复性梁或支架组件，以及让停机代价高昂的活跃数据中心或模块化订单积压。
    trigger: 新自适应焊接单元上线，或重复性组件系列出现明显返工和废料激增。
    buyer: 运营副总裁或焊接自动化总监
    initialContract: "$35K–$75K 付费试点，针对一个接头类型和一个装配工位，若首次良品率和救援焊接指标改善，则转化为 2–4 个活跃单元加部署费约 $80K–$160K 年度订阅。"
  mustBeTrue:
    - 至少 5 家目标制造商确认，焊前就绪度分流是一个独立于通用机器人编程或焊后检测、值得预算的问题。
    - 最小测量值加照片工作流在首个目标接头类型上，与焊接工程审阅者的分流决策一致率至少达到 80%。
    - 操作员每接头采集时间能控制在 60 秒以内，或自动传感能替代慢速步骤而不破坏试点经济性。
    - 至少半数付费试点在试点完成 6 个月内转化为覆盖 2 个以上单元的年度生产部署。
    - OEM 和集成商允许足够的数据访问和渠道合作，使公司保持混合机群定位而不被锁定在单一供应商技术栈内。
  diligenceQuestions:
    - 在第一个账户中，哪个 KPI 最快解锁预算——机器人开机率、打磨减少、废料减少还是可追溯性？
    - 真实工厂中首批目标接头类型的重复程度如何，可预测的分流工作占比有多少，足以让软件快速学习？
    - 哪种最小传感方案能在不让装配工位变慢的情况下产生可信的就绪度评分？
    - OEM 和集成商会联合销售中立预检层、忽略它，还是主动视其为功能蚕食？
    - 结构钢滩头市场单独能否支撑足够大的早期公司，还是必须更早启动邻近重型制造扩展？
operatingAssumptions:
  - assumption: 服务数据中心和模块化工作的结构钢制造商感受到足够的工期和质量压力，会在邻近行业之前采用专用预检层。
    basis: research.yaml
    validationTest: 完成 10 次发现对话和 3 个付费试点，购买触发器为实际单元上线或重复性组件上可量化的废料和返工痛点。
    decisionImpact: 若不成立，公司应在扩大销售团队前测试重型设备或造船等不同滩头市场。
  - assumption: 手动测量值加照片采集足以支撑首个生产级评分模型。
    basis: idea.yaml
    validationTest: 在 3 个共创客户数据集上，与焊接工程审阅者的分流决策一致率至少达到 80%，并在一个实际系列上实现可量化的下游救援减少。
    decisionImpact: 若不成立，产品必须捆绑更多传感，部署成本上升，可能迫使更窄的账户筛选。
  - assumption: 买家会接受基于单元数量加接头类型资质认定部署费的定价。
    basis: idea.yaml
    validationTest: 在前 5 次定价讨论中，至少获得 2 份意向书或付费试点，使用此结构而无需强制切换到按席位或纯服务定价。
    decisionImpact: 若不成立，收入扩张不够顺畅，公司可能需要工厂级订阅或服务主导的打包方式。
  - assumption: OEM 中立定位在战略上足够有价值，集成商和客户更青睐它而非单一供应商工具。
    basis: research.yaml
    validationTest: 通过集成商或 OEM 介绍产生至少 2 个合格试点机会，并确认至少一个混合机群客户将中立性视为购买理由。
    decisionImpact: 若不成立，公司应先专注一个主导生态系统，接受更窄但更快的集成路线图。
  - assumption: 早期部署可以足够标准化，在前几个试点后达到软件级毛利率。
    basis: operator judgment
    validationTest: 到第五次付费部署时，相比前两次部署，每个账户的实施工时减少至少 30%，同时维持目标结果指标。
    decisionImpact: 若不成立，公司应提高部署费定价、进一步缩窄产品范围，或接受较低毛利的部署模式。
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: 访谈 15 位结构钢焊接负责人，在机器人生产线上跟踪至少 3 个装配工位。
    hypothesis: 最强购买触发器是重复性组件系列上的实际机器人开机率或废料事件，而非对焊接 AI 的泛化兴趣。
    successMetric: 10 个目标账户确认具名触发器、当前分流工作流、预算负责人和救援焊接或打磨的基线 KPI。
    owner: CEO
  - horizon: "0–90 天"
    experiment: 为一个接头类型构建手动采集原型，使用间隙测量值、点焊位置输入和照片。
    hypothesis: 最小采集包在无需硬件集成之前，足以支持有效的"放行/拒焊"分流建议。
    successMetric: 在 2 个共创客户数据集上，对历史分流决策的审阅者一致率达到 80% 以上。
    owner: Founding eng
  - horizon: "90–180 天"
    experiment: 在实际结构钢生产线上运行 2 个付费试点，每个试点对应一个装配工位和一个目标组件系列。
    hypothesis: 预检分流可以在不降低吞吐量的情况下，将人工救援或打磨工时减少至少 15%。
    successMetric: 签约 2 个试点，且至少 1 个试点在将每接头中位采集时间控制在 60 秒以内的同时，达到救援或打磨减少目标。
    owner: CEO
  - horizon: "90–180 天"
    experiment: 测试直接销售与集成商主导和 OEM 推荐的试点来源模式。
    hypothesis: 合作伙伴主导的方式能缩短工业买家的信任建立时间并提高成交率。
    successMetric: 1 个合作伙伴来源的试点比直接方式成交至少快 25%，或以更低的创始人时间实现更高成交率。
    owner: GTM lead
  - horizon: "6–12 个月"
    experiment: 增加一个低摩擦传感器或单元数据集成，并将成功试点从一个接头类型扩展至第二个接头类型或第二个单元。
    hypothesis: 轻量集成能充分提升准确性和粘性，证明生产转化和多单元扩展合理。
    successMetric: 2 个生产账户采用集成工作流并扩展至初始试点范围之外。
    owner: Solutions engineer
  - horizon: "12–18 个月"
    experiment: 为早期生产客户推出跨账户工艺窗口基准测试和审计报告模块。
    hypothesis: 基准测试和可审计性比单纯评分更能提升续约率并强化护城河。
    successMetric: 前 3 个生产账户在运营回顾或续约讨论中使用季度基准或审计输出。
    owner: Product lead
operations:
  - 在推广前，为每个试点建立人工救援事件、打磨工时、首次良品率和机器人开机率的基线。
  - 在早期部署中保持只读和人工审批及分流覆盖，使软件符合现有 AWS 和 AISC 质量工作流。
  - 围绕最小操作员负担设计装配工作流，并记录每次绕过、覆盖和数据缺失情况。
  - 在招募大型现场团队之前，为常见机器人、传感器和质量检测环境标准化导出连接器和实施手册。
  - 在试点期间与焊接工程和质量负责人每周联合回顾，快速调整工艺窗口并捕获失效模式。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 构建评分引擎、数据模型和定义切入口的装配采集工作流。
  - role: 创始销售负责人
    startTiming: Month 0
    rationale: 负责共创客户发现、试点销售和转化为年度生产合同。
  - role: 焊接领域与产品负责人
    startTiming: Month 0
    rationale: 将结构钢装配规则、审计需求和部署成功指标转化为客户信任的产品逻辑。
  - role: 解决方案与现场工程师
    startTiming: Month 3
    rationale: 负责工厂推广、KPI 基线建立以及轻量 OEM 和传感器集成，确保试点可复制。
  - role: 计算机视觉/工业数据工程师
    startTiming: Month 6
    rationale: 在工作流验证后，通过传感器和图像管道减少手动采集负担并提升分流准确性。
  - role: 合作伙伴与客户成功负责人
    startTiming: Month 9
    rationale: 将早期集成商和 OEM 关系转化为渠道杠杆，并管理多单元扩展。
milestones:
  - horizon: "0–12 个月"
    items:
      - 签约 2–3 个共创客户，在结构钢滩头市场完成至少 3 个付费试点。
      - 证明每接头中位采集时间低于 60 秒，且至少一个试点实现人工救援或打磨工时减少 15% 或以上。
      - 将前 2 个试点转化为覆盖多个单元的年度生产合同，并标准化部署模板。
  - horizon: "12–24 个月"
    items:
      - 通过直销和合作伙伴来源账户组合，达到 8–12 个生产工厂、20–30 个付费单元。
      - 将低传感器负担集成、跨账户工艺窗口分析和可审计报告作为标准产品模块交付。
      - 在重型设备、矿业、农业或造船领域建立至少一个邻近行业共创客户，同时不稀释结构钢核心。
  - horizon: "24–36 个月"
    items:
      - 达到研究验证的第三年 SOM 目标，约 40 家工厂和 120 个付费单元。
      - 使多工厂扩展和基准续约成为成功账户内的默认增长方式。
      - 决定是继续作为中立预检控制层，还是深入拓展至邻近焊接质量和生产分流工作流。
risks:
  - risk: 装配工位数据采集增加的摩擦使操作员绕过工作流。
    likelihood: High
    impact: High
    mitigation: 从最小可行采集包起步，从第一天起测量每接头时间，仅在一个接头类型证明 ROI 后才优先考虑自动化。
  - risk: 机器人 OEM 或自主单元供应商将足够好的就绪检查添加到自有技术栈中。
    likelihood: Medium
    impact: High
    mitigation: 保持 OEM 中立，赢得混合机群账户，并将跨单元可审计性和工艺窗口基准测试作为核心差异化因素。
  - risk: 夹具纪律不足和极端零件变异性压垮软件建议。
    likelihood: High
    impact: High
    mitigation: 首先瞄准重复性系列，在试点筛选中要求基本工艺纪律，并将产品定位为决策辅助而非魔术自动化。
  - risk: 结构钢滩头市场是真实的，但在没有快速邻近扩展的情况下过于狭窄，无法支撑风险投资回报。
    likelihood: Medium
    impact: High
    mitigation: 仅将结构钢作为验证切入口，并在饱和初始细分市场之前排好重型制造邻近行业共创客户队列。
  - risk: 质量和责任担忧在试点 KPI 表现良好时仍拖慢生产转化。
    likelihood: Medium
    impact: Medium
    mitigation: 维持人工审批、可审计的规则逻辑和客户特定的审查工作流，直到产品嵌入正式质量体系。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 资助 18 个月，用于签约共创客户、运行 3–5 个付费试点、转化首批生产账户、构建核心评分和审计产品、增加轻量传感器和 OEM 集成，以及招募证明可复制结构钢切入口所需的领域、现场和 GTM 团队。
