topRisks:
  - name: OEM feature creep
    description: Robotic welding vendors may add basic fit-up checks or routing rules into their own software stacks.
    mitigation: Start as the cross-cell system of record for readiness decisions and quality outcomes, then integrate with multiple OEMs so customers keep value even in mixed fleets.
  - name: Data capture friction
    description: If operators must enter too much information manually at fit-up stations, usage will drop and recommendations will be ignored.
    mitigation: Launch with minimal required measurements and lightweight photo capture, then automate more inputs through vision or metrology integrations after proving ROI.
  - name: Too little repetition at small shops
    description: Fabricators with highly bespoke one-off jobs may not have enough repeated geometry to justify dedicated preflight software.
    mitigation: Target shops with repeat structural programs for data centres, racks, or modular components where the same joint families recur at meaningful volume.
