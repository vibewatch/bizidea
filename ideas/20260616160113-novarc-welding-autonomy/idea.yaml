problem: >-
  Structural-steel fabricators can now buy adaptive welding cells, but the
  robot still inherits the chaos of upstream fit-up: gaps drift, tacks land in
  different spots, and assemblies arrive with just enough variation to create
  scrap or force manual rework. Before a beam, bracket, or node assembly enters
  the cell, supervisors still rely on tribal rules, tape measures, and visual
  judgment to decide whether to weld it robotically, prep it further, or kick
  it to a manual booth. That decision is where throughput is lost, because one
  bad call creates overwelding, grinding, schedule slips, and low trust in the
  automation program.
targetUser:
  primary: >-
    Welding engineering managers at North American structural-steel fabricators
    running robotic cells for repetitive beam, plate, and bracket assemblies in
    data-center and modular-construction programs
  secondary: >-
    Quality managers and shop supervisors responsible for first-pass yield and
    weld traceability on heavy-fabrication lines
  buyer: >-
    VP of operations or director of welding automation at a multi-line
    structural-steel fabricator
startupThesis:
  nonObviousInsight: >-
    Adaptive welding does not eliminate variability; it raises the value of the
    decision made one step earlier about whether a given joint is actually ready
    for autonomous welding. As OEMs productize AI inside the cell, the new
    control point shifts upstream to software that can classify fit-up
    readiness, prescribe prep work, and feed robots only the joints that fall
    inside a proven process window.
  beachhead: >-
    Pre-weld qualification for repetitive beam-to-column, base-plate, and
    bracket assemblies at North American structural-steel fabricators serving
    hyperscale data-center shells and modular-construction projects
  wedge: >-
    A weld preflight layer that ingests gap and tack measurements, photos or
    scans, joint specs, and prior cell outcomes to decide auto-weld versus
    prep-versus-manual routing before the assembly reaches the robot
  whyNowCatalyst: >-
    Novarc and Yaskawa are productizing adaptive welding intelligence around the
    exact pain of fit-up variation, which makes upstream joint-readiness
    software newly urgent because more shops can now automate if they can trust
    the handoff into the cell.
  ventureScalePath: >-
    Start with structural steel where repetitive weld geometry and schedule
    pressure are acute, then expand into heavy equipment, mining, agriculture,
    and modular fabrication as the system of record for adaptive joining,
    quality routing, and scrap-aware production decisions across robotic weld
    fleets.
solution: >-
  The product sits at the fit-up station before the robotic welding cell. It
  captures joint measurements, images, tack locations, part metadata, and job
  requirements, then scores whether that assembly falls within a validated
  process window for a given robot, fixture, and weld program. If the job is
  borderline, the software recommends the smallest prep action needed such as
  re-tacking, shimming, grinding, or manual routing, instead of letting the
  cell discover the problem expensively mid-weld. Each decision generates a
  traceable record linking as-built joint condition, route taken, and resulting
  quality outcome, so plants can learn which upstream conditions actually cause
  scrap. Over time the system becomes the decision layer that keeps adaptive
  cells fed with winnable work rather than just recording failures after they
  happen.
