differentiator: >-
  Robot OEM software decides how to execute a weld once the job is already in
  the cell, and weld-monitoring tools usually explain defects after the fact.
  This product owns the earlier routing decision: is the joint ready for
  autonomous welding, what prep action will make it ready, and when should it
  bypass the cell entirely. Its defensibility comes from the cross-program
  dataset linking fit-up conditions to actual weld outcomes, which compounds
  faster than any one fabricator's tribal playbook or an OEM's single-cell
  telemetry.
