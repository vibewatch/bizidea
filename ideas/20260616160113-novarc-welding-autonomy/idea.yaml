jobsToBeDone:
  - job: >-
      When a structural-steel assembly reaches fit-up with variable gaps or
      tack placement, help a welding engineering manager decide whether it can
      be welded autonomously or needs prep first, so the robot cell stays
      productive without creating scrap.
    currentAlternative: Supervisor judgment with manual gauges and local routing rules
    successMetric: First-pass yield and robot uptime on the targeted assembly family
  - job: >-
      When plant leaders question why robotic welding still needs manual rescue,
      help a quality manager trace which joint conditions caused reroutes,
      grinding, or defects, so the team can improve upstream preparation
      instead of blaming the cell.
    currentAlternative: Spreadsheet defect logs and post-shift root-cause meetings
    successMetric: Reduction in scrap, grinding hours, and manual rework per weld program
