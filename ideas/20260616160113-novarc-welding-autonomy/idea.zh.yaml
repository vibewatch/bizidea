problem: >-
  结构钢制造商现在已能购置自适应焊接单元，但机器人依然要继承上游装配的混乱：间隙漂移、点焊位置各异，组件到位时的偏差恰好多到足以产生废料或迫使人工返工。在梁、支架或节点组件进入焊接单元之前，主管仍靠经验规则、卷尺和目视判断来决定机器人焊、预处理还是转到人工台位——这个决策正是吞吐量流失的地方，因为一次错判就会带来过焊、打磨、工期延误和对自动化项目的不信任。
targetUser:
  primary: >-
    北美结构钢制造商的焊接工程经理，所在工厂为数据中心和模块化建造项目运行重复性梁、板和支架组件的机器人焊接单元
  secondary: >-
    负责重型制造流水线首次良品率和焊缝可追溯性的质量经理与车间主管
  buyer: >-
    多线结构钢制造商的运营副总裁或焊接自动化总监
startupThesis:
  nonObviousInsight: >-
    自适应焊接并不消除变异性，它提升了更早一步决策的价值——判断某个接头是否真的为自主焊接做好了准备。随着 OEM 厂商将 AI 产品化并内置到焊接单元，新的控制点上移到软件层：对装配就绪度进行分类、指定预处理动作，并只将落在经过验证的工艺窗口内的接头送入机器人。
  beachhead: >-
    北美结构钢制造商中用于超大规模数据中心外壳和模块化建造项目的重复性柱梁连接、底板和支架组件的焊前资质认定
  wedge: >-
    一个焊接预检层：摄入间隙和点焊测量值、照片或扫描件、接头规格及历史单元输出，在组件到达机器人之前判断自动焊接、预处理还是人工分流
  whyNowCatalyst: >-
    Novarc 和 Yaskawa 正围绕装配偏差这一精准痛点将自适应焊接智能产品化，这使上游接头就绪度软件变得迫切——更多工厂只要能信任移交入单元的质量，就可以实现自动化。
  ventureScalePath: >-
    从重复焊接几何形状和工期压力最为突出的结构钢起步，再扩展至重型设备、矿业、农业和模块化制造，成为跨机器人焊接机群的自适应连接、质量分流和废料感知生产决策的系统级记录平台。
solution: >-
  产品驻留在机器人焊接单元之前的装配工位。它采集接头测量值、图像、点焊位置、零件元数据和作业要求，然后对该组件是否落在特定机器人、夹具和焊接程序的经过验证的工艺窗口内进行评分。如果作业处于临界状态，软件会推荐所需的最小预处理动作——例如重新点焊、垫片调整、打磨或人工分流——而不是让单元在焊接中途高成本地发现问题。每次决策都会生成可追溯记录，关联实际接头状态、所走路径和最终质量结果，从而让工厂了解哪些上游条件真正导致了废料。随着时间推移，系统成为保持自适应单元持续获得可焊接工件的决策层，而不仅仅是事后记录失败。
goToMarketSeed:
  firstCustomer: >-
    拥有 200–1,000 名员工、1–3 家工厂、2–6 个机器人焊接单元的北美结构钢制造商，在数据中心、机架或模块化建筑组件上有重复性工作，装配偏差经常导致打磨或人工救援
  buyingTrigger: >-
    新自适应焊接单元上线，或高吞吐量组件系列出现明显废料和返工激增，令工厂管理层对机器人 ROI 产生质疑
  currentAlternative: >-
    主管判断、手动量规、工位记录、OEM 单元设置，以及将临界接头保守地分流至熟练人工焊工
  switchingReason: >-
    该切入口通过在单元触碰工件之前捕获不良装配件来提升机器人开机率和首次良品率，同时生成制造商用以证明自动化正在降低而非隐藏质量风险所需的可追溯数据
  pricingHypothesis: >-
    按活跃机器人焊接单元数量收取年度订阅费，加上按认定接头类型和装配工位数量定价的部署费
whyNow:
  - point: >-
      自适应焊接已从小众机器人承诺转变为产品化工作流，这意味着更多制造商很快将需要围绕单元的软件，而不是又一个定制集成项目。
    signalRefs: [自适应焊接正在演变为产品化工作流]
    sourceRefs: [2]
  - point: >-
      错位、点焊和装配偏差被明确点名为废料和返工的根本原因，因此现在有一个具体的上游工作流可以产品化，而不是模糊的"焊接 AI"概念。
    signalRefs: [接头变形已被明确列为生产瓶颈]
    sourceRefs: [1, 2]
  - point: >-
      买家已将价值量化为减少返工、打磨和废料，这为新供应商提供了与吞吐量和利润率挂钩的可衡量 ROI 叙事。
    signalRefs: [买家为减少废料与打磨付费]
    sourceRefs: [1, 3]
  - point: >-
      可追溯性正在融入焊接技术栈本身，因此记录每个接头为何被自动焊接、预处理或重新分流的决策层与市场方向吻合。
    signalRefs: [可追溯性正在融入焊接技术栈]
    sourceRefs: [2, 3]
  - point: >-
      结构钢、数据中心和模块化建造已被点名为目标行业，为创业公司提供了一个具有重复几何形状和紧迫交付工期的窄幅首批客户群。
    signalRefs: [结构钢与模块化制造是明确的滩头市场]
    sourceRefs: [1]
differentiator: >-
  机器人 OEM 软件在作业已进入单元后决定如何执行焊接，焊接监控工具通常在事后解释缺陷。本产品拥有更早的分流决策：接头是否为自主焊接做好了准备、哪种预处理动作能让它就绪，以及何时应完全绕过单元。其防御性来自跨项目数据集——将装配状态与实际焊接结果关联起来——这比任何单一制造商的经验规则或 OEM 的单单元遥测积累得更快。
conceptDiagram:
