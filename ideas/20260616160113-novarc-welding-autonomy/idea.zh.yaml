topRisks:
  - name: OEM 功能蚕食
    description: 机器人焊接厂商可能将基础装配检查或分流规则内置到自有软件中。
    mitigation: 从跨单元就绪决策和质量结果的系统级记录开始，与多家 OEM 集成，让客户即便在混合机群中也能保留价值。
  - name: 数据采集摩擦
    description: 如果操作员在装配工位需要手动输入过多信息，使用率将下降，建议也会被忽略。
    mitigation: 以最少必要测量值和轻量照片采集起步，在一个接头类型证明 ROI 后再通过视觉或测量集成自动化更多输入。
  - name: 小型工厂重复性不足
    description: 以高度定制一次性作业为主的制造商可能没有足够的重复几何形状来支撑专用预检软件。
    mitigation: 瞄准为数据中心、机架或模块化组件承接重复性结构项目的工厂，这些工厂的同类接头以有意义的量重复出现。
