  customerSegments:
    - 运行重复性机器人焊接的北美结构钢制造商
    - 模块化建造零部件制造商
    - 规模化扩展机器人焊接单元的重型制造工厂
  valuePropositions:
    - 在接头产生高成本机器人焊接失败之前完成资质认定
    - 提前分流预处理工作，减少打磨、废料和人工救援
    - 为焊接自动化决策和结果建立可追溯证据
  channels:
    - 直接向焊接自动化和运营负责人销售
    - 与机器人焊接 OEM 厂商和集成商合作
    - 绑定新单元上线或废料削减项目开展试点部署
  customerRelationships:
    - 针对单一组件系列的高触达推广
    - 向更多接头类型和工厂扩展
    - 与工厂管理层定期进行良品率和废料回顾
  revenueStreams:
    - 每个机器人焊接单元的年度软件订阅费
    - 接头类型资质认定的部署费
    - 多工厂分流路由和良品率基准的高级分析服务
  keyResources:
    - 接头就绪度评分模型和规则引擎
    - 关联装配状态与焊接结果的数据集
    - 单元遥测、质量记录和车间现场采集集成
  keyActivities:
    - 采集装配测量值和图像
    - 对自主焊接就绪度和预处理动作进行评分
    - 打通分流决策与质量结果之间的闭环
  keyPartners:
    - 机器人焊接 OEM 厂商
    - 系统集成商
    - 测量、视觉和质量检测设备供应商
  costStructure:
    - 产品与工业集成工程
    - 现场部署与客户成功
    - 面向制造业的销售与合作伙伴赋能
jobsToBeDone:
  - job: >-
      当结构钢组件以不均匀间隙或点焊位置到达装配工位时，帮助焊接工程经理判断能否自主焊接或需要先预处理，从而让机器人单元保持高效运转而不产生废料。
    currentAlternative: 主管以手动量规和本地分流规则进行判断
    successMetric: 目标组件系列的首次良品率和机器人开机率
  - job: >-
      当工厂管理层质疑为何机器人焊接还需要人工救援时，帮助质量经理追溯哪些接头状态导致了重新分流、打磨或缺陷，从而让团队改善上游预处理而不是将问题归咎于单元。
    currentAlternative: 电子表格缺陷日志和班后根因分析会
    successMetric: 每个焊接项目的废料、打磨工时和人工返工减少量
