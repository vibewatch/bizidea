slug: weld-fitup-preflight
date: '2026-06-16'
executiveSummary: >-
  Weld Fit-up Preflight should start as an OEM-neutral decision layer for North
  American structural-steel fabricators that already run robotic welding cells
  on repetitive data-center and modular assemblies but still route borderline
  joints through supervisor judgment. The urgent pain is not programming the
  robot; it is deciding, before arc start, whether a real joint with gap drift,
  tack variation, or light misalignment is safe to auto-weld, needs a small
  prep step, or should bypass the cell. The first product should capture a
  minimum measurement-and-photo package at the fit-up station, score readiness
  against a validated process window for a specific joint family, and create an
  auditable route record tied to downstream quality outcomes. The first buyer
  should be a VP of operations or director of welding automation at a
  200-1,000 employee fabricator with 2-6 robotic cells and repeat work on
  beam, bracket, or base-plate assemblies. Pricing should be anchored to active
  robotic welding cells plus onboarding for joint-family qualification because
  buyers already evaluate automation using uptime, rework, grinding, and labor
  math rather than seat count. The hard strategic choice is to win one narrow
  upstream workflow in structural steel before expanding into heavier
  fabrication categories or into in-cell execution features that OEMs already
  pursue. Market evidence is strong on pain, buyer trigger, and adjacent
  competition, but still weak on acceptable operator-input burden and the exact
  readiness thresholds that predict downstream defects. The company should
  treat the first 12-18 months as a proof period for workflow adoption, mixed
  fleet compatibility, and pilot-to-production conversion rather than assume
  the category already exists.
problem:
  - Structural-steel shops can now buy adaptive welding cells, but they still decide robot-ready versus prep-versus-manual routing with tribal rules, manual gauges, and visual judgment at the fit-up station.
  - One bad routing decision creates expensive downstream effects including overwelding, grinding, scrap, manual rescue, and lower trust in robotic welding ROI.
solution:
  - Build a pre-weld qualification layer that captures gap and tack measurements, photos, joint specs, and prior cell outcomes to score whether a given assembly is inside a proven process window for autonomous welding.
  - Recommend the smallest corrective action such as re-tacking, shimming, grinding, or manual routing before the cell consumes time, then store a traceable record linking as-built joint condition, route choice, and quality outcome.
whyWeWin:
  - The product owns the upstream go or no-go routing decision that OEM software and weld-monitoring tools usually do not own across mixed robot fleets.
  - If it compounds a cross-program dataset of joint condition, prep action, route taken, and weld result, it can build a process-window library and audit trail that internal playbooks and single-cell vendors do not have.
strategicChoices:
  beachhead: Repetitive beam-to-column, base-plate, and bracket assemblies at North American structural-steel fabricators serving hyperscale data-center shells and modular-construction programs.
  wedgeRationale: This slice has the clearest buying trigger because new cell launches and visible scrap spikes already force plant leaders to defend robot ROI, while the joint families recur often enough for software to learn faster than it would in bespoke job shops.
  sequencingRationale: Start with one joint family, one fit-up station, and read-only audit trails because customers first need proof that capture friction stays low and recommendations improve first-pass yield; only after that proof should the company add deeper sensor integrations, multi-cell rollout, and adjacent-sector expansion.
  notYet:
    - Heavy equipment, mining, agriculture, and shipbuilding accounts before structural-steel reference wins exist
    - Closed-loop robot execution or weld-path generation inside the cell
    - Full 3D scanning hardware bundles as the default deployment model
    - Small shops with mostly one-off geometry and weak fixture discipline
market:
  tam: "$240.0M estimated TAM based on roughly 2,000 North American heavy-fabrication plants with plausible robotic-welding preflight need, 3 qualified cells each, and about $40K annual ACV per active cell."
  sam: "$40.0M estimated SAM based on roughly 400 structural-steel, data-center, and modular-focused fabricators in the beachhead with about 2.5 cells each at roughly $40K annual ACV."
  som: "$4.8M estimated year-three SOM based on 40 plants and 120 paid cells if one-family pilots convert and expand through mixed-fleet OEM and integrator relationships."
  segments:
    - North American structural-steel fabricators running repetitive robotic welding on data-center and modular programs
    - Adjacent heavy-fabrication plants with similar fit-up variation and robotic-cell utilization pressure
  buyingProcess: >-
    The motion starts when a fabricator launches a new adaptive welding cell or
    sees a visible spike in grinding, scrap, or manual rescue on a repetitive
    assembly family. Daily champions are welding engineering managers and
    quality leaders, while economic approval usually sits with a VP of
    operations, plant manager, or director of welding automation after a pilot
    proves uptime, first-pass yield, and traceability gains without disrupting
    existing cell software.
product:
  mvp: >-
    MVP is a fit-up-station workflow for one repetitive joint family. It
    captures a minimal set of measurements, photos, tack locations, and part
    metadata, scores readiness for a named robot-fixture-weld-program
    combination, recommends prep or manual routing when needed, and records
    every decision with human approval.
  sixMonth: Land 2-3 design partners, ship rule-based readiness scoring with operator-friendly capture in under one minute per joint, and prove a measurable reduction in manual rescue or grinding on one live assembly family.
  twelveMonth: Add the lowest-friction sensor and cell-data integrations, convert successful pilots into 2-4 paid production deployments, and standardize deployment templates so new accounts do not require custom engineering each time.
  twentyFourMonth: Become the mixed-fleet preflight system of record for structural-steel robotic welding by adding portfolio benchmarking, multi-plant process-window libraries, and expansion into adjacent heavy-fabrication sectors that share repetitive joint families.
  keyBets:
    - A minimum measurement-plus-photo package is enough to predict route decisions accurately before the company needs expensive sensing hardware.
    - Shops will accept one more upstream workflow step if it reliably reduces downstream rescue welding and provides audit-ready evidence.
    - Mixed-fleet OEM neutrality is more valuable to buyers than a tighter but single-vendor integration.
    - Structural-steel deployments can be templated tightly enough to preserve software-like gross margins after early pilots.
gtm:
  wedge: Sell a paid pilot on one repetitive assembly family around a live robot-uptime problem, framed as preflight insurance for the welding cell rather than generic AI automation, with success defined by lower grinding, fewer manual rescues, and better first-pass yield.
  channels:
    - Founder-led direct sales to VP operations, welding automation leaders, and welding engineering managers at target fabricators
    - OEM, integrator, and cell-builder referrals for mixed-fleet accounts launching or expanding robotic welding
    - Vision, metrology, and seam-tracking partners that can reduce capture friction at the fit-up station
  funnelTargets: "Target discovery→onsite workflow study 40%+, study→paid pilot 25-35%, paid pilot→annual production 50%+, and production account→second cell or second plant expansion within 12 months in 50%+ of successful accounts."
  pricing: Annual subscription per active robotic welding cell, with onboarding priced by qualified joint families and fit-up stations; this matches how buyers already model robot ROI and supports a credible path from a $35K-$75K paid pilot to roughly $80K-$160K annual production ACV for a 2-4 cell initial deployment plus onboarding fees.
businessModel:
  revenueStreams:
    - Annual software subscription per active robotic welding cell
    - Paid onboarding and calibration for joint-family qualification, fit-up workflow setup, and process-window validation
    - Premium analytics for multi-plant benchmarking, traceability reporting, and mixed-fleet routing insights
  unitOfValue: Active robotic welding cells and qualified joint families governed through the preflight workflow.
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one joint family to more assemblies within the same plant
    - Expand from one plant to multi-plant standardization inside the same fabricator
    - Add adjacent heavy-fabrication sectors and premium audit or benchmark modules after structural-steel proof
strategyMap:
  northStarMetric: Autonomous-weld joints routed through the platform that reach first-pass acceptance without manual rescue.
  inputMetrics:
    - Capture time per joint at the fit-up station
    - Recommendation acceptance rate by welding engineering or quality leads
    - Manual rescue and grinding hours per targeted joint family
    - Pilot-to-production conversion rate
    - Production expansions from first cell to additional cells or plants
  moatsToBuild:
    - A joint-level dataset linking as-built condition, prep action, route choice, and downstream weld quality across customers
    - An OEM-neutral process-window library that translates fit-up states into route decisions across mixed fleets
    - Embedded auditability inside quality workflows for AISC and AWS-governed fabrication environments
  killCriteria:
    - Fewer than 3 paid pilots close within 12 months of focused beachhead selling
    - No pilot shows at least a 15% reduction in manual rescue or grinding hours on the targeted family within 90 days of go-live
    - Operators cannot keep median capture time under 60 seconds per joint without bypassing the workflow
    - Fewer than 50% of paid pilots convert to annual production because buyers treat the product as non-essential or feature creep
  mermaid: |
    flowchart LR
      Wedge[Structural steel preflight wedge] --> MVP[Fit-up station MVP]
      MVP --> Proof[Lower rescue welding and auditable routing]
      Proof --> Expansion[More cells plants and adjacent heavy fabrication]
investorMemo:
  verdict:
    call: Watch
    conviction: High pain and a credible workflow wedge, but conviction stays capped until the company proves low-friction station adoption and pilot conversion in mixed-fleet plants.
    whyBelieve: Buyers already pay for scrap reduction, uptime, and traceability, and no incumbent clearly owns the OEM-neutral pre-weld readiness decision across multiple robot stacks.
    whyDoubt: If the product requires too much manual capture or OEMs bundle good-enough routing into their own stacks, the company risks becoming a services-heavy feature rather than a durable platform.
    nextDiligence: See one paid structural-steel pilot prove low-friction workflow adoption, at least a 15% reduction in manual rescue or grinding, and a credible conversion path to annual cell-based subscription revenue.
  firstCustomer:
    title: Structural-steel robotic welding program owner
    profile: A 200-1,000 employee North American fabricator with 2-6 robotic welding cells, repeat beam or bracket assemblies, and active data-center or modular backlog that makes downtime expensive.
    trigger: A new adaptive welding cell launch or a visible rework and scrap spike on a repetitive assembly family.
    buyer: VP of operations or director of welding automation
    initialContract: "$35K-$75K paid pilot on one joint family and one fit-up station, converting to roughly $80K-$160K annual subscription for 2-4 active cells plus onboarding if first-pass yield and rescue-welding metrics improve."
  mustBeTrue:
    - At least 5 target fabricators confirm that pre-weld readiness routing is a budget-worthy problem separate from generic robot programming or post-weld inspection.
    - A minimum measurement-plus-photo workflow predicts route decisions with at least 80% reviewer agreement on the first target joint family.
    - Operators can complete required capture in under 60 seconds per joint or automated sensing can replace the slow steps without breaking pilot economics.
    - At least half of paid pilots convert into annual production deployments covering 2 or more cells within 6 months of pilot completion.
    - OEMs and integrators allow enough data access and channel cooperation for the company to stay mixed-fleet rather than being trapped inside one vendor stack.
  diligenceQuestions:
    - What exact KPI unlocks budget fastest in the first account, robot uptime, grinding reduction, scrap reduction, or traceability?
    - How repetitive are the first targeted joint families in real plants, and what share of routed work is predictable enough for software to learn quickly?
    - What minimum sensing package yields trusted readiness scores without making the fit-up station slower?
    - Will OEMs and integrators co-sell a neutral preflight layer, ignore it, or actively treat it as feature creep?
    - Does the structural-steel beachhead alone support a large enough early company, or must adjacent heavy-fabrication expansion start sooner?
operatingAssumptions:
  - assumption: Structural-steel fabricators serving data-center and modular work feel enough schedule and quality pressure to adopt a dedicated preflight layer before adjacent sectors.
    basis: research.yaml
    validationTest: Close 10 discovery conversations and 3 paid pilots where the buying trigger is a live cell launch or measurable scrap and rework pain on repetitive assemblies.
    decisionImpact: If false, the company should test a different beachhead such as heavy equipment or shipbuilding before scaling sales headcount.
  - assumption: Manual measurements plus photo capture are sufficient for the first production-worthy scoring model.
    basis: idea.yaml
    validationTest: On 3 design-partner datasets, achieve at least 80% route-agreement with welding engineering reviewers and a measurable reduction in downstream rescue on one live family.
    decisionImpact: If false, the product must bundle more sensing, which raises deployment cost and may force narrower account selection.
  - assumption: Buyers will accept cell-based pricing with onboarding tied to joint-family qualification.
    basis: idea.yaml
    validationTest: In the first 5 pricing discussions, secure at least 2 letters of intent or paid pilots using this structure without forced seat-based or pure services pricing.
    decisionImpact: If false, revenue scales less cleanly and the company may need a plant-level subscription or services-led packaging instead.
  - assumption: OEM-neutral positioning is strategically valuable enough that integrators and customers prefer it over single-vendor tooling.
    basis: research.yaml
    validationTest: Generate at least 2 qualified pilot opportunities through integrator or OEM referrals and confirm one mixed-fleet customer views neutrality as a purchase reason.
    decisionImpact: If false, the company should pick one dominant ecosystem first and accept a narrower but faster integration roadmap.
  - assumption: Early deployments can be standardized enough to reach software-like gross margins after the first few pilots.
    basis: operator judgment
    validationTest: By the fifth paid deployment, reduce implementation hours per account by at least 30% versus the first two deployments while maintaining target outcome metrics.
    decisionImpact: If false, the company should raise onboarding prices, narrow the product scope further, or accept a lower-margin deployment model.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: Interview 15 structural-steel welding leaders and shadow at least 3 fit-up stations on robotic lines.
    hypothesis: The strongest buying trigger is a live robot-uptime or scrap event on a repetitive assembly family rather than general interest in welding AI.
    successMetric: 10 target accounts confirm a named trigger, current routing workflow, budget owner, and baseline KPI for rescue welding or grinding.
    owner: CEO
  - horizon: "0–90 days"
    experiment: Build a manual-capture prototype for one joint family using gap measurements, tack-location inputs, and photos.
    hypothesis: A minimum capture package is enough to support useful go or no-go routing recommendations before hardware integrations.
    successMetric: 80%+ reviewer agreement on historical route decisions across 2 design-partner datasets.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Run 2 paid pilots on live structural-steel lines with one fit-up station and one targeted assembly family each.
    hypothesis: Preflight routing can reduce manual rescue or grinding hours by at least 15% without slowing throughput.
    successMetric: 2 signed pilots and at least 1 pilot hits the rescue or grinding reduction target while keeping median capture time under 60 seconds per joint.
    owner: CEO
  - horizon: "90–180 days"
    experiment: Test direct sales against integrator-led and OEM-referred pilot sourcing.
    hypothesis: Partner-led motions shorten trust-building time and improve close rate for industrial buyers.
    successMetric: 1 partner-sourced pilot closes at least 25% faster than the direct motion or reaches a better close rate with lower founder time.
    owner: GTM lead
  - horizon: "6–12 months"
    experiment: Add one low-friction sensor or cell-data integration and expand a successful pilot from one family to a second family or second cell.
    hypothesis: Light integration improves accuracy and stickiness enough to justify production conversion and multi-cell expansion.
    successMetric: 2 production accounts adopt the integrated workflow and expand beyond the initial pilot scope.
    owner: Solutions engineer
  - horizon: "12–18 months"
    experiment: Launch a cross-account process-window benchmark and audit-reporting module for early production customers.
    hypothesis: Benchmarking and auditability increase renewals and strengthen the moat more than scoring alone.
    successMetric: First 3 production accounts use quarterly benchmark or audit outputs in operating reviews or renewal discussions.
    owner: Product lead
operations:
  - Baseline every pilot on manual rescue events, grinding hours, first-pass yield, and robot uptime before rollout.
  - Keep early deployments read-only with human approval and route overrides so the software fits existing AWS and AISC quality workflows.
  - Design the fit-up workflow around minimal operator burden and document every bypass, override, and missing-data condition.
  - Standardize export connectors and implementation playbooks for common robot, sensor, and QA environments before hiring a broad field team.
  - Run joint weekly reviews with welding engineering and quality leads during pilots to tune process windows and capture failure modes quickly.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the scoring engine, data model, and fit-up capture workflow that define the wedge.
  - role: Founder seller
    startTiming: Month 0
    rationale: Owns design-partner discovery, pilot sales, and conversion into annual production contracts.
  - role: Welding domain and product lead
    startTiming: Month 0
    rationale: Translates structural-steel fit-up rules, audit needs, and deployment success metrics into product logic customers trust.
  - role: Solutions and field engineer
    startTiming: Month 3
    rationale: Handles plant rollout, KPI baselining, and lightweight OEM and sensor integrations so pilots stay repeatable.
  - role: Computer vision or industrial data engineer
    startTiming: Month 6
    rationale: Reduces manual capture burden and improves route accuracy with sensor and image pipelines once the workflow is proven.
  - role: Partnerships and customer success lead
    startTiming: Month 9
    rationale: Converts early integrator and OEM relationships into channel leverage and manages multi-cell expansions.
milestones:
  - horizon: "0–12 months"
    items:
      - Sign 2-3 design partners and close at least 3 paid pilots in the structural-steel beachhead.
      - Prove median capture time under 60 seconds per joint and at least one pilot with a 15% or better reduction in manual rescue or grinding hours.
      - Convert the first 2 pilots into annual production contracts covering multiple cells and a standardized onboarding template.
  - horizon: "12–24 months"
    items:
      - Reach 8-12 production plants and 20-30 paid cells through a mix of direct and partner-sourced accounts.
      - Ship sensor-light integrations, cross-account process-window analytics, and audit-ready reporting as standard product modules.
      - Establish at least one adjacent-sector design partner in heavy equipment, mining, agriculture, or shipbuilding without diluting the structural-steel core.
  - horizon: "24–36 months"
    items:
      - Reach the researched year-three SOM target of roughly 40 plants and 120 paid cells.
      - Make multi-plant expansion and benchmark renewals the default growth motion inside successful accounts.
      - Decide whether to remain the neutral preflight control layer or move deeper into adjacent weld-quality and production-routing workflows.
risks:
  - risk: Fit-up station data capture adds enough friction that operators bypass the workflow.
    likelihood: High
    impact: High
    mitigation: Start with the minimum viable capture package, measure time per joint from day one, and prioritize automation only after the first family proves ROI.
  - risk: Robot OEMs or autonomous-cell vendors add good-enough readiness checks into their own stacks.
    likelihood: Medium
    impact: High
    mitigation: Stay OEM-neutral, win mixed-fleet accounts, and make cross-cell auditability and process-window benchmarking core differentiators.
  - risk: Poor fixturing discipline and extreme part variability overwhelm software recommendations.
    likelihood: High
    impact: High
    mitigation: Target repetitive families first, require baseline process discipline in pilot selection, and position the product as decision support rather than magic automation.
  - risk: The structural-steel beachhead is real but too narrow to support venture outcomes without fast adjacent expansion.
    likelihood: Medium
    impact: High
    mitigation: Use structural steel only as the proof wedge and line up adjacent heavy-fabrication design partners before saturating the initial segment.
  - risk: Quality and liability concerns slow production conversion even when pilot KPIs look good.
    likelihood: Medium
    impact: Medium
    mitigation: Maintain human approval, auditable rule logic, and customer-specific review workflows until the product is embedded inside formal quality systems.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to close design partners, run 3-5 paid pilots, convert the first production accounts, build the core scoring and audit product, add lightweight sensor and OEM integrations, and hire the domain, field, and GTM team needed to prove a repeatable structural-steel wedge.
