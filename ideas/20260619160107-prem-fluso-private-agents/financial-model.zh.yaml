slug: research-vault-agent-workspace
date: "2026-06-19"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-07"
    unit: month
    source: "[BP date] 基准情景从商业计划日期后的次月开始。"
  - id: A2
    name: "seed 交割后的期初现金"
    value: "2.0"
    unit: USDM
    source: "[BP fundingAsk targetFundingRangeUsd] 采用已陈述 $2–4M seed 区间的低端，因为付费试点可以对冲 burn，且招聘计划保持精简。"
  - id: A3
    name: "收入确认规则"
    value: "期间平均活跃付费客户数 × 混合客户年收入"
    unit: formula
    source: "[Startup-finance heuristic] 采用期初和期末付费客户数的平均值，使收入能与客户爬坡清晰勾稽，而无需引入递延收入建模。"
  - id: A4
    name: "每家活跃付费基金的混合年收入"
    value: "190.0"
    unit: "USDK per customer-year"
    source: "[BP gtm.pricing; BP market.som; Research market.som] 在 $75k–$250k 年度许可区间内，叠加部署费和早期高级模块 attach，同时仍低于约 $200k 的 SOM 退出值。"
  - id: A5
    name: "毛利率"
    value: "75"
    unit: percent
    source: "[BP businessModel targetGrossMarginPct] 将 VPC 部署支持、推理与连接器服务控制在 25% 的 COGS 包络内。"
  - id: A6
    name: "月度流失率"
    value: "2.0"
    unit: percent
    source: "[Startup-finance heuristic] 假设私有部署的基金软件在上线后具有较强黏性，但考虑到这是一个早期赛道、已完成续约周期很少，仍保留折扣。"
  - id: A7
    name: "混合 CAC"
    value: "55.0"
    unit: "USDK per customer"
    source: "[BP gtm channels and funnelTargets; BP market.buyingProcess] 创始人主导的企业销售，加上合规渠道的暖介绍，使六位数合同对应的 CAC 保持高触达但仍具效率。"
  - id: A8
    name: "期初付费客户数"
    value: "0"
    unit: count
    source: "[BP milestones 0–12 months] 模型从收入前阶段开始，首份设计合作伙伴试点合同尚未落地。"
  - id: A9
    name: "Y1 客户落地节奏"
    value: "月末客户数 0,0,0,1,1,1,2,2,3,3,3,3"
    unit: count
    source: "[BP milestones 0–12 months] 对应到第 9 个月拿下 3 个付费设计合作伙伴试点，并在第 12 个月完成 2 个试点转生产，且不额外假设新增 logo。"
  - id: A10
    name: "Y2 季末客户数"
    value: "Q1Y2 4; Q2Y2 4; Q3Y2 5; Q4Y2 5"
    unit: count
    source: "[BP milestones 12–24 months] 将基准情景锚定在第 24 个月 5–7 家生产客户指引的低端。"
  - id: A11
    name: "Y3 季末客户数"
    value: "Q1Y3 7; Q2Y3 9; Q3Y3 12; Q4Y3 15"
    unit: count
    source: "[BP milestones 24–36 months] 到第 3 年达到计划中的 12–15 家客户目标，以及约 $2.85M 的退出 ARR。"
  - id: A12
    name: "创始 GTM 与销售工程师总现金薪酬"
    value: "108.0"
    unit: "USDK per year"
    source: "[BP team Founding GTM and sales engineer] 这是符合 startup-finance heuristic 的低于市场价创始人工资加 payroll burden。"
  - id: A13
    name: "创始工程师总现金薪酬"
    value: "165.0"
    unit: "USDK per year"
    source: "[BP team Founding infrastructure engineer; BP team Founding product and second engineer] 这是符合 startup-finance heuristic 的资深产品与基础设施工程现金薪酬加 payroll burden。"
  - id: A14
    name: "解决方案工程师总现金薪酬"
    value: "144.0"
    unit: "USDK per year"
    source: "[BP team Solutions engineer] 这是符合 startup-finance heuristic 的重实施型企业部署人才薪酬。"
  - id: A15
    name: "首位扩张工程师总现金薪酬"
    value: "165.0"
    unit: "USDK per year"
    source: "[BP product twelveMonth; BP strategicChoices sequencingRationale] 在核心部署栈验证完成后再增加 1 名工程师，使连接器深度得以扩展，同时避免收入前置招聘。"
  - id: A16
    name: "首位 GTM 招聘总现金薪酬"
    value: "138.0"
    unit: "USDK per year"
    source: "[BP strategicChoices sequencingRationale; BP gtm channels] 这是符合 startup-finance heuristic 的首位非创始销售人员薪酬，前提是公司已形成生产参考案例。"
  - id: A17
    name: "客户成功与实施总现金薪酬"
    value: "120.0"
    unit: "USDK per year"
    source: "[BP operations; BP milestones 24–36 months] 这是符合 startup-finance heuristic 的售后 onboarding 与财报周期客户支持人才薪酬。"
  - id: A18
    name: "第二位扩张工程师总现金薪酬"
    value: "165.0"
    unit: "USDK per year"
    source: "[BP product twentyFourMonth; BP milestones 24–36 months] 只有在首套可复用的对冲基金 playbook 上线后，才为相邻工作流模块和连接器广度配置该岗位。"
  - id: A19
    name: "招聘节奏"
    value: "M1 配置创始 GTM + 2 名工程师；M4 配置解决方案工程师；M18 配置扩张工程师；M20 配置首位 GTM 招聘；M27 配置客户成功与实施；M30 配置第二位扩张工程师"
    unit: timing
    source: "[BP team startTiming; BP strategicChoices sequencingRationale; BP fundingAsk useOfFundsSummary] 在已命名的创始团队计划上，只额外增加 3 个后续岗位，使模型在不堆砌 vanity headcount 的情况下支撑 15 个 logo。"
  - id: A20
    name: "非薪酬销售与市场费用"
    value: "7K M1–M12; 9K M13–M24; 12K M25–M36"
    unit: "USDK per month"
    source: "[Startup-finance heuristic] 覆盖差旅、安全审查支持、法务材料和创始人主导企业销售所需工具。"
  - id: A21
    name: "非薪酬研发费用"
    value: "8K M1–M6; 10K M7–M18; 12K M19–M36"
    unit: "USDK per month"
    source: "[Startup-finance heuristic] 覆盖云资源、模型使用、连接器 QA 和部署工具，随产品从 MVP 走向多工作区支持而增加。"
  - id: A22
    name: "非薪酬一般及行政费用"
    value: "8K M1–M12; 10K M13–M24; 12K M25–M36"
    unit: "USDK per month"
    source: "[Startup-finance heuristic] 反映一家金融软件供应商所需的法务审查、合规开销、保险和基础行政成本。"
  - id: A23
    name: "资金用途分配"
    value: "Engineering 47%; GTM 21%; G&A 10%; Buffer 22%"
    unit: percent
    source: "[BP fundingAsk useOfFundsSummary; A19–A22] 工程承担产品、部署与实施能力；GTM 仍以创始团队为主；其余部分覆盖行政和 6 个月储备。"
  - id: A24
    name: "现金转换政策"
    value: "EBITDA 近似现金变动"
    unit: policy
    source: "[Startup-finance heuristic] 对这家早期软件公司，不建模债务、税项、capex 或显著的营运资金波动。"
  - id: A25
    name: "下一轮融资里程碑"
    value: "达到 12 家生产客户、约 $2.3M 退出 ARR，并在 Q3Y3 前形成首批可复用的高级模块加售，同时至少保留 6 个月现金缓冲"
    unit: milestone
    source: "[BP milestones 12–24 months; BP milestones 24–36 months; BP fundingAsk runwayMonths] 该里程碑用于确定 seed 轮规模与预留储备。"
