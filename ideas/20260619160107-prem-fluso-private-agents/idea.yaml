differentiator: >-
  Most enterprise AI products either offer generic chat with weak project boundaries or require buyers to stitch together a self-hosted stack on their own. Research Vault Agent Workspace packages encrypted deployment, research-source entitlements, thesis-scoped memory, evidence citation, and export approvals into one opinionated runtime built for privileged knowledge work. Over time, it compounds proprietary workflow data around research templates, approval paths, and source connectors that make it harder to replace with a commodity model host.
