topRisks:
  - name: Internal-build temptation
    description: Sophisticated funds may believe their research-tech teams can assemble a secure workspace themselves from open-source components.
    mitigation: Win on time-to-production, polished connectors, approval workflows, and auditability that are painful for lean internal teams to recreate.
  - name: Narrow beachhead sales
    description: Hedge funds are a concentrated market with relationship-heavy enterprise sales and long trust-building cycles.
    mitigation: Start with design partners that already banned public AI tools, then reuse the same product in adjacent confidential-workflow segments to broaden pipeline.
  - name: Agent trust failure
    description: A single incorrect citation, hallucinated claim, or unauthorized export could destroy credibility with early customers.
    mitigation: Keep humans in approval loops, require citation coverage on generated outputs, and ship strict export controls plus full replay logs from day one.
