problem: >-
  Fundamental hedge funds are sitting on high-value internal notes, channel checks, expert-network transcripts, earnings prep documents, and proprietary models, but most cannot let AI agents touch that corpus in generic cloud workspaces. As a result, analysts still assemble investment memos manually or rely on brittle internal scripts that lack permissioning, citations, and audit trails. Once a fund wants agents to draft research or monitor positions continuously, the missing piece is a private workspace that keeps every action, source, and export inside the fund's control boundary.
targetUser:
  primary: Head of research technology or senior analyst at a fundamental long/short equity hedge fund with 10-75 analysts and a growing internal AI workflow backlog
  secondary: Chief compliance officer or COO at the same fund responsible for restricting external AI use on proprietary research
  buyer: COO, CTO, or Head of Research Platform at a fundamental hedge fund
startupThesis:
  nonObviousInsight: >-
    The hard part of private knowledge-work agents is no longer model access; it is packaging proprietary research, workspace memory, citations, and export controls into one encrypted operating boundary that a small fund team can deploy without building an internal platform from scratch.
  beachhead: >-
    U.S. and UK fundamental long/short equity hedge funds with 15-50 analysts, existing research systems such as AlphaSense, CapIQ, and expert-network archives, and active pilots for AI-assisted earnings prep or investment memo drafting
  wedge: >-
    An encrypted research-room workspace that ingests approved internal and licensed sources, maintains ticker- and thesis-scoped memory, drafts cited analyst notes, and requires policy-aware approval before anything can be exported outside the workspace
  whyNowCatalyst: >-
    Prem AI's Fluso launch specifically targets hedge funds where data leaving the building is unacceptable, showing the privacy workspace has become the gating product for agent adoption right now.
  ventureScalePath: >-
    Start with hedge-fund research rooms, then expand the same private-agent workspace model into credit funds, private equity deal teams, law firms, corporate development groups, and other high-value knowledge workflows that need agents without data egress.
solution: >-
  Research Vault Agent Workspace runs inside a fund's own VPC or on-prem environment and creates isolated workspaces for each ticker, sector, or investment thesis. It connects to approved research stores, meeting notes, filings, transcripts, and internal models, then lets analysts launch bounded agents that summarize evidence, maintain watchlists, draft memos, and surface contradictions with citations attached. Every prompt, retrieval, tool action, and export is logged against workspace policy so compliance can review what the agent saw and what left the room. Instead of selling another chat UI, the product becomes the secure runtime and operating layer for research workflows that funds currently cannot automate safely.
goToMarketSeed:
  firstCustomer: $1B-$20B AUM fundamental long/short equity funds with 15-50 analysts, a central research-tech lead, and an explicit internal policy against using public AI tools on proprietary notes
  buyingTrigger: A decision to pilot analyst agents ahead of earnings season or a compliance directive after staff are caught using public AI tools for internal research drafting
  currentAlternative: Manual memo drafting in Word and Excel, analyst search across AlphaSense and CapIQ, plus ad hoc internal scripts or locked-down notebooks inside the fund's VPC
  switchingReason: The workspace gets funds from AI experimentation to production by keeping source material inside their infrastructure while delivering cited drafts and auditable agent behavior that manual workflows and one-off scripts cannot match
  pricingHypothesis: Annual platform license priced by active research workspaces or analyst seats, with initial design-partner contracts in the $75k-$250k range depending on deployment complexity and source connectors
