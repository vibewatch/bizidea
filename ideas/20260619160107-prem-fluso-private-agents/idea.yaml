jobsToBeDone:
  - job: When an analyst is preparing an earnings or initiation memo, help the research team synthesize approved internal and licensed sources with agents, so they can ship a cited first draft without leaking proprietary context.
    currentAlternative: Manual research assembly across notes, transcripts, and spreadsheets plus ad hoc internal scripts
    successMetric: First-draft memo preparation time falls by at least 50% while every factual claim retains a traceable source citation
  - job: When compliance needs to approve AI use in research, help the COO and research-tech lead prove what an agent accessed and exported, so they can allow broader deployment without policy anxiety.
