slug: research-vault-agent-workspace
date: '2026-06-19'
executiveSummary: >-
  基本面型对冲基金已经从 AI 试验走到前台业务试点，但真正卡住落地的不是模型质量，而是治理僵局：专有研究笔记、专家网络访谈记录和受许可内容都不能离开基金受控环境，因此通用云端 AI 工具不是被禁用，就是被直接无视。Research
  Vault Agent Workspace 把这道缺口补上：它把加密工作区部署在基金自己的 VPC 或本地环境里，把投资论点级 agent 记忆、强制引用的备忘录起草和策略感知的导出控制，收进一个可审计的研究运行环境。眼下最清晰的滩头市场，是美国和英国 AUM 在
  $1B–$20B、分析师 15–50 人、且内部 AI 政策已限制公开工具使用的基本面多空股票基金——在这类客户里，合规压力会直接触发采购，而不是拖成长咨询式销售周期。AIMA 的研究显示，95%
  的受访另类资管机构已经在用 GenAI，58% 预计会把它更多用于投资流程，说明市场已经成熟；按约 ~$180k 的混合 ACV 计算，美国和英国约 ~650 家可服务基金 logo 对应的
  SAM 约为 $120M。Prem AI 推出 Fluso 并据称完成 $100M Series A，说明投资人和创始团队都相信私有 agent 工作区会成为独立赛道，但目前仍没有竞争对手把
  VPC 部署、对冲基金工作流模板与合规级可审计性打包成一个有明确取舍的研究空间。$2–4M 的 seed 融资可支撑 18 个月跑完 3–5 个设计合作伙伴合同、交付 VPC 与私有端点部署及核心连接器，并证明带引用备忘录工作流可以通过基金合规审查——从而为
  Series A 提供 ARR 与产品验证。核心风险在于大型基金倾向自建，以及 Rogo 和 Prem Fluso 的竞争加速；对应缓释手段，是尽快完成设计合作伙伴部署，在 incumbents
  进入私有工作区赛道前先建立切换成本。
problem:
  - >-
    专有研究资料——内部笔记、专家网络访谈记录、持牌券商研究以及财报前准备文件——一旦发送到公开 AI API，就会带来竞争与监管风险，因此基本面型对冲基金的分析师无法让 agent
    触达其语料中最有价值的部分。
  - >-
    市场上没有现成的工作区运行时，能把 VPC 或本地部署、投资论点级记忆、引用强制约束与导出审批整合进一个可审计边界；尝试内部自建的基金往往要投入 12–18
    个月工程时间，仍然拿不出审批所要求的合规级回放日志。
  - >-
    合规团队若看不到完整会话日志——包括 agent 访问了什么、生成了什么、以及什么内容离开了批准环境——就无法批准大范围部署 agent，这就形成了一个手工研究流程无法解决、现有研究套件或企业级工作
    AI 工具也无法覆盖的政策僵局。
solution:
  - >-
    在基金自己的 VPC 或私有云端点内部部署加密研究室工作区，接入已批准的内部和持牌数据源，提供按投资论点与 ticker 作用域管理的 agent
    记忆，以及强制引用的草稿生成功能，使每一条判断都能追溯到受控边界内可取回的源材料。
  - >-
    将策略感知的导出控制与按会话保存的审计日志存放在客户自有环境内，让合规团队在任何内容离开工作区之前，都能完整回放每一步 agent 动作、检索步骤和输出——把合规审批从阻碍项变成产品能力本身。
  - >-
    提供可复用的财报前准备与投资备忘录工作流模板，把分析师的配置时间从数周压缩到数小时，同时不要求基金研究技术团队自行建设或维护连接器、记忆层与审批链所需的平台工程。
whyWeWin:
  - >-
    现有产品里，没有谁能把 VPC-first 部署、对冲基金专属的投资论点记忆、引用强制约束与合规级审计轨迹整合到一个有明确产品观点的研究运行环境里：AlphaSense
    更偏内容平台，而非基金自有运行时；Glean 面向通用企业知识工作；Palantir 则往往要求更广泛的跨企业铺设，许多中型基金不会接受把它作为首个研究室 rollout。
  - >-
    在基金自有基础设施内实现“合规后即可投产”的速度，快于任何内部自建路径：公司直接提供连接器模板、VPC 参考架构和财报前准备工作流模板，而精简的研究技术团队若要自行复制，通常需要
    12–18 个月开发和长期维护。
  - >-
    按投资论点组织的工作区记忆、审批历史以及基金专属研究 playbook，会不断沉淀为一层迁移成本很高的运营数据资产，从而在任何合同续约之前，就先于通用模型层或搜索层形成自然切换成本。
strategicChoices:
  beachhead: >-
    美国和英国的基本面多空股票对冲基金，AUM 在 $1B–$20B，分析师 15–50 人，拥有集中式研究技术负责人，并且已存在内部政策，禁止或限制在专有研究笔记或专家网络访谈记录上使用公开
    AI 工具。
  wedgeRationale: >-
    带引用的财报前准备备忘录起草，是最锋利的首个切入场景，因为它具备清晰且有时限的采购触发点（即将到来的财报季，或封禁公开 AI 工具后的紧迫需求）、可衡量的成功标准（首稿准备时间下降
    50%+，且引用覆盖完整），并且必须依赖整套私有工作区栈——VPC 部署、持牌连接器、投资论点记忆和导出策略——才能正确运行。更窄的入口，比如简单文档摘要，既无法充分验证价值主张，也不足以支撑
    $75k–$250k 的 ACV。
  sequencingRationale: >-
    VPC 和私有端点部署必须先做，因为一旦跨过合规门槛，就能解锁原本已经为私有 AI 方案预留的预算。待运行时建立信任后，再逐步加深连接器能力（先内部存储，再 AlphaSense
    和 CapIQ，随后是专家网络）。财报前准备模板和投资论点记忆要先于 watchlist 自动化发布，因为备忘录起草能更快、更可量化地体现 ROI。GTM
    先采用创始人直销设计合作伙伴，再叠加合规顾问和 prime broker 渠道，因为早期交易需要的是深度技术信任，而非单纯管道体量。工程招聘也应先于企业销售扩编，因为第一个门槛是部署可信度，而不是成交数量。
  notYet:
    - >-
      律所与企业发展 deal team：属于相邻的机密知识工作场景，但所需连接器和工作流模板不同；应等到 3+
      家对冲基金 logo 进入生产并且部署 playbook 可复用之后再进入。
    - >-
      仅公有云、多租户 SaaS 部署：当前滩头市场明确要求私有部署，多租户模式会削弱核心合规信息传递。
    - >-
      信贷基金与私募股权 deal team：工作区模型相近，但数据源生态不同（如信贷数据库、cap table 工具）；应等对冲基金连接器套件验证成熟后再推进。
    - >-
      通用型企业 AI 平台定位：如果把产品信息扩大化，会稀释对冲基金工作流这一有明确观点的优势，而这正是创始人直销定价成立的基础。
market:
  tam: "~$0.4B（估）：~2,200 家全球研究密集型基本面和多策略基金 logo × ~$180k 混合年 ACV"
  sam: "~$120M（估）：~650 家符合 15–50 名分析师画像的美国/英国滩头市场 logo × ~$180k ACV"
  som: "~$3.6M 到第 3 年（估）：设计合作伙伴扩座后，18 家生产基金 logo × ~$200k 混合 ACV"
  segments:
    - "主要：美国和英国基本面多空股票基金，AUM 为 $1B–$20B，分析师 15–50 人，已有 AI 研究试点且存在内部使用政策"
    - "次要：希望在分析师小组之间标准化安全研究工具的多经理投资平台"
  buyingProcess: >-
    决策通常由 COO、CTO 或研究平台负责人主导，合规与法务拥有否决权；采购一般需要经过安全审查和数据处理评估，因此从首次合格对话到开始部署，销售周期通常为
    3–6 个月，而 60–90 天的付费试点是标准转化路径。
product:
  mvp: >-
    提供 VPC 或私有端点部署包，接入内部文档存储与 2–3 个持牌研究数据源（优先 AlphaSense 和内部笔记），包含投资论点级工作区记忆、强制引用的备忘录起草，以及完整会话审计日志——目标是在一次分析师会话中交付首份带引用的财报前准备草稿。
  sixMonth: >-
    扩展连接器套件，覆盖 AlphaSense、CapIQ 和至少一个专家网络访谈记录源；上线财报前准备与 initiation-memo 工作流模板；提供多
    ticker watchlist agents；以及支持逐会话审计复核和导出审批的合规仪表盘。
  twelveMonth: >-
    面向研究团队的基金级部署，提供多工作区治理、按连接器镜像数据源权限并继承许可、按工作区类型配置审批链策略，以及支持 AWS、Azure 和 GCP 上客户
    VPC 与专有云形态的部署工具包。
  twentyFourMonth: >-
    推出适用于信贷和私募股权 deal team 工作流的扩展工作区模块、跨工作区研究 playbook 共享、自动化数据源权限续期追踪，以及面向第三方数据供应商的认证连接器市场。
  keyBets:
    - >-
      VPC-first 部署比任何其他投产路径都更快解除合规否决，这也是基金选择它、而不是在现有研究套件上继续扩展的首要原因。
    - >-
      把引用作为一级系统约束（而非 UI 选项）是建立分析师信任、并在现行证券监管框架下具备可辩护性的必要条件。
    - >-
      财报前准备模板能在部署后一个季度内产出可重复、可衡量的 ROI 信号，从而缩短试点转正式上线的路径。
    - >-
      随着时间推移，连接器深度与数据源权限镜像逻辑会成为主要切换成本，因为对一个精简的研究技术团队而言，迁移工作区记忆和连接器配置在运营上代价很高。
gtm:
  wedge: >-
    由创始人直接向那些合规团队已禁止或限制公开 AI 工具的基金销售设计合作伙伴项目，把工作区定位为在下一个财报季前从 AI 试点走向生产的最快合规路径——目标客户是有现实紧迫性的基金，而非仅处于探索阶段的兴趣客户。
  channels:
    - "创始人主导，直接销售给目标基金的 COO、CTO 和研究技术负责人"
    - "服务对冲基金的合规顾问与法律顾问，作为暖介绍渠道"
    - "prime broker 与研究数据供应商的技术生态，作为后期推荐管道"
  funnelTargets: "ICP 会面 → 合格试点：25–35%；合格试点 → 年度正式合同：55–65%"
  pricing: >-
    年度平台许可费按部署复杂度和连接器数量，对每家基金收取 $75k–$250k，另加一次性 $15k–$40k 的部署与集成费；后续扩张则按新增活跃工作区数量或分析师席位层级计费。其逻辑在于：销售可直接嵌入现有研究技术与合规预算，而不是另造新的预算科目；同时，试点结构（$25k–$35k
    的付费 engagement）既能带来早期收入，也能降低年度合同决策风险。
businessModel:
  revenueStreams:
    - "按活跃工作区数量或分析师席位层级定价的年度平台订阅"
    - "面向 VPC 部署和数据源连接器的一次性部署与集成费用"
    - "审批工作流配置、watchlist 自动化和研究档案治理等高级模块"
  unitOfValue: 每次基金部署中的活跃研究工作区
  targetGrossMarginPct: 75
  expansionLevers:
    - "随着分析师采用从初始试点团队扩展，向现有基金客户追加席位或工作区"
    - "高级模块加售（watchlist 自动化、高级审批链、跨工作区 playbook 共享）"
    - "复用同一部署与连接器基础设施，扩展到相邻垂直领域（信贷基金、PE deal team、律所）"
strategyMap:
  northStarMetric: 付费基金客户中已投入生产的活跃研究工作区数量
  inputMetrics:
    - "试点转生产转化率（目标高于 55%）"
    - "每个活跃工作区每月生成的带引用备忘录草稿数"
    - "已部署工作区内的分析师采用率"
    - "每个客户已上线的数据源连接器数量"
  moatsToBuild:
    - "按基金隔离、并按投资论点与 ticker 作用域管理的工作区记忆（迁移成本高）"
    - "跨越多个财报季积累下来的基金专属审批历史与研究 playbook 模板"
    - "覆盖持牌与内部数据源的连接器深度和数据源权限镜像逻辑"
    - "来自 VPC 与私有端点安装的部署遥测数据，用于加固未来参考架构"
  killCriteria:
    - "运营第 9 个月结束前签下的付费设计合作伙伴合同少于 3 份"
    - "完成 4 个试点后，试点转生产转化率仍低于 35%"
    - "AlphaSense 或 Rogo 推出可信的 VPC-first 对冲基金研究室，并在正面 bake-off 中被 2+ 家目标基金优先选择"
    - "没有任何试点客户在投入生产 60 天后实现首稿备忘录准备时间下降 40%+"
  mermaid: |
    flowchart LR
      Wedge[Earnings-prep memo wedge] --> MVP[VPC workspace MVP]
      MVP --> Pilot[Design-partner pilots]
      Pilot --> Proof[Cited memo ROI + compliance audit pass]
      Proof --> Contract[Annual production contracts]
      Contract --> Expand[Seat and workspace expansion]
      Expand --> Adjacency[Credit / PE / law firm expansion]
investorMemo:
  verdict:
    call: "会面 / 继续深入尽调"
    conviction: >-
      痛点真实、由合规驱动，买方明确，切入口也很有观点；但市场相对狭窄，而且资金更充足的竞争者正向同一地带收敛。
    whyBelieve: >-
      95% 的受访另类资管机构已经使用 GenAI，而他们明确指出的阻碍是治理信任，而不是模型质量——这意味着私有控制边界不是可有可无的升级项，而是 agent
      得以被采纳的使能产品。
    whyDoubt: >-
      Rogo 在金融 AI 工作流上已经做到数百万 ARR，Prem Fluso 也正推进明确面向对冲基金的 $100M Series A，这会压缩公司在资本更雄厚的竞争者占领赛道之前，建立差异化私有工作区定位的时间窗口。
    nextDiligence: >-
      需要确认至少 5 家目标美国/英国基金（AUM 为 $1B–$20B）确实存在成文且仍在执行的公开 AI 工具研究禁令，并明确表示愿意在 6
      个月内评估一份 $75k–$250k 的年度私有工作区合同。
  firstCustomer:
    title: 美国基本面多空股票对冲基金的研究技术负责人
    profile: >-
      该基金 AUM 为 $2B–$10B，分析师 20–40 人，已订阅 AlphaSense 或 CapIQ，并有内部政策备忘录限制在专有研究笔记或专家网络访谈记录上使用公开
      AI 工具；同时，研究技术负责人手里已经积压了一批尚未满足的内部 AI 工作流需求。
    trigger: >-
      一名员工被发现使用公开 AI 工具起草财报前准备备忘录后，合规部门下发指令；或者基金决定在重要财报季前部署研究 agents，但内部来不及完成可行自建。
    buyer: 由 COO 或 CTO 负责采购，合规与法务拥有不可协商的否决权
    initialContract: >-
      先签一份 $25k–$35k、持续 60–90 天的付费试点；若带引用备忘录演示成功并通过内部安全审查签核，再转为 $100k–$150k 的年度生产合同。
  mustBeTrue:
    - >-
      在 AUM 为 $1B–$20B 的美国/英国基本面对冲基金中，至少 10% 拥有成文且仍在执行的政策，限制在专有研究上使用公开
      AI，由此形成一个无需进行大规模市场教育、即可触达的 60+ 家 logo 滩头市场。
    - >-
      基金愿意每年支付 $75k–$250k 采购私有工作区，而不是扩展现有研究套件或内部自建，因为对处于财报季紧迫状态的基金而言，“合规后快速投产”的时间价值高于这两种替代方案。
    - >-
      在 18 个月内，没有 incumbents——AlphaSense、Rogo、Glean 或 Palantir——推出一款足够有说服力的 VPC-first 对冲基金研究室，在正面
      bake-off 中凭借投资论点记忆和引用强制约束，被目标基金优先选择。
    - >-
      投资论点级工作区记忆与审批历史能够形成足够强的切换成本，使至少 80% 的设计合作伙伴基金在投入生产 12 个月后，按不低于初始合同价值续约。
    - >-
      由 3–4 人组成的创始团队，可以在不引入创始团队之外企业销售编制的前提下，于 12 个月内拿下 3 份付费设计合作伙伴合同，且每份 ACV 为
      $75k–$150k。
  diligenceQuestions:
    - >-
      在 AUM 为 $1B–$20B 的目标美国/英国基金中，到底有多少家拥有成文的内部政策，限制在专有研究上使用公开 AI
      工具？其中又有多大比例已经为合规的私有替代方案设立了预算科目？
    - >-
      哪些持牌内容类型——AlphaSense、专家网络访谈记录、券商研究——在现有供应商条款下，可以在不重新谈判的前提下合法导入第三方管理的私有工作区？又有哪些不行？
    - >-
      在基金自有 VPC 内完成端到端部署的现实时间表是什么，包括安全审查、采购和基础设施开通？与当下可比的 Rogo 或 Glean 企业试点相比，这一过程是快是慢？
    - >-
      是否已有设计合作伙伴基金确认：仅凭带引用备忘录起草这一项能力，就足以支撑每年 $75k–$250k 的支出？他们内部或外部比较的替代方案又是什么？
    - >-
      在某基金尚未积累 12+ 个月工作区数据之前，有哪些证据表明，投资论点级记忆和审批历史工作流已经足以形成有意义的切换成本？
operatingAssumptions:
  - assumption: >-
      主要采购触发点是合规压力——例如内部 AI 禁令或一次险些发生的数据泄露事件——而非主动的业绩优化，因此销售周期主要由紧迫性驱动，而不是依赖咨询式管道培育。
    basis: idea.yaml
    validationTest: >-
      追踪前 10 次合格试点对话中客户明确陈述的触发因素；如果少于 6 次把合规压力列为首要驱动，就应重新审视 ICP 定义与渠道策略。
    decisionImpact: >-
      如果主导性触发因素是业绩优化而非合规紧迫性，销售动作就必须转向 ROI 驱动的演示与更长评估周期，从而提高所需销售编制，并延后首笔收入时间。
  - assumption: >-
      目标基金会接受在其自有 AWS、Azure 或 GCP 环境中进行 customer-VPC 或私有端点部署，而不会一上来就要求完全 air-gap，从而把首批试点的部署复杂度控制在
      2–4 周的安装窗口内。
    basis: research.yaml
    validationTest: >-
      在前 6–8 次设计合作伙伴对话中完成架构范围界定；如果有超过 3 家把完全 air-gap 作为不可协商条件，就应调整部署路线图和定价，以反映额外成本与时间。
    decisionImpact: >-
      完全 air-gap 部署会让安装成本和时间翻倍甚至三倍，需要更高的 ACV 底价，并更早引入专职 solutions engineering 岗位，从而压缩
      seed runway。
  - assumption: >-
      在前期设计合作伙伴场景下，前 5 大目标持牌内容源中，至少有 3 个能在现有供应商合同下接入 customer-VPC
      工作区，而无需在试点开始时就重新谈判。
    basis: research.yaml
    validationTest: >-
      在前 60 天内完成对前 5 大数据供应商合同的法务审查；如果有 2 个或以上核心数据源必须重谈，就应调整连接器路线图，优先支持纯内部内容与
      AlphaSense enterprise API 条款。
    decisionImpact: >-
      如果内容授权在试点启动前就阻断了核心连接器，MVP 的价值主张会明显削弱，因为工作区无法访问那些本来足以支撑 ACV、并使其优于内部自建的持牌数据源。
  - assumption: >-
      一个 3–4 人的创始团队（2 名工程师、1 名 GTM 创始人，以及第 4 个月入职的 1 名 solutions engineer）可以在
      $2–4M 的 seed 融资支持下，于 12 个月内签下 3 个付费设计合作伙伴并交付可用于生产的 MVP。
    basis: operator judgment
    validationTest: >-
      按 18 个月 runway 模型跟踪月度 burn rate；如果部署复杂度或招聘节奏要求在前 6 个月内超过 4 名 FTE，就应在第 4
      个月前重新审视融资额度或里程碑排序。
    decisionImpact: >-
      如果必须在第 6 个月前就招聘专职企业销售负责人，seed runway 会被压缩，届时要么需要更大一轮融资，要么需要更早达成收入里程碑，才能维持
      Series A 时间表。
  - assumption: >-
      一旦基金完成带引用备忘录演示，试点转生产的转化率将达到 55–65%，因为合规签核会释放原本就已为私有 AI 解决方案预留的预算。
    basis: operator judgment
    validationTest: >-
      跟踪前 6 个已完成试点的转化结果；如果转化率低于 40%，就应在启动 Series A 流程前识别阻碍究竟来自定价、竞争替代方案，还是 ROI
      演示不充分，并逐项解决。
    decisionImpact: >-
      若转化率低于 40%，则在 Series A 前必须进行定价或产品转向；若降至 30% 或以下，则 SOM 估算与 seed 到 A 轮的里程碑排序都需要重大修订。
experimentRoadmap:
  - horizon: 0–90天
    experiment: ICP 验证访谈
    hypothesis: >-
      15 位目标研究技术负责人中，至少 8 位会确认内部确有 AI 政策限制，并明确表示愿意评估一套 $75k–$150k 的私有工作区方案。
    successMetric: 8+ 个确认的 ICP 匹配，以及 3+ 场由合规门槛紧迫性驱动的管道对话
    owner: GTM 创始人
  - horizon: 0–90天
    experiment: 数据供应商授权法务审查
    hypothesis: >-
      前 5 个目标持牌数据源中，至少 3 个可以在现有供应商条款下接入 customer-VPC 工作区，而无需重新谈判。
    successMetric: 针对前 5 个数据源形成书面法务意见，并确认其中 3+ 个存在可行接入路径
    owner: 创始工程师 + 外部法律顾问
  - horizon: 0–90天
    experiment: VPC 部署原型
    hypothesis: >-
      从空白环境出发，带有 2 个连接器和会话审计日志的最小工作区运行时，可以在 10 个工作日内完成一次测试 AWS VPC 内部署。
    successMetric: 在 10 个工作日内完成可复现部署，并形成成文参考架构
    owner: 创始工程师
  - horizon: 90–180天
    experiment: 设计合作伙伴试点 1
    hypothesis: >-
      一家拥有 15–50 名分析师的基金，可以在一次分析师会话内生成一份带引用的财报前准备备忘录草稿，而其合规团队可以审阅完整会话日志并批准该工作流扩大使用。
    successMetric: 试点基金确认带引用备忘录演示通过内部安全审查，并提出生产合同需求
    owner: GTM 创始人 + 解决方案工程师
  - horizon: 90–180天
    experiment: 连接器扩展 bake-off
    hypothesis: >-
      在仅使用内部内容的基础上，再增加 AlphaSense 和一个专家网络连接器后，分析师在首稿备忘录准备上的时间节省将提升 40% 以上。
    successMetric: 试点中通过前后对比测量，验证首稿准备时间下降 40%+
    owner: 创始工程师
  - horizon: 180–365天
    experiment: 合规渠道合作
    hypothesis: >-
      在正式建立转介合作安排后的 6 个月内，一家合规顾问或 prime broker 技术团队至少会转介 2 家符合条件的 ICP 基金。
    successMetric: 合作渠道在 6 个月内带来 2 个暖介绍，并转化为试点对话
    owner: GTM 创始人
  - horizon: 180–365天
    experiment: 从试点转化年度合同
    hypothesis: >-
      前 5 个设计合作伙伴试点中，至少 3 个会转化为 ACV 不低于 $75k 的年度生产合同。
    successMetric: 到第 12 个月签下 3 份年度合同，合计至少 $300k ARR
    owner: GTM 创始人
operations:
  - "部署自动化采用基础设施即代码模板（Terraform 或 CDK），以便在 AWS、Azure 和 GCP 上可复现地完成 customer-VPC 与私有端点 rollout"
  - "连接器集成以带版本的适配器形式维护；持牌数据源的权限校验在查询时直接对基金提供的权限表执行，而不是集中化任何内容"
  - "会话审计日志仅存放于客户自有环境中，并可按需导出到基金的 SIEM 或合规归档系统"
  - "工作区记忆与引用图谱使用客户 VPC 内自托管的向量库；任何 embedding 或检索数据都不会跨出客户边界"
  - "客户成功节奏与财报日历绑定，在每个重要财报季前进行部署复盘，并按季度与基金法务团队进行合规 check-in"
team:
  - role: 创始基础设施工程师
    startTiming: 第0个月
    rationale: >-
      VPC 部署、连接器架构、审计日志与工作区运行时构成了产品的技术核心，必须在任何销售动作开始前就到位；该角色负责每一次部署的可复现性与安全姿态。
  - role: 创始 GTM 与销售工程师
    startTiming: 第0个月
    rationale: >-
      对冲基金销售需要一个具备技术公信力的对手方，能够穿越安全审查、实时设计部署方案并主导 bake-off；在验证 product-market fit
      之前，创始人主导销售是唯一可行的打法。
  - role: 创始产品与第二位工程师
    startTiming: 第1个月
    rationale: >-
      连接器深度、投资论点记忆与工作流模板都需要第二个工程资源，才能在早期客户部署和连接器建设并行推进的情况下按时交付完整 MVP。
  - role: 解决方案工程师（首位招聘）
    startTiming: 第4个月
    rationale: >-
      在客户 VPC 内执行设计合作伙伴部署，需要专门的 solutions engineering 带宽，避免创始团队在交付产品时被实施工作拖住；应在第二个试点项目启动时完成招聘。
milestones:
  - horizon: 0–12个月
    items:
      - "到第 9 个月签下 3 份设计合作伙伴试点合同，每份 $25k–$35k"
      - "在 AWS 和 Azure 上交付可复现的 VPC 与私有端点部署，安装时间控制在 10 个工作日以内"
      - "完成内部文档存储、AlphaSense、CapIQ 及一个专家网络数据源的连接器建设"
      - "在试点客户 1 上证明带引用的财报前准备备忘录草稿可以通过合规审查"
      - "到第 12 个月将 2 个试点转化为年度生产合同，每份 ACV 为 $75k–$150k"
  - horizon: 12–24个月
    items:
      - "在 5–7 家生产基金客户中做到 $500k–$800k ARR"
      - "交付多工作区治理与基金级部署工具包"
      - "上线 watchlist 自动化与审批链配置，并作为付费高级模块销售"
      - "与一个 prime-broker 或合规技术生态签下首个渠道合作"
      - "在至少还剩 6 个月 runway 的前提下完成 Series A 融资流程"
  - horizon: 24–36个月
    items:
      - "在 12–15 家基金及相邻垂直客户中做到 $2M–$3M ARR"
      - "推出适用于信贷基金和私募股权 deal team 工作流的工作区模块"
      - "建立认证连接器市场，并接入 3+ 家第三方数据供应商"
      - "通过扩容席位与高级模块加售，将净收入留存率证明到 120% 以上"
risks:
  - risk: >-
      在公司尚未建立 3+ 个生产 logo、并形成有记录的切换成本之前，incumbent 研究套件（AlphaSense）或金融 copilots（Rogo）就推出了可信的自托管或私有部署方案。
    likelihood: Medium
    impact: High
    mitigation: >-
      尽快推进设计合作伙伴部署，先建立切换成本证据；把自身定位为有明确观点的研究室运行时，而不是内容源，这样 incumbents 即便延伸到私有部署，也更可能成为集成伙伴而不是完全替代品。
  - risk: >-
      更成熟的基金研究技术团队决定使用 Onyx 或开源组件自建一套可比的内部技术栈，而不是购买打包工作区方案。
    likelihood: Medium
    impact: High
    mitigation: >-
      在投产速度、连接器打磨程度和合规级可审计性上取胜；内部自建通常需要 12–18 个月，而且无法开箱即用地提供财报前准备模板、权限镜像和基金合规团队要求的会话回放能力。
  - risk: >-
      早期试点中一旦出现引用错误、幻觉性判断或未授权导出，就会毁掉首个客户的信任，并在高度集中的对冲基金买方圈层中引发负面口碑。
    likelihood: Low
    impact: High
    mitigation: >-
      在生成阶段把引用覆盖设为硬性系统约束（而非 UI 选项），从第一天起就上线严格的导出门控，并在任何输出离开工作区边界前保留 human-in-the-loop 审批步骤。
  - risk: >-
      持牌内容的权限约束，使最有价值的数据源（专家网络、券商研究）无法在不进行高成本重谈的情况下接入，从而推迟试点并提高 ACV 说服难度。
    likelihood: Medium
    impact: Medium
    mitigation: >-
      在 MVP 连接器套件中优先覆盖纯内部内容和 AlphaSense enterprise API 条款；待法务审查确认导入条款兼容后，再按顺序推进券商研究与专家网络连接器。
  - risk: >-
      对冲基金采购和安全审查周期若被证明长于 6 个月，就可能在达到 Series A 所需的 3-logo 可信里程碑之前耗尽 seed runway。
    likelihood: Medium
    impact: High
    mitigation: >-
      优先锁定存在明确合规触发事件的基金，以缩短决策时间；并把试点设计为 $25k–$35k 的付费 engagement，在评估期内创造早期收入，重置有效 burn
      clock。
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    这 18 个月 runway 将用于搭建一个 3–4 人的创始团队（2 名工程师，加上 GTM 创始人，以及第 4 个月到位的 solutions
    engineer），完成面向 AlphaSense 和内部数据源的 VPC 与私有端点部署及核心连接器，签下 3–5 份设计合作伙伴合同，并证明 2+
    个年度生产转化、且每个 ACV 为 $75k–$150k——从而拿到推进 Series A 所需的 ARR 证据与产品验证。
