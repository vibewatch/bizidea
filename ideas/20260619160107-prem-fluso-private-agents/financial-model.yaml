slug: research-vault-agent-workspace
date: "2026-06-19"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-07"
    unit: month
    source: "[BP date] Base case starts in the month after the business plan date."
  - id: A2
    name: "Starting cash after seed close"
    value: "2.0"
    unit: USDM
    source: "[BP fundingAsk targetFundingRangeUsd] Uses the low end of the stated $2–4M seed range because paid pilots offset burn and the hiring plan stays lean."
  - id: A3
    name: "Revenue recognition rule"
    value: "Average active paying customers in period × blended customer-year revenue"
    unit: formula
    source: "[Startup-finance heuristic] Uses beginning and ending paying-customer counts so revenue reconciles cleanly to the customer ramp without deferred-revenue modeling."
  - id: A4
    name: "Blended annual revenue per active paying fund"
    value: "190.0"
    unit: "USDK per customer-year"
    source: "[BP gtm.pricing; BP market.som; Research market.som] Blends the $75k–$250k annual license range with setup fees and early premium-module attach, while staying below the roughly $200k SOM exit value."
  - id: A5
    name: "Gross margin"
    value: "75"
    unit: percent
    source: "[BP businessModel targetGrossMarginPct] Keeps VPC deployment support, inference, and connector servicing inside a 25% COGS envelope."
  - id: A6
    name: "Monthly churn"
    value: "2.0"
    unit: percent
    source: "[Startup-finance heuristic] Assumes private deployed fund software is sticky after go-live, but still discounts for an early category with few completed renewal cycles."
  - id: A7
    name: "Blended CAC"
    value: "55.0"
    unit: "USDK per customer"
    source: "[BP gtm channels and funnelTargets; BP market.buyingProcess] Founder-led enterprise selling plus warm compliance-channel intros supports a high-touch but still efficient CAC for six-figure contracts."
  - id: A8
    name: "Starting paying customers"
    value: "0"
    unit: count
    source: "[BP milestones 0–12 months] Model begins pre-revenue before the first design-partner pilot contract lands."
  - id: A9
    name: "Y1 customer landing pattern"
    value: "Month-end customers 0,0,0,1,1,1,2,2,3,3,3,3"
    unit: count
    source: "[BP milestones 0–12 months] Matches 3 paid design-partner pilots by month 9 and 2 pilot-to-production conversions by month 12 without assuming extra logos."
  - id: A10
    name: "Y2 quarter-end customers"
    value: "Q1Y2 4; Q2Y2 4; Q3Y2 5; Q4Y2 5"
    unit: count
    source: "[BP milestones 12–24 months] Anchors the base case to the low end of the stated 5–7 production customers by month 24."
  - id: A11
    name: "Y3 quarter-end customers"
    value: "Q1Y3 7; Q2Y3 9; Q3Y3 12; Q4Y3 15"
    unit: count
    source: "[BP milestones 24–36 months] Reaches the plan target of 12–15 customers and about $2.85M exit ARR by year 3."
  - id: A12
    name: "Founder GTM and sales-engineer loaded cash compensation"
    value: "108.0"
    unit: "USDK per year"
    source: "[BP team Founding GTM and sales engineer] Startup-finance heuristic for a below-market founder salary plus payroll burden."
  - id: A13
    name: "Founding engineer loaded cash compensation"
    value: "165.0"
    unit: "USDK per year"
    source: "[BP team Founding infrastructure engineer; BP team Founding product and second engineer] Startup-finance heuristic for senior product and infra engineering cash comp plus payroll burden."
  - id: A14
    name: "Solutions engineer loaded cash compensation"
    value: "144.0"
    unit: "USDK per year"
    source: "[BP team Solutions engineer] Startup-finance heuristic for implementation-heavy enterprise deployment talent."
  - id: A15
    name: "First expansion engineer loaded cash compensation"
    value: "165.0"
    unit: "USDK per year"
    source: "[BP product twelveMonth; BP strategicChoices sequencingRationale] Adds one engineer after the core deployment stack is proven so connector depth can expand without hiring ahead of revenue."
  - id: A16
    name: "First GTM hire loaded cash compensation"
    value: "138.0"
    unit: "USDK per year"
    source: "[BP strategicChoices sequencingRationale; BP gtm channels] Startup-finance heuristic for the first non-founder seller once production references exist."
  - id: A17
    name: "Customer success and implementation loaded cash compensation"
    value: "120.0"
    unit: "USDK per year"
    source: "[BP operations; BP milestones 24–36 months] Startup-finance heuristic for post-sale onboarding and earnings-cycle customer support."
  - id: A18
    name: "Second expansion engineer loaded cash compensation"
    value: "165.0"
    unit: "USDK per year"
    source: "[BP product twentyFourMonth; BP milestones 24–36 months] Supports adjacent workflow modules and connector breadth only after the first repeatable hedge-fund playbook is live."
  - id: A19
    name: "Hiring cadence"
    value: "Founder GTM plus 2 engineers in M1; solutions engineer in M4; expansion engineer in M18; first GTM hire in M20; customer success and implementation in M27; second expansion engineer in M30"
    unit: timing
    source: "[BP team startTiming; BP strategicChoices sequencingRationale; BP fundingAsk useOfFundsSummary] Extends the named founding plan with only 3 later hires so the model reaches 15 logos without vanity headcount."
  - id: A20
    name: "Non-payroll sales and marketing spend"
    value: "7K M1–M12; 9K M13–M24; 12K M25–M36"
    unit: "USDK per month"
    source: "[Startup-finance heuristic] Covers travel, security-review support, legal collateral, and selling tools for a founder-led enterprise motion."
  - id: A21
    name: "Non-payroll research and development spend"
    value: "8K M1–M6; 10K M7–M18; 12K M19–M36"
    unit: "USDK per month"
    source: "[Startup-finance heuristic] Covers cloud, model usage, connector QA, and deployment tooling as the product moves from MVP to multi-workspace support."
  - id: A22
    name: "Non-payroll general and administrative spend"
    value: "8K M1–M12; 10K M13–M24; 12K M25–M36"
    unit: "USDK per month"
    source: "[Startup-finance heuristic] Reflects legal review, compliance overhead, insurance, and baseline admin for a financial-software vendor."
  - id: A23
    name: "Use-of-funds allocation"
    value: "Engineering 47%; GTM 21%; G&A 10%; Buffer 22%"
    unit: percent
    source: "[BP fundingAsk useOfFundsSummary; A19–A22] Engineering carries product, deployment, and implementation capacity; GTM remains founder-heavy; the rest funds admin and a 6-month reserve."
  - id: A24
    name: "Cash conversion policy"
    value: "EBITDA approximates cash movement"
    unit: policy
    source: "[Startup-finance heuristic] No debt, taxes, capex, or material working-capital swings are modeled for this early-stage software company."
  - id: A25
    name: "Next-round milestone"
    value: "Reach 12 production customers, about $2.3M exit ARR, and the first repeatable premium-module upsells by Q3Y3 while keeping at least 6 months of cash buffer"
    unit: milestone
    source: "[BP milestones 12–24 months; BP milestones 24–36 months; BP fundingAsk runwayMonths] Used to size the seed round and reserve."
