competitors:
- name: Prem / Fluso
  stage: scale-up
  wedge: 具备机密计算能力的加密 agent 工作空间，可支持自托管、VPC 或物理隔离部署。
  pricing: 有限开放 / 定制企业版
  strength: 在可验证隐私、开源模型和部署控制上的叙事最强。
  weaknessVsUs: 目前仍是跨行业工作流平台，而不是一套带 thesis memory 和备忘录审批的、立场鲜明的对冲基金研究室。
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
- name: Rogo
  stage: scale-up
  wedge: 面向金融的研究、分析与报告 AI 工作流自动化。
  pricing: 定制 / 企业版
  strength: 金融聚焦明确，且已有真实商业牵引证据。
  weaknessVsUs: 更像 copilot/工作流层，而不是为自托管专有语料设计的私有研究室控制边界。
  sourceRefs:
  - 31
  - 32
- name: Palantir AIP
  stage: incumbent
  wedge: 具备 BYOM、治理和安全工作流自动化能力的企业 AI 操作系统。
  pricing: 定制 / 企业版
  strength: 安全性、可审计性和模型/部署灵活性都很强。
  weaknessVsUs: 体系较重且面向全企业；许多对冲基金会更想先上一个更聚焦的研究室产品。
  sourceRefs:
  - 27
  - 28
  - 29
  - 30
- name: Glean
  stage: scale-up
  wedge: 具备权限感知的 Work AI，支持 agents、actions 与 275+ 连接器。
  pricing: 定制 / 企业版
  strength: 连接器覆盖广，单租户/私有部署叙事也扎实。
  weaknessVsUs: 更偏通用企业知识工作，而非买方研究工作流深度。
  sourceRefs:
  - 23
  - 24
  - 25
  - 26
- name: Onyx
  stage: seed
  wedge: 开源自托管企业搜索与 agent 平台。
  pricing: 开源 + 企业版
  strength: 高可配置、自托管、连接器丰富，是可信的内部自建起点。
  weaknessVsUs: 买方仍需自行完成工作流设计、治理加固和对冲基金场景产品化。
  sourceRefs:
  - 36
