  sensitivityCases:
  - case: 托管式私有模型对大多数基金来说已经足够好
    impact: 如果零保留、私链托管模型已经能满足大多数买方，那么“完全自托管”就会从默认要求退化为高级选项，产品楔子将更偏向控制与工作流体验。
    sourceRefs:
    - 17
    - 19
    - 23
    - 28
  - case: 研究套件延伸进私有 agent 工作流
    impact: 如果 AlphaSense 一类套件继续从搜索走向高度自动化的内部内容工作流，创业公司就必须掌握控制边界与审批路径，而不是只负责起草环节。
    sourceRefs:
    - 8
    - 33
    - 34
    - 35
  - case: 较小管理人继续对公共工具保持宽松
    impact: 如果规模低于 10 亿美元、团队更精简的基金继续在轻量政策下允许使用公共工具，销售可能只会集中在较大基金，从而放慢早期 logo 增长。
    sourceRefs:
    - 5
    - 6
    - 7
  validationPlan:
  - priority: high
    question: 基金会购买独立私有工作空间，还是更愿意在 AlphaSense、内部 notebook 或通用安全 Work AI 之上扩展？
    evidenceToGather: 与美国和英国的多空股票基金做 10 场买方访谈，并至少开展 3 次与现有研究栈的现场对比试用。
  - priority: high
    question: 哪些授权内容类型可以在不重谈供应商条款的前提下，合法导入并存储在私有 agent 工作空间中？
    evidenceToGather: 开展数据供应商合同审查、获取法律顾问反馈，并在电话会议纪要、专家网络、券商研究和内部笔记上做连接器级试点。
  - priority: medium
    question: '哪种部署偏好最常胜出：客户 VPC、供应商专属云，还是完全物理隔离？'
    evidenceToGather: 通过设计伙伴架构研讨、基础设施范围数据，以及前 6-8 个潜在客户间的实施时间线对比来验证。
