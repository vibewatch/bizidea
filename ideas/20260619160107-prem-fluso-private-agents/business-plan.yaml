slug: research-vault-agent-workspace
date: '2026-06-19'
executiveSummary: >-
  Fundamental hedge funds have moved from AI experimentation to active front-office
  pilots, but governance deadlock—not model quality—is the gating blocker: proprietary
  research notes, expert-network transcripts, and licensed content cannot leave the
  firm's controlled environment, so generic cloud AI tools are either banned or ignored.
  Research Vault Agent Workspace closes that gap with an encrypted workspace deployed
  inside the fund's own VPC or on-prem environment, combining thesis-scoped agent
  memory, citation-required memo drafting, and policy-aware export controls into one
  auditable research runtime. The immediate beachhead is US and UK fundamental long/short
  equity funds with $1B–$20B AUM, 15–50 analysts, and an active internal AI policy
  restricting public tool use—a segment where compliance urgency creates a defined
  buying trigger rather than a consultative sales cycle. AIMA research confirms 95% of
  surveyed alternative managers already use GenAI and 58% expect greater investment-process
  use, establishing market readiness; the SAM is approximately $120M across ~650 US/UK
  serviceable fund logos at a ~$180k blended ACV. Prem AI's Fluso launch and reported
  $100M Series A confirm investor and founder conviction in private agent workspaces as
  a category, but no competitor yet packages VPC deployment, hedge-fund workflow
  templates, and compliance-grade auditability into a single opinionated research room.
  A $2–4M seed round funds 18 months to sign 3–5 design-partner contracts, ship VPC
  and private-endpoint deployment with core connectors, and demonstrate cited-memo
  workflows passing fund compliance review—providing the ARR and product proof needed
  for a Series A. Key risks are internal-build temptation from larger funds and
  accelerating competition from Rogo and Prem Fluso, mitigated by moving fast on
  design-partner deployments to establish switching cost before incumbents extend into
  private-workspace territory.

problem:
  - >-
    Proprietary research—internal notes, expert-network transcripts, licensed broker
    analysis, and earnings prep documents—cannot be sent to public AI APIs without
    competitive and regulatory exposure, so analysts at fundamental hedge funds cannot
    let agents touch the most valuable parts of their corpus.
  - >-
    No packaged workspace runtime combines VPC or on-prem deployment, thesis-scoped
    memory, citation enforcement, and export approval into one auditable boundary; funds
    that try to build one internally face 12–18 months of engineering work and still
    lack the compliance-grade replay logs that approval requires.
  - >-
    Compliance teams cannot authorize broad agent deployment without a full session log
    showing what an agent accessed, what it generated, and what left the approved
    environment—creating a policy deadlock that manual research workflows do not resolve
    and that current research suites or enterprise work-AI tools do not address.

solution:
  - >-
    Encrypted research-room workspace deployed inside the fund's own VPC or private
    cloud endpoint, with connectors to approved internal and licensed sources, thesis-
    and ticker-scoped agent memory, and citation-required draft generation that traces
    every claim to a retrievable source inside the controlled boundary.
  - >-
    Policy-aware export controls and per-session audit logs stored in the customer's own
    environment, giving compliance teams a complete replay of every agent action,
    retrieval step, and output before anything can leave the workspace—turning compliance
    approval from a blocker into a documented feature.
  - >-
    Reusable earnings-prep and investment-memo workflow templates that reduce analyst
    setup from weeks to hours, without requiring the fund's research-tech team to build
    or maintain internal platform engineering for connectors, memory, or approval chains.

whyWeWin:
  - >-
    No existing product combines VPC-first deployment, hedge-fund-specific thesis memory,
    citation enforcement, and compliance-grade audit trails in one opinionated research
    runtime: AlphaSense is content-centric rather than a fund-owned runtime, Glean is
    generic enterprise knowledge work, and Palantir requires a broader cross-enterprise
    rollout that many mid-sized funds will not accept for a first research-room rollout.
  - >-
    Time-to-compliant-production inside a fund's own infrastructure is faster than any
    internal build: the startup ships connector templates, reference VPC architectures,
    and earnings-prep workflow templates that lean research-tech teams cannot replicate
    without 12–18 months of internal development and ongoing maintenance.
  - >-
    Thesis-scoped workspace memory, approval history, and fund-specific research
    playbooks compound into an operational data layer that is costly to migrate, creating
    organic switching cost above the commodity model or search layer before any
    contract renewal.

strategicChoices:
  beachhead: >-
    US and UK fundamental long/short equity hedge funds with $1B–$20B AUM, 15–50
    analysts, a central research-tech lead, and an existing internal policy banning
    or restricting public AI tools on proprietary research notes or expert-network
    transcripts.
  wedgeRationale: >-
    Cited earnings-prep memo drafting is the sharpest first use case because it has a
    visible and time-bound buying trigger (upcoming earnings season or post-ban urgency),
    a measurable success metric (50%+ reduction in first-draft prep time with full
    citation coverage), and it requires the full private-workspace stack—VPC deployment,
    licensed connectors, thesis memory, and export policy—to work correctly. A narrower
    entry such as simple document summarization would not stress-test the value
    proposition or justify the $75k–$250k ACV.
  sequencingRationale: >-
    VPC and private-endpoint deployment comes first because clearing the compliance gate
    unlocks budget that is already allocated for a private AI solution. Connector depth
    (internal stores, then AlphaSense and CapIQ, then expert networks) follows once the
    runtime is trusted. Earnings-prep templates and thesis memory ship before watchlist
    automation, because memo drafting creates faster and more measurable ROI. GTM leads
    with founder-direct design-partner sales before adding compliance-consultant and
    prime-broker channels, because early deals require deep technical trust rather than
    pipeline volume. Engineering is hired before enterprise sales headcount because
    the first gate is deployment credibility, not deal count.
  notYet:
    - >-
      Law firms and corporate development deal teams: adjacent confidential knowledge
      work but requiring different connectors and workflow templates; defer until
      3+ hedge-fund logos are in production and the deployment playbook is repeatable.
    - >-
      Public-cloud-only multi-tenant SaaS deployment: the beachhead explicitly requires
      private deployment and multi-tenancy would undermine the core compliance message.
    - >-
      Credit funds and private equity deal teams: similar workspace model but different
      source ecosystems (credit databases, cap table tools); defer until the hedge-fund
      connector suite is proven.
    - >-
      General-purpose enterprise AI platform positioning: broadening the product
      message dilutes the opinionated hedge-fund workflow advantage that justifies
      founder-direct pricing.

market:
  tam: "~$0.4B (est.): ~2,200 global research-intensive fundamental and multi-strategy fund logos × ~$180k blended annual ACV"
  sam: "~$120M (est.): ~650 US/UK beachhead logos matching the 15–50 analyst profile × ~$180k ACV"
  som: "~$3.6M by year 3 (est.): 18 production fund logos × ~$200k blended ACV after design-partner seat expansion"
  segments:
    - "Primary: US and UK fundamental long/short equity funds, $1B–$20B AUM, 15–50 analysts, active AI research pilots with existing internal-use policy"
    - "Secondary: Multi-manager investment platforms standardizing secure research tooling across analyst pods"
  buyingProcess: >-
    Decisions are led by the COO, CTO, or head of research platform with compliance and
    legal as veto-holders; procurement typically requires a security review and
    data-handling assessment, placing the sales cycle at 3–6 months from first qualified
    conversation to deployment start, with a 60–90 day paid pilot as the standard
    conversion path.

product:
  mvp: >-
    VPC or private-endpoint deployment package with connectors for internal document
    stores and 2–3 licensed research sources (targeting AlphaSense and internal notes),
    thesis-scoped workspace memory, citation-required memo drafting, and a full session
    audit log—scoped to deliver a first cited earnings-prep draft in one analyst session.
  sixMonth: >-
    Expanded connector suite covering AlphaSense, CapIQ, and at least one expert-network
    transcript source; earnings-prep and initiation-memo workflow templates; multi-ticker
    watchlist agents; compliance dashboard for per-session audit review and export
    approval.
  twelveMonth: >-
    Multi-workspace governance for fund-wide deployment across research teams, source-
    entitlement mirroring and permission inheritance per connector, configurable
    approval-chain policies per workspace type, and a deployment toolkit supporting
    customer-VPC and dedicated-cloud topologies on AWS, Azure, and GCP.
  twentyFourMonth: >-
    Expansion workspace modules for credit and private equity deal-team workflows,
    cross-workspace research-playbook sharing, automated source-entitlement renewal
    tracking, and a certified connector marketplace for third-party data vendors.
  keyBets:
    - >-
      VPC-first deployment removes the compliance veto faster than any competing path
      to production and is the primary reason funds choose this over extending an
      existing research suite.
    - >-
      Citations as a first-class system constraint (not a UI option) are necessary for
      analyst trust and for regulatory defensibility under existing securities frameworks.
    - >-
      Earnings-prep templates create a repeatable, measurable ROI signal within one
      quarter of deployment, shortening the pilot-to-production conversion path.
    - >-
      Connector depth and source-entitlement mirroring logic become the primary
      switching cost over time because migrating workspace memory and connector
      configurations is operationally expensive for a lean research-tech team.

gtm:
  wedge: >-
    Founder-direct design-partner sales to funds whose compliance teams have already
    banned or restricted public AI tools, positioning the workspace as the fastest
    compliant path from AI pilot to production before the next earnings cycle—
    targeting funds with active urgency rather than exploratory interest.
  channels:
    - Founder-led direct sales to COOs, CTOs, and heads of research technology at target funds
    - Compliance advisors and legal counsel serving hedge funds as warm-introduction channels
    - Prime-broker and research-data-vendor technology ecosystems for later-stage referral pipeline
  funnelTargets: "ICP meeting → qualified pilot: 25–35%; qualified pilot → annual production contract: 55–65%"
  pricing: >-
    Annual platform license of $75k–$250k per fund depending on deployment complexity and
    connector count, plus a one-time setup and integration fee of $15k–$40k; subsequent
    expansion priced by additional active workspace count or analyst seat tier. Rationale:
    sells into existing research-tech and compliance budgets rather than creating a new
    line item, and the pilot structure ($25k–$35k paid engagement) generates early revenue
    and de-risks the annual contract decision.

businessModel:
  revenueStreams:
    - Annual platform subscription priced by active workspace count or analyst seat tier
    - One-time setup and integration fee for VPC deployment and source connectors
    - Premium modules for approval-workflow configuration, watchlist automation, and research-archive governance
  unitOfValue: Active research workspace per fund deployment
  targetGrossMarginPct: 75
  expansionLevers:
    - Seat or workspace expansion within existing fund customers as analyst adoption grows beyond initial pilot team
    - Premium-module upsell (watchlist automation, advanced approval chains, cross-workspace playbook sharing)
    - Expansion into adjacent verticals (credit funds, PE deal teams, law firms) reusing the same deployment and connector infrastructure

strategyMap:
  northStarMetric: Active research workspaces in production across paying fund customers
  inputMetrics:
    - Pilot-to-production conversion rate (target above 55%)
    - Cited memo drafts generated per active workspace per month
    - Analyst adoption rate within deployed workspaces
    - Source connector integrations live per customer
  moatsToBuild:
    - Thesis- and ticker-scoped workspace memory per fund (operationally expensive to migrate)
    - Fund-specific approval history and research-playbook templates accumulated over earnings cycles
    - Connector depth and source-entitlement mirroring logic covering licensed and internal sources
    - Deployment telemetry from VPC and private-endpoint installs hardening future reference architectures
  killCriteria:
    - Fewer than 3 paying design-partner contracts signed by month 9 of operations
    - Pilot-to-production conversion rate below 35% after 4 completed pilots
    - AlphaSense or Rogo ship a credible VPC-first hedge-fund research room preferred by 2+ target funds in direct bake-offs
    - No pilot customer achieves 40%+ reduction in first-draft memo prep time after 60 days of production use
  mermaid: |
    flowchart LR
      Wedge[Earnings-prep memo wedge] --> MVP[VPC workspace MVP]
      MVP --> Pilot[Design-partner pilots]
      Pilot --> Proof[Cited memo ROI + compliance audit pass]
      Proof --> Contract[Annual production contracts]
      Contract --> Expand[Seat and workspace expansion]
      Expand --> Adjacency[Credit / PE / law firm expansion]

investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: >-
      Credible, compliance-driven pain with identifiable buyers and an opinionated
      wedge, but the market is narrow and better-funded competitors are converging
      on the same territory.
    whyBelieve: >-
      95% of surveyed alternative managers already use GenAI and the stated blocker is
      governance trust—not model quality—making a private control boundary the enabling
      product for agent adoption rather than a discretionary upgrade.
    whyDoubt: >-
      Rogo already has multi-million ARR in finance AI workflows and Prem Fluso is
      pursuing a $100M Series A explicitly targeting hedge funds, compressing the window
      to establish a differentiated private-workspace position before a well-capitalized
      competitor owns the category.
    nextDiligence: >-
      Confirm that at least 5 target US/UK funds with $1B–$20B AUM have an active
      documented ban on public AI tools for research and a stated willingness to evaluate
      a $75k–$250k annual private workspace contract within 6 months.
  firstCustomer:
    title: Head of Research Technology at a US fundamental long/short equity hedge fund
    profile: >-
      $2B–$10B AUM fund with 20–40 analysts, an active AlphaSense or CapIQ subscription,
      and an internal policy memo restricting use of public AI tools on proprietary
      research notes or expert-network transcripts—with a research-tech lead who owns
      the backlog of unfulfilled internal AI workflow requests.
    trigger: >-
      Compliance directive issued after a staff member is found using a public AI tool
      for earnings-prep memo drafting, or a decision to deploy research agents ahead of
      a major earnings season with no viable internal build available in time.
    buyer: COO or CTO with compliance and legal as non-negotiable veto-holders
    initialContract: >-
      $25k–$35k paid pilot lasting 60–90 days converting to a $100k–$150k annual
      production contract upon successful cited-memo demonstration and internal security
      review sign-off.
  mustBeTrue:
    - >-
      At least 10% of US/UK fundamental hedge funds in the $1B–$20B AUM range have an
      active documented policy restricting public AI use on proprietary research,
      creating an addressable beachhead of 60+ logos without requiring broad market
      education about the problem.
    - >-
      Funds will pay $75k–$250k annually for a private workspace rather than extend an
      existing research suite or build internally, because time-to-compliant-production
      beats both alternatives for a fund with active earnings-season urgency.
    - >-
      No incumbent—AlphaSense, Rogo, Glean, or Palantir—ships a compelling VPC-first
      hedge-fund research room with thesis memory and citation enforcement that is
      preferred by target funds in direct bake-offs within 18 months.
    - >-
      Thesis-scoped workspace memory and approval history create sufficient switching
      cost that at least 80% of design-partner funds renew at or above initial contract
      value after 12 months of production use.
    - >-
      A founding team of 3–4 people can close 3 paying design-partner contracts at
      $75k–$150k ACV each within 12 months without enterprise sales headcount beyond
      the founding team.
  diligenceQuestions:
    - >-
      How many target US/UK funds in the $1B–$20B AUM range have a documented internal
      policy restricting public AI tool use on proprietary research, and what share have
      an active budget line for a compliant private alternative?
    - >-
      Which licensed content types—AlphaSense, expert-network transcripts, broker
      research—can legally be ingested into a third-party-managed private workspace
      under current vendor terms without renegotiation, and which require it?
    - >-
      What is the realistic end-to-end deployment timeline inside a fund's VPC including
      security review, procurement, and infrastructure provisioning, and how does this
      compare to a comparable Rogo or Glean enterprise pilot today?
    - >-
      Has any design-partner fund confirmed that cited memo drafting alone justifies a
      $75k–$250k annual spend, and what internal or vendor alternative are they
      measuring it against?
    - >-
      What evidence exists that thesis-scoped memory and approval-history workflows
      create meaningful switching cost before a fund has 12+ months of accumulated
      workspace data?

operatingAssumptions:
  - assumption: >-
      The primary buying trigger is compliance pressure—an internal AI ban or near-miss
      data-leak event—rather than proactive performance optimization, meaning sales
      cycles are driven by urgency rather than consultative pipeline development.
    basis: idea.yaml
    validationTest: >-
      Track the stated trigger for each of the first 10 qualified-pilot conversations;
      if fewer than 6 cite compliance pressure as the primary driver, revisit ICP
      definition and channel strategy.
    decisionImpact: >-
      If the dominant trigger is performance optimization rather than compliance urgency,
      the sales motion shifts to ROI-led demos with longer evaluation cycles, increasing
      required sales headcount and extending time to first revenue.
  - assumption: >-
      Target funds will accept customer-VPC or private-endpoint deployment on their own
      AWS, Azure, or GCP environment rather than demanding full air-gap, keeping
      deployment complexity within a 2–4 week setup window for the first pilots.
    basis: research.yaml
    validationTest: >-
      Architecture scoping in the first 6–8 design-partner conversations; if more than
      3 require full air-gap as a non-negotiable condition, revise the deployment
      roadmap and pricing to reflect the additional cost and timeline.
    decisionImpact: >-
      Full air-gap deployment doubles or triples setup cost and time, requiring a higher
      ACV floor and a dedicated solutions-engineering hire earlier than planned,
      compressing seed runway.
  - assumption: >-
      At least 3 of the top 5 target licensed content sources can be ingested into a
      customer-VPC workspace under existing vendor contracts for initial design partners,
      without requiring renegotiation at the start of pilots.
    basis: research.yaml
    validationTest: >-
      Legal review of top 5 data-vendor contracts within the first 60 days; if
      renegotiation is required for 2 or more core sources, adjust the connector
      roadmap to prioritize fully internal content and AlphaSense enterprise API terms first.
    decisionImpact: >-
      If content entitlements block core connectors before pilots launch, the MVP value
      proposition weakens significantly because the workspace cannot access the licensed
      sources that justify the ACV versus an internal build.
  - assumption: >-
      A founding team of 3–4 people (2 engineers, 1 GTM founder, 1 solutions engineer
      hired by month 4) can sign 3 paying design partners and ship a production-ready
      MVP within 12 months on a $2–4M seed round.
    basis: operator judgment
    validationTest: >-
      Monthly burn-rate tracking against 18-month runway model; if deployment complexity
      or hiring pace requires more than 4 FTEs in the first 6 months, revisit the
      funding ask or milestone sequencing before month 4.
    decisionImpact: >-
      If a dedicated enterprise sales lead must be hired before month 6, seed runway is
      compressed and either a larger raise or an accelerated revenue milestone is
      required to maintain the Series A timeline.
  - assumption: >-
      The pilot-to-production conversion rate will be 55–65% once funds reach the
      cited-memo demonstration milestone, because compliance sign-off unlocks budget
      that was already earmarked for a private AI solution.
    basis: operator judgment
    validationTest: >-
      Track conversion outcomes for the first 6 completed pilots; if conversion falls
      below 40%, identify whether the blocker is pricing, competitive alternatives,
      or insufficient ROI demonstration and address before the Series A process.
    decisionImpact: >-
      A conversion rate below 40% requires a pricing or product pivot before Series A;
      at or below 30%, the SOM estimate and seed-to-A milestone sequencing require
      material revision.

experimentRoadmap:
  - horizon: 0–90 days
    experiment: ICP validation interviews
    hypothesis: >-
      At least 8 of 15 target heads of research technology will confirm an active
      internal AI policy restriction and a stated willingness to evaluate a $75k–$150k
      private workspace solution.
    successMetric: 8+ confirmed ICP matches and 3+ pipeline conversations with compliance-gate urgency
    owner: GTM founder
  - horizon: 0–90 days
    experiment: Data-vendor entitlement legal review
    hypothesis: >-
      At least 3 of the top 5 target licensed sources can be ingested into a customer-VPC
      workspace under existing vendor terms without renegotiation.
    successMetric: Written legal opinion covering top 5 data sources with confirmed ingest path for 3+
    owner: Founding engineer plus outside counsel
  - horizon: 0–90 days
    experiment: VPC deployment prototype
    hypothesis: >-
      A minimal workspace runtime with 2 connectors and session audit logging can be
      deployed inside a test AWS VPC in under 10 business days from a blank environment.
    successMetric: Reproducible deployment under 10 business days with a documented reference architecture
    owner: Founding engineer
  - horizon: 90–180 days
    experiment: Design-partner pilot 1
    hypothesis: >-
      A fund with 15–50 analysts can generate a cited earnings-prep memo draft in a
      single analyst session and the fund's compliance team can review the full session
      log and approve the workflow for broader use.
    successMetric: Pilot fund confirms cited-memo demo passes internal security review and requests a production contract
    owner: GTM founder plus solutions engineer
  - horizon: 90–180 days
    experiment: Connector expansion bake-off
    hypothesis: >-
      Adding AlphaSense and one expert-network connector increases analyst time savings
      on first-draft memo prep by more than 40% versus internal-content-only sources.
    successMetric: Pre/post analyst time measurement in pilot showing 40%+ reduction in first-draft prep time
    owner: Founding engineer
  - horizon: 180–365 days
    experiment: Compliance-channel partnership
    hypothesis: >-
      One compliance advisor or prime-broker technology team will refer at least 2
      qualified ICP fund introductions within 6 months of formalizing a referral
      arrangement.
    successMetric: 2 warm introductions from the partner channel converting to pilot conversations within 6 months
    owner: GTM founder
  - horizon: 180–365 days
    experiment: Annual contract conversion from pilots
    hypothesis: >-
      At least 3 of the first 5 design-partner pilots convert to annual production
      contracts at or above $75k ACV.
    successMetric: 3 signed annual contracts totaling at least $300k ARR by month 12
    owner: GTM founder

operations:
  - Deployment automation uses infrastructure-as-code templates (Terraform or CDK) for reproducible customer-VPC and private-endpoint rollouts on AWS, Azure, and GCP
  - Connector integrations maintained as versioned adapters; licensed-source entitlement checks run at query time against fund-provided permission tables rather than centralizing any content
  - Session audit logs stored exclusively in the customer's own environment and exportable to the fund's SIEM or compliance archive on demand
  - Workspace memory and citation graph use a self-hosted vector store inside the customer's VPC; no embeddings or retrieval data cross the customer boundary
  - Customer success cadence tied to earnings calendar with deployment reviews before each major earnings season and quarterly compliance check-ins with the fund's legal team

team:
  - role: Founding infrastructure engineer
    startTiming: Month 0
    rationale: >-
      VPC deployment, connector architecture, audit logging, and workspace runtime are
      the technical core of the product and must be in place before any sales motion
      begins; this role owns the reproducibility and security posture of every deployment.
  - role: Founding GTM and sales engineer
    startTiming: Month 0
    rationale: >-
      Hedge-fund sales require a technically credible counterpart who can navigate
      security reviews, architect deployment options in real time, and run bake-offs;
      founder-led sales is the only viable motion before product-market fit is confirmed.
  - role: Founding product and second engineer
    startTiming: Month 1
    rationale: >-
      Connector depth, thesis memory, and workflow templates require a second engineering
      resource to ship full MVP scope in parallel with early customer deployment and
      connector buildout.
  - role: Solutions engineer (first hire)
    startTiming: Month 4
    rationale: >-
      Design-partner deployments inside customer VPCs require dedicated solutions
      engineering bandwidth to avoid blocking the founding team from shipping product;
      hire when the second pilot engagement begins.

milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 design-partner pilot contracts at $25k–$35k each by month 9
      - Ship reproducible VPC and private-endpoint deployment for AWS and Azure with setup under 10 business days
      - Build connectors for internal document stores plus AlphaSense, CapIQ, and one expert-network source
      - Demonstrate cited earnings-prep memo draft passing compliance review at pilot customer 1
      - Convert 2 pilots to annual production contracts at $75k–$150k ACV each by month 12
  - horizon: 12–24 months
    items:
      - Reach $500k–$800k ARR across 5–7 production fund customers
      - Ship multi-workspace governance and fund-wide deployment toolkit
      - Launch watchlist automation and approval-chain configuration as paid premium modules
      - Sign first channel partnership with a prime-broker or compliance-technology ecosystem
      - Close Series A process with at least 6 months of runway remaining
  - horizon: 24–36 months
    items:
      - Reach $2M–$3M ARR across 12–15 fund and adjacent-vertical customers
      - Launch workspace modules for credit fund and private equity deal-team workflows
      - Establish a certified connector marketplace with 3+ third-party data vendor integrations
      - Demonstrate net revenue retention above 120% through expansion seat and premium-module upsell

risks:
  - risk: >-
      Incumbent research suites (AlphaSense) or finance copilots (Rogo) ship a credible
      self-hosted or private-deployment option before the startup establishes 3+
      production logos with documented switching cost.
    likelihood: Medium
    impact: High
    mitigation: >-
      Move fast on design-partner deployments to create switching-cost evidence; position
      as the opinionated research-room runtime rather than a content source, so incumbents
      extending into private deployment remain integration partners rather than full
      substitutes.
  - risk: >-
      Sophisticated fund research-tech teams decide to build a comparable internal stack
      using Onyx or open-source components rather than buying a packaged workspace.
    likelihood: Medium
    impact: High
    mitigation: >-
      Win on time-to-production, connector polish, and compliance-grade auditability;
      internal builds take 12–18 months and lack the earnings-prep templates, entitlement
      mirroring, and session replay that fund compliance teams require out of the box.
  - risk: >-
      A citation error, hallucinated claim, or unauthorized export in an early pilot
      destroys credibility with the first customer and triggers negative word-of-mouth
      in the concentrated hedge-fund buyer community.
    likelihood: Low
    impact: High
    mitigation: >-
      Require citation coverage as a hard system constraint at generation time (not a UI
      option), ship strict export-gate controls from day one, and maintain a human-in-
      loop approval step before any output can leave the workspace boundary.
  - risk: >-
      Licensed-content entitlement constraints prevent ingesting the most valuable
      sources (expert networks, broker research) without costly renegotiation that
      delays pilots and raises ACV justification risk.
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Prioritize fully internal content plus AlphaSense enterprise API terms for the MVP
      connector suite; sequence broker-research and expert-network connectors after the
      legal review confirms ingest terms are compatible.
  - risk: >-
      Hedge-fund procurement and security-review cycles prove longer than 6 months,
      depleting seed runway before achieving the 3-logo milestone required for Series A
      credibility.
    likelihood: Medium
    impact: High
    mitigation: >-
      Target funds with an active compliance trigger to shorten decision timelines;
      structure pilots as paid engagements ($25k–$35k) to generate early revenue and
      reset the effective burn clock during the evaluation period.

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway to hire a 3–4 person founding team (2 engineers plus GTM
    founder and solutions engineer by month 4), build VPC and private-endpoint
    deployment with core connectors for AlphaSense and internal sources, sign 3–5
    design-partner contracts, and demonstrate 2+ annual production conversions at
    $75k–$150k ACV each—providing the ARR evidence and product proof required for
    a Series A.
