  validationPlan:
  - priority: high
    question: Will funds buy a standalone private workspace instead of extending AlphaSense, internal notebooks, or generic secure work-AI?
    evidenceToGather: Ten buyer interviews across US and UK long/short equity funds plus at least three live bake-offs against current research stacks.
