openQuestions:
- What share of target funds truly require customer-VPC or air-gapped deployment versus accepting zero-retention hosted models?
- How often will funds need to renegotiate third-party research, transcript, or expert-network entitlements before those sources can be ingested into an agent workspace?
- Will early buyers prefer a standalone private workspace or an extension embedded inside AlphaSense-, SharePoint-, or internal-notebook-centric workflows?
- Can the company expand from fundamental hedge funds into credit, private equity, and law quickly enough to justify venture-scale expectations?
