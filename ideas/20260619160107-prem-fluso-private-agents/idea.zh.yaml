problem: >-
  基本面对冲基金积累了大量有价值的内部笔记、渠道核查报告、专家网络访谈记录、盈利季准备文件和专有模型，但绝大多数基金无法让 AI 智能体在通用云工作区中接触这些语料。结果是分析师仍在手工拼装投资备忘录，或依赖缺乏权限管理、引用和审计记录的脆弱内部脚本。一旦基金想让智能体起草研究或持续监控持仓，缺失的那块拼图就是一个私有工作区——把每一个动作、每一条来源、每一份导出都锁在基金的控制边界之内。
targetUser:
  primary: 基本面多/空股票对冲基金的研究技术负责人或高级分析师——基金规模 10-75 名分析师，内部 AI 工作流积压快速增长
  secondary: 同一基金内负责限制外部 AI 工具用于专有研究的首席合规官或 COO
  buyer: 基本面对冲基金的 COO、CTO 或研究平台负责人
startupThesis:
  nonObviousInsight: >-
    私有知识工作智能体最难的部分已不再是获取模型；而是把专有研究、工作区记忆、引用追踪和导出管控打包进一个加密操作边界，让小型基金团队无需从头搭建内部平台就能直接部署。
  beachhead: >-
    美国和英国基本面多/空股票对冲基金，规模 15-50 名分析师，配备 AlphaSense、CapIQ 和专家网络档案等研究系统，且已在 AI 辅助盈利季准备或投资备忘录起草方面启动了试点。
  wedge: >-
    一个加密研究室工作区——接入已审批的内部和授权外部来源、维护以标的和论点为维度的记忆、起草带引用的分析师报告，任何内容导出工作区前都须经过策略驱动的审批。
  whyNowCatalyst: >-
    Prem AI 的 Fluso 发布明确锁定对冲基金这个数据绝对不能离楼的场景，证明隐私工作区已成为智能体落地的门槛产品。
  ventureScalePath: >-
    从对冲基金研究室起步，然后把同一套私有智能体工作区模型推向信贷基金、私募股权交易团队、律所、企业战略发展团队，以及其他需要智能体但不能容忍数据出境的高价值知识工作场景。
solution: >-
  Research Vault Agent Workspace 部署在基金自有 VPC 或本地环境中，为每个标的、行业或投资论点建立隔离工作区。它连接已审批的研究库、会议记录、公告文件、访谈记录和内部模型，让分析师启动边界明确的智能体——汇总证据、维护观察名单、起草备忘录，并附上引用、主动标出矛盾。每一次提示、检索、工具调用和导出都按工作区策略写入日志，让合规人员能回溯智能体看了什么、输出了什么。产品不是又一个聊天界面，而是基金目前无法安全自动化的研究工作流的安全运行时和操作层。
goToMarketSeed:
  firstCustomer: AUM $1B-$20B 的基本面多/空股票基金，拥有 15-50 名分析师、专职研究技术负责人，并已明确禁止在专有笔记上使用公共 AI 工具
  buyingTrigger: 决定在盈利季前跑分析师智能体试点，或合规部门在发现员工用公共 AI 工具起草内部研究后发出指令
  currentAlternative: 在 Word 和 Excel 中手工起草备忘录，在 AlphaSense 和 CapIQ 中人工检索，加上基金 VPC 内的临时内部脚本或封闭 Notebook
  switchingReason: 工作区把基金从 AI 试验推进到生产——信息源留在自己的基础设施里，同时交出带引用的草稿和可审计的智能体行为，这两点是手工工作流和一次性脚本做不到的
  pricingHypothesis: 按活跃研究工作区数量或分析师席位计费的年度平台许可，初始共创客户合同定价在 $75k-$250k 之间，视部署复杂度和信息源连接器数量而定
