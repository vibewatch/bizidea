jobsToBeDone:
  - job: 当分析师准备盈利季或首次覆盖备忘录时，帮助研究团队用智能体整合已审批的内部和授权外部来源，让他们能在不泄露专有背景信息的前提下交出带引用的初稿。
    currentAlternative: 跨笔记、访谈记录和电子表格手工整合研究，加上临时内部脚本
    successMetric: 初稿备忘录准备时间缩短至少 50%，同时每条事实性主张都保留可追溯的引用来源
  - job: 当合规部门需要审批研究中的 AI 使用时，帮助 COO 和研究技术负责人证明智能体访问了什么、导出了什么，让他们能在不担忧策略风险的前提下推动更广泛部署。
    currentAlternative: 全面禁止公共 AI 工具，或用可审计性极低的一次性内部 Notebook 凑合
    successMetric: 每个智能体会话都有完整操作日志，已审批试点团队中零次未授权导出
ideaScorecard:
  signalStrength:
