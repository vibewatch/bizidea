    rationale: 具名产品发布、明确目标客户加上大额融资进程，尽管证据来自单一来源，仍指向真实的市场窗口。
  painIntensity:
    score: 5
    rationale: 专有研究泄露会直接损害基金业绩并引发合规问题，形成有预算支撑的紧迫性。
  wedgeClarity:
    score: 5
    rationale: 面向带引用备忘录起草的私有研究室工作区，是一个切口锋利、买家可见、触发因素清晰的首个用例。
  defensibility:
    score: 4
    rationale: 安全部署、信息源权限、审批日志和工作流专属记忆，在商品化模型之上积累了有黏性的操作数据。
  ventureScale:
    score: 4
    rationale: 对冲基金是个窄小的滩头市场，但同一套私有智能体工作区可以扩展到许多其他高价值的机密知识工作场景。
topRisks:
  - name: 内部自建冲动
    description: 复杂的基金可能认为其研究技术团队能用开源组件自行组装一个安全工作区。
    mitigation: 靠上线速度、成熟的连接器、审批工作流和审计能力取胜——这些对精简内部团队而言重建代价极高。
  - name: 窄滩头销售
    description: 对冲基金是个集中度高的市场，企业销售高度依赖关系，信任建立周期漫长。
    mitigation: 从已禁止公共 AI 工具的共创客户起步，然后把同一产品推向相邻的机密工作流场景，拓宽销售管道。
  - name: 智能体信任失效
    description: 一次错误引用、幻觉式断言或未授权导出，足以摧毁早期客户的信任。
    mitigation: 在审批环节保持人工介入，对生成内容要求引用全覆盖，从第一天起就上线严格的导出管控和完整重放日志。
