    sourceRefs: [1]
differentiator: 'Most AI media compliance products focus on watermarking, deepfake detection, or generic provenance claims. This product starts in the exact business-affairs workflow the Academy''s rule references: legal billing, consent, and human authorship evidence. That makes it useful even when no technical AI detector can reliably prove what happened inside a production pipeline.'
