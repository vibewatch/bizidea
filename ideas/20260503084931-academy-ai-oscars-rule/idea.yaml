problem: Independent film producers and distributors increasingly use AI-touched workflows across postproduction, dubbing, script polish, and virtual performance work, but Oscar eligibility now depends on proving where humans actually performed and consented. Today that evidence lives across contracts, legal billing, email threads, vendor attestations, and edit notes. When the Academy asks questions late in an awards campaign, business-affairs teams have to reconstruct a defensible authorship record by hand.
targetUser:
  primary: Business-affairs and production-legal leads at independent film distributors and producers submitting awards contenders
  secondary: Awards consultants and postproduction supervisors coordinating Oscar submission materials
  buyer: Head of Business Affairs, General Counsel, or EVP Awards Strategy at an indie studio or distributor
startupThesis:
  nonObviousInsight: The real bottleneck is not detecting AI output; it is assembling an auditable chain of human authorship and consent from the legal and production systems the Academy already recognizes.
  beachhead: Oscar-submission readiness for independent distributors managing 2-10 awards-contending films that used AI-assisted vendors anywhere in production or post
  wedge: A pre-submission dossier builder that turns contracts, legal billing, cast consents, script revision history, and vendor attestations into an Academy-ready human-authorship packet
  whyNowCatalyst: The Academy has converted AI use from a reputational concern into a formal eligibility and disclosure issue for submitted films.
  ventureScalePath: Start with awards compliance for high-stakes film submissions, then expand into always-on AI rights and disclosure infrastructure for studios, streamers, advertisers, and game publishers facing similar provenance and consent requirements.
solution: Film Authorship Ledger is a compliance layer for business-affairs teams, not a creative tool. It ingests legal billing, cast agreements, script drafts, postproduction vendor attestations, and consent records to produce a structured human-authorship dossier for each credited performance and screenplay. The product flags missing evidence before submission, stores reusable templates for outside counsel and vendors, and creates an exportable package when the Academy requests more detail. Over time, it becomes the system of record for AI usage disclosures across film libraries and downstream distribution deals.
goToMarketSeed:
  firstCustomer: Independent film distributors with active awards campaigns and at least one title that used AI-assisted VFX, dubbing, script-editing, or digital-performance vendors
  buyingTrigger: Awards campaign kickoff or Oscar submission prep after legal counsel identifies new Academy AI disclosure risk
  currentAlternative: Shared drives, outside counsel checklists, spreadsheet trackers, and last-minute affidavit collection across producers and vendors
  switchingReason: The wedge turns weeks of manual evidence gathering into a repeatable submission workflow with gap detection tied directly to the Academy's new human-performance and authorship requirements.
  pricingHypothesis: Per title submission fee plus annual workspace subscription priced by number of active films and external collaborator seats
