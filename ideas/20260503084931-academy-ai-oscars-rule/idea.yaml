topRisks:
  - name: Narrow initial market
    description: Oscar-submission workflows alone may not support a large standalone company if adoption stays confined to awards contenders.
    mitigation: Land with awards teams first, then expand into broader distributor, streamer, and advertiser AI disclosure workflows that reuse the same evidence graph.
  - name: Rule interpretation ambiguity
    description: The Academy may evolve its guidance, making static templates or assumptions obsolete.
    mitigation: Build the product as a configurable evidence workflow and partner with entertainment counsel to update requirements quickly.
  - name: Existing legal process inertia
    description: Film teams may prefer outside counsel and shared drives over a new workflow unless the product clearly saves time during a live campaign.
    mitigation: Offer white-glove first-title onboarding with export formats counsel already uses, then prove ROI through faster dossier assembly and fewer missing artifacts.
