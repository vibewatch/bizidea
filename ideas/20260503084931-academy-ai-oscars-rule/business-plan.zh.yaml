slug: film-authorship-ledger
date: 2026-05-03
executiveSummary: Film Authorship Ledger 向独立发行商和制片方里的商务法务、制作法务团队卖申报就绪软件，目标客户是正在操作冲奖影片、且流程里用过 AI 辅助供应商的团队。眼前的问题不是识别 AI，而是要在学院 2026 年新规下，足够快地证明真人表演、人类创作和表演者授权，避免申报时因资格问题翻车。MVP 是一套材料包生成器：把合同、法务计费、演员授权、剧本版本和供应商声明函吃进来，先标出证据缺口，再导出学院能直接看的申报材料。GTM 也故意收得很窄：只在冲奖周期启动或律师审查时切入，按在跑影片和年度工作区收费，通过创始人直销、冲奖顾问、娱乐法务顾问和后期供应商分发——因为合规负担本来就来自这些流程。研究证明，这条工作流痛点是真实的，监管尾风也在变强；但也同样说明，只盯奥斯卡的滩头市场很小，估算 SAM 只有 $4.2M，而且买方高度集中。这个项目只有在公司能借奖项切口，证明自己其实是一套更广泛的 AI 权利、授权与披露主记录系统——能扩到制片厂、流媒体、广告主和游戏发行商——时，才值得投。眼下最大的缺口，是没人知道学院到底会多频繁地追要补充材料、又会具体要什么，因此第一版产品必须可配置，不能写死成一张表。投资判断先放在“观察”：要等在跑影片的试点证明，买方愿意为明显更快的材料包拼装付软件预算，而不只是继续买外部律师工时。
problem:
- 冲奖影片团队现在如果拿不出署名表演和剧本由人完成、且经过授权同意的证明，就会直接面临参评资格风险；但这些证据散在合同、计费记录、邮件、剧本修订和供应商文件里。
- 商务法务团队往往要在冲奖后段手工重建创作归属记录，速度慢、容易出错，而且一旦片子变多或学院追问，很难复用。
- 现有替代方案各只管一段：工作流工具管文件，权利系统管合同，溯源工具挂元数据，外部律师又贵又难复用。
solution:
- 搭一层中立证据层，把法务、制作和供应商材料串成单片级的人类创作归属与授权材料包。
- 先做可配置的奥斯卡申报就绪工作流：自动标出缺失材料、统一供应商声明函格式，并导出律师能直接用的材料包。
- 再把同一张证据图谱扩成更广的常态化 AI 披露、数字替身授权和权利合规工作流，服务更广泛的影视内容所有者。
whyWeWin:
- 产品切进的是学院规则点名的那条商务法务流程，而不是再做一个创作类 AI 工具或通用溯源 SDK。
- 可复用的条款库、声明函模板和历史缺失材料模式，会随着片单滚动越积越厚，律师主导的手工流程很难复制。
- 买方可能更愿意要一套中立的跨供应商台账，因为没有哪家配音、声音或后期供应商能看到整条制作链，也没人愿意替竞争对手留档。
- 围绕娱乐法务设计的高触达导入和导出格式，能在第一次采购时先压低“继续放共享盘就好”的默认阻力。
strategicChoices:
  beachhead: 面向以美国为主、管理 2–10 部冲奖剧情片、且在后期、配音、剧本或数字表演流程里用过 AI 辅助工具的独立发行商和制片方，做奥斯卡申报就绪。
  wedgeRationale: 奖项工作流范围窄、截止期硬、负责人集中在少数法务和奖项运营手里，所以比那些需要更深集成、更长采购周期、触发也没那么急的制片厂级合规平台，更容易先打出价值。
  sequencingRationale: 先用服务辅助的材料包拼装、文档导入、权限管理和可导出模板切入，因为学院的具体流程还不清楚；等在跑影片上把价值做实，再补上可复用的供应商声明流和系统集成；只有做到这一步，才往更广的非奖项 AI 披露工作流和更规模化的销售动作扩。
  notYet:
  - 面向制片厂的全量合同生命周期管理或企业级权利管理
  - 自动 AI 检测、水印，或只做溯源的工具
  - 在奖项工作流还没被反复验证之前，先大举扩到广告、游戏或流媒体合规
market:
  tam: 在专业影视内容里，面向 AI 作者归属、授权与披露工作流软件的自下而上 TAM 估算约为 $48.0M。
  sam: 对需要申报就绪工作流的、与奖项相关的独立或发行商管理剧情片，滩头 SAM 估算约为 $4.2M。
  som: 按约 12 个账户、约 35 部在跑影片、每个单片/工作区年化合同额约 $35k 计算，第 3 年可触达 SOM 约为 $1.2M。
  segments:
  - 有在跑冲奖项目的独立发行商和制片方里的商务法务、制作法务与奖项运营团队
  - 负责跨供应商统筹文件的娱乐法务顾问、冲奖顾问和后期制作主管
  buyingProcess: 通常是商务法务或奖项运营团队在冲奖准备启动、或律师开始审 AI 相关触点时先发现需求，随后由总法律顾问、商务法务负责人或奖项高管拍板。由于文件敏感、还要过法务审查，采购不会快；早期成交需要高触达导入和律师友好的输出格式。
product:
  mvp: MVP 是一套面向单个在跑影片的安全材料包生成器：吃进合同、法务计费、演员授权、剧本版本和供应商声明函；按署名表演和剧本跟踪缺失材料；最后导出可配置的申报材料包。第一版先靠手工上传和轻量元数据标注，不急着做深集成。
  sixMonth: 导入 3–5 部在跑影片，交付基于角色的权限、标准化的供应商声明流、可复用的条款与授权模板，并给出相对手工流程的材料包生成时间基准。
  twelveMonth: 补上审计日志、异常处理、带版本的证据请求、客户访谈里最常见文档仓库的集成，以及面向发行商账户的多片工作区管理。
  twentyFourMonth: 从奥斯卡专项申报就绪，扩到片库、下游发行交易，以及电影和精品剧非奖项项目里的常态化 AI 披露与数字替身授权合规。
  keyBets:
  - 买方会先接受一套可配置的证据工作流，而不是一上来就要求全量 CLM 或创作工具集成。
  - 只要导出格式贴近现有审阅习惯，律师和奖项运营团队就会信任标准化模板。
  - 供应商声明函收集有机会被做成足够可复用的流程，从而明显缩短材料包拼装时间。
  - 同一张证据图谱可以从奖项申报自然外溢到更广的权利与披露基础设施。
gtm:
  wedge: 先卖一套高触达的奥斯卡申报就绪工作流，目标是那些已经用了 AI 辅助供应商、法务团队预期会被更严审、而且截止期让手工搜材料特别痛苦的影片。
  channels:
  - 创始人直接外呼有在跑冲奖项目的独立发行商和制片方
  - 与娱乐法律事务所和冲奖顾问建立转介绍合作
  - 通过配音、声音和后期供应商切入——这些流程本身就会制造声明与留痕需求
  - 试点跑通后，再和工作流及权利栈里的现有厂商谈集成或联合销售
  funnelTargets: 目标是把 20–30% 的合格共创客户洽谈转成付费试点，让 60%+ 的试点扩到第二部影片或年度工作区；对每年都会反复冲奖或做披露的账户，年度客户留存做到 80%+。
  pricing: 按试点导入费 + 单片申报费 + 年度工作区订阅收费，价格随在跑影片数和外部协作者席位变化；这样既能把花费绑到真实冲奖紧迫度上，也方便一家具备多部影片的发行商往上扩单。
businessModel:
  revenueStreams:
  - 单片材料包准备与申报就绪收费
  - 多片发行商或制片团队的年度工作区订阅
  - 高级审计支持、模板更新与合规导入服务
  unitOfValue: 每个奖项周期内的在跑影片/工作区，外加供应商和律师的协作席位
  targetGrossMarginPct: 75
  expansionLevers:
  - 把单片试点转成多片年度工作区
  - 增加面向供应商、律师与合作伙伴的付费协作流程
  - 在奖季之外卖出更广的 AI 披露与数字替身授权模块
strategyMap:
  northStarMetric: 能在申报截止前拿出完整材料包、且不存在重大缺失材料异常的付费在跑影片数
  inputMetrics:
  - 每个奖项周期拿到的合格在跑影片机会数
  - 从启动到材料包完整的中位天数
  - 第一次内部审阅时的缺失材料率
  - 试点转多片工作区的转化率
  - 证据包中复用既有模板或声明函的占比
  moatsToBuild:
  - 可复用的条款、授权与供应商声明函模板库
  - 打通法务、计费和供应商记录的跨影片证据图谱
  - 历史缺失材料模式与成功回复材料包的数据集
  - 嵌进导入流程的律师与供应商分发关系
  killCriteria:
  - 如果 12 个月内少于 3 个共创客户转成付费生产使用，或者材料包拼装中位时间相对手工流程改善不到 50%，又或者到第 15 个月仍验证不出非奥斯卡扩展场景，那么独立风投项目假设就会被削弱。
  mermaid: |
    flowchart LR
      QieKou[奥斯卡申报就绪切口] --> ZuiXiaoKeXing[材料包生成器 MVP]
      ZuiXiaoKeXing --> ZhengMing[在跑影片更快拼出完整材料包]
      ZhengMing --> KuoZhan[多片工作区与更广泛 AI 披露]
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流切口很强，但如果没有证据证明买方紧迫度能走出狭窄的奥斯卡滩头市场，现在还不足以支撑风险投资级判断。
    whyBelieve: 公司切进的是一个刚被正式化的合规工作流：负责人清楚、截止期硬，而且在跨供应商证据拼装上几乎没有成熟的点状产品。
    whyDoubt: 初始市场小且集中；如果学院执行力度一直不高，买方完全可能继续用外部律师加现成工具。
    nextDiligence: 要先在真实冲奖项目里确认两件事：团队愿意为明显更快的材料包拼装付软件预算；同一套证据模型也能扩到非奖项披露工作流。
  firstCustomer:
    title: 有一部在跑冲奖影片的独立发行商商务法务负责人
    profile: 一家以美国为主、手里有 2–10 部剧情片的发行商或制片方，其中至少 1 部影片在配音、后期、剧本或数字表演环节用过 AI 辅助供应商，而且正处在冲奖期。
    trigger: 冲奖周期启动，或外部律师审出新的学院与表演者授权文件风险。
    buyer: 商务法务负责人、总法律顾问，或奖项战略执行副总裁
    initialContract: 首单先做 1 部在跑影片的付费试点，价格 $15k–$25k；如果账户后续加片、加协作者、加重复披露需求，再扩到年化约 $30k–$50k 的工作区支出。
  mustBeTrue:
  - 10 个目标买方里，至少有 5 个明确表示，当前手工拼材料的痛点已经重到愿意在下一个奖季前为专门工作流买单。
  - 试点客户能把端到端材料包拼装时间，相比上一套手工流程压低至少 50%。
  - 至少 60% 的付费试点，会在一个周期内扩到第二部影片或年度工作区。
  - 娱乐法务顾问和冲奖顾问能直接接受产品导出的材料，不要求整套重做。
  - 到第 15 个月，至少有 2 个共创客户用同一张证据图谱验证出付费的非奥斯卡场景。
  diligenceQuestions:
  - 奖项团队到底会多频繁地收到学院关于 AI 使用的补充提问？学院又具体会要哪些材料？
  - 今天最耗时间的到底是哪类证据：合同、计费记录、剧本修订，还是供应商声明函？
  - 为什么买方会愿意买软件，而不是继续给外部律师加工时，或直接用 Frame.io 和共享盘？
  - 第一版部署里，哪些文档仓库集成是必须的，哪些可以先靠手工？
  - 产品能不能在不滑向重服务法务业务的前提下，扩到制片厂、流媒体或广告主的披露工作流？
  riskHeatmap:
  - risk: 学院实际追要材料的频率一直偏低，买方继续容忍手工流程
    likelihood: Medium
    impact: High
    leadingIndicator: 前 10 次客户访谈里，少于 2 位明确提到最近或预计会遇到与 AI 使用相关的补充材料请求。
    mitigation: 产品定位不要只押学院正式追问，而要同时押冲奖推进速度和证据复用效率，并尽早验证相邻披露场景。
  - risk: 买方继续默认外部律师和现有工具
    likelihood: High
    impact: High
    leadingIndicator: 付费试点需要大量定制服务，而且转不成可复用的多片订阅。
    mitigation: 前期保持高触达导入，但把导出格式、模板和节省时间的数据做标准化，让律师变成渠道而不是替代品。
  - risk: 滩头市场太小，撑不起风险投资级结果
    likelihood: High
    impact: High
    leadingIndicator: 即便奖项试点做成，到第 15 个月仍没有任何非奖项共创客户或扩展机会成交。
    mitigation: 把奥斯卡当成证明切口，而不是终局市场；最晚在第 9–12 个月就优先推进相邻权利与披露工作流。
  - risk: 产品要求随着规则和合作方预期快速变化
    likelihood: Medium
    impact: Medium
    leadingIndicator: 前 5 次部署里模板复用率很低，几乎每个项目都要重做一版。
    mitigation: 产品底座必须可配置、模板要版本化，并和娱乐法务顾问及关键合作方保持正式更新循环。
operatingAssumptions:
- assumption: 当在跑影片的流程里带有 AI 痕迹时，冲奖中的独立发行商会愿意买专门软件，而不只靠外部律师和共享盘。
  basis: research.yaml
  validationTest: 第一个奖项周期里，从 10–12 次合格买方洽谈中拿下至少 3 个付费试点。
  decisionImpact: 如果不成立，就要把定位改成给律师赋能的服务型软件，或降低对这个品类的优先级。
- assumption: 即便不做深度 CLM 或工作流集成，靠手工上传、标注和导出，也能先交付足够大的价值。
  basis: 运营判断
  validationTest: 前 3 部影片的导入都控制在 10 个自然日内，并把材料包拼装时间实测压低 50%。
  decisionImpact: 如果不成立，路线图就得更早优先补集成，资本需求也会随之抬高。
- assumption: 当价格和在跑影片紧迫度、多名协作者绑定时，每个活跃账户 $30k–$50k 的年化价格带是能被接受的。
  basis: idea.yaml
  validationTest: 和 8–10 个买方做结构化定价测试，并拿到至少 2 个高于 $15k 的试点，证明有机会扩成年度工作区。
  decisionImpact: 如果不成立，公司可能就得走更低 ACV 的供应商渠道模式，或把产品范围做大，才能把预算讲通。
- assumption: 只要产品能在不替代他们角色的前提下降低文件摩擦，律师、冲奖顾问和后期供应商就愿意做转介绍渠道。
  basis: research.yaml
  validationTest: 9 个月内拿下 3 个活跃转介绍伙伴，而且每个伙伴都至少带来 2 个合格机会。
  decisionImpact: 如果不成立，获客就会更依赖创始人亲自打单、速度更慢，销售成本也会更高。
- assumption: 同一张证据图谱可以扩到奥斯卡之外、更广的 AI 披露和数字替身授权工作流。
  basis: research.yaml
  validationTest: 到第 15 个月，拿下 2 个非奖项共创客户，并证明核心产品只需不到 20% 的定制流程改动就能上线。
  decisionImpact: 如果不成立，风投假设就会被削弱，因为公司仍然暴露在一个狭窄且季节性强的市场里。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈冲奖顾问、娱乐法务顾问和商务法务负责人，覆盖正在进行或刚结束的冲奖项目。
  hypothesis: 最难的痛点不是怎么写政策，而是怎么把散在多个系统里的证据拼起来、再验证干净。
  successMetric: 完成 15 次访谈，拿到一张按材料类型排序的痛点地图，并至少有 5 个买方确认愿意测试在跑影片工作流。
  owner: 创始人
- horizon: 0–90 天
  experiment: 用手工导入和原型材料包导出，跑 2 个人工代办式试点，服务在跑影片。
  hypothesis: 即便软件自动化还没补齐，只靠高触达交付，也能先把材料包拼装速度提升至少 50%。
  successMetric: 交付 2 个付费试点，拿到有前后对照的节省时间数据，而且内部审阅时没有出现关键缺失材料失误。
  owner: 创始人 + 解决方案负责人
- horizon: 90–180 天
  experiment: 面向配音、声音和后期合作方，上线标准化的供应商声明函提交流程。
  hypothesis: 把供应商数据收集做成统一格式后，跨影片复用里最卡的一段会明显顺起来。
  successMetric: 70% 的试点供应商通过产品提交声明函，前 5 部影片的模板复用率超过 50%。
  owner: 产品与工程
- horizon: 90–180 天
  experiment: 对 6–8 个潜在客户测试“试点费 + 年度工作区转化”定价方案。
  hypothesis: 买方入门时更喜欢和单片绑定的价格，但一旦开始管多部影片，就愿意签年度工作区。
  successMetric: 至少拿到 2 个年度工作区转化，或来自试点账户的已签扩单承诺。
  owner: 创始人
- horizon: 180–365 天
  experiment: 补上客户调研里最常见的前 2 个文档仓库集成，并衡量导入速度提升。
  hypothesis: 只做少数高频集成，就能同时提升销售速度和毛利率，而不用先建一整套企业平台。
  successMetric: 已集成账户的导入时间降到 5 个自然日以内，实施工作量比手工方案下降 30%。
  owner: 工程
- horizon: 180–365 天
  experiment: 验证 1 条非奖项工作流，例如面向流媒体或制片厂项目的数字替身授权追踪。
  hypothesis: 同一套证据模型只需很少产品改动，就能解决奥斯卡之外更广的 AI 披露任务。
  successMetric: 至少有 1 个付费非奖项共创客户上线，而且与奖项产品相比，自定义工作流差异低于 20%。
  owner: 创始人 + 产品
operations:
- 围绕法务文件和表演者敏感记录，做好安全导入、审计日志和细粒度权限。
- 和外部娱乐法务顾问一起建立模板维护流程，及时响应规则、工会和法规变化。
- 把供应商声明函请求、催收与异常处理，写成标准操作流程。
- 客户成功团队每处理一部在跑影片，都要记录节省的时间和缺失材料下降幅度。
- 用 CRM 和合作伙伴台账，跟踪给管道输送机会的法律事务所、冲奖顾问和后期供应商。
team:
- role: 创始人/CEO
  startTiming: 第 0 月
  rationale: 在品类定义还没完全成型时，先自己扛共创客户销售、流程发现、伙伴拓展，以及前期偏服务型的交付。
- role: 创始工程师
  startTiming: 第 0 月
  rationale: 把证据图谱、权限、审计轨迹和导出流程这几块底座先搭起来，支撑早期试点。
- role: 解决方案/合规负责人
  startTiming: 第 3 月
  rationale: 把法务和奖项要求翻成模板，跑导入流程，再把高触达交付沉淀成可复用的产品需求。
- role: 全栈产品工程师
  startTiming: 第 6 月
  rationale: 等试点反馈跑清后，提速集成、多片工作流功能和后台工具。
- role: 渠道与客户成功负责人
  startTiming: 第 9 月
  rationale: 在买方高度集中的市场里，一边做律师、顾问和供应商渠道，一边守住续费和扩单。
milestones:
- horizon: 0–12 个月
  items:
  - 拿下 3–5 个来自独立发行商或制片方的付费在跑影片试点
  - 证明材料包拼装时间相对手工流程至少缩短 50%
  - 上线可复用的供应商声明函与条款模板库
  - 至少把 2 个试点账户转成年度多片工作区
  - 确认最关键的集成需求，并先交付前 2 个
- horizon: 12–24 个月
  items:
  - 通过律师、顾问和供应商渠道，跑出可重复的年度工作区销售动作
  - 用同一张证据图谱，上线 1 条付费的非奖项披露工作流
  - 为更大账户补上审计日志、异常处理和跨影片报表
  - 在发行商、制片方和合作伙伴渠道里建立标杆客户
- horizon: 24–36 个月
  items:
  - 把产品扩到奖季之外的制片厂、流媒体或广告主 AI 披露项目
  - 加深与权利、文档和溯源生态的集成，接进买方原本就在用的系统
  - 利用历史材料包和异常数据，继续提升模板复用率和产品粘性
  - 决定公司是继续做聚焦的合规层，还是扩成更大的权利与披露平台
risks:
- risk: 面向奥斯卡申报的滩头市场本身可能过小、季节性又太强，单独撑不起风险投资级增长。
  likelihood: High
  impact: High
  mitigation: 把奖项工作流只当第一块证明点，在前 12–15 个月内就验证更广的披露场景。
- risk: 因为单个账户片量不高，买方可能继续留在外部律师、共享盘和相邻工具上。
  likelihood: High
  impact: High
  mitigation: 先交付高触达试点，把节省时间量化出来，并把导出格式做成律师能参与但不失控的样子。
- risk: 学院指引和相关法务预期的变化速度，可能快过静态模板的更新速度。
  likelihood: Medium
  impact: Medium
  mitigation: 产品底座保持可配置、模板做版本管理，并和娱乐法务顾问及行业伙伴保持定期更新循环。
- risk: 敏感合同和表演者授权文件，会在采购环节带来信任与安全顾虑。
  likelihood: Medium
  impact: High
  mitigation: 在前几版里就优先做好细粒度权限、审计日志、安全导入和最低必要集成。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 融资目标是支撑 18 个月：把核心材料包工作流做出来，拿下数个付费在跑影片试点，证明模板复用和节省时间可以重复出现，建立律师与供应商渠道合作，并验证至少 1 条更广的非奖项扩张路径。
