slug: film-authorship-ledger
date: '2026-05-03'
executiveSummary: Film Authorship Ledger 面向独立发行商和制片方中的商务法务与制作法律团队，销售“提交就绪”软件，服务对象是管理奖项竞争影片且使用过 AI 辅助供应商的团队。眼前问题不是 AI 检测，而是在学院 2026 年规则之下，能否足够快地证明人类表演、人类作者身份和表演者同意，从而避免因资格问题而无法提交。MVP 是一个案卷构建器，可导入合同、法务计费、演员同意、剧本草稿和供应商声明，随后标记缺失证据并导出学院可接受的材料包。GTM 体系刻意收窄：在奖项宣传启动或律师审查期间销售，按活跃影片和年度工作区收费，并通过创始人直销、奖项顾问、娱乐法律顾问以及其工作流本身制造出合规负担的后期制作供应商分发。研究表明该工作流确有痛点，且相邻监管顺风正在增强，但也显示仅以奥斯卡为核心的滩头市场较小，预计 SAM 为 $4.2M，买方集中度高。只有当公司利用这一奖项切口，证明自己能成为覆盖制片厂、流媒体、广告主和游戏发行商的更广泛 AI 权利、同意与披露记录系统时，这个项目才具备可投资性。当前最大缺口在于：学院究竟会多频繁要求补充文件、以及会要求什么具体提交材料仍不确定，因此首版产品必须保持可配置，而不能写死到单一表单。投资人立场是“观察”，直到真实影片试点证明买方愿意为显著更快的案卷组装支付软件预算，而不只是外部律师工时。
problem:
- 瞄准奖项的电影团队如今面临正式的资格风险：如果无法证明署名表演和剧本由人类创作且获得同意，就可能失去参评资格，而相关证据又分散在合同、计费记录、邮件、剧本修订和供应商文件中。
- 商务法务团队目前通常在宣传周期后期手工重建作者身份记录，这一过程缓慢、易错，也难以在多部影片或学院追加问题之间复用。
- Existing substitutes each miss part of the job: 工作流工具管理文件，权利系统管理合同，溯源工具附加元数据，外部律师则成本高且不可复用。
solution:
- 建立一个中立的证据层，把法务、制作和供应商材料连接为片名级的人类作者身份与同意案卷。
- 先从可配置的奥斯卡申报就绪工作流切入，标记缺失材料、标准化供应商声明，并导出律师友好的材料包。
- 再把同一证据图谱扩展为面向更广泛影视内容持有者的常态化 AI 披露、数字替身同意和权利合规工作流。
whyWeWin:
- 产品直接切入学院规则点名的商务法务工作流，而不是作为另一个创意 AI 工具或通用溯源 SDK 竞争。
- 可复用的条款库、声明模板和历史缺失材料模式可以跨影片积累，使律师主导的手工流程更难复制。
- 买方可能更偏好中立的跨供应商账本，因为没有任何单一配音、语音或后期供应商能看到完整制作流程，也不愿记录竞争对手工具。
- 针对娱乐法律顾问设计的高触达式上线和导出格式，可降低首轮采购时“继续放在共享盘里”的默认阻力。
strategicChoices:
  beachhead: 面向以美国为中心、管理 2-10 部奖项竞争剧情片、并在后期制作、配音、剧本或数字表演流程中使用过 AI 辅助工作流的独立发行商和制片方的奥斯卡申报就绪场景。
  wedgeRationale: 奖项工作流范围狭窄、截止时间明确，且由少数法务和奖项运营人员掌控，因此比需要更深集成、更长采购周期、触发点也不够紧迫的广义制片厂合规平台，更容易更快验证价值。
  sequencingRationale: 先从服务辅助的案卷组装、文档导入、权限和可导出模板做起，因为学院的具体工作流仍不清晰；一旦有真实影片证明点，再增加可重复的供应商声明流程和系统集成；只有在此之后，才扩展到更广泛的非奖项 AI 披露工作流和更可规模化的销售动作。
  notYet:
  - 面向制片厂的完整合同生命周期或企业级权利管理
  - 自动化 AI 检测、水印或仅做来源证明的工具
  - 在奖项工作流尚未形成重复转化之前，就广泛扩张到广告、游戏或流媒体合规领域
market:
  tam: 面向专业影视作品的 AI 作者身份、同意与披露工作流软件，自下而上估算 TAM 为 $48.0M。
  sam: 面向需要申报就绪工作流、与奖项相关的独立和发行商管理剧情片，估算滩头市场 SAM 为 $4.2M。
  som: 基于到第 3 年约 35 个活跃项目、覆盖约十几个账户、每个项目/工作区年化合同价值约 $35k 的可达情景，估算第 3 年 SOM 为 $1.2M。
  segments:
  - 拥有活跃奖项宣传项目的独立发行商和制片方中的商务法务、制作法律及奖项运营团队
  - 负责跨供应商协调文件的娱乐法律顾问、奖项顾问和后期制作主管
  buyingProcess: 通常在宣传准备启动或律师审查 AI 触点时，商务法务或奖项运营团队会识别出需求，随后由总法律顾问、商务法务负责人或奖项高管批准预算。由于文件高度敏感且需要法务审查，采购会比较缓慢，因此早期交易需要白手套式上线和律师友好的输出。
product:
  mvp: MVP 是一个面向单个真实项目的安全案卷构建器，可导入合同、法务计费、演员同意、剧本草稿和供应商声明；按署名表演和剧本追踪缺失材料；并导出可配置的提交材料包。在深度集成之前，它应当先支持手工上传和轻量元数据标注。
  sixMonth: 上线 3-5 个真实项目，交付基于角色的权限、标准化供应商声明工作流、可复用的条款与同意模板，以及相对于手工流程的案卷生成时间基准。
  twelveMonth: 增加审计日志、异常处理、版本化证据请求、接入客户发现中最常见的文档仓库，并为发行商账户提供多项目工作区管理。
  twentyFourMonth: 从奥斯卡专项就绪扩展到面向片库、后续发行交易以及电影和高端电视剧非奖项制作的常态化 AI 披露和数字替身同意合规。
  keyBets:
  - 买方会在要求完整 CLM 或创意工具集成之前，先接受一个可配置的证据工作流。
  - 如果导出结果符合既有审阅习惯，律师和奖项运营人员会信任标准化模板。
  - 供应商声明采集能够足够可重复，从而实质性缩短案卷组装时间。
  - 同一证据图谱能够从奖项提交推广到更广泛的权利和披露基础设施。
gtm:
  wedge: 销售一套白手套式的奥斯卡申报就绪工作流，面向已经预期会受到额外审查、且截止时间让手工收集痛苦不堪的 AI 参与项目。
  channels:
  - 由创始人直接外呼拥有活跃奖项宣传项目的独立发行商和制片方
  - 与娱乐法律事务所和奖项顾问建立转介合作
  - 由配音、语音和后期制作供应商引荐，因为其工作流本身会产生声明需求
  - 在试点验证后，与工作流和权利技术栈中的 incumbents 进行定向联合销售或集成讨论
  funnelTargets: 目标是：20-30% 的合格设计伙伴沟通转为付费试点，60% 以上的试点扩展到第二个真实项目或年度工作区，而在存在重复奖项或披露工作流的账户中，年度 logo 留存达到 80% 以上。
  pricing: 定价包含试点上线费、按影片收取的提交费用，以及按活跃影片和外部协作者席位计费的年度工作区订阅；这种方式既贴合真实宣传周期的紧迫度，也能在一个发行商管理多部影片时自然扩张。
businessModel:
  revenueStreams:
  - 按影片收取案卷准备和提交就绪费用
  - 面向多影片发行商或制片团队的年度工作区订阅
  - 高级审计支持、模板更新和合规上线服务
  unitOfValue: 以奖项周期内的活跃影片项目/工作区为价值单位，并为供应商和律师提供额外协作者席位
  targetGrossMarginPct: 75
  expansionLevers:
  - 将单片试点转为多片年度工作区
  - 增加付费的供应商、律师和合作伙伴协作流程
  - 在奖项季之外销售更广泛的 AI 披露和数字替身同意模块
strategyMap:
  northStarMetric: 在提交截止日前生成完整案卷、且不存在重大缺失材料异常的付费真实项目数
  inputMetrics:
  - 每个奖项周期获得的合格真实项目机会数
  - 从启动到完成案卷的中位天数
  - 首次内部审查时的缺失材料率
  - 试点转多项目的转化率
  - 证据包中复用既有模板或声明的占比
  moatsToBuild:
  - 可复用的条款、同意和供应商声明模板库
  - 连接法务、计费和供应商记录的跨项目证据图谱
  - 历史缺失材料模式和成功回应材料包的数据集
  - 嵌入上线流程中的律师和供应商分发关系
  killCriteria:
  - 如果在 12 个月内少于 3 个设计伙伴转为付费生产使用，或案卷组装中位时间相较手工流程提升不足 50%，或到第 15 个月仍未验证任何非奥斯卡扩展用例，那么独立创业假设将被削弱。
  mermaid: "flowchart LR\n  Wedge[奥斯卡就绪切口] --> MVP[案卷构建器 MVP]\n  MVP --> Proof[真实项目上更快生成完整材料包]\n  Proof --> Expansion[多项目工作区与更广泛的 AI 披露]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流切口很强，但当前证据仍不足以在缺乏更广泛买方紧迫性证明的情况下，为一个小型奥斯卡滩头市场背书风险投资规模。
    whyBelieve: 公司瞄准的是一个刚被正式化的合规工作流，负责人清晰、截止时间紧迫，而且在跨供应商证据组装方面缺乏强有力的点状竞品。
    whyDoubt: 初始市场规模小且集中，如果学院执行力度仍然较轻，买方仍可能回退到外部律师加现有工具的组合。
    nextDiligence: 需要通过真实宣传项目确认：团队是否愿意为显著更快的案卷组装支付软件预算，以及同一证据模型是否能扩展到非奖项披露工作流。
  firstCustomer:
    title: 拥有真实奖项竞争影片的独立发行商的商务法务负责人
    profile: 一家以美国市场为中心的发行商或制片方，运营 2-10 部剧情片，其中至少一部使用了 AI 辅助配音、后期、剧本或数字表演供应商，并正在开展奖项宣传。
    trigger: 奖项宣传启动，或外部律师审查暴露出新的学院与表演者同意文件风险。
    buyer: 商务法务负责人、总法律顾问，或奖项战略执行副总裁
    initialContract: 单个真实项目的付费试点价格约为 $15k-$25k；当账户增加项目、协作者和持续披露需求时，可转为约 $30k-$50k 的年化工作区支出。
  mustBeTrue:
  - 10 个目标买方中至少有 5 个表示，当前手工案卷组装的痛点足以让他们在下一个奖项周期前为专用工作流买单。
  - 试点客户能将端到端案卷组装时间相较既有手工流程缩短至少 50%。
  - 至少 60% 的付费试点能在一个周期内扩展到第二个项目或年度工作区。
  - 娱乐法律顾问和奖项顾问接受产品导出结果，而不要求完全重新定制。
  - 到第 15 个月，至少 2 个设计伙伴使用同一证据图谱验证出付费的非奥斯卡用例。
  diligenceQuestions:
  - 奖项团队实际多久会收到一次学院关于 AI 使用的追问？通常要求哪些材料？
  - Which document types consume the most time today: 合同、计费记录、剧本修订，还是供应商声明？
  - 为什么买方会为软件付费，而不是给外部律师增加可计费工时，或继续使用 Frame.io 和共享盘？
  - 首次部署必须接入哪些文档仓库？哪些部分可以继续手工处理？
  - 产品能否在不演变成以服务为主的法律业务的前提下，扩展到制片厂、流媒体或广告主的披露工作流？
  riskHeatmap:
  - risk: 学院执行频率维持低位，买方继续容忍手工工作流
    likelihood: Medium
    impact: High
    leadingIndicator: 前 10 次客户访谈中，不到 2 家提到近期或预期会收到与 AI 使用相关的补充文件要求。
    mitigation: 将产品定位于宣传提速和可复用证据组装，而不只围绕学院正式问询，并尽早验证相邻披露用例。
  - risk: 买方默认回到外部律师和现有工具
    likelihood: High
    impact: High
    leadingIndicator: 付费试点需要大量定制化服务，且无法转化为可重复的多项目订阅。
    mitigation: 初期保持白手套式上线，但标准化导出、模板和节省时间的证明，让律师成为渠道而非替代品。
  - risk: 滩头市场过小，难以支撑风险投资级结果
    likelihood: High
    impact: High
    leadingIndicator: 尽管奖项试点成功，但在 15 个月内仍没有任何非奖项设计伙伴或扩展机会成交。
    mitigation: 将奥斯卡仅视为验证切口，并在第 9-12 个月优先推进相邻权利与披露工作流。
  - risk: 随着规则和合作方预期演变，产品要求持续变化
    likelihood: Medium
    impact: Medium
    leadingIndicator: 前 5 次部署中模板复用率很低，每个项目都需要重新发明流程。
    mitigation: 构建可配置工作流和版本化模板，并与娱乐法律顾问和关键合作伙伴保持正式更新闭环。
operatingAssumptions:
- assumption: 当真实项目使用了带 AI 参与的工作流时，瞄准奖项的独立发行商会购买专用软件，而不只依赖外部律师和共享盘。
  basis: research.yaml
  validationTest: 在首个奖项周期内，从 10-12 次合格买方沟通中拿下至少 3 个付费试点。
  decisionImpact: 如果不成立，应转向“赋能律师的服务型软件”，或降低对该品类的优先级。
- assumption: 即便没有深度 CLM 或工作流集成，手工上传、标注和导出也能提供足够的初始价值。
  basis: operator judgment
  validationTest: 首批 3 个项目的上线时间各不超过 10 个日历日，并实现有记录的 50% 案卷组装时间缩减。
  decisionImpact: 如果不成立，路线图必须更早优先集成，资金需求也会提高。
- assumption: 当价格与真实项目紧迫度和多协作者场景挂钩时，每个活跃账户 $30k-$50k 的年化定价是可接受的。
  basis: idea.yaml
  validationTest: 与 8-10 位买方开展结构化定价测试，并拿下至少 2 个高于 $15k 的试点，证明可扩展到年度工作区。
  decisionImpact: 如果不成立，公司可能需要更低 ACV 的供应商渠道模式，或更广的产品范围来支撑预算。
- assumption: 如果产品能在不取代他们角色的前提下降低文档摩擦，律师、奖项顾问和后期供应商将愿意成为转介渠道。
  basis: research.yaml
  validationTest: 在 9 个月内拿下 3 个活跃转介伙伴，每家至少引入 2 个合格机会。
  decisionImpact: 如果不成立，获客将更依赖创始人直销、速度更慢，销售成本更高，品类可信度建立也会延后。
- assumption: 同一证据图谱能够扩展到奥斯卡之外更广泛的 AI 披露和数字替身同意工作流。
  basis: research.yaml
  validationTest: 到第 15 个月，用同一核心产品拿下 2 个非奖项设计伙伴，且定制化工作流改动不超过 20%。
  decisionImpact: 如果不成立，创业逻辑将被削弱，因为业务会持续暴露在狭窄且季节性的市场中。
experimentRoadmap:
- horizon: 0-90 days
  experiment: 访谈奖项顾问、娱乐法律顾问和商务法务负责人，覆盖正在进行或刚结束的宣传项目。
  hypothesis: 最难的痛点是跨多个系统组装和验证证据，而不是起草政策语言。
  successMetric: 完成 15 次访谈，形成按优先级排序的材料痛点图谱，并至少有 5 位买方确认愿意测试真实项目工作流。
  owner: 创始人
- horizon: 0-90 days
  experiment: 以手工导入和原型案卷导出的方式，为真实项目运行两个礼宾式试点。
  hypothesis: 即便软件自动化尚未完成，白手套交付也能证明案卷组装速度至少提升 50%。
  successMetric: 交付两个付费试点，并记录前后时间节省，且在内部审查中没有关键缺失材料遗漏。
  owner: 创始人 + 解决方案负责人
- horizon: 90-180 days
  experiment: 为配音、语音和后期制作合作方推出标准化供应商声明采集流程。
  hypothesis: 标准化供应商数据采集能消除跨项目复用中摩擦最大的瓶颈之一。
  successMetric: 70% 的试点供应商通过产品提交声明，且前 5 个项目的模板复用率超过 50%。
  owner: 产品与工程
- horizon: 90-180 days
  experiment: 针对 6-8 个潜在客户，测试“试点费用 + 年度工作区转化报价”的定价方案。
  hypothesis: 买方在入门阶段更偏好按项目定价，但在管理多个项目后会愿意签署年度工作区合同。
  successMetric: 至少 2 个年度工作区转化，或来自试点账户的已签署扩展承诺。
  owner: 创始人
- horizon: 180-365 days
  experiment: 增加在客户发现中出现频率最高的两项文档仓库集成，并衡量上线速度改进。
  hypothesis: 选择性集成可以提升销售速度和毛利率，而无需构建完整企业平台。
  successMetric: 对已集成账户而言，上线时间降到 5 个日历日以下，实施工作量较手工配置下降 30%。
  owner: 工程
- horizon: 180-365 days
  experiment: 验证一个非奖项工作流，例如面向流媒体或制片厂制作的数字替身同意追踪。
  hypothesis: 同一证据模型只需有限产品变更，就能解决奥斯卡之外更广泛的 AI 披露任务。
  successMetric: 一个付费的非奖项设计伙伴上线，且工作流定制差异相较奖项产品低于 20%。
  owner: 创始人 + 产品
operations:
- 为法务和表演者敏感记录提供安全文档导入、审计日志和细粒度权限
- 与外部娱乐法律顾问共同维护模板，以应对规则、工会和法规变化
- 建立供应商声明请求、跟进和异常处理的标准操作流程
- 建立客户成功工作流，在每个真实项目上衡量节省时间和缺失材料减少情况
- 用 CRM 和合作伙伴追踪管理为销售漏斗输送机会的律所、奖项顾问和后期供应商
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 在品类定义仍在形成时，负责设计伙伴销售、工作流发现、合作伙伴发展，以及早期服务占比较高的交付。
- role: 创始工程师
  startTiming: Month 0
  rationale: 构建早期试点所需的核心证据图谱、权限、审计轨迹和导出工作流。
- role: 解决方案/合规负责人
  startTiming: Month 3
  rationale: 将法务和奖项要求转化为模板，负责上线，并把白手套交付系统化为可重复的产品需求。
- role: 全栈产品工程师
  startTiming: Month 6
  rationale: 在试点反馈清晰后，加速集成、多项目工作流功能和管理工具建设。
- role: 合作伙伴与客户成功负责人
  startTiming: Month 9
  rationale: 在高度集中的市场里，建立与律师、顾问和供应商的转介渠道，同时守住续费和扩展。
milestones:
- horizon: 0-12 个月
  items:
  - 与独立发行商或制片方完成 3-5 个付费真实项目试点
  - 证明案卷组装时间相较手工流程至少缩短 50%
  - 推出可复用的供应商声明和条款模板库
  - 至少将 2 个试点账户转化为年度多项目工作区
  - 验证最需要的集成项并交付前两个
- horizon: 12-24 个月
  items:
  - 通过律师、顾问和供应商渠道形成可重复的年度工作区销售动作
  - 基于同一证据图谱上线一个付费的非奖项披露工作流
  - 为更大客户建立审计日志、异常处理和跨项目报表
  - 在发行商、制片方和合作伙伴渠道中建立标杆客户
- horizon: 24-36 个月
  items:
  - 扩展到奖项周期之外的制片厂、流媒体或广告主 AI 披露项目
  - 深化与买方已在使用的权利、文档和来源生态系统的集成
  - 利用历史材料包和异常数据提高模板复用率和产品黏性
  - 决定继续作为聚焦型合规层，还是扩展为更大的权利与披露平台
risks:
- risk: 面向奥斯卡就绪的滩头市场可能过小且季节性过强，难以单独支撑风险投资式增长。
  likelihood: High
  impact: High
  mitigation: 仅将奖项工作流作为首个证明点，并在前 12-15 个月内验证更广泛的披露用例。
- risk: 由于项目数量少，买方可能继续依赖外部律师、共享盘和相邻工具。
  likelihood: High
  impact: High
  mitigation: 交付白手套式试点，量化节省时间，并以律师可参与且不失控制权的方式打包输出。
- risk: 学院指南及相关法律预期的变化速度，可能快于静态模板的更新速度。
  likelihood: Medium
  impact: Medium
  mitigation: 保持产品可配置、模板版本化，并与娱乐法律顾问和行业伙伴保持常规更新闭环。
- risk: 敏感合同和表演者同意文件会在采购中引发信任与安全疑虑。
  likelihood: Medium
  impact: High
  mitigation: 在首批版本中优先提供细粒度权限、审计日志、安全导入以及最低必要集成。
fundingAsk:
  stage: 种子前轮
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 为期 18 个月的资金将用于构建核心案卷工作流、拿下若干付费真实项目试点、证明模板复用和时间节省可重复、与律师和供应商建立渠道合作，并验证至少一条更广泛的非奖项扩展路径。
