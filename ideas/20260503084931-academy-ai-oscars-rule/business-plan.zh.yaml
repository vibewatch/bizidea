slug: film-authorship-ledger
date: '2026-05-03'
executiveSummary: >-
  Film Authorship Ledger 面向独立发行商和制片方里的商务法务、制作法务团队，销售一套申报就绪软件，服务那些使用过 AI 辅助供应商、且要冲奖的影片。眼下最急的问题不是识别 AI，而是能否在学院 2026 年新规下，及时证明真人表演、真人作者身份以及表演者同意，从而不在申报时翻车。MVP 应是一套案卷生成器：接入合同、法务计费、演员同意书、剧本草稿和供应商声明，自动标出缺失证据，再导出一份可交给学院的材料包。它的 GTM 必须收得很窄：在奖季启动或律师复核阶段切入，按活跃影片收费并叠加年度工作区订阅，通过创始人主导销售、奖项顾问、娱乐法律顾问以及制造合规负担的后期供应商来分发。研究表明，真实的工作流痛点和监管顺风都存在；但也表明“只做奥斯卡”这个滩头很小，SAM 约为 $4.2M，买方也高度集中。只有当公司能借奖项切口，证明自己其实是在建立一套更广义的 AI 权利、授权同意和披露系统记录层，才值得被当作可投资项目继续看。当前最大的缺口，是学院到底会多频繁地追要补充材料，以及它究竟会要求哪些申报文件；因此第一版产品必须保持可配置，而不是硬编码成一张固定表单。投资人当下更合适的姿态是继续观察，先等 live-title 试点证明：买方愿意为显著更快的案卷组装掏软件预算，而不只是多付几小时外部律师费。
problem:
  - 要冲奖的电影团队，如今如果拿不出署名表演和剧本由真人完成且取得同意的证明，就会直接面对参评资格风险；但相关证据散落在合同、计费记录、邮件、剧本修订和供应商文件中。
  - 商务法务团队现在往往要在奖季后半段，靠手工把作者身份记录重新拼出来；这个过程既慢、又容易出错，也很难在多部影片之间复用。
  - 现有替代方案都只覆盖了问题的一部分：工作流工具管文件，权利系统管合同，来源工具挂元数据，外部律师则昂贵且难以复用。
solution:
  - 做一层中立证据层，把法务、制作和供应商材料串成一份按影片组织的人类作者身份与授权同意案卷。
  - 先从可配置的奥斯卡申报就绪工作流切入，自动标出缺失材料、标准化供应商声明，并导出律师易于审阅的材料包。
  - 再把同一套证据关系图扩展成长期 AI 披露、数字替身同意和权利合规工作流，服务更广泛的专业影视内容方。
whyWeWin:
  - 产品直接切进学院新规真正点名的商务法务流程，而不是再去和创作型 AI 工具或泛化来源 SDK 正面竞争。
  - 可复用的条款库、声明模板和历史缺件模式，会随着影片数增加不断复利，让律师主导的手工流程越来越难追上。
  - 买方会更偏好一套中立的跨供应商台账，因为单个配音、声音或后期供应商既看不到整部片子的全貌，也没有动力替竞争对手做证明。
  - 为娱乐法律顾问设计的高触达 onboarding 和导出格式，能在第一轮采购里削弱“继续用共享网盘就行”的默认阻力。
strategicChoices:
  beachhead: 面向美国独立发行商和制片方，服务其管理 2-10 部冲奖剧情片、且在后期、配音、剧本或数字表演流程里使用过 AI 辅助供应商的奥斯卡申报就绪需求。
  wedgeRationale: 奖项申报工作流很窄、截止时间明确，而且通常由少数法务与奖项运营人员直接负责；相比那些需要更深集成、采购更慢、触发也没那么紧急的广义制片厂合规平台，这个切口更容易更快证明价值。
  sequencingRationale: 先用服务辅助的方式，把案卷组装、文件接入、权限控制和导出模板做扎实，因为学院的精确工作流仍不清楚；等 live-title 证据跑出来后，再补可复用的供应商声明流和系统集成；只有那之后，才去扩展到更广义的非奖项 AI 披露工作流，并把销售动作做大。
  notYet:
    - 面向制片厂的完整合同生命周期或企业级权利管理
    - 自动 AI 检测、水印或纯来源工具
    - 在奖项工作流尚未稳定转化前，就提前大举扩到广告、游戏或流媒体合规
market:
  tam: 面向专业影视内容的 AI 作者身份、授权同意与披露工作流软件，按自下而上估算的 TAM 约为 $48.0M。
  sam: 面向需要申报就绪工作流的冲奖独立影片与发行商管理片单，滩头 SAM 约为 $4.2M。
  som: 第 3 年可触达的 SOM 约为 $1.2M，对应约 35 个 live title/workspace，分布在大约十几个账户里，每个 title/workspace 的年化合同价值约为 $35k。
  segments:
    - 正在跑奖季的独立发行商与制片方中的商务法务、制作法务和奖项运营团队
    - 负责跨供应商协调材料的娱乐法律顾问、奖项顾问和后期制作主管
  buyingProcess: 商务法务或奖项运营团队通常会在奖季准备开始、或律师复核 AI 接触点时先发现需求，之后由总法律顾问、商务法务负责人或奖项高管批准预算。由于文件高度敏感、法务审核严格，采购过程会被拖慢，所以早期成交必须依赖白手套式 onboarding 和律师友好的输出。
product:
  mvp: 这个 MVP 是一套面向单部 live title 的安全案卷生成器：接入合同、法务计费、演员同意书、剧本草稿和供应商声明；按署名表演和剧本来追踪缺失材料；并导出一份可配置的申报材料包。第一版先支持手工上传和轻量元数据标记，不急着做深度集成。
  sixMonth: 完成 3-5 部 live title 的 onboarding，上线角色权限、标准化供应商声明流程、可复用的条款和同意模板，以及与手工流程对比的案卷生成时长基准。
  twelveMonth: 加入审计日志、例外处理、带版本的补件请求、客户发现里最常见文件库的集成，以及面向发行商账户的多片工作区管理。
  twentyFourMonth: 从奥斯卡申报就绪，扩到片库级、下游发行交易和非奖项影视制作中的长期 AI 披露与数字替身同意合规。
  keyBets:
    - 买方会先接受一套可配置证据工作流，而不是一开始就要求完整 CLM 或创作工具集成。
    - 只要导出格式贴合既有审阅习惯，律师和奖项运营方就会接受标准化模板。
    - 供应商声明收集能够被做成足够可复用的流程，从而显著缩短案卷组装时间。
    - 同一张证据关系图，能从奖项申报自然扩展到更广泛的权利与披露基础设施。
gtm:
  wedge: 先卖一套白手套式的奥斯卡申报就绪工作流，服务那些已经预期会遭遇额外法务审查、且截止时间让手工收集变得痛苦的 AI 参与影片。
  channels:
    - 创始人主导外呼，直接面向有活跃奖季项目的独立发行商和制片方
    - 与娱乐法律事务所和奖项顾问建立转介绍合作
    - 通过配音、声音和后期供应商引荐，因为这些供应商的工作流本身就在制造声明需求
    - 等试点跑通后，再与工作流和权利栈现有厂商探索定向共销或集成
  funnelTargets: 让 20-30% 的合格设计伙伴对话转成付费试点，60% 以上的试点转成第二部 live title 或年度工作区，且在有持续奖季或披露需求的账户里做到 80% 以上的年度 logo 留存。
  pricing: 采用试点 onboarding 费 + 按影片收取申报费 + 按活跃影片与外部协作者席位计费的年度工作区订阅；这种方式既贴合 live campaign 的紧迫性，也能在一个发行商同时管理多部影片时顺势扩张。
businessModel:
  revenueStreams:
    - 按影片收取案卷准备和申报就绪费用
    - 面向多片团队的年度工作区订阅
    - 高级审计支持、模板更新和合规 onboarding 服务
  unitOfValue: 奖项周期里的活跃影片 title/workspace，以及面向供应商和律师的附加协作者席位
  targetGrossMarginPct: 75
  expansionLevers:
    - 把单片试点转成多片年度工作区
    - 增售面向供应商、律师和合作伙伴的协作流程
    - 在奖季之外销售更广泛的 AI 披露与数字替身同意模块
strategyMap:
  northStarMetric: 在申报截止前完成完整案卷、且不存在重大缺件例外的付费 live title 数量
  inputMetrics:
    - 每个奖季新获得的合格 live-title 机会数
    - 从 kickoff 到案卷完整的中位天数
    - 第一次内部审核时的缺件率
    - 试点转多片合同的转化率
    - 证据包中复用既有模板或声明的占比
  moatsToBuild:
    - 可复用的条款、同意书和供应商声明模板库
    - 串联法务、计费和供应商记录的跨片证据关系图
    - 历史缺件模式和成功回复材料的数据集
    - 嵌入 onboarding 的律师与供应商分发关系
  killCriteria:
    - 如果 12 个月内少于 3 个设计伙伴转成付费生产使用，或者中位案卷组装时间相比手工流程改善不到 50%，又或者到第 15 个月仍没有验证出任何非奥斯卡扩展场景，那么独立 venture 论点就会明显减弱。
  mermaid: |
    flowchart LR
      Wedge[奥斯卡就绪切口] --> MVP[案卷生成器 MVP]
      MVP --> Proof[live title 上更快产出完整材料包]
      Proof --> Expansion[多片工作区与更广泛的 AI 披露]
investorMemo:
  verdict:
    call: 继续观察
    conviction: 工作流切口很锋利，但在证明买方紧迫性可以超出狭窄的奥斯卡滩头前，现有证据还不足以支撑 venture 级规模判断。
    whyBelieve: 这家公司瞄准的是一个刚被正式规则化的合规流程，责任人清楚、截止时间很硬，而且在跨供应商证据组装这件事上，市场里几乎没有直接点状竞品。
    whyDoubt: 初始市场太小、买方也很集中；如果学院执行力度偏轻，买方完全可能继续依赖外部律师和现有工具。
    nextDiligence: 去确认 live campaign 团队是否愿意为显著更快的案卷组装支付软件预算，并验证同一套证据模型能否延展到非奖项披露工作流。
  firstCustomer:
    title: 手里有 live awards contender 的独立发行商商务法务负责人
    profile: 一家以美国为中心的发行商或制片方，管理 2-10 部剧情片，至少有一部影片使用过 AI 辅助配音、后期、剧本或数字表演供应商，并正处在奖季推进中。
    trigger: 奖季启动，或外部律师复核时暴露出新的学院规则与表演者同意文档风险。
    buyer: 商务法务负责人、总法律顾问，或奖项策略执行副总裁
    initialContract: $15k-$25k 的单片付费试点；随着账户增加影片、协作者和持续披露需求，逐步扩成约 $30k-$50k 年化工作区合同。
  mustBeTrue:
    - 至少 10 个目标买方里，有 5 个会明确表示：当前手工案卷组装已经痛到足以在下个奖季前采购一套专用工作流。
    - 试点客户能把端到端案卷组装时间，相比旧流程压缩至少 50%。
    - 60% 以上的付费试点能在一个奖季内扩到第二部影片或年度工作区。
    - 娱乐法律顾问和奖项顾问接受产品导出的材料，而不要求整套重做。
    - 到第 15 个月，至少有 2 个设计伙伴验证同一套证据关系图在非奥斯卡场景里的付费用例。
  diligenceQuestions:
    - 奖项团队到底有多频繁会收到学院关于 AI 使用的补件追问？通常会被要求哪些材料？
    - 现在最耗时的材料究竟是哪类：合同、计费记录、剧本修订，还是供应商声明？
    - 为什么买方会愿意买软件，而不是给外部律师多加几小时工时，或继续用 Frame.io 加共享网盘？
    - 第一版部署里，哪些文件库集成是必须有的，哪些还能继续手工？
    - 这个产品真能扩到制片厂、流媒体或广告主的披露流程，而不滑向一家重服务的法律外包公司吗？
  riskHeatmap:
    - risk: 学院实际执行量偏低，买方继续容忍手工流程
      likelihood: Medium
      impact: High
      leadingIndicator: 前 10 次客户访谈里，少于 2 次提到最近出现过、或预计会出现与 AI 使用相关的补件请求。
      mitigation: 产品定位要围绕奖季推进速度和可复用证据组装，而不只押注学院正式追件；同时尽早验证相邻披露用例。
    - risk: 买方继续默认选择外部律师和现有工具
      likelihood: High
      impact: High
      leadingIndicator: 付费试点高度依赖定制化服务，而且无法转成可复用的多片订阅。
      mitigation: 早期 onboarding 可以高触达，但模板、导出格式和时间节省证据必须尽快标准化，让律师变成渠道而不是替代方案。
    - risk: 滩头市场太小，撑不起 venture 结果
      likelihood: High
      impact: High
      leadingIndicator: 奖项试点明明成功，但 15 个月内仍没有任何非奖项设计伙伴或扩张机会成交。
      mitigation: 明确把奥斯卡视为验证切口，最迟在第 9-12 个月就优先推进相邻的权利与披露工作流。
    - risk: 规则和合作方预期持续变化，产品要求反复改写
      likelihood: Medium
      impact: Medium
      leadingIndicator: 前 5 次部署里，模板都需要按影片重造，几乎看不到复用率。
      mitigation: 底层工作流必须保持可配置、模板要带版本管理，并和娱乐法律顾问及关键合作伙伴维持正式更新回路。
operatingAssumptions:
  - assumption: 冲奖的独立发行商在影片涉及 AI 工作流时，会愿意购买专用软件，而不只依赖外部律师和共享网盘。
    basis: research.yaml
    validationTest: 在首个奖季里，用 10-12 次合格买方对话拿下至少 3 个付费试点。
    decisionImpact: 如果不成立，就要把定位改成面向律师的服务软件，或降低对这一赛道的优先级。
  - assumption: 在没有深度 CLM 或工作流集成的情况下，手工上传、标记和导出也足以提供首批价值。
    basis: operator judgment
    validationTest: 前 3 部影片的 onboarding 都能在 10 个日历日内完成，并有文档证明案卷组装时间缩短 50%。
    decisionImpact: 如果不成立，路线图就得更早转向集成，融资需求也会随之上升。
  - assumption: 当价格和 live-title 紧迫性、多协作者场景绑定在一起时，每个活跃账户 $30k-$50k 的年化价位可以被接受。
    basis: idea.yaml
    validationTest: 与 8-10 个买方做结构化定价测试，并拿到至少 2 个高于 $15k 的试点，且明确存在扩成年度工作区的路径。
    decisionImpact: 如果不成立，公司可能需要更低 ACV 的供应商渠道模式，或更宽的产品范围来支撑预算。
  - assumption: 只要产品能降低文档摩擦，又不挤压他们的角色，律师、奖项顾问和后期供应商就愿意成为转介绍渠道。
    basis: research.yaml
    validationTest: 在 9 个月内拿到 3 个活跃转介绍伙伴，每个伙伴至少带来 2 个合格机会。
    decisionImpact: 如果不成立，获客将更依赖创始人直销，销售成本更高，品类公信力也会爬得更慢。
  - assumption: 同一张证据关系图，能扩到奥斯卡之外更广泛的 AI 披露和数字替身同意工作流。
    basis: research.yaml
    validationTest: 到第 15 个月，落地 2 个非奖项设计伙伴，且在同一核心产品上额外定制不超过 20%。
    decisionImpact: 如果不成立，venture 逻辑会明显转弱，因为业务仍被锁在一个狭窄且季节性的市场里。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 访谈奖项顾问、娱乐法律顾问，以及参与 live 或近期奖季项目的商务法务负责人。
    hypothesis: 最难的痛点不是写政策语言，而是如何跨多个系统把证据收齐并确认无缺。
    successMetric: 完成 15 次访谈，产出一张按材料类型排序的痛点地图，并至少有 5 位买方确认愿意测试 live-title 工作流。
    owner: Founder
  - horizon: 0-90 天
    experiment: 用手工接入和原型导出，跑 2 个 concierge 式 live-title 试点。
    hypothesis: 在软件自动化尚未完备前，高触达交付也能把案卷组装时间至少压缩 50%。
    successMetric: 2 个付费试点交付完成，有前后对比的时间节省记录，而且在内部审核时没有出现关键缺件遗漏。
    owner: Founder plus solutions lead
  - horizon: 90-180 天
    experiment: 上线面向配音、声音和后期合作方的标准化供应商声明收集流程。
    hypothesis: 标准化的供应商数据收集，可以拿掉跨片复用里最顽固的一道摩擦。
    successMetric: 70% 的试点供应商通过产品提交声明，且前 5 部影片里模板复用率超过 50%。
    owner: Product and engineering
  - horizon: 90-180 天
    experiment: 在 6-8 个潜在客户里测试“试点费 + 年度工作区转化”的定价方案。
    hypothesis: 买方入门时更愿意接受与影片挂钩的计价，但一旦开始管理多部影片，就会愿意签年度工作区合同。
    successMetric: 至少 2 个年度工作区转化，或试点账户签下明确的扩张承诺。
    owner: Founder
  - horizon: 180-365 天
    experiment: 接入客户发现里最常见的两个文件库，并衡量 onboarding 速度改善。
    hypothesis: 有选择地补集成，就能提升销售速度和毛利，而不必先造一整套企业平台。
    successMetric: 有集成的账户 onboarding 时间降到 5 个日历日以内，实施成本比手工方案再降 30%。
    owner: Engineering
  - horizon: 180-365 天
    experiment: 验证一个非奖项工作流，例如流媒体或制片厂项目里的数字替身同意追踪。
    hypothesis: 同一套证据模型在奥斯卡之外，也能用较少产品改动解决更广泛的 AI 披露任务。
    successMetric: 1 个付费非奖项设计伙伴上线，且和奖项产品相比自定义工作流差异低于 20%。
    owner: Founder plus product
operations:
  - 为法务与表演者敏感文件提供安全接入、审计日志和细粒度权限控制
  - 与外部娱乐法律顾问建立模板维护机制，持续跟进规则、工会和法规变化
  - 建立供应商声明请求、催收与例外处理的标准作业流程
  - 在每一部 live title 上，用客户成功流程量化节省时间和缺件率下降
  - 用 CRM 和合作伙伴管理机制，持续跟踪律所、奖项顾问和后期供应商带来的销售线索
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 在品类仍未定型时，必须亲自负责设计伙伴销售、工作流调研、渠道拓展，以及前期偏服务化的交付。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 首批试点真正离不开的，是证据关系图、权限体系、审计轨迹和导出工作流，这些都要从第一天开始搭。
  - role: 解决方案/合规负责人
    startTiming: Month 3
    rationale: 这个角色要把法务和奖项要求翻成模板，承担 onboarding，并把高触达交付逐步固化成可复用的产品需求。
  - role: 全栈产品工程师
    startTiming: Month 6
    rationale: 当试点反馈逐渐清晰后，需要有人加速集成、多片工作流和后台工具的开发。
  - role: 合作伙伴与客户成功负责人
    startTiming: Month 9
    rationale: 在买方高度集中的市场里，续费、扩张和律所/顾问/供应商渠道建设必须有人专门负责。
milestones:
  - horizon: 0-12 个月
    items:
      - 与独立发行商或制片方完成 3-5 个付费 live-title 试点
      - 证明案卷组装时间相比手工流程至少缩短 50%
      - 上线可复用的供应商声明与条款模板库
      - 至少 2 个试点账户转成年度多片工作区
      - 验证最关键的集成需求，并交付前两个集成
  - horizon: 12-24 个月
    items:
      - 通过律师、顾问和供应商渠道，形成可重复的年度工作区销售动作
      - 用同一套证据关系图，落地 1 个付费非奖项披露工作流
      - 为更大账户补齐审计日志、例外处理和跨片报表能力
      - 在发行商、制片方和伙伴渠道里建立可引用客户案例
  - horizon: 24-36 个月
    items:
      - 扩展到奥斯卡周期之外的制片厂、流媒体或广告主 AI 披露项目
      - 深化与权利系统、文件系统和来源生态的集成，嵌入买方已有工作流
      - 利用历史材料包和例外数据，提升模板复用率与产品黏性
      - 决定公司是继续保持聚焦的合规层，还是扩成更大的权利与披露平台
risks:
  - risk: 奥斯卡申报切口本身太小、又有明显季节性，单独不足以支撑 venture 级增长。
    likelihood: High
    impact: High
    mitigation: 明确把奖项工作流当作首个验证点，并在前 12-15 个月内验证更广泛的披露用例。
  - risk: 由于影片数量有限，买方继续依赖外部律师、共享网盘和相邻工具。
    likelihood: High
    impact: High
    mitigation: 先交付白手套式试点，把时间节省量化清楚，并把导出格式做成律师能无缝接手的样子。
  - risk: 学院指引和相关法律预期的变化速度，会快过静态模板的更新速度。
    likelihood: Medium
    impact: Medium
    mitigation: 保持产品可配置、模板带版本管理，并和娱乐法律顾问及行业伙伴保持定期更新。
  - risk: 敏感合同和表演者同意文件，会在采购阶段引发信任和安全顾虑。
    likelihood: Medium
    impact: High
    mitigation: 第一版就优先补齐细粒度权限、审计日志、安全接入，以及尽量少但足够的关键集成。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月把核心案卷工作流做出来，完成若干付费 live-title 试点，证明模板复用和时间节省可以复制，建立律师与供应商渠道关系，并验证至少一个更广义的非奖项扩展路径。
