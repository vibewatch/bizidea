slug: film-authorship-ledger
date: '2026-05-03'
executiveSummary: >-
  Film Authorship Ledger 面向独立发行商和制片公司里的商务法务、制作法务团队，出售一套“提交流程是否就绪”的软件，服务对象是那些管理冲奖影片、且在制作中使用过 AI 辅助供应商的团队。眼下最急的不是识别 AI，而是要在学院 2026 年新规下，足够快地证明人类表演、人类创作归属和表演者同意都站得住脚，避免提交时突然踩中资格雷区。MVP 是一套资料包构建器：接入合同、法务计费记录、演员同意书、剧本草稿和供应商声明，标出缺失证据，再导出一份可直接交学院的材料包。GTM 也刻意收得很窄：在奖项宣传启动或律师审查阶段切入，按活跃片名收费并叠加年度工作区订阅，再通过创始人主导销售、奖项顾问、娱乐法律顾问和后期制作供应商分发，因为正是这些人的工作流制造了合规负担。研究表明，这个工作流痛点真实存在，外围监管顺风也在累积，但奥斯卡单点切口仍然很小，估算的 SAM 只有 $4.2M，而且买方高度集中。所以这门生意只有在公司能借奖项切口证明自己正在搭建一套更大的 AI 权利、授权同意和披露记录系统时，才值得下注，目标对象应扩展到制片厂、流媒体、广告主和游戏发行商。当前最大的空白，是学院到底会多频繁地要求补充材料，以及它究竟要哪些提交文件还不够确定，因此第一版产品必须保持可配置，而不是把流程硬编码成一种表单。投资判断暂时维持 Watch——先看真实片名试点能否证明买家愿意掏软件预算，而不是只愿意多付外部律师工时，来换取明显更快的资料包拼装速度。
problem:
  - 冲奖电影团队现在面临一项正式的资格风险：如果无法证明署名表演和剧本由人类完成且经过同意，就可能失去参评资格；可这些证据却散落在合同、计费记录、邮件、剧本修订和供应商文件里。
  - 商务法务团队如今往往要在宣传周期后段靠人工重建创作归属记录，速度慢、出错率高，也几乎没法在多个片名之间复用，更难应付学院后续追问。
  - 现有替代方案都只覆盖了问题的一部分：工作流工具管文件，权利系统管合同，来源工具挂元数据，外部律师则贵且不可复用。
solution:
  - 搭建一层中立证据层，把法务、制作和供应商材料串成片名级别的人类创作归属与授权同意资料包。
  - 先从可配置的奥斯卡提交前就绪工作流切入：标出缺失材料、标准化供应商声明，并导出律师友好的提交包。
  - 再把同一套证据图谱扩展成更广义的 AI 披露、数字替身授权同意和权利合规工作流，服务更广泛的影视内容持有者。
whyWeWin:
  - 产品直接切进学院规则点名的商务法务流程，而不是去做另一个创作型 AI 工具或通用来源 SDK。
  - 可复用的条款库、声明模板和历史缺失材料模式，会随着片名累积不断变厚，也更难被依赖律师的人工作法复制。
  - 买方可能更愿意用一套中立的跨供应商台账，因为任何一家配音、声音或后期供应商都看不到整条制作链，也不会主动替竞争对手留档。
  - 面向娱乐法律顾问设计的高触达入驻和导出格式，可以在第一轮采购里降低“继续放共享网盘就行”的默认阻力。
strategicChoices:
  beachhead: 面向美国市场的独立发行商和制片方，服务那些手上有 2-10 部冲奖剧情片、并在后期制作、配音、剧本或数字表演环节使用了 AI 辅助工作流的团队，提供奥斯卡提交前就绪方案。
  wedgeRationale: 奖项工作流边界窄、截止期硬，而且由一小群法务和奖项运营人员负责，因此比起需要更深集成、更长采购周期、触发条件也没那么急的制片厂级合规平台，更容易先跑出价值证明。
  sequencingRationale: 先从服务辅助式的资料包拼装、文档接入、权限管理和可导出模板做起，因为学院的真实工作流仍不够明朗；等到真实片名里跑出证据，再补上可复用的供应商声明流程和系统集成；最后才扩到更广的非奖项 AI 披露场景，并建立更规模化的销售动作。
  notYet:
    - 面向制片厂的完整合同生命周期或企业级权利管理
    - 自动 AI 检测、水印能力或只做来源证明的工具
    - 在奖项工作流尚未反复验证转化之前，就大举扩到广告、游戏或流媒体合规
market:
  tam: 面向专业影视内容的 AI 创作归属、授权同意与披露工作流软件，按自下而上估算的 TAM 为 $48.0M。
  sam: 面向奖项相关的独立和发行商管理剧情片、需要提交前就绪工作流的滩头市场，估算 SAM 为 $4.2M。
  som: 按约 35 个活跃片名/工作区、约 12 个账户、每个片名/工作区年化合同额约 $35k 估算，第 3 年可触达的 SOM 为 $1.2M。
  segments:
    - 拥有在运行奖项宣传项目的独立发行商和制片方中的商务法务、制作法务与奖项运营团队
    - 负责跨供应商统筹文档的娱乐法律顾问、奖项顾问和后期制作主管
  buyingProcess: 通常是在奖项宣传准备启动，或法务审查到 AI 触点时，商务法务或奖项运营先识别需求，随后由总法律顾问、商务法务负责人或奖项高管拍板预算。由于文件敏感、法务审查重，早期成交必须配套白手套式入驻和律师友好的输出格式。
product:
  mvp: MVP 是一套面向单个在运行片名的安全资料包构建器，接入合同、法务计费记录、演员同意书、剧本草稿和供应商声明；按署名表演与剧本追踪缺失材料；并导出一份可配置的提交包。在深度集成之前，它先支持手动上传和轻量级元数据标注就够了。
  sixMonth: 完成 3-5 个在运行片名入驻，交付基于角色的权限、标准化供应商声明流程、可复用的条款与授权模板，以及相对人工流程的资料包生成时长基准。
  twelveMonth: 增加审计日志、异常处理、带版本的证据请求，接上客户调研里出现频率最高的文档仓库，并为发行商账户补齐多片名工作区管理。
  twentyFourMonth: 从奥斯卡专项就绪扩展到持续性的 AI 披露与数字替身授权同意合规，覆盖片库、下游发行交易，以及电影和高端剧集里的非奖项制作。
  keyBets:
    - 买方会先接受一套可配置的证据工作流，而不是一上来就要求完整 CLM 或创作工具集成。
    - 只要导出结果符合既有审阅习惯，律师和奖项运营人员会接受标准化模板。
    - 供应商声明收集有机会被产品化成一套足够可重复的流程，从而显著缩短资料包拼装时间。
    - 同一套证据图谱最终能从奖项提交扩展到更广泛的权利与披露基础设施。
gtm:
  wedge: 面向那些使用过 AI 辅助供应商、法务团队预期会被更严格审查、且截止期让人工收集极其痛苦的片名，出售一套白手套式奥斯卡提交前就绪工作流。
  channels:
    - 由创始人直接外呼给正在运营奖项宣传的独立发行商和制片方
    - 与娱乐法律事务所和奖项顾问建立转介合作
    - 从配音、声音和后期制作供应商获得引荐，因为他们的工作流天然会制造声明需求
    - 试点证明成立后，再与工作流和权利栈现有厂商推进定向共销或集成合作
  funnelTargets: 设计合作伙伴层面的合格对话，力争 20-30% 转成付费试点；试点中 60% 以上转成第二个在运行片名或年度工作区；对于有重复奖项或披露需求的账户，年化 logo 留存做到 80% 以上。
  pricing: 采用试点入驻费 + 按片提交费 + 年度工作区订阅的定价方式，价格随活跃影片数和外部协作者席位浮动；这样既能贴合真实宣传周期里的紧迫感，也能在一家发行商管理多部影片时自然扩容。
businessModel:
  revenueStreams:
    - 按片资料包准备与提交前就绪费用
    - 面向多片名发行商或制片团队的年度工作区订阅
    - 高级审计支持、模板更新和合规入驻服务
  unitOfValue: 以奖项周期内的活跃电影片名/工作区为价值单元，并可为供应商和律师增加协作席位
  targetGrossMarginPct: 75
  expansionLevers:
    - 把单片试点转成多片年度工作区
    - 增售面向供应商、律师和合作伙伴的付费协作流程
    - 在奖项季之外出售更广泛的 AI 披露与数字替身授权同意模块
strategyMap:
  northStarMetric: 在提交截止日前完成完整资料包、且没有重大缺失材料异常的付费在运行片名数量
  inputMetrics:
    - 每个奖项周期获得的合格在运行片名机会数
    - 从启动到资料包完整交付的中位天数
    - 首次内部审查时的缺失材料率
    - 试点转多片名的转化率
    - 证据包中复用历史模板或声明的占比
  moatsToBuild:
    - 可复用的条款、授权同意和供应商声明模板库
    - 串联法务、计费与供应商记录的跨片名证据图谱
    - 关于缺失材料模式和成功回复材料包的历史数据集
    - 嵌入入驻流程中的律师与供应商分发关系
  killCriteria:
    - 如果 12 个月内少于 3 个设计合作伙伴转成付费生产使用，或者资料包拼装中位时长相比人工流程缩短不到 50%，或者到第 15 个月仍未验证出任何非奥斯卡扩展场景，那么独立创业的逻辑就会明显走弱。
  mermaid: |
    flowchart LR
      Wedge[奥斯卡就绪切口] --> MVP[资料包构建器 MVP]
      MVP --> Proof[真实片名更快拿出完整材料包]
      Proof --> Expansion[多片名工作区与更广泛的 AI 披露]
investorMemo:
  verdict:
    call: 观望
    conviction: 工作流切口很强，但在没有证据证明买方在小体量奥斯卡滩头市场之外也足够紧迫之前，现有材料还不足以支撑风险投资级别的下注。
    whyBelieve: 公司切中的是一个刚被正式规则化的合规工作流，责任人明确、截止期明确，而且在跨供应商证据拼装上几乎没有强势的点状对手。
    whyDoubt: 初始市场小且买方高度集中；如果学院执行偏轻，买方完全可能继续依赖外部律师加现有工具。
    nextDiligence: 需要在真实宣传项目里确认，团队是否愿意拿软件预算换取显著更快的资料包拼装速度，以及同一套证据模型是否真能延展到非奖项披露场景。
  firstCustomer:
    title: 手上有在运行冲奖片名的独立发行商商务法务负责人
    profile: 一家以美国市场为主的发行商或制片方，运营 2-10 部剧情片，其中至少一部使用过 AI 辅助配音、后期、剧本或数字表演供应商，并且正在推进奖项宣传。
    trigger: 奖项宣传启动，或外部律师审查时暴露出新的学院与表演者授权同意文档风险。
    buyer: Head of Business Affairs, General Counsel, or EVP Awards Strategy
    initialContract: 首个在运行片名的付费试点约 $15k-$25k；随着账户加入更多片名、协作者和持续披露需求，再转成约 $30k-$50k 的年化工作区支出。
  mustBeTrue:
    - 10 个目标买方里，至少有 5 个明确表示当前人工资料包拼装足够痛，愿意在下一个奖项周期前为专门工作流买单。
    - 试点客户能把端到端资料包拼装时间较以往人工流程至少缩短 50%。
    - 至少 60% 的付费试点能在一个周期内扩展到第二个片名或年度工作区。
    - 娱乐法律顾问和奖项顾问能接受产品导出的材料，而不要求彻底重做。
    - 到第 15 个月，至少有 2 个设计合作伙伴用同一套证据图谱验证出付费的非奥斯卡场景。
  diligenceQuestions:
    - 奖项团队到底多常收到学院关于 AI 使用的补件追问？被要求提交的具体材料有哪些？
    - 如今最耗时间的文档类型究竟是哪一类：合同、计费记录、剧本修订，还是供应商声明？
    - 买方为什么会愿意为软件付费，而不是继续给外部律师加工时，或用 Frame.io 加共享网盘凑合？
    - 首次部署里哪些文档仓库集成是刚需，哪些还可以先手工处理？
    - 产品能否扩展到制片厂、流媒体或广告主的披露工作流，而不沦为一家服务密集型法务公司？
  riskHeatmap:
    - risk: 学院实际执行量依旧偏低，买方继续容忍人工流程
      likelihood: 中
      impact: 高
      leadingIndicator: 前 10 次客户访谈里，不到 2 位受访者提到自己最近收过、或预期会收到、与 AI 使用相关的补件请求。
      mitigation: 把产品定位在宣传速度和可复用证据拼装上，而不只押注正式学院补件，并尽早验证相邻披露场景。
    - risk: 买方默认回到外部律师和现有工具
      likelihood: 高
      impact: 高
      leadingIndicator: 付费试点需要大量定制服务，且无法转成可重复的多片名订阅。
      mitigation: 前期允许白手套式入驻，但要把导出格式、模板和节省时间的证据标准化，让律师从替代品变成渠道。
    - risk: 滩头市场本身过小，撑不起风险投资回报
      likelihood: 高
      impact: 高
      leadingIndicator: 即便奖项试点成功，15 个月内仍没有任何非奖项设计合作伙伴或扩展机会成交。
      mitigation: 把奥斯卡只当作证明切口，最晚在第 9-12 个月就优先验证相邻的权利与披露工作流。
    - risk: 规则与合作方预期持续变化，导致产品需求不停漂移
      likelihood: 中
      impact: 中
      leadingIndicator: 前 5 次部署里，模板必须按片名逐个重做，复用率很低。
      mitigation: 把产品做成可配置工作流，模板做版本化，并与娱乐法律顾问和关键合作方建立正式更新机制。
operatingAssumptions:
  - assumption: 当在运行片名的工作流已经沾上 AI 时，冲奖导向的独立发行商会购买专门软件，而不只是继续依赖外部律师和共享网盘。
    basis: research.yaml
    validationTest: 在首个奖项周期中，从 10-12 个合格买方对话里拿下至少 3 个付费试点。
    decisionImpact: 如果不成立，就要转向面向律师赋能的服务软件，或下调这个赛道的优先级。
  - assumption: 即便没有深度 CLM 或工作流集成，只靠手动上传、标注和导出，也能在早期提供足够价值。
    basis: operator judgment
    validationTest: 前 3 个片名都能在 10 个日历日内完成入驻，并实现有记录可证的 50% 资料包拼装提速。
    decisionImpact: 如果不成立，路线图就必须提前把集成放到更高优先级，资本需求也会抬升。
  - assumption: 只要和在运行片名的紧迫度、多方协作挂钩，每个活跃账户 $30k-$50k 的年化价格区间是能被接受的。
    basis: idea.yaml
    validationTest: 与 8-10 位买方做结构化定价测试，并拿下至少 2 个高于 $15k 的试点，证明有机会扩展到年度工作区。
    decisionImpact: 如果不成立，公司可能需要转向更低 ACV 的渠道模式，或扩展产品范围才能撑起预算。
  - assumption: 只要产品能降低文档摩擦、又不抢走他们的位置，律师、奖项顾问和后期供应商愿意成为转介渠道。
    basis: research.yaml
    validationTest: 9 个月内拿下 3 个活跃转介伙伴，每家至少带来 2 个合格机会。
    decisionImpact: 如果不成立，获客将更依赖创始人直销，速度更慢、销售成本也更高，类别可信度会延后建立。
  - assumption: 同一套证据图谱能够扩展到奥斯卡之外、更广的 AI 披露和数字替身授权同意场景。
    basis: research.yaml
    validationTest: 到第 15 个月落地 2 个非奖项设计合作伙伴，且使用同一核心产品时，定制工作流改动不超过 20%。
    decisionImpact: 如果不成立，风险投资逻辑会走弱，因为业务仍暴露在一个狭窄且季节性明显的市场里。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈奖项顾问、娱乐法律顾问，以及负责真实项目或刚结束项目的商务法务负责人。
    hypothesis: 最难的痛点不是写政策，而是跨多个系统把证据拼齐并验证无误。
    successMetric: 完成 15 次访谈，形成一张按材料类型排序的痛点地图，并至少有 5 位买方确认愿意测试真实片名工作流。
    owner: 创始人
  - horizon: 0–90 天
    experiment: 用手动接入和原型导出，为两个真实在运行片名跑礼宾式试点。
    hypothesis: 即便软件自动化还没补齐，白手套交付也能先证明资料包拼装速度至少提升 50%。
    successMetric: 交付两个付费试点，拿到前后对比的时间节省记录，并在内部审查时没有关键缺失材料漏掉。
    owner: 创始人 + 解决方案负责人
  - horizon: 90–180 天
    experiment: 上线面向配音、声音和后期合作方的标准化供应商声明收集流程。
    hypothesis: 把供应商数据采集标准化，能移除跨片名复用里摩擦最大的瓶颈之一。
    successMetric: 70% 的试点供应商通过产品提交声明，前 5 个片名的模板复用率超过 50%。
    owner: 产品与工程
  - horizon: 90–180 天
    experiment: 对 6-8 个潜在客户测试“试点费 + 年度工作区转化”的定价方案。
    hypothesis: 买方在初期更接受按片名挂钩的价格，但一旦要管理多个片名，就会愿意转成年费工作区合同。
    successMetric: 至少完成 2 次年度工作区转化，或拿到试点客户签署的扩容承诺。
    owner: 创始人
  - horizon: 180–365 天
    experiment: 接入调研里最常被点名的两个文档仓库集成，并衡量入驻速度是否改善。
    hypothesis: 做有限度的关键集成，既能提升销售速度和毛利率，又不必提前建设完整企业平台。
    successMetric: 已集成账户的入驻时间降到 5 个日历日以内，实施工作量比手动方案下降 30%。
    owner: 工程
  - horizon: 180–365 天
    experiment: 验证一个非奖项场景，例如面向流媒体或制片厂制作项目的数字替身授权同意追踪。
    hypothesis: 同一套证据模型在奥斯卡之外也能解决更广的 AI 披露问题，而且产品改动有限。
    successMetric: 上线 1 个付费非奖项设计合作伙伴，且相较奖项产品的工作流定制差异低于 20%。
    owner: 创始人 + 产品
operations:
  - 面向法务和表演者敏感文件的安全文档接入、审计日志和细粒度权限管理
  - 与外部娱乐法律顾问配套的模板维护机制，持续跟进规则、工会与法规变化
  - 面向供应商声明请求、催办和异常处理的标准作业流程
  - 在每个真实片名上衡量节省时间和缺失材料下降幅度的客户成功流程
  - 追踪法律事务所、奖项顾问和后期供应商渠道管道的 CRM 与合作伙伴管理
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 在品类定义仍在形成时，亲自负责设计合作伙伴销售、工作流调研、合作拓展，以及早期偏服务化的交付。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 搭建早期试点所需的核心证据图谱、权限体系、审计轨迹和导出流程。
  - role: 解决方案/合规负责人
    startTiming: Month 3
    rationale: 把法务和奖项要求翻成模板，负责入驻，并把白手套交付逐步沉淀成可重复的产品需求。
  - role: 全栈产品工程师
    startTiming: Month 6
    rationale: 在试点反馈逐渐清晰后，加速集成、多片名工作流能力和后台工具建设。
  - role: 合作伙伴与客户成功负责人
    startTiming: Month 9
    rationale: 在高度集中的市场里，一边搭建律师、顾问和供应商转介渠道，一边守住续费和扩容。
milestones:
  - horizon: 0–12 个月
    items:
      - 与独立发行商或制片方拿下 3-5 个付费真实片名试点
      - 证明资料包拼装时间较人工流程至少缩短 50%
      - 上线可复用的供应商声明与条款模板库
      - 至少把 2 个试点账户转成年度多片名工作区
      - 验证最关键的集成需求并上线前两个
  - horizon: 12–24 个月
    items:
      - 通过律师、顾问和供应商渠道，建立可重复的年度工作区销售动作
      - 用同一套证据图谱上线一个付费非奖项披露工作流
      - 为更大账户补齐审计日志、异常处理和跨片名报表
      - 在发行商、制片方和合作伙伴主导渠道中建立标杆客户
  - horizon: 24–36 个月
    items:
      - 扩展到奖项周期之外，服务制片厂、流媒体或广告主的 AI 披露项目
      - 在买方已有工作位置上，深化与权利、文档和来源生态的集成
      - 利用历史资料包与异常数据，提升模板复用率和产品黏性
      - 决定继续保持聚焦型合规层，还是扩成更大的权利与披露平台
risks:
  - risk: 单靠奥斯卡就绪这个滩头市场，规模和季节性都可能不足以单独支撑风险投资级增长。
    likelihood: High
    impact: High
    mitigation: 把奖项工作流只当第一个证明点，并在前 12-15 个月内验证更广的披露使用场景。
  - risk: 由于片名数量不高，买方可能继续依赖外部律师、共享网盘和相邻工具。
    likelihood: High
    impact: High
    mitigation: 先交付白手套式试点，把节省时间量化出来，并把导出格式做成让律师能参与又不失控的样子。
  - risk: 学院指引和相关法务预期的变化速度，可能快过静态模板的更新速度。
    likelihood: Medium
    impact: Medium
    mitigation: 让产品保持可配置、模板版本化，并和娱乐法律顾问及行业伙伴建立定期更新机制。
  - risk: 敏感合同和表演者授权同意文件，会在采购阶段带来信任与安全阻力。
    likelihood: Medium
    impact: High
    mitigation: 在最早几个版本优先把细粒度权限、审计日志、安全接入和最低必要集成做好。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要支撑 18 个月：把核心资料包工作流做出来，拿下数个付费真实片名试点，证明模板复用和时间节省是可重复的，建立与律师和供应商的渠道合作，并验证至少一个更广的非奖项扩展路径。
