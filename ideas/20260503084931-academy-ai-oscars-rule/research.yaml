  validationPlan:
  - priority: high
    question: How often will the Academy actually request AI-usage backup documents, and in what format?
    evidenceToGather: Interview awards consultants, submission managers, and entertainment counsel; obtain anonymized request lists or checklists from live campaigns.
  - priority: high
    question: Which evidence artifacts are hardest to assemble today across contracts, billing, script revisions, and vendor attestations?
    evidenceToGather: Shadow 5-10 business-affairs or production-legal teams on active titles and map time spent per artifact type.
  - priority: medium
    question: Will buyers fund a dedicated workflow tool versus expanding existing counsel-led processes or Frame.io/rights tools?
    evidenceToGather: Run design-partner pricing tests with indie distributors, awards consultants, and post vendors using live-title onboarding offers.
  - priority: medium
    question: What integrations are non-negotiable in the first product version?
    evidenceToGather: Ask prospective users for their current document systems, DMS/CLM tools, and vendor handoff formats; rank by frequency and pain.
