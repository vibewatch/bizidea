openQuestions:
- What exact documentary package will the Academy accept, request, or reject in 2026-2027 live submissions?
- How many awards-contending indie titles already used AI-touched vendors in post, dubbing, or script workflows?
- Can the product prove ROI against outside counsel and shared-drive processes within a single campaign cycle?
- Which systems—DMS, CLM, production accounting, script revision tools, or vendor portals—must integrate first to avoid manual re-entry?
