modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> QualifiedConversations
      QualifiedConversations --> PaidPilots
      PaidPilots --> ActiveWorkspaces
      ActiveWorkspaces --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from growing from 6 billable title/workspaces in Y1 to 35 by Q4Y3 at a blended $38.4K annual ARPU through founder-led and partner-led sales.
  - checkName: Must go right
    finding: Counsel, consultant, and vendor referrals must shorten the sales cycle enough to add customers without building a large direct-sales team before the beachhead broadens.
  - checkName: Model breaks if
    finding: If pricing falls toward $35K and the company tops out near 28 workspaces, Y3 revenue drops below $0.8M and the business stays too services-heavy for efficient follow-on financing.
  - checkName: Next-round proof
    finding: The next round is supported once repeatable annual workspace renewals and at least one paid non-awards workflow are live while the company still has more than six months of cash.
sanityChecks:
  ruleOf40: Y3 growth 131% + EBITDA margin -28% = 103%
  burnMultiple: Y3 burn multiple about 0.45x using $291.6K net burn over $652.8K net new ARR.
  revenuePerFte: $174K Y3 revenue per ending FTE versus a rough $200-400K vertical SaaS benchmark.
  flags:
    - The model still exits Y3 EBITDA-negative, so a next round likely depends on proving broader non-awards expansion rather than only Oscars workflow growth.
    - Customer concentration remains high because 35 billable title/workspaces likely map to roughly a dozen accounts, making renewals and expansions lumpy.
    - Cash collections are assumed to track EBITDA closely; slower legal procurement or delayed invoice payment would reduce real runway.
