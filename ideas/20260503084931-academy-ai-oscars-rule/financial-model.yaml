scenarios:
  downside:
    description: Academy documentation requests stay infrequent, referral channels ramp slower, and pricing lands near the bottom of the tested range.
    y3RevenueK: 783.0
    y3EbitdaK: -510.2
    cashLowPointK: 436.6
    keyAssumptionChanges:
      - ARPU falls to about $34.8K annualized.
      - Q4Y3 customers end at 28 instead of 35.
      - Gross margin slips to 72% because delivery stays more manual.
  base:
    description: Founder-led sales convert early pilots into multi-title workspaces and partner referrals steadily widen the narrow beachhead.
    y3RevenueK: 1043.2
    y3EbitdaK: -291.6
    cashLowPointK: 655.2
    keyAssumptionChanges:
      - ARPU stays at $38.4K annualized.
      - Q4Y3 customers reach 35, matching the research SOM case.
      - Gross margin holds at the 75% target as white-glove work becomes more templated.
  upside:
    description: Channel partners accelerate customer adds, buyers accept broader workspace pricing, and the non-awards workflow starts contributing earlier.
    y3RevenueK: 1375.5
    y3EbitdaK: -42.4
    cashLowPointK: 904.4
    keyAssumptionChanges:
      - ARPU expands to about $42.0K annualized.
      - Q4Y3 customers reach 42 through faster multi-title expansion.
      - The non-awards workflow adds revenue without requiring a second sales hire.
