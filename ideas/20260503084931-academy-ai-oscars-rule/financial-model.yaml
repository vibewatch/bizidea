    source: "[BP date 2026-05-03] First full operating month after report date and pre-seed close heuristic."
  - id: A2
    name: Starting cash after pre-seed close
    value: "2100"
    unit: USDK
    source: "[BP fundingAsk] Pre-seed target range is $2-3M; base case uses $2.1M."
  - id: A3
    name: Blended annual ARPU per billable title/workspace
    value: "38.4"
    unit: USDK
    source: "[BP operatingAssumptions + research market SOM] BP says $30k-$50k annualized price; research uses about $35k/title; base assumes $3.2k monthly as a blended pilot-plus-workspace mix."
  - id: A4
    name: Target gross margin
    value: "75"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A5
    name: Year 1 customer ramp
    value: "6"
    unit: customersEop
    source: "[BP milestones 0-12 months] 3-5 paid pilots plus 2 multi-title/workspace expansions by month 12."
  - id: A6
    name: Year 2 customer ramp
    value: "18"
    unit: customersEop
    source: "[BP milestones 12-24 months + BP gtm funnel] Repeatable referral-led sales motion through counsel, consultants, and vendors by Q4Y2."
  - id: A7
    name: Year 3 customer ramp
    value: "35"
    unit: customersEop
    source: "[Research market.som] Reachable SOM assumes about 35 live titles/workspaces by year 3."
  - id: A8
    name: Blended monthly churn
    value: "2.0"
    unit: percent
    source: "[BP gtm funnelTargets] 80%+ annual logo retention implies about 1.8% monthly churn; rounded conservatively to 2.0% using startup SaaS heuristic."
  - id: A9
    name: CAC per new paying workspace
    value: "18.0"
    unit: USDK
    source: "[Startup-finance heuristic: niche founder-led B2B SaaS CAC at ~45-55% of first-year ARR] Applied to $38.4k ARR with partner referral costs."
  - id: A10
    name: Hiring sequence
    value: "Founder and founding engineer M1; solutions/compliance M4; second engineer M7; partnerships/CS M10; first sales/BD M19"
    unit: plan
    source: "[BP team] First five roles match BP timing; first sales/BD in M19 is a startup-finance heuristic added only after channel proof."
  - id: A11
    name: Loaded monthly cash compensation by role
    value: "Founder 8K; Eng1 13K; Solutions 9K; Eng2 12K; Partnerships/CS 9K; Sales/BD 10K"
    unit: USDK per month
    source: "[Startup-finance heuristic] Pre-seed cash salaries set below market with equity-heavy compensation and payroll burden included."
  - id: A12
    name: Year 1 non-payroll operating cost ramp
    value: "12K/mo in M1-M3, 15K/mo in M4-M6, 18K/mo in M7-M9, 21K/mo in M10-M12"
    unit: USDK per month
    source: "[BP product + BP operations] Manual onboarding, cloud/security, legal, insurance, and travel scale as pilots go live; sized with startup-finance heuristic."
  - id: A13
    name: Year 2-3 non-payroll operating cost ramp
    value: "20K/mo in M13-M18, 24K/mo in M19-M24, 27K/mo in M25-M30, 30K/mo in M31-M36"
    unit: USDK per month
    source: "[BP milestones 12-36 months] Added compliance, partner, and security costs as the product expands beyond Oscars; sized with startup-finance heuristic."
  - id: A14
    name: Cash conversion assumption
    value: "EBITDA approximates cash movement"
    unit: policy
    source: "[Startup-finance heuristic] Model omits debt, capex, and working-capital timing because early contracts are small enough that cash roughly tracks operating results."
  - id: A15
    name: Funding milestone
    value: "Reach repeatable annual workspace sales and one paid non-awards disclosure workflow with >6 months cash buffer"
    unit: milestone
    source: "[BP fundingAsk + BP milestones 12-24 months] Base round is sized to reach the broader workflow proof point needed for the next financing."
