  som:
    value: $1.2M
    rationale: 第 3 年可触达情形假设约 35 个在运行片名、分布在约 12 个发行商/制片账户，每个片名/工作区平均年化合同额约 $35k。
    isEstimate: true
    sourceRefs:
    - 15
    - 16
    - 18
bottomUpSizingDrivers:
- driver: 纳入范围的专业影视片名数量
  value: '>940 部进入制作阶段的影片 + 约 560 部已发布的原创剧集'
  source: '[13]'
- driver: 可观察到的当前剧情内容发行基数
  value: 857 first-run English-language scripted projects released in 2024
  source: '[15]'
- driver: 带有 AI 痕迹 / 高披露需求的占比
  value: 40% TAM assumption; 14% beachhead SAM assumption
  source: calc
- driver: 每个活跃片名的隐含年化软件支出
  value: $32k-$35k estimated
  source: '[16]'
categoryDynamics:
  growthRate: FilmLA 统计的 2024 年剧情内容发行量同比下滑 13.4%，但 AI 工作流在后期和本地化中的采用仍在扩散。
  growthRateSourceRefs:
  - 15
  - 20
  tailwinds:
  - point: 奖项资格如今已被明确绑定到人类表演/创作归属证据上。
    sourceRefs:
    - 1
    - 2
  - point: 围绕人类创作归属、披露和数字替身的规则，正在工会、政府和州法层面变得更清晰。
    sourceRefs:
    - 3
    - 5
    - 6
    - 7
    - 8
  - point: OpenAI 等大型成员加入来源标准生态，正在提高互操作压力。
    sourceRefs:
    - 26
    - 27
    - 28
  - point: AI 配音、表演编辑和合成语音工具正在进入主流影视工作流。
    sourceRefs:
    - 20
    - 22
    - 24
  headwinds:
  - point: 奥斯卡合规这个初始切口很窄，而且暴露在年度发行波动之下。
    sourceRefs:
    - 15
  - point: 对于片量较低的买方，通用工作流和权利工具足以覆盖部分需求。
    sourceRefs:
    - 16
    - 18
  - point: 资产级来源标准并不能自动补齐授权同意链或合同链缺口。
    sourceRefs:
    - 26
    - 27
    - 29
competitors:
- name: Rightsline
  stage: 现有厂商
  wedge: 面向媒体公司的企业级权利、合同、avails 与版税管理。
  pricing: 定制化企业定价 / 以演示驱动销售。
  strength: 在媒体与娱乐行业有深厚的权利与变现底座，以及成熟可信度。
  weaknessVsUs: 不擅长快速处理单片层面的奥斯卡就绪需求，也不适合为较小的商务法务团队拼装跨供应商授权同意资料包。
  sourceRefs:
  - 18
  - 19
- name: Frame.io
  stage: 现有厂商
  wedge: 为创意团队提供安全协作、审阅、审批与媒体工作流。
  pricing: 免费层 + 付费团队方案 + 企业销售。
  strength: 现成的创意团队渗透率、安全能力和工作流熟悉度。
  weaknessVsUs: 更擅长管理文件和审批，不擅长处理法务创作归属、计费记录、授权同意或供应商声明证据。
  sourceRefs:
  - 16
  - 17
- name: OpenOrigins
  stage: 成长期公司
  wedge: 加密式媒体验证与来源基础设施。
  pricing: 报价制 / 无公开 seat 价格。
  strength: 在资产真实性和保管链叙事上很强。
  weaknessVsUs: 起点是媒体验证，而不是决定创作归属和授权同意的那些平台外法务记录。
  sourceRefs:
  - 27
  - 29
- name: Flawless
  stage: 成长期公司
  wedge: 面向视觉配音、表演编辑和画面内 ADR 的辅助式 AI。
  pricing: 企业销售。
  strength: 直接身处那些制造合规负担的本地化/表演流程中，并且有制片厂级安全叙事。
  weaknessVsUs: 它是供应商侧工具，不是面向商务法务的中立跨供应商记录系统。
  sourceRefs:
  - 20
  - 21
- name: Deepdub
  stage: 成长期公司
  wedge: 面向媒体娱乐的 AI 配音、声音本地化与数字替身工作流。
  pricing: 企业销售，并配有声音艺人版税计划。
  strength: 媒体娱乐定位清晰，而且明确触及声音权利经济问题。
  weaknessVsUs: 本质上仍是制作供应商，因此无法完整解决整个片名层面的跨工具创作归属与法务留档。
  sourceRefs:
  - 22
  - 23
regulatoryTechnicalConstraints:
- point: 无论是可版权性还是奖项资格，最终都仍锚定在人类创作归属上，因此仅靠技术型 AI 检测远远不够。
  sourceRefs:
  - 1
  - 6
- point: 在加州法下，数字替身使用会直接触发表演者同意与可执行性问题，尤其针对在世表演者和已故公众人物。
  sourceRefs:
  - 7
  - 8
- point: 欧盟透明度义务还可能为合成或篡改媒体叠加一层额外披露要求。
  sourceRefs:
  - 9
  - 10
- point: 由于文档和片段都高度敏感，买方会要求强安全性、数据隔离，以及不拿客户数据训练模型的承诺。
  sourceRefs:
  - 17
  - 21
  - 25
- point: 来源标准对媒体对象有帮助，但合同、计费记录和邮件仍然需要独立的接入与审计控制。
  sourceRefs:
  - 26
  - 27
  - 29
validationSignals:
- point: 学院已经明确保留要求补充 AI 使用与人类创作归属信息的权利。
  sourceRefs:
  - 1
  - 2
- point: WGA 现在要求公司披露交给编剧的 AI 生成材料。
  sourceRefs:
  - 3
- point: 加州通过的数字替身法案，提高了围绕肖像与同意的合规负担。
  sourceRefs:
  - 7
  - 8
- point: OpenAI 加入 C2PA steering committee，说明大型平台对来源基础设施已有明确支持。
  sourceRefs:
  - 28
- point: Rightsline 已经把 AI 功能塞进权利工作流，说明现有厂商已经开始注意这个类别。
  sourceRefs:
  - 19
- point: Flawless、Deepdub 和 Respeecher 都在营销面向影视行业的 AI 后期能力，说明这种工作流渗透并不只是概念。
  sourceRefs:
  - 20
  - 22
  - 24
openQuestions:
- 学院在 2026-2027 年的真实提交里，到底会接受、索要或拒绝哪些具体文档包？
- 到底有多少冲奖导向的独立剧情片，已经在后期、配音或剧本工作流里使用过带有 AI 痕迹的供应商？
- 产品能否在单个宣传周期内，拿出足够清楚的 ROI，去对抗外部律师和共享网盘流程？
- 哪些系统——DMS、CLM、制作财务、剧本修订工具或供应商门户——必须优先集成，才能避免重复手工录入？
