      sourceRefs:
      - 17
      - 18
      - 21
    buyerPower:
      score: 4
      rationale: 买方集中、需要高触达服务，且可以回退到外部律师加通用工作流工具，因此在早期销售周期中拥有较强议价权。
      sourceRefs:
