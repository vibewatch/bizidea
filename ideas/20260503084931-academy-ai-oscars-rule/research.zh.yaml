    - 6
    - 7
    - 8
  - factor: environmental
    impact: neutral
    point: 相较法律和声誉风险，环境因素并不是这一品类的一阶采购驱动。
    sourceRefs:
    - 13
  adoptionFrictionMatrix:
  - friction: 敏感法务和表演者文件使买方对新软件保持警惕
    severity: high
    affectedBuyer: 商务法务和法务负责人
    mitigation: 先提供安全导入、细粒度权限以及律师已熟悉的导出格式。
