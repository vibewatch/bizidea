competitors:
- name: Rightsline
  stage: 现有厂商
  wedge: 面向媒体公司的企业级权利、合同、可用权利清单与版税管理。
  pricing: 企业定制定价 / 演示驱动销售。
  strength: 在媒体娱乐行业有很深的权利与商业化底座，可信度强。
  weaknessVsUs: 它并不是为更小型商务法务团队做快速、单片级的奥斯卡申报就绪或跨供应商授权材料包。
  sourceRefs:
  - 18
  - 19
- name: Frame.io
  stage: 现有厂商
  wedge: 给创意团队用的安全协作、审阅、审批和媒体工作流。
  pricing: 免费层 + 付费团队套餐 + 企业销售。
  strength: 创作团队已经在用，安全能力成熟，工作流也很熟悉。
  weaknessVsUs: 它更擅长追踪文件与审批，而不是法务创作归属、计费、授权或供应商声明证据。
  sourceRefs:
  - 16
  - 17
- name: OpenOrigins
  stage: 成长期公司
  wedge: 做加密媒体校验与溯源基础设施。
  pricing: 询价制 / 未公开席位定价。
  strength: 素材真实性叙事强，链路保真框架也清楚。
  weaknessVsUs: 它从素材校验出发，而不是从决定创作归属和授权的那些平台外法务记录出发。
  sourceRefs:
  - 27
  - 29
- name: Flawless
  stage: 成长期公司
  wedge: 用辅助式 AI 做视觉配音、表演编辑和画内 ADR。
  pricing: 企业销售。
  strength: 它正好卡在制造合规负担的本地化/表演流程里，而且安全叙事面向制片厂。
  weaknessVsUs: 它是供应商视角，不是给商务法务团队用的中立跨供应商主记录系统。
  sourceRefs:
  - 20
  - 21
- name: Deepdub
  stage: 成长期公司
  wedge: 面向媒体娱乐行业的 AI 配音、语音本地化与数字替身工作流。
  pricing: 企业销售，并带语音演员版税计划。
  strength: 媒体娱乐定位很清楚，也明确碰到了语音权利分配问题。
  weaknessVsUs: 它首先是一家制作供应商，因此无法完整解决整部作品跨工具的人类创作归属与法务留档。
  sourceRefs:
  - 22
  - 23
regulatoryTechnicalConstraints:
- point: 无论是可版权性还是奖项参评资格，本质上都仍然锚定在人类创作归属上，所以单靠技术层的 AI 检测远远不够。
  sourceRefs:
  - 1
  - 6
- point: 数字替身一旦使用，就会在 California 法律下触发授权与可执行性问题，尤其涉及在世表演者和已故公众人物时更明显。
  sourceRefs:
  - 7
  - 8
- point: 欧盟透明度义务会在合成或被操控媒体场景里再叠上一层披露要求。
  sourceRefs:
  - 9
  - 10
- point: 由于文件和片段都高度敏感，买方会默认要求强安全、数据隔离和“不拿客户数据做训练”的承诺。
  sourceRefs:
  - 17
  - 21
  - 25
- point: 溯源标准能帮到媒体对象，但合同、计费记录和邮件仍然需要单独的导入与审计控制。
  sourceRefs:
  - 26
  - 27
  - 29
validationSignals:
- point: 学院已经明确保留了追要 AI 使用与人类创作归属补充信息的权利。
  sourceRefs:
  - 1
  - 2
- point: WGA 现在要求公司向编剧披露提供过哪些 AI 生成材料。
  sourceRefs:
  - 3
- point: California 已经通过数字替身法案，进一步抬高了围绕肖像与同意的合规负担。
  sourceRefs:
  - 7
  - 8
- point: OpenAI 加入 C2PA 指导委员会，说明大平台开始站队溯源基础设施。
  sourceRefs:
  - 28
- point: Rightsline 已经把 AI 功能往权利工作流里塞，说明现有厂商也在盯这个方向。
  sourceRefs:
  - 19
- point: Flawless、Deepdub 和 Respeecher 都在卖面向影视的 AI 后期能力，说明这类工作流确实已经渗透进去了。
  sourceRefs:
  - 20
  - 22
  - 24
openQuestions:
- 学院在 2026–2027 年真实申报里，究竟会接受、要求或拒绝什么样的材料包？
- 已经在后期、配音或剧本流程里用过 AI 供应商的独立冲奖影片，到底有多少？
- 产品能不能在单个冲奖周期里，跑出相对外部律师和共享盘流程的明确 ROI？
- DMS、CLM、制作财务、剧本修订工具和供应商门户里，第一批必须接的是哪些系统，才能避免重复手工录入？
