  - point: 奖项资格如今明确取决于人类表演/作者身份证据。
    sourceRefs:
    - 1
    - 2
  - point: 围绕人类作者身份、披露和数字替身的规则正在工会、政府和州层面变得更加清晰。
    sourceRefs:
    - 3
    - 5
    - 6
    - 7
    - 8
  - point: 来源标准正吸纳 OpenAI 等大型成员，互操作性压力上升。
    sourceRefs:
    - 26
    - 27
    - 28
  - point: AI 配音、表演编辑和合成语音工具正在进入主流影视工作流。
    sourceRefs:
    - 20
    - 22
    - 24
  headwinds:
  - point: 奥斯卡合规这一初始切口狭窄，且暴露于年度发行波动。
    sourceRefs:
    - 15
  - point: 对项目量较低的买方而言，通用工作流和权利工具可以吸收部分需求。
    sourceRefs:
    - 16
    - 18
  - point: 资产级来源标准并不会自动填补同意链或合同链上的缺口。
    sourceRefs:
    - 26
    - 27
    - 29
competitors:
- name: Rightsline
  stage: incumbent
  wedge: 面向媒体公司的企业级权利、合同、可售性和版税管理。
  pricing: 企业定制定价 / 以演示驱动销售。
  strength: 在媒体与娱乐领域拥有可信度，并具备深厚的权利与商业化基础设施。
  weaknessVsUs: 并未针对小型商务法务团队的快速、项目级奥斯卡就绪或跨供应商同意案卷进行优化。
  sourceRefs:
  - 18
  - 19
- name: Frame.io
  stage: incumbent
  wedge: 面向创意团队的安全协作、审阅、审批和媒体工作流。
  pricing: 免费层 + 付费团队套餐和企业销售。
  strength: 已有创意团队采用、安全能力成熟、工作流使用习惯强。
  weaknessVsUs: 它更擅长追踪文件和审批，不擅长处理法务作者身份、计费、同意或供应商声明证据。
  sourceRefs:
  - 16
  - 17
- name: OpenOrigins
  stage: scale-up
  wedge: 加密媒体验证和来源基础设施。
  pricing: 报价制 / 无公开席位费率。
  strength: 资产真实性故事和保管链框架强。
  weaknessVsUs: 它从媒体验证出发，而不是从决定作者身份和同意的媒体外法务记录出发。
  sourceRefs:
  - 27
  - 29
- name: Flawless
  stage: scale-up
  wedge: 用于视觉配音、表演编辑和镜内 ADR 的辅助式 AI。
  pricing: 企业销售。
  strength: 直接位于会产生合规负担的本地化/表演工作流内部，并强调制片厂级安全性。
  weaknessVsUs: 它是供应商专属工具，而不是面向商务法务的中立跨供应商记录系统。
  sourceRefs:
  - 20
  - 21
- name: Deepdub
  stage: scale-up
  wedge: 面向媒体与娱乐的 AI 配音、语音本地化和数字替身工作流。
  pricing: 企业销售，并提供配音演员版税计划。
  strength: 媒体娱乐定位清晰，并明确关注语音权利的经济模型。
  weaknessVsUs: 其本质仍是制作供应商，因此无法完整解决整个项目跨工具的作者身份或法务文档问题。
  sourceRefs:
  - 22
  - 23
regulatoryTechnicalConstraints:
- point: 版权可保护性和奖项资格都仍以人类作者身份为锚点，因此单纯的技术型 AI 检测并不足够。
  sourceRefs:
  - 1
  - 6
- point: 在加州法律下，数字替身使用会触发同意与可执行性问题，尤其针对在世表演者和已故名人。
  sourceRefs:
  - 7
  - 8
- point: 欧盟透明度义务会为合成或被操纵媒体再增加一层披露要求。
  sourceRefs:
  - 9
  - 10
- point: 由于文档和片段高度敏感，买方会期待强安全性、数据隔离以及“不用于训练”的承诺。
  sourceRefs:
  - 17
  - 21
  - 25
- point: 来源标准有助于处理媒体对象，但合同、计费记录和邮件仍需要独立的导入与审计控制。
  sourceRefs:
  - 26
  - 27
  - 29
validationSignals:
- point: 学院已明确保留要求提供更多关于 AI 使用和人类作者身份信息的权利。
  sourceRefs:
  - 1
  - 2
- point: WGA 现已要求公司披露向编剧提供的 AI 生成材料。
  sourceRefs:
  - 3
- point: 加州已通过数字替身法案，增加了围绕肖像和同意的合规负担。
  sourceRefs:
  - 7
  - 8
- point: OpenAI 加入 C2PA 指导委员会，表明大型平台正在支持来源基础设施。
  sourceRefs:
  - 28
- point: Rightsline 已在权利工作流中推出 AI 功能，说明 incumbents 正关注这一类别。
  sourceRefs:
  - 19
- point: Flawless、Deepdub 和 Respeecher 都在宣传面向影视的 AI 后期制作能力，显示相关工作流已真实渗透。
  sourceRefs:
  - 20
  - 22
  - 24
openQuestions:
- 在 2026-2027 年的真实提交中，学院究竟会接受、要求或拒绝什么样的文件包？
- 有多少奖项竞争中的独立项目已经在后期、配音或剧本工作流中使用了带 AI 参与的供应商？
- 产品能否在单个宣传周期内，相对于外部律师和共享盘流程证明 ROI？
- 为避免手工重复录入，哪些系统——DMS、CLM、制作财务、剧本修订工具或供应商门户——必须最先集成？
