  - factor: economic
    impact: negative
    point: 底层剧情制作基数正承压：FilmLA 统计的 2024 年发行数量减少，限制了初始滩头市场规模。
    sourceRefs:
    - 15
  - factor: social
    impact: positive
    point: 公众和行业对未经授权的数字替身以及人类创作署名的担忧，提升了将同意和来源管理运营化的意愿。
