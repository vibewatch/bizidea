market:
  tam:
    value: $48.0M
    rationale: '自下而上估算：>940 部进入制作的电影，加上约 560 部已发行原创剧情剧集（MPA），合计约 1,500 个年度 title-equivalent；按每个活跃 title 约 $32k 的混合合规/工作流年支出计算，得到约 $48.0M。'
    isEstimate: true
    sourceRefs:
    - 13
    - 16
    - 18
  sam:
    value: $4.2M
    rationale: 以滩头约束来算：从 FilmLA 统计的 857 部 2024 年发行项目里，取约 120 部与奖项相关、由独立方或发行商管理的剧情 title，再按每个活跃 title/workspace 约 $35k 计算。
    isEstimate: true
    sourceRefs:
    - 15
    - 16
  som:
    value: $1.2M
    rationale: 第 3 年可触达情形，假设约 35 个 live title 分布在十几个发行商/制片方账户里，每个 title/workspace 的平均年化合同价值约为 $35k。
    isEstimate: true
    sourceRefs:
    - 15
    - 16
    - 18
bottomUpSizingDrivers:
- driver: 纳入测算范围的专业影视 title 数
  value: '>940 films entering production + ~560 original scripted series released'
