scenarios:
  downside:
    description: 如果学院追要补充材料的频率始终偏低、转介绍渠道起量更慢，而且定价只能落在测试区间底部，那么业务会落到这个情形。
    y3RevenueK: 783.0
    y3EbitdaK: -510.2
    cashLowPointK: 436.6
    keyAssumptionChanges:
      - 混合年 ARPU 降到约 $34.8K。
      - Q4Y3 客户数停在 28，而不是 35。
      - 由于交付更依赖人工，毛利率下滑到 72%。
  base:
    description: 创始人主导销售把早期试点转成多片工作区，而伙伴转介绍也能稳步放大这个狭窄滩头时，对应基准情形。
    y3RevenueK: 1043.2
    y3EbitdaK: -291.6
    cashLowPointK: 655.2
    keyAssumptionChanges:
      - 混合年 ARPU 保持在 $38.4K。
      - Q4Y3 客户数达到 35，与研究里的 SOM 情形一致。
      - 白手套式交付逐步模板化后，毛利率维持在 75% 目标。
  upside:
    description: 如果渠道伙伴显著加快获客、买方接受更宽的工作区定价，而且非奖项工作流更早贡献收入，就会出现这一上行情形。
    y3RevenueK: 1375.5
    y3EbitdaK: -42.4
    cashLowPointK: 904.4
    keyAssumptionChanges:
      - 混合年 ARPU 提升到约 $42.0K。
      - Q4Y3 客户数通过更快的多片扩张达到 42。
      - 非奖项工作流带来新增收入，同时不需要更早补第二位销售。
sensitivity:
  - variable: ARPU
    downsideCase: $34.8K annualized blended ARPU
    baseCase: $38.4K annualized blended ARPU
    upsideCase: $42.0K annualized blended ARPU
    y3RevenueImpactK: 98.7
    cashImpactK: 74.0
  - variable: CAC
    downsideCase: $22K CAC with heavier founder-led outbound
    baseCase: $18K CAC with partner referrals working
    upsideCase: $14K CAC from stronger counsel and vendor channels
    y3RevenueImpactK: 64.0
    cashImpactK: 96.0
  - variable: churn
    downsideCase: 3.0% monthly churn from seasonal one-title pilots
    baseCase: 2.0% monthly churn
    upsideCase: 1.5% monthly churn with more annual workspace conversion
    y3RevenueImpactK: 87.0
    cashImpactK: 65.0
  - variable: 销售周期
    downsideCase: 120-day legal and security review cycle
    baseCase: 90-day cycle
    upsideCase: 60-day cycle via referral-led deals
    y3RevenueImpactK: 128.0
    cashImpactK: 102.0
  - variable: 毛利率
    downsideCase: 70% because onboarding remains services-heavy
    baseCase: 75%
    upsideCase: 80% after templates and audit workflows mature
    y3RevenueImpactK: 0.0
    cashImpactK: 52.0
  - variable: 招聘节奏
    downsideCase: Add sales/BD and compliance support 2 quarters earlier
    baseCase: Current plan
    upsideCase: Hold one noncritical hire until non-awards demand is proven
    y3RevenueImpactK: 48.0
    cashImpactK: 84.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads --> QualifiedConversations
      QualifiedConversations --> PaidPilots
      PaidPilots --> ActiveWorkspaces
      ActiveWorkspaces --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形的收入逻辑，是把可计费 title/workspace 从 Y1 的 6 个，增长到 Q4Y3 的 35 个，并通过创始人销售和伙伴渠道维持 $38.4K 的混合年 ARPU。
  - checkName: 必须顺利发生的事
    finding: 律师、顾问和供应商转介绍，必须把销售周期压短到足以持续获客，否则公司就会在滩头尚未拓宽前，被迫过早补一支更大的直销团队。
  - checkName: 模型会在哪种情况下失效
    finding: 如果定价掉到约 $35K，而客户数又在 28 个左右见顶，那么 Y3 收入会跌破 $0.8M，业务也会长期停留在偏服务化状态，难以高效完成下一轮融资。
  - checkName: 下一轮融资证明点
    finding: 当公司跑出可重复的年度工作区续费，并至少落地 1 个付费非奖项工作流，同时账上还剩 6 个月以上现金时，下一轮融资论点才算站稳。
sanityChecks:
  ruleOf40: Y3 growth 131% + EBITDA margin -28% = 103%
  burnMultiple: Y3 burn multiple about 0.45x using $291.6K net burn over $652.8K net new ARR.
  revenuePerFte: $174K Y3 revenue per ending FTE versus a rough $200-400K vertical SaaS benchmark.
  flags:
    - 模型到 Y3 结束时仍然是 EBITDA 为负，因此下一轮融资大概率仍要建立在非奖项扩张被证明，而不只是奥斯卡工作流增长上。
    - 客户集中度依旧偏高，因为 35 个可计费 title/workspace 很可能只对应十来个账户，续费和扩张会呈现明显波动。
    - 模型默认回款节奏与 EBITDA 基本同步；如果法务采购拖延或回款变慢，真实 runway 会更短。
