  baseCase: 合作伙伴转介绍开始起作用，对应 $18K CAC
  upsideCase: 律师和供应商渠道更强，对应 $14K CAC
  y3RevenueImpactK: 64.0
  cashImpactK: 96.0
- variable: 流失率
  downsideCase: 单片季节性试点更多，月流失率升到 3.0%
  baseCase: 月流失率 2.0%
  upsideCase: 年度工作区转化更多，月流失率降到 1.5%
  y3RevenueImpactK: 87.0
  cashImpactK: 65.0
- variable: 销售周期
  downsideCase: 法务与安全审查周期拉长到 120 天
  baseCase: 90 天周期
  upsideCase: 靠转介绍成交，把周期压到 60 天
  y3RevenueImpactK: 128.0
  cashImpactK: 102.0
- variable: 毛利率
  downsideCase: 导入仍偏服务型，毛利率只有 70%
  baseCase: 75%
  upsideCase: 模板与审计流程成熟后，毛利率升到 80%
  y3RevenueImpactK: 0.0
  cashImpactK: 52.0
- variable: 招聘节奏
  downsideCase: 销售/BD 与合规支持都提前 2 个季度招
  baseCase: 按当前计划执行
  upsideCase: 先缓 1 个非关键岗位，等非奖项需求跑实再招
  y3RevenueImpactK: 48.0
  cashImpactK: 84.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      线索 --> 有效商机
      有效商机 --> 付费试点
      付费试点 --> 在跑工作区
      在跑工作区 --> 收入
      收入 --> 毛利
      毛利 --> 现金
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入引擎，是把可计费影片/工作区从 Y1 的 6 个拉到 Q4Y3 的 35 个，并通过创始人主导和伙伴主导销售，把混合年 ARPU 稳在 $38.4K。
- checkName: 必须做对
  finding: 律师、顾问和供应商转介绍必须把销售周期压短到足以持续加客户，否则在滩头市场还没扩宽前，公司就会被迫提前搭一支过重的直销团队。
- checkName: 模型失效点
  finding: 如果定价往 $35K 靠、客户数又在 28 个工作区附近见顶，Y3 收入就会掉到 $0.8M 以下，业务也会因为太像服务而难以支撑高效的后续融资。
- checkName: 下一轮融资证明
  finding: 下一轮融资成立的前提，是年度工作区续费已具可重复性、至少 1 条付费非奖项工作流已经上线，而且公司账上仍有超过 6 个月现金。
sanityChecks:
  ruleOf40: 第 3 年增长 131% + EBITDA 利润率 -28% = 103%
  burnMultiple: 第 3 年烧钱倍数约 0.45x，对应 $291.6K 净 burn / $652.8K 净新增 ARR。
  revenuePerFte: 第 3 年期末每个 FTE 对应收入约 $174K，对比垂直 SaaS 粗略的 $200-400K 基准仍偏低。
  flags:
  - 模型到第 3 年仍是 EBITDA 负值，因此下一轮融资大概率要靠证明非奖项扩张，而不是只讲奥斯卡工作流增长。
  - 客户集中度仍然很高，因为 35 个可计费影片/工作区大致只对应十来个账户，续费和扩单都会偏波动。
  - 模型假设回款和 EBITDA 变化基本同步；如果法务采购更慢或发票付款延迟，真实现金跑道会更短。
