modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  Leads[线索] --> QualifiedConversations[合格沟通]\n  QualifiedConversations --> PaidPilots[付费试点]\n  PaidPilots --> ActiveWorkspaces[活跃工作区]\n  ActiveWorkspaces --> Revenue[收入]\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入来自：在创始人主导销售和合作伙伴销售推动下，可计费项目/工作区从 Y1 的 6 个增长到 Q4Y3 的 35 个，综合年度 ARPU 为 $38.4K。
- checkName: 必须成立的条件
  finding: 律师、顾问和供应商的转介绍必须足够缩短销售周期，才能在滩头市场扩大之前、不建立大型直销团队的情况下持续新增客户。
- checkName: 模型失效情形
  finding: 如果定价滑向 $35K，且公司规模停留在约 28 个工作区，Y3 收入将跌破 $0.8M，业务也会过于偏服务型，难以高效支撑后续融资。
- checkName: 下一轮融资证明点
  finding: 当可重复的年度工作区续费和至少一个付费的非奖项工作流同时上线，且公司仍保有超过六个月现金时，下一轮融资逻辑才成立。
sanityChecks:
  ruleOf40: Y3 growth 131% + EBITDA margin -28% = 103%
  burnMultiple: Y3 burn multiple about 0.45x using $291.6K net burn over $652.8K net new ARR.
  revenuePerFte: $174K Y3 revenue per ending FTE versus a rough $200-400K vertical SaaS benchmark.
  flags:
  - 模型在 Y3 结束时 EBITDA 仍为负，因此下一轮融资很可能取决于证明更广泛的非奖项扩张，而不仅仅是奥斯卡工作流增长。
  - 客户集中度仍然很高，因为 35 个可计费项目/工作区大概率只对应约十几个账户，使续费和扩张呈现明显波动性。
  - 模型假设现金回款与 EBITDA 基本同步；如果法务采购更慢或发票付款延迟，真实 runway 将缩短。
