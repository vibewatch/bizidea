slug: film-authorship-ledger
date: 2026-05-03
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP date 2026-05-03] 以报告日之后、种子前轮交割后的首个完整运营月为基准假设。'
- id: A2
  name: 种子前轮交割后的起始现金
  value: '2100'
  unit: USDK
  source: '[BP fundingAsk] 种子前轮目标区间是 $2-3M；基准情景取 $2.1M。'
- id: A3
  name: 每个可计费影片/工作区的混合年 ARPU
  value: '38.4'
  unit: USDK
  source: '[BP operatingAssumptions + research market SOM] BP 写的是 $30k-$50k 年化价格；research 里按每部影片约 $35k 测算；基准情景取每月 $3.2k，代表试点费与工作区订阅的混合。'
- id: A4
  name: 目标毛利率
  value: '75'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A5
  name: 第 1 年客户爬坡
  value: '6'
  unit: customersEop
  source: '[BP milestones 0-12 months] 到第 12 个月，拿下 3-5 个付费试点，再扩出 2 个多片/工作区升级。'
- id: A6
  name: 第 2 年客户爬坡
  value: '18'
  unit: customersEop
  source: '[BP milestones 12-24 months + BP gtm funnel] 到 Y2 Q4，通过律师、顾问和供应商转介绍，跑出可复用的销售动作。'
- id: A7
  name: 第 3 年客户爬坡
  value: '35'
  unit: customersEop
  source: '[Research market.som] 可触达 SOM 假设到第 3 年约有 35 个在跑影片/工作区。'
- id: A8
  name: 混合月流失率
  value: '2.0'
  unit: percent
  source: '[BP gtm funnelTargets] 80%+ 的年度客户留存，对应月流失率约 1.8%；这里保守上调到 2.0%，采用初创 SaaS 启发式。'
- id: A9
  name: 每个新增付费工作区的 CAC
  value: '18.0'
  unit: USDK
  source: '[创业财务启发式：细分赛道、创始人主导的 B2B SaaS，CAC 约为首年 ARR 的 ~45-55%] 按 $38.4k ARR 和合作伙伴转介绍成本测算。'
- id: A10
  name: 招聘顺序
  value: 创始人和创始工程师 M1；解决方案/合规 M4；第二位工程师 M7；渠道/客户成功 M10；首位销售/BD M19
  unit: plan
  source: '[BP team] 前 5 个岗位与 BP 的节奏一致；首位销售/BD 放在 M19，是在渠道证据跑出来后才补上的创业财务启发式。'
- id: A11
  name: 各岗位含负担月现金薪酬
  value: 创始人 8K；工程师 1 号 13K；解决方案 9K；工程师 2 号 12K；渠道/客户成功 9K；销售/BD 10K
  unit: USDK per month
  source: '[创业财务启发式] 种子前轮阶段的现金薪酬低于市场，以高股权补偿为主，并已计入薪资附加成本。'
- id: A12
  name: 第 1 年非人力运营成本爬坡
  value: M1-M3 每月 12K，M4-M6 每月 15K，M7-M9 每月 18K，M10-M12 每月 21K
  unit: USDK per month
  source: '[BP product + BP operations] 手工导入、云与安全、法务、保险和差旅会随着试点上线逐步抬升；这里用创业财务启发式定量。'
- id: A13
  name: 第 2-3 年非人力运营成本爬坡
  value: M13-M18 每月 20K，M19-M24 每月 24K，M25-M30 每月 27K，M31-M36 每月 30K
  unit: USDK per month
  source: '[BP milestones 12-36 months] 随着产品往奥斯卡之外扩，逐步加上合规、伙伴和安全成本；这里用创业财务启发式定量。'
- id: A14
  name: 现金转化假设
  value: EBITDA 近似代表现金变动
  unit: policy
  source: '[创业财务启发式] 模型忽略债务、资本开支和营运资金时点，因为早期合同规模还小，现金大体跟经营结果同向。'
- id: A15
  name: 融资里程碑
  value: 做到可重复的年度工作区销售，并跑出 1 条付费的非奖项披露工作流，同时现金缓冲仍超过 6 个月
  unit: milestone
  source: '[BP fundingAsk + BP milestones 12-24 months] 基准轮次的规模，目标就是跑到下一轮融资所需的更广工作流证明点。'
