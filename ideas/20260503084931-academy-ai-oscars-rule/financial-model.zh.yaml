slug: film-authorship-ledger
date: 2026-05-03
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP date 2026-05-03] 报告日期后的首个完整运营月份，并采用种子前轮完成后的启发式假设。'
- id: A2
  name: 种子前轮融资完成后的起始现金
  value: '2100'
  unit: USDK
  source: '[BP fundingAsk] 种子前轮目标区间为 $2-3M；基础情景采用 $2.1M。'
- id: A3
  name: 每个可计费项目/工作区的综合年度 ARPU
  value: '38.4'
  unit: USDK
  source: '[BP operatingAssumptions + research market SOM] BP 认为年化定价为 $30k-$50k；研究采用约 $35k/项目；基础情景假设月度 $3.2k，作为试点与工作区混合后的综合值。'
- id: A4
  name: 目标毛利率
  value: '75'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A5
  name: 第 1 年客户爬坡
  value: '6'
  unit: customersEop
  source: '[BP milestones 0-12 months] 3-5 paid pilots plus 2 multi-title/workspace expansions by month 12.'
- id: A6
  name: 第 2 年客户爬坡
  value: '18'
  unit: customersEop
  source: '[BP milestones 12-24 months + BP gtm funnel] 到 Y2Q4，通过律师、顾问和供应商形成可重复的转介绍销售动作。'
- id: A7
  name: 第 3 年客户爬坡
  value: '35'
  unit: customersEop
  source: '[Research market.som] 可达 SOM 假设到第 3 年约有 35 个活跃项目/工作区。'
- id: A8
  name: 综合月流失率
  value: '2.0'
  unit: percent
  source: '[BP gtm funnelTargets] 80%+ 的年度 logo 留存意味着约 1.8% 的月流失率；基于初创 SaaS 启发式保守取整为 2.0%。'
- id: A9
  name: 每个新增付费工作区的 CAC
  value: '18.0'
  unit: USDK
  source: '[初创财务启发式：细分、创始人主导的 B2B SaaS，CAC 约为首年 ARR 的 45-55%] 并应用到 $38.4k ARR 与合作伙伴转介成本之上。'
- id: A10
  name: 招聘顺序
  value: Founder and founding engineer M1; solutions/compliance M4; second engineer M7; partnerships/CS M10; first sales/BD M19
  unit: plan
  source: '[BP team] 前五个岗位与 BP 时间安排一致；M19 增设首个销售/BD 角色，是在渠道被验证后才加入的初创财务启发式假设。'
- id: A11
  name: 各岗位月度总现金薪酬
  value: Founder 8K; Eng1 13K; Solutions 9K; Eng2 12K; Partnerships/CS 9K; Sales/BD 10K
  unit: USDK per month
  source: '[Startup-finance heuristic] 种子前轮现金薪酬低于市场水平，以股权为主，并已计入薪资负担。'
- id: A12
  name: 第 1 年非薪资运营成本爬坡
  value: 12K/mo in M1-M3, 15K/mo in M4-M6, 18K/mo in M7-M9, 21K/mo in M10-M12
  unit: USDK per month
  source: '[BP product + BP operations] 随着试点上线，手工上线、云/安全、法务、保险和差旅成本同步增长；按初创财务启发式估算。'
- id: A13
  name: 第 2-3 年非薪资运营成本爬坡
  value: 20K/mo in M13-M18, 24K/mo in M19-M24, 27K/mo in M25-M30, 30K/mo in M31-M36
  unit: USDK per month
  source: '[BP milestones 12-36 months] 随着产品扩展至奥斯卡之外，新增合规、合作伙伴和安全成本；按初创财务启发式估算。'
- id: A14
  name: 现金转换假设
  value: EBITDA approximates cash movement
  unit: policy
  source: '[Startup-finance heuristic] 模型省略债务、资本开支和营运资金时点，因为早期合同规模足够小，现金流大致跟随经营结果。'
- id: A15
  name: 融资里程碑
  value: Reach repeatable annual workspace sales and one paid non-awards disclosure workflow with >6 months cash buffer
  unit: milestone
  source: '[BP fundingAsk + BP milestones 12-24 months] 本轮融资规模旨在达到下一轮融资所需的更广泛工作流验证点。'
