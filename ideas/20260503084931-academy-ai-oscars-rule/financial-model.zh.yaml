scenarios:
  downside:
    description: 学院补件请求仍然罕见、转介渠道爬坡更慢，而且定价落在测试区间下沿。
    y3RevenueK: 783.0
    y3EbitdaK: -510.2
    cashLowPointK: 436.6
    keyAssumptionChanges:
      - 年化 ARPU 降到约 $34.8K。
      - Q4Y3 期末客户数为 28，而不是 35。
      - 由于交付仍更偏人工，毛利率下滑到 72%。
  base:
    description: 创始人主导销售能把早期试点转成多片名工作区，合作渠道也稳步把狭窄滩头市场往外推开。
    y3RevenueK: 1043.2
    y3EbitdaK: -291.6
    cashLowPointK: 655.2
    keyAssumptionChanges:
      - 年化 ARPU 维持在 $38.4K。
      - Q4Y3 客户数达到 35，与 research 的 SOM 假设一致。
      - 随着白手套工作逐步模板化，毛利率能守住 75% 目标。
  upside:
    description: 渠道伙伴明显加速客户增长，买方接受更宽的工作区定价，而且非奖项工作流更早开始贡献收入。
    y3RevenueK: 1375.5
    y3EbitdaK: -42.4
    cashLowPointK: 904.4
    keyAssumptionChanges:
      - 年化 ARPU 提升到约 $42.0K。
      - 借助更快的多片名扩容，Q4Y3 客户数升至 42。
      - 非奖项工作流开始贡献收入，而且无需提前再招第二个销售岗位。
sensitivity:
  - variable: ARPU
    downsideCase: 年化混合 ARPU 为 $34.8K
    baseCase: 年化混合 ARPU 为 $38.4K
    upsideCase: 年化混合 ARPU 为 $42.0K
    y3RevenueImpactK: 98.7
    cashImpactK: 74.0
  - variable: CAC
    downsideCase: CAC 为 $22K，创始人直销占比更高
    baseCase: CAC 为 $18K，合作渠道开始起作用
    upsideCase: CAC 为 $14K，律师和供应商渠道更强
    y3RevenueImpactK: 64.0
    cashImpactK: 96.0
  - variable: churn
    downsideCase: 月流失 3.0%，因为大量是一锤子单片试点
    baseCase: 月流失 2.0%
    upsideCase: 月流失 1.5%，因为更多客户转成年度工作区
    y3RevenueImpactK: 87.0
    cashImpactK: 65.0
  - variable: sales cycle
    downsideCase: 法务与安全审查拉长到 120 天
    baseCase: 周期为 90 天
    upsideCase: 借助转介成交缩短到 60 天
    y3RevenueImpactK: 128.0
    cashImpactK: 102.0
  - variable: gross margin
    downsideCase: 毛利率 70%，因为入驻仍偏服务化
    baseCase: 75%
    upsideCase: 模板和审计流程成熟后达到 80%
    y3RevenueImpactK: 0.0
    cashImpactK: 52.0
  - variable: hiring pace
    downsideCase: 提前 2 个季度增加销售/BD 与合规支持
    baseCase: 当前方案
    upsideCase: 在非奖项需求被证明前，暂缓一个非关键岗位
    y3RevenueImpactK: 48.0
    cashImpactK: 84.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads[线索] --> QualifiedConversations[合格对话]
      QualifiedConversations --> PaidPilots[付费试点]
      PaidPilots --> ActiveWorkspaces[活跃工作区]
      ActiveWorkspaces --> Revenue[收入]
      Revenue --> GrossProfit[毛利]
      GrossProfit --> Cash[现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基础情形收入来自客户数增长：Y1 有 6 个可计费片名/工作区，到 Q4Y3 增至 35 个；年化混合 ARPU 为 $38.4K，销售由创始人直销与合作渠道共同驱动。
  - checkName: 必须成立的前提
    finding: 律师、顾问和供应商转介必须把销售周期压缩到足以持续获客，否则在滩头市场扩大前，公司无法靠小团队完成增长。
  - checkName: 模型会在哪种情况下失效
    finding: 如果定价掉向 $35K 左右，且客户数最多只能做到 28 个工作区，Y3 收入会跌到 $0.8M 以下，业务也会长期停留在服务密集型状态，不利于后续融资。
  - checkName: 下一轮融资证明点
    finding: 只要公司在手头仍有超过 6 个月现金时，已经跑出可重复的年度工作区续费，并上线至少一个付费非奖项工作流，下一轮融资逻辑就基本站得住。
sanityChecks:
  ruleOf40: Y3 growth 131% + EBITDA margin -28% = 103%
  burnMultiple: Y3 burn multiple about 0.45x using $291.6K net burn over $652.8K net new ARR.
  revenuePerFte: $174K Y3 revenue per ending FTE versus a rough $200-400K vertical SaaS benchmark.
  flags:
    - 模型到 Y3 仍然是 EBITDA 为负，因此下一轮融资大概率要靠更广的非奖项扩展证明，而不只是奥斯卡工作流本身继续增长。
    - 客户集中度依然很高，因为 35 个可计费片名/工作区大致只对应约 12 个账户，续费和扩容都会比较跳。
    - 模型默认回款与 EBITDA 走势接近；如果法务采购拖慢或发票回款延迟，真实跑道会更短。
