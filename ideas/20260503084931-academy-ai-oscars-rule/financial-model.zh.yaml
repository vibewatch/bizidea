slug: film-authorship-ledger
date: 2026-05-03
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-06"
    unit: month
    source: "[BP date 2026-05-03] 以报告日期后的首个完整运营月份作为模型起点，并采用 pre-seed 交割后的启发式假设。"
  - id: A2
    name: pre-seed 交割后的期初现金
    value: "2100"
    unit: USDK
    source: "[BP fundingAsk] 融资目标区间为 $2-3M；基准情形按 $2.1M 计算。"
  - id: A3
    name: 每个可计费 title/workspace 的混合年 ARPU
    value: "38.4"
    unit: USDK
    source: "[BP operatingAssumptions + research market SOM] BP 给出的年化价位是 $30k-$50k，研究里按约 $35k/title 估算；基准情形取每月 $3.2k，作为试点费与工作区订阅的混合口径。"
  - id: A4
    name: 目标毛利率
    value: "75"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A5
    name: 第 1 年客户爬坡
    value: "6"
    unit: customersEop
    source: "[BP milestones 0-12 months] 对应 3-5 个付费试点，并在第 12 个月前完成 2 个多片/工作区扩张。"
  - id: A6
    name: 第 2 年客户爬坡
    value: "18"
    unit: customersEop
    source: "[BP milestones 12-24 months + BP gtm funnel] 假设到第 2 年末，依靠律师、顾问和供应商渠道，形成可重复的转介绍销售。"
  - id: A7
    name: 第 3 年客户爬坡
    value: "35"
    unit: customersEop
    source: "[Research market.som] 可触达 SOM 情形按第 3 年达到约 35 个 live title/workspace 计算。"
  - id: A8
    name: 混合月流失率
    value: "2.0"
    unit: percent
    source: "[BP gtm funnelTargets] 80%+ 年度 logo 留存大致对应 1.8% 左右的月流失；基准情形保守取 2.0%。"
  - id: A9
    name: 每个新增付费 workspace 的 CAC
    value: "18.0"
    unit: USDK
    source: "[Startup-finance heuristic: niche founder-led B2B SaaS CAC at ~45-55% of first-year ARR] 按 $38.4k ARR 以及伙伴转介绍成本估算。"
  - id: A10
    name: 招聘顺序
    value: "Founder and founding engineer M1; solutions/compliance M4; second engineer M7; partnerships/CS M10; first sales/BD M19"
    unit: plan
    source: "[BP team] 前 5 个岗位与 BP 的时间安排一致；首个销售/BD 岗放在 M19，是在渠道被证明有效后追加的创业财务启发式假设。"
  - id: A11
    name: 各岗位月度综合现金薪酬
    value: "Founder 8K; Eng1 13K; Solutions 9K; Eng2 12K; Partnerships/CS 9K; Sales/BD 10K"
    unit: USDK per month
    source: "[Startup-finance heuristic] 采用偏低的 pre-seed 现金工资，辅以较高股权占比，并把工资税负一并算入。"
  - id: A12
    name: 第 1 年非薪酬运营成本爬坡
    value: "12K/mo in M1-M3, 15K/mo in M4-M6, 18K/mo in M7-M9, 21K/mo in M10-M12"
    unit: USDK per month
    source: "[BP product + BP operations] 手工 onboarding、云与安全、法务、保险和差旅会随着试点上线逐步增加；金额采用创业财务启发式。"
  - id: A13
    name: 第 2-3 年非薪酬运营成本爬坡
    value: "20K/mo in M13-M18, 24K/mo in M19-M24, 27K/mo in M25-M30, 30K/mo in M31-M36"
    unit: USDK per month
    source: "[BP milestones 12-36 months] 随着产品扩展到奥斯卡之外，会增加合规、伙伴和安全开支；金额采用创业财务启发式。"
  - id: A14
    name: 现金转换假设
    value: "EBITDA approximates cash movement"
    unit: policy
    source: "[Startup-finance heuristic] 模型忽略债务、capex 和营运资金时差，因为早期合同规模较小，现金流大体可用经营结果近似。"
  - id: A15
    name: 下一轮融资里程碑
    value: "Reach repeatable annual workspace sales and one paid non-awards disclosure workflow with >6 months cash buffer"
    unit: milestone
    source: "[BP fundingAsk + BP milestones 12-24 months] 这一轮资金的目标，是把公司带到更广义工作流被验证、足以支撑下一轮融资的节点。"
