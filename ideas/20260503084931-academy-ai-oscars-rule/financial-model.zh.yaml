scenarios:
  downside:
    description: 学院补充文件请求仍然不频繁，转介绍渠道爬坡更慢，且定价落在测试区间下沿。
    y3RevenueK: 783.0
    y3EbitdaK: -510.2
    cashLowPointK: 436.6
    keyAssumptionChanges:
    - ARPU 降至约 $34.8K 年化。
    - Q4Y3 期末客户数为 28，而不是 35。
    - 由于交付仍更依赖人工，毛利率降至 72%。
  base:
    description: 创始人主导销售将早期试点转化为多项目工作区，合作伙伴转介绍稳步拓宽这一狭窄滩头市场。
    y3RevenueK: 1043.2
    y3EbitdaK: -291.6
    cashLowPointK: 655.2
    keyAssumptionChanges:
    - ARPU 保持在 $38.4K 年化水平。
    - Q4Y3 客户数达到 35，与研究中的 SOM 情景一致。
    - 随着白手套工作更模板化，毛利率维持在 75% 目标。
  upside:
    description: 渠道合作伙伴加速新增客户，买方接受更广泛的工作区定价，且非奖项工作流更早贡献收入。
    y3RevenueK: 1375.5
    y3EbitdaK: -42.4
    cashLowPointK: 904.4
    keyAssumptionChanges:
    - ARPU 提升至约 $42.0K 年化。
    - 通过更快的多项目扩张，Q4Y3 客户数达到 42。
    - 非奖项工作流在无需增聘第二位销售的情况下带来新增收入。
