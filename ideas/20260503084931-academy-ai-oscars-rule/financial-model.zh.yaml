scenarios:
  downside:
    description: 学院追要文件的频率依旧不高，转介绍渠道爬坡更慢，定价也落在已测试区间的低位。
    y3RevenueK: 783.0
    y3EbitdaK: -510.2
    cashLowPointK: 436.6
    keyAssumptionChanges:
    - ARPU 降到约 $34.8K 年化。
    - Q4Y3 期末客户数只有 28 个，而不是 35 个。
    - 因为交付仍更依赖手工，毛利率滑到 72%。
  base:
    description: 创始人主导销售把早期试点转成多片工作区，合作伙伴转介绍也在稳步把狭窄滩头市场往外撬。
    y3RevenueK: 1043.2
    y3EbitdaK: -291.6
    cashLowPointK: 655.2
    keyAssumptionChanges:
    - ARPU 维持在 $38.4K 年化。
    - Q4Y3 客户数达到 35 个，与 research 里的 SOM 情景一致。
    - 随着高触达工作越来越模板化，毛利率守在 75% 目标。
  upside:
    description: 渠道伙伴更快带来客户，买方接受更宽的工作区定价，而非奖项工作流也更早开始贡献收入。
    y3RevenueK: 1375.5
    y3EbitdaK: -42.4
    cashLowPointK: 904.4
    keyAssumptionChanges:
    - ARPU 提升到约 $42.0K 年化。
    - 通过更快的多片扩单，Q4Y3 客户数达到 42 个。
    - 非奖项工作流开始贡献收入，而且不需要提前再招第二个销售。
