slug: film-authorship-ledger
date: 2026-05-03
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-06"
    unit: month
    source: "[BP date 2026-05-03] 以报告日期之后的首个完整运营月，叠加 pre-seed 完成为基准。"
  - id: A2
    name: pre-seed 完成后的起始现金
    value: "2100"
    unit: USDK
    source: "[BP fundingAsk] pre-seed 目标区间为 $2-3M；基础情形取 $2.1M。"
  - id: A3
    name: 每个可计费片名/工作区的年化混合 ARPU
    value: "38.4"
    unit: USDK
    source: "[BP operatingAssumptions + research market SOM] BP 给出的年化价格区间是 $30k-$50k；research 采用约 $35k/片名；基础情形按每月 $3.2k 估算，对应试点与工作区混合收入。"
  - id: A4
    name: 目标毛利率
    value: "75"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A5
    name: 第 1 年客户爬坡
    value: "6"
    unit: customersEop
    source: "[BP milestones 0-12 months] 第 12 个月前完成 3-5 个付费试点，并拿下 2 个多片名/工作区扩容。"
  - id: A6
    name: 第 2 年客户爬坡
    value: "18"
    unit: customersEop
    source: "[BP milestones 12-24 months + BP gtm funnel] 到 Y2 Q4，借助律师、顾问和供应商渠道形成可重复的转介式销售。"
  - id: A7
    name: 第 3 年客户爬坡
    value: "35"
    unit: customersEop
    source: "[Research market.som] 可触达的 SOM 假设第 3 年约有 35 个活跃片名/工作区。"
  - id: A8
    name: 月度混合流失率
    value: "2.0"
    unit: percent
    source: "[BP gtm funnelTargets] 80%+ 的年化 logo 留存对应约 1.8% 的月流失；这里保守上调并四舍五入为 2.0%。"
  - id: A9
    name: 每个新增付费工作区的 CAC
    value: "18.0"
    unit: USDK
    source: "[Startup-finance heuristic: niche founder-led B2B SaaS CAC at ~45-55% of first-year ARR] 按 $38.4k ARR 与合作渠道成本估算。"
  - id: A10
    name: 招聘顺序
    value: "Founder and founding engineer M1; solutions/compliance M4; second engineer M7; partnerships/CS M10; first sales/BD M19"
    unit: plan
    source: "[BP team] 前五个岗位与 BP 节奏一致；首个 sales/BD 放在 M19，是在渠道验证后才补上的创业财务假设。"
  - id: A11
    name: 各岗位含负担月现金薪酬
    value: "Founder 8K; Eng1 13K; Solutions 9K; Eng2 12K; Partnerships/CS 9K; Sales/BD 10K"
    unit: USDK per month
    source: "[Startup-finance heuristic] 以股权补偿为主的 pre-seed 阶段，现金工资低于市场水平，已包含薪税负担。"
  - id: A12
    name: 第 1 年非薪酬运营成本爬坡
    value: "12K/mo in M1-M3, 15K/mo in M4-M6, 18K/mo in M7-M9, 21K/mo in M10-M12"
    unit: USDK per month
    source: "[BP product + BP operations] 随试点上线，人工入驻、云与安全、法务、保险和差旅成本逐步上升；金额按创业财务经验估算。"
  - id: A13
    name: 第 2-3 年非薪酬运营成本爬坡
    value: "20K/mo in M13-M18, 24K/mo in M19-M24, 27K/mo in M25-M30, 30K/mo in M31-M36"
    unit: USDK per month
    source: "[BP milestones 12-36 months] 随产品逐步扩到奥斯卡之外，合规、合作伙伴和安全成本同步抬升；金额按创业财务经验估算。"
  - id: A14
    name: 现金转化假设
    value: "EBITDA approximates cash movement"
    unit: policy
    source: "[Startup-finance heuristic] 模型忽略债务、CapEx 和营运资本时差，因为早期合同体量较小，现金流大体可近似跟 EBITDA 走。"
  - id: A15
    name: 融资里程碑
    value: "Reach repeatable annual workspace sales and one paid non-awards disclosure workflow with >6 months cash buffer"
    unit: milestone
    source: "[BP fundingAsk + BP milestones 12-24 months] 本轮资金规模的目标，是跑到更广工作流成立的证明点，为下一轮融资铺路。"
