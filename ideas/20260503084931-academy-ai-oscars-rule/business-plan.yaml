slug: film-authorship-ledger
date: '2026-05-03'
executiveSummary: >-
  Film Authorship Ledger sells submission-readiness software to business-affairs and production-legal teams at independent distributors and producers managing awards-contending films that used AI-assisted vendors. The immediate problem is not AI detection; it is proving human performance, human authorship, and performer consent fast enough to submit without eligibility surprises under the Academy's 2026 rule. The MVP is a dossier builder that ingests contracts, legal billing, cast consents, script drafts, and vendor attestations, then flags missing evidence and exports an Academy-ready packet. The go-to-market system is tightly scoped: sell during awards campaign kickoff or counsel review, charge per active title plus an annual workspace, and distribute through direct founder-led sales, awards consultants, entertainment counsel, and post-production vendors whose workflows create the compliance burden. Research supports real workflow pain and adjacent regulatory tailwinds, but also shows that the Oscars-only beachhead is small, with an estimated $4.2M SAM and high buyer concentration. That makes this investable only if the company uses the awards wedge to prove a broader system of record for AI rights, consent, and disclosure across studios, streamers, advertisers, and game publishers. The biggest current gap is uncertainty around how often the Academy will request backup documentation and what exact submission artifacts it will expect, so the first product must stay configurable rather than hard-coded to one form. Investor stance is Watch until live-title pilots show buyers will pay software budget, not just outside-counsel hours, for materially faster dossier assembly.
problem:
  - Awards-bound film teams now face a formal eligibility risk if they cannot prove credited performances and scripts were human-created and consented, yet the evidence is scattered across contracts, billing records, email, script revisions, and vendor files.
  - Business-affairs teams currently reconstruct authorship records manually late in the campaign cycle, which is slow, error-prone, and hard to reuse across multiple titles or follow-up Academy questions.
  - Existing substitutes each miss part of the job: workflow tools manage files, rights systems manage contracts, provenance tools attach metadata, and outside counsel is expensive and non-repeatable.
solution:
  - Build a neutral evidence layer that links legal, production, and vendor artifacts into a title-level human-authorship and consent dossier.
  - Start with a configurable Oscar-submission readiness workflow that flags missing artifacts, standardizes vendor attestations, and exports counsel-friendly packets.
  - Expand the same evidence graph into always-on AI disclosure, replica-consent, and rights-compliance workflows for broader screen content owners.
whyWeWin:
  - The product starts in the precise business-affairs workflow the Academy rule references, rather than competing as another creative AI tool or generic provenance SDK.
  - A reusable clause library, attestation templates, and historical missing-artifact patterns can compound across titles and become harder for counsel-led manual processes to replicate.
  - Buyers may prefer a neutral cross-vendor ledger because no single dubbing, voice, or post vendor sees the whole production or wants to document rival tools.
  - High-touch onboarding and export formats built for entertainment counsel reduce the default-to-shared-drive objection in the first buying cycle.
strategicChoices:
  beachhead: Oscar-submission readiness for U.S.-centric independent distributors and producers managing 2-10 awards-contending scripted titles with AI-assisted post-production, dubbing, script, or digital-performance workflows.
  wedgeRationale: The awards workflow is narrow, deadline-bound, and owned by a small set of legal and awards operators, so it can produce faster proof of value than broader studio compliance platforms that require deeper integrations, longer procurement, and less urgent triggers.
  sequencingRationale: Start with service-assisted dossier assembly, document ingestion, permissions, and exportable templates because the exact Academy workflow is still unclear; once live-title proof exists, add repeatable vendor attestation flows and system integrations; only after that expand into broader non-awards AI disclosure workflows and a more scaled sales motion.
  notYet:
    - Full contract lifecycle or enterprise rights management for studios
    - Automated AI detection, watermarking, or provenance-only tooling
    - Broad expansion into advertising, gaming, or streaming compliance before the awards workflow converts repeatedly
market:
  tam: Estimated $48.0M bottom-up TAM for AI authorship, consent, and disclosure workflow software across professional screen titles.
  sam: Estimated $4.2M beachhead SAM for awards-relevant indie and distributor-managed scripted titles needing submission-readiness workflows.
  som: Estimated $1.2M year-3 reachable SOM based on roughly 35 live titles across about a dozen accounts at around $35k annualized contract value per title/workspace.
  segments:
    - Business-affairs, production-legal, and awards-operations teams at indie distributors and producers with live awards campaigns
    - Entertainment counsel, awards consultants, and post-production supervisors coordinating documentation across vendors
  buyingProcess: Business-affairs or awards operations usually identify the need when campaign prep starts or counsel reviews AI-touch points, then the GC, head of business affairs, or awards executive approves spend. Procurement will be slowed by document sensitivity and legal review, so early deals need white-glove onboarding and counsel-friendly outputs.
product:
  mvp: The MVP is a secure dossier builder for one live title that ingests contracts, legal billing, cast consents, script drafts, and vendor attestations; tracks missing artifacts by credited performance and screenplay; and exports a configurable submission packet. It should work with manual upload and lightweight metadata tagging before deep integrations.
  sixMonth: Onboard 3-5 live titles, ship role-based permissions, standardized vendor attestation workflows, reusable clause and consent templates, and a time-to-dossier benchmark versus manual process.
  twelveMonth: Add audit logs, exception handling, versioned evidence requests, integrations with the most common document repositories identified in customer discovery, and multi-title workspace management for distributor accounts.
  twentyFourMonth: Expand from Oscars-specific readiness into always-on AI disclosure and replica-consent compliance for libraries, downstream distribution deals, and non-awards productions in film and premium TV.
  keyBets:
    - Buyers will adopt a configurable evidence workflow before requiring full CLM or creative-tool integrations.
    - Counsel and awards operators will trust standardized templates if exports match existing review habits.
    - Vendor attestation collection can become repeatable enough to shorten dossier assembly materially.
    - The same evidence graph will generalize beyond awards submissions into broader rights and disclosure infrastructure.
gtm:
  wedge: Sell a white-glove Oscar-submission readiness workflow for AI-touched titles where legal teams already expect extra scrutiny and deadlines make manual collection painful.
  channels:
    - Founder-led direct outbound to indie distributors and producers with active awards campaigns
    - Referral partnerships with entertainment law firms and awards consultants
    - Introductions from dubbing, voice, and post-production vendors whose workflows create attestation needs
    - Targeted co-selling or integration discussions with workflow and rights-stack incumbents after pilot proof
  funnelTargets: 20-30% of qualified design-partner conversations to paid pilot, 60%+ of pilots to a second live title or annual workspace, and 80%+ annual logo retention among accounts with recurring awards or disclosure workflows.
  pricing: Pilot onboarding plus a per-title submission fee and annual workspace subscription priced by active films and external collaborator seats; this aligns spend to live campaign urgency while creating expansion when one distributor manages multiple titles.
businessModel:
  revenueStreams:
    - Per-title dossier preparation and submission-readiness fees
    - Annual workspace subscriptions for multi-title distributor or producer teams
    - Premium audit support, template updates, and compliance onboarding services
  unitOfValue: Active film title/workspace per awards cycle with additional collaborator seats for vendors and counsel
  targetGrossMarginPct: 75
  expansionLevers:
    - Convert one-title pilots into multi-title annual workspaces
    - Add paid vendor, counsel, and partner collaborator workflows
    - Sell broader AI disclosure and replica-consent modules outside awards season
strategyMap:
  northStarMetric: Paid live titles that produce a complete dossier before submission deadline without material missing-artifact exceptions
  inputMetrics:
    - Qualified live-title opportunities sourced per awards cycle
    - Median days from kickoff to complete dossier
    - Missing-artifact rate at first internal review
    - Pilot-to-multi-title conversion rate
    - Share of evidence packets reusing prior templates or attestations
  moatsToBuild:
    - Reusable clause, consent, and vendor-attestation template library
    - Cross-title evidence graph linking legal, billing, and vendor records
    - Historical dataset of missing-artifact patterns and successful response packets
    - Counsel and vendor distribution relationships embedded in onboarding
  killCriteria:
    - If fewer than 3 design partners convert to paid production use within 12 months, or median dossier assembly time improves by less than 50% versus manual workflows, or no non-Oscar expansion use case is validated by month 15, the standalone venture thesis is weakened.
  mermaid: |
    flowchart LR
      Wedge[Oscar-readiness wedge] --> MVP[Dossier builder MVP]
      MVP --> Proof[Faster complete packets on live titles]
      Proof --> Expansion[Multi-title workspaces and broader AI disclosure]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong workflow wedge, but current evidence is not yet enough to underwrite venture scale without proof of buyer urgency beyond a small Oscars beachhead.
    whyBelieve: The company addresses a newly formalized compliance workflow with clear owners, urgent deadlines, and weak point-solution competition for cross-vendor evidence assembly.
    whyDoubt: The initial market is small and concentrated, and buyers can still default to outside counsel plus existing tools if Academy enforcement remains light.
    nextDiligence: Confirm with live campaigns that teams will pay software budget for materially faster dossier assembly and that the same evidence model extends into non-awards disclosure workflows.
  firstCustomer:
    title: Business-affairs lead at an indie distributor with a live awards contender
    profile: A U.S.-centric distributor or producer running 2-10 scripted titles, with at least one film using AI-assisted dubbing, post, script, or digital-performance vendors and an active awards campaign.
    trigger: Awards campaign kickoff or outside-counsel review surfaces new Academy and performer-consent documentation risk.
    buyer: Head of Business Affairs, General Counsel, or EVP Awards Strategy
    initialContract: $15k-$25k paid pilot for one live title converting to roughly $30k-$50k annualized workspace spend as the account adds titles, collaborators, and recurring disclosure needs.
  mustBeTrue:
    - At least 5 of 10 target buyers say current manual dossier assembly is painful enough to fund a dedicated workflow before the next awards cycle.
    - Pilot customers cut end-to-end dossier assembly time by at least 50% versus their prior manual process.
    - At least 60% of paid pilots expand to a second title or annual workspace within one cycle.
    - Entertainment counsel and awards consultants accept product exports without demanding full custom rework.
    - By month 15, at least 2 design partners validate a paid non-Oscar use case using the same evidence graph.
  diligenceQuestions:
    - How often do awards teams actually receive Academy follow-up requests on AI usage, and what artifacts are requested?
    - Which document types consume the most time today: contracts, billing records, script revisions, or vendor attestations?
    - Why will buyers fund software instead of adding billable hours to outside counsel or using Frame.io and shared drives?
    - Which repository integrations are mandatory for first deployment, and which can stay manual?
    - Can the product expand into studio, streamer, or advertiser disclosure workflows without becoming a services-heavy legal business?
  riskHeatmap:
    - risk: Academy enforcement volume stays low and buyers tolerate manual workflows
      likelihood: Medium
      impact: High
      leadingIndicator: Fewer than 2 of the first 10 customer interviews report a recent or expected follow-up documentation request tied to AI usage.
      mitigation: Position the product around campaign speed and reusable evidence assembly, not only formal Academy requests, and validate adjacent disclosure use cases early.
    - risk: Buyers default to outside counsel and existing tools
      likelihood: High
      impact: High
      leadingIndicator: Paid pilots require heavy custom services and fail to convert into repeatable multi-title subscriptions.
      mitigation: Keep onboarding white-glove at first but standardize exports, templates, and time-saved proof so counsel becomes a channel instead of a substitute.
    - risk: Beachhead market is too small for venture-scale outcomes
      likelihood: High
      impact: High
      leadingIndicator: No non-awards design partner or expansion opportunity closes within 15 months despite successful awards pilots.
      mitigation: Treat Oscars as a proof wedge only and prioritize adjacent rights and disclosure workflows by month 9-12.
    - risk: Product requirements shift with evolving rules and partner expectations
      likelihood: Medium
      impact: Medium
      leadingIndicator: Templates need title-by-title reinvention with low reuse across the first 5 deployments.
      mitigation: Build a configurable workflow with versioned templates and maintain a formal update loop with entertainment counsel and key partners.
operatingAssumptions:
  - assumption: Awards-bound indie distributors will buy dedicated software instead of relying only on outside counsel and shared drives when a live title has AI-touched workflows.
    basis: research.yaml
    validationTest: Close at least 3 paid pilots from 10-12 qualified buyer conversations in the first awards cycle.
    decisionImpact: If false, reposition toward counsel-enabled services software or deprioritize the category.
  - assumption: Manual upload, tagging, and export can deliver enough initial value without deep CLM or workflow integrations.
    basis: operator judgment
    validationTest: Onboard the first 3 titles in under 10 calendar days each and achieve a documented 50% reduction in dossier assembly time.
    decisionImpact: If false, the roadmap must prioritize integrations earlier and the capital requirement increases.
  - assumption: A $30k-$50k annualized price point per active account is acceptable when tied to live-title urgency and multiple collaborators.
    basis: idea.yaml
    validationTest: Run structured pricing tests with 8-10 buyers and secure at least 2 pilots above $15k that show a path to annual workspace expansion.
    decisionImpact: If false, the company may need a lower-ACV vendor-channel model or a broader product scope to justify spend.
  - assumption: Counsel, awards consultants, and post vendors will act as referral channels if the product reduces documentation friction without displacing their role.
    basis: research.yaml
    validationTest: Secure 3 active referral partners that each introduce at least 2 qualified opportunities within 9 months.
    decisionImpact: If false, customer acquisition becomes more founder-led and slower, raising sales cost and delaying category credibility.
  - assumption: The same evidence graph can expand into broader AI disclosure and replica-consent workflows beyond Oscars.
    basis: research.yaml
    validationTest: Land 2 non-awards design partners by month 15 using the same core product with less than 20% bespoke workflow changes.
    decisionImpact: If false, the venture case weakens because the business remains exposed to a narrow seasonal market.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Interview awards consultants, entertainment counsel, and business-affairs leads on live or recent campaigns.
    hypothesis: The hardest pain is assembling and validating evidence across multiple systems, not drafting policy language.
    successMetric: 15 interviews completed with a ranked artifact pain map and at least 5 buyers confirming willingness to test a live-title workflow.
    owner: Founder
  - horizon: 0-90 days
    experiment: Run two concierge pilots using manual ingestion and a prototype dossier export for live titles.
    hypothesis: White-glove delivery can prove at least 50% faster dossier assembly before software automation is complete.
    successMetric: Two paid pilots delivered with documented before-and-after time savings and no critical missing-artifact misses at internal review.
    owner: Founder plus solutions lead
  - horizon: 90-180 days
    experiment: Launch standardized vendor attestation intake for dubbing, voice, and post-production partners.
    hypothesis: Normalized vendor data collection removes one of the highest-friction bottlenecks in cross-title reuse.
    successMetric: 70% of pilot vendors submit attestations through the product and template reuse exceeds 50% across first 5 titles.
    owner: Product and engineering
  - horizon: 90-180 days
    experiment: Test pricing with a pilot fee plus annual workspace conversion offer across 6-8 prospects.
    hypothesis: Buyers prefer title-linked pricing at entry but will commit to annual workspace contracts once they manage multiple titles.
    successMetric: At least 2 annual workspace conversions or signed expansion commitments from pilot accounts.
    owner: Founder
  - horizon: 180-365 days
    experiment: Add the top two repository integrations identified in discovery and measure onboarding speed improvement.
    hypothesis: Selective integrations improve sales velocity and gross margin without needing a full enterprise platform build.
    successMetric: Onboarding time drops below 5 calendar days for integrated accounts and implementation effort falls by 30% versus manual setup.
    owner: Engineering
  - horizon: 180-365 days
    experiment: Validate one non-awards workflow such as replica-consent tracking for streamer or studio productions.
    hypothesis: The same evidence model solves broader AI disclosure jobs outside Oscars with limited product change.
    successMetric: One paid non-awards design partner live and less than 20% custom workflow variance from the awards product.
    owner: Founder plus product
operations:
  - Secure document ingestion, audit logging, and granular permissions for legal and performer-sensitive records
  - Template maintenance process with outside entertainment counsel for rule, union, and statute changes
  - Standard operating procedure for vendor attestation requests, follow-ups, and exception handling
  - Customer success workflow that benchmarks time saved and missing-artifact reduction on every live title
  - CRM and partnership tracking for law firms, awards consultants, and post vendors feeding the pipeline
team:
  - role: Founder/CEO
    startTiming: Month 0
    rationale: Own design-partner sales, workflow discovery, partner development, and early services-heavy delivery while the category definition is still forming.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the core evidence graph, permissions, audit trail, and export workflow needed for early pilots.
  - role: Solutions/compliance lead
    startTiming: Month 3
    rationale: Translate legal and awards requirements into templates, run onboarding, and systematize white-glove delivery into repeatable product requirements.
  - role: Full-stack product engineer
    startTiming: Month 6
    rationale: Accelerate integrations, multi-title workflow features, and admin tooling once pilot feedback is clear.
  - role: Partnerships and customer success lead
    startTiming: Month 9
    rationale: Build referral channels with counsel, consultants, and vendors while protecting renewals and expansion in a concentrated market.
milestones:
  - horizon: 0-12 months
    items:
      - Close 3-5 paid live-title pilots with indie distributors or producers
      - Prove at least 50% reduction in dossier assembly time versus manual process
      - Launch reusable vendor attestation and clause-template library
      - Convert at least 2 pilot accounts into annual multi-title workspaces
      - Validate the top required integrations and ship the first two
  - horizon: 12-24 months
    items:
      - Reach repeatable annual workspace sales motion through counsel, consultant, and vendor channels
      - Launch one paid non-awards disclosure workflow using the same evidence graph
      - Build audit logs, exception handling, and cross-title reporting for larger accounts
      - Establish reference customers across distributor, producer, and partner-led channels
  - horizon: 24-36 months
    items:
      - Expand into studio, streamer, or advertiser AI disclosure programs beyond awards cycles
      - Deepen integrations with rights, document, and provenance ecosystems where buyers already work
      - Use historical packet and exception data to improve template reuse and product stickiness
      - Decide whether to remain a focused compliance layer or broaden into a larger rights-and-disclosure platform
risks:
  - risk: The Oscars-ready beachhead may be too small and seasonal to support venture-scale growth on its own.
    likelihood: High
    impact: High
    mitigation: Use the awards workflow only as the first proof point and validate broader disclosure use cases within the first 12-15 months.
  - risk: Buyers may stick with outside counsel, shared drives, and adjacent tools because title volume is low.
    likelihood: High
    impact: High
    mitigation: Deliver white-glove pilots, quantify time saved, and package exports so counsel can participate without losing control.
  - risk: Academy guidance and related legal expectations may evolve faster than static templates.
    likelihood: Medium
    impact: Medium
    mitigation: Keep the product configurable, version templates, and maintain regular update loops with entertainment counsel and industry partners.
  - risk: Sensitive contracts and performer-consent documents create trust and security objections in procurement.
    likelihood: Medium
    impact: High
    mitigation: Prioritize granular permissions, audit logs, secure ingestion, and minimal required integrations in the first releases.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to build the core dossier workflow, close several paid live-title pilots, prove repeatable template reuse and time savings, establish channel partnerships with counsel and vendors, and validate at least one broader non-awards expansion path.
