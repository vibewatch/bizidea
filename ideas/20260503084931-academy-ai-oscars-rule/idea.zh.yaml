problem: 独立电影发行商和制片方越来越多地在后期、配音、剧本润色和虚拟表演等环节用到带 AI 痕迹的工作流，但奥斯卡参评现在取决于他们能不能证明，到底哪些内容由真人完成、由谁创作、又是谁授权同意。眼下这些证据散在合同、法务计费记录、邮件线程、供应商声明函和剪辑备注里。等学院在冲奖后段追问时，商务法务团队只能临时手工把一条站得住脚的创作归属链重新拼出来。
targetUser:
  primary: 冲奖中的独立电影发行商和制片方里，负责申报的商务法务与制作法务负责人
  secondary: 负责统筹奥斯卡申报材料的冲奖顾问和后期制作主管
  buyer: 独立制片厂或发行商的商务法务负责人、总法律顾问，或奖项战略执行副总裁
startupThesis:
  nonObviousInsight: 真正卡住的不是识别 AI 产出，而是怎么把学院已经认可的法务和制作系统里的记录——合同、计费和授权——拼成一条经得起审计的人类创作与同意链。
  beachhead: 面向管理 2–10 部冲奖影片、且在制作或后期任何环节用过 AI 辅助供应商的独立发行商，做奥斯卡申报就绪
  wedge: 做一套申报前材料包生成器，把合同、法务计费、演员授权、剧本修订记录和供应商声明函整理成学院能直接看的“人类创作归属”材料包
  whyNowCatalyst: 学院已经把 AI 使用从声誉问题，升级成已申报影片的正式参评资格与披露问题。
  ventureScalePath: 先从高风险电影申报的奖项合规切入，再扩成面向制片厂、流媒体、广告主和游戏发行商的常态化 AI 权利、授权与披露基础设施——这些行业都在碰到同样的来源与同意要求。
solution: Film Authorship Ledger 不是创作工具，而是给商务法务团队用的合规层。它把法务计费、演员协议、剧本版本、后期供应商声明函和授权记录吃进来，按每个署名表演和剧本输出结构化的人类创作归属材料包。产品会在申报前先把证据缺口标出来，给外部律师和供应商存下可复用模板，并在学院要求补充说明时一键导出材料。时间拉长后，它会变成电影片库和下游发行交易里 AI 使用披露的主记录系统。
goToMarketSeed:
  firstCustomer: 正在冲奖、且至少有 1 部作品用过 AI 辅助 VFX、配音、剧本编辑或数字表演供应商的独立电影发行商
  buyingTrigger: 冲奖周期启动，或奥斯卡申报准备阶段，法务顾问确认学院新增了 AI 披露风险
  currentAlternative: 共享盘、外部律师清单、电子表格跟踪，以及在制片方和供应商之间临时补收声明材料
  switchingReason: 这个切口能把原本要花几周手工搜集的证据，变成一套可复用的申报流程；它直接围绕学院新增的人类表演与创作归属要求来补缺口。
  pricingHypothesis: 按单片申报收费，再加按在跑影片数和外部协作席位计费的年度工作区订阅
whyNow:
- point: 学院已经把参评资格和真人表演、授权证明绑在一起，这让电影团队必须先做出合规预算，才敢往下砸冲奖费用。
