    fetchVerified: true
    keyPoints:
    - 学院于周五发布了新的奥斯卡规则，回应生成式 AI 的使用。
    - 只有在影片法定署名中被列名、且可证明由人类在本人同意下完成的表演才具备参评资格。
    - 学院还表示，可能会要求已提交影片提供更多关于 AI 使用和人类作者身份的信息。
  signals:
  - title: 证明人类表演现已成为强制要求
    description: 新规则要求，符合奥斯卡资格的表演必须具有法定署名、由人类完成，并有同意证据支持。
    sourceRefs:
    - 1
  - title: 学院可要求提供 AI 使用文件
    description: 奥斯卡申报现在可能面临关于 AI 使用和人类作者身份的信息要求，使繁杂文书成为准入门槛。
    sourceRefs:
    - 1
  - title: 生成式 AI 已从创意捷径转变为资格风险
    description: 学院对生成式 AI 的明确规则意味着，电影团队现在需要可审计的控制措施，而不仅仅是内部政策备忘录。
    sourceRefs:
    - 1
problem: 独立电影制片方和发行商正越来越多地在后期制作、配音、剧本润色和虚拟表演等流程中使用带有 AI 参与的工作流，但奥斯卡资格如今取决于能否证明哪些环节确实由人类完成并获得同意。如今，这些证据分散在合同、法务计费、邮件线程、供应商声明和剪辑备注中。当学院在颁奖季后期提出问题时，商务法务团队不得不手工重建一套可辩护的作者身份记录。
targetUser:
  primary: 为奖项竞争影片提交申报材料的独立电影发行商和制片方中的商务法务与制作法律负责人
  secondary: 负责协调奥斯卡提交材料的奖项顾问和后期制作主管
  buyer: 独立制片厂或发行商的商务法务负责人、总法律顾问或奖项战略执行副总裁
startupThesis:
  nonObviousInsight: 真正的瓶颈不是识别 AI 输出，而是从学院已经认可的法务和制作系统中，拼出一条可审计的人类作者身份与同意链。
  beachhead: 面向管理 2-10 部奖项竞争影片、且在制作或后期任一环节使用过 AI 辅助供应商的独立发行商的奥斯卡申报就绪场景
  wedge: 一个提交前案卷构建器，把合同、法务计费、演员同意、剧本修订历史和供应商声明整理成学院可接受的人类作者身份材料包
  whyNowCatalyst: 学院已将 AI 使用从声誉问题转变为已提交影片的正式资格和披露问题。
  ventureScalePath: 先从高风险电影申报的奖项合规切入，再扩展为面向制片厂、流媒体、广告主和游戏发行商的常态化 AI 权利与披露基础设施，以满足类似的来源与同意要求。
solution: Film Authorship Ledger 是面向商务法务团队的合规层，而不是创意工具。它接入法务计费、演员协议、剧本草稿、后期制作供应商声明和同意记录，为每个署名表演和剧本生成结构化的人类作者身份案卷。产品会在提交前标记缺失证据，为外部律师和供应商保存可复用模板，并在学院要求更多细节时生成可导出的材料包。随着时间推移，它会成为跨影片片库和后续发行交易的 AI 使用披露记录系统。
goToMarketSeed:
  firstCustomer: 拥有活跃奖项宣传活动，且至少有一部影片使用过 AI 辅助 VFX、配音、剧本编辑或数字表演供应商的独立电影发行商
  buyingTrigger: 奖项宣传启动，或在总法律顾问识别出新的学院 AI 披露风险后开始准备奥斯卡申报
  currentAlternative: 共享盘、外部律师清单、电子表格追踪，以及在制片方和供应商之间临时收集宣誓材料
  switchingReason: 该切入点把数周的人工取证转化为可重复的提交流程，并直接围绕学院新的人类表演与作者身份要求进行缺口检测。
  pricingHypothesis: 按影片收取提交费用，并按活跃影片数量和外部协作者席位收取年度工作区订阅费
whyNow:
- point: 学院已正式将奖项资格与人类表演和同意证明挂钩，在宣传预算投入前就创造了新的合规预算。
  signalRefs:
  - Proof of human performance is now mandatory
  sourceRefs:
  - 1
- point: 提交团队现在可能必须回答关于 AI 使用和人类作者身份的详细问题，因此手工资料夹和邮件检索的风险变得过高。
  signalRefs:
  - The Academy can demand AI-usage documentation
  sourceRefs:
  - 1
- point: 一旦最高级别奖项机构将 AI 使用定义为资格风险，发行商、保险方和法律顾问就有了立即将来源管理运营化的明确理由。
  signalRefs:
  - Generative AI has moved from creative shortcut to eligibility risk
  sourceRefs:
  - 1
differentiator: 大多数 AI 媒体合规产品关注水印、深度伪造检测或通用来源声明。本产品从学院规则明确指向的商务法务流程切入：法务计费、同意与人类作者身份证据。即使没有任何技术型 AI 检测器能够可靠证明制作流程中发生了什么，它也依然有价值。
