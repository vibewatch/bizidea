  wedgeClarity:
    score: 4
    rationale: 奥斯卡申报就绪是一个边界清楚、时间明确的流程，文件、负责人和触发点都很清晰。
  defensibility:
    score: 4
    rationale: 一套权利与创作归属的主记录系统，会随着模板、法务集成和历史制作数据一起越滚越厚，后来者很难重建。
  ventureScale:
    score: 4
    rationale: 滩头市场虽窄，但同一张合规图谱可以继续扩到制片厂、流媒体、广告和游戏内容的披露工作流。
topRisks:
- name: 初始市场太窄
  description: 如果采用一直只停留在冲奖影片，光靠奥斯卡申报工作流可能撑不起一家独立大公司。
  mitigation: 先拿下奖项团队，再扩到更广的发行商、流媒体和广告主 AI 披露流程；同一张证据图谱可以复用。
- name: 规则解释仍有歧义
  description: 学院后续可能继续调整口径，让静态模板和既有假设很快过时。
  mitigation: 把产品做成可配置的证据工作流，并和娱乐法务顾问合作，快速更新要求。
- name: 既有法务流程惯性大
  description: 如果产品不能在真实冲奖周期里明显省时，电影团队还是会更愿意继续用外部律师和共享盘。
  mitigation: 首部影片提供高触达导入，并给出律师已经习惯的导出格式；再用更快拼出材料包、缺口更少的结果，把价值打实。
