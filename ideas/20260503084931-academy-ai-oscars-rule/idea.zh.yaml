problem: >-
  独立电影制片方和发行方，越来越多地在后期制作、配音、剧本润色和虚拟表演等环节使用带有 AI 参与的工作流；但奥斯卡参评资格现在取决于他们能否证明，哪些部分确实由真人完成、并且获得了当事人同意。如今这些证据分散在合同、法务计费、邮件往来、供应商声明和剪辑备注里。等到学院在奖季后期提出问题时，商务法务团队往往只能靠手工把一份站得住脚的作者身份记录重新拼出来。
targetUser:
  primary: 向奖项提交参赛影片的独立发行商和制片方中的商务法务与制作法务负责人
  secondary: 负责协调奥斯卡申报材料的奖项顾问和后期制作主管
  buyer: 独立制片厂或发行商的商务法务负责人、总法律顾问，或奖项策略执行副总裁
startupThesis:
  nonObviousInsight: 真正的瓶颈不是识别 AI 产出，而是把学院已经认可的法务与制作系统记录，拼成一条可审计的人类作者身份与授权同意链。
  beachhead: 面向管理 2-10 部奖项冲刺影片、且在制作或后期任何环节使用过 AI 辅助供应商的独立发行商，提供奥斯卡申报就绪能力
  wedge: 一套申报前案卷生成器，把合同、法务计费、演员同意书、剧本修订记录和供应商声明，整理成一份可直接交给学院的人类作者身份材料包
  whyNowCatalyst: 学院已经把 AI 使用，从声誉问题升级成参评资格与披露义务问题。
  ventureScalePath: 先从高风险的奖项申报合规切入，再把这套能力扩成面向制片厂、流媒体、广告主和游戏发行商的长期 AI 权利与披露基础设施，因为这些内容方都在面对类似的来源与授权要求。
solution: >-
  Film Authorship Ledger 是给商务法务团队用的合规层，不是创作工具。它接入法务计费、演员协议、剧本草稿、后期供应商声明和授权同意记录，为每一个署名表演和剧本生成结构化的人类作者身份案卷。产品会在提交前标出缺失证据，保存可复用的外部律师与供应商模板，并在学院要求补充材料时导出一套可提交的文件包。时间一长，它会变成电影片库以及后续发行交易里 AI 使用披露的系统记录层。
goToMarketSeed:
  firstCustomer: 正在推进奖季、且至少有一部作品使用过 AI 辅助 VFX、配音、剧本编辑或数字表演供应商的独立发行商
  buyingTrigger: 奖季启动，或奥斯卡申报准备阶段，法务顾问识别出新的学院 AI 披露风险
  currentAlternative: 共享网盘、外部律师检查清单、电子表格追踪器，以及最后一刻向制片方和供应商收集宣誓材料
  switchingReason: 这个切口能把原本要花数周手工收集的证据，变成一套可重复执行的申报工作流，并直接对应学院新的真人表演与作者身份要求来补洞。
  pricingHypothesis: 按影片收取申报费，再叠加按活跃项目数和外部协作者席位定价的年度工作区订阅
whyNow:
  - point: 学院已经把奖项参评资格正式绑定到真人表演和授权同意的证明上，这会在奖项营销预算真正投入前，先催生一笔新的合规预算。
    signalRefs: ["证明真人表演如今成了硬门槛"]
