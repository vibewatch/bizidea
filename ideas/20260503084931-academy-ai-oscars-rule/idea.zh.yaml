jobsToBeDone:
- job: 当一部冲奖影片用过 AI 辅助供应商时，帮商务法务团队证明到底是谁完成了署名工作、谁拥有创作归属、谁给了授权，这样他们申报时才不会在资格上翻车。
  currentAlternative: 在合同、邮件和外部律师之间手工搜材料
  successMetric: 奥斯卡申报材料包完成时，不再缺作者归属或授权材料
- job: 当学院追问更多 AI 使用细节时，帮制作法务团队迅速拿出一套站得住脚的记录，这样不会拖慢冲奖里程碑。
  currentAlternative: 临时补声明函和仓促收文件
  successMetric: 产出完整回复材料包所需时间
