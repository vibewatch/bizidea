  - point: 申报团队现在可能需要回答关于 AI 使用和真人作者身份的详细追问，靠手工整理纸质案卷或翻邮件，风险已经太高。
    signalRefs: ["学院可以追要 AI 使用材料"]
    sourceRefs: [1]
  - point: 一旦最高级别的电影奖项机构把 AI 使用定义成参评风险，发行商、保险方和律师就都有了一个立刻把来源管理流程化的现实理由。
    signalRefs: ["生成式 AI 已从创作捷径变成参评风险"]
    sourceRefs: [1]
differentiator: >-
  大多数 AI 媒体合规产品，盯的是水印、深度伪造检测，或者泛化的来源声明。这个产品从学院规则真正点名的商务法务流程切入：法务计费、授权同意和真人作者身份证据。正因如此，即便没有任何技术检测器能可靠还原制作流程里发生过什么，它依然有用。
