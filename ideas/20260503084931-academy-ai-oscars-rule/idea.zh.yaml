jobsToBeDone:
  - job: 当一部冲奖影片使用过 AI 辅助供应商时，帮助商务法务团队证明究竟是谁完成了署名表演和创作工作，从而避免在提交时因为资格问题翻车。
    currentAlternative: 在合同、邮件和外部律师之间手工收集证据
    successMetric: 奥斯卡申报包完成时，不存在缺失的人类作者身份或授权同意材料
  - job: 当学院要求补充更多 AI 使用细节时，帮助制作法务团队迅速给出一套站得住脚的记录，从而避免拖慢奖项推进节点。
    currentAlternative: 临时宣誓文件加仓促的材料补收
    successMetric: 产出完整回复材料包所需的时间
ideaScorecard:
  signalStrength:
    score: 3
    rationale: 一个已核验来源直接改变了参评规则，但这个信号簇目前仍只有单一来源，后续采纳证据也有限。
  painIntensity:
    score: 3
    rationale: 对使用过 AI 工作流、且要冲奖的影片来说，痛点确实尖锐，但买方群体仍比更广义的媒体工具窄得多。
  wedgeClarity:
    score: 4
    rationale: 奥斯卡申报就绪是一个非常尖锐、时间边界明确的工作流，所需文件、责任人和触发条件都很清楚。
  defensibility:
    score: 4
    rationale: 一套围绕权利与作者身份的系统记录层，可以通过模板、法务集成和历史制作数据不断复利，别人不容易重建。
  ventureScale:
    score: 4
    rationale: 滩头市场本身较窄，但同一张合规关系图可以扩展到制片厂、流媒体、广告和游戏内容披露工作流。
topRisks:
  - name: 初始市场太窄
    description: 如果采用始终只局限在奖项候选影片，单靠奥斯卡申报工作流，未必能撑起一家足够大的独立公司。
    mitigation: 先在奖项团队中落地，再扩到发行商、流媒体和广告主更广泛的 AI 披露工作流，复用同一套证据关系图。
  - name: 规则解释仍有歧义
    description: 学院可能继续调整指引，让静态模板或既有假设很快过时。
    mitigation: 把产品做成可配置的证据工作流，并与娱乐法律顾问合作，快速更新要求。
  - name: 既有法务流程惯性很强
    description: 除非产品能在真实奖季里明显节省时间，否则电影团队可能仍更愿意依赖外部律师和共享网盘。
    mitigation: 为第一部片子提供白手套式 onboarding，并输出律师已经熟悉的格式，再用更快的案卷生成和更少的缺件来证明 ROI。
