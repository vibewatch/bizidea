jobsToBeDone:
- job: 当一部奖项竞争影片使用了 AI 辅助供应商时，帮助商务法务团队证明究竟是谁完成了署名工作和创作，从而在不出现资格意外的情况下完成提交。
  currentAlternative: 在合同、邮件和外部律师之间手工搜集证据
  successMetric: 奥斯卡提交材料包完成，且不存在缺失的作者身份或同意材料
- job: 当学院要求提供更多 AI 使用细节时，帮助制作法律团队快速提交一套可辩护的记录，以避免拖延宣传关键节点。
  currentAlternative: 临时宣誓材料和仓促文件收集
  successMetric: 生成完整回应材料包所需时间
ideaScorecard:
  signalStrength:
    score: 3
    rationale: 有一个经验证来源直接改变了资格规则，但该主题簇目前只有单一来源，下游采纳证据也仍有限。
  painIntensity:
    score: 3
    rationale: 对于使用过 AI 相关工作流、且瞄准奖项的影片而言痛点很尖锐，但买方群体比更广泛的媒体工具市场更窄。
  wedgeClarity:
    score: 4
    rationale: 奥斯卡提交就绪是一个清晰、时间边界明确的工作流，文档、负责人和触发点都非常明确。
  defensibility:
    score: 4
    rationale: 权利与作者身份记录系统可通过模板、法律集成和历史制作数据不断积累，难以被重新复制。
  ventureScale:
    score: 4
    rationale: 滩头市场较窄，但同一合规图谱可扩展到制片厂、流媒体、广告和游戏内容披露工作流。
topRisks:
- name: 初始市场狭窄
  description: 如果采用仍局限于奖项竞争影片，仅靠奥斯卡申报工作流可能无法支撑一家大型独立公司。
  mitigation: 先打入奖项团队，再扩展到更广泛的发行商、流媒体和广告主 AI 披露工作流，复用同一证据图谱。
- name: 规则解释存在歧义
  description: 学院可能持续更新指南，使静态模板或既有假设迅速失效。
  mitigation: 将产品构建为可配置的证据工作流，并与娱乐法律顾问合作，快速更新要求。
- name: 既有法律流程惯性
  description: 除非产品能在真实宣传周期中明确节省时间，否则电影团队可能更愿意继续依赖外部律师和共享盘。
  mitigation: 提供首部影片白手套式上线，并输出律师已熟悉的格式，再用更快的案卷组装速度和更少的缺失材料证明 ROI。
