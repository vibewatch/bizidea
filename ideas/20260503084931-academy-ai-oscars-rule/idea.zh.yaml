differentiator: 大多数 AI 媒体合规产品盯的是水印、深度伪造检测，或泛化的溯源能力。这个产品直接卡在学院规则点名的商务法务流程里：法务计费、授权同意和人类创作归属证据。即便技术层的 AI 检测器根本没法稳定证明制作流程里到底发生了什么，它也一样有用。
