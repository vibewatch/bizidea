      publisher: TechCrunch
      publishedDate: '2026-05-02'
      company: Academy of Motion Picture Arts and Sciences
      eventType: regulation
      fetchVerified: true
      keyPoints:
        - 学院周五发布了新的奥斯卡规则，正式回应生成式 AI 的使用。
        - 只有在影片法律署名中被正式记名、且能证明由人类在本人同意下完成的表演，才具备参评资格。
        - 学院还表示，可能会要求已提交影片补充更多关于 AI 使用情况与人类创作归属的信息。
  signals:
    - title: 人类表演证明已成强制要求
      description: 新规则要求，想获得奥斯卡参评资格的表演必须有法律署名、由真人完成，并能拿出同意证据。
      sourceRefs: [1]
    - title: 学院可以要求补交 AI 使用材料
      description: 奥斯卡报名现在可能会被追问 AI 使用情况和人类创作归属，原本凌乱的文书工作因此变成一道卡口。
      sourceRefs: [1]
    - title: 生成式 AI 已从创作捷径变成资格风险
      description: 学院把生成式 AI 明确写进规则后，电影团队现在需要的是经得起审计的控制链，而不只是内部政策备忘录。
      sourceRefs: [1]
problem: 独立电影制片方和发行方越来越多地在后期制作、配音、剧本润色和虚拟表演等环节使用带有 AI 痕迹的工作流，但奥斯卡参评资格如今取决于能否证明真正完成表演和给出同意的人到底是谁。眼下这些证据散落在合同、法务计费记录、邮件往来、供应商声明和剪辑备注里。等到学院在颁奖季后段发问，商务法务团队只能靠人工把一套站得住脚的创作归属记录重新拼出来。
targetUser:
  primary: 向奥斯卡提交参评作品的独立发行商和制片公司中的商务法务与制作法务负责人
  secondary: 负责统筹奥斯卡申报材料的奖项顾问与后期制作主管
  buyer: 独立制片厂或发行商中的商务法务负责人、总法律顾问或奖项策略执行副总裁
startupThesis:
  nonObviousInsight: 真正的瓶颈不是识别 AI 产出，而是把学院已经认可的法务与制作系统里的证据，拼成一条经得起审计的人类创作与授权链。
  beachhead: 面向管理 2-10 部奖项竞争影片、且在制作或后期任何环节用过 AI 辅助供应商的独立发行商，提供奥斯卡提交前就绪服务
  wedge: 一套提交前资料包构建器，把合同、法务计费记录、演员同意书、剧本修订历史和供应商声明整合成可直接交给学院的人类创作归属材料包
  whyNowCatalyst: 学院已经把 AI 使用从声誉问题，升级成了参评影片必须面对的正式资格与披露问题。
  ventureScalePath: 先从高风险电影申报的奖项合规切入，再扩展成面向制片厂、流媒体、广告主和游戏发行商的长期 AI 权利与披露基础设施，因为他们同样要处理来源证明和授权同意要求。
solution: Film Authorship Ledger 不是创作工具，而是给商务法务团队用的合规层。它会接入法务计费记录、演员协议、剧本草稿、后期供应商声明和授权同意文件，为每一项署名表演和剧本生成结构化的人类创作归属档案。产品会在提交前标出缺失证据，为外部律师和供应商保存可复用模板，并在学院要求补件时导出完整材料包。时间一长，它会变成片库和下游发行交易里 AI 使用披露的记录系统。
goToMarketSeed:
  firstCustomer: 正在推进奖项宣传、且至少有一个片名使用过 AI 辅助 VFX、配音、剧本编辑或数字表演供应商的独立电影发行商
  buyingTrigger: 奖项宣传启动，或奥斯卡提报准备阶段中法务顾问识别出学院新增的 AI 披露风险
  currentAlternative: 共享网盘、外部律师核对清单、电子表格追踪，以及制作方和供应商之间临时抱佛脚式的宣誓文件收集
  switchingReason: 这个切口把原本要花数周的人工作证过程，压缩成一套可重复执行的提交工作流，而且缺口检测直接对齐学院新增的人类表演与创作归属要求。
  pricingHypothesis: 按单片提交收费，再叠加按在运影片数量和外部协作者席位定价的年度工作区订阅
whyNow:
  - point: 学院已经把奖项资格正式绑定到人类表演和授权同意证明上，因此在宣传预算投入之前，就先催生出一笔新的合规预算。
    signalRefs: [人类表演证明已成强制要求]
    sourceRefs: [1]
  - point: 提交团队现在可能要回答更细的 AI 使用和人类创作归属问题，继续靠人工资料夹和邮件搜索，风险已经太高。
    signalRefs: [学院可以要求补交 AI 使用材料]
    sourceRefs: [1]
  - point: 当最高级别的电影奖项机构把 AI 使用定义成资格风险后，发行商、保险方和法律顾问就有了立刻把来源证明流程跑起来的现实理由。
    signalRefs: [生成式 AI 已从创作捷径变成资格风险]
    sourceRefs: [1]
differentiator: "大多数 AI 媒体合规产品盯的是水印、深度伪造识别或泛化的来源声明。这个产品直接切进学院规则点名的商务法务工作流：法务计费、授权同意和人类创作归属证据。哪怕技术型 AI 检测器根本无法可靠还原制作流程里到底发生了什么，它依然有用。"
conceptDiagram:
  title: 奖项合规闭环
  mermaid: |
    flowchart LR
      Buyer[商务法务负责人] --> Pain[缺少人类创作归属与授权同意证明]
      Pain --> Product[Film Authorship Ledger]
      Product --> Outcome[更快产出可交奥斯卡的资料包]
businessModelCanvas:
  customerSegments: [独立电影发行商, 运营奖项宣传的独立制片方, 电影商务法务团队]
  valuePropositions: [证明人类表演与授权同意, 降低奥斯卡提交风险, 集中管理 AI 使用披露]
  channels: [奖项顾问, 娱乐法律事务所, 电影市场合作伙伴, 面向发行商的直接外呼]
  customerRelationships: [高触达入驻, 合规模板, 白手套式首单提交支持]
  revenueStreams: [按片提交费用, 年度团队订阅, 高级审计支持]
  keyResources: [合规工作流软件, 娱乐法律模板, 对接制作文档系统的集成]
  keyActivities: [接入权利证据, 映射创作归属记录, 生成提交资料包]
  keyPartners: [娱乐法律事务所, 奖项顾问, 后期制作供应商, E&O 保险经纪]
  costStructure: [产品工程, 客户成功, 法律模板维护, 行业合作]
jobsToBeDone:
  - job: 当一部冲奖影片使用过 AI 辅助供应商时，帮助商务法务团队证明到底是谁完成了署名工作、谁拥有创作归属、谁给出了授权同意，这样他们就能在不踩资格雷区的前提下提交作品。
    currentAlternative: 靠合同、邮件和外部律师分散地人工取证
    successMetric: 奥斯卡提交材料包完成时，不缺任何创作归属或授权同意文件
  - job: 当学院要求补充更多 AI 使用细节时，帮助制作法务团队迅速拿出一套站得住脚的记录，避免拖慢宣传节点。
    currentAlternative: 临时宣誓文件加匆忙收集材料
    successMetric: 产出完整回复材料包所需时间
ideaScorecard:
  signalStrength:
    score: 3
    rationale: 目前只有一条已核验来源直接改变了参评资格规则，而且这个主题簇暂时缺少更多下游采纳证据。
  painIntensity:
    score: 3
    rationale: 对那些在工作流里已经沾上 AI 的冲奖影片来说，痛点很尖锐，但买方群体比更广义的媒体工具赛道要窄得多。
  wedgeClarity:
    score: 4
    rationale: 奥斯卡提交前准备是一个边界清楚、时间受限、文件和责任人都很明确的工作流。
  defensibility:
    score: 4
    rationale: 一旦沉淀成权利与创作归属记录系统，模板、法务集成和历史制作数据会不断累积，也更难被后来者重建。
  ventureScale:
    score: 4
    rationale: 滩头市场本身很窄，但同一套合规图谱可以扩展到制片厂、流媒体、广告和游戏内容的披露工作流。
topRisks:
  - name: 初始市场过窄
    description: 如果采用始终局限在奖项竞争影片，单靠奥斯卡提交流程很难支撑一家足够大的独立公司。
    mitigation: 先从奖项团队切入，再把同一套证据图谱扩展到发行商、流媒体和广告主更广泛的 AI 披露工作流。
  - name: 规则解释仍有模糊空间
    description: 学院后续可能继续调整口径，静态模板或预设假设很快就会过时。
    mitigation: 把产品做成可配置的证据工作流，并与娱乐法律顾问合作，快速更新要求。
  - name: 既有法务流程惯性很强
    description: 除非产品能在真实宣传周期里明显节省时间，否则电影团队很可能继续依赖外部律师和共享网盘。
    mitigation: 首个片名提供白手套式入驻，并导出律师已经在用的格式，再用更快的资料包拼装速度和更少的缺失文件证明 ROI。
