slug: secure-board-revision-cloud
date: 2026-06-02
executiveSummary: 安全电路板修订云，应该先做成一层安全的远程执行能力，服务那些在点亮和 DV 前验证阶段里，再也耗不起一个 2–6 周重打板周期的汽车电子团队。第一个客户，应是北美汽车 OEM 或 Tier 1 的验证团队：他们同时跑着多个 ECU 项目，反复出现的 ECO 正在卡住固件集成、EMC 工作和 就绪评审。产品切口是：在美国实验室的可重构硬件上，当天执行已批准的原理图增量，随后跑客户定义的验证脚本，并返回和这次修订一一对应的证据包。这个切口比“卖一种新板卡技术”或“卖一套大而全实验室软件”都窄，但也因此更容易更快地验证，因为买家本来就有迫在眉睫的项目延误，有清晰基线，也能直接量出前后周期差。公司应先打汽车，而不是国防；两边痛点相似，但汽车的验证周期更短，而国防会更早叠加采购和安全审查。方案必须一直聚焦在“重打板前加速”，而不是替代正式资质验证，至少在客户愿意把证据包视为现有关卡中的可信输入之前都该如此。真正可守住的，不只是板卡本身，而是这套工作流数据：哪些改动类型能安全执行，哪些验证最能预测重打板成功，哪些账户需要预留产能。最大的反证风险是，真正能可信处理的板卡改动也许只占很窄一部分，窄到不足以撑起一个高客单价、可重复的业务。输入资料并没有给出足够扎实的市场规模、定价和吞吐量证据，所以市场规模字段暂时留空，早期定价也只能当作要验证的经营假设。
problem:
- 汽车和国防电子团队在很多板卡修订上都会损失 2–6 周，因为哪怕只是小幅原理图变更，仍会触发重新打板、手工返工，或台架上的临时补丁。
- 这些延迟正好卡在 ECU 团队冲刺 DV 就绪的阶段，固件集成、EMC 与热测试，以及项目评审都会被拖住。
- 现有原型工厂和内部实验室，都还没有提供一条既安全又可审计的远程工作流，能把板卡改动和真实硬件上的验证证据连起来。
solution:
- 提供一朵安全的电路板修订云：在美国实验室的可重构硬件上执行已批准的原理图增量，而不是继续等新板做出来。
- 在修订后的硬件上运行客户定义的验证脚本，并在当天返回示波器抓图、通过/失败日志、操作员备注，以及与这次修订绑定的证据包。
- 围绕合格的改动类型、可复用的验证配方和预留安全产能，把这条流程标准化，让反复出现的 ECO 从实验室临时救火，变成一条被管理的运营闭环。
whyWeWin:
- 这个切口盯住的是一个窄而急的“重打板前”瓶颈：买家清楚、触发真实存在，而且每个 ECO 节省了多少天，能直接量。
- 和单纯承诺更快打板相比，“远程安全执行 + 证据采集”更难被原型工厂、内部实验室或 ECAD 厂商迅速复制。
- 预留产能与修订绑定的验证数据会越积越厚，最终长成一套差异化的硬件 ECO 执行控制平面。
- 只要先在汽车里证明哪些改动类型和验证配方能跑通，这个滩头市场就能再往国防和其他安全关键电子场景扩。
strategicChoices:
  beachhead: 北美汽车 OEM 和 Tier 1 的验证团队；他们在点亮到正式 DV 测试之间，反复处理 ECU 工程变更单。
  wedgeRationale: 这个入口比更宽泛的硬件平台玩法更容易尽快拿到证明，因为客户已经有一个卡进度的重打板问题、一个已知替代方案，以及一条很短的衡量闭环——从 ECO 获批到拿回已验证硬件证据到底花了几天。相比国防，汽车更适合作为首个切口：痛感相近，但采购和资质周期更短。
  sequencingRationale: 先用 高触达交付把一小批合格板卡改动跑通，再把客户门户、验证配方库和修订证据模型逐步产品化，最后才补更深的 ECAD / PLM 集成和国防扩张。这样排顺序，产品范围、实验室运营和招聘都会围着同一个证明点收敛：在真实硬件上，为活跃 ECU 项目提供当天完成的重打板前验证。
  notYet:
  - 先不做国防优先销售，也不接完整的涉密项目要求
  - 先不替代正式资质验证或认证流程
  - 先不替代广义 ECAD 创作或 PLM 系统
  - 先不碰通用原型制造市场那套平台经济学
market:
  tam: null
  sam: null
  som: null
  segments:
  - 服务 ADAS、分区控制器与电力电子板卡的汽车 OEM 和 Tier 1 验证团队
  - 在安全任务控制、电源或自主控制板卡上迭代的美国国防主承包商与新主承包商
  buyingProcess: 当反复出现的 ECO 开始威胁某个活跃 ECU 项目的当季验证进度，而且团队已经把常规重打板和台架返工都试过一轮时，评估才会真正开始。冠军用户通常是验证负责人或项目硬件负责人；真正拍板掏钱的，则是掌握进度风险和实验室吞吐量预算的硬件工程总监、副总裁或验证实验室负责人。
product:
  mvp: MVP 是一条带高触达支持的工作流，服务一个汽车项目族：接收已批准的变更请求，在美国安全实验室的可重构硬件上执行一小部分合格修订，跑预定义验证方案，并返回与修订绑定的证据包。它不应该一开始就承诺覆盖广泛改动类型、完全自助化，也不该声称服务能取代正式资质验证关卡。
  sixMonth: 支持首批可重复的汽车改动类型、客户审批流、当天返回的证据包，以及面向 1–2 类 ECU 的一小套可复用验证脚本。
  twelveMonth: 补上项目级仪表盘、受支持改动类型的资格规则、预留产能排程，以及能减少重复账户手工录入的首批 ECAD / PLM 集成。
  twentyFourMonth: 运营一朵多账户修订云，持续积累周转和验证结果基准；在安全要求与工作流相匹配的前提下切入国防；再用沉淀下来的修订数据，指导向相邻电子项目扩张。
  keyBets:
  - 足够多的紧急 ECO 可以在可重构硬件上完成，而不必等真正重打板。
  - 客户会足够信任证据包，愿意在正式 DV 关卡前把它用进真实项目决策。
  - 按项目族订阅加按次收费，能撑起接近软件的扩张逻辑，而不是塌成定制实验室服务。
  - 一小套可重复验证配方，就能覆盖足够多的早期需求，让交付保持纪律。
gtm:
  wedge: 把“当天完成的重打板前修订工作流”卖给那些被反复 ECO 卡住、又等不起下一轮制造周期的活跃汽车 ECU 项目。
  channels:
  - 由创始人亲自面向汽车验证和硬件工程负责人直销
  - 与原型工厂、设计服务公司和相邻实验室服务商建立转介绍合作，它们自己并不提供这条远程修订闭环
  - 等工作流拿到可重复证明后，再做定向的 ECAD、PLM 和验证工具合作
  funnelTargets: 目标是 lead→合格试点 15-25%，合格试点→付费试点 30-40%，付费试点→年度生产合同 50%+，首个合同→第二个项目扩张 40%+。
  pricing: 先围绕一个活跃项目族和有限次数的修订会话收取付费试点费，再转成年度订阅 + 按次会话收费，并可叠加预留安全产能。定价基准应围绕活跃项目族、实验室时长、验证深度和产能预留，而不是 席位数，因为买家买的是关键项目的进度压缩。
businessModel:
  revenueStreams:
  - 按活跃项目族收取年度订阅
  - 与实验室时长和验证深度绑定的按次修订会话费
  - 面向紧急或高频项目的高级安全产能预留费
  - 面向重复企业账户的集成与导入服务费
  unitOfValue: 通过平台执行修订会话的活跃 ECU 项目族
  targetGrossMarginPct: 70
  expansionLevers:
  - 同一汽车账户内增加更多项目族
  - 在关键项目上增加预留产能和更高频的修订使用
  - 在证明安全与信任门槛后，从汽车扩到国防
  - 面向更大实验室网络追加工作流集成和基准模块
strategyMap:
  northStarMetric: 客户 ECO 在真实硬件上当天完成执行与验证、且无需等待重新打板的数量
  inputMetrics:
  - 与活跃 ECU 项目、且存在重复 ECO 压力的合格商机数
  - 从变更请求获批到证据包交付的中位小时数
  - 付费试点转年度合同的转化率
  - 落在受支持改动类型里的 ECO 占比
  - 已签账户内第二个项目的扩张率
  moatsToBuild:
  - 把改动类型、执行成功率、周转时长和后续重打板结果连起来的修订模式数据集
  - 按板卡类型和故障模式映射的可复用验证配方库
  - 关于预留产能、紧急程度和工作流可靠性的账户级运营数据
  - 由可审计证据包构成的信任层，每份证据都绑定精确原理图增量
  killCriteria:
  - 前 5 个共创客户账户里，紧急 ECO 中落入受支持远程修订类型的占比低于 30%
  - 前 6 个付费试点里，按目标定价转成年度合同的少于 2 个
  - 做完 10 次真实修订会话后，相比每个客户原有的重打板或手工返工流程，中位周转提升仍低于 5x
  mermaid: "flowchart LR\n  Wedge[汽车 ECU 的重打板瓶颈] --> MVP[安全的当日修订工作流]\n  MVP --> Proof[可信证据包与更快的 ECO 周期]\n  Proof --> Expansion[多项目实验室平台与国防扩张]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 痛点明确，滩头市场也可信，但在公司证明足够多改动类型适配这条工作流、且买家信任输出之前，判断上限仍被压着。
    whyBelieve: 公司盯住的是一个可量化的多周瓶颈，而买家已经在用行为表达紧迫性；它又正好卡在一个原型工厂和内部实验室都没有真正占住的工作流边界上。
    whyDoubt: 如果远程重布线的板卡只能覆盖很小一部分紧急 ECO，或者证据包无法影响真实项目决策，这门生意就可能永远停留在小众实验室服务。
    nextDiligence: 下一步要看的证明点，是至少两个汽车付费试点：在客户真实 ECO 上做到当天周转，并转成年度预留产能合同。
  firstCustomer:
    title: 面向汽车 ECU 项目族的电子验证负责人
    profile: 北美 OEM 或 Tier 1 团队，同时跑着 3–10 个活跃 ECU 项目，点亮阶段反复出现的板卡改动正在拖慢固件集成和 DV 就绪。
    trigger: 某个高优先级 ECU 项目在点亮后不断积累 ECO，而项目管理层需要本季度就看到已验证的硬件证据，不能再等下一轮重打板闭环。
    buyer: 电子验证总监或硬件工程副总裁
    initialContract: 先就一个项目族和若干次修订会话签下 $75k-$125k 的付费试点；如果工作流成为默认的重打板前路径，再转成大约 $200k-$350k 的年度订阅，加上预留产能费用。
  mustBeTrue:
  - 首批共创客户账户里的紧急 ECO，至少 40% 能落进某种受支持的远程修订类型。
  - 前 6 个付费试点里，至少 2 个能在 12 个月内转成年合同。
  - 在受支持任务上，从 ECO 获批到拿回验证证据的中位时间，要从几周压到 1 个工作日以内。
  - 至少有 1 个汽车账户在首个项目族上线后 12 个月内，扩到第二个项目。
  - 买家会把证据包当成设计或验证评审里的真实输入，而不是一个边缘实验。
  diligenceQuestions:
  - 哪些具体 ECO 类型最急，同时又能在不真正重打板的前提下适配远程重构？
  - 验证负责人需要看到多高等级的证明，才会在真实项目里按这套输出做决定？
  - 第一年的收入结构里，接近软件订阅的部分和重运营服务的部分各占多少？
  - 汽车账户是否真能比国防明显更快成交，同时又不丢掉长期扩张故事？
  - 什么样的产能预留行为，才足以证明它正在变成正式记录系统，而不是一次性实验室供应商？
operatingAssumptions:
- assumption: 足够大的一部分紧急 ECU 板卡改动，可以在可重构硬件上以足够高的保真度完成，从而支撑当天验证。
  basis: idea.yaml
  validationTest: 从共创客户账户里回溯最近 30 个 ECO，确认至少 12 个落进某类受支持的远程修订范围，且执行时无需重新打板。
  decisionImpact: 如果不成立，公司就必须收缩到更小但更贵的细分市场，或放弃把这套工作流做成风投级平台。
- assumption: 汽车验证团队会把美国安全实验室产出的证据包，接受为一种合法的重打板前决策输入。
  basis: research.yaml
  validationTest: 跑 2 个真实试点，让客户把返回证据用于排期中的设计或验证评审，并记录由此产生的具体下一步动作。
  decisionImpact: 如果不成立，路线图就必须补更多客户侧复核、现场选项，或者降格为更低信任度的顾问式定位。
- assumption: 按项目族订阅加按次收费是可接受的，因为买家更在意进度压缩，而不是 按席位计费的软件访问权。
  basis: idea.yaml
  validationTest: 按提议的商业结构签下 3 个付费试点，并确认至少有 1 个账户愿意接受年度预留产能合同，而不是坚持纯人天计费。
  decisionImpact: 如果不成立，业务会更偏服务，毛利预期、招聘节奏和融资需求都得重写。
- assumption: 尽管输入资料里也点到了国防，但汽车依然是比国防更快的首个切口。
  basis: 运营判断
  validationTest: 同时跟踪 10 个合格汽车机会和 10 个合格国防机会，对比试点落地速度、安全摩擦，以及客户是否愿意共享真实变更请求。
  decisionImpact: 如果不成立，公司就该把更多销售和路线图权重切向国防，或转向合作伙伴驱动的安全实验室渠道。
- assumption: 预留安全产能可以长成一个可重复的扩张杠杆，而不是一次性的采购动作。
  basis: research.yaml
  validationTest: 在完整年续约前，先从至少 2 个试点账户拿到预订产能承诺，并衡量这些承诺是否真的提升了会话利用率。
  decisionImpact: 如果不成立，扩张就会更依赖原始会话量，而不是更可预测的经常性收入。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 改动类型适配研究
  hypothesis: 紧急汽车 ECO 里，足够大的一部分可以通过远程重构执行，从而支撑一个可重复的切口。
  successMetric: 在分析的 30 个 ECO 中，至少 40% 能落进首批受支持改动类型。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 证据包信任试点
  hypothesis: 只要日志、抓图和修订追踪能干净映射到现有评审关卡，验证负责人就会把返回材料当成可执行输入。
  successMetric: 2 个共创客户在真实设计或验证评审里使用该证据包，并主动要求下一次会话。
  owner: 实验室运营负责人
- horizon: 90–180 天
  experiment: 汽车付费试点转化
  hypothesis: 只要活跃 ECU 项目持续承受 ECO 压力，即便工作流还没完全产品化，客户也会为当天完成的重打板前执行买单。
  successMetric: 在定义好的滩头市场里，以提议试点价格区间签下 2 个付费试点。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 可重复验证配方库
  hypothesis: 一套窄但可复用的验证脚本库，足以覆盖大部分早期汽车会话，而不必每次都重做测试设计。
  successMetric: 真实试点会话中，至少 70% 可直接调用可复用配方，只做少量客户级修改。
  owner: 创始工程师
- horizon: 180–360 天
  experiment: 年度合同与预留产能测试
  hypothesis: 一旦账户看到当天周转，就会从付费试点转成带预留产能的年订阅。
  successMetric: 至少 1 个付费试点转成年合同，并附带预留产能承诺。
  owner: 创始人/CEO
- horizon: 12–18 个月
  experiment: 第二项目扩张
  hypothesis: 只要一个 ECU 项目族先跑通，同一账户会把相邻项目也标准化到同一条修订工作流上。
  successMetric: 至少 1 个已签账户在首个项目上线后 12 个月内扩到第二个项目族。
  owner: 解决方案工程师
operations:
- 每个修订请求进安全实验室工作流前，都先按公开的改动类型政策做资格判断。
- 把修订输入、验证步骤、操作员动作和证据输出，全部收进一条绑定具体变更请求的审计链。
- 把首批验证配方和证据模板标准化，避免早期交付一路滑向定制咨询。
- 把安全实验室排程和预留产能管理当成核心运营流程，因为周转可靠性本身就是产品的一部分。
- 对溢出需求或不适配任务，交给合作原型工厂和服务商处理，不要把自己硬拽进不支持的重打板工作。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 负责创始人主导的汽车销售、共创客户筛选，以及把第一批紧急试点需求转成年度项目合同。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭修订接入工作流、配方执行系统、证据包生成能力和账户仪表盘。
- role: 实验室运营负责人
  startTiming: 第 0 个月
  rationale: 负责安全执行、沉淀受支持改动类型，并把首批客户项目的当天周转守住。
- role: 解决方案工程师
  startTiming: 第 4 个月
  rationale: 把客户验证方案翻成可复用配方，并在不过度占用创始人时间的前提下，支持扩到第二个项目族。
- role: 客户主管
  startTiming: 第 9 个月
  rationale: 只有在首批付费试点和可信案例证明 ROI 可重复后，才开始放大汽车销售漏斗。
milestones:
- horizon: 0–12 个月
  items:
  - 完成首版受支持改动类型分类和证据模板。
  - 在真实 ECU 项目上签下 2 个汽车付费试点。
  - 在受支持试点会话里做到当天周转，并至少把 1 个账户转成年合同。
- horizon: 12–24 个月
  items:
  - 至少把 1 个已签汽车账户扩到第二个项目族。
  - 为重复账户上线预留产能排程和首批 ECAD / PLM 集成。
  - 沉淀一套能支撑择机进入国防市场的周转与信任基准。
- horizon: 24–36 个月
  items:
  - 在多个安全实验室账户间运行这条工作流，并持续积累修订结果基准。
  - 只有当汽车动作已经可重复后，才拿下首个国防生产账户。
  - 用累积的修订和验证数据，继续加深工作流护城河与扩张定价权。
risks:
- risk: 受支持的远程修订改动类型可能太窄，不足以支撑可重复的高 ACV 采用。
  likelihood: High
  impact: High
  mitigation: 先从最常见、最紧急的 ECO 类型做起，公开适配规则；对不适配任务直接导流给合作方，而不是过度承诺。
- risk: 客户可能把它当成定制实验室服务，而不是产品化工作流。
  likelihood: Medium
  impact: High
  mitigation: 把切口限制在可重复的 ECU 项目上，标准化配方和证据模板，并把试点收费和定制工程明确拆开。
- risk: 验证负责人可能不够信任远程证据，不愿在真实项目决策里使用。
  likelihood: Medium
  impact: High
  mitigation: 把每次会话都和客户现有流程做对标，所有输出都绑定精确修订，并坚持把产品定位为重打板前加速层，而不是资质验证替代品。
- risk: 在工作流还没产品化到足够可扩之前，安全实验室产能可能先变成瓶颈。
  likelihood: Medium
  impact: Medium
  mitigation: 依靠预留产能合同、严格的任务资格判断和有选择的合作方溢出，而不是把所有定制请求都接进来。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $4-6M
  runwayMonths: 18
  useOfFundsSummary: 这轮资金要买来 18 个月跑道：验证汽车滩头市场的付费试点，搭出首个产品化的安全实验室工作流和证据系统，招齐初始工程与实验室运营团队，并在扩到国防之前，把早期客户需求转成年化的预留产能合同。
