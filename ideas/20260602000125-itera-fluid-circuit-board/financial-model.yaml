scenarios:
  downside:
    description: "Two pilots slip by two quarters, pilot-to-annual conversion falls to one-third, and gross margin reaches only 65%."
    y3RevenueK: 4200.0
    y3EbitdaK: -850.0
    cashLowPointK: 450.0
    keyAssumptionChanges: ["Paid pilots start in M8, M11, and M14 instead of M6, M8, and M11", "Paid pilot to annual conversion drops from 50% to 33%", "Gross margin lands at 65% because more jobs require manual handling"]
  base:
    description: "Three Y1 pilots convert at the floor of the BP funnel target, one account expands to a second program family in Y2, and blended ARPU reaches $400K."
    y3RevenueK: 6100.0
    y3EbitdaK: 220.0
    cashLowPointK: 1583.6
    keyAssumptionChanges: ["Paid pilot to annual conversion holds at 50%", "Second-program expansion tracks the BP target of 40%+", "Gross margin reaches the BP target of 70%"]
  upside:
    description: "Pilot conversion reaches two-thirds, second-program expansion starts earlier, and reserved-capacity attach lifts blended ARPU to about $450K."
    y3RevenueK: 8000.0
    y3EbitdaK: 1400.0
    cashLowPointK: 1900.0
    keyAssumptionChanges: ["Pilot conversion improves from 50% to 67%", "Reserved-capacity revenue lifts annual ARPU from $400K to $450K", "Second-program expansion begins one quarter earlier in landed accounts"]
