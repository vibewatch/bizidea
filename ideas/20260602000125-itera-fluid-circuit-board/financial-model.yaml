modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> AnnualContracts
      AnnualContracts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue is driven by converting three early pilots into annual program-family contracts and then layering second-program expansion plus reserved-capacity spend to exit Y3 at 22 active families."
  - checkName: "Must go right"
    finding: "The company must hold paid-pilot-to-annual conversion at or above the BP's 50% target because the seed milestone depends on reaching 10 active families by Q4Y2."
  - checkName: "Model breaks if"
    finding: "The downside case appears if supported change classes stay narrow enough that sales cycles stretch toward nine months or gross margin stalls near 65%, which pushes cash close to the floor."
  - checkName: "Next-round proof"
    finding: "The next financing is justified once one automotive account expands to a second program family and the company exits Y2 with repeatable reserved-capacity renewals across about 10 active families."
sanityChecks:
  ruleOf40: "Y3 growth 149% + EBITDA margin 4% = 153%"
  burnMultiple: "Y2 burn multiple is about 0.6x ($1.25M burn / $2.09M net new revenue versus Y1), efficient only if pilot conversion stays on plan."
  revenuePerFte: "$469K Y3 (benchmark ~$200–400K blended hardware/SaaS heuristic)"
  flags: ["Base case requires the workflow to support enough change classes for three paid pilots by Y1 end; if fit stays narrow, Y2 revenue slips quickly.", "The model holds gross margin at the BP target of 70% even though a security-first lab operation could run below that until recipe reuse and partner overflow mature.", "Cash equals EBITDA in this model, so any meaningful capex for secure-lab buildout or working-capital timing would increase the true funding need."]
