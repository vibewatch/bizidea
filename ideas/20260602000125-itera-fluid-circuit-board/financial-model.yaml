    value: "100"
    unit: "USDK per active family per year"
    source: "[BP businessModel revenueStreams + research.market.som $400k annualized spend] heuristic to bridge subscription, per-session fees, and onboarding into $400k blended ARPU."
  - id: A6
    name: "Blended gross margin target"
    value: "70"
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct 70] held constant in base case."
  - id: A7
    name: "Initial paid pilot timing"
    value: "M6, M8, M11"
    unit: "months"
    source: "[BP milestones 0-12 months close 2 paid automotive pilots] base case assumes 3 pilots by year-end, slightly above plan after successful design-partner validation."
  - id: A8
    name: "Paid pilot to annual contract conversion"
    value: "50"
    unit: "percent of pilots within 12 months"
    source: "[BP gtm.funnelTargets paid pilot\u2192annual production contract 50%+] base case uses the floor of the target."
  - id: A9
    name: "Second-program expansion rate"
    value: "40"
    unit: "percent of contracted accounts within 12 months"
    source: "[BP gtm.funnelTargets first contract\u2192second program expansion 40%+] base case uses target-rate expansion."
  - id: A10
    name: "Y2-Y3 active program-family ramp"
    value: "Q1Y2 4; Q2Y2 6; Q3Y2 8; Q4Y2 10; Q1Y3 12; Q2Y3 15; Q3Y3 18; Q4Y3 22"
    unit: "customers EOP"
    source: "[BP milestones + research.market.som] ramp reaches a ~22-family exit rate, or ~$8.8M ARR at Q4Y3, while recognized Y3 revenue remains below the SOM ceiling because accounts ramp through the year."
  - id: A11
    name: "Monthly logo churn"
    value: "2.5"
    unit: "percent"
    source: "[startup-finance heuristic: enterprise workflow software with embedded operational dependency] assumes sticky but not near-zero churn in a safety-critical workflow."
  - id: A12
    name: "Fully loaded CAC per new contracted family"
    value: "120"
    unit: "USDK"
    source: "[startup-finance heuristic: founder-led enterprise sales with travel, security review, and pilot support] sized for low-volume, high-ACV industrial selling."
  - id: A13
    name: "Headcount shape"
    value: "3, 4, 5, 6, 10, 13"
    unit: "FTE snapshots"
    source: "[BP team + strategicChoices.sequencingRationale] follows founder, engineering, lab ops, solutions, then AE-led scaling after proof."
  - id: A14
    name: "Loaded annual salary bands"
    value: "Executive 216; Engineering 180; Lab Ops 156; Solutions 168; Sales 192; G&A 120"
    unit: "USDK per FTE"
    source: "[startup-finance heuristic: U.S. early-stage deeptech team, fully loaded] used for payroll consistency."
  - id: A15
    name: "Secure-lab non-payroll overhead"
    value: "96 in early Y1 rising to 549 per quarter by Q4Y3"
    unit: "USDK per month/quarter opex embedded in functional lines"
    source: "[research regulatoryLandscape + security-first delivery sensitivity + BP operations] reflects lab rent, tooling, compliance, insurance, and software."
  - id: A16
    name: "Cash conversion"
    value: "100"
    unit: "percent of EBITDA into cash"
    source: "[startup-finance heuristic] base model assumes no debt, taxes, or large working-capital swings so cash roll-forward equals opening cash plus EBITDA."
  - id: A17
    name: "Funding milestone for the next round"
    value: "Q4Y2 exit with 10 active program families and one second-program expansion"
    unit: "milestone"
    source: "[BP milestones 12-24 months + investorMemo.nextDiligence] defines the proof point the seed round must buy."
  - id: A18
    name: "Partner-overflow operating model"
    value: "Non-fit jobs routed out rather than staffed in-house"
    unit: "operating rule"
    source: "[BP operations + risks + research.partnershipEcosystem] keeps fixed headcount below vanity scale and protects margin."
