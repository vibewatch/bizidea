    - 付费试点转年合同比例维持在 50%
    - 第二项目扩张达到 BP 里 40%+ 的目标
    - 毛利率达到 BP 设定的 70% 目标
  upside:
    description: 试点转化升到三分之二，第二项目扩张更早发生，预留产能附加收入把混合 ARPU 抬到约 $450K。
    y3RevenueK: 8000.0
    y3EbitdaK: 1400.0
    cashLowPointK: 1900.0
