modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads[线索] --> PaidPilots[付费试点]\n  PaidPilots --> AnnualContracts[年合同]\n  AnnualContracts --> Revenue[收入]\n  Revenue --> GrossProfit[毛利]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下的收入，靠的是把 3 个早期试点转成年项目族合同，再叠加第二项目扩张和预留产能收入，到 Y3 末跑到 22 个活跃项目族。
- checkName: 必须跑对的事
  finding: 公司必须把付费试点转年合同比例稳在 BP 设定的 50% 目标或以上，因为种子轮里程碑取决于 Y2 Q4 前做到 10 个活跃项目族。
- checkName: 模型会在哪儿崩
  finding: 如果可支持的改动类型始终太窄，销售周期被拖向 9 个月，或者毛利率卡在 65% 左右，下行情景就会出现，现金也会逼近地板。
- checkName: 下一轮证明点
  finding: 一旦有 1 个汽车账户扩到第二个项目族，并且公司在 Y2 末带着约 10 个活跃项目族和可重复的预留产能续费退出，下一轮融资才真正讲得通。
sanityChecks:
  ruleOf40: Y3 增长 149% + EBITDA 利润率 4% = 153%
  burnMultiple: Y2 的 burn multiple 约为 0.6x（相对 Y1 的净新增收入 $2.09M，对应烧钱 $1.25M）；前提是试点转化必须按计划发生。
  revenuePerFte: Y3 为每名 FTE 贡献 $469K 收入（对标约 $200–400K 的硬件 / SaaS 混合启发式基准）
  flags:
  - 基准情景要求工作流在 Y1 结束前就能覆盖足够多改动类型，以支撑 3 个付费试点；如果适配范围太窄，Y2 收入会很快下滑。
  - 模型把毛利率固定在 BP 目标的 70%，但以安全优先的实验室运营来看，在配方复用和合作方溢出成熟前，实际水平可能低于这个值。
  - 这个模型把现金直接等同于 EBITDA，所以如果安全实验室建设需要明显 capex，或存在营运资本节奏差，真实融资需求会更高。
