slug: secure-board-revision-cloud
date: '2026-06-02'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-02] 计划日期后的第一个完整月份。'
- id: A2
  name: 模型起始时的种子轮期初现金
  value: '4200'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $4-6M] 基准情景假设在模型启动时完成一笔 $4.2M 种子轮交割。'
- id: A3
  name: 每个项目族的付费试点价格
  value: '100'
  unit: USDK per 4-month pilot
  source: '[BP investorMemo.firstCustomer.initialContract $75k-$125k] 取区间中值。'
- id: A4
  name: 稳态年度订阅加预留产能收入
  value: '300'
  unit: USDK per active family per year
  source: '[BP investorMemo.firstCustomer.initialContract roughly $200k-$350k annual subscription plus reserved-capacity fees] 取软件加产能假设的中位值。'
- id: A5
  name: 稳态使用量与导入附加收入
  value: '100'
  unit: USDK per active family per year
  source: '[BP businessModel revenueStreams + research.market.som $400k annualized spend] 用启发式方法把订阅、按次会话费和导入费桥接成 $400k 的混合 ARPU。'
- id: A6
  name: 混合毛利率目标
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 基准情景下保持不变。'
- id: A7
  name: 首批付费试点时点
  value: M6, M8, M11
  unit: months
  source: '[BP milestones 0-12 months close 2 paid automotive pilots] 基准情景假设在共创客户验证成功后，年末前拿下 3 个试点，略高于计划。'
- id: A8
  name: 付费试点转年合同比例
  value: '50'
  unit: percent of pilots within 12 months
  source: '[BP gtm.funnelTargets paid pilot→annual production contract 50%+] 基准情景采用目标区间下限。'
- id: A9
  name: 第二项目扩张率
  value: '40'
  unit: percent of contracted accounts within 12 months
  source: '[BP gtm.funnelTargets first contract→second program expansion 40%+] 基准情景采用目标扩张率。'
- id: A10
  name: Y2-Y3 活跃项目族爬坡
  value: Q1Y2 4; Q2Y2 6; Q3Y2 8; Q4Y2 10; Q1Y3 12; Q2Y3 15; Q3Y3 18; Q4Y3 22
  unit: customers EOP
  source: '[BP milestones + research.market.som] 爬坡到 Y3 Q4 末约 22 个项目族，折合约 $8.8M ARR；由于账户在全年逐步爬坡，Y3 确认收入仍低于 SOM 上限。'
- id: A11
  name: 月度 logo 流失率
  value: '2.5'
  unit: percent
  source: '[startup-finance heuristic: enterprise workflow software with embedded operational dependency] 假设这条安全关键工作流粘性较高，但不是接近零流失。'
- id: A12
  name: 每个新签项目族的全成本 CAC
  value: '120'
  unit: USDK
  source: '[startup-finance heuristic: founder-led enterprise sales with travel, security review, and pilot support] 按低成交量、高 ACV 的工业销售模型估算。'
- id: A13
  name: 人员编制形态
  value: 3, 4, 5, 6, 10, 13
  unit: FTE snapshots
  source: '[BP team + strategicChoices.sequencingRationale] 按创始人、工程、实验室运营、解决方案，再到 AE 驱动扩张的顺序爬坡。'
- id: A14
  name: 全包年薪区间
  value: Executive 216; Engineering 180; Lab Ops 156; Solutions 168; Sales 192; G&A 120
  unit: USDK per FTE
  source: '[startup-finance heuristic: U.S. early-stage deeptech team, fully loaded] 用于统一薪酬口径。'
- id: A15
  name: 安全实验室的非薪酬间接开支
  value: 96 in early Y1 rising to 549 per quarter by Q4Y3
  unit: USDK per month/quarter opex embedded in functional lines
  source: '[research regulatoryLandscape + security-first delivery sensitivity + BP operations] 反映实验室租金、工具、合规、保险和软件成本。'
- id: A16
  name: 现金转换率
  value: '100'
  unit: percent of EBITDA into cash
  source: '[startup-finance heuristic] 基准模型假设没有债务、税项和大幅营运资本波动，因此现金滚动等于期初现金加 EBITDA。'
- id: A17
  name: 下一轮融资里程碑
  value: Q4Y2 exit with 10 active program families and one second-program expansion
  unit: milestone
  source: '[BP milestones 12-24 months + investorMemo.nextDiligence] 定义了种子轮必须买出来的证明点。'
- id: A18
  name: 合作方溢出运营模式
  value: Non-fit jobs routed out rather than staffed in-house
  unit: operating rule
  source: '[BP operations + risks + research.partnershipEcosystem] 对不适配任务直接外流，而不是通过内部扩编硬接，从而压住固定人头并保护毛利。'
