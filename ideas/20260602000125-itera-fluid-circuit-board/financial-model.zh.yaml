    - 付费试点转年合同比例从 50% 降到 33%
    - 由于更多任务需要手工处理，毛利率只能落在 65%
  base:
    description: Y1 的 3 个试点都按 BP 漏斗目标下限转化，Y2 有 1 个账户扩到第二项目族，混合 ARPU 达到 $400K。
    y3RevenueK: 6100.0
