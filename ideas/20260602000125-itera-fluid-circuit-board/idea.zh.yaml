jobsToBeDone:
- job: 当某个汽车 ECU 项目被临门一脚的原理图变更卡住时，帮验证负责人立刻在真实硬件上测完这次改动，让固件和 DV 团队还能按计划往前走。
  currentAlternative: 重新下单打一版新板，再用台架返工或临时飞线把空档勉强补上
  successMetric: 从 ECO 获批到真实硬件上拿到验证结果的天数
- job: 当国防电子团队需要在不放松实验室管控的前提下试一版板卡改动时，帮项目在安全的远程设施里跑完这次修订，在不暴露工作流给不安全原型链条的情况下拿到证据。
  currentAlternative: 使用内部安全实验室的有限产能，或把改动推迟到下一次计划样板阶段
  successMetric: 每月在无需重新制板的前提下完成的安全修订循环次数
