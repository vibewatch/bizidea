topRisks:
- name: 物理适用范围有限
  description: 有些板卡改动仍然必须真正重打板，这可能让产品只剩下少数高价值场景可做。
  mitigation: 先从最适合重构的改动类型做起，公开清晰的适配规则；对不适合的任务，直接导给合作方的重打板流程，不要过度承诺。
- name: 交付过度依赖服务
  description: 客户可能会要求大量定制化操作员工作和测试设计，把业务推向定制实验室服务模式。
  mitigation: 把首个切口限制在可重复的 ECU 验证模式上，把测试配方和证据模板产品化，定制工作只留给高价项目。
- name: 硬件验证偏保守
  description: 在安全关键决策上，汽车和国防团队可能不会轻易信任远程修订结果，除非这种方法先按他们现有标准被证明过。
  mitigation: 先把产品落成“重打板前的加速层”，用客户基线流程做对标，再用能直接映射到现有准入关卡的证据包来建立信任。
