openQuestions:
- Which ECO categories are genuinely supportable on reconfigurable hardware without invalidating later qualification or EMC work?
- How much external evidence will automotive and defense buyers accept before insisting on their own secure-lab confirmation?
- Can one secure U.S. revision cell sustain enough throughput to make reserved-capacity economics attractive?
- Will incumbents prefer to partner into this workflow, or can they extend adjacent products fast enough to compress the startup’s window?
