  sensitivityCases:
  - case: Narrow change-class eligibility
    impact: If only a small subset of ECOs can be executed on reconfigurable hardware, the market behaves more like premium lab triage than a broad workflow platform.
    sourceRefs:
    - 12
    - 23
    - 51
  - case: Security-first delivery model
    impact: If customers insist on internal secure labs or dedicated cells, onboarding and deployment costs rise materially.
    sourceRefs:
    - 8
    - 9
    - 32
  - case: Upstream automation improves
    impact: If design automation reduces preventable respins, value shifts toward the hardest late-stage, standards-heavy cases.
    sourceRefs:
    - 23
    - 26
    - 27
  validationPlan:
  - priority: high
    question: Which ECO types can be executed without invalidating later qualification?
    evidenceToGather: Pilot data comparing remote revisions against true respins across 20-30 change classes.
  - priority: high
    question: Will buyers accept externally produced evidence packets in gate reviews?
    evidenceToGather: LOIs or pilot protocols mapping outputs to ISO 26262, supplier-quality, and secure-handling requirements.
  - priority: medium
    question: What throughput can a secure U.S. revision cell sustain?
    evidenceToGather: Bench-level timing for intake, rewiring, test execution, operator QA, and exception handling.
