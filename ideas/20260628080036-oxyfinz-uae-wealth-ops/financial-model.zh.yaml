scenarios:
  downside:
    description: 托管行接入周期延长、Oxyfinz 式价格压力持续，公司以较少的沙特/GCC 客户和较低的附加功能接入率退出第 3 年。
    y3RevenueK: 1297.5
    y3EbitdaK: -666.1
    cashLowPointK: 34.8
    keyAssumptionChanges:
    - 销售周期拉长至 10–12 周，第 3 年末客户数降至 26 家，而非 33 家。
    - 混合月均 ARPU 仅达 $5.0K，因为购买第 4/5 个托管行连接和报告附加功能的客户较少。
    - 毛利率稳定在 72% 附近，因为入驻和合规修补仍较为人力密集。
  base:
    description: 基准情形将早期试点转化为可复制的 DIFC/ADGM 销售动作，在第 3 年贡献少量沙特/GCC 收入，以 33 家付费客户退出。
    y3RevenueK: 1772.4
    y3EbitdaK: -341.0
    cashLowPointK: 475.5
    keyAssumptionChanges:
    - 客户数按 A8、A9、A10 推进，第 18 个月达 15 家，第 24 个月达 20 家，第 3 年末达 33 家。
    - 混合月均 ARPU 通过额外托管行连接、报告和司法管辖区附加功能，从第 1 年 $4.1K 扩展至第 3 年 $5.6K。
    - 毛利率从第 1 年 73% 升至第 2 年起商业计划目标的 75%。
  upside:
    description: 合规转介绍和参考客户动能拉动成单提前，公司在第 3 年末积累更多客户和略高的附加功能组合。
    y3RevenueK: 2088.7
    y3EbitdaK: -129.6
    cashLowPointK: 764.2
    keyAssumptionChanges:
    - 第 3 年末客户数达 36 家，DIFC/ADGM 转化更快且有 4–6 家沙特/GCC 客户。
    - 更多客户提前购买额外托管行连接和报告附加功能，混合月均 ARPU 达 $5.9K。
    - 连接器复用和审计导出标准化快于预期，毛利率向 76% 改善。
sensitivity:
- variable: ARPU
  downsideCase: 附加功能接入持续低迷，更多客户停留在基础套餐，第 3 年混合月均 ARPU 约 $5.0K。
  baseCase: 额外托管行费用和轻量级报告/司法管辖区附加功能接入，第 3 年混合月均 ARPU 达 $5.6K。
  upsideCase: 更多客户提前购买第 4/5 个托管行连接和高端报告，第 3 年混合月均 ARPU 接近 $6.0K。
  y3RevenueImpactK: -189.9
  cashImpactK: -135.0
- variable: CAC
  downsideCase: GTM 效率下降，第 2–3 年销售及营销强度从收入的 4% 升至 5%。
  baseCase: 创始人和人脉销售仍承担大部分工作，可变销售及营销强度维持在收入的 4%。
  upsideCase: 转介绍比例提升，即使客户基数扩张，销售及营销强度仍控制在 4% 以下。
  y3RevenueImpactK: 0.0
  cashImpactK: -26.3
- variable: churn
  downsideCase: 对账虽有用但嵌入不深，留存表现相当于第 3 年末少约两家客户。
  baseCase: 基准路径假设单位经济模型月度流失率 1.0%，第 3 年末仍达 33 家客户。
  upsideCase: 审计导出和异常历史成为日常运营的一部分，留存表现相当于第 3 年末多一至两家客户。
  y3RevenueImpactK: -84.0
  cashImpactK: -46.2
- variable: sales cycle
  downsideCase: 销售周期拉长至 10–12 周，客户爬坡比计划慢约一个季度。
  baseCase: 销售周期保持在商业计划所述的 4–8 周范围内。
  upsideCase: 参考客户和合规转介绍渠道将转化压缩至 4–6 周。
  y3RevenueImpactK: -218.4
  cashImpactK: -158.2
- variable: gross margin
  downsideCase: 入驻和合规变更仍较人力密集，毛利率稳定在 72% 附近。
  baseCase: 毛利率从第 2 年起维持在 75%，与商业计划目标一致。
  upsideCase: 连接器和审计导出标准化快于预期，毛利率达到 76–77%。
  y3RevenueImpactK: 0.0
  cashImpactK: -53.1
- variable: hiring pace
  downsideCase: 产品工程师、第二名实施工程师和 GCC 销售岗位在可复制性验证前提前约一个季度入职。
  baseCase: 第 1 年后的招聘按建模节奏分别在第 15、18、30 个月到位。
  upsideCase: 非关键岗位推迟一个季度直至转化验证清晰，改善资金消耗而不影响切口。
  y3RevenueImpactK: 0.0
  cashImpactK: -95.1
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Founder-led and partner-sourced pipeline] --> PaidPilots
      PaidPilots --> PayingCustomers
      PayingCustomers --> BaseSubscription
      PayingCustomers --> ExtraCustodians
      PayingCustomers --> ReportingAddOns
      BaseSubscription --> Revenue
      ExtraCustodians --> Revenue
      ReportingAddOns --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的增长来自第 1 年末 9 家客户扩张至第 3 年末 33 家，同时混合 ARPU 通过额外托管行连接和轻量附加收入从 $4.1K 提升至 $5.6K/月。
- checkName: 必须做到的事
  finding: 创始人加人脉销售必须在不将定价折扣至 $3.5K 基础价以下、也不让入驻周期超过计划 2–4 周的前提下，在第 18 个月前交付 15 家付费客户。
- checkName: 模型的脆弱点
  finding: 若销售周期拉长至 10–12 周，或 ARPU 在 $5.0K/月附近停滞，悲观情形下现金在公司达到第 3 年客户目标前压缩至约 $35K。
- checkName: 下轮融资的核心故事
  finding: 最有力的下轮故事是 30 家以上 UAE 和沙特付费客户、$2.2M+ 退出 ARR 运行率，以及 Q4Y3 燃烧率向盈亏平衡靠拢——使增长资本用于扩张而非救火。
sanityChecks:
  ruleOf40: 第 3 年增长率 111% + EBITDA 利润率 -19% = 92%。
  burnMultiple: 第 2 年净新增 ARR 约 $685K，燃烧倍数约 1.0x；第 3 年净新增 ARR 约 $1.09M，改善至约 0.3x。
  revenuePerFte: 第 3 年末每全职员工收入 $222K（处于早期 B2B SaaS 粗略基准 $200K–$400K 的低端）。
  flags:
  - 基准情形需要混合 ACV 在第 3 年达到约 $67K，高于研究中位数，仅当额外托管行和附加功能接入实现时方可成立。
  - 模型超出 research 文件中 28 家 UAE SOM 上限，因此第 3 年后期隐含 3–5 家客户来自沙特/GCC 而非仅 UAE。
  - EBITDA 在第 3 年仍为负，计划预期在 Q4 转化或利润率优于基准情形之前仍需再融一轮。
  - CAC 维持合理水平的前提是 DIFC/ADGM 密集外拓和合规转介绍渠道将销售及营销强度保持在建模的收入 4% 附近。
