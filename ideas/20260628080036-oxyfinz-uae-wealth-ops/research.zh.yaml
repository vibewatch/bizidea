  validationPlan:
  - priority: high
    question: DIFC 和 ADGM 精品公司中，实际运营 3 家以上托管行、且每天在对账上花费超过 2 人时的有多少？
    evidenceToGather: 10 次客户发现访谈，加上当前早晨对账工作流的匿名截图。
  - priority: high
    question: 哪些 UAE 托管行愿意在无企业合同的前提下，向小型外部资产管理公司每日提供机读文件或 SFTP？
    evidenceToGather: 与托管运营团队进行连接器可行性验证，并从首批共创伙伴获取样本对账单或交易文件。
  - priority: medium
    question: Oxyfinz 创造的免费层效应，会不会将本地价格预期锚定得过低，令付费挑战者难以立足？
    evidenceToGather: 在未来两个季度内，对评估过 Oxyfinz 或类似工具的精品管理公司进行赢单/败单访谈。
  - priority: low
    question: 沙特和巴林扩张在托管行连接器、报告格式和入驻方面需要多大程度的产品重构？
    evidenceToGather: UAE v1 上线后，与一家沙特和一家巴林共创伙伴进行差距分析。
