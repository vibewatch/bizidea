competitors:
- name: Oxyfinz
  stage: seed
  wedge: 面向精品财富、资产和 EAM 公司的 UAE 本地报告及数据基础设施。
  pricing: 符合条件的 SME 公司免费使用 12 个月；试点后定价未公开。
  strength: 本地市场叙事、明确针对精品公司定位，以及快速入驻公司的现场活动。
  weaknessVsUs: 目前公开定位是广泛的平台接入，而非针对 UAE 托管行的深度定制对账工作流。
  sourceRefs:
  - 12
  - 13
- name: Temenos
  stage: incumbent
  wedge: 全套财富管理平台，含数据适配器、数字财富和前台工具。
  pricing: 定制报价 / 企业销售流程；获取页面无公开定价。
  strength: 产品广度、部署选项以及完善的数据适配器和可审计性方案。
  weaknessVsUs: 对中小规模 UAE 精品公司而言可能过于宽泛且实施过重，这些公司首先只需要早晨对账和监管就绪导出。
