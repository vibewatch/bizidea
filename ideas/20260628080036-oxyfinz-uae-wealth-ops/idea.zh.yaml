topRisks:
  - name: UAE 单一市场天花板
    description: >-
      DIFC 和 ADGM 的 500 余家精品公司细分市场若无法快速向 GCC 地区扩展，
      可能难以产生风投级回报所需的 ARR。
    mitigation: >-
      从第一天起就将监管格式层设计为可插拔模块，
      确保沙特 CMA 和巴林 CBB 格式包能在 UAE 产品市场匹配后 12 个月内发布，
      在无需重构核心对账引擎的前提下将可寻址市场翻倍。
  - name: 托管行商品化风险
    description: >-
      ENBD、Mashreq 或某家地区托管行可能直接向精品客户推出免费对账数据服务，
      将数据聚合切口商品化。
    mitigation: >-
      在托管行具备这一能力之前，将价值栈扩展到数据层之上——
      深入 DFSA 审计日志生成、异常工作流管理和 UHNW 客户报告——
      确保产品的收入来源于合规和报告成果，而非原始数据访问。
  - name: 监管格式变更风险
    description: >-
      DFSA 或 FSRA 对报告格式的更新可能引发高成本的重构，
      并在过渡期间对客户端造成业务中断。
    mitigation: >-
      设立专职监管工程职能，持续监测 DFSA 和 FSRA 通函发布，
      并将报告层构建为独立可部署的模块化服务，
      使格式变更可在不触及对账引擎的情况下完成发布。
