problem: >-
  UAE 精品财富管理公司（典型 AUM $100M–$1B，受 DFSA 或 FSRA 监管）处于能力无人区：
  规模太小，难以承受 Temenos 或 Advent Portfolio Exchange 等企业级平台的成本，
  却又要向 UHNW 客户提供机构级的多托管行报告和每日持仓准确度。
  多数精品公司通过电子表格和邮件对账单在 3–5 家托管行之间人工对账，
  耗费运营人员 30–50% 的时间，并留下审计追踪缺口，令公司在 DFSA 检查中暴露风险。
  随着 ADGM 和 DIFC 在 57% AUM 增长的带动下注册大批新公司，
  每家新进者都面临同样的工作流瓶颈，却没有一款专为其设计、价格可及的解决方案可选。
targetUser:
  primary: >-
    DIFC 或 ADGM 注册精品财富管理公司中的运营经理或投资组合运营负责人，
    公司规模 5–25 人，AUM $100M–$800M，投资标的涵盖 GCC 股票、固收和另类资产
  secondary: >-
    同一精品公司的合规官员，负责 DFSA 或 FSRA 的交易记录及审计日志提交
  buyer: >-
    精品公司 CEO 或执行合伙人，负责签署软件合同，并对 DFSA 检查结果承担责任
startupThesis:
  nonObviousInsight: >-
    Oxyfinz 向 20 家精品公司免费提供 12 个月的权限，并没有解决市场问题——它只是证明了
    这个细分市场真实存在、态度积极、且严重供给不足。免费模式还说明，目前没有任何玩家
    在这一层面建立起足够深的工作流锁定来收费；真正可防御的生意不在于商品化的数据管道，
    而在于托管行专属对账逻辑、DFSA 审计日志格式和异常管理工作流——
    这些需要数月的本地合规工程才能复制。
  beachhead: >-
    DIFC 注册的精品财富管理公司，AUM $100M–$500M，员工 5–15 人，
    在 GCC 股票、地区固收和一两类另类资产上进行配置，
    目前通过电子表格在三家及以上 UAE 托管行之间人工对账
  wedge: >-
    跨 UAE 托管行（ENBD、Mashreq、渣打 UAE）的每日自动交易对账，
    每天早晨开市前生成符合 DFSA 要求的审计日志导出
  whyNowCatalyst: >-
    ADGM 在 2026 年 Q1 的 AUM 激增 57%，正将一批新精品公司同时送入市场——
    而目前还没有任何玩家确立默认运营栈地位——这为成为标准中台层、
    赶在这批新进者锁定替代方案之前留下了一个短暂窗口。
  ventureScalePath: >-
    从 DIFC/ADGM 精品公司的交易对账起步；叠加 NAV 计算、客户绩效报告和 UHNW 客户门户；
    用同一套监管合规打法扩展至沙特 CMA 注册公司和巴林 CBB 持牌机构；
    最终成为服务 1,000+ 家注册公司的 GCC 财富管理运营操作系统，
    ARR $30K–$100K，在 B 轮前目标实现 $50M+ ARR。
solution: >-
  一款专为 UAE 精品财富管理公司打造的中台 SaaS 平台：
  通过 API 或 SFTP 接入托管行数据，跨多家托管行运行每日自动交易对账，
  并在开市前将中断项和异常显示在结构化看板中。
  平台按需生成符合 DFSA 要求的审计日志和持仓快照，
  让公司能在数小时内响应监管检查请求，而非数天。
  白标客户报告层无需额外运营人手即可为 UHNW 客户生成机构级绩效和投资组合摘要报告。
  月费 $3,000–$7,000，另附每个托管行连接费，
  较企业级平台定价低 70–80%，并可在两至四周内借助预置 UAE 托管行连接器完成部署。
