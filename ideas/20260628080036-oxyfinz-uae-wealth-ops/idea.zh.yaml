jobsToBeDone:
  - job: >-
      周一早晨收到托管行对账单时，帮我在四家托管行之间对账上周的交易，
      让我能以准确持仓开启新一周，而不必花三小时手工处理电子表格。
    currentAlternative: 使用下载的 SWIFT 对账单和 VBA 宏手工 Excel 对账
    successMetric: 每日对账时间从 3 小时压缩至 30 分钟以内
  - job: >-
      当 DFSA 检查员要求提供 90 天交易记录和持仓历史时，帮我生成完整、格式规范的审计包，
      让我能在检查窗口内响应，而不必从邮件链中重建记录。
    currentAlternative: 从托管行邮件、PDF 对账单和内部电子表格中临时重建
    successMetric: 按需在两小时内生成审计包，无需任何人工重建
