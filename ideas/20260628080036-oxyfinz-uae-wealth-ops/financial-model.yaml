scenarios:
  downside:
    description: Custodian access takes longer, Oxyfinz-style price pressure persists, and the company exits Y3 with fewer Saudi/GCC logos and lower add-on attach.
    y3RevenueK: 1297.5
    y3EbitdaK: -666.1
    cashLowPointK: 34.8
    keyAssumptionChanges:
    - Y3 exits at 26 customers instead of 33 because the sales cycle drifts toward 10–12 weeks.
    - Blended monthly ARPU reaches only $5.0K because fewer firms buy 4th/5th custodian and reporting add-ons.
    - Gross margin settles near 72% because onboarding and compliance patches stay more labor-intensive.
  base:
    description: The main case converts early pilots into a repeatable DIFC/ADGM motion, adds a small Saudi/GCC contribution in Y3, and exits with 33 paying logos.
    y3RevenueK: 1772.4
    y3EbitdaK: -341.0
    cashLowPointK: 475.5
    keyAssumptionChanges:
    - Customers follow A8, A9, and A10, reaching 15 by month 18, 20 by month 24, and 33 by Y3 exit.
    - Blended monthly ARPU expands from $4.1K in Y1 to $5.6K in Y3 through extra-custodian, reporting, and jurisdiction add-ons.
    - Gross margin moves from 73% in Y1 to the 75% business-plan target from Y2 onward.
  upside:
    description: Compliance-referral and reference-account momentum pull deals forward, giving the company more logos and slightly richer add-on mix by Y3.
    y3RevenueK: 2088.7
    y3EbitdaK: -129.6
    cashLowPointK: 764.2
    keyAssumptionChanges:
    - Y3 exits at 36 customers with faster DIFC/ADGM conversion and four to six Saudi/GCC logos.
    - Blended monthly ARPU reaches $5.9K as more firms take extra custodian connections and reporting add-ons earlier.
    - Gross margin improves toward 76% as connector reuse and audit-export standardization reduce delivery drag.
sensitivity:
- variable: ARPU
  downsideCase: Y3 blended monthly ARPU tops out near $5.0K because add-on attachment stays light and more customers remain at the base package.
  baseCase: Y3 blended monthly ARPU reaches $5.6K as extra custodian fees and light reporting / jurisdiction add-ons attach.
  upsideCase: Y3 blended monthly ARPU approaches $6.0K as more firms buy 4th/5th custodian connections and premium reporting earlier.
  y3RevenueImpactK: -189.9
  cashImpactK: -135.0
- variable: CAC
  downsideCase: Go-to-market efficiency weakens and S&M intensity rises from 4% to 5% of revenue in Y2–Y3.
  baseCase: The model holds variable S&M intensity at 4% of revenue while founder and network selling still do most of the work.
  upsideCase: Referral mix improves enough that the company holds S&M intensity below 4% even as the logo base scales.
  y3RevenueImpactK: 0.0
  cashImpactK: -26.3
- variable: churn
  downsideCase: Retention behaves like the company exits Y3 about two customers lower because reconciliation remains useful but not deeply embedded.
  baseCase: The base path assumes 1.0% monthly unit-economic churn and still exits Y3 at 33 customers.
  upsideCase: Retention behaves like the company exits Y3 one to two customers higher as audit exports and exception history become part of daily operations.
  y3RevenueImpactK: -84.0
  cashImpactK: -46.2
- variable: sales cycle
  downsideCase: Cycle stretches toward 10–12 weeks, pushing the customer ramp roughly one quarter slower than plan.
  baseCase: Cycle stays within the 4–8 week range stated in the business plan.
  upsideCase: Reference accounts and compliance-referral channels compress conversion toward 4–6 weeks.
  y3RevenueImpactK: -218.4
  cashImpactK: -158.2
- variable: gross margin
  downsideCase: Gross margin settles near 72% because onboarding and compliance changes remain more labor-intensive.
  baseCase: Gross margin holds at 75% from Y2 onward, matching the business-plan target.
  upsideCase: Gross margin reaches 76–77% as connectors and audit exports standardize faster than expected.
  y3RevenueImpactK: 0.0
  cashImpactK: -53.1
- variable: hiring pace
  downsideCase: The product, second implementation, and GCC sales hires pull forward by roughly one quarter before repeatability is proven.
  baseCase: Post-Y1 hires land at months 15, 18, and 30 in line with the modeled sequencing.
  upsideCase: Non-critical hires slide by one quarter until conversion proof is visible, improving burn without changing the wedge.
  y3RevenueImpactK: 0.0
  cashImpactK: -95.1
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Founder-led and partner-sourced pipeline] --> PaidPilots
      PaidPilots --> PayingCustomers
      PayingCustomers --> BaseSubscription
      PayingCustomers --> ExtraCustodians
      PayingCustomers --> ReportingAddOns
      BaseSubscription --> Revenue
      ExtraCustodians --> Revenue
      ReportingAddOns --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case growth comes from scaling from 9 customers at Y1 exit to 33 at Y3 exit while lifting blended ARPU from $4.1K to $5.6K per month through extra-custodian and light add-on revenue.
- checkName: Must go right
  finding: Founder-plus-network selling must still deliver 15 paying customers by month 18 without discounting below the $3.5K base or letting onboarding sprawl past the planned 2–4 week deployment window.
- checkName: Model breaks if
  finding: If sales cycles drift toward 10–12 weeks or ARPU stalls near $5.0K per month, downside cash compresses to roughly $35K before the business reaches the Y3 customer target.
- checkName: Next-round proof
  finding: The strongest next-round story is 30+ paying UAE-and-Saudi logos, a $2.2M+ exit ARR run rate, and Q4Y3 burn trending close enough to breakeven that growth capital funds expansion rather than rescue.
sanityChecks:
  ruleOf40: Y3 growth 111% + EBITDA margin -19% = 92%.
  burnMultiple: About 1.0x in Y2 on roughly $685K of net new ARR, improving to about 0.3x in Y3 on roughly $1.09M of net new ARR.
  revenuePerFte: $222K Y3 revenue per end-of-year FTE (at the low end of the rough $200K–$400K early B2B SaaS benchmark).
  flags:
  - The base case needs blended ACV to reach about $67K by Y3, which is above the research midpoint and only works if extra-custodian and add-on attachment materialize.
  - The model exceeds the research file’s 28-logo UAE SOM, so three to five late-Y3 customers are implicitly assumed to come from Saudi/GCC rather than UAE alone.
  - EBITDA remains negative through Y3, so the plan still expects another round unless Q4 conversion or margin outperforms the base case.
  - CAC remains acceptable only if dense DIFC/ADGM targeting and compliance-referral channels keep S&M intensity near the modeled 4% of revenue.
