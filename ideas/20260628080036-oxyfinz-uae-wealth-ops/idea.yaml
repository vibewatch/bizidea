jobsToBeDone:
  - job: >-
      When I receive Monday-morning custodian statements, help me reconcile the previous
      week's trades across four custodians, so I can open the week with accurate positions
      without three hours of manual spreadsheet work.
    currentAlternative: Manual Excel reconciliation using downloaded SWIFT statements and VBA macros
    successMetric: Daily reconciliation time reduced from 3 hours to under 30 minutes
  - job: >-
      When a DFSA examiner requests 90-day trade records and position history, help me
      generate a complete, formatted audit package, so I can respond within the examination
      window without reconstructing records from email chains.
    currentAlternative: Ad-hoc reconstruction from custodian emails, PDF statements, and internal spreadsheets
    successMetric: Audit package generated in under two hours on demand with zero manual reconstruction
