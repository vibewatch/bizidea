  painIntensity:
    score: 5
    rationale: >-
      Manual trade reconciliation is a daily, time-consuming, and regulatory-risk-creating
      burden for boutique ops teams; the pain is quantifiable (hours per day), directly
      tied to DFSA examination exposure, and confirmed by source-article workflow detail.
  wedgeClarity:
    score: 5
    rationale: >-
      Automated daily trade reconciliation across UAE custodians is a discrete, scoped, and
      measurable workflow with clear before-and-after ROI, making it an ideal first product
      and clear sales conversation anchor.
  defensibility:
    score: 3
    rationale: >-
      UAE custodian connectors and DFSA audit-trail format expertise create meaningful
      switching costs and replication effort, but a well-funded competitor or a custodian
      itself could replicate the integration library given sufficient time.
  ventureScale:
    score: 3
    rationale: >-
      The addressable base of 500-plus DIFC and ADGM boutiques at $40K–$80K ARR implies a
      UAE ceiling of $20M–$40M ARR; achieving venture-fund-returnable scale requires
      successful GCC regional expansion into Saudi CMA and Bahrain CBB markets.
topRisks:
  - name: UAE-only market ceiling
    description: >-
      The 500-plus DIFC and ADGM boutique segment may generate insufficient ARR for
      venture-scale returns without rapid GCC regional expansion.
    mitigation: >-
      Architect the regulatory-format layer as a pluggable module from day one so Saudi CMA
      and Bahrain CBB format packs can be released within 12 months of UAE product-market
      fit, doubling the addressable base without re-engineering the core reconciliation
      engine.
  - name: Custodian commoditisation
    description: >-
      ENBD, Mashreq, or a regional custodian could launch a free reconciliation feed
      directly to boutique clients, commoditising the data-aggregation wedge.
    mitigation: >-
      Expand the value stack above the data layer — into DFSA audit-trail generation,
      exception workflow management, and UHNW client reporting — before custodians reach
      this capability, ensuring the product earns revenue from compliance and reporting
      outcomes rather than raw data access.
  - name: Regulatory format change risk
    description: >-
      DFSA or FSRA updates to required reporting formats could require costly re-engineering
      and create customer-facing disruption during transitions.
    mitigation: >-
      Maintain a dedicated regulatory-engineering function that monitors DFSA and FSRA
      circular releases and builds the reporting layer as a modular, separately deployable
      service so format changes can be shipped without touching the reconciliation engine.
