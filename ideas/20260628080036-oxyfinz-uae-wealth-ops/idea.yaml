problem: >-
  UAE boutique wealth managers (typically $100M–$1B AUM) operating under DFSA or FSRA
  oversight face a capability no-man's land: too small to justify enterprise platforms such
  as Temenos or Advent Portfolio Exchange, yet UHNW clients expect institutional-grade
  multi-custodian reporting and daily position accuracy. Most boutiques reconcile trades
  manually across 3–5 custodians using spreadsheets and emailed statements, consuming
  30–50% of ops-staff time and creating audit-trail gaps that expose the firm during DFSA
  examinations. As ADGM and DIFC register a new wave of boutiques on the back of 57% AUM
  growth, each new entrant faces the same workflow bottleneck with no purpose-built,
  affordable solution to reach for.
targetUser:
  primary: >-
    Operations Manager or Head of Portfolio Operations at a 5–25 person DIFC- or
    ADGM-registered boutique wealth manager with $100M–$800M AUM in mixed GCC equities,
    fixed income, and alternative assets
  secondary: >-
    Compliance Officer at the same boutique, responsible for DFSA or FSRA trade-record and
    audit-log submissions
  buyer: >-
    CEO or Managing Partner of the boutique who signs the software contract and is
    accountable for DFSA examination outcomes
startupThesis:
  nonObviousInsight: >-
    Oxyfinz giving away 12 months of free access to 20 boutiques does not solve the market
    problem — it reveals that the segment is real, receptive, and underserved. The free model
    also signals that no player has yet built deep-enough workflow lock-in to charge for the
    layer; the defensible business is not the commodity data pipe but the custodian-specific
    reconciliation logic, DFSA audit-trail format, and exception management workflow that
    requires months of UAE-local compliance engineering to replicate.
  beachhead: >-
    DIFC-registered boutique wealth managers with $100M–$500M AUM and 5–15 staff, allocating
    across GCC equities, regional fixed income, and one or two alternative-asset sleeves,
    currently reconciling trades manually via spreadsheet across three or more UAE custodians
  wedge: >-
    Automated daily trade reconciliation across UAE custodians (ENBD, Mashreq, Standard
    Chartered UAE) with a DFSA-compliant audit-trail export generated each morning before
    market open
  whyNowCatalyst: >-
    ADGM's 57% AUM surge in Q1 2026 is onboarding a cohort of new boutiques simultaneously —
    before any player has established default ops-stack status — creating a narrow window to
    become the standard middle-office layer before the cohort locks in alternatives.
  ventureScalePath: >-
    Start with trade reconciliation for DIFC/ADGM boutiques; layer in NAV calculation,
    client performance reporting, and a UHNW client portal; expand to Saudi CMA-registered
    boutiques and Bahrain CBB-licensed firms using the same regulatory compliance playbook;
    eventually become the GCC wealth management ops OS serving 1,000+ registered firms at
    $30K–$100K ARR, targeting $50M+ ARR before a Series B.
solution: >-
  A purpose-built middle-office SaaS platform for UAE boutique wealth managers that ingests
  custodian feeds via API or SFTP, runs automated daily trade reconciliation across multiple
  custodians, and flags breaks and exceptions in a structured dashboard before market open.
  The platform generates DFSA-compliant audit logs and position snapshots on demand, enabling
  firms to respond to regulatory examination requests in hours instead of days. A white-label
  client reporting layer produces UHNW-grade performance and portfolio summary reports
  without additional ops-staff effort. Priced at $3,000–$7,000 per month with per-custodian
  connection fees, it sits 70–80% below enterprise platform pricing while deploying in two
  to four weeks using pre-built UAE custodian connectors.
goToMarketSeed:
  firstCustomer: >-
    A DIFC-registered multi-asset boutique with 8–15 staff, $200M–$400M AUM across GCC
    equities and sukuk, currently reconciling three custodian accounts manually each morning
    using Excel and emailed SWIFT statements, with a compliance officer who handles DFSA
    reporting ad hoc
  buyingTrigger: >-
    A DFSA examination request or a client-visible reconciliation break that exposes the
    manual process, creating an immediate mandate from the managing partner to automate ops
  currentAlternative: >-
    Manual Excel reconciliation using downloaded custodian statements, supplemented by
    in-house VBA scripts; some larger boutiques use Advent Portfolio Exchange at
    significantly higher cost and longer implementation timelines
  switchingReason: >-
    Purpose-built UAE custodian connectors deploy in weeks not months, DFSA audit-trail
    output is pre-formatted, and the price point is 70–80% below enterprise alternatives —
    delivering immediate ROI on ops-staff time without a multi-month implementation project
  pricingHypothesis: >-
    $3,500/month base for up to three custodian connections; $600/month per additional
    custodian; optional UHNW client portal add-on at $250 per client per year; annual
    prepay at 10% discount
