- point: DFSA cyber-risk rules apply to all authorised firms and require governance, monitoring, response, and recovery controls
    sized to business complexity.
  sourceRefs:
  - 7
- point: ADGM fund managers now face periodic reporting requirements that vary by fund type, increasing the value of structured
    operational data and repeatable exports.
  sourceRefs:
  - 10
- point: ADGM’s updated data-protection rules make handling special-category and sensitive personal data a formal design consideration
    for permissions, logging, and processing workflows.
  sourceRefs:
  - 11
