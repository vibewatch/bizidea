  validationPlan:
  - priority: high
    question: How many DIFC and ADGM boutiques actually run three or more custodians and spend more than two staff-hours per
      day on reconciliation?
    evidenceToGather: Ten customer discovery interviews plus anonymized screenshots of current morning reconciliation workflows.
  - priority: high
    question: Which UAE custodians will provide daily machine-readable files or SFTP drops to small EAMs without bespoke enterprise
      contracts?
    evidenceToGather: Connector feasibility checks with custody operations teams and sample statement or transaction files
      from first-design partners.
  - priority: medium
    question: Will the free-cohort dynamic created by Oxyfinz anchor local price expectations too low for a paid challenger?
    evidenceToGather: Win-loss interviews with boutique managers that evaluate Oxyfinz or similar tools over the next two
      quarters.
  - priority: low
    question: How much product rework would Saudi and Bahrain expansion require across custody connectors, reporting formats,
      and onboarding?
    evidenceToGather: Gap analysis against one Saudi and one Bahrain design partner after UAE v1 is live.
