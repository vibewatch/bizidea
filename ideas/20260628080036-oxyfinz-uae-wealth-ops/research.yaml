competitors:
- name: Oxyfinz
  stage: seed
  wedge: UAE-focused reporting and data infrastructure for boutique wealth, asset, and EAM firms.
  pricing: 12 months free for qualifying SME firms; post-pilot pricing is not public.
  strength: Local market narrative, explicit boutique targeting, and a live offer to onboard firms quickly.
  weaknessVsUs: Current public positioning is broad platform access rather than a narrow, deeply opinionated UAE-custodian
    reconciliation workflow.
  sourceRefs:
  - 12
  - 13
- name: Temenos
  stage: incumbent
  wedge: Full wealth-management suite with data adapters, digital wealth, and front-office tooling.
  pricing: Custom quote / enterprise sales process; no public list price on fetched pages.
  strength: Breadth, deployment options, and extensive data-adapter and auditability story.
  weaknessVsUs: Likely too broad and implementation-heavy for subscale UAE boutiques that only need morning reconciliation
    and regulator-ready exports first.
  sourceRefs:
  - 23
  - 24
  - 34
- name: SimCorp
  stage: incumbent
  wedge: Integrated investment-operations and reporting platform for larger managers.
  pricing: Custom quote / enterprise sales process; no public list price on fetched pages.
  strength: Deep operations, reporting, and straight-through-processing capabilities.
  weaknessVsUs: Geared toward larger institutions and broad investment operations rather than UAE-local custodian last-mile
    automation.
  sourceRefs:
  - 25
  - 26
  - 33
- name: Addepar
  stage: scale-up
  wedge: Cross-asset aggregation, alternatives operations, and client reporting for modern wealth firms and family offices.
  pricing: Custom quote / enterprise sales process; no public list price on fetched pages.
  strength: Strong data layer and complex portfolio reporting, especially across alternatives.
  weaknessVsUs: Public positioning is stronger on analytics and reporting than on local reconciliation exceptions and DFSA-specific
    compliance output.
  sourceRefs:
  - 27
  - 28
  - 29
- name: SS&C Black Diamond
  stage: incumbent
  wedge: Portfolio management and reporting plus outsourced operations and adviser workflows.
  pricing: Custom quote / demo-led sales process; no public list price on fetched pages.
  strength: Mature reporting stack and operational-support model.
  weaknessVsUs: Public positioning is adviser-centric and not obviously localized for DIFC/ADGM compliance and UAE-custody
    nuances.
  sourceRefs:
  - 30
  - 31
