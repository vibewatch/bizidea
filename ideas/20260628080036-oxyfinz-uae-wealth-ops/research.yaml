openQuestions:
- Which UAE custodians will provide daily machine-readable files or SFTP drops to small EAMs without bespoke enterprise contracts?
- Of the 500-plus DIFC entities and 179 ADGM managers, how many actually match the sub-$1B, three-plus-custodian boutique
  profile?
- What conversion economics will Oxyfinz achieve after its free cohort ends, and will that reset local price expectations
  downward?
- How much product rework would Saudi or Bahrain expansion require across custody connectors, reporting formats, and onboarding
  rules?
