    - 25
    - 30
    - 31
    - 32
  partnershipEcosystem:
  - point: DFSA, DIFC, and ADGM innovation and ecosystem programs can provide credibility, design-partner access, and faster
      signal on evolving reporting expectations.
    sourceRefs:
