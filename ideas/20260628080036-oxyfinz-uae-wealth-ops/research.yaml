  - point: Dubai is denser in private wealth concentration, while Abu Dhabi is increasingly attracting institutional capital,
      advisory offices, and family-office activity; both matter, but the sales motion may not be identical.
    sourceRefs:
    - 14
    - 15
    - 16
  - point: Regional upside exists, but the UAE-only opportunity is small enough that GCC expansion should be designed in early
      rather than treated as an afterthought.
    sourceRefs:
    - 14
    - 17
    - 22
  sensitivityCases:
  - case: DIFC and ADGM onboarding slows after the current growth wave
    impact: Pipeline density falls and the startup must rely more on displacing incumbent or manual setups than on greenfield
      entrants.
    sourceRefs:
