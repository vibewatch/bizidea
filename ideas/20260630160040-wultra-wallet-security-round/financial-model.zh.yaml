scenarios:
  downside:
    description: 钱包身份验证项目转化更慢，银行在账户恢复专属范围上停留更久，导致第 3 年末仅有 5 家正式签约银行、ARPU 偏低且交付杠杆较弱。
    y3RevenueK: 3201.65
    y3EbitdaK: -592.17
    cashLowPointK: -65.72
    keyAssumptionChanges:
    - 第 1 年末 2 家付费银行、第 2 年末 4 家正式签约、第 3 年末 5 家正式签约，而非 6 家。
    - 混合年均银行收入从 $720K 降至 $680K，因为较少银行扩展至账户恢复以外的旅程。
    - 毛利率从 70% 降至 68%，因为连接器和证明材料包工作仍更多依赖手工。
  base:
    description: 基准情形将首批付费切换转化为第 2 年末 5 家正式签约银行，第 3 年新增第六家正式银行并开始有意义的第二旅程扩展。
    y3RevenueK: 4110.0
    y3EbitdaK: 33.29
    cashLowPointK: 1211.65
    keyAssumptionChanges:
    - 客户数量按 A6–A8 路径发展：第 1 年末 3 家付费银行、第 2 年末 5 家正式签约、第 3 年末 6 家正式签约。
    - 混合年均银行收入维持 A4 的 $720K，毛利率维持 A9 的 70% 目标。
    - 招聘按 A21 节奏推进，第 3 年末团队保持 10 名全职员工，第一位真正的销售人员等到合作伙伴动作就位后才加入。
  upside:
    description: 标杆客户和合作伙伴推荐将一家银行提前引入，提升每行平均范围，并让公司更多复用通用技术栈。
    y3RevenueK: 5098.31
    y3EbitdaK: 697.98
    cashLowPointK: 1729.38
    keyAssumptionChanges:
    - 第 2 年末 6 家正式签约、第 3 年末 7 家正式签约，合作伙伴推荐提前促成交易。
    - 混合年均银行收入从 $720K 升至 $760K，因为支付升级验证和监测更快附加。
    - 毛利率从 70% 升至 71%，因为通用技术栈连接器和规则库被更频繁复用。
sensitivity:
- variable: ARPU
  downsideCase: 混合年均银行收入降至 $680K，因为买方长期将公司锁定在账户恢复专属范围内。
  baseCase: 混合年均银行收入维持 $720K，第 3 年有一半正式银行增加第二段旅程或监测。
  upsideCase: 升级验证和监测更早附加，混合年均银行收入升至约 $760K。
  y3RevenueImpactK: -228.34
  cashImpactK: -284.07
- variable: CAC
  downsideCase: 实际 CAC 上升，因为银行差旅、工作坊和风险审查辅导使销售及市场强度提升约 1.5 个百分点。
  baseCase: 建模 CAC 在创始人主导加合作伙伴辅助动作下维持在约每个新正式签约银行 $438K 附近。
  upsideCase: 合作伙伴引荐温热管道，销售及市场强度下降约 1 个百分点。
  y3RevenueImpactK: 0.0
  cashImpactK: -117.0
- variable: churn
  downsideCase: 留存表现相当于公司第 3 年末只有 5 家正式银行，因为一个早期客户在更广泛扩展之前停滞。
  baseCase: 基准路径假设 1.5% 月度流失，同时第 3 年末仍达到 6 家正式银行。
  upsideCase: 留存和扩展表现相当于公司第 3 年末有 7 家正式银行，因为首批客户将工作流嵌入上线治理。
  y3RevenueImpactK: -510.0
  cashImpactK: -310.25
- variable: sales cycle
  downsideCase: 额外一季度的安全审查和采购滑点将每次主要客户签约节点推后约一个季度。
  baseCase: 一旦首套通用技术栈得到验证且审批材料包在 60 天内交付，付费切换仍按计划时间线转化。
  upsideCase: 标杆客户和合作伙伴引荐在第 2 年和第 3 年分别将一家银行提前约一个季度。
  y3RevenueImpactK: -60.0
  cashImpactK: -222.3
- variable: gross margin
  downsideCase: 毛利率维持在 68%，因为审批材料包、集成和治理工作仍过于手工化。
  baseCase: 毛利率维持在 70% 的商业计划目标。
  upsideCase: 随着更多连接器和规则库工作在银行间复用，毛利率升至 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -156.0
- variable: hiring pace
  downsideCase: 产品、部署、合规和客户经理的招聘均提前约 6 个月，因为交付仍过于定制化。
  baseCase: 招聘按 A21 节奏推进，等待通用技术栈和合作伙伴动作可重复的证据。
  upsideCase: 合规和客户经理招聘均可推迟约一个季度，不影响交付，因为首套技术栈保持模板化。
  y3RevenueImpactK: 0.0
  cashImpactK: -335.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      TargetBanks --> PaidCutovers
      PaidCutovers --> ProductionBanks
      ProductionBanks --> ExpansionJourneys
      ProductionBanks --> Revenue
      ExpansionJourneys --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形收入来自：第 1 年末 3 家付费银行增至第 2 年末 5 家正式签约银行，再至第 3 年末 6 家正式银行，每行年混合支出约 $720K。
- checkName: 必须做对的事
  finding: 公司必须将首套通用技术栈部署控制在 60 天目标附近，才能在大幅增加交付人员之前达到 5 家正式签约银行。
- checkName: 模型崩溃的情形
  finding: 若业务滑向 5 家第 3 年银行、$680K ARPU 和 68% 毛利率的下行情形，现金在下轮融资前将略为转负。
- checkName: 下轮验证
  finding: 一旦 5 家正式签约银行、2 个合作伙伴来源部署和首个支付升级验证扩展落地，同时资产负债表上仍有可见的现金缓冲，seed 融资叙述即具备可信度。
sanityChecks:
  ruleOf40: 第 3 年增长率 45.74% + EBITDA 利润率 0.81% = 46.55%。
  burnMultiple: 第 2 年净新增 ARR 约 $1440.0K，消耗乘数约 0.3 倍；第 3 年 EBITDA 转正同时净新增 ARR 约 $720.0K，消耗乘数略为负值。
  revenuePerFte: 第 3 年末每全职员工收入 $411.0K（大致处于早期企业 SaaS 基准 $200–400K 的高端）。
  flags:
  - 基准情形仍将 $4.1M 以上的第 3 年收入集中在仅 6 家银行客户，一次扩展延迟或不续约影响显著。
  - CAC 约每个新正式签约银行 $438K，偏高，因为创始人主导的银行销售、合作伙伴赋能和采购管理费用仍然沉重。
  - 毛利率只有在连接器复用和审批材料包模板化阻止公司滑向定制服务业务的前提下才能维持 70%。
  - 融资额仅在商业计划区间的低端，下行情形仍会在下轮融资前使现金略为转负。
