categoryDynamics:
  growthRate: 深度伪造欺诈占比三年内上升 2,137%
  growthRateSourceRefs:
    - 16
  tailwinds:
    - point: >-
        钱包部署正从试点和参考实现转向具体面向银行的开户和 SCA 用例。
      sourceRefs:
        - 1
        - 2
        - 3
        - 6
        - 7
    - point: >-
        银行可以将钱包流程用于开户、登录和支付授权，创造出实际可行的第一旅程切口。
      sourceRefs:
        - 2
        - 6
        - 7
        - 9
    - point: >-
        PQC 迁移已有分阶段时间表和金融业指引，使加密敏捷性更容易转化为有资金支持的工作流。
      sourceRefs:
        - 23
        - 24
        - 28
        - 29
  headwinds:
    - point: >-
        当前 SCA 碎片化分布在移动 App、短信 OTP、推送审批和设备专属流程中，变更管理成本高昂。
      sourceRefs:
        - 9
        - 10
        - 31
    - point: >-
        周边在位厂商已在向同一批买方销售身份、身份验证和欺诈工具，新进入者必须证明中立性和速度。
      sourceRefs:
        - 17
        - 18
        - 30
        - 33
        - 34
competitors:
  - name: Wultra
    stage: 成长期
    wedge: >-
      面向受监管机构的后量子银行身份验证、移动优先 MFA 和数字身份钱包网关。
    pricing: 定制企业定价。
    strength: >-
      非常明确的银行、钱包和 PQC 定位，加上跨多个国家的真实专业市场牵引力。
    weaknessVsUs: >-
      掌握重要管控点，但不拥有初创公司所提出的中立跨厂商切换和审批工作流。
    sourceRefs:
      - 12
      - 13
      - 14
      - 15
  - name: Signicat
    stage: 成熟在位厂商
    wedge: >-
      面向受监管行业的泛欧身份核实、eID 和钱包枢纽及编排。
    pricing: 定制企业定价。
    strength: >-
      广泛的身份方式覆盖、强大的银行定位，以及进入钱包连接的明显路径。
    weaknessVsUs: >-
      面向身份访问和编排，而非混合技术栈上账户恢复、设备绑定和加密敏捷性的存量银行切换层。
    sourceRefs:
      - 16
      - 17
      - 18
      - 19
  - name: OneSpan
    stage: 成熟在位厂商
    wedge: >-
      附 EUDI 就绪信息的银行身份验证、移动身份验证器和交易签名基础设施。
    pricing: 定制企业定价。
    strength: >-
      深厚的银行装机基础，以及对交易身份验证和防篡改审批的强管控。
    weaknessVsUs: >-
      以产品为中心而非以工作流为中心，为专属上线依赖关系和证明材料层留下空间。
    sourceRefs:
      - 10
      - 30
      - 31
      - 32
  - name: Entersekt
    stage: 成长期
    wedge: >-
      面向零售和商业银行的情境感知数字账户身份验证、3-D Secure 和欺诈防控。
    pricing: 定制企业定价。
    strength: 针对数字银行流程的强运行时交易完整性和欺诈叙述。
    weaknessVsUs: >-
      对 EUDI 钱包就绪和后量子迁移的明确定位较弱，且未定位为银行侧切换系统记录源。
    sourceRefs:
      - 33
      - 34
regulatoryTechnicalConstraints:
  - point: >-
      钱包依赖方服务提供商必须在其成员国完成注册，并在生产使用前正确处理 PID 和认证声明验证。
    sourceRefs:
      - 1
      - 4
  - point: >-
      远程入网、协议/接口、依赖方注册和信任框架实施法令均影响上线设计，且可能随时间变化。
    sourceRefs:
      - 4
  - point: >-
      基于钱包的 SCA 依赖标准对齐的设备绑定密钥、认证声明处理和可互操作接口，而非简单的 UI 变更。
    sourceRefs:
      - 5
      - 35
      - 36
  - point: >-
      后量子迁移需要密码算法清单和分阶段升级，因此银行需要适配现有身份验证存量的排序方案。
    sourceRefs:
      - 23
      - 24
      - 28
      - 29
validationSignals:
  - point: >-
      大规模试点涉及 26 个成员国加挪威、冰岛和乌克兰的 550 家私营公司和公共机构，明确包含支付和银行用例。
    sourceRefs:
      - 2
  - point: >-
      POTENTIAL 将银行开户纳入核心钱包用例，确认私营部门入网是真实的部署目标而非理论场景。
    sourceRefs:
      - 6
  - point: >-
      NOBID 在多个利益相关方之间测试了钱包入网、银行账户关联和网上商城支付，展现了实际的协调复杂性。
    sourceRefs:
      - 7
  - point: >-
      Wultra 表示服务超过 25 个国家的 70 多个客户，并围绕钱包、欺诈和后量子需求完成了新一轮融资。
    sourceRefs:
      - 12
  - point: >-
      Signicat 报告深度伪造驱动的身份欺诈急剧上升，为银行提供了超越合规的预算理由——以更强的身份验证和账户恢复管控应对欺诈。
    sourceRefs:
      - 16
openQuestions:
  - >-
    哪些具体的捷克、斯洛伐克或奥地利零售银行已有 2026–2027 年的钱包负责人和已立项的登录、账户恢复或支付审批工作流？
  - >-
    在目标客户中，谁真正掌控钱包身份验证切换支出：CISO、数字渠道、欺诈、支付还是转型 PMO？
  - >-
    哪段旅程产生最快的可量化 ROI：开户、登录、支付审批还是账户恢复？
  - >-
    目标银行的后量子问题有多大比例在于用户侧身份验证，相对于服务器端 HSM 和签名基础设施？
