reportMemo:
  executiveTakeaways:
    - >-
      最强切口是银行侧切换和证明材料层，而非另一款钱包、MFA 令牌或密码学 SDK。
    - >-
      紧迫性是真实的，因为钱包部署、深度伪造欺诈和后量子规划正在同一批银行旅程上同步汇聚。
    - >-
      管控点层面的竞争已很拥挤，但没有明显的厂商拥有跨厂商依赖关系映射、双栈切换和上线证明材料这一完整组合。
    - >-
      滩头市场应保持窄口：一家银行、一段旅程、一份审批材料包，从开户、登录或高价值支付审批起步。
  marketDefinition: >-
    面向欧洲零售银行的软件——清点身份验证和钱包依赖关系、分阶段推进双栈切换、压力测试账户恢复和升级验证流程，并为 EUDI 相关上线生成可提交审批的证明材料。
  customerAndBuyer: >-
    主要用户是中型欧洲零售银行的数字身份和身份验证负责人、移动银行安全负责人和欺诈团队。经济买方通常是 CISO 或首席数字官，数字渠道和支付负责人作为有力的技术赞助方。
  buyingTriggers:
    - point: >-
        钱包部署已从标准化工作转向面向银行的上线规划——服务提供商工作流、试点和开户用例已具体到足以触发立项。
      sourceRefs:
        - 1
        - 2
        - 3
        - 6
        - 7
    - point: >-
        银行正被推动为基于钱包的强客户认证做好准备，使登录和交易审批从遥远的政策观察项变成近期的平台决策。
      sourceRefs:
        - 9
        - 10
    - point: >-
        深度伪造驱动的身份欺诈和账户被盗压力，使账户恢复和身份验证管控比纯合规项目更容易获得预算。
      sourceRefs:
        - 16
        - 20
        - 21
        - 22
    - point: >-
        后量子指引已进入分阶段迁移规划阶段，迫使更早梳理身份验证技术栈内的密码算法依赖关系。
      sourceRefs:
        - 23
        - 24
        - 28
        - 29
  willingnessToPay:
    summary: >-
      付费意愿可信，因为银行已在为专业身份厂商买单，而钱包商业案例证据指向更低的开户和身份验证成本加上更好的风险管理——这是一个实际可行的 ROI 叙述。
    sourceRefs:
      - 11
      - 12
      - 17
      - 30
  competitiveLandscape: >-
    竞争按层级碎片化。钱包枢纽和身份核实厂商帮助银行接入 EUDI 流程；移动身份验证和交易签名厂商守住特定管控点；欺诈平台改善运行时决策。空白地带是一个中立的银行侧工作流——映射跨厂商断裂点、分阶段推进切换、为风险、安全和上线审批打包证明材料。
  incumbentThesis:
    - incumbentClass: 移动身份验证与交易签名厂商
      point: >-
        这些厂商在登录和支付审批上守得很好，但不会自动成为清点每个依赖关系并准备上线材料包的跨厂商程序层。
      sourceRefs:
        - 12
        - 15
        - 30
        - 31
        - 32
    - incumbentClass: 身份中台与钱包编排套件
      point: >-
        身份中台可以将银行接入钱包和 eID 方式，但它们并不定位为混合技术栈上账户恢复、设备绑定和加密敏捷性的存量切换系统。
      sourceRefs:
        - 17
        - 18
        - 19
    - incumbentClass: 欺诈与风险认证平台
      point: >-
        风险感知身份验证平台帮助在运行时拦截攻击，但仍让银行自行协调多个供应商的上线排序、账户恢复重设计和审计证明材料。
      sourceRefs:
        - 16
        - 33
        - 34
    - incumbentClass: 咨询公司与内部项目管理办公室
      point: >-
        试点和商业案例工作表明跨组织协调不可或缺，但单靠项目管理不会留下可复用的依赖关系图、测试框架或持续管控层。
      sourceRefs:
        - 2
        - 7
        - 11
  regulatoryLandscape: >-
    这一品类正处于 eIDAS 钱包规则、依赖方注册、远程入网标准和 PSD2 式强客户认证要求的交叉地带。制胜产品必须帮助银行证明互操作性、隐私、认证声明处理和治理就绪，而不仅仅是交付代码。
  technologyLandscape: >-
    技术构建块已经齐备：钱包 SCA 规范、设备绑定认证声明、移动身份验证器、交易签名和新兴后量子标准。稀缺的是在真实银行上线期间，跨现有移动 App、IAM、欺诈引擎和签名基础设施的编排能力。
  distributionChannels:
    - point: >-
        首先通过创始人主导的销售切入已与钱包或 SCA 上线项目挂钩的身份、安全和数字渠道负责人。
      sourceRefs:
        - 2
        - 6
        - 7
    - point: >-
        将在位身份和身份验证厂商作为集成和转介渠道，而非第一天就试图取代他们。
      sourceRefs:
        - 17
        - 18
        - 30
        - 33
    - point: >-
        通过锚定一段旅程和一份审批材料包，将合规和钱包就绪工作坊转化为付费试点。
      sourceRefs:
        - 1
        - 4
        - 11
  partnershipEcosystem:
    - point: >-
        移动身份验证、交易签名和钱包厂商是天然的集成合作伙伴，因为他们已经掌握目标银行内部的管控点。
      sourceRefs:
        - 13
        - 15
        - 17
        - 30
        - 31
    - point: >-
        试点联盟和数字身份生态系统组织可以提供共创客户需求、技术验证和早期公信力。
      sourceRefs:
        - 2
        - 6
        - 7
        - 11
    - point: >-
        欺诈、KYC 和支付技术栈至关重要，因为早期部署范围往往同时涵盖开户、登录和支付审批。
      sourceRefs:
        - 9
        - 16
        - 18
        - 34
  dataMoats:
    - point: >-
        关联钱包流程、身份验证器、签名组件、回退逻辑和厂商归属人的依赖关系图，随每次部署持续积累。
      sourceRefs:
        - 13
        - 17
        - 34
        - 35
    - point: >-
        在真实银行技术栈上的合成欺诈和升级验证模拟结果，可以成为单点管控厂商不自动拥有的专有上线遥测数据。
      sourceRefs:
        - 16
        - 20
        - 21
        - 32
    - point: >-
        针对远程入网、依赖方注册和后量子清单工作积累的审批材料包，成为可复用的证明材料，降低未来上线摩擦。
      sourceRefs:
        - 1
        - 4
        - 24
        - 28
  geographicConsiderations:
    - point: >-
        第一市场应坚持欧盟优先，因为监管触发因素、试点活动和信任框架都特定于欧洲钱包部署。
      sourceRefs:
        - 1
        - 2
        - 3
        - 6
    - point: >-
        试点活跃的北欧和中欧市场应比行动较晚的地区更快打开，因为生态系统已在测试支付、开户和凭证共享流程。
      sourceRefs:
        - 2
        - 7
        - 12
  sensitivityCases:
    - case: 钱包接受度长期停留在试点阶段
      impact: >-
        纯合规驱动的紧迫性减弱，产品必须凭防欺诈账户恢复、审批速度和降低跨厂商协调成本来赢单。
      sourceRefs:
        - 3
        - 9
        - 10
    - case: 深度伪造欺诈持续加速
      impact: >-
        银行更早立项更安全的设备绑定升级验证和账户恢复变更，增加测试框架和证明材料层的紧迫性。
      sourceRefs:
        - 16
        - 20
        - 21
        - 22
    - case: 后量子迁移成为董事会级审计议题
      impact: >-
        加密依赖关系映射成为更快释放预算的路径，并打开扩展至更广泛加密敏捷性监测的机会。
      sourceRefs:
        - 23
        - 24
        - 28
        - 29
  validationPlan:
    - priority: 高
      question: >-
        哪些具体的银行旅程最快产生审批痛点并释放预算：开户、登录、支付审批还是账户恢复？
      evidenceToGather: >-
        来自 5–10 家目标银行按旅程映射的当前上线计划、阻断日志和审批材料包。
    - priority: 高
      question: >-
        CISO、数字渠道、欺诈和支付团队中谁真正掌握 EUDI 相关切换的预算归属？
      evidenceToGather: >-
        前 25 个潜在客户的共创客户采购地图、采购文件和赢/输记录。
    - priority: 中
      question: >-
        哪些在位技术栈组合在滩头市场中占主导地位，从而决定了集成优先顺序？
      evidenceToGather: >-
        前 50 个客户的移动银行、MFA、签名、欺诈和钱包厂商技术栈清单。
analysisModels:
  marketMapDiagram:
    title: 银行钱包身份验证切换地图
    mermaid: |-
      quadrantChart
        title Bank wallet-auth cutover map
        x-axis Point control --> Cross-vendor cutover
        y-axis Routine authentication --> Launch-critical change
        Wultra: [0.56, 0.76]
        Signicat: [0.48, 0.64]
        OneSpan: [0.34, 0.58]
