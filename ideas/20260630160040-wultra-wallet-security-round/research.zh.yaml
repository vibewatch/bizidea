        Proposed startup: [0.90, 0.93]
  fiveForces:
    supplierPower:
      score: 3
      rationale: >-
        产品依赖在位移动身份验证、欺诈和签名厂商的集成，但没有任何单一供应商掌握完整的上线工作流，且银行本就运行混合技术栈。
      sourceRefs:
        - 13
        - 15
        - 30
        - 34
    buyerPower:
      score: 4
      rationale: >-
        银行采购缓慢，可将初创公司与内部项目管理或在位厂商扩展方案对比，并将要求风险、可审计性和审批速度方面的证明。
      sourceRefs:
        - 1
        - 8
        - 11
    threatOfEntrants:
      score: 3
      rationale: >-
        快速原型出编排方案是可能的，但生产部署仍需要标准熟悉度、合规客户信任和跨厂商集成深度。
      sourceRefs:
        - 4
        - 11
        - 24
    threatOfSubstitutes:
      score: 4
      rationale: >-
        内部 PMO、系统集成商、钱包枢纽和交易身份验证厂商都能吸收部分痛点，因此初创公司必须说明为何专属切换层优于拼凑的替代方案。
      sourceRefs:
        - 11
        - 15
        - 18
        - 30
        - 33
    competitiveRivalry:
      score: 4
      rationale: >-
        竞争激烈，因为多个周边厂商已在向银行身份、身份验证和欺诈预算销售，即使没有人确切拥有切换品类。
      sourceRefs:
        - 12
        - 17
        - 30
        - 33
  pestle:
    - factor: 政治
      impact: positive
      point: >-
        EU 机构和成员国正在协调试点和实施工作，为银行创造了项目压力和共同路线图。
      sourceRefs:
        - 2
        - 3
        - 4
    - factor: 经济
      impact: positive
      point: >-
        银行可以通过更低的开户和身份验证成本加上更好的风险管理来证明支出合理，而不仅仅依赖未来的合规价值。
      sourceRefs:
        - 10
        - 11
    - factor: 社会
      impact: positive
      point: >-
        用户对低摩擦、跨境、隐私保护身份体验的需求，支持从碎片化的 App 和短信流程迁移出去。
      sourceRefs:
        - 3
        - 6
        - 9
    - factor: 技术
      impact: positive
      point: >-
        钱包 SCA 规范、设备绑定认证声明、移动身份验证器、交易签名和 PQC 标准已足够成熟，可以立即构建实用的控制层。
      sourceRefs:
        - 5
        - 24
        - 25
        - 26
        - 27
        - 35
    - factor: 法律
      impact: negative
      point: >-
        注册、远程入网、认证声明和接受义务提高了实施负担，并使可审计性成为硬性要求。
      sourceRefs:
        - 1
        - 4
        - 9
        - 10
    - factor: 环境
      impact: neutral
      point: >-
        远程入网和数字凭证可以减少纸质材料和网点到访，但这是次要的买方论点，而非核心购买驱动力。
      sourceRefs:
        - 6
  adoptionFrictionMatrix:
    - friction: 跨移动银行、IAM、欺诈和签名技术栈的跨厂商依赖蔓延
      severity: 高
      affectedBuyer: 数字身份或身份验证负责人
      mitigation: >-
        在触及内联管控之前，先从只读发现、依赖关系映射和一段旅程的双栈切换规划起步。
      sourceRefs:
        - 11
        - 13
        - 30
        - 34
    - friction: 钱包合规要求演进过程中的规则和注册不确定性
      severity: 中
      affectedBuyer: CISO 或合规赞助方
      mitigation: >-
        维护一份与上线证明材料包挂钩的活规则库，涵盖依赖方注册、远程入网和认证声明要求。
      sourceRefs:
        - 1
        - 4
        - 10
    - friction: 替换短信或 App 专属审批模式时的客户体验风险
      severity: 中
      affectedBuyer: 数字渠道负责人
      mitigation: >-
        使用双栈回退路径，从安全价值明显超过用户体验变化的高风险流程起步。
      sourceRefs:
        - 9
        - 15
        - 31
        - 32
    - friction: 后量子清单工作与其他安全优先级竞争
      severity: 中
      affectedBuyer: CISO
      mitigation: >-
        将一段旅程的密码算法清单和迁移排序打包为有范围的上线交付物，而非全行级改造。
      sourceRefs:
        - 23
        - 24
        - 28
        - 29
