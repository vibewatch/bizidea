slug: wallet-auth-cutover-os
date: "2026-06-30"
executiveSummary: >-
  Wallet Auth Cutover OS 应以银行侧切换和证明材料层的定位上线，专注于 EUDI 相关身份验证变更，而非另一款消费级钱包、MFA App 或密码学 SDK。第一个客户是捷克、斯洛伐克或奥地利的零售银行，拥有 100 万至 300 万移动端客户，现有基于 App 的软令牌身份验证，且已立项 2026–2027 年钱包或数字身份项目。预算最可能在以下情形下释放：钱包试点、深度伪造或账户被盗事件激增后的欺诈复盘，或董事会级后量子工作流暴露了移动身份验证、欺诈、IAM 和签名系统的跨厂商依赖。初始产品应保持只读，聚焦一段旅程——优先账户恢复，高价值支付升级验证作为直接扩展路径——通过梳理依赖关系、模拟攻击和回退路径、生成风险和安全审批所需的材料包来交付价值。研究支持真实的紧迫性和专业软件采购意愿，但基础市场仍较窄，TAM 约 $217.5M、SAM 约 $22.5M、第 3 年 SOM 约 $4.5M，尚不含周边扩张。最优规模路径是将每次上线材料包转化为持续的加密敏捷性监测、依赖方策略管控，以及同一家银行更多钱包身份验证旅程。最大的反驳风险是监管时间表偏移、在位厂商或集成商压缩空间，以及银行是否愿意为中立切换层单独付费而非扩展现有项目。公开信息未能点名目标银行、明确预算负责人，或确认账户恢复是否可靠地优先于支付审批成为第一笔付费旅程，因此前 6–9 个月必须验证买方归属、部署速度和付费切换转化率。
problem:
  - "中型欧洲银行在 EUDI 部署、深度伪造欺诈和后量子迁移同时冲击同一技术栈时，必须同步变更钱包开户、账户恢复、设备绑定和升级验证流程。"
  - "这些变更跨越移动银行团队、IAM、欺诈运营、HSM 或签名厂商、钱包供应商和集成商，银行缺少一套能找出断裂点、排序切换步骤并生成可审计上线证据的统一工作流。"
solution:
  - "以只读方式接入银行的移动身份验证、欺诈、钱包和签名技术栈，为一段具名旅程（从账户恢复起步）构建依赖关系图，并生成双栈切换方案，明确哪些环节需要更强的设备绑定、后量子安全签名或回退逻辑。"
  - "将合成欺诈和账户恢复场景回放至计划中的旅程，把结果打包成面向安全、风险、合规和上线负责人的审批材料包，让银行无需替换在位系统即可审批生产上线。"
whyWeWin:
  - 公司掌握了中立的跨厂商切换和证明材料层，而这正是钱包厂商、MFA 供应商、欺诈工具和咨询公司今天都无法提供的。
  - 第一笔交易绑定一个具名上线项目和一份审批材料包，比要求银行提前购买全行级身份改造更快产生验证效果。
  - 每次部署都会积累一份可复用的依赖关系图——涵盖管控空白、模拟结果和审批记录——扩展价值持续累积，任何单一在位厂商都无法在混合技术栈上重建。
strategicChoices:
  beachhead: >-
    CEE/DACH 地区拥有 100 万至 300 万移动端客户、基于 App 的软令牌身份验证且有 2026–2027 年 EUDI 发行方或依赖方上线计划的中型零售银行，从零售银行账户恢复切换起步。
  wedgeRationale: >-
    账户恢复是最窄的切入点，同时兼具即期欺诈痛点、钱包就绪压力和跨厂商依赖蔓延。相比宽泛的钱包平台销售，它能更快产生验证效果——一家银行可将预算挂钩一段具体的受阻旅程、一个已知上线日期和一份审批材料包。
  sequencingRationale: >-
    先在一套常见银行技术栈上以只读发现、模拟和证明材料生成起步，因为信任壁垒高、银行本身已掌握运行时控制点。在 2–3 次付费切换证明上线审批可以缩短且不需替换在位厂商之后，再加入高价值支付升级验证、持续加密清单监测，以及通过厂商和区域集成商的合作伙伴分发渠道。
  notYet:
    - 消费级钱包分发或银行自有钱包 UX 软件
    - 全行级 IAM 或欺诈平台替换
    - 在只读切换动作可重复之前承接内联交易决策
    - 在银行切口转化之前向 EU 合规身份项目以外扩张
market:
  tam: 基于约 290 家适配 EU 银行、每行年均平台加切换综合支出约 $750k，估算 TAM 为 $217.5M。
  sam: 基于 30 家可触达的 CEE/DACH 及周边首波试点银行、每行年均支出约 $750k，估算 SAM 为 $22.5M。
  som: 基于第 3 年 6 家正式签约银行、每行年均支出约 $750k，估算第 3 年 SOM 为 $4.5M。
  segments:
    - 正在上线 EUDI 发行方或依赖方钱包流程的中型欧洲零售银行
    - 正在扩展基于钱包的开户、登录或支付审批的北欧和中欧试点活跃银行
  buyingProcess: >-
    运营冠军通常是数字身份或身份验证负责人，欺诈、移动银行和钱包项目负责人作为第一段旅程的技术支持方。最干净的路径是将付费切换绑定一段受阻的上线材料包，由 CISO 或首席数字官在安全、风险和数字渠道负责人一致认为当前路径无法快速通过生产审查之后拍板立项。
product:
  mvp: >-
    MVP 应支持从一套常见移动身份验证、钱包、欺诈和签名技术栈进行只读数据采集；为一段账户恢复旅程完成依赖关系图绘制；生成双栈切换方案；运行合成欺诈和回退模拟；并输出含认证声明、注册和后量子清单检查点的审批材料包。整个过程不对凭证进行内联管控，不替换钱包编排软件。
  sixMonth: >-
    在首套常见技术栈上完成 2–3 次付费账户恢复切换，交付依赖关系图、模拟框架和审批材料包模板，并证明从项目启动到审查材料包提交的中位时间不超过 60 天。
  twelveMonth: >-
    将高价值支付升级验证纳入第二段旅程，上线持续加密清单监测和依赖方及认证声明要求的活规则库，并将首批正式上线银行转化为多年期订阅。
  twentyFourMonth: >-
    成为银行侧钱包身份验证切换的系统记录源，覆盖账户恢复、支付审批、登录和开户，再将同一控制层延伸至保险公司或财富管理平台等周边合规身份项目。
  keyBets:
    - 银行批准只读切换和证明材料层的速度，将快过任何新的内联控制平面。
    - 账户恢复赢得预算的速度将快过登录或开户，因为欺诈压力即期且可量化。
    - 一套常见的区域技术栈将出现得足够频繁，让连接器标准化并保持部署的产品化程度。
    - 审批材料包加模拟遥测将创造扩展至第二段旅程和持续加密敏捷性监测的机会。
gtm:
  wedge: >-
    在一个正在运行的钱包或强客户认证项目中，为一段账户恢复旅程销售付费的上线就绪切换包，第一份审批材料包被接受后再扩展至高价值支付升级验证。
  channels:
    - 创始人主导外向销售，面向 CEE/DACH 零售银行的数字身份、身份验证和安全负责人
    - 与已在目标银行内部扎根的移动身份验证、签名和钱包厂商建立集成和转介合作
    - 运营钱包就绪和安全工作坊的区域系统集成商和数字身份咨询公司
  funnelTargets: "目标客户简介→合格共创客户 15–20%；合格共创客户→付费切换 35%+；付费切换→年度平台 60%+；首个正式签约银行→12 个月内第二旅程扩展 50%+。"
  pricing: >-
    以一段旅程的固定付费切换包起步，加上按活跃钱包身份验证旅程和接入身份域计费的年度订阅，因为买方付费是为了清除一个具名上线障碍，再把控制层持续运转。初始工作假设是首次切换 $150k–$250k，首个正式环境 $400k–$600k ARR，合并服务和软件后大致符合研究所得的每行年均 $750k 综合支出。
businessModel:
  revenueStreams:
    - 钱包身份验证切换和证明材料层的年度订阅
    - 每个新上线项目或合规旅程的付费切换包
    - 持续加密敏捷性监测、依赖方策略管控和更多身份域的扩展模块
  unitOfValue: 处于托管切换和证明材料管控下的活跃钱包身份验证旅程
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一家银行内增加第二、第三段旅程，如支付审批、登录和开户
    - 从一个银行实体或国家项目扩展至额外的业务单元和关联身份域
    - 随着钱包合规要求演进，追加持续加密清单监测和规则更新
strategyMap:
  northStarMetric: 已审批并上线的生产钱包身份验证旅程数量——附已接受的证明材料包且无未解决的高风险账户恢复空白
  inputMetrics:
    - 从启动到审批材料包被接受的中位天数
    - 付费切换转化为年度订阅的比率
    - 上线前关键依赖关系完成映射的百分比
    - 上线前修复的高风险账户恢复或升级验证空白数量
    - 正式签约银行内的第二旅程扩展率
  moatsToBuild:
    - 按旅程和厂商归属人跨移动身份验证、钱包、欺诈和签名技术栈的依赖关系图
    - 来自真实银行切换的合成欺诈、回退和上线就绪遥测数据
    - EUDI 合规、认证声明处理和分阶段后量子迁移的可复用审批材料包和规则库
    - 与在位厂商的集成覆盖，让产品成为混合技术栈中立的系统记录源
  killCriteria:
    - 前 20 家目标银行中少于 6 家能在 12 个月内点出一个有预算支持的钱包或 SCA 切换项目。
    - 前 5 个试点中超过 2 个需要 60 天以上或超过 2 个定制连接器才能生成审批材料包。
    - 前 5 次付费切换中少于 3 次转化为 $400k ARR 以上的年度订阅。
    - 后期机会中超过 60% 被在位厂商扩展或系统集成商主导的项目吸收。
  mermaid: |
    flowchart LR
      Wedge[Account-recovery cutover wedge] --> MVP[Read-only dependency map and evidence MVP]
      MVP --> Proof[Approval packet accepted and launch accelerated]
      Proof --> Expansion[More journeys plus recurring crypto-agility control layer]
investorMemo:
  verdict:
    call: 观望
    conviction: 时机和切口清晰度引人注目，但在公司证明具名预算负责人和可重复的 60 天内部署之前，信念度维持中等。
    whyBelieve: 银行已在采购专业身份厂商，且目前没有明显的在位厂商同时拥有跨厂商切换和本计划所针对的证明材料工作流。
    whyDoubt: 基础市场规模偏小，产品可能在独立品类成形之前塌缩为服务业务或在位厂商的附加模块。
    nextDiligence: 确认 3 次付费银行切换，其中审批材料包缩短了上线就绪时间、通过了安全审查，并转化为 $400k+ ARR。
  firstCustomer:
    title: 中型 CEE/DACH 零售银行的数字身份负责人
    profile: 捷克、斯洛伐克或奥地利的零售银行，拥有 100 万至 300 万移动端客户、基于 App 的软令牌身份验证，以及一个 2026–2027 年钱包或数字身份上线计划——该计划已暴露移动端、欺诈和签名系统中脆弱的账户恢复流程。
    trigger: 钱包试点、深度伪造或账户被盗事件激增后的欺诈复盘，或后量子迁移工作流揭示账户恢复无法在现有技术栈上通过生产审查。
    buyer: CISO 或首席数字官
    initialContract: >-
      一段账户恢复旅程的付费切换 $150k–$250k，待银行保持控制层运转并扩展至高价值支付升级验证后，转化为约 $400k–$600k ARR。
  mustBeTrue:
    - 至少半数合格目标银行必须在 12 个月内拥有一个有预算支持、有问责负责人的钱包或 SCA 上线项目。
    - 账户恢复在早期买方发现中必须反复胜出登录、开户或支付审批，成为第一笔付费范围。
    - 产品必须在首套常见技术栈上于 60 天内交付可提交审批的依赖关系图和证据包。
    - 前 5 次付费切换中至少 3 次必须在启动后 9 个月内转化为 $400k ARR 以上的年度订阅。
    - 中立切换层必须在至少 40% 的竞争评估中胜出在位厂商扩展或系统集成商主导的替代方案。
  diligenceQuestions:
    - 在目标客户中，哪段旅程最能持续快速释放预算：账户恢复、支付审批、登录还是开户？
    - 在滩头市场中，究竟谁真正控制钱包身份验证切换的预算：CISO、首席数字官、欺诈负责人还是支付负责人？
    - 前 20 家目标银行中哪些厂商技术栈组合最常见，因而决定了集成的优先顺序？
    - 银行需要哪些证据、模拟输出和治理文件，才会将审批材料包视为上线就绪？
    - 在位厂商和区域集成商能否在利用其装机基础压缩品类之前，转化为分发渠道？
operatingAssumptions:
  - assumption: 若切换绑定一个具名上线材料包而非全行级身份改造，目标银行将为中立切换层买单。
    basis: research.yaml
    validationTest: 从前 15 个合格客户中签下 3 笔付费切换，每笔均有具名买方、有资金支持的范围，以及正在进行的上线或欺诈触发事件。
    decisionImpact: 若不成立，产品必须通过合作伙伴捆绑销售或重新定位为咨询软件，而非独立平台销售。
  - assumption: 账户恢复是滩头市场最佳的第一段旅程。
    basis: idea.yaml
    validationTest: 在前 10 个合格发现周期中，至少 5 位买方在初始付费范围上选择账户恢复，优先于登录、开户或支付审批。
    decisionImpact: 若不成立，产品范围、销售叙述和首套技术栈集成应转向最能快速释放预算的旅程。
  - assumption: 只读部署能在 60 天内在首套常见技术栈上生成可提交审批的材料包。
    basis: research.yaml
    validationTest: 前 5 个试点中有 4 个在 60 天内交付依赖关系图、模拟结果和审批材料包，且每个最多使用 2 个定制连接器。
    decisionImpact: 若不成立，公司将过度依赖服务业务，必须收窄 ICP、缩减连接器范围或在扩张前追加融资。
  - assumption: 买方能接受首次切换 $150k–$250k、正式生产 $400k–$600k ARR 的定价。
    basis: operator judgment
    validationTest: 在目标价格区间内赢下 3 笔付费合同，并在启动后 9 个月内将至少 2 笔转化为年度订阅。
    decisionImpact: 若不成立，SAM、SOM 和资金效率收缩，公司必须降低范围、调整打包方式或增加合作伙伴主导的实施收入。
  - assumption: 跨厂商中立性将足够频繁地胜出在位厂商扩展方案，以支撑一个独立品类。
    basis: research.yaml
    validationTest: 追踪前 10 次竞争评估，要求在与在位厂商或系统集成商主导的替代方案竞争中至少赢得 4 次。
    decisionImpact: 若不成立，最优结果可能是嵌入式分发模式或战略收购路径，而非独立品类创建。
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: 旅程和买方映射访谈
    hypothesis: 滩头市场将呈现一个可重复的触发事件、一个共同的买方委员会，以及一段能持续释放预算的首选旅程。
    successMetric: 完成 15 个目标银行访谈、10 个合格客户，其中 8 个具有具名赞助人以及 12 个月内的上线或欺诈触发事件。
    owner: 创始人/CEO
  - horizon: "0–90 天"
    experiment: 专员依赖关系图试点
    hypothesis: 即使一段账户恢复旅程，也会暴露足够多的未记录厂商依赖关系，足以证明专属切换工作流的必要性。
    successMetric: 3 个共创客户各发现 20 个以上已映射依赖关系，以及至少 1 个此前未知的阻断上线的空白。
    owner: 创始工程师
  - horizon: "90–180 天"
    experiment: 合成欺诈与审批材料包试点
    hypothesis: 安全和风险负责人会将模拟攻击和回退证据视为实质优于基于电子表格的上线审查。
    successMetric: 2 个共创客户接受证据包作为有效的生产审查输入，并在上线前发现至少 1 个已修复的高风险空白。
    owner: 身份安全方案架构师
  - horizon: "90–180 天"
    experiment: 付费切换打包测试
    hypothesis: 银行会在承诺更广泛的年度平台采购之前，先为固定范围的切换包买单。
    successMetric: 在目标价格区间内签下 3 份付费切换合同，并附有明确的转化至年度订阅的条款。
    owner: 创始人/CEO
  - horizon: "6–12 个月"
    experiment: 可重复的 60 天部署
    hypothesis: 首套常见技术栈可以被充分产品化，将部署时间保持在较短范围内同时维护毛利率。
    successMetric: 前 5 个试点中有 4 个在 60 天内完成可提交审批的材料包，且每个最多使用 2 个定制连接器。
    owner: 集成工程师
  - horizon: "12–18 个月"
    experiment: 合作伙伴来源的上线动作
    hypothesis: 移动身份验证厂商和区域集成商能获取合格的付费切换客户，且转化率不显著低于创始人主导的交易。
    successMetric: 25% 的合格管道来自 2 个活跃合作伙伴，合作伙伴来源的付费切换转化为正式环境的比率达到 50% 或以上。
    owner: 渠道合作负责人
operations:
  - 维护一份带版本的依赖关系图，关联每段旅程、每个厂商、管控空白、回退路径和负责人。
  - 维护一份活规则库，涵盖依赖方注册、认证声明处理、远程入网要求和分阶段后量子清单工作。
  - 生成不可篡改的证据包，包含模拟日志、修复状态和安全、风险及上线治理的审核节点。
  - 在承接任何内联编排之前，标准化只读连接器模板和客户数据处理管控。
  - 围绕通用技术栈手册和联合上线检查清单管理厂商和系统集成商合作伙伴，避免一次性定制项目。
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 直到销售动作自主运转之前，全程负责买方发现、创始人主导的银行销售、定价和上线审批叙述。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 在选定的银行技术栈上搭建依赖关系图、模拟框架、证据生成器和首批集成。
  - role: 身份安全方案架构师
    startTiming: Month 2
    rationale: 将早期试点转化为可重复的审批材料包、部署手册和客户侧管控映射，加速安全审查通过。
  - role: 集成工程师
    startTiming: Month 4
    rationale: 将连接移动身份验证、欺诈、签名和钱包厂商的连接器产品化，让部署不再依赖创始人编写的脚本。
  - role: 第二平台工程师
    startTiming: Month 7
    rationale: 强化年度订阅和第二旅程扩展所需的遥测、规则更新和持续监测模块。
  - role: 渠道合作负责人
    startTiming: Month 10
    rationale: 仅在首批付费切换证明可重复的银行动作和对在位厂商的清晰补充定位之后，才启动合作伙伴来源的管道。
milestones:
  - horizon: "0–12 个月"
    items:
      - 与 CEE/DACH 中型银行签下 3 笔付费切换。
      - 在首套常见技术栈上于 60 天内交付第一份可提交审批的账户恢复材料包。
      - 将至少 2 笔付费切换转化为年度订阅，并将 1 家银行扩展至高价值支付升级验证。
      - 发布首份涵盖依赖方、认证声明和后量子清单要求的规则库。
  - horizon: "12–24 个月"
    items:
      - 达到 4–5 个正式签约银行，其中至少 2 个来自合作伙伴来源的部署。
      - 新增持续加密清单监测，并支持第二、第三段钱包身份验证旅程。
      - 随着部署规模扩大，将从启动到审批材料包的中位时间保持在 60 天以内。
  - horizon: "24–36 个月"
    items:
      - 达到 6 家正式签约银行，实现建模的第 3 年 SOM。
      - 将至少一半的正式签约银行扩展至第二段旅程或更多身份域。
      - 仅在银行部署手册和合作伙伴动作可重复之后，才进入一个相邻的合规细分市场。
risks:
  - risk: 钱包部署时间因国家或银行而推迟，削弱仅靠合规驱动的紧迫性叙述。
    likelihood: Medium
    impact: High
    mitigation: 以防欺诈账户恢复和更快审批作为第一 ROI 来销售，优先考虑已有立项上线计划的银行。
  - risk: 在位身份验证厂商或系统集成商将切换范围纳入现有项目的扩展声明。
    likelihood: High
    impact: High
    mitigation: 定位为中立的混合技术栈证明材料层，证明在一段旅程上更快完成审批，并尽可能将最强的在位厂商转化为渠道合作伙伴。
  - risk: 集成和安全审查摩擦使部署过于缓慢或过于定制化，不符合种子期经济模型。
    likelihood: Medium
    impact: High
    mitigation: 从只读起步，缩窄首套技术栈，标准化连接器，并在核心动作可重复之前拒绝定制内联管控工作。
  - risk: 预算归属分散在 CISO、数字、欺诈和支付团队之间，拉长销售周期。
    likelihood: High
    impact: Medium
    mitigation: 在进入采购流程之前，将每笔销售锚定在一段具名旅程、一份审批材料包和一位问责负责人上。
  - risk: 若扩张无法快速落地，基础银行切口规模过小，难以支撑风险投资回报。
    likelihood: Medium
    impact: High
    mitigation: 在加大消耗或扩大地域之前，在首批正式签约银行中追踪第二旅程扩展和持续监测采用情况。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5-3.5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    资金支持 18 个月，目标是赢得 3 笔付费银行切换，将至少 2 笔转化为年度订阅，在一套常见技术栈上产品化可重复的 60 天审批材料包部署，并建立首批厂商和系统集成商分发渠道。
