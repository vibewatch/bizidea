scenarios:
  downside:
    description: Wallet-auth programs convert more slowly and banks stay longer in recovery-only scope,
      leaving the company at 5 live banks by Y3 exit with lower ARPU and weaker delivery leverage.
    y3RevenueK: 3201.65
    y3EbitdaK: -592.17
    cashLowPointK: -65.72
    keyAssumptionChanges:
    - Y1 exits with 2 paid banks, Y2 with 4 production logos, and Y3 with 5 live banks instead of 6.
    - Blended annual revenue per bank-year falls from $720K to $680K because fewer banks expand beyond
      account recovery.
    - Gross margin slips from 70% to 68% because connector and evidence-packet work stays more manual.
  base:
    description: The base case converts the first paid cutovers into a 5-logo production footprint by
      Y2 exit, then adds a sixth live bank and first meaningful second-journey expansion in Y3.
    y3RevenueK: 4110.0
    y3EbitdaK: 33.29
    cashLowPointK: 1211.65
    keyAssumptionChanges:
    - Customer counts follow A6-A8, reaching 3 paid banks by Y1 exit, 5 production logos by Y2 exit, and
      6 live banks by Y3 exit.
    - Blended annual revenue per active bank-year stays at A4's $720K while gross margin stays at A9's
      70% target.
    - Hiring follows A21, keeping the team at 10 FTE by Y3 exit and delaying the first true sales hire
      until after the partner motion is established.
  upside:
    description: Reference customers and partner referrals pull one extra bank forward, lift blended scope
      per bank, and let the company reuse more of the common stack.
    y3RevenueK: 5098.31
    y3EbitdaK: 697.98
    cashLowPointK: 1729.38
    keyAssumptionChanges:
    - Y2 exits with 6 production logos and Y3 exits with 7 live banks as partner referrals pull deals
      forward.
    - Blended annual revenue per bank-year rises from $720K to $760K as payment step-up and monitoring
      attach faster.
    - Gross margin improves from 70% to 71% because common-stack connectors and rules libraries are reused
      more often.
sensitivity:
- variable: ARPU
  downsideCase: Blended annual bank-year revenue settles at $680K because buyers hold the company at recovery-only
    scope for longer.
  baseCase: Blended annual bank-year revenue stays at $720K as half of production banks add a second journey
    or monitoring by Y3.
  upsideCase: Blended annual bank-year revenue reaches about $760K as step-up and monitoring attach earlier.
  y3RevenueImpactK: -228.34
  cashImpactK: -284.07
- variable: CAC
  downsideCase: Effective CAC rises as S&M intensity climbs about 1.5 points of revenue from heavier bank
    travel, workshops, and risk-review handholding.
  baseCase: Modeled CAC stays near $438K per new production logo in a founder-led plus partner-assisted
    motion.
  upsideCase: S&M intensity falls about 1 point of revenue as partner introductions warm up the pipeline.
  y3RevenueImpactK: 0.0
  cashImpactK: -117.0
- variable: churn
  downsideCase: Retention behaves like the company exits Y3 with 5 live banks instead of 6 because one
    early logo stalls before broader expansion.
  baseCase: The base path assumes 1.5% monthly churn while still reaching 6 live banks by Y3 exit.
  upsideCase: Retention and expansion behave like the company exits Y3 with 7 live banks because the first
    logos embed the workflow into launch governance.
  y3RevenueImpactK: -510.0
  cashImpactK: -310.25
- variable: sales cycle
  downsideCase: A quarter of extra security review and procurement slippage pushes each major logo inflection
    back by roughly one quarter.
  baseCase: Paid cutovers still convert on the plan's timeline once the first common stack is proven and
    the approval packet lands inside 60 days.
  upsideCase: Reference accounts and partner intros pull one bank forward by roughly a quarter in both
    Y2 and Y3.
  y3RevenueImpactK: -60.0
  cashImpactK: -222.3
- variable: gross margin
  downsideCase: Gross margin stays at 68% because approval packets, integrations, and governance work
    remain too manual.
  baseCase: Gross margin stays at the 70% business-plan target.
  upsideCase: Gross margin reaches 72% as more of the connector and rules-library work is reused across
    banks.
  y3RevenueImpactK: 0.0
  cashImpactK: -156.0
- variable: hiring pace
  downsideCase: Product, deployment, compliance, and AE hiring all pull forward by about 6 months because
    delivery stays too bespoke.
  baseCase: Hiring follows A21 and waits for evidence that the common stack and partner motion are repeatable.
  upsideCase: Compliance and AE hiring can both slip about one quarter without hurting delivery because
    the first stack stays templated.
  y3RevenueImpactK: 0.0
  cashImpactK: -335.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetBanks --> PaidCutovers
      PaidCutovers --> ProductionBanks
      ProductionBanks --> ExpansionJourneys
      ProductionBanks --> Revenue
      ExpansionJourneys --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from moving from 3 paid banks at Y1 exit to 5 production logos at Y2
    exit and 6 live banks at Y3 exit at about $720K of blended annual spend per bank-year.
- checkName: Must go right
  finding: The company has to keep the first common-stack deployments near the 60-day target so it can
    reach 5 production logos before adding much more delivery headcount.
- checkName: Model breaks if
  finding: If the business slips toward the downside case of 5 Y3 banks, $680K ARPU, and 68% gross margin,
    cash turns slightly negative before the next round.
- checkName: Next-round proof
  finding: The seed narrative is credible once 5 production logos, 2 partner-sourced deployments, and
    the first payment step-up expansion are live with a visible cash buffer still on the balance sheet.
sanityChecks:
  ruleOf40: Y3 growth 45.74% + EBITDA margin 0.81% = 46.55%.
  burnMultiple: About 0.3x in Y2 on roughly $1440.0K of net new ARR; Y3 burn multiple turns slightly negative
    as EBITDA turns positive while adding about $720.0K of net new ARR.
  revenuePerFte: $411.0K Y3 revenue per end-of-year FTE (roughly on the high end of a $200-400K early
    enterprise SaaS benchmark).
  flags:
  - The base case still concentrates more than $4.1M of Y3 revenue into only 6 bank customers, so one
    delayed expansion or non-renewal matters a lot.
  - CAC is high at about $438K per new production logo because founder-led bank sales, partner enablement,
    and procurement overhead remain heavy.
  - Gross margin only holds at 70% if connector reuse and approval-packet templating prevent the company
    from drifting into bespoke services work.
  - The funding ask is only at the low end of the business-plan range, and the downside case still turns
    cash slightly negative before the next round.
