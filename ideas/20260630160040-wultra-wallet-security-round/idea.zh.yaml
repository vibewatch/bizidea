jobsToBeDone:
  - job: >-
      当银行准备 EUDI 钱包或数字身份上线时，帮助身份负责人看清账户恢复、设备绑定和签名中的每个依赖关系，让团队能审批一次安全的生产切换，而不是在跨厂商电子表格中疲于应付。
    currentAlternative: 项目管理电子表格加厂商研讨会和集成文档
    successMetric: 从钱包项目启动到上线审批通过的周数
  - job: >-
      当欺诈或安全负责人担心深度伪造驱动的账户恢复攻击会利用新钱包流程时，帮助他们在上线前测试升级验证和账户恢复管控，在不拖慢部署进度的前提下收窄攻击面。
    currentAlternative: 手工桌面演练、单点厂商演示和上线后的规则调整
    successMetric: 减少高风险账户恢复例外情况，以及安全审查中阻断上线的发现数量
