problem: >-
  中型欧洲银行被迫在三重压力同时汇聚时，同步升级身份验证、设备绑定和账户恢复流程：EUDI 钱包部署、AI 生成身份欺诈和后量子迁移。这些流程通常分散在移动银行团队、欺诈运营、IAM 厂商、HSM 供应商和外部集成商之间，没有一方掌握完整的切换路径或上线审批所需的全部证明材料。结果是钱包项目进展迟缓、账户恢复流程脆弱，以及在诈骗分子最先锁定的关键客户节点上出现高风险的手工临时方案。
targetUser:
  primary: >-
    中型欧洲零售银行中负责数字身份和身份验证的部门负责人——这些银行正在为开户、账户恢复或高价值交易审批部署 EUDI 钱包支持
  secondary: >-
    负责设备绑定、升级验证和账户恢复策略的欺诈、移动银行和钱包项目团队
  buyer: 首席数字官或 CISO
startupThesis:
  nonObviousInsight: >-
    制胜切口既不是另一款消费级钱包，也不是纯密码学 SDK。EUDI 部署迫使银行重新打开身份技术栈中最难处理的接缝——签发方身份验证、设备绑定、账户恢复和厂商交接——偏偏这时 AI 欺诈和后量子时间表让这些接缝变得危险。能拿下切换和证明材料层的初创公司，将成为每一次未来身份升级的系统记录源。
  beachhead: >-
    拥有 100 万至 500 万数字客户、基于 App 的软令牌身份验证，且在 2026–2027 年有 EUDI 钱包发行方或依赖方上线计划的中型欧洲零售银行，从账户恢复和高价值支付升级验证切入
  wedge: >-
    一套钱包身份验证切换工作流——清点开户、设备绑定和账户恢复中每个厂商依赖和密码算法依赖，再交付双栈切换方案，包含后量子就绪的升级验证策略、攻击测试框架和上线审批所需的审计证明材料
  whyNowCatalyst: >-
    Wultra 的融资表明银行已在为钱包能力买单，因为 EUDI 部署、AI 驱动的身份欺诈和后量子迁移时间表正在同步汇聚。
  ventureScalePath: >-
    从零售银行的 EUDI 钱包上线项目起步，逐步扩展至持续加密敏捷性监测、依赖方策略管控、账户恢复风险编排，以及面向保险公司、电信运营商、财富管理平台和准政府服务的合规数字身份基础设施。
solution: >-
  产品接入银行的移动身份验证技术栈、身份核实厂商、HSM 或签名基础设施、欺诈引擎和钱包项目待办清单，梳理每一个会拖慢或阻断钱包上线的环节。针对具体旅程——开户、账户恢复和高价值支付升级验证——生成切换方案，明确哪些组件在上线前需要后量子安全签名、更强的设备绑定或不同的升级逻辑。团队获得一个测试框架，能将合成欺诈和账户恢复场景回放至拟议的钱包流程，并为安全、风险和监管审查生成证据包。第一个版本的价值在于：把数个月的跨厂商排查和手工项目管理，压缩成针对一家银行、一段旅程的可直接提交审批的方案。长期来看，公司成为银行每次新增钱包凭证、依赖方或密码标准时都会调用的控制层。
goToMarketSeed:
  firstCustomer: >-
    捷克、斯洛伐克或奥地利的零售银行，拥有 100 万至 300 万移动端客户，现有基于 App 的软令牌登录，并已立项 EUDI 钱包或数字身份项目，聚焦零售账户恢复和高价值交易审批
  buyingTrigger: >-
    2026–2027 年 EUDI 钱包试点、深度伪造或账户被盗事件激增后的安全复盘，或董事会批准的后量子迁移项目暴露了脆弱的账户恢复和签名依赖
  currentAlternative: >-
    内部项目管理、现有 MFA 和移动银行厂商、系统集成商项目，以及拼凑安全、欺诈和数字渠道团队的电子表格合规矩阵
  switchingReason: >-
    这个切口能快速定位跨厂商的断裂点，证明哪些流程需要更强的密码算法或账户恢复管控，并打包出在位单点厂商和重咨询项目都无法提供的上线证明材料
  pricingHypothesis: >-
    按活跃钱包身份验证旅程和接入的身份域计费的年度平台订阅，加上每次上线项目的付费切换包
