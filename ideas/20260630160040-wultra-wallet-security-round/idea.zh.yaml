topRisks:
  - name: 监管时间表偏移
    description: 各国钱包部署日期可能推迟，若产品仅依赖合规截止日期，销售周期将被拉长。
    mitigation: 优先找到已有立项上线计划的银行，先以防欺诈账户恢复和快速审批作为第一 ROI，而非单纯靠合规驱动。
  - name: 在位厂商与集成商挤压
    description: 现有身份验证厂商或系统集成商可能声称能将现有项目扩展以覆盖相同工作流。
    mitigation: 定位为补充在位厂商的跨厂商切换和证明材料层，通过在混合技术栈上缩短上线时间来证明价值。
  - name: 集成风险
    description: 触及身份和账户恢复基础设施，可能让年轻初创公司面临漫长的部署周期和高信任壁垒。
    mitigation: 以只读发现、测试和证明材料生成起步，完成一段旅程的验证，再承接内联编排或凭证敏感管控。
