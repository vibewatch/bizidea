jobsToBeDone:
  - job: >-
      When a bank is preparing an EUDI wallet or digital-ID launch, help the
      identity lead see every recovery, device-binding, and signing dependency,
      so the team can approve one safe production cutover instead of juggling
      cross-vendor spreadsheets.
    currentAlternative: Program-management spreadsheets plus vendor workshops and integration documents
    successMetric: Weeks from wallet project kickoff to launch approval
  - job: >-
      When fraud or security leaders worry that deepfake-driven account
      recovery attacks will exploit new wallet flows, help them test step-up
      and recovery controls before launch, so they can reduce attack surface
      without stalling the rollout.
    currentAlternative: Manual tabletop exercises, point-vendor demos, and post-launch rule tuning
    successMetric: Reduced high-risk recovery exceptions and fewer launch-blocking findings in security review
