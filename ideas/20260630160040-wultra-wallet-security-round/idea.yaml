  signalStrength:
    score: 4
    rationale: Two same-day sources and a concrete funding round create a credible signal, though the evidence base is smaller than categories with broader independent coverage.
  painIntensity:
    score: 4
    rationale: Fraud, compliance timing, and brittle recovery flows make wallet and authentication cutovers materially painful for bank teams that have to ship safely.
  wedgeClarity:
    score: 5
    rationale: One bank, one wallet journey, and one cutover workflow make the entry product highly specific and directly researchable.
  defensibility:
