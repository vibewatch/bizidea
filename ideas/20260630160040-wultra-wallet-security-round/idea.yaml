topRisks:
  - name: Regulatory timing drift
    description: Country-by-country wallet rollout dates may slip, stretching sales cycles if the product depends only on compliance deadlines.
    mitigation: Start with banks that already have funded launch programs and sell fraud-safe recovery plus faster approval as the first ROI, not compliance alone.
  - name: Incumbent and integrator squeeze
    description: Existing authentication vendors or systems integrators may claim they can extend current projects to cover the same workflow.
    mitigation: Position as the cross-vendor cutover and evidence layer that complements incumbents, and prove value by reducing launch time across mixed stacks they do not unify.
  - name: Integration liability
    description: Touching identity and recovery infrastructure can create long deployments and high trust barriers for a young startup.
    mitigation: Launch with read-only discovery, testing, and evidence generation for one journey before taking on inline orchestration or credential-sensitive controls.
