problem: >-
  Mid-tier European banks are being forced to modernize authentication, device
  binding, and recovery flows at the same time three pressures collide: EUDI
  wallet rollout, AI-generated identity fraud, and post-quantum migration.
  Those flows are usually split across mobile banking teams, fraud ops, IAM
  vendors, HSM providers, and outside integrators, so nobody owns the full
  cutover path or the evidence needed for audit and launch approval. The result
  is slow wallet programs, brittle recovery journeys, and high-risk manual
  workarounds in exactly the customer moments fraudsters target first.
targetUser:
  primary: >-
    Heads of digital identity and authentication at mid-tier European retail
    banks rolling out EUDI wallet support for onboarding, account recovery, or
    high-value transaction approval
  secondary: >-
    Fraud, mobile-banking, and wallet-program teams responsible for device
    binding, step-up authentication, and recovery policy
  buyer: Chief digital officer or CISO
startupThesis:
  nonObviousInsight: >-
    The winning wedge is not another consumer wallet or a pure cryptography
    SDK. EUDI rollout forces banks to reopen the ugliest seams in their
    identity stack—issuer authentication, device binding, recovery, and vendor
    handoffs—exactly when AI fraud and post-quantum timelines make those seams
    dangerous. A startup that owns the cutover and evidence layer can become
    the system of record for every future identity upgrade.
  beachhead: >-
    Mid-tier European retail banks with 1-5 million digital customers,
    app-based soft-token authentication, and a 2026-2027 EUDI wallet issuer or
    relying-party launch, starting with account recovery and high-value payment
    step-up
  wedge: >-
    A wallet-auth cutover workflow that inventories every vendor and crypto
    dependency in onboarding, device binding, and recovery, then ships a
    dual-stack rollout plan with PQ-ready step-up policies, attack-test
    harnesses, and audit evidence for launch approval
  whyNowCatalyst: >-
    Wultra's round shows banks are already funding wallet capability because
    EUDI rollout, AI-enabled identity fraud, and post-quantum migration
    timelines are colliding now.
  ventureScalePath: >-
    Start with EUDI wallet launch programs at retail banks, then expand into
    continuous crypto-agility monitoring, relying-party policy controls,
    recovery-risk orchestration, and regulated digital-identity infrastructure
    for insurers, telcos, wealth platforms, and government-adjacent services.
solution: >-
  The product connects to a bank's mobile-auth stack, identity-proofing
  vendors, HSM or signing infrastructure, fraud engine, and wallet program
  backlog to map every step that will break or slow down a wallet launch. It
  creates a cutover plan for specific journeys—onboarding, account recovery,
  and high-value payment step-up—showing which components need PQ-safe signing,
  stronger device binding, or different escalation logic before launch. Teams
  get a test harness that replays synthetic fraud and recovery scenarios
  against proposed wallet flows and produces evidence packs for security, risk,
  and regulator-facing review. The first release wins by compressing months of
  cross-vendor discovery and manual project management into a single
  approval-ready program for one bank and one journey. Over time, the company
  becomes the control layer banks use whenever they add new wallet credentials,
  relying parties, or cryptographic standards.
goToMarketSeed:
  firstCustomer: >-
    A Czech, Slovak, or Austrian retail bank with 1-3 million mobile
    customers, existing app-based soft-token login, and a funded EUDI wallet
    or digital-ID program focused on retail account recovery and high-value
    transaction approval
  buyingTrigger: >-
    A 2026-2027 EUDI wallet pilot, a security review after a deepfake or
    account-takeover spike, or a board-approved post-quantum migration program
    that exposes brittle recovery and signing dependencies
  currentAlternative: >-
    Internal program management, incumbent MFA and mobile-banking vendors,
    systems-integrator projects, and spreadsheet compliance matrices stitched
    across security, fraud, and digital-channel teams
  switchingReason: >-
    This wedge finds cross-vendor breakpoints fast, proves which flows need
    stronger cryptography or recovery controls, and produces launch evidence
    that incumbent point vendors and consulting-heavy programs do not package
    into one operating layer
  pricingHypothesis: >-
    Annual platform subscription priced by active wallet-auth journeys and
    connected identity domains, plus paid cutover packages for each launch
    program
