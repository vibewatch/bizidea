slug: wallet-auth-cutover-os
date: "2026-06-30"
executiveSummary: >-
  Wallet Auth Cutover OS should launch as a bank-side cutover and evidence layer
  for EUDI-related authentication changes, not as another consumer wallet, MFA
  app, or cryptography SDK. The first customer is a Czech, Slovak, or Austrian
  retail bank with 1-3 million mobile customers, existing app-based soft-token
  authentication, and a funded 2026-2027 wallet or digital-ID program. Budget is
  most likely to release when a wallet pilot, a fraud review after a deepfake or
  account-takeover spike, or a board-level post-quantum workstream exposes
  cross-vendor dependencies across mobile auth, fraud, IAM, and signing
  systems. The initial product should stay read-only and focus on one
  journey—account recovery first, with high-value payment step-up as the
  immediate expansion path—by mapping dependencies, simulating attack and
  fallback paths, and generating an approval packet for risk and security
  sign-off. Research supports real urgency and specialist-software spend, but
  the modeled base market is still narrow at about $217.5M TAM, $22.5M SAM, and
  $4.5M year-3 SOM before adjacent expansion. The best scale path is to turn
  each launch packet into recurring crypto-agility monitoring, relying-party
  policy controls, and additional wallet-auth journeys inside the same bank. The
  biggest disconfirming risks are regulatory timing drift, incumbent or
  integrator compression, and whether banks will fund a neutral cutover layer
  instead of extending existing programs. Public inputs do not identify named
  target banks, exact budget owners, or whether recovery reliably beats payment
  approval as the first paid journey, so the first 6-9 months must prove buyer
  ownership, deployment speed, and paid cutover conversion.
problem:
  - Mid-tier European banks must change wallet onboarding, recovery, device binding, and step-up authentication while EUDI rollout, deepfake fraud, and post-quantum migration all hit the same stack.
  - Those changes span mobile-banking teams, IAM, fraud ops, HSM or signing vendors, wallet providers, and integrators, so banks lack a single workflow that finds breakpoints, sequences the cutover, and produces audit-ready launch evidence.
solution:
  - Connect read-only to the bank's mobile-auth, fraud, wallet, and signing stack to build a dependency graph for one named journey, starting with account recovery, and generate a dual-stack cutover plan that shows where stronger device binding, PQ-safe signing, or fallback logic is required.
  - Replay synthetic fraud and recovery scenarios against the planned journey and package the results into an approval packet for security, risk, compliance, and launch stakeholders so the bank can approve production without replacing incumbent systems.
whyWeWin:
  - The company owns the neutral cross-vendor cutover and evidence layer that wallet vendors, MFA providers, fraud tools, and consultants do not leave behind today.
  - The first deal is attached to a named launch program and one approval packet, which is a faster proof point than asking banks to buy a bank-wide identity transformation upfront.
  - Each deployment compounds a reusable graph of dependencies, control gaps, simulation outcomes, and approval artifacts that improves expansion and is hard for any single incumbent to recreate across mixed stacks.
strategicChoices:
  beachhead: >-
    Mid-tier retail banks in CEE/DACH with 1-3 million mobile customers,
    app-based soft-token authentication, and a funded 2026-2027 EUDI issuer or
    relying-party launch, beginning with account-recovery cutover for retail
    banking journeys.
  wedgeRationale: >-
    Account recovery is the narrowest entry point that combines immediate fraud
    pain, wallet-readiness pressure, and cross-vendor dependency sprawl. It
    creates faster proof than a broad wallet platform sale because one bank can
    tie budget to a concrete blocked journey, a known launch date, and a single
    approval packet.
  sequencingRationale: >-
    Start with read-only discovery, simulation, and evidence generation on one
    common bank stack because trust barriers are high and banks already own the
    runtime control points. After 2-3 paid cutovers prove that launch approval
    can be shortened without replacing incumbents, add high-value payment
    step-up, continuous crypto-inventory monitoring, and partner-led
    distribution through vendors and regional integrators.
  notYet:
    - Consumer wallet distribution or bank-issued wallet UX software
    - Full bank-wide IAM or fraud-platform replacement
    - Inline transaction decisioning before the read-only cutover motion is repeatable
    - Expansion outside EU-regulated identity programs before the bank wedge converts
market:
  tam: Estimated $217.5M TAM based on roughly 290 fit EU banks at about $750k blended annual platform-plus-cutover spend.
  sam: Estimated $22.5M SAM based on 30 reachable CEE/DACH and adjacent first-wave pilot banks at about $750k annual spend.
  som: Estimated $4.5M year-3 SOM based on 6 live bank customers at about $750k annual spend per bank-year.
  segments:
    - Mid-tier European retail banks launching EUDI issuer or relying-party wallet flows
    - Pilot-active Northern and Central European banks extending wallet-based account opening, login, or payment approval
  buyingProcess: >-
    The operational champion is usually the head of digital identity or
    authentication, with fraud, mobile-banking, and wallet-program leads as the
    technical sponsors for the first journey. The cleanest motion is a paid
    cutover tied to one blocked launch packet, funded by a CISO or chief digital
    officer once security, risk, and digital-channel stakeholders agree that the
    current path cannot clear production review quickly enough.
product:
  mvp: >-
    MVP should support read-only ingestion from one common mobile-auth, wallet,
    fraud, and signing stack; dependency mapping for one account-recovery
    journey; a dual-stack cutover plan; synthetic fraud and fallback simulation;
    and an approval packet that includes attestation, registration, and
    post-quantum inventory checkpoints. It should deliver approval-ready output
    without taking inline control of credentials or replacing wallet
    orchestration software.
  sixMonth: >-
    Complete 2-3 paid recovery cutovers on the first common stack, ship the
    dependency graph, simulation harness, and approval-packet template, and
    prove that the median kickoff-to-review packet stays at or below 60 days.
  twelveMonth: >-
    Add high-value payment step-up as the second journey, launch continuous
    crypto-inventory monitoring and a living rules library for relying-party and
    attestation requirements, and convert the first production banks into
    multi-year subscriptions.
  twentyFourMonth: >-
    Become the bank-side system of record for wallet-auth cutovers across
    recovery, payment approval, login, and onboarding, then extend the same
    control layer into adjacent regulated identity programs such as insurers or
    wealth platforms.
  keyBets:
    - Banks will approve a read-only cutover and evidence layer faster than any new inline control plane.
    - Account recovery will win budget faster than login or account opening because fraud pressure is immediate and measurable.
    - One common regional stack will appear often enough to standardize connectors and keep deployments productizable.
    - Approval packets plus simulation telemetry will create expansion into second journeys and recurring crypto-agility monitoring.
gtm:
  wedge: >-
    Sell a paid launch-readiness cutover for one account-recovery journey inside
    a live wallet or strong-customer-authentication program, then expand to
    high-value payment step-up once the first approval packet is accepted.
  channels:
    - Founder-led outbound to heads of digital identity, authentication, and security at CEE/DACH retail banks
    - Integration and referral partnerships with mobile-auth, signing, and wallet vendors already embedded in target banks
    - Regional systems integrators and digital-identity consultancies that run wallet-readiness and security workshops
  funnelTargets: "Target-account intro→qualified design partner 15-20%, qualified design partner→paid cutover 35%+, paid cutover→annual platform 60%+, first production logo→second-journey expansion within 12 months 50%+."
  pricing: >-
    Start with a fixed paid cutover package for one journey plus an annual
    subscription priced by active wallet-auth journeys and connected identity
    domains, because the buyer is paying to clear a named launch and then keep
    the control layer live. Initial working assumption is $150k-$250k for the
    first cutover and $400k-$600k ARR for the first production environment,
    which roughly matches the researched $750k blended bank-year spend once
    services and software are combined.
businessModel:
  revenueStreams:
    - Annual subscription for the wallet-auth cutover and evidence layer
    - Paid cutover packages for each new launch program or regulated journey
    - Expansion modules for continuous crypto-agility monitoring, relying-party policy control, and additional identity domains
  unitOfValue: Active wallet-auth journey under managed cutover and evidence control
  targetGrossMarginPct: 70
  expansionLevers:
    - Add second and third journeys such as payment approval, login, and onboarding inside the same bank
    - Expand from one bank entity or country program to additional business units and connected identity domains
    - Upsell continuous crypto-inventory monitoring and rules updates as wallet obligations evolve
strategyMap:
  northStarMetric: Production wallet-auth journeys approved and launched with an accepted evidence packet and no unresolved high-risk recovery gaps
  inputMetrics:
    - Median days from kickoff to approval-packet acceptance
    - Paid cutover to annual subscription conversion rate
    - Percentage of critical dependencies mapped before launch
    - Number of high-risk recovery or step-up gaps fixed before go-live
    - Second-journey expansion rate inside production banks
  moatsToBuild:
    - Dependency graph across mobile auth, wallet, fraud, and signing stacks by journey and vendor owner
    - Synthetic fraud, fallback, and launch-readiness telemetry from real bank cutovers
    - Reusable approval packets and rules libraries for EUDI, attestation handling, and phased PQ migration
    - Integration footprint with incumbent vendors that makes the product the neutral system of record across mixed stacks
  killCriteria:
    - Fewer than 6 of the first 20 target banks can name a funded wallet or SCA cutover inside 12 months.
    - More than 2 of the first 5 pilots require over 60 days or more than 2 bespoke connectors to produce an approval packet.
    - Fewer than 3 of the first 5 paid cutovers convert to annual subscriptions above $400k ARR.
    - More than 60% of late-stage opportunities are absorbed by incumbent vendor extensions or SI-led projects.
  mermaid: |
    flowchart LR
      Wedge[Account-recovery cutover wedge] --> MVP[Read-only dependency map and evidence MVP]
      MVP --> Proof[Approval packet accepted and launch accelerated]
      Proof --> Expansion[More journeys plus recurring crypto-agility control layer]
investorMemo:
  verdict:
    call: Watch
    conviction: Compelling timing and wedge clarity, but conviction stays moderate until the company proves a named budget owner and repeatable sub-60-day deployments.
    whyBelieve: Banks already buy specialist identity vendors, and no obvious incumbent owns the cross-vendor cutover plus evidence workflow this plan targets.
    whyDoubt: The base market is modest and the product can collapse into services work or incumbent add-ons before a durable standalone category forms.
    nextDiligence: Confirm 3 paid bank cutovers where the approval packet shortens launch readiness, survives security review, and converts to $400k+ ARR.
  firstCustomer:
    title: Head of Digital Identity at a mid-tier CEE/DACH retail bank
    profile: A Czech, Slovak, or Austrian retail bank with 1-3 million mobile customers, app-based soft-token authentication, and a funded 2026-2027 wallet or digital-ID launch that exposes brittle recovery flows across mobile, fraud, and signing systems.
    trigger: A wallet pilot, fraud review after a deepfake or account-takeover spike, or post-quantum migration workstream reveals that account recovery cannot clear production review on the current stack.
    buyer: CISO or Chief Digital Officer
    initialContract: >-
      $150k-$250k paid cutover for one account-recovery journey, converting to
      roughly $400k-$600k ARR once the bank keeps the control layer live and
      expands into high-value payment step-up.
  mustBeTrue:
    - At least half of qualified target banks must have a named wallet or SCA launch with budget and an accountable sponsor inside 12 months.
    - Account recovery must repeatedly win the first paid scope over login, account opening, or payment approval in early buyer discovery.
    - The product must deliver an approval-ready dependency map and evidence packet in 60 days or less on the first common stack.
    - At least 3 of the first 5 paid cutovers must convert to annual subscriptions above $400k ARR.
    - The neutral cutover layer must beat incumbent-vendor or SI-led alternatives in at least 40% of competitive evaluations.
  diligenceQuestions:
    - Which first journey consistently releases budget fastest in target accounts: account recovery, payment approval, login, or onboarding?
    - Which executive actually controls the budget for wallet-auth cutover in the beachhead: CISO, chief digital officer, fraud lead, or payments owner?
    - Which vendor stack combinations dominate the first 20 target banks and therefore determine integration order?
    - What evidence, simulation output, and governance artifacts are required for a bank to treat the approval packet as launch-ready?
    - Can incumbent vendors and regional integrators be turned into channels before they use their installed base to compress the category?
operatingAssumptions:
  - assumption: Target banks will fund a neutral cutover layer if it is tied to one named launch packet rather than a bank-wide transformation.
    basis: research.yaml
    validationTest: Close 3 paid cutovers from the first 15 qualified accounts, each with a named buyer, funded scope, and live launch or fraud trigger.
    decisionImpact: If false, the product must be bundled through partners or repositioned as advisory software instead of a standalone platform sale.
  - assumption: Account recovery is the best first journey for the beachhead.
    basis: idea.yaml
    validationTest: In the first 10 qualified discovery cycles, at least 5 buyers choose recovery ahead of login, onboarding, or payment approval for the initial paid scope.
    decisionImpact: If false, product scope, sales narrative, and first-stack integrations should shift toward whichever journey releases budget fastest.
  - assumption: A read-only deployment can produce an approval-ready packet in 60 days or less on the first common stack.
    basis: research.yaml
    validationTest: 4 of the first 5 pilots deliver the dependency map, simulation results, and approval packet within 60 days while requiring no more than 2 bespoke connectors each.
    decisionImpact: If false, the company becomes too services-heavy and must narrow the ICP, reduce connector scope, or raise more capital before scaling.
  - assumption: Buyers will accept pricing of $150k-$250k for the first cutover and $400k-$600k ARR for production.
    basis: operator judgment
    validationTest: Win 3 paid scopes in the target range and convert at least 2 to annual subscriptions within 9 months of kickoff.
    decisionImpact: If false, SAM, SOM, and funding efficiency compress, so the company must lower scope, change packaging, or add partner-led implementation revenue.
  - assumption: Cross-vendor neutrality will beat incumbent extensions often enough to sustain a standalone category.
    basis: research.yaml
    validationTest: Track the first 10 competitive evaluations and require at least 4 wins against incumbent-vendor or SI-led alternatives.
    decisionImpact: If false, the best outcome may be an embedded distribution model or strategic-sale path rather than independent category creation.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: Journey and buyer mapping interviews
    hypothesis: The beachhead will show one repeatable trigger, one common buyer committee, and one first journey that consistently releases budget.
    successMetric: 15 target-bank interviews, 10 qualified accounts, and 8 accounts with a named sponsor plus launch or fraud trigger inside 12 months.
    owner: Founder CEO
  - horizon: "0–90 days"
    experiment: Concierge dependency-map pilot
    hypothesis: Even one recovery journey will expose enough undocumented vendor dependencies to justify a dedicated cutover workflow.
    successMetric: 3 design partners each reveal 20 or more mapped dependencies and at least 1 previously unknown launch-blocking gap.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Synthetic fraud and approval-packet pilot
    hypothesis: Security and risk stakeholders will treat simulated attack and fallback evidence as materially better than spreadsheet-based launch reviews.
    successMetric: 2 design partners accept the evidence packet as a valid production-review input and identify at least 1 remediated high-risk gap before go-live.
    owner: Identity security solutions architect
  - horizon: "90–180 days"
    experiment: Paid cutover packaging test
    hypothesis: Banks will fund a fixed-scope cutover before committing to a broader annual platform purchase.
    successMetric: 3 signed paid cutovers in the target price range with explicit conversion terms into annual subscriptions.
    owner: Founder CEO
  - horizon: "6–12 months"
    experiment: Repeatable 60-day deployment
    hypothesis: The first common stack can be productized enough to keep deployments short and gross margins intact.
    successMetric: 4 of the first 5 pilots reach an approval-ready packet in 60 days or less with no more than 2 bespoke connectors each.
    owner: Integrations engineer
  - horizon: "12–18 months"
    experiment: Partner-sourced launch motion
    hypothesis: Mobile-auth vendors and regional integrators can source qualified paid cutovers without materially worse conversion than founder-led deals.
    successMetric: 25% of qualified pipeline comes from 2 active partners and partner-sourced paid cutovers convert to production at 50% or better.
    owner: Partnerships lead
operations:
  - Maintain a versioned dependency graph that links each journey, vendor, control gap, fallback path, and owner.
  - Keep a living rules library for relying-party registration, attestation handling, remote-onboarding requirements, and phased post-quantum inventory work.
  - Generate immutable evidence packets with simulation logs, remediation status, and sign-off checkpoints for security, risk, and launch governance.
  - Standardize read-only connector templates and customer data-handling controls before taking on any inline orchestration.
  - Manage vendor and SI partners around common-stack playbooks and joint go-live checklists rather than one-off bespoke projects.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own buyer discovery, founder-led bank sales, pricing, and the launch-approval narrative until the motion converts on its own.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the dependency graph, simulation harness, evidence generator, and first integrations on the chosen bank stack.
  - role: Identity security solutions architect
    startTiming: Month 2
    rationale: Turn early pilots into repeatable approval packets, deployment playbooks, and customer-side control mappings that clear security review faster.
  - role: Integrations engineer
    startTiming: Month 4
    rationale: Productize connectors into mobile-auth, fraud, signing, and wallet vendors so deployments stop depending on founder-written scripts.
  - role: Second platform engineer
    startTiming: Month 7
    rationale: Harden telemetry, rules updates, and recurring monitoring modules needed for annual subscriptions and second-journey expansion.
  - role: Partnerships lead
    startTiming: Month 10
    rationale: Add partner-sourced pipeline only after the first paid cutovers prove a repeatable bank motion and a clear complement to incumbents.
milestones:
  - horizon: "0–12 months"
    items:
      - Sign 3 paid cutovers with CEE/DACH mid-tier banks.
      - Deliver the first approval-ready account-recovery packet within 60 days on the initial common stack.
      - Convert at least 2 paid cutovers into annual subscriptions and expand 1 bank into high-value payment step-up.
      - Ship the first rules library for relying-party, attestation, and PQ inventory requirements.
  - horizon: "12–24 months"
    items:
      - Reach 4-5 production bank logos and at least 2 partner-sourced deployments.
      - Add continuous crypto-inventory monitoring and support for a second and third wallet-auth journey.
      - Keep median kickoff-to-approval-packet time at or below 60 days as deployments scale.
  - horizon: "24–36 months"
    items:
      - Reach 6 live bank customers and the modeled year-3 SOM.
      - Expand at least half of production banks into a second journey or additional identity domain.
      - Enter one adjacent regulated segment only after the bank deployment playbook and partner motion are repeatable.
risks:
  - risk: Wallet rollout timing drifts by country or bank, weakening a compliance-only urgency story.
    likelihood: Medium
    impact: High
    mitigation: Sell fraud-safe recovery and faster approval as the first ROI and prioritize banks that already have funded launch programs.
  - risk: Incumbent authentication vendors or systems integrators claim the cutover scope as an extension of existing projects.
    likelihood: High
    impact: High
    mitigation: Position as the neutral mixed-stack evidence layer, prove faster approval on one journey, and use the strongest incumbents as channels where possible.
  - risk: Integration and security-review friction make deployments too slow or too custom for seed-stage economics.
    likelihood: Medium
    impact: High
    mitigation: Start read-only, narrow the first stack, standardize connectors, and refuse bespoke inline-control work until the core motion is repeatable.
  - risk: Budget ownership stays fragmented across CISO, digital, fraud, and payments teams, stretching sales cycles.
    likelihood: High
    impact: Medium
    mitigation: Anchor every sale to one named journey, one approval packet, and one accountable sponsor before entering procurement.
  - risk: The base bank wedge is too small to support venture outcomes if expansion does not materialize quickly.
    likelihood: Medium
    impact: High
    mitigation: Track second-journey expansion and recurring monitoring uptake in the first production logos before increasing burn or broadening geography.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5-3.5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to win 3 paid bank cutovers, convert at least 2 into annual
    subscriptions, productize a repeatable 60-day approval-packet deployment on
    one common stack, and establish the first vendor and SI distribution
    channels.
