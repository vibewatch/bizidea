reportMemo:
  executiveTakeaways:
    - >-
      The strongest wedge is a bank-side cutover and evidence layer, not another wallet, MFA token,
      or cryptography SDK.
    - >-
      Urgency is real because wallet rollout, deepfake fraud, and post-quantum planning are
      colliding in the same bank journeys.
    - >-
      Competition is crowded at the control-point level, but no obvious vendor owns cross-vendor
      dependency mapping, dual-stack rollout, and launch evidence.
    - >-
      The beachhead should stay narrow: one bank, one journey, one approval packet, starting with
      account opening, login, or high-value payment approval.
  marketDefinition: >-
    Software for European retail banks that inventories authentication and wallet dependencies,
    stages a dual-stack cutover, pressure-tests recovery and step-up flows, and generates
    approval-ready evidence for EUDI-related launches.
  customerAndBuyer: >-
    Primary users are heads of digital identity and authentication, mobile-banking security leads,
    and fraud teams at mid-tier European retail banks. The economic buyer is usually the CISO or
    chief digital officer, with digital-channel and payments leaders as strong technical sponsors.
  buyingTriggers:
    - point: >-
        Wallet rollout has moved from standards work into bank-facing launch planning, with
        service-provider workflows, pilots, and account-opening use cases now concrete enough to
        trigger programs.
      sourceRefs:
        - 1
        - 2
        - 3
        - 6
        - 7
    - point: >-
        Banks are being pushed to prepare for wallet-based strong customer authentication, turning
        login and transaction approval into a near-term platform decision rather than a distant
        policy watch item.
      sourceRefs:
        - 9
        - 10
    - point: >-
        Deepfake-driven identity fraud and account-takeover pressure make recovery and
        authentication controls easier to fund than compliance-only projects.
      sourceRefs:
        - 16
        - 20
        - 21
        - 22
    - point: >-
        Post-quantum guidance has become phased migration planning, which forces earlier mapping of
        cryptographic dependencies inside authentication stacks.
      sourceRefs:
        - 23
        - 24
        - 28
        - 29
  willingnessToPay:
    summary: >-
      Willingness to pay is credible because banks already fund specialist identity vendors, and the
      wallet business-case evidence points to lower onboarding and authentication costs plus better
      risk management as a practical ROI story.
    sourceRefs:
      - 11
      - 12
      - 17
      - 30
  competitiveLandscape: >-
    Competition is fragmented by layer. Wallet hubs and identity-proofing vendors help banks connect
    to EUDI flows; mobile authenticator and transaction-signing vendors secure specific control
    points; fraud platforms improve runtime decisions. The whitespace is a neutral bank-side
    workflow that maps cross-vendor breakpoints, stages the cutover, and packages evidence for risk,
    security, and launch approval.
  incumbentThesis:
    - incumbentClass: Mobile authentication and transaction-signing vendors
      point: >-
        These vendors secure login and payment approval well, but they do not automatically become
        the cross-vendor program layer that inventories every dependency and prepares the launch
        packet.
      sourceRefs:
        - 12
        - 15
        - 30
        - 31
        - 32
    - incumbentClass: Identity hubs and wallet orchestration suites
      point: >-
        Identity hubs can connect banks to wallet and eID methods, but they are not positioned as
        brownfield cutover systems for recovery, device binding, and crypto-agility across mixed
        stacks.
      sourceRefs:
        - 17
        - 18
        - 19
    - incumbentClass: Fraud and risk-auth platforms
      point: >-
        Risk-aware authentication platforms help block attacks at runtime, yet they still leave
        banks to coordinate rollout sequencing, recovery redesign, and audit evidence across
        multiple suppliers.
      sourceRefs:
        - 16
        - 33
        - 34
    - incumbentClass: Consultants and internal program offices
      point: >-
        Pilots and business-case work show that cross-organisation coordination is necessary, but
        project management alone does not leave behind a reusable dependency graph, test harness, or
        continuous control layer.
      sourceRefs:
        - 2
        - 7
        - 11
  regulatoryLandscape: >-
    This category sits where eIDAS wallet rules, relying-party registration, remote onboarding
    standards, and PSD2-style strong-customer-authentication expectations overlap. A winning product
    has to help banks prove interoperability, privacy, attestation handling, and governance
    readiness rather than just ship code.
  technologyLandscape: >-
    The technical building blocks already exist: wallet SCA specs, device-bound attestations, mobile
    authenticators, transaction signing, and emerging post-quantum standards. What remains scarce is
    orchestration across existing mobile apps, IAM, fraud engines, and signing infrastructure during
    a real bank launch.
  distributionChannels:
    - point: >-
        Land initially via founder-led sales into identity, security, and digital-channel leaders
        already tied to wallet or SCA launch programs.
      sourceRefs:
        - 2
        - 6
        - 7
    - point: >-
        Use incumbent identity and authentication vendors as integration and referral channels
        rather than trying to displace them on day one.
      sourceRefs:
        - 17
        - 18
        - 30
        - 33
    - point: >-
        Convert compliance and wallet-readiness workshops into paid pilots by anchoring on one
        journey and one approval packet.
      sourceRefs:
        - 1
        - 4
        - 11
  partnershipEcosystem:
    - point: >-
        Mobile-auth, transaction-signing, and wallet vendors are natural integration partners
        because they already own control points inside target banks.
      sourceRefs:
        - 13
        - 15
        - 17
        - 30
        - 31
    - point: >-
        Pilot consortia and digital-identity ecosystem groups can supply design-partner demand,
        technical validation, and early credibility.
      sourceRefs:
        - 2
        - 6
        - 7
        - 11
    - point: >-
        Fraud, KYC, and payments stacks matter because early deployment scope often spans account
        opening, login, and payment approval together.
      sourceRefs:
        - 9
        - 16
        - 18
        - 34
  dataMoats:
    - point: >-
        A dependency graph linking wallet flows, authenticators, signing components, fallback logic,
        and vendor ownership compounds with each deployment.
      sourceRefs:
        - 13
        - 17
        - 34
        - 35
    - point: >-
        Synthetic-fraud and step-up simulation results on real bank stacks can become proprietary
        rollout telemetry that point-control vendors do not automatically possess.
      sourceRefs:
        - 16
        - 20
        - 21
        - 32
    - point: >-
        Accumulated approval packets for remote onboarding, relying-party registration, and
        post-quantum inventory work become reusable evidence that reduces future launch friction.
      sourceRefs:
        - 1
        - 4
        - 24
        - 28
  geographicConsiderations:
    - point: >-
        The first market should stay EU-first because the regulatory trigger, pilot activity, and
        trust framework are all specific to the European wallet rollout.
      sourceRefs:
        - 1
        - 2
        - 3
        - 6
    - point: >-
        Pilot-active Northern and Central European markets should open faster than later-moving
        geographies because the ecosystem is already testing payments, onboarding, and
        credential-sharing flows.
      sourceRefs:
        - 2
        - 7
        - 12
  sensitivityCases:
    - case: Wallet acceptance stays pilot-bound longer than expected
      impact: >-
        Compliance-only urgency weakens, so the product must win on fraud-safe recovery, approval
        speed, and reduced cross-vendor coordination cost.
      sourceRefs:
        - 3
        - 9
        - 10
    - case: Deepfake fraud keeps accelerating
      impact: >-
        Banks fund safer device-bound step-up and recovery changes sooner, which increases urgency
        for the test-harness and evidence layer.
      sourceRefs:
        - 16
        - 20
        - 21
        - 22
    - case: Post-quantum migration becomes a board-level audit item
      impact: >-
        Crypto-dependency mapping becomes a faster path to budget and opens expansion into broader
        crypto-agility monitoring.
      sourceRefs:
        - 23
        - 24
        - 28
        - 29
  validationPlan:
    - priority: high
      question: >-
        Which specific bank journeys create the fastest approval pain and budget release: account
        opening, login, payment approval, or account recovery?
      evidenceToGather: >-
        Current-state launch plans, blocker logs, and approval packets from 5-10 target banks mapped
        by journey.
    - priority: high
      question: >-
        Where does budget ownership actually sit across CISO, digital channels, fraud, and payments
        teams for EUDI-related cutovers?
      evidenceToGather: >-
        Design-partner buying maps, procurement documents, and win/loss notes across the first 25
        prospects.
    - priority: medium
      question: >-
        Which incumbent stack combinations dominate the beachhead and therefore determine
        integration order?
      evidenceToGather: >-
        Prospect-level inventories of mobile-banking, MFA, signing, fraud, and wallet-vendor stacks
        across the first 50 accounts.
analysisModels:
  marketMapDiagram:
    title: Bank wallet-auth cutover map
    mermaid: |-
      quadrantChart
        title Bank wallet-auth cutover map
        x-axis Point control --> Cross-vendor cutover
        y-axis Routine authentication --> Launch-critical change
        Wultra: [0.56, 0.76]
        Signicat: [0.48, 0.64]
        OneSpan: [0.34, 0.58]
        Entersekt: [0.41, 0.61]
        Proposed startup: [0.90, 0.93]
  fiveForces:
    supplierPower:
      score: 3
      rationale: >-
        The product depends on incumbent mobile-auth, fraud, and signing vendors for integrations,
        but no single supplier owns the full launch workflow and banks already run mixed stacks.
      sourceRefs:
        - 13
        - 15
        - 30
        - 34
    buyerPower:
      score: 4
      rationale: >-
        Banks buy slowly, can compare the startup against internal program management or incumbent
        extensions, and will demand proof on risk, auditability, and time-to-approval.
      sourceRefs:
        - 1
        - 8
        - 11
    threatOfEntrants:
      score: 3
      rationale: >-
        It is possible to prototype orchestration quickly, but production deployment still requires
        standards fluency, regulated-customer trust, and cross-vendor integration depth.
      sourceRefs:
        - 4
        - 11
        - 24
    threatOfSubstitutes:
      score: 4
      rationale: >-
        Internal PMOs, systems integrators, wallet hubs, and transaction-auth vendors can all absorb
        part of the pain, so the startup must show why a dedicated cutover layer is better than
        stitched-together alternatives.
      sourceRefs:
        - 11
        - 15
        - 18
        - 30
        - 33
    competitiveRivalry:
      score: 4
      rationale: >-
        Rivalry is intense because multiple adjacent vendors already sell into bank identity,
        authentication, and fraud budgets, even if none own the exact cutover category.
      sourceRefs:
        - 12
        - 17
        - 30
        - 33
  pestle:
    - factor: political
      impact: positive
      point: >-
        EU institutions and Member States are coordinating pilots and implementation, which creates
        program pressure and a shared roadmap for banks.
      sourceRefs:
        - 2
        - 3
        - 4
    - factor: economic
      impact: positive
      point: >-
        Banks can justify spend through lower onboarding and authentication costs plus better risk
        management, not only through future compliance value.
      sourceRefs:
        - 10
        - 11
    - factor: social
      impact: positive
      point: >-
        User demand for lower-friction, cross-border, privacy-preserving identity experiences
        supports migration away from fragmented app and SMS flows.
      sourceRefs:
        - 3
        - 6
        - 9
    - factor: technological
      impact: positive
      point: >-
        Wallet SCA specs, device-bound attestations, mobile authenticators, and PQC standards are
        mature enough to build a practical control layer now.
      sourceRefs:
        - 5
        - 24
        - 25
        - 26
        - 27
        - 35
    - factor: legal
      impact: negative
      point: >-
        Registration, remote onboarding, attestation, and acceptance obligations raise
        implementation burden and make auditability a hard requirement.
      sourceRefs:
        - 1
        - 4
        - 9
        - 10
    - factor: environmental
      impact: neutral
      point: >-
        Remote onboarding and digital credentials can reduce paper and branch visits, but that is a
        secondary buyer argument rather than the core purchase driver.
      sourceRefs:
        - 6
  adoptionFrictionMatrix:
    - friction: Cross-vendor dependency sprawl across mobile banking, IAM, fraud, and signing stacks
      severity: high
      affectedBuyer: Head of digital identity or authentication
      mitigation: >-
        Start with read-only discovery, dependency mapping, and one-journey dual-stack rollout
        planning before touching inline controls.
      sourceRefs:
        - 11
        - 13
        - 30
        - 34
    - friction: Rule and registration uncertainty as wallet obligations evolve
      severity: medium
      affectedBuyer: CISO or compliance sponsor
      mitigation: >-
        Maintain a living rules library for relying-party registration, remote onboarding, and
        attestation requirements tied to launch evidence packs.
      sourceRefs:
        - 1
        - 4
        - 10
    - friction: Customer-experience risk when replacing SMS or app-specific approval patterns
      severity: medium
      affectedBuyer: Digital-channel owner
      mitigation: >-
        Use dual-stack fallback paths and start with high-risk flows where security value clearly
        outweighs UX change.
      sourceRefs:
        - 9
        - 15
        - 31
        - 32
    - friction: Post-quantum inventory work competes with other security priorities
      severity: medium
      affectedBuyer: CISO
      mitigation: >-
        Package one-journey cryptographic inventory and migration sequencing as a scoped launch
        deliverable instead of a bank-wide transformation.
      sourceRefs:
        - 23
        - 24
        - 28
        - 29
