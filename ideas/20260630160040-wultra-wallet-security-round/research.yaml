  - point: >-
      POTENTIAL includes bank account opening as a core wallet use case, confirming that
      private-sector onboarding is a real deployment target rather than a theoretical scenario.
    sourceRefs:
      - 6
  - point: >-
      NOBID tested wallet onboarding, bank account linking, and online-store payments across
      multiple stakeholders, showing practical coordination complexity.
    sourceRefs:
      - 7
  - point: >-
      Wultra says it serves more than 70 clients across 25 countries and raised fresh capital around
