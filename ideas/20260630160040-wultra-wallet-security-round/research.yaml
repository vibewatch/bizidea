competitors:
  - name: Wultra
    stage: scale-up
    wedge: >-
      Post-quantum bank authentication, mobile-first MFA, and a digital identity wallet gateway for
      regulated institutions.
    pricing: Custom enterprise pricing.
    strength: >-
      Very explicit bank, wallet, and PQC positioning, plus real specialist traction across multiple
      countries.
    weaknessVsUs: >-
      Owns important control points but not the neutral cross-vendor cutover and approval workflow
      the startup proposes.
    sourceRefs:
      - 12
      - 13
      - 14
      - 15
  - name: Signicat
    stage: incumbent
    wedge: >-
      Pan-European identity proofing, eID and wallet hub, and orchestration for regulated
      industries.
    pricing: Custom enterprise pricing.
    strength: >-
      Broad identity-method coverage, strong banking positioning, and an obvious path into wallet
      connectivity.
    weaknessVsUs: >-
      Oriented toward identity access and orchestration rather than the brownfield bank cutover
      layer across recovery, device binding, and crypto-agility.
    sourceRefs:
      - 16
      - 17
      - 18
      - 19
  - name: OneSpan
    stage: incumbent
    wedge: >-
      Bank authentication, mobile authenticators, and transaction-signing infrastructure with EUDI
      readiness messaging.
    pricing: Custom enterprise pricing.
    strength: >-
      Deep bank footprint and strong control over transaction authentication and tamper-evident
      approval.
    weaknessVsUs: >-
      Product-centric rather than workflow-centric, leaving room for a launch-specific dependency
      and evidence layer.
    sourceRefs:
      - 10
      - 30
      - 31
      - 32
  - name: Entersekt
    stage: scale-up
    wedge: >-
      Context-aware digital account authentication, 3-D Secure, and fraud-prevention for retail and
      commercial banks.
    pricing: Custom enterprise pricing.
    strength: Strong runtime transaction integrity and fraud story for digital banking flows.
    weaknessVsUs: >-
      Less explicit on EUDI wallet readiness and post-quantum migration, and not positioned as the
      bank-side cutover system of record.
    sourceRefs:
      - 33
      - 34
regulatoryTechnicalConstraints:
  - point: >-
      Wallet-relying service providers must register in their Member State and handle PID and
      attestation validation correctly before production use.
    sourceRefs:
      - 1
      - 4
  - point: >-
      Remote onboarding, protocols/interfaces, relying-party registration, and trust-framework
      implementing acts all affect launch design and can change over time.
    sourceRefs:
      - 4
  - point: >-
      Wallet-based SCA depends on standards-aligned device-bound keys, attestation handling, and
      interoperable interfaces rather than simple UI changes.
    sourceRefs:
      - 5
      - 35
      - 36
  - point: >-
      Post-quantum migration requires cryptographic inventory and phased upgrades, so banks need
      sequencing that fits existing authentication estates.
    sourceRefs:
      - 23
      - 24
      - 28
      - 29
validationSignals:
