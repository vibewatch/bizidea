differentiator: >-
  Most tax software competes on filing UX or generic bookkeeping automation, then hands the hardest exceptions back to
  staff in email and spreadsheets. This company starts one layer earlier, at evidence close: it builds a provenance graph
  for every filed number and optimizes reviewer throughput on the minority of transactions that remain ambiguous.
  Defensibility compounds through reviewer feedback loops, client-level exception patterns, and integrations into the
  bookkeeping systems where firms already manage thousands of small-business records.
