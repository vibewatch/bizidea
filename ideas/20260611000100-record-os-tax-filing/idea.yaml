jobsToBeDone:
  - job: When a quarterly HMRC deadline approaches, help a digital accountancy firm assemble a reviewer-ready sole-trader filing pack, so they can submit on time without adding reviewer headcount.
    currentAlternative: Junior bookkeeper reconciliation in Xero or QuickBooks plus spreadsheets and receipt chasing
    successMetric: More active clients reviewed per qualified tax professional per quarter
  - job: When a transaction lacks clear support, help the reviewer see the exact missing evidence and likely classification instantly, so they can resolve exceptions instead of rebuilding the file manually.
    currentAlternative: Email threads, document folders, and manual ledger reconstruction
    successMetric: Lower exception-resolution time and fewer post-filing corrections
