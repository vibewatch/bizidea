topRisks:
  - name: Reviewer trust gap
    description: If qualified reviewers do not trust the evidence pack, the product becomes another draft generator that still requires full manual checking.
    mitigation: Launch with exception-only review, attach provenance to every suggested classification, and prove reduced edit rates on early cohorts.
  - name: Integration sprawl
    description: Firms use inconsistent bookkeeping, document, and bank-feed setups that can make onboarding expensive and brittle.
    mitigation: Start with Xero and QuickBooks-centric practices, standardize ingestion around the most common source types, and gate early customers on data hygiene.
  - name: Regulatory edge cases
    description: HMRC rule changes or niche income categories could break automated assumptions and create filing risk.
    mitigation: Keep a human-in-the-loop approval step, maintain rules and exception libraries by cohort, and expand coverage category by category instead of claiming full automation too early.
