problem: >-
  UK digital-first accountancy firms still rebuild sole-trader books from bank feeds, invoices, and ad hoc receipts right
  before HMRC deadlines, even though Making Tax Digital now forces that scramble to happen every quarter. Pure self-serve
  tax software leaves too many edge cases unresolved, while full human preparation destroys margins on small clients. The
  bottleneck is not pressing submit; it is turning messy source data into a reviewer-ready evidence trail fast enough that
  one qualified tax professional can clear dozens of files without fear of filing errors.
targetUser:
  primary: Head of operations or practice owner at a UK digital-first accountancy firm serving sole traders above the first MTD threshold
  secondary: Senior reviewer or tax manager responsible for signing off quarterly HMRC submissions
  buyer: Practice owner or COO of a multi-hundred-client online accountancy firm
startupThesis:
  nonObviousInsight: >-
    The big opportunity is not another consumer tax app but a records-close layer for firms that already own the client
    relationship. The new regulation makes evidence assembly and exception handling the scarce workflow, because AI can
    draft categorization but trust still sits with the reviewer who must sign off under deadline.
  beachhead: >-
    UK online accountancy and bookkeeping firms serving 500-3000 sole-trader clients in trades, delivery, and personal
    services who crossed the April 2026 Making Tax Digital threshold and now need quarterly submissions with limited
    reviewer headcount
  wedge: >-
    An evidence-close engine that ingests bank feeds, invoices, and platform payouts, auto-builds an HMRC-ready quarterly
    record, and routes only ambiguous items to a qualified reviewer
  whyNowCatalyst: >-
    HMRC's April 2026 quarterly filing mandate and confirmed rollout through 2028 are forcing a formerly annual workflow
    into a recurring close motion just as hybrid AI-plus-human review models are proving credible and paid for.
  ventureScalePath: >-
    Start as the close layer for UK sole-trader quarterly filings, then expand into landlord workflows, notice-response
    automation, bookkeeping QA, lender-ready income verification, and embedded tax operations for banks, payroll products,
    and vertical SaaS platforms serving self-employed workers.
solution: >-
  The product plugs into the firm's existing bookkeeping stack and continuously assembles a filing-grade record instead of
  waiting for a quarter-end scramble. It maps each transaction to a source, flags missing evidence, and groups only the
  exceptions that matter so reviewers spend time on judgment calls rather than clerical categorization. Each filed number
  carries provenance back to the underlying bank line, invoice, or payout statement, creating an internal audit trail for
  sign-off and any later HMRC questions. The first release focuses on firms already serving sole traders at scale, because
  they feel the regulation immediately and can measure value in reviewer throughput, faster close cycles, and fewer filing
  corrections.
goToMarketSeed:
  firstCustomer: >-
    A UK online accountancy firm with 1000+ sole-trader clients above the April 2026 threshold, using Xero or QuickBooks
    plus junior bookkeepers to prepare quarterly HMRC submissions
  buyingTrigger: >-
    The first quarter-end under MTD, reviewer hiring pressure, or a spike in rework from missing receipts and miscoded
    bank transactions creates urgency and budget
  currentAlternative: >-
    Xero or QuickBooks bank rules, spreadsheets, email receipt chasing, and manual review by junior bookkeepers and a
    qualified accountant
  switchingReason: >-
    This wedge lets firms keep their existing ledger and client relationships while replacing the low-margin evidence
    assembly work with an exception-only review queue that is easier to trust than a fully automated filing bot
  pricingHypothesis: >-
    Platform fee per firm plus per-active-client-per-quarter pricing, with premium modules for outsourced reviewer
    capacity and HMRC notice-response workflows
