slug: record-os-tax-filing
date: '2026-06-11'
executiveSummary: >-
  This company targets UK digital-first accountancy firms that now have to run
  Making Tax Digital quarterly close for large books of sole-trader clients
  without proportionally adding qualified reviewers. The pain is not basic HMRC
  submission; it is rebuilding evidence, chasing missing documents, and
  resolving ambiguous transactions across Xero, QuickBooks, capture tools, and
  email before each quarter-end. The proposed wedge is an evidence-close overlay
  that keeps the incumbent ledger in place, assembles a filing-grade provenance
  trail, and routes only ambiguous items to a reviewer. This is a narrower and
  faster-to-prove entry point than launching another consumer filing product or
  a full practice suite because the buyer already has software but lacks
  reviewer throughput. The best first proof point is a paid pilot on one
  reviewer team and one client cohort that measurably increases active clients
  cleared per qualified tax professional per quarter while reducing close-cycle
  time and post-filing corrections. Research supports a credible market opening,
  with a reported $86.0M beachhead SAM and rollout tailwinds through 2028, but
  exact exception rates by client category, onboarding cost by source-system
  mix, and customer acquisition cost are still missing. The core strategic bet
  is that firms will fund an overlay if it fits their existing stack and earns
  trust through provenance plus reviewer-only exceptions. The biggest
  disconfirming risk is that incumbents and manual workflows remain "good
  enough," preventing a separate budget line before the startup proves clear
  reviewer-capacity gains.
problem:
  - >-
    Quarterly MTD filing forces UK accountancy firms to repeat low-margin
    evidence assembly every quarter across hundreds or thousands of sole-trader
    clients, but the scarce resource is still the qualified reviewer who must
    sign off.
  - >-
    Existing ledgers and capture tools handle bookkeeping inputs, yet ambiguous
    transactions, missing receipts, and fragmented digital-link workflows still
    spill into spreadsheets, inboxes, and manual rework that erodes margin and
    creates filing risk.
solution:
  - >-
    Provide an evidence-close control layer that ingests bank-feed, invoice,
    receipt, and payout data from the firm's existing stack, links every filed
    number to source evidence, and produces a reviewer-ready quarterly pack.
  - >-
    Route only unresolved exceptions to human reviewers with provenance, likely
    classifications, and missing-evidence prompts so reviewer time shifts from
    clerical reconstruction to judgment calls and sign-off.
whyWeWin:
  - >-
    The startup is not trying to replace Xero, QuickBooks, FreeAgent, Dext, or
    AutoEntry; it sits between those tools and the reviewer, where the research
    shows the real bottleneck still exists.
  - >-
    Defensibility compounds from practice-specific exception data, reviewer
    resolutions, and provenance graphs that improve routing quality and make the
    product harder to replicate with a generic filing front end.
strategicChoices:
  beachhead: >-
    UK online accountancy and bookkeeping firms serving roughly 500-3000
    sole-trader clients above the first MTD threshold, especially practices
    concentrated in trades, delivery, and personal-services books on Xero or
    QuickBooks-centric stacks.
  wedgeRationale: >-
    This segment already feels the 2026 mandate, has enough client volume for
    reviewer bottlenecks to become budget-worthy, and can adopt an overlay
    faster than smaller firms or less-digitised landlord-heavy books that would
    require heavier onboarding.
  sequencingRationale: >-
    Start as a pre-close overlay that improves reviewer throughput without
    taking direct filing-system ownership, because that minimizes change
    management and integration risk in the first sale. Add deeper workflow
    automation, client evidence collection, and notice-response products only
    after the company proves trust, conversion, and repeatable deployment in
    Xero/QuickBooks-led practices. Hiring follows that sequence: core product
    engineering first, tax-ops implementation second, then partner-led
    distribution after pilots convert.
  notYet:
    - Direct-to-consumer tax filing
    - Full general-ledger replacement
    - Landlord and mixed-income workflows before sole-trader close is repeatable
    - Automated direct filing ownership across every HMRC workflow before the overlay is trusted
market:
  tam: >-
    $289.0M estimated annual TAM based on roughly 1.90M agent-represented
    in-scope taxpayers by 2028 and an assumed £120 annual software spend per
    active client.
  sam: >-
    $86.0M estimated SAM for the 2026-27 beachhead of digital-first,
    self-employment-heavy represented clients that fit the initial overlay
    thesis.
  som: >-
    $8.2M year-3 SOM based on about 60 digital-first firms with roughly 900
    active clients each at the researched annual spend assumption.
  segments:
    - UK digital-first accountancy firms serving high-volume sole-trader books
    - UK bookkeeping and tax practices that can later expand into landlord or mixed-income cohorts
  buyingProcess: >-
    The sale usually starts with a practice owner, COO, or operations lead when
    the firm is segmenting clients for quarterly MTD deadlines and sees reviewer
    hiring pressure or rework spikes. A senior reviewer or tax manager must
    trust the workflow before conversion, so pilots need both an economic buyer
    and a reviewer champion.
product:
  mvp: >-
    The MVP is an overlay for Xero- and QuickBooks-centric firms that ingests
    bank, invoice, receipt, and payout records, builds a filing-grade
    provenance trail, flags missing evidence, and presents reviewers with an
    exception-only queue plus exportable quarterly close packs. It should feed
    incumbent tax software first rather than replace the firm's system of
    record.
  sixMonth: >-
    Ship paid pilots for one reviewer team with provenance-linked transaction
    views, missing-evidence prompts, exception triage, reviewer sign-off, and
    deployment playbooks for the first two stack combinations.
  twelveMonth: >-
    Add client evidence-request workflows, resolution analytics, support for
    common capture-tool handoffs, and role-aware workflows that reflect
    main-agent versus supporting-agent operating realities.
  twentyFourMonth: >-
    Expand into adjacent sole-trader and landlord close workflows, launch HMRC
    notice-response preparation modules, and give larger firms account-level
    benchmarking across reviewers, cohorts, and source-system mixes.
  keyBets:
    - Practices will trust an exception-only review model if every filed number carries explicit provenance
    - An overlay can land faster than a rip-and-replace filing system in multi-product firms
    - Reviewer-throughput gains are strong enough to justify mid-five-figure to low-six-figure annual contracts
    - Xero and QuickBooks-first deployment covers enough of the beachhead to prove repeatability before broader integrations
gtm:
  wedge: >-
    Sell a paid quarterly-close pilot to one digital-first firm where one
    reviewer team is already overloaded, starting with a defined client cohort
    and a promise to increase clients cleared per reviewer rather than to
    automate filing end-to-end.
  channels:
    - Founder-led outbound to practice owners and operations leads at digital-first firms
    - Accountant ecosystem and partner-program relationships around Xero and adjacent practice tooling
    - Referrals from document-capture vendors and outsourced reviewer networks
    - UK accounting trade events and MTD-readiness communities
  funnelTargets: "Discovery call→design partner 30%+, design partner→paid pilot 40%+, pilot→annual production contract 60%+, first cohort rollout→second cohort or adjacent client segment within 12 months 50%+"
  pricing: >-
    Charge a firm platform fee plus per-active-client-per-quarter usage because
    the buyer measures value in reviewer capacity and avoided rework across a
    client book, not in seats alone. Keep premium pricing for outsourced
    reviewer capacity and notice-response preparation until the core workflow is
    trusted.
businessModel:
  revenueStreams:
    - Annual platform subscription per firm
    - Per-active-client-per-quarter workflow fees
    - Premium notice-response preparation modules
    - Optional outsourced reviewer-capacity or implementation services during early deployments
  unitOfValue: active MTD client-quarter
  targetGrossMarginPct: 70
  expansionLevers:
    - Roll from one reviewer team to the full sole-trader book inside the same firm
    - Extend from sole traders into landlord and mixed-income cohorts once workflows are proven
    - Add notice-response, bookkeeping QA, and reviewer benchmarking modules
    - Land through accountants first, then embed into partner channels that already distribute compliance tooling
strategyMap:
  northStarMetric: Reviewer-approved MTD client quarters per qualified tax professional per quarter
  inputMetrics:
    - Percentage of transactions auto-closed with complete provenance
    - Median exception-resolution time per client
    - Median days from quarter end to reviewer-ready filing pack
    - Post-filing correction rate by cohort
    - Paid pilot to production-conversion rate
  moatsToBuild:
    - Practice-level dataset of exception patterns, reviewer decisions, and missing-evidence causes
    - Provenance graph linking filed outputs back to bank, invoice, receipt, and payout records across tools
    - Implementation playbooks and integrations for the dominant digital-first accountancy stacks
  killCriteria:
    - Fewer than 6 of the first 10 target firms report reviewer bottlenecks severe enough to fund new software in the next 12 months
    - Pilots fail to improve clients cleared per reviewer by at least 25% within one quarterly cycle
    - Fewer than 50% of paid pilots convert to annual production contracts
    - More than 10% of pilot-filed clients still require full manual rebuild despite the overlay
  mermaid: |
    flowchart LR
      Wedge[Reviewer-team pilot in a digital-first accountancy firm] --> MVP[Evidence-close overlay with provenance and exception routing]
      MVP --> Proof[Higher reviewer throughput and faster quarterly close]
      Proof --> Expansion[Full-firm rollout plus landlord, notice-response, and partner channels]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Clear regulatory timing and workflow pain justify a serious pre-seed look, but conviction still depends on proving that firms will fund an overlay rather than wait for incumbents.
    whyBelieve: The research shows a real and growing mandated workflow with agent-heavy representation, visible reviewer pain, and existing willingness to pay for trust-enhanced tax workflows.
    whyDoubt: Standalone budget, onboarding effort, and reviewer trust are not yet proven enough to know whether this is a durable software layer or a short-lived services wedge.
    nextDiligence: Validate three paid pilots that show 25%+ reviewer-throughput gains and clear conversion from one cohort to broader account rollout.
  firstCustomer:
    title: Operations lead at a UK digital-first accountancy firm serving sole traders
    profile: >-
      A practice with 1000+ MTD-affected sole-trader clients, an existing Xero or
      QuickBooks-led stack, junior staff preparing books, and a small number of
      qualified reviewers clearing quarterly submissions.
    trigger: The first or second quarterly MTD close exposes reviewer hiring pressure, deadline risk, or a spike in rework from missing evidence and miscoded transactions.
    buyer: Practice owner or COO
    initialContract: >-
      £15k-£25k paid pilot covering one reviewer team and roughly 200-400 active
      clients for one quarterly cycle, converting to roughly £60k-£120k annual
      software spend if the workflow rolls out across the firm's full book.
  mustBeTrue:
    - At least half of target digital-first firms experience enough quarterly evidence rework to justify a dedicated software budget in 2026-27.
    - The product can raise clients cleared per reviewer by 25% or more without taking over the firm's ledger or filing system.
    - Qualified reviewers will sign off from an exception-only queue when provenance is explicit and edit rates are low.
    - Xero or QuickBooks-centric deployment covers enough of the beachhead to win the first 10 customers without heavy custom integration.
    - Firms that start with one client cohort will expand to broader books or adjacent workflows within 12 months.
  diligenceQuestions:
    - How many reviewer hours per quarter do 1000-client digital firms currently spend on evidence chasing and ambiguous categorisation?
    - What share of target buyers wants an overlay versus expecting this workflow inside existing tax software?
    - Which client cohorts generate the highest exception density and fastest ROI in the first wedge?
    - How painful are main-agent and supporting-agent workflow boundaries in real practice operations?
    - What implementation burden is acceptable before thin per-client margins erase software ROI?
operatingAssumptions:
  - assumption: Digital-first firms will buy an overlay before they are ready to replace ledgers or tax suites.
    basis: research.yaml
    validationTest: Present overlay-first versus replacement workflows to 10 target buyers and secure at least 3 paid pilots for the overlay option.
    decisionImpact: If false, the company must reposition as a managed service, partner more deeply with an incumbent, or move upmarket to firms willing to replatform.
  - assumption: Reviewer trust can be earned with provenance and exception routing without full direct-filing ownership in the first year.
    basis: idea.yaml
    validationTest: In 3 pilots, achieve reviewer sign-off on at least 80% of surfaced exceptions without parallel full-manual rebuild.
    decisionImpact: If false, the roadmap must shift toward heavier human review operations or deeper filing-system control, increasing cost and complexity.
  - assumption: Xero and QuickBooks-centric stacks represent enough of the first beachhead to defer broader integrations.
    basis: idea.yaml
    validationTest: Win 5 of the first 7 design partners from firms whose primary workflow fits the initial supported stack combinations.
    decisionImpact: If false, integration scope expands sooner, lengthening implementation cycles and reducing early gross margin.
  - assumption: Per-firm plus per-client-per-quarter pricing will be acceptable when positioned against avoided reviewer hiring and rework.
    basis: research.yaml
    validationTest: Test pricing in 5 pilot negotiations and close at least 3 deals within 20% of list assumptions.
    decisionImpact: If false, the business must shift to larger services bundles, lower-priced software, or a narrower high-complexity segment.
  - assumption: Landlord and notice-response adjacencies are expansion products, not prerequisites for the first 12 months of demand.
    basis: operator judgment
    validationTest: Track whether at least 70% of early buyer demand and usage comes from sole-trader quarterly close rather than adjacent workflows.
    decisionImpact: If false, product sequencing changes and the company may need a broader initial platform before efficient GTM is possible.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 10 practice owners, COOs, and reviewer leads at digital-first firms about the last completed quarterly close.
    hypothesis: Reviewer bottleneck and evidence chasing rank among the top three MTD workflow pains in the beachhead segment.
    successMetric: At least 7 of 10 firms report material reviewer-capacity strain or deadline risk tied to evidence assembly.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run workflow shadowing with 2 design partners across one reviewer team each.
    hypothesis: A common provenance and exception schema covers the majority of high-frequency close problems without custom product forks.
    successMetric: One shared workflow model captures at least 80% of exception types across both firms.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Launch 3 paid pilots on Xero or QuickBooks-centric stacks for one defined client cohort each.
    hypothesis: A quarter-bound pilot with explicit throughput metrics closes faster than a broad annual software sale.
    successMetric: 3 paid pilots signed and live before the next quarterly filing deadline.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Measure pre/post reviewer throughput, close-cycle time, and correction rates in each pilot.
    hypothesis: Exception-only review plus provenance improves clients cleared per reviewer by at least 25% and reduces close-cycle time materially.
    successMetric: Median 25%+ throughput gain and lower post-filing corrections across pilot cohorts.
    owner: Tax ops lead
  - horizon: 6–12 months
    experiment: Add the first document-capture integrations and client evidence-request workflows to production accounts.
    hypothesis: Better upstream evidence collection reduces exception density enough to improve gross-margin potential.
    successMetric: Supported accounts show at least 15% lower exception rates after workflow rollout.
    owner: Integration engineer
  - horizon: 12–18 months
    experiment: Test expansion into landlord books or notice-response preparation with existing production customers.
    hypothesis: The easiest account expansion comes from adjacent evidence-heavy tax workflows sold to the same buyer.
    successMetric: At least 2 customers buy an adjacent module or broaden rollout beyond the initial sole-trader cohort.
    owner: Product lead
operations:
  - Standardize onboarding around explicit source-system maps, digital-link checkpoints, and reviewer sign-off owners before go-live
  - Keep a human-in-the-loop escalation path for ambiguous categories and regulatory edge cases from day one
  - Instrument every pilot on reviewer throughput, exception density, and correction rates so GTM claims stay evidence-backed
  - Build repeatable integrations and partner playbooks only after the first supported stacks show conversion and margin potential
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the provenance graph, exception-routing engine, and stack integrations that define the wedge.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own customer discovery, pilot sales, pricing, and early partner development with digital-first firms.
  - role: Tax ops lead
    startTiming: Month 2
    rationale: Translate reviewer workflows into product requirements, run implementations, and protect trust during live closes.
  - role: Integration engineer
    startTiming: Month 6
    rationale: Expand supported stack combinations only after the first pilots prove which upstream systems matter most.
  - role: Product lead
    startTiming: Month 9
    rationale: Turn early pilot learnings into a repeatable user experience for reviewers, ops teams, and client evidence requests.
milestones:
  - horizon: 0–12 months
    items:
      - Secure 3 paid quarterly-close pilots in digital-first accountancy firms
      - Prove at least 25% higher clients-cleared-per-reviewer throughput in 2 or more pilots
      - Ship provenance-linked exception routing, reviewer sign-off, and the first supported stack combinations
  - horizon: 12–24 months
    items:
      - Convert at least 5 firms to annual production contracts and expand beyond the initial pilot cohort inside most accounts
      - Launch client evidence-request workflows, capture-tool integrations, and reviewer benchmarking dashboards
      - Win the first adjacent revenue from landlord close or notice-response preparation
  - horizon: 24–36 months
    items:
      - Reach the researched SOM trajectory of roughly 60 customers and about $8.2M in annual recurring revenue equivalent
      - Become the default evidence-close layer for the target digital-first accountancy segment
      - Establish partner-led distribution that reduces dependence on pure founder-led outbound
risks:
  - risk: Incumbent tax, ledger, or capture vendors bundle enough exception handling that buyers defer purchasing a separate overlay.
    likelihood: Medium
    impact: High
    mitigation: Win on cross-stack provenance, reviewer throughput, and deployment speed rather than basic MTD compatibility.
  - risk: Reviewer trust remains too low, forcing full parallel manual review and destroying ROI.
    likelihood: Medium
    impact: High
    mitigation: Keep human sign-off in the loop, expose provenance for every filed number, and qualify pilots on review-discipline fit.
  - risk: Integration and onboarding effort stay too services-heavy for a 70% gross-margin software business.
    likelihood: High
    impact: High
    mitigation: Limit early customers to supported stacks, standardize deployments, and defer broad segment expansion until implementation is repeatable.
  - risk: Landlord or less-digitised client segments prove necessary earlier than planned, stretching the roadmap.
    likelihood: Medium
    impact: Medium
    mitigation: Focus sales qualification on sole-trader-heavy firms first and use adjacent demand only after core workflow metrics are met.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to build the evidence-close MVP, win and instrument the first
    3-5 paid pilots, support the dominant initial stack combinations, hire tax
    operations and product talent, and prove that reviewer-throughput gains
    translate into annual production contracts and account expansion.
