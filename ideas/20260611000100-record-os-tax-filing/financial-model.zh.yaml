slug: record-os-tax-filing
date: '2026-06-11'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月
  value: 2026-07
  unit: month
  source: '[BP date] 基准情景假设 pre-seed 轮关闭后，支出于计划日期次月启动。'
- id: A2
  name: pre-seed 关闭后初始现金
  value: '2.2'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M；BP fundingAsk runwayMonths 18] 基准情景采用 $2.2M pre-seed，接近所述区间低端，因为 Y1 切口保持较窄。'
- id: A3
  name: 每家付费机构年均混合收入
  value: '132.0'
  unit: USDK per customer-year
  source: '[BP gtm.pricing；BP investorMemo.firstCustomer initialContract；Research market.bottomUpSizingDrivers annual software spend] 建模为约 $18K 平台费加上平均 750 名客户生产队列中每活跃客户季度约 $38，低于 900 名客户的 SOM 情景，为部分账本部署预留空间。'
- id: A4
  name: 毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel targetGrossMarginPct]'
- id: A5
  name: Y1 客户获取节奏
  value: 'Month-end customers: 0,0,0,1,1,1,2,2,2,3,3,3'
  unit: count
  source: '[BP milestones 0–12 months；BP experimentRoadmap] 将第一年锚定在三个付费季度收结试点。'
- id: A6
  name: Y2 季末客户数
  value: Q1Y2 4; Q2Y2 6; Q3Y2 8; Q4Y2 10
  unit: count
  source: '[BP milestones 12–24 months] 假设前三个试点完成转化，公司在保有少量新试点的同时达到至少五家生产机构。'
- id: A7
  name: Y3 季末客户数
  value: Q1Y3 18; Q2Y3 32; Q3Y3 49; Q4Y3 60
  unit: count
  source: '[BP market.som；BP milestones 24–36 months；Research market.som] 基准情景于 Y3 末达到所述 60 家机构的 SOM，而非提前达到。'
- id: A8
  name: 年化现金薪酬（含负担）
  value: Founder CEO $90K; Founding engineer $150K; Tax ops lead $120K; Integration engineer $135K; Product lead $135K; Partnerships/AE $150K; Platform engineer $145K; Customer success/implementation $100K; Data/automation engineer $145K; Finance/ops $95K
  unit: USDK per FTE-year
  source: '[BP team] 英国聚焦 pre-seed 软件公司的初创财务经验值：创始人现金薪酬低于市场，技术岗含薪酬负担后按市场水平。'
- id: A9
  name: 招聘节奏
  value: Founder CEO and founding engineer in M1; tax ops in M2; integration engineer in M6; product lead in M9; first AE in M13; platform engineer in M16; first customer-success hire in M18; data/automation engineer in M22; second AE in M25; second customer-success hire in M28; second platform engineer in M31; finance/ops in M34
  unit: timing
  source: '[BP strategicChoices.sequencingRationale；BP team] 工程优先招聘，税务运营第二，面向渠道的 GTM 等试点转化后再启动。'
- id: A10
  name: 职能薪酬分配
  value: Founder 70% S&M / 30% G&A; founding, integration, product, platform, and data engineers 100% R&D; tax ops 50% R&D / 50% G&A; customer success 50% S&M / 50% G&A; AE 100% S&M; finance/ops 100% G&A
  unit: allocation
  source: '[BP team rationales；BP operations] 按销售、实施、产品化和行政工作的责任归属进行分配。'
- id: A11
  name: 非薪酬 S&M 支出
  value: $4K monthly before the first AE; $8K monthly through Y2; $12K monthly after the second AE
  unit: USDK per month
  source: '[Startup-finance heuristic] 涵盖创始人主导出站销售、出行、展会和面向会计师 GTM 打法的销售工具费用。'
- id: A12
  name: 非薪酬 R&D 支出
  value: $5K monthly before integrations; $7K after the first integration hire; $9K after the first platform engineer; $10K after the data/automation hire; $12K after the second platform engineer
  unit: USDK per month
  source: '[BP product roadmap；Startup-finance heuristic] 随产品扩展捕获云服务、模型、开发工具和集成成本。'
- id: A13
  name: 非薪酬 G&A 支出
  value: $4K monthly in Y1; $6K monthly in Y2; $8K monthly in Y3
  unit: USDK per month
  source: '[Startup-finance heuristic] pre-seed 英国工作流软件公司精简的法律、财务、保险和合规预算。'
- id: A14
  name: 收入确认政策
  value: Recognize each period from the average of opening and closing paying customers
  unit: policy
  source: '[Startup-finance heuristic] 将月内或季内入驻进行平滑处理，而非假设每个新客户从第一天就全量上线。'
- id: A15
  name: 现金转换政策
  value: EBITDA approximates cash movement
  unit: policy
  source: '[Startup-finance heuristic] 本软件优先型 pre-seed 业务不对债务、资本支出、税务或重大营运资金波动进行建模。'
- id: A16
  name: 客户获取成本
  value: '32.0'
  unit: USDK
  source: '[BP gtm channels；Startup-finance heuristic] 假设创始人主导出站销售加生态系统销售进入中型会计机构，有限付费营销。'
- id: A17
  name: 月度流失率
  value: '2.2'
  unit: percent
  source: '[BP investorMemo.mustBeTrue；Startup-finance heuristic] 早期工作流软件一旦部署应较为粘性，但在产品市场契合验证之前，流失率仍高于成熟垂直 SaaS 水平。'
- id: A18
  name: 下一轮融资里程碑
  value: Reach 10 production firms, prove 25%+ reviewer-throughput gains, and ship evidence-request workflows while keeping six months of cash buffer
  unit: milestone
  source: '[BP milestones 12–24 months；BP fundingAsk useOfFundsSummary] 用于确定 pre-seed 融资规模。'
