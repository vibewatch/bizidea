scenarios:
  downside:
    description: 在位工具对更多机构仍然够用，转化放缓，公司以更低混合合同价值于 Y3 末退出，付费机构数为 40 家。
    y3RevenueK: 2870.0
    y3EbitdaK: 59.4
    cashLowPointK: 525.6
    keyAssumptionChanges:
    - Y3 季末客户数从 18、32、49、60 降至 14、24、31、40。
    - 每客户年均混合收入从 $132K 降至 $120K，因买家将部署限定在更小的队列中。
    - 毛利率从 70% 降至 67%，因入驻仍偏重服务。
  base:
    description: 三个付费试点转化为可复制的生产部署，随后合作伙伴主导的分发助力公司于 Y3 末达到 60 家机构的 SOM。
    y3RevenueK: 4433.0
    y3EbitdaK: 1238.8
    cashLowPointK: 863.1
    keyAssumptionChanges:
    - 季末客户数按 A6 和 A7 的节奏推进。
    - 毛利率维持在 70% 的业务计划目标。
    - 招聘按 A9 执行，在可复制性验证之前不提前增加服务型人员。
  upside:
    description: 共创客户推荐和会计师渠道合作提前发力，公司于 Y3 末达到 75 家付费机构，混合合同价值更高。
    y3RevenueK: 7228.1
    y3EbitdaK: 3340.3
    cashLowPointK: 1542.1
    keyAssumptionChanges:
    - Y3 季末客户数从 18、32、49、60 提升至 36、55、65、75。
    - 混合年度收入从 $132K 扩展至 $138K，来自更完整的账本部署和相邻模块附加销售。
    - 毛利率从 70% 提升至 72%，因实施手册降低了手工工作量。
sensitivity:
- variable: ARPU
  downsideCase: 平均合同价值稳定在约 $120K，因机构在较窄的客户队列上部署。
  baseCase: 平均合同价值按建模保持在 $132K。
  upsideCase: 更多账户推广至更完整的账本后，平均合同价值达到 $138K。
  y3RevenueImpactK: -403.0
  cashImpactK: -282.0
- variable: CAC
  downsideCase: CAC 升至 $40K，因创始人主导出站销售无法顺畅转化为生态系统销售。
  baseCase: CAC 维持在 $32K，创始人主导销售加会计师渠道转介。
  upsideCase: 合作伙伴转介带来更暖的销售线索后，CAC 降至 $26K。
  y3RevenueImpactK: 0.0
  cashImpactK: -240.0
- variable: churn
  downsideCase: 月度流失率升至 3.0%，因机构将产品视为仅限一季 MTD 辅助工具。
  baseCase: 月度流失率按建模维持在 2.2%。
  upsideCase: 溯源和凭证请求工作流深度嵌入后，月度流失率降至 1.5%。
  y3RevenueImpactK: -310.0
  cashImpactK: -217.0
- variable: sales cycle
  downsideCase: 试点至生产部署的周期拉长至约 6 个月，因审核员签发和集成审核耗时更长。
  baseCase: 试点至生产部署保持在一个季度周期加采购流程左右。
  upsideCase: 推荐案例将周期缩短至约 3 个月。
  y3RevenueImpactK: -620.0
  cashImpactK: -430.0
- variable: gross margin
  downsideCase: 毛利率稳定在约 67%，因部署仍偏重支持服务。
  baseCase: 毛利率维持在 70% 的业务计划目标。
  upsideCase: 支持技术栈标准化后，毛利率达到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -190.0
- variable: hiring pace
  downsideCase: 在渠道打法可复制之前，提前招募第二名平台工程师和客户成功人员。
  baseCase: 招聘按 A9 执行，在生产转化验证之前保持纪律。
  upsideCase: 可复制集成降低服务工作量，非关键岗位招募顺延。
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入由付费机构数从 Y2 末 10 家增长至 Y3 末 60 家驱动，维持约 $132K 的混合客户年价值。
- checkName: 必须做对的事
  finding: 产品必须以足够快的速度将付费试点转化为生产部署，以便合作伙伴主导的分发能在 Y2–Y3 接替纯创始人销售。
- checkName: 模型破坏条件
  finding: 最大的现金风险是试点至生产周期放缓叠加更窄的队列部署，因为这同时压缩 Y3 收入和悲观情景下的现金缓冲。
- checkName: 下一轮验证条件
  finding: 当公司拥有 10 家生产机构、可量化的审核人处理效率提升 25% 以上、凭证请求工作流上线，且仍有缓冲现金时，seed 轮最具说服力。
sanityChecks:
  ruleOf40: Y3 增长率 471.7% + EBITDA 利润率 28.0% = 499.7%（方向性强，但因 Y2 基数小而虚高）。
  burnMultiple: Y2 净新增 ARR 的消耗倍数约为 0.8 倍，Y3 Q2 EBITDA 转正后进入负消耗。
  revenuePerFte: Y3 年末每 FTE 收入 $341K（参考 SaaS 基准区间约 $200K–$400K）。
  flags:
  - 基准情景在 Y2–Y3 仍需渠道做出实质贡献；仅靠创始人出站销售不太可能支撑 60 家机构的退出。
  - 毛利率维持在 70% 的前提是：在拓展更广细分市场之前，以窄口 Xero/QuickBooks 技术栈将入驻标准化。
  - 模型假设 pre-seed 后无额外融资，任何提前进入房东工作流或偏重服务的部署都可能增加资本需求。
  - Rule of 40 看起来异常强，因为 Y2 收入仍小；投资者应更重视试点转化、回收期和实施可复制性。
