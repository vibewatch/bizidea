  validationPlan:
  - priority: high
    question: How many reviewer hours per quarter are currently lost to evidence chasing and ambiguous categorisation in 1000-client digital firms?
    evidenceToGather: Collect anonymised close logs from 5-10 target firms, including touches per client, source-document gaps, and reviewer rework time by client segment.
  - priority: high
    question: Will firms buy an overlay on top of Xero/QuickBooks/FreeAgent, or do they expect this functionality to live inside existing tax software?
    evidenceToGather: Run 10-15 buyer interviews across practice owners and ops leads with mock workflows showing overlay versus replacement options.
  - priority: medium
    question: 'Which income categories create the highest exception rate under quarterly filing: trades, delivery, property, CIS, or mixed-income cases?'
    evidenceToGather: Review sample ledgers and filing packs from design partners to rank exception density and reviewer effort by vertical.
  - priority: medium
    question: Can supporting-agent and multi-software workflows be implemented cleanly enough for split operational ownership inside firms?
    evidenceToGather: Pilot against HMRC-compatible software combinations and map failure points in authorisation, quarterly updates and final declaration handoff.
