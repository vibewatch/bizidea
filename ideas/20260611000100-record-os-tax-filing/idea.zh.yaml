businessModelCanvas:
  customerSegments:
    - 服务个体经营者的英国在线会计机构
    - 专注自雇工作者的记账机构
    - 后期阶段的房东及混合收入税务机构
  valuePropositions:
    - 将季度凌乱账目转化为审核员可直接接手的 HMRC 申报包
    - 减少初级记账员返工，消除审核人瓶颈
    - 为签发和通知应对建立凭证追溯链
  channels:
    - 创始人主导销售，直接接触数字化会计机构
    - 与记账外包商和审核人网络建立合作关系
    - 英国会计行业展会和行业社群
  customerRelationships:
    - 以高触达方式在一个审核团队和一批客户中完成初始部署
    - 围绕例外率、审核人处理效率和申报周期共同复盘 KPI
    - 从一个业务板块扩展至房东和混合收入账目
  revenueStreams:
    - 按机构收取 SaaS 订阅费
    - 按活跃客户每季度收取使用费
    - 高级通知应对和外包审核模块
  keyResources:
    - 交易分类和凭证关联模型
    - 与记账、银行和文件系统的集成
    - 审核人反馈和例外项解决数据
  keyActivities:
    - 将原始账目对账整理为达到申报标准的账本
    - 将例外项连同完整上下文路由给人工审核员
    - 按客户队列衡量并持续改进收结速度和申报准确率
  keyPartners:
    - 数字化会计机构
    - 记账和税务审核服务网络
    - 会计软件和银行流水提供商
  costStructure:
    - 模型开发和文档处理
    - 会计软件集成和客户入驻
    - 客户成功和工作流实施
    - 垂直销售和合规运营
jobsToBeDone:
  - job: 当季度 HMRC 截止日临近时，帮助数字化会计机构快速生成审核员可直接接手的个体经营者申报包，让机构在不增加审核人手的情况下按时提交。
    currentAlternative: 在 Xero 或 QuickBooks 中由初级记账员对账，配合电子表格和邮件追收收据
    successMetric: 每位持证税务专业人员每季度处理的活跃客户数量
  - job: 当某笔交易缺乏明确支持凭证时，帮助审核员立即看到精确缺失证据和最可能的分类，直接解决例外项，而非手工重建档案。
    currentAlternative: 邮件线程、文件夹和手工账本重建
    successMetric: 例外项解决时长缩短，申报后纠错次数减少
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 多个同日来源将该市场与活跃监管指令、实时融资和具体混合工作流相关联，而非基于推测性行为变化。
  painIntensity:
    score: 5
    rationale: 季度申报将低利润税务准备变成审核人手有限的机构的周期性运营负担。
  wedgeClarity:
    score: 5
    rationale: 为数字化会计机构提供凭证收结和例外项路由，是一款有明确买家和清晰 ROI 指标的窄切入产品。
  defensibility:
    score: 4
    rationale: 防御性应来自审核人工作流数据、例外项解决模式和记账集成，尽管初始类别切换成本处于中等水平。
  ventureScale:
    score: 4
    rationale: 滩头市场可以扩展到更广的记账、通知应对和嵌入式自雇金融业务，但仅靠英国税务本身规模不够。
topRisks:
  - name: 审核人信任缺口
    description: 如果持证审核员不信任凭证包，产品就会沦为另一款仍需全程手工核查的草稿生成器。
    mitigation: 以仅处理例外项的审核模式上线，为每个建议分类附上溯源链接，并在早期队列中验证编辑率降低的效果。
  - name: 集成蔓延
    description: 各机构使用不一致的记账、文件和银行流水设置，可能让入驻成本高企且系统脆弱。
    mitigation: 以 Xero 和 QuickBooks 为核心切入，围绕最常见的数据来源类型标准化摄入流程，并以数据卫生为前提筛选早期客户。
  - name: 监管边界情形
    description: HMRC 规则调整或小众收入类别可能打破自动化假设，制造申报风险。
    mitigation: 保留人工审批环节，按客户队列维护规则和例外项库，逐类别扩展覆盖范围，不要过早声称实现全面自动化。
