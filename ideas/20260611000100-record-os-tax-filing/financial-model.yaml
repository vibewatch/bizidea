scenarios:
  downside:
    description: Incumbent tools remain good enough for more firms, conversion slows, and the company exits Y3 with 40 paying firms at a lower blended contract value.
    y3RevenueK: 2870.0
    y3EbitdaK: 59.4
    cashLowPointK: 525.6
    keyAssumptionChanges:
    - Quarter-end Y3 customers fall from 18, 32, 49, 60 to 14, 24, 31, 40.
    - Blended annual revenue per customer drops from $132K to $120K as buyers keep deployments to smaller cohorts.
    - Gross margin falls from 70% to 67% because onboarding stays more services-heavy.
  base:
    description: Three paid pilots convert into repeatable production deployments, then partner-led distribution helps the company reach the 60-firm SOM by Y3 exit.
    y3RevenueK: 4433.0
    y3EbitdaK: 1238.8
    cashLowPointK: 863.1
    keyAssumptionChanges:
    - Quarter-end customer counts follow A6 and A7.
    - Gross margin stays at the 70% BP target.
    - Hiring follows A9 without pulling forward extra services headcount before repeatability is proven.
  upside:
    description: Design-partner references and accountant-channel partnerships click earlier, pushing the company to 75 paying firms by Y3 exit at a richer blended contract value.
    y3RevenueK: 7228.1
    y3EbitdaK: 3340.3
    cashLowPointK: 1542.1
    keyAssumptionChanges:
    - Quarter-end Y3 customers rise from 18, 32, 49, 60 to 36, 55, 65, 75.
    - Blended annual revenue per customer expands from $132K to $138K through fuller-book rollouts and adjacent-module attach.
    - Gross margin improves from 70% to 72% as implementation playbooks reduce manual work.
sensitivity:
- variable: ARPU
  downsideCase: Average contract value settles near $120K because firms deploy on narrower client cohorts.
  baseCase: Average contract value stays at $132K as modeled.
  upsideCase: Average contract value reaches $138K once more accounts roll out to fuller books.
  y3RevenueImpactK: -403.0
  cashImpactK: -282.0
- variable: CAC
  downsideCase: CAC rises to $40K because founder-led outbound does not translate cleanly into ecosystem sales.
  baseCase: CAC stays at $32K with founder-led sales plus accountant-channel referrals.
  upsideCase: CAC falls to $26K once partner referrals generate warmer pipeline.
  y3RevenueImpactK: 0.0
  cashImpactK: -240.0
- variable: churn
  downsideCase: Monthly churn rises to 3.0% because firms treat the product as a one-season MTD helper.
  baseCase: Monthly churn stays at 2.2% as modeled.
  upsideCase: Monthly churn falls to 1.5% once provenance and evidence-request workflows become embedded.
  y3RevenueImpactK: -310.0
  cashImpactK: -217.0
- variable: sales cycle
  downsideCase: Pilot-to-production stretches toward 6 months because reviewer sign-off and integration review take longer.
  baseCase: Pilot-to-production stays around one quarterly cycle plus procurement.
  upsideCase: References shorten the cycle toward 3 months.
  y3RevenueImpactK: -620.0
  cashImpactK: -430.0
- variable: gross margin
  downsideCase: Gross margin stays near 67% because deployments remain support-heavy.
  baseCase: Gross margin holds at the 70% BP target.
  upsideCase: Gross margin reaches 72% as supported stacks standardize.
  y3RevenueImpactK: 0.0
  cashImpactK: -190.0
- variable: hiring pace
  downsideCase: A second platform engineer and customer-success hire are pulled forward before the channel motion is repeatable.
  baseCase: Hiring follows A9 and stays disciplined until production conversion is proven.
  upsideCase: Noncritical hires slip later because repeatable integrations reduce service load.
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by growing paying firms from 10 at Y2 exit to 60 at Y3 exit while maintaining a roughly $132K blended customer-year value.
- checkName: Must go right
  finding: The product must convert paid pilots into production rollouts quickly enough that partner-led distribution can take over from pure founder selling in Y2-Y3.
- checkName: Model breaks if
  finding: The biggest cash risk is a slower pilot-to-production cycle combined with narrower cohort rollouts, because that cuts both Y3 revenue and the cash cushion in the downside case.
- checkName: Next-round proof
  finding: The seed case is strongest once the company has 10 production firms, measured 25%+ reviewer-throughput gains, and evidence-request workflows live with buffer cash still on hand.
sanityChecks:
  ruleOf40: Y3 growth 471.7% + EBITDA margin 28.0% = 499.7% (directionally strong but inflated by the small Y2 base).
  burnMultiple: About 0.8x in Y2 on net new ARR, then negative burn in Y3 as EBITDA turns positive by Q2.
  revenuePerFte: $341K Y3 revenue per end-of-year FTE (vs. roughly $200K-$400K SaaS benchmark).
  flags:
  - The base case still requires a real channel contribution in Y2-Y3; founder-led outbound alone is unlikely to support a 60-firm exit.
  - Gross margin only stays at 70% if onboarding becomes repeatable on a narrow Xero/QuickBooks-led stack before broader segment expansion.
  - The model assumes no additional financing after the pre-seed, so any pull-forward into landlord workflows or services-heavy deployments would likely increase the capital need.
  - Rule of 40 looks unusually strong because Y2 revenue is still small; investors should weight pilot conversion, payback, and implementation repeatability more heavily.
