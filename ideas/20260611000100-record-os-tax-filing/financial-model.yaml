modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: '[BP date] Base case assumes the pre-seed closes and spend starts the month after the plan date.'
- id: A2
  name: Starting cash after pre-seed close
  value: '2.2'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M; BP fundingAsk runwayMonths 18] Base case uses a $2.2M pre-seed, near the low end of the stated range, because the wedge stays narrow through Y1.'
- id: A3
  name: Blended annual revenue per paying firm
  value: '132.0'
  unit: USDK per customer-year
  source: '[BP gtm.pricing; BP investorMemo.firstCustomer initialContract; Research market.bottomUpSizingDrivers annual software spend] Modeled as roughly $18K platform plus about $38 per active client-quarter across an average 750-client production cohort, below the 900-client SOM case to allow for partial-book rollouts.'
- id: A4
  name: Gross margin
  value: '70'
  unit: percent
  source: '[BP businessModel targetGrossMarginPct]'
- id: A5
  name: Y1 customer landing pattern
  value: 'Month-end customers: 0,0,0,1,1,1,2,2,2,3,3,3'
  unit: count
  source: '[BP milestones 0–12 months; BP experimentRoadmap] Anchors the first year to three paid quarterly-close pilots.'
- id: A6
  name: Y2 quarter-end customers
  value: Q1Y2 4; Q2Y2 6; Q3Y2 8; Q4Y2 10
  unit: count
  source: '[BP milestones 12–24 months] Assumes the first three pilots convert and the company reaches at least five production firms while carrying a small number of new pilots.'
- id: A7
  name: Y3 quarter-end customers
  value: Q1Y3 18; Q2Y3 32; Q3Y3 49; Q4Y3 60
  unit: count
  source: '[BP market.som; BP milestones 24–36 months; Research market.som] Base case reaches the stated 60-firm SOM by Y3 exit rather than earlier.'
- id: A8
  name: Loaded annual cash compensation
  value: Founder CEO $90K; Founding engineer $150K; Tax ops lead $120K; Integration engineer $135K; Product lead $135K; Partnerships/AE $150K; Platform engineer $145K; Customer success/implementation $100K; Data/automation engineer $145K; Finance/ops $95K
  unit: USDK per FTE-year
  source: '[BP team] Startup-finance heuristic for a UK-focused pre-seed software company using below-market founder cash comp and market cash for technical hires including payroll burden.'
- id: A9
  name: Hiring cadence
  value: Founder CEO and founding engineer in M1; tax ops in M2; integration engineer in M6; product lead in M9; first AE in M13; platform engineer in M16; first customer-success hire in M18; data/automation engineer in M22; second AE in M25; second customer-success hire in M28; second platform engineer in M31; finance/ops in M34
  unit: timing
  source: '[BP strategicChoices.sequencingRationale; BP team] Engineering is hired first, tax ops second, and channel-oriented GTM later.'
- id: A10
  name: Functional payroll allocation
  value: Founder 70% S&M / 30% G&A; founding, integration, product, platform, and data engineers 100% R&D; tax ops 50% R&D / 50% G&A; customer success 50% S&M / 50% G&A; AE 100% S&M; finance/ops 100% G&A
  unit: allocation
  source: '[BP team rationales; BP operations] Allocation follows ownership of sales, implementation, productization, and admin work.'
- id: A11
  name: Non-payroll S&M spend
  value: $4K monthly before the first AE; $8K monthly through Y2; $12K monthly after the second AE
  unit: USDK per month
  source: '[Startup-finance heuristic] Covers founder-led outbound, travel, events, and sales tooling for an accountant-focused GTM motion.'
- id: A12
  name: Non-payroll R&D spend
  value: $5K monthly before integrations; $7K after the first integration hire; $9K after the first platform engineer; $10K after the data/automation hire; $12K after the second platform engineer
  unit: USDK per month
  source: '[BP product roadmap; Startup-finance heuristic] Captures cloud, model, dev tooling, and integration costs as the product broadens.'
- id: A13
  name: Non-payroll G&A spend
  value: $4K monthly in Y1; $6K monthly in Y2; $8K monthly in Y3
  unit: USDK per month
  source: '[Startup-finance heuristic] Lean legal, finance, insurance, and compliance budgets for a pre-seed UK workflow software company.'
- id: A14
  name: Revenue recognition policy
  value: Recognize each period from the average of opening and closing paying customers
  unit: policy
  source: '[Startup-finance heuristic] Smooths onboarding inside the month or quarter instead of assuming every new logo is live on day one.'
- id: A15
  name: Cash conversion policy
  value: EBITDA approximates cash movement
  unit: policy
  source: '[Startup-finance heuristic] No debt, capex, taxes, or material working-capital swings are modeled for this software-first pre-seed business.'
- id: A16
  name: Customer acquisition cost
  value: '32.0'
  unit: USDK
  source: '[BP gtm channels; Startup-finance heuristic] Assumes founder-led outbound plus ecosystem selling into mid-market accountancy firms with limited paid marketing.'
- id: A17
  name: Monthly churn
  value: '2.2'
  unit: percent
  source: '[BP investorMemo.mustBeTrue; Startup-finance heuristic] Early workflow software should be sticky once deployed, but pre-product-market-fit churn is still above mature vertical SaaS levels.'
- id: A18
  name: Funding milestone for the next round
  value: Reach 10 production firms, prove 25%+ reviewer-throughput gains, and ship evidence-request workflows while keeping six months of cash buffer
  unit: milestone
  source: '[BP milestones 12–24 months; BP fundingAsk useOfFundsSummary] Used to size the pre-seed ask.'
