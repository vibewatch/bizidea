scenarios:
  downside:
    description: Procurement stretches toward 12 months, blended ACV stalls near $26K, and customer ramp reaches only 24 airports by M36.
    y3RevenueK: 546.1
    y3EbitdaK: -685.9
    cashLowPointK: -260.2
    keyAssumptionChanges:
      - Pilot-to-production conversion slips below the 50% BP target.
      - Blended monthly ARPU tops out near $2.2K instead of $2.5K.
      - New logo pace slows so M24 ends at 15 airports instead of 20.
  base:
    description: Chennai reference converts into a steady India ramp, landing 20 airports by M24 and 30 by M36 on a ~$30K blended ACV.
    y3RevenueK: 789.8
    y3EbitdaK: -510.3
    cashLowPointK: 37.7
    keyAssumptionChanges:
      - Customer milestones match BP targets of 5, 20, and 30 airports by M12, M24, and M36.
      - Gross margin stays at the BP target of 72%.
      - Hiring follows the lean expansion plan in assumptions A11-A14.
  upside:
    description: Reference-led pull works faster, upsells land earlier, and the company exits Y3 with 38 airports and a broader module mix.
    y3RevenueK: 1140.4
    y3EbitdaK: -257.9
    cashLowPointK: 378.2
    keyAssumptionChanges:
      - Paid pilots convert faster and produce 24 airports by M24.
      - Blended monthly ARPU rises above $3.0K by late Y3 through module expansion.
      - The same hiring plan supports a larger installed base before another sales hire is needed.
sensitivity:
  - variable: ARPU
    downsideCase: Exit ARPU holds at $2.2K/mo because upsell and larger-airport mix do not materialize.
    baseCase: Exit ARPU reaches $2.5K/mo, matching the research-modeled $30K ACV.
    upsideCase: Exit ARPU reaches $3.0K/mo as gate allocation and analytics upsells gain traction.
    y3RevenueImpactK: -79.0
    cashImpactK: -56.9
  - variable: CAC
    downsideCase: CAC rises to $22K because founder-led travel and long pilots persist.
    baseCase: CAC is $18K per airport.
    upsideCase: CAC falls to $14K on stronger AOAI referrals and Chennai-led inbound.
    y3RevenueImpactK: 0.0
    cashImpactK: -100.0
  - variable: churn
    downsideCase: Monthly churn reaches 2.5% if ROI is not durable after pilot conversion.
    baseCase: Monthly churn stays at 1.2%.
    upsideCase: Monthly churn falls to 0.5% because compliance workflows become sticky.
    y3RevenueImpactK: -60.0
    cashImpactK: -43.0
  - variable: sales cycle
    downsideCase: Pilot-to-production stretches toward 12 months and procurement requires fuller RFP motion.
    baseCase: Airports convert in roughly 9 months from first meeting to production contract.
    upsideCase: Chennai reference compresses cycle toward 6 months for follower airports.
    y3RevenueImpactK: -180.0
    cashImpactK: -150.0
  - variable: gross margin
    downsideCase: Gross margin lands at 68% because manual integrations and support stay high.
    baseCase: Gross margin holds at 72%.
    upsideCase: Gross margin improves to 76% as onboarding becomes more standardized.
    y3RevenueImpactK: 0.0
    cashImpactK: -32.0
  - variable: hiring pace
    downsideCase: Two hires are pulled forward by six months before reference density is proven.
    baseCase: Hires follow the staged ramp in assumptions A11-A14.
    upsideCase: Two later-stage hires are deferred until paid pilots convert.
    y3RevenueImpactK: -20.0
    cashImpactK: -120.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Outreach[Reference-led outreach] --> Pilots[30-day paid pilots]
      Pilots --> Conversions[Production airports]
      Conversions --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[72% gross profit]
      GrossProfit --> Opex[Headcount + travel + compliance]
      Opex --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven mainly by growing from 5 to 20 to 30 paying airports while blended ACV steps up from pilot pricing toward the research-modeled $30K annual level.
  - checkName: Must go right
    finding: The model needs Chennai to keep compressing sales cycles so a two-to-three seller motion can land 20 airports by Month 24 without adding a heavier field team.
  - checkName: Model breaks if
    finding: If procurement stretches toward the downside case and exit ARPU stalls near $2.2K per month, cash goes negative before the company reaches the Month 24 proof point.
  - checkName: Next-round proof
    finding: The next financing is justified when Blunav shows 20 production airports, ~$600K ARR, and evidence that module expansion can lift ACV above the narrow India-only wedge.
sanityChecks:
  ruleOf40: "Y3 growth 100.6% + EBITDA margin -64.6% = 36.0%."
  burnMultiple: "Y3 burn multiple 1.7x = $510.3K burn / $300K net new ARR (from $600K ARR at M24 to $900K ARR at M36)."
  revenuePerFte: "$64K exit ARR per Q4Y3 FTE ($900K ARR / 14 FTE), below the $200–400K SaaS benchmark."
  flags:
    - The India-only wedge is economically narrow, so revenue per FTE stays well below normal SaaS efficiency until ACV expands or international markets open.
    - BP Month 33 calls for average ACV of at least $38K, but Month 36 also calls for 30+ airports and ~$900K ARR; the base case therefore keeps portfolio ACV near $30K and treats upsell ACV lift as partial, not universal.
    - Seed cash barely lasts through Y3 in the base case, so any delay in AAI integration access or pilot conversion would force an earlier round.
