assumptions:
  - id: A1
    name: Model start month
    value: "2026-06"
    unit: yyyy-mm
    source: "[BP date; BP executiveSummary says seed closes May 2026]"
  - id: A2
    name: Seed capital modeled at start
    value: "1.5"
    unit: M USD
    source: "[BP fundingAsk targetFundingRangeUsd $1–2M; BP executiveSummary references a $1M seed, with model using midpoint-plus buffer for 24 months of runway]"
  - id: A3
    name: Starting paid airports
    value: "0"
    unit: airports
    source: "[BP milestones Month 3 Chennai contract formalized; base case starts with no contracted airport in M1 and first paid logo in M3]"
  - id: A4
    name: Customer ramp
    value: "5 airports by M12; 20 by M24; 30 by M36"
    unit: airports
    source: "[BP milestones Month 12 5 production airports; Month 24 20 production airports; Month 36 30+ airports]"
  - id: A5
    name: Blended annual ACV
    value: "Ramps from ~$18K in Y1 pilots to ~$30K at M24–M36"
    unit: USD per airport per year
    source: "[BP gtm.pricing $1.5K–$4.0K monthly tiers; Research market modeled ACV $30K per airport per year]"
  - id: A6
    name: Revenue conservatism
    value: "Base model excludes onboarding fees and professional services"
    unit: policy
    source: "[BP businessModel includes onboarding and services; excluded here so revenue reconciles to customers × subscription ARPU and remains conservative]"
  - id: A7
    name: Gross margin
    value: "72"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A8
    name: Funnel conversion
    value: "15–25% outreach to pilot; 50%+ pilot to production"
    unit: percent
    source: "[BP gtm.funnelTargets; BP investorMemo.mustBeTrue]"
  - id: A9
    name: Monthly churn
    value: "1.2"
    unit: percent
    source: "[Heuristic: compliance-heavy B2B infrastructure SaaS should churn below generic SMB SaaS because audit trail becomes embedded in workflow]"
  - id: A10
    name: Fully loaded CAC
    value: "18.0"
    unit: K USD per airport
    source: "[Heuristic anchored to BP market.buyingProcess 6–18 months, founder-led enterprise/government sales, AOAI travel, and pilot support burden]"
  - id: A11
    name: Initial team from business plan
    value: "CEO + CTO + founding engineer at M1; CS in M3; first sales hire in M6"
    unit: hires
    source: "[BP team; BP fundingAsk.useOfFundsSummary]"
  - id: A12
    name: Expansion hires
    value: "Add second engineer in M10, second CS in M13, second sales in M15, third engineer in M19, admin in M21, fourth engineer in M25, third sales in M31, fourth CS in M34"
    unit: hires
    source: "[Heuristic: support 20–30 airports with reference-led sales and 90-day onboarding while staying lean]"
  - id: A13
    name: Loaded salary bands
    value: "CEO $78K, CTO $96K, engineer $72K, CS $48K, sales $60K, admin $54K"
    unit: USD per FTE per year
    source: "[Heuristic: India seed-stage govtech/vertical SaaS payroll, loaded with taxes and benefits]"
  - id: A14
    name: Non-payroll operating spend
    value: "S&M $5K–$15K/mo, R&D tools/cloud overhead $2K–$3K/mo, G&A $4K–$6K/mo"
    unit: USD per month
    source: "[Heuristic anchored to airport travel, compliance/legal, and software tooling for a seed-stage infra startup]"
  - id: A15
    name: Cash conversion
    value: "EBITDA approximates operating cash flow"
    unit: policy
    source: "[Heuristic: minimal capex and working-capital effects at seed stage; annual prepay upside not modeled]"
  - id: A16
    name: Next-round milestone
    value: "20 production airports and ~$600K ARR by M24, with six months of cash buffer through M30"
    unit: milestone
    source: "[BP milestones Month 24 20 production airports and ARR ≥$600K; BP fundingAsk says 12–24 months of runway]"
