problem: 全球许多小型和中型机场仍靠无线电协同、Excel 表格和 WhatsApp 群组运转，因为 SITA、Amadeus、IBS 等企业级航空软件通常要多年实施周期，且年合同金额超过 $500K。这会带来能量化的运营浪费：跑道占用时间比可实现水平高出 20–30%，过站延误层层传导成机位冲突，监管部门也越来越要求数字化审计轨迹，而纸质化机场根本拿不出来。仅在印度，就有 50+ 个新的 UDAN 区域机场正在启用，却没有负担得起的软件路径去满足 DGCA 合规要求。
targetUser:
  primary: 印度或其他新兴市场中小型区域机场（年旅客吞吐量低于 500 万人次）的机场总监或运营经理
  secondary: 同一机场的地服主管和航司联络官
  buyer: 掌握运营软件预算的机场总监或机场管理机构 IT 负责人
startupThesis:
  nonObviousInsight: 企业级航空软件厂商的商业模式是按大型枢纽机场设计的，长期没有服务好 1000+ 个小机场，问题不在于做不到，而在于传统销售需要庞大的驻场实施团队和多年合约，只有大规模项目才算得过来。云端 SaaS 把部署成本底线几乎抹平，首次让按架次订阅成为可能。Blunav 在 Chennai 的试点不只是产品演示，它证明政府机场管理机构会在试点后几周内采纳并真正把这类低价软件嵌入运营。
  beachhead: 印度接入 UDAN 的区域机场，年旅客量 100 万到 500 万，正面临 DGCA 数字化报送要求，但空侧运营仍主要依赖无线电、纸面和表格
  wedge: 跑道占用与飞机过站优化器：用一个统一仪表盘监控实时地面停场时间、调度地服人员，并记录带时间戳的事件以满足监管合规
  whyNowCatalyst: 印度的 UDAN 计划正在同时激活数十个此前沉寂的区域机场，形成一批新的机场负责人。他们一上任就要满足数字化合规要求，但现场还没有既有厂商提前卡位。
  ventureScalePath: 先拿下 20–30 个印度 UDAN 机场作为锚点案例，再扩到基础设施投资加速的东南亚和非洲，并随着产品模块变完整，向中型国际机场上探，补齐机位管理、商业收入优化和旅客流量等能力。
solution: 这是一个按月订阅的云原生 Airport Operating System，把跑道排班、机位分配、过站管理和 DGCA 合规报表放进同一个浏览器仪表盘。平台接入实时 ATC 数据流和地服输入，自动识别跑道占用超时并给班组分配下一步任务。机场可通过自助式 onboarding 向导在 2–4 周内上线，而不必经历 12 个月的企业级实施。定价按月度起降架次分层，哪怕每天只有 30 架航班的机场也能负担首单部署。随着运营数据不断累积，平台会识别反复出现的延误模式并给出排班调整建议，自然形成更深的切换成本。
goToMarketSeed:
  firstCustomer: 第一批客户是印度二线城市 30–50 个新近启用的 UDAN 机场中的机场总监（如 Darbhanga、Kishangarh、Deoghar），这些机场每天有 50–300 架次起降，且即将接受 DGCA 数字化运营审计。
  buyingTrigger: 一场已排期的 DGCA 合规审计，或一次接近事故的跑道事件，会迫使机场管理机构在 90 天内证明自己具备数字化监控能力。
  currentAlternative: 主要靠无线电和纸质日志做人工协同，再用 Excel 表格和 WhatsApp 广播群完成班次交接。
  switchingReason: 它能在几周内复制 Chennai 已验证的 22% 跑道效率提升，而不是花上几年；月度订阅成本大致只相当于多雇一名地服人员的薪资，同时还把 DGCA 所要求的数字审计轨迹一并补齐。
  pricingHypothesis: 每个机场每月 $1,500–$4,000，按月度起降量分层；效率收益可在 3–6 个月内回本，因此 ROI 会成为销售中的核心论点。
whyNow:
- point: Blunav 在 Chennai 开展的 20 天试点拿到了政府验证的 22% 跑道效率提升，并立即被纳入日常运营，证明云端机场 OS 不是实验室概念，而是今天就能生产落地的产品。
