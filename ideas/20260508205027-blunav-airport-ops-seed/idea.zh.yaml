differentiator: 与需要 $500K+ 合同和 12 个月企业级部署的 SITA、Amadeus 不同，这个平台以云端 SaaS 形态在 2–4 周内上线，并按起降架次收费，因此对每天只有 30–300 架次的小机场来说，它几乎是唯一具备经济可行性的选择。其切口——跑道占用优化——能在首月就交付可证明、能量化的 ROI，而不是等多年实施结束后才见效，销售周期因此会大幅缩短。创始团队兼具 DRDO 和机场 IT 系统背景，拥有纯软件团队很难复制的监管可信度。早期机场被锁定的原因也不是合同罚则，而是越来越深的运营数据沉淀和流程集成。
conceptDiagram:
  title: 云端机场 OS——价值流
  mermaid: "flowchart LR\n  AirportDir[机场总监] --> Pain[人工运营与合规缺口]\n  Pain --> Platform[云端机场 OS]\n  Platform --> Runway[跑道占用优化器]\n  Platform --> Gate[机位与过站管理]\n  Platform --> Compliance[监管审计轨迹]\n  Runway --> Efficiency[22% 效率提升]\n  Gate --> Efficiency\n  Compliance --> Audit[通过 DGCA 审计]\n  Efficiency --> Outcome[更多航班 更低成本 更高监管安全性]\n  Audit --> Outcome\n"
businessModelCanvas:
  customerSegments:
  - 印度 UDAN 航线下年旅客量低于 500 万人次的小型和中型机场
  - 正从人工运营升级的东南亚和非洲区域机场
  - 由同一运营方管理多个小机场的机场管理机构
  valuePropositions:
  - 数周内就能部署 22% 的跑道效率提升，而不是几年后才见效
  - 按架次计费的低价 SaaS，替代多年期企业软件合同
  - 用符合 DGCA 要求的数字化审计轨迹替代纸质日志
  - 一个统一仪表盘整合航班运行、机位管理、地服协同和合规
  channels:
  - 直接触达在 DGCA 注册的机场总监
  - 通过印度机场运营商协会活动和业内转介绍获客
  - AAI 及各邦航空部门的政府采购门户
  - 在多个机场落地的地服公司作为渠道伙伴
  customerRelationships:
  - 通过自助式 onboarding 向导在 2–4 周内上线
  - 部署后前 90 天配备专属客户成功联系人
  - 每年用效率和合规指标做一次高层业务复盘
  revenueStreams:
  - 按机场收取的月度 SaaS 订阅费，依据起降量分层（每月 $1,500–$4,000）
  - 针对有遗留系统的机场收取一次性 onboarding 和数据迁移费
  - 为 ATC 和航司系统提供定制集成的专业服务
  keyResources:
  - 实时 ATC 数据接入能力
  - 对 DGCA 合规要求和认证路径的行业理解
  - Chennai International Airport 的案例与运营数据集
  - 用于实时事件处理和时间戳记录的云基础设施
  keyActivities:
  - 开发移动端地服应用和实时运营仪表盘
  - 与 DGCA 和 AERA 做监管沟通
  - 为新机场上线，并沉淀可公开发布的效率案例
  - 在更多市场扩展 ATC 与航司数据集成
  keyPartners:
  - Airports Authority of India，可同时作为分发渠道和数据提供方
  - AISATS、Bird Group 等地服公司，可作为转售渠道
  - DGCA，用于对齐合规标准和认证要求
  - 新市场中的 ATC 数据提供方
  costStructure:
  - 云基础设施与 ATC 数据流（按机场配置）
  - 产品研发与数据集成工程团队
  - 客户成功与 onboarding 人员
  - 监管事务与合规团队
jobsToBeDone:
- job: 当 DGCA 审计已排期且只剩 90 天时，帮助机场总监把所有空侧运营事件数字化并加上时间戳，让他们无需事后手工补录，也能拿出经得起审计的合规记录。
  currentAlternative: 在审计前一周，靠纸质日志、无线电通话记录和人工汇总的 Excel 报表临时拼材料。
  successMetric: 与运营记录相关的审计问题为零；审计准备时间从两周缩短到两小时。
- job: 当区域航线密度提升时，帮助机场运营经理缩短跑道占用时间，使其在不新增基础设施的前提下，仍能在高峰时段承接更多航班。
  currentAlternative: ATC、地服和机位代理之间临时用无线电协调，没有统一的时序和节点可视化。
  successMetric: 上线 30 天内，借助自动时间戳把跑道占用时间降低至少 15%。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Chennai International Airport 的真实政府部署以及 $1M 机构种子轮，都是很强且可验证的信号；但现阶段只有一个参考机场，因此未打到 5 分。
  painIntensity:
    score: 4
    rationale: 在真实政府机场中出现了能量化的 22% 效率损失，这个痛点具体且有数据；DGCA 合规压力又进一步把紧迫性从效率问题抬升到了监管问题。
  wedgeClarity:
    score: 5
    rationale: 跑道占用优化器是一个单点模块，对应明确 KPI（每架飞机占用秒数），又有 Chennai 的已验证基准，因此它几乎是销售沟通里最清晰的切口。
  defensibility:
    score: 3
    rationale: 云端 SaaS 本身不构成护城河，但随着运营数据沉淀、ATC 数据接入和 DGCA 合规流程嵌入，平台会形成中等强度的切换成本；行业背景深的创始团队能增加可信度，但还不算结构性护城河。
  ventureScale:
    score: 4
    rationale: 仅印度就有 150+ 个机场，其中大量小机场尚未被服务；再加上东南亚和非洲，还有数百个潜在目标。全球机场管理软件市场约为 $5B，而小机场仍是明显未被充分覆盖的细分。
topRisks:
- name: 政府采购延迟
  description: 机场管理机构多属政府主体，采购流程缓慢，即使产品明显更好，也可能把成交周期拖到 12–24 个月。
  mitigation: 先用 Chennai 案例拿 MoU 或付费试点，而不是一开始就追求完整合同，让正式采购流程慢慢走、部署先跑起来。
- name: 既有厂商下沉扩张
  description: SITA 或 Amadeus 可能推出面向小机场的精简云版本，借助既有航司关系和 IATA 认证挤压新进入者。
  mitigation: 在既有厂商注意到这个细分前，先用多年订阅和深度运营数据集成锁定前 20 个 UDAN 机场；按架次定价的模式也让对手很难在成本结构上直接跟进。
- name: ATC 数据接入依赖
  description: 产品的实时价值依赖接入 Airports Authority of India 控制的 ATC 数据流，而 AAI 可能限制或延迟第三方软件厂商的 API 访问。
  mitigation: 先用机场自有的地面 MLAT 和 ADS-B 接收器配合观察者模式启动，降低对 AAI API 审批的依赖，再并行推进正式接入谈判。
