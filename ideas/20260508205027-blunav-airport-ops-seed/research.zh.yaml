  - 2
- point: 据称 Chennai 在试点后已把 Blunav 纳入日常运营，使其参考价值更高。
  sourceRefs:
  - 1
  - 2
- point: AAI 报告显示，UDAN 下的区域机场数量足够大，足以支撑一个聚焦滩头市场的销售打法。
  sourceRefs:
  - 7
  - 8
- point: 云原生同行已经开始把低基础设施、模块化部署的机场软件卖点公开化。
  sourceRefs:
  - 32
  - 33
