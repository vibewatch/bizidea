competitors:
- name: SITA
  stage: 既有厂商
  wedge: 围绕多方协同的一体化机场管理与协同决策。
  pricing: 企业级询价；公开产品页会把买家引导到演示和销售，而不是自助定价。
  strength: 全球机场覆盖面广，CDM 位置强，运营产品线也完整。
  weaknessVsUs: 相比面向小机场的跑道切口，部署更重、产品也更偏大而全。
  sourceRefs:
  - 26
  - 27
- name: Amadeus
  stage: 既有厂商
  wedge: 以 AODB 为核心的机场运营栈，覆盖资源管理和序列优化。
  pricing: 企业级询价；公开材料强调产品组合和销售接触，而非明示价格。
  strength: 拥有深度航班时刻数据、多机场公信力，以及 Finavia 等成熟案例。
  weaknessVsUs: 相比印度小机场语境，更偏企业级广度而非本地轻量化。
  sourceRefs:
  - 29
  - 30
  - 31
- name: AeroCloud
  stage: 成长型公司
  wedge: 面向希望降低前期 IT 负担机场的云原生模块化运营系统。
  pricing: 模块化 / 定制化；公开材料强调没有用户许可费、基础设施前期成本更低。
  strength: 云原生定位鲜明，也明确吸引那些想要轻部署的机场。
  weaknessVsUs: 公开证明点更多是泛化的机场效率提升，而不是印度场景下的跑道占用单点切口。
  sourceRefs:
  - 32
  - 33
- name: Veovo
  stage: 成长型公司
  wedge: 以 ML 驱动的机场资源管理、AODB 和运营优化。
  pricing: 官网公开口径为定制化询价。
  strength: 资源规划能力强，也有 Edinburgh Airport 这类明确案例。
  weaknessVsUs: 从公开信息看，并没有特别围绕印度公立区域机场的合规打法来设计。
  sourceRefs:
  - 34
  - 35
- name: ADB SAFEGATE
  stage: 既有厂商
  wedge: 围绕停机坪、对接、AODB 和传感器驱动的空侧运营。
  pricing: 偏企业项目式定价；官网更多是宣传册而非自助价格。
  strength: 在空侧场景上公信力强，围绕停机坪活动的数据采集也更丰富。
  weaknessVsUs: 它的历史包袱更偏传感器和基础设施，较难塞进低摩擦、软件优先的部署模式。
  sourceRefs:
  - 36
  - 17
regulatoryTechnicalConstraints:
- point: DGCA 文档体系和机场手册要求，意味着机场必须建立经得起审计的流程与记录。
  sourceRefs:
  - 12
  - 13
- point: 公立机场采购需要正式的采购和合同纪律，这会拖慢软件采用。
  sourceRefs:
  - 23
  - 24
- point: 要真正拿到 A-CDM 式价值，机场、航司、地服和 ATC 之间必须共享节点数据。
  sourceRefs:
  - 17
  - 20
- point: 想做出真正的运营优化，往往仍需要接入 AODB 或其他实时数据源。
  sourceRefs:
  - 29
  - 34
  - 36
