  coverageGap: 这是一个偏细分的机场运营主题，新闻窗口也只覆盖一天的种子轮事件。在剔除被拦截、重复或价值偏低的结果后，我保留了 42 个已抓取验证、且不重复的页面。若干厂商官网只公开了少量产品页，部分机场科技资料又被反爬、宣传册下载页或付费分析摘要挡住，因此我选择记录最强、最站得住脚的语料，而不是为了凑到 100 条去塞入弱镜像源。
