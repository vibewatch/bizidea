  sam:
    value: $2.9M
    rationale: 滩头市场 SAM 按 95 个已在 UDAN 下投运的 RCS 机场 × $30k 年 ACV 估算，这是面向低价云端运营切口最清晰的印度区域机场客群。
    isEstimate: true
    sourceRefs:
    - 7
    - 8
  som:
    value: $0.6M
    rationale: 第 3 年 SOM 假设签约 20 个机场 × $30k 年 ACV；如果一个参考部署能变成更广泛的 AAI 或公立机场信任，这一目标虽然激进，但仍可达成。
    isEstimate: true
    sourceRefs:
    - 1
    - 8
    - 23
