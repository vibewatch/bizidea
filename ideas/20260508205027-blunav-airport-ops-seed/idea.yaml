problem: >-
  Small and mid-sized airports globally operate on manual workflows—radio coordination, Excel
  spreadsheets, and WhatsApp groups—because enterprise aviation software from SITA, Amadeus,
  and IBS requires multi-year implementation cycles and contracts exceeding $500K annually.
  This creates measurable operational waste: runway occupancy runs 20–30% higher than achievable,
  turnaround delays cascade into gate conflicts, and regulators are increasingly mandating
  digital audit trails that paper-based airports cannot produce. India alone is activating
  50+ new UDAN regional airports with no affordable software path to DGCA compliance.
targetUser:
  primary: Airport director or operations manager at a small-to-mid-sized regional airport (under 5M annual passengers) in India or another emerging-market country
  secondary: Ground handling supervisor and airline liaison officer at the same airport
  buyer: Airport director or the airport authority IT head who controls the operations software budget
startupThesis:
  nonObviousInsight: >-
    Enterprise aviation software vendors designed their commercial models for major hubs and have
    never served the long tail of 1,000+ small airports—not because the problem is unsolvable,
    but because the traditional sales motion required large on-site implementation teams and
    multi-year contracts that were only economical at scale. Cloud SaaS removes the deployment
    cost floor entirely, making a per-flight subscription viable for the first time. Blunav's
    Chennai pilot is not just a product demo—it is proof that a government airport authority
    will adopt and operationally integrate affordable software within weeks of a trial.
  beachhead: >-
    UDAN-connected regional airports in India with 1–5M annual passengers that are under DGCA
    digital reporting mandates but currently run airside operations on radio, paper, and
    spreadsheets
  wedge: >-
    Runway occupancy and aircraft turnaround optimizer: a single dashboard that monitors
    real-time aircraft ground time, dispatches ground handling crews, and records timestamped
    events for regulatory compliance
  whyNowCatalyst: >-
    India's UDAN scheme is activating dozens of previously dormant regional airports
    simultaneously, creating a cohort of new airport directors with mandated digital compliance
    requirements and no incumbent software vendor already entrenched.
  ventureScalePath: >-
    Win 20–30 Indian UDAN airports as anchor references, expand to Southeast Asia and Africa
    where airport infrastructure investment is accelerating, and grow upmarket to mid-tier
    international airports with a fuller suite of gate management, commercial revenue
    optimization, and passenger flow modules.
solution: >-
  A cloud-native Airport Operating System delivered as a monthly SaaS subscription that
  integrates runway scheduling, gate allocation, turnaround management, and DGCA compliance
  reporting on a single browser-based dashboard. The platform ingests real-time ATC feeds
  and ground handler inputs to flag runway occupancy overruns and auto-assign next tasks
  to crews. Airports go live in 2–4 weeks via a self-serve onboarding wizard rather than
  a 12-month enterprise implementation. Pricing scales by monthly departure volume, making
  the first deployment accessible to airports handling as few as 30 flights per day.
  As operational data accumulates, predictive analytics surface recurring delay patterns
  and recommend schedule adjustments, deepening switching costs organically.
goToMarketSeed:
  firstCustomer: >-
    Airport director at one of the 30–50 newly operationalized UDAN airports in Tier 2 India
    (e.g., Darbhanga, Kishangarh, Deoghar) with 50–300 daily flight movements and an upcoming
    DGCA digital operations audit
  buyingTrigger: >-
    A scheduled DGCA compliance audit or a runway near-miss incident that forces the airport
    authority to demonstrate digital monitoring capability within 90 days
  currentAlternative: Manual coordination via radio and paper logs supplemented by Excel spreadsheets and WhatsApp broadcast groups for shift handovers
  switchingReason: >-
    Delivers the same 22% runway efficiency gain demonstrated at Chennai in weeks rather
    than years, at a monthly subscription cost comparable to one additional ground handler's
    salary, while simultaneously solving the DGCA digital audit trail requirement
  pricingHypothesis: >-
    $1,500–$4,000 per airport per month tiered by monthly departure volume; efficiency gains
    break even the cost within 3–6 months, making ROI the lead sales argument
