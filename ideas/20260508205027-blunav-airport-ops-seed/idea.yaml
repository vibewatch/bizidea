topRisks:
  - name: Government Procurement Delay
    description: Airport authorities are government entities with slow procurement timelines that can stall even technically superior products for 12–24 months.
    mitigation: Use the Chennai reference to secure a memorandum of understanding or paid pilot agreement rather than a full contract as the initial commitment, allowing faster deployment while formal procurement proceeds.
  - name: Incumbent Downmarket Expansion
    description: SITA or Amadeus could launch a stripped-down cloud tier targeting small airports, leveraging existing airline relationships and IATA certifications to crowd out newcomers.
    mitigation: Lock in the first 20 UDAN airports with multi-year subscriptions and deep operational data integration before incumbents notice the segment; per-departure pricing is structurally impossible for incumbents to match given their cost bases.
  - name: ATC Data Access Dependency
    description: Real-time value depends on integrating ATC feeds controlled by the Airports Authority of India, which may restrict or delay API access to third-party software vendors.
    mitigation: Begin with a sensor-plus-observer model using ground-based MLAT and ADS-B receivers that the airport itself owns, reducing dependency on AAI API approval while the formal integration is negotiated in parallel.
