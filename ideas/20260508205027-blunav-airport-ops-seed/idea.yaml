jobsToBeDone:
  - job: >-
      When a DGCA audit is scheduled within 90 days, help an airport director digitize
      and timestamp all airside operational events so they can produce a defensible
      compliance record without retrospective manual data entry
    currentAlternative: Paper logs, radio transmission records, and manually compiled Excel reports assembled the week before the audit
    successMetric: Zero audit findings related to operational record-keeping; audit preparation time reduced from two weeks to two hours
  - job: >-
      When airline schedule density increases on a regional route, help an airport
      operations manager reduce runway occupancy time so they can accommodate more
      flights in peak hours without building new infrastructure
    currentAlternative: Ad-hoc radio coordination between ATC, ground handlers, and gate agents with no unified visibility into sequence or timing
    successMetric: Runway occupancy time reduction of at least 15% within 30 days of deployment, measured by automated timestamping
