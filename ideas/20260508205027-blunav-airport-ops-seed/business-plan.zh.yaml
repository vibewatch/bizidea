slug: small-airport-cloud-os
date: '2026-05-08'
executiveSummary: Blunav 正在打造一套云原生 Airport Operating System，以月度 SaaS 订阅方式收费，目标客户是印度 95+ 个 UDAN 区域机场。这些机场之所以还在用无线电、纸质日志和电子表格，是因为 SITA、Amadeus 等传统航空软件通常要 $500K+ 合同和 12 个月实施周期。公司在 Chennai International Airport 进行的 20 天政府试点，把跑道占用时间降低了 22%——从每架飞机 59 秒降到 46 秒——并很快进入日常运营，由此拿到一个政府参考案例，显著降低其他公立机场买家的决策风险。真正触发采购的是 DGCA 合规审计或一次接近事故的跑道事件：机场总监必须在 90 天内证明自己具备数字化监控能力；因此首单更可能是付费试点或 MoU，而不是完整的企业合同，从而绕开缓慢的公共采购。2026 年 5 月由 Piper Serica 领投的 $1M 种子轮，为产品扩展和向 UDAN 机场群销售提供了 12–24 个月跑道。以印度为滩头市场，按自下而上的测算，第 3 年在 20 个机场落地可形成约 $0.6M ARR；更长远的路径是随着模块深度提升，向东南亚和非洲扩张。当下最大的执行风险不是产品市场匹配，而是公共采购推进速度。
problem:
- 全球许多小型和中型机场仍靠无线电、Excel 和 WhatsApp 运转，因为企业级航空软件（SITA、Amadeus、IBS）通常要求年合同超过 $500K，并配套 12 个月实施周期——对每天只有 30–300 架次航班的机场来说，这在结构上就不成立。
- 印度正在同时启用 50+ 个新的 UDAN 区域机场；每位新任机场负责人都得选择第一套数字平台，现场又没有既有厂商先占坑，而 DGCA 的合规要求却在持续收紧，数字化审计轨迹也越来越成为默认配置。
- 依赖手动流程的机场，其跑道占用通常比可实现水平高 20–30%；过站延误会进一步引发机位冲突和错失时隙，而监管方越来越要求带时间戳的运营记录，纸质日志根本无法满足。
solution:
- 按月订阅的云原生 Airport OS：把跑道排班、机位分配、过站管理和 DGCA 合规报表放进同一个浏览器仪表盘，并实时接入 ATC 数据。
- 机场可通过自助式 onboarding 向导在 2–4 周内上线；不需要驻场实施团队；定价按月度起降量分层，每天 30 架航班的机场起步约 $1,500/月。
- 随着运营数据累积，系统会识别反复出现的延误模式，持续加深切换成本，同时把单个座位背后的价值不断做厚。
whyWeWin:
- Chennai International Airport 的政府试点是一个硬证据：在 3500+ 架次航班上，基于自动时间戳记录拿到了 22% 的跑道效率提升，而且现在已经进入日常运营——这是任何新进入者都编不出来的资历。
- 按架次计费的 SaaS 定价，在 SITA 或 Amadeus 的成本结构下几乎不可能成立；既有厂商很难靠小于 500 万年旅客量的机场赚钱。
- UDAN 的扩张正在带来一批首次上任的机场负责人，现场没有根深蒂固的供应商，他们更愿意接受一套能在 2–4 周内部署、又能解决紧迫合规截止期的产品。
- 创始团队具备 DRDO、联合国航空项目和机场 IT 系统背景，拥有通过政府采购把关人的监管可信度。
- 即使功能集还未完全展开，运营数据沉淀和 DGCA 审计轨迹深度也会先形成切换成本；一旦机场累计了 12+ 个月带时间戳的事件记录，几乎不会愿意从头更换供应商。
strategicChoices:
  beachhead: 首个滩头市场是印度接入 UDAN 的区域机场：每天 50–300 架次起降，正承受 DGCA 数字报送压力，且尚未部署既有机场运营软件。
  wedgeRationale: 跑道占用优化只有一个可证伪 KPI（每架飞机占用秒数），有 Chennai 已验证的 22% 基准，也有直接的 ROI 叙事（按 $1,500–$4,000/月计算，3–6 个月回本，相当于一名地服人员薪资）。这样形成的是一个“做不做试点”的决策，而不是多年期委员会采购，能压缩销售周期。
  sequencingRationale: 先做跑道/过站切口，因为它能在数周内交付能量化 ROI，同时产出买家本就需要的合规审计轨迹，还能沉淀后续机位管理、旅客流动和商业优化模块所依赖的运营数据深度。招聘顺序上，先配客户成功，再扩销售，因为推动下一座机场成交的不是品牌认知，而是案例密度。国际扩张要等到印度有 15–20 个 logo 真正上线后再启动；各国采购和监管流程差异很大，太早国际化会在尚未验证可复用性前就稀释焦点。
  notYet:
  - 旅客处理和 check-in 软件（需要航司集成，买方也不同）
  - 商业/零售收入优化模块（买方不同，且需要先有更深的 AODB 数据）
  - 年旅客量超过 500 万的大型枢纽机场（企业销售更重、周期更长）
  - 东南亚和非洲扩张（等印度有 15–20 个生产案例后再做）
  - 硬件/传感器制造（MLAT 和 ADS-B 接收器从第三方采购，保持轻资产）
market:
  tam: $4.9M 的印度自下而上市场：163 个在运营机场 × $30k ACV，对应聚焦跑道/过站模块（见 research.yaml 的估算；更大的市场报告往往把大型枢纽系统也一起算进来）。
  sam: $2.9M：截至 2026-03-25，UDAN 下已投运的 95 个 RCS 机场 × $30k 年 ACV。
  som: 第 3 年 ARR 为 $0.6M：20 个签约机场 × $30k ACV——如果 Chennai 的案例能变成更广泛的 AAI 信任，这个目标虽激进但可触达。
  segments:
  - 印度 UDAN 区域机场：每天 50–300 架次航班，面临 DGCA 合规压力，且没有既有运营软件
  - 在 AAI 或邦级管理机构下，负责一组小机场的多机场运营方和地方航空部门
  buyingProcess: 通常由机场总监或机场管理机构 IT 负责人发起付费试点或 MoU（而不是直接签完整合同），触发点是 DGCA 审计期限或跑道安全事件；试点证明 ROI 后，再进入正式采购。公立机场从试点到签约往往需要 6–18 个月。
product:
  mvp: MVP 是实时跑道占用仪表盘，配套自动地面停场时间戳、过站班组调度，以及可导出的 DGCA 合规运营日志——可通过自助式 onboarding 在 2–4 周内部署，无需驻场实施。
  sixMonth: 6 个月内补齐机位分配模块、供地服确认节点的移动应用，以及自动生成的审计前合规报告；同时为另外 3 个 UDAN 机场做更深的 ATC 数据接入。
  twelveMonth: 12 个月内推出多机场运营方仪表盘，服务管理一组机场的管理机构；加入延误根因分析和预测性排班建议；并为需要更深集成的机场启动 ADB SAFEGATE 和 AODB 互操作能力。
  twentyFourMonth: 24 个月内扩展到 20+ 个印度机场；发布东南亚本地化版本（语言、监管映射、ATC 适配器）；上线商业收入优化模块作为 upsell；并开放面向地服和航司系统的伙伴 API。
  keyBets:
  - 自助式 onboarding 能把价值兑现时间压到 30 天以内，这是相对企业级竞争对手最关键的优势。
  - 随着每一架航班和每一次异常事件被记录，运营数据会不断积累，形成更适配机场本地特性的延误模型，让产品在第 12 个月时比第 1 个月更有价值。
  - 把 DGCA 审计轨迹作为默认输出，而不是独立模块，就能让合规自然变成日常使用的副产品，无论效率 ROI 如何，续约理由都会更强。
gtm:
  wedge: 以跑道占用和过站优化器切入，面向即将接受 DGCA 审计或正遭遇跑道吞吐瓶颈的机场总监，售卖 30 天付费试点；试点价格即一个月 SaaS 费用，用来尽量消除采购摩擦。
  channels:
  - 直接触达 DGCA 注册在册、列入 UDAN 名单的机场总监（可通过 AAI 公告公开追踪）
  - 把 Chennai 案例做成具名的政府案例研究，用于同类机场转介绍
  - 借助印度机场运营商协会（AOAI）的活动和邮件网络获得暖介绍
  - 让 AISATS、Bird Group 等地服公司作为渠道伙伴，在多个机场联动部署
  - 针对需要正式 RFP 的机场，通过 AAI 采购门户和各邦航空部门招标进入
  funnelTargets: 外呼 → 合格试点沟通 15–25%；付费试点 → 正式订阅 50%+
  pricing: 按月度起降量分层的月度 SaaS 订阅：每天 30–100 架次约 $1,500/月，100–200 架次约 $2,500/月，200–300 架次约 $4,000/月。定价逻辑是：一个月费用还低于多招一名地服人员的工资，而效率提升能在 3–6 个月内回本，因此 ROI 会成为销售中的主论点。对需要迁移历史数据的机场，再收一次性 onboarding 费用（$2,000–$5,000）。
businessModel:
  revenueStreams:
  - 按机场按月收取的 SaaS 订阅费，按起降量分层（$1,500–$4,000/月）
  - 针对存在遗留系统的机场，收取一次性 onboarding 与数据迁移费（$2,000–$5,000）
  - 为定制化 ATC 或航司集成提供专业服务（按工时计费，不是核心收入）
  unitOfValue: 每个机场的月度起降量
  targetGrossMarginPct: 72
  expansionLevers:
  - 对既有机场做模块扩展：机位管理、商业优化、旅客流量
  - 拿下多机场运营方合同：一个管理机构统一采购一组机场，并给出规模折扣
  - 把印度案例包复制到东南亚和非洲
  - 上架数据分析增值包：预测性延误报告和排班优化建议
strategyMap:
  northStarMetric: 已签约并进入生产环境的机场数（按月付费的活跃机场）
  inputMetrics:
  - 每月启动的付费试点数
  - 试点转生产的转换率（目标 50%+）
  - 首次交付价值所需天数（目标 <30 天）
  - 每个部署机场的跑道占用改善百分比
  - 客户机场在 DGCA 审计中无问题通过的次数
  moatsToBuild:
  - 机场级运营数据图谱：延误模式、地服表现、不同机型的跑道利用率
  - DGCA 审计轨迹深度：12+ 个月带时间戳的事件，离开平台就无法重建
  - ATC 和航司数据集成：按机场定制的数据管道，复制一次要花数月
  - 案例密度：同一管理网络里，每多一个 UDAN 机场转介绍，获取下一个机场的成本就更低
  killCriteria:
  - 种子轮后前 6 个月签下的付费试点少于 3 个
  - 完成 5 个试点后，试点转生产的转换率仍低于 25%
  - 平均进入生产环境时间超过 90 天（说明采购或集成被卡住）
  - Chennai 在进入日常运营后 12 个月内未续约或被降级
  mermaid: "flowchart LR\n  Wedge[跑道效率切口] --> Pilot[30 天付费试点]\n  Pilot --> ROI[30 天内能量化 ROI]\n  ROI --> Production[生产订阅]\n  Production --> Data[机场运营数据图谱]\n  Data --> Stickiness[切换成本持续加深]\n  Production --> Reference[公开案例研究]\n  Reference --> NextAirport[下一个 UDAN 机场]\n  NextAirport --> Pilot\n  Production --> Modules[单机场模块扩展]\n  Modules --> ACV[更高 ACV]\n"
investorMemo:
  verdict:
    call: 建议见面并继续尽调
    conviction: 我对这个切口和验证点的判断较强；核心保留意见在于，公共采购推进速度是否足够快，能让公司把试点及时转成经常性收入，在种子轮跑道内把团队撑起来。
    whyBelieve: 在真实机场里，由政府验证、又能在 20 天试点内进入日常运营的 22% 跑道效率提升，是一个极少数种子期 B2G SaaS 公司能拿出来的可证伪硬证据。
    whyDoubt: 按印度自下而上的测算，第 3 年 SOM 只有约 $0.6M ARR——在模块扩展和国际复制跑通前，这门生意真实但偏窄；而公共采购周期可能把单个 logo 从试点到 ARR 的时间拉长到 18 个月。
    nextDiligence: 需要确认 Chennai 部署当下的商业条款、合同金额和续约状态，并核实种子轮完成后，是否已有至少两个额外的 UDAN 机场同意试点或签署 MoU。
  firstCustomer:
    title: UDAN 区域机场机场总监
    profile: 在 UDAN/RCS 计划下由政府运营的印度区域机场，每天 50–300 架次起降，目前空侧运营仍依赖无线电、纸质日志和 Excel，同时即将面临 DGCA 合规审计，或最近出现过跑道吞吐投诉。
    trigger: 90 天内将进行 DGCA 合规审计，或发生过一次接近事故的跑道事件，迫使管理机构证明自己具备数字化监控能力。
    buyer: 机场总监或机场管理机构 IT 负责人
    initialContract: 30 天付费试点，价格相当于一个月 SaaS 费用（按航班量不同为 $1,500–$4,000）；若试点期内跑道占用改善 ≥15%，则转成 12 个月订阅。
  mustBeTrue:
  - 至少有 10 位 UDAN 机场总监会在 12 个月内把一次暖触达转成付费试点沟通，证明 DGCA 压力确实是购买触发点，而不是团队主观假设。
  - 完成 5 个试点后，试点转生产的转换率能达到 50%+，说明跑道占用 ROI 的叙事在从试验环境切到持续运营后依然成立。
  - Chennai 在进入日常运营后 12 个月内能以不低于原价的水平续约，证明效率提升不是试点阶段的偶然结果。
  - 自助式 onboarding 能稳定地在 30 天内完成上线，且不依赖驻场工程支持，才能维持相对企业竞争对手的结构性成本优势。
  - 通过半自动或观察者模式，新机场的 ATC 或运营数据集成能在 60 天内完成，避免把规模化完全卡死在 AAI API 审批上。
  diligenceQuestions:
  - Chennai International Airport 当下部署的精确商业条款、年度合同金额和续约日期分别是什么？
  - 种子轮结束后，团队已接触了多少位 UDAN 机场总监，目前合格试点或已签 MoU 的 pipeline 到了什么阶段？
  - 在多深的集成条件下（人工节点记录 vs. 完整 ATC 数据流），22% 的跑道效率提升是可复用的？如果集成更浅，ROI 会衰减到什么程度？
  - AAI 运营的区域机场通常把软件采购记为 SaaS opex、项目 capex，还是打包成系统集成合同？除了 Chennai，是否已有其他机场正式发布机场运营软件招标或 RFP？
  - 按政府采购规则，一个典型 UDAN 机场从试点到签约的现实周期到底多长？种子轮跑道是否足以覆盖至少 3 个完整采购周期？
  - 创始团队如何梳理 DGCA 机场手册认证路径，来支撑软件对合规记录的采集与导出？
  riskHeatmap:
  - risk: 政府采购延迟把试点转 ARR 的时间拉长到 18+ 个月
    likelihood: High
    impact: High
    leadingIndicator: Chennai 合同正式采购流程耗时超过 6 个月，或第二个机场试点在 MoU 阶段停滞超过 9 个月。
    mitigation: 把每次合作都设计成能在 30 天内交付能量化 ROI 的付费 MoU 或小范围试点，不要求先拿完整合同才开始确认收入。
  - risk: AAI 限制或延迟第三方 ATC API 访问
    likelihood: Medium
    impact: High
    leadingIndicator: Chennai 的集成仍依赖人工事件录入而不是真实 ATC 数据流，或 AAI 发出通知限制第三方获取运营数据。
    mitigation: 先用机场自有的 ADS-B/MLAT 接收器部署观察者模式，并行推进正式 AAI API 协议，不让第一批部署被卡死。
  - risk: 既有厂商（SITA、AeroCloud）推出印度小机场定价层
    likelihood: Low
    impact: High
    leadingIndicator: SITA 或 AeroCloud 发布印度专属定价、宣布拿下 UDAN 机场案例，或既有客户反馈自己被大厂主动接触。
    mitigation: 在既有厂商注意到这个细分前，用多年订阅和深度运营数据集成先锁定前 15–20 个 UDAN 机场；按架次计费对既有厂商来说结构上很难跟。
  - risk: 如果不做国际扩张，小机场 TAM 可能不足以支撑风投回报
    likelihood: Medium
    impact: Medium
    leadingIndicator: 第 2 年 ARR 低于 $300k 且生产机场少于 10 个，同时东南亚或非洲试点仍未启动。
    mitigation: 在第 18 个月前规划国际试点；优先靠机位、商业、旅客流量等模块扩展，把单机场 ACV 从 $30k 提升到 $45k，而不是只靠增客。
  - risk: 机场内部运营变革管理拖慢试点落地
    likelihood: Medium
    impact: Medium
    leadingIndicator: 试点机场在前 30 天跑道占用改善低于 10%，或地服人员抵触导致节点数据无法持续录入。
    mitigation: 前 90 天由专属客户成功负责，一次只改一个工作流，从最高频的跑道事件开始打样。
operatingAssumptions:
- assumption: UDAN 机场总监会接受 30 天付费试点，而不是在做出任何承诺前先要求完整正式 RFP。
  basis: idea.yaml
  validationTest: 在种子轮完成后 6 个月内，用 MoU 或小范围试点协议结构签下 3 个付费试点，而不是等待完整采购合同。
  decisionImpact: 如果不成立，销售路径就必须切换到以 RFP 为主导、周期长达数月的采购流程，收入兑现时间会拉长，销售预算也要明显提高。
- assumption: Chennai 22% 的跑道效率提升，可以在其他 UDAN 机场以相同或更深的集成水平（ATC 数据流或半自动节点采集）复现。
  basis: idea.yaml
  validationTest: 在前两个非 Chennai 试点中独立测量跑道占用改善，并在上线 30 天内报告真实百分比。
  decisionImpact: 如果改善低于 10%，ROI 叙事会明显变弱，定价就必须从效率节省转向以合规价值为主。
- assumption: 目标机场可以把 $1,500–$4,000/月 作为 SaaS opex 吃下，而不需要走 capex 分类或多年预算审批。
  basis: research.yaml
  validationTest: 在最终确定定价模型前，先与至少 5 个目标机场确认预算科目类型（opex vs. capex）和审批权限。
  decisionImpact: 如果机场只能按 capex 或年度总包采购，就要改成年度预付、按月等值的计价结构，并同步调整现金流模型。
- assumption: 在不依赖正式 AAI API 审批的前提下，通过半自动或观察者模式，新机场的 ATC 数据集成能在 60 天内完成。
  basis: idea.yaml
  validationTest: 在第二个试点机场不依赖正式 AAI API 审批就部署观察者模式 ADS-B/MLAT，并测量集成时间和数据质量。
  decisionImpact: 如果观察者模式无法支撑效率 ROI，产品就会高度依赖 AAI API 接入，扩张到 Chennai 以外的能力会被单点卡死。
- assumption: 到第 3 年拿下 20 个印度机场的 SOM，可以靠一支 2 人销售团队、以案例驱动外呼和 AOAI 渠道关系来实现。
  basis: research.yaml
  validationTest: 在首个 Chennai 案例研究发布后，跟踪未主动触达机场的 inbound 咨询数量；如果 6 个月仍为零，说明案例带来的自然拉动并不成立。
  decisionImpact: 如果案例带不来自然拉动，就必须更早扩销售编制，融资需求会上升，盈利路径也会被拉长。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 确认 Chennai 付费合同
  hypothesis: Chennai 的日常运营采用会在种子轮完成后 90 天内转成正式付费合同，带来首笔 ARR 和一个具名参考客户。
  successMetric: 签下年合同价值 ≥ $18,000 的正式合同，并获得具名案例使用授权。
  owner: CEO / 创始团队
- horizon: 0–90 天
  experiment: UDAN 机场外呼排序
  hypothesis: 用 Chennai 的效率证明点直接触达 20 位 UDAN 机场总监，可在 90 天内产生 5+ 个合格试点沟通。
  successMetric: 预约 5 场合格沟通；至少 2 个试点协议进入谈判。
  owner: CEO
- horizon: 0–90 天
  experiment: 观察者模式集成可行性
  hypothesis: 在没有正式 ATC API 的机场，只用地面 ADS-B 接收器加地服移动端人工输入，也能复现 ≥15% 的跑道占用改善。
  successMetric: 在一个非 Chennai 机场，仅用观察者模式就验证出 ≥15% 的跑道改善。
  owner: CTO / 创始工程师
- horizon: 90–180 天
  experiment: 第二个机场的付费试点转化
  hypothesis: 第二个 UDAN 机场的 30 天付费试点，会凭借能量化的效率改善和合规报表产出，转成 12 个月订阅。
  successMetric: 试点完成后 30 天内签下 12 个月订阅，ACV ≥ $24,000。
  owner: CEO
- horizon: 90–180 天
  experiment: 把 DGCA 合规报表作为独立价值证明
  hypothesis: 未来 60 天内即将接受 DGCA 审计的机场，会把合规审计轨迹而非效率提升，作为首要购买理由。
  successMetric: 启动 2 个试点，且客户明确表示主要触发因素是审计准备，而不是效率。
  owner: 销售 / 客户成功
- horizon: 180–365 天
  experiment: 地服渠道合作
  hypothesis: AISATS 或 Bird Group 会向其既有运营网络中的 3+ 个机场联合销售或推荐 Blunav，降低获取新机场的直接外呼成本。
  successMetric: 与一家地服公司签下 1 份转介绍或联合销售协议；带来 ≥2 个机场引荐。
  owner: CEO / 渠道合作
- horizon: 180–365 天
  experiment: 模块扩展带来 ACV 提升
  hypothesis: 已上线的生产机场会增购机位分配模块，在不额外增加销售投入的前提下，把 ACV 提升 ≥30%。
  successMetric: 至少 3 个机场购买机位模块附加包；平均 ACV 从 $30k 提升到 ≥$38k。
  owner: 产品 / 客户成功
operations:
- 云基础设施：基于 AWS 或 GCP，按机场做租户隔离；实时事件处理管道负责 ATC 数据流和地服移动输入。
- ATC 数据：优先用观察者模式的 ADS-B/MLAT 接收器做集成；更深的自动化则并行推进 AAI API。
- Onboarding：通过机场配置向导自助上线；前 90 天由专属客户成功陪跑。
- 合规：由监管事务负责人维护 DGCA 机场手册映射；可导出 DGCA 要求格式的审计报告。
- 销售路径：基于公开的 AAI UDAN 机场名单做直接触达；以案例研究为核心物料；借 AOAI 网络获取暖介绍。
- 安全：基于角色的访问控制、不可篡改审计日志，以及适配弱网环境的本地数据韧性。
team:
- role: CEO / 联合创始人（航空工程师，具备 DRDO + 联合国航空背景）
  startTiming: 第 0 个月
  rationale: 需要具备监管可信度和政府关系网络，才能穿过 DGCA、AAI 采购体系以及机场管理机构的多重把关；同时由其主导销售和合作拓展。
- role: CTO / 联合创始人（通信工程师，熟悉机场 IT 系统）
  startTiming: 第 0 个月
  rationale: 机场 IT 集成深度（ATC 数据流、AODB 接口、地服移动应用）从第一天就不能缺位；由其负责产品架构和 ATC 数据管道。
- role: 创始全栈工程师
  startTiming: 第 0 个月
  rationale: 负责实时仪表盘、onboarding 向导和合规报表生成器的开发与维护；产品必须维持 2–4 周部署节奏，才能撑住 GTM 承诺。
- role: 客户成功经理
  startTiming: 第 3 个月
  rationale: 每个机场部署后都需要 90 天深度支持，才能推动工作流采用并产出可用于案例和续约的效率数据；因此要在第三个试点落地前招到位。
- role: 销售 / BD（优先考虑有机场运营背景的人选）
  startTiming: 第 6 个月
  rationale: 当 3 个付费试点已经上线，且案例叙事具备可复用性后，一名懂机场运营语境的专职销售就可以并行外呼剩余 UDAN 机场；在验证转化前没必要提前配置。
milestones:
- horizon: 0–12 个月
  items:
  - 第 3 个月：Chennai 合同正式落地，获得具名案例授权，ACV ≥ $18k
  - 第 6 个月：在 UDAN 机场签下 3 个付费试点；在 1 个非 Chennai 机场验证观察者模式集成
  - 第 9 个月：2 个试点转成 12 个月生产订阅；ARR ≥ $48k
  - 第 12 个月：5 个生产机场；2 个机场进入机位分配模块 beta；ARR run rate 达到 $100k
- horizon: 12–24 个月
  items:
  - 第 15 个月：10 个生产机场；客户成功岗位已补齐；ARR ≥ $240k
  - 第 18 个月：签下地服渠道合作；多机场运营方仪表盘上线
  - 第 21 个月：启动首个东南亚试点；至少 5 个机场完成正式 AAI API 集成
  - 第 24 个月：20 个生产机场；ARR ≥ $600k（SOM）；Series A 证据包准备完成
- horizon: 24–36 个月
  items:
  - 第 30 个月：东南亚首个生产合同落地；国际化本地适配完成
  - 第 33 个月：上线商业收入优化模块作为 upsell；平均 ACV 提升到 ≥$38k
  - 第 36 个月：印度及 1–2 个国际市场合计 30+ 个机场；ARR ≥ $900k；启动 Series A 融资
risks:
- risk: 政府采购延迟把单个机场从试点到 ARR 的时间拉长到 18+ 个月
  likelihood: High
  impact: High
  mitigation: 优先采用付费 MoU / 试点结构，部署即开始确认收入；避免在上线前先追求完整合同；按标准月费给试点定价，避免落入低价值免费试用。
- risk: AAI 限制或延迟第三方 ATC API 访问，导致全自动化受阻
  likelihood: Medium
  impact: High
  mitigation: 从第一天就在每个机场部署观察者模式 ADS-B/MLAT；并行推进正式 AAI 协议；先验证只靠观察者模式也能拿到 ≥15% 的效率提升。
- risk: 既有厂商（SITA、AeroCloud）以折扣方案进入印度小机场市场
  likelihood: Low
  impact: High
  mitigation: 在对手行动前，用多年订阅和深度运营数据先锁定前 15–20 个 UDAN 机场；按架次计费的结构也让对手难以直接复制。
- risk: 如果不做国际扩张，印度 TAM 可能不足以撑起风投规模
  likelihood: Medium
  impact: Medium
  mitigation: 在第 18 个月前启动东南亚试点；通过增加模块，把单机场平均 ACV 从 $30k 推向 $45k，而不是只追求更多 logo。
- risk: 地服人员对运营变革的抵触拖慢采用
  likelihood: Medium
  impact: Medium
  mitigation: 一次只上线一个工作流；前 90 天配专属客户成功；地服节点录入尽量通过低负担移动应用完成。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $1–2M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金将覆盖：把产品推进到机位分配和合规报表模块；第 3 个月招聘客户成功；第 6 个月招聘销售；为 10–15 个机场准备云基础设施和 ATC 数据接入；以及参与 AOAI 和东南亚市场拓展所需差旅。目标结果是拿下 10+ 个生产机场和 $240k+ ARR，形成 Series A 的证明材料。
