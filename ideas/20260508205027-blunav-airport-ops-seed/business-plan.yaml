slug: small-airport-cloud-os
date: "2026-05-08"
executiveSummary: >-
  Blunav is building a cloud-native Airport Operating System priced as a monthly SaaS
  subscription, targeting the 95+ UDAN regional airports in India that operate on radio,
  paper logs, and spreadsheets because legacy aviation software (SITA, Amadeus) requires
  $500K+ contracts and 12-month implementations. The company's 20-day government pilot at
  Chennai International Airport reduced runway occupancy time by 22% — from 59 to 46 seconds
  per aircraft — and was immediately adopted into daily operations, providing a government
  reference that de-risks buyer decisions at other public airports. The buying trigger is a
  DGCA compliance audit or a runway near-miss incident forcing an airport director to
  demonstrate digital monitoring within 90 days; the initial contract is a paid pilot or MoU
  rather than a full enterprise deal, bypassing slow public procurement. A $1M seed round led
  by Piper Serica (May 2026) funds 12–24 months of product expansion and sales into the UDAN
  cohort. The India beachhead supports a bottom-up SOM of ~$0.6M ARR at 20 airports in year
  three; the longer path runs through Southeast Asia and Africa as module depth grows.
  The primary execution risk is public procurement velocity, not product-market fit.

problem:
  - >-
    Small and mid-sized airports globally operate on radio, Excel, and WhatsApp because
    enterprise aviation software (SITA, Amadeus, IBS) requires contracts exceeding $500K
    annually and 12-month implementation cycles — structurally unviable for airports
    handling 30–300 daily flights.
  - >-
    India is activating 50+ new UDAN regional airports simultaneously; each new director
    must choose a first digital platform with no incumbent entrenched, but DGCA compliance
    mandates are tightening and digital audit trails are expected.
  - >-
    Runway occupancy at manual airports runs 20–30% above achievable rates; turnaround
    delays cascade into gate conflicts and missed slot windows, while regulators are
    increasingly demanding timestamped operational records that paper logs cannot produce.

solution:
  - >-
    Cloud-native Airport OS delivered as a monthly SaaS subscription: integrates runway
    scheduling, gate allocation, turnaround management, and DGCA compliance reporting on
    a single browser-based dashboard with real-time ATC feed ingestion.
  - >-
    Airports go live in 2–4 weeks via a self-serve onboarding wizard; no on-site
    implementation team required; pricing scales by monthly departure volume starting
    at ~$1,500/month for airports with 30 flights/day.
  - >-
    Predictive analytics surface recurring delay patterns as operational data accumulates,
    deepening switching costs organically while expanding the value delivered per seat.

whyWeWin:
  - >-
    Chennai International Airport government pilot is a hard proof point: 22% runway
    efficiency gain across 3,500+ flights, measured by automated timestamps, now embedded
    in daily operations — a credential no new entrant can fabricate.
  - >-
    Per-departure SaaS pricing is structurally impossible for SITA or Amadeus to match
    given their cost bases; incumbents cannot profitably target airports under 5M annual
    passengers.
  - >-
    UDAN activation is creating a cohort of first-time airport directors with no entrenched
    vendor, open to a 2–4 week deployment that solves an urgent compliance deadline.
  - >-
    Founding team with DRDO, UN aviation, and airport IT systems backgrounds carries the
    regulatory credibility required to clear government procurement gatekeepers.
  - >-
    Operational data accumulation and DGCA audit trail depth create switching costs even
    before the feature set expands; airports that store 12+ months of timestamped events
    are unlikely to restart with a new vendor.

strategicChoices:
  beachhead: >-
    UDAN-connected regional airports in India with 50–300 daily flight movements, currently
    under DGCA digital reporting pressure, and no incumbent airport-ops software deployed.
  wedgeRationale: >-
    Runway occupancy optimization has a single falsifiable KPI (seconds per aircraft), a
    proven 22% benchmark from Chennai, and a direct ROI story (break-even within 3–6 months
    at $1,500–$4,000/month versus one ground handler salary). This creates a yes/no pilot
    decision rather than a multi-year committee procurement, compressing the sales cycle.
  sequencingRationale: >-
    Runway/turnaround wedge first because it delivers measurable ROI in weeks, generates the
    compliance audit trail the buyer already needs, and produces the operational data depth
    that later modules (gate management, passenger flow, commercial optimization) depend on.
    Hiring prioritizes customer success before sales because reference density, not brand
    awareness, drives the next airport purchase. International expansion waits until 15–20
    India logos are live; procurement and regulatory processes differ country-by-country and
    early internationalization would dilute focus without proving repeatability first.
  notYet:
    - Passenger processing and check-in software (requires airline integrations and different buyer)
    - Commercial/retail revenue optimization modules (buyer is different; needs AODB depth first)
    - Large hub airports above 5M annual passengers (enterprise sales motion, long cycles)
    - Southeast Asia and Africa expansion (deferred until 15–20 India references are in production)
    - Hardware/sensor manufacturing (MLAT and ADS-B receivers sourced third-party to stay asset-light)

market:
  tam: "$4.9M bottom-up India: 163 operational airports × $30k ACV for focused runway/turnaround module (research.yaml estimate; broader market reports are larger but bundle major-hub systems)"
  sam: "$2.9M: 95 RCS airports operationalized under UDAN as of 2026-03-25 × $30k annual ACV"
  som: "$0.6M year-3 ARR: 20 contracted airports × $30k ACV — aggressive but reachable if Chennai reference converts into broader AAI trust"
  segments:
    - "UDAN regional airports in India: 50–300 daily flights, DGCA compliance pressure, no incumbent ops software"
    - "Multi-airport operators and state aviation departments managing clusters of small airports under AAI or state authority"
  buyingProcess: >-
    Airport director or authority IT head initiates a paid pilot or MoU (not a full contract)
    triggered by a DGCA audit deadline or a runway safety incident; formal procurement follows
    after the pilot proves ROI. Public-sector cycles run 6–18 months from pilot to contract.

product:
  mvp: >-
    Real-time runway occupancy dashboard with automated ground-time timestamping, turnaround
    crew dispatch, and exportable DGCA-compliant operational event log — deployable in 2–4
    weeks via self-serve onboarding wizard without on-site implementation.
  sixMonth: >-
    Add gate allocation module, mobile ground handler app for milestone confirmation, and
    automated pre-audit compliance report generator; deepen ATC feed integration for three
    additional UDAN airports.
  twelveMonth: >-
    Launch multi-airport operator dashboard for airport authorities managing clusters; add
    delay root-cause analytics and predictive schedule recommendations; begin ADB SAFEGATE
    and AODB interoperability for airports requiring deeper integration.
  twentyFourMonth: >-
    Expand to 20+ India airports; release Southeast Asia localization (language, regulator
    mapping, ATC feed adapters); launch commercial revenue optimization module as upsell;
    build partner API for ground handler and airline systems integration.
  keyBets:
    - >-
      Self-serve onboarding compresses time-to-value to under 30 days, the key advantage
      over enterprise competitors who require months of on-site work.
    - >-
      Operational data accumulation creates airport-specific delay models that improve
      predictions with every flight, making the product more valuable at month 12 than
      at month 1.
    - >-
      DGCA audit trail as a bundled output (not a separate module) makes compliance an
      automatic byproduct of daily operational use, locking in the renewal regardless of
      efficiency ROI.

gtm:
  wedge: >-
    Runway occupancy and turnaround optimizer sold as a paid 30-day pilot to airport
    directors facing an imminent DGCA audit or runway-throughput bottleneck; pilot priced
    at one month's SaaS fee to eliminate procurement friction.
  channels:
    - "Direct outreach to DGCA-registered airport directors at UDAN-listed airports (publicly trackable via AAI notifications)"
    - "Chennai reference case published as a named government case study for peer-airport referrals"
    - "Airport Operators Association of India (AOAI) events and email network for warm introductions"
    - "Ground handling companies (AISATS, Bird Group) as channel partners deploying at multiple airports"
    - "AAI procurement portal and state aviation department tenders for airports requiring formal RFP"
  funnelTargets: "Outreach → qualified pilot conversation 15–25%; paid pilot → production subscription 50%+"
  pricing: >-
    Monthly SaaS subscription tiered by departure volume: ~$1,500/month for 30–100 daily
    flights, ~$2,500/month for 100–200 flights, ~$4,000/month for 200–300 flights. Pricing
    rationale: one month's fee is less than one additional ground handler salary; efficiency
    gains break even the cost in 3–6 months, making ROI the lead sales argument. One-time
    onboarding fee ($2,000–$5,000) for airports with legacy data migration requirements.

businessModel:
  revenueStreams:
    - "Monthly SaaS subscription per airport tiered by departure volume ($1,500–$4,000/month)"
    - "One-time onboarding and data migration fee for airports with legacy systems ($2,000–$5,000)"
    - "Professional services for custom ATC or airline integrations (time-and-materials, not core)"
  unitOfValue: Monthly departure volume per airport
  targetGrossMarginPct: 72
  expansionLevers:
    - "Module expansion per existing airport: gate management, commercial optimization, passenger flow"
    - "Multi-airport operator contracts: single authority purchasing for a cluster of airports at volume discount"
    - "International market replication: Southeast Asia and Africa using India reference package"
    - "Data analytics upsell: predictive delay reports and schedule optimization recommendations"

strategyMap:
  northStarMetric: "Contracted airports in production (monthly active airports paying subscription)"
  inputMetrics:
    - "Paid pilots started per month"
    - "Pilot-to-production conversion rate (target 50%+)"
    - "Time-to-first-value in days (target <30 days)"
    - "Runway occupancy improvement % per deployed airport"
    - "DGCA audits passed without findings at customer airports"
  moatsToBuild:
    - "Airport-specific operational data graphs: delay patterns, ground handler performance, runway utilization by aircraft type"
    - "DGCA audit trail depth: 12+ months of timestamped events that cannot be reconstructed without the platform"
    - "ATC and airline feed integrations: airport-specific data pipelines that take months to replicate"
    - "Reference density: each UDAN airport referral reduces cost of acquiring the next airport in the same authority network"
  killCriteria:
    - "Less than 3 paid pilots signed in the first 6 months post-seed"
    - "Pilot-to-production conversion rate below 25% after 5 completed pilots"
    - "Average time-to-production exceeds 90 days (indicates procurement or integration blocker)"
    - "Chennai contract not renewed or downgraded within 12 months of daily-ops adoption"
  mermaid: |
    flowchart LR
      Wedge[Runway efficiency wedge] --> Pilot[30-day paid pilot]
      Pilot --> ROI[Measurable ROI in 30 days]
      ROI --> Production[Production subscription]
      Production --> Data[Airport operational data graph]
      Data --> Stickiness[Switching cost deepens]
      Production --> Reference[Published case study]
      Reference --> NextAirport[Next UDAN airport]
      NextAirport --> Pilot
      Production --> Modules[Module expansion per airport]
      Modules --> ACV[Higher ACV]

investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: >-
      Strong conviction on the wedge and proof point; key caveat is whether public
      procurement velocity allows the company to convert pilots into recurring revenue
      fast enough to sustain the team through the seed runway.
    whyBelieve: >-
      A government-verified 22% runway efficiency gain at a live airport, adopted into
      daily operations within a 20-day pilot, is a uniquely falsifiable proof point that
      most seed-stage B2G SaaS companies cannot produce.
    whyDoubt: >-
      The India bottom-up SOM is ~$0.6M ARR at year three — the business is real but
      narrow until module expansion and international replication are proven; public
      procurement cycles could extend pilot-to-ARR timelines to 18 months per logo.
    nextDiligence: >-
      Confirm the commercial terms, contract value, and renewal status of the Chennai
      deployment, and verify whether at least two additional UDAN airports have agreed to
      pilots or signed MoUs since the seed round closed.
  firstCustomer:
    title: "Airport Director, UDAN Regional Airport"
    profile: >-
      Government-operated Indian regional airport with 50–300 daily flight movements
      under UDAN/RCS scheme, currently running airside operations on radio, paper logs,
      and Excel, with an upcoming DGCA compliance audit or recent runway-throughput complaint.
    trigger: >-
      Scheduled DGCA compliance audit within 90 days or a runway near-miss incident forcing
      the authority to demonstrate digital monitoring capability.
    buyer: "Airport Director or Airport Authority IT Head"
    initialContract: >-
      30-day paid pilot at one month's SaaS fee ($1,500–$4,000 depending on flight volume);
      conversion to 12-month subscription if runway occupancy improvement ≥15% is
      demonstrated within the pilot period.
  mustBeTrue:
    - >-
      At least 10 UDAN airport directors will convert a warm outreach into a paid pilot
      conversation within 12 months, validating that DGCA pressure is a real buying trigger
      and not just an assumed one.
    - >-
      Pilot-to-production conversion rate reaches 50%+ after 5 completed pilots, confirming
      that the runway occupancy ROI story survives the transition from trial conditions to
      ongoing operations.
    - >-
      Chennai contract renews at or above its original value within 12 months of daily-ops
      adoption, proving that the efficiency gain is durable and not a pilot-period artifact.
    - >-
      Self-serve onboarding consistently achieves go-live in under 30 days without on-site
      engineering support, sustaining the structural cost advantage over enterprise competitors.
    - >-
      ATC or operational data integrations can be implemented at new airports within 60 days
      using a semi-automated or observer-mode approach, avoiding single-point dependency on
      AAI API approvals.
  diligenceQuestions:
    - >-
      What are the exact commercial terms, annual contract value, and renewal date of the
      Chennai International Airport deployment today?
    - >-
      How many UDAN airport directors have been contacted since seed close, and what is the
      current pipeline of qualified pilots or signed MoUs?
    - >-
      At which integration depth (manual milestone capture vs. full ATC feed) is the 22%
      runway efficiency gain reproducible, and how does ROI degrade with less integration?
    - >-
      Do AAI-operated regional airports procure software as SaaS opex, project capex, or
      bundled systems-integration contracts, and has any non-Chennai airport issued a
      formal tender or RFP for airport operations software?
    - >-
      What is the realistic pilot-to-contract timeline at a typical UDAN airport given
      government procurement rules, and does the seed runway cover at least three full
      procurement cycles?
    - >-
      How has the founding team mapped the DGCA aerodrome manual certification pathway
      for software that captures and exports compliance records?

  riskHeatmap:
    - risk: Government procurement delay extends pilot-to-ARR conversion to 18+ months
      likelihood: High
      impact: High
      leadingIndicator: >-
        Chennai contract formal procurement process takes more than 6 months to complete,
        or second airport pilot stalls at MoU stage for more than 9 months.
      mitigation: >-
        Structure every engagement as a paid MoU or limited-scope pilot that delivers
        measurable ROI within 30 days; avoid requiring a full contract before revenue starts.
    - risk: AAI restricts or delays third-party ATC API access
      likelihood: Medium
      impact: High
      leadingIndicator: >-
        Chennai integration required manual event capture rather than live ATC feed, or
        AAI issues a notice restricting third-party operational data access.
      mitigation: >-
        Deploy observer-mode with ground-based ADS-B/MLAT receivers owned by the airport;
        pursue formal AAI API agreement in parallel without blocking initial deployments.
    - risk: Incumbent (SITA, AeroCloud) launches India small-airport pricing tier
      likelihood: Low
      impact: High
      leadingIndicator: >-
        SITA or AeroCloud publishes India-specific pricing, announces a UDAN airport
        reference, or an existing customer reports being approached by a large competitor.
      mitigation: >-
        Lock in first 15–20 UDAN airports with multi-year subscriptions and deep
        operational data integration before incumbents notice the segment; per-departure
        pricing is structurally difficult for incumbents to match.
    - risk: Small-airport TAM is too narrow for venture-scale returns without international expansion
      likelihood: Medium
      impact: Medium
      leadingIndicator: >-
        Year-2 ARR plateaus below $300k with fewer than 10 production airports, and
        Southeast Asia or Africa pilots have not been initiated.
      mitigation: >-
        Plan international pilot by month 18; prioritize module expansion (gate, commercial,
        passenger flow) to increase ACV per airport from $30k toward $45k without requiring
        more customers.
    - risk: Operational change management slows adoption within pilot airports
      likelihood: Medium
      impact: Medium
      leadingIndicator: >-
        Pilot airport shows < 10% runway occupancy improvement in the first 30 days or
        ground handler staff resistance prevents consistent milestone data entry.
      mitigation: >-
        Assign a dedicated customer success contact for the first 90 days; instrument one
        workflow at a time starting with the single highest-frequency runway event.

operatingAssumptions:
  - assumption: >-
      UDAN airport directors will accept a 30-day paid pilot structure rather than requiring
      a full formal RFP before any commitment.
    basis: idea.yaml
    validationTest: >-
      Sign 3 paid pilots within 6 months of seed close using MoU or limited-scope
      pilot agreement structures rather than full procurement contracts.
    decisionImpact: >-
      If false, sales motion must pivot to multi-month RFP-led procurement, extending
      time-to-revenue and requiring a larger sales budget than planned.
  - assumption: >-
      The 22% Chennai runway efficiency gain is reproducible at other UDAN airports at
      the same or higher integration depth (ATC feed or semi-automated milestone capture).
    basis: idea.yaml
    validationTest: >-
      Measure runway occupancy improvement independently at the first two non-Chennai
      pilots; report actual percentage within 30 days of go-live.
    decisionImpact: >-
      If improvement falls below 10%, the ROI story weakens materially and pricing must
      be repositioned around compliance value rather than efficiency savings.
  - assumption: >-
      Target airports can absorb $1,500–$4,000/month as SaaS opex without requiring capex
      classification or multi-year budget approval cycles.
    basis: research.yaml
    validationTest: >-
      Confirm budget line item type (opex vs. capex) and approval authority for at least
      five target airports before committing to pricing model.
    decisionImpact: >-
      If airports can only procure via capex or annual lump-sum, restructure to annual
      prepay with monthly equivalent pricing; adjust cash flow model accordingly.
  - assumption: >-
      ATC feed integration can be achieved at new airports within 60 days using a
      semi-automated or observer-mode approach, without requiring formal AAI API approval.
    basis: idea.yaml
    validationTest: >-
      Deploy observer-mode ADS-B/MLAT setup at second pilot airport without formal AAI
      API approval and measure time-to-integration and data quality.
    decisionImpact: >-
      If observer-mode is insufficient to achieve the efficiency ROI, the product depends
      on AAI API access, becoming a single-point-of-failure for scaling beyond Chennai.
  - assumption: >-
      India SOM of 20 airports by year 3 is achievable with a 2-person sales team primarily
      using reference-led outreach and AOAI channel relationships.
    basis: research.yaml
    validationTest: >-
      Track number of inbound inquiries from non-outreached airports after first Chennai
      case study publication; if zero in 6 months, reference-led pull is not working.
    decisionImpact: >-
      If reference-led pull is insufficient, sales headcount must increase earlier,
      raising the funding requirement and extending the path to profitability.

experimentRoadmap:
  - horizon: 0–90 days
    experiment: Chennai paid contract confirmation
    hypothesis: >-
      The Chennai daily-ops adoption will convert to a formal paid contract within 90 days
      of the seed close, providing the first ARR and a named reference customer.
    successMetric: Signed contract with annual value ≥ $18,000 and permission to use as a named case study.
    owner: CEO / founding team
  - horizon: 0–90 days
    experiment: UDAN airport outreach sequencing
    hypothesis: >-
      Direct outreach to 20 UDAN airport directors with the Chennai efficiency proof point
      will generate 5+ qualified pilot conversations within 90 days.
    successMetric: "5 qualified conversations booked; at least 2 pilot agreements in negotiation."
    owner: CEO
  - horizon: 0–90 days
    experiment: Observer-mode integration feasibility
    hypothesis: >-
      Ground-based ADS-B receiver plus manual ground handler mobile inputs can reproduce
      ≥15% runway occupancy improvement at an airport without a formal ATC API.
    successMetric: "Runway improvement ≥15% demonstrated at one non-Chennai airport using observer-mode only."
    owner: CTO / founding engineer
  - horizon: 90–180 days
    experiment: Paid pilot conversion at second airport
    hypothesis: >-
      A 30-day paid pilot at a second UDAN airport will convert to a 12-month subscription
      based on measured efficiency gain and compliance report generation.
    successMetric: Signed 12-month subscription ≥ $24,000 ACV within 30 days of pilot completion.
    owner: CEO
  - horizon: 90–180 days
    experiment: DGCA compliance report as standalone value proof
    hypothesis: >-
      Airports with an upcoming DGCA audit in the next 60 days will prioritize the
      compliance audit trail output over the efficiency gain as the primary buying reason.
    successMetric: "2 pilots initiated where the stated primary trigger is audit prep, not efficiency."
    owner: Sales / customer success
  - horizon: 180–365 days
    experiment: Ground handler channel partnership
    hypothesis: >-
      AISATS or Bird Group will co-sell or refer Blunav to 3+ airports in their existing
      operations network, reducing direct outreach cost per new airport.
    successMetric: "1 signed referral or co-sell agreement with a ground handling company; ≥2 airport introductions."
    owner: CEO / partnerships
  - horizon: 180–365 days
    experiment: Module expansion ACV lift
    hypothesis: >-
      Existing production airports will purchase the gate allocation module as an add-on,
      lifting ACV by ≥30% without incremental sales effort.
    successMetric: "≥3 airports on gate module add-on; average ACV increases from $30k to ≥$38k."
    owner: Product / customer success

operations:
  - "Cloud infrastructure: AWS or GCP with per-airport tenant isolation; real-time event processing pipeline for ATC feeds and mobile ground handler inputs"
  - "ATC data: observer-mode ADS-B/MLAT receivers as primary integration; formal AAI API pursued in parallel for deeper automation"
  - "Onboarding: self-serve wizard with airport-specific configuration; dedicated customer success contact for first 90 days"
  - "Compliance: DGCA aerodrome manual mapping maintained by regulatory affairs lead; exportable audit report in DGCA-specified format"
  - "Sales motion: direct outreach using public AAI UDAN airport list; reference case study as primary collateral; AOAI network for warm introductions"
  - "Security: role-based access control, immutable audit log, local data resilience for airports with intermittent connectivity"

team:
  - role: CEO / Co-founder (aeronautical engineer, DRDO + UN aviation background)
    startTiming: Month 0
    rationale: >-
      Regulatory credibility and government relationship network required to navigate DGCA,
      AAI procurement, and airport authority gatekeepers; leads sales and partnership motion.
  - role: CTO / Co-founder (telecom engineer, airport IT systems)
    startTiming: Month 0
    rationale: >-
      Airport IT integration depth (ATC feeds, AODB interfaces, mobile ground handler apps)
      required from day one; owns product architecture and ATC data pipeline.
  - role: Founding full-stack engineer
    startTiming: Month 0
    rationale: >-
      Build and maintain the real-time dashboard, onboarding wizard, and compliance report
      generator; product must ship in 2–4 week deployment cycles to sustain GTM promise.
  - role: Customer success manager
    startTiming: Month 3
    rationale: >-
      Each airport deployment requires 90 days of dedicated support to drive workflow
      adoption and generate the measurable efficiency data needed for case studies and
      renewals; hire before third pilot deploys.
  - role: Sales / BD (airport operations background preferred)
    startTiming: Month 6
    rationale: >-
      Once 3 paid pilots are live and the reference story is repeatable, a dedicated sales
      hire with airport-operations context can run parallel outreach to the remaining UDAN
      airport cohort; not needed before proof-of-conversion exists.

milestones:
  - horizon: 0–12 months
    items:
      - "Month 3: Chennai contract formalized with named case study permission and ≥$18k ACV"
      - "Month 6: 3 paid pilots signed at UDAN airports; observer-mode integration validated at 1 non-Chennai airport"
      - "Month 9: 2 pilots converted to 12-month production subscriptions; ≥$48k ARR"
      - "Month 12: 5 production airports; gate allocation module in beta at 2 airports; $100k ARR run rate"
  - horizon: 12–24 months
    items:
      - "Month 15: 10 production airports; customer success hire in place; ARR ≥$240k"
      - "Month 18: Ground handler channel partner agreement signed; multi-airport operator dashboard live"
      - "Month 21: First Southeast Asia pilot initiated; formal AAI API integration complete at ≥5 airports"
      - "Month 24: 20 production airports; ARR ≥$600k (SOM); Series A evidence package prepared"
  - horizon: 24–36 months
    items:
      - "Month 30: Southeast Asia first production contract; international localization complete"
      - "Month 33: Commercial revenue optimization module launched as upsell; ACV lift to ≥$38k avg"
      - "Month 36: 30+ airports across India and 1–2 international markets; ARR ≥$900k; Series A raise"

risks:
  - risk: Government procurement delay extends pilot-to-ARR conversion to 18+ months per airport
    likelihood: High
    impact: High
    mitigation: >-
      Lead with paid MoU/pilot structures that generate revenue immediately; avoid requiring
      full contract before deployment; price pilot at standard monthly fee to eliminate
      low-value free trial risk.
  - risk: AAI restricts or delays third-party ATC API access, blocking full automation
    likelihood: Medium
    impact: High
    mitigation: >-
      Deploy observer-mode ADS-B/MLAT at each airport from day one; pursue formal AAI
      agreement in parallel; validate that observer-mode alone achieves ≥15% efficiency gain.
  - risk: Incumbent (SITA, AeroCloud) enters India small-airport market with discounted offering
    likelihood: Low
    impact: High
    mitigation: >-
      Lock in first 15–20 UDAN airports with multi-year subscriptions and deep operational
      data before incumbents act; per-departure pricing is structurally hard to match.
  - risk: India TAM too narrow for venture scale without international expansion
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Initiate Southeast Asia pilot by month 18; expand ACV through module additions to push
      average from $30k toward $45k per airport without requiring more logos.
  - risk: Operational change management resistance from ground handler staff slows adoption
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Instrument one workflow at a time; assign dedicated customer success for 90 days;
      use mobile app with minimal data entry burden for ground handler milestone capture.

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$1–2M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months buys: product development to gate allocation and compliance report modules,
    customer success hire at month 3, sales hire at month 6, cloud infrastructure and ATC
    data feed provisioning for 10–15 airports, and AOAI and Southeast Asia market development
    travel; target outcome is 10+ production airports and $240k+ ARR as Series A proof.
