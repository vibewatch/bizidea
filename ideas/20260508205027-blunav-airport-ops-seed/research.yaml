  adoptionFrictionMatrix:
    - friction: Government procurement cycle
      severity: high
      affectedBuyer: Airport director / public procurement owner
      mitigation: Lead with paid pilot or MoU structures and one hard KPI rather than a full multi-module roll-out.
      sourceRefs: [23, 24]
    - friction: Data and systems integration
      severity: high
      affectedBuyer: Airport authority IT head
      mitigation: Start with manual or semi-automated milestone capture and add deeper AODB/ATC integrations after proving value.
      sourceRefs: [13, 17, 29]
    - friction: Operational change management
      severity: medium
      affectedBuyer: Airport operations manager
      mitigation: Instrument one workflow such as runway occupancy or turnaround coordination and show week-one improvement.
      sourceRefs: [1, 18]
    - friction: Security and compliance review
      severity: medium
      affectedBuyer: Airport IT / compliance team
      mitigation: Emphasize role-based access, audit logs, local resilience, and clear responsibility mapping.
      sourceRefs: [4, 6, 13]
