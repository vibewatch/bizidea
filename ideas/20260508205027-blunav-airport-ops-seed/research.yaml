competitors:
  - name: SITA
    stage: incumbent
    wedge: Integrated airport management and collaborative decision-making across multiple stakeholders.
    pricing: Enterprise quote-based; public product pages route buyers to demos and experts rather than self-serve pricing.
    strength: Global airport footprint, strong CDM positioning, and broad operational product coverage.
    weaknessVsUs: Likely heavier deployment and broader suite orientation than a small-airport-first runway wedge.
    sourceRefs: [26, 27]
  - name: Amadeus
    stage: incumbent
    wedge: AODB-led airport operations stack with resource management and sequence optimization.
    pricing: Enterprise quote-based; public materials emphasize product portfolio and sales engagement rather than posted pricing.
    strength: Deep airline schedule data, multi-airport credibility, and proven operator deployments such as Finavia.
    weaknessVsUs: More enterprise breadth than localized India small-airport simplicity.
    sourceRefs: [29, 30, 31]
  - name: AeroCloud
    stage: scale-up
    wedge: Cloud-native modular airport operations system for airports seeking lower upfront IT burden.
    pricing: Modular/custom; public materials emphasize no user-license fees and lower upfront infrastructure cost.
    strength: Strong cloud-native posture and explicit appeal to airports that want lighter deployments.
    weaknessVsUs: Public proof points are broader airport-ops efficiency claims, not a specific India runway-occupancy wedge.
    sourceRefs: [32, 33]
  - name: Veovo
    stage: scale-up
    wedge: ML-driven airport resource management, AODB, and operational optimization.
    pricing: Custom quote-based on public site.
    strength: Strong resource-planning and operational case studies such as Edinburgh Airport.
    weaknessVsUs: Less visibly tailored to India's public-regional-airport compliance motion.
    sourceRefs: [34, 35]
  - name: ADB SAFEGATE
    stage: incumbent
    wedge: Apron, docking, AODB, and sensor-rich airside operations.
    pricing: Enterprise project-style pricing; public site exposes brochures rather than self-serve pricing.
    strength: Airside credibility and rich operational data capture around apron activity.
    weaknessVsUs: Sensor/infrastructure-heavy heritage can be harder to fit into a low-friction software-first deployment.
    sourceRefs: [36, 17]
regulatoryTechnicalConstraints:
  - point: DGCA documentation and aerodrome manual requirements create a need for defensible procedures and records.
    sourceRefs: [12, 13]
  - point: Public-airport buying requires formal procurement and contracting discipline that can slow software adoption.
    sourceRefs: [23, 24]
  - point: Full A-CDM-style value depends on shared milestone data across airport, airline, handler, and ATC stakeholders.
    sourceRefs: [17, 20]
  - point: Real operational optimization often requires integration with AODB or equivalent live data sources.
    sourceRefs: [29, 34, 36]
validationSignals:
  - point: Chennai pilot evidence gives Blunav a measurable runway-efficiency claim rather than a generic digitization pitch.
    sourceRefs: [1, 2]
  - point: Chennai reportedly integrated Blunav into daily operations after the pilot, improving referenceability.
    sourceRefs: [1, 2]
  - point: AAI reports a large enough regional-airport cohort under UDAN to support focused beachhead selling.
    sourceRefs: [7, 8]
  - point: Cloud-native peers already market airport software on lower-infrastructure and modular deployment economics.
    sourceRefs: [32, 33]
openQuestions:
  - Which exact DGCA or airport-authority audits most often create immediate demand for digital operational record-keeping?
  - What contract value, scope, and procurement path sits behind the Chennai deployment today?
  - How many India small airports can deliver ROI with manual milestone capture before deeper ATC/AODB integrations are required?
  - Do AAI-operated regional airports buy software as SaaS opex, project capex, or bundled systems-integration contracts?
