slug: small-airport-cloud-os
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: yyyy-mm
  source: '[BP 日期；BP executiveSummary 指种子轮于 2026 年 5 月完成]'
- id: A2
  name: 模型起始种子资金
  value: '1.5'
  unit: M USD
  source: '[BP fundingAsk 目标融资区间为 $1–2M；BP executiveSummary 提到已完成 $1M 种子轮，本模型在此基础上取中位偏上并加入缓冲，以覆盖 24 个月跑道]'
- id: A3
  name: 起始付费机场数
  value: '0'
  unit: airports
  source: '[BP 里程碑中第 3 个月完成 Chennai 合同；基准情形假设 M1 没有签约机场，首个付费 logo 在 M3 落地]'
- id: A4
  name: 客户爬坡节奏
  value: 5 airports by M12; 20 by M24; 30 by M36
  unit: airports
  source: '[BP 里程碑中第 12 个月 5 个生产机场；第 24 个月 20 个；第 36 个月 30+ 个]'
- id: A5
  name: 混合年化 ACV
  value: Ramps from ~$18K in Y1 pilots to ~$30K at M24–M36
  unit: USD per airport per year
  source: '[BP gtm.pricing 为每月 $1.5K–$4.0K 分层；Research market 假设单机场年 ACV 为 $30K]'
- id: A6
  name: 收入保守口径
  value: Base model excludes onboarding fees and professional services
  unit: policy
  source: '[BP businessModel 包含 onboarding 和服务收入；本模型暂不计入，以便收入与客户数 × 订阅 ARPU 对齐，并保持保守]'
- id: A7
  name: 毛利率
  value: '72'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A8
  name: 漏斗转换率
  value: 15–25% outreach to pilot; 50%+ pilot to production
  unit: percent
  source: '[BP gtm.funnelTargets；BP investorMemo.mustBeTrue]'
- id: A9
  name: 月流失率
  value: '1.2'
  unit: percent
  source: '[经验假设：以合规为核心的 B2B 基础设施 SaaS，其流失率应低于通用 SMB SaaS，因为审计轨迹会嵌入工作流]'
- id: A10
  name: 完全摊销 CAC
  value: '18.0'
  unit: K USD per airport
  source: '[经验假设，参考 BP market.buyingProcess 的 6–18 个月周期、创始人主导的政企销售、AOAI 差旅，以及试点支持负担]'
- id: A11
  name: 商业计划中的初始团队
  value: CEO + CTO + founding engineer at M1; CS in M3; first sales hire in M6
  unit: hires
  source: '[BP team；BP fundingAsk.useOfFundsSummary]'
- id: A12
  name: 扩张期招聘
  value: Add second engineer in M10, second CS in M13, second sales in M15, third engineer in M19, admin in M21, fourth engineer in M25, third sales in M31, fourth CS in M34
  unit: hires
  source: '[经验假设：在保持精简团队的前提下，支持 20–30 个机场、案例驱动销售和 90 天 onboarding 所需的招聘节奏]'
- id: A13
  name: 全成本薪资区间
  value: CEO $78K, CTO $96K, engineer $72K, CS $48K, sales $60K, admin $54K
  unit: USD per FTE per year
  source: '[经验假设：印度种子期政企/垂直 SaaS 团队的全成本薪资，已含税费和福利]'
- id: A14
  name: 非薪酬运营开支
  value: S&M $5K–$15K/mo, R&D tools/cloud overhead $2K–$3K/mo, G&A $4K–$6K/mo
  unit: USD per month
  source: '[经验假设，参考机场差旅、合规/法务，以及种子期基础设施创业公司的软件工具开支]'
- id: A15
  name: 现金转化口径
  value: EBITDA approximates operating cash flow
  unit: policy
  source: '[经验假设：种子阶段资本开支和营运资金影响较小，因此 EBITDA 近似经营现金流；未计入年度预付的上行空间]'
- id: A16
  name: 下一轮融资里程碑
  value: 20 production airports and ~$600K ARR by M24, with six months of cash buffer through M30
  unit: milestone
  source: '[BP 里程碑中第 24 个月达到 20 个生产机场和 ARR ≥$600K；BP fundingAsk 指向 12–24 个月跑道]'
