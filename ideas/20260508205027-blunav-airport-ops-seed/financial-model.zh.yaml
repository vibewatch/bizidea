scenarios:
  downside:
    description: 采购周期被拉长至接近 12 个月，混合 ACV 停在约 $26K，客户爬坡到 M36 也只有 24 个机场。
    y3RevenueK: 546.1
    y3EbitdaK: -685.9
    cashLowPointK: -260.2
    keyAssumptionChanges:
    - 试点转生产的转换率跌破 BP 设定的 50% 目标。
    - 混合月 ARPU 最高只到约 $2.2K，而不是 $2.5K。
    - 新 logo 获取节奏变慢，导致 M24 只有 15 个机场，而不是 20 个。
  base:
    description: Chennai 的参考案例顺利带动印度市场爬坡，到 M24 落地 20 个机场、M36 达到 30 个，混合 ACV 约为 $30K。
    y3RevenueK: 789.8
    y3EbitdaK: -510.3
    cashLowPointK: 37.7
    keyAssumptionChanges:
    - 客户里程碑与 BP 目标一致：M12、M24、M36 分别达到 5、20、30 个机场。
    - 毛利率维持 BP 目标的 72%。
    - 招聘按照 assumptions A11–A14 中的精简扩张计划推进。
  upside:
    description: 案例驱动的自然拉动更快显现，upsell 更早落地，公司在第 3 年末做到 38 个机场和更丰富的模块组合。
    y3RevenueK: 1140.4
    y3EbitdaK: -257.9
    cashLowPointK: 378.2
    keyAssumptionChanges:
    - 付费试点转化更快，使 M24 时达到 24 个机场。
    - 随着模块扩展，到第 3 年后期混合月 ARPU 升到 $3.0K 以上。
    - 在无需额外提前扩销售的情况下，同一招聘计划就能支撑更大的安装基数。
sensitivity:
- variable: ARPU
  downsideCase: 退出时 ARPU 只能维持在 $2.2K/月，因为 upsell 和更大机场占比都没有兑现。
  baseCase: 退出时 ARPU 达到 $2.5K/月，与 research 建模中的 $30K ACV 一致。
  upsideCase: 随着机位分配和分析模块增购，退出时 ARPU 升到 $3.0K/月。
  y3RevenueImpactK: -79.0
  cashImpactK: -56.9
- variable: CAC
  downsideCase: 由于创始人主导差旅和长周期试点持续存在，CAC 升到 $22K。
  baseCase: CAC 为每个机场 $18K。
  upsideCase: 在 AOAI 转介绍和 Chennai 带来的 inbound 增强后，CAC 降到 $14K。
  y3RevenueImpactK: 0.0
  cashImpactK: -100.0
- variable: 流失率
  downsideCase: 如果试点转正后 ROI 不够稳定，月流失率可能升到 2.5%。
  baseCase: 月流失率维持 1.2%。
  upsideCase: 如果合规工作流变得高度黏性，月流失率可降到 0.5%。
  y3RevenueImpactK: -60.0
  cashImpactK: -43.0
- variable: 销售周期
  downsideCase: 试点转生产被拉向 12 个月，采购也需要更完整的 RFP 流程。
  baseCase: 从首次接触到生产合同，机场平均约 9 个月完成转化。
  upsideCase: Chennai 的参考案例把跟随型机场的成交周期压到约 6 个月。
  y3RevenueImpactK: -180.0
  cashImpactK: -150.0
- variable: 毛利率
  downsideCase: 由于人工集成和支持成本居高不下，毛利率落在 68%。
  baseCase: 毛利率维持 72%。
  upsideCase: 随着 onboarding 更标准化，毛利率提升到 76%。
  y3RevenueImpactK: 0.0
  cashImpactK: -32.0
- variable: 招聘节奏
  downsideCase: 在案例密度尚未验证前，就提前 6 个月把两名员工招进来。
  baseCase: 招聘按照 assumptions A11–A14 的分阶段节奏推进。
  upsideCase: 等付费试点真正转化后，再延后两名后期岗位的招聘。
  y3RevenueImpactK: -20.0
  cashImpactK: -120.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Outreach[案例驱动外呼] --> Pilots[30 天付费试点]\n  Pilots --> Conversions[转成生产机场]\n  Conversions --> Revenue[订阅收入]\n  Revenue --> GrossProfit[72% 毛利润]\n  GrossProfit --> Opex[人员 + 差旅 + 合规开支]\n  Opex --> Cash[期末现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入主要来自付费机场数从 5 增长到 20 再到 30，同时混合 ACV 从试点定价逐步抬升到 research 建模中的 $30K 年化水平。
- checkName: 必须成立的前提
  finding: 模型要求 Chennai 持续压缩销售周期，这样一支 2–3 人销售团队才能在第 24 个月前拿下 20 个机场，而不需要更重的地面团队。
- checkName: 模型失效条件
  finding: 如果采购节奏滑向 downside，且退出时 ARPU 停在每月约 $2.2K，公司会在第 24 个月验证点到来前先把现金烧穿。
- checkName: 下一轮融资证明点
  finding: 当 Blunav 做到 20 个生产机场、约 $600K ARR，并显示模块扩展能把 ACV 拉高到超出单一印度切口时，下一轮融资才真正站得住。
sanityChecks:
  ruleOf40: 第 3 年增长率 100.6% + EBITDA 利润率 -64.6% = 36.0%。
  burnMultiple: 第 3 年 burn multiple 为 1.7x = $510.3K burn / $300K 净新增 ARR（从 M24 的 $600K ARR 到 M36 的 $900K ARR）。
  revenuePerFte: 退出时每名 Q4Y3 FTE 对应 $64K ARR（$900K ARR / 14 FTE），低于常见 SaaS 的 $200–400K 基准。
  flags:
  - 如果只停留在印度单一切口，这门生意的经济性会偏窄，因此在 ACV 扩张或国际市场打开前，revenue per FTE 会长期低于标准 SaaS 效率。
  - BP 第 33 个月要求平均 ACV 至少达到 $38K，但第 36 个月又要求 30+ 个机场和约 $900K ARR；因此基准情形让整体组合 ACV 维持在约 $30K，并把 ACV 提升视为部分而非全面实现。
  - 基准情形下种子轮现金几乎只够撑到第 3 年末，因此无论是 AAI 集成接入延迟还是试点转化放缓，都可能迫使公司更早融资。
