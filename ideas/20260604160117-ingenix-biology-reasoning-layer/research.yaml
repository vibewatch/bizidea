openQuestions:
- What annual budget can a Series B-to-pre-IPO oncology biotech carve out for one asset-level reasoning tool versus consultants, CRO bioinformatics, or broader data platforms?
- Which minimum internal dataset package is enough to produce decision-useful ranked combinations in under six weeks?
- Will buyers prefer a software-only workflow product, or will they require an analyst-assisted review packet for the first 6-12 months?
- Is the strongest first niche dual-payload ADC prioritization, targeted-therapy combinations in solid tumors, or biomarker-stratified expansion planning more broadly?
