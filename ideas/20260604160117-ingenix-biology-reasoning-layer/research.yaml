market:
  tam:
    value: $259.5M
    rationale: 'Bottom-up estimate: 2,162 oncology trial starts in 2024 × 48% Phase II share = 1,038 programs [2]; apply $250k annualized platform-plus-integration value per active program using biotech AI build-vs-buy budget proxies [30] => about $259.5M. Cross-check: this sits below the adjacent $407.2M 2026 AI-in-oncology-drug-discovery estimate [19].'
    isEstimate: true
    sourceRefs:
    - 2
    - 19
    - 30
  sam:
    value: $104.0M
    rationale: Apply a beachhead constraint of ~40% of Phase II oncology starts to targeted solid-tumor, clinical-stage biotech programs where combination and biomarker reasoning is most acute; 1,038 × 40% × $250k ≈ $104.0M.
    isEstimate: true
    sourceRefs:
    - 2
    - 21
    - 30
  som:
    value: $5.0M
    rationale: Year-3 reachable share assumes ~20 active asset programs at roughly $250k annualized value each, which is ambitious but plausible through founder-led design-partner sales in a narrow biotech segment.
    isEstimate: true
    sourceRefs:
    - 13
    - 30
