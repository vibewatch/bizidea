operations:
- 面向实验、组学、PK、生物标志物和早期临床文件的安全接入与标准化流水线
- 带审计日志和相反证据追踪的证据图谱与评审包生成工作流
- 与客户评审日历和验证交接绑定的、带服务支持的试点运营
- 围绕下游实验执行去管理 CRO、实验室和生物标志物网络伙伴
- 为敏感生物科技账户提供 customer-hosted 或 VPC 部署选项
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 尽快把核心推理、数据接入和证据可追溯系统搭起来，支撑回顾性试点，而不必先养一支庞大平台团队。
- role: 计算生物学负责人
  startTiming: 第 0 个月
  rationale: 负责本体选择、短名单质量，以及在早期试点里建立转化科学家的信任。
- role: 产品/科学解决方案负责人
  startTiming: 第 3 个月
  rationale: 把客户数据集和评审工作流翻成可复制的试点实施流程和评审包。
- role: 平台/数据工程师
  startTiming: 第 6 个月
  rationale: 降低 onboarding 摩擦，支持 customer-hosted 部署，并把生产账户所需的安全性和可审计性补齐。
- role: 创始人主导 GTM
  startTiming: 第 0 个月
  rationale: 早期销售成败取决于科学公信力、投资人网络准入，以及对每次试点触发点和转化路径的贴身参与。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 3-5 个与真实肿瘤资产决策绑定的共创客户试点
  - 证明最小可用数据集的中位 onboarding 时间不超过 6 周
  - 至少把 2 个付费试点转成生产合同
  - 为安全敏感账户上线 customer-hosted 或 VPC 部署
- horizon: 12–24 个月
  items:
  - 至少让 2 家客户从单一资产扩到多资产或相邻的转化工作流
  - 建起第一版把排序假设与验证结果连接起来的结果数据集
  - 把 onboarding 和评审包 playbook 标准化，降低每个账户的服务投入
- horizon: 24–36 个月
  items:
  - 把活跃资产项目数做到约 20 个，与模型里的第 3 年 SOM 对齐
  - 为已转正客户增加生物标志物分层和项目组合筛选模块
  - 开始有选择地向具备企业部署需求的中型药企肿瘤业务部门上探
risks:
- risk: 即使排序方向大体正确，科学家也可能不信模型给出的假设。
  likelihood: High
  impact: High
  mitigation: 先把产品做成“解释优先”，在每条建议旁边展示相反证据，并在扩大范围前先测真实评审会里的采用情况。
- risk: 凌乱的内部生物科技数据，可能让 onboarding 对一次紧急决策来说慢得不可接受。
  likelihood: High
  impact: High
  mitigation: 从窄接入模板起步，要求最小可用数据包，并在实施路径可复制前继续用带服务的试点。
- risk: 更宽的平台型现有厂商或服务商，一旦看到切口成立，可能把相邻功能打包进来。
  likelihood: Medium
  impact: High
  mitigation: 靠工作流专注度、结果驱动的学习数据，以及围绕单一资产评审的快速可信部署取胜，而不是靠通用模型能力。
- risk: 客户法务或合规团队，可能比预期更早把这套工作流归类为受监管的证据支持。
  likelihood: Medium
  impact: Medium
  mitigation: 早期先把定位守在决策支持，提前补上审计和治理控制，并在产品和预算足以支撑前，不去宣称申报系统能力。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: 用这笔钱支撑 18 个月核心产品搭建、3-5 个共创客户试点、带科学服务的 onboarding、安全与部署强化，以及创始人主导销售，直到公司证明付费试点能可信地转成多资产生产账户。
