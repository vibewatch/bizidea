slug: oncology-combo-reasoning-os
date: '2026-06-04'
executiveSummary: 临床阶段肿瘤生物科技公司经常会走到一个高风险节点：主力资产只显示出部分疗效，管理层必须在下一次董事会、合作谈判或方案决策前，拿出一套站得住脚的联用或生物标志物扩展方案。今天，这个决定依旧要靠人工转化会议、顾问参与、彼此割裂的生信分析，以及从实验、组学、PK、生物标志物和早期临床数据里拼出来的幻灯片。首个客户应是一家 Series B 到 pre-IPO 的肿瘤生物科技公司，手里有一个 Phase I 或 II 的实体瘤靶向资产，内部数据又足够复杂，以至于组合评审已经拖慢了眼前的融资或 BD 里程碑。切口是一套安全的跨模态推理工作台：接入最小可用的内部数据包，返回一个按优先级排序的联用药物或生物标志物假设短名单，并打包一份可审计的验证简报，供转化评审使用。这里的刻意取舍是：先把产品做成围绕单一资产项目的有限决策支持，而不是一个泛化生物学基础模型、一个受监管的申报系统，或一张完整的多模态数据网络。研究支持的 TAM、SAM 和第 3 年 SOM 分别约为 $259.5M、$104.0M 和 $5.0M；只有在公司证明试点能稳定转正之后，再从组合规划扩到相邻的资产开发工作流，这个切口才足够大。最大的执行风险在信任和 onboarding 速度：如果产品不能在一次真实决策周期里，用透明证据链给出一份有用短名单，买方就不会放弃原有会议、CRO 分析和更宽的平台。公开资料对买方预算区间，以及如何在 6 周以内用最小数据集跑出价值，仍然没有完全验证，所以前 12 个月应优先拿下付费试点、跑通转正，并把预算归属摸清，而不是激进扩张市场。
problem:
- 临床阶段肿瘤生物科技公司在决定哪些联用方案或患者亚组值得投入稀缺验证预算时，仍然要靠人工去综合内部实验、组学、PK、生物标志物和早期临床证据。
- 单药疗效见顶、董事会评审和药企合作讨论都会带来明确时限，但现有流程又慢、又容易偏向熟悉机制，还很难用一条连贯的证据链把决策讲清。
- 现有替代方案分散在顾问、CRO 生信、通路工具和大而全的数据平台之间，所以没有哪个产品真正占住一家中型生物科技公司在资产级转化评审里的关键时刻。
solution:
- 围绕单个肿瘤资产接入最小可用的内部实验、组学、PK、生物标志物和早期临床数据包，返回一份按优先级排序的联用药物或生物标志物假设短名单，并附带机制依据。
- 在评审包里展示证据轨迹、相反信号和下一步验证建议；这套输出是为转化会、项目组合会和方案扩展会设计的，不是泛化科学检索。
- 先作为单个真实项目的决策支持上线，配合带分析师的 onboarding 和验证规划，之后再扩到更广的项目组合工作流或受监管的证据支持。
whyWeWin:
- 产品瞄准的是一个明确而紧急的工作流——单个临床阶段肿瘤资产的联用扩展评审——而宽泛的多模态平台和生物学 copilots 并不会天然占住这个位置。
- 透明的证据链和相反证据处理，正面回应了转化肿瘤场景里对黑盒模型输出的不信任。
- 把排序假设、验证结果、被否决选项和后续项目决策连起来的专有数据集，会逐步形成顾问和通用模型厂商都看不到的工作流护城河。
strategicChoices:
  beachhead: 临床阶段肿瘤生物科技公司：手里有一个 Phase I 或 II 的实体瘤靶向资产，转化数据分散、又必须在董事会、合作或方案扩展决策前提名 2-5 个组合假设。
  wedgeRationale: 这个滩头市场比广泛卖给药企或泛肿瘤市场更快出证明，因为买方痛点集中在一个资产、一次评审周期和一个可量化的输出：一份管理层可以立刻行动的、已经获批投入的假设短名单。
  sequencingRationale: 先从单资产决策支持、窄数据模板和创始人主导的共创客户销售起步，先把信任、onboarding 速度和预算归属跑通，再去投入项目组合分析、更深的企业级部署或更广的适应症覆盖。只有付费试点开始稳定转正后，公司才该加可复制的实施岗位、拓展 CRO 和生物标志物实验室伙伴，以及切入生物标志物分层、license 尽调等相邻工作流。
  notYet:
  - 广义的靶点发现或临床前研究工作流
  - 模仿 Tempus 或 ConcertAI 的完整多模态患者数据网络野心
  - 直接用于受监管申报支持的自动化推荐
  - 在生物科技打法尚未跑通前，就扩到非肿瘤适应症或中型药企项目组合销售
market:
  tam: 按模型测算，年化 TAM 为 $259.5M，基于 2024 年肿瘤试验启动量、Phase II 项目占比，以及每个活跃项目约 $250k 的平台加集成年化价值。
  sam: 按模型测算，滩头 SAM 为 $104.0M，聚焦那些组合决策和生物标志物推理最迫切的、面向实体瘤靶向治疗的临床阶段生物科技项目。
  som: 按模型测算，第 3 年 SOM 为 $5.0M，假设通过创始人主导销售，在这个狭窄滩头市场拿下约 20 个活跃资产项目，每个项目年化价值约 $250k。
  segments:
  - 需要联用扩展或生物标志物评审支持的临床阶段肿瘤生物科技公司
  - 在生物科技切口跑通后，再评估内外部资产组合的中型药企肿瘤业务部门
  buyingProcess: 第一单应从付费试点切入：当转化团队遇到单药疗效见顶、临近方案扩展评审或 BD 尽调事件，需要比现有“重会议”流程更快地拿出一份站得住脚的短名单时，产品就有了窗口。冠军用户通常是 VP Translational Oncology 或 Head of Computational Biology，真正拍板的经济买方一般是 CSO 或 SVP R&D；如果 onboarding 或数据治理范围看起来太重，安全、法务和生物标志物相关方都可能一票否决。
product:
  mvp: MVP 是一套面向单个活跃资产的安全肿瘤组合评审工作台：接入常见的实验、组学、PK、生物标志物和早期临床文件，产出一份排序后的假设短名单，并为每条建议附上证据轨迹、相反信号和验证简报。V1 应支持回顾性回测、带分析师的评审，以及可导出的会议材料，但不宣称自动科学判断，也不承诺完整的申报系统合规。
  sixMonth: 前 6 个月上线最常见肿瘤数据类型的窄接入模板、共创客户资产的回顾性回测、评审包导出、审计日志，以及面向安全敏感账户的 customer-hosted 或 VPC 部署路径。
  twelveMonth: 12 个月内在真实资产上跑 3-5 个付费试点，为转化评审会议加入协作工作流，把短名单质量和节省时间与旧流程做对比，并支持把结果交给 CRO 或实验伙伴继续做验证规划。
  twentyFourMonth: 24 个月后，把单资产组合规划扩到已转正客户的生物标志物分层、靶点-适应症匹配和项目组合筛选，同时继续把核心产品守在可审计的决策支持上，而不是做成一个泛用生物学平台。
  keyBets:
  - 最小可用的内部数据集，足以在一次真实评审周期里产出可用于决策的短名单。
  - 相比黑盒分数或泛化文献 copilots，转化团队会更相信带证据链的排序结果。
  - 买方会更快为一个资产级工作流买单，而不是购买一个宽泛的生物学平台或自己组队内建。
  - 早期共创客户产生的结果数据，会在更大平台收窄到同一工作流之前，先形成防御性的学习闭环。
gtm:
  wedge: 围绕一次迫近的董事会、合作或方案扩展决策，卖出一个付费组合评审试点；通过压缩人工综合时间、同时提高“下一步该资助哪些实验或队列”的决策可辩护性来赢单。
  channels:
  - 由创始人主导，卖给已融资肿瘤生物科技公司的 CSO、SVP R&D、VP Translational Oncology 和 Head of Computational Biology
  - 通过投资人、顾问和 KOL 把产品介绍给本就面临里程碑压力的共创客户
  - 围绕真实的转化评审或项目组合评审周期设计共创客户方案，而不是做宽泛平台推销
  - 通过 CRO、实验室和生物标志物网络转介绍，在短名单获批后接上验证执行
  funnelTargets: 目标账户→合格共创客户讨论 25-35%，合格讨论→付费试点 20-30%，付费试点→年度生产合同 50%+，首个生产资产→第二个资产或相邻工作流扩展 30%+（12 个月内）
  pricing: 按资产项目收费的订阅，加 upfront onboarding 费，以及可选的高级评审包服务；定价锚定的是一次活跃项目决策的价值，而不是 seat 数或泛化用量。研究支持一个工作假设：每个活跃项目的年化价值约为 $250k，但真实试点预算和合同归属方必须在前 3-5 单里验证。
businessModel:
  revenueStreams:
  - 按活跃资产项目收取年度订阅
  - 一次性的 onboarding 和数据标准化费用
  - 高级科学评审包和项目组合评审服务
  - 面向更大客户的企业部署、安全与合规增购项
  unitOfValue: 处于转化评审中的活跃肿瘤资产项目
  targetGrossMarginPct: 70
  expansionLevers:
  - 从同一家生物科技公司的一个资产项目扩到更多资产
  - 为已转正客户增加生物标志物分层、靶点-适应症匹配和项目组合筛选模块
  - 为药企或大型生物科技买方叠加企业部署和治理能力
  - 沉淀结果数据集，既提升排序质量，也支撑更高价的验证和 benchmark 产品
strategyMap:
  northStarMetric: 平台生成的短名单真正被用来资助验证计划或方案扩展决策的活跃资产项目数。
  inputMetrics:
  - 每季度合格的生物科技共创客户会议数
  - 从原始数据交接到评审短名单可用的中位时间
  - 被拿到真实转化评审会讨论的排序假设占比
  - 试点转生产的转化率
  - 生产客户扩到第二个资产或新工作流的比例
  - 入围假设推进到验证的比例
  - 客户对证据透明度的信任评分
  moatsToBuild:
  - 把排序假设与验证结果、被否决选项和后续项目决策连接起来的结果数据集
  - 围绕真实转化评审包构建的肿瘤专用证据图谱和相反证据处理层
  - 降低凌乱生物科技数据首个价值时间的安全、部署和 onboarding playbook
  - 贴合转化、生物标志物和项目组合团队既有决策方式的嵌入式工作流模板
  killCriteria:
  - 前 10 个合格肿瘤生物科技账户里，少于 3 个愿意为一次真实联用或生物标志物评审买单试点
  - 前 4 个试点里，最小可用数据集的中位 onboarding 时间仍高于 6 周
  - 前 4 个付费试点里，少于 2 个能以约 $200k 年化价值或更高转成生产合同
  - 多数试点里，转化团队没有在真实评审会上使用短名单，或没有把任何推荐假设推进到验证
  mermaid: |
    flowchart LR
      Wedge[One-asset oncology review wedge] --> MVP[Evidence-traceable reasoning workspace]
      MVP --> Proof[Paid pilots and funded validation plans]
      Proof --> Expansion[Portfolio workflows and second-asset expansion]
investorMemo:
  verdict:
    call: 见面 / 继续尽调
    conviction: 工作流切口很锋利，赛道时机也对，但真正能不能投，取决于预算归属能否跑通、以及可信 onboarding 能否足够快。
    whyBelieve: 肿瘤生物科技公司在组合和生物标志物决策上已经有很强痛点，而这个产品又正好卡在更大平台和服务商都没有完全占住的评审时刻。
    whyDoubt: 如果买方还是更愿意依赖重顾问的评审方式，或内部数据太乱、信任摩擦太大，导致 6 周内跑不出价值，公司就会卡住。
    nextDiligence: 确认 3-5 个真实的共创客户试点，梳理首条签约路径，并验证团队是否真的会在董事会或方案评审里使用这份短名单。
  firstCustomer:
    title: 一家 Phase I 或 II 实体瘤生物科技公司的 VP Translational Oncology
    profile: 一家 Series B 到 pre-IPO 的肿瘤生物科技公司：手里有一个主力靶向治疗资产，转化和计算生物学团队共有 20-80 人，并且眼前就有一次需要机制支撑的扩展或合作决策。
    trigger: 单药疗效见顶、董事会要求给出组合路线图，或药企伙伴在出资前要求看到更强的机制依据。
    buyer: CSO 或 SVP R&D
    initialContract: 先做一个 8-12 周、面向单个活跃资产的付费共创试点，价格在 $75k-$150k；一旦短名单被用来资助验证工作或方案扩展规划，再转成约 $200k-$300k 年化的单项目订阅，另加 onboarding 费用。
  mustBeTrue:
  - 前 10 个合格肿瘤生物科技账户里，至少 3 个愿意为一次真实资产决策支付试点，而不是继续靠内部会议、CRO 支持或顾问幻灯片。
  - MVP 能在多数早期试点里，用最小可用数据集在 6 周内交出一份可进评审会的短名单。
  - 至少一半早期试点里，转化团队会在真实评审会上讨论排序结果，并把一个或多个推荐假设推进到验证。
  - CSO、SVP R&D 或同级预算 owner，会按模型里的单项目价值批准生产合同，而不要求完整的企业软件采购周期。
  - 至少一半首批生产客户会在 12 个月内扩到第二个资产或相邻工作流，从而支撑 venture-scale 的扩张逻辑。
  diligenceQuestions:
  - 如果销售被定义为“决策支持”而不是“基础设施”，第一笔试点究竟从哪条预算线出？
  - 什么样的最小文件包就足以产出一份值得信任的短名单，而不需要漫长的定制集成？
  - 第一年里，买方到底有多频繁会要求带分析师的评审包，而不是纯软件输出？
  - 为什么一家生物科技公司会买这个工作流，而不是继续用 BenchSci、Tempus、ConcertAI，或现有的 CRO + 顾问组合？
  - 要让转化和生物标志物负责人真正采取行动，一条排序假设需要达到什么证据门槛？
operatingAssumptions:
- assumption: 最快的首单路径，是围绕一个真实资产评审卖付费试点，而不是更宽的企业平台 rollout。
  basis: idea.yaml
  validationTest: 在前 3 个试点里至少签下 2 个，并确认它们的预算申请都是围绕明确的董事会、合作或方案扩展触发点。
  decisionImpact: 如果这个假设不成立，销售周期就会变长，当前切口可能窄到不足以支撑高效 GTM。
- assumption: 最小可用数据集可以被标准化到足以产出价值，而不必接完整个 data lake。
  basis: research.yaml
  validationTest: 在前 4 个试点里，验证常见的实验、组学、PK、生物标志物和早期临床文件，能否在 6 周或更短时间内标准化成一份有用短名单。
  decisionImpact: 如果不成立，实施成本会上升，公司就要么进一步收窄数据范围，要么转向更重服务交付。
- assumption: 在纯软件工作流成熟之前，早期买方愿意接受“软件 + 科学服务”的交付方式。
  basis: research.yaml
  validationTest: 同时提供带分析师和轻量化两种试点方案，在至少 4 个机会里对比转化率、使用深度和续约意愿。
  decisionImpact: 如果不成立，团队编制和毛利爬坡都会明显变化，进而影响招聘和融资需求。
- assumption: 至少在前 18 个月里，把产品定位成决策支持，可以先避开直接用于监管证据支持所带来的更重合规负担。
  basis: research.yaml
  validationTest: 与 3 家客户完成安全和合规审查，而初始用例不需要达到 Part 11 级别的验证工作流。
  decisionImpact: 如果不成立，路线图和融资都必须更早转向审计、验证和文档基础设施。
- assumption: 拿下第一个资产项目后，客户会在公司上探药企之前，先扩到第二个资产和相邻的转化工作流。
  basis: idea.yaml
  validationTest: 前期生产客户里至少有 2 家能在上线 12 个月内扩到第二个资产，或扩到相邻的生物标志物分层工作流。
  decisionImpact: 如果不成立，这个滩头市场可能不足以支撑 venture 级结果，公司应重新评估范围或融资策略。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 与合格生物科技公司的转化肿瘤负责人、计算生物学负责人和 CSO 做 15 场结构化访谈。
  hypothesis: 至少 5 家账户眼下就有一次联用或生物标志物评审，而现有流程慢到足以支撑一个付费试点。
  successMetric: 10 场合格会议、5 个已记录的购买触发点，以及 3 次试点范围跟进。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 定义最小可用数据包，并在 2 个回顾性资产数据集上测试接入。
  hypothesis: 常见的肿瘤实验、组学、PK、生物标志物和早期临床文件，已经足以在不做全量定制集成的前提下生成可进评审的短名单。
  successMetric: 2 个回顾性试点在 6 周或更短时间内完成，且客户评分的实用性高于 10 分制里的 7 分。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 围绕真实的董事会、方案扩展或合作决策，跑 3 个带分析师的共创客户试点。
  hypothesis: 只要短名单里同时给出相反证据和下一步验证建议，团队就会在真实决策会议里使用这类可审计的评审包。
  successMetric: 3 个付费试点、2 场使用产品输出的真实评审会，以及每个转正试点至少 1 个推荐假设推进到已拨款验证。
