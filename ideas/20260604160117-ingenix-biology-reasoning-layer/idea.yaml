problem: >-
  Clinical-stage oncology biotechs face a brutal combination-design problem once a lead asset shows partial efficacy but needs the
  right partner drug, biomarker logic, or patient subgroup to unlock the next trial. The relevant evidence sits across internal
  omics files, assay data, PK and safety readouts, biomarker analyses, public literature, and translational team intuition, so
  hypothesis generation is still run through slow meetings, siloed analysts, and consultant-heavy reviews. That makes combination
  plans expensive to defend, easy to bias toward familiar mechanisms, and dangerously slow when the next financing or partnering
  milestone depends on showing a credible expansion path.
targetUser:
  primary: VP Translational Oncology or Head of Computational Biology at a clinical-stage oncology biotech planning combination-expansion studies around one lead asset
  secondary: Translational medicine directors and biomarker leads responsible for preclinical-to-clinical hypothesis packages
  buyer: Chief Scientific Officer or SVP R&D at the biotech
startupThesis:
  nonObviousInsight: >-
    The newly valuable company is not another general-purpose biology foundation model. It is the program-specific reasoning layer
    that can fuse a biotech's messy internal datasets with external biology and turn them into a ranked, mechanistically grounded
    combination plan before management commits to expensive validation or expansion cohorts.
  beachhead: >-
    Clinical-stage oncology biotechs with one Phase I or Phase II targeted therapy asset in solid tumors, internal translational
    datasets spread across multiple teams, and an active need to nominate 2-5 combination hypotheses before the next board,
    partnering, or protocol-expansion decision
  wedge: >-
    A cross-modal oncology combination workspace that ingests internal assay, omics, PK, biomarker, and early clinical readouts,
    then returns ranked partner-drug hypotheses, mechanistic rationale, and a validation-ready experiment brief for translational
    review meetings
  whyNowCatalyst: >-
    Ingenix's financing, Qualified Access Program expansion, and oncology proof point show that cross-modal biology reasoning has
    moved from abstract platform promise to a workflow buyers can test immediately in high-stakes combination-design decisions.
  ventureScalePath: >-
    Start with oncology combination planning, then expand the same reasoning layer into target-indication matching, biomarker
    stratification, translational portfolio triage, licensing diligence, and eventually the decision backbone for biotech and
    pharma asset-development workflows.
solution: >-
  The startup would sell a secure reasoning layer for translational oncology teams that need sharper, faster combination
  hypotheses without building a large internal platform group. Customers would connect their internal preclinical and early
  clinical datasets, map the relevant asset and tumor context, and receive a ranked set of partner-drug or biomarker hypotheses
  with transparent evidence trails across modalities. The product would not stop at scoring ideas; it would package why a
  hypothesis matters, what contradictory evidence exists, and which assays or retrospective analyses should validate it next. Each
  review packet would be designed for real portfolio and protocol meetings, so teams can move from scattered evidence to one
  defendable recommendation set. Over time, the moat becomes the feedback loop between predicted hypotheses, wet-lab validation,
  and downstream program outcomes across many oncology assets.
goToMarketSeed:
  firstCustomer: >-
    A Series B to pre-IPO oncology biotech with one lead solid-tumor asset entering or exiting Phase II, 20-80 scientists across
    discovery and translational medicine, and pressure to define a combination-expansion strategy before the next financing or BD
    milestone
  buyingTrigger: >-
    Monotherapy readouts plateau, an internal portfolio review demands a combination roadmap, or a potential pharma partner asks
    for a mechanistically credible expansion plan before committing capital
  currentAlternative: >-
    Internal translational-biology meetings, literature reviews, consultant-led hypothesis generation, CRO bioinformatics support,
    and single-purpose pathway-analysis tools stitched together in slides and spreadsheets
  switchingReason: >-
    The wedge reduces weeks of manual synthesis, surfaces non-obvious combinations grounded in the company's own data, and gives
    R&D leadership an auditable rationale for which experiments or cohorts to fund next
  pricingHypothesis: >-
    Annual platform subscription priced by active asset program plus onboarding fees for data integration, with premium fees for
    major portfolio reviews and validated hypothesis packages
