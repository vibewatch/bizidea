jobsToBeDone:
  - job: >-
      When a lead oncology asset needs a combination-expansion strategy, help the translational team narrow hundreds of plausible
      options into a few mechanistically strong hypotheses, so they can fund the right validation experiments and protocol work.
    currentAlternative: Manual translational review meetings, consultant analyses, and slide-based literature synthesis
    successMetric: Time from data freeze to approved combination shortlist and percent of shortlisted hypotheses advanced to validation
  - job: >-
      When the CSO prepares for a board or partnering discussion, help the team produce a defendable evidence packet for why a
      specific combination path should be prioritized, so external stakeholders can trust the expansion plan.
    currentAlternative: Ad hoc slide decks assembled by scientists and bioinformatics teams
    successMetric: Time to produce review materials and number of revision cycles before approval
