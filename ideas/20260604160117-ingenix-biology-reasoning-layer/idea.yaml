topRisks:
  - name: Evidence credibility gap
    description: Translational teams may distrust model-generated hypotheses unless the evidence chain is transparent and maps cleanly to known biology.
    mitigation: Start with explanation-first review packets, expose contradictory evidence and source provenance, and keep the product focused on decision support rather than autonomous recommendations.
  - name: Data integration friction
    description: Small biotech teams often have messy internal assay and biomarker data, which can slow time to first value.
    mitigation: Launch with a narrow ingestion template for the most common oncology datasets and offer a services-assisted onboarding path for the first asset program.
  - name: Platform incumbent pull-in
    description: Large model vendors or existing R&D software providers could add lightweight combination-ranking features once the wedge proves valuable.
    mitigation: Win on program-specific review workflow, cross-modal explanation quality, and a proprietary outcomes dataset tied to real validation and expansion decisions.
