slug: oncology-combo-reasoning-os
date: '2026-06-04'
executiveSummary: >-
  Clinical-stage oncology biotechs regularly hit a high-stakes moment when a
  lead asset shows partial efficacy and management needs a defensible
  combination or biomarker expansion plan before the next board, partnering, or
  protocol decision. Today that decision is still assembled through manual
  translational meetings, consultant work, siloed bioinformatics, and slide
  decks built from assay, omics, PK, biomarker, and early clinical data. The
  first customer should be a Series B to pre-IPO oncology biotech with one Phase
  I or II targeted solid-tumor asset and enough internal data complexity that
  combination review is already slowing an imminent funding or BD milestone. The
  wedge is a secure cross-modal reasoning workspace that ingests the minimum
  useful internal dataset, returns a ranked shortlist of partner-drug or
  biomarker hypotheses, and packages an auditable validation brief for
  translational review. The deliberate choice is to start as bounded decision
  support for one asset program rather than as a broad biology foundation model,
  a regulated submission system, or a full multimodal data network. Research
  supports a modeled TAM, SAM, and year-3 SOM of about $259.5M, $104.0M, and
  $5.0M respectively, which is enough for a wedge only if the company expands
  from combination planning into adjacent asset-development workflows after it
  proves repeatable pilot conversion. The main execution risk is trust and
  onboarding speed: buyers will not replace existing meetings, CRO analyses, and
  broader platforms unless the product shows transparent evidence trails and
  reaches a useful shortlist inside one live decision cycle. Public buyer budget
  ranges and the minimum dataset needed for sub-six-week time to value remain
  partially unproven in the source material, so the first 12 months should
  optimize for paid pilots, production conversion, and budget-path clarity
  rather than aggressive market expansion.
problem:
  - Clinical-stage oncology biotechs still synthesize internal assay, omics, PK, biomarker, and early clinical evidence manually when deciding which combinations or patient subgroups deserve scarce validation dollars.
  - Monotherapy plateaus, board reviews, and pharma partnering discussions create time-bound pressure, but the current process is slow, biased toward familiar mechanisms, and hard to defend with one coherent evidence trail.
  - Existing alternatives split across consultants, CRO bioinformatics, pathway tools, and broad data platforms, so no product cleanly owns the asset-level translational review moment for a mid-size biotech team.
solution:
  - Ingest the minimum useful package of internal assay, omics, PK, biomarker, and early clinical data for one oncology asset and return a ranked shortlist of partner-drug or biomarker hypotheses with mechanistic rationale.
  - Show evidence traces, contradictory signals, and next-step validation recommendations in a review packet built for translational, portfolio, and protocol-expansion meetings rather than for generic scientific search.
  - Launch as decision support for one live program, with analyst-assisted onboarding and validation planning, before expanding into broader portfolio workflows or regulated evidence support.
whyWeWin:
  - "The product is scoped to a specific urgent workflow that broad multimodal platforms and biology copilots do not obviously own by default: the combination-expansion review for one clinical-stage oncology asset."
  - Transparent evidence trails and contradiction handling directly address the trust barrier that blocks adoption of black-box model outputs in translational oncology.
  - A proprietary dataset linking ranked hypotheses to validation outcomes, rejected options, and downstream program decisions can compound into a workflow moat that consultants and generic model vendors do not see.
strategicChoices:
  beachhead: Clinical-stage oncology biotechs with one Phase I or II targeted solid-tumor asset, fragmented translational datasets, and an active need to nominate 2-5 combination hypotheses before a board, partnering, or protocol-expansion decision.
  wedgeRationale: >-
    This beachhead produces faster proof than a broad pharma or pan-oncology
    sale because the buyer pain is concentrated around one asset, one review
    cycle, and one measurable output: a funded shortlist of hypotheses that
    management can act on immediately.
  sequencingRationale: Start with one-asset decision support, narrow ingestion templates, and founder-led design-partner sales so the company can prove trust, onboarding speed, and budget ownership before investing in portfolio analytics, deeper enterprise deployment, or broader therapeutic coverage. Only after paid pilots convert should the company add repeatable implementation hires, CRO and biomarker-lab partnerships, and adjacent workflows such as biomarker stratification or licensing diligence.
  notYet:
    - Broad target-discovery or preclinical research workflows
    - Full multimodal patient-data network ambitions that mimic Tempus or ConcertAI
    - Autonomous recommendations for regulated submission support
    - Non-oncology indications or mid-size pharma portfolio sales before the biotech playbook is repeatable
market:
  tam: Modeled $259.5M annual TAM based on 2024 oncology trial starts, Phase II program share, and about $250k annualized platform-plus-integration value per active program.
  sam: Modeled $104.0M beachhead SAM focused on targeted solid-tumor clinical-stage biotech programs where combination and biomarker reasoning pain is most acute.
  som: Modeled $5.0M year-3 SOM assuming about 20 active asset programs at roughly $250k annualized value through founder-led sales in the narrow beachhead.
  segments:
    - Clinical-stage oncology biotechs running targeted solid-tumor assets that need combination-expansion or biomarker-review support
    - Mid-size pharma oncology units evaluating internal and external asset combinations after the biotech wedge is proven
  buyingProcess: >-
    The first sale should start as a paid pilot when a translational team faces a
    monotherapy plateau, imminent protocol-expansion review, or BD diligence
    event and needs a defensible shortlist faster than the current meeting-heavy
    process allows. The champion is usually the VP Translational Oncology or
    Head of Computational Biology, the economic buyer is typically the CSO or
    SVP R&D, and security, legal, and biomarker stakeholders can veto if
    onboarding or data-governance scope looks too heavy.
product:
  mvp: >-
    MVP is a secure oncology combination-review workspace for one active asset
    that ingests common assay, omics, PK, biomarker, and early clinical files,
    produces a ranked shortlist of hypotheses, and packages each recommendation
    with evidence traces, contradictory signals, and a validation brief.
    Version 1 should support retrospective back-testing, analyst-assisted review,
    and exportable meeting packets without claiming autonomous scientific
    judgment or full submission-system compliance.
  sixMonth: >-
    Ship narrow ingestion templates for the most common oncology data types,
    retrospective back-testing on design-partner assets, review-packet exports,
    audit logging, and a customer-hosted or VPC deployment path for security
    sensitive accounts.
  twelveMonth: >-
    Run 3-5 paid pilots on live assets, add collaboration workflows for
    translational review meetings, benchmark shortlist quality and time saved
    against the old process, and support handoff into CRO or assay-partner
    validation planning.
  twentyFourMonth: >-
    Expand from one-asset combination planning into biomarker stratification,
    target-indication matching, and portfolio triage for customers that already
    converted, while keeping the core product focused on auditable
    decision-support rather than becoming a general-purpose biology platform.
  keyBets:
    - A minimum useful internal dataset is sufficient to produce a decision-grade shortlist within one live review cycle.
    - Translational teams will trust evidence-traceable ranked outputs more than black-box scores or generic literature copilots.
    - Buyers will purchase an asset-level workflow faster than they will buy a broad biology platform or fund an internal build.
    - Early design-partner outcome data will create a defensible learning loop before broader platforms narrow into the same workflow.
gtm:
  wedge: Sell a paid combination-review pilot tied to one imminent board, partnering, or protocol-expansion decision, and win by reducing manual synthesis time while improving the defensibility of which experiments or cohorts get funded next.
  channels:
    - Founder-led sales to CSOs, SVPs R&D, VPs Translational Oncology, and Heads of Computational Biology at venture-backed oncology biotechs
    - Investor, advisor, and KOL introductions into design-partner biotechs already under milestone pressure
    - Design-partner offers anchored to live translational or portfolio review cycles rather than broad platform pitches
    - CRO, assay-lab, and biomarker-network referrals that can attach validation execution after the shortlist is approved
  funnelTargets: "Target account→qualified design-partner discussion 25-35%, qualified discussion→paid pilot 20-30%, paid pilot→annual production contract 50%+, first production asset→second asset or adjacent workflow expansion 30%+ within 12 months"
  pricing: Asset-program subscription with upfront onboarding and optional premium review-packet services, priced around the value of one active program decision rather than seats or generic usage. Research supports a working assumption of about $250k annualized value per active program, but the exact pilot budget and contracting owner must be validated in the first 3-5 deals.
businessModel:
  revenueStreams:
    - Annual subscription per active asset program
    - One-time onboarding and data-normalization fees
    - Premium scientific review-packet and portfolio-review services
    - Enterprise deployment, security, and compliance add-ons for larger accounts
  unitOfValue: Active oncology asset program under translational review
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one asset program to additional assets within the same biotech
    - Add biomarker stratification, target-indication matching, and portfolio-triage modules for converted accounts
    - Layer in enterprise deployment and governance features for pharma or larger biotech buyers
    - Build an outcomes dataset that improves ranking quality and supports premium validation and benchmarking products
strategyMap:
  northStarMetric: Active asset programs where the platform-generated shortlist is used to fund a validation plan or protocol-expansion decision.
  inputMetrics:
    - Qualified biotech design-partner meetings per quarter
    - Median time from raw data handoff to review-ready shortlist
    - Share of ranked hypotheses discussed in live translational review meetings
    - Pilot to production conversion rate
    - Production accounts expanding to a second asset or workflow
    - Percentage of shortlisted hypotheses advanced to validation
    - Customer-rated trust score for evidence transparency
  moatsToBuild:
    - Outcome-linked dataset connecting ranked hypotheses to validation results, rejected options, and downstream program decisions
    - Oncology-specific evidence graph and contradiction-handling layer built around real translational review packets
    - Security, deployment, and onboarding playbooks that reduce time to first value for messy biotech datasets
    - Embedded workflow templates that mirror how translational, biomarker, and portfolio teams already make decisions
  killCriteria:
    - Fewer than 3 of the first 10 qualified biotech accounts agree to a paid pilot tied to a live combination or biomarker review
    - Median onboarding time stays above 6 weeks for the minimum useful dataset across the first 4 pilots
    - Fewer than 2 of the first 4 paid pilots convert to production contracts at or above roughly $200k annualized value
    - Translational teams fail to use the shortlist in real review meetings or advance any recommended hypothesis to validation in most pilots
  mermaid: |
    flowchart LR
      Wedge[One-asset oncology review wedge] --> MVP[Evidence-traceable reasoning workspace]
      MVP --> Proof[Paid pilots and funded validation plans]
      Proof --> Expansion[Portfolio workflows and second-asset expansion]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Sharp workflow wedge and credible category timing, but conviction depends on proving a repeatable budget owner and fast trusted onboarding.
    whyBelieve: Oncology biotechs already feel acute combination and biomarker decision pain, and the proposed product is narrowly aligned to the exact review moment that broader platforms and service providers do not fully own.
    whyDoubt: The company can fail if buyers still prefer consultant-heavy reviews or if messy internal data and trust friction prevent sub-six-week time to value.
    nextDiligence: Confirm 3-5 live design-partner pilots, map the first contracting path, and test whether teams actually use the shortlist in board or protocol review decisions.
  firstCustomer:
    title: VP Translational Oncology at a Phase I or II solid-tumor biotech
    profile: A Series B to pre-IPO oncology biotech with one lead targeted therapy asset, 20-80 scientists across translational and computational biology, and an upcoming expansion or partnering decision that needs a mechanistically grounded combination plan.
    trigger: Monotherapy efficacy plateaus, the board demands a combination roadmap, or a pharma partner asks for stronger mechanistic rationale before committing capital.
    buyer: CSO or SVP R&D
    initialContract: Paid 8-12 week design-partner pilot in the $75k-$150k range for one active asset, converting to about $200k-$300k annualized per-program subscription plus onboarding once the shortlist is used to fund validation work or protocol-expansion planning.
  mustBeTrue:
    - At least 3 of the first 10 qualified oncology biotech accounts will fund a paid pilot for one live asset decision instead of staying with internal meetings, CRO support, or consultant decks.
    - The MVP will ingest the minimum useful dataset and deliver a review-ready shortlist inside 6 weeks for the majority of early pilots.
    - In at least half of early pilots, translational teams will discuss the ranked output in a real review meeting and advance one or more recommended hypotheses to validation.
    - A CSO, SVP R&D, or equivalent budget owner will approve production contracts around the modeled per-program value without requiring a full enterprise software cycle.
    - At least half of the first production customers will expand to a second asset or adjacent workflow within 12 months, supporting the venture-scale expansion case.
  diligenceQuestions:
    - Which exact budget line pays for the first pilot if the sale is framed as decision support rather than infrastructure?
    - What minimum file package is enough to produce a trustworthy shortlist without long custom integration?
    - How often do buyers require analyst-assisted review packets rather than software-only output in the first year?
    - Why would a biotech buy this workflow instead of using BenchSci, Tempus, ConcertAI, or its current CRO and consultant mix?
    - What evidence threshold makes a ranked hypothesis credible enough for translational and biomarker leads to act on?
operatingAssumptions:
  - assumption: The fastest initial sale is a paid pilot tied to one live asset review rather than a broader enterprise platform rollout.
    basis: idea.yaml
    validationTest: Close 2 of the first 3 pilots around explicit board, partnering, or protocol-expansion triggers and confirm the same trigger framed the budget request.
    decisionImpact: If false, sales cycles lengthen and the current wedge may be too narrow to support efficient go-to-market.
  - assumption: A minimum useful dataset can be standardized enough to produce value without full data-lake integration.
    basis: research.yaml
    validationTest: Across the first 4 pilots, measure whether common assay, omics, PK, biomarker, and early clinical files can be normalized into a useful shortlist in 6 weeks or less.
    decisionImpact: If false, implementation cost rises and the company should either narrow the data scope further or shift toward higher-services delivery.
  - assumption: Early buyers will accept software plus scientific-services delivery before a pure software workflow is mature.
    basis: research.yaml
    validationTest: Offer both analyst-assisted and lighter-touch pilot formats and compare conversion, usage, and renewal intent across at least 4 opportunities.
    decisionImpact: If false, headcount mix and gross-margin timing change materially, affecting hiring and funding needs.
  - assumption: Decision-support positioning can avoid the heavier regulatory burden of a system used directly for regulatory evidence support in the first 18 months.
    basis: research.yaml
    validationTest: Complete security and compliance reviews with 3 customers without needing Part 11-grade validated workflows for the initial use case.
    decisionImpact: If false, roadmap and funding must shift toward audit, validation, and documentation infrastructure earlier than planned.
  - assumption: Winning the first asset program can expand to second-asset and adjacent translational workflows before the company goes up-market to pharma.
    basis: idea.yaml
    validationTest: Convert at least 2 early production accounts into a second asset or adjacent biomarker-stratification workflow within 12 months of go-live.
    decisionImpact: If false, the beachhead may be too narrow for venture outcomes and the company should revisit scope or funding strategy.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Run 15 structured buyer interviews with translational oncology leaders, computational biology heads, and CSOs at qualified biotechs.
    hypothesis: At least 5 accounts have an imminent combination or biomarker review where the current process is slow enough to justify a paid pilot.
    successMetric: 10 qualified meetings, 5 documented buying triggers, and 3 pilot-scoping follow-ups.
    owner: Founder/CEO
  - horizon: 0–90 days
    experiment: Define the minimum useful data package and test ingestion on 2 retrospective asset datasets.
    hypothesis: Common oncology assay, omics, PK, biomarker, and early clinical files are enough to generate a review-ready shortlist without full custom integration.
    successMetric: 2 retrospective pilots completed in 6 weeks or less with customer-rated usefulness above 7 out of 10.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run 3 analyst-assisted design-partner pilots tied to live board, protocol-expansion, or partnering decisions.
    hypothesis: Teams will use auditable review packets in real decision meetings if the shortlist includes contradictory evidence and validation next steps.
    successMetric: 3 paid pilots, 2 live review meetings using the product output, and at least 1 recommended hypothesis advanced to funded validation per converted pilot.
    owner: Computational biology lead
  - horizon: 90–180 days
    experiment: >-
      Test two commercial offers: analyst-assisted pilot versus lighter-touch
      software workflow.
    hypothesis: The market initially buys a software-plus-services motion faster than a self-serve product, but usage data will show which path can scale.
    successMetric: Side-by-side conversion data from at least 4 opportunities and a documented preferred packaging decision.
    owner: Founder/CEO
  - horizon: 180–365 days
    experiment: Add customer-hosted or VPC deployment and run 2 security reviews with qualified accounts.
    hypothesis: Security and privacy objections can be reduced enough to keep pilots inside a normal biotech procurement cycle.
    successMetric: 2 security approvals without custom one-off architecture and no pilot lost solely to deployment concerns.
    owner: Platform/data engineer
  - horizon: 180–365 days
    experiment: Expand the first production account from one asset to a second asset or adjacent biomarker workflow.
    hypothesis: The same review system can land-and-expand before the company sells into broader pharma accounts.
    successMetric: 1 second-asset expansion and 1 adjacent workflow expansion from the first 3 production customers.
    owner: Product/scientific solutions lead
operations:
  - Secure ingestion and normalization pipeline for assay, omics, PK, biomarker, and early clinical files
  - Evidence graph and review-packet generation workflow with audit logging and contradiction tracking
  - Services-assisted pilot operations tied to customer review calendars and validation handoff
  - CRO, assay-lab, and biomarker-network partner management for downstream experiment execution
  - Customer-hosted or VPC deployment option for sensitive biotech accounts
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the core reasoning, ingestion, and evidence-traceability system fast enough to support retrospective pilots without a large platform team.
  - role: Computational biology lead
    startTiming: Month 0
    rationale: Own ontology choices, shortlist quality, and credibility with translational scientists during early pilots.
  - role: Product/scientific solutions lead
    startTiming: Month 3
    rationale: Translate customer datasets and review workflows into repeatable pilot implementations and review packets.
  - role: Platform/data engineer
    startTiming: Month 6
    rationale: Reduce onboarding friction, support customer-hosted deployment, and harden security and auditability for production accounts.
  - role: Founder-led GTM
    startTiming: Month 0
    rationale: Early sales depend on scientific credibility, investor-network access, and close involvement in each pilot trigger and conversion path.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3-5 design-partner pilots tied to live oncology asset decisions
      - Prove median onboarding time of 6 weeks or less for the minimum useful dataset
      - Convert at least 2 paid pilots into production contracts
      - Launch customer-hosted or VPC deployment for security-sensitive accounts
  - horizon: 12–24 months
    items:
      - Expand at least 2 customers from one asset to multiple assets or adjacent translational workflows
      - Build the first outcome-linked dataset connecting ranked hypotheses to validation results
      - Standardize a repeatable onboarding and review-packet playbook that reduces services effort per account
  - horizon: 24–36 months
    items:
      - Reach about 20 active asset programs consistent with the modeled year-3 SOM
      - Add biomarker stratification and portfolio-triage modules for converted customers
      - Begin selective up-market expansion into mid-size pharma oncology units with enterprise deployment requirements
risks:
  - risk: Scientists may distrust model-generated hypotheses even if the rankings are directionally useful.
    likelihood: High
    impact: High
    mitigation: Keep the product explanation-first, show contradictory evidence beside each recommendation, and measure adoption in live review meetings before expanding scope.
  - risk: Messy internal biotech data may make onboarding too slow for an urgent decision cycle.
    likelihood: High
    impact: High
    mitigation: Start with narrow ingestion templates, require a minimum useful data package, and use services-assisted pilots until the implementation path is repeatable.
  - risk: Broader incumbents or service providers may bundle adjacent functionality once the wedge proves valuable.
    likelihood: Medium
    impact: High
    mitigation: Win on workflow specificity, outcome-linked learning data, and fast trusted deployment around one asset review rather than on generic model capability.
  - risk: Customer legal or compliance teams may classify the workflow as regulated evidence support earlier than planned.
    likelihood: Medium
    impact: Medium
    mitigation: Keep the initial posture as decision support, add audit and governance controls early, and avoid submission-system claims until the product and budget can support that scope.
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of core product build, 3-5 design-partner pilots, scientific-services-assisted onboarding, security and deployment hardening, and founder-led sales until the company proves trusted pilot conversion into multi-asset production accounts.
