reportMemo:
  executiveTakeaways:
  - 这个滩头市场是真实存在的，因为肿瘤联用和生物标志物决策至今仍依赖人工、跨职能地拼接证据；而随着模态和试验复杂度上升，这套流程已经开始扛不住。
  - 最有防御性的切口不是宽泛的“AI for biology”，而是一个资产级工作流：把内部实验、组学、PK、生物标志物和早期临床信号，收敛成一份供转化评审使用的联用短名单。
  - 竞争已经活跃，但分散在临床前证据图谱、多模态患者数据平台和全栈 TechBio 公司之间；对中型肿瘤生物科技公司来说，还没有谁明显占住了“方案扩展评审”这个时刻。
  - 最大的采用风险不是模型能力不够，而是信任门槛：买方需要可审计的证据链、明确的部署边界，以及足够快的首个价值时刻，才会替换顾问、CRO 分析和靠幻灯片推进的评审会。
  marketDefinition: 这里的市场，是帮助肿瘤药物开发者在投入昂贵验证或方案扩展预算之前，把多模态转化证据转成资产级靶点、联用方案和生物标志物决策的软件与数据产品。
  customerAndBuyer: 日常冠军用户是围绕单个主力项目运转的 VP Translational Oncology 或 Head of Computational Biology；经济买方通常是 CSO 或 SVP R&D，而生物标志物、临床开发和 IT/合规相关方会构成关键否决点。
  buyingTriggers:
  - point: 当单药疗效见顶、转化团队必须在扩展队列或董事会决策前拿出一份站得住脚的联用短名单时，购买触发最强。
    sourceRefs:
    - 13
    - 21
    - 22
  - point: 当生物标志物检测和 MTB 准备变成协同瓶颈，人工综合就会慢到跟不上真实项目组合评审节奏。
    sourceRefs:
    - 4
    - 31
    - 32
  - point: 当合作方或投资人要求看到更强的机制依据和患者分层逻辑，才能支持下一步肿瘤项目投入时，购买窗口会被推开。
    sourceRefs:
    - 3
    - 13
    - 15
  willingnessToPay:
    summary: 买方行为已经证明这个赛道能拿到有意义的预算：Tempus、AstraZeneca 和 Pathos 做了一个 $200M 的多模态肿瘤模型合作；Recursion 披露的大药企平台合作 upfront 风格付款达到 $80M-$150M，并带有更大里程碑池；生物科技公司关于自建还是购买 AI 平台的指南也说明，商业化平台虽然不便宜，但只要能更快跑出价值，仍然值得买。
    sourceRefs:
    - 15
    - 16
    - 17
    - 30
    - 46
  competitiveLandscape: 现实替代方案主要分成四类：内部转化会议和顾问；以 BenchSci 为代表的临床前证据平台；以 Tempus 和 ConcertAI 为代表的多模态肿瘤数据网络；以及以 Owkin、Recursion、Isomorphic Labs 为代表的 AI-first 生物学平台。拟议中的创业公司不该长成另一个“通用基础模型”，而应是一层狭窄、可追溯证据的决策系统，服务于单个真实资产项目。
  incumbentThesis:
  - incumbentClass: 临床前证据 SaaS
    point: BenchSci 在发现疾病生物学证据上很强，但它的重心更偏早期临床前研究，而不是临床阶段肿瘤资产的联用扩展决策包。
    sourceRefs:
    - 6
    - 14
    - 37
    - 41
  - incumbentClass: 多模态患者数据平台
    point: Tempus 和 ConcertAI 赢在数据规模和真实世界证据，但它们是更宽的平台化销售，并不会自动解决生物科技公司特有的转化评审工作流。
    sourceRefs:
    - 15
    - 16
    - 35
    - 48
  - incumbentClass: 代理式生物学 Copilot
    point: Owkin 正在推进代理式生物学推理，但它覆盖从发现到开发的更大范围；对只想解决一次紧急单资产评审的生物科技公司来说，可能太重。
    sourceRefs:
    - 7
    - 49
  - incumbentClass: 全栈 TechBio 平台
    point: Recursion 和 Isomorphic Labs 证明了药企愿意为 AI-first 生物学平台重金投入，但它们更像是重合作的平台建设者，而不是中型肿瘤生物科技团队可直接插上的工具。
    sourceRefs:
    - 9
    - 17
    - 39
    - 50
  regulatoryLandscape: 最安全的起步姿态，是把产品守在决策支持，而不是自动推荐。一旦输出开始替代申报证据的一部分，要求就会迅速转向 AI 可信度方案、全生命周期监控、经过验证的记录，以及更强的隐私控制。
  technologyLandscape: 技术栈正在收敛到多模态数据融合、图谱原生证据层和代理式 copilots。这个方向上更可能赢的实现方式，是把结构化证据锚定和窄模型排序结合起来的混合系统，而不是纯黑盒 LLM。
  distributionChannels:
  - point: 对这种狭窄又高风险的工作流来说，最可信的切入路径，仍然是创始人亲自卖给 CSO、转化肿瘤负责人和计算生物学负责人。
    sourceRefs:
    - 13
    - 31
    - 37
  - point: 围绕迫近的董事会、合作或方案扩展评审去做共创客户计划，比做宽泛平台推销更容易转化。
    sourceRefs:
    - 1
    - 3
    - 13
  - point: 分子肿瘤委员会和精准肿瘤网络是很好的信誉渠道，因为它们本来就把多学科证据评审当成常规动作。
    sourceRefs:
    - 31
    - 32
  partnershipEcosystem:
  - point: 生物标志物实验室、基因检测供应商和临床数据伙伴，能通过提供已经标准化的证据流来降低 onboarding 摩擦。
    sourceRefs:
    - 3
    - 35
    - 48
  - point: CRO 和实验伙伴是天然补位者，因为客户在拿到排序结果后，仍然需要湿实验和回顾性验证。
    sourceRefs:
    - 3
    - 13
    - 21
  - point: 大平台生态已经证明，买方愿意为打通的多模态数据付费；因此外部数据合作可以扩展洞察深度，而不必把公司做成一张完整数据网络。
    sourceRefs:
    - 35
    - 46
    - 49
  dataMoats:
  - point: 最强的护城河不是公开文献本身，而是客户内部的实验、组学、PK、生物标志物和早期临床数据，与一个可审计的外部证据层叠在一起。
    sourceRefs:
    - 1
    - 6
    - 31
    - 49
  - point: 哪些排序后的组合被推进、被否掉或被验证，这些结果反馈会变成通用 copilots 看不到的专有学习数据。
    sourceRefs:
    - 1
    - 17
    - 39
  - point: 可追踪的图谱式证据锚定很关键，因为转化团队要看的不是一段流畅说辞，而是为什么系统会给出这条建议。
    sourceRefs:
    - 6
    - 33
    - 41
  geographicConsiderations:
  - point: 美国和欧洲生物科技公司是最干净的首个切口，因为肿瘤活动密集，买方也已经习惯采购外部数据和软件；但它们同样面临最重的隐私和验证审查。
    sourceRefs:
    - 2
    - 11
    - 21
  - point: ADC 和肿瘤试验在全球分布广泛，中国和美国尤为集中；后续扩张可以沿着那些模态复杂、联用压力高的项目走。
    sourceRefs:
    - 21
    - 29
  sensitivityCases:
  - case: 生物科技融资继续偏紧，CSO 推迟新增软件预算
    impact: 销售必须绑定到一个真实价值事件上，并证明自己比顾问主导的综合更快、更便宜。
    sourceRefs:
    - 13
    - 22
    - 30
  - case: 大型数据平台向下切入，推出更窄的转化产品
    impact: 公司必须在单资产工作流速度、证据透明度，以及评审会内嵌程度上继续领先。
    sourceRefs:
    - 15
    - 16
    - 35
    - 48
  - case: 官方合规团队把输出归类为受监管的证据支持
    impact: 实施成本会升高，因为审计、验证和人工复核控制都会变成产品表层的一部分。
    sourceRefs:
    - 24
    - 25
    - 26
    - 27
    - 44
    - 45
  validationPlan:
  - priority: high
    question: 转化肿瘤团队会不会足够信任排序后的联用结果，愿意把它带进真实扩展评审？
    evidenceToGather: 在活跃资产上跑 3-5 个真实共创客户试点，对比短名单质量、节省时间和会议采用情况，看看是否优于客户现有流程。
  - priority: high
    question: 内部脏数据能脏到什么程度，才会让首个价值时刻塌掉？
    evidenceToGather: 在回顾性试点里，用实验、组学、生物标志物和早期临床文件测 onboarding 时间，并找出最小可用数据包。
  - priority: medium
    question: 买方想买的是纯软件，还是“软件 + 科学服务”？
    evidenceToGather: 测试两种试点报价：自助式证据工作台 vs 带分析师的评审包，并记录转化率、交付速度和续约意愿。
