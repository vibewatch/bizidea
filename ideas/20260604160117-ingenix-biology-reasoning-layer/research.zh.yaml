  - friction: 安全和合规审查可能把部署卡住
    severity: medium
    affectedBuyer: CSO（连同 IT / 法务相关方）
    mitigation: 从第一天起就提供 VPC 或 customer-hosted 选项、强审计日志和明确的数据治理控制。
    sourceRefs:
