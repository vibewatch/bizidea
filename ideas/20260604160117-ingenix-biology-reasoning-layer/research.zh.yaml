  stage: 种子期
  wedge: 面向转化和临床研发决策的跨模态生物学推理引擎。
  pricing: 未公开；Qualified Access Program / 企业合作模式
  strength: 与拟议切口最接近的战略类比，而且已经拿出了一个肿瘤联用式验证点。
  weaknessVsUs: 它仍被定位成宽泛的推理层，这给围绕单一生物科技资产评审的、更产品化的窄工作流留下了空间。
  sourceRefs:
  - 1
- name: BenchSci
  stage: 成长期
  wedge: 神经符号化的疾病生物学平台，用于靶点尽调、文献综合和实验规划。
  pricing: Enterprise SaaS；未公开单独定价
  strength: 已深入大型药企，在证据锚定和内部数据接入上叙事很强。
  weaknessVsUs: 它的重心在临床前生物学和实验规划，而不是临床阶段的联用扩展评审包。
  sourceRefs:
  - 6
  - 14
  - 37
  - 41
- name: Owkin
  stage: 成长期
  wedge: 建立在多模态患者数据和肿瘤验证之上的代理式生物学推理。
  pricing: 企业平台 / 授权；未公开单独定价
  strength: 拥有丰富的患者数据网络，也明确想覆盖从发现到开发的决策。
  weaknessVsUs: 平台范围更大、更重；对一个只有单项目紧急评审需求的生物科技买方来说，可能过度建设。
  sourceRefs:
  - 7
  - 49
- name: Tempus
  stage: 成长期
  wedge: 多模态肿瘤数据网络，以及面向药物发现和医疗决策的基础模型策略。
  pricing: 定制化的数据 / 平台 / 模型开发协议
  strength: 拥有海量肿瘤数据集，也已经用 AstraZeneca 和 Pathos 验证了大额付费意愿。
  weaknessVsUs: 它更适合数据网络规模和大型合作，不是为生物科技原生的转化评审工作流做的轻量产品。
  sourceRefs:
  - 15
  - 16
  - 46
- name: ConcertAI
  stage: 在位企业
  wedge: 面向生命科学的临床关联肿瘤数据、转化研究和临床试验决策工具。
  pricing: 定制化企业合同
  strength: 在生命科学客户中渗透很深，转化研究和试验支持定位也站得住。
  weaknessVsUs: 它更偏 RWE 和试验运营，反而给“在单一资产团队内部对组合假设排序”的更鲜明产品留下空间。
  sourceRefs:
  - 35
  - 48
regulatoryTechnicalConstraints:
- point: 如果系统被用来支持与安全性、有效性或质量相关的监管决策，赞助方就应预期要做 FDA 风格的风险分级可信度计划、模型文档和全生命周期维护。
  sourceRefs:
  - 24
  - 25
  - 26
  - 27
- point: 只要部署会创建或修改受监管的电子记录，就应默认需要经过验证的系统、审计追踪、访问控制和关联电子签名。
  sourceRefs:
  - 44
  - 45
- point: 一旦涉及欧盟个人数据处理，GDPR 义务就会立刻生效；只要多模态患者数据在范围内，客户安全审查也会更严格。
  sourceRefs:
  - 11
  - 20
  - 49
- point: 试验信息系统早就把安全云、基于角色的访问、互操作和责任链控制当成标配，这也等于给企业部署划出了门槛。
  sourceRefs:
  - 3
  - 31
validationSignals:
- point: Ingenix 声称，在一项肿瘤合作里，它把双 payload ADC 的搜索问题压缩到了 15 个候选组合，并筛出 3 个可执行的新假设。
  sourceRefs:
  - 1
- point: BenchSci 报告称，早期采用者里有 40% 的项目找到了新适应症 / 新靶点，33% 的项目更早识别出安全或疗效风险。
  sourceRefs:
  - 14
- point: Tempus、AstraZeneca 和 Pathos 做出了一个 $200M 的多模态肿瘤基础模型合作，说明大买家已经在为这个底层品类掏钱。
  sourceRefs:
  - 15
  - 16
  - 46
- point: ConcertAI 与 Foundation Medicine 把一个接近 50 万患者的临床关联数据集，直接定位到转化研究和药物开发决策。
  sourceRefs:
  - 35
openQuestions:
- 一家 Series B 到 pre-IPO 的肿瘤生物科技公司，究竟能为单个资产级推理工具拨出多少年度预算？相较之下，它原本会把钱花在顾问、CRO 生信还是更宽的数据平台上？
- 什么样的最小内部数据包，足以在 6 周以内产出对决策有用的排序组合？
- 买方会更偏好纯软件工作流产品，还是在最初 6-12 个月里仍需要带分析师的评审包？
- 最强的首个细分市场，到底是双 payload ADC 优先级排序、实体瘤靶向治疗联用，还是更广义的生物标志物分层扩展规划？
