    severity: high
    affectedBuyer: CSO / SVP R&D
    mitigation: 让试点绑定到一次迫近的决策，并把节省时间、短名单质量和验证推进情况与旧流程逐项对比。
    sourceRefs:
    - 3
    - 13
    - 21
market:
  tam:
    value: $259.5M
    rationale: 自下而上的估算：2024 年肿瘤试验启动 2,162 项 × Phase II 占比 48% = 1,038 个项目 [2]；再按每个活跃项目 $250k 的平台加集成年化价值计算，该假设参考了生物科技 AI 自建/外购预算代理值 [30]，得出约 $259.5M。交叉校验：这个数字低于相邻市场里 2026 年 AI in oncology drug discovery 的 $407.2M 估算 [19]。
    isEstimate: true
    sourceRefs:
    - 2
    - 19
    - 30
  sam:
    value: $104.0M
    rationale: 再加一层滩头约束：约 40% 的 Phase II 肿瘤项目可映射到靶向实体瘤、且处于临床阶段的生物科技项目——这些项目的组合和生物标志物推理痛点最强；因此 1,038 × 40% × $250k ≈ $104.0M。
    isEstimate: true
    sourceRefs:
    - 2
    - 21
    - 30
  som:
    value: $5.0M
    rationale: 第 3 年可触达份额按约 20 个活跃资产项目、每个项目约 $250k 年化价值估算；对一个狭窄的生物科技细分市场来说，这个目标有挑战，但通过创始人主导的共创客户销售并非不可能。
    isEstimate: true
    sourceRefs:
    - 13
    - 30
