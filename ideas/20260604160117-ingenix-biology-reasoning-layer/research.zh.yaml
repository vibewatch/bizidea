  adoptionFrictionMatrix:
  - friction: 内部实验、组学、PK 和生物标志物数据太乱，拖慢 onboarding
    severity: high
    affectedBuyer: 计算生物学负责人
    mitigation: 先围绕单个项目试点做窄接入模板，不要一开始就承诺覆盖整个平台。
    sourceRefs:
    - 4
    - 31
    - 33
  - friction: 科学家不信黑盒式排序假设
    severity: high
    affectedBuyer: 转化肿瘤副总裁
    mitigation: 每条排序建议旁边都展示证据轨迹、相反信号和回顾性回测结果。
