  downside:
    description: "Pilot conversion slips, land-and-expand is slower, and blended program value stays closer to the core contract price."
    y3RevenueK: 3031.3
    y3EbitdaK: -1087.5
    cashLowPointK: 35.7
    keyAssumptionChanges:
      - "Y2 endpoints fall to [4,5,7,9] and Y3 endpoints fall to [10,12,14,16]."
      - "Y2 blended annualized program value drops to $210K and Y3 to $250K."
      - "Gross margin exits Y3 at 68% instead of 70% because analyst-assisted delivery stays heavier for longer."
  base:
    description: "Founder-led sales closes four paid pilots in Y1, converts into repeatable production programs in Y2, and reaches the modeled 20 active programs by Q4Y3."
    y3RevenueK: 4640.0
    y3EbitdaK: 108.4
    cashLowPointK: 1474.8
    keyAssumptionChanges:
      - "Customer ramp follows A4, A5, and A6."
      - "Blended program values follow A7, A8, and A9."
      - "Gross margin and hiring follow A11 and A13 without a regulatory-scope surprise."
  upside:
    description: "Pilot proof arrives faster, second-asset expansion shows up earlier, and the company sells more premium review services into converted accounts."
    y3RevenueK: 5887.5
    y3EbitdaK: 1097.0
    cashLowPointK: 1930.9
    keyAssumptionChanges:
      - "Y2 endpoints improve to [6,9,12,15] and Y3 endpoints to [17,20,22,24]."
      - "Blended annualized program value rises to $250K in Y2 and $300K in Y3."
      - "Gross margin reaches 72% in Y3 because onboarding templates and premium services scale better than planned."
