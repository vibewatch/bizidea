modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Buyers[Qualified biotech accounts] --> Pilots[Paid pilots]
      Pilots --> Programs[Active asset programs]
      Programs --> Revenue[Subscription and onboarding revenue]
      Revenue --> GrossProfit[Gross profit after delivery and cloud costs]
      GrossProfit --> Cash[Cash after payroll and operating spend]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue is driven by four Y1 paid pilots compounding into 20 active asset programs by Q4Y3 at a blended $290K annual program value."
  - checkName: "Must go right"
    finding: "Onboarding has to stay at or below six weeks so pilots convert into production and at least two customers expand to second assets on schedule."
  - checkName: "Model breaks if"
    finding: "If sales cycles stretch and Y3 ends closer to 16 active programs at $250K value, cash falls to roughly breakeven and EBITDA remains deeply negative."
  - checkName: "Next-round proof"
    finding: "A Series A story appears once the company shows repeatable pilot-to-production conversion, VPC deployment, and real second-asset expansion rather than pilot revenue alone."
sanityChecks:
  ruleOf40: "Y3 growth 167% + EBITDA margin 2% = 169% (directionally strong but flattered by a small Y2 revenue base)."
  burnMultiple: "Y2 burn multiple is about 0.5x ($1.14M net burn against roughly $2.40M of net new ARR from year-end active programs), which is healthy if the founder-led GTM motion remains efficient."
  revenuePerFte: "$387K Y3 (about $4.64M revenue / 12 FTE), which sits at the high end of the $200K-$400K SaaS benchmark because each customer is a high-ACV asset program rather than a seat."
  flags:
    - "The base case still depends on founder-led selling and only a modest paid demand-gen motion, so CAC could rise once the company hires beyond the first GTM rep."
    - "Y3 EBITDA is only modestly positive, which means a next round still depends on proving services leverage and expansion quality rather than headline growth alone."
    - "Cash is modeled as EBITDA and excludes enterprise collection timing or deferred revenue, so real quarterly cash swings could be lumpier than shown here."
