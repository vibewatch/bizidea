scenarios:
  downside:
    description: 试点转正变慢，land-and-expand 更迟缓，混合项目价值也更接近核心合同价。
    y3RevenueK: 3031.3
    y3EbitdaK: -1087.5
    cashLowPointK: 35.7
    keyAssumptionChanges:
    - Y2 期末客户数降到 [4,5,7,9]，Y3 降到 [10,12,14,16]。
    - Y2 混合年化项目价值降到 $210K，Y3 降到 $250K。
    - 由于带分析师的交付持续更重，Y3 结束时毛利率只有 68%，而不是 70%。
  base:
    description: 创始人主导销售在第 1 年拿下 4 个付费试点，在第 2 年转成可复制的生产项目，并在 Q4Y3 达到模型里的 20 个活跃项目。
    y3RevenueK: 4640.0
    y3EbitdaK: 108.4
    cashLowPointK: 1474.8
    keyAssumptionChanges:
    - 客户增长节奏按 A4、A5 和 A6 走。
    - 混合项目价值按 A7、A8 和 A9 走。
    - 在没有监管范围意外扩大的前提下，毛利率和招聘按 A11 与 A13 推进。
  upside:
    description: 试点证明来得更快，第二资产扩张更早出现，公司也能向已转正客户卖出更多高级评审服务。
    y3RevenueK: 5887.5
    y3EbitdaK: 1097.0
    cashLowPointK: 1930.9
    keyAssumptionChanges:
    - Y2 期末客户数提升到 [6,9,12,15]，Y3 提升到 [17,20,22,24]。
    - Y2 混合年化项目价值升到 $250K，Y3 升到 $300K。
    - 由于 onboarding 模板和高级服务的扩张效果好于预期，Y3 毛利率升到 72%。
