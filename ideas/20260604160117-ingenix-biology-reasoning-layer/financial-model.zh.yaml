modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Buyers[Qualified biotech accounts] --> Pilots[Paid pilots]
      Pilots --> Programs[Active asset programs]
      Programs --> Revenue[Subscription and onboarding revenue]
      Revenue --> GrossProfit[Gross profit after delivery and cloud costs]
      GrossProfit --> Cash[Cash after payroll and operating spend]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入由第 1 年 4 个付费试点驱动，并在 Q4Y3 复利到 20 个活跃资产项目；对应的混合年化项目价值为 $290K。
- checkName: 必须做对的事
  finding: Onboarding 必须稳定在 6 周或更短，这样试点才能转成生产项目，且至少有 2 家客户能按计划扩到第二资产。
- checkName: 模型会失效如果
  finding: 如果销售周期拉长，且 Y3 结束时只接近 16 个活跃项目、每个项目价值约 $250K，现金就会逼近盈亏平衡线，EBITDA 也会继续深度为负。
- checkName: 下一轮融资证明
  finding: 真正能讲 Series A 故事的，不是试点收入本身，而是可复制的试点转生产、VPC 部署，以及真实出现的第二资产扩张。
sanityChecks:
  ruleOf40: Y3 增长 167% + EBITDA 利润率 2% = 169%（方向上很强，但也被较小的 Y2 收入基数放大了）。
  burnMultiple: Y2 burn multiple 约为 0.5x（净烧钱 $1.14M，对比年末活跃项目带来的约 $2.40M 净新增 ARR）；只要创始人主导 GTM 还能保持高效率，这个数字就算健康。
  revenuePerFte: Y3 每名 FTE 约 $387K（约 $4.64M 收入 / 12 FTE），处在 $200K-$400K SaaS benchmark 的高位，因为每个客户对应的是高 ACV 资产项目，而不是 seat。
  flags:
  - 基准情景仍然高度依赖创始人主导销售，付费 demand-gen 也只做得很轻；一旦公司开始招聘首位 GTM 之后的人手，CAC 可能会上升。
  - Y3 EBITDA 只是小幅转正，这意味着下一轮融资仍然要靠证明服务杠杆和扩张质量，而不只是 headline 增长。
  - 模型把现金近似处理成 EBITDA，未纳入企业回款节奏或递延收入，因此真实季度现金波动可能会比这里更颠簸。
