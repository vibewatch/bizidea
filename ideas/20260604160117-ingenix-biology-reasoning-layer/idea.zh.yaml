topRisks:
- name: 证据可信度缺口
  description: 如果证据链不透明、又对不上已知生物学，转化团队可能不会相信模型给出的假设。
  mitigation: 先把产品做成“解释优先”的评审包，明确展示相反证据和来源溯源，并把定位守在决策支持而不是自动推荐。
- name: 数据集成摩擦
  description: 小型生物科技团队的内部实验和生物标志物数据往往很乱，首个价值时刻容易被拖慢。
  mitigation: 先围绕最常见的肿瘤数据集做窄模板，并为首个资产项目提供带服务的 onboarding 路径。
- name: 平台型现有厂商下压
  description: 一旦这个切口证明有价值，大模型厂商或现有研发软件提供商可能会补上轻量级组合排序功能。
  mitigation: 靠项目级评审工作流、跨模态解释质量，以及绑定真实验证和扩展决策的专有结果数据取胜。
