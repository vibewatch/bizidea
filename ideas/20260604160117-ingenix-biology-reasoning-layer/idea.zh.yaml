jobsToBeDone:
- job: 当一个肿瘤主力资产需要联用扩展策略时，帮转化团队把数百个看似合理的选项收敛成少数几个机制上更强的假设，这样他们才能把钱投到对的验证实验和方案设计上。
  currentAlternative: 人工转化评审会、顾问分析和基于幻灯片的文献归纳
  successMetric: 从数据冻结到组合短名单获批所需时间，以及入围假设推进到验证的比例
- job: 当 CSO 要准备董事会或合作讨论时，帮团队做出一套能站得住脚的证据包，解释为什么某条组合路径应该优先推进，让外部利益相关方相信这份扩展计划。
  currentAlternative: 科学家和生信团队临时拼出来的幻灯片
  successMetric: 评审材料产出时间，以及最终过会前需要返工的轮次
