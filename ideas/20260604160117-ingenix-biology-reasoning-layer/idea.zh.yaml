problem: 对临床阶段肿瘤生物科技公司来说，一旦某个主力资产只表现出部分疗效，接下来最大的难题就是找出合适的联用药物、生物标志物逻辑或患者亚组，撑起下一轮试验。相关证据散落在内部组学文件、实验数据、PK 和安全性读数、生物标志物分析、公开文献，以及转化团队的经验判断里，所以假设生成至今还要靠缓慢的会议、彼此割裂的分析师和重度顾问介入来推进。结果就是：组合方案既贵、也容易被熟悉机制带偏；而当下一轮融资或 BD 里程碑要看一条可信的扩展路径时，决策速度又慢得危险。
targetUser:
  primary: 临床阶段肿瘤生物科技公司里，负责围绕单一主力资产规划联用扩展研究的转化肿瘤副总裁或计算生物学负责人
  secondary: 负责从临床前到临床假设包的转化医学总监和生物标志物负责人
  buyer: 该生物科技公司的 CSO 或 SVP R&D
startupThesis:
  nonObviousInsight: 真正新值钱的公司，不会是另一个通用型生物学基础模型，而是一层贴着具体项目的推理层：它能把一家生物科技公司凌乱的内部数据和外部生物学证据揉到一起，在管理层投入昂贵验证或扩展队列之前，先给出一份按优先级排好的、机制上讲得通的组合方案。
  beachhead: 临床阶段肿瘤生物科技公司：手里有一个处于 Phase I 或 Phase II 的实体瘤靶向治疗资产，内部转化数据分散在多个团队，还需要在下一次董事会、BD 或方案扩展决策前提名 2-5 个组合假设
  wedge: 一个跨模态的肿瘤组合工作台，接入内部实验、组学、PK、生物标志物和早期临床读数，然后返回按优先级排序的联用药物假设、机制依据，以及一份可直接进入验证的实验简报，供转化评审会议使用
  whyNowCatalyst: Ingenix 的融资、Qualified Access Program 扩大，以及肿瘤方向的验证点，都说明跨模态生物学推理已经从抽象的平台叙事，变成买方现在就能在高风险组合决策里试起来的工作流。
  ventureScalePath: 先从肿瘤组合规划切入，再把同一套推理层扩到靶点-适应症匹配、生物标志物分层、转化项目组合筛选、license 尽调，最后做成生物科技和药企资产开发流程里的决策骨架。
solution: 这家创业公司卖的是一层安全的推理系统，面向那些想更快、更准地产出组合假设、又不想自建庞大平台团队的转化肿瘤团队。客户把内部临床前和早期临床数据接进来，标定相关资产和肿瘤背景后，就能拿到一组按优先级排序的联用药物或生物标志物假设，并附带跨模态的透明证据链。产品不会停在“给分”这一步，而是会把这个假设为什么重要、有哪些相反证据、下一步该做哪些实验或回顾性分析，一并打包出来。每份评审包都按真实的项目组合会和方案会来设计，让团队能从四散的证据直接走到一组站得住脚的建议。时间越久，护城河越深：预测出的假设、湿实验验证结果，以及后续项目结果会形成一个持续回流的学习闭环。
goToMarketSeed:
  firstCustomer: 一家处于 Series B 到 pre-IPO 的肿瘤生物科技公司：有一个即将进入或刚结束 Phase II 的实体瘤主力资产，发现和转化医学团队共有 20-80 名科学家，并且必须在下一轮融资或 BD 里程碑前明确联用扩展策略
  buyingTrigger: 单药读数见顶、内部项目组合评审要求给出组合路线图，或潜在药企伙伴在出资前要求看到一套机制上站得住脚的扩展方案
  currentAlternative: 内部转化生物学会议、文献综述、顾问主导的假设生成、CRO 生信支持，再加上一堆用幻灯片和表格拼起来的单点通路分析工具
  switchingReason: 这个切口能把原本要花几周的人肉综合压缩下来，挖出建立在公司自有数据上的非共识组合，同时也给研发管理层一条可审计的理由链，解释下一步该给哪些实验或队列拨钱。
  pricingHypothesis: 按活跃资产项目收费的年度平台订阅，另收数据接入 onboarding 费用；重大项目组合评审和经验证的假设包再收更高价的增值费用。
