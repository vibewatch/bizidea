  "regulatoryLandscape": "The strongest near-term demand comes from markets with explicit process requirements—UK BNG, CCB/VCS-adjacent forest projects, TNFD/SBTN-driven disclosure, and lender frameworks like IFC PS6. The signal is positive, but standards are fragmented: BNG is live, TNFD and SBTN create disclosure pull, and Verra’s Nature Framework points toward standalone nature credits without yet giving the market the operational depth of mature carbon registries [3][5][6][8][9][10][11][12][13][14]."
  "technologyLandscape": "The stack is commercially real. eDNA kits, ecoacoustic sensors, camera-trap AI, BirdNET, SpeciesNet, and workflow tools already produce usable biodiversity signals; meanwhile GEDI and Planet show why satellite-only systems stop at canopy structure, biomass, or surface change rather than sub-canopy species presence. The hard part is not raw sensing anymore—it is standardization, QA/QC, and packaging outputs into a reviewer-trusted evidence chain [18][19][21][22][23][24][28]."
