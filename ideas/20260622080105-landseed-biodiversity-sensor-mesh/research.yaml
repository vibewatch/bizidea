  "competitiveLandscape": "No single incumbent owns the full workflow. NatureMetrics leads on standardized eDNA and platformized biodiversity data, Carbon Direct/Pachama leads on digital forest-MRV credibility, RFCx/Arbimon leads on acoustic evidence, OFP leads on transparent issuance mechanics, and Terrasos shows how biodiversity credits are being structured in practice. The whitespace is a biodiversity-native layer that sits between those data sources and the final validator or registry packet [12][15][16][17][19][20][25]."
