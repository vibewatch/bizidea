topRisks:
  - name: Registry protocol fragmentation
    description: Multiple competing biodiversity credit registries may adopt incompatible MRV protocols, forcing expensive parallel development tracks and delaying revenue.
    mitigation: "Focus the first 18 months on Verra BVCM as the leading standard, then build a protocol-abstraction layer that isolates registry-specific logic so new registries add weeks, not months, to onboard."
  - name: Slow credit market liquidity
    description: If corporate demand for biodiversity credits grows slower than projected, project developers lack urgency to invest in dedicated MRV software, extending sales cycles.
    mitigation: "Price the base SaaS license as a substitute for the consultant workflow so customers buy on cost-reduction grounds independent of whether they trade credits at scale."
  - name: Sensor hardware vendor bundling
    description: If major sensor vendors build proprietary reporting software and bundle MRV tools with hardware, they could undercut an independent platform on convenience and price.
    mitigation: Establish registry integrations and data-standard relationships before hardware vendors do, then position hardware-agnosticism as a feature for project developers who use multiple sensor types.
