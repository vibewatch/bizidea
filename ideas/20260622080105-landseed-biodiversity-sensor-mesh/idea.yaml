problem: >-
  Forest project developers seeking to issue biodiversity credits have no standardized
  software layer to transform raw sensor readings into registry-accepted credit reports.
  Without audit-ready MRV documentation, credits cannot be registered, priced, or sold
  to corporate buyers. Manual compilation of species data and field notes into
  investor-grade reports takes three to six months and costs $30K–$80K per project,
  blocking the biodiversity credit supply chain from scaling.
targetUser:
  primary: Conservation organization or forest landowner managing a biodiversity credit project who needs registry-ready MRV documentation to issue and sell credits.
  secondary: Corporate ESG procurement team buying biodiversity credits and requiring third-party verified impact documentation for TNFD reporting.
  buyer: Conservation finance manager or VP Sustainability at a mid-sized conservation organization with a $5M–$50M annual budget.
startupThesis:
  nonObviousInsight: >-
    Biodiversity credits cannot adopt carbon's satellite-measurement shortcut — species-level
    verification demands sub-canopy sensor data that no remote-sensing product provides.
    This creates a structural need for a dedicated MRV software layer that turns raw
    ecological sensor readings into registry-accepted credit documentation. The sensor
    hardware is emerging now in 2026; the software rails that transform that data into
    tradeable credits do not yet exist.
  beachhead: >-
    US and EU forest conservation organizations certifying projects under Verra's
    Biodiversity Credit Methodology or equivalent emerging standards, who have deployed
    or plan to deploy ground-level sensor hardware but lack software to aggregate,
    analyze, and report the data in a registry-compliant format.
  wedge: >-
    Registry-ready biodiversity MRV report generator: ingest sensor mesh data, apply
    configurable species-count and habitat-quality algorithms, and export standardized
    PDF and machine-readable JSON credit documentation that target registries accept
    for direct submission.
  whyNowCatalyst: >-
    Landseed's Patagonia-backed launch in June 2026 confirms that sub-canopy AI sensor
    hardware has crossed the commercial readiness threshold, making the software
    aggregation and registry-reporting layer the next critical missing piece of the
    biodiversity credit supply chain.
  ventureScalePath: >-
    Start with forest project MRV reports under Verra BVCM, expand to wetland and
    grassland ecosystems as additional registry protocols emerge, then build a
    cross-registry data-standard layer and charge per-credit verification fees as
    the global biodiversity credit market scales toward billions in annual volume.
solution: >-
  A SaaS platform that ingests raw time-series data from sensor mesh deployments —
  temperature, humidity, acoustic species detection, and camera-trap imagery — and
  applies configurable MRV algorithms aligned with emerging registry protocols such
  as Verra BVCM. The platform produces audit-ready PDF and machine-readable JSON
  credit reports that can be submitted directly to registries. It provides a project
  dashboard for ongoing monitoring, automated species-count reconciliation, and
  chain-of-custody documentation that satisfies third-party verifiers. Pricing is
  per project site per year with an add-on per-credit issuance fee once a project
  enters active trading.
goToMarketSeed:
  firstCustomer: >-
    A US-based land trust or conservation NGO managing a 500–2,000-acre forest preserve
    that has received or purchased pilot sensor hardware from Landseed or a comparable
    vendor and needs to deliver a registry-compliant credit issuance packet within
    12 months to satisfy a conservation finance investor or grant condition.
  buyingTrigger: >-
    A registry certification deadline or LP reporting requirement that mandates
    MRV documentation by a fixed date, creating time-bound urgency that makes the
    platform a faster, cheaper alternative to hiring an environmental consultant.
  currentAlternative: "Manual workflow: ecologists compile spreadsheets, GPS shapefiles, and species-count CSVs into Word documents reformatted by environmental consultants at $30K–$80K per project report."
  switchingReason: >-
    The platform reduces per-project MRV cost by 70–80%, cuts report turnaround from
    three months to two weeks, and produces machine-readable output that registries
    ingest directly — eliminating the consultant bottleneck while creating an auditable
    digital chain of custody.
  pricingHypothesis: "$18K–$36K per project site per year (SaaS subscription), plus a $0.50–$1.00 per-credit issuance fee once trading begins; anchored against the $30K–$80K consultant alternative."
