    baseCase: "$80K steady-state annual revenue per account"
    upsideCase: "$88K steady-state annual revenue per account"
    y3RevenueImpactK: -116.0
    cashImpactK: -85.0
  - variable: CAC
    downsideCase: "$55K CAC if founder time, travel, and proposal work stay heavy"
    baseCase: "$40K CAC"
    upsideCase: "$30K CAC with warmer channel referrals"
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: churn
    downsideCase: "3.5% monthly churn after the first annual renewals"
    baseCase: "2.5% monthly churn"
    upsideCase: "1.5% monthly churn"
    y3RevenueImpactK: -75.0
    cashImpactK: -55.0
  - variable: "sales cycle"
    downsideCase: "9 months from workflow review to annual production contract"
    baseCase: "about 6 months"
    upsideCase: "about 4-5 months"
    y3RevenueImpactK: -185.0
    cashImpactK: -140.0
  - variable: "gross margin"
    downsideCase: "68% steady-state gross margin"
    baseCase: "about 73% steady-state gross margin"
    upsideCase: "76% steady-state gross margin"
    y3RevenueImpactK: 0.0
    cashImpactK: -61.0
  - variable: "hiring pace"
    downsideCase: "Add a second implementation hire and a dedicated seller before template reuse is proven"
    baseCase: "Hold exit headcount at 6 FTE and add only one late-Y2 engineer"
    upsideCase: "Delay any extra GTM hire until after 10 production accounts are live"
    y3RevenueImpactK: -20.0
    cashImpactK: -210.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      PartnerLeads --> PaidAccounts
      PaidAccounts --> ActiveSites
      ActiveSites --> Revenue
      Revenue --> GrossProfit
      ReviewerAcceptance --> Renewals
      Renewals --> PaidAccounts
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from 3 paid pilots in Y1, 10 production accounts by Q4Y2, and 20 by Q4Y3 at roughly $80K steady-state ACV per account."
  - checkName: Must go right
    finding: "The first accepted packs must prove that partner-supplied acoustic, eDNA, and camera-trap data can be standardized without bespoke consultant rebuilds."
  - checkName: Model breaks if
    finding: "If reviewer acceptance or partner data normalization slip enough to cap Y3 near 14 accounts, cash compresses toward roughly $79K before the seed story is proven."
  - checkName: Next-round proof
    finding: "The next financing is justified once Q4Y2 shows 10 live production accounts, a second workflow template, and repeat-account gross margin above 70%."
sanityChecks:
  ruleOf40: "Y3 growth 121.4% + EBITDA margin -33.6% = 87.8%"
  burnMultiple: "Y2 burn multiple 1.17x on about $592K net new ARR, improving to 0.47x in Y3 on about $860K net new ARR."
  revenuePerFte: "$202K Y3 on 6 exit FTE (benchmark $200-400K SaaS)"
  flags:
    - "The model assumes reviewers accept platform-generated packs after human QA; if validators still require bespoke consultant reassembly, both growth and margin fall short."
    - "Exit revenue per FTE only reaches the low end of SaaS benchmarks, so the venture case still depends on expanding beyond the initial forest workflow wedge."
    - "Headcount stays flat at 6 FTE after the late-Y2 engineering hire; any earlier sales or implementation hiring would pull cash materially below the base-case cushion."
    - "The company is still EBITDA negative in Y3, so the seed round needs repeatability proof by Q4Y2 rather than waiting for full profitability."
