regulatoryTechnicalConstraints:
- point: "独立自然信用被定性为对自然的正向投资而非抵消额度，因此定位和声明规范至关重要。"
  sourceRefs:
  - 12
- point: "英国 BNG 要求提交生物多样性增益计划，并在项目开工前至少将生物多样性价值提高 10%，使文档质量在运营上具有实质意义。"
  sourceRefs:
  - 6
- point: "AI 生成的物种证据必须披露置信度和训练深度的局限，因为模型性能因物种和数据可用性不同而存在显著差异。"
  sourceRefs:
  - 21
  - 28
- point: "单独的遥感不能满足物种级生物多样性测量需求，因此可审计的工作流必须整合实地核查或原位传感。"
  sourceRefs:
  - 23
  - 24
validationSignals:
