  competitiveLandscape: "没有单一在位企业拥有完整工作流。NatureMetrics 领跑标准化 eDNA 和平台化生物多样性数据，Carbon Direct/Pachama 领跑数字森林 MRV 公信力，RFCx/Arbimon 领跑声学证据，OFP 领跑透明发行机制，Terrasos 展示了生物多样性信用在实践中的结构化方式。空白地带是位于这些数据来源与最终核查方或注册机构证据包之间的生物多样性原生层 [12][15][16][17][19][20][25]。"
