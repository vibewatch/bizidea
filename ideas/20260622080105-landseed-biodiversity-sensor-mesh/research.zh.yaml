- point: "Carbon Direct 收购 Pachama 证明数字森林 MRV 工作流基础设施对更大平台具有战略价值。"
  sourceRefs:
  - 15
- point: "NatureMetrics 和 RFCx 均以公信力和可审计性为卖点，验证了买家已在为可信生物多样性证据付费。"
  sourceRefs:
  - 17
