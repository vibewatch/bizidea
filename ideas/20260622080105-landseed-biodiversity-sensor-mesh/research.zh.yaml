  stage: "growth"
  wedge: "针对森林项目的透明监测-核查-发行工作流，含定期地面监测和数据及信用额度公开展示。"
  pricing: "项目上手 / 协议驱动的商业模式；无公开自助定价。"
  strength: "最接近结构化的数据到信用发行工作流的公开示例。"
  weaknessVsUs: "工作流仍以碳信用协议机制为核心，而非更丰富的生物多样性感知模态。"
