- point: "英国 BNG 创造了一个实际运营的市场，其中生物多样性计划和监测不再是可选项。"
  sourceRefs:
  - 6
- point: "Terrasos 和 Forest Trends 表明，生物多样性信用正在部分司法管辖区从概念走向政策驱动的市场结构。"
  sourceRefs:
  - 7
  - 25
