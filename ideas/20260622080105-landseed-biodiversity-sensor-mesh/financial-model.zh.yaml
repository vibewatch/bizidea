scenarios:
  downside:
    description: "审核方接受度耗时更长，一个合作伙伴渠道表现不及预期，公司在 Y3 末仅有 14 个生产账户，ACV 偏低，毛利率改善更慢。"
    y3RevenueK: 890.25
    y3EbitdaK: -688.63
    cashLowPointK: 78.93
    keyAssumptionChanges:
      - "Q4Y3 末为 14 个生产账户，而非 20 个。"
      - "每账户混合年化收入维持在约 7.8 万至 8 万美元区间，未能达到低 8 万美元区间加轻量追加销售。"
      - "毛利率停滞在约 69–70%，因为生态质检和数据标准化仍较为手工化。"
  base:
    description: "公司将 3 次付费试点转化为 Q4Y2 的 10 个生产账户，并在 Q4Y3 达到 20 个，同时将团队保持在 6 名退出全职员工。"
    y3RevenueK: 1212.5
    y3EbitdaK: -407.92
    cashLowPointK: 466.76
    keyAssumptionChanges:
      - "符合 A1–A21，M12 前 3 次付费试点，Q4Y2 达到 10 个账户，Q4Y3 达到 20 个。"
      - "采用研究测算的 8 万美元稳态切口 ACV，随第二工作流和 API 收入出现，后期 ARPU 进入低 8 万美元区间。"
      - "毛利率在 Y2 超过 70%，Y3 达到中 70% 区间，同时招聘保持刻意精简。"
  upside:
    description: "两个渠道合作伙伴提前重复，被接受的证据包缩短了销售周期，公司在 Y3 末达到 24 个生产账户，EBITDA 接近盈亏平衡。"
    y3RevenueK: 1552.5
    y3EbitdaK: -139.36
    cashLowPointK: 759.77
    keyAssumptionChanges:
      - "Q4Y3 末为 24 个生产账户，而非 20 个。"
      - "随多站点扩展和核查方/API 追加销售提前落地，每账户混合年化收入升至中高 8 万美元区间。"
      - "毛利率达到 74–76%，因为模板复用和合作伙伴上手减少了人工质检工时。"
sensitivity:
  - variable: ARPU
    downsideCase: "稳态年化每账户收入 7.2 万美元"
    baseCase: "稳态年化每账户收入 8.0 万美元"
    upsideCase: "稳态年化每账户收入 8.8 万美元"
    y3RevenueImpactK: -116.0
    cashImpactK: -85.0
  - variable: CAC
    downsideCase: "创始人时间、差旅和提案工作持续较重时 CAC 为 5.5 万美元"
    baseCase: "CAC 为 4.0 万美元"
    upsideCase: "渠道转介更多时 CAC 为 3.0 万美元"
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: 客户流失率
    downsideCase: "首批年度续约后月度流失率 3.5%"
    baseCase: "月度流失率 2.5%"
    upsideCase: "月度流失率 1.5%"
    y3RevenueImpactK: -75.0
    cashImpactK: -55.0
  - variable: 销售周期
    downsideCase: "从工作流审查到年度生产合同约 9 个月"
    baseCase: "约 6 个月"
    upsideCase: "约 4–5 个月"
    y3RevenueImpactK: -185.0
    cashImpactK: -140.0
  - variable: 毛利率
    downsideCase: "稳态毛利率 68%"
    baseCase: "稳态毛利率约 73%"
    upsideCase: "稳态毛利率 76%"
    y3RevenueImpactK: 0.0
    cashImpactK: -61.0
  - variable: 招聘节奏
    downsideCase: "在模板复用得到验证之前增加第二名实施人员和专职销售"
    baseCase: "退出人员维持 6 名全职，仅在 Y2 后期增加一名工程师"
    upsideCase: "在 10 个生产账户上线之前推迟任何额外 GTM 招聘"
    y3RevenueImpactK: -20.0
    cashImpactK: -210.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      PartnerLeads --> PaidAccounts
      PaidAccounts --> ActiveSites
      ActiveSites --> Revenue
      Revenue --> GrossProfit
      ReviewerAcceptance --> Renewals
      Renewals --> PaidAccounts
      GrossProfit --> Cash
modelSanity:
  - checkName: 营收引擎
    finding: "基准情景营收来自 Y1 的 3 次付费试点、Q4Y2 的 10 个生产账户，以及 Q4Y3 的 20 个账户，稳态 ACV 约每账户 8 万美元。"
  - checkName: 必须跑通的假设
    finding: "首批被接受的证据包必须证明，合作伙伴提供的声学、eDNA 和相机陷阱数据可以在无需顾问从头重建的情况下标准化。"
  - checkName: 模型失效条件
    finding: "如果审核方接受度或合作伙伴数据标准化出现足够滑落，将 Y3 账户数封顶在约 14 个，现金将压缩至约 7.9 万美元——种子轮故事尚未跑通。"
  - checkName: 下轮融资验证
    finding: "一旦 Q4Y2 显示 10 个在线生产账户、第二个工作流模板和重复账户毛利率超过 70%，下一轮融资即有据可依。"
sanityChecks:
  ruleOf40: "Y3 增长率 121.4% + EBITDA 利润率 -33.6% = 87.8%"
  burnMultiple: "Y2 消耗倍数约 1.17x（约 59.2 万美元净新增 ARR），Y3 改善至 0.47x（约 86.0 万美元净新增 ARR）。"
  revenuePerFte: "Y3 每全职员工营收 20.2 万美元，基于 6 名退出全职（SaaS 基准 20–40 万美元）。"
  flags:
    - "模型假设审核方在人工质检后接受平台生成的证据包；如果核查方仍要求顾问重新组装，增长和毛利率均将低于预期。"
    - "退出每全职员工营收仅达到 SaaS 基准低端，因此创投逻辑仍依赖超越初始森林工作流切口的扩张。"
    - "Y2 后期工程招聘后，人员编制保持在 6 名全职不变；任何提前销售或实施招聘都将把现金大幅拉低至基准情景缓冲以下。"
    - "公司在 Y3 仍处于 EBITDA 亏损状态，因此种子轮需要 Q4Y2 的可重复性证明，而非等待完全盈利。"
