      和买家视为基础设施，而非可替换商品。
    signalRefs: ["独立 MRV 被界定为市场必备条件"]
    sourceRefs: [1]
  - point: >-
      Patagonia 的非营利机构背书表明，高公信力可持续发展机构愿意在信用市场达到规模之前就
      资助监测技术栈，为相邻软件层打开先行者窗口。
    signalRefs: ["Patagonia 支持验证生物多样性监测紧迫性"]
    sourceRefs: [1]
  - point: >-
      项目开发商目前被传感器到信用额度的报告缺口所阻，无法发行信用额度或吸引保护金融，
