problem: >-
  寻求发行生物多样性信用额度的森林项目开发商，目前缺乏标准化软件层，无法将原始传感器读数转化为
  注册机构接受的信用报告。没有可供审计的 MRV 文档，信用额度便无法注册、定价或出售给企业买家。
  人工将物种数据和现场记录汇编成符合投资级要求的报告需要三到六个月，每个项目耗资 3 万至 8 万美元，
  严重阻碍生物多样性信用额度供应链的规模化扩张。
targetUser:
  primary: 管理生物多样性信用项目的保护组织或森林地主，需要符合注册要求的 MRV 文档以发行并出售信用额度。
  secondary: 采购生物多样性信用额度的企业 ESG 团队，需要第三方核查的影响力文档用于 TNFD 报告。
  buyer: 年度预算在 500 万至 5000 万美元之间的中型保护组织的保护金融经理或可持续发展副总裁。
startupThesis:
  nonObviousInsight: >-
    生物多样性信用额度无法复制碳信用的卫星监测捷径——物种级核查需要任何遥感产品都无法提供的
    林下传感器数据。这形成了对专用 MRV 软件层的结构性需求：将原始生态传感器读数转化为注册机构
    接受的信用文档。传感器硬件正在 2026 年步入商业就绪期；而将这些数据转化为可交易信用额度的
    软件基础设施，目前尚不存在。
  beachhead: >-
    美国和欧盟的森林保护组织，在 Verra 生物多样性信用方法论或同类新兴标准下认证项目，已部署或
    计划部署地面传感器硬件，但缺乏将数据聚合、分析并以注册合规格式提交所需的软件。
  wedge: >-
    注册就绪的生物多样性 MRV 报告生成器：接入传感器网络数据，应用可配置的物种计数与栖息地质量
    算法，导出目标注册机构接受、可直接提交的标准化 PDF 和机器可读 JSON 信用文档。
  whyNowCatalyst: >-
    Landseed 于 2026 年 6 月获 Patagonia 背书完成启动，确认林下 AI 传感器硬件已跨越商业就绪门槛，
    使软件聚合与注册报告层成为生物多样性信用供应链中下一块亟待补齐的关键缺口。
  ventureScalePath: >-
    从 Verra BVCM 下的森林项目 MRV 报告起步，随着更多注册协议出台，逐步扩展至湿地和草地生态系统，
    再构建跨注册机构数据标准层，并随全球生物多样性信用市场向数十亿年度交易量规模化，
    按信用额度收取核查费用。
solution: >-
  一个 SaaS 平台，接入传感器网络部署产生的原始时序数据——温度、湿度、声学物种探测和相机陷阱影像——
  并应用与 Verra BVCM 等新兴注册协议对齐的可配置 MRV 算法。平台生成可审计的 PDF 和机器可读 JSON
  信用报告，可直接提交注册机构。它提供持续监测的项目仪表板、自动物种计数核对，以及满足第三方
  核查方要求的监管链文档。定价按项目站点每年计费，项目进入活跃交易后加收按信用额度计算的发行费。
goToMarketSeed:
  firstCustomer: >-
    美国土地信托或保护公益机构，管理面积 500 至 2000 英亩的森林保护区，已从 Landseed 或类似
    供应商获取或购买了试点传感器硬件，并须在 12 个月内交付符合注册要求的信用发行资料包，
    以满足保护金融投资方或补助条件。
  buyingTrigger: >-
    注册认证截止日期或有限合伙人报告要求规定了 MRV 文档的固定提交时间，形成时间压力——
    使该平台成为比雇用环境顾问更快、更便宜的替代方案。
  currentAlternative: "人工流程：生态学家将电子表格、GPS 形状文件和物种计数 CSV 整合到 Word 文档中，再由环境顾问重新格式化，每份项目报告耗资 3 万至 8 万美元。"
  switchingReason: >-
    该平台可将每个项目的 MRV 成本降低 70–80%，将报告周期从三个月缩短至两周，并生成注册机构
    可直接接收的机器可读输出——彻底消除顾问瓶颈，同时建立可审计的数字监管链。
  pricingHypothesis: "每个项目站点每年 1.8 万至 3.6 万美元（SaaS 订阅），交易开始后加收每个信用额度 0.50 至 1.00 美元的发行费；以 3 万至 8 万美元的顾问替代成本为定价锚点。"
