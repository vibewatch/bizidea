differentiator: >-
  Generic unclaimed-property vendors mostly begin at reporting time, after the risky decisions have already happened. RecoveryOS starts months earlier and is built around crypto-specific realities such as omnibus ledgers, token liquidation policies, and customer recovery workflows that mix compliance, tax, and support. Over time, its moat becomes a combination of state-rule decision logs, dormant-account benchmarks, and deeply embedded ledger and messaging integrations that are painful for a platform to rip out.
