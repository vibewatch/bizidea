topRisks:
  - name: Regulatory ambiguity
    description: Some states may treat specific digital assets inconsistently, making default liquidation or remittance policies hard to standardize.
    mitigation: Start with custodial cash and stablecoin flows, keep policy logic configurable by jurisdiction, and partner with specialist unclaimed-property counsel.
  - name: Urgency concentration
    description: Smaller platforms may not feel enough dormant-asset pain to buy until an exam or filing failure forces action.
    mitigation: Focus initial sales on exchanges with million-account back books and price against prevented losses and filing-cycle labor savings.
  - name: Incumbent expansion
    description: Generic unclaimed-property software vendors could move upstream into prevention once the category proves attractive.
    mitigation: Win on crypto-native ledger integrations, customer recovery workflows, and a better evidence system before horizontal vendors adapt.
