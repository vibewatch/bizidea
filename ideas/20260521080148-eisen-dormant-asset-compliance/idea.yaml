problem: >-
  U.S.-serving crypto exchanges and custodial wallet platforms accumulate large back books of inactive customer balances as trading cohorts churn, wallets go untouched, and KYC data ages out. Once those accounts cross state dormancy thresholds, compliance teams must determine which jurisdiction owns the liability, what notice cadence applies, how tax reporting interacts with liquidation or transfer, and how digital assets should be handled. Most operators still manage this with spreadsheets, one-off SQL pulls, and outside counsel, which leads to missed outreach, premature liquidation, or ugly exam findings.
targetUser:
  primary: Dormancy and compliance operations leaders at U.S.-serving crypto exchanges and custodial wallet platforms
  secondary: Finance operations teams responsible for abandoned-property filings, disbursements, and customer asset reserves
  buyer: Chief Compliance Officer or VP Operations at a retail crypto platform
startupThesis:
  nonObviousInsight: >-
    The real wedge is not filing unclaimed-property reports after the fact; it is building a live control plane that continuously reconciles product activity, outreach evidence, asset treatment, and state rules before a crypto balance becomes legally lost. Digital-asset platforms have enough inactive accounts and enough rule ambiguity that dormant-asset prevention itself becomes a new system of record.
  beachhead: U.S.-serving retail crypto exchanges and custodial wallet platforms with 1M+ historical funded accounts, omnibus ledgers, and annual multistate dormant-property exposure
  wedge: Crypto-specific dormant-account orchestration that detects at-risk balances early, automates compliant outreach, and manages lawful liquidation, remittance, or customer-claim recovery workflows
  whyNowCatalyst: Eisen's funding round and reported 31 percent prevention rate show dormant-asset prevention is becoming a budgeted infrastructure category just as crypto accounts expose the sharpest gap in state-by-state rules.
  ventureScalePath: >-
    Start with retail crypto exchanges, then expand the same rules, evidence, and disbursement engine into neobanks, payroll wallets, brokerages, and other digital-first asset platforms that face state-by-state dormancy exposure.
solution: >-
  RecoveryOS connects the exchange ledger, CRM, communications vendors, and compliance policy engine to maintain a live inventory of accounts approaching dormancy thresholds. It scores accounts by state-specific clock, asset type, contactability, and documentation gaps, then launches the right outreach cadence before an account tips into escheatment. For accounts that still age out, the product produces an auditable decision trail and orchestrates approved liquidation, remittance, tax forms, and customer-claim workflows instead of forcing ops teams to stitch them together manually. A white-label recovery portal lets customers verify identity, see eligible balances, and reclaim funds without generating bespoke support work.
goToMarketSeed:
  firstCustomer: A U.S.-licensed retail crypto exchange with more than 1 million historical funded accounts, omnibus custody, and an upcoming annual unclaimed-property review
  buyingTrigger: A multistate compliance exam, sponsor-bank request, or annual dormant-property filing cycle that surfaces inactive crypto balances without a documented operating policy
  currentAlternative: Spreadsheets, internal SQL pulls, outside counsel memos, and generic unclaimed-property vendors designed for cash accounts
  switchingReason: RecoveryOS turns a legally risky annual fire drill into a repeatable workflow that understands wallet-ledger states, token treatment policies, and auditor-ready evidence trails.
  pricingHypothesis: Annual platform fee based on dormant accounts under management plus usage-based fees for outreach, claims, and disbursement workflows
