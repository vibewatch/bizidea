slug: crypto-dormancy-recovery-os
date: '2026-05-21'
executiveSummary: >-
  RecoveryOS 应该先以只做美国市场的沉睡资产控制台切入，服务托管型加密平台，而不是一上来就做宽泛的合规科技套件，也不是只管申报的工具。第一批客户应当是历史入金账户超过 1 million、即将迎来沉睡财产审查、合规检查或赞助银行要求的零售加密货币交易所或托管钱包平台。研究显示，这个切口站得住：各州沉睡规则不同、所有者触达义务分散、加密资产处理决定又复杂，表格、外部律师和申报优先的软件都解决不好。产品 v1 应聚焦识别高风险账户、编排通知、沉淀审计证据，并管理获批的清算、汇缴和索赔追回流程；对州规则或代币处理仍有歧义的情形，保留人工复核。GTM 应由创始人主导，围绕下一次申报周期卖出付费试点，再把这套工作流转成年度平台合同，定价方式是按受管沉睡账户数加工作流按量收费。研究给出的滩头市场 SAM 为 $20.0M，第 3 年 SOM 为 $2.5M，足够支撑一个聚焦的 pre-seed 切口，但还不够支撑过早横向扩张。护城河也不只是规则内容本身，而是总账集成、州规则决策日志以及触达结果数据的组合，时间越久，预防效果和可审计性越强。最大的不确定性仍是：到底有没有足够多的交易所愿意购买一套独立的预防控制台，而不是继续沿用律师主导流程或横向申报工具。所以，这份计划把渠道伙伴分发和试点转化都列成了明确的验证项。
problem:
  - "面向美国用户的加密货币交易所会累积大量不活跃客户余额；一旦各州沉睡时钟、通知规则和资产处理义务开始分州分化，问题就会迅速变得法律上很难处理。"
  - "多数运营方仍靠表格、SQL 抽数、外部律师和申报时点才介入的供应商硬撑，结果是漏触达、被迫清算、审计风险暴露，以及本可避免的客服升级。"
solution:
  - "提供一套理解托管场景的工作流系统，持续监控沉睡账户风险，按州别和资产类型判断允许的处理路径，并在余额变成可申报财产前先发起合规触达。"
  - "对最终仍然超期的余额，系统会生成覆盖清算、汇缴、税务文件和索赔追回的可审计链路；同时提供白标追回门户，减少定制化客服工作。"
whyWeWin:
  - "公司盯住的是交易所工作流里的预防操作层——这里恰恰是现有申报套件和律师主导流程最薄弱的地方，也是 ROI 在申报日前就能看见的地方。"
  - "只要创业公司能拿下总账标准化、触达历史和州别决策日志，它就能在沉睡加密余额场景里累积出切换成本和绩效数据，这是只做申报的供应商拿不到的。"
strategicChoices:
  beachhead: 面向美国用户、历史入金账户超过 1 million、使用合并总账、且每年都面临多州沉睡财产敞口的零售加密货币交易所和托管钱包平台。
  wedgeRationale: >-
    这一层客户的购买触发最明确：年度持有人申报、监管检查和赞助银行压力已经逼着他们行动，但工作流又被加密场景特有的不活跃信号和资产处理边角问题卡住。相比更宽泛的金融科技赛道，这里更快出结果，因为少数几个大客户就足以支撑六位数试点，也能在一个申报周期内量化预防效果、审计表现和客服改进。
  sequencingRationale: >-
    产品应先做美国市场、先做托管场景：先把高风险账户识别、通知、证据沉淀和可配置的资产处理策略跑通，再谈更宽的税务、银行或索赔服务野心。GTM 也一样，先由创始人直接卖进下一次申报周期，等首批生产部署证明这套产品是在补全、而不是取代下游申报流程后，再引入律师和税务伙伴。招聘顺序也要跟着走：先补工程和合规产品，再补解决方案与客户运营；只有实施手册能复用后，才扩大合作伙伴团队。
  notYet:
    - 非托管钱包、DeFi 协议或自托管追回
    - 非美国市场的沉睡资产覆盖
    - 宽泛的税务或金融犯罪合规套件
    - 脱离企业客户的 C 端索赔市场
market:
  tam: "$100.0M 估算 TAM：约 250 家面向美国敞口的数字余额机构，覆盖加密、券商、neobank、工资钱包和托管等类别，按约 $400k ACV 计算。"
  sam: "$20.0M 估算 SAM：约 40 家面向美国用户的加密货币交易所和托管钱包平台，其沉睡余额敞口已足以支撑约 $500k ACV 的专用系统。"
  som: "$2.5M 估算第 3 年 SOM：按 5 家滩头客户、每家约 $500k ACV 计算。"
  segments:
    - 面向美国用户的零售加密货币交易所
    - 拥有合并客户总账的托管钱包平台和数字资产金融科技公司
  buyingProcess: >-
    购买流程通常始于一次年度持有人申报、合规检查或赞助银行复核：团队突然发现手里有不活跃余额，却没有一套成文的操作政策。真正拍板的人通常是首席合规官、总法律顾问或运营副总裁；随后财务、客户运营、安全和工程团队会一起核验数据接入和控制要求，最后才会把付费试点转成多年期平台合同。
product:
  mvp: >-
    MVP 是一套只做美国市场的沉睡账户控制台，面向托管型加密平台。它需要接入总账和客户数据，按州识别高风险账户，自动化通知流程，维护证据链，并支持可配置的清算、汇缴和索赔追回路径；碰到州规则或代币情形有歧义时，由人工复核兜底。
  sixMonth: 6 个月内，拿下 1 家付费共创客户，覆盖监管最严格的州、高风险沉睡账户队列、多渠道通知，以及面向法币和稳定币余额的可审计决策日志，并支持可配置的代币策略。
  twelveMonth: 12 个月内，把 1 个试点转成正式生产，推出白标追回门户，扩展到研究里确定的优先州集合，并完整支撑首个申报周期，同时量化预防效果和客服工单结果。
  twentyFourMonth: 24 个月内，做到 5 家正式生产滩头客户，把支持范围从零售交易所扩到相邻的托管钱包和数字资产金融科技工作流，并在同一套控制台上打包基准报告和追回绩效模块。
  keyBets:
    - 只覆盖少数高监管州，也足以在全国规则齐全前先签下第一家交易所。
    - 相比全自动清算或汇缴，买方会更快接受“软件加人工复核”的组合。
    - 白标索赔追回体验能明显拉高试点 ROI，原因不只是满足合规，还因为它能直接减轻客服压力。
    - 同一套控制台未来可以扩到 neobank、券商和工资钱包，不需要重做一套底层架构。
gtm:
  wedge: 围绕下一次沉睡财产申报周期或检查答复，向大型托管型加密平台卖一套付费试点，再把这条工作流转成所有高风险沉睡余额的默认系统记录。
  channels:
    - 创始人直接销售给大型美国加密平台的首席合规官、总法律顾问和运营副总裁
    - 与已经参与沉睡余额流程的无人认领财产律师、税务顾问和申报专家做转介与实施合作
    - 围绕 escheat 和应税转换痛点，做贴近监管的教育内容、合规网络研讨会和交易所支持内容营销
  funnelTargets: 线索→合格试点 25-35%，合格试点→付费试点 30-40%，试点→正式生产 50%+，正式生产→第二工作流扩张在 12 个月内达到 40%+。
  pricing: 按受管沉睡账户数量收平台年费，再按通知、索赔和划付工作流收按量费用；这符合买方希望把合规基础设施预算化的习惯，也让支出始终和运营强度、减少损失的价值挂钩。
businessModel:
  revenueStreams:
    - 沉睡账户监控、策略更新和工作流编排的年度订阅
    - 所有者触达、索赔追回和划付工作流的按量收费
    - 税务文件生成、基准报告，以及州别或产品覆盖扩展的实施与高级模块收入
  unitOfValue: 受管沉睡账户数量，以及每一个完成的触达、索赔或划付工作流
  targetGrossMarginPct: 70
  expansionLevers:
    - 从单次申报周期工作流，扩到同一平台的常驻沉睡账户监控
    - 在已有交易所客户里增加更多资产类别、司法辖区和业务线
    - 正式生产落地后，继续销售追回门户、基准报告和审计导出模块
    - 当加密滩头市场跑顺后，把同一套规则和工作流骨架移植到相邻的数字余额机构
strategyMap:
  northStarMetric: 在转入州政府托管前被成功处理掉的高风险沉睡余额美元价值
  inputMetrics:
    - 签下的合格企业试点数
    - 从数据接入到首个高风险账户队列上线的时间
    - 在 escheat 前被成功处理的高风险余额占比
    - 试点转正式生产的转化率
    - 每个沉睡账户案例对应的客服工单量
    - 需要法务或运营人工复核的异常占比
  moatsToBuild:
    - 把资产类型、司法辖区、触达证据、清算策略和申报结果串起来的州规则决策图谱
    - 覆盖钱包、合并余额、稳定币和法币子账户的总账标准化层
    - 能说明哪些通知顺序和追回流程真正能阻止资产转入州政府的结果数据集
  killCriteria:
    - 创始人聚焦销售 12 个月后，仍拿不到 2 家以上付费共创客户
    - 试点客户相比原先流程，无法把至少 15% 的高风险余额拦在州政府托管之外
    - 前 3 家客户仍有超过 50% 的工作流要靠定制服务处理，而不是复用软件和运营手册
  mermaid: |
    flowchart LR
      Wedge[Crypto dormant-account wedge] --> MVP[Dormant control plane MVP]
      MVP --> Proof[Prevention and audit proof points]
      Proof --> Expansion[Adjacent digital-balance expansion]
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流痛点很硬，滩头市场也够聚焦，但买方集中度高、独立预算能否成立，仍要直接验证。
    whyBelieve: 研究已经证明，合规触发真实存在，预防 ROI 可以量化，而且横向申报套件与加密原生运营需求之间确实留着一个产品空档。
    whyDoubt: 可触达的滩头市场不大，Eisen 已经验证了赛道，而且目前还没证明交易所会不会愿意再买一套新控制台，而不是扩展现有律师流程或现有厂商工作流。
    nextDiligence: 下一步最关键的证明，是拿下 2 个付费试点，明确经济买方、量化预防效果提升，并证明能顺利转成 $300k-$500k 年合同。
  firstCustomer:
    title: 美国持牌零售加密货币交易所的首席合规官
    profile: 拥有超过 1 million 历史入金账户、采用合并总账、每年都要做多州沉睡财产复核，并且在不活跃余额上已有明显客服痛点的托管型加密平台。
    trigger: 一次年度无人认领财产申报、监管检查请求或赞助银行升级事件，让团队发现自己有大量沉睡加密余额，却没有成文的分州操作政策。
    buyer: 首席合规官
    initialContract: 围绕一个申报周期或单一业务线，先签 $75k-$150k 的付费试点；等所有受管沉睡账户都迁到这套控制台后，再转成约 $300k-$500k 的平台年收入。
  mustBeTrue:
    - 至少有 10-15 家面向美国用户的大型托管型加密平台，其沉睡余额敞口严重到足以支撑六位数年度软件预算。
    - 一个试点能在单个合规周期内接上核心总账、CRM 和通知数据，而不是拖成跨多个季度的企业服务项目。
    - 使用产品的客户，相比原先“表格加律师”的流程，至少能多拦下 15-20% 即将转入州政府托管的高风险余额。
    - 即便下游继续沿用申报、税务或法律供应商，交易所也愿意为一层预防型操作系统买单。
    - 在横向现有厂商补齐功能前，加密原生工作流数据和集成会先积累成更好的预防和审计效果。
  diligenceQuestions:
    - 目标 ICP 里到底有多少交易所，痛感真的高到愿意付六位数年费？
    - 哪些州和资产类别构成第一条必须先做的工作流？又有哪些地方仍因法律歧义必须人工复核？
    - 接入交易所总账和通信系统，到底要付出多少实施和安全审查成本？
    - 预算实际掌握在谁手里：合规、运营、财务，还是由赞助银行推动的整改项目？
    - 买方为什么会选这套系统，而不是 Eisen、Sovos、律师主导流程，或内部自建申报工作台？
operatingAssumptions:
  - assumption: 有一小批但足够大的托管型加密平台，沉睡余额敞口足以支撑 $300k-$500k 的年合同。
    basis: research.yaml
    validationTest: 至少访谈 12 家目标交易所或托管平台，并确认其中至少 4 家愿意按提议的合同区间推进付费试点。
    decisionImpact: 如果这点不成立，公司要么下探更轻的产品、要么更早扩到相邻数字余额场景，否则就得放弃 venture-scale 的预期。
  - assumption: 第一批客户愿意接受一套独立的预防控制台，由它把结果喂给现有申报和法律流程，而不是一开始就要求全包式端到端供应商。
    basis: research.yaml
    validationTest: 赢下 2 个付费试点；买方继续保留下游律师或申报供应商，但仍把高风险账户运营的系统记录角色交给 RecoveryOS。
    decisionImpact: 如果这点不成立，产品边界和渠道打法都得改，要么嵌进现有厂商内部，要么变成偏服务型的合作产品。
  - assumption: 只覆盖一组有限的首发州，再配可配置策略，就足以覆盖足够多的沉睡账户量，在全国规则齐全前先跑出 ROI。
    basis: idea.yaml
    validationTest: 把首个合作伙伴的沉睡账户库存按州拆开，证明前 6-10 个州至少占到 60% 的高风险余额。
    decisionImpact: 如果这点不成立，工程和法务复杂度都会明显上升，公司就得提高价格、拉长部署时间，或把目标客户再收窄。
  - assumption: 软件加人工复核，既能给出足够可接受的准确率，又能把毛利率逐步推到 70% 以上。
    basis: 运营判断
    validationTest: 跟踪前 3 家客户的异常处理情况，到第二个正式生产申报周期结束时，把人工介入占比压到 30% 以下。
    decisionImpact: 如果这点不成立，公司会滑向重服务模式，毛利率、估值支撑和独立软件公司的成立逻辑都会被削弱。
  - assumption: 白标追回门户能明显减轻客服压力，足以进入买方 ROI 计算。
    basis: idea.yaml
    validationTest: 在首个正式生产客户中，对比门户上线前后的沉睡账户客服工单量，并证明单案至少下降 20%。
    decisionImpact: 如果这点不成立，公司就应降低申领人体验优先级，把资源集中到预防合规和证据工作流。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 与目标交易所确认痛感阈值
    hypothesis: 足够多的大型托管型加密平台，会在申报失败发生前就为沉睡资产预防单独立预算。
    successMetric: 完成 12 次 ICP 访谈，且至少 4 个潜在客户愿意按六位数年化定价推进付费试点范围讨论。
    owner: 创始人/CEO
  - horizon: 0-90 天
    experiment: 州别与资产策略覆盖映射
    hypothesis: 前 6-10 个州加上初始的法币或稳定币工作流，已足以覆盖早期上线所需的大部分量。
    successMetric: 共创客户数据证明，至少 60% 的高风险沉睡余额落在首发州集合内，且都已有明确策略路径。
    owner: 合规产品负责人
  - horizon: 90-180 天
    experiment: 总账与 CRM 集成试点
    hypothesis: 一个共创客户能在单个实施周期里提供足够的总账、客户和通知数据，产出实时高风险队列。
    successMetric: 首个试点在技术启动后 8 周内拿出可用于生产的沉睡账户队列。
    owner: 创始工程师
  - horizon: 90-180 天
    experiment: 围绕申报周期的付费试点
    hypothesis: 只要报价锚定到即将到来的申报周期或审计答复，事件驱动型 GTM 的转化会更高。
    successMetric: 签下 2 个付费试点，且买方都明确把下一次申报截止日或检查当成主要购买触发。
    owner: 创始人/CEO
  - horizon: 6-12 个月
    experiment: 证明预防与客服 ROI
    hypothesis: 产品既能改善预防结果，也能把客服负担降到足以支撑平台年费。
    successMetric: 首个正式生产客户至少实现 15% 的州政府划转减少幅度，以及每个沉睡账户案例至少 20% 的客服工单下降。
    owner: 客户运营负责人
  - horizon: 12-18 个月
    experiment: 与律师和申报供应商共建渠道动作
    hypothesis: 只要把产品定位成预防层而不是替代者，专业律师和申报服务商就愿意转介或参与实施。
    successMetric: 2 个活跃合作伙伴带来或协助至少 25% 的合格销售线索，且不拉长平均实施周期。
    owner: 合作伙伴负责人
operations:
  - 为每次策略变更维护一套带版本的州规则与资产处理库，并明确指派负责人复核。
  - 跑一套受控实施流程，覆盖总账接入、沉睡时钟计算、通知执行和证据留存。
  - 运营一个异常队列，记录法务复核、人工资产决策和索赔升级，同时不丢失审计可追溯性。
  - 按客户、州别和资产类别跟踪预防率、申报周期时长、客服工单量和追回结果。
team:
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 初期市场集中、又高度合规敏感，必须由创始人亲自打单、设计试点并建立买方信任。
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 搭出总账连接器、工作流引擎和审计能力，这是第一套正式生产级控制台的底座。
  - role: 合规产品负责人
    startTiming: 第 1 个月
    rationale: 把各州沉睡规则、资产处理逻辑和申报证据要求翻进可复用的产品策略里。
  - role: 解决方案工程师
    startTiming: 第 4 个月
    rationale: 降低合作伙伴接入摩擦，也避免创始人长期陷进实施瓶颈。
  - role: 客户运营负责人
    startTiming: 第 7 个月
    rationale: 随着部署从试点走向正式生产，接住异常处理、申报周期支持和客户结果衡量。
  - role: 合作伙伴负责人
    startTiming: 第 12 个月
    rationale: 只有直销打法和实施模型能复用后，才引入更结构化的律师和申报供应商渠道。
milestones:
  - horizon: 0-12 个月
    items:
      - 拿下 2 家位于滩头 ICP 的付费共创客户。
      - 为优先州集合上线首个正式生产的沉睡账户队列和通知工作流。
      - 用可审计证据链支撑 1 个完整申报周期或检查答复工作流。
      - 至少把 1 个试点转成 $300k+ 的平台年合同。
  - horizon: 12-24 个月
    items:
      - 做到 3-5 家正式生产客户，并验证第 3 年 SOM 假设。
      - 在同一套控制台上加入白标追回门户、基准报告和更广的资产处理覆盖。
      - 建立 2 个渠道伙伴，能持续带来合格销售线索，同时不把公司变成服务转售商。
  - horizon: 24-36 个月
    items:
      - 从零售交易所扩到相邻的托管钱包或数字余额机构。
      - 在足够多客户上证明预防和审计指标可复用，支撑更大一轮 seed-to-series-a 增长动作。
      - 证明相邻市场能否在不打破实施纪律的前提下，把收入拉出最初的加密滩头市场。
risks:
  - risk: 各州对数字资产的处理仍不一致，迫使团队在部署中频繁做人工策略判断。
    likelihood: High
    impact: High
    mitigation: 从托管优先工作流、可配置策略和人工复核做起，不承诺在有歧义的州或代币类别上做到全自动。
  - risk: 滩头客户过于集中，难以支撑高效获客或 venture-scale 增长。
    likelihood: Medium
    impact: High
    mitigation: 初期只盯敞口最大的交易所，尽快测出真实痛感阈值；拿到首批证明后，随时准备扩到相邻数字余额机构。
  - risk: 横向现有厂商或 Eisen 通过补齐类似的预防功能，把价格压下来。
    likelihood: Medium
    impact: High
    mitigation: 在总账原生集成、追回工作流体验和可审计的预防结果上拉开差距，而不是去拼申报覆盖广度。
  - risk: 实施最后变成定制化专业服务，而不是可复用软件。
    likelihood: Medium
    impact: High
    mitigation: 收紧首发州范围，把数据接入和通知工作流模板化，并在可复用模式出现后再补解决方案团队。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月跑道应足以养起创始产品与合规团队、打通首批总账集成、完成有律师背书的首发州规则覆盖，并支撑 2-3 个付费试点至少跑过 1 个正式生产申报周期。
