reportMemo:
  executiveTakeaways:
  - The wedge is real because most incumbents begin at reporting time, while crypto exchanges need a live control plane for inactivity detection, outreach evidence, and asset-treatment decisions before balances tip into escheatment.
  - 'Buyer urgency is concentrated but severe: a small number of large U.S.-serving exchanges and custodians carry multistate dormant-balance exposure, and mistakes can trigger asset loss, customer anger, audits, and taxable forced liquidation.'
  - Competitive intensity is moderate-high in generic unclaimed-property software, but low in crypto-native dormant-account prevention; that leaves room for a specialist workflow system rather than a broad compliance suite.
  - The first product should stay U.S.-first and custody-first, because state fragmentation is the core source of pain and the main reason generic reporting tools do not solve the problem end to end.
  marketDefinition: Software and managed-workflow infrastructure for U.S.-serving custodial crypto platforms that identifies dormant accounts early, orchestrates compliant owner outreach, and produces an auditable path for liquidation, remittance, or recovery. The market is narrower than generic unclaimed-property reporting and narrower than broad regtech; the job is to operationalize dormant-asset decisions inside exchange and wallet operations.
  customerAndBuyer: Primary users are dormancy, compliance-operations, finance-operations, and customer-operations teams inside U.S.-serving crypto exchanges and custodial wallet platforms. The economic buyer is typically the Chief Compliance Officer, General Counsel, VP Operations, or equivalent executive who owns abandoned-property risk, audit exposure, and support-heavy recovery workflows.
  buyingTriggers:
  - point: Annual holder-reporting calendars and due-diligence windows turn dormant-balance cleanup into a recurring audit event rather than a one-off legal memo.
    sourceRefs:
    - 6
    - 24
    - 25
    - 27
  - point: State treatment of digital assets is moving from ambiguity toward explicit rules, which forces exchanges to revisit policy, controls, and customer communications.
    sourceRefs:
    - 17
    - 26
    - 28
    - 29
  - point: Customer harm becomes concrete when an exchange may have to convert dormant crypto to USD and trigger a taxable event before remittance.
    sourceRefs:
    - 17
    - 30
  willingnessToPay:
    summary: 'Public pricing is sparse because the serious alternatives sell as enterprise or consultative software: Sovos markets custom-priced reporting and due-diligence automation, NAUPA still points smaller holders to basic reporting tools, and Simple Escheat positions itself as a lighter-weight DIY filing product. That pattern suggests budget exists for multi-state holder compliance, but a crypto-native platform must justify premium spend by preventing losses before the reporting stage.'
    sourceRefs:
    - 6
    - 19
    - 20
    - 46
  competitiveLandscape: 'The landscape splits into four classes: crypto-native dormant-asset specialists, horizontal unclaimed-property reporting suites, state-program or audit-heavy incumbents, and lightweight filing tools. The proposed startup wins only if it owns the preventive workflow layer inside crypto operations. Generic reporting vendors already prove the budget, but they do not automatically own ledger-native inactivity detection, crypto-specific liquidation decisions, or customer-recovery UX.'
  incumbentThesis:
  - incumbentClass: Horizontal reporting suites
    point: Sovos validates that enterprises buy software for due diligence, dormancy calculation, and multistate reporting, but its center of gravity is horizontal reporting breadth rather than crypto-native preventive orchestration.
    sourceRefs:
    - 18
    - 19
    - 20
  - incumbentClass: State-program and audit incumbents
    point: Kelmar has deep unclaimed-property credibility and state-program presence, but its posture is still rooted in program administration and compliance services rather than exchange-embedded workflow software.
    sourceRefs:
    - 23
    - 25
  - incumbentClass: DIY filing software
    point: Low-end tools can help holders produce reports, but they do not solve ledger integration, contactability scoring, or crypto-specific treatment decisions before property becomes reportable.
    sourceRefs:
    - 6
    - 19
    - 46
  - incumbentClass: In-house teams and outside counsel
    point: Manual calendar management and legal memos remain the default substitute, yet state deadlines, owner-notice requirements, and asset-handling edge cases make the process too operationally heavy for spreadsheets alone.
    sourceRefs:
    - 6
    - 24
    - 25
    - 26
  regulatoryLandscape: The first market is structurally U.S.-specific because dormancy periods, notice rules, due dates, and asset-treatment expectations still vary by state. Digital assets are moving into explicit statutory scope, but the pattern is uneven enough that compliance teams still need state-aware operating logic rather than one national rulebook.
  technologyLandscape: The product is less about frontier AI than about dependable workflow state, ledger normalization, owner-contact evidence, policy versioning, and human-in-the-loop exception handling. Buyers will only trust automation if the system can explain why an account is at risk, what rule triggered the action, and what happened to the asset and outreach record afterward.
  distributionChannels:
  - point: Direct sales into compliance and operations leaders at larger exchanges is the clearest path because annual reporting, sponsor-bank pressure, and exam prep create an owned budget line.
    sourceRefs:
    - 1
    - 24
    - 25
    - 27
  - point: Partner-led distribution through unclaimed-property specialists, tax advisors, and reporting vendors is credible because buyers already rely on them once dormant balances reach filing stage.
    sourceRefs:
