openQuestions:
- How many U.S.-serving crypto platforms already run a formal dormant-asset policy versus relying on outside counsel and annual cleanup projects?
- Which specific product behaviors do leading states accept as owner activity for custodial wallets, staking positions, and stablecoin balances?
- Can a startup win budget as a standalone control plane, or must it initially piggyback on a reporting/tax vendor or legal-services channel?
- How much claimant-recovery workflow should be included before exchanges view the product as a support-ticket reducer rather than a compliance tool only?
