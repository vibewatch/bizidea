scenarios:
  downside:
    description: >-
      Pilot conversion slips by one filing cycle, logo count tops out at four, and manual review keeps margin below
      plan.
    y3RevenueK: 1800
    y3EbitdaK: -720
    cashLowPointK: -140
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches 4 instead of 5 because production conversions slow.
      - Blended annual ACV stays closer to $450K because add-on workflow expansion arrives later.
      - Y3 gross margin reaches only 68% because exception handling stays services-heavy.
  base:
    description: >-
      Base case reaches the researched five-logo beachhead by Q4Y2 and monetizes Y3 mostly through ACV expansion on
      those customers.
    y3RevenueK: 2500
    y3EbitdaK: -302.8
    cashLowPointK: 274.7
    keyAssumptionChanges:
      - Two paid pilots close in Y1, one converts by M11, and the fifth production logo arrives by Q4Y2.
      - Blended production ACV grows from roughly $360K toward $500K with usage and recovery modules.
      - Gross margin improves from 55% in Y1 to 74% in Y3 as policy and implementation playbooks standardize.
  upside:
    description: >-
      Faster pilot conversions and stronger module attach lift revenue above plan without requiring a broader team
      footprint.
    y3RevenueK: 2900
    y3EbitdaK: 80
    cashLowPointK: 420
    keyAssumptionChanges:
      - The second and third production conversions land about one quarter earlier than base.
      - Blended annual ACV exits above $550K because recovery and benchmark modules attach faster.
      - Gross margin reaches 76% as manual exception rates fall sooner than planned.
sensitivity:
  - variable: ARPU
    downsideCase: $450K blended annual ACV.
    baseCase: $500K blended annual ACV.
    upsideCase: $550K blended annual ACV.
    y3RevenueImpactK: -250
    cashImpactK: -185
  - variable: CAC
    downsideCase: $225K per customer because founder-led sales stay bespoke.
    baseCase: $175K per customer.
    upsideCase: $140K per customer with partner-referred deals.
    y3RevenueImpactK: 0
    cashImpactK: -250
  - variable: churn
    downsideCase: 1.8% monthly customer churn.
    baseCase: 1.2% monthly customer churn.
    upsideCase: 0.8% monthly customer churn.
    y3RevenueImpactK: -150
    cashImpactK: -120
  - variable: sales cycle
    downsideCase: Pilot-to-production conversion stretches toward 12 months.
    baseCase: Conversion follows the milestone cadence in A6 and A7.
    upsideCase: Two pilots convert in roughly 6 months.
    y3RevenueImpactK: -450
    cashImpactK: -320
  - variable: gross margin
    downsideCase: 68% Y3 gross margin because manual review remains elevated.
    baseCase: 74% Y3 gross margin.
    upsideCase: 76% Y3 gross margin with cleaner policy automation.
    y3RevenueImpactK: 0
    cashImpactK: -150
  - variable: hiring pace
    downsideCase: Add the second customer-ops and another engineering hire two quarters early.
    baseCase: Hold the 9-FTE plan through Q4Y3.
    upsideCase: Defer the second customer-ops hire until Q4Y3.
    y3RevenueImpactK: 0
    cashImpactK: -170
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Target exchanges] --> Pilots[Paid pilots]
      Pilots --> Customers[Production customers]
      Customers --> Revenue[Platform + usage revenue]
      Revenue --> GrossProfit[Gross profit after workflow ops]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: >-
      The base case reaches the researched $2.5M Y3 SOM by getting five beachhead exchanges live and expanding each
      toward roughly $500K ACV.
  - checkName: Must go right
    finding: >-
      Paid pilots have to convert within one filing cycle because the model only carries one dedicated GTM hire before
      Y3.
  - checkName: Model breaks if
    finding: >-
      Cash turns negative if conversions slip toward 12 months and gross margin stalls near 68%, which is the core
      downside case.
  - checkName: Next-round proof
    finding: >-
      A credible seed case appears once Q4Y2 shows five production customers, one full filing-cycle proof point, and
      partner-sourced pipeline without services creep.
sanityChecks:
  ruleOf40: Y3 growth 100.0% + EBITDA margin -12.1% = 87.9%
  burnMultiple: Y3 net burn $302.3K on $1.25M of net new revenue = 0.2x burn multiple.
  revenuePerFte: $277.8K Y3 on 9 Q4Y3 FTE (benchmark $200-400K SaaS).
  flags:
    - The market is concentrated, so losing even one target exchange materially changes the outcome.
    - >-
      The model assumes exchanges buy a standalone control plane before incumbent reporting vendors bundle similar
      workflows.
    - >-
      Gross margin only clears the BP target if manual policy exceptions fall fast enough to avoid a services-heavy
      delivery model.
