date: '2026-05-21'
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: Model start month
    value: 2026-06
    unit: YYYY-MM
    source: '[BP date 2026-05-21] First full operating month after the business-plan date.'
  - id: A2
    name: Opening cash and pre-seed size
    value: '2300'
    unit: USDK
    source: >-
      [BP fundingAsk targetFundingRangeUsd $2-4M and runwayMonths 18] Base case uses a $2.3M pre-seed, sized to hit the
      Q4Y2 milestone plus about six months of buffer.
  - id: A3
    name: Starting customers (M1)
    value: '0'
    unit: logos
    source: '[BP milestones 0-12 months] The company begins pre-revenue and must first sell design-partner pilots.'
  - id: A4
    name: Paid pilot pricing
    value: $90K over three months
    unit: USDK per pilot
    source: >-
      [BP investorMemo.firstCustomer.initialContract $75k-$150k] Base case uses a midpoint pilot price tied to one
      filing-cycle workflow.
  - id: A5
    name: Production ACV ladder
    value: $360K initial production ACV rising toward $500K with usage and modules
    unit: USDK per customer year
    source: >-
      [BP investorMemo.firstCustomer.initialContract + Research market.som] Keeps the model inside the stated
      $300k-$500k annual range and the researched $500k SOM anchor.
  - id: A6
    name: Y1 customer ramp
    value: Customer 1 starts in M5, customer 2 starts in M8, and one pilot converts to production by M11
    unit: timing
    source: >-
      [BP milestones 0-12 months + BP experimentRoadmap paid pilot tied to filing cycle] Matches two paid design
      partners and one $300K+ conversion inside year 1.
  - id: A7
    name: Y2-Y3 customer ramp
    value: Q1Y2 2 logos, Q2Y2 3, Q3Y2 4, Q4Y2 5, then 5 through Q4Y3
    unit: logos
    source: >-
      [BP milestones 12-24 months + Research SOM] Base case reaches the researched five-customer beachhead by Q4Y2 and
      grows Y3 through expansions rather than more logos.
  - id: A8
    name: Y1 realized revenue schedule
    value: M5-M7 $30K, M8-M10 $60K, M11-M12 $55K
    unit: USDK per month
    source: '[A4 + A5] Mixes one pilot, then two pilots, then one production logo plus one pilot.'
  - id: A9
    name: Y2 realized quarterly revenue
    value: Q1Y2 $150K, Q2Y2 $240K, Q3Y2 $360K, Q4Y2 $500K
    unit: USDK per quarter
    source: >-
      [BP milestones 12-24 months + BP businessModel.expansionLevers] Revenue scales through pilot conversion,
      second-workflow usage, and more balances under management.
  - id: A10
    name: Y3 realized quarterly revenue
    value: Q1Y3 $560K, Q2Y3 $620K, Q3Y3 $650K, Q4Y3 $670K
    unit: USDK per quarter
    source: >-
      [Research market.som $2.5M year-3 SOM] Full-year Y3 revenue sums to the researched SOM while holding the logo
      count at five.
  - id: A11
    name: Gross margin path
    value: 55% Y1, 67% Y2, 74% Y3
    unit: percent
    source: >-
      [BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions] Base case starts services-heavy, clears the
      target in Y2, and reaches modest software leverage in Y3.
  - id: A12
    name: Steady-state monthly churn
    value: '1.2'
    unit: percent
    source: >-
      [Startup-finance heuristic: sticky enterprise workflow software] Conservative enough to reflect concentrated buyer
      risk before the market is fully proven.
  - id: A13
    name: Steady-state CAC
    value: '175'
    unit: USDK per customer
    source: >-
      [BP gtm channels and funnelTargets + startup-finance heuristic] Founder-led enterprise sales, pilots, and
      partner-assisted implementation justify a six-figure CAC.
  - id: A14
    name: Loaded salary bands
    value: Founder 150; engineering 210; compliance product 180; solutions 165; customer ops 130; partnerships/GTM 165
    unit: annual USDK per FTE
    source: >-
      [BP team + startup-finance heuristic] Seed-stage U.S. cash compensation plus payroll burden for senior but still
      lean hires.
  - id: A15
    name: Hiring sequence
    value: >-
      Founder, founding eng, and compliance at start; solutions in M4; customer ops in M7; GTM in M12; second eng in
      M15; second compliance hire in M18; second ops hire in M27
    unit: timing
    source: '[BP team + BP strategicChoices.sequencingRationale] Product and compliance capacity land before broader GTM scale.'
  - id: A16
    name: Headcount endpoint
    value: 3 FTE Q1Y1, 4 Q2Y1, 5 Q3Y1, 6 Q4Y1, 8 Q4Y2, 9 Q4Y3
    unit: FTE
    source: >-
      [BP team + BP fundingAsk] Keeps the company lean enough for a pre-seed while still supporting implementations and
      one channel-facing hire.
  - id: A17
    name: Non-payroll operating spend
    value: >-
      Y1 monthly spend rises from 21K to 33K; Y2 quarterly non-payroll spend runs 90K, 102K, 117K, 132K; Y3 quarterly
      non-payroll spend runs 141K, 150K, 162K, 186K
    unit: USDK
    source: >-
      [Startup-finance heuristic] Covers cloud, legal, security, travel, and customer implementation costs without
      building a services bench.
  - id: A18
    name: Cash flow convention
    value: Ending cash equals opening cash plus EBITDA
    unit: policy
    source: >-
      [Startup-finance heuristic] Working-capital swings, capex, debt, and deferred-revenue effects are assumed
      immaterial at this stage.
  - id: A19
    name: Downside scenario deltas
    value: Production ramp slips one filing cycle, only 4 logos reach full scale by Q4Y3, and Y3 gross margin caps at 68%
    unit: scenario inputs
    source: >-
      [BP risks + Research sensitivityCases] Mirrors the documented risks of services creep, budget resistance, and
      incumbent pressure.
  - id: A20
    name: Upside scenario deltas
    value: >-
      Two pilots convert faster, expansion modules pull blended ACV above $550K, and the same 9-FTE plan supports the
      ramp
    unit: scenario inputs
    source: >-
      [BP milestones 24-36 months + BP businessModel.expansionLevers] Upside assumes faster proof, not a different
      company shape.
