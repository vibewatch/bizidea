    signalRefs: [赛道融资验证了预算存在]
    sourceRefs: [1, 2]
differentiator: >-
  通用的无人认领财产供应商，大多等到申报时点才介入，那时真正高风险的决定往往早就做完了。RecoveryOS 提前几个月进场，围绕加密场景的现实约束来设计：合并托管总账、代币清算政策，以及把合规、税务和客服揉在一起的客户追回流程。时间一长，它的护城河不只是规则库，而是州规则决策日志、沉睡账户基准数据，以及深度嵌进总账和消息系统的集成——这些都很难被平台轻易拆掉。
