problem: >-
  面向美国用户的加密货币交易所和托管钱包平台，会随着交易人群流失、钱包长期不动、KYC 数据过期，沉淀出大批不活跃客户余额。一旦这些账户跨过各州规定的沉睡门槛，合规团队就得判断到底由哪个州主张责任、该走怎样的通知节奏、税务申报和清算或划转如何联动，以及数字资产到底该怎么处理。多数运营方现在还靠表格、一次性的 SQL 抽数和外部律师硬撑，结果就是漏通知、过早清算，或者在检查里留下难看的问题。
targetUser:
  primary: 面向美国用户的加密货币交易所和托管钱包平台里的沉睡资产与合规运营负责人
  secondary: 负责无人认领财产申报、资金划付和客户资产储备的财务运营团队
  buyer: 零售加密平台的首席合规官或运营副总裁
startupThesis:
  nonObviousInsight: >-
    真正的切口，不是事后去报无人认领财产，而是在加密余额法律意义上“丢失”之前，先搭一套实时控制台，持续把产品活跃度、触达证据、资产处理方式和各州规则对齐。数字资产平台的不活跃账户够多，规则灰区也够大，沉睡资产预防本身就会长成一套新的系统记录。
  beachhead: 拥有 1M+ 历史入金账户、总账合并托管结构，并且每年都面临多州沉睡财产敞口的美国零售加密货币交易所与托管钱包平台
  wedge: 面向加密资产的沉睡账户编排系统，尽早识别高风险余额，自动发起合规触达，并管理合法清算、汇缴和客户追回流程
  whyNowCatalyst: Eisen 的融资以及其披露的 31% 预防率说明，沉睡资产预防正变成一个能单独预算的基础设施品类；与此同时，加密账户又把各州规则差异暴露得最尖锐。
  ventureScalePath: >-
    先从零售加密货币交易所切入，再把同一套规则引擎、证据链和划付能力扩到 neobank、工资钱包、券商，以及其他同样受各州沉睡规则约束的数字资产平台。
solution: >-
  RecoveryOS 打通交易所总账、CRM、触达渠道和合规策略引擎，持续维护一份接近沉睡门槛账户的实时清单。系统会按州别时钟、资产类型、联系方式可达性和文档缺口给账户打分，再在账户真正进入 escheat 前发起正确的通知节奏。对那些最终还是超期的账户，产品会产出可审计的决策轨迹，并编排获批的清算、汇缴、税表和客户追回流程，不再让运营团队手工把这些环节硬拼在一起。再配上一套白标追回门户，客户可以自行验身、查看可领余额并发起找回，不必制造大量定制化客服工作。
goToMarketSeed:
  firstCustomer: 拥有超过 1 million 历史入金账户、采取合并托管，并且即将迎来年度无人认领财产审查的美国持牌零售加密货币交易所
  buyingTrigger: 一次多州合规检查、赞助银行提出的整改要求，或年度沉睡财产申报周期，让团队发现自己手里有大量不活跃加密余额，却没有成文的操作政策
  currentAlternative: 表格、内部 SQL 抽数、外部律师备忘录，以及主要为现金账户设计的通用无人认领财产供应商
  switchingReason: RecoveryOS 能把一场法律风险很高、每年都要救火的工作，变成一套可重复的流程，而且它懂钱包总账状态、代币处理政策和能过审计的证据链。
  pricingHypothesis: 按受管沉睡账户数量收年费，再按触达、追回和划付工作流收按量费用
