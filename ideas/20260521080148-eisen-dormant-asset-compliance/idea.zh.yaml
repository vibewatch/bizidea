jobsToBeDone:
  - job: 当不活跃钱包余额逼近沉睡期限时，帮助合规负责人判断该走哪条处理路径，这样他们既能避免本可避免的 escheat，也能把每一次决定都留痕。
    currentAlternative: 手工表格追踪，加上外部律师和通用申报供应商
    successMetric: 在转入州政府托管前解决的高风险余额占比，以及每个申报周期节省的工时
  - job: 当年度无人认领财产申报启动时，帮助财务和运营团队把沉睡加密余额整理成可直接上报各州的汇缴包，这样他们就能通过审计，同时不把客服团队拖死。
    currentAlternative: 内部 SQL 抽数、临时法务备忘录和一次一套的运营手册
    successMetric: 申报周期时长、审计例外项，以及每个沉睡账户案例对应的客服工单量
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 这个主题同时具备强融资验证、可量化的市场痛点，以及运营方已在管理数十亿美元敞口的具体证据。
  painIntensity:
    score: 5
    rationale: 一旦客户沉睡资产处理失当，平台就会同时面对法律风险、客户损失和昂贵的手工运营成本，尤其是那些沉积了大量不活跃账户的平台。
  wedgeClarity:
    score: 5
    rationale: 第一款产品很聚焦，就是给加密货币交易所做沉睡账户编排层，而不是一个模糊的大而全合规套件。
  defensibility:
    score: 4
    rationale: 规则库和集成本身能被复制，但长期积累下来的决策数据、总账连接器和深嵌工作流，会逐步变成切换成本。
  ventureScale:
    score: 4
    rationale: 加密货币是一个足够集中的入口；一旦跑通，同一套控制台还能扩到金融服务里更多数字资产和数字余额场景。
topRisks:
  - name: 监管口径仍有歧义
    description: 一些州对特定数字资产的处理方式可能并不一致，默认清算或汇缴政策因此很难标准化。
    mitigation: 先从托管现金和稳定币流程切入，把策略逻辑按州做成可配置，并与专门的无人认领财产律师合作。
  - name: 紧迫感高度集中
    description: 较小的平台未必觉得沉睡资产问题严重到值得购买，除非等到检查或申报失败逼着它们出手。
    mitigation: 初期销售只盯拥有百万级历史账户的交易所，并把定价锚定在减少资产损失和节省申报人工上。
  - name: 现有厂商向上游扩张
    description: 一旦赛道足够有吸引力，通用无人认领财产软件供应商可能会把能力从申报时点一路往前延伸到预防环节。
    mitigation: 趁横向厂商还没适配前，先在加密原生总账集成、客户追回工作流和证据系统上拉开差距。
