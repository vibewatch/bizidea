slug: crypto-dormancy-recovery-os
date: '2026-05-21'
executiveSummary: >-
  RecoveryOS should launch as a U.S.-only dormant-asset control plane for
  custodial crypto platforms, not as a broad regtech suite or a filing-only
  vendor. The first customer is a retail crypto exchange or custodial wallet
  platform with more than 1 million historical funded accounts and an upcoming
  dormant-property review, compliance exam, or sponsor-bank request. The
  researched wedge is credible because state-by-state dormancy rules, owner
  outreach duties, and crypto asset-treatment decisions create an operational
  burden that spreadsheets, outside counsel, and reporting-first software do not
  solve well. Product v1 should focus on identifying at-risk accounts,
  orchestrating notices, capturing audit evidence, and managing approved
  liquidation, remittance, and claim recovery for custodial balances, with human
  review for ambiguous state or token cases. Go-to-market should be founder-led
  and event-driven, selling a paid pilot tied to the next filing cycle and then
  converting that workflow into an annual platform contract priced on dormant
  accounts under management plus workflow usage. Research estimates a $20.0M
  beachhead SAM and a $2.5M year-3 SOM, which is enough for a focused pre-seed
  wedge but not enough to justify premature expansion. The moat is not generic
  rule content alone; it is the combination of ledger integrations, state-rule
  decision logs, and outreach-outcome data that improve prevention and
  auditability over time. The biggest unresolved question is whether enough
  exchanges will buy a standalone preventive control plane rather than extending
  counsel-led or horizontal reporting workflows, so partner-led distribution and
  pilot conversion are explicit validation work in this plan.
problem:
  - "U.S.-serving crypto exchanges accumulate inactive customer balances that become legally complex once state dormancy clocks, notice rules, and asset-treatment obligations diverge by jurisdiction."
  - "Most operators still rely on spreadsheets, SQL pulls, outside counsel, and reporting-time vendors, which creates missed outreach, forced liquidation risk, audit exposure, and preventable customer support escalations."
solution:
  - "Provide a custody-aware workflow system that monitors dormant-account risk continuously, determines the allowed action path by state and asset type, and launches compliant outreach before balances become reportable."
  - "For balances that still age out, generate an auditable trail for liquidation, remittance, tax documentation, and claimant recovery, plus a white-label recovery portal that reduces bespoke support work."
whyWeWin:
  - "The company is targeting the preventive operating layer inside exchange workflows, where incumbent reporting suites and counsel-led processes are weakest and where ROI appears before filing day."
  - "If the startup owns ledger normalization, outreach history, and state-specific decision logs for dormant crypto balances, it can build switching costs and performance data that filing-only vendors do not capture."
strategicChoices:
  beachhead: "U.S.-serving retail crypto exchanges and custodial wallet platforms with more than 1 million historical funded accounts, omnibus ledgers, and annual multistate dormant-property exposure."
  wedgeRationale: >-
    This slice has the clearest buying trigger because annual holder reporting,
    exams, and sponsor-bank pressure already force action, yet the workflow is
    still broken by crypto-specific inactivity signals and asset-treatment edge
    cases. It creates faster proof than broader fintech because a small number
    of large accounts can justify six-figure pilots and produce measurable
    prevention, audit, and support outcomes within one filing cycle.
  sequencingRationale: >-
    Product should begin U.S.-first and custody-first, with at-risk account
    detection, notices, evidence capture, and configurable asset-treatment
    policies before broader tax, banking, or claimant-service ambitions. GTM
    should start with founder-led direct sales into the next filing cycle, then
    add counsel and tax partners after the first production deployments prove
    that the startup complements rather than replaces downstream reporting
    workflows. Hiring follows the same order: engineering and compliance product
    first, solutions and customer operations second, broader partnerships only
    after implementation playbooks repeat.
  notYet:
    - "Non-custodial wallets, DeFi protocols, or self-custody recovery"
    - "Non-U.S. dormant-asset coverage"
    - "A broad tax or financial-crime compliance suite"
    - "Direct-to-consumer claim marketplace outside enterprise customers"
market:
  tam: "$100.0M estimated TAM based on roughly 250 U.S.-exposed digital-balance institutions across crypto, brokerage, neobank, payroll-wallet, and custody categories at about $400k ACV."
  sam: "$20.0M estimated SAM based on about 40 U.S.-serving crypto exchanges and custodial wallet platforms with enough dormant-balance exposure to justify roughly $500k ACV."
  som: "$2.5M estimated year-3 SOM based on 5 beachhead customers at roughly $500k ACV."
  segments:
    - "U.S.-serving retail crypto exchanges"
    - "Custodial wallet platforms and digital-asset fintechs with omnibus customer ledgers"
  buyingProcess: >-
    The process starts when an annual holder-reporting cycle, compliance exam,
    or sponsor-bank review exposes inactive balances without a documented
    operating policy. The economic buyer is usually the Chief Compliance
    Officer, General Counsel, or VP Operations, with finance, customer
    operations, security, and engineering validating data access and control
    requirements before a paid pilot converts to a multiyear platform contract.
product:
  mvp: >-
    MVP is a U.S.-only dormant-account control plane for custodial crypto
    platforms. It should ingest ledger and customer data, identify at-risk
    accounts by jurisdiction, automate notice workflows, maintain evidence
    trails, and support configurable liquidation, remittance, and claim
    recovery paths, with human review for ambiguous state or token scenarios.
  sixMonth: "Launch one paid design partner covering the highest-scrutiny states, at-risk dormant-account queues, multichannel notices, and auditable decision logs for fiat and stablecoin balances plus configurable token policies."
  twelveMonth: "Convert one pilot to production, add a white-label recovery portal, expand to the priority state set identified in research, and support the first full filing cycle with measured prevention and support-ticket outcomes."
  twentyFourMonth: "Reach 5 production beachhead customers, broaden support from retail exchanges into adjacent custodial wallet and digital-asset fintech workflows, and package benchmark reporting and recovery-performance modules on the same control plane."
  keyBets:
    - "A limited high-scrutiny state footprint is sufficient to land the first exchange before nationwide rule coverage exists."
    - "Buyers will trust software plus operator review faster than fully automated liquidation or remittance claims."
    - "A white-label claimant recovery experience materially improves pilot ROI by reducing support burden, not just by satisfying compliance."
    - "The same control plane can later expand into neobanks, brokerages, and payroll wallets without requiring a separate core architecture."
gtm:
  wedge: "Sell a paid pilot to a large custodial crypto platform tied to its next dormant-property filing cycle or exam response, then convert that workflow into the default system of record for all at-risk dormant balances."
  channels:
    - "Founder-led direct sales to Chief Compliance Officers, General Counsels, and VP Operations at large U.S.-serving crypto platforms"
    - "Referral and implementation partnerships with unclaimed-property counsel, tax advisors, and reporting specialists already involved in dormant-balance workflows"
    - "Regulator-adjacent education, compliance webinars, and exchange support-content marketing tied to escheatment and taxable conversion pain"
  funnelTargets: "Lead→qualified pilot 25-35%, qualified pilot→paid pilot 30-40%, pilot→production 50%+, and production→second-workflow expansion 40%+ within 12 months."
  pricing: "Charge an annual platform fee based on dormant accounts under management, with usage-based fees for notices, claims, and disbursement workflows; this matches a buyer who wants budgetable compliance infrastructure while keeping spend aligned to operational intensity and prevented-loss value."
businessModel:
  revenueStreams:
    - "Annual subscription for dormant-account monitoring, policy updates, and workflow orchestration"
    - "Usage fees for owner outreach, claimant recovery, and disbursement workflows"
    - "Implementation and premium module revenue for tax-document generation, benchmark reporting, and expanded state or product coverage"
  unitOfValue: "Dormant accounts under management and each completed outreach, claim, or disbursement workflow"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Expand from one filing-cycle workflow into always-on dormant-account monitoring for the same platform"
    - "Add more asset classes, jurisdictions, and business lines within existing exchange customers"
    - "Sell recovery portal, benchmark reporting, and audit-export modules after production adoption"
    - "Move the same rules and workflow spine into adjacent digital-balance institutions after the crypto beachhead is repeatable"
strategyMap:
  northStarMetric: "Dollar value of at-risk dormant balances resolved before state custody"
  inputMetrics:
    - "Qualified enterprise pilots signed"
    - "Time from data access to first at-risk account queue in production"
    - "Percent of at-risk balances resolved before escheatment"
    - "Pilot-to-production conversion rate"
    - "Support tickets per dormant-account case"
    - "Exception rate requiring legal or operator review"
  moatsToBuild:
    - "State-rule decision graph linking asset type, jurisdiction, outreach evidence, liquidation policy, and filing output"
    - "Ledger normalization layer across wallets, omnibus balances, stablecoins, and fiat subaccounts"
    - "Outcome dataset showing which notice sequences and recovery workflows actually prevent state transfer"
  killCriteria:
    - "Fewer than 2 paid design partners after 12 months of focused founder-led selling"
    - "Pilot customers fail to prevent at least 15% of at-risk balances from reaching state custody versus their prior process"
    - "The first 3 customers still require more than 50% workflow handling through bespoke services rather than repeatable software and operator playbooks"
  mermaid: |
    flowchart LR
      Wedge[Crypto dormant-account wedge] --> MVP[Dormant control plane MVP]
      MVP --> Proof[Prevention and audit proof points]
      Proof --> Expansion[Adjacent digital-balance expansion]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Compelling workflow pain and a coherent beachhead, but buyer concentration and standalone budget risk still need direct proof."
    whyBelieve: "Research shows a real compliance trigger, measurable prevention ROI, and a specialist product gap between horizontal reporting suites and crypto-native operational needs."
    whyDoubt: "The reachable beachhead is small, Eisen already validates the category, and it is still unproven whether exchanges will buy a new control plane instead of extending counsel-led or incumbent workflows."
    nextDiligence: "The next proof point is two paid pilots with named economic buyers, measured prevention lift, and a credible conversion path to $300k-$500k annual contracts."
  firstCustomer:
    title: "Chief Compliance Officer at a U.S.-licensed retail crypto exchange"
    profile: "A custodial crypto platform with more than 1 million historical funded accounts, omnibus ledgers, annual multistate dormant-property reviews, and visible customer-support pain around inactive balances."
    trigger: "An annual unclaimed-property cycle, exam request, or sponsor-bank escalation reveals dormant crypto balances without a documented state-by-state operating policy."
    buyer: "Chief Compliance Officer"
    initialContract: "$75k-$150k paid pilot for one filing cycle or business line, converting to roughly $300k-$500k annual platform revenue once all dormant accounts under management move onto the control plane."
  mustBeTrue:
    - "At least 10-15 large U.S.-serving custodial crypto platforms have dormant-balance exposure severe enough to justify a six-figure annual software budget."
    - "A pilot can integrate core ledger, CRM, and notice data within one compliance cycle rather than a multi-quarter enterprise services project."
    - "Customers using the product can prevent at least 15-20% more at-risk balances from reaching state custody than their prior spreadsheet-and-counsel process."
    - "Exchanges will pay for a preventive operating layer even if they keep downstream reporting, tax, or legal vendors in place."
    - "Crypto-native workflow data and integrations will compound into better prevention and audit outcomes before horizontal incumbents add equivalent functionality."
  diligenceQuestions:
    - "How many exchanges in the target ICP actually exceed the pain threshold for six-figure annual spend?"
    - "Which states and asset classes create the first must-have workflow, and where does legal ambiguity still force manual review?"
    - "What implementation effort and security review are required to connect to exchange ledgers and communication systems?"
    - "Who owns the budget in practice: compliance, operations, finance, or a sponsor-bank-driven remediation project?"
    - "Why would a buyer choose this system over Eisen, Sovos, counsel-led operations, or an internal reporting workbench?"
operatingAssumptions:
  - assumption: "A small but sufficient set of large custodial crypto platforms has enough dormant-balance exposure to support $300k-$500k annual contracts."
    basis: research.yaml
    validationTest: "Interview at least 12 target exchanges or custodial platforms and confirm at least 4 are willing to scope a paid pilot at the proposed contract range."
    decisionImpact: "If false, the company must move downmarket with a lighter product, expand earlier into adjacent digital-balance categories, or abandon venture-scale expectations."
  - assumption: "The first customer will accept a standalone preventive control plane that feeds existing reporting and legal workflows instead of demanding a fully bundled end-to-end vendor."
    basis: research.yaml
    validationTest: "Win 2 paid pilots where the buyer keeps downstream counsel or reporting vendors but still gives RecoveryOS system-of-record responsibility for at-risk account operations."
    decisionImpact: "If false, product scope and channel strategy must shift toward embedding inside incumbent vendors or becoming a services-heavy partner product."
  - assumption: "A limited launch-state set plus configurable policies covers enough dormant-account volume to show ROI before nationwide rule coverage is built."
    basis: idea.yaml
    validationTest: "Map the first partner's dormant-account inventory by state and show that the top 6-10 states represent at least 60% of at-risk balances."
    decisionImpact: "If false, engineering and legal complexity rise materially, pushing the company toward higher pricing, slower deployments, or a narrower customer subset."
  - assumption: "Software plus operator review can deliver acceptable accuracy and still trend toward gross margin above 70%."
    basis: operator judgment
    validationTest: "Track exception handling across the first 3 customers and keep manual intervention below 30% of workflows by the end of the second production filing cycle."
    decisionImpact: "If false, the company becomes services-heavy, which weakens gross margin, valuation support, and the case for a standalone software business."
  - assumption: "A white-label recovery portal reduces support burden enough to matter in buyer ROI calculations."
    basis: idea.yaml
    validationTest: "Measure dormant-account support tickets before and after portal launch in the first production customer and show at least 20% reduction per case."
    decisionImpact: "If false, the company should de-prioritize claimant UX and focus resources on preventive compliance and evidence workflows."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Pain-threshold discovery with target exchanges"
    hypothesis: "A meaningful subset of large custodial crypto platforms will budget for dormant-asset prevention before a filing failure occurs."
    successMetric: "12 ICP interviews completed and at least 4 prospects agree to paid pilot scoping at six-figure annualized pricing."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "State and asset policy coverage mapping"
    hypothesis: "The top 6-10 states and initial fiat or stablecoin workflows capture enough early volume to launch without national coverage."
    successMetric: "Design-partner data shows that at least 60% of at-risk dormant balances sit in the launch-state set and have a defined policy path."
    owner: "Compliance product lead"
  - horizon: "90-180 days"
    experiment: "Ledger and CRM integration pilot"
    hypothesis: "A design partner can deliver enough ledger, customer, and notice data to produce a live at-risk queue within one implementation cycle."
    successMetric: "First pilot reaches production-ready dormant-account queue within 8 weeks of technical kickoff."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Paid pilot tied to filing cycle"
    hypothesis: "Event-driven GTM converts better when the offer is anchored to an upcoming filing cycle or audit response."
    successMetric: "2 paid pilots signed where the buyer names the next filing deadline or exam as the primary purchase trigger."
    owner: "Founder/CEO"
  - horizon: "6-12 months"
    experiment: "Prevention and support ROI proof"
    hypothesis: "The product can both improve prevention outcomes and lower support burden enough to justify annual platform pricing."
    successMetric: "First production customer shows at least 15% improvement in prevented state transfers and at least 20% lower support tickets per dormant-account case."
    owner: "Customer operations lead"
  - horizon: "12-18 months"
    experiment: "Channel-partner motion with counsel and reporting vendors"
    hypothesis: "Specialist counsel and reporting providers will refer or implement the product once it is positioned as the preventive layer rather than a replacement."
    successMetric: "2 active partners source or assist at least 25% of qualified pipeline without extending average implementation time."
    owner: "Partnerships lead"
operations:
  - "Maintain a versioned state-rule and asset-treatment library with named owner review for every policy change."
  - "Run a controlled implementation process for ledger ingestion, dormancy-clock calculation, outreach execution, and evidence retention."
  - "Operate an exception queue that records legal review, manual asset decisions, and claimant escalations without losing audit traceability."
  - "Track prevention rate, filing-cycle duration, support-ticket volume, and recovery outcomes by customer, state, and asset class."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, pilot design, and early buyer trust because the initial market is concentrated and compliance-sensitive."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the ledger connectors, workflow engine, and auditability required for the first production-grade control plane."
  - role: "Compliance product lead"
    startTiming: "Month 1"
    rationale: "Translate state dormancy rules, asset-treatment logic, and filing evidence requirements into reusable product policies."
  - role: "Solutions engineer"
    startTiming: "Month 4"
    rationale: "Reduce partner integration friction and keep founders from becoming the long-term implementation bottleneck."
  - role: "Customer operations lead"
    startTiming: "Month 7"
    rationale: "Run exception handling, filing-cycle support, and customer outcome measurement as deployments move from pilot to production."
  - role: "Partnerships lead"
    startTiming: "Month 12"
    rationale: "Add structured counsel and reporting-vendor channels only after the direct-sales playbook and implementation model are repeatable."
milestones:
  - horizon: "0-12 months"
    items:
      - "Close 2 paid design partners in the beachhead ICP."
      - "Launch the first production dormant-account queue and notice workflows for the priority state set."
      - "Support one full filing-cycle or exam-response workflow with auditable evidence trails."
      - "Convert at least 1 pilot into a $300k+ annual platform contract."
  - horizon: "12-24 months"
    items:
      - "Reach 3-5 production customers and validate year-3 SOM assumptions."
      - "Add white-label recovery portal, benchmark reporting, and broader asset-treatment coverage on the same control plane."
      - "Establish 2 channel partners that contribute qualified pipeline without turning the business into a services reseller."
  - horizon: "24-36 months"
    items:
      - "Expand beyond retail exchanges into adjacent custodial wallet or digital-balance institutions."
      - "Demonstrate repeatable prevention and audit metrics across enough customers to support a larger seed-to-series-a growth motion."
      - "Prove whether adjacent markets can expand revenue beyond the initial crypto beachhead without breaking implementation discipline."
risks:
  - risk: "State treatment of digital assets remains uneven, forcing manual policy decisions that slow deployments."
    likelihood: High
    impact: High
    mitigation: "Start with custody-first workflows, configurable policies, and human review for ambiguous states or token classes rather than promising full automation."
  - risk: "The beachhead customer set is too concentrated to support efficient pipeline creation or venture-scale growth."
    likelihood: Medium
    impact: High
    mitigation: "Target only the largest exposed exchanges first, measure true pain thresholds quickly, and be ready to expand into adjacent digital-balance institutions after the first proof points."
  - risk: "Horizontal incumbents or Eisen compress pricing by adding similar preventive features."
    likelihood: Medium
    impact: High
    mitigation: "Differentiate on ledger-native integrations, recovery workflow UX, and auditable prevention outcomes rather than on reporting breadth."
  - risk: "Implementation becomes bespoke professional services instead of repeatable software."
    likelihood: Medium
    impact: High
    mitigation: "Constrain the initial launch-state set, templatize data ingestion and notice workflows, and hire solutions talent only after reusable patterns emerge."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Eighteen months of runway should fund the founding product and compliance team, the first ledger integrations, counsel-backed rule coverage for the launch states, and 2-3 paid pilots through at least one production filing cycle."
