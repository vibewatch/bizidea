      rationale: 横向现有厂商已经占据了通用无人认领财产预算，而像 Eisen 这样的加密原生玩家也说明赛道正在被产品化，哪怕真正的预防细分仍明显供给不足。
      sourceRefs:
        - 1
        - 5
        - 19
        - 23
  pestle:
    - factor: 政治
      impact: positive
      point: 各州财长和立法机构仍在持续更新无人认领财产规则，这会持续抬高能跟上变化的软件需求。
      sourceRefs:
        - 17
        - 26
        - 28
        - 29
    - factor: 经济
      impact: positive
      point: 沉睡余额本身已经够大，提前拦住资产划转，既能保护消费者价值，也能守住平台与这些账户相关的收入。
      sourceRefs:
        - 1
        - 2
    - factor: 社会
      impact: positive
      point: 面向用户的领取门户和帮助文章反复说明，所有者确实搞不清被 escheat 的余额该怎么处理，尤其是在加密资产被转换之后。
      sourceRefs:
        - 30
        - 32
    - factor: 技术
      impact: positive
      point: 托管型数字资产产品会冒出新的边角问题——活跃信号、钱包处理方式和清算逻辑都更复杂，通用现金账户工具根本接不住。
      sourceRefs:
        - 3
        - 17
        - 22
    - factor: 法律
      impact: negative
      point: 市场仍被分州截止日、通知规则和资产处理标准拖住，实施复杂度因此一直很高。
      sourceRefs:
        - 7
        - 8
        - 9
        - 10
        - 11
        - 12
        - 13
  adoptionFrictionMatrix:
    - friction: 加密产品里“所有者活跃”定义并不清楚
      severity: 高
      affectedBuyer: 首席合规官
      mitigation: 先从可配置策略模板和经过律师复核的分州规则映射做起，按州别和产品类型落地。
      sourceRefs:
        - 3
        - 17
        - 22
    - friction: 接入交易所总账和客户数据系统
      severity: 高
      affectedBuyer: 运营副总裁
      mitigation: 提供实施连接器、批量回填能力，以及围绕高风险账户队列的单点首发工作流，而不是要求一次性替换整个平台。
      sourceRefs:
        - 5
        - 21
        - 22
    - friction: 买方已经在用外部律师或横向申报工具
      severity: 中
      affectedBuyer: 总法律顾问
      mitigation: 把产品定位成喂给这些下游流程的预防操作层，而不是立刻替代它们。
      sourceRefs:
        - 19
        - 21
        - 23
        - 46
    - friction: 客户触达和应税转换会带来声誉风险
      severity: 中
      affectedBuyer: 客户运营负责人
      mitigation: 把证据充分的通知、清晰的审计轨迹和追回路径做进产品，减少用户意外感和客服压力。
      sourceRefs:
        - 6
        - 24
        - 30
