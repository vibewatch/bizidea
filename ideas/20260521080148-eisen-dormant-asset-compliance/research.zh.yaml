reportMemo:
  executiveTakeaways:
    - 真正的切口存在，因为多数现有厂商都是到申报时点才开始介入；而加密货币交易所需要的是一套实时控制台，在余额落入 escheat 前就先管住不活跃检测、触达证据和资产处理决策。
    - 买方紧迫感很集中，但一旦爆发就很重：美国少数几家大型交易所和托管方承受着多州沉睡余额敞口，做错不仅会导致资产流失、用户愤怒和审计问题，还可能触发应税的被迫清算。
    - 通用无人认领财产软件里的竞争强度已经偏中高，但加密原生的沉睡账户预防仍然稀缺；这给了做专门工作流系统的空间，而不是非得做宽而泛的合规套件。
    - 第一款产品就该坚持美国优先、托管优先，因为州别碎片化才是痛点根源，也是通用申报工具没法端到端解决问题的主因。
  marketDefinition: 面向美国托管型加密平台的软件和托管式工作流基础设施，负责尽早识别沉睡账户、编排合规的所有者触达，并为清算、汇缴或追回产出可审计路径。这个市场比通用无人认领财产申报更窄，也比宽泛的合规科技更窄；本质上是在交易所和钱包运营内部，把沉睡资产决策真正跑起来。
  customerAndBuyer: 主要用户是美国加密货币交易所和托管钱包平台里的沉睡资产、合规运营、财务运营和客户运营团队。真正付钱的人通常是首席合规官、总法律顾问、运营副总裁，或其他对无人认领财产风险、审计敞口和高客服负担追回流程负责的高管。
  buyingTriggers:
    - point: 年度持有人申报日历和尽调窗口，会把沉睡余额清理变成周期性的审计事件，而不是一次性的法务备忘录。
      sourceRefs:
        - 6
        - 24
        - 25
        - 27
    - point: 各州对数字资产的处理，正在从模糊走向明文规则，这迫使交易所重做策略、控制和客户沟通。
      sourceRefs:
        - 17
        - 26
        - 28
        - 29
    - point: 一旦交易所必须先把沉睡加密资产换成 USD 再汇缴，还可能触发应税事件，客户伤害就会瞬间变得具体。
      sourceRefs:
        - 17
        - 30
  willingnessToPay:
    summary: 公开定价很少，因为真正的替代方案大多按企业级或顾问式软件来卖：Sovos 主打定制定价的申报与尽调自动化，NAUPA 对小持有人仍主要指向基础申报工具，Simple Escheat 则更像轻量自助式申报产品。这说明多州持有人合规的预算确实存在，但加密原生平台若想卖出更高客单价，就必须证明自己能在申报前先把损失拦下来。
    sourceRefs:
      - 6
      - 19
      - 20
      - 46
  competitiveLandscape: 市场大致分成 4 类：加密原生的沉睡资产专家、横向无人认领财产申报套件、州项目或审计服务导向的现有厂商，以及轻量级申报工具。拟议中的创业公司只有在拿下加密运营里的预防工作流层时，才有赢面。通用申报供应商已经证明预算存在，但它们并不天然拥有总账原生的不活跃检测、加密特有的清算决策，或客户追回体验。
  incumbentThesis:
    - incumbentClass: 横向申报套件
      point: Sovos 已经证明，企业会为尽调、沉睡计算和多州申报买软件；但它的重心在横向申报广度，而不是加密原生、申报前就介入的预防编排。
      sourceRefs:
        - 18
        - 19
        - 20
    - incumbentClass: 州项目与审计型现有厂商
      point: Kelmar 在无人认领财产领域的公信力和州项目存在感都很强，但它的姿态仍更像项目管理和合规服务，而不是深嵌交易所工作流的软件。
      sourceRefs:
        - 23
        - 25
    - incumbentClass: 自助式申报软件
      point: 低端工具能帮持有人把报告报上去，但它们解决不了总账集成、联系方式可达性评分，以及在财产变成可申报前的加密特定处理决策。
      sourceRefs:
        - 6
        - 19
        - 46
    - incumbentClass: 内部团队与外部律师
      point: 手工管理日历加法律备忘录，仍是默认替代方案；但各州截止日、所有者通知要求和资产处理边角情况叠在一起，流程重到不是表格能扛住的。
      sourceRefs:
        - 6
        - 24
        - 25
        - 26
  regulatoryLandscape: 第一市场在结构上就是美国特有，因为沉睡期、通知规则、申报截止日和资产处理预期至今仍按州分裂。数字资产正被越来越明确地写进法规，但整体节奏并不一致，所以合规团队需要的不是一套全国统一手册，而是能识别各州差异的操作逻辑。
  technologyLandscape: 这个产品的重点，不是前沿 AI，而是可靠的工作流状态、总账标准化、所有者联系证据、策略版本管理，以及有人兜底的异常处理。买方只会信任能解释清楚 3 件事的自动化：为什么某个账户有风险、哪条规则触发了动作、动作之后资产和触达记录发生了什么。
  distributionChannels:
    - point: 直接卖给大型交易所里的合规和运营负责人，是最清晰的路径，因为年度申报、赞助银行压力和检查准备都能形成单独预算。
      sourceRefs:
        - 1
        - 24
        - 25
        - 27
    - point: 通过无人认领财产专家、税务顾问和申报供应商做伙伴分发，也讲得通，因为买方一旦走到申报阶段，本来就依赖这些人。
      sourceRefs:
        - 19
        - 21
        - 23
        - 46
    - point: 交易所教育内容和追回帮助流程，也能成为顶层漏斗入口，因为用户对 escheat 和应税转换的困惑已经在公开支持材料里显性存在。
      sourceRefs:
        - 3
        - 30
  partnershipEcosystem:
    - point: 无人认领财产律师和申报专家天然适合做实施伙伴，因为他们本来就在处理分州要求和升级案例。
      sourceRefs:
        - 19
        - 21
        - 23
    - point: 通信、KYC 和客服工具也很关键，因为尽职通知和重新联系，本来就是避免不必要 escheat 的核心环节。
      sourceRefs:
        - 6
        - 30
    - point: 州级门户和 NAUPA 格式申报仍是生态依赖，即便它们不是典型渠道伙伴；系统最后还是得吐出监管可接受的申报文件和证据。
      sourceRefs:
        - 6
        - 7
        - 24
        - 25
        - 27
  dataMoats:
    - point: 一张把资产类型、司法辖区、联系历史、清算策略和申报结果串起来的规则与异常图谱，时间久了会变成很难重建的运营数据集。
      sourceRefs:
        - 6
        - 7
        - 17
        - 26
    - point: 跨账户的触达结果会逐渐变成护城河，因为产品会学到，到底哪种通知顺序、触达渠道和证据组合，最能阻止资产转到州政府。
      sourceRefs:
        - 1
        - 5
        - 30
    - point: 覆盖钱包、合并余额、稳定币和法币子账户的总账标准化，一旦做深，就会形成只做申报的工具永远拿不到的切换成本。
      sourceRefs:
        - 3
        - 5
        - 22
  geographicConsiderations:
    - point: 上线初期坚持美国优先，因为核心痛点来自各州法务与行政流程的碎片化，而不是笼统的全球加密监管。
      sourceRefs:
        - 7
        - 8
        - 9
        - 10
        - 11
        - 12
        - 13
    - point: 优先盯加州、纽约、特拉华、佛州、亚利桑那和弗吉尼亚等高审查州，这些州要么申报负担更清晰，要么数字资产处理变化最快。
      sourceRefs:
        - 17
        - 24
        - 25
        - 26
        - 27
        - 28
        - 29
  sensitivityCases:
    - case: 更多州改为实物划转，而不是强制清算
      impact: 创业公司仍有赢面，但价值重心会从清算编排，转到托管感知型汇缴、通知证据和追回工作流。
      sourceRefs:
        - 17
        - 26
        - 29
    - case: 横向现有厂商加入加密模块
      impact: 定价压力会迅速抬升，因此创业公司必须靠总账集成、预防分析和追回体验取胜，而不是通用报表生成。
      sourceRefs:
        - 19
        - 20
        - 23
    - case: 大型交易所坚持把工作流主要留在内部
      impact: 初始 SOM 会被压缩，除非产品能证明自己比人工加律师流程更快上线、审计负担更低，且客户追回经济性更好。
      sourceRefs:
        - 6
        - 21
        - 24
        - 25
  validationPlan:
    - priority: high
      question: 有多少面向美国用户的加密托管方，其沉睡余额敞口大到足以支撑六位数年费？
      evidenceToGather: 与头部交易所合规负责人做销售线索访谈，再拿无人认领财产律师和审计机构的实施范围评估交叉验证。
    - priority: high
      question: 在不同资产类型下，买方认可哪些产品事件可以算作“所有者活跃”，从而重置沉睡时钟？
      evidenceToGather: 各州律师备忘录、监管反馈，以及交易所匿名客户政策文件。
    - priority: medium
      question: 交易所会不会买一套独立控制台，还是坚持把工作流嵌进现有申报或税务供应商？
      evidenceToGather: 与平台买方做采购访谈，并和 Sovos 类供应商及专业律师做合作探索。
    - priority: low
      question: 在客户服务团队真正把产品看成降工单工具之前，到底要把多少追回体验和申领支持做到产品里？
      evidenceToGather: 用白标追回门户做试点，并测量基础支持工单量。
