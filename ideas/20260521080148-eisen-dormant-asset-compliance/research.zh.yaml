    - point: 现有厂商已经公开把加密资产和相邻数字资产视为无人认领财产范围扩张的一部分。
      sourceRefs:
        - 18
        - 19
        - 20
    - point: 新一轮赛道融资说明，只要供应商能证明预防 ROI，买方愿意为专门基础设施埋单。
      sourceRefs:
        - 1
        - 2
  headwinds:
    - point: 最优客户集中过高，销售周期可能很长，采购也会把产品和内部团队、外部律师一起比较。
      sourceRefs:
        - 21
        - 23
    - point: 分州碎片化让实施更偏服务化，也抬高了持续更新规则的成本。
      sourceRefs:
        - 7
        - 24
        - 25
        - 27
    - point: 有些交易所靠申报工具或人工流程就能先满足最低要求，因此只有等到检查或痛苦事件发生，才会真正买单。
      sourceRefs:
        - 6
        - 19
        - 46
competitors:
  - name: Eisen
    stage: 成长阶段
    wedge: 用 AI 驱动 escheat、划付和税务申报等合规运营，覆盖现代金融账户，包括加密资产。
    pricing: 定制定价 / 未公开
    strength: 目前最有力的证据，证明加密相邻的沉睡资产预防已经有真实客户牵引，而且打法偏运营优先。
    weaknessVsUs: 它仍覆盖更宽的金融服务；创业公司可以在加密原生总账事件、申领追回体验和滩头市场专属工作流设计上再往深处打。
    sourceRefs:
      - 1
      - 3
      - 5
  - name: Sovos
    stage: 现有厂商
    wedge: 面向企业的横向无人认领财产申报、尽调和托管式合规服务。
    pricing: 定制定价
    strength: 在多州申报能力和企业级税务/申报工作流里已有深厚信任。
    weaknessVsUs: 核心仍是申报广度，而不是账户变成可申报财产前的加密原生预防编排。
    sourceRefs:
      - 18
      - 19
      - 20
  - name: Kelmar
    stage: 现有厂商
    wedge: 州项目技术、咨询和无人认领财产专业服务。
    pricing: 顾问式 / 未公开
    strength: 在无人认领财产领域有很强的专业性，也具备项目级机构公信力。
    weaknessVsUs: 它并不是明显为沉睡加密余额和客户追回运营打造的、深嵌交易所流程的软件。
    sourceRefs:
      - 23
      - 25
  - name: Simple Escheat
    stage: 成长阶段
    wedge: 面向标准 escheat 合规的自助式和托管式申报软件。
    pricing: 按需求和复杂度分级定价
    strength: 证明了低端市场确实存在产品化替代方案，适合那些想更轻松完成申报、又不想上大型企业项目的持有人。
    weaknessVsUs: 它优化的是通用申报简化，不是加密特有的不活跃检测、清算逻辑或多渠道追回工作流。
    sourceRefs:
      - 46
      - 6
regulatoryTechnicalConstraints:
  - point: 持有人必须识别沉睡财产、尝试联系所有者，并按正确的州别流程和格式完成申报；这不是可做可不做的后台杂务。
    sourceRefs:
      - 6
      - 24
      - 25
      - 27
  - point: 各州对数字资产的处理在“先清算再汇缴”还是“实物划转”之间仍然分化，沉睡期和申报日历也不同。
    sourceRefs:
      - 17
      - 26
      - 28
      - 29
  - point: 托管型加密工作流比现金账户更难，因为活跃信号、钱包控制、估值和代币处理都更模糊。
    sourceRefs:
      - 3
      - 17
      - 22
validationSignals:
  - point: Eisen 称，其监控的资产接近 $16B、覆盖近 50 家机构，并在 2025 年让超过 31% 的高风险资产避免流入州政府托管。
    sourceRefs:
      - 2
  - point: Binance.US 在公开帮助中心里直接提醒用户，沉睡加密资产可能会被换成 USD，而且这种转换可能触发应税事件。
    sourceRefs:
      - 30
  - point: 特拉华、亚利桑那和弗吉尼亚都已有官方立法材料，说明数字资产正从理论边角问题变成明确的无人认领财产议题。
    sourceRefs:
      - 26
      - 28
      - 29
openQuestions:
  - 有多少面向美国用户的加密平台已经在运行正式的沉睡资产政策，而不是继续依赖外部律师和年度清理项目？
  - 对托管钱包、质押仓位和稳定币余额，领先州别究竟认哪些具体产品行为为“所有者活跃”？
  - 创业公司能否以独立控制台身份拿到预算，还是一开始就必须挂靠在申报/税务供应商或法律服务渠道上？
  - 在交易所真正把产品视为降工单工具前，到底要把多少申领追回工作流做进来？
