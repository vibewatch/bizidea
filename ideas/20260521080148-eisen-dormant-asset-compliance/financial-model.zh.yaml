scenarios:
  downside:
    description: 试点转正比预期晚 1 个申报周期，客户数最多只到 4 家，人工复核也把毛利率压在计划线下。
    y3RevenueK: 1800
    y3EbitdaK: -720
    cashLowPointK: -140
    keyAssumptionChanges:
      - Q4Y3 的 customersEop 只到 4，而不是 5，因为正式生产转化放慢了。
      - 综合年 ACV 更接近 $450K，因为附加工作流扩张来得更晚。
      - Y3 毛利率只能到 68%，因为异常处理依旧偏服务化。
  base:
    description: 基准情景在 Q4Y2 达到研究里的 5 家滩头客户，第 3 年收入主要来自这些客户的 ACV 扩张。
    y3RevenueK: 2500
    y3EbitdaK: -302.8
    cashLowPointK: 274.7
    keyAssumptionChanges:
      - 第 1 年签下 2 个付费试点，其中 1 个在 M11 转正，第 5 家正式生产客户在 Q4Y2 到位。
      - 综合正式生产 ACV 从约 $360K 逐步升向 $500K，靠按量收费和追回模块拉动。
      - 毛利率随着策略和实施手册标准化，从 Y1 的 55% 提升到 Y3 的 74%。
  upside:
    description: 试点转正更快、模块附着率更高，让收入超过计划，同时不需要更大的团队编制。
    y3RevenueK: 2900
    y3EbitdaK: 80
    cashLowPointK: 420
    keyAssumptionChanges:
      - 第 2 和第 3 个正式生产客户比基准情景早约 1 个季度落地。
      - 综合年 ACV 退出时高于 $550K，因为追回和基准模块附着更快。
      - 随着人工异常率比计划更早下滑，毛利率升到 76%。
sensitivity:
  - variable: ARPU
    downsideCase: 综合年 ACV 为 $450K。
    baseCase: 综合年 ACV 为 $500K。
    upsideCase: 综合年 ACV 为 $550K。
    y3RevenueImpactK: -250
    cashImpactK: -185
  - variable: CAC
    downsideCase: 每个客户 $225K，因为创始人主导销售始终难以标准化。
    baseCase: 每个客户 $175K。
    upsideCase: 通过合作伙伴转介绍，把每个客户 CAC 压到 $140K。
    y3RevenueImpactK: 0
    cashImpactK: -250
  - variable: churn
    downsideCase: 月客户流失率 1.8%。
    baseCase: 月客户流失率 1.2%。
    upsideCase: 月客户流失率 0.8%。
    y3RevenueImpactK: -150
    cashImpactK: -120
  - variable: 销售周期
    downsideCase: 试点转正式生产拉长到接近 12 个月。
    baseCase: 转化节奏按 A6 和 A7 的里程碑推进。
    upsideCase: 2 个试点约 6 个月内转正。
    y3RevenueImpactK: -450
    cashImpactK: -320
  - variable: 毛利率
    downsideCase: Y3 毛利率只有 68%，因为人工复核始终偏高。
    baseCase: Y3 毛利率 74%。
    upsideCase: 通过更干净的策略自动化，把 Y3 毛利率推到 76%。
    y3RevenueImpactK: 0
    cashImpactK: -150
  - variable: 招聘节奏
    downsideCase: 把第 2 个客户运营岗位和另 1 个工程岗位提前 2 个季度补上。
    baseCase: 到 Q4Y3 都维持 9 FTE 计划。
    upsideCase: 把第 2 个客户运营岗位推迟到 Q4Y3 再补。
    y3RevenueImpactK: 0
    cashImpactK: -170
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads[Target exchanges] --> Pilots[Paid pilots]
      Pilots --> Customers[Production customers]
      Customers --> Revenue[Platform + usage revenue]
      Revenue --> GrossProfit[Gross profit after workflow ops]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景通过让 5 家滩头交易所上线，并把每家 ACV 逐步拉向约 $500K，刚好做到研究里的 Y3 SOM $2.5M。
  - checkName: 必须做对的事
    finding: 付费试点必须在 1 个申报周期内转正，因为模型在 Y3 前只配了 1 个专职 GTM 岗位。
  - checkName: 模型失效条件
    finding: 如果转化拖到接近 12 个月，同时毛利率卡在 68% 左右，现金就会转负——这正是核心下行情景。
  - checkName: 下一轮融资证明点
    finding: 到了 Q4Y2，只要能同时看到 5 家正式生产客户、1 个完整申报周期证明点，以及没有服务化失控的伙伴来源销售线索，seed 轮故事就立得住。
sanityChecks:
  ruleOf40: Y3 growth 100.0% + EBITDA margin -12.1% = 87.9%
