slug: crypto-dormancy-recovery-os
date: '2026-05-21'
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-06
    unit: YYYY-MM
    source: '[BP date 2026-05-21] business-plan 日期后的首个完整运营月份。'
  - id: A2
    name: 期初现金与 pre-seed 规模
    value: '2300'
    unit: USDK
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M and runwayMonths 18] 基准情景按 $2.3M 的 pre-seed 计算，目标是撑到 Q4Y2 里程碑，并额外留出约 6 个月缓冲。'
  - id: A3
    name: 起始客户数（M1）
    value: '0'
    unit: logos
    source: '[BP milestones 0-12 months] 公司从零收入起步，得先卖出共创客户试点。'
  - id: A4
    name: 付费试点定价
    value: $90K over three months
    unit: USDK per pilot
    source: '[BP investorMemo.firstCustomer.initialContract $75k-$150k] 基准情景取中位数试点价格，对应一个申报周期工作流。'
  - id: A5
    name: 正式生产 ACV 梯度
    value: 初始正式生产 ACV 为 $360K，并随着按量收费和模块扩展逐步升向 $500K
    unit: USDK per customer year
    source: '[BP investorMemo.firstCustomer.initialContract + Research market.som] 模型保持在已给出的 $300k-$500k 年合同区间内，并与研究里的 $500k SOM 锚点对齐。'
  - id: A6
    name: Y1 客户爬坡
    value: 客户 1 从 M5 开始，客户 2 从 M8 开始，1 个试点在 M11 转成正式生产
    unit: timing
    source: '[BP milestones 0-12 months + BP experimentRoadmap paid pilot tied to filing cycle] 对应第 1 年拿下 2 个付费共创客户，并在年内完成 1 个 $300K+ 转化。'
  - id: A7
    name: Y2-Y3 客户爬坡
    value: Q1Y2 2 家客户，Q2Y2 3 家，Q3Y2 4 家，Q4Y2 5 家，之后到 Q4Y3 都维持 5 家
    unit: logos
    source: '[BP milestones 12-24 months + Research SOM] 基准情景在 Q4Y2 达到研究里的 5 家滩头客户，并让 Y3 的增长主要来自扩单，而不是继续加新客户。'
  - id: A8
    name: Y1 已实现收入节奏
    value: M5-M7 $30K，M8-M10 $60K，M11-M12 $55K
    unit: USDK per month
    source: '[A4 + A5] 这代表 1 个试点、然后 2 个试点、再到 1 个正式生产客户加 1 个试点的组合。'
  - id: A9
    name: Y2 已实现季度收入
    value: Q1Y2 $150K，Q2Y2 $240K，Q3Y2 $360K，Q4Y2 $500K
    unit: USDK per quarter
    source: '[BP milestones 12-24 months + BP businessModel.expansionLevers] 收入靠试点转正、第二工作流按量收费，以及受管余额扩大来放大。'
  - id: A10
    name: Y3 已实现季度收入
    value: Q1Y3 $560K，Q2Y3 $620K，Q3Y3 $650K，Q4Y3 $670K
    unit: USDK per quarter
    source: '[Research market.som $2.5M year-3 SOM] 第 3 年全年收入加总为研究中的 SOM，同时客户数保持在 5 家。'
  - id: A11
    name: 毛利率路径
    value: 55% Y1，67% Y2，74% Y3
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions] 基准情景开始时服务成分更重，Y2 超过目标，Y3 才体现出温和的软件杠杆。'
  - id: A12
    name: 稳态月流失率
    value: '1.2'
    unit: percent
    source: '[Startup-finance heuristic: sticky enterprise workflow software] 这个假设足够保守，能反映市场尚未完全验证前，买方集中的风险。'
  - id: A13
    name: 稳态 CAC
    value: '175'
    unit: USDK per customer
    source: '[BP gtm channels and funnelTargets + startup-finance heuristic] 创始人主导的企业销售、试点和伙伴协助实施，决定 CAC 合理地落在六位数。'
  - id: A14
    name: 全口径薪资区间
    value: 创始人 150；工程 210；合规产品 180；解决方案 165；客户运营 130；合作伙伴/GTM 165
    unit: annual USDK per FTE
    source: '[BP team + startup-finance heuristic] 这是美国 seed 阶段现金薪酬加工资附加成本后的假设，对应资深但仍精简的团队。'
  - id: A15
    name: 招聘顺序
    value: 创始人、创始工程和合规从一开始就在；解决方案岗 M4 入职；客户运营 M7 入职；GTM M12 入职；第 2 名工程师 M15 入职；第 2 名合规岗 M18 入职；第 2 名运营岗 M27 入职
    unit: timing
    source: '[BP team + BP strategicChoices.sequencingRationale] 产品和合规产能先到位，再谈更广的 GTM 扩张。'
  - id: A16
    name: 期末员工数
    value: 3 FTE Q1Y1，4 Q2Y1，5 Q3Y1，6 Q4Y1，8 Q4Y2，9 Q4Y3
    unit: FTE
    source: '[BP team + BP fundingAsk] 这让公司在 pre-seed 阶段保持足够精简，同时还能支撑实施和 1 个对外渠道岗位。'
  - id: A17
    name: 非薪资运营支出
    value: Y1 月度支出从 21K 升到 33K；Y2 季度非薪资支出分别为 90K、102K、117K、132K；Y3 分别为 141K、150K、162K、186K
    unit: USDK
    source: '[Startup-finance heuristic] 这里覆盖云资源、法务、安全、差旅和客户实施成本，但不额外养一整支服务团队。'
  - id: A18
    name: 现金流口径
    value: 期末现金 = 期初现金 + EBITDA
    unit: policy
    source: '[Startup-finance heuristic] 现阶段假设营运资本波动、capex、债务和递延收入影响都不大。'
  - id: A19
    name: 下行情景调整
    value: 正式生产爬坡比预期晚 1 个申报周期，只有 4 家客户在 Q4Y3 跑到完整规模，且 Y3 毛利率上限只有 68%
    unit: scenario inputs
    source: '[BP risks + Research sensitivityCases] 这一组变化对应文件里写明的 3 个风险：服务化加重、预算阻力和现有厂商压力。'
  - id: A20
    name: 上行情景调整
    value: 2 个试点更快转正，扩展模块把综合 ACV 拉到 $550K 以上，而且同一套 9 FTE 团队就能接住增长
    unit: scenario inputs
    source: '[BP milestones 24-36 months + BP businessModel.expansionLevers] 上行情景假设的是验证更快，而不是公司形态变了。'
