topRisks:
  - name: Incumbent bundling
    description: Field-service platforms and call-answering vendors could ship basic AI booking features once the category proves ROI.
    mitigation: Win first on yield logic across lead source, drive time, and technician fit, and build a benchmark dataset across branches that single-workflow incumbents do not own.
  - name: Booking-trust gap
    description: Operators may resist autonomous scheduling if the system overbooks, sends the wrong technician, or promises the wrong arrival window.
    mitigation: Start with approval-gated recommendations, show route and urgency reasoning on every booking, and prove accuracy in one metro before expanding autonomy.
  - name: Integration sprawl
    description: Home-service chains often run mixed telephony, CRM, and scheduling stacks across acquired branches, which can slow deployment and dilute early ROI.
    mitigation: Launch with the most common systems in PE-backed trades, support read-only fallback modes, and package the first deployment around one standardized branch cluster.
