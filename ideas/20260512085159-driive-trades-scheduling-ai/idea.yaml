problem: >-
  PE-backed HVAC and plumbing chains spend heavily on paid search, Google Local Services Ads, and brand marketing, yet a large share of the most urgent leads arrives when branch phones are lightly staffed or closed. When a night or weekend customer reaches voicemail, the marketing dollar is gone and a rival often wins the job because homeowners hire the first contractor who responds. Even when the lead is answered, dispatchers still book by rough availability instead of technician skill, job urgency, and real drive time, which creates excess windshield time and leaves trucks underfilled. Existing field-service software manages the schedule after a job is created, but it rarely decides how to convert the lead into the most profitable service slot.
targetUser:
  primary: VP of call center and dispatch or regional operations leader at a PE-backed U.S. HVAC and plumbing platform with 5-20 branches and 30-150 technicians
  secondary: Branch general manager responsible for call conversion, technician utilization, and same-day service revenue
  buyer: COO
startupThesis:
  nonObviousInsight: >-
    The valuable software layer is not an AI receptionist. It is a yield engine that sits between paid demand and truck
    capacity and decides which inbound jobs deserve an emergency slot, a next-day diagnostic, or no booking at all.
    What changed is that after-hours demand is now a material share of lead volume, homeowners buy on response speed,
    and AI can finally combine 24/7 intake with real drive-time and technician-availability data to allocate capacity in
    the moment the customer is ready to book.
  beachhead: >-
    PE-backed U.S. HVAC and plumbing groups operating 5-20 branches in one or two states, buying paid inbound leads,
    and still sending night and weekend overflow to voicemail, outsourced answering services, or dispatcher callbacks
  wedge: >-
    An after-hours booking yield engine that answers inbound calls, texts, and emails, qualifies urgency, prices the
    right visit window, and books the technician slot that maximizes close rate and route density
  whyNowCatalyst: >-
    Verified signals that half of inbound leads arrive off-hours, that homeowners overwhelmingly hire the first
    responder, and that drive-time-aware booking already reduces miles while raising appointments make this budget newly
    urgent for operator-led home-service chains.
  ventureScalePath: >-
    Start with after-hours repair and diagnostic booking, then expand into daytime rescheduling, maintenance membership
    fill, outbound recall campaigns, territory design, and eventually the full revenue-and-capacity control plane for
    multi-branch home-service operators.
solution: >-
  The product connects to the phone, inbox, CRM, and field-service schedule to score each inbound lead by job type,
  expected close rate, real drive time, technician skill fit, and branch capacity. It then answers immediately,
  proposes the best visit windows, books the job into a live board, and reshapes the next day's routes when a higher
  value call comes in after hours. Dispatch leaders get a queue that explains why a lead was booked same night, held for
  next day, or deprioritized because the route or margin math does not work. The first release is narrow on purpose:
  emergency and diagnostic booking for HVAC and plumbing branches with high night and weekend demand. Over time, the
  system becomes a yield layer that decides how every paid lead should consume scarce truck time across a multi-branch
  platform.
goToMarketSeed:
  firstCustomer: >-
    A PE-backed Sunbelt HVAC and plumbing platform with 8-15 branches, $25M-$100M in revenue, heavy Google LSA spend,
    and a centralized dispatch team that still loses night and weekend calls to voicemail or outsourced reception
  buyingTrigger: >-
    Peak-season call spikes, rising lead acquisition costs, or a new branch acquisition exposes that after-hours answer
    rates and truck utilization are lagging while competitors are winning urgent jobs faster
  currentAlternative: >-
    Voicemail, outsourced answering services, generic AI receptionists, and field-service scheduling tools such as
    ServiceTitan or Housecall Pro operated with manual dispatcher overrides
  switchingReason: >-
    The wedge does not just answer the phone; it books the highest-value jobs into the best live slots using drive time,
    urgency, and technician fit, so operators recover marketing spend and add revenue without hiring an overnight
    dispatch team
  pricingHypothesis: >-
    Base subscription priced per branch per month plus a usage fee for booked after-hours appointments or recovered lead
    revenue above a baseline
