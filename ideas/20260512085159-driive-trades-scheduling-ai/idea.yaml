differentiator: >-
  Call-answering products optimize pickup rate, while field-service platforms optimize work after a dispatcher books it.
  This product optimizes the moment in between: whether the lead should be booked, when, to which technician, and at
  what urgency tier based on both conversion and route economics. Its defensible asset is a booking graph that links
  transcript intent, zip code, job type, travel time, tech skill, close outcome, and downstream revenue by branch. That
  dataset becomes a proprietary yield model that is hard for a single-system incumbent or generic AI receptionist to
  replicate quickly.
