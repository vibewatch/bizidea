- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP date 2026-05-12] 建模为计划日期后的第一个完整月份'
- id: A2
  name: 客户单元
  value: 收益管理下的活跃门店
  unit: definition
  source: '[BP businessModel.unitOfValue]'
- id: A3
  name: 每门店混合年度 ARPU
  value: '18.0'
  unit: USDk per branch per year
  source: '[RS bottomUpSizingDrivers 每门店年度支出 $15K] + [BP gtm pricing 使用/绩效组件] 保守混合'
- id: A4
  name: 新客户收入确认
  value: 激活月或季度的完整期间的 50%
  unit: heuristic
  source: '初创公司财务经验法则（期中上线），来源名称：Financial Modeler 入职启发式'
- id: A5
  name: 第 1 年门店新增
  value: 0,0,0,2,0,2,0,2,2,2,2,2
  unit: 按月净新增门店
  source: '[BP milestones 0-12 months] 3 个付费试点和 2 个生产转化，分布在第一年'
- id: A6
  name: 第 2 年门店端点
  value: 24,36,48,60
  unit: 按季度期末门店数
  source: '[BP milestones 12-24 months] 在现有客户内扩展加第二批集群上线'
- id: A7
  name: 第 3 年门店端点
  value: 72,84,96,108
  unit: 按季度期末门店数
  source: '[BP milestones 24-36 months] 相对 [RS market.som 第 3 年 120 家门店情景] 保守'
- id: A8
  name: 毛利率爬坡
  value: Y1 45%-65%；Y2 67%-70%；Y3 70%-72%
  unit: gross margin percent
  source: '[BP businessModel targetGrossMarginPct 70]，叠加初创公司财务经验法则对早期高触达实施折扣的调整'
- id: A9
  name: 起始现金
  value: '2400.0'
  unit: USDk
  source: '[BP fundingAsk targetFundingRangeUsd $2-3M] 以融资完成后开账现金的中值'
- id: A10
  name: 薪资附加费
  value: 基本现金薪酬之上加 20%
  unit: percent
  source: '初创公司财务经验法则，来源名称：早期阶段 SaaS 综合薪酬经验法则'
- id: A11
  name: 各角色含税年薪
  value: 创始工程师 192；产品/运营 174；解决方案 150；应用 AI 210；GTM 负责人 168；实施/CS 132
  unit: USDk per FTE per year
  source: '[BP team roles] + 初创公司财务经验法则（种子期美国软件招聘）'
- id: A12
  name: 招聘顺序
  value: 创始工程师和产品/运营在第 0 月；解决方案在第 3 月；应用 AI 和 GTM 在第 6 月；实施/CS 在 Y2 Q4 前加入
  unit: timing
  source: '[BP team] 加 [BP strategicChoices.sequencingRationale] 推断爬坡'
- id: A13
  name: 非薪资运营支出
  value: 起始约 6K/月，到 Y3 Q4 含云服务、差旅、法务和销售项目的非薪资季度开销扩展至 81.5K
  unit: USDk
  source: '[BP operations] + 初创公司财务经验法则（企业试点部署开销）'
- id: A14
  name: 每门店 CAC
  value: '14.0'
  unit: USDk per branch
  source: '[BP gtm channels] 初期直接企业销售，受 [BP operatingAssumptions 合作伙伴渠道在首批获胜后降低 CAC] 调节'
- id: A15
  name: 月度流失率
  value: 1.2%
  unit: percent
  source: 初创公司财务经验法则（粘性但尚未验证的工作流软件）；高于成熟企业 SaaS 基准，因为信任和集成风险仍存在 [RS openQuestions]
- id: A16
  name: 融资里程碑与缓冲
  value: 24 个月资金跑道，证明可重复实施、3 个付费试点、2 个以上年度生产合同和初始渠道证据
  unit: months
  source: '[BP fundingAsk runwayMonths 18] + Financial Modeler 阶段合同要求的 6 个月缓冲规则'
- id: A17
  name: 现金流简化
  value: 现金近似 EBITDA，不建模债务、资本支出或营运资金波动
  unit: heuristic
  source: '初创公司财务经验法则，来源名称：早期阶段 SaaS 收入前规划现金简化'
