modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Leads --> QualifiedPilots
      QualifiedPilots --> ActiveBranches
      ActiveBranches --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基础情景由门店数扩张驱动——从 Y1 末 14 家扩展至 Y3 末 108 家，混合年度门店 ARPU $18K。
- checkName: 必须做对的事
  finding: 首两个集成必须足够快地实现可重复，让毛利率在试点转化为生产集群的同时达到约 70%。
- checkName: 模型失效条件
  finding: 若销售周期延伸至 9 个月或 ARPU 停留在 $15K 门店基准，公司在下一个证明点之前可能需要追加资本。
- checkName: 下轮融资证明
  finding: 下轮融资的依据是展示 3 个付费试点、2 个以上年度生产胜出，以及部署时间向 60 天以内手册收敛。
sanityChecks:
  ruleOf40: 第 3 年增长率 131.7% + EBITDA 利润率 -16.1% = 115.7%
  burnMultiple: 约 Y2 烧钱倍数 0.9x，Y3 烧钱倍数 0.3x（使用年末 ARR 扩张计算）。
  revenuePerFte: "$252.0K（Y3，SaaS 基准 $200–400K）"
  flags:
  - 基础情景 Y3 仍略微 EBITDA 负，下轮融资可能在完全盈利之前启动。
  - 营收集中风险显著——建模中的 108 家门店可能集中在少数 PE 旗下平台内。
  - 毛利率假设首批集成在初始试点后不再表现为定制服务。
  - CAC 和流失率按门店建模，但购买发生在平台层面——单位经济模型是门店当量经验值，而非观察到的同期群数据。
