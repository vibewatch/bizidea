scenarios:
  downside:
    description: 现有厂商重叠和更长的试点到生产周期将 ARPU 压制在门店软件基准，推迟集群上线。
    y3RevenueK: 1098.0
    y3EbitdaK: -470.0
    cashLowPointK: 315.0
    keyAssumptionChanges:
    - 年度 ARPU 降至每门店 $15K，几乎没有绩效费提振。
    - 第 3 年末约 84 家门店，而非 108 家，因付费试点需约 9 个月才能转化。
    - 毛利率上限约 68%，因集成在更长时间内保持服务密集型。
  base:
    description: 三个付费试点产生可重复的上线动作，现有平台随后在第三年逐门店扩张。
    y3RevenueK: 1512.0
    y3EbitdaK: -242.8
    cashLowPointK: 720.5
    keyAssumptionChanges:
    - 混合年度 ARPU 为每门店 $18K，含适度绩效费。
    - 门店数到 Y3 Q4 达到 108，仍低于研究报告中的 120 家 SOM 情景。
    - 毛利率在首批集成标准化后达到 70% 目标。
  upside:
    description: 一个渠道合作伙伴跑通，门店扩张速度加快，使用量挂钩定价拉高实现 ARPU。
    y3RevenueK: 1824.0
    y3EbitdaK: -70.0
    cashLowPointK: 905.0
    keyAssumptionChanges:
    - PE 运营合伙人或生态系统转介渠道在第二年贡献合格管道。
    - 随着已收回预约费落地，年度 ARPU 升至每门店 $20K。
    - 第 3 年末约 120 家门店，毛利率接近 74%。
