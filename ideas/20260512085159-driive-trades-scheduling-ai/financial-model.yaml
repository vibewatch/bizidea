  name: Funding milestone and buffer
  value: 24 months of runway to prove repeatable implementation, 3 paid pilots, 2+ annual production contracts, and initial channel evidence
  unit: months
  source: '[BP fundingAsk runwayMonths 18] + required 6-month buffer rule from Financial Modeler stage contract'
- id: A17
  name: Cash flow simplification
  value: Cash approximates EBITDA with no debt, capex, or working-capital swing modeled
