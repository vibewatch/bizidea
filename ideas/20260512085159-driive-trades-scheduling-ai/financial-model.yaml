modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> QualifiedPilots
      QualifiedPilots --> ActiveBranches
      ActiveBranches --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: The base case is driven by branch count expansion from 14 at Y1 exit to 108 at Y3 exit on an $18K blended annual branch ARPU.
- checkName: Must go right
  finding: The first two integrations must become repeatable fast enough to let gross margin reach ~70% while pilots convert into production clusters.
- checkName: Model breaks if
  finding: If sales cycles stretch toward nine months or ARPU stays at the $15K branch benchmark, the company likely needs more capital before the next proof point.
- checkName: Next-round proof
  finding: The next financing is justified by showing 3 paid pilots, 2+ annual production wins, and falling deployment time toward a sub-60-day rollout playbook.
sanityChecks:
  ruleOf40: Y3 growth 131.7% + EBITDA margin -16.1% = 115.7%
  burnMultiple: Approx. Y2 burn multiple 0.9x and Y3 burn multiple 0.3x using end-of-year ARR expansion.
  revenuePerFte: "$252.0K Y3 (benchmark $200\u2013400K SaaS)"
  flags:
  - Base case still exits Y3 slightly EBITDA negative, so the next round is likely raised before full profitability.
  - Revenue concentration risk is material because 108 modeled branches likely sit inside a small number of PE-backed platforms.
  - Gross margin assumes the first integration set stops behaving like custom services after the initial pilots.
  - CAC and churn are modeled per branch even though buying happens at platform level, so unit economics are branch-equivalent heuristics rather than observed cohort data.
