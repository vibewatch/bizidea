  - point: PE 运营合伙人、家庭服务并购顾问和投资组合运营团队是有影响力的非软件合作伙伴，
      因为他们定义了收购后哪些派工和呼叫中心 KPI 才重要。
    sourceRefs:
    - 15
    - 17
  dataMoats:
  - point: 若系统将通话意图、下班后时间、邮政编码、技术人员技能、行驶时间、预约时段、成交结果和跨门店下游营收关联起来，可形成可防御的图谱。
    sourceRefs:
    - 1
    - 25
    - 39
  - point: 跨门店关于"何时应当晚服务、何时应次日诊断"的反馈，可能比通用接待数据更有价值——因为它沉淀为运力分配逻辑。
    sourceRefs:
    - 2
