    - 37
  - case: 大多数下班后来电被分诊为次日预约而非真正的紧急派工
    impact: 切口仍然成立，但产品看起来更像转化和队列优先排序软件，而非实时运力交易引擎。
    sourceRefs:
    - 53
    - 60
  - case: PE 并购节奏放缓或门店级自主权仍高
    impact: 销售周期碎片化，可达买家池变得更接近 SMB，降低平均合同价值和扩张速度。
    sourceRefs:
    - 15
    - 17
  validationPlan:
  - priority: high
    question: 下班后 HVAC 与管道来电中，实际有多大比例值得当晚派工，而非次日预约？
    evidenceToGather: 从 3-5 个门店组提取 60-90 天的下班后通话记录，按紧急程度和实现营收标注结果，与调度员当时的实际决策对比。
  - priority: high
    question: 产品能否无需大量专业服务就回写至 ServiceTitan、Housecall Pro、Workiz 或 FieldEdge？
    evidenceToGather: 与 2 个现有厂商的集成负责人进行技术 discovery，并原型化排班看板、技术人员状态和预约备注的读写同步。
  - priority: medium
    question: 若接听服务厂商已以低价承诺 24/7 覆盖，COO 还会为新增层付费吗？
    evidenceToGather: 采访 10 位使用 AnswerForce、Smith.ai 或类似厂商的运营商，问他们在来电接听之后仍无法优化什么。
  - priority: medium
    question: "哪个门店级指标会解锁扩张：已收回营收、更少里程，还是每技术人员日预约数？"
    evidenceToGather: 与一位平台 COO 和一位调度负责人共同定义试点计分卡，然后用历史数据回测这些指标的表现。
