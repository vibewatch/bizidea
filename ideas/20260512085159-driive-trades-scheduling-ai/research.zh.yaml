openQuestions:
- 仍依赖语音信箱、外包接听或下班后人工回拨的 PE 旗下 5-20 家门店 HVAC 与管道平台究竟有多少？
- 下班后来电中有多大比例应预约为次日诊断，而非消耗溢价的当晚运力？
