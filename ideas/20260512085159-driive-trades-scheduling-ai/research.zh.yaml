competitors:
- name: ServiceTitan
  stage: incumbent
  wedge: 面向行业的企业级 FSM，含派工、来电预约、Scheduling Pro 和 AI 联络中心附加产品。
  pricing: 按技术人员自定义套餐，另有 Pro 产品附加费。
  strength: 深厚的安装基础、企业/PE 定位，以及从预约到现场执行的宽泛工作流所有权。
  weaknessVsUs: 套件广度强，但不够明确聚焦于跨多门店的下班后利润感知收益决策。
  sourceRefs:
  - 24
  - 25
  - 27
- name: Housecall Pro
  stage: scale-up
  wedge: SMB 友好的现场服务平台，整合排班、派工、在线预约和语音工具。
  pricing: 公开计划起价 $59/月。
  strength: 易于采用、定价透明，对成长中的服务企业覆盖宽泛的工单管理功能。
  weaknessVsUs: 不够针对 PE 旗下多门店收益管控和跨门店路线密度优化。
  sourceRefs:
  - 29
  - 30
  - 31
- name: Workiz
  stage: scale-up
  wedge: 电话优先的 FSM，含派工、在线预约和错过来电捕获。
  pricing: 三用户按年计费起价 $225/月。
  strength: 电话加派工工作流的整合紧密度优于多数 SMB 同类产品。
  weaknessVsUs: 更像通用服务店的运营系统，而非专为 PE 平台打造的下班后收益引擎。
  sourceRefs:
  - 34
  - 35
  - 37
- name: FieldEdge
  stage: incumbent
  wedge: 面向 HVAC/管道的排班和派工软件，服务多车辆服务公司。
  pricing: 报价制 Select 和 Premier 套餐。
  strength: 行业专属性强，跨业务单元和地点协调技术人员、车辆和排班。
  weaknessVsUs: 在工单存在后优化派工看板，而非在下班后决策是否及如何消耗稀缺运力。
  sourceRefs:
  - 38
  - 39
- name: Smith.ai
  stage: scale-up
  wedge: 面向家庭服务企业的 AI 与人工接听覆盖。
  pricing: AI 接待起价 $95/月，人工虚拟接待起价 $300/月。
  strength: 相比错过来电有清晰 ROI，且无需雇用夜班员工即可实现可扩展的 24/7 覆盖。
  weaknessVsUs: 覆盖来电处理，但不拥有门店级路线经济性、技术人员匹配或实时时段收益优化。
  sourceRefs:
  - 53
  - 56
regulatoryTechnicalConstraints:
- point: 任何 AI 或预录外呼跟进及部分自动来电流程必须考虑 TCPA 同意要求。
  sourceRefs:
  - 21
- point: 录制通话需要州感知同意处理，因为美国规则在单方同意和全方同意框架之间存在差异。
  sourceRefs:
  - 62
- point: HVAC 服务工作流仍涉及 EPA 第 608 条冷媒规定，因此预约引擎不能将所有技术人员运力视为可互换。
  sourceRefs:
  - 19
- point: 更多当晚派工会改变劳工经济性，因为超过每周 40 小时的加班触发在法律上仍然相关。
  sourceRefs:
  - 23
