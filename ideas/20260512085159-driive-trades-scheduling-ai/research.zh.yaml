bottomUpSizingDrivers:
- driver: 可寻址机构总数
  value: 111.2K 个 NAICS 238220 机构（VantaInsights），与 First Research 约 105K 美国机构数据交叉验证
  source: '[8][4]'
- driver: 工作流劳动密集度
  value: 当前美国劳动力中 441K 名 HVAC 技工/安装工，加 504.5K 名管道工、管道装配工和蒸汽安装工
  source: '[10][12]'
- driver: 滩头门店过滤
  value: 假设 4% 的机构属于 PE 旗下、5-20 家门店、集中调度的集团 = 约 4,440 家门店
  source: '[15][17] + calc'
- driver: 每门店年度支出
  value: 基于现有 FSM、电话和接听服务基准的 $15K ARR 当量估算
  source: '[24][29][34][38][41][56] + calc'
