competitors:
- name: ServiceTitan
  stage: incumbent
  wedge: Enterprise-grade FSM for the trades with dispatch, call booking, Scheduling Pro, and AI contact-center add-ons.
  pricing: Custom per-technician package with additional Pro products.
  strength: Deep installed base, enterprise/PE positioning, and broad workflow ownership from booking through field execution.
  weaknessVsUs: Strong suite breadth, but less explicitly centered on after-hours margin-aware yield decisions across multiple branches.
  sourceRefs:
  - 24
  - 25
  - 27
- name: Housecall Pro
  stage: scale-up
  wedge: SMB-friendly field-service platform combining scheduling, dispatch, online booking, and voice tools.
  pricing: Starts at $59/month on published plans.
  strength: Easy adoption, transparent pricing, and broad job-management coverage for growing service businesses.
  weaknessVsUs: Less tailored to PE-backed multi-branch yield control and cross-branch route-density optimization.
  sourceRefs:
  - 29
  - 30
  - 31
- name: Workiz
  stage: scale-up
  wedge: Phone-forward FSM with dispatching, online booking, and missed-call capture.
  pricing: Starts at $225/month annually for three users.
  strength: Tighter telephony plus dispatch workflow than many SMB peers.
  weaknessVsUs: Closer to an operating system for general service shops than a specialized after-hours yield engine for PE platforms.
  sourceRefs:
  - 34
  - 35
  - 37
- name: FieldEdge
  stage: incumbent
  wedge: HVAC/plumbing-focused scheduling and dispatch software for multi-truck service companies.
  pricing: Quote-based Select and Premier plans.
  strength: Trade specificity and coordination of technicians, trucks, and schedules across business units and locations.
  weaknessVsUs: Optimizes the dispatch board after the job exists more than the off-hours decision of whether and how to consume scarce capacity.
  sourceRefs:
  - 38
  - 39
- name: Smith.ai
  stage: scale-up
  wedge: AI and human answering coverage for home-service businesses.
  pricing: Starts at $95/month for AI receptionist and $300/month for human virtual receptionist plans.
  strength: Clear ROI against missed calls and scalable 24/7 coverage without hiring overnight staff.
  weaknessVsUs: Covers call handling but does not appear to own branch-level route economics, technician fit, or live slot yield optimization.
  sourceRefs:
  - 53
  - 56
regulatoryTechnicalConstraints:
- point: Any AI or prerecorded outbound follow-up and some automated call flows must account for TCPA consent requirements.
  sourceRefs:
