- point: Recorded calls need state-aware consent handling because U.S. rules vary between one-party and all-party consent frameworks.
  sourceRefs:
  - 62
- point: HVAC service workflows still intersect EPA Section 608 refrigerant rules, so a booking engine cannot treat all technician capacity as interchangeable.
  sourceRefs:
  - 19
- point: More same-night dispatching can change labor economics because overtime triggers beyond a forty-hour workweek remain legally relevant.
  sourceRefs:
  - 23
