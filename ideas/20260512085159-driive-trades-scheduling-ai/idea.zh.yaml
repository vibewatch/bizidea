    大量 Google LSA 投入，以及一支集中调度团队——但仍在将夜间和周末来电
    导入语音信箱或外包接待
  buyingTrigger: >-
    旺季来电量激增、线索获取成本上涨，或新门店收购暴露出下班后应答率
    和车辆利用率落后、竞争对手正在更快抢走紧急工单的问题
  currentAlternative: >-
    语音信箱、外包接听服务、通用 AI 接待员，以及依赖人工调度员手动覆盖的
    现场服务调度工具，如 ServiceTitan 或 Housecall Pro
  switchingReason: >-
    这个切口不只是接电话——它用行驶时间、紧急程度和技术人员匹配度
    将最高价值工单锁进最优实时时段；运营商由此收回营销投入、新增营收，
    无需雇用夜班调度团队
  pricingHypothesis: >-
    按门店按月订阅的基础费，加上已预约的下班后预约或超出基准的
    已收回线索营收的使用费
