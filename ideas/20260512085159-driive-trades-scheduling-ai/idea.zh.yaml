topRisks:
  - name: 现有厂商捆绑销售
    description: 一旦该品类被验证出 ROI，现场服务平台和来电接听厂商可能会推出基础 AI 预约功能。
    mitigation: 先靠跨线索来源、行驶时间和技术人员匹配的收益逻辑立足，并构建横跨多门店的基准数据集——单一工作流现有厂商不具备这些资产。
  - name: 预约信任缺口
    description: 若系统出现过度预约、派错技术人员或承诺错误到达时间窗口，运营商可能抵制自主排班。
    mitigation: 从需审批的推荐建议起步，在每条预约上呈现路线和紧急程度的判断依据，并先在一个城市证明准确率，再扩大自主权。
  - name: 集成蔓延
    description: 家庭服务连锁企业在并购门店中往往运行不同的电话、CRM 和排班系统，这会拖慢部署进度、稀释早期 ROI。
    mitigation: 先从 PE 旗下行业中最常见的系统切入，支持只读回退模式，并将首次部署限定在一个标准化门店集群。
