problem: >-
  PE 旗下的 HVAC 与管道连锁企业在付费搜索、Google Local Services Ads 和品牌营销上投入大量资金，
  但相当比例的最紧迫线索恰恰在门店电话人手不足或停止接听时涌入。夜间或周末客户打进语音信箱，
  营销费用就此打水漂，竞争对手往往率先响应、抢走工单——因为房主倾向于雇用第一个回应的承包商。
  即便线索接通，调度员仍按大致档期分配工单，而非综合考量技术人员技能、工单紧急程度和真实行驶时间，
  导致路上时间过多、车辆利用率低下。现有现场服务软件在工单生成后才管理排班，
  鲜少决策如何将线索转化为利润最高的服务时段。
targetUser:
  primary: PE 旗下美国 HVAC 与管道平台（5-20 家门店、30-150 名技术人员）的呼叫中心与调度副总裁，或区域运营负责人
  secondary: 负责来电转化率、技术人员利用率和当日服务营收的门店总经理
  buyer: COO
startupThesis:
  nonObviousInsight: >-
    最有价值的软件层不是 AI 接待员，而是坐在付费需求和车辆运力之间的收益引擎——
    它决定哪些入站工单值得紧急派工、哪些适合次日诊断，哪些根本不该预约。
    变局在于：下班后需求已占线索总量的相当份额，房主依速度成交，
    而 AI 终于能将 24/7 接单与实时行驶时间及技术人员档期数据结合，
    在客户准备下单的瞬间完成运力分配。
  beachhead: >-
    在一两个州运营 5-20 家门店、购买付费入站线索、仍将夜间和周末溢出来电
    导入语音信箱、外包接听服务或调度员回拨的 PE 旗下美国 HVAC 与管道集团
  wedge: >-
    一个下班后预约收益引擎——接听入站电话、短信和邮件，判断紧急程度，
    匹配最合适的上门时段，并将最能提升成交率和路线密度的技术人员时段锁定预约
  whyNowCatalyst: >-
    已验证的信号表明：半数入站线索在非工作时间产生、房主绝大多数选择首位响应者、
    行驶时间感知预约已实现里程下降同时预约量上升——这让相关预算对运营商主导的
    家庭服务连锁企业变得迫切。
  ventureScalePath: >-
    从下班后维修和诊断预约起步，再扩展至日间重新排班、维保会员时段填充、
    外呼召回活动、区域设计，最终演进为多门店家庭服务运营商的
    全面营收与运力管控平台。
solution: >-
  产品接入电话、收件箱、CRM 和现场服务排班系统，按工单类型、预期成交率、
  真实行驶时间、技术人员技能匹配度和门店运力对每条入站线索打分。
  随即立刻响应，推荐最优上门时段，将工单写入实时看板，并在下班后接到
  更高价值来电时重排次日路线。调度负责人看到的队列会清楚说明：
  某线索为何当晚就预约、为何押后次日、为何因路线或利润测算不合格而降优先级。
  首期产品刻意保持窄范围：专攻夜间和周末需求旺盛的 HVAC 与管道门店的
  紧急与诊断预约。随时间推移，系统将演变为收益层，
  决定每条付费线索如何跨多门店平台消耗有限的车辆时间。
goToMarketSeed:
  firstCustomer: >-
