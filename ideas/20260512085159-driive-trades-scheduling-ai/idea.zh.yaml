    successMetric: 下班后线索预约转化率提升，以及从此前错过的来电中收回的已预约营收增加
  - job: 当次日排班碎片化时，帮助门店总经理按行驶时间、技能匹配和紧急程度重新平衡工单，让每辆车以更少的路上时间完成更多高利润预约。
