competitors:
  - name: Wirestock
    stage: scale-up
    wedge: 多模态创作者网络，为 AI 实验室提供现货和定制数据集。
    pricing: 企业报价，公开定价未披露。
    strength: 有力证明了创作者可以被大规模路由至付费多模态数据任务。
    weaknessVsUs: 对电商专属工作流、SKU 状态简报和零售商系统集成的关注度较低。
    sourceRefs: [1, 2, 3]
  - name: Appen
    stage: incumbent
    wedge: 面向前沿和实体 AI 项目的大规模全球数据采集与多模态标注。
    pricing: 定制企业报价。
    strength: 三十年运营历史，跨模态和地区的广泛覆盖。
    weaknessVsUs: 通用数据服务定位让电商专属采集和版权工作流显得服务化过重。
    sourceRefs: [4, 5]
  - name: Labelbox
    stage: scale-up
    wedge: 数据与评估操作系统，含 RL 数据工厂和大型专家网络。
    pricing: 定制企业报价。
    strength: 工作流软件层强劲，在高级 AI 团队中深具公信力。
    weaknessVsUs: 更擅长评估和专家判断，而非为定制商品素材进行实体创作者路由。
    sourceRefs: [6, 7]
  - name: Getty Images
    stage: incumbent
    wedge: 面向企业内容团队的授权创意库和有赔偿保障的生成式 AI 工具。
    pricing: 25 次生成 $49；100 次生成 $149；企业定制方案另议。
    strength: 受信任的版权立场、强大的赔偿保障和现有企业关系。
    weaknessVsUs: 默认走图库和生成工作流，不承担简报到采集的运营所有权。
    sourceRefs: [8]
  - name: Syte
    stage: scale-up
    wedge: 视觉发现、推荐和 AI 标签，从现有目录资产提升电商表现。
    pricing: 定制企业报价。
    strength: 与电商发现团队直接相关，能从现有图像中快速创造价值。
    weaknessVsUs: 优化已有资产，而非创建缺失资产和溯源记录。
    sourceRefs: [9]
