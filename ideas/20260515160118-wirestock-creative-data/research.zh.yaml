openQuestions:
  - 目标预算有多少由应用 AI 团队控制，有多少由创意运营或电商商品运营负责人控制？
  - 目标电商数据缺口中，有多少比例可通过新采集解决，有多少可通过合成增强或 3D 推导解决？
  - 企业买家要求用于模型训练的版权语言超出标准内容许可的频率有多高？
  - 创作者资质认证、简报制作和质检能否足够模板化，以在规模化时保持软件级别的利润率？
