  fiveForces:
    supplierPower:
      score: 3
      rationale: 创作者供应较为分散，但具备多模态能力和溯源就绪工具的合格创作者仍有足够话语权，防止纯商品化采购。
      sourceRefs: [2, 4, 25]
    buyerPower:
      score: 4
      rationale: 目标客户集中在拥有采购杠杆和多家替代供应商的大型零售商和市场平台。
      sourceRefs: [19, 18, 15]
    threatOfEntrants:
      score: 3
      rationale: 新进入者可以搭建创作者网络和工作流软件，但企业信任、标准合规和质检规范都提高了实际门槛。
      sourceRefs: [35, 37, 38]
    threatOfSubstitutes:
      score: 4
      rationale: 买家在采用新的委托操作系统之前，可退回至图库、现有目录优化、合成数据或通用数据运营供应商。
      sourceRefs: [8, 9, 44]
    competitiveRivalry:
      score: 4
      rationale: 该领域已有经过验证的专家、大型数据供应商和电商相邻替代品，共同争夺同一企业 AI 预算。
      sourceRefs: [1, 4, 6, 8, 28]
  pestle:
    - factor: political
      impact: neutral
      point: 跨司法管辖区的 AI 治理正朝着更多披露、可追溯性和问责制方向收敛，而非相反。
      sourceRefs: [30, 39, 42]
    - factor: economic
      impact: positive
      point: 高退货成本和不断增长的零售 AI 支出，形成了提升商品数据质量和上线效率的预算压力。
      sourceRefs: [15, 21]
    - factor: social
      impact: positive
      point: 消费者对 AI 辅助购物和更丰富、更个性化的商品发现体验的期待日益提升。
      sourceRefs: [10, 28]
    - factor: technological
      impact: positive
      point: Google、Apple 和现代电商技术栈让结构化图像、3D 和 AR 在运营上比以往更加重要。
      sourceRefs: [12, 24, 25]
    - factor: legal
      impact: negative
      point: 版权、TDM 和数据合法性的不确定性，提高了证明训练和评估资产获取方式的举证负担。
      sourceRefs: [31, 32, 33]
    - factor: environmental
      impact: positive
      point: 更好的合身性和更丰富的商品素材可减少高摩擦品类中不必要的退货和重复拍摄。
      sourceRefs: [15, 27]
  adoptionFrictionMatrix:
    - friction: AI 训练版权和溯源的法律审查
      severity: high
      affectedBuyer: 法务和合规利益相关方
      mitigation: 随每份数据集包一并交付机器可读版权条款、溯源记录和 TDM 政策兼容的元数据。
      sourceRefs: [30, 31, 34, 35]
    - friction: 企业推广前的 ROI 证明
      severity: high
      affectedBuyer: 数字产品副总裁
      mitigation: 从一个高退货率或高搜索失败率的品类切入，基准测试转化和退货率变化。
      sourceRefs: [15, 26, 27]
    - friction: 将简报整合进现有模型质检工作流
      severity: medium
      affectedBuyer: 应用 AI 总监
      mitigation: 将简报直接与搜索质检或模型错误桶挂钩，而非创建并行的创意流程。
      sourceRefs: [14, 28]
    - friction: 管理文件格式和目录兼容性
      severity: medium
      affectedBuyer: 创意运营负责人
      mitigation: 以符合 Merchant Center 规范的图像加 GLB 和 USDZ 包为标准交付格式，供下游部署。
      sourceRefs: [13, 24, 25]
