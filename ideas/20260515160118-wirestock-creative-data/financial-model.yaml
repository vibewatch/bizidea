modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      FounderOutbound --> PaidPilots
      PartnerReferrals --> PaidPilots
      PaidPilots --> ActivePrograms
      ActivePrograms --> ExpansionRevenue
      ExpansionRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: Revenue engine
  finding: The base case gets to 15 active paid workflow programs by Q4Y3, with most Y3 revenue coming from converting early pilots and expanding successful retail accounts into more categories and modalities.
- checkName: Must go right
  finding: Pilot-to-production conversion must stay near the 60%+ BP target and at least half of production accounts must expand, or blended ARPU will miss the $300K Y3 assumption.
- checkName: Model breaks if
  finding: If budget ownership stays fragmented or manual creator QA holds gross margin below 68%, downside cash falls toward roughly $470K before seed-round proof is in hand.
- checkName: Next-round proof
  finding: A credible seed story is exiting Y2 with 8 active paid customers, 3 expansion wins, one partner-sourced pipeline, and Q4 gross margin around 70%.
sanityChecks:
  ruleOf40: Y3 growth 187.38% + EBITDA margin 14.9% = 202.28%
  burnMultiple: Y2 burn multiple 0.34x, turning to -0.19x in Y3 on net new ARR as EBITDA becomes positive.
  revenuePerFte: $307.95K Y3 on 11 exit FTE (benchmark $200-400K SaaS)
  flags:
  - The model assumes active paid customers are the right revenue unit; if buyers only fund narrow project work rather than recurring workflow programs, revenue will be lumpier than shown.
  - Y2 still depends on converting early pilots into $180K+ annual production contracts; if fewer than 2 of the first 5 pilots convert, the pre-seed likely needs to stretch or the next round arrives earlier.
  - Gross margin only clears the 70% target in Y3, so any failure to templatize creator ops or rights packaging would pull the company back toward agency-like economics.
  - Budget ownership remains the biggest commercial unknown from both BP and research, which means ARPU and sales-cycle assumptions are more fragile than headcount assumptions.
