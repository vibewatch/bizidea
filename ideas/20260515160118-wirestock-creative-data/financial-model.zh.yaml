modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      FounderOutbound --> PaidPilots
      PartnerReferrals --> PaidPilots
      PaidPilots --> ActivePrograms
      ActivePrograms --> ExpansionRevenue
      ExpansionRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景在 Q4Y3 达到 15 个活跃付费工作流项目，Y3 大部分收入来自转换早期试点并将成功零售商账户扩展至更多品类和模态。
- checkName: 必须做对的事
  finding: 试点到生产的转化率须保持在 BP 目标 60%+ 附近，且至少一半生产账户必须扩展，否则混合 ARPU 将错失 Y3 假设的 $300K。
- checkName: 模型崩溃条件
  finding: 若预算归属权仍分散，或手动创作者质检将毛利率压低至 68% 以下，下行情景现金将在种子轮证明出炉前降至约 $470K。
- checkName: 下一轮融资证明
  finding: 可信的种子故事是：以 8 个活跃付费客户、3 次扩展胜利、一个合作伙伴来源管道和 Q4 毛利率约 70% 退出 Y2。
sanityChecks:
  ruleOf40: Y3 增长率 187.38% + EBITDA 利润率 14.9% = 202.28%
  burnMultiple: Y2 烧钱倍数 0.34x，随着 EBITDA 转正，Y3 净新 ARR 对应值为 -0.19x。
  revenuePerFte: Y3 以 11 名退出员工计算为 $307.95K（SaaS 基准 $200-400K）
  flags:
  - 模型假设活跃付费客户是正确的收入单位；若买家仅资助窄口项目工作而非循环工作流项目，收入将比模型显示的更不稳定。
  - Y2 仍依赖于将早期试点转换为 $180K+ 年度生产合同；若前 5 个试点中转化不足 2 个，种子前可能需要拉长，或下一轮将更早到来。
  - 毛利率仅在 Y3 达到 70% 目标，因此任何创作者运营或版权打包模板化的失败都会将公司拉回代理商式经济结构。
  - 预算归属权仍是 BP 和研究报告中最大的商业未知数，这意味着 ARPU 和销售周期假设比人员假设更脆弱。
