scenarios:
  downside:
    description: 预算整合耗时更长，合成或图库替代品赢得更多早期交易，创作者运营手动化持续更长时间。
    y3RevenueK: 2550.0
    y3EbitdaK: -180.0
    cashLowPointK: 470.0
    keyAssumptionChanges:
    - 第 3 年末活跃付费客户约 12 家而非 15 家，因为试点到生产的转化率低于 BP 目标的 60%。
    - 混合年度 ARPU 上限约 $260K 而非 $300K，因为预算在 AI、创意和电商团队之间仍分散。
    - 毛利率退出约 68%，因为手动创作者采购和质检仍高于 BP 的模板化阈值。
  base:
    description: 公司拿下三个付费试点，将最优账户转换为年度生产，并通过在现有零售商内有节奏地扩展品类和模态来复利收入。
    y3RevenueK: 3387.5
    y3EbitdaK: 504.81
    cashLowPointK: 989.51
    keyAssumptionChanges:
    - 新付费客户从 Q4Y1 的 3 家增长至 Q4Y2 的 8 家和 Q4Y3 的 15 家，与 BP 和研究 SOM 路径一致。
    - 混合年度 ARPU 从试点密集的 Y1 的 $95K 升至 Y3 的 $300K，随着更多账户转换和扩展。
    - 毛利率仅在 Y3 创作者路由、简报模板和溯源打包可重复后才跨越 70%。
  upside:
    description: 合作伙伴渠道更早生效，更多生产账户实现第二品类扩展，自动化更快削减交付人工成本而无需更大团队。
    y3RevenueK: 3950.0
    y3EbitdaK: 870.0
    cashLowPointK: 1100.0
    keyAssumptionChanges:
    - 第 3 年末活跃付费客户约 17 家，因为合作伙伴来源试点和创始人主导成交率更早提升。
    - 混合年度 ARPU 达约 $320K，因为视频和 3D 包在扩展账户中更早落地。
    - 毛利率退出约 74%，因为简报模板和创作者评分比基准情景更快降低每份简报的手动运营时间。
