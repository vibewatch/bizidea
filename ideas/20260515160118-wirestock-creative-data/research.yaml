competitors:
  - name: Wirestock
    stage: scale-up
    wedge: Multimodal creator network supplying off-the-shelf and custom datasets to AI labs.
    pricing: Enterprise quote; public pricing not disclosed.
    strength: Strong proof that creators can be routed into paid multimodal data jobs at scale.
    weaknessVsUs: Less focused on ecommerce-specific workflows, SKU-state briefs, and retailer system integration.
    sourceRefs: [1, 2, 3]
  - name: Appen
    stage: incumbent
    wedge: Large-scale global data collection and multimodal annotation for frontier and physical AI programs.
    pricing: Custom enterprise quote.
    strength: Thirty-year operating history and broad coverage across modalities and geographies.
    weaknessVsUs: Generalist data services positioning can make commerce-specific capture and rights workflows feel services-heavy.
    sourceRefs: [4, 5]
  - name: Labelbox
    stage: scale-up
    wedge: Data and evaluation OS with RL data factory plus a large expert network.
    pricing: Custom enterprise quote.
    strength: Strong workflow software layer and deep credibility with advanced AI teams.
    weaknessVsUs: Better at evaluation and expert judgment than physical creator routing for custom product media.
    sourceRefs: [6, 7]
  - name: Getty Images
    stage: incumbent
    wedge: Licensed creative library and indemnified generative AI tooling for enterprise content teams.
    pricing: 25 generations for $49; 100 generations for $149; enterprise custom plans available.
    strength: Trusted rights position, strong indemnification, and existing enterprise relationships.
    weaknessVsUs: Defaults to library and generation workflows, not brief-to-capture operational ownership.
    sourceRefs: [8]
  - name: Syte
    stage: scale-up
    wedge: Visual discovery, recommendation, and AI tagging to improve ecommerce performance from existing catalog assets.
    pricing: Custom enterprise quote.
    strength: Direct relevance to ecommerce discovery teams and immediate value from current imagery.
    weaknessVsUs: Optimizes what already exists rather than creating the missing assets and provenance trail.
    sourceRefs: [9]
regulatoryTechnicalConstraints:
  - point: GPAI and broader AI governance are moving toward stronger transparency and copyright documentation for training inputs.
    sourceRefs: [30, 32]
  - point: EU text-and-data-mining rules make machine-readable rights reservation and licensing metadata strategically important.
    sourceRefs: [31, 34]
  - point: Google Merchant Center imposes image quality, URL stability, and crawlability requirements for product distribution.
    sourceRefs: [13]
  - point: Ecommerce AR delivery requires disciplined file packaging around GLB and USDZ plus lightweight rendering constraints.
    sourceRefs: [24, 25]
  - point: Where commissioned media contains personal data, lawful basis and governance documentation cannot be an afterthought.
    sourceRefs: [33, 41]
validationSignals:
  - point: Wirestock says the market shifted from off-the-shelf libraries toward custom multimodal data requests.
    sourceRefs: [1]
  - point: Wirestock already serves major model builders and reports significant scale, showing budget exists for creative data supply.
    sourceRefs: [1, 2]
  - point: Rebecca Minkoff saw materially higher cart and order rates after shoppers interacted with 3D and AR assets.
    sourceRefs: [26]
  - point: Gunner Kennels improved order conversion and reduced returns after adding 3D and AR to product pages.
    sourceRefs: [27]
  - point: Consumers increasingly want AI-infused shopping and rely on AI tools for product recommendations.
    sourceRefs: [10]
openQuestions:
  - How much of the target budget is controlled by applied AI teams versus creative operations or ecommerce merchandising leaders?
  - What percentage of missing commerce data can be solved with new capture versus synthetic augmentation or 3D derivation?
  - How often do enterprise buyers require model-training-specific rights language beyond standard content licenses?
  - Can creator qualification, briefing, and QA be templated enough to preserve software-like margins at scale?
