  fiveForces:
    supplierPower:
      score: 3
      rationale: Creator supply is fragmented, but qualified multimodal contributors and provenance-ready tooling still matter enough to prevent pure commodity sourcing.
      sourceRefs: [2, 4, 25]
    buyerPower:
      score: 4
      rationale: The target account list is concentrated in large retailers and marketplaces with procurement leverage and multiple substitute vendors.
      sourceRefs: [19, 18, 15]
    threatOfEntrants:
      score: 3
      rationale: New entrants can assemble creator networks and workflow software, but enterprise trust, standards compliance, and QA discipline raise the practical bar.
      sourceRefs: [35, 37, 38]
    threatOfSubstitutes:
      score: 4
      rationale: Buyers can fall back to stock libraries, existing-catalog optimization, synthetic data, or generic data-ops vendors before adopting a new commissioning OS.
      sourceRefs: [8, 9, 44]
    competitiveRivalry:
      score: 4
      rationale: The space already includes validated specialists, large data vendors, and commerce-adjacent substitutes competing for the same enterprise AI budget.
      sourceRefs: [1, 4, 6, 8, 28]
  pestle:
    - factor: political
      impact: neutral
      point: Cross-jurisdiction AI governance is converging toward more disclosure, traceability, and accountability rather than less.
      sourceRefs: [30, 39, 42]
    - factor: economic
      impact: positive
      point: High return costs and rising AI-in-retail spend create budget pressure to improve product data quality and launch efficiency.
      sourceRefs: [15, 21]
    - factor: social
      impact: positive
      point: Consumers increasingly expect AI-assisted shopping and richer, more personalized product discovery.
      sourceRefs: [10, 28]
    - factor: technological
      impact: positive
      point: Google, Apple, and modern commerce stacks make structured imagery, 3D, and AR more operationally important than before.
      sourceRefs: [12, 24, 25]
    - factor: legal
      impact: negative
      point: Copyright, TDM, and data-lawfulness uncertainty raises the burden of proof around how training and evaluation assets were acquired.
      sourceRefs: [31, 32, 33]
    - factor: environmental
      impact: positive
      point: Better fit and richer product media can reduce avoidable returns and repeat reshoots in high-friction categories.
      sourceRefs: [15, 27]
  adoptionFrictionMatrix:
    - friction: Legal review of AI-training rights and provenance
      severity: high
      affectedBuyer: Legal and compliance stakeholders
      mitigation: Ship machine-readable rights terms, provenance records, and TDM-policy-compatible metadata with every dataset package.
      sourceRefs: [30, 31, 34, 35]
    - friction: Proving ROI before enterprise rollout
      severity: high
      affectedBuyer: VP Digital Product
      mitigation: Start with one high-return or high-search-failure category and benchmark conversion and return deltas.
      sourceRefs: [15, 26, 27]
    - friction: Integrating briefs into existing model QA workflows
      severity: medium
      affectedBuyer: Applied AI director
      mitigation: Tie briefs directly to search QA or model-error buckets instead of creating a parallel creative process.
      sourceRefs: [14, 28]
    - friction: Managing file formats and catalog compatibility
      severity: medium
      affectedBuyer: Creative operations lead
      mitigation: Standardize delivery around Merchant Center-compliant imagery plus GLB and USDZ bundles for downstream deployment.
      sourceRefs: [13, 24, 25]
