topRisks:
  - name: Rights leakage
    description: If contributor permissions, exclusivity terms, or downstream usage scopes are unclear, buyers will not trust the datasets in production models.
    mitigation: Start with standardized contract templates, machine-readable rights metadata, and audit-ready provenance records for every asset bundle.
  - name: Services-heavy delivery
    description: Custom data procurement can collapse into a labor-intensive agency model if each brief requires too much manual project management.
    mitigation: Constrain the initial use cases, template the most common commerce capture jobs, and automate creator matching, QA, and packaging before expanding scope.
  - name: Budget concentration
    description: The earliest buyers may be concentrated in a small set of sophisticated retail AI teams, slowing initial market expansion.
    mitigation: Win the commerce beachhead first, then reuse the same procurement stack for adjacent buyers in marketplaces, ad-tech, and digital twin workflows.
