slug: catalog-data-commissioning-os
date: '2026-05-15'
executiveSummary: >-
  This company sells a brief-to-capture operating system to enterprise
  ecommerce teams whose visual search, generative merchandising, or virtual
  try-on programs are blocked by missing product imagery, video, and 3D assets.
  The beachhead is not generic content procurement; it is one workflow inside
  large retailers and marketplaces where model-error buckets are translated into
  rights-cleared creator briefs and returned as training-ready dataset packages.
  The first buyer is likely a Head of Applied AI or VP Digital Product at a
  $500M-plus GMV retailer or marketplace launching a new AI shopping workflow
  and discovering that catalog photos do not cover the required product states,
  contexts, or 3D views. The economic case is concrete if the product shortens
  dataset turnaround, improves launch readiness, and ties richer media to search
  quality, conversion, or return reduction in one category. The strategy starts
  with image, video, and 3D commissioning for a narrow commerce use case because
  that is easier to prove than a broader creator marketplace or generic
  data-labeling platform. The biggest risk is that delivery stays too
  operations-heavy, turning the company into an agency with software rather than
  a software company with managed fulfillment. Market sizing supports a viable
  initial wedge with an estimated $120M SAM and a modeled $4.5M year-3 SOM, but
  venture-scale outcomes require expansion into more categories, more
  modalities, and adjacent multimodal data operations after the first proof
  loop. A key missing fact is which budget owner actually consolidates spend
  across agencies, stock, retouching, and annotation today, so the first 90
  days should validate budget ownership before scaling headcount. Given the real
  demand signal but meaningful execution and market-size risk, this merits
  monitoring until paid pilot evidence is stronger.
problem:
  - Enterprise ecommerce AI teams cannot improve visual search, generative merchandising, or virtual try-on when their catalogs lack the edge-case product states, usage scenes, and 3D assets the models actually fail on.
  - Procuring those missing assets is fragmented across agencies, creator outreach, rights paperwork, QA, and annotation vendors, which slows launches and creates compliance risk around provenance and usage scope.
solution:
  - Turn model-error buckets or launch-readiness gaps into structured capture briefs with shot lists, metadata requirements, SLA targets, and rights terms for specific SKUs or categories.
  - Route those briefs through a vetted creator network, run standardized QA and packaging, and deliver a rights-cleared image, video, or 3D dataset bundle back into the retailer's training or evaluation workflow.
whyWeWin:
  - The product starts from the buyer's model gap and workflow trigger, not from generic creator supply, which makes it easier to win budget against agencies, stock libraries, and annotation vendors.
  - Rights metadata, provenance records, and creator performance history become more valuable as enterprise legal review and AI governance tighten.
  - Every fulfilled brief can improve a proprietary map from error type to brief template, creator profile, accepted format, and downstream model or commerce outcome.
strategicChoices:
  beachhead: >-
    Applied AI and digital product teams at North American retailers and
    marketplaces above roughly $500M GMV that are launching or repairing visual
    search, AI merchandising, or virtual try-on programs in categories where
    richer media affects conversion or returns.
  wedgeRationale: >-
    A single-category commerce commissioning wedge creates faster proof than a
    broad multimodal data platform because the buying trigger is immediate, the
    missing assets are SKU-specific, and the customer can measure turnaround and
    launch quality within one program cycle.
  sequencingRationale: >-
    The company should first win one narrow workflow with manual-assisted
    fulfillment and strong rights controls, then productize repeatable brief
    templates and creator routing, then expand account value through more
    categories and modalities, and only after that move into adjacent data-ops
    markets. This order keeps legal scope, integration burden, and hiring
    complexity aligned with an early pre-seed company.
  notYet:
    - Generic AI lab dataset brokering outside commerce workflows.
    - Self-serve SMB creator marketplace features.
    - Synthetic-data generation products as a primary wedge.
    - Marketplace moderation, ad-creative training, or digital-twin workflows before commerce proof exists.
market:
  tam: $600M estimated TAM across top North American online retailers running mature custom creative-data programs.
  sam: $120M estimated SAM across roughly 300 large retailers and marketplaces likely to fund an initial commerce AI asset-commissioning workflow.
  som: $4.5M modeled year-3 SOM based on 15 enterprise customers at roughly $300k blended ARR after one workflow lands and expands.
  segments:
    - Large retailers and marketplaces running in-house visual search, AI merchandising, or virtual try-on programs
    - Creative operations and catalog platform leaders at enterprise retailers upgrading richer media, 3D, and asset-governance workflows
  buyingProcess: >-
    Interest is usually triggered by a launch deadline, search-quality failure,
    or rising return pressure inside one category. A pilot is likely championed
    by Applied AI or digital product, with creative operations and legal
    involved in diligence and a VP-level product or AI owner approving budget
    after one scoped workflow proves ROI and governance.
product:
  mvp: >-
    MVP covers one commerce category and one active model program: ingest error
    buckets or missing-asset requests, generate structured creator briefs, route
    work to vetted contributors, capture rights and provenance metadata, and
    deliver QA-checked image, video, or 3D bundles to the buyer's dataset or
    evaluation pipeline.
  sixMonth: >-
    Launch a manual-assisted control plane for one design-partner category with
    reusable brief templates, basic creator scoring, rights ledger, and export
    into existing model QA or catalog systems.
  twelveMonth: >-
    Add template libraries by category, automated QA checks for common asset and
    metadata failures, machine-readable provenance packaging, and account-level
    reporting on turnaround, acceptance, and reuse.
  twentyFourMonth: >-
    Expand from one workflow into multi-category commerce data operations and
    selected adjacent use cases such as marketplace moderation assets or
    ad-creative training, using the same rights and creator-performance control
    plane.
  keyBets:
    - Buyers will trust a workflow that links missing assets to model-error buckets more quickly than they will trust a generic creator marketplace.
    - Enough commerce capture jobs can be templated to keep delivery software-led rather than account-manager-led.
    - Live creator-captured assets will still outperform synthetic substitutes for important edge cases, product states, and rights-sensitive workflows.
    - Legal and procurement teams will treat machine-readable provenance plus standardized rights terms as a meaningful selection criterion.
gtm:
  wedge: >-
    Sell a paid pilot around one high-priority category where a retailer's
    visual search or AI merchandising launch is blocked by missing imagery,
    video, or 3D assets and where the buyer already coordinates multiple
    outside vendors by hand.
  channels:
    - Founder-led direct sales to Heads of Applied AI, VPs of Digital Product, and catalog platform leaders
    - Commerce implementation partners and 3D or AR agencies already deployed inside enterprise retailers
    - Model-evaluation, search-QA, and ecommerce platform partners that surface missing-asset gaps before launch
  funnelTargets: "Lead→qualified pilot 20-30%; qualified pilot→paid pilot 30-40%; paid pilot→annual production 60%+; first workflow→second category or modality expansion within 12 months 50%+."
  pricing: >-
    Start with a paid pilot for one category or model program, then convert to
    an annual platform subscription priced by active workflow plus fulfilled
    brief volume. This matches buyer logic because value comes from launch
    readiness and rights-governed asset delivery, while variable usage tracks
    actual commissioning workload.
businessModel:
  revenueStreams:
    - Paid pilot and onboarding fees for workflow setup, rights templates, and initial integrations
    - Annual software subscription for an active commerce data-commissioning program
    - Variable fulfillment revenue tied to completed briefs or delivered asset bundles
    - Add-on revenue for rights governance, provenance reporting, and deeper integrations
  unitOfValue: Annual contract per active model or merchandising workflow plus fulfilled capture volume
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more categories and brands within the same retailer after one category proves ROI
    - Expand from image-only briefs into video and 3D bundles with higher ACV
    - Sell governance and provenance modules to legal and platform stakeholders
    - Reuse the same commissioning stack in adjacent multimodal data workflows after the commerce wedge is proven
strategyMap:
  northStarMetric: Annual production briefs completed and accepted into customer training or evaluation workflows
  inputMetrics:
    - Days from approved brief to dataset delivery
    - Brief acceptance rate without rework
    - Percentage of delivered assets with complete rights and provenance metadata
    - Paid pilot to annual production conversion rate
    - Net expansion from first workflow into second category or modality
  moatsToBuild:
    - Error-bucket-to-brief template library tied to downstream customer outcomes
    - Creator performance graph by category, modality, SLA adherence, and acceptance rate
    - Rights and provenance ledger that becomes audit infrastructure for enterprise buyers
  killCriteria:
    - Fewer than 2 of the first 5 paid pilots convert to annual production contracts within 6 months of pilot completion
    - Median delivery still requires more than 30% manual project-management time after the first 10 briefs in a category
    - Design partners cannot show a measurable launch-readiness, search-quality, conversion, or return proxy improvement in the first production category
  mermaid: |
    flowchart LR
      Wedge[Commerce commissioning wedge] --> MVP[Brief to capture MVP]
      MVP --> Proof[Turnaround and ROI proof]
      Proof --> Expansion[Multi-category expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Interesting buyer pain and real budget signals exist, but repeatable software margins and clear budget ownership are still unproven.
    whyBelieve: Better product media already affects conversion, returns, and AI shopping quality, and the workflow pain is acute when teams must commission custom assets under launch pressure.
    whyDoubt: The beachhead market is concentrated and the product could collapse into a services-heavy niche unless creator routing, QA, and rights packaging become highly repeatable.
    nextDiligence: Secure 2-3 paid pilots where one category budget is explicit, legal review passes, and at least one buyer converts to annual production pricing.
  firstCustomer:
    title: Applied AI team at a $500M-plus GMV retailer launching visual search or AI merchandising in a weak-media category
    profile: Enterprise retailer or marketplace with tens of thousands of active SKUs, fragmented creator or agency spend, and one category where missing product states or 3D views are blocking launch quality.
    trigger: A new AI shopping rollout or search-quality review exposes that existing catalog imagery cannot support target accuracy, conversion, or return-rate goals.
    buyer: Head of Applied AI or VP Digital Product
    initialContract: "$60k-100k paid pilot for one category, converting to roughly $180k-300k annual ARR when the workflow becomes the system of record for that program and expands into additional categories or modalities."
  mustBeTrue:
    - At least one enterprise buyer already controls or can consolidate enough agency, stock, or annotation spend to support a $150k+ annual contract after pilot success.
    - A one-category pilot can show a measurable improvement in launch readiness or a customer KPI within 90 days of delivery.
    - Creator briefing, QA, and packaging can be templated enough to keep gross margin above 70% at production scale.
    - Legal and procurement teams will accept standardized rights terms plus provenance metadata as sufficient for production use.
    - Existing customers will expand from the first workflow into additional categories or modalities quickly enough to push blended ARR toward $300k.
  diligenceQuestions:
    - Which executive actually owns the budget when spend is currently split across agencies, creative ops, and AI teams?
    - How many briefs per year does a target account run that truly require custom capture instead of stock or synthetic substitutes?
    - What minimum proof will legal teams require before approving commissioned assets for model training or evaluation?
    - Can the first category show ROI on search quality, conversion, or returns without a long systems-integration project?
    - How defensible is the creator-performance and rights ledger advantage if a larger data-ops incumbent targets the same wedge?
operatingAssumptions:
  - assumption: Target buyers can reallocate existing vendor and image-operations spend into a software-led commissioning budget.
    basis: research.yaml
    validationTest: Run 5 budget walk-throughs with design partners and confirm at least 3 can identify $150k or more of annual spend that could move into a consolidated contract.
    decisionImpact: If false, pricing must move down or the company must sell primarily as managed services, weakening venture economics.
  - assumption: The fastest proof loop is one high-return or high-search-failure category rather than a retailer-wide rollout.
    basis: research.yaml
    validationTest: In early pilots, compare time to value and buyer engagement for one-category offers versus broader catalog transformation proposals.
    decisionImpact: If false, sales cycles and implementation scope will expand, requiring more capital and a different deployment model.
  - assumption: Standardized rights templates and provenance records materially reduce legal friction.
    basis: research.yaml
    validationTest: Put two prospective customers through procurement review using the startup's rights pack and record whether legal approval time shortens or objections narrow to known gaps.
    decisionImpact: If false, the company needs deeper legal services or a narrower geography and customer profile.
  - assumption: Commerce creator supply can meet SLA and quality targets without account-specific manual sourcing on every brief.
    basis: idea.yaml
    validationTest: Fulfill 10 pilot briefs across image, video, and 3D with at least 80% delivered on SLA and under a fixed internal operations budget per brief.
    decisionImpact: If false, the startup should narrow to fewer modalities or one category where fulfillment can be standardized.
  - assumption: Synthetic and catalog-optimization substitutes will not erase urgency for custom live capture in the first 24 months.
    basis: operator judgment
    validationTest: In discovery and pilot reviews, measure what share of target gaps buyers attempted to solve with stock, generation, or optimization first and whether those alternatives failed on realism, rights, or SKU specificity.
    decisionImpact: If false, the product must incorporate synthetic workflows or reposition as a QA and governance layer rather than a commissioning OS.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12 target buyers across applied AI, digital product, and creative ops and map one recent failed or delayed commerce AI launch.
    hypothesis: The strongest initial trigger is a category-specific launch blocked by missing edge-case assets, not a broad catalog refresh mandate.
    successMetric: At least 8 of 12 interviews identify one urgent category-level asset gap with named budget owner and measurable launch consequence.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run one concierge pilot that converts model-error buckets into creator briefs for a single category.
    hypothesis: Buyers will pay for a workflow tied to model failure modes if turnaround and governance are better than using separate vendors.
    successMetric: Deliver 5 or more accepted briefs in under 21 days each and secure one paid follow-on commitment.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Package a standard rights and provenance bundle and run procurement review with two prospective customers.
    hypothesis: Machine-readable provenance plus standardized rights language will clear a meaningful portion of enterprise legal diligence.
    successMetric: Two procurement reviews completed with no blocker that requires bespoke contract language for the core workflow.
    owner: Compliance lead
  - horizon: 90–180 days
    experiment: Test creator routing and QA automation across image, video, and 3D briefs in one category.
    hypothesis: The company can productize the common workflow enough to avoid agency-style margin collapse.
    successMetric: At least 80% of pilot briefs hit SLA and acceptance targets with less than 3 hours of manual ops time per brief.
    owner: Creator ops lead
  - horizon: 180–360 days
    experiment: Convert paid pilots into annual production contracts with workflow-based pricing.
    hypothesis: Buyers will accept annual pricing once the startup becomes part of launch-readiness operations for one program.
    successMetric: Close 2 annual contracts at $180k or more ARR and convert at least 60% of completed pilots.
    owner: Founder CEO
  - horizon: 180–540 days
    experiment: Expand one production customer from the initial category into a second category or modality and source one partner-referred deal.
    hypothesis: Account expansion and partner referrals can reduce dependence on constant new-logo founder selling.
    successMetric: One customer expands ACV by 50% or more and one qualified pilot arrives through a partner channel.
    owner: Product lead
operations:
  - Standard creator qualification, briefing, and QA playbooks by category and modality.
  - Rights and provenance ledger with machine-readable metadata attached to every delivered asset bundle.
  - Secure import and export workflows into customer model-evaluation, catalog, and asset-management systems.
  - Design-partner operating cadence with weekly SLA, acceptance, and ROI review against one category.
  - Partnership motion with commerce integrators, AR or 3D agencies, and annotation or evaluation vendors rather than building all downstream tooling in-house.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own design-partner sales, buyer discovery, pricing, and partner development in a trust-heavy enterprise workflow.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the briefing engine, workflow control plane, and first customer integrations.
  - role: Creator ops lead
    startTiming: Month 2
    rationale: Productize creator qualification, SLA management, and QA so delivery does not stay founder-led.
  - role: Product lead
    startTiming: Month 6
    rationale: Turn pilot lessons into repeatable templates, roadmap discipline, and expansion features.
  - role: Compliance lead
    startTiming: Month 9
    rationale: Own rights templates, provenance packaging, security diligence, and procurement support as enterprise volume grows.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 paid pilots with enterprise retailers or marketplaces that fit the narrow commerce AI ICP.
      - Deliver 10 or more accepted briefs across at least two pilots with documented SLA, rights, and provenance compliance.
      - Convert at least 2 pilots into annual production contracts and prove one measurable launch-readiness or commerce KPI improvement in the first category.
  - horizon: 12–24 months
    items:
      - Expand 3 production customers into a second category or modality and push blended ARR above the initial land price.
      - Standardize template libraries and creator scoring for the most common commerce brief types.
      - Add one partner-driven distribution source that reliably produces qualified pilots.
  - horizon: 24–36 months
    items:
      - Reach roughly 15 production customers and the modeled $4.5M SOM run-rate.
      - Launch one adjacent multimodal data workflow beyond the original commerce wedge without breaking gross-margin targets.
      - Demonstrate that expansion revenue and workflow data, not only new-logo services work, drive account growth.
risks:
  - risk: The workflow remains too services-heavy because each brief needs custom project management or creator sourcing.
    likelihood: High
    impact: High
    mitigation: Constrain the initial offer to repeatable commerce categories, measure manual ops time per brief, and reject edge cases that do not fit the template library.
  - risk: Legal teams reject the startup's rights and provenance package for production AI use.
    likelihood: Medium
    impact: High
    mitigation: Start with buyers that already run governed AI programs, standardize contract language early, and treat procurement review as a product input rather than a late-stage obstacle.
  - risk: Buyers choose cheaper substitutes such as stock libraries, synthetic data, or catalog-optimization software before funding custom commissioning.
    likelihood: High
    impact: Medium
    mitigation: Sell only where SKU specificity, rights sensitivity, or clear model-error gaps make those substitutes visibly insufficient.
  - risk: Budget ownership is fragmented across AI, creative, and ecommerce teams, slowing sales and lowering ACV.
    likelihood: Medium
    impact: High
    mitigation: Qualify for a named executive sponsor and explicit budget line before deep pilot scoping, and package the offer around one operational trigger.
  - risk: Larger data-ops or commerce vendors enter the wedge once customer demand is proven.
    likelihood: Medium
    impact: Medium
    mitigation: Build stickiness around error-linked brief templates, creator acceptance data, and audit-ready rights history that incumbents do not have on day one.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Eighteen months of runway should fund the core workflow and integration
    product, creator operations and QA, enterprise rights and provenance
    infrastructure, and enough founder-led GTM capacity to win and convert the
    first three to five paid pilots into repeatable annual contracts.
