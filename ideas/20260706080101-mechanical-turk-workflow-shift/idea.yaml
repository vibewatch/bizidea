topRisks:
  - name: Services creep
    description: Early buyers may try to use the company as a custom migration consultancy across messy legacy MTurk jobs and vendor contracts.
    mitigation: Start with productized imports for the highest-frequency Ground Truth and A2I patterns and restrict onboarding to fixed-scope workflow templates.
  - name: Platform squeeze
    description: AWS or large annotation vendors could bundle richer routing features once MTurk demand shifts.
    mitigation: Stay vendor-neutral, own cross-provider provenance and benchmark data, and support multi-cloud review paths that no single supplier wants to normalize.
  - name: Supply integrity gap
    description: Third-party reviewers may still use LLMs or low-skill labor in ways that hurt labels and exception decisions.
    mitigation: Combine gold tasks, consensus policies, session-level provenance checks, and rapid fallback routing so poor suppliers are detected and replaced quickly.
