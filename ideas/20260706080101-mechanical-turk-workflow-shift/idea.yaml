jobsToBeDone:
  - job: >-
      When an AWS review workflow loses MTurk as a safe default, help our ML
      platform team migrate to new reviewers without changing downstream
      pipelines, so we can keep launches on schedule.
    currentAlternative: One-off vendor contracts and manual rewiring of Ground Truth or A2I flows
    successMetric: Days to migrate a workflow and percent of reviews that meet acceptance SLAs
  - job: >-
      When label quality starts drifting because crowd workers use automation,
      help our data-ops team verify provenance and route low-trust work
      elsewhere, so we can protect model quality and compliance.
    currentAlternative: Sample-based manual QA and vendor escalation emails
    successMetric: Accepted-label rate, rework rate, and defect escape rate into model training or production review queues
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Two same-day reports give a concrete July 30 cutoff, maintenance-mode language, and workflow specifics that make the signal actionable.
  painIntensity:
    score: 5
    rationale: A blocked onboarding path plus quality drift in live human-review pipelines creates immediate operational pain for teams shipping AI products.
  wedgeClarity:
    score: 5
    rationale: A vendor-neutral switchboard for Ground Truth and A2I migrations is a concrete first product with a clear initial buyer and workflow.
  defensibility:
    score: 4
