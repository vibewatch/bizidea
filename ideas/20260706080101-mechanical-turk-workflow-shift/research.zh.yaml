competitors:
- name: AWS 原生 HITL 栈
  stage: incumbent
  wedge: AWS ML 栈里的 Ground Truth、A2I 与审核团队抽象层。
  pricing: 按量计费的 AWS 服务 + 审核员 / 供应商成本
  strength: 与现有 Ground Truth / A2I job、API 和权限体系天然兼容。
  weaknessVsUs: 处于维护模式，而且看不到一层供应商中立的控制平面去做多供应商路由、QA 策略或迁移分析。
  sourceRefs:
  - 1
  - 3
  - 4
  - 5
  - 6
- name: Scale AI
  stage: scale-up
  wedge: 企业数据引擎、专家标注、评测与托管数据质量。
  pricing: 企业定制定价
  strength: 质量体系强、融资充足，在前沿 AI 团队里有可信度。
  weaknessVsUs: 它首先是直接供应商 + 平台，而不是一层专门保住多家供应商 AWS HITL 接口的中立总控台。
  sourceRefs:
  - 19
  - 25
  - 26
  - 27
- name: HumanSignal (Label Studio Enterprise)
  stage: scale-up
  wedge: 带安全与质量工作流的可编程标注 / 评测工作台。
  pricing: Starter 从 $99/user/month 起；企业版定制
  strength: 界面灵活，QA / 评测工作流成熟。
  weaknessVsUs: 客户仍得自己解决审核员来源、供应商路由和 AWS 专属迁移逻辑。
  sourceRefs:
  - 28
  - 29
  - 30
- name: SuperAnnotate
  stage: scale-up
  wedge: 集编排、协作和托管专家供给于一体的统一标注平台。
  pricing: Starter 与企业方案并存；大规模部署需定制
  strength: 工作流设计强、集成 QA 完整，也自带托管审核团队能力。
  weaknessVsUs: 更像一个广义标注工作台，并非专为 AWS 复核回路里的 MTurk 到多供应商迁移而做。
  sourceRefs:
  - 31
  - 32
  - 33
- name: Toloka
  stage: scale-up
  wedge: 具备专家池和快速工作流搭建能力的自助式人工判断平台。
  pricing: 按项目给出清晰估算；无最低消费，也无需长期合同
  strength: 实验启动快，审核员网络广，质量规则也写得足够直白。
  weaknessVsUs: 它仍是单一平台 / 单一供应商，而不是跨获批供应商和私有团队的中立操作层。
  sourceRefs:
  - 34
  - 35
