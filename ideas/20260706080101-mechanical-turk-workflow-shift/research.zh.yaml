  searchedQueries:
  - "哪些权威来源提到 Amazon Mechanical Turk 将在 2026 年 7 月停止新客户注册？Mechanical Turk 与 SageMaker Ground Truth、Augmented AI 工作流之间又是什么关系？"
  - "寻找与替换 Mechanical Turk 相关的权威来源，重点覆盖 AWS SageMaker Ground Truth、Amazon Augmented AI、私有与供应商审核团队，以及人工复核工作流。"
  - "寻找 2024-2026 年 AI 数据标注、人工在环或数据注释市场规模、增长和企业需求的权威与近期来源。"
  - "寻找 AI 治理或监管要求方面的权威来源，重点看 AI 系统中的人工监督、溯源、可审计性和人工复核，尤其是与欧盟 AI 法案、NIST，以及身份核验、理赔或文档 AI 相关的行业指引。"
  - "寻找关于 Amazon Mechanical Turk 定价、审核员质量控制，以及当前 AWS 原生人工标注替代方案官方页面的权威来源。"
  - "寻找身份核验、文档 AI 或理赔自动化工作流在低置信度场景下需要人工复核或 HITL 回退的权威与近期来源。"
  - "寻找金标任务、一致性、溯源等数据标注质控方法，以及如何识别低质量或 AI 辅助审核员的公开一手或可靠来源。"
  - "寻找 Scale AI、Toloka、Appen 或 TELUS Digital 在企业数据标注与人工复核方面的产品页、定价页、QA/安全页或工作流文档等公开一手资料。"
  - "寻找介绍欧盟 AI 法案中的人工监督与高风险义务、NIST AI RMF，以及强调人工复核、可审计性或模型风险管理的保险、身份核验或金融服务指引的权威来源。"
  - "寻找 2024-2026 年关于数据标注、人工在环 AI 和标注平台近期融资、增长或市场动态的 Reuters、TechCrunch、公司博客或分析师风格公开来源。"
  - "寻找关于众包审核员或受访者使用生成式 AI 或机器人，以及这对数据质量、标注质量和人工数据溯源有何影响的公开可靠来源，时间范围聚焦 2024-2026 年。"
  - "寻找 AWS Textract 或文档 AI 人工复核工作流、低置信度路由，以及文档处理中的 Augmented AI 等公开一手或可靠来源。"
  - "寻找来自 Synergy Research、Canalys 等机构、可公开获取的 2025 或 2026 年 AWS 云市场份额权威来源，用来交叉核验 AWS 专属细分市场。"
  - "寻找 2025-2026 年企业 AI 采用率或智能文档处理市场增长的可公开权威来源，用来交叉核验人工复核文档工作流的需求。"
