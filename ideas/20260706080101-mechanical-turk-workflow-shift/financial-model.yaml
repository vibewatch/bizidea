scenarios:
  downside:
    description: "Pilots convert one quarter slower, per-logo expansion is weaker, and onboarding stays more bespoke."
    y3RevenueK: 2940.0
    y3EbitdaK: -360.0
    cashLowPointK: 280.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches 16 instead of 20."
      - "Blended annual value tops out near $205K instead of approaching the research-backed ~$225K level."
      - "Gross margin exits at 68% because deployment work remains too services-heavy."
  base:
    description: "The company converts migration pain into repeatable production contracts while staying at the low end of the BP customer targets."
    y3RevenueK: 3615.0
    y3EbitdaK: 50.1
    cashLowPointK: 986.2
    keyAssumptionChanges:
      - "4 paying logos exit Y1, 10 exit Y2, and 20 exit Y3."
      - "Pilot revenue stays near $30K per logo and mature production value approaches the researched ~$225K ARR anchor."
      - "Gross margin reaches the BP target 72% only after integrations and QA policy templates become repeatable."
  upside:
    description: "Partner-sourced pipeline lands earlier and second-workflow plus compliance-module expansion arrives faster."
    y3RevenueK: 4225.0
    y3EbitdaK: 430.0
    cashLowPointK: 1080.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches 22 instead of 20."
      - "Blended annual value reaches roughly $235K through faster second-workflow and provenance-module attach."
      - "Gross margin exits at 74% as workflow imports standardize faster than plan."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Production contracts stay closer to $180K ARR and expansion modules attach slowly."
    baseCase: "Blended annual value approaches ~$225K by Y3."
    upsideCase: "Second-workflow expansion and compliance modules push blended annual value toward ~$235K."
    y3RevenueImpactK: -360.0
    cashImpactK: -260.0
  - variable: "CAC"
    downsideCase: "CAC rises toward $120K because founder-led outbound remains the main source of wins."
    baseCase: "CAC stays near $96K with a mix of founder-led and partner-sourced pipeline."
    upsideCase: "CAC falls toward $80K once partner introductions drive a larger share of pilots."
    y3RevenueImpactK: -120.0
    cashImpactK: -220.0
  - variable: "churn"
    downsideCase: "Monthly churn drifts to 2.7% if the wedge feels too narrow after first cutover."
    baseCase: "Monthly churn holds at 1.8%."
    upsideCase: "Monthly churn improves to 1.2% once the switchboard becomes embedded in audit workflow."
    y3RevenueImpactK: -170.0
    cashImpactK: -140.0
  - variable: "sales cycle"
    downsideCase: "Pilot-to-production conversion stretches by one quarter because procurement and security review drag."
    baseCase: "Paid pilots convert in about one quarter after launch."
    upsideCase: "Launch-triggered deals compress conversion toward two months."
    y3RevenueImpactK: -420.0
    cashImpactK: -310.0
  - variable: "gross margin"
    downsideCase: "Exit gross margin reaches only 68%."
    baseCase: "Exit gross margin reaches 72%."
    upsideCase: "Exit gross margin reaches 74%."
    y3RevenueImpactK: 0.0
    cashImpactK: -190.0
  - variable: "hiring pace"
    downsideCase: "Two scale hires are pulled forward before deployment reuse is proven."
    baseCase: "Hiring remains milestone-gated and follows the BP sequencing."
    upsideCase: "One late Y3 scale hire waits until after stronger partner-sourced bookings."
    y3RevenueImpactK: -60.0
    cashImpactK: -200.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      TargetAccounts[Target AWS-native review teams] --> PaidPilots[Paid migration pilots]
      PaidPilots --> Production[Production governed workflows]
      Production --> Expansion[Second workflow and compliance expansion]
      Expansion --> Revenue[Subscription and usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Runway and cash]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue comes from growing from 4 paying logos at Y1 exit to 20 by Q4Y3 while blended annual value per logo moves from BP production pricing toward the research-backed ~$225K level."
  - checkName: "Must go right"
    finding: "Workflow imports must stay under roughly two engineer-weeks and pilots must convert within one quarter, or headcount will outrun gross profit."
  - checkName: "Model breaks if"
    finding: "A one-quarter sales-cycle slip plus gross margin stuck below 68% pushes cash toward the downside floor before partner-sourced scale arrives."
  - checkName: "Next-round proof"
    finding: "The seed-ready story is 10 paying logos, 3 production cutovers, and 70% gross margin by Q4Y2 without turning onboarding into a services business."
sanityChecks:
  ruleOf40: "Y3 growth 131.3% + EBITDA margin 1.4% = 132.7%"
  burnMultiple: "Y2 burn multiple is about 0.5x using $698K of EBITDA burn against roughly $1.35M of net new ARR; Y3 turns EBITDA positive in H2."
  revenuePerFte: "$278K Y3 using 13 ending FTE (benchmark $200-400K SaaS)"
  flags:
    - "The base case still reaches 20 of roughly 140 AWS-first SAM accounts by year 3, so market concentration and execution risk stay high."
    - "customersEop includes paid pilots as well as production subscriptions, so recurring-only production logos trail the headline count through Y1 and early Y2."
    - "Gross margin reaches 72% only if deployment custom work really stays inside the BP assumption of less than 2 engineer-weeks per account."
    - "Rule-of-40 looks unusually strong because Y3 growth is measured from a very small Y2 base rather than from a mature SaaS run rate."
    - "Cash is modeled as EBITDA, so implementation prepayments, audit costs, or working-capital timing could move the actual cash curve."
