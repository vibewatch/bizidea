slug: verified-human-loop-switchboard
date: "2026-07-06"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-06] the model starts in the first full month after the business plan date."
  - id: A2
    name: "Opening cash / pre-seed raise"
    value: "$2.5M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2.5-3.5M + BP fundingAsk runwayMonths 18] the model uses the low end of the planned range and carries a six-month buffer beyond the core proof window."
  - id: A3
    name: "Starting paying logos"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months + BP investorMemo.firstCustomer] the company starts pre-revenue and must first win paid pilots."
  - id: A4
    name: "Paying logo definition"
    value: "Any logo paying either the fixed-scope migration pilot or the annual governed-workflow subscription."
    unit: "definition"
    source: "[BP gtm.wedge + BP businessModel.revenueStreams] customersEop counts all logos already paying for pilot or production scope."
  - id: A5
    name: "Pilot economics"
    value: "$30K over about 2 months (~$15K/mo)"
    unit: "USD/logo"
    source: "[BP gtm.pricing $25k-$50k fixed-scope migration pilot] the model uses a low-midpoint pilot price because the first sale is intentionally narrow."
  - id: A6
    name: "Production and expansion economics"
    value: "Initial production value is about $180K ARR and expands toward roughly $225K blended ARR by Y3 through more workflows plus provenance and compliance modules."
    unit: "USD/logo/year"
    source: "[BP gtm.pricing $120k-$180k annual platform value + Research market.som 24 customers at ~$225k blended annual value] the model starts inside the BP range and exits near the research SOM anchor."
  - id: A7
    name: "Customer ramp"
    value: "4 paying logos by M12, 10 by Q4Y2, 20 by Q4Y3"
    unit: "customersEop"
    source: "[BP milestones 0-12, 12-24, and 24-36 months] the base case uses the low end of the year-2 and year-3 milestone ranges to avoid vanity assumptions."
  - id: A8
    name: "Revenue recognition convention"
    value: "Period-end paying logos multiplied by blended realized revenue per logo for that period: Y1 at $15K-$18K/mo, Y2 at $47K-$53K/qtr, and Y3 at $55K-$56K/qtr."
    unit: "formula"
    source: "[BP gtm.pricing + BP market.som + Research market.som] this keeps reported revenue directly tied to paying logos and the planned pricing mix."
  - id: A9
    name: "Gross margin ramp"
    value: "50%-60% in Y1, 62%-70% in Y2, 71%-72% in Y3"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 72 + BP operatingAssumptions deployment under 2 engineer-weeks] early workflow imports are services-heavy before templates and QA policy reuse improve margin."
  - id: A10
    name: "Hiring timeline"
    value: "M1 founder CEO and founding engineer; M4 solutions engineer; M7 QA/provenance lead; M10 partnerships lead; M13 second engineer; M16 first sales hire; M19 third engineer; M22 ops hire; M25 second solutions hire; M28 second sales hire; M31 second QA hire; M34 fourth engineer."
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic (lean enterprise infrastructure hiring)] the team adds delivery and GTM capacity only after pilot proof starts to appear."
  - id: A11
    name: "Founder loaded compensation"
    value: "$150K"
    unit: "USD/year"
    source: "[BP team Founder CEO + startup-finance heuristic (U.S. pre-seed enterprise infrastructure compensation band)] lean founder cash pay plus taxes and benefits."
  - id: A12
    name: "Engineering loaded compensation"
    value: "$190K"
    unit: "USD/year"
    source: "[BP team Founding eng + startup-finance heuristic (U.S. pre-seed enterprise infrastructure compensation band)] reflects senior workflow and integration engineering talent."
  - id: A13
    name: "Solutions / integration loaded compensation"
    value: "$165K"
    unit: "USD/year"
    source: "[BP team Solutions or integration engineer + startup-finance heuristic (technical implementation hire band)] reflects customer-facing deployment ownership without building a services bench."
  - id: A14
    name: "QA / provenance loaded compensation"
    value: "$155K"
    unit: "USD/year"
    source: "[BP team QA or provenance lead + startup-finance heuristic (domain specialist hire band)] reflects audit-trace and quality-policy ownership."
  - id: A15
    name: "Partnerships / sales loaded compensation"
    value: "$170K"
    unit: "USD/year"
    source: "[BP team Partnerships or vendor ops lead + BP gtm.channels + startup-finance heuristic (enterprise GTM hire band)] includes travel and variable comp for concentrated outbound."
  - id: A16
    name: "G&A / ops loaded compensation"
    value: "$125K"
    unit: "USD/year"
    source: "[BP operations + startup-finance heuristic (lean finance and vendor-ops hire band)] covers basic finance, vendor onboarding, and compliance operations."
  - id: A17
    name: "Payroll allocation to P&L lines"
    value: "Founder 50% S&M / 25% R&D / 25% G&A; engineering 100% R&D; solutions 40% S&M / 60% R&D; QA 20% S&M / 80% R&D; GTM 100% S&M; ops 100% G&A."
    unit: "allocation"
    source: "[BP team role rationales + BP operations] this maps payroll into functional expense lines while keeping delivery and proof work visible."
  - id: A18
    name: "Non-payroll opex ramp"
    value: "Monthly non-payroll spend rises from S&M/R&D/G&A of $5K/$8K/$6K to $25K/$17K/$14K by Q4Y3."
    unit: "USD/month"
    source: "[BP operations + startup-finance heuristic (regulated B2B software cloud, travel, legal, and insurance spend)] the model assumes deliberate but rising infrastructure and compliance costs."
  - id: A19
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA"
    unit: "formula"
    source: "[startup-finance heuristic (pre-seed simplification)] capex, taxes, debt service, and working-capital timing are assumed immaterial relative to operating burn."
  - id: A20
    name: "Steady-state monthly churn"
    value: "1.8%"
    unit: "percent per month"
    source: "[startup-finance heuristic (sticky enterprise workflow infrastructure) + BP gtm.funnelTargets second-workflow expansion] churn should be low after cutover, but the model stays more conservative than mature infrastructure software."
  - id: A21
    name: "Base sales cycle"
    value: "Roughly 3-4 months to paid pilot and about one quarter from pilot start to production decision"
    unit: "time"
    source: "[BP experimentRoadmap 3-6 months + BP gtm.wedge + BP investorMemo.mustBeTrue] the company needs a short proof cycle to convert migration pain into annual software contracts."
  - id: A22
    name: "CAC convention"
    value: "36-month sales and marketing spend divided by 20 net new paying logos"
    unit: "formula"
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures founder-led outbound, partner introductions, and later GTM hires across the full buildout."
  - id: A23
    name: "Next-round milestone for funding sizing"
    value: "By Q4Y2 the company should have 10 paying logos, at least 3 production cutovers, and documented sub-45-day deployments."
    unit: "milestone"
    source: "[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + BP product.keyBets first value under 45 days] this is the seed-ready proof point used to size the raise."
  - id: A24
    name: "Quarterly salary-roll convention"
    value: "Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only the year-end snapshot columns."
    unit: "convention"
    source: "[Headcount column convention + BP team.startTiming] this keeps salary expense internally consistent with the monthly hiring ramp."
