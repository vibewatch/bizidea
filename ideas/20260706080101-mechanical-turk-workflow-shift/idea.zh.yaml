    score: 4
    rationale: 两篇同日报道给出了明确的 7 月 30 日截止点、维护模式表述和工作流细节，足够把信号落到行动层。
  painIntensity:
    score: 5
    rationale: 新客户入口被堵，再叠加线上人工复核链路里的质量漂移，对正在发 AI 产品的团队来说是立刻发作的运营痛点。
  wedgeClarity:
    score: 5
    rationale: 围绕 Ground Truth 和 A2I 迁移做一个供应商中立总控台，是一个具体、首单买家清楚、工作流明确的第一产品。
  defensibility:
    score: 4
    rationale: 护城河可以从工作流连接器、溯源遥测和供应商表现基准里长出来，但大云厂商未来也可能把栈里的一部分复制过去。
  ventureScale:
    score: 5
    rationale: 同一个控制平面可以从 AWS 复核迁移扩到更广的 agent 软件——成为“可信人工输入”的系统记录层。
topRisks:
  - name: 服务化膨胀
    description: 早期买家可能会把公司当成一家具备定制迁移能力的咨询方，拿来处理又脏又旧的 MTurk 任务和供应商合同。
    mitigation: 从频率最高的 Ground Truth 和 A2I 模式切入，做产品化导入，并把导入流程严格限制在固定范围的工作流模板内。
  - name: 平台挤压
    description: 一旦 MTurk 需求转移，AWS 或大型标注厂商可能把更丰富的路由能力直接打包进去。
    mitigation: 保持供应商中立，牢牢抓住跨供应商溯源和基准数据，并支持单一供应商不愿统一的多云复核路径。
  - name: 供给可信度缺口
    description: 第三方审核员仍可能用 LLM 或低技能劳动力交付结果，进而拉低标签和异常决策质量。
    mitigation: 把金标任务、一致性策略、会话级溯源检查和快速回退路由绑在一起，尽快识别并替换差供应商。
