    - 溯源图谱和 QA 策略库
    - 按任务类别沉淀的供应商表现基准数据集
  keyActivities:
    - 导入并标准化人工复核工作流
    - 路由任务并执行质量策略
    - 衡量供应商的验收通过率、时延和缺陷率
  keyPartners:
    - 标注厂商和 BPO
    - AWS 原生系统集成商和 MLOps 咨询公司
    - 提供基准结果的客户内部复核团队
  costStructure:
    - 工作流连接器的集成工程
    - QA 基础设施和溯源遥测
    - 迁移与供应商管理的客户成功
    - 面向 AI 平台和产品负责人的企业销售
jobsToBeDone:
  - job: >-
      当 AWS 复核工作流失去 MTurk 这个安全默认选项时，帮我们的 ML 平台团队把审核员迁到新渠道，同时不改下游流水线，这样我们才能按时上线。
    currentAlternative: 一次性供应商合同 + 手工改接 Ground Truth 或 A2I 流程
    successMetric: 迁完一条工作流所需天数，以及达到验收 SLA 的复核占比
  - job: >-
      当众包审核员用自动化工具把标注质量带偏时，帮我们的数据运营团队验证溯源、把低可信任务切走，这样模型质量和合规性才守得住。
    currentAlternative: 基于抽样的人工 QA 和给供应商发升级邮件
    successMetric: 标签验收通过率、返工率，以及缺陷漏进模型训练或生产复核队列的比例
