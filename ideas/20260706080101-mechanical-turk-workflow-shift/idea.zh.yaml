problem: >-
  在 Ground Truth 和 A2I 里用 MTurk 的 ML 产品团队，缺的不是更多标注员，而是一种安全的迁移办法：Amazon 正在关上新客户入口、也不再继续打磨产品，但生产环境里的人工复核和标注流程还得照常跑。换掉 MTurk 通常意味着重写任务结构、重建 QA 规则、失去一致的溯源链；偏偏现在审核员借助 LLM 带来的质量波动已经越来越大。对受监管的 AI 产品来说，这种迁移风险会拖住新产品上线、推高异常队列，或者悄悄把模型质量拉低。
targetUser:
  primary: >-
    在一家具备 Series A 到上市体量、做文档 AI、身份核验或理赔自动化的软件公司里，负责 ML 平台或人工复核运营的负责人；公司跑在 AWS 上，并使用 SageMaker Ground Truth 或 A2I
  secondary: >-
    负责模型上线期标注、异常复核和 QA 的应用 ML 经理与数据运营负责人
  buyer: >-
    AWS 原生企业 AI 软件公司的 VP Engineering、AI 产品 GM 或 AI 平台负责人
startupThesis:
  nonObviousInsight: >-
    MTurk 的衰落不是给“更好的劳动力市场”腾位置，而是给“把多家人工复核供应商伪装成一个可信、可审计系统”的控制平面腾位置。真正稀缺的，已经不是便宜的众包劳动力，而是带溯源、QA 和集成连续性的真人判断。
  beachhead: >-
    跑在 AWS 上、已经用 SageMaker Ground Truth 或 A2I 把低置信度模型输出导入人工复核的文档 AI、身份核验和理赔自动化软件团队；这些复核多用于 KYC、发票或保险理赔决策
  wedge: >-
    一个可信人工复核总控台：导入 MTurk 风格任务，路由到获批供应商或专家池，叠加金标任务和反 LLM 质检，再把标准化输出和溯源信息写回 Ground Truth 或 A2I
  whyNowCatalyst: >-
    Amazon 在 7 月 30 日停止接收新客户，并明确表态不会再上新功能，逼着 ML 团队现在就把迁移、质量和溯源问题解决掉，不能再把 MTurk 当作稳定的后台依赖。
  ventureScalePath: >-
    先做 AWS 原生人工复核的迁移与控制层，再扩到跨云标注、实时异常处理、模型评测、红队数据采集，以及 agent 软件里“可信人工输入”的系统记录层。
solution: >-
  可信人工复核总控台接入 MTurk 任务定义、Ground Truth 任务和 A2I 复核流，把每条工作流翻译成供应商中立的任务结构。团队可以按任务类型、时延、地域、合规等级或专业要求，把工作分发到 BPO、标注公司和内部审核员之间，而不用重写下游 ML 流水线。系统会插入金标任务、一致性抽检、会话遥测和溯源证明，把 LLM 辅助或低质量输出拦在训练集和生产异常队列之外。管理者能看到供应商记分卡、单个通过标签成本，以及当供应商 SLA 或质量掉线时的自动回退路由。时间拉长后，这个产品会变成一切“模型输出 + 可信人工判断”工作流的操作层。
goToMarketSeed:
  firstCustomer: >-
    一家 150-500 人、跑在 AWS 上的身份核验或文档自动化平台，已经把低置信度开户或理赔文档送进 A2I，现在又要在下一家企业客户上线前补上一条后 MTurk 时代的复核路径
  buyingTrigger: >-
    7 月 30 日之后的新模型上线、企业客户正式上线或采购审查，暴露出 MTurk 已经成了新增复核产能上的堵点或脆弱依赖
  currentAlternative: >-
    尽量继续沿用旧的 MTurk 支撑工作流，或者自己把标注供应商、BPO 合同、表格和定制 SageMaker 集成拼起来
  switchingReason: >-
    这套总控台能保住现有 Ground Truth 和 A2I 管线，同时给团队多供应商冗余、可度量的审核员质量，以及单个劳动力供应商通常给不出的审计链。
  pricingHypothesis: >-
    按活跃人工复核工作流收年费平台订阅，再叠加按任务量计费，以及合规模块或专家审核员池的溢价收费
