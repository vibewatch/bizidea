slug: verified-human-loop-switchboard
date: "2026-07-06"
executiveSummary: >-
  可信人工复核总控台，是给仍依赖 MTurk 关联 Ground Truth 或 A2I 工作流的 AWS 原生 AI 软件团队准备的一层迁移与控制平面。最克制的滩头市场，是 150-500 人规模、做身份核验和文档自动化的厂商：它们既卡着 2026 年 7 月 30 日这个新客户接入截止点，又背着受监管审计压力。第一款产品不是新的标注市场，而是一层“保工作流不改接口”的总控台：导入现有 A2I 或 Ground Truth 队列，把任务分发到获批供应商或私有审核员池，叠加金标任务和溯源检查，再把标准化结果写回客户原有 AWS 对象。产品形态、定价基础和销售动作都围着同一个触发器：新客户上线或模型发布，需要新增人工复核产能，但不想把整条 ML 栈重做。研究证明痛点真实、预算讲得通、切口也够清楚，但也明确指出：初始市场很窄，直接供应商、私有审核团队和通用标注平台都是强替代。最关键的反证风险在于，大多数目标客户要么把旧 AWS 工作流继续拖着用，要么直接签一家标注厂商，导致对“中立叠加层”的需求不够大。接下来 12 个月必须尽快证明三件事：工作流导入能产品化、跨供应商 QA 能显著改善验收结果、付费试点能以软件该有的毛利转成生产合同。输入里仍没证实每个目标客户的工作流数量，以及不同队列的付费意愿，因此计划应优先投入共创客户调研，而不是过早拉长产品路线图。
problem:
  - 2026 年 7 月 30 日之后，凡是要新建文档或 KYC 复核工作流的 AWS 原生团队，都不能再把 MTurk 支撑的产能当默认选项；一条队列的变化，就可能在发布前引发任务结构重写、供应商重采和 QA 逻辑重建。
  - 直接签供应商、搭私有审核团队或上通用标注平台，都能给出审核员或工具，但它们很难同时保住 Ground Truth 或 A2I 的连续性，又横向比较多家审核员池的质量与溯源。
solution:
  - 把一条 Ground Truth 或 A2I 工作流导入供应商中立的任务结构，以影子模式把任务分发到获批私有团队或供应商池，再把验收通过的结果与溯源信息写回客户现有 manifest 或 loop object。
  - 用金标任务、一致性抽检、反 LLM 质检和回退路由，把客户买到的价值从“替代劳动力”抬到“连续性 + 可量化质量”。
whyWeWin:
  - 我们不是去和成熟标注厂商拼劳动力供给，也不是去做一个大而全的工作台，而是卡在最痛的一道边界上：买方眼下就得保住一条受监管的 A2I 或 Ground Truth 队列，还不能改下游接口。
  - 每迁一条工作流，任务结构翻译、按任务类沉淀的供应商基准，以及溯源策略模板都会一起滚厚；这些能力横跨多家供应商，直接供应商和通用工具都很难自然积累出来。
strategicChoices:
  beachhead: 有真实 A2I 或 Ground Truth 队列的 AWS 原生身份核验和文档自动化软件公司，尤其是低置信度开户、KYC 或关键文档复核场景
  wedgeRationale: 这批客户已经有人工复核体量、受监管的数据敏感度和临近上线的堵点，所以保住一条工作流，比做横向标注平台或去追低紧迫度训练数据场景更快跑出证据。
  sequencingRationale: 先把一条工作流导入、影子模式路由和可逆写回做扎实，因为研究已经说明集成断裂和信任是落地最大摩擦；在渠道成型前，先靠创始人主导销售去拿有近端上线触发器的团队；在扩销售前，先补集成和 QA 深度，因为可复制的切换上线速度比功能广度更要命。
  notYet:
    - 把新的劳动力市场或托管复核服务当主打产品
    - 在尚未证明 AWS 工作流保真之前，就承诺多云对等或完整标注工作台
    - 在 KYC 和文档复核模板尚未反复转化前，就过早扩到理赔裁决、RLHF 或 agent 评测工作流
market:
  tam: "$72.0M (研究估算：全球约 400 支持续跑文档、身份或理赔人工复核项目的软件团队 × ~$180k 年度控制平面 ACV)"
  sam: "$25.2M (研究估算：约 140 个 AWS 优先滩头账户，更可能用 Ground Truth 或 A2I 跑受监管文档工作流 × ~$180k ACV)"
  som: "$5.4M (第 3 年可触达情形：24 个客户，迁移、路由、QA 和合规模块叠加后，单客混合年价值约 ~$225k)"
  segments:
    - 具备低置信度开户或 KYC 复核闭环的 AWS 原生身份核验与文档自动化平台
    - 需要可审计异常复核、但可以在首个文档复核模板跑通后再跟进的 AWS 原生理赔自动化厂商
  buyingProcess: >-
    推动交易的人，通常是守着线上复核队列的 ML 平台负责人或数据运营负责人；真正拍板的，则多半是 VP Engineering、AI 产品 GM 或 AI 平台负责人。一旦模型发布、企业客户正式上线或采购审查把 MTurk 或单一众包供应商暴露成新增产能上的不可接受依赖，单子就会被提前拉动。
product:
  mvp: >-
    MVP 先导入一条 Ground Truth 或 A2I 工作流，把它映射到供应商中立的任务结构，以影子模式把任务发到 2-3 个获批审核员池，叠加金标任务和溯源检查，再把验收通过的结果写回现有 AWS 工作流对象。它刻意不做完整标注工作台、多云支持，也不碰大而全的训练数据管理。
  sixMonth: 第一套文档复核模板的 A2I / Ground Truth 打包导入、供应商记分卡、可逆切换上线，以及面向获批审核员池的可审计溯源导出。
  twelveMonth: 按任务类别补齐私有审核团队与供应商池策略模板，在 SLA 或质量跌线时启用生产级回退路由，并提供跨供应商的单次验收成本、时延和缺陷漏出率视图。
  twentyFourMonth: 从 AWS 迁移层扩到更广的“可信人工输入”控制平面，覆盖理赔队列、跨云复核路径，以及相邻的模型评测或异常处理工作流。
  keyBets:
    - 打包导入能在不改下游代码的前提下，于 45 天内跑出首个可用结果
    - 买方愿意为工作流连续性、溯源和供应商基准付费，而不是再买一个通用标注界面
    - 验收通过率和返工改善能快到足以在大厂把类似 QA 功能打包前，把试点转成正式合同
gtm:
  wedge: 先卖一单固定范围的迁移 + QA 试点，围绕一条受监管的 A2I 或 Ground Truth 工作流，从影子模式起步；只有在 SLA、质量和审计条件都过线后，才转生产切换上线。
  channels:
    - 创始人主导外呼，直打 AWS 原生身份、文档和理赔软件厂商里的 ML 平台负责人、数据运营负责人和 AI 产品 GM
    - 通过已经在做 Textract、Ground Truth 或 A2I 集成的 AWS 实施伙伴和文档 AI 顾问，引荐共创客户
    - 联合愿意接入中立路由层、而不是强推单一锁定的标注厂商和 BPO
  funnelTargets: "目标账户->合格需求沟通 35-45%，合格需求沟通->付费迁移试点 25-35%，付费试点->生产 60%+，生产账户->12 个月内第二条工作流 50%+"
  pricing: >-
    按活跃、受治理的人工复核工作流收年费订阅，再叠加复核任务量计费，以及溯源 / 合规模块溢价；第一笔单子应该是 $25k-$50k 的固定范围迁移试点，随后转成约 $120k-$180k 的年平台价值，覆盖 2-4 条活跃工作流。这样更贴合买方现有“工作流软件 + 审核员支出”的预算方式，而不是按席位收费。
businessModel:
  revenueStreams:
    - 按活跃、受治理工作流计收年费平台订阅
    - 按复核任务量计费，以及专家池 / 区域受限审核员池的附加收费
    - 合规、溯源留存和供应商基准分析模块
  unitOfValue: 一条被路由、QA 和溯源策略治理的活跃人工复核工作流
  targetGrossMarginPct: 72
  expansionLevers:
    - 在同一客户内加更多复核队列、文档类型和审核员池
    - 第一条工作流上线后，向上卖溯源留存、合规报表和供应商基准分析
    - 从生产异常复核扩到标注、模型评测和跨云人工输入工作流
strategyMap:
  northStarMetric: 在总控台上稳定跑、且具备完整溯源与约定 SLA / 质量策略的生产人工复核工作流数量
  inputMetrics:
    - 从导出工作流到影子模式首个可用结果的时间
    - 付费试点转生产的转化率
    - 相比基线供应商配置的标签验收通过率
    - 缺陷漏进下游训练或异常队列的比例
    - 生产账户内第二条工作流的扩张率
  moatsToBuild:
    - 面向 Ground Truth、A2I 和旧 MTurk 任务模式的工作流任务结构翻译库
    - 按任务类别、时延带和验收结果沉淀的跨供应商基准数据集
    - 面向受监管文档复核场景的溯源图谱和 QA 策略模板
  killCriteria:
    - 前 10 个合格目标账户里，不到 3 家明确确认未来 12 个月内至少有 2 条高风险或新增 AWS 人工复核工作流
    - 前 2 个共创客户部署仍需要改客户下游代码，或 45 天内跑不到影子模式首个可用结果
    - 到第 15 个月，前 4 个付费试点里不到 2 个能转成 $120k+ 年化价值的生产合同
  mermaid: |
    flowchart LR
      Wedge[AWS review workflow migration wedge] --> MVP[Import plus shadow routing MVP]
      MVP --> Proof[Cutover plus QA and provenance proof]
      Proof --> Expansion[More workflows, vendors, and clouds]
investorMemo:
  verdict:
    call: 观察
    conviction: 近端痛点很强、切口也克制，但市场狭窄，“中立叠加层”这件事还得靠客户证据说话。
    whyBelieve: 这家公司卡的是一个具体迁移触发点——AWS 原生 AI 团队已经在为复核劳动力、工作流软件和 QA 掏钱，但还没有谁真正占住“现有 Ground Truth / A2I 流里的多供应商连续性 + 溯源”。
    whyDoubt: 买方也可能觉得老 AWS 维护模式、单一标注供应商或内部私有审核团队已经“够用”，那这门生意在证明自己能跳出小众场景前，就可能先撞上需求天花板。
    nextDiligence: 在按风投级扩张下注前，先用 8-10 个目标账户把工作流库存、试点定价和试点转生产转化率摸清。
  firstCustomer:
    title: AWS 原生身份核验厂商里的 ML 平台负责人
    profile: 一家 200-400 人公司，用 Textract 和 A2I 复核低置信度开户文档；眼下要配合新企业客户上线，因此既需要更多人工复核产能，也需要更强的溯源能力。
    trigger: MTurk 截止之后，新客户正式上线或模型刷新把现有复核路径暴露成“被卡住、太脆弱，或不适合机密文档”。
    buyer: VP Engineering 或 AI 平台负责人
    initialContract: 先签一单 $25k-$50k 的试点，导入并以影子模式跑一条 A2I 队列；等工作流切到生产、再加更多队列后，转成 $120k-$180k 的年度合同。
  mustBeTrue:
    - 至少有一个滩头细分里，每个目标客户都有 2 条以上正在运行或即将上线的 AWS 人工复核工作流，痛到值得现在就单列预算
    - Ground Truth 或 A2I 的打包导入，能在 45 天内保住下游接口并跑出首个可用结果
    - 跨供应商路由 + QA 的确能提高验收通过率，或明显降低返工，足以替代一次性供应商管理
    - 超过一半的付费试点能转成 $120k+ 的生产合同，说明买方更愿意要中立控制平面，而不是直接换一家供应商
    - 至少 40% 的生产账户能在 12 个月内扩到第二条工作流，证明公司不是一次性迁移项目
  diligenceQuestions:
    - 一个典型滩头账户，到底在跑多少条 Ground Truth 或 A2I 工作流、多少复核任务、多少审核员池？
    - 哪类队列——KYC 开户、文档抽取异常，还是理赔复核——最容易触发预算，缺陷成本也最高？
    - 导入器能不能保住 manifest、loop object 和下游自动化，而不需要客户改代码？
    - 目标买方为什么会选一个中立叠加层，而不是直接用 Scale、Toloka、TELUS、HumanSignal 或内部私有审核团队？
    - 第一笔单子最终由哪位高管签字？预算又来自哪条现有科目？
    - 目标工作负载里，有多大比例必须留在私有或区域受限审核员池里，从而削弱“广义多供应商路由”的价值？
operatingAssumptions:
  - assumption: 目标客户愿意在现有审核员支出之上，再为一层中立控制平面付费，而不只是把量切给某一家供应商。
    basis: research.yaml
    validationTest: 在前 8 个合格机会里，至少拿下 4 个付费试点，而且采购阶段同时存在直接供应商备选。
    decisionImpact: 如果不成立，就把定位改成“供应商赋能”或托管迁移服务，而不是独立软件层。
  - assumption: 第一批 A2I 和 Ground Truth 模板，每个账户都能用不到 2 个工程师周的定制工作量完成部署。
    basis: 经验判断
    validationTest: 用统一集成部署手册，完成前 3 个共创客户部署，并把每个账户的定制工作压在 2 个工程师周以内。
    decisionImpact: 如果不成立，就把切口继续缩到单一工作流家族，或者接受更服务化、毛利更低的模型。
  - assumption: 在理赔或更泛文档处理之前，KYC 和开户文档队列会先跑出最强的付费意愿。
    basis: idea.yaml
    validationTest: 对比至少 3 个 KYC / 文档机会和 3 个理赔机会在缺陷成本、上线紧迫度和试点成交率上的差异。
    decisionImpact: 如果不成立，就把滩头改去那个预算释放更快的队列类型，再扩大外呼。
  - assumption: 相比客户当前供应商配置，溯源和 QA 控制至少能把标签验收通过率提高 15%，或把返工压低 15%。
    basis: research.yaml
    validationTest: 在前 2 个试点里，至少对 2 个审核员池跑同一套金标集对比，并测量验收、返工和缺陷漏出的变化幅度。
    decisionImpact: 如果不成立，核心差异化就会被削弱，公司只能更重地押在迁移速度上，甚至要重审产品命题。
  - assumption: 只要审计链和策略控制足够明确，安全与合规团队会批准把机密工作路由到获批私有团队或供应商池。
    basis: research.yaml
    validationTest: 在至少 2 个共创客户试点里，于生产切换上线前拿到关于路由策略和溯源产物的书面安全签字。
    decisionImpact: 如果不成立，产品就得先缩到非敏感工作负载，或在放大前补更深的策略与证明能力。
experimentRoadmap:
  - horizon: "0-90 天"
    experiment: 访谈 20 个目标账户，量清在跑的 Ground Truth / A2I 工作流、被卡住的上线项目，以及当前审核员结构。
    hypothesis: 20 个目标账户里，至少 8 家在未来 12 个月有 2 条以上高风险或新增的受监管人工复核工作流。
    successMetric: 至少 8 个合格账户，且每个都能说清具体工作流、上线触发器、当前替代方案和高管发起人。
    owner: 创始人/CEO
  - horizon: "0-90 天"
    experiment: 为一条 Textract 或 A2I 文档复核流程做出第一版导入器和可逆写回路径。
    hypothesis: 打包导入能在 30 天内、不改下游代码地跑出影子模式结果。
    successMetric: 1 家共创客户在项目启动后 30 天内看到线上影子路由输出，且原有 AWS 对象被完整保留。
    owner: 创始工程师
  - horizon: "0-90 天"
    experiment: 在一条 KYC 或文档复核队列上，让 3 个获批审核员池围绕同一组金标集和 QA 策略跑对比。
    hypothesis: 跨供应商路由 + 金标策略，能把验收通过率提升至少 15%，或把返工至少压低 15%。
    successMetric: 在验收、返工或缺陷漏出率上，拿到 15%+ 的可归档质量改进。
    owner: 质检/溯源负责人
  - horizon: "3-6 个月"
    experiment: 签下 3 个付费迁移试点，并把切换上线条件、目标 SLA 和生产决策日期写清。
    hypothesis: 即使还没正式切生产，只要迁移风险和可审计性是眼前堵点，买方就愿意先付费。
    successMetric: 3 个付费试点，每个单价至少 $25k，且都带明确的生产决策日期。
    owner: 创始人/CEO
  - horizon: "6-12 个月"
    experiment: 把前 2 个付费试点转成生产，测量切换上线时间、验收通过率和第二条工作流拉动。
    hypothesis: 试点证据足够强，能让至少一半付费试点转成 $120k+ 的年度合同。
    successMetric: 2 个生产客户、45 天以内完成切换上线，且至少拿到 1 个第二条工作流扩张需求。
    owner: 解决方案/集成工程师
  - horizon: "6-12 个月"
    experiment: 签 3 个供给或实施伙伴，验证伙伴带来的账户成交速度是否快于冷启动外呼。
    hypothesis: AWS 顾问公司和审核员供应商能把商机池放大，但不会把公司做成转售商。
    successMetric: 签下 3 个合作伙伴，并通过伙伴带来 2 个试点，销售周期不长于创始人直销试点。
    owner: 生态合作/供应商运营负责人
  - horizon: "12-18 个月"
    experiment: 在首批生产账户里，从一条队列扩到第二条工作流或第二个审核员池，并尽量复用核心模板。
    hypothesis: 账户内扩张足够强，能证明公司不是一次性迁移项目。
    successMetric: 首次上线后 12 个月内，40%+ 的生产账户采用第二条工作流或第二条供应商路径。
    owner: 创始人/CEO
operations:
  - 维护一份获批审核员名单，按任务类别打上数据敏感度标签、SLA 阈值和回退路由规则。
  - 每次新工作流模板进生产前，先跑金标校准和供应商记分卡。
  - 第一天就把 AWS manifest 和 loop object 留作系统记录层，并把溯源信息导出到客户数据仓或治理工具，而不是强推一个新工作台。
  - 和能提供私有或专家审核员池、但不抢客户关系的 AWS 顾问公司和标注厂商共销。
team:
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 亲自盯共创客户销售、供应商关系和范围纪律，在可复制销售说法跑通前，先围住一条最痛的工作流。
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 负责导入器、路由引擎、QA 策略层，以及把结果写回 Ground Truth / A2I。
  - role: 解决方案/集成工程师
    startTiming: 第 3 个月
    rationale: 把部署时间压下来，把导入流程模板化，别让定制集成把产品工程吞掉。
  - role: 质检/溯源负责人
    startTiming: 第 6 个月
    rationale: 把金标任务、一致性策略和审计轨迹逻辑沉淀成可复用模块，支撑生产切换上线和可量化质量主张。
  - role: 生态合作/供应商运营负责人
    startTiming: 第 9 个月
    rationale: 在首个模板转正后，补齐审核员供给覆盖、基准纪律和伙伴带单商机池。
milestones:
  - horizon: 0-12 个月
    items:
      - 交付首个 A2I / Ground Truth 文档复核模板的打包导入、影子模式路由和可逆切换上线。
      - 签下 6-8 家共创客户，拿下 3-4 个付费试点，并把 2 个客户转到生产。
      - 在 2 个生产客户上证明：45 天内跑出首个可用结果，且不需要改下游代码。
      - 发布第一版面向 KYC / 文档复核的供应商基准库和溯源策略库。
  - horizon: 12-24 个月
    items:
      - 扩到 10-15 个生产客户，并在早期账户里稳定跑出第二条工作流扩张。
      - 按任务类别补齐私有审核团队策略、合规报表和基于 SLA 的回退路由。
      - 让伙伴带来的试点成为新增商机池里的有意义份额。
      - 测试第二个垂直场景，比如理赔自动化，但不放弃 AWS 优先定位。
  - horizon: 24-36 个月
    items:
      - 在文档、身份和理赔复核场景里，做到 20-24 个生产客户。
      - 如果扩张需求被验证，就把控制平面延到跨云复核路由或相邻模型评测工作流。
      - 把总控台的基准数据和溯源策略，做成受监管人工输入工作流里的默认证据层。
risks:
  - risk: 目标客户直接用一家标注厂商或内部私有审核团队把问题解决掉，不会再为中立叠加层买单。
    likelihood: High
    impact: High
    mitigation: 只卖给已经存在明确上线触发器，且真的需要多供应商或合规能力的机会；在试点里把基准价值或冗余价值跑出来。
  - risk: 工作流导入滑向定制服务，击穿毛利和部署假设。
    likelihood: High
    impact: High
    mitigation: 前 12 个月只做少量固定工作流模板，边缘情况直接拒掉，并死盯每个部署消耗的工程师周数。
  - risk: QA 和溯源控制并不能比现有配置跑出可量化的标签质量提升。
    likelihood: Medium
    impact: High
    mitigation: 在切换上线前先跑同一套金标集测试；只有在能证明验收、返工或缺陷改善的任务类型上，才继续扩大。
  - risk: AWS 或头部标注厂商补上足够强的路由、QA 或溯源能力，压缩差异化空间。
    likelihood: Medium
    impact: Medium
    mitigation: 坚持供应商中立，支持私有团队和多供应商工作流，并持续累积单一供应商看不到的基准数据与任务结构映射。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5-3.5M"
  runwayMonths: 18
  useOfFundsSummary: "用 18 个月把首批 A2I 和 Ground Truth 迁移模板打包成产品，证明 2-3 个生产客户和可复制的试点转化，搭出溯源与供应商基准引擎，并在不过度扩成大而全标注平台的前提下，建立第一批供给与实施伙伴动作。"
