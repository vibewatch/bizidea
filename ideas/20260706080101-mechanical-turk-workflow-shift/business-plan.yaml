slug: verified-human-loop-switchboard
date: "2026-07-06"
executiveSummary: >-
  Verified human-loop switchboard is a migration and control plane for AWS-native
  AI software teams that still depend on MTurk-linked Ground Truth or A2I
  workflows. The disciplined beachhead is 150-500 person identity-verification
  and document-automation vendors with low-confidence onboarding or KYC queues,
  because they face both a July 30, 2026 onboarding deadline and regulated audit
  pressure. The first product is not another annotation marketplace; it is a
  workflow-preserving switchboard that imports one existing A2I or Ground Truth
  queue, routes work across approved vendor or private reviewer pools, applies
  gold-task and provenance checks, and writes normalized outputs back into the
  customer's existing AWS objects. That product, pricing basis, and sales motion
  are aligned around one buying trigger: a new customer launch or model rollout
  that needs fresh human-review capacity without re-platforming the rest of the
  ML stack. Research supports real pain, believable budget, and a differentiated
  wedge, but it also shows a genuinely narrow initial market with strong
  substitutes in direct vendors, private workforces, and general annotation
  platforms. The largest disconfirming risk is that most target accounts either
  keep legacy AWS workflows running longer than expected or solve the problem
  with a single annotation vendor, leaving too little demand for a neutral
  overlay. The first 12 months therefore need to prove three things quickly:
  workflow import can be productized, cross-vendor QA materially improves
  accepted-label outcomes, and paid pilots convert to production contracts at
  software-like gross margins. Exact workflow counts per target logo and
  willingness to pay by queue type remain unproven in the inputs, so the plan
  prioritizes design-partner discovery before broad roadmap expansion.
problem:
  - After July 30, 2026, AWS-native teams launching new document or KYC review workflows cannot treat MTurk-backed capacity as a default, so a single queue change can trigger schema rewrites, new vendor procurement, and new QA logic before release.
  - Direct-vendor contracts, private workforces, and generic labeling platforms can supply reviewers or tooling, but they do not preserve Ground Truth or A2I continuity while benchmarking quality and provenance across multiple reviewer pools.
solution:
  - Import one Ground Truth or A2I workflow into a vendor-neutral schema, shadow-route work across approved private or vendor pools, and write accepted outputs plus provenance back into the customer's existing manifests or loop objects.
  - Enforce gold tasks, consensus sampling, anti-LLM QA checks, and fallback routing so the customer buys continuity and measurable quality instead of just replacement labor.
whyWeWin:
  - We land at the narrow workflow boundary where buyers feel immediate pain keeping one regulated A2I or Ground Truth queue live without downstream rewrites instead of trying to outcompete established annotation vendors on labor supply or broad workspace features.
  - Each migrated workflow compounds a moat in schema translation, supplier performance benchmarks by task class, and provenance policy templates that direct vendors and generic tools do not accumulate across multiple suppliers.
strategicChoices:
  beachhead: AWS-native identity-verification and document-automation software companies with live A2I or Ground Truth queues for low-confidence onboarding, KYC, or critical document review
  wedgeRationale: This segment already has human-review volume, regulated data sensitivity, and imminent launch blockers, so one preserved workflow can create proof faster than selling a horizontal annotation platform or chasing lower-urgency training-data use cases.
  sequencingRationale: Start with one workflow import, shadow routing, and reversible write-back because research shows integration breakage and trust are the adoption bottlenecks; sell founder-led to teams with a near-term launch trigger before building partner channels; hire integration and QA depth before scaling sales because repeatable cutover speed matters more than feature breadth.
  notYet:
    - Build a new labor marketplace or managed-review service as the primary offer
    - Offer multi-cloud parity or a full annotation workspace before AWS workflow preservation is proven
    - Expand into claims-specific adjudication, RLHF, or agent-evaluation workflows before KYC and document-review templates convert repeatedly
market:
  tam: "$72.0M (research estimate: ~400 global target software teams with persistent document, ID, or claims human-review programs at ~$180k annual control-plane ACV)"
  sam: "$25.2M (research estimate: ~140 AWS-first beachhead accounts likely using Ground Truth or A2I for regulated document workflows at ~$180k ACV)"
  som: "$5.4M (year-3 reachable case: 24 customers at ~$225k blended annual value after migration, routing, QA, and compliance modules)"
  segments:
    - AWS-native identity-verification and document-automation platforms with low-confidence onboarding or KYC review loops
    - AWS-native claims-automation vendors that need auditable exception review but can follow after the first document-review template is proven
  buyingProcess: >-
    The champion is usually the Head of ML Platform or data-operations lead who
    owns the live review queue, while the economic buyer is the VP Engineering,
    GM of AI Products, or Head of AI Platform. The deal gets pulled forward when
    a model rollout, enterprise go-live, or procurement review exposes MTurk or
    a single crowd supplier as an unacceptable dependency for new capacity.
product:
  mvp: >-
    MVP imports one Ground Truth or A2I workflow, maps it to a vendor-neutral
    schema, routes tasks to 2-3 approved reviewer pools in shadow mode, applies
    gold-task and provenance checks, and writes accepted outputs back into the
    existing AWS workflow objects. It deliberately excludes a full annotation
    workspace, multi-cloud support, and broad training-data management.
  sixMonth: Packaged A2I and Ground Truth import for the first document-review template, vendor scorecards, reversible cutover, and audit-ready provenance exports for approved reviewer pools.
  twelveMonth: Add private workforce and vendor-pool policy templates by task class, production fallback routing on SLA or quality breaches, and benchmarking views showing cost per accepted review, latency, and defect escape rate across suppliers.
  twentyFourMonth: Expand from AWS migration into a broader verified human-input control plane spanning claims queues, cross-cloud review paths, and adjacent model-evaluation or exception-handling workflows.
  keyBets:
    - A packaged import can reach first value in under 45 days without downstream code changes
    - Buyers will pay more for workflow continuity, provenance, and vendor benchmarking than for another generic labeling interface
    - Accepted-label rate and rework improvement can be measured quickly enough to convert pilots before incumbents bundle similar QA features
gtm:
  wedge: Sell a fixed-scope migration and QA pilot for one regulated A2I or Ground Truth workflow, beginning in shadow mode and converting to production cutover once SLA, quality, and audit criteria are met.
  channels:
    - Founder-led outbound to Heads of ML Platform, data-operations leaders, and AI product GMs at AWS-native identity, document, and claims software vendors
    - Design-partner introductions through AWS implementation partners and document-AI consultancies already integrating Textract, Ground Truth, or A2I
    - Annotation vendors and BPO partners that want to participate in a neutral routing layer instead of forcing single-vendor lock-in
  funnelTargets: "Target account->qualified discovery 35-45%, qualified discovery->paid migration pilot 25-35%, paid pilot->production 60%+, production account->second workflow within 12 months 50%+"
  pricing: >-
    Annual subscription priced by active governed human-review workflows, plus
    usage fees on reviewed task volume and premium provenance or compliance
    modules; the first sale should be a $25k-$50k fixed-scope migration pilot
    that converts to roughly $120k-$180k annual platform value for 2-4 active
    workflows, matching how buyers already budget for workflow software and
    reviewer spend rather than seats.
businessModel:
  revenueStreams:
    - Annual platform subscription by active governed workflow
    - Usage fees on reviewed task volume and premium expert or region-constrained pools
    - Compliance, provenance-retention, and vendor-benchmark modules
  unitOfValue: Active human-review workflow governed by routing, QA, and provenance policy
  targetGrossMarginPct: 72
  expansionLevers:
    - Add more review queues, document types, and reviewer pools within an existing account
    - Upsell provenance retention, compliance reporting, and vendor-benchmark analytics after the first workflow is live
    - Expand from production exception review into labeling, model evaluation, and cross-cloud human-input workflows
strategyMap:
  northStarMetric: Number of production human-review workflows running through the switchboard with full provenance and agreed SLA or quality policy
  inputMetrics:
    - Time from workflow export to shadow-mode first value
    - Paid pilot to production conversion rate
    - Accepted-label rate versus baseline supplier setup
    - Defect escape rate into downstream training or exception queues
    - Second-workflow expansion rate inside production accounts
  moatsToBuild:
    - Workflow-schema translation library for Ground Truth, A2I, and legacy MTurk task patterns
    - Cross-vendor benchmark dataset by task class, latency band, and acceptance outcome
    - Provenance graph and QA-policy templates for regulated document-review workflows
  killCriteria:
    - Fewer than 3 of the first 10 qualified target accounts confirm at least 2 at-risk or net-new AWS human-review workflows within the next 12 months
    - The first 2 design-partner deployments require downstream code rewrites or take longer than 45 days to reach shadow-mode first value
    - Fewer than 2 of the first 4 paid pilots convert to production at $120k+ annualized value by month 15
  mermaid: |
    flowchart LR
      Wedge[AWS review workflow migration wedge] --> MVP[Import plus shadow routing MVP]
      MVP --> Proof[Cutover plus QA and provenance proof]
      Proof --> Expansion[More workflows, vendors, and clouds]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong near-term pain and a disciplined wedge, but the market is narrow and the neutral-overlay thesis still needs customer proof.
    whyBelieve: The company attacks a concrete migration trigger where AWS-native AI teams already spend on review labor, workflow software, and QA, yet no incumbent clearly owns multi-vendor continuity plus provenance inside existing Ground Truth and A2I flows.
    whyDoubt: Buyers may accept legacy AWS maintenance mode, a single annotation vendor, or an internal private workforce as good enough, which would cap demand before the company proves expansion beyond this niche.
    nextDiligence: Validate workflow inventory, pilot pricing, and pilot-to-production conversion with 8-10 target accounts before underwriting venture-scale expansion.
  firstCustomer:
    title: Head of ML Platform at an AWS-native ID verification vendor
    profile: A 200-400 person company using Textract and A2I to review low-confidence onboarding documents, with a new enterprise launch that requires more human-review capacity and tighter provenance.
    trigger: A new customer go-live or model refresh after the MTurk cutoff exposes the current review path as blocked, fragile, or non-compliant for confidential documents.
    buyer: VP Engineering or Head of AI Platform
    initialContract: $25k-$50k pilot to import and shadow-run one A2I queue, converting to a $120k-$180k annual contract when the workflow cuts over to production and additional queues are added.
  mustBeTrue:
    - At least one beachhead segment has 2 or more live or near-term AWS human-review workflows per logo that are painful enough to budget around now
    - A packaged Ground Truth or A2I import can preserve downstream interfaces and reach first value in under 45 days
    - Cross-vendor routing plus QA improves accepted-label rate or reduces rework enough to justify replacing one-off vendor management
    - More than half of paid pilots convert to $120k+ production contracts because buyers prefer a neutral control plane over direct-vendor substitution
    - At least 40% of production accounts expand to a second workflow within 12 months, proving the company is not a one-off migration project
  diligenceQuestions:
    - How many active Ground Truth or A2I workflows, reviewed tasks, and reviewer pools does a typical beachhead account actually run?
    - Which queue type, KYC onboarding, document extraction exceptions, or claims review, produces the fastest budget trigger and highest defect cost?
    - Can the importer preserve manifests, loop objects, and downstream automation without customer-side code changes?
    - Why will a target buyer choose a neutral overlay over Scale, Toloka, TELUS, HumanSignal, or a private internal workforce?
    - Which executive signs first and from which existing budget line does the contract get funded?
    - What share of target workloads must stay in private or region-constrained reviewer pools, limiting the value of broad multi-vendor routing?
operatingAssumptions:
  - assumption: Target accounts will pay for a neutral control plane on top of existing reviewer spend rather than only shifting volume to one vendor.
    basis: research.yaml
    validationTest: Close at least 4 paid pilots from the first 8 qualified prospects while a direct-vendor alternative is also considered in procurement.
    decisionImpact: If false, reposition toward vendor enablement or managed migration services instead of a standalone software layer.
  - assumption: The first A2I and Ground Truth templates can be deployed with less than 2 engineer-weeks of customer-specific work each.
    basis: operator judgment
    validationTest: Complete the first 3 design-partner deployments with a common integration playbook and under 2 engineer-weeks of custom work per account.
    decisionImpact: If false, narrow the wedge to one workflow family or accept a services-heavy model that lowers gross-margin targets.
  - assumption: KYC and onboarding document queues will show the clearest willingness to pay before claims or broader document processing.
    basis: idea.yaml
    validationTest: Compare defect cost, launch urgency, and pilot close rates across at least 3 KYC or document prospects and 3 claims prospects.
    decisionImpact: If false, retarget the beachhead to the queue type with faster budget release before scaling outbound.
  - assumption: Provenance and QA controls can improve accepted-label rate or reduce rework by at least 15% versus the prospect's current supplier setup.
    basis: research.yaml
    validationTest: Run matched gold-set comparisons across at least 2 reviewer pools in the first 2 pilots and measure acceptance, rework, and defect escape deltas.
    decisionImpact: If false, the core differentiation weakens and the company must lean on migration speed alone or reconsider the product thesis.
  - assumption: Security and compliance teams will approve routing confidential work to approved private or vendor pools if the audit trail and policy controls are explicit.
    basis: research.yaml
    validationTest: Get written security sign-off on routing policy and provenance artifacts in at least 2 design-partner pilots before production cutover.
    decisionImpact: If false, the product must narrow to non-sensitive workloads or add deeper policy and attestation features before scale.
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: Interview 20 target accounts to quantify active Ground Truth or A2I workflows, blocked launches, and current reviewer mix.
    hypothesis: At least 8 of 20 target accounts have 2 or more at-risk or net-new regulated human-review workflows in the next 12 months.
    successMetric: 8 or more qualified accounts with named workflow, launch trigger, current alternative, and executive sponsor.
    owner: Founder CEO
  - horizon: "0-90 days"
    experiment: Build the first importer and reversible write-back path for one Textract or A2I document-review flow.
    hypothesis: A packaged import can show shadow-mode results without downstream code changes in under 30 days.
    successMetric: One design partner sees live shadow-routed outputs and preserved AWS objects within 30 days of kickoff.
    owner: Founding eng
  - horizon: "0-90 days"
    experiment: Run a reviewer bake-off across three approved pools using the same gold set and QA policy for one KYC or document-review queue.
    hypothesis: Cross-vendor routing plus gold-task policy can improve accepted-label rate or lower rework by at least 15% versus the incumbent setup.
    successMetric: Documented quality delta of 15% or better on acceptance, rework, or defect escape rate.
    owner: QA or provenance lead
  - horizon: "3-6 months"
    experiment: Close 3 paid migration pilots with explicit cutover criteria, target SLA, and production decision date.
    hypothesis: Buyers will pay before full production cutover if migration risk and auditability are the immediate blockers.
    successMetric: 3 paid pilots signed at $25k or more each with a production go or no-go date.
    owner: Founder CEO
  - horizon: "6-12 months"
    experiment: Convert the first 2 paid pilots to production and measure time to cutover, acceptance rate, and second-workflow pull.
    hypothesis: Pilot evidence is strong enough to convert at least half of paid pilots into $120k or more annual contracts.
    successMetric: 2 production customers, cutover in 45 days or less, and at least one second-workflow expansion request.
    owner: Solutions or integration engineer
  - horizon: "6-12 months"
    experiment: Sign 3 supply or implementation partners and test whether partner-sourced accounts close faster than cold outbound.
    hypothesis: AWS consultancies and reviewer vendors can widen pipeline without turning the company into a reseller.
    successMetric: 3 signed partners and 2 partner-sourced pilots with sales cycles no longer than founder-led pilots.
    owner: Partnerships or vendor ops lead
  - horizon: "12-18 months"
    experiment: Expand the first production accounts from one queue into a second workflow or reviewer pool with the same core templates.
    hypothesis: The account-expansion motion is strong enough to prove the company is more than a one-time migration project.
    successMetric: 40% or more of production accounts adopt a second workflow or supplier path within 12 months of first go-live.
    owner: Founder CEO
operations:
  - Maintain an approved reviewer roster with data-sensitivity tags, SLA thresholds, and fallback routing rules by task class.
  - Run recurring gold-set calibration and vendor scorecards before releasing a new workflow template into production.
  - Preserve AWS manifests and loop objects as the system of record on day one, and export provenance into customer data stores or governance tools instead of forcing a new workspace.
  - Co-sell with AWS consultancies and annotation vendors that can supply private or expert pools without controlling the customer relationship.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own design-partner sales, vendor relationships, and scope discipline around one painful workflow until a repeatable pitch is proven.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the importer, routing engine, QA policy layer, and write-back path into Ground Truth and A2I.
  - role: Solutions or integration engineer
    startTiming: Month 3
    rationale: Reduce deployment time, templatize onboarding, and keep custom integration work from overwhelming product engineering.
  - role: QA or provenance lead
    startTiming: Month 6
    rationale: Turn gold-task, consensus, and audit-trail logic into reusable modules that support production cutover and measurable quality claims.
  - role: Partnerships or vendor ops lead
    startTiming: Month 9
    rationale: Build reviewer-supply coverage, benchmark discipline, and partner-sourced pipeline once the first template converts.
milestones:
  - horizon: 0-12 months
    items:
      - Ship packaged import, shadow routing, and reversible cutover for the first A2I or Ground Truth document-review template.
      - Sign 6-8 design partners, close 3-4 paid pilots, and convert 2 customers to production.
      - Prove first value in under 45 days and no downstream code changes at 2 production accounts.
      - Publish the first vendor benchmark and provenance-policy library for KYC or document review.
  - horizon: 12-24 months
    items:
      - Expand to 10-15 production customers and achieve repeatable second-workflow expansion inside early accounts.
      - Add private-workforce policies, compliance reporting, and SLA-based fallback routing by task class.
      - Make partner-sourced pilots a meaningful share of new pipeline.
      - Test a second vertical such as claims automation without abandoning AWS-first positioning.
  - horizon: 24-36 months
    items:
      - Reach 20-24 production customers across document, identity, and claims review workflows.
      - Extend the control plane into cross-cloud review routing or adjacent model-evaluation workflows if expansion demand is validated.
      - Establish switchboard benchmark data and provenance policies as the default evidence layer for regulated human-input workflows.
risks:
  - risk: Target customers solve the problem with one annotation vendor or an internal private workforce and do not buy a neutral overlay.
    likelihood: High
    impact: High
    mitigation: Sell only where a named launch trigger and multi-vendor or compliance requirement already exists, and prove benchmark or redundancy value during the pilot.
  - risk: Workflow import and onboarding become custom services work that breaks gross-margin and deployment assumptions.
    likelihood: High
    impact: High
    mitigation: Restrict the first 12 months to a small number of fixed workflow templates, reject edge cases, and measure engineer-weeks per deployment obsessively.
  - risk: QA and provenance controls fail to show measurable label-quality improvement over the incumbent setup.
    likelihood: Medium
    impact: High
    mitigation: Run matched gold-set tests before cutover and only scale task classes where the platform can prove acceptance, rework, or defect gains.
  - risk: AWS or a major annotation vendor adds enough routing, QA, or provenance functionality to compress differentiation.
    likelihood: Medium
    impact: Medium
    mitigation: Stay vendor-neutral, support private and multi-supplier workflows, and compound benchmark data and schema mappings that a single supplier does not see.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5-3.5M"
  runwayMonths: 18
  useOfFundsSummary: "18 months to package the first A2I and Ground Truth migration templates, prove 2-3 production customers and repeatable pilot conversion, build the provenance and vendor-benchmark engine, and establish the first supply and implementation partner motions without overbuilding a broader annotation platform."
