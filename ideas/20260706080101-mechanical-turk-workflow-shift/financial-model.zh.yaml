scenarios:
  downside:
    description: "试点转生产慢 1 个季度、单客扩张更弱、导入流程仍偏定制化。"
    y3RevenueK: 2940.0
    y3EbitdaK: -360.0
    cashLowPointK: 280.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop 只有 16，而不是 20。"
      - "混合年价值封顶在约 $205K，而不是逐步靠近研究支撑的 ~$225K。"
      - "由于部署仍过于服务化，期末毛利率只能到 68%。"
  base:
    description: "公司把迁移痛点转成可复制的生产合同，同时仍然只跑到 BP 客户目标的下沿。"
    y3RevenueK: 3615.0
    y3EbitdaK: 50.1
    cashLowPointK: 986.2
    keyAssumptionChanges:
      - "Y1 末 4 个付费客户，Y2 末 10 个，Y3 末 20 个。"
      - "试点收入维持在每客户约 $30K，成熟生产价值逐步靠近研究支持的 ~$225K ARR 锚点。"
      - "只有当集成和 QA 模板可复用后，毛利率才在后期摸到 BP 目标 72%。"
  upside:
    description: "伙伴带单更早起量，第二条工作流和合规模块扩张也更快到来。"
    y3RevenueK: 4225.0
    y3EbitdaK: 430.0
    cashLowPointK: 1080.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop 达到 22，而不是 20。"
      - "通过更快的第二条工作流扩张和溯源模块加购，混合年价值升到约 $235K。"
      - "工作流导入标准化速度快于计划，期末毛利率可到 74%。"
sensitivity:
  - variable: "ARPU"
    downsideCase: "生产合同更接近 $180K ARR，扩张模块加购速度也偏慢。"
    baseCase: "到 Y3，混合年价值逐步靠近 ~$225K。"
    upsideCase: "第二条工作流扩张和合规模块把混合年价值推到 ~$235K。"
    y3RevenueImpactK: -360.0
    cashImpactK: -260.0
  - variable: "CAC"
    downsideCase: "如果仍主要靠创始人外呼拿单，CAC 会升向 $120K。"
    baseCase: "创始人直销和伙伴带单混合后，CAC 稳在约 $96K。"
    upsideCase: "一旦伙伴引荐在试点里占比提升，CAC 可降到约 $80K。"
    y3RevenueImpactK: -120.0
    cashImpactK: -220.0
  - variable: "流失率"
    downsideCase: "如果切口在首次切换上线后显得太窄，月流失率会漂到 2.7%。"
    baseCase: "月流失率维持在 1.8%。"
    upsideCase: "一旦总控台嵌进审计流程，月流失率可改善到 1.2%。"
    y3RevenueImpactK: -170.0
    cashImpactK: -140.0
  - variable: "销售周期"
    downsideCase: "采购和安全审查拖长后，试点转生产整体再慢 1 个季度。"
    baseCase: "付费试点通常在启动后约 1 个季度转生产。"
    upsideCase: "上线触发型单子会把转化压缩到接近 2 个月。"
    y3RevenueImpactK: -420.0
    cashImpactK: -310.0
  - variable: "毛利率"
    downsideCase: "期末毛利率只能到 68%。"
    baseCase: "期末毛利率达到 72%。"
    upsideCase: "期末毛利率达到 74%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -190.0
  - variable: "招聘节奏"
    downsideCase: "在部署复用尚未验证前，提前拉前两位扩张型招聘。"
    baseCase: "招聘继续按 BP 的里程碑节奏卡点推进。"
    upsideCase: "如果伙伴带单更顺，一位 Y3 后期扩张招聘可后置。"
    y3RevenueImpactK: -60.0
    cashImpactK: -200.0
modelDiagram:
  title: "单位经济流转"
  mermaid: |
    flowchart LR
      TargetAccounts[Target AWS-native review teams] --> PaidPilots[Paid migration pilots]
      PaidPilots --> Production[Production governed workflows]
      Production --> Expansion[Second workflow and compliance expansion]
      Expansion --> Revenue[Subscription and usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Runway and cash]
modelSanity:
  - checkName: "收入引擎"
    finding: "基准情形的收入，来自付费客户从 Y1 末的 4 个爬到 Q4Y3 的 20 个，同时单客户混合年价值从 BP 里的生产定价逐步抬向研究支撑的 ~$225K。"
  - checkName: "必须做对的事"
    finding: "工作流导入必须压在大约 2 个工程师周内，试点也必须在 1 个季度内转生产，否则团队规模增速会先跑赢毛利。"
  - checkName: "模型会在哪种情况下失效"
    finding: "如果销售周期慢 1 个季度、同时毛利率卡在 68% 以下，现金就会在伙伴带单起量前被压向下行情形底线。"
  - checkName: "下一轮融资证明点"
    finding: "seed 轮就绪的故事是：到 Q4Y2 做到 10 个付费客户、3 个生产切换上线，以及 70% 毛利率，同时不把导入流程做成服务生意。"
sanityChecks:
  ruleOf40: "Y3 增长率 131.3% + EBITDA 利润率 1.4% = 132.7%"
  burnMultiple: "Y2 burn multiple 约为 0.5x：用约 $698K 的 EBITDA 亏损换来约 $1.35M 的净新增 ARR；Y3 下半年转正。"
  revenuePerFte: "$278K Y3，按期末 13 名 FTE 计（SaaS 对照带宽约为 $200-400K）"
  flags:
    - "基准情形到第 3 年仍需拿下约 140 个 AWS 优先 SAM 账户中的 20 个，市场集中度和执行风险都不低。"
    - "customersEop 既包含付费试点，也包含生产订阅，因此 Y1 和 Y2 早期的“表面客户数”会先跑在纯经常性生产客户之前。"
    - "只有当每个账户的定制部署工作真的能压在 BP 假设的 2 个工程师周以内，毛利率才摸得到 72%。"
    - "Rule of 40 看起来异常漂亮，主要因为 Y3 增速是从很小的 Y2 基数上长出来的，而不是成熟 SaaS 的稳定收入节奏。"
    - "模型把现金近似成 EBITDA，因此实施预付款、审计成本或营运资金时点都可能让真实现金曲线偏离。"
