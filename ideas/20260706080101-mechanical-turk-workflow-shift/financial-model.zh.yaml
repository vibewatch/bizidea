slug: verified-human-loop-switchboard
date: "2026-07-06"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-06] 模型从商业计划日期之后的第一个完整月份起算。"
  - id: A2
    name: "期初现金 / 种子前融资"
    value: "$2.5M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2.5-3.5M + BP fundingAsk runwayMonths 18] 模型取计划融资区间下沿，并在核心验证窗口外再留 6 个月缓冲。"
  - id: A3
    name: "起始付费客户数"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months + BP investorMemo.firstCustomer] 公司从零收入起步，得先拿下付费试点。"
  - id: A4
    name: "付费客户定义"
    value: "任何已经为固定范围迁移试点或年度受治理工作流订阅付费的客户。"
    unit: "definition"
    source: "[BP gtm.wedge + BP businessModel.revenueStreams] customersEop 统计所有已经为试点或生产范围付费的客户。"
  - id: A5
    name: "试点单经济"
    value: "$30K，周期约 2 个月（约 $15K/月）"
    unit: "USD/logo"
    source: "[BP gtm.pricing $25k-$50k fixed-scope migration pilot] 模型取偏低中位价，因为第一笔单子刻意做得很窄。"
  - id: A6
    name: "生产与扩张单经济"
    value: "初始生产年价值约 $180K ARR，并通过更多工作流 + 溯源 / 合规模块，在 Y3 抬到约 $225K 的混合 ARR。"
    unit: "USD/logo/year"
    source: "[BP gtm.pricing $120k-$180k annual platform value + Research market.som 24 customers at ~$225k blended annual value] 模型从 BP 区间内起步，并在退出时靠近研究里的 SOM 锚点。"
  - id: A7
    name: "客户爬坡"
    value: "M12 达到 4 个付费客户，Q4Y2 达到 10 个，Q4Y3 达到 20 个"
    unit: "customersEop"
    source: "[BP milestones 0-12, 12-24, and 24-36 months] 基准情形取第 2 年和第 3 年目标区间下沿，避免把假设做得过满。"
  - id: A8
    name: "收入确认口径"
    value: "期末付费客户数 × 当期每客户混合已实现收入：Y1 为 $15K-$18K/月，Y2 为 $47K-$53K/季度，Y3 为 $55K-$56K/季度。"
    unit: "formula"
    source: "[BP gtm.pricing + BP market.som + Research market.som] 这样能让报表收入直接锚定付费客户和计划定价结构。"
  - id: A9
    name: "毛利率爬坡"
    value: "Y1 为 50%-60%，Y2 为 62%-70%，Y3 为 71%-72%"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 72 + BP operatingAssumptions deployment under 2 engineer-weeks] 早期工作流导入偏服务化，等模板和 QA 策略复用起来后，毛利才会改善。"
  - id: A10
    name: "招聘时间线"
    value: "M1 创始人/CEO 和创始工程师；M4 解决方案工程师；M7 质检/溯源负责人；M10 生态合作负责人；M13 第二位工程师；M16 第一位销售；M19 第三位工程师；M22 运营；M25 第二位解决方案工程师；M28 第二位销售；M31 第二位 QA；M34 第四位工程师。"
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic (lean enterprise infrastructure hiring)] 只有在试点证据开始出现后，团队才逐步加交付和 GTM 产能。"
  - id: A11
    name: "创始人全包薪酬"
    value: "$150K"
    unit: "USD/year"
    source: "[BP team Founder CEO + startup-finance heuristic (U.S. pre-seed enterprise infrastructure compensation band)] 采用偏克制的创始人现金薪酬，含税费和福利。"
  - id: A12
    name: "工程全包薪酬"
    value: "$190K"
    unit: "USD/year"
    source: "[BP team Founding eng + startup-finance heuristic (U.S. pre-seed enterprise infrastructure compensation band)] 对应资深工作流与集成工程人才。"
  - id: A13
    name: "解决方案 / 集成全包薪酬"
    value: "$165K"
    unit: "USD/year"
    source: "[BP team Solutions or integration engineer + startup-finance heuristic (technical implementation hire band)] 覆盖面向客户的部署负责人，但不把团队做成服务编制。"
  - id: A14
    name: "QA / 溯源全包薪酬"
    value: "$155K"
    unit: "USD/year"
    source: "[BP team QA or provenance lead + startup-finance heuristic (domain specialist hire band)] 对应审计轨迹和质量策略负责人。"
  - id: A15
    name: "生态合作 / 销售全包薪酬"
    value: "$170K"
    unit: "USD/year"
    source: "[BP team Partnerships or vendor ops lead + BP gtm.channels + startup-finance heuristic (enterprise GTM hire band)] 含差旅和变量激励，匹配集中式外呼。"
  - id: A16
    name: "G&A / 运营全包薪酬"
    value: "$125K"
    unit: "USD/year"
    source: "[BP operations + startup-finance heuristic (lean finance and vendor-ops hire band)] 覆盖基础财务、供应商导入和合规运营。"
  - id: A17
    name: "薪酬分摊到 P&L"
    value: "创始人 50% 计入 S&M / 25% 计入 R&D / 25% 计入 G&A；工程 100% 计入 R&D；解决方案 40% 计入 S&M / 60% 计入 R&D；QA 20% 计入 S&M / 80% 计入 R&D；GTM 100% 计入 S&M；运营 100% 计入 G&A。"
    unit: "allocation"
    source: "[BP team role rationales + BP operations] 这样能把交付与验证成本映射到职能费用，同时保持清晰。"
  - id: A18
    name: "非薪酬 opex 爬坡"
    value: "S&M / R&D / G&A 的月度非薪酬支出，从 $5K/$8K/$6K 逐步升到 Q4Y3 的 $25K/$17K/$14K。"
    unit: "USD/month"
    source: "[BP operations + startup-finance heuristic (regulated B2B software cloud, travel, legal, and insurance spend)] 模型假设基础设施和合规成本克制但持续上升。"
  - id: A19
    name: "现金转化口径"
    value: "现金变动 = EBITDA"
    unit: "formula"
    source: "[startup-finance heuristic (pre-seed simplification)] 假设资本开支、税、债务偿付和营运资金时点，相对经营现金消耗都不重要。"
  - id: A20
    name: "稳态月流失率"
    value: "1.8%"
    unit: "percent per month"
    source: "[startup-finance heuristic (sticky enterprise workflow infrastructure) + BP gtm.funnelTargets second-workflow expansion] 切换上线后流失应较低，但模型仍比成熟基础设施软件更保守。"
  - id: A21
    name: "基础销售周期"
    value: "约 3-4 个月到付费试点，再用约 1 个季度从试点启动走到生产决策"
    unit: "time"
    source: "[BP experimentRoadmap 3-6 months + BP gtm.wedge + BP investorMemo.mustBeTrue] 公司必须用较短验证周期，把迁移痛点尽快转成年度软件合同。"
  - id: A22
    name: "CAC 口径"
    value: "36 个月销售与市场支出 ÷ 20 个净新增付费客户"
    unit: "formula"
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] 口径覆盖创始人外呼、伙伴引荐和后续 GTM 招聘的完整建设期。"
  - id: A23
    name: "下一轮融资里程碑"
    value: "到 Q4Y2，公司应做到 10 个付费客户、至少 3 个生产切换上线，并有可证明的 45 天内部署能力。"
    unit: "milestone"
    source: "[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + BP product.keyBets first value under 45 days] 这是用来界定 seed 轮就绪证明点的融资锚。"
  - id: A24
    name: "季度薪酬滚动口径"
    value: "Y2-Y3 的薪酬行按季度内真实入职月份计算，而不是只看年末快照。"
    unit: "convention"
    source: "[Headcount column convention + BP team.startTiming] 这样薪酬费用才能和月度招聘爬坡保持一致。"
