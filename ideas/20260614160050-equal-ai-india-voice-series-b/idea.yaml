differentiator: >-
  Most voice-AI products sell a generic agent or consumer assistant and stop at conversation quality. This startup is a
  recovery rail for one regulated workflow, with identity lookups, consent capture, issuance-system writeback, and
  recovery-rate analytics built in from day one. That makes it much harder to replace with a commodity LLM wrapper or a
  basic IVR upgrade because the value comes from resolved exceptions and closed-loop conversion, not just speaking to
  customers.
