topRisks:
  - name: Trust in regulated voice flows
    description: Customers or compliance teams may reject AI-led correction of KYC or consent steps if conversations feel unreliable or opaque.
    mitigation: Start with narrow low-risk correction flows, record structured audit evidence, and escalate uncertain cases to licensed human agents.
  - name: Integration drag
    description: Each insurer or lender may have fragmented core systems and vendor-specific KYC processes that slow deployment.
    mitigation: Package the product as a failed-queue overlay with a small set of high-value connectors before expanding into deeper writeback integrations.
  - name: Incumbent platform squeeze
    description: Large voice platforms or carriers could move down-market once workflow economics become obvious.
    mitigation: Own the recovery dataset, compliance playbooks, and vertical integrations that generic voice stacks do not prioritize.
