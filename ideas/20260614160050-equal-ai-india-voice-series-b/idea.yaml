jobsToBeDone:
  - job: When a customer abandons digital onboarding, help the insurer recover the application in the customer's spoken language so it can still issue the policy without a manual callback chain.
    currentAlternative: Manual callback agents and branch or field-agent follow-up
    successMetric: Percentage-point lift in application-to-issuance conversion
  - job: When identity or consent steps fail for a borrower, help lending operations fix the exact blocker in one guided voice session so they can book the loan faster.
    currentAlternative: SMS nudges, repeat form fills, and agent-assisted rework
    successMetric: Reduction in time-to-complete KYC and drop-off rate
