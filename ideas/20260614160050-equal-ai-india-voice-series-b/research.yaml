  validationPlan:
  - priority: high
    question: What share of app-started insurer and lender applications in the target segment fail specifically at KYC, consent, or document-correction steps?
    evidenceToGather: Three failed-queue exports from mid-market insurers or lenders showing blocker taxonomy, language, and time-to-recovery.
  - priority: high
