  searchedQueries:
  - Find authoritative recent sources on India voice AI adoption, regional-language smartphone usage, and voice-first consumer behavior relevant to financial onboarding. Include primary reports, regulators, and major publishers with URLs.
  - Find authoritative sources on digital onboarding, KYC/video KYC, consent, and identity verification requirements for Indian insurers and lenders. Include RBI, IRDAI, UIDAI, CKYCR, and major consulting or industry analysis URLs.
  - Find sources on Indian insurer and lender onboarding drop-off, call center recovery workflows, and regional language customer service pain points. Prefer BFSI industry reports, insurer/lender case studies, and customer support studies with URLs.
  - Find competitors and substitutes for AI voice automation in Indian BFSI onboarding and customer service, including company product pages and pricing or case-study pages where available. Include URLs.
  - Find official Indian market statistics pages for insurers, NBFCs, internet users, and digital payments adoption relevant to sizing voice onboarding in India.
  - Find accessible current company pages for Yellow.ai, Haptik, Skit.ai, Gnani.ai, and other Indian BFSI voice-AI vendors.
  - Find accessible authoritative sources for India internet users, regional-language internet usage, and voice search or voice assistant behavior.
  - Find accessible sources on UPI and digital payments adoption, smartphone and internet growth, and financial inclusion in India relevant to voice-first onboarding.
