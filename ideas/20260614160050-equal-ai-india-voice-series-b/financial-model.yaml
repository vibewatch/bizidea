fundingAsk:
  round: seed
  amountM: 3.0
  runwayMonths: 36
  milestone: >-
    Compliance-grade MVP live on at least one insurer and one lender queue;
    3+ paid insurer pilots with baseline-vs-pilot conversion data; 2+
    production contracts at $100k+ ACV; one consumer-lender pilot launched
    using the same core recovery rail; repeatable unit economics with
    CAC payback under 6 months demonstrated to support Series A raise
    at or around M18.
  useOfFunds:
    - bucket: Engineering
      amountUsd: 1350000
      percentage: 45
    - bucket: GTM
      amountUsd: 750000
      percentage: 25
    - bucket: "G&A"
      amountUsd: 300000
      percentage: 10
    - bucket: "Buffer (6 mo)"
      amountUsd: 600000
      percentage: 20

scenarios:
  downside:
    description: >-
      Sales cycles extend to 10–12 months; pilot-to-production conversion
      falls to 35%; compliance teams restrict AI-led recovery to narrow
      blocker types, slowing deployments. Year 3 ends at 18 production
      accounts vs 30 in base case.
    y3RevenueK: 1440.0
    y3EbitdaK: 58.0
    cashLowPointK: 2400.0
    keyAssumptionChanges:
      - "Pilot-to-production conversion 35% vs 50% base"
      - "Sales cycle 10–12 months vs 6–9 months base"
      - "18 Y3 customers vs 30 base; 2 fewer Y3 sales hires reduce opex ~$100k"
  base:
    description: >-
      Direct enterprise sales at 50% pilot-to-production conversion;
      6–9 month sales cycles; 30 production accounts at $120k blended ACV
      by Y3 end; company reaches EBITDA break-even in Q1 Y3 and exits
      Y3 at $3.6M ARR run-rate.
    y3RevenueK: 2400.0
    y3EbitdaK: 628.5
    cashLowPointK: 2669.4
    keyAssumptionChanges:
      - "50% pilot-to-production conversion per BP funnelTargets"
      - "6–9 month sales cycle; revenue lead from M6"
      - "30 Y3 customers at $120k ACV; 18-person team at Y3 end"
  upside:
    description: >-
      CPaaS and contact-center partner channel contributes 35% of Y3
      pipeline; CAC compresses as partners pre-qualify accounts; 40
      production accounts reached with slightly higher $125k ACV from
      multi-workflow expansions.
    y3RevenueK: 3000.0
    y3EbitdaK: 900.0
    cashLowPointK: 2600.0
    keyAssumptionChanges:
      - "Partner channel 35% of Y3 pipeline per BP gtm.channels"
      - "Blended CAC compresses to $18k on partner-sourced accounts"
      - "40 Y3 customers; $125k ACV from account expansion per BP expansionLevers"

