modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Queue[Failed-queue account] --> Pilot[Paid pilot 2 mo]
      Pilot --> |50pct convert| Production[Production account]
      Production --> |100-120k ACV| Revenue[Revenue]
      Revenue --> |70pct GM| GrossProfit[Gross profit]
      GrossProfit --> |minus opex| EBITDA[EBITDA]
      EBITDA --> Cash[Cash balance]
      Production --> |30pct expand in 12mo| Expansion[Second workflow]
      Expansion --> Revenue

modelSanity:
  - checkName: Revenue engine
    finding: >-
      Revenue is driven entirely by direct enterprise sales converting
      failed-onboarding queue accounts into $100–120k annual production
      contracts, with pilot billing ($8k/month) bridging the 2-month
      proof period before each production conversion.
  - checkName: Must go right
    finding: >-
      At least 50% of the first 10 pilots must convert to production
      contracts at $100k+ ACV within 6 months, because the base-case
      Y2 revenue ($690k) and Series A narrative both depend on
      demonstrating repeatable conversion before M18.
  - checkName: Model breaks if
    finding: >-
      If sales cycles extend beyond 9 months or pilot-to-production
      conversion falls below 35%, Y3 revenue drops to ~$1,440k and
      the Series A story weakens materially, as shown in the downside
      scenario and sales-cycle sensitivity row.
  - checkName: Next-round proof
    finding: >-
      A Series A at or around M18 is justified when the company shows
      10+ production accounts, $690k+ trailing ARR, CAC payback under
      6 months, and one consumer-lender production workflow live,
      consistent with the base-case Q4Y2 milestones.

sanityChecks:
  ruleOf40: "Y3 growth 248% + EBITDA margin 26% = 274% (high-growth early stage; well above 40 threshold)"
  burnMultiple: >-
    Y1: 0.78x (net burn $235k / net new ARR $300k);
    Y2: 0.14x ($96k / $700k net new ARR). Both well below the 1.5x
    benchmark, reflecting India operating-cost advantage and early
    revenue traction from M6.
  revenuePerFte: "$133k Y3 EOP on 18 FTE; below $200–400k SaaS benchmark but consistent with India-market ACV and INR cost base"
  flags:
    - "Unit economics (LTV/CAC 18.7x, payback 3.6 months) are unusually strong and depend on achieving 70% gross margin at scale — any compliance-heavy customization that inflates COGS per account will compress these ratios materially."
    - "Blended churn of 1.5% monthly (annual ~17%) is conservative but unvalidated; with only 3 customers at Y1 end, a single non-renewal would spike realized churn and hurt Y2 pipeline confidence."
    - "Revenue per FTE of $133k at Y3 end is below the $200–400k SaaS benchmark; the model is deliberately headcount-heavy in Y3 to serve regulated enterprise accounts with compliance QA overhead, but investors may probe this."
    - "Seed of $3M shows 36-month runway because India team costs are modest; the BP states 18-month runway to Series A, meaning the company will likely raise Series A opportunistically around M18 rather than from necessity — model should not be read as requiring a bridge."
    - "Y1 revenue ($123k) is thin and concentrated in 3 customers; any compliance rejection or delayed pilot launch shifts EBITDA by ~$75k and could push the first production proof into Y2."
    - "Customer ramp from 10 (Y2 end) to 30 (Y3 end) requires adding 20 accounts in 12 months — a 3x increase in new-customer velocity that depends on sales team scaling (from 3 to 6 GTM headcount) and partner-channel contribution materializing on schedule."
