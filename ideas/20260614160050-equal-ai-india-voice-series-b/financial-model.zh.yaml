slug: voice-kyc-recovery-layer
date: '2026-06-14'
currency: USD
modelStartMonth: '2026-07'

assumptions:
  - id: A1
    name: 启动生产客户数（第 1 个月）
    value: "0"
    unit: count
    source: "[商业计划执行摘要：模型启动时尚无营收；第 1–3 个月的共创客户为无偿合作]"
  - id: A2
    name: 模型启动时获得的种子融资
    value: "3000"
    unit: K USD
    source: "[商业计划融资需求：$2–4M 种子轮；基础情景使用中间值 $3M]"
  - id: A3
    name: 付费试点合同价值
    value: "25"
    unit: K USD per pilot
    source: "[商业计划投资备忘录·首个客户：试点价值 $20k–$40k；使用中间值 $25k]"
  - id: A4
    name: 月度试点计费率
    value: "8.0"
    unit: K USD per month
    source: "[A3 / 平均试点时长 2 个月 = $25k / 约 3 个月 ≈ $8k/月计费]"
  - id: A5
    name: 生产 ACV——第 1 年和第 2 年
    value: "100"
    unit: K USD per year
    source: "[商业计划 GTM 定价：路径指向约 $120k 混合 ACV；第 1–2 年爬坡期使用 $100k]"
  - id: A6
    name: 生产 ACV——第 3 年
    value: "120"
    unit: K USD per year
    source: "[商业计划市场 SOM：30 家在线客户 × $120k = $3.6M SOM；research.market.som 确认]"
  - id: A7
    name: 季度 ARPU——生产客户（第 1–2 年）
    value: "25"
    unit: K USD per customer per quarter
    source: "[A5 / 4 个季度 = $100k / 4 = 每季度 $25k]"
  - id: A8
    name: 季度 ARPU——生产客户（第 3 年）
    value: "30"
    unit: K USD per customer per quarter
    source: "[A6 / 4 个季度 = $120k / 4 = 每季度 $30k]"
  - id: A9
    name: 平均试点时长
    value: "2"
    unit: months
    source: "[商业计划投资备忘录·首个客户：8–12 周试点 ≈ 约 2 个月]"
  - id: A10
    name: 目标毛利率
    value: "70"
    unit: percent
    source: "[商业计划业务模型目标毛利率：70%；COGS 包括云电话、ASR/TTS API、KYC/身份 API 调用和合规运营开销]"
  - id: A11
    name: 最低基础设施 COGS（未产生营收月份）
    value: "2.0"
    unit: K USD per month
    source: "[创业财务启发式规则：种子阶段语音 AI 产品在有意义的通话量产生之前的云/电话/API 底层成本；有试点后按营收 30% 比例扩展]"
  - id: A12
    name: 首个试点启动月
    value: "M6"
    unit: month
    source: "[商业计划实验路线图：0–90 天 = 共创伙伴外联和合规研讨会；90–180 天 = 首批保险公司试点上线；假设 M6 为首个付费试点启动月]"
  - id: A13
    name: 第 1 年末生产客户数
    value: "3"
    unit: count
    source: "[商业计划里程碑 0–12 个月：3 个付费试点启动，2+ 个生产转化；模型在 M8、M10、M12 各启动一个 2 个月试点周期，至 M12 达到 3 家生产账户]"
  - id: A14
    name: 第 2 年末生产客户数
    value: "10"
    unit: count
    source: "[商业计划里程碑 12–24 个月：可重复生产部署、保险公司账户扩展、首个贷款机构工作流；research.market.sam 表明约 45 家滩头账户可触达]"
  - id: A15
    name: 第 3 年末生产客户数
    value: "30"
    unit: count
    source: "[商业计划市场 SOM：30 家在线客户 × $120k ACV = $3.6M SOM；第 3 年每季度新增 5 家客户]"
  - id: A16
    name: 月度流失率
    value: "1.5"
    unit: percent per month
    source: "[创业财务启发式规则：受监管市场中保守的企业 B2B；年化约 17%；高于典型 SaaS 以反映商业计划风险中标记的合规被拒风险和第一代产品不确定性]"
  - id: A17
    name: 创始工程师年薪
    value: "72"
    unit: K USD per year
    source: "[创业财务启发式规则：资金充裕的印度 B2B 创业公司高级创始工程师；印度卢比等值约 ₹60L；以美元计价保持跨美元投资者模型一致性]"
  - id: A18
    name: 产品与合规负责人年薪
    value: "66"
    unit: K USD per year
    source: "[创业财务启发式规则：具备 RBI/IRDAI 监管经验的高级产品经理；印度市场价格]"
  - id: A19
    name: 方案集成工程师年薪
    value: "48"
    unit: K USD per year
    source: "[创业财务启发式规则：按商业计划团队章节于 M3 加入的中高级集成工程师；印度市场价格]"
  - id: A20
    name: 营收负责人年薪
    value: "72"
    unit: K USD per year
    source: "[创业财务启发式规则：具备 BFSI 垂直经验、按商业计划团队章节于 M6 加入的企业销售负责人；印度市场价格]"
  - id: A21
    name: 客户成功与质量保障运营年薪
    value: "42"
    unit: K USD per year
    source: "[创业财务启发式规则：按商业计划团队章节于 M9 加入的客户成功和质量保障运营专家；印度市场价格]"
  - id: A22
    name: 第 2 年增量招聘混合年薪
    value: "57"
    unit: K USD per year per hire
    source: "[创业财务启发式规则：BD/销售 $72k、工程师 $54k、客户成功 $42k 的混合价格；第 2 年 Q1–Q4 新增 5 名]"
  - id: A23
    name: 第 3 年增量招聘混合年薪
    value: "56"
    unit: K USD per year per hire
    source: "[创业财务启发式规则：工程师 $54k、销售 $72k、产品分析师 $60k、客户成功 $42k、合作伙伴 $60k 的混合价格；第 3 年 Q1–Q4 新增 8 名]"
  - id: A24
    name: 研发非薪酬月度成本
    value: "3.0"
    unit: K USD per month
    source: "[创业财务启发式规则：云基础设施、第三方语音 ASR/TTS/电话 SDK、KYC API 测试、开发工具；第 1 年建设阶段 $2k，第 3 年生产规模 $4k]"
  - id: A25
    name: G&A 非薪酬月度成本
    value: "5.0"
    unit: K USD per month
    source: "[创业财务启发式规则：法务、RBI/IRDAI 合规顾问、会计、办公室、HR；因 research.regulatoryLandscape 指出的受监管工作流合规负担，高于纯 SaaS 基准]"
  - id: A26
    name: 销售与市场非薪酬月度成本
    value: "2.5"
    unit: K USD per month
    source: "[创业财务启发式规则：客户对接出行、BFSI 行业会议、合作伙伴活动赞助；从第 1 年下半年 $1.5k 扩展至第 3 年合作伙伴渠道投入 $5k]"
  - id: A27
    name: 混合 CAC
    value: "25"
    unit: K USD per new customer
    source: "[推算：第 1 年销售与市场支出 $52k / 3 家新客户 = $17k；第 2 年销售与市场支出约 $180k / 7 家新客户 = $26k；混合值 $25k。与印度薪资水平下 6 个月企业销售周期一致。[商业计划 GTM 漏斗目标]]"
  - id: A28
    name: 年度客户 LTV
    value: "467"
    unit: K USD per customer
    source: "[公式：(月度 ARPU × 毛利率) / 月度流失率 = ($10k × 70%) / 1.5% = $7k / 0.015 = $467k；月度 ARPU = A6 / 12 = $10k]"
  - id: A29
    name: CAC 回收期
    value: "3.6"
    unit: months
    source: "[公式：CAC / (月度 ARPU × 毛利率) = $25k / ($10k × 70%) = $25k / $7k = 3.57 个月；[A27, A28]]"

