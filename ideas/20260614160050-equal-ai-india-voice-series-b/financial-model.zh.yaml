fundingAsk:
  round: seed
  amountM: 3.0
  runwayMonths: 36
  milestone: >-
    合规级 MVP 在至少一家保险公司和一家贷款机构队列上线；3 个以上付费保险公司试点，具备基准与试点对比转化数据；2 个以上 $100k+ ACV 的生产合同；一个消费金融贷款机构试点使用相同核心修复通道启动；可重复的单位经济模型，CAC 回收期低于 6 个月，支撑约 M18 的 A 轮融资叙事。
  useOfFunds:
    - bucket: 工程
      amountUsd: 1350000
      percentage: 45
    - bucket: GTM
      amountUsd: 750000
      percentage: 25
    - bucket: G&A
      amountUsd: 300000
      percentage: 10
    - bucket: 缓冲资金（6 个月）
      amountUsd: 600000
      percentage: 20

scenarios:
  downside:
    description: >-
      销售周期延长至 10–12 个月；试点转生产转化率降至 35%；合规团队将 AI 主导修复限制在极窄的障碍类型，拖慢部署。第 3 年末达到 18 家生产账户，低于基础情景的 30 家。
    y3RevenueK: 1440.0
    y3EbitdaK: 58.0
    cashLowPointK: 2400.0
    keyAssumptionChanges:
      - "试点转生产转化率 35%，基础情景为 50%"
      - "销售周期 10–12 个月，基础情景为 6–9 个月"
      - "第 3 年 18 家客户，基础情景 30 家；减少 2 名第 3 年销售招聘，运营费用减少约 $100k"
  base:
    description: >-
      直销企业销售，试点转生产转化率 50%；销售周期 6–9 个月；第 3 年末 30 家生产账户、$120k 混合 ACV；公司在第 3 年 Q1 实现 EBITDA 盈亏平衡，第 3 年末 ARR 运行率达 $3.6M。
    y3RevenueK: 2400.0
    y3EbitdaK: 628.5
    cashLowPointK: 2669.4
    keyAssumptionChanges:
      - "50% 试点转生产转化率，参照商业计划漏斗目标"
      - "6–9 个月销售周期；M6 营收负责人到岗"
      - "第 3 年 30 家客户，$120k ACV；第 3 年末 18 人团队"
  upside:
    description: >-
      CPaaS 和联络中心合作伙伴渠道贡献第 3 年 35% 管道；合作伙伴预筛账户压缩 CAC；达到 40 家生产账户，因多工作流扩展 ACV 略升至 $125k。
    y3RevenueK: 3000.0
    y3EbitdaK: 900.0
    cashLowPointK: 2600.0
    keyAssumptionChanges:
      - "合作伙伴渠道贡献第 3 年 35% 管道，参照商业计划 GTM 渠道"
      - "合作伙伴来源账户混合 CAC 压缩至 $18k"
      - "第 3 年 40 家客户；账户扩展带来 $125k ACV，参照商业计划扩展杠杆"

sensitivity:
  - variable: ARPU
    downsideCase: "$80k ACV（买方在无完整核心集成前拒绝 $100k+ 定价）"
    baseCase: "$120k ACV（含部分账户扩展的混合生产价）"
    upsideCase: "$150k ACV（多工作流扩展解锁高级层）"
    y3RevenueImpactK: -800.0
    cashImpactK: -560.0
  - variable: 试点转生产转化率
    downsideCase: "35% 转化率（合规团队限制 AI 主导修复范围）"
    baseCase: "50% 转化率，参照商业计划漏斗目标"
    upsideCase: "65% 转化率（带对话记录的升级设计早期赢得合规认可）"
    y3RevenueImpactK: -720.0
    cashImpactK: -504.0
  - variable: 销售周期
    downsideCase: "10–12 个月（买方将问题视为联络中心而非营收基础设施）"
    baseCase: "6–9 个月（运营负责人主导，以 ROI 为框架）"
    upsideCase: "3–4 个月（合作伙伴来源、预筛账户）"
    y3RevenueImpactK: -800.0
    cashImpactK: -560.0
  - variable: 毛利率
    downsideCase: "55% 毛利率（深度定制集成推高 COGS；需要更多人工质量保障）"
    baseCase: "70% 毛利率，参照商业计划目标毛利率"
    upsideCase: "75% 毛利率（可复用集成模板降低每账户 COGS）"
    y3RevenueImpactK: 0.0
    cashImpactK: -360.0
  - variable: 流失率
    downsideCase: "每月 3% 流失率（合规变更或集成失败导致续约终止）"
    baseCase: "每月 1.5% 流失率（年化约 17%；针对受监管第一代产品的保守估算）"
    upsideCase: "每月 0.5% 流失率（审计语料库和基准报告推动高续约率）"
    y3RevenueImpactK: -100.0
    cashImpactK: -70.0
  - variable: 合作伙伴渠道
    downsideCase: "第 3 年无合作伙伴贡献（纯直销，CAC 维持 $25k）"
    baseCase: "第 3 年 10% 管道来自 CPaaS/联络中心合作伙伴"
    upsideCase: "35% 第 3 年管道来自合作伙伴，合作伙伴来源账户 CAC $18k"
    y3RevenueImpactK: -400.0
    cashImpactK: -280.0

modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Queue[Failed-queue account] --> Pilot[Paid pilot 2 mo]
      Pilot --> |50pct convert| Production[Production account]
      Production --> |100-120k ACV| Revenue[Revenue]
      Revenue --> |70pct GM| GrossProfit[Gross profit]
      GrossProfit --> |minus opex| EBITDA[EBITDA]
      EBITDA --> Cash[Cash balance]
      Production --> |30pct expand in 12mo| Expansion[Second workflow]
      Expansion --> Revenue

modelSanity:
  - checkName: 营收引擎
    finding: >-
      营收完全由直销企业销售驱动：将失败开户队列账户转化为 $100–120k 年度生产合同，以试点计费（$8k/月）填补每次生产转化前 2 个月的验证期。
  - checkName: 必须做对的事
    finding: >-
      前 10 个试点中至少 50% 必须在 6 个月内转化为 $100k+ ACV 的生产合同，因为基础情景第 2 年营收（$690k）和 A 轮叙事都依赖于在 M18 之前证明可重复转化。
  - checkName: 模型失效情形
    finding: >-
      若销售周期超过 9 个月或试点转生产转化率低于 35%，第 3 年营收将降至约 $1,440k，A 轮融资叙事实质性减弱，如下行情景和销售周期敏感性行所示。
  - checkName: 下轮融资证明
    finding: >-
      约 M18 的 A 轮融资在以下条件下成立：10 家以上生产账户、$690k+ 滚动 ARR、CAC 回收期低于 6 个月，以及一个消费金融贷款机构生产工作流上线，与基础情景第 4 季度第 2 年里程碑一致。

sanityChecks:
  ruleOf40: "第 3 年增长率 248% + EBITDA 利润率 26% = 274%（高速增长早期阶段；远超 40 门槛）"
  burnMultiple: >-
    第 1 年：0.78x（净消耗 $235k / 净新增 ARR $300k）；
    第 2 年：0.14x（$96k / 净新增 ARR $700k）。两者均远低于 1.5x 基准，反映了印度运营成本优势和 M6 起的早期营收牵引。
  revenuePerFte: "第 3 年末 18 人 FTE 下人均营收 $133k；低于 $200–400k 的 SaaS 基准，但与印度市场 ACV 和印度卢比成本基础一致"
  flags:
    - "单位经济模型（LTV/CAC 18.7x，回收期 3.6 个月）异常亮眼，依赖于规模化后实现 70% 毛利率——任何因合规重度定制而推高每账户 COGS 的情况都将大幅压缩这些比率。"
    - "每月 1.5% 混合流失率（年化约 17%）较为保守但尚未经验证；第 1 年末仅有 3 家客户，任何一次不续约都会推高实际流失率并损害第 2 年管道信心。"
    - "第 3 年末人均营收 $133k 低于 $200–400k 的 SaaS 基准；模型刻意在第 3 年加重人员配置以应对受监管企业账户的合规质量保障开销，但投资方可能会追问这一点。"
    - "$3M 种子轮显示 36 个月现金跑道，因为印度团队成本较低；商业计划说明 18 个月跑道至 A 轮，意味着公司可能在约 M18 前后择机而非迫于必要融资 A 轮——模型不应被解读为需要过桥融资。"
    - "第 1 年营收（$123k）较薄且集中在 3 家客户；任何合规被拒或试点推迟启动都会将 EBITDA 移动约 $75k，并可能将首次生产验证推迟至第 2 年。"
    - "客户数从第 2 年末 10 家增长至第 3 年末 30 家，需要在 12 个月内新增 20 家账户——新客户获取速度提升 3 倍，依赖于销售团队扩张（GTM 人数从 3 人增至 6 人）和合作伙伴渠道贡献按计划落地。"
