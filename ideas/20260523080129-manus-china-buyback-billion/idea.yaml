problem: >-
  Enterprise AI teams increasingly buy third-party agent products before they can fully reproduce the workflow in-house. When a vendor's ownership, jurisdiction, or key personnel suddenly change, the buyer can be left with production dependencies on prompts, tool chains, and evaluation logic they do not control. Today continuity planning lives in spreadsheet vendor reviews and one-time security questionnaires, which do nothing once an agent vendor is forced into an unwind, carve-out, or sovereign restructuring.
targetUser:
  primary: Head of AI Platform or third-party AI governance lead at a Singapore-headquartered bank or global manufacturer deploying external agent vendors across China and the rest of APAC
  secondary: Procurement, enterprise architecture, and security teams responsible for AI vendor approval and resilience
  buyer: CIO, Chief Digital Officer, or Head of Enterprise Platforms
startupThesis:
  nonObviousInsight: The new sovereign-risk failure mode is not only cross-border AI M&A. It is that enterprises can operationally depend on a fast-scaling agent vendor whose ownership, key founders, or legal structure changes after deployment, so portability of the agent workflow matters more than portability of the base model alone.
  beachhead: Vendor-continuity assurance for Singapore-based banks and regional manufacturers piloting third-party agentic AI copilots whose core engineering team, IP, or control rights sit in China
  wedge: A continuity layer that snapshots prompts, tool contracts, approval flows, and eval baselines from external agent vendors, runs shadow backups on approved alternatives, and generates exit-readiness scorecards before rollout
  whyNowCatalyst: Manus's forced unwind, planned JV restructuring, and already-integrated technology show that enterprise buyers need an agent-vendor escape hatch before a strategic supplier changes under them.
  ventureScalePath: Start with third-party agent continuity for geopolitically exposed vendors, then expand into the standard resilience and portability layer for all enterprise agent procurement, renewal, and incident response across regions and industries.
solution: >-
  Build an enterprise agent-vendor continuity platform for teams that want to use external agent products without becoming captive to one supplier's legal fate. The product connects to a vendor's agent APIs, workflow definitions, tool schemas, prompt templates, and logs, then stores a normalized representation the buyer can govern independently. It runs shadow evaluations against backup vendors or approved open-weight stacks to show which workflows are portable, which tools will break, and how much quality degrades if a switch is required. It also produces a board-ready continuity packet covering founder-location risk, control-right changes, integration depth, and switch-over playbooks. Over time, the company can become the system of record for AI vendor resilience, renewal negotiations, and cross-vendor agent portability.
goToMarketSeed:
  firstCustomer: A Singapore-headquartered bank or industrial manufacturer with a 20-100 person AI platform team piloting a customer-support, procurement, or knowledge-work agent from a China-founded vendor
  buyingTrigger: A new vendor pilot, annual vendor-risk review, or a geopolitical event that raises concern that a strategic AI supplier could be restructured, blocked, or become unavailable
  currentAlternative: Spreadsheet-based vendor reviews, manual backup experiments, internal rebuild plans, and generic API gateway logs
  switchingReason: The wedge gives the buyer an auditable fallback path and quantified migration effort before rollout, which beats discovering during a crisis that the agent workflow is not portable
  pricingHypothesis: Annual platform fee by number of governed agent vendors and protected workflows, plus one-time onboarding for workflow capture and backup benchmarking
