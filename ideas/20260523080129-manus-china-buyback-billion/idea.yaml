topRisks:
  - name: Limited vendor observability
    description: Some third-party agent vendors may not expose enough workflow detail for high-confidence backup capture.
    mitigation: Start with vendors that already expose APIs, tool schemas, and logs, then expand through lightweight SDKs and buyer-side instrumentation.
  - name: Buyers may default to internal rebuilds
    description: Large enterprises may decide the safest answer is to rebuild critical agent workflows themselves instead of paying for continuity software.
    mitigation: Focus on workflows where speed matters, quantify migration effort and degradation upfront, and position the product as reducing rebuild time rather than replacing internal ownership.
  - name: Hard to prove backup quality
    description: If fallback vendors perform materially worse, customers may not trust continuity claims enough to buy.
    mitigation: Build rigorous shadow-eval benchmarks, start with lower-risk internal workflows, and report degradation ranges transparently instead of promising perfect parity.
