jobsToBeDone:
  - job: When we pilot a third-party AI agent for customer support or procurement, help our platform team preserve a working fallback path, so we can keep moving if the vendor is restructured or blocked.
    currentAlternative: Manual backup testing and in-house rewrite plans
    successMetric: Days required to cut over a protected workflow to an approved backup
  - job: When our vendor-risk committee asks whether a strategic AI supplier is portable, help us quantify migration effort and quality loss, so we can approve rollout with confidence.
    currentAlternative: Spreadsheet questionnaires and one-off proof-of-concepts
    successMetric: Percent of protected workflows with a tested backup and documented degradation range
