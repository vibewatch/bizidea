modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> Assessments
      Assessments --> Production
      Production --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from paid continuity assessments converting into 12 production customers by Q4Y2 and 30 paying organizations at roughly $165K blended annual value by Q4Y3.
- checkName: Must go right
  finding: Telemetry-qualified pilots must stay software-first so gross margin can climb from 57% in Y1 to 73% in Q4Y3 instead of getting stuck as benchmarking-heavy services work.
- checkName: Model breaks if
  finding: If sales cycles stretch by another quarter or target vendors withhold usable prompts and logs, the sales-cycle and gross-margin sensitivities push cash toward the downside case before Y3 scale arrives.
- checkName: Next-round proof
  finding: The next financing is justified once Q4Y2 shows 12 production customers, at least 2 multi-vendor expansions, and enough remaining cash to finish the first partner-channel experiment.
sanityChecks:
  ruleOf40: Y3 growth 170.2% + EBITDA margin 2.1% = 172.3%
  burnMultiple: Y2 burn multiple 0.8x (about $0.83M EBITDA burn on $1.03M net new revenue)
  revenuePerFte: $288K Y3 (benchmark $200-400K SaaS)
  flags:
  - The base case requires 18 net new customers in Y3 after only 12 cumulative customers by Q4Y2, so any sales-cycle slippage meaningfully delays breakeven.
  - The model assumes telemetry qualification stays above the BP kill-criteria threshold; if fewer than about 60% of target vendors expose usable workflow data, both conversion and gross margin deteriorate.
  - Q4Y3 exit ARR is about $5.0M, which is close to the researched SOM ceiling for the initial Singapore-led wedge and leaves limited room for market underperformance.
