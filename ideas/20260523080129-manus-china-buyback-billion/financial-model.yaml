slug: agent-vendor-continuity
date: '2026-05-23'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: YYYY-MM
  source: Starts the first full month after the 2026-05-23 business-plan date.
- id: A2
  name: Opening cash and pre-seed size
  value: '2400.0'
  unit: USDK
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M] Base case uses a $2.4M pre-seed inside the stated range to reach the Q4Y2 proof point plus roughly six months of buffer.'
- id: A3
  name: Starting customers (M1)
  value: '0'
  unit: organizations
  source: '[BP executiveSummary + BP milestones 0-12 months] The company starts pre-revenue and must first sell paid continuity assessments.'
- id: A4
  name: Y1 customer ramp
  value: M3 first paid assessment, 3 paying organizations by M8, and 6 by M12
  unit: organizations
  source: '[BP product.sixMonth + BP milestones 0-12 months] Matches the plan to secure 3 paid assessments and convert at least 2 into annual production contracts in year one.'
- id: A5
  name: Y2 customer ramp
  value: Q1Y2 8, Q2Y2 10, Q3Y2 11, Q4Y2 12 paying organizations
  unit: organizations
  source: '[BP milestones 12-24 months] Base case lands at the low-middle of the stated 8-12 production-customer goal by the end of year two.'
- id: A6
  name: Y3 customer ramp
  value: Q1Y3 16, Q2Y3 21, Q3Y3 26, Q4Y3 30 paying organizations
  unit: organizations
  source: '[BP market.som + research market.som] Stays below the researched 35-customer SOM path but gets close enough to test venture-scale demand.'
- id: A7
  name: Pricing ladder and blended ARPU
  value: $40K-$80K paid assessment credited into $120K-$200K annual contracts; modeled blended annual revenue per active customer is $100K in Y1, $135K in Y2, and $165K in Y3
  unit: USDK_per_customer_year
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + research willingnessToPay] Uses the low-mid part of the pricing range to avoid assuming instant full-year ACV recognition.'
- id: A8
  name: Revenue recognition convention
  value: Average active customers in period x blended annual ARPU / 12 or / 4
  unit: formula
  source: '[Startup-finance heuristic] New accounts land during the period, so recognized revenue uses average active customers rather than period-end logos.'
- id: A9
  name: Gross margin ramp
  value: Y1 57.1%, Y2 66.7%, Y3 71.8%, with Q4Y3 at 73.0%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices.sequencingRationale] Early assessments carry more manual benchmarking work, then margin improves as telemetry-qualified deployments standardize.'
- id: A10
  name: Monthly logo churn for unit economics
  value: '1.5'
  unit: percent
  source: '[Startup-finance heuristic] Regulated enterprise control software should churn below SMB SaaS, but this wedge still carries concentration and category-risk exposure.'
- id: A11
  name: Steady-state CAC
  value: '60.0'
  unit: USDK_per_customer
  source: '[BP gtm.channels + BP gtm.funnelTargets + research regulatoryTechnicalConstraints] Founder-led enterprise selling, paid pilots, and resilience buyers imply a higher CAC than PLG SaaS.'
- id: A12
  name: Loaded salary bands
  value: Founder CEO 140; founding engineer 190; solutions/resilience lead 155; product lead 165; GTM lead 160; platform engineer 170; customer success 125; second AE 150; ops/finance 110; third engineer 175; second solutions hire 150; third AE 150
  unit: annualK_per_FTE
  source: '[BP team + startup-finance heuristic] Assumes a lean pre-seed team with senior enterprise, product, and infrastructure talent.'
- id: A13
  name: Hiring schedule
  value: Solutions lead M3, product lead M7, GTM lead M10, platform engineer M13, customer success M16, second AE M19, ops/finance M22, third engineer M28, second solutions hire M31, third AE M34
  unit: timing
  source: '[BP team.startTiming + BP strategicChoices.sequencingRationale] Delivery and productization lead GTM scale, with heavier sales hiring only after pilot-to-production proof.'
- id: A14
  name: Headcount endpoint
  value: 2 FTE by Q1Y1, 3 by Q2Y1, 4 by Q3Y1, 5 by Q4Y1, 9 by Q4Y2, and 12 by Q4Y3
  unit: FTE
  source: '[BP team + BP fundingAsk] Keeps the business lean enough for a pre-seed while still supporting product, onboarding, and enterprise selling.'
- id: A15
  name: Sales and marketing non-payroll spend
  value: Founder-led outbound stays lean in Y1, then ramps from $42K in Q1Y2 to $117K in Q4Y3 as enterprise travel, pilots, and partner support grow
  unit: USDK_per_period
  source: '[BP gtm.channels + startup-finance heuristic] Assumes targeted outbound and limited channel spend rather than broad demand generation.'
- id: A16
  name: R&D non-payroll spend
  value: Cloud, eval, and connector tooling rise from $8K in M1 to $63K in Q4Y3
  unit: USDK_per_period
  source: '[BP product roadmap + BP operations + startup-finance heuristic] Covers LLM usage, benchmark orchestration, security tooling, and integration infrastructure.'
- id: A17
  name: G&A non-payroll spend
  value: Legal, compliance, insurance, and admin spend rise from $6K in M1 to $48K in Q4Y3
  unit: USDK_per_period
  source: '[BP operations + research regulatoryLandscape + startup-finance heuristic] Regulated enterprise selling requires more legal and compliance overhead than a typical horizontal SaaS motion.'
- id: A18
  name: Cash flow simplification
  value: Ending cash equals opening cash plus cumulative EBITDA
  unit: formula
  source: '[Startup-finance heuristic] Assumes limited working-capital swings, capex, debt, and deferred-revenue distortion for an early-stage software company.'
- id: A19
  name: Funding sizing rule
  value: Raise enough to hit the Q4Y2 proof milestone and still hold about six months of cash buffer
  unit: policy
  source: '[BP fundingAsk.runwayMonths 18 + model requirement] The model sizes the pre-seed for milestone-plus-buffer rather than just the stated minimum runway.'
- id: A20
  name: Scenario downside deltas
  value: Q4Y3 customers 22, Y3 blended ARPU about $150K, steady-state gross margin 70%, and one extra quarter of sales-cycle delay
  unit: scenario_inputs
  source: '[BP risks + research sensitivityCases] Captures slower regulated conversions and more manual onboarding work.'
- id: A21
  name: Scenario upside deltas
  value: Q4Y3 customers 34, Y3 blended ARPU about $175K, steady-state gross margin 74%, and partner-assisted pipeline pulling deals forward by roughly one quarter
  unit: scenario_inputs
  source: '[BP experimentRoadmap 12-18 months + BP milestones 24-36 months] Upside assumes the channel motion works without requiring a much heavier cost base.'
