scenarios:
  downside:
    description: Regulated buyers take longer to convert, telemetry gaps keep more work services-heavy, and the company exits Y3 with fewer expanded accounts.
    y3RevenueK: 2512.5
    y3EbitdaK: -410.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
    - Q4Y3 customers reach 22 instead of 30.
    - Y3 blended annual revenue per active customer stays near $150K instead of $165K.
    - Steady-state gross margin tops out near 70% because benchmarking remains more manual.
  base:
    description: Founder-led assessments convert into 12 production customers by Q4Y2 and 30 paying organizations by Q4Y3 without a services-heavy delivery model.
    y3RevenueK: 3465.0
    y3EbitdaK: 74.3
    cashLowPointK: 632.6
    keyAssumptionChanges:
    - Matches A1-A19, including 6 paying organizations by M12, 12 by Q4Y2, and 30 by Q4Y3.
    - Uses the pricing ladder in A7 and the average-active-customer recognition method in A8.
    - Gross margin rises from 57.1% in Y1 to 71.8% in Y3 as telemetry-qualified deployments become more repeatable.
  upside:
    description: Early design-partner proof and a working assurance or cloud channel pull conversions forward, raising both account count and module attachment by Y3.
    y3RevenueK: 4112.5
    y3EbitdaK: 320.0
    cashLowPointK: 780.0
    keyAssumptionChanges:
    - Q4Y3 customers reach 34 instead of 30 because partner-sourced pilots start contributing in Y2.
    - Y3 blended annual revenue per active customer improves to about $175K through multi-workflow expansion.
    - Steady-state gross margin reaches 74% as onboarding and benchmarking templates standardize faster.
