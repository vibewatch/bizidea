  fiveForces:
    supplierPower:
      score: 4
      rationale: "Core suppliers include cloud control planes, model providers, and vendor APIs. They are powerful because sovereignty settings, logs, and tool permissions sit inside those platforms, but no single supplier spans the whole third-party continuity problem."
      sourceRefs: [14, 15, 17, 18, 36]
    buyerPower:
      score: 4
      rationale: "Banks and large manufacturers have strong procurement muscle, can fall back to manual governance, and may prefer internal rebuilds or cloud-native controls unless the startup shows faster approval and failover."
      sourceRefs: [7, 8, 9, 10, 29]
    threatOfEntrants:
      score: 3
      rationale: "Entry is plausible because observability, gateway, and MCP building blocks already exist, but stitching them into auditable vendor-continuity workflows for regulated buyers is still non-trivial."
      sourceRefs: [21, 23, 27, 28, 36]
    threatOfSubstitutes:
      score: 5
      rationale: "Substitutes are strong: spreadsheets, annual vendor reviews, internal rebuild plans, gateway tooling, and hyperscaler sovereignty controls each solve slices of the problem well enough for some buyers."
      sourceRefs: [7, 9, 14, 16, 27, 28]
    competitiveRivalry:
      score: 4
      rationale: "Rivalry is already moderate-high because adjacent categories in observability, evaluation, and gateway infrastructure are crowded, even though none yet owns buyer-side exit-readiness."
      sourceRefs: [21, 23, 25, 27, 28]
  pestle:
    - factor: political
      impact: negative
      point: "Cross-border ownership and sovereignty shocks can reshape enterprise AI supply chains after integration has begun."
      sourceRefs: [1, 2, 15, 17]
    - factor: economic
      impact: positive
      point: "Banks and manufacturers are already putting AI into production workflows, which creates an installed base that can justify continuity spend."
      sourceRefs: [6, 29, 30, 32, 34]
    - factor: social
      impact: positive
      point: "Workforce enablement and skills shortages are pushing enterprises toward copilots and internal bots, increasing reliance on external AI tooling."
      sourceRefs: [30, 32, 35]
    - factor: technological
      impact: positive
      point: "Open connection standards, evaluation stacks, and routing layers make it more feasible to snapshot and benchmark third-party workflows than in earlier LLM cycles."
      sourceRefs: [21, 23, 25, 27, 36]
    - factor: legal
      impact: negative
      point: "Operational-resilience and AI-governance regimes increase diligence burden and slow sales cycles, especially in financial services."
      sourceRefs: [9, 10, 11, 12, 20]
  adoptionFrictionMatrix:
    - friction: Vendor-owned workflows may not expose enough prompts, logs, or tool schemas
      severity: high
      affectedBuyer: Head of AI Platform
      mitigation: "Start with API-first vendors and add buyer-side instrumentation plus contractual export requirements."
      sourceRefs: [21, 23, 25, 27]
    - friction: Regulated buyers need human checkpoints and bounded agent powers before rollout
      severity: high
      affectedBuyer: CIO and operational-resilience owner
      mitigation: "Package continuity evidence as part of approval workflow, with baseline tests and explicit escalation checkpoints."
      sourceRefs: [11, 12]
    - friction: Backup vendors may perform materially worse on real workflows
      severity: high
      affectedBuyer: Business-unit workflow owner
      mitigation: "Run shadow evaluations on approved fallback stacks and report degradation ranges before production approval."
      sourceRefs: [23, 25, 29]
    - friction: Procurement teams may view this as redundant with existing vendor-risk tooling
      severity: medium
      affectedBuyer: Procurement and third-party risk manager
      mitigation: "Position the product as the operational layer beneath existing questionnaires and annual reviews."
      sourceRefs: [7, 9, 10]
market:
  tam:
    value: $109.0M
    rationale: "Estimate using 432 APAC banks from TABInsights times $170k blended annual platform value, plus 300 enterprise manufacturers estimated from the top 3% of Singapore's 9,858 establishments and adjacent APAC multinationals times $120k. Calc: (432 x $170k) + (300 x $120k) = about $109.4M."
    isEstimate: true
    sourceRefs: [4, 5, 22, 24, 26]
  sam:
    value: $21.0M
    rationale: "Estimate for the beachhead market of 30 Singapore and regional bank accounts plus 120 large manufacturers reachable from a Singapore-first go-to-market, using the same ACV assumptions. Calc: (30 x $170k) + (120 x $120k) = about $19.5M, rounded up for onboarding and premium governance modules."
    isEstimate: true
    sourceRefs: [3, 4, 22, 24, 26, 30]
  som:
    value: $5.0M
    rationale: "Year-3 reachable case assumes 15 bank customers at about $170k and 20 manufacturer customers at about $120k, plus modest onboarding/services revenue. Calc: (15 x $170k) + (20 x $120k) = about $4.95M."
    isEstimate: true
    sourceRefs: [3, 22, 24, 26, 30]
