    sourceRefs: [9, 10, 11]
  - point: "Sovereignty-sensitive buyers may require residency, key control, provenance, and operator-access restrictions across the AI lifecycle."
    sourceRefs: [15, 16, 17, 18]
  - point: "Many existing observability tools rely on direct trace instrumentation, so external vendor products without exportable telemetry limit automation quality."
    sourceRefs: [21, 23, 25, 27]
