scenarios:
  downside:
    description: 受监管买方转化更慢，遥测缺口让更多工作变成服务型交付，公司到 Y3 结束时的扩张账户数也更少。
    y3RevenueK: 2512.5
    y3EbitdaK: -410.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
    - Q4Y3 客户数做到 22 家，而不是 30 家。
    - Y3 每个活跃客户的混合年收入维持在约 $150K，而不是 $165K。
    - 由于基准测试仍更依赖人工，稳定期毛利率最高只能到约 70%。
  base:
    description: 由创始人主导的评估，在 Q4Y2 转成 12 个生产客户，并在 Q4Y3 做到 30 家付费组织，同时不滑向重服务交付模型。
    y3RevenueK: 3465.0
    y3EbitdaK: 74.3
    cashLowPointK: 632.6
    keyAssumptionChanges:
    - 对应 A1-A19，包括 M12 达到 6 家付费组织、Q4Y2 达到 12 家、Q4Y3 达到 30 家。
    - 采用 A7 的价格阶梯和 A8 的平均活跃客户收入确认方式。
    - 随着遥测合格部署越来越可复制，毛利率会从 Y1 的 57.1% 升到 Y3 的 71.8%。
  upside:
    description: 共创客户验证更早跑通，再叠加有效的保障或云渠道，让转化提前发生，到 Y3 时无论账户数还是模块附着率都更高。
    y3RevenueK: 4112.5
    y3EbitdaK: 320.0
    cashLowPointK: 780.0
    keyAssumptionChanges:
    - 因为伙伴带来的试点从 Y2 就开始贡献，Q4Y3 客户数可到 34 家，而不是 30 家。
    - 借助多工作流扩张，Y3 每个活跃客户的混合年收入提升到约 $175K。
    - 随着 onboarding 和基准测试模板更快标准化，稳定期毛利率可到 74%。
sensitivity:
- variable: ARPU
  downsideCase: $150K 的 Y3 混合年收入 / 活跃客户
  baseCase: $165K 的 Y3 混合年收入 / 活跃客户
  upsideCase: $175K 的 Y3 混合年收入 / 活跃客户
  y3RevenueImpactK: -315.0
  cashImpactK: -235.0
- variable: CAC
  downsideCase: 企业转化更慢时 CAC 为 $70K
  baseCase: CAC 为 $60K
  upsideCase: 在高质量伙伴线索下 CAC 为 $50K
  y3RevenueImpactK: -90.0
  cashImpactK: -180.0
- variable: 流失率
  downsideCase: 月度 logo churn 2.5%
  baseCase: 月度 logo churn 1.5%
  upsideCase: 月度 logo churn 1.0%
  y3RevenueImpactK: -140.0
  cashImpactK: -120.0
- variable: 销售周期
  downsideCase: 从评估启动到获批生产需要 9-10 个月
  baseCase: 约 6-7 个月
  upsideCase: 购买触发更明确时约 4-5 个月
  y3RevenueImpactK: -430.0
  cashImpactK: -310.0
- variable: 毛利率
  downsideCase: 稳定期毛利率 70%
  baseCase: 稳定期毛利率 73%
  upsideCase: 稳定期毛利率 74%
  y3RevenueImpactK: 0.0
  cashImpactK: -185.0
- variable: 招聘节奏
  downsideCase: 把额外 1 名交付和 1 名 GTM 招聘提前到 Y2
  baseCase: 招聘按 A13 执行
  upsideCase: 如果伙伴管道能覆盖需求，则把第 3 名 AE 延到 Q4Y3 之后
  y3RevenueImpactK: -120.0
  cashImpactK: -210.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads --> Assessments\n  Assessments --> Production\n  Production --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入来自付费连续性评估：它们在 Q4Y2 转成 12 个生产客户，并在 Q4Y3 做到 30 家付费组织；按每家约 $165K 的混合年价值测算。
- checkName: 必须做对的事
  finding: 遥测合格试点必须坚持软件优先，让毛利率从 Y1 的 57% 爬到 Q4Y3 的 73%；不能卡死在大量人工基准测试的服务模式里。
- checkName: 模型会失灵的情况
  finding: 只要销售周期再拖一个季度，或者目标供应商不给可用的提示词和日志，销售周期与毛利率这两项敏感度就会把现金推向 downside 情景，然后 Y3 规模化还没来得及发生。
- checkName: 下一轮融资证明点
  finding: 当 Q4Y2 展示出 12 个生产客户、至少 2 次跨供应商扩张，且账上还留有足够现金完成首个伙伴渠道实验时，下一轮融资就有了依据。
sanityChecks:
  ruleOf40: Y3 growth 170.2% + EBITDA margin 2.1% = 172.3%
  burnMultiple: Y2 burn multiple 0.8x (about $0.83M EBITDA burn on $1.03M net new revenue)
  revenuePerFte: $288K Y3 (benchmark $200-400K SaaS)
  flags:
  - 基础情景要求公司在 Q4Y2 累计只有 12 家客户的前提下，于 Y3 再净增 18 家客户，因此只要销售周期稍有滑坡，盈亏平衡就会明显后移。
  - 模型默认遥测资格率始终高于 BP 里的 kill-criteria 门槛；如果目标供应商里能暴露可用工作流数据的比例低于约 60%，转化率和毛利率都会一起恶化。
  - Q4Y3 退出 ARR 约为 $5.0M，已经逼近研究中以新加坡为起点的初始切口 SOM 上限，因此留给市场低于预期的空间不大。
