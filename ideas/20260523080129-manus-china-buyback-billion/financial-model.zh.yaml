fundingAsk:
  round: pre-seed
  amountM: 2.4
  runwayMonths: 30
  milestone: 到 Y2 Q4 拿下 12 个生产客户，至少出现 2 次跨供应商或第二条工作流扩张，并带着足够现金进入 Y3，把首轮可复制渠道实验跑完。
