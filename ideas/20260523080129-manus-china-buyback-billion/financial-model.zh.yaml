slug: agent-vendor-continuity
date: '2026-05-23'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: 从 2026-05-23 的 business-plan 日期之后，第一个完整月份开始。
- id: A2
  name: 期初现金与 pre-seed 融资规模
  value: '2400.0'
  unit: USDK
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M] 基础情景在给定区间内取 $2.4M，用来跑到 Y2 Q4 的验证节点，并额外留出约 6 个月缓冲。'
- id: A3
  name: 起始客户数（M1）
  value: '0'
  unit: organizations
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，必须先卖出付费连续性评估。'
- id: A4
  name: Y1 客户爬坡
  value: M3 first paid assessment, 3 paying organizations by M8, and 6 by M12
  unit: organizations
  source: '[BP product.sixMonth + BP milestones 0-12 months] 对应计划：拿下 3 个付费评估，并在第一年把至少 2 个转成年化生产合同。'
- id: A5
  name: Y2 客户爬坡
  value: Q1Y2 8, Q2Y2 10, Q3Y2 11, Q4Y2 12 paying organizations
  unit: organizations
  source: '[BP milestones 12-24 months] 基础情景在第二年末落在既定 8-12 个生产客户目标的偏低到中间位置。'
- id: A6
  name: Y3 客户爬坡
  value: Q1Y3 16, Q2Y3 21, Q3Y3 26, Q4Y3 30 paying organizations
  unit: organizations
  source: '[BP market.som + research market.som] 低于研究里的 35 客户 SOM 路径，但已经足够接近，可用来验证风险投资级需求。'
- id: A7
  name: 价格阶梯与混合 ARPU
  value: $40K-$80K paid assessment credited into $120K-$200K annual contracts; modeled blended annual revenue per active customer is $100K in Y1, $135K in Y2, and $165K in Y3
  unit: USDK_per_customer_year
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + research willingnessToPay] 取定价区间的低中位，避免假设合同一签就立刻确认全年 ACV。'
- id: A8
  name: 收入确认口径
  value: Average active customers in period x blended annual ARPU / 12 or / 4
  unit: formula
  source: '[Startup-finance heuristic] 新客户是在当期陆续落地，因此确认收入时按期内平均活跃客户数，而不是期末 logo 数。'
- id: A9
  name: 毛利率爬坡
  value: Y1 57.1%, Y2 66.7%, Y3 71.8%, with Q4Y3 at 73.0%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices.sequencingRationale] 前期评估包含更多手工基准测试工作；随着遥测合格部署逐步标准化，毛利率会上来。'
- id: A10
  name: 用于单位经济模型的月度 logo churn
  value: '1.5'
  unit: percent
  source: '[Startup-finance heuristic] 面向受监管企业的控制软件，流失率应低于 SMB SaaS，但这个切口仍承受客户集中度和品类风险。'
- id: A11
  name: 稳定期 CAC
  value: '60.0'
  unit: USDK_per_customer
  source: '[BP gtm.channels + BP gtm.funnelTargets + research regulatoryTechnicalConstraints] 由创始人主导的企业销售、付费试点和韧性买方，决定了 CAC 会高于 PLG SaaS。'
- id: A12
  name: 全成本薪资带宽
  value: Founder CEO 140; founding engineer 190; solutions/resilience lead 155; product lead 165; GTM lead 160; platform engineer 170; customer success 125; second AE 150; ops/finance 110; third engineer 175; second solutions hire 150; third AE 150
  unit: annualK_per_FTE
  source: '[BP team + startup-finance heuristic] 假设是一支精干的 pre-seed 团队，但成员资历足够支撑企业销售、产品和基础设施。'
- id: A13
  name: 招聘节奏
  value: Solutions lead M3, product lead M7, GTM lead M10, platform engineer M13, customer success M16, second AE M19, ops/finance M22, third engineer M28, second solutions hire M31, third AE M34
  unit: timing
  source: '[BP team.startTiming + BP strategicChoices.sequencingRationale] 先补交付与产品化，再放大 GTM；只有在试点转生产跑通后，才加大销售招聘。'
- id: A14
  name: 期末团队规模
  value: 2 FTE by Q1Y1, 3 by Q2Y1, 4 by Q3Y1, 5 by Q4Y1, 9 by Q4Y2, and 12 by Q4Y3
  unit: FTE
  source: '[BP team + BP fundingAsk] 团队规模保持足够精简，符合 pre-seed 约束，同时仍能支撑产品、onboarding 和企业销售。'
- id: A15
  name: 销售与市场非薪酬开支
  value: Founder-led outbound stays lean in Y1, then ramps from $42K in Q1Y2 to $117K in Q4Y3 as enterprise travel, pilots, and partner support grow
  unit: USDK_per_period
  source: '[BP gtm.channels + startup-finance heuristic] 假设以定向外呼和有限渠道投入为主，而不是大范围需求生成。'
- id: A16
  name: 研发非薪酬开支
  value: Cloud, eval, and connector tooling rise from $8K in M1 to $63K in Q4Y3
  unit: USDK_per_period
  source: '[BP product roadmap + BP operations + startup-finance heuristic] 覆盖 LLM 使用、基准测试编排、安全工具和集成基础设施。'
- id: A17
  name: G&A 非薪酬开支
  value: Legal, compliance, insurance, and admin spend rise from $6K in M1 to $48K in Q4Y3
  unit: USDK_per_period
  source: '[BP operations + research regulatoryLandscape + startup-finance heuristic] 面向受监管企业销售，法务与合规开销会高于典型横向 SaaS。'
- id: A18
  name: 现金流简化假设
  value: Ending cash equals opening cash plus cumulative EBITDA
  unit: formula
  source: '[Startup-finance heuristic] 假设一家早期软件公司在营运资金、CAPEX、债务和递延收入上的扰动都有限。'
- id: A19
  name: 融资规模规则
  value: Raise enough to hit the Q4Y2 proof milestone and still hold about six months of cash buffer
  unit: policy
  source: '[BP fundingAsk.runwayMonths 18 + model requirement] 这里按“跑到关键验证里程碑并额外留出缓冲”来定 pre-seed 规模，而不只是满足最低 runway。'
- id: A20
  name: 下行情景调整项
  value: Q4Y3 customers 22, Y3 blended ARPU about $150K, steady-state gross margin 70%, and one extra quarter of sales-cycle delay
  unit: scenario_inputs
  source: '[BP risks + research sensitivityCases] 这里捕捉的是：受监管客户转化更慢，且 onboarding 更依赖人工。'
- id: A21
  name: 上行情景调整项
  value: Q4Y3 customers 34, Y3 blended ARPU about $175K, steady-state gross margin 74%, and partner-assisted pipeline pulling deals forward by roughly one quarter
  unit: scenario_inputs
  source: '[BP experimentRoadmap 12-18 months + BP milestones 24-36 months] 上行情景假设渠道打法跑通，且不需要大幅加重成本结构。'
