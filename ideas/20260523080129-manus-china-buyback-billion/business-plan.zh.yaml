slug: agent-vendor-continuity
date: '2026-05-23'
executiveSummary: 这家公司应该先从智能体供应商连续性平台做起，面向总部在新加坡、正在试点第三方智能体产品、且在中国或跨境治理上有明显暴露的银行与区域制造商。眼前真正的痛点，不是泛泛的模型锁定，而是当供应商的所有权、司法辖区或创始人控制权变化后，企业会失去对提示词、工具契约、审批步骤和后备方案的运营控制。首个客户应是银行里的 AI 平台团队：它正在跑一个真实的客服或采购智能体试点，又恰好碰上试点审批、年度韧性审查，或某个会被董事会看到的地缘事件，必须回答“这个工作流能不能迁走”。MVP 要先抓取供应商工作流资产，基准测试一条获批备份路径，并在生产上线前出具一份可审计的退出就绪材料包。定价应从付费连续性评估 + 年订阅起步，按纳入治理的供应商和受保护工作流收费，因为买方掏钱买的是控制结果，不是额外席位。研究支持这是一个窄但可信的市场：如果公司能拿下少量高 ACV 的受监管与工业客户，TAM 约 $109.0M、以新加坡为起点的 SAM 约 $21.0M、三年 SOM 约 $5.0M。这个节奏只有在“软件优先”前提下才跑得通：先从 API-first 供应商、买方侧埋点和影子基准测试起步，再考虑扩成更广的供应商风险模块或重渠道扩张。最大的反证风险是遥测接入：如果目标供应商不给足够的提示词、日志和工具 schema，公司就会滑向咨询外包，而不是可复利的产品业务。预算归属和正式生产定价，现在仍主要来自相邻工具的类比，因此前 6 个月必须验证：连续性预算能否直接从 AI 平台和韧性预算里过，而不是陷进漫长采购流程。
problem:
- 企业 AI 团队往往会先对第三方智能体形成依赖，等到真要切供应商时，才发现自己并没有独立掌控工作流逻辑、工具权限或评估基线。
- 现有的供应商风险评审、安全问卷和网关日志，并不能证明一个已经部署的智能体工作流，在所有权或司法辖区突变后，是否真的抓得出来、测得明白、切得过去。
solution:
- 先在买方侧抓出第三方智能体的提示词、工具契约、审批流、日志和评估基线表示，让工作流可以脱离供应商单独治理。
- 再针对获批的备选供应商或开放权重栈跑影子基准测试，在上线前生成一份可审计的连续性材料包，把可迁移性、退化区间和切换步骤量化出来。
whyWeWin:
- 产品盯住的是工作流行为层，而这恰恰不是可观测性工具、网关或云主权控制默认覆盖的外部智能体地带。
- 以新加坡银行和 APAC 制造商为滩头市场，先拿下受监管审批和供应商集中度带来的高紧迫性场景，而不是去卷泛开发者工具。
- 每次部署都能沉淀一批专有数据：不同供应商原型之间的工作流可迁移性、备份退化幅度，以及真实补救成本。
strategicChoices:
  beachhead: 总部在新加坡的银行和大型区域制造商；它们正在审批第三方客服、采购或知识工作智能体，而这些供应商的核心工程团队、IP 或控制权位于中国或其他主权敏感司法辖区。
  wedgeRationale: 这个滩头市场的触发条件最清楚，预算逻辑也最顺。只要碰上真实供应商试点或韧性审查，客户马上就会被要求证明后备切换是否可行；与此同时，单条工作流的范围又足够窄，能在不替换客户整体治理栈的前提下，先把价值跑出来。
  sequencingRationale: 产品第一阶段只需要在一条工作流上证明“能抓、能测、能出审计材料”，因为这是拿下付费试点和建立可信案例的最短路径。GTM 也应继续由创始人亲自打单，直接面对 AI 平台和韧性负责人，直到公司证明客户续约买的是连续性软件，而不是咨询服务。招聘节奏也要跟着这个逻辑走：先补工程和解决方案能力；等“试点转生产”变成可复制动作，再上企业销售；等产品能以很少定制接入云、保障和网关生态之后，再大举做合作伙伴。
  notYet:
  - 暂时不做面向内部自建应用的通用 AI 可观测性。
  - 暂时不替换所有软件品类的完整供应商风险问卷体系。
  - 在公司还没用小范围工作流类型跑出硬核可迁移基准前，不去承诺覆盖所有智能体供应商的自动故障切换。
market:
  tam: 覆盖 APAC 银行和企业制造商、按约 $120k-$170k 年价值购买连续性软件时，估算 TAM 为 $109.0M。
  sam: 以新加坡为起点的 GTM 可触达约 30 个银行账户和 120 个大型制造商账户，对应估算 SAM 为 $21.0M。
  som: 第 3 年目标为约 35 家客户，加上少量 onboarding 收入，对应约 $5.0M。
  segments:
  - 拥有活跃 AI 平台和第三方风险审查流程的总部在新加坡的银行
  - 在 APAC 运营与供应链工作流中使用外部 AI 智能体的区域制造商
  buyingProcess: 日常推进者通常是 AI 平台负责人、企业 AI 治理负责人或韧性 owner，采购和安全团队会共同签字，真正的经济买方则是 CIO、CDO 或企业平台负责人。交易最好从新的智能体试点、年度供应商韧性评审，或某个地缘事件切入，先以单条工作流的付费评估展开；等买方在生产审批前亲眼看到一套可用的后备方案，再转成年约。
product:
  mvp: MVP 要能接入一条第三方智能体工作流，摄取已暴露的提示词、工具 schema、审批步骤和日志，并在买方侧形成一份标准化资产，再拿一套获批备选栈跑基准测试。输出必须是一份可直接审计的连续性材料包，里面要有可迁移性评分、退化区间和清晰记录的切换步骤。
  sixMonth: 先给一小批 API-first 供应商做好连接器和买方侧埋点，把客服与采购两类工作流原型跑通，并为 3 个付费试点交付可导出的退出就绪材料包。
  twelveMonth: 补上策略驱动的审批流、供应商组合看板和可复用的后备模板，让单个客户能在同一系统里治理多家供应商和多条工作流。
  twentyFourMonth: 从主权敏感供应商向外扩，覆盖更广的企业智能体韧性场景，包括续约、事故响应，以及银行和工业客户的跨区域采购。
  keyBets:
  - 目标供应商会开放足够多的工作流遥测，让可迁移性基准测试站得住。
  - 只要先保护住一条工作流，就足以撬开首张六位数年合同。
  - 相比立刻内部重建，客户会更愿意买一个能缩短重建时间的控制层。
  - 市场叙事可以从“中国相关连续性风险”顺势扩展成更广的 AI 供应商韧性，而不用推倒重做产品架构。
gtm:
  wedge: 先把一条真实运行中的第三方智能体工作流做成付费连续性评估；等客户把退出就绪材料包真正用进生产审批或续约决策，再转成年化治理合同。
  channels:
  - 由创始人主导外呼，直接找新加坡银行和大型 APAC 制造商里的 AI 平台负责人、CIO 幕僚、企业架构负责人和第三方风险 owner
  - 把共创客户试点挂在新的第三方智能体上线项目或年度韧性审查上
  - 与已经参与主权控制讨论的 AI 保障组织、系统集成商、云或网关生态做转介和集成合作
  funnelTargets: 从初次接触或转介绍到合格试点 20-30%，试点转生产 50%+，生产客户在 12 个月内扩到第二条工作流或第二家供应商 40%+。
  pricing: 按纳入治理的智能体供应商数量和受保护工作流数量收年订阅费，另收一次性的工作流抓取与基准测试实施费。首轮销售动作应从 $40k-$80k 的付费评估起步，并可抵扣进约 $120k-$200k 的年合同，这样既能把当下紧迫性货币化，又不会滑向无限制的人力服务计费。
businessModel:
  revenueStreams:
  - 连续性控制平面的年度订阅
  - 一次性的 onboarding 与备份基准测试费用
  - 面向续约审查、事故响应预案以及额外供应商/工作流覆盖的高级模块
  unitOfValue: 纳入管理的第三方智能体供应商，以及其下受保护的工作流
  targetGrossMarginPct: 70
  expansionLevers:
  - 第一条受监管审批跑通后，在同一客户内部增加更多工作流
  - 从单个供应商连续性评估扩到整个供应商组合的续约与事故响应治理
  - 从中国相关或主权敏感供应商扩展到更广义的企业智能体可迁移性
  - 等部署足够可复制后，再通过保障、云和系统集成伙伴放大销售
strategyMap:
  northStarMetric: 已上线的受保护第三方智能体工作流中，拥有“已测试备份路径 + 已记录退化区间”的占比。
  inputMetrics:
  - 来自目标银行与制造商账户的付费试点数量
  - 从工作流接入到产出首份连续性材料包的中位时长
  - 拥有足够遥测、可生成可迁移性评分的工作流占比
  - 试点转生产的转化率
  - 生产客户扩展到第二家供应商或第二条工作流的比例
  moatsToBuild:
  - 面向外部智能体提示词、工具、审批与后备映射的标准化 ontology
  - 记录故障切换时工作流退化情况的跨供应商基准数据集
  - 嵌入采购与韧性流程的可审计连续性材料包
  - 通过保障、云与网关集成伙伴建立的可信度与分发能力
  killCriteria:
  - 前 6 个月里，首批 15 个合格目标账户中，同意做付费连续性评估的不足 3 个。
  - 首批试点工作流中，能暴露足够遥测以生成可信可迁移性评分的比例低于 60%。
  - 完成 5 个付费试点后，试点转生产的转化率仍低于 40%。
  - 首批 8 个生产客户中，在 12 个月内扩到第二条工作流或第二家供应商的不足 2 家。
  mermaid: "flowchart LR\n  Wedge[Continuity assessment wedge] --> MVP[Workflow capture and benchmark MVP]\n  MVP --> Proof[Audit-ready exit packets and paid pilots]\n  Proof --> Expansion[Portfolio governance and broader vendor resilience]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 监管与地缘触发都很强，但在证明“能拿到足够遥测”和“预算 owner 可复制”之前，判断力度仍应受限。
    whyBelieve: 真实发生的强制撤销交易、活跃的新加坡治理指引，以及可见的第三方 AI 依赖，都给买方侧连续性控制层打开了一道可信窗口，而相邻工具并没有真正解决这个问题。
    whyDoubt: 滩头市场偏窄、替代方案很多，而且只要供应商遥测一弱，产品就可能在软件护城河形成前先塌成咨询服务。
    nextDiligence: 先确认 3 个来自新加坡银行或同等级受监管账户的付费试点，且都能基于真实供应商遥测产出可用连续性材料包，并至少把 1 个账户转成生产合同。
  firstCustomer:
    title: 在新加坡银行里跑第三方智能体试点的 AI 平台负责人
    profile: 一家总部在新加坡的银行，拥有 20-100 人 AI 平台与治理团队，正在试点外部客服或采购智能体；它接触受监管工作流，在规模化之前必须先过韧性审查。
    trigger: 新的供应商试点、年度运营韧性评审，或某个地缘事件，会把“如果供应商更换所有权或司法辖区，这个工作流能不能切走”变成董事会可见的问题。
    buyer: CIO 或企业平台负责人
    initialContract: 先对一条工作流做 $40k-$80k 的付费连续性评估；如果客户批准进入生产阶段，再转成约 $120k-$200k ACV 的年合同，持续治理供应商和工作流。
  mustBeTrue:
  - 前 15 个合格买方里，至少有 5 个会把第三方智能体连续性当成有预算的控制问题，而不是表格作业。
  - MVP 必须在 14 天内，用真实供应商遥测产出可信的可迁移性评分和后备材料包。
  - 首批管道里的目标供应商中，至少 60% 会暴露足够的提示词、工具 schema 或日志，供系统做有用的基准测试。
  - 在公司扩充产品套件之前，买方必须愿意为 1-2 条受保护工作流签下六位数年合同。
  - 首批 8 个生产客户中，至少 2 个会在 12 个月内扩展到额外供应商或工作流。
  diligenceQuestions:
  - 最先签单的预算 owner 到底是谁：AI 平台、运营韧性、采购，还是某个中央创新办公室？
  - 头部目标供应商究竟能在不做定制商业谈判的前提下，开放多少工作流遥测？
  - 在故障切换场景里，客服、采购和内部知识工作流能接受多大退化区间？
  - 买方更吃“主权风险连续性”这套说法，还是更广的“AI 供应商韧性”叙事？
  - 最可能先把这个切口吃掉的相邻现有厂商是谁：云厂商、网关，还是可观测性厂商？
operatingAssumptions:
- assumption: 新加坡银行会在真实试点期间，直接从 AI 平台或韧性预算里为付费连续性评估买单，而不是等到年度大采购周期。
  basis: research.yaml
  validationTest: 围绕真实试点或年度审查触发的 10 个活跃目标机会，至少拿下 3 个付费评估。
  decisionImpact: 如果不成立，公司就得转向伙伴主导销售，或先退回更轻的咨询切口，软件迭代速度也会随之下降。
- assumption: 目标供应商会开放足够的提示词、工具 schema 和日志，让公司无需深度逆向就能稳定做出可迁移性评分。
  basis: research.yaml
  validationTest: 对 5 家目标供应商做技术尽调，至少 3 家在只加轻量买方侧埋点的前提下，支持可用于基准测试的数据抓取。
  decisionImpact: 如果不成立，路线图就必须收窄到 API-first 供应商，或更早引入合同导出条款与更重的解决方案工作。
- assumption: 在第一条受保护工作流跑通后，买方会愿意为连续性治理支付约 $120k-$200k 年 ACV。
  basis: idea.yaml
  validationTest: 和 8 位预算 owner 测试 3 套打包方式，并拿到 2 份带明确转化预期区间的已签试点范围。
  decisionImpact: 如果不成立，公司就得缩小范围、扩大账户基数，或接受一个比风险投资故事更小的市场。
- assumption: 工作流可迁移性数据形成防守力的速度，要快过现有厂商把“连续性”语言简单贴到可观测性或网关产品上的速度。
  basis: 团队判断
  validationTest: 在交易里出现直接模仿者前，先验证试点数据能否跨至少 3 类供应商或工作流原型复用，形成可对比的退化基准。
  decisionImpact: 如果不成立，公司就该把重点放在渠道合作和嵌入式工作流位置，而不是单独强调护城河。
- assumption: 如果第一条工作流确实帮客户推进了审批或续约，受监管客户会在 12 个月内从单次连续性评估扩展到多供应商治理。
  basis: research.yaml
  validationTest: 首批 8 个生产账户中，至少拿下 2 个第二条工作流或第二家供应商扩张。
  decisionImpact: 如果不成立，这个滩头市场就过于事件驱动，公司应重新判断产品是否支撑得起风险投资级增长。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 12 位银行和制造商里的 AI 平台、采购与韧性负责人，他们都在推进第三方智能体试点。
  hypothesis: 在试点审批和年度韧性审查阶段，购买紧迫性最高，而且至少会有一部分买方愿意立刻为连续性评估付费。
  successMetric: 8 场访谈命中 ICP，其中 3 家同意明确的付费试点范围。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 针对 5 家目标供应商，审查其 API 访问、提示词、工具 schema、日志和可导出能力。
  hypothesis: 至少有 3 家供应商会暴露出足够的遥测，足以做出可信的一代可迁移性评分。
  successMetric: 3 份供应商画像达到可直接跑基准测试的状态，且无需超出轻量买方侧埋点的定制工程。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 为一家新加坡银行或同等级受监管企业，围绕各自的一条真实工作流交付 3 个付费连续性评估。
  hypothesis: 连续性材料包会暴露出明确的迁移缺口或后备方案，而且买方会把它真正用进生产审批或续约。
  successMetric: 2 家客户在内部审批或审查流程里引用这份材料包，且其中 1 家转成生产合同。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 把 1 条客服工作流和 1 条采购工作流，分别拿去对照获批备选栈跑基准测试。
  hypothesis: 只要工作流重要性相对较低、可容忍退化有限，连续性支出仍然说得通。
  successMetric: 每条工作流都产出经客户 sponsor 认可的退化区间和书面切换方案。
  owner: 解决方案负责人
- horizon: 6–12 个月
  experiment: 给那些同时治理多家供应商的客户，上线供应商组合看板和审批工作流。
  hypothesis: 相比一次性评估，多供应商治理会更明显地提升扩张率和续约防守力。
  successMetric: 2 个生产客户新增第二家供应商或第二条工作流，并在固定审查周期里使用看板。
  owner: 产品负责人
- horizon: 12–18 个月
  experiment: 测试一条来自保障机构或云伙伴的 sourced pilot 渠道。
  hypothesis: 只要伙伴本来就在参与 AI 治理或主权相关讨论，就有机会以接近创始人外呼的 CAC 贡献高质量管道。
  successMetric: 伙伴来源机会占合格管道至少 25%，且试点转化率不低于直销。
  owner: GTM 负责人
operations:
- 在接收试点前，先用一份供应商遥测资格清单审查提示词、工具 schema、日志、审批步骤和导出权。
- 把可迁移性评分、退化区间、切换步骤和所需人工检查点统一进一套审计材料格式。
- 任何连续性结论在被采购或生产审批引用前，都必须和客户 sponsor 跑完一轮基准测试复核。
- 尽量优先做轻量集成，接入云、网关和保障生态，而不是为单个客户做一次性深度定制。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 在品类尚未成形时，亲自负责创始人主导销售、共创客户发现、定价和早期伙伴拓展。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责搭建工作流标准化、基准测试编排，以及第一版可审计产品界面。
- role: 解决方案与韧性负责人
  startTiming: 第 2 个月
  rationale: 确保试点尽量产品化，把受监管买方需求沉淀成实施模板，并撑起基准测试可信度。
- role: 产品负责人
  startTiming: 第 6 个月
  rationale: 在首批连续性评估跑出共性后，接手供应商组合工作流、审批体验和打包设计。
- role: GTM 负责人
  startTiming: 第 9 个月
  rationale: 只有在创始人销售已经验证试点转化和定价之后，才增加可复制的管道能力。
milestones:
- horizon: 0–12 个月
  items:
  - 完成 12-15 场 ICP 访谈，拿下 3 个付费连续性评估，并至少签下 1 家新加坡银行共创客户。
  - 交付 v1 工作流抓取、后备基准测试，以及面向客服与采购工作流的可导出审计材料包。
  - 至少把 2 个付费评估转成年化生产合同。
  - 在遥测合格的供应商上，把基准测试交付时间压到 14 天以内。
- horizon: 12–24 个月
  items:
  - 拿到 8-12 个生产客户，并能同时治理多家供应商或多条工作流。
  - 补上供应商组合看板、审批流和续约审查模块。
  - 建立至少 1 个真正能贡献机会的保障、云或系统集成渠道伙伴。
  - 在 API-first 供应商上证明部署已可复制，定制工作受限。
- horizon: 24–36 个月
  items:
  - 把生产收入做到与模型中 $5.0M SOM 一致的水平。
  - 从主权触发型场景扩展到更广的 AI 供应商韧性和事故响应工作流。
  - 把基准数据集做大到足以影响定价、续约和竞争差异化。
risks:
- risk: 供应商自有工作流可能暴露不出足够的遥测，导致可迁移性评分不可信。
  likelihood: High
  impact: High
  mitigation: 从 API-first 供应商切入，试点前先做遥测资格审查，并在可能的地方加入买方侧埋点和导出条款。
- risk: 买方可能直接选择内部重建或继续用表格治理，而不是购买新的控制平面。
  likelihood: Medium
  impact: High
  mitigation: 把焦点放在审批速度真正重要的工作流上，量化“重建成本 vs 连续性成本”，并让试点直接绑定真实审批决策。
- risk: 云厂商、网关或可观测性厂商可能在公司建立数据优势前，就先把相邻能力打包进去。
  likelihood: Medium
  impact: Medium
  mitigation: 牢牢占住买方侧工作流可迁移性、基准证据和受监管审批材料包，而不是去做泛路由或泛 tracing。
- risk: 以主权风险为核心的初始切口，可能窄到撑不起可复制的风险投资级增长。
  likelihood: Medium
  impact: High
  mitigation: 在产品架构和叙事上提前预留空间，让成功试点能自然扩展成更广的 AI 供应商韧性与续约工作流。
- risk: 受监管企业的销售周期可能慢到 18 个月 pre-seed 计划扛不住。
  likelihood: Medium
  impact: Medium
  mitigation: 把首个产品做窄、先收费，直接切入正在发生的试点或审查触发，再借助共创客户和渠道伙伴缩短建立信任的时间。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 募集 18 个月资金，用来验证付费连续性需求，搭出工作流抓取与基准测试核心，完成 3-5 个付费试点，把首批受监管客户转成生产合同，并证明公司能从一条受保护工作流扩展到组合级供应商韧性。
