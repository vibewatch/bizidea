differentiator: 现有供应商风险工具停在问卷层，通用 AI 网关也只是负责路由流量。这家公司抓的是第三方智能体真正的行为层——提示词、工具 schema、审批步骤和评测基线——让买方能基准测试并切换整个工作流，而不只是替换模型端点。由此沉淀出的跨供应商智能体等价性与迁移成本数据，会比重服务型的连续性咨询更有防守力。
