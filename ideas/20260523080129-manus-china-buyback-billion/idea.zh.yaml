problem: 企业 AI 团队越来越早就采购第三方智能体产品，往往还没来得及把工作流完整地在内部复现出来。供应商一旦突然变更所有权、司法辖区或关键人员，买方就会在自己并不掌控的提示词、工具链和评估逻辑上形成生产依赖。现在所谓的连续性规划，大多还停留在表格化的供应商评审和一次性的安全问卷；真到智能体供应商被迫撤销交易、拆分资产或重组为受主权约束的实体时，这些东西几乎派不上用场。
targetUser:
  primary: 总部在新加坡、正在中国及其他 APAC 市场部署外部智能体供应商的银行或全球制造企业中的 AI 平台负责人，或第三方 AI 治理负责人
  secondary: 负责 AI 供应商审批与韧性的采购、企业架构和安全团队
  buyer: CIO、首席数字官，或企业平台负责人
startupThesis:
  nonObviousInsight: 新的主权风险失效模式，不只发生在跨境 AI 并购上。真正的问题是：企业在部署之后，可能会在运营上深度依赖一家高速扩张的智能体供应商，而这家公司的所有权、核心创始人或法律结构随后又发生变化。相比底层模型能不能迁移，智能体工作流能不能迁移更关键。
  beachhead: 面向总部在新加坡的银行与区域制造商，提供智能体供应商连续性保障；这些客户正在试点第三方 Agentic AI 副驾，而其核心工程团队、IP 或控制权位于中国
  wedge: 在上线前，先从外部智能体供应商处快照提示词、工具契约、审批流和评测基线，再在获批备选方案上跑影子备份，并生成退出就绪评分卡
  whyNowCatalyst: Manus 被迫撤销交易、计划重组为 JV，而且技术早已被集成，这些都在提醒企业买方：战略级 AI 供应商一旦变动，必须提前准备好智能体供应商的逃生舱。
  ventureScalePath: 先从地缘政治暴露度高的供应商切入，做第三方智能体连续性；再扩展成跨区域、跨行业的企业 AI 供应商采购、续约和事故响应里的标准韧性与可迁移层。
solution: 这是一套企业级智能体供应商连续性平台，给那些想用外部智能体产品、又不想把命运绑在单一供应商法律归宿上的团队。产品接入供应商的 agent API、工作流定义、工具 schema、提示词模板和日志，然后沉淀出一份买方可独立治理的标准化表示。它会针对备选供应商或获批的开放权重栈跑影子评测，告诉团队哪些工作流真的能迁、哪些工具一换就断、切换后质量会掉多少。系统还会输出一份可直接给董事会看的连续性材料包，覆盖创始人所在地风险、控制权变动、集成深度和切换预案。往后走，这家公司有机会成为 AI 供应商韧性、续约谈判和跨供应商智能体可迁移性的主记录系统。
goToMarketSeed:
  firstCustomer: 总部在新加坡、拥有 20-100 人 AI 平台团队的银行或工业制造商；它正在试点来自中国创始团队供应商的客服、采购或知识工作智能体
  buyingTrigger: 新的供应商试点、年度供应商风险评审，或某个地缘事件让团队担心战略级 AI 供应商会被重组、叫停或直接不可用
