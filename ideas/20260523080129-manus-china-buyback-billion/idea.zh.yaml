jobsToBeDone:
- job: 当我们为客服或采购试点第三方 AI 智能体时，帮平台团队保住一条可用的后备路径；这样即便供应商被重组或被叫停，我们也能继续推进。
  currentAlternative: 手工做备份测试，外加内部重写预案
  successMetric: 把一条受保护工作流切到获批备选方案所需的天数
- job: 当供应商风险委员会追问某个战略级 AI 供应商能不能迁走时，帮我们量化迁移成本和质量损失，好让我们放心批准上线。
  currentAlternative: 表格问卷加一次性 POC
  successMetric: 已完成测试备份并记录退化区间的受保护工作流占比
