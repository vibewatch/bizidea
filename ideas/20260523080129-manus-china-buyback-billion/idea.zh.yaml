topRisks:
- name: 供应商可观测性有限
  description: 有些第三方智能体供应商可能不会暴露足够细的工作流细节，导致备份抓取难以做到高置信度。
  mitigation: 先从已经开放 API、工具 schema 和日志的供应商入手，再通过轻量 SDK 和买方侧埋点向外扩展。
- name: 买方可能默认选择内部重建
  description: 大型企业可能会觉得最稳妥的做法，是自己重建关键智能体工作流，而不是为连续性软件付费。
  mitigation: 聚焦那些“速度比所有权更重要”的工作流，提前量化迁移成本和退化区间，把产品定位成缩短重建时间，而不是取代内部掌控。
- name: 备份质量很难证明
  description: 如果备选供应商的表现明显更差，客户可能不会相信连续性承诺，购买意愿就起不来。
  mitigation: 建立严格的影子评测基准，先从低风险内部工作流切入，并透明报告退化区间，而不是承诺完美等价。
