modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> PayingCustomers
      PayingCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
      PayingCustomers --> BenchmarkData
      BenchmarkData --> Expansion
modelSanity:
- checkName: Revenue engine
  finding: The base case reaches $3.28M Y3 revenue by moving from 5 paying accounts in Y1 to 50 by Q4Y3 at roughly $96K recurring ARPU.
- checkName: Must go right
  finding: Deployments must stay under 45 days so founder-led pilots convert fast enough to add 15 customers in Y2 before a heavy sales buildout.
- checkName: Model breaks if
  finding: If procurement and works-council review stretch the sales cycle toward six months, the downside case pushes cash below zero before the seed milestone.
- checkName: Next-round proof
  finding: Exiting Y2 with 20 paying customers, repeatable connector coverage, and partner-sourced pipeline is the evidence base that justifies the next financing.
sanityChecks:
  ruleOf40: Y3 growth 188% + EBITDA margin -4% = 184%
  burnMultiple: Using EBITDA burn over net new ARR, burn multiple improves from about 0.7x in Y2 to about 0.05x in Y3.
  revenuePerFte: $219K Y3 using 15 Q4Y3 FTE (within the lower end of a $200K-$400K SaaS benchmark)
  flags:
  - The 50-customer Y3 endpoint matches the researched SOM path, so any slip in partner-sourced pipeline or deployment throughput meaningfully compresses upside.
  - The model is intentionally conservative on revenue because it excludes onboarding and services fees even though the business plan includes them.
  - Cash stays positive in the base case, but only with disciplined hiring and no major delay from German legal or works-council review.
