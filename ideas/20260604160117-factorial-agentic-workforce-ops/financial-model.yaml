scenarios:
  downside:
    description: Works-council review and pilot conversion both slip by roughly one quarter, lowering logo count and expansion confidence.
    y3RevenueK: 2380.0
    y3EbitdaK: -720.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
    - A6 reduced from 30 Y3 adds to 18 Y3 adds
    - A7 ARPU reduced from $96K to $90K
    - A9 Y3 gross margin held at 68% instead of 72%
    - A10 churn rises from 1.5% to 2.5%
  base:
    description: Founder-led pilots convert on plan, partner leverage starts in Y2, and the company reaches the researched 50-customer SOM path by Q4Y3.
    y3RevenueK: 3280.0
    y3EbitdaK: -135.7
    cashLowPointK: 349.8
    keyAssumptionChanges:
    - A6 holds at 30 Y3 adds to 50 customers by Q4Y3
    - A7 recurring ARPU stays at $96K
    - A9 gross margin improves to 72% in Y3
  upside:
    description: Partner channels work earlier, deployments stay under 35 days, and benchmark upsells lift both logo pace and realized ACV.
    y3RevenueK: 4100.0
    y3EbitdaK: 320.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - A6 increased from 30 Y3 adds to 40 Y3 adds
    - A7 ARPU rises from $96K to $102K via entity and benchmark upsells
    - A9 Y3 gross margin reaches 74%
