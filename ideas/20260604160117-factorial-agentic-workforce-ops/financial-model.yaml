  source: '[BP executiveSummary] pre-launch state'
- id: A4
  name: Y1 paying-customer adds
  value: 5 adds by M12, landing in M2/M4/M6/M8/M12
  unit: count
  source: '[BP milestones 0-12 months] 5 design partners and 3 paid pilots; conservative heuristic assumes 5 paying accounts by year-end'
- id: A5
  name: Y2 paying-customer adds
  value: 15 adds to reach 20 customers by Q4Y2
  unit: count
  source: '[BP milestones 12-24 months] reach 10 production customers; base case assumes continued founder-led plus first partner-assisted ramp'
- id: A6
  name: Y3 paying-customer adds
  value: 30 adds to reach 50 customers by Q4Y3
  unit: count
  source: '[BP milestones 24-36 months] + [Research market.som] 50 customers path'
- id: A7
  name: Recurring ARPU
  value: '96'
  unit: USDK per customer per year
  source: '[Research market.som] ~$96k ARR per customer; within [BP gtm.funnelTargets] $70k-$140k land ACV band'
- id: A8
  name: Revenue recognition policy
  value: Recognize only recurring subscription revenue; revenue equals average active customers per period × $8K monthly ARPU; onboarding fees excluded from base case
  unit: policy
  source: '[BP businessModel.revenueStreams] + conservative modeling heuristic to keep customer × ARPU reconciliation clean'
- id: A9
  name: Gross-margin ramp
  value: 68% in Y1, 70% in Y2, 72% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct] 70% plus heuristic that implementation-heavy early years start slightly below target and mature above target'
- id: A10
  name: Monthly churn
  value: '1.5'
  unit: percent
  source: Startup-finance heuristic for sticky mid-market B2B workflow software with annual contracts and mixed-stack deployment
- id: A11
  name: Blended CAC
  value: '45'
  unit: USDK per new customer
  source: '[BP gtm.funnelTargets] paid-pilot motion + startup-finance heuristic of roughly 0.45-0.50x first-year ACV for consultative founder-led enterprise sales'
- id: A12
  name: Loaded compensation bands
  value: Founder $108K; engineering $144K-$150K; product/implementation $114K-$132K; sales/partnerships $132K-$144K; compliance/security $96K-$156K; finance/admin $84K
  unit: USDK annual loaded cash compensation
  source: Startup-finance heuristic for Germany/EU pre-seed hiring including payroll taxes and benefits
- id: A13
  name: Hiring schedule
  value: BP-named hires start in M1/M3/M6/M9; scale hires add implementation, sales, engineering, finance, and compliance capacity through Q4Y3
  unit: timing
  source: '[BP team] + [BP strategicChoices.sequencingRationale]'
- id: A14
  name: Non-payroll operating overhead
  value: R&D tools/cloud $6K-$16K per month; S&M programs/travel $4K-$24K per month; G&A/legal/insurance/accounting $5K-$14K per month
  unit: USDK per month
  source: Lean startup-finance heuristic consistent with Germany-first enterprise pilots and compliance-heavy deployment
- id: A15
  name: Next financing milestone
  value: Reach 20 paying customers, median deployment under 45 days, reusable connector package, and partner-sourced pipeline by Q4Y2
  unit: milestone
  source: '[BP milestones] + [BP product.sixMonth] + [BP gtm.channels]'
- id: A16
  name: Cash conversion simplification
  value: No debt, capex, or working-capital timing modeled; EBITDA is used as cash movement proxy
  unit: policy
  source: Startup-finance modeling heuristic for pre-seed planning model
