topRisks:
- name: 集成蔓延
  description: 如果产品要先做太多深度集成，才能自动化第一条工作流，客户价值就可能被拖慢。
  mitigation: 先从一个以读取为主的入职和离职工作流切进去，配好强人工兜底，只有在确认 SLA 改善之后再把集成做深。
- name: 买方归属不清
  description: HR、薪资、IT 和运营都会承认问题是大家共有的，但未必有人愿意单独拿预算。
  mitigation: 围绕一个足够痛、管理层看得见的指标去卖，比如按时就绪率或离职完成度，并把跨部门报表打包好，让一个高层赞助人能看见明确 ROI。
- name: 套件型现有厂商下探中型市场
  description: 一旦这个切口被市场看见，HR 套件或 ITSM 厂商可能会补上基础的生命周期自动化。
  mitigation: 赢在跨系统编排、德国优先的流程深度，以及跨部门执行基准数据，而不只是清单自动化。
