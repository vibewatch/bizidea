jobsToBeDone:
- job: 当经理发起招聘或调岗时，帮我们的中央运营团队把这条请求拆成一套协同完成的薪资、权限和设备动作，这样员工在生效日当天就能完全就绪，不用团队再四处追着补。
  currentAlternative: 靠 HRIS 任务、工单、表格和后台门户人工串联
  successMetric: 入职和异动按时完成的比例，以及每次员工变更要消耗多少运营工时
- job: 当有人离开公司时，帮 HR、薪资和 IT 把所有权限撤销、最终薪资和资产回收任务都带着证据做完，这样我们就不会留下合规缺口和残留权限。
  currentAlternative: 共享清单、邮件催办和人工找经理确认
  successMetric: 离职收尾全部完成所需时间，以及漏做或延迟撤权任务的数量
