problem: 德国的中型雇主往往会发现，劳动力管理最难的部分不是经理说出“招聘”“调岗”或“终止合同”那一刻，而是这之后 HR、薪资、财务和 IT 还得在各自孤立的系统和工单队列里分别执行。一次员工变更，往往要同步改合同、调薪资、开关软件权限、处理设备、走成本中心审批，而这些动作散落在邮件、表格、HRIS 任务和后台控制台里。结果就是入职延期、离职权限残留、薪资出错，管理者在快速扩张期也越来越不信任中后台团队。
targetUser:
  primary: 德国本土、跨多国经营且员工数 300-2,500 人、HR、薪资、财务和 IT 中台团队较精简的雇主中的人才运营 VP 或 COO
  secondary: 负责入职、异动、离职执行的人才系统经理、薪资负责人和 IT 服务台负责人
  buyer: COO、首席人才官或运营 VP
startupThesis:
  nonObviousInsight: 下一家真正值钱的劳动力软件公司，不会是另一套 HR 套件，而是把一次员工状态变更直接拆成跨部门动作的执行图谱：该发哪些薪资动作、开哪些权限、配哪些资产、走哪些审批。只要买方开始相信智能体软件可以碰 HR、财务和 IT 工作流，最稀缺的产品就不再是记录系统，而是围绕员工变更事件的运营协同和可审计性，尤其是对负担不起企业级大套件复杂度的欧洲中型公司。
  beachhead: 总部在德国、拥有多个法人实体、员工数 300-2,500 人、至少有一个德国以外办公室，而且每月有 40 次以上入职、异动或离职事件，眼下仍靠 HRIS、薪资工具、工单系统和人工 IT 管理串起来的企业
  wedge: 一套员工变更控制平面，把每一条入职、异动、离职请求都变成一个可执行的动作包，里面同时覆盖审批、薪资更新、软件权限、设备任务，以及横跨 HR、财务和 IT 的证据日志
  whyNowCatalyst: Factorial 的融资、以德国为先的扩张，以及它明确转向智能体化 HR、财务和 IT 工作流，都说明买方已经准备好为能真正执行劳动力变更的软件买单，而不是只买记录软件。
  ventureScalePath: 先把入职、异动、离职编排跑通，再往假期与工时政策、外包人员生命周期、一线排班变动、内部流动扩，再往上走到欧洲中型雇主劳动力事件的操作系统。
solution: 产品不去替换客户现有的 HRIS、薪资系统、工单工具和身份系统，而是架在它们之上。每一次员工变更都会变成一条结构化工作流，里面有必经审批、按国家配置的任务模板、主数据系统校验，以及分派给各运营团队、带明确截止时间的动作队列。智能体负责起草动作、补齐缺失信息、推荐下一步，但像薪酬调整、敏感权限、政策冲突这类异常情况，最终审批仍由人把关。经理和管理层看到的是一个统一状态页：在生效日前，这名员工的薪资、权限和设备到底有没有都准备好。时间一长，公司还能沉淀出一套数据：哪些部门最容易返工，哪类变更最常撞 SLA，哪些流程可以从有人盯着走到基本无人接手。
goToMarketSeed:
  firstCustomer: 一家总部在德国的软件或商业服务公司，员工数 600-1,500 人，正在慕尼黑招聘，并至少还有一个第二欧洲办公室；其中台团队每月要处理 50-150 次横跨 HR、薪资和 IT 的入职、异动、离职事件
  buyingTrigger: 在德国开新办公室或继续扩编、整合新收购团队、人员增长把人工入离职流程压垮，或曾发生过一次和薪资或权限变更相关的审计事故
  currentAlternative: HRIS 任务、薪资后台、ITSM 工单、表格清单、共享邮箱，以及 HR、财务、IT 之间的人工协调
  switchingReason: 第一批客户愿意切换，是因为这个切口能在不大规模替换现有套件的前提下，直接减少入职延期和离职错误，同时还给管理层一条覆盖全部劳动力变更的统一审计轨迹，而不是一堆散落的交接记录。
  pricingHypothesis: 按活跃的员工变更工作流数量和支持的法人实体收取年度平台费，另加系统集成和政策映射的上线费用
