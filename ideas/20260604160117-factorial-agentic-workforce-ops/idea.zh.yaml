differentiator: 这家公司既不是泛化的 HR 助手，也不是另一条横向工单工作流。它的护城河是员工变更图谱：针对每一类劳动力事件，哪些审批、哪些薪资步骤、哪些权限动作、哪些按国家区分的任务必须按什么顺序完成。每跑完一次入职、异动、离职工作流，这张图谱就更厚一层，也会顺手积累 SLA 风险、异常模式和跨团队交接的数据；而把 HR、薪资和 IT 模块各自分开的厂商，很难在一个地方把这些东西拼起来。
