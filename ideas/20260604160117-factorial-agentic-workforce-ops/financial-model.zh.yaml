scenarios:
  downside:
    description: 职工委员会评审和试点转化都大约晚了一个季度，客户数和扩张信心都被压低。
    y3RevenueK: 2380.0
    y3EbitdaK: -720.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
    - A6 从 Y3 新增 30 家下调到 Y3 新增 18 家
    - A7 的 ARPU 从 $96K 下调到 $90K
    - A9 中 Y3 毛利率维持在 68%，而不是 72%
    - A10 的流失率从 1.5% 升到 2.5%
  base:
    description: 创始人主导的试点按计划转化，伙伴杠杆从 Y2 开始起效，公司在 Q4Y3 走到研究里那条 50 客户 SOM 路径。
    y3RevenueK: 3280.0
    y3EbitdaK: -135.7
    cashLowPointK: 349.8
    keyAssumptionChanges:
    - A6 维持 Y3 新增 30 家，到 Q4Y3 达到 50 家客户
    - A7 的经常性 ARPU 保持在 $96K
    - A9 中 Y3 毛利率提升到 72%
  upside:
    description: 伙伴渠道更早起效，部署持续压在 35 天以内，基准数据增购同时抬高客户增长节奏和实际 ACV。
    y3RevenueK: 4100.0
    y3EbitdaK: 320.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - A6 从 Y3 新增 30 家上调到 Y3 新增 40 家
    - A7 的 ARPU 从 $96K 升到 $102K，主要来自法人实体和基准数据增购
    - A9 中 Y3 毛利率达到 74%
