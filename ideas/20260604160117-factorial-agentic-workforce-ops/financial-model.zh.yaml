modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads --> PaidPilots\n  PaidPilots --> PayingCustomers\n  PayingCustomers --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash\n  PayingCustomers --> BenchmarkData\n  BenchmarkData --> Expansion\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景下，收入从 Y1 的 5 个付费账户走到 Q4Y3 的 50 个，按约 $96K 的经常性 ARPU，对应 Y3 收入达到 $3.28M。
- checkName: 必须成立
  finding: 部署时间必须压在 45 天以内，这样创始人主导的试点才能足够快地转化，在大规模扩销售团队之前，于 Y2 新增 15 个客户。
- checkName: 模型失效条件
  finding: 如果采购和职工委员会评审把销售周期拖向 6 个月，下行情景会在达到种子轮里程碑之前把现金打到零以下。
- checkName: 下一轮证明
  finding: Y2 结束时做到 20 个付费客户、可复用的连接器覆盖，以及伙伴带来的管道，这组证据才足以支撑下一轮融资。
sanityChecks:
  ruleOf40: Y3 增长率 188% + EBITDA 利润率 -4% = 184%
  burnMultiple: 用 EBITDA burn / 净新增 ARR 来看，burn multiple 从 Y2 的约 0.7x 改善到 Y3 的约 0.05x。
  revenuePerFte: 按 Q4Y3 的 15 名 FTE 计算，Y3 人均收入为 $219K，处在 $200K-$400K SaaS 基准的较低区间。
  flags:
  - Y3 的 50 客户终点和研究里的 SOM 路径一致，因此只要伙伴带来的管道或部署吞吐稍有滑坡，上行空间就会被明显压缩。
  - 模型在收入上故意保守，因为它没有把商业计划里提到的上线费和服务费算进去。
  - 基础情景下现金仍为正，但前提是招聘节奏必须克制，而且不能被德国法务或职工委员会评审大幅拖慢。
