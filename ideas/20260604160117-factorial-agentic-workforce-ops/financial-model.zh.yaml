assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: 月
  source: '[BP date]'
- id: A2
  name: 种子前轮交割后的期初现金
  value: '2300'
  unit: USDK
  source: '[BP fundingAsk] + 创业财务经验法则：覆盖到 Q4Y2 里程碑的 24 个月跑道，再加 6 个月缓冲'
- id: A3
  name: 起始付费客户数
  value: '0'
  unit: 数量
  source: '[BP executiveSummary] 上线前阶段'
- id: A4
  name: Y1 新增付费客户
  value: 到 M12 新增 5 家，落在 M2/M4/M6/M8/M12
  unit: 数量
  source: '[BP milestones 0-12 months] 里有 5 家共创客户和 3 个付费试点；保守起见，默认年底做到 5 个付费账户'
- id: A5
  name: Y2 新增付费客户
  value: 新增 15 家，到 Q4Y2 达到 20 家客户
  unit: 数量
  source: '[BP milestones 12-24 months] 到 10 个生产客户；基础情景假设创始人主导销售继续推进，并开始吃到第一批伙伴杠杆'
- id: A6
  name: Y3 新增付费客户
  value: 新增 30 家，到 Q4Y3 达到 50 家客户
  unit: 数量
  source: '[BP milestones 24-36 months] + [Research market.som] 的 50 客户路径'
- id: A7
  name: 经常性 ARPU
  value: '96'
  unit: 每客户每年 USDK
  source: '[Research market.som] 每客户约 ~$96k ARR；落在 [BP gtm.funnelTargets] 的 $70k-$140k 落地 ACV 区间内'
- id: A8
  name: 收入确认政策
  value: 只确认经常性订阅收入；收入 = 期内平均活跃客户数 × $8K 月度 ARPU；基础情景不计入上线费用
  unit: 政策
  source: '[BP businessModel.revenueStreams] + 保守建模经验法则：先把客户数 × ARPU 的口径保持干净'
- id: A9
  name: 毛利率爬坡
  value: Y1 为 68%，Y2 为 70%，Y3 为 72%
  unit: 毛利率百分比
  source: '[BP businessModel.targetGrossMarginPct] 为 70%，再叠加经验法则：前期实施较重，会略低于目标，成熟后高于目标'
- id: A10
  name: 月度流失率
  value: '1.5'
  unit: 百分比
  source: 针对粘性较强的中型 B2B 工作流软件、年合同和混合栈部署的创业财务经验法则
- id: A11
  name: 综合 CAC
  value: '45'
  unit: 每个新客户 USDK
  source: '[BP gtm.funnelTargets] 的付费试点打法 + 创业财务经验法则：顾问式创始人主导企业销售，CAC 约为首年 ACV 的 0.45-0.50x'
- id: A12
  name: 总包薪酬带宽
  value: 创始人 $108K；工程 $144K-$150K；产品/实施 $114K-$132K；销售/合作 $132K-$144K；合规/安全 $96K-$156K；财务/行政 $84K
  unit: 年化总现金薪酬 USDK
  source: 适用于德国/欧盟种子前轮招聘、含雇主税和福利的创业财务经验法则
- id: A13
  name: 招聘节奏
  value: BP 点名岗位分别在 M1/M3/M6/M9 入职；扩张期岗位在 Q4Y3 前陆续补上实施、销售、工程、财务和合规产能
  unit: 时间
  source: '[BP team] + [BP strategicChoices.sequencingRationale]'
- id: A14
  name: 非薪酬运营开销
  value: 研发工具/云每月 $6K-$16K；销售与市场项目/差旅每月 $4K-$24K；G&A/法务/保险/会计每月 $5K-$14K
  unit: 每月 USDK
  source: 符合德国优先企业试点和高合规部署特征的精益创业财务经验法则
- id: A15
  name: 下一轮融资里程碑
  value: 到 Q4Y2 前做到 20 个付费客户、部署中位时长低于 45 天、拥有可复用连接器包，并形成伙伴带来的管道
  unit: 里程碑
  source: '[BP milestones] + [BP product.sixMonth] + [BP gtm.channels]'
- id: A16
  name: 现金转换简化
  value: 不建模债务、资本开支或营运资金时差；用 EBITDA 近似现金变动
  unit: 政策
  source: 适用于种子前轮规划模型的创业财务经验法则
