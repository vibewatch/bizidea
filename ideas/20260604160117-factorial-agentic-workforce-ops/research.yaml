    sourceRefs:
      - 25
openQuestions:
  - >-
    How many Germany-headquartered employers in the 600-1,500 employee range actually generate
    50-150 monthly JML events outside concentrated hiring bursts?
  - >-
    Which stack combinations dominate the beachhead accounts, especially across HRIS, payroll,
    ticketing, Microsoft/Okta identity, and device tooling?
  - >-
    Will works councils accept agent-drafted actions if every sensitive approval remains human, or
    will they still demand lengthy negotiation before rollout?
  - >-
    Can the product land first through IT-owned offboarding pain and then expand into payroll and
    onboarding, or does it need a COO-led buying motion from day one?
