jobsToBeDone:
  - job: >-
      When a manager hires or transfers an employee, help our central operations team turn that request into one coordinated
      set of payroll, access, and equipment actions, so the employee is fully ready on the effective date without manual chase
      work.
    currentAlternative: Manual coordination across HRIS tasks, tickets, spreadsheets, and admin portals
    successMetric: Percentage of joiners and movers completed on time and hours of ops work per employee change
  - job: >-
      When someone leaves the company, help HR, payroll, and IT complete every revocation, final-payroll, and asset task with
      evidence, so we avoid compliance gaps and orphaned access.
    currentAlternative: Shared checklists, email follow-ups, and manual manager confirmation
    successMetric: Time to full offboarding completion and number of missed or late revocation tasks
ideaScorecard:
  signalStrength:
    score: 4
    rationale: The cluster combines a large funding round, broad customer footprint, explicit cross-functional workflow ambition, and a named Germany wedge.
  painIntensity:
    score: 4
    rationale: Broken employee-change workflows create direct operational pain through start-date failure, payroll mistakes, and access risk, though not every buyer feels it every week.
  wedgeClarity:
    score: 5
    rationale: Joiner, mover, and leaver orchestration is a tight first workflow with a clear buyer set, measurable SLA outcomes, and an obvious incumbent alternative.
  defensibility:
    score: 4
    rationale: The employee-change graph, policy mappings, and exception dataset can become sticky operating infrastructure across multiple internal systems.
  ventureScale:
    score: 5
    rationale: Workforce-event orchestration can expand from one lifecycle workflow into the broader control plane for HR, payroll, finance, and IT operations across Europe.
topRisks:
  - name: Integration sprawl
    description: Customer value may slip if the product needs too many deep integrations before it can automate the first workflow.
    mitigation: Start with one read-heavy joiner and offboarding workflow, ship a strong manual fallback, and deepen integrations only after proving SLA improvement.
  - name: Buyer ownership ambiguity
    description: HR, payroll, IT, and operations may each see the problem as shared but not fully own the budget.
    mitigation: Sell through a single painful metric such as on-time readiness or offboarding completion, and package cross-functional reporting that gives one executive sponsor clear ROI.
  - name: Suite incumbents move downmarket
    description: HR suites or ITSM vendors could add basic lifecycle automation once the wedge becomes visible.
    mitigation: Win on cross-system orchestration, Germany-first process depth, and execution benchmarks across departments rather than on checklist automation alone.
