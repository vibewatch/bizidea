problem: >-
  Mid-market employers in Germany often discover that the painful part of workforce management starts after a manager says
  "hire," "transfer," or "terminate," because HR, payroll, finance, and IT still execute those changes in separate systems and
  ticket queues. A single employee move can require contract updates, payroll changes, software access edits, device handling,
  and cost-center approvals that live across email, spreadsheets, HRIS tasks, and admin consoles. The result is delayed starts,
  orphaned access, payroll mistakes, and managers who stop trusting central ops teams during periods of rapid expansion.
targetUser:
  primary: VP People Operations or COO at a Germany-based, multi-country employer with 300-2,500 employees and lean central teams spanning HR, payroll, finance, and IT
  secondary: People systems managers, payroll leads, and IT service-desk owners responsible for joiner, mover, and leaver execution
  buyer: COO, Chief People Officer, or VP Operations
startupThesis:
  nonObviousInsight: >-
    The next valuable workforce software company is not another HR suite; it is the execution graph that turns one employee
    status change into a coordinated set of payroll, access, asset, and approval actions across multiple departments. Once
    buyers believe agentic software can touch HR, finance, and IT workflows, the scarce product becomes operational
    coordination and auditability around people-change events, especially for European mid-market companies that cannot afford
    enterprise-suite complexity.
  beachhead: >-
    Germany-headquartered, multi-entity employers with 300-2,500 employees, at least one non-German operating office, and
    40 or more monthly joiner, mover, or leaver events that are still coordinated through an HRIS plus payroll tools, ticketing
    systems, and manual IT admin work
  wedge: >-
    A people-change control plane that turns each joiner, mover, or leaver request into one executable action packet spanning
    approvals, payroll updates, software access, device tasks, and evidence logs across HR, finance, and IT
  whyNowCatalyst: >-
    Factorial's funding, Germany-first expansion, and stated shift into agentic HR, finance, and IT workflows show that buyers
    are ready to fund operational software that executes workforce changes instead of merely recording them.
  ventureScalePath: >-
    Start with joiner, mover, and leaver orchestration, then expand into leave and time-policy workflows, contractor lifecycle
    management, frontline staffing changes, internal mobility, and eventually the operating system for workforce events across
    European mid-market employers.
solution: >-
  The product sits above the customer's existing HRIS, payroll stack, ticketing tools, and identity systems rather than trying
  to replace them. Every people-change event becomes a structured workflow with required approvals, country-specific task
  templates, system-of-record checks, and a deadline-backed action queue for each operating team. Agents draft the work,
  collect missing data, and propose the next action, but humans keep approval over exceptions such as compensation changes,
  sensitive access, or policy conflicts. Managers see one status view for whether an employee is payroll-ready, access-ready,
  and equipment-ready before the effective date. Over time, the company builds the dataset on which departments create the most
  rework, which change types miss SLA most often, and which workflows can move from supervised to touchless execution.
goToMarketSeed:
  firstCustomer: >-
    A Germany-headquartered software or services company with 600-1,500 employees, new hiring in Munich plus at least one
    second European office, and a central ops team that handles 50-150 monthly joiner, mover, and leaver events across HR,
    payroll, and IT
  buyingTrigger: >-
    Opening or expanding a German office, integrating a newly acquired team, a headcount-growth push that overwhelms manual
    onboarding and offboarding, or an audit incident involving payroll or access changes
  currentAlternative: >-
    HRIS tasks, payroll admin portals, ITSM tickets, spreadsheet checklists, shared inboxes, and manual coordination across HR,
    finance, and IT
  switchingReason: >-
    The first customer switches because this wedge shrinks start-date delays and offboarding mistakes without forcing a suite
    rip-and-replace, while giving leadership one audit trail for every workforce change instead of scattered handoffs
  pricingHypothesis: >-
    Annual platform fee priced by active employee-change workflows and supported legal entities, plus onboarding fees for
    systems integration and policy mapping
