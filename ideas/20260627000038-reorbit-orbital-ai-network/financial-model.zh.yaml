scenarios:
  downside:
    description: 集成商采购拖延，首个试点更晚转正，公司到 Y3 结束时只有 3 个付费项目，范围更窄、交付也更依赖人工。
    y3RevenueK: 2112.5
    y3EbitdaK: -673.8
    cashLowPointK: -348.8
    keyAssumptionChanges:
    - 首个付费试点大约晚一个季度落地，因此公司到 Y2 结束只有 2 个付费项目，到 Y3 结束只有 3 个。
    - 正式生产范围更窄、用量收入更晚到来，导致混合年 ARPU 从 $820K 降到 $780K。
    - 集成、认证和证据包工作复用度更低，因此毛利率更接近 66%。
  base:
    description: 公司在 Y1 拿下一家集成商主导的试点，Y2 转正式生产，再靠同一套架构在 Y3 结束前做到 4 个付费海上项目。
    y3RevenueK: 3040.6
    y3EbitdaK: 149.5
    cashLowPointK: 783.2
    keyAssumptionChanges:
    - 客户数量按 A6-A8 推进：Y1 结束 1 个付费项目，Y2 结束 3 个，Y3 结束 4 个。
    - 混合年 ARPU 维持在 $820K，随着可复用适配器增加，毛利率回归商业计划里 70% 的目标水平。
    - 团队到 Y3 结束增至 8 名 FTE，并且只有在额外正式生产复用跑出来后，才补试点后的新岗位。
  upside:
    description: 如果灯塔试点表现很强，再叠加合作伙伴转介绍，公司就可能更早拿下项目，到 Y3 结束做到 5 个付费项目，同时 ARPU 更高、实施毛利也更干净。
    y3RevenueK: 4120.6
    y3EbitdaK: 965.8
    cashLowPointK: 1068.7
    keyAssumptionChanges:
    - 因为首个参考部署更快变成集成商可复制加购项，公司能在 Y2 结束做到 4 个付费项目，Y3 结束做到 5 个。
    - 完整正式生产许可和节点用量收入更早挂上来，混合年 ARPU 从 $820K 升到 $860K。
    - 认证证据和适配器工作大多模板化后，Y3 实际毛利率向 74% 靠拢。
sensitivity:
- variable: ARPU
  downsideCase: 由于客户购买的项目范围更窄、用量扩张更晚，混合年 ARPU 最终落在 $780K。
  baseCase: 模型中假设混合年 ARPU 维持在 $820K。
  upsideCase: 更多项目转成完整正式生产，且终端数量扩张后，混合年 ARPU 可升到 $860K。
  y3RevenueImpactK: -148.1
  cashImpactK: -164.2
- variable: CAC
  downsideCase: 由于集成商研讨会、出差和认证陪跑增加，S&M 强度从 4% 收入抬升到约 5%，有效 CAC 上升。
  baseCase: 模型中假设每个新增付费项目的 CAC 维持在约 $384K。
  upsideCase: 合作伙伴转介绍让 S&M 强度向 3% 收入靠拢。
  y3RevenueImpactK: 0.0
  cashImpactK: -48.2
- variable: 流失率
  downsideCase: 续约或项目预算没有全部延续时，留存效果相当于公司在 Y3 结束时少 1 个付费项目。
  baseCase: 基础路径在单位经济模型中采用 1.0% 月流失率，同时客户路径本身已反映公共部门客户集中的特点。
  upsideCase: 留存效果相当于公司保住每一个正式生产项目，并且在不丢 logo 的情况下完成项目内扩张。
  y3RevenueImpactK: -580.6
  cashImpactK: -395.2
- variable: 销售周期
  downsideCase: 由于集成商采购和安全评审时间拉长，每个新项目都大约晚一个季度关闭。
  baseCase: 基础情形假设首个付费试点在 M9 到来，后续项目按 A6-A8 的里程碑节奏推进。
  upsideCase: 参考客户带来的可信度压缩了安全评审，让其中一个项目能提前约一个季度成交。
  y3RevenueImpactK: -68.3
  cashImpactK: -218.2
- variable: 毛利率
  downsideCase: 由于太多现场集成和证据包工作仍靠人工，毛利率停留在 66% 左右。
  baseCase: 模型用商业计划里 70% 的目标毛利率来衡量成熟期单位经济。
  upsideCase: 随着适配器、审计包和部署 playbook 可复用，毛利率可向 74% 靠拢。
  y3RevenueImpactK: 0.0
  cashImpactK: -218.1
- variable: 招聘节奏
  downsideCase: 为了应付定制化交付和安全开销，平台、客户成功和合规岗位都得提前 1–2 个季度招聘。
  baseCase: 基础情形会等到额外正式生产复用显现后，才补试点后的新增岗位。
  upsideCase: 如果集成仍足够标准化，公司就能维持基础招聘计划，用 8 名 FTE 支撑 4 个项目。
  y3RevenueImpactK: 0.0
  cashImpactK: -121.5
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      IntegratorLeads[集成商共创客户] --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基础情形收入来自这样一条路径：Y1 结束时有 1 个付费试点，到 Y3 结束做到 4 个付费海上项目，每个项目的混合年价值约为 $820K。
- checkName: 必须成立的前提
  finding: 首个试点必须在 M9 前落地，并证明适配器足够可复用，才能在不把公司做成服务外包的前提下，于 Y2 结束前再关掉两个海上项目。
- checkName: 模型会在哪种情况下失效
  finding: 如果采购或操作员信任滑向 downside 情形，业务在积累到足以自我供血之前，Y3 末现金会跌到约 -$0.35M。
- checkName: 下一轮融资的证明点
  finding: 当首个试点转成正式生产、3 个付费项目跑出可复用认证证据，并且到第 4 个项目的路径已经清楚时，seed 融资故事才算站稳。
sanityChecks:
  ruleOf40: Y3 增长率 71.1% + EBITDA 利润率 4.9% = 76.0%（对这样一条窄而深的国防相邻软件切口来说很健康，不过这个比较也受益于 Y2 基数较小）。
  burnMultiple: Y2 burn multiple 约为 0.3x，对应大约 $1640.0K 的净新增 ARR；进入 Y3 后 EBITDA 转正，同时 ARR 再增加 $820.0K。
  revenuePerFte: Y3 年末每名 FTE 对应 $380K 收入（落在早期企业软件常见的 $250K-$500K 粗略区间内）。
  flags:
  - 模型假设存在一家点名集成商，能把这套软件挂进现有海上项目，而不用新增独立采购。
  - ARPU 锚定的是研究里的 SOM 算法和商业计划中的价格区间，而不是这个细分类别的已观察合同数据。
  - 基础情形只有 4 个付费项目，因此任何一次转正延后或一次不续约，都会对跑道和下一轮融资时点产生放大影响。
  - 只有在公司把集成做成可复用能力、避免滑向定制系统集成服务时，毛利率假设才成立。
