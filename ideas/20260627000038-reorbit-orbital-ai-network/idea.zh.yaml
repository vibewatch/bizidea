problem: 在偏远海岸和北极区域执行海上监视的团队，不能指望地面回传始终在线；但无人机发现的目标又必须足够快送到一线操作员手里，才有行动价值。现在他们要么花大价钱通过 SATCOM 回传原始视频，要么只能信任每架无人机本地装着的模型，版本、优先级和实际运行证据都难以管住。结果就是任务更慢、更吃带宽，也更难在混编机队和联盟伙伴之间完成认证。
targetUser:
  primary: 波罗的海或北欧海上监视集成商里的任务系统负责人，正为某个海岸警卫队或边防项目部署 10–50 架 ISR 无人机和手持终端小组。
  secondary: 在偏远巡逻时，通过移动设备接收告警的现场情报官。
  buyer: 集成商内部的项目经理或 ISR 运营负责人。
startupThesis:
  nonObviousInsight: 真正的瓶颈不是再多发几颗卫星，而是当地面链路消失时，怎么把获批模型和可核验证据打包好，让有用情报能穿过无人机、轨道和手持终端之间的每一次交接。
  beachhead: 在地面覆盖断断续续的海岸或北极试点里，波罗的海和北欧的海上监视集成商必须把无人机检测结果送到现场小组。
  wedge: 用签名任务包把合适的模型放到无人机、卫星或手持终端上，并且只转发压缩后的证据包，而不是整段视频。
  whyNowCatalyst: OrbitCloud 拿到资金后，正在把直连终端连接和轨道推理揉成一套架构；在完整星座成规模前，客户已经可以买到“韧性告警路由”这一层软件。
  ventureScalePath: 先从海上 ISR 告警投递切入，再把控制平面扩到陆地边境监视、灾害响应、偏远工业安全，以及任何间歇连接边缘网络里的联盟模型治理。
solution: Contested Link Inference Router 是一层控制平面，把一次监视任务拆成无人机、卫星和现场设备可执行的模型、路由和证据策略。起飞前，平台会把获批的计算机视觉模型和带宽预算打成一个任务包；任务进行中，它再决定推理该在机上跑、把裁剪图发到轨道节点，还是只把缩略图加坐标的告警推到手持终端。操作员能看到完整审计链：哪个模型版本触发了告警、传了什么证据、链路在哪一步失效——这对国防验收和复盘都很关键。产品会接入私有卫星网络、无人机地面站和现有指挥控制软件，而不是把它们整套替掉。
goToMarketSeed:
  firstCustomer: 一家芬兰或波罗的海海上监视集成商，正服务某个海岸警卫队试点：10–20 架 ISR 无人机、沿海覆盖不稳定，还有需要分钟级告警的手持终端用户。
  buyingTrigger: 新的试点或采购节点要求系统在脱离地面覆盖时也能稳定运行，或者要求切换到主权通信基础设施。
  currentAlternative: 通过 SATCOM 回传全动态视频，再在现有指挥控制工具里做人工分诊，同时靠临时方式给每架无人机更新模型。
  switchingReason: 它能压低带宽负担，保住 AI 检测结果的留痕链，而且即便任务失去地面链路，也能把获批告警送到现场小组。
  pricingHypothesis: 按任务项目收年费平台费，再根据接入的无人机、轨道节点和活跃现场设备分层收费。
