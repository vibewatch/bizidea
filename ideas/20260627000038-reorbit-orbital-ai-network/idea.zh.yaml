  defensibility:
    score: 3
    rationale: 产品起步会很依赖集成，但围绕链路表现、模型放置和操作员信任形成的专有数据集，会随着时间累积。
  ventureScale:
    score: 4
    rationale: 一旦控制平面跑通，就能从海上 ISR 扩到更广的主权边缘、灾害和偏远工业网络，它们面对的是同类链路约束。
topRisks:
- name: 采购拖延
  description: 即便任务痛点很明确，国防和海岸警卫队的采购周期也可能拖慢独立软件的采用。
  mitigation: 先从已有资金支持的集成商试点切入，把产品包装成与近期演训或验收节点绑定的任务就绪度条目。
- name: 网络碎片化
  description: 卫星、无人机和指挥系统各不相同，可能让路由层集成成本高、标准化困难。
  mitigation: 先围绕北欧海上试点做一套参考架构，用厂商中立的策略引擎加存储转发连接器来落地。
- name: 操作员不信 AI 告警
  description: 如果检测噪声大或溯源薄弱，现场小组就会无视告警，重新依赖原始视频或人工流程。
  mitigation: 先盯住一种高价值告警类型，每个数据包都附带证据缩略图和模型溯源，并保留人工确认回路做再训练。
