jobsToBeDone:
- job: 当地海巡任务失去地面回传时，帮助任务系统负责人把经验证的检测结果送到现场小组，让他们不用等原始视频也能行动。
  currentAlternative: 能传就通过 SATCOM 回传原始视频；传不了就退回语音、无线电和事后人工复核。
  successMetric: 链路退化期间，告警送达时间中位数仍低于 60 秒。
- job: 当试点增加新无人机或新模型时，帮助项目经理把获批 AI 包部署到混合边缘节点上，让系统顺利通过安全和验收评审。
  currentAlternative: 靠人工给每个平台装模型，再用表格和邮件追踪版本。
  successMetric: 一次模型更新能在 1 天内覆盖整个任务网络，并留下完整记录。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 资助、项目定义以及点名的军工与工业用例，都指向一个可信的新基础设施类别。
  painIntensity:
    score: 4
    rationale: 在链路失效时把情报及时送出去，对偏远监视任务是真痛点；靠原始视频回传来补救，成本也很高。
  wedgeClarity:
    score: 4
