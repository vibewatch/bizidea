slug: contested-link-inference-router
date: "2026-06-27"
executiveSummary: >-
  Contested Link Inference Router is a mission-software layer for Baltic and Nordic maritime-surveillance programs that need trusted drone detections to reach field teams when terrestrial links fail. The beachhead is not generic orbital AI; it is one vessel-of-interest alert workflow inside an existing coast-guard or border-force pilot where SATCOM bandwidth is scarce and response time matters. The product packages approved models, routing policy, and evidence rules into signed mission bundles so an integrator can govern what runs on the drone, what is escalated upstream, and what minimum packet reaches a handset or C2 system. The researched market supports this wedge because Baltic RPAS operations, secure-satcom buildout, and maritime information-sharing programs already exist, while public-sector budgets are more likely to buy this capability as a line item inside a larger mission program than as a standalone AI tool. The deliberate strategy is to sell through mission-system integrators and secure-connectivity partners rather than pursue direct agency platform replacement. The biggest disconfirming risk is that operators may still require short video bursts or raw video in too many alert events, which would weaken the bandwidth and trust advantage of compressed evidence packets. Another material gap is that the specific first integrator, target API surface, and trusted evidence format are not yet identified in the source files, so the first 90 days must validate those three points before broad product build-out. If those assumptions hold, the company can expand from one maritime-alert workflow into adjacent maritime missions and later other intermittently connected sovereign-edge networks.
problem:
  - Maritime RPAS teams in Baltic and Nordic waters cannot rely on terrestrial backhaul, but they still need sub-minute detections to reach field operators during live missions.
  - Current alternatives either stream raw video expensively over SATCOM or leave model deployment and evidence handling fragmented across drone, network, and C2 vendors.
  - Mixed fleets and coalition workflows make it hard to prove which model ran, what evidence was sent, and whether the alert should be trusted after link degradation.
solution:
  - Provide a signed mission-bundle control plane that packages approved models, routing rules, and evidence budgets across drone, satellite, and handset nodes.
  - Deliver compressed evidence packets with coordinates, confidence, thumbnails, and provenance instead of defaulting to full-motion video for every alert.
  - Keep an audit trail for model version, routing decisions, and failed handoffs so integrators can support acceptance, after-action review, and mixed-use compliance.
whyWeWin:
  - The wedge sits in a control-plane gap that incumbents do not own cleanly: SATCOM vendors move data, autonomy stacks run vehicles, and C2 tools display outputs.
  - The first product can ride existing RPAS and secure-connectivity budgets instead of asking agencies to replace transport or mission systems.
  - Real mission logs on model placement, evidence sufficiency, and degraded-link performance can compound into a reusable optimization and trust dataset.
strategicChoices:
  beachhead: Baltic and Nordic maritime-surveillance integrators supporting one vessel-of-interest alert workflow for a coast guard or border-force pilot operating outside reliable terrestrial coverage.
  wedgeRationale: "This entry point has live operational urgency, existing RPAS and SATCOM deployments, and a narrow acceptance test: whether trusted alerts can reach field teams faster and with less bandwidth than raw-video-first workflows."
  sequencingRationale: The company should first prove one reference architecture, one alert type, and one integrator channel before expanding product scope, because accreditation, operator trust, and partner API access are bigger early constraints than model breadth.
  notYet:
    - Pollution monitoring workflows that optimize for coverage volume over response-time-critical alert delivery.
    - Search-and-rescue decision support where proof standards and liability may require a different evidence package.
    - Generic land-border surveillance until the maritime reference architecture is repeatable.
    - Full-motion-video replacement or deep satcom orchestration inside every network layer.
market:
  tam: $225.0M estimated annual Europe-adjacent spend for denied-link maritime, border, and critical-infrastructure ISR control-plane software
  sam: $18.0M estimated annual spend across 15 Baltic and Nordic reachable programs
  som: $3.2M estimated annual revenue at four paying programs within 36 months
  segments:
    - Baltic and Nordic maritime-surveillance integrators serving coast guards and border forces
    - Defense drone mission-system primes adding resilient alert delivery to EU border or maritime pilots
  buyingProcess: >-
    The practical sale is prime-led: an integrator or framework service provider adds the product to an existing RPAS, surveillance-aircraft, or secure-connectivity program rather than procuring a standalone AI platform. Technical validation must satisfy the mission-systems lead and field users, while budget approval typically sits with the program manager responsible for pilot readiness and secure information flow.
product:
  mvp: >-
    A pilot-ready control plane for one reference stack: one drone platform, one secure-connectivity or store-and-forward path, one field or C2 endpoint, and one vessel-of-interest alert type with signed model deployment, evidence-packet rules, and audit logging. The MVP should prove alert delivery under degraded-link conditions rather than support every sensor, mission, or network.
  sixMonth: Secure one design partner, ship a simulator plus lab integration for signed mission bundles, and demonstrate sub-minute vessel-of-interest alerts with provenance into one handset or C2 workflow.
  twelveMonth: Land a paid pilot inside one Baltic or Nordic maritime program, add operator-configurable escalation from thumbnail to short-burst video, and complete the first reusable adapter set for one drone stack and one secure-connectivity stack.
  twentyFourMonth: Standardize the product as a repeatable mission-readiness module across 3-4 maritime programs, add a second maritime use case, and expose reusable governance and analytics for multi-mission deployments.
  keyBets:
    - Operators will trust thumbnail-plus-coordinate evidence for a meaningful share of alert events.
    - One target integrator can embed the software without triggering a net-new procurement.
    - Target transport and mission stacks expose enough hooks for routing policy above the existing network layer.
    - The first reference architecture will generalize across multiple Baltic and Nordic programs with limited custom engineering.
gtm:
  wedge: Sell a mission-readiness module for vessel-of-interest alerts in one Baltic or Nordic maritime-surveillance pilot where degraded-link operations are already budgeted.
  channels:
    - Direct enterprise sales to mission-system integrators already delivering RPAS or surveillance services
    - Embedded distribution through sovereign satcom and secure-connectivity partners that need application-layer value
    - Expansion through existing EMSA, Frontex, or Finnish Border Guard operating frameworks once one reference deployment is accepted
  funnelTargets: "Integrator intro→technical workshop 50%+, workshop→paid pilot 25%+, pilot→production 50%+, production→second mission expansion within 12 months 40%+"
  pricing: Program-based annual license plus implementation fee and node-based usage, because budgets live at the mission-program level while value scales with the number of accredited drones, orbital nodes, and field endpoints under policy control.
businessModel:
  revenueStreams:
    - Annual platform license per mission program
    - One-time or milestone-based implementation and accreditation support
    - Usage-based fees for connected drones, orbital nodes, or active field endpoints
  unitOfValue: Accredited mission program with a defined number of controlled edge nodes and field endpoints
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more drones, endpoints, and alert policies within the same program
    - Expand from one maritime alert workflow to additional maritime missions on the same architecture
    - Reuse the governance and audit layer across adjacent sovereign-edge programs once the first reference stack is proven
strategyMap:
  northStarMetric: Production missions where trusted alerts are delivered in under 60 seconds during degraded-link periods
  inputMetrics:
    - Number of integrator-sponsored technical workshops
    - Paid pilot win rate from qualified design partners
    - Median alert delivery latency under degraded-link test scenarios
    - Share of alert events accepted with compressed evidence rather than raw video
    - Pilot-to-production conversion rate
  moatsToBuild:
    - Proprietary mission-log dataset linking link conditions, model placement, and detection outcomes
    - Reusable signed mission-bundle templates for Baltic and Nordic maritime workflows
    - Proven provenance and audit infrastructure that is costly for transport or autonomy vendors to bolt on later
  killCriteria:
    - If no integrator sponsors a paid pilot within 12 months, the channel thesis is too weak for this wedge.
    - If operators require raw video or short-burst escalation in most target alert events, the evidence-packet ROI case is not strong enough.
    - If partner stacks do not expose sufficient routing or packaging hooks above the transport layer, the product becomes custom integration work rather than software.
  mermaid: |
    flowchart LR
      Wedge[Vessel-of-interest alert wedge] --> MVP[Signed mission-bundle MVP]
      MVP --> Proof[Paid pilot proves sub-minute trusted alerts]
      Proof --> Expansion[Expand to more maritime programs and missions]
investorMemo:
  verdict:
    call: Watch
    conviction: Compelling operational pain and a coherent narrow wedge, but conviction stays capped until one integrator, one trusted evidence format, and one usable partner control surface are validated.
    whyBelieve: The startup targets a real control-plane gap between RPAS operations, secure satcom, and field dissemination in a region where maritime-security urgency and sovereign-connectivity programs already create funded workflows.
    whyDoubt: Early adoption depends on partner-led procurement and operator trust in compressed evidence, neither of which is yet proven by the source files.
    nextDiligence: Confirm one named Baltic or Finnish integrator will embed the product in a paid pilot and specify the minimum evidence packet operators will act on without raw video.
  firstCustomer:
    title: Baltic maritime-surveillance integrator for coast-guard vessel-of-interest operations
    profile: A Finnish or Nordic mission-system provider running 10-20 ISR drones for one coast guard or border-force pilot with intermittent coastal coverage and handheld field users.
    trigger: A pilot milestone or procurement deadline that requires resilient alert delivery outside terrestrial coverage or migration onto sovereign communications infrastructure.
    buyer: Program manager or head of ISR operations at the integrator
    initialContract: $250k-400k paid pilot for one reference architecture, converting to a $700k-900k annual program license plus support if accepted as the approved mission-readiness module.
  mustBeTrue:
    - One Baltic or Finnish integrator can add this software to an existing maritime-surveillance program without a net-new standalone procurement.
    - Field operators will trust compressed evidence packets for a meaningful share of vessel-of-interest alerts.
    - One target drone, network, and C2 stack exposes enough integration hooks to support signed mission bundles and routing policy.
    - Program economics support a repeatable annual software spend of roughly $700k+ per production deployment.
    - The first deployment produces reusable policy and trust data rather than one-off services work.
  diligenceQuestions:
    - Which named integrator owns the first pilot architecture and budget line?
    - What exact alert packet will operators act on without asking for raw video?
    - Which partner APIs or control surfaces are available in the first target stack?
    - How much of the first contract is software versus custom integration labor?
    - What accreditation or mixed-use compliance step is most likely to delay deployment?
operatingAssumptions:
  - assumption: One vessel-of-interest alert workflow is urgent enough to justify deployment before broader platform scope exists.
    basis: research.yaml
    validationTest: Interview 3-5 Baltic or Nordic operators and confirm the selected workflow has the highest urgency-to-integration ratio among vessel-of-interest, pollution, SAR, and infrastructure monitoring.
    decisionImpact: If false, the company must change the beachhead use case before building the full pilot stack.
  - assumption: Integrators will buy the product as a readiness or interoperability module inside existing RPAS or secure-connectivity programs.
    basis: research.yaml
    validationTest: Obtain one draft SOW, pilot add-on budget, or written design-partner commitment showing the product can be attached to an active program.
    decisionImpact: If false, sales cycles lengthen materially and the company needs more capital or a different channel.
  - assumption: A thumbnail, coordinates, confidence score, and provenance package is enough evidence for first-response action in many alert events.
    basis: operator judgment
    validationTest: Run operator review sessions on 20-30 historical or simulated events and measure acceptability versus requests for short video or raw video.
    decisionImpact: If false, the product roadmap must shift toward burst-video prioritization and the bandwidth ROI case weakens.
  - assumption: Partner transport and mission systems expose enough interfaces for a policy layer above existing transport.
    basis: research.yaml
    validationTest: Complete one integration workshop with a secure-connectivity provider and one drone stack owner, producing a scoped adapter plan with no blocked control-surface dependency.
    decisionImpact: If false, the product becomes bespoke systems integration and should narrow to a different architecture or stop.
  - assumption: The first reference architecture will generalize to multiple Baltic and Nordic programs with limited rework.
    basis: idea.yaml
    validationTest: After the first pilot design, map required changes for two adjacent programs and verify at least 70% of policy, audit, and adapter code remains reusable.
    decisionImpact: If false, margins and scale potential are lower than the venture case requires.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Identify and secure one named Baltic or Finnish design partner.
    hypothesis: A mission-system integrator will sponsor a pilot if the product is framed as a readiness and interoperability module rather than a new AI platform.
    successMetric: One signed design-partner agreement or paid discovery SOW with an active maritime-surveillance program.
    owner: Founder/CEO
  - horizon: 0–90 days
    experiment: Define the minimum trusted evidence packet for vessel-of-interest alerts.
    hypothesis: Operators will act on thumbnail-plus-coordinate-plus-provenance packets in at least half of target alert scenarios.
    successMetric: ">=50% operator acceptance in structured review sessions without requesting raw video first."
    owner: Product lead
  - horizon: 0–120 days
    experiment: Complete one reference-architecture integration plan across drone, connectivity, and field-app endpoints.
    hypothesis: The first target stack exposes enough hooks to implement signed mission bundles and degraded-link routing without modifying core network infrastructure.
    successMetric: Written integration plan with no critical blocked dependency and an MVP scope under two adapters plus one field endpoint.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run degraded-link simulations for one vessel-of-interest workflow.
    hypothesis: The MVP can keep median alert delivery under 60 seconds while materially reducing transmitted data relative to raw-video-first operation.
    successMetric: Lab results showing sub-minute median alert latency and clear bandwidth reduction versus baseline.
    owner: Applied ML/DDIL systems engineer
  - horizon: 120–270 days
    experiment: Convert design partner into a paid field pilot.
    hypothesis: Mission outcomes and auditability are strong enough to justify a paid production path after a limited pilot.
    successMetric: Paid pilot contract worth at least $250k and a documented conversion plan to annual license pricing.
    owner: Founder/CEO
  - horizon: 180–360 days
    experiment: Validate repeatability with a second maritime program.
    hypothesis: At least 70% of the first deployment's policy, provenance, and adapter layer can be reused in an adjacent program.
    successMetric: Second design opportunity with reuse estimate >=70% and implementation timeline materially shorter than pilot one.
    owner: Field integration lead
operations:
  - Maintain a simulation and replay harness for degraded-link mission testing before any live deployment.
  - Package every release as an approved mission bundle with versioned model, routing, and evidence policies.
  - Build a lightweight accreditation evidence pack covering provenance, operator overrides, and audit logging for each pilot.
  - Formalize partner integration playbooks for one drone stack, one secure-connectivity path, and one C2 or handset endpoint.
