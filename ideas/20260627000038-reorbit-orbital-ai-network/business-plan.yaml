milestones:
  - horizon: 0–12 months
    items:
      - Secure one named Baltic or Finnish design partner and scope one vessel-of-interest pilot.
      - Ship MVP with signed mission bundles, compressed evidence packets, and audit logging for one reference stack.
      - Prove sub-minute alert delivery in degraded-link simulations and convert the first design partner into a paid pilot.
  - horizon: 12–24 months
    items:
      - Convert the first pilot into a production annual license.
      - Reuse the reference architecture in 1-2 additional maritime programs with materially lower integration effort.
      - Add operator-controlled escalation from thumbnail evidence to short-burst video where mission rules require it.
  - horizon: 24–36 months
    items:
      - Reach four paying maritime programs and establish the company as a standard mission-readiness module in the Baltic/Nordic wedge.
      - Expand into a second maritime workflow on the same governance and provenance layer.
      - Decide whether the product is repeatable enough to enter land-border or remote-industrial adjacencies.
risks:
  - risk: Integrator-led procurement takes longer than planned and prevents a fast first pilot.
    likelihood: High
    impact: High
    mitigation: Sell as a module inside funded RPAS or secure-connectivity programs and require explicit pilot sponsorship before heavy custom work.
  - risk: Operators reject compressed evidence as insufficient for live action.
    likelihood: Medium
    impact: High
    mitigation: Start with one alert class, include provenance and coordinates in every packet, and add controlled burst-video escalation rather than assume thumbnail-only acceptance.
  - risk: Partner stacks hide too much of the transport or mission layer for a reusable control-plane product.
    likelihood: Medium
    impact: High
    mitigation: Begin above the transport layer with store-and-forward logic and only deepen orchestration where partners expose stable interfaces.
  - risk: Compliance, export-control, or mixed-use review slows cross-border deployment.
    likelihood: Medium
    impact: Medium
    mitigation: Keep the first deployment inside one narrow maritime program, document model provenance early, and avoid unnecessary cross-border feature scope in v1.
  - risk: The product becomes services-heavy and fails to build reusable software margins.
    likelihood: Medium
    impact: High
    mitigation: Hold the line on one reference architecture, track code reuse across pilots, and decline edge cases that require bespoke platform replacement.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to secure one design partner, build the pilot-ready control plane, complete two core integrations plus accreditation evidence, and convert the first maritime pilot into a repeatable production wedge.
