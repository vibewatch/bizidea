jobsToBeDone:
  - job: "When a coastal patrol mission loses terrestrial backhaul, help mission systems leads deliver verified detections to field teams, so they can act without waiting for raw video."
    currentAlternative: "Stream raw video over SATCOM when possible, or fall back to voice, radio, and later analyst review."
    successMetric: "Median alert delivery time stays under 60 seconds during link degradation."
  - job: "When a new drone or model is added to a pilot, help program managers deploy only approved AI packages across mixed edge nodes, so they can pass security and acceptance reviews."
    currentAlternative: "Manually load models on each platform and track versions in spreadsheets and email."
    successMetric: "A model update can be rolled out and documented across a mission network within one day."
