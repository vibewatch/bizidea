problem: "Maritime-surveillance teams in remote coastal and Arctic zones cannot count on terrestrial backhaul, yet they still need drone detections to reach field operators fast enough to matter. Today they either stream raw video expensively over SATCOM or trust whatever model is loaded on each drone, with weak control over versioning, prioritization, and proof of what actually ran. That makes missions slower, more bandwidth-heavy, and harder to certify across mixed fleets and coalition partners."
targetUser:
  primary: "Mission systems lead at a Baltic or Nordic maritime-surveillance integrator deploying 10-50 ISR drones plus handheld teams for one coast guard or border-force program."
  secondary: "Field intelligence officers who consume alerts on mobile devices during remote patrols."
  buyer: "Program manager or head of ISR operations at the integrator."
startupThesis:
  nonObviousInsight: "The bottleneck is not launching more satellites; it is packaging approved models and evidence so useful intelligence survives every handoff between drone, orbit, and handset when ground links disappear."
  beachhead: "Baltic and Nordic maritime-surveillance integrators running coastal or Arctic pilot programs where drone detections must reach field teams under intermittent terrestrial coverage."
  wedge: "Signed mission bundles that place the right model on the drone, satellite, or handset and forward only compressed evidence packets instead of full video."
  whyNowCatalyst: "OrbitCloud’s funded push to combine direct-to-device connectivity with orbital inference makes resilient alert routing an immediate software layer customers can buy before full constellations scale."
  ventureScalePath: "Start with maritime ISR alert delivery, then expand the control plane to land-border surveillance, disaster response, remote industrial safety, and coalition model-governance across any intermittently connected edge network."
solution: "Contested Link Inference Router is a control plane that turns a surveillance mission into signed model, routing, and evidence policies for drones, satellites, and field devices. Before launch, the platform packages approved computer-vision models and bandwidth budgets into a mission bundle; during operations, it decides whether to run inference on-drone, forward a crop to an orbital node, or deliver a thumbnail-and-coordinate alert to a handset. Operators get an audit trail showing which model version fired, what evidence was transmitted, and where connectivity failed, which matters for defense acceptance and after-action review. The product integrates with private satellite networks, drone ground stations, and existing command-and-control software rather than replacing them."
goToMarketSeed:
  firstCustomer: "A Finnish or Baltic maritime-surveillance integrator supporting one coast guard pilot with 10-20 ISR drones, intermittent coastal coverage, and handheld users who need sub-minute alerts."
  buyingTrigger: "A new pilot or procurement milestone that requires resilient operations outside terrestrial coverage or a shift to sovereign communications infrastructure."
  currentAlternative: "Full-motion-video backhaul over SATCOM plus manual analyst triage inside incumbent command-and-control tools and ad hoc model updates on each drone."
  switchingReason: "It cuts bandwidth load, preserves chain-of-custody on AI detections, and gets approved alerts to field teams even when the mission loses ground links."
  pricingHypothesis: "Annual platform fee per mission program plus usage tiers for connected drones, orbital nodes, and active field devices."
