topRisks:
  - name: "Procurement drag"
    description: "Defense and coast-guard buying cycles can delay standalone software adoption even when the mission pain is clear."
    mitigation: "Enter through funded integrator pilots and position the product as a mission-readiness line item tied to near-term exercises or acceptance milestones."
  - name: "Network fragmentation"
    description: "Different satellite, drone, and command stacks may make the routing layer expensive to integrate and hard to standardize."
    mitigation: "Build a vendor-neutral policy engine with store-and-forward connectors, starting with one reference architecture for Nordic maritime pilots."
  - name: "Operator trust in AI alerts"
    description: "If detections are noisy or provenance is weak, field teams will ignore the alerts and revert to raw video or manual workflows."
    mitigation: "Start with one high-value alert type, include evidence thumbnails and model provenance in every packet, and keep a human confirmation loop for retraining."