reportMemo:
  executiveTakeaways:
    - "The best beachhead is not generic satellite AI; it is resilient alert delivery for one maritime-surveillance workflow where links fail and field teams still need trusted detections."
    - "The buyer is likely a mission-system integrator or framework prime, because the budget and operational authority already sit inside larger RPAS, secure-comms, and maritime-security programs."
    - "The product wedge is a control-plane gap between transport, autonomy, and command software: deciding what inference runs where and what minimum evidence should survive the link."
    - "The strongest proof points are public Baltic/Nordic maritime programs, EU secure-satcom buildout, and open evidence that D2D and airborne SATCOM remain too constrained for routine full-motion-video workflows."
    - "Competitive intensity is real but mostly adjacent: incumbents own transport, autonomy, or data mesh layers rather than signed mission bundles, provenance, and evidence-aware routing."
  marketDefinition: >-
    The near-term market is mission software for denied-link maritime ISR: a layer that sits between drones, secure satellite connectivity, and field or command applications to package approved models, compress evidence, and preserve provenance when terrestrial backhaul is weak or absent.
  customerAndBuyer: >-
    The operational user is the maritime-surveillance team that needs fast, trusted alerts; the practical buyer is the integrator or prime responsible for delivering the pilot, accreditation package, and secure information flow into a coast-guard or border-security program.
  buyingTriggers:
    - point: "A new maritime or border-surveillance pilot has to work outside reliable terrestrial coverage."
      sourceRefs: [3, 4, 6, 7]
    - point: "Regional security incidents raise pressure to integrate more surveillance assets and improve shared situational awareness in the Baltic."
      sourceRefs: [8, 9, 10]
    - point: "A sovereign satcom or shared-maritime-picture program creates a fresh integration budget and a new interoperability deadline."
      sourceRefs: [14, 15, 16, 17, 27]
  willingnessToPay:
    summary: >-
      Budget is more likely to appear as a line inside larger RPAS, surveillance-aircraft, or secure-connectivity programs than as a standalone AI-tool purchase. Adjacent public programs already fund multi-year RPAS services, surveillance aircraft with encrypted real-time transfer, and orbital-network R&D, which supports a plausible low-single-digit-million annual software layer when tied to readiness, bandwidth reduction, and auditability.
    sourceRefs: [1, 25, 26]
  competitiveLandscape: >-
    The market is structurally adjacent to several stronger incumbents: satcom operators move data, autonomy vendors optimize vehicles, and surveillance platforms fuse pictures. The startup only wins if it stays narrow on signed model placement, evidence minimization, and chain-of-custody across drone, orbit, and handset.
  incumbentThesis:
    - incumbentClass: "Cloud platforms"
      point: "General cloud vendors do not solve classified transport, cross-domain exchange, or DDIL mission accreditation by default."
      sourceRefs: [13, 15, 16]
    - incumbentClass: "SATCOM operators"
      point: "Transport vendors can provide resilient links, but they do not inherently decide what inference should run on the drone versus upstream or what evidence packet is sufficient."
      sourceRefs: [16, 17, 22, 28, 29]
    - incumbentClass: "Autonomy stacks"
      point: "Autonomy software is strong at operating vehicles in denied environments, but weaker at cross-platform dissemination, provenance, and handheld delivery."
      sourceRefs: [11, 30, 31]
    - incumbentClass: "Prime-built surveillance platforms"
      point: "Custom multi-asset platforms can be procured inside existing programs, but they tend to be integration-heavy and less reusable across missions or countries."
      sourceRefs: [7, 14, 15, 27]
  regulatoryLandscape: >-
    Mixed-use deployment matters. Pure military use can be handled inside defense-specific regimes, but coast-guard, border, and shared-agency workflows pull the product into EU AI, dual-use, and secure-communications compliance expectations.
  technologyLandscape: >-
    The substrate is maturing quickly: secure EU satcom programs, NATO digital-backbone work, 3GPP NTN standards, and credible on-orbit AI demonstrations all exist. The hard problem is orchestration under constrained links, not merely access to another sensor or another network.
  distributionChannels:
    - point: "Sell through mission-system integrators or service providers already operating COCO or framework drone services for EU border and maritime agencies."
      sourceRefs: [6, 7, 25]
    - point: "Attach to recurring EMSA or Finnish Border Guard maritime-surveillance operations where the workflow and users already exist."
      sourceRefs: [3, 4, 5]
    - point: "Partner with sovereign satcom and secure-connectivity programs that need edge applications but are not themselves application vendors."
      sourceRefs: [16, 17, 18]
  partnershipEcosystem:
    - point: "Secure satcom and NTN providers are required to expose the transport path and make routing policy operational."
      sourceRefs: [16, 17, 18, 21, 22]
    - point: "Drone and mission-system primes matter because they own payload integration, acceptance testing, and buyer access."
      sourceRefs: [3, 6, 7, 25]
    - point: "Field-app and C2 partners matter because the end product is only valuable if alerts arrive in a trusted operational interface."
      sourceRefs: [7, 13, 15]
  dataMoats:
    - point: "Mission logs showing which model placement and compression choices preserve acceptable detections under real link budgets can compound into a hard-to-copy optimization dataset."
      sourceRefs: [22, 28]
    - point: "Provenance records across approved model versions, routes, and evidence packets become valuable compliance and trust infrastructure."
      sourceRefs: [11, 13, 19]
    - point: "Templates for Baltic maritime missions can be reused across pollution, vessel-of-interest, search-and-rescue, and border workflows."
      sourceRefs: [3, 4, 7, 14, 15, 27]
  geographicConsiderations:
    - point: "Baltic and Nordic waters are attractive because they combine remote coverage gaps, cross-border coordination, and urgent critical-infrastructure concerns."
      sourceRefs: [3, 4, 9, 10]
    - point: "High-latitude and open-ocean operations make resilient satcom and bandwidth discipline more important than in dense terrestrial environments."
      sourceRefs: [22, 28, 29]
    - point: "An EU-first strategy benefits from sovereign-connectivity momentum, but it also means planning for export-control and mixed-use compliance earlier."
      sourceRefs: [16, 17, 19, 20]
  sensitivityCases:
    - case: "Secure satcom programs expose little third-party control surface."
      impact: "The startup may need to begin as a drone-to-C2 or drone-to-handset routing layer before it can orchestrate true orbit participation."
      sourceRefs: [16, 17, 18]
    - case: "Operators require short video bursts rather than still-image evidence packets."
      impact: "Bandwidth savings shrink, SATCOM costs rise, and the ROI case depends more on prioritization than on pure compression."
      sourceRefs: [22, 28, 29]
    - case: "Procurement remains prime-led for longer than expected."
      impact: "Sales cycles lengthen, but the product can still enter as an integration or readiness module inside funded service frameworks."
      sourceRefs: [6, 7, 25, 26]
  validationPlan:
    - priority: high
      question: "Which Baltic or Finnish maritime-surveillance integrator already owns the pilot architecture and can embed this software without a fresh standalone procurement?"
      evidenceToGather: "Integrator rosters, contract structures, and program primes for EMSA, Finnish Border Guard, and Frontex-adjacent deployments."
    - priority: high
      question: "What minimum evidence packet will field users actually trust?"
      evidenceToGather: "Operator interviews and after-action workflows comparing stills, short clips, coordinates, and model-provenance fields."
    - priority: high
      question: "What APIs, policy hooks, or store-and-forward primitives are exposed by target satcom and mission stacks?"
      evidenceToGather: "Technical partner documentation and integration workshops with one secure-connectivity provider and one drone stack."
    - priority: medium
      question: "How much budget can be attached to bandwidth reduction, accreditation, and model-governance versus generic drone operations?"
      evidenceToGather: "Pilot SOWs, RFP line items, and change-order examples from RPAS and maritime-security programs."
    - priority: medium
      question: "Which initial use case creates the highest urgency: vessel-of-interest alerts, pollution, SAR, or critical-undersea-infrastructure monitoring?"
      evidenceToGather: "Mission frequency, false-positive tolerance, and response-time requirements from 3-5 target operators."
