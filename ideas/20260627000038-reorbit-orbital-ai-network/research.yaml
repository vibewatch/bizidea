    weaknessVsUs: "More vehicle-autonomy-centric than dissemination-centric; weaker fit for cross-platform routing and audit trails into field apps."
    sourceRefs: [11, 31]
  - name: "Viasat / Inmarsat Government SATCOM"
    stage: "incumbent"
    wedge: "Airborne ISR connectivity, backhaul, and coverage for remote and hostile environments."
    pricing: "Managed SATCOM and service contracts; public list pricing not available."
    strength: "Owns resilient transport, open-ocean coverage, and government relationships."
    weaknessVsUs: "Moves bits but does not decide what should be inferred where or what evidence is sufficient to transmit."
    sourceRefs: [22, 28, 29]
  - name: "Prime-built surveillance platform"
    stage: "incumbent"
    wedge: "Program-specific fusion stack embedded inside one agency or pilot."
    pricing: "Project or framework-budget funded."
    strength: "Fits existing procurement pathways and can be tailored tightly to one mission."
    weaknessVsUs: "Harder to reuse across programs and less likely to become a repeatable cross-network control-plane product."
    sourceRefs: [7, 14, 15, 27]
