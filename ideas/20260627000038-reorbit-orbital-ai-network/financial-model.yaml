scenarios:
  downside:
    description: Integrator procurement slips, the first pilot converts later, and the company exits Y3 with only 3 paying programs on lower-value scopes and more manual delivery work.
    y3RevenueK: 2112.5
    y3EbitdaK: -673.8
    cashLowPointK: -348.8
    keyAssumptionChanges:
    - The first paid pilot lands about one quarter later and the company reaches only 2 paying programs by Y2 exit and 3 by Y3 exit.
    - Blended annual ARPU falls from $820K to $780K as production scope stays narrower and usage revenue arrives later.
    - Gross margin stays closer to 66% as integration, accreditation, and evidence-pack work remain less reusable.
  base:
    description: The company wins one integrator-led pilot in Y1, converts it to production in Y2, and reuses the same architecture to reach 4 paying maritime programs by Y3 exit.
    y3RevenueK: 3040.6
    y3EbitdaK: 149.5
    cashLowPointK: 783.2
    keyAssumptionChanges:
    - Customer counts follow A6-A8, reaching 1 paying program by Y1 exit, 3 by Y2 exit, and 4 by Y3 exit.
    - Blended annual ARPU stays at $820K while gross margin normalizes to the 70% business-plan target as reusable adapters accumulate.
    - The team reaches 8 end-of-Y3 FTE and adds post-pilot hires only after additional production reuse is visible.
  upside:
    description: A strong lighthouse pilot plus partner referrals pull programs forward enough for the company to reach 5 paying programs by Y3 exit at higher ARPU and cleaner implementation margins.
    y3RevenueK: 4120.6
    y3EbitdaK: 965.8
    cashLowPointK: 1068.7
    keyAssumptionChanges:
    - The company reaches 4 paying programs by Y2 exit and 5 by Y3 exit because the first reference deployment becomes a repeatable integrator add-on faster than planned.
    - Blended annual ARPU rises from $820K to $860K as full production licenses and node-usage revenue attach earlier.
    - Gross margin improves toward 74% realized in Y3 because accreditation evidence and adapter work become mostly templated.
sensitivity:
- variable: ARPU
  downsideCase: Blended annual ARPU settles at $780K because customers buy narrower program scope and defer usage-based expansion.
  baseCase: Blended annual ARPU stays at $820K as modeled.
  upsideCase: Blended annual ARPU reaches $860K once more programs convert to full production and endpoint counts expand.
  y3RevenueImpactK: -148.1
  cashImpactK: -164.2
- variable: CAC
  downsideCase: Effective CAC rises because integrator workshops, travel, and accreditation hand-holding push S&M intensity from 4% to roughly 5% of revenue.
  baseCase: Modeled CAC stays near $384K per new paying program.
  upsideCase: Partner-led referrals let S&M intensity drift toward 3% of revenue.
  y3RevenueImpactK: 0.0
  cashImpactK: -48.2
- variable: churn
  downsideCase: Retention behaves like the company exits Y3 with 1 fewer paying program because renewals or program budgets do not all carry forward.
  baseCase: The base path assumes 1.0% monthly churn for unit economics while the modeled customer path already bakes in a concentrated public-sector account base.
  upsideCase: Retention behaves like the company keeps every production program and adds intra-program expansion without logo loss.
  y3RevenueImpactK: -580.6
  cashImpactK: -395.2
- variable: sales cycle
  downsideCase: Each new program closes about one quarter later because integrator procurement and security review take longer than planned.
  baseCase: The base case assumes the first paid pilot arrives in M9 and later program wins follow the milestone cadence in A6-A8.
  upsideCase: Reference-account credibility compresses security review and lets one program close about a quarter earlier.
  y3RevenueImpactK: -68.3
  cashImpactK: -218.2
- variable: gross margin
  downsideCase: Gross margin stays near 66% because too much field integration and evidence-pack work remains manual.
  baseCase: The model benchmarks mature unit economics to the 70% gross-margin target in the business plan.
  upsideCase: Gross margin moves toward 74% as adapters, audit packs, and deployment playbooks become reusable.
  y3RevenueImpactK: 0.0
  cashImpactK: -218.1
- variable: hiring pace
  downsideCase: Platform, customer-success, and compliance hires must be pulled forward by 1-2 quarters to handle bespoke delivery and security overhead.
  baseCase: The base case waits to add post-pilot hires until additional production reuse is visible.
  upsideCase: The company can hold the base hiring plan because integrations stay standardized enough to support 4 programs with 8 FTE.
  y3RevenueImpactK: 0.0
  cashImpactK: -121.5
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      IntegratorLeads[Integrator design partners] --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from moving from 1 paid pilot at Y1 exit to 4 paying maritime programs at roughly $820K of blended annual value each by Y3 exit.
- checkName: Must go right
  finding: The first pilot has to land by M9 and prove enough adapter reuse that two more maritime programs can close by Y2 exit without turning the company into a services shop.
- checkName: Model breaks if
  finding: If procurement or operator trust slips toward the downside case, the business exits Y3 about $0.35M below zero cash before it has enough scale to self-fund.
- checkName: Next-round proof
  finding: A credible seed story appears once the first pilot converts to production and 3 paying programs show reusable accreditation evidence plus a visible path to the fourth program.
sanityChecks:
  ruleOf40: Y3 growth 71.1% + EBITDA margin 4.9% = 76.0% (healthy for a narrow defense-adjacent software wedge, though the comparison still benefits from a small Y2 base).
  burnMultiple: About 0.3x in Y2 on roughly $1640.0K of net new ARR, then EBITDA turns positive in Y3 while ARR expands another $820.0K.
  revenuePerFte: $380K Y3 revenue per end-of-year FTE (within the rough $250K-$500K early enterprise-software benchmark).
  flags:
  - The model assumes one named integrator can attach the software to an existing maritime program without a net-new standalone procurement.
  - ARPU is anchored to research SOM math and the business-plan price range rather than to observed contract data from this exact category.
  - With only 4 paying programs in the base case, a single slipped conversion or non-renewal has an outsized effect on runway and next-round timing.
  - Gross margin only holds if the company keeps integrations reusable and avoids drifting into bespoke systems-integration work.
