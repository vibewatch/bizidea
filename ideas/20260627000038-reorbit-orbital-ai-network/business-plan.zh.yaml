slug: contested-link-inference-router
date: '2026-06-27'
executiveSummary: Contested Link Inference Router 是一层任务软件，服务波罗的海和北欧的海上监视项目：当地面链路失效时，它要把可信的无人机检测结果送到现场小组。它的滩头市场不是泛化的轨道 AI，而是现有海岸警卫队或边防试点里的一个“重点船只告警”工作流——这里 SATCOM 带宽紧、响应时间又很关键。产品把获批模型、路由策略和证据规则打成签名任务包，让集成商能管住什么在无人机上跑、什么往上游升级、以及最小告警包该怎么送到手持终端或 C2 系统。研究支持这个切口：波罗的海 RPAS 运营、安全卫星通信建设和海上信息共享项目都已经存在；而公共部门预算更可能把这项能力作为大项目中的一项软件条目采购，而不是单买一个 AI 工具。公司的刻意选择是通过任务系统集成商和安全连接合作伙伴去卖，而不是直接替换政府机构现有平台。最大的不确定性在于，操作员可能仍会在太多告警场景里坚持要短视频突发包或原始视频，这会削弱压缩证据包的带宽优势和信任优势。另一个关键缺口是，首个集成商、目标 API 控制面和可被信任的证据格式，在现有资料里都还没落地；所以前 90 天必须先把这三件事跑通，才能大规模铺开产品。如果这些假设成立，公司就能从单一海上告警工作流扩到相邻海上任务，再进一步进入其他间歇连接的主权边缘网络。
problem:
- 在波罗的海和北欧海域执行任务的海上 RPAS 团队，不能依赖稳定的地面回传；但实时任务里，他们仍需要把分钟级以内的检测结果送到现场操作员手中。
- 现有替代方案要么高成本地通过 SATCOM 回传原始视频，要么把模型部署和证据处理拆散在无人机、网络和 C2 供应商之间。
- 混编机队和联盟协同工作流让人很难证明到底跑了哪个模型、发了什么证据、以及链路退化后这条告警是否值得信。
solution:
- 提供一层签名任务包控制平面，把获批模型、路由规则和证据预算分发到无人机、卫星和手持终端节点。
- 默认不再为每条告警都回传全动态视频，而是发送带坐标、置信度、缩略图和溯源信息的压缩证据包。
- 保留模型版本、路由决策和失败交接的审计链，让集成商能支撑验收、复盘以及军民两用合规。
whyWeWin:
- 这个切口卡在一条现有厂商都没真正占住的控制平面空档里：SATCOM 厂商负责传数据，自主飞行栈负责管飞行器，C2 工具只负责展示输出。
- 第一代产品可以直接吃到现有 RPAS 和安全连接预算，不必要求机构替换传输层或任务系统。
- 围绕模型放置、证据充分性和退化链路表现积累的真实任务日志，会慢慢长成可复用的优化与信任数据集。
strategicChoices:
  beachhead: 波罗的海和北欧的海上监视集成商，正为某个海岸警卫队或边防试点支持一条“重点船只告警”工作流，而且任务发生在地面覆盖不可靠的区域。
  wedgeRationale: 这个入口有真实的作战紧迫性、现成的 RPAS 与 SATCOM 部署，以及一个很窄的验收标准：可信告警能不能比“先传原始视频”更快、且更省带宽地送到现场小组。
  sequencingRationale: 公司应先证明一套参考架构、一种告警类型和一个集成商渠道，再往外扩产品边界。早期真正卡脖子的不是模型种类，而是认证、操作员信任和合作伙伴 API 入口。
  notYet:
  - 先不做以覆盖规模优先、而非响应时效优先的污染监测工作流。
  - 先不碰搜救决策支持，这类场景的证据标准和责任风险可能完全不同。
  - 在海上参考架构没跑通之前，先不扩到泛化的陆地边境监视。
  - 先不承诺替换全动态视频，也不深入每一层网络里的 SATCOM 编排。
market:
  tam: $225.0M：欧洲周边受限链路海上、边境和关键基础设施 ISR 控制平面软件的预计年度支出
  sam: $18.0M：15 个可触达的波罗的海和北欧项目对应的预计年度支出
  som: $3.2M：36 个月内拿下 4 个付费项目时的预计年度收入
  segments:
  - 服务海岸警卫队和边防部门的波罗的海、北欧海上监视集成商
  - 为欧盟边境或海上试点补上韧性告警投递能力的国防无人机任务系统主承包商
  buyingProcess: 实际成交大概率由主承包商牵头：集成商或框架服务商把产品塞进现有 RPAS、监视飞机或安全连接项目里，而不是单独采购一套 AI 平台。技术验证要同时说服任务系统负责人和一线用户，而预算批准通常掌握在对试点就绪度和安全信息流负责的项目经理手里。
product:
  mvp: 围绕一套参考栈做出可试点的控制平面：一型无人机、一条安全连接或存储转发链路、一个现场或 C2 终端，以及一种“重点船只告警”类型，包含签名模型部署、证据包规则和审计日志。MVP 要先证明在链路退化时也能送达告警，而不是一开始就兼容所有传感器、任务和网络。
  sixMonth: 拿下一家共创客户，交付签名任务包的仿真器和实验室集成，并把带溯源信息的分钟级重点船只告警送进一个手持终端或 C2 工作流。
  twelveMonth: 在一个波罗的海或北欧海上项目里拿下付费试点，补上从缩略图到短视频突发包的操作员可配置升级，并完成第一套可复用的无人机栈与安全连接栈适配器。
  twentyFourMonth: 把产品标准化成可复制的任务就绪度模块，覆盖 3–4 个海上项目；再加第二个海上用例，并向多任务部署开放可复用的治理和分析能力。
  keyBets:
  - 操作员会在相当一部分告警场景里接受“缩略图 + 坐标”的证据形式。
  - 至少有一个目标集成商能在不触发全新采购流程的情况下把软件嵌进去。
  - 目标传输栈和任务栈会暴露出足够钩子，让路由策略跑在现有网络层之上。
  - 第一套参考架构只需有限定制工程，就能泛化到多个波罗的海和北欧项目。
gtm:
  wedge: 把产品卖成一个任务就绪度模块，服务波罗的海或北欧海上监视试点里的“重点船只告警”场景——这里退化链路本来就有预算。
  channels:
  - 直接面向已经交付 RPAS 或监视服务的任务系统集成商做企业销售
  - 通过需要应用层价值的主权卫星通信和安全连接合作伙伴嵌入式分发
  - 一套参考部署被验收后，再借 EMSA、Frontex 或 Finnish Border Guard 既有框架横向扩张
  funnelTargets: 集成商引荐→技术研讨会 50%+，研讨会→付费试点 25%+，试点→正式生产 50%+，生产→12 个月内扩到第二任务 40%+
  pricing: 按项目收取年度许可费，外加实施费和节点用量费，因为预算挂在任务项目层，而价值则跟受策略控制的获认证无人机、轨道节点和现场终端数量一起放大。
businessModel:
  revenueStreams:
  - 按任务项目收取年度平台许可费
  - 一次性或按里程碑收费的实施与认证支持
  - 按接入无人机、轨道节点或活跃现场终端收取用量费
  unitOfValue: 一个已获认证的任务项目，包含明确数量的受控边缘节点和现场终端
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一项目里增加更多无人机、终端和告警策略
  - 基于同一套架构，把一个海上告警工作流扩成更多海上任务
  - 首套参考栈跑通后，把治理和审计层复用到相邻主权边缘项目
strategyMap:
  northStarMetric: 在链路退化时，60 秒内把可信告警送达的正式生产任务数
  inputMetrics:
  - 由集成商赞助的技术研讨会数量
  - 合格共创客户转付费试点的胜率
  - 链路退化测试场景下的告警送达时延中位数
  - 使用压缩证据而非原始视频被接受的告警占比
  - 试点转正式生产的转化率
  moatsToBuild:
  - 把链路条件、模型放置和检测结果连在一起的专有任务日志数据集
  - 适用于波罗的海和北欧海上工作流的可复用签名任务包模板
  - 经验证的溯源与审计基础设施——后续传输层或自主飞行供应商想补上，成本会很高
  killCriteria:
  - 如果 12 个月内没有集成商愿意赞助付费试点，说明这个渠道假设不够成立。
  - 如果大多数目标告警场景里，操作员都要求原始视频或短视频突发包升级，那证据包的 ROI 逻辑就站不住。
  - 如果合作方栈在传输层之上暴露不出足够的路由或打包钩子，产品就会滑成定制集成，而不是软件。
  mermaid: |
    flowchart LR
      Wedge[重点船只告警切口] --> MVP[签名任务包 MVP]
      MVP --> Proof[付费试点证明分钟级可信告警]
      Proof --> Expansion[扩到更多海上项目与任务]
investorMemo:
  verdict:
    call: 观察
    conviction: 作战痛点足够强，切口也足够窄而自洽；但在验证出一个集成商、一个可信证据格式和一个可用合作方控制面之前，信心上限仍然有限。
    whyBelieve: 公司瞄准的是 RPAS 运营、安全卫星通信和现场分发之间真实存在的控制平面空档，而这一区域本来就有海上安全紧迫性和主权连接项目撑起的预算。
    whyDoubt: 早期采用既依赖合作方主导的采购，也依赖操作员接受压缩证据，而现有资料尚未证明这两点。
    nextDiligence: 确认一家点名的波罗的海或芬兰集成商愿意把产品塞进付费试点，并明确操作员在不看原始视频时愿意接受的最小证据包。
  firstCustomer:
    title: 服务海岸警卫队重点船只任务的波罗的海海上监视集成商
    profile: 一家芬兰或北欧任务系统提供商，正为某个海岸警卫队或边防试点运营 10–20 架 ISR 无人机，沿海覆盖断续，并配有手持终端一线用户。
    trigger: 试点里程碑或采购截止时间，要求系统在脱离地面覆盖时仍能稳定投递告警，或者要求迁移到主权通信基础设施。
    buyer: 集成商内部的项目经理或 ISR 运营负责人
    initialContract: 首单是 $250k-400k 的付费试点，覆盖一套参考架构；如果被验收为获批的任务就绪度模块，再转成 $700k-900k 的年度项目许可费加支持费。
  mustBeTrue:
  - 至少有一个波罗的海或芬兰集成商能把这套软件塞进现有海上监视项目，而不用触发全新的独立采购。
  - 现场操作员会在相当一部分重点船只告警里接受压缩证据包。
  - 至少有一套目标无人机、网络和 C2 栈暴露出足够的集成钩子，支撑签名任务包和路由策略。
  - 项目经济性能够支持每个正式生产部署大约 $700k+ 的可重复年度软件支出。
  - 首个部署沉淀的是可复用策略与信任数据，而不是一次性服务项目。
  diligenceQuestions:
  - 首个试点架构和预算条线具体由哪家点名集成商掌握？
  - 在不要求原始视频的前提下，操作员究竟会对什么样的告警包采取行动？
  - 首个目标栈里有哪些合作方 API 或控制面可用？
  - 第一份合同里，软件收入和定制集成收入各占多少？
  - 最可能拖慢部署的认证或军民两用合规环节是哪一个？
operatingAssumptions:
- assumption: 一个“重点船只告警”工作流的紧迫性足够高，能在更大平台能力完善前先撑起部署。
  basis: research.yaml
  validationTest: 访谈 3–5 家波罗的海或北欧运营方，确认在重点船只、污染、SAR 和基础设施监测几类场景中，选定工作流的“紧迫性/集成复杂度”比最高。
  decisionImpact: 如果不成立，公司必须先换滩头用例，再去搭完整试点栈。
- assumption: 集成商会把产品当成现有 RPAS 或安全连接项目中的就绪度/互操作模块来买。
  basis: research.yaml
  validationTest: 拿到一份 SOW 草案、试点附加预算，或书面共创客户承诺，证明产品可以挂到一个活跃项目上。
  decisionImpact: 如果不成立，销售周期会明显拉长，公司要么补更多资金，要么改渠道。
- assumption: 在很多告警场景里，缩略图、坐标、置信度和溯源包已经足够支撑首轮响应。
  basis: operator judgment
  validationTest: 用 20–30 个历史或模拟事件做操作员评审，衡量可接受度，并记录他们何时会要求短视频或原始视频。
  decisionImpact: 如果不成立，产品路线就得转向短视频优先级编排，带宽 ROI 逻辑也会变弱。
- assumption: 合作方的传输与任务系统会暴露足够接口，让策略层跑在现有传输层之上。
  basis: research.yaml
  validationTest: 分别与一家安全连接提供商和一家无人机栈所有方完成一次集成研讨会，产出有边界的适配计划，并确保不存在被控制面卡死的依赖。
  decisionImpact: 如果不成立，产品会滑向定制系统集成，应改做更窄的架构，或者直接止损。
- assumption: 首套参考架构经过有限返工，就能泛化到多个波罗的海和北欧项目。
  basis: idea.yaml
  validationTest: 首个试点设计完成后，映射两个相邻项目所需变更，并验证至少 70% 的策略、审计和适配器代码还能复用。
  decisionImpact: 如果不成立，利润率和规模空间都达不到风险投资需要的水平。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 锁定并拿下一家点名的波罗的海或芬兰共创客户。
  hypothesis: 如果把产品包装成就绪度和互操作模块，而不是新的 AI 平台，任务系统集成商就愿意赞助试点。
  successMetric: 拿到一份已签署的共创客户协议，或一份带活跃海上监视项目的付费探索 SOW。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 定义重点船只告警所需的最小可信证据包。
  hypothesis: 至少一半目标告警场景里，操作员会对“缩略图 + 坐标 + 溯源”数据包采取行动。
  successMetric: 结构化评审中，操作员在不先要求原始视频的前提下接受率 >=50%。
  owner: 产品负责人
- horizon: 0–120 天
  experiment: 完成一套跨无人机、连接链路和现场应用终端的参考架构集成方案。
  hypothesis: 首个目标栈暴露的钩子足够多，能在不改核心网络基础设施的情况下实现签名任务包和退化链路路由。
  successMetric: 形成书面集成方案，没有关键阻塞依赖，而且 MVP 范围不超过两个适配器加一个现场终端。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 围绕一条重点船只工作流跑链路退化仿真。
  hypothesis: 相较“先传原始视频”的做法，MVP 能在明显减少传输数据量的同时，把告警时延中位数压到 60 秒内。
  successMetric: 实验室结果显示，告警时延中位数低于 1 分钟，且带宽明显优于基线。
  owner: 应用 ML/DDIL 系统工程师
- horizon: 120–270 天
  experiment: 把共创客户转成付费现场试点。
  hypothesis: 任务结果和可审计性足够强，有限试点后客户愿意走向付费生产路径。
  successMetric: 拿到至少 $250k 的付费试点合同，并附带明确的年度许可转化方案。
  owner: 创始人/CEO
- horizon: 180–360 天
  experiment: 用第二个海上项目验证可复制性。
  hypothesis: 首个部署中的策略、溯源和适配器层，至少 70% 能复用到相邻项目。
  successMetric: 拿到第二个设计机会，复用率估算 >=70%，且实施周期明显短于第一个试点。
  owner: 现场集成负责人
operations:
- 在任何真实部署前，先维护好用于链路退化任务测试的仿真与回放工具链。
- 每次发布都要打成获批任务包，里面带版本化模型、路由和证据策略。
- 为每个试点准备轻量级认证证据包，覆盖溯源、操作员覆盖操作和审计日志。
- 把一型无人机栈、一条安全连接路径以及一个 C2 或手持终端的合作方集成打法固化成 playbook。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责策略引擎、适配器架构和首条安全部署流水线。
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 负责拿下集成商共创客户、界定试点范围，并穿越项目制采购。
- role: 应用 ML/DDIL 系统工程师
  startTiming: 第 3 个月
  rationale: 负责围绕任务要求调优模型放置、证据压缩和退化链路表现。
- role: 现场集成与安全工程师
  startTiming: 第 6 个月
  rationale: 负责从实验室到试点的部署、日志、验收文档和合作方集成摩擦。
- role: 项目捕获 / 国防销售负责人
  startTiming: 第 9 个月
  rationale: 首个试点出现后，公司就需要把灯塔客户转成可复制销售管道，这时这一角色才变得必要。
milestones:
- horizon: 0–12 个月
  items:
  - 锁定一家点名的波罗的海或芬兰共创客户，并界定一条重点船只试点。
  - 交付签名任务包、压缩证据包和审计日志组成的 MVP，覆盖一套参考栈。
  - 在链路退化仿真里证明分钟级告警投递，并把首个共创客户转成付费试点。
- horizon: 12–24 个月
  items:
  - 把首个试点转成年度正式生产许可。
  - 把参考架构复用到 1–2 个额外海上项目上，集成投入显著下降。
  - 在任务规则要求时，补上从缩略图证据到短视频突发包的操作员可控升级。
- horizon: 24–36 个月
  items:
  - 做到 4 个付费海上项目，并在波罗的海/北欧切口里把公司立成标准任务就绪度模块。
  - 基于同一治理和溯源层，扩到第二类海上工作流。
  - 判断产品是否已经足够可复制，从而进入陆地边境或偏远工业等相邻场景。
risks:
- risk: 集成商主导的采购比计划更慢，导致首个试点迟迟落不下来。
  likelihood: High
  impact: High
  mitigation: 把产品卖成已有资金支持的 RPAS 或安全连接项目里的模块，在投入重定制前先要求对方明确赞助试点。
- risk: 操作员认为压缩证据不足以支撑实时处置。
  likelihood: Medium
  impact: High
  mitigation: 先从一种告警类型起步，每个数据包都附带溯源和坐标，再补受控的短视频突发包升级，而不是默认缩略图一定够。
- risk: 合作方栈把传输层或任务层封得太死，导致控制平面产品难以复用。
  likelihood: Medium
  impact: High
  mitigation: 先在传输层之上做存储转发逻辑，只有合作方暴露出稳定接口时，才继续向下做更深编排。
- risk: 合规、出口管制或军民两用审查拖慢跨境部署。
  likelihood: Medium
  impact: Medium
  mitigation: 首个部署先收敛在一个狭窄海上项目里，尽早留好模型溯源，并在 v1 避免不必要的跨境功能范围。
- risk: 产品变得过于服务化，做不出可复用的软件利润率。
  likelihood: Medium
  impact: High
  mitigation: 死守一套参考架构，跟踪不同试点间的代码复用率，并拒绝那些需要定制替换平台的边缘需求。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 本轮融资覆盖 18 个月：拿下一家共创客户，做出可试点的控制平面，完成两项核心集成和认证证据，并把首个海上试点转成可复制的正式生产切口。
