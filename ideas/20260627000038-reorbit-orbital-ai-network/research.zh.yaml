  weaknessVsUs: 它更偏“飞行器自主”，不偏“结果分发”；在跨平台路由和通往现场应用的审计链上匹配度较弱。
  sourceRefs:
  - 11
  - 31
- name: Viasat / Inmarsat Government SATCOM
  stage: 现有厂商
  wedge: 面向偏远和高威胁环境的空中 ISR 连接、回传与覆盖。
  pricing: 托管式 SATCOM 与服务合同；无公开标价。
  strength: 掌握韧性传输、远海覆盖和政府关系。
  weaknessVsUs: 它负责搬运比特，但不决定推理该在哪跑，也不决定什么证据值得传。
  sourceRefs:
  - 22
  - 28
  - 29
- name: 主承包商自建监视平台
  stage: 现有厂商
  wedge: 嵌在单一机构或试点里的项目制融合平台。
  pricing: 按项目或框架预算出资。
  strength: 契合现有采购路径，也能围绕单一任务做深度定制。
  weaknessVsUs: 跨项目复用更难，也更难长成可复制的跨网络控制平面产品。
  sourceRefs:
  - 7
  - 14
  - 15
  - 27
regulatoryTechnicalConstraints:
- point: 军民两用部署即便纯军用部分可排除在外，也可能落入欧盟 AI 义务范围。
  sourceRefs:
  - 19
- point: 跨境软件、技术协助和某些先进能力，可能触发欧盟军民两用出口管制。
  sourceRefs:
  - 20
- point: 安全政府卫星通信接入是通过 hub 和项目结构来管理的，不是面向开发者开放的平台。
  sourceRefs:
  - 16
  - 17
  - 18
- point: NTN 和 D2D 已有标准、也很重要，但它们依旧受链路预算、容量和共存规则约束。
  sourceRefs:
  - 21
  - 22
- point: MARSUR、NATO 数字骨干、无人机栈和现场系统之间的端到端互操作，会主导早期交付风险。
  sourceRefs:
  - 13
  - 14
  - 15
validationSignals:
- point: Business Finland 已经用公共资金为 ReOrbit 的“轨道 AI + 直连终端网络”逻辑背书。
  sourceRefs:
  - 1
- point: Finnish Border Guard 已在波罗的海海上任务中使用 EMSA 支持的 RPAS 和卫星通信。
  sourceRefs:
  - 3
  - 4
  - 5
- point: Frontex 表示其 2025 年试点可在任何需要的地方安全共享实时态势感知，说明买方确实想要移动、独立于基础设施的分发能力。
  sourceRefs:
  - 7
- point: EMSA 授出了一份 €30M 的 RPAS 框架，说明服务型海上监视项目能带动可观的集成预算。
  sourceRefs:
  - 25
- point: 芬兰同时在为带加密实时数据传输的监视飞机和涉密海上图景交换投入资金。
  sourceRefs:
  - 26
  - 27
openQuestions:
- 哪些芬兰或波罗的海海上监视集成商已经掌握目标试点架构，并能把产品作为嵌入式软件模块来赞助？
- 现场用户信任的最小证据包到底是什么：静态裁剪图 + 坐标 + 溯源，还是必须附带短视频突发包？
- 目标卫星通信栈能不能为第三方策略逻辑暴露足够路由控制，还是产品必须先停留在传输层之上？
- 首个用例里，哪一种最紧迫、认证负担又最低：重点船只、污染、SAR，还是关键基础设施异常分诊？
- 首个试点里，模型二进制、检测结果和审计日志需要落在哪个密级？
