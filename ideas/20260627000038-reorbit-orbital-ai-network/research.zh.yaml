  coverageGap: 触发事件本身是一条单日资助公告，所在类别也还很薄，所以相邻证据主要集中在官方机构、标准组织、国防政策和厂商页面。本轮核验了 32 个高信号、彼此不同的来源，没有为了凑数把低价值转载、JS 门控近重复页或泛泛的市场报告塞进语料库。
