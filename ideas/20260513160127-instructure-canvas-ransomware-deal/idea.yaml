jobsToBeDone:
  - job: >-
      When our district must prove student-data controls before renewal or audit, help our IT and security team map and restrict privileged Canvas access, so they can reduce breach exposure without replacing core systems.
    currentAlternative: Manual access reviews across Canvas, SSO tools, spreadsheets, and consultants
    successMetric: 90 percent reduction in standing privileged accounts and a board-ready access report in under one week
  - job: >-
      When a suspected LMS incident occurs, help our security team reconstruct who accessed which student records, so they can contain the issue and prepare notifications quickly.
    currentAlternative: Ad hoc log collection from Canvas, identity tools, and third-party vendors
    successMetric: Initial affected-record and access timeline produced within 24 hours
