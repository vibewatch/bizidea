topRisks:
  - name: Integration friction
    description: School IT teams may resist another control layer if it risks breaking SIS syncs, term-start workflows, or vendor integrations.
    mitigation: Start with read-only discovery and session-based controls on privileged users, then expand to enforcement once the institution validates critical workflows.
  - name: Slow education procurement
    description: District and university buying cycles can be long unless the product is tied to an immediate audit, insurance, or incident event.
    mitigation: Sell through breach tabletop exercises, insurer questionnaires, and cyber-renewal deadlines, and use MSP and broker partners to compress trust-building.
  - name: Incumbent security catch-up
    description: Canvas or generic IAM vendors could add pieces of privileged access or reporting functionality over time.
    mitigation: Own the cross-system student-data access graph and incident evidence workflow across LMS, SIS, identity, and vendor environments rather than a single product surface.
