differentiator: >-
  Incumbent PAM, IAM, and SSPM tools are not designed around the education stack's mix of LMS admins, SIS sync jobs, outsourced support teams, and FERPA-sensitive data flows. This startup's edge is a purpose-built graph of student-data systems and privileged paths, plus prebuilt policies for academic-term exceptions, contractor offboarding, and breach evidence generation. That makes it both easier to deploy than generic cyber tooling and harder for a single LMS vendor feature to fully replicate.
