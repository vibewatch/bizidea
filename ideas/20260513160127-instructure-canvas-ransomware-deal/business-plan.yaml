slug: student-data-access-firewall
date: '2026-05-13'
executiveSummary: >-
  Canvas's repeat breach and settlement turned privileged access around the LMS
  from abstract compliance work into an immediate purchase trigger for
  institutions that cannot replace core systems before the next term. The
  company should start with U.S. public university systems, then larger Canvas
  districts, that run many SIS, SSO, LTI, and contractor integrations and are
  already under insurer, board, or procurement scrutiny. The MVP should be a
  read-first access graph plus just-in-time admin controls and an incident
  evidence pack, because buyers need proof and containment without risking term
  start outages. The wedge is stronger than generic IAM or PAM when the actual
  buyer job is showing who could touch student data across Canvas and adjacent
  systems, then quarantining that access quickly after an incident or audit
  drill. Research models the narrow opportunity at about $268.0M TAM, $117.2M
  SAM, and $2.8M year-3 SOM, so the investment case depends on expanding from
  Canvas into the broader student-data estate rather than pretending the first
  wedge alone is venture scale. Go-to-market should be assessment-led direct
  sales, amplified by insurer-adjacent, incident-response, and education MSP
  partners that already enter accounts during triggered buying moments. The
  first contract should be a paid 90-day pilot tied to an upcoming renewal,
  audit, or tabletop, priced to convert into a $60k-$80k annual subscription
  based on student count and connected-system complexity. The biggest open
  question is whether enough institutions will fund the overlay before a breach
  rather than only after one, so the first year must prove deployment speed,
  pilot conversion, and credible expansion beyond Canvas-only workflows.
problem:
  - Schools and university systems running Canvas cannot easily see every privileged path into student data across admins, contractors, SIS imports, developer keys, and external tools.
  - Native LMS controls, generic SSO, and spreadsheet-based vendor reviews do not give CIO and CISO teams a fast way to revoke risky access or produce board-, insurer-, and counsel-ready evidence after an incident.
solution:
  - Start with a read-only discovery layer that maps Canvas accounts, roles, developer keys, SIS links, and high-risk integrations into one student-data access graph.
  - Add just-in-time admin sessions, step-up approvals, contractor offboarding controls, and incident evidence packs that show affected systems, access timelines, and likely blast radius without requiring an LMS replacement.
whyWeWin:
  - The company is built around Canvas, SIS, LTI, and FERPA-shaped workflows instead of treating schools as a generic PAM account that must customize everything from scratch.
  - A read-first deployment lowers adoption risk during academic peaks, while later enforcement creates measurable proof points around standing privilege reduction and investigation speed.
  - Over time the access graph, approval history, and procurement-ready evidence package can become harder to replicate than any single control feature.
strategicChoices:
  beachhead: U.S. public university systems running Canvas with 20 or more connected systems and an upcoming HECVAT, insurer renewal, board review, or breach tabletop.
  wedgeRationale: Public higher-ed buyers are more likely than small districts to have formal security review processes, enough internal staff to run a pilot, and a live buying trigger; that creates faster proof than selling broadly across all schools or positioning as generic education cybersecurity.
  sequencingRationale: Lead with discovery and evidence because the biggest objection is breaking SIS syncs, LTI tools, or term-start workflows; once the product proves it can map exposure safely, add just-in-time access and approvals for privileged users, then expand into cross-system governance and partner-led distribution.
  notYet:
    - Small districts without a live audit, insurer, or incident trigger
    - Full replacement of Canvas or any core LMS
    - General-purpose PAM for non-education IT estates
    - Broad international expansion before the U.S. beachhead converts repeatably
market:
  tam: $268.0M modeled TAM based on public education entities in scope, a Canvas-share proxy, and roughly $60k assumed ACV.
  sam: $117.2M modeled SAM for larger, integration-heavy public Canvas institutions with enough urgency to buy an overlay.
  som: $2.8M modeled year-3 SOM assuming about 35 customers at roughly $80k ACV.
  segments:
    - Public university systems on Canvas with formal vendor-assessment and incident-response processes
    - Large K-12 districts on Canvas with heavy contractor and third-party tool exposure
  buyingProcess: >-
    The sale starts with a triggered assessment tied to a renewal, audit, or
    incident drill, usually championed by identity, security, or enterprise-app
    leaders and signed by the CIO or CISO. Procurement and privacy teams
    influence the deal because K-12CVAT or HECVAT evidence, vendor access
    controls, and breach-response readiness must all be defensible before
    production rollout.
product:
  mvp: >-
    The MVP is a read-only Canvas access graph plus privileged-user session
    controls for the highest-risk admin and contractor paths. It must discover
    exposure across Canvas, the identity layer, and one common SIS integration,
    then generate a first-week evidence report and a 24-hour incident timeline
    for suspected misuse.
  sixMonth: >-
    Ship read-only discovery for Canvas accounts, roles, developer keys, SIS
    links, and top identity integrations; add just-in-time admin access,
    break-glass policies, and evidence exports mapped to insurer and board
    review questions; complete 2 to 3 paid pilots.
  twelveMonth: >-
    Add contractor session recording, approval workflows, reusable K-12CVAT and
    HECVAT evidence templates, stale token detection, and broader policy
    coverage for LTI and vendor access paths.
  twentyFourMonth: >-
    Expand from Canvas into the wider student-data estate including SIS,
    payments, parent portals, HR, and state-reporting systems so the product
    becomes the system of record for education access governance and incident
    response.
  keyBets:
    - Buyers will pay for a low-disruption overlay if the first report proves hidden privileged exposure in under one week.
    - Read-only deployment can create trust fast enough to win a paid pilot before buyers default to Microsoft, Okta, or consultants.
    - Incident evidence and procurement-ready control mapping will matter more to buyers than another generic MFA or PAM feature list.
    - The Canvas wedge will open expansion into adjacent student-data systems large enough to justify further venture funding.
gtm:
  wedge: Read-first Canvas privileged-access assessment that converts into enforced just-in-time controls and breach-evidence automation for institutions under immediate review.
  channels:
    - Founder-led direct sales to CIO, CISO, identity, and enterprise-app leaders at public university systems and large districts
    - Incident-response firms, cyber-insurance brokers, and education MSPs that enter accounts during triggered remediation work
    - Identity and LTI integration partners that already participate in admin-role and vendor-vetting workflows
  funnelTargets: lead→qualified assessment 20%+, qualified assessment→paid pilot 35%+, paid pilot→annual production 60%+, annual production→referenceable case study 50%+
  pricing: Annual subscription priced by enrolled students and number of connected systems, with a paid 90-day pilot in the $20k-$35k range that converts into roughly $60k-$80k ACV when the product proves standing-privilege reduction and faster evidence generation.
businessModel:
  revenueStreams:
    - Annual platform subscription for discovery, policy enforcement, and audit evidence
    - Premium modules for contractor session control, approval workflows, and incident evidence automation
    - Implementation and onboarding services for complex first deployments
  unitOfValue: Enrolled students and connected high-risk systems governed under policy within each institution
  targetGrossMarginPct: 70
  expansionLevers:
    - More connected systems and privileged workflows within each institution
    - Cross-sell from discovery into enforcement, contractor controls, and evidence automation
    - Expansion from Canvas into SIS, parent portals, payments, HR, and state-reporting systems
strategyMap:
  northStarMetric: Number of privileged student-data access paths governed under time-bound policy with usable incident evidence
  inputMetrics:
    - Time to first access-graph report after deployment
    - Percentage reduction in standing privileged accounts
    - Qualified assessment to paid pilot conversion rate
    - Pilot to annual production conversion rate
    - Time to produce initial affected-record and access timeline after a simulated incident
    - Number of connected systems mapped per production customer
  moatsToBuild:
    - Education-specific graph of Canvas, SIS, identity, vendor, and contractor access paths
    - Reusable K-12CVAT, HECVAT, insurer, and board evidence templates tied to live controls
    - Historical session, revocation, and approval data that improves breach-response accuracy over time
    - Partner distribution embedded in education security and identity workflows
  killCriteria:
    - Fewer than 3 of the first 10 ICP interviews describe a recent audit, insurer, or incident event that could fund the product inside 12 months
    - The first 2 design partners cannot produce a useful exposure report within 7 days from a read-only deployment
    - Fewer than 2 of the first 5 paid pilots convert to annual contracts at or above a $60k ACV anchor
    - By month 12, no adjacent expansion path lifts the modeled addressable market materially beyond the Canvas beachhead
  mermaid: |
    flowchart LR
      Wedge[Triggered Canvas access assessment] --> MVP[Read-only graph and JIT controls]
      MVP --> Proof[Reduced standing privilege and faster incident evidence]
      Proof --> Expansion[Cross-system student-data governance]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong pain and a coherent triggered wedge, but conviction stays limited until buyers fund the overlay before a live breach and expansion beyond Canvas is proven.
    whyBelieve: A repeat Canvas breach, formal education security reviews, and poor fit from generic PAM tools create a credible opening for a purpose-built overlay.
    whyDoubt: The modeled beachhead is modest and well-defended by bundled identity suites, consultants, and native vendor improvements unless the company proves unique cross-system evidence value.
    nextDiligence: Win paid pilots at two public university systems and show one converts to production because the first-week discovery report and incident evidence replace manual review work.
  firstCustomer:
    title: CISO at a public university system on Canvas
    profile: A multi-campus public institution running Canvas with many LTI tools, a central identity team, outsourced admin support, and formal vendor-assessment workflows.
    trigger: A cyber-insurance renewal, board security review, or breach tabletop reveals that the institution cannot quickly prove who can access student data across Canvas and connected systems.
    buyer: CIO or CISO
    initialContract: 90-day paid pilot at $20k-$35k tied to a triggered assessment, converting to a $60k-$80k annual contract if the product maps exposure in under a week and reduces standing privileged access materially.
  mustBeTrue:
    - At least 30% of target public university systems have a current audit, insurer, or incident-response trigger that can fund a pilot this year.
    - A read-only deployment can map enough Canvas, identity, and SIS exposure to produce a credible first-week report without breaking academic workflows.
    - CIO or CISO buyers will pay roughly $60k-$80k annually for this overlay instead of expanding Microsoft, Okta, or consultant spend.
    - Paid pilots that start with discovery will convert to production enforcement at 40% or better.
    - Expansion into non-Canvas student-data systems can at least triple the practical market from the initial wedge.
  diligenceQuestions:
    - Which specific control gap fails current HECVAT, K-12CVAT, insurer, or board reviews most often today
    - How many institutions can show a recent delayed investigation or manual evidence scramble after a suspected incident
    - What first-week report is compelling enough to convert discovery into a paid pilot
    - In live deals, does the budget come from security, enterprise applications, compliance, or post-incident remediation funds
    - What product surface would make Microsoft, Okta, or CyberArk a good-enough substitute
operatingAssumptions:
  - assumption: The most reliable first buyers will be public university systems rather than smaller districts because they have formal review processes and enough staff to pilot safely.
    basis: research.yaml
    validationTest: Close at least 2 paid pilots in public higher ed before investing in a district-heavy pipeline.
    decisionImpact: If false, shift the wedge toward post-incident large districts and expand partner-led delivery sooner.
  - assumption: A read-only deployment can generate a useful exposure report within 7 days from Canvas, one identity stack, and one SIS integration.
    basis: research.yaml
    validationTest: Complete 2 design-partner deployments that produce actionable privilege findings inside the first week.
    decisionImpact: If false, narrow the initial scope to fewer systems and reframe the product as longer-cycle services-assisted software.
  - assumption: Institutions will accept a $60k-$80k annual contract when pricing is framed as a modest fraction of LMS spend and incident-response labor.
    basis: research.yaml
    validationTest: Convert at least 2 pilots to annual contracts at or above the target ACV without heavy discounting.
    decisionImpact: If false, reduce pricing ambition, simplify the product, and reassess whether the segment can support venture returns.
  - assumption: Discovery-led pilots will convert into enforcement because buyers want fewer standing privileges, not just better reporting.
    basis: idea.yaml
    validationTest: In the first 5 pilots, at least 2 customers turn on just-in-time or approval-based controls for live privileged workflows.
    decisionImpact: If false, prioritize evidence automation and procurement workflows over policy enforcement in the roadmap.
  - assumption: Partner channels can source at least one-third of qualified pipeline after initial proof because institutions often buy during remediation and review workflows.
    basis: operator judgment
    validationTest: Generate 5 qualified meetings and 1 paid pilot from insurer, MSP, or incident-response partners by month 9.
    decisionImpact: If false, keep GTM primarily direct and slow hiring for channel management.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12 public university and 8 large-district security leaders around recent insurer, board, audit, or incident-review events.
    hypothesis: Triggered buying moments are common enough to support assessment-led sales without broad category education.
    successMetric: At least 6 buyers share a live or recent trigger and at least 3 agree to scoped pilot design.
    owner: Founder
  - horizon: 0–90 days
    experiment: Build a read-only connector that maps Canvas roles, developer keys, one identity stack, and one SIS link into a unified access graph.
    hypothesis: A safe first deployment can surface enough hidden exposure to justify a paid pilot.
    successMetric: Two design partners receive a first-week report with at least 5 previously untracked privileged findings each.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run 2 to 3 paid pilots that add just-in-time controls for a limited set of high-risk admin and contractor workflows.
    hypothesis: Buyers will move from discovery to enforcement when the scope is narrow and tied to live privileged actions.
    successMetric: At least 2 pilots activate time-bound access policies and one converts to annual production.
    owner: Founder
  - horizon: 90–180 days
    experiment: Ship an incident evidence pack that reconstructs access timeline, likely blast radius, and revocation actions from simulated incidents.
    hypothesis: Evidence automation is a stronger conversion driver than generic dashboarding.
    successMetric: Pilot customers can produce an initial incident packet within 24 hours during a tabletop exercise.
    owner: Product lead
  - horizon: 180–270 days
    experiment: Package control evidence to common HECVAT, K-12CVAT, and insurer questions for one university and one district pilot.
    hypothesis: Procurement and underwriting evidence shortens time from pilot success to production approval.
    successMetric: Two customers reuse the output in real review workflows and report at least 30% less manual prep time.
    owner: Solutions engineer
  - horizon: 180–360 days
    experiment: Test one co-sell motion each with an incident-response firm and an education MSP.
    hypothesis: Partner-led opportunities will convert faster than cold outbound because the buying trigger already exists.
    successMetric: Partner channels generate 5 qualified meetings and 1 additional paid pilot within two quarters.
    owner: Founder
operations:
  - Read-only onboarding runbook that inventories Canvas, identity, SIS, and LTI dependencies before any enforcement is enabled
  - Versioned policy-template library for just-in-time access, break-glass workflows, contractor offboarding, and incident evidence generation
  - Audit-log and session-data pipeline that preserves approvals, revocations, and exception handling for investigations
  - Security-review package mapped to HECVAT, K-12CVAT, and insurer questionnaires to reduce procurement drag
team:
  - role: Founder / CEO
    startTiming: Month 0
    rationale: Own buyer discovery, triggered sales, partner development, and product positioning because GTM truth is the main company risk.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the Canvas access graph, read-only connectors, and early just-in-time control layer.
  - role: Identity and integrations engineer
    startTiming: Month 3
    rationale: Extend coverage across SIS, SSO, LTI, and developer-key surfaces without brittle one-off integrations.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Shorten pilot deployment time, map customer workflows safely, and convert bespoke onboarding into repeatable playbooks.
  - role: Policy and customer success lead
    startTiming: Month 9
    rationale: Maintain evidence templates, train admins, and support renewals once multiple institutions are live.
milestones:
  - horizon: 0–12 months
    items:
      - Complete 20 ICP interviews and sign 3 paid pilots in the beachhead segment
      - Ship read-only discovery, first-week exposure reporting, and limited just-in-time controls for high-risk privileged workflows
      - Prove a 7-day or faster time to first report and a 24-hour or faster incident evidence packet in pilot environments
      - Convert at least 2 pilots into annual production contracts and publish 1 referenceable case study
  - horizon: 12–24 months
    items:
      - Add contractor controls, approval routing, stale token detection, and reusable HECVAT and K-12CVAT evidence templates
      - Reach 10 to 15 paying institutions with repeatable onboarding and at least 2 active referral partners
      - Expand one production customer beyond Canvas into at least one adjacent student-data system
  - horizon: 24–36 months
    items:
      - Become the access-governance system of record across Canvas, SIS, identity, and selected vendor systems for early customers
      - Demonstrate expansion revenue from additional systems and premium modules inside existing accounts
      - Prove the company can sell beyond the initial Canvas wedge without losing deployment simplicity
risks:
  - risk: Universities and districts delay purchases until after a real incident instead of funding preventive overlays
    likelihood: High
    impact: High
    mitigation: Anchor sales to existing insurer, audit, and board-review triggers and require paid pilots tied to near-term deadlines.
  - risk: Bundled Microsoft, Okta, or generic PAM spend crowds out a standalone product
    likelihood: High
    impact: High
    mitigation: Sell cross-system student-data mapping and incident evidence as the differentiated outcome that bundled tools do not provide.
  - risk: Enforcement features disrupt SIS syncs, LTI launches, or term-start operations
    likelihood: Medium
    impact: High
    mitigation: Keep the first deployment read-only, limit enforcement to narrow privileged workflows, and maintain break-glass policies.
  - risk: The Canvas wedge is too narrow to support a venture-scale company
    likelihood: Medium
    impact: High
    mitigation: Validate adjacent expansion into SIS, vendor access, and broader student-data systems by month 12 before scaling headcount aggressively.
  - risk: Education procurement cycles stretch beyond the companys initial runway
    likelihood: Medium
    impact: Medium
    mitigation: Use assessment-led pilots, partner referrals, and pre-mapped review evidence to shorten time from trigger to contract.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months buys a small team to build the Canvas access graph and safe enforcement layer, close 3 to 5 paid pilots, prove conversion at public university systems, establish partner channels, and determine whether the product can expand from Canvas security overlay into broader student-data governance.
