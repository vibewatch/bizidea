topRisks:
- name: 集成摩擦
  description: 如果新控制层影响 SIS 同步、开学季流程或供应商集成，学校 IT 团队可能会直接拒绝再加一层系统。
  mitigation: 先从只读发现和特权用户的会话型控制切入，等机构确认关键流程没被打断，再逐步上 enforcement。
- name: 教育采购节奏慢
  description: 除非产品能和眼前的审计、保险或事故事件挂钩，否则学区和大学的采购周期往往很长。
  mitigation: 把销售锚在 breach tabletop、保险问卷和网络续保节点上，再借 MSP 与经纪合作方压缩建立信任的时间。
- name: 现有厂商安全补位
  description: Canvas 或通用 IAM 厂商，随着时间推移可能补上一部分特权访问或报表功能。
  mitigation: 把跨 LMS、SIS、身份系统和供应商环境的学生数据访问图与事故证据工作流做成自己的地盘，而不是只守单一产品界面。
