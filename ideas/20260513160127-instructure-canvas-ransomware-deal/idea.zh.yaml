problem: 学校系统和大学高度依赖 Canvas 以及周边的 SIS、SSO 和各类供应商集成，短期内根本拆不掉。只要管理员、外包商或长期未清理的集成拿着过宽权限，一次失守就可能把账号凭证、学业记录和受监管的学生数据同时暴露给大量机构。通用 IAM 和手工供应商审查，通常既画不出谁能碰学生数据的实时地图，也做不到在事故发生后迅速隔离高风险访问。
targetUser:
  primary: 美国公立大学系统，以及学生规模超过 1 万、同时运行 Canvas 和大量第三方集成的 K-12 学区中的 CIO、CISO 与身份管理员。
  secondary: 负责学生数据安全、breach 通知和网络保险准备的托管服务商与合规负责人。
  buyer: CIO 或 CISO
startupThesis:
  nonObviousInsight: 新的预算开口不在“替换 LMS”，而在“给现有厂商外面包一层控制层”：重复 breach 已经证明，真正的责任风险不在 LMS 本身，而在管理员、外包商和外接应用之间失控蔓延的特权访问。
  beachhead: 使用 Canvas、同时接了 20 个以上 SIS、SSO、测评系统和外包商集成，并且即将面对网络保险续保或董事会安全审查的美国公立大学系统与大型 K-12 学区。
  wedge: 一套 Canvas 访问防火墙：找出所有通往学生数据的特权路径，给管理员加上 just-in-time 会话控制，并在不替换 LMS 的前提下产出 FERPA 可用的 breach 证据。
  whyNowCatalyst: Instructure 在两次 breach、2.75 亿条学生记录暴露之后支付和解金，让“给现有 LMS 加一层安全覆盖”从理论路线图变成了眼下就得买的东西。
  ventureScalePath: 先从 Canvas 及其管理员、供应商访问图入手，再扩到完整学生数据资产：SIS、身份系统、支付、HR、家长门户和州报送系统，最终成为教育访问治理与事故响应的 system of record。
solution: 产品形态是一层控制平面，夹在 Canvas、身份提供方和特权用户之间：先发现集成，给学生数据暴露路径分级，再把高风险动作卡住。它会把共享或长期存在的管理员凭证，替换成 just-in-time 会话、升级审批和贴合教育工作流及学期节奏的会话录制；持续给第三方集成打分，并标记过期 OAuth token、权限过大的 service account，以及项目结束后仍未回收的外包商访问。事故发生时，它还能自动生成受影响记录估算、访问时间线和通知证据，让学校更快和律师、保险方、董事会对齐。部署切口是 overlay 模式——兼容现有 Canvas 环境，而不是逼客户迁平台。
goToMarketSeed:
  firstCustomer: 首个客户应该是这样一位 CIO 或 CISO：所在学区或公立大学系统有 1.5 万到 8 万名学生，以 Canvas 为核心 LMS，管理员支持部分外包，且未来 6 个月内要做网络保险续保。
  buyingTrigger: 最近一次 breach tabletop、保险问卷、董事会审计或合同续签，把学校推到必须证明“我们对学生数据的特权访问管得更紧”的位置上。
  currentAlternative: Canvas 原生管理员控制、通用 SSO 与 MFA、基于表格的供应商访问审查，以及 breach 后才临时找来的 incident-response 顾问。
  switchingReason: 这个切口能赢，是因为它给机构的是一套今天就能落地、且专门针对 Canvas 时代访问蔓延问题的安全 overlay：证据出得更快，组织改动更小，也比替换 LMS 或硬拼通用 IAM 与服务更省事。
  pricingHypothesis: 按学生规模和已连接系统数收年度平台费；外包商会话控制和事故证据自动化做成高级模块。
