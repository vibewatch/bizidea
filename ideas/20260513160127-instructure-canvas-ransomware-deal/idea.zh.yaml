jobsToBeDone:
- job: 当学区在续约或审计前必须证明学生数据控制到位时，帮 IT 与安全团队把 Canvas 的特权访问画清楚、卡起来，这样他们不用替换核心系统，也能把 breach 暴露面压下去。
  currentAlternative: 在 Canvas、SSO 工具、表格和顾问之间手工做访问审查
  successMetric: 长期存在的特权账号减少 90%，并在 1 周内拿出可交董事会的访问报告
- job: 当 LMS 疑似发生事故时，帮安全团队快速还原“谁在什么时间访问了哪些学生记录”，好让他们尽快止损并准备通知。
  currentAlternative: 临时从 Canvas、身份系统和第三方供应商那里拼日志
  successMetric: 24 小时内产出首版受影响记录估算和访问时间线
