modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Triggered assessments] --> Pilots[Paid pilots]
      Pilots --> Customers[Paying institutions]
      Customers --> Revenue[Subscriptions and modules]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Runway and buffer]
      Customers --> Expansion[Adjacent systems and premium evidence]
      Expansion --> Revenue
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue grows from 5 paying institutions at Y1 end to 35 by Q4Y3 while realized ARPU moves from pilot-heavy $48K in Y1 to $80K in Y3.
  - checkName: Must go right
    finding: The company must keep assessment-to-pilot and pilot-to-production conversion near the BP targets so a 9-person team can reach 15 paying institutions by the end of Y2 without hiring ahead of revenue.
  - checkName: Model breaks if
    finding: If procurement stretches and realized ARPU settles closer to $70K, downside cash falls toward roughly $120K before the next round case is proven.
  - checkName: Next-round proof
    finding: The next financing is justified if the company exits Y2 with 15 paying institutions, over 70% gross margin, two active referral partners, and one production deployment expanded beyond Canvas.
sanityChecks:
  ruleOf40: Y3 growth 214.2% + EBITDA margin -5.8% = 208.4%
  burnMultiple: Y2 burn multiple 1.16x, improving to 0.07x in Y3 on net new ARR.
  revenuePerFte: "$216K Y3 on 9 exit FTE (benchmark $200-400K SaaS)"
  flags:
    - The Y3 customer target of 35 institutions effectively fills the research-modeled beachhead SOM, so the next round still depends on proving expansion beyond Canvas.
    - Revenue per exit FTE is only modestly above the low end of SaaS benchmarks because deployment and evidence work remain high-touch through Y3.
    - Cash low point arrives in Q3Y3 at about $331K, so a one-to-two quarter delay in partner-assisted conversion would likely force fundraising earlier than the base case assumes.
