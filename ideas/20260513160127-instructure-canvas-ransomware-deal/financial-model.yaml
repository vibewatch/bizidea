scenarios:
  downside:
    description: Procurement stretches, fewer pilots convert to production, and buyers purchase the lighter evidence layer before full enforcement.
    y3RevenueK: 1450.0
    y3EbitdaK: -460.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
      - Y3 blended ARPU stays near $70K instead of reaching $80K.
      - Customer count ends Y3 at roughly 26 institutions instead of 35.
      - Gross margin tops out around 68% because onboarding remains more services-heavy.
  base:
    description: Founder-led assessments and a few partner-sourced triggers convert into a steady institutional ramp while pricing lands near the top of the stated production band.
    y3RevenueK: 1940.0
    y3EbitdaK: -113.2
    cashLowPointK: 330.6
    keyAssumptionChanges:
      - Revenue grows to 35 paying institutions by Q4Y3.
      - Y3 blended ARPU reaches $80K with 72% gross margin.
      - Hiring stays lean at 9 exit FTE and scales only after Y2 proof points.
  upside:
    description: The first reference customers expand beyond Canvas faster, partner referrals contribute meaningfully, and premium modules lift realized ACV.
    y3RevenueK: 2280.0
    y3EbitdaK: 120.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
      - Y3 blended ARPU reaches about $85K through premium evidence and adjacent-system upsell.
      - Customer count ends Y3 at roughly 40 institutions.
      - Gross margin improves to about 74% as deployments become more standardized.
