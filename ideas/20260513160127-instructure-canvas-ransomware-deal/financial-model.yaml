modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: Model start month
    value: '2026-06'
    unit: month
    source: "[BP date] The model starts the month after the 2026-05-13 plan date."
  - id: A2
    name: Opening cash at M1
    value: '2000'
    unit: USDK
    source: "[BP fundingAsk.targetFundingRangeUsd $2-4M] Base case uses a $2.0M pre-seed at the low end because the plan keeps hiring lean through proof of repeatability."
  - id: A3
    name: Paying customer unit
    value: paying institution under pilot or annual subscription
    unit: definition
    source: "[BP gtm.pricing; BP businessModel.revenueStreams] customersEop counts institutions paying for either a 90-day pilot or a production subscription."
  - id: A4
    name: Revenue recognition policy
    value: average active customers per period
    unit: formula
    source: "Startup-finance heuristic: enterprise pilots and annual contracts usually start mid-period, so revenue is modeled from average active customers rather than end-of-period count."
  - id: A5
    name: Y1 blended realized ARPU
    value: '48'
    unit: USDK annual per institution
    source: "[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract] Below steady-state ACV because Y1 mixes $20k-$35k pilots with only a few annual conversions."
  - id: A6
    name: Y2 blended ARPU
    value: '65'
    unit: USDK annual per institution
    source: "[BP gtm.pricing; Research market.bottomUpSizingDrivers target ACV $60k-$80k] Assumes production contracts become the majority of revenue by Y2."
  - id: A7
    name: Y3 blended ARPU
    value: '80'
    unit: USDK annual per institution
    source: "[BP market.som; Research market.som] Matches the modeled year-3 SOM anchor of about 35 customers at roughly $80k ACV."
  - id: A8
    name: Customer ramp
    value: 5 EOY1 / 15 EOY2 / 35 EOY3
    unit: paying institutions
    source: "[BP milestones; BP gtm.funnelTargets; Research market.som] Reaches the 10-15 paying-institution Y2 milestone and the research year-3 SOM of roughly 35 customers without exceeding the wedge."
  - id: A9
    name: Gross margin ramp
    value: 60% in early Y1, 65% in late Y1, 70% in Y2, 72% in Y3
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 70] Model starts below target during pilot-heavy onboarding and rises modestly above target after onboarding playbooks and reusable evidence templates mature."
  - id: A10
    name: Monthly churn
    value: '2.0'
    unit: percent
    source: "Startup-finance heuristic: annual security/compliance contracts in education should be sticky once embedded, but early overlay products still face non-renewal risk if urgency fades after the trigger event."
  - id: A11
    name: Fully loaded CAC
    value: '35'
    unit: USDK per new customer
    source: "[BP gtm.funnelTargets; BP operatingAssumptions partner channels; Research reportMemo.distributionChannels] Founder-led sales plus insurer, incident-response, and MSP referrals supports a mid-five-figure enterprise CAC."
  - id: A12
    name: Loaded salary bands
    value: Founder 150 / Engineering 180 / Solutions-Policy-CS 140 / Sales 170
    unit: USDK annual per FTE
    source: "Startup-finance heuristic anchored to a lean U.S.-based enterprise-security startup with payroll taxes and benefits included."
  - id: A13
    name: Payroll allocation
    value: founder 50% S&M and 50% G&A; engineering 100% R&D; solutions engineer 50% R&D and 50% S&M; policy-CS lead 50% S&M and 50% G&A; sales 100% S&M
    unit: policy
    source: "[BP team role descriptions] Allocation reflects founder-led sales, implementation-heavy onboarding, and a product-first org."
  - id: A14
    name: Hiring sequence
    value: founder and founding engineer at M1; identity engineer M3; solutions engineer M6; policy-CS lead M9; third engineer and first seller M16; fourth engineer M28; second seller M31
    unit: timing
    source: "[BP team; BP strategicChoices.sequencingRationale; BP milestones] Uses the named founding team first, then adds GTM and extra engineering only after early proof points."
  - id: A15
    name: Non-payroll operating spend
    value: Y1 R&D 4-8K per month, S&M 2-7K per month, G&A 5-8K per month; Y2-Y3 opex ramps from 255K to 400K per quarter
    unit: USDK
    source: "[BP operations; BP risks; Research regulatoryLandscape] Covers cloud and logging costs, legal and security review work, travel, and procurement support while keeping the team small."
  - id: A16
    name: Cash conversion assumption
    value: EBITDA approximates operating cash flow
    unit: policy
    source: "Startup-finance heuristic: this is an asset-light SaaS model with no debt, minimal capex, and limited working-capital distortion."
  - id: A17
    name: Funding sizing rule
    value: reach end-Y2 milestones plus 6 months of buffer
    unit: policy
    source: "[Developer instruction; BP fundingAsk; BP milestones] Capital is sized to reach 10-15 paying institutions, two referral partners, and one adjacent-system expansion before the next round."
