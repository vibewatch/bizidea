openQuestions:
  - >-
    What share of 15,000-plus-student U.S. public districts actually use Canvas as the primary LMS today, versus Google
    Classroom or Schoology?
  - >-
    How often do cyber-insurance renewals create funded remediation spend for access governance, rather than only
    questionnaire work?
  - >-
    Can a read-only deployment collect enough Canvas, identity, and SIS telemetry to generate credible affected-record
    estimates inside 24 hours?
  - >-
    Will buyers prefer a standalone overlay, or do they want the product packaged through existing Microsoft, Okta, MSP,
    or insurer relationships?
  - >-
    Which states impose the most time-sensitive breach-notification and contracting requirements for LMS-related
    student-data incidents?
