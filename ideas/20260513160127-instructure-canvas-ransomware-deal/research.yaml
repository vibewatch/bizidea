  tam:
    value: $268.0M
    rationale: >-
      Bottom-up estimate: (13,318 public school districts + 1,570 public degree-granting institutions = 14,888 public
      entities) × 30% Canvas-share proxy from ListEdTech × $60k assumed ACV ≈ $268.0M.
    isEstimate: true
    sourceRefs:
      - 33
      - 37
      - 39
  sam:
    value: $117.2M
    rationale: >-
      Beachhead constraint: 4,466 estimated public Canvas entities × 35% complexity/urgency filter for larger,
      integration-heavy buyers × $75k assumed ACV ≈ $117.2M.
    isEstimate: true
    sourceRefs:
      - 33
      - 37
      - 39
  som:
