      sourceRefs:
        - 76
        - 81
        - 86
        - 87
        - 93
        - 98
  pestle:
    - factor: political
      impact: positive
      point: >-
        Federal attention after the Canvas incident makes school cyber posture a board- and leadership-level issue
        rather than a niche IT concern.
      sourceRefs:
        - 3
        - 25
    - factor: economic
      impact: negative
      point: Districts remain resource-constrained, so every new control must show low deployment overhead or labor savings.
      sourceRefs:
        - 24
        - 25
        - 28
    - factor: social
      impact: positive
      point: >-
        Student-data exposure creates trust and reputational pressure that makes access governance a community-facing
        issue, not just a technical one.
      sourceRefs:
        - 3
        - 47
    - factor: technological
      impact: positive
      point: >-
        LTI, OneRoster, OAuth2, and external-tool ecosystems make overlays technically feasible, even as they expand the
        attack surface.
      sourceRefs:
        - 54
        - 56
        - 62
        - 73
    - factor: legal
      impact: positive
      point: >-
        Student privacy guidance and vendor review expectations raise the value of precise audit trails, notices, and
        evidence generation in breach scenarios.
      sourceRefs:
        - 3
        - 47
        - 52
  adoptionFrictionMatrix:
    - friction: Fear of breaking SIS syncs or LTI tools during peak academic periods
      severity: high
      affectedBuyer: Enterprise applications and LMS administrators
      mitigation: Start with read-only discovery, then gate only privileged actions and emergency access paths.
      sourceRefs:
        - 54
        - 66
        - 73
    - friction: Security review and procurement paperwork can stall new vendors
      severity: high
      affectedBuyer: CIO, CISO, procurement, and privacy teams
      mitigation: Pre-map controls to K-12CVAT and HECVAT and provide reusable evidence packages.
      sourceRefs:
        - 44
        - 48
        - 52
    - friction: Time-bound approvals can annoy admins and contractors used to standing access
      severity: medium
      affectedBuyer: Identity admins, outsourced support teams, and campus IT leads
      mitigation: Offer role templates, break-glass policies, and session recording only on high-risk actions.
      sourceRefs:
        - 76
        - 87
        - 98
    - friction: Bundled Microsoft or Okta spend makes standalone security software a tougher sell
      severity: high
      affectedBuyer: CIO and finance leadership
      mitigation: Position the product as a cross-system evidence and vendor-governance layer, not another MFA tool.
      sourceRefs:
        - 25
        - 87
        - 98
        - 99
