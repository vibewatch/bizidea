competitors:
  - name: CyberArk
    stage: incumbent
    wedge: Enterprise PAM with zero-standing privilege, vendor access, and audit/compliance emphasis.
    pricing: Custom enterprise pricing
    strength: Deep privileged-session control and strong compliance positioning for auditors and insurers.
    weaknessVsUs: >-
      Generic platform orientation means extra customization to understand Canvas, SIS, and education-specific vendor
      workflows.
    sourceRefs:
      - 76
  - name: BeyondTrust
    stage: incumbent
    wedge: Vendor privileged access and secure remote administration with strong session controls.
    pricing: Custom enterprise pricing
    strength: Clear third-party remote-access story and proven privileged-remote-access product.
    weaknessVsUs: More remote-access- and server-centric than student-data-graph-centric, with less education-specific workflow fit.
    sourceRefs:
      - 81
  - name: Delinea
    stage: incumbent
    wedge: Just-in-time privilege elevation and centralized server access management, especially around Active Directory.
    pricing: Custom enterprise pricing
    strength: Good fit for identity consolidation and server-side privilege elevation.
    weaknessVsUs: Less native emphasis on Canvas external tools, developer keys, or procurement-grade education evidence.
    sourceRefs:
      - 86
  - name: Microsoft Entra PIM
    stage: incumbent
    wedge: Embedded privileged identity management for Microsoft-centric schools already in Entra and Azure.
    pricing: Bundled/enterprise Microsoft licensing motion
    strength: Low-friction adoption where schools already trust Microsoft for identity and admin policy.
    weaknessVsUs: >-
      Strong on Microsoft role governance, weaker on Canvas-specific third-party access mapping and breach-evidence
      workflows.
    sourceRefs:
      - 87
      - 88
      - 92
  - name: Okta Privileged Access
    stage: scale-up
    wedge: Cloud-friendly privileged access with access requests, time-based approvals, and session recording.
    pricing: Custom enterprise pricing
    strength: Combines privileged access with governance and non-human identity use cases in one identity estate.
    weaknessVsUs: >-
      Still broad and cross-industry; does not natively specialize in Canvas, SIS, or FERPA-oriented vendor review
      workflows.
    sourceRefs:
      - 98
      - 99
