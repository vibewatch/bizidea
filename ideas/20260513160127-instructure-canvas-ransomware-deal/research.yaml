      - 67
      - 73
  - point: Vendors increasingly face structured HECVAT and K-12CVAT review before purchase, especially in large institutions.
    sourceRefs:
      - 44
      - 52
  - point: >-
      Time-bound privilege grants still have to preserve approvals, conditions, and audit trails to be usable in real
