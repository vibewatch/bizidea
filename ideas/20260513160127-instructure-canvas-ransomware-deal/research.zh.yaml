  pricing: 企业定制定价
  strength: 第三方远程访问故事清楚，且已有成熟的特权远程访问产品。
  weaknessVsUs: 更偏远程访问和服务器侧，不够围绕学生数据关系图，也不够贴教育工作流。
  sourceRefs:
  - 81
- name: Delinea
  stage: incumbent
  wedge: 做 just-in-time 提权和集中式服务器访问管理，尤其围绕 Active Directory。
  pricing: 企业定制定价
  strength: 适合身份整合与服务器侧的特权提权。
  weaknessVsUs: 对 Canvas 外部工具、developer key 或可直接过采购的教育证据，原生强调都不够。
  sourceRefs:
  - 86
- name: Microsoft Entra PIM
  stage: incumbent
  wedge: 面向已经深度使用 Entra 和 Azure 的学校，提供内嵌式特权身份管理。
  pricing: 随 Microsoft 企业许可打包推进
  strength: 如果学校本来就信任 Microsoft 的身份与管理员策略，上线摩擦很低。
  weaknessVsUs: 对 Microsoft 角色治理很强，但在 Canvas 特有的第三方访问映射和 breach 证据工作流上明显更弱。
  sourceRefs:
  - 87
  - 88
  - 92
- name: Okta Privileged Access
  stage: scale-up
  wedge: 云友好的特权访问产品，支持访问申请、限时审批和会话录制。
  pricing: 企业定制定价
  strength: 把特权访问、治理以及非人类身份场景放进同一套身份体系里。
  weaknessVsUs: 仍是跨行业的大平台，没有原生聚焦 Canvas、SIS 或 FERPA 导向的供应商审查工作流。
  sourceRefs:
  - 98
  - 99
regulatoryTechnicalConstraints:
- point: 任何会碰学生记录访问的产品，都必须支持围绕隐私通知、调查和留档的工作流。
  sourceRefs:
  - 3
  - 47
  - 52
- point: 部署不能在关键学期节点打断 SIS 导入、账户层级或外部工具启动。
  sourceRefs:
  - 54
  - 66
  - 67
  - 73
- point: 尤其在大型机构里，供应商在采购前越来越要先过结构化的 HECVAT 和 K-12CVAT 审查。
  sourceRefs:
  - 44
  - 52
- point: 限时特权发放必须把审批、条件和审计轨迹一并保留下来，否则在真实调查里根本不好用。
  sourceRefs:
  - 76
  - 87
  - 93
  - 94
validationSignals:
- point: Federal Student Aid 在 Canvas 事件后明确要求机构，把 MFA 一致性地铺到管理、云、供应商和身份系统。
  sourceRefs:
  - 3
- point: CISA 和 K12 SIX 都把 MFA、备份、incident-response 演练和培训视为买方应优先补齐的基线控制。
  sourceRefs:
  - 24
  - 25
  - 28
- point: K-12CVAT 已被建议写进 RFP 与采购评估，这说明第三方风险审查本来就是采购动作的一部分。
  sourceRefs:
  - 52
- point: 大学正在收紧 LTI 审核，这让“教育专用集成治理”这个切口更站得住。
  sourceRefs:
  - 54
  - 60
- point: Canvas 已经暴露出一组明确可治理的界面——developer key、SIS 导入、accounts 和 external tools——足够支撑一个技术上收得很窄的首版产品。
  sourceRefs:
  - 64
  - 66
  - 67
  - 73
openQuestions:
- 今天美国学生规模超过 1.5 万的公立学区里，到底有多大比例把 Canvas 作为主 LMS，而不是 Google Classroom 或 Schoology？
- 网络保险续保究竟有多常触发带预算的访问治理整改，而不只是多填几份问卷？
- 只读部署能否收集到足够多的 Canvas、身份和 SIS 遥测，在 24 小时内给出可信的受影响记录估算？
- 买方会更想买独立 overlay，还是希望产品通过现有的 Microsoft、Okta、MSP 或保险关系来打包落地？
- 哪些州对 LMS 相关学生数据事件设定了最紧的 breach 通知和合同要求？
