competitors:
- name: CyberArk
  stage: incumbent
  wedge: 企业 PAM，强调零长期特权、供应商访问和审计/合规。
  pricing: 企业定制定价
  strength: 特权会话控制很深，对审计员和保险方的合规定位也强。
