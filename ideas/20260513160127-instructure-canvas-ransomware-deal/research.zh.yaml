  pestle:
  - factor: 政治
    impact: positive
    point: Canvas 事件之后，联邦层面的关注把学校网络安全姿态抬成了董事会和高层要直接过问的问题，而不再只是小圈子的 IT 议题。
    sourceRefs:
    - 3
    - 25
  - factor: 经济
    impact: negative
    point: 学区资源仍然吃紧，因此任何新控制都必须证明自己部署负担低，或者能省出人力。
    sourceRefs:
    - 24
    - 25
    - 28
  - factor: 社会
    impact: positive
    point: 学生数据一旦暴露，带来的信任和声誉压力会把访问治理变成面向社区的问题，而不只是技术问题。
    sourceRefs:
    - 3
    - 47
  - factor: 技术
    impact: positive
    point: LTI、OneRoster、OAuth2 和外部工具生态一方面扩大了攻击面，另一方面也让 overlay 在技术上可行。
    sourceRefs:
    - 54
    - 56
    - 62
    - 73
  - factor: 法律
    impact: positive
    point: 学生隐私指导和供应商审查预期，抬高了精确审计轨迹、通知和 breach 证据生成的价值。
    sourceRefs:
    - 3
    - 47
    - 52
  adoptionFrictionMatrix:
  - friction: 担心在学期高峰期打断 SIS 同步或 LTI 工具
    severity: high
    affectedBuyer: 企业应用团队与 LMS 管理员
    mitigation: 先做只读发现，之后只卡特权动作和紧急访问路径。
    sourceRefs:
    - 54
    - 66
    - 73
  - friction: 安全审查与采购文书会拖慢新供应商
    severity: high
    affectedBuyer: CIO、CISO、采购和隐私团队
    mitigation: 提前把控制映射到 K-12CVAT 和 HECVAT，并给出可复用证据包。
    sourceRefs:
    - 44
    - 48
    - 52
  - friction: 限时审批会惹恼已经习惯长期权限的管理员和外包商
    severity: medium
    affectedBuyer: 身份管理员、外包支持团队和校园 IT 负责人
    mitigation: 提供角色模板、break-glass 策略，并只在高风险动作上启用会话录制。
    sourceRefs:
    - 76
    - 87
    - 98
  - friction: 已经买了 Microsoft 或 Okta，会让独立安全软件更难卖
    severity: high
    affectedBuyer: CIO 与财务负责人
    mitigation: 把产品定位成跨系统证据与供应商治理层，而不是另一款 MFA 工具。
    sourceRefs:
    - 25
    - 87
    - 98
    - 99
