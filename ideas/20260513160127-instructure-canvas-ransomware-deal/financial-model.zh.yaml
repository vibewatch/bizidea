  y3RevenueImpactK: 0.0
  cashImpactK: -130.0
- variable: 招聘节奏
  downsideCase: 在收入证明前就提前 1-2 个季度补 support 和 GTM 招聘
  baseCase: 在试点和正式环境里程碑之后分阶段加人
  upsideCase: 等正式客户超过 20 家后，再补 1 名非关键销售
  y3RevenueImpactK: -60.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济流
  mermaid: |
    flowchart LR
      Leads[Triggered assessments] --> Pilots[Paid pilots]
      Pilots --> Customers[Paying institutions]
      Customers --> Revenue[Subscriptions and modules]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Runway and buffer]
      Customers --> Expansion[Adjacent systems and premium evidence]
      Expansion --> Revenue
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下，付费机构从 Y1 末的 5 家增长到 Q4Y3 的 35 家，同时实现 ARPU 从 Y1 以试点为主的 $48K 抬到 Y3 的 $80K。
- checkName: 必须跑顺的环节
  finding: 公司必须把“评估→试点”和“试点→正式生产”的转化率守在 BP 目标附近，9 人团队才有机会在不提前为收入招人的情况下，于 Y2 末前做到 15 家付费机构。
- checkName: 模型会在哪儿失效
  finding: 如果采购拉长、实现 ARPU 最终更接近 $70K，那么下一轮融资故事还没站稳之前，downside 情形下的现金会滑向约 $120K。
- checkName: 下一轮融资证明点
  finding: 只有当公司在 Y2 末带着 15 家付费机构、70% 以上毛利率、2 个活跃 referral partner，以及 1 个超越 Canvas 的正式扩张案例走出来时，下一轮融资才真正讲得过去。
sanityChecks:
  ruleOf40: Y3 增长 214.2% + EBITDA 利润率 -5.8% = 208.4%
  burnMultiple: Y2 burn multiple 为 1.16x，到了 Y3 随着净新增 ARR 增长，改善到 0.07x
  revenuePerFte: Y3 退出时 9 名 FTE，对应每名 FTE 约 $216K 收入（SaaS 基准约 $200-400K）
  flags:
  - Y3 目标 35 家机构，基本已经把研究里测出的滩头市场 SOM 填满，因此下一轮融资仍取决于能否证明超越 Canvas 的扩张。
  - 按退出 FTE 口径算的人均收入，只比 SaaS 基准低端略高一点，因为到 Y3 为止部署和证据工作仍然偏高触达。
  - 现金低点出现在 Q3Y3，约 $331K；如果合作方辅助转化再慢 1-2 个季度，公司大概率要比基准情形更早启动融资。
