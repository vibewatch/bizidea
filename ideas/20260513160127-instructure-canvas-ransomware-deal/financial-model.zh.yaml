scenarios:
  downside:
    description: 采购拉长，付费试点转正变少，买方更愿意先买轻量证据层，而不是完整 enforcement。
    y3RevenueK: 1450.0
    y3EbitdaK: -460.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
    - Y3 混合 ARPU 停在接近 $70K，而不是升到 $80K。
    - Y3 末客户数约为 26 家，而不是 35 家。
    - 毛利率最高只能到约 68%，因为 onboarding 仍然更偏服务。
  base:
    description: 创始人主导的评估，加上少量合作方带来的触发型机会，形成稳定的机构客户爬坡；同时定价能落在声明区间的高位。
    y3RevenueK: 1940.0
    y3EbitdaK: -113.2
    cashLowPointK: 330.6
    keyAssumptionChanges:
    - 收入在 Q4Y3 增长到 35 家付费机构。
    - Y3 混合 ARPU 达到 $80K，毛利率为 72%。
    - 团队在退出时仅 9 名 FTE，只有 Y2 证据跑出来后才继续加人。
  upside:
    description: 首批标杆客户更快地从 Canvas 扩到相邻系统，合作推荐开始明显贡献线索，高级模块也把实现 ACV 往上抬。
    y3RevenueK: 2280.0
    y3EbitdaK: 120.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - Y3 混合 ARPU 通过高级证据模块和相邻系统 upsell，拉到约 $85K。
    - Y3 末客户数约为 40 家机构。
    - 随着部署逐步标准化，毛利率升到约 74%。
