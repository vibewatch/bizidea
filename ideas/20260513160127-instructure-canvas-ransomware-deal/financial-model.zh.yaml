slug: student-data-access-firewall
date: '2026-05-13'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP date] 模型从 2026-05-13 这版计划之后的次月开始。'
- id: A2
  name: M1 期初现金
  value: '2000'
  unit: USDK
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M] 基准情形取区间下限的 $2.0M pre-seed，因为计划要求在验证可重复性之前保持极度克制的招聘。'
- id: A3
  name: 付费客户单位
  value: 处于试点或年度订阅中的付费机构
  unit: definition
  source: '[BP gtm.pricing; BP businessModel.revenueStreams] customersEop 统计的是为 90 天试点或正式生产订阅付费的机构数。'
- id: A4
  name: 收入确认政策
  value: 按期内平均活跃客户数确认
  unit: formula
  source: 创业财务常识：企业试点和年约往往在期中启动，因此收入按平均活跃客户数建模，而不是按期末客户数。
- id: A5
  name: Y1 混合实现 ARPU
  value: '48'
  unit: USDK annual per institution
  source: '[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract] 低于稳态 ACV，因为 Y1 同时混有 $20k-$35k 试点，以及少量转正年约。'
- id: A6
  name: Y2 混合 ARPU
  value: '65'
  unit: USDK annual per institution
  source: '[BP gtm.pricing; Research market.bottomUpSizingDrivers target ACV $60k-$80k] 假设到 Y2 时，正式生产合同已经成为收入主体。'
- id: A7
  name: Y3 混合 ARPU
  value: '80'
  unit: USDK annual per institution
  source: '[BP market.som; Research market.som] 对齐第 3 年 SOM 锚点：约 35 个客户，ACV 大致 $80k。'
- id: A8
  name: 客户爬坡
  value: Y1 末 5 / Y2 末 15 / Y3 末 35
  unit: paying institutions
  source: '[BP milestones; BP gtm.funnelTargets; Research market.som] 既满足 Y2 达到 10-15 家付费机构的里程碑，也对齐研究里第 3 年约 35 个客户的 SOM，且没有超出切口范围。'
- id: A9
  name: 毛利率爬坡
  value: Y1 前期 60%，Y1 后期 65%，Y2 为 70%，Y3 为 72%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 试点期 onboarding 较重，因此模型起步低于目标毛利；等 onboarding playbook 和可复用证据模板成熟后，再略高于目标值。'
- id: A10
  name: 月流失率
  value: '2.0'
  unit: percent
  source: 创业财务常识：教育行业里的年度安全/合规合同一旦嵌进去，粘性通常不错；但早期 overlay 产品若触发事件热度退去，仍然面临不续约风险。
- id: A11
  name: 全成本 CAC
  value: '35'
  unit: USDK per new customer
  source: '[BP gtm.funnelTargets; BP operatingAssumptions partner channels; Research reportMemo.distributionChannels] 创始人主导销售，再叠加保险方、incident-response 和 MSP 推荐，可以支撑一个中等五位数的企业级 CAC。'
- id: A12
  name: 全包薪酬带
  value: 创始人 150 / 工程 180 / 解决方案-策略-CS 140 / 销售 170
  unit: USDK annual per FTE
  source: 创业财务常识：以一家美国企业安全创业公司为参照，团队精简，且已计入薪资税和福利。
- id: A13
  name: 薪酬分摊
  value: 创始人 50% 计入 S&M、50% 计入 G&A；工程 100% 计入 R&D；解决方案工程师 50% 计入 R&D、50% 计入 S&M；策略-CS 负责人 50% 计入 S&M、50% 计入 G&A；销售 100% 计入 S&M
  unit: policy
  source: '[BP team role descriptions] 这套分摊反映的是创始人亲自打单、onboarding 偏实施，以及产品优先的组织结构。'
- id: A14
  name: 招聘顺序
  value: M1 上创始人和创始工程师；M3 上身份工程师；M6 上解决方案工程师；M9 上策略-CS 负责人；M16 上第三名工程师和第一名销售；M28 上第四名工程师；M31 上第二名销售
  unit: timing
  source: '[BP team; BP strategicChoices.sequencingRationale; BP milestones] 先靠已命名的 founding team 起盘，等早期 proof point 出来后再补 GTM 和额外工程。'
- id: A15
  name: 非薪酬运营支出
  value: Y1：R&D 每月 4-8K、S&M 每月 2-7K、G&A 每月 5-8K；Y2-Y3：季度 opex 从 255K 拉到 400K
  unit: USDK
  source: '[BP operations; BP risks; Research regulatoryLandscape] 覆盖云和日志成本、法务与安全审查、差旅和采购支持，同时保持团队规模很小。'
- id: A16
  name: 现金转换假设
  value: EBITDA 近似经营现金流
  unit: policy
  source: 创业财务常识：这是一个轻资产 SaaS 模型，没有债务、capex 很低，营运资金扭曲也有限。
- id: A17
  name: 融资规模规则
  value: 跑到 Y2 末里程碑外加 6 个月缓冲
  unit: policy
  source: '[Developer instruction; BP fundingAsk; BP milestones] 资金规模按“跑到 10-15 家付费机构、2 个 referral partner、并在 Canvas 外完成 1 个相邻系统扩张后，手里还剩 6 个月缓冲”来定。'
