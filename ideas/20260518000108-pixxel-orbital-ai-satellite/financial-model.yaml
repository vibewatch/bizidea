scenarios:
  downside:
    description: >-
      Orbital launch slips and first paid pilot is delayed to M11; 30% revenue
      miss across all three years; hiring pace maintained; cash position tighter
      but not critically low due to lean team.
    y3RevenueK: 154.0
    y3EbitdaK: -837.2
    cashLowPointK: 1033.7
    keyAssumptionChanges:
      - First paid pilot delays from M8 to M11
      - Revenue 30% below base in all years
      - Pixxel orbital inference not available until 2028; ground-inference only
  base:
    description: >-
      First paid pilot signed M8 converts to production Q1Y2; second corridor
      added Q2Y2; third corridor Q2Y3; 3 production corridors and $220K ARR by
      end of Year 3; matches BP SOM target.
    y3RevenueK: 220.0
    y3EbitdaK: -791.0
    cashLowPointK: 1119.8
    keyAssumptionChanges:
      - All assumptions as modeled
  upside:
    description: >-
      Incident-driven urgency accelerates first pilot to M6; 50% revenue
      outperformance from faster conversion and second operator win; adjacent
      infrastructure pilot generates incremental revenue in Q4Y3.
    y3RevenueK: 330.0
    y3EbitdaK: -714.0
    cashLowPointK: 1263.3
    keyAssumptionChanges:
      - First paid pilot pulled forward to M6
      - Revenue 50% above base in all years
      - Adjacent infrastructure category adds one paid pilot in Q4Y3

