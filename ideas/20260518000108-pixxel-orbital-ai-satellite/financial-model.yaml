assumptions:
  - id: A1
    name: Starting cash (pre-seed raise at model start)
    value: "3000"
    unit: K USD
    source: "[BP fundingAsk targetFundingRangeUsd $2–4M; midpoint $3M modeled]"
  - id: A2
    name: Base monitoring price per km per year
    value: "66"
    unit: USD/km/year
    source: "[BP market: TAM $1.9M from 28,300 km ÷ $66/km/yr]"
  - id: A3
    name: Audit and investigation add-on per km per year
    value: "10"
    unit: USD/km/year
    source: "[BP businessModel: premium audit-reporting and confirmed-anomaly workflow fees; blended estimate]"
  - id: A4
    name: Average corridor size (unit of sale)
    value: "1000"
    unit: km
    source: "[BP investorMemo firstCustomer: 2,000–8,000 km operator; pilot corridor 500–1,500 km; midpoint ~1,000 km for ARPU calculation]"
  - id: A5
    name: Annual ARPU per corridor
    value: "76"
    unit: K USD/year
    source: "[A2+A3: ($66+$10) × 1,000 km = $76K/yr per corridor]"
  - id: A6
    name: Target gross margin
    value: "70"
    unit: pct
    source: "[BP businessModel targetGrossMarginPct: 70]"
  - id: A7
    name: COGS as pct of revenue (Pixxel data licensing + cloud compute)
    value: "30"
    unit: pct
    source: "[1 − GM 70%; estimated $15/km/yr data cost + $5/km/yr compute = $20/km = 30% of $66 base; heuristic for EO data subscriptions]"
  - id: A8
    name: First paid pilot signed month
    value: "M8"
    unit: month
    source: "[BP experimentRoadmap horizon 90–180 days: one paid corridor pilot signed; conservative end of range to reflect PSU procurement cycles]"
  - id: A9
    name: First pilot contract value (onboarding + M1 subscription)
    value: "22"
    unit: K USD
    source: "[BP investorMemo firstCustomer initialContract $75k–$150k; model uses $16K onboarding recognition + $6K first-month subscription; conservative within range]"
