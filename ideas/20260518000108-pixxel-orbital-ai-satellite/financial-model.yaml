    upsideCase: "$85/km/yr (audit and investigation premium adds $19/km)"
    y3RevenueImpactK: -53.0
    cashImpactK: -37.1
  - variable: CAC
    downsideCase: "$120K CAC (12-month PSU procurement cycle, extra sales overhead)"
    baseCase: "$80K CAC (6-month sales cycle, founder-led with contractor assist)"
    upsideCase: "$50K CAC (3-month incident-driven fast close, inbound referral)"
    y3RevenueImpactK: -57.0
    cashImpactK: -39.9
  - variable: churn
    downsideCase: "3%/month (pilot-to-production conversion fails on 2nd corridor)"
    baseCase: "1.5%/month (enterprise contract, sticky GIS integration)"
    upsideCase: "0.5%/month (deep workflow embed, no churn in 3 years)"
    y3RevenueImpactK: -30.0
    cashImpactK: -21.0
  - variable: sales cycle
    downsideCase: "12 months to first paid pilot (extended PSU diligence)"
    baseCase: "6 months to first paid pilot (incident-driven urgency)"
    upsideCase: "3 months to first paid pilot (warm contractor intro)"
    y3RevenueImpactK: -57.0
    cashImpactK: -39.9
  - variable: gross margin
    downsideCase: "55% GM (SAR all-weather partner adds data cost, COGS rises to 45%)"
    baseCase: "70% GM (Pixxel data + cloud compute at 30% COGS)"
    upsideCase: "75% GM (volume data pricing discount from Pixxel partnership)"
    y3RevenueImpactK: 0.0
    cashImpactK: -33.0
  - variable: hiring pace
    downsideCase: "Hire 2 additional FTEs in Q2Y2 (DS + AM simultaneously)"
    baseCase: "DS Q2Y2, AM Q4Y2, Sr Eng Q2Y3, Ent Sales Q4Y3"
    upsideCase: "Defer Sr Eng and Ent Sales to Y4 to reduce burn by $190K in Y3"
    y3RevenueImpactK: 0.0
    cashImpactK: 190.0

modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Operator Leads] --> Pilot[Paid Corridor Pilot]
      Pilot --> Precision[Field-Confirmed Precision]
      Precision --> Production[Production Corridor]
      Production --> ARPU["ARPU $76K/corridor/yr"]
      ARPU --> Revenue[Annual Revenue]
      Revenue --> GP["Gross Profit 70% GM"]
      GP --> Cash[Cash Position]
      Production --> Dataset[Labeled Anomaly Dataset]
      Dataset --> Moat[Corridor Data Moat]
      Moat --> Expansion[Adjacent Infrastructure]

modelSanity:
  - checkName: Revenue engine
    finding: >-
      Revenue scales by adding production corridors at $76K/corridor/year with
      70% gross margin, gated by enterprise sales cycles of 6–12 months per new
      corridor as anchored in the base scenario and sensitivity table.
  - checkName: Must go right
    finding: >-
      The first paid pilot must convert to production by Q1Y2 and establish
      field-confirmed alert precision above 70% to justify the second corridor
      and begin building the labeled dataset moat that drives renewals and
      expansion.
  - checkName: Model breaks if
    finding: >-
      Annual corridor churn exceeds 20% or Pixxel orbital delays force a
      12-month product pivot, either of which collapses the 3.7x LTV/CAC and
      depletes runway before the proof points needed for the next financing round
      are reached, as quantified in the downside scenario ($1.03M cash floor).
  - checkName: Next-round proof
    finding: >-
      Reaching 3 production corridors with $220K+ ARR and sub-20-month CAC
      payback by end of Year 3 validates the corridor-to-closure workflow and
      justifies a seed or Series A to scale GTM and expand into adjacent linear
      infrastructure.

sanityChecks:
  ruleOf40: >-
    Y3 revenue growth 52.8% (from $144K to $220K) + Y3 EBITDA margin -359%
    = -306; Rule of 40 is not meaningful at this pre-scale stage and is flagged
    accordingly; revisit at $2M+ ARR.
  burnMultiple: >-
    Y3 net burn $791K divided by Y3 net new ARR $76K (one new corridor) = 10.4x;
    above the <2x efficient benchmark but consistent with enterprise pre-scale
    and a small beachhead market; expected to improve post-Series A when GTM
    scales across corridors.
  revenuePerFte: >-
    $27.5K per FTE in Y3 ($220K / 8 FTEs); well below the $200–400K SaaS
    benchmark; reflects early-stage beachhead with small TAM; expansion into
    adjacent infrastructure is required for venture-scale efficiency.
  flags:
    - "Market is small: TAM $1.9M, SOM $0.2M in Y3; gas-pipeline beachhead alone does not support venture-scale outcomes without adjacent-infrastructure expansion by Y4."
    - "Burn multiple 10.4x in Y3 indicates capital-inefficient early scaling; acceptable for pre-seed but must compress to <5x by seed-to-A to attract growth capital."
    - "Revenue per FTE $27.5K in Y3 is 7–14x below SaaS benchmark; efficiency is structurally limited until ARR reaches $1M+ across multiple infrastructure verticals."
    - "Orbital inference dependency: Pixxel/Sarvam timeline slip is rated High/High in BP risks; any delay beyond Q4 2026 forces ground-inference-only product and may slow pilot conversion."
    - "LTV/CAC ratio 3.7x is acceptable but hinges on <18% annual churn; if early corridors churn above 20% the ratio drops below 3x and the business case weakens materially."
    - "PSU procurement risk: BP notes that PSU and large-operator cycles stretch longer than planned; a 12-month first-pilot delay (downside scenario) reduces Y3 cash floor to $1.03M, still safe but tight."
    - "Monsoon/cloud coverage gaps could force SAR partner data cost, pushing COGS to ~45% and compressing gross margin from 70% to 55% as shown in sensitivity table."
