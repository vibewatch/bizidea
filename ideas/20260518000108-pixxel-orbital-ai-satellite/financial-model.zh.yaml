slug: orbital-pipeline-alerting-os
date: '2026-05-18'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 起始现金（模型开始时完成 pre-seed 融资）
  value: '3000'
  unit: K USD
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M；模型取中点 $3M]'
- id: A2
  name: 基础监测单价（每 km / 年）
  value: '66'
  unit: USD/km/year
  source: '[BP market：TAM $1.9M ÷ 28,300 km = $66/km/yr]'
- id: A3
  name: 审计与调查附加收费（每 km / 年）
  value: '10'
  unit: USD/km/year
  source: '[BP businessModel：审计报告和已确认异常工作流收费；混合估算]'
- id: A4
  name: 平均走廊规模（销售单元）
  value: '1000'
  unit: km
  source: '[BP investorMemo firstCustomer：运营商规模 2,000–8,000 km；试点走廊 500–1,500 km；为算 ARPU，模型取中点约 1,000 km]'
- id: A5
  name: 每条走廊年 ARPU
  value: '76'
  unit: K USD/year
  source: '[A2+A3：($66+$10) × 1,000 km = 每条走廊每年 $76K]'
- id: A6
  name: 目标毛利率
  value: '70'
  unit: pct
  source: '[BP businessModel targetGrossMarginPct：70]'
- id: A7
  name: COGS 占收入比例（Pixxel 数据授权 + 云算力）
  value: '30'
  unit: pct
  source: '[1 − GM 70%；估算数据成本 $15/km/yr + 算力 $5/km/yr = $20/km，约为 $66 基础单价的 30%；EO 订阅启发式假设]'
- id: A8
  name: 首个付费试点签约月份
  value: M8
  unit: month
  source: '[BP experimentRoadmap horizon 90–180 days：签下 1 个付费走廊试点；考虑 PSU 采购周期，模型保守取区间后段]'
- id: A9
  name: 首个试点合同金额（导入 + 首月订阅）
  value: '22'
  unit: K USD
  source: '[BP investorMemo firstCustomer initialContract $75k–$150k；模型按 $16K 导入确认 + $6K 首月订阅，保守落在区间内]'
- id: A10
  name: 每条走廊月订阅收入（第 1 年）
  value: '6'
  unit: K USD/month
  source: '[A5 ÷ 12 = $6.33K/month；试点期出于保守，四舍五入到 $6K]'
- id: A11
  name: 新走廊导入费（一次性确认）
  value: '20'
  unit: K USD
  source: '[BP gtm pricing：走廊导入和 GIS 集成费是单独一项；按 EO 到工作流集成启发式，估为首年 ACV 的约 25%]'
- id: A12
  name: 创始工程师年薪（不含附加成本）
  value: '90'
  unit: K USD/year
  source: '[印度 deep-tech 创始工程师、具遥感背景；以股权驱动岗位的美元等值薪酬，启发式 $80–100K]'
- id: A13
  name: 创始 GTM 年薪（不含附加成本）
  value: '80'
  unit: K USD/year
  source: '[印度本地、创始人主导企业销售；pre-seed 阶段技术型 GTM 启发式 $70–90K]'
- id: A14
  name: 遥感负责人年薪（不含附加成本）
  value: '85'
  unit: K USD/year
  source: '[BP team：遥感负责人第 3 个月入职；负责甲烷/EO 模型调优；启发式 $80–90K]'
- id: A15
  name: 客户成功/运营负责人年薪（不含附加成本）
  value: '60'
  unit: K USD/year
  source: '[BP team：客户成功与运营负责人第 6 个月入职；偏运营角色，启发式 $55–65K]'
- id: A16
  name: 数据科学家年薪（不含附加成本）
  value: '80'
  unit: K USD/year
  source: '[为扩展 ML 流水线，于第 2 年 Q2 增配；印度本地 ML 工程师启发式 $75–85K]'
- id: A17
  name: 客户经理年薪（不含附加成本）
  value: '65'
  unit: K USD/year
  source: '[第 2 年 Q4 增配；第二条走廊需要专门客户管理，企业客户经理启发式 $60–70K]'
- id: A18
  name: 高级工程师年薪（不含附加成本）
  value: '95'
  unit: K USD/year
  source: '[第 3 年 Q2 增配，负责平台扩展与迁往在轨推理；高级工程师启发式 $90–100K]'
- id: A19
  name: 企业销售年薪（不含附加成本）
  value: '80'
  unit: K USD/year
  source: '[第 3 年 Q4 增配，用于相邻基础设施扩张；印度企业销售启发式 $75–85K]'
- id: A20
  name: 人力附加成本系数（福利、税费、PF）
  value: '1.25'
  unit: ratio
  source: '[印度雇主成本：PF 12%、离职金、医保、工资税等加总约 20–25%；启发式取 1.25x]'
- id: A21
  name: 云与数据基础设施成本（月度，第 1 年起点）
  value: '8'
  unit: K USD/month
  source: '[Pixxel 影像 API 约 $5K/月 + AWS/GCP 处理约 $2K/月 + 开发工具 $1K/月；到 Y3 随走廊增长升至 $15K/月；EO 到分析流水线启发式]'
- id: A22
  name: 市场与销售差旅（月度）
  value: '2'
  unit: K USD/month
  source: '[收入前阶段：创始人主导的印度本地销售差旅、会议和物料；到 Y3 升至 $4K/月；B2B 企业销售启发式]'
- id: A23
  name: 行政、法务与办公（月度）
  value: '2'
  unit: K USD/month
  source: '[印度本地、轻团队 pre-seed：联合办公、法务顾问、合规；到 Y2+ 升至 $3K/月；启发式]'
- id: A24
  name: 每条走廊月流失率
  value: '1.5'
  unit: pct/month
  source: '[约合年流失率 18%；带 GIS 集成的企业管道监控粘性较高，但早期试点仍有取消风险；基础设施 SaaS 早期 cohort 启发式]'
- id: A25
  name: 每条新生产级走廊的 CAC
  value: '80'
  unit: K USD
  source: '[S&M 花费覆盖平均 6 个月销售周期：约 6 × $11.3K/月 = $67.8K 直接成本 + $12K 差旅/附加成本 = 约 $80K 混合 CAC；体现 BP risks 里提到的 PSU 采购摩擦]'
- id: A26
  name: 第 2 年 Q2 末拿下第二条走廊
  value: Q2Y2
  unit: quarter
  source: '[BP milestones 12–24 months：把试点转生产，并至少扩到一条额外走廊]'
- id: A27
  name: 第 3 年 Q2 末拿下第三条走廊
  value: Q2Y3
  unit: quarter
  source: '[BP milestones 24–36 months：在至少 2 个运营商或承包商账户内，跑出可复制的多走廊部署]'
- id: A28
  name: 第 3 年 SOM
  value: '220'
  unit: K USD ARR
  source: '[BP market：SOM 约 $0.2M，来自约 3,000 km；模型按 3 条走廊 × 每条 $76K = $220K ARR，略高于 SOM，反映审计附加收费]'
