scenarios:
  downside:
    description: 轨道发射后移，首个付费试点推迟到 M11；三年收入整体低于基准 30%；招聘节奏不变；由于团队本身够轻，现金位会更紧，但还没低到危险线。
    y3RevenueK: 154.0
    y3EbitdaK: -837.2
    cashLowPointK: 1033.7
    keyAssumptionChanges:
    - 首个付费试点从 M8 推迟到 M11
    - 各年收入都比基准低 30%
    - Pixxel 的在轨推理到 2028 年前都不可用；只能做地面推理
  base:
    description: 首个付费试点在 M8 签下，并于 Q1Y2 转成生产；第二条走廊在 Q2Y2 拿下；第三条走廊在 Q2Y3 拿下；到第 3 年末共 3 条生产级走廊、ARR 达 $220K，与 BP 的 SOM 目标一致。
    y3RevenueK: 220.0
    y3EbitdaK: -791.0
    cashLowPointK: 1119.8
    keyAssumptionChanges:
    - 所有假设均按当前模型执行
  upside:
    description: 事故驱动的紧迫性把首个试点提前到 M6；更快转化加上第二家运营商胜单，带来 50% 的收入超预期；相邻基础设施试点在 Q4Y3 再贡献增量收入。
    y3RevenueK: 330.0
    y3EbitdaK: -714.0
    cashLowPointK: 1263.3
    keyAssumptionChanges:
    - 首个付费试点提前到 M6
    - 各年收入都比基准高 50%
    - 相邻基础设施品类在 Q4Y3 新增 1 个付费试点
sensitivity:
- variable: ARPU
  downsideCase: $50/km/yr（买家压价，只接受 $50/km 的基础单价）
  baseCase: $66/km/yr 基础价 + $10/km 审计附加费 = 每条走廊每年 $76K
  upsideCase: $85/km/yr（审计与调查溢价额外增加 $19/km）
  y3RevenueImpactK: -53.0
  cashImpactK: -37.1
- variable: CAC
  downsideCase: $120K CAC（PSU 采购周期拉到 12 个月，销售附加成本更高）
  baseCase: $80K CAC（6 个月销售周期，创始人主导并有承包商协助）
  upsideCase: $50K CAC（3 个月事故驱动快成交，加上转介绍）
  y3RevenueImpactK: -57.0
  cashImpactK: -39.9
- variable: 流失率
  downsideCase: 3%/月（第二条走廊的试点转生产失败）
  baseCase: 1.5%/月（企业合同 + 粘性强的 GIS 集成）
  upsideCase: 0.5%/月（工作流深嵌，3 年内几乎不流失）
  y3RevenueImpactK: -30.0
  cashImpactK: -21.0
- variable: 销售周期
  downsideCase: 拿下首个付费试点要 12 个月（PSU 尽调拉长）
  baseCase: 拿下首个付费试点要 6 个月（事故驱动的紧迫性）
  upsideCase: 拿下首个付费试点只要 3 个月（承包商热介绍）
  y3RevenueImpactK: -57.0
  cashImpactK: -39.9
- variable: 毛利率
  downsideCase: 55% GM（若接入 SAR 全天候伙伴，数据成本上升，COGS 提到 45%）
  baseCase: 70% GM（Pixxel 数据 + 云算力，COGS 为 30%）
  upsideCase: 75% GM（因与 Pixxel 合作拿到更低的大宗数据价）
  y3RevenueImpactK: 0.0
  cashImpactK: -33.0
- variable: 招聘节奏
  downsideCase: 在 Q2Y2 一次性多招 2 名 FTE（DS + AM 同时上）
  baseCase: DS 在 Q2Y2，AM 在 Q4Y2，Sr Eng 在 Q2Y3，Ent Sales 在 Q4Y3
  upsideCase: 把 Sr Eng 和 Ent Sales 推迟到 Y4，使 Y3 burn 降低 $190K
  y3RevenueImpactK: 0.0
  cashImpactK: 190.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Leads[Operator Leads] --> Pilot[Paid Corridor Pilot]
      Pilot --> Precision[Field-Confirmed Precision]
      Precision --> Production[Production Corridor]
      Production --> ARPU["ARPU $76K/corridor/yr"]
      ARPU --> Revenue[Annual Revenue]
      Revenue --> GP["Gross Profit 70% GM"]
      GP --> Cash[Cash Position]
      Production --> Dataset[Labeled Anomaly Dataset]
      Dataset --> Moat[Corridor Data Moat]
      Moat --> Expansion[Adjacent Infrastructure]
modelSanity:
- checkName: 收入引擎
  finding: 收入靠新增生产级走廊来放大：每条走廊每年 $76K，毛利率 70%；而每拿下一条新走廊，都受 6–12 个月企业销售周期约束，这一点已经体现在基准情景和敏感性表里。
- checkName: 必须跑通的环节
  finding: 首个付费试点必须在 Q1Y2 前转成生产，并把现场确认后的预警精度拉到 70% 以上，这样第二条走廊才站得住，标注数据集护城河也才开始形成并支撑续费与扩张。
- checkName: 模型会失效的情况
  finding: 如果年化走廊流失率超过 20%，或 Pixxel 的轨道延迟逼出 12 个月的产品转向，3.7x 的 LTV/CAC 就会塌掉，runway 也会在下一轮融资所需 proof points 形成前被消耗过多——下行情景里现金底线仅 $1.03M。
- checkName: 下一轮融资证明点
  finding: 到第 3 年末做到 3 条生产级走廊、ARR 超过 $220K，且 CAC 回收期低于 20 个月，就证明“走廊到关单”工作流成立，足以支撑下一轮 seed 或 Series A 去加速 GTM，并扩到相邻线性基础设施。
sanityChecks:
  ruleOf40: Y3 收入增速 52.8%（从 $144K 到 $220K）+ Y3 EBITDA 利润率 -359% = -306；在这个尚未放量的阶段，Rule of 40 没有实质意义，因此标记为不适用，等 ARR 超过 $2M 再看。
  burnMultiple: Y3 净 burn 为 $791K，除以 Y3 净新增 ARR $76K（1 条新增走廊）= 10.4x；高于 <2x 的高效基准，但符合企业级 pre-scale 和小滩头市场的现实；等 Series A 后 GTM 能跨走廊放大，指标才应明显改善。
  revenuePerFte: Y3 每 FTE 对应收入 $27.5K（$220K / 8 FTE）；显著低于 $200–400K 的 SaaS 基准，反映出早期滩头市场太小；若不扩到相邻基础设施，很难具备风投级效率。
  flags:
  - 市场太小：TAM 仅 $1.9M，Y3 SOM 仅 $0.2M；若到 Y4 仍不能扩到相邻基础设施，单靠天然气管道滩头市场撑不起风投级结果。
  - Y3 的 burn multiple 为 10.4x，说明早期扩张非常吃资本；pre-seed 阶段还能接受，但到 seed-to-A 必须压到 <5x，增长资本才愿意接。
  - Y3 每 FTE 收入 $27.5K，较 SaaS 基准低 7–14 倍；在 ARR 过 $1M、并切到多个基础设施垂直前，效率会被结构性限制。
  - 强依赖在轨推理：BP 风险里已把 Pixxel/Sarvam 时间线后移评为 High/High；只要超过 2026 年 Q4，产品就会被迫退回“只做地面推理”，试点转化也可能放慢。
  - LTV/CAC 3.7x 算过得去，但前提是年流失率守在 18% 以下；若早期走廊年流失率超过 20%，该比值会跌破 3x，商业论证明显变弱。
  - PSU 采购风险：BP 已指出，PSU 和大型运营商周期可能比计划更长；如果首个试点延后 12 个月（下行情景），Y3 现金底线会降到 $1.03M，虽然还安全，但已经偏紧。
  - 季风和云层缺口可能逼公司采购 SAR 伙伴数据，使 COGS 升到约 45%，毛利率也会像敏感性表展示的那样，从 70% 压到 55%。
