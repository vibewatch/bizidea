topRisks:
  - name: Orbital rollout delay
    description: If Pixxel and Sarvam slip the Q4 2026 timeline, customers may not get the on-orbit workflow quickly enough to justify switching.
    mitigation: Start with prelaunch pilots that use existing Pixxel imagery and ground inference, then migrate customers to orbital processing when the satellite is live.
  - name: False-positive burden
    description: Early methane or encroachment alerts could overwhelm field teams if precision is not high enough on real corridors.
    mitigation: Launch with narrow corridor pilots, human-in-the-loop review, and field-confirmation feedback before expanding automated escalation.
  - name: Long enterprise sales cycles
    description: Large pipeline operators and public-sector infrastructure buyers may move slowly and require procurement-heavy approvals.
    mitigation: Sell first through monitoring contractors and scoped corridor pilots tied to one recent incident or expansion project with a clear budget owner.
