jobsToBeDone:
  - job: When a pipeline corridor is too large for manual patrol coverage, help integrity teams surface likely methane and encroachment hotspots, so they can dispatch crews only where risk is rising.
    currentAlternative: Ground patrols, helicopters, and periodic imagery review by outsourced GIS teams
    successMetric: Time from anomaly emergence to field inspection
  - job: When a regulator or executive asks for proof that right-of-way monitoring is working, help operations teams produce a reviewed alert trail, so they can show coverage and closure instead of anecdotal patrol activity.
    currentAlternative: Spreadsheet logs, contractor emails, and disconnected geospatial screenshots
    successMetric: Percentage of alerts investigated and closed within policy SLA
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Multiple same-day sources verify a concrete orbital-inference stack, a near-term launch timeline, and explicit claims about refined results replacing heavier ground processing.
  painIntensity:
    score: 5
    rationale: Pipeline operators face real safety, outage, and regulatory costs when leaks or encroachments are caught too late.
  wedgeClarity:
    score: 5
    rationale: The first product is a narrow anomaly-triage workflow for one critical infrastructure asset class rather than a generic space-analytics platform.
  defensibility:
    score: 4
