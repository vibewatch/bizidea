problem: >-
  Indian gas transmission operators still rely on patrols, delayed imagery analysis, and outsourced GIS review to detect
  methane leaks, illegal excavation, and right-of-way encroachment across thousands of kilometers of pipeline. By the
  time a suspicious area is downloaded, processed, and escalated, a small anomaly can already become a safety incident,
  service disruption, or regulatory problem. Sensitive operators also have little appetite to ship raw infrastructure
  imagery through foreign cloud and analytics stacks when a domestic alternative becomes available.
targetUser:
  primary: Head of pipeline integrity or remote operations at an Indian gas transmission operator managing 2,000-8,000 km of trunk pipeline
  secondary: Geospatial monitoring contractors serving Indian pipeline and LNG operators
  buyer: COO, Chief Integrity Officer, or Head of Operations at a large Indian gas transmission operator
startupThesis:
  nonObviousInsight: >-
    The new control point is not the satellite image itself; it is the sovereign decision layer that turns hyperspectral
    passes into inspectable anomaly cases before the raw data ever hits a terrestrial processing stack. Once inference
    happens in orbit and refined results can be downlinked directly, the winner can sell workflow-ready infrastructure
    alerts rather than generic imagery access.
  beachhead: >-
    Methane-leak and right-of-way encroachment alerting for Indian gas transmission operators monitoring long-haul trunk
    pipelines through industrial and peri-urban corridors
  wedge: >-
    Sovereign orbital anomaly triage workspace that converts Pixxel-class hyperspectral passes into probable methane,
    excavation, and encroachment cases with map snippets, confidence scores, and field-inspection queues
  whyNowCatalyst: >-
    Pixxel and Sarvam say India-built models will run directly in orbit on datacenter-class GPUs by Q4 2026 and send
    refined results to Earth, making low-bandwidth sovereign infrastructure alerting newly practical.
  ventureScalePath: >-
    Start with gas pipelines, then expand the same orbital-inference workflow into refineries, mining corridors, power
    transmission networks, ports, and defense-sensitive infrastructure where customers care about both anomaly speed and
    sovereign data handling.
solution: >-
  The product ingests pipeline GIS layers, right-of-way boundaries, maintenance history, and customer-defined watch zones,
  then translates each satellite pass into a ranked set of probable methane, excavation, or encroachment events. Instead
  of forcing the operator to buy raw hyperspectral scenes and run a separate analytics workflow, it delivers compact case
  packets with geolocation, confidence, spectral evidence, and recommended field actions. An operations layer routes those
  cases into inspection crews, contractor tickets, and regulator-ready audit logs so the customer can prove which alerts
  were reviewed and closed. Over time the platform compounds a proprietary labeled dataset of orbital anomaly patterns
  across Indian infrastructure corridors, improving precision and expanding into adjacent assets.
goToMarketSeed:
  firstCustomer: >-
    State-owned or large private Indian gas transmission operator, or its designated monitoring contractor, responsible for
    one trunk pipeline corridor feeding city-gas and industrial demand
  buyingTrigger: >-
    A recent leak, unauthorized digging incident, or new corridor expansion creates executive pressure to improve
    right-of-way surveillance without adding more manual patrol coverage
  currentAlternative: Helicopter and ground patrols, manually ordered satellite imagery, and outsourced GIS analysts working in batch reviews
  switchingReason: >-
    The product delivers faster anomaly cases from a sovereign India-built stack without requiring the customer to manage
    raw imagery workflows, foreign cloud processing, or a new in-house remote-sensing team.
  pricingHypothesis: "$3-$8 per monitored km per month plus premium fees for confirmed anomaly investigations and audit reporting"
whyNow:
  - point: On-orbit training and inference mean the analysis loop can move before downlink, which is exactly what turns satellite data into an operational alert product rather than a slow imagery service.
    signalRefs: [Inference is moving onto the satellite]
    sourceRefs: [1]
  - point: Datacenter-class GPUs assigned to real-time hyperspectral processing make narrow infrastructure-detection models feasible on the satellite itself instead of in a ground cluster.
    signalRefs: [Hyperspectral workloads now have dedicated orbital GPU capacity]
    sourceRefs: [1]
  - point: Terrestrial land, power, water, and bandwidth bottlenecks create a real economic reason to shift the first-pass workload off ground infrastructure now.
    signalRefs: [Ground-side compute constraints are commercially painful]
    sourceRefs: [3]
  - point: If refined results can be sent to Earth instead of raw imagery, operators can buy alert workflows with much lower bandwidth, latency, and analyst overhead.
    signalRefs: [Customers can buy refined outputs instead of raw imagery workflows]
    sourceRefs: [3]
  - point: Pixxel and Sarvam are explicitly selling the stack as sovereign AI infrastructure, which should unlock early trust and budget from sensitive infrastructure operators that avoid foreign processing paths.
    signalRefs: [Sovereign AI has become part of the product promise]
    sourceRefs: [1, 2]
differentiator: >-
  This is not generic Earth-observation analytics software and not a broad satellite-imagery marketplace. It is a
  workflow product designed around one painful operating motion: turning orbital hyperspectral inference into dispatchable
  infrastructure cases that a pipeline team can inspect and close. The defensible edge comes from combining sovereign
  deployment posture with a growing labeled corpus of methane, excavation, and encroachment outcomes tied to real field
  resolution data rather than just selling pixels.
