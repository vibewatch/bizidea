problem: 印度天然气输送运营商至今仍靠巡线、延后的影像分析和外包 GIS 复核，去识别绵延数千公里管道上的甲烷泄漏、违规开挖和通行权侵占。等可疑区域完成下载、处理和上报，小异常往往已经酿成安全事故、服务中断或监管问题。对敏感运营商来说，一旦国内替代方案出现，他们也不愿再把原始基础设施影像送进国外云和分析栈。
targetUser:
  primary: 印度天然气输送运营商中，负责 2,000-8,000 km 干线管道的管道完整性或远程运营负责人
  secondary: 服务印度管道与 LNG 运营商的地理空间监测承包商
  buyer: 大型印度天然气输送运营商的 COO、首席完整性官或运营负责人
startupThesis:
  nonObviousInsight: 新的控制点不在卫星图像本身，而在一层主权决策层：原始数据还没进入地面处理栈之前，它就把高光谱过境转成可核查的异常案件。等推理迁到在轨、提炼后的结果可以直接下传，赢家卖的就不是通用影像访问权，而是可直接进流程的基础设施预警。
  beachhead: 面向穿越工业区和城郊走廊的长距离干线管道，为印度天然气输送运营商提供甲烷泄漏与通行权侵占预警
  wedge: 一个主权在轨异常分诊工作台，把 Pixxel 级高光谱过境转成疑似甲烷、开挖和侵占案件，并附地图切片、置信度分数和现场巡检队列
  whyNowCatalyst: Pixxel 和 Sarvam 表示，到 2026 年 Q4，印度自研模型将直接在数据中心级 GPU 上在轨运行，并把提炼后的结果发回地球——低带宽、主权可控的基础设施预警因此第一次真正可行。
  ventureScalePath: 先从天然气管道切入，再把同一套在轨推理工作流复制到炼厂、矿区走廊、输电网络、港口以及国防敏感基础设施；这些客户同时在乎异常响应速度和主权数据处理。
solution: 产品会接入管道 GIS 图层、通行权边界、维护历史和客户自定义监控区，再把每次卫星过境转成一组按优先级排序的疑似甲烷、开挖或侵占事件。它不逼运营商去买原始高光谱影像、再单独跑分析流程，而是直接交付紧凑的案件包：包含地理定位、置信度、光谱证据和建议的现场动作。运营层再把这些案件分发到巡检班组、承包商工单和可供监管抽查的审计日志里，让客户能证明哪些预警被复核、被关闭。随着时间推移，平台会在印度基础设施走廊上沉淀专有的在轨异常标注数据集，精度继续抬升，也能顺势扩到相邻资产。
goToMarketSeed:
  firstCustomer: 首个客户应是国有或大型民营印度天然气输送运营商，或其指定的监测承包商，负责一条服务城市燃气与工业需求的干线走廊。
  buyingTrigger: 最近发生泄漏、违规开挖，或新走廊扩建，会让管理层有压力在不增加人工巡线的前提下，把通行权监控做得更强。
  currentAlternative: 直升机与地面巡线、手动下单购买卫星影像，以及外包 GIS 分析师按批次复核。
  switchingReason: 这套产品基于印度自建、主权可控的栈，更快给出异常案件；客户不用自己管理原始影像流程、国外云处理，也不用新建一支内部遥感团队。
  pricingHypothesis: 每监测 km 每月 $3-$8，另对已确认异常调查和审计报告收取溢价费用。
