topRisks:
- name: 轨道落地延迟
  description: 如果 Pixxel 和 Sarvam 的 2026 年 Q4 时间表后移，客户可能拿不到足够快的在轨工作流，自然也没动力切换。
  mitigation: 先用现有 Pixxel 影像和地面推理做发射前试点，等卫星真正上线后，再把客户迁到在轨处理。
- name: 误报负担过重
  description: 如果真实走廊上的精度还不够高，早期的甲烷或侵占预警可能直接压垮现场团队。
  mitigation: 先从窄走廊试点、人机协同复核和现场确认反馈开始，自动升级范围别急着放大。
- name: 企业销售周期过长
  description: 大型管道运营商和公共部门基础设施买家推进慢，而且往往要走重采购审批。
  mitigation: 先通过监测承包商切入，把首单限定在一条走廊试点，并绑定到一次近期事故或扩建项目以及明确的预算 owner。
