jobsToBeDone:
- job: 当一条管道走廊太长，靠人工巡线根本覆盖不过来时，帮完整性团队把可能的甲烷与侵占热点先筛出来，这样他们只需把班组派到风险上升的地方。
  currentAlternative: 地面巡线、直升机，以及外包 GIS 团队定期复核影像。
  successMetric: 从异常出现到现场巡检的时间
- job: 当监管方或高管要求证明通行权监控真的有效时，帮运营团队拿出一条已复核的预警轨迹，让他们展示的是覆盖率和关单结果，而不是零散的巡线故事。
  currentAlternative: 电子表格日志、承包商邮件和彼此割裂的地理空间截图。
  successMetric: 在政策 SLA 内完成调查并关闭的预警占比
