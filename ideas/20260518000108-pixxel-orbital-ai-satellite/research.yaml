    - 38
  geographicConsiderations:
  - point: India-specific sovereignty matters more here than in generic EO because pipeline routes and anomaly outputs can be politically sensitive infrastructure data.
    sourceRefs:
    - 1
    - 2
  - point: Monsoon and cloud cover make optical-only workflows brittle; an India-specific product likely needs sensor-fusion or fallback arrangements over time.
    sourceRefs:
    - 40
  - point: Eastern and northeastern gas-grid expansion creates fresh corridors where operators may tolerate pilots because the surveillance process is less entrenched.
    sourceRefs:
    - 24
