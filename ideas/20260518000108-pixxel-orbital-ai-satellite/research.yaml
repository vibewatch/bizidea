openQuestions:
- What surveillance, patrol, and outsourced-GIS spend does one Indian gas operator already allocate per monitored corridor today?
- How much precision can Pixxel-class hyperspectral models achieve on methane, excavation, and encroachment before field teams reject the alert feed?
- Will Indian PSU buyers require a domestic hosting, domestic-model, or domestic-ground-segment guarantee beyond what Pixxel and Sarvam already claim?
- How much all-weather sensor fusion is needed in monsoon months for a production-grade SLA?
- Can the startup contract directly with operators, or must it enter first through monitoring contractors and GIS integrators?
