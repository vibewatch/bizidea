competitors:
- name: GHGSat
  stage: scale-up
  wedge: Dedicated methane-emissions satellites and compliance-oriented monitoring for oil and gas operators.
  pricing: Custom enterprise contracts; public pricing not listed.
  strength: Strong methane brand, growing fleet, and explicit positioning around OGMP 2.0 and regulation.
  weaknessVsUs: Less obviously positioned for India-specific ROW encroachment, sovereign processing, and dispatch workflow closure.
  sourceRefs:
  - 50
  - 51
  - 55
  - 61
- name: Kayrros
  stage: scale-up
  wedge: AI-driven geospatial analytics and near-real-time methane monitoring across the energy value chain.
  pricing: Custom / demo-led enterprise pricing.
  strength: Strong independent-monitoring narrative and broad analytics layer for energy and carbon markets.
  weaknessVsUs: Looks broader and more global than a corridor-specific Indian operations product.
  sourceRefs:
  - 42
  - 46
- name: Pixxel / Aurora
  stage: scale-up
  wedge: Hyperspectral satellite collection plus analytics platform and marketplaces.
  pricing: Custom platform access / marketplace-led, not public list pricing.
  strength: Owns the upstream hyperspectral stack and sovereign-orbital narrative that underpins the thesis.
  weaknessVsUs: Platform and data access are not the same as an auditable methane-plus-encroachment workflow sold to one operator team.
  sourceRefs:
  - 4
  - 15
  - 1
- name: SatSure
  stage: scale-up
  wedge: India-native EOaaS and infrastructure intelligence across utilities, routes, and remote asset monitoring.
  pricing: Custom enterprise pricing.
  strength: Local EO integration credibility and infrastructure-route use cases.
  weaknessVsUs: Not visibly specialized around methane detection or an orbit-to-incident pipeline workflow.
  sourceRefs:
  - 38
- name: GalaxEye
  stage: seed
  wedge: All-weather OptoSAR imagery combining SAR and multispectral data on one Indian platform.
  pricing: Not public.
  strength: Monsoon-resilient sensing and strong India-sovereign imagery story.
  weaknessVsUs: Still sensor-layer focused and not visibly a finished operator workflow product.
  sourceRefs:
  - 40
