  validationPlan:
  - priority: high
    question: What annual budget line already pays for corridor surveillance, leak response, and outsourced GIS review?
    evidenceToGather: One operator budget owner interview, one contractor quote, and one pilot-corridor operating-cost baseline.
  - priority: high
    question: How accurately can methane, excavation, and encroachment be ranked on one live corridor before field teams reject false positives?
    evidenceToGather: Historical incident data, maintenance logs, and 6-12 months of labeled imagery on one operator corridor.
  - priority: medium
    question: How much of the product can ship before Pixxel/Sarvam’s orbital AI stack is operational?
    evidenceToGather: Launch timeline diligence, service-level commitments, and fallback access to current Pixxel imagery plus ground processing.
  - priority: medium
    question: Does the product need an all-weather sensor-fusion partner from day one?
    evidenceToGather: Monsoon-season detection tests and pilot comparisons between optical-only and fused workflows.
