slug: orbital-pipeline-alerting-os
date: '2026-05-18'
executiveSummary: Orbital Pipeline Alerting OS 不该一上来就做成通用高光谱分析平台，而应先卡住印度天然气输送运营商的一条走廊级异常工作流。首个客户应该是类似 GAIL 的运营商，或其监测承包商：他们手里已经管着数千公里干线管道，而且正因泄漏、违规开挖或走廊扩建承压。产品要赢，唯一办法是把 Pixxel 级高光谱过境比“巡线 + 外包 GIS 复核”更快地转成可核查的甲烷、开挖和侵占案件。研究确认了运营痛点，也确认了主权 AI 的时机信号；但核心技术承诺仍取决于 Pixxel 和 Sarvam 能否按 2026 年 Q4 的说法，把在轨算力真正跑稳。按当前每 km 定价假设，近期市场真实但偏小，所以公司必须把天然气管道当成验证切口，而不是完整的风投故事。正确的节奏是：先在一条走廊上跑出可衡量的预警精度、巡检提速和审计价值，再去谈更广的基础设施覆盖。眼下最大的空白，是监控预算到底挂在哪条科目、现场团队能容忍多少误报，以及在轨处理上线前，运营商是否愿意先接受地面推理试点。
problem:
- 管道完整性团队到现在仍靠巡线、手动下单影像和外包 GIS 复核，所以甲烷泄漏和通行权破坏常常发现得太晚，错过了部分安全、停运和监管后果的窗口。
- 敏感运营商不想为了这套新工作流，把原始基础设施影像送进国外云，也不想自己再拉一支内部遥感团队。
solution:
- 做一个主权预警工作台，接入走廊 GIS 图层，再把每次过境转成按优先级排序的甲烷、开挖和侵占案件，附地图切片、光谱证据、置信度分数和建议的现场动作。
- 再补上巡检队列、承包商分发和关单日志，让同一套系统既能发现异常，也能证明哪些预警被复核、被升级、被解决。
whyWeWin:
- 这个切口比影像市场或纯甲烷工具都更窄，因为它卖的是面向单个运营团队的完整“走廊到关单”工作流。
- 如果公司能在真实走廊上沉淀现场确认结果，就会持续累积一套标注异常数据集和运营阈值，这些东西通用 EO 平台和承包商不会天然拥有。
- 对这类买家来说，印度本地、主权可控的处理能力本身就是产品特性，不只是品牌叙事；在国资关联或政治敏感走廊里尤其如此。
strategicChoices:
  beachhead: 先拿下一条 500-1,500 km 的印度天然气输送走廊：大型运营商或其监测承包商在事故、扩建项目或完整性复盘后，急需更快的甲烷和通行权预警。
  wedgeRationale: 按走廊切进去，比直接卖全网平台更容易更快拿到证据，因为买家能在一个边界清晰的工作流里，把预警精度、巡检周转和审计关单，直接对比现有巡线基线。
  sequencingRationale: 先在当前 Pixxel 数据和走廊 GIS 上做人工复核预警，证明有一支团队愿意按这些案件行动；再补审计自动化和更广的走廊覆盖，最后才投相邻资产和更重的伙伴集成。这样产品范围、销售动作和招聘节奏，才能始终围着一条可度量的运营闭环。
  notYet:
  - 在天然气管道打法还没跑顺前，不碰炼厂、港口、矿区走廊和输电网络。
  - 现场确认精度没证明前，不承诺全自动派单或合规效果。
  - 不做原始影像转卖、横向 GIS 分析，也不做宽泛的基础设施市场。
market:
  tam: 按每 km 每年约 $66 计，印度天然气输送网络约 28,300 km，对应估算 TAM 为 $1.9M。
  sam: 按同一价格假设，GAIL 体量的在运走廊约 18,400 km，对应估算 SAM 为 $1.2M。
  som: 按当前定价假设，第 3 年若能拿下约 3,000 km、分布在 1-2 条生产级走廊上，则 SOM 约为 $0.2M。
  segments:
  - 管理长距离干线管道的印度天然气输送运营商
  - 服务天然气与 LNG 走廊监控项目的地理空间监测承包商
  buyingProcess: 这笔单子大概率始于事故、走廊扩建或董事会层面的完整性复盘：由管道完整性负责人或远程运营负责人发起范围明确的试点，再由 COO 或运营负责人批预算。相比直接采购全网软件，运营商更愿意先买一条走廊试点，或让承包商先带着做。
product:
  mvp: MVP 应该是一套面向单个运营商的走廊工作台：完成 GIS 导入、监控区设置，输出甲烷、开挖和侵占的排序案件，支持人机协同复核和可导出的巡检包。它先证明预警有用、关单日志跑得通，再谈完整的轨道自治。
  sixMonth: 6 个月内，用当前 Pixxel 影像 + 地面推理、走廊基线、人机协同复核和可审计巡检队列，给一条真实走廊交付 1 个共创客户试点。
  twelveMonth: 12 个月内，补齐生产级案件管理、承包商分发、SLA 与审计报告、运营商专属阈值调优，以及在轨推理可用时的迁移路径。
  twentyFourMonth: 24 个月内，只有在公司已经拿到现场确认标签、跑通季风期兜底覆盖、并证明“试点转生产”可复制后，才扩到多条走廊和第二类基础设施。
  keyBets:
  - 即便轨道侧推理尚未完全上线，只要初始工作流确实能减轻巡线和分析师负担，买家也愿意为更快的现场动作和可审计性付费。
  - 一条走廊沉淀出的标注结果，足以比“产品更宽但更浅”的基础设施方案更快抬高精度。
  - 先交付人工复核后的异常案件，比一开始就承诺全自动预警，更容易赢得信任。
  - 季风与云层造成的缺口，可以用伙伴数据或兜底流程补上，而不至于直接打穿毛利目标。
gtm:
  wedge: 把一条收费走廊试点卖给类似 GAIL 的运营商，或其监测承包商，卖点是面向甲烷与通行权事件的主权预警与关单系统。
  channels:
  - 创始人主导直销，直接找大型印度天然气运营商的管道完整性和远程运营负责人
  - 通过已经服务走廊监控的 GIS、监测和现场巡检伙伴，推进承包商主导的试点
  - 借助围绕 Pixxel 和相邻基础设施集成商形成的主权太空、本土 EO 关系开账户
  funnelTargets: 线索→合格走廊试点 20-30%；合格试点→付费试点 40-50%；付费试点→生产级走廊 50%+；首个生产级走廊→12 个月内在 50%+ 的胜单上扩到第二条走廊。
  pricing: 按被监测 km 收年订阅费，再收走廊导入和 GIS 集成费，并对审计报告与已确认异常工作流收溢价；这样既贴合买家今天采购监控覆盖的方式，也能让首单从一条走廊起步，而不是一上来吃整张网络。
businessModel:
  revenueStreams:
  - 按 km 收费的走廊监测订阅
  - 一次性实施费和 GIS 集成费
  - 审计报告与已确认异常工作流的溢价费用
  unitOfValue: 被监测的管道 km，并可为调查和审计工作流叠加收费项。
  targetGrossMarginPct: 70
  expansionLevers:
  - 一条试点证明能提升巡检速度后，在同一运营商账户内加更多走廊
  - 在基础监测订阅上，加承包商席位、审计模块和面向监管的报告能力
  - 等天然气打法跑通后，把“走廊到关单”工作流复制到相邻线性基础设施
strategyMap:
  northStarMetric: 进入生产级走廊、且跑通现场确认预警工作流的管道监测 km 数。
  inputMetrics:
  - 合格走廊试点机会数
  - 付费试点转生产率
  - 从卫星过境到生成现场巡检工单的中位时间
  - 在已复核案件上，甲烷、开挖和侵占预警的精度
  - 在客户 SLA 内关单的预警占比
  moatsToBuild:
  - 把在轨检测、运营商 GIS、维护历史和现场结果连起来的走廊级标注数据集
  - 嵌进完整性团队日常运营的审计轨迹与案件分发工作流
  - 能降低敏感基础设施监控买家阻力的主权处理与伙伴关系
  killCriteria:
  - 在至少 8 个合格账户里同时跑直销和承包商销售 12 个月后，仍拿不到任何付费走廊试点。
  - 阈值调优后，首条真实走廊上的复核精度仍低于 60%，或现场团队拒绝超过一半案件。
  - 18 个月内，没有任何生产客户愿意从一条试点走廊扩到更大部署。
  - 到 2027 年，Pixxel 或等价上游供给方仍无法支持从地面推理迁向承诺中的轨道工作流。
  mermaid: |
    flowchart LR
      Wedge[Corridor pilot wedge] --> MVP[Human-reviewed anomaly workspace]
      MVP --> Proof[Paid pilot conversion and field-confirmed alerts]
      Proof --> Expansion[More corridors and adjacent infrastructure]
investorMemo:
  verdict:
    call: 观察
    conviction: 痛点很强，主权工作流切口也可信；但近期市场太小，又高度依赖上游轨道落地，所以判断上限被压住了。
    whyBelieve: 公司卡住的是“高光谱采集”和“现场关单”之间的真实工作流空白——这部分今天并不被甲烷专业厂商、影像平台或巡线承包商完整拥有。
    whyDoubt: 按当前定价算，天然气管道市场不大；只要轨道时间表后移，或现场团队不接受早期预警质量，价值主张就会迅速变弱。
    nextDiligence: 先确认 1 个付费走廊试点、监控预算的 owner 到底是谁，再把预警精度拿去和运营商现有“巡线 + GIS”工作流做基准对比。
  firstCustomer:
    title: 类似 GAIL 的印度天然气输送运营商中的管道完整性负责人
    profile: 大型运营商或其指定监测承包商，负责 2,000-8,000 km 干线管道，并对泄漏响应、ROW 监控和巡检 SLA 负责。
    trigger: 最近的泄漏、违规开挖事件或走廊扩建，会让管理层希望在不增加人工巡线的情况下，把“发现到检查”的时间压短。
    buyer: COO 或运营负责人
    initialContract: 首单应是 $75k-$150k 的收费走廊试点，覆盖约 500-1,500 km，并带上集成与复核工作流；若精度和关单指标站住，再转成约 $150k-$400k 的年度生产级部署，并叠加审计和调查收费项。
  mustBeTrue:
  - 至少有 1 家大型印度天然气运营商或监测承包商，愿意从现有监控或完整性预算里拨钱做走廊试点。
  - 在现场团队彻底失去信任前，人工复核后的异常案件能在一条走廊上把精度抬到可生产使用的水平。
  - 买家会把主权处理和可审计性当成足以切换的理由，而不是把产品当成另一条影像数据流。
  - 公司可以先从地面推理起步，同时还能把客户 momentum 守到轨道处理上线。
  - 这套走廊工作流能足够快地扩到相邻线性基础设施，抵消天然气滩头市场过小的问题。
  diligenceQuestions:
  - 到底哪一条具体的监控或完整性预算科目，可以为首个付费走廊试点买单？
  - 在真正信任新预警前，管道现场团队能接受的精度和误报阈值是多少？
  - 和今天的巡线 + GIS 流程相比，这套方案能把“卫星过境到生成巡检工单”的时间缩短多少？
  - 在轨推理尚未上线前，Pixxel 或等价上游伙伴到底能给出什么服务级别和商业条款？
  - 天然气管道之后，哪一类相邻基础设施最容易复用同一套工作流？
operatingAssumptions:
- assumption: 首个可复制买家是运营商完整性团队或其监测承包商，而不是气候或 ESG 团队。
  basis: research.yaml
  validationTest: 做 10 次买家访谈，确认至少 7 次把预算权放在运营、完整性或承包商主导的监控团队，而不是可持续发展部门。
  decisionImpact: 如果不成立，GTM 话术、定价基础和试点设计都得转向排放合规工作流，而不再是运营风险降低。
- assumption: 即便轨道侧推理尚未上线，用当前 Pixxel 数据做地面推理试点，也足以拿下首个付费部署。
  basis: research.yaml
  validationTest: 用当前数据和明确写好的轨道迁移计划，把至少 1 个共创客户转成付费试点。
  decisionImpact: 如果不成立，公司就会被 Pixxel 和 Sarvam 的发射时间卡死，应推迟招聘和融资，不适合提前拉开更宽的 GTM。
- assumption: 只要产品确实能减少巡线、分析师和审计负担，运营商就能接受按 km 订阅定价。
  basis: idea.yaml
  validationTest: 把定价拿给 5 个合格客户，至少拿回 2 份仍落在模型区间内的试点 proposal，且不被迫退回纯服务经济。
  decisionImpact: 如果不成立，公司就得按走廊结果重定价，或捆更多服务卖，软件毛利会下去，扩张也会变慢。
- assumption: 季风期的感知缺口，可以用全天候伙伴数据或兜底操作流程补上。
  basis: research.yaml
  validationTest: 做 1 轮季风期基准测试，在同一走廊上对比“仅光学预警”和至少 1 套融合或兜底工作流。
  decisionImpact: 如果不成立，产品要么收缩到晴天场景，要么比计划更早增加供应链复杂度。
- assumption: 一条走廊就能沉淀出足够多的标注结果，进而形成护城河。
  basis: operator judgment
  validationTest: 首条试点走廊在 9 个月内，至少沉淀 50 个现场确认过的正负样本预警结果。
  decisionImpact: 如果不成立，数据护城河形成得太慢，公司可能要更早做多走廊合作，销售和支持负担都会上来。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 围绕一条目标走廊，访谈运营商完整性负责人、远程运营负责人和监测承包商。
  hypothesis: 最急的痛点是更快巡检和审计关单，而不是获得泛化的卫星影像访问权。
  successMetric: 完成 10 次合格访谈、拿到 3 个走廊试点 scope，并在至少 2 个账户里明确预算 owner。
  owner: CEO
- horizon: 0–90 天
  experiment: 用历史走廊事故、GIS 图层和当前 Pixxel 级影像，搭一条人工试点工作流。
  hypothesis: 只要证据包够具体、够可审计，运营商会比看原始影像更信任排序后的异常案件。
  successMetric: 让 2 个共创客户认可这套工作流，认为足以进入真实试点设计。
  owner: 创始产品负责人
- horizon: 90–180 天
  experiment: 上线 1 个收费走廊试点，带人机协同复核和现场反馈采集。
  hypothesis: 范围足够收敛的试点，能把“发现到检查”的时间压下来，也能沉淀足够信号支持转生产。
  successMetric: 签下 1 个付费试点；与基线相比，中位工单生成时间缩短 30%；至少收集 20 个现场验证案件。
  owner: CEO
- horizon: 90–180 天
  experiment: 测试按 km 订阅、导入费和审计加价包这套定价与打包方式。
  hypothesis: 相比定制影像或咨询费率，买家更偏好和现有监控支出挂钩的走廊覆盖定价。
  successMetric: 拿到 2 份落在目标区间内的书面试点 proposal，且不被迫退回纯按工时收费。
  owner: 创始 GTM
- horizon: 180–365 天
  experiment: 至少用 1 套全天候或兜底伙伴工作流，跨 1 个季风周期做预警精度基准测试。
  hypothesis: 即便存在季节性覆盖缺口，产品也能在不重搭整套栈的情况下守住客户信任。
  successMetric: 在云层重的时段，复核后的预警精度仍高于 60%，客户 SLA 达成率不低于试点目标。
  owner: 遥感负责人
- horizon: 180–365 天
  experiment: 把首条试点走廊转成生产，并扩到第二条走廊或第二支承包商团队。
  hypothesis: 只要一条走廊上的巡检提速和审计结果被证明，账户扩张就有机会发生。
  successMetric: 试点启动后 12 个月内，完成 1 次转生产，以及 1 次第二走廊扩张或等价的承包商扩展。
  owner: 创始 GTM
operations:
- 把走廊 GIS 导入、异常复核和关单日志，始终当成同一条可审计的运营闭环来维护。
- 在真实现场数据上把精度阈值跑稳前，一直保留人机协同分诊。
- 优先和 EO 提供方、GIS 集成商、现场巡检承包商沉淀伙伴 playbook，而不是每个账户都做定制集成。
- 从第一天起就跟踪现场结果、被拒绝的预警和升级耗时，用来持续调阈值、守续费。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责搭异常排序引擎、GIS 数据模型和案件工作流，把卫星过境真正接到巡检工单上。
- role: 创始 GTM
  startTiming: 第 0 个月
  rationale: 在高度集中的运营商和承包商市场里，做创始人主导销售；事故和走廊扩建的时点会直接影响成单。
- role: 遥感负责人
  startTiming: 第 3 个月
  rationale: 负责甲烷、开挖和侵占模型调优，以及面向季节性覆盖缺口的伙伴数据评估。
- role: 客户成功与运营负责人
  startTiming: 第 6 个月
  rationale: 负责走廊导入、现场反馈采集、审计报告和“试点转生产”，同时避免公司滑成重服务商。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 1 个收费走廊试点，并为 1 家运营商或承包商完成基线工作流集成。
  - 累计至少 50 个现场确认过的预警结果，建立客户专属的精度阈值。
  - 在首条真实走廊上，证明“卫星过境到巡检工单”的时间明显缩短。
- horizon: 12–24 个月
  items:
  - 把首个试点转成生产，并至少扩到 1 条额外走廊。
  - 交付审计就绪的报告和承包商分发工作流，并进入周期性运营复盘。
  - 验证 1 个能扛季风的传感伙伴或兜底流程，确保客户 SLA 不掉。
- horizon: 24–36 个月
  items:
  - 在至少 2 个运营商或承包商账户里，跑出可复制的多走廊部署。
  - 把同一数据模型和案件管理扩到 1 类相邻线性基础设施。
  - 证明累积下来的现场标签，能实质性提升续费、精度或扩张结果。
risks:
- risk: Pixxel 和 Sarvam 的在轨推理上线延迟，或在真实生产条件下表现不达标。
  likelihood: High
  impact: High
  mitigation: 先用当前数据做地面推理试点，卖迁移路线图而不是轨道承诺，并避免在上游时间线没验证前提前扩招。
- risk: 误报压垮现场团队，在转生产前就把信任打没。
  likelihood: High
  impact: High
  mitigation: 把人工复核保留在闭环里，先在一条走廊上调阈值，再把扩张和现场确认精度绑定起来。
- risk: PSU 和大型运营商的采购周期，比 runway 计划假设的更长。
  likelihood: High
  impact: High
  mitigation: 通过承包商主导试点、事故驱动的走廊 scope，以及绑定单一运营触发点的小合同切入，而不是一上来替换全网软件。
- risk: 季风和云层覆盖让“纯光学优先”的监控在一年中过长时间不可靠。
  likelihood: Medium
  impact: High
  mitigation: 尽早补全天候伙伴数据或兜底流程，在季节性基准测试完成前，不承诺全覆盖。
- risk: 天然气管道这个切口太小，撑不起风投级结果。
  likelihood: High
  impact: Medium
  mitigation: 把天然气管道当成数据和验证切口，扩人前必须先拿出清晰的相邻基础设施扩张路径。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月拿下 1-2 个收费走廊试点，在一条生产级走廊上证明预警质量和审计价值，搭起案件管理与伙伴数据栈，再验证相邻基础设施扩张是否足够可信，值得做成一家 seed 级公司。
