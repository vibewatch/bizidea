  wedge: 围绕能源价值链提供 AI 驱动的地理空间分析和近实时甲烷监测。
  pricing: 定制 / 演示驱动的企业定价。
  strength: 独立监测叙事强，能源与碳市场分析层也铺得更广。
  weaknessVsUs: 更像全球化宽平台，不像围绕单条印度走廊的运营产品。
  sourceRefs:
  - 42
  - 46
- name: Pixxel / Aurora
  stage: 扩张期
  wedge: 高光谱卫星采集 + 分析平台与市场。
  pricing: 平台访问 / 市场导向的定制价格，无公开价目表。
  strength: 握着支撑这套逻辑的上游高光谱栈和主权轨道叙事。
  weaknessVsUs: 平台和数据访问权，不等于一套能卖给单个运营团队的“甲烷 + 侵占 + 审计”工作流。
  sourceRefs:
  - 4
  - 15
  - 1
- name: SatSure
  stage: 扩张期
  wedge: 印度本土 EOaaS 与基础设施 intelligence，覆盖公用事业、线路和远端资产监控。
  pricing: 定制化企业定价。
  strength: 本土 EO 集成公信力强，也有基础设施线路场景。
  weaknessVsUs: 在甲烷探测和“从轨道到事故”的管道工作流上，看不出明确专长。
  sourceRefs:
  - 38
- name: GalaxEye
  stage: 种子期
  wedge: 在单一印度平台上把 SAR 与多光谱数据结合起来的全天候 OptoSAR 影像。
  pricing: 未公开。
  strength: 在季风环境里更抗打，也有很强的印度主权影像叙事。
  weaknessVsUs: 重心仍在传感层，不像一款已经成型的运营商工作流产品。
  sourceRefs:
  - 40
regulatoryTechnicalConstraints:
- point: 在轨 AI 仍要先证明热控、电力和工作流可靠性，才能成为稳定的生产骨干。
  sourceRefs:
  - 1
- point: UNEP/IMEO 预警与 OGMP 2.0 式测量框架，正在抬高全球甲烷监测预期，也让“可验证检测”更重要。
  sourceRefs:
  - 29
  - 51
- point: 如果不补全天候传感器，纯光学探测在多云季节会天然受限。
  sourceRefs:
  - 40
validationSignals:
- point: Pixxel 已经在用高光谱数据为管道监控和通行权侵入场景做营销。
  sourceRefs:
  - 4
  - 15
- point: GAIL 会公开披露网络规模和实时管道事故，说明运营商的监控问题本来就高风险。
  sourceRefs:
  - 20
  - 22
  - 23
- point: 像 MARS 和 MethaneSAT 这样的独立甲烷系统，说明市场正往更透明、更快的排放检测走。
  sourceRefs:
  - 29
  - 37
- point: 除了 Pixxel，印度还有多家主权 EO 栈建设者，这会降低关键基础设施买家对太空监控的天然排斥。
  sourceRefs:
  - 38
  - 40
openQuestions:
- 今天一家印度天然气运营商在每条被监控走廊上，已经为监控、巡线和外包 GIS 复核花了多少钱？
- 在现场团队不愿继续用这套预警流之前，Pixxel 级高光谱模型在甲烷、开挖和侵占上的精度到底能做到多高？
- 除了 Pixxel 和 Sarvam 已宣称的内容外，印度 PSU 买家会不会还要求本地托管、本地模型或本地地面段担保？
- 如果要做到生产级 SLA，季风月份到底需要多强的全天候传感器融合？
- 创业公司能否直接和运营商签约，还是必须先借监测承包商和 GIS 集成商进场？
