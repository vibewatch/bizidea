ideaScorecard:
  signalStrength:
    score: 4
    rationale: Three fetched sources including a primary press release, PYMNTS coverage, and a same-day Forbes interview provide strong evidence; the 25% spend-lift metric is a named, public data point tied to a named product and customer cohort.
  painIntensity:
    score: 4
    rationale: Stablecoin card issuers face real churn from peers launching rewards with no off-the-shelf onchain loyalty vendor available outside Rain's proprietary stack; the pain is confirmed by Rain's own market entry.
  wedgeClarity:
    score: 4
    rationale: The entry product is precisely defined — a loyalty API integrating into Marqeta and i2c via webhooks, targeting issuers outside Rain's platform with a 30-day integration promise and pre-built redemption catalog.
  defensibility:
    score: 3
    rationale: The pre-built merchant redemption network and deep processor integrations create real switching costs, but Rain could expand its platform to serve non-partners and is already the market leader with 100+ live programs.
  ventureScale:
    score: 3
    rationale: The independent stablecoin card issuer segment is growing rapidly in emerging markets but is currently small; scale depends on broader stablecoin card adoption accelerating over the next 3–5 years.
topRisks:
  - name: Rain Platform Expansion
    description: Rain extends its Rewards product as a horizontal SaaS available to card programs outside its issuing stack, becoming a direct and well-resourced competitor with an existing 100+ customer base and pre-built merchant network.
    mitigation: "Build deep exclusive integrations with the two largest non-Rain processors and sign exclusive merchant redemption partnerships before Rain can replicate them; compete on time-to-value and processor neutrality for independent issuers."
  - name: Regulatory Token Classification
    description: Regulators classify onchain loyalty tokens as digital assets or securities subject to licensing, requiring both issuers and the loyalty platform to obtain money-transmitter or broker-dealer licenses to operate.
    mitigation: Structure tokens as non-transferable, non-tradeable rewards redeemable only within a closed merchant network, mirroring the established regulatory treatment of airline miles and major credit card points programs.
  - name: TAM Concentration Risk
    description: The stablecoin card market consolidates around two or three dominant platforms, leaving too small a long-tail of independent issuers for a standalone loyalty vendor to build a durable business.
    mitigation: Expand the loyalty platform upmarket to serve crypto neobanks and DeFi protocols seeking onchain cardholder and depositor retention, diversifying beyond pure stablecoin card issuers before consolidation closes the window.
