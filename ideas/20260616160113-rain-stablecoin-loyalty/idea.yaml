problem: >-
  Stablecoin card issuers are winning on payments rails but losing on retention.
  Traditional loyalty vendors are built for legacy bank card infrastructure and
  cannot integrate with onchain settlement finality or tokenized assets. Building
  in-house requires 12–18 months and blockchain expertise most card-issuing teams
  lack. Rain proved that native onchain loyalty produces 25% higher cardholder spend,
  but only Rain's 100+ platform partners benefit — hundreds of independent stablecoin
  card programs have no equivalent retention layer and no neutral vendor to buy one from.
targetUser:
  primary: "CTOs and VP Products at stablecoin card issuers outside Rain's platform with 5,000–100,000 active cardholders experiencing churn from peers launching rewards"
  secondary: Crypto fintech platforms that bundle stablecoin card programs for their end users
  buyer: "CFO or VP Product at a stablecoin card issuer facing measurable cardholder churn after a competitor launches a cashback or rewards program"
startupThesis:
  nonObviousInsight: >-
    Onchain settlement finality enables a structurally better loyalty architecture than
    any legacy vendor can replicate: points minted only after transaction confirmation
    carry zero stranded-liability risk, are fully auditable, and can integrate with
    onchain wallets. Legacy loyalty vendors are built on deferred-revenue batch ledgers
    optimized for banks — they cannot retrofit this property cheaply. This architectural
    gap creates a greenfield independent layer that incumbent vendors are structurally
    unable to enter without rebuilding their core stack.
  beachhead: "LatAm stablecoin debit card issuers using USDC for local dollarization, with 10,000–50,000 active cardholders and 30–40% monthly churn driven by competitors launching rewards"
  wedge: >-
    A loyalty API that mints ERC-20 points at transaction finalization and integrates
    in under 30 days via webhooks into any Marqeta or i2c card processor stack, with
    zero changes to the issuer's existing card infrastructure.
  whyNowCatalyst: >-
    Rain's public beta showing 25% spend lift is the proof point the market was waiting
    for — it simultaneously validates that onchain card loyalty works and signals that
    the top-of-wallet retention race has begun for every issuer not already on Rain's platform.
  ventureScalePath: >-
    Start as loyalty rails for independent stablecoin card issuers in LatAm and SE Asia,
    then expand into a full cardholder CRM and spend-analytics platform, then evolve into
    the universal retention layer for the onchain payment economy — the Loyalty One for
    the crypto-native card stack with a global issuer network as the moat.
solution: >-
  An onchain loyalty-as-a-service platform exposing a single webhook API that stablecoin
  card issuers plug into their existing card processor (Marqeta, i2c, Galileo) in under
  30 days. On each transaction finalization, the platform mints ERC-20 loyalty tokens
  directly to the cardholder's onchain wallet, maintaining zero stranded-liability risk.
  A pre-built merchant redemption marketplace covering cashback, stablecoin top-up, and
  travel rewards is included so issuers launch with a complete catalog from day one.
  A real-time analytics dashboard surfaces spend-lift cohorts, churn curves, and
  A/B test results so product teams can optimize loyalty mechanics without engineering
  support. No changes to the issuer's core card stack are required.
