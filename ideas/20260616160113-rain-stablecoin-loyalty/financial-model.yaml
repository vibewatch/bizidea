scenarios:
  downside:
    description: >-
      Processor approvals slip and analytics upsell lands later, so Y3 ends
      with about 12 issuers and weaker marketplace volume.
    y3RevenueK: 812.0
    y3EbitdaK: -1084.0
    cashLowPointK: -140.0
    keyAssumptionChanges:
      - Production conversion is one to two quarters slower than A16.
      - Average issuer actives stall closer to 30k than A13.
      - Analytics adoption stays at one issuer through Y3.
  base:
    description: >-
      Base case follows the milestone path: 3 pilots in Y1, 6 production
      issuers by Q4Y2, and 15 paying issuers by Q4Y3.
    y3RevenueK: 1096.2
    y3EbitdaK: -856.6
    cashLowPointK: 200.5
    keyAssumptionChanges:
      - Assumptions A8 through A16 are unchanged from the operating plan.
      - Gross margin stays at the 75 percent target from A3.
      - Hiring follows the staged team ramp in BP team and milestones.
  upside:
    description: >-
      Channel referrals work early, cardholder bases mature faster, and
      analytics attaches to four issuers by late Y3.
    y3RevenueK: 1388.0
    y3EbitdaK: -612.0
    cashLowPointK: 470.0
    keyAssumptionChanges:
      - Average issuer actives reach 45k by late Y3 instead of A13 at 40k.
      - Analytics attaches to four issuers by Q4Y3 instead of A15 at two.
      - Sales cycle shortens by one quarter through processor and sponsor referrals.
sensitivity:
  - variable: ARPU
    downsideCase: >-
      Base monetization stays at the $1.89 per active-user-year floor with no
      extra analytics attach.
    baseCase: Base monetization matches A8 with two analytics expansions by Q4Y3.
    upsideCase: >-
      Cardholder density and analytics attach lift blended issuer ARPU above
      the base floor.
    y3RevenueImpactK: -180.0
    cashImpactK: -135.0
  - variable: CAC
    downsideCase: Direct sales dominate and blended CAC rises to about $85K per issuer.
    baseCase: CAC holds at A29, helped by founder-led sales and partner referrals.
    upsideCase: Channel partners pull CAC down toward $50K per issuer.
    y3RevenueImpactK: 0.0
    cashImpactK: -160.0
  - variable: churn
    downsideCase: >-
      Monthly logo churn rises to 2.0 percent as issuers test bundled
      alternatives.
    baseCase: Churn stays at A28 once integrations are live.
    upsideCase: Churn falls below 1.0 percent because the data layer becomes sticky.
    y3RevenueImpactK: -95.0
    cashImpactK: -90.0
  - variable: sales cycle
    downsideCase: Sponsor approvals add one extra quarter to pilot-to-production conversion.
    baseCase: Pilot timing follows A16 and BP milestones.
    upsideCase: Stack-partner intros compress conversion by one quarter.
    y3RevenueImpactK: -130.0
    cashImpactK: -155.0
  - variable: gross margin
    downsideCase: >-
      Reward servicing, support, and compliance keep gross margin near 68
      percent.
    baseCase: Gross margin hits the 75 percent target in A3.
    upsideCase: Automation and partner funding push gross margin near 80 percent.
    y3RevenueImpactK: 0.0
    cashImpactK: -78.0
  - variable: hiring pace
    downsideCase: Compliance and GTM hires pull forward by two quarters to unblock launches.
    baseCase: Hiring follows the staged ramp in the headcount table.
    upsideCase: Later hires wait for proof points and channel leverage.
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Issuers --> ActiveCardholders
      ActiveCardholders --> SubscriptionRevenue
      ActiveCardholders --> RedemptionVolume
      RedemptionVolume --> MarketplaceTake
      SubscriptionRevenue --> Revenue
      MarketplaceTake --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: The base case is driven by issuer count reaching 15 and each mature issuer growing toward 40k active cardholders on the $1.89 per-user revenue base.
  - checkName: Must go right
    finding: Processor and sponsor approvals must stay inside one-quarter pilot windows or the sales-cycle sensitivity quickly erodes the cash buffer.
  - checkName: Model breaks if
    finding: If analytics attach stays weak and issuer actives stall below 30k, the downside case turns cash negative before the seed milestone.
  - checkName: Next-round proof
    finding: A credible seed case is 6 production issuers, two paid analytics expansions, and one repeatable case-study-backed channel motion by late Y2.
sanityChecks:
  ruleOf40: >-
    Y3 growth 226.6% + EBITDA margin -78.1% = 148.5%; growth is strong, but
    quality is still weak because the model remains loss-making.
  burnMultiple: >-
    Y3 burn multiple 1.1x (-$856.6K EBITDA on $760.5K of net new revenue
    versus Y2).
  revenuePerFte: "$109.6K Y3 revenue per FTE versus a rough $200–400K SaaS benchmark."
  flags:
    - Base-case Y3 revenue per FTE is still well below typical venture SaaS efficiency, so analytics/CRM expansion must improve monetization after the first loyalty wedge.
    - The company remains EBITDA negative through Y3, which means the pre-seed must buy enough proof to support a seed round rather than self-fund to breakeven.
    - Revenue concentration is high because the model still depends on roughly 15 issuer logos; losing one large issuer would matter materially.
    - The Q4Y3 revenue exit requires existing issuers to grow active cardholders materially after launch, not just add logos.
