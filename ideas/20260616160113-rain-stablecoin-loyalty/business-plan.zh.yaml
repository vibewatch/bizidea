slug: onchain-card-loyalty-rails
date: '2026-06-16'
executiveSummary: >-
  独立稳定币卡发行商如今面临明显的用户留存问题，因为Rain公开展示了原生奖励带来的25%消费提升，同时将产品保留在自有技术栈中。本公司计划向不希望迁移至Rain、但仍需在一个预算周期内推出奖励应对方案的发行商，销售一套处理器中立的忠诚度叠加层。首个突破口为拥有10,000至50,000名活跃持卡人的拉美数字美元卡发行商，该地区对美元化的需求已经相当强劲，竞争对手推出奖励计划可迅速触发留存支出。初始产品应从结算后积分规则、账单抵扣或严格权限管控的钱包可见积分，以及队列分析入手，再逐步扩展为更广泛的商家资助型市场。这一排序是经过深思熟虑的，因为研究表明活动访问在技术上可行，但赞助商审批、奖励供应和法律架构才是真正的制约因素。最大的上行空间在于成为非Rain稳定币卡技术栈中的中立留存层；最大风险在于全栈发行商或处理器捆绑足够多的忠诚度功能，从而压缩第三方TAM。研究中的市场模型支持可实现的第三年SOM约为110万美元年收入，这一规模仅在分析、CRM和合作伙伴分发能随时间提升ARPU的前提下，才足以构成有价值的基础设施切入点。独立发行商中能够授予第三方Webhook访问权限的确切数量尚未得到验证，因此投资案例取决于早期发现和试点转化数据。
problem:
  - Rain以外的稳定币卡发行商在竞争对手推出奖励计划时极为脆弱，因为钱包首选行为快速转移，而许多发行商仍未运营任何奖励计划，或仅使用手动返现工作流。
  - 传统忠诚度供应商不适合链上结算和钱包流程，而自建方案可能需要12至18个月，同时仍给财务和合规团队留下责任、对账和审批复杂性问题。
solution:
  - 构建一套忠诚度叠加层，从现有卡技术栈获取处理器事件，应用结算后积分规则，无需发行商迁移至新发行平台即可上线。
  - 从封闭循环或严格权限管控的钱包可见奖励加账单抵扣兑换及消费提升分析入手，待供应和合规得到验证后再添加精选商家资助目录。
whyWeWin:
  - 切入点是为不愿接受Rain发行技术栈的发行商提供处理器中立的分发方式，使其获得类Rain的奖励能力。
  - 结算后奖励发放为财务和合规提供了比传统批量账本忠诚度更易审计的系统，同时保留了钱包原生用户体验。
  - 跨发行商基准数据、预构建处理器连接器和商家兑换关系可形成复合转换成本，这是通用忠诚度SaaS所缺乏的。
strategicChoices:
  beachhead: Rain以外在Marqeta、i2c或Galileo兼容技术栈上使用USDC或数字美元账户、拥有10,000至50,000名活跃持卡人、并因竞争对手推出奖励而面临明显流失压力的拉美稳定币借记卡发行商。
  wedgeRationale: 该细分市场痛点最为紧迫，区域稳定币需求最强，且拥有现有的事件驱动卡基础设施，因此能比同时跨多个司法管辖区和处理器类型销售广泛加密忠诚度平台更快产出付费留存案例研究。
  sequencingRationale: 先从事件摄取、财务安全奖励和发行商分析入手，因为这些是赢得试点所需的最低证明点；仅在事件访问、法律架构和消费提升得到验证后，才添加商家资助优惠和更广泛的CRM，因为奖励供应和合作伙伴审批才是真正的瓶颈。
  notYet:
    - 欧洲优先扩张——MiCA和支付服务复杂性将拖慢首个验证周期。
    - 在封闭循环和严格权限管控设计通过法律审查之前，不发行可自由转让的奖励代币。
    - 面向缺乏发行商主导企业交易预算和紧迫性的小型计划的消费者自助忠诚度工具。
market:
  tam: "在3至5年内，约1,200万可寻址活跃稳定币卡用户按每活跃用户约1.91美元/年的建模收入，估算年收入约2,290万美元。"
  sam: "在Rain以外、处理器兼容技术栈上的拉美和东南亚独立发行商约240万活跃用户，估算年收入约460万美元。"
  som: "第三年可实现案例为约15个发行商赢单、平均每家4万名活跃持卡人，估算年收入约110万美元。"
  segments:
    - 拉美地区拥有10,000至50,000名活跃持卡人的独立稳定币卡发行商
    - 在第三方发行商技术栈上推出稳定币支持卡的区域加密金融科技或钱包平台
  buyingProcess: VP产品或CTO通常主导试点和集成路径，但交易仅在CFO和合规团队确认奖励设计可审计、可负担且符合赞助商和卡计划约束后才能完成。
product:
  mvp: MVP是针对一个标杆发行商细分市场的忠诚度控制平面，包含Marqeta和一个第二处理器连接器、结算后积分规则、账单抵扣或严格权限管控的钱包可见奖励，以及将有奖励用户与对照组对比的队列分析。它不是完整的通用忠诚度套件；目标是在一个季度内证明上线速度、财务安全的奖励会计和消费提升。
  sixMonth: 在生产环境支持两个处理器连接器，推出三个付费试点，并上线发行商仪表板，涵盖积分规则、兑换控制及消费提升或流失队列报告。
  twelveMonth: 增加Galileo、拉美核心类别的精选商家资助优惠、赞助商审批操作手册，以及面向5至7个发行商的可重复生产推出流程。
  twentyFourMonth: 扩展为跨发行商留存和CRM层，提供基准分析、A/B测试，并通过现有发行商技术栈和赞助商渠道有选择性地进入东南亚市场。
  keyBets:
    - 非Rain发行商无需六个月赞助商升级即可授予第三方结算事件访问权限。
    - 买家在首次上线时接受封闭循环或严格权限管控的奖励，而非要求完全可转让代币。
    - 商家资助或合作伙伴资助的优惠能以足够快的速度补充发行商资助的账单抵扣，使目录具有吸引力。
    - 跨发行商分析能将ARPU提升至超出当前定价所隐含的基础忠诚度费用。
gtm:
  wedge: 向刚目睹竞争对手推出返现或忠诚度计划、需要在一个季度内无需切换处理器或发行技术栈即可推出留存功能的发行商，出售紧急留存改造方案。
  channels:
    - 创始人主导的向有明显上线或流失压力的拉美稳定币卡发行商和美元账户金融科技公司的外向拓展
    - 处理器、BIN赞助商和发行商技术栈合作伙伴推荐，这些合作伙伴已聚合多个卡计划
    - 面向准备新区域卡上线的钱包或加密金融科技平台的直接销售
  funnelTargets: 发行商线索→合格发现转化率40%+，发现→付费试点25–35%，试点→生产转化率60%+，生产→分析或市场扩展转化率50%+
  pricing: 基于使用量的定价，以每活跃持卡人每月0.02美元的现有假设为基准，加上通过市场处理的兑换额5%提成，以及非标准处理器工作的单独集成费用；此定价与买家预算逻辑相符，因为ROI驱动因素是消费提升和兑换使用量，而非席位数量。
businessModel:
  revenueStreams:
    - 活跃持卡人订阅收入
    - 自定义处理器或赞助商配置的集成费用
    - 市场兑换或商家资助优惠的收入分成
    - 初始生产上线后的分析和CRM扩展模块
  unitOfValue: 每月活跃奖励持卡人
  targetGrossMarginPct: 75
  expansionLevers:
    - 忠诚度证明存在后添加分析和实验模块
    - 提高商家资助兑换量以提升费率收入
    - 通过现有发行商技术栈合作伙伴从拉美扩展至东南亚
    - 通过忠诚度切入并扩展至更广泛的发行商留存工作流
strategyMap:
  northStarMetric: 奖励队列相对匹配对照组的增量卡消费
  inputMetrics:
    - 已获批准事件访问的合格发行商数量
    - 从签署试点到首次发放奖励的天数
    - 参与奖励的活跃持卡人占比
    - 奖励队列的90天消费提升
    - 试点到生产的转化率
    - 由商家或合作伙伴资助的奖励价值占比
  moatsToBuild:
    - 预构建处理器和赞助商批准的连接器库
    - 涵盖积分结构、兑换行为和消费提升的跨发行商基准数据集
    - 按发行商细分市场提供绩效历史的商家兑换关系
    - 封闭循环和钱包可见奖励结构的合规操作手册
  killCriteria:
    - 前10个合格目标发行商中少于3个能在6个月内授予可用事件访问权限
    - 前3个试点未能在90天内显示至少10%的消费提升或可衡量的流失降低
    - 商家资助或合作伙伴资助的奖励在12个月后仍低于奖励价值的20%，导致发行商经济效益不具吸引力
  mermaid: "flowchart LR\n  Wedge[拉美发行商留存改造] --> MVP[事件驱动忠诚度MVP]\n  MVP --> Proof[消费提升与上线速度证明]\n  Proof --> Expansion[分析CRM与区域扩张]"
investorMemo:
  verdict:
    call: 观察
    conviction: 强烈的痛点和可信的技术路径，但在Rain控制技术栈之外的发行商访问和试点经济效益得到验证之前，信心保持有限。
    whyBelieve: Rain的25%消费提升证明和有据可查的钱包首选竞争格局转变，为无法或不愿迁移技术栈的发行商创造了真实的买家问题。
    whyDoubt: 当前建模的SOM较为有限，如果Rain、处理器或发行商技术栈合作伙伴捆绑足够多的忠诚度功能以消除对中立供应商的需求，该类别可能迅速压缩。
    nextDiligence: 通过发现和试点LOI验证非Rain发行商能否在竞争对手优势复合之前批准第三方事件访问并为财务安全的留存产品付费。
  firstCustomer:
    title: Rain以外的拉美稳定币借记卡发行商
    profile: 拥有10,000至50,000名活跃持卡人、现有处理器基础设施，以及竞争对手推出奖励后可衡量的每月流量流失的区域数字美元卡计划。
    trigger: 竞争对手返现上线或新市场推出迫使发行商在当前季度内推出留存功能。
    buyer: CFO
    initialContract: 付费集成试点转为年度使用量定价；按现有定价假设，10,000至50,000名活跃持卡人意味着基础ARR约为2,400至12,000美元（不含兑换分成），因此长期合同必须增加市场和分析价值，而非仅依赖基础费用。
  mustBeTrue:
    - 至少一半的合格非Rain发行商能够在不经历繁琐赞助商升级的情况下提供第三方结算事件访问权限。
    - 前几个生产试点在90天内产生至少10%的消费提升或可衡量的流失改善。
    - 买家接受封闭循环或严格权限管控的钱包可见奖励作为足够的首个版本。
    - 商家或合作伙伴资助的兑换供应在第一年内达到有意义的奖励价值占比。
    - 分析和CRM追加销售能将每发行商收入提升至超出当前定价隐含的基础忠诚度费用。
  diligenceQuestions:
    - 今天有多少目标发行商能够暴露Webhook事件，谁必须批准访问？
    - 当奖励被定义为留存支出而非营销软件时，哪个预算负责人签署交易？
    - 产品能否以账单抵扣和封闭循环积分上线，还是优先买家坚持可转让代币奖励？
    - 一个令人信服的首日兑换目录需要哪些商家关系和经济条件？
    - Rain、i2c或其他技术栈所有者能以多快的速度通过捆绑类似功能来中和切入点？
operatingAssumptions:
  - assumption: 通过现有处理器或赞助商关系获取的第三方事件访问，对有意义比例的目标发行商是可用的。
    basis: research.yaml
    validationTest: 在发行商、处理器合作伙伴和BIN赞助商中进行10次发现访谈，并在90天内获得至少3个具有可用结算事件的试点环境。
    decisionImpact: 若为假，公司必须转向通过技术栈所有者销售，而非作为独立叠加层。
  - assumption: 封闭循环或严格权限管控的奖励在法律和商业上对初始上线是可接受的。
    basis: research.yaml
    validationTest: 完成司法管辖区特定法律备忘录，并进行五次买家访谈，确认愿意在没有可自由转让奖励的情况下上线。
    decisionImpact: 若为假，产品范围将扩展至更繁重的许可、托管或代币设计工作，上线序列将大幅放缓。
  - assumption: 留存紧迫性足够强，发行商会在内部构建之前选择购买。
    basis: idea.yaml
    validationTest: 在12次目标账户访谈中，至少6个发行商描述了决策周期不超过一个季度的实际流失或差异化问题。
    decisionImpact: 若为假，销售周期延长，创业公司应重新定位为上线使能或分析，而非紧急留存。
  - assumption: 商家资助或合作伙伴资助的优惠能在第一年内覆盖有意义比例的奖励经济效益。
    basis: research.yaml
    validationTest: 签署五份兑换合作伙伴LOI，并证明至少20%的试点奖励价值可在第12个月前由外部资助。
    decisionImpact: 若为假，产品仅作为账单抵扣加分析上线，ARPU将较长时间保持较低水平。
  - assumption: 忠诚度切入点可扩展至更高ARPU的分析或CRM产品。
    basis: operator judgment
    validationTest: 在前5个生产发行商上线后12个月内，将至少2个转化为付费分析或实验附加模块。
    decisionImpact: 若为假，公司将保持为狭窄的忠诚度叠加层，风险投资规模的上行空间有限。
experimentRoadmap:
  - horizon: 0–90天
    experiment: 与独立拉美发行商、处理器和BIN赞助商进行目标账户发现。
    hypothesis: 至少3个Rain以外的可上线发行商能授予事件访问权限并描述季度性留存需求。
    successMetric: 3个试点就绪账户和10次完成的发现访谈，附有文档化的审批路径。
    owner: CEO
  - horizon: 0–90天
    experiment: 针对前两个司法管辖区封闭循环和钱包可见奖励结构的法律设计冲刺。
    hypothesis: 不可转让或严格权限管控的设计可在不强制货币传输处理的情况下上线。
    successMetric: 2份法律备忘录支持MVP设计，试点结构无阻碍性许可要求。
    owner: 产品与合规负责人
  - horizon: 3–6个月
    experiment: 构建Marqeta和一个二级处理器连接器并推出首个付费试点。
    hypothesis: 结算后奖励发放和队列分析可在技术入驻30天内上线。
    successMetric: 沙盒批准后30天内发放首个奖励，首个试点开票。
    owner: 创始工程师
  - horizon: 3–6个月
    experiment: 使用窄范围账单抵扣和商家优惠目录进行兑换供应测试。
    hypothesis: 如果快速上线并展示清晰经济效益，买家将接受精选目录。
    successMetric: 5个签署的奖励合作伙伴或账单抵扣协议，至少30%的试点用户兑换参与率。
    owner: 合作伙伴负责人
  - horizon: 6–12个月
    experiment: 前三个试点的受控消费提升测量。
    hypothesis: 奖励队列可在90天内显示至少10%的消费提升或可衡量的流失改善。
    successMetric: 3个试点中的2个达到阈值并提供可发布的案例研究。
    owner: 数据负责人
  - horizon: 6–12个月
    experiment: 向生产发行商追加销售分析产品。
    hypothesis: 忠诚度计划上线后，发行商将为A/B测试和基准分析支付增量预算。
    successMetric: 前5个生产客户中的2个完成付费分析扩展。
    owner: CEO
operations:
  - 每个试点的赞助商和处理器审批工作流，包括事件访问、对账和卡计划控制
  - 将结算后发放与发行商财务报告挂钩的奖励负债和会计流程
  - 兑换目录质量、资金条款和结算的商家和账单抵扣运营
  - 上线后前90天的客户成功流程，包括上线、实验设计和队列报告
team:
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 负责处理器连接器、结算事件摄取、奖励账本逻辑和试点实施速度。
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 在集中型买家市场主导发行商发现、试点销售、合作伙伴谈判和首批赞助商关系。
  - role: 产品与合规负责人
    startTiming: 第 3 个月
    rationale: 将法律约束转化为奖励设计、审批操作手册和跨司法管辖区的上线要求。
  - role: 合作伙伴负责人
    startTiming: 第 6 个月
    rationale: 建立决定价值交付时间和利润率的兑换目录及处理器或赞助商渠道关系。
  - role: 数据负责人
    startTiming: 第 9 个月
    rationale: 将试点数据转化为消费提升证明、基准测试和提升ARPU的付费分析产品。
milestones:
  - horizon: 0–12个月
    items:
      - 获取3个具有文档化事件访问审批路径的试点就绪发行商
      - 在生产环境上线Marqeta和一个第二处理器连接器
      - 推出3个付费试点并发布至少1份消费提升案例研究
      - 在首批上线司法管辖区建立财务安全的封闭循环或严格权限管控奖励设计
  - horizon: 12–24个月
    items:
      - 达到5至7个生产发行商并添加Galileo支持
      - 在拉美核心类别推出精选商家资助目录
      - 将至少2个发行商转化为付费分析或实验附加模块
      - 通过现有发行商技术栈或赞助商合作伙伴进入东南亚
  - horizon: 24–36个月
    items:
      - 达到约15个发行商和60万活跃持卡人的建模规模
      - 运营跨发行商基准数据集，为定价、兑换组合和计划设计提供参考
      - 从忠诚度叠加层扩展为更广泛的发行商留存和CRM平台
risks:
  - risk: Rain或其他全栈发行商平台向第三方开放其奖励产品，中和处理器中立的切入点。
    likelihood: Medium
    impact: High
    mitigation: 通过非Rain处理器渠道早期获胜，建立独家或难以替代的合作伙伴关系，并在捆绑忠诚度成为标准之前向上迁移至分析层。
  - risk: 处理器、赞助商或发行商限制第三方事件访问，使部署速度慢于承诺的集成时间表。
    likelihood: High
    impact: High
    mitigation: 仅在审批路径明确的情况下对交易进行资质认定，提供赞助商友好的连接器模式，并在访问受阻时寻求渠道合作伙伴关系而非纯粹的叠加层销售。
  - risk: 监管机构或法律顾问拒绝可转让的链上奖励，实质性缩窄允许的产品设计空间。
    likelihood: Medium
    impact: High
    mitigation: 以封闭循环或严格权限管控的奖励上线，维护司法管辖区特定的法律意见，并将账单抵扣兑换作为备选方案保持可用。
  - risk: 商家资助的优惠供应到来过慢，导致发行商面对目录单薄和经济效益欠佳的问题。
    likelihood: Medium
    impact: Medium
    mitigation: 从账单抵扣和窄范围精选目录入手，用早期数据证明使用率，并利用这些数据谈判更好的合作伙伴条款。
  - risk: 独立发行商TAM对于独立忠诚度公司而言规模过小。
    likelihood: Medium
    impact: High
    mitigation: 将忠诚度作为切入产品，一旦试点数据支持追加销售，便尽快扩展至分析、CRM和相邻的发行商留存工作流。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18个月资金将供养一支小型团队，用于获取处理器和赞助商访问权限、构建两至三个生产连接器、推出首批付费试点、建立初始兑换目录，并验证忠诚度切入点能否扩展为更高ARPU的分析和CRM业务。
