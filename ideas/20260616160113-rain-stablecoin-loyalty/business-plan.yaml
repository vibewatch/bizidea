slug: onchain-card-loyalty-rails
date: '2026-06-16'
executiveSummary: >-
  Independent stablecoin card issuers now have a clear retention problem because
  Rain publicly showed a 25% spend lift from native rewards while keeping the
  product inside its own stack. The proposed company sells a processor-neutral
  loyalty overlay to issuers that do not want to migrate onto Rain but still
  need a rewards response inside one budget cycle. The first beachhead is LatAm
  digital-dollar card issuers with 10,000–50,000 active cardholders, where
  dollarization demand is already strong and a competitor rewards launch can
  trigger immediate retention spend. The initial product should start with
  post-settlement earn rules, statement credits or tightly permissioned
  wallet-visible points, and cohort analytics before expanding into a broader
  merchant-funded marketplace. This sequencing is deliberate because research
  says event access is technically feasible, but sponsor approvals, reward
  supply, and legal structure are the real gating factors. The biggest upside is
  becoming the neutral retention layer across non-Rain stablecoin card stacks;
  the biggest risk is that full-stack issuers or processors bundle enough
  loyalty functionality to compress third-party TAM. The market model in the
  research supports a reachable Y3 SOM of about $1.1M annual revenue, which is
  large enough for a valuable infrastructure wedge only if analytics, CRM, and
  partner distribution expand ARPU over time. Exact counts of independent
  issuers that can grant third-party webhook access are still unproven, so the
  investment case depends on early discovery and pilot conversion data.
problem:
  - Stablecoin card issuers outside Rain are exposed when a competing card launches rewards, because top-of-wallet behavior shifts quickly and many issuers still run no program or a manual cashback workflow.
  - Legacy loyalty vendors do not fit onchain settlement and wallet flows, while an in-house build can take 12–18 months and still leave finance and compliance with liability, reconciliation, and approval complexity.
solution:
  - Build a loyalty overlay that consumes processor events from existing card stacks, applies post-settlement earn rules, and launches without requiring issuer migration to a new issuing platform.
  - Start with closed-loop or tightly permissioned wallet-visible rewards plus statement-credit redemption and spend-lift analytics, then add a curated merchant-funded catalog once supply and compliance are proven.
whyWeWin:
  - The wedge is processor-neutral distribution to issuers that want Rain-like rewards without accepting Rain's issuing stack.
  - Post-settlement reward issuance gives finance and compliance a more auditable system than legacy batch-ledger loyalty while preserving wallet-native user experience.
  - Cross-issuer benchmark data, prebuilt processor connectors, and merchant redemption relationships can compound into switching costs that generic loyalty SaaS lacks.
strategicChoices:
  beachhead: LatAm stablecoin debit issuers outside Rain using USDC or digital-dollar accounts, with 10,000–50,000 active cardholders on Marqeta-, i2c-, or Galileo-compatible stacks and visible churn pressure from competitor rewards launches.
  wedgeRationale: This slice has the clearest urgent pain, the strongest regional stablecoin demand, and existing event-driven card infrastructure, so it can produce a paid retention case study faster than selling a broad crypto loyalty platform across multiple jurisdictions and processor types at once.
  sequencingRationale: Start with event ingestion, finance-safe rewards, and issuer analytics because those are the minimum proof points needed to win a pilot; add merchant-funded offers and broader CRM only after event access, legal structure, and spend-lift are validated, since reward supply and partner approvals are the actual bottlenecks.
  notYet:
    - Europe-first expansion where MiCA and payment-services complexity would slow the first proof cycle.
    - Freely transferable reward tokens before closed-loop and tightly permissioned designs pass legal review.
    - Consumer self-serve loyalty tools for small programs that lack the budget and urgency of issuer-led enterprise deals.
market:
  tam: "Estimated at $22.9M annual revenue over a 3–5 year horizon from roughly 12M addressable active stablecoin-card users at modeled revenue of about $1.91 per active user per year."
  sam: "Estimated at $4.6M annual revenue from about 2.4M active users across independent LatAm and SE Asia issuers outside Rain on processor-compatible stacks."
  som: "Reachable Y3 case is about $1.1M annual revenue from 15 issuer wins averaging 40,000 active cardholders each."
  segments:
    - Independent stablecoin card issuers in LatAm with 10,000–50,000 active cardholders
    - Regional crypto fintech or wallet platforms launching stablecoin-backed cards on third-party issuer stacks
  buyingProcess: VP Product or CTO usually owns the pilot and integration path, but deals close only after CFO and compliance confirm the reward design is auditable, affordable, and acceptable within sponsor and card-program constraints.
product:
  mvp: The MVP is a loyalty control plane for one beachhead issuer segment with Marqeta and one second processor connector, post-settlement earn rules, statement-credit or tightly permissioned wallet-visible rewards, and cohort analytics that compare rewarded users against a control group. It is intentionally not a full generic loyalty suite; the goal is to prove launch speed, finance-safe reward accounting, and spend-lift inside one quarter.
  sixMonth: Support two processor connectors in production, launch three paid pilots, and ship issuer dashboards for earn rules, redemption controls, and spend-lift or churn cohort reporting.
  twelveMonth: Add Galileo, curated merchant-funded offers for core LatAm categories, sponsor approval playbooks, and a repeatable production rollout motion for 5–7 issuers.
  twentyFourMonth: Expand into a cross-issuer retention and CRM layer with benchmark analytics, A/B testing, and selective SE Asia expansion through existing issuer-stack and sponsor channels.
  keyBets:
    - Non-Rain issuers can grant third-party settlement-event access without six-month sponsor escalation.
    - Buyers will accept closed-loop or tightly permissioned rewards for the first launch instead of demanding fully transferable tokens.
    - Merchant-funded or partner-funded offers can supplement issuer-funded statement credits fast enough to make the catalog compelling.
    - Cross-issuer analytics can raise ARPU beyond the base loyalty fee implied by current pricing.
gtm:
  wedge: Sell an emergency retention retrofit to issuers that just saw a competitor launch cashback or loyalty and need a response inside one quarter without switching processor or issuing stack.
  channels:
    - Founder-led outbound to LatAm stablecoin card issuers and dollar-account fintechs with visible launch or churn pressure
    - Processor, BIN sponsor, and issuer-stack partner referrals where partners already aggregate multiple card programs
    - Direct sales into wallet or crypto-fintech platforms preparing a new regional card launch
  funnelTargets: issuer lead→qualified discovery 40%+, discovery→paid pilot 25–35%, pilot→production 60%+, production→analytics or marketplace expansion 50%+
  pricing: Usage-based pricing anchored to the existing hypothesis of $0.02 per active cardholder per month plus a 5% take on redemptions processed through the marketplace, with a separate integration fee for non-standard processor work; this matches the buyer's budget logic because spend lift and redemption usage, not seat count, drive ROI.
businessModel:
  revenueStreams:
    - Active-cardholder subscription revenue
    - Integration fees for custom processor or sponsor configurations
    - Revenue share on marketplace redemptions or merchant-funded offers
    - Analytics and CRM expansion modules after initial production launch
  unitOfValue: active rewarded cardholder per month
  targetGrossMarginPct: 75
  expansionLevers:
    - Add analytics and experimentation modules once loyalty proof exists
    - Increase merchant-funded redemption volume to lift take-rate revenue
    - Expand from LatAm into SE Asia through existing issuer-stack partners
    - Land through loyalty and grow into broader issuer retention workflows
strategyMap:
  northStarMetric: incremental rewarded-cohort card spend versus matched control
  inputMetrics:
    - Qualified issuers with approved event access
    - Days from signed pilot to first reward issued
    - Share of active cardholders enrolled in rewards
    - 90-day spend lift for rewarded cohorts
    - Pilot-to-production conversion rate
    - Share of reward value funded by merchants or partners
  moatsToBuild:
    - Prebuilt processor and sponsor-approved connector library
    - Cross-issuer benchmark dataset on earn structures, redemption behavior, and spend lift
    - Merchant redemption relationships with performance history by issuer segment
    - Compliance playbooks for closed-loop and wallet-visible reward structures
  killCriteria:
    - Fewer than 3 of the first 10 qualified target issuers can grant usable event access within 6 months
    - The first 3 pilots fail to show at least 10% spend lift or measurable churn reduction within 90 days
    - Merchant-funded or partner-funded rewards remain below 20% of reward value after 12 months, leaving issuer economics unattractive
  mermaid: |
    flowchart LR
      Wedge[LatAm issuer retention retrofit] --> MVP[Event-driven loyalty MVP]
      MVP --> Proof[Spend-lift and launch-speed proof]
      Proof --> Expansion[Analytics CRM and regional expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong pain and credible technical path, but conviction stays limited until issuer access and pilot economics are proven outside Rain-controlled stacks.
    whyBelieve: Rain's 25% spend-lift proof and the documented shift to top-of-wallet competition create a real buyer problem for issuers that cannot or will not migrate stacks.
    whyDoubt: Current modeled SOM is modest and the category can compress quickly if Rain, processors, or issuer-stack partners bundle enough loyalty to remove the need for a neutral vendor.
    nextDiligence: Verify through discovery and pilot LOIs that non-Rain issuers can approve third-party event access and pay for a finance-safe retention product before a competitor's advantage compounds.
  firstCustomer:
    title: LatAm stablecoin debit issuer outside Rain
    profile: A regional digital-dollar card program with 10,000–50,000 active cardholders, existing processor infrastructure, and measurable monthly volume leakage after a competitor introduces rewards.
    trigger: A rival cashback launch or a new market rollout forces the issuer to ship a retention feature in the current quarter.
    buyer: CFO
    initialContract: Paid integration pilot that converts to annual usage pricing; at the idea-stage pricing hypothesis, 10,000–50,000 active cardholders imply roughly $2.4k–$12k base ARR before redemption share, so the long-term contract must add marketplace and analytics value rather than rely on the base fee alone.
  mustBeTrue:
    - At least half of qualified non-Rain issuers can provide third-party settlement-event access without prohibitive sponsor escalation.
    - The first production pilots produce at least 10% spend lift or measurable churn improvement within 90 days.
    - Buyers accept closed-loop or tightly permissioned wallet-visible rewards as a sufficient first release.
    - Merchant or partner-funded redemption supply reaches a meaningful share of reward value within the first year.
    - Analytics and CRM upsell can raise revenue per issuer above the base loyalty fee implied by current pricing.
  diligenceQuestions:
    - How many target issuers can expose webhook events today, and who must approve access?
    - What budget owner signs the deal when rewards are framed as retention spend rather than marketing software?
    - Can the product launch with statement credits and closed-loop points, or do priority buyers insist on transferable token rewards?
    - What does a compelling day-one redemption catalog require in merchant relationships and economics?
    - How quickly could Rain, i2c, or another stack owner neutralize the wedge by bundling similar functionality?
operatingAssumptions:
  - assumption: Third-party event access through existing processor or sponsor relationships is available for a meaningful share of target issuers.
    basis: research.yaml
    validationTest: Run 10 discovery calls across issuers, processor partners, and BIN sponsors and secure at least 3 pilot environments with usable settlement events inside 90 days.
    decisionImpact: If false, the company must shift toward selling through stack owners instead of as an independent overlay.
  - assumption: Closed-loop or tightly permissioned rewards are legally and commercially acceptable for initial launches.
    basis: research.yaml
    validationTest: Complete jurisdiction-specific legal memos and five buyer interviews that confirm willingness to launch without freely transferable rewards.
    decisionImpact: If false, product scope expands into heavier licensing, custody, or token-design work and the launch sequence slows materially.
  - assumption: Retention urgency is strong enough that issuers will buy before building internally.
    basis: idea.yaml
    validationTest: In 12 target-account interviews, at least 6 issuers describe a live churn or differentiation problem with a decision timeline under one quarter.
    decisionImpact: If false, sales cycles lengthen and the startup should reposition toward launch enablement or analytics rather than emergency retention.
  - assumption: Merchant-funded or partner-funded offers can cover a meaningful portion of reward economics within the first year.
    basis: research.yaml
    validationTest: Sign five redemption-partner LOIs and show that at least 20% of pilot reward value can be externally funded by month 12.
    decisionImpact: If false, the product launches as statement-credit plus analytics only and ARPU stays lower for longer.
  - assumption: The loyalty wedge can expand into higher-ARPU analytics or CRM products.
    basis: operator judgment
    validationTest: Convert at least 2 of the first 5 production issuers onto a paid analytics or experimentation add-on within 12 months of go-live.
    decisionImpact: If false, the company remains a narrow loyalty overlay with limited venture-scale upside.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Target-account discovery with independent LatAm issuers, processors, and BIN sponsors.
    hypothesis: At least 3 launchable issuers outside Rain can grant event access and describe a quarter-bound retention need.
    successMetric: 3 pilot-ready accounts and 10 completed discovery calls with documented approval paths.
    owner: CEO
  - horizon: 0–90 days
    experiment: Legal design sprint for closed-loop and wallet-visible reward structures in the first two jurisdictions.
    hypothesis: A non-transferable or tightly permissioned design can launch without forcing money-transmission treatment.
    successMetric: 2 legal memos that support the MVP design with no blocking licensing requirement for the pilot structure.
    owner: Product and compliance lead
  - horizon: 3–6 months
    experiment: Build Marqeta and one secondary processor connector and launch the first paid pilot.
    hypothesis: Post-settlement reward issuance and cohort analytics can go live in under 30 days of technical onboarding.
    successMetric: First reward issued within 30 days of sandbox approval and first pilot invoiced.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Redemption-supply test with a narrow statement-credit and merchant-offer catalog.
    hypothesis: Buyers will accept a curated catalog if it launches quickly and shows clear economics.
    successMetric: 5 signed reward partners or statement-credit agreements and at least 30% pilot-user redemption participation.
    owner: Partnerships lead
  - horizon: 6–12 months
    experiment: Controlled spend-lift measurement across the first three pilots.
    hypothesis: Rewarded cohorts can show at least 10% spend lift or measurable churn improvement within 90 days.
    successMetric: 2 of 3 pilots hit the threshold and provide a publishable case study.
    owner: Data lead
  - horizon: 6–12 months
    experiment: Analytics upsell to production issuers.
    hypothesis: Issuers will pay incremental budget for A/B testing and benchmark analytics once the loyalty program is live.
    successMetric: 2 paid analytics expansions from the first 5 production customers.
    owner: CEO
operations:
  - Sponsor and processor approval workflow for each pilot, including event access, reconciliation, and card-program controls
  - Reward liability and accounting process that ties post-settlement issuance to issuer finance reporting
  - Merchant and statement-credit operations for redemption catalog quality, funding terms, and settlement
  - Customer success process for launch, experiment design, and cohort reporting during the first 90 days after go-live
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Own processor connectors, settlement-event ingestion, reward ledger logic, and pilot implementation speed.
  - role: CEO
    startTiming: Month 0
    rationale: Lead issuer discovery, pilot sales, partner negotiations, and the first sponsor relationships in a concentrated buyer market.
  - role: Product and compliance lead
    startTiming: Month 3
    rationale: Translate legal constraints into reward design, approval playbooks, and launch requirements across jurisdictions.
  - role: Partnerships lead
    startTiming: Month 6
    rationale: Build the redemption catalog and processor or sponsor channel relationships that determine time-to-value and margin.
  - role: Data lead
    startTiming: Month 9
    rationale: Turn pilot data into spend-lift proof, benchmarking, and paid analytics products that raise ARPU.
milestones:
  - horizon: 0–12 months
    items:
      - Secure 3 pilot-ready issuers with documented event-access approval paths
      - Launch Marqeta and one second processor connector in production
      - Put 3 paid pilots live and publish at least 1 spend-lift case study
      - Establish a finance-safe closed-loop or tightly permissioned reward design in the first launch jurisdictions
  - horizon: 12–24 months
    items:
      - Reach 5–7 production issuers and add Galileo support
      - Launch a curated merchant-funded catalog in core LatAm categories
      - Convert at least 2 issuers onto paid analytics or experimentation add-ons
      - Enter SE Asia through an existing issuer-stack or sponsor partner
  - horizon: 24–36 months
    items:
      - Reach the modeled footprint of about 15 issuers and 0.6M active cardholders
      - Operate a cross-issuer benchmark dataset that informs pricing, redemption mix, and program design
      - Expand from loyalty overlay into a broader issuer retention and CRM platform
risks:
  - risk: Rain or another full-stack issuer platform opens its rewards product to third parties and neutralizes the processor-neutral wedge.
    likelihood: Medium
    impact: High
    mitigation: Win early through non-Rain processor channels, build exclusive or hard-to-replace partner relationships, and move up the stack into analytics before bundled loyalty becomes standard.
  - risk: Processors, sponsors, or issuers restrict third-party event access and make deployment slower than the promised integration timeline.
    likelihood: High
    impact: High
    mitigation: Qualify deals only where approval paths are explicit, ship sponsor-friendly connector patterns, and pursue channel partnerships instead of pure overlay sales where access is blocked.
  - risk: Regulators or counsel reject transferable onchain rewards and materially narrow allowable product design.
    likelihood: Medium
    impact: High
    mitigation: Launch with closed-loop or tightly permissioned rewards, maintain jurisdiction-specific legal opinions, and keep statement-credit redemption available as a fallback.
  - risk: Merchant-funded offer supply arrives too slowly, leaving issuers with a thin catalog and weak economics.
    likelihood: Medium
    impact: Medium
    mitigation: Start with statement credits and a narrow curated catalog, prove usage with early data, and use that data to negotiate better partner terms.
  - risk: Independent issuer TAM remains too small for a standalone loyalty company.
    likelihood: Medium
    impact: High
    mitigation: Treat loyalty as the land product and expand into analytics, CRM, and adjacent issuer-retention workflows as soon as pilot data supports upsell.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds a small team to secure processor and sponsor access, build two to three production connectors, launch the first paid pilots, stand up the initial redemption catalog, and prove whether the loyalty wedge can expand into a higher-ARPU analytics and CRM business.
