differentiator: >-
  和 Rain Rewards 不同，这个平台不绑定发卡方，也不绑定公链——通过标准 webhook 就能接进任何主流卡处理器，
  不要求迁到 Rain 的发卡技术栈上。和 Loyalty One、Braze 这类旧式忠诚度厂商不同，它的架构天生就是链上原生：
  最终确认后才铸造的 ERC-20 积分，没有沉淀负债风险，审计也能全程打通，这是传统批处理账本系统做不到的。
  再加上预建好的商户兑换市场，发卡方一上线拿到的就是完整忠诚度目录，而不是一套空积分账本，
  把价值落地时间从 12 个月压到 30 天以内。
conceptDiagram:
  title: 链上卡忠诚度基础轨道
  mermaid: |
    flowchart LR
      Issuer[稳定币发卡方] --> API[忠诚度 API Webhook]
      API --> Processor[Marqeta / i2c 处理器]
      Processor --> Mint[链上积分铸造]
      Mint --> Wallet[持卡人钱包]
      Wallet --> Redeem[商户兑换网络]
      Redeem --> Lift[25% 消费提升]
