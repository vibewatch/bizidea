jobsToBeDone:
  - job: "当竞争对手上线奖励、我们的流失开始上升时，帮发卡项目团队快速补上忠诚度，这样我们就能在一个季度内追平竞争对手，而不用做一轮持续数月的内部开发。"
    currentAlternative: 手工维护一张链下返现表格，或者启动一个为期 12 个月的内部工程项目
    successMetric: 忠诚度项目上线后 90 天内，月活持卡人的消费额提升 25% 或更多
  - job: "当审计机构审查我们的忠诚度负债时，帮 CFO 拿出干净的链上会计记录，这样我们通过审计时，就不用把未兑换积分重新列成递延收入负债。"
    currentAlternative: 传统积分账本，存在递延收入负债敞口
    successMetric: 季度审计里，链上忠诚度积分出现 0 条沉淀负债相关问题
  - job: "当我们想提高奖励 ROI 时，帮产品团队对忠诚度优惠做 A/B 测试，这样就能在不占用工程周期的前提下，把消费提升继续往上拉。"
    currentAlternative: 没有实验能力；对所有持卡人统一套用固定返现比例
    successMetric: 在一个 60 天实验周期内识别出具备统计显著性的消费提升改进
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 一手新闻稿、PYMNTS 报道和 Forbes 当天采访三类已抓取来源，证据很强；25% 的消费提升也是公开、具名的数据点，绑定了具体产品和具体客户群。
  painIntensity:
    score: 4
    rationale: 在 Rain 的专有技术栈之外，稳定币发卡方确实会因为同行上线奖励而流失用户，而市场上又没有现成的链上忠诚度供应商；Rain 自己下场，本身就说明痛点真实存在。
  wedgeClarity:
    score: 4
    rationale: 切入口定义得非常具体——一套通过 webhook 接入 Marqeta 和 i2c 的忠诚度 API，目标客户是 Rain 平台之外的发卡方，承诺 30 天接入，并自带预建兑换目录。
  defensibility:
    score: 3
    rationale: 预建商户兑换网络和深度处理器集成确实会形成切换成本，但 Rain 也可能把平台向非合作伙伴开放，而且它已经凭 100+ 个上线项目占住了市场头部。
  ventureScale:
    score: 3
    rationale: 独立稳定币发卡方这个细分赛道在新兴市场增长很快，但当下体量还不大；能不能跑出规模，取决于未来 3–5 年稳定币卡的整体渗透是否继续加速。
topRisks:
  - name: Rain 平台横向扩张
    description: Rain 把 Rewards 从自家发卡技术栈向外扩成横向 SaaS，卖给栈外的卡项目，直接变成一个资金和资源都更充足的竞争对手——它手里已经有 100+ 个客户和现成商户网络。
    mitigation: "在 Rain 复制之前，先和最大的两家非 Rain 处理器做深度排他集成，再签下排他商户兑换合作；对独立发卡方重点打价值落地速度和处理器中立性。"
  - name: 监管将代币重新定性
    description: 监管机构把链上忠诚度代币认定为需要牌照的数字资产或证券，要求发卡方和忠诚度平台都去拿 money-transmitter 或 broker-dealer 牌照才能运营。
    mitigation: 把代币设计成不可转让、不可交易、只能在封闭商户网络内兑换的奖励，尽量对齐航空里程和主流信用卡积分项目已经形成的监管处理方式。
  - name: TAM 集中风险
    description: 稳定币卡市场最终集中到两三家头部平台，独立发卡方的长尾规模太小，撑不起一家独立忠诚度供应商的长期生意。
    mitigation: 在市场集中彻底关窗之前，尽快把平台往上延伸，服务想做链上持卡人和存款人留存的加密新银行与 DeFi 协议，降低对纯稳定币发卡方的依赖。
