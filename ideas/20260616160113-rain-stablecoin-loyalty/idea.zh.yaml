problem: >-
  稳定币发卡方在支付轨道上赢了，却在留存上掉队。传统忠诚度厂商是围着旧式银行卡基础设施搭的，
  接不住链上结算最终性和代币化资产。自己做，往往要花 12–18 个月，还得有多数发卡团队并不具备的区块链能力。
  Rain 已经证明，原生链上忠诚度能把持卡人消费额拉高 25%；但真正受益的只有 Rain 平台上那 100+ 个合作项目——
  外面还有数百个独立稳定币卡项目，既没有同等级的留存层，也买不到中立供应商提供的方案。
targetUser:
  primary: "Rain 平台之外的稳定币发卡方 CTO 和产品副总裁，活跃持卡人规模在 5,000–100,000 之间，正因为同业上线奖励项目而出现流失"
  secondary: 为终端用户打包稳定币卡项目的加密金融科技平台
  buyer: "稳定币发卡方的 CFO 或产品副总裁；当竞争对手上线返现或奖励项目后，他们已经看到可量化的持卡人流失"
startupThesis:
  nonObviousInsight: >-
    链上结算最终性让忠诚度架构天生优于任何旧体系供应商能复制出来的方案：积分只在交易确认后铸造，
    因而没有沉淀负债风险，审计链路完整，也能直接接入链上钱包。传统忠诚度厂商靠的是为银行优化的递延收入批处理账本，
    想低成本补上这个特性几乎不可能。这个架构断层，恰好给独立第三方留下了一块全新的空白层——现有厂商不重建核心技术栈，就进不来。
  beachhead: "拉美使用 USDC 做本地美元化的稳定币借记卡发卡方，活跃持卡人 10,000–50,000，竞争对手上线奖励后带来 30–40% 的月度流失"
  wedge: >-
    一套忠诚度 API，在交易最终确认时铸造 ERC-20 积分，通过 webhook 接进任何 Marqeta 或 i2c 的卡处理器技术栈，
    30 天内就能上线，而且发卡方现有的卡基础设施一行都不用改。
  whyNowCatalyst: >-
    Rain 公开 beta 的 25% 消费提升，正是市场一直在等的验证点——它一边证明链上卡忠诚度确实有效，
    一边也宣告：对所有不在 Rain 平台上的发卡方来说，争夺“首选支付位”的留存战已经开打。
  ventureScalePath: >-
    先从拉美和东南亚独立稳定币发卡方的忠诚度基础轨道切入，再往上扩成完整的持卡人 CRM 与消费分析平台，
    最后演进成链上支付经济的通用留存层——也就是加密原生卡技术栈里的 Loyalty One，护城河则是全球发卡网络。
solution: >-
  这是一个链上忠诚度即服务平台，对外只暴露一个 webhook API。稳定币发卡方在 30 天内，
  就能把它接进现有卡处理器（Marqeta、i2c、Galileo）。每笔交易一旦最终确认，平台就会把 ERC-20 忠诚度代币
  直接铸到持卡人的链上钱包里，从根上消掉沉淀负债风险。平台还自带一个商户兑换市场，覆盖返现、稳定币充值和旅行奖励，
  发卡方第一天上线就有完整目录，不会只拿到一套空积分账本。实时分析看板会把消费提升分群、流失曲线和 A/B 测试结果直接拉出来，
  产品团队不用占用工程资源，也能持续优化忠诚度机制。整个过程中，发卡方核心卡技术栈完全不用改。
