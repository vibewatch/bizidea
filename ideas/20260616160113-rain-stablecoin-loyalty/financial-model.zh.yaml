scenarios:
  downside:
    description: >-
      处理商审批延误且分析模块追加销售落地较晚，导致 Y3 末约有 12 家发卡机构，
      市场平台交易量也较弱。
    y3RevenueK: 812.0
    y3EbitdaK: -1084.0
    cashLowPointK: -140.0
    keyAssumptionChanges:
      - 生产转化比 A16 慢一至两个季度。
      - 发卡机构平均活跃用户数停滞在更接近 30k 而非 A13 的 40k。
      - 分析模块采用在整个 Y3 期间仅停留在 1 家发卡机构。
  base:
    description: >-
      基准情景遵循里程碑路径：Y1 内 3 家试点，Q4Y2 前 6 家生产发卡机构，
      Q4Y3 前 15 家付费发卡机构。
    y3RevenueK: 1096.2
    y3EbitdaK: -856.6
    cashLowPointK: 200.5
    keyAssumptionChanges:
      - 假设 A8 至 A16 与运营计划保持一致。
      - 毛利率维持在 A3 设定的 75% 目标。
      - 招聘遵循 BP 团队与里程碑中的阶段性团队扩张计划。
  upside:
    description: >-
      渠道转介早期生效，持卡人基数成熟更快，分析模块在 Y3 末附加至 4 家发卡机构。
    y3RevenueK: 1388.0
    y3EbitdaK: -612.0
    cashLowPointK: 470.0
    keyAssumptionChanges:
      - Y3 末发卡机构平均活跃用户数达到 45k，而非 A13 的 40k。
      - Q4Y3 前分析模块附加至 4 家发卡机构，而非 A15 的 2 家。
      - 通过处理商和发起行的转介，销售周期缩短一个季度。
sensitivity:
  - variable: ARPU
    downsideCase: >-
      基础货币化维持在 $1.89/活跃用户/年 的底线，无额外分析模块附加。
    baseCase: 基础货币化与 A8 一致，Q4Y3 前完成 2 次分析扩展。
    upsideCase: >-
      持卡人密度与分析模块附加将综合发卡机构 ARPU 拉升至基准底线之上。
    y3RevenueImpactK: -180.0
    cashImpactK: -135.0
  - variable: CAC
    downsideCase: 直销为主，综合 CAC 上升至约 $85K/发卡机构。
    baseCase: CAC 维持在 A29 水平，得益于创始人主导销售和合作伙伴转介。
    upsideCase: 渠道合作伙伴将 CAC 压低至约 $50K/发卡机构。
    y3RevenueImpactK: 0.0
    cashImpactK: -160.0
  - variable: 客户流失率
    downsideCase: >-
      随着发卡机构测试捆绑替代方案，月度客户流失率上升至 2.0%。
    baseCase: 集成上线后，流失率维持在 A28 水平。
    upsideCase: 由于数据层的强粘性，流失率降至 1.0% 以下。
    y3RevenueImpactK: -95.0
    cashImpactK: -90.0
  - variable: 销售周期
    downsideCase: 发起行审批使试点转生产周期额外延长一个季度。
    baseCase: 试点节奏遵循 A16 和 BP 里程碑。
    upsideCase: 技术栈合作伙伴介绍将转化周期压缩一个季度。
    y3RevenueImpactK: -130.0
    cashImpactK: -155.0
  - variable: 毛利率
    downsideCase: >-
      奖励服务、支持及合规成本使毛利率维持在约 68%。
    baseCase: 毛利率达到 A3 设定的 75% 目标。
    upsideCase: 自动化和合作伙伴资金支持将毛利率推升至约 80%。
    y3RevenueImpactK: 0.0
    cashImpactK: -78.0
  - variable: 招聘节奏
    downsideCase: 合规与 GTM 招聘提前两个季度以解除上线阻碍。
    baseCase: 招聘遵循人员编制表中的阶段性爬坡计划。
    upsideCase: 后续招聘等待验证节点与渠道杠杆效果。
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
modelDiagram:
  title: 单位经济学流程
  mermaid: |
    flowchart LR
      Issuers[发卡机构] --> ActiveCardholders[活跃持卡人]
      ActiveCardholders[活跃持卡人] --> SubscriptionRevenue[订阅收入]
      ActiveCardholders[活跃持卡人] --> RedemptionVolume[兑换量]
      RedemptionVolume[兑换量] --> MarketplaceTake[市场平台抽成]
      SubscriptionRevenue[订阅收入] --> Revenue[总收入]
      MarketplaceTake[市场平台抽成] --> Revenue[总收入]
      Revenue[总收入] --> GrossProfit[毛利润]
      GrossProfit[毛利润] --> Cash[现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景由发卡机构数量达到 15 家驱动，每家成熟发卡机构以 $1.89/用户收入基础向 40k 活跃持卡人增长。
  - checkName: 关键成功要素
    finding: 处理商和发起行的审批必须控制在一个季度的试点窗口内，否则销售周期敏感性将迅速消耗现金缓冲。
  - checkName: 模型崩溃条件
    finding: 若分析模块附加持续疲弱且发卡机构活跃用户停滞在 30k 以下，悲观情景将在种子轮里程碑前出现现金为负。
  - checkName: 下轮融资证明
    finding: 可信的种子轮条件为：Y2 末实现 6 家生产发卡机构、2 次付费分析扩展，以及 1 个有案例支持的可复制渠道动作。
sanityChecks:
  ruleOf40: >-
    Y3 增长率 226.6% + EBITDA 利润率 -78.1% = 148.5%；增长强劲，但质量仍弱，
    因为模型仍处于亏损状态。
  burnMultiple: >-
    Y3 烧钱倍数 1.1x（相较 Y2 净增收入 $760.5K，EBITDA 亏损 $856.6K）。
  revenuePerFte: "Y3 每 FTE 收入 $109.6K，低于 SaaS 行业约 $200–400K 的参考基准。"
  flags:
    - 基准情景下 Y3 每 FTE 收入仍远低于典型风险投资 SaaS 效率标准，因此在首个忠诚度业务楔入后，分析/CRM 扩展必须提升货币化水平。
    - 公司在整个 Y3 期间 EBITDA 仍为负，这意味着种子前融资必须获取足够的验证以支撑种子轮，而非自我造血至盈亏平衡。
    - 收入集中度较高，因为模型仍依赖约 15 家发卡机构；失去任何一家大型发卡机构都会产生实质性影响。
    - Q4Y3 收入退出要求现有发卡机构在上线后实质性增长活跃持卡人数，而非仅仅增加客户数量。
