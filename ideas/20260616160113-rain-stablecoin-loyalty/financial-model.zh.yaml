slug: onchain-card-loyalty-rails
date: '2026-06-16'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-07'
    unit: 月份
    source: "[阶段运行日期 2026-06-16；模型从下一个月开始]"
  - id: A2
    name: 种子前融资到账后的初始现金
    value: '2900'
    unit: USDK
    source: "[BP fundingAsk 目标 $2–4M；基准情景使用 $2.9M 种子前融资作为初始现金]"
  - id: A3
    name: 目标毛利率
    value: '75'
    unit: 百分比
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A4
    name: 订阅价格
    value: '0.02'
    unit: USD/活跃持卡人/月
    source: "[BP gtm.pricing]"
  - id: A5
    name: 每位活跃持卡人年均消费代理值
    value: '3300'
    unit: USD/用户/年
    source: "[Research bottomUpSizingDrivers 年均用户消费代理值]"
  - id: A6
    name: 奖励池占消费比例
    value: '1.0'
    unit: 占卡片消费百分比
    source: "[Research market.tam 依据及 bottomUpSizingDrivers]"
  - id: A7
    name: 市场平台抽成比例
    value: '5'
    unit: 占奖励价值百分比
    source: "[BP gtm.pricing；Research bottomUpSizingDrivers 建模抽成]"
  - id: A8
    name: 每位活跃持卡人基础年均收入
    value: '1.89'
    unit: USD/用户/年
    source: "[由 A4+A5+A6+A7 计算得出；与 Research 建模约 $1.91/用户/年 一致]"
  - id: A9
    name: 付费试点集成费
    value: '15'
    unit: USDK/新发卡机构
    source: "[BP businessModel 集成费收入流；启发式：企业金融科技试点实施费]"
  - id: A10
    name: 付费试点月平台服务费
    value: '1.5'
    unit: USDK/发卡机构/月
    source: "[BP investorMemo initialContract；启发式：生产用量规模化前的低摩擦付费试点费]"
  - id: A11
    name: 第一年生产发卡机构活跃持卡人数
    value: '15000'
    unit: 活跃持卡人/发卡机构
    source: "[BP 滩头细分市场 10k–50k 活跃用户；早期生产低于中位数启动]"
  - id: A12
    name: 第二年平均生产发卡机构活跃持卡人数
    value: '25000'
    unit: 活跃持卡人/发卡机构
    source: "[BP 滩头细分市场 10k–50k 活跃用户；试点后生产阶段取中位数]"
  - id: A13
    name: 第三年成熟发卡机构活跃持卡人数
    value: '40000'
    unit: 活跃持卡人/发卡机构
    source: "[BP market.som 及 15 家发卡机构 / 60 万活跃持卡人里程碑]"
  - id: A14
    name: 分析模块附加定价
    value: '15'
    unit: USDK ARR/发卡机构
    source: "[BP businessModel 分析/CRM 扩展；启发式：窄范围基准测试模块定价]"
  - id: A15
    name: 分析模块采用爬坡计划
    value: "Q4Y2 前 1 家，Q4Y3 前 2 家"
    unit: 发卡机构数
    source: "[BP 里程碑：12–24 个月内至少将 2 家发卡机构转化为付费分析用户]"
  - id: A16
    name: 付费发卡机构增长计划
    value: "Q4Y1 前 3 家，Q4Y2 前 6 家（生产当量），Q4Y3 前 15 家"
    unit: 付费发卡机构数
    source: "[BP 里程碑与产品路线图]"
  - id: A17
    name: CEO 现金薪资
    value: '120'
    unit: USDK/年
    source: "[启发式：精益种子前创始人现金薪酬]"
  - id: A18
    name: 创始工程师现金薪资
    value: '140'
    unit: USDK/年
    source: "[启发式：种子前高级创始工程师]"
  - id: A19
    name: 产品与合规负责人现金薪资
    value: '120'
    unit: USDK/年
    source: "[BP 团队角色；启发式：具备合规意识的产品运营人员]"
  - id: A20
    name: 合作伙伴负责人现金薪资
    value: '100'
    unit: USDK/年
    source: "[BP 团队角色；启发式：早期合作伙伴经理薪酬]"
  - id: A21
    name: 数据负责人现金薪资
    value: '120'
    unit: USDK/年
    source: "[BP 团队角色；启发式：初创公司数据负责人薪酬]"
  - id: A22
    name: 平台工程师现金薪资
    value: '130'
    unit: USDK/年
    source: "[启发式：额外高级工程师薪酬]"
  - id: A23
    name: GTM 招聘现金薪资
    value: '100'
    unit: USDK/年
    source: "[启发式：第一位销售/运营人员薪酬]"
  - id: A24
    name: 客户成功现金薪资
    value: '80'
    unit: USDK/年
    source: "[启发式：第一位客户成功运营人员薪酬]"
  - id: A25
    name: 财务与运营现金薪资
    value: '90'
    unit: USDK/年
    source: "[启发式：精益财务/运营招聘薪酬]"
  - id: A26
    name: 工资税及福利负担
    value: '15'
    unit: 占现金薪资百分比
    source: "[启发式：分布式团队初创公司工资负担]"
  - id: A27
    name: 非薪资运营费用爬坡
    value: '15 至 42'
    unit: USDK/月（从 M1 至 Y3 末）
    source: "[BP 运营 + 合规/合作工作量；云服务、法务、差旅及工具费用启发式估算]"
  - id: A28
    name: 月度客户流失率
    value: '1.2'
    unit: 百分比
    source: "[启发式：集成上线后 B2B 基础设施综合流失率]"
  - id: A29
    name: 每发卡机构综合获客成本
    value: '65'
    unit: USDK/生产发卡机构
    source: "[BP 创始人主导及合作伙伴渠道 GTM；集中型企业金融科技销售启发式估算]"
