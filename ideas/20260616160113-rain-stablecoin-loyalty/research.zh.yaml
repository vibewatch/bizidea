  value: 约 $3,300/用户/年，取 ARQ >$5,000 与 RedotPay ~$1,700 年化消费量的中间值。
  source: calc from [39], [41]
- driver: 模型化年均活跃用户收入
  value: 约 $1.91/用户/年（$0.24 订阅费加上 1% 奖励池的 5% 抽成）。
  source: calc
- driver: TAM 活跃用户预测时段
  value: 3 至 5 年内达到 1,200 万活跃用户，假设随着稳定币卡推出向更多地区和协议栈扩展，可见基础持续复利增长。
  source: calc from [8], [13], [22], [35], [39], [41]
- driver: 第 3 年可获得市场规模
  value: 60 万活跃用户 = 15 家发行方 × 每家 4 万活跃持卡人。
  source: est.
