    - 28
    - 35
competitors:
- name: Rain
  stage: incumbent
  wedge: 直接内置于稳定币发行协议栈的原生奖励，集成了链上积分的兑换和分发。
  pricing: 合作伙伴定价/未公开披露
  strength: 唯一有据可查的稳定币卡忠诚度案例，报告消费提升 25%，并收购了兑换网络。
  weaknessVsUs: 奖励绑定于 Rain 自身协议栈，不愿迁移的发行方仍需要中立选项。
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
- name: Immersve
  stage: scale-up
  wedge: 面向 Web3 业务的钱包原生 Mastercard 消费基础设施。
  pricing: 申请制/定制化
  strength: 强大的自托管钱包集成和现实世界卡受理能力。
  weaknessVsUs: 无明确的原生忠诚度或兑换层；买家仍需自行组合奖励逻辑。
  sourceRefs:
  - 28
- name: StraitsX
  stage: scale-up
  wedge: 面向亚洲稳定币支持卡的持牌发行担保方和结算基础设施。
  pricing: 定制化发行方项目定价
  strength: 具备监管合规的发行和结算基础设施，并有明确的上线时间表。
  weaknessVsUs: 更偏发行协议栈而非忠诚度产品，卡差异化仍需另行构建或采购。
  sourceRefs:
  - 35
- name: Antavo
  stage: scale-up
  wedge: API 驱动的企业忠诚度引擎，具备移动钱包和奖励目录工具。
  pricing: 定制化企业定价
  strength: 灵活的全渠道忠诚度规则和成熟的商品化功能。
  weaknessVsUs: 非稳定币原生或结算感知型，发行方仍需加密货币卡专项基础设施。
  sourceRefs:
  - 76
- name: Currency Alliance
  stage: scale-up
  wedge: 面向金融科技的合作伙伴型忠诚度、卡关联和积分支付基础设施。
  pricing: 定制化企业定价
  strength: 强大的合作伙伴网络导向和明确的金融科技定位。
  weaknessVsUs: 基于传统忠诚度协议栈，本身不解决链上发行或稳定币特有的负债处理问题。
  sourceRefs:
  - 80
regulatoryTechnicalConstraints:
- point: 可转换或可转让的奖励价值，可能根据司法管辖区的不同，将产品纳入货币转账或电子货币分析范畴。
  sourceRefs:
  - 95
  - 98
  - 99
- point: 面向消费者的预付卡或卡关联流程，仍须承担类似 Regulation E 的保护责任和争议预期。
  sourceRefs:
  - 97
- point: 即便奖励在结算后铸造，客户激励负债仍需按客户合同标准进行会计处理。
  sourceRefs:
  - 100
- point: 上线时间受制于发行方、处理商和担保方的审批；受监管担保方公开宣传的上线周期为数周，而非即时上线。
  sourceRefs:
  - 35
  - 56
  - 68
validationSignals:
- point: Rain 的公测显示，已加入奖励的持卡人消费额比未加入用户高约 25%。
  sourceRefs:
  - 1
- point: Uptop 的骑士队项目在被 Rain 收购之前，已实现消费提升 21%、球队周边销售增长 51%。
  sourceRefs:
  - 4
- point: Bridge 表示 Airtm 的稳定币卡提升了参与度、留存率和钱包份额。
  sourceRefs:
  - 14
- point: Bitso 表示美元关联稳定币在其核心拉美市场 2025 年加密购买中占 40%。
  sourceRefs:
  - 44
- point: RedotPay 表示已服务 600 万用户，年化支付量达 100 亿美元，证明稳定币关联消费可以规模化。
  sourceRefs:
  - 41
openQuestions:
- 有多少独立非 Rain 稳定币卡发行方能在无需担保方升级审批的情况下，授予第三方结算 webhook 访问权限？
- 拉美地区第一年奖励预算中，商户资助的占比能达到多少，而不是由发行方资助的账单抵扣？
- 法律团队审查设计后，买家会更倾向于钱包可见的封闭式积分还是完全可转让的链上奖励？
- RedotPay 和 ARQ 风格的注册用户数背后，实际活跃持卡人规模有多少？
