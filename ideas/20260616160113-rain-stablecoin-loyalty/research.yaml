  validationPlan:
  - priority: high
    question: How many independent non-Rain issuers can grant third-party settlement webhook access within a single quarter?
    evidenceToGather: Ten discovery calls split across issuers, processor partners, and BIN sponsors; verify sandbox access and sponsor approval requirements.
  - priority: high
    question: What percentage of launch rewards can be merchant-funded versus issuer-funded statement credit?
    evidenceToGather: Pilot LOIs with five redemption partners and two issuers; compare unit economics of statement credits against merchant-funded offers.
  - priority: medium
    question: Do buyers prefer wallet-visible closed-loop points or fully transferable onchain rewards after legal review?
    evidenceToGather: Jurisdiction-by-jurisdiction legal memos plus design interviews with product, finance, and compliance leads at launch accounts.
