competitors:
- name: Rain
  stage: incumbent
  wedge: Native rewards built directly into a stablecoin issuing stack with integrated redemption and onchain points.
  pricing: Partner-based / not publicly disclosed
  strength: Only public stablecoin-card loyalty proof point with a reported 25% spend lift and an acquired redemption network.
  weaknessVsUs: Rewards are tied to Rain’s own stack, so issuers that will not migrate still need a neutral option.
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
- name: Immersve
  stage: scale-up
  wedge: Wallet-native Mastercard spending infrastructure for Web3 businesses.
  pricing: Application-based / custom
  strength: Strong self-custodial wallet integration and real-world card acceptance.
  weaknessVsUs: No clear native loyalty or redemption layer; buyers still need to assemble rewards logic themselves.
  sourceRefs:
  - 28
- name: StraitsX
  stage: scale-up
  wedge: Licensed issuer-sponsor and settlement infrastructure for stablecoin-backed cards in Asia.
  pricing: Custom issuer program pricing
  strength: Regulated issuing and settlement infrastructure with explicit launch timelines.
  weaknessVsUs: More issuer-stack than loyalty product, so card differentiation still has to be built or bought separately.
  sourceRefs:
  - 35
- name: Antavo
  stage: scale-up
  wedge: API-driven enterprise loyalty engine with mobile-wallet and rewards-catalog tooling.
  pricing: Custom enterprise pricing
  strength: Flexible omnichannel loyalty rules and mature merchandizing features.
  weaknessVsUs: Not stablecoin-native or settlement-aware, so issuers still need crypto-card-specific infrastructure.
  sourceRefs:
  - 76
- name: Currency Alliance
  stage: scale-up
  wedge: Partner-based loyalty, card linking, and pay-with-points infrastructure for fintechs.
  pricing: Custom enterprise pricing
  strength: Strong partner-network orientation and explicit fintech positioning.
  weaknessVsUs: Assumes a traditional loyalty stack and does not solve onchain issuance or stablecoin-specific liability handling by itself.
  sourceRefs:
  - 80
regulatoryTechnicalConstraints:
- point: Convertible or transferable reward value can pull the product toward money-transmission or e-money analysis depending on jurisdiction.
  sourceRefs:
  - 95
  - 98
  - 99
- point: Consumer-facing prepaid or card-linked flows remain exposed to Regulation E-style protections and dispute expectations.
  sourceRefs:
  - 97
- point: Even if rewards are minted post-settlement, customer incentive liabilities still need to be accounted for under customer-contract standards.
  sourceRefs:
  - 100
- point: Launch timelines are constrained by issuer, processor, and sponsor approvals; regulated sponsors advertise weeks-long launch cycles rather than instant go-live.
  sourceRefs:
  - 35
  - 56
  - 68
validationSignals:
- point: Rain’s public beta showed enrolled cardholders spent about 25% more than non-enrolled users.
  sourceRefs:
  - 1
- point: Uptop’s Cavaliers program delivered a 21% lift in spend and 51% growth in team-shop sales before Rain integrated it.
  sourceRefs:
  - 4
- point: Bridge says Airtm’s stablecoin card increased engagement, retention, and share of wallet.
  sourceRefs:
  - 14
- point: Bitso says dollar-linked stablecoins were 40% of 2025 crypto purchases in its core LatAm markets.
  sourceRefs:
  - 44
- point: RedotPay says it already serves 6M users with $10B annualized payment volume, showing that stablecoin-linked spend can scale.
  sourceRefs:
  - 41
openQuestions:
- How many independent non-Rain stablecoin card issuers can grant third-party settlement webhook access without sponsor escalation?
- What share of first-year reward budgets in LatAm can be merchant-funded instead of issuer-funded statement credit?
- Will buyers prefer wallet-visible closed-loop points over fully transferable onchain rewards once legal teams review the design?
- How many active cardholders actually sit behind RedotPay- and ARQ-style registered-user numbers?
