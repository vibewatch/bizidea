- driver: Annual spend per user proxy
  value: ~$3.3k/user/year midpoint between ARQ >$5k and RedotPay ~$1.7k annualized volume per user.
  source: calc from [39], [41]
- driver: Modeled annual revenue per active user
  value: ~$1.91/user/year ($0.24 subscription plus a 5% take on a 1% rewards pool).
  source: calc
- driver: TAM active-user horizon
  value: 12M actives over 3–5 years, assuming the visible base compounds as stablecoin-card rollouts spread across more regions and stacks.
  source: calc from [8], [13], [22], [35], [39], [41]
- driver: Y3 obtainable footprint
  value: 0.6M actives = 15 issuers x 40k active cardholders each.
  source: est.
