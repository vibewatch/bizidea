  sensitivityCases:
  - case: Independent issuer base consolidates around full-stack platforms
    impact: Third-party loyalty TAM compresses and the startup must move deeper into processor channels or broader CRM analytics.
    sourceRefs:
    - 1
    - 4
    - 28
    - 35
  - case: Regulators force rewards into closed-loop, non-transferable designs
    impact: Go-live slows and legal cost rises, but the product can still work if it emphasizes statement-credit and in-app redemption rather than freely transferable tokens.
    sourceRefs:
    - 95
    - 97
    - 98
    - 99
    - 100
  - case: Merchant-funded offer supply lags issuer demand
    impact: The product starts as statement-credit plus analytics rather than a rich marketplace, lowering ARPU until partner supply catches up.
