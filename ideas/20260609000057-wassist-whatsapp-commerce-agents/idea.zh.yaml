problem: Shopify 订阅品牌越来越多地把高意图咨询、复购请求和购物车异议收进 WhatsApp，但处理这些聊天的团队，往往拿不到商品目录、订阅状态、会员上下文和活动历史等关键数据。结果，本该带来收入的对话被迫转成缓慢的人工交接，或者被甩去通用结账页，转化率随之下滑，复购支持成本也被抬高。随着 AI 原生购物中介吃走越来越多的发现流量，品牌自有的聊天线程就成了最后还握在自己手里的下单和复购阵地。
targetUser:
  primary: 在 Shopify Plus 订阅品牌负责留存或客户体验的人，且该品牌已把 WhatsApp 用在购买前咨询和复购对话上
  secondary: 负责 WhatsApp 客服、生命周期活动和订阅体验的电商运营经理
  buyer: 电商、留存或客户体验副总裁
startupThesis:
  nonObviousInsight: 下一层真正有价值的商业基础设施，不会是另一个通用购物智能体，而是商家自有的执行层：在发现环节已经迁到平台 AI 之后，它把 WhatsApp 里的一方客户状态直接转成订单、订阅动作和留存工作流。
  beachhead: 已在用 Klaviyo 和 Recharge、且每月处理 5,000 条以上 WhatsApp 对话的 Shopify Plus 补货型品牌；这些对话集中在商品咨询、复购请求和订阅变更流程。
  wedge: 一个 WhatsApp 复购礼宾：回答购买问题、重建购物车、处理复购或订阅变更，只把对促销敏感或有政策风险的案例交给人工。
  whyNowCatalyst: Wassist 的融资、40x 对话增长说法、线程内结账能力和现成集成，都说明商家自有的对话式电商刚刚进入可部署阶段；与此同时，品牌也正面临别再把购物意图拱手让给平台 AI 的战略压力。
  ventureScalePath: 先从 Shopify 上的复购型商家切入，再扩成更广义的对话式电商系统，覆盖获客、忠诚度、售后、退货，以及跨主要消息渠道的智能体编排。
solution: 产品是一层垂直商业工作流，直接长在 WhatsApp 里，服务订阅和补货型品牌。系统把商品目录、客户档案、订阅状态、活动历史、评价和已批准的报价逻辑接进来，让智能体能回答适配问题、重建放弃购物车、触发复购流程，并处理常见的 skip、swap、delay 请求，而不把消费者推去另一个门户。像折扣例外、医疗或高索赔风险问题、高价值退款等高风险意图，则带着完整对话上下文和下一步建议转给人工。随着时间推移，系统会学出每个商家最能带来成交和更高订阅留存的提示词、捆绑方案和升级路径。
goToMarketSeed:
  firstCustomer: 首个客户应是已经在用 Recharge 和 Klaviyo、也已经投放 click-to-WhatsApp 活动的 Shopify Plus 补货品牌，并且聊天里每天都堆着复购、订阅和商品适配问题。
  buyingTrigger: 当 WhatsApp 活动量暴涨、订阅业务上行，或季节性上新把客服压垮时，品牌会直观看到未回复聊天带来的收入流失。
  currentAlternative: 人工客服在 WhatsApp 收件箱或 helpdesk 里回复，再附上 Shopify 链接、订阅门户跳转和通用 BSP 自动化。
  switchingReason: 这个切口把消费者留在同一条线程里，并调动实时商业上下文当场促成下单或订阅动作；通用收件箱和规则式自动化做不好这件事。
  pricingHypothesis: 按年订阅的 SaaS 费，加上按受管商业对话量或活跃订阅人数计费的 usage，首单先从单一品牌团队的低五位数合同起步。
