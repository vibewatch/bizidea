differentiator: 这不是一个通用 AI 聊天机器人，也不是宽泛的 WhatsApp 代运营工具。它专门为复购型电商流程而做，缺的不是更会写文案，而是能在聊天线程里把动作落地。真正的护城河来自把商家独有的订单、订阅、活动和升级数据，拼成一条从对话到转化的闭环；每救回一次复购、每留住一个订阅用户，系统就更强。
