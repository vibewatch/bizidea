jobsToBeDone:
- job: 当 WhatsApp 活动带来大量商品咨询和复购问题时，帮留存团队直接在聊天里处理，好让他们在不继续招人的情况下把需求转成订单。
  currentAlternative: 人工客服回复、附上结账链接，再用表格跟进
  successMetric: 每 1,000 条 WhatsApp 对话带来的已完成订单数，以及响应时间中位数
- job: 当订阅用户想跳过、替换或恢复订单时，帮 CX 团队直接在 WhatsApp 里把动作做完，好把留存守住，而不是把人推回门户。
  currentAlternative: 跳去 Recharge 门户或转成人工工单
  successMetric: 因客服触发对话而保住的订阅数，以及流失下降幅度
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 有融资事件、明确的产品边界、对话增长数据和已上线集成，说明信号真实，即便目前仍主要来自单一来源。
  painIntensity:
    score: 4
    rationale: 这更像持续漏收入，而不是系统级故障；但对复购型品牌来说，聊天转化流失和高成本人工处理已经很痛。
  wedgeClarity:
    score: 5
    rationale: 一个理解门槛极低、边界也足够窄的首发产品：能感知订阅状态的 WhatsApp 复购礼宾。
  defensibility:
    score: 4
    rationale: 商家专属的对话历史、已批准工作流逻辑和转化结果，可以不断复利，沉淀成强黏性的流程与数据护城河。
  ventureScale:
    score: 4
    rationale: 滩头市场很聚焦，但同一平台能继续往更广的对话式电商、留存和服务工作流扩展，覆盖多个消费品类。
topRisks:
- name: 渠道依赖
  description: 如果 Meta 调整政策、定价或 API 限额，利润率可能被压缩，工作流稳定性也会下降。
  mitigation: 把核心产品做成与渠道无关的编排层，通过 BSP 伙伴分散风险，并把商家工作流数据保存在任何单一消息端点之外。
- name: ROI 证明偏薄
  description: 商家可能认同概念，但在看到相对人工客服和简单自动化的可量化提升前，不愿付费。
  mitigation: 先从复购和订阅挽回流程切入，这些场景基线指标清楚，再围绕转化提升、人工节省和留住的订阅收入来卖。
- name: 横向竞争
  description: Shopify 应用、BSP，或像 Wassist 这样的现有厂商，都可能扩进同一类工作流，把新公司挤住。
  mitigation: 不要和通用 WhatsApp bot builder 硬碰，而是继续往订阅动作、留存分析和商家打法里做深。
