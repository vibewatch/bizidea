  searchedQueries:
  - 寻找与电商自动化相关、最权威的一手来源，覆盖 Meta WhatsApp Business Platform 的定价、消息限制、对话分类、商业政策，以及 click-to-WhatsApp 广告。
  - 寻找关于 Shopify 订阅电商、Recharge 订阅基准、Klaviyo WhatsApp，以及能证明 WhatsApp 复购自动化相关集成的一手来源。
  - 为 Shopify 商家常用的头部 WhatsApp 电商与商业消息厂商寻找公开直链，包括 Wassist、WATI、Zoko、Interakt、Gorgias 和 respond.io 的官网产品页、定价页及可信评测或应用商店页面。
  - 寻找关于对话式电商市场规模、WhatsApp 电商渗透、客户支持预期和订阅留存基准的可信独立或分析师来源。
  - 寻找 Wassist WhatsApp 电商创业公司的官方网站和公开产品页。
  - 寻找 Gorgias 当前官方的 WhatsApp 集成或产品页，以及 Shopify 应用页 URL。
  - 寻找 Meta 开发者文档中当前可直接访问的 URL，覆盖 WhatsApp opt-in 要求、消息模板和营销消息偏好。
  - 寻找关于 WhatsApp 用户规模、click-to-message 广告增长，以及通过 WhatsApp 进行对话式电商采用情况的权威且可抓取来源。
  - 寻找 Meta 或 WhatsApp 关于 opt-in、模板和人工升级要求的官方、可抓取来源。
  - 寻找 Recharge 关于订阅者趋势、订阅案例和商户数量的官方直链。
  - 寻找 Klaviyo 关于 WhatsApp 同意收集、WhatsApp 活动或 WhatsApp 营销产品页的官方直链。
  - 寻找 WATI Shopify 集成、Zoko 客户案例、Interakt WhatsApp 页面和 Gorgias AI shopping 页面的一手页面。
