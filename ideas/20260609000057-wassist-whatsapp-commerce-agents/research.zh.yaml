competitors:
- name: Wassist
  stage: 种子期
  wedge: 面向 Shopify 的品牌训练型 WhatsApp AI，可回答问题、挽回购物车，并在线程内完成购买。
  pricing: 本次调研未找到公开定价。
  strength: 它是“自有聊天电商”这条 thesis 最接近的公开 proof point，且已接入 Shopify、Klaviyo、Recharge 和 Yotpo，并披露了对话增长。
  weaknessVsUs: 定位仍然偏宽，对订阅场景下的 skip、swap 与复购工作流，公开证明仍然很薄。
  sourceRefs:
  - 1
  - 2
- name: Zoko
  stage: 成长期
  wedge: 面向 Shopify 的 WhatsApp 收入平台，覆盖目录、群发、客服和复购收入。
  pricing: Elite 套餐 $139.99/mo 起，Max 套餐 $499.99/mo 起，未含 Meta 费用。
  strength: 明确为 Shopify 品牌打造，也直接围绕 WhatsApp 上的复购收入来卖。
  weaknessVsUs: 更像宽泛的渠道收入套件，而不是为订阅变更动作和合规复购自动化深度优化。
  sourceRefs:
  - 38
  - 39
  - 40
- name: Interakt
  stage: 成长期
  wedge: 覆盖 AI 智能体、营销中心、支持中心和销售 CRM 的 WhatsApp 互动平台。
  pricing: Starter 套餐 $12/mo 起；WhatsApp AI Agents 在高阶套餐上额外加价，约 $74.99。
  strength: 在 WhatsApp 上同时覆盖客服、营销和 CRM，运营面更宽。
  weaknessVsUs: 更偏横向 SMB 工作流，不像我们这样深做 Recharge 或订阅合同执行。
  sourceRefs:
  - 36
  - 37
- name: Wati
  stage: 成长期
  wedge: 面向 WhatsApp Business API 的自动化、活动、客服和 Shopify 购物车挽回工具。
  pricing: 未披露 setup fee；定价页主要强调 Meta 按消息收费和额外的自动化触发费用。
  strength: 对购物车挽回和 Shopify 电商的定位很清楚，BSP 风格自动化也较成熟。
  weaknessVsUs: 更偏规则与自动化，不是围绕订阅留存编排来做的。
  sourceRefs:
  - 34
  - 35
- name: Gorgias
  stage: 现有厂商
  wedge: 电商 helpdesk，加上一套横跨客服和销售渠道的 AI shopping assistant。
  pricing: Starter $10/mo、Basic $50/mo、Pro $300/mo、Advanced $750/mo，另收 AI agent 互动费用。
  strength: 在电商里装机量强，也把“客服到收入”讲得更完整。
  weaknessVsUs: WhatsApp 复购礼宾只是它宽泛 helpdesk 产品中的一个子工作流。
  sourceRefs:
  - 32
  - 33
regulatoryTechnicalConstraints:
- point: 商家在 WhatsApp 上给用户发消息前，必须先拿到 opt-in，并在合适情况下区分消息类别。
  sourceRefs:
  - 6
  - 9
- point: 在 24 小时客服窗口之外，只能发送已批准的模板消息。
  sourceRefs:
  - 7
  - 8
  - 9
- point: 即便仍在服务窗口内，自动化也必须提供及时、直接的人工升级路径。
  sourceRefs:
  - 9
- point: 订阅动作依赖 Shopify 的 contracts、portals 和支付方式；如果 storefront 渲染不安全或 app-proxy 设计有问题，会带来安全和体验风险。
  sourceRefs:
  - 15
  - 16
  - 17
- point: 凡是借用户评价或达人内容来卖货的说法，都必须符合 FTC 关于背书与评价的规则。
  sourceRefs:
  - 29
validationSignals:
- point: Wassist 称其在没有付费营销的情况下，把客户对话量从 2,000 拉到 80,000，并已接入 Shopify、Klaviyo、Recharge 和 Yotpo。
  sourceRefs:
  - 1
- point: 与 Meta 财报相关的报道称，click-to-WhatsApp 广告收入同比增长 60%，用户每天与商业账号的活跃线程已超过 1 billion。
  sourceRefs:
  - 30
  - 31
- point: Recharge 称订阅用户年均下单 4.4 次，且 53% 会调整订单；这正是礼宾型产品最适合自动化的重复工作流。
  sourceRefs:
  - 22
- point: Shopify 展示了一个订阅品牌案例，其中约 70% 的订单来自订阅，说明周期性订单工作流本身就非常关键。
  sourceRefs:
  - 12
openQuestions:
- 在 20,000+ 家类似 Recharge 的商户中，到底有多大比例已经达到每月 5,000 条以上 WhatsApp 对话，而不是只是零散客服咨询？
- 把复购动作直接做在线程里，相比把消费者跳回现有 Shopify 或 Recharge 门户，转化到底能提升多少？
- 模板审批、质量评分变化或营销消息偏好，在真实运营里会多大程度限制 AI 生成的商业流程？
- Wassist 是否已经掌握尚未公开的定价、留存和客户证明，还是说这个品类仍处于标准化前夜？
- 除了补货型商品，还有哪些垂直行业最愿意让智能体直接处理订阅动作，而不是转人工？
