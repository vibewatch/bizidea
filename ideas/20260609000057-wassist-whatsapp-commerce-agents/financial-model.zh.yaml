slug: whatsapp-reorder-concierge
date: '2026-06-09'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-09] 基准情景从计划日期次月启动，这样 pre-seed 资金能在招聘和试点投入爬坡前到账。'
- id: A2
  name: 期初现金
  value: '2200.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-3M] 基准情景采用接近区间下沿的 $2.2M pre-seed，因此到 Y3 末只留下有限现金缓冲。'
- id: A3
  name: 模型中的客户单位
  value: 活跃付费品牌
  unit: definition
  source: '[BP market SOM 60 brands; BP milestones Month 12 reach 5 production brands] customersEop 追踪的是付费商家品牌，而不是对话量，因为里程碑表达本身就是按品牌口径写的。'
- id: A4
  name: 起始客户数（M1）
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] 公司从零收入起步，前期先做访谈和共创客户，再开始付费试点。'
- id: A5
  name: Y1 每月新增客户
  value: '[0,0,1,1,0,1,0,1,0,0,1,0]'
  unit: count
  source: '[BP experimentRoadmap paid pilot pricing test; BP milestones Month 9 first 2 pilots convert, Month 12 reach 5 production brands] 该爬坡假设前 90 天内拿下 2 个付费试点，并在年末做到 5 个付费品牌。'
- id: A6
  name: Y2 每季度新增客户
  value: '[2,2,3,3]'
  unit: count
  source: '[BP milestones 12-24 months; BP gtm channels] 靠创始人主导销售加上首个转介绍伙伴，到 Y2 Q4 把客户基数拉到 15 个品牌，不假设大规模自助模式。'
- id: A7
  name: Y3 每季度新增客户
  value: '[4,5,5,6]'
  unit: count
  source: '[BP milestones 24-36 months; BP market SOM 60 brands] 基准情景在 35 个品牌收尾，低于模型中的 SOM 上限，也符合通过伙伴逐步扩张的节奏。'
- id: A8
  name: 实际定价爬坡
  value: Y1 每个活跃品牌的月度年化价格 = [18,18,18,18,18,24,24,30,30,30,36,36]；Y2 按季度 = [36,42,48,54]；Y3 按季度 = [54,60,60,66]（USDK）
  unit: annual USDK per active brand
  source: '[BP gtm pricing $15k-$25k paid pilot converting to $30k-$60k annual contract value; BP businessModel revenueStreams; Research competitors public price floors from Gorgias, Zoko, Interakt, and respond.io] 前期反映试点价格，后期反映生产订阅价格加上适度 usage 扩张。'
- id: A9
  name: 收入确认方法
  value: 以周期内平均活跃客户数乘以综合年化价格
  unit: formula
  source: 创业公司财务常用启发：新品牌通常在周期中段上线，因此确认收入时按期初与期末客户数的中点乘以综合年化价格。
- id: A10
  name: 毛利率爬坡
  value: Y1 45%-60%；Y2 60%-65%；Y3 68%-70%
  unit: percent
  source: '[BP businessModel targetGrossMarginPct 70; BP risks on bespoke deployments and policy-heavy escalation] 试点阶段实施成本高，毛利率先低于目标；只有等 onboarding 和护栏标准化之后，才逐步接近目标。'
- id: A11
  name: 全成本薪酬带
  value: Founder 150; Engineering 140; Solutions 110; Customer Success 100; Sales 130
  unit: annual USDK per FTE
  source: '[BP team] 加上创业公司财务启发：面向垂直 SaaS 的精简团队，现金薪酬、工资税和福利都已包含在内。'
- id: A12
  name: 招聘节奏
  value: 创始工程师 M1；解决方案工程师 M4；后端集成工程师 M7；客户成功策略岗位 M10；首名销售 M18；第 3 名工程师 M21；第 2 名客户成功 M28；第 2 名销售 M31
  unit: timing
  source: '[BP team startTiming; BP strategicChoices.sequencingRationale] 前四个岗位直接来自计划；后续岗位是在试点转生产被验证后，按启发式补进。'
- id: A13
  name: 薪酬分摊规则
  value: Founder 60% S&M and 40% G&A；engineering 100% R&D；solutions engineer 60% S&M and 40% R&D；customer success 70% S&M and 30% G&A；sales 100% S&M
  unit: policy
  source: '[BP team role rationales; BP gtm founder-led sales; BP operations] 这反映的是一家由创始人亲自打单、靠工程交付产品、并把 onboarding 同时视作实施与收入支持的公司。'
- id: A14
  name: 非薪酬经营费用爬坡
  value: Y1 月度其他 opex = R&D 4-7、S&M 3-6、G&A 4-5；Y2 季度 = R&D 24-33、S&M 21-42、G&A 18；Y3 季度 = R&D 36-45、S&M 45-63、G&A 18（USDK）
  unit: USDK
  source: '[BP operations; BP risks; Research regulatoryTechnicalConstraints] 覆盖云推理、差旅、合规审核、法务、数据工具和薪酬之外的商家 onboarding 成本。'
- id: A15
  name: 单位经济模型中的稳态月流失率
  value: '1.5'
  unit: percent
  source: 创业公司财务启发：年付合同加上深嵌工作流，应该能带来不错的留存；但这个品类仍有整合和套件型现有厂商的风险。
- id: A16
  name: 综合 CAC
  value: '37.2'
  unit: USDK
  source: 按模型中 Y2-Y3 约 $1.12M 的销售与市场支出、对应 30 个新增品牌计算得出；这与创始人主导的企业销售加伙伴转介绍相符，而不是廉价自助获客。
- id: A17
  name: 融资规模规则
  value: 跑到下一轮融资证明点，再留 6 个月缓冲
  unit: policy
  source: 开发者指令；[BP fundingAsk runwayMonths 18] 本轮融资规模按“跑到下一轮融资证明点，并额外留 6 个月缓冲”来定。
- id: A18
  name: 现金流简化假设
  value: 期末现金 = 期初现金 + 累计 EBITDA
  unit: formula
  source: 创业公司财务启发：轻资产软件模型，假设几乎没有 capex、债务和营运资金扭曲，因此期末现金等于期初现金加累计 EBITDA。
