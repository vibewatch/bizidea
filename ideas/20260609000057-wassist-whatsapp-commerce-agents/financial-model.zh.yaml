modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Leads[Qualified WhatsApp brands] --> Pilots[Paid pilot brands]\n  Pilots --> Production[Production brands]\n  Production --> Revenue[Subscription plus usage revenue]\n  Revenue --> GrossProfit[Gross profit after human review and messaging costs]\n  GrossProfit --> Cash[Cash runway]\n"
modelSanity:
- checkName: 收入引擎
  finding: 收入增长靠两件事：到 Q4Y3 做到 35 个付费品牌，以及把单品牌实际年化收入从试点期的 $18K 提升到 $66K，背后对应生产部署和 usage 扩张。
- checkName: 必须跑通的环节
  finding: 公司必须在一个季度内把付费试点转成生产合同，这样创始人主导销售加一条早期转介绍渠道，才足以支撑客户增长，而不用提前铺更大的 field team。
- checkName: 模型失效条件
  finding: 如果 onboarding 长期仍是重服务模式，毛利率又卡在 65% 左右，基准情景就会失效，因为 downside 情景里的现金缓冲会跌破 0。
- checkName: 下一轮融资证明
  finding: 当业务做到约 24 个生产品牌、能拿出覆盖提升与自动化覆盖的基准报告，并让季度 burn 明显逼近盈亏平衡时，才足以支撑下一轮融资。
sanityChecks:
  ruleOf40: Y3 增长 231% + EBITDA 利润率 -32% = 199%
  burnMultiple: 0.46x Y3 burn multiple（$0.47M EBITDA burn / $1.03M net new revenue）
  revenuePerFte: 每名 FTE 对应 $164K 的 Y3 收入（期末 9 名 FTE；早期垂直 SaaS 基准约 $150K-$250K）
  flags:
  - Y3 仍然是 EBITDA 亏损，所以即便在基准情景下，公司也还需要一轮 seed 融资。
  - 每名 FTE 的收入只刚越过基准区间下沿，这意味着在组织能舒适扩张之前，伙伴来源增长和扩单收入都还要更强。
  - 模型假设毛利率要等 onboarding 和护栏标准化后才会到 70%；如果合规审核长期保持人工，burn 会迅速恶化。
