scenarios:
  downside:
    description: 试点转正变慢、伙伴转介绍来得更晚，而且人工审核又让毛利率多拖了一年都达不到目标。
    y3RevenueK: 1110.0
    y3EbitdaK: -680.0
    cashLowPointK: -95.0
    keyAssumptionChanges:
    - Y3 末客户数从 35 个降到 26 个
    - Y3 综合年化单品牌价格最高只到 $54K，而不是 $66K
    - 毛利率最高只到 65%
  base:
    description: 创始人主导的试点按计划转正，Y2 有 1 条转介绍渠道跑通，usage 与工作流扩张把 ARPU 在 Y3 推到 BP 区间上半段。
    y3RevenueK: 1477.5
    y3EbitdaK: -473.57
    cashLowPointK: 333.87
    keyAssumptionChanges:
    - Q4Y3 结束时有 35 个活跃品牌
    - Y3 退出时年化单品牌价格达到 $66K
    - Y3 毛利率达到 70% 目标
  upside:
    description: 代理商和 BSP 转介绍拉快了客户增长，而 onboarding 仍然足够标准化，没有同步带来同等幅度的人头膨胀。
    y3RevenueK: 1830.0
    y3EbitdaK: -250.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - Q4Y3 结束时有 42 个活跃品牌
    - Y3 退出时年化单品牌价格达到 $72K
    - 毛利率提升到 72%
