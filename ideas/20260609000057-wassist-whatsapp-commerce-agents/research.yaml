openQuestions:
  - >-
    What share of the 20,000+ Recharge-style merchant base already handles 5,000 or more monthly
    WhatsApp conversations, rather than just occasional support chats?
  - >-
    How much conversion lift does in-thread reorder execution deliver versus linking shoppers back
    to existing Shopify or Recharge portals?
  - >-
    How often will template approval, quality-rating changes, or marketing-message preferences
    constrain AI-generated commerce flows in practice?
  - >-
    Does Wassist have defensible pricing, retention, and customer proof that is not yet public, or
    is the category still effectively pre-standardization?
  - >-
    Which verticals beyond replenishment goods show the highest willingness to let an agent take
    subscription actions instead of routing to a human?
