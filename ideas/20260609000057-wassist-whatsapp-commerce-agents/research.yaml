competitors:
  - name: Wassist
    stage: seed
    wedge: >-
      Brand-trained WhatsApp AI for Shopify that answers questions, recovers carts, and completes
      purchases in-thread.
    pricing: Public pricing not found in this run.
    strength: >-
      Closest public proof point for the exact owned-chat commerce thesis, with Shopify, Klaviyo,
      Recharge, and Yotpo integrations plus reported conversation growth.
    weaknessVsUs: >-
      Still broad in positioning and light on public proof for subscription-specific skip, swap, and
      reorder workflows.
    sourceRefs:
      - 1
      - 2
  - name: Zoko
    stage: scale-up
    wedge: Shopify-first WhatsApp revenue platform for catalogs, broadcasts, support, and repeat revenue.
    pricing: Elite starts at $139.99/mo and Max at $499.99/mo before Meta charges.
    strength: Explicitly built for Shopify brands and repeat revenue on WhatsApp.
    weaknessVsUs: >-
      Broader channel-revenue suite; less obviously optimized for subscription-change actions and
      policy-aware reorder automation.
    sourceRefs:
      - 38
      - 39
      - 40
  - name: Interakt
    stage: scale-up
    wedge: WhatsApp engagement platform spanning AI agents, marketing hub, support hub, and sales CRM.
    pricing: Starter starts at $12/mo and WhatsApp AI Agents are an add-on around $74.99 on higher plans.
    strength: Broad operational footprint across support, marketing, and CRM on WhatsApp.
    weaknessVsUs: More horizontal SMB workflow coverage than deep Recharge or subscription-contract execution.
    sourceRefs:
      - 36
      - 37
  - name: Wati
    stage: scale-up
    wedge: WhatsApp Business API tooling for automation, campaigns, support, and Shopify cart recovery.
    pricing: >-
      No setup fee disclosed; pricing page emphasizes Meta message charges and paid automation
      triggers.
    strength: Clear cart-recovery and Shopify commerce positioning with mature BSP-style automation.
    weaknessVsUs: More rules-and-automation oriented than subscription-aware retention orchestration.
    sourceRefs:
      - 34
      - 35
  - name: Gorgias
    stage: incumbent
    wedge: Ecommerce helpdesk plus AI shopping assistant across support and selling channels.
    pricing: >-
      Starter from $10/mo, Basic from $50/mo, Pro from $300/mo, Advanced from $750/mo, plus AI-agent
      interaction charges.
    strength: Strong ecommerce installed base and broad support-to-revenue positioning.
    weaknessVsUs: WhatsApp reorder concierge is only one workflow inside a much broader helpdesk product.
    sourceRefs:
      - 32
      - 33
