jobsToBeDone:
  - job: When WhatsApp campaigns drive a rush of product and reorder questions, help our retention team resolve them in chat, so they can convert demand without hiring more agents.
    currentAlternative: Manual agent responses with checkout links and spreadsheet follow-up
    successMetric: Completed orders per 1,000 WhatsApp conversations and median response time
  - job: When subscribers want to skip, swap, or restart an order, help our CX team complete the action inside WhatsApp, so they can preserve retention instead of pushing people to a portal.
    currentAlternative: Recharge portal redirects and human support tickets
    successMetric: Saved subscriptions and reduced churn from support-initiated conversations
ideaScorecard:
  signalStrength:
    score: 4
    rationale: A funded startup, concrete product scope, conversation-growth data, and live integrations make the signal real even if it is still only single-source.
  painIntensity:
    score: 4
    rationale: The pain is a revenue leak rather than an existential outage, but missed chat conversions and expensive manual handling are acute for repeat-purchase brands.
  wedgeClarity:
    score: 5
    rationale: A subscription-aware WhatsApp reorder concierge is a narrow and immediately understandable first product.
  defensibility:
    score: 4
    rationale: Merchant-specific conversation history, approved workflow logic, and conversion outcomes can compound into a sticky data and process moat.
  ventureScale:
    score: 4
    rationale: The beachhead is focused, yet the same platform can expand into broader conversational commerce, retention, and service workflows across many consumer categories.
topRisks:
  - name: Channel dependence
    description: Meta policy changes, pricing shifts, or API limits could compress margins or reduce workflow reliability.
    mitigation: Build the core product as channel-agnostic orchestration, diversify through BSP partners, and preserve merchant workflow data outside any single messaging endpoint.
  - name: Thin proof of ROI
    description: Merchants may like the concept but resist buying until the product proves measurable lift over human agents and simple automation.
    mitigation: Start with reorder and subscription-save workflows that have clear baseline metrics, then sell against conversion lift, saved labor, and retained subscriber revenue.
  - name: Horizontal competition
    description: Shopify apps, BSPs, or incumbents like Wassist could broaden into the same workflow category and squeeze a young startup.
    mitigation: Go deeper on subscription-specific actions, retention analytics, and merchant playbooks rather than competing as a generic WhatsApp bot builder.
