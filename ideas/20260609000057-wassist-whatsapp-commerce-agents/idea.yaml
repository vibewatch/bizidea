problem: >-
  Shopify subscription brands increasingly collect high-intent questions,
  reorder requests, and cart objections in WhatsApp, but the team handling those
  chats usually sits outside the systems that know product catalog, subscription
  status, loyalty context, and campaign history. That forces revenue-bearing
  conversations into slow human handoffs or link-outs to generic checkout pages,
  which kills conversion and makes repeat purchase support expensive. As
  AI-native shopping intermediaries absorb more discovery, the merchant's owned
  chat thread becomes the last defensible place to win the order and the repeat
  order.
targetUser:
  primary: Head of retention or customer experience at a Shopify Plus subscription merchant using WhatsApp for pre-purchase and reorder conversations
  secondary: Ecommerce operations manager responsible for WhatsApp support, lifecycle campaigns, and subscription experience
  buyer: VP of ecommerce, retention, or customer experience
startupThesis:
  nonObviousInsight: >-
    The next valuable commerce layer is not another universal shopping agent.
    It is the merchant-owned execution layer that turns first-party customer
    state inside WhatsApp into completed orders, subscription actions, and
    retention workflows after discovery has already moved to platform AIs.
  beachhead: >-
    Shopify Plus replenishment brands running Klaviyo and Recharge that handle
    5,000 or more monthly WhatsApp conversations across product questions,
    reorder requests, and subscription-change workflows
  wedge: >-
    A WhatsApp reorder concierge that answers purchase questions, rebuilds carts,
    processes repeat orders or subscription changes, and escalates only
    promotion-sensitive or policy-risk cases to humans
  whyNowCatalyst: >-
    Wassist's funding, 40x conversation-growth claim, in-thread checkout, and
    ready-made integrations show that merchant-owned conversational commerce is
    newly deployable just as brands feel strategic pressure to stop ceding
    shopping intent to platform AIs.
  ventureScalePath: >-
    Start with repeat-purchase merchants on Shopify, then expand into a broader
    conversational commerce system for acquisition, loyalty, post-purchase
    service, returns, and cross-channel agent orchestration across major
    messaging surfaces.
solution: >-
  Build a vertical commerce workflow layer that lives inside WhatsApp for
  subscription and replenishment brands. The product connects product catalog,
  customer profile, subscription state, campaign history, reviews, and approved
  offer logic so the agent can answer fit questions, rebuild abandoned carts,
  trigger reorder flows, and handle common skip, swap, or delay requests without
  pushing the shopper to a separate portal. Risky intents such as discount
  exceptions, medical or claims-heavy questions, and high-value refunds route to
  a human with full conversation context and recommended next action. Over time,
  the system learns which prompts, bundles, and escalation paths drive completed
  orders and higher subscriber retention for each merchant.
goToMarketSeed:
  firstCustomer: >-
    A Shopify Plus replenishment brand using Recharge and Klaviyo that already
    runs click-to-WhatsApp campaigns and sees a daily backlog of reorder,
    subscription, and product-fit questions in chat
  buyingTrigger: >-
    A surge in WhatsApp campaign volume, subscription growth, or seasonal launch
    activity that overwhelms support agents and exposes lost revenue from
    unanswered chat conversations
  currentAlternative: Manual agents working in a WhatsApp inbox or helpdesk plus Shopify links, subscription-portal redirects, and generic BSP automation
  switchingReason: >-
    The wedge keeps the shopper in one thread and uses live commerce context to
    close the order or subscription action immediately, which generic inboxes
    and rule-based automation cannot do well
  pricingHypothesis: >-
    Annual SaaS subscription plus usage priced by managed commerce conversations
    or active subscribers, starting with low-five-figure contracts for one brand
    team
