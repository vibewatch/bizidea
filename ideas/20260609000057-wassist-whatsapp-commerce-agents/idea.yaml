    sourceRefs: [1]
differentiator: >-
  This is not a generic AI chatbot and not a broad WhatsApp agency tool. It is
  purpose-built for repeat-purchase commerce flows where the missing value is
  execution inside the thread, not better copy generation. The moat comes from
  combining merchant-specific order, subscription, campaign, and escalation data
  into a conversation-to-conversion loop that improves with every resolved
  reorder and saved subscriber.
