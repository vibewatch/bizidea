slug: whatsapp-reorder-concierge
date: '2026-06-09'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: YYYY-MM
    source: >-
      [BP date 2026-06-09] base case starts the month after the plan date so the pre-seed round is available before hiring
      and pilot spend ramp.
  - id: A2
    name: Opening cash
    value: '2200.0'
    unit: USDK
    source: >-
      [BP fundingAsk targetFundingRangeUsd $2-3M] base case uses a $2.2M pre-seed near the low end of the stated range,
      leaving only a modest cash cushion at the end of Y3.
  - id: A3
    name: Customer unit in the model
    value: active paying brand
    unit: definition
    source: >-
      [BP market SOM 60 brands; BP milestones Month 12 reach 5 production brands] customersEop tracks paying merchant
      brands rather than conversations because the milestone language is brand based.
  - id: A4
    name: Starting customers (M1)
    value: '0'
    unit: count
    source: >-
      [BP milestones 0-12 months] the company starts pre-revenue and only begins paid pilots after early interview and
      design-partner work.
  - id: A5
    name: Y1 new customers by month
    value: '[0,0,1,1,0,1,0,1,0,0,1,0]'
    unit: count
    source: >-
      [BP experimentRoadmap paid pilot pricing test; BP milestones Month 9 first 2 pilots convert, Month 12 reach 5
      production brands] ramp assumes 2 paid pilots inside the first 90 days and 5 paying brands by year end.
  - id: A6
    name: Y2 new customers by quarter
    value: '[2,2,3,3]'
    unit: count
    source: >-
      [BP milestones 12-24 months; BP gtm channels] founder-led selling plus the first referral partner grows the base to
      15 brands by Q4Y2 without assuming a broad self-serve motion.
  - id: A7
    name: Y3 new customers by quarter
    value: '[4,5,5,6]'
    unit: count
    source: >-
      [BP milestones 24-36 months; BP market SOM 60 brands] base case ends at 35 brands, below the modeled SOM ceiling
      and consistent with gradual partner-assisted expansion.
  - id: A8
    name: Realized pricing ramp
    value: >-
      Y1 annualized price per active brand by month = [18,18,18,18,18,24,24,30,30,30,36,36]; Y2 by quarter = [36,42,48,54];
      Y3 by quarter = [54,60,60,66] (USDK)
    unit: annual USDK per active brand
    source: >-
      [BP gtm pricing $15k-$25k paid pilot converting to $30k-$60k annual contract value; BP businessModel revenueStreams;
      Research competitors public price floors from Gorgias, Zoko, Interakt, and respond.io] early periods reflect pilot
      pricing, while later periods reflect production subscriptions plus moderate usage expansion.
  - id: A9
    name: Revenue recognition method
    value: average active customers in period multiplied by blended annualized price
    unit: formula
    source: >-
      Startup-finance heuristic: new brands go live mid-period on average, so recognized revenue uses the midpoint between
      beginning and ending customers for each month or quarter.
  - id: A10
    name: Gross margin ramp
    value: Y1 45%-60%; Y2 60%-65%; Y3 68%-70%
    unit: percent
    source: >-
      [BP businessModel targetGrossMarginPct 70; BP risks on bespoke deployments and policy-heavy escalation] margin starts
      below target while pilots are implementation-heavy and reaches the target only once onboarding and guardrails
      standardize.
  - id: A11
    name: Loaded salary bands
    value: Founder 150; Engineering 140; Solutions 110; Customer Success 100; Sales 130
    unit: annual USDK per FTE
    source: >-
      [BP team] plus startup-finance heuristic for a lean vertical SaaS team with cash compensation, payroll taxes, and
      benefits included.
  - id: A12
    name: Hiring schedule
    value: >-
      Founding eng M1; solutions engineer M4; backend integrations eng M7; customer success strategist M10; first sales
      hire M18; third engineer M21; second customer success hire M28; second sales hire M31
    unit: timing
    source: >-
      [BP team startTiming; BP strategicChoices.sequencingRationale] only the first four roles come directly from the plan;
      later hires are added as a heuristic after pilot-to-production proof appears.
  - id: A13
    name: Payroll allocation policy
    value: >-
      Founder 60% S&M and 40% G&A; engineering 100% R&D; solutions engineer 60% S&M and 40% R&D; customer success 70% S&M
      and 30% G&A; sales 100% S&M
    unit: policy
    source: >-
      [BP team role rationales; BP gtm founder-led sales; BP operations] reflects a company that sells through the founder,
      ships product through engineering, and treats onboarding as part implementation and part revenue support.
  - id: A14
    name: Non-payroll operating expense ramp
    value: >-
      Y1 monthly other opex = R&D 4-7, S&M 3-6, G&A 4-5; Y2 quarterly = R&D 24-33, S&M 21-42, G&A 18; Y3 quarterly = R&D
      36-45, S&M 45-63, G&A 18 (USDK)
    unit: USDK
    source: >-
      [BP operations; BP risks; Research regulatoryTechnicalConstraints] covers cloud inference, travel, compliance review,
      legal, data tooling, and merchant onboarding costs outside payroll.
  - id: A15
    name: Steady-state monthly churn for unit economics
    value: '1.5'
    unit: percent
    source: >-
      Startup-finance heuristic: annual contracts and embedded workflow setup should support good retention, but a narrow
      category still carries some consolidation and incumbent-suite risk.
  - id: A16
    name: Blended CAC
    value: '37.2'
    unit: USDK
    source: >-
      Calculated from modeled Y2-Y3 sales and marketing spend of about $1.12M divided by 30 new brands; consistent with
      founder-led enterprise sales plus partner referrals rather than a cheap self-serve funnel.
  - id: A17
    name: Funding sizing rule
    value: reach next financing proof point plus 6 months of buffer
    unit: policy
    source: >-
      Developer instruction; [BP fundingAsk runwayMonths 18] round is sized to get past the first 24 months of brand and
      partner proof and still preserve a modest cash buffer.
  - id: A18
    name: Cash flow simplification
    value: ending cash equals opening cash plus cumulative EBITDA
    unit: formula
    source: 'Startup-finance heuristic: asset-light software model assumes minimal capex, debt, and working-capital distortion.'
