scenarios:
  downside:
    description: >-
      Pilot conversion slips, partner referrals arrive late, and manual review keeps margin below target for an extra year.
    y3RevenueK: 1110.0
    y3EbitdaK: -680.0
    cashLowPointK: -95.0
    keyAssumptionChanges:
      - Y3 end customers fall to 26 instead of 35
      - Y3 blended annualized price tops out at $54K instead of $66K
      - Gross margin reaches only 65%
  base:
    description: >-
      Founder-led pilots convert on schedule, one referral channel works in Y2, and usage plus workflow expansion lift ARPU
      into the top half of the BP range by Y3.
    y3RevenueK: 1477.5
    y3EbitdaK: -473.57
    cashLowPointK: 333.87
    keyAssumptionChanges:
      - Q4Y3 ends at 35 active brands
      - Y3 exit annualized price reaches $66K per brand
      - Gross margin reaches the 70% target in Y3
  upside:
    description: >-
      Agency and BSP referrals accelerate customer adds while onboarding stays standardized enough to avoid a matching
      headcount spike.
    y3RevenueK: 1830.0
    y3EbitdaK: -250.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - Q4Y3 ends at 42 active brands
      - Y3 exit annualized price reaches $72K per brand
      - Gross margin improves to 72%
sensitivity:
  - variable: ARPU
    downsideCase: $54K exit annualized brand ARPU
    baseCase: $60K-$66K exit annualized brand ARPU
    upsideCase: $66K-$72K exit annualized brand ARPU
    y3RevenueImpactK: -210.0
    cashImpactK: -147.0
  - variable: CAC
    downsideCase: $48K blended CAC from slower referrals and more founder-driven sourcing
    baseCase: $37K blended CAC
    upsideCase: $30K blended CAC from stronger partner-sourced pipeline
    y3RevenueImpactK: -120.0
    cashImpactK: -185.0
  - variable: churn
    downsideCase: 2.5% monthly churn
    baseCase: 1.5% monthly churn
    upsideCase: 1.0% monthly churn
    y3RevenueImpactK: -95.0
    cashImpactK: -90.0
  - variable: sales cycle
    downsideCase: Pilot-to-production closes slip by one quarter
    baseCase: Qualified deals close inside one pilot quarter
    upsideCase: Referral deals close in under two months
    y3RevenueImpactK: -240.0
    cashImpactK: -175.0
  - variable: gross margin
    downsideCase: 65%
    baseCase: 70%
    upsideCase: 72%
    y3RevenueImpactK: 0.0
    cashImpactK: -74.0
  - variable: hiring pace
    downsideCase: Hire second sales and second CS six months earlier
    baseCase: Add post-sale and GTM hires only after proof points
    upsideCase: Delay one growth hire by a quarter
    y3RevenueImpactK: -60.0
    cashImpactK: -160.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified WhatsApp brands] --> Pilots[Paid pilot brands]
      Pilots --> Production[Production brands]
      Production --> Revenue[Subscription plus usage revenue]
      Revenue --> GrossProfit[Gross profit after human review and messaging costs]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: Revenue is driven by reaching 35 paying brands by Q4Y3 and lifting realized annualized revenue per brand from pilot-level $18K to $66K as production and usage expand.
  - checkName: Must go right
    finding: The company must convert paid pilots into production inside one quarter so founder-led sales and one early referral channel can support the customer ramp without adding a larger field team.
  - checkName: Model breaks if
    finding: The base case stops working if onboarding remains services-heavy and gross margin stalls near 65%, because the cash cushion falls below zero in the downside scenario.
  - checkName: Next-round proof
    finding: The next financing is justified once the business shows roughly 24 production brands, benchmark reporting on lift and automation coverage, and a visible path to near-breakeven quarterly burn.
sanityChecks:
  ruleOf40: "Y3 growth 231% + EBITDA margin -32% = 199%"
  burnMultiple: "0.46x Y3 burn multiple ($0.47M EBITDA burn / $1.03M net new revenue)"
  revenuePerFte: "$164K Y3 revenue per FTE (9 exit FTE; early vertical SaaS benchmark roughly $150K-$250K)"
  flags:
    - Y3 remains EBITDA negative, so the company still needs a seed round even in the base case.
    - Revenue per FTE only clears the low end of the benchmark range, which means partner-sourced growth and expansion revenue need to improve before the org can scale comfortably.
    - The model assumes gross margin reaches 70% only after onboarding and guardrails standardize; if compliance review stays manual longer, burn worsens quickly.
