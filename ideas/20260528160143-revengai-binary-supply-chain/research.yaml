competitors:
- name: RevEng.AI
  stage: scale-up
  wedge: AI-powered binary analysis and reverse engineering without source access.
  pricing: Custom enterprise pricing / request demo.
  strength: Strong category validation in defense-adjacent settings through NATO Innovation Fund and In-Q-Tel backing, plus clear binary-native positioning.
  weaknessVsUs: Public messaging emphasizes analysis capability more than a defense-prime release-acceptance workflow and accreditation dossier system.
  sourceRefs:
  - 1
  - 2
  - 31
  - 32
- name: Binarly
  stage: scale-up
  wedge: Binary-level validation, SBOM truth, exploit-aware scoring, and procurement-facing third-party software assessment.
  pricing: Enterprise sales motion; no public list pricing.
  strength: Closest strategic overlap because it explicitly targets procurement/TPRM and validates binaries directly without source code.
  weaknessVsUs: Broad horizontal platform across industries; less visibly optimized for defense-prime approval memory, supplier history, and ATO-style release packets.
  sourceRefs:
  - 21
  - 22
- name: Finite State
  stage: scale-up
  wedge: Product security automation for connected devices, firmware, SBOMs, and audit-ready compliance evidence.
  pricing: Enterprise sales motion; no public list pricing.
  strength: Strong fit for firmware-heavy OEMs and regulated product teams that need compliance mapping and evidence export.
  weaknessVsUs: Leans toward manufacturer-side product security and lifecycle management rather than prime-contractor intake of third-party mission software.
  sourceRefs:
  - 25
  - 26
- name: ReversingLabs
  stage: incumbent
  wedge: Broad software supply chain security, package reputation, and artifact analysis through Spectra Assure.
  pricing: Enterprise platform pricing via sales.
  strength: Strong brand, mature documentation, and credibility with AppSec and supply-chain buyers.
  weaknessVsUs: Public positioning is broader AppSec and package trust, which leaves room for a narrower binary acceptance workflow inside defense programs.
  sourceRefs:
  - 29
  - 30
- name: NetRise
  stage: scale-up
  wedge: Binary-first asset and firmware analysis with SBOM management when source code is unavailable.
  pricing: Enterprise sales motion; no public list pricing.
  strength: Clear articulation of why compiled-artifact analysis matters for critical infrastructure and device-heavy environments.
  weaknessVsUs: More oriented to firmware and asset-security programs than to release-acceptance decisions for subcontractor software in defense primes.
  sourceRefs:
  - 33
