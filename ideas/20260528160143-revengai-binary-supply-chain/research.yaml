  adoptionFrictionMatrix:
  - friction: Classified and air-gapped programs may resist cloud analysis of sensitive binaries
    severity: high
    affectedBuyer: Defense primes and regulated OEM security leads
    mitigation: Offer on-prem, disconnected processing and exportable evidence packs from the start.
