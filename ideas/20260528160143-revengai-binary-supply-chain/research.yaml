  sensitivityCases:
  - case: GitHub, GitLab, or broader AppSec suites move further into binary artifact approval and supplier evidence workflows
    impact: The startup’s wedge narrows unless it offers substantially better explainability, no-source analysis depth, and defense-specific approval memory.
    sourceRefs:
    - 29
    - 44
    - 45
    - 46
  - case: Binary-first vendors add procurement-grade accreditation dossiers for defense and aerospace buyers
    impact: Competitive intensity rises quickly because the technology thesis is already validated by several adjacent vendors.
    sourceRefs:
    - 21
