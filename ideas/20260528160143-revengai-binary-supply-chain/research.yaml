  - friction: Analysts may not trust opaque model outputs in mission-critical decisions
    severity: high
    affectedBuyer: Program assurance and accreditation reviewers
    mitigation: Make every finding explainable, reviewable, and tied to concrete binary evidence rather than only a score.
