openQuestions:
- How often do target primes review opaque binaries and firmware at a cadence high enough to justify a standing platform rather than episodic services?
- 'What evidence package format actually satisfies program reviewers: annotated binary findings, validated SBOMs, VEX, analyst narrative, or some combination?'
- Will first customers accept cloud processing for unclassified artifacts, or is on-prem / air-gapped deployment table stakes from the outset?
- Does the budget sit with product security, supplier risk, or the specific program office that owns release approvals?
