    - 31
    - 33
  - case: Procurement reform stays document-heavy and slower than promised
    impact: Sales cycles stay long and the product must win on analyst time savings before buyers trust it as a release gate.
    sourceRefs:
    - 3
    - 7
    - 8
  validationPlan:
  - priority: high
    question: How many opaque binaries or firmware updates does a target prime actually review per month per program?
    evidenceToGather: Artifact logs, supplier portals, and release calendars from 5-10 design-partner programs.
  - priority: high
    question: Will buyers allow external SaaS analysis, or is on-prem / air-gapped deployment mandatory on day one?
    evidenceToGather: Security architecture reviews and hosting constraints from defense-prime program security teams.
  - priority: medium
    question: 'Which evidence outputs actually move an accreditation or supplier-acceptance decision: risk score, annotated diff, SBOM validation, or analyst narrative?'
    evidenceToGather: Redlined approval packets and reviewer feedback from real release decisions.
  - priority: medium
    question: Does the budget sit with product security, supplier risk, or program offices?
    evidenceToGather: Current-state purchase orders for lab work, SBOM tools, and software assurance services in target accounts.
