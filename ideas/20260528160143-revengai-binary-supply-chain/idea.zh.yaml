topRisks:
- name: 采购过度集中
  description: 防务销售周期可能很慢，而且收入高度集中在少数主承包商和旗舰项目上。
  mitigation: 先在单个项目办公室里做最痛的版本验收试点，再横向扩到更多项目，并进入相邻的受监管 OEM 市场。
- name: 证据可信度缺口
  description: 如果没有人能核验的输出，保障团队可能不愿把自动化二进制分析直接用在任务关键型审批上。
  mitigation: 把产品定位成分析师增效的证据生成层，交付可追溯的发现和审查轨迹，并从第一天起就把人留在审批回路里。
- name: 现有服务商反击
  description: 现有网络保障实验室和系统集成商，可能把二进制审查打包进服务合同里，拖慢独立软件的采用。
  mitigation: 把这些公司变成合作伙伴，让产品成为他们分析师实际使用的工作流和证据底座，而不是要替代他们的工具。
