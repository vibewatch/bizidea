jobsToBeDone:
- job: 当分包商在项目里程碑前推来一版二进制更新时，帮保障团队判断它能不能安全集成，不必向对方索要源代码，这样我们既能守住排期，也不用吞下未知的软件风险。
  currentAlternative: 供应商声明包，加上人工逆向或沙箱审查
  successMetric: 5 个工作日内拿到有文档记录的 go / no-go 决策的入站版本占比
- job: 当资质审查人员追问我们为何信任某个第三方固件镜像时，帮项目安全负责人快速拿出制品级证据，这样审批就不会卡在邮件往来和供应商口头承诺上。
  currentAlternative: SBOM 文档、零散实验室笔记和一次性的安全备忘录
  successMetric: 为任意一个已批准版本生成可审计证据包所需的时间
