slug: defense-binary-acceptance-gate
date: '2026-05-28'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起算时间晚于 business-plan 日期
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-27] 模型从计划日期后的次月启动，这样 pre-seed 融资能先到账，再开始发生经营支出。'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: '3000.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M] 基准情形取区间中的 $3.0M pre-seed，目标是撑到 Q4Y2 里程碑，同时还留出约 6 个月缓冲。'
- id: A3
  name: 跟踪的客户单元
  value: 按付费受保护项目计，而不是按 logo 账户计
  unit: definition
  source: '[BP businessModel.unitOfValue + BP market.som] 定价和 SOM 都按受保护项目表达，所以 customersEop 统计的是付费项目，而不是母账户 logo。'
- id: A4
  name: 起始付费项目数
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] 公司起步时还没有收入，必须先拿下共创客户和付费试点。'
- id: A5
  name: 付费试点的实际成交价
  value: '25.0'
  unit: USDK per month per protected program
  source: '[BP investorMemo.initialContract $75k-$150k over 3–6 months] 这里取大约中位值，约等于 4.5 个月拿到 $112.5K。'
- id: A6
  name: 初始生产 ACV
  value: '250.0'
  unit: annualK per protected program
  source: '[BP investorMemo.initialContract + Research market.som] 对齐研究里试点后每个受保护项目的起始年度合同价。'
- id: A7
  name: Y3 退出 ACV
  value: '312.0'
  unit: annualK per protected program
  source: '[BP pricing premium modules + BP businessModel expansionLevers] 假设生产账户到 Y3 会在 $250K 起始 ACV 之上，继续挂上部署、报告和 usage premium。'
- id: A8
  name: Y1 付费项目爬坡
  value: M5 1, M7 2, M10 3, M12 4
  unit: customersEop
  source: '[BP milestones 0–12 months] 对齐第 1 年 3 个付费试点、2 个年费转化，以及年末再上线 1 个项目。'
- id: A9
  name: Y2 付费项目爬坡
  value: Q1Y2 5, Q2Y2 7, Q3Y2 10, Q4Y2 12
  unit: customersEop
  source: '[BP milestones 12–24 months] 贴合“到第 24 个月至少 10 个活跃项目，且多个客户扩出单项目”的目标。'
- id: A10
  name: Y3 付费项目爬坡
  value: Q1Y3 14, Q2Y3 15, Q3Y3 17, Q4Y3 18
  unit: customersEop
  source: '[BP milestones 24–36 months + Research market.som] 到第 3 年跑出研究里约 18 个受保护项目的 SOM 形态。'
- id: A11
  name: 多项目 logo 扩张
  value: 到 Q4Y3 约 6 个 logo 账户 × 每个约 3 个受保护项目
  unit: plan
  source: '[BP market.som + BP milestones 24–36 months] Y3 模型假设，大部分增长来自少量防务主承包账户内部扩张，而不是广撒 logo。'
- id: A12
  name: 收入确认方法
  value: customersEop × 当月或当季的混合实际价格
  unit: formula
  source: '[BP pricing + BP businessModel revenueStreams] 收入直接由活跃付费项目数，以及试点、订阅和高级部署收入的混合结构推导。'
- id: A13
  name: Y1 毛利率
  value: '55.0'
  unit: percent
  source: '[BP targetGrossMarginPct 70 + BP sequencingRationale] 早期试点还带着分析师审查和部署拖累，所以第 1 年毛利率会明显低于长期目标。'
- id: A14
  name: Y2 毛利率
  value: '63.0'
  unit: percent
  source: '[BP targetGrossMarginPct 70] 随着离线部署和证据包工作流开始可复制，毛利率在生产项目之间逐步改善。'
- id: A15
  name: Y3 毛利率
  value: '70.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 一旦分析师工作大多只剩升级处理，部署 playbook 也标准化，基准情形在 Y3 达到 business-plan 目标。'
- id: A16
  name: 用于单位经济模型的月流失率
  value: '1.5'
  unit: percent
  source: '[Startup-finance heuristic, enterprise security] 这类嵌入式的年费安全产品，通常要把月流失率守在 2% 以下；基准情形取 1.5%，因为续费数据还没被证明。'
- id: A17
  name: 混合 CAC
  value: '120.0'
  unit: USDK per new paid protected program
  source: '[BP gtm funnelTargets + BP buyingProcess + startup-finance heuristic] 防务试点、采购审查和伙伴辅助销售，意味着每拿下一个新付费受保护项目，都要付出六位数级别的获客成本。'
- id: A18
  name: 全成本薪酬带宽
  value: 创始人 200；工程 220；安全研究 210；部署/产品 190；销售/GTM 230；成功/运营 160；G&A 140
  unit: annualK per FTE
  source: '[BP team + startup-finance heuristic] 采用精简但符合市场的美国防务软件现金薪酬，并计入工资税和福利。'
- id: A19
  name: 招聘节奏
  value: 安全工程师 M2；部署工程师 M4；GTM 负责人 M9；成功/运营 M13；第二名工程师 M15；第二名 GTM M18；第三名工程师 M25；第二名安全工程师 M27；第二名部署工程师 M30；G&A M33
  unit: timing
  source: '[BP team + BP sequencingRationale] 招聘跟着产品验证、部署可复制性和试点转正走，不会在太早阶段就按 SOM 规模去堆人。'
- id: A20
  name: 经营费用口径
  value: 各部门科目反映总职能支出；salaryK 是为核对工资而单列的备忘行，不与 opex 重复相加
  unit: accounting policy
  source: '[BP operations + startup-finance heuristic] 模型把工资单独列出来，好让 headcount 能对上 salaryK；但 EBITDA 仍按各部门总 opex 计算。'
- id: A21
  name: 现金流简化规则
  value: 期末现金 = 期初现金 + 累计 EBITDA
  unit: formula
  source: '[Startup-finance heuristic] 假设这是一家轻资产软件公司，capex、债务和营运资金扰动都很小。'
- id: A22
  name: 融资规模规则
  value: 融资额要足以撑到 Q4Y2 里程碑，同时还留出约 6 个月缓冲
  unit: policy
  source: '[BP fundingAsk runwayMonths 18 + model requirement] 融资额不是按最低生存线来定，而是按下一轮融资证明点再加安全垫来定。'
