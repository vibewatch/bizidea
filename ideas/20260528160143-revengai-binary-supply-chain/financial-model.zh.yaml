      PaidPilots --> ProtectedPrograms
      ProtectedPrograms --> ExpansionPrograms
      ExpansionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形依赖前期试点转成生产，并在 Q4Y3 走到 18 个付费受保护项目；同时每个项目的价格从约 $250K 抬到年化 $312K 的退出 ACV。
- checkName: 必须跑通的点
  finding: 大约 6 家防务主承包 logo 内部的多项目扩张必须成立，因为模型更依赖“1 个项目扩到 3 个项目”，而不是快速新增 logo。
- checkName: 模型失效条件
  finding: 只要离线部署继续偏服务化，或试点转化再慢 1–2 个季度，downside 情形就会把现金打到接近归零，然后才轮到下一轮融资。
- checkName: 下一轮融资证明点
  finding: 如果公司到 Q4Y2 做到 10-12 个活跃项目，证明 5 天证据包可以复制，并展示每个客户已能从单项目扩到生产多项目，下一轮融资就有了扎实依据。
sanityChecks:
  ruleOf40: Y3 增长 123.5% + EBITDA 利润率 6.2% = 129.7%
  burnMultiple: Y2 的 burn multiple 约为 0.6x：$1.0M EBITDA burn 对应 $1.66M 净新增收入；随着 H2Y3 EBITDA 转正，指标方向上也开始转正。
  revenuePerFte: 按 Q4Y3 的 12 名 FTE 计算，Y3 每名 FTE 对应收入约 $387.5K（垂直 SaaS / 安全的常见区间约为 $200–400K）。
  flags:
  - 模型假设 customersEop 统计的是付费受保护项目，因此 Y3 收入更依赖少数 logo 内部的多项目扩张，而不是广泛新增 logo。
  - 在只有 $3.0M pre-seed 的前提下，现金还能保持为正，主要因为业务在 Q1Y3 已接近 breakeven；只要部署或转化稍微滑一点，就很可能需要 bridge 资金。
  - 毛利率要爬到 70%，前提是离线部署和分析师审查标准化速度要快于今天这些源文件能证明的程度。
  - CAC、churn 和 payback 都是参照被标注的企业安全启发式估算，因为输入里还没有真实续费率和 fully-loaded 销售效率数据。
