  baseCase: 年费续约后月流失率 1.5%
  upsideCase: 年费续约后月流失率 1.0%
  y3RevenueImpactK: -310.0
  cashImpactK: -215.0
- variable: 销售周期
  downsideCase: 从试点到生产的转化拉长到约 9 个月
  baseCase: 付费试点到年费转化维持在 180 天以内
  upsideCase: 与里程碑绑定的试点约 4.5 个月即可转正
  y3RevenueImpactK: -520.0
  cashImpactK: -390.0
- variable: 毛利率
  downsideCase: Y3 毛利率只有 66%，因为分析师审查仍是默认模式
  baseCase: Y3 毛利率 70%
  upsideCase: 离线部署标准化后，Y3 毛利率 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -185.0
- variable: 招聘节奏
  downsideCase: 额外多招 2 名部署或安全 FTE，且提前 2 个季度入职
  baseCase: 按计划在 Q4Y3 走到 12 名 FTE
  upsideCase: 把 1 名非核心支持或 G&A 招聘推迟到 Q4Y3 之后
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
