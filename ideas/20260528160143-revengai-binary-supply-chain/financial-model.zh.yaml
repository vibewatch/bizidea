scenarios:
  downside:
    description: 试点转化变慢、单个 logo 的扩张更接近 2 个项目、而且交付仍高度依赖分析师，导致毛利率低于计划。
    y3RevenueK: 3960.0
    y3EbitdaK: -311.8
    cashLowPointK: 56.9
    keyAssumptionChanges:
    - Q4Y3 结束时只有 16 个付费受保护项目，而不是 18 个。
    - 退出 ACV 更接近 $200K 中段，因为部署和报告 premium 的挂载更慢。
    - Y3 毛利率只提升到 67%，因为离线部署仍偏服务化。
  base:
    description: 第 1 年 3 个试点按计划转正，少数几家防务主承包商从 1 个项目扩到约 3 个项目，而且毛利率在 Y3 达到 business-plan 目标。
    y3RevenueK: 4650.0
    y3EbitdaK: 290.0
    cashLowPointK: 581.6
    keyAssumptionChanges:
    - Q4Y2 达到 12 个活跃受保护项目，Q4Y3 达到 18 个。
    - 生产定价从每个受保护项目约 $250K 起步，到 Y3 末在高级模块带动下接近年化 $312K。
    - 随着分析师工作主要变成升级处理，毛利率从 Y1 的 55% 提升到 Y3 的 70%。
  upside:
    description: 参考案例压缩了信任建立时间，伙伴能带来更多合格项目，早期主承包商内部的多项目铺开也更快。
    y3RevenueK: 5362.0
    y3EbitdaK: 842.0
    cashLowPointK: 876.9
    keyAssumptionChanges:
    - Q4Y3 达到 20 个付费受保护项目，而不是 18 个。
    - 随着更多项目购买离线部署和资质报告 premium，退出 ACV 落在 $330K 低段。
    - Y3 毛利率达到 71%，因为 onboarding 和证据打包标准化得更快。
