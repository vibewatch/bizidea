jobsToBeDone:
  - job: When a subcontractor ships a binary update before a program milestone, help our assurance team decide if it is safe to integrate without demanding source code, so we can hit schedule without accepting unknown software risk.
    currentAlternative: Supplier attestation packs plus manual reverse-engineering or sandbox review
    successMetric: Percentage of incoming releases receiving a documented go or no-go decision within five business days
  - job: When an accreditation reviewer asks why we trusted a third-party firmware image, help our program-security lead produce artifact-level evidence quickly, so approval does not hinge on email trails and vendor promises.
    currentAlternative: SBOM paperwork, ad hoc lab notes, and one-off security memos
    successMetric: Time to produce an audit-ready evidence packet for any approved release
