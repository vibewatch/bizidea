topRisks:
  - name: Procurement concentration
    description: Defense sales cycles may be slow and heavily concentrated in a small number of prime contractors and flagship programs.
    mitigation: Start with acute release-acceptance pilots inside one program office, then expand horizontally across programs and into adjacent regulated OEM markets.
  - name: Evidence trust gap
    description: Assurance teams may hesitate to rely on automated binary analysis for mission-critical approval decisions without human-verifiable outputs.
    mitigation: Position the product as analyst-augmenting evidence generation, ship explorable findings and review trails, and keep humans in the approval loop from day one.
  - name: Incumbent services response
    description: Existing cyber-assurance labs and systems integrators may bundle binary review into services contracts and slow standalone software adoption.
    mitigation: Partner with those firms as workflow and evidence infrastructure, making the product the system of record that their analysts use rather than a tool they displace.
