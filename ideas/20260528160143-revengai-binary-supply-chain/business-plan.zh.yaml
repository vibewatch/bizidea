slug: defense-binary-acceptance-gate
date: '2026-05-27'
executiveSummary: 公司起手不该做通用型软件供应链平台，也不该做大而全的 AppSec 套件，而要先把自己钉死在“防务主承包商的二进制验收闸门”上。第一个客户应是一项与 NATO 对齐的防务主承包项目：它会持续收到分包商二进制或固件更新，没有源代码托管，却又必须在里程碑或资质审查前更快完成放行。研究支持一个聚焦市场：估算 TAM 为 $180.0M、SAM 为 $54.0M；如果公司能以按项目定价拿下少量多项目防务客户，第 3 年可触达的 SOM 为 $4.5M。产品起步应是分析师在环的工作流：扫描每个入站制品，解释可疑发现，并产出能嵌进现有保障与供应商风险流程的审批档案。这个刻意的取舍，是要拿下不透明二进制的放行决策，而不是去和现有厂商正面拼大而全的漏洞管理或源代码扫描广度。最关键的节奏选择，是先在非密级或其他摩擦更小的项目上证明价值，并配好离线部署支持；等证据格式和导入动作被信任后，再扩到更敏感环境。最大的反证风险有三点：目标项目每月制品量不够、团队不信机器辅助的二进制发现、以及隔离网络环境部署太复杂。现有输入没有给出已上线的防务主承包案例，也没有生产级检测基准，所以早期试点必须先证明真实审查量、分析师接受度和转化率，再考虑扩招和放大 burn。
problem:
- 防务主承包商越来越多接收的是已编译的可执行文件、固件镜像和第三方应用，而且拿不到源代码；但他们依然得按时做出版本放行和资质决策。
- 现有替代方案——比如供应商声明、SBOM 文档、人工逆向实验室和选择性沙箱测试——要么太慢、要么太零散、要么太浅，撑不起每个入站制品都能重复执行的 go / no-go 决策。
solution:
- 检查每个入站二进制或固件制品，把可疑函数、隐藏依赖、异常行为和策略违规项直接拎出来，同时让人工审查员始终留在审批回路里。
- 生成可直接用于资质审查的证据包，并沉淀按供应商划分的决策历史，让保障团队在不要求供应商托管源代码的前提下，也能批准、拒绝或升级版本。
whyWeWin:
- 切口卡在版本验收，这里的买方、触发点、现有工作流和可量化 ROI，都比大而全的软件供应链工具更清楚。
- 无源代码分析既保住了供应商 IP，又能给主承包方制品级证据，这是纯文档控制给不了的。
- 供应商基线、跨版本二进制 diff 和审批历史会滚成项目专属的信任记忆；每多审一个版本，产品就更值钱。
strategicChoices:
  beachhead: 先打与 NATO 对齐的防务主承包商和任务系统 OEM。这些团队在无人机、ISR、保密通信等软件密集型项目里，会持续接收分包商二进制或固件更新，但拿不到完整的源代码托管。
  wedgeRationale: 和更宽泛的 SBOM 管理或全栈 AppSec 相比，二进制版本验收更窄、也更容易证明价值：一个项目在一次试点里就能量出制品周转时间、升级审查率和审查员采用度，而且不必替换掉现有安全栈。
  sequencingRationale: 先做分析师辅助的证据生成、按项目部署，以及离线 / 本地支持，因为真正卡住成交的是审查员信任和部署可接受性。等公司证明了持续制品量、被信任的证据包和试点转正，再加深供应商记忆、工作流集成，然后才去扩相邻的受监管 OEM 市场或更广的软件供应链控制。
  notYet:
  - 在还没在低摩擦防务项目上跑通可复制工作流之前，不碰完全密级网络部署
  - 不做会稀释二进制验收切口的广义源代码 SAST、SCA 或开发者平台模块
  - 在拿下至少 2 个防务主承包生产案例前，不急着扩到关键基础设施、医疗科技和工业 OEM
market:
  tam: 估算 TAM 为 $180.0M：大约 120 家受监管组织 × 每家约 3 个软件密集型项目 × 每个项目约 $0.5M 的年度二进制保障支出。
  sam: 估算 SAM 为 $54.0M：约 30 家与 NATO 对齐的防务与相邻任务系统组织 × 每家约 3.6 个相关项目。
  som: 模型测算第 3 年可触达的 SOM 为 $4.5M：6 家客户各自扩到约 3 个项目，试点后每个项目的起始 ACV 约为 $250k。
  segments:
  - 主要细分：持续接收分包商二进制或固件、且拿不到源代码托管的 NATO 对齐防务主承包商和任务系统 OEM
  - 次级细分：在防务切口被证明后，再扩到有类似“无源代码软件验收”流程的受监管航天、关键基础设施和设备 OEM
  buyingProcess: 业务上的 champion 往往是单个项目里的软件保障负责人、供应商网络安全 owner 或产品安全经理；真正拍板花钱的，通常是工程保障副总裁、项目 CISO 或产品安全总监。交易应该先从一笔与真实版本或资质事件绑定的付费试点切入；等团队看到决策更快、文档留痕更完整、对外包实验室的依赖更低，再转成年费。
product:
  mvp: MVP 要能接收可执行文件和固件镜像，在没有源代码的前提下跑可解释的二进制检查，并生成一份面向审查员的证据包，给出 pass、fail 或 escalate 建议，同时带上 custody 链和供应商历史。它一开始就要以分析师辅助模式上线，并提供本地或离线部署选项，再加上和版本 / 变更控制流程的轻量集成。
  sixMonth: 在一套参考架构上跑通部署，把证据包交付周期压到 5 个工作日内，并证明至少 2 个共创客户能用这套工作流做真实的版本决策，而不需要额外定制源代码审查。
  twelveMonth: 补上供应商基线、跨版本 diff、工单和 SCM 集成、按项目类型沉淀的策略模板，以及仍需人工实验室审查的制品升级路径。
  twentyFourMonth: 从单项目试点扩到多项目铺开，强化离线部署运营能力，再把同一套证据与记忆工作流延伸到相邻的航天和关键基础设施 OEM 客户。
  keyBets:
  - 单个项目办公室每月会有足够多的不透明制品流入，值得配一套常驻工作流产品，而不是继续按次购买服务。
  - 分析师辅助的二进制证据，比一上来就做全自动 pass / fail，更容易赢得信任。
  - 在防务客户里，按项目部署和定价，比一开始就卖企业级全平台承诺更容易成交。
  - 在前几十个制品之后，供应商专属基线确实能明显减少升级审查量，并加快重复放行。
gtm:
  wedge: 先卖给某个防务项目一笔付费试点：在版本里程碑前审查入站二进制或固件；等客户开始依赖证据包和供应商历史做常态化放行决策，再转成按项目收年费的订阅。
  channels:
  - 创始人亲自去打 NATO 对齐主承包商里的软件保障、供应商网络安全、产品安全和项目安全负责人
  - 让防务网络保障和资质顾问把这套工作流嵌进他们现有的审查流程里
  - 从供应商门户、SCM、工单或变更控制等既有版本审批流里做集成式切入
  funnelTargets: 从合格账户到付费试点的转化率目标为 15–25%，从试点到生产转化要做到 50% 以上，中位数 paid pilot 到年费转化周期要压在 180 天以内。
  pricing: 先按单个项目收一笔付费试点费用，随后按受保护项目收年费订阅，含一定的二进制 / 固件分析量；如果版本吞吐更高，再收超量费。对离线或隔离网络部署、资质报告以及合作伙伴交付的审查支持，再加 premium，保证定价能贴合客户原本的保障预算结构。
businessModel:
  revenueStreams:
  - 按受保护的防务或任务系统项目收年费订阅
  - 超出包含额度后的二进制和固件镜像 usage 费
  - 高级部署、离线运营和资质报告服务
  unitOfValue: 带有二进制和固件审查额度的受保护项目
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一家主承包商或 OEM 内，从一个项目扩到多个项目
  - 提高制品量，并挂上高级证据、部署和支持模块
  - 等防务参考客户跑出来后，再把工作流延伸到相邻的受监管 OEM 市场
strategyMap:
  northStarMetric: 入站不透明版本在 5 个工作日内拿到有文档记录的 go / no-go 决策，并被项目审查员接受的比例
  inputMetrics:
  - 每个活跃项目每月审查的二进制或固件镜像数量
  - 从收到制品到完成证据包的中位时间
  - 无需外包实验室升级、即可关单的已审制品占比
  - 试点转生产转化率
  - 每个生产客户覆盖的平均项目数
  moatsToBuild:
  - 供应商专属的二进制基线和跨版本 diff 历史
  - 把发现、审查员、供应商和最终版本结果连起来的审批记忆
  - 为防务资质工作流设计的离线部署和证据模板
  - 接到供应商门户、SCM 和变更控制关口的集成，让工作流很难被拔掉
  killCriteria:
  - 在 25 次合格滩头会议后，付费试点仍少于 3 个
  - 试点项目每月有意义的二进制或固件审查量中位数低于 15 个
  - 前 6 个试点之后，试点转生产仍低于 50%
  - 超过 70% 的合格潜客在看完证据工作流后，仍默认回到现有实验室或已有平台
  mermaid: |
    flowchart LR
      Wedge[Defense binary acceptance wedge] --> MVP[Analyst-in-the-loop binary evidence gate]
      MVP --> Proof[Fast approval dossiers and repeat supplier memory]
      Proof --> Expansion[Multi-program rollout and regulated OEM expansion]
investorMemo:
  verdict:
    call: 值得见面 / 继续深挖
    conviction: 切口非常清晰、赛道验证也够强，但最终 conviction 仍取决于：项目里是否真有足够制品量，以及离线部署里审查员会不会真正信这套证据。
    whyBelieve: 这套计划对准的是一个具体的防务版本验收任务：买方清楚、合规压力明确、现有以文档为主的替代方案也明显更差。
    whyDoubt: 二进制分析在位企业和产品安全平台都可能切进这条工作流；而采购慢、部署摩擦大，也可能让这个类别迟迟长不起来。
    nextDiligence: 先拿下 2–3 个付费试点，证明每月确有真实审查量，审查员愿意用这套证据包，并且能转成常态化版本闸门。
  firstCustomer:
    title: NATO 对齐防务主承包商里的软件保障负责人
    profile: 一家防务主承包商，在无人机、ISR、保密通信或任务软件方向上跑着 3–10 个软件密集型项目，并且每月会从 20 家以上供应商那里收到分包商二进制或固件更新。
    trigger: 一个即将到来的里程碑、资质审查，或一轮必须快速批准、却拿不到源代码托管的紧急供应商软件更新。
    buyer: 工程保障副总裁、产品安全总监或项目 CISO
    initialContract: 单个项目 3–6 个月的付费试点，金额 $75k-$150k；转正后每个项目大约 $250k+ 年费订阅，再叠加部署和 usage 费用。
  mustBeTrue:
  - 目标项目每月必须处理足够多的不透明二进制或固件更新，否则不值得配一套常驻审批工作流，只会继续买按次实验室服务。
  - 分析师在环的二进制证据必须可信到足以支撑真实的 go / no-go 决策。
  - 离线或本地部署必须能交付出来，不能把每个试点都做成定制服务项目。
  - 接近研究里 $250k 起始 ACV 的按项目定价，必须能塞进现有的软件保障、供应商风险或项目安全预算。
  - 在在位企业补上类似工作流功能之前，供应商历史数据和审批记忆必须先把审查速度或决策信心拉上去。
  diligenceQuestions:
  - 目标项目每月究竟要审多少个入站二进制和固件镜像？这些制品多频繁地把排期卡住？
  - 真正能推动审批的证据输出是什么：带注释的发现、SBOM 校验、来源证明，还是分析师叙述？
  - 首批买方是否愿意接受任何范围的云端分析，还是从第一天起就必须离线部署？
  - 第一笔预算和采购权到底在谁手里：项目办公室、产品安全、供应商风险，还是中心化 CISO？
  - 在真实评估里，RevEng.AI、Binarly、Finite State 或 ReversingLabs 已经把这条工作流覆盖到什么程度？
operatingAssumptions:
- assumption: 早期试点可以先在非密级或其他摩擦更小的项目上启动，再逐步走向完全密级部署。
  basis: operator judgment
  validationTest: 在前 10 次合格会议里，至少 5 个潜客同意先用非密级、脱敏或受控制品做评估，再考虑进密网。
  decisionImpact: 如果不成立，公司在拿到第一笔收入前，就需要更重的部署路线图和更多资本。
- assumption: 目标项目团队每月至少会审 15 个不透明二进制或固件镜像。
  basis: research.yaml
  validationTest: 从 5 个共创客户项目里收集制品日志，确认月度相关审查量中位数达到 15 个以上。
  decisionImpact: 如果不成立，就要缩到更高频的项目类型，或改成“软件 + 高触达服务”的打法。
- assumption: 买方在付费试点之后，愿意接受按项目订阅并叠加制品量超额收费。
  basis: idea.yaml
  validationTest: 在 8 次预算 owner 访谈里测试 3 套定价包，并拿下 2 份带明确转正区间、接近模型起始 ACV 的试点协议或 LOI。
  decisionImpact: 如果不成立，就要下修 ACV 预期、调整到企业授权打包，或更重依赖服务收入。
- assumption: 可解释的证据包至少能让一半已审制品不必再升级到外部逆向实验室。
  basis: research.yaml
  validationTest: 在前 3 个试点里，要求至少 50% 的已审制品无需外部实验室升级即可关单，同时审查员要认为输出对决策有用。
  decisionImpact: 如果不成立，产品就做不出足够的工作流 ROI，可能需要更深的服务整合或换买方。
- assumption: 只要早期证明出来，防务网络保障和资质合作伙伴愿意帮忙分发这套工作流。
  basis: research.yaml
  validationTest: 签下 2 家顾问或渠道伙伴，并在第 15 个月前让它们贡献至少 25% 的合格 pipeline。
  decisionImpact: 如果不成立，获客仍会高度依赖直销，在创始人打单动作跑通前 burn 必须守得更紧。
experimentRoadmap:
- horizon: 0–90 天
  experiment: ICP 与制品量发现
  hypothesis: 滩头客户确实存在足够高频的不透明制品流入，值得配一套常驻审批工作流。
  successMetric: 完成 12 次合格访谈，其中 8 次匹配 ICP，且有 5 次拿出证据表明每月会审 15 个以上相关制品。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 礼宾式二进制档案试验
  hypothesis: 在人工辅助下产出的证据包，能缩短版本决策时间，并降低团队对纯文档审查的依赖。
  successMetric: 2 个共创客户各自回测至少 10 个历史制品，并证明在至少一半案例里，审查员愿意用这份档案做真实的 go / no-go 决策。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 离线部署验证
  hypothesis: 一套参考型本地 / 离线部署，可以在不做每户定制工程的前提下装起来。
  successMetric: 2 个试点环境在同一套参考架构上完成部署，且部署时间低于 3 周。
  owner: 部署工程师
- horizon: 90–180 天
  experiment: 付费版本闸门试点
  hypothesis: 与真实里程碑绑定的单项目试点，比泛化的 POC 评估更容易转正。
  successMetric: 启动 3 个付费试点；每个都绑定明确的项目版本日历和审查员 SLA。
  owner: 创始人/CEO
- horizon: 6–12 个月
  experiment: 证据包验收测试
  hypothesis: 审查员会把可解释的发现和供应商历史，作为常态化审批输入来使用。
  successMetric: 至少 2 个试点客户在生产评审会上采用这套证据包模板，并转成年费合同。
  owner: 产品负责人
- horizon: 12–18 个月
  experiment: 多项目与伙伴扩张
  hypothesis: 只要第一个项目赢得信任，同一批买方里就能顺势扩到相邻项目，并拉出伙伴带来的 pipeline。
  successMetric: 2 家客户扩到第二个项目，且至少 25% 的合格 pipeline 来自 2 家活跃的防务保障伙伴。
  owner: GTM 负责人
operations:
- 对每个被检查的版本，都要严格保留制品 custody 链日志、分析师审查笔记和审批审计轨迹。
- 持续跑误报和可解释性 QA，确保发现结果在采购和资质审查里站得住。
- 把离线部署更新、证据导出和客户专属策略模板做成核心运营能力。
- 输出要能映射到 SBOM、来源证明、声明和变更控制制品里，而不是另造一套封闭证据格式。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 在切口尚未被证明前，亲自负责 ICP 发现、防务共创客户销售、定价和伙伴拓展。
- role: 创始工程师
  startTiming: Month 0
  rationale: 搭建 MVP 所需的制品接入、二进制分析编排、证据包生成和供应商历史工作流。
- role: 逆向工程 / 安全工程师
  startTiming: Month 2
  rationale: 提升发现质量、可解释性和升级逻辑，同时避免产品滑向大而全的 AppSec。
- role: 部署工程师
  startTiming: Month 4
  rationale: 把本地与离线部署产品化，避免防务试点变成一次一议的实施项目。
- role: GTM 负责人
  startTiming: Month 9
  rationale: 只有在公司证明付费试点、部署摩擦可接受、且按项目购买路径可复制后，才加销售产能。
milestones:
- horizon: 0–12 个月
  items:
  - 启动 3 个面向已命名防务项目的二进制 / 固件验收付费试点。
  - 在至少 2 个共创客户那里，把证据包周转时间压到 5 个工作日以内。
  - 至少把 2 个试点转成年费按项目合同。
  - 标准化 1 套参考型离线部署方案，以及 1 条通往外部实验室的升级工作流。
- horizon: 12–24 个月
  items:
  - 让至少 3 家生产客户各自扩到 2 个或更多项目。
  - 在至少 10 个活跃项目里，成为版本验收证据的系统记录底座。
  - 补齐供应商基线、跨版本 diff 和工作流集成，减少重复审查的人力。
  - 建立 2 家能带来或支持合格 pipeline 的防务保障伙伴。
- horizon: 24–36 个月
  items:
  - 做到约 6 家客户，收入规模对齐研究里 $4.5M 的 SOM。
  - 借助防务参考案例，选择性打进相邻的航天或关键基础设施 OEM 客户。
  - 证明供应商记忆和可解释证据，确实能在现有替代方案面前提升留存和扩张。
risks:
- risk: 滩头市场真实制品量过低或过于零散，不足以支撑一笔常驻软件预算。
  likelihood: Medium
  impact: High
  mitigation: 只筛选版本节奏稳定的项目，尽早验证日志，在扩大 GTM 前先收缩到更高频的项目类型。
- risk: 审查员对机器辅助的二进制发现不够信任，不愿把它用于真实审批。
  likelihood: High
  impact: High
  mitigation: 让分析师始终在环，所有发现都可展开复核，先卖证据生成，再考虑全自动化。
- risk: 离线部署和客户专属安全要求，让导入过程变得过度服务化。
  likelihood: High
  impact: High
  mitigation: 先标准化一套参考架构，约束早期试点范围，并在大规模扩张前先补部署能力。
- risk: 现有二进制分析或产品安全厂商，把类似工作流功能打包进更大的平台里。
  likelihood: Medium
  impact: High
  mitigation: 趁更广厂商还没优先级前，先靠防务专属审批记忆、伙伴集成和工作流深度赢下来。
- risk: 防务采购过于集中且销售周期慢，拖累学习速度和收入兑现。
  likelihood: High
  impact: Medium
  mitigation: 把试点绑定到最痛的项目里程碑，借伙伴渠道获客，并先在单个账户内完成多项目扩张，再进入相邻市场。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 募集 18 个月资金，用来做出分析师在环的二进制验收闸门、把可复制的离线部署做出来、拿下 3–5 个付费防务试点、把首批多项目客户转正，并在更广扩张前证明证据包工作流可以成为一套常驻的系统记录底座。
