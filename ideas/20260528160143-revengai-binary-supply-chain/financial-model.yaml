scenarios:
  downside:
    description: "Pilot conversion slips, expansion stays closer to two programs per logo, and analyst-heavy delivery keeps margins below plan."
    y3RevenueK: 3960.0
    y3EbitdaK: -311.8
    cashLowPointK: 56.9
    keyAssumptionChanges:
      - "Q4Y3 ends at 16 paid protected programs instead of 18."
      - "Exit ACV stays closer to the mid-$200Ks because deployment and reporting premiums attach more slowly."
      - "Y3 gross margin improves only to 67% because disconnected deployments remain more services-heavy."
  base:
    description: "Three year-one pilots convert on plan, a handful of defense primes expand from one to about three programs each, and gross margin reaches the business-plan target by Y3."
    y3RevenueK: 4650.0
    y3EbitdaK: 290.0
    cashLowPointK: 581.6
    keyAssumptionChanges:
      - "Q4Y2 reaches 12 active protected programs and Q4Y3 reaches 18."
      - "Production pricing starts near $250K per protected program and exits Y3 near a $312K annualized level with premium modules."
      - "Gross margin rises from 55% in Y1 to 70% in Y3 as analyst effort becomes escalation-only."
  upside:
    description: "Reference wins compress trust-building, partners source more qualified programs, and multi-program rollout inside early primes happens faster."
    y3RevenueK: 5362.0
    y3EbitdaK: 842.0
    cashLowPointK: 876.9
    keyAssumptionChanges:
      - "Q4Y3 reaches 20 paid protected programs instead of 18."
      - "Exit ACV lands in the low-$330Ks as more programs buy disconnected deployment and accreditation-reporting premiums."
      - "Y3 gross margin reaches 71% because onboarding and evidence packaging are more standardized."
