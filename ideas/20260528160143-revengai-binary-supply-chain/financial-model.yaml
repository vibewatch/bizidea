modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      QualifiedAccounts --> PaidPilots
      PaidPilots --> ProtectedPrograms
      ProtectedPrograms --> ExpansionPrograms
      ExpansionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "The base case is driven by converting early pilots into 18 paid protected programs by Q4Y3 with price expansion from roughly $250K to a $312K annualized exit ACV per program."
  - checkName: Must go right
    finding: "Multi-program expansion inside about six defense-prime logos has to work, because the model relies more on 1-to-3 program expansion than on rapid new-logo count."
  - checkName: Model breaks if
    finding: "If disconnected deployments remain services-heavy or pilot conversion slips by even one to two quarters, the downside case takes cash close to zero before the next round."
  - checkName: Next-round proof
    finding: "The next financing is justified if the company reaches 10-12 active programs, proves repeatable five-day evidence packets, and shows production expansion beyond a single program per customer by Q4Y2."
sanityChecks:
  ruleOf40: "Y3 growth 123.5% + EBITDA margin 6.2% = 129.7%"
  burnMultiple: "Y2 burn multiple is about 0.6x, based on $1.0M EBITDA burn against $1.66M net new revenue, and turns directionally positive in H2Y3 as EBITDA becomes positive."
  revenuePerFte: "$387.5K Y3 revenue per FTE on 12 Q4Y3 FTE (benchmark roughly $200–400K for vertical SaaS/security)"
  flags:
    - "The model assumes customersEop tracks paid protected programs, so Y3 revenue depends on multi-program expansion inside a small set of logos rather than broad logo acquisition."
    - "Cash stays positive on a $3.0M pre-seed only because the business is near breakeven by Q1Y3; a modest deployment or conversion slip would likely require bridge capital."
    - "Gross margin reaching 70% requires disconnected deployment and analyst review to standardize faster than the source files prove today."
    - "CAC, churn, and payback are anchored to labeled enterprise-security heuristics because the inputs do not include live renewal or fully loaded sales-efficiency data."
