slug: defense-binary-acceptance-gate
date: '2026-05-28'
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: Model start after business-plan date
    value: "2026-06"
    unit: YYYY-MM
    source: "[BP date 2026-05-27] Model starts the month after the plan date so the pre-seed raise is available before operating spend begins."
  - id: A2
    name: Opening cash / pre-seed raise
    value: "3000.0"
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $2–4M] Base case uses a $3.0M pre-seed inside the stated range, sized to reach the Q4Y2 milestone and still preserve a six-month buffer."
  - id: A3
    name: Tracked customer unit
    value: "Paid protected program rather than logo account"
    unit: definition
    source: "[BP businessModel.unitOfValue + BP market.som] Pricing and SOM are expressed per protected program, so customersEop tracks paid programs and not parent logos."
  - id: A4
    name: Starting paid programs
    value: "0"
    unit: count
    source: "[BP milestones 0–12 months] The company begins pre-revenue and must first land design partners and paid pilots."
  - id: A5
    name: Paid pilot realized price
    value: "25.0"
    unit: USDK per month per protected program
    source: "[BP investorMemo.initialContract $75k-$150k over 3–6 months] Uses an approximate midpoint pilot worth about $112.5K over 4.5 months."
  - id: A6
    name: Initial production ACV
    value: "250.0"
    unit: annualK per protected program
    source: "[BP investorMemo.initialContract + Research market.som] Matches the researched starting annual contract value per protected program after pilot."
  - id: A7
    name: Y3 exit ACV
    value: "312.0"
    unit: annualK per protected program
    source: "[BP pricing premium modules + BP businessModel expansionLevers] Assumes production accounts add deployment, reporting, and usage premiums above the $250K starting ACV by Y3."
  - id: A8
    name: Y1 paid-program ramp
    value: "M5 1, M7 2, M10 3, M12 4"
    unit: customersEop
    source: "[BP milestones 0–12 months] Anchored to 3 paid pilots in year 1 with 2 annual conversions and one additional program online by year end."
  - id: A9
    name: Y2 paid-program ramp
    value: "Q1Y2 5, Q2Y2 7, Q3Y2 10, Q4Y2 12"
    unit: customersEop
    source: "[BP milestones 12–24 months] Fits the goal of at least 10 active programs and multiple customers expanding beyond a single program by month 24."
  - id: A10
    name: Y3 paid-program ramp
    value: "Q1Y3 14, Q2Y3 15, Q3Y3 17, Q4Y3 18"
    unit: customersEop
    source: "[BP milestones 24–36 months + Research market.som] Reaches the researched SOM shape of roughly 18 protected programs by year 3."
  - id: A11
    name: Multi-program logo expansion
    value: "About 6 logo accounts × about 3 protected programs by Q4Y3"
    unit: plan
    source: "[BP market.som + BP milestones 24–36 months] The Y3 model assumes most growth comes from expanding inside a small number of defense-prime accounts rather than from broad logo count."
  - id: A12
    name: Revenue recognition method
    value: "customersEop × blended realized price for the month or quarter"
    unit: formula
    source: "[BP pricing + BP businessModel revenueStreams] Revenue is modeled directly from active paid programs and the blended mix of pilot, subscription, and premium deployment revenue."
  - id: A13
    name: Y1 gross margin
    value: "55.0"
    unit: percent
    source: "[BP targetGrossMarginPct 70 + BP sequencingRationale] Early pilots include analyst review and deployment drag, so year-1 margin sits materially below the long-run target."
  - id: A14
    name: Y2 gross margin
    value: "63.0"
    unit: percent
    source: "[BP targetGrossMarginPct 70] Margin improves as disconnected deployment and evidence-packet workflows become repeatable across production programs."
  - id: A15
    name: Y3 gross margin
    value: "70.0"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 70] Base case reaches the business-plan target once analyst work is mostly escalation-only and deployment playbooks are standardized."
  - id: A16
    name: Monthly churn for unit economics
    value: "1.5"
    unit: percent
    source: "[Startup-finance heuristic, enterprise security] Narrow annual-contract security products typically need sub-2% monthly churn once embedded; base case uses 1.5% because renewal data is not yet proven."
  - id: A17
    name: Blended CAC
    value: "120.0"
    unit: USDK per new paid protected program
    source: "[BP gtm funnelTargets + BP buyingProcess + startup-finance heuristic] Defense pilots, procurement reviews, and partner-assisted selling imply six-figure acquisition cost for each new paid protected program."
  - id: A18
    name: Loaded salary bands
    value: "Founder 200; Engineering 220; Security research 210; Deployment/product 190; Sales/GTM 230; Success/ops 160; G&A 140"
    unit: annualK per FTE
    source: "[BP team + startup-finance heuristic] Uses lean but market-rate US defense-software cash compensation with payroll taxes and benefits included."
  - id: A19
    name: Hiring schedule
    value: "Security engineer M2; deployment engineer M4; GTM lead M9; success/ops M13; second engineer M15; second GTM M18; third engineer M25; second security engineer M27; second deployment engineer M30; G&A M33"
    unit: timing
    source: "[BP team + BP sequencingRationale] Hiring follows product proof, deployment repeatability, and pilot conversion rather than staffing the full SOM too early."
  - id: A20
    name: Operating expense policy
    value: "Department lines reflect total functional spend; salaryK is a memo line for payroll reconciliation and is not additive to opex"
    unit: accounting policy
    source: "[BP operations + startup-finance heuristic] The model shows payroll explicitly so headcount rolls into salaryK while EBITDA still uses total departmental opex."
  - id: A21
    name: Cash flow simplification
    value: "Ending cash equals opening cash plus cumulative EBITDA"
    unit: formula
    source: "[Startup-finance heuristic] Assumes minimal capex, debt, and working-capital distortion for an asset-light software company."
  - id: A22
    name: Funding sizing rule
    value: "Raise enough to reach Q4Y2 milestones and still hold roughly six months of buffer"
    unit: policy
    source: "[BP fundingAsk runwayMonths 18 + model requirement] Ask size is driven by the next financing proof point plus a buffer rather than by the lowest theoretical survival number."
