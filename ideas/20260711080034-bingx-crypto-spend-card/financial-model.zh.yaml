scenarios:
  downside:
    description: 第三个客户标识之后的启动时间大约延后一个季度，且模块附加销售仍弱于计划。
    y3RevenueK: 1687
    y3EbitdaK: -563.1
    cashLowPointK: 397.8
    keyAssumptionChanges:
      - M14 之后的付费客户标识启动时间改为 M20、M23、M27、M30、M32 和 M34，而非基准时间表。
      - 试点定价更接近 $54K，基础生产 ARR 更接近 $228K，而非 $246K。
      - 成熟客户的最终毛利率约为 73%，而非 77%。
  base:
    description: 到 Q4Y3 达到 10 个付费卡项目客户标识，收入从试点转向生产订阅和模块扩展。
    y3RevenueK: 2160
    y3EbitdaK: -160.5
    cashLowPointK: 956.2
    keyAssumptionChanges:
      - 付费客户标识启动时间遵循 M6、M10、M14、M17、M20、M24、M27、M29、M31 和 M33。
      - 收入从 $60K 试点转为约 $246K ARR，随后在成熟模块附加后升至约 $282K ARR。
      - 随着合作伙伴映射得到复用，毛利率从试点阶段的 40% 提升至成熟客户标识的 77%。
  upside:
    description: 合作伙伴引荐更早启动，后续批次更快转化为价值更高的生产客户标识。
    y3RevenueK: 2455.5
    y3EbitdaK: 68.3
    cashLowPointK: 1235
    keyAssumptionChanges:
      - 首个客户标识之后的启动时间提前至 M9、M13、M16、M19、M22、M25、M28、M30、M32 和 M34。
      - 通过更快的模块采用，试点定价达到约 $66K，成熟项目 ARR 达到约 $294K。
      - 随着第二类映射更早产品化，成熟客户的毛利率提升至约 78%。
sensitivity:
  - variable: ARPU
    downsideCase: 生产 ARR 约为 $228K，成熟 ARR 约为 $258K。
    baseCase: 生产 ARR 约为 $246K；成熟 ARR 约为 $282K。
    upsideCase: 生产 ARR 约为 $264K，成熟 ARR 约为 $300K。
    y3RevenueImpactK: -176.5
    cashImpactK: -155.5
  - variable: CAC
    downsideCase: 由于合作伙伴引荐未能实现且尽职调查仍高度依赖创始人，CAC 升至约 $150K。
    baseCase: 每个生产客户标识的 CAC 保持在约 $125K。
    upsideCase: 一旦有一个引荐渠道可复用，CAC 将降至接近 $100K。
    y3RevenueImpactK: -40
    cashImpactK: -125
  - variable: 流失率
    downsideCase: 月度流失率升至 2.5%，且一个早期客户标识未扩展至高级模块。
    baseCase: 月度流失率保持在 1.5%。
    upsideCase: 产品成为结算和争议处理操作手册的一部分后，月度流失率改善至 1.0%。
    y3RevenueImpactK: -120
    cashImpactK: -140
  - variable: 销售周期
    downsideCase: 由于发起方银行审查耗时更长，第三个客户标识之后的启动时间大约延后一个季度。
    baseCase: 客户标识时间表遵循 M6、M10、M14、M17、M20、M24、M27、M29、M31 和 M33。
    upsideCase: 随着合作伙伴引荐预热买方，后续批次提前一到两个月。
    y3RevenueImpactK: -322
    cashImpactK: -289.5
  - variable: 毛利率
    downsideCase: 试点毛利率为 35%，首年生产阶段为 67%，成熟客户标识为 73%。
    baseCase: 试点毛利率为 40%，首年生产阶段为 71%，成熟客户标识为 77%。
    upsideCase: 试点毛利率为 45%，首年生产阶段为 74%，成熟客户标识为 79%。
    y3RevenueImpactK: 0
    cashImpactK: -119.1
  - variable: 招聘速度
    downsideCase: 在可复用的合作伙伴需求出现前，于 M24 增加一名工程师，并于 M28 增加一名 GTM 招聘。
    baseCase: 后续招聘等到 M27 和 M31 才进行，且始终以生产验证为条件。
    upsideCase: 合作伙伴支持工作量在 Q4Y3 后才转为内部承担。
    y3RevenueImpactK: 0
    cashImpactK: -301.5
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Targets[目标交易所] --> Pilots[付费试点]
      Pilots --> Production[生产卡项目]
      Production --> Expansion[争议处理和发起方报告模块]
      Expansion --> Revenue[订阅和使用收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景在 Q4Y3 达到 10 个付费卡项目，每个客户标识从 $60K 试点转为约 $246K ARR，随后增加价值更高的发起方和争议处理模块。
  - checkName: 必须成功的事项
    finding: 团队必须将试点转生产周期维持在接近一个季度，才能使 M24-M33 批次时间表落地，而不将招聘大幅提前于收入。
  - checkName: 模型失效情形
    finding: 如果第三个客户标识之后的启动时间延后一个季度且成熟定价走弱，Y3 收入将降至约 $1.7M，现金将压缩至接近 $0.4M 的下行情景底线。
  - checkName: 下一轮融资验证
    finding: 当 Q4Y2 显示 4+ 个生产交易所客户标识、两类可复用映射和发起方认可的证据包，且现金仍高于约 $1.1M 时，下一轮融资便具备合理依据。
sanityChecks:
  ruleOf40: Y3 增长 114% + EBITDA 利润率 -7% = 106%
  burnMultiple: Y2 现金消耗倍数为 0.8x（EBITDA 消耗 $618.8K，对应 $809.5K 净新增收入）；随着 Q4 转正，Y3 现金消耗倍数为 0.1x。
  revenuePerFte: $270K Y3，使用年末 8 名 FTE 计算（SaaS 基准为 $200-400K）
  flags:
    - 可触达的切入市场较为集中，因此基准情景已假设在约 60 个近期 SAM 中获得 10 个付费客户标识，无法承受多次启动失误。
    - 模型依赖合作伙伴映射充分可复用，使 Q4Y2 时 6 名 FTE 的团队能够支持 5 个生产客户标识，而不会让服务占比超过商业计划的护栏。
    - 只有当试点在约 90 天内转化时，现金缓冲才能保持健康；若试点拖延，下行情景会在下一轮融资前将现金拉低至 $0.4M 以下。
