  round: pre-seed
  amountM: 2.5
  runwayMonths: 24
  milestone: >-
    实现 4+ 个生产交易所客户标识，标准化 2 类发卡方或处理商映射，并在保有约 6 个月现金缓冲的情况下获得发起方认可的证据包验收。
