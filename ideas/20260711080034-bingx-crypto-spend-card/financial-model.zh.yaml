slug: exchange-card-shadow-ledger
date: "2026-07-11"
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-08
    unit: YYYY-MM
    source: "[BP 日期 2026-07-11] 模型从该日期商业计划之后的第一个完整月份开始。"
  - id: A2
    name: 期初现金 / pre-seed 融资
    value: $2.5M
    unit: USD
    source: >-
      [BP fundingAsk targetFundingRangeUsd $2.5-3.5M, runwayMonths 18] 模型采用区间下限，因为招聘仍以里程碑为门槛，且首笔收入从 M6 开始。
  - id: A3
    name: 客户定义
    value: 处于试点或生产阶段的一个活跃付费交易所卡项目
    unit: 定义
    source: >-
      [BP businessModel.unitOfValue + BP gtm.pricing] customersEop 统计付费卡项目客户标识，而非终端持卡人。
  - id: A4
    name: 付费客户标识启动时间表
    value: M6, M10, M14, M17, M20, M24, M27, M29, M31, M33
    unit: 月份索引
    source: >-
      [BP milestones 0-12, 12-24, 24-36 + Research market.som 12 个可触达客户标识] 基准情景在 Y1 年末达到 2 个付费客户标识、Q4Y2 达到 6 个、Q4Y3 达到 10 个，且未假设覆盖完整的第 3 年 SOM。
  - id: A5
    name: 付费试点定价
    value: $60K，覆盖 3 个月（约 $20K/月）
    unit: USD/项目
    source: >-
      [BP gtm.pricing $40k-$75k 付费试点 + BP investorMemo.firstCustomer.initialContract] 模型采用已验证试点价格带的中位数。
  - id: A6
    name: 基础生产合同定价
    value: $246K ARR（约 $20.5K/月）
    unit: USD/项目/年
    source: >-
      [BP gtm.pricing $200k-$250k 年度订阅加使用费] 首个完整生产年度的定价接近订阅价格带上限，因为买方已上线并受到运营约束。
  - id: A7
    name: 模块扩展后的成熟项目收入
    value: $282K ARR（约 $23.5K/月）
    unit: USD/项目/年
    source: >-
      [BP businessModel.expansionLevers + BP businessModel.revenueStreams 高级模块] 在日终结算切入点得到验证后，成熟客户标识增加争议处理、奖励和发起方报告模块。
  - id: A8
    name: 试点转生产周期
    value: 90 天
    unit: 天
    source: >-
      [BP experimentRoadmap 90-180 天付费试点 + BP investorMemo.mustBeTrue 试点转化] 模型假设一个试点会在一个季度内转化或停滞。
  - id: A9
    name: 按客户阶段划分的毛利率
    value: 试点 40%，首年生产阶段 71%，成熟阶段 77%
    unit: 毛利率百分比
    source: >-
      [BP businessModel.targetGrossMarginPct 70 + BP strategyMap.killCriteria 服务低于首年收入的 35% + BP risks 实施仍过度定制化] 早期部署以服务为主；随后可复用映射和证据模板会使成熟客户的毛利率高于 70% 的目标。
  - id: A10
    name: 创始人 / 总经理综合薪酬
    value: $175K
    unit: USD/year
    source: >-
      [创业财务经验法则] 面向企业 fintech pre-seed 阶段的精益创始人薪酬，加上工资税和福利负担。
  - id: A11
    name: 创始工程师综合薪酬
    value: $200K
    unit: USD/year
    source: >-
      [BP team 创始工程师 + 创业财务经验法则] 首位技术招聘必须设计规范化的消费生命周期模型和审计追踪。
  - id: A12
    name: 集成工程师综合薪酬
    value: $180K
    unit: USD/year
    source: >-
      [BP team 集成工程师 + 创业财务经验法则] 此岗位将合作伙伴映射产品化，而非让每次部署都沦为定制服务。
  - id: A13
    name: 卡业务运营 / 合规负责人综合薪酬
    value: $160K
    unit: USD/year
    source: >-
      [BP team 卡业务运营 / 合规负责人 + 创业财务经验法则] 具有深厚领域经验的运营人才将发起方审查和争议处理工作流转化为软件。
  - id: A14
    name: 企业客户经理综合薪酬
    value: $190K
    unit: USD/year
    source: >-
      [BP team 企业客户经理 + 创业财务经验法则] 包括基础薪酬、浮动薪酬以及企业 fintech 销售所需的差旅。
  - id: A15
    name: 后续解决方案、平台和合作伙伴成功团队薪酬
    value: $170K 解决方案 / $185K 平台 / $170K 合作伙伴成功团队
    unit: USD/年/FTE
    source: >-
      [BP milestones 12-24 and 24-36 + BP gtm.channels + 创业财务经验法则] 后续招聘仅在首批 4-6 个客户标识出现后，才专注于部署复用、第二类映射产品化和合作伙伴主导的扩张。
  - id: A16
    name: 招聘时间线
    value: >-
      M1 创始人和创始工程师；M4 集成工程师；M7 卡业务运营/合规；M10 AE；M18 解决方案/数据；M27 平台工程师；M31 合作伙伴成功团队
    unit: 时间线
    source: >-
      [BP team.startTiming + BP strategicChoices.sequencingRationale + BP milestones] 在生产验证出现前，团队保持精简；随后逐步增加交付和合作伙伴支持能力。
  - id: A17
    name: 薪酬在 P&L 科目中的分配
    value: >-
      创始人 60/15/25 分配至 S&M/R&D/G&A；工程师 100% 分配至 R&D；卡业务运营 15/60/25；解决方案人员 25/75 分配至 S&M/R&D；AE 100% 分配至 S&M；合作伙伴成功团队 75/25 分配至 S&M/G&A
    unit: 分配比例
    source: >-
      [BP team 岗位理由 + BP operations] 薪酬完全计入运营科目，同时反映出部署和合作伙伴支持部分面向客户。
  - id: A18
    name: 非薪酬 opex 增长节奏
    value: Y1/Y2/Y3 每月 S&M $4K/$6K/$8K、R&D $7K/$9K/$11K、G&A $6K/$8K/$10K
    unit: USD/month
    source: >-
      [BP gtm.channels + BP operations + Research regulatoryLandscape + 创业财务经验法则] 覆盖云服务、安全工具、差旅、法务、保险以及适度的审计/合规支出，但不假设付费获客规模化。
  - id: A19
    name: 月度流失率经验假设
    value: 1.5%
    unit: 百分比/月
    source: >-
      [BP businessModel.expansionLevers + BP risks 市场集中度 + 创业财务经验法则] 控制层一旦嵌入应具有粘性，但早期市场足够集中，因此不能将流失率建模为零。
  - id: A20
    name: 每个生产客户标识的混合 CAC
    value: $125K
    unit: USD/logo
    source: >-
      [模型计算：基于截至 Q4Y2 前 5 个生产客户标识对应的 Y1-Y2 salesMarketingK $628.7K + BP gtm.funnelTargets] 反映创始人主导的企业销售、尽职调查和长周期合作伙伴教育。
  - id: A21
    name: 现金转换惯例
    value: EBITDA 近似代表现金变动
    unit: 公式
    source: >-
      [创业财务经验法则] 假设在此 pre-seed 阶段，资本开支、债务、税款和营运资本时间差均不重大。
  - id: A22
    name: 下一轮融资里程碑
    value: >-
      4+ 个生产交易所客户标识、2 类可复用映射，以及在 Q4Y2 前获得发起方认可的证据包验收
    unit: 里程碑
    source: >-
      [BP milestones 12-24 + BP fundingAsk.useOfFundsSummary + BP investorMemo.nextDiligence] 这是进行更大规模 seed 融资前所需的验证包。
  - id: A23
    name: 季度薪酬计算惯例
    value: 季度薪酬科目汇总该季度内实际按月入职的人数
    unit: 惯例
    source: >-
      [人员列计算惯例 + BP team.startTiming] 季度 P&L 反映实际招聘爬坡，而非仅反映季度末快照。
