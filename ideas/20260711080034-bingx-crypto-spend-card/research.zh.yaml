- name: Wirex
  stage: incumbent
  wedge: 加密原生 BaaS、主要卡组织接入及卡与稳定币 API
  pricing: 未公开；企业销售主导
  strength: 能够快速推出合规的全球卡项目，因为它已掌握发卡、卡组织接入和合作方 API。
  weaknessVsUs: 其优化目标是自身技术栈，而非中立的影子账本；后者需在多个合作方间对账交易所内部余额事实。
  sourceRefs:
  - 1
