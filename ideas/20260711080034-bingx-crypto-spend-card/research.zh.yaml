  - 35
- name: Rain
  stage: scale-up
  wedge: 企业稳定币发卡与支付平台
  pricing: 未公开；销售主导
  strength: 在发卡、支付和卡组织接入方面具备强大的全栈能力。
  weaknessVsUs: 垂直技术栈的经济利益使其偏向通道和项目上线，而非由买方掌控、贯通外部与内部账本异常的证据。
  sourceRefs:
  - 8
  - 9
- name: Paymentology
  stage: incumbent
  wedge: 覆盖对账、争议和令牌化工具的全球发卡处理
  pricing: 未公开；企业合同
  strength: 具备深厚的处理商侧交易报告和卡组织连接能力。
  weaknessVsUs: 以处理商为中心的数据止步于卡边界，无法解释已结算卡事件应如何映射回客户加密余额。
  sourceRefs:
  - 13
  - 14
- name: Modern Treasury
  stage: scale-up
  wedge: 通用复式账本和支付运营基础设施
  pricing: 未公开；企业销售主导
  strength: 为资金流动系统提供强大的准确性、可审计性和财务可信度。
  weaknessVsUs: 并非为卡组织生命周期事件，或交易所专属的清算、冲正和争议工作流而设计。
  sourceRefs:
  - 21
- name: Bitwave
  stage: scale-up
  wedge: 加密会计、支付和审计报告软件
  pricing: 定制方案；公开定价页面
  strength: 熟悉财务负责人和审计语言，并提供经审计验证的加密报告工作流。
  weaknessVsUs: 更适用于交易后结账和报告，而非实时卡运营异常处理。
  sourceRefs:
  - 36
  - 37
