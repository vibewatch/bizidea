problem: >-
  Launching the card is becoming easier than operating the card. A crypto
  exchange that turns wallet balances into Visa spend now has to reconcile card
  authorizations, ATM withdrawals, reversals, tokenized-wallet activity, and
  rewards against customer balances and settlement files. Wirex and Visa provide
  the issuing backbone, but the exchange still owns the customer truth, support
  disputes, and sponsor-facing evidence. Today those workflows are patched
  together with issuer dashboards, CSV exports, internal SQL pulls, and
  spreadsheet exception queues.
targetUser:
  primary: "Head of card operations or payments product at a non-U.S. crypto exchange launching an exchange-linked Visa debit card through a sponsor issuer or BaaS partner"
  secondary: "Finance systems or compliance operations lead at the same exchange"
  buyer: "COO, GM of payments, or head of card program at the exchange"
startupThesis:
  nonObviousInsight: >-
    Visa access is no longer the scarce asset; operational control is. Once a
    BaaS partner can stand up the regulated card rails, the hardest unsolved
    problem shifts to the exchange-specific shadow ledger that explains how each
    swipe, cash withdrawal, reversal, and reward event maps back to a customer's
    crypto balance and the program's compliance posture. That layer is too
    exchange-specific for Wirex to own cleanly and too payments-specific for a
    generic reconciliation tool to handle well.
  beachhead: >-
    Non-U.S. crypto exchanges with 1M+ funded retail users rolling out
    exchange-linked Visa cards in Europe or APAC, where a small card-operations
    team still matches authorizations, cash withdrawals, reversals, and wallet
    debits in spreadsheets.
  wedge: >-
    An exchange-card shadow ledger that ingests issuer authorization and clearing
    files, ATM events, rewards accruals, and the exchange's internal wallet
    ledger, then auto-matches each event into one auditable spend lifecycle with
    exception workflows for breaks and policy violations.
  whyNowCatalyst: >-
    BingX's launch shows that exchanges can now ship a globally accepted card on
    top of outsourced issuing rails, so the immediate bottleneck has moved from
    card access to trustworthy spend operations and compliance evidence.
  ventureScalePath: >-
    Start as the operating ledger for exchange-linked debit cards, expand into
    dispute ops, rewards accounting, and sponsor-bank reporting, then become the
    control plane for any wallet, neobank, or fintech turning digital-asset
    balances into everyday spend across cards, ATM, and mobile wallets.
solution: >-
  The product plugs into the exchange's internal customer ledger plus the BaaS or
  issuer feeds that record authorizations, clearing, reversals, ATM cash-outs,
  and card-token events. It builds a canonical spend timeline for each user so
  operations, finance, and support teams can see exactly when a wallet balance
  was reserved, liquidated, reversed, or rewarded. A rules engine flags breaks
  such as duplicate debits, missing reversals, unsupported geographies, or
  premium-benefit misuse before they become customer complaints or sponsor-bank
  questions. The first version also produces daily evidence packs for finance
  close and compliance review without replacing the issuer or processor.
goToMarketSeed:
  firstCustomer: >-
    Head of card operations at a top-30 non-U.S. crypto exchange with 1M+ funded
    accounts, a newly launched Europe-facing Visa debit card, and weekly manual
    reconciliation between issuer settlement files and exchange wallet debits.
  buyingTrigger: >-
    The exchange launches Apple Pay, expands to additional countries, or sees a
    spike in card disputes after launch, forcing the ops team to prove where
    balance mismatches and unsupported transactions came from.
  currentAlternative: issuer portal exports, internal SQL queries against the exchange ledger, and spreadsheet-based exception handling run by payments operations
  switchingReason: >-
    The shadow ledger gives one auditable source of truth across card and wallet
    systems, cutting dispute resolution time and reducing the launch risk that
    comes from stitching together multiple dashboards and manual reconciliations.
  pricingHypothesis: annual subscription priced by active card program plus a usage fee per monitored cardholder or reconciled transaction
