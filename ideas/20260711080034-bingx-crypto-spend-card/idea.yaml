jobsToBeDone:
  - job: >-
      When we launch or expand an exchange-linked card, help our payments ops
      team reconcile authorizations, reversals, cash withdrawals, and wallet
      debits daily, so we can avoid customer balance disputes and sponsor-bank
      escalations.
    currentAlternative: issuer dashboards plus spreadsheet reconciliation and ad hoc SQL pulls from the exchange ledger
    successMetric: reduction in unreconciled breaks and days-to-close after card launch
  - job: >-
      When support or compliance asks why a cardholder balance changed, help us
      reconstruct the full spend lifecycle, so we can resolve cases quickly
      without pulling data from five separate systems.
    currentAlternative: support tickets that bounce between the issuer portal, the exchange database, and finance exports
    successMetric: hours to close a balance dispute and percentage of cases answered from one system
ideaScorecard:
  signalStrength:
    score: 3
    rationale: >-
      The launch is concrete and timely, but evidence comes from only one same-day
      source and the category is still partly led by large incumbents.
  painIntensity:
    score: 4
    rationale: >-
      Once a card is live, broken reconciliation and unclear balance movements can
      create customer losses, support volume, and sponsor or compliance scrutiny.
  wedgeClarity:
    score: 5
    rationale: >-
      The initial workflow is specific: reconcile issuer card events and exchange
      wallet debits for a defined class of exchanges launching branded cards.
  defensibility:
    score: 3
    rationale: >-
      Issuers can add basic reporting, but a neutral shadow ledger that learns
      exchange-specific mappings, exception patterns, and sponsor-report templates
      can build meaningful switching costs.
  ventureScale:
    score: 4
    rationale: >-
      The first market is narrow, but the same control layer can expand into the
      operating system for digital-asset spend across exchanges, wallets, neobanks,
      and embedded card programs.
topRisks:
  - name: BaaS bundle risk
    description: Wirex or another issuer partner could add lightweight reconciliation dashboards and compress the standalone wedge.
    mitigation: Focus on exchange-internal wallet mapping, dispute workflows, and neutral multi-issuer support that the BaaS provider cannot deliver from its own perimeter.
  - name: Thin initial market
    description: The number of exchanges launching branded debit cards may grow more slowly than expected, limiting near-term customer count.
    mitigation: Start with exchange customers, then expand the same product to wallet apps and digital-asset fintechs using the same sponsor-issued spend stack.
  - name: Data access friction
    description: Issuer and processor feeds may be incomplete or delayed, making real-time reconciliation harder than the buyer expects.
    mitigation: Launch with daily close and exception workflows first, then deepen into near-real-time monitoring as data-sharing agreements mature.
