    signalRefs:
      - 交易所余额可用于消费
    sourceRefs: [1]
differentiator: >-
  Wirex、Visa 和卡处理商解决发卡及网络接入，但不会成为交易所内部关于钱包扣款、冲正、奖励和支持案例的事实来源。通用对账工具可以匹配文件，却无法理解从交易所余额到卡授权、ATM 取现再到冲正的完整生命周期。这家公司通过掌握位于消费者加密货币账户和受监管卡网络之间的交易所专属影子账本及异常工作流取胜，再借助发卡方专属映射和历史差异数据不断巩固这一优势。
conceptDiagram:
  title: 交易所卡影子账本
  mermaid: |
    flowchart LR
