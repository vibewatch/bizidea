      Product --> Outcome[更快解决争议并实现审计就绪的消费控制]
businessModelCanvas:
  customerSegments:
    - 推出品牌 Visa 或 Mastercard 借记卡的非美国加密货币交易所
    - 通过赞助发卡方新增借记卡消费功能的加密货币钱包应用
    - 服务数字资产平台的卡项目管理方
  valuePropositions:
    - 跨卡事件和加密货币余额的一条可审计消费生命周期
    - 加快交易所卡项目的上线、争议解决和财务结账
    - 面向冲正、ATM 取现和不受支持交易的异常工作流
  channels:
    - 向交易所 COO、支付负责人和卡运营负责人直销
    - 来自赞助发卡方、BaaS 合作伙伴和卡项目顾问的转介
    - 与卡处理商及加密货币账本基础设施供应商合作
  customerRelationships:
    - 为首批卡项目提供高触达实施服务
    - 持续提供异常审查和赞助方报告支持
    - 为运营、财务和支持团队提供 API 及仪表盘访问
  revenueStreams:
    - 按活跃卡项目收取年度平台订阅费
    - 按受监控持卡人或已核对交易收取用量费
    - 发卡方和交易所账本集成的上线费用
  keyResources:
    - 交易所卡生命周期数据模型
    - 对接发卡方、处理商和交易所账本系统的连接器
    - 历史异常与政策规则数据
  keyActivities:
    - 将卡事件映射至钱包余额变动
    - 维护发卡方专属的对账和报告模板
    - 运营异常工作流及面向赞助方的证据导出
  keyPartners:
    - 赞助发卡方和 BaaS 提供商
    - 卡处理商和卡网络赋能供应商
    - 加密货币交易所账本和托管基础设施供应商
  costStructure:
    - 集成与数据标准化工程
    - 安全账本存储和审计日志
    - 实施和企业支持
jobsToBeDone:
  - job: >-
      当我们推出或扩展交易所关联卡时，帮助支付运营团队每日核对授权、冲正、取现和钱包扣款，以避免客户余额争议和赞助银行升级。
    currentAlternative: 发卡方仪表盘加电子表格对账，以及从交易所账本临时提取的 SQL 数据
    successMetric: 卡发布后未核对差异的减少量及结账所需天数
  - job: >-
      当支持或合规团队询问某持卡人余额为何变动时，帮助我们重建完整消费生命周期，以便无需从五套独立系统提取数据就能快速解决案件。
    currentAlternative: 在发卡方门户、交易所数据库和财务导出之间来回流转的支持工单
    successMetric: 关闭余额争议所需小时数，以及可从单一系统得到答复的案件百分比
ideaScorecard:
  signalStrength:
    score: 3
    rationale: >-
      此次发布具体且及时，但证据仅来自一个当日来源，且该类别仍部分由大型现有厂商主导。
  painIntensity:
    score: 4
    rationale: >-
      卡一旦上线，对账失效和余额变动不明便可能造成客户损失、支持量激增，以及赞助方或合规审查。
  wedgeClarity:
    score: 5
    rationale: >-
      初始工作流明确：为一类推出品牌卡的交易所，核对发卡方卡事件和交易所钱包扣款。
  defensibility:
    score: 3
    rationale: >-
      发卡方可以增加基础报告功能，但能够学习交易所专属映射、异常模式和赞助方报告模板的中立影子账本，可以建立有意义的转换成本。
  ventureScale:
    score: 4
    rationale: >-
      首个市场较窄，但同一控制层可扩展为覆盖交易所、钱包、新银行和嵌入式卡项目的数字资产消费操作系统。
topRisks:
  - name: BaaS 捆绑风险
    description: Wirex 或其他发卡方合作伙伴可能增加轻量级对账仪表盘，压缩独立切口。
    mitigation: 聚焦交易所内部钱包映射、争议工作流和中立的多发卡方支持，这些能力 BaaS 提供商无法在自身边界内交付。
  - name: 初始市场规模有限
    description: 推出品牌借记卡的交易所数量可能比预期增长更慢，从而限制近期客户数量。
    mitigation: 先从交易所客户起步，再将同一产品扩展至使用相同赞助发卡消费技术栈的钱包应用和数字资产金融科技公司。
  - name: 数据访问阻力
    description: 发卡方和处理商的数据流可能不完整或延迟，使实时对账比买方预期更困难。
    mitigation: 先上线每日结账和异常工作流，随后随着数据共享协议成熟，深化至近实时监控。
