scenarios:
  downside:
    description: Starts after the third logo slip by roughly a quarter and module attach remains weaker than planned.
    y3RevenueK: 1687
    y3EbitdaK: -563.1
    cashLowPointK: 397.8
    keyAssumptionChanges:
      - Paid-logo starts after M14 move to M20, M23, M27, M30, M32, and M34 instead of the base schedule.
      - Pilot pricing lands closer to $54K and base production ARR lands closer to $228K instead of $246K.
      - Gross margin exits at roughly 73% on mature accounts instead of 77%.
  base:
    description: >-
      Ten paying card-program logos by Q4Y3, with revenue shifting from pilots to production subscriptions and
      module expansion.
    y3RevenueK: 2160
    y3EbitdaK: -160.5
    cashLowPointK: 956.2
    keyAssumptionChanges:
      - Paid-logo starts follow M6, M10, M14, M17, M20, M24, M27, M29, M31, and M33.
      - >-
        Revenue moves from a $60K pilot into about $246K ARR and then about $282K ARR after mature module
        attach.
      - Gross margin improves from 40% on pilots to 77% on mature logos as partner mappings are reused.
  upside:
    description: Partner referrals start earlier and the later cohorts convert faster into higher-value production logos.
    y3RevenueK: 2455.5
    y3EbitdaK: 68.3
    cashLowPointK: 1235
    keyAssumptionChanges:
      - Starts after the first logo pull forward into M9, M13, M16, M19, M22, M25, M28, M30, M32, and M34.
      - >-
        Pilot pricing reaches roughly $66K and mature program ARR reaches about $294K through faster module
        adoption.
      - >-
        Gross margin improves to roughly 78% on mature accounts as the second mapping family is productized
        sooner.
sensitivity:
  - variable: ARPU
    downsideCase: Production ARR lands at about $228K and mature ARR at about $258K.
    baseCase: Production ARR about $246K; mature ARR about $282K.
    upsideCase: Production ARR about $264K and mature ARR about $300K.
    y3RevenueImpactK: -176.5
    cashImpactK: -155.5
  - variable: CAC
    downsideCase: CAC rises to about $150K because partner referrals do not materialize and diligence stays founder-heavy.
    baseCase: CAC holds near $125K per production logo.
    upsideCase: CAC falls toward $100K once one referral channel is repeatable.
    y3RevenueImpactK: -40
    cashImpactK: -125
  - variable: churn
    downsideCase: Monthly churn drifts to 2.5% and one early logo does not expand into premium modules.
    baseCase: Monthly churn remains 1.5%.
    upsideCase: Monthly churn improves to 1.0% after the product becomes part of close and dispute runbooks.
    y3RevenueImpactK: -120
    cashImpactK: -140
  - variable: sales cycle
    downsideCase: Starts after the third logo slip by roughly one quarter because sponsor-bank review takes longer.
    baseCase: The logo schedule follows M6, M10, M14, M17, M20, M24, M27, M29, M31, and M33.
    upsideCase: Later cohorts pull forward by one to two months as partner referrals warm up the buyer.
    y3RevenueImpactK: -322
    cashImpactK: -289.5
  - variable: gross margin
    downsideCase: Pilot gross margin is 35%, first-year production 67%, and mature logos 73%.
    baseCase: Pilot gross margin is 40%, first-year production 71%, and mature logos 77%.
    upsideCase: Pilot gross margin is 45%, first-year production 74%, and mature logos 79%.
    y3RevenueImpactK: 0
    cashImpactK: -119.1
  - variable: hiring pace
    downsideCase: An extra engineer is added in M24 and an extra GTM hire in M28 before repeatable partner demand exists.
    baseCase: Later hires wait until M27 and M31 and hiring stays tied to production proof.
    upsideCase: Partner-support load stays outsourced until after Q4Y3.
    y3RevenueImpactK: 0
    cashImpactK: -301.5
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Targets[Target exchanges] --> Pilots[Paid pilots]
      Pilots --> Production[Production card programs]
      Production --> Expansion[Dispute plus sponsor-reporting modules]
      Expansion --> Revenue[Subscription and usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: >-
      The base case reaches 10 paying card programs by Q4Y3, with each logo moving from a $60K pilot to about
      $246K ARR and then adding higher-value sponsor and dispute modules.
  - checkName: Must go right
    finding: >-
      The team has to keep pilot-to-production near one quarter so the M24-M33 cohort schedule lands without
      pulling hiring materially ahead of revenue.
  - checkName: Model breaks if
    finding: >-
      If starts after the third logo slip by a quarter and mature pricing softens, Y3 revenue falls toward
      $1.7M and cash compresses toward the downside floor near $0.4M.
  - checkName: Next-round proof
    finding: >-
      The next financing is justified when Q4Y2 shows 4+ production exchange logos, two reusable mapping
      families, and sponsor-ready evidence packs with cash still above about $1.1M.
sanityChecks:
  ruleOf40: Y3 growth 114% + EBITDA margin -7% = 106%
  burnMultiple: >-
    Y2 burn multiple 0.8x (EBITDA burn $618.8K on $809.5K net new revenue); Y3 burn multiple 0.1x as Q4 turns
    positive.
  revenuePerFte: $270K Y3 using 8 year-end FTE (benchmark $200-400K SaaS)
  flags:
    - >-
      The addressable beachhead is concentrated, so the base case already assumes 10 paying logos inside a
      roughly 60-logo near-term SAM and cannot absorb many missed launches.
    - >-
      The model depends on partner mappings becoming reusable enough that a 6-FTE team at Q4Y2 can support
      five production logos without services creeping above the business-plan guardrail.
    - >-
      The cash cushion remains healthy only if pilots convert within about 90 days; if they linger, the
      downside case pulls cash below $0.4M before the next raise.
