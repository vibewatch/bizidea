slug: exchange-card-shadow-ledger
date: "2026-07-11"
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: Model start month
    value: 2026-08
    unit: YYYY-MM
    source: "[BP date 2026-07-11] the model starts in the first full month after the dated business plan."
  - id: A2
    name: Opening cash / pre-seed raise
    value: $2.5M
    unit: USD
    source: >-
      [BP fundingAsk targetFundingRangeUsd $2.5-3.5M, runwayMonths 18] the model uses the low end because
      hiring stays milestone-gated and first revenue begins in M6.
  - id: A3
    name: Customer definition
    value: One active paying exchange card program in pilot or production
    unit: definition
    source: >-
      [BP businessModel.unitOfValue + BP gtm.pricing] customersEop counts paying card-program logos rather
      than end-user cardholders.
  - id: A4
    name: Paid-logo start schedule
    value: M6, M10, M14, M17, M20, M24, M27, M29, M31, M33
    unit: month index
    source: >-
      [BP milestones 0-12, 12-24, 24-36 + Research market.som 12 reachable logos] the base case reaches 2
      paying logos by Y1 end, 6 by Q4Y2, and 10 by Q4Y3 without assuming the full year-3 SOM.
  - id: A5
    name: Paid pilot pricing
    value: $60K over 3 months (~$20K/mo)
    unit: USD/program
    source: >-
      [BP gtm.pricing $40k-$75k paid pilot + BP investorMemo.firstCustomer.initialContract] the model uses the
      middle of the validated pilot band.
  - id: A6
    name: Base production contract pricing
    value: $246K ARR (~$20.5K/mo)
    unit: USD/program/year
    source: >-
      [BP gtm.pricing $200k-$250k annual subscription plus usage] the first full production year lands near
      the top of the subscription band because the buyer is already live and operationally constrained.
  - id: A7
    name: Mature program revenue after module expansion
    value: $282K ARR (~$23.5K/mo)
    unit: USD/program/year
    source: >-
      [BP businessModel.expansionLevers + BP businessModel.revenueStreams premium modules] mature logos add
      dispute, rewards, and sponsor-reporting modules after the daily-close wedge is proven.
  - id: A8
    name: Pilot-to-production cycle
    value: 90 days
    unit: days
    source: >-
      [BP experimentRoadmap 90-180 day paid pilot + BP investorMemo.mustBeTrue pilot conversion] the model
      assumes a pilot either converts or stalls within one quarter.
  - id: A9
    name: Gross margin by account stage
    value: 40% pilot, 71% first-year production, 77% mature
    unit: gross margin percent
    source: >-
      [BP businessModel.targetGrossMarginPct 70 + BP strategyMap.killCriteria services below 35% of first-year
      revenue + BP risks implementation remains too custom] early deployments are services-heavy, then
      reusable mappings and evidence templates lift margin above the 70% target on mature accounts.
  - id: A10
    name: Founder / GM loaded compensation
    value: $175K
    unit: USD/year
    source: >-
      [startup-finance heuristic] lean founder salary plus payroll tax and benefits load for an enterprise
      fintech pre-seed.
  - id: A11
    name: Founding engineer loaded compensation
    value: $200K
    unit: USD/year
    source: >-
      [BP team Founding eng + startup-finance heuristic] the first technical hire has to design the canonical
      spend-lifecycle model and audit trail.
  - id: A12
    name: Integration engineer loaded compensation
    value: $180K
    unit: USD/year
    source: >-
      [BP team Integration engineer + startup-finance heuristic] this hire productizes partner mappings
      instead of leaving every deployment as custom services.
  - id: A13
    name: Card ops / compliance lead loaded compensation
    value: $160K
    unit: USD/year
    source: >-
      [BP team Card ops / compliance lead + startup-finance heuristic] domain-heavy operations talent
      translates sponsor-review and dispute workflows into software.
  - id: A14
    name: Enterprise account executive loaded compensation
    value: $190K
    unit: USD/year
    source: >-
      [BP team Enterprise account executive + startup-finance heuristic] includes base pay, variable comp, and
      travel for enterprise fintech selling.
  - id: A15
    name: Later solutions, platform, and partner-success compensation
    value: $170K solutions / $185K platform / $170K partner-success
    unit: USD/year/FTE
    source: >-
      [BP milestones 12-24 and 24-36 + BP gtm.channels + startup-finance heuristic] later hires focus on
      deployment reuse, second mapping-family productization, and partner-led expansion only after the first
      4-6 logos exist.
  - id: A16
    name: Hiring timeline
    value: >-
      M1 founder and founding eng; M4 integration engineer; M7 card ops/compliance; M10 AE; M18
      solutions/data; M27 platform engineer; M31 partner-success
    unit: timeline
    source: >-
      [BP team.startTiming + BP strategicChoices.sequencingRationale + BP milestones] the ramp stays lean
      until production proof exists, then adds delivery and partner capacity gradually.
  - id: A17
    name: Payroll allocation to P&L lines
    value: >-
      Founder 60/15/25 S&M/R&D/G&A; engineers 100% R&D; card ops 15/60/25; solutions 25/75 S&M/R&D; AE 100%
      S&M; partner-success 75/25 S&M/G&A
    unit: allocation
    source: >-
      [BP team role rationales + BP operations] salary is fully rolled into operating lines while reflecting
      that deployment and partner support are partly customer-facing.
  - id: A18
    name: Non-payroll opex ramp
    value: S&M $4K/$6K/$8K, R&D $7K/$9K/$11K, G&A $6K/$8K/$10K per month in Y1/Y2/Y3
    unit: USD/month
    source: >-
      [BP gtm.channels + BP operations + Research regulatoryLandscape + startup-finance heuristic] covers
      cloud, security tooling, travel, legal, insurance, and light audit/compliance spend without assuming
      paid-demand scale.
  - id: A19
    name: Monthly churn heuristic
    value: 1.5%
    unit: percent/month
    source: >-
      [BP businessModel.expansionLevers + BP risks market concentration + startup-finance heuristic] the
      control layer should be sticky once embedded, but the early market is concentrated enough that churn
      cannot be modeled as zero.
  - id: A20
    name: Blended CAC per production logo
    value: $125K
    unit: USD/logo
    source: >-
      [Model calc using Y1-Y2 salesMarketingK of $628.7K over the first 5 production logos by Q4Y2 + BP
      gtm.funnelTargets] reflects founder-led enterprise sales, diligence, and long-cycle partner education.
  - id: A21
    name: Cash conversion convention
    value: EBITDA approximates cash movement
    unit: formula
    source: >-
      [startup-finance heuristic] capex, debt, taxes, and working-capital timing are assumed immaterial at
      this pre-seed stage.
  - id: A22
    name: Funding milestone for the next round
    value: >-
      4+ production exchange logos, 2 reusable mapping families, and sponsor-ready evidence-pack acceptance by
      Q4Y2
    unit: milestone
    source: >-
      [BP milestones 12-24 + BP fundingAsk.useOfFundsSummary + BP investorMemo.nextDiligence] this is the
      proof package needed before a larger seed raise.
  - id: A23
    name: Quarterly salary convention
    value: Quarterly salary lines sum actual monthly hires inside each quarter
    unit: convention
    source: >-
      [Headcount column convention + BP team.startTiming] the quarterly P&L reflects the live hiring ramp
      rather than only quarter-end snapshots.
