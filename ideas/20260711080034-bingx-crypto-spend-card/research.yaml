  validationPlan:
  - priority: high
    question: Which daily files, APIs, and report fields do target exchanges actually receive from Wirex, Paymentology, Thredd, or Marqeta-class partners today?
    evidenceToGather: Sample authorization, clearing, chargeback, tokenization, ATM, and settlement files from three live programs plus their field-level mapping to the exchange wallet ledger.
  - priority: high
    question: How many open items, unmatched reversals, or sponsor-bank escalations does a launch-stage exchange experience in a typical week?
    evidenceToGather: Ninety days of exception logs from two design partners with counts, root causes, financial exposure, and resolution time.
  - priority: high
    question: Will sponsor issuers accept a third-party shadow ledger as part of evidence packs for audits, disputes, and operational reviews?
    evidenceToGather: Review calls and redlines with two sponsor issuers, one processor, and one external auditor on a draft evidence-pack output.
  - priority: medium
    question: Does budget sit with card operations, finance systems, or compliance once the card program is already live?
    evidenceToGather: At least eight pricing and budget-owner conversations across exchanges, wallet apps, and digital-asset fintechs.
  - priority: low
    question: How much of the year-three pipeline comes from adjacent wallet and remittance apps instead of centralized exchanges?
    evidenceToGather: Segmented outbound response data and partner referral conversion rates across exchange, wallet, and remittance cohorts.
