competitors:
- name: Wirex
  stage: incumbent
  wedge: Crypto-native BaaS, principal network access, and card-plus-stablecoin APIs
  pricing: Not public; enterprise sales-led
  strength: Can launch compliant global card programs quickly because it already owns issuing, network access, and partner APIs.
  weaknessVsUs: Optimized for its own stack rather than for a neutral shadow ledger that reconciles exchange-internal balance truth across multiple partners.
  sourceRefs:
  - 1
  - 3
  - 35
- name: Rain
  stage: scale-up
  wedge: Enterprise stablecoin card issuing and payments platform
  pricing: Not public; sales-led
  strength: Strong full-stack posture across card issuing, payments, and network access.
  weaknessVsUs: Vertical stack economics bias it toward rails and program launch, not toward buyer-controlled exception evidence across external and internal ledgers.
  sourceRefs:
  - 8
  - 9
- name: Paymentology
  stage: incumbent
  wedge: Global issuer processing with reconciliation, dispute, and tokenization tooling
  pricing: Not public; enterprise contracts
  strength: Deep processor-side transaction reporting and scheme connectivity.
  weaknessVsUs: Processor-centric data stops at the card perimeter and does not explain how settled card events should map back to customer crypto balances.
  sourceRefs:
  - 13
  - 14
- name: Modern Treasury
  stage: scale-up
  wedge: Generic double-entry ledger and payments-operations infrastructure
  pricing: Not public; enterprise sales-led
  strength: Strong accuracy, auditability, and finance credibility for money movement systems.
  weaknessVsUs: Not purpose-built for card-scheme lifecycle events or exchange-specific liquidation, reversal, and dispute workflows.
  sourceRefs:
  - 21
- name: Bitwave
  stage: scale-up
  wedge: Crypto accounting, payments, and audit reporting software
  pricing: Custom plans; public pricing page
  strength: Speaks the controller and audit language and offers audit-proven crypto reporting workflows.
  weaknessVsUs: Better suited to post-trade close and reporting than to live card-operation exception handling.
  sourceRefs:
  - 36
  - 37
