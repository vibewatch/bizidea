    - 12
    - 29
  adoptionFrictionMatrix:
  - friction: 跨 MSSP、备份、资产和演练系统的工厂级证据往往不完整。
    severity: high
    affectedBuyer: CISO 和业务连续性负责人
    mitigation: 针对一个续保模板和一种事件类型以只读方式起步，附带明确的置信度标记和人工审核。
