    affectedBuyer: CFO 或 CRO
    mitigation: 与两三个经纪商或承保方工作流进行试点，在宣传宽泛平台效果之前优化导出格式。
    sourceRefs:
    - 19
    - 24
    - 27
    - 33
  - friction: 预算归属分散在安全、财务、保险和运营之间。
    severity: medium
    affectedBuyer: CFO 与 CISO 共同
    mitigation: 针对有量化截止日期的实时续保或近期事件切入销售，将准备时间、停机损失和理赔就绪度的节省量化。
    sourceRefs:
    - 5
    - 9
    - 28
    - 29
  - friction: 遗留 OT 和工厂特定恢复工作流使深度集成变得复杂。
    severity: medium
    affectedBuyer: 工厂 IT 和韧性负责人
    mitigation: 从已生成的制成品和恢复证据入手，而非试图替换 OT 工具。
    sourceRefs:
    - 11
    - 12
    - 23
