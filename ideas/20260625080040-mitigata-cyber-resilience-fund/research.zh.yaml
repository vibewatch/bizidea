  pestle:
  - factor: political
    impact: negative
    point: 印度的网络事件报告和保险治理使本地化和可审计的证据处理成为强制要求而非可选项。
    sourceRefs:
    - 18
    - 19
    - 38
  - factor: economic
    impact: positive
    point: 网络保险承保能力依然充裕，强风险的定价已有所软化，有助于打开对话，但也加大了证明可测量价值的压力。
    sourceRefs:
    - 4
    - 5
    - 7
  - factor: social
    impact: positive
    point: 网络韧性正从 IT 问题演变为董事会和财务问题，因为制造业停机造成显性的运营和现金流损失。
    sourceRefs:
    - 12
    - 28
    - 29
  - factor: technological
    impact: positive
    point: MDR、不可变备份和保险公司挂钩的安全平台已足够成熟，可以为理赔就绪证据层提供数据来源。
