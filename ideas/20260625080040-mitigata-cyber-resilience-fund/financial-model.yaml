slug: cyber-claim-readiness-os
date: '2026-06-25'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Starting production customers (M1)
  value: '0'
  unit: count
  source: '[BP gtm.wedge] Sales motion begins with paid renewal-readiness deployments before annual subscriptions, so no production customers exist at model start.'
- id: A2
  name: Paid pilot fee
  value: '30'
  unit: USD thousands
  source: '[BP investorMemo.firstCustomer.initialContract] Pilot or implementation pricing is $20k-$35k; model uses the $30K midpoint.'
- id: A3
  name: Pilot revenue recognition period
  value: '2'
  unit: months
  source: '[BP gtm.pricing] The pilot is tied to one live renewal cycle; model recognizes the fee over an 8-week deployment.'
- id: A4
  name: Initial production ACV
  value: '114'
  unit: USD thousands per customer per year
  source: '[BP gtm.pricing + research bottomUpSizingDrivers] Research implies ~$12K per covered plant; a 6-plant first customer is ~$72K base ARR, with the remainder coming from incident-workspace and template add-ons described in the BP.'
- id: A5
  name: Blended ACV through Y2
  value: '120'
  unit: USD thousands per customer per year
  source: '[BP businessModel.expansionLevers] Same-account expansion adds plants, legal entities, and templates, lifting the blended contract value modestly in Y2.'
- id: A6
  name: Blended ACV in H1 Y3
  value: '129'
  unit: USD thousands per customer per year
  source: '[BP businessModel.expansionLevers + milestones 12–24 months] Broker seats, insurer review seats, and benchmark reporting begin to mix into the contract value by Y3.'
- id: A7
  name: Blended ACV in H2 Y3
  value: '138'
  unit: USD thousands per customer per year
  source: '[BP product.twentyFourMonth + BP businessModel.expansionLevers] Later-stage contracts include more entities, partner seats, and claim-workspace usage, pushing the blended ACV toward the high end of the BP range.'
- id: A8
  name: First paid pilot signs in M5
  value: '5'
  unit: months from model start
  source: '[BP experimentRoadmap] The plan spends the first 90 days on interviews, prototype replay, and integrations, making M5 the first believable paid pilot start.'
- id: A9
  name: Paid pilots in Y1
  value: '4'
  unit: count
  source: '[BP milestones 0–12 months + BP funnelTargets] Three annual conversions by month 12 with a 60% conversion target implies at least four paid pilots in the first year.'
- id: A10
  name: Net production customers at Y2 end
  value: '11'
  unit: count
  source: '[BP milestones 12–24 months] The BP aspires to 20-30 customers by 24 months; the model uses 11 as a deliberately slower, more believable ramp for a multi-stakeholder first-market sale.'
- id: A11
  name: Net production customers at Y3 end
  value: '20'
  unit: count
  source: '[BP market.som + research market.som] Y3 assumes 120 covered plants across ~20 logos, matching the research SOM plant count while keeping the customer count below the BP upper bound.'
- id: A12
  name: Paid pilot to annual conversion
  value: '60'
  unit: percent
  source: '[BP gtm.funnelTargets] The BP calls for 60%+ paid-pilot conversion; the base case uses exactly 60%.'
- id: A13
  name: Monthly logo churn
  value: '1.2'
  unit: percent per month
  source: 'Startup-finance heuristic: multi-stakeholder enterprise workflow SaaS often sees low-teens annual logo churn; 1.2% monthly is roughly 13-14% annual churn.'
- id: A14
  name: Steady-state gross margin
  value: '72'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] The BP targets 70%; the model reaches 72% once read-only integrations and template libraries reduce delivery labor.'
- id: A15
  name: Y1 blended gross margin
  value: '59'
  unit: percent
  source: 'Model mix effect from A2-A4 and A8-A9: early revenue is pilot-heavy and carries onboarding labor, so Y1 sits below the long-run software margin target.'
- id: A16
  name: Founder CEO loaded salary
  value: '160'
  unit: USD thousands per year
  source: 'Startup-finance heuristic: below-market but not symbolic pre-seed founder cash comp for enterprise software, inclusive of taxes and benefits.'
- id: A17
  name: Founding engineer loaded salary
  value: '140'
  unit: USD thousands per year
  source: 'Startup-finance heuristic: senior full-stack integration engineer comp, fully loaded.'
- id: A18
  name: Resilience operations lead loaded salary
  value: '125'
  unit: USD thousands per year
  source: 'Startup-finance heuristic: domain specialist blending insurance, claims, and recovery-ops workflow expertise.'
- id: A19
  name: Solutions engineer loaded salary
  value: '130'
  unit: USD thousands per year
  source: 'Startup-finance heuristic: customer-facing integration engineer for enterprise deployments.'
- id: A20
  name: Head of partnerships and AE loaded salaries
  value: 140 / 130
  unit: USD thousands per year
  source: 'Startup-finance heuristic: one senior channel builder plus one quota-carrying enterprise seller added only after the pilot motion is proven.'
- id: A21
  name: Later-stage support and product salaries
  value: 100 / 135 / 115 / 110
  unit: USD thousands per year
  source: 'Startup-finance heuristic: customer success, senior engineering, implementation/product, and partner success roles hired after repeatable onboarding is visible.'
- id: A22
  name: Non-salary sales and marketing spend
  value: 5-22
  unit: USD thousands per month
  source: '[BP gtm.channels + experimentRoadmap] Founder-led selling keeps early spend low; partner events, travel, and channel enablement increase after the Head of Partnerships joins.'
- id: A23
  name: Non-salary R&D spend
  value: 7-12
  unit: USD thousands per month
  source: '[BP product + operations] Cloud, connector maintenance, security tooling, and compliance overhead rise with the template library and integration surface.'
- id: A24
  name: Non-salary G&A spend
  value: 7-9
  unit: USD thousands per month
  source: 'Startup-finance heuristic: legal, accounting, insurance, and admin tools for a regulated-workflow startup stay lean but persistent.'
- id: A25
  name: Pre-seed raise at model start
  value: '2000'
  unit: USD thousands
  source: '[BP fundingAsk.targetFundingRangeUsd] The model uses the low end of the BP $2-4M target range because the hiring plan stays lean until the customer motion is proven.'
