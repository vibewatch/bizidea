scenarios:
  downside:
    description: Carrier acceptance stays shallow, partner referrals underperform, and blended ACV stalls near $120K, leaving the business more services-heavy through Y3.
    y3RevenueK: 1850.0
    y3EbitdaK: -220.0
    cashLowPointK: 615.0
    keyAssumptionChanges:
    - Y3 end production customers fall to 14 instead of 20.
    - Blended ACV holds near $120K instead of rising to $138K in H2 Y3.
    - Gross margin tops out near 68% because implementation labor remains sticky.
  base:
    description: The base case assumes 20 production customers by Y3 end, ACV expansion from $114K to $138K, and EBITDA turning positive as the channel mix improves.
    y3RevenueK: 2597.7
    y3EbitdaK: 294.8
    cashLowPointK: 959.8
    keyAssumptionChanges:
    - Base assumptions as modeled.
  upside:
    description: Broker and MDR channels scale earlier, adjacent-sector logos arrive in Y3, and the same team supports more customers because template reuse is stronger than expected.
    y3RevenueK: 3340.0
    y3EbitdaK: 780.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
    - Y3 end production customers rise to 24 instead of 20.
    - Blended ACV reaches roughly $150K through extra entities, broker seats, and incident-workspace attach.
    - Gross margin improves to 77% because integrations remain read-only and repeatable.
sensitivity:
- variable: ARPU
  downsideCase: Blended ACV stays around $120K through Y3.
  baseCase: Blended ACV rises from $114K to $138K by H2 Y3.
  upsideCase: Blended ACV reaches $150K through more plants and partner seats.
  y3RevenueImpactK: -320.0
  cashImpactK: -245.0
- variable: CAC
  downsideCase: CAC rises to $70K because direct outbound replaces broker-led opportunities.
  baseCase: CAC stays at $45K with founder-led selling plus partner referrals.
  upsideCase: CAC falls to $30K once broker and MDR channels source most qualified pilots.
  y3RevenueImpactK: 0.0
  cashImpactK: -200.0
- variable: churn
  downsideCase: Monthly churn reaches 2.0% as the product remains a convenience layer.
  baseCase: Monthly churn holds at 1.2% because workflows stay embedded in renewals and claims.
  upsideCase: Monthly churn falls to 0.7% once broker and insurer seats deepen account stickiness.
  y3RevenueImpactK: -150.0
  cashImpactK: -130.0
- variable: sales cycle
  downsideCase: First paid pilot slips from M5 to M7 and partner-sourced deals take 8-9 months.
  baseCase: First pilot starts in M5 and channel-assisted deals close in roughly 6 months.
  upsideCase: First pilot starts in M4 and renewal-driven channel deals close in 4-5 months.
  y3RevenueImpactK: -270.0
  cashImpactK: -230.0
- variable: gross margin
  downsideCase: Steady-state gross margin reaches only 65% because onboarding stays labor intensive.
  baseCase: Steady-state gross margin reaches 72% with repeatable read-only integrations.
  upsideCase: Steady-state gross margin reaches 78% as template reuse and self-service evidence collection improve.
  y3RevenueImpactK: 0.0
  cashImpactK: -185.0
- variable: hiring pace
  downsideCase: Two GTM or implementation hires are pulled forward by six months before the funnel proves out.
  baseCase: Hiring follows the lean ramp in the model and stays below 10 FTE until late Y3.
  upsideCase: The final two hires slip one quarter because onboarding automation improves faster than planned.
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Referrals[Broker, MDR, and DFIR referrals] --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> ARR[Subscription and add-on ARR]
      ARR --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue reaches $2.6M in Y3 by combining 20 production logos with ACV expansion from $114K to $138K through more plants, partner seats, and claim-workspace add-ons.
- checkName: Must go right
  finding: The company must keep paid-pilot conversion near 60% and let partner-led renewals compress the sales cycle, or the Y2 customer ramp will not cover the planned hiring.
- checkName: Model breaks if
  finding: If carriers treat the dossier as a convenience attachment and ACV stalls near $120K, the downside case pushes Y3 EBITDA back below zero and likely forces a bridge round.
- checkName: Next-round proof
  finding: The next financing is justified once 10+ production customers, repeatable 30-day onboarding, and 2 broker or carrier template clusters accepting 50%+ prefilled fields are all visible in live workflows.
sanityChecks:
  ruleOf40: Y3 growth 101% + EBITDA margin 11% = 113%.
  burnMultiple: Y2 burn multiple 0.4x (413.6K burn on 978K net new ARR).
  revenuePerFte: $260K Y3 revenue per year-end FTE (directionally within the $200-400K SaaS benchmark range).
  flags:
  - The base case reaches 20 production customers by Y3, below the BP upper-bound aspiration of 25-30, so the venture case still relies on expansion revenue per account.
  - Pilot and implementation revenue remains material through Y3; if services become more bespoke than assumed, gross margin and scalability deteriorate quickly.
  - CAC assumes broker, MDR, and DFIR referrals provide a meaningful share of wins by Y2; a mostly direct-sales motion would require a larger round.
  - The cash model ignores taxes, financing costs, and collection delays, so real-world cash conversion could be worse than EBITDA suggests.
