topRisks:
  - name: 保险公司接受风险
    description: 经纪商或承保方可能将档案包视为辅助报告，而非将其纳入正式续保与理赔工作流。
    mitigation: 先用少数几个经纪商和保险公司工作流定制导出模板和证据包，在证明响应时间和续保结果改善之后，再推进平台的全面扩展。
  - name: 数据完整性风险
    description: 恢复证据、资产清单和事件记录在各工厂、MSSP 和遗留系统之间往往残缺不全，可能削弱制成品质量。
    mitigation: 针对单一事件类型和单一续保模板以只读方式上线，并在自动化更多工作流之前，完成人工审核的证据映射和明确的置信度标记。
  - name: 预算分散风险
    description: 价值横跨安全、财务、保险和运营，若无单一高管负责这一问题，可能拖慢采购决策。
    mitigation: 聚焦时间敏感的续保或近期发生的事件切入销售，并将准备时间节省、保费谈判姿态和理赔速度量化，让 CFO 和 CISO 共同发起首次部署。
