jobsToBeDone:
  - job: >-
      当网络保险续保临近时，帮助 CISO 和 CFO 证明每家工厂能够检测、遏制并从重大事件中恢复，让他们无需再次手工整理证据，就能谈出更好的承保条款。
    currentAlternative: 经纪问卷加审计文件夹和电子表格证据收集
    successMetric: 续保准备时间缩短，保费或承保条款改善
  - job: >-
      当勒索软件事件爆发时，帮助事件和财务团队快速整理理赔时间线和恢复证明，让他们无需在文件搜找上损失数天，就能恢复运营并解锁保险公司支持。
    currentAlternative: MSSP 导出、共享盘、邮件线程和临时理赔清单
    successMetric: 提交完整理赔包的时间，以及达到文档化恢复里程碑的小时数
