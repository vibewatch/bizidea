problem: >-
  印度中端市场制造商越来越多地采购外包 SOC 服务、合规工具、备份系统和网络保单，但续保和灾难恢复仍以互不相连的项目方式推进。每当保险公司提出新的核保问题，或勒索软件事件爆发，CISO、财务团队、保险经纪人和恢复服务商就要在 MSSP 工单、审计 PDF、备份日志和电子表格资产清单之间疲于奔命，证明哪些管控措施曾经到位、业务能以多快的速度恢复。这种碎片化拖慢了保单续签、削弱了谈判筹码，并在流动性和运营连续性最关键的时刻拖延理赔受理。
targetUser:
  primary: >-
    拥有多工厂运营、外包或精简内部 SOC、且面临实质性勒索软件或业务中断风险敞口的印度汽车零部件及工业制造商 CISO 和风险负责人
  secondary: >-
    负责整理核保证据、董事会韧性报告和事故后恢复文档的保险、内部审计及业务连续性管理人员
  buyer: 与 CISO 协同的 CFO 或首席风险官
startupThesis:
  nonObviousInsight: >-
    网络领域新的控制点不是又一层告警；而是承保方和恢复团队都信任的证据层。一旦持有监管牌照的经纪商能嵌入 SOC 与事件响应的同一工作流，网络保险就不再是每年一次的采购品，而成为持续证明可恢复性的操作系统。
  beachhead: >-
    拥有 3–20 家工厂、1,000–10,000 名员工、外包或精简内部 SOC、且在未来 120 天内面临网络保险续保或董事会韧性审查的印度汽车零部件及工业制造商
  wedge: >-
    一份理赔就绪档案包——持续汇聚 SOC 事件、备份与恢复演练证据、管控例外项、资产重要性评级和保险公司要求，在事件发生前生成续保材料包，在事件发生后 72 小时内生成违规应急报告包
  whyNowCatalyst: >-
    Mitigata 的增长与持牌经纪商定位表明，印度买家现在迫切希望将安全运营、保险续签和事件恢复整合进一套工作流，专用的理赔就绪层因此变得紧迫。
  ventureScalePath: >-
    从面向印度制造商的续保与理赔证据起步，逐步扩展至 BFSI 和医疗行业；加入经纪商和保险公司工作流席位；统筹恢复服务商和桌面演练；最终成为跨新兴市场为网络风险与恢复就绪度定价的韧性数据底座。
solution: >-
  该产品连接客户的 SOC 或 MSSP 输出、备份与灾备系统、工单工具、资产清单、合规证据及保单问卷，为每家工厂和法律实体维护一份实时韧性档案包。续保前，它会生成满足保险公司要求的答复、标注可能影响条款的管控回退项，并将恢复演练证明、特权访问管理记录和事件响应覆盖情况按经纪商和承保方实际所需的格式打包。事件发生后，同一档案图谱转变为理赔工作台，记录事件时间线、受影响系统、已采取的遏制措施和已达成的恢复里程碑。第一版聚焦勒索软件和业务中断场景——证据质量直接影响保费结果、理赔速度和工厂运营时间。随着时间推移，护城河在于为每位客户积累技术管控、恢复行为与保险公司决策之间的专属映射关系，这是通用 GRC 工具、MSSP 和经纪商所无法捕获的。
goToMarketSeed:
  firstCustomer: >-
    印度上市汽车零部件制造商的 CISO 和 CFO，企业拥有 5–12 家工厂、外包 SOC，并在同行或供应商遭遇勒索软件中断后 90 天内面临网络保险续保
  buyingTrigger: >-
    即将到来的网络保单续保（核保问题更严苛）、客户或贷款方的韧性证据要求，或触发董事会审查备份及事件响应就绪情况的险情事件
  currentAlternative: >-
    每年一次的经纪问卷、ISO 或审计证据文件夹、MSSP 工单导出、备份截图、外部事件响应保留合同和电子表格理赔清单
  switchingReason: >-
    该切入点能将已生成的安全和恢复证据持续转化为承保方就绪和理赔就绪的制成品，买家无需替换现有 SOC、经纪商或备份系统，就能获得更强的谈判地位和更快的事后协调效率
  pricingHypothesis: >-
    按被保实体或工厂数量及启用的韧性工作流收取年度平台订阅费，并对事件战情室、经纪商席位和保险公司特定导出模板收取附加费用
