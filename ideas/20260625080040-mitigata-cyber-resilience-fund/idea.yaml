topRisks:
  - name: Insurer acceptance risk
    description: Brokers or underwriters may treat the dossier as helpful reporting rather than accept it as part of formal renewal and claim workflows.
    mitigation: Start with export templates and evidence packs tailored to a handful of broker and insurer workflows, then prove improved response time and renewal outcomes before broad platform expansion.
  - name: Data completeness risk
    description: Recovery evidence, asset inventories, and incident records are often inconsistent across plants, MSSPs, and legacy systems, which can weaken artifact quality.
    mitigation: Launch read-only on one incident type and one renewal template, with human-reviewed evidence mapping and explicit confidence flags before automating more workflows.
  - name: Split-budget risk
    description: The value lands across security, finance, insurance, and operations, which can slow buying decisions if no single executive owns the problem.
    mitigation: Sell into a time-bound renewal or recent incident with quantified savings in prep time, premium posture, and claim speed so the CFO and CISO can co-sponsor the initial deployment.
