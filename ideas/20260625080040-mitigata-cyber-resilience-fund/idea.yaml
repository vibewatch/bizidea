problem: >-
  Indian mid-market manufacturers increasingly buy outsourced SOC coverage,
  compliance tooling, backup systems, and a cyber policy, yet they still manage
  renewal and recovery as disconnected projects. When an insurer asks new
  underwriting questions or a ransomware incident hits, the CISO, finance team,
  broker, and recovery vendors scramble across MSSP tickets, audit PDFs, backup
  logs, and spreadsheet asset lists to prove what controls existed and how fast
  the business can recover. That fragmentation slows policy placement, weakens
  negotiating leverage on premiums, and can delay claim acceptance exactly when
  liquidity and operational uptime matter most.
targetUser:
  primary: >-
    CISOs and heads of risk at Indian auto-components and industrial
    manufacturers with multi-plant operations, outsourced or lean internal SOC
    coverage, and material ransomware or business-interruption exposure
  secondary: >-
    Insurance, internal-audit, and business-continuity managers who assemble
    underwriting evidence, board resilience updates, and post-incident recovery
    documentation
  buyer: CFO or chief risk officer partnering with the CISO
startupThesis:
  nonObviousInsight: >-
    The new control point in cyber is not another alerting layer; it is the
    evidence layer that both underwriters and recovery teams trust. Once a
    regulated broker can sit inside the same workflow as SOC and incident
    response, cyber insurance stops being a once-a-year procurement product and
    becomes an always-on operating system for proving recoverability.
  beachhead: >-
    Indian auto-components and industrial manufacturers with 3-20 plants,
    1,000-10,000 employees, outsourced or lean in-house SOC coverage, and a
    cyber-insurance renewal or board resilience review in the next 120 days
  wedge: >-
    A claim-readiness dossier that continuously pulls SOC incidents, backup and
    recovery drill evidence, control exceptions, asset criticality, and insurer
    requirements into a renewal pack before an event and a first-72-hours breach
    packet after one
  whyNowCatalyst: >-
    Mitigata's growth and regulated-broker positioning show Indian buyers now
    want security operations, insurance placement, and incident recovery linked
    in one workflow, making a purpose-built claim-readiness layer newly urgent.
  ventureScalePath: >-
    Start with renewal and claims evidence for Indian manufacturers, then expand
    into BFSI and healthcare, add broker and insurer workflow seats, orchestrate
    recovery vendors and tabletop drills, and ultimately become the resilience
    data rail that prices cyber risk and recovery readiness across emerging
    markets.
solution: >-
  The product connects to the customer's SOC or MSSP outputs, backup and
  disaster-recovery systems, ticketing tools, asset inventory, compliance
  evidence, and policy questionnaires to maintain a live resilience dossier for
  each plant and legal entity. Before renewal, it generates insurer-ready
  answers, highlights control regressions that could hurt terms, and packages
  proof of recovery drills, privileged-access hygiene, and incident-response
  coverage in the format brokers and underwriters actually request. When an
  incident occurs, the same graph becomes a claim workspace that timestamps what
  happened, what systems were affected, what containment actions were taken, and
  which recovery milestones were met. The first release focuses on ransomware
  and business-interruption scenarios where evidence quality directly affects
  premium outcomes, claim speed, and plant uptime. Over time the moat is the
  customer-specific mapping between technical controls, recovery behavior, and
  insurer decisions that generic GRC tools, MSSPs, and brokers do not capture.
