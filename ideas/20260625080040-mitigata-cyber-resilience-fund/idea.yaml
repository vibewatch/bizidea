differentiator: >-
  Most cyber vendors stop at detection, compliance evidence collection, or
  broker-led application support. This company owns the missing layer between
  them: the living dossier that maps technical controls and recovery behavior to
  underwriting and claim outcomes. Because it learns which evidence patterns
  actually change insurer questions, claim speed, and renewal terms for each
  customer profile, it can become more useful than generic GRC platforms and
  harder to displace than a one-off broker or IR retainer.
