openQuestions:
- Will Indian underwriters accept third-party generated dossier fields and recovery evidence, or will they still insist on manual broker questionnaire workflows?
- How complete are backup, asset, and MSSP evidence sets across plants in the first 90 days of onboarding?
- Which broker and carrier templates dominate cyber renewals for Indian auto-components and export-oriented industrial manufacturers?
- What measurable premium, retention, or claim-cycle improvement can early customers attribute to better evidence quality after one renewal or one incident?
