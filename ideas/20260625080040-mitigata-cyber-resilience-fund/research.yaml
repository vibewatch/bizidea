  adoptionFrictionMatrix:
  - friction: Cross-plant evidence is often incomplete across MSSP, backup, asset, and drill systems.
    severity: high
    affectedBuyer: CISO and business-continuity owner
    mitigation: Start read-only on one renewal template and one incident type, with explicit confidence flags and human review.
    sourceRefs:
    - 20
    - 23
    - 29
  - friction: Underwriters may not accept a third-party dossier unless it matches familiar broker or carrier templates.
    severity: high
    affectedBuyer: CFO or CRO
    mitigation: Pilot with two or three broker or carrier workflows and optimize exports before broad platform claims.
