competitors:
- name: Mitigata
  stage: scale-up
  wedge: India-first AI-native cyber resilience platform spanning cyber insurance, AI SOC, compliance, forensics, and incident response.
  pricing: Custom / enterprise quote
  strength: Local market credibility plus evidence of real operating scale across customers, incidents, and integrated insurance workflows.
  weaknessVsUs: Broad resilience stack rather than a neutral, carrier-agnostic claim dossier designed specifically for Indian manufacturers.
  sourceRefs:
  - 1
  - 2
- name: Coalition
  stage: scale-up
  wedge: Active Insurance that combines cyber coverage, risk monitoring, MDR, incident response, and claims data.
  pricing: Custom / quote-based policy
  strength: Deep claims data and policy-linked risk mitigation with strong carrier-distribution momentum.
  weaknessVsUs: Carrier-centered workflow with limited India-local broker neutrality and less focus on plant-level evidence packs.
  sourceRefs:
  - 24
  - 26
  - 39
- name: At-Bay
  stage: scale-up
  wedge: Cyber insurer with unified security platform, MDR, advisory services, and in-house response-and-recovery workflows.
  pricing: Custom / quote-based policy
  strength: Strong prevention-to-response integration and proof that manufacturer recovery outcomes can be materially improved.
  weaknessVsUs: Best aligned to its own policy and platform rather than a cross-carrier dossier layer for Indian buyers.
  sourceRefs:
  - 27
  - 28
  - 29
- name: Resilience
  stage: scale-up
  wedge: Cyber insurance plus executive risk-operations platform for complex, multi-entity organizations.
  pricing: Custom / enterprise
  strength: Strong fit for large organizations needing portfolio-level visibility and financially framed cyber-risk management.
  weaknessVsUs: Oriented to broad enterprise cyber-risk programs, not plant-level renewal and first-72-hours claim packets.
  sourceRefs:
  - 30
  - 31
- name: CFC
  stage: incumbent
  wedge: Specialist cyber insurer with manufacturer-specific positioning and incident-response services.
  pricing: Custom / quote-based policy
  strength: Deep cyber-insurance specialization and an explicit manufacturer buyer message.
  weaknessVsUs: Policy and response service centric, not a continuous evidence graph across SOC, backups, drills, and carrier templates.
  sourceRefs:
  - 32
