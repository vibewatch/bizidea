slug: cyber-claim-readiness-os
date: '2026-06-25'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 启动时生产客户数（第 1 个月）
  value: '0'
  unit: count
  source: '[BP gtm.wedge] 销售动作从付费续保就绪部署起步，年度订阅在后，因此模型启动时无生产客户。'
- id: A2
  name: 付费试点费用
  value: '30'
  unit: USD thousands
  source: '[BP investorMemo.firstCustomer.initialContract] 试点或实施定价为 $20k–$35k；模型取中值 $30K。'
- id: A3
  name: 试点收入确认周期
  value: '2'
  unit: months
  source: '[BP gtm.pricing] 试点与一次实时续保周期挂钩；模型在 8 周部署期内分期确认费用。'
- id: A4
  name: 初始生产 ACV
  value: '114'
  unit: USD thousands per customer per year
  source: '[BP gtm.pricing + research bottomUpSizingDrivers] 研究显示每个被覆盖工厂约 $12K；首批 6 工厂客户基础 ARR 约 $72K，其余来自 BP 中描述的事件工作台和模板附加项。'
- id: A5
  name: 第 2 年混合 ACV
  value: '120'
  unit: USD thousands per customer per year
  source: '[BP businessModel.expansionLevers] 账户内扩展增加工厂、法律实体和模板，使第 2 年混合合同价值小幅提升。'
- id: A6
  name: 第 3 年上半年混合 ACV
  value: '129'
  unit: USD thousands per customer per year
  source: '[BP businessModel.expansionLevers + milestones 12–24 months] 经纪商席位、保险公司审阅席位和基准报告在第 3 年开始混入合同价值。'
- id: A7
  name: 第 3 年下半年混合 ACV
  value: '138'
  unit: USD thousands per customer per year
  source: '[BP product.twentyFourMonth + BP businessModel.expansionLevers] 后期合同包含更多实体、合作伙伴席位和理赔工作台用量，推动混合 ACV 趋近 BP 区间上限。'
- id: A8
  name: 首个付费试点签约月份
  value: '5'
  unit: months from model start
  source: '[BP experimentRoadmap] 计划前 90 天用于访谈、原型复盘和集成，使第 5 个月成为首个可信付费试点的起点。'
- id: A9
  name: 第 1 年付费试点数
  value: '4'
  unit: count
  source: '[BP milestones 0–12 months + BP funnelTargets] 第 12 个月完成 3 次年度转化，60% 转化目标意味着第一年至少 4 个付费试点。'
- id: A10
  name: 第 2 年末净生产客户数
  value: '11'
  unit: count
  source: '[BP milestones 12–24 months] BP 希望 24 个月达到 20–30 家客户；模型取 11，反映多利益方首市场销售更慢但更可信的增长节奏。'
- id: A11
  name: 第 3 年末净生产客户数
  value: '20'
  unit: count
  source: '[BP market.som + research market.som] 第 3 年假设约 20 个客户跨 120 个被覆盖工厂，与研究中 SOM 工厂数一致，同时将客户数控制在 BP 上限以下。'
- id: A12
  name: 付费试点转年度订阅率
  value: '60'
  unit: percent
  source: '[BP gtm.funnelTargets] BP 要求 60%+ 付费试点转化；基础情景取整 60%。'
- id: A13
  name: 月度客户流失率
  value: '1.2'
  unit: percent per month
  source: '初创财务经验法则：多利益方企业工作流 SaaS 年度客户流失通常为低十位数百分比；1.2% 月流失约合年流失 13–14%。'
- id: A14
  name: 稳态毛利率
  value: '72'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] BP 目标 70%；随着只读集成和模板库降低交付人力，模型达到 72%。'
- id: A15
  name: 第 1 年混合毛利率
  value: '59'
  unit: percent
  source: '模型对 A2–A4 和 A8–A9 的组合效应：早期收入以试点为主，承担入驻人力成本，因此第 1 年低于长期软件毛利率目标。'
- id: A16
  name: 创始人/CEO 含税薪资
  value: '160'
  unit: USD thousands per year
  source: '初创财务经验法则：企业软件 pre-seed 创始人低于市价但非象征性的现金薪酬，含税费和福利。'
- id: A17
  name: 联合创始工程师含税薪资
  value: '140'
  unit: USD thousands per year
  source: '初创财务经验法则：高级全栈集成工程师薪酬，全额含税。'
- id: A18
  name: 韧性运营负责人含税薪资
  value: '125'
  unit: USD thousands per year
  source: '初创财务经验法则：融合保险、理赔和恢复运营工作流专业知识的领域专家薪酬。'
- id: A19
  name: 解决方案工程师含税薪资
  value: '130'
  unit: USD thousands per year
  source: '初创财务经验法则：面向客户的企业部署集成工程师薪酬。'
- id: A20
  name: 渠道合作负责人与客户经理含税薪资
  value: 140 / 130
  unit: USD thousands per year
  source: '初创财务经验法则：一名高级渠道建设者加一名带配额的企业销售人员，仅在试点动作被验证后加入。'
- id: A21
  name: 后期支持与产品岗含税薪资
  value: 100 / 135 / 115 / 110
  unit: USD thousands per year
  source: '初创财务经验法则：可重复入驻可见后招聘的客户成功、高级工程、实施/产品和合作伙伴成功岗位。'
- id: A22
  name: 非薪资销售与市场费用
  value: 5-22
  unit: USD thousands per month
  source: '[BP gtm.channels + experimentRoadmap] 创始人主导销售初期费用低；合作伙伴活动、差旅和渠道赋能在渠道合作负责人加入后增加。'
- id: A23
  name: 非薪资研发费用
  value: 7-12
  unit: USD thousands per month
  source: '[BP product + operations] 云计算、连接器维护、安全工具和合规开销随模板库和集成面扩大而上升。'
- id: A24
  name: 非薪资 G&A 费用
  value: 7-9
  unit: USD thousands per month
  source: '初创财务经验法则：监管工作流初创公司的法务、会计、保险和管理工具保持精简但持续。'
- id: A25
  name: 模型启动时 pre-seed 融资
  value: '2000'
  unit: USD thousands
  source: '[BP fundingAsk.targetFundingRangeUsd] 模型取 BP $2–4M 目标区间的低端，因为招聘计划在客户动作被验证前保持精简。'
