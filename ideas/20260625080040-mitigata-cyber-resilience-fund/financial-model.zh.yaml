scenarios:
  downside:
    description: 承保方接受度停留在浅层，合作伙伴转介表现不佳，混合 ACV 在 $120K 附近停滞，导致整个第 3 年业务仍偏服务型。
    y3RevenueK: 1850.0
    y3EbitdaK: -220.0
    cashLowPointK: 615.0
    keyAssumptionChanges:
    - 第 3 年末生产客户从 20 家降至 14 家。
    - 混合 ACV 保持在 $120K 附近，而非在第 3 年下半年升至 $138K。
    - 毛利率上限约 68%，因为实施人力成本居高不下。
  base:
    description: 基础情景假设第 3 年末 20 家生产客户、ACV 从 $114K 扩展至 $138K，随着渠道组合改善 EBITDA 转正。
    y3RevenueK: 2597.7
    y3EbitdaK: 294.8
    cashLowPointK: 959.8
    keyAssumptionChanges:
    - 按模型基础假设推进。
  upside:
    description: 经纪商和 MDR 渠道更早放量，邻近行业客户在第 3 年到来，同一团队因模板复用超预期而能支撑更多客户。
    y3RevenueK: 3340.0
    y3EbitdaK: 780.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
    - 第 3 年末生产客户从 20 家升至 24 家。
    - 通过额外实体、经纪商席位和事件工作台附加，混合 ACV 达到约 $150K。
    - 毛利率升至 77%，因为集成保持只读且可重复。
sensitivity:
- variable: ARPU
  downsideCase: 混合 ACV 在整个第 3 年保持在约 $120K。
  baseCase: 混合 ACV 从 $114K 升至第 3 年下半年的 $138K。
  upsideCase: 通过更多工厂和合作伙伴席位，混合 ACV 达到 $150K。
  y3RevenueImpactK: -320.0
  cashImpactK: -245.0
- variable: CAC
  downsideCase: CAC 升至 $70K，因为直接外呼取代了经纪商来源的机会。
  baseCase: CAC 保持在 $45K，创始人主导销售加合作伙伴转介。
  upsideCase: 一旦经纪商和 MDR 渠道来源大多数合格试点，CAC 降至 $30K。
  y3RevenueImpactK: 0.0
  cashImpactK: -200.0
- variable: churn
  downsideCase: 月度流失率升至 2.0%，产品停留在便利层。
  baseCase: 月度流失率保持在 1.2%，工作流嵌入续保和理赔流程。
  upsideCase: 经纪商和保险公司席位加深账户黏性后，月度流失率降至 0.7%。
  y3RevenueImpactK: -150.0
  cashImpactK: -130.0
- variable: sales cycle
  downsideCase: 首个付费试点从第 5 个月推迟至第 7 个月，合作伙伴来源的交易需要 8–9 个月。
  baseCase: 首个试点在第 5 个月启动，渠道辅助交易约 6 个月内成交。
  upsideCase: 首个试点在第 4 个月启动，续保驱动的渠道交易 4–5 个月内成交。
  y3RevenueImpactK: -270.0
  cashImpactK: -230.0
- variable: gross margin
  downsideCase: 稳态毛利率仅达 65%，因为入驻流程仍高度依赖人力。
  baseCase: 随着可重复的只读集成，稳态毛利率达 72%。
  upsideCase: 随着模板复用和自助证据收集改善，稳态毛利率达 78%。
  y3RevenueImpactK: 0.0
  cashImpactK: -185.0
- variable: hiring pace
  downsideCase: 在销售漏斗验证前，两名 GTM 或实施岗提前六个月入职。
  baseCase: 招聘按模型中的精简节奏推进，第 3 年末前保持不足 10 名全职员工。
  upsideCase: 由于入驻自动化比预期更快改善，最后两名招聘推迟一个季度。
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Referrals[Broker, MDR, and DFIR referrals] --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> ARR[Subscription and add-on ARR]
      ARR --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入在第 3 年达到 $2.6M，结合 20 个生产客户与 ACV 从 $114K 扩展至 $138K（通过更多工厂、合作伙伴席位和理赔工作台附加实现）。
- checkName: 必须做对的事
  finding: 公司必须将付费试点转化率保持在约 60%，并让合作伙伴驱动的续保压缩销售周期，否则第 2 年的客户增长将无法覆盖计划中的招聘。
- checkName: 模型崩溃的情形
  finding: 若承保方将档案包视为便利附件且 ACV 在 $120K 附近停滞，悲观情景下第 3 年 EBITDA 重返负值，可能需要桥接融资。
- checkName: 下轮融资证明
  finding: 当 10+ 家生产客户、可重复的 30 天入驻流程，以及 2 个经纪商或承保方模板集群接受 50%+ 预填字段均在实时工作流中可见时，即可支撑下轮融资。
sanityChecks:
  ruleOf40: 第 3 年增长率 101% + EBITDA 利润率 11% = 113%。
  burnMultiple: 第 2 年烧钱倍数 0.4 倍（$413.6K 烧钱对应 $978K 净新增 ARR）。
  revenuePerFte: 第 3 年年末每全职员工营收 $260K（方向上在 $200–400K SaaS 基准区间内）。
  flags:
  - 基础情景第 3 年达到 20 家生产客户，低于 BP 上限目标 25–30 家，风险投资回报仍依赖每个账户的扩展收入。
  - 试点和实施收入在整个第 3 年仍占相当比重；若服务比假设更定制化，毛利率和可扩展性将迅速恶化。
  - CAC 假设经纪商、MDR 和 DFIR 转介在第 2 年提供相当比例的赢单；若主要依赖直销，则需要更大轮次的融资。
  - 现金模型忽略税费、融资成本和收款延迟，实际现金转化可能比 EBITDA 表现更差。
