slug: cyber-claim-readiness-os
date: "2026-06-25"
executiveSummary: >-
  Cyber claim-readiness OS is a carrier-neutral workflow layer for Indian multi-plant
  manufacturers that need to prove recoverability during cyber-policy renewals and
  in the first 72 hours after an incident. The beachhead is auto-components and
  adjacent industrial manufacturers with 3-20 plants, lean or outsourced SOC
  coverage, and a renewal, board review, or lender/customer resilience request in
  the next 120 days. The first product is deliberately narrow: it connects MSSP or
  SOC outputs, backup and recovery evidence, asset inventories, drill records, and
  insurer questionnaires into one live dossier rather than trying to replace the
  SOC, broker, or backup stack. The initial go-to-market system is a paid
  renewal-readiness deployment sold jointly to the CISO and CFO through founder-led
  sales plus broker, MDR, and DFIR referrals when a live underwriting deadline or
  near miss makes the pain budgeted. This wedge is attractive because manufacturing
  ransomware and downtime costs are real, but the narrow India manufacturing market
  alone is not large enough for a venture outcome without later expansion into more
  sectors, more workflow seats, and more insurer or broker surfaces. The plan
  assumes underwriters and brokers will accept prefilled dossier exports if they
  match familiar templates and improve response speed; that is still unproven and
  is the biggest disconfirming risk. Research also does not provide named insurer
  partners, quantified premium reductions, or measured claim-cycle improvements for
  this exact product, so the first 12 months must focus on carrier acceptance,
  integration completeness, and paid pilot conversion rather than broad scaling.
problem:
  - Indian manufacturers preparing for cyber renewals or recovering from ransomware still assemble evidence from MSSP tickets, backup screenshots, audit folders, and spreadsheets, which slows underwriting responses and claim assembly.
  - The economic pain sits across security, finance, insurance, and plant operations, but no existing system maintains a timestamped plant-level dossier mapping controls and recovery behavior to insurer and claim requirements.
solution:
  - Build a live claim-readiness dossier that normalizes SOC alerts, control exceptions, asset criticality, backup posture, recovery drills, and policy-questionnaire fields by plant and legal entity.
  - Generate broker- and carrier-ready renewal packs before an event and a first-72-hours claim workspace after an event, with explicit confidence flags where source evidence is incomplete.
whyWeWin:
  - We start at a deadline-driven workflow where buyers already spend money and where the startup can improve outcomes without replacing the incumbent SOC, broker, insurer, or backup vendor.
  - Repeated acceptance data across carrier templates, evidence-completeness benchmarks, and customer-specific mappings between controls, recovery artifacts, and underwriting outcomes can compound into a defensible dossier network.
strategicChoices:
  beachhead: Indian listed and export-oriented auto-components manufacturers with 5-12 plants, 1,000-10,000 employees, outsourced or lean internal SOC coverage, and a cyber-policy renewal inside 120 days.
  wedgeRationale: This segment has identifiable accounts, real ransomware and downtime exposure, and a concrete buying moment where the CISO and CFO already need to coordinate evidence; selling a broader resilience platform would delay proof and increase competitive overlap with incumbents.
  sequencingRationale: Product starts read-only with one renewal template and one ransomware or business-interruption incident playbook because evidence trust matters before automation; GTM starts on live renewals through brokers and response partners because deadlines create budget; hiring starts with integration and resilience operations depth before adding scaled sales.
  notYet:
    - BFSI and healthcare accounts that require different carrier templates and operating motions.
    - Acting as a broker, MGA, or underwriting platform rather than a workflow layer inside licensed channels.
    - Replacing MDR, GRC, backup, or disaster-recovery systems with a broader cyber-control suite.
market:
  tam: Estimated $72.0M TAM based on roughly 6,000 eligible Indian plants at about $12k ARR per plant workflow.
  sam: Estimated $24.0M SAM based on roughly 2,000 first-serviceable plants across auto-components and adjacent export-oriented industrial manufacturers reachable through broker, MDR, and direct channels.
  som: Estimated $1.4M year-3 SOM based on about 120 deployed plants across 25-30 customers after landing one renewal or incident workflow first.
  segments:
    - Indian auto-components manufacturers with multi-plant operations and near-term cyber renewal pressure.
    - Adjacent industrial manufacturers with export exposure, lender or customer resilience scrutiny, and similar backup plus MSSP fragmentation.
  buyingProcess: >-
    The deal likely starts when the CISO, broker, or CFO team is forced to answer
    a renewal questionnaire or board resilience review on a deadline. It closes
    only if the CFO or CRO and the CISO agree that faster dossier assembly,
    cleaner insurer responses, and better claim readiness are worth buying as a
    workflow layer rather than continuing with manual broker-led coordination.
product:
  mvp: >-
    MVP covers one customer, one dominant broker or carrier renewal template, and
    one ransomware or business-interruption incident workflow. It includes read-only
    integrations into MSSP or SOC output, backup tooling, asset inventory,
    ticketing, and drill records; dossier generation with confidence flags; and
    exportable renewal and first-notice-of-loss packets, while deliberately
    excluding policy binding, broad compliance automation, or recovery orchestration.
  sixMonth: Ship repeatable onboarding for one renewal template plus one incident playbook, plant-level evidence mapping, broker-ready exports, and a dashboard showing missing fields, stale evidence, and recovery-drill gaps.
  twelveMonth: Add multi-template support for the top broker and carrier workflows seen in early pilots, broker and insurer review seats, incident timeline capture, and benchmarks for renewal-prep time and evidence completeness.
  twentyFourMonth: Expand the same evidence graph into BFSI and healthcare dossiers, recovery-vendor orchestration, and benchmarking products for brokers and carriers without becoming a full SOC or generic GRC suite.
  keyBets:
    - Underwriters and brokers will accept at least part of a third-party dossier if it mirrors familiar templates and reduces back-and-forth during live renewals.
    - A plant-level integration playbook can reach usable evidence completeness inside 30 days without heavy custom services.
    - CFO and CISO buyers will pay for better renewal and claim execution even when cyber insurance pricing is not hardening sharply.
gtm:
  wedge: Sell a paid renewal-readiness deployment for one manufacturer entering renewal or resilience review within 90 days, then convert that account into an annual subscription covering continuous dossier upkeep and claim-readiness.
  channels:
    - Founder-led direct sales to CISOs, CFOs, CROs, and business-continuity leaders at target manufacturers.
    - Referral and co-sell relationships with cyber brokers, MGAs, and licensed insurance channels that already own renewal workflows.
    - MDR, MSSP, DFIR, and backup-partner referrals that already hold the operational evidence used in the dossier.
  funnelTargets: "Lead→qualified pilot 20-30%, qualified pilot→paid pilot 50%+, paid pilot→annual subscription 60%+, first account→second plant or entity expansion within 12 months in 50%+ of production customers."
  pricing: >-
    Charge a paid onboarding or pilot fee tied to one live renewal cycle, then an
    annual subscription priced by covered plants or insured entities and active
    workflows. A credible first production contract is roughly $60k-$140k ARR for
    a 5-12 plant manufacturer, with additional fees for broker seats,
    insurer-specific templates, and incident war-room access; this matches the
    buyer's budget logic better than per-user pricing.
businessModel:
  revenueStreams:
    - Annual platform subscription for plant-level renewal and claim-readiness workflows.
    - Implementation and evidence-mapping fees for initial dossier setup and template configuration.
    - Add-on revenue for broker seats, insurer review seats, incident war rooms, and sector-specific template packs.
  unitOfValue: Covered plant or insured entity running a live renewal and claim-readiness workflow.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more plants, legal entities, and renewal templates within the same manufacturing group.
    - Expand from renewal-readiness into claim workspace, recovery-vendor coordination, and resilience benchmarking modules.
    - Sell workflow seats and benchmark data products to brokers, carriers, and adjacent regulated sectors.
strategyMap:
  northStarMetric: Number of covered plants with a live dossier used in a real renewal or claim workflow.
  inputMetrics:
    - Days from kickoff to first complete dossier export.
    - Percentage of required renewal fields auto-filled with acceptable evidence confidence.
    - Paid pilot to annual subscription conversion rate.
    - Median reduction in renewal-prep hours or first-notice-of-loss assembly time.
    - Net expansion from additional plants, entities, or broker seats in existing accounts.
  moatsToBuild:
    - Carrier-, broker-, and sector-specific dossier template library accepted in real workflows.
    - Evidence graph linking controls, assets, drills, and recovery milestones at plant level.
    - Benchmark dataset showing which evidence patterns improve insurer response speed, renewal posture, or claim readiness.
  killCriteria:
    - Fewer than 2 brokers or carriers accept 50% or more of prefilled dossier fields in the first 6 live renewals by month 12.
    - Fewer than 3 paid pilots convert to annual subscriptions at "$60k+" ARR by month 15.
    - Median time to first usable dossier stays above 30 days after the first 3 deployments, implying integration drag will block efficient GTM.
  mermaid: |
    flowchart LR
      Wedge[Manufacturer renewal-readiness wedge] --> MVP[Live dossier plus carrier exports]
      MVP --> Proof[Accepted renewals and faster claim packets]
      Proof --> Expansion[More plants, carriers, and adjacent sectors]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong workflow pain and a coherent wedge, but carrier acceptance and venture-scale expansion remain too unproven for a high-conviction meeting today.
    whyBelieve: The company targets a real cross-functional deadline where manufacturers already scramble to assemble evidence and where neutral workflow software can improve both renewal and recovery execution without replacing incumbent tools.
    whyDoubt: The narrow India manufacturing market is modest and the core value claim fails if brokers and underwriters still treat the dossier as a convenience attachment instead of workflow input.
    nextDiligence: Get 2-3 live pilot renewals with documented insurer or broker acceptance, measurable prep-time reduction, and at least one paid conversion before upgrading the call.
  firstCustomer:
    title: CISO at a listed Indian auto-components manufacturer
    profile: A 3,000-employee manufacturer with 6 plants, outsourced SOC coverage, quarterly recovery drills, and a cyber renewal coming due after a peer or supplier ransomware disruption.
    trigger: A renewal questionnaire, lender or customer resilience request, or near miss forces the CFO and CISO to prove plant-level recoverability on a fixed deadline.
    buyer: CFO or CRO partnering with the CISO
    initialContract: >-
      $20k-$35k paid renewal-readiness pilot or implementation converting to a
      $60k-$140k annual subscription priced by covered plants and active renewal
      plus claim workflows, with expansion through additional entities and broker
      seats.
  mustBeTrue:
    - Early customers will pay before a claim occurs because renewal deadlines and board scrutiny are painful enough on their own.
    - At least one broker and carrier cluster used by Indian manufacturers will repeatedly accept third-party dossier exports with limited manual rework.
    - A read-only integration approach can deliver credible evidence completeness inside 30 days for most target accounts.
    - Buyers will attribute enough value to faster prep, cleaner underwriting responses, or better claim execution to support $60k+ annual subscriptions.
    - The same evidence graph can later expand into adjacent sectors and partner seats without losing workflow specificity.
  diligenceQuestions:
    - Which exact broker and carrier templates dominate cyber renewals for Indian auto-components manufacturers today?
    - In a live pilot, what percentage of dossier fields are accepted as-is versus manually edited by brokers or underwriters?
    - How incomplete are backup, asset, and MSSP datasets across the first three plants onboarded at a target customer?
    - Does the CFO perceive enough budget ownership to co-sponsor the product, or does it remain a split security-services purchase?
    - Can the company show a measurable reduction in renewal-prep time or first-notice-of-loss assembly time after one deployment?
operatingAssumptions:
  - assumption: Brokers and underwriters will accept structured third-party dossier exports if they match familiar workflows.
    basis: research.yaml
    validationTest: Run 6 live renewals and confirm at least 2 broker or carrier groups accept 50%+ of prefilled fields with minimal manual rewrite.
    decisionImpact: If false, reposition toward internal readiness software and claim-prep tooling rather than underwriting-facing workflow.
  - assumption: Most target manufacturers can connect enough MSSP, backup, asset, and drill evidence within 30 days to create a useful first dossier.
    basis: research.yaml
    validationTest: Complete 3 onboarding projects and measure field-level completeness, manual cleanup hours, and time to first usable export.
    decisionImpact: If false, narrow the ICP to better-instrumented enterprises or make services a deliberate part of the model.
  - assumption: CFO plus CISO co-sponsorship is achievable when the sale is tied to a live renewal or post-incident review.
    basis: idea.yaml
    validationTest: Win 4 paid pilots where both a finance executive and security executive attend the close and sign success criteria.
    decisionImpact: If false, the company must repackage around a single-budget owner or accept slower enterprise sales cycles.
  - assumption: The workflow can expand beyond Indian manufacturing into adjacent sectors and partner seats without losing differentiation.
    basis: operator judgment
    validationTest: By month 15, secure at least 3 expansion opportunities for broker seats, additional entities, or one adjacent-sector pilot from existing relationships.
    decisionImpact: If false, the business remains a niche workflow product and may not justify venture-style financing.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 25 target manufacturers plus 6 brokers or DFIR partners around upcoming renewals and recent resilience reviews.
    hypothesis: At least 10 target accounts have a named renewal or resilience deadline inside 6 months and view evidence assembly as a top-three problem.
    successMetric: 10+ qualified accounts with named trigger, buyer pair, and current manual workflow documented.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build a dossier prototype using one broker or carrier template and replay a mock or historical renewal with two design partners.
    hypothesis: Buyers and brokers prefer a structured export with confidence flags over spreadsheet and PDF evidence packs.
    successMetric: 2 design partners agree to a paid pilot or implementation after reviewing the prototype.
    owner: Founder product
  - horizon: 0–90 days
    experiment: Implement read-only connectors into one MSSP feed, one backup system, asset inventory, and drill records for the first design partner.
    hypothesis: First usable dossier export can be produced inside 30 days without custom integration sprawl.
    successMetric: One customer receives a usable renewal packet with at least 70% of required fields populated in 30 days.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Run 3 live renewal pilots with explicit broker or carrier acceptance tracking.
    hypothesis: Third-party dossier exports will reduce manual evidence assembly time and get partial workflow acceptance in real underwriting.
    successMetric: 3 live pilots completed, 2 with documented broker or carrier acceptance of 50%+ prefilled fields.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Launch first-notice-of-loss and first-72-hours incident workspace for early accounts.
    hypothesis: The same evidence graph used for renewals can materially shorten post-incident claim assembly.
    successMetric: One tabletop or live incident shows 30%+ reduction in time to produce a claim-ready packet versus the customer's prior process.
    owner: Resilience operations lead
  - horizon: 6–12 months
    experiment: Sign broker, MDR, and backup-channel partners and test partner-sourced pipeline quality.
    hypothesis: Channel partners can source better-timed opportunities than cold outbound because they already see renewal deadlines and evidence gaps.
    successMetric: 3 signed partners and 2 partner-sourced paid pilots by month 12.
    owner: Head of partnerships
operations:
  - Maintain a carrier-template library with versioned renewal and claim-export formats rather than building open-ended custom reports for every account.
  - Run onboarding with a documented evidence-confidence rubric so missing backup, asset, or drill data is visible before it damages customer trust.
  - Keep the product inside licensed broker and insurer workflows with audit trails and timestamp preservation instead of handling policy placement directly.
  - Use named customer-side owners across security, finance, and business continuity for each deployment because split accountability is operationally fatal in this workflow.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led selling, broker relationships, and design-partner packaging because the first deals require category education and trust.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the evidence graph, read-only integrations, dossier generator, and export engine needed for the first live pilots.
  - role: Resilience operations lead
    startTiming: Month 3
    rationale: Translate carrier, claims, and recovery requirements into repeatable templates and customer onboarding playbooks.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Reduce integration drag, improve deployment speed, and protect core engineering focus as pilots multiply.
  - role: Head of partnerships
    startTiming: Month 9
    rationale: Convert broker, MDR, DFIR, and backup relationships into a repeatable channel once the pilot motion is proven.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 6-8 design partners in Indian auto-components and adjacent industrial manufacturing.
      - Complete 3 live renewal pilots and convert at least 3 customers into annual subscriptions.
      - Prove first dossier export in 30 days and partial broker or carrier acceptance in at least 2 workflows.
      - Launch first-notice-of-loss workspace and document time savings in one tabletop or live incident.
  - horizon: 12–24 months
    items:
      - Support the top broker and carrier template clusters seen in early deployments.
      - Grow to 20-30 production customers and 100+ covered plants while keeping deployment largely repeatable.
      - Add broker and insurer seats plus benchmark reporting for evidence completeness and renewal posture.
      - Win first adjacent-sector pilots in BFSI or healthcare using the same core evidence graph.
  - horizon: 24–36 months
    items:
      - Expand from India manufacturing into broader regulated and downtime-sensitive sectors across the region.
      - Build a differentiated benchmark dataset linking evidence quality, recovery behavior, and renewal or claim outcomes.
      - Reach meaningful partner-sourced pipeline through brokers, MDR, DFIR, and recovery ecosystems.
      - Prove the product can remain carrier-neutral while serving multi-template, multi-entity enterprise accounts.
risks:
  - risk: Brokers or underwriters may refuse to treat the dossier as formal workflow input.
    likelihood: High
    impact: High
    mitigation: Start with the most common templates, track field-level acceptance, and focus early value on prep-time and claim-readiness gains even before premium impact is proven.
  - risk: Plant-level evidence across MSSPs, backup tools, and asset inventories may be too incomplete for reliable exports.
    likelihood: High
    impact: High
    mitigation: Launch read-only with confidence flags, narrow integrations, and human-reviewed evidence mapping before automating more workflows.
  - risk: Budget ownership may remain split across security, finance, insurance, and operations, slowing deal cycles.
    likelihood: Medium
    impact: High
    mitigation: Sell into live renewals with quantified deadlines and require identified CFO or CRO plus CISO sponsorship for every pilot.
  - risk: Active-insurance incumbents or broad resilience platforms may bundle enough workflow to compress standalone demand.
    likelihood: Medium
    impact: Medium
    mitigation: Stay carrier-neutral, localize for Indian manufacturing, and win on faster dossier assembly and cross-tool orchestration rather than broad platform breadth.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the first production product, 6-8 design partners, repeatable integrations and template library, a small resilience-operations and solutions team, and proof that live renewals convert into annual subscriptions before larger-scale expansion.
