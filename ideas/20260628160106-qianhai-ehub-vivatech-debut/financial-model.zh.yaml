slug: global-pilot-launch-os
date: '2026-06-28'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-28] 模型从商业计划日期的次月开始。'
- id: A2
  name: 第 1 个月期初现金
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + model sizing] 在声明范围内取一个轮次规模，以覆盖第 24 个月里程碑窗口并保留缓冲。'
- id: A3
  name: 起始活跃付费工作台数
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones] 公司从零营收起步，须先将共创客户转化为有偿激活。'
- id: A4
  name: 模型追踪的客户单元
  value: Active paid Europe-launch workspace equivalent
  unit: definition
  source: '[BP businessModel.unitOfValue + BP businessModel.revenueStreams] customersEop 统计初创企业工作台和主办方部署中的初创席位，因为定价绑定在线发布行动，而非纯粹的席位数量。'
- id: A5
  name: 每活跃工作台混合确认收入
  value: Y1 $22K/year, Y2 $30K/year, Y3 $34K/year
  unit: USD/workspace/year
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research willingnessToPay] 将 $12k—$36k 循环软件、$5k—$15k 激活费和适度的主办方报告溢价混合后估算。'
- id: A6
  name: 新有偿工作台启动节奏
  value: Y1 7 starts; Y2 26 starts; Y3 40 starts
  unit: workspace starts
  source: '[BP milestones + BP gtm.channels + BP strategicChoices.sequencingRationale] 启动量在创始人主导的验证完成后才加速，随后通过园区队列、转介和重复展会使用扩张。'
- id: A7
  name: 月活跃工作台流失率
  value: 1.5%
  unit: pct/month
  source: '[startup-finance heuristic + BP risks] 假设激活后存在一定流失，但因买家带着活跃试点紧迫性入网，流失率低于普通 SMB SaaS。'
- id: A8
  name: 毛利率爬坡
  value: 52% in Y1, 61% in Y2, 70% in Y3
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research regulatoryLandscape] 早期交付激活密集且依赖合作伙伴，在产品达到声明的 70% 目标之前。'
- id: A9
  name: 创始人 / CEO 含税薪酬
  value: $180K
  unit: USD/year
  source: '[BP team Founder / CEO + startup-finance heuristic] 假设创始人适度的现金薪酬加薪资税和福利。'
- id: A10
  name: 工程含税薪酬
  value: $185K
  unit: USD/year
  source: '[BP team Founding eng + Full-stack or workflow engineer + startup-finance heuristic] 含薪资负担的跨境产品工程人才。'
- id: A11
  name: 产品 / 解决方案含税薪酬
  value: $150K
  unit: USD/year
  source: '[BP team Product-minded solutions operator + startup-finance heuristic] 客户实施和工作流运营人才，定价低于工程但高于通用运营。'
- id: A12
  name: 销售 / 合作伙伴含税薪酬
  value: $180K
  unit: USD/year
  source: '[BP team Partnerships lead + BP gtm.channels + startup-finance heuristic] 一名资深渠道销售，含差旅和浮动薪酬负担。'
- id: A13
  name: 行政及运营含税薪酬
  value: $115K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] 精简的后台和项目运营支持，待可重复性提升后才增编。'
- id: A14
  name: 招聘时间线
  value: M1 founder and founding engineer; M2 solutions operator; M6 workflow engineer; M9 partnerships lead; M22 second solutions hire; M25 ops hire; M29 third engineer
  unit: timeline
  source: '[BP team + BP sequencingRationale + startup-finance heuristic] 后期招募刻意推迟，直至主办方报告和重复事件证明可重复性。'
- id: A15
  name: 非薪资销售与市场支出
  value: $8K/mo M1-6, $10K/mo M7-12, $12K/mo M13-18, $15K/mo M19-24, $18K/mo M25-36
  unit: USD/month
  source: '[BP gtm.channels + startup-finance heuristic] 涵盖创始人外拓、展后跟进、合作伙伴赋能和少量差旅，而非付费需求获取。'
- id: A16
  name: 非薪资研发支出
  value: $8K/mo Y1, $10K/mo Y2, $12K/mo Y3
  unit: USD/month
  source: '[BP product + BP operations + startup-finance heuristic] 云服务、工作流工具、集成和质检随账户数缓慢增长。'
- id: A17
  name: 非薪资行政及运营支出
  value: $7K/mo Y1, $8K/mo Y2, $10K/mo Y3
  unit: USD/month
  source: '[BP operations + Research regulatoryLandscape + startup-finance heuristic] 法律、保险、会计和合规开销保持精简，但随跨境业务增长而上升。'
- id: A18
  name: 薪资分配至损益科目
  value: Founder 70% S&M / 30% G&A; solutions 40% S&M / 60% R&D; engineering 100% R&D; partnerships 100% S&M; ops 100% G&A
  unit: allocation
  source: '[BP team rationales + BP operations] 将各角色映射到损益表使用的运营科目。'
- id: A19
  name: 用于 CAC 计算的激活到循环转化率
  value: 60%
  unit: pct of starts
  source: '[BP gtm.funnelTargets paid activation→annual subscription 60%+] 用于将工作台启动量转化为 CAC 的循环客户当量。'
- id: A20
  name: CAC 计算方式
  value: $29.9K = Y2-Y3 S&M / 39.6 recurring-equivalent conversions
  unit: USD/new recurring-equivalent customer
  source: '[BP funnelTargets + model calc] 使用 66 次 Y2—Y3 启动量乘以 60% 激活到订阅目标。'
- id: A21
  name: 收入确认方式
  value: Recognized revenue uses average active workspaces during each month or quarter
  unit: convention
  source: '[startup-finance heuristic] 避免在启动量于期中到达时高估收入。'
- id: A22
  name: 现金折算方式
  value: Cash movement equals EBITDA
  unit: modeling convention
  source: '[startup-finance heuristic] 假设资本开支、税款、债务服务和营运资金波动在天使前规模下不重要。'
- id: A23
  name: 融资需求规模
  value: $3.0M pre-seed
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd + BP milestones + model cash trough] 覆盖 MVP 完成、20+ 个循环工作台、一份多公司队列主办方合同，以及第 24 个月里程碑窗口之后约六个月的缓冲。'
