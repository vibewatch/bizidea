scenarios:
  downside:
    description: 创始人仍购买激活，但主办方渠道成熟较慢，定价落在价格带的低端，交付仍偏服务密集。
    y3RevenueK: 973.2
    y3EbitdaK: -1096.3
    cashLowPointK: -101.2
    keyAssumptionChanges:
    - 每工作台混合年收入从基础案例的 $22K / $30K / $34K 降至约 $20K / $27K / $30K（Y1—Y3）。
    - 启动量因队列和转介渠道扩张推迟，从基础案例 36 个月累计 73 次降至 58 次。
    - 月流失率从 1.5% 升至 2.0%，Y3 毛利率仅达 67%。
  base:
    description: "基础案例遵循商业计划排序：Y1 创始人主导验证，Y2 队列主导扩张，Y3 重复事件加主办方使用，同时维持在模型 SOM 上限之内。"
    y3RevenueK: 1550.4
    y3EbitdaK: -662.9
    cashLowPointK: 444.0
    keyAssumptionChanges:
    - 每工作台混合年收入随循环订阅、激活费和主办方报告混合，从 Y1 的 $22K 逐步升至 Y3 的 $34K。
    - 工作台启动量按 Y1 7 次、Y2 26 次、Y3 40 次推进，月流失率维持 1.5%。
    - 招聘到 Q4Y2 达 6 名全职，Q4Y3 达 8 名全职，在整个 36 个月模型期间保留现金缓冲。
  upside:
    description: 标杆账户转化更快，投资组合主办方每个队列开放更多初创企业，产品提前达到目标利润率且无需增聘第二名销售。
    y3RevenueK: 1818.3
    y3EbitdaK: -439.2
    cashLowPointK: 752.6
    keyAssumptionChanges:
    - 更多账户转向循环计划且主办方报告提前附加，每工作台混合年收入提升至约 $23K / $31K / $36K。
    - 因队列部署和重复事件使用提前拉动新工作台，启动量从基础案例的 73 次增至 36 个月 82 次。
    - 月流失率从 1.5% 改善至 1.2%，Y3 毛利率达 72%。
sensitivity:
- variable: ARPU
  downsideCase: Y3 每活跃工作台成熟年收入约 $30K
  baseCase: Y3 每活跃工作台成熟年收入约 $34K
  upsideCase: Y3 每活跃工作台成熟年收入约 $36K
  y3RevenueImpactK: -182.4
  cashImpactK: -127.7
- variable: CAC
  downsideCase: 渠道效率下降，Y2—Y3 启动量从 66 次降至 46 次，有效 CAC 超过 $40K。
  baseCase: 基础案例使用约 $29.9K CAC（基于循环当量转化）。
  upsideCase: 队列和合作伙伴来源将 CAC 维持在 $20 多K的中段，同时保持计划启动节奏。
  y3RevenueImpactK: -481.9
  cashImpactK: -418.5
- variable: churn
  downsideCase: 月活跃工作台流失率 2.0%
  baseCase: 月活跃工作台流失率 1.5%
  upsideCase: 月活跃工作台流失率 1.2%
  y3RevenueImpactK: -69.2
  cashImpactK: -58.6
- variable: sales cycle
  downsideCase: 大多数 Y2—Y3 启动因主办方入网和合规设置耗时更长而推迟约一个月。
  baseCase: 启动按计划节奏落地。
  upsideCase: 标杆客户和固定打法手册将相当比例的启动量提前约一个月。
  y3RevenueImpactK: -92.6
  cashImpactK: -99.5
- variable: gross margin
  downsideCase: 因激活仍偏手工，Y3 毛利率上限为 67%。
  baseCase: Y3 毛利率达 70%。
  upsideCase: 合作伙伴交接和模板标准化后，Y3 毛利率达 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -46.5
- variable: hiring pace
  downsideCase: 第二名解决方案招募、运营招募和第三名工程师各提前一个季度入职。
  baseCase: 后期招募等待主办方报告和重复发布证明切口有效后再落地。
  upsideCase: 若无重大集成积压，第三名工程师可再推迟一个季度。
  y3RevenueImpactK: 0.0
  cashImpactK: -112.5
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      TradeShows[Trade-show and cohort demand] --> Activations[Paid activations]
      Activations --> Recurring[Recurring launch workspaces]
      Recurring --> Sponsor[Portfolio reporting add-on]
      Recurring --> Revenue[Revenue]
      Sponsor --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after opex]
modelSanity:
- checkName: 营收引擎
  finding: 基础案例营收来自 73 次累计工作台启动，到 Q4Y3 增长为 61.5 个活跃付费工作台，混合年值约 $34K。
- checkName: 必须跑通的假设
  finding: 园区、加速器和合作伙伴渠道必须在不将团队推入定制咨询的前提下贡献大部分 Y2—Y3 启动量。
- checkName: 模型崩溃条件
  finding: 若 CAC 仍停留在逐个初创获客模式且启动量落入下行情景，Y3 营收将降至约 $973K，公司现金告负。
- checkName: 下一轮融资证明
  finding: 一旦公司展示出 20 个以上循环工作台、一份有偿主办方部署，以及合作伙伴来源管道占新启动量一半或以上，种子轮论点最为有力。
sanityChecks:
  ruleOf40: Y3 增长率 193.5% + EBITDA 利润率 -42.8% = 150.7%（受 Y2 基数较小影响偏高）。
  burnMultiple: Y2 烧钱倍数约 2.1x（$973.2K 消耗 / $454.1K 净新增营收）；Y3 改善至约 0.6x（$662.9K 消耗 / $1022.1K 净新增营收）。
  revenuePerFte: 以 Q4Y3 头员工数 8 人计算，Y3 人均营收约 $193.8K（略低于 SaaS / 工作流典型的 $200—400K 基准）。
  flags:
  - 基础案例仍假设 Y2—Y3 共 66 次新启动，因此渠道合作伙伴必须比纯创始人销售更快扩展。
  - 营收仍低于模型化的 Y3 SOM $2.2M——保守但意味着业务尚未在滩头市场内证明完整的市场捕获。
  - 模型在 Y3 仍为 EBITDA 亏损；若主办方进展迟缓或激活到循环转化率不及预期，可能在种子轮前需要过桥融资。
  - 毛利率必须在 Y3 达到 70% 以使现金计划成立；若激活仍劳动密集，交付层将成为主要的价值陷阱。
