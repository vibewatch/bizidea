ideaScorecard:
  signalStrength:
    score: 3
    rationale: The cluster is concrete and selected, but it rests on one verified source and early demand indicators rather than repeated market proof.
  painIntensity:
    score: 4
    rationale: Startups can lose their first overseas expansion window if they fail to operationalize leads quickly, making the pain acute for founders with limited teams.
  wedgeClarity:
    score: 4
    rationale: A demo-to-pilot operating system for post-show overseas conversion is narrow, event-triggered, and easy to explain to an initial customer.
  defensibility:
    score: 3
    rationale: Defensibility will come from accumulated workflow data, templates, and cohort benchmarks, but early buyers may compare the product to services or CRM customization.
  ventureScale:
    score: 4
    rationale: The beachhead starts with one geography and customer profile, but the same infrastructure can expand into a broad market-entry operating layer for global deep-tech commerce.
topRisks:
  - name: Services trap
    description: Early customers may want bespoke market-entry help that turns the company into an agency instead of a scalable software platform.
    mitigation: Productize the first 90-day event-to-pilot workflow with fixed templates, clear handoffs, and partner integrations instead of custom consulting deliverables.
  - name: Sparse proof of repeatability
    description: The cluster shows promising traction signals, but only one source confirms that the VivaTech delegation produced meaningful overseas demand.
    mitigation: Start with design partners from one or two park cohorts and measure lead-to-pilot conversion, time saved, and stalled-deal reduction before broad expansion.
  - name: Fragmented product requirements
    description: AI, biotech, green-tech, and hardware startups may need different compliance and channel workflows, which could slow initial product focus.
    mitigation: Begin with AI-hardware and applied-vision startups shipping demo units into Europe, then add adjacent templates only after the core workflow is repeatable.
