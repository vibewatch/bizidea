problem: >-
  Greater Bay Area deep-tech startups can now generate real overseas demand at events like VivaTech before they have a
  European entity, channel stack, or localized pilot process. The moment a prospect asks for demo-unit delivery,
  distributor terms, compliance documents, or multilingual onboarding, the founder gets pushed into a messy mix of
  spreadsheets, WeChat threads, freight brokers, and local consultants. Momentum from a successful trade show dies in the
  handoff between booth conversation and executable pilot.
targetUser:
  primary: >-
    Founder or head of international business at a Shenzhen or Hong Kong AI-hardware, industrial-computer-vision, or
    applied-AI startup generating its first European distributor and pilot conversations
  secondary: >-
    Commercial operations or solutions engineer responsible for demo-unit logistics, localization, and pilot setup after
    overseas events
  buyer: Founder, COO, or Head of Global Growth
startupThesis:
  nonObviousInsight: >-
    The new bottleneck is not discovering overseas interest; it is converting fragile trade-show demand into a compliant,
    localized pilot before the buyer cools off. As export hubs like Qianhai Ehub aggregate venture-backed startup cohorts
    and shows like VivaTech generate immediate demand signals, the winning company can own the repeatable post-show launch
    workflow rather than the exhibition booth or the translation layer alone.
  beachhead: >-
    Shenzhen and Hong Kong deep-tech startups with 10-100 employees that showed at VivaTech, CES, or Hannover Messe,
    sell physical or workflow-embedded AI products, and now need to stand up their first 3-10 European distributor or
    design-partner pilots
  wedge: >-
    A demo-to-pilot operating system that turns overseas leads into launch-ready workspaces with distributor
    qualification, localized collateral, pilot scopes, compliance checklists, demo-unit inventory, and multilingual
    follow-up in one workflow
  whyNowCatalyst: >-
    Qianhai Ehub's VivaTech debut and the reported traction for Vispek and InnAIO show that overseas demand is now
    arriving faster than these startups can operationalize, making the post-show conversion stack newly urgent.
  ventureScalePath: >-
    Start with GBA deep-tech startups entering Europe, then expand into the system of record for emerging-market hardware
    and applied-AI companies launching internationally across channel recruitment, pilot financing, compliance evidence,
    after-sales handoff, and portfolio reporting for parks, accelerators, and investors.
solution: >-
  The product begins as a workspace for one overseas expansion motion, usually the 90 days after a major trade show. It
  ingests lead notes, buyer requests, demo-unit availability, product documentation, and target-market constraints, then
  generates a structured path from first follow-up to signed pilot or distributor agreement. Teams get templates for
  multilingual outbound sequences, qualification questions, pilot scopes of work, CE or privacy evidence collection, and
  partner handoff checklists without hiring a separate operator for each market. Demo shipments, reseller commitments,
  and compliance tasks stay tied to the same deal record so founders can see which conversations are real and which are
  stalling on execution. Over time, the company can benchmark market-entry conversion across cohorts and become the
  commercial infrastructure layer behind international launch programs.
goToMarketSeed:
  firstCustomer: >-
    A Qianhai- or Cyberport-affiliated computer-vision or AI-voice startup with 15-80 employees, five or more qualified
    European leads from VivaTech, and no full-time local team in France or Germany
  buyingTrigger: >-
    A major overseas event produces buyer requests for pilot proposals, distributor terms, or demo-unit delivery within
    weeks, creating urgency to respond before the startup opens a local office
  currentAlternative: >-
    Founder-led follow-up across spreadsheets, CRM hacks, WeChat or WhatsApp threads, freight forwarders, translation
    agencies, export consultants, and ad hoc reseller outreach
  switchingReason: >-
    The wedge helps a small startup operationalize multiple live overseas opportunities faster than piecing together
    consultants and generic CRM workflows, while preserving one source of truth for every localization, logistics, and
    pilot-readiness task
  pricingHypothesis: >-
    Annual SaaS subscription priced by active market-entry workspaces and live pilot programs, starting around $12k-$36k
    ARR per startup, with portfolio licenses for incubators and science parks
