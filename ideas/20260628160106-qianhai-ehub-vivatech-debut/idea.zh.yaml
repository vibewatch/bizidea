jobsToBeDone:
  - job: >-
      从 VivaTech 带回合格欧洲需求后，帮助我们的团队把这些对话转化为在地化的试点方案和经销商下一步行动，从而在买方变冷前完成海外交易。
    currentAlternative: 创始人管理的电子表格、聊天线程和外部顾问
    successMetric: 从展会线索到签署试点或经销商协议的时间
  - job: >-
      当客户索要演示机、合规证据和入门材料时，帮助我们的运营团队在一个地方管理所有依赖项，从而无需过早雇用本地团队即可发布试点。
    currentAlternative: 跨邮件、文档、货运代理和 CRM 备注的临时项目管理
    successMetric: 试点发布周期时间，以及因缺失执行步骤而停滞的交易数量
ideaScorecard:
  signalStrength:
    score: 3
    rationale: 该集群具体且已入选，但依赖一份经核实的来源和早期需求指标，缺乏反复的市场证明。
  painIntensity:
    score: 4
    rationale: 初创企业若无法快速落地线索，可能错失首次海外扩张窗口——对团队规模有限的创始人而言，痛点相当剧烈。
  wedgeClarity:
    score: 4
    rationale: 展后海外转化的"演示到试点"操作系统切口窄、由事件触发、易于向首批客户解释。
  defensibility:
    score: 3
    rationale: 护城河将来自积累的工作流数据、模板和队列基准，但早期买家可能将产品与服务或 CRM 定制方案相比较。
  ventureScale:
    score: 4
    rationale: 滩头市场从单一地域和客户画像起步，但同一基础设施可扩展为全球深科技商业的广泛市场准入运营层。
topRisks:
  - name: 服务化陷阱
    description: 早期客户可能要求定制化的市场准入支持，将公司拖入代理公司模式而非可扩展的软件平台。
    mitigation: 用固定模板、清晰交接和合作伙伴集成将首个 90 天展会到试点工作流产品化，而非交付定制咨询成果。
  - name: 可重复性证明薄弱
    description: 集群显示出有希望的吸引力信号，但只有一份来源证实 VivaTech 代表团产生了有实质意义的海外需求。
    mitigation: 从一两个园区队列的共创客户起步，在大规模扩张前衡量线索到试点转化率、节省时间和停滞交易减少情况。
  - name: 产品需求碎片化
    description: AI、生物科技、绿色科技和硬件初创可能需要不同的合规与渠道工作流，可能拖慢初始产品聚焦。
    mitigation: 从向欧洲发货演示机的 AI 硬件和应用视觉初创起步，只在核心工作流可复制后才添加邻近模板。
