problem: >-
  大湾区深科技初创在 VivaTech 等展会上已能产生真实的海外需求，但此时往往尚未设立欧洲实体、渠道结构或本地化的试点流程。一旦客户提出演示机交付、经销商条款、合规文件或多语言入门培训的需求，创始人就会陷入电子表格、微信群、货运代理和本地顾问的拼凑泥潭。成功展会产生的势头，往往在展台对话到可执行试点的交接环节消耗殆尽。
targetUser:
  primary: >-
    深圳或香港 AI 硬件、工业计算机视觉或应用 AI 初创企业的创始人或国际业务负责人，正在拿到首批欧洲经销商和试点对话
  secondary: >-
    负责海外展后演示机物流、本地化及试点搭建的商务运营或解决方案工程师
  buyer: 创始人、COO 或全球增长负责人
startupThesis:
  nonObviousInsight: >-
    新的瓶颈不是发现海外兴趣，而是在买方热情冷却前把脆弱的展会需求转化为合规、在地化的试点。随着前海 Ehub 等出口园区聚集风投支持的初创队列、VivaTech 等展会产生即时需求信号，能赢得市场的公司靠的是掌握可复制的展后发布工作流——而不是展位本身，也不是单一的翻译层。
  beachhead: >-
    深圳和香港的 10—100 人深科技初创企业，曾参加 VivaTech、CES 或 Hannover Messe，销售实体或工作流嵌入式 AI 产品，目前需要搭建首批 3—10 个欧洲经销商或共创客户试点
  wedge: >-
    一套"演示到试点"操作系统——把海外线索转化为具备经销商资质审核、本地化素材、试点工作范围、合规清单、演示机库存和多语言跟进的可发布工作台，一个工作流打通全程
  whyNowCatalyst: >-
    前海 Ehub 首次亮相 VivaTech，以及 Vispek 和 InnAIO 的获客势头表明，海外需求的涌入速度已超过这些初创企业的运营落地能力——展后转化的工具栈正从"可选项"变为"紧迫刚需"。
  ventureScalePath: >-
    从进入欧洲的大湾区深科技初创起步，逐步扩展为新兴市场硬件与应用 AI 企业的国际发布记录系统，横跨渠道招募、试点融资、合规证据、售后交接，以及面向园区、加速器和投资人的投资组合报告。
solution: >-
  产品最初是一套服务于单次海外扩张行动的工作台，通常对应大型展会后的 90 天。它摄入线索备注、买方需求、演示机可用性、产品文档和目标市场约束，然后生成从首次跟进到签署试点或经销商协议的结构化路径。团队无需为每个市场单独配置运营人员，即可获得多语言外发序列、资质审核问题清单、试点工作范围说明、CE 或隐私证据收集，以及合作伙伴交接检查表的模板。演示机发货、经销商承诺和合规任务绑定在同一条交易记录上，让创始人一眼看出哪些对话是真实机会、哪些卡在执行细节。随着时间推移，公司可以跨队列对比市场准入转化率，最终成为国际发布项目背后的商业基础设施层。
goToMarketSeed:
  firstCustomer: >-
    前海或数码港关联的计算机视觉或 AI 语音初创企业，15—80 人，在 VivaTech 获得五条以上合格欧洲线索，且在法国或德国没有全职本地团队
  buyingTrigger: >-
    大型海外展会产生了买方对试点方案、经销商条款或演示机交付的需求，在初创企业开设本地办公室之前，形成必须迅速响应的执行压力
  currentAlternative: >-
    创始人跨电子表格、CRM 拼凑、微信或 WhatsApp 群组、货运代理、翻译机构、出口顾问和临时经销商外拓自行跟进
  switchingReason: >-
    切入点帮助小型初创企业比拼凑顾问和通用 CRM 工作流更快落地多条海外商机，同时为所有本地化、物流和试点就绪任务保留统一的事实来源
  pricingHypothesis: >-
    按活跃市场准入工作台和在线试点项目数量收费的年度 SaaS 订阅，起步价约为每家初创 $12k—$36k ARR，并为孵化器和科技园提供投资组合授权
