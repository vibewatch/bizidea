slug: global-pilot-launch-os
date: '2026-06-28'
executiveSummary: >-
  Global Pilot Launch OS 的目标客群是深圳和香港的深科技初创企业——它们带着真实的欧洲需求离开重要展会，却没有可复制的方式将这些需求转化为已发布的试点或经销商协议。初始产品是一个 90 天"演示到试点"工作台，将线索跟进、经销商资质审核、多语言素材、演示机物流和欧盟合规任务绑定在同一条商机记录上。滩头市场刻意设计得窄：AI 硬件、工业视觉和应用 AI 初创，10—100 人，持有至少五条合格欧洲线索，在法国或德国无全职团队。这个切口比"宽泛出口技术平台"更容易证伪——买家、触发器、工作流和成功指标全都集中在 VivaTech、CES 或 Hannover Messe 带来需求后的几周之内。GTM 应从创始人主导销售切入一两个园区或加速器队列，证明可缩短线索到试点周期、减少停滞交易后再通过投资组合授权扩张。早期防御力来自工作流模板和合作伙伴集成，但真正的护城河是关于哪个市场、哪条经销商路径、哪套合规流程能把首次出口商带进签约试点的基准数据。最大的否定风险是：初创企业在建立更稳定的欧洲营收之前，仍偏向顾问和临时运营而非采购软件。研究支持了痛点和渠道选择，但关于展后转化率、软件预算归属和可重复性的直接证据仍然有限——前六个月必须作为证伪演练而非扩张规划来运行。
problem:
  - 从欧洲展会归来的创始人面临试点、经销商条款和演示机发货的紧迫需求，而此时他们尚未建立本地团队、进口商设置或市场专属运营流程。
  - 通用 CRM 和项目工具无法在一个工作流中管理 CE 认证、RED 指令、海关、本地化和合作伙伴资质审核等依赖项，导致交易在展台兴趣和可执行发布之间的环节搁浅。
solution:
  - 提供一个由事件驱动的扩张行动发布工作台，将线索、买方需求、产品文档和演示机库存转化为有序的试点或经销商计划。
  - 将经销商资质审核、多语言跟进、合规证据收集和发货就绪整合进一个记录系统，让初创企业无需先搭建本地运营结构即可推进 3—10 条活跃欧洲商机。
whyWeWin:
  - 产品围绕从合格线索到已发布试点的具体展后交接构建，而不是通用 CRM、翻译或认证工作流。
  - 园区、加速器和代表团渠道能比逐个触达初创企业更快地聚合具备出海能力的队列。
  - 针对 AI 硬件和应用 AI 欧洲进入的可复用任务图谱，可以积累成现有厂商在碎片化服务提供商处无法捕捉的基准数据。
strategicChoices:
  beachhead: 深圳和香港的 AI 硬件、工业计算机视觉和应用 AI 初创企业，10—100 人，刚刚通过大型展会获得首批 3—10 条法国或德国试点或经销商对话。
  wedgeRationale: 展后欧洲发布工作流有清晰的痛点峰值、明确的买家和可衡量的成功指标；而更宽泛的"跨境商业化平台"会迫使公司在证明付费意愿之前就支撑过多行业、地域和服务请求。
  sequencingRationale: 从法国和德国的 AI 硬件和应用视觉团队工作流起步，因为这类客户面临相同的经销商跟进、演示机发货和欧盟合规混合需求；先通过创始人主导销售向初创企业证明紧迫性，待实施模式可复制后再添加园区级报告和投资组合授权。
  notYet:
    - 英国、中东或美国市场准入工作流
    - 生物科技专属监管打法
    - 完整的合作伙伴关系管理或 CRM 替代
    - 超出固定激活模板范围的外包咨询交付物
market:
  tam: TAM 模型化约 $18.8M，基于约 783 家具备出海能力的香港或大湾区初创企业、每家年均支出约 $24k 估算。
  sam: SAM 模型化约 $7.5M，对 TAM 基数应用 40% 欧洲活跃过滤，假设只有一部分企业在未来 24 个月内积极追求法国或德国的试点或经销商。
  som: 第 3 年可及 SOM 模型化约 $2.2M，基于通过园区队列、代表团后续跟进和法德软着陆合作伙伴覆盖的约 90 个账户、每家约 $24k ARR。
  segments:
    - 首次进入欧洲的创始人主导 AI 硬件和应用 AI 初创企业
    - 管理具备出海能力的初创队列的科技园、加速器和风险项目
  buyingProcess: 内部推动者通常是掌管展后跟进的创始人、国际业务负责人或商务运营负责人。购买应仅在存在活跃的事件驱动管道、商定的目标市场和明确的试点发布时间线责任人时发生；否则公司应预期买家推迟并倾向于顾问和手工工具。
product:
  mvp: 为一家初创企业搭建 90 天欧洲发布工作台，摄入展会线索、买方需求、产品文档和演示机可用性，然后生成经销商资质审核、素材本地化、合规证据和发货就绪的共享行动计划。MVP 应聚焦于向法国或德国发货的 AI 硬件和应用 AI 团队，不尝试替代初创企业的 CRM。
  sixMonth: 上线法国和德国专属模板、经销商评分卡、试点工作范围模板、CE 或 RED 类产品合规任务树，以及面向一个队列主办方的投资组合报告。
  twelveMonth: 添加面向进口商、测试机构和本地化服务商的可复用合作伙伴交接工作流；支持多个初创企业的多工作台报告；并基于缺失文件或跟进空缺自动触发停滞交易预警。
  twentyFourMonth: 从单一欧洲发布工作台扩展为新兴市场深科技企业在多个事件、渠道和目标市场运行重复国际发布行动的记录系统。
  keyBets:
    - AI 硬件和应用 AI 初创企业在展后流程上具有足够共性，可在行业特定分支之前支撑一个统一产品。
    - 买家愿意为软件加固定激活行动付费，而不是完全默认使用顾问。
    - 法国和德国足以在扩大地域之前验证欧洲切入点。
    - 园区或加速器买家只有在初创企业层面的成功案例证明可衡量的周期改善后，才会采用投资组合报告——而不是在此之前。
gtm:
  wedge: 为一家初创企业的展后欧洲管道销售首次发布激活，然后在工作台成为经销商和试点执行的常用系统后，将该账户转化为年度订阅。
  channels:
    - 创始人主导的外拓，目标是前海、数码港和 HKSTP 式队列中 VivaTech、CES 和 Hannover Messe 的近期代表
    - 与科技园、加速器和展会代表团运营方建立投资组合合作
    - 与合规实验室、本地化服务商及货运或进口专家建立转介合作——这些服务商在试点真正落地时已被调用
  funnelTargets: 队列引介→合格初创 40%+；合格初创→有偿激活 25%+；有偿激活→年度订阅 60%+；首个账户→转介或投资组合扩展 20%+
  pricing: 按活跃市场准入工作台和并行在线试点数量收费的年度订阅，通常锚定每家初创 $12k—$36k ARR 加固定首次发布激活费——买家的参照系是创始人时间、顾问支出和错失活跃试点窗口的代价，而非单纯的按座位 SaaS。
businessModel:
  revenueStreams:
    - 活跃欧洲发布工作台的初创企业年度订阅
    - 管理多家初创企业的园区、加速器和风险项目的投资组合授权
    - 使用标准化模板和合作伙伴集成进行首次展后发布设置的固定激活费
  unitOfValue: 具有并行活跃试点或经销商商机的活跃市场准入工作台
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一初创企业账户内添加更多在线试点、经销商和目标市场
    - 将初创企业成功案例转化为主办园区或加速器的全投资组合授权
    - 在基础执行系统之上叠加基准报告和合作伙伴路由工作流
strategyMap:
  northStarMetric: 在平台内从展会线索移动到已发布试点或签署经销商下一步的合格海外商机数量
  inputMetrics:
    - 从展会结束到发送首条合格跟进的天数
    - 持有完整合规和发货任务覆盖的在线商机百分比
    - 有偿激活到年度订阅转化率
    - 从合格线索到发出演示机或签署试点的中位天数
    - 通过主办方渠道赢得的投资组合账户数
  moatsToBuild:
    - 按事件、市场、产品类型和经销商画像分类的线索到试点基准数据
    - AI 硬件和应用 AI 欧洲进入的可复用合规与发布任务图谱
    - 园区和加速器用于比较初创企业出口就绪度的嵌入式报告工作流
  killCriteria:
    - 首批 15 家合格初创中少于 3 家同意为固定展后激活付费
    - 早期共创客户中超过半数要求标准工作流之外的定制服务
    - 首批 5 次激活中少于 2 次转化为年度订阅或重复发布使用
  mermaid: |
    flowchart LR
      Wedge[Post-show France/Germany wedge] --> MVP[90-day launch workspace]
      MVP --> Proof[Faster pilot and distributor conversion]
      Proof --> Expansion[Portfolio licenses and multi-market launch OS]
      MVP --> Data[Benchmark and compliance task data]
      Data --> Expansion
investorMemo:
  verdict:
    call: Watch
    conviction: 切口可信、痛点真实，但可重复需求转化和独立软件预算方面的证据仍然薄弱。
    whyBelieve: 展会正在为大湾区深科技团队产生切实的欧洲需求，且没有一家现有厂商完整掌握从线索到试点在本地化、物流、合规和经销商跟进全程的执行层。
    whyDoubt: 造成痛点的碎片化同样制造了服务化陷阱，而现有证据尚不能证明足够多的初创企业会在简单雇用顾问或继续拼凑之前选择购买软件。
    nextDiligence: 向一个园区队列核实，是否至少三家拥有活跃欧洲线索的初创企业愿意为固定 8—12 周发布激活付费，且至少一家转化为年度使用。
  firstCustomer:
    title: 大湾区计算机视觉或 AI 语音初创企业的创始人或国际业务负责人
    profile: 一家 15—80 人的深圳或香港初创，携带至少五条合格法国或德国线索、演示机需求和零本地欧洲运营团队从 VivaTech 归来。
    trigger: 买家在展会结束后数周内要求试点方案、经销商条款或演示机发货，在初创开设本地办公室之前形成执行压力。
    buyer: 创始人、COO 或全球增长负责人
    initialContract: 固定 8—12 周激活加年度订阅路径，起步价合理范围为 $5k—$15k 发布设置费，若至少一条在线试点或经销商工作流持续运转，则转化为 $12k—$36k ARR。
  mustBeTrue:
    - 至少半数合格目标初创企业必须在展后 30 天内持有 5 条以上需要跨职能跟进的真实商机。
    - 首批 15 家合格潜在客户中至少 3 家必须为标准化激活付费，而非仅要求咨询服务。
    - MVP 必须将初创企业手工流程的试点就绪方案或发货包准备时间缩短至少 30%。
    - 首批 5 次客户激活中至少 2 次必须转化为年度订阅或重复事件使用。
    - 到第 12 个月，园区或加速器渠道的客户获取成本必须低于纯粹逐个初创外拓。
  diligenceQuestions:
    - 近期大湾区展会线索中，有多少在 90 天内实际推进到演示机发出、签署试点或经销商入网？
    - 谁实际掌握展后执行的预算：创始人、COO、BD 负责人还是园区主办方？
    - 对目标产品类型而言，哪些欧盟要求最常卡住首个试点？
    - 首次发布工作流在客户把公司推向顾问模式之前能保持多高的标准化程度？
    - 园区主办方对投资组合报告的需求是否足以成为真正的买家，还是仅限于分销合作伙伴？
operatingAssumptions:
  - assumption: 首批付费客户将是持有活跃法国或德国跟进需求的 AI 硬件和应用 AI 初创企业，而非宽泛的深科技品类组合。
    basis: idea.yaml
    validationTest: 访谈 12 家近期代表，要求至少 8 家符合目标产品画像并报告相同的核心展后工作流。
    decisionImpact: 若为假，公司必须进一步收窄至单一产品类别，或放弃模板驱动的软件路径。
  - assumption: 创始人会在雇用本地运营人员或拼凑顾问之前，为标准化发布工作台付费。
    basis: research.yaml
    validationTest: 在目标价格带内完成至少 3 次有偿激活，且不承诺工作流之外的定制咨询。
    decisionImpact: 若为假，业务将变成服务密集型，不应作为工作流 SaaS 获得融资。
  - assumption: 法国和德国包含足够的早期需求和共性流程，可在扩大地域之前验证欧洲切入点。
    basis: research.yaml
    validationTest: 完成首批 5 次激活，其中需要法国或德国以外工作流的请求不超过 20%。
    decisionImpact: 若为假，路线图和招聘必须转向更宽泛但可重复性更低的市场准入平台。
  - assumption: 投资组合买家只有在初创企业层面的成功案例证明可衡量的周期改善后才会跟进。
    basis: 运营判断
    validationTest: 完成 2 次成功的初创企业部署后，向 5 家园区或加速器推介，要求至少 2 家提出投资组合报告或多公司定价需求。
    decisionImpact: 若为假，公司应将主办方关系保持为转介渠道，而非提前构建投资组合功能。
  - assumption: 合规和物流协调可以通过任务图谱和合作伙伴交接产品化，而不必将监管责任承揽至初创企业自身。
    basis: research.yaml
    validationTest: 与具名测试或物流合作伙伴完成 3 次共创客户实施，确认产品只路由任务和证据，而非作为认证方。
    decisionImpact: 若为假，公司面临不可接受的交付和责任风险，必须收窄范围、回避受监管的发布步骤。
experimentRoadmap:
  - horizon: 0—90 天
    experiment: 访谈 15 名 AI 硬件和应用 AI 领域的近期大湾区展会代表。
    hypothesis: 剧烈的痛点始于展会结束后——此时创始人需要跨多条活跃交易协调跟进、本地化、合规和发货。
    successMetric: 至少 8 次访谈指向相同的前三大停滞原因，且至少 5 家企业持有活跃的法国或德国商机。
    owner: Founder
  - horizon: 0—90 天
    experiment: 使用电子表格支持的原型和标准化任务模板，运行 3 次手工共创客户激活。
    hypothesis: 即便在完整软件自动化构建之前，单一工作流也能减少协调时间。
    successMetric: 每个合作伙伴在两周内完成工作流设置，并报告至少一个若非如此将被遗漏的停滞任务或缺失文件。
    owner: Founder / founding eng
  - horizon: 0—90 天
    experiment: 向 10 名合格潜在客户测试固定价格激活报价的付费意愿。
    hypothesis: 若报价围绕"保住一个活跃试点窗口"而非"通用出海软件"来包装，买家愿意为有明确范围的展后执行行动付费。
    successMetric: 在目标价格带内签署至少 3 份有偿激活，范围限定于法国或德国发布工作流。
    owner: Founder
  - horizon: 90—180 天
    experiment: 将经销商资质审核、素材本地化和合规证据收集产品化进 MVP。
    hypothesis: 首次年度订阅要求所有三个工作流在同一商机记录中同时运转。
    successMetric: 两名客户从激活转化为循环订阅，并每周使用系统跨至少 3 条在线商机。
    owner: Founding eng
  - horizon: 90—180 天
    experiment: 与一家测试或合规合作伙伴和一家货运或进口合作伙伴正式签署转介协议。
    hypothesis: 合作伙伴转介带来的客户意向比冷门外拓更高，因为对方在试点真正落地时才出现。
    successMetric: 签署两份转介关系协议，并在一个季度内获得至少 4 条合格引介。
    owner: Founder
  - horizon: 180—360 天
    experiment: 为一家园区或加速器主办方推出队列仪表盘。
    hypothesis: 一旦初创企业层面的执行数据存在，投资组合报告就能解锁多公司交易。
    successMetric: 一份覆盖至少 5 家初创企业的有偿或签约投资组合部署。
    owner: Product + founder
operations:
  - 维护覆盖法国和德国的标准发布打法手册，涵盖经销商资质审核、本地化、发货就绪和合规证据路由。
  - 使用具名外部合作伙伴处理测试、本地化和物流，而非将受监管执行全部内化。
  - 按阶段、缺失文件和下一责任人追踪每条商机，确保停滞交易在 24 小时内可见。
  - 在每个事件周期后捕捉队列级基准数据，包括跟进时间、试点就绪度和发布阻碍。
team:
  - role: 创始人 / CEO
    startTiming: 第 0 个月
    rationale: 创始人主导销售和共创客户管理是验证紧迫性、定价和精准买家画像的必要条件。
  - role: 联合创始工程师
    startTiming: 第 0 个月
    rationale: 产品风险在于将杂乱的展后运营转化为一个有结构的工作流，而不是变成服务电子表格。
  - role: 产品思维解决方案运营
    startTiming: 第 2 个月
    rationale: 在工作流完全自动化之前，早期客户需要紧密的入门辅导、模板维护和合作伙伴协调。
  - role: 全栈或工作流工程师
    startTiming: 第 6 个月
    rationale: 首批有偿激活证明哪些任务自动化和集成真正重要后再招募。
  - role: 合作伙伴负责人
    startTiming: 第 9 个月
    rationale: 在直接销售证明切入点之后招募，让园区、加速器和服务合作伙伴渠道无需仅依赖创始人即可扩展。
milestones:
  - horizon: 0—12 个月
    items:
      - "第 3 个月：完成 15 次目标客户访谈和 3 次共创客户激活"
      - "第 6 个月：转化至少 3 次有偿激活并发布法国或德国发布工作流 MVP"
      - "第 9 个月：拿下首批 2 份年度订阅和 2 个活跃转介合作伙伴"
      - "第 12 个月：赢得 5 个循环初创账户和 1 个使用投资组合报告的队列主办方"
  - horizon: 12—24 个月
    items:
      - "第 18 个月：在法国和德国两个市场支持至少 10 个活跃初创账户的可复制发布工作流"
      - "第 18 个月：证明主办方或合作伙伴渠道来源的合格管道占比至少一半"
      - "第 24 个月：将投资组合报告转化为多公司合同，并扩展至第二次展会重复使用"
  - horizon: 24—36 个月
    items:
      - "第 30 个月：将产品从欧洲发布执行扩展至更宽泛的国际渠道和试点操作系统能力"
      - "第 36 个月：积累跨多个队列、市场和产品类型的基准数据，足以支撑溢价定价和渠道合作关系"
risks:
  - risk: 早期客户要求定制化市场准入服务，打破产品聚焦。
    likelihood: High
    impact: High
    mitigation: 将初始报价限制在一个固定发布工作流、标准化模板和具名合作伙伴交接，而非开放式咨询。
  - risk: 展会需求真实但过于浅薄，难以支撑循环软件使用。
    likelihood: Medium
    impact: High
    mitigation: 入网前要求至少 5 条合格线索和一条活跃试点需求，并在首次激活后追踪重复使用情况。
  - risk: 合规和海关工作流因产品品类差异过大而难以标准化。
    likelihood: Medium
    impact: High
    mitigation: 从向法国或德国发货演示机的 AI 硬件和应用 AI 用例起步，将生物科技和其他高度专业化品类推迟处理。
  - risk: 园区和加速器渠道带来引介但不掌握预算决策权。
    likelihood: Medium
    impact: Medium
    mitigation: 先将主办方作为分销合作伙伴，在大力投入投资组合功能之前要求初创企业层面的有偿证明。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2—4M
  runwayMonths: 18
  useOfFundsSummary: 构建 MVP、验证 5—10 个有偿初创账户、产品化法国和德国发布工作流，并证明一个主办方或合作伙伴渠道能以比创始人单独外拓更高的效率获取客户。
