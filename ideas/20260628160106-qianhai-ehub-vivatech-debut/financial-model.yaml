slug: global-pilot-launch-os
date: '2026-06-28'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-28] model starts the month after the business-plan date.'
- id: A2
  name: Opening cash at M1
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + model sizing] uses a round size inside the stated range to reach the month-24 proof point plus buffer.'
- id: A3
  name: Starting active paying workspaces
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones] the company starts pre-revenue and must first convert design partners into paid activations.'
- id: A4
  name: Customer unit tracked in the model
  value: Active paid Europe-launch workspace equivalent
  unit: definition
  source: '[BP businessModel.unitOfValue + BP businessModel.revenueStreams] customersEop counts startup workspaces and startup seats inside sponsor deployments because pricing is tied to live launch motions, not pure seat count.'
- id: A5
  name: Blended recognized revenue per active workspace
  value: Y1 $22K/year, Y2 $30K/year, Y3 $34K/year
  unit: USD/workspace/year
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research willingnessToPay] blends $12k-$36k recurring software with $5k-$15k activation fees and a modest sponsor-reporting uplift.'
- id: A6
  name: New paid workspace start cadence
  value: Y1 7 starts; Y2 26 starts; Y3 40 starts
  unit: workspace starts
  source: '[BP milestones + BP gtm.channels + BP strategicChoices.sequencingRationale] starts ramp only after founder-led proof, then accelerate through park cohorts, referrals, and repeat event usage.'
- id: A7
  name: Monthly active-workspace churn
  value: 1.5%
  unit: pct/month
  source: '[startup-finance heuristic + BP risks] assumes some post-activation drop-off, but lower churn than SMB SaaS because buyers enter with live pilot urgency.'
- id: A8
  name: Gross margin ramp
  value: 52% in Y1, 61% in Y2, 70% in Y3
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research regulatoryLandscape] early delivery is activation-heavy and partner-dependent before the product reaches the stated 70% target.'
- id: A9
  name: Founder / CEO loaded compensation
  value: $180K
  unit: USD/year
  source: '[BP team Founder / CEO + startup-finance heuristic] assumes modest founder cash pay plus payroll taxes and benefits.'
- id: A10
  name: Engineering loaded compensation
  value: $185K
  unit: USD/year
  source: '[BP team Founding eng + Full-stack or workflow engineer + startup-finance heuristic] cross-border product engineering talent with payroll load.'
- id: A11
  name: Product / solutions loaded compensation
  value: $150K
  unit: USD/year
  source: '[BP team Product-minded solutions operator + startup-finance heuristic] customer-implementation and workflow-ops talent priced below engineering but above generic ops.'
- id: A12
  name: Sales / partnerships loaded compensation
  value: $180K
  unit: USD/year
  source: '[BP team Partnerships lead + BP gtm.channels + startup-finance heuristic] one senior channel seller with travel and variable comp load.'
- id: A13
  name: G&A / ops loaded compensation
  value: $115K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] lean back-office and program-ops support added only after repeatability improves.'
- id: A14
  name: Hiring timeline
  value: M1 founder and founding engineer; M2 solutions operator; M6 workflow engineer; M9 partnerships lead; M22 second solutions hire; M25 ops hire; M29 third engineer
  unit: timeline
  source: '[BP team + BP sequencingRationale + startup-finance heuristic] later hires are intentionally delayed until sponsor reporting and repeat events show repeatability.'
- id: A15
  name: Non-payroll sales & marketing spend
  value: $8K/mo M1-6, $10K/mo M7-12, $12K/mo M13-18, $15K/mo M19-24, $18K/mo M25-36
  unit: USD/month
  source: '[BP gtm.channels + startup-finance heuristic] covers founder outbound, trade-show follow-up, partner enablement, and light travel rather than paid demand generation.'
- id: A16
  name: Non-payroll R&D spend
  value: $8K/mo Y1, $10K/mo Y2, $12K/mo Y3
  unit: USD/month
  source: '[BP product + BP operations + startup-finance heuristic] cloud, workflow tooling, integrations, and QA rise slowly with account count.'
- id: A17
  name: Non-payroll G&A spend
  value: $7K/mo Y1, $8K/mo Y2, $10K/mo Y3
  unit: USD/month
  source: '[BP operations + Research regulatoryLandscape + startup-finance heuristic] legal, insurance, accounting, and compliance overhead stay lean but rise with cross-border activity.'
- id: A18
  name: Payroll allocation to P&L lines
  value: Founder 70% S&M / 30% G&A; solutions 40% S&M / 60% R&D; engineering 100% R&D; partnerships 100% S&M; ops 100% G&A
  unit: allocation
  source: '[BP team rationales + BP operations] maps roles into the operating lines used in the P&L.'
- id: A19
  name: Activation-to-recurring conversion used for CAC
  value: 60%
  unit: pct of starts
  source: '[BP gtm.funnelTargets paid activation→annual subscription 60%+] used to translate workspace starts into recurring-customer equivalents for CAC.'
- id: A20
  name: CAC calculation convention
  value: $29.9K = Y2-Y3 S&M / 39.6 recurring-equivalent conversions
  unit: USD/new recurring-equivalent customer
  source: '[BP funnelTargets + model calc] uses 66 Y2-Y3 starts multiplied by the 60% activation-to-subscription target.'
- id: A21
  name: Revenue recognition convention
  value: Recognized revenue uses average active workspaces during each month or quarter
  unit: convention
  source: '[startup-finance heuristic] avoids overstating revenue when starts arrive mid-period.'
- id: A22
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: modeling convention
  source: '[startup-finance heuristic] assumes capex, taxes, debt service, and working-capital swings are immaterial at pre-seed scale.'
- id: A23
  name: Funding ask sizing
  value: $3.0M pre-seed
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd + BP milestones + model cash trough] funds MVP completion, 20+ recurring workspaces, one sponsor contract, and roughly six months of buffer beyond the month-24 milestone window.'
