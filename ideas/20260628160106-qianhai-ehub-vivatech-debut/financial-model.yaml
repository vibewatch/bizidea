scenarios:
  downside:
    description: Founders still buy activations, but sponsor channels mature slower, pricing lands nearer the lower end of the band, and delivery remains more service-heavy.
    y3RevenueK: 973.2
    y3EbitdaK: -1096.3
    cashLowPointK: -101.2
    keyAssumptionChanges:
    - Blended annual revenue per workspace falls to about $20K / $27K / $30K in Y1-Y3 instead of $22K / $30K / $34K.
    - Starts slow from 73 cumulative in the base case to 58 over 36 months because cohort and referral channels scale later.
    - Monthly churn rises from 1.5% to 2.0% and gross margin reaches only 67% by Y3.
  base:
    description: 'Base case follows the business-plan sequence: founder-led proof in Y1, cohort-led expansion in Y2, and repeat event plus sponsor usage in Y3 while staying below the modeled SOM ceiling.'
    y3RevenueK: 1550.4
    y3EbitdaK: -662.9
    cashLowPointK: 444.0
    keyAssumptionChanges:
    - Blended annual revenue per workspace steps from $22K in Y1 to $34K in Y3 as recurring subscriptions, activation fees, and sponsor reporting mix together.
    - Workspace starts follow 7 in Y1, 26 in Y2, and 40 in Y3 while churn stays at 1.5% monthly.
    - Hiring reaches 6 FTE by Q4Y2 and 8 FTE by Q4Y3, preserving a cash buffer through the full 36-month model.
  upside:
    description: Reference accounts convert faster, portfolio sponsors open more startups per cohort, and the product reaches target margin earlier without adding a second sales hire.
    y3RevenueK: 1818.3
    y3EbitdaK: -439.2
    cashLowPointK: 752.6
    keyAssumptionChanges:
    - Blended annual revenue per workspace improves to about $23K / $31K / $36K as more accounts convert to recurring plans and sponsor reporting attaches sooner.
    - Starts rise from 73 in the base case to 82 over 36 months because cohort deployments and repeat event usage pull new workspaces forward.
    - Monthly churn improves from 1.5% to 1.2% and gross margin reaches 72% by Y3.
sensitivity:
- variable: ARPU
  downsideCase: $30K mature annual revenue per active workspace in Y3
  baseCase: $34K mature annual revenue per active workspace in Y3
  upsideCase: $36K mature annual revenue per active workspace in Y3
  y3RevenueImpactK: -182.4
  cashImpactK: -127.7
- variable: CAC
  downsideCase: Channel efficiency weakens, so Y2-Y3 starts fall from 66 to 46 and effective CAC rises above $40K.
  baseCase: Base case uses about $29.9K CAC on recurring-equivalent conversions.
  upsideCase: Cohort and partner sourcing keep CAC in the mid-$20Ks while preserving the planned start cadence.
  y3RevenueImpactK: -481.9
  cashImpactK: -418.5
- variable: churn
  downsideCase: 2.0% monthly active-workspace churn
  baseCase: 1.5% monthly active-workspace churn
  upsideCase: 1.2% monthly active-workspace churn
  y3RevenueImpactK: -69.2
  cashImpactK: -58.6
- variable: sales cycle
  downsideCase: Most Y2-Y3 starts slip by about one month because sponsor onboarding and compliance setup take longer.
  baseCase: Starts land on the planned cadence.
  upsideCase: Reference customers and fixed playbooks pull a meaningful share of starts forward by about one month.
  y3RevenueImpactK: -92.6
  cashImpactK: -99.5
- variable: gross margin
  downsideCase: Y3 gross margin tops out at 67% because activations stay more manual.
  baseCase: Gross margin reaches 70% in Y3.
  upsideCase: Gross margin reaches 72% once partner handoffs and templates standardize.
  y3RevenueImpactK: 0.0
  cashImpactK: -46.5
- variable: hiring pace
  downsideCase: The second solutions hire, ops hire, and third engineer are each pulled forward by one quarter.
  baseCase: Later hires wait until sponsor reporting and repeat launches prove the wedge.
  upsideCase: The third engineer can wait one more quarter if no major integration backlog appears.
  y3RevenueImpactK: 0.0
  cashImpactK: -112.5
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      TradeShows[Trade-show and cohort demand] --> Activations[Paid activations]
      Activations --> Recurring[Recurring launch workspaces]
      Recurring --> Sponsor[Portfolio reporting add-on]
      Recurring --> Revenue[Revenue]
      Sponsor --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after opex]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from 73 cumulative workspace starts growing into 61.5 active paid workspaces by Q4Y3 at a blended $34K annual value.
- checkName: Must go right
  finding: Park, accelerator, and partner channels must generate most Y2-Y3 starts without pushing the team into bespoke consulting.
- checkName: Model breaks if
  finding: If CAC stays startup-by-startup and starts fall toward the downside case, Y3 revenue drops to about $973K and the company goes cash-negative.
- checkName: Next-round proof
  finding: The seed case is strongest once the company shows 20+ recurring workspaces, one paid sponsor deployment, and partner-sourced pipeline at or above half of new starts.
sanityChecks:
  ruleOf40: Y3 growth 193.5% + EBITDA margin -42.8% = 150.7% (inflated by the small Y2 base).
  burnMultiple: Y2 burn multiple ~2.1x (($973.2K burn) / $454.1K net new revenue); Y3 improves to ~0.6x (($662.9K burn) / $1022.1K net new revenue).
  revenuePerFte: About $193.8K Y3 using Q4Y3 headcount of 8 (slightly below the typical $200-400K SaaS/workflow benchmark).
  flags:
  - The base case still assumes 66 new Y2-Y3 starts, so channel partnerships must scale faster than purely founder-led selling.
  - Revenue remains below the modeled $2.2M Y3 SOM, which is conservative but means the business is not yet proving full market capture inside the beachhead.
  - The model is still EBITDA-negative in Y3; a slower sponsor motion or lower activation-to-recurring conversion would likely require a bridge round before the seed raise.
  - Gross margin must reach 70% by Y3 for the cash plan to hold; if activations stay labor-heavy, the delivery layer becomes the main value trap.
