problem: AV developers need fresh road-scene data whenever construction, curb rules, traffic patterns, or launch geographies change, but dedicated sensor fleets are expensive and slow to redeploy. Generic dashcam footage lacks guaranteed coverage, quality control, and privacy handling, so it rarely fits map-refresh or safety-critical model workflows. As distributed capture becomes credible, the bottleneck shifts to tasking, verification, and chain-of-custody for third-party road data.
targetUser:
  primary: Data collection and map operations leads at robotaxi and autonomous delivery companies expanding into new metros
  secondary: Fleet operators at regional delivery, roadside assistance, and field-service networks that can supply capture vehicles
  buyer: Head of Mapping, Data Operations, or AV Platform Partnerships
startupThesis:
  nonObviousInsight: The scarce asset is no longer raw road video; it is verified, geofenced, privacy-safe coverage from human-driven vehicles exactly when the physical world changes.
  beachhead: Robotaxi and autonomous delivery teams refreshing construction-heavy airport, downtown, and curbside zones in their next launch metro
  wedge: A tasking and QA platform that dispatches capture missions to partner fleets, validates sensor quality, redacts PII, and delivers verified lane-mile data packages
  whyNowCatalyst: Uber's stated plan to turn millions of drivers into a sensor grid shows AV buyers are becoming comfortable sourcing physical-world data from distributed human fleets rather than only dedicated internal cars.
  ventureScalePath: Start with road-data refresh missions, then expand into HD map change detection, simulation data generation, municipal road intelligence, and a two-sided marketplace for physical-world AI capture.
solution: The product ingests corridor-level requests from AV teams and turns them into geofenced capture missions for partner fleets already driving those streets. A mobile ops app and low-cost camera or sensor kit enforce route completion, calibration checks, upload integrity, and driver incentives. Computer vision automatically redacts faces and plates, scores mission quality, and flags map changes or rare edge cases before delivery. Customers buy refreshed lane miles or event-specific missions instead of operating more full-time sensor vehicles. Supply partners monetize unused drive time without building a bespoke data-services business.
goToMarketSeed:
  firstCustomer: Data operations manager at a Series B+ U.S. robotaxi or autonomous delivery company launching a second or third Sun Belt metro with weekly map-refresh pain around airport, downtown, and curb zones
  buyingTrigger: A new metro launch, a safety review, or major construction activity that exposes stale map or training data in specific corridors
  currentAlternative: Dedicated internal sensor fleets plus manual contractor collection
  switchingReason: This wedge delivers targeted coverage faster and per corridor, with privacy controls and QA built in, so the customer avoids sensor-fleet capex and idle collection time
  pricingHypothesis: Usage-based pricing per verified lane-mile refreshed, with premium fees for rush missions and recurring metro coverage subscriptions
