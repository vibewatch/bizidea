topRisks:
  - name: Supply reliability
    description: Partner fleets may not complete missions consistently or keep hardware quality high enough for AV-grade data.
    mitigation: Start with narrow corridors, completion-based incentives, and strict hardware plus QA certification before expanding city coverage.
  - name: Privacy and regulatory scrutiny
    description: Roadside capture from third-party drivers could trigger data protection, worker consent, and municipal scrutiny.
    mitigation: Build default redaction, minimal metadata retention, clear driver contracts, and city-specific policy controls into the core workflow.
  - name: Platform disintermediation
    description: Uber, Lyft, or large AV programs could internalize distributed fleet capture once the model proves valuable.
    mitigation: Focus first on non-rideshare fleet supply, integrate across fragmented regional fleets, and own the QA and coverage software layer buyers still need.
