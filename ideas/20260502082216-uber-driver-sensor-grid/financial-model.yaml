    baseCase: "2.0% monthly logo churn"
    upsideCase: "1.5% monthly logo churn"
    y3RevenueImpactK: -260.0
    cashImpactK: -180.0
  - variable: sales cycle
    downsideCase: "First accepted paid pilot closes in M12"
    baseCase: "First accepted paid pilot closes in M6"
    upsideCase: "First accepted paid pilot closes in M5"
    y3RevenueImpactK: -540.0
    cashImpactK: -420.0
  - variable: gross margin
    downsideCase: "66% gross margin"
    baseCase: "70% gross margin"
    upsideCase: "72% gross margin"
    y3RevenueImpactK: 0.0
