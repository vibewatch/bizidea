    upsideCase: "Delay two post-seed hires until after Q2Y3"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Outreach[Founder outbound and partner intros] --> Pilots[Qualified corridor pilots]
      Pilots --> Accepted[Accepted metro programs]
      Accepted --> Revenue[Usage fees plus minimum monthly commits]
      Revenue --> GrossProfit[70% gross profit after supplier payouts and redaction]
      GrossProfit --> Cash[Cash funds hiring runway]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by growing active metro programs from 3 at Y1 exit to 10 at Y3 exit while holding blended ARPU at $45K per month."
  - checkName: Must go right
    finding: "The company needs a buyer-accepted side-by-side pilot by M6 so it can convert one account in Y1 and still reach 5 paying programs by Q4Y2."
  - checkName: Model breaks if
    finding: "If the sales cycle slips to M12 or gross margin falls to 66%, downside cash turns negative before the business reaches scale."
  - checkName: Next-round proof
    finding: "A credible seed raise is supported once the company proves 5 paying metro programs across 2 AV accounts with standard compliance and live workflow integrations."
sanityChecks:
  ruleOf40: "Y3 growth 89.6% + EBITDA margin 5.2% = 94.8%"
  burnMultiple: "Y2 burn multiple 0.34x (558K EBITDA burn divided by 1.62M net new revenue); efficient on paper, but still flattered by concentrated enterprise accounts."
  revenuePerFte: "$315K Y3 using Q4Y3 headcount of 13 FTE (benchmark $200–400K SaaS; acceptable for a software-enabled services wedge)"
  flags:
    - "The base case assumes the first accepted paid pilot lands by M6; a 2-quarter delay would likely require a larger seed or slower hiring."
    - "Customer concentration remains high because 10 metro programs likely map to only a few AV accounts, so renewals and expansion are lumpy."
    - "The 70% gross-margin target depends on camera-first capture and standardized redaction; richer sensors or bespoke legal work would compress margin."
