  validationPlan:
  - priority: high
    question: What sensor quality, localization accuracy, and revisit cadence thresholds would let an AV team replace internal recollection on a named corridor?
    evidenceToGather: Run 3-5 design-partner interviews plus a blind side-by-side pilot against the customer’s current acceptance rubric.
  - priority: high
    question: How many lane-miles in a real launch metro truly require recurring external refresh versus one-off contractor runs?
    evidenceToGather: Get one historic launch map-refresh backlog and quantify changed corridors over 8-12 weeks.
  - priority: medium
    question: Which non-rideshare fleet categories will accept hardware, privacy, and incentive terms needed for AV-grade collection?
    evidenceToGather: Pilot with two regional service fleets and track mission completion, quality pass rate, and driver attrition.
  - priority: medium
    question: Can a neutral vendor win trust before Uber-like platforms or map incumbents bundle the task internally?
    evidenceToGather: Test channel introductions through autonomy tooling partners and ask buyers how they view neutral-vendor versus platform-tied data supply.
