competitors:
- name: Waymo
  stage: scale-up
  wedge: 内部全栈自动驾驶部署，叠加专有地图与运营数据闭环。
  pricing: 不作为独立对外产品出售；它是由车队和合作项目支撑的内部替代方案。
  strength: 运营控制极深、上线遥测密度高，而且已有真实商业服务足迹。
  weaknessVsUs: 它不是中立的走廊刷新供应商，而且依然要承担自有车队的利用率成本。
  sourceRefs:
  - 2
  - 3
  - 7
- name: Nuro
  stage: scale-up
  wedge: 结合 Nuro Driver 与合作部署，推进可扩展 HD 制图和全国性数据采集。
  pricing: 更偏项目制和合作制，没有公开的按里程定价。
  strength: 明确投入于可扩展制图与数据采集运营。
  weaknessVsUs: 更适配 Nuro 自己的技术堆栈和合作关系，而不是面向多买方的中立第三方任务履约。
  sourceRefs:
  - 8
  - 11
  - 12
  - 13
- name: Mobileye REM
  stage: incumbent
  wedge: 依靠量产车辆与 ADAS 分发形成众包式 HD 地图刷新。
  pricing: 企业或 OEM 合同，没有公开价目表。
  strength: 嵌入式分发规模极大，而且地图刷新逻辑持续在线。
  weaknessVsUs: 绑定 OEM 或 Mobileye 生态流转，并不是为买方定制的紧急采集任务而设计。
  sourceRefs:
  - 15
  - 16
  - 17
- name: HERE HD Live Map
  stage: incumbent
  wedge: 面向自动驾驶的企业级 HD 地图平台与统一云地图策略。
  pricing: 企业或定制合同。
  strength: 地图技术堆栈成熟、OEM 关系强，而且平台定位清晰。
  weaknessVsUs: 它卖的是地图基础设施，而不是依靠第三方车队编排的街道级采集运营。
  sourceRefs:
  - 18
  - 19
  - 20
- name: Internal AV capture fleets
  stage: incumbent
  wedge: 由 AV 开发者直接运营的专用传感器车辆与承包商体系。
  pricing: 体现为内部人力、车辆和传感器资本开支，而不是外部 SaaS 预算。
  strength: 对传感器栈和链路留痕的控制力最强。
  weaknessVsUs: 面对狭窄走廊的重定向任务反应很慢，而且在核心上线城市以外利用率很差。
  sourceRefs:
  - 1
  - 2
  - 10
regulatoryTechnicalConstraints:
- point: 加州 AV 项目始终处于高可见度状态，围绕许可、碰撞和 disengagement 披露展开，因此任何第三方数据供应商都会被追问来源问题。
  sourceRefs:
  - 24
- point: 道路视频与精确地理位置会触发有关告知、删除和供应商管理的隐私义务。
  sourceRefs:
  - 25
- point: 仅有新鲜影像并不够；买方真正需要的是与其 ODD 匹配的地图变更相关性、传感器质量验证和验收工作流。
