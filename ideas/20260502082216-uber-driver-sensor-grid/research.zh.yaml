    - 11
    - 14
  - point: California 具有战略重要性，但运营复杂度更高，因为 AV 许可和隐私审查更受关注。
    sourceRefs:
    - 24
    - 25
  sensitivityCases:
  - case: 刷新频率变为按季度，而不是大致每月两次。
    impact: 模型中的 TAM 会显著压缩，因为该服务卖的是重复刷新，而不是一次性制图。
    sourceRefs:
    - 8
    - 26
  - case: 地图 incumbents 将紧急重采集打包进更广泛的 HD 地图合同。
    impact: 独立定价能力和赢单率会走弱，尤其是在小买方场景下。
    sourceRefs:
    - 15
    - 18
    - 19
  - case: 隐私或法律审查要求更重的人工质检和更严格的保留政策。
    impact: 即便需求仍在，毛利率和试点周期也会恶化。
    sourceRefs:
    - 24
    - 25
  validationPlan:
  - priority: high
    question: 什么样的传感器质量、定位精度和回访频率阈值，能让 AV 团队在指定走廊路段上用外部采集替代内部重采集？
    evidenceToGather: 进行 3-5 次设计合作伙伴访谈，并开展一次针对客户当前验收标准的盲测并行对照试点。
  - priority: high
    question: 在一个真实的上线城市中，到底有多少车道英里真正需要持续性的外部刷新，而不是一次性的承包商任务？
    evidenceToGather: 获取一份历史上的上线地图刷新积压，并量化 8-12 周内发生变化的走廊路段。
  - priority: medium
    question: 哪些非网约车车队类别愿意接受 AV 级采集所需的硬件、隐私和激励条款？
    evidenceToGather: 与两家区域服务车队试点，并跟踪任务完成率、质量通过率和司机流失。
  - priority: medium
    question: 在 Uber 类平台或地图 incumbents 将任务内部化之前，中立供应商能否先赢得信任？
    evidenceToGather: 通过自动驾驶工具合作伙伴测试渠道引荐，并询问买方如何看待中立供应商与平台绑定型数据供给。
analysisModels:
  marketMapDiagram:
    title: AV 道路数据刷新格局
    mermaid: "quadrantChart\n  title AV 道路数据刷新格局\n  x-axis 通用供给 --> AV 工作流专用\n  y-axis 批量刷新 --> 紧急走廊路段刷新\n  HERE: [0.55, 0.35]\n  Mobileye REM: [0.60, 0.40]\n  Waymo 内部: [0.85, 0.65]\n  Nuro 内部: [0.80, 0.60]\n  拟议创业公司: [0.92, 0.90]\n"
  fiveForces:
    supplierPower:
      score: 3
      rationale: 车队供给是分散的，这对中介有利，但可靠的传感器质量和路线完成率并不容易，必须通过运营强制执行。
      sourceRefs:
      - 10
      - 11
    buyerPower:
      score: 4
      rationale: 初始买方群体规模小、技术成熟度高，而且能够将工作留在内部，因此试点和采购审查都会非常严格。
      sourceRefs:
      - 1
      - 8
      - 24
    threatOfEntrants:
      score: 3
      rationale: 仅靠软件还不够，但这个类别并不需要受监管垄断；如果能解决质检和隐私问题，可信的新进入者就能组建供给。
      sourceRefs:
      - 8
      - 10
      - 25
    threatOfSubstitutes:
      score: 5
      rationale: 内部 AV 车队、incumbent 地图平台以及重仿真的工作流，在不同程度上都能替代第三方重采集。
      sourceRefs:
      - 2
      - 15
      - 18
      - 28
    competitiveRivalry:
      score: 4
      rationale: 相邻类别竞争者众多，即便真正把中立车队任务派发、质检和合规整合为单一走廊路段刷新产品的供应商并不多。
      sourceRefs:
      - 13
      - 15
      - 19
      - 28
  pestle:
  - factor: 政治
    impact: 中性
    point: 州层面的 AV 规则仍然分散，这提高了落地复杂度，但也为专业供应商保留了空间。
    sourceRefs:
    - 17
    - 24
  - factor: 经济
    impact: 正向
    point: 自动驾驶投资与部署仍足够活跃，可以支撑专业化的上线运营预算。
    sourceRefs:
    - 13
    - 27
  - factor: 社会
    impact: 负向
    point: 公共道路视频采集可能引发公众和企业对隐私、删除权及监控观感的敏感。
    sourceRefs:
    - 24
    - 25
  - factor: 技术
    impact: 正向
    point: 技术栈正围绕持续刷新的地图、可扩展制图和仿真逐步成熟，从而提高了最新真实世界输入的价值。
    sourceRefs:
    - 8
    - 15
    - 18
    - 28
  - factor: 法律
    impact: 负向
    point: 许可、数据权利和保留义务，使数据溯源和脱敏成为供应商获批的基本要求。
    sourceRefs:
    - 24
    - 25
  adoptionFrictionMatrix:
  - friction: 隐私与法律审查
    severity: 高
    affectedBuyer: 地图或数据运营负责人及其法务顾问
    mitigation: 从第一天起就构建默认脱敏、删除工作流和走廊路段级数据权利审计轨迹。
    sourceRefs:
    - 24
    - 25
  - friction: 质检验收阈值
    severity: 高
    affectedBuyer: 地图运营与安全审查团队
    mitigation: 针对客户当前验收标准开展试点，并按路线和硬件报告通过或失败原因。
    sourceRefs:
    - 8
    - 10
    - 15
  - friction: 供给合作伙伴完成可靠性
    severity: 高
    affectedBuyer: 负责履约的运营经理
    mitigation: 使用地理围栏、校准检查、基于完成情况的激励和供应商评分卡。
    sourceRefs:
    - 10
    - 11
  - friction: 工具链集成
    severity: 中
    affectedBuyer: AV 平台或数据工程负责人
    mitigation: 输出到现有地图、仿真和质检工作流，而不是强推全新的端到端堆栈。
    sourceRefs:
    - 21
    - 22
    - 28
market:
  tam:
    value: $202.6M
    rationale: 自下而上的美国模型：2,813,353 个城市车道英里 [26] × 10% 的高变化走廊路段 × 每年 24 次刷新 × 每经验证车道英里 $30（估算）= 约 $202.6M；相较更广泛的 AV 市场增长预测 [27]，这一估算仍然保守。
    isEstimate: true
    sourceRefs:
    - 26
    - 27
  sam:
    value: $21.6M
    rationale: 滩头 SAM 假设为 15 个具备上线条件的美国城市 × 2,000 个高价值车道英里 × 每年 24 个周期 × $30，锚定于 Waymo、与 Uber 相关的部署以及 Nuro 合作中观察到的多城市扩张活动。
    isEstimate: true
    sourceRefs:
    - 3
    - 4
    - 11
    - 14
    - 26
  som:
    value: $5.4M
    rationale: 可触达的第 3 年 SOM 假设为 10 个活跃城市项目，每个项目每月 1,500 个车道英里，持续 12 个月，按每经验证车道英里 $30 计价，这意味着只需赢下少数几个企业买方，而不是拿下广泛市场份额。
    isEstimate: true
    sourceRefs:
    - 1
    - 8
    - 11
    - 14
