        Waymo internal: [0.85, 0.65]
        Nuro internal: [0.80, 0.60]
        Proposed startup: [0.92, 0.90]
  fiveForces:
    supplierPower:
      score: 3
      rationale: 车队供给足够分散，这对中介平台有利；但可靠的传感器质量和路线完工并不简单，必须靠运营手段强行拉齐。
      sourceRefs:
      - 10
      - 11
    buyerPower:
      score: 4
      rationale: 初始买方数量少、技术能力强，而且完全有能力把工作留在内部，因此试点和采购审查都会很硬。
      sourceRefs:
      - 1
      - 8
      - 24
    threatOfEntrants:
      score: 3
      rationale: 仅有软件远远不够，但这个品类也不需要监管垄断；只要有人把 QA 和隐私问题解好，新的进入者就有机会拼出供给。
      sourceRefs:
      - 8
      - 10
      - 25
    threatOfSubstitutes:
      score: 5
      rationale: 内部 AV 车队、地图既有厂商和重仿真工作流，在不同程度上都能替代第三方重采。
      sourceRefs:
      - 2
      - 15
      - 18
      - 28
    competitiveRivalry:
      score: 4
      rationale: 相邻赛道已经非常拥挤；尽管很少有人把中立车队任务编排、QA 和合规压进同一个走廊刷新产品里。
      sourceRefs:
      - 13
      - 15
      - 19
      - 28
  pestle:
  - factor: 政治
    impact: neutral
    point: 各州 AV 规则仍然分裂，这会提高 rollout 复杂度，但也给专业供应商留下生存空间。
    sourceRefs:
    - 17
    - 24
  - factor: 经济
    impact: positive
    point: 自动驾驶领域的投资与部署仍然足够活跃，能支撑专业化的上线运营预算。
    sourceRefs:
    - 13
    - 27
  - factor: 社会
    impact: negative
    point: 公共道路视频采集会引发公众和企业对隐私、删除权与监控观感的敏感情绪。
    sourceRefs:
    - 24
    - 25
  - factor: 技术
    impact: positive
    point: 技术堆栈正在围绕持续刷新地图、可扩展制图与仿真成熟起来，这会抬高新鲜真实世界输入的价值。
    sourceRefs:
    - 8
    - 15
    - 18
    - 28
  - factor: 法律
    impact: negative
    point: 许可、数据权利和保留义务，让来源留痕与打码能力成为通过供应商审核的基础门槛。
    sourceRefs:
    - 24
    - 25
  adoptionFrictionMatrix:
  - friction: 隐私与法务审查
    severity: high
    affectedBuyer: 地图或数据运营负责人及其法务顾问
    mitigation: 从第一天起就把默认打码、删除工作流和按走廊记录的数据权利审计轨迹做进去。
    sourceRefs:
    - 24
    - 25
  - friction: QA 验收阈值
    severity: high
    affectedBuyer: 地图运营与安全审查团队
    mitigation: 围绕客户既有验收标准做试点，并按路线和硬件维度回报通过或失败原因。
    sourceRefs:
    - 8
    - 10
    - 15
  - friction: 供给合作方完工可靠性
    severity: high
    affectedBuyer: 对履约负责的运营经理
    mitigation: 使用地理围栏、校准检查、按完成激励和供应商评分卡。
    sourceRefs:
    - 10
    - 11
  - friction: 工具链集成
    severity: medium
    affectedBuyer: AV 平台或数据工程负责人
    mitigation: 直接导出到既有地图、仿真和 QA 工作流里，而不是逼客户重建一套端到端系统。
    sourceRefs:
    - 21
    - 22
    - 28
market:
  tam:
    value: $202.6M
    rationale: '美国自下而上模型：2,813,353 urban lane-miles [26] × 10% 的高变化走廊 × 每年 24 次刷新 × 每个已验证 lane-mile $30（估算）= 约 $202.6M；相对于更广义的 AV 市场增长预测 [27]，这个估算仍然偏保守。'
    isEstimate: true
    sourceRefs:
    - 26
    - 27
  sam:
    value: $21.6M
    rationale: 滩头 SAM 假设 15 座具备上线条件的美国城市 × 2,000 条高价值 lane-miles × 每年 24 次刷新 × $30，并以 Waymo、Uber 相关部署和 Nuro 合作所体现的多城市 rollout 动作为锚。
    isEstimate: true
    sourceRefs:
    - 3
    - 4
    - 11
    - 14
    - 26
  som:
    value: $5.4M
    rationale: 第 3 年可触达 SOM 假设拿下 10 个活跃城市项目，每个项目每月 1,500 lane-miles、持续 12 个月、每个已验证 lane-mile $30；这只意味着赢下少数几家企业买方，而不是吃下广泛份额。
    isEstimate: true
    sourceRefs:
    - 1
    - 8
    - 11
    - 14
