scenarios:
  downside:
    description: 试点验收延后两个季度，定价被压缩，且人工质检使毛利率低于计划。
    y3RevenueK: 3015.0
    y3EbitdaK: -423.0
    cashLowPointK: -185.0
    keyAssumptionChanges:
    - 首个付费试点从 M6 推迟到 M12，且 Q4Y3 结束时只有 8 个活跃项目，而不是 10 个。
    - 由于 incumbents 打包销售或对紧急重采集打折，月度 ARPU 从 $45K 降至 $42K。
    - 由于脱敏和验收评审仍然高度依赖人工，毛利率从 70% 降至 66%。
  base:
    description: 公司在 M6 前拿下 1 个付费试点，在 Y1 转化 1 个持续项目，并以目标毛利率在 Q4Y3 达到 10 个活跃城市项目。
    y3RevenueK: 4095.0
    y3EbitdaK: 211.5
    cashLowPointK: 710.5
    keyAssumptionChanges:
    - 每个活跃城市项目的月度 ARPU 保持在 $45K。
    - 客户数从 Y1 的 0 增长到 3，至 Q4Y2 达到 5，至 Q4Y3 达到 10。
    - 依靠以摄像头为主的采集和标准化合规工作流，毛利率维持在 70%。
  upside:
    description: 强有力的并行对照试点缩短销售周期，使标杆账户内更早实现多城市扩张。
    y3RevenueK: 5220.0
    y3EbitdaK: 765.0
    cashLowPointK: 960.0
    keyAssumptionChanges:
    - 首个付费试点在 M5 前落地，且 Q4Y3 结束时有 12 个活跃城市项目。
    - 由于更好的加急溢价和多城市组合，月度 ARPU 升至 $47.5K。
    - 随着质检工具和供应商评分卡减少人工复核，毛利率提升至 72%。
