modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Outreach[创始人外呼与合作伙伴引荐] --> Pilots[合格的走廊路段试点]\n  Pilots --> Accepted[被接受的城市项目]\n  Accepted --> Revenue[使用费加最低月度承诺]\n  Revenue --> GrossProfit[扣除供应商付款和脱敏后的 70% 毛利]\n  GrossProfit --> Cash[现金支持招聘 runway]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入由活跃城市项目数驱动：从 Y1 结束时的 3 个增长到 Y3 结束时的 10 个，同时混合 ARPU 保持在每月 $45K。
- checkName: 必须做对的事
  finding: 公司需要在 M6 前拿到一个被买方接受的并行对照试点，才能在 Y1 转化 1 个账户，并仍有机会在 Q4Y2 前达到 5 个付费项目。
- checkName: 模型失效条件
  finding: 如果销售周期拖到 M12，或毛利率降至 66%，在业务达到规模之前，悲观情景下的现金就会转负。
- checkName: 下一轮融资证明
  finding: 一旦公司证明在 2 个 AV 账户中拥有 5 个付费城市项目，并完成标准合规和实时工作流集成，就能支撑一次可信的 seed 融资。
sanityChecks:
  ruleOf40: Y3 增长率 89.6% + EBITDA 利润率 5.2% = 94.8%
  burnMultiple: Y2 burn multiple 为 0.34x（558K EBITDA burn ÷ 1.62M 净新增收入）；从纸面上看效率不错，但仍受少数企业账户集中的美化。
  revenuePerFte: 以 Q4Y3 的 13 FTE 计算，Y3 每 FTE 收入为 $315K（SaaS 基准 $200–400K；对软件增强服务型切入口来说可接受）
  flags:
  - 基础情景假设首个被接受的付费试点在 M6 前落地；若延后 2 个季度，可能需要更大的 seed 轮或更慢的招聘节奏。
  - 客户集中度仍然很高，因为 10 个城市项目很可能只对应少数几个 AV 账户，因此续约和扩张会呈现跳跃性。
  - 70% 的目标毛利率依赖于以摄像头为主的采集和标准化脱敏；若需要更丰富的传感器或定制法务工作，毛利率将被压缩。
