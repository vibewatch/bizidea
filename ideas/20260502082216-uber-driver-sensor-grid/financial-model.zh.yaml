assumptions:
  - id: A1
    name: "模型起始时的期初现金"
    value: "$2.5M"
    unit: USD
    source: "[BP fundingAsk $2–4M]；假设种子前轮在模型开始时完成"
  - id: A2
    name: "起始客户数（M1）"
    value: "0"
    unit: count
    source: "[BP milestones and design-partner plan]"
  - id: A3
    name: "每个活跃城市项目的月度 ARPU"
    value: "45.0"
    unit: USD K per month
    source: "[Research market.som 1,500 lane-miles/month × $30] 与 [BP initialContract $300k–750k annual recurring program]"
  - id: A4
    name: "毛利率"
    value: "70.0"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A5
    name: "第 1 年客户爬坡"
    value: "M12 达到 3 个付费项目"
    unit: count
    source: "[BP milestones 0–12 months: 2 design partners and 1 converted recurring program]；模型按年末 3 个活跃付费项目处理"
  - id: A6
    name: "第 2 年客户爬坡"
    value: "第 2 年第 4 季度达到 5 个付费项目"
    unit: count
    source: "[BP milestones 12–24 months: 3–5 paying metro programs across at least 2 AV accounts]"
  - id: A7
    name: "第 3 年客户爬坡"
    value: "第 3 年第 4 季度达到 10 个付费项目"
    unit: count
    source: "[BP milestones 24–36 months] 与 [Research market.som 10 active metro programs]"
  - id: A8
    name: "月度客户流失率"
    value: "2.0"
    unit: percent
    source: "面向买方集中的早期企业基础设施供应商的创业财务经验值，考虑续约风险"
  - id: A9
    name: "每个付费项目的混合 CAC"
    value: "180.0"
    unit: USD K
    source: "创始人主导、以试点为主的企业销售创业财务经验值；并参考 [BP buyingProcess]、[BP mustBeTrue procurement <120 days] 与 [Research fiveForces buyerPower]"
  - id: A10
    name: "工资税与福利负担"
    value: "20.0"
    unit: percent on base salary
    source: "美国创业公司全包薪酬的创业财务经验值"
  - id: A11
    name: "CEO 年度基本薪资"
    value: "180.0"
    unit: USD K per year
    source: "pre-seed B2B 创始人薪资的创业财务经验值"
  - id: A12
    name: "工程岗位年度基本薪资"
    value: "165.0"
    unit: USD K per year
    source: "AV / 数据基础设施方向创始与早期软件 / 数据工程人才的创业财务经验值"
  - id: A13
    name: "产品与运营岗位年度基本薪资"
    value: "150.0"
    unit: USD K per year
    source: "创业财务经验值；并参考 [BP team Founding product and operations lead]"
  - id: A14
    name: "车队运营岗位年度基本薪资"
    value: "130.0"
    unit: USD K per year
    source: "创业财务经验值；并参考 [BP team Head of Fleet Operations]"
  - id: A15
    name: "GTM 岗位年度基本薪资"
    value: "150.0"
    unit: USD K per year
    source: "创业财务经验值；并参考 [BP team GTM lead]"
  - id: A16
    name: "G&A 与合规岗位年度基本薪资"
    value: "110.0"
    unit: USD K per year
    source: "首位财务 / 合规通才的创业财务经验值"
  - id: A17
    name: "非薪酬经营支出"
    value: "$50K–61K per month"
    unit: USD K per month
    source: "精益团队在云 / 软件、法务、保险、客户差旅与合规工具上的创业财务经验值；与 [BP compliance package]、[Research adoptionFrictionMatrix] 及供应商 onboarding 需求一致"
  - id: A18
    name: "招聘顺序"
    value: "Month 0 CEO + Founding Eng + Product/Ops；Month 3 Fleet Ops；Month 6 ML/Data Eng；Month 9 GTM；之后在第 2–3 年做克制扩编"
    unit: timeline
    source: "[BP team] 加保守的创业财务后续招聘经验值"
  - id: A19
    name: "现金转换"
    value: "EBITDA 近似代表现金变动"
    unit: policy
    source: "创业财务经验值；假设资本开支和营运资金波动都很小，因为硬件由合作方提供，供应商付款也已计入 COGS"
