- id: A15
  name: GTM 年基础薪资
  value: '150.0'
  unit: USD K per year
  source: 创业财务经验值；锚定 [BP team GTM lead]
- id: A16
  name: G&A 与合规年基础薪资
  value: '110.0'
  unit: USD K per year
  source: 首位财务/合规通才的创业财务经验值
- id: A17
  name: 非薪资运营支出
  value: $50K–61K per month
  unit: USD K per month
  source: 精益云/软件、法务、保险、客户差旅和合规工具的创业财务经验值；与 [BP compliance package]、[Research adoptionFrictionMatrix] 和供应商接入需求一致
- id: A18
  name: 招聘顺序
