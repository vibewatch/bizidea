scenarios:
  downside:
    description: "试点验收推迟两个季度、定价被压缩，而且人工 QA 让毛利率始终低于计划。"
    y3RevenueK: 3015.0
    y3EbitdaK: -423.0
    cashLowPointK: -185.0
    keyAssumptionChanges:
      - "首个付费试点从 M6 推迟到 M12，且第 3 年第 4 季度只做到 8 个活跃项目，而不是 10 个。"
      - "由于现有厂商打包或打折，月度 ARPU 从 $45K 降到 $42K。"
      - "由于打码与验收复核依然偏人工，毛利率从 70% 降到 66%。"
  base:
    description: "公司在 M6 拿下首个付费试点，第 1 年转化出 1 个持续项目，并在第 3 年第 4 季度以目标毛利做到 10 个活跃城市项目。"
    y3RevenueK: 4095.0
    y3EbitdaK: 211.5
    cashLowPointK: 710.5
    keyAssumptionChanges:
      - "每个活跃城市项目的月度 ARPU 保持在 $45K。"
      - "客户数从第 1 年的 0 增长到 3 个，第 2 年第 4 季度到 5 个，第 3 年第 4 季度到 10 个。"
      - "在相机优先采集和标准合规工作流支撑下，毛利率维持在 70%。"
  upside:
    description: "一次强势的并行试点缩短了销售周期，让参考账户里的多城市扩张来得更早。"
    y3RevenueK: 5220.0
    y3EbitdaK: 765.0
    cashLowPointK: 960.0
    keyAssumptionChanges:
      - "首个付费试点在 M5 落地，且第 3 年第 4 季度做到 12 个活跃城市项目。"
      - "由于加急溢价和多城市组合改善，月度 ARPU 升到 $47.5K。"
      - "随着 QA 工具和供应商评分卡减少人工复核，毛利率提升到 72%。"
