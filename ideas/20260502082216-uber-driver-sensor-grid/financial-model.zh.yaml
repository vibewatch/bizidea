    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Outreach[创始人外呼与合作方介绍] --> Pilots[合格的走廊试点]
      Pilots --> Accepted[被接受的城市项目]
      Accepted --> Revenue[使用费加最低月承诺]
      Revenue --> GrossProfit[扣除供应商付款与打码成本后形成 70% 毛利]
      GrossProfit --> Cash[现金继续支撑招聘跑道]
modelSanity:
  - checkName: 收入引擎
    finding: "基准情形收入来自活跃城市项目数的增长：第 1 年末 3 个，第 3 年末 10 个，同时混合 ARPU 保持在每月 $45K。"
  - checkName: 必须跑对的点
    finding: "公司需要在 M6 前拿到一个被买方接受的并行付费试点，才能在第 1 年转化出 1 个账户，并在第 2 年第 4 季度前做到 5 个付费项目。"
  - checkName: 模型会失效的情况
    finding: "如果销售周期拖到 M12，或毛利率降到 66%，在业务成规模前，下行情形的现金就会转负。"
  - checkName: 下一轮融资证明点
    finding: "一旦公司证明自己在 2 个 AV 账户里拿下 5 个付费城市项目，同时具备标准合规包和在线工作流集成，就有条件支撑一轮可信的 seed 融资。"
sanityChecks:
  ruleOf40: "第 3 年增速 89.6% + EBITDA 利润率 5.2% = 94.8%"
  burnMultiple: "第 2 年 burn multiple 为 0.34x（558K EBITDA burn / 1.62M 净新增收入）；纸面效率不错，但仍被少数大企业账户美化。"
  revenuePerFte: "按第 3 年第 4 季度 13 名 FTE 计算，第 3 年人均收入约 $315K（SaaS 基准约 $200–400K；对软件增强服务切口来说可接受）"
  flags:
    - "基准情形假设首个被接受的付费试点在 M6 落地；如果再晚两个季度，大概率需要更大的 seed 或更慢的招聘节奏。"
    - "客户集中度依然很高，因为 10 个城市项目很可能只对应少数几个 AV 账户，所以续约和扩张都会很跳。"
    - "70% 毛利率目标依赖于相机优先采集和标准化打码；如果需要更重的传感器或定制法务，毛利会被压缩。"