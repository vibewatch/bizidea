problem: 当施工、路边规则、交通模式或上线城市发生变化时，AV 开发者需要及时获得最新道路场景数据，但专用传感车队既昂贵又难以快速重新部署。通用行车记录仪画面缺乏覆盖保证、质量控制和隐私处理，因此很少适用于地图刷新或安全关键型模型工作流。随着分布式采集开始具备可信度，瓶颈转向第三方道路数据的任务派发、验证和保管链。
targetUser:
  primary: 在新城市扩张的 Robotaxi 与自动驾驶配送公司中的数据采集和地图运营负责人
  secondary: 区域配送、道路救援和现场服务网络中的车队运营方，可提供采集车辆
  buyer: 地图、数据运营或 AV 平台合作负责人
startupThesis:
  nonObviousInsight: 稀缺资产不再是原始道路视频，而是在现实世界发生变化时，由人工驾驶车辆按需提供、经过验证、带地理围栏且符合隐私要求的覆盖。
  beachhead: 为下一座上线城市中施工密集的机场、市中心和路边区域提供地图刷新的 Robotaxi 与自动驾驶配送团队
  wedge: 一个向合作车队派发采集任务、验证传感器质量、脱敏 PII，并交付经验证车道英里数据包的任务派发与质检平台
  whyNowCatalyst: Uber 明确表示希望把数百万司机变成传感器网络，这说明 AV 买方正逐渐接受从分布式人工车队采购现实世界数据，而不再只依赖内部专用车辆。
  ventureScalePath: 先从道路数据刷新任务切入，再扩展到 HD 地图变化检测、仿真数据生成、市政道路情报，以及面向现实世界 AI 采集的双边市场。
solution: 产品接收 AV 团队的走廊路段级请求，并将其转化为派发给已在这些街道行驶的合作车队的地理围栏采集任务。移动运营应用和低成本摄像头或传感器套件可确保路线完成、校准检查、上传完整性和司机激励。计算机视觉会自动对人脸和车牌进行脱敏，对任务质量打分，并在交付前标记地图变化或罕见边缘场景。客户购买的是更新后的车道英里或特定事件任务，而不是运营更多全职传感车辆。供给侧合作伙伴则可将闲置驾驶时间变现，而无需自建数据服务业务。
goToMarketSeed:
  firstCustomer: 一家 Series B+ 美国 Robotaxi 或自动驾驶配送公司中的数据运营经理，正在美国阳光地带上线第二或第三座城市，并且每周都面临机场、市中心和路边区域的地图刷新痛点
  buyingTrigger: 新城市上线、安全审查，或大型施工活动导致特定走廊路段的地图或训练数据过时
  currentAlternative: 内部专用传感车队加人工承包商采集
  switchingReason: 该切入点能以更快速度、按走廊路段提供定向覆盖，并内置隐私控制和质检，因此客户可避免传感车队资本开支与闲置采集时间。
  pricingHypothesis: 按经验证更新车道英里计费，并对加急任务和持续性城市覆盖订阅收取溢价
