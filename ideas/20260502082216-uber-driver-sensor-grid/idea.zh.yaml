jobsToBeDone:
- job: 当某个上线城市变化速度快于我们的地图团队回访速度时，帮助 AV 数据运营负责人快速购买经验证的走廊路段刷新数据，以便他们按计划推进上线和安全审查。
  currentAlternative: 专用传感车队与承包商二次采集
  successMetric: 从提出请求到交付被接受的车道英里所需天数，以及请求走廊路段的完整覆盖比例
