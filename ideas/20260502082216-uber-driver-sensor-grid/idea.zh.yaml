problem: >-
  AV 开发者在施工、路边规则、交通模式或上线城市变化时，需要及时拿到新的道路场景数据；但专用传感器车队既昂贵，又难以快速重部署。通用行车记录仪影像既无法保证覆盖，也缺少质量控制和隐私处理，因此很难进入地图刷新或安全关键模型工作流。随着分布式采集开始变得可信，真正卡住业务的环节就转向了任务下发、结果验收，以及第三方道路数据的链路留痕。
targetUser:
  primary: 正在扩张到新城市的 robotaxi 与自动驾驶配送公司里的数据采集和地图运营负责人
  secondary: 能提供采集车辆的区域配送、道路救援和现场服务网络的车队运营方
  buyer: 地图负责人、数据运营负责人，或 AV 平台合作负责人
startupThesis:
  nonObviousInsight: 稀缺资产已经不再是原始道路视频，而是在物理世界发生变化的那一刻，来自人工驾驶车辆、经过验证、带地理围栏且隐私安全的覆盖。
  beachhead: 正在下一座上线城市里刷新施工频繁的机场、市中心和路边装卸区的 robotaxi 与自动驾驶配送团队
  wedge: 一个任务下发与 QA 平台，把采集任务分配给合作车队，验证传感器质量，完成 PII 脱敏，并交付经验证的 lane-mile 数据包
  whyNowCatalyst: Uber 明确表示希望把数百万司机变成传感器网络，这说明 AV 买方开始接受从分布式人工车队采购物理世界数据，而不再只依赖内部专用车辆。
  ventureScalePath: 先从道路数据刷新任务切入，再扩展到 HD 地图变更检测、仿真数据生成、市政道路情报，以及面向物理世界 AI 采集的双边市场。
solution: >-
  产品接收 AV 团队按道路走廊划分的需求，再把它们变成发给合作车队的地理围栏采集任务，而这些车队本来就在跑这些街道。移动端运营应用配合低成本相机或传感器套件，确保路线完成、校准检查、上传完整性和司机激励都能落地。计算机视觉会自动打码人脸和车牌、给任务质量打分，并在交付前标出地图变化或罕见边缘场景。客户购买的是刷新后的 lane-mile 或事件驱动任务，而不是再养更多全职传感器车辆。供给侧合作伙伴则能把原本闲置的行驶时间变现，而不必自己搭建一门定制化数据服务生意。
goToMarketSeed:
  firstCustomer: 一家完成 Series B+ 融资、正在美国 Sun Belt 地区上线第二或第三座城市，并且在机场、市中心和路边区域每周都被地图刷新问题困住的 robotaxi 或自动驾驶配送公司里的数据运营经理
  buyingTrigger: 新城市上线、安全审查，或大规模施工活动让某些走廊里的地图和训练数据迅速过时
  currentAlternative: 内部专用传感器车队加上人工承包商采集
  switchingReason: 这个切口能按道路走廊更快给出定向覆盖，并把隐私控制和 QA 直接内置进去，因此客户可以避开传感器车队资本开支和空转采集时间
  pricingHypothesis: 按已验证的 lane-mile 刷新量计费；加急任务收取溢价，并提供城市级持续覆盖订阅
whyNow:
  - point: 分布式人工驾驶车辆正逐渐被接受为 AV 训练数据来源，而不再只是内部实验。
    signalRefs: ["分布式司机传感器网络"]
    sourceRefs: [1]
  - point: 小规模专用车队与城市级覆盖之间的落差，让第三方采集编排第一次变得这么迫切。
    signalRefs: ["专用车队很难低成本扩张"]
    sourceRefs: [1]
  - point: AV 开发者如今已经有了一个兼具部署与上游数据服务的平台型渠道，这会降低专业供应商切入买方的阻力。
    signalRefs: ["面向 AV 部署的平台分发能力"]
    sourceRefs: [2]
  - point: 物理世界 AI 团队在走出试点、进入可复制的城市上线阶段时，需要更多经过验证的真实世界供给。
    signalRefs: ["AV 买方需要物理世界训练供给"]
    sourceRefs: [1, 2]
differentiator: >-
  和通用行车影像数据市场不同，这家公司卖的不是无差别素材，而是针对指定走廊与上线触发条件的覆盖结果保证。它的护城河来自车队任务编排、隐私安全的采集链路、任务 QA，以及围绕 AV 地图刷新工作流沉淀下来的覆盖历史。如果它最终成为第三方道路数据任务的系统记录层，就能在多座城市里累积独特的供给密度与变化历史。
