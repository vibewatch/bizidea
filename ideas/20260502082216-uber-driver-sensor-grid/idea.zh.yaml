topRisks:
- name: 供给可靠性
  description: 合作车队可能无法稳定完成任务，或无法维持 AV 级数据所需的硬件质量。
  mitigation: 从狭窄走廊路段开始，采用基于完成情况的激励，并在扩展城市覆盖前执行严格的硬件与质检认证。
- name: 隐私与监管审查
  description: 由第三方司机进行道路侧采集可能引发数据保护、劳动者同意和市政审查。
  mitigation: 在核心工作流中默认内置脱敏、最小化元数据保留、清晰的司机合同和按城市定制的政策控制。
- name: 平台绕过中介
  description: 一旦该模式被证明有价值，Uber、Lyft 或大型 AV 项目可能会将分布式车队采集内部化。
  mitigation: 优先聚焦非网约车车队供给，整合分散的区域车队，并掌握买方仍然需要的质检和覆盖软件层。
