jobsToBeDone:
  - job: 当上线城市变化速度超过地图团队的重访能力时，帮 AV 数据运营负责人快速采购经过验证的走廊刷新数据，从而让上线计划和安全审查按时推进。
    currentAlternative: 专用传感器车队与基于承包商的重新采集
    successMetric: 从需求提出到 lane-mile 交付被接受的天数，以及所请求走廊的完整覆盖比例
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这个信号簇既有高管直接表态，也有平台定位支撑；只是已验证来源只有两个，且没有披露支出数据。
  painIntensity:
    score: 4
    rationale: 真实世界数据一旦过时，就会拖慢上线和安全审批，这对 AV 团队是很尖锐的运营痛点。
  wedgeClarity:
    score: 5
    rationale: 以走廊为单位的采集任务编排和 QA，是一个很窄的首个产品，买方清晰，结果也容易量化。
  defensibility:
    score: 4
    rationale: 护城河可以来自供给密度、覆盖历史和工作流集成，但平台型现有厂商仍是现实威胁。
  ventureScale:
    score: 4
    rationale: 滩头市场可以从 AV 地图刷新扩展到更广泛的物理世界数据基础设施，包括物流、保险和市政情报。
topRisks:
  - name: 供给可靠性
    description: 合作车队未必能稳定完成任务，也未必能把硬件质量维持在 AV 级数据要求之上。
    mitigation: 先从狭窄走廊开始，用按完成付费的激励，并在扩到城市级覆盖前做好严格的硬件与 QA 认证。
  - name: 隐私与监管审查
    description: 第三方司机执行道路采集，可能触发数据保护、劳动者同意和市政监管层面的审视。
    mitigation: 把默认打码、最小化元数据保留、清晰司机合同和按城市定制的政策控制，直接做进核心工作流。
  - name: 平台绕过
    description: 一旦分布式车队采集模式被验证有价值，Uber、Lyft 或大型 AV 项目可能会把它内建到自己体系里。
    mitigation: 先聚焦非网约车供给，整合分散的区域车队，并掌握买方仍然需要的 QA 与覆盖软件层。