differentiator: 不同于通用行车记录仪数据市场，这家公司卖的是针对特定走廊路段和上线触发点的覆盖结果保证，而不是无差别素材。其护城河在于将车队任务派发、隐私安全接入、任务质检和面向 AV 地图刷新工作流的覆盖历史结合起来。如果它成为第三方道路数据任务的记录系统，就能在城市之间累积独特的供给密度与变化历史。
