jobsToBeDone:
  - job: >-
      When a CARF dry run shows thousands of customer records with missing or conflicting tax information, help our
      compliance team remediate the right accounts first, so we can reach filing readiness without a manual fire drill.
    currentAlternative: Spreadsheet triage plus ad hoc CRM campaigns and outside advisers
    successMetric: Percentage of in-scope accounts with complete self-certification and median days to close an exception
  - job: >-
      When an auditor or regulator asks why a customer was classified a certain way, help our tax operations team
      produce the full evidence trail, so we can defend the filing without reassembling documents from multiple systems.
    currentAlternative: Shared-drive screenshots, ticket notes, and manual evidence packs
    successMetric: Time to answer an evidence request and percentage of records with complete audit history
ideaScorecard:
  signalStrength:
    score: 4
    rationale: The sources identify a specific regulatory workflow shift and concrete data chokepoints, even though both reports stem from the same underlying analysis.
  painIntensity:
    score: 5
    rationale: Missing tax-residency and self-cert records can force mass remediation, delay filings, and create recurring compliance exposure across large customer books.
  wedgeClarity:
    score: 5
    rationale: Self-cert remediation, residency validation, and exception audit trails form a narrow first workflow with a clear buyer and trigger.
  defensibility:
    score: 4
    rationale: The raw obligations are public, but the mapped customer graph, cross-regime rule logic, and historical exception evidence can compound into high switching costs.
  ventureScale:
    score: 4
    rationale: CARF is a sharp entry point, and the same data rail can extend into multiple tax-reporting regimes and adjacent financial platforms.
topRisks:
  - name: Deadline slippage
    description: If CARF enforcement or filing timelines move, some buyers may defer purchases and treat readiness as a future problem.
    mitigation: Sell against multi-regime remediation work that already exists under CRS, FATCA, DAC8, and 1099-DA rather than a single CARF date.
  - name: Integration drag
    description: Customer tax data may be so fragmented across KYC, CRM, and ledger systems that time-to-value becomes too slow for lean compliance teams.
    mitigation: Start with read-only connectors, gap-scoring dashboards, and the highest-risk remediation cohorts before expanding into deeper workflow automation.
  - name: Incumbent bundling
    description: KYC, tax reporting, or broader regtech vendors could add CARF modules and frame this wedge as a feature, not a new category.
    mitigation: Win on longitudinal evidence history, cross-regime customer data mapping, and embedded remediation workflows that incumbent point tools do not own.
