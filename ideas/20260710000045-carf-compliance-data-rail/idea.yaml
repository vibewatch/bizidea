problem: >-
  Crypto brokers and custodians spent years optimizing onboarding for AML and growth, not for tax-residency proof that
  can survive CARF audits. Customer tax fields sit across KYC vendors, CRM notes, spreadsheets, and support tickets,
  so the first CARF dry run turns into a hunt for missing self-certifications, stale residency data, and undocumented
  exceptions. If teams solve that with one-off cleanup projects, they repeat the FATCA and CRS pattern of annual
  remediation fire drills instead of building a defensible operating process.
targetUser:
  primary: Tax and compliance operations leaders at crypto brokers and custodians serving customers across multiple tax residencies
  secondary: Onboarding, customer-operations, and tax reporting teams that own remediation campaigns and exception evidence
  buyer: Chief Compliance Officer, Head of Tax Operations, or COO at a multi-jurisdiction crypto platform
startupThesis:
  nonObviousInsight: >-
    The hard part of CARF is not generating a filing once the data is clean; it is creating a persistent tax-identity
    graph that knows which customer records are complete, which need self-certification, and what evidence supports
    each exception. Because the same data primitives also underpin CRS 2.0, FATCA, DAC8, and 1099-DA, the winner is
    not a narrow CARF form filler but the system of record for tax identity across digital-asset accounts.
  beachhead: >-
    Retail-focused crypto brokers and custodians with 250,000 to 3 million historical customer accounts, users in 10
    or more tax residencies, and legacy onboarding data split across KYC vendor, CRM, and ledger systems
  wedge: >-
    A CARF tax-identity rail that maps customer data gaps, runs targeted self-certification remediation campaigns,
    validates residency evidence, and keeps an audit-ready exception log before reporting files are generated
  whyNowCatalyst: >-
    The cluster's sources say teams must map the data they already hold, fix self-certification chokepoints, and build
    defensible processes before CARF deadlines, turning stale customer data into immediate software spend.
  ventureScalePath: >-
    Start with CARF readiness for crypto brokers, then expand the same tax-identity graph, evidence store, and
    remediation workflows into CRS, FATCA, DAC8, 1099-DA, and eventually brokerages, neobanks, and cross-border
    payments platforms.
solution: >-
  The product ingests customer records from KYC providers, CRM systems, ledgers, and support tools and normalizes them
  into one tax-identity graph keyed to account, entity, and jurisdiction. It highlights which accounts are missing
  self-certification, have conflicting residency signals, or need manual exception review, then launches targeted
  remediation workflows through email, in-app prompts, or operations queues. Every response, document, override, and
  validation step is stored as an audit trail so teams can prove why a record was classified a certain way long after
  the filing is submitted. Instead of selling another reporting engine, the company becomes the upstream data rail that
  feeds CARF output and adjacent tax-reporting obligations with cleaner, reusable customer evidence.
goToMarketSeed:
  firstCustomer: >-
    A crypto broker or custodian with more than 500,000 legacy retail accounts, customers across at least 15 tax
    residencies, and a 6 to 12 person compliance operations team preparing its first CARF gap assessment
  buyingTrigger: >-
    A CARF readiness review, reporting dry run, or external adviser memo that reveals missing self-certifications,
    inconsistent tax residency fields, and no defensible exception history
  currentAlternative: Ad hoc CRM outreach, KYC vendor exports, spreadsheets, ticket queues, and outside tax advisers stitching evidence together manually
  switchingReason: >-
    This wedge turns a one-time cleanup project into a reusable control plane that continuously tracks missing fields,
    evidence status, and exceptions across CARF and adjacent regimes instead of forcing teams to restart from scratch
    every filing cycle.
  pricingHypothesis: Annual subscription priced by historical customer accounts under monitoring plus onboarding fees for integrations and one-time remediation campaign support
