slug: carf-tax-identity-rail
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型启动月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP 日期 2026-07-10 该模型始于业务计划日期后的第一个完整运行月。'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: $3.0M
  unit: USD
  source: '[BP 供资]$3-4M+ BP 为 Ask 跑道提供资金 Months 18 + 模式现金低点] 基案使用所说明范围的低端,因为聘用保持纪律,试点收入从一年开始.'
- id: A3
  name: 起始付费账户数
  value: '0'
  unit: count
  source: '[BP 里程碑 0-12 个月+BP 实验 Roadmap] 公司开始预收收益,必须先赢得付费准备飞行员.'
- id: A4
  name: 付费账户定义
  value: 付费准备试验或积极监测的生产合同
  unit: definition
  source: '[BP gtm.pricening + BP business Model.revenue Streams]客户 Eop 包括任何已经支付飞行员或生产范围的机构.'
- id: A5
  name: 付费试点经济模型
  value: $105K-$120K3 个月左右(~)$35K-$40K(每月)
  unit: USD/account
  source: '[BP 投资者 Memo. FirstCustomer. 初始合同 $100k-$150k 该型号在可重复生产证明存在之前,使用所声明的试验范围的中下层保持保守.'
- id: A6
  name: 正式合同与扩展模块年价值
  value: 初步生产合同 $250K-$300K ARR 开始 Y3 近于 ~$350K 每个标志的年值
  unit: USD/account/year
  source: '[BP 投资者 Memo. FirstCustomer. 初始合同 $250k-$400k 年度合同+BP 实验 1099-DA 模块 + 研究市场.som 15 个标识：$350k ACV 模型到达研究 SOM 值仅在第二套制度扩展开始附加之后。'
- id: A7
  name: 净客户爬坡
  value: 3 个付款账户 M12, 8 由 Q4Y2,15 人 Q4Y3
  unit: customersEop
  source: '[BP 里程碑 0-12, 12-24, 和 24-36 + BP gtm.funnelTalgets + Research market.som] 基案达到 2-3 个试点 Y18 个付款账户中的大约 6 个生产标志 Q4Y2,以及研究的 15-logo 年-3 目标 Q4Y3。。。。'
- id: A8
  name: 收入确认口径
  value: 期末付款账户乘以每个账户已实现的混合收入;Y1 运行于~$35K-$40K 每个活跃的试验月,Y2 在~时 $54K-$74K 每季度每个账户,以及 Y3 在~时 $70K-$87K 每个季度每个账户
  unit: formula
  source: '[BP gtm.priceing + BP business Model.unitOfValue + Research 意愿 ToPay] 这使得收入可以直接追踪到客户计数和试制到生产的包装.'
- id: A9
  name: 毛利率爬坡
  value: 48%-53% 在 Y1 占 58%-66%Y2 中,68%-72%Y3
  unit: gross margin percent
  source: '[BP business Model.tobjectGross MarginPct 70 + BP 操作 + 研究类 Dynamics.headwinds] 早期的补救工作在连接器,外联游戏本,证据输出变得可重复之前是执行-繁重的.'
- id: A10
  name: 招聘节奏
  value: M1 创始人和创始工程师;M4 解决方案工程师;M5 合规产品牵头;M8 执行牵头;M10 企业 GTM 铅;M13 第二工程师;M16 第二次执行聘用;M18G&A / 行动;M22 第三个工程师;M27 第二届 GTM 雇用
  unit: timeline
  source: '[BP 团队+BP 战略 Choices.sequencingRationale] 团队在缩放频道销售前会增加交付能力,仅分层第二 GTM 在参考部署游戏本存在后聘用。'
- id: A11
  name: 创始人全成本薪酬
  value: $165K
  unit: USD/year
  source: '[BP 团队创始人/CEO+ 启动融资 heuristic] 精益求精的创始人现金补偿加上工资税和福利.'
- id: A12
  name: 工程岗位全成本薪酬
  value: $205K
  unit: USD/year
  source: '[BP 团队创建 eng+起步融资 heuristic]高级数据集成和控制平面工程人才需要,但种子前计划仍低于公有公司现金水平.'
- id: A13
  name: 解决方案岗位全成本薪酬
  value: $175K
  unit: USD/year
  source: '[BP 团队解决方案和集成工程师+启动-融资 heuristic]反映技术部署所有权,而不假定一个大型服务席.'
- id: A14
  name: 合规产品岗位全成本薪酬
  value: $195K
  unit: USD/year
  source: '[BP 团队] 合规产品领先+启动融资 heuristic 假设高级政策层雇用跨越 CARF, (中文(简体) ).DAC8, (中文(简体) ).CRS 编号：FATCA,以及 1099-DA 证据规则。'
- id: A15
  name: 实施与客户成功岗位全成本薪酬
  value: $165K
  unit: USD/year
  source: '[BP 团队 执行和客户成功领先+启动融资 heuristic]涵盖高触控补救交付和再生准备.'
- id: A16
  name: 销售与合作伙伴岗位全成本薪酬
  value: $195K
  unit: USD/year
  source: '[BP 小组 伙伴关系和企业 GTM 铅 + BP gtm.channels + 启动融资 heuristic] 包括旅行和对集中企业销售的可变补偿和合作伙伴同售.'
- id: A17
  name: 综合管理岗位全成本薪酬
  value: $130K
  unit: USD/year
  source: '[BP 业务+启动融资 heuristic]涵盖精益财务,供应商管理和采购支持.'
- id: A18
  name: 薪酬分摊到损益表科目
  value: 创始人 70% S&M 和 30% G&A; 工程与合规 100% 研发; 解决方案 50% S&M 和 50% 研发; 65% S&M 和 35% 研发; 销售 100% S&M; G&A 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] 把薪酬映射到运营模型所用的职能科目。'
- id: A19
  name: 非薪酬运营费用爬坡
  value: 每月非工资开支从 S&M/R&D/G&A$8K 编号：$10K 编号：$6K 早点 Y1 改为 $26K 编号：$24K 编号：$14K 以 Q4Y3
  unit: USD/month
  source: '[BP 业务+启动融资 heuristic]涵盖云基础设施,安全审查,法律,出行,保险,以及伙伴支持,而不承担广泛的付费需求方案.'
- id: A20
  name: 现金转换口径
  value: 现金变动 = EBITDA
  unit: formula
  source: '[startup-finance heuristic] 在 pre-seed 规模下，资本开支、税费、偿债和营运资金的时间差都视为可忽略。'
- id: A21
  name: 稳态月度 logo 流失率
  value: 2.0%
  unit: percent per month
  source: '[早期企业工作流的启动-融资 heuristicSaaS 年度合同和合规工作流的粘滞性支持低水平的 churn,但模型保持较成熟的基础设施更为保守 SaaS。。。。'
- id: A22
  name: CAC 口径
  value: 36 个月的销售和营销支出总额除以 15 个新的净付款账户
  unit: formula
  source: '[模型计算使用基案销售 Marketing spent + BP gtm.funnelTargets] 捕获由创始人主导的直接销售,加上前 15 个支付账户中由合伙人主导的收购.'
- id: A23
  name: 下一轮融资里程碑
  value: 以 Q4Y2 公司应使用大约 6 个生产标志的 8 个付款账户,证明 21 天以下的参考部署,并登陆邻近的首个政府
  unit: milestone
  source: '[BP 里程碑 12 至 24 个月+BP 实验 1099-DA+ BP 供资 Ask 跑道 Months 18]] 升起的尺寸可以晚点达到防种子 Y2 并且仍然携带大约 6 个月的操作缓冲器进入 Y3。。。。'
- id: A24
  name: 季度薪酬滚动口径
  value: Y2- 说吧 Y3 每个季度内使用实际月薪,而不是只使用 6 个快照栏
  unit: convention
  source: '[计票列会+BP 团队启动 Timing]这保持了内部工资开支的一致性,尽管计票表只显示 Y2 和 Y3 年终快照。'
