scenarios:
  downside:
    description: 独立的预算需要更长的时间来清理,自证声明的补救在服务上仍然很繁重,更多的试点在生产前停顿.
    y3RevenueK: 3099.5
    y3EbitdaK: -616.8
    cashLowPointK: 483.1
    keyAssumptionChanges:
    - Q4Y3 顾客 Eop 大约是 11 人而不是 15 人。
    - 低地附近的混合年值摊位 $300K 而不是接近 研究~$350K SOM 级别。
    - 由于补救和例外处理仍然比较有说服力,总差值退出率低于 70%。
  base:
    description: 监管期限给飞行员转换到接近 BP 60QQ 目标时带来足够的紧迫性,$350K 标识级别,毛比值通过 Y3。。。。
    y3RevenueK: 4097.9
    y3EbitdaK: 199.6
    cashLowPointK: 920.9
    keyAssumptionChanges:
    - 3 个付款账户退出 Y1,8 个出入口 Y215 个出口 Y3。。。。
    - 每个付费标志的混合年值从试点经济转向大致 $350K 迟到 Y3。。。。
    - 从早期飞行员的高 40 级到 71%-72% 的坡道 Y3 使部署标准化。
  upside:
    description: 频道转诊更早成熟,第二套制度在更多账户中上架出地,可再使用的接通器在计划前拉起边距.
    y3RevenueK: 5123.1
    y3EbitdaK: 1042.6
    cashLowPointK: 1077.3
    keyAssumptionChanges:
    - Q4Y3 客户数达到约 18 而非 15。
    - 超过半数的生产标志在 12 个月内增加了第二个制度或工作流.
    - 随着连接器再利用和政策自动化的改进速度快于计划,总比值已达 70 年代中期。
sensitivity:
- variable: ARPU
  downsideCase: 退出的年值接近 $320K 每个标志,因为扩展模块后面会附加.
  baseCase: 退出年值接近研究的~$350K 每个标志 SOM 级别。
  upsideCase: 第二制度扩张使退出年度价值升至 $375K 每个标志。
  y3RevenueImpactK: -410.0
  cashImpactK: -300.0
- variable: CAC
  downsideCase: 伙伴转介业绩不佳 CAC 向着 $190K。。。。
  baseCase: CAC 靠近点 $152.6K 由创始人和合伙人领导 销售共享负载。
  upsideCase: 顾问和报告供应商介绍 CAC 相邻 $130K。。。。
  y3RevenueImpactK: -130.0
  cashImpactK: -320.0
- variable: 流失率
  downsideCase: 如果买家认为楔子太窄,则每月的 urn 会上升至 3.0%.
  baseCase: 一旦铁路成为报告控制堆的一部分,月通率将达到 2.0%。
  upsideCase: 由于多制度税收证据变得粘滞,每月的 churn 保持在 1.2% 左右.
  y3RevenueImpactK: -190.0
  cashImpactK: -170.0
- variable: 销售周期
  downsideCase: 由于采购和预算编制缓慢,试点到生产转换工作持续到 150 天。
  baseCase: 试制到生产转换在 90 天左右,有一个明确的证明周期。
  upsideCase: 紧急性和伙伴赞助将转换压缩到 60 天。
  y3RevenueImpactK: -620.0
  cashImpactK: -370.0
- variable: 毛利率
  downsideCase: 总比值退出率约为 67% 至 68%,因为补救工作仍然繁重。
  baseCase: 总比值达到 71% 左右 Y3 混合基和出站时为~72%.
  upsideCase: 由于连接器和外联游戏本的标准化速度快,总比值达到了 74%-75%。
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
- variable: 招聘节奏
  downsideCase: 第二个 GTM 雇工 第三个工程师被拉到前面 Q4Y2 证据在手
  baseCase: 规模聘用遵循业务计划的顺序,等待部署证明。
  upsideCase: 最后的尺度 租到以后 Q3Y3 而不减慢收入交付。
  y3RevenueImpactK: 100.0
  cashImpactK: -250.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: "flowchart LR\n  ReadinessProjects[CARF and DAC8 readiness projects] --> PaidPilots[Paid readiness pilots]\n  PaidPilots --> ProductionLogos[Production monitoring logos]\n  ProductionLogos --> Expansion[Second-regime and workflow expansion]\n  Expansion --> Revenue[Revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash and runway]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础收入来自从 3 个付款账户转入 Y1 退出至 15 路由 Q4Y3 而每个标志的混合年值接近研究~$350K SOM 级别。
- checkName: 必须成立的前提
  finding: 试点到生产转换必须保持在基准点 60QQ 目标之上,第一次缺口报告必须在 30 天内完成,或 8 个账户 Q4Y2 里程碑滑倒。
- checkName: 模型失效条件
  finding: 如果单独的预算或补救完成工作仍然薄弱,无法维持 Q4Y3 接近 11 个账户,总比值低于 70%,下行现金大致下降到 $0.5M 在断裂前。
- checkName: 下一轮融资证明点
  finding: 种子故事是 8 个付费账户 上面有大约 6 个生产标志 Q4Y2 加上至少一个相邻的政权可以提高的证据 ACV 初始数据之后 CARF 和 DAC8 韦奇
sanityChecks:
  ruleOf40: Y3 增长 129.7%+EBITDA4.9%=134.6%
  burnMultiple: Y2 使用粗略的 1.0x 烧伤多值 $1.0M 联 合 国 EBITDA 相向燃烧 $1.1M 新净额 ARR·；Q3Y3 可持续旋转 EBITDA 阳性。
  revenuePerFte: $373K Y311 结尾 FTE (基准)$200-400K SaaS(中文(简体) ).
  flags:
  - 基准案例假设单独的补救预算能够承受现有压力;如果买方强行捆绑,则两者都存在。CAC 周期性时间一起恶化。
  - 客户 Eop 包括大部分的付费飞行员 Y2,所以只重复制作的标识会延后头条客户数直到晚点 Y2。。。。
  - 退出 ARR 大致匹配研究 $5.3M SOM,因此第 3 年的成功取决于实际达到完整的 15 个 logo 海滩头目标,而不是一个或两个超规模的账户.
  - 如果补救工作标准化的话,总差值只能使基准点 70% 的目标得到澄清;自证声明完成不力将推动模型向服务重的交付组合发展。
  - 现金模式为 EBITDA 因此,推迟上岗付款、执行预付款或安全审查上限可能适度改变实际现金时间。
