    - 32
    - 33
    - 34
  competitiveLandscape: 现有厂商大致分三类：申报套件（Taxbit、Regnology、Ledgible）、开户与表单校验工作流（TAINA、Comply Exchange），以及更广的 AEOI 平台（Label、Sovos）。真正的空白在于：一套面向加密平台的税务身份 system of record，专门管缺失税务字段、整改组群和审计就绪的例外历史，而不是再造一台申报引擎。[22][23][24][25][29][32][34][35]
  incumbentThesis:
  - incumbentClass: 税务申报套件
    point: Taxbit、Regnology 和 Ledgible 在数据已经结构化时很强，但它们的重心仍是下游申报，而不是历史账户整改和例外治理。
