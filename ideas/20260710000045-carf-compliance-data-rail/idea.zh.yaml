jobsToBeDone:
- job: 当 CARF 演练暴露出成千上万条客户记录缺失或冲突的税务信息时，帮合规团队先抓最该整改的那批账户，这样我们不用靠一场人工救火，也能把申报准备跑通。
  currentAlternative: 电子表格分层，加临时 CRM 活动，再配外部顾问。
  successMetric: 纳入范围账户里，自证声明完整的占比，以及关闭一个例外的中位天数。
- job: 当审计师或监管方追问某位客户为何被那样归类时，帮税务运营团队把完整证据链一把拿出来，这样团队无需再从多个系统里重新拼文件，也能守住申报。
  currentAlternative: 共享盘截图、工单备注和人工打包的证据材料。
  successMetric: 答复一项证据请求所需时间，以及具备完整审计历史的记录占比。
