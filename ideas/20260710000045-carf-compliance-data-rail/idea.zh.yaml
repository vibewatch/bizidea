differentiator: KYC 厂商解决的是开户身份，税务引擎解决的是申报输出，咨询公司做的是一次性整改项目。这家公司拿的是中间缺失的那层：一张跨时间沉淀的税务身份图谱、一套自证声明工作流引擎、以及一份在第一次 CARF 申报之后依旧有用的证据历史。时间越久，它的护城河越来自三样东西：映射好的数据模型、具体司法辖区的例外处理模式，以及卡在客户系统和下游申报制度之间的嵌入式工作流位置。
