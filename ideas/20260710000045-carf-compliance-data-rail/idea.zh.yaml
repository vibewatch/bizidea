topRisks:
- name: 截止日期滑动
  description: 如果 CARF 执法或申报节奏往后滑，一部分买家可能会推迟采购，把准备工作继续当成未来问题。
  mitigation: 不要只围着某一个 CARF 日期卖，而是围绕 CRS、FATCA、DAC8 和 1099-DA 已经存在的多制度整改工作去卖。
- name: 集成拖慢落地
  description: 客户税务数据可能分散得过于严重，横跨 KYC、CRM 和总账系统，导致精简的合规团队很久都看不到价值。
  mitigation: 先上只读连接器、缺口评分看板和最高风险的整改组群，再逐步扩到更深的工作流自动化。
- name: 现有厂商捆绑销售
  description: KYC、税务申报或更广义的 regtech 厂商都可能顺手加一个 CARF 模块，把这条切口包装成已有产品里的一个功能。
  mitigation: 靠长期证据历史、跨制度客户数据映射，以及现有点工具拿不到手的嵌入式整改工作流去赢。
