openQuestions:
- What response and completion rates can design partners achieve on 500k+ legacy accounts without causing user churn or account dormancy?
- How much of the initial budget sits with tax reporting leaders versus onboarding or customer-operations leaders in crypto platforms?
- Will beachhead buyers tolerate a standalone remediation rail, or will they require it to be bundled into an existing reporting or validation contract?
- Which post-UK/EU jurisdictions will enforce CARF-like timelines quickly enough to justify international expansion sequencing?
