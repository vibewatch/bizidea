  adoptionFrictionMatrix:
  - friction: Historical customer tax data is split across KYC, CRM, support, and reporting systems.
    severity: high
    affectedBuyer: Head of Tax Operations
    mitigation: Start with read-only ingestion, gap scoring, and prioritized remediation cohorts before deeper workflow automation.
