- name: Regnology
  stage: incumbent
  wedge: Centralized regulatory tax reporting across jurisdictions for financial institutions.
  pricing: Custom enterprise / not public
  strength: Deep reporting breadth and incumbent relationships with regulated financial institutions.
  weaknessVsUs: Less obviously optimized for crypto-retail self-cert remediation on fragmented legacy customer books.
  sourceRefs:
  - 23
  - 24
- name: TAINA Tech
  stage: scale-up
  wedge: Tax-form validation, self-certification capture, and onboarding automation across FATCA, CRS, and CARF.
  pricing: Custom enterprise / not public
  strength: Strong validation workflow and customer-experience design around tax forms and self-certs.
  weaknessVsUs: Closer to edge collection than to a full cross-system remediation graph for historical crypto accounts.
  sourceRefs:
  - 29
  - 30
  - 31
- name: Label
  stage: scale-up
  wedge: AEOI and CARF operating model with due diligence, remediation, and reporting coverage.
  pricing: Custom enterprise / not public
  strength: Unusually explicit focus on remediation cycles, data integrity, and CARF operating model.
  weaknessVsUs: Its broader compliance-services footprint leaves room for a lighter-weight, crypto-ops-native rail purpose-built for continuous monitoring.
