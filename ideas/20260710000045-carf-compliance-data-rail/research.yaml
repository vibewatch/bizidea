  validationPlan:
  - priority: high
    question: What completion rate can design partners achieve on legacy-account self-cert remediation without harming active-user retention?
    evidenceToGather: Run two pilots covering 100k+ historical accounts each, segmented by geography, account age, and outreach channel.
  - priority: high
    question: Will buyers pay for a standalone remediation rail or insist it be embedded into a broader reporting contract?
    evidenceToGather: Interview tax and compliance leaders across at least 15 target platforms and compare standalone vs bundled purchasing reactions.
  - priority: medium
    question: 'Which integrations create the fastest path to value: KYC vendor, CRM, ticketing, or downstream reporting engine?'
    evidenceToGather: Map current-state systems at five beachhead prospects and measure time-to-first-gap-report by connector order.
