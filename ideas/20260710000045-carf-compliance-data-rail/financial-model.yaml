slug: carf-tax-identity-rail
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] the model starts with the first full operating month after the business plan date.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $3-4M + BP fundingAsk runwayMonths 18 + model cash low point] the base case uses the low end of the stated range because hiring stays disciplined and pilot revenue starts inside year 1.'
- id: A3
  name: Starting paying accounts
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months + BP experimentRoadmap] the company starts pre-revenue and must first win paid readiness pilots.'
- id: A4
  name: Paying account definition
  value: A paid readiness pilot or a production contract under active monitoring
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop includes any institution already paying for pilot or production scope.'
- id: A5
  name: Paid pilot economics
  value: $105K-$120K over about 3 months (~$35K-$40K per month)
  unit: USD/account
  source: '[BP investorMemo.firstCustomer.initialContract $100k-$150k pilot] the model uses the lower-middle of the stated pilot range to stay conservative before repeatable production proof exists.'
- id: A6
  name: Production and expansion annual value
  value: Initial production contracts land around $250K-$300K ARR and exit Y3 near ~$350K annual value per logo
  unit: USD/account/year
  source: '[BP investorMemo.firstCustomer.initialContract $250k-$400k annual contract + BP experimentRoadmap 1099-DA module + Research market.som 15 logos at ~$350k ACV] the model reaches the researched SOM value only after second-regime expansion starts attaching.'
- id: A7
  name: Net customer ramp
  value: 3 paying accounts by M12, 8 by Q4Y2, and 15 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 + BP gtm.funnelTargets + Research market.som] the base case reaches 2-3 pilots in Y1, roughly 6 production logos inside 8 paying accounts by Q4Y2, and the researched 15-logo year-3 target by Q4Y3.'
- id: A8
  name: Revenue recognition convention
  value: Period-end paying accounts multiplied by realized blended revenue per account; Y1 runs at ~$35K-$40K per active pilot month, Y2 at ~$54K-$74K per account per quarter, and Y3 at ~$70K-$87K per account per quarter
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.unitOfValue + Research willingnessToPay] this keeps revenue directly traceable to customer count and the pilot-to-production packaging.'
- id: A9
  name: Gross margin ramp
  value: 48%-53% in Y1, 58%-66% in Y2, and 68%-72% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research categoryDynamics.headwinds] early remediation work is implementation-heavy before connectors, outreach playbooks, and evidence exports become repeatable.'
- id: A10
  name: Hiring timeline
  value: M1 founder and founding engineer; M4 solutions engineer; M5 compliance product lead; M8 implementation lead; M10 enterprise GTM lead; M13 second engineer; M16 second implementation hire; M18 G&A / ops; M22 third engineer; M27 second GTM hire
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale] the team adds delivery capacity before scaling channel sales and only layers on the second GTM hire after the reference deployment playbook exists.'
- id: A11
  name: Founder loaded compensation
  value: $165K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic] lean founder cash compensation plus payroll taxes and benefits.'
- id: A12
  name: Engineering loaded compensation
  value: $205K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] senior data-integration and control-plane engineering talent is required, but the pre-seed plan stays below public-company cash levels.'
- id: A13
  name: Solutions loaded compensation
  value: $175K
  unit: USD/year
  source: '[BP team Solutions and integration engineer + startup-finance heuristic] reflects technical deployment ownership without assuming a large services bench.'
- id: A14
  name: Compliance product loaded compensation
  value: $195K
  unit: USD/year
  source: '[BP team Compliance product lead + startup-finance heuristic] assumes a senior policy-layer hire spanning CARF, DAC8, CRS/FATCA, and 1099-DA evidence rules.'
- id: A15
  name: Implementation and success loaded compensation
  value: $165K
  unit: USD/year
  source: '[BP team Implementation and customer success lead + startup-finance heuristic] covers high-touch remediation delivery and renewal preparation.'
- id: A16
  name: Sales and partnerships loaded compensation
  value: $195K
  unit: USD/year
  source: '[BP team Partnerships and enterprise GTM lead + BP gtm.channels + startup-finance heuristic] includes travel and variable compensation for concentrated enterprise selling and partner co-sell.'
- id: A17
  name: G&A loaded compensation
  value: $130K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] covers lean finance, vendor management, and procurement support.'
- id: A18
  name: Payroll allocation to P&L lines
  value: Founder 70% S&M and 30% G&A; engineering and compliance 100% R&D; solutions 50% S&M and 50% R&D; implementation 65% S&M and 35% R&D; sales 100% S&M; G&A 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] maps payroll into the functional lines used in the operating model.'
- id: A19
  name: Non-payroll opex ramp
  value: Monthly non-payroll spend rises from S&M/R&D/G&A of $8K/$10K/$6K in early Y1 to $26K/$24K/$14K by Q4Y3
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] covers cloud infrastructure, security review, legal, travel, insurance, and partner support without assuming broad paid-demand programs.'
- id: A20
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] capex, taxes, debt service, and working-capital timing are assumed immaterial at pre-seed scale.'
- id: A21
  name: Steady-state monthly logo churn
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow SaaS] annual contracts and compliance workflow stickiness support low churn, but the model stays more conservative than mature infrastructure SaaS.'
- id: A22
  name: CAC convention
  value: Total 36-month sales and marketing spend divided by 15 net new paying accounts
  unit: formula
  source: '[model calc using base-case salesMarketing spend + BP gtm.funnelTargets] captures founder-led direct sales plus partner-led acquisition across the first 15 paying accounts.'
- id: A23
  name: Next-round milestone for funding sizing
  value: By Q4Y2 the company should reach 8 paying accounts with about 6 production logos, prove sub-21-day reference deployments, and land the first adjacent-regime upsell
  unit: milestone
  source: '[BP milestones 12-24 months + BP experimentRoadmap 1099-DA module + BP fundingAsk runwayMonths 18] the raise is sized to reach seed-proof by late Y2 and still carry roughly six months of operating buffer into Y3.'
- id: A24
  name: Quarterly salary roll convention
  value: Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only the six snapshot columns
  unit: convention
  source: '[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent even though the headcount table only shows Y2 and Y3 year-end snapshots.'
