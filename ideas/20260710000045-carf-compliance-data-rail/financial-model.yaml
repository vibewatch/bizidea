scenarios:
  downside:
    description: Standalone budgets take longer to clear, self-cert remediation stays services-heavy, and more pilots stall before production.
    y3RevenueK: 3099.5
    y3EbitdaK: -616.8
    cashLowPointK: 483.1
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches about 11 instead of 15.
    - Blended annual value stalls near the low-$300Ks instead of approaching the researched ~$350K SOM level.
    - Gross margin exits below 70% because remediation and exception handling remain more bespoke.
  base:
    description: Regulatory deadlines create enough urgency that pilots convert near the BP 60%+ target, annual value rises toward the researched ~$350K logo level, and gross margin clears 70% by Y3.
    y3RevenueK: 4097.9
    y3EbitdaK: 199.6
    cashLowPointK: 920.9
    keyAssumptionChanges:
    - 3 paying accounts exit Y1, 8 exit Y2, and 15 exit Y3.
    - Blended annual value per paying logo moves from pilot-heavy economics toward roughly $350K by late Y3.
    - Gross margin ramps from the high-40s in early pilots to about 71%-72% by Y3 as deployments standardize.
  upside:
    description: Channel referrals mature earlier, second-regime upsells land in more accounts, and reusable connectors lift margin ahead of plan.
    y3RevenueK: 5123.1
    y3EbitdaK: 1042.6
    cashLowPointK: 1077.3
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches about 18 instead of 15.
    - More than half of production logos add a second regime or workflow inside 12 months.
    - Gross margin reaches the mid-70s as connector reuse and policy automation improve faster than planned.
sensitivity:
- variable: ARPU
  downsideCase: Exit annual value stays closer to $320K per logo because expansion modules attach later.
  baseCase: Exit annual value approaches the researched ~$350K per logo SOM level.
  upsideCase: Second-regime expansion lifts exit annual value toward $375K per logo.
  y3RevenueImpactK: -410.0
  cashImpactK: -300.0
- variable: CAC
  downsideCase: Partner referrals underperform and CAC drifts toward $190K.
  baseCase: CAC stays near $152.6K with founder-led and partner-led selling sharing load.
  upsideCase: Adviser and reporting-vendor introductions hold CAC near $130K.
  y3RevenueImpactK: -130.0
  cashImpactK: -320.0
- variable: churn
  downsideCase: Monthly churn rises to 3.0% if buyers view the wedge as too narrow.
  baseCase: Monthly churn holds at 2.0% once the rail becomes part of the reporting control stack.
  upsideCase: Monthly churn stays near 1.2% because multi-regime tax evidence becomes sticky.
  y3RevenueImpactK: -190.0
  cashImpactK: -170.0
- variable: sales cycle
  downsideCase: Pilot-to-production conversion stretches toward 150 days because procurement and budgeting slow down.
  baseCase: Pilot-to-production conversion stays near 90 days with one clear proof cycle.
  upsideCase: Urgency and partner sponsorship compress conversion toward 60 days.
  y3RevenueImpactK: -620.0
  cashImpactK: -370.0
- variable: gross margin
  downsideCase: Gross margin exits around 67%-68% because remediation stays services-heavy.
  baseCase: Gross margin reaches about 71% on a Y3 blended basis and ~72% at exit.
  upsideCase: Gross margin reaches 74%-75% as connectors and outreach playbooks standardize faster.
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
- variable: hiring pace
  downsideCase: The second GTM hire and third engineer are pulled forward before Q4Y2 proof is in hand.
  baseCase: Scale hiring follows the sequencing in the business plan and waits for deployment proof.
  upsideCase: The final scale hire waits until after Q3Y3 without slowing revenue delivery.
  y3RevenueImpactK: 100.0
  cashImpactK: -250.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      ReadinessProjects[CARF and DAC8 readiness projects] --> PaidPilots[Paid readiness pilots]
      PaidPilots --> ProductionLogos[Production monitoring logos]
      ProductionLogos --> Expansion[Second-regime and workflow expansion]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue comes from moving from 3 paying accounts at Y1 exit to 15 by Q4Y3 while blended annual value per logo approaches the researched ~$350K SOM level.
- checkName: Must go right
  finding: Pilot-to-production conversion must stay above the BP 60%+ target and first gap reports must stay inside 30 days, or the 8-account Q4Y2 milestone slips.
- checkName: Model breaks if
  finding: If standalone budgets or remediation completion stay weak enough to hold Q4Y3 near 11 accounts and gross margin below 70%, downside cash falls toward roughly $0.5M before breakeven.
- checkName: Next-round proof
  finding: The seed story is 8 paying accounts with about 6 production logos by Q4Y2 plus evidence that at least one adjacent-regime upsell can raise ACV beyond the initial CARF and DAC8 wedge.
sanityChecks:
  ruleOf40: Y3 growth 129.7% + EBITDA margin 4.9% = 134.6%
  burnMultiple: Y2 burn multiple is about 1.0x using roughly $1.0M of EBITDA burn against about $1.1M of net new ARR; Q3Y3 turns sustainably EBITDA positive.
  revenuePerFte: $373K Y3 on 11 ending FTE (benchmark $200-400K SaaS)
  flags:
  - The base case assumes a standalone remediation budget survives incumbent bundling pressure; if buyers force bundling, both CAC and cycle time worsen together.
  - customersEop includes paid pilots through much of Y2, so recurring-only production logos lag the headline customer count until late Y2.
  - Exit ARR roughly matches the researched $5.3M SOM, so year-3 success depends on actually reaching the full 15-logo beachhead target rather than one or two outsized accounts.
  - Gross margin only clears the BP 70% target if remediation work standardizes; weak self-cert completion would push the model toward a services-heavier delivery mix.
  - Cash is modeled as EBITDA, so deferred onboarding payments, implementation prepayments, or security-review capex could shift actual cash timing modestly.
