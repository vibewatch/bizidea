jobsToBeDone:
  - job: 园区新开或扩张时，帮我们的社群团队在一套系统里跑完项目编排和成员跟进，这样我们在不按人数线性扩编的前提下，也能把园区维持满员。
    currentAlternative: 表格、WhatsApp 和通用联合办公软件
    successMetric: 续约率，以及每位社群经理可覆盖的成员数
  - job: 当赞助方或企业伙伴想接触我们的创业社群时，帮我们把引荐和活动打包、追踪并交付，这样社群活动就不只靠租金变现。
    currentAlternative: 人工 concierge 和临时性的活动记录
    successMetric: 赞助收入，以及每个项目带来的合格引荐数量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这组信号清楚表明，一家获融资的运营商正在利雅得扩张大型园区，并把社群和空间一起卖，只是验证来源仍只有一条。
  painIntensity:
    score: 4
    rationale: 一旦园区规模、租户多样性和项目体量超过人工社群流程的承载上限，运营痛点就会非常真实。
  wedgeClarity:
    score: 4
    rationale: 切入产品很具体，就是园区社群运营、撮合和赞助项目工作流，而不是宽泛的物业软件。
  defensibility:
    score: 3
    rationale: 早期护城河不深，但可以靠结果数据、工作流深度和跨园区基准逐步叠起来。
  ventureScale:
    score: 4
    rationale: 起步滩头市场不大，但同一层运营系统可以向创新园区、孵化器和托管型商业社群扩出去。
topRisks:
  - name: 市场过窄的印象
    description: 如果看起来只是一个联合办公细分功能点，投资人可能会觉得创业园区软件市场太小。
    mitigation: 从创业园区切入，但在叙事和路线图上尽快扩到孵化器、自贸区和企业创新枢纽，这些场景跑的是同类工作流。
  - name: 现有厂商功能外扩
    description: 联合办公管理平台可能补上一些轻量社群功能，压缩这个切口。
    mitigation: 盯住更难的一层——引荐、赞助项目和续约分析——这些都是通用、以计费为先的工具不擅长建模的。
  - name: 区域软件预算偏慢
    description: 一些运营商仍可能把社群运营当人力问题，而不是软件问题，导致采用变慢。
    mitigation: 在园区开业或扩张阶段切入，把 ROI 绑在续约、入住率和赞助收入上，而不是泛泛而谈效率提升。
