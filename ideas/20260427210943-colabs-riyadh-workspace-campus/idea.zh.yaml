    sourceRefs: [1]
differentiator: >-
  通用联合办公工具是为租约、工位和发票而构建的。该产品则面向新兴市场创业园区如今出售的更高毛利层：会员成果、精选引荐、项目利用率和赞助方接入。如果它能够成为同时衡量社群活动、入驻率与合作伙伴收入的系统，就能掌握决定哪些项目真正推动续约和园区扩张的数据集。
