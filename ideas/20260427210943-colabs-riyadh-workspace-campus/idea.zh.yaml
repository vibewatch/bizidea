jobsToBeDone:
  - job: 当我们开设或扩张创业园区时，帮助我们的社群团队在一个系统里完成活动运营和会员后续跟进，这样他们就能在不按比例扩张人手的情况下保持园区满员。
    currentAlternative: 电子表格、WhatsApp 和通用联合办公软件
    successMetric: 续约率以及每位社群经理支持的会员数量
  - job: 当赞助方或企业合作伙伴希望接触我们的创业社群时，帮助我们打包并跟踪引荐与活动，从而让社群活动产生租金之外的收入。
    currentAlternative: 人工礼宾式运营和临时性的活动跟踪
    successMetric: 赞助收入以及每个项目的合格引荐数量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 该聚类清楚显示一家获得资金支持的运营方正在扩张利雅得大型园区，并把社群与空间一起出售，尽管验证只来自单一来源。
  painIntensity:
    score: 4
    rationale: 一旦园区规模、租户多样性和项目量超出人工社群工作流的承载范围，运营方就会感受到真实痛点。
  wedgeClarity:
    score: 4
    rationale: 切入产品明确聚焦园区社群运营、匹配与赞助方项目工作流，而不是宽泛的地产软件。
  defensibility:
    score: 3
    rationale: 防御性起步一般，但可通过成果数据、工作流深度以及跨园区运营基准逐步累积。
  ventureScale:
    score: 4
    rationale: 初始滩头市场较窄，但同一运营层可扩展到创新园区、孵化器和受管理的商业社群。
topRisks:
  - name: 细分市场过窄的观感
    description: 如果看起来只是联合办公点状解决方案，投资人可能会认为创业园区软件市场太小。
    mitigation: 从创业园区切入，但把叙事和路线图扩展到同样运行类似工作流的孵化器、自由区和企业创新中心。
  - name: 既有厂商的功能蔓延
    description: 联合办公管理平台可能会加入轻量级社群功能，从而压缩这一切入点。
    mitigation: 专注于更难的工作流层，如人脉引荐、赞助方项目和续约分析，这些并非以计费为先的通用工具所擅长建模。
  - name: 区域软件预算偏慢
    description: 一些运营方仍可能把社群运营视为人力成本而非软件预算，从而拖慢采用速度。
    mitigation: 在园区启动或扩张时销售，把 ROI 绑定到续约、入驻率和赞助收入，而不是泛泛的效率提升。
