jobsToBeDone:
  - job: 当我们新开或扩张创业园区时，帮社区团队在一个系统里跑完项目运营和会员跟进，这样就能在不按人头线性扩编的情况下把园区维持满员。
    currentAlternative: 电子表格、WhatsApp 和通用联合办公软件
    successMetric: 续约率，以及每位社区经理可支持的会员数
  - job: 当赞助商或企业合作伙伴希望触达我们的创业社区时，帮我们把引荐和活动打包并追踪起来，这样社区活动就能在租金之外继续变现。
    currentAlternative: 人工 concierge 服务与临时性的活动追踪
    successMetric: 赞助收入，以及每个项目带来的合格引荐数量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这个信号簇清楚表明，一家拿到资金的运营商正在利雅得扩张大型园区，并把社区与空间一起出售，尽管可验证来源只有一条。
  painIntensity:
    score: 4
    rationale: 一旦园区规模、租户多样性和项目数量超过人工社区流程的承载上限，运营商的痛感会非常真实。
  wedgeClarity:
    score: 4
    rationale: 切入产品聚焦园区社区运营、撮合与赞助商项目流程，而不是泛化的物业软件。
  defensibility:
    score: 3
    rationale: 早期防御力不算强，但可以通过结果数据、工作流深度以及跨园区运营基准逐步累积。
  ventureScale:
    score: 4
    rationale: 初始滩头市场很窄，但同一层运营系统可以延伸到创新园区、孵化器和托管型商业社区。
topRisks:
  - name: 市场过于细分的观感
    description: 如果看起来只是联合办公场景里的单点工具，投资人可能会觉得创业园区软件市场太小。
    mitigation: 从创业园区切入，但把叙事和路线图尽早扩展到孵化器、自贸区与企业创新枢纽，这些场景的工作流高度相似。
  - name: 在位产品功能外溢
    description: 联合办公管理平台可能补上一些轻量社区功能，从而压缩这个切口。
    mitigation: 把重心放在更难的工作流层——引荐、赞助商项目和续约分析——这些都不是以计费为中心的通用工具擅长建模的。
  - name: 区域软件预算释放较慢
    description: 一些运营商仍可能把社区运营视为人力问题而不是软件问题，导致采用速度偏慢。
    mitigation: 在园区开业或扩张节点销售，把 ROI 锚定在续约、入驻率和赞助收入，而不是泛泛而谈的效率提升。
