problem: >-
  利雅得的灵活办公运营商已经不只是出租桌位，还要运营创业园区、活动、项目和真正有价值的成员连接。通用联合办公软件能处理账单和会议室预订，却管不好专家场次、创始人引荐、赞助方项目，或创业公司与企业会员混在一起后的续约风险。园区一做大，团队就退回 WhatsApp、表格和人工 concierge，既难扩张，也难衡量。
targetUser:
  primary: 在 GCC 运营创业导向园区、活跃会员超过 300 人的灵活办公运营商 COO 与社群负责人
  secondary: 沙特孵化器、创新中心和大学创业中心的管理者
  buyer: 多点位办公运营商的 COO、GM 或创始人
startupThesis:
  nonObviousInsight: 利雅得真正稀缺的已不只是平方米，而是把实体园区变成可量化网络产品的能力。COLABS 的新园区说明，今天卖的是办公空间、活动编排和社群的组合，这就在工位库存和计费系统之上打开了新软件切口。
  beachhead: 在利雅得和吉达运营 1-3 个创业导向园区、活跃会员 300-1,500 人、并且稳定举办活动或导师项目的运营商
  wedge: 一套园区操作系统，把成员入驻、活动与导师排期、暖介绍撮合、赞助项目编排和续约风险追踪放进同一条工作流
  whyNowCatalyst: COLABS 在利雅得推出一座获资本支持、面积达 4,000 平方米的新园区，说明运营商正在放大园区规模，同时把社群结果当产品卖，这让“专为创业园区设计的软件”突然变得很急，而通用联合办公软件不够用了。
  ventureScalePath: 先从沙特和 GCC 的创业园区运营商切入，再扩到孵化器、自贸区、大学创新中心和企业创新枢纽——这些场景都要靠成员结果和合作伙伴项目，把空间变现。
solution: >-
  产品不是桌位管理系统，而是园区社群运营的系统底座。它记录每个成员是谁、处在什么阶段、参加过哪些项目、下一步该见谁，以及哪些活动会带来续约或增购。社群经理可以自动发送活动邀请、撮合导师、安排赞助方 office hours 并跟进任务；运营方则能按 cohort 看入住率、参与度、引荐转化和流失风险。再加一层赞助方模块，园区就能把面向银行、电信公司和企业伙伴的创业项目触达，打包成标准化产品，不必每个项目都靠人工跑。时间拉长后，公司会沉淀专有的成员参与图谱和结果基准，成为创新型地产背后的运营层。
goToMarketSeed:
  firstCustomer: 一家正在新开或扩张 3,000+ 平方米创业园区的利雅得办公运营商，园区内有独立办公室、固定工位和每周创始人活动
  buyingTrigger: 新园区开业或大规模扩张，让团队必须在不显著增加社群编制的前提下，协同数百名成员、活动和合作伙伴项目
  currentAlternative: 通用联合办公软件 + 表格 + WhatsApp 群 + 活动工具 + 社群经理人工流程
  switchingReason: 第一批客户会切换，是因为这是第一个把“续约结果和网络结果”当核心来卖的产品，而不是只卖座位库存；它能在不大幅扩充运营团队的情况下，提高续约和赞助收入。
  pricingHypothesis: 按地点收月度 SaaS 费用，再按活跃成员数或付费项目席位收使用费；赞助方分析和引荐分析作为高级模块单独收费
