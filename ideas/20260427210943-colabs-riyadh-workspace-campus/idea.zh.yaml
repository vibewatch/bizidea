problem: >-
  利雅得的灵活办公空间运营方不再只是出租工位；市场现在要求他们运营带有活动、项目安排和真实成员连接的创业园区。通用联合办公软件可以处理计费和会议室预订，但无法管理专家交流、创始人引荐流程、赞助方项目，或跨初创企业与企业会员混合群体的续约风险。随着园区规模扩大，团队只能依赖 WhatsApp、电子表格和人工礼宾式运营，这种方式既难以扩展，也难以衡量。
targetUser:
  primary: 在 GCC 经营以创业为核心、拥有 300+ 活跃会员园区的灵活办公运营方 COO 与社群负责人
  secondary: 沙特阿拉伯孵化器、创新中心和大学创业中心的管理者
  buyer: 多点位办公空间运营方的 COO、GM 或创始人
startupThesis:
  nonObviousInsight: 利雅得稀缺的资产不再只是平方米面积，而是把实体园区转化为可衡量网络产品的能力。COLABS 的推出表明，市场报价已从单纯办公空间转向办公空间加活动运营加社群，这为位于工位库存和计费之上的新软件切入点创造了空间。
  beachhead: 在利雅得和吉达拥有 1-3 个创业型园区、300-1,500 名活跃会员，并定期举办活动或导师项目的运营方
  wedge: 一套园区运营系统，在同一工作流中自动化会员入驻、活动与导师场次排期、人脉引荐匹配、赞助方项目以及续约风险跟踪
  whyNowCatalyst: COLABS 在利雅得推出并已获资金支持的 4,000 平方米园区，说明运营方正在扩大园区面积并出售社群成果，这使得面向活动化创业空间而非通用联合办公场景的软件变得更迫切。
  ventureScalePath: 先从沙特和 GCC 的创业园区运营方切入，再扩展到孵化器、自由区、大学创新中心和企业创新中心；这些场景都需要通过会员成果和合作伙伴项目把空间变现。
solution: >-
  该产品是园区社群运营的核心记录系统，而不只是工位管理工具。它跟踪每位会员是谁、处于什么阶段、参加了哪些项目、下一步应该认识谁，以及哪些活动与续约或增购相关。社群经理可获得活动邀请、导师匹配、赞助方答疑时段和后续任务的自动化能力；运营方则能看到按群组划分的入驻率、参与度、引荐转化和流失风险仪表盘。赞助方层使园区可以为银行、电信公司和企业合作伙伴打包提供精选初创企业接触机会，而无需人工运营每个项目。随着时间推移，公司将建立一张关于会员参与和成果基准的专有图谱，成为创新型地产的运营层。
goToMarketSeed:
  firstCustomer: 一家正在开设或扩张 3,000+ 平方米创业园区的利雅得办公空间运营方，园区包含独立办公室、固定工位和每周创始人活动
  buyingTrigger: 新园区启动或重大扩张，迫使团队在不显著增加社群人手的情况下协调数百名会员、活动和合作项目
  currentAlternative: 通用联合办公软件加电子表格、WhatsApp 群、活动工具和人工社群经理工作流
  switchingReason: 首个客户会切换，因为这是第一款为出售留存和网络成果而非单纯工位库存打造的产品，并且它能在不大幅扩张运营团队的情况下提高续约率和赞助收入。
  pricingHypothesis: 按地点收取月度 SaaS 费用，并按活跃会员数或付费项目席位数计费；赞助方与引荐分析模块收取高级费用
