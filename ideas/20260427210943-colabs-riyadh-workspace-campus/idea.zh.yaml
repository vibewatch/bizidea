problem: 利雅得的灵活办公运营商已经不只是出租工位；市场开始要求他们运营带活动、项目和高质量成员连接的创业园区。通用联合办公软件能处理计费和会议室预订，却管不了专家答疑、创始人引荐流程、赞助商项目运营，或者面向创业公司与企业混合会员的续约风险。园区一旦变大，团队就会退回到 WhatsApp、表格和人工 concierge 式服务上，既难扩张，也几乎无法衡量效果。
targetUser:
  primary: 在 GCC 经营创业导向园区、活跃会员超过 300 人的灵活办公运营商 COO 与社区负责人
  secondary: 沙特孵化器、创新中心与大学创业中心的管理者
  buyer: 多点位办公空间运营商的 COO、GM 或创始人
startupThesis:
  nonObviousInsight: 在利雅得，稀缺资产已经不只是面积；更稀缺的是把实体园区做成一个可衡量网络产品的能力。COLABS 的新园区说明，市场报价已经从单纯办公空间转向“空间 + 项目 + 社区”，于是就在工位库存和计费之上，长出一层新的软件切口。
  beachhead: 在利雅得和吉达运营 1-3 个创业导向园区、活跃会员 300-1,500 人、并持续举办活动或导师项目的运营商
  wedge: 一套园区运营系统，把会员入驻、活动与导师会话排期、暖介绍撮合、赞助商项目执行和续约风险追踪放进同一条工作流
  whyNowCatalyst: COLABS 融资后在利雅得落地 4,000 sqm 园区，说明运营商正在放大园区规模，同时出售社区结果，这让面向“被编排的创业空间”而不是通用联合办公场景的软件变得迫切。
  ventureScalePath: 先从沙特和 GCC 的创业园区运营商切入，再扩展到孵化器、自贸区、大学创新中心和企业创新枢纽；这些场景都需要通过会员结果和合作伙伴项目把空间变现。
solution: 这款产品不是只管工位，而是创业园区社区运营的系统记录层。它记录每位会员是谁、处在什么阶段、参加过哪些项目、下一步应该认识谁，以及哪些活动与续约或增购相关。社区经理能获得活动邀请、导师撮合、赞助商 office hours 和后续任务的自动化；运营方则能看到按 cohort 拆分的入驻率、参与度、引荐转化和流失风险仪表盘。赞助商层还能让园区把对银行、电信公司和企业伙伴的创业公司定向触达打包出售，而不用每个项目都靠人工推进。随着时间推移，公司会积累一张关于会员参与和结果基准的专有关系图谱，逐步成为创新导向地产的运营底层。
goToMarketSeed:
  firstCustomer: 一家正在新开或扩张 3,000+ sqm 创业园区的利雅得办公空间运营商，园区内有独立办公室、固定工位和每周创始人活动
  buyingTrigger: 新园区开业或大规模扩张，迫使团队在不大幅增加社区人手的前提下协调数百名会员、活动和合作伙伴项目
  currentAlternative: 通用联合办公软件叠加电子表格、WhatsApp 群、活动工具以及社区经理的手工流程
  switchingReason: 第一批客户会切换，因为这是第一款围绕留存和网络结果而不是座位库存打造的产品，能在不把运营团队大幅做大的情况下提升续约率和赞助收入。
  pricingHypothesis: 按点位收取月度 SaaS 费用，再按活跃会员数或付费项目席位收取用量费用；赞助商分析与引荐分析作为高级模块单独收费
