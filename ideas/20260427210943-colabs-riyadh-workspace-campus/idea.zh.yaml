    sourceRefs: [1]
  - point: COLABS 背后的区域融资说明，运营商被期待成长为平台型公司，这让基础设施软件在扩张阶段更容易卖进去。
    signalRefs:
      - 资本正在支持区域办公平台
    sourceRefs: [1]
differentiator: >-
  通用联合办公工具是为租约、工位和发票设计的；这款产品面向的是新兴市场创业园区现在真正出售、也更高毛利的那一层：会员结果、定向引荐、项目利用率以及赞助商触达。如果它能成为社区行为、入驻率与合作伙伴收入被统一衡量的那套系统，就能掌握决定哪些项目真正推动续约和园区扩张的数据集。
