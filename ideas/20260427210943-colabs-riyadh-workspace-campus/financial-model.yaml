modelDiagram:
  title: startup campus ops revenue engine
  mermaid: |
    flowchart LR
      Leads[Qualified campus launches] --> Pilots[Paid pilots]
      Pilots --> Production[Production campuses]
      Production --> Subscription[Per-campus subscription revenue]
      Production --> Premium[Usage and sponsor analytics]
      Subscription --> GrossProfit[Gross profit]
      Premium --> GrossProfit
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from reaching 15 live campuses by Q4Y3 at roughly $19K blended ARPU, not from aggressive seat-based monetization.
  - checkName: Must go right
    finding: The model needs pilots to convert to production close to the BP target so the company can hit 8-10 live sites by Y2 without hiring a larger sales team.
  - checkName: Model breaks if
    finding: If ARPU drops toward $17K and live campuses stall near 11, downside cash falls to about $434K and the company remains too narrow for an efficient seed step-up.
  - checkName: Next-round proof
    finding: The next round is justified once the company shows 8-10 production campuses, >70% gross margin, and at least one second-site or sponsor-module expansion motion.
sanityChecks:
  ruleOf40: Y3 growth 108% + EBITDA margin -243% = -135%; still far from scale efficiency and acceptable only as a pre-scale proof model.
  burnMultiple: Y3 net burn $557K / net new ARR $95K = 5.9x.
  revenuePerFte: $33K Y3 recognized revenue per FTE (benchmark $200-400K SaaS); low because the model intentionally stays pre-scale in a narrow beachhead.
  flags:
    - Research pegs the initial Y3 beachhead at roughly $0.3M SOM, so the model depends on adjacent incubators, innovation hubs, or premium sponsor modules for venture-style expansion.
    - Revenue per FTE remains well below software benchmarks through Y3, which means the seed narrative must lean on proof of workflow depth and category expansion rather than near-term efficiency.
    - The operating model assumes no realized logo churn over the first 36 months even though unit economics use 2.0% monthly churn; one early campus loss would materially worsen payback and next-round timing.
    - Burn multiple stays high through Y3 because the company is funding product and deployment capacity ahead of a still-small campus base.
