  - variable: ARPU
    downsideCase: $17K blended annual campus ARPU
    baseCase: $19K blended annual campus ARPU
    upsideCase: $21K blended annual campus ARPU
    y3RevenueImpactK: -24.1
    cashImpactK: -43.0
  - variable: CAC
    downsideCase: $30K CAC as founder-led sales stays bespoke
    baseCase: $24K CAC
    upsideCase: $18K CAC with referral-heavy design-partner motion
    y3RevenueImpactK: -19.0
    cashImpactK: -72.0
  - variable: churn
    downsideCase: 3.0% monthly churn after first annual renewals
    baseCase: 2.0% monthly churn
    upsideCase: 1.0% monthly churn
    y3RevenueImpactK: -14.0
    cashImpactK: -18.0
  - variable: sales cycle
    downsideCase: Pilot-to-production slips by one quarter
    baseCase: Current quarterly ramp
    upsideCase: Production conversion improves by one quarter
    y3RevenueImpactK: -31.0
    cashImpactK: -35.0
  - variable: gross margin
    downsideCase: 68% Y3 gross margin because implementations stay custom
    baseCase: 72% Y3 gross margin
    upsideCase: 75% Y3 gross margin with tighter templates
    y3RevenueImpactK: 0.0
    cashImpactK: -9.0
  - variable: hiring pace
    downsideCase: Second engineer and finance hire each happen one quarter earlier
    baseCase: Current hire plan
    upsideCase: Finance hire shifts post-Y3 and support stays founder-led
    y3RevenueImpactK: 0.0
    cashImpactK: -90.0
modelDiagram:
  title: 创业园区运营收入引擎
  mermaid: |
    flowchart LR
      Leads[合格的园区开业线索] --> Pilots[付费 pilot]
      Pilots --> Production[Production 园区]
      Production --> Subscription[按园区订阅收入]
      Production --> Premium[用量与赞助商分析收入]
      Subscription --> GrossProfit[毛利润]
      Premium --> GrossProfit
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形的收入来自 Q4Y3 达到 15 个活跃园区、每园区约 $19K 的混合 ARPU，而不是激进的按席位变现。
  - checkName: 必须跑顺的事情
    finding: 模型要求 pilot 到 production 的转化接近 BP 目标，这样公司才能在不扩大销售团队的情况下，于 Y2 达到 8-10 个活跃点位。
  - checkName: 模型会在哪种情况下失效
    finding: 如果 ARPU 掉到约 $17K，且活跃园区停在约 11 个，下行情形的现金低点会降到约 $434K，公司也会继续困在一个过窄的细分市场里。
  - checkName: 下一轮融资的证明点
    finding: 只有当公司证明自己拿下了 8-10 个 production 园区、毛利率高于 70%，并且至少出现 1 次第二点位或赞助商模块扩展时，下一轮融资故事才成立。
sanityChecks:
  ruleOf40: Y3 growth 108% + EBITDA margin -243% = -135%；距离规模效率仍很远，只能作为 pre-scale 验证模型成立。
  burnMultiple: Y3 net burn $557K / net new ARR $95K = 5.9x。
  revenuePerFte: Y3 每个 FTE 对应的已确认收入为 $33K（SaaS 基准通常为 $200-400K）；之所以偏低，是因为模型刻意停留在窄滩头市场的 pre-scale 阶段。
  flags:
    - 研究将初始第 3 年滩头市场界定在约 $0.3M SOM，因此模型天然依赖相邻的孵化器、创新枢纽或赞助商高级模块来支撑 venture 式扩张。
    - 到 Y3 为止，每个 FTE 的收入依然远低于软件行业常见基准，因此 seed 叙事必须更多依赖工作流深度与品类扩张证据，而不是短期效率。
    - 运营模型假设前 36 个月没有实际 logo churn，尽管单位经济里使用了 2.0% 的月流失率；一旦早期丢掉 1 个园区，回本周期和下一轮融资时间点都会明显恶化。
    - 因为公司要提前投入产品和部署能力，而活跃园区基数仍小，burn multiple 到 Y3 都会保持较高水平。
