scenarios:
  downside:
    description: pilot 转正更慢、赞助模块挂载率更低，公司会在核心园区细分里停得更久。
    y3RevenueK: 147.34
    y3EbitdaK: -636.2
    cashLowPointK: 433.7
    keyAssumptionChanges:
      - 混合年 ARPU 下滑到 $17K，因为赞助分析采用不及预期。
      - Y3 末在用园区只有 11 个，而不是 15 个，因为 pilot 到生产的节奏被拉长。
      - 由于实施工作更重，Y3 毛利率只能维持在约 64%，而不是 72%。
  base:
    description: 创始人主导的开业销售，到 Y3 Q4 转成 15 个在用园区，ARPU 在使用费提升下小幅抬升。
    y3RevenueK: 228.79
    y3EbitdaK: -556.77
    cashLowPointK: 549.62
    keyAssumptionChanges:
      - 每园区混合年 ARPU 为 $19K。
      - 在用园区数从 Y1 末的 3 个，扩到 Y2 末的 10 个，再到 Y3 末的 15 个。
      - 毛利率随着部署标准化，从 Y1 的 66%-68% 提升到 Y3 的 72%。
  upside:
    description: 赞助分析更早卖起来，相邻园区需求也更强，在不明显增加招聘的前提下，同时抬升 ARPU 和园区数。
    y3RevenueK: 288.75
    y3EbitdaK: -504.6
    cashLowPointK: 624.98
    keyAssumptionChanges:
      - 混合年 ARPU 提升到 $21K，因为高级模块挂载更早起量。
      - 借助更强的第二点位扩张和相邻园区渗透，在用园区到 Y3 Q4 达到 17 个。
      - 因为部署保持模板化，财务 / 运营岗位被推迟到年末才补。
sensitivity:
  - variable: ARPU
    downsideCase: $17K blended annual campus ARPU
    baseCase: $19K blended annual campus ARPU
    upsideCase: $21K blended annual campus ARPU
    y3RevenueImpactK: -24.1
    cashImpactK: -43.0
  - variable: CAC
    downsideCase: $30K CAC as founder-led sales stays bespoke
    baseCase: $24K CAC
    upsideCase: $18K CAC，前提是转介绍驱动的共创客户获客模式跑顺
    y3RevenueImpactK: -19.0
    cashImpactK: -72.0
  - variable: churn
    downsideCase: 3.0% monthly churn after first annual renewals
    baseCase: 2.0% monthly churn
    upsideCase: 1.0% monthly churn
    y3RevenueImpactK: -14.0
    cashImpactK: -18.0
  - variable: sales cycle
    downsideCase: Pilot-to-production slips by one quarter
    baseCase: Current quarterly ramp
    upsideCase: Production conversion improves by one quarter
    y3RevenueImpactK: -31.0
    cashImpactK: -35.0
  - variable: gross margin
    downsideCase: 68% Y3 gross margin because implementations stay custom
    baseCase: 72% Y3 gross margin
    upsideCase: 75% Y3 gross margin with tighter templates
    y3RevenueImpactK: 0.0
    cashImpactK: -9.0
  - variable: hiring pace
    downsideCase: Second engineer and finance hire each happen one quarter earlier
    baseCase: Current hire plan
    upsideCase: Finance hire shifts post-Y3 and support stays founder-led
    y3RevenueImpactK: 0.0
    cashImpactK: -90.0
modelDiagram:
  title: 创业园区运营收入引擎
  mermaid: |
    flowchart LR
      Leads[合格园区开业线索] --> Pilots[付费 pilot]
      Pilots --> Production[生产园区]
      Production --> Subscription[按园区订阅收入]
      Production --> Premium[使用费与赞助分析收入]
      Subscription --> GrossProfit[毛利润]
      Premium --> GrossProfit
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: Revenue engine
    finding: 基准情景的收入，不是靠激进的按席位收费，而是靠在 Y3 Q4 跑到 15 个在用园区，每个园区约 $19K 的混合年 ARPU。
  - checkName: Must go right
    finding: 这个模型要求 pilot 到生产的转化，基本贴住商业计划目标，否则公司无法在不扩大销售团队的情况下，于 Y2 跑到 8-10 个在用点位。
  - checkName: Model breaks if
    finding: 如果 ARPU 掉到 $17K 左右，且在用园区停在 11 个附近，下行情景的现金低点会掉到约 $434K，公司也会继续被困在过窄的细分里。
  - checkName: Next-round proof
    finding: 下一轮融资成立的前提，是公司证明自己已经跑到 8-10 个生产园区、毛利率超过 70%，并且出现至少一个第二点位扩张或赞助模块增购动作。
sanityChecks:
  ruleOf40: Y3 增长率 108% + EBITDA 利润率 -243% = -135%；离规模效率还很远，只能作为 pre-scale 的验证型模型接受。
  burnMultiple: Y3 净消耗 $557K / 净新增 ARR $95K = 5.9x。
  revenuePerFte: Y3 每个 FTE 的确认收入约为 $33K（SaaS 基准通常为 $200-400K）；偏低，是因为模型有意停留在一个尚未放大的窄滩头市场里。
  flags:
    - 研究把初始第 3 年滩头市场定在约 $0.3M SOM，因此模型必须依赖相邻的孵化器、创新枢纽，或更高客单价的赞助模块，才能撑起风险投资式扩张。
    - 到 Y3 为止，每个 FTE 的收入仍显著低于软件行业基准，所以种子轮叙事必须押在工作流深度和品类扩张证明上，而不是近端效率。
    - 运营模型在前 36 个月默认没有真实 logo churn，尽管单位经济模型使用了 2.0% 月流失率；早期哪怕丢掉 1 个园区客户，回本周期和下一轮节奏都会明显恶化。
    - 到 Y3 为止 burn multiple 依然偏高，因为公司在一个仍然很小的园区客户基数上，提前投入了产品和部署能力。
