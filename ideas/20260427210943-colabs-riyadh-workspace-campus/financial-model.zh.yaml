scenarios:
  downside:
    description: 试点转化更慢，赞助方附加模块渗透率更低，使公司在核心园区细分停留更久。
    y3RevenueK: 147.34
    y3EbitdaK: -636.2
    cashLowPointK: 433.7
    keyAssumptionChanges:
      - 混合 ARPU 降至 $17K，因为赞助方分析采用率下滑。
      - 由于试点转正式部署的时间拉长，Y3 末正式运行园区数仅为 11 个，而不是 15 个。
      - 由于实施工作更重，Y3 毛利率维持在约 64%，而不是 72%。
  base:
    description: 创始人主导的启动场景销售在 Y3 Q4 转化为 15 个正式运行园区，并带来适度的用量增强型 ARPU。
    y3RevenueK: 228.79
    y3EbitdaK: -556.77
    cashLowPointK: 549.62
    keyAssumptionChanges:
      - 每个园区的混合 ARPU 为 $19K。
      - 正式运行园区数从 Y1 末的 3 个增长到 Y2 末的 10 个，再到 Y3 末的 15 个。
      - 随着部署标准化，毛利率从 Y1 的 66%-68% 提升到 Y3 的 72%。
  upside:
    description: 赞助方分析更早落地，而相邻生态型中心的需求在不显著增加招聘的情况下同时抬升 ARPU 和园区数量。
    y3RevenueK: 288.75
    y3EbitdaK: -504.6
    cashLowPointK: 624.98
    keyAssumptionChanges:
      - 由于高级模块更早被采用，混合 ARPU 提升到 $21K。
      - 借助更强的第二站点扩展和相邻中心扩张，正式运行园区在 Y3 Q4 达到 17 个。
      - 因为部署保持模板化，财务 / 运营岗位被推迟到年末招聘。
sensitivity:
  - variable: ARPU
    downsideCase: $17K 园区年度混合 ARPU
    baseCase: $19K 园区年度混合 ARPU
    upsideCase: $21K 园区年度混合 ARPU
    y3RevenueImpactK: -24.1
    cashImpactK: -43.0
  - variable: CAC
    downsideCase: $30K CAC，因为创始人主导销售仍然高度定制化
    baseCase: $24K CAC
    upsideCase: $18K CAC，得益于以推荐为主的共创客户打法
    y3RevenueImpactK: -19.0
    cashImpactK: -72.0
  - variable: churn
    downsideCase: 首次年度续约后月度流失率为 3.0%
    baseCase: 月度流失率 2.0%
    upsideCase: 月度流失率 1.0%
    y3RevenueImpactK: -14.0
    cashImpactK: -18.0
  - variable: 销售周期
    downsideCase: 试点到正式部署延后一整个季度
    baseCase: 当前季度爬坡
    upsideCase: 正式部署转化提前一个季度改善
    y3RevenueImpactK: -31.0
    cashImpactK: -35.0
  - variable: 毛利率
    downsideCase: Y3 毛利率为 68%，因为实施仍保持高度定制
    baseCase: Y3 毛利率 72%
    upsideCase: 借助更紧凑的模板，Y3 毛利率提升至 75%
    y3RevenueImpactK: 0.0
    cashImpactK: -9.0
  - variable: 招聘节奏
    downsideCase: 第二名工程师和财务招聘都各提前一个季度
    baseCase: 当前招聘计划
    upsideCase: 财务招聘推迟到 Y3 之后，支持工作继续由创始人承担
    y3RevenueImpactK: 0.0
    cashImpactK: -90.0
modelDiagram:
  title: 创业园区收入引擎
  mermaid: |
    flowchart LR
      Leads[合格的园区启动线索] --> Pilots[付费试点]
      Pilots --> Production[正式运行园区]
      Production --> Subscription[按园区订阅收入]
      Production --> Premium[用量与赞助方分析]
      Subscription --> GrossProfit[毛利润]
      Premium --> GrossProfit
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: 基础情景收入来自 Y3 Q4 达到 15 个正式运行园区、且每个园区混合 ARPU 约为 $19K，而不是依赖激进的按席位变现。
  - checkName: 必须成立的条件
    finding: 该模型要求试点转正式部署的效率接近 BP 目标，这样公司才能在不招聘更大销售团队的情况下，于 Y2 达到 8-10 个正式运行站点。
  - checkName: 模型会在哪些情况下失效
    finding: 如果 ARPU 下滑到接近 $17K，且正式运行园区停留在约 11 个，下行情景的最低现金会降至约 $434K，公司也会继续局限在过窄的细分里，难以高效迈向下一轮融资。
  - checkName: 下一轮融资证明点
    finding: 一旦公司展示出 8-10 个正式运行园区、70% 以上毛利率，以及至少一种第二站点或赞助方模块扩展路径，下一轮融资才更有说服力。
sanityChecks:
  ruleOf40: Y3 增长率 108% + EBITDA 利润率 -243% = -135%；距离规模效率仍很远，只能作为规模化前验证模型被接受。
  burnMultiple: Y3 净烧钱 $557K / 净新增 ARR $95K = 5.9x。
  revenuePerFte: Y3 每个 FTE 的已确认收入为 $33K（SaaS 基准通常为 $200-400K）；偏低是因为该模型有意停留在一个狭窄滩头市场的 pre-scale 阶段。
  flags:
    - 研究指出，初始 Y3 滩头市场 SOM 约为 $0.3M，因此模型依赖向相邻的孵化器、创新中心或高级赞助方模块扩展，才能支撑风险投资式增长。
    - 到 Y3 为止，每个 FTE 的收入都远低于软件公司基准，这意味着 seed 轮叙事必须更多强调工作流深度与品类扩张证明，而不是短期效率。
    - 运营模型假设前 36 个月没有实际发生 logo churn，尽管单位经济模型使用了 2.0% 的月度流失率；任何一个早期园区客户流失都会明显恶化回本周期和下一轮融资时点。
    - 由于公司在仍然较小的园区基数之前就先投入了产品和部署能力，Y3 之前 burn multiple 始终偏高。
