scenarios:
  downside:
    description: pilot 转正更慢、赞助商附加模块渗透更低，公司会在核心园区细分里停留更久。
    y3RevenueK: 147.34
    y3EbitdaK: -636.2
    cashLowPointK: 433.7
    keyAssumptionChanges:
      - 混合 ARPU 降到 $17K，因为赞助商分析模块采用率不及预期。
      - 由于 pilot 到 production 节奏被拉长，Y3 末活跃园区只有 11 个，而不是 15 个。
      - 因为实施工作更重，Y3 毛利率只能维持在约 64%，而不是 72%。
  base:
    description: 创始人主导的开业场景销售在 Q4Y3 转化为 15 个活跃园区，并带来适度的用量增强 ARPU。
    y3RevenueK: 228.79
    y3EbitdaK: -556.77
    cashLowPointK: 549.62
    keyAssumptionChanges:
      - 每园区混合 ARPU 为 $19K。
      - 活跃园区从 Y1 末的 3 个，增长到 Y2 末的 10 个，再到 Y3 末的 15 个。
      - 毛利率随着部署标准化，从 Y1 的 66%-68% 提升到 Y3 的 72%。
  upside:
    description: 赞助商分析更早落地，相邻枢纽需求也同步拉升 ARPU 和园区数，而无需显著提前扩张团队。
    y3RevenueK: 288.75
    y3EbitdaK: -504.6
    cashLowPointK: 624.98
    keyAssumptionChanges:
      - 由于高级模块更早被采用，混合 ARPU 提升到 $21K。
      - 借助更强的第二点位和相邻枢纽扩张，Q4Y3 的活跃园区达到 17 个。
      - 因部署保持模板化，财务 / 运营岗位可推迟到年末再招。
