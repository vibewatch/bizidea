competitors:
- name: OfficeRnD
  stage: scale-up
  wedge: Enterprise-ready coworking OS with multi-location workflows, analytics, branded apps, and AI lead handling.
  pricing: Tiered plans for 100 members/1 location, 200 members/2 locations, then custom scale plan; branded apps and AI sold as add-ons.
  strength: Strong integrations, analytics, multi-site packaging, and mature sales motion.
  weaknessVsUs: Centered on admin, sales, billing, and occupancy rather than sponsor programming, mentor matching, and warm-intro outcomes.
  sourceRefs:
  - 14
  - 15
  - 16
  - 17
  - 18
  - 19
- name: Nexudus
  stage: scale-up
  wedge: Global coworking platform with 3,000+ locations, strong automation, community features, and a broad integration ecosystem.
  pricing: Custom pricing by active users with included community modules and paid white-label app customization.
  strength: Category tenure, wide installed base, and credible automation plus community positioning.
  weaknessVsUs: Community tooling is broad but generic; it is not tailored to sponsor workflows, founder intros, or campus outcome analytics.
  sourceRefs:
  - 23
  - 24
  - 25
- name: Spacebring
  stage: scale-up
  wedge: Member-service-first coworking software with strong emphasis on onboarding, engagement, and branded digital experience.
  pricing: $186/month business plan for 100 MAUs and one location, plus usage-based add-ons and enterprise custom pricing.
  strength: Clear operator messaging around community experience, onboarding, chats, events, and retention.
  weaknessVsUs: Closer to the thesis than other incumbents, but still a general shared-space product rather than a startup-campus operating layer for intros and sponsor access.
  sourceRefs:
  - 26
  - 27
  - 28
- name: Cobot
  stage: incumbent
  wedge: Simple, transparent coworking platform with strong billing, booking, and API/integration basics for smaller operators.
  pricing: Custom member-based pricing with all features included; monetizes some external bookings and event transactions.
  strength: Ease of use, transparent packaging, and operator trust.
  weaknessVsUs: Less opinionated around programming, outcomes, and multi-stakeholder campus operations than the proposed startup.
  sourceRefs:
  - 29
