openQuestions:
- 'Which single workflow creates enough pain to win the first pilot: onboarding, mentor matching, event operations, sponsor office hours, or churn-risk tracking?'
- Will Saudi operators buy a layer above incumbent coworking software, or only during a full-system evaluation tied to a launch?
- Can sponsor and partner reporting unlock a second budget owner beyond workspace operations?
- How many Saudi and UAE operators are truly startup-campus style sites rather than generic serviced offices, and what is their realistic annual software budget?
