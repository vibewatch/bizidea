  validationPlan:
  - priority: high
    question: Will Saudi campus operators buy a community-ops layer on top of existing coworking software, or only replace their full system during launches?
    evidenceToGather: Interview 8-10 COOs or heads of community at Riyadh and Jeddah operators on current stack, renewal pain, and whether a layer product is easier to approve than a rip-and-replace.
  - priority: high
    question: 'Which workflow is painful enough to open the door first: mentor matching, event operations, sponsor office hours, or churn-risk tracking?'
    evidenceToGather: Shadow 3 community teams for one week each and quantify time spent per workflow plus where data is currently lost.
  - priority: medium
    question: Can sponsor-program reporting create a separate budget owner beyond workspace operations?
    evidenceToGather: Collect 5 examples of sponsor packages and ask operators what reporting they currently promise but cannot deliver consistently.
  - priority: medium
    question: How much localization is required for Saudi compliance and payments before pilots can go live?
    evidenceToGather: Map integration and compliance checklist with one Saudi operator, one payment provider, and one accounting/invoicing advisor.
