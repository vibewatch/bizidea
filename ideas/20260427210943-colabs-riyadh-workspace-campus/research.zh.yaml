    - 26
    - 29
  - case: 赞助商项目分析和多点位 rollout 成为运营经济模型的核心
    impact: '上行情形：因为产品更贴近留存和合作伙伴收入，而不仅是后台自动化，所以定价可以高于通用联合办公软件。'
    sourceRefs:
    - 1
    - 17
    - 18
    - 26
  - case: 创业公司在多年内都必须集成、而不是替代在位联合办公系统
    impact: '中性偏负：实施复杂度会上升，但“集成优先”的定位也能降低切换摩擦，加快 pilot 启动。'
    sourceRefs:
    - 19
    - 24
    - 29
  validationPlan:
  - priority: 高
    question: 沙特园区运营商会在现有联合办公软件之上购买一层社区运营产品，还是只会在开业时替换整套系统？
    evidenceToGather: 访谈利雅得和吉达 8-10 位 COO 或社区负责人，了解现有技术栈、续约痛点，以及“叠加层产品”是否比整套替换更容易获批。
  - priority: 高
    question: 哪一条工作流最痛，足以率先打开销售：导师撮合、活动运营、赞助商 office hours，还是流失风险追踪？
    evidenceToGather: 分别跟随 3 个社区团队各一周，量化各条工作流耗时，并找出数据目前最容易丢失的环节。
  - priority: 中
    question: 赞助商项目报告能否创造一个独立于办公空间运营之外的新预算拥有者？
    evidenceToGather: 收集 5 个赞助商套餐示例，并询问运营商当前承诺了哪些报告，但始终无法稳定交付。
  - priority: 中
    question: 在 pilot 上线前，沙特合规和支付本地化到底需要做到多深？
    evidenceToGather: 与 1 家沙特运营商、1 家支付服务商和 1 位会计/开票顾问一起梳理集成与合规清单。
