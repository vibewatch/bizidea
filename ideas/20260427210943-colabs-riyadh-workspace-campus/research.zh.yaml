  fiveForces:
    supplierPower:
      score: 3
      rationale: 创业公司会依赖支付、门禁以及现有联合办公系统集成，但这类供应商数量足够多；只要产品坚持集成优先，就不至于形成真正锁定。
      sourceRefs:
        - 19
        - 24
        - 29
    buyerPower:
      score: 4
      rationale: 初始买方池很小、集中度高，而且完全可以继续用人工加现有软件拖着不买，因此买方议价权很强。
      sourceRefs:
        - 9
        - 10
        - 11
        - 14
        - 22
        - 29
    threatOfEntrants:
      score: 3
      rationale: 基础工作流软件并不难做，但本地化集成、实施信任以及跨园区结果数据，会给后来者制造一定摩擦。
      sourceRefs:
        - 12
        - 13
        - 19
        - 24
    threatOfSubstitutes:
      score: 5
      rationale: 最强的替代品不是某一家公司，而是“现有联合办公软件 + 表格 + 消息工具 + 人工社群运营”的组合拳。
      sourceRefs:
        - 15
        - 19
        - 22
        - 24
        - 29
    competitiveRivalry:
      score: 4
      rationale: 通用现有厂商已经覆盖不少相邻工作，并持续补上分析、App、AI 和集成；即便它们还没把赞助项目和引荐工作流做到极致，竞争也不会轻。
      sourceRefs:
        - 14
        - 17
        - 18
        - 23
        - 24
        - 26
        - 29
  pestle:
    - factor: 政治
      impact: positive
      point: 沙特的政策导向和生态建设仍在持续把企业与创业基础设施往本土拉。
      sourceRefs:
        - 3
        - 4
        - 9
    - factor: 经济
      impact: positive
      point: 随着外来企业进入提速，利雅得和吉达的办公空间供给也在扩张，带来更复杂的运营点位。
      sourceRefs:
        - 1
        - 3
        - 4
        - 9
        - 10
        - 11
    - factor: 社会
      impact: positive
      point: 运营商越来越把社群和生态触达，当成产品本身的一部分来卖。
      sourceRefs:
        - 1
        - 2
        - 21
        - 27
    - factor: 技术
      impact: positive
      point: 现有厂商路线图已经明确表明，灵活办公运营对自动化、分析、品牌 App、集成和 AI 都有真实需求。
      sourceRefs:
        - 16
        - 17
        - 18
        - 19
        - 24
        - 29
    - factor: 法律
      impact: negative
      point: 沙特的数据保护与开票规则，会抬高本地化和数据治理要求。
      sourceRefs:
        - 12
        - 13
  adoptionFrictionMatrix:
    - friction: 要证明社群结果带来的 ROI，而不只是后台省人力
      severity: high
      affectedBuyer: COO / GM
      mitigation: 先打留存、赞助报表和开业就绪场景，这些都能在一个续约周期内被量化。
      sourceRefs:
        - 17
        - 21
        - 22
        - 28
    - friction: 必须接入现有联合办公、支付和门禁系统
      severity: medium
      affectedBuyer: Operations lead
      mitigation: 把自己定位成集成优先的一层，先把现有厂商连接器补齐，再谈整套替换。
      sourceRefs:
        - 19
        - 24
        - 29
    - friction: 沙特合规和本地化要求高
      severity: high
      affectedBuyer: Founder / GM
      mitigation: 尽早把电子发票兼容、数据治理控制和沙特特有的入驻实施手册做进产品与实施里。
      sourceRefs:
        - 5
        - 12
        - 13
    - friction: 已习惯 WhatsApp 和表格的社群团队需要改工作习惯
      severity: medium
      affectedBuyer: Head of community
      mitigation: 先从入驻或活动等单一工作流切入，把后续跟进自动化，而不是第一天就逼客户重做全流程。
      sourceRefs:
        - 21
        - 27
        - 28
