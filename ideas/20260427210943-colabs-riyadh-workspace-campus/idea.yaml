jobsToBeDone:
  - job: When we open or expand a startup campus, help our community team run programming and member follow-up in one system, so they can keep the campus full without scaling headcount linearly.
    currentAlternative: Spreadsheets, WhatsApp, and generic coworking software
    successMetric: Renewal rate and community-manager members-supported ratio
  - job: When sponsors or enterprise partners want access to our startup community, help us package and track introductions and events, so they can monetize community activity beyond rent.
    currentAlternative: Manual concierge work and ad hoc event tracking
    successMetric: Sponsor revenue and qualified introductions per program
