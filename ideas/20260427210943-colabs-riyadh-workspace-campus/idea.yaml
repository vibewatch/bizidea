problem: Riyadh flex workspace operators are no longer just renting desks; they are expected to run startup campuses with events, programming, and meaningful member connections. Generic coworking software handles billing and room booking, but it does not manage expert sessions, founder-intro workflows, sponsor programming, or renewal risk across mixed startup and enterprise members. As campuses get larger, teams fall back to WhatsApp, spreadsheets, and manual concierge work that is hard to scale or measure.
targetUser:
  primary: COOs and heads of community at GCC flex workspace operators running startup-focused campuses with 300+ active members
  secondary: Managers of incubators, innovation hubs, and university startup centers in Saudi Arabia
  buyer: COO, GM, or founder of a multi-site workspace operator
startupThesis:
  nonObviousInsight: The scarce asset in Riyadh is no longer square meters alone; it is the ability to turn a physical campus into a measurable network product. COLABS's launch shows the offer has shifted to workspace plus programming plus community, which creates a new software wedge above desk inventory and billing.
  beachhead: Riyadh and Jeddah operators with 1-3 startup-focused campuses, 300-1,500 active members, and regular event or mentor programming
  wedge: A campus operating system that automates member onboarding, event and mentor-session scheduling, warm-intro matching, sponsor programming, and renewal-risk tracking in one workflow
  whyNowCatalyst: COLABS's funded 4,000 sqm Riyadh launch shows operators are scaling campus footprints while selling community outcomes, creating urgency for software built for programmed startup spaces rather than generic coworking.
  ventureScalePath: Start with startup-campus operators in Saudi and the GCC, then expand into incubators, free zones, university innovation centers, and enterprise innovation hubs that all need to monetize space through member outcomes and partner programming.
solution: The product is a system of record for campus community operations, not just desks. It tracks who each member is, what stage they are in, what programs they joined, who they should meet next, and which activities correlate with renewals or upsells. Community managers get automation for event invites, mentor matching, sponsor office hours, and follow-up tasks, while operators get dashboards showing occupancy, participation, intro conversion, and churn risk by cohort. A sponsor layer lets campuses package curated access to startups for banks, telcos, and enterprise partners without running every program manually. Over time, the company builds a proprietary graph of member engagement and outcome benchmarks that becomes the operating layer for innovation-focused real estate.
goToMarketSeed:
  firstCustomer: A Riyadh workspace operator opening or expanding a 3,000+ sqm startup campus with private offices, fixed desks, and weekly founder programming
  buyingTrigger: A new campus launch or major expansion that forces the team to coordinate hundreds of members, events, and partner programs without adding large community headcount
  currentAlternative: Generic coworking software plus spreadsheets, WhatsApp groups, event tools, and manual community-manager workflows
  switchingReason: The first customer switches because this is the first product built for selling retention and network outcomes, not just seat inventory, and it can increase renewals and sponsor revenue without hiring a much larger ops team
  pricingHypothesis: Monthly SaaS fee per location plus usage-based pricing by active member or paid program seat, with premium modules for sponsor and intro analytics
