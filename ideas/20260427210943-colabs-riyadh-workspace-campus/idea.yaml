topRisks:
  - name: Niche market perception
    description: Investors may see startup-campus software as too small if it looks like a coworking point solution.
    mitigation: Start with startup campuses but expand the narrative and roadmap toward incubators, free zones, and enterprise innovation hubs that run similar workflows.
  - name: Incumbent feature creep
    description: Coworking management platforms could add lightweight community features and compress the wedge.
    mitigation: Focus on the harder workflow layer of intros, sponsor programs, and renewal analytics that generic billing-first tools do not model well.
  - name: Slow regional software budgets
    description: Some operators may still treat community ops as labor, not software, which can slow adoption.
    mitigation: Sell during campus launch or expansion with ROI tied to renewals, occupancy, and sponsor revenue rather than generic productivity claims.
