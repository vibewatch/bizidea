    - 39
  sensitivityCases:
  - case: Frontier APIs keep cutting cost without custom models
    impact: If batch, flex, and similar optimizations close enough of the margin gap, the startup must win on release speed, slice selection, and evidence rather than raw inference savings.
    sourceRefs:
    - 15
    - 16
    - 38
  - case: Category leaders internalize the full foundry
    impact: If Base44-class or Replit/Lovable-class platforms build their own closed loops quickly, the best path is to sell to the long tail of sub-scale vendors and vertical AI SaaS firms that lack dedicated ML platform teams.
    sourceRefs:
    - 1
    - 2
    - 6
    - 7
    - 9
    - 10
    - 11
  - case: Data-rights friction blocks model training
    impact: If customers refuse trace reuse without account-by-account controls, pilots may stall unless the product offers tenant isolation, opt-in governance, and clear deletion or export workflows from day one.
    sourceRefs:
    - 12
    - 20
    - 24
    - 25
    - 32
  validationPlan:
  - priority: high
    question: How many app-generation or workflow-AI vendors already exceed both the accepted-action volume and inference-spend thresholds in the beachhead?
    evidenceToGather: Ten to fifteen buyer interviews plus anonymized billing and traffic benchmarks from design partners.
  - priority: high
    question: Can the product prove a lower cost per accepted build action on one workflow slice within a six-week pilot?
    evidenceToGather: Side-by-side pilot results comparing baseline frontier API traffic against one distilled or rerouted slice.
  - priority: medium
    question: 'Which workflow slices distill best first: CRUD scaffolding, data extraction, UI modification, or exception handling?'
    evidenceToGather: Trace clustering across 5-8 design partners and eval baselines for each slice.
