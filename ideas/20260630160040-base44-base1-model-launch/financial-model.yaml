slug: trace-to-model-foundry
date: '2026-06-30'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: month
    source: '[BP date] The model starts in the first full month after the 2026-06-30 business-plan date.'
  - id: A2
    name: Opening cash after pre-seed close
    value: '2800'
    unit: usdK
    source: '[BP fundingAsk] Target range is $2.5-3.5M with 18 months runway; model uses a $2.8M close to fund the Y2 proof point plus a six-month buffer.'
  - id: A3
    name: Paid pilot pricing
    value: '18'
    unit: usdK per month for 2 months
    source: '[BP investorMemo.initialContract] A $30-50K six-week paid pilot is modeled as $36K across two billed months.'
  - id: A4
    name: Initial production contract
    value: '12'
    unit: usdK per month
    source: '[BP investorMemo.initialContract] The production contract is modeled at $144K ARR, inside the stated $100-150K annual range before further usage expansion.'
  - id: A5
    name: Expanded production revenue
    value: '18'
    unit: usdK per month
    source: '[BP businessModel.expansionLevers + research.market.som] A second slice plus usage lifts mature logos to $216K ARR, still below the economics of the $75K-per-month-inference ICP.'
  - id: A6
    name: Pilot-to-production conversion
    value: '55'
    unit: percent
    source: '[BP gtm.funnelTargets] Base case uses conversion slightly above the 50%+ target.'
  - id: A7
    name: Second-slice expansion timing
    value: '6'
    unit: months after production go-live
    source: '[BP gtm.funnelTargets] Production-to-second-slice within six months is the operating target, so expansion pricing begins after six production months.'
  - id: A8
    name: Customer start schedule
    value: M3, M6, M8, M10, M14, M16, M19, M21, M23, M26, M28, M29, M31, M32, M33, M34, M35, M36
    unit: month index
    source: '[BP milestones + BP sequencingRationale] Founder-led sales stays narrow in Y1, then scales only after two production wins and repeatable onboarding evidence.'
  - id: A9
    name: Exit paying logos
    value: Y1 4, Y2 9, Y3 18
    unit: customers
    source: '[BP milestones] Matches 2 production wins in Y1, 8-10 production customers in Y2, and 15-20 production customers by Y3.'
  - id: A10
    name: COGS and gross-margin ramp
    value: Early pilot months at 58-55% COGS, Y2 quarters at 38/36/33/30% COGS, Y3 exits at 27% COGS
    unit: percent of revenue
    source: '[BP businessModel.targetGrossMarginPct + BP operatingAssumptions] Early delivery is implementation-heavy, then connector reuse and standard governance move the model above the 70% gross-margin target by Y3.'
  - id: A11
    name: Monthly customer churn
    value: '1.5'
    unit: percent
    source: '[Startup finance heuristic: early enterprise AI infrastructure] Churn is low because contracts are workflow-critical, but still reflects concentrated-logo risk.'
  - id: A12
    name: Blended CAC per production logo
    value: '95'
    unit: usdK
    source: '[BP gtm channels + startup finance heuristic] Founder-led outbound, pilot travel, and security diligence create a high-touch but still venture-viable enterprise CAC.'
  - id: A13
    name: Leadership loaded annual cash compensation
    value: '150'
    unit: usdK per year
    source: '[Startup finance heuristic: lean U.S. pre-seed AI infra] Founder cash pay stays below market while the round is pre-seed.'
  - id: A14
    name: Engineering loaded annual cash compensation
    value: '180'
    unit: usdK per year
    source: '[Startup finance heuristic: lean U.S. pre-seed AI infra] Used for founding and later platform engineers.'
  - id: A15
    name: Applied ML loaded annual cash compensation
    value: '190'
    unit: usdK per year
    source: '[Startup finance heuristic: lean U.S. pre-seed AI infra] Reflects a senior applied-ML cash package with startup discount to full market.'
  - id: A16
    name: Solutions loaded annual cash compensation
    value: '150'
    unit: usdK per year
    source: '[Startup finance heuristic: lean U.S. pre-seed AI infra] Solutions hires are essential for onboarding and security review, but cash pay remains below late-stage market levels.'
  - id: A17
    name: Sales loaded annual cash compensation
    value: '170'
    unit: usdK per year
    source: '[Startup finance heuristic: early enterprise software] Sales stays light until repeatable pilot-to-production motion is proven.'
  - id: A18
    name: G&A loaded annual cash compensation
    value: '130'
    unit: usdK per year
    source: '[Startup finance heuristic: lean startup operations] Covers finance, vendor, and compliance support once procurement volume rises.'
  - id: A19
    name: Hiring sequence
    value: Solutions M4, seller M10, engineer M13, second solutions M18, G&A M22, second seller M27, second applied-ML M31, third engineer M34
    unit: timing
    source: '[BP team + BP sequencingRationale] Product and delivery hires land before the broader GTM ramp.'
  - id: A20
    name: Non-payroll sales and marketing spend ramp
    value: 6-10 per month in Y1, 9-14 in Y2, 16-22 in Y3
    unit: usdK per month
    source: '[BP gtm channels + startup finance heuristic] Founder-led outbound, partner travel, and design-partner selling scale modestly, not as a broad paid-acquisition engine.'
  - id: A21
    name: Non-payroll R&D stack ramp
    value: 12-15 per month in Y1, 16-20 in Y2, 21-24 in Y3
    unit: usdK per month
    source: '[BP product + BP operations + startup finance heuristic] Covers cloud compute, observability, evaluation tooling, and security software for repeated shadow testing.'
  - id: A22
    name: Non-payroll G&A spend ramp
    value: 9-12 per month in Y1, 13-16 in Y2, 17-20 in Y3
    unit: usdK per month
    source: '[BP risks + BP operations + startup finance heuristic] Legal review, insurance, audit prep, and procurement paperwork rise as enterprise deployments increase.'
  - id: A23
    name: Next-round milestone
    value: 9 production customers, 3 workflow families, connector-based onboarding, and second-slice expansion in at least half of production accounts
    unit: milestone
    source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary] This is the proof package the pre-seed must finance before a seed round.'
  - id: A24
    name: Cash conversion convention
    value: EBITDA approximates operating cash flow
    unit: policy
    source: '[Modeling heuristic] No debt, capex, taxes, or material working-capital timing differences are modeled at this stage.'
  - id: A25
    name: Base enterprise sales cycle
    value: '6'
    unit: months
    source: '[BP market.buyingProcess + startup finance heuristic] VP Engineering and CTO buyers can move faster than classic CIO sales, but procurement and data-rights review still add meaningful delay.'
