    baseCase: CAC stays at $95K.
    upsideCase: CAC falls to $80K through partner referrals.
    y3RevenueImpactK: 0.0
    cashImpactK: -140.0
  - variable: churn
    downsideCase: Monthly churn rises to 2.5% as early logos test in-house alternatives.
    baseCase: Monthly churn stays at 1.5%.
    upsideCase: Monthly churn falls to 1.0% after second-slice adoption.
    y3RevenueImpactK: -150.0
    cashImpactK: -180.0
  - variable: sales cycle
    downsideCase: Procurement slips later deals by about 2 months.
    baseCase: Average cycle stays near 6 months.
    upsideCase: Partner intros pull several closes forward by about 1 month.
    y3RevenueImpactK: -574.0
    cashImpactK: -673.0
  - variable: gross margin
