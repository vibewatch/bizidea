modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionLogos
      ProductionLogos --> ExpandedSlices
      ExpandedSlices --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> EBITDA
      EBITDA --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: The base case gets to $2.6M of Y3 revenue by converting a narrow founder-led pipeline into 18 paying logos that step from $36K pilots to $144-216K annual contracts.
  - checkName: Must go right
    finding: Pilot conversion has to stay above the BP floor and second-slice expansion has to happen inside six months or the model misses both Y2 milestones and Y3 margin improvement.
  - checkName: Model breaks if
    finding: A roughly two-month sales-cycle slip is the biggest cash risk because it pushes downside cash to near zero even before any extra hiring or margin pressure.
  - checkName: Next-round proof
    finding: The seed case is late-Y2 proof of 9 production customers, 3 repeatable workflow families, and second-slice adoption in at least half of production accounts.
sanityChecks:
  ruleOf40: Y3 growth 102% + EBITDA margin -17% = 85%.
  burnMultiple: Y2 burn multiple is about 0.9x and Y3 burn multiple improves to about 0.3x as incremental gross profit outgrows net burn.
  revenuePerFte: $235K Y3 revenue per Q4Y3 FTE (benchmark roughly $200-400K SaaS).
  flags:
    - The model still relies on a small number of high-value enterprise logos, so any ICP overestimate materially hits both revenue and fundraising timing.
    - Gross margin only clears the 70% target if onboarding becomes connector-led rather than drifting into a services-heavy implementation motion.
    - EBITDA remains negative through Y3, so the next round must be won on milestone proof and burn efficiency rather than profitability.
