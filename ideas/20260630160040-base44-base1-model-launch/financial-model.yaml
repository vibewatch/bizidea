scenarios:
  downside:
    description: Procurement and data-rights review delay later closes by about two months, expansion lands at only $192K ARR, and gross margin exits a few points lower.
    y3RevenueK: 2012.0
    y3EbitdaK: -912.9
    cashLowPointK: 7.6
    keyAssumptionChanges:
      - Later customer starts slip by roughly two months and Y3 exits at 14 paying logos instead of 18.
      - Expanded revenue steps to $16K MRR instead of $18K MRR.
      - COGS runs about 3 points higher than base because services and custom onboarding stay elevated.
  base:
    description: Base case keeps founder-led selling narrow, converts just above the BP floor, and reaches 18 paying logos by Q4Y3.
    y3RevenueK: 2586.0
    y3EbitdaK: -437.9
    cashLowPointK: 680.3
    keyAssumptionChanges:
      - Paid pilot stays at $36K over two billed months.
      - Initial production lands at $144K ARR and expands to $216K ARR after a second slice.
      - Gross margin improves to about 72% in Y3 as connectors and governance workflows are reused.
  upside:
    description: Partner-sourced demand pulls several closes forward, second-slice expansion is stronger, and automation trims COGS one point below base.
    y3RevenueK: 2953.0
    y3EbitdaK: -143.9
    cashLowPointK: 1037.1
    keyAssumptionChanges:
      - Several post-M10 closes pull forward by roughly one month and Y3 exits at 20 paying logos.
      - Expanded revenue reaches $19K MRR as more accounts add a second slice sooner.
      - COGS runs about 1 point below base because connector reuse lowers delivery overhead.
