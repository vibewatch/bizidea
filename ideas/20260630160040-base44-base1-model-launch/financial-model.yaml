  - variable: hiring pace
    downsideCase: The second seller and second applied-ML hire are pulled forward one quarter.
    baseCase: Hiring follows the staged plan.
    upsideCase: Late Y3 hires move one quarter later if onboarding is more automated.
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
  - variable: pilot conversion
