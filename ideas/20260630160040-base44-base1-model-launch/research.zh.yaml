    - 20
    - 32
    - 35
    - 39
  sensitivityCases:
  - case: 前沿 API 在无需自定义模型的情况下持续降价
    impact: 若批处理、弹性推理等优化足以填补足够多的利润差距，创业公司就必须靠发布速度、切片选择和实证，而非单纯的推理节约来赢得市场。
    sourceRefs:
    - 15
    - 16
    - 38
  - case: 品类领头者将完整铸造能力内化
    impact: 若 Base44 级别或 Replit/Lovable 级别的平台迅速构建起自己的闭环，最佳路径是向规模不足、缺乏专职 ML 平台团队的长尾厂商和垂直 AI SaaS 公司销售。
    sourceRefs:
    - 1
    - 2
    - 6
    - 7
    - 9
    - 10
    - 11
  - case: 数据权属摩擦阻断模型训练
    impact: 若客户在逐账户控制到位之前拒绝追踪数据复用，除非产品从第一天起就提供租户隔离、主动授权治理和明确的删除或导出工作流，否则试点可能停滞。
    sourceRefs:
    - 12
    - 20
    - 24
    - 25
    - 32
  validationPlan:
  - priority: high
    question: 有多少应用生成或工作流 AI 厂商已同时超过滩头市场中已接受操作量和推理开销两项门槛？
    evidenceToGather: 十至十五次买家访谈，加上共创客户提供的匿名账单和流量基准数据。
  - priority: high
    question: 产品能否在六周试点内证明一个工作流切片的每条已接受构建操作成本更低？
    evidenceToGather: 对比基准前沿 API 流量与一个蒸馏或重路由切片的并排试点结果。
  - priority: medium
    question: "哪些工作流切片最先蒸馏效果最好：CRUD 脚手架、数据提取、UI 修改，还是异常处理？"
    evidenceToGather: 跨 5 至 8 个共创客户的追踪聚类及每个切片的评测基线。
