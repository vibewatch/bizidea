slug: trace-to-model-foundry
date: '2026-06-30'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-07
    unit: month
    source: '[BP date] 模型从 2026-06-30 商业计划日期后的第一个完整月份开始。'
  - id: A2
    name: 种子前轮融资到账后初始现金
    value: '2800'
    unit: usdK
    source: '[BP fundingAsk] 目标融资区间 $2.5–3.5M，资金跑道 18 个月；模型采用 $2.8M 到账，为 Y2 验证点加六个月缓冲期提供资金。'
  - id: A3
    name: 付费试点定价
    value: '18'
    unit: usdK per month for 2 months
    source: '[BP investorMemo.initialContract] $30–50k 的六周付费试点按两个计费月建模为 $36k。'
  - id: A4
    name: 初始生产合同
    value: '12'
    unit: usdK per month
    source: '[BP investorMemo.initialContract] 生产合同建模为 $144k ARR，位于声明的 $100–150k 年度区间内，尚未计入后续用量扩展。'
  - id: A5
    name: 扩展后生产收入
    value: '18'
    unit: usdK per month
    source: '[BP businessModel.expansionLevers + research.market.som] 第二切片加用量费将成熟客户提升至 $216k ARR，仍低于月推理开销 $75k 的 ICP 经济模型。'
  - id: A6
    name: 试点到生产的转化率
    value: '55'
    unit: percent
    source: '[BP gtm.funnelTargets] 基准情景采用略高于 50%+ 目标的转化率。'
  - id: A7
    name: 第二切片扩展时机
    value: '6'
    unit: months after production go-live
    source: '[BP gtm.funnelTargets] 生产上线后六个月内进入第二切片是运营目标，因此扩展定价从生产第六个月后开始计算。'
  - id: A8
    name: 客户启动时间表
    value: M3, M6, M8, M10, M14, M16, M19, M21, M23, M26, M28, M29, M31, M32, M33, M34, M35, M36
    unit: month index
    source: '[BP milestones + BP sequencingRationale] Y1 创始人主导销售保持精简，仅在两次生产上线和可重复入职证据出现后才扩大规模。'
  - id: A9
    name: 期末付费客户数
    value: Y1 4, Y2 9, Y3 18
    unit: customers
    source: '[BP milestones] 与 Y1 两次生产上线、Y2 8–10 个生产客户、Y3 15–20 个生产客户的目标一致。'
  - id: A10
    name: COGS 与毛利率爬坡
    value: 早期试点阶段 COGS 占收入 58–55%，Y2 各季度降至 38/36/33/30%，Y3 期末降至 27%
    unit: percent of revenue
    source: '[BP businessModel.targetGrossMarginPct + BP operatingAssumptions] 早期交付以实施为主，连接器复用和标准化治理流程推动模型在 Y3 超过 70% 毛利率目标。'
  - id: A11
    name: 月客户流失率
    value: '1.5'
    unit: percent
    source: '[Startup finance heuristic: early enterprise AI infrastructure] 合同与工作流强绑定，流失率低，但仍反映客户集中风险。'
  - id: A12
    name: 每个生产客户的混合 CAC
    value: '95'
    unit: usdK
    source: '[BP gtm channels + startup finance heuristic] 创始人主导的主动出击、试点出差和安全尽调产生高触达但仍具风险投资可行性的企业 CAC。'
  - id: A13
    name: 管理层含税年度现金薪酬
    value: '150'
    unit: usdK per year
    source: '[Startup finance heuristic: lean U.S. pre-seed AI infra] 融资轮次为种子前轮期间创始人现金薪酬低于市场水平。'
  - id: A14
    name: 工程含税年度现金薪酬
    value: '180'
    unit: usdK per year
    source: '[Startup finance heuristic: lean U.S. pre-seed AI infra] 适用于创始工程师及后期平台工程师。'
  - id: A15
    name: 应用 ML 含税年度现金薪酬
    value: '190'
    unit: usdK per year
    source: '[Startup finance heuristic: lean U.S. pre-seed AI infra] 反映高级应用 ML 岗位以创业折扣计算的现金薪酬包。'
  - id: A16
    name: 解决方案含税年度现金薪酬
    value: '150'
    unit: usdK per year
    source: '[Startup finance heuristic: lean U.S. pre-seed AI infra] 解决方案岗位对入职和安全审查至关重要，但现金薪酬仍低于成熟期市场水平。'
  - id: A17
    name: 销售含税年度现金薪酬
    value: '170'
    unit: usdK per year
    source: '[Startup finance heuristic: early enterprise software] 在可重复的试点到生产动作验证之前保持销售团队精简。'
  - id: A18
    name: 综合行政含税年度现金薪酬
    value: '130'
    unit: usdK per year
    source: '[Startup finance heuristic: lean startup operations] 覆盖采购量增加后的财务、供应商和合规支持。'
  - id: A19
    name: 招聘时间表
    value: 解决方案工程师 M4、销售 M10、工程师 M13、第二位解决方案工程师 M18、综合行政 M22、第二位销售 M27、第二位应用 ML M31、第三位工程师 M34
    unit: timing
    source: '[BP team + BP sequencingRationale] 产品和交付岗位在更宽泛的 GTM 扩大之前到位。'
  - id: A20
    name: 非薪酬销售与营销开销爬坡
    value: Y1 每月 6–10，Y2 每月 9–14，Y3 每月 16–22
    unit: usdK per month
    source: '[BP gtm channels + startup finance heuristic] 创始人主导的主动出击、合作伙伴出差和共创客户销售规模适度增长，不作为广泛付费获客引擎。'
  - id: A21
    name: 非薪酬研发技术栈开销爬坡
    value: Y1 每月 12–15，Y2 每月 16–20，Y3 每月 21–24
    unit: usdK per month
    source: '[BP product + BP operations + startup finance heuristic] 覆盖云算力、可观测性、评测工具及用于重复影子测试的安全软件。'
  - id: A22
    name: 非薪酬综合行政开销爬坡
    value: Y1 每月 9–12，Y2 每月 13–16，Y3 每月 17–20
    unit: usdK per month
    source: '[BP risks + BP operations + startup finance heuristic] 随企业部署增加，法律审查、保险、审计准备和采购文书工作相应上升。'
  - id: A23
    name: 下一轮里程碑
    value: 9 个生产客户、3 个工作流族、基于连接器的入职流程，以及至少一半生产账户完成第二切片扩展
    unit: milestone
    source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary] 这是种子前轮必须资助到位、才能支撑种子轮的验证包。'
  - id: A24
    name: 现金转化惯例
    value: EBITDA 近似等于经营性现金流
    unit: policy
    source: '[Modeling heuristic] 当前阶段不建模债务、资本支出、税款或重大营运资金时序差异。'
  - id: A25
    name: 基准企业销售周期
    value: '6'
    unit: months
    source: '[BP market.buyingProcess + startup finance heuristic] 工程副总裁和 CTO 买家的决策速度快于传统 CIO 销售，但采购和数据权审查仍带来可观延迟。'
