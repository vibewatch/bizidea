scenarios:
  downside:
    description: 采购和数据权审查将后续签约推迟约两个月，扩展收入仅达到 $192k ARR，毛利率期末水平低几个百分点。
    y3RevenueK: 2012.0
    y3EbitdaK: -912.9
    cashLowPointK: 7.6
    keyAssumptionChanges:
      - 后期客户启动推迟约两个月，Y3 期末付费客户为 14 个而非 18 个。
      - 扩展收入 MRR 降至 $16k 而非 $18k。
      - COGS 比基准高约 3 个百分点，因为服务和自定义入职持续偏重。
  base:
    description: 基准情景保持创始人主导销售精简，以略高于商业计划底线的转化率完成销售，Y3 Q4 末达到 18 个付费客户。
    y3RevenueK: 2586.0
    y3EbitdaK: -437.9
    cashLowPointK: 680.3
    keyAssumptionChanges:
      - 付费试点维持两个计费月 $36k。
      - 初始生产合同 $144k ARR，第二切片后扩展至 $216k ARR。
      - Y3 毛利率随连接器和治理流程复用改善至约 72%。
  upside:
    description: 合作伙伴来源的需求将几笔签约提前，第二切片扩展势头更强，自动化将 COGS 再压低一个百分点。
    y3RevenueK: 2953.0
    y3EbitdaK: -143.9
    cashLowPointK: 1037.1
    keyAssumptionChanges:
      - M10 后几笔签约提前约一个月，Y3 期末付费客户为 20 个。
      - 更多账户更早增加第二切片，扩展收入 MRR 达到 $19k。
      - 连接器复用降低交付开销，COGS 比基准低约 1 个百分点。
sensitivity:
  - variable: ARPU
    downsideCase: 扩展客户 MRR 停滞在 $16k。
    baseCase: 扩展客户 MRR 达到 $18k。
    upsideCase: 扩展客户 MRR 达到 $19k。
    y3RevenueImpactK: -288.0
    cashImpactK: -204.0
  - variable: CAC
    downsideCase: CAC 升至 $115k，因试点需要更多创始人时间和出差。
    baseCase: CAC 维持 $95k。
    upsideCase: CAC 通过合作伙伴转介降至 $80k。
    y3RevenueImpactK: 0.0
    cashImpactK: -140.0
  - variable: 客户流失率
    downsideCase: 早期客户测试内部替代方案，月流失率升至 2.5%。
    baseCase: 月流失率维持 1.5%。
    upsideCase: 第二切片采用后月流失率降至 1.0%。
    y3RevenueImpactK: -150.0
    cashImpactK: -180.0
  - variable: 销售周期
    downsideCase: 采购将后期签约推迟约 2 个月。
    baseCase: 平均销售周期维持约 6 个月。
    upsideCase: 合作伙伴介绍将几笔签约提前约 1 个月。
    y3RevenueImpactK: -574.0
    cashImpactK: -673.0
  - variable: 毛利率
    downsideCase: Y3 期末毛利率约 68%。
    baseCase: Y3 期末毛利率约 72%。
    upsideCase: Y3 期末毛利率约 73%。
    y3RevenueImpactK: 0.0
    cashImpactK: -155.0
  - variable: 招聘节奏
    downsideCase: 第二位销售和第二位应用 ML 提前一个季度入职。
    baseCase: 招聘按分阶段计划执行。
    upsideCase: 若入职自动化程度更高，Y3 后期招聘推迟一个季度。
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
  - variable: 试点转化率
    downsideCase: 试点到生产转化率降至 40%。
    baseCase: 试点到生产转化率维持 55%。
    upsideCase: 试点到生产转化率升至 65%。
    y3RevenueImpactK: -320.0
    cashImpactK: -360.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionLogos
      ProductionLogos --> ExpandedSlices
      ExpandedSlices --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> EBITDA
      EBITDA --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景通过把精简的创始人主导管道转化为 18 个付费客户（从 $36k 试点逐步升至 $144–216k 年度合同），在 Y3 实现 $2.6M 收入。
  - checkName: 必须走对的事
    finding: 试点转化率必须保持在商业计划底线以上，第二切片扩展必须在六个月内发生——否则模型将同时错过 Y2 里程碑和 Y3 利润率改善。
  - checkName: 模型失效情形
    finding: 约两个月的销售周期延误是最大的现金风险——即便没有额外招聘或利润率压力，下行情景现金也会逼近零。
  - checkName: 下一轮验证条件
    finding: 种子轮条件是 Y2 末证明 9 个生产客户、3 个可重复工作流族，以及至少一半生产账户完成第二切片采用。
sanityChecks:
  ruleOf40: Y3 增长率 102% + EBITDA 利润率 -17% = 85%。
  burnMultiple: Y2 净消耗倍数约 0.9x，Y3 随增量毛利超过净消耗改善至约 0.3x。
  revenuePerFte: Y3 Q4 FTE 人均收入 $235k（SaaS 行业基准约 $200–400k）。
  flags:
    - 模型仍依赖少数高价值企业客户，ICP 高估将直接冲击收入和融资节奏。
    - 只有入职转变为连接器主导而非漂移成重服务实施模式，毛利率才能超过 70% 目标。
    - EBITDA 在 Y3 全程为负，因此下一轮融资必须靠里程碑验证和消耗效率而非盈利能力来赢得。
