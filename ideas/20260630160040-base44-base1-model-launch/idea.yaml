topRisks:
  - name: Customers delay model ownership
    description: >-
      Some AI vendors may keep renting frontier models longer than expected and postpone proprietary-model work until they are larger.
    mitigation: >-
      Sell the first deployment around one high-spend workflow slice with immediate cost and acceptance-rate proof, so value appears before a full self-hosting roadmap exists.
  - name: Data-rights friction slows adoption
    description: >-
      Enterprise customers may object if vendors cannot clearly explain how workflow traces are redacted, permissioned, and separated before training.
    mitigation: >-
      Keep raw traces tenant-scoped, ship redaction plus opt-in policy controls, and support dedicated training environments for sensitive accounts.
  - name: Frontier models narrow the gap
    description: >-
      Rapid improvements from general-purpose model vendors could reduce the visible quality advantage of a proprietary task model on some workflows.
    mitigation: >-
      Focus on slices where latency, cost, and accepted-action accuracy can be benchmarked weekly, and position the product as the release and economics layer even when customers keep some frontier traffic.
