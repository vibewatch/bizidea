jobsToBeDone:
  - job: >-
      When inference bills spike and board scrutiny increases, help an app-platform AI team identify which workflow slices can move to a proprietary task model, so they can improve gross margin without slowing product growth.
    currentAlternative: Internal analysis across prompt logs, cost dashboards, notebooks, and generic observability tools.
    successMetric: Gross-margin improvement and validated cost per successful build action.
  - job: >-
      When product teams collect thousands of accepted user corrections, help them convert those traces into safe evals and release decisions, so they can ship a differentiated model without building an ML platform from scratch.
    currentAlternative: Ad hoc fine-tuning experiments, spreadsheet evals, and MLOps contractors.
    successMetric: Time from trace collection to promoted workflow model and acceptance-rate lift on the targeted slice.
