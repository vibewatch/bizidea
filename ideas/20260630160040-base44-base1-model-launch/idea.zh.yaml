jobsToBeDone:
  - job: >-
      当推理账单飙升、董事会审查趋严时，帮助应用平台 AI 团队找出哪些工作流切片可以迁移到专有任务模型，从而改善毛利而不拖慢产品增长。
    currentAlternative: 跨提示日志、成本仪表盘、笔记本和通用可观测性工具的内部分析。
    successMetric: 毛利改善幅度和每条成功构建操作的经验证成本。
  - job: >-
      当产品团队积累了数千条已接受的用户纠错时，帮助他们把这些追踪转化为安全的评测集和发布决策，从而在不从零搭建 ML 平台的情况下发布差异化模型。
    currentAlternative: 临时微调实验、电子表格评测和 MLOps 合同工。
    successMetric: 从追踪收集到专有工作流模型上线的时间，以及目标切片的接受率提升。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      该集群基于官方和独立的发布报道，包含生产使用量、交互规模和 ARR 等具体事实，信号强度高于推测性融资传言。
  painIntensity:
    score: 4
    rationale: >-
      对有一定用量的 AI 应用厂商而言，推理成本高涨、通用模型表现欠佳和可防御性质疑会同时冲击营收质量和毛利。
  wedgeClarity:
    score: 5
    rationale: >-
      追踪转模型铸造平台是一个聚焦、具体的首款产品，有明确买家、明显触发器，以及围绕成本和接受率的可衡量成功指标。
  defensibility:
    score: 4
    rationale: >-
      工作流追踪模式、评测历史和发布结果随时间复利积累，形成粘性数据和深度集成，即便底层模型持续商品化也难以复制。
  ventureScale:
    score: 4
    rationale: >-
      滩头市场聚焦，但同一套蒸馏层可扩展到众多 AI 软件品类——凡是生产纠错能转化为专有任务模型的地方都能复用。
topRisks:
  - name: 客户推迟自研模型
    description: >-
      部分 AI 厂商可能比预期更长时间地选择租用前沿模型，把专有模型工作推迟到规模更大之后。
    mitigation: >-
      首次部署锁定一个高开销工作流切片，快速给出成本和接受率改善的实证，让价值在完整自托管路线图成形之前就先落地。
  - name: 数据权属摩擦拖慢采用
    description: >-
      企业客户可能对厂商无法清楚说明工作流追踪数据在训练前如何脱敏、如何授权、如何隔离提出异议。
    mitigation: >-
      原始追踪按租户隔离，上线脱敏和主动授权策略控制，并为敏感账户支持独立训练环境。
  - name: 前沿模型缩小差距
    description: >-
      通用模型厂商的快速迭代可能削弱专有任务模型在某些工作流上的质量优势。
    mitigation: >-
      聚焦延迟、成本和已接受操作准确率可按周对标验收的切片，并将产品定位为发布和经济性治理层——即便客户保留部分前沿流量也一样有价值。
