problem: >-
  AI 应用生成厂商调用前沿 API 可以快速上线，但一旦用量增长，每一条被接受的用户纠错都在证明通用模型仍然错过了工作流细节，每一次推理请求都在侵蚀毛利。大多数团队手里有提示日志和可观测性仪表盘，却没有一套能把已接受的构建操作、被拒输出和运行时结果转化为训练级数据集、评测集和安全发布决策的系统。结果是许多厂商被困在昂贵的"提示包装器"里，只有头部玩家才有资源搭建真正的工作流模型平台。
targetUser:
  primary: >-
    在 A 轮至 C 轮融资的应用生成平台担任工程副总裁、应用 AI 负责人或 ML 平台创始人，平台主要向金融和运营团队售卖自然语言内部软件。
  secondary: >-
    负责生成工作流产品接受率、延迟和毛利的产品经理及模型运营工程师。
  buyer: 工程副总裁或 CTO
startupThesis:
  nonObviousInsight: >-
    氛围编程的持久护城河不会来自更好看的提示框——谁能最高效地把已接受的工作流编辑转化为专有任务模型并安全上线，谁就拿到护城河。
  beachhead: >-
    A 轮至 C 轮融资、向金融和运营组织销售 CRM 自动化、报表和异常处理应用生成的自然语言内部软件平台——用户每周产生 25,000+ 条已接受构建操作，厂商每月推理开销已超过 $75k。
  wedge: >-
    一套追踪转模型铸造平台，接入已接受的构建操作和运行时结果，自动生成工作流评测套件、候选适配器及安全路由策略，优先处理最先能迁离前沿模型的切片。
  whyNowCatalyst: >-
    Base44 推出 Base1 表明应用生成厂商已越过临界点：生产交互量和推理开销的规模让专有工作流模型从"美好愿景"变成了迫在眉睫的经济诉求。
  ventureScalePath: >-
    从内部软件和应用生成平台起步，再扩展到支持、金融、合规、运营等垂直 AI SaaS 品类——这些领域的已接受纠错和运行时追踪同样可以驱动跨数千个工作流的专有任务模型。
solution: >-
  产品接入自然语言软件平台的提示日志、代码差异和执行遥测，按工作流类型对已接受构建追踪聚类，剥离租户敏感信息，然后为每个任务切片自动生成评测集和候选适配器或路由策略。应用 AI 团队可以在真实流量上影子测试这些候选方案，比较成本和接受率提升，只推进同时在质量和经济性上均优于前沿模型的切片。最终结果是：不用从零搭建内部 ML 平台，就能从工作流遥测走到可防御的专有模型。
goToMarketSeed:
  firstCustomer: >-
    40 至 150 人规模的应用生成平台的工程副总裁或应用 AI 负责人，拥有 3 至 10 个企业客户、每周 25,000+ 条已接受构建操作，且下轮融资前有董事会压力要改善毛利。
  buyingTrigger: >-
    月推理开销超过 $75k、企业续约时被问及专有工作流性能，或融资准备阶段可防御性和利润率成为尽职调查议题。
  currentAlternative: >-
    自研方案——产品日志 + LangSmith 式可观测性 + 电子表格评测 + 偶尔外包的 MLOps 合同工。
  switchingReason: >-
    数周而非数季度内就能跑通一套蒸馏循环，并能证明哪些工作流切片可以迁离前沿 API 而不损失接受率。
  pricingHypothesis: >-
    年度平台费加按每百万条追踪事件计费或按经验证的推理成本节约分成两种方式之一。
