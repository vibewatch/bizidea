scenarios:
  downside:
    description: Consent coverage stays patchy, procurement stretches, and the company exits year 3 below the target live-bank count with services-heavy onboarding still dragging margin.
    y3RevenueK: 2100.0
    y3EbitdaK: -945.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - Recurring value falls from $138K to about $120K per live bank.
    - Gross margin stalls near 65% instead of reaching 70%.
    - Sales cycle stretches from about 9 months to 12 months.
    - Q4Y3 live-bank count ends near 22 instead of 30.
  base:
    description: The base case converts early pilots in one maturity workflow, reaches 10 live banks by the end of Y2, and finishes Y3 with 30 live banks while Q4 turns EBITDA positive.
    y3RevenueK: 2893.0
    y3EbitdaK: -298.8
    cashLowPointK: 719.3
    keyAssumptionChanges:
    - Recurring value stays at about $138K per live bank with a $15K conversion implementation fee.
    - Gross margin reaches the BP target neighborhood and exits Y3 at 70%.
    - Sales cycle holds near 9 months as references and partners improve win-rate efficiency.
    - Q4Y3 live-bank count reaches 30, which matches the BP and research SOM framing.
  upside:
    description: Reference customers, reusable integrations, and second-workflow add-ons pull forward partner-led wins and turn the business EBITDA-positive earlier in Y3.
    y3RevenueK: 3650.0
    y3EbitdaK: 250.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
    - Recurring value rises from $138K to about $150K as analytics and adjacent workflows attach earlier.
    - Gross margin improves from 70% to about 72% as onboarding and compliance packets standardize faster.
    - Sales cycle compresses from about 9 months to 7 months.
    - Q4Y3 live-bank count rises to roughly 34.
