slug: cd-renewal-save-os
date: '2026-06-16'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: Starts the first full month after the 2026-06-16 business-plan date.
- id: A2
  name: Starting paying banks (M1)
  value: '0'
  unit: count
  source: '[BP milestones] The plan starts before any paid pilot is signed, so M1 begins with zero paying banks.'
- id: A3
  name: Production subscription value
  value: $138.0K ARR per live bank
  unit: usdK_per_year
  source: '[BP investorMemo.firstCustomer.initialContract; BP market.som; research.market.som] The BP conversion band is roughly $90K-$140K ARR and the research SOM uses about $140K blended ACV, so the base model uses $138K recurring value per live production bank.'
- id: A4
  name: Paid pilot pricing
  value: $10.0K per month for a 3-month pilot
  unit: usdK_per_customer_month
  source: '[BP investorMemo.firstCustomer.initialContract; BP gtm.pricing] This spreads the BP''s $25K-$40K fixed-scope pilot into an 8-12 week revenue shape that stays inside the stated pilot price band.'
- id: A5
  name: Implementation fee on conversion
  value: $15.0K one-time when a pilot converts
  unit: usdK_per_customer
  source: '[BP investorMemo.firstCustomer.initialContract; BP businessModel.revenueStreams] The BP explicitly includes implementation fees beside recurring subscription revenue.'
- id: A6
  name: Customer ramp
  value: 4 active banks by M12, 10 by Q4Y2, and 30 by Q4Y3
  unit: customers
  source: '[BP milestones; BP market.som; research.market.som] The ramp matches the BP path from 2+ paid pilots in year 1 to 8-12 live banks in months 12-24 and 25-30 live banks by months 24-36.'
- id: A7
  name: Pilot-to-production conversion timing
  value: Base-case pilot cohorts convert after about 3 months once renewal-lift thresholds are met
  unit: months
  source: '[BP investorMemo.firstCustomer.initialContract; BP milestones] The BP frames the initial contract as an 8-12 week pilot and requires at least 3 pilot conversions before scaled expansion.'
- id: A8
  name: Gross margin ramp
  value: 45%-55% in Y1, 60%-67% in Y2, and 68%-70% in Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct; BP strategicChoices.sequencingRationale; research.reportMemo.regulatoryLandscape] Early bank onboarding and compliance support keep margins below target at first, then margin approaches the BP''s 70% goal as flat-file onboarding and TPRM artifacts standardize.'
- id: A9
  name: Monthly churn
  value: 0.8%
  unit: percent
  source: Startup-finance heuristic for sticky enterprise workflow software sold into regulated banks, moderated upward for early-product and procurement risk.
- id: A10
  name: Fully loaded CAC
  value: $140.0K per production bank
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; BP risks; research.reportMemo.distributionChannels] Community-bank sales require founder time, travel, procurement support, partner enablement, and security diligence, so CAC is modeled above mid-market SaaS norms.'
- id: A11
  name: Loaded salary bands
  value: Sales/GTM $150K; engineering $185K; product/implementation $165K; compliance/solutions $165K; G&A/ops $120K
  unit: usdK_per_fte_year
  source: Startup-finance heuristic for U.S. pre-seed and seed-stage enterprise software hiring, anchored to the role mix in [BP team].
- id: A12
  name: Headcount ramp snapshots
  value: Engineering 1/1/1/1/2/3; product/implementation 1/1/1/1/1/2; compliance/solutions 1/1/1/1/1/1; sales/GTM 1/1/1/2/3/4; G&A/ops 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale; BP milestones] The base case follows the BP sequence: build the workflow and compliance layer first, then add measured GTM capacity after pilots and references exist.'
- id: A13
  name: Starting cash after pre-seed close
  value: $3.0M
  unit: usdM
  source: '[BP fundingAsk] The BP asks for $2.5M-$3.5M pre-seed funding; the model uses the midpoint-high case because the company must fund compliance, implementation, and long sales cycles before partner leverage arrives.'
- id: A14
  name: Functional non-salary opex budgets
  value: Y1 non-salary opex of $26K-$43K per month; Y2 non-salary opex of $114K-$140K per quarter; Y3 non-salary opex of $146K-$170K per quarter
  unit: usdK
  source: Startup-finance heuristic for a bank-software startup with travel, cloud tooling, messaging/voice infrastructure, legal review, and vendor-risk packaging layered on top of the BP headcount plan.
- id: A15
  name: Quarterly payroll smoothing
  value: Y2 and Y3 salary lines use actual hire months rather than stepping only at year-end snapshots
  unit: method
  source: '[Financial Modeler instructions; BP team] This keeps the salary line tied to real hiring timing while still honoring the required snapshot headcount columns.'
- id: A16
  name: Partner and reference leverage
  value: Roughly one-quarter of new wins by late Y2 and about one-third by Y3 come through partner or reference-driven selling
  unit: percent_of_new_customers
  source: '[BP milestones; BP gtm.channels; research.reportMemo.partnershipEcosystem] The BP expects co-sell and implementation partners to matter once the first compliance-ready deployments exist.'
- id: A17
  name: Cash conversion simplification
  value: Ending cash rolls from EBITDA only, with no debt, tax, or capex lines
  unit: method
  source: Startup-finance heuristic for an asset-light software company where working-capital swings are small relative to operating burn.
- id: A18
  name: Downside scenario deltas
  value: $120K recurring value, 65% gross margin, 12-month sales cycle, and 22 live banks by Q4Y3
  unit: scenario_inputs
  source: '[BP risks; research.reportMemo.sensitivityCases; research.categoryDynamics.headwinds] The downside reflects consent friction, procurement delay, and incumbent overlap persisting longer than planned.'
- id: A19
  name: Upside scenario deltas
  value: $150K recurring value, 72% gross margin, 7-month sales cycle, and 34 live banks by Q4Y3
  unit: scenario_inputs
  source: '[BP market.som; BP milestones; BP businessModel.expansionLevers] The upside assumes reference banks pull forward partner-led wins and adjacent workflow modules lift blended value per bank.'
