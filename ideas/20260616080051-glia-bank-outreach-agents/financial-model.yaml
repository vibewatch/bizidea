modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Maturities[Target maturity waves] --> Pilots[Paid pilots]
      Pilots --> Banks[Production banks]
      Banks --> Revenue[Recurring revenue + implementation]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash after opex]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by reaching 30 live banks by Q4Y3 at roughly $138K recurring value per bank plus small conversion fees, which lifts Y3 recognized revenue to about $2.9M.
- checkName: Must go right
  finding: Pilot-to-production conversion and partner-assisted customer adds have to work because the model relies more on live-bank count than on aggressive price expansion.
- checkName: Model breaks if
  finding: The model deteriorates fastest if the sales cycle stretches toward 12 months or consent coverage falls below the BP threshold because that pushes both revenue timing and cash toward the downside case.
- checkName: Next-round proof
  finding: The next round is justified once the company shows 8-10 live banks, two reusable integrations, and repeatable compliance-ready deployments inside the pre-seed runway.
sanityChecks:
  ruleOf40: Y3 growth 172.2% + EBITDA margin -10.3% = 161.8%.
  burnMultiple: Using year-end live-bank ARR proxy, Y2 burn multiple is about 1.2x on roughly $0.83M net new ARR; Y3 improves to about 0.1x on roughly $2.76M net new ARR.
  revenuePerFte: $263K Y3 using $2.89M revenue and 11 year-end FTE (benchmark $200–400K SaaS).
  flags:
  - The beachhead is intentionally narrow, so even the base case depends on a relatively small set of large community-bank buyers by Y3.
  - The model assumes partner and reference leverage starts to matter after the first 8-10 live banks; if that motion underperforms, CAC and the sales cycle likely drift toward the downside case.
  - Consent hygiene and bank diligence are still the hardest operational risks, and either one can slow both pilot starts and pilot-to-production conversion.
