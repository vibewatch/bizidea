topRisks:
  - name: "Core-data integration friction"
    description: "Deployment can stall if banks cannot easily expose maturity events, customer preferences, and banker routing rules."
    mitigation: "Start with flat-file and CRM ingest for one deposit portfolio, then add real-time core integrations after proving renewal lift."
  - name: "Compliance and customer-trust risk"
    description: "Banks may worry AI-led outreach will mishandle regulated language or frustrate long-time customers."
    mitigation: "Use approved scripts, constrained offers, opt-out controls, and instant human handoff on objection or exception paths."
  - name: "Incumbent channel-stack overlap"
    description: "Contact-center vendors or Glia-like incumbents may add basic deposit-retention playbooks once the wedge is visible."
    mitigation: "Own the bank-specific event scoring, renewal outcome benchmarks, and branch handoff workflow instead of competing on commodity voice or SMS infrastructure."
