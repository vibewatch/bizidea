problem: >-
  Community banks still run CD maturities and related deposit-save workflows out of core exports, predictive dialers, and
  branch call trees. Because as many as 80 percent of outbound calls go unanswered or to voicemail, frontline teams burn
  time on low-yield outreach while high-value balances quietly mature out. The result is preventable deposit runoff,
  inconsistent follow-up, and no clean handoff when a customer is finally ready to talk.
targetUser:
  primary: >-
    Retail deposit operations leaders at U.S. community banks with 10-80 branches that manage CD renewal outreach centrally
    or through branch teams
  secondary: >-
    Branch banking and customer-retention managers responsible for maturing retail deposits and banker follow-up queues
  buyer: "Chief Retail Banking Officer, Head of Deposits, or EVP of Consumer Banking"
startupThesis:
  nonObviousInsight: >-
    The valuable wedge is not another generic bank voice bot; it is the operating system that turns maturing-deposit events
    into prioritized save playbooks, lets AI handle the first 80 percent of unreachable or low-intent contacts, and routes
    only live retention moments to human bankers with full context. Once outbound AI is good enough to talk, the scarce
    layer becomes event selection, offer guardrails, objection taxonomy, and branch handoff logic tied to deposit economics.
  beachhead: >-
    U.S. community banks with $1B-$10B in assets, 15-75 branches, and at least 500 monthly retail CD maturities that are
    still worked through core exports, predictive dialers, and manual banker follow-up
  wedge: >-
    A CD renewal save OS that scores maturing accounts for runoff risk, launches AI voice and SMS renewal conversations,
    captures objections and retention intent, and hands interested customers to the right banker with approved offers and
    conversation history
  whyNowCatalyst: >-
    Glia's launch and more-than-700-institution footprint show community financial institutions are ready to buy AI for
    proactive deposit and payment outreach, making CD-renewal rescue a newly budgetable workflow.
  ventureScalePath: >-
    Start with CD maturities, then expand into money-market balance defense, dormant-account reactivation, new-account
    follow-up, loan-payment reminders, and early-stage collections as the system of record for event-driven customer
    outreach in community finance.
solution: >-
  The product plugs into the bank's core, CRM, and contact-center stack to create a rolling queue of maturing accounts and
  recommended save actions. It uses balance, tenure, branch relationship, and recent interaction data to decide which
  households deserve AI outreach, which should go straight to a banker, and which can receive low-cost reminders. The AI
  agent handles voice and SMS conversations around maturity dates, answers common renewal questions, records objections such
  as rate shopping or liquidity needs, and schedules banker callbacks when a customer shows intent or asks for an
  exception. Managers get dashboards on connect rate, renewal rate, retained balances, and common save blockers, turning
  what is now an opaque branch task into a measurable retention engine. Over time, the startup learns which talk tracks,
  offers, and handoff timing save the most balances for each bank segment.
goToMarketSeed:
  firstCustomer: >-
    A $2B-$8B asset U.S. community bank with 20-60 branches, a centralized deposit team, and recurring monthly CD runoff
    because branch staff cannot manually reach every maturing household
  buyingTrigger: >-
    A quarter with rising CD runoff, a board mandate to defend deposits without adding branch headcount, or a seasonal
    maturity wave that overwhelms manual renewal calling
  currentAlternative: >-
    Core-system export lists, branch spreadsheets, predictive dialers, generic CRM campaigns, and manual banker callbacks
  switchingReason: >-
    The first customer switches because this wedge reaches more maturing households at lower labor cost, preserves
    high-trust banker involvement for live save conversations, and creates measurable renewal and retained-balance reporting
    that manual outreach cannot
  pricingHypothesis: >-
    Annual platform fee priced by monthly maturing-account volume and number of enabled branches, with premium modules for
    banker handoff workflows and retained-balance analytics
