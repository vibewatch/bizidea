jobsToBeDone:
  - job: >-
      When a wave of retail CDs is nearing maturity, help our deposit team reach the right households, handle first-touch
      renewal questions automatically, and route only live save opportunities to bankers, so we can keep balances without
      adding calling headcount.
    currentAlternative: "Manual branch call lists, predictive dialers, and generic CRM reminders"
    successMetric: "Renewal rate, retained deposit balance, and banker time per saved account"
  - job: >-
      When renewal runoff rises, help our retail leadership understand which objections, offers, and banker handoffs
      actually save deposits, so we can improve the next maturity cycle instead of guessing from call notes.
    currentAlternative: "Spreadsheet tracking, ad hoc call notes, and post-hoc branch manager reviews"
    successMetric: "Runoff reduction by maturity cohort and percentage of contacts with structured outcome data"
