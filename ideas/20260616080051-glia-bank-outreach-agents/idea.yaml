differentiator: >-
  This is not generic campaign software, a CCaaS dialer, or a bank-wide chatbot. The defensible asset is the deposit-save
  playbook graph: which maturity events deserve AI outreach, which objections correlate with runoff, which offers are
  allowed by product and branch policy, and when a human banker should take over. That graph compounds into bank-specific
  retention benchmarks and conversation intelligence that broad contact-center vendors and generic AI agents will struggle
  to match.
