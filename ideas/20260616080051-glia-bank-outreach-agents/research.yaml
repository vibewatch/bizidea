  validationPlan:
  - priority: high
    question: How many monthly retail CD maturities and runoff-risk households exist at a typical 20-60-office bank?
    evidenceToGather: One quarter of maturity-export data and saved-vs-runoff outcomes from 3-5 design partners.
  - priority: high
    question: What share of target households already have valid mobile consent and do-not-call-clean records for outreach?
    evidenceToGather: Contact-consent audit across voice and SMS channels for the first two pilot banks.
  - priority: medium
    question: Do buyers want an overlay that sits beside the existing contact-center stack, or a deeper module inside a broader vendor relationship?
    evidenceToGather: Procurement interviews with banks already running Glia, Eltropy, Posh, Kasisto, or Talkdesk-style tooling.
