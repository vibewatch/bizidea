openQuestions:
- What share of the 204 tight-fit banks already have auditable mobile consent and do-not-call-clean data for CD outreach?
- How many monthly retail CD maturities and live-save escalations does a typical 20-60-office community bank actually process?
- Will buyers prefer a narrow overlay beside Glia/Eltropy/Talkdesk-style tooling or expect the workflow to live inside an existing suite?
- How much renewal-rate lift or retained-balance lift is required before a bank will approve a six-figure annual workflow budget?
