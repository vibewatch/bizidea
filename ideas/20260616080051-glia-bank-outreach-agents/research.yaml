reportMemo:
  executiveTakeaways:
  - 'This is a real but finite beachhead: live FDIC queries show 423 active institutions in the $1B-$10B asset / 15-75 office band and 306 FDIC-defined community banks inside it, so the CD-renewal wedge is viable but not a giant standalone market unless the product expands into adjacent outreach workflows [1][2][3].'
  - 'Deposit defense is a board issue, not a back-office nuisance: FDIC documented a 4.8% industry deposit decline from June 2022 to June 2023, money market funds now hold $7.87T, and community bankers rank core deposit growth near the top of their external risks [6][8][9][11][14].'
  - Competitive intensity is already moderate-high because Glia now markets named AI Outreach for CD renewals, while Eltropy, Posh, Kasisto, and broad CCaaS vendors all sell overlapping banking AI layers [15][20][21][23][25][27][40].
  - 'Execution risk is front-loaded into compliance and procurement: AI-generated voice calls to cell phones require prior express consent under the FCC''s 2024 ruling, and banks will subject any vendor to formal third-party, model-risk, and due-diligence reviews [28][29][30][31][32][34][36].'
  - 'The wedge should be sold as retained-balance and labor-leverage software, not generic call-center AI: Glia''s public pricing stance and a community-bank case study claiming $162k in overflow savings show budget exists when the ROI case is tied to saved deposits and banker capacity [16][19].'
  marketDefinition: 'This market is the operating layer between a bank''s maturity data and its frontline bankers: software that turns CD maturity events into ranked save queues, launches compliant AI voice and SMS conversations, captures objections, and routes only live retention moments to a human banker. It overlaps contact-center AI and CRM campaign tools, but the economically relevant wedge is narrower and tied to retained balances rather than generic service automation [1][4][15][18].'
  customerAndBuyer: The economic buyer is usually the Chief Retail Banking Officer, Head of Deposits, or EVP of Consumer Banking at a branch-heavy community bank. Daily users are deposit operations managers, branch leaders, and contact-center supervisors who currently juggle maturity lists, rate exceptions, and callback queues while deposit pricing stays under executive scrutiny [9][11][12][15].
  buyingTriggers:
  - point: A quarter of elevated CD repricing pressure or visible runoff makes deposit defense an executive priority.
    sourceRefs:
    - 5
    - 11
    - 14
  - point: Seasonal maturity waves overwhelm manual calling, especially when vendors can credibly argue that many predictive-dialer attempts never reach a live customer.
    sourceRefs:
    - 15
    - 19
    - 20
  - point: Recent exams or board reviews focused on liquidity and funding stability make auditable outreach software easier to justify.
    sourceRefs:
    - 12
    - 13
    - 28
    - 29
  willingnessToPay:
    summary: Budget is likeliest when the product is framed as deposit defense plus labor leverage. Glia's public pricing page emphasizes fixed-price, unlimited-usage economics rather than seat caps, and its community-bank case study claims $162k in overflow savings with 62% fewer calls handled by agents. That suggests buyers can justify a meaningful workflow budget if renewal lift is measurable [16][19].
    sourceRefs:
    - 16
    - 19
  competitiveLandscape: The field splits into banking-native AI suites (Glia, Eltropy), voice or digital assistants (Posh, Kasisto), and broader CCaaS stacks such as Talkdesk. Most incumbents sell omnichannel automation or member-service AI; the whitespace is a deposit-economics layer that decides which maturity events deserve AI, which offers are allowed, and when a banker should intervene [15][17][18][21][23][25][27].
  incumbentThesis:
  - incumbentClass: Banking-native AI suites
    point: Glia and Eltropy already own broad conversational and workflow surfaces inside community finance, but their public positioning is wider than a CD-specific retained-balance operating system.
    sourceRefs:
    - 15
    - 21
    - 22
  - incumbentClass: Voice and digital assistants
    point: Posh and Kasisto prove that banks will buy banking-native AI assistants, yet their strongest public proof points still skew toward inbound service, self-service, and generalized assistance rather than deposit-save orchestration.
    sourceRefs:
    - 23
    - 24
    - 25
    - 26
  - incumbentClass: CCaaS platforms
    point: Talkdesk and similar suites can supply omnichannel automation and routing, but they are generic platforms first and community-bank deposit specialists second.
    sourceRefs:
    - 27
    - 16
  - incumbentClass: Core, CRM, and manual branch workflows
    point: The default substitute remains export lists, rate sheets, and banker callbacks because those tools already sit next to the deposit data, even though they do not create a measurable renewal-optimization loop.
    sourceRefs:
    - 4
    - 9
    - 11
  regulatoryLandscape: U.S. bank deployment requires two approvals in parallel. First, the bank must clear third-party risk, fintech due diligence, and model-risk governance under interagency, OCC, and Federal Reserve guidance [28][29][30][34][36]. Second, the workflow itself must satisfy TCPA consent, do-not-call, and audit requirements for automated voice and SMS contact [31][32][33]. These are manageable but they lengthen pilots and favor vendors with pre-built compliance artifacts.
  technologyLandscape: 'The enabling stack already exists: Glia, Posh, Kasisto, and Talkdesk all prove that banking-specific voice or conversational AI can sit on top of contact-center and core ecosystems, while CSA''s 2026 survey shows financial institutions moving from experimentation to AI-agent deployment [17][23][25][26][27][38]. The technical differentiation is less about raw speech synthesis and more about maturity-event scoring, approved-offer routing, and preserving full context during banker handoff [15][18][19].'
  distributionChannels:
  - point: Direct executive sales into deposit pricing, runoff, and liquidity reviews is the clearest initial motion.
    sourceRefs:
    - 11
    - 12
    - 14
  - point: Partner or co-sell motions with core, digital-banking, and contact-center ecosystems matter because buyers want fit inside existing stacks.
