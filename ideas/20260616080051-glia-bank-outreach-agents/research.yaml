competitors:
- name: Glia
  stage: scale-up
  wedge: Banking-native AI outreach and unified interaction management, now explicitly packaged around deposits, CD renewals, and voice/SMS banker handoff.
  pricing: Fixed-price, unlimited-usage model; public numeric pricing not disclosed.
  strength: Most direct competitor with a named CD-renewal workflow, broad banking integrations, and funding scale.
  weaknessVsUs: Public positioning is broader than a deposit-save operating system, leaving room for deeper maturity scoring, offer guardrails, and retained-balance analytics.
  sourceRefs:
  - 15
  - 16
  - 17
  - 18
  - 19
  - 20
  - 40
- name: Eltropy
  stage: scale-up
  wedge: Community-finance relationship platform spanning text, voice, video, chat, and automation.
  pricing: Custom enterprise pricing; public numeric pricing not disclosed.
  strength: Deep installed-base advantage in community banks and credit unions plus growing security partnerships.
  weaknessVsUs: Its public narrative is a broad communications platform, not a CD-maturity save operating layer with deposit-specific economics.
  sourceRefs:
  - 21
  - 22
- name: Posh AI
  stage: scale-up
  wedge: Banking-native voice assistant and call-center AI for customer conversations and QA.
  pricing: Custom enterprise pricing; public numeric pricing not disclosed.
  strength: Strong voice UX and banking-specific conversation design with proof points on reducing call load.
  weaknessVsUs: Public proof skews toward inbound service and call-center productivity rather than proactive maturity-event prioritization.
  sourceRefs:
  - 23
  - 24
- name: Kasisto
  stage: scale-up
  wedge: Digital and conversational AI platform for banks and credit unions with pre-integrated core and digital-banking partners.
  pricing: Custom enterprise pricing; public numeric pricing not disclosed.
  strength: Clear community-bank focus and attractive integration story with NCR, FIS, and Q2 ecosystems.
  weaknessVsUs: The product is positioned as a general AI platform rather than a narrow retained-deposit workflow with banker save logic.
  sourceRefs:
  - 25
  - 26
- name: Talkdesk Financial Services
  stage: incumbent
  wedge: Broad banking contact-center platform with AI-powered automation and omnichannel service.
  pricing: Custom enterprise CCaaS pricing; public numeric pricing not disclosed.
  strength: Enterprise-grade CCaaS capabilities and credible banking vertical packaging.
  weaknessVsUs: Generic platform and implementation-heavy motion are less tailored to the economics and workflow detail of CD renewal rescue.
  sourceRefs:
  - 27
