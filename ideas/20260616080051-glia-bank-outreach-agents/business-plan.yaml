slug: cd-renewal-save-os
date: "2026-06-16"
executiveSummary: >-
  This company should start as a CD renewal save operating system for U.S.
  community banks that lose retail deposits because manual maturity outreach
  does not reach enough households. The right first customer is a $2B-$8B
  asset bank with 20-60 branches, a centralized deposit team, and 500 or more
  monthly retail CD maturities still worked through core exports and banker
  callbacks. The MVP should stay narrow: ingest maturity files, screen for
  consent, prioritize runoff risk, run AI SMS and opt-in voice outreach, and
  hand live save moments to bankers with approved offers and full context.
  Research supports the urgency because deposit pricing and liquidity remain
  board-visible issues, manual outreach underperforms, and Glia's public
  launch shows buyers now budget proactive outreach. The same research also
  says the wedge is finite and crowded, with only a few hundred ideal buyers
  and direct overlap from Glia, Eltropy, and broader CX suites. That means the
  company must sell retained-balance lift and banker-capacity leverage, not
  generic conversational AI, and must coexist with incumbent channel stacks
  rather than replacing them. The first 12 months need to prove three things
  that public sources do not: banks will buy a narrow overlay, consent-clean
  records are broad enough to support automation, and pilots can lift renewal
  outcomes enough to justify roughly $90k-$140k annual spend. If those proofs
  land, the expansion path into money-market balance defense, new-account
  follow-up, and payment reminders can turn a finite wedge into a broader
  event-driven outreach platform for community finance.
problem:
  - "Community banks still manage CD maturities from core exports, spreadsheets, predictive dialers, and branch call trees, so high-value accounts often mature out before anyone reaches them."
  - "Deposit leaders face board and examiner pressure on funding stability, but manual branch outreach does not prioritize runoff risk or show which offers and handoffs actually retain balances."
  - "Generic CRM or contact-center tools can send messages, but they do not encode bank-specific offer guardrails, objection capture, or banker escalation around deposit economics."
solution:
  - "Create a rolling maturity queue that ranks accounts by runoff risk, consent status, balance, and relationship context before any outreach starts."
  - "Use AI SMS and opt-in voice to handle first-touch renewal conversations, capture objections, and route live save moments to the right banker with approved next steps and full context."
  - "Give managers cohort-level reporting on connect rate, renewal rate, retained balances, and banker touches so each maturity cycle improves instead of resetting to ad hoc call lists."
whyWeWin:
  - "The product is a deposit-economics layer rather than a generic outreach tool, with differentiation in event scoring, offer guardrails, banker handoff logic, and retained-balance analytics."
  - "A flat-file and CRM-overlay deployment model can prove ROI faster than a rip-and-replace contact-center sale, which matches community-bank procurement reality."
  - "Each live campaign compounds a proprietary dataset on runoff risk, objections, approved offers, and banker-efficiency benchmarks that broader suites do not centralize today."
strategicChoices:
  beachhead: >-
    U.S. community banks with $2B-$8B in assets, 20-60 branches, centralized
    retail deposit operations, and recurring monthly CD maturity volume that is
    still worked through exports and banker callbacks.
  wedgeRationale: >-
    CD renewal rescue is the fastest proof point because the buyer already
    feels runoff pain, the trigger is tied to a visible maturity wave, and the
    workflow can be measured on retained balances within one cycle. Selling a
    broader outreach suite would increase integration scope, widen the
    competitive set, and delay proof until after the company has neither data
    nor trust.
  sequencingRationale: >-
    Start with flat-file or CRM ingest, consent screening, SMS-first outreach,
    opt-in voice for callable cohorts, and banker handoff on one CD portfolio.
    Only after 3-5 production banks prove retained-balance lift should the
    roadmap add deeper core integrations, benchmark products, and adjacent
    outreach workflows, because compliance review, hiring needs, and partner
    motions all get heavier as scope expands.
  notYet:
    - "Money-market balance defense as the initial sale"
    - "Loan-payment reminders or early-stage collections before CD renewal proof exists"
    - "Rip-and-replace contact-center or CRM positioning"
    - "Credit unions or non-U.S. institutions as the primary launch segment"
market:
  tam: "$50.8M estimated TAM from 423 active U.S. institutions in the $1B-$10B asset and 15-75 office band at roughly $120k annual workflow spend."
  sam: "$25.7M estimated SAM from about 214 operational-fit community banks inside the broader 306-bank segment at the same modeled spend."
  som: "$4.2M year-3 SOM based on 30 live customers in the tighter $2B-$8B and 20-60 office cohort at about $140k blended ACV."
  segments:
    - "Primary: U.S. community banks with $2B-$8B in assets, 20-60 branches, and centralized retail CD renewal teams."
    - "Secondary: Community banks and credit unions already running broader AI or CCaaS stacks but lacking deposit-specific event scoring and banker handoff logic."
  buyingProcess: >-
    The sale starts when a Head of Deposits or Chief Retail Banking Officer
    sees elevated runoff or an upcoming maturity wave and needs a defensible
    plan before the next ALCO, board, or exam discussion. Deposit operations
    and branch leaders shape the workflow, while CIO, compliance, and
    procurement teams run third-party, model-risk, and TCPA diligence before
    pilot approval.
product:
  mvp: >-
    A thin overlay that ingests maturity exports or CRM lists, audits consent,
    ranks accounts by runoff risk, launches SMS and opt-in voice conversations,
    and hands qualified save moments to bankers with approved offers and full
    history. It should prove one bank can retain more balances and cut banker
    touches per saved account without replacing its channel stack.
  sixMonth: >-
    Launch 2-3 paid pilots with flat-file ingest, consent screening, SMS-first
    outreach, banker work queues, objection capture, and retained-balance
    dashboards for one CD portfolio per bank.
  twelveMonth: >-
    Convert at least 3 pilots to production, add 2 common core or CRM
    integrations, enable voice for consent-clean cohorts, and ship benchmark
    reporting by cohort, objection, offer, and banker handoff outcome.
  twentyFourMonth: >-
    Expand into money-market balance defense and new-account follow-up only
    after CD renewal playbooks, compliance artifacts, and deployment speed are
    repeatable across 8-12 production banks.
  keyBets:
    - "Banks will buy a deposit-specific overlay beside existing suites or manual workflows if the first contract is tied to one maturity program."
    - "Consent-clean SMS and voice coverage is sufficient to automate first touch for a meaningful share of maturing households."
    - "Retained-balance lift and banker-time savings matter more to buyers than raw automation rate."
    - "Benchmark data on objections, offers, and handoff timing becomes more defensible than telephony features alone."
gtm:
  wedge: "Sell a retained-balance pilot around one upcoming CD maturity wave, not a general AI outreach platform."
  channels:
    - "Founder-led sales to Heads of Deposits, Chief Retail Banking Officers, and retail-banking executives"
    - "Design-partner pilots tied to maturity waves, runoff spikes, or deposit-defense initiatives"
    - "Co-sell with core, CRM, and contact-center integrators that already serve community banks"
  funnelTargets: "Target account→qualified discovery 25-35%, qualified discovery→paid pilot 20-30%, paid pilot→annual production 50%+, production bank→second workflow expansion within 12 months 40%+."
  pricing: >-
    Start with a fixed-scope maturity-wave pilot, then convert to an annual
    subscription priced by monthly maturing-account volume and enabled
    branches, with premium analytics and additional workflow modules. This
    keeps the first contract tied to retained balances and predictable
    banker-capacity savings, which research suggests is more buyable than
    per-seat or pure usage pricing.
businessModel:
  revenueStreams:
    - "Fixed-scope maturity-wave pilot and implementation fees"
    - "Annual CD renewal workflow subscription priced by maturing-account band and enabled branches"
    - "Premium retained-balance analytics and benchmark reporting"
    - "Additional workflow modules for adjacent deposit or payment outreach"
  unitOfValue: "Maturing retail deposit accounts managed through an active save workflow, anchored to enabled branches."
  targetGrossMarginPct: 70
  expansionLevers:
    - "Expand from one CD portfolio to all retail deposit branches inside the same bank"
    - "Add money-market balance defense, dormant-account reactivation, and new-account follow-up"
    - "Add payment reminders or early-stage collections after compliance playbooks mature"
    - "Sell benchmark, governance, and analytics modules across multiple institutions or partner channels"
strategyMap:
  northStarMetric: "Annualized retained maturing-deposit balance influenced by production AI-to-banker save workflows."
  inputMetrics:
    - "Percent of targeted maturities with consent-clean contact coverage"
    - "Connect rate by channel for targeted maturity cohorts"
    - "Renewal-rate or retained-balance lift versus baseline cohorts"
    - "Banker touches per saved account"
    - "Days from data receipt to first live outreach"
    - "Paid pilot to annual production conversion rate"
  moatsToBuild:
    - "Bank-specific runoff-risk models tied to maturity cohort, relationship depth, and outcome history"
    - "Objection, approved-offer, and banker-handoff graph by bank segment"
    - "Cross-bank benchmarks on connect rate, renewal lift, and banker-efficiency"
    - "Compliance-ready deployment packets and reusable integrations for community-bank stacks"
  killCriteria:
    - "Fewer than 2 of the first 8 qualified banks sign a paid CD-maturity pilot within 12 months."
    - "Pilot cohorts fail to improve renewal rate by at least 10% or retained balance by at least 15% versus baseline or manual control."
    - "Less than 50% of targeted households at the first 2 pilot banks have consent-clean records for an automated first touch."
    - "More than half of the first 5 deployments require custom real-time core integration before the first live campaign."
  mermaid: |
    flowchart LR
      Wedge[CD renewal save wedge] --> MVP[Consent-aware outreach MVP]
      MVP --> Proof[Retained balance and banker leverage proof]
      Proof --> Expansion[Adjacent community finance outreach workflows]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Clear pain and buyer, but conviction stays low-to-medium until a bank buys a narrow overlay despite strong incumbent overlap and a finite initial market."
    whyBelieve: "The company targets a board-visible deposit problem with measurable ROI and a disciplined wedge that can show value in a single maturity cycle."
    whyDoubt: "Glia already sells a named CD-renewal workflow, the core buyer pool is only a few hundred institutions, and consent plus procurement friction may block repeatable six-figure software sales."
    nextDiligence: "Confirm at least 2 paid pilots at $25k plus that show enough consent-clean reach and retained-balance lift to convert into $90k-$140k ARR."
  firstCustomer:
    title: "Head of Deposits at a $2B-$8B community bank"
    profile: "20-60 branch bank with 500 or more monthly retail CD maturities, a centralized deposit or branch-support team, and manual maturity outreach still driven by core exports and banker callbacks."
    trigger: "A quarter of rising CD runoff or an upcoming maturity wave that lands before the next ALCO, board, or exam review."
    buyer: "Chief Retail Banking Officer or Head of Deposits"
    initialContract: "8-12 week fixed-scope pilot around one maturity cohort at $25k-$40k, converting to roughly $90k-$140k ARR plus implementation if retained-balance and banker-efficiency thresholds are met."
  mustBeTrue:
    - "At least half of targeted households at pilot banks have consent-clean SMS or voice records that allow automated first touch."
    - "A paid pilot can raise renewal rate or retained balance enough to justify $90k-$140k annual spend from deposit or retail-banking budget."
    - "Banks will buy a deposit-specific overlay beside existing Glia, Eltropy, Talkdesk, or manual workflows instead of waiting for incumbent roadmap."
    - "Flat-file or CRM ingest can get the first campaign live in 45 days or less without deep core replacement."
    - "The CD renewal wedge expands into at least 1 adjacent outreach workflow within 12-18 months, or the business remains a small niche."
  diligenceQuestions:
    - "How many target banks already run Glia, Eltropy, or another suite, and would they accept an overlay purchase?"
    - "What minimum renewal-rate lift or retained-balance lift unlocks recurring budget at the first-customer profile?"
    - "How clean are consent, do-not-call, and channel-preference records in the first 10 target accounts?"
    - "Can third-party and model-risk review be standardized enough to keep pilot approval under 90 days?"
    - "Which adjacent workflow expands first with the same buyer and data model: money-market defense, new-account follow-up, or payment reminders?"
operatingAssumptions:
  - assumption: "Banks will buy a narrow overlay if it lands inside a live maturity-wave program instead of a broad CX transformation."
    basis: research.yaml
    validationTest: "Run 10 qualified buyer conversations and convert at least 2 into paid pilots, including at least 1 bank already using a broader AI or CCaaS suite."
    decisionImpact: "If false, the company should pivot toward partner white-label distribution or broader suite packaging rather than direct standalone sales."
  - assumption: "Consent-clean data covers enough households for automation to matter."
    basis: research.yaml
    validationTest: "Audit the first 2 pilot banks and confirm at least 50% of targeted accounts can be contacted through an approved SMS or voice channel."
    decisionImpact: "If false, the product shifts toward SMS-first plus banker-callback workflows or narrows ICP to banks with stronger consent hygiene."
  - assumption: "Flat-file and CRM ingest are enough to prove ROI before deep core integration."
    basis: idea.yaml
    validationTest: "Launch the first 3 pilots within 45 days of data access without requiring real-time core write-back."
    decisionImpact: "If false, implementation cost and sales cycle increase, so the ICP must narrow and capital needs rise."
  - assumption: "Pricing by maturity volume and branches can support $90k-$140k ACV without being treated as a services budget."
    basis: research.yaml
    validationTest: "Test 5 proposals and get at least 3 buyers to accept a conversion path into the target annual price band if KPI thresholds are met."
    decisionImpact: "If false, ACV expectations, hiring pace, and venture-scale assumptions should be reset downward."
  - assumption: "A second workflow can attach quickly enough to overcome the finite CD-renewal market."
    basis: idea.yaml
    validationTest: "Within the first 6 production banks, at least 2 should expand into a second workflow within 12 months of go-live."
    decisionImpact: "If false, the company should optimize for a profitable niche or change the product roadmap before raising more growth capital."
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Deposit-defense interview sprint"
    hypothesis: "Heads of Deposits will describe the same acute pain around maturity-wave coverage, unanswered calls, and banker-capacity limits."
    successMetric: "12 buyer interviews completed, 6 sharing sample maturity-workflow data, and 3 agreeing to pilot scoping."
    owner: "CEO / GTM founder"
  - horizon: "0–90 days"
    experiment: "Consent and callable-inventory audit"
    hypothesis: "Target banks have enough consent-clean households to support an automated first touch on at least half of one maturity cohort."
    successMetric: "2 pilot candidates complete data audits and both show 50% or better approved-channel coverage on targeted accounts."
    owner: "Founding eng"
  - horizon: "90–180 days"
    experiment: "Concierge maturity-wave pilot"
    hypothesis: "A flat-file-driven overlay with banker handoff can outperform manual outreach before deep core integration is built."
    successMetric: "First paid pilot live within 45 days and producing weekly connect rate, banker-touch, and retained-balance reporting."
    owner: "Product and implementation lead"
  - horizon: "90–180 days"
    experiment: "Pilot packaging and pricing test"
    hypothesis: "Banks will buy a fixed-scope maturity-wave pilot more readily than an open-ended AI transformation project."
    successMetric: "2 paid pilots signed at $25k-$40k and at least 1 sponsor pre-accepts the annual conversion band if KPI thresholds are hit."
    owner: "CEO / GTM founder"
  - horizon: "180–365 days"
    experiment: "Incumbent coexistence and co-sell motion"
    hypothesis: "Integrators and incumbent-stack customers will prefer an overlay that complements existing Glia, CRM, or contact-center tooling."
    successMetric: "2 partner agreements signed and 25% of qualified pipeline sourced from partners or customers with incumbent stacks."
    owner: "Compliance and solutions architect"
  - horizon: "180–540 days"
    experiment: "Second-workflow expansion pilot"
    hypothesis: "The same data model and buyer can expand from CD renewals into money-market defense or new-account follow-up."
    successMetric: "2 production banks launch a second workflow and lift account ARR above the initial CD-only contract."
    owner: "Product and implementation lead"
operations:
  - "Maintain a standing third-party-risk, model-governance, and cybersecurity packet before asking banks to approve a pilot."
  - "Run consent, do-not-call, caller-identity, and channel-preference screening before every outbound campaign."
  - "Standardize onboarding around flat-file maturity exports and a limited connector set before promising deeper core integrations."
  - "Hold weekly maturity-cohort reviews with deposit leadership to calibrate offers, objections, and banker handoff thresholds."
  - "Use telephony and messaging partners that support caller-authentication, deliverability monitoring, and auditable outreach logs."
team:
  - role: "CEO / GTM founder"
    startTiming: "Month 0"
    rationale: "Owns founder-led sales, pilot design, pricing, and executive relationships while the market and budget thesis are still being proven."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Builds ingestion, consent logic, banker work queues, and the first deployment architecture that determines time to value."
  - role: "Product and implementation lead"
    startTiming: "Month 2"
    rationale: "Encodes bank workflows, shortens pilot onboarding, and turns bespoke rollout work into repeatable playbooks."
  - role: "Compliance and solutions architect"
    startTiming: "Month 3"
    rationale: "Owns TPRM materials, model-governance packaging, and coexistence design with bank channel stacks and partners."
  - role: "Strategic account executive"
    startTiming: "Month 9"
    rationale: "Adds sales capacity only after the company has a reference pilot, a clear price band, and a documented procurement path."
milestones:
  - horizon: "0–12 months"
    items:
      - "Sign 3 design partners and close at least 2 paid pilots around live maturity waves."
      - "Ship flat-file ingest, consent screening, SMS-first outreach, banker work queues, and retained-balance reporting for one CD portfolio."
      - "Complete the first bank-ready TPRM and model-governance package."
      - "Secure at least 1 co-sell or implementation partner that serves the target bank cohort."
  - horizon: "12–24 months"
    items:
      - "Convert at least 3 pilots to production and reach 8-12 live banks."
      - "Add 2 common core or CRM integrations and benchmark reporting across production cohorts."
      - "Launch the first second-workflow expansion with an existing customer."
      - "Move 25% or more of qualified pipeline to partner-sourced opportunities."
  - horizon: "24–36 months"
    items:
      - "Reach 25-30 live banks and approximately $4M in annualized recurring revenue if the year-3 SOM holds."
      - "Generate 30% or more of ARR from adjacent workflows beyond CD renewals."
      - "Reduce standard deployment time below 30 days for banks that fit the target data spec."
      - "Show that benchmark and handoff data improve renewal outcomes across multiple cohorts, not just one pilot design."
risks:
  - risk: "Incumbent suites or manual status quo absorb the wedge before the startup proves a standalone budget line."
    likelihood: High
    impact: High
    mitigation: "Sell as a deposit-economics overlay, target accounts with visible runoff pain, and prove retained-balance lift that broader suites do not measure."
  - risk: "Consent, do-not-call, or caller-trust constraints reduce the share of households the AI can contact."
    likelihood: High
    impact: High
    mitigation: "Audit consent first, start with SMS and opt-in cohorts, preserve banker-callback fallbacks, and maintain strong caller-authentication controls."
  - risk: "Third-party, cybersecurity, and model-risk review make pilots too slow to close."
    likelihood: High
    impact: Medium
    mitigation: "Provide a pre-built TPRM and model packet, keep the first deployment read-only where possible, and scope phase 1 to one auditable workflow."
  - risk: "The CD-renewal beachhead stays a profitable niche but does not expand fast enough into adjacent workflows."
    likelihood: Medium
    impact: High
    mitigation: "Instrument second-workflow attach early and avoid scaling headcount ahead of proof that the same buyer will expand."
  - risk: "Data-quality and integration gaps keep onboarding bespoke."
    likelihood: Medium
    impact: High
    mitigation: "Standardize input specs, start with flat-file maturity exports, and narrow the ICP to banks whose data can support a 45-day launch."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5-3.5M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of product, compliance, and implementation buildout, secure 3-5 design partners, land the first repeatable integrations and TPRM package, and convert paid maturity-wave pilots into the first 5-8 production banks before deciding on a larger seed raise."
