topRisks:
  - name: "核心数据集成阻力"
    description: "如果银行无法便捷地暴露到期事件、客户偏好和银行员工路由规则，部署可能陷入僵局。"
    mitigation: "先从一个存款组合的平面文件和 CRM 摄入开始，证明续存提升后再追加实时核心集成。"
  - name: "合规与客户信任风险"
    description: "银行可能担心 AI 主导的触达会处理不当受监管语言，或让老客户感到不满。"
    mitigation: "使用经审批的脚本、受约束的报价、退出控制，以及在异议或特殊路径上即时转接人工。"
  - name: "现有厂商渠道栈重叠"
    description: "联络中心厂商或类 Glia 的现有厂商可能在切口曝光后追加基础的存款留存剧本。"
    mitigation: "占据银行专属事件评分、续存成果基准和支行转接工作流，而非在商品化语音或 SMS 基础设施上竞争。"
