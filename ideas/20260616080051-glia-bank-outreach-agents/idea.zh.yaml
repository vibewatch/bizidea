problem: >-
  社区银行至今仍通过核心系统导出、预测拨号和支行呼叫树管理 CD 到期及相关存款留存工作流。由于多达 80% 的
  出站电话无人接听或转至语音信箱，一线团队耗费大量时间在低效触达上，高价值余额却悄然到期流失。结果是本
  可避免的存款外流、跟进不一致，以及客户真正准备沟通时缺乏顺畅的转接流程。
targetUser:
  primary: >-
    美国社区银行零售存款运营负责人，管辖 10–80 家支行，CD 续存触达由总部集中管理或通过各支行团队执行
  secondary: >-
    负责零售存款到期及银行员工跟进队列的支行银行业务和客户留存经理
  buyer: "首席零售银行官、存款业务负责人或消费者银行业务执行副总裁"
startupThesis:
  nonObviousInsight: >-
    真正有价值的切口不是另一个通用银行语音机器人，而是把到期存款事件转化为优先级留存剧本的运营系统——让
    AI 处理前 80% 无法接通或意向低的联系，只把实时留存时机连同完整背景路由给人工银行员工。一旦出站 AI
    够用了，真正稀缺的层次就变成了事件筛选、报价护栏、异议分类体系，以及与存款经济绑定的支行转接逻辑。
  beachhead: >-
    资产规模 $1B–$10B、拥有 15–75 家支行、每月至少 500 笔零售 CD 到期且仍通过核心导出、预测拨号
    和手工银行员工跟进处理的美国社区银行
  wedge: >-
    CD 续存留存运营系统：对到期账户的流失风险评分，发起 AI 语音和 SMS 续存对话，捕获异议和留存意向，
    并将有意向的客户连同批准报价和对话历史转接给合适的银行员工
  whyNowCatalyst: >-
    Glia 的发布及其超过 700 家机构的覆盖规模，表明社区金融机构已准备好为主动存款和支付触达的 AI 买单，
    使 CD 续存挽救成为一个可纳入预算的新工作流。
  ventureScalePath: >-
    从 CD 到期出发，逐步拓展至货币市场余额防守、休眠账户再激活、新账户跟进、贷款还款提醒和早期催收，最
    终成为社区金融机构事件驱动客户触达的系统级记录平台。
solution: >-
  产品接入银行的核心系统、CRM 和联络中心栈，建立一个包含到期账户滚动队列和推荐留存动作的工作台。系统利用
  余额、账龄、支行关系和近期互动数据，决定哪些客户需要 AI 触达、哪些应直接转给银行员工、哪些只需发送低成
  本提醒。AI 客服处理围绕到期日期的语音和 SMS 对话，解答常见续存问题，记录利率比较或流动性需求等异议，并
  在客户表现出意向或提出特殊申请时安排银行员工回访。管理者可通过仪表盘查看接通率、续存率、留存余额和常见留
  存障碍，将原本不透明的支行任务转变为可衡量的留存引擎。随着时间推移，系统将沉淀出哪些话术、报价和转接时机
  最能为各类银行留住余额的专有知识。
goToMarketSeed:
  firstCustomer: >-
    资产 $2B–$8B、拥有 20–60 家支行、设有集中存款团队、因支行员工无法手动覆盖每个到期客户而每月持续出
    现 CD 流失的美国社区银行
  buyingTrigger: >-
    某季度 CD 流失上升、董事会下达不增加支行编制但须守住存款的任务，或季节性到期潮压垮手工续存外呼
  currentAlternative: >-
    核心系统导出名单、支行电子表格、预测拨号、通用 CRM 活动和手工银行员工回访
  switchingReason: >-
    首批客户切换的原因：以更低人工成本覆盖更多到期客户，为实时留存对话保留高信任度银行员工介入，
    以及生成手工触达无法提供的可量化续存和留存余额报告
  pricingHypothesis: >-
    按月到期账户量和已启用支行数量定价的年度平台费，附加银行员工转接工作流和留存余额分析的高级模块
whyNow:
  - point: "社区和区域金融机构现在正专门为主动出站语音和 SMS 采购 AI，这验证了触达可以作为人力扩编工具纳入预算，而不再是未来的实验项目。"
    signalRefs: ["主动触达正成为 AI 人力扩编品类"]
    sourceRefs: [1, 2]
  - point: "当多达 80% 的电话无人接听或转至语音信箱，优化联系对象和跟进方式的价值，远大于给支行团队再配一套拨号系统。"
    signalRefs: ["一线预测拨号已触达接通天花板"]
    sourceRefs: [2]
  - point: "CD 续存、还款提醒和新账户机会已是具名的产品工作流，因此存款留存切口从一个真实的预算线切入，而非凭空制造的需求。"
    signalRefs: ["具名银行工作流开辟了窄切口"]
    sourceRefs: [1, 2]
  - point: "自动异议处理加上携带完整背景的人工转接，意味着市场现在期待 AI 管理第一次接触，同时不牺牲敏感账户上的银行员工关系。"
    signalRefs: ["信任管控与人工转接已成标配"]
    sourceRefs: [3]
  - point: "一家已服务超过 700 家银行和信用社的厂商，说明买家教育、采购成熟度和集成就绪程度远超零到一市场。"
    signalRefs: ["社区金融机构的分销渠道已成规模"]
    sourceRefs: [2]
differentiator: >-
  这不是通用营销软件、CCaaS 拨号器或全行聊天机器人。真正可防守的资产是存款留存剧本图谱：哪些到期事件值得
  AI 触达、哪些异议与流失相关、哪些报价符合产品和支行政策、何时应由人工银行员工接管。这张图谱持续沉淀为银
  行专属的留存基准和对话智能，是广泛联络中心厂商和通用 AI 客服难以复制的壁垒。
