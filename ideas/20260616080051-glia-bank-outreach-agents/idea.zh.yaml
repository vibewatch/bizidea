jobsToBeDone:
  - job: >-
      当一批零售 CD 临近到期，帮助我们的存款团队触达合适的客户、自动处理第一次接触的续存问题，并只将实时
      留存机会路由给银行员工，让我们无需增加外呼人员也能守住余额。
    currentAlternative: "手工支行外呼名单、预测拨号和通用 CRM 提醒"
    successMetric: "续存率、留存存款余额和每个留存账户的银行员工耗时"
  - job: >-
      当续存流失上升，帮助零售管理层了解哪些异议、报价和银行员工转接实际上能挽留存款，让我们能在下一个到期
      周期改进，而不是凭电话备注猜测。
    currentAlternative: "电子表格追踪、临时通话备注和事后支行经理复盘"
    successMetric: "按到期批次的流失减少幅度，以及有结构化成果数据的联系比例"
