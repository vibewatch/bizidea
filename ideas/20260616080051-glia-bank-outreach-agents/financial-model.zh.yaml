slug: cd-renewal-save-os
date: '2026-06-16'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: 从商业计划日期 2026-06-16 后的第一个完整月开始。
- id: A2
  name: 起始付费银行数（第 1 个月）
  value: '0'
  unit: count
  source: '[BP milestones] 计划在签署任何付费试点之前启动，因此第 1 个月从零家付费银行开始。'
- id: A3
  name: 生产订阅价值
  value: $138.0K ARR per live bank
  unit: usdK_per_year
  source: '[BP investorMemo.firstCustomer.initialContract; BP market.som; research.market.som] BP 转化区间约 $90K–$140K ARR，调研 SOM 使用约 $140K 混合 ACV，因此基准模型采用每家在线生产银行 $138K 经常性价值。'
- id: A4
  name: 付费试点定价
  value: $10.0K per month for a 3-month pilot
  unit: usdK_per_customer_month
  source: '[BP investorMemo.firstCustomer.initialContract; BP gtm.pricing] 将 BP 的 $25K–$40K 固定范围试点分摊为 8–12 周的收入形态，保持在说明的试点价格区间内。'
- id: A5
  name: 转化时的实施费
  value: $15.0K one-time when a pilot converts
  unit: usdK_per_customer
  source: '[BP investorMemo.firstCustomer.initialContract; BP businessModel.revenueStreams] BP 明确在经常性订阅收入之外包含实施费。'
- id: A6
  name: 客户增长节奏
  value: 4 active banks by M12, 10 by Q4Y2, and 30 by Q4Y3
  unit: customers
  source: '[BP milestones; BP market.som; research.market.som] 增长节奏与 BP 路径匹配：第一年 2+ 个付费试点，第 12–24 个月 8–12 家活跃银行，第 24–36 个月 25–30 家活跃银行。'
- id: A7
  name: 试点转生产时间
  value: Base-case pilot cohorts convert after about 3 months once renewal-lift thresholds are met
  unit: months
  source: '[BP investorMemo.firstCustomer.initialContract; BP milestones] BP 将初始合同定为 8–12 周试点，并要求至少 3 个试点转化后再进行规模扩展。'
- id: A8
  name: 毛利率爬坡
  value: 45%-55% in Y1, 60%-67% in Y2, and 68%-70% in Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct; BP strategicChoices.sequencingRationale; research.reportMemo.regulatoryLandscape] 早期银行上线和合规支持使毛利率初期低于目标，随着平面文件上线和 TPRM 材料标准化，毛利率逐步接近 BP 的 70% 目标。'
- id: A9
  name: 月度流失率
  value: 0.8%
  unit: percent
  source: 针对销售给受监管银行的黏性企业工作流软件的初创企业财务经验值，因早期产品和采购风险适度上调。
- id: A10
  name: 全成本 CAC
  value: $140.0K per production bank
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; BP risks; research.reportMemo.distributionChannels] 社区银行销售需要创始人时间、出差、采购支持、合作伙伴赋能和安全尽调，因此 CAC 建模高于中端市场 SaaS 常规。'
- id: A11
  name: 含税薪酬区间
  value: Sales/GTM $150K; engineering $185K; product/implementation $165K; compliance/solutions $165K; G&A/ops $120K
  unit: usdK_per_fte_year
  source: 美国种子前和种子阶段企业软件招聘的初创企业财务经验值，以 [BP team] 的岗位结构为锚点。
- id: A12
  name: 人员编制快照
  value: Engineering 1/1/1/1/2/3; product/implementation 1/1/1/1/1/2; compliance/solutions 1/1/1/1/1/1; sales/GTM 1/1/1/2/3/4; G&A/ops 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale; BP milestones] 基准情景遵循 BP 顺序：先构建工作流和合规层，试点和参考案例到位后再有序增加 GTM 产能。'
- id: A13
  name: 种子前完成后起始现金
  value: $3.0M
  unit: usdM
  source: '[BP fundingAsk] BP 申请 $2.5M–$3.5M 种子前融资；模型使用中高值，因公司在合作伙伴杠杆到位之前须先资助合规、实施和漫长销售周期。'
- id: A14
  name: 职能非薪酬运营支出预算
  value: Y1 non-salary opex of $26K-$43K per month; Y2 non-salary opex of $114K-$140K per quarter; Y3 non-salary opex of $146K-$170K per quarter
  unit: usdK
  source: 银行软件初创企业的财务经验值，在 BP 人员计划之上叠加出差、云工具、消息/语音基础设施、法律审查和供应商风险打包成本。
- id: A15
  name: 季度薪酬平滑处理
  value: Y2 and Y3 salary lines use actual hire months rather than stepping only at year-end snapshots
  unit: method
  source: '[Financial Modeler instructions; BP team] 薪酬线与实际招聘时间挂钩，同时仍遵守所需的快照人数列。'
- id: A16
  name: 合作伙伴和参考杠杆
  value: Roughly one-quarter of new wins by late Y2 and about one-third by Y3 come through partner or reference-driven selling
  unit: percent_of_new_customers
  source: '[BP milestones; BP gtm.channels; research.reportMemo.partnershipEcosystem] BP 预计首批合规就绪部署到位后，联合销售和实施合作伙伴将发挥作用。'
- id: A17
  name: 现金换算简化处理
  value: Ending cash rolls from EBITDA only, with no debt, tax, or capex lines
  unit: method
  source: 轻资产软件公司的财务经验值，其营运资本波动相对于运营烧钱较小。
- id: A18
  name: 下行情景参数差异
  value: $120K recurring value, 65% gross margin, 12-month sales cycle, and 22 live banks by Q4Y3
  unit: scenario_inputs
  source: '[BP risks; research.reportMemo.sensitivityCases; research.categoryDynamics.headwinds] 下行情景反映同意摩擦、采购延迟和现有厂商重叠持续时间超过计划。'
- id: A19
  name: 上行情景参数差异
  value: $150K recurring value, 72% gross margin, 7-month sales cycle, and 34 live banks by Q4Y3
  unit: scenario_inputs
  source: '[BP market.som; BP milestones; BP businessModel.expansionLevers] 上行情景假设参考银行提前带动合作伙伴主导的赢单，相邻工作流模块拉升每家银行的混合价值。'
