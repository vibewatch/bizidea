scenarios:
  downside:
    description: 同意覆盖持续参差不齐，采购周期延长，公司第三年末活跃银行数低于目标，服务密集型上线仍在拖累毛利率。
    y3RevenueK: 2100.0
    y3EbitdaK: -945.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - 每家活跃银行的经常性价值从 $138K 降至约 $120K。
    - 毛利率停滞在 65% 附近，无法达到 70%。
    - 销售周期从约 9 个月延长至 12 个月。
    - 第三年末活跃银行数约 22 家，而非 30 家。
  base:
    description: 基准情景在一个到期工作流中完成早期试点转化，第二年末达到 10 家活跃银行，第三年末达到 30 家，第四季度 EBITDA 转正。
    y3RevenueK: 2893.0
    y3EbitdaK: -298.8
    cashLowPointK: 719.3
    keyAssumptionChanges:
    - 每家活跃银行的经常性价值维持约 $138K，转化时附加 $15K 实施费。
    - 毛利率达到 BP 目标区间，第三年末以 70% 退出。
    - 随着参考案例和合作伙伴改善赢率效率，销售周期维持约 9 个月。
    - 第三年末活跃银行数达到 30 家，与 BP 和调研 SOM 框架一致。
  upside:
    description: 参考客户、可复用集成和第二工作流附加模块提前带动合作伙伴主导的赢单，使业务在第三年更早实现 EBITDA 转正。
    y3RevenueK: 3650.0
    y3EbitdaK: 250.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
    - 随着分析和相邻工作流更早附加，经常性价值从 $138K 升至约 $150K。
    - 随着上线和合规文件包更快标准化，毛利率从 70% 提升至约 72%。
    - 销售周期从约 9 个月压缩至 7 个月。
    - 第三年末活跃银行数升至约 34 家。
sensitivity:
- variable: ARPU
  downsideCase: 每家活跃银行经常性价值 $120K
  baseCase: 每家活跃银行经常性价值 $138K
  upsideCase: 扩展模块更早附加时 $150K
  y3RevenueImpactK: -378.0
  cashImpactK: -250.0
- variable: CAC
  downsideCase: 全成本 CAC $170K
  baseCase: 全成本 CAC $140K
  upsideCase: 合作伙伴来源销售更强时 $120K
  y3RevenueImpactK: 0.0
  cashImpactK: -240.0
- variable: 流失率
  downsideCase: 工作流可替代感强时月度流失率 1.2%
  baseCase: 月度流失率 0.8%
  upsideCase: 工作流锁定更深时月度流失率 0.6%
  y3RevenueImpactK: -140.0
  cashImpactK: -110.0
- variable: 销售周期
  downsideCase: 银行尽调和采购拖累达 12 个月
  baseCase: 9 个月
  upsideCase: 可重复参考销售时 7 个月
  y3RevenueImpactK: -640.0
  cashImpactK: -430.0
- variable: 毛利率
  downsideCase: 上线仍以服务为主时 65%
  baseCase: 目标毛利率 70%
  upsideCase: 实施复用改善后 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: 招聘节奏
  downsideCase: 将一名工程师和一名 GTM 人员提前两个季度招聘
  baseCase: 按 BP 招聘顺序计划执行
  upsideCase: 在合作伙伴推荐被证实之前推迟一名 GTM 招聘
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Maturities[Target maturity waves] --> Pilots[Paid pilots]
      Pilots --> Banks[Production banks]
      Banks --> Revenue[Recurring revenue + implementation]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash after opex]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入由第三年末达到 30 家活跃银行驱动，每家约 $138K 经常性价值加小额转化费，使第三年确认收入升至约 $2.9M。
- checkName: 必须跑通的环节
  finding: 试点转生产和合作伙伴协助的客户增加必须奏效，因为模型更依赖活跃银行数量而非激进的价格扩张。
- checkName: 模型失效条件
  finding: 若销售周期延长至 12 个月，或同意覆盖率低于 BP 门槛，模型将最快恶化——这两种情况都会同时推迟收入时间和现金向下行情景移动。
- checkName: 下一轮验证条件
  finding: 一旦公司在种子前跑道内展示 8–10 家活跃银行、两套可复用集成和可重复的合规就绪部署，下一轮融资就有依据。
sanityChecks:
  ruleOf40: 第三年增长率 172.2% + EBITDA 利润率 -10.3% = 161.8%。
  burnMultiple: 以年末活跃银行 ARR 代理，第二年烧钱倍数约 1.2x（净新增 ARR 约 $0.83M）；第三年改善至约 0.1x（净新增 ARR 约 $2.76M）。
  revenuePerFte: 第三年人均收入 $263K，使用 $2.89M 收入和 11 名年末员工（SaaS 基准 $200K–$400K）。
  flags:
  - 滩头市场刻意保持窄口，即使是基准情景也依赖第三年相对少数的大型社区银行买家。
  - 模型假设合作伙伴和参考杠杆在前 8–10 家活跃银行后开始发挥作用；如果这一动作表现不佳，CAC 和销售周期很可能向下行情景漂移。
  - 同意合规和银行尽调仍是最难把控的运营风险，任何一个都可能同时拖慢试点启动和试点转生产的速度。
