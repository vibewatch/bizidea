problem: 想抢首批聚变电力的超大规模云厂商和 AI 园区开发商，今天还是靠 Excel 采购表、顾问备忘录和零散的电力公司会议来推进交易。可这类项目的成败，取决于制造里程碑、工厂建设、直电并网和兜底电力方案能不能始终对齐。通用可再生能源采购工具能帮忙把合同签下来，却管不了新型电站签约之后的交付就绪度，也给不了买方一套实时、可信的事实底座。
targetUser:
  primary: 北美超大规模云厂商或托管平台里，负责能源采购或电力交付的负责人；他们正在评估首个 25–75 MW 的直电聚变购电协议，用于 2028 年的 AI 园区扩容
  secondary: 为同一园区协调公用事业研究、变电站设计和兜底电力方案的并网团队与业主工程师团队
  buyer: 承购方的 VP Energy、Chief Development Officer，或数据中心基础设施业务的 GM
startupThesis:
  nonObviousInsight: 下一个聚变瓶颈，不再是说服市场“聚变总有一天会重要”。真正卡住的是：首批买家得像项目总控一样围着一个真实交付日期来推进，提前几年把工厂产能、建设进度、并网假设和兜底能源方案一直拧在一起。
  beachhead: 北美超大规模云厂商和托管平台的电力交付团队——他们已经签下或正在评估首个直电聚变购电协议，对应的是 2028 或 2029 年投运的单一 AI 园区
  wedge: 一套聚变交付就绪 OS，把供应商里程碑、电站建设证据、并网假设、产能爬坡和兜底电力方案拉进同一个买方控制塔
  whyNowCatalyst: Helion 的融资、明确的制造扩产、Microsoft 协议和 2028 年目标交付时间，说明商业聚变已经进入买方必须立刻配执行软件的规划窗口，而不只是继续看科学进展。
  ventureScalePath: 先从首批聚变合同的买方就绪管理切入，再扩到保险人、放贷方、公用事业公司和开发商在其他首台套稳定清洁电力项目里的工作流——这类项目成不成，关键不是发电分析，而是里程碑证据和并网准备。
solution: 做一套“新闻稿发出之后、首度送电之前”的聚变承购执行事实系统。产品给买方一张里程碑图谱，把工厂扩建、Orion 建设、公用事业接口、变电站假设、商业验收测试和备用采购串成同一张就绪视图；同时明确每个阶段买方该向聚变开发商索取哪些证据，并在进度下滑时立刻提示园区是否要补柴油、燃气、储能或电网桥接方案。时间一长，这家公司会变成首台套稳定电源项目从签约走到可依赖兆瓦交付的基准层。
goToMarketSeed:
  firstCustomer: 一家在北美有明确 AI 园区扩建计划的超大规模云厂商或大型托管运营商，正在考虑首个直电聚变购电协议，需要一套对内能讲得通的 2028 年电力可得性方案
  buyingTrigger: 董事会批准的园区建设或租户承诺，取决于首份聚变合同能不能算进站点的稳定电力方案
  currentAlternative: 内部 Excel、可再生能源采购工具、公用事业顾问、业主工程师报告，以及高管手工复盘
  switchingReason: 这个切口给买方一套唯一、持续更新的运营事实源：聚变电力到底能不能按时到位、哪条假设出了风险、哪些兜底动作还能保住园区上线日期。现在那套“顾问 + 表格”组合做不到持续维护。
  pricingHypothesis: 按每个处于聚变支撑下的活跃园区收取年度企业订阅费，外加实施费，以及面向放贷方、保险人和公用事业报告的高级模块费
