topRisks:
  - name: 聚变交易量长期偏薄
    description: 商业聚变承购项目的爬坡可能比预期慢，导致早期客户数量受限。
    mitigation: 先盯最紧急的少数买方项目，同时把工作流设计成可延伸到先进核能、地热和其他首台套稳定电力交付。
  - name: 买方继续依赖顾问
    description: 超大规模云厂商可能继续依赖业主工程师和内部 PMO，而不是再加一层新软件。
    mitigation: 把产品定位成压在顾问之上的实时事实系统，在会议、评审人和多个园区之间保留就绪度情报，而不是替代顾问。
  - name: 开发商不愿透明
    description: 聚变开发商可能不愿开放足够多的里程碑证据，让买方细颗粒度监控交付风险。
    mitigation: 先从买方侧切入，用必需证据清单和共享数据室工作流起步，再用减少重复尽调负担来换开发商参与。
