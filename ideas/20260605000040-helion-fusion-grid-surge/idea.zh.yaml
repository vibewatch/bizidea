jobsToBeDone:
  - job: 当超大规模云厂商签下或评估首个聚变支撑的购电协议时，帮电力交付团队盯住就绪度和兜底动作，好判断园区上线计划还靠不靠谱。
    currentAlternative: Excel 跟踪表、顾问幻灯片，以及周期性的高管复盘
    successMetric: 从签署条款清单到完成就绪模型的天数，以及在影响投运日期前被提前标记出的交付风险占比
  - job: 当公用事业公司和内部基础设施团队审查首个聚变园区时，帮买方把里程碑证据和并网假设打包好，避免陷入没完没了的定制化尽调循环。
    currentAlternative: 业主工程师定制备忘录和手工更新的数据室
    successMetric: 完成内部审批或并网审查所需时间，以及每个项目经历的尽调轮次
