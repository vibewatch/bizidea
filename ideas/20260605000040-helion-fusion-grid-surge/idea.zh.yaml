differentiator: 现有能源软件，要么帮你买标准化电力，要么帮你管通用建设项目。这家公司只做一件事：把首台套聚变交付盯到位。买方需要一个地方，把开发商里程碑、技术假设和园区兜底动作提前几年串起来，而不是等电力真正流出来再补救。它的护城河，是直电聚变项目真实推进数据，以及哪些信号最能预示投运日期会跳票。
