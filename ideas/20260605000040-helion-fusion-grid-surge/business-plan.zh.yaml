slug: fusion-delivery-readiness-os
date: '2026-06-05'
executiveSummary: Fusion Delivery Readiness OS 最合适的起点，是做北美超大规模云厂商和大型托管开发商的买方控制塔：他们押注首个 25–75 MW 的直电聚变或相邻先进核能项目，要在 2028–2029 年给 AI 园区供电。眼下最痛的不是把承购合同签下来，而是当园区排期已经被多年期电网延误压住时，怎么把供应商里程碑、并网假设、公用事业协同、验收证据和兜底电力动作维持在一套可信的就绪视图里。第一版产品应该是一套只读事实系统：把必需证据标准化、尽早标出进度滑坡，并在园区上线日期被拖住前，逼团队把桥接电力决策说清楚。首个客户动作应该落在一个真实园区的付费试点上——VP Energy 或基础设施 GM 需要向董事会内部回答：这类新型稳定电力还能不能算进上线计划。定价不该按席位收，而该按活跃园区项目收费；先用付费试点切入，如果产品确实比“顾问 + 表格”更早发现可操作风险、减少尽调循环，再转成年费企业订阅加实施费。核心战略选择很明确：先赢下首台套稳定电源签约后的就绪管理，再扩到先进核能、放贷方、保险人和公用事业工作流，而不是一开始就做通用能源采购、项目控制或电网分析平台。最强的相信理由，是具名买家已经出现，电力稀缺让排期保护变得昂贵；最大的怀疑点，是聚变交易量依然偏薄，买方也可能继续依赖顾问和横向工具。输入里没有给出交付电价、兜底合同条款和买方精确数据权利，所以前 12 个月应该被当成证伪阶段，而不是默认可以复制放大。
problem:
  - 超大规模云厂商和托管平台的电力团队，已经在交付工作流还没成熟时就签首台套稳定电源合同，但他们仍然靠 Excel、顾问备忘录和阶段性高管复盘来管供应商里程碑、电网假设和兜底规划。
  - 电力稀缺足以让园区交付晚上好几年，所以聚变或先进核能项目只要错过关键里程碑，拖住的不只是一个能源项目——还会卡住 AI 算力、逼团队采购高价桥接电力，并动摇整个园区上线计划。
solution:
  - 做一套买方侧的就绪 OS，把供应商证据、建设和制造里程碑、并网假设、公用事业工作流、验收关口和兜底动作拉进每个活跃园区的一张控制塔视图。
  - 先从只读的工作流编排和证据包起步；只要公司能证明自己比现有方案更早看见交付风险，再往放贷方、保险人、公用事业和相邻首台套稳定电力项目的标准化报告扩。
whyWeWin:
  - 这个产品盯的就是签约后的执行空档——通用采购工具、电网数据商和建设 PM 套件都只覆盖了一部分。
  - 如果公司能抓住真正预示投运日期会跳票的里程碑、公用事业和验收信号，就能积累一套横向现有厂商今天还没有的专有就绪数据集。
strategicChoices:
  beachhead: 北美超大规模云厂商和大型托管平台的电力交付团队——他们正为首个聚变或先进核能支撑的 AI 园区负责，而这个园区能否上线，取决于 2028–2029 年稳定电力是否到位。
  wedgeRationale: 这块市场有具名经济买家、有明确采购触发点，延期后果又足够关键，所以比起更宽泛的公用事业软件或通用项目控制市场，这里更容易更快跑出证明。
  sequencingRationale: 先在一个活跃园区上做一套买方就绪系统，再把业主工程师和公用事业对手方拉进共享工作流；只有当团队证明了风险信号值得信、试点能转产后，再扩去先进核能和对手方报告。
  notYet:
    - 通用可再生能源采购或 PPA 管理
    - 把公用事业市场情报单独卖成产品
    - 开发商侧 ERP 或电站运营工具
    - 在北美工作流模板还没跑通前就做全球扩张
market:
  tam: 估算 TAM 为 $180.0M：按到 2030 年北美大约 120 个并行推进的首台套稳定电力交付项目、每个项目每年约 $1.5M 软件支出来算。
  sam: 估算 SAM 为 $30.0M：按未来 3–5 年北美约 25 个与买方就绪软件直接相关的聚变、先进核能及相邻稳定清洁电力项目来算。
  som: 估算第 3 年 SOM 为 $6.0M：按 4 个生产客户、每个客户约 $1.5M ACV 计算。
  segments:
    - 为单个 AI 园区采购首台套稳定电力的超大规模云厂商与大型托管平台电力交付团队
    - 服务同一批园区项目的业主工程师、并网团队和其他对手方
  buyingProcess: 采购动作往往在园区投资模型或租户承诺取决于“新型稳定电力还能不能算进上线计划”时启动。只要付费试点能给团队一套实时就绪模型、让兜底决策更清楚，并更快回应内外部尽调，VP Energy、Chief Development Officer 或基础设施 GM 就会拍板。
product:
  mvp: MVP 是面向单个活跃园区的只读就绪控制塔。它把里程碑证据标准化，跟踪供应商与公用事业依赖关系，给关键假设打上红黄绿状态，并把每条风险都绑定到明确的兜底电力决策和负责人。
  sixMonth: 拿下 2 个共创客户，分别给各自的一座真实园区搭起里程碑本体和证据室，并证明每周一次的就绪复盘，比 Excel 和顾问幻灯片明显更好用。
  twelveMonth: 至少把 1 个试点转成正式订阅，补上先进核能和公用事业协同的可复用工作流模板，并上线能复用同一张就绪图谱的放贷方或保险人报告包。
  twentyFourMonth: 成为聚变和先进核能园区里首台套稳定电力交付的事实系统，沉淀跨项目的延期预测基准、尽调请求模板和兜底决策节奏。
  keyBets:
    - 只要不逼客户替换现有 PM 和顾问工作流，买方就愿意为一层额外控制塔买单，以保住园区上线日期。
    - 哪怕还没有深度接入供应商系统，只读证据模型也足以先跑出可信的早期预警信号。
    - 先进核能和其他首台套稳定清洁电力项目，会足够快地采用同一套工作流，抵消纯聚变交易量偏薄的问题。
gtm:
  wedge: 在一个真实 AI 园区上卖出付费共创客户试点：客户最在意的是首台套稳定电力是否仍在轨道上，以及一旦不在轨，哪些桥接动作必须立刻启动。
  channels:
    - 创始人主导，直接卖给超大规模云厂商和大型托管平台的能源、基础设施与园区开发负责人
    - 和已经深度嵌进真实项目的业主工程师、并网顾问和公用事业接口团队一起部署共创客户
    - 与希望把买方尽调和里程碑报告标准化的聚变或先进核能开发商建立转介绍与渠道合作
  funnelTargets: 目标漏斗是：discovery→合格试点 25–35%，合格试点→付费试点 20–30%，付费试点→正式订阅 50%+，首个园区→12 个月内第二个项目扩张在成功客户里达到 40%+。
  pricing: 按活跃园区项目收费，不按用户收费：4–6 个月的付费试点定价应在 $150K–$300K，若客户把平台当成正式生产环境下的就绪事实系统，后续转成年费约 $750K–$1.25M 的订阅加实施费。这才符合买方的预算逻辑——他们花钱是为了保住园区上线，不是为了再买一个席位工具。
businessModel:
  revenueStreams:
    - 按处于就绪管理下的活跃园区收取年度软件订阅费
    - 导入期收取实施费和工作流映射费，用于上线与证据标准化
    - 向放贷方、保险人、开发商和公用事业对手方销售高级报告模块
  unitOfValue: 通过首台套稳定电力就绪工作流来管理的活跃园区项目。
  targetGrossMarginPct: 70
  expansionLevers:
    - 从同一超大规模云厂商或托管账户内的一座园区，扩到更多园区
    - 用同一套本体扩进先进核能和其他首台套稳定电力工作流
    - 当跨项目数据足够多之后，销售对手方报告和基准分析
strategyMap:
  northStarMetric: 在所有活跃园区里，拥有一套经买方认可、覆盖供应商、并网与兜底里程碑的最新就绪模型的占比。
  inputMetrics:
    - 从新的供应商或公用事业证据出现，到风险状态更新所需的天数
    - 活跃园区中必填里程碑证据字段的完整率
    - 至少提前 90 天识别出、会影响园区上线的关键排期滑坡数量
    - 付费试点转正式生产的转化率
    - 每个活跃项目减少的尽调轮次
  moatsToBuild:
    - 把供应商里程碑、电网假设、验收关口和兜底决策串起来的专有本体
    - 能判断哪些信号真的预示投运日期会跳票的跨项目基准数据集
    - 在首台套稳定电力交易里被买方、公用事业、放贷方和保险人接受的可复用证据模板
  killCriteria:
    - 聚焦滩头市场开卖 12 个月后，仍签不下 2 个付费共创客户试点
    - 没有任何试点能跑出实质客户结果，比如尽调轮次减少 25%，或某项关键风险至少提前 90 天被发现
    - 到第 18 个月，少于 2 个先进核能或非聚变机会验证这套工作流能走出 Helion 式切口
  mermaid: |
    flowchart LR
      Wedge[Buyer-side readiness wedge] --> MVP[Read-only control tower MVP]
      MVP --> Proof[Early risk and fallback proof points]
      Proof --> Expansion[Advanced nuclear and counterparty expansion]
investorMemo:
  verdict:
    call: 观察
    conviction: 客户痛点和时点都很强，但在团队证明买方愿意为独立系统买单、且市场不只是一小撮聚变交易之前，还不值得进合伙人会。
    whyBelieve: 具名的超大规模云厂商和先进核能交易，已经说明市场真的在为新型稳定电力买单；而 AI 园区的排期保护足够昂贵，只要产品能成为可信的事实系统，就撑得起高价工作流软件。
    whyDoubt: 这条赛道可能死在两个地方：买方继续沿用顾问和横向工具，或者商业聚变及相邻项目体量始终太小，撑不起风投级销售规模。
    nextDiligence: 先在一个真实园区拿下付费试点，再确认至少有一个先进核能买家愿意采用同一套就绪工作流，之后再把它当作可融资的软件品类。
  firstCustomer:
    title: 北美超大规模云厂商或头部托管平台的 VP Power Delivery
    profile: 这家公司正在规划 AI 园区，而园区能否按时送电，取决于一个首台套稳定电力来源；内部能源、并网和基础设施团队已经在和顾问及公用事业方协同。
    trigger: 董事会批准的园区建设、租户承诺或内部容量计划，需要团队每周都能清楚回答：签下的聚变或先进核能电力能不能按时到位。
    buyer: VP Energy
    initialContract: 在一个活跃园区上做 4–6 个月、金额 $150K–$300K 的付费试点；如果平台成为正式生产环境下的就绪记录，再转成约 $750K–$1.25M 的年度订阅加实施费。
  mustBeTrue:
    - 至少 5 个目标买家明确表示：首台套稳定电力在签约后的就绪管理，是一个独立于通用采购或项目控制工具、值得单独预算的问题。
    - 在一个真实园区试点里，即便只拿到买方侧证据和有限供应商输入，也能维持可信的每周就绪模型，不必深度接开发商系统。
    - 一个付费试点能在 6 个月内跑出可量化结果，比如尽调轮次减少 25%、风险更早升级，或兜底决策更快。
    - 至少 2 个先进核能或相邻稳定清洁电力项目愿意采用同一工作流，证明公司不是绑定在 Helion 单一聚变交易量上。
    - 在前几次试点后，实施工作量能明显下降，让正式部署依然保持软件式经济模型。
  diligenceQuestions:
    - 前 10 个目标账户里，真正控制试点和正式生产预算的是哪位高管？
    - 在商业运行前，买方按合同究竟有权从开发商那里拿到哪些里程碑证据？
    - 产品要证明多大价值，客户才会要求更深地接入 Primavera、Aconex 或电网数据工具？
    - 业主工程师和公用事业方会不会真的使用标准化就绪包，还是这套工作流最终仍然只留在买方内部？
    - 如果聚变时间线后移，公司能多快切进先进核能？
operatingAssumptions:
  - assumption: 即便客户已经在用顾问、Primavera、Aconex 或内部 PMO 工具，买方仍愿意为独立的就绪系统付费。
    basis: research.yaml
    validationTest: 至少在 2 个已使用现有工具的账户里拿下付费试点，并在部署前记录双方认可的 KPI 基线。
    decisionImpact: 如果这个假设不成立，公司就该把自己重新定位成嵌在现有栈里的“服务增强模块”，而不是独立平台。
  - assumption: 在没有深度供应商集成的前提下，买方侧证据、里程碑清单和共享尽调室就足以跑出可信的风险信号。
    basis: idea.yaml
    validationTest: 在 2 个共创客户园区里连续 90 天维持每周就绪更新，并让干系人认可中间没有关键盲区。
    decisionImpact: 如果这个假设不成立，上线成本会抬高，产品就得收窄到那些拥有更强合同数据权利或更高实施预算的客户。
  - assumption: 同一套本体能在前 12 个月里拿下相邻的先进核能项目。
    basis: research.yaml
    validationTest: 到第 12 个月前，至少生成 2 个合格的先进核能机会，并把其中 1 个转成付费试点或共创合作。
    decisionImpact: 如果这个假设不成立，可服务市场仍然太窄，公司就该降低融资预期，或更快扩去其他首台套稳定电力资产。
  - assumption: 只要买方先部署了产品，业主工程师、公用事业和其他对手方就愿意围绕标准化就绪材料协作。
    basis: research.yaml
    validationTest: 跑一个试点，让一位业主工程师或公用事业对手方实际审阅就绪包，并确认它减少了定制化尽调往返。
    decisionImpact: 如果这个假设不成立，对手方报告的扩张收入会更慢，路线图也该继续聚焦买方内部工作流。
  - assumption: 在前几次部署后，只要把上线流程、证据模板和复盘节奏标准化，业务毛利就能稳到 70% 以上。
    basis: operator judgment
    validationTest: 到第 4 次正式部署时，在不牺牲客户结果的前提下，把单园区实施工时较首个试点压低至少 30%。
    decisionImpact: 如果这个假设不成立，定价或招聘结构就得转向更重服务的模式，风投吸引力也会下降。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 12–15 位正在推进首台套稳定电力项目的超大规模云厂商、托管平台、业主工程师和并网负责人。
    hypothesis: 最尖锐的采购触发点，是园区上线或租户承诺取决于新型稳定电力能否按时到位。
    successMetric: 10 场访谈确认具名预算负责人、当前工作流和 1 个可量化试点 KPI。
    owner: CEO
  - horizon: 0–90 天
    experiment: 基于一个“聚变式”工作流和一个先进核能工作流，搭出一套就绪本体和证据清单。
    hypothesis: 同一套里程碑模型足以覆盖这两类项目，不需要拆成两套产品。
    successMetric: 在共创客户评审里，80% 的买方侧必需里程碑和证据字段都能被同一模型覆盖。
    owner: 产品负责人
  - horizon: 90–180 天
    experiment: 在一个活跃园区跑出首个付费试点，每周做就绪复盘，并明确跟踪兜底决策。
    hypothesis: 只读控制塔能比 Excel 和顾问复盘更早暴露可操作风险。
    successMetric: 签下 1 个付费试点，并在试点期内拿到至少 1 项客户确认的风险或尽调改进。
    owner: CEO
  - horizon: 90–180 天
    experiment: 在试点账户里，把共享就绪包拿给 1 位业主工程师或公用事业接口团队试用。
    hypothesis: 标准化证据材料能减少定制化状态请求，让产品的价值不只停留在买方团队内部。
    successMetric: 至少 1 位外部干系人采用这套材料，且试点账户反馈临时尽调往返减少。
    owner: 解决方案架构师
  - horizon: 6–12 个月
    experiment: 用同一套本体和报告流程，启动 1 条先进核能共创客户线索。
    hypothesis: 相邻的首台套稳定电力买家不需要大改产品，也会愿意采用同一套工作流。
    successMetric: 拿到 2 个合格的先进核能机会，并签下 1 个付费试点或共创合作。
    owner: 创始销售
  - horizon: 12–18 个月
    experiment: 把首个试点转成正式生产，再扩到同一账户的第二个园区或一个对手方报告模块。
    hypothesis: 只要产品成了客户每周查看的就绪记录，首个资产尚未投运前，扩张就会自然发生。
    successMetric: 签下 1 个正式生产订阅，并在同一账户或生态内拿下 1 笔扩张销售。
    owner: GTM 负责人
operations:
  - 每个试点上线前，都先测清当前尽调周期、里程碑可见性缺口，以及兜底决策的响应时延。
  - 平台一开始坚持只读，让客户不必改开发商、公用事业或 PM 系统权限也能先用起来。
  - 每周跑一次跨职能就绪复盘，拉上能源、基础设施和并网相关方；每月再和经济买家做一次高管检查点。
  - 把证据模板、红黄绿规则和升级路径尽快标准化，让同一套运营节奏能跨园区、跨技术复制。
  - 只有当接入排程、文档和电网情报源能明显提升活跃项目的决策速度时，才做集成。
team:
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 负责把就绪本体、证据模型和关键集成做出来，让这个切口真正具备产品护城河。
  - role: 产品与领域负责人
    startTiming: 第 0 个月
    rationale: 把聚变、先进核能、并网和买方尽调工作流收拢成一套清晰产品和复盘节奏。
  - role: 创始销售
    startTiming: 第 0 个月
    rationale: 负责企业客户发现、拿下共创客户试点，并把首批证明点打磨成可复制的滩头市场叙事。
  - role: 解决方案架构师
    startTiming: 第 3 个月
    rationale: 把证据要求、上线手册和干系人复盘流程固化下来，降低实施风险。
  - role: GTM 负责人
    startTiming: 第 12 个月
    rationale: 等首个试点跑出证明后再补进来，放大创始人主导销售、生态转介绍和账户扩张，而不是抢跑产品契合度。
milestones:
  - horizon: 0–12 个月
    items:
      - 在定义好的买方滩头市场里签下 2 个付费共创客户试点
      - 至少把 1 个试点转成有明确 KPI 改善的正式订阅
      - 验证 1 套可复用本体，同时覆盖“聚变式”和先进核能工作流
      - 建立 1 条可重复的业主工程师或开发商转介绍路径
  - horizon: 12–24 个月
    items:
      - 在超大规模云厂商、托管平台或相邻稳定电力账户里，做到 3–4 个正式生产客户
      - 基于同一张就绪图谱，推出面向放贷方、保险人或公用事业的对手方报告
      - 用可复用模板、证据包和集成显著压低上线成本
      - 发布首批跨项目基准，覆盖延期信号和兜底决策时点
  - horizon: 24–36 个月
    items:
      - 做到约 $6.0M ARR 等价收入，客户结构约为 4 个正式生产客户加扩张收入
      - 在继续外扩前，先成为选定首台套稳定电力滩头市场里的默认就绪工作流
      - 至少在 2 个旗舰客户内部扩到更多园区
      - 证明平台能同时支持多类首台套电力项目，而不会退化成定制化服务生意
risks:
  - risk: 商业聚变和相邻首台套稳定电力交易量始终太小，撑不起风投级客户规模。
    likelihood: High
    impact: High
    mitigation: 尽早扩进先进核能，在第 12 个月前验证相邻需求，并把招聘节奏始终绑在多项目需求是否成立上。
  - risk: 买方继续依赖顾问、内部 PMO 和横向项目软件，而不愿为单独控制塔买单。
    likelihood: High
    impact: High
    mitigation: 围绕一项和园区排期保护直接相关的明确 KPI 去卖，坚持付费试点，并把平台定位成压在现有工具之上的事实系统，而不是推倒重来。
  - risk: 供应商里程碑证据不完整，或在政治上过于敏感，导致产品很难给出可信预测。
    likelihood: Medium
    impact: High
    mitigation: 先从买方的数据权利和共享尽调工作流切入；只有在客户能拿到稳定数据访问权的地方，再逐步做深集成。
  - risk: 并网和公用事业延误强到完全主导结果，让客户把产品看成报表层，而不是决策系统。
    likelihood: Medium
    impact: Medium
    mitigation: 把就绪度明确绑到兜底动作、公用事业协同和情景规划上，让产品即便在供应商时点不确定时也能影响决策。
  - risk: 每个园区都要做定制化分类映射和流程设计，导致部署越来越像重服务项目。
    likelihood: High
    impact: Medium
    mitigation: 收窄滩头市场，强力标准化证据模板，并在扩大产品范围前先补上解决方案架构能力。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱覆盖 18 个月：投核心产品工程、领域产品、早期解决方案架构和创始人主导的企业销售，用来拿下 2 个付费共创客户试点、转出首个正式生产账户，并证明这家公司能从“只做聚变”的工作流扩成可复制的首台套稳定电力软件品类。
