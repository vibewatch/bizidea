slug: fusion-delivery-readiness-os
date: '2026-06-05'
executiveSummary: >-
  Fusion Delivery Readiness OS should start as a buyer-side control tower for
  North American hyperscalers and large colocation developers counting on a
  first 25-75 MW direct-electric fusion or adjacent advanced-nuclear deal to
  support an AI campus launch in 2028-2029. The immediate pain is not signing
  the offtake; it is maintaining one credible readiness view across supplier
  milestones, interconnection assumptions, utility coordination, acceptance
  evidence, and fallback power actions while campus schedules are already under
  pressure from multi-year grid delays. The first product should be a read-only
  system of record that standardizes required evidence, flags schedule slip
  early, and forces explicit bridge-power decisions before a campus launch date
  is stranded. The first customer motion should be a paid pilot on one live
  campus where a VP Energy or GM of infrastructure needs an internal board-level
  answer on whether novel firm power can still be counted in the launch plan.
  Pricing should follow the active-campus program rather than seats, starting
  with a paid pilot and converting to an annual enterprise subscription plus
  implementation if the product reduces diligence loops and surfaces actionable
  risks earlier than the consultant-plus-spreadsheet stack. The core strategic
  choice is to win post-signing readiness for first-of-kind firm power first,
  then expand into advanced nuclear, lender, insurer, and utility workflows,
  rather than trying to be a generic energy procurement, project controls, or
  grid analytics platform. The strongest reason to believe is that named buyers
  already exist and power scarcity makes schedule protection expensive; the
  strongest reason to doubt is that fusion deal volume is still thin and buyers
  may keep relying on consultants and horizontal tools. Delivered power cost,
  fallback contract terms, and exact buyer data rights are not specified in the
  inputs, so the first 12 months should be treated as a falsification phase,
  not assumed repeatable scale.
problem:
  - Hyperscaler and colo power teams now sign first-of-kind firm-power deals before delivery workflows are mature, yet they still manage supplier milestones, grid assumptions, and fallback planning through spreadsheets, consultant memos, and periodic executive reviews.
  - Power scarcity can add years to campus delivery, so a missed fusion or advanced-nuclear milestone does not just slip an energy project; it can strand AI capacity, force expensive bridge power, and undermine the campus launch plan.
solution:
  - Build a buyer-side readiness OS that links supplier evidence, construction and manufacturing milestones, interconnection assumptions, utility workstreams, acceptance gates, and fallback actions into one current control tower for each active campus.
  - Start with read-only workflow orchestration and evidence packs, then expand into standardized reporting for lenders, insurers, utilities, and adjacent first-of-kind firm-power programs once the company proves it can predict delivery risk earlier than the current stack.
whyWeWin:
  - The product is purpose-built for the post-signing execution gap that generic procurement tools, grid-data vendors, and construction PM suites only partially cover.
  - If the company captures which milestone, utility, and acceptance signals actually predict a missed energization date, it can build a proprietary readiness dataset that horizontal incumbents do not have today.
strategicChoices:
  beachhead: North American hyperscaler and large colocation power-delivery teams managing the first fusion-backed or advanced-nuclear-backed AI campus whose launch depends on 2028-2029 firm power availability.
  wedgeRationale: This slice has a named economic buyer, a hard buying trigger, and mission-critical consequences for delay, so proof should emerge faster than in broader utility software or generic project-controls markets where urgency is diffused.
  sequencingRationale: Start with one buyer-side readiness system on one active campus, add shared workflows with owner's engineers and utility counterparts, then expand into advanced nuclear and counterparty reporting only after the team proves trusted risk signals and pilot-to-production conversion.
  notYet:
    - Generic renewable procurement or PPA management
    - Utility market intelligence sold as a standalone product
    - Developer-side ERP or plant operations tooling
    - Global expansion before North American workflow templates are repeatable
market:
  tam: "$180.0M estimated TAM based on roughly 120 concurrent North American first-of-kind firm-power delivery programs by 2030 at about $1.5M annual software spend per program."
  sam: "$30.0M estimated SAM based on about 25 near-term North American fusion, advanced-nuclear, and adjacent firm-clean-power programs where buyer-side readiness software is relevant in the next 3-5 years."
  som: "$6.0M estimated year-three SOM based on 4 production customers at roughly $1.5M ACV each."
  segments:
    - Hyperscaler and large colocation power-delivery teams procuring first-of-kind firm power for one AI campus
    - Owner's engineers, utility-interface teams, and counterparties supporting the same campus programs
  buyingProcess: >-
    The motion starts when a campus investment case or tenant commitment depends
    on whether novel firm power can still be counted toward launch. A VP Energy,
    Chief Development Officer, or GM of infrastructure signs after a paid pilot
    gives the team a current readiness model, clearer fallback decisions, and a
    faster way to answer internal and external diligence.
product:
  mvp: >-
    MVP is a read-only readiness control tower for one active campus. It
    standardizes milestone evidence, tracks supplier and utility dependencies,
    assigns green-amber-red status to critical assumptions, and ties each risk
    to an explicit fallback-power decision and owner.
  sixMonth: Land 2 design partners, stand up the milestone ontology and evidence room for one live campus each, and prove a weekly readiness review that is materially better than spreadsheets and consultant decks.
  twelveMonth: Convert at least 1 pilot into a production subscription, add reusable workflow templates for advanced nuclear and utility coordination, and ship lender or insurer reporting packs that reuse the same readiness graph.
  twentyFourMonth: Become the system of record for first-of-kind firm-power delivery across fusion and advanced nuclear campuses, with cross-project benchmarks on delay predictors, diligence requests, and fallback decision timing.
  keyBets:
    - Buyers will fund a separate control layer if it protects campus launch dates without forcing replacement of existing PM and consultant workflows.
    - A read-only evidence model is enough to create trusted early-warning signals before deep supplier integrations are required.
    - Advanced nuclear and other first-of-kind firm clean-power programs will adopt the same workflow quickly enough to offset thin fusion-only deal volume.
gtm:
  wedge: Sell a paid design-partner pilot on one active AI campus where the customer needs a board-level answer on whether first-of-kind firm power is still on track and what bridge actions are required if it is not.
  channels:
    - Founder-led direct sales to hyperscaler and large colo energy, infrastructure, and campus-development leaders
    - Design-partner deployments with owner's engineers, interconnection advisors, and utility-interface teams already embedded in live projects
    - Referral and channel motion with fusion or advanced-nuclear developers that want to standardize buyer diligence and milestone reporting
  funnelTargets: "Target discovery→qualified pilot 25-35%, qualified pilot→paid pilot 20-30%, paid pilot→production subscription 50%+, and first campus→second program expansion within 12 months in 40%+ of successful accounts."
  pricing: >-
    Price per active campus program, not per user: a $150K-$300K paid pilot over
    4-6 months should convert into roughly $750K-$1.25M annual subscription plus
    implementation when the customer adopts the platform as its production
    readiness system of record. This matches the buyer's budget logic, which is
    tied to protecting a campus launch rather than adding another seat tool.
businessModel:
  revenueStreams:
    - Annual software subscription per active campus under readiness management
    - Paid implementation and workflow-mapping fees for onboarding and evidence normalization
    - Premium reporting modules for lenders, insurers, developers, and utility counterparties
  unitOfValue: Active campus program managed through a first-of-kind firm-power readiness workflow.
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one campus to additional campuses inside the same hyperscaler or colo account
    - Add adjacent advanced-nuclear and other first-of-kind firm-power workflows using the same ontology
    - Sell counterparty reporting and benchmarking once cross-project data accumulates
strategyMap:
  northStarMetric: Percentage of active campuses with a current buyer-approved readiness model covering supplier, interconnection, and fallback milestones.
  inputMetrics:
    - Days from new supplier or utility evidence to updated risk status
    - Percentage of required milestone evidence fields populated on active campuses
    - Number of critical schedule slips identified at least 90 days before campus launch impact
    - Paid pilot to production conversion rate
    - Number of diligence cycles reduced per active program
  moatsToBuild:
    - Proprietary ontology linking supplier milestones, grid assumptions, acceptance gates, and fallback decisions
    - Cross-project benchmark dataset on which signals actually predict missed energization dates
    - Reusable evidence templates accepted by buyers, utilities, lenders, and insurers in first-of-kind firm-power deals
  killCriteria:
    - Fewer than 2 paid design-partner pilots signed within 12 months of focused beachhead selling
    - No pilot shows a material customer outcome such as 25% fewer diligence cycles or one critical risk surfaced at least 90 days earlier than the prior process
    - Fewer than 2 adjacent advanced-nuclear or non-fusion opportunities validate that the workflow expands beyond the Helion-style wedge by month 18
  mermaid: |
    flowchart LR
      Wedge[Buyer-side readiness wedge] --> MVP[Read-only control tower MVP]
      MVP --> Proof[Early risk and fallback proof points]
      Proof --> Expansion[Advanced nuclear and counterparty expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Compelling customer pain and timing, but too early for a partner meeting until the team proves buyers will pay for a separate system and that the market expands beyond a handful of fusion deals.
    whyBelieve: Named hyperscaler and advanced-nuclear deals show real buyer demand for novel firm power, and schedule protection for AI campuses is expensive enough to support premium workflow software if the product becomes the trusted system of record.
    whyDoubt: The category can fail if buyers keep using consultants and horizontal tools, or if commercial fusion and adjacent project volume remain too small to support venture-scale sales.
    nextDiligence: Secure one paid pilot on a live campus and confirm at least one adjacent advanced-nuclear buyer wants the same readiness workflow before treating this as a financable software category.
  firstCustomer:
    title: VP Power Delivery at a North American hyperscaler or top-tier colocation platform
    profile: A company planning an AI campus whose energization case depends on a first-of-kind firm-power source, with internal energy, interconnection, and infrastructure teams already coordinating consultants and utility stakeholders.
    trigger: A board-approved campus build, tenant commitment, or internal capacity plan requires a credible weekly answer on whether contracted fusion or advanced nuclear power will arrive in time.
    buyer: VP Energy
    initialContract: "$150K-$300K paid pilot on one active campus over 4-6 months, converting to roughly $750K-$1.25M annual subscription plus implementation if the platform becomes the production readiness record."
  mustBeTrue:
    - At least 5 target buyers confirm that post-signing readiness for first-of-kind firm power is a separate budget-worthy problem from generic procurement or project-controls tooling.
    - One live campus pilot can maintain a trusted weekly readiness model using buyer-side evidence and limited supplier inputs rather than deep developer system integration.
    - A paid pilot produces a measurable customer result such as 25% fewer diligence cycles, earlier risk escalation, or faster fallback decisions within 6 months.
    - At least 2 advanced-nuclear or adjacent firm-clean-power programs want the same workflow, proving the company is not dependent on Helion-specific fusion volume.
    - Production deployments can hold software-like economics by reducing implementation effort materially after the first few pilots.
  diligenceQuestions:
    - Which executive actually controls pilot and production budget in the first 10 target accounts?
    - What milestone evidence are buyers contractually entitled to receive from developers before commercial operation?
    - How much value must the product show before customers demand deeper integration with Primavera, Aconex, or grid-data tools?
    - Will owner's engineers and utilities actively use a standardized readiness pack, or will the workflow remain buyer-only?
    - How quickly can the company broaden into advanced nuclear if fusion timelines slip?
operatingAssumptions:
  - assumption: Buyers will pay for a separate readiness system even when they already use consultants, Primavera, Aconex, or internal PMO tooling.
    basis: research.yaml
    validationTest: Close at least 2 paid pilots in accounts that already use incumbent tools and document agreed KPI baselines before deployment.
    decisionImpact: If false, the company should reposition as a services-enabled module inside an incumbent stack rather than a standalone platform.
  - assumption: Buyer-side evidence, milestone checklists, and shared diligence rooms are sufficient to create trusted risk signals before deep supplier integrations are available.
    basis: idea.yaml
    validationTest: On 2 design-partner campuses, maintain weekly readiness updates for 90 days with stakeholder acceptance and no critical blind spots caused by missing data.
    decisionImpact: If false, onboarding cost rises and the product must narrow to customers with stronger contractual data rights or deeper implementation budgets.
  - assumption: The same ontology can win adjacent advanced-nuclear programs within the first 12 months.
    basis: research.yaml
    validationTest: Generate at least 2 qualified advanced-nuclear opportunities and convert 1 into a paid pilot or design partnership by month 12.
    decisionImpact: If false, the addressable market stays too narrow and the company should limit fundraising ambitions or broaden into other first-of-kind firm-power assets faster.
  - assumption: Owner's engineers, utilities, and counterparties will engage with standardized readiness artifacts once a buyer deploys the product.
    basis: research.yaml
    validationTest: Run one pilot where an owner's engineer or utility counterpart reviews the readiness pack and confirms it reduces bespoke diligence iterations.
    decisionImpact: If false, expansion revenue from counterparty reporting will be slower and the roadmap should stay focused on buyer-only workflows.
  - assumption: The business can reach gross margin above 70% after the first few deployments by standardizing onboarding, evidence templates, and review cadences.
    basis: operator judgment
    validationTest: By the fourth production deployment, reduce implementation hours per campus by at least 30% versus the first pilot while maintaining customer outcomes.
    decisionImpact: If false, pricing or hiring must shift toward a more services-heavy model with lower venture attractiveness.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: Interview 12-15 hyperscaler, colo, owner's-engineer, and interconnection leaders working on first-of-kind firm-power programs.
    hypothesis: The sharpest buying trigger is a campus launch or tenant commitment that depends on novel firm power arriving on time.
    successMetric: 10 interviews confirm a named budget owner, current workflow, and one measurable pilot KPI.
    owner: CEO
  - horizon: "0–90 days"
    experiment: Build a readiness ontology and evidence checklist from one fusion-style and one advanced-nuclear workflow.
    hypothesis: A shared milestone model can cover enough of both categories to support one product wedge rather than two separate tools.
    successMetric: 80% of required buyer-side milestones and evidence fields map cleanly across both workflow types in design-partner review.
    owner: Product lead
  - horizon: "90–180 days"
    experiment: Run the first paid pilot on one active campus with weekly readiness reviews and explicit fallback-decision tracking.
    hypothesis: A read-only control tower can surface actionable risk sooner than spreadsheets and consultant reviews.
    successMetric: One signed paid pilot and at least one customer-acknowledged risk or diligence cycle improvement within the pilot term.
    owner: CEO
  - horizon: "90–180 days"
    experiment: Test a shared readiness pack with one owner's engineer or utility-interface team on the pilot account.
    hypothesis: Standardized evidence artifacts reduce bespoke status requests and make the product useful beyond the buyer team.
    successMetric: One external stakeholder adopts the pack and the pilot account reports fewer ad hoc diligence loops.
    owner: Solutions architect
  - horizon: "6–12 months"
    experiment: Launch one advanced-nuclear design-partner motion using the same ontology and reporting workflow.
    hypothesis: Adjacent first-of-kind firm-power buyers will adopt the same product without a major rebuild.
    successMetric: 2 qualified advanced-nuclear opportunities and 1 paid pilot or contracted design partnership.
    owner: Founder seller
  - horizon: "12–18 months"
    experiment: Convert the first pilot into production and expand into one second campus or one counterparty reporting module.
    hypothesis: If the product becomes the customer's weekly readiness record, expansion follows naturally before the first asset reaches operation.
    successMetric: One production subscription closed and one expansion sale inside the same account or ecosystem.
    owner: GTM lead
operations:
  - Baseline every pilot on current diligence-cycle time, milestone visibility gaps, and fallback-decision latency before deployment.
  - Keep the platform read-only at first so customers can adopt it without changing developer, utility, or PM system permissions.
  - Run weekly cross-functional readiness reviews with energy, infrastructure, and interconnection stakeholders and a monthly executive checkpoint with the economic buyer.
  - Standardize evidence templates, red-yellow-green rules, and escalation paths so the same operating cadence can scale across campuses and technologies.
  - Maintain integrations with schedule, document, and grid-intelligence sources only where they improve decision speed on active programs.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the readiness ontology, evidence model, and integrations that make the wedge product defensible.
  - role: Product and domain lead
    startTiming: Month 0
    rationale: Converts fusion, advanced-nuclear, interconnection, and buyer diligence workflows into a coherent product and review cadence.
  - role: Founder seller
    startTiming: Month 0
    rationale: Owns enterprise discovery, closes design-partner pilots, and turns first proof points into a repeatable beachhead narrative.
  - role: Solutions architect
    startTiming: Month 3
    rationale: Reduces implementation risk by codifying evidence requirements, onboarding playbooks, and stakeholder review workflows.
  - role: GTM lead
    startTiming: Month 12
    rationale: Added after first pilot proof exists to scale founder-led sales, ecosystem referrals, and account expansion without outrunning product fit.
milestones:
  - horizon: "0–12 months"
    items:
      - Sign 2 paid design-partner pilots in the defined buyer-side beachhead
      - Convert at least 1 pilot into a production subscription with a named KPI improvement
      - Validate one reusable ontology that covers both a fusion-style and an advanced-nuclear workflow
      - Establish one repeatable owner's-engineer or developer referral motion
  - horizon: "12–24 months"
    items:
      - Reach 3-4 production customers across hyperscaler, colo, or adjacent firm-power accounts
      - Launch counterparty reporting for lenders, insurers, or utilities using the same readiness graph
      - Reduce onboarding effort materially with reusable templates, evidence packs, and integrations
      - Publish the first cross-project benchmark set on delay signals and fallback decision timing
  - horizon: "24–36 months"
    items:
      - Reach roughly $6.0M ARR equivalent with about 4 production customers and expansion revenue
      - Become the default readiness workflow for the chosen first-of-kind firm-power beachhead before broadening further
      - Expand into additional campuses within at least 2 flagship accounts
      - Prove the platform can support multiple first-of-kind power categories without becoming a custom services business
risks:
  - risk: Commercial fusion and adjacent first-of-kind firm-power deal volume stays too small to support venture-scale customer count.
    likelihood: High
    impact: High
    mitigation: Expand into advanced nuclear early, qualify adjacency demand by month 12, and keep hiring tied to proof of multi-program demand.
  - risk: Buyers continue to rely on consultants, internal PMOs, and horizontal project software instead of funding a separate control tower.
    likelihood: High
    impact: High
    mitigation: Sell on one explicit KPI tied to campus schedule protection, require paid pilots, and position the platform as the system of record above existing tools rather than a rip-and-replace.
  - risk: Supplier milestone evidence is incomplete or politically sensitive, limiting the product's ability to create trusted forecasts.
    likelihood: Medium
    impact: High
    mitigation: Start with buyer-side evidence rights and shared diligence workflows, then deepen integrations only where a customer can secure recurring data access.
  - risk: Interconnection and utility delays dominate outcomes so completely that customers view the product as a reporting layer, not a decision system.
    likelihood: Medium
    impact: Medium
    mitigation: Tie readiness explicitly to fallback actions, utility coordination, and scenario planning so the product influences decisions even when supplier timing is uncertain.
  - risk: Deployments become too services-heavy because each campus requires bespoke taxonomy mapping and stakeholder process design.
    likelihood: High
    impact: Medium
    mitigation: Constrain the beachhead, standardize evidence templates aggressively, and hire solutions architecture before broadening product scope.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of core product engineering, domain product work, early solutions architecture, and founder-led enterprise sales to win 2 paid design-partner pilots, convert the first production account, and prove expansion beyond fusion-only workflows into a repeatable first-of-kind firm-power software category.
