    upsideCase: 维持基础招聘节奏，并借合作伙伴放大交付杠杆
    y3RevenueImpactK: 100.0
    cashImpactK: -250.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      BuyerPipeline --> PaidPilots
      PaidPilots --> ProductionAccounts
      ProductionAccounts --> ExpansionModules
      ProductionAccounts --> Revenue
      ExpansionModules --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基础情景的收入，来自 Y1 的两个付费试点、Q4Y2 的 3 个正式生产客户，以及 Q4Y3 第 4 个放大账户加扩张模块，把混合 ACV 推到约 $1.5M。
  - checkName: 必须成立的前提
    finding: 公司至少得把 1 个聚变试点和 1 条相邻先进核能工作流，转成可复用的正式生产模板；否则过窄的初始切口撑不起 Y2 管线。
  - checkName: 模型失效条件
    finding: 如果销售周期被拉到接近 12 个月、混合 ACV 又停在 $1.15M 左右，下行情景会在下一轮融资前把现金打到负数。
  - checkName: 下一轮融资证明点
    finding: 一个可信的种子轮故事，是到 Q4Y2 做到 3 个正式生产客户、拿下 1 个非聚变相邻客户，并让上线工作量明显下降。
sanityChecks:
  ruleOf40: Y3 增速 103.9% + EBITDA 利润率 -0.1% = 103.8%
  burnMultiple: Y2 burn multiple 为 0.3x（$639K 净烧钱 / $1.94M 净新增 ARR），到 Y3 改善到约 0.0x（$5K 烧钱 / $2.72M 净新增 ARR）。
  revenuePerFte: 按 Q4Y3 的 13 FTE 计算，Y3 人效约为 $400K（企业 SaaS 基准为 $200–400K）。
  flags:
    - 基础情景到 Q4Y3 也只做到 4 个放大客户，所以只要丢掉或拖迟 1 个客户，收入就会被明显压缩。
    - 毛利率假设的前提，是到第 4 次部署时上线流程已经标准化；如果每座园区都还得重新定制，模型就会变得太重服务。
    - CAC、流失率和回本周期都只能看方向，因为 GTM 仍是创始人主导，模型里的客户基数也还很小。
    - 现金按 EBITDA 来近似，没有纳入企业回款时点、递延收入，也没算任何更深层集成带来的 capex。
