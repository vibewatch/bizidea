fundingAsk:
  round: pre-seed
  amountM: 2.3
  runwayMonths: 24
  milestone: 做到 3 个正式生产客户，验证 1 条相邻先进核能工作流，并把上线流程标准化到足以在还剩约 6 个月现金时进入种子轮融资。
  useOfFunds:
    - bucket: 工程
      amountUsd: 1000000
      percentage: 43
    - bucket: GTM
      amountUsd: 650000
      percentage: 28
    - bucket: G&A
      amountUsd: 250000
      percentage: 11
    - bucket: 缓冲（6 个月）
      amountUsd: 400000
      percentage: 18
scenarios:
  downside:
    description: 聚变时间线后移，相邻先进核能切口转化更慢，模型到 Y3 结束时只有 3 个放大的正式生产客户。
    y3RevenueK: 3825.0
    y3EbitdaK: -930.0
    cashLowPointK: -145.0
    keyAssumptionChanges:
      - 第 4 个正式生产客户推迟到模型期之后，Y3 混合 ACV 最高只到约 $1.15M。
      - 由于实施仍然偏重服务，毛利率只能到 67%。
      - 为了撑住灯塔客户，交付能力仍得继续补，所以招聘节奏基本贴着基础情景走。
  base:
    description: 两个付费试点在 Y1 带来首个正式生产客户，公司在 Q4Y2 做到 3 个正式生产客户，第 4 个放大账户加扩张模块把 Y3 推到接近盈亏平衡。
    y3RevenueK: 5200.0
    y3EbitdaK: -5.0
    cashLowPointK: 768.0
    keyAssumptionChanges:
      - 随着 1 个旗舰账户扩张、高级报告开始变现，Y3 混合 ACV 可做到约 $1.5M。
      - 客户数在 Q4Y2 达到 3 个、Q4Y3 达到 4 个，与商业计划里程碑和研究文件的 SOM 一致。
      - 只要上线模板和证据包标准化跑通，毛利率就能稳在 70%。
  upside:
    description: 开发商和业主工程师带来的转介绍缩短了销售周期，第 4 个客户更早落地，且有 1 个旗舰账户在 Y3 扩到第二个园区。
    y3RevenueK: 6100.0
    y3EbitdaK: 420.0
    cashLowPointK: 920.0
    keyAssumptionChanges:
      - 如果扩张更早发生、对手方高级报告跑起来，Y3 混合 ACV 大约能到 $1.7M。
      - 第 4 个正式生产客户在 Q1Y3 就到位，而不是拖到年中。
      - 到第 4 次部署时，实施复用被证明跑得通，毛利率提升到 72%。
