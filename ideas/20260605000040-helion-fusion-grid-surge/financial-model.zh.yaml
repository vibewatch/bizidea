slug: fusion-delivery-readiness-os
date: '2026-06-05'
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-06
    unit: month
    source: '[BP date] 模型起始月份与商业计划同月。'
  - id: A2
    name: 种子前轮交割后的期初现金
    value: '2300'
    unit: USDK
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M and runwayMonths 18] 基础情景采用 $2.3M 的种子前轮融资，按创业财务现金规划的经验值，覆盖跑到 Q4Y2 证明点所需资金，并额外预留 6 个月缓冲。'
  - id: A3
    name: 模型里的客户单位
    value: 一个处于就绪管理下的活跃付费园区项目
    unit: definition
    source: '[BP businessModel.unitOfValue] 和 [BP gtm pricing] 都表明，产品应按活跃园区项目收费，而不是按席位。'
  - id: A4
    name: 客户爬坡节奏
    value: Y1 月度期末客户数 [0,0,0,1,1,1,1,1,1,2,2,2]；Y2–Y3 季度期末客户数 [2,3,3,3,4,4,4,4]
    unit: customers
    source: '[BP milestones] 假设 Y1 有 2 个付费试点、Q4Y2 做到 3 个正式客户、Q4Y3 做到 4 个正式客户，与研究文件里的 SOM 保持一致。'
  - id: A5
    name: 付费试点定价
    value: '45'
    unit: USDK per month
    source: '[BP gtm pricing and investorMemo.firstCustomer.initialContract] 采用 4–6 个月、$150K–$300K 试点区间的中位数。'
  - id: A6
    name: 正式合同爬坡
    value: Y1 转正式账户的年化收入约 $1.0M；到 Q4Y2，单客户混合正式收入节奏年化约 $1.16M；到 Q4Y3，单客户混合收入节奏年化约 $1.55M
    unit: annualized revenue per customer
    source: '[BP gtm pricing] 锚定 $750K–$1.25M 的订阅加实施区间；[research market.som] 锚定 Y3 成熟阶段单客户约 $1.5M ACV（含扩张模块）。'
  - id: A7
    name: 扩张渗透率
    value: 40% 的成功正式账户会在 12 个月内新增第二个园区或高级报告模块
    unit: percent of accounts
    source: '[BP gtm funnelTargets] 假设成功账户里，40%+ 能在 12 个月内从首个园区扩到第二个项目。'
  - id: A8
    name: 目标毛利率
    value: '70'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct] 和 [BP operatingAssumptions] 表明，只要前几次部署后标准化跑通，软件 + 实施的综合毛利率可做到 70%。'
  - id: A9
    name: 获客成本
    value: '350'
    unit: USDK per new production customer
    source: '[BP gtm channels and funnelTargets] 再叠加高触达企业销售、重领域方案设计、差旅和试点支持的创业财务经验值，得到这一 CAC 假设。'
  - id: A10
    name: 月流失率
    value: '1.5'
    unit: percent
    source: 这是针对早期企业工作流软件、客户基数还很小场景的创业财务经验假设；公司目前还没有可观测的留存历史。
  - id: A11
    name: 含税含福利的年薪区间
    value: Founder $216K；工程 $228K；产品/领域 $204K；解决方案 $192K；GTM/销售 $216K；运营/G&A $144K
    unit: USDK annual payroll
    source: '[BP team] 再叠加创业财务经验值：税费和福利约把工资负担抬高 20%。'
  - id: A12
    name: 招聘节奏
    value: M1 创始人 + 创始工程师 + 产品/领域负责人；M4 解决方案架构师；M7 第 2 名工程师；M12 GTM 负责人；M16 第 3 名工程师和 AE；M19 第 2 名解决方案成员；M22 运营；M25 第 2 名产品/领域成员；M28 第 2 名 AE；M31 第 3 名解决方案成员；M34 第 4 名工程师
    unit: hire timing
    source: '[BP team] 和 [BP strategicChoices.sequencingRationale] 都要求：GTM 扩招要落后于产品证明点，交付能力则随正式账户出现而补上。'
  - id: A13
    name: 销售与营销费用爬坡
    value: Y1 为 $125K，Y2 为 $312K，Y3 为 $510K
    unit: USDK per year
    source: '[BP gtm] 依赖创始人主导直销、差旅、尽调支持和生态转介绍建设；预算采用保守的企业外勤销售经验值。'
  - id: A14
    name: 研发非工资开支爬坡
    value: Y1 为 $112K，Y2 为 $204K，Y3 为 $300K
    unit: USDK per year
    source: '[BP operations] 只读集成、证据室工具和工作流基础设施，需要不算夸张但会持续上升的软件与外包开支。'
  - id: A15
    name: G&A 开支爬坡
    value: Y1 为 $118K，Y2 为 $159K，Y3 为 $252K
    unit: USDK per year
    source: 这是针对面向关键基础设施客户销售的风投支持型企业软件公司的创业财务经验值，覆盖法务、保险、财务和行政支持。
  - id: A16
    name: 现金换算方法
    value: 基础情景里，现金大致跟着 EBITDA 走
    unit: policy
    source: 创业财务经验假设：由于 BP 和研究文件未给出相关信息，模型不纳入债务、capex 和营运资金时点。
