reportMemo:
  executiveTakeaways:
  - 'The wedge is real because hyperscalers are already contracting first-of-kind firm power before delivery workflows are mature: Helion-Microsoft at 50 MW, Google-Kairos at 500 MW, and Amazon-X-energy at multi-gigawatt ambition [1][23][25].'
  - The buyer pain is not generic energy procurement; it is schedule protection for AI campuses facing transmission, substation, and utility lead times that can add two to six years to delivery [12][13][16].
  - A specialist control tower can win if it unifies milestone evidence, interconnection assumptions, and fallback plans better than the consultant-plus-Primavera stack that buyers use today [14][29][30].
  - 'This is strategically attractive but initially narrow: direct commercial fusion deal volume is still small, so the product likely needs to cover advanced nuclear and adjacent first-of-kind firm clean assets from the start [19][23][25].'
  marketDefinition: The initial market is buyer-side execution software for first-of-kind, 24/7 clean-power procurements tied to AI campuses. It sits after the headline contract and before commercial operation, linking developer milestones, interconnection assumptions, regulatory evidence, and fallback generation decisions. Helion, Google-Kairos, and Amazon-X-energy show buyers are already signing novel firm-power deals ahead of standardized delivery playbooks [1][23][25].
  customerAndBuyer: The economic buyer is the VP-level energy or infrastructure executive at a hyperscaler or large colo developer whose campus launch depends on a novel firm-power source arriving on time. The daily user is the energy-procurement, interconnection, or owner's-engineer team currently stitching together consultant memos, schedule tools, and grid data while coping with multi-year power bottlenecks [12][13][14][16].
  buyingTriggers:
  - point: A board-approved AI campus needs a credible answer on whether contracted firm power can be counted in the launch plan.
    sourceRefs:
    - 1
    - 12
    - 13
  - point: A first-of-kind reactor or fusion deal creates milestone, diligence, and acceptance-test work that generic renewable procurement tools do not cover.
    sourceRefs:
    - 1
    - 23
    - 24
    - 25
  - point: Transmission or substation timelines start to exceed the campus schedule, forcing earlier fallback decisions on grid, gas, storage, or other bridge options.
    sourceRefs:
    - 13
    - 16
    - 17
  willingnessToPay:
    summary: Willingness to pay should be high because the software sits next to decisions that protect multi-hundred-megawatt campuses from delay. CBRE documents that constrained power can extend delivery by two to four years and in some cases six; JLL highlights transmission bottlenecks; adjacent construction platforms already sell on custom enterprise quotes, implying buyers are accustomed to paying material software budgets when schedule risk is large [12][13][28][29][30].
    sourceRefs:
    - 12
    - 13
    - 28
    - 29
    - 30
  competitiveLandscape: There is no clear category leader for fusion delivery readiness. The real substitutes are horizontal project-controls suites (Primavera/Aconex, Procore), ontology-heavy enterprise platforms (Palantir Foundry), and grid-data vendors (Enverus, Yes Energy). Each covers part of the stack, but none is purpose-built to convert first-of-kind firm-power milestones into buyer-side launch confidence [28][29][30][31][32][33].
  incumbentThesis:
  - incumbentClass: Construction PM suites
    point: Oracle and Procore organize schedules, documents, and field workflows well, but they do not encode fusion-specific evidence gates, utility assumptions, or fallback-power triggers by default.
    sourceRefs:
    - 28
    - 29
    - 30
  - incumbentClass: Enterprise ontology platforms
    point: Palantir can model the workflow, but it is sold as a flexible operating system rather than a packaged product for energy-procurement teams.
    sourceRefs:
    - 33
  - incumbentClass: Power analytics vendors
    point: Enverus and Yes Energy are strong on queue, siting, and market intelligence, but they are not buyer-side systems of record for supplier milestones and acceptance evidence.
    sourceRefs:
    - 31
    - 32
  - incumbentClass: Consultants and owner's engineers
    point: Consultants can produce periodic diligence, but they do not create a continuously updated audit trail shared across buyers, utilities, insurers, and developers.
    sourceRefs:
    - 13
    - 14
    - 29
  regulatoryLandscape: Washington has moved early to classify fusion within clean-energy policy and to clarify siting options for fusion facilities, which lowers near-term uncertainty for projects like Orion. But Helion itself argues that site-by-site licensing will not scale, and the broader U.S. framework still sits within an NRC-and-Agreement-State materials regime that remains fragmented for fleet deployment [7][20][21][22].
  technologyLandscape: Helion's differentiation is direct electricity recovery from pulsed FRC plasmas rather than a conventional thermal cycle. That could simplify plant design if it works, and the company reports private-sector D-T and temperature milestones, but independent reporting still frames the timeline as aggressive because commercial-scale proof remains outstanding [4][5][9].
  distributionChannels:
  - point: Direct enterprise selling into hyperscaler and colo energy teams when a campus business case depends on novel firm power.
    sourceRefs:
    - 1
    - 12
    - 13
  - point: Design-partner deployments with owner's engineers, EPC, and utility-interface teams working on first-of-kind power programs.
    sourceRefs:
