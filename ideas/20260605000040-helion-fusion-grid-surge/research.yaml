openQuestions:
- How many additional hyperscaler or colo buyers are in active diligence for first-of-kind fusion or advanced nuclear deals but have not disclosed them publicly?
- What milestone evidence are buyers contractually entitled to receive from Helion or comparable developers between signing and commercial operation?
- Will utilities accept a shared buyer-side readiness packet as part of large-load coordination, or will the workflow stay bespoke by territory?
- Can the product expand into advanced nuclear or geothermal quickly enough if commercial fusion volume stays thin through 2028?
