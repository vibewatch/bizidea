market:
  tam:
    value: $180.0M
    rationale: Estimate = roughly 120 concurrent North American first-of-kind firm-power delivery programs by 2030 × $1.5M annual control-tower spend. Unit count is anchored to JLL's 10 GW global 2025 data-center break-ground forecast and visible multi-site orderbooks from Google-Kairos and Amazon-X-energy, then narrowed to a North American, campus-scale execution-software wedge; spend benchmark uses custom-quote enterprise infrastructure software analogs [12][23][25][28][29].
    isEstimate: true
    sourceRefs:
    - 12
    - 23
    - 25
    - 28
    - 29
  sam:
    value: $30.0M
    rationale: Estimate = about 25 near-term North American programs where first-of-kind firm clean power is realistic in the next 3-5 years × $1.2M annual spend. This includes initial fusion, advanced nuclear, and closely adjacent buyer-side deployments supported by current public procurement signals [1][23][24][25][27].
    isEstimate: true
    sourceRefs:
    - 1
    - 23
    - 24
    - 25
    - 27
  som:
    value: $6.0M
    rationale: Estimate = 4 enterprise customers by year 3 at roughly $1.5M ACV each, such as one flagship hyperscaler, two colo or developer programs, and one adjacent lender/utility workflow. That is aggressive but reachable if one buyer logo converts the category from concept to standard diligence tooling [1][12][13][25].
    isEstimate: true
    sourceRefs:
    - 1
    - 12
    - 13
    - 25
