competitors:
- name: Oracle Primavera + Aconex
  stage: incumbent
  wedge: Enterprise scheduling, document control, common data environment, and auditable capital-project workflows.
  pricing: Custom enterprise pricing
  strength: Deep adoption in complex infrastructure with strong schedule discipline and audit trails.
  weaknessVsUs: Not packaged for first-of-kind power procurement, technical milestone evidence, or fallback-energy decisions.
  sourceRefs:
  - 29
  - 30
- name: Procore
  stage: incumbent
  wedge: End-to-end construction collaboration with broad owner and contractor adoption.
  pricing: Custom quote with unlimited users
  strength: Strong field-office collaboration and project-lifecycle visibility.
  weaknessVsUs: Oriented to construction execution, not utility interconnection logic or supplier-readiness gating for novel power assets.
  sourceRefs:
  - 28
- name: Palantir Foundry
  stage: incumbent
  wedge: Ontology-driven enterprise operating system for complex data and workflow integration.
  pricing: Custom enterprise pricing
  strength: Can model complex cross-functional operational systems and decision loops.
  weaknessVsUs: High-services and generic; does not arrive with a purpose-built fusion or firm-power readiness ontology.
  sourceRefs:
  - 33
- name: Enverus Power & Renewables
  stage: incumbent
  wedge: Power-market, queue, siting, and grid-constraint analytics for asset developers and traders.
  pricing: Custom enterprise subscription
  strength: Strong external market intelligence on where projects can be built and what delays to expect.
  weaknessVsUs: Better for market intelligence than for cross-party milestone management and acceptance evidence.
  sourceRefs:
  - 31
- name: Yes Energy Infrastructure Insights
  stage: incumbent
  wedge: North American infrastructure-project intelligence for generation, transmission, and load centers.
  pricing: Custom enterprise subscription
  strength: Rich forward-looking project database useful for siting and infrastructure context.
  weaknessVsUs: Provides context, not the buyer-side control tower that manages supplier obligations, regulators, and fallback plans.
  sourceRefs:
  - 32
