  - 从签约到商业运行之间，买方按合同究竟有权向 Helion 或相似开发商索取哪些里程碑证据？
  - 公用事业公司会不会接受一套共享的买方就绪材料，作为大负荷协同的一部分，还是每个地区都得继续定制？
  - 如果到 2028 年商业聚变体量仍偏薄，产品能否足够快地扩进先进核能或地热？
