  fiveForces: &id001
    supplierPower:
      score: 4
      rationale: 能提供首台套稳定清洁电力的可信供应方本来就少，而公用事业公司与项目开发商又掌握着买方所需的里程碑、并网数据和现场访问权 [1][7][25]。
      sourceRefs:
        - 1
        - 7
        - 25
    buyerPower:
      score: 5
      rationale: 早期买家大概率只是少数几家超大规模云厂商和大型托管开发商，议价权极强，而且随时可以继续沿用顾问和通用工具 [12][13][23]。
      sourceRefs:
        - 12
        - 13
        - 23
    threatOfEntrants:
      score: 3
      rationale: 今天的直接品类竞争者不多，但 Oracle、Palantir 和分析供应商都已有相邻能力；一旦需求被证明，它们完全可以把能力延伸进这条工作流 [29][30][31][33]。
      sourceRefs:
        - 29
        - 30
        - 31
        - 33
    threatOfSubstitutes:
      score: 5
      rationale: Excel、业主工程师、Primavera/Aconex 以及市场数据平台已经覆盖了问题的一部分，所以创业公司必须明显优于这套拼装栈。
      sourceRefs:
        - 28
        - 29
        - 30
        - 32
    competitiveRivalry:
      score: 2
      rationale: 现在还没有谁真正坐稳“聚变交付软件”类别龙头；竞争主要来自相邻基础设施软件，而不是一个正面对打的专业对手。
      sourceRefs:
        - 29
        - 30
        - 33
  pestle: &id002
    - factor: 政治
      impact: positive
      point: 联邦和州层面的决策者已经明确把聚变商业化当成战略能力，这让买方侧执行基础设施的时点更成熟了 [18][19][21]。
      sourceRefs:
        - 18
        - 19
        - 21
    - factor: 经济
      impact: positive
      point: AI 驱动的数据中心需求和电力稀缺，正在抬高排期滑坡的代价，也提高了客户为保住上线日期而采购执行工具的意愿 [10][12][13]。
      sourceRefs:
        - 10
        - 12
        - 13
    - factor: 社会
      impact: neutral
      point: 社区支持很关键：Helion 在 Orion 项目上反复强调与公众和部落社区的沟通，说明利益相关方流程质量会直接影响部署可信度 [3][7]。
      sourceRefs:
        - 3
        - 7
    - factor: 技术
      impact: negative
      point: 直电聚变仍是技术上很新的路线，所以买方需要一套系统，把不确定的原型机进展翻译成商业就绪信号 [4][5][9]。
      sourceRefs:
        - 4
        - 5
        - 9
    - factor: 法律
      impact: neutral
      point: 华盛顿州正在把聚变选址规则讲清楚，但跨州部署依然落在碎片化的 NRC 与 Agreement State 材料监管体系里 [20][21][22]。
      sourceRefs:
        - 20
        - 21
        - 22
    - factor: 环境
      impact: positive
      point: 超大规模云厂商正通过先进核能和聚变协议来锁定 24/7 无碳电力，这在环境和电网脱碳叙事上都形成顺风 [1][23][25]。
      sourceRefs:
        - 1
        - 23
        - 25
  adoptionFrictionMatrix: &id003
    - friction: 商业聚变的初始交易量偏低
      severity: high
      affectedBuyer: 创业公司自身与超大规模云厂商共创客户
      mitigation: 把销售范围扩成更广的首台套稳定电力执行工作流，让产品从第一天起就能覆盖先进核能和相邻稳定清洁资产。
      sourceRefs:
        - 1
        - 19
        - 25
    - friction: 买方已经依赖顾问和 PMO 工具
      severity: high
      affectedBuyer: VP Energy 与业主工程师团队
      mitigation: 把产品定位成跨参与方的事实系统，连接排程、证据、并网和兜底触发条件，而不是替换掉每个现有工具。
      sourceRefs:
        - 28
        - 29
        - 30
    - friction: 供应商里程碑数据可能不完整或政治敏感
      severity: high
      affectedBuyer: 采购与尽调团队
      mitigation: 先从买方证据清单和共享尽调室做起，再用减少重复请求来换取供应商参与。
      sourceRefs:
        - 7
        - 24
        - 27
    - friction: 电网和输电假设会独立于反应堆进展而变化
      severity: medium
      affectedBuyer: 并网团队与园区开发商
      mitigation: 把排队和基础设施情报接进排程关口，让兜底动作在园区日期滑坡前就触发。
      sourceRefs:
        - 13
        - 16
        - 17
        - 32
