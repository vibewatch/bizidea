categoryDynamics:
  growthRate: JLL 基线：全球数据中心市场到 2027 年 CAGR 为 15%；Goldman 基线：2025–2028 年数据中心电力需求 CAGR 为 17%
  growthRateSourceRefs:
    - 10
    - 12
  tailwinds:
    - point: AI 工作负载正在推高负荷增长，任何能更快锁定可靠新增电力的工作流，战略价值都会被抬高。
      sourceRefs:
        - 10
        - 11
        - 12
    - point: 超大规模云厂商已经在技术尚未成熟前就签先进稳定电力协议，这带来了主流可再生能源采购里原本不存在的执行工作。
      sourceRefs:
        - 1
        - 23
        - 25
    - point: 联邦和州层面的商业化项目，正在让聚变和先进核能更具部署可行性，也会随着时间推高买方就绪工作流数量。
      sourceRefs:
        - 18
        - 19
        - 21
        - 22
  headwinds:
    - point: 无论供应商进展如何，输电和并网瓶颈都可能主导项目时间线，这会让产品边界和责任归属更复杂。
      sourceRefs:
        - 15
        - 16
        - 17
    - point: 商业聚变时间线仍未被证明，所以最初的客户池可能在未来几年里依然很小。
      sourceRefs:
        - 4
        - 9
        - 19
    - point: 横向现有厂商已经占住了工作流的部分环节，创业公司必须证明自己是一个明确新类别，而不是重服务叠加层。
      sourceRefs:
        - 28
        - 29
        - 30
        - 33
competitors:
  - name: Oracle Primavera + Aconex
    stage: 现有厂商
    wedge: 企业级排程、文档控制、公共数据环境和可审计的大型资本项目工作流。
    pricing: 企业定制定价
    strength: 在复杂基础设施里渗透深、排期纪律强、审计链也成熟。
    weaknessVsUs: 但它不是为首台套电力采购、技术里程碑证据或兜底电力决策而打包设计的。
    sourceRefs:
      - 29
      - 30
  - name: Procore
    stage: 现有厂商
    wedge: 端到端建设协同平台，在业主和承包商侧覆盖面广。
    pricing: 定制定价，用户数不限
    strength: 现场与办公室协同强，项目全周期可见性好。
    weaknessVsUs: 它偏向建设执行，不处理公用事业并网逻辑，也不适合给新型电力资产做供应商就绪关口管理。
    sourceRefs:
      - 28
  - name: Palantir Foundry
    stage: 现有厂商
    wedge: 以本体驱动的企业操作系统，擅长复杂数据与工作流集成。
    pricing: 企业定制定价
    strength: 可以建模复杂的跨职能运营系统和决策闭环。
    weaknessVsUs: 服务重、产品泛，不会自带一套专门为聚变或稳定电力就绪设计的本体。
    sourceRefs:
      - 33
  - name: Enverus Power & Renewables
    stage: 现有厂商
    wedge: 为资产开发商和交易方提供电力市场、排队、选址与电网约束分析。
    pricing: 企业订阅定制定价
    strength: 在外部市场情报上很强，能告诉你哪里能建、可能会延多少。
    weaknessVsUs: 它更像市场情报工具，而不是跨参与方里程碑管理和验收证据系统。
    sourceRefs:
      - 31
  - name: Yes Energy Infrastructure Insights
    stage: 现有厂商
    wedge: 覆盖北美发电、输电和负荷中心的基础设施项目前瞻数据库。
    pricing: 企业订阅定制定价
    strength: 项目数据库丰富，很适合做选址和基础设施背景判断。
    weaknessVsUs: 它给的是背景信息，不是替买方管理供应商义务、监管方和兜底方案的控制塔。
    sourceRefs:
      - 32
regulatoryTechnicalConstraints:
  - point: 华盛顿州的聚变部署规则正在改善，但跨州商业化仍取决于 NRC 和 Agreement State 材料监管如何演进，才能支撑可重复部署。
    sourceRefs:
      - 7
