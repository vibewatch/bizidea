      - 22
  - point: 即便发电技术进展很快，并网和输电时间线依然长到足以主导交付风险。
    sourceRefs:
      - 15
      - 16
      - 17
  - point: Helion 仍需把原型机里程碑转成稳定、可商业交付的电力，所以对买方而言，技术证据设计是核心能力。
    sourceRefs:
