modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      BuyerPipeline --> PaidPilots
      PaidPilots --> ProductionAccounts
      ProductionAccounts --> ExpansionModules
      ProductionAccounts --> Revenue
      ExpansionModules --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from two paid pilots in Y1, 3 production customers by Q4Y2, and a fourth scaled account plus expansion modules reaching roughly $1.5M blended ACV by Q4Y3.
- checkName: Must go right
  finding: The company must convert one fusion pilot and one adjacent advanced-nuclear workflow into reusable production templates or the narrow initial wedge will not support the Y2 pipeline.
- checkName: Model breaks if
  finding: If sales cycles stretch toward 12 months and blended ACV stays near $1.15M, the downside case turns cash negative before the next financing.
- checkName: Next-round proof
  finding: A credible seed story is 3 production customers, one adjacent non-fusion logo, and visibly lower onboarding effort by Q4Y2.
sanityChecks:
  ruleOf40: Y3 growth 103.9% + EBITDA margin -0.1% = 103.8%
  burnMultiple: Y2 burn multiple 0.3x ($639K net burn / $1.94M net new ARR), improving to ~0.0x in Y3 ($5K burn / $2.72M net new ARR).
  revenuePerFte: $400K Y3 using Q4Y3 13 FTE (benchmark $200-400K enterprise SaaS).
  flags:
  - The base case still depends on only 4 scaled customers by Q4Y3, so losing or delaying one logo meaningfully compresses revenue.
  - Gross margin assumes onboarding standardizes by the fourth deployment; if each campus stays bespoke, the model becomes too services-heavy.
  - CAC, churn, and payback are directional because the go-to-market motion is founder-led and the modeled logo base is still very small.
  - Cash is modeled as EBITDA and excludes enterprise collection timing, deferred revenue, and any capex tied to deeper integrations.
