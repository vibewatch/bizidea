assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: month
  source: '[BP date] model starts in the same month as the business plan.'
- id: A2
  name: Opening cash after pre-seed close
  value: '2300'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M and runwayMonths 18] base case uses a $2.3M pre-seed sized to reach the Q4Y2 proof point plus a 6-month buffer using a startup-finance cash-planning heuristic.'
- id: A3
  name: Modeled customer unit
  value: one active paid campus program under readiness management
  unit: definition
  source: '[BP businessModel.unitOfValue] and [BP gtm pricing] price the product per active campus program rather than by seat.'
- id: A4
  name: Customer ramp
  value: Y1 monthly customers EOP [0,0,0,1,1,1,1,1,1,2,2,2]; Y2-Y3 quarterly customers EOP [2,3,3,3,4,4,4,4]
  unit: customers
  source: '[BP milestones] assume 2 paid pilots in Y1, 3 production customers by Q4Y2, and 4 production customers by Q4Y3 consistent with the researched SOM.'
- id: A5
  name: Paid pilot pricing
  value: '45'
  unit: USDK per month
  source: '[BP gtm pricing and investorMemo.firstCustomer.initialContract] uses the midpoint of a $150K-$300K pilot over 4-6 months.'
- id: A6
  name: Production contract ramp
  value: Y1 converting account at ~$1.0M annualized, Q4Y2 blended production run-rate at ~$1.16M annualized per customer, Q4Y3 blended run-rate at ~$1.55M annualized per customer
  unit: annualized revenue per customer
  source: '[BP gtm pricing] anchors the $750K-$1.25M subscription plus implementation range; [research market.som] anchors Y3 maturity at roughly $1.5M ACV per customer including expansion modules.'
- id: A7
  name: Expansion penetration
  value: 40% of successful production accounts add a second campus or premium reporting within 12 months
  unit: percent of accounts
  source: '[BP gtm funnelTargets] first campus→second program expansion within 12 months in 40%+ of successful accounts.'
- id: A8
  name: Target gross margin
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] and [BP operatingAssumptions] standardization after the first few deployments supports a 70% software-plus-implementation gross margin.'
- id: A9
  name: Customer acquisition cost
  value: '350'
  unit: USDK per new production customer
  source: '[BP gtm channels and funnelTargets] plus startup-finance heuristic for high-touch enterprise sales with domain-heavy solutioning, travel, and pilot support.'
- id: A10
  name: Monthly churn
  value: '1.5'
  unit: percent
  source: Startup-finance heuristic for early enterprise workflow software with a small logo base; the company has no observed retention history yet.
- id: A11
  name: Burdened annual salary bands
  value: Founder $216K; engineering $228K; product/domain $204K; solutions $192K; GTM/sales $216K; ops/G&A $144K
  unit: USDK annual payroll
  source: '[BP team] plus startup-finance heuristic that adds roughly 20% payroll burden for taxes and benefits.'
- id: A12
  name: Hiring schedule
  value: M1 founder+founding eng+product/domain; M4 solutions architect; M7 second engineer; M12 GTM lead; M16 third engineer and AE; M19 second solutions hire; M22 ops; M25 second product/domain; M28 second AE; M31 third solutions hire; M34 fourth engineer
  unit: hire timing
  source: '[BP team] and [BP strategicChoices.sequencingRationale] keep GTM scale hires behind product proof and add delivery capacity as production accounts appear.'
- id: A13
  name: Sales and marketing spend ramp
  value: Y1 $125K, Y2 $312K, Y3 $510K
  unit: USDK per year
  source: '[BP gtm] founder-led direct sales with travel, diligence support, and ecosystem referral development; budget uses a conservative enterprise field-selling heuristic.'
- id: A14
  name: R&D non-payroll spend ramp
  value: Y1 $112K, Y2 $204K, Y3 $300K
  unit: USDK per year
  source: '[BP operations] read-only integrations, evidence-room tooling, and workflow infrastructure require modest but rising software and contractor spend.'
- id: A15
  name: G&A spend ramp
  value: Y1 $118K, Y2 $159K, Y3 $252K
  unit: USDK per year
  source: Startup-finance heuristic for legal, insurance, finance, and office/admin support on a venture-backed enterprise software company selling into critical infrastructure buyers.
- id: A16
  name: Cash conversion method
  value: Cash roughly follows EBITDA in the base case
  unit: policy
  source: 'Startup-finance heuristic: model excludes debt, capex, and working-capital timing because the BP and research files do not specify them.'
