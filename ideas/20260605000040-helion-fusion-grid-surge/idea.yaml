differentiator: >-
  Existing energy software either helps buy commodity power or manage generic construction projects. This company is purpose
  built for first-of-kind fusion delivery, where the buyer needs one place to connect developer milestones, technical
  assumptions, and fallback campus actions long before power is flowing. Its moat is the readiness dataset on how direct-electric
  fusion projects actually progress and which signals predict a missed energization date.
