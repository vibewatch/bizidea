problem: >-
  Hyperscalers and AI-campus developers that want first-of-kind fusion power still manage the deal through spreadsheet-based
  procurement trackers, consultant memos, and ad hoc utility meetings. That is a poor fit for a project where manufacturing
  milestones, plant construction, direct-electricity integration, and fallback power plans all determine whether promised
  megawatts actually arrive on schedule. Generic renewable procurement tools help sign a contract, but they do not give the
  buyer a live system of record for delivery readiness once the offtake is tied to a novel plant.
targetUser:
  primary: Head of Energy Procurement or VP Power Delivery at a North American hyperscaler or colocation platform evaluating its first 25 to 75 MW direct-electric fusion offtake for a 2028 AI campus expansion
  secondary: Interconnection and owner’s-engineer teams coordinating utility studies, substation design, and fallback power planning for the same campus
  buyer: VP Energy, Chief Development Officer, or GM of data-center infrastructure at the offtaker
startupThesis:
  nonObviousInsight: >-
    The next fusion bottleneck is not convincing the market that fusion could matter someday. It is helping first buyers act
    like program managers for a real power delivery date, where factory capacity, construction progress, grid-interface
    assumptions, and fallback energy plans must stay aligned for years before first electron delivery.
  beachhead: North American hyperscaler and colocation power-delivery teams that have signed or are evaluating their first direct-electric fusion offtake for a single AI campus planned to energize in 2028 or 2029
  wedge: A fusion delivery readiness OS that ties supplier milestones, plant construction evidence, interconnection assumptions, capacity ramps, and fallback power plans into one buyer-side control tower
  whyNowCatalyst: Helion’s financing, explicit manufacturing build-out, Microsoft agreement, and 2028 target date show that commercial fusion has entered the planning horizon where buyers need execution software now rather than science updates.
  ventureScalePath: >-
    Start with buyer-side readiness for first fusion contracts, then expand into insurer, lender, utility, and developer
    workflows for other first-of-a-kind firm clean power assets where commercial success depends on milestone proof and
    interconnection readiness rather than commodity generation analytics.
solution: >-
  Build a system of record for fusion offtake execution after the press release but before first power. The product gives
  buyers a milestone graph that links factory expansion, Orion construction, utility interfaces, substation assumptions,
  commercial acceptance tests, and backup procurement into one readiness view. It also standardizes what evidence the buyer
  needs from the fusion developer at each stage and flags where schedule slip will force new diesel, gas, storage, or grid
  bridge decisions for the campus. Over time, the company becomes the benchmark layer for how first-of-a-kind firm-power
  projects actually move from signed agreement to dependable delivered megawatts.
goToMarketSeed:
  firstCustomer: A North American hyperscaler or large colocation operator with a named AI campus expansion that is considering a first direct-electric fusion offtake and needs a credible internal plan for 2028 power availability
  buyingTrigger: A board-approved campus build or tenant commitment depends on whether a first fusion contract can count toward the site’s firm-power plan
  currentAlternative: Internal spreadsheets, renewable-procurement tooling, utility consultants, owner’s-engineer reports, and manual executive reviews
  switchingReason: >-
    The wedge gives the buyer one operational truth source for whether first fusion power will arrive, what assumption is at
    risk, and which fallback actions preserve campus launch dates, which the current consultant-plus-spreadsheet stack cannot
    maintain continuously.
  pricingHypothesis: Annual enterprise subscription per active fusion-backed campus plus implementation fees and premium modules for lender, insurer, and utility reporting
