jobsToBeDone:
  - job: When a hyperscaler signs or evaluates its first fusion-backed power deal, help the power-delivery team track readiness and fallback actions, so they can decide whether the campus launch plan is still credible.
    currentAlternative: Spreadsheet trackers, consultant slide decks, and periodic executive reviews
    successMetric: Days from signed term sheet to complete readiness model and percentage of delivery risks flagged before they move the energization date
  - job: When utilities and internal infrastructure teams review a first fusion campus, help the buyer package milestone evidence and grid assumptions, so they can secure approvals without endless custom diligence loops.
    currentAlternative: Bespoke memos from owner’s engineers and manual data-room updates
    successMetric: Time to complete internal approval or interconnection review and number of diligence cycles per project
ideaScorecard:
  signalStrength:
    score: 5
    rationale: The cluster combines a large financing, a named hyperscaler buyer, explicit manufacturing expansion, and a near-term delivery target.
  painIntensity:
    score: 4
    rationale: Missing a first fusion delivery date will not just waste admin time; it can strand AI capacity plans and force expensive backup procurement.
  wedgeClarity:
    score: 5
