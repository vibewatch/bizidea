topRisks:
  - name: Fusion deal volume stays thin
    description: Commercial fusion offtake programs may ramp slower than expected, limiting early customer count.
    mitigation: Start with the few highest-urgency buyer programs and design the workflow so it extends into advanced nuclear, geothermal, and other first-of-kind firm-power deliveries.
  - name: Buyers default to consultants
    description: Hyperscalers may lean on owner’s engineers and internal PMOs instead of adding a new software layer.
    mitigation: Position the product as the live system of record that sits above consultants and preserves readiness intelligence between meetings, reviewers, and campuses.
  - name: Developers resist transparency
    description: Fusion developers may not want to expose enough milestone evidence for buyers to monitor delivery risk in detail.
    mitigation: Start on the buyer side with required evidence checklists and shared data-room workflows, then earn developer participation by reducing repetitive diligence burden.
