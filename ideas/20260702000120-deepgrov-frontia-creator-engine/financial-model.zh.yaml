assumptions:
  - id: A1
    name: 预种子轮融资规模决定起始现金
    value: "3500"
    unit: USD thousands
    source: "[business-plan.yaml fundingAsk.targetFundingRangeUsd: $3-4M;建模融资额取区间中位数]"
  - id: A2
    name: 混合生产环境 ACV/ARPU
    value: "250"
    unit: USD thousands per customer per year
    source: "[business-plan.yaml market.som 与 investorMemo.firstCustomer.initialContract(年度平台支出 $200k-$300k);research.yaml 的 SOM 测算采用 $250k 混合 ACV]"
  - id: A3
    name: 共创客户试点费用
    value: "50"
    unit: USD thousands per 90-day pilot
    source: "[business-plan.yaml investorMemo.firstCustomer.initialContract:付费 90 天试点区间为 $40k-$75k;取区间中位数]"
  - id: A4
    name: 目标毛利率/COGS 比例
    value: "70"
    unit: percent gross margin (30% COGS)
    source: "[business-plan.yaml businessModel.targetGrossMarginPct: 70]"
  - id: A5
    name: 创始团队招聘计划与启动月份
    value: "创始人/CEO 第 0 个月;创始工程师 第 0 个月;产品/创作者运营负责人 第 1 个月;AI 平台工程师 第 3 个月;信任与安全/解决方案负责人 第 4 个月;客户经理 第 12 个月"
    unit: role start month
    source: "[business-plan.yaml team[] startTiming fields]"
  - id: A6
    name: 各岗位满载年化薪资
    value: "创始人/CEO $150k;工程 $185k;产品与创作者运营 $150k;信任与安全/解决方案 $155k;销售 AE $170k OTE"
    unit: USD thousands per FTE per year
    source: "[heuristic:典型的美国远程 AI 创业公司预种子/种子阶段满载薪酬水平;business-plan.yaml 与 research.yaml 均未提供,标注为行业经验估算]"
  - id: A7
    name: 非人力平台基础设施与合规开支
    value: "Y1 每月 $50-60k,Y2 每季度 $200-230k,Y3 每季度 $260-290k"
    unit: USD thousands
    source: "[heuristic:云端/推理成本、语音与审核厂商最低消费,以及 research.yaml 监管类信源(FTC 语音克隆规则、C2PA、欧盟 AI 法案、NIST 生成式 AI 框架)与 business-plan.yaml 中多模态推理/人工复核成本压缩风险所隐含的法务合规支出;源文件中并无具体金额]"
  - id: A8
    name: 新客户签约节奏
    value: "Y1 签下 3 个共创客户,外加 Y1 末的 1 个试点;Y2 新增 5 个试点,达到 8-10 个生产客户;Y3 新增 3 个试点,达到约 12 个生产客户"
    unit: count per year
    source: "[business-plan.yaml milestones:0-12 个月“签下 3 个共创客户”和“转化 3-5 家客户应用”;12-24 个月“做到 8-10 个生产客户应用”;24-36 个月“做到约 12 个生产客户,年化合同收入 $3.0M”]"
  - id: A9
    name: 试点转生产环境的转化时间
    value: "试点开始后约 3 个月(与 90 天试点周期对齐)"
    unit: months
    source: "[operator judgment:与 business-plan.yaml gtm.pricing 的 90 天试点结构,以及 12 个月内 3-5 个生产转化的里程碑目标相一致的经验估算]"
  - id: A10
    name: 月度客户流失率(仅用于 LTV/回本计算)
    value: "1.5"
    unit: percent per month (avg customer life ~66.7 months)
    source: "[heuristic:不存在留存数据;business-plan.yaml 执行摘要明确指出“研究层面在留存率、抽成比例、题材结构上仍缺乏扎实证据”;该数值仅用于 unitEconomics,不计入客户数爬坡]"
  - id: A11
    name: 混合三年期 CAC
    value: "72.9"
    unit: USD thousands per new logo
    source: "[derived:本模型三年期销售与市场总支出($874.2k)除以签约新客户总数(12),反映上述人力与薪资假设]"
  - id: A12
    name: AE 到岗前创始人销售时间分配
    value: "40"
    unit: percent of Founder/CEO payroll allocated to sales & marketing
    source: "[heuristic:business-plan.yaml gtm.channels 将创始人主导外拓列为主渠道,直到第 12 个月首位 AE 入职]"
  - id: A13
    name: 融资规模测算
    value: "18 个月现金跑道支撑到 0-12 个月生产转化里程碑,外加约 6 个月缓冲"
    unit: months
    source: "[business-plan.yaml fundingAsk.runwayMonths: 18 and useOfFundsSummary]"
  - id: A14
    name: 第三年 SOM 目标
    value: "3.0"
    unit: USD millions ARR, 12 customers
    source: "[business-plan.yaml market.som and milestones 24-36mo]"
  - id: A15
    name: 用于校验客户数量的 SAM 客户上限
    value: "50"
    unit: count of beachhead accounts
    source: "[research.yaml SAM calc: about 50 target accounts x $250k = $12.5M SAM]"
