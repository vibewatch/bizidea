modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Outbound & warm intro leads] --> Discovery[Discovery calls]
      Discovery --> Pilots[Paid 90-day design-partner pilots, ~$50k fee]
      Pilots --> Production[Production customers, ~$250k ACV]
      Production --> ARR[Annualized contracted revenue]
      ARR --> GrossProfit[Gross profit at 70% margin]
      GrossProfit --> Cash[Cash balance]
      Cash --> Reinvest[Reinvest in engineering & GTM headcount]
      Reinvest --> Pilots
modelSanity:
  - checkName: 收入引擎
    finding: 收入的驱动方式,是把约 $50k、90 天的共创客户试点,转化为约 $250k 的年度生产合同——从
      Y1 签下 3 个试点,一路扩展到 Y3 末的 12 个生产客户和约 $3.0M ARR。
  - checkName: 必须走对的一步
    finding: 前 4 个试点里至少要有 3 个,在试点结束后约一个季度内转化为生产环境 ACV,因为整个三年
      爬坡假设创始人主导销售能在没有大额付费营销预算的情况下,把试点转化率维持在约 75%。
  - checkName: 模型会崩的情形
    finding: 只要试点转生产的进度滑动一到两个季度,或流失率超过尚未验证的 1.5%/月经验值,现金就会
      在 Q3Y3 转负(现金低点 -$596k),而且远早于下一轮融资能够交割的时间。
  - checkName: 下一轮融资的证明点
    finding: 到第 24 个月做到 8-10 个生产客户、约 $1.6M ARR,同时仍保有约 $897k 的现金缓冲,这就是
      解锁种子轮/A 轮融资、支撑 Y3 增长所需的证明点。
sanityChecks:
  ruleOf40: "Y3 营收增速 66.9% 加上 Y3 EBITDA 利润率 -53.8%,合计 13.1%,远低于 40% 的及格线——
    对于一个仍在营收之前提前投入的预种子平台来说,这在预期之内,但等生产环境 ACV 在 Y3 之后持续
    复利,值得重新检验。"
  burnMultiple: "Y3 净烧钱 $1,492.5k 除以 Y3 净新增 ARR $1,112.5k,得到 1.34 倍,落在早期 SaaS 常被
    引用的“高效”区间(<1.5 倍)以内,不过这个数字对下文标注的流失率和转化时点简化假设很敏感。"
  revenuePerFte: "Y3 人均营收(FTE)为 $173k(Q4Y3 共 16 名 FTE),低于常被引用的 $200k-$400k SaaS
    基准经验值,反映出 business-plan.yaml 自己也标注为利润率风险的服务密集、人工复核密集型交付模式。"
  flags:
    - "LTV/CAC 约 13.3 倍异常偏高,因为 CAC 几乎完全由创始人的销售时间构成,没有付费营销支出;一旦
      专职 AE 打法规模化,CAC 预计会上升,这个比例会被压缩到更常见的 3-5 倍 SaaS 基准区间。"
    - "客户数假设在三年爬坡期内零流失——1.5%/月的流失率经验值只用于 LTV 和回本周期的计算,并未从
      customersEop 爬坡数字中扣除——考虑到 business-plan.yaml 自己也承认留存数据尚未验证,这是一个
      实质性且偏乐观的简化假设。"
    - "人均营收(Y3 为 $173k)低于 $200k-$400k 的 SaaS 基准经验值,这与 business-plan.yaml 中提到的
      风险一致:多模态推理和人工复核成本会压缩利润率,并迫使交付变得服务密集型。"
