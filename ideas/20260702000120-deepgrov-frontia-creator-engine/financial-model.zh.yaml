scenarios:
  downside:
    description: Y1 前 4 个试点中只有 2 个转化为生产客户(触发 business-plan.yaml 的 killCriteria),
      试点转生产的销售周期拉长到 6 个月,月度流失率从 1.5% 升到 2.5%,滩头市场始终达不到第三年 12
      个客户的完整目标。
    y3RevenueK: 1804.0
    y3EbitdaK: -2172.2
    cashLowPointK: -1400.0
    keyAssumptionChanges:
      - 试点转生产的转化率从约 75%+ 降到约 50%
      - 销售周期从约 3 个月翻倍到约 6 个月
      - 月度流失率经验值从 1.5% 升到 2.5%
  base:
    description: 按当前搭建的三年期模型——Y1 签下 3 个共创客户,3 个转化为 $250k ACV 的生产合同,
      滩头市场到 Y3 末扩展到 12 个生产客户、$3.0M ARR,与 business-plan.yaml 的里程碑一致。
    y3RevenueK: 2775.0
    y3EbitdaK: -1492.5
    cashLowPointK: -595.8
    keyAssumptionChanges:
      - 与建模所用的假设 A1-A15 一致
  upside:
    description: 试点转生产的转化率维持在接近 90%,高级审核与溯源模块把混合 ACV 拉高到 $275k,
      相邻叙事工作室客户的转化速度快于计划,滩头市场到 Y3 末做到 15 个生产客户。
    y3RevenueK: 3746.0
    y3EbitdaK: -900.0
    cashLowPointK: 200.0
    keyAssumptionChanges:
      - 混合 ACV 靠高级模块从 $250k 提升到 $275k
      - Y3 末生产客户数达到 15 个,而非 12 个
      - 月度流失率经验值从 1.5% 改善到 1.0%
