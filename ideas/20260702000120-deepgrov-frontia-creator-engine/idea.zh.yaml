jobsToBeDone:
  - job: >-
      一旦我们决定向外部创作者开放 AI 娱乐应用,就要帮产品和创作者运营团队把角色设定集和素材包
      变成设定安全的付费故事世界,这样才能扩充内容供给,不必再自建一个更大的内部工作室。
    currentAlternative: 内部提示词模板、世界观文档和人工 QA
    successMetric: 从创作者入驻到首次付费上线所需天数,以及无需回滚就通过 QA 的直播会话占比
  - job: >-
      一旦某个创作者作品开始起量,就要帮变现团队调优分支付费点、留存和分成,这样才能把 GMV
      做大到覆盖众多世界,而不是靠一次性爆款过日子。
    currentAlternative: 用表格追踪 GMV,靠临时性的实时运营实验摸索
    successMetric: 每个活跃故事世界的 GMV,以及创作者回本周期
