differentiator: >-
  通用 LLM 创作台能生成场景,但读不懂设定、分支状态、创作者分成或应用级安全阈值。游戏引擎功能
  强大,但对实时 AI 对话和创作者市场运营来说太重。这家公司占据的是原始模型和收入之间的叙事运营层:
  世界观图谱、有防护的记忆、多模态素材编排、变现事件,以及随每个新世界上线不断复利积累的创作者
  质量数据。
