topRisks:
  - name: Creator monetization may not generalize
    description: One early creator revenue anecdote may not translate into broad creator supply or sustained GMV across platforms.
    mitigation: Target customers that already have paid creator cohorts or clear creator waitlists, and prove faster time-to-first-revenue before expanding beyond the first app category.
  - name: Internal-build temptation
    description: Platform operators may see creator tooling as strategic and try to build a lightweight studio stack themselves.
    mitigation: Win on speed-to-launch, deeper canon and safety primitives, and cross-title monetization analytics that are painful to recreate in-house.
  - name: Canon or safety failure
    description: A single off-brand or unsafe branching storyline could damage the customer app and slow creator marketplace adoption.
    mitigation: Start with approval-gated publishing, hard lore constraints, and real-time moderation checkpoints before enabling broad self-serve distribution.
