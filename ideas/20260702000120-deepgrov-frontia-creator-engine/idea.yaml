jobsToBeDone:
  - job: >-
      When we decide to open our AI entertainment app to outside creators, help
      our product and creator-ops team turn character bibles and asset packs
      into canon-safe paid storyworlds, so we can expand content supply without
      building a larger in-house studio.
    currentAlternative: In-house prompt templates, lore docs, and manual QA
    successMetric: Days from creator onboarding to first paid launch and share of live sessions passing QA without rollback
  - job: >-
      When a creator title starts getting traction, help our monetization team
      tune branching offers, retention, and payouts, so we can scale GMV across
      many worlds instead of living off one-off hits.
    currentAlternative: Spreadsheet GMV tracking and ad hoc live-ops experiments
    successMetric: GMV per active storyworld and creator payback period
