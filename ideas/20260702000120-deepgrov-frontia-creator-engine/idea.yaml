differentiator: >-
  Generic LLM studios can generate scenes, but they do not understand canon,
  branching state, creator payouts, or app-level safety thresholds. Game
  engines are powerful but too heavy for live AI conversations and creator
  marketplace operations. This company owns the narrative operating layer
  between raw models and revenue: lore graphs, guarded memory, multimodal asset
  orchestration, monetization events, and creator-quality analytics that
  compound with each launched world.
