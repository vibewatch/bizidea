competitors:
  - name: Inworld AI
    stage: scale-up
    wedge: >-
      Realtime voice AI and character infrastructure for games, media, and characters.
    pricing: >-
      Tiered usage pricing with credits across TTS/STT and separate LLM billing; monthly plans scale from small-team to larger deployment tiers.
    strength: >-
      Strong realtime voice stack plus explicit long-term memory primitives for recurring character interactions.
    weaknessVsUs: >-
      Centered on character runtime, not on approval-gated external creator marketplaces, lore governance across many creators, or payout analytics by title.
    sourceRefs:
      - 22
      - 26
  - name: Convai
    stage: scale-up
    wedge: >-
      Conversational AI for virtual worlds with knowledge banks, character customization, and integrations into 3D environments.
    pricing: >-
      Public pricing page exists, but commercial packaging appears relatively sales-led versus fully transparent self-serve tiers.
    strength: >-
      Rich character customization and knowledge-bank tooling for immersive virtual agents.
    weaknessVsUs: >-
      Feels more like developer tooling for characters than a full creator-program operating layer for monetized story marketplaces.
    sourceRefs:
      - 33
      - 34
      - 35
  - name: Charisma.ai
    stage: scale-up
    wedge: >-
      Interactive conversational experiences for brands, training, and entertainment, delivered through SDKs and managed enterprise workflows.
    pricing: >-
      PRO pay-as-you-go pricing starts at $5 per 50,000 credits, with enterprise fixed monthly platform fees and one-off development support.
    strength: >-
      Strong narrative-interaction layer and a clear enterprise packaging model.
    weaknessVsUs: >-
      Oriented toward bespoke experiences rather than marketplace-scale creator onboarding, moderation operations, and cross-title monetization analytics.
    sourceRefs:
      - 45
  - name: Character.AI creator tooling
    stage: incumbent
    wedge: >-
      Native creator ecosystem with memory, lorebook, creator insights, leaderboards, and discovery tools inside a large consumer network.
    pricing: >-
      Freemium with c.ai+ upsells for extra memory capacity and early-access model features.
    strength: >-
      Direct consumer distribution plus tight creator and user feedback loops on what improves engagement.
    weaknessVsUs: >-
      Not a neutral B2B operating system that other AI entertainment apps can adopt across their own creator programs.
    sourceRefs:
      - 49
      - 50
      - 52
      - 53
