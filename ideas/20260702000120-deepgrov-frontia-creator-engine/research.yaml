openQuestions:
  - >-
    How many AI companion or interactive-story apps will truly open approved external publishing in the next 18 months instead of keeping creation in-house?
  - >-
    Which purchase metric matters most to buyers: faster creator onboarding, higher GMV per world, or fewer safety incidents?
  - >-
    Will top creators prefer platform-specific studios or demand portable tools that can publish across multiple AI entertainment apps?
  - >-
    How much manual review is still required before buyers trust self-serve publishing for voice and video storyworlds?
