        - 99
        - 105
        - 107
        - 111
    - point: >-
        Marketplace payout rails matter because creator programs need onboarding, settlement, and ongoing payout operations, not just content generation.
      sourceRefs:
        - 134
        - 140
  dataMoats:
    - point: >-
        A corpus of lore violations, recovered context, and approved memory patterns across long-running story sessions can become a proprietary canon-governance layer.
      sourceRefs:
        - 26
        - 49
        - 52
        - 62
    - point: >-
        Creator performance, discovery, and retention data across titles can improve template quality and identify which storyworld structures actually monetize.
      sourceRefs:
        - 50
        - 68
    - point: >-
        Moderation outcomes on prompts, assets, and synthetic voices can become reusable policy intelligence that generic studios lack.
      sourceRefs:
        - 53
        - 80
        - 99
        - 107
        - 111
  geographicConsiderations:
    - point: >-
        Korea is an early signal market because DeepGrov shows multimodal AI story experimentation and creator monetization are already investable there.
      sourceRefs:
        - 2
    - point: >-
        India is an important adjacent expansion signal because Pocket FM demonstrates scaled creator payouts and AI-assisted story production in a large consumer storytelling market.
      sourceRefs:
        - 11
        - 79
    - point: >-
        US and EU distribution requires close attention to app-store policy, transparency expectations, and synthetic-voice misuse risk.
      sourceRefs:
        - 147
        - 149
        - 152
        - 153
        - 156
  sensitivityCases:
    - case: AI companion demand concentrates into a few dominant apps
      impact: >-
        If only a small number of consumer winners capture most engagement, the account base shrinks and those buyers gain procurement leverage.
      sourceRefs:
        - 4
    - case: Native creator tooling gets good fast
      impact: >-
        If platforms like Character.AI keep shipping creator insights, lore controls, and discovery features, a third-party OS must win on neutrality and cross-app reuse.
      sourceRefs:
        - 50
        - 52
    - case: Safety burden rises faster than GMV
      impact: >-
        If app stores, regulators, or voice-misuse incidents tighten standards, deployments may stay approval-gated longer and services-heavy onboarding may dominate early revenue.
      sourceRefs:
        - 53
        - 147
        - 152
        - 153
        - 156
        - 157
  validationPlan:
    - priority: high
      question: >-
        How many AI companion or interactive-story apps already have a closed creator cohort, waitlist, or roadmap to public publishing?
      evidenceToGather: >-
        Ten to fifteen buyer interviews plus pipeline data from investors, studio partners, and platform PMs.
    - priority: high
      question: >-
        How much faster can design partners move from creator onboarding to first paid launch compared with in-house tools?
      evidenceToGather: >-
        Pilot-level time-to-live measurements, QA pass rates, and launch-retention data from two or three customer cohorts.
    - priority: medium
      question: >-
        Which review failures dominate early deployments: canon drift, unsafe romance, payout abuse, or voice/identity misuse?
      evidenceToGather: >-
        Approval logs, moderator labels, and rejected-asset samples from initial launches.
