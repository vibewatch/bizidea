slug: canon-safe-storyworld-os
date: '2026-07-02'
executiveSummary: >-
  DeepGrov 上线 Frontia,加上周边创作者经济的证据,都在说明 AI 娱乐应用正从单一爆款作品走向创作者
  市场,但眼下真正紧迫的瓶颈是设定安全的运营能力,而不是原始生成质量。最佳首发客户,是已经跑出
  一款爆款作品、有 20 到 100 名创作者在赚钱或处于内测阶段的、有风投背景的 AI 陪伴或互动故事应用
  ——这类团队比更广泛的消费应用更早感受到世界观漂移、审核风险和分成复杂度带来的痛。切口应该是
  一套审批门控的故事世界操作系统:导入角色设定集、素材包、安全规则和变现逻辑,再帮创作者上线
  分支语音、图像、视频世界,不用逼平台自建更大的内部工作室。创始人主导销售、付费的共创客户试点,
  加上与语音、审核、分成结算厂商的联合销售,正好契合研究到的购买触发点——一款作品变现之后,平台
  正准备创作者内测、市场上线或国际化发布。如果能把试点转化成约 25 万美元的混合年度合同,这门生意
  有望在第三年做到 300 万美元的 SOM、约十几个生产客户,但目前的滩头市场还太窄,不足以支撑重投入
  的市场开拓,除非先跑出可复制的证据。刻意的取舍是:先从受管理的创作者群组、硬性审批关卡和明确
  的复核流程做起,而不是自助发布,因为安全、应用商店合规和品牌一致性从第一天起就是产品的一部分。
  最主要的证伪风险是:未来 18 个月里,真正开放认证外部发布的应用数量太少,或者原生、内部工具在
  中立操作系统积累出数据优势之前就已经足够好用。留存率、抽成比例、题材结构,以及哪些地区最具
  规模化潜力,研究层面仍缺乏扎实证据,所以头 12 个月应该优先做共创客户转化,并验证首次付费上线
  速度、GMV 可见度和低回滚率。
problem:
  - AI 娱乐应用靠一款爆款作品验证了需求,但想扩大外部创作者供给时,通用 LLM 工具靠不住——角色
    设定、分支逻辑、多模态素材一致性和变现规则,在真实发布场景下统统会崩。
  - 小型平台团队被夹在两难之间:自建工具太慢,放任创作者野蛮生长又不安全,人工 QA、审核和分成
    运营让每一个新故事世界的上线成本都居高不下。
solution:
  - 提供一套故事世界操作系统,把角色设定集、素材包、定价规则和安全约束,转化成有引导的创作者
    工作流,用于搭建分支语音、图像、视频世界。
  - 在客户开放自助发布之前,先跑一套受管理的运行时和控制台,处理记忆、世界观治理、审核关卡、
    创作者审批、分成结算和按作品的 GMV 分析。
whyWeWin:
  - 产品卡在原始模型厂商和客户应用之间的运营层,专门解决买家真正在意的失败模式:世界观漂移、
    发布不安全、审批慢、变现分析弱。
  - 受管理的共创客户上线,能沉淀出世界观违规、审核结果和创作者经济的专有数据,这是通用创作台
    和单一作品内部工具都攒不出来的。
  - 这家公司能比客户自建更快取胜,因为它交付的是一套中立工作流,把创作者入驻、审批关卡、运行时
    记忆和分成结算拧在一起,而不是又一个角色生成工具。
strategicChoices:
  beachhead: 已经跑出一款爆款分支故事作品、拥有 20 到 200 名变现或试用创作者、并有资金支持计划
    在 12 个月内开放认证外部发布的消费级 AI 娱乐应用。
  wedgeRationale: >-
    这一细分市场已经承受着内容供给瓶颈带来的预算压力,能用上线天数、QA 通过率和单世界 GMV 快速
    衡量成效;如果一上来就铺向所有创作工具或游戏工作室,买家需求和工作流会分散得太开,反而拖慢
    验证速度。
  sequencingRationale: >-
    先从审批门控的创作者群组、文件或 API 方式导入世界观和素材、由创始人和解决方案团队主导的付费
    试点做起;只有拿下两三个生产客户之后,才把路线图拓展到自助模板、更大规模的销售招聘,以及相邻
    的 IP 方或游戏工作室场景。
  notYet:
    - 直接面向消费者的故事应用,或自有媒体特许经营项目。
    - 在审批门控的创作者群组模式跑通之前,先不做面向未知创作者的完全自助发布。
    - 在 AI 娱乐滩头市场转化成功之前,先不铺开面向游戏工作室、粉丝社区或数字 IP 的广泛工作流。
    - 不与变现、安全和分成绑定的通用提示词创作工具。
market:
  tam: "当前估计 TAM 为 8430 万美元:全球 337 款活跃且已产生营收的 AI 陪伴应用,乘以每套认真部署的创作者运营工具约 25 万美元的年度支出。"
  sam: "估计 SAM 为 1250 万美元:约 50 个符合滩头画像——有爆款作品、有创作者发布路线图——的目标客户,乘以约 25 万美元的年度支出。"
  som: "估计第三年 SOM 为 300 万美元:共创客户转化后,12 个生产客户,平均年度合同价值约 25 万美元。"
  segments:
    - 正围绕一款已验证作品准备认证创作者发布的 AI 陪伴娱乐应用。
    - 希望获得可复制外部创作者供给的互动故事与聊天故事平台,以及小型叙事工作室。
  buyingProcess: >-
    通常是创作者平台或叙事工具负责人,在一款作品或封闭创作者群组开始变现、管理层想要更多供给又
    不想扩建内部工作室之后,牵头推动这个项目。预算一般由产品副总裁或总经理把控,而信任与安全、
    平台工程、财务或创作者运营团队,会在生产环境上线前审查审核管控、运行时架构和分成运营。
product:
  mvp: >-
    一套审批门控的创作者工作台加运行时:导入角色设定集、素材包和政策规则,帮创作者搭建分支多模态
    场景,并在直播会话中强制执行世界观、审核和变现逻辑。MVP 应该包含用于创作者审批、GMV、分成
    结算和违规追踪的平台控制台,但不开放自助发布。
  sixMonth: >-
    为 2 到 3 个共创客户上线世界观导入、分支场景创作、有防护的记忆、审核复核队列、分成报表,以及
    面向受管理创作者群组的按作品仪表盘。
  twelveMonth: >-
    新增可复用模板、基于角色的审批、更深的语音与审核集成、创作者表现分析,并推动前 3 到 5 家付费
    客户应用完成生产环境转化。
  twentyFourMonth: >-
    拓展到多作品组合管理、在现有客户内部实现半自助创作者发布,以及复用同一套设定、审核和变现
    控制平面的相邻数字叙事或 IP 方工作流。
  keyBets:
    - 滩头市场的平台,会先愿意分享角色设定集、素材包和试点创作者数据,而不是一上来就要求漫长的
      企业级集成周期。
    - 从创作者入驻到首次付费上线的时长,是驱动购买决策的 KPI,而不只是一个产品指标。
    - 只要能实质性减少世界观事故和安全事件,买家一开始就能接受审批门控的工作流。
    - 按作品的 GMV 和创作者分成分析,能帮助把预算从实验性或研发性支出,升级为正式预算。
    - 一旦创作者计划做大,跨应用的中立性对买家的价值,会超过使用某个平台专属的内部工具。
gtm:
  wedge: 为围绕一款已验证作品开放审批门控创作者群组的 AI 娱乐应用,做付费的共创客户上线。
  channels:
    - 创始人亲自触达有风投背景的 AI 陪伴与互动故事应用的产品副总裁、总经理和创作者平台负责人。
    - 与已经在塑造实时 AI 娱乐架构的语音、审核和模型厂商建立联合销售与转介合作。
    - 通过参与创作者计划上线的投资人、叙事工作室和市场分成合作伙伴获得热情引荐。
  funnelTargets: "目标:30% 以上的合格外拓客户进入初步接触,25% 以上的初步接触转为付费试点,50% 以上的付费试点转为年度生产合同,70% 以上的试点创作者在入驻 30 天内完成首个付费世界上线。"
  pricing: >-
    先从付费的 90 天共创客户实施加世界观录入实施费起步,再转化为年度平台订阅,并按活跃变现创作者
    数或付费故事场次收取用量费。这套定价对标的是 GMV 增长和风险降低,而不是通用的席位数或模型
    token 用量。
businessModel:
  revenueStreams:
    - 付费的共创客户实施与世界观录入实施费。
    - 面向生产环境创作者计划的年度平台订阅。
    - 按活跃变现创作者数或付费故事场次收取的用量费。
    - 面向审核可审计性、内容溯源和分成运营的高级模块。
  unitOfValue: 一款通过平台运行认证外部创作者发布的生产环境 AI 娱乐应用。
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一客户应用内增加更多作品、创作者群组和业务单元。
    - 一旦 GMV 开始流经平台,就向上销售更深的审核、溯源、记忆和分析能力。
    - 滩头市场验证成功后,从 AI 陪伴应用拓展到互动故事工作室、数字 IP 方和相邻叙事生态。
    - 随着每个客户的付费场次和变现创作者数量增长,提升用量收入。
strategyMap:
  northStarMetric: 每个生产客户每月通过平台运行的付费故事世界场次。
  inputMetrics:
    - 从创作者入驻到首个付费世界上线的天数。
    - 上线世界中无需回滚就通过审批的比例。
    - 单个上线世界的 GMV,以及创作者回本周期。
    - 试点转生产环境的转化率。
    - 每个上线世界所需的人工复核分钟数。
  moatsToBuild:
    - 把众多上线世界的角色规则、记忆例外和设定违规关联起来的世界观治理数据。
    - 与具体提示词、素材和创作者行为绑定的审核与合成媒体政策结果。
    - 能优化模板和上线建议的跨作品创作者表现与变现基准。
    - 覆盖模型、语音、审核和分成通道的实施手册与集成能力。
  killCriteria:
    - "前 15 个合格目标应用中,12 个月内承诺认证外部发布路线图的不足 3 个。"
    - "在两个试点中,产品未能把创作者入驻到首次付费上线的时间,相较客户现有流程缩短至少 50%。"
    - "在完成审批门控后,超过 5% 的试点世界仍因设定或安全事故需要回滚。"
    - "前 4 个付费试点中,转化为年度合同价值超过 15 万美元的生产合同的不足 2 个。"
  mermaid: |
    flowchart LR
      Wedge[Approval-gated creator cohort wedge] --> MVP[Lore ingestion plus creator runtime MVP]
      MVP --> Proof[Faster launch, safer publishing, higher GMV]
      Proof --> Expansion[More titles per app and adjacent narrative markets]
investorMemo:
  verdict:
    call: 观察
    conviction: >-
      工作流痛点清晰,切口也站得住,但目前买家集中度和自建替代的风险,让这个机会在试点转化之前,
      还够不到值得合伙人会议讨论的信心水平。
    whyBelieve: >-
      这家创业公司瞄准的是一个具体的运营瓶颈——设定安全的创作者发布,并与变现和分成绑定——现有
      模型厂商和角色引擎都没有端到端拿下。
    whyDoubt: >-
      近期市场只是一小撮战略级应用,它们可能继续封闭、把创作者留在原生工具里,或者抢在第三方
      操作系统嵌入之前先自建出一套够用的内部技术栈。
    nextDiligence: >-
      拿下 3 个共创客户试点,并证明其中至少 2 个在上线速度、GMV 可见度和回滚率上实质改善后完成
      转化。
  firstCustomer:
    title: 某有风投背景 AI 陪伴应用的创作者平台负责人
    profile: >-
      一款消费级 AI 娱乐应用,已经跑出一款爆款作品,有 20 到 100 名创作者在赚钱或处于内测阶段,
      创作者运营团队规模不大,计划在一年内启动付费外部发布或国际化创作者计划。
    trigger: >-
      一款自研作品或封闭创作者群组开始变现,管理层需要更多供给,否则市场上线或创作者内测就会
      暴露世界观、审核和分成瓶颈。
    buyer: 产品副总裁或总经理
    initialContract: >-
      付费的 90 天试点,金额在 4 万到 7.5 万美元区间外加实施费;如果客户实现了更快的首次付费上线、
      干净的审批流程,以及新世界带来的可衡量 GMV,就转化为约 20 万到 30 万美元的年度平台支出。
  mustBeTrue:
    - 前 15 个合格目标应用中,至少 5 个已经拥有变现创作者群组、候补名单,或有资金支持的认证发布
      计划。
    - 两个试点客户把创作者入驻到首次付费上线的时间,相较其现有内部流程缩短 50% 以上。
    - 审批门控的试点,把设定或安全回滚控制在上线世界的 5% 以下,同时人工复核的工作量保持在可
      运营范围内。
    - 买家接受 20 万美元以上的年度平台定价,是因为产品能扩大 GMV、降低运营风险,而不只是因为
      省了写提示词的时间。
    - 中立的跨应用工具,能在与内部自建和原生创作者工具的较量中赢得足够多次,支撑起可供多客户
      参考的案例。
  diligenceQuestions:
    - 未来 18 个月里,究竟有多少滩头市场的应用会真正开放认证外部发布?
    - 在上线更快、单世界 GMV 更高和审核事故更少这几个 KPI 里,哪一个最先解锁预算?
    - 护栏机制到位之后,每个上线的语音或视频故事世界仍需要多少小时的人工复核?
    - 工作流做到多深,才会让客户选择购买,而不是自建一个范围更窄的内部工具?
    - 创作者想要的是最终能跨多个应用发布的工具,还是原生平台创作台就已经够用?
operatingAssumptions:
  - assumption: 足够多的 AI 娱乐应用正接近创作者市场上线节点,能支撑起可复制的早期销售管道。
    basis: research.yaml
    validationTest: >-
      访谈 15 个目标客户,确认其中至少 5 个有明确的创作者计划路线图、高管发起人,以及 12 个月内
      的计划上线窗口。
    decisionImpact: >-
      如果不成立,公司应该围绕单一旗舰客户维持服务重型模式,或推迟风投式招聘节奏,等赛道成熟
      后再说。
  - assumption: 在留存或抽成分析被验证之前,首次付费世界上线时长是买家愿意投入预算的 KPI。
    basis: operator judgment
    validationTest: >-
      在前 10 通初步接触电话中,请买家给上线速度、GMV 提升和安全事故减少排序;只有当上线速度
      在至少 7 个客户中排进前两位时才继续推进。
    decisionImpact: >-
      如果不成立,路线图优先级应该转向变现分析或安全证据,而不是创作者创作速度。
  - assumption: 只要平台能提升上线速度和审批质量,买家就会从试点转化为约 20 万到 30 万美元的年度
      合同。
    basis: research.yaml
    validationTest: >-
      向 6 个合格买家展示试点转生产环境的商务条款,拿到至少 2 份书面转化标准或定价确认邮件。
    decisionImpact: >-
      如果不成立,公司必须下调 ACV 预期、简化产品,或提前把目标客户范围放宽。
  - assumption: 审批门控发布能把设定和安全事故控制得足够低,让客户未来愿意考虑半自助扩展。
    basis: idea.yaml
    validationTest: >-
      在前 2 个试点中,把需要回滚的设定或安全事故控制在上线世界的 5% 以下,并测量每个世界所需的
      人工复核分钟数。
    decisionImpact: >-
      如果不成立,公司就仍是一门受管理服务型工作流生意,应该推迟对自助路线图的投入。
  - assumption: 一套中立的操作系统,能积累比任何单一客户独立自建更多、更可复用的世界观、审核和
      变现数据。
    basis: idea.yaml
    validationTest: >-
      在 3 个客户上线之后,把模板复用率、审核策略复用率和输赢数据,与客户此前的内部工具进行对比。
    decisionImpact: >-
      如果不成立,防御力就会薄弱,公司应该转向优化服务收入、集成收入或并购定位,而不是追求独立
      平台规模。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 从已经有变现能力和创作者发布路线图的 AI 陪伴或互动故事应用中,招募三个共创客户。
    hypothesis: 滩头市场的痛点足够尖锐,合格买家会先出资或正式立项做试点,而不是先自建。
    successMetric: 签下三份试点意向书或付费试点合同,且都有明确的产品副总裁或总经理担任发起人。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 用现有的角色设定集和素材包,为一个受管理创作者群组跑通世界观导入和审批门控的世界
      上线流程。
    hypothesis: 相较客户现有流程,MVP 能把入驻到首次付费上线的时间缩短至少 50%。
    successMetric: 在至少 10 个上线世界中,从创作者入驻到首个付费世界上线的中位天数下降 50% 以上。
    owner: 创始工程师
  - horizon: 0–90 天
    experiment: 通过初步接触电话,梳理采购决策中心和 KPI 优先级。
    hypothesis: 存在一条经由产品副总裁、总经理或创作者平台负责人的可复制预算路径,而且上线速度是
      首要购买驱动因素。
    successMetric: 十通初步接触电话中,至少七个客户呈现出一致的主要买家和排名前二的 KPI 模式。
    owner: 创始人/CEO
  - horizon: 90–180 天
    experiment: 在实际试点发布中测试审核、内容溯源和语音授权工作流。
    hypothesis: 审批门控管控能把需要回滚的设定或安全事故控制在 5% 以下,同时不让产品沦为纯服务型。
    successMetric: 不到 5% 的试点世界需要回滚,人工复核时间保持在预先约定的运营阈值以内。
    owner: 信任与安全负责人
  - horizon: 90–180 天
    experiment: 集成一条分成结算通道,追踪变现世界的创作者结算准确率。
    hypothesis: 客户会把分成运营视为购买决策的一部分,而不是上线之后才处理的后台问题。
    successMetric: 一个试点在完整的分成周期内完成创作者分成对账,零未解决的结算错误。
    owner: 产品与创作者运营负责人
  - horizon: 180–365 天
    experiment: 把前两个试点转化为年度生产合同,并让一个客户从受管理群组模式扩展到半自助模板模式。
    hypothesis: 一旦最初的创作者群组证明了安全和可变现,同一客户会扩大创作者准入,而不是退回内部
      工具。
    successMetric: 签下两份年度生产合同,一个客户上线半自助创作者模板且回滚率没有上升。
    owner: 创始人/CEO
operations:
  - 在创作者上线前,把角色设定集、素材包、变现规则和审核政策统一整理成带版本管理的世界观图谱。
  - 为设定、安全和合成媒体披露方面的决策,维护审批队列、升级路径和审计日志。
  - 在同一个运营控制台中追踪创作者入驻、分成对账和按作品的 GMV,让创作者供给和变现能被统一管理。
  - 提前集成语音、审核和分成结算厂商,确保成本、授权和执行方面的决策在试点设计阶段就清晰可见。
  - 每月对上线速度、回滚事件、创作者收入和按世界的变现表现做业务复盘。
team:
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 在买家范围狭窄的市场中,负责创始人主导销售、共创客户招募和合作拓展。
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 搭建世界观导入、运行时记忆,以及决定产品可信度的首批试点部署。
  - role: 产品与创作者运营负责人
    startTiming: 第 1 个月
    rationale: 把共创客户的工作流,沉淀成可复制的入驻、审批和变现操作手册。
  - role: AI 平台工程师
    startTiming: 第 3 个月
    rationale: 在试点上线后,优化多模态编排、成本与延迟管控,以及厂商集成。
  - role: 信任与安全/解决方案负责人
    startTiming: 第 4 个月
    rationale: 负责审核政策设计、复核运营,以及高风险语音和视频世界的上线就绪评估。
  - role: 客户经理(AE)
    startTiming: 第 12 个月
    rationale: 只有在两次生产环境转化验证了可复制的试点打法和明确的预算负责人之后,才增加专职
      销售人力。
milestones:
  - horizon: 0–12 个月
    items:
      - 在 AI 陪伴与互动故事滩头市场签下 3 个共创客户。
      - 上线带有可衡量世界观、审核和分成工作流的审批门控创作者群组。
      - 在至少 2 个试点中,证明入驻到首次付费上线的速度提升 50% 以上,且回滚率低于 5%。
      - 把 3 到 5 家客户应用转化为付费生产合同,混合 ACV 约 20 万到 30 万美元。
      - 至少完成一次与语音、审核和分成结算合作伙伴的参考实施。
  - horizon: 12–24 个月
    items:
      - 在核心滩头市场做到 8 到 10 个生产客户应用。
      - 把现有客户扩展到更多作品和半自助创作者模板。
      - 为已上线世界新增创作者表现基准和更深的变现分析。
      - 用同一套控制平面,验证一个相邻细分市场,比如小型数字叙事工作室或数字 IP 方。
  - horizon: 24–36 个月
    items:
      - 做到约 12 个生产客户,年化合同收入达 300 万美元。
      - 在不重建核心世界观与审核技术栈的前提下,为相邻叙事或 IP 方场景推出第二条工作流产品线。
      - 把平台确立为跨多个故事世界组合的创作者发布、分成结算和作品经济的控制平面。
risks:
  - risk: 真正开放认证外部发布的应用数量,比当前论点假设的更少、更慢。
    likelihood: High
    impact: High
    mitigation: 只筛选有资金支持路线图或活跃创作者群组的客户,推迟销售扩张招聘,直到多个试点完成
      转化。
  - risk: 客户认定创作者工具具有战略意义,自建一套够用的内部技术栈,或者继续留在原生平台工具里。
    likelihood: High
    impact: High
    mitigation: 靠上线速度、中立的跨应用复用、审核可审计性和按作品的分成结算做出差异化,而不是靠
      原始生成功能。
  - risk: 线上故事世界发生设定或安全事故,损害客户应用并拖慢创作者计划推进。
    likelihood: Medium
    impact: High
    mitigation: 让早期部署保持审批门控,记录每一次政策决策,并在开放自助扩展之前要求具备回滚和
      升级工作流。
  - risk: 多模态推理和人工复核成本压缩利润率,或迫使部署变得服务密集型。
    likelihood: Medium
    impact: Medium
    mitigation: 把高成本的语音或视频体验留给变现场次,严格计量用量,并在客户间统一复核手册。
  - risk: 创作者或客户更偏好生态专属工具,限制了中立操作系统的价值。
    likelihood: Medium
    impact: Medium
    mitigation: 聚焦那些更看重上线速度和管控能力、而非彻底锁定创作者的平台,并在大规模平台建设
      之前先验证跨应用模板复用。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    为 18 个月的产品建设、共创客户入驻、审核与分成结算集成,以及创始人主导的市场开拓提供资金,
    目标是拿下 3 到 5 家生产客户应用,并验证一条相邻扩展路径。
