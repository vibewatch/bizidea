  - id: A3
    name: Design-partner pilot fee
    value: "50"
    unit: USD thousands per 90-day pilot
    source: "[business-plan.yaml investorMemo.firstCustomer.initialContract: paid 90-day pilot in the $40k-$75k range; midpoint used]"
  - id: A4
    name: Target gross margin / COGS ratio
    value: "70"
    unit: percent gross margin (30% COGS)
    source: "[business-plan.yaml businessModel.targetGrossMarginPct: 70]"
  - id: A5
    name: Founding headcount plan and start months
    value: "Founder CEO M0, Founding eng M0, Product/Creator-Ops lead M1, AI platform engineer M3, Trust & Safety/Solutions lead M4, Account Executive M12"
    unit: role start month
    source: "[business-plan.yaml team[] startTiming fields]"
  - id: A6
    name: Fully loaded annualized salary by role
    value: "Founder/CEO $150k; Engineering $185k; Product & Creator Ops $150k; Trust & Safety/Solutions $155k; Sales AE $170k OTE"
    unit: USD thousands per FTE per year
    source: "[heuristic: typical pre-seed/seed US-remote AI-startup fully-loaded pay bands; not present in business-plan.yaml or research.yaml, labeled as industry heuristic]"
  - id: A7
    name: Non-payroll platform infrastructure & compliance overhead
    value: "$50-60k/month in Y1, $200-230k/quarter in Y2, $260-290k/quarter in Y3"
    unit: USD thousands
    source: "[heuristic: cloud/inference costs, voice and moderation vendor minimums, and legal/compliance spend implied by research.yaml regulatory sources (FTC voice cloning rule, C2PA, EU AI Act, NIST GenAI profile) and business-plan.yaml risk on multimodal inference/human-review cost compression; no dollar figure exists in source docs]"
  - id: A8
    name: New-logo signing cadence
    value: "3 design partners signed in Y1 plus 1 late-Y1 pilot; 5 new pilots in Y2 reaching 8-10 production customers; 3 new pilots in Y3 reaching ~12 production customers"
    unit: count per year
    source: "[business-plan.yaml milestones: 0-12mo 'sign 3 design partners' and 'convert 3-5 customer apps'; 12-24mo 'reach 8-10 production customer apps'; 24-36mo 'reach approximately 12 production customers and $3.0M in annualized contracted revenue']"
  - id: A9
    name: Pilot-to-production conversion timing
    value: "~3 months after pilot start (aligned to the 90-day pilot term)"
    unit: months
    source: "[operator judgment heuristic consistent with business-plan.yaml gtm.pricing 90-day pilot structure and milestones targeting 3-5 production conversions within 12 months]"
  - id: A10
    name: Monthly customer churn (used for LTV/payback only)
    value: "1.5"
    unit: percent per month (avg customer life ~66.7 months)
    source: "[heuristic: no retention data exists; business-plan.yaml executive summary explicitly states 'Research still lacks hard evidence on retention, take rate, genre mix'; used only in unitEconomics, not in the customer-count ramp]"
  - id: A11
    name: Blended 3-year CAC
    value: "72.9"
    unit: USD thousands per new logo
    source: "[derived: this model's 3-year total sales & marketing spend ($874.2k) divided by total new logos signed (12), reflecting the headcount and payroll assumptions above]"
  - id: A12
    name: Founder sales-time allocation pre-AE-hire
    value: "40"
    unit: percent of Founder/CEO payroll allocated to sales & marketing
    source: "[heuristic: business-plan.yaml gtm.channels names founder-led outbound as the primary channel through Month 12 when the first AE joins]"
  - id: A13
    name: Funding ask sizing
    value: "18-month runway to the 0-12mo production-conversion milestone, plus ~6 months of buffer"
    unit: months
    source: "[business-plan.yaml fundingAsk.runwayMonths: 18 and useOfFundsSummary]"
  - id: A14
    name: Year-3 SOM target
    value: "3.0"
    unit: USD millions ARR, 12 customers
    source: "[business-plan.yaml market.som and milestones 24-36mo]"
  - id: A15
    name: SAM account ceiling used to sanity-check logo count
    value: "50"
    unit: count of beachhead accounts
    source: "[research.yaml SAM calc: about 50 target accounts x $250k = $12.5M SAM]"
