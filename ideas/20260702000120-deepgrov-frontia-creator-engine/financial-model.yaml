modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Outbound & warm intro leads] --> Discovery[Discovery calls]
      Discovery --> Pilots[Paid 90-day design-partner pilots, ~$50k fee]
      Pilots --> Production[Production customers, ~$250k ACV]
      Production --> ARR[Annualized contracted revenue]
      ARR --> GrossProfit[Gross profit at 70% margin]
      GrossProfit --> Cash[Cash balance]
      Cash --> Reinvest[Reinvest in engineering & GTM headcount]
      Reinvest --> Pilots
modelSanity:
  - checkName: Revenue engine
    finding: Revenue is driven by converting ~$50k, 90-day design-partner pilots
      into ~$250k annual production contracts, scaling from 3 signed pilots in Y1
      to 12 production customers and roughly $3.0M ARR by the end of Y3.
  - checkName: Must go right
    finding: At least 3 of the first 4 pilots must convert to production ACV
      within about a quarter of pilot completion, since the entire 3-year ramp
      assumes founder-led sales keeps converting pilots at a ~75% rate without a
      large paid-marketing budget.
  - checkName: Model breaks if
    finding: If pilot-to-production conversion slips by even one or two quarters
      or churn exceeds the untested 1.5%/month heuristic, cash turns negative by
      Q3Y3 (cash low point -$596k) well before the next round can close.
  - checkName: Next-round proof
    finding: Reaching 8-10 production customers and about $1.6M ARR by month 24
      while still holding roughly $897k of cash buffer is the proof point that
      should unlock the seed/Series A round needed to fund Y3 growth.
sanityChecks:
  ruleOf40: "Y3 revenue growth 66.9% + Y3 EBITDA margin -53.8% = 13.1%, well below
    the 40% bar - expected for a pre-seed platform still investing ahead of
    revenue, but worth re-testing once production ACV compounds past Y3."
  burnMultiple: "Y3 net burn $1,492.5k / Y3 net new ARR $1,112.5k = 1.34x, inside
    the commonly cited 'efficient' range (<1.5x) for early-stage SaaS, though this
    is sensitive to the churn and conversion-timing simplifications flagged below."
  revenuePerFte: "$173k Y3 revenue per FTE (16 FTE at Q4Y3), below the commonly
    cited $200k-$400k SaaS benchmark heuristic, reflecting the services-heavy,
    human-review-intensive delivery model business-plan.yaml itself flags as a
    margin risk."
  flags:
    - "LTV/CAC of ~13.3x is unusually high because CAC is built almost entirely
      from founder-led time with no paid-marketing spend; expect CAC to rise
      once a dedicated AE motion scales, which would compress this ratio toward
      more typical 3-5x SaaS benchmarks."
    - "Customer counts assume zero churn/attrition over the 3-year ramp - the
      1.5%/month churn heuristic is used only for the LTV and payback
      calculations, not subtracted from the customersEop ramp - a material and
      optimistic simplification given business-plan.yaml's own admission that
      retention data is unproven."
    - "Revenue per FTE ($173k in Y3) sits below the $200k-$400k SaaS benchmark
      heuristic, consistent with business-plan.yaml's risk that multimodal
      inference and human-review costs compress margins and force
      services-heavy delivery."
    - "The $3.5M pre-seed raise, even sized to business-plan.yaml's 18-month
      runway target plus a 6-month buffer, is projected to run out of cash in
      Q3Y3 absent a follow-on round; a seed/Series A raise is required well
      before the Y3 ARR target is reached."
    - "The entire ramp depends on converting roughly 12 of the ~50 SAM accounts
      identified in research.yaml; business-plan.yaml's own kill criteria (fewer
      than 3 of the first 15 qualified accounts committing within 12 months)
      would invalidate this model if triggered."
