scenarios:
  downside:
    description: Only 2 of the first 4 pilots convert to production in Y1 (tripping
      business-plan.yaml killCriteria), pilot-to-production sales cycles stretch to
      6 months, and monthly churn runs at 2.5% instead of 1.5%, so the beachhead
      never reaches the full 12-customer Y3 target.
    y3RevenueK: 1804.0
    y3EbitdaK: -2172.2
    cashLowPointK: -1400.0
    keyAssumptionChanges:
      - Pilot-to-production conversion rate falls to ~50% instead of ~75%+
      - Sales cycle doubles from ~3 months to ~6 months
      - Monthly churn heuristic rises from 1.5% to 2.5%
  base:
    description: The 3-year model as built - 3 design partners sign in Y1, 3
      convert to $250k ACV production contracts, and the beachhead scales to 12
      production customers and $3.0M ARR by the end of Y3, matching business-plan.yaml
      milestones.
    y3RevenueK: 2775.0
    y3EbitdaK: -1492.5
    cashLowPointK: -595.8
    keyAssumptionChanges:
      - Matches assumptions A1-A15 as modeled
  upside:
    description: Pilot-to-production conversion holds near 90%, premium moderation
      and provenance modules lift blended ACV to $275k, and the beachhead reaches
      15 production customers by the end of Y3 as adjacent narrative-studio
      accounts convert faster than planned.
    y3RevenueK: 3746.0
    y3EbitdaK: -900.0
    cashLowPointK: 200.0
    keyAssumptionChanges:
      - Blended ACV rises from $250k to $275k via premium modules
      - Production customer count reaches 15 instead of 12 by end of Y3
      - Monthly churn heuristic improves from 1.5% to 1.0%
