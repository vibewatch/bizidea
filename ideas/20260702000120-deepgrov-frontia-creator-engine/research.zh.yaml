  pricing: TTS/STT 采用分级用量积分计费，LLM 单独计费；月度方案从小团队一路覆盖到更大规模的部署档位。
  strength: 强劲的实时语音技术栈，加上面向重复角色互动的明确长期记忆基础能力。
  weaknessVsUs: 核心是角色运行时，而不是审批门控的外部创作者市场、跨众多创作者的世界观治理，或按作品的分成分析。
  sourceRefs:
  - 22
  - 26
- name: Convai
  stage: scale-up
  wedge: 面向虚拟世界的对话式 AI，带知识库、角色定制，并能集成到 3D 环境中。
  pricing: 有公开定价页面，但商业化打包看起来更偏销售驱动，而不是完全透明的自助档位。
  strength: 面向沉浸式虚拟角色的丰富角色定制和知识库工具。
  weaknessVsUs: 感觉更像是面向角色的开发者工具，而不是面向变现故事市场的完整创作者计划运营层。
  sourceRefs:
  - 33
  - 34
  - 35
- name: Charisma.ai
  stage: scale-up
  wedge: 面向品牌、培训和娱乐的互动对话体验，通过 SDK 和受管理的企业工作流交付。
  pricing: PRO 按量计费方案起价为每 5 万积分 5 美元，另有企业固定月度平台费和一次性开发支持。
  strength: 强劲的叙事交互层，以及清晰的企业打包模式。
  weaknessVsUs: 面向定制化体验，而不是市场规模的创作者入驻、审核运营和跨作品变现分析。
  sourceRefs:
  - 45
- name: Character.AI creator tooling
  stage: incumbent
  wedge: 在庞大的消费者网络内部，提供带记忆、设定集、创作者洞察、排行榜和内容发现工具的原生创作者生态。
  pricing: 免费增值模式，c.ai+ 增值服务提供额外记忆容量和抢先体验的模型功能。
  strength: 直接的消费端分发能力，加上创作者与用户之间紧密的反馈闭环，能清楚知道什么能提升互动度。
  weaknessVsUs: 不是其他 AI 娱乐应用能在自己的创作者计划中采用的中立 B2B 操作系统。
  sourceRefs:
  - 49
  - 50
  - 52
  - 53
regulatoryTechnicalConstraints:
- point: 合成媒体的披露与溯源正在成为明确的期望，尤其是对语音、图像和视频类输出。
  sourceRefs:
  - 147
  - 149
  - 150
- point: 应用商店政策把生成内容的安全性和及时审核，变成了分发就绪的一部分。
  sourceRefs:
  - 152
  - 153
- point: 语音克隆和冒充滥用，给创作者提供的语音素材带来了授权、监控和执行方面的要求。
  sourceRefs:
  - 122
  - 156
  - 157
- point: 跨会话记忆必须在临时的直播会话之外持久化保存，这带来了实实在在的隐私和架构责任。
  sourceRefs:
  - 26
  - 86
  - 146
validationSignals:
- point: DeepGrov 表示，有一位创作者在 Frontia 上线两个月内，月收入就达到约 600 万韩元。
  sourceRefs:
  - 2
- point: Character.AI 正在推出创作者洞察、内容发现工具、记忆升级和设定集管控，说明创作者运营的深度已经是一个竞争层面的问题。
  sourceRefs:
  - 49
  - 50
  - 52
- point: Pocket FM 把规模化的创作者分成，和一套基于 ElevenLabs 的 AI 音频工作流绑在了一起，说明创作者供给工具正从实验阶段走向操作系统阶段。
  sourceRefs:
  - 11
  - 79
- point: Showrunner 展示了相邻赛道的消费需求：不只是聊天陪伴，消费者对 AI 生成的剧集类娱乐同样有胃口。
  sourceRefs:
  - 64
- point: Fortnite 和 Roblox 持续扩大着一个经济证明：创作者分成和创作者支持工具，能够撑起供给侧生态。
  sourceRefs:
  - 15
  - 68
  - 70
openQuestions:
- 未来 18 个月里，究竟有多少 AI 陪伴或互动故事应用会真正开放认证外部发布，而不是把创作留在内部？
- 买家最看重的购买指标是什么：更快的创作者入驻、更高的单世界 GMV，还是更少的安全事故？
- 头部创作者会更偏好平台专属创作台，还是会要求能跨多个 AI 娱乐应用发布的可移植工具？
- 在买家信任语音和视频故事世界的自助发布之前，还需要多少人工复核？
