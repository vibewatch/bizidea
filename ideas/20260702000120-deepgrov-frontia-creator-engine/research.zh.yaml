  adoptionFrictionMatrix:
  - friction: 长故事会话中的设定漂移
    severity: high
    affectedBuyer: 创作者平台或叙事工具负责人
    mitigation: 持久化结构化的世界观，锁定关键事实，并在发布前复核高风险分支。
    sourceRefs:
    - 26
    - 49
    - 52
    - 62
  - friction: 未成年人安全，以及不安全的情感线或自我伤害类边缘情形
    severity: high
    affectedBuyer: 信任与安全负责人或产品副总裁
    mitigation: 年龄感知模型、分层分类器、人工复核队列，以及严格的发布政策。
    sourceRefs:
    - 53
    - 80
    - 147
    - 152
    - 153
  - friction: 创作者分成与入驻的复杂度
    severity: medium
    affectedBuyer: 变现或财务运营负责人
    mitigation: 从一开始就使用市场分成通道、明确的验证流程和分成仪表盘。
    sourceRefs:
    - 70
    - 134
    - 140
  - friction: 实时多模态的成本与延迟
    severity: medium
    affectedBuyer: 平台工程负责人
    mitigation: 从审批门控的高级世界起步，严格计量用量，把高保真语音或视频留给变现场次。
    sourceRefs:
    - 22
