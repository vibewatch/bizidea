topRisks:
- name: OEM 捆绑
  description: Bear 或其他机器人厂商可能自己推出基础版工作流编辑器，顺手把运营方关系也抓走。
  mitigation: 坚持跨车队中立，卖更难做的运营方层：院区模板、审计轨迹和多院区基准——这些能力通常不是 OEM 工具擅长泛化的。
- name: 医院工作流差异过大
  description: 每个院区的电梯规则、厨房布局和污染控制政策都可能不同，导致部署过于依赖服务。
  mitigation: 先只做非临床餐饮支持服务里的一个工作流家族，把前十次上线沉淀成固定模板和连接器。
- name: 操作能力可靠性爬坡太慢
  description: 如果实物处理在真实设施里一直很脆弱，客户可能会推迟把自动化扩到配送之外。
  mitigation: 先以混合人机交接的工作流系统切入，让客户在完全自治之前，也能从仿真、异常分流和完成证明里拿到价值。
