differentiator: 服务场景里的机器人软件，大多不是做车队监控，就是按院区一单一单卖定制部署。这家公司抓的是运营方那一层：把导航车队升级成多步骤 physical workforce 所需的可复用模板、污染控制逻辑、人机交接和完成证明。它的护城河，会长在跨院区工作流基准和异常数据上——这些信息单个医院系统、OEM 或集成商都看不全。
