jobsToBeDone:
- job: 当一家医院已经证明机器人能稳定送餐时，帮我们的支持服务团队把托盘回收和备餐间重置也接进来，这样我们扩自动化时，就不用每个院区都从零重设计。
  currentAlternative: 由厂商主导的定制上线方案，加上人工班次核对清单。
  successMetric: 从项目批准到下一家医院上线机器人辅助餐后重置，花了多少周。
- job: 当一个餐次结束时，帮院区负责人确认每个托盘、推车和备餐间补货任务都已完成或已升级处理，这样下一餐开始前，不会因为加班或缺货被拖慢。
  currentAlternative: 人工巡查、主管对讲机沟通，以及纸质或电子表格清单。
  successMetric: 有多少餐次能在规定时间启动，而且所需推车与备餐间库存都已到位。
