problem: 多院区医院后勤团队已经能为餐食、布草和物资配送机器人算清 ROI，但下一步省人的环节——托盘回收、备餐间补货、洁/污推车交接——要求机器人不仅会跑，还得能处理实物。一旦工作流里引入操作能力，运营团队就得按院区逐个定义污染控制规则、电梯顺序、推车身份和人工兜底步骤，而且通常还得靠厂商服务和临时 SOP 拼出来。结果就是：服务机器人明明已经具备做更多事的物理能力，扩张却还是极度手工。
targetUser:
  primary: 美国一家拥有 3–20 家急症医院、已经用室内配送机器人运送餐食、布草或物资的医疗系统里，负责支持服务或餐饮营养的 VP。
  secondary: 负责跨院区统一非临床工作流的区域机器人项目经理，或设施自动化负责人。
  buyer: COO 或 SVP operations。
startupThesis:
  nonObviousInsight: 操作能力到位后，服务机器人率先爆发的扩张场景不会是无边界的人形劳动力，而是楼宇内边界清楚的支持服务闭环。这里导航早已跑通，新瓶颈变成了：怎么把实物交接、污染控制规则和异常恢复打包成可复用的院区模板。Bear-Kinisi 说明，硬件能力终于开始在真实车队里汇合，稀缺层不再是另一台机器人，而是给运营方用的工作流软件。
  beachhead: 先切入已经使用室内配送机器人的美国医疗系统，把患者餐后重置这条线做深：托盘回收、病区备餐间补货、洁/污推车交接，并在 3–12 家医院之间标准化复制。
  wedge: 做一套餐后重置控制平面，把膳食排班、楼层地图、电梯策略、备餐间最低库存线和升级规则，编成机器人可执行的托盘回收与补货工作流，并给出完成证明。
  whyNowCatalyst: Bear 这笔收购把操作能力接进了一个拥有 16,000 台设备的商用服务机器人底盘，而且仍跑在同一套编排栈上；只要工作流配置不再全靠定制，运营方现在就能立刻尝试把机器人扩到物体处理环节。
  ventureScalePath: 先从医院餐后重置切入，再把同一层工作流软件扩到布草补给、药房配送、无菌物资处理，以及养老、酒店、机场零售等场景——前提是服务机器人持续接手更多实物工作。
solution: 餐后重置机器人 OS 会接入膳食生产排班、机器人任务队列、设施地图和支持服务 SOP，生成可复用的托盘回收、推车暂存、备餐间补货和人工升级工作流模板。运营负责人上线新院区时，只要选一个工作流家族、映射本地约束，并在正式上线前先模拟关键交接。进入运营后，产品会跨机器人和人工岗位核验任务是否完成，标出电梯受阻、污染控制断点等异常，并为每个班次生成审计轨迹。时间一长，这家公司会变成“哪些具身 AI 服务工作流真的能跨楼宇、跨厂商跑通”的事实记录系统。
goToMarketSeed:
  firstCustomer: 一家拥有 6–12 家医院的区域医疗系统，已经在餐饮或物资配送里把配送机器人跑起来，并希望在下一个预算周期前，先在两个旗舰院区把托盘回收和病区备餐间重置自动化。
  buyingTrigger: 现有配送机器人项目达到服务或用工目标后，支持服务团队拿到预算，准备把自动化扩到餐次周转，而不是继续追加外包劳动力。
  currentAlternative: 机器人厂商专业服务、人工托盘回收人员、主管核对清单，以及按院区分开维护的电子表格 SOP。
  switchingReason: 首个客户会切换，是因为产品能把一个成功院区沉淀成可复用的工作流模板、完成证明和异常处置打法，让下一家医院直接复用，而不是从头再做一轮工程。
  pricingHypothesis: 按已上线院区收年费，再按每个工作流家族和机器人平台连接器收实施费。
