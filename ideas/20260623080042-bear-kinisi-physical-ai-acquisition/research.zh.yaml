bottomUpSizingDrivers:
- driver: 隶属医疗系统的社区医院
  value: 3,525 hospitals
  source: '[1]'
- driver: 医院餐饮自动化意向
  value: ~50% of surveyed hospital decision-makers pursuing automation initiatives
  source: '[23]'
