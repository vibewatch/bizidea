  source: calc from [21][22][23]
categoryDynamics:
  growthRate: 16.7% CAGR（广义物流机器人代理值）
  growthRateSourceRefs:
  - 25
  tailwinds:
  - point: 头部机器人厂商正从纯导航扩到更丰富的医院工作流，这会抬高对运营方编排层的需求。
    sourceRefs:
    - 10
    - 13
    - 14
  - point: 在人手压力持续存在的情况下，医院已经在用 AI 辅助与数字化工具重做工作流。
    sourceRefs:
    - 2
    - 9
  - point: 餐饮服务自动化之所以被买方明确关注，是因为餐流会直接影响患者体验和运营节奏。
    sourceRefs:
    - 23
    - 35
  headwinds:
  - point: 即便人力痛点真实存在，预算压力和报销缺口仍可能推迟可自由裁量的软件扩张。
    sourceRefs:
    - 3
  - point: 感染控制、安全和楼宇集成要求，让上线速度明显慢于通用 SaaS 部署。
    sourceRefs:
    - 5
    - 6
    - 17
    - 26
    - 27
  - point: 如果机器人还不够稳定，无法从“新鲜事”变成“日常工具”，一线怀疑就不会消失。
    sourceRefs:
    - 15
competitors:
- name: Bear Robotics + Kinisi
  stage: 现有厂商
  wedge: 在同一套编排栈上，把操作能力接进已规模化的室内服务机器人车队。
  pricing: 定制定价；没有公开医疗价目表。
  strength: 已装机底盘大，具身 AI 路线图也可信，能从配送继续扩到实物处理任务。
  weaknessVsUs: 跨院区的运营方工作流层和中立 基准分析 问题，并不是它最自然的重心。
  sourceRefs:
  - 10
  - 11
  - 12
- name: Diligent Robotics / Moxi
  stage: 扩张期
  wedge: 以具身 AI 医院机器人切入院内物流，尤其聚焦药房、实验室和物资配送。
  pricing: 按使用量订阅；没有公开价目表。
  strength: 已证明拥有百万级配送量、医院参考客户，以及被信任的药房链路交接工作流。
  weaknessVsUs: 它仍然是机器人优先、且大多围绕自家车队；而跨院区的餐后重置标准化，是一个更窄的运营工作流问题。
  sourceRefs:
  - 13
  - 14
  - 15
- name: Aethon
  stage: 现有厂商
  wedge: 成熟的医院运输机器人平台，覆盖多个科室，并深度处理电梯协同。
  pricing: 定制定价 / 企业采购与 GSA 式采购。
  strength: 深耕医院场景、在 VA 体系有存在感，并明确把电梯编排当成稀缺资源来做。
  weaknessVsUs: Aethon 很擅长运输基础设施，但并不拥有跨餐后重置闭环的可复用运营模板和完成证明层。
  sourceRefs:
  - 16
  - 17
- name: Relay Robotics
  stage: 扩张期
  wedge: 医院配送机器人，主打快速安装、链路交接，以及药房或实验室的最后一公里配送。
  pricing: 按月 RaaS；Relay 自家材料把配送经济性描述为低至约每小时 $4。
  strength: 有可信的真实案例、可靠性指标，以及围绕人力缓解和药房工作流的强叙事。
  weaknessVsUs: 它仍以配送和机器人本体为中心，对混合服务闭环下的多院区工作流标准化着墨较少。
  sourceRefs:
  - 18
  - 19
  - 20
  - 21
  - 22
regulatoryTechnicalConstraints:
- point: 餐后重置自动化必须守住 CMS 营养服务合规和本地食品安全流程，而不只是让托盘移动得更快。
  sourceRefs:
  - 5
  - 7
- point: 感染控制与环境清洁标准要求系统明确区分洁/污交接逻辑，并保留员工责任边界。
  sourceRefs:
  - 6
  - 28
- point: 一旦多台机器人或多条工作流争抢同一套基础设施，电梯协同就会变成真正的技术瓶颈。
  sourceRefs:
  - 17
  - 18
  - 20
validationSignals:
- point: Diligent 已累计超过 100 万次医院配送，并在 23 个医疗系统、31 个医院级合作中运行。
  sourceRefs:
  - 13
- point: Diligent 车队已完成超过 300,000 次医院药房配送，高量站点每月超过 900 次。
  sourceRefs:
  - 14
- point: Relay 在 BayCare 的部署报告称，三家医院每天 150+ 次配送、每月节省 600+ 小时、可靠性 99.8%。
  sourceRefs:
  - 19
- point: Relay 在 MedStar 的案例里，每天 75–80 次任务，每次药房配送节省 5–10 分钟，ROI 很直观。
  sourceRefs:
  - 20
- point: 受访医院决策者中有一半表示，正在推进餐饮服务自动化项目。
  sourceRefs:
  - 23
openQuestions:
- 按厂商和工作流家族划分，到底有多少美国医院院区已经运行室内配送机器人，而不只是零散新闻稿里的个案？
- 当工作流横跨膳食、设施和护理相邻运营时，餐后重置预算最终归谁？
- 污染控制规则、电梯等待或交接阻塞，究竟会多频繁地打断本来可行的托盘回收或备餐间重置闭环？
- OEM 愿不愿意开放足够的遥测和事件历史，让一层中立工作流控制软件成为系统记录层，而不是另一个浮在上面的叠加层？
