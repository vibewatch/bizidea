    - 20
  - friction: 一线信任与工作流采纳
    severity: 中
    affectedBuyer: 护理与餐饮一线主管
    mitigation: 展示时间返还指标，保留清晰的人工兜底，并把服务恢复过程埋点出来。
    sourceRefs:
    - 15
    - 19
    - 20
    - 23
  - friction: 预算归属横跨膳食、运营和自动化
    severity: 中
    affectedBuyer: COO / 运营财务负责人
    mitigation: 别卖空泛的“AI”，而要对准更少打断、更快重置和更快多院区上线。
    sourceRefs:
    - 2
    - 3
    - 21
    - 23
