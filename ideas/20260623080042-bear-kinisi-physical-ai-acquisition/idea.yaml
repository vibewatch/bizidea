problem: >-
  Multi-hospital support-services teams can already justify indoor delivery
  robots for meals, linens, or supplies, but the next labor-saving step—tray
  return, pantry restock, and clean/dirty cart handoff—requires robots to
  handle objects, not just navigate hallways. Once manipulation enters the
  workflow, operations teams must define contamination rules, elevator
  sequencing, cart identities, and human fallback steps site by site, usually
  with vendor services and ad hoc SOPs. That makes expansion painfully manual
  just as service-robot fleets become physically capable of doing more work.
targetUser:
  primary: "VP of support services or food and nutrition at a U.S. health system running 3-20 acute-care hospitals and already using indoor delivery robots for meals, linens, or supply movement."
  secondary: "Regional robotics program manager or facilities automation lead responsible for standardizing non-clinical workflows across campuses."
  buyer: "COO or SVP operations."
startupThesis:
  nonObviousInsight: >-
    The first breakout service-robot expansion after manipulation arrives will
    not be open-ended humanoid labor. It will be tightly bounded support-service
    loops inside buildings where navigation is already solved and the new
    bottleneck is packaging physical handoffs, contamination rules, and
    exception recovery into repeatable site templates. Bear-Kinisi signals that
    hardware capability is finally converging inside live fleets, so the scarce
    layer becomes workflow software for operators, not another robot.
  beachhead: >-
    Patient meal-service reset for U.S. health systems that already use indoor
    delivery robots and now want tray-return, unit-pantry restock, and
    clean/dirty cart handoff workflows standardized across 3-12 hospitals.
  wedge: >-
    A meal-reset control plane that turns dietary schedules, floor maps,
    elevator policies, pantry par levels, and escalation rules into robot-ready
    tray-return and restock workflows with proof of completion.
  whyNowCatalyst: >-
    Bear's acquisition adds manipulation to a 16,000-unit commercial service
    robot base and keeps the work on the same orchestration stack, so operators
    can attempt object-handling expansions immediately if workflow configuration
    stops being bespoke.
  ventureScalePath: >-
    Start with hospital meal-service reset, then expand the same workflow layer
    into linen replenishment, pharmacy runs, sterile-supply handling, senior
    living, hotels, and airport concessions as service robots take on more
    physical work.
solution: >-
  Meal Reset Robot OS would integrate with dietary production schedules, robot
  task queues, facility maps, and support-service SOPs to generate reusable
  workflow templates for tray pickup, cart staging, pantry replenishment, and
  human escalation. Ops leaders would launch a new campus by selecting a
  workflow family, mapping local constraints, and simulating expected handoffs
  before live rollout. During operations, the product would verify completion
  across robots and staff, flag exceptions like blocked elevators or
  contamination breaks, and produce audit trails for each shift. Over time, the
  company becomes the system of record for which physical-AI service workflows
  actually scale across buildings and vendors.
goToMarketSeed:
  firstCustomer: >-
    A 6-12 hospital regional health system that already has delivery robots live
    in foodservice or supply runs and wants to automate tray-return and
    unit-pantry reset at two flagship campuses before the next budgeting cycle.
  buyingTrigger: >-
    An existing delivery-robot program hits service or labor targets and the
    support-services team gets budget approval to expand automation into meal
    turnover instead of adding more contract labor.
  currentAlternative: >-
    Robot-vendor professional services, manual tray-line runners, supervisor
    checklists, and site-by-site SOP mapping in spreadsheets.
  switchingReason: >-
    The first customer switches because the product converts one successful site
    into reusable workflow templates, completion evidence, and exception
    playbooks that can be rolled out to the next hospital without re-engineering
    everything.
  pricingHypothesis: >-
    Annual subscription per live campus plus implementation fees for each
    workflow family and robot-platform connector.
