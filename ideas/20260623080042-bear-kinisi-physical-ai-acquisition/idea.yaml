topRisks:
  - name: "OEM bundling"
    description: "Bear or rival robot vendors may ship their own basic workflow composer and try to own the operator relationship."
    mitigation: "Stay neutral across fleets and sell the harder operator-side layer—site templates, audit trails, and multi-campus benchmarking—that OEM tools rarely generalize."
  - name: "Hospital workflow variance"
    description: "Each campus may have unique elevator rules, kitchen layouts, and contamination policies that make deployments services-heavy."
    mitigation: "Start with one workflow family in non-clinical meal-service operations and productize the first ten launches into fixed templates and connectors."
  - name: "Manipulation reliability lag"
    description: "If object-handling performance stays brittle in live facilities, customers may delay expansion beyond delivery workflows."
    mitigation: "Land first as the workflow system of record around hybrid robot-human handoffs so customers get value from simulation, exception routing, and completion evidence even before full autonomy."
