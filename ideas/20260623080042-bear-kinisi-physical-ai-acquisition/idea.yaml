differentiator: >-
  Most robotics software for service environments either monitors fleets or
  sells custom vendor deployments one site at a time. This company owns the
  operator-side workflow layer: the reusable templates, contamination logic,
  human handoffs, and completion evidence required to turn a navigation fleet
  into a multi-step physical workforce. Its moat grows from cross-campus
  workflow benchmarks and exception data that no single hospital system, OEM,
  or integrator sees on its own.
