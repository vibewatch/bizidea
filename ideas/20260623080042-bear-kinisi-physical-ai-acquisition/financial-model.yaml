scenarios:
  downside:
    description: Budget ownership stays fragmented and deployments remain more bespoke, leaving the company well below the campus expansion path needed for efficient software economics.
    y3RevenueK: 1540.0
    y3EbitdaK: -963.1
    cashLowPointK: -344.9
    keyAssumptionChanges:
    - Y1 exits with 4 live campuses, Y2 with 10, and Y3 with 18 instead of 24.
    - Blended annual revenue per campus falls from $120K to $110K as more deals stay near pilot pricing.
    - Gross margin slips from 70% to 68% because integrations take more custom work than the packaged connector path assumes.
  base:
    description: Founder-led sales plus early partner channels convert the first paid pilots into a repeatable campus expansion motion while the team stays lean.
    y3RevenueK: 2220.0
    y3EbitdaK: -536.1
    cashLowPointK: 477.1
    keyAssumptionChanges:
    - Campus counts follow A6, A7, and A8, reaching 14 live campuses by Y2 exit and 24 by Y3 exit.
    - Blended annual campus value stays at $120K and gross margin stays at the 70% business-plan target.
    - The team reaches 9 end-of-Y3 FTE, with deployment, partner, and sales hires landing only after the first packaged deployments work.
  upside:
    description: Reference accounts and OEM or integrator referrals speed second-campus launches enough to approach the researched year-3 SOM ceiling with slightly better pricing and margins.
    y3RevenueK: 2880.0
    y3EbitdaK: -89.4
    cashLowPointK: 1169.6
    keyAssumptionChanges:
    - Y1 exits with 8 live campuses, Y2 with 16, and Y3 with 30 as expansion inside health systems pulls forward.
    - Blended annual revenue per campus rises from $120K to $128K as benchmarking or audit modules attach faster.
    - Gross margin improves from 70% to 72% because connector and template reuse reduce deployment effort.
sensitivity:
- variable: ARPU
  downsideCase: Blended annual campus value settles at $110K because customers stay closer to pilot pricing and take longer to add premium modules.
  baseCase: Blended annual campus value holds at the modeled $120K.
  upsideCase: Blended annual campus value rises toward $130K as benchmarking and audit modules attach sooner.
  y3RevenueImpactK: -184.9
  cashImpactK: -203.6
- variable: CAC
  downsideCase: S&M intensity rises from 5% to 6% of Y2-Y3 revenue because each sale needs more on-site education and procurement work.
  baseCase: Modeled CAC stays near $66.8K per new live campus using Y2-Y3 S&M spend.
  upsideCase: Partner referrals and campus expansions push S&M intensity toward 4% of revenue.
  y3RevenueImpactK: 0.0
  cashImpactK: -33.9
- variable: churn
  downsideCase: Retention behaves like the company exits Y3 two campuses lower because deployments stay narrower and OEM alternatives close some accounts.
  baseCase: Unit economics assume 1.5% monthly churn while the modeled campus path already bakes in modest friction.
  upsideCase: Operational embedment behaves like the company exits Y3 one to two campuses higher because the workflow becomes system-of-record.
  y3RevenueImpactK: -165.0
  cashImpactK: -119.1
- variable: sales cycle
  downsideCase: A quarter of extra procurement or IT review pushes each major campus expansion one quarter later.
  baseCase: The base case assumes paid pilots convert to production quickly enough to reach 14 live campuses by Y2 exit.
  upsideCase: Reference customers and OEM referrals pull decisions forward by about one quarter.
  y3RevenueImpactK: -240.0
  cashImpactK: -293.7
- variable: gross margin
  downsideCase: Gross margin stays at 67% because integrations and contamination-rule tuning remain more bespoke than planned.
  baseCase: Gross margin stays at the 70% business-plan target.
  upsideCase: Gross margin reaches 72% as connector reuse and template libraries reduce deployment effort.
  y3RevenueImpactK: 0.0
  cashImpactK: -112.9
- variable: hiring pace
  downsideCase: The post-sale and second-engineer hires both need to come forward by roughly two quarters to support bespoke work.
  baseCase: The base case keeps the lean hiring ramp in A20 because deployment templates are assumed to reuse well.
  upsideCase: Hiring can stay at the base plan even if revenue beats plan because second-campus reuse absorbs more load.
  y3RevenueImpactK: 0.0
  cashImpactK: -126.3
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Pipeline[Founder-led and partner-sourced pipeline] --> PaidCampuses
      PaidCampuses --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing paid live campuses from 6 at Y1 exit to 24 at Y3 exit at about $120K of blended annual value each.
- checkName: Must go right
  finding: The company has to prove at least 30% faster second-campus launches so a 9-FTE team can support 14 live campuses by Y2 exit without becoming services-heavy.
- checkName: Model breaks if
  finding: If sales cycles slip by a quarter or integrations stay bespoke, downside cash turns negative before Y3 ends and the round would need a bridge.
- checkName: Next-round proof
  finding: The seed story is credible once the company reaches 14 live campuses, shows repeat expansion inside health systems, and ships benchmarking or audit modules on top of the meal-reset wedge.
sanityChecks:
  ruleOf40: Y3 growth 85.0% + EBITDA margin -24.1% = 60.9% (solid for pre-seed, though still supported by a small Y2 base).
  burnMultiple: About 0.8x in Y2 on roughly $960K of net new ARR, improving to about 0.4x in Y3 on roughly $1.2M of net new ARR.
  revenuePerFte: $247K Y3 revenue per end-of-year FTE (inside the rough $200K-$400K early enterprise SaaS benchmark).
  flags:
  - The modeled market is still narrow because it depends on robot-ready hospital campuses with budget authority already aligned around support-services automation.
  - Gross margin only holds if packaged integrations really stay below the business plan's implied custom-work ceiling; otherwise the model drifts into services economics.
  - The company is still EBITDA-negative in Y3, so the next round depends on showing repeatable campus expansion rather than near-term profitability.
  - A single AE plus founder-led selling carries most of the Y2-Y3 commercial ramp, so any procurement slowdown would likely pull the next financing forward.
