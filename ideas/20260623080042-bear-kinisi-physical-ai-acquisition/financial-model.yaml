assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[business-plan.yaml date] first full operating month after the 2026-06-23 plan date.'
- id: A2
  name: Opening cash after pre-seed close
  value: '2400'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] base case uses a $2.4M close near the low-middle of the stated $2-4M range.'
- id: A3
  name: Revenue unit
  value: Active paid live campus
  unit: definition
  source: '[business-plan.yaml businessModel.unitOfValue] the model counts each live campus running a paid meal-reset workflow as one customer unit.'
- id: A4
  name: Blended annual revenue per live campus
  value: '120'
  unit: USDK/campus-year
  source: '[business-plan.yaml investorMemo.firstCustomer.initialContract; research.yaml market.tam rationale] modeled as roughly $100K recurring campus software plus modest implementation and premium-module mix.'
- id: A5
  name: Revenue recognition timing
  value: Midpoint customer count within each month or quarter
  unit: policy
  source: '[startup-finance heuristic] new paid campuses are assumed to land halfway through the period on average.'
- id: A6
  name: Y1 month-end campus path
  value: 0,0,0,2,2,4,4,4,5,5,6,6
  unit: active paid live campuses
  source: '[business-plan.yaml milestones 0-12 months; experimentRoadmap] maps to three paid two-campus pilots and 2 production customers by year-end.'
- id: A7
  name: Y2 quarter-end campus path
  value: Q1Y2 8; Q2Y2 10; Q3Y2 12; Q4Y2 14
  unit: active paid live campuses
  source: '[business-plan.yaml milestones 12-24 months] lands near the top of the stated 10-15 live campus goal.'
- id: A8
  name: Y3 quarter-end campus path
  value: Q1Y3 16; Q2Y3 18; Q3Y3 21; Q4Y3 24
  unit: active paid live campuses
  source: '[business-plan.yaml milestones 24-36 months; research.yaml market.som rationale] base case grows below the researched 30-campus year-3 SOM ceiling.'
- id: A9
  name: Gross margin target
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] modeled as 30% COGS on recognized revenue.'
- id: A10
  name: Monthly churn for unit economics
  value: '1.5'
  unit: percent
  source: '[startup-finance heuristic] early enterprise operations software should be sticky after go-live, but still carries some logo risk while the wedge is proving out.'
- id: A11
  name: Founder CEO loaded cash compensation
  value: '150'
  unit: USDK/year
  source: '[business-plan.yaml team Founder CEO] startup-finance heuristic for a below-market founder salary plus payroll tax and benefits burden.'
- id: A12
  name: Founding eng loaded cash compensation
  value: '195'
  unit: USDK/year
  source: '[business-plan.yaml team Founding eng] startup-finance heuristic for a senior technical founder package plus payroll burden.'
- id: A13
  name: Solutions engineer loaded cash compensation
  value: '160'
  unit: USDK/year
  source: '[business-plan.yaml team Solutions engineer] startup-finance heuristic for a deployment-heavy early solutions hire.'
- id: A14
  name: Workflow operations lead loaded cash compensation
  value: '145'
  unit: USDK/year
  source: '[business-plan.yaml team Workflow operations lead] startup-finance heuristic for an operator translating pilots into reusable playbooks.'
- id: A15
  name: Partnerships lead loaded cash compensation
  value: '170'
  unit: USDK/year
  source: '[business-plan.yaml team Partnerships lead] startup-finance heuristic for a channel and OEM-facing hire with healthcare-sales travel burden.'
- id: A16
  name: Product/integration engineer loaded cash compensation
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months; operatingAssumptions] startup-finance heuristic for the first additional engineer once connector reuse starts to matter.'
- id: A17
  name: Account executive loaded cash compensation
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml gtm.channels; milestones 12-24 months] startup-finance heuristic for the first enterprise seller after the founder-led motion proves repeatable.'
- id: A18
  name: Customer success/deployment manager loaded cash compensation
  value: '145'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months] startup-finance heuristic for post-sale rollout ownership once campus count moves into double digits.'
- id: A19
  name: Second engineer loaded cash compensation
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml milestones 24-36 months] startup-finance heuristic for adjacent-workflow and benchmarking depth in year 3.'
- id: A20
  name: Hiring cadence
  value: Founder CEO and founding eng in M1; solutions engineer M3; workflow operations lead M6; partnerships lead M9; product/integration engineer M15; account executive M18; customer success/deployment manager M21; second engineer M30
  unit: timing
  source: '[business-plan.yaml team; milestones] GTM and engineering expand only after the first packaged deployments are working.'
- id: A21
  name: Functional payroll allocation
  value: Founder CEO 60% S&M / 40% G&A; founding eng 100% R&D; solutions engineer 70% R&D / 30% G&A; workflow operations lead 60% R&D / 40% G&A; partnerships lead 80% S&M / 20% G&A; product/integration engineer 100% R&D; account executive 100% S&M; customer success/deployment manager 40% S&M / 60% G&A; second engineer 100% R&D
  unit: allocation
  source: '[business-plan.yaml team rationales; operations] deployment codification loads into R&D first, while founder sales and partnerships drive S&M.'
- id: A22
  name: Non-payroll operating spend
  value: Y1 S&M 6K + 4% of revenue monthly, R&D 7K + 0.4K per average campus monthly, G&A 8K + 0.15K per average campus monthly; Y2 S&M 8K + 5% of revenue, R&D 8K + 0.5K per average campus, G&A 9K + 0.2K per average campus; Y3 S&M 10K + 5% of revenue, R&D 10K + 0.6K per average campus, G&A 10K + 0.25K per average campus
  unit: USDK/month
  source: '[startup-finance heuristic] covers cloud, security, travel, legal, and support overhead for a healthcare enterprise deployment motion.'
- id: A23
  name: Cash conversion policy
  value: EBITDA approximates operating cash movement
  unit: policy
  source: '[startup-finance heuristic] no debt, capex, taxes, or material working-capital swings are modeled at this stage.'
- id: A24
  name: Funding runway target
  value: '24'
  unit: months
  source: '[business-plan.yaml fundingAsk.runwayMonths] modeled as the stated 18-month pre-seed plan plus the required 6-month buffer.'
- id: A25
  name: Next-round milestone
  value: 14 live campuses, second-campus launches at least 30% faster than the first, and benchmarking or audit modules live before the seed round
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] used to size the current round and buffer.'
