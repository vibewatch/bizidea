scenarios:
  downside:
    description: 预算主导权依然分散，部署也比预期更定制化，公司拿不到支撑软件经济性的院区扩张曲线。
    y3RevenueK: 1540.0
    y3EbitdaK: -963.1
    cashLowPointK: -344.9
    keyAssumptionChanges:
    - 第 1 年年末只有 4 个已上线院区，第 2 年年末 10 个，第 3 年年末 18 个，而不是 24 个。
    - 单院区综合年收入从 $120K 降到 $110K，因为更多交易停留在试点价格。
    - 毛利率从 70% 掉到 68%，因为集成工作比打包连接器路径预设的更重定制。
  base:
    description: 创始人主导销售叠加早期合作渠道，把第一批付费试点转成可复用的院区扩张动作，同时团队保持精干。
    y3RevenueK: 2220.0
    y3EbitdaK: -536.1
    cashLowPointK: 477.1
    keyAssumptionChanges:
    - 院区数按 A6、A7、A8 的路径增长，第 2 年年末做到 14 个已上线院区，第 3 年年末做到 24 个。
    - 单院区综合年价值维持在 $120K，毛利率维持在商业计划的 70% 目标。
    - 到第 3 年年末团队扩到 9 个 FTE，部署、合作和销售岗位都只在首批打包部署跑通后再补。
  upside:
    description: 标杆客户和 OEM/集成商转介绍把第二院区上线速度进一步拉快，公司因此更接近研究里第 3 年 SOM 上限，同时价格和毛利也略有改善。
    y3RevenueK: 2880.0
    y3EbitdaK: -89.4
    cashLowPointK: 1169.6
    keyAssumptionChanges:
    - 第 1 年年末做到 8 个已上线院区，第 2 年年末 16 个，第 3 年年末 30 个，因为系统内扩张提前发生。
    - 单院区综合年收入从 $120K 升到 $128K，因为基准分析或审计模块更快挂上。
    - 毛利率从 70% 提升到 72%，因为连接器和模板复用减少了部署工作量。
sensitivity:
- variable: ARPU
  downsideCase: 客户长期停留在更接近试点的价格带，且高级模块挂得更慢，导致单院区综合年价值落在 $110K。
  baseCase: 单院区综合年价值维持在模型里的 $120K。
  upsideCase: 随着基准分析和审计模块更早挂上，单院区综合年价值向 $130K 抬升。
  y3RevenueImpactK: -184.9
  cashImpactK: -203.6
- variable: CAC
  downsideCase: Y2-Y3 的 S&M 强度从收入的 5% 升到 6%，因为每笔单子都需要更多现场教育和采购推动。
  baseCase: 按 Y2-Y3 的 S&M 投入测算，CAC 维持在每个新增已上线院区约 $66.8K。
  upsideCase: 合作伙伴转介绍和院区内扩张把 S&M 强度压向收入的 4%。
  y3RevenueImpactK: 0.0
  cashImpactK: -33.9
- variable: 流失率
  downsideCase: 如果部署范围一直偏窄、OEM 替代方案又拿走部分客户，留存表现会接近“第 3 年年末比计划少 2 个院区”。
  baseCase: 单位经济模型按 1.5% 月流失率假设，而建模的院区路径里本身已计入温和摩擦。
  upsideCase: 如果工作流成为系统记录层，运营嵌入度会让第 3 年年末的院区数比计划多 1–2 个。
  y3RevenueImpactK: -165.0
  cashImpactK: -119.1
- variable: 销售周期
  downsideCase: 采购或 IT 复核多拖一个季度，就会让每次重要院区扩张都整体晚一个季度。
  baseCase: 基准情景假设付费试点足够快地转生产，因此第 2 年年末能做到 14 个已上线院区。
  upsideCase: 标杆客户和 OEM 转介绍会把决策时间大约提前一个季度。
  y3RevenueImpactK: -240.0
  cashImpactK: -293.7
- variable: 毛利率
  downsideCase: 如果集成和污染控制规则调优始终比预期更定制，毛利率会停在 67%。
  baseCase: 毛利率维持在商业计划的 70% 目标。
  upsideCase: 如果连接器复用和模板库减少部署工作量，毛利率可以抬到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -112.9
- variable: 招聘节奏
  downsideCase: 为了支撑更重定制的工作，售后岗位和第二位工程师都得整体提前大约两个季度入场。
  baseCase: 基准情景维持 A20 的精干招聘坡度，因为默认部署模板的复用效果不错。
  upsideCase: 即便收入超计划，招聘也可按基准节奏推进，因为第二院区复用吸收了更多负荷。
  y3RevenueImpactK: 0.0
  cashImpactK: -126.3
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Pipeline[Founder-led and partner-sourced pipeline] --> PaidCampuses\n  PaidCampuses --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自已付费上线院区数增长：从第 1 年年末 6 个，增到第 3 年年末 24 个；每个院区对应约 $120K 的综合年价值。
- checkName: 必须跑通的事
  finding: 公司必须证明第二院区上线速度至少快 30%，这样一个 9 人团队才能在第 2 年年末支撑 14 个已上线院区，而不滑向重服务。
- checkName: 模型失效条件
  finding: 如果销售周期多拖一个季度，或集成持续重定制，下行情景里的现金会在第 3 年结束前转负，公司将需要桥接融资。
- checkName: 下一轮融资证明
  finding: 一旦公司做到 14 个已上线院区、能在医疗系统内重复扩张，并在餐后重置切口之上上线基准分析或审计模块，seed 故事才算站得住。
sanityChecks:
  ruleOf40: 第 3 年增长 85.0% + EBITDA 利润率 -24.1% = 60.9%（对 pre-seed 来说不错，但仍建立在较小的第 2 年基数之上）。
  burnMultiple: 第 2 年 burn multiple 约 0.8x，对应约 $960K 的新增 ARR；到第 3 年改善至约 0.4x，对应约 $1.2M 的新增 ARR。
  revenuePerFte: 第 3 年年末按 FTE 计算的人均收入约 $247K，落在早期企业 SaaS 粗略 $200K-$400K 的区间里。
  flags:
  - 模型市场仍然偏窄，因为它依赖那些已经具备机器人条件、且支持服务自动化预算权已经对齐的医院院区。
  - 毛利率能否守住，取决于打包集成是否真能压在商业计划隐含的定制工作上限之下；否则模型会滑向服务经济。
  - 公司到第 3 年仍然 EBITDA 为负，因此下一轮融资更依赖可复用的院区扩张，而不是短期盈利。
  - 第 2–3 年的大部分商业化爬坡都压在 1 位 AE 和创始人销售上，任何采购放缓都可能把下一轮融资时间提前。
