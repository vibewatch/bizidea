slug: hospital-meal-reset-os
date: '2026-06-23'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[business-plan.yaml date] 以 2026-06-23 计划日期后的首个完整运营月作为起点。'
- id: A2
  name: pre-seed 交割后期初现金
  value: '2400'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] 基准情景按 $2-4M 区间偏低至中段的 $2.4M 交割额建模。'
- id: A3
  name: 收入计量单位
  value: 已付费并上线的院区
  unit: definition
  source: '[business-plan.yaml businessModel.unitOfValue] 模型把每个运行付费餐后重置工作流的已上线院区计作 1 个客户单位。'
- id: A4
  name: 单个已上线院区的综合年收入
  value: '120'
  unit: USDK/campus-year
  source: '[business-plan.yaml investorMemo.firstCustomer.initialContract; research.yaml market.tam rationale] 这里按每个院区约 $100K 的经常性软件收入，加上少量实施和高级模块收入混合建模。'
- id: A5
  name: 收入确认时点
  value: 按每个月或每个季度区间内的客户数中点确认
  unit: policy
  source: '[startup-finance heuristic] 默认新付费院区平均在区间中段落地。'
- id: A6
  name: 第 1 年月末院区数路径
  value: 0,0,0,2,2,4,4,4,5,5,6,6
  unit: active paid live campuses
  source: '[business-plan.yaml milestones 0-12 months; experimentRoadmap] 对应 3 个付费双院区试点，以及年末 2 个生产客户。'
- id: A7
  name: 第 2 年季末院区数路径
  value: Q1Y2 8; Q2Y2 10; Q3Y2 12; Q4Y2 14
  unit: active paid live campuses
  source: '[business-plan.yaml milestones 12-24 months] 落在已陈述的 10–15 个已上线院区目标高位附近。'
- id: A8
  name: 第 3 年季末院区数路径
  value: Q1Y3 16; Q2Y3 18; Q3Y3 21; Q4Y3 24
  unit: active paid live campuses
  source: '[business-plan.yaml milestones 24-36 months; research.yaml market.som rationale] 基准情景低于研究里第 3 年 30 个院区的 SOM 上限。'
- id: A9
  name: 毛利率目标
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] 这里按已确认收入的 30% 作为 COGS 建模。'
- id: A10
  name: 用于单位经济模型的月流失率
  value: '1.5'
  unit: percent
  source: '[startup-finance heuristic] 早期企业运营软件一旦上线后黏性应当较强，但在 wedge 尚未完全证明前，仍存在一定客户流失风险。'
- id: A11
  name: 创始人/CEO 全额现金薪酬
  value: '150'
  unit: USDK/year
  source: '[business-plan.yaml team Founder CEO] 按低于市场价的创始人薪资，加上薪资税和福利负担建模。'
- id: A12
  name: 创始工程师全额现金薪酬
  value: '195'
  unit: USDK/year
  source: '[business-plan.yaml team Founding eng] 按高级技术创始人薪酬包加薪资负担建模。'
- id: A13
  name: 解决方案工程师全额现金薪酬
  value: '160'
  unit: USDK/year
  source: '[business-plan.yaml team Solutions engineer] 按偏部署导向的早期解决方案岗位建模。'
- id: A14
  name: 工作流运营负责人全额现金薪酬
  value: '145'
  unit: USDK/year
  source: '[business-plan.yaml team Workflow operations lead] 按把试点经验转成可复用剧本的运营岗位建模。'
- id: A15
  name: 合作负责人全额现金薪酬
  value: '170'
  unit: USDK/year
  source: '[business-plan.yaml team Partnerships lead] 按面向渠道和 OEM、并承担医疗销售差旅负担的岗位建模。'
- id: A16
  name: 产品/集成工程师全额现金薪酬
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months; operatingAssumptions] 当连接器复用开始变重要后，再补第一个额外工程岗位。'
- id: A17
  name: 客户经理全额现金薪酬
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml gtm.channels; milestones 12-24 months] 按创始人销售动作证明可复制后，再招聘第一位企业销售。'
- id: A18
  name: 客户成功/部署经理全额现金薪酬
  value: '145'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months] 当院区数进入双位数后，补上售后上线负责人。'
- id: A19
  name: 第二位工程师全额现金薪酬
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml milestones 24-36 months] 用于支撑第 3 年相邻工作流和基准分析深度。'
- id: A20
  name: 招聘节奏
  value: M1 招创始人/CEO 与创始工程师；M3 招解决方案工程师；M6 招工作流运营负责人；M9 招合作负责人；M15 招产品/集成工程师；M18 招客户经理；M21 招客户成功/部署经理；M30 招第二位工程师
  unit: timing
  source: '[business-plan.yaml team; milestones] 只有在首批打包部署跑通后，GTM 和工程团队才继续扩张。'
- id: A21
  name: 薪酬职能分摊
  value: 创始人/CEO 60% S&M / 40% G&A；创始工程师 100% R&D；解决方案工程师 70% R&D / 30% G&A；工作流运营负责人 60% R&D / 40% G&A；合作负责人 80% S&M / 20% G&A；产品/集成工程师 100% R&D；客户经理 100% S&M；客户成功/部署经理 40% S&M / 60% G&A；第二位工程师 100% R&D
  unit: allocation
  source: '[business-plan.yaml team rationales; operations] 部署沉淀前期主要记入 R&D，而创始人销售和渠道合作主要驱动 S&M。'
- id: A22
  name: 非薪酬运营支出
  value: Y1 S&M 6K + 每月收入的 4%，R&D 7K + 每月平均院区数 × 0.4K，G&A 8K + 每月平均院区数 × 0.15K；Y2 S&M 8K + 收入的 5%，R&D 8K + 每月平均院区数 × 0.5K，G&A 9K + 每月平均院区数 × 0.2K；Y3 S&M 10K + 收入的 5%，R&D 10K + 每月平均院区数 × 0.6K，G&A 10K + 每月平均院区数 × 0.25K
  unit: USDK/month
  source: '[startup-finance heuristic] 覆盖医疗企业部署所需的云、安保、差旅、法务和支持开销。'
- id: A23
  name: 现金转换口径
  value: EBITDA 近似等于经营现金变动
  unit: policy
  source: '[startup-finance heuristic] 当前不建模债务、capex、税项或明显营运资本波动。'
- id: A24
  name: 融资跑道目标
  value: '24'
  unit: months
  source: '[business-plan.yaml fundingAsk.runwayMonths] 按已说明的 18 个月 pre-seed 计划，再加所需的 6 个月缓冲。'
- id: A25
  name: 下一轮融资里程碑
  value: seed 轮前做到 14 个已上线院区、第二院区上线速度至少比第一院区快 30%，并让基准分析或审计模块上线
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] 用来反推本轮融资规模和缓冲。'
