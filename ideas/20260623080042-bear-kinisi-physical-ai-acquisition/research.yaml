competitors:
- name: Bear Robotics + Kinisi
  stage: incumbent
  wedge: Scaled indoor service-robot fleet adding manipulation on the same orchestration stack.
  pricing: Custom quote; no public healthcare list price.
  strength: Large installed base and a credible physical-AI roadmap that can expand from delivery into handling tasks.
  weaknessVsUs: The operator-side, cross-campus workflow layer and neutral benchmarking problem is not its obvious center of gravity.
  sourceRefs:
  - 10
  - 11
  - 12
- name: Diligent Robotics / Moxi
  stage: scale-up
  wedge: Embodied-AI hospital robot focused on internal logistics, especially pharmacy, lab, and supply runs.
  pricing: Usage-based subscription; no public list price.
  strength: Demonstrated million-plus deliveries, hospital references, and trusted pharmacy chain-of-custody workflows.
  weaknessVsUs: It is still robot-first and mostly own-fleet, while meal-reset standardization across campuses is a narrower operator workflow problem.
  sourceRefs:
  - 13
  - 14
  - 15
- name: Aethon
  stage: incumbent
  wedge: Mature hospital transport robots with broad departmental coverage and elevator coordination.
  pricing: Custom quote / enterprise and GSA-style procurement.
  strength: Deep hospital familiarity, VA presence, and explicit focus on scarce elevator orchestration.
  weaknessVsUs: Aethon solves transport infrastructure well, but not the reusable operator-side templates and proof-of-completion layer across meal-reset loops.
  sourceRefs:
  - 16
  - 17
- name: Relay Robotics
  stage: scale-up
  wedge: Hospital delivery robots positioned around rapid install, chain of custody, and last-mile pharmacy or lab runs.
  pricing: Monthly RaaS; Relay frames delivery economics as low as roughly $4 per hour in its own materials.
  strength: Credible live case studies, reliability metrics, and strong story around labor relief and pharmacy workflows.
  weaknessVsUs: Still mostly delivery-centric and robot-centric, with less emphasis on multi-campus workflow standardization across mixed service loops.
  sourceRefs:
  - 18
  - 19
  - 20
  - 21
  - 22
