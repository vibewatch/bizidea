openQuestions:
- How many U.S. hospital campuses already run indoor delivery robots by vendor and workflow family, rather than through isolated press releases?
- Who ultimately owns the meal-reset budget when the workflow crosses dietary, facilities, and nursing-adjacent operations?
- How often do contamination rules, elevator waits, or blocked handoffs break an otherwise viable tray-return or pantry-reset loop?
- Will OEMs expose enough telemetry and event history for a neutral workflow-control layer to become system-of-record rather than just another overlay?
