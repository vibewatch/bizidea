  validationPlan:
  - priority: high
    question: How many tray-return, pantry-reset, and cart-handoff tasks per shift actually recur at the first two design-partner campuses?
    evidenceToGather: Shift-level task counts, elevator wait logs, and meal-window exception records from two live hospitals.
  - priority: high
    question: Who owns the budget once the workflow spans dietary, facilities, and nursing-adjacent operations?
    evidenceToGather: Current robot program budgets, renewal terms, and foodservice automation line items from 5-10 target health systems.
  - priority: high
    question: How deep is OEM and building-system access for event logs, elevator controls, and proof-of-completion APIs?
    evidenceToGather: API documentation, connector requirements, and sample dispatch or telemetry exports from Bear, Diligent, Relay, and Aethon deployments.
  - priority: medium
    question: Does faster meal-reset execution move patient-experience or throughput metrics enough to matter to the COO?
    evidenceToGather: Before-and-after meal delay rates, service-recovery calls, and campus-level satisfaction or on-time-start metrics.
