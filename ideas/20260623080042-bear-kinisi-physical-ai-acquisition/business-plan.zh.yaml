slug: hospital-meal-reset-os
date: '2026-06-23'
executiveSummary: 医院餐后重置 OS 是一层站在运营方一侧的工作流软件，卖给已经信任室内配送机器人的美国医疗系统，帮助它们进一步扩到托盘回收、备餐间补货和洁/污推车交接。这个滩头市场刻意收得很窄：多院区的餐后重置，因为导航早已被验证，但污染控制逻辑、电梯顺序和异常恢复，仍然得按院区一个个重建。第一笔单子最该发生在这样的时点：一家区域医疗系统已经靠现有机器人项目打到了服务或用工目标，希望赶在下个预算周期前把下一条工作流也跑起来。产品起步不该假设第一天就能做到完全自治操作，而应先做工作流模板、完成证明和混合人机升级的控制平面。这个排序与研究吻合：商用机器人车队正在放量，操作能力开始接入真实栈，而眼下真正卡住的，是调度之上的工作流配置。公司能赢，前提是它证明一个成功院区确实能沉淀成模板，让下一个院区上线明显更快，并且留下可审计的班次证据。这个机会有风投级上行空间，但还没被完全坐实，因为近期已装机基础看起来仍只是低几百个医院院区；如果想做大，必须从餐后重置延展到布草、药房或相邻服务环境。关键证据缺口还在预算归属、OEM 与楼宇系统的 API 可接深度，以及第二院区上线速度到底能不能快到支撑软件式利润率。
problem:
- 医疗系统能为餐食、布草和物资配送机器人算清账，但托盘回收、备餐间重置和推车交接仍要按院区逐一配置污染控制规则、电梯逻辑和兜底流程，今天基本还是手工落地。
- 厂商服务、电子表格和本地 SOP 能把一家医院先跑起来，但沉淀不出可复用的多院区模板，也给不了运营负责人可以放大的完成证明数据。
solution:
- 把膳食排班、设施地图、电梯策略、备餐间最低库存线、机器人任务队列和升级规则，编成每个院区都能复用的餐后重置工作流模板。
- 提供班次级完成证明、异常分流和审计轨迹，让支持服务负责人在下一餐开始前，能确认托盘、推车和备餐间重置是否真的收尾。
whyWeWin:
- 我们卖的是运营方那一层、而不是 OEM 或以配送为中心的机器人厂商天然拥有的东西：跨院区工作流模板、污染控制逻辑、人机交接，以及完成证明。
- 每落地一次，都会新增一层跨院区异常与基准数据，覆盖电梯、病区、污染区和人力交接；这些信息单个医院系统、OEM 或集成商都看不全。
strategicChoices:
  beachhead: 先打已经运行室内配送机器人的美国区域医疗系统，覆盖 3–12 家医院；第一步只标准化两个旗舰院区里的餐盘回收、备餐间补货和洁/污推车交接。
  wedgeRationale: 餐后重置是一个边界清楚、高频、非临床的闭环，运营买方明确，用工和服务影响也看得见；只要配送机器人已经被信任，这条线就会自然出现上线扩张触发点，比“做一个泛化医院机器人平台”更容易先证明。
  sequencingRationale: 产品先只做一个工作流家族、1–2 个机器人连接器，以及混合交接和完成证明，因为操作可靠性和楼宇系统接入深度都还不均匀；GTM 先靠创始人亲自拿下双院区试点，因为第一性证明是压缩上线速度，不是席位渗透；招聘也先补集成和部署能力，而不是急着扩销售，因为可复用性才是公司最核心的风险。
  notYet:
  - 没有现成机器人项目的单院区医院。
  - 在餐后重置模板尚未形成复用前，就去覆盖布草、药房和无菌物资等广义医院工作流。
  - 抢机器人调度、硬件管理或整栋楼控制基础设施的控制权。
market:
  tam: 估算 TAM 为 $352.5M：按约 3,525 个隶属医疗系统的社区医院院区 × 每个已上线院区每年约 $100k 的工作流软件预算。
  sam: 估算 SAM 为 $20.0M：按大约 200 个近期看起来已经具备机器人条件的美国医院院区 × 同样约 $100k 的年预算代理值。
  som: 估算第 3 年 SOM 为 $3.0M：约 30 个已上线院区，假设 10 个区域系统从首个试点扩到平均 3 个院区。
  segments:
  - 已经运行室内机器人项目的美国多院区医疗系统里的支持服务和餐饮营养负责人。
  - 负责跨院区标准化工作流的机器人项目经理、设施自动化负责人，以及支持服务外包运营商。
  buyingProcess: 项目的一线牵头人，大概率是支持服务或餐饮营养 VP，通常会和机器人或设施自动化负责人搭档；真正拍预算的是运营管理层。单子该在这种情况下成交：一家医疗系统想把已经被信任的机器人项目扩到餐次周转，并且能接受买一层可复用控制平面，而不是继续按院区买一次性服务。
product:
  mvp: MVP 只覆盖一个餐后重置工作流家族、一个机器人环境：工作流搭建器、院区约束映射、完成证明看板、异常分流，以及托盘回收、备餐间重置和推车暂存的审计轨迹。它必须支持混合人机交接和上线前仿真，而不是一开始就押注完全自治的物体处理。
  sixMonth: 把首条部署路径打包出来：一个机器人平台连接器、院区模板克隆、班次级完成证明，以及围绕电梯、污染控制和备餐间规则的异常日志。
  twelveMonth: 补上多院区基准、第二院区上线工具、面向楼宇和膳食数据源的连接器加固，以及围绕餐次准点启动、升级处理和重复异常模式的生产报表。
  twentyFourMonth: 在保持跨机器人厂商、跨楼宇系统中立的前提下，把同一套控制平面延伸到布草补给或药房相邻处理等非临床工作流。
  keyBets:
  - 买方更在意压缩上线速度、可审计性和异常恢复，而不是一个更大全的机器人管理看板。
  - 第二个院区会明显比第一个快，因为工作流模板、污染控制逻辑和升级剧本可以复用。
  - 即便操作可靠性还不足以完全自治地处理托盘和推车，混合人机编排也能先创造价值。
gtm:
  wedge: 卖一个双院区餐后重置上线包：把一个已上线机器人项目沉淀成可复用模板、班次审计轨迹，并推动系统内下一家医院进入生产决策。
  channels:
  - 创始人直销区域医疗系统里的支持服务、餐饮营养和运营负责人。
  - 与医院餐饮自动化团队和区域机器人项目经理共创部署。
  - 与机器人 OEM、部署集成商，以及餐饮 benchmarking 或咨询机构做转介绍和联合销售。
  funnelTargets: 线索→合格试点 15–25%，合格试点→付费试点 40%+，付费试点→生产 50%+，首院区→12 个月内扩到第三院区在 40%+ 的生产客户中发生。
  pricing: 按已上线院区收年费，再按每个工作流家族和机器人平台连接器收实施费；这和医疗系统按院区给运营项目做预算的方式更贴，也让支出直接对应可复用上线价值、完成证明和异常减少，而不是单纯按用户数或机器人数量计价。
businessModel:
  revenueStreams:
  - 按院区收取年度工作流软件订阅费。
  - 按工作流家族以及机器人或楼宇系统集成收实施费和连接器费用。
  - 高级基准分析、审计轨迹和多厂商编排模块。
  unitOfValue: 一个运行中的已上线院区：其餐后重置工作流家族已付费，并且接入了完成证明。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一医疗系统内，先跑通前两个院区，再往更多院区复制。
  - 增加相邻工作流家族，如布草补给或药房相邻处理。
  - 当控制平面成为系统记录层后，再向上卖更深的基准分析、审计和多厂商工作流模块。
strategyMap:
  northStarMetric: 运行餐后重置工作流的已上线院区数——每个班次都能留下可审计的完成证明，并确保下一餐按时准备就绪。
  inputMetrics:
  - 从试点批准到第二院区上线，花了多久。
  - 下一餐开始前，餐后重置任务完成或被升级处理的比例。
  - 付费试点转生产的转化率。
  - 每个医疗系统内，从首院区扩到第三院区的比例。
  - 重复异常类型中，有多少被沉淀成可复用剧本。
  moatsToBuild:
  - 覆盖托盘回收、备餐间重置、推车暂存和污染控制逻辑的可复用工作流模板库。
  - 跨院区异常图谱，覆盖电梯、病区、人力交接和楼宇约束。
  - 把工作流模板与服务可靠性结果连起来的完成证明和基准分析数据集。
  killCriteria:
  - 如果前 10 家已经运行配送机器人的合格医疗系统里，不到 3 家愿意在 9 个月内进入付费试点，说明我们假设的购买触发点偏弱。
  - 如果第 5 次部署还不能把下一院区上线时间，相对第 1 次至少缩短 30%，说明模板复用不足以支撑软件经济性。
  - 如果到第 12 个月，不到 2 个付费试点转成按院区收年费的生产客户，说明相对厂商服务的 ROI 说服力不够。
  mermaid: "flowchart LR\n  Wedge[Meal-reset wedge] --> MVP[Workflow templates plus proof of completion]\n  MVP --> Proof[Faster second-campus launch and shift reliability]\n  Proof --> Expansion[More campuses then adjacent hospital workflows]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 切口清晰、工作流痛点具体，但当下可见装机底盘偏窄，预算归属尚未验证，且跨医院复用风险高，所以判断力度被压住。
    whyBelieve: 公司瞄准的是这样一个扩张点：当配送机器人已经被信任，而操作能力开始进入商用车队后，最可能先真正重要起来的下一条工作流。
    whyDoubt: 除非跨院区中立模板和上线压缩效果，能明显胜过厂商打包服务，否则这个滩头市场可能会一直太小、也太依赖 OEM。
    nextDiligence: 需要确认 2–3 个由 COO 或运营负责人署名背书的付费试点，并证明在同一套模板系统下，第二个院区确实比第一个明显更快上线。
  firstCustomer:
    title: 区域医疗系统里的支持服务或餐饮营养 VP
    profile: 一家拥有 6–12 家医院的美国医疗系统，已经在餐饮或物资工作流里上线配送机器人，并被要求在下一个预算周期前，在两个旗舰院区继续扩大自动化。
    trigger: 现有配送机器人项目已经达到服务或用工目标，运营团队获批把自动化扩到托盘回收和备餐间重置，而不是继续追加外包劳动力。
    buyer: COO 或 SVP operations
    initialContract: $30k-$60k 的双院区付费试点；一旦首个工作流家族获批进入生产 rollout，再转成每个已上线院区每年约 $100k 的软件费外加实施费。
  mustBeTrue:
  - 已经运行配送机器人的多院区医疗系统，会在未来 12 个月内为餐后重置扩张编预算，而不是把它继续排进更远期的机器人路线图。
  - 一条打包好的连接器路径，能靠膳食、机器人和楼宇系统数据快速打到首个价值点，而不是每个院区都陷入定制工程。
  - 可复用模板能把第二院区部署时间至少缩短 30%，同时还要把污染控制、电梯和升级规则保真到足以通过运营签字。
  - 运营负责人愿意为一层中立工作流控制平面付费，而不是只依赖 OEM 专业服务或捆绑式工作流工具。
  - 在 OEM 或现有厂商把这层切口吃掉之前，公司能从餐后重置扩到至少一个相邻医院工作流。
  diligenceQuestions:
  - 哪些已经运行配送机器人的医疗系统，正在下一个预算周期里规划托盘回收或备餐间重置扩张？
  - 当工作流跨越膳食、设施和护理相邻运营时，预算和 rollout 审批究竟归谁管？
  - OEM 和楼宇合作方在电梯事件、调度状态和完成证明数据上，愿意开放多深的 API 与遥测接入？
  - 对 COO 来说，哪项 KPI 最能撬动预算：加班减少、护士被打断减少、餐次准点启动，还是备餐间缺货减少？
  - 如果 Bear、Diligent、Relay 或 Aethon 在自家车队里直接上线基础工作流构建器，一层中立工作流软件还能不能赢？
operatingAssumptions:
- assumption: 已经信任配送机器人的医疗系统，会在 OEM 工作流工具完全成熟之前，就为下一条工作流扩张拨款。
  basis: research.yaml
  validationTest: 至少拿下 3 个付费试点，客户都已经运行配送机器人，并且明确计划在未来 12 个月内扩张。
  decisionImpact: 如果不成立，说明时机偏早，公司要么收缩为 OEM 赋能软件，要么延后独立 GTM。
- assumption: 餐后重置工作流模板在不同院区之间，复用度足以把下一站部署时间至少压缩 30%。
  basis: idea.yaml
  validationTest: 对比前 5 次部署中，首院区与第二院区的实施时间，中位数至少下降 30%。
  decisionImpact: 如果不成立，模式会迅速变成重服务，公司必须收窄范围，或重写定价与招聘假设。
- assumption: 即便真实医院里的操作可靠性仍不稳定，混合人机交接编排也能先给客户创造价值。
  basis: research.yaml
  validationTest: 在前 2 个试点里，在完全自治抓取启用前，就先证明完成追踪和下一餐准备就绪指标已有可测改善。
  decisionImpact: 如果不成立，公司就会受制于硬件进展，只能等待更晚的 adoption 窗口，或改做别的工作流。
- assumption: 一个打包好的部署路径，能把每个院区的膳食排班、机器人任务数据和楼宇事件接入，且定制工作量低于 2 个工程师周。
  basis: 运营判断
  validationTest: 用同一套连接器剧本完成 3 次部署，并把每个院区的定制集成压在 2 个工程师周以内。
  decisionImpact: 如果不成立，毛利率和销售效率都会下滑，公司需要转成更强服务导向的模式，或继续收窄产品边界。
- assumption: 预算主导权会落在运营层，而不只是 IT，因为价值最终对应的是人力、服务恢复和患者体验运营。
  basis: research.yaml
  validationTest: 在 5 个合格交易里，确认 COO、SVP operations 或同级运营负责人亲自背书预算和部署审批。
  decisionImpact: 如果不成立，销售周期会转向 IT 采购，公司得重写 GTM 动作、定价权归属和产品路线图。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 20 家已经在餐饮、药房或物资工作流里运行室内配送机器人的目标医疗系统。
  hypothesis: 至少 8 个潜在线索会在下一个预算周期内，明确推进餐后重置或相邻支持服务扩张项目。
  successMetric: 拿到 8+ 个合格潜在客户，每个都明确说出工作流、院区数量、时间表和高管发起人。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 做出一版覆盖托盘回收、备餐间重置、污染控制规则和异常分流的工作流映射原型，再和 4 家共创客户复盘。
  hypothesis: 买方会把“可复用模板生成”和“完成证明”排在更高优先级，而不是先要一个更大全的车队管理功能集。
  successMetric: 工作流评审后，有 3+ 家潜在客户同意进入付费试点或结构化共创合作。
  owner: 创始人/产品
- horizon: 0–90 天
  experiment: 在一个试点院区落地首个连接器包，接入机器人任务数据、膳食排班输入和班次完成证明。
  hypothesis: 不用等完全自治操作，上线 30 天内就能打到首个价值点。
  successMetric: 项目启动 30 天内，一个试点院区跑起受监督或模拟的餐后重置工作流，并能产出完成证明。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 把 3 家共创客户转成付费双院区试点，并明确写进合同：上线速度和班次可靠性要达到什么标准。
  hypothesis: 即便更大平台还没成形，医疗系统也愿意为压缩上线速度和完成证明付费。
  successMetric: 签下 3 个付费试点，每个金额 $30k+，并且明确生产转化门槛。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 测试两种定价与打包方式：按院区订阅 + 实施费，对比更宽泛的企业许可证方案。
  hypothesis: 按院区定价比按机器人数量或席位计价，更贴合买方的预算和扩张逻辑。
  successMetric: 前 3 个付费试点里，至少 2 个在同等或更高年化价值下选择按院区定价。
  owner: 创始人/CEO
- horizon: 180–365 天
  experiment: 为前 2 个生产候选客户上线第二院区，并测量上线时长以及餐次可靠性变化。
  hypothesis: 模板复用和异常剧本会明显改善下一院区的上线速度与运营一致性。
  successMetric: 在 2 个客户中，实现第二院区上线速度快 30%+，并且餐次准点启动或完成率出现可测提升。
  owner: 部署负责人
- horizon: 180–365 天
  experiment: 招募 3 家 OEM、集成商或餐饮咨询伙伴，并跟踪其带来的管道质量。
  hypothesis: 合作渠道能帮助公司更广泛触达已具备机器人条件的医院系统，而且不会把公司逼成白标服务商。
  successMetric: 签下 3 个合作伙伴，并拿到 2 个由伙伴引荐、且能直达经济买方的合格试点。
  owner: 合作负责人
operations:
- 为每个院区维护一套部署剧本，覆盖污染区、电梯规则、备餐间 par logic、员工升级责任人，以及完成证明要求。
- 每个试点都要留下可审计的班次日志，并在客户侧明确支持服务、设施或机器人负责人，以及运营审批人。
- 在扩展功能面之前，先把膳食、机器人和楼宇事件数据的连接器治理搭稳。
- 评估试点效果时，盯住的是餐次准点启动、异常率和扩到下一个院区的时间，而不是泛泛的机器人利用率。
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: 搭出首版工作流引擎、连接器包和完成证明系统，让试点具备说服力。
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 亲自拿销售、招共创客户、定打包方案，因为首批交易靠的是跨部门运营信任。
- role: 解决方案工程师
  startTiming: Month 3
  rationale: 降低部署摩擦，把院区上线剧本沉淀下来，避免定制工作压垮核心工程。
- role: 工作流运营负责人
  startTiming: Month 6
  rationale: 把试点经验打磨成买方愿意信的可复用模板、升级剧本和 KPI 埋点。
- role: 合作负责人
  startTiming: Month 9
  rationale: 当第一批打包部署跑通后，把 OEM、集成商和餐饮咨询关系变成可复用渠道。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 6–8 家合格共创客户，其中至少 3 家转成付费双院区试点。
  - 让 2 个客户进入生产，跑起餐后重置工作流模板、完成证明和明确的异常剧本。
  - 证明首个价值点能在 30 天内出现，且第二院区上线速度至少比第一院区快 30%。
  - 为初始滩头市场打通一条可复用的机器人、膳食和楼宇事件数据连接器路径。
- horizon: 12–24 个月
  items:
  - 把已上线院区扩到 10–15 个，覆盖多个区域医疗系统。
  - 上线与服务可靠性和上线速度挂钩的多院区基准分析与审计模块。
  - 在相当比例的生产客户中，跑通从首院区扩到至少第三院区的可复用动作。
  - 在不打乱餐后重置部署剧本的前提下，再加一个相邻的非临床工作流家族。
- horizon: 24–36 个月
  items:
  - 把控制平面延伸到混合机器人环境下的布草补给或药房相邻工作流。
  - 成为医院支持服务里，运营方实体作业工作流模板和完成证明的系统记录层。
  - 建起一套 OEM 专属工具很难复制的中立跨院区基准分析数据集。
risks:
- risk: 机器人 OEM 把基础工作流构建器打包进方案，并借硬件关系卡住一层中立控制平面。
  likelihood: High
  impact: High
  mitigation: 在跨厂商中立、多院区基准分析，以及 OEM 工具难以泛化的运营方模板上拉开差异。
- risk: 医院在电梯、厨房布局和污染控制规则上的差异过大，导致部署一直重服务。
  likelihood: High
  impact: High
  mitigation: 先只做一个工作流家族，尽早拒绝边角定制，并把前十次部署产品化成固定模板和连接器。
- risk: 操作能力可靠性跟不上，客户把自动化扩张继续停留在以配送为主的工作流。
  likelihood: Medium
  impact: High
  mitigation: 先靠混合交接编排、仿真、异常分流和完成证明交付价值，而不是一开始就卖完全自治处理。
- risk: 预算主导权分散在支持服务、设施、IT 和运营之间，拉长销售周期。
  likelihood: Medium
  impact: Medium
  mitigation: 只做有明确运营发起人的交易，并把 ROI 框进单一工作流家族对应的人力、服务恢复和患者体验指标。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要买 18 个月跑道：把第一版连接器和工作流引擎打包出来，拿下 3 个付费双院区试点，转成 2 个生产客户，并证明多院区模板复用足以撑起一家中立的医院机器人工作流软件公司。
