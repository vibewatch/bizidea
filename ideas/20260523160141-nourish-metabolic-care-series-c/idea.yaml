topRisks:
  - name: Integration drag
    description: Payer eligibility feeds, referral data, and vendor scheduling systems may be messy enough to slow time to value.
    mitigation: Start with CSV and lightweight API connectors for one plan and one vendor, then deepen automation only after the activation funnel proves valuable.
  - name: Vendor disintermediation
    description: Large metabolic-care vendors could try to add similar sponsor dashboards and activation workflows themselves.
    mitigation: Position as a multi-vendor neutral layer for sponsors, win with faster cross-channel measurement, and build benchmarks that require data across more than one care vendor.
  - name: ROI proof lag
    description: Buyers may believe activation is low but still hesitate if claims savings or adherence benefits take quarters to show up.
    mitigation: Sell the first pilot on short-cycle operational metrics such as time to first visit, referral conversion, and repeat engagement before promising downstream medical-cost impact.
