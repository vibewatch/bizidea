differentiator: >-
  Most metabolic-care vendors own the clinical visit, while generic care-management tools stop at outreach lists and shallow utilization dashboards. This company sits one layer above the vendor, acting as the neutral activation and measurement system for sponsors that already cover care but cannot consistently turn eligibility into engagement. If it wins the beachhead, it compounds a valuable dataset on which member signals, outreach motions, and sponsor channels produce completed episodes and repeat adherence in covered metabolic programs.
