problem: >-
  Health plans and self-insured employers can add virtual metabolic care benefits, yet most eligible members never make it from claims-based eligibility or PCP referral into a completed first dietitian visit. The operational gap is not finding another clinic vendor; it is coordinating eligibility, outreach, scheduling, and proof of benefit value across large covered populations. When activation stays manual, sponsors pay for access they cannot fully use and struggle to show that the program changed downstream cost or care behavior.
targetUser:
  primary: Regional health-plan clinical program leaders responsible for covered metabolic-care or nutrition benefits
  secondary: Benefits leaders at self-insured employers offering covered metabolic-care programs through a health plan or point-solution partner
  buyer: VP of care management, population health, or clinical programs at a regional commercial health plan
startupThesis:
  nonObviousInsight: >-
    The market change is not merely better virtual nutrition care. Once AI-assisted dietitian networks can reach 200M covered lives through plans, health systems, and employers, the scarce asset becomes benefit activation and ROI proof inside each sponsor's population, not raw clinical supply.
  beachhead: >-
    Regional Blues and provider-sponsored commercial health plans with 200k-1M covered lives that already reimburse virtual dietitian visits for metabolic-risk members but have weak referral-to-visit conversion
  wedge: >-
    A benefit-aware activation layer that ingests eligibility, referral, and outreach signals, routes each member into the right dietitian pathway, and gives plans closed-loop utilization and outcome reporting
  whyNowCatalyst: >-
    Nourish's financing, AI-enabled 10,000+ dietitian network, and distribution across plans, health systems, and employers show care supply is scaling quickly, making sponsor-side activation infrastructure newly urgent.
  ventureScalePath: >-
    Starting with activation for covered metabolic care creates a control point over referral conversion, member engagement, and outcomes reporting that can expand into broader chronic-care navigation, vendor orchestration, employer benefit optimization, and risk-bearing population health workflows.
solution: >-
  The product plugs into plan eligibility files, PCP referral feeds, and vendor scheduling systems to create a live worklist of members who should be offered covered metabolic care now. It uses AI to personalize outreach, explain coverage, capture readiness, and route each member to the right intake path without forcing the plan to replace its existing clinic vendor. Care managers and program owners see where members are leaking out between identification, outreach, booking, first visit, and repeat engagement. Employers and provider groups receive closed-loop dashboards that show which channels actually convert and where activation stalls. The first use case is narrow and measurable: turn eligible covered members into completed first dietitian episodes within days, then prove the benefit is being used.
goToMarketSeed:
  firstCustomer: >-
    A regional Blue plan with 300k-800k commercial members, an existing virtual nutrition or metabolic-care vendor, and a clinical-programs team under pressure to improve benefit utilization
  buyingTrigger: >-
    Launch or renewal of a covered metabolic-care benefit, rising cardiometabolic claims trend, or employer complaints that a sponsored program exists but enrollment remains low
  currentAlternative: Generic care-management outreach, static vendor dashboards, PCP referral lists, and portal or email promotion campaigns
  switchingReason: >-
    This wedge does not ask the buyer to change vendors or create a new benefit; it improves activation and measurement across the benefit they already pay for, which is easier to justify and faster to pilot
  pricingHypothesis: >-
    Annual SaaS platform fee plus PEPM or per-engaged-member pricing for the targeted eligible population, with upsell reporting modules for employer and provider-group sponsors
