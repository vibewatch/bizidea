jobsToBeDone:
  - job: >-
      When we launch or renew a covered metabolic-care benefit, help our plan team turn eligible members into completed first dietitian visits, so we can improve utilization and justify the program budget.
    currentAlternative: Manual care-manager outreach and vendor-generated enrollment reports
    successMetric: Percentage of eligible members who complete a first covered dietitian visit within 30 days of identification
  - job: >-
      When employer groups ask whether the sponsored metabolic program is working, help us track activation by channel and sponsor cohort, so we can expand the benefit with confidence.
    currentAlternative: Static quarterly dashboards and anecdotal vendor updates
    successMetric: Referral-to-booking conversion rate and repeat-visit rate by employer or line of business
