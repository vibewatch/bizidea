  - 48
validationSignals:
- point: Nourish’s $100M round, 10,000+ dietitian network, and claimed availability to 200M Americans validate category scale and distribution.
  sourceRefs:
  - 1
- point: Employer demand for obesity benefits and GLP-1 decision support is strong enough that specialized budget frameworks are emerging.
  sourceRefs:
  - 6
  - 7
- point: Essentia/Medica exceeded enrollment goals in Omada rollouts, showing that operational execution meaningfully changes uptake.
  sourceRefs:
  - 32
- point: Quantum claims up to 2x benefits utilization when targeted communications and navigation are in place, supporting the activation thesis.
  sourceRefs:
  - 54
  - 55
openQuestions:
- Can a regional payer reliably provide referral, booking, and claims-adjacent data quickly enough to prove lift inside one quarter?
- 'Which failure mode is the biggest blocker in covered metabolic care today: benefit awareness, coverage confusion, scheduling delay, or no-show behavior?'
- Will leading clinic vendors partner with a neutral activation layer, or will they prefer to own sponsor reporting themselves?
- How much sponsor value can be proven on operational metrics alone before claims or medication-spend savings materialize?
