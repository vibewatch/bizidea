market:
  tam:
    value: $370.0M
    rationale: '154M people are covered by employer-sponsored insurance under age 65 [4]. Model a conservative 20% activation-eligible cardiometabolic cohort (30.8M members), which sits below 4-in-10 adult obesity prevalence [3] and below CDC diabetes/prediabetes totals [2], then apply an estimated $12 annual software budget per targeted member: about $370M.'
    isEstimate: true
    sourceRefs:
    - 2
    - 3
    - 4
  sam:
    value: $55.0M
    rationale: Assume 15% of TAM fits the beachhead of regional/provider-sponsored commercial plans that already reimburse virtual metabolic care and now need activation/compliance support; $370M × 15% ≈ $55M.
    isEstimate: true
    sourceRefs:
    - 1
    - 4
    - 5
  som:
    value: $3.6M
    rationale: 'Reachable year-3 case: 5 plans × 300k covered lives × 20% targeted cohort × $12 estimated annual budget per targeted member ≈ $3.6M.'
    isEstimate: true
    sourceRefs:
    - 4
    - 8
    - 9
    - 32
