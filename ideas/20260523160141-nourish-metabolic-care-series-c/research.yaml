competitors:
- name: Nourish
  stage: scale-up
  wedge: Insurance-covered dietitian-led metabolic clinic with AI agents and deep payer/employer distribution.
  pricing: Insurance-covered; 94% of in-network patients reportedly pay $0 out-of-pocket.
  strength: Large covered-life distribution and direct ownership of the clinical episode.
  weaknessVsUs: Optimized to deliver care, not to act as a neutral sponsor-side activation and reporting layer across multiple clinic partners.
  sourceRefs:
  - 1
  - 20
  - 21
- name: Fay
  stage: scale-up
  wedge: Insurance-first marketplace for registered dietitians with consumer-friendly access and pricing transparency.
  pricing: As low as $0 with insurance; self-pay reference point around $150 per session.
  strength: Easy consumer discovery and broad insurer acceptance make it strong at front-door acquisition.
  weaknessVsUs: More consumer marketplace than payer operations layer, with limited sponsor-side funnel orchestration.
  sourceRefs:
  - 22
  - 23
  - 24
- name: Omada Health
  stage: incumbent
  wedge: Virtual-first between-visit cardiometabolic care with GLP-1 support, employer distribution, and outcome reporting.
  pricing: Not publicly posted.
  strength: Deep employer/payer relationships, CDC-recognized prevention credibility, and published savings cases.
  weaknessVsUs: Usually sells its own program, so it does not naturally become the neutral activation system for external dietitian vendors.
  sourceRefs:
  - 27
  - 28
  - 30
  - 38
  - 40
- name: Virta Health
  stage: scale-up
  wedge: High-acuity metabolic reversal model focused on nutrition, medication reduction, and employer/health-plan outcomes.
  pricing: Not publicly posted.
  strength: Strong metabolic outcomes story and direct health-plan integration in multiple lines of business.
  weaknessVsUs: Opinionated clinical model and condition ownership make it less natural as a sponsor-wide orchestration layer for mixed vendors.
  sourceRefs:
  - 46
  - 47
  - 48
  - 49
- name: Quantum Health
  stage: incumbent
  wedge: Broad healthcare navigation, personalized communications, and benefits utilization support for employers.
  pricing: Not publicly posted.
  strength: Already owns member communications, benefits questions, and employer reporting relationships.
  weaknessVsUs: Horizontal navigation lacks the metabolic-specific eligibility, referral, and episode-conversion analytics in this thesis.
  sourceRefs:
  - 53
  - 54
  - 55
regulatoryTechnicalConstraints:
- point: The product must behave like a HIPAA-grade workflow, because buyers will judge it as healthcare delivery infrastructure rather than a lightweight consumer app.
  sourceRefs:
  - 17
  - 41
- point: Interoperability is improving, but payer/provider technical debt still makes eligibility, referral, and scheduling integration slower than product teams expect.
  sourceRefs:
  - 12
  - 14
  - 34
- point: Benefit rules vary by insurer and some coverage pathways still depend on diagnosis or referral status, complicating automated coverage explanation.
  sourceRefs:
  - 21
