    sourceRefs:
    - 3
  - factor: 经济
    impact: negative
    point: 雇主保费和肥胖药物成本持续上涨，让买方对成本极为敏感，也更死盯 ROI。
    sourceRefs:
    - 4
    - 6
    - 7
  - factor: 社会
    impact: positive
    point: 糖尿病、糖尿病前期和肥胖患病率持续高企，让符合条件的人群既大又醒目。
    sourceRefs:
    - 2
    - 3
  - factor: 技术
    impact: positive
    point: 标准化数据交换和 AI 辅助教练 / 编排，让个性化激活越来越可行。
    sourceRefs:
    - 12
    - 14
    - 19
    - 35
  - factor: 法律
    impact: negative
    point: 隐私预期仍是关键门槛，尤其当数字工具把消费级应用和受保医疗服务提供方的边界越拉越模糊时。
    sourceRefs:
    - 5
    - 41
  - factor: 环境
    impact: neutral
    point: 虚拟报名和护理模式确实能帮到分散人群，但地理因素更像附加收益，不是主要采购驱动。
    sourceRefs:
    - 32
    - 48
  adoptionFrictionMatrix:
  - friction: 支付方、提供方和供应商之间的数据交换一团乱
    severity: 高
    affectedBuyer: 健康计划运营与 IT 负责人
    mitigation: 先从 CSV + FHIR 连接器起步，等漏斗证明价值后再做更深自动化。
    sourceRefs:
    - 12
    - 14
    - 36
  - friction: 成员搞不清保障范围，也不知道下一步该由谁来排期
    severity: 高
    affectedBuyer: 临床项目负责人
    mitigation: 用个性化、多渠道外呼，把保障解释和预约提示讲清楚。
    sourceRefs:
    - 8
    - 17
    - 21
    - 54
  - friction: 采购和合规团队不想再接入一个 独立外包模块
    severity: 中
    affectedBuyer: 福利与法务 / 合规团队
    mitigation: 把产品定位成嵌在现有保险福利里的激活 / 报告层，而不是独立临床产品。
    sourceRefs:
    - 5
    - 41
  - friction: 提供方担心提醒过载、工作流负担变重
    severity: 中
    affectedBuyer: 医疗总监与提供方合作负责人
    mitigation: 只把精选摘要或就诊前异常推入 EHR 工作流，而不是持续轰炸提醒。
    sourceRefs:
    - 32
    - 36
market:
  tam:
    value: $370.0M
    rationale: 65 岁以下、由雇主赞助保险覆盖的人群约为 154M [4]。按保守假设，取其中 20% 作为需要激活的心代谢 队列（30.8M 成员）；这一比例低于成年人约四成肥胖率 [3]，也低于 CDC 给出的糖尿病 / 糖尿病前期总量 [2]。再按每个目标成员每年 $12 的软件预算估算，TAM 约为 $370M。
    isEstimate: true
    sourceRefs:
    - 2
    - 3
    - 4
  sam:
    value: $55.0M
    rationale: 假设 TAM 中有 15% 落在我们的滩头市场：这些区域性 / 医疗提供方发起的 商业计划已经为虚拟代谢护理报销，现在又需要激活和合规支持；$370M × 15% ≈ $55M。
    isEstimate: true
    sourceRefs:
    - 1
    - 4
    - 5
  som:
    value: $3.6M
    rationale: 可触达的第 3 年情形：5 个健康计划 × 每个 300k 覆盖人群 × 20% 目标 队列 × 每个目标成员每年约 $12 的预算 ≈ $3.6M。
    isEstimate: true
    sourceRefs:
    - 4
    - 8
    - 9
    - 32
bottomUpSizingDrivers:
