competitors:
- name: Nourish
  stage: 扩张期
  wedge: 由保险覆盖、营养师主导的代谢护理诊所，叠加 AI 智能体和深度的支付方 / 雇主分发。
  pricing: 走保险支付；据称 94% 的网内患者自付为 $0。
  strength: 覆盖人群分发能力强，并且直接掌握临床 就诊。
  weaknessVsUs: 它擅长交付护理，不擅长充当面向多个诊所伙伴的赞助方中立激活与报告层。
  sourceRefs:
  - 1
  - 20
  - 21
- name: Fay
  stage: 扩张期
  wedge: 以保险优先的注册营养师 平台，强调面向消费者的便捷接入和价格透明。
  pricing: 走保险时最低可到 $0；自费参考价约 $150 / 次。
  strength: 消费者发现路径顺滑、主流保险接受度高，前门获客能力强。
  weaknessVsUs: 它更像消费者 平台，而不是支付方运营层，对赞助方漏斗编排支持有限。
  sourceRefs:
  - 22
