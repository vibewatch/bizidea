scenarios:
  downside:
    description: 健康计划共享数据更慢，第 5 个支付方拖到 Y4 才落地，而且高度依赖人工服务的 onboarding 让毛利率始终低于目标。
    y3RevenueK: 2460.0
    y3EbitdaK: -1080.0
    cashLowPointK: 390.0
    keyAssumptionChanges:
    - 到 Q4Y3 只有 4 个 正式上线 计划上线，而不是 5 个。
    - 由于第二批 队列 扩张更慢，扩张后 ACV 从 $720K 下滑到 $600K。
    - 连接器和外呼运营仍靠人工，毛利率维持在 65%。
  base:
    description: 3 个付费 试点 按计划转化，到 M20 有 5 个计划付费，前 3 个账户扩到研究支撑的完整 队列 价值。
    y3RevenueK: 3420.0
    y3EbitdaK: -330.0
    cashLowPointK: 1075.5
    keyAssumptionChanges:
    - 付费 试点 按 BP 区间下限售卖，其中 2 个在 M12 前转成年框。
    - 前 3 个账户在转化约 12 个月后扩到完整的 $720K ARR。
    - 在招聘继续按里程碑控制的前提下，毛利率维持在 BP 目标值 70%。
  upside:
    description: 试点 转化比基础情形快 1 个季度，且到 Y3 末 5 个计划全部达到更高 ACV，而无需明显增加 headcount。
    y3RevenueK: 3900.0
    y3EbitdaK: 180.0
    cashLowPointK: 1180.0
    keyAssumptionChanges:
    - 试点 4 和 试点 5 都比基础情形提前 1 个季度签下。
    - 到 Q4Y3，5 个计划全部达到 $720K 的扩张后 ACV。
    - 连接器模板和外呼工作流更快标准化，毛利率升到 72%。
sensitivity:
- variable: ARPU
  downsideCase: 如果健康计划把目标 队列 卡得更紧，扩张后 ACV 为 $600K，而不是 $720K。
  baseCase: 扩张后 ACV 为 $720K：对应 60K 目标成员、每个成员每年约 $12。
  upsideCase: 如果更早挂上高级报告和多供应商视图，扩张后 ACV 可到 $780K。
  y3RevenueImpactK: -570.0
  cashImpactK: -410.0
- variable: CAC
  downsideCase: 每个支付方 CAC 为 $375K，因为每笔交易都需要更多定制化合规和实施工作。
  baseCase: 按模型中的“创始人主导 + 合作伙伴辅助”打法，每个支付方 CAC 为 $300K。
  upsideCase: 在第一个案例和供应商转介渠道跑通后，CAC 可降到 $250K。
  y3RevenueImpactK: -120.0
  cashImpactK: -375.0
- variable: 流失率
  downsideCase: 如果早期健康计划始终扩不到第二条业务线，月度流失率会上升到 2.5%。
  baseCase: 对已完成集成、但仍处早期的支付方基础设施产品，月度流失率按 1.5% 建模。
  upsideCase: 一旦基准报告对高管买方形成黏性，月度流失率可降到 1.0%。
  y3RevenueImpactK: -360.0
  cashImpactK: -220.0
- variable: 销售周期
  downsideCase: 如果数据映射超过 60 天，试点 到 正式上线 的转化会再晚 1 个季度。
  baseCase: Y1 签下 3 个 试点，并按 A6 与 A7 的里程碑节奏完成转化。
  upsideCase: 在首个案例落地后，有 1 个 试点 会比基础情形提前 1 个季度完成转化并扩张。
  y3RevenueImpactK: -690.0
  cashImpactK: -520.0
- variable: 毛利率
  downsideCase: 人工复核、外呼运营和数据清洗负担更重，毛利率为 65%。
  baseCase: 毛利率按 BP 目标值 70% 建模。
  upsideCase: 连接器模板更干净、赞助方工作流可复用后，毛利率升到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -171.0
- variable: 招聘节奏
  downsideCase: 在证据尚不可复制前，就提前招入第二名销售和一名更偏实施的人。
  baseCase: 招聘按 A12 所示，继续受里程碑控制。
  upsideCase: 由于合作伙伴带来的线索更强，第二名销售等到下一轮融资后再招。
  y3RevenueImpactK: -60.0
  cashImpactK: -300.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      EligibleMembers --> TargetedCohorts
      TargetedCohorts --> PaidPilots
      PaidPilots --> ProductionPlans
      ProductionPlans --> ExpandedPlans
      ExpandedPlans --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基础情形的收入，来自把 3 个付费 试点 转成 5 个支付方账户，再通过第二批 队列 和基准报告，把前 3 个账户从约 $480K ARR 拉到 $720K ARR。
- checkName: 必须跑顺的条件
  finding: 模型要求团队能在约 60 天内拿到资格、转诊和预约流，否则每个 试点 都来不及在下一轮采购周期前证明价值。
- checkName: 模型会失效的情况
  finding: 如果 试点 到 正式上线 的转化低于 BP 里 50% 的目标，或毛利率长期停在 65% 左右，下行情景里的现金低点会压到不足 $0.4M。
- checkName: 下一轮融资的证明
  finding: 只要公司在 Y2 末做到 5 个付费计划、至少 3 个 队列 上线基准报告，且年化收入 run rate 接近 $2.9M，就足以支撑下一轮融资。
sanityChecks:
  ruleOf40: Y3 增长率 60.6% + EBITDA 利润率 -9.6% = 51.0%
  burnMultiple: Y2 burn multiple 为 0.5x（-$699.0K EBITDA，对应 $1,545.0K 的净新增收入）；Y3 burn multiple 为 0.3x（-$330.0K EBITDA，对应 $1,290.0K 的净新增收入）。
  revenuePerFte: Y3 人均收入为 $310.9K（垂直 SaaS 基准约为 $200–400K）
  flags:
  - 基础情形假设到 M20 能有 5 个付费计划，因此只要少转化 1 个 试点，Y2 的现金效率就会明显变差。
  - 从第一笔收入起就把毛利率维持在 BP 目标值，只有在连接器模板和外呼运营能很快标准化的前提下才成立。
  - 本轮 seed 融资按 BP 区间下限建模，但由于招聘始终保持精简、直到证据可复制前都不激进扩人，因此到 Y3 末仍保留超过 $1.0M 现金。
