slug: covered-metabolic-activation-os
date: '2026-05-23'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: 首个完整月份，起点放在 2026-05-23 business-plan 日期之后。
- id: A2
  name: seed 完成后的期初现金
  value: $3.0M
  unit: usdM
  source: '[BP fundingAsk targetFundingRangeUsd $3-5M] 基础模型取 seed 区间下限，为招聘计划提供资金，同时留出企业医疗场景的缓冲。'
- id: A3
  name: 付费 试点 定价
  value: $25.0K / 月，持续 3 个月
  unit: usdK_per_customer_month
  source: '[BP investorMemo.firstCustomer.initialContract] BP 给出的 试点 区间是 $75K-$150K；模型取下限，并均摊到 3 个月 试点 期。'
- id: A4
  name: 初始 正式上线 ACV
  value: $480.0K ARR / 每个支付方客户
  unit: usdK_per_year
  source: '[BP investorMemo.firstCustomer.initialContract] 正式上线 起步低于 BP 中 $750K 的上限情形，因为每个计划一开始只覆盖一条业务线和一个诊所伙伴。'
- id: A5
  name: 扩张后的 正式上线 ACV
  value: $720.0K ARR / 每个支付方客户
  unit: usdK_per_year
  source: '[Research market.som; BP businessModel.expansionLevers] 完整扩张对应研究里的 SOM 测算：60K 目标成员，按每个成员每年约 $12。'
- id: A6
  name: 客户爬坡节奏
  value: 到 M10 拿下 3 个付费 试点、到 M12 完成 2 个年框转化、到 M20 有 5 个付费计划、到 M25 有 3 个计划完成扩张
  unit: customers
  source: '[BP milestones; BP gtm.funnelTargets] 这满足 BP 对第 1 年内拿下 3 个付费 试点 和 2 个 正式上线 转化的要求，同时让扩张节奏保持渐进。'
- id: A7
  name: 扩张时点
  value: 前 3 个 正式上线 计划在转化约 12 个月后升到更高 ACV；后 2 个扩得更慢
  unit: timing_rule
  source: '[BP gtm.funnelTargets; BP businessModel.expansionLevers] BP 预期 50%+ 的已转化客户会在 12 个月内扩到第二个项目，因此模型按这个节奏扩张前 3 批客户。'
- id: A8
  name: 毛利率
  value: 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 全程把 COGS 建模为收入的 30%，与目标毛利率对齐。'
- id: A9
  name: 月度流失率
  value: 1.5%
  unit: percent
  source: 对于黏性较高、但仍处早期的企业医疗工作流软件，这是一个常见的创业财务假设：集成后留存应较强，但在多年验证前不可能做到完美。
- id: A10
  name: 完全加载 CAC
  value: $300.0K / 每个支付方客户
  unit: usdK_per_customer
  source: '[BP gtm channels and funnelTargets; research buyerPower] 区域性支付方销售由创始人主导、又高度依赖案例背书，因此即便有合作伙伴协助，获客仍然昂贵。'
- id: A11
  name: 全包薪酬带宽
  value: CEO $216K；工程 $192K；产品 / 实施 $168K；数据 / 分析 $180K；客户成功 $144K；销售 / 合作 $180K；G&A / 合规 $132K
  unit: usdK_per_fte_year
  source: 适用于美国种子阶段数字医疗软件团队、且已计入 payroll burden 的创业财务假设。
- id: A12
  name: 招聘爬坡快照
  value: 按 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3 计算：CEO 1/1/1/1/1/1；工程 1/1/2/2/3/3；产品 / 实施 1/1/1/1/1/1；数据 / 分析 0/1/1/1/1/1；客户成功 0/0/1/1/2/2；销售 / 合作 0/0/0/1/1/2；G&A / 合规 0/0/0/1/1/1
  unit: fte
  source: '[BP team; BP sequencingRationale] 招聘顺序遵循 BP：先把数据和工作流可信度做出来，再在 试点 转化后补支付方成功和合作能力。'
- id: A13
  name: 非薪酬运营预算
  value: Y1 月度非薪酬 opex 从 $24K 爬到 $36K；Y2 季度非薪酬 opex 为 $120K-$165K；Y3 季度非薪酬 opex 为 $180K-$240K
  unit: usdK
  source: 适用于 HIPAA 级 SaaS 的创业财务假设：在薪酬之外，再叠加云成本、消息发送、法务、保险、合规和差旅。
- id: A14
  name: 季度薪酬平滑规则
  value: Y2 和 Y3 的薪酬费用按每个季度最近一次招聘状态计算，而不是只在年末快照时阶跃
  unit: method
  source: '[Financial Modeler instructions] 季度薪酬线应顺着运营计划平滑变化，而不是只对齐要求的快照列。'
- id: A15
  name: 现金结转约定
  value: 期末现金由 EBITDA 直接滚动，不单列债务、税、capex 或营运资本项目
  unit: policy
  source: 适用于轻资产软件公司的创业财务假设：现金主要由经营亏损驱动，而不是 capex。
- id: A16
  name: 下行情景差分
  value: 试点 转化慢 1 个季度、毛利率 65%、到 Q4Y3 只有 4 个 正式上线 计划
  unit: scenario_inputs
  source: '[BP risks; research sensitivityCases] 反映的具体风险是：健康计划无法足够快地共享数据，因此很难快速证明价值。'
- id: A17
  name: 上行情景差分
  value: 试点 4 和 试点 5 各提前 1 个季度成交、毛利率 72%、到 Q4Y3 时 5 个计划都到达扩张后 ACV
  unit: scenario_inputs
  source: '[BP milestones; BP businessModel.expansionLevers] 反映的是：数据接入更顺、已转化客户内部第二项目扩张更快。'
