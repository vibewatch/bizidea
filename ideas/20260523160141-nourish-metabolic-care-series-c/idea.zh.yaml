topRisks:
- name: 集成拖慢落地
  description: 支付方资格流、转诊数据和供应商排期系统可能足够混乱，拖慢价值兑现。
  mitigation: 先为一个计划和一个供应商提供 CSV 与轻量 API 连接，只有在激活漏斗证明有价值后再把自动化做深。
- name: 被供应商绕开
  description: 大型代谢护理供应商可能会自己补齐类似的赞助方仪表盘和激活工作流。
  mitigation: 把自己定位成赞助方面向多供应商的中立层，靠更快的跨渠道衡量取胜，并沉淀只有跨多个护理供应商才能拿到的基准数据。
- name: ROI 证明滞后
  description: 买方也许认同激活率偏低，但如果理赔节省或遵从性改善要过几个季度才显现，仍可能犹豫。
  mitigation: 首个 试点 先卖短周期运营指标，比如首诊时间、转诊转化和重复参与，再谈下游医疗成本影响。
