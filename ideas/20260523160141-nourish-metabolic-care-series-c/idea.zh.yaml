problem: 健康计划和自保型雇主可以把虚拟代谢护理纳入福利，但大多数符合条件的成员始终没能从基于理赔的资格识别或 PCP 转诊，走到真正完成第一次营养师就诊。真正的运营缺口不在于再找一家诊所供应商，而在于怎么在大规模受保人群里，把资格、外呼、排期和福利价值证明串起来。激活流程一旦还靠手工跑，赞助方就会为用不满的可及性买单，也很难证明项目到底改变了后续成本或护理行为。
targetUser:
  primary: 负责保险覆盖代谢护理或营养福利的区域性健康计划临床项目负责人
  secondary: 通过健康计划或单点方案合作方提供保险覆盖代谢护理项目的自保型雇主福利负责人
  buyer: 区域性商业健康计划中负责护理管理、群体健康或临床项目的 VP
startupThesis:
  nonObviousInsight: 这轮市场变化不只是虚拟营养护理变好了。只要 AI 辅助的营养师网络能通过健康计划、医疗系统和雇主触达 200M 受保人群，真正稀缺的资产就不再是原始临床供给，而是每个赞助方人群内部的权益激活能力，以及 ROI 证明能力。
  beachhead: 已有 200k–1M 保险覆盖人群、已经为代谢风险成员报销虚拟营养师就诊、但转诊到首诊转化偏弱的区域性 Blues 和 医疗提供方发起的 商业健康计划
  wedge: 一层理解福利规则的激活系统，接入资格、转诊和外呼信号，把每个成员路由到正确的营养师路径，并给健康计划提供闭环的利用率与结果报告
  whyNowCatalyst: Nourish 的融资、AI 加持的 10,000+ 营养师网络，以及其在健康计划、医疗系统和雇主中的分发，说明供给端扩张很快，也让赞助方侧的激活基础设施一下子变得紧迫。
  ventureScalePath: 先从保险覆盖代谢护理的激活切入，就能卡住转诊转化、成员参与和结果报告这几个控制点；之后再扩到更广的慢病导航、供应商编排、雇主福利优化，以及承担风险的人群健康工作流。
solution: 产品接入健康计划的资格文件、PCP 转诊流和供应商排期系统，生成一份实时工作清单，告诉团队现在就该把哪些成员引导去用保险覆盖的代谢护理。它用 AI 做个性化外呼、解释保障范围、捕捉准备度，并把成员导向合适的 接入 路径，同时不要求健康计划替换现有诊所供应商。护理经理和项目负责人可以看到成员具体流失在识别、触达、预约、首诊还是复诊参与哪一段。雇主和提供方集团会拿到闭环仪表盘，知道到底是哪些渠道真正转化、又卡在哪一步。第一个场景故意做窄、也容易量化：几天内把符合条件的受保成员转成已完成的首次营养师就诊，然后证明福利确实被用起来了。
goToMarketSeed:
  firstCustomer: 一个拥有 300k–800k 商业成员、已有虚拟营养或代谢护理供应商、且临床项目团队正承压提升福利利用率的区域性 Blue 计划
  buyingTrigger: 保险覆盖代谢护理福利上线或续约、心代谢理赔趋势走高，或雇主抱怨明明有赞助项目但报名始终上不来
  currentAlternative: 通用护理管理外呼、静态供应商仪表盘、PCP 转诊名单，以及门户站或邮件推广
  switchingReason: 这个切口不要求买方换供应商，也不用新建一项福利；它只是把买方已经在付费的福利激活和量化做得更好，因此更容易立项，也更快跑 试点。
  pricingHypothesis: 按目标资格人群收取年度 SaaS 平台费，再叠加 PEPM 或按已激活成员计费；面向雇主和提供方集团赞助者，再加售更高级的报告模块。
