jobsToBeDone:
- job: 当我们上线或续约一项保险覆盖的代谢护理福利时，帮计划团队把符合条件的成员转成已完成的首次营养师就诊，这样我们才能提高利用率，也更好为项目预算辩护。
  currentAlternative: 护理经理手工外呼，以及供应商生成的报名报告
  successMetric: 被识别后 30 天内完成首次受保营养师就诊的符合条件成员占比
- job: 当雇主客户问这项代谢项目到底有没有效果时，帮我们按渠道和赞助方 队列 跟踪激活表现，这样我们才能更有把握地扩大福利覆盖。
  currentAlternative: 静态季度仪表盘和零散的供应商口头更新
  successMetric: 按雇主或业务线拆分的转诊到预约转化率，以及复访率
