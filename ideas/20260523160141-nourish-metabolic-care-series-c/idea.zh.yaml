differentiator: 大多数代谢护理供应商自己掌握临床就诊，通用护理管理工具则停在外呼名单和很浅的利用率仪表盘。这家公司站在供应商之上一层，给已经覆盖该类护理、却始终无法把资格变成参与的赞助方，提供一套中立的激活和衡量系统。只要它拿下滩头市场，就能不断累积一套高价值数据：哪些成员信号、哪些触达动作、哪些赞助方渠道，最能带来已完成的就诊和更高的复访遵从。
