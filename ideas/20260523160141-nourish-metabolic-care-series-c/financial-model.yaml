slug: "covered-metabolic-activation-os"
date: "2026-05-23"
currency: USD
modelStartMonth: "2026-06"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-06"
    unit: month
    source: "First full month after the 2026-05-23 business-plan date."
  - id: A2
    name: "Opening cash after seed close"
    value: "$3.0M"
    unit: usdM
    source: "[BP fundingAsk targetFundingRangeUsd $3-5M] The base model uses the low end of the stated seed range to fund the hiring plan and preserve enterprise-healthcare buffer."
  - id: A3
    name: "Paid pilot pricing"
    value: "$25.0K per month for 3 months"
    unit: usdK_per_customer_month
    source: "[BP investorMemo.firstCustomer.initialContract] The BP gives a $75K-$150K pilot range; the model uses the low end, spread evenly across a 3-month pilot."
  - id: A4
    name: "Initial production ACV"
    value: "$480.0K ARR per payer customer"
    unit: usdK_per_year
    source: "[BP investorMemo.firstCustomer.initialContract] Production starts below the BP's upper $750K case because each plan begins with one line of business and one clinic partner."
  - id: A5
    name: "Expanded production ACV"
    value: "$720.0K ARR per payer customer"
    unit: usdK_per_year
    source: "[Research market.som; BP businessModel.expansionLevers] Full expansion matches the research SOM math of 60K targeted members at roughly $12 per member per year."
  - id: A6
    name: "Customer ramp"
    value: "3 paid pilots by M10, 2 annual conversions by M12, 5 paying plans by M20, and 3 expanded plans by M25"
    unit: customers
    source: "[BP milestones; BP gtm.funnelTargets] This hits the BP requirement for 3 paid pilots and 2 production conversions inside year 1 while still phasing expansion gradually."
  - id: A7
    name: "Expansion timing"
    value: "First 3 production plans expand to the higher ACV roughly 12 months after conversion; later two expand more slowly"
    unit: timing_rule
    source: "[BP gtm.funnelTargets; BP businessModel.expansionLevers] The BP expects second-program expansion within 12 months in 50%+ of converted accounts, so the model expands the first 3 cohorts on that cadence."
  - id: A8
    name: "Gross margin"
    value: "70%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] COGS are modeled at 30% of revenue throughout to stay anchored to the target gross margin."
  - id: A9
    name: "Monthly churn"
    value: "1.5%"
    unit: percent
    source: "Startup-finance heuristic for sticky but still early enterprise healthcare workflow software where retention should be strong after integration, but not perfect before multiyear proof exists."
  - id: A10
    name: "Fully loaded CAC"
    value: "$300.0K per payer customer"
    unit: usdK_per_customer
    source: "[BP gtm channels and funnelTargets; research buyerPower] Regional payer selling is founder-led and reference-heavy, so acquisition remains expensive even with partner help."
  - id: A11
    name: "Loaded salary bands"
    value: "CEO $216K; engineering $192K; product / implementation $168K; data / analytics $180K; customer success $144K; sales / partnerships $180K; G&A / compliance $132K"
    unit: usdK_per_fte_year
    source: "Startup-finance heuristic for U.S. seed-stage digital-health software hiring with payroll burden included."
  - id: A12
    name: "Headcount ramp snapshots"
    value: "CEO 1/1/1/1/1/1; engineering 1/1/2/2/3/3; product / implementation 1/1/1/1/1/1; data / analytics 0/1/1/1/1/1; customer success 0/0/1/1/2/2; sales / partnerships 0/0/0/1/1/2; G&A / compliance 0/0/0/1/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3"
    unit: fte
    source: "[BP team; BP sequencingRationale] Hiring follows the BP order: build data and workflow credibility first, then add payer-success and partner capacity after pilots convert."
  - id: A13
    name: "Non-payroll operating budgets"
    value: "Y1 monthly non-payroll opex ramps from $24K to $36K; Y2 quarterly non-payroll opex ranges from $120K to $165K; Y3 quarterly non-payroll opex ranges from $180K to $240K"
    unit: usdK
    source: "Startup-finance heuristic for HIPAA-grade SaaS with cloud, messaging, legal, insurance, compliance, and travel layered on top of payroll."
  - id: A14
    name: "Quarterly payroll smoothing"
    value: "Y2 and Y3 salary expense uses the most recent hiring state in each quarter rather than stepping only at year-end snapshots"
    unit: method
    source: "[Financial Modeler instructions] Quarterly salary lines should follow the operating plan smoothly between the required snapshot columns."
  - id: A15
    name: "Cash conversion convention"
    value: "Ending cash rolls from EBITDA with no debt, taxes, capex, or working-capital lines"
    unit: policy
    source: "Startup-finance heuristic for an asset-light software company where the main cash driver is operating burn rather than capex."
  - id: A16
    name: "Downside scenario deltas"
    value: "One-quarter slower pilot conversion, 65% gross margin, and 4 production plans by Q4Y3"
    unit: scenario_inputs
    source: "[BP risks; research sensitivityCases] Reflects the specific risk that plans cannot share enough data quickly enough for fast proof."
  - id: A17
    name: "Upside scenario deltas"
    value: "Pilot 4 and pilot 5 land one quarter earlier, 72% gross margin, and all 5 plans reach expanded ACV by Q4Y3"
    unit: scenario_inputs
    source: "[BP milestones; BP businessModel.expansionLevers] Reflects cleaner data access and faster second-program expansion inside converted accounts."
