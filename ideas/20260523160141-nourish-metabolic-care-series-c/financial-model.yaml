scenarios:
  downside:
    description: "Plans share data more slowly, the fifth payer slips into Y4, and service-heavy onboarding holds margin below target."
    y3RevenueK: 2460.0
    y3EbitdaK: -1080.0
    cashLowPointK: 390.0
    keyAssumptionChanges:
      - "Only 4 production plans are live by Q4Y3 instead of 5."
      - "Expanded ACV slips from $720K to $600K because second-cohort expansion is slower."
      - "Gross margin stays at 65% because connector and outreach operations remain manual."
  base:
    description: "Three paid pilots convert on schedule, five plans are paying by M20, and the first three accounts expand to the research-backed full cohort value."
    y3RevenueK: 3420.0
    y3EbitdaK: -330.0
    cashLowPointK: 1075.5
    keyAssumptionChanges:
      - "Paid pilots are sold at the low end of the BP range and two convert by M12."
      - "The first 3 accounts expand to full $720K ARR about 12 months after conversion."
      - "Gross margin holds at the BP target 70% while hiring remains milestone-gated."
  upside:
    description: "Pilot conversions land one quarter faster and all 5 plans reach the higher ACV by late Y3 without adding meaningfully more headcount."
    y3RevenueK: 3900.0
    y3EbitdaK: 180.0
    cashLowPointK: 1180.0
    keyAssumptionChanges:
      - "Pilot 4 and pilot 5 each close one quarter earlier than base."
      - "All 5 plans reach the $720K expanded ACV by Q4Y3."
      - "Gross margin rises to 72% as connector templates and outreach workflows standardize faster."
sensitivity:
  - variable: "ARPU"
    downsideCase: "$600K expanded ACV instead of $720K because plans cap targeted cohorts more tightly."
    baseCase: "$720K expanded ACV on 60K targeted members at roughly $12 per member per year."
    upsideCase: "$780K expanded ACV if premium reporting and multi-vendor views are attached earlier."
    y3RevenueImpactK: -570.0
    cashImpactK: -410.0
  - variable: "CAC"
    downsideCase: "$375K per payer because each deal needs more bespoke compliance and implementation work."
    baseCase: "$300K per payer on the modeled founder-led plus partner-assisted motion."
    upsideCase: "$250K per payer after the first case study and vendor referral channel are live."
    y3RevenueImpactK: -120.0
    cashImpactK: -375.0
  - variable: "churn"
    downsideCase: "2.5% monthly churn if early plans do not expand past the first line of business."
    baseCase: "1.5% monthly churn for integrated but still early payer infrastructure."
    upsideCase: "1.0% monthly churn once benchmark reporting becomes sticky with executive buyers."
    y3RevenueImpactK: -360.0
    cashImpactK: -220.0
  - variable: "sales cycle"
    downsideCase: "Pilot-to-production conversion slips by one extra quarter because data mapping takes longer than 60 days."
    baseCase: "3 pilots sign in Y1 and convert on the milestone cadence in A6 and A7."
    upsideCase: "One pilot converts and expands one quarter faster than base after the first case study lands."
    y3RevenueImpactK: -690.0
    cashImpactK: -520.0
  - variable: "gross margin"
    downsideCase: "65% gross margin because human review, outreach operations, and data cleanup stay heavier."
    baseCase: "70% gross margin per the BP target."
    upsideCase: "72% gross margin from cleaner connector templates and repeatable sponsor workflows."
    y3RevenueImpactK: 0.0
    cashImpactK: -171.0
  - variable: "hiring pace"
    downsideCase: "A second seller and one extra implementation-heavy hire are pulled forward before proof is repeatable."
    baseCase: "Hiring stays milestone-gated as in A12."
    upsideCase: "The second sales hire waits until after the next financing because partner-sourced leads are stronger."
    y3RevenueImpactK: -60.0
    cashImpactK: -300.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      EligibleMembers --> TargetedCohorts
      TargetedCohorts --> PaidPilots
      PaidPilots --> ProductionPlans
      ProductionPlans --> ExpandedPlans
      ExpandedPlans --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue is driven by converting 3 paid pilots into 5 payer accounts and then expanding the first 3 from roughly $480K to $720K ARR through second cohorts and benchmark reporting."
  - checkName: "Must go right"
    finding: "The model needs eligibility, referral, and booking feeds within about 60 days so each pilot can prove lift fast enough to convert before the next procurement cycle."
  - checkName: "Model breaks if"
    finding: "If pilot-to-production conversion drops below the BP's 50% target or gross margin sits near 65%, downside cash compresses toward a sub-$0.4M floor."
  - checkName: "Next-round proof"
    finding: "The next round is justified once the company exits Y2 with 5 paying plans, benchmark reporting live across at least 3 cohorts, and an annualized revenue run rate near $2.9M."
sanityChecks:
  ruleOf40: "Y3 growth 60.6% + EBITDA margin -9.6% = 51.0%"
  burnMultiple: "Y2 burn multiple 0.5x (-$699.0K EBITDA on $1,545.0K net new revenue); Y3 burn multiple 0.3x (-$330.0K EBITDA on $1,290.0K net new revenue)."
  revenuePerFte: "$310.9K Y3 (benchmark $200-400K vertical SaaS)"
  flags:
    - "Base case assumes 5 paying plans by M20, so one missed pilot conversion meaningfully slows Y2 cash efficiency."
    - "Holding gross margin at the BP target from first revenue is achievable only if connector templates and outreach operations standardize quickly."
    - "The seed raise uses the low end of the BP range, but the model still carries more than $1.0M of cash at Y3 end because hiring remains deliberately lean until proof is repeatable."
