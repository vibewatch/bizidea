slug: worker-state-control-tower
date: '2026-05-21'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: 种子轮期初现金
    value: "3000000"
    unit: USD
    source: "[BP fundingAsk] 种子轮目标区间为 $3-5M；模型取下沿 $3.0M，在与轮次表述一致的前提下保持克制。"
  - id: A2
    name: 起始付费客户数（M1）
    value: "0"
    unit: count
    source: "[BP experimentRoadmap 0-90 days] 前 90 天主要做访谈、异常日志收集和原型开发。"
  - id: A3
    name: 首个付费 logo 在 M4 成交
    value: "4"
    unit: month
    source: "[BP experimentRoadmap 3-6 months] 付费试点会在最初的原型和共创客户阶段之后启动。"
  - id: A4
    name: Y1 期末付费 logo 数
    value: "9"
    unit: count
    source: "[BP milestones 0-12 months + heuristic] 3 家共创客户、3 个付费试点，以及至少 2 个正式转化，支撑到 M12 约 9 个累计付费 logo。"
  - id: A5
    name: Y2 期末付费 logo 数
    value: "44"
    unit: count
    source: "[BP milestones 12-24 months + BP gtm.channels] 可复制的创始人主导外呼，再叠加实施伙伴和转介伙伴，足以把付费 logo 扩到 Y2 Q4 的 44 个。"
  - id: A6
    name: Y3 期末付费 logo 数
    value: "75"
    unit: count
    source: "[BP market.som] 第 3 年 SOM 是按约 75 个客户测算的。"
  - id: A7
    name: 成熟客户平均活跃劳动者数
    value: "1000"
    unit: workers/account
    source: "[Research bottomUpSizingDrivers + BP strategicChoices.beachhead] 研究里用的是 800 人/账户；模型把早期 ICP 略微上调到约 1,000 人，因为 BP 的目标客户是 300–2,000 人规模雇主，早期应先打更大的中端客户。"
  - id: A8
    name: 劳动者监控费
    value: "4"
    unit: USD/worker/month
    source: "[Research bottomUpSizingDrivers] 按每名活跃劳动者每月 $4 锚定。"
  - id: A9
    name: 平台年费
    value: "15000"
    unit: USD/account/year
    source: "[Research bottomUpSizingDrivers] 按每个账户每年 $15,000 锚定。"
  - id: A10
    name: 成熟客户混合年 ARPU
    value: "63000"
    unit: USD/account/year
    source: "[Calc from A7-A9] 1,000 名劳动者 x $4 x 12 个月 + $15,000 平台年费 = 每个成熟付费 logo 年化收入 $63,000。"
  - id: A11
    name: 规模化目标毛利率
    value: "70"
    unit: pct
    source: "[BP businessModel.targetGrossMarginPct] 明确目标毛利率为 70%。"
  - id: A12
    name: 每月固定平台与支持 COGS
    value: "14000"
    unit: USD/month
    source: "[Heuristic] 早期集成密集型 B2B SaaS 即便还没起量，也需要基础云资源、监控、支持和合规工具；模型按每月 $14k 计。"
  - id: A13
    name: 可变 COGS 比例
    value: "27"
    unit: pct of revenue
    source: "[Heuristic] API、托管、支持和实施交付负担按收入的 27% 计，这样在规模上来后，毛利率会逐步靠近 BP 的 70% 目标。"
  - id: A14
    name: 单个工程师的年化全成本薪酬
    value: "180000"
    unit: USD/FTE/year
    source: "[Heuristic] 面向中端金融科技 SaaS 的工程师薪酬，已包含福利、税费和间接成本。"
  - id: A15
    name: 单个产品与薪资运营负责人的年化全成本薪酬
    value: "160000"
    unit: USD/FTE/year
    source: "[Heuristic] 兼具产品和薪资运营能力的负责人薪酬，已包含福利和税费。"
  - id: A16
    name: 单个解决方案与客户成功岗位的年化全成本薪酬
    value: "145000"
    unit: USD/FTE/year
    source: "[Heuristic] 面向实施型 B2B SaaS 的解决方案工程 / 客户成功岗位薪酬。"
  - id: A17
    name: 单个销售与伙伴岗位的年化全成本薪酬
    value: "150000"
    unit: USD/FTE/year
    source: "[Heuristic] 贴近创始人的 GTM 或伙伴负责人薪酬，已含佣金预留。"
  - id: A18
    name: 单个 G&A 与运营岗位的年化全成本薪酬
    value: "120000"
    unit: USD/FTE/year
    source: "[Heuristic] 财务与运营经理薪酬，已含福利和税费。"
  - id: A19
    name: 解决方案工程师入场时间
    value: "M4"
    unit: month
    source: "[BP team] 解决方案工程师在 Month 3 入职；模型从 Month 4 的薪资开始确认。"
  - id: A20
    name: 伙伴与 GTM 负责人入场时间
    value: "M7"
    unit: month
    source: "[BP team] 伙伴与 GTM 负责人在 Month 6 入职；模型从 Month 7 的薪资开始确认。"
  - id: A21
    name: Y2 招聘爬坡
    value: "到 Q4Y2 新增 6 名 FTE"
    unit: headcount plan
    source: "[BP sequencingRationale + BP milestones 12-24 months] 只有在早期客户背书和可复制部署出现之后，才补充额外的工程、产品、方案、销售和运营人手。"
  - id: A22
    name: Y3 招聘爬坡
    value: "到 Q4Y3 新增 3 名 FTE"
    unit: headcount plan
    source: "[BP product.twentyFourMonth + heuristic] Y2 之后招聘增速放缓，重点补工程和客户交付能力，而不是做虚胖销售团队。"
  - id: A23
    name: 月度 logo 流失率
    value: "0.8"
    unit: pct/month
    source: "[Heuristic] 黏性较强、按年签约的工作流 SaaS，全年 logo 流失率大约能守在 9–10%，折算月度约 0.8%。"
  - id: A24
    name: 单个新 logo 的 CAC
    value: "30000"
    unit: USD/logo
    source: "[Heuristic] 创始人主导的 payroll-ops 外呼叠加伙伴转介，应能把 CAC 控在约 $30k，低于一个中端客户转正式后首年的毛利。"
  - id: A25
    name: 非薪酬 OPEX 爬坡
    value: "16000 to 39000"
    unit: USD/month
    source: "[Heuristic + BP operations] 安全、法务、财务、差旅和需求生成支出，会从 Y1 早期约 $16k/月，增长到 Y3 Q4 约 $39k/月。"

