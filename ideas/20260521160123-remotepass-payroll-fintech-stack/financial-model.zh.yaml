scenarios:
  downside:
    description: "套件供应商打包叠加源数据噪音拖慢转化，到 Q4Y3 只做到 55 个付费 logo，支持负担也更重。"
    y3RevenueK: 3020.0
    y3EbitdaK: -420.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - "Q4Y3 付费 logo 从 75（A6）降到 55。"
      - "由于买方只愿意先买更小范围，混合年 ARPU 落在 $58K，而不是 $63K（A10）。"
      - "因为支持和实施更长时间维持高位，毛利率最终只能稳定在约 63%（A11-A13）。"
  base:
    description: "创始人主导的薪资运营销售加伙伴转介，把公司推到 Q4Y3 的 75 个付费 logo，成熟 ARPU 约为 $63K。"
    y3RevenueK: 4045.2
    y3EbitdaK: 287.1
    cashLowPointK: 1495.9
    keyAssumptionChanges:
      - "模型假设 A1-A25 全部成立。"
  upside:
    description: "混合栈买方转化更快、伙伴转介奏效，而且更大客户把公司推到 Q4Y3 的 90 个付费 logo。"
    y3RevenueK: 4925.0
    y3EbitdaK: 720.0
    cashLowPointK: 1700.0
    keyAssumptionChanges:
      - "Q4Y3 付费 logo 从 75（A6）升到 90。"
      - "平均账户规模高于 1,000 名劳动者，混合 ARPU 抬到约 $67K（A7-A10）。"
      - "固定支持成本更早被摊薄，毛利率改善到约 72%（A11-A13）。"
sensitivity:
  - variable: ARPU
    downsideCase: "由于劳动者规模更小、平台范围更窄，成熟年 ARPU 降到 $58K"
    baseCase: "1,000 名劳动者叠加 $15K 平台费，对应成熟年 ARPU 为 $63K"
    upsideCase: "更大账户加高级审计范围，把成熟年 ARPU 抬到 $67K"
    y3RevenueImpactK: -520.0
    cashImpactK: -380.0
  - variable: CAC
    downsideCase: "如果创始人外呼没能转成伙伴辅助 pipeline，每个 logo 的 CAC 会到 $40K"
    baseCase: "依靠转介和窄 ICP 定向，每个 logo 的 CAC 为 $30K"
    upsideCase: "如果实施伙伴持续供给线索，每个 logo 的 CAC 可降到 $24K"
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
  - variable: 流失率
    downsideCase: "如果早期试点没能沉淀成高黏性的工作流，月度 logo 流失率会到 1.5%"
    baseCase: "月度 logo 流失率 0.8%"
    upsideCase: "如果发薪周期工作流黏性很强，月度 logo 流失率可降到 0.5%"
    y3RevenueImpactK: -260.0
    cashImpactK: -190.0
  - variable: 销售周期
    downsideCase: "7-8 个月，因为 CFO、People Ops 和 IT 都需要更长审批"
    baseCase: "付费试点到正式转化需要 4–6 个月"
    upsideCase: "3-4 个月，当转介已先筛过买方且连接器契合度很高时"
    y3RevenueImpactK: -480.0
    cashImpactK: -300.0
  - variable: 毛利率
    downsideCase: "63%，因为方案工作和支持长期居高不下"
    baseCase: "目标毛利率 70%"
    upsideCase: "72%，因为固定支持成本更早被更多 logo 摊薄"
    y3RevenueImpactK: 0.0
    cashImpactK: -290.0
  - variable: 招聘节奏
    downsideCase: "Y2 两个面向客户的岗位各延后一季度到位"
    baseCase: "招聘按 BP 的排兵计划推进"
    upsideCase: "关键岗位按时到位且爬坡顺利"
    y3RevenueImpactK: -160.0
    cashImpactK: 120.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Founder outbound and partner referrals] --> PaidLogos[Paying logos]
      PaidLogos --> Workers[Monitored workers per logo]
      Workers --> Revenue[Platform fee plus worker fee]
      Revenue --> GrossProfit[Gross profit after support and infra]
      GrossProfit --> Cash[Ending cash]
modelSanity:
  - checkName: 收入引擎
    finding: "基础情形下，Y3 收入能到 $4.0M，因为公司在 Y2 末有 44 个付费 logo，并进一步扩到 75 个，成熟 ARPU 约 $63K。"
  - checkName: 必须跑对的事
    finding: "公司必须让混合栈买方持续选择中立控制层，至少先打到 Q4Y2 的 44 个付费 logo 基线，否则 Y3 转正 EBITDA 的时点就会往后拖。"
  - checkName: 模型失效条件
    finding: "如果套件整合或数据噪音把业务天花板压在约 55 个 logo，同时毛利率跌进 60% 出头，下行情形会让 Y3 再次变成持续烧钱的一年。"
  - checkName: 下一轮证明点
    finding: "当公司拿到约 25 个付费 logo、跑通伙伴辅助部署，并证明试点到正式上线可复制，同时毛利率朝 70% 走时，下一轮融资才真正站得住。"
sanityChecks:
  ruleOf40: "Y3 收入增速 155%（(4045.2-1588.1)/1588.1）+ EBITDA 利润率 7%（287.1/4045.2）= 162%"
  burnMultiple: "Y2 净烧钱 $646.1K / Y2 末新增净 ARR 约 $2.2M（35 个新增 logo x $63K ARPU）= 0.29x"
  revenuePerFte: "$289K Y3（$4.0M 收入 / 14 FTE），位于 SaaS 基准区间 $200-400K 内"
  flags:
    - "基础情形要求公司从 Y1 末的 9 个付费 logo 拉到 Y2 末的 44 个；如果伙伴转介起不来，这就是最先断掉的地方。"
