slug: worker-state-control-tower
date: '2026-05-21'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: Starting cash from seed round
    value: "3000000"
    unit: USD
    source: "[BP fundingAsk] Seed target range is $3-5M; model uses the low end $3.0M to stay disciplined while matching the stated round."
  - id: A2
    name: Starting paying customers (M1)
    value: "0"
    unit: count
    source: "[BP experimentRoadmap 0-90 days] The first 90 days are interviews, exception-log collection, and prototype work."
  - id: A3
    name: First paying logo closes in M4
    value: "4"
    unit: month
    source: "[BP experimentRoadmap 3-6 months] Paid pilots begin after the initial prototype and design-partner phase."
  - id: A4
    name: Y1 exit paying logos
    value: "9"
    unit: count
    source: "[BP milestones 0-12 months + heuristic] Three design partners, three paid pilots, and at least two production conversions support ~9 cumulative paying logos by M12."
  - id: A5
    name: Y2 exit paying logos
    value: "44"
    unit: count
    source: "[BP milestones 12-24 months + BP gtm.channels] Repeatable founder-led outbound plus implementation and referral partners support scaling to 44 paying logos by Q4Y2."
  - id: A6
    name: Y3 exit paying logos
    value: "75"
    unit: count
    source: "[BP market.som] Year-3 SOM is based on about 75 customers."
  - id: A7
    name: Average active workers per mature logo
    value: "1000"
    unit: workers/account
    source: "[Research bottomUpSizingDrivers + BP strategicChoices.beachhead] Research uses 800 workers/account; model skews early ICP slightly higher at ~1,000 because the BP targets 300-2,000 worker employers and should focus on larger mid-market buyers first."
  - id: A8
    name: Worker monitoring fee
    value: "4"
    unit: USD/worker/month
    source: "[Research bottomUpSizingDrivers] Worker-based fee anchored at $4 per active worker per month."
  - id: A9
    name: Annual platform fee
    value: "15000"
    unit: USD/account/year
    source: "[Research bottomUpSizingDrivers] Annual platform fee anchored at $15,000 per account."
  - id: A10
    name: Blended mature annual ARPU
    value: "63000"
    unit: USD/account/year
    source: "[Calc from A7-A9] 1,000 workers x $4 x 12 months + $15,000 platform fee = $63,000 annualized revenue per mature paying logo."
  - id: A11
    name: Target gross margin at scale
    value: "70"
    unit: pct
    source: "[BP businessModel.targetGrossMarginPct] Explicit target gross margin is 70%."
  - id: A12
    name: Fixed monthly platform and support COGS
    value: "14000"
    unit: USD/month
    source: "[Heuristic] Early integration-heavy B2B SaaS needs baseline cloud, monitoring, support, and compliance tooling even before scale; modeled at $14k/month."
  - id: A13
    name: Variable COGS rate
    value: "27"
    unit: pct of revenue
    source: "[Heuristic] API, hosting, support, and implementation-delivery burden modeled at 27% of revenue so gross margin approaches the BP's 70% target once volume absorbs fixed cost."
  - id: A14
    name: Loaded annual pay per engineer
    value: "180000"
    unit: USD/FTE/year
    source: "[Heuristic] Mid-market fintech SaaS engineering compensation with benefits, taxes, and overhead."
  - id: A15
    name: Loaded annual pay per product and payroll ops lead
    value: "160000"
    unit: USD/FTE/year
    source: "[Heuristic] Product/payroll-operations hybrid lead compensation with benefits and taxes."
  - id: A16
    name: Loaded annual pay per solutions and customer success hire
    value: "145000"
    unit: USD/FTE/year
    source: "[Heuristic] Solutions engineer / customer success compensation for implementation-heavy B2B SaaS."
  - id: A17
    name: Loaded annual pay per sales and partnerships hire
    value: "150000"
    unit: USD/FTE/year
    source: "[Heuristic] Founder-adjacent GTM or partnerships lead compensation with commission allowance."
  - id: A18
    name: Loaded annual pay per G&A and operations hire
    value: "120000"
    unit: USD/FTE/year
    source: "[Heuristic] Finance and operations manager compensation with benefits and taxes."
  - id: A19
    name: Solutions engineer start timing
    value: "M4"
    unit: month
    source: "[BP team] Solutions engineer starts in Month 3; model recognizes the hire from Month 4 payroll."
  - id: A20
    name: Partnerships and GTM lead start timing
    value: "M7"
    unit: month
    source: "[BP team] Partnerships and GTM lead starts in Month 6; model recognizes the hire from Month 7 payroll."
  - id: A21
    name: Y2 hiring ramp
    value: "Add 6 FTE by Q4Y2"
    unit: headcount plan
    source: "[BP sequencingRationale + BP milestones 12-24 months] Additional engineering, product, solutions, sales, and operations capacity is added only after early references and repeatable deployments exist."
  - id: A22
    name: Y3 hiring ramp
    value: "Add 3 FTE by Q4Y3"
    unit: headcount plan
    source: "[BP product.twentyFourMonth + heuristic] Headcount growth slows after Y2 and focuses on engineering and customer-capacity support rather than a vanity sales build-out."
  - id: A23
    name: Monthly logo churn
    value: "0.8"
    unit: pct/month
    source: "[Heuristic] Sticky workflow SaaS with annual contracts can hold roughly 9-10% annual logo churn, equivalent to about 0.8% monthly."
  - id: A24
    name: CAC per new logo
    value: "30000"
    unit: USD/logo
    source: "[Heuristic] Founder-led payroll-ops outbound plus partner referrals should keep CAC around $30k, below first-year gross profit on a converted mid-market logo."
  - id: A25
    name: Non-salary opex ramp
    value: "16000 to 39000"
    unit: USD/month
    source: "[Heuristic + BP operations] Security, legal, accounting, travel, and demand-gen spend grows from roughly $16k/month in early Y1 to roughly $39k/month by Q4Y3."

