scenarios:
  downside:
    description: "Suite-vendor bundling and noisy source data slow conversions, leaving only 55 paying logos by Q4Y3 and heavier support burden."
    y3RevenueK: 3020.0
    y3EbitdaK: -420.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - "Q4Y3 paying logos fall to 55 from 75 (A6)."
      - "Blended annual ARPU lands at $58K instead of $63K because buyers stay on smaller initial scopes (A10)."
      - "Gross margin settles near 63% because support and implementation stay heavier for longer (A11-A13)."
  base:
    description: "Founder-led payroll-ops sales plus partner referrals scale the company to 75 paying logos by Q4Y3 at roughly $63K mature ARPU."
    y3RevenueK: 4045.2
    y3EbitdaK: 287.1
    cashLowPointK: 1495.9
    keyAssumptionChanges:
      - "All model assumptions A1-A25 hold."
  upside:
    description: "Mixed-stack buyers convert faster, partner referrals work, and larger accounts push the company to 90 paying logos by Q4Y3."
    y3RevenueK: 4925.0
    y3EbitdaK: 720.0
    cashLowPointK: 1700.0
    keyAssumptionChanges:
      - "Q4Y3 paying logos rise to 90 from 75 (A6)."
      - "Average account size rises above 1,000 workers and blended ARPU lifts to about $67K (A7-A10)."
      - "Gross margin improves to roughly 72% as support leverage arrives earlier (A11-A13)."
sensitivity:
  - variable: ARPU
    downsideCase: "$58K mature annual ARPU from smaller worker counts and lower platform scope"
    baseCase: "$63K mature annual ARPU from 1,000 workers plus $15K platform fee"
    upsideCase: "$67K mature annual ARPU from larger accounts and premium audit scope"
    y3RevenueImpactK: -520.0
    cashImpactK: -380.0
  - variable: CAC
    downsideCase: "$40K per logo if founder-led outbound does not transition to partner-assisted pipeline"
    baseCase: "$30K per logo with referrals and narrow ICP targeting"
    upsideCase: "$24K per logo with strong implementation-partner sourcing"
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
  - variable: churn
    downsideCase: "1.5% monthly logo churn if early pilots do not convert into sticky workflows"
    baseCase: "0.8% monthly logo churn"
    upsideCase: "0.5% monthly logo churn with strong payroll-cycle workflow stickiness"
    y3RevenueImpactK: -260.0
    cashImpactK: -190.0
  - variable: "sales cycle"
    downsideCase: "7-8 months as CFO, People Ops, and IT all need longer approval"
    baseCase: "4-6 months for paid pilot and production conversion"
    upsideCase: "3-4 months when referrals pre-qualify the buyer and connector fit"
    y3RevenueImpactK: -480.0
    cashImpactK: -300.0
  - variable: "gross margin"
    downsideCase: "63% because solutions work and support stay elevated"
    baseCase: "70% target gross margin"
    upsideCase: "72% as fixed support cost spreads across more logos"
    y3RevenueImpactK: 0.0
    cashImpactK: -290.0
  - variable: "hiring pace"
    downsideCase: "Two Y2 customer-facing hires slip by one quarter"
    baseCase: "Hiring follows the BP sequencing plan"
    upsideCase: "Key hires land on time and ramp efficiently"
    y3RevenueImpactK: -160.0
    cashImpactK: 120.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Founder outbound and partner referrals] --> PaidLogos[Paying logos]
      PaidLogos --> Workers[Monitored workers per logo]
      Workers --> Revenue[Platform fee plus worker fee]
      Revenue --> GrossProfit[Gross profit after support and infra]
      GrossProfit --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue reaches $4.0M in Y3 because the company exits Y2 with 44 paying logos and scales to 75 logos at roughly $63K mature ARPU."
  - checkName: Must go right
    finding: "The company must keep mixed-stack buyers choosing a neutral control layer often enough to hit the 44-logo Q4Y2 base, or Y3's move to positive EBITDA slips."
  - checkName: Model breaks if
    finding: "If suite consolidation or noisy data quality caps the business near 55 logos and pushes gross margin into the low 60s, the downside case turns Y3 back into a cash-consuming year."
  - checkName: Next-round proof
    finding: "The next round is justified once the company shows roughly 25 paying logos, partner-assisted deployments, and repeatable pilot-to-production conversion with gross margin tracking toward 70%."
sanityChecks:
  ruleOf40: "Y3 revenue growth 155% ((4045.2-1588.1)/1588.1) + EBITDA margin 7% (287.1/4045.2) = 162%"
  burnMultiple: "Y2 net burn $646.1K / net new ARR added exiting Y2 of roughly $2.2M (35 additional logos x $63K ARPU) = 0.29x"
  revenuePerFte: "$289K Y3 ($4.0M revenue / 14 FTE), within the $200-400K SaaS benchmark range"
  flags:
    - "The base case requires scaling from 9 paying logos at Y1 exit to 44 at Y2 exit; if partner referrals do not materialize, this ramp is the first thing to break."
    - "Gross profit is negative in early Y1 because fixed platform and support cost dominate at low volume, so the model depends on getting past ~25 logos before margin quality looks healthy."
    - "CustomersEop is best read as paying logos rather than only fully converted production accounts; if pilot-to-production conversion falls below the BP's 50% goal, logo count will overstate durable ARR."
