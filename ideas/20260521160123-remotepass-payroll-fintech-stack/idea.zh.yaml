    - 客户上线与支持
    - 合规与安全运营
    - 人员生命周期规则维护
jobsToBeDone:
  - job: >-
      当发薪截止临近时，帮全球薪资团队证明每位劳动者都已经正确入职、具备资格，并且跨系统映射一致，好让我们不用临门一脚再救火也能顺利跑薪。
    currentAlternative: 电子表格清单外加 HRIS、薪资和报销工具上的人工复核
    successMetric: 每个周期的发薪异常更少，异常处理时长更短
  - job: >-
      当员工或承包商转岗或离开时，帮运营团队按正确顺序撤掉薪资、卡片、福利和系统权限，避免多付钱、伤留存，或在审计里留坑。
    currentAlternative: People Ops、财务和 IT 之间靠工单队列和临时协调推进
    successMetric: 干净完成离职的耗时，以及离职后还要补救的事件数量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      4 个同日来源共同指向薪资、支出、合规和员工金融可得性正在并成同一平台层，而且给出了具体的规模和产品证据。
  painIntensity:
    score: 4
    rationale: >-
      发薪异常、延迟打款和离职失误会反复制造运营痛点；对分布式公司尤为尖锐，但目前仍集中在一个相对清晰的买方细分里。
  wedgeClarity:
    score: 5
    rationale: >-
      发薪前人员状态控制塔是一个边界很清楚的首发流程：用户明确、触发点明确、结果也能量化。
  defensibility:
    score: 4
    rationale: >-
      人员状态图谱、异常历史、处置手册和跨系统映射会越跑越厚，这些东西并不是任何单一底层供应商都能轻松复刻的。
  ventureScale:
    score: 5
    rationale: >-
      滩头市场很聚焦，但同一层控制能力可以横向扩到全球薪资、支出、福利、身份、审计和更多劳动力运营流程。
topRisks:
  - name: 现有厂商打包风险
    description: 一旦客户开始要求更一体化的控制，薪资、EOR 或支出供应商可能会补上基础的就绪检查。
    mitigation: 聚焦厂商中立的人员状态图谱和跨系统处置工作流；即便客户底层是多供应商环境，这些能力依旧有价值。
  - name: 跨部门归属不清
    description: 如果 HR、财务和 IT 都感到痛，但没有任何一个团队明确掌预算，销售就容易拖住。
    mitigation: 先围绕“减少发薪异常”卖给 CFO 或 VP People，再借共享的审计和离职结果把相邻团队带进来。
  - name: 集成信任缺口
    description: 如果人员状态数据不完整，或来得太慢，客户就会直接否掉产品，因为它拦不住真正的发薪错误。
    mitigation: 先用只读模式接一小组系统，在发薪截止前先证明异常捕获率，等数据质量站稳后再扩自动化。
