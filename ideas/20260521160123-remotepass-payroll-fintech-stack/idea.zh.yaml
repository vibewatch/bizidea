problem: >-
  分布式公司至今还把人员生命周期变化分散在 HRIS、薪资、报销、企业卡和身份系统里管理，所以一次入职或离职出错，就可能连锁引发发薪失败、企业卡还在生效、合规数据缺失，或者权限迟迟没收回。跨境团队对这种痛感更强，因为每个异常都撞在发薪截止、本地合规检查和延迟付款这些关键节点上。随着平台把薪资和支出并进同一套栈，瓶颈也从“每个国家怎么跑薪”变成了“在钱和权限开始流动前，怎么先证明这个人的状态是对的”。
targetUser:
  primary: >-
    主要用户是 remote-first 软件公司和 BPO 公司的全球薪资运营负责人、People Systems 负责人；这些公司通常在 15–40 个国家雇了 300–2,000 人，同时混用 EOR 员工和承包商。
  secondary: >-
    次级用户是财务控制负责人和 IT 运营经理，他们也在替同一批员工处理费用卡、入职和离职异常。
  buyer: CFO 或 People Operations 副总裁
startupThesis:
  nonObviousInsight: >-
    下一家赢下全球雇佣的软件，不会是又一个按国家拆开的薪资引擎。随着薪资、支出、合规和入职塌缩成一层运营底座，真正稀缺的资产会变成一张人员状态图谱：它能在发薪、发卡和离职动作发生前，先把所有下游系统对齐。
  beachhead: >-
    首个滩头市场是欧洲、MENA 和南亚的 remote-first 软件公司与 BPO 公司，员工规模 300–2,000 人；它们通常有一套 HRIS，再叠几套分开的 EOR/承包商薪资和费用卡工具，同时管理全职员工与承包商。
  wedge: >-
    切口是一座发薪前人员状态控制塔：在每个发薪周期前，检查合同状态、入职完成度、合规文件、费用卡资格和权限变更，并把异常自动分流给 HR、财务或 IT。
  whyNowCatalyst: >-
    RemotePass 的融资和产品方向已经说明，薪资、支出、员工金融可得性和入职正在被统一起来；这让一层跨职能控制系统在今天既做得出来，也能拿到预算。
  ventureScalePath: >-
    先从发薪前就绪度和离职完整性软件切入，再扩到 joiner-mover-leaver 编排、福利与支出策略执行、审计证据，以及服务全球人员运营的厂商中立系统记录层。
solution: >-
  做一座人员状态控制塔，把 HRIS 记录、EOR/承包商状态、薪资配置、费用卡发放、合规文件和身份提供商事件同步到同一条人员时间线上。每次发薪前，产品都会给每个人打发薪就绪分，标出冲突——比如已终止的承包商却还有有效卡，或新近开始发薪的员工缺 KYC——然后为 HR、财务或 IT 拉起对应的处置手册。人员离职或角色变化后，系统再核验薪资、福利、卡片和权限是否按正确顺序更新，并把整条审计轨迹留下来。时间越久，这套系统就越像公司的控制平面：即便底层还保留多家薪资和支出供应商，也能把全球人员运营流程统一起来。
goToMarketSeed:
  firstCustomer: >-
    第一批客户应是 500–1,500 人规模的 remote-first 软件或 BPO 公司，团队分布在 MENA、东欧和南亚，已有一套 HRIS、一家全球薪资或 EOR 供应商，以及独立的报销或企业卡工具，因此每月都会冒出异常队列。
  buyingTrigger: >-
    在快速招聘、并购或新国家扩张之后，连续 2 个以上发薪周期出现打款失败、离职延迟，或卡片与权限不一致，往往就是采购触发点。
  currentAlternative: >-
    现在的替代方案通常是电子表格 runbook、HRIS 工作流、薪资供应商后台、身份管理工单，以及 People Ops、财务、IT 在 Slack 上来回追异常。
  switchingReason: >-
    这座控制塔能在发薪截止前就抓到跨系统的人员状态冲突，减少异常救火，还能给审计方提供一条按人展开的完整时间线，同时不逼客户把现有薪资或支出供应商整套换掉。
  pricingHypothesis: >-
    定价假设是按活跃全球劳动者或法人实体收年费订阅，并对 HRIS、薪资、卡片和身份集成收实施费。
whyNow:
  - point: >-
      SpendCards 被并进同一套发薪系统后，带来了一类新的错误和控制需求；财务团队已经没法只靠薪资工具来管。
    signalRefs: ["薪资与支出正在并成一个运营层"]
    sourceRefs: [2]
  - point: >-
      面向员工的 USD 账户、借记卡和健康保险说明，雇佣平台现在不仅要发薪，还得管员工每天的金融可得性；这会把入职和离职出错的代价进一步抬高。
    signalRefs: ["员工金融可得性正在变成雇佣功能"]
    sourceRefs: [3]
  - point: >-
      当跨境付款延迟和汇率波动已经开始伤留存，买方就更能为“在错误演变成漏发、错发工资之前就先拦住”的软件买单。
    signalRefs: ["支付可靠性已经成了留存杠杆"]
    sourceRefs: [3]
  - point: >-
      RemotePass 的规模和提前盈利说明，全球雇佣软件已经成熟到客户愿意在上层再买一层专门控制系统，而不是永远忍受手工处理异常。
    signalRefs: ["全球雇佣平台已经跑到企业级规模"]
    sourceRefs: [1, 2]
  - point: >-
      路线图正把薪资、合规和入职流程拉到一起，意味着 HR、财务和 IT 的预算都在向同一个运营问题收拢，控制塔有机会把这件事吃下来。
    signalRefs: ["HR、财务与 IT 正围绕同一套人员流程收敛"]
    sourceRefs: [4]
differentiator: >-
  这不是又一个 EOR、薪资处理器或企业卡计划。产品站在客户现有供应商栈之上，把碎片化的人员事件编成一张控制图谱，里面既有就绪度检查，也有审批历史和处置流程。这张图谱会随着每次发薪和每次生命周期事件不断增厚，沉淀出高黏性的运营数据；而这恰恰是点状产品和单系统供应商天然抓不全的东西。
