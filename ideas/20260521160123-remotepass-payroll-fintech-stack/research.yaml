    threatOfEntrants:
      score: 3
      rationale: New entrants can build integration layers, but country-specific workflow logic, audit trust, and multi-system data normalization raise the bar above a simple dashboard.
      sourceRefs:
        - 9
        - 19
        - 24
    threatOfSubstitutes:
      score: 4
      rationale: Spreadsheets, ticketing, and incumbent suites are viable substitutes, especially when teams tolerate manual work until a few painful payroll or offboarding incidents force change.
      sourceRefs:
