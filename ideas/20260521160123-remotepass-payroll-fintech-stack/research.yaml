openQuestions:
  - What is the true baseline payroll-exception rate per cycle for 500-1,500 employee remote-first companies using mixed payroll, EOR, and spend stacks?
  - Which executive most reliably owns budget when the pain spans payroll, offboarding, app access, and corporate cards?
  - Can major spend-card and payroll vendors expose the event-level APIs needed for read-only readiness scoring without expanding the startup into full payment orchestration scope?
  - How often do customers prefer a vendor-neutral control layer over migrating onto a single suite such as Rippling or Remote?
