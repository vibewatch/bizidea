        - 22
    - factor: legal
      impact: negative
      point: Employment-context privacy rules and controller-processor obligations raise implementation complexity for cross-border worker data products.
      sourceRefs:
        - 10
        - 11
  adoptionFrictionMatrix:
    - friction: Cross-functional budget ownership
      severity: high
      affectedBuyer: CFO, VP People Operations, and IT operations leaders
      mitigation: Land on payroll-exception reduction first, then expand into audit and offboarding use cases with shared KPIs.
      sourceRefs:
        - 5
        - 8
    - friction: Integration trust and data latency
      severity: high
      affectedBuyer: People systems and payroll operations teams
      mitigation: Start read-only with narrow connectors and prove pre-payroll catch rate before enabling write-back automation.
      sourceRefs:
        - 9
        - 19
    - friction: Privacy and compliance review
      severity: high
      affectedBuyer: Legal, security, and compliance stakeholders
      mitigation: Limit processor scope, document data flows, and avoid unnecessary card-data handling.
      sourceRefs:
        - 10
        - 11
        - 13
    - friction: Incumbent suite bundle pressure
      severity: medium
      affectedBuyer: Procurement and operations leaders already using Rippling or a global employment suite
      mitigation: Position as the control layer for mixed stacks and migration periods rather than a full-suite replacement.
      sourceRefs:
        - 17
        - 22
        - 23
