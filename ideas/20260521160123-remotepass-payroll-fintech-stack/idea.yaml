jobsToBeDone:
  - job: >-
      When a payroll cutoff is approaching, help our global payroll team prove every worker is correctly onboarded,
      eligible, and mapped across systems, so we can run payroll without last-minute exceptions.
    currentAlternative: Spreadsheet checklists plus manual reviews across HRIS, payroll, and expense tools
    successMetric: Fewer payroll exceptions per cycle and shorter exception-resolution time
  - job: >-
      When an employee or contractor changes role or leaves, help operations remove pay, card, benefit, and access
      entitlements in the right order, so we avoid overpayment, retention pain, and audit findings.
    currentAlternative: Ticket queues and ad hoc coordination across People Ops, Finance, and IT
    successMetric: Time to complete clean offboarding and number of post-exit remediation events
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      Four same-day sources show a credible platform shift toward combined payroll, spend, compliance, and worker
      financial access, with concrete scale and product evidence.
  painIntensity:
    score: 4
    rationale: >-
      Payroll exceptions, delayed pay, and offboarding failures create recurring operational pain that is acute for
      distributed companies but still concentrated in a defined buyer segment.
  wedgeClarity:
    score: 5
    rationale: >-
      A pre-payroll worker-state control tower is a narrow first workflow with a specific user, trigger, and measurable
      outcome.
  defensibility:
    score: 4
    rationale: >-
      Worker-state graphs, exception histories, remediation playbooks, and cross-system mappings compound over time and
      are hard for any single underlying vendor to replicate cleanly.
  ventureScale:
    score: 5
    rationale: >-
      The beachhead is focused, but the same control layer can expand across global payroll, spend, benefits, identity,
      audit, and workforce operating workflows.
topRisks:
  - name: Incumbent bundle risk
    description: Payroll, EOR, or spend vendors could add basic readiness checks once customers demand more integrated controls.
    mitigation: Focus on vendor-neutral worker-state graphs and cross-system remediation workflows that remain valuable even in multi-vendor environments.
  - name: Cross-functional ownership ambiguity
    description: Deals can stall if HR, finance, and IT all feel the pain but no single team clearly owns the budget.
    mitigation: Sell first around payroll-exception reduction to CFO or VP People buyers, then land adjacent teams through shared audit and offboarding outcomes.
  - name: Integration trust gap
    description: Customers will reject the product if worker-state data is incomplete or arrives too late to prevent payroll mistakes.
    mitigation: Start with read-only monitoring on a narrow system set, prove exception catch rate before payroll cutoffs, and expand automation only after data quality is trusted.
