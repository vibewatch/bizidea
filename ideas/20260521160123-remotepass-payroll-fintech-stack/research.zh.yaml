  - driver: 按劳动者计费
    value: $4 per active worker per month
    source: calc anchored below substitute pricing [14], [20]
  - driver: 平台年费
    value: $15,000 per account
    source: calc
  - driver: 滩头市场占 TAM 账户比例
    value: 35%
    source: calc informed by target geography focus and RemotePass evidence [1], [3]
categoryDynamics:
  growthRate: 8.5% CAGR
  growthRateSourceRefs:
    - 27
  tailwinds:
    - point: 薪资团队里 API 的采用，以及计划中的 AI 采用，正在让编排型产品更容易拿到运营预算。
      sourceRefs:
        - 5
    - point: 全球雇佣平台越来越承诺用一个入口管理薪资、入职、合规和员工支持，这等于替“围绕同一流程集中预算”做了市场教育。
      sourceRefs:
        - 1
        - 17
        - 22
    - point: 更宽的 HCM 和 HR 科技市场仍在增长，给劳动力运营相关软件撑起了更大的预算池。
      sourceRefs:
        - 26
        - 27
        - 28
  headwinds:
    - point: 强势套件供应商已经在主打 all-in-one 整合，这会挤压单独采购控制平面的空间。
      sourceRefs:
        - 17
        - 22
    - point: 隐私、雇佣和支付数据要求，会抬高实施和安全审查摩擦。
      sourceRefs:
        - 10
        - 11
        - 13
    - point: 在失败还没严重到不可忍受之前，买方完全可以继续靠电子表格和人工报表往下拖。
      sourceRefs:
        - 5
        - 25
competitors:
  - name: Rippling
    stage: incumbent
    wedge: 在同一系统里统一 HR、薪资、身份、设备和合规管理
    pricing: 基于报价的模块化定价，叠加在 Rippling 核心平台之上
    strength: 与本 thesis 的重叠度最高，因为它已经通过同一张员工图谱，把入职、离职、薪资、应用权限和审计控制接了起来。
    weaknessVsUs: 最适合客户全量标准化到 Rippling；作为跨薪资、EOR、支出和身份多供应商环境的中立控制层，反而没那么强。
    sourceRefs:
      - 22
      - 23
      - 24
      - 25
  - name: RemotePass
    stage: scale-up
    wedge: 以 MENA 深度为优势，把全球薪资、支出、嵌入式员工金融产品和 AI 驱动的劳动力运营打成一体
    pricing: 抓取材料里未披露公开企业定价
    strength: 是“薪资、支出和员工金融可得性正收束到同一运营界面”的强证明。
    weaknessVsUs: 它仍然是套件供应商；创业公司可以站在异构供应商栈之上，把异常控制和审计能力做得更深。
    sourceRefs:
      - 1
      - 3
      - 4
  - name: Remote
    stage: scale-up
    wedge: 面向国际雇佣的自有实体全球薪资、HRIS 与合规平台
    pricing: 提供自定义和套餐定价，抓取材料里更强调平台整合，而非公开挂牌价细节
    strength: 合规叙事很强，也明确在讲 all-in-one 的员工生命周期平台。
    weaknessVsUs: 更适合推动套件整合，而不是满足那些有意保留多套薪资、支出和身份系统的买方环境。
    sourceRefs:
      - 16
      - 17
      - 18
      - 19
  - name: Deel
    stage: incumbent
    wedge: 大规模全球雇佣、EOR、承包商与薪资执行平台
    pricing: 标准 EOR 每名员工每月 $599，企业版 EOR $899，标准承包商管理每名承包商每月 $49
    strength: 规模大、国家覆盖广、买方认知强，是全球雇佣运营里的常见默认选项。
    weaknessVsUs: 对外材料更强调执行和雇佣基础设施，而不是厂商中立、跨系统的人员状态控制层。
    sourceRefs:
      - 14
  - name: Oyster
    stage: scale-up
    wedge: 面向 remote-first 团队的 EOR 与全球薪资平台，定价透明，并覆盖入离职支持
    pricing: EOR 每名员工每月 $699，承包商每月 $29，全球薪资每名员工每月 $29
    strength: remote-first 定位清晰，分布式团队用工的经济模型也透明。
    weaknessVsUs: 在财务与 IT 编排、以及身份控制深度上，证据不如 Rippling 和拟议中的创业公司。
    sourceRefs:
      - 20
      - 21
regulatoryTechnicalConstraints:
  - point: 当产品跨系统同步人员记录时，controller-processor 边界与员工数据处理义务必须在合同里讲清楚。
    sourceRefs:
      - 10
      - 11
  - point: 各国的离职和终止流程会影响通知期、薪资申报、文档处理和福利处置。
    sourceRefs:
      - 19
  - point: 一旦产品碰到 payroll-card 或 spend-card 数据，PCI DSS 范围和访问控制就会变成实质问题。
    sourceRefs:
      - 13
  - point: 与支付相关的工作流，可能要求制裁控制和可审计的内部控制。
    sourceRefs:
      - 12
  - point: HR 到 IT 的同步必须快到足以避免权限滞后和下游开通变化漏掉。
    sourceRefs:
      - 8
      - 9
validationSignals:
  - point: RemotePass 报告称其在 2025 年初实现盈利，支持了 150 多个国家的 35,000 多名劳动者，并处理了超过 $800 million 的跨境薪资。
    sourceRefs:
      - 1
      - 3
  - point: PayrollOrg 报告称，44% 的组织已经在薪资运营里使用 API，30% 计划接入 AI，说明这套栈正朝编排化升级。
    sourceRefs:
      - 5
  - point: Okta 记录了 HR 驱动生命周期自动化带来的真实节省和更快开通速度，证明减少手工 joiner-mover-leaver 工作有明确运营价值。
    sourceRefs:
      - 7
      - 8
  - point: Rippling 把统一 HR、IT 和薪资卖给了 25,000 多家企业，说明买方确实愿意为横跨员工生命周期系统的共享控制面买单。
    sourceRefs:
      - 22
      - 24
openQuestions:
  - 混用薪资、EOR 和支出栈的 500–1,500 人规模 remote-first 公司，每个发薪周期的基础异常率到底是多少？
  - 当痛点横跨发薪、离职、应用权限和企业卡时，究竟哪位高管最稳定地掌预算？
  - 大型费用卡和薪资供应商，能否开放做只读就绪评分所需的事件级 API，而不把创业公司拖进完整支付编排范围？
  - 客户到底会多常选择厂商中立控制层，而不是直接迁到 Rippling 或 Remote 这种单一套件？
