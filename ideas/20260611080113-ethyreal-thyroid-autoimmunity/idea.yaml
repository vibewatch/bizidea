topRisks:
  - name: Clinical timing risk
    description: If first-wave Graves and TED assets slip or fail, sponsor budgets for a category-specific activation layer could evaporate before the company scales.
    mitigation: Start with protocol-agnostic workflow modules that also support natural-history studies, medical-affairs evidence generation, and later commercial readiness across adjacent autoimmune programs.
  - name: Site workflow resistance
    description: Endocrinology and ophthalmology sites may resist adding another sponsor workflow if it feels like extra coordinator work without clear patient benefit.
    mitigation: Launch with lightweight coordinator tools, services-assisted setup, and dashboards that directly reduce missing packets, duplicate outreach, and screening confusion.
  - name: CRO bundling pressure
    description: Large CROs could try to absorb the wedge into broader trial-ops contracts once the pain is visible.
    mitigation: Integrate with CRO systems rather than replace them and build a differentiated Graves/TED dataset around referral patterns, endpoint completeness, and site archetype performance.
