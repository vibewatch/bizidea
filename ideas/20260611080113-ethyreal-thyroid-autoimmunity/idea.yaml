problem: >-
  Graves disease and thyroid eye disease are managed through fragmented endocrine and ophthalmology pathways even though the new
  therapeutic thesis is that both conditions can be addressed through a shared pathogenic mechanism. Sponsors trying to run early
  trials or prepare for launch therefore face a messy operational gap: the right patients are hard to identify across specialties,
  baseline imaging and lab workups are inconsistent, and endpoint evidence is assembled manually across sites. As causal dual-disease
  therapies move toward the clinic, the bottleneck shifts from molecule novelty to whether sponsors can build a repeatable patient and
  evidence funnel.
targetUser:
  primary: VP Clinical Operations or Head of Clinical Development at a venture-backed biotech advancing a Graves or thyroid eye disease asset into first-in-human or early proof-of-concept studies
  secondary: Medical affairs lead, trial-enablement director, or site engagement lead coordinating endocrinology and ophthalmology centers
  buyer: Chief Medical Officer, Chief Operating Officer, or SVP Clinical Development at the sponsor
startupThesis:
  nonObviousInsight: >-
    If a therapy can finally target the shared driver of Graves disease and TED, the scarce asset is no longer just the molecule. It
    is the operational layer that can unite endocrinology and ophthalmology around one referral graph, one baseline packet, and one
    evidence model. The winning startup is not another drug developer but the sponsor-facing workflow company that turns a fragmented
    cross-specialty disease journey into a repeatable trial and launch system.
  beachhead: >-
    Series A-C endocrine and ophthalmology biotechs with one TSHR-pathway or adjacent Graves/TED asset entering Phase I or Phase II,
    10-40 planned North American sites, and limited in-house field teams to coordinate cross-specialty patient identification and
    endpoint capture
  wedge: >-
    A Graves/TED activation OS that maps endocrine-to-ophthalmology referral paths, pre-qualifies likely eligible patients,
    standardizes baseline imaging and lab packets, and monitors site-by-site screening and endpoint completeness from first referral
    through first dose
  whyNowCatalyst: >-
    Ethyreal's financing, explicit dual-indication TSHR thesis, near-term ENDO 2026 data, and planned first-in-human start in the
    second half of 2026 show the category is moving from scientific framing to operational execution.
  ventureScalePath: >-
    Start with Graves and TED sponsor workflows, then extend the same cross-specialty patient-finding and evidence layer into other
    autoantibody diseases where one mechanism spans multiple care pathways, including neuromuscular, dermatology, and systemic
    autoimmune programs, and eventually become the default activation stack for specialty autoimmune launches.
solution: >-
  The startup would sell a software-plus-ops layer to biotech sponsors building Graves and TED programs. It would help sponsors
  select and activate sites, define referral handoffs between endocrinology and ophthalmology, and run a structured chart-review and
  pre-screening workflow that surfaces likely eligible patients without waiting for ad hoc physician memory. The product would also
  standardize baseline imaging, lab, and symptom packet completion so that early trials generate cleaner dual-disease evidence and
  future launch teams know where patient leakage occurs. Instead of replacing CRO systems, it would sit on top as the disease-specific
  operating layer for screening velocity, endpoint completeness, and cross-specialty coordination. Over time, the moat becomes a
  proprietary dataset linking referral sources, baseline presentation patterns, enrollment speed, and downstream response or retention
  across Graves/TED programs.
goToMarketSeed:
  firstCustomer: >-
    A Series A-C biotech with one Graves or TED program entering first-in-human startup, outsourcing generic trial execution to a CRO
    but still lacking a dedicated internal team to coordinate endocrinology and ophthalmology screening workflows across its first 10-20 sites
  buyingTrigger: >-
    Site-selection freeze for a first-in-human or proof-of-concept study, a major preclinical or congress readout that accelerates
    clinical planning, or early commercial planning around a subcutaneous or autoinjector product profile
  currentAlternative: >-
    Generic CRO site-startup services, KOL spreadsheets, manual coordinator outreach, CTMS and EDC systems, and unstructured
    endocrinology-to-ophthalmology referrals
  switchingReason: >-
    The wedge solves the exact bottleneck generic CRO tooling misses: getting the right Graves and TED patients identified, worked up,
    and measured consistently across two specialties fast enough for an early asset to prove momentum
  pricingHypothesis: >-
    Annual platform fee per active asset program plus per-site activation fees, with expansion into launch-readiness analytics and
    post-approval patient-funnel modules
