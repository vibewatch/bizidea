jobsToBeDone:
  - job: When a new Graves or TED study opens, help the sponsor find and pre-qualify the right patients across endocrinology and ophthalmology workflows, so they can hit enrollment targets without overbuilding internal field teams.
    currentAlternative: Generic CRO outreach, ad hoc physician referrals, and manual coordinator tracking
    successMetric: Days from site activation to first screened patient and percent of referrals that reach full eligibility review
  - job: When early clinical data needs to convince investors, regulators, and future launch teams, help the sponsor capture complete dual-disease baseline and follow-up evidence, so they can compare sites and cohorts with confidence.
    currentAlternative: EDC plus manual reconciliation across imaging, lab, and symptom records
    successMetric: Baseline packet completeness, endpoint query rate, and time to produce review-ready site performance summaries
