differentiator: >-
  CROs can run generic studies, patient-support hubs typically activate only after approval, and EMR vendors do not own sponsor-side
  disease activation workflows. This company would win by owning the narrow but high-value layer between two specialties for a new
  autoimmune drug class: referral mapping, pre-screening logic, baseline packet completion, and endpoint quality. Its defensibility
  compounds through a sponsor-specific dataset on where Graves/TED programs lose candidates, which site archetypes enroll fastest,
  and which evidence bundles best predict downstream treatment fit.
