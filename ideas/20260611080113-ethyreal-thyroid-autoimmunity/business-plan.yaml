slug: graves-ted-trial-os
date: '2026-06-11'
executiveSummary: >-
  Graves TED Trial OS is a sponsor-facing activation layer for biotech teams
  running Graves disease and thyroid eye disease programs across endocrinology
  and ophthalmology sites. The plan is to start with U.S. Series A-C sponsors
  entering Phase I or Phase II with 10-40 North American sites, where the
  immediate problem is not generic CTMS administration but referral leakage,
  inconsistent baseline packets, and slow first-patient screening across two
  specialties. Research supports a real operational trigger because TED care is
  explicitly multidisciplinary, site startup burden is already high, and
  category financing and pipeline progress make pre-FPI execution spend easier
  to justify. The wedge is narrow by design: standardize endocrine-to-
  ophthalmology referral paths, pre-screen likely candidates, and track
  baseline imaging, labs, and endpoint completeness from referral through first
  dose. This company should not try to replace CROs, EDC, or broad CTMS suites
  early; it should win as the thin disease-specific layer those systems do not
  provide. The main attraction is faster enrollment and cleaner dual-disease
  evidence for sponsors whose next financing, board update, or partnering
  narrative depends on early trial momentum. The main constraint is market
  size: the researched TAM is only about $6.0M in the current niche, so the
  venture case depends on proving Graves/TED first and then reusing the same
  workflow ontology in adjacent autoimmune programs. The biggest missing fact
  is direct site-level evidence on referral leakage and packet failure rates in
  active Graves/TED programs, so the first 90 days must validate that this pain
  is large enough to support repeatable $250k-$400k annual contracts.
problem:
  - "Sponsors running Graves and TED studies inherit fragmented endocrinology and ophthalmology workflows, so the right patients are identified late, handed off inconsistently, or lost before full eligibility review."
  - "Baseline imaging, lab, symptom, and severity-assessment packets are assembled manually across sites, which slows enrollment and weakens the credibility of early dual-disease evidence."
solution:
  - "Provide a Graves/TED activation OS that maps referral paths, manages pre-screening queues, standardizes baseline packet requirements, and gives sponsors site-level visibility into screening velocity and evidence completeness."
  - "Layer on top of CRO, CTMS, imaging, and lab workflows rather than replacing them, so sponsors can improve first-patient speed and packet quality without a rip-and-replace of core trial systems."
whyWeWin:
  - "Horizontal CTMS, recruitment vendors, and CRO services cover adjacent work but do not own the Graves/TED-specific referral logic and baseline packet model across endocrinology and ophthalmology."
  - "Each deployment builds a proprietary dataset on referral sources, screen-fail reasons, missing packet elements, and site archetypes that can improve forecasting, onboarding, and expansion into adjacent autoimmune programs."
strategicChoices:
  beachhead: "U.S. venture-backed biotech sponsors with one Graves or TED asset entering Phase I or Phase II, 10-40 North American sites, and limited internal teams to coordinate endocrine and ophthalmology screening."
  wedgeRationale: "This slice has a named buyer, a visible buying trigger at site-selection freeze or pre-FPI startup, and enough urgency to fund a narrow workflow product. It creates faster proof than selling to large pharma, where broader procurement, existing CRO relationships, and internal systems teams make displacement slower."
  sequencingRationale: "Start with referral mapping, pre-screening, and baseline packet completeness because those are the highest-friction pre-dose bottlenecks and can be improved with a thin operational layer. Add benchmarking, launch-readiness analytics, and adjacent autoimmune workflows only after the company proves pilot-to-production conversion and repeatable deployment inside regulated sponsor environments."
  notYet:
    - "Large-pharma enterprise platform deals before the product proves value in a small biotech deployment"
    - "Commercial patient-support workflows after approval"
    - "A generalized autoimmune operating system before Graves/TED packet logic is repeatable"
    - "Deep write-back integrations that materially lengthen validation and implementation cycles"
market:
  tam: "$6.0M estimated TAM based on roughly 12 identifiable global Graves/TED or adjacent sponsor programs at about $0.5M annual activation spend per program."
  sam: "$2.8M estimated beachhead SAM based on roughly 7 North American Phase I/II or prelaunch programs that fit the 10-40-site wedge at about $0.4M annual spend per program."
  som: "$1.2M estimated year-3 SOM based on winning 3 active asset programs at about $0.4M annual recurring revenue each after one successful design partner and one channel-led expansion."
  segments:
    - "Primary: U.S. biotech clinical-development teams running early Graves/TED assets"
    - "Secondary: Later-stage specialty pharma or medical-affairs teams preparing cross-specialty thyroid autoimmunity evidence programs"
  buyingProcess: >-
    The day-to-day champion is usually the VP Clinical Operations, Head of
    Clinical Development, or site-enablement lead, but economic approval
    typically sits with the CMO, COO, or SVP Clinical Development because the
    purchase affects study startup, enrollment risk, and data credibility.
    Deals are most likely to open around site-selection freeze, protocol
    finalization, or a major readout that pulls first-patient timelines forward.
product:
  mvp: >-
    The MVP should support one active Graves or TED asset by giving the sponsor
    a shared referral map, patient pre-screen queue, baseline packet checklist,
    and site dashboard tracking referral-to-screen conversion and packet
    completeness. It should export artifacts into existing CTMS or trial-master
    workflows rather than becoming the system of record for the entire study.
  sixMonth: "Ship 2-3 design-partner pilots with configurable referral pathways, baseline packet templates, screen-fail taxonomy, coordinator tasking, and sponsor dashboards for first-screened-patient readiness."
  twelveMonth: "Add reusable integrations for common CTMS and document workflows, benchmark packet-completion and screen-fail metrics across early customers, and package audit-trail controls required for regulated sponsor deployment."
  twentyFourMonth: "Expand into a broader autoimmune activation layer for other cross-specialty programs while adding launch-readiness analytics, site benchmarking, and medical-affairs evidence workflows for Graves/TED customers."
  keyBets:
    - "Referral leakage and packet incompleteness are more painful to sponsors than adding another generic recruitment dashboard."
    - "Sites will tolerate the workflow if it reduces coordinator rework and missing-packet cleanup instead of adding duplicate data entry."
    - "A thin export-first architecture will close faster than deep system replacement inside regulated clinical operations."
    - "The same ontology can extend into adjacent autoimmune categories after Graves/TED proof without a full services rewrite."
gtm:
  wedge: "Sell a paid activation package for one Graves/TED asset entering study startup, positioned around faster first-screened patients, fewer incomplete baseline packets, and better sponsor visibility across endocrinology and ophthalmology sites."
  channels:
    - "Founder-led direct sales to CMO, COO, and VP Clinical Operations at venture-backed Graves/TED sponsors"
    - "Investor, KOL, and multidisciplinary TED-center introductions tied to known first-in-human or proof-of-concept programs"
    - "Integration and referral partnerships with CTMS, site-ops, or CRO teams that want a disease-specific acceleration layer instead of custom services work"
  funnelTargets: "Target account→qualified opportunity 20-30%, qualified opportunity→paid pilot 25-35%, pilot→annual production 60%+, production→second-program or analytics expansion 40%+ within 12 months."
  pricing: "Charge a paid 8-12 week activation pilot plus annual program subscription with per-site activation fees, because value tracks avoided enrollment delay and packet rework at the asset level rather than seats. Price initial production in the roughly $250k-$400k annual range only after the pilot proves measurable improvement in screening speed and packet completeness."
businessModel:
  revenueStreams:
    - "Paid activation pilots and implementation fees for new Graves/TED programs"
    - "Annual software subscription per active asset program"
    - "Per-site activation and workflow-configuration fees"
    - "Expansion revenue from benchmarking, launch-readiness analytics, and adjacent autoimmune modules"
  unitOfValue: "Active asset programs and activated sites under management"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Expand from one asset to multiple protocols or extension studies inside the same sponsor"
    - "Add benchmark analytics on referral leakage, packet completion, and site archetype performance"
    - "Extend the workflow ontology into adjacent autoimmune categories with two-specialty care pathways"
    - "Sell through CTMS, CRO, or site-network partners once the beachhead workflow is standardized"
strategyMap:
  northStarMetric: "Eligible referred patients who reach complete baseline packet and sponsor-ready screening review"
  inputMetrics:
    - "Days from site activation to first screened patient"
    - "Referral-to-full-eligibility-review conversion rate"
    - "Baseline packet completeness rate before first dose"
    - "Screen-fail rate attributable to missing or inconsistent workup"
    - "Pilot-to-production conversion rate"
  moatsToBuild:
    - "Disease-specific referral graph linking endocrinology sources to ophthalmology-confirmed eligibility"
    - "Benchmark dataset on missing packet elements, screen-fail reasons, and site activation patterns"
    - "Validated workflow templates and partner integrations that shorten regulated deployment time"
  killCriteria:
    - "Fewer than 8 of the first 20 ICP interviews confirm material referral leakage or packet-completeness pain tied to an upcoming study."
    - "Fewer than 2 of the first 4 paid pilots convert to annual production within 6 months of launch."
    - "Median improvement in days-to-first-screened-patient stays below 20% across the first 3 pilots."
    - "Sites refuse to use the workflow without a services layer so heavy that target gross margin cannot plausibly exceed 70%."
  mermaid: |
    flowchart LR
      Wedge[Graves TED activation wedge] --> MVP[Referral and packet workflow MVP]
      MVP --> Proof[Faster screening and cleaner evidence]
      Proof --> Expansion[Adjacent autoimmune activation platform]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Interesting narrow wedge with credible buyer pain, but conviction remains moderate because the current market is small and the core leakage metrics are not yet directly proven."
    whyBelieve: "The research shows multidisciplinary TED care, rising sponsor urgency, and no incumbent that clearly owns cross-specialty referral and packet-completeness workflows."
    whyDoubt: "The company still has to prove that a small set of biotech buyers will fund a standalone activation layer before CRO services or horizontal CTMS substitutes remain good enough."
    nextDiligence: "Confirm one paid pilot with named budget, measure referral leakage and packet failure rates at the first 10 sites, and show at least one production conversion."
  firstCustomer:
    title: "VP Clinical Operations at a Phase I Graves/TED biotech"
    profile: "A U.S. venture-backed biotech with one TSHR-pathway or adjacent thyroid autoimmunity asset, 10-20 planned sites, outsourced CRO execution, and no internal field team to coordinate endocrine and ophthalmology screening."
    trigger: "Protocol finalization, site-selection freeze, or a financing/readout event that compresses the timeline to first patient in."
    buyer: "Chief Medical Officer or SVP Clinical Development"
    initialContract: "Paid pilot around $100k-$150k for one asset and 10-20 sites, credited toward a $250k-$400k annual production contract if the workflow improves screening speed and packet completeness."
  mustBeTrue:
    - "At least 40% of referred candidates in pilot programs must currently fail to reach full eligibility review because of handoff or packet-completion gaps."
    - "At least 3 venture-backed Graves/TED sponsors per year must have both budget authority and timeline urgency to buy before first-patient-in."
    - "The product must reduce days to first screened patient by at least 20% versus the sponsor's planned workflow."
    - "Sites must adopt the workflow with limited additional coordinator burden and without requiring the startup to become a services-heavy CRO substitute."
    - "The same workflow ontology must transfer into at least one adjacent autoimmune category within 24 months to expand beyond the initial $6.0M niche."
  diligenceQuestions:
    - "Who actually owns budget for cross-specialty activation before first patient in: clinical ops, medical affairs, or the CMO?"
    - "What portion of patient leakage in current programs comes from referral handoff versus strict eligibility failure?"
    - "Which packet elements most often block sponsor-ready screening review across Graves/TED sites?"
    - "Will buyers accept a thin export-first layer, or demand deeper CTMS and document-system integration before pilot approval?"
    - "How many credible beachhead programs will still exist after current TED leaders commercialize or late-stage programs slip?"
operatingAssumptions:
  - assumption: "Early Graves/TED biotech sponsors feel enough enrollment and evidence-quality pain to buy before proof-of-concept data exists."
    basis: idea.yaml
    validationTest: "Interview 15 sponsor-side clinical ops leaders and confirm that at least 6 have a live 12-month activation project with named budget owner and timeline."
    decisionImpact: "If false, the company should shift toward later-stage launch-readiness or medical-affairs workflows instead of pre-FIH activation."
  - assumption: "Referral leakage and packet incompleteness are quantifiable and large enough to justify a dedicated product."
    basis: research.yaml
    validationTest: "Collect pilot data from at least 100 screened patients across one or more programs and confirm meaningful loss between endocrinology identification, ophthalmology workup, and full eligibility review."
    decisionImpact: "If false, the wedge should narrow to packet standardization or site benchmarking rather than end-to-end activation OS."
  - assumption: "An export-first architecture can satisfy sponsor compliance requirements without deep validated-system replacement."
    basis: research.yaml
    validationTest: "Review the workflow with 3 prospective buyers or quality leads and confirm they allow pilot deployment with audit trails, controlled roles, and artifact exports."
    decisionImpact: "If false, implementation cycles will lengthen and the roadmap must prioritize deeper compliance and integration work earlier."
  - assumption: "Buyers will support initial production ACVs in the $250k-$400k range for one active asset if the pilot shows measurable operational improvement."
    basis: operator judgment
    validationTest: "Convert at least 2 paid pilots and confirm one signed annual contract inside the target range."
    decisionImpact: "If false, the business will need either lower-cost product packaging or a broader scope to justify enterprise pricing."
  - assumption: "The ontology can extend into another two-specialty autoimmune workflow without a full custom-services reset."
    basis: idea.yaml
    validationTest: "Run design-partner discovery in one adjacent autoimmune area and confirm that at least 60% of the core referral, packet, and dashboard model can be reused."
    decisionImpact: "If false, the market stays niche and the company becomes a small category workflow vendor rather than a venture-scale platform."
experimentRoadmap:
  - horizon: 0–90 days
    experiment: "Interview 20 sponsor, CRO-startup, and multidisciplinary-center stakeholders involved in Graves/TED study startup."
    hypothesis: "Cross-specialty handoffs and packet incompleteness are recurring pre-dose bottlenecks with identifiable budget ownership."
    successMetric: "At least 12 interviews confirm active pain and at least 5 expose a live buying trigger within 12 months."
    owner: "Founder/CEO"
  - horizon: 0–90 days
    experiment: "Map the baseline packet and referral workflow for one design-partner program from referral through eligibility review."
    hypothesis: "A minimal common Graves/TED workflow exists that can be productized without replacing CTMS or EDC."
    successMetric: "One signed design partner and one shared packet schema covering the majority of required referral and workup steps."
    owner: "Founding product lead"
  - horizon: 90–180 days
    experiment: "Run 2 paid pilots across 10-20 sites each with coordinator tasking, packet checklists, and sponsor dashboards."
    hypothesis: "The product can reduce time to first screened patient and improve packet completeness in live study startup."
    successMetric: "At least 20% faster time to first screened patient and at least 25% improvement in complete baseline packets versus pre-pilot baseline."
    owner: "Founder/CEO"
  - horizon: 90–180 days
    experiment: "Test pilot-plus-annual-program pricing against per-seat or services-heavy alternatives."
    hypothesis: "Sponsors prefer asset-level pricing tied to operational outcomes rather than user-count pricing."
    successMetric: "At least 4 of 6 qualified prospects accept pilot plus annual program packaging as a credible buying model."
    owner: "Founder/CEO"
  - horizon: 180–360 days
    experiment: "Launch one integration or referral partnership with a CTMS, CRO-startup, or site-network partner."
    hypothesis: "Channel attachment lowers buyer anxiety and can produce qualified opportunities without ceding product ownership."
    successMetric: "At least 3 qualified introductions and 1 paid pilot sourced through a partner channel."
    owner: "Partnerships lead"
  - horizon: 180–360 days
    experiment: "Pilot an adjacent autoimmune workflow discovery using the same referral and packet ontology."
    hypothesis: "The Graves/TED system can be extended into another cross-specialty autoimmune program with limited redesign."
    successMetric: "At least 1 adjacent design partner confirms reuse of the majority of the core workflow model."
    owner: "Product lead"
operations:
  - "Maintain audit trails, role-based access controls, and exportable artifacts suitable for regulated sponsor review."
  - "Package every deployment with a services-assisted referral map and baseline packet template so sites see immediate reduction in rework."
  - "Run weekly sponsor reviews on referral leakage, packet completeness, and site readiness to turn pilot learning into product templates."
  - "Design integrations as controlled handoffs into CTMS, document, imaging, and lab systems rather than uncontrolled duplicate records."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, buyer discovery, and pilot design because the core risk is whether narrow workflow pain translates into budget."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the referral workflow, packet engine, dashboards, and compliance primitives needed for the first pilots."
  - role: "Clinical workflow lead"
    startTiming: "Month 0-3"
    rationale: "Translate Graves/TED site practice into usable packet templates, screen-fail taxonomy, and implementation playbooks."
  - role: "Implementation engineer"
    startTiming: "Month 3-6"
    rationale: "Shorten deployment time by productizing exports, integrations, and customer-specific workflow configuration."
  - role: "Partnerships and customer success lead"
    startTiming: "Month 9-12"
    rationale: "Own pilot-to-production conversion and the first CTMS, CRO, or center partnerships once the wedge is proven."
milestones:
  - horizon: "0–12 months"
    items:
      - "Complete 20 ICP interviews and sign at least 1 design partner"
      - "Launch 2 paid pilots across live Graves/TED programs"
      - "Demonstrate measurable improvement in screening speed and packet completeness"
      - "Convert at least 1 pilot into annual production revenue"
  - horizon: "12–24 months"
    items:
      - "Reach 3 active asset programs and establish benchmark reporting across deployments"
      - "Harden audit-trail, controls, and integration package for repeatable sponsor procurement"
      - "Secure at least 1 channel partnership with CTMS, CRO, or site-network distribution"
      - "Validate transferability of the workflow into 1 adjacent autoimmune category"
  - horizon: "24–36 months"
    items:
      - "Expand beyond Graves/TED into a second autoimmune workflow with production customers"
      - "Reach a reusable implementation model that supports target gross margin above 70%"
      - "Establish benchmark datasets as a competitive asset in site selection and launch-readiness analytics"
      - "Show multi-program expansion inside at least 1 customer account or partner channel"
risks:
  - risk: "The current Graves/TED buyer pool is too small and too timing-dependent to support venture-scale growth before adjacent expansion."
    likelihood: High
    impact: High
    mitigation: "Keep the first product thin, validate adjacency by month 18, and avoid hiring ahead of evidence that the ontology transfers into other autoimmune workflows."
  - risk: "Sites view the workflow as added coordinator burden and fail to use it consistently."
    likelihood: Medium
    impact: High
    mitigation: "Start with services-assisted setup, minimize duplicate data entry, and prove that the workflow reduces missing-packet cleanup and screening confusion."
  - risk: "Horizontal CTMS or CRO partners absorb enough of the wedge to limit standalone differentiation."
    likelihood: Medium
    impact: Medium
    mitigation: "Win on disease ontology, faster deployment, and benchmark data while integrating with incumbents rather than competing on broad study management."
  - risk: "Compliance and validation requirements lengthen implementation cycles beyond what early biotech buyers will tolerate."
    likelihood: Medium
    impact: High
    mitigation: "Use an export-first architecture, define clear system-of-record boundaries, and package audit and role controls from the first pilot."
  - risk: "First-wave Graves/TED assets slip clinically or fail, shrinking near-term demand."
    likelihood: Medium
    impact: High
    mitigation: "Prioritize design partners with near-term studies, keep burn low, and prepare an adjacent autoimmune wedge before the niche saturates."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of runway to build the referral and packet workflow MVP, run 2-3 paid pilots, harden compliance and export integrations, and prove at least one adjacent autoimmune expansion path without scaling a large services organization."
