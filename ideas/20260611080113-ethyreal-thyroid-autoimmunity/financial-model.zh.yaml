slug: graves-ted-trial-os
date: '2026-06-11'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: 月
  source: '[BP date and funding ask] 模型假设这轮融资在 2026 年 6 月计划日期之后立即完成交割。'
- id: A2
  name: 付费试点合同金额
  value: '120.0'
  unit: 千美元/试点
  source: '[BP investorMemo.initialContract, BP gtm.pricing] 8-12 周付费试点按已给出的 $100k-$150k 区间建模。'
- id: A3
  name: 正式项目 ACV
  value: '399.6'
  unit: 千美元/年
  source: '[BP market.som, research market.som] 基准情景按每个活跃资产项目约 $0.4M 建模，与第 3 年 SOM 测算一致。'
- id: A4
  name: 首个试点启动时点
  value: M7
  unit: 时间点
  source: '[BP experimentRoadmap 0-90 and 90-180 days] 收入从 Y1 下半年开始，前提是先完成访谈、design partner 和工作流映射。'
- id: A5
  name: 第二个试点启动时点
  value: M12
  unit: 时间点
  source: '[BP milestones 0-12 months] 基准情景仍假设第 1 年做成 2 个付费试点，但由于买家池高度受时点驱动，第二个要到年末才启动。'
- id: A6
  name: 第三个试点启动时点
  value: Q4Y2
  unit: 时间点
  source: '[BP milestones 12-24 months] 第三个活跃项目在 Y2 后段落地，因此公司以 3 个活跃项目结束 Y2。'
- id: A7
  name: 试点转化节奏
  value: 试点 1 在 M10 转化，试点 2 在 Q2Y2 转化，试点 3 在 Q1Y3 转化
  unit: 计划
  source: '[BP milestones, BP strategyMap.killCriteria] 基准情景假设前 3 个试点按一个可信、但执行压力仍很重的节奏转化。'
- id: A8
  name: 试点毛利率
  value: '60'
  unit: 百分比
  source: '[BP operations, BP risks] 服务辅助配置和资料包模板工作，会让试点交付效率低于成熟正式项目。'
- id: A9
  name: 成熟正式项目毛利率
  value: '72'
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct, BP milestones 24-36 months] 只有当工作流复用度上来后，成熟项目才有机会超过 70% 毛利目标。'
- id: A10
  name: 创始人主导 CAC
  value: '110.0'
  unit: 千美元/正式客户
  source: '[BP gtm.channels, BP buyingProcess, startup-finance heuristic] 小体量 enterprise 临床运营销售、长周期和试点设计工作，通常会带来六位数级别的 CAC。'
- id: A11
  name: 月流失率
  value: '3.0'
  unit: 百分比
  source: '[BP market size limits, startup-finance heuristic] 资产级合同一旦上线会比较黏，但仍暴露在临床延期和项目取消风险里。'
- id: A12
  name: 人员扩张节奏
  value: 2、3、4、5、6、7 个 FTE 截面
  unit: FTE
  source: '[BP team, BP sequencingRationale, BP risks] 招聘按创始人、工程、工作流、实施和合作伙伴这些角色推进，同时因为细分市场小而保持精简。'
- id: A13
  name: 全负担薪酬假设
  value: CEO 144、工程 180、临床 168、合作伙伴 156、G&A 132
  unit: 千美元/年（全负担）
  source: Startup-finance heuristic：按美国 seed 阶段受监管 B2B 软件公司的现金薪酬，再加约 20% 的工资税与福利负担建模。
- id: A14
  name: 研发非人力支出爬坡
  value: 24-170
  unit: 千美元/周期
  source: '[BP product roadmap, BP operations, research regulatoryLandscape] 包含受监管 sponsor 部署所需的云资源、合规加固、集成和实施工具。'
- id: A15
  name: 销售与市场支出爬坡
  value: 10-95
  unit: 千美元/周期
  source: '[BP gtm.channels, BP team] 创始人主导销售前期保持精简，随后随着伙伴/客户成功覆盖和渠道建设逐步抬升。'
- id: A16
  name: G&A 支出爬坡
  value: 16-100
  unit: 千美元/周期
  source: '[research source 18, BP operations] 法务、QA、财务和行政成本会上升，因为电子记录控制和 sponsor 监管并不是轻量 SaaS 的开销。'
- id: A17
  name: 起始现金
  value: '2400.0'
  unit: 千美元
  source: '[BP fundingAsk.targetFundingRangeUsd] 基准模型假设在模型起点完成一笔 $2.4M pre-seed 融资，且没有债务。'
- id: A18
  name: 现金转换口径
  value: EBITDA 近似经营现金流
  unit: 口径
  source: Startup-finance heuristic：对早期软件公司来说，资本开支和营运资金波动相较薪酬与经营 burn 并不显著。
- id: A19
  name: 下一轮融资里程碑
  value: 3 个活跃项目、1 个渠道伙伴、1 个相邻自身免疫 design partner
  unit: 里程碑
  source: '[BP milestones 12-24 months, BP fundingAsk.useOfFundsSummary] 融资规模按“做到可复制的滩头验证 + 相邻赛道证据”来反推，而不是按盈利来定。'
