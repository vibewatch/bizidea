scenarios:
  downside:
    description: 首个试点转化延后两个季度，第三个项目在 Y3 大部分时间都停留在试点状态，毛利率也卡在 65%。
    y3RevenueK: 899.1
    y3EbitdaK: -620.0
    cashLowPointK: 210.0
    keyAssumptionChanges:
    - 销售周期从 6 个月拉长到 9 个月。
    - 第三个活跃项目在 Q4Y3 才转化，而不是 Q1Y3。
    - 由于实施仍然偏重服务，成熟毛利率只能到 65%。
  base:
    description: 一个试点在 Y1 下半年启动，第二个在年末启动，第三个在 Q4Y2 落地，三者最终都转成约 $0.4M 的正式合同。
    y3RevenueK: 1198.8
    y3EbitdaK: -431.8
    cashLowPointK: 574.4
    keyAssumptionChanges:
    - 无；这就是主模型。
  upside:
    description: 第二个试点提前一个季度启动，伙伴带来的需求把第三个项目也往前拉，对标分析还把综合 ACV 略微抬到滩头均值之上。
    y3RevenueK: 1348.8
    y3EbitdaK: -280.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
    - 第二个试点在 Q4Y1 启动，而不是 M12。
    - 第三个项目在 Q4Y2 一开始就完成转化。
    - 在分析服务 upsell 带动下，综合成熟 ACV 升到约 $450K。
