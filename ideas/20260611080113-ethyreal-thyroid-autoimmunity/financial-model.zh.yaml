modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      Leads[ICP sponsor] --> Pilots[付费试点]
      Pilots --> Production[年度项目]
      Production --> Revenue[项目收入]
      Revenue --> GrossProfit[毛利]
      GrossProfit --> Cash[现金跑道]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入几乎完全来自把 3 个细分资产项目转成约 $0.4M 的正式合同，而不是靠大规模 logo 数量。
- checkName: 必须跑对的地方
  finding: 前两个试点必须按时转化，因为每丢掉 1 个项目，就等于砍掉大约三分之一的第 3 年收入底盘。
- checkName: 模型失效条件
  finding: 如果实施长期偏重服务、成熟毛利率卡在 65% 左右，那么这笔 $2.4M 融资就留不出一段干净的 seed 融资缓冲。
- checkName: 下一轮融资所需证明
  finding: 一个可信的 seed 故事，至少需要 3 个活跃项目、1 个来自伙伴渠道的成交，以及这套工作流本体能延展到 1 个相邻自身免疫类别的证据。
sanityChecks:
  ruleOf40: Y3 growth 27.6% + EBITDA margin -36.0% = -8.4%
  burnMultiple: Y2 的 burn multiple 为 0.9x，对应 $679.4K 净新增收入；Y3 在相邻扩张前因细分见顶而恶化到 1.7x，对应 $259.5K 净新增收入。
  revenuePerFte: Y3 在 7 个 FTE 下的人均收入为 $171K（低于常见 SaaS 的 $200–400K 区间，因此公司要么往相邻赛道扩，要么大幅减轻实施工作量）。
  flags:
  - 研究得到的滩头市场太小，导致基准情景几乎默认前 3 个有意义的项目机会都要接近完美执行。
  - 公司到 Y3 仍然 EBITDA 为负，所以这轮钱买到的是验证和 seed 就绪，而不是自给自足。
  - 人均收入仍低于常见 SaaS 基准，因为资料包配置、合规和实施工作依旧吃掉了大量人力。
  - 单位经济模型只有在毛利率真正站上 70% 时才好看；如果服务结构更像 CRO，LTV/CAC 很快就会被压扁。
