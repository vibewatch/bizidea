modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[ICP sponsors] --> Pilots[Paid pilots]
      Pilots --> Production[Annual programs]
      Production --> Revenue[Program revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes almost entirely from converting three niche asset programs into roughly $0.4M production contracts rather than from broad logo volume."
  - checkName: Must go right
    finding: "The first two pilots must convert on schedule because each lost program removes about one-third of the year-3 revenue base."
  - checkName: Model breaks if
    finding: "If implementations stay services-heavy and mature gross margin sticks near 65%, the $2.4M round no longer preserves a clean seed-raise buffer."
  - checkName: Next-round proof
    finding: "A credible seed story requires three active programs, one partner-sourced win, and evidence that the workflow ontology extends into one adjacent autoimmune category."
sanityChecks:
  ruleOf40: "Y3 growth 27.6% + EBITDA margin -36.0% = -8.4%"
  burnMultiple: "Y2 burn multiple is 0.9x on $679.4K net new revenue; Y3 worsens to 1.7x on $259.5K net new revenue as the narrow niche saturates before adjacency expansion."
  revenuePerFte: "$171K Y3 at 7 FTE (below the usual $200–400K SaaS range, so the company needs either adjacency expansion or materially lighter implementation work)."
  flags:
    - "The researched beachhead is small enough that the base case effectively assumes near-perfect execution on the first three meaningful program opportunities."
    - "The company is still EBITDA negative in Y3, so this round buys proof and seed readiness rather than self-sufficiency."
    - "Revenue per FTE remains below normal SaaS benchmarks because packet setup, compliance, and implementation work still consume meaningful labor."
    - "Unit economics look attractive only if gross margin truly clears 70%; a CRO-like services mix would compress LTV/CAC quickly."
