assumptions:
  - id: A1
    name: Model start month
    value: '2026-07'
    unit: month
    source: "[BP date and funding ask] Round modeled as closing immediately after the June 2026 plan date."
  - id: A2
    name: Paid pilot contract value
    value: '120.0'
    unit: USDK per pilot
    source: "[BP investorMemo.initialContract, BP gtm.pricing] Paid 8-12 week pilot priced inside the stated $100k-$150k range."
  - id: A3
    name: Production program ACV
    value: '399.6'
    unit: USDK per year
    source: "[BP market.som, research market.som] Base case uses roughly $0.4M per active asset program in line with the year-3 SOM math."
  - id: A4
    name: First pilot start
    value: 'M7'
    unit: period
    source: "[BP experimentRoadmap 0-90 and 90-180 days] Revenue starts in second-half Y1 after interview, design-partner, and workflow-mapping work."
  - id: A5
    name: Second pilot start
    value: 'M12'
    unit: period
    source: "[BP milestones 0-12 months] Base case still achieves 2 paid pilots in year 1, but the second starts at the end of the year because the buyer pool is timing-driven."
  - id: A6
    name: Third pilot start
    value: 'Q4Y2'
    unit: period
    source: "[BP milestones 12-24 months] Third active program lands by late Y2 so the company exits Y2 at 3 active programs."
  - id: A7
    name: Pilot conversion timing
    value: "Pilot 1 converts in M10, pilot 2 in Q2Y2, pilot 3 in Q1Y3"
    unit: schedule
    source: "[BP milestones, BP strategyMap.killCriteria] Base case assumes the first 3 pilots convert on a believable but still execution-heavy schedule."
  - id: A8
    name: Pilot gross margin
    value: '60'
    unit: percent
    source: "[BP operations, BP risks] Services-assisted setup and packet-template work make pilot delivery less efficient than mature production."
  - id: A9
    name: Mature production gross margin
    value: '72'
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct, BP milestones 24-36 months] Mature programs clear the >70% target only after workflow reuse improves."
  - id: A10
    name: Founder-led CAC
    value: '110.0'
    unit: USDK per production customer
    source: "[BP gtm.channels, BP buyingProcess, startup-finance heuristic] Small-volume enterprise clinical-ops sales with long cycles and pilot design work typically carries high six-figure CAC."
  - id: A11
    name: Monthly churn
    value: '3.0'
    unit: percent
    source: "[BP market size limits, startup-finance heuristic] Asset-program contracts are sticky once live but still exposed to clinical slippage and program cancellation."
  - id: A12
    name: Headcount ramp
    value: "2, 3, 4, 5, 6, 7 FTE snapshots"
    unit: FTE
    source: "[BP team, BP sequencingRationale, BP risks] Hiring follows the named founder, engineering, workflow, implementation, and partnerships roles while staying lean because the niche is small."
  - id: A13
    name: Loaded salary heuristic
    value: "CEO 144, Eng 180, Clinical 168, Partnerships 156, G&A 132"
    unit: USDK annual loaded
    source: "Startup-finance heuristic: U.S. seed-stage regulated B2B software cash compensation plus ~20% payroll tax and benefits load."
  - id: A14
    name: R&D non-payroll spend ramp
    value: "24-170"
    unit: USDK per period
    source: "[BP product roadmap, BP operations, research regulatoryLandscape] Includes cloud, compliance hardening, integrations, and implementation tooling required for regulated sponsor deployments."
  - id: A15
    name: S&M spend ramp
    value: "10-95"
    unit: USDK per period
    source: "[BP gtm.channels, BP team] Founder-led selling stays lean, then rises with partner/customer-success coverage and channel development."
  - id: A16
    name: G&A spend ramp
    value: "16-100"
    unit: USDK per period
    source: "[research source 18, BP operations] Legal, QA, finance, and admin costs rise because electronic-record controls and sponsor oversight are not lightweight SaaS overhead."
  - id: A17
    name: Starting cash
    value: '2400.0'
    unit: USDK
    source: "[BP fundingAsk.targetFundingRangeUsd] Base model assumes a $2.4M pre-seed closes at model start with no debt."
  - id: A18
    name: Cash conversion convention
    value: "EBITDA approximates operating cash flow"
    unit: policy
    source: "Startup-finance heuristic: Early software company capex and working-capital swings are immaterial relative to payroll and operating burn."
  - id: A19
    name: Next-round milestone
    value: "3 active programs, 1 channel partner, 1 adjacent autoimmune design partner"
    unit: milestone
    source: "[BP milestones 12-24 months, BP fundingAsk.useOfFundsSummary] Funding is sized to reach repeatable beachhead proof plus adjacency evidence, not profitability."
