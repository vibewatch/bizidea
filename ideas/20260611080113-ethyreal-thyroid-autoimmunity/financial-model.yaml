scenarios:
  downside:
    description: "First pilot conversion slips by two quarters, the third program stays pilot-only through most of Y3, and gross margin stalls at 65%."
    y3RevenueK: 899.1
    y3EbitdaK: -620.0
    cashLowPointK: 210.0
    keyAssumptionChanges:
      - "Sales cycle stretches from 6 to 9 months."
      - "Third active program converts in Q4Y3 instead of Q1Y3."
      - "Mature gross margin reaches only 65% because implementations remain services-heavy."
  base:
    description: "One pilot starts in H2 Y1, a second starts at year-end, a third lands in Q4Y2, and all three settle into roughly $0.4M production contracts."
    y3RevenueK: 1198.8
    y3EbitdaK: -431.8
    cashLowPointK: 574.4
    keyAssumptionChanges:
      - "None; this matches the main model."
  upside:
    description: "Second pilot starts one quarter earlier, partner-sourced demand brings the third program forward, and benchmark analytics lift blended ACV modestly above the beachhead average."
    y3RevenueK: 1348.8
    y3EbitdaK: -280.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
      - "Second pilot starts in Q4Y1 instead of M12."
      - "Third program converts at the start of Q4Y2."
      - "Blended mature ACV rises to roughly $450K with analytics upsell."
