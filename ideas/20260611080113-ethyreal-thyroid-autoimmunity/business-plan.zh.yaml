slug: graves-ted-trial-os
date: '2026-06-11'
executiveSummary: Graves TED Trial OS 是一层面向 sponsor 的激活系统，服务那些在内分泌和眼科站点推进 Graves 病与甲状腺眼病项目的 biotech 团队。第一步要打的是美国 A-C 轮 sponsor：项目进入 Phase I 或 Phase II、北美有 10-40 个站点。它们眼前的问题不是通用 CTMS 管理，而是转诊漏损、基线资料包不一致，以及跨两个科室的首位患者筛查太慢。研究说明这里确实有运营触发点：TED 诊疗本来就强调多学科协作，站点启动负担已经不轻，而赛道融资与管线推进也让 pre-FPI 的执行投入更好立项。这把切口本来就该做窄：把内分泌到眼科的转诊路径标准化，先筛出潜在合格患者，并从转诊一路盯到首剂给药，把基线影像、化验和终点完整度串起来。公司不该一上来就替代 CRO、EDC 或大而全的 CTMS 套件；它该赢在这些系统没提供的那层薄而锋利的疾病专属能力。真正吸引 sponsor 的，是更快的入组和更干净的双疾病证据——对那些下一轮融资、董事会更新或 BD 叙事都押在早期试验 momentum 上的团队尤其如此。最大的约束还是市场大小：当前细分里，研究得到的 TAM 只有约 $6.0M，所以 venture 逻辑一定要先证明 Graves/TED，再把同一套工作流本体迁到相邻自身免疫项目。现在最缺的事实，是活跃 Graves/TED 项目里站点层面的转诊漏损和资料包失败率，因此前 90 天必须先验证：这个痛点到底够不够大，能不能支撑可复制的 $250k-$400k 年合同。
problem:
- 做 Graves 和 TED 研究的 sponsor，一上来就接手一套割裂的内分泌与眼科工作流：对的患者常常识别得太晚、交接口径不一致，甚至在进入完整资格审核前就丢了。
- 基线影像、化验、症状和严重度评估资料包，要在各站点靠手工拼，这既拖慢入组，也削弱了早期双疾病证据的可信度。
solution:
- 提供一套 Graves/TED 激活 OS：把转诊路径画清、把预筛队列管起来、把基线资料包要求标准化，并让 sponsor 能逐站点看到筛查速度和证据完整度。
- 不替换 CRO、CTMS、影像和化验系统，而是压在它们之上，这样 sponsor 不用推倒重来，也能把首位患者速度和资料包质量提上去。
whyWeWin:
- 横向 CTMS、招募厂商和 CRO 服务能覆盖邻近环节，但它们并不掌握跨内分泌与眼科的 Graves/TED 专属转诊逻辑和基线资料包模型。
- 每落一单，都会沉淀一套专有数据：转诊来源、筛查失败原因、缺失的资料包要素，以及站点类型。这些数据会反过来提升预测、上线效率，以及往相邻自身免疫项目扩张的把握。
strategicChoices:
  beachhead: 美国风投支持的 biotech sponsor，手里有 1 个 Graves 或 TED 资产进入 Phase I/II，在北美开 10-40 个站点，内部团队又不足以协调内分泌和眼科筛查。
  wedgeRationale: 这块细分有明确买家，站点选择冻结或 pre-FPI 启动就是清晰触发点，紧迫度也足以支撑一款很窄的工作流产品。和大药企相比，它更容易更快验证价值；后者采购链更长、既有 CRO 关系更深、内部系统团队更重，替换起来慢得多。
  sequencingRationale: 先做转诊映射、预筛和基线资料包完整度，因为这些是给药前摩擦最大的瓶颈，也最适合靠一层轻运营系统先解决。等公司证明试点能转正式、且能在受监管的 sponsor 环境里反复部署后，再往对标分析、上市就绪分析和相邻自身免疫工作流扩。
  notYet:
  - 在产品还没在小 biotech 场景里证明价值前，就去谈大药企平台级大单
  - 获批后的商业化患者支持工作流
  - 在 Graves/TED 资料包逻辑还没跑通前，就去做泛自身免疫操作系统
  - 会明显拉长验证和实施周期的深度 write-back 集成
market:
  tam: 估算 TAM 为 $6.0M：按全球约 12 个可识别的 Graves/TED 或相邻 sponsor 项目、每个项目每年约 $0.5M 激活支出计算。
  sam: 估算滩头市场 SAM 为 $2.8M：按北美约 7 个符合 10-40 站点切口的 Phase I/II 或 prelaunch 项目、每个项目每年约 $0.4M 支出计算。
  som: 估算第 3 年 SOM 为 $1.2M：假设拿下 3 个活跃资产项目，在 1 个成功 design partner 和 1 次渠道扩张后，每个项目约形成 $0.4M 年经常性收入。
  segments:
  - 主要客群：推进早期 Graves/TED 资产的美国 biotech 临床开发团队
  - 次要客群：在准备跨专科甲状腺自身免疫证据项目的后期专科 pharma 或 medical affairs 团队
  buyingProcess: 日常 champion 往往是 VP Clinical Operations、Head of Clinical Development 或 site enablement 负责人，但真正拍预算的通常是 CMO、COO 或 SVP Clinical Development，因为这笔采购直接影响研究启动、入组风险和数据可信度。交易最容易在选站冻结、protocol 定稿，或一次把首位患者时间表往前拉的重要读出前后启动。
product:
  mvp: MVP 应该先服务一个活跃 Graves 或 TED 资产：给 sponsor 一张共享转诊图、一条患者预筛队列、一份基线资料包 checklist，以及一块能跟踪转诊到受筛转化率和资料包完整度的站点看板。它输出的应是能接进现有 CTMS 或 trial master 工作流的工件，而不是把自己做成整个研究的 system of record。
  sixMonth: 做出 2-3 个 design partner 试点，交付可配置的转诊路径、基线资料包模板、screen-fail 分类、协调员任务分配和 sponsor 看板，直指首位受筛患者就绪。
  twelveMonth: 补上常见 CTMS 与文档工作流的可复用集成，在早期客户间建立资料包完整度和 screen-fail 指标对标，并把受监管 sponsor 部署所需的审计追踪控制能力打包好。
  twentyFourMonth: 在为 Graves/TED 客户补上上市就绪分析、站点对标和 medical affairs 证据工作流的同时，把产品扩成更广的自身免疫激活层，覆盖其他跨专科项目。
  keyBets:
  - 对 sponsor 来说，真正更痛的是转诊漏损和资料包不完整，而不是少一个通用招募看板。
  - 只要这套工作流能减少协调员返工和补资料，而不是制造重复录入，站点就有机会接受。
  - 在受监管的临床运营环境里，一套轻量、以导出为先的架构，会比深度系统替换更容易成交。
  - 只要 Graves/TED 先跑通，同一套本体就能扩到相邻自身免疫类别，不必把服务体系整套重写。
gtm:
  wedge: 卖给即将启动研究的单个 Graves/TED 资产一套付费激活包，核心卖点就是：更快拿到首位受筛患者、更少的基线资料缺失，以及 sponsor 对内分泌和眼科站点更强的可见性。
  channels:
  - 由创始人直接卖给风投支持型 Graves/TED sponsor 的 CMO、COO 和 VP Clinical Operations
  - 借投资人、KOL 和多学科 TED 中心的引荐，切入已知的 FIH 或 POC 项目
  - 和 CTMS、site ops 或 CRO 团队建立集成与转介合作——它们想要的是一层疾病专属加速模块，而不是继续做定制化服务。
  funnelTargets: 漏斗目标：target account→qualified opportunity 20-30%，qualified opportunity→付费试点 25-35%，试点→年度正式合同 60%+，正式合同→第二项目或分析扩容在 12 个月内达到 40%+。
  pricing: 先收一个 8-12 周的付费激活试点，再叠加年度项目订阅和按站点收取的激活费，因为价值不是按 seat 走，而是按资产层面省下来的入组延误和资料返工来算。只有当试点确实证明筛查速度和资料包完整度有可量化改善后，正式合同才定到大约 $250k-$400k/年。
businessModel:
  revenueStreams:
  - 新 Graves/TED 项目的付费激活试点与实施费
  - 按活跃资产项目收取年度软件订阅费
  - 按站点收取激活与工作流配置费
  - 来自对标分析、上市就绪分析和相邻自身免疫模块的扩展收入
  unitOfValue: 在管的活跃资产项目和已激活站点
  targetGrossMarginPct: 70
  expansionLevers:
  - 从同一 sponsor 的一个资产，扩到多个 protocol 或延伸研究
  - 补上转诊漏损、资料包完成度和站点类型表现的对标分析
  - 把这套工作流本体延展到同样跨两个专科诊疗路径的相邻自身免疫类别
  - 等滩头工作流标准化后，再通过 CTMS、CRO 或站点网络伙伴分销
strategyMap:
  northStarMetric: 被转入的合格患者里，真正走到完整基线资料包和 sponsor 可审阅筛查状态的人数
  inputMetrics:
  - 站点激活到首位受筛患者的天数
  - 转诊到完整资格审核的转化率
  - 首剂给药前的基线资料包完整率
  - 由检查缺失或口径不一致导致的筛查失败率
  - 试点转正式合同的转化率
  moatsToBuild:
  - 把内分泌来源与眼科确认资格连起来的疾病专属转诊图谱
  - 围绕资料缺失项、筛查失败原因和站点激活模式的对标数据集
  - 能缩短受监管部署时间的已验证工作流模板和伙伴集成
  killCriteria:
  - 前 20 次 ICP 访谈里，若确认即将启动研究中存在明显转诊漏损或资料包完整度痛点的不到 8 个。
  - 前 4 个付费试点里，若在上线 6 个月内转成年合同的不到 2 个。
  - 前 3 个试点里，首位受筛患者时间的中位改善若低于 20%。
  - 如果站点只有在重服务兜底下才愿意用，而这会让目标毛利率根本不可能高于 70%。
  mermaid: "flowchart LR\n  Wedge[Graves TED 激活切口] --> MVP[转诊与资料包工作流 MVP]\n  MVP --> Proof[筛查更快，证据更干净]\n  Proof --> Expansion[相邻自身免疫激活平台]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 这是一把有意思的窄切口，买方痛点也站得住；但当前市场太小，核心漏损指标又还没被直接证明，所以判断仍只能维持中等信心。
    whyBelieve: 研究说明，TED 诊疗本来就是多学科协作，sponsor 的紧迫感也在上升，而且市场里还没有谁真正拿下跨专科转诊与资料包完整度这层工作流。
    whyDoubt: 公司仍得证明：在 CRO 服务和横向 CTMS 还“够用”的前提下，这一小撮 biotech 买家会愿意单独为这层激活系统掏钱。
    nextDiligence: 先确认 1 个有明确预算的付费试点，在前 10 个站点把转诊漏损和资料包失败率量出来，再拿出至少 1 个正式合同转化。
  firstCustomer:
    title: 一家 Phase I Graves/TED biotech 的 VP Clinical Operations
    profile: 一家美国风投支持的 biotech，手里有 1 条 TSHR 通路或相邻甲状腺自身免疫资产，计划开 10-20 个站点，CRO 执行外包，但内部没有团队专门协调内分泌和眼科筛查。
    trigger: protocol 定稿、选站冻结，或一次把首位患者入组时间线压短的融资/读出事件。
    buyer: Chief Medical Officer 或 SVP Clinical Development
    initialContract: 针对 1 个资产和 10-20 个站点的付费试点，价格约 $100k-$150k；如果工作流确实提升筛查速度和资料包完整度，这笔钱可抵扣后续 $250k-$400k 的年正式合同。
  mustBeTrue:
  - 试点项目里，当前至少 40% 的转诊候选人，是因为交接或资料包完成度缺口，没能走到完整资格审核。
  - 每年至少要有 3 家风投支持的 Graves/TED sponsor，在首位患者入组前同时具备预算权限和时间紧迫性，愿意下单。
  - 产品必须把首位受筛患者所需时间，相对 sponsor 原计划流程压缩至少 20%。
  - 站点必须能在额外协调员负担有限的前提下采用这套工作流，不能逼着创业公司变成一个重服务的 CRO 替代品。
  - 要想走出最初 $6.0M 的小市场，这套工作流本体必须在 24 个月内迁到至少 1 个相邻自身免疫类别。
  diligenceQuestions:
  - 在首位患者入组前，跨专科激活这笔预算到底归谁：clinical ops、medical affairs，还是 CMO？
  - 当前项目里的患者漏损，到底有多少来自转诊交接问题，又有多少是真正不符合入排标准？
  - 在 Graves/TED 站点里，最常卡住 sponsor 可审阅筛查状态的资料包要素到底是什么？
  - 买家会接受一层轻量、以导出为先的系统，还是在批准试点前就要求更深的 CTMS 和文档系统集成？
  - 等当前 TED 头部项目商业化，或后期项目延期后，还会剩下多少可信的滩头项目？
operatingAssumptions:
- assumption: 早期 Graves/TED biotech sponsor 在 POC 数据出来前，就会因为入组和证据质量的痛感足够强而愿意购买。
  basis: idea.yaml
  validationTest: 访谈 15 位 sponsor 侧临床运营负责人，确认其中至少 6 位手上有一个未来 12 个月内会启动、且已明确预算负责人和时间表的激活项目。
  decisionImpact: 如果这条不成立，公司就该把方向转向更后期的上市就绪或 medical affairs 工作流，而不是继续做 pre-FIH 激活。
- assumption: 转诊漏损和资料包不完整这两个问题，不仅能量化，而且大到足以支撑一款独立产品。
  basis: research.yaml
  validationTest: 在一个或多个项目里收集至少 100 名受筛患者的数据，确认从内分泌识别、眼科检查到完整资格审核之间，确实存在显著漏损。
  decisionImpact: 如果不成立，这把切口就该收窄成资料包标准化或站点对标，而不是端到端激活 OS。
- assumption: 一套以导出为先的架构，不用深度替换已验证系统，也能满足 sponsor 的合规要求。
  basis: research.yaml
  validationTest: 和 3 位潜在买家或质量负责人过一遍工作流，确认他们愿意接受带审计追踪、角色控制和工件导出的试点部署。
  decisionImpact: 如果不成立，实施周期会被拉长，路线图也必须更早把深度合规和集成工作排到前面。
- assumption: 只要试点能拿出可量化的运营改善，买家就会接受单个活跃资产 $250k-$400k 的初始正式合同 ACV。
  basis: operator judgment
  validationTest: 至少把 2 个付费试点转下来，并确认 1 份签在目标价格区间内的年合同。
  decisionImpact: 如果不成立，业务要么得把产品打包得更便宜，要么就得把边界做大，才能撑住 enterprise 定价。
- assumption: 这套本体可以迁到另一条双专科自身免疫工作流里，而不用把定制化服务从头重做。
  basis: idea.yaml
  validationTest: 在一个相邻自身免疫方向做 design partner discovery，确认核心的转诊、资料包和看板模型至少有 60% 能复用。
  decisionImpact: 如果不成立，市场就会一直很小，公司也更像一个小类目工作流厂商，而不是 venture 级平台。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 20 位参与 Graves/TED 研究启动的 sponsor、CRO 初创团队和多学科中心相关方。
  hypothesis: 跨专科交接和资料包不完整，是给药前反复出现的瓶颈，而且能找到明确预算归属。
  successMetric: 至少 12 次访谈确认痛点真实存在，至少 5 次访谈暴露出未来 12 个月内会发生的明确购买触发点。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 把 1 个 design partner 项目的基线资料包和转诊工作流，从转诊一路画到资格审核。
  hypothesis: 确实存在一套最小公分母式的 Graves/TED 工作流，不替换 CTMS 或 EDC 也能产品化。
  successMetric: 拿下 1 个签约 design partner，并做出 1 份覆盖大多数必需转诊和检查步骤的共享资料包 schema。
  owner: 创始产品负责人
- horizon: 90–180 天
  experiment: 跑 2 个付费试点，每个覆盖 10-20 个站点，并配上协调员任务分配、资料包 checklist 和 sponsor 看板。
  hypothesis: 产品能在真实研究启动中缩短首位受筛患者时间，并提升资料包完整度。
  successMetric: 相较试点前基线，首位受筛患者时间至少提速 20%，完整基线资料包比例至少提升 25%。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 拿“试点 + 年度项目”定价，去对打按 seat 收费或重服务方案。
  hypothesis: sponsor 更偏好按资产、并和运营结果绑定的定价，而不是按用户数收费。
  successMetric: 6 个合格线索里，至少 4 个认可“试点 + 年度项目”是一种可信的购买模型。
  owner: 创始人/CEO
- horizon: 180–360 天
  experiment: 和 1 家 CTMS、CRO 初创公司或站点网络伙伴，落成一项集成或转介合作。
  hypothesis: 挂上渠道能降低买家焦虑，同时又不必把产品主导权让出去，还能带来合格商机。
  successMetric: 至少拿到 3 个合格引荐，并通过伙伴渠道带来 1 个付费试点。
  owner: 合作伙伴负责人
- horizon: 180–360 天
  experiment: 用同一套转诊和资料包本体，试跑一个相邻自身免疫工作流的 discovery。
  hypothesis: 这套 Graves/TED 系统只需有限重设计，就能延展到另一条跨专科自身免疫项目里。
  successMetric: 至少 1 个相邻 design partner 确认，核心工作流模型的大部分都能复用。
  owner: 产品负责人
operations:
- 维护好审计追踪、基于角色的权限控制，以及适合受监管 sponsor 审阅的可导出工件。
- 每次部署都打包一份服务辅助的转诊图和基线资料包模板，让站点立刻感受到返工减少。
- 每周和 sponsor 复盘转诊漏损、资料包完整度和站点就绪度，把试点经验沉淀成产品模板。
- 把集成设计成流向 CTMS、文档、影像和化验系统的可控交接，而不是制造失控的重复记录。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 负责创始人主导销售、买家发现和试点设计，因为核心风险在于：这类窄工作流痛点到底能不能转成预算。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭出首批试点所需的转诊工作流、资料包引擎、看板和合规基础能力。
- role: 临床工作流负责人
  startTiming: 第 0-3 个月
  rationale: 把 Graves/TED 站点实践翻成可用的资料包模板、screen-fail 分类和实施打法。
- role: 实施工程师
  startTiming: 第 3-6 个月
  rationale: 把导出、集成和客户专属工作流配置产品化，从而缩短部署时间。
- role: 合作伙伴与客户成功负责人
  startTiming: 第 9-12 个月
  rationale: 一旦切口被验证，就由他来盯试点转正式，以及首批 CTMS、CRO 或中心合作。
milestones:
- horizon: 0–12 个月
  items:
  - 完成 20 次 ICP 访谈，并签下至少 1 个 design partner
  - 在真实运行的 Graves/TED 项目里上线 2 个付费试点
  - 证明筛查速度和资料包完整度有可量化改善
  - 至少把 1 个试点转成年正式收入
- horizon: 12–24 个月
  items:
  - 做到 3 个活跃资产项目，并在各部署间建立对标报告
  - 把审计追踪、控制能力和集成包打磨到足以支持可复制的 sponsor 采购
  - 至少拿下 1 个 CTMS、CRO 或站点网络分销渠道合作
  - 验证这套工作流能迁到 1 个相邻自身免疫类别
- horizon: 24–36 个月
  items:
  - 从 Graves/TED 扩到第二条自身免疫工作流，并拿到正式客户
  - 把实施模型做成可复用，支撑目标毛利率超过 70%
  - 把对标数据集沉淀成竞争资产，服务选站和上市就绪分析
  - 在至少 1 个客户账户或伙伴渠道里，证明多项目扩张能跑通
risks:
- risk: 当前 Graves/TED 买家池太小、又太受时点驱动，若不往相邻赛道扩，很难撑起 venture 级增长。
  likelihood: High
  impact: High
  mitigation: 第一版产品一定要做薄；在第 18 个月前验证相邻赛道可行性；在证明本体能迁到其他自身免疫工作流之前，不要超前招人。
- risk: 站点把这套流程看成给协调员额外加活，结果使用并不稳定。
  likelihood: Medium
  impact: High
  mitigation: 先用服务辅助把第一版配起来，尽量压低重复录入，再证明这套流程确实能减少补资料和筛查混乱。
- risk: 横向 CTMS 或 CRO 伙伴把这层能力吸走一大块，削弱了独立产品的差异化。
  likelihood: Medium
  impact: Medium
  mitigation: 一边接进现有厂商，一边靠疾病本体、更快部署和对标数据赢，而不是跟它们在通用研究管理上硬碰硬。
- risk: 合规与验证要求把实施周期拉长到超出早期 biotech 买家能接受的范围。
  likelihood: Medium
  impact: High
  mitigation: 坚持导出优先架构，划清 system-of-record 边界，并从第一个试点起就把审计与角色控制打包进去。
- risk: 第一波 Graves/TED 资产临床推进放缓或失败，近端需求随之收缩。
  likelihood: Medium
  impact: High
  mitigation: 优先挑近期开研究的 design partner，控制 burn，并在细分见顶前先备好相邻自身免疫切口。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这轮钱要覆盖 18 个月跑道，用来做出转诊与资料包工作流 MVP、跑 2-3 个付费试点、把合规和导出集成打牢，并在不扩成大服务团队的前提下，验证至少 1 条相邻自身免疫扩张路径。
