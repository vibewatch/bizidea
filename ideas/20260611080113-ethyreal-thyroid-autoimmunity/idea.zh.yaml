problem: 虽然新一代疗法的核心假设，是用同一个致病机制同时处理 Graves 病和甲状腺眼病，但现实里的诊疗路径仍被内分泌和眼科切开。于是 sponsor 在做早期试验或准备上市时，会撞上一整段混乱的运营断层：对的患者跨专科很难找，基线影像和化验包不一致，终点证据还得在各站点手工拼。随着因果型双疾病疗法走向临床，真正的瓶颈已经不再是分子新不新，而是 sponsor 能不能搭出一条可复制的患者与证据漏斗。
targetUser:
  primary: 一家风投支持的 biotech 中，负责把 Graves 或甲状腺眼病资产推向首次人体试验或早期 POC 研究的 VP Clinical Operations / Head of Clinical Development
  secondary: 负责协调内分泌与眼科中心的 medical affairs 负责人、trial enablement 总监或 site engagement 负责人
  buyer: sponsor 侧的 Chief Medical Officer、Chief Operating Officer 或 SVP Clinical Development
startupThesis:
  nonObviousInsight: 如果一款疗法终于能打到 Graves 病和 TED 的共同驱动，稀缺资产就不再只是分子本身。真正稀缺的，是那层能把内分泌和眼科拉到同一张转诊图、同一套基线资料包、同一套证据模型上的运营层。最后赢的不会是另一家药企，而是那家面向 sponsor 的工作流公司——它能把割裂的跨专科病程改造成一套可复制的试验与上市系统。
  beachhead: 拥有一条 TSHR 通路或相邻 Graves/TED 资产、正进入 Phase I 或 Phase II、计划在北美开 10-40 个站点、且内部一线团队不足以协调跨专科患者识别和终点采集的 A-C 轮内分泌/眼科 biotech
  wedge: 一套 Graves/TED 激活 OS：把内分泌到眼科的转诊路径画清楚，先筛出大概率符合条件的患者，把基线影像和化验包做成标准件，并从首转诊一路盯到首剂给药，逐站点跟踪筛查进度和终点完整度。
  whyNowCatalyst: Ethyreal 的融资、明确的双适应症 TSHR 叙事、近在眼前的 ENDO 2026 数据，以及计划在 2026 年下半年启动 FIH，都说明这个赛道正从科学叙事走向运营执行。
  ventureScalePath: 先拿下 Graves 和 TED 的 sponsor 工作流，再把这套跨专科找患者和沉淀证据的底层，延展到其他由同一机制横跨多条诊疗路径的自身抗体疾病里，包括神经肌肉、皮肤科和系统性自身免疫项目，最后成为专科自身免疫药上市前默认的激活栈。
solution: 这家公司卖的会是一层“软件 + 运营”能力，面向正在推进 Graves 和 TED 项目的 biotech sponsor。它帮 sponsor 选站、起站，明确内分泌到眼科的转诊交接，并把病历审阅和预筛流程做成结构化工作流，让团队不用再靠医生临时想起谁合适，才能捞到潜在患者。产品还会把基线影像、化验和症状资料包做标准化，既让早期试验产出更干净的双疾病证据，也让后续上市团队看清患者到底漏在了哪里。它不替代 CRO 系统，而是压在上面，做那层疾病专用的运营系统：盯筛查速度、终点完整度和跨专科协同。时间拉长后，护城河会沉淀成一套专有数据：转诊来源、基线呈现模式、入组速度，以及 Graves/TED 项目后续的应答和留存。
goToMarketSeed:
  firstCustomer: 一家 A-C 轮 biotech，手里有 1 个 Graves 或 TED 项目正要启动 FIH，把通用试验执行外包给 CRO，但在首批 10-20 个站点上，内部还没有专门团队去串内分泌和眼科的筛查工作流。
  buyingTrigger: 触发点包括：FIH 或 POC 研究进入选站冻结、一次重要的临床前或大会读出把临床计划往前推，或围绕皮下注射/自动注射笔产品形态提前启动商业筹备。
  currentAlternative: 通用 CRO 起站服务、KOL 表格、协调员手工外呼、CTMS/EDC 系统，以及无结构的内分泌到眼科转诊。
  switchingReason: 这把切口解决的，正是通用 CRO 工具抓不住的瓶颈：跨两个专科，尽快把对的 Graves/TED 患者识别出来、完成检查，并用一致口径把数据量起来，让早期资产能证明自己在往前走。
  pricingHypothesis: 按活跃资产项目收年平台费，再叠加按站点计的激活费，后续再扩到上市就绪分析和获批后的患者漏斗模块。
