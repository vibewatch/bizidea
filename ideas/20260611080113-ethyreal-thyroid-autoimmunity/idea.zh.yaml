jobsToBeDone:
- job: 当新的 Graves 或 TED 研究启动时，帮 sponsor 在内分泌和眼科工作流里找到并预判合格患者，这样他们不用把内部一线团队堆得过重，也能打到入组目标。
  currentAlternative: 通用 CRO 外联、临时医生转诊和协调员手工跟踪。
  successMetric: 从站点激活到首位受筛患者的天数，以及转诊进入完整资格审核的比例。
- job: 当早期临床数据需要说服投资人、监管方和未来上市团队时，帮 sponsor 把双疾病的基线与随访证据采完整，这样他们才能有底气地比较站点和队列。
  currentAlternative: EDC 再加上跨影像、化验和症状记录的手工对账。
  successMetric: 基线资料包完整度、终点 query 率，以及产出可审阅站点表现摘要所需时间。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这组信号同时包含大额融资、清晰机制和近期验证点，足以支撑围绕 Graves 与 TED 项目的真实运营窗口。
  painIntensity:
    score: 4
    rationale: 当一款疗法横跨两条原本分开的诊疗路径时，sponsor 和站点确实会碰到入组、协同和证据质量三重痛点。
  wedgeClarity:
    score: 5
    rationale: 第一个 use case 很窄也很具体：给早期 Graves 与 TED 项目的 sponsor 用的激活软件，专门服务跨专科站点。
  defensibility:
    score: 4
    rationale: 护城河来自疾病专属的工作流设计，以及一套会越滚越厚的转诊、筛查和终点表现数据——这些不是通用 CRO 工具天然会积累出来的。
  ventureScale:
    score: 4
    rationale: 平台可以从 Graves 和 TED 扩到相邻的专科自身免疫药上市，但类目能做多大，前提还是先把第一把疾病切口打透。
topRisks:
- name: 临床时点风险
  description: 如果第一波 Graves 和 TED 资产临床推进放缓或直接失败，这层类目专属激活系统的 sponsor 预算，可能会在公司做大前就先蒸发。
  mitigation: 先从与 protocol 无关的工作流模块切入，让产品也能支撑自然病程研究、medical affairs 证据生成，以及相邻自身免疫项目后续的商业就绪工作。
- name: 站点工作流阻力
  description: 如果新工作流看起来只是多给协调员加活，却没有明确患者收益，内分泌和眼科站点很可能会抵触再接一套 sponsor 流程。
  mitigation: 上线时先给协调员轻量工具，加上服务辅助的初始配置，以及能直接减少资料缺失、重复外联和筛查混乱的看板。
- name: CRO 捆绑压力
  description: 一旦这个痛点被看见，大型 CRO 可能会把这层能力打包进更大的试验运营合同里。
  mitigation: 别去替换 CRO 系统，而是接进它们，并围绕转诊模式、终点完整度和站点类型表现，沉淀一套有差异化的 Graves/TED 数据集。
