differentiator: CRO 能跑通用研究，患者支持中心往往要等获批后才启动，EMR 厂商也不掌握 sponsor 侧的疾病激活工作流。这家公司要赢，靠的是卡住新一代自身免疫药在两个专科之间那层窄但高价值的环节：转诊映射、预筛逻辑、基线资料包完成度和终点质量。它的防守力会随着 sponsor 专属数据越积越厚——哪些环节让 Graves/TED 项目丢人，哪类站点入组最快，哪组证据最能预测后续治疗匹配度。
