reportMemo:
  executiveTakeaways:
  - 窗口确实存在，但很窄：Graves/TED 项目正从科学叙事走向执行阶段，可买单的仍只是少数 biotech 团队，还谈不上一个宽软件类目。
  - 运营痛点是站得住的：TED 诊疗本来就强调多学科协作，基线眼科评估本身高度结构化，而专科试验里的站点启动负担也在持续上升。
  - 没有哪个现有厂商天然拿下这把切口。CTMS、招募网络和 CRO 工作流都能覆盖邻近任务，但没有一套是为“内分泌到眼科的转诊编排 + 双疾病证据完整度”专门优化的。
  - 这件事只有先在 Graves/TED 上打透，再把同一层跨专科激活能力扩到相邻自身免疫项目，才更像一个值得 venture 关注的方向。
  marketDefinition: 这是卖给 Graves 病和甲状腺眼病资产团队的 sponsor 侧工作流软件与服务：帮他们跨内分泌和眼科找患者、把基线资料包采集标准化，并在 10-40 个站点的早期临床项目里盯住筛查与终点完整度。这个市场比通用 CTMS、患者招募或 DCT 工具都窄得多；它卖的不是泛临床软件，而是夹在专科转诊、预筛和可审计证据采集之间的那层疾病专属激活能力。
  customerAndBuyer: 日常用户是 biotech sponsor 内部负责协调内分泌与眼科站点的临床运营、medical affairs 或 site enablement 团队。真正拍板的经济买家则是 CMO、COO 或 SVP Clinical Development，因为这个问题卡在研究启动、入组风险，以及早期 Graves/TED 数据包能不能让董事会、监管方和未来上市团队信服的交叉点上。
  buyingTriggers:
  - point: 定义赛道的大额融资和近在眼前的临床推进，让首位患者入组前为工作流花钱更容易立项。
    sourceRefs:
    - 6
    - 9
  - point: TED 指南明确要求及时转诊、以及内分泌和眼科的联合管理，这让原本抽象的跨专科交接，变成了一个非常具体的运营问题。
    sourceRefs:
    - 2
    - 3
    - 4
  - point: 站点已经在抱怨：按方案准备源文件既慢又重手工，所以 sponsor 有理由为更窄、更能提速的工作流买单，而不是再买一个泛化看板。
    sourceRefs:
    - 16
    - 17
  - point: 注册性与后期 TED 竞争越激烈，更快入组和更干净的基线证据就越有差异化价值。
    sourceRefs:
    - 5
    - 9
    - 10
  willingnessToPay:
    summary: 买家本来就在 CTMS、招募和合规系统上花钱，所以这不必新开一个软件预算科目。最能打动人的付费理由，不是泛化 AI，而是少掉的入组延误和基线资料缺失。公开厂商页面也说明，按报价销售的 trial ops 软件市场已经存在，低端付费 CTMS 也不是没有；只要这把切口能和 days-to-screen、资料包完整度以及 sponsor 可监管性挂钩，它就是一门说得通的生意。
    sourceRefs:
    - 19
    - 21
    - 22
    - 23
    - 24
  competitiveLandscape: 竞争来自四个方向：横向 CTMS/eTMF 系统、招募与可及性网络、站点导向的试验运营工具，以及最顽固的替代方案——CRO 加协调员表格。真正的战略空位不在通用临床软件，而在一层足够有主见的窄系统：把内分泌到眼科的转诊逻辑、基线资料包标准化，以及逐站点的双疾病证据质量一起抓住。
  incumbentThesis:
  - incumbentClass: CTMS 与 eTMF 套件
    point: 它们掌握的是宽口径的研究管理、监查和文档流程，但出发点是通用研究对象，而不是 Graves/TED 专属的转诊和基线资料包逻辑。
    sourceRefs:
    - 19
    - 23
    - 24
    - 25
  - incumbentClass: 招募与可及性网络
    point: 像 Circuit 这样的网络主打的是漏斗顶端参与率和站点支持，但在 sponsor 专属的跨专科资料包完整度和终点就绪上，它们并不会天然取胜。
    sourceRefs:
    - 20
    - 21
  - incumbentClass: 站点导向型试验平台
    point: 站点工具能帮着招募受试者，也能配合 sponsor 协作，但它们的重心始终在站点执行，而不是 sponsor 持有的、横跨多个外部中心的疾病工作流。
    sourceRefs:
    - 21
    - 23
    - 24
  - incumbentClass: 手工 CRO 与协调员工作流
    point: 这仍是默认替代方案，因为它灵活、也熟悉；但同样的文献也说明，它会把隐性的启动延迟、跨文档不一致和高准备负担原封不动保留下来。
    sourceRefs:
    - 16
    - 17
    - 25
  regulatoryLandscape: 即便它不是 EDC，这个产品也跑在受监管的临床运营里。FDA 指南要求临床研究中的电子系统、记录和签名必须可信；TED 指南则要求结构化眼科评估、严重度分级，以及在有临床指征时进行影像检查。这就意味着，创业公司必须把审计追踪、已验证工作流和 investigator 审核交接都保住，不能把自己做成消费级转诊 App。
  technologyLandscape: 支撑这把切口的底层条件已经够成熟：客观的 TED 终点早已建立，跨专科基线评估也有共识，而现代 CTMS/eReg 平台本就能在 sponsor 和站点之间交换研究、受试者和文档数据。剩下真正难的，是运营翻译这一步——怎么把指南驱动的眼科与内分泌检查，变成一套足够轻、sponsor 看得见、站点又愿意真做完的工作流。
  distributionChannels:
  - point: 最清晰的起步渠道，是由创始人直接卖给 FIH 和 POC biotech 项目的临床开发负责人。
    sourceRefs:
    - 6
    - 9
    - 10
  - point: 和 CTMS 及 site ops 厂商做集成型合作，能降低“推倒重来”的焦虑，也让这把切口更像工作流加速层，而不是又一套核心系统。
    sourceRefs:
    - 19
    - 23
    - 24
    - 25
  - point: 多学科 TED 中心和 KOL 网络之所以重要，是因为它们本来就身处需要内分泌与眼科协同的诊疗路径里，很适合作为 design partner 渠道。
    sourceRefs:
    - 2
    - 3
    - 15
  partnershipEcosystem:
  - point: CTMS 和站点系统会是关键伙伴，因为 sponsor 最终一定需要 write-back，或至少要把数据可靠地交接回现有研究管理流程。
    sourceRefs:
    - 19
    - 23
    - 24
    - 25
  - point: 多学科 TED 门诊和专科转诊中心，是最可信的起步伙伴，因为它们本来就在协调内分泌和眼科诊疗。
    sourceRefs:
    - 2
    - 3
    - 15
  - point: 影像、化验和 eSource 厂商同样重要，因为 TED 的基线和随访数据，必须在突眼度、视野、CAS 及相关评估上保持一致采集。
    sourceRefs:
    - 3
    - 5
    - 18
  dataMoats:
  - point: 一张把内分泌来源、眼科确认和筛查失败原因串起来的转诊图谱，只要积累过几个项目就会越来越值钱，因为横向厂商一开始就没有这套本体。
    sourceRefs:
    - 3
    - 17
  - point: 不同站点最容易缺哪些基线资料包要素，这类对标数据会慢慢滚成一项持久的实施和预测优势。
    sourceRefs:
    - 16
    - 17
  - point: 跨专科的生活质量与终点完整度历史，后续可以长成一套对 medical affairs 和上市就绪都很有用的证据基础设施。
    sourceRefs:
    - 5
    - 14
    - 15
  geographicConsiderations:
  - point: 滩头市场应先打美国，因为可见的 sponsor 集合、FDA 监管框架，以及第一波商业紧迫感都集中在那里。
    sourceRefs:
    - 6
    - 9
    - 10
    - 18
  - point: 但英国和欧盟的 TED 中心对后续扩张仍然重要，因为 EUGOGO 指南和多学科服务模型在重症管理里影响很大。
    sourceRefs:
    - 4
    - 15
  sensitivityCases:
  - case: 第一波双疾病或 Graves 项目延期
    impact: 如果 Ethyreal 或相邻 GD 项目推进放缓，近端买家池会明显收缩，创业公司就得更早去卖更广的自身免疫工作流。
    sourceRefs:
    - 6
    - 9
    - 10
  - case: 站点拒绝额外协调员工作
    impact: 如果产品被理解成给站点加负担，而不是帮它加速入组，公司就会被迫走重服务交付。
    sourceRefs:
    - 16
    - 17
  - case: 横向 CTMS 厂商很快补上专科模板
    impact: 公司未必活不下去，但差异化会从工作流覆盖，转到疾病本体、分析能力和实施速度上。
    sourceRefs:
    - 19
    - 23
    - 24
    - 25
  - case: 市场需求停留在 TED 单病种，而不是真正的双疾病
    impact: 初始切口依然能用，但“内分泌到眼科独特操作系统”这套叙事会变弱，ACV 压力也会上来。
    sourceRefs:
    - 7
    - 8
    - 9
  validationPlan:
  - priority: high
    question: 前 10 个试点站点里，从内分泌识别到眼科确认 TED 资格，中间到底漏掉了多少转诊？
    evidenceToGather: 至少 1 个活跃 sponsor 项目的转诊到受筛漏斗数据、筛查失败原因和时间戳。
  - priority: high
    question: 在 Graves/TED 研究里，最常卡住首剂给药就绪的基线资料包要素是什么？
    evidenceToGather: 覆盖至少 100 名受筛患者的站点级审计，检查化验、影像、视野、CAS 和 PRO 完成情况。
  - priority: medium
    question: sponsor 会把它当独立激活层来买，还是坚持必须挂在 CRO 或 CTMS 渠道下面？
    evidenceToGather: 访谈 10 位买家，覆盖 sponsor 临床运营、CRO 创业团队负责人和 CTMS 平台 owner。
  - priority: medium
    question: 同一套工作流本体，能不能在不大改服务体系的前提下迁到相邻自身免疫类别？
    evidenceToGather: 在 1 个非甲状腺自身免疫项目里做 design partner discovery，要求该项目同样有两条专科转诊路径。
