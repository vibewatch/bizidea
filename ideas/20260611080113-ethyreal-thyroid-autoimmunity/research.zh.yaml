      sourceRefs:
      - 19
      - 20
      - 21
      - 24
      - 25
  pestle:
  - factor: 政治
    impact: neutral
    point: 临床记录和委托系统周围的监管环境越来越严，这会抬高合规摩擦，但也更奖励那些可审计的工作流产品。
    sourceRefs:
    - 18
  - factor: 经济
    impact: positive
    point: 围绕 TED 和 Graves 资产的大额融资与上市前紧迫感，给执行工具打开了一段近端预算窗口。
    sourceRefs:
    - 6
    - 9
  - factor: 社会
    impact: positive
    point: TED 带来的心理社会和生活质量负担非常可见，因此更好的转诊和证据采集，解决的是患者和医生已经切身感受到的问题。
    sourceRefs:
    - 12
    - 13
    - 14
  - factor: 技术
    impact: positive
    point: 客观 TED 终点和成熟的 CTMS/eReg 栈，让疾病专属工作流编排比几年前更容易落地。
    sourceRefs:
    - 3
    - 5
    - 19
    - 23
    - 24
  - factor: 法律
    impact: negative
    point: 电子记录、签名和 sponsor 监管要求，决定了这个产品必须像一套已验证的试验基础设施，而不是轻量商业 SaaS。
    sourceRefs:
    - 18
  adoptionFrictionMatrix:
  - friction: 内分泌和眼科站点之间，跨专科转诊映射并没有标准答案。
    severity: high
    affectedBuyer: VP Clinical Operations
    mitigation: 第一天别追求全流程自动化，先用服务辅助的转诊打法和一套最小公分母式的基线资料包起步。
    sourceRefs:
    - 2
    - 3
    - 15
  - friction: 站点可能会把这套创业公司工作流理解成给协调员再加一层负担。
    severity: high
    affectedBuyer: 站点协同负责人
    mitigation: 第一版产品就盯住减少源文件准备和补资料工作，并用看板立刻把返工环节变少这件事呈现出来。
    sourceRefs:
    - 16
    - 17
  - friction: 接进已验证的研究系统和记录流程，本来就慢。
    severity: medium
    affectedBuyer: 临床系统负责人
    mitigation: 把自己定位成一层轻量激活模块，输出可导出的工件，并以可控方式 write-back 到 CTMS/eTMF 系统。
    sourceRefs:
    - 18
    - 19
    - 23
    - 24
    - 25
  - friction: 买家池很小，而且高度受时点驱动。
    severity: high
    affectedBuyer: 创始人兼 GTM 负责人
    mitigation: 围绕已知拐点去找 design partner，比如 FIH 启动、BLA 阶段扩张，或新的 Graves/TED 机制项目亮相。
    sourceRefs:
    - 6
    - 9
    - 10
market:
  tam:
    value: $6.0M
    rationale: 自下而上估算：按当前覆盖到的全球约 12 个可识别 GD/TED sponsor 项目或相邻已点名管线团队、每个项目每年约 $0.5M 的疾病专属激活软件加服务支出计算，即 12 x $0.5M = $6.0M。
    isEstimate: true
    sourceRefs:
    - 6
    - 7
    - 8
    - 9
    - 10
  sam:
    value: $2.8M
    rationale: 进一步收窄到北美约 7 个符合 10-40 站点滩头特征的 Phase I/II 或 prelaunch 项目，按每个活跃资产约 $0.4M 年激活预算计算，即 7 x $0.4M = $2.8M。
    isEstimate: true
    sourceRefs:
    - 6
    - 8
    - 9
    - 10
  som:
    value: $1.2M
    rationale: 可触达的第 3 年情景假设：在证明 1 个成功 design partner 和 1 次渠道扩张后，拿下 3 个活跃资产项目，每个项目约 $0.4M，即 3 x $0.4M = $1.2M。
    isEstimate: true
    sourceRefs:
    - 6
    - 9
    - 10
