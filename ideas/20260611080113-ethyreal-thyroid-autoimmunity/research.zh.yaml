  coverageGap: Graves/TED sponsor 工作流是个很窄、也很新的市场。这次检索虽然找到了不少候选 URL，但其中相当一部分要么被拦截、要么跳到无法抓取的变体页面，要么只剩重复的通讯社稿件和泛化的厂商文案。要凑到 100 篇保留来源，就只能拿低价值镜像、付费墙文章或重复产品页来充数，所以语料最终停在 27 个经验证的独立来源。
