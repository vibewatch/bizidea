    - 17
  headwinds:
  - point: 买家池集中在少数资产上，所以任何临床延期都会显著压缩近端需求。
    sourceRefs:
    - 6
    - 9
    - 10
  - point: 通用 CTMS 和招募厂商已经在卖相邻价值主张，如果切口不够具体，就很难赢。
    sourceRefs:
    - 19
    - 20
    - 21
    - 23
    - 24
  - point: TED 的诊断、严重度分级和影像检查，到现在仍然复杂，而且在各中心采集并不一致。
    sourceRefs:
    - 3
    - 13
    - 15
competitors:
- name: Veeva CTMS
  stage: 现有厂商
  wedge: 端到端的研究管理、监查、入组跟踪，以及 sponsor-CRO 工作流。
  pricing: 企业版 / 未公开标价
  strength: 横向工作流覆盖很强，在试验运营里也有成熟集成。
  weaknessVsUs: 它不是从 Graves/TED 专属转诊逻辑、基线资料包标准化或双专科证据完整度出发的。
  sourceRefs:
  - 19
- name: Circuit Clinical
  stage: 成长期
  wedge: 提供站点网络和受试者可及性支持，帮助医生在后台运营支撑下开展研究。
  pricing: 企业版 / 未公开标价
  strength: 在受试者可及性、医生赋能和参研运营支持上很强。
  weaknessVsUs: 它更偏向可及性和网络赋能，而不是 sponsor 自己掌控的疾病工作流和终点资料包质量。
  sourceRefs:
  - 20
- name: Study Catalyst CTMS
  stage: 成长期
  wedge: 现代化的站点导向平台，覆盖招募、试验运营和 sponsor 协作。
  pricing: 未公开标价
  strength: 它把自己定位成传统 CTMS 复杂度的更轻替代方案。
  weaknessVsUs: 它的重心是广义上的站点成功，而不是 sponsor 专属的 Graves/TED 转诊与证据模型。
  sourceRefs:
  - 21
- name: Cloudbyz CTMS
  stage: 现有厂商
  wedge: 一套临床试验管理栈，强调 sponsor、CRO 和文档可见性。
  pricing: 未公开标价
  strength: 覆盖标准 CTMS、eTMF 以及多方之间的研究文档可见性。
  weaknessVsUs: 它的深度来自通用工作流，因此更像行政层面的替代品，而不是为跨专科激活专门打造的 OS。
  sourceRefs:
  - 25
regulatoryTechnicalConstraints:
- point: 用于临床研究的电子系统，必须产出可信、可靠的记录与签名，并明确 sponsor 与 investigator 的控制边界。
  sourceRefs:
  - 18
- point: TED 检查要求一致的眼科评估、严重度评分，以及在有临床指征时做出影像选择，因此基线资料包逻辑不能临时拼凑。
  sourceRefs:
  - 3
  - 4
  - 5
- point: Graves 和 TED 患者的异质性、吸烟状态、甲状腺控制情况及疾病活动度，都会让预筛逻辑和队列可比性变复杂。
  sourceRefs:
  - 3
  - 13
  - 25
validationSignals:
- point: Ethyreal 以 $101M 融资亮相，并计划在 2026 年下半年启动首次人体试验，说明这条赛道的买方紧迫性是真实存在的。
  sourceRefs:
  - 6
- point: Viridian 的 TED BLA 已进入优先审评，说明相邻商业市场正在快速成熟。
  sourceRefs:
  - 9
- point: Immunovant 公开给出美国 GD 人群约 88 万，其中复发且未手术的细分约 33 万，这说明未满足需求会长期存在。
  sourceRefs:
  - 10
- point: 站点反馈显示，高复杂度研究会带来接近 6 周延迟和超过 21 小时的源文件准备工作，这直接印证了底层工作流痛点。
  sourceRefs:
  - 17
openQuestions:
- 等当前后期 TED 选手商业化后，还会有多少北美 Graves/TED 项目落在 10-40 站点的 biotech 滩头市场里？
- 候选患者漏损里，有多大比例发生在内分泌识别到眼科完成确认检查之间？
- 在获批前，sponsor 会愿意单独买这层激活系统，还是一定要求通过 CRO 或 CTMS 伙伴打包采购？
- 在 Graves/TED 项目里，哪些基线资料包要素最能预测入组速度和能否形成投资人级别的证据质量？
