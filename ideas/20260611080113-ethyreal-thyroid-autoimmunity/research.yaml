  adoptionFrictionMatrix:
    - friction: Cross-specialty referral mapping is not standardized across endocrinology and ophthalmology sites.
      severity: high
      affectedBuyer: VP Clinical Operations
      mitigation: Start with services-assisted referral playbooks and a minimal common baseline packet rather than full workflow automation on day one.
