reportMemo:
  executiveTakeaways:
    - The opening is real but narrow: Graves/TED programs are moving from science narrative to execution, yet the buyer pool is still a small set of biotech teams rather than a broad software category.
    - The operational pain is credible because TED care is explicitly multidisciplinary, baseline eye assessments are structured, and site startup burden is already rising across specialty trials.
    - No incumbent owns this wedge by default. CTMS, recruitment networks, and CRO workflows cover adjacent jobs, but none are optimized for endocrine-to-ophthalmology referral orchestration plus dual-disease evidence completeness.
    - The idea is probably venture-interesting only if the company proves Graves/TED first and then expands the same cross-specialty activation layer into adjacent autoimmune programs.
  marketDefinition: >-
    Sponsor-side workflow software and services for Graves disease and thyroid eye disease asset teams that need to find patients
    across endocrinology and ophthalmology, standardize baseline packet collection, and track screening and endpoint completeness
    across 10-40-site early clinical programs. The market is narrower than general CTMS, patient recruitment, or DCT tooling: it is
    the disease-specific activation layer between specialty referral, pre-screening, and audit-ready evidence capture.
  customerAndBuyer: >-
    The daily user is the clinical operations, medical affairs, or site-enablement team inside a biotech sponsor coordinating
    endocrinology and ophthalmology sites. The economic buyer is the CMO, COO, or SVP Clinical Development because the problem sits
    at the intersection of study startup, enrollment risk, and whether early Graves/TED data packages are credible enough for boards,
    regulators, and future launch planning.
  buyingTriggers:
    - point: Category-defining financings and near-term clinical transitions make workflow spend easier to justify before first patient in.
      sourceRefs:
        - 6
        - 9
    - point: TED guidance explicitly calls for timely referral and joint endocrinology-ophthalmology management, which turns fragmented specialty handoffs into a concrete operational problem.
      sourceRefs:
        - 2
        - 3
        - 4
    - point: Sites already report long delays and heavy manual effort in protocol-guided source preparation, so sponsors have a reason to pay for narrower workflow acceleration instead of more generic dashboards.
      sourceRefs:
        - 16
        - 17
    - point: Registrational and late-stage TED competition raises the value of faster enrollment and cleaner baseline evidence as a differentiator.
      sourceRefs:
        - 5
        - 9
        - 10
  willingnessToPay:
    summary: >-
      Buyers already spend on CTMS, recruitment, and compliance systems, so this does not need a net-new software budget category.
      The best payment argument is avoiding enrollment delay and incomplete baseline packets, not selling generic AI. Public vendor
      pages show an established market of quote-based trial-ops software and at least some low-end paid CTMS spend, which supports a
      credible wedge if it is tied to days-to-screen, packet completeness, and sponsor oversight.
    sourceRefs:
      - 19
      - 21
      - 22
      - 23
      - 24
  competitiveLandscape: >-
    Competition comes from four directions: horizontal CTMS/eTMF systems, recruitment and access networks, site-focused trial
    operations tools, and the entrenched substitute of CRO plus coordinator spreadsheets. The strategic gap is not general clinical
    trial software; it is a narrowly opinionated layer for endocrine-to-ophthalmology referral logic, baseline packet standardization,
    and site-by-site dual-disease evidence quality.
  incumbentThesis:
    - incumbentClass: CTMS and eTMF suites
      point: They own broad study management, monitoring, and documentation workflows, but they start from generic study objects rather than Graves/TED-specific referral and baseline packet logic.
      sourceRefs:
        - 19
        - 23
        - 24
        - 25
    - incumbentClass: Recruitment and access networks
      point: Networks such as Circuit attack top-of-funnel participation and site support, but they do not win by default on sponsor-specific cross-specialty packet completeness and endpoint readiness.
      sourceRefs:
        - 20
        - 21
    - incumbentClass: Site-focused trial platforms
      point: Site tools can help recruit participants and collaborate with sponsors, yet their center of gravity is site execution rather than sponsor-owned disease workflow across multiple external centers.
      sourceRefs:
        - 21
        - 23
        - 24
    - incumbentClass: Manual CRO and coordinator workflows
      point: This remains the default substitute because it is flexible and familiar, but the same literature shows it preserves hidden startup delays, cross-document inconsistency, and high preparation burden.
      sourceRefs:
        - 16
        - 17
        - 25
  regulatoryLandscape: >-
    The product sits inside regulated clinical operations even if it is not an EDC. FDA guidance requires trustworthy electronic
    systems, records, and signatures for clinical investigations, while TED guidance calls for structured eye assessments, severity
    grading, and imaging when clinically indicated. That means the startup must preserve audit trails, validated workflows, and
    investigator-review handoffs rather than acting like a consumer referral app.
  technologyLandscape: >-
    The enabling stack is now strong enough for this wedge: objective TED endpoints are established, cross-specialty baseline
    assessments are known, and modern CTMS/eReg platforms already exchange study, subject, and document data with sponsors and sites.
    The remaining hard problem is operational translation—turning guideline-driven ophthalmic and endocrine workups into a lightweight,
    sponsor-visible workflow that sites will actually complete.
  distributionChannels:
    - point: Founder-led selling into clinical development leaders at first-in-human and proof-of-concept biotech programs is the clearest starting channel.
      sourceRefs:
        - 6
        - 9
        - 10
    - point: Integration-led partnerships with CTMS and site-ops vendors reduce rip-and-replace anxiety and make the wedge look like workflow acceleration, not another core system.
      sourceRefs:
        - 19
        - 23
        - 24
        - 25
    - point: Multidisciplinary TED centers and KOL networks matter as design-partner channels because the care pathway already requires endocrinology and ophthalmology coordination.
      sourceRefs:
        - 2
        - 3
        - 15
  partnershipEcosystem:
    - point: CTMS and site systems are critical partners because sponsors will need write-back or at least reliable handoff into existing study-management workflows.
      sourceRefs:
        - 19
        - 23
        - 24
        - 25
    - point: Multidisciplinary TED clinics and specialist referral centers are the most credible launch partners because they already coordinate endocrine and ophthalmology care.
      sourceRefs:
        - 2
        - 3
        - 15
    - point: Imaging, lab, and eSource vendors matter because TED baseline and follow-up data require consistent capture across proptosis, visual fields, CAS, and related assessments.
      sourceRefs:
        - 3
        - 5
        - 18
  dataMoats:
    - point: A referral graph linking endocrinology sources, ophthalmology confirmation, and screen-fail reasons becomes valuable after a few programs because no horizontal vendor starts with that ontology.
      sourceRefs:
        - 3
        - 17
    - point: Benchmark data on which baseline packet elements go missing by site can compound into a durable implementation and forecasting advantage.
      sourceRefs:
        - 16
