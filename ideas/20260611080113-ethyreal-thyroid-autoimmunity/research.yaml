    - point: Cross-specialty quality-of-life and endpoint-completeness histories can become useful evidence infrastructure for future medical-affairs and launch-readiness work.
      sourceRefs:
        - 5
        - 14
        - 15
  geographicConsiderations:
    - point: The beachhead is U.S.-first because the visible sponsor set, FDA oversight model, and first wave of commercial urgency are concentrated there.
      sourceRefs:
        - 6
        - 9
        - 10
        - 18
    - point: UK and EU TED centers still matter for expansion because EUGOGO guidance and multidisciplinary service models are influential in severe disease management.
      sourceRefs:
        - 4
        - 15
  sensitivityCases:
    - case: First-wave dual-disease or Graves programs slip
      impact: If Ethyreal or adjacent GD programs slow down, the near-term buyer pool compresses materially and the startup must sell broader autoimmune workflow sooner.
      sourceRefs:
        - 6
        - 9
        - 10
    - case: Sites reject additional coordinator work
      impact: The product gets framed as more site burden rather than enrollment acceleration, which would force a services-heavy rollout model.
      sourceRefs:
        - 16
        - 17
    - case: Horizontal CTMS vendors add specialty templates quickly
      impact: The startup can still survive, but differentiation shifts from workflow coverage to disease ontology, analytics, and implementation speed.
      sourceRefs:
        - 19
        - 23
        - 24
        - 25
    - case: Market demand stays TED-only rather than true dual-disease
      impact: The initial wedge remains usable, but the argument for a unique endocrine-to-ophthalmology operating system weakens and ACV pressure rises.
      sourceRefs:
        - 7
        - 8
        - 9
  validationPlan:
    - priority: high
      question: How much referral leakage happens between endocrinology identification and ophthalmology-confirmed TED eligibility at the first 10 pilot sites?
      evidenceToGather: Referral-to-screen funnel data, screen-fail reasons, and time stamps from at least one active sponsor program.
    - priority: high
      question: Which baseline packet elements most frequently block first-dose readiness in Graves/TED studies?
      evidenceToGather: Site-level audits covering labs, imaging, visual fields, CAS, and PRO completion across at least 100 screened patients.
    - priority: medium
      question: Will sponsors buy this as a standalone activation layer or insist on CRO or CTMS channel attachment?
      evidenceToGather: Ten buyer interviews across sponsor clinical ops, CRO startup leads, and CTMS platform owners.
    - priority: medium
      question: Can the same workflow ontology transfer into adjacent autoimmune categories without a major services rewrite?
      evidenceToGather: Design-partner discovery in one non-thyroid autoimmune program with two specialty referral paths.
