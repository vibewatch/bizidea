competitors:
  - name: Veeva CTMS
    stage: incumbent
    wedge: End-to-end study management, monitoring, enrollment tracking, and sponsor-CRO workflow.
    pricing: Enterprise / not publicly listed
    strength: Strong horizontal workflow coverage and established integrations across trial operations.
    weaknessVsUs: Does not start with Graves/TED-specific referral logic, baseline packet standardization, or dual-specialty evidence completeness.
    sourceRefs:
      - 19
  - name: Circuit Clinical
    stage: scale-up
    wedge: Site network and participant-access support that helps physicians conduct trials with backend operational support.
    pricing: Enterprise / not publicly listed
    strength: Strong on participant access, physician enablement, and operational support for trial participation.
    weaknessVsUs: More focused on access and network enablement than sponsor-owned disease workflow and endpoint packet quality.
    sourceRefs:
      - 20
  - name: Study Catalyst CTMS
    stage: scale-up
    wedge: Modern site-oriented platform for recruitment, trial operations, and sponsor collaboration.
    pricing: Not publicly listed
    strength: Positions itself as an easier alternative to traditional CTMS complexity.
    weaknessVsUs: Center of gravity is site success broadly, not the sponsor-specific Graves/TED referral and evidence model.
    sourceRefs:
      - 21
  - name: Cloudbyz CTMS
    stage: incumbent
    wedge: Clinical-trial management stack with sponsor, CRO, and document visibility features.
    pricing: Not publicly listed
    strength: Covers standard CTMS, eTMF, and study-document visibility across stakeholders.
    weaknessVsUs: Generic workflow depth makes it a substitute for administration, not a purpose-built cross-specialty activation OS.
    sourceRefs:
      - 25
regulatoryTechnicalConstraints:
  - point: Electronic systems used in clinical investigations must produce trustworthy, reliable records and signatures with clear sponsor and investigator controls.
    sourceRefs:
      - 18
  - point: TED workups require consistent ophthalmic assessment, severity scoring, and imaging choices when clinically indicated, so baseline packet logic cannot be ad hoc.
    sourceRefs:
      - 3
      - 4
      - 5
  - point: Graves and TED patient heterogeneity, smoking status, thyroid control, and disease activity complicate pre-screening logic and cohort comparability.
    sourceRefs:
      - 3
      - 13
      - 25
validationSignals:
  - point: Ethyreal launched with $101M and plans first-in-human testing in the second half of 2026, showing real buyer-side urgency in the category.
    sourceRefs:
      - 6
  - point: Viridian already has a TED BLA under Priority Review, proving the adjacent commercial market is maturing quickly.
    sourceRefs:
      - 9
  - point: Immunovant publicly sizes a U.S. GD population of roughly 880,000 and a relapsed, non-surgical segment of about 330,000, supporting persistent unmet need.
    sourceRefs:
      - 10
  - point: Sites report nearly six weeks of delay and more than 21 hours of source-prep work for high-complexity studies, validating the underlying workflow pain.
    sourceRefs:
      - 17
openQuestions:
  - How many North American Graves/TED programs will fit the 10-40-site biotech beachhead after current late-stage TED entrants commercialize?
  - What percentage of candidate-patient leakage occurs between endocrinology identification and ophthalmology-confirmed workup completion?
  - Will sponsors buy a standalone activation layer pre-approval, or insist that the product be bundled through CRO or CTMS partners?
  - Which baseline packet elements most strongly predict enrollment speed and investor-grade evidence quality across Graves/TED programs?
