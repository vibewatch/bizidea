market:
  tam:
    value: $86.4M
    rationale: 估算：大约有 1,200 个美国牙科集团（5–25 个院点）可能购买专门的 ledger-close 代理。单位模型以美国 160,000 家牙科诊所为起点，假设约 7.5% 的点位位于目标中的 5–25 院点独立 / PE 支持集团，再按每个目标集团平均 10 个院点折算。年支出按每集团 $72,000 建模（每院点每月 $600 × 10 个院点），显著低于 Lassie 提到的人力负担，也与相邻牙科软件预算锚点一致。计算：1,200 × $72,000 = $86,400,000。
    isEstimate: true
    sourceRefs:
    - 1
    - 11
    - 37
    - 43
  sam:
    value: $28.8M
    rationale: 滩头市场约束：约 400 个美国牙科集团既符合 5–25 个院点画像，又已具备集中式保险 billing，以及短期内适合做 overlay 自动化的 PMS / clearinghouse 栈。按同样每年 $72,000 ACV 建模，得到更聚焦的可服务市场。计算：400 × $72,000 = $28,800,000。
    isEstimate: true
    sourceRefs:
    - 11
    - 21
    - 24
    - 26
    - 40
  som:
    value: $2.2M
    rationale: 第 3 年可触达份额，假设在 onboarding 和院点扩张后做到 30 个付费集团，每个约 $72,000 ARR。计算：30 × $72,000 = $2,160,000，四舍五入为 $2.2M。
    isEstimate: true
    sourceRefs:
    - 2
    - 25
    - 27
