    - 29
  geographicConsiderations:
  - point: 这条切口天然先做美国，因为它依赖美国的 EFT/ERA 标准、ADA claim form 规范，以及围绕 HIPAA 交易构建的 payer / clearinghouse 生态。
    sourceRefs:
    - 12
    - 15
    - 17
    - 18
  - point: 多州扩张很诱人，但州一级的 payer 结构、Medicaid 差异和当地诊所组织方式，仍会影响 rollout 优先级和异常模式。
    sourceRefs:
    - 10
