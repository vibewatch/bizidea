    - 40
  sensitivityCases:
  - case: 现有 PMS 厂商把更深的 reconciliation 功能打包进去
    impact: 创业公司仍能以“由财务拥有的控制层”取胜，但差异化必须从基础 auto-posting，转向银行核验、异常智能和跨院点 benchmark。
    sourceRefs:
    - 21
    - 25
    - 33
    - 37
    - 38
  - case: 写回支持长期集中在一两个 PMS 环境
    impact: 早期转化会更集中在 Open Dental 和 Dentrix 占比高的集团；在补齐更广 PMS 覆盖或 overlay 工作流前，SAM 会先收缩。
    sourceRefs:
    - 21
    - 26
    - 40
    - 43
  - case: 买家更愿意用服务替代软件变更
    impact: 如果集团继续把 billing 痛点外包，销售周期会变长、价格压力会抬高；产品必须证明的是 controller 关心的“结账更快、漏损更少”，而不只是“省了手工”。
    sourceRefs:
    - 2
    - 20
    - 45
  - case: payer 门户或 operating rule 变化抬高异常率
    impact: 实施负担和支持成本都会上升，因此审计日志、人工审核阈值和快速更新规则的机制，会变成留存核心。
    sourceRefs:
    - 12
    - 13
    - 15
    - 16
    - 17
  validationPlan:
  - priority: high
    question: 今天 5–25 个院点的牙科集团里，哪些 payer 与 PMS 组合会造成最多未结清的现金过账积压？
    evidenceToGather: 拿 8–10 个设计伙伴的带时间戳异常日志，按 payer、入账类型、PMS 和院点拆开。
  - priority: high
    question: 一个 ledger-close 代理能否在不提高 write-off 风险的前提下，把“payer 付款→过账并完成银行核验”的天数至少砍掉 50%？
    evidenceToGather: 收集 90 天 pilot 前后指标：过账天数、未核销现金、少付发现率和返工时长。
  - priority: high
    question: 在不替换或扩张现有 PMS / clearinghouse 栈之前，CFO 和 COO 是否愿意先买一层财务优先的控制层？
    evidenceToGather: 做 10 次预算持有人访谈，再跑 2 个付费 pilot——产品以 Dentrix 或 Open Dental overlay 方式接入，而不是替换原系统。
  - priority: medium
    question: 能建立信任的自主阈值到底在哪里：规则内静默 auto-posting，还是所有高于某个金额的异常都必须人工审批？
    evidenceToGather: 用 pilot 审计日志观察：不同审批率、异常类别和置信阈值里，客户分别能接受到什么程度。
