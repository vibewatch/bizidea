topRisks:
  - name: Integration fragility
    description: Practice-management system quirks and payer portal changes could reduce automation accuracy and slow deployments.
    mitigation: Start with a narrow set of high-volume workflows, maintain fast exception handling, and launch via overlay integrations before deeper system writes.
  - name: Trust in autonomous money movement
    description: Owners may hesitate to let software post financial records or mark payments reconciled without human review.
    mitigation: Begin with approval thresholds, full audit logs, and side-by-side reconciliation reports that prove accuracy before expanding autonomous permissions.
  - name: Category compression by full-stack incumbents
    description: Broad practice-automation vendors or fast-moving startups could expand into ledger close once the ROI is visible.
    mitigation: Win on narrow workflow depth, payer-specific exception intelligence, and location-level collections benchmarks that are hard for generalists to copy quickly.
