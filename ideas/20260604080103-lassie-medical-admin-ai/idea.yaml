problem: >-
  Multi-site dental groups leak cash every day because insurance payments, bank deposits, and practice-management records rarely line up cleanly without manual follow-up. Billing teams spend hours logging into payer portals, pulling remittance details, posting payments, fixing exceptions, and checking whether money actually landed in the bank. When staffing is thin, underpayments and unapplied cash sit unresolved, owners lose visibility into daily collections, and each new location adds more back-office overhead than revenue leaders expect.
targetUser:
  primary: COO or revenue-cycle manager at a U.S. dental group with 5-25 locations and a centralized insurance billing team
  secondary: Controller at a small specialty medical group that still closes reimbursements through portal checks and manual payment posting
  buyer: COO or CFO at an independent or PE-backed dental group
startupThesis:
  nonObviousInsight: The first wedge in agentic practice operations is not a general AI office manager. It is the daily ledger-close loop where payer data, system-of-record updates, and bank verification have to match exactly. Once agents can complete that closed-loop workflow autonomously, small practices trust them with money first, then expand them into broader admin operations.
  beachhead: Independent U.S. dental groups with 5-25 locations, centralized billing teams, and recurring unapplied-insurance-cash backlogs across multiple payer portals
  wedge: Autonomous ledger-close software that pulls reimbursement detail from payer portals, matches deposits, posts into the practice-management system, and routes only true exceptions to humans
  whyNowCatalyst: Lassie's traction and source-level workflow detail show that autonomous reimbursement reconciliation is already working in live practices, while rising admin labor costs make the ROI urgent now.
  ventureScalePath: Start with dental reimbursement close, then expand into eligibility, denials, patient balances, scheduling, and eventually a full operating layer for small outpatient groups that cannot afford large back-office teams.
solution: >-
  The product acts as a ledger-close agent for dental groups. It logs into payer portals, pulls remittance and claim-status detail, matches expected payments against actual bank deposits, posts the right entries into the practice-management system, and opens a structured exception queue only when amounts, dates, or patient records do not reconcile. Operators get a daily collections dashboard showing closed dollars, unresolved exceptions, and underpayment patterns by payer without manually stitching reports together. The initial deployment would focus on the highest-volume reimbursement workflows so customers can remove repetitive posting work before tackling adjacent functions like denials or patient-pay collections. Over time, the company would build a payer-behavior and exception-resolution dataset that improves automation rates and helps groups benchmark cash leakage across locations.
goToMarketSeed:
  firstCustomer: A 10- to 20-location U.S. dental group with 20-60 providers, a 5- to 12-person central billing team, and daily unapplied cash or underpayment queues
  buyingTrigger: A staffing shortage, acquisition of new locations, or month-end close pain that exposes how many reimbursement tasks still depend on portal-by-portal manual posting
  currentAlternative: Manual insurance posting teams, outsourced RCM staff, spreadsheet-led bank reconciliation, or generic RPA scripts
  switchingReason: The wedge closes the money loop end to end and routes only true exceptions, so the first customer gets faster cash visibility and lower billing headcount pressure without assembling its own brittle automation stack
  pricingHypothesis: Monthly platform fee per location plus usage pricing tied to posted claims dollars or successfully reconciled payment events
