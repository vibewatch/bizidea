scenarios:
  downside:
    description: Pilot conversion stays closer to the kill-criteria floor and more accounts remain single-workflow deployments for longer.
    y3RevenueK: 1237.5
    y3EbitdaK: -721.2
    cashLowPointK: 383.9
    keyAssumptionChanges:
    - End-Y2 customers fall from 12 to 9 and end-Y3 customers from 30 to 22 because paid-pilot-to-production conversion lands closer to 50% than the planned 60%+ range.
    - Blended realized revenue per customer slips from $81K to about $75K in Y3 as location expansion and adjacent module attach happen later.
    - Gross margin drops from 70% to 67% if implementation and exception handling remain more services-heavy than planned.
  base:
    description: Founder-led sales, a narrow wedge, and referral-assisted onboarding produce steady customer adds without hiring far ahead of proof.
    y3RevenueK: 1660.5
    y3EbitdaK: -388.2
    cashLowPointK: 824.8
    keyAssumptionChanges:
    - Customers grow from 3 at end-Y1 to 12 at end-Y2 and 30 at end-Y3, matching the plan milestone band and researched SOM path.
    - Blended realized revenue per group rises from $72K in Y1 to $81K in Y3 as more accounts add locations, usage, and adjacent reimbursement modules.
    - Headcount stays lean at 9 FTE by Q4Y3, with only one G&A hire and heavy reliance on standardized onboarding playbooks.
  upside:
    description: Cleaner partner referrals and faster onboarding pull customer adds forward while expansion revenue and margins improve modestly.
    y3RevenueK: 1942.5
    y3EbitdaK: -151.7
    cashLowPointK: 1183.2
    keyAssumptionChanges:
    - End-Y2 customers rise from 12 to 14 and end-Y3 customers from 30 to 34 because partner-sourced leads convert faster.
    - Blended realized revenue per group improves from $81K to about $84K in Y3 as more groups expand across locations earlier.
    - Gross margin improves from 70% to 72% as reusable implementation templates reduce manual exception work.
sensitivity:
- variable: sales cycle
  downsideCase: Pilot-to-production stretches toward 6-7 months
  baseCase: Roughly 4-6 months from first meeting to production
  upsideCase: About 90-120 days once the onboarding playbook is proven
  y3RevenueImpactK: 220.0
  cashImpactK: 160.0
- variable: ARPU
  downsideCase: $75K blended realized annual revenue per group in Y3
  baseCase: $81K blended realized annual revenue per group in Y3
  upsideCase: $84K blended realized annual revenue per group in Y3
  y3RevenueImpactK: 123.0
  cashImpactK: 86.0
- variable: CAC
  downsideCase: $50K CAC if deals rely on founder-only outbound and bespoke pilots
  baseCase: $35K CAC
  upsideCase: $28K CAC with stronger consultant and outsourced-billing referrals
  y3RevenueImpactK: 90.0
  cashImpactK: 180.0
- variable: churn
  downsideCase: 2.0% monthly churn on early production groups
  baseCase: 1.3% monthly churn
  upsideCase: 1.0% monthly churn once benchmark reporting improves stickiness
  y3RevenueImpactK: 140.0
  cashImpactK: 95.0
- variable: gross margin
  downsideCase: 67% gross margin if exception handling stays labor-heavy
  baseCase: 70% gross margin
  upsideCase: 72% gross margin with more reusable workflows and cleaner data mapping
  y3RevenueImpactK: 0.0
  cashImpactK: 50.0
- variable: hiring pace
  downsideCase: Pull the next implementation and G&A hires forward by two quarters
  baseCase: Stay at 9 FTE by Q4Y3
  upsideCase: Delay the G&A hire until after the modeled period
  y3RevenueImpactK: 0.0
  cashImpactK: 120.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified dental group leads] --> Pilots[Paid pilots]
      Pilots --> Customers[Production groups]
      Customers --> Revenue[Subscription plus usage revenue]
      Customers --> Expansion[More locations and modules]
      Expansion --> Revenue
      Revenue --> GrossProfit[70 percent gross profit]
      GrossProfit --> Cash[Runway and next-round proof]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by growing from 3 paying groups in Y1 to 30 by Q4Y3 while blended realized revenue per group rises modestly from $72K to $81K through expansion and usage fees.
- checkName: Must go right
  finding: The model needs paid-pilot-to-production conversion to stay near the plan's 60%+ target and onboarding to standardize across Open Dental and Dentrix before sales hiring scales.
- checkName: Model breaks if
  finding: If implementation stays bespoke and expansion attach is delayed, the downside case cuts Y3 revenue to about $1.24M and pushes the cash trough toward roughly $0.38M.
- checkName: Next-round proof
  finding: The seed story is 10-12 production groups by end-Y2 with repeatable onboarding economics and a credible path to the researched 30-group SOM trajectory.
sanityChecks:
  ruleOf40: Y3 growth 198.8% + EBITDA margin -23.4% = 175.4%
  burnMultiple: Y2 burn multiple is about 1.3x using $0.86M EBITDA burn over roughly $0.65M net new ARR; efficiency improves materially in Y3 as gross profit covers more of the fixed team.
  revenuePerFte: $184.5K Y3 with 9 FTE at Q4Y3 (benchmark $200-400K SaaS)
  flags:
  - Revenue per FTE remains slightly below classic SaaS benchmarks because the company still carries meaningful implementation and domain-ops load through Y3.
  - The base case assumes one implementation lead and one revenue-cycle specialist can support 30 live groups through standardized playbooks and service-partner backstops; if deployments stay bespoke, hiring must move faster or growth will slip.
  - Market size and ACV still depend on enough 5-25 location groups having centralized billing authority and budget ownership, which the plan itself identifies as a key validation risk.
  - Cash is modeled from EBITDA with minimal working-capital noise, so actual collections could swing around pilot deposits, annual prepayments, and implementation invoicing.
