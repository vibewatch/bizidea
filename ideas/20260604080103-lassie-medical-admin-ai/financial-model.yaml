slug: dental-ledger-close-ai
date: '2026-06-04'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start and round timing
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date; BP fundingAsk] Model starts the month after the plan date and assumes the pre-seed closes before M1 so customer and cash ramp begin cleanly.'
- id: A2
  name: Opening cash
  value: '2800'
  unit: USDK
  source: '[BP fundingAsk.targetFundingRangeUsd] Uses a $2.8M pre-seed inside the stated $2-4M range, sized to reach the Year-2 milestone and still keep roughly six months of buffer.'
- id: A3
  name: Revenue recognition cadence
  value: New customers contribute half-period revenue in the month or quarter they land
  unit: policy
  source: '[Startup-finance heuristic] Early B2B workflow deals rarely start on day one, so the landing period recognizes half a month or half a quarter of revenue.'
- id: A4
  name: Steady-state recurring ACV
  value: '72'
  unit: USDK annual per group
  source: '[BP market.som; Research market.tam/sam/som; BP investorMemo.firstCustomer.initialContract] Uses the repeated $72K modeled annual spend for a 10-location group, which also sits inside the $60K-$90K production contract range.'
- id: A5
  name: Y1 blended realized revenue per customer
  value: '72'
  unit: USDK annualized
  source: '[BP investorMemo.firstCustomer.initialContract; BP milestones] Keeps Year 1 at the researched $72K group spend because the first three logos are still mostly pilot-to-production conversions.'
- id: A6
  name: Y2 blended realized revenue per customer
  value: '78'
  unit: USDK annualized
  source: '[BP businessModel.revenueStreams; BP milestones] Assumes modest uplift from implementation fees, multi-location expansion, and usage-based reconciliation on top of the core $72K subscription.'
- id: A7
  name: Y3 blended realized revenue per customer
  value: '81'
  unit: USDK annualized
  source: '[BP businessModel.expansionLevers; BP product.twentyFourMonth] Assumes some customers add more locations, payer coverage, and adjacent reimbursement modules after the core ledger-close wedge is proven.'
- id: A8
  name: Net customer ramp
  value: 3 EOY1 / 12 EOY2 / 30 EOY3
  unit: customers
  source: '[BP milestones; Research market.som] Matches the plan to end Year 2 in the stated 10-15 production-group band and reach the researched Year-3 path of roughly 30 paying groups.'
- id: A9
  name: Target gross margin
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] Uses the business-plan gross-margin target directly.'
- id: A10
  name: Monthly churn
  value: '1.3'
  unit: percent
  source: '[Startup-finance heuristic; BP whyWeWin implied stickiness] Early vertical workflow software with annual contracts but still-proving trust typically underwrites roughly 1-1.5% monthly logo churn.'
- id: A11
  name: Fully loaded CAC
  value: '35'
  unit: USDK per new customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; Research reportMemo.distributionChannels] Founder-led sales plus consultant and outsourced-billing referrals supports a mid-five-figure CAC rather than enterprise-software CAC.'
- id: A12
  name: Loaded salary bands
  value: Founder 120 / Engineering 175 / Product-Implementation 150 / Revenue-Cycle Ops 125 / Sales 165 / G&A 110
  unit: USDK annual per FTE
  source: '[Startup-finance heuristic] Lean U.S. vertical-software pay bands including payroll tax and benefits load.'
- id: A13
  name: Hiring ramp
  value: 3 FTE Q1Y1, 5 FTE Q4Y1, 7 FTE Q4Y2, 9 FTE Q4Y3
  unit: FTE
  source: '[BP team; BP experimentRoadmap; BP milestones] Starts with the founder, founding engineer, and implementation lead, adds revenue-cycle support quickly, hires the first AE only after initial proof, then adds a second engineer, extra seller, and one G&A hire as onboarding becomes repeatable.'
- id: A14
  name: Non-payroll operating spend
  value: Y1 monthly 12-19; Y2 quarterly 54-72; Y3 quarterly 72-90
  unit: USDK
  source: '[BP operations; BP risks; Startup-finance heuristic] Covers cloud, compliance, travel, integrations, and legal while the company stays intentionally narrow on one PMS and payer set at a time.'
- id: A15
  name: Cash conversion assumption
  value: EBITDA approximates operating cash flow
  unit: policy
  source: '[Startup-finance heuristic] Assumes minimal capex, debt, and working-capital distortion for an asset-light B2B software company.'
- id: A16
  name: Financing objective
  value: Reach 10-12 production groups with repeatable Open Dental and Dentrix onboarding and six months of cash buffer before the next round
  unit: milestone
  source: '[BP milestones; BP fundingAsk; BP strategyMap.killCriteria] Sizes the pre-seed to hit the next proof point before broader specialty expansion.'
