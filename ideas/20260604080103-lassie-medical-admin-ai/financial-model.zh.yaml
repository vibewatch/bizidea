slug: dental-ledger-close-ai
date: '2026-06-04'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始时间与融资轮次
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date; BP fundingAsk] 模型从计划日期后的次月启动，并假设 pre-seed 在 M1 前完成，因此客户和现金爬坡可以更顺滑地开始。'
- id: A2
  name: 期初现金
  value: '2800'
  unit: USDK
  source: '[BP fundingAsk.targetFundingRangeUsd] 采用区间 $2-4M 中的 $2.8M pre-seed，规模足以打到第 2 年里程碑，并额外留出约 6 个月缓冲。'
- id: A3
  name: 收入确认节奏
  value: 新客户在签约当月或当季按半个周期确认收入
  unit: policy
  source: '[Startup-finance heuristic] 早期 B2B 工作流交易很少在签约当天就完整起量，因此签约当月或当季只确认半个月或半个季度收入。'
- id: A4
  name: 稳定期经常性 ACV
  value: '72'
  unit: USDK annual per group
  source: '[BP market.som; Research market.tam/sam/som; BP investorMemo.firstCustomer.initialContract] 采用重复出现的每个 10 院点集团 $72K 年支出建模，也落在 $60K-$90K 的生产合同区间内。'
- id: A5
  name: 第 1 年客户混合实现收入
  value: '72'
  unit: USDK annualized
  source: '[BP investorMemo.firstCustomer.initialContract; BP milestones] 第 1 年维持研究中的每集团 $72K 支出，因为前三个 logo 仍主要处在 pilot 向生产转化阶段。'
- id: A6
  name: 第 2 年客户混合实现收入
  value: '78'
  unit: USDK annualized
  source: '[BP businessModel.revenueStreams; BP milestones] 假设在核心 $72K 订阅之外，实施费、多院点扩张和按量 reconciliation 会带来小幅抬升。'
- id: A7
  name: 第 3 年客户混合实现收入
  value: '81'
  unit: USDK annualized
  source: '[BP businessModel.expansionLevers; BP product.twentyFourMonth] 假设部分客户会在核心 ledger-close 切口被验证后，增加更多院点、payer 覆盖和相邻报销模块。'
- id: A8
  name: 净客户爬坡
  value: 3 EOY1 / 12 EOY2 / 30 EOY3
  unit: customers
  source: '[BP milestones; Research market.som] 让计划与里程碑对齐：第 2 年末落在 10-15 个生产集团区间，并在第 3 年走到研究中的约 30 个付费集团路径。'
- id: A9
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 直接采用 business-plan 里的毛利率目标。'
- id: A10
  name: 月流失率
  value: '1.3'
  unit: percent
  source: '[Startup-finance heuristic; BP whyWeWin implied stickiness] 早期垂直工作流软件虽然签年约，但信任仍在建立，通常会按约 1-1.5% 月 logo 流失率来做保守承保。'
- id: A11
  name: 全负担 CAC
  value: '35'
  unit: USDK per new customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; Research reportMemo.distributionChannels] 创始人主导销售叠加顾问和外包 billing 转介绍，使 CAC 更接近中位五位数，而不是企业软件级 CAC。'
- id: A12
  name: 全负担薪酬带宽
  value: 创始人 120 / 工程 175 / 产品-实施 150 / 收入周期运营 125 / 销售 165 / G&A 110
  unit: USDK annual per FTE
  source: '[Startup-finance heuristic] 美国精益型垂直软件团队的薪酬带宽，已包含工资税和福利负担。'
- id: A13
  name: 招聘节奏
  value: 3 FTE Q1Y1, 5 FTE Q4Y1, 7 FTE Q4Y2, 9 FTE Q4Y3
  unit: FTE
  source: '[BP team; BP experimentRoadmap; BP milestones] 从创始人、创始工程师和实施负责人起步，很快补充收入周期支持；只有首批证明出来后才招第一个 AE，之后再补第二位工程师、更多销售和一名 G&A。'
- id: A14
  name: 非薪酬运营支出
  value: Y1 每月 12-19；Y2 每季度 54-72；Y3 每季度 72-90
  unit: USDK
  source: '[BP operations; BP risks; Startup-finance heuristic] 覆盖云成本、合规、差旅、集成和法务，同时公司仍刻意一次只盯一个 PMS 和一组 payer。'
- id: A15
  name: 现金转换假设
  value: EBITDA 近似等于经营现金流
  unit: policy
  source: '[Startup-finance heuristic] 假设这是一家轻资产 B2B 软件公司，capex、债务和营运资本扰动都很小。'
- id: A16
  name: 融资目标
  value: 在下一轮融资前，做到 10-12 个生产集团，跑通可重复的 Open Dental 与 Dentrix onboarding，并保留约 6 个月现金缓冲
  unit: milestone
  source: '[BP milestones; BP fundingAsk; BP strategyMap.killCriteria] pre-seed 的规模是为了在更广专科扩张前，先打到下一轮证明点。'
