scenarios:
  downside:
    description: pilot 转正更接近 kill-criteria 下限，且更多客户长期只停留在单工作流部署。
    y3RevenueK: 1237.5
    y3EbitdaK: -721.2
    cashLowPointK: 383.9
    keyAssumptionChanges:
    - 第 2 年末客户从 12 个降到 9 个，第 3 年末从 30 个降到 22 个，因为付费 pilot 转生产更接近 50%，而不是计划中的 60%+。
    - 第 3 年每客户混合实现收入从 $81K 滑到约 $75K，因为院点扩张和相邻模块挂载来得更晚。
    - 如果实施和异常处理比计划更偏服务化，毛利率会从 70% 降到 67%。
  base:
    description: 创始人主导销售、窄切口和转介绍式 onboarding 带来稳步增客，不会在证据出来前过早扩招。
    y3RevenueK: 1660.5
    y3EbitdaK: -388.2
    cashLowPointK: 824.8
    keyAssumptionChanges:
    - 客户数从第 1 年末 3 个，增长到第 2 年末 12 个、第 3 年末 30 个，与计划里程碑和研究中的 SOM 路径一致。
    - 随着更多客户增加院点、usage 和相邻报销模块，每集团混合实现收入从第 1 年 $72K 小幅升到第 3 年 $81K。
    - 到 Q4Y3 团队维持在 9 FTE，只有 1 位 G&A 招聘，onboarding 主要依赖标准化 playbook。
  upside:
    description: 合作伙伴转介绍更干净、onboarding 更快，客户增长前移，扩张收入和毛利率也有小幅改善。
    y3RevenueK: 1942.5
    y3EbitdaK: -151.7
    cashLowPointK: 1183.2
    keyAssumptionChanges:
    - 第 2 年末客户从 12 个升到 14 个，第 3 年末从 30 个升到 34 个，因为合作伙伴带来的线索转化更快。
    - 第 3 年每集团混合实现收入从 $81K 升到约 $84K，因为更多集团更早把更多院点接进来。
    - 随着可复用实施模板减少手工异常处理，毛利率从 70% 升到 72%。
sensitivity:
- variable: 销售周期
  downsideCase: pilot 转生产拉长到 6–7 个月
  baseCase: 从首次会面到生产大约 4–6 个月
  upsideCase: 一旦 onboarding playbook 跑通，可压到约 90–120 天
  y3RevenueImpactK: 220.0
  cashImpactK: 160.0
- variable: ARPU
  downsideCase: 第 3 年每集团混合实现年收入 $75K
  baseCase: 第 3 年每集团混合实现年收入 $81K
  upsideCase: 第 3 年每集团混合实现年收入 $84K
  y3RevenueImpactK: 123.0
  cashImpactK: 86.0
- variable: CAC
  downsideCase: 如果交易主要靠创始人单兵 outbound 和定制化 pilot，CAC 会到 $50K
  baseCase: $35K CAC
  upsideCase: 若顾问和外包 billing 转介绍更强，CAC 可降到 $28K
  y3RevenueImpactK: 90.0
  cashImpactK: 180.0
- variable: 流失率
  downsideCase: 早期生产客户月流失率 2.0%
  baseCase: 月流失率 1.3%
  upsideCase: benchmark 报表增强粘性后，月流失率 1.0%
  y3RevenueImpactK: 140.0
  cashImpactK: 95.0
- variable: 毛利率
  downsideCase: 若异常处理仍很吃人力，毛利率为 67%
  baseCase: 毛利率 70%
  upsideCase: 如果工作流更可复用、数据映射更干净，毛利率可到 72%
  y3RevenueImpactK: 0.0
  cashImpactK: 50.0
- variable: 招聘节奏
  downsideCase: 把下一位实施和 G&A 招聘都提前两个季度
  baseCase: 到 Q4Y3 维持 9 FTE
  upsideCase: 把 G&A 招聘推迟到建模期之后
  y3RevenueImpactK: 0.0
  cashImpactK: 120.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads[合格牙科集团线索] --> Pilots[付费 pilot]
      Pilots --> Customers[生产客户]
      Customers --> Revenue[订阅加 usage 收入]
      Customers --> Expansion[更多院点与模块]
      Expansion --> Revenue
      Revenue --> GrossProfit[70 percent 毛利润]
      GrossProfit --> Cash[现金跑道与下一轮证明]
modelSanity:
- checkName: 收入引擎
  finding: 基础情景的收入引擎，是付费集团从第 1 年的 3 个增长到 Q4Y3 的 30 个，同时每集团混合实现收入通过扩张和 usage 费，从 $72K 小幅升到 $81K。
- checkName: 必须做对的事
  finding: 模型要求付费 pilot 转生产始终接近计划中的 60%+，并且在扩销售前，就把 Open Dental 和 Dentrix 的 onboarding 标准化。
- checkName: 模型会在何处失效
  finding: 如果实施持续高度定制、扩张挂载延后，下行情景会把第 3 年收入压到约 $1.24M，并把现金低点推向约 $0.38M。
- checkName: 下一轮证明点
  finding: seed 故事要讲清：第 2 年末做到 10-12 个生产集团，onboarding economics 已可重复，并且可信地指向研究中的 30 个集团 SOM 路径。
sanityChecks:
  ruleOf40: Y3 growth 198.8% + EBITDA margin -23.4% = 175.4%
  burnMultiple: 第 2 年 burn multiple 约为 1.3x：以约 $0.86M EBITDA burn 对应约 $0.65M 净新增 ARR 计算；进入第 3 年后，随着毛利覆盖更多固定团队成本，效率会明显改善。
  revenuePerFte: $184.5K 的第 3 年 revenue per FTE，对应 Q4Y3 的 9 FTE（对比 SaaS 常见 benchmark $200-400K）
  flags:
  - 因为第 3 年公司仍承担不小的实施和领域运营负担，Revenue per FTE 仍略低于经典 SaaS benchmark。
  - 基础情景假设：1 位实施负责人和 1 位收入周期专家，配合标准化 playbook 与服务伙伴兜底，就能支撑 30 个 live group；如果部署继续高度定制，就必须更快加人，否则增长会滑。
  - 市场规模和 ACV 仍取决于是否真有足够多 5–25 个院点的集团，既集中掌握 billing 权限，也愿意为此单独立预算；而 business plan 本身也把这点列为关键验证风险。
  - 现金是按 EBITDA 近似推算的，默认营运资本扰动很小，因此真实回款可能会受到 pilot 预付款、年付和实施开票节奏影响而上下波动。
