market:
  tam:
    value: $86.4M
    rationale: 'Estimate: about 1,200 U.S. dental groups of 5-25 locations could buy a dedicated ledger-close agent. Unit model uses 160,000 U.S. dental practices as the broad starting pool, assumes roughly 7.5% of locations sit inside the target 5-25 location independent / PE-backed group segment, and divides by 10 average locations per target group. Annual spend is modeled at $72,000 per group ($600 per location per month × 10 locations), which is materially below the labor burden described by Lassie and in line with adjacent dental software budget anchors. Calc: 1,200 × $72,000 = $86,400,000.'
    isEstimate: true
    sourceRefs:
    - 1
    - 11
    - 37
    - 43
  sam:
    value: $28.8M
    rationale: 'Beachhead constraint: approximately 400 U.S. dental groups that both fit the 5-25 location profile and have centralized insurance billing plus a PMS / clearinghouse stack where overlay automation is realistic in the near term. Using the same $72,000 modeled ACV gives a focused serviceable market. Calc: 400 × $72,000 = $28,800,000.'
    isEstimate: true
    sourceRefs:
    - 11
    - 21
    - 24
    - 26
    - 40
  som:
    value: $2.2M
    rationale: 'Reachable Year-3 share assumes 30 paying groups at roughly $72,000 annual recurring revenue each after onboarding and expansion across locations. Calc: 30 × $72,000 = $2,160,000, rounded to $2.2M.'
    isEstimate: true
    sourceRefs:
    - 2
    - 25
    - 27
