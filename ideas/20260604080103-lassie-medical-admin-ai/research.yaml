openQuestions:
- How many 5-25 location dental groups currently centralize billing enough to buy one close workflow rather than multiple office-level solutions?
- Which payer families create the most underpayment, duplicate-payment, or delayed-ERA exceptions in the target segment?
- Will CFOs accept silent auto-posting for most payments, or require human approval above certain dollar or discrepancy thresholds?
- How much does the SAM shrink if the first version supports only Open Dental and Dentrix-heavy groups before broader PMS coverage is added?
