jobsToBeDone:
- job: 当我的 billing 团队被未核销现金和门户核对压得喘不过气时，帮我们把保险回款自动结掉，这样不用再招更多过账人员，也能看清真实回款。
  currentAlternative: 手工过账和基于表格的对账
  successMetric: 从 payer 付款到总账过账结清的天数
