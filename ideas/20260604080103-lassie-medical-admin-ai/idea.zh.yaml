problem: 多院点牙科集团每天都在漏钱。保险回款、银行入账和 practice-management 记录，通常不靠人手跟进就对不齐。billing 团队要花大量时间登录 payer 门户、拉 remittance 明细、过账、处理异常，再核对钱到底有没有进银行。人手一紧，少付、未核销现金就会长期挂着，老板看不清每天实际回款，新收一个院点带来的后台负担也会比收入负责人预期更重。
targetUser:
  primary: 美国 5–25 个院点、设有集中式保险 billing 团队的牙科集团 COO 或 revenue-cycle 负责人
  secondary: 仍靠门户查询和手工过账来完成报销结账的小型专科医疗集团 controller
  buyer: 独立或 PE 支持的牙科集团 COO 或 CFO
startupThesis:
  nonObviousInsight: 代理式诊所运营的第一刀，不会是一个通用 AI 办公室经理，而是每天都要把 payer 数据、system-of-record 更新和银行核验严丝合缝对上的总账结账闭环。只要代理能把这条闭环工作流自主跑通，小诊所就会先把“钱”交给它，再一步步把更多行政环节交出去。
  beachhead: 美国独立牙科集团，5–25 个院点，集中式 billing 团队，在多个 payer 门户里长期积压未核销保险现金
  wedge: 自主总账结账软件：从 payer 门户拉取报销明细、匹配入账、写回 practice-management system，只把真正的异常交给人工
  whyNowCatalyst: Lassie 的增长和源头级流程细节已经说明：自主报销对账在真实诊所里能跑通；同时行政人力成本持续上升，让 ROI 现在就变得紧迫。
  ventureScalePath: 先拿下牙科报销结账，再扩到 eligibility、拒付、患者余额、排班，最终变成小型门诊集团的完整运营层——这些客户请不起大型后台团队。
solution: 产品是给牙科集团用的总账结账代理。它登录 payer 门户，拉 remittance 和 claim 状态明细，把应收款和实际银行入账匹配起来，把正确分录写进 practice-management system，只有金额、日期或患者记录对不上时，才打开结构化异常队列。运营团队每天会看到一张回款仪表盘：今天结掉了多少钱，还有哪些异常没解、各个 payer 的少付模式是什么，不用再手工拼报表。第一阶段只盯最高频的报销工作流，让客户先把重复性过账工作拿掉，再去碰拒付或患者自付催收等相邻环节。时间拉长后，公司还能积累 payer 行为和异常处置数据集，继续抬高自动化率，也让集团能横向比较各院点到底漏了多少现金。
goToMarketSeed:
  firstCustomer: 一家美国牙科集团，10–20 个院点、20–60 名 provider、5–12 人集中式 billing 团队，每天都有未核销现金或少付积压
  buyingTrigger: 人手短缺、并购新院点，或月末结账痛感突然爆发，让团队看清还有多少报销任务仍靠一个个门户手工过账
  currentAlternative: 手工保险过账团队、外包 RCM 人员、靠表格做银行对账，或通用型 RPA 脚本
  switchingReason: 这个切口把“钱的闭环”从头到尾接住，只把真正异常交给人工，所以第一批客户不用自己拼一套脆弱自动化栈，就能更快看清回款、也缓解 billing 团队编制压力。
  pricingHypothesis: 按院点收月平台费，再叠加与已过账 claim 金额或成功对齐的回款事件挂钩的 usage 定价
