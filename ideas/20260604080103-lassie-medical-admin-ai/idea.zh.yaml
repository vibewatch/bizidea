topRisks:
- name: 集成脆弱性
  description: practice-management system 的各种怪异行为，以及 payer 门户改版，都可能拉低自动化准确率并拖慢部署。
  mitigation: 先盯一小组高频工作流，保持快速异常处理，先用 overlay 式集成上线，再逐步加深系统写入。
- name: 对自主处理资金流的不信任
  description: 老板可能不愿意在没人审核的情况下，让软件直接过财务记录或把回款标记为已对齐。
  mitigation: 先设审批阈值、完整审计日志和并行对账报表，先把准确率证明出来，再逐步放开自主权限。
- name: 被全栈现有厂商压缩品类空间
  description: 一旦 ROI 被市场看见，宽泛的诊所自动化厂商或推进很快的创业公司都可能切入 ledger close。
  mitigation: 靠更深的窄工作流深度、payer 级异常智能和院点级回款 benchmark 取胜——这些都不是通才团队能很快抄走的。
