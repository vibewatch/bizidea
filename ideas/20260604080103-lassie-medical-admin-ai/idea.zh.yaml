differentiator: 大多数 RCM 软件只做到“看见问题”，大多数自动化工具只做到“脚本代劳”。这家公司卡住的是诊所判断“钱到底收到了没有”的那一刻：门户抓取、回款匹配、系统过账、异常分流，一条闭环全包。它如果从独立牙科集团切入，而不是先卖给外包 RCM 服务商，就能沉淀出通用代理平台和宽泛诊所软件厂商天然看不到的院点级数据：payer 行为、过账边界场景、回款漏损。这个运营数据集，就是它往更多小型门诊工作流扩张时的护城河。
