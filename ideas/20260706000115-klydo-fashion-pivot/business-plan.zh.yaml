slug: fashion-stock-promise-engine
date: '2026-07-06'
executiveSummary: Fashion-stock-promise-engine 应该先做一层覆盖软件，卖给那些想用现有门店做 2 小时内送达、但又扛不起前置仓重复备货的印度服饰和鞋履连锁。核心客户，是一家在 Bengaluru 或 NCR 有直营网店和实时门店库存的 30-60 店连锁，正准备上线或补救快速配送。研究证据支持这个痛点：Klydo 和 Blip 都不是因为用户没需求而倒下，而是库存周转和营运资金纪律先崩了；与此同时，Myntra M-Now 和 Nykaa Now 又说明，只要供给在，消费者确实会用更快的时尚配送。公司因此该卖的是“承诺 + 预留”的控制层，不是消费 App、泛化 OMS 替代品，也不是骑手网络。第一个 验证点 应该是一笔付费城市试点：在 8-10 家完成核验的门店里，提高承诺准确率和快速配送转化，同时不把折价风险推高。眼下输入里最缺的事实，是 20-80 店连锁真实的 SKU × 尺码库存准确率基线，所以前 90 天必须先做盲盘，再谈大规模自动化。滩头市场在战略上有价值，但体量不大：研究测到的 TAM 约 $31.5M ARR，第 3 年滩头 SOM 约 $1.8M，且还没算用量费，所以投资故事最后能不能成立，要看公司后续能否切进更大连锁、相邻类目，或更上层的路由与规划。现阶段更像一笔纪律严明的 pre-seed，而不是可以直接放大预期的项目；在团队证明付费试点、目标定价和可复制的覆盖式部署动作之前，投资判断应维持 观察。
problem:
- 印度时尚连锁被推着去做快速配送，但长尾尺码和款式库存让前置仓重复备货既吃资金，又很容易碰上低动销。
- 手工 OMS 规则、POS 导表和门店 WhatsApp 协同，根本来不及决定 SKU × 尺码 × 门店是否适合承诺快速配送；于是零售商不是过度承诺、把用户体验砸穿，就是把库存藏起来，白白损失需求，还把折价风险扛在自己身上。
solution:
- 接入 POS、ERP、电商目录和骑手 SLA 数据，为每个 SKU × 尺码 × 门店 × 社区组合打分，判断它到底适不适合给出 30 分钟、2 小时、当日达，还是干脆不做快速配送承诺。
- 给运营团队一整套预留、拣货打包、兜底替代和目录抑制流程，在缺货和折价风险开始复利之前，先把脆弱库存撤出快渠道。
whyWeWin:
- 这个切口比整套 OMS 窄，却比骑手工具更贴近经济账，因为它把承诺逻辑直接绑到动销、库存可信度和毛利上。
- 首个客户在单一城市、单一商品切片里就能看到结果，因此证明速度会比“卖一整套全链路零售转型”快得多。
- 护城河会从 SKU × 尺码 × 门店 × 社区的结果数据，以及门店异常数据里不断复利；这些细节，既有厂商通常不会专门为印度时尚快送去调。
strategicChoices:
  beachhead: 先打印度服饰和鞋履连锁：20-80 家门店、8,000-40,000 个在线 SKU、直营网店在线、在 Bengaluru 或 NCR 有足够门店密度，而且正准备在不新开前置仓的前提下，于单一城市上线 2 小时内送达。
  wedgeRationale: 先在单一城市、围绕一小块可承诺商品池卖一层快速承诺覆盖软件，证明会比从头卖一整套全渠道系统更快，因为买家原本就有系统底座、触发点也足够急，且一个季度内就能用承诺准确率、转化和折价保护来验收结果。
  sequencingRationale: 先从完成核验的门店、事件驱动和基础款品类，以及创始人主导销售起步；先学清楚库存准确率和需求紧迫度到底够不够，再决定要不要扩更大的地推团队或相邻工作流。只有首批试点证明“覆盖层”能转成年付软件，而不是一堆定制服务之后，才继续加深 POS / OMS 集成和伙伴引流。
  notYet:
  - 面向消费者的快时尚 App 或自持库存模式。
  - 整套 OMS 或 ERP 替换。
  - 在时尚切口还没跑顺之前，先做美妆、家居或平台路由模块。
  - 在 Bengaluru 或 NCR 试点还没跑出利润前，就急着扩到二三线城市。
market:
  tam: 估算 TAM 为 $31.5M ARR：大约 150 家可触达的印度全渠道时尚 / 鞋履连锁，每家约 35 个活跃门店，每店每年约 $6,000 基础费。
  sam: 估算 SAM 为 $8.6M ARR：约 40 家符合滩头画像的连锁——20-80 家门店、在 Bengaluru 或 NCR 有布局、直营网店在线、全渠道运营活跃。
  som: 估算第 3 年 SOM 为 $1.8M ARR：约 10 家连锁，平均每家 30 个付费门店，尚未计入用量费。
  segments:
  - 从现有门店上线城市级快速配送的 20-80 店印度服饰和鞋履连锁。
  - 在全链路 铺开 前，先需要一层时尚专用承诺控制的更大型全渠道时尚集团。
  buyingProcess: 业务 牵头人 通常会是 COO、全渠道负责人或首席商品官，但 commerce IT 也必须放行 POS、ERP 和 OMS 的数据访问。最快的采购路径，是围绕一次计划中的上线或一次失败的快速配送试点，先成交一笔付费 试点；等承诺准确率和毛利结果过线，再转成年付 铺开。
product:
  mvp: MVP 应覆盖单一城市、8-10 家完成核验的门店，以及以基础款和事件驱动品类为主的一小块商品池。它要做的是：给快速配送资格打分、预留门店库存、处理拣货打包异常，并把高风险 SKU 从目录里先撤掉；补货、需求计划和全自动调拨，暂时都不在范围内。
  sixMonth: 在 6 个月内，先跑通 1 个付费试点：上线实时承诺打分、预留流程、按容量分配门店，以及每周追踪承诺准确率、缺货和折价暴露的看板。
  twelveMonth: 到 12 个月时，为首批 POS / OMS 组合做出可复用连接器、自动目录抑制规则、基于对照组的 ROI 报告，并在 Bengaluru 和 NCR 支持 3-5 个正式生产客户。
  twentyFourMonth: 到 24 个月时，先在现有时尚客户里从“快速配送承诺控制”扩到当日达、BOPIS 和跨店调拨决策；只有在时尚单位经济跑通后，才测试 1 个相邻类目或更大连锁段。
  keyBets:
  - 完成核验的门店库存，能在不经历数月整顿的前提下，先达到足够支持自动承诺闸门的准确率基线。
  - 在选定品类和 pin code 里，2 小时内需求确实足够集中，值得为它配一层高溢价流程，而不是退回当日达或自提。
  - 买家愿意为折价保护和承诺准确率付费，而不是只想再买一个库存可视化看板。
  - 轻量级覆盖部署，在见效速度上能跑赢套件打包。
gtm:
  wedge: 先向一家具备 30-60 家门店、位于 Bengaluru 或 NCR、正准备上线或修复 2 小时内送达的连锁，卖一笔付费城市 试点：从 8-10 家完成核验的门店和一小块受控商品池起步；等连锁看到了更准的承诺和更干净的库存周转，再转成按门店计费的年付软件。
  channels:
  - 创始人主导直销，直接打 COO、全渠道负责人和首席商品官。
  - POS、ERP、OMS 与零售系统集成商的转介绍——它们自己并不想吃下时尚专用承诺逻辑。
  - 首个 验证点 跑通后，再借助骑手和 同城即时配送 上线伙伴去扩同城已上线网络。
  funnelTargets: 每季度触达 12-15 个目标账户 → 30-40% 完成技术与业务资格审查 → 20-25% 愿意付费做 试点 → 50%+ 的 试点 转正式生产 → 60%+ 的生产客户在 12 个月内扩到更多门店或第 2 个工作流。
  pricing: 单一城市、8-10 家完成核验门店的付费 试点 收 $25k-$50k；转正式生产后，按每个活跃门店约 $6,000 的年基础费收费，再叠加按快速配送订单或预留 SKU 计费。这样既贴着研究里的预算锚点，又把支出和买家的真实运营单位——活跃门店——绑在一起，还能让转正建立在已验证 ROI 上，而不是让软件闲置吃灰。
businessModel:
  revenueStreams:
  - 按活跃门店和城市收取年度订阅费。
  - 按快速配送订单或预留 SKU 量收用量费。
  - 为新连锁和新技术栈上线收实施与集成费。
  unitOfValue: 由引擎管理了快速配送承诺覆盖的“活跃门店-月份”。
  targetGrossMarginPct: 70
  expansionLevers:
  - 从一座城市试点，扩到同一连锁里的更多门店和更多城市。
  - 在客户信任快速配送承诺控制后，再接入当日达、BOPIS 和跨店调拨流程。
  - 往上切更大的时尚集团——它们已经跑着更宽的 OMS，但仍缺时尚专用承诺逻辑。
  - 只有核心覆盖层被证明跑得通后，才把数据层延伸到相邻类目，或库存融资 / 路由产品。
strategyMap:
  northStarMetric: 在目标毛利下，由现有门店履约的快速配送 GMV。
  inputMetrics:
  - 适用快速配送 SKU 的承诺准确率。
  - 无需人工改写、直接由现有门店库存履约的快速配送订单占比。
  - 适用商品池相对对照组带来的增量转化，以及折价率差异。
  - Pilot 转正式生产的转换率。
  - 从首个城市扩到更多门店或更多工作流的扩张率。
  moatsToBuild:
  - 把承诺决策与真实动销、折价结果绑在一起的 SKU × 尺码 × 门店 × 社区历史。
  - 覆盖找不到货、晚拣、改路由和容量失守的门店异常数据集。
  - 专为印度时尚 POS、ERP、OMS 和骑手技术栈打磨的集成与 铺开 操作手册。
  killCriteria:
  - 如果前 3 个付费试点都做不到 95% 承诺准确率，而且一个正式生产 铺开 都转不出来，说明这个切口在运营上太脆。
  - 如果前 10 家合格连锁里，愿意按目标价格付费做 试点 的不到 2 家，说明付费意愿假设错了。
  - 如果完成 30 天整改后，大多数试点门店的库存准确率仍低于 92%，那 ICP 就得上移，或者干脆放弃“门店现货优先”的动作。
  mermaid: "flowchart LR\n  Wedge[Metro launch pilot] --> MVP[Promise and reservation engine]\n  MVP --> Proof[Higher conversion and lower markdown risk]\n  Proof --> Expansion[Chain rollout and adjacent workflows]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 对客户痛点和时间窗口有中等把握；但在付费试点证明存在独立预算、库存数据也足够干净之前，对风险投资级 经济账 的把握偏低。
    whyBelieve: 快速配送需求是真的，而 Klydo 的失败把问题重新指向一层轻资产控制系统，而不是再做一个重库存 App。
    whyDoubt: 滩头市场本身偏窄，而且既有厂商已经占住了大量 OMS 和承诺栈；公司未必能长期守住独立定价权。
    nextDiligence: 先确认来自目标连锁的 2 份付费 试点 LOI，再做完一轮 30 天盲盘审计，证明 8-10 家门店的 SKU × 尺码库存准确率真的能用。
  firstCustomer:
    title: 一家 30-60 店印度服饰连锁的全渠道负责人
    profile: 位于 Bengaluru 或 NCR 的零售商，直营网店在线、在线 SKU 为 8,000-40,000，而且正承受“要从自营门店上线 2 小时内送达”的压力。
    trigger: 一次计划中的快速配送上线，或一次失败的试点，在全城 铺开 前先把重复备货、库存不准或折价风险暴露了出来。
    buyer: COO 或全渠道负责人
    initialContract: 先签一笔 8-12 周、覆盖 8-10 家完成核验门店的 $25k-$50k 城市 试点；随后抵扣进首年约 $75k-$150k 的生产合同——覆盖单一城市 12-20 家活跃门店，并叠加按订单计费的超额收入。
  mustBeTrue:
  - 前 10 家完成资格审查的连锁里，至少有 2 家会在等 OMS 厂商路线图之前，先为付费 试点 掏钱。
  - 完成核验的试点门店，只靠轻量流程改动，就能把 SKU × 尺码库存准确率稳定在 92% 以上。
  - 一小块快速配送商品池，能在不推高折价暴露的前提下，把转化或服务水平拉高到明显优于对照组。
  - 正式生产定价能够守在研究测得的每个活跃门店每年约 $6,000 基础费，再加用量费附近。
  - 首个正式生产客户会在 12 个月内扩到更多门店或第 2 个工作流，证明这不只是咨询收入。
  diligenceQuestions:
  - 20-80 店时尚连锁在真实大都市里，SKU × 尺码层级的库存准确率和拣货纪律到底是什么水平？
  - 哪些品类和消费场景真的需要 2 小时内承诺，而不是当日达或自提？
  - 为什么 Unicommerce、Fluent、Manhattan、Shopify 或内部团队，不能足够快地满足首批买家？
  - 现实里，到底是哪项 KPI 最能最快释放预算：更高转化、更少缺货，还是更低折价？
  - 在客户真正感受到它是一层覆盖软件之前，到底要做多少集成工作？
operatingAssumptions:
- assumption: 至少有一家目标连锁，能在 30 天内把完成核验的试点门店库存准确率拉到 92% 以上。
  basis: research.yaml
  validationTest: 在 8-10 家门店里连续 30 天做盲盘，把实物库存和 POS / ERP 记录逐个对比到 SKU × 尺码层级。
  decisionImpact: 如果做不到，ICP 就得上移到库存控制更强的连锁，或者产品会退化成一门数据整改服务。
- assumption: 买家愿意为一层独立承诺软件付费，而不是继续等套件厂商打包这个功能。
  basis: research.yaml
  validationTest: 从那些已经在用既有 OMS 或 POS 软件的连锁里，按目标价格拿下 2 份付费 试点 LOI。
  decisionImpact: 如果做不到，公司就该改成嵌在平台伙伴里卖的模块，而不是独立软件。
- assumption: 最急迫的使用场景足够窄，因此可以先从基础款和场景驱动品类切入，而不是一上来就覆盖全目录。
  basis: operator judgment
  validationTest: 在首个 试点 里，按品类和 pin code 对比 30 分钟、2 小时和当日达承诺曝光的 A/B 结果。
  decisionImpact: 如果做不到，切口就该从快速配送转向更宽的当日达与可得性编排。
- assumption: 每个活跃门店每年约 $6,000 再加用量费的定价，能挺过采购。
  basis: idea.yaml
  validationTest: 在 试点 合同里写明正式生产价格，并确认至少 1 个客户按不低于目标基础费的价格转正。
  decisionImpact: 如果做不到，公司就必须往更大客户上移、拓宽产品范围，或者放弃独立风险投资级 经济账。
- assumption: 少量 POS、OMS 和骑手连接器，就足够覆盖早期收入，而不会逼出一支重实施团队。
  basis: research.yaml
  validationTest: 前 2 个 试点 都在不超过 2 个定制点对点连接器、且单次实施少于 4 周的条件下交付。
  decisionImpact: 如果做不到，招聘和融资重心就得更早转向实施和伙伴分发。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 12 位目标 COO 和全渠道负责人，围绕真实上线或失败试点触发点，测试付费 试点 意愿。
  hypothesis: 只要眼前有城市级上线决策，连锁会更快买一层窄覆盖软件，而不是去做大而全套件项目。
  successMetric: 12 次访谈里，至少 6 家确认存在真实触发点，且有 2 家同意进入 试点 设计会。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 在 1 家共创客户的 8-10 家门店里，先跑 30 天盲盘审计，再放开快速配送承诺。
  hypothesis: 一部分目标连锁只靠轻量流程纪律，就能把库存准确率拉到足以支撑自动承诺闸门。
  successMetric: 1 家共创客户在整改后，能把 SKU × 尺码库存准确率稳定在 92% 以上。
  owner: 联合创始产品/运营
- horizon: 3–6 个月
  experiment: 回测品类、消费场景和 pin code 需求，定义首批可承诺商品池和速度阈值。
  hypothesis: 基础款和事件驱动品类，对 2 小时内送达的紧迫度会比全目录更清晰。
  successMetric: 至少有 1 个商品切片在 2 小时内曝光下，相比当日达对照组拿到明显更好的转化或服务水平。
  owner: 商品/数据科学家
- horizon: 3–6 个月
  experiment: 上线 1 个付费城市 试点，带实时承诺打分、预留和每周业务复盘。
  hypothesis: 这层覆盖软件可以在不推高折价暴露的前提下，同时提高承诺准确率和快速配送转化。
  successMetric: Pilot 在 12 周内做到 95% 承诺准确率，并让买家签下正式生产成功计划。
  owner: 创始工程师
- horizon: 6–12 个月
  experiment: 交付首个可复用 POS 或 OMS 连接器，并在受支持技术栈上测试 试点 转正式生产。
  hypothesis: 可复用集成会把上线时间压到足够低，让公司看起来像软件，而不是实施服务。
  successMetric: 首个正式生产 铺开 在受支持技术栈上能于 4 周内完成。
  owner: 集成工程师
- horizon: 9–15 个月
  experiment: 签下 1 家系统集成商或骑手转介绍伙伴，跟踪伙伴带来的 pipeline 质量。
  hypothesis: 只要首个城市 ROI 案例跑通，伙伴就愿意带来合格机会。
  successMetric: 签下 1 份转介绍协议，并带来至少 1 个由伙伴引入的付费 试点 机会。
  owner: 创始人/CEO
- horizon: 12–18 个月
  experiment: 让首个正式生产客户扩到更多门店，或增加一个工作流，比如 same-day 或 BOPIS 编排。
  hypothesis: 在现有连锁里做扩张，比单靠新 logo 销售更便宜，也更耐久。
  successMetric: 首个正式生产账户在上线 6 个月内，新增更多门店或第 2 个工作流。
  owner: 实施负责人
operations:
- 把 POS、ERP、尺码主数据和门店人效准备度，固化成一套试点前的数据就绪与库存审计清单。
- 每周业务复盘时，都要对比可承诺商品池和对照组在承诺准确率、缺货、转化和折价率上的差异。
- 把骑手 SLA 和门店容量反馈做成日更闭环，让承诺阈值能每天收紧或放松。
- 把 DPDP、GST 和跨店调拨合规要求直接嵌进 上线支持 模板，而不是每个客户都重做一遍法律工作。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 尽快把可承诺图谱、预留逻辑和首批集成做出来，支撑第 1 个 正式上线 试点。
- role: 联合创始产品/运营
  startTiming: 第 0 个月
  rationale: 负责 试点 设计、零售流程贴合度和每周经营复盘，确保产品始终盯着可衡量的毛利结果。
- role: 集成工程师
  startTiming: 第 3 个月
  rationale: 在定制工作吞掉路线图之前，把首个客户学到的东西沉淀成可复用的 POS、ERP 和 OMS 连接器。
- role: 商品/数据科学家
  startTiming: 第 6 个月
  rationale: 把 试点 数据沉淀成品类级承诺阈值、对照分析和感知折价的下架规则。
- role: 实施负责人
  startTiming: 第 9 个月
  rationale: 缩短上线周期，别让正式生产 铺开 永远只能靠创始人亲自盯。
- role: 企业销售
  startTiming: 第 12 个月
  rationale: 只有当首个 试点 转正式生产，证明销售动作和价格带成立后，才补 outbound 能力。
milestones:
- horizon: 0–12 个月
  items:
  - 在 Bengaluru 或 NCR 拿下 1-2 个付费共创客户 试点。
  - 确认完成核验的试点门店库存准确率高于 92%，否则重定义 ICP。
  - 把首个付费 试点 转成带可复用价格和成功指标的正式生产合同。
  - 交付首个可复用 POS 或 OMS 连接器，以及 ROI 看板。
- horizon: 12–24 个月
  items:
  - 做到 3-5 个正式生产客户，并证明至少 1 个账户会扩到更多门店或第 2 个工作流。
  - 把受支持技术栈的实施时间压到 4 周以内。
  - 为现有客户补上 same-day、BOPIS 或调拨工作流支持。
  - 拿下 1-2 个能带来合格 试点 的渠道伙伴。
- horizon: 24–36 个月
  items:
  - 做到约 10 家连锁、平均每家约 30 个付费门店，与研究测得的滩头 SOM 对齐。
  - 基于定价和扩张数据，决定下一步是上移市场、切相邻类目，还是嵌进平台分发。
  - 只有在核心承诺引擎仍保持差异化的前提下，才上线 1 层相邻收入，比如选品规划或路由优化。
risks:
- risk: 目标连锁的门店库存准确率和拣货纪律太不稳定。
  likelihood: High
  impact: High
  mitigation: 只从完成核验的门店起步，强制日度循环盘点，并在找不到货和晚拣率稳定前，把承诺阈值收得很保守。
- risk: 大多数需求最终会被当日达和自提满足，削弱对 2 小时内承诺软件的紧迫感。
  likelihood: Medium
  impact: High
  mitigation: 尽早证明不同品类之间的需求差异，并把 same-day、BOPIS 和调拨编排作为可回退的扩张路径。
- risk: 既有 OMS 厂商或印度本土使能栈，会打包进足够相似的逻辑，卡住独立预算。
  likelihood: High
  impact: Medium
  mitigation: 把重点放在部署速度、时尚专用折价结果和跨技术栈覆盖层定位，而不是泛化路由功能。
- risk: 早期部署会逐渐变成定制集成项目。
  likelihood: Medium
  impact: High
  mitigation: 收窄支持的技术栈、把连接器模板化，并拒绝超出首版集成 操作手册 的客户。
- risk: 如果没有可信扩张路径，滩头市场本身可能太小，撑不起风险投资回报。
  likelihood: Medium
  impact: High
  mitigation: 利用首个客户数据，在 18 个月内就决定是上移市场、切相邻类目，还是做路由与规划延展。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2.5–3.5M
  runwayMonths: 18
  useOfFundsSummary: 先养起一支 6 人的产品与实施小队，完成 2-3 个付费城市 试点，交付首批受支持商业技术栈的可复用连接器，并在扩销售前，把首批连锁级 铺开 转正。
