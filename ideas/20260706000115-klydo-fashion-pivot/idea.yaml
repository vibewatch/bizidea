differentiator: >-
  This is not a generic OMS, courier aggregator, or forecasting dashboard. The
  wedge is the eligibility graph that ties live store stock, size-curve demand,
  pick-pack reliability, and sell-through risk to the delivery promise shown to
  the customer. That graph compounds into a proprietary dataset on which fashion
  SKUs can be sold fast from which neighborhoods without creating dead
  inventory, giving the company a moat that pure ecommerce or last-mile tools
  do not have.
