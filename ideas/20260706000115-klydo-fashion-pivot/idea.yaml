topRisks:
  - name: Stock accuracy is too noisy
    description: >-
      Many chains have unreliable store-level inventory and picking discipline,
      which can make fast promises fail in the first pilots.
    mitigation: >-
      Start with audited stores, confidence scores, and conservative promise
      thresholds until the system proves accuracy and store compliance.
  - name: Buyers may settle for slower convenience
    description: >-
      Some retailers may decide same-day delivery and pickup are good enough,
      reducing urgency for a rapid-delivery-specific product.
    mitigation: >-
      Position the platform as a margin-protecting promise and inventory
      allocation layer that also improves same-day, BOPIS, and transfer
      decisions.
  - name: Incumbent OMS bundling
    description: >-
      Order-management and ecommerce vendors may add basic ship-from-store rules
      and claim the problem is already solved.
    mitigation: >-
      Own the harder layer of SKU-level sell-through risk, size-curve
      eligibility, and markdown-aware catalog suppression that generic routing
      rules do not model.
