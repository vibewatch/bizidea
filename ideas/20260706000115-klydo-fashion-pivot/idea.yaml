problem: >-
  Indian fashion retailers are being pushed to match fast-delivery expectations,
  but copying a 15-minute grocery playbook forces them to duplicate thousands of
  size- and style-sensitive SKUs into new fulfillment nodes with no confidence
  they will turn quickly enough. Low sell-through then creates a double
  penalty: working capital gets trapped in the wrong micro-market while delivery
  costs and markdown risk keep rising. Klydo's shutdown shows the real problem
  is not consumer interest in faster fashion access; it is that inventory
  confidence and delivery promises are disconnected.
targetUser:
  primary: >-
    Heads of omnichannel operations and inventory planning at Indian apparel and
    footwear chains running 20-80 company-owned stores in top metros
  secondary: >-
    Merchandising and store-operations leaders responsible for sell-through,
    stock transfers, and rapid-delivery SLAs
  buyer: >-
    COO, head of omnichannel, or chief merchandising officer at an Indian
    fashion retail chain
startupThesis:
  nonObviousInsight: >-
    The next winner in fast fashion convenience will not be a new consumer app
    that owns more inventory; it will be the software layer that makes existing
    store stock trustworthy enough to sell quickly. Klydo's failure suggests
    the balance-sheet problem is duplicating long-tail fashion inventory into
    new fulfillment nodes before proving local sell-through.
  beachhead: >-
    Indian omnichannel fashion and footwear chains with 20-80 stores in
    Bengaluru and NCR, 8,000-40,000 live SKUs, and a mandate to launch
    sub-2-hour delivery without opening dedicated dark stores
  wedge: >-
    A store-stock promise engine that scores which SKUs can be offered for
    rapid delivery by neighborhood, reserves inventory at the right store, and
    pulls slow-moving items out of the fast-delivery catalog before markdown
    risk spikes
  whyNowCatalyst: >-
    Klydo's shutdown, the explicit diagnosis of low sell-through and high
    inventory requirements, and the failed follow-on fundraising attempt make
    dedicated rapid-fashion inventory newly suspect and push retailers toward
    asset-light fast-delivery software instead.
  ventureScalePath: >-
    Start as the operating system for rapid delivery from store stock in
    fashion, then expand into assortment planning, marketplace supply routing,
    consignment terms, inventory financing, and adjacent beauty and home
    categories where long-tail inventory also makes dedicated dark stores
    fragile.
solution: >-
  Build a software layer that connects store POS, ERP, ecommerce catalog,
  courier SLAs, and neighborhood demand history into one rapid-delivery
  eligibility graph. For every SKU, size, and store, the system estimates stock
  confidence, expected sell-through, pick-pack readiness, and margin after
  delivery, then decides whether to show a 30-minute, 2-hour, same-day, or
  unavailable promise. Operators get workflows for reservation, store picking,
  fallback substitution, inter-store transfers, and catalog suppression when a
  style is likely to strand inventory. Merchandising teams also receive alerts
  when rapid-delivery exposure is hurting turn, so they can pull items from the
  fast channel or rebalance them before markdowns accumulate. Over time the
  product becomes the control plane that lets fashion retailers sell speed
  without buying the same inventory twice.
goToMarketSeed:
  firstCustomer: >-
    The COO or head of omnichannel at a 30-60 store Indian fashion chain in
    Bengaluru or NCR with live store inventory, a direct ecommerce channel, and
    pressure to launch sub-2-hour delivery in one metro
  buyingTrigger: >-
    A planned fast-delivery launch or failed pilot that reveals inventory
    duplication, weak stock accuracy, or rising markdown risk before the company
    expands the service citywide
  currentAlternative: >-
    Manual workflow across ERP exports, POS data, store WhatsApp groups,
    generic order-management software, and dark-store or marketplace pilots
  switchingReason: >-
    The product lets the retailer offer fast delivery from stock it already
    owns while protecting sell-through and margin in a way generic OMS tools and
    dark-store experiments cannot.
  pricingHypothesis: >-
    Annual SaaS fee priced per active store and metro, plus usage-based pricing
    per rapid-delivery order or reserved SKU
