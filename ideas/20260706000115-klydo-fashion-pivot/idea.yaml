jobsToBeDone:
  - job: >-
      When a fashion chain wants to launch sub-2-hour delivery in one metro,
      help the omnichannel lead know which SKUs and stores can promise speed
      without duplicating inventory, so they can launch with margin discipline.
    currentAlternative: >-
      Manual stock checks, conservative catalog exclusions, and dark-store pilot
      inventory
    successMetric: >-
      Share of rapid-delivery orders fulfilled from existing store stock at
      target gross margin
  - job: >-
      When sell-through weakens on specific styles or sizes, help the
      merchandising team remove or rebalance them before the fast-delivery
      channel turns them into dead stock, so they can protect turns and markdown
      budgets.
    currentAlternative: >-
      Weekly merchandising meetings and manual inter-store transfer decisions
    successMetric: >-
      Reduction in aged inventory and markdown rate for rapid-delivery eligible
      SKUs
