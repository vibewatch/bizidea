assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: YYYY-MM
    source: '[BP date 2026-07-06]'
  - id: A2
    name: Opening cash at M1 after round close
    value: '2550'
    unit: USDK
    source: '[BP fundingAsk targetFundingRangeUsd $2.5-3.5M] uses a $2.5M pre-seed close plus a $50K founder cash bridge.'
  - id: A3
    name: customersEop definition
    value: Active paying chain logo in pilot or production
    unit: definition
    source: '[BP investorMemo.firstCustomer + BP gtm.wedge] the model counts paid pilots because they generate revenue before full rollout.'
  - id: A4
    name: Paid pilot start cadence
    value: 14 paid pilots over 36 months; 2 in Y1, 6 in Y2, 6 in Y3
    unit: paid pilots
    source: '[BP milestones + BP gtm.funnelTargets] roughly one funded pilot per quarter after the first design-partner period is needed to approach 10 chains by Y3.'
  - id: A5
    name: Completed pilot conversion rate
    value: 9 of 13 completed pilots convert by Q4Y3 (69%) with 1 live pilot still in flight
    unit: percent of completed pilots
    source: '[BP gtm.funnelTargets 50%+ pilot-to-production conversion] base case assumes performance above the floor once chains clear the audited-store readiness gate.'
  - id: A6
    name: Paid pilot fee
    value: '36'
    unit: USDK per pilot
    source: '[BP gtm.pricing $25K-$50K] uses a believable mid-range pilot price for one metro and 8-10 audited stores.'
  - id: A7
    name: First production year revenue per converted chain
    value: '108'
    unit: USDK annual
    source: '[BP investorMemo.firstCustomer.initialContract $75K-$150K for 12-20 stores] modeled as an initial 15-store rollout plus modest usage fees.'
  - id: A8
    name: Expansion-stage revenue per chain
    value: '168'
    unit: USDK annual
    source: '[BP businessModel.expansionLevers + BP milestones 12-24 months] assumes a chain expands toward ~24 active stores or a second workflow within 12 months.'
  - id: A9
    name: Mature production ARPU
    value: '216'
    unit: USDK annual per chain
    source: '[RE market.som $1.8M from 10 chains x 30 stores x $6K base fee + BP gtm.pricing plus usage heuristic] mature accounts reach roughly 30 active stores with about 20% usage uplift.'
  - id: A10
    name: Gross margin ramp
    value: 50% M1-M6; 56% M7-M12; 64% Y2; 68% Q1-Q2 Y3; 70% Q3-Q4 Y3
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 70 + BP product.sixMonth] pilots and connectors are onboarding-heavy at first and only reach the target after reusable deployments exist.'
  - id: A11
    name: Hiring timeline
    value: Founding eng and product/ops at M1; integration eng M4; data M7; implementation M10 and M16 and M28; sales M13 and M25; third engineer M19
    unit: timing
    source: '[BP team] maps BP Month 0/3/6/9/12 starts to M1/M4/M7/M10/M13, then adds only the minimum post-proof hires needed to support 10 chains.'
  - id: A12
    name: Engineering loaded compensation
    value: '130'
    unit: USDK annual per FTE
    source: '[startup-finance heuristic for senior India-based startup engineers with benefits and payroll load]'
  - id: A13
    name: Product/Ops loaded compensation
    value: '120'
    unit: USDK annual per FTE
    source: '[startup-finance heuristic for a founder-level product and pilot-operations operator with payroll load]'
  - id: A14
    name: Data/Analytics loaded compensation
    value: '115'
    unit: USDK annual per FTE
    source: '[startup-finance heuristic for applied merch/data talent in India with payroll load]'
  - id: A15
    name: Implementation/CS loaded compensation
    value: '85'
    unit: USDK annual per FTE
    source: '[startup-finance heuristic for implementation and customer-success hires needed to keep rollouts under four weeks]'
  - id: A16
    name: Sales/BD loaded compensation
    value: '140'
    unit: USDK annual per FTE
    source: '[startup-finance heuristic for enterprise SaaS seller OTE and partner-development carrying cost in India]'
  - id: A17
    name: Non-payroll sales and marketing spend
    value: 8 per month in Y1, 12 per month in Y2, 15 per month in Y3
    unit: USDK per month
    source: '[BP gtm.channels] covers founder travel, pilot design sessions, partner enablement, and focused field marketing rather than broad paid demand gen.'
  - id: A18
    name: Non-payroll R&D spend
    value: 10 per month in Y1, 12 per month in Y2, 14 per month in Y3
    unit: USDK per month
    source: '[BP product + BP operations] covers cloud, data normalization, monitoring, and connector tooling.'
  - id: A19
    name: Non-payroll G&A spend
    value: 6 per month in Y1, 8 per month in Y2, 9 per month in Y3
    unit: USDK per month
    source: '[BP operations + research regulatoryTechnicalConstraints] covers legal, audit, insurance, DPDP/GST templates, and back-office overhead.'
  - id: A20
    name: Payroll allocation to P&L lines
    value: Product/Ops 50% S&M / 30% R&D / 20% G&A; Implementation 55% S&M / 15% R&D / 30% G&A; Engineering and Data 100% R&D; Sales 100% S&M
    unit: allocation
    source: '[BP team rationales + BP operations] salaryK is shown separately, but the payroll is already embedded in the S&M, R&D, and G&A lines.'
  - id: A21
    name: Unit-economics churn assumption
    value: '2.0'
    unit: percent per month
    source: '[startup-finance heuristic + BP investorMemo.whyDoubt] used for LTV only; the three-year P&L is acquisition-dominated and does not model explicit logo losses before renewal cohorts mature.'
  - id: A22
    name: CAC calculation convention
    value: '153.4'
    unit: USDK per new production chain
    source: '[BP gtm.funnelTargets + model calculation] equals Y2-Y3 fully loaded S&M spend divided by 7 production conversions after the first two design-partner wins.'
  - id: A23
    name: Funding ask sizing
    value: '2500'
    unit: USDK
    source: '[BP fundingAsk pre-seed $2.5-$3.5M and 18-month runway] the model uses the low end because paid pilots partially offset burn and still leaves a 6-month buffer around the post-Y2 proof point.'
  - id: A24
    name: Runway target for the pre-seed round
    value: '24'
    unit: months
    source: '[BP fundingAsk.runwayMonths 18 + model buffer convention] funds the proof point and then carries roughly another six months of operating cushion.'
  - id: A25
    name: Cash flow convention
    value: Cash movement equals EBITDA after the opening round close
    unit: modeling convention
    source: '[startup-finance heuristic] no debt service, capex, taxes, or working-capital swings are modeled at this pre-seed stage.'
