scenarios:
  downside:
    description: Paid pilots still land, but conversion slips toward the BP floor and chain expansion stalls around 24 stores.
    y3RevenueK: 1120.0
    y3EbitdaK: -790.0
    cashLowPointK: -90.0
    keyAssumptionChanges:
      - Only 7 completed pilots convert by Q4Y3 instead of 9.
      - Mature production ARPU lands closer to $180K because usage attachment is lighter and most customers stop below 30 active stores.
      - Gross margin tops out near 66% because connectors and onboarding stay services-heavy.
  base:
    description: A lean team converts audited design partners into repeatable metro rollouts while a minority of pilots still fail.
    y3RevenueK: 1499.0
    y3EbitdaK: -558.6
    cashLowPointK: 567.7
    keyAssumptionChanges:
      - 14 paid pilots are sold over 36 months, with 9 converting, 4 failing, and 1 still live at Q4Y3.
      - Converted chains ramp from roughly $108K in first live-year revenue to about $216K at mature 30-store rollout.
      - Gross margin only reaches the 70% target after reusable connectors and audited-store playbooks are in place.
  upside:
    description: Channel referrals work earlier, failed pilots drop after the first proof point, and chain expansions happen faster.
    y3RevenueK: 1760.0
    y3EbitdaK: -330.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
      - One additional partner-sourced paid pilot lands each year after Y1 and most later pilots convert.
      - Mature production ARPU climbs toward $228K as second-workflow usage attaches to expanded chains.
      - Gross margin reaches about 72% once deployment time consistently stays below four weeks on supported stacks.
