    baseCase: 2.0% monthly logo churn
    upsideCase: 1.5% monthly logo churn
    y3RevenueImpactK: -80.0
    cashImpactK: -70.0
  - variable: sales cycle
    downsideCase: pilot launches and conversions each slip by roughly one quarter
    baseCase: one funded pilot about every quarter after Y1 with 3-month pilot windows
    upsideCase: partner referrals compress pilot starts by one to two months
    y3RevenueImpactK: -180.0
    cashImpactK: -150.0
  - variable: gross margin
    downsideCase: Y3 gross margin stalls at 66%
    baseCase: Y3 gross margin reaches 70%
    upsideCase: Y3 gross margin reaches 72%
    y3RevenueImpactK: 0.0
    cashImpactK: -60.0
  - variable: hiring pace
    downsideCase: second seller and third implementation hire are pulled forward before proof of repeatability
    baseCase: post-proof hires stay gated to live customers and partner traction
    upsideCase: later hires stay deferred because supported-stack deployments become more repeatable
    y3RevenueImpactK: 0.0
    cashImpactK: -130.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Outreach[Target-chain outreach] --> PaidPilots[Paid metro pilots]
      PaidPilots --> Production[Production chain rollouts]
      Production --> Stores[Active stores and workflows]
      Stores --> Revenue[Subscription and usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from 14 paid pilots feeding 9 converted chains and one live pilot, with mature accounts expanding toward roughly 30 active stores each.
  - checkName: Must go right
    finding: The company needs audited pilots to convert above the 50% floor and then expand inside the first chain, because the model stays EBITDA-negative until Q4Y3.
  - checkName: Model breaks if
    finding: If production ARPU settles closer to $180K or conversions slip toward the downside case, cash turns negative before the business earns a clean seed-ready proof point.
  - checkName: Next-round proof
    finding: The next round is justified once the team shows 5 production chains, one expansion inside an existing account, and sub-4-week deployments on supported stacks.
sanityChecks:
  ruleOf40: Y3 growth 111% + EBITDA margin -37% = 74%
  burnMultiple: Y3 burn multiple 0.7x ($559K burn / $788K net new revenue).
  revenuePerFte: $150K Y3 using 10 year-end FTE (below $200-400K pure-play SaaS, acceptable only if supported-stack deployments keep shrinking).
  flags:
    - The base case needs 69% of completed paid pilots to convert, which is above the BP floor and leaves limited room for weak audit outcomes.
    - Year-3 revenue per year-end FTE is only about $150K, so the model still looks implementation-heavy unless rollout time reliably stays under four weeks.
    - Q4Y3 exit run-rate is already close to the researched $1.8M beachhead SOM, so standalone upside eventually requires larger chains, adjacent workflows, or partner distribution.
