problem: 印度时尚零售商被逼着去匹配更快配送的用户预期，但如果照搬 15 分钟买菜那套打法，就得把成千上万对尺码和款式极度敏感的 SKU 复制到新履约节点里，却又没把握它们能足够快地卖掉。动销一旦偏慢，惩罚会叠加：营运资金被锁在错误的微市场里，配送成本和折价风险还在继续往上走。Klydo 的停摆说明，真正的问题不是用户不想更快拿到时尚商品，而是库存可信度和配送承诺根本没接上。
targetUser:
  primary: 印度服饰和鞋履连锁里负责全渠道运营与库存规划的人，典型画像是在一线都市经营 20-80 家自营门店。
  secondary: 负责动销、调拨和快速配送 SLA 的商品与门店运营负责人。
  buyer: 印度时尚零售连锁的 COO、全渠道负责人或首席商品官。
startupThesis:
  nonObviousInsight: 下一家赢下时尚快送便利性的，不会是又一个自己压更多库存的 C 端 App，而是那层能把现有门店库存变得足够可信、从而敢卖快送的软件。Klydo 的失败说明，资产负债表真正扛不住的，是在本地动销还没证实之前，就先把长尾时尚库存复制进新的履约节点。
  beachhead: 在 Bengaluru 和 NCR 经营 20-80 家门店、在线 SKU 为 8,000-40,000、又想上线 2 小时内送达但不准备另开前置仓的印度全渠道时尚和鞋履连锁。
  wedge: 一套门店库存承诺引擎：按社区给 SKU 打分，决定哪些货能进快速配送目录，把库存锁在正确门店，并在折价风险抬头前，把慢动销商品先撤出快送目录。
  whyNowCatalyst: Klydo 停摆、低动销和高库存需求被明确点名、后续融资又没谈成，让“为快速时尚单独压库存”这件事一下子更可疑，也把零售商往轻资产的快送软件上推。
  ventureScalePath: 先做时尚门店现货快送的操作系统，再往选品规划、平台供给路由、寄售条款、库存融资，以及同样被长尾库存拖累的美妆和家居类目扩。
solution: 做一层软件，把门店 POS、ERP、电商目录、骑手 SLA 和社区需求历史接到同一张快速配送可承诺图谱里。系统会针对每个 SKU、尺码和门店，估算库存可信度、预期动销、拣货打包就绪度，以及配送后的剩余毛利，再决定对用户展示 30 分钟、2 小时、当日达，还是不可售。运营侧拿到的是一整套预留、门店拣货、兜底替代、跨店调拨，以及目录下架流程——一旦某个款式大概率会把库存困死，就先从快送目录里拉掉。商品团队还会收到预警：如果快速配送曝光正在拖累周转，就赶在折价累积前，把货从快渠道撤掉或先做再平衡。时间一长，产品就会变成那块控制平面：让时尚零售商卖得起速度，却不用把同一批库存买两遍。
goToMarketSeed:
  firstCustomer: 首个客户应该是 Bengaluru 或 NCR 某家 30-60 店的印度时尚连锁，其门店库存已在线、直营网店在跑，而且正承受“要在单一城市上线 2 小时内送达”的压力。
  buyingTrigger: 公司准备上线快速配送，或一次失败的试点已经暴露出库存重复备货、库存准确率不足，或服务还没全城铺开就先把折价风险推高。
  currentAlternative: 大家现在通常靠 ERP 导表、POS 数据、门店 WhatsApp 群、泛化订单管理软件，以及前置仓或平台试点手工拼流程。
  switchingReason: 这套产品让零售商用自己已经持有的库存去做快送，同时还能守住动销和毛利；这一点，是泛化 OMS 工具和前置仓实验都做不到的。
  pricingHypothesis: 按活跃门店和城市收年费 SaaS，再叠加按快速配送订单或预留 SKU 计费的用量价格。
