differentiator: 这不是泛化 OMS、骑手聚合器，也不是预测看板。真正的切口，是那张把实时门店库存、尺码曲线需求、拣货可靠性和动销风险，直接绑到用户可见配送承诺上的可承诺图谱。随着数据积累，这张图谱会沉淀成一套专有数据集：哪些时尚 SKU 可以在哪些社区卖快、又不会制造死库存。纯电商工具和末端配送工具都拿不到这层护城河。
conceptDiagram:
  title: 不靠前置仓做时尚快速配送
  mermaid: "flowchart LR\n  Buyer[Head of omnichannel] --> Pain[Fast delivery demand collides with low sell-through and duplicated inventory]\n  Pain --> Product[Store-stock promise engine]\n  Product --> Outcome[Sub-2-hour delivery from existing stores with better margin and lower markdown risk]\n"
businessModelCanvas:
  customerSegments:
  - 一线都市里的印度全渠道服饰和鞋履连锁。
  - 尝试从现有门店做快速配送的时尚零售商。
  - 后续再切入那些想把 可选消费 类目加进来、又不愿在前置仓上过度压货的平台。
  valuePropositions:
  - 不必把时尚库存复制进新节点，也能上线快速配送。
  - 在提高配送速度的同时，守住动销和折价率。
  - 把门店库存准确率变成真正能对用户说出口的承诺引擎。
  channels:
  - 创始人主导销售，直接打零售 COO 和全渠道负责人。
  - 围绕单一城市或单一品类上线做付费试点。
  - 通过零售科技集成商和投资人网络引荐。
  customerRelationships:
  - 首个城市上线阶段采用高触达 上线支持。
  - 每周复盘库存和承诺准确率。
  - 从一座城市扩到全链路的选品与调拨流程。
  revenueStreams:
  - 按门店和城市收取年度 SaaS 订阅费。
  - 按快速配送订单或预留 SKU 收用量费。
  - ERP、POS 和骑手系统集成的实施费。
  keyResources:
  - 把库存可信度、需求和毛利连起来的可承诺图谱。
  - POS、ERP 和电商系统集成。
  - SKU 级承诺准确率与真实动销结果数据集。
  keyActivities:
  - 按 SKU、尺码和社区给快速配送资格打分。
  - 编排预留、拣货和兜底流程。
  - 盯住动销、折价风险和库存准确率。
  keyPartners:
  - 时尚零售连锁和平台运营方。
  - POS、ERP 和电商平台供应商。
  - 骑手网络和门店运营集成商。
  costStructure:
  - 产品与集成研发。
  - 客户成功和上线运营。
  - 数据科学与商品分析。
jobsToBeDone:
- job: 当一家时尚连锁想在单一城市上线 2 小时内送达时，帮助全渠道负责人判断：哪些 SKU 和门店可以在不重复备货的前提下承诺速度，从而带着毛利纪律去上线。
  currentAlternative: 手工查库存、保守地下掉目录，以及前置仓试点库存。
  successMetric: 在目标毛利下，由现有门店库存履约的快速配送订单占比。
- job: 当某些款式或尺码的动销开始转弱时，帮助商品团队在快速配送渠道把它们先撤下或先做再平衡，别等货彻底变死库存后再收拾，从而守住周转和折价预算。
  currentAlternative: 每周商品会议和手工跨店调拨决策。
  successMetric: 适用快速配送的 SKU 在老化库存和折价率上的下降幅度。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 两篇同日商业报道都确认了停摆，并直接把失败模式指向库存 经济账。
  painIntensity:
    score: 5
    rationale: 库存押错会把现金锁死、逼出折价，几个月内就足以拖垮一项快速配送计划。
