    score: 4
    rationale: 滩头市场很具体，但同一块控制平面可以继续扩到时尚、美妆、家居以及平台库存路由。
topRisks:
- name: 门店库存准确率噪音太大
  description: 很多连锁的门店级库存和拣货纪律并不可靠，第一批试点里，快速配送承诺很可能先在这里翻车。
  mitigation: 先从完成核验的门店起步，配上可信度分数和保守阈值；等系统证明准确率和门店执行都稳住后，再逐步放开。
- name: 买家可能觉得慢一点也够用
  description: 部分零售商可能会认定当日达和到店自提已经够好，从而削弱对一款“专做快速配送”的产品的紧迫感。
  mitigation: 把平台卖成一层守毛利的承诺与库存分配系统；它不仅能改善快送，也能顺带优化当日达、BOPIS 和调拨决策。
- name: 既有 OMS 打包进来
  description: 订单管理和电商供应商可能会补上一些基础的 门店发货 规则，然后宣称这个问题已经解决。
  mitigation: 吃下更难的那一层——SKU 级动销风险、尺码曲线资格和感知折价的目录抑制——这些都不是通用路由规则能建模的。
