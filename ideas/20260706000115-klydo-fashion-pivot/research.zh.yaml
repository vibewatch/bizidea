  adoptionFrictionMatrix:
  - friction: 门店库存准确率太差
    severity: high
    affectedBuyer: 全渠道运营负责人
    mitigation: 先从完成核验的门店、日度循环盘点和保守承诺阈值起步，再逐步放开目录。
    sourceRefs:
    - 40
    - 41
  - friction: 门店人效和拣货打包准备度会随时段和地点波动
    severity: medium
    affectedBuyer: 门店运营负责人
    mitigation: 用感知容量的规则、收窄首批可售商品池，并把晚拣异常第一时间暴露出来。
    sourceRefs:
    - 30
    - 32
    - 37
  - friction: 商品团队可能更想做套件整合，而不是再加一个供应商
    severity: high
    affectedBuyer: COO 或 商业 IT 赞助人
    mitigation: 把产品卖成一层可插拔的覆盖软件，挂在现有 OMS / POS 之上，并把 ROI 直接绑定到“少折价 + 提快送转化”。
    sourceRefs:
    - 28
    - 29
    - 35
    - 36
  - friction: 用户的紧迫需求可能只集中在窄子类，而不是整个目录
    severity: medium
    affectedBuyer: 商品负责人
    mitigation: 先从事件驱动和基础款聚类切入，只有在转化和毛利都站得住时才继续放大。
    sourceRefs:
    - 5
    - 12
    - 15
market:
  tam:
    value: $31.5M
    rationale: 估算 TAM 为约 $31.5M ARR：大致按 150 家可触达的印度全渠道时尚 / 鞋履连锁 × 每家约 35 个活跃门店 × 每店每年约 $6,000 平台基础费计算。这个数字更多是拿有组织化服饰增长和全渠道 采用率 做交叉校验，而不是拿前置仓规模硬推。
    isEstimate: true
    sourceRefs:
    - 17
    - 18
    - 19
    - 20
    - 25
    - 34
  sam:
    value: $8.6M
    rationale: 把 TAM 收窄到更像滩头画像的约 40 家连锁——20-80 家门店、在 Bengaluru / NCR 有布局、直营网店在线、全渠道运营活跃——可得约 $8.6M ARR。
    isEstimate: true
    sourceRefs:
    - 19
    - 20
    - 25
    - 26
    - 27
    - 34
  som:
    value: $1.8M
    rationale: 第 3 年可触达的现实结果，大致是 10 家连锁、平均每家 30 个付费门店、每店每年约 $6,000，对应约 $1.8M ARR；这里还没算任何用量费。
    isEstimate: true
    sourceRefs:
    - 25
    - 26
    - 28
    - 30
    - 34
bottomUpSizingDrivers:
- driver: 可服务连锁总数
  value: ~150 家可能购买门店库存承诺层的有组织化全渠道时尚 / 鞋履连锁
  source: est. from [16][17][19][25][26]
- driver: 单条连锁平均活跃门店数
  value: ~35 家门店
  source: est.
- driver: 滩头连锁筛选条件
  value: ~40 家在 Bengaluru / NCR 有布局、直营网店在线、总店数为 20-80 家的连锁
  source: est. + [25][26][27]
- driver: 年度定价锚点
  value: ~$6,000 / 付费门店 / 年的混合基础费
  source: '[34] + calc'
categoryDynamics:
  growthRate: FY30 前，有组织化服饰零售年增速约 10-13%。
  growthRateSourceRefs:
  - 17
  tailwinds:
  - point: 趋势驱动消费和 即时零售 正在从生鲜往外扩，服饰已经开始贡献有分量的 即时零售 GMV。
    sourceRefs:
    - 19
    - 22
    - 23
  - point: 大型零售商已经在验证：只要供给可见、体验可用，消费者确实会使用更快的时尚配送。
    sourceRefs:
    - 12
    - 13
    - 14
    - 15
  - point: 全渠道零售基础设施正在围绕“线上线下一体化”和微履约逻辑重做。
    sourceRefs:
    - 25
    - 26
    - 27
  headwinds:
  - point: Klydo 和 Blip 说明，只要库存押错、营运资金纪律不够，模型会死得很快。
    sourceRefs:
    - 1
    - 2
    - 3
  - point: 相比生鲜，时尚类同城即时需求和退货都更难预测，尤其是在基础款和紧急场景之外。
    sourceRefs:
    - 5
    - 7
    - 9
    - 15
  - point: 宽套件早已占住了大部分路由和库存控制栈，独立产品的差异化空间因此被压缩。
    sourceRefs:
    - 28
    - 30
    - 32
    - 35
    - 36
competitors:
- name: Unicommerce
  stage: incumbent
  wedge: 印度本土电商使能平台，横跨 OMS、库存、门店发货 和 同城即时配送 流程。
  pricing: 定制报价；未公开企业版价格。
  strength: 印度本土集成能力强，而且明确围绕全渠道零售、门店发货和同城即时配送执行做定位。
  weaknessVsUs: 更宽的订单与库存控制层，并不等同于一套专门优化折价风险和本地尺码曲线需求的时尚可承诺引擎。
  sourceRefs:
  - 28
  - 29
- name: Fluent Commerce
  stage: scale-up
  wedge: 分布式订单管理，覆盖 门店发货、订单承诺、路由规则和门店容量控制。
  pricing: 定制报价。
  strength: 对多节点履约里的货源、容量和承诺准确率，有很深的规则控制能力。
  weaknessVsUs: 泛化的企业编排层，并不会直接编码时尚特有的动销和本地选品智能。
  sourceRefs:
  - 30
  - 31
- name: Manhattan Associates
  stage: incumbent
  wedge: 企业级订单管理，强调精确订单承诺和丰富的供应链约束逻辑。
  pricing: 定制报价。
  strength: 在大型履约网络里，承诺准确率、实时库存视图和可配置约束处理都非常强。
  weaknessVsUs: 企业部署动作更重，也不天然贴合印度中型时尚连锁以“快速选品闸门”为核心的 rollout。
  sourceRefs:
  - 32
- name: Shopify
  stage: incumbent
  wedge: 统一商业与 POS 栈，把门店变成履约节点，并支持 endless aisle 销售。
  pricing: POS Pro 为 $89/location/month，另加底层 Shopify 套餐。
  strength: 部署轻、商家心智强，而且门店发货功能足够实用。
  weaknessVsUs: 它不擅长按时尚特征做社区级承诺打分、毛利保护和跨门店异常治理。
  sourceRefs:
  - 33
  - 34
- name: fabric
  stage: scale-up
  wedge: 以 AI 叙事包装的 OMS，覆盖统一库存和门店履约流程。
  pricing: 定制报价。
  strength: 架构现代，而且明确聚焦实时库存分配和门店履约编排。
  weaknessVsUs: 它仍是一层宽 OMS，而不是一套围绕动销和折价结果构建的时尚承诺引擎。
  sourceRefs:
  - 36
  - 37
regulatoryTechnicalConstraints:
- point: 客户、位置和订单行为数据的处理，必须对齐印度的数字个人数据制度。
  sourceRefs:
  - 42
- point: 跨店调拨和分布式履约，需要从一开始就把 GST、e-invoice 和 e-way bill 约束设计进去。
  sourceRefs:
  - 44
  - 45
- point: 如果公司未来通过开放网络渠道扩张，ONDC 参与规则和交易级治理就会进入实施范围。
  sourceRefs:
  - 46
- point: 承诺准确率的前提，是多来源库存纪律和 source-selection 逻辑在用户看到“快速配送”标识前就足够可信。
  sourceRefs:
  - 38
  - 40
  - 41
validationSignals:
- point: M-Now 在已开通区域已贡献 10% 订单，而且当地用户渗透率已到 20%。
  sourceRefs:
  - 12
- point: Nykaa Now 正在多个城市扩张，但管理层仍更愿意用前置仓，而不是把昂贵的 展示型门店 硬改成仓库——这同时验证了需求存在，也验证了节点 economics 受限。
  sourceRefs:
  - 15
- point: Slikk 和 Zilo 都拿到了后续融资去扩 60 分钟或 60 分钟内的模式，说明投资人仍相信某些精选场景是成立的。
  sourceRefs:
  - 7
  - 9
  - 10
- point: Klydo 和 Blip 都很快失败，说明运营方至今仍没找到一套耐用、又节约库存的运营模型。
  sourceRefs:
  - 1
  - 2
  - 3
openQuestions:
- 那些纸面上看起来很漂亮的 20-80 店印度时尚连锁，真实的 SKU × 尺码库存准确率基线到底是多少？
- 买家真的需要覆盖整盘时尚目录的 2 小时内承诺，还是只在少数紧急场景和基础款子类里才需要？
- 连锁会不会为一层独立承诺软件付费，还是坚持要通过 OMS / POS 集成商打包进去？
- 在现实里，哪项 KPI 最能最快释放扩容预算：更高转化、更少缺货，还是更低折价？
