scenarios:
  downside:
    description: 付费试点依然能签下，但转正率更接近 BP 的底线，而且连锁扩张会卡在约 24 家门店。
    y3RevenueK: 1120.0
    y3EbitdaK: -790.0
    cashLowPointK: -90.0
    keyAssumptionChanges:
    - 到 Q4Y3，已完成试点里只有 7 个转正式生产，而不是 9 个。
    - 成熟正式生产 ARPU 更接近 $180K，因为用量挂载更轻，而且多数客户停在 30 家活跃门店以下。
    - 毛利率最高只到约 66%，因为连接器和 上线支持 仍然偏服务化。
  base:
    description: 精干团队把完成核验的共创客户转成可复制的城市 铺开，同时仍有一部分试点失败。
    y3RevenueK: 1499.0
    y3EbitdaK: -558.6
    cashLowPointK: 567.7
    keyAssumptionChanges:
    - 36 个月内共卖出 14 个付费试点，其中 9 个转正、4 个失败、1 个在 Q4Y3 仍然在线。
    - 转正连锁会从首个 正式上线 年约 $108K 的收入，爬到成熟 30 店 铺开 时约 $216K。
    - 只有在可复用连接器和完成核验门店 操作手册 跑出来后，毛利率才摸到 70% 目标。
  upside:
    description: 渠道转介绍更早起量，首个 验证点 之后失败试点变少，连锁扩张速度更快。
    y3RevenueK: 1760.0
    y3EbitdaK: -330.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
    - Y1 之后每年都能多拿 1 个由伙伴带来的付费试点，而且后期试点大多可以转正。
    - 随着扩张连锁接上第 2 个工作流，成熟正式生产 ARPU 会往 $228K 靠拢。
    - 一旦受支持技术栈的部署时间稳定低于 4 周，毛利率就能爬到约 72%。
sensitivity:
- variable: ARPU
  downsideCase: 单连锁成熟年度收入为 $180K
  baseCase: 单连锁成熟年度收入为 $216K
  upsideCase: 单连锁成熟年度收入为 $228K
  y3RevenueImpactK: -200.0
  cashImpactK: -140.0
- variable: CAC
  downsideCase: 每个正式生产连锁的 完全成本 CAC 为 $190K
  baseCase: 每个正式生产连锁的 完全成本 CAC 为 $153K
  upsideCase: 每个正式生产连锁的 完全成本 CAC 为 $130K
  y3RevenueImpactK: 0.0
  cashImpactK: -120.0
- variable: 流失率
  downsideCase: 首个正式生产周期结束后，月度 logo 流失率为 3.0%
  baseCase: 月度 logo 流失率为 2.0%
  upsideCase: 月度 logo 流失率为 1.5%
  y3RevenueImpactK: -80.0
  cashImpactK: -70.0
- variable: 销售周期
  downsideCase: 试点启动和转正各延后约 1 个季度
  baseCase: Y1 之后大致每季度有 1 个有资金支持的 试点，且 试点 窗口为 3 个月
  upsideCase: 伙伴转介绍把试点启动时间压缩 1-2 个月
  y3RevenueImpactK: -180.0
  cashImpactK: -150.0
- variable: 毛利率
  downsideCase: Y3 毛利率卡在 66%
  baseCase: Y3 毛利率达到 70%
  upsideCase: Y3 毛利率达到 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -60.0
- variable: 招聘节奏
  downsideCase: 在证明可复制前，就提前把第 2 位销售和第 3 位实施招进来
  baseCase: 证明点之后的招聘仍以 正式上线 客户和伙伴 进展 为门槛
  upsideCase: 因为受支持技术栈的部署更可复制，后续招聘继续往后推
  y3RevenueImpactK: 0.0
  cashImpactK: -130.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Outreach[Target-chain outreach] --> PaidPilots[Paid metro pilots]\n  PaidPilots --> Production[Production chain rollouts]\n  Production --> Stores[Active stores and workflows]\n  Stores --> Revenue[Subscription and usage revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash runway]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入，来自 14 个付费试点喂出的 9 家转正连锁和 1 个仍在进行的试点；成熟账户会逐步扩到每家约 30 个活跃门店。
- checkName: 必须跑通的事
  finding: 公司必须让完成核验的试点转化率明显高于 50% 底线，并在首家连锁里跑出账户内扩张，因为模型要到 Q4Y3 才会接近 EBITDA 转正。
- checkName: 模型会在何时失灵
  finding: 如果正式生产 ARPU 最后更接近 $180K，或转化率往 downside 情形滑，现金会在公司拿到一个干净的 可拿 seed 的 证明点之前先转负。
- checkName: 下一轮证明点
  finding: 只有当团队做到 5 家正式生产连锁、1 次现有账户内扩张，以及受支持技术栈部署少于 4 周时，下一轮融资才真正站得住。
sanityChecks:
  ruleOf40: 40 法则：Y3 增长 111% + EBITDA 利润率 -37% = 74%。
  burnMultiple: 烧钱倍数：Y3 为 0.7x（$559K burn / $788K 净新增收入）。
  revenuePerFte: $150K 的 Y3 每名 FTE 对应收入（按年末 10 名 FTE 计算）；低于纯软件 SaaS 常见的 $200-400K，只有在受支持技术栈部署继续变轻时才算可接受。
  flags:
  - 基准情形要求 69% 的已完成付费试点转正式生产，高于 BP 底线，对盲盘结果不佳的容错空间并不大。
  - 第 3 年按年末 FTE 算，人均收入只有约 $150K；如果 铺开 时间不能稳定压到 4 周内，模型看起来仍然太像实施服务。
  - Q4Y3 的退出 run-rate 已经逼近研究里的 $1.8M 滩头 SOM，因此独立公司后续要继续上行，就必须切进更大连锁、相邻工作流或伙伴分发。
