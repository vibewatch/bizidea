slug: fashion-stock-promise-engine
date: '2026-07-06'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-07-06]'
- id: A2
  name: 融资到账后 M1 期初现金
  value: '2550'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2.5-3.5M] 采用 $2.5M 的 pre-seed 交割资金，外加创始人 $50K 现金过桥。'
- id: A3
  name: customersEop 定义
  value: 处于试点或正式生产中的付费连锁客户
  unit: definition
  source: '[BP investorMemo.firstCustomer + BP gtm.wedge] 模型把付费试点也算作客户，因为它们在全面 铺开 前就开始贡献收入。'
- id: A4
  name: 付费试点启动节奏
  value: 36 个月共 14 个付费试点；Y1 为 2 个，Y2 为 6 个，Y3 为 6 个
  unit: paid 试点s
  source: '[BP milestones + BP gtm.funnelTargets] 如果想在 Y3 前逼近 10 家连锁，大致需要在首个共创客户阶段之后做到每季度 1 个有资金支持的 试点。'
- id: A5
  name: 已完成试点转正式生产的转化率
  value: 到 Q4Y3，13 个已完成试点里有 9 个转正式生产（69%），另有 1 个试点仍在进行
  unit: percent of completed 试点s
  source: '[BP gtm.funnelTargets 50%+ 试点-to-production conversion] 基准情形假设：一旦连锁跨过“门店核验就绪”门槛，表现会高于底线。'
- id: A6
  name: 付费试点单价
  value: '36'
  unit: USDK per 试点
  source: '[BP gtm.pricing $25K-$50K] 这里取一线中位价，覆盖 1 座城市和 8-10 家完成核验的门店。'
- id: A7
  name: 首个正式生产年度单连锁收入
  value: '108'
  unit: USDK annual
  source: '[BP investorMemo.firstCustomer.initialContract $75K-$150K for 12-20 stores] 这里按首轮 铺开 覆盖 15 家门店，再叠加少量用量费建模。'
- id: A8
  name: 扩张阶段单连锁收入
  value: '168'
  unit: USDK annual
  source: '[BP businessModel.expansionLevers + BP milestones 12-24 months] 假设连锁会在 12 个月内扩到约 24 家活跃门店，或新增第 2 个工作流。'
- id: A9
  name: 成熟阶段正式生产 ARPU
  value: '216'
  unit: USDK annual per chain
  source: '[RE market.som $1.8M from 10 chains x 30 stores x $6K base fee + BP gtm.pricing plus usage heuristic] 成熟账户大致做到 30 家活跃门店，并拿到约 20% 的用量上浮。'
- id: A10
  name: 毛利率爬坡
  value: M1-M6 为 50%；M7-M12 为 56%；Y2 为 64%；Y3 Q1-Q2 为 68%；Y3 Q3-Q4 为 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP product.sixMonth] 试点和连接器前期 上线支持 很重，只有在可复用部署跑出来后，毛利率才会摸到目标值。'
- id: A11
  name: 招聘时间线
  value: M1 入职创始工程和产品/运营；M4 入职集成工程师；M7 入职数据；M10、M16、M28 入职实施；M13、M25 入职销售；M19 入职第 3 位工程师
  unit: timing
  source: '[BP team] 先把 BP 里 Month 0/3/6/9/12 的起始点映射到 M1/M4/M7/M10/M13，再只补上支撑 10 家连锁所需的最低限度后续岗位。'
- id: A12
  name: 工程岗位完全成本薪酬
  value: '130'
  unit: USDK annual per FTE
  source: '[startup-finance heuristic for senior India-based startup engineers with benefits and payroll load]'
- id: A13
  name: 产品/运营岗位完全成本薪酬
  value: '120'
  unit: USDK annual per FTE
  source: '[startup-finance heuristic for a founder-level product and 试点-operations operator with payroll load]'
- id: A14
  name: 数据/分析岗位完全成本薪酬
  value: '115'
  unit: USDK annual per FTE
  source: '[startup-finance heuristic for applied merch/data talent in India with payroll load]'
- id: A15
  name: 实施/客户成功岗位完全成本薪酬
  value: '85'
  unit: USDK annual per FTE
  source: '[startup-finance heuristic for implementation and customer-success hires needed to keep 铺开s under four weeks]'
- id: A16
  name: 销售/BD 岗位完全成本薪酬
  value: '140'
  unit: USDK annual per FTE
  source: '[startup-finance heuristic for enterprise SaaS seller OTE and partner-development carrying cost in India]'
- id: A17
  name: 非薪酬销售与市场支出
  value: Y1 每月 8；Y2 每月 12；Y3 每月 15
  unit: USDK per month
  source: '[BP gtm.channels] 主要覆盖创始人差旅、试点 设计会、伙伴赋能和窄而深的 定向地推，而不是大面积买量。'
- id: A18
  name: 非薪酬 R&D 支出
  value: Y1 每月 10；Y2 每月 12；Y3 每月 14
  unit: USDK per month
  source: '[BP product + BP operations] 覆盖云成本、数据标准化、监控和连接器工具。'
- id: A19
  name: 非薪酬 G&A 支出
  value: Y1 每月 6；Y2 每月 8；Y3 每月 9
  unit: USDK per month
  source: '[BP operations + research regulatoryTechnicalConstraints] 覆盖法务、审计、保险、DPDP/GST 模板和后台开销。'
- id: A20
  name: 薪酬分摊到 P&L 科目的规则
  value: Product/Ops：50% 记 S&M / 30% 记 R&D / 20% 记 G&A；Implementation：55% 记 S&M / 15% 记 R&D / 30% 记 G&A；Engineering 和 Data：100% 记 R&D；Sales：100% 记 S&M
  unit: allocation
  source: '[BP team rationales + BP operations] salaryK 单独列示，但薪酬已经被计入 S&M、R&D 和 G&A 科目。'
- id: A21
  name: 单位经济模型流失假设
  value: '2.0'
  unit: percent per month
  source: '[startup-finance heuristic + BP investorMemo.whyDoubt] 只用于算 LTV；三年 P&L 仍以获客为主，在续约 cohort 成熟前不显式建 logo 流失。'
- id: A22
  name: CAC 计算口径
  value: '153.4'
  unit: USDK per new production chain
  source: '[BP gtm.funnelTargets + model calculation] 取 Y2-Y3 的 完全成本 S&M 支出，除以前两个共创客户之后新增的 7 次正式生产转化。'
- id: A23
  name: 融资额口径
  value: '2500'
  unit: USDK
  source: '[BP fundingAsk pre-seed $2.5-$3.5M and 18-month runway] 模型取区间下沿，因为付费试点会部分对冲 burn，同时在 Y2 证明点后还能留出约 6 个月缓冲。'
- id: A24
  name: pre-seed 轮跑道目标
  value: '24'
  unit: months
  source: '[BP fundingAsk.runwayMonths 18 + model buffer convention] 先把证明点资金配足，再额外留出约 6 个月运营缓冲。'
- id: A25
  name: 现金流口径
  value: 开轮后现金变动等同于 EBITDA
  unit: modeling convention
  source: '[startup-finance heuristic] 在这个 pre-seed 阶段，不建债务利息、CapEx、税项或营运资本波动。'
