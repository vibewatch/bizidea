"reportMemo":
  "executiveTakeaways":
  - "Klydo and Blip show the category's failure mode is inventory economics, not demand discovery: Klydo was explicitly undone by low sell-through and high inventory requirements, while Blip says capital intensity and execution complexity killed a store-linked fast-fashion model in under a year [1][2][3][5]."
  - "Consumer demand for faster fashion is real and getting institutional validation: Myntra says M-Now already drives 10% of orders where live, Nykaa is expanding a 60-minute/2-hour model, and Bain sees trend-first commerce and q-commerce expansion reshaping Indian e-retail [12][13][14][15][19][20]."
  - "The real white space is not another rapid-fashion consumer app; it is a control layer for chains that cannot afford dark-store duplication. Nykaa itself says destination stores are poor warehouses, while Redseer and ET show non-grocery quick commerce is growing fast enough to force retailers to respond anyway [15][22][23]."
  - "The closest day-one competition is generic OMS/order-promise software, not Klydo-like apps. Unicommerce, Fluent, Manhattan, Shopify, Salesforce, and fabric already cover ship-from-store, order promising, and multi-location inventory; the startup only wins if it is fashion-specific, markdown-aware, and faster to deploy [28][29][30][31][32][33][35][36][37][38]."
  - "The beachhead is strategically attractive but financially narrower than the rhetoric around quick commerce suggests; the 20-80-store fashion-chain wedge looks like a low-to-mid-eight-figure software market unless the company expands into larger chains, adjacent categories, or financing/routing layers [16][17][18][19][20][25][26]."
  "marketDefinition": "Defined market: a promise-and-allocation layer for Indian fashion and footwear retailers that uses live multi-store inventory, local demand, and fulfillment constraints to decide whether a SKU should be offered for 30-minute, 2-hour, same-day, or no-fast-delivery exposure. It sits above ecommerce/POS/OMS plumbing and below consumer-facing merchandising, and excludes dark-store-first consumer apps and generic OMS suites that do not explicitly optimize fashion sell-through and markdown risk [1][5][12][28][30][31][32][38]."
  "customerAndBuyer": "Primary customer is the omnichannel or merchandising operations team inside Indian fashion and footwear chains that already run direct ecommerce plus physical stores. The day-one buyer is typically the COO, head of omnichannel, or chief merchandising leader because the problem spans catalog exposure, inventory turns, store labor, courier cost, and markdown risk rather than just IT routing [25][26][27][12]."
  "buyingTriggers":
