  "validationPlan":
  - "priority": "high"
    "question": "How accurate is live store inventory by SKU-size in the first 8-10 pilot stores?"
    "evidenceToGather": "Run daily blind counts for 30 days, compare POS/ERP stock to physical stock, and log discrepancy rates before enabling fast promises."
  - "priority": "high"
    "question": "Which assortment slices actually need sub-2-hour delivery rather than same-day or pickup?"
    "evidenceToGather": "Backtest session-to-order conversion for urgent categories, occasions, and pin codes during one metro pilot; compare 30-minute, 2-hour, and same-day exposure."
  - "priority": "medium"
    "question": "Can the startup cut markdown risk, not just increase speed?"
    "evidenceToGather": "Measure aged-inventory days, sell-through, and realized gross margin for rapid-delivery-eligible SKUs versus a holdout group."
  - "priority": "medium"
    "question": "Will buyers fund a standalone layer or insist on suite bundling?"
    "evidenceToGather": "Run 10-15 buyer interviews with heads of omnichannel and commerce IT; test whether ROI framed as fewer stockouts, fewer markdowns, or higher conversion releases budget fastest."
