  "willingnessToPay":
    "summary": "Software budget clearly exists, but buyers will benchmark this against broader commerce suites rather than a brand-new line item. Shopify publicly charges $89/location/month for POS Pro, while Unicommerce, Fluent, Manhattan, Salesforce, and fabric sell larger OMS/fulfillment stacks on enterprise contracts; that means a new layer must prove margin protection, fewer stockouts, or higher fast-delivery conversion to earn dedicated spend."
    "sourceRefs":
