  "competitiveLandscape": "Competition splits into two very different camps. On one side are generic commerce-control vendors—Unicommerce, Fluent, Manhattan, Shopify, Salesforce, fabric, Anchanto, Vinculum—that already offer ship-from-store, inventory visibility, and order promising. On the other are rapid-fashion operators—Myntra M-Now, Nykaa Now, Slikk, Zilo, Knot—that prove consumer demand but solve it with owned nodes, brand curation, or capital-heavy operating models. The startup's wedge only exists if it can help ordinary fashion chains approximate the second camp's speed without inheriting its inventory risk [12][13][14][15][28][30][31][32][33][35][36][37]."
