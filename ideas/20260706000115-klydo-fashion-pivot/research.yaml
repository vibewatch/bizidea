  "regulatoryLandscape": "The formal regulatory burden is manageable but not trivial. Customer, location, and order-behaviour data fall under India's digital personal data regime, inter-store movement and invoicing still require GST/e-way-bill discipline, and any open-network distribution motion adds ONDC participant-policy and transaction-governance work [42][44][45][46]."
  "technologyLandscape": "The enabling stack is already mature: Unicommerce, Fluent, Manhattan, Shopify, Salesforce, fabric, and Adobe all expose some mix of multi-location inventory, store fulfillment, and order-promise logic. That means defensibility will not come from generic orchestration alone; it will come from the startup's fashion-specific eligibility graph—size curves, local demand volatility, pick-pack reliability, and markdown-aware suppression—plus clean write-backs into store systems [28][29][30][31][32][33][35][36][37][38]."
