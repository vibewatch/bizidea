slug: fashion-stock-promise-engine
date: '2026-07-06'
executiveSummary: >-
  Fashion-stock-promise-engine should start as an overlay for Indian apparel and
  footwear chains that want sub-2-hour delivery from existing stores but cannot
  afford dark-store duplication. The core customer is a 30-60 store chain in
  Bengaluru or NCR with direct ecommerce, live store inventory, and a launch or
  rescue project around rapid delivery. The research supports the pain: Klydo
  and Blip failed because inventory turns and working-capital discipline broke
  before delivery demand disappeared, while Myntra M-Now and Nykaa Now show
  that consumers will use faster fashion delivery when it is available. The
  company should therefore sell a promise-and-reservation control layer, not a
  consumer app, generic OMS replacement, or courier network. The first proof
  point is a paid metro pilot in 8-10 audited stores that improves promise
  accuracy and rapid-delivery conversion without worsening markdowns. The
  biggest missing fact in the inputs is the real SKU-size inventory-accuracy
  baseline inside 20-80 store chains, so the first 90 days must include blind
  counts before broad automation claims. The beachhead market is strategically
  useful but narrow, with researched TAM of about $31.5M ARR and year-3
  beachhead SOM of about $1.8M before usage fees, so investor upside depends on
  later expansion into larger chains, adjacent categories, or routing and
  planning layers. This supports a disciplined pre-seed plan and a Watch-level
  investor view until the team proves paid pilots, target pricing, and a
  repeatable overlay deployment motion.
problem:
  - Indian fashion chains are being pushed to offer rapid delivery, but long-tail size and style inventory makes dark-store duplication capital-intensive and prone to low sell-through.
  - Manual OMS rules, POS exports, and store WhatsApp coordination do not decide SKU-size-store eligibility fast enough, so retailers either overpromise and disappoint customers or hide inventory and absorb lost demand and markdown risk.
solution:
  - Connect POS, ERP, ecommerce catalog, and courier SLA data to score whether each SKU-size-store-neighborhood combination can support a 30-minute, 2-hour, same-day, or no fast-delivery promise.
  - Give operators reservation, pick-pack, fallback, and catalog-suppression workflows that pull weak inventory out of the fast channel before stockouts and markdowns compound.
whyWeWin:
  - The wedge is narrower than a full OMS and more economically relevant than a courier tool because it ties promise logic directly to sell-through, stock confidence, and margin.
  - The first customer can measure success within one metro and one assortment slice, which creates faster proof than selling chainwide retail transformation.
  - Defensibility compounds from SKU-size-store-neighborhood outcome data and store exception data that incumbents usually do not tune for Indian fashion rapid delivery.
strategicChoices:
  beachhead: >-
    Indian apparel and footwear chains with 20-80 stores, 8,000-40,000 live
    SKUs, direct ecommerce, and Bengaluru or NCR store density that are
    preparing a sub-2-hour launch in one metro without opening dedicated dark
    stores.
  wedgeRationale: >-
    A rapid-promise overlay for one metro and a narrow eligible assortment
    creates faster proof than a full omnichannel suite because the buyer
    already has the systems of record, the trigger is immediate, and success
    can be measured in promise accuracy, conversion, and markdown protection
    within one season.
  sequencingRationale: >-
    Start with audited stores, event-driven and basics-heavy categories, and
    founder-led sales so the company learns whether inventory accuracy and
    demand urgency are good enough before hiring a larger field team or
    expanding into adjacent workflows. Add POS and OMS integration depth and
    partner referrals only after the first pilots prove an overlay can convert
    into annual software rather than bespoke services.
  notYet:
    - Consumer-facing quick-fashion app or owned inventory model.
    - Full OMS or ERP replacement.
    - Beauty, home, and marketplace-routing modules before the fashion wedge is repeatable.
    - Tier-2 and Tier-3 metro expansion before Bengaluru or NCR pilots are profitable.
market:
  tam: >-
    Estimated $31.5M ARR from roughly 150 targetable Indian omnichannel
    fashion and footwear chains at about 35 active stores per chain and about
    $6,000 annual base fee per store.
  sam: >-
    Estimated $8.6M ARR for about 40 chains that fit the beachhead profile of
    20-80 stores, Bengaluru or NCR presence, direct ecommerce, and active omni
    operations.
  som: >-
    Estimated $1.8M year-3 ARR from about 10 chains averaging 30 paying stores
    each before usage fees.
  segments:
    - 20-80 store Indian apparel and footwear chains launching metro-level fast delivery from existing stores.
    - Larger omnichannel fashion groups that need a fashion-specific promise layer before chainwide rollout.
  buyingProcess: >-
    The operational champion is usually the COO, head of omnichannel, or chief
    merchandising officer, but commerce IT must approve POS, ERP, and OMS data
    access. The fastest purchase path is a paid pilot tied to a planned launch
    or failed fast-delivery pilot, followed by annual rollout once promise
    accuracy and margin outcomes clear agreed thresholds.
product:
  mvp: >-
    The MVP should cover one metro, 8-10 audited stores, and a narrow
    assortment of basics and event-driven categories. It should score
    fast-delivery eligibility, reserve store stock, manage pick-pack
    exceptions, and suppress risky SKUs, while leaving replenishment, demand
    planning, and full transfer automation out of scope.
  sixMonth: >-
    Launch one paid pilot with live promise scoring, reservation workflows,
    capacity-aware store assignment, and weekly dashboards for promise
    accuracy, stockouts, and markdown exposure.
  twelveMonth: >-
    Add repeatable connectors for the first POS and OMS combinations,
    automated catalog suppression rules, holdout-based ROI reporting, and
    support 3-5 production customers across Bengaluru and NCR.
  twentyFourMonth: >-
    Expand from fast-delivery promise control into same-day, BOPIS, and
    inter-store transfer decisions for existing fashion customers, then test
    one adjacent category or larger-chain segment only after the fashion unit
    economics are proven.
  keyBets:
    - Audited store inventory can reach a reliable enough baseline for automated promise gating without months of remediation.
    - Sub-2-hour demand is concentrated enough in selected categories and pin codes to justify a premium workflow over same-day or pickup.
    - Buyers will pay for markdown protection and promise accuracy, not just for another visibility dashboard.
    - A lightweight overlay deployment can beat suite bundling on time to value.
gtm:
  wedge: >-
    Sell a paid metro-launch pilot to a 30-60 store chain in Bengaluru or NCR
    that is about to launch or repair sub-2-hour delivery, starting with 8-10
    audited stores and a controlled assortment, then convert to annual
    per-store software once the chain sees accurate promises and cleaner
    inventory turns.
  channels:
    - Founder-led direct sales to COOs, heads of omnichannel, and chief merchandising officers.
    - Referrals from POS, ERP, OMS, and retail-systems integrators that do not want to own fashion-specific promise logic.
    - Courier and hyperlocal launch partners used after the first proof point to expand within live metros.
  funnelTargets: >-
    12-15 target-account conversations per quarter -> 30-40% technical and
    business qualification -> 20-25% paid pilot rate -> 50%+ pilot-to-production
    conversion -> 60%+ production accounts expanding to more stores or a second
    workflow within 12 months.
  pricing: >-
    Charge a $25k-$50k paid pilot for one metro and 8-10 audited stores, then
    convert to about $6,000 annual base fee per active store plus usage-based
    fees per rapid-delivery order or reserved SKU. This matches the researched
    budget anchor, ties spend to the buyer's operating unit of active stores,
    and makes conversion contingent on measured ROI rather than generic
    software shelfware.
businessModel:
  revenueStreams:
    - Annual subscription priced by active store and metro.
    - Usage fees tied to rapid-delivery orders or reserved SKU volume.
    - Implementation and integration fees for onboarding new chains and stack combinations.
  unitOfValue: Active store-month with fast-delivery promise coverage managed by the engine.
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one metro pilot to more stores and metros inside the same chain.
    - Add same-day, BOPIS, and inter-store transfer workflows after fast-delivery promise control is trusted.
    - Move upmarket into larger fashion groups that already run broader OMS suites but lack fashion-specific promise logic.
    - Extend the data layer into adjacent categories or inventory-financing and routing products only after the core overlay is proven.
strategyMap:
  northStarMetric: Rapid-delivery GMV fulfilled from existing stores at target gross margin.
  inputMetrics:
    - Promise accuracy for fast-delivery-eligible SKUs.
    - Share of rapid-delivery orders fulfilled from existing store stock without manual override.
    - Incremental conversion and markdown-rate delta on eligible versus control assortment.
    - Pilot-to-production conversion rate.
    - Expansion rate from first metro into more stores or workflows.
  moatsToBuild:
    - SKU-size-store-neighborhood history linking promise decisions to realized sell-through and markdown outcomes.
    - Store exception dataset covering no-finds, late picks, reroutes, and capacity misses.
    - India-specific integration and rollout playbooks for fashion POS, ERP, OMS, and courier stacks.
  killCriteria:
    - If the first 3 paid pilots cannot reach 95% promise accuracy and at least one production rollout, the wedge is too operationally brittle.
    - If fewer than 2 of the first 10 qualified chains will fund a paid pilot at target pricing, the willingness-to-pay thesis is wrong.
    - If inventory accuracy stays below 92% in most audited pilot stores after 30 days of remediation, the ICP must move upmarket or the store-stock-first motion should be abandoned.
  mermaid: |
    flowchart LR
      Wedge[Metro launch pilot] --> MVP[Promise and reservation engine]
      MVP --> Proof[Higher conversion and lower markdown risk]
      Proof --> Expansion[Chain rollout and adjacent workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: >-
      Medium conviction in the customer pain and timing, low conviction in
      venture-scale economics until paid pilots prove standalone budget and
      clean inventory data.
    whyBelieve: Rapid-delivery demand is real, and Klydo's failure reframes the problem toward an asset-light control layer rather than another inventory-heavy app.
    whyDoubt: The beachhead market is narrow and incumbents already own much of the OMS and promise stack, so the company may struggle to sustain independent pricing power.
    nextDiligence: Confirm two paid pilot LOIs from target chains and complete a 30-day blind-count audit showing workable SKU-size inventory accuracy in 8-10 stores.
  firstCustomer:
    title: Head of omnichannel at a 30-60 store Indian apparel chain
    profile: A Bengaluru or NCR retailer with direct ecommerce, 8,000-40,000 live SKUs, and pressure to launch sub-2-hour delivery from company-owned stores.
    trigger: A planned rapid-delivery launch or a failed pilot that exposed inventory duplication, stock inaccuracy, or rising markdown risk before citywide rollout.
    buyer: COO or head of omnichannel
    initialContract: >-
      $25k-$50k metro pilot across 8-10 audited stores for 8-12 weeks,
      credited toward a roughly $75k-$150k first-year production contract for
      12-20 active stores in one metro plus order-based overage fees.
  mustBeTrue:
    - At least 2 of the first 10 qualified chains fund a paid pilot before waiting for their OMS vendor roadmap.
    - Audited pilot stores can sustain more than 92% SKU-size inventory accuracy with light process changes.
    - A narrow fast-delivery assortment can lift conversion or service levels without increasing markdown exposure versus control.
    - Production pricing can hold near the researched $6,000 annual base fee per active store plus usage.
    - The first production customer expands to more stores or a second workflow within 12 months, proving the wedge is not just consulting revenue.
  diligenceQuestions:
    - What inventory accuracy and pick-pack discipline do 20-80 store fashion chains actually have by SKU size in live metros?
    - Which categories and occasions truly require sub-2-hour promise rather than same-day delivery or pickup?
    - Why will Unicommerce, Fluent, Manhattan, Shopify, or in-house teams not satisfy the first buyer quickly enough?
    - Which KPI releases budget fastest in practice: higher conversion, fewer stockouts, or lower markdowns?
    - How much integration work is needed before the product feels like an overlay instead of a quasi-implementation project?
operatingAssumptions:
  - assumption: At least one target chain can get audited pilot stores above 92% inventory accuracy within 30 days.
    basis: research.yaml
    validationTest: Run 30 days of blind counts across 8-10 stores and compare physical counts to POS and ERP stock at SKU-size level.
    decisionImpact: If false, the ICP must move upmarket to chains with stronger inventory controls or the product becomes a data-remediation service.
  - assumption: Buyers will fund a standalone promise layer rather than wait for suite vendors to bundle the feature.
    basis: research.yaml
    validationTest: Win 2 paid pilot LOIs at target pricing from chains already using existing OMS or POS software.
    decisionImpact: If false, the company should reposition as an embedded module sold through a platform partner instead of independent software.
  - assumption: The most urgent use cases are narrow enough to start with basics and occasion-driven categories rather than the full catalog.
    basis: operator judgment
    validationTest: A/B test 30-minute, 2-hour, and same-day promise exposure by category and pin code during the first pilot.
    decisionImpact: If false, the wedge shifts from rapid delivery to broader same-day and availability orchestration.
  - assumption: Pricing around $6,000 per active store per year plus usage will survive procurement.
    basis: idea.yaml
    validationTest: Include written production pricing in pilot contracts and confirm at least one conversion at or above the target base fee.
    decisionImpact: If false, the company must move upmarket, widen product scope, or abandon venture-scale standalone economics.
  - assumption: A small set of POS, OMS, and courier connectors can cover early revenue without a services-heavy implementation team.
    basis: research.yaml
    validationTest: Deliver the first 2 pilots with no more than 2 custom point-to-point connectors and less than 4 weeks of implementation each.
    decisionImpact: If false, hiring and funding must shift toward implementation and partner-led distribution sooner.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12 target COOs and heads of omnichannel and test paid-pilot appetite against a live launch or failed-pilot trigger.
    hypothesis: Chains with an immediate metro launch decision will buy a narrow overlay faster than a broad suite project.
    successMetric: At least 6 of 12 interviews confirm an active trigger and 2 agree to pilot design sessions.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run a 30-day blind-count audit in 8-10 stores for one design partner before enabling fast-delivery promises.
    hypothesis: A subset of target chains can reach the inventory accuracy required for automated promise gating with light process discipline.
    successMetric: One design partner sustains more than 92% SKU-size inventory accuracy after remediation.
    owner: Founding product/ops
  - horizon: 3–6 months
    experiment: Backtest category, occasion, and pin-code demand to define the first eligible assortment and speed threshold.
    hypothesis: Basics and event-driven categories will show clearer sub-2-hour urgency than the full catalog.
    successMetric: One assortment slice shows materially better conversion or service-level benefit under sub-2-hour exposure than same-day control.
    owner: Applied merch/data scientist
  - horizon: 3–6 months
    experiment: Launch one paid metro pilot with live promise scoring, reservations, and weekly business reviews.
    hypothesis: The overlay can improve promise accuracy and rapid-delivery conversion without worsening markdown exposure.
    successMetric: Pilot reaches 95% promise accuracy and a buyer-signed production success plan within 12 weeks.
    owner: Founding eng
  - horizon: 6–12 months
    experiment: Ship the first reusable POS or OMS connector and test pilot-to-production conversion on supported stacks.
    hypothesis: Reusable integrations will cut launch time enough to make the business look like software rather than implementation services.
    successMetric: First production rollout completes in less than 4 weeks on a supported stack.
    owner: Integration engineer
  - horizon: 9–15 months
    experiment: Sign one systems-integrator or courier referral partner and track partner-sourced pipeline quality.
    hypothesis: Partners will open qualified opportunities once the first metro ROI case is proven.
    successMetric: One signed referral agreement and at least 1 partner-sourced paid pilot opportunity.
    owner: Founder CEO
  - horizon: 12–18 months
    experiment: Expand the first production customer to more stores or a second workflow such as same-day or BOPIS orchestration.
    hypothesis: Expansion inside an existing chain is cheaper and more durable than relying only on new-logo sales.
    successMetric: First production account adds more stores or a second workflow within 6 months of go-live.
    owner: Implementation lead
operations:
  - Standardize a pre-pilot data-readiness and stock-audit checklist for POS, ERP, size master, and store labor readiness.
  - Run weekly business reviews that compare eligible versus control assortment on promise accuracy, stockouts, conversion, and markdown rate.
  - Maintain courier SLA and store-capacity feedback loops so promise thresholds can tighten or loosen daily.
  - Build DPDP, GST, and inter-store transfer compliance requirements into onboarding templates rather than custom legal work per customer.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the eligibility graph, reservation logic, and first integrations fast enough to support one live pilot.
  - role: Founding product/ops
    startTiming: Month 0
    rationale: Own pilot design, retailer workflow fit, and weekly operating reviews so the product stays tied to measurable margin outcomes.
  - role: Integration engineer
    startTiming: Month 3
    rationale: Convert first-customer learnings into reusable POS, ERP, and OMS connectors before custom work dominates the roadmap.
  - role: Applied merch/data scientist
    startTiming: Month 6
    rationale: Turn pilot data into category-level promise thresholds, holdout analysis, and markdown-aware suppression rules.
  - role: Implementation lead
    startTiming: Month 9
    rationale: Shorten launch cycles and keep production rollouts from becoming founder-only services.
  - role: Enterprise seller
    startTiming: Month 12
    rationale: Add outbound capacity only after one pilot-to-production conversion proves the sales motion and pricing envelope.
milestones:
  - horizon: 0–12 months
    items:
      - Close 1-2 paid design-partner pilots in Bengaluru or NCR.
      - Verify more than 92% stock accuracy in audited pilot stores or redefine the ICP.
      - Convert the first paid pilot into a production contract with reusable pricing and success metrics.
      - Ship the first reusable POS or OMS connector and ROI dashboard.
  - horizon: 12–24 months
    items:
      - Reach 3-5 production customers and prove one account expands to more stores or a second workflow.
      - Reduce implementation time to less than 4 weeks for supported stacks.
      - Add same-day, BOPIS, or transfer workflow support for existing customers.
      - Secure 1-2 channel partners that source qualified pilots.
  - horizon: 24–36 months
    items:
      - Reach about 10 chains and about 30 paying stores per chain on average, consistent with the researched beachhead SOM.
      - Decide whether to move upmarket, add adjacent categories, or embed through platforms based on pricing and expansion data.
      - Launch one adjacent revenue layer such as assortment planning or routing optimization only if the core promise engine remains differentiated.
risks:
  - risk: Store inventory accuracy and pick-pack discipline are too inconsistent in target chains.
    likelihood: High
    impact: High
    mitigation: Start only with audited stores, force daily cycle counts, and keep promise thresholds conservative until no-find and late-pick rates stabilize.
  - risk: Same-day delivery and pickup satisfy most demand, shrinking urgency for sub-2-hour promise software.
    likelihood: Medium
    impact: High
    mitigation: Prove category-level demand differences early and position same-day, BOPIS, and transfer orchestration as fallback expansion paths.
  - risk: Incumbent OMS vendors or India-native enablement stacks bundle enough similar logic to block standalone budget.
    likelihood: High
    impact: Medium
    mitigation: Optimize for deployment speed, fashion-specific markdown outcomes, and cross-stack overlay positioning instead of generic routing features.
  - risk: Early deployments become custom integration projects.
    likelihood: Medium
    impact: High
    mitigation: Limit supported stacks, templatize connectors, and refuse customers outside the first integration playbook.
  - risk: The beachhead market stays too small for venture returns without credible expansion.
    likelihood: Medium
    impact: High
    mitigation: Use first-customer data to decide within 18 months whether to move upmarket, add adjacent categories, or develop routing and planning extensions.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5–3.5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund an initial 6-person product and implementation team, complete 2-3
    paid metro pilots, ship reusable connectors for the first supported
    commerce stacks, and convert the first chainwide rollouts before scaling
    sales.
