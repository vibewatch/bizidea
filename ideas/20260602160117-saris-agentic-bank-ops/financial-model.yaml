modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> QualifiedPilots
      QualifiedPilots --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: The base case reaches $5.4M of Y3 revenue by expanding from 2 paying accounts in Y1 to 22 by Q4Y3 while lifting blended ACV through workflow and volume expansion.
- checkName: Must go right
  finding: Pilots need to convert fast enough to deliver 9 production customers by Q4Y2 because the cash low point occurs before partner-led expansion has fully reduced burn.
- checkName: Model breaks if
  finding: If procurement drag keeps Q4Y3 below 18 customers or gross margin near 67%, the downside case dips slightly below zero cash and forces an earlier raise.
- checkName: Next-round proof
  finding: The next financing case is strongest once the company shows 8-10 production logos, two repeatable stack combinations, and expansion revenue inside existing institutions.
sanityChecks:
  ruleOf40: Y3 growth 180.9% + EBITDA margin 0.4% = 181.3%
  burnMultiple: Y2 net burn $1.28M / net new revenue $1.70M = 0.76x; Y3 reaches slight positive EBITDA.
  revenuePerFte: $320K Y3 on 17 EOY FTE (benchmark $200-400K SaaS)
  flags:
  - Base-case cash still bottoms in Y3 before the model turns EBITDA positive, so timing slippage in pilot conversion matters more than modest cost overruns.
  - Blended ACV rises above the initial roughly $300K wedge by Y3; that requires real workflow expansion, not just logo growth.
  - The LTV/CAC ratio looks very strong because churn is modeled as sticky enterprise software behavior before retention data exists.
