scenarios:
  downside:
    description: Slower pilot conversion, lower expansion revenue, and slightly worse gross margin keep the company fundraising before full self-funding.
    y3RevenueK: 4404.7
    y3EbitdaK: -837.0
    cashLowPointK: -89.2
    keyAssumptionChanges:
    - Q4Y3 customers end at 18 instead of 22.
    - Blended ACV expansion is about 6% lower than base.
    - Gross margin settles at 67% because implementation support stays heavier for longer.
  base:
    description: Paid pilots convert into nine production logos by the end of year two and expansion revenue lifts blended ACV as trust grows.
    y3RevenueK: 5442.0
    y3EbitdaK: 21.7
    cashLowPointK: 886.7
    keyAssumptionChanges:
    - Q4Y2 reaches 9 production customers and Q4Y3 reaches 22.
    - Blended revenue per active customer rises from about $26K monthly in early Y2 to about $31K by Y3 exit through workflow and volume expansion.
    - Gross margin holds at the 70% target from the business plan.
  upside:
    description: Faster partner-sourced wins and stronger expansion make the seed round comfortably sufficient through the model horizon.
    y3RevenueK: 6624.3
    y3EbitdaK: 981.5
    cashLowPointK: 1500.9
    keyAssumptionChanges:
    - Q4Y3 customers end at 24 instead of 22.
    - Expansion lifts blended ACV faster on older accounts.
    - Gross margin reaches 72% as implementation becomes more repeatable.
