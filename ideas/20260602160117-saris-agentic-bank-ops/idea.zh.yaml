jobsToBeDone:
- job: 当按揭或 HELOC 进件量突然冲高时，帮我们的贷款运营团队自动清掉常规档案例外、把缺失条件追回来，这样我们就能在不继续招审核员的情况下，把审批周期压住。
  currentAlternative: 在 LOS 队列里手工对 checklist，再配合电子表格、邮件和临时工。
  successMetric: 从档案提交到进入可决策状态的天数，以及每名审核员能清掉的档案数。
- job: 当审计或合规团队追问某份贷款档案为什么被清掉或升级时，帮管理者直接拿出触发该决定的政策规则、证据和审核动作，而不是事后再靠人手回拼档案历史。
  currentAlternative: 靠人工 QA 抽样，再从备注和系统时间戳里事后还原。
  successMetric: 生成一份站得住脚的单档案审计包所需工时，以及例外返工率。
