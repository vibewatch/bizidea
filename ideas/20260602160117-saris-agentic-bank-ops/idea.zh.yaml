problem: 对区域性银行和信用合作社来说，号称数字化的按揭和 HELOC 流程里，仍会平白丢掉好几天。真正卡住的不是进件，而是贷款档案进了 LOS 之后，怎么把不完整、互相冲突、又不符合政策的文件清干净。运营人员要在 MeridianLink 或 Encompass、Fiserv 里的核心数据、扫描件和邮件之间来回切换，核字段、追缺件、判断哪些档案必须升级给人工。这会把积压一下子顶高，拉慢放款转化，也让合规风险冒头——偏偏此时放贷团队还想在不按人数线性扩编的前提下把量做上去。
targetUser:
  primary: 在美国区域性银行和信用合作社里，负责消费类房贷运营的管理者；机构以 Fiserv 为核心系统，按揭和 HELOC 流程跑在 MeridianLink 或 Encompass 上
  secondary: 负责预承保前文件完整度和例外队列的建档、披露和质控负责人
  buyer: 首席运营官、按揭运营负责人，或消费金融业务执行副总裁
startupThesis:
  nonObviousInsight: 下一家真正值钱的银行自动化公司，不会是那个什么文件都读的通用 agent 层，而是把混乱贷款包清成“可决策档案”的例外清理系统——同时还能在现有核心系统和 LOS 栈里留下站得住脚的审计轨迹。通用抽取一旦够用，真正稀缺的产品就变成工作流图谱：下一步该补什么、哪些可以自动放行、哪些必须按银行政策升级处理。
  beachhead: 资产规模在 $5B-$50B 的美国区域性银行和多网点信用合作社；它们有集中式按揭和 HELOC 档案审核团队，每周处理至少 200 份进件，并且经常在 MeridianLink 或 Encompass 里堆出条件件或补充材料积压
  wedge: 一套例外清理 OS：读取进来的贷款包，对照放贷政策和核心系统数据，自动消掉常规差异，为缺失条件起草借款人和网点的跟进请求，只把政策例外连同完整证据日志交给人工审核
  whyNowCatalyst: Saris 的融资、与在位系统栈的集成，以及生产级准确率指标，说明银行现在已经相信：狭窄的 agent 工作流可以碰真实贷款档案。例外清理因此第一次成了能单独立预算的痛点。
  ventureScalePath: 先把按揭和 HELOC 档案补齐，再往小企业贷款、贷后质控、servicing boarding、存款运营的文档例外延伸，最后做成银行在贷款和合规环节统一处理运营例外的系统记录。
solution: 产品接上银行的 LOS、文档仓库和核心数据，不要求机构替换现有系统。每来一份档案，系统都会按产品、网点和政策画像生成一张动态条件清单，再把提交的文件和抽取出的字段，与 Fiserv、MeridianLink、Encompass 里银行已知的数据逐项对比。像过期工资单、未签字披露、缺失保险页、借款人属性不一致这类常规差错，不再躺在分析师收件箱里，而是直接变成结构化跟进任务和面向借款人的请求。人工审核员只看那些确实需要判断的升级件，同时能看到触发例外的精确证据和政策规则。时间一长，公司会沉淀出一套专有数据：哪些例外清得最快、哪些网点最容易制造返工、哪些政策步骤最吃掉周期。
goToMarketSeed:
  firstCustomer: 一家美国信用合作社或区域性银行：有集中式房屋净值贷款和首套按揭运营团队、25-100 家网点，并且在利率波动、营销活动或网点带量上升之后，反复出现不完整档案积压。
  buyingTrigger: 再融资或 HELOC 量突然上来、新并购一片网点、管理层要求在不增员的情况下压缩贷款周期，或监管/内审对文档与例外处理提出问题。
  currentAlternative: 在 LOS 任务队列、电子表格、共享邮箱、BPO 或临时工之间手工审档，再叠加一些挂在银行旧软件上的临时宏。
  switchingReason: 首个客户会切过来，是因为这套切口能更快清掉常规条件件，在不做核心系统迁移的前提下把积压压下去，还能给管理层一条按政策归档的证据链——这件事人工团队和通用 RPA 都做不稳。
  pricingHypothesis: 按启用的贷款工作流和月度档案量收年费，外加政策映射和核心系统集成的实施费。
