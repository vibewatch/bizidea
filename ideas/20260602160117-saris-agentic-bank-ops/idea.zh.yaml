differentiator: 这不是通用银行 copilot、OCR 供应商，也不是一堆 RPA 脚本外包。真正能守住的，是放贷机构专属的例外图谱：哪几类文件组合能满足哪条政策规则、什么差异可以安全自动放行、谁必须批准 override、以及日后面对审计或检查时要补哪类证据。这套运行图谱会在客户和产品之间越滚越厚，而现有核心系统、BPO 公司和通用 agent 平台都不擅长把它拼出来。
