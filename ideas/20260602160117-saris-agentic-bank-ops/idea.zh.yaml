topRisks:
- name: 集成拖累
  description: 如果创业公司必须先深度打通 LOS、核心系统和文档系统，银行部署很容易在价值显现前就卡住。
  mitigation: 先用只读叠加层和一个例外密集流程起步，证明积压下降和周期改善后，再逐步加深集成。
- name: 自动化信任缺口
  description: 如果贷款和合规负责人担心隐藏错误或审查压力，可能不愿让 agent 直接清条件件。
  mitigation: 让人工继续把关政策例外，给每一步动作都露出单档案证据，并先从容易验证的低风险条件类目开始。
- name: 在位厂商功能侵蚀
  description: 一旦用例被验证，LOS 供应商或 BPO 服务商可能很快补上基础 AI 审核功能。
  mitigation: 胜负手放在跨系统例外编排和跨在位系统栈的审计级证据，而不是单纯文档抽取。
