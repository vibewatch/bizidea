slug: loan-exception-clearance-os
date: '2026-06-02'
executiveSummary: 这家公司应该先从美国区域性银行和大型信用合作社的按揭、HELOC 档案例外清理层做起——前提是这些机构已经在 MeridianLink 或 Encompass 上跑流程，底下连着 Fiserv 等现有核心系统。最急的痛点不是通用文档进件，而是那些反复堆积的不完整、互相冲突、又带政策敏感性的档案队列：它们拖慢审批、抬高加班和 BPO 成本，也让管理层暴露在 QC 与审计压力下。第一版产品应是一套只读、按政策映射的工作流：识别低风险例外、起草跟进动作，只把真正需要判断的案例升级给人工，并为每份档案留下证据轨迹。GTM 应围绕付费试点展开，触发点是积压暴涨、网点扩张或审计发现，因为这些时刻既有预算紧迫感，也能量出清晰的前后对比。只要公司能成为那个“知道哪些例外可以放、需要哪些证据、并且能在 LOS、核心系统、文档和沟通层之间跑通”的系统，就有机会赢。护城河不在 OCR，也不在通用 agent，而在放贷机构专属的例外图谱、override 历史和由真实生产工作流沉淀出的基准数据。需要谨慎的点主要有三个：集成拖累、银行对自动清理的信任，以及滩头市场里是否真有足够多机构具备足以支撑年合同 $300k+ 的队列密度。前 12 个月因此要同时证明两件事：低风险例外可以在几乎不被审核员推翻的前提下被清掉；以及付费试点能在主流系统组合上稳定转成正式生产部署。
problem:
- 区域性银行的按揭和 HELOC 运营团队，至今还要在 LOS 队列、电子表格、邮件和核心系统数据之间手工清不完整档案；一旦积压上来，放款转化就变慢，还会逼出加班或 BPO 成本。
- 银行还需要单档案级别的证据，去应对 QC、审计和第三方风险审查，所以黑箱自动化或通用 OCR 根本解决不了治理负担。
solution:
- 在以 MeridianLink、Encompass、Fiserv 为中心的流程之上叠一层按政策映射的例外引擎：识别缺失或冲突条件、起草下一步动作，只把政策例外交给人工。
- 为每一次自动放行、跟进和升级都生成完整审计证据日志，让管理者能把吞吐提升拿给 QC、合规和检查团队讲清楚。
whyWeWin:
- 围绕按揭和 HELOC 工作流的专项例外图谱，比通用文档 AI 更能守住：它沉淀的是放贷机构特有的规则、跟进顺序和 override 模式。
- 从只读、低风险条件类目起步，既能压低集成和信任摩擦，又能交出明确的积压与周期改善——这是在位厂商和 BPO 都很难干净呈现的价值。
strategicChoices:
  beachhead: 美国区域性银行和大型多网点信用合作社：资产规模 $5B-$50B，有集中式按揭和 HELOC 运营团队，每周进件 200 份以上，并且在 MeridianLink 或 Encompass 里长期堆着条件件或补件队列。
  wedgeRationale: 按揭和 HELOC 的例外清理，比更宽的银行运营平台更容易先拿到买方、预算触发器和 ROI 基线；与其一开始做承保、贷后服务或存款运营，不如先在这里更快跑出验证。
  sequencingRationale: 先做只读识别、引导式跟进和“人工批准后才自动清理”的低风险规则，先把合规信任拿下来；之后再加写回自动化、更深的集成、伙伴分发和相邻工作流。
  notYet:
  - 小企业贷款和存款运营例外
  - 全自动承保决策
  - 端到端借款人获客或前台发起系统
market:
  tam: 估算 TAM 为 $636.8M：1,592 家存款类放贷机构 × 约 $400k ACV。
  sam: 估算滩头 SAM 为 $149.8M：428 家区域性银行和复杂型信用合作社 × 约 $350k ACV。
  som: 第 3 年 SOM 为 $6.6M：基于 22 家滩头客户、每家约 $300k ARR。
  segments:
  - 资产规模 $5B-$50B、在 MeridianLink 或 Encompass 上跑集中式按揭和 HELOC 运营的美国区域性银行
  - 资产超过 $500M、拥有集中式房屋净值贷款与按揭档案审核团队的大型多网点信用合作社
  buyingProcess: 预算通常挂在按揭运营负责人、消费金融执行副总裁或 COO 名下，但最终签字还要过 IT、采购、风险和合规，因为产品碰的是受监管工作流。最快的路径，是把付费试点绑在一个真实积压或审计发现上；能否转正式生产，则取决于周期缩短、审核员推翻率和审计可解释性。
product:
  mvp: MVP 以只读方式接入 MeridianLink 或 Encompass，再接一个文档源，生成放贷机构专属条件清单，标出低风险例外、起草借款人或网点跟进，并给审核员一个有证据支撑的升级队列。第一步只服务一个集中式运营团队的按揭和 HELOC 档案，不急着做写回自动化。
  sixMonth: 在一个 LOS-核心系统组合上跑出正式生产部署，带上低风险自动清理规则、队列分析和可导出的审计包。
  twelveMonth: 补上 Fiserv 数据增强、人工批准动作的写回能力、网点级基准分析，以及第二条工作流——比如贷后 QC 或补件清理。
  twentyFourMonth: 把例外图谱扩进相邻贷款工作流，成为横跨按揭、HELOC 和部分消费金融队列的跨产品例外处理层。
  keyBets:
  - 银行会先接受只读和人工批准式自动化，再逐步放开自主写回。
  - 前几家客户之后，可复用的条件类目和政策规则库会显著压缩实施时间。
  - 续约和扩张里，队列分析与审计证据的重要性，不会低于原始文档抽取能力。
gtm:
  wedge: 把“压积压”的付费试点卖给已经上了 MeridianLink、Encompass 或 Fiserv 的银行与信用合作社的按揭/HELOC 运营负责人，先从 90-120 天内能看出周期和人力缓解的低风险例外类目切入。
  channels:
  - 创始人主导外呼，直达 428 家滩头机构里的按揭运营负责人、消费金融 EVP 和 COO
  - 通过已服务 MeridianLink、Encompass、Fiserv 客户的 LOS、核心系统和实施顾问拿转介绍与联合销售机会
  - 围绕积压暴增、网点并购或审计发现，把共创客户转成正式机会
  funnelTargets: 发现到合格试点 25-35%，合格试点到付费试点 40-50%，付费试点到正式生产 50%+；首条工作流上线后 9 个月内，有 50% 的正式生产客户会扩到第二个流程。
  pricing: 对政策映射和集成收一次性实施费，再按工作流和月度档案量收年度平台费；比按席位收费更贴合“清积压”的 ROI，也更容易把正式生产 ACV 拉到 $300k+。
businessModel:
  revenueStreams:
  - 按揭和 HELOC 例外清理工作流的年度平台订阅
  - 实施和政策配置费用
  - 随着档案量和用例扩张而产生的超量收费或新增工作流费用
  unitOfValue: 带完整审计证据、被清到可决策状态的贷款档案
  targetGrossMarginPct: 70
  expansionLevers:
  - 首个按揭或 HELOC 部署跑通后，新增贷后 QC 和补件工作流
  - 从一个集中式运营团队扩到同一机构内更多产品、网点和代理渠道
  - 在工作流数据足够之后，将跨客户基准和队列分析单独授权
strategyMap:
  northStarMetric: 每名运营 FTE 清出的“可决策档案”数量，且审计证据无未解决缺口
  inputMetrics:
  - 低风险例外的无接触清理率
  - 从收档到进入可决策状态的中位小时数
  - 自动清理或系统推荐动作被审核员推翻的比例
  - 试点转正式生产的转化率
  - 主流系统组合完成实施所需天数
  moatsToBuild:
  - 覆盖按揭与 HELOC 条件类目的放贷机构专属例外图谱
  - 对齐银行风险和 QC 审查的单档案审计轨迹与 override 历史
  - 面向 MeridianLink、Encompass、Fiserv 和常见文档源的集成模板
  - 围绕队列老化、网点错误模式和清理结果的跨客户基准
  killCriteria:
  - 前 10 个共创客户里，如果少于 3 家确认每周 200+ 份档案且愿意跑付费试点，立即收缩。
  - 在试点里，低风险例外如果做不到至少 20% 无接触清理、且审核员推翻率低于 1%，停止扩张。
  - 前两次实施之后，如果中位上线时间仍超过 120 天，说明模式不成立。
  mermaid: "flowchart LR\n  Wedge[Mortgage and HELOC exception clearance] --> MVP[Read-only policy-mapped MVP]\n  MVP --> Proof[Backlog reduction and audit-ready evidence]\n  Proof --> Expansion[More workflows and deeper integrations]\n"
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: 中等信念：买方痛点、工作流切口和 ROI 逻辑都很强，但部署信任和滩头密度还需要一线客户直接验证。
    whyBelieve: 银行已经在给文档和工作流自动化拨预算，这家公司切入的是更窄的例外清理层——这块既不是在位厂商的强控制区，也不是通用 OCR 工具能干净拿下的。
    whyDoubt: 如果具备足够队列量、愿意支付 $300k+ 的机构太少，或者审计要求大部分高频例外都继续由人工清理，这个假设就会失效。
    nextDiligence: 和 5-10 家真实放贷机构核实：哪些例外类型最适合先自动清理，以及 90 天试点能否转成 $250k-$350k 的正式生产 ARR。
  firstCustomer:
    title: 一家资产规模 $5B-$50B 的区域性银行或大型多网点信用合作社里的集中式按揭与 HELOC 运营团队
    profile: 运行 MeridianLink 或 Encompass，底层连接 Fiserv 或同类核心系统；每周处理 200+ 份进件；在利率变动或网点带量上来后，经常堆出条件件和补件积压。
    trigger: 进件量暴涨、并购了新网点、管理层要求不增员压缩周期，或文档与例外处理被审计点名。
    buyer: 按揭运营负责人、消费金融 EVP 或 COO
    initialContract: 先签一个面向单一工作流、单一运营团队的 $50k-$100k 付费试点；如果积压、周期和审核员工时指标达标，再转为约 $250k-$350k 的年度正式生产 ARR。
  mustBeTrue:
  - 428 家滩头机构里，至少 30% 的集中式队列量和人力痛点足够大，能支撑年合同 $300k+。
  - 第一版发布能自动清理或预处理至少 20% 的低风险例外，且审核员推翻率低于 1%。
  - 只读集成加证据导出，就足以在拿到完整写回权限之前证明 ROI。
  - 试点客户买单的核心是压积压和审计可解释性，而不是等 LOS 供应商自己把原生自动化补齐。
  - 在主流 MeridianLink/Encompass + Fiserv 组合上，产品能在 90-120 天内完成实施。
  diligenceQuestions:
  - 在按揭和 HELOC 队列里，哪些例外类型出现最频繁，且最适合先自动清理？
  - 目标放贷机构里，真正符合每周档案量和集中式团队画像的有多少？
  - 风险与合规团队在批准 agent 式清理正式生产前，究竟要求什么样的证据包？
  - 当银行使用非 Fiserv 核心系统或定制文档仓库时，实施复杂度会增加多少？
  - 为什么银行会买这层叠加软件，而不是延伸 Ocrolus、CANDOR、Coviance 或 LOS 原生流程？
operatingAssumptions:
- assumption: 大约三分之一的滩头市场，周度档案量和积压痛感足够强，能撑起 $300k+ 的正式生产合同。
  basis: research.yaml
  validationTest: 收集 25 个目标账户的周度档案量、人员配比和积压天数，确认至少 8 家符合画像。
  decisionImpact: 如果不成立，就把 ICP 收紧到更高量级放贷机构，同时下调近期收入预期。
- assumption: 第一版正式生产可以聚焦在缺签名、文件过期、借款人字段不一致等低风险条件类目上，而不会触发明显的审查员反对。
  basis: idea.yaml
  validationTest: 和共创客户一起建立例外类目 taxonomy，并拿到 QC 或合规负责人对首批自动清理集合的书面确认。
  decisionImpact: 如果不成立，就把产品重定位成“引导式例外分诊”，而非无接触清理，早期 ROI 叙事也要收缩。
- assumption: 只读叠加到 MeridianLink 或 Encompass 再连文档仓库，就能在深度写回之前先做出足够价值。
  basis: idea.yaml
  validationTest: 前两个试点只给只读权限，验证周期和审核员工时是否都能提升至少 20%。
  decisionImpact: 如果不成立，就要扩大实施范围、更早招集成人才，并接受更长销售周期。
- assumption: 按工作流加档案量定价，比按席位定价更容易让买方过会，因为预算本来就绑在积压缓解和档案吞吐上。
  basis: operator judgment
  validationTest: 做 10 次买方定价访谈，确认至少 6 位更偏好工作流/档案量分档，而非 seat-based pricing。
  decisionImpact: 如果不成立，就改成席位费加成功费的组合，降低采购阻力。
- assumption: 一旦有首个案例，实施伙伴和 LOS 生态联系人会贡献一块有意义的合格机会池。
  basis: research.yaml
  validationTest: 拿下 3 份转介绍合作协议，并跟踪 12 个月内伙伴来源线索是否占到合格 pipeline 的至少 20%。
  decisionImpact: 如果不成立，就要接受更重更贵的直销动作和更慢的 logo 获取速度。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 25 位按揭和 HELOC 运营负责人，并从至少 5 个共创客户收集真实积压分类数据。
  hypothesis: 高频、低风险的例外类目足够集中，能支撑一个边界清楚的首发版本。
  successMetric: 5 个共创客户愿意共享队列数据，且前 10 大例外类目覆盖至少 60% 的人工审核量。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 在一位 MeridianLink 客户和一位 Encompass 客户的历史贷款档案上，做只读例外分诊原型。
  hypothesis: 产品能以显著低于人工返工的成本，识别并预处理低风险例外。
  successMetric: 至少 20% 的档案进入预处理状态，且抽样输出的审核员推翻率低于 1%。
  owner: 创始工程师
- horizon: 3–6 个月
  experiment: 围绕真实积压或审计整改事件，启动两个付费试点。
  hypothesis: 绑在具体触发器上的试点，会比泛 AI 转型销售更快成交。
  successMetric: 拿下 2 个付费试点，并在 120 天内都把进入可决策状态的中位时间压低至少 20%。
  owner: 创始人/CEO
- horizon: 3–6 个月
  experiment: 把审计证据导出和审核员 override 日志打包给合规团队评审。
  hypothesis: 可解释性和单档案证据，会明显降低供应商风险审查的阻力。
  successMetric: 两个试点客户都批准继续正式生产，而不要求专门为模型黑箱再走一套例外流程。
  owner: 产品与风险负责人
- horizon: 6–12 个月
  experiment: 在首个正式生产客户上，加上 Fiserv 数据增强和人工批准动作的有限写回。
  hypothesis: 一旦信任建立，选择性写回会显著提升粘性和扩张空间。
  successMetric: 1 个正式生产客户采纳写回能力，并把年合同价值提升至少 25%。
  owner: 集成工程师
- horizon: 9–15 个月
  experiment: 通过 MeridianLink、Encompass 顾问和信用合作社实施公司，测试伙伴带来的销售 pipeline。
  hypothesis: 案例跑出来之后，伙伴转介绍能比纯外呼带来更便宜的合格 pipeline。
  successMetric: 伙伴来源机会占到合格 pipeline 至少 20%，且胜率不低于创始人主导外呼。
  owner: 合作伙伴负责人
operations:
- 维护一套映射到条件类目、升级规则和批准后跟进模板的放贷政策库。
- 在首条工作流稳定前，与每个正式生产客户每周复盘积压和周期。
- 所有自动动作都走人工批准控制平面、不可篡改日志和可导出的审计包。
- 在支持长尾系统之前，先把最常见的 MeridianLink/Encompass + Fiserv 组合做成预置集成。
- 优先招募已经在目标机构内部做配置工作的实施伙伴。
team:
- role: CEO / 贷款运营背景创始人
  startTiming: Month 0
  rationale: 这个市场买的是领域可信度，所以创始人必须亲自扛发现、创始人主导销售、政策映射和共创客户交付。
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责搭建例外引擎、证据模型，以及第一批 LOS 和文档集成。
- role: 实施工程师
  startTiming: Month 3
  rationale: 缩短上线时间，避免创始人被银行客户的定制配置工作长期拖住。
- role: 产品与风险负责人
  startTiming: Month 6
  rationale: 把 QC、审计和第三方风险要求翻成产品控制项和部署标准。
- role: 企业客户 AE
  startTiming: Month 9
  rationale: 在首个案例和“试点转正式生产”打法跑通后，补上可复制的 pipeline 覆盖。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 5 个覆盖区域性银行和大型信用合作社的共创客户。
  - 启动 2 个付费试点，并至少转化 1 个正式生产 ARR。
  - 支持首批 MeridianLink 和 Encompass 系统组合的只读部署。
  - 证明低风险例外能将进入可决策状态的时间压低至少 20%，且审核员推翻率低于 1%。
- horizon: 12–24 个月
  items:
  - 滩头市场里做到 8-10 个正式生产客户。
  - 补上 Fiserv 数据增强、有限写回，以及贷后 QC 或补件工作流。
  - 把伙伴来源 pipeline 跑成可复制的第二渠道。
  - 发布跨客户的队列老化和无接触清理表现基准。
- horizon: 24–36 个月
  items:
  - 在现有客户内部扩到更多消费金融和贷后例外工作流。
  - 在头部账户里，成为多个业务线默认采用的例外清理层。
  - 证明增长不只靠新 logo，还来自扩张收入。
  - 在按揭和 HELOC 单位经济性跑通后，为更广的银行运营品类扩张做准备。
risks:
- risk: LOS、核心系统和文档系统的集成拖慢价值落地。
  likelihood: High
  impact: High
  mitigation: 先做只读叠加层，先把最常见系统组合标准化，再在扩销售前补足实施人才。
- risk: 银行不够信任自动清理决策，无法让系统真正替掉成规模的人工工作。
  likelihood: High
  impact: High
  mitigation: v1 只碰低风险例外，政策敏感案例继续要求人工批准，并给每次动作露出单档案证据。
- risk: LOS 或相邻工作流厂商补上更多原生自动化，压缩这个切口。
  likelihood: Medium
  impact: High
  mitigation: 差异化放在跨系统例外编排、放贷机构专属政策图谱和审计级证据，而不是抽取本身。
- risk: 真实滩头市场比预测更小，因为具备集中式队列和足够档案量的机构太少。
  likelihood: Medium
  impact: High
  mitigation: 尽早验证量级门槛，先打更高资产规模放贷机构，并靠多工作流部署拉高 ACV，而不是只靠 logo 数。
- risk: 销售周期被供应商风险和采购审查拉长。
  likelihood: High
  impact: Medium
  mitigation: 把对齐 NIST AI RMF 的控制项打包好，用真实积压事件驱动的付费试点推进，并借助受信任的实施伙伴。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3-5M
  runwayMonths: 18
  useOfFundsSummary: 融资 18 个月，用来验证滩头市场：拿下 5 个共创客户、2 个付费试点、在主流银行系统组合上跑出首批正式生产部署，并配一支覆盖产品、集成和领域销售的小团队。
