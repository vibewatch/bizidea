modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads[线索] --> QualifiedPilots[合格试点]\n  QualifiedPilots --> PaidPilots[付费试点]\n  PaidPilots --> ProductionCustomers[正式生产客户]\n  ProductionCustomers --> SubscriptionRevenue[订阅收入]\n  SubscriptionRevenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景在 Y3 做到 $5.4M 收入：客户数从 Y1 的 2 个付费账户扩到 Q4Y3 的 22 个，同时靠工作流和量级扩张抬升混合 ACV。
- checkName: 必须做对的事
  finding: 试点必须足够快地转成正式生产，才能在 Q4Y2 做到 9 个客户；因为现金低点出现在伙伴扩张真正降低烧钱之前。
- checkName: 模型会失效的条件
  finding: 如果采购拖延让 Q4Y3 客户数低于 18 个，或毛利率长期停在 67% 左右，下行情景就会轻微跌破零现金，并被迫更早融资。
- checkName: 下一轮融资证明
  finding: 只要公司能拿出 8-10 个正式生产 logo、两套可复制系统组合，以及现有机构内的扩张收入，下一轮融资故事就最扎实。
sanityChecks:
  ruleOf40: Y3 growth 180.9% + EBITDA margin 0.4% = 181.3%
  burnMultiple: Y2 net burn $1.28M / net new revenue $1.70M = 0.76x; Y3 reaches slight positive EBITDA.
  revenuePerFte: $320K Y3 on 17 EOY FTE (benchmark $200-400K SaaS)
  flags:
  - 基础情景下，现金低点仍出现在模型转正 EBITDA 之前，所以试点转化节奏的滑坡，比温和的成本超支更危险。
  - 到 Y3 时，混合 ACV 已高于最初约 $300K 的切口，这要求公司真正做出工作流扩张，而不只是多签 logo。
  - LTV/CAC 看起来非常强，主要因为模型把流失率按高粘性企业软件处理，但目前还没有真实留存数据。
