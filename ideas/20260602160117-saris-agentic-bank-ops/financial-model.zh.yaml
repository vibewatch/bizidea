scenarios:
  downside:
    description: 试点转化更慢、扩张收入更弱、毛利率略差，公司在实现自我造血前就得再融资。
    y3RevenueK: 4404.7
    y3EbitdaK: -837.0
    cashLowPointK: -89.2
    keyAssumptionChanges:
    - Q4Y3 客户数收在 18 家，而不是 22 家。
    - 混合 ACV 扩张幅度比基础情景低约 6%。
    - 由于实施支持长期偏重，毛利率最终停在 67%。
  base:
    description: 付费试点在第 2 年底转成 9 个正式生产 logo，随着信任提升，扩张收入也把混合 ACV 一路往上拉。
    y3RevenueK: 5442.0
    y3EbitdaK: 21.7
    cashLowPointK: 886.7
    keyAssumptionChanges:
    - Q4Y2 做到 9 个正式生产客户，Q4Y3 做到 22 个。
    - 单个活跃客户的混合收入，从 Y2 早期每月约 $26K，提升到 Y3 末约 $31K，靠的是工作流扩张和量级扩张。
    - 毛利率守住商业计划里的 70% 目标。
  upside:
    description: 伙伴带来的成交更快、扩张更强，seed 轮资金在整个模型期内都相对充足。
    y3RevenueK: 6624.3
    y3EbitdaK: 981.5
    cashLowPointK: 1500.9
    keyAssumptionChanges:
    - Q4Y3 客户数收在 24 家，而不是 22 家。
    - 老客户的扩张让混合 ACV 提升得更快。
    - 随着实施越来越可复制，毛利率提升到 72%。
