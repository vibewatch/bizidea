  growthRate: 20.0% projected 2025-2026 mortgage originations growth
  growthRateSourceRefs: [16]
  tailwinds:
    - point: Fannie Mae forecasts mortgage originations rising from $1.90T in 2025 to $2.28T in 2026, expanding the amount of lending work flowing through lender operations teams.
      sourceRefs: [16]
    - point: HELOC demand is rebounding as homeowners avoid cash-out refinance, creating sustained demand for document-heavy second-lien workflows.
      sourceRefs: [17]
    - point: Mortgage tech vendors increasingly sell automation on cycle-time and cost outcomes, making this category easier to budget against.
      sourceRefs: [5, 11, 18]
  headwinds:
    - point: Banks must evaluate third-party risk through the full vendor life cycle, which lengthens sales cycles for agentic systems.
      sourceRefs: [21]
    - point: QC defect rates and mortgage reporting obligations increase buyer caution around any tool that changes file-level decisions.
      sourceRefs: [8, 24, 27]
competitors:
  - name: Saris
    stage: scale-up
    wedge: Agentic back-office workflows across lending, compliance, and operations for banks and credit unions.
    pricing: Custom enterprise pricing; no public list price disclosed.
    strength: Proven bank-oriented positioning with auditable actions, named incumbent integrations, and backlog-clearing proof points.
    weaknessVsUs: Broader workflow scope may leave room for a more specialized mortgage and HELOC exception-clearance graph optimized for regional-bank ops teams.
    sourceRefs: [1, 2, 3]
  - name: Ocrolus
    stage: scale-up
    wedge: Mortgage document analysis, income calculations, and automated condition creation/clearance tied to Encompass workflows.
    pricing: Custom enterprise pricing; no public list price disclosed.
    strength: Strong document-ingestion, income-analysis, and condition-management posture with lender brand references.
    weaknessVsUs: More document and underwriting centric than cross-system operational remediation for depository institutions using mixed core and LOS stacks.
    sourceRefs: [10, 11]
  - name: CANDOR Technology
    stage: scale-up
    wedge: AI underwriting decision engine that emulates underwriter thinking, creates and clears conditions before human review, and supports repurchase defense.
    pricing: Custom enterprise pricing; no public list price disclosed.
    strength: Deep underwriting focus and explicit positioning around condition clearing and consistent loan decisioning.
    weaknessVsUs: Anchored in mortgage underwriting rather than broader exception operations spanning HELOC, follow-up communications, and bank back-office queues.
    sourceRefs: [9]
  - name: Coviance
    stage: scale-up
    wedge: Home equity and HELOC workflow automation with policy-mapped workflows, HMDA reporting, and LOS integrations.
    pricing: Custom enterprise pricing; no public list price disclosed.
    strength: Strong fit for home-equity lenders and credit unions that want a purpose-built digital process with compliance features.
    weaknessVsUs: More centered on end-to-end home-equity origination than on cross-product exception resolution across mortgage, HELOC, QC, and other bank ops queues.
    sourceRefs: [8]
  - name: Blend
    stage: incumbent
    wedge: Digital mortgage and home-equity origination suite focused on borrower experience, self-serve workflows, and lender ROI.
    pricing: Custom enterprise pricing; no public list price disclosed.
    strength: Deep bank adoption, strong front-to-middle funnel UX, and proven large-bank case studies.
    weaknessVsUs: Primarily improves origination and borrower engagement rather than owning the lender-specific exception graph across incumbent systems.
    sourceRefs: [5, 6, 7]
regulatoryTechnicalConstraints:
  - point: HMDA reporting and fair-lending scrutiny require structured, defensible treatment of mortgage application and underwriting data.
    sourceRefs: [8]
  - point: Interagency third-party risk guidance raises diligence requirements for any vendor automating material bank workflows.
    sourceRefs: [21]
  - point: GSE post-closing QC expectations require lenders to target high-risk loans and document review methodology, reinforcing the need for traceable exception handling.
    sourceRefs: [24]
  - point: Mortgage data interchange and downstream compatibility depend on standards bodies such as MISMO, so product data models must map cleanly to existing industry schemas.
    sourceRefs: [23]
validationSignals:
  - point: Saris publicly claims 70% task automation, auditable actions, and measurable productivity gains for bank workflows.
    sourceRefs: [2]
  - point: MeridianLink reports Saris customer outcomes of 99.8% field accuracy, 10x faster review, 3x capacity, and a 600-loan backlog cleared in four days.
    sourceRefs: [3]
  - point: Blend case studies show regional-bank buyers funding digital lending upgrades to remove manual workflow pain rather than building internally.
    sourceRefs: [7]
  - point: Freddie Mac estimates lenders can save up to $1,700 per loan with greater digital-capability usage, confirming that operational efficiency is budget-linked.
    sourceRefs: [18]
openQuestions:
  - What percentage of regional banks and large credit unions have centralized exception queues large enough to support $300k+ annual spend?
  - Which exception classes can be auto-cleared without triggering examiner, QC, or repurchase concerns?
  - How often do beachhead prospects run MeridianLink or Encompass on top of Fiserv versus other core combinations, and how much does that change implementation effort?
  - Can the product deliver strong value in read-only mode first, or do write-back permissions into LOS and core systems become mandatory too early?
