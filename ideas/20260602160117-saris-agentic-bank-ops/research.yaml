  fiveForces:
    supplierPower:
      score: 3
      rationale: >-
        The product depends on access to LOS, core, and document-AI layers, but multiple infrastructure options exist and no
        single supplier owns the full workflow stack.
      sourceRefs: [11, 12, 29, 30, 31]
    buyerPower:
      score: 4
      rationale: >-
        Regional banks and credit unions buy slowly, run formal vendor diligence, and can compare the product against manual
        work, incumbent workflows, or point tools, so proof of ROI and trust are essential.
      sourceRefs: [18, 21, 28]
    threatOfEntrants:
      score: 3
      rationale: >-
        Foundation models and document-AI tools lower the cost of building a prototype, but bank integrations, QC standards,
        and auditable exception logic still make real deployment meaningfully harder than demoware.
      sourceRefs: [21, 22, 23, 29, 30, 31]
    threatOfSubstitutes:
      score: 4
      rationale: >-
        Buyers can extend LOS workflows, rely on correspondent processes, or keep manual teams and outsourcers in place, so
        the product must outperform existing operational workarounds rather than merely adding AI novelty.
      sourceRefs: [4, 11, 12, 32]
    competitiveRivalry:
      score: 4
      rationale: >-
        Rivalry is intense because several adjacent vendors already claim ROI in mortgage automation, underwriting, home
        equity, or bank back-office AI, even though few own the exact exception-clearance category.
      sourceRefs: [1, 5, 8, 9, 10]
  pestle:
    - factor: political
      impact: neutral
      point: Credit-union and smaller-lender advocacy continues to push for regulatory accommodation, which makes compliance-reducing tooling more relevant but does not remove oversight.
      sourceRefs: [28]
    - factor: economic
      impact: positive
      point: Lenders still face elevated production costs, making software that removes manual touches economically attractive.
      sourceRefs: [18]
    - factor: social
      impact: positive
      point: Borrowers increasingly expect faster, digital-first mortgage and home-equity experiences, raising the cost of slow internal ops.
      sourceRefs: [5, 7]
    - factor: technological
      impact: positive
      point: Document AI and configurable workflow tooling are mature enough that a specialized orchestration layer can ship without inventing base extraction from scratch.
      sourceRefs: [29, 30, 31]
    - factor: legal
      impact: negative
      point: Third-party risk management and mortgage reporting obligations mean any agentic system needs explainability, controls, and evidence preservation from day one.
      sourceRefs: [8, 21, 24]
  adoptionFrictionMatrix:
    - friction: Vendor risk and model-governance review
      severity: high
      affectedBuyer: Bank risk, compliance, and procurement teams
      mitigation: Start with narrow workflows, human approvals, and full action logging mapped to AI RMF and third-party guidance.
      sourceRefs: [21, 22]
    - friction: Integration across LOS, core, and document repositories
      severity: high
      affectedBuyer: Mortgage operations and IT teams
      mitigation: Prioritize read-only overlays and pre-built integrations for the dominant MeridianLink, Encompass, and Fiserv combinations.
      sourceRefs: [3, 11, 12]
    - friction: Trust in automated exception resolution
      severity: high
      affectedBuyer: Mortgage operations leaders and QC managers
      mitigation: Begin with low-risk condition classes, show exact evidence behind every action, and escalate policy exceptions rather than auto-clearing them.
      sourceRefs: [3, 9, 24]
    - friction: Change management for frontline teams
      severity: medium
      affectedBuyer: Underwriters, processors, and branch-originated lending teams
      mitigation: Keep work inside existing systems and show turnaround-time wins rather than forcing a new interface or process.
      sourceRefs: [2, 3, 26]
market:
  tam:
    value: "$636.8M"
    rationale: >-
      Bottom-up estimate: 852 U.S. banks with $1B-$50B in assets (derived from the Federal Reserve ranked bank list) +
      740 complex credit unions with assets above $500M = 1,592 addressable depository lenders; multiplied by an estimated
      $400k annual contract value for a policy-mapped exception-clearance platform yields $636.8M.
    isEstimate: true
    sourceRefs: [18, 19, 20]
  sam:
    value: "$149.8M"
    rationale: >-
      Beachhead estimate: 206 banks with $5B-$50B in assets + an estimated 222 of the 740 complex credit unions (30%)
      matching the multi-branch, centralized mortgage/HELOC-ops profile = 428 institutions; multiplied by an estimated
      $350k annual contract value yields $149.8M.
    isEstimate: true
    sourceRefs: [3, 4, 19, 20]
  som:
    value: "$6.6M"
    rationale: >-
      Year-3 reachable share assumes 22 beachhead customers at an estimated $300k annual recurring revenue each, consistent
      with a focused direct-sales motion into MeridianLink, Encompass, and Fiserv-centered institutions.
    isEstimate: true
    sourceRefs: [3, 11, 12]
