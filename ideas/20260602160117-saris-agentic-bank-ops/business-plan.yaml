slug: loan-exception-clearance-os
date: '2026-06-02'
executiveSummary: >-
  This company should start as an exception-clearance operating layer for mortgage and HELOC files at U.S. regional banks and
  large credit unions that already run MeridianLink or Encompass with incumbent cores such as Fiserv. The urgent pain is not
  generic document ingestion; it is the recurring queue of incomplete, conflicting, and policy-sensitive files that slows
  approvals, creates overtime and BPO spend, and exposes managers to QC and audit scrutiny. The first product should be a
  read-only, policy-mapped workflow that identifies low-risk exceptions, drafts follow-ups, and escalates only judgment-heavy
  cases with a file-level evidence trail. The go-to-market should center on paid pilots triggered by backlog spikes, branch
  expansion, or audit findings, because those moments create both budget urgency and a measurable before-and-after baseline.
  The company can win if it becomes the system that knows which exceptions are safe to clear, what evidence is required, and
  how to work across LOS, core, document, and communication layers without forcing a system replacement. The moat is not OCR
  or generic agents; it is the lender-specific exception graph, override history, and benchmark data gathered from repeated
  production workflows. The main reasons to be cautious are integration drag, bank trust in automated clearance, and the still
  unproven assumption that enough beachhead institutions have queue density to support $300k-plus annual contracts. The first
  12 months therefore need to prove two things at once: that low-risk exceptions can be cleared with near-zero reviewer
  reversal and that paid pilots reliably convert into production deployments on the dominant stack combinations.
problem:
  - Regional-bank mortgage and HELOC ops teams still clear incomplete files manually across LOS queues, spreadsheets, email, and core data, so backlog spikes slow pull-through and force overtime or BPO spend.
  - Banks also need file-level evidence for QC, audit, and third-party-risk review, so black-box automation or generic OCR does not solve the governance burden.
solution:
  - Overlay MeridianLink, Encompass, and Fiserv-centered workflows with a policy-mapped exception engine that identifies missing or conflicting conditions, drafts next actions, and routes only policy exceptions to humans.
  - Produce an audit-complete evidence log for every auto-clear, follow-up, and escalation so managers can defend throughput gains to QC, compliance, and exam teams.
whyWeWin:
  - A specialized exception graph across mortgage and HELOC workflows is more defensible than generic document AI because it captures lender-specific rules, follow-up sequences, and override patterns.
  - Starting with read-only, low-risk condition classes lowers integration and trust friction while still delivering measurable backlog and cycle-time wins that incumbents and BPOs do not surface cleanly.
strategicChoices:
  beachhead: U.S. regional banks and large multi-branch credit unions with $5B-$50B in assets, centralized mortgage and HELOC ops teams, 200-plus inbound files per week, and recurring condition or trailing-document queues in MeridianLink or Encompass.
  wedgeRationale: Mortgage and HELOC exception clearance has a clearer buyer, budget trigger, and ROI baseline than a broader bank-ops platform, so it can reach proof faster than starting with underwriting, servicing, or deposit operations.
  sequencingRationale: Start with read-only detection, guided follow-ups, and human-approved low-risk auto-clear rules so the company can win compliance trust before adding write-back automation, deeper integrations, partner-led distribution, and adjacent workflows.
  notYet:
    - Small-business lending and deposit-operations exceptions
    - Full underwriting decision automation
    - End-to-end borrower acquisition or point-of-sale origination
market:
  tam: "$636.8M estimated TAM from 1,592 depository lenders at roughly $400k ACV"
  sam: "$149.8M estimated beachhead SAM from 428 regional banks and complex credit unions at roughly $350k ACV"
  som: "$6.6M year-3 SOM based on 22 beachhead customers at roughly $300k ARR"
  segments:
    - U.S. regional banks with $5B-$50B in assets running centralized mortgage and HELOC ops on MeridianLink or Encompass
    - Large multi-branch credit unions above $500M in assets with centralized home-equity and mortgage file-review teams
  buyingProcess: >-
    Budget usually sits with the head of mortgage operations, EVP of consumer lending, or COO, but sign-off also requires IT,
    procurement, risk, and compliance because the product touches regulated workflows. The fastest path is a paid pilot tied to
    a live backlog or audit finding, with production approval gated on cycle-time improvement, reviewer reversal rates, and
    auditability.
product:
  mvp: >-
    MVP connects read-only to MeridianLink or Encompass plus one document source, builds a lender-specific condition checklist,
    flags low-risk exceptions, drafts borrower or branch follow-ups, and gives reviewers evidence-backed escalation queues. It
    should support mortgage and HELOC files for one centralized ops team before adding write-back automation.
  sixMonth: Ship production deployment for one LOS-core combination with low-risk auto-clear rules, queue analytics, and exportable audit packets.
  twelveMonth: Add Fiserv data enrichment, write-back for human-approved actions, branch-level benchmarking, and a second workflow such as post-close QC or trailing-document clearance.
  twentyFourMonth: Expand the exception graph into adjacent lending workflows and become the operating layer for cross-product exception handling across mortgage, HELOC, and selected consumer-lending queues.
  keyBets:
    - Banks will adopt read-only and human-approved automation before they permit autonomous write-back.
    - A reusable library of condition classes and policy rules will compress implementation time after the first few customers.
    - Queue analytics and audit evidence will matter as much as raw document extraction in renewals and expansion.
gtm:
  wedge: Sell a paid backlog-reduction pilot to mortgage and HELOC ops leaders at banks and credit unions already on MeridianLink, Encompass, or Fiserv, starting with low-risk exception classes that can show cycle-time and staffing relief in 90-120 days.
  channels:
    - Founder-led outbound to heads of mortgage operations, EVPs of consumer lending, and COOs at 428 beachhead institutions
    - Referrals and co-sell introductions from LOS, core, and implementation consultants already serving MeridianLink, Encompass, and Fiserv accounts
    - Design-partner conversions triggered by volume spikes, branch acquisitions, or audit findings
  funnelTargets: "Discovery to qualified pilot 25-35%, qualified pilot to paid pilot 40-50%, paid pilot to production 50%+, first workflow expansion within 9 months at 50% of production accounts"
  pricing: Charge a one-time implementation fee for policy mapping and integrations plus an annual platform fee indexed to workflow and monthly file-volume band; this matches backlog-driven ROI better than per-seat pricing and supports $300k-plus production ACV once a pilot proves reviewer-hour savings and faster decision-ready files.
businessModel:
  revenueStreams:
    - Annual platform subscription for mortgage and HELOC exception-clearance workflows
    - Implementation and policy-configuration fees
    - Volume-based overage or added-workflow fees as file counts and use cases expand
  unitOfValue: Decision-ready loan file cleared with audit-complete evidence
  targetGrossMarginPct: 70
  expansionLevers:
    - Add post-close QC and trailing-document workflows after the first mortgage or HELOC deployment
    - Expand from one centralized ops team to additional products, branches, and correspondent channels inside the same institution
    - License benchmarking and queue analytics across customers once enough workflow data is accumulated
strategyMap:
  northStarMetric: Decision-ready files cleared per operations FTE with zero unresolved audit evidence gaps
  inputMetrics:
    - Low-risk exception touchless-clear rate
    - Median hours from file receipt to decision-ready status
    - Reviewer reversal rate on auto-cleared or system-recommended actions
    - Pilot-to-production conversion rate
    - Days to complete implementation for the dominant stack combinations
  moatsToBuild:
    - Lender-specific exception graph across mortgage and HELOC condition classes
    - File-level audit trail and override history aligned to bank risk and QC review
    - Integration templates for MeridianLink, Encompass, Fiserv, and common document sources
    - Cross-customer benchmarks on queue aging, branch error patterns, and clearance outcomes
  killCriteria:
    - Fewer than 3 of the first 10 design partners confirm 200-plus files per week and willingness to run a paid pilot.
    - Low-risk exception classes cannot reach at least 20% touchless clearance with under 1% reviewer reversal in pilots.
    - Median time to go live stays above 120 days after the first two implementations.
  mermaid: |
    flowchart LR
      Wedge[Mortgage and HELOC exception clearance] --> MVP[Read-only policy-mapped MVP]
      MVP --> Proof[Backlog reduction and audit-ready evidence]
      Proof --> Expansion[More workflows and deeper integrations]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Moderate conviction because the buyer pain, workflow wedge, and ROI logic are strong, but deployment trust and beachhead density still need direct customer proof.
    whyBelieve: Banks already fund document and workflow automation, and this company targets the narrower exception-clearance layer that incumbents and generic OCR tools do not own cleanly.
    whyDoubt: The thesis fails if too few institutions have queue volume for $300k-plus spend or if auditors force humans to keep clearing most high-frequency exceptions.
    nextDiligence: Verify with 5-10 live lenders which exception classes can be auto-cleared first and whether a 90-day pilot can convert into $250k-$350k production ARR.
  firstCustomer:
    title: Centralized mortgage and HELOC operations team at a $5B-$50B regional bank or large multi-branch credit union
    profile: Runs MeridianLink or Encompass with Fiserv or an equivalent core, processes 200-plus inbound files per week, and carries recurring condition or trailing-document backlogs after rate moves or branch-driven volume spikes.
    trigger: A volume surge, branch acquisition, executive mandate to cut cycle time without hiring, or an audit finding tied to documentation and exception handling.
    buyer: Head of Mortgage Operations, EVP of Consumer Lending, or COO
    initialContract: "$50k-$100k paid pilot for one workflow and one ops team, converting to roughly $250k-$350k annual production ARR if backlog, cycle time, and reviewer-hour targets are hit"
  mustBeTrue:
    - At least 30% of the 428 beachhead institutions have centralized queue volume and staffing pain large enough to support $300k-plus annual spend.
    - A first release can auto-clear or pre-resolve at least 20% of low-risk exceptions with less than 1% reviewer reversal.
    - Read-only integration plus evidence export is enough to show ROI before full write-back permissions are granted.
    - Pilot customers will buy on backlog reduction and auditability rather than waiting for LOS vendors to extend native automation.
    - The product can be implemented in 90-120 days on the dominant MeridianLink or Encompass plus Fiserv combinations.
  diligenceQuestions:
    - Which exception classes recur most often in mortgage and HELOC queues, and which of them are safe to auto-clear first?
    - How many target lenders actually meet the weekly file-volume and centralized-team profile assumed in the SAM?
    - What evidence package does risk and compliance require before approving production use of agentic clearance?
    - How much implementation effort changes when the bank uses non-Fiserv cores or custom document repositories?
    - Why will banks buy this overlay instead of extending Ocrolus, CANDOR, Coviance, or native LOS workflows?
operatingAssumptions:
  - assumption: Roughly one-third of the beachhead market has enough weekly file volume and backlog pain to justify a $300k-plus production contract.
    basis: research.yaml
    validationTest: Collect weekly file counts, staffing ratios, and backlog days from 25 target accounts and confirm at least 8 match the profile.
    decisionImpact: If false, narrow the ICP to higher-volume lenders and lower near-term revenue expectations.
  - assumption: The first production release can focus on low-risk condition classes such as missing signatures, stale documents, and inconsistent borrower fields without triggering major examiner objections.
    basis: idea.yaml
    validationTest: Build a design-partner taxonomy of exception classes and get written sign-off from QC or compliance leaders on the first auto-clear set.
    decisionImpact: If false, reposition the product as guided exception triage rather than touchless clearance, reducing early ROI claims.
  - assumption: Read-only overlays into MeridianLink or Encompass plus document repositories can create enough value before deep write-back integration.
    basis: idea.yaml
    validationTest: Run the first two pilots with read-only access and measure whether cycle time and reviewer-hours improve by at least 20%.
    decisionImpact: If false, increase implementation scope, hire integration talent earlier, and expect slower sales cycles.
  - assumption: Workflow-plus-volume pricing will be easier for buyers to approve than per-seat pricing because budget is tied to backlog relief and file throughput.
    basis: operator judgment
    validationTest: Test pricing with 10 buyer interviews and measure whether at least 6 prefer workflow or volume bands over seat-based pricing.
    decisionImpact: If false, redesign pricing around seat plus success fees to reduce procurement friction.
  - assumption: Implementation partners and LOS ecosystem contacts will generate a meaningful share of qualified opportunities once the first case study exists.
    basis: research.yaml
    validationTest: Secure 3 referral agreements and track whether partner-sourced leads become at least 20% of qualified pipeline within 12 months.
    decisionImpact: If false, plan for a more expensive direct outbound motion and slower logo acquisition.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 25 mortgage and HELOC ops leaders and collect live backlog taxonomy data from at least 5 design partners.
    hypothesis: High-frequency, low-risk exception classes are concentrated enough to support a narrow first release.
    successMetric: Five design partners share queue data and the top 10 exception classes cover at least 60% of manual review volume.
    owner: CEO / founder
  - horizon: 0–90 days
    experiment: Prototype read-only exception triage on historical loan files for one MeridianLink and one Encompass customer.
    hypothesis: The product can identify and pre-resolve low-risk exceptions with materially less rework than manual review.
    successMetric: At least 20% of files reach pre-resolved status with under 1% reviewer reversal on sampled outputs.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Launch two paid pilots tied to active backlog or audit-remediation events.
    hypothesis: A pilot linked to a concrete trigger converts faster than a broad AI transformation sale.
    successMetric: Two paid pilots close and each shows at least 20% reduction in median time to decision-ready status within 120 days.
    owner: CEO / founder
  - horizon: 3–6 months
    experiment: Package audit evidence exports and reviewer override logging for compliance review.
    hypothesis: Explainability and file-level evidence materially reduce vendor-risk objections.
    successMetric: Both pilot customers approve production continuation without requiring a full model-black-box exception process.
    owner: Product and risk lead
  - horizon: 6–12 months
    experiment: Add Fiserv enrichment and limited write-back for human-approved actions at the first production account.
    hypothesis: Selective write-back increases stickiness and expansion potential once trust is established.
    successMetric: One production customer adopts write-back and expands annual contract value by at least 25%.
    owner: Integration engineer
  - horizon: 9–15 months
    experiment: Test partner-led pipeline via MeridianLink, Encompass consultants, and credit-union implementation firms.
    hypothesis: Post-case-study partner referrals can supply cheaper qualified pipeline than pure outbound.
    successMetric: Partner-sourced opportunities become at least 20% of qualified pipeline with win rates equal to or better than founder-led outbound.
    owner: Head of partnerships
operations:
  - Maintain a lender-policy library mapped to condition classes, escalation rules, and approved follow-up templates.
  - Run weekly backlog and cycle-time reviews with each production customer until the first workflow is stable.
  - Use a human-approval control plane, immutable action logs, and exportable audit packets for every automated action.
  - Prioritize pre-built integrations for the dominant MeridianLink or Encompass plus Fiserv combinations before supporting long-tail stacks.
  - Recruit implementation partners that already own configuration work inside target institutions.
team:
  - role: CEO / lending ops founder
    startTiming: Month 0
    rationale: Owns discovery, founder-led sales, policy mapping, and design-partner delivery in a market that buys on domain credibility.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the exception engine, evidence model, and first LOS and document integrations.
  - role: Implementation engineer
    startTiming: Month 3
    rationale: Shortens time to go live and keeps founders from getting trapped in bank-specific configuration work.
  - role: Product and risk lead
    startTiming: Month 6
    rationale: Translates QC, audit, and third-party-risk requirements into product controls and deployment standards.
  - role: Enterprise AE
    startTiming: Month 9
    rationale: Adds repeatable pipeline coverage after the first case study and pilot-to-production playbook are proven.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 5 design partners across regional banks and large credit unions.
      - Launch 2 paid pilots and convert at least 1 to production ARR.
      - Support read-only deployments on the first MeridianLink and Encompass stack combinations.
      - Prove at least 20% reduction in time to decision-ready status and under 1% reviewer reversal on low-risk exceptions.
  - horizon: 12–24 months
    items:
      - Reach 8-10 production customers in the beachhead.
      - Add Fiserv enrichment, limited write-back, and post-close QC or trailing-document workflows.
      - Establish partner-sourced pipeline as a repeatable second channel.
      - Publish cross-customer benchmarks on queue aging and touchless-clear performance.
  - horizon: 24–36 months
    items:
      - Expand into additional consumer-lending and servicing exception workflows inside existing customers.
      - Become the default exception-clearance layer across multiple lines of business at top accounts.
      - Demonstrate that expansion revenue, not just new logos, is driving growth.
      - Prepare for broader bank-operations category expansion once mortgage and HELOC economics are proven.
risks:
  - risk: Implementation drag across LOS, core, and document systems delays value realization.
    likelihood: High
    impact: High
    mitigation: Start with read-only overlays, standardize the dominant stack combinations first, and hire implementation talent before scaling sales.
  - risk: Banks do not trust auto-clear decisions enough to let the system remove meaningful manual work.
    likelihood: High
    impact: High
    mitigation: Limit v1 to low-risk exceptions, require human approval on policy-sensitive cases, and show file-level evidence for every action.
  - risk: LOS or adjacent workflow vendors extend native automation and compress the wedge.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on cross-system exception orchestration, lender-specific policy graphs, and audit-grade evidence rather than extraction alone.
  - risk: The real beachhead is smaller than forecast because too few institutions have centralized queues and sufficient file volume.
    likelihood: Medium
    impact: High
    mitigation: Validate volume thresholds early, target higher-asset lenders first, and expand ACV through multi-workflow deployments rather than logo count alone.
  - risk: Sales cycles stretch under vendor-risk and procurement review.
    likelihood: High
    impact: Medium
    mitigation: Package NIST AI RMF-aligned controls, use paid pilots tied to live backlog events, and leverage trusted implementation partners.
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to prove the beachhead with 5 design partners, 2 paid pilots, the first production deployments on dominant bank stacks, and a small team spanning product, integrations, and domain-led sales.
