problem: >-
  Regional banks and credit unions still lose days inside supposedly digital mortgage and HELOC workflows because the real
  bottleneck is not intake; it is clearing incomplete, conflicting, and policy-misaligned loan files after they hit the LOS.
  Operations staff bounce between MeridianLink or Encompass, core data in Fiserv, scanned documents, and email to verify
  fields, chase missing conditions, and decide which files need human escalation. That creates backlog spikes, slower pull-
  through, and compliance exposure precisely when lenders are trying to grow volume without adding reviewers linearly.
targetUser:
  primary: Consumer real-estate lending operations managers at U.S. regional banks and credit unions running mortgage and HELOC pipelines on MeridianLink or Encompass with a Fiserv core
  secondary: Loan setup, disclosure, and quality-control leads responsible for pre-underwriting file completeness and exception queues
  buyer: Chief Operating Officer, Head of Mortgage Operations, or EVP of Consumer Lending
startupThesis:
  nonObviousInsight: >-
    The next valuable bank-automation company is not the broad agent layer that reads every document; it is the exception
    clearance system that turns a messy loan package into a decision-ready file while preserving a defensible audit trail
    inside incumbent cores and LOS stacks. Once generic extraction works well enough, the scarce product becomes the workflow
    graph for what to request next, what can be auto-cleared, and what must be escalated under bank policy.
  beachhead: >-
    U.S. regional banks and multi-branch credit unions with $5B-$50B in assets that run centralized mortgage and HELOC file
    review teams, process 200 or more inbound files per week, and regularly build condition or trailing-document backlogs in
    MeridianLink or Encompass
  wedge: >-
    An exception-clearance OS that reads inbound loan packages, matches them against lender policy and core-system data,
    auto-resolves routine discrepancies, drafts borrower and branch follow-ups for missing conditions, and routes only policy
    exceptions to human reviewers with a full evidence log
  whyNowCatalyst: >-
    Saris' funding, incumbent-stack integrations, and production-grade accuracy metrics show banks now believe narrow agent
    workflows can touch live loan files, making exception clearance a newly budgetable pain point.
  ventureScalePath: >-
    Start with mortgage and HELOC file completion, then expand into small-business lending, post-close quality control,
    servicing boarding, deposit-ops document exceptions, and eventually the system of record for bank operational exception
    handling across lending and compliance.
solution: >-
  The product connects to the bank's LOS, document repository, and core data without asking the institution to replace its
  existing stack. For each incoming file, it builds a live checklist of required conditions by product, branch, and policy
  profile, then compares submitted documents and extracted fields against what the bank already knows in Fiserv, MeridianLink,
  and Encompass. Routine mismatches such as stale paystubs, unsigned disclosures, missing insurance pages, or inconsistent
  borrower attributes are turned into structured follow-up tasks and borrower-ready requests instead of sitting in an analyst
  inbox. Human reviewers only see escalations that require judgment, along with the exact evidence and policy rule that caused
  the exception. Over time, the company builds a proprietary dataset on which exceptions clear fastest, which branches generate
  the most rework, and which policy steps drive avoidable cycle-time loss.
goToMarketSeed:
  firstCustomer: >-
    A U.S. credit union or regional bank with a centralized home-equity and first-mortgage ops team, 25-100 branches, and a
    recurring queue of incomplete files that spikes after rate moves, marketing campaigns, or branch-originated volume surges
  buyingTrigger: >-
    A refinance or HELOC volume spike, acquisition of a new branch footprint, executive mandate to cut loan-cycle time without
    hiring, or a regulator or internal audit finding around documentation and exception handling
  currentAlternative: >-
    Manual file review across LOS task queues, spreadsheets, shared inboxes, BPO or temp labor, and ad hoc macros layered on
    top of incumbent banking software
  switchingReason: >-
    The first customer switches because this wedge clears routine conditions faster, shrinks backlog without a core conversion,
    and gives managers a policy-linked evidence trail that manual teams and generic RPA cannot reliably produce
  pricingHypothesis: >-
    Annual platform fee priced by active lending workflow and monthly file volume, plus implementation fees for policy mapping
    and core-system integrations
