jobsToBeDone:
  - job: >-
      When inbound mortgage or HELOC volume spikes, help our lending operations team clear routine file exceptions and chase
      missing conditions automatically, so we can keep approval cycle times down without hiring more reviewers.
    currentAlternative: Manual checklist review in LOS queues plus spreadsheets, email, and temp labor
    successMetric: Days from file submission to decision-ready status and number of files cleared per reviewer
  - job: >-
      When audit or compliance asks why a loan file was cleared or escalated, help our managers show the exact policy rule,
      evidence, and reviewer action, so we can defend automation use without reconstructing the file history manually.
    currentAlternative: Manual QA sampling and after-the-fact reconstruction from notes and system timestamps
    successMetric: Hours to produce a defensible file-level audit packet and exception rework rate
ideaScorecard:
  signalStrength:
    score: 5
    rationale: The cluster includes same-day funding, integrations into named banking systems, and quantified operating ROI that strongly validate budget and urgency.
  painIntensity:
    score: 4
    rationale: Loan-file backlogs directly slow revenue, customer experience, and audit readiness, though the pain is less existential than a bank outage or regulatory crisis.
  wedgeClarity:
    score: 5
    rationale: Mortgage and HELOC exception clearance is a narrow workflow with a clear buyer, trigger, incumbent alternative, and measurable ROI.
  defensibility:
    score: 4
    rationale: Policy mappings, exception outcomes, and audit evidence graphs can become sticky workflow infrastructure even if base AI models commoditize.
  ventureScale:
    score: 5
    rationale: The same operating graph can expand from consumer real-estate lending into multiple bank exception-heavy workflows across origination, servicing, and compliance.
topRisks:
  - name: Integration drag
    description: Bank deployments can stall if the startup needs deep access across LOS, core, and document systems before showing value.
    mitigation: Start with read-only overlays and one exception-heavy workflow, then deepen integrations only after proving backlog and cycle-time improvement.
  - name: Automation trust gap
    description: Lending and compliance leaders may resist letting agents clear conditions if they fear hidden errors or examiner pushback.
    mitigation: Keep humans in approval loops for policy exceptions, expose file-level evidence for every action, and begin with low-risk condition classes that are easy to validate.
  - name: Incumbent feature encroachment
    description: LOS vendors or BPO providers could add basic AI review features once the use case is proven.
    mitigation: Win on cross-system exception orchestration and audit-grade evidence across incumbent stacks, not on document extraction alone.
