differentiator: >-
  This is not a generic bank copilot, OCR vendor, or RPA script farm. The defensible layer is the lender-specific exception
  graph: which document combinations satisfy which policy rules, when a discrepancy is safe to auto-clear, who must approve an
  override, and what evidence is needed later for audit or exam review. That operating graph compounds across customers and
  products in a way that incumbent cores, BPO firms, and general-purpose agent platforms are poorly positioned to assemble.
