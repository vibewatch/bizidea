- name: CANDOR Technology
  stage: 成长阶段
  wedge: 模拟承保员判断的 AI 承保决策引擎，可在人工审核前创建并清理条件件，并支持回购抗辩。
  pricing: 定制化企业报价；未披露公开标价。
  strength: 承保深度足，且明确围绕条件清理和一致性贷款决策定位。
  weaknessVsUs: 锚点仍是按揭承保，而不是跨 HELOC、跟进沟通和银行后台队列的广义例外运营。
  sourceRefs:
  - 9
- name: Coviance
  stage: 成长阶段
  wedge: 面向房屋净值贷款和 HELOC 的工作流自动化，带政策映射、HMDA 报送和 LOS 集成。
  pricing: 定制化企业报价；未披露公开标价。
  strength: 非常贴合想要合规能力和专项流程的房屋净值放贷机构与信用合作社。
  weaknessVsUs: 更偏端到端房屋净值发起，而不是跨按揭、HELOC、QC 和其他银行队列的多产品例外处理。
  sourceRefs:
  - 8
- name: Blend
  stage: 在位厂商
  wedge: 数字化按揭和房屋净值贷款发起套件，主打借款人体验、自助流程和放贷机构 ROI。
  pricing: 定制化企业报价；未披露公开标价。
  strength: 银行渗透深，前中台漏斗体验强，也有大型银行案例。
  weaknessVsUs: 更像是在优化发起和借款人触达，而不是占住现有系统之间的放贷机构例外图谱。
  sourceRefs:
  - 5
  - 6
  - 7
regulatoryTechnicalConstraints:
- point: HMDA 报送和公平放贷审查，要求按揭申请与承保数据的处理必须结构化且站得住脚。
  sourceRefs:
  - 8
- point: 跨机构第三方风险指引，抬高了任何自动化关键银行工作流供应商的尽调门槛。
  sourceRefs:
  - 21
- point: GSE 贷后 QC 要求放贷机构锁定高风险贷款并记录复核方法，这反过来强化了可追溯例外处理的必要性。
  sourceRefs:
  - 24
- point: 按揭数据交换和下游兼容性高度依赖 MISMO 等标准组织，因此产品数据模型必须能干净映射到现有行业 schema。
  sourceRefs:
  - 23
validationSignals:
- point: Saris 公开声称，银行工作流可实现 70% 任务自动化、具备可审计动作，并带来明确的生产率提升。
  sourceRefs:
  - 2
- point: MeridianLink 披露的 Saris 客户结果包括 99.8% 字段准确率、10x 审核提速、3x 处理能力，以及 4 天清掉 600 笔贷款积压。
  sourceRefs:
  - 3
- point: Blend 的案例表明，区域性银行愿意为消除人工工作流摩擦的数字化放贷升级拨预算，而不是内部自研。
  sourceRefs:
  - 7
- point: Freddie Mac 估算，更强的数字化能力每笔贷款最多可节省 $1,700，说明运营效率确实能和预算直接挂钩。
  sourceRefs:
  - 18
openQuestions:
- 到底有多少区域性银行和大型信用合作社的集中式例外队列足够大，能支撑 $300k+ 年度支出？
- 哪些例外类目可以自动清掉，而不会触发审查员、QC 或回购方面的顾虑？
- 滩头客户到底多常见地把 MeridianLink 或 Encompass 架在 Fiserv 之上，而不是其他核心系统组合？这会把实施复杂度改写多少？
- 产品能否先靠只读模式交出足够价值，还是 LOS 和核心系统的写回权限会过早变成硬门槛？
