differentiator: >-
  Data-labeling firms can annotate clips, but they do not know which 500 demonstrations will
  unblock a specific dual-arm deployment. Dataset vendors can sell raw examples, but they rarely
  close the loop to field failures, release decisions, and measured task lift. This company
  compounds a moat from proprietary mappings among failure signatures, collection interventions, and
  downstream success-rate gains across many manipulation programs.
