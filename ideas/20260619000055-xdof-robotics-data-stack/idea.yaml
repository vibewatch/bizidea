topRisks:
  - name: Integration complexity
    description: Robot logs, video, teleoperation, and eval data live in messy custom stacks, which can slow onboarding and dilute time to value.
    mitigation: Start with ROS and video adapters for a narrow set of dual-arm pilot workflows, then expand connectors only after one repeatable integration template works.
  - name: Incumbent platform encroachment
    description: XDOF or another robotics data infrastructure vendor could add prioritization and release-management features once the wedge is visible.
    mitigation: Stay vendor-neutral and orchestrate internal teams, teleop providers, and dataset suppliers so customers keep one control plane even when sources change.
  - name: Weak ROI attribution
    description: Customers may struggle to prove that a given data batch, rather than separate model tuning, caused a task-success improvement.
    mitigation: Attach every collection sprint to pre-post acceptance evals and contract initial pilots around time-to-retraining and measured lift on one task family.
