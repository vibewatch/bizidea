problem: >-
  Bimanual robot startups still treat data improvement like an artisanal firefight. After a pilot
  miss, autonomy teams manually inspect logs, request ad hoc teleoperation sessions, and argue over
  which failures deserve new demonstrations, so weeks disappear before the next training run. Open
  datasets help pretraining, but they do not tell a lab which site-specific edge cases to collect
  next or whether a new batch actually closes the deployment gap.
targetUser:
  primary: >-
    Head of autonomy or data engine at a 40-150 person robotics startup training dual-arm
    manipulation systems for electronics kitting, small-parts assembly, or lab-sample handling
    pilots
  secondary: >-
    Teleoperation operations lead or ML platform manager at a robotics lab supporting multiple
    customer environments and weekly model releases
  buyer: VP Autonomy, CTO, or Head of ML Platform
startupThesis:
  nonObviousInsight: >-
    The next control point in physical AI is not owning the biggest generic dataset; it is owning
    the operating system that converts field failures into the next high-yield demonstrations and
    proves they moved the task metric. As open teleoperation corpora raise the baseline, each lab’s
    scarce resource becomes prioritization and closed-loop learning rather than raw data storage.
  beachhead: >-
    Series A-B dual-arm robotics startups running 1-3 paid pilot cells for electronics kitting,
    small-parts assembly, or lab-sample handling and needing weekly data refreshes to hit customer
    expansion milestones
  wedge: >-
    A failure-to-data control plane that ingests robot logs and pilot video, clusters failure
    modes, generates teleoperation and annotation queues, and ships acceptance evals before every
    model release
  whyNowCatalyst: >-
    XDOF’s $70 million launch, ABC-130K benchmark, and reported 20-customer traction show robotics
    labs now have both the budget and urgency to industrialize data feedback loops.
  ventureScalePath: >-
    Start with dual-arm manipulation pilots, then expand into the system of record for data
    releases across warehouse, humanoid, lab, and field robotics: prioritization, provenance,
    vendor orchestration, benchmarking, and release gating for any embodied-AI team.
solution: >-
  The product sits between robot operations and model training. It ingests ROS bags, video,
  operator notes, SOP changes, and prior eval results, then ranks which failure clusters need more
  demonstrations versus relabeling or policy tuning. From that plan it spins up teleoperation
  collection queues for internal operators or approved partners, tracks provenance and coverage, and
  packages each batch with regression evals tied to the customer’s task metric. Over time it
  becomes the system of record for what data changed a robot’s real-world performance across tasks,
  sites, and embodiments.
goToMarketSeed:
  firstCustomer: >-
    A U.S. dual-arm robotics startup with one paid electronics-assembly or lab-automation pilot
    that must improve success on 2-3 failing task steps before a quarterly expansion review
  buyingTrigger: >-
    A pilot customer requests a new SKU, fixture, or workflow variation and the autonomy team
    cannot retrain confidently before the next review
  currentAlternative: >-
    Manual log review, spreadsheet triage, internal teleoperation sessions, and one-off annotation
    vendors
  switchingReason: >-
    The platform compresses the loop from field failure to validated retraining batch, so the team
    uses scarce teleop hours on the highest-yield gaps and ships model updates with evidence
  pricingHypothesis: >-
    Annual platform license priced per active robot program or pilot cell, plus usage fees for
    external collection and evaluation runs
