jobsToBeDone:
  - job: >-
      When a pilot cell starts missing on new part variants, help the autonomy team decide which
      demonstrations to collect next, so they can raise task success before the customer review.
    currentAlternative: Manual log review plus ad hoc teleoperation and labeling requests
    successMetric: Days from identified failure cluster to approved retraining batch
  - job: >-
      When leadership asks whether a data sprint actually worked, help the head of data engine tie
      each batch to regression-eval movement, so they can ship or hold a model release with
      evidence.
    currentAlternative: Offline notebooks, spreadsheets, and gut-feel release meetings
    successMetric: Share of releases backed by passing task-level acceptance evals
