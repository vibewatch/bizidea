  pestle:
  - factor: 政治
    impact: positive
    point: 来自欧洲和大型企业采购团队的 AI 治理压力，会推高对更强可追溯性和监控界面的需求。
    sourceRefs:
    - 26
    - 27
  - factor: 经济
    impact: neutral
    point: 机器人安装量重新增长是好消息，但商业化周期依旧很长，买方仍会拿软件支出去对照直接部署里程碑。
    sourceRefs:
    - 3
    - 5
  - factor: 社会
    impact: negative
    point: 对工人安全和操作员信任的审视抬高了门槛：任何会影响部署行为的工具，都必须更严肃地处理事件捕获、升级和人工监督。
    sourceRefs:
    - 24
    - 25
  - factor: 技术
    impact: positive
    point: 开放格式、开放基准和开放 VLA 正在压低集成成本，也让厂商中立的编排层更容易被采用。
    sourceRefs:
    - 28
    - 29
    - 30
    - 31
    - 35
    - 36
  - factor: 法律
    impact: negative
    point: 高风险 AI 义务和安全复盘会拉长采购流程，除非产品本身就能明显证明自己经得起审计。
    sourceRefs:
    - 24
    - 26
    - 27
  adoptionFrictionMatrix:
  - friction: rosbag2、视频、操作员备注和供应商产出混在一起，摄取非常脏。
    severity: high
    affectedBuyer: 自主 / ML 平台负责人
    mitigation: 先只做一小组 ROS2 + 视频 + 评测适配器，并围绕兼容 MCAP / RLDS / LeRobot 的 schema 做归一化。
    sourceRefs:
    - 28
    - 29
    - 30
    - 31
  - friction: 很难因果证明一次数据冲刺真的带来了发布效果提升。
    severity: high
    affectedBuyer: Autonomy VP / CTO
    mitigation: 把每一批数据都挂上验收评测和批次级溯源，这样在发布批准前就能把通过率变化归因清楚。
    sourceRefs:
    - 32
