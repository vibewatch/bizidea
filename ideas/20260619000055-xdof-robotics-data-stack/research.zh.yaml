    severity: medium
    affectedBuyer: CTO / 安全评审
    mitigation: 照着相邻基础设施供应商的企业级控制做一套，并让数据 溯源链 可以直接导出做审计。
    sourceRefs:
    - 17
    - 23
    - 26
    - 27
  - friction: 自主、遥操作和运营团队之间的变更管理会拖慢落地。
    severity: medium
    affectedBuyer: 遥操作运营负责人
    mitigation: 不要只给泛 仪表盘，而是直接交付带立场的队列、复盘和发布签核工作流。
