market:
  tam:
    value: $0.4B
    rationale: 估算：全球约 1,200 个更广义的具身 AI 或机器人学习项目 × 每年约 $350k 的数据控制、采集编排和发布评测混合支出；锚点来自自动化需求回暖、AI 基础设施融资仍强，以及中立型数据平台已经能拿下企业客户。
    isEstimate: true
    sourceRefs:
    - 3
    - 4
    - 6
