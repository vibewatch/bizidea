slug: bimanual-feedback-loop-os
date: "2026-06-19"
executiveSummary: >-
  Bimanual Feedback Loop OS should start as a failure-to-data control plane for
  U.S. Series A-B dual-arm robotics startups running 1-3 paid pilot cells in
  electronics assembly, small-parts workflows, or lab-sample handling. The
  first customer is the autonomy or ML-platform leader who must recover success
  on a few failing task steps before a quarterly expansion review triggered by a
  new SKU, fixture, or workflow variant. The initial product should ingest ROS2
  logs, video, operator notes, and prior evals, cluster failures, generate
  teleoperation or relabeling queues, and attach each batch to acceptance evals
  before a release ships. This wedge is attractive because open teleoperation
  datasets are raising the pretraining baseline while the acute bottleneck is
  now choosing the next few hundred demonstrations that actually move a live
  deployment metric. XDOF, Foxglove, InOrbit, Formant, and Scale validate
  adjacent budget lines, but the researched market does not show any of them
  clearly owning manipulation-specific failure prioritization plus release
  governance as one product. The market evidence supports a focused beachhead of
  about $22.5M SAM and a modeled year-3 reachable SOM of about $3.6M, so the
  investment case depends on later expansion from dual-arm pilots into broader
  embodied-AI data-release workflows. The biggest risks are integration drag
  across messy robotics stacks, weak causal proof that a data sprint caused
  performance lift, and incumbent bundling by data or RobOps platforms. Public
  inputs still leave open how many target teams retrain under true weekly or
  monthly SLA pressure and whether buyers will prefer a vendor-neutral control
  plane over bundled alternatives, so the first 12 months must be run as a
  falsification program as much as a build plan.
problem:
  - After a pilot miss, autonomy teams still manually review rosbags and video, debate which failures matter, and issue ad hoc teleoperation or labeling requests, stretching retraining cycles into weeks.
  - Open datasets help pretraining but do not tell a live deployment which site-specific failures to collect next or whether fresh demos, relabeling, or policy tuning is the fastest fix.
  - Buyers also lack a clean release record linking each data batch to acceptance-eval movement, which slows expansion reviews and safety scrutiny.
solution:
  - Normalize rosbag2, video, operator notes, and prior evals into one failure timeline, cluster recurring misses, and rank intervention types by expected task lift.
  - Generate teleoperation, annotation, or policy-review queues for internal teams or approved partners and track provenance across collection, labeling, and evaluation.
  - Gate each covered model release with pre/post acceptance evals tied to the customer's task metric so the product becomes the record of what data actually changed field performance.
whyWeWin:
  - The company solves the manipulation-specific decision problem of what to collect next and whether the release is ready, not generic logging, fleet ops, or annotation execution.
  - A vendor-neutral layer can sit above XDOF-style collection, Foxglove or MCAP logging, and downstream labeling vendors, which is valuable to buyers that already use mixed tools.
  - Over time the moat is a cross-program graph from failure signature to intervention type to measured lift, plus audit-ready provenance that internal teams rarely maintain consistently.
strategicChoices:
  beachhead: >-
    U.S. Series A-B dual-arm robotics startups running 1-3 paid pilot cells in
    electronics assembly, small-parts handling, or lab-sample workflows where
    one failing task family can block expansion revenue.
  wedgeRationale: >-
    This entry point creates faster proof than a broader robotics data platform
    because the pain is tied to a live customer milestone, the relevant logs and
    task metrics are concentrated inside one pilot cell, and the buyer group is
    small enough for founder-led discovery and fast product iteration.
  sequencingRationale: >-
    The company should first productize ingest, failure ranking, queue
    generation, and acceptance-eval reporting for one repeatable ROS2 and video
    stack, then add solutions and operations hires only after the first pilots
    convert. Partnerships should start as capacity extensions for teleoperation
    and eval work, not as channels, because product truth on time-to-value and
    lift attribution matters more than early pipeline volume.
  notYet:
    - General-purpose robot observability or data-lake platform
    - Managed teleoperation labor marketplace with owned supply
    - Warehouse fleet or humanoid workflows before the dual-arm playbook repeats
    - Europe-first sales motion before the U.S. audit and deployment story is productized
market:
  tam: "$0.4B estimated TAM based on roughly 1,200 broader embodied-AI or robot-learning programs spending about $350k annually on data control, collection orchestration, and release evals."
  sam: "$22.5M estimated SAM based on roughly 90 dual-arm pilot programs in electronics, small-parts, and lab workflows at about $250k annual spend per active program."
  som: "$3.6M modeled year-3 SOM based on about 15 reachable programs at roughly $240k blended ACV through a design-partner-led motion."
  segments:
    - "Primary segment: Series A-B U.S. dual-arm robotics startups with 1-3 paid pilot cells in electronics, small-parts assembly, or lab-sample handling."
    - "Secondary segment: robotics labs or systems integrators supporting multiple manipulation deployments that need shared release and provenance control."
  buyingProcess: >-
    The operational champion is usually the head of autonomy, data engine, or
    teleoperation operations, while budget and final approval sit with the VP
    Autonomy, CTO, or ML-platform leader. The most credible motion is a paid
    design partner on one failing task family, with conversion once the team
    sees faster approved retraining batches, traceable release signoff, and no
    extra integration sprawl.
product:
  mvp: >-
    MVP should support one pilot cell with rosbag2, video, and operator-note
    ingest; failure clustering; queue generation; provenance tagging; and
    acceptance-eval reporting. It should export data in MCAP, RLDS, and
    LeRobot-compatible schemas and explicitly avoid becoming a general
    model-training stack or teleoperation labor marketplace in v1.
  sixMonth: >-
    Launch 2-3 design-partner pilots, prove first ranked failure queue in under
    10 business days, and ship weekly failure-review workflows, partner queue
    routing, and basic release signoff for the initial electronics and
    lab-automation wedge.
  twelveMonth: >-
    Add repeatable Foxglove and MCAP integration, batch-level lift attribution,
    role-based approvals, and multi-site release history so one customer can
    manage more than one pilot cell from the same control plane.
  twentyFourMonth: >-
    Expand into a broader release-governance system of record across adjacent
    manipulation programs, with cross-customer benchmarks, audit exports, and
    deeper integrations into evaluation and training stacks.
  keyBets:
    - Enough deployment failures repeat in recognizable patterns that clustering and triage meaningfully beat manual review.
    - Buyers will trust acceptance-eval gating and provenance as a control surface, not just an analytics dashboard.
    - One integration template around ROS2, video, MCAP, and RLDS can cover most early customers without consulting-heavy work.
    - The same workflow can expand from dual-arm pilots into other manipulation categories before incumbents bundle it away.
gtm:
  wedge: >-
    Sell a paid design-partner sprint on one failing task family inside a live
    pilot cell, promising a faster path from field miss to approved retraining
    batch and a clearer release go or no-go decision before the next customer
    review.
  channels:
    - Founder-led direct sales to heads of autonomy, ML platform, and CTOs at target robotics startups
    - Referrals from robotics investors, lab communities, and systems integrators already inside manipulation programs
    - Developer-led adoption through ROS 2, Foxglove, MCAP, and LeRobot workflows where replay and provenance pain is already visible
  funnelTargets: "Target-account intro→qualified design partner 25-35%, paid pilot→annual production 50%+, and first-program→second-program expansion 50%+ within 12 months."
  pricing: >-
    Start with a 12-week paid design partner priced around $40k-$60k and credit
    it toward a $180k-$250k annual platform license per active pilot cell, plus
    variable fees for external collection and evaluation runs. This matches the
    researched roughly $240k-$350k annual spend envelope and prices against
    release-critical programs rather than seats or storage.
businessModel:
  revenueStreams:
    - Annual platform subscription per active pilot cell or robot program
    - Usage fees for external collection, annotation, and evaluation orchestration
    - Premium modules for cross-site provenance, audit exports, and portfolio-level release governance
  unitOfValue: Active robot program or pilot cell under release governance
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more pilot cells, task families, and sites inside the same customer
    - Expand from dual-arm pilots into adjacent manipulation categories that share the same release and provenance pain
    - Increase wallet share through audit, partner QA, and cross-program benchmark modules
strategyMap:
  northStarMetric: Median days from field failure cluster to approved retraining batch that passes acceptance eval
  inputMetrics:
    - Time from raw log ingest to first ranked failure queue
    - Teleoperation hours spent per accepted high-priority batch
    - Percentage of covered releases with pre/post acceptance evals
    - Paid pilot to annual production conversion rate
    - Active programs per customer
  moatsToBuild:
    - Cross-program map from failure signature to intervention type to measured task lift
    - Vendor-neutral provenance graph spanning rosbag2, MCAP, RLDS, and LeRobot-style artifacts
    - Benchmark corpus of release outcomes by task family, site condition, and operator quality
    - Partner network QA data linking external collection quality to downstream success
  killCriteria:
    - Fewer than 3 paid design partners after 25 qualified beachhead conversations
    - The first 3 pilots fail to cut time from failure identification to approved batch by at least 50%
    - Paid pilot to annual production conversion stays below 40% across the first 5 pilots
    - More than 70% of qualified prospects choose bundled XDOF, Foxglove, RobOps, or in-house workflows after live evaluation
  mermaid: |
    flowchart LR
      Wedge[Dual-arm pilot wedge] --> MVP[Failure-to-data control plane MVP]
      MVP --> Proof[Shorter retraining loops with auditable lift]
      Proof --> Expansion[Release system of record across manipulation programs]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Promising wedge in an emerging control point, but conviction depends on proving that retraining urgency and standalone budget are common enough across a very small early market.
    whyBelieve: The plan targets a revenue-linked deployment bottleneck with a named buyer, visible adjacent spend, and a differentiated vendor-neutral position between collection, observability, and release governance.
    whyDoubt: The near-term buyer set is concentrated and integration-heavy, and adjacent players could narrow the window quickly if buyers accept bundled workflows over another control plane.
    nextDiligence: Confirm with 3 paid design partners that the product can reduce days to approved batch and convert at least 2 into annual contracts above $180k ACV.
  firstCustomer:
    title: Head of autonomy at a dual-arm robotics startup
    profile: A 40-150-person U.S. robotics company running one paid electronics-assembly or lab-automation pilot cell and shipping frequent model updates against expansion milestones.
    trigger: A new SKU, fixture, or workflow exception causes misses on 2-3 task steps before a quarterly customer review.
    buyer: VP Autonomy, CTO, or Head of ML Platform
    initialContract: "$40k-$60k 12-week design partner on one pilot cell, converting to roughly $180k-$250k annual platform license plus usage fees for collection and eval runs."
  mustBeTrue:
    - At least 8 of the first 15 qualified target accounts must report release or retraining pressure at least monthly when a pilot workflow changes.
    - At least half of paid pilots must accept a standalone software budget line that annualizes above $180k before large-fleet deployment.
    - Four of the first 5 deployments must reach usable ROS2 and video ingest plus queue generation within 10 business days.
    - In the first 3 live pilots, recommended data sprints must improve a named acceptance metric or cut time to approved batch by at least 50%.
    - Against bundled or in-house alternatives, the startup must win at least half of evaluated deals by proving better failure prioritization and release traceability.
  diligenceQuestions:
    - How many beachhead teams truly retrain under customer SLA pressure rather than quarterly research cadence?
    - Which budget line pays first: autonomy software, pilot operations, or external data collection?
    - How often do XDOF, Foxglove, InOrbit, or Formant already sit inside the target workflow, and where are their product gaps durable versus temporary?
    - Can acceptance-eval results cleanly isolate data lift from separate model-tuning or SOP changes?
    - What level of vendor neutrality do buyers actually want if they already use one preferred collection or logging vendor?
operatingAssumptions:
  - assumption: Enough beachhead teams retrain under live pilot pressure at least monthly.
    basis: research.yaml
    validationTest: Interview 15 target accounts and require at least 8 to confirm release pressure plus 3 to commit to a paid design-partner process within 6 months.
    decisionImpact: If false, narrow to integrators or labs with higher repeat deployment cadence and delay direct-sales scaling.
  - assumption: A per-program software license can capture $180k-$250k annualized before the company owns any managed-services labor.
    basis: idea.yaml
    validationTest: Convert 2 paid pilots with explicit annual subscription language and no more than 35% of year-one revenue coming from pass-through services.
    decisionImpact: If false, pricing should shift toward bundled managed workflows or the venture case weakens on gross margin.
  - assumption: ROS2, video, MCAP, and RLDS integration can be standardized enough to reach first value in under two weeks.
    basis: research.yaml
    validationTest: In the first 4 deployments, require first ranked queue within 10 business days and under 40 hours of custom engineering.
    decisionImpact: If false, restrict the ICP to one stack or reduce roadmap breadth before hiring more GTM.
  - assumption: Acceptance evals can attribute lift from a data sprint well enough to support release gating.
    basis: research.yaml
    validationTest: Run 2 repeated sprints on one task family with pre/post evals and document directional improvement or clear no-lift decisions.
    decisionImpact: If false, reposition around operator productivity and queue management rather than release governance.
  - assumption: Founder-led sales and ecosystem referrals can win the first 5 pilots without an enterprise-sales hire.
    basis: operator judgment
    validationTest: Build a 25-account list and require 5 paid pilots or signed pilot LOIs by month 9.
    decisionImpact: If false, revisit ICP, packaging, and channel mix before increasing burn.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: ICP and buying-trigger interviews
    hypothesis: Autonomy leaders in target startups will describe new SKU or fixture variation plus expansion reviews as immediate budget triggers.
    successMetric: 15 interviews completed with at least 8 matching the trigger and 5 active opportunities identified.
    owner: Founder CEO
  - horizon: "0–90 days"
    experiment: Concierge historical-log triage
    hypothesis: Failure clustering on historical rosbag2 and video data will surface a smaller recommended demo set than manual review without missing key failure modes.
    successMetric: 2 design partners benchmark 50 or more historical episodes each and accept at least 70% of prioritized queues.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Live pilot-cell data sprint
    hypothesis: The product can cut time from failure identification to approved retraining batch by at least 50% in a live pilot cell.
    successMetric: 3 pilots each complete one sprint with under 21 days to approved batch and a documented release decision.
    owner: ML/data infrastructure lead
  - horizon: "90–180 days"
    experiment: Pricing and contract packaging test
    hypothesis: Program-based pricing converts better than seat or storage pricing for autonomy buyers.
    successMetric: The chosen package wins in 5 of 8 pricing conversations and appears in 2 signed pilot scopes.
    owner: Founder CEO
  - horizon: "6–12 months"
    experiment: Integration template repeatability test
    hypothesis: A ROS2, video, MCAP, and RLDS onboarding template can reach usable ingest and release reporting in under 10 business days for most customers.
    successMetric: 4 of the first 5 production deployments meet the timeline without net-new connector work.
    owner: Solutions engineer
  - horizon: "12–18 months"
    experiment: Partner-sourced collection and eval motion
    hypothesis: Qualified teleoperation and evaluation partners can expand delivery capacity without reducing data quality or slowing conversion.
    successMetric: 25% of high-priority queue volume runs through approved partners with no worse acceptance-eval outcomes than internal collection.
    owner: Product and operations lead
operations:
  - Maintain a normalized data schema across rosbag2, video, operator notes, MCAP, RLDS, and LeRobot-compatible artifacts.
  - Run a weekly failure review with the autonomy lead, teleoperation ops lead, and eval owner to approve the next queue and the acceptance metric.
  - Preserve immutable provenance and release signoff records that can be exported for buyer audits, safety review, and post-deployment monitoring.
  - Qualify teleoperation, annotation, and eval partners with SLAs on turnaround, demo quality, and traceability before routing customer work externally.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own ICP discovery, founder-led sales, design-partner recruiting, and the partner ecosystem before the motion is repeatable.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the ingest, provenance graph, and first failure-review workflow needed for initial pilot proof.
  - role: ML/data infrastructure lead
    startTiming: Month 1
    rationale: Own failure clustering, queue ranking, and acceptance-eval measurement so the product can prove causal lift.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Productize ROS2 and video onboarding, keep time to value below two weeks, and reduce services drag.
  - role: Product and operations lead
    startTiming: Month 6
    rationale: Run release workflows, partner QA, and audit-export requirements across live pilots.
  - role: GTM lead
    startTiming: Month 12
    rationale: Add pipeline capacity only after paid-pilot messaging, implementation, and pricing show repeatable conversion.
milestones:
  - horizon: "0–12 months"
    items:
      - Sign 3-5 paid design partners in the dual-arm electronics and lab-automation beachhead.
      - Reduce covered time from failure identification to approved retraining batch by at least 50%.
      - Convert at least 2 pilots into annual production contracts.
      - Productize onboarding to first ranked queue within 10 business days.
  - horizon: "12–24 months"
    items:
      - Reach 8-10 production programs across 5-7 customers.
      - Add multi-site release history, role-based signoff, and audit exports.
      - Expand from the first task family into a second workflow inside existing accounts.
      - Establish 2 partner relationships that source opportunities or execute collection and eval work at required quality.
  - horizon: "24–36 months"
    items:
      - Reach roughly 15 production programs or ARR consistent with the modeled $3.6M SOM.
      - Extend the control plane into at least one adjacent manipulation category beyond the initial dual-arm wedge.
      - Decide whether to broaden into warehouse or humanoid programs based on retention, win rates, and integration repeatability.
risks:
  - risk: Integration complexity across custom robotics stacks delays onboarding and time to value.
    likelihood: High
    impact: High
    mitigation: Start with one ROS2, video, and MCAP-oriented template and refuse bespoke stacks outside the ICP until the first 5 deployments are repeatable.
  - risk: XDOF, Foxglove, or RobOps vendors bundle enough of the workflow to compress differentiation.
    likelihood: Medium
    impact: High
    mitigation: Win on vendor-neutral failure prioritization, lift attribution, and release governance that bundled tools do not prove.
  - risk: Data-lift attribution remains ambiguous because model tuning or SOP changes confound results.
    likelihood: Medium
    impact: High
    mitigation: Contract pilots around one fixed task family, a predefined acceptance metric, and locked comparison windows.
  - risk: The beachhead is too small or episodic to support efficient direct sales before adjacent expansion.
    likelihood: Medium
    impact: High
    mitigation: Treat the first 12 months as a falsification stage, then expand only to adjacent manipulation programs that share the same release cadence and provenance pain.
  - risk: Customer video and field-log security review slows deals or limits usable data access.
    likelihood: Medium
    impact: Medium
    mitigation: Provide no-training commitments, exportable lineage, and clear data-handling controls from the first pilot scopes.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to build the ingest, prioritization, provenance, and
    acceptance-eval core; complete 3-5 paid design partners; convert at least 2
    into annual production contracts; and productize one repeatable ROS2 and
    video integration template before scaling GTM.
