differentiator: 数据标注公司能给视频打标，但它们不知道哪 500 条示范最能解开某个双臂部署的死结。数据集供应商能卖原始样本，但很少把现场故障、发布决策和任务成功率提升真正闭上环。公司的护城河会来自一张专有映射网：不同故障特征，对应什么采集动作，最终又把下游成功率拉高了多少；项目越多，这张网越厚。
