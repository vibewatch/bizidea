problem: 双臂机器人创业公司现在还把数据改进当成手工作坊式救火。试点一旦失手，自主团队就得手工翻日志、临时拉遥操作场次，再争论哪些故障值得补新示范，下一轮训练前往往已经白白耗掉几周。开放数据集能帮预训练，但它不会告诉实验室下一步该补哪些现场边角案例，也说不清新一批数据到底有没有把部署缺口补上。
targetUser:
  primary: 一家 40–150 人的机器人创业公司里，负责自主系统或数据引擎的负责人；公司正在为电子零部件配套、小零件装配或实验室样本处理试点训练双臂操作系统。
  secondary: 在支持多个客户环境并按周发版的机器人实验室里，负责遥操作运营或 ML 平台的经理。
  buyer: Autonomy VP、CTO 或 ML 平台负责人
startupThesis:
  nonObviousInsight: 具身 AI 下一个控制点，不是谁手里攥着最大的通用数据集，而是谁能把现场故障转成下一批产出最高的示范，并证明这些数据真的把任务指标往上推。开放遥操作语料把预训练基线抬高以后，每家实验室真正稀缺的资源不再是原始存储，而是优先级判断和闭环学习。
  beachhead: 正处在 Series A–B、手里跑着 1–3 个付费试点单元的双臂机器人创业公司，聚焦电子零部件配套、小零件装配或实验室样本处理，并且要靠每周刷新数据去拿客户扩单里程碑。
  wedge: 一套故障转数据控制平面：吃进机器人日志和试点视频，聚类故障模式，生成遥操作与标注队列，并在每次模型发布前先把验收评测发出去。
  whyNowCatalyst: XDOF 的 $70 million 亮相、ABC-130K 基准，以及其宣称的 20 客户进展，都说明机器人实验室既有预算，也有紧迫感，开始把数据反馈闭环工业化。
  ventureScalePath: 先从双臂操作试点切入，再扩成仓储、人形、实验室和野外机器人通用的数据发布系统：管优先级、溯源、供应商编排、基准测试，以及任何具身 AI 团队都要的发布闸口。
solution: 产品夹在机器人运营和模型训练之间。它吃进 ROS bags、视频、操作员备注、SOP 变更和过往评测结果，然后判断哪些故障簇该补更多示范，哪些更适合重标注或调策略。基于这份计划，系统会给内部操作员或认证伙伴拉起遥操作采集队列，持续跟踪溯源和覆盖度，并把每一批数据连同和客户任务指标绑定的回归评测一起打包。时间一长，它就会变成全公司的数据总账：跨任务、跨站点、跨机器人形态，哪些数据真的把真实世界表现拉上去了，一目了然。
goToMarketSeed:
  firstCustomer: 一家美国双臂机器人创业公司，手里有一个付费的电子装配或实验室自动化试点；在季度扩单复盘前，它必须把 2–3 个失手任务步骤的成功率拉回来。
