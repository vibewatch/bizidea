topRisks:
- name: 集成复杂度
  description: 机器人日志、视频、遥操作和评测数据散落在杂乱的定制栈里，既拖慢导入，也会稀释到价值时间。
  mitigation: 先围绕一小组双臂试点工作流，把 ROS 和视频适配器打磨透；等一套可复用的集成模板跑通后，再扩连接器。
- name: 在位平台上探
  description: 一旦这个切口被看见，XDOF 或其他机器人数据基础设施供应商都可能补上优先级管理和发布管理能力。
  mitigation: 坚持厂商中立，统一编排内部团队、遥操作伙伴和数据集供应商，让客户即便数据来源变化，也仍只用一套控制平面。
- name: ROI 归因偏弱
  description: 客户可能很难证明任务成功率的提升究竟来自某一批数据，还是来自另一轮模型调参。
  mitigation: 每次采集冲刺都绑定前后对照的验收评测，首批合同也围绕“到重训时间”和单一任务族上的可测增益来签。
