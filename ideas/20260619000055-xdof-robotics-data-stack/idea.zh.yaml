jobsToBeDone:
- job: 当试点单元在新零件变体上开始失手时，帮自主团队决定下一步该采哪些示范，这样他们才能在客户复盘前把任务成功率拉回来。
  currentAlternative: 人工审日志，加临时遥操作和标注请求
  successMetric: 从识别出故障簇到批准重训批次的天数
- job: 当管理层追问这轮数据冲刺到底有没有用时，帮数据引擎负责人把每一批数据和回归评测变化对上号，这样他们就能带着证据决定发版还是暂缓。
  currentAlternative: 离线分析脚本、Excel，以及拍脑袋的发版会
  successMetric: 有通过任务级验收评测背书的发布占比
