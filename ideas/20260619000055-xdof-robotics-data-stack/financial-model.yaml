slug: bimanual-feedback-loop-os
date: "2026-06-19"
currency: USD
modelStartMonth: "2026-07"
assumptions:
- id: A1
  name: Model start month
  value: "2026-07"
  unit: YYYY-MM
  source: '[BP date 2026-06-19] the operating model starts in the first full month after the dated business
    plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $2.6M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP runwayMonths 18 + model cash trough] a lower-midpoint
    pre-seed raise reaches the 8-10 program proof point with roughly six months of buffer.'
- id: A3
  name: Starting active paid programs
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] the company starts pre-revenue and must first sign paid design
    partners.'
- id: A4
  name: Active paid program definition
  value: One paid design-partner or production pilot cell / robot program under release governance
  unit: definition
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] customersEop tracks paid programs rather than
    total corporate logos.'
- id: A5
  name: Program ramp
  value: 4 active paid programs by M12, 10 by Q4Y2, and 15 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0–12, 12–24, and 24–36 months + Research market.som] base case matches 3-5 paid
    design partners in Y1, 8-10 production programs in Y2, and the researched ~15-program year-3 reach.'
- id: A6
  name: Blended recognized revenue per active program
  value: Y1 $180K/year, Y2 $235K/year, Y3 $245K/year
  unit: USD/program/year
  source: '[BP gtm.pricing $40k-$60k design partner credited toward $180k-$250k annual license + variable
    fees + Research market.sam/som] effective revenue starts pilot-heavy, then moves toward the researched
    blended ACV envelope.'
- id: A7
  name: Gross margin ramp
  value: 60%-68% in Y1, 70%-72% in Y2, and 72%-74% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on standardized ROS2/video
    onboarding] early deployments absorb more services and partner-pass-through cost before the software
    path becomes repeatable.'
- id: A8
  name: Hiring timeline
  value: M1 founder and founding engineer; M2 ML lead; M4 solutions; M7 product/ops; M8 second engineer;
    M11 third engineer and second ML hire; M13 GTM; M17 second solutions; M22 third ML hire; M28 second
    product/ops; M32 fourth engineer; M33 second GTM; M35 G&A
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale] the first six hires follow the plan directly
    and later hires are delayed into the back half to protect burn until the onboarding template is proven.'
- id: A9
  name: Founder loaded compensation
  value: $140K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic] lean founder cash pay plus payroll taxes
    and benefits.'
- id: A10
  name: Platform engineering loaded compensation
  value: $190K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] assumes senior robotics infrastructure talent
    below large-company cash levels.'
- id: A11
  name: ML / data infrastructure loaded compensation
  value: $210K
  unit: USD/year
  source: '[BP team ML/data infrastructure lead + startup-finance heuristic] reflects senior talent needed
    for failure clustering and lift attribution.'
- id: A12
  name: Solutions engineering loaded compensation
  value: $170K
  unit: USD/year
  source: '[BP team Solutions engineer + startup-finance heuristic] reflects deployment ownership without
    assuming a consulting bench.'
- id: A13
  name: Product / ops loaded compensation
  value: $165K
  unit: USD/year
  source: '[BP team Product and operations lead + startup-finance heuristic] covers release workflow,
    partner QA, and audit-export ownership.'
- id: A14
  name: GTM loaded compensation
  value: $175K
  unit: USD/year
  source: '[BP team GTM lead + startup-finance heuristic] assumes an early enterprise seller with travel
    and variable-comp load.'
- id: A15
  name: G&A loaded compensation
  value: $130K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] lean finance, legal-vendor, and admin support added
    only in late Y3.'
- id: A16
  name: Payroll allocation to P&L lines
  value: Founder 50% S&M / 50% G&A; solutions 80% S&M / 20% R&D; engineering and ML 100% R&D; product/ops
    60% R&D / 40% G&A; GTM 100% S&M; G&A 100% G&A
  unit: allocation
  source: '[BP team rationales + BP operations] maps the headcount plan into the functional P&L used below.'
- id: A17
  name: Non-payroll opex ramp
  value: R&D $8K-$13K/mo, S&M $6K-$12K/mo, G&A $8K-$13K/mo across the 36-month plan
  unit: USD/month
  source: '[BP product + BP operations + startup-finance heuristic] covers cloud, travel, insurance, legal,
    and partner QA without assuming broad paid demand gen.'
- id: A18
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] taxes, debt service, capex, and working-capital swings are assumed
    immaterial at pre-seed scale.'
- id: A19
  name: Steady-state monthly churn
  value: 2.0%
  unit: pct/month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP market concentration risk]
    the workflow should be sticky once embedded, but the buyer set is narrow enough to keep churn conservative.'
- id: A20
  name: CAC convention
  value: $95.6K = Y2 sales & marketing spend / 6 net new active programs
  unit: USD/new active program
  source: '[model calc + BP gtm.funnelTargets] year 2 is the first clean read on acquisition efficiency
    after the pure design-partner setup year.'
- id: A21
  name: Next-round milestone for funding sizing
  value: 8-10 production programs across 5-7 customers, onboarding to first ranked queue in under 10 business
    days, and at least one second-program expansion before the next round
  unit: milestone
  source: '[BP milestones 12–24 months + BP fundingAsk.useOfFundsSummary + investorMemo.nextDiligence]
    this is the seed-ready proof point the raise is designed to reach with buffer.'
