scenarios:
  downside:
    description: Robotics integrations stay less repeatable, production ramps later, and programs land
      closer to the low end of the pricing range.
    y3RevenueK: 2760.0
    y3EbitdaK: -751.8
    cashLowPointK: -190.2
    keyAssumptionChanges:
    - Q4Y2 customersEop lands near 9 instead of 10 and Q4Y3 lands near 13 instead of 15.
    - Blended realized revenue per active program stays closer to about $230K-$240K rather than reaching
      about $245K in Y3.
    - Gross margin tops out near the low-70s because onboarding and partner-management work stay more
      services-heavy.
  base:
    description: Founder-led design partners convert on plan, one ROS2 and video integration template
      becomes repeatable, and usage fees attach modestly by year 3.
    y3RevenueK: 3225.9
    y3EbitdaK: -383.9
    cashLowPointK: 384.0
    keyAssumptionChanges:
    - Active paid programs rise from 4 at M12 to 10 at Q4Y2 and 15 at Q4Y3.
    - Blended recognized revenue per active program ramps from about $180K in Y1 to about $245K in Y3
      as pilots convert and usage fees attach.
    - Gross margin reaches the low-70s once onboarding hits the under-10-business-day target and pass-through
      work shrinks as a share of revenue.
  upside:
    description: Second-program expansion starts earlier, design-partner references shorten the sales
      cycle, and margin improves faster than planned.
    y3RevenueK: 3761.2
    y3EbitdaK: 114.2
    cashLowPointK: 1024.5
    keyAssumptionChanges:
    - Q4Y2 customersEop reaches about 11 and Q4Y3 reaches about 17 because more customers add a second
      paid program.
    - Blended realized revenue per active program reaches about $255K in Y3 through usage and audit-governance
      add-ons.
    - The last three scale hires shift slightly later because onboarding templates and partner QA standardize
      faster.
sensitivity:
- variable: ARPU
  downsideCase: Usage fees and second-program expansion attach later, leaving Y3 realized ARPU closer
    to about $220K-$230K.
  baseCase: Y3 blended realized ARPU reaches about $245K per active program.
  upsideCase: Audit-governance and partner-routed usage push Y3 realized ARPU toward about $255K-$260K.
  y3RevenueImpactK: -322.6
  cashImpactK: -240.0
- variable: CAC
  downsideCase: Founder-led selling stays manual and CAC drifts toward roughly $125K per active program.
  baseCase: CAC holds near about $95.6K on the Y2 motion.
  upsideCase: References and investor referrals pull CAC closer to about $75K.
  y3RevenueImpactK: -130.0
  cashImpactK: -260.0
- variable: churn
  downsideCase: Monthly churn moves toward 3.0% because a few robotics teams standardize on bundled alternatives.
  baseCase: Monthly churn stays at about 2.0% once programs convert to production.
  upsideCase: Monthly churn sits near 1.2% because the control plane becomes embedded in release signoff.
  y3RevenueImpactK: -170.0
  cashImpactK: -150.0
- variable: sales cycle
  downsideCase: Pilot-to-production cycle stretches from roughly 90 days toward 150 days.
  baseCase: Pilot-to-production conversion stays around one quarter after paid kickoff.
  upsideCase: Reference customers and a standard integration pack compress the cycle toward 60 days.
  y3RevenueImpactK: -260.0
  cashImpactK: -220.0
- variable: gross margin
  downsideCase: Gross margin stalls around 70% because partner-managed data work remains a bigger share
    of revenue.
  baseCase: Gross margin reaches the low-70s by Y3 and steady-state unit economics sit around 73%.
  upsideCase: Gross margin reaches the mid-70s as ingestion templates and QA workflows standardize faster.
  y3RevenueImpactK: 0.0
  cashImpactK: -170.0
- variable: hiring pace
  downsideCase: Three scale hires are pulled forward by two quarters before the onboarding template is
    proven.
  baseCase: Late-stage hiring stays back-half loaded and follows the business-plan sequencing.
  upsideCase: The last two hires wait until after Q3Y3 proof without hurting delivery.
  y3RevenueImpactK: 40.0
  cashImpactK: -230.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Failures[Deployment failures + ROS2/video logs] --> Queues[Ranked retraining queues]
      Queues --> Programs[Active paid programs]
      Programs --> Revenue[Subscription + usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue comes from growing active paid programs from 4 at Y1 exit to 10 at Q4Y2 and 15
    at Q4Y3 while blended realized revenue per program rises from about $180K to about $245K.
- checkName: Must go right
  finding: The ROS2/video onboarding template and acceptance-eval workflow must stay repeatable enough
    to hit the under-10-business-day target so low-70s gross margin is achievable without a services bench.
- checkName: Model breaks if
  finding: If sales cycles stretch and Y3 lands closer to 12-13 active programs, the downside case turns
    the cash trough negative before the next financing proof point is secure.
- checkName: Next-round proof
  finding: The seed story is strongest once the company shows 8-10 production programs across 5-7 customers,
    at least one second-program expansion, and quarterly burn reduced to roughly the $60K range by Q4Y2
    to Q2Y3.
sanityChecks:
  ruleOf40: Y3 growth 89.3% + EBITDA margin -11.9% = 77.4%
  burnMultiple: Y2 burn multiple is about 0.7x using roughly $947.2K of EBITDA burn against roughly $1283.8K
    of net new revenue.
  revenuePerFte: $215.1K Y3 on 15 ending FTE (benchmark $200-400K SaaS)
  flags:
  - The researched SAM is only about 90 reachable beachhead programs, so 15 active programs by Q4Y3 already
    implies meaningful share capture and leaves limited room for sales misses.
  - customersEop counts paid programs rather than distinct customer logos, so some Y2-Y3 growth assumes
    second-program expansion inside existing accounts.
  - The model only reaches low-70s gross margin if ROS2 and video onboarding standardizes; if deployments
    stay consulting-heavy, the company either needs a larger round or slower hiring.
  - Cash movement is modeled from EBITDA and does not separately model deferred revenue timing, capex,
    or working-capital swings.
