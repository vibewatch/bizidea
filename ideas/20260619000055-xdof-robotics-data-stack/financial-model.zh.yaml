slug: bimanual-feedback-loop-os
date: '2026-06-19'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-19] 运营模型从带日期的商业计划之后的第一个完整月份开始。'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: $2.6M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP runwayMonths 18 + model cash trough] 较偏下但仍在中段的 pre-seed 融资额，能把公司带到 8-10 个项目的验证点，并留出大约 6 个月缓冲。'
- id: A3
  name: 起始付费活跃项目数
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] 公司从零收入起步，第一步必须先签下付费共创客户。'
- id: A4
  name: 付费活跃项目定义
  value: 一个付费共创客户或生产试点单元 / 机器人项目，并纳入发布治理
  unit: 定义
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] customersEop 统计的是付费项目，不是公司 客户总数。'
- id: A5
  name: 项目爬坡
  value: M12 达到 4 个付费活跃项目，Q4Y2 达到 10 个，Q4Y3 达到 15 个
  unit: customersEop
  source: '[BP milestones 0–12, 12–24, and 24–36 months + Research market.som] 基础情景对应 Y1 3–5 个付费共创客户、Y2 8–10 个生产项目，以及研究里约 15 个项目的第 3 年触达上限。'
- id: A6
  name: 每个活跃项目的混合确认收入
  value: Y1 $180K/year，Y2 $235K/year，Y3 $245K/year
  unit: USD/program/year
  source: '[BP gtm.pricing $40k-$60k design partner credited toward $180k-$250k annual license + variable fees + Research market.sam/som] 有效收入前期以试点为主，随后逐步走向研究中的混合 ACV 区间。'
- id: A7
  name: 毛利率爬坡
  value: Y1 为 60%-68%，Y2 为 70%-72%，Y3 为 72%-74%
  unit: 毛利率百分比
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on standardized ROS2/video 接入] 早期部署会吃掉更多服务和伙伴转付成本，等软件路径可复用后，毛利率才会上来。'
- id: A8
  name: 招聘时间线
  value: M1 创始人和创始工程师；M2 ML 负责人；M4 解决方案；M7 产品 / 运营；M8 第二名工程师；M11 第三名工程师和第二名 ML；M13 GTM；M17 第二名解决方案；M22 第三名 ML；M28 第二名产品 / 运营；M32 第四名工程师；M33 第二名 GTM；M35 G&A
  unit: 时间线
  source: '[BP team + BP strategicChoices.sequencingRationale] 前 6 个岗位直接照计划走，后续岗位都往后半程压，以便在证明 接入 模板可复用前先守住 烧钱。'
- id: A9
  name: 创始人总雇佣成本
  value: $140K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic] 精简的创始人现金薪酬，加上工资税和福利。'
- id: A10
  name: 平台工程总雇佣成本
  value: $190K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] 假设是资深机器人基础设施人才，但现金水平低于大厂。'
- id: A11
  name: ML / 数据基础设施总雇佣成本
  value: $210K
  unit: USD/year
  source: '[BP team ML/data infrastructure lead + startup-finance heuristic] 反映出故障聚类和增益归因所需的资深人才水平。'
- id: A12
  name: 解决方案工程总雇佣成本
  value: $170K
  unit: USD/year
  source: '[BP team Solutions engineer + startup-finance heuristic] 假设有人能负责部署，但不预设一整支咨询型交付团队。'
- id: A13
  name: 产品 / 运营总雇佣成本
  value: $165K
  unit: USD/year
  source: '[BP team Product and operations lead + startup-finance heuristic] 覆盖发布工作流、伙伴 QA 和审计导出的 负责人。'
- id: A14
  name: GTM 总雇佣成本
  value: $175K
  unit: USD/year
  source: '[BP team GTM lead + startup-finance heuristic] 假设早期企业销售需要承担差旅和浮动薪酬负担。'
- id: A15
  name: G&A 总雇佣成本
  value: $130K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] 精简的财务、法务供应商和行政支持，直到 Y3 后段才补进来。'
- id: A16
  name: 薪酬分摊到 P&L 科目
  value: 创始人 50% S&M / 50% G&A；解决方案 80% S&M / 20% R&D；工程和 ML 100% R&D；产品 / 运营 60% R&D / 40% G&A；GTM 100% S&M；G&A 100% G&A
  unit: 分摊
  source: '[BP team rationales + BP operations] 把人员计划映射到下面这份按职能拆分的 P&L。'
- id: A17
  name: 非薪资运营费用爬坡
  value: R&D $8K-$13K/mo、S&M $6K-$12K/mo、G&A $8K-$13K/mo，覆盖整个 36 个月计划
  unit: USD/month
  source: '[BP product + BP operations + startup-finance heuristic] 覆盖云资源、差旅、保险、法务和伙伴 QA，不假设会大规模做付费 付费获客。'
- id: A18
  name: 现金换算约定
  value: 现金变动等于 EBITDA
  unit: 公式
  source: '[startup-finance heuristic] 默认在 pre-seed 阶段，税、债务服务、资本开支 和营运资本波动都不构成主要影响。'
- id: A19
  name: 稳态月度流失率
  value: 2.0%
  unit: pct/month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP market concentration risk] 这类工作流一旦嵌进去会比较粘，但买方过窄，因此流失率仍按保守口径处理。'
- id: A20
  name: CAC 约定
  value: $95.6K = Y2 销售与营销支出 / 6 个净新增活跃项目
  unit: USD/新增活跃项目
  source: '[model calc + BP gtm.funnelTargets] 第 2 年是首次能比较干净读取获客效率的阶段，因为第 1 年主要还在搭共创客户。'
- id: A21
  name: 为融资定规模的下一轮里程碑
  value: 做到 5-7 个客户、8-10 个生产项目，把 接入 到第一版排序队列压到 10 个工作日以内，并在下一轮融资前至少证明一次第二项目扩单。
  unit: 里程碑
  source: '[BP milestones 12–24 months + BP fundingAsk.useOfFundsSummary + investorMemo.nextDiligence] 这是这轮融资试图带着缓冲跑到的 足以支撑 seed 融资 证明点。'
