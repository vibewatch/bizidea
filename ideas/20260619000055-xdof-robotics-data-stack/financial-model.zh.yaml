scenarios:
  downside:
    description: 机器人集成的可复用性更差，量产爬坡更晚，项目定价也更靠近区间下沿。
    y3RevenueK: 2760.0
    y3EbitdaK: -751.8
    cashLowPointK: -190.2
    keyAssumptionChanges:
    - Q4Y2 的 customersEop 更接近 9 而不是 10，Q4Y3 更接近 13 而不是 15。
    - 每个活跃项目的混合实现收入更接近 $230K-$240K，而不是在 Y3 走到约 $245K。
    - 因为 接入 和伙伴管理仍然更像服务，毛利率最高只能停在 70% 出头。
  base:
    description: 创始人主导的共创客户按计划转化，一套 ROS2 + 视频集成模板开始可复用，用量费在第 3 年小幅挂上。
    y3RevenueK: 3225.9
    y3EbitdaK: -383.9
    cashLowPointK: 384.0
    keyAssumptionChanges:
    - 付费活跃项目数从 M12 的 4 个，升到 Q4Y2 的 10 个，再到 Q4Y3 的 15 个。
    - 随着试点转正并挂上用量费，每个活跃项目的混合确认收入从 Y1 约 $180K 爬到 Y3 约 $245K。
    - 一旦 接入 压到 10 个工作日以内、转付工作占收入比下降，毛利率就能走到 70% 出头。
  upside:
    description: 第二项目扩单来得更早，共创客户口碑缩短了销售周期，毛利率也比计划爬得更快。
    y3RevenueK: 3761.2
    y3EbitdaK: 114.2
    cashLowPointK: 1024.5
    keyAssumptionChanges:
    - Q4Y2 的 customersEop 到约 11 个，Q4Y3 到约 17 个，因为更多客户会加第二个付费项目。
    - 通过用量和审计治理附加模块，Y3 每个活跃项目的混合实现收入能走到约 $255K。
    - 由于 接入 模板和伙伴 QA 更快标准化，最后 3 个扩张岗位会再往后推一点。
sensitivity:
- variable: ARPU
  downsideCase: 用量费和第二项目扩单挂得更晚，Y3 的实现 ARPU 只会落在约 $220K-$230K。
  baseCase: Y3 的混合实现 ARPU 达到每个活跃项目约 $245K。
  upsideCase: 审计治理和伙伴路由用量把 Y3 的实现 ARPU 推向约 $255K-$260K。
  y3RevenueImpactK: -322.6
  cashImpactK: -240.0
- variable: CAC
  downsideCase: 创始人主导销售始终很手工，CAC 会飘向每个活跃项目约 $125K。
  baseCase: CAC 大致守在 Y2 这套动作的 $95.6K 附近。
  upsideCase: 客户推荐和投资人转介绍把 CAC 拉近到约 $75K。
  y3RevenueImpactK: -130.0
  cashImpactK: -260.0
- variable: 流失率
  downsideCase: 如果有少数机器人团队标准化到打包替代方案，月流失率会逼近 3.0%。
  baseCase: 项目转入生产后，月流失率维持在约 2.0%。
  upsideCase: 如果控制平面嵌进发布签核，月流失率会贴近 1.2%。
  y3RevenueImpactK: -170.0
  cashImpactK: -150.0
- variable: 销售周期
  downsideCase: 从试点到生产的周期会从约 90 天拉长到 150 天。
  baseCase: 付费 kickoff 后，大约一个季度内仍能从试点转到生产。
  upsideCase: 参考客户和标准集成包会把周期压到约 60 天。
  y3RevenueImpactK: -260.0
  cashImpactK: -220.0
- variable: 毛利率
  downsideCase: 如果伙伴管理的数据工作仍占较大比重，毛利率会卡在 70% 左右。
  baseCase: 到 Y3 毛利率爬到 70% 出头，稳态单位经济模型约为 73%。
  upsideCase: 如果摄取模板和 QA 工作流更快标准化，毛利率会走到 75% 左右。
  y3RevenueImpactK: 0.0
  cashImpactK: -170.0
- variable: 招聘节奏
  downsideCase: 在 接入 模板还没证明前，3 个扩张岗位就提前了两个季度。
  baseCase: 后期招聘仍压在后半程，并沿着商业计划里的顺序走。
  upsideCase: 最后 2 个岗位可以等到 Q3Y3 之后再补，而且不伤交付。
  y3RevenueImpactK: 40.0
  cashImpactK: -230.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Failures[Deployment failures + ROS2/video logs] --> Queues[Ranked retraining queues]
      Queues --> Programs[Active paid programs]
      Programs --> Revenue[Subscription + usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基础收入来自付费活跃项目数的增长：从 Y1 末的 4 个，到 Q4Y2 的 10 个、Q4Y3 的 15 个；同时单项目混合实现收入从约 $180K 升到约 $245K。
- checkName: 必须跑通的环节
  finding: ROS2 / 视频 接入 模板和验收评测工作流，必须足够可复用，才能把首个队列压进 10 个工作日，并在没有重服务团队的前提下做到 70% 出头的毛利率。
- checkName: 模型失效条件
  finding: 如果销售周期拉长，Y3 只做到 12–13 个活跃项目，那么在下一轮融资证明点站稳前，下行情景就会把现金低点打成负数。
- checkName: 下一轮融资证明点
  finding: 当公司做到 5–7 个客户、8–10 个生产项目，至少有一次第二项目扩单，并把季度 烧钱 在 Q4Y2 到 Q2Y3 期间压到约 $60K 区间时，seed 融资故事最强。
sanityChecks:
  ruleOf40: Y3 增长 89.3% + EBITDA 利润率 -11.9% = 77.4%
  burnMultiple: Y2 烧钱倍数约为 0.7x：约 $947.2K 的 EBITDA 烧钱，对应约 $1283.8K 的净新增收入。
  revenuePerFte: Y3 在 15 名期末 FTE 下的人均收入为 $215.1K（对标 SaaS 的 $200-400K）。
  flags:
  - 研究里的 SAM 只有约 90 个可触达滩头项目，所以 Q4Y3 做到 15 个活跃项目，本身就意味着已经拿下不小份额，容错空间并不大。
  - customersEop 统计的是付费项目，不是独立客户 客户，因此 Y2-Y3 的一部分增长，默认来自现有账户里的第二项目扩单。
  - 只有 ROS2 和视频 接入 足够标准化，模型才跑得到 70% 出头的毛利率；如果部署一直偏咨询型，公司要么得融更大一轮，要么得放慢招聘。
  - 现金变动直接按 EBITDA 建模，没有单独拆 deferred revenue 节奏、capex 或营运资本波动。
