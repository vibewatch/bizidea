slug: bimanual-feedback-loop-os
date: '2026-06-19'
executiveSummary: Bimanual Feedback Loop OS 最该先做的，是面向美国 Series A–B 双臂机器人创业公司的“故障转数据”控制平面；这些公司在电子装配、小零件作业或实验室样本处理场景里，通常跑着 1–3 个付费试点单元。第一位客户会是自主系统或 ML 平台负责人：新 SKU、治具或工作流变体一出来，季度扩单评审前有几步任务突然失手，他得尽快把成功率拉回来。首版产品要能吃进 ROS2 日志、视频、操作员备注和历史评测，先把故障聚类，再生成遥操作或重标注队列，并在发版前把每一批数据挂到验收评测上。这个切口吸引人的地方在于，开放遥操作数据集正在把预训练基线抬高，真正卡住团队的反而变成：下一批到底该采哪几百条示范，才真能把现场部署指标拉动起来。XDOF、Foxglove、InOrbit、Formant 和 Scale 说明相邻预算已经存在，但现有研究里还看不到谁把“面向操作任务的故障优先级 + 发布治理”真正做成一个产品。市场证据支持一个聚焦的滩头市场：SAM 约 $22.5M，模型测得第 3 年可触达 SOM 约 $3.6M，所以投资逻辑能不能成立，最终还是看它能否从双臂试点一路扩到更广的具身 AI 数据发布工作流。最大风险有三类：机器人栈太乱导致集成拖慢、很难因果证明一次数据冲刺真的带来了性能增益，以及数据或 RobOps 平台把功能打包吃掉。公开材料仍然没有回答两个关键问题：到底有多少目标团队真的在周度或月度 SLA 压力下重训；以及买方会不会宁愿接受打包方案，而不是再上一层厂商中立的控制平面。所以前 12 个月既是建产品，更是证伪期。
problem:
- 试点一旦失手，自主团队还是得手工翻 rosbag 和视频，争论哪些故障最该处理，再临时发出遥操作或标注请求，重训周期很容易被拖成几周。
- 开放数据集能帮预训练，但真正到了现场部署，它不会告诉团队下一步该采哪些站点专属故障，也不会告诉你补新示范、重标注还是调策略，哪条路修得最快。
- 买方手里也缺一份干净的发布记录，没法把每一批数据和验收评测的变化对上号，扩单复盘和安全审查自然都会慢下来。
solution:
- 把 rosbag2、视频、操作员备注和过往评测归到同一条故障时间线里，聚类反复出现的失手，再按预期任务增益给干预类型排优先级。
- 给内部团队或认证伙伴生成遥操作、标注或策略复盘队列，并把采集、标注和评测全链路的溯源串起来。
- 每次覆盖到的模型发布，都用和客户任务指标绑定的前后验收评测来把关，让产品成为“哪些数据真的改了现场表现”的总账。
whyWeWin:
- 公司解决的是“下一步该采什么、现在能不能发版”这种操作任务特有的决策题，不是泛日志、车队运营或纯标注执行。
- 厂商中立的一层可以架在 XDOF 式采集、Foxglove 或 MCAP 日志，以及下游标注供应商之上；对已经混用多套工具的买方，这一点很值钱。
- 时间一长，护城河会沉淀成一张跨项目图谱：从故障特征到干预类型，再到可测增益；再加上内部团队往往维护不稳的审计级溯源。
strategicChoices:
  beachhead: 美国 Series A–B 双臂机器人创业公司，在电子装配、小零件处理或实验室样本流程里跑着 1–3 个付费试点单元；只要一个任务族失手，就可能卡住扩单收入。
  wedgeRationale: 这个入口比泛机器人数据平台更容易更快做出验证，因为痛点直接绑在客户里程碑上，相关日志和任务指标又集中在一个试点单元里；买方群体也够小，适合创始人亲自访谈、快速迭代产品。
  sequencingRationale: 公司应先把一套可复用的 ROS2 + 视频栈打磨出来：摄取、故障排序、生成队列、输出验收评测。等首批试点转正，再补解决方案和运营岗位。合作伙伴早期更该被当作遥操作和评测产能的延长线，而不是销售渠道——眼下比线索量更重要的，是把到价值时间和增益归因跑实。
  notYet:
  - 通用型机器人可观测性或数据湖平台
  - 自建供给的托管式遥操作劳务市场
  - 在双臂打法还没复用前就去做仓储车队或人形机器人工作流
  - 在美国的审计与部署叙事还没产品化前就先做欧洲销售
market:
  tam: $0.4B 估算 TAM：全球大约 1,200 个更广义的具身 AI 或机器人学习项目，每年在数据控制、采集编排和发布评测上花约 $350k。
  sam: $22.5M 估算 SAM：电子、小零件和实验室工作流里约 90 个双臂试点项目，每个活跃项目年花费约 $250k。
  som: $3.6M 建模得出的第 3 年 SOM：通过共创客户驱动的打法，触达约 15 个项目，对应约 $240k 的混合 ACV。
  segments:
  - 主要细分：美国 Series A–B 双臂机器人创业公司，在电子装配、小零件装配或实验室样本处理场景里跑着 1–3 个付费试点单元。
  - 次要细分：支持多个操作部署的机器人实验室或系统集成商，需要统一的发布与溯源控制。
  buyingProcess: 业务牵头人 往往是自主系统、数据引擎或遥操作运营负责人，预算和最终拍板则在 Autonomy VP、CTO 或 ML 平台负责人手里。最可信的打法，是先围绕一个失手任务族签付费共创客户；等团队看到更快拿到批准重训批次、发布签核可追溯、而且没有再长出新的集成杂草，再转正。
product:
  mvp: MVP 先服务一个试点单元，支持 rosbag2、视频和操作员备注摄取，外加故障聚类、队列生成、溯源打标和验收评测报告。数据导出要兼容 MCAP、RLDS 和 LeRobot；同时明确不在 v1 就把自己做成通用模型训练栈或遥操作劳务市场。
  sixMonth: 启动 2–3 个共创客户试点，把第一版排序后的故障队列压到 10 个工作日内交付，并围绕电子装配与实验室自动化这个初始切口，上线按周故障复盘、伙伴队列路由和基础发布签核。
  twelveMonth: 补齐可复用的 Foxglove 和 MCAP 集成、批次级增益归因、基于角色的审批，以及多站点发布历史，让同一客户能在一套控制平面里管多个试点单元。
  twentyFourMonth: 扩成相邻操作项目的发布治理总账：跨客户基准、审计导出，以及更深的评测与训练栈集成。
  keyBets:
  - 现场部署里的故障会以足够清晰的模式反复出现，因而聚类和分诊能明显胜过人工复盘。
  - 买方会把验收评测把关和溯源当成控制面，而不只是分析仪表盘。
  - 围绕 ROS2、视频、MCAP 和 RLDS 的一套集成模板，足以覆盖大部分早期客户，而不用做咨询型重交付。
  - 这套工作流能在在位者打包吃掉之前，从双臂试点扩到其他操作品类。
gtm:
  wedge: 围绕一个现场试点单元里的单一失手任务族，卖一轮付费共创客户冲刺；承诺在下一次客户评审前，把“现场失手→批准重训批次”的路径压短，也让团队更清楚该发版还是该暂缓。
  channels:
  - 对目标机器人创业公司的自主负责人、ML 平台负责人和 CTO 做创始人主导直销
  - 借机器人投资人、实验室社群和已在操作项目里的系统集成商做转介绍
  - 从 ROS 2、Foxglove、MCAP 和 LeRobot 工作流切入开发者侧采用，因为这些地方的回放、溯源和交接痛点已经摆在台面上
  funnelTargets: 目标账户引荐→合格共创客户 25–35%，付费试点→年度生产合同 50%+，首个项目→第二个项目扩单在 12 个月内达到 50%+。
  pricing: 先做 12 周的付费共创客户，价格约 $40k-$60k，并可抵扣每个活跃试点单元 $180k-$250k 的年度平台许可；另外再收外部采集与评测的用量费。这既对齐研究里约 $240k-$350k 的年花费区间，也把定价锚在影响发布的关键项目上，而不是席位或存储。
businessModel:
  revenueStreams:
  - 按活跃试点单元或机器人项目收年度平台订阅
  - 对外部采集、标注和评测编排收用量费
  - 对跨站点溯源、审计导出和组合级发布治理模块收高级版费用
  unitOfValue: 处在发布治理之下的活跃机器人项目或试点单元
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一客户内部继续加试点单元、任务族和站点
  - 从双臂试点扩到同样受发布与溯源痛点困扰的相邻操作品类
  - 通过审计、伙伴 QA 和跨项目基准模块提高钱包份额
strategyMap:
  northStarMetric: 从现场故障簇出现到批准重训批次并通过验收评测的中位天数
  inputMetrics:
  - 从原始日志摄取到第一版排序故障队列的时间
  - 每个被接受的高优先级批次耗掉多少遥操作工时
  - 被覆盖发布里，带有前后验收评测的占比
  - 付费试点转年度生产合同的转化率
  - 每个客户的活跃项目数
  moatsToBuild:
  - 跨项目的图谱：从故障特征到干预类型，再到可测任务增益
  - 横跨 rosbag2、MCAP、RLDS 和 LeRobot 式产物的厂商中立溯源图谱
  - 按任务族、站点条件和操作员质量切分的发布结果基准库
  - 把外部采集质量和下游成功率连起来的伙伴网络 QA 数据
  killCriteria:
  - 做完 25 次合格滩头客户对话后，付费共创客户仍少于 3 个
  - 前 3 个试点没能把“从识别故障到批准批次”的时间至少压缩 50%
  - 前 5 个试点里，付费试点转年度生产合同的比例始终低于 40%
  - 做过现场评估后，超过 70% 的合格机会还是选择打包的 XDOF、Foxglove、RobOps 或内部工作流
  mermaid: |
    flowchart LR
      Wedge[Dual-arm pilot wedge] --> MVP[Failure-to-data control plane MVP]
      MVP --> Proof[Shorter retraining loops with auditable lift]
      Proof --> Expansion[Release system of record across manipulation programs]
investorMemo:
  verdict:
    call: 值得见面 / 继续尽调
    conviction: 这是新控制点上的一个有前景切口，但前提是要先证明：在一个非常小的早期市场里，重训的紧迫度和独立预算都足够普遍。
    whyBelieve: 计划瞄准的是一条和收入直接相关的部署瓶颈：买方明确，相邻预算已经存在，而且它卡在采集、可观测性和发布治理之间，能站出一条差异化的厂商中立路径。
    whyDoubt: 短期买方群体很集中，集成也重；如果客户愿意接受打包工作流而不是再上一层控制平面，相邻玩家很快就可能把窗口期压没。
    nextDiligence: 先确认 3 个付费共创客户：产品能否把“到批准批次的天数”压下来，并至少把其中 2 个转成 ACV 高于 $180k 的年度合同。
  firstCustomer:
    title: 双臂机器人创业公司的自主系统负责人
    profile: 一家 40–150 人的美国机器人公司，在电子装配或实验室自动化场景里跑着一个付费试点单元，并围绕扩单里程碑高频发布模型更新。
    trigger: 新 SKU、治具或工作流例外一出现，季度客户复盘前就有 2–3 个任务步骤开始失手。
    buyer: Autonomy VP、CTO 或 ML 平台负责人
    initialContract: 先围绕一个试点单元签 $40k-$60k、12 周的共创客户合同，再转成约 $180k-$250k 的年度平台许可，并叠加采集与评测用量费。
  mustBeTrue:
  - 前 15 个合格目标账户里，至少有 8 个要承认：只要试点工作流一变，他们每月至少都会遇到一次发布或重训压力。
  - 付费试点里至少有一半，必须愿意在大规模车队部署之前就接受一条独立软件预算线，而且年化金额高于 $180k。
  - 前 5 次部署里，至少 4 次要能在 10 个工作日内把 ROS2 和视频摄取、外加队列生成跑到可用。
  - 前 3 个真实试点里，推荐的数据冲刺要么把指定验收指标拉上去，要么把“到批准批次”的时间至少压缩 50%。
  - 面对打包方案或内部替代，创业公司至少要赢下一半已评估机会，并靠更强的故障优先级和发布可追溯性取胜。
  diligenceQuestions:
  - 到底有多少滩头团队是真的在客户 SLA 压力下重训，而不是按季度研究节奏推进？
  - 第一笔预算到底从哪条线出：自主软件、试点运营，还是外部数据采集？
  - XDOF、Foxglove、InOrbit 或 Formant 现在多频繁地已经卡进目标工作流？它们的产品缺口，哪些是长期的，哪些只是暂时的？
  - 验收评测能不能把数据增益和单独的模型调参或 SOP 变更干净地拆开？
  - 如果买方已经在用某家偏爱的采集或日志供应商，他们到底还想要多强的厂商中立性？
operatingAssumptions:
- assumption: 足够多的滩头团队，至少每月会在真实试点压力下重训一次。
  basis: research.yaml
  validationTest: 访谈 15 个目标账户，至少要有 8 个确认存在发布压力，并有 3 个愿意在 6 个月内进入付费共创客户流程。
  decisionImpact: 如果不成立，就把目标缩窄到部署节奏更高的集成商或实验室，并推迟直销扩张。
- assumption: 在公司不自带托管式服务团队前，按项目收费的软件许可就能拿到 $180k-$250k 的年化金额。
  basis: idea.yaml
  validationTest: 把 2 个付费试点转成明确写着年度订阅的合同，且第 1 年收入里来自 转付 服务的比例不超过 35%。
  decisionImpact: 如果不成立，定价就要转向打包式托管工作流，否则高毛利的 风险投资逻辑会被削弱。
- assumption: ROS2、视频、MCAP 和 RLDS 的集成足够标准化，能在两周内跑到第一价值点。
  basis: research.yaml
  validationTest: 前 4 次部署里，第一版排序队列都必须在 10 个工作日内出来，且定制工程不超过 40 小时。
  decisionImpact: 如果不成立，就先把 ICP 限死在一套栈上，或者在继续招 GTM 之前收窄路线图。
- assumption: 验收评测能把一次数据冲刺带来的增益归因到足够可信，从而支撑发布把关。
  basis: research.yaml
  validationTest: 围绕一个任务族连做 2 次重复冲刺，跑前后评测，并把有方向性的改善或明确的“无增益”决策记录下来。
  decisionImpact: 如果不成立，就把定位改成操作员效率和队列管理工具，而不是发布治理。
- assumption: 在不招企业销售的前提下，创始人主导销售加生态转介绍也能拿下前 5 个试点。
  basis: 主观判断
  validationTest: 先列出 25 个账户名单，并要求在第 9 个月前拿到 5 个付费试点或签好的试点 LOI。
  decisionImpact: 如果不成立，就在继续加 烧钱 之前回头改 ICP、包装和渠道组合。
experimentRoadmap:
- horizon: 0–90 天
  experiment: ICP 与购买触发访谈
  hypothesis: 目标创业公司里的自主负责人会把新 SKU 或治具变体，加上扩单复盘，描述成最直接的预算触发器。
  successMetric: 完成 15 次访谈，其中至少 8 次匹配这一触发器，并识别出 5 个活跃机会。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 人工陪跑式历史日志分诊
  hypothesis: 在历史 rosbag2 和视频数据上做故障聚类，能够在不漏关键故障模式的前提下，把推荐示范集压得比人工复盘更小。
  successMetric: 2 个共创客户各自拿 50 条以上历史轨迹片段做基准，并接受至少 70% 的优先级队列。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 真实试点单元数据冲刺
  hypothesis: 产品能在真实试点单元里，把“识别故障→批准重训批次”的时间至少压缩 50%。
  successMetric: 3 个试点各完成 1 次冲刺，且到批准批次的时间都低于 21 天，并留下明确的发布决策记录。
  owner: ML / 数据基础设施负责人
- horizon: 90–180 天
  experiment: 定价与合同包装测试
  hypothesis: 对自主买方来说，按项目定价会比按席位或存储定价更容易成交。
  successMetric: 选中的方案在 8 次定价沟通里赢下 5 次，并进入 2 份已签试点 范围。
  owner: 创始人 / CEO
- horizon: 6–12 个月
  experiment: 集成模板可复用性测试
  hypothesis: 一套 ROS2、视频、MCAP 和 RLDS 的 接入 模板，能让大多数客户在 10 个工作日内跑到可用的摄取和发布报告。
  successMetric: 前 5 个生产部署里有 4 个达标，而且不需要新增连接器。
  owner: 解决方案工程师
- horizon: 12–18 个月
  experiment: 伙伴供给的采集与评测交付
  hypothesis: 合格的遥操作和评测伙伴能扩张交付产能，同时不牺牲数据质量，也不拖慢转化。
  successMetric: 25% 的高优先级队列量通过认证伙伴执行，且验收评测结果不差于内部采集。
  owner: 产品与运营负责人
operations:
- 围绕 rosbag2、视频、操作员备注、MCAP、RLDS 和 LeRobot 兼容产物，维护一套归一化数据 schema。
- 每周和自主负责人、遥操作运营负责人、评测 负责人 一起开故障复盘会，批准下一批队列和验收指标。
- 保留不可篡改的溯源与发布签核记录，方便买方审计、安全复盘和部署后监控导出。
- 在把客户工作外发前，先用 turnaround、示范质量和可追溯性 SLA 去筛遥操作、标注和评测伙伴。
team:
- role: 创始人 / CEO
  startTiming: 第 0 个月
  rationale: 在打法还没跑顺之前，先亲自抓 ICP 发现、创始人主导销售、共创客户招募和伙伴生态。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭好摄取、溯源图谱和第一版故障复盘工作流，把首批试点验证所需的底座先跑通。
- role: ML / 数据基础设施负责人
  startTiming: 第 1 个月
  rationale: 负责故障聚类、队列排序和验收评测度量，让产品能证明因果增益。
- role: 解决方案工程师
  startTiming: 第 3 个月
  rationale: 把 ROS2 和视频 接入 产品化，把到价值时间压在两周以内，并削掉服务拖累。
- role: 产品与运营负责人
  startTiming: 第 6 个月
  rationale: 在真实试点里把发布工作流、伙伴 QA 和审计导出要求跑顺。
- role: GTM 负责人
  startTiming: 第 12 个月
  rationale: 只有当付费试点信息、实施和定价都显出可复用转化后，才加销售 pipeline 产能。
milestones:
- horizon: 0–12 个月
  items:
  - 在双臂电子装配和实验室自动化滩头市场里，签下 3–5 个付费共创客户。
  - 把已覆盖项目里“识别故障→批准重训批次”的时间至少压缩 50%。
  - 至少把 2 个试点转成年度生产合同。
  - 把“接入→第一版排序队列”产品化到 10 个工作日内。
- horizon: 12–24 个月
  items:
  - 做到 5–7 个客户、8–10 个生产项目。
  - 补齐多站点发布历史、基于角色的签核和审计导出。
  - 在现有账户里，从第一任务族扩到第二条工作流。
  - 建立 2 个伙伴关系：要么能带来机会，要么能按要求质量执行采集与评测。
- horizon: 24–36 个月
  items:
  - 做到约 15 个生产项目，或达到与模型里 $3.6M SOM 一致的 ARR。
  - 把控制平面扩到至少一个双臂之外的相邻操作品类。
  - 根据留存、赢单率和集成复用性，决定是否扩到仓储或人形机器人项目。
risks:
- risk: 定制化机器人栈的集成复杂度拖慢 接入 和到价值时间。
  likelihood: High
  impact: High
  mitigation: 先押一套以 ROS2、视频和 MCAP 为中心的模板；在前 5 次部署跑出复用性之前，ICP 之外的定制栈一律不接。
- risk: XDOF、Foxglove 或 RobOps 供应商把足够多的工作流打包进去，差异化被压缩。
  likelihood: Medium
  impact: High
  mitigation: 靠厂商中立的故障优先级、增益归因和发布治理赢，而这些恰好是打包工具最难证明的。
- risk: 因为模型调参或 SOP 变更搅在一起，数据增益归因始终说不清。
  likelihood: Medium
  impact: High
  mitigation: 试点合同只围绕一个固定任务族、一套预定义验收指标和锁定的对照窗口来签。
- risk: 滩头市场太小或过于间歇，没法在扩到相邻场景前支撑高效直销。
  likelihood: Medium
  impact: High
  mitigation: 把前 12 个月当成证伪阶段；只有相邻操作项目在发布节奏和溯源痛点上真的同构时，才往外扩。
- risk: 客户视频和现场日志的安全审查拖慢成交，或者限制了可用数据访问。
  likelihood: Medium
  impact: Medium
  mitigation: 从第一批试点 范围 开始就给出“不拿去训练”的承诺、可导出的 溯源链，以及清晰的数据处理控制。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱覆盖 18 个月：把摄取、优先级、溯源和验收评测的核心能力做出来；完成 3–5 个付费共创客户；至少把其中 2 个转成年度生产合同；并在扩大 GTM 之前，把一套可复用的 ROS2 + 视频集成模板产品化。
