  baseCase: "$0.90k 混合年化 ARPU"
  upsideCase: "$1.00k 混合年化 ARPU"
  y3RevenueImpactK: -99.0
  cashImpactK: -69.0
- variable: CAC
  downsideCase: "口碑裂变减弱，CAC 升至 $0.9k"
  baseCase: "$0.6k CAC"
  upsideCase: "合作伙伴批量队列更强，CAC 降至 $0.4k"
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: churn
  downsideCase: "月度流失率 3.5%"
  baseCase: "月度流失率 2.5%"
  upsideCase: "月度流失率 1.8%"
  y3RevenueImpactK: -70.0
  cashImpactK: -95.0
- variable: sales cycle
  downsideCase: "KYC 加入驻延误将激活时间推迟至 30 天以上"
  baseCase: "大多数美发师在一个月内完成激活并启用支付"
  upsideCase: "合作伙伴辅助批量队列 2 周内完成激活"
  y3RevenueImpactK: -85.0
  cashImpactK: -120.0
- variable: gross margin
  downsideCase: "退出毛利率 67%"
  baseCase: "退出毛利率 70%"
  upsideCase: "退出毛利率 72%"
  y3RevenueImpactK: 0.0
  cashImpactK: -32.0
- variable: hiring pace
  downsideCase: "雅加达和支持岗位提前 2 个季度招募"
  baseCase: "第 3 年第 4 季度团队规模维持 9 名全职员工"
  upsideCase: "待合作伙伴需求验证后再招募上线负责人"
  y3RevenueImpactK: -30.0
  cashImpactK: -140.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> ActivatedStylists
      ActivatedStylists --> PaymentEnabledBusinesses
      PaymentEnabledBusinesses --> ProcessedGMV
      ProcessedGMV --> TakeRateRevenue
      PaymentEnabledBusinesses --> TeamPlanRevenue
      TakeRateRevenue --> GrossProfit
      TeamPlanRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 营收引擎
  finding: 基础情景的驱动力是活跃支付启用商户从第 1 年末的 55 家增长至第 3 年末的 1000 家，同时混合 ARPU 仅达到约 $0.90k。
- checkName: 必须顺利的环节
  finding: 定金必须足够长时间留在平台内，支付捕获和低 CAC 社群口碑才能提升每位美发师的毛利润。
- checkName: 模型失效条件
  finding: 若平台外支付泄漏将 ARPU 压低至 $0.75k 附近，或 KYC 拖慢激活，公司在雅加达验证节点之前可能需要更多现金。
- checkName: 下一轮融资的验证条件
  finding: 下一轮融资需证明约 700 家活跃商户、团队套餐付费采用，以及可复用的马尼拉到雅加达入驻操作手册。
sanityChecks:
