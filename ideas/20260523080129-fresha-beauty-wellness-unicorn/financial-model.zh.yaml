  amountM: 2.0
  runwayMonths: 30
  milestone: 达到约 700 家活跃支付启用商户，在留存沙龙中验证团队工作流追加销售，并以可复用的 PSP 和社群入驻操作手册进入雅加达，同时保留约 6 个月的资金缓冲。
