slug: beauty-os-emerging-markets
date: '2026-05-23'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-23] 计划日期后的第一个完整月份'
- id: A2
  name: 初始现金与 pre-seed 融资规模
  value: '2000.0'
  unit: USDk
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 基础情景取区间下限，因团队主力在马尼拉/雅加达，模型明确采用资金约束假设'
- id: A3
  name: 客户单元定义
  value: 已启用支付功能的活跃美容商户
  unit: definition
  source: '[BP milestones 已启用支付功能的活跃商户] + [BP businessModel unitOfValue 通过平台处理的付费预约 GMV]'
- id: A4
  name: 第 1 年逐月新增客户数
  value: '[0,0,5,5,5,5,5,5,5,5,5,10]'
  unit: 净新增活跃商户数
  source: '[BP milestones 0-12 个月] 年末达到 55 名留存支付启用美发师，略超 50 家目标'
- id: A5
  name: 第 2 年客户端点（按季）
  value: '[120,220,320,420]'
  unit: 各季末活跃商户数
  source: '[BP milestones 12-24 个月] 节奏设定为在第 4 季度落在 300–500 活跃商户目标区间的下半段'
- id: A6
  name: 第 3 年客户端点（按季）
  value: '[550,700,850,1000]'
  unit: 各季末活跃商户数
  source: '[BP milestones 24-36 个月；BP market.som；RS market.som] 第 3 年末达到约 1000 家活跃商户'
- id: A7
  name: 每家活跃商户年均 GMV
  value: '46.0'
  unit: 每家商户每年 USDk
  source: '[RS market.bottomUpSizingDrivers 每家商户年均处理 GMV 约 $46k]'
- id: A8
  name: 变现梯度
  value: 1.5% 抽佣率加升级沙龙 $30/月团队附加订阅
  unit: 定价
  source: '[BP gtm pricing 1.5% 抽佣率] + [BP investorMemo.initialContract $20–$40 每月团队工作流附加订阅；取中位数 $30]'
- id: A9
  name: 混合年化 ARPU 增长路径
  value: Y1 月度年化 ARPU 0.24–0.60；Y2 按季 0.56、0.60、0.64、0.70；Y3 按季 0.75、0.80、0.85、0.90
  unit: 每家活跃商户年均 USDk
  source: '[A7] × 平台内支付捕获率上升加少量 [A8] 团队套餐采用；上限接近 [BP market.som] 暗示的约 $0.7k 抽佣天花板，附带小幅软件增量'
- id: A10
  name: 收入确认公式
  value: 期间平均活跃商户数 × 混合年化 ARPU
  unit: 公式
  source: '初创财务经验法则，来源：Financial Modeler 期中激活惯例'
- id: A11
  name: 毛利率增长路径
  value: Y1 45%–60%；Y2 62%–67%；Y3 68%–70%
  unit: 毛利率百分比
  source: '[BP businessModel targetGrossMarginPct 70]，早期受 PSP、消息和入驻支持拖累，详见 [RS market.headwinds]'
- id: A12
  name: 含税薪资区间
  value: 创始人/CEO 90；工程 96；产品/设计 72；运营 60；销售/社区 66；商户成功 48；上线合作 66
  unit: 每名全职员工年均 USDk
  source: '[BP team] + 初创财务经验法则，来源：东南亚软件初创 seed 阶段含税薪酬区间'
- id: A13
  name: 招募时序
  value: 创始人/CEO 和首名工程师在起始时加入；产品在 Y1Q2；运营在 Y1Q3；GTM/社区在 Y1Q4；第二名工程师在 Y2Q1；商户成功在 Y2Q2；雅加达上线/合作伙伴在 Y3Q2；第二名 GTM 在 Y3Q4
  unit: 时间节点
  source: '[BP team startTiming] + [BP strategicChoices.sequencingRationale] + 保守招募经验法则，保持模型精简'
- id: A14
  name: 非薪资运营支出增长路径
  value: Y1 月度 S&M 2.0–8.0、R&D 4.5–7.0、G&A 3.0–5.5；Y2–Y3 按季 S&M 36–70、R&D 20–31、G&A 14–21
  unit: USDk
  source: '[BP operations] + [BP fundingAsk.useOfFundsSummary] + PSP 集成、云服务、差旅、社群活动和合规顾问的初创财务经验法则'
- id: A15
  name: 单位经济中的月度流失率
  value: '2.5'
  unit: 百分比
  source: 面向非正规从业者的早期 SMB 工作流软件初创财务经验法则；与 [BP mustBeTrue 支付启用美发师 30 天留存超 60%] 相互校准
- id: A16
  name: 混合 CAC
  value: '0.6'
  unit: 每家活跃商户 USDk
  source: '[BP gtm 创始人主导与社群主导 WhatsApp 口碑裂变] + [BP funnelTargets 推荐 25%+] 暗示规模化后每客获取成本低于 $1k，尽管社区支出偏少'
- id: A17
  name: 融资规模规则
  value: 达到 Y3Q2 验证节点再加 6 个月缓冲
  unit: 政策
  source: 开发合同 + [BP milestones] 下一轮融资验证节点：700 家活跃商户、有效的团队套餐追加销售，以及雅加达上线就绪
- id: A18
  name: 现金流简化假设
  value: 期末现金 = 期初现金 + 累计 EBITDA
  unit: 公式
  source: '初创财务经验法则，来源：pre-seed 轻资产软件现金简化假设'
