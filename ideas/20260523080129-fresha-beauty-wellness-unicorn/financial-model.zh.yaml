scenarios:
  downside:
    description: 支付捕获停留在部分状态，KYC 摩擦拖慢激活，团队套餐转化率落后于独立美发师切口。
    y3RevenueK: 440.0
    y3EbitdaK: -720.0
    cashLowPointK: 40.0
    keyAssumptionChanges:
    - "第 3 年末活跃商户约 800 家，而非 1000 家。"
    - "因更多预约发生在平台外，第 3 年年化 ARPU 上限约 $0.75k。"
    - "支持和消息成本居高不下，毛利率在 67% 附近止步。"
  base:
    description: 马尼拉大都会口碑裂变令获客成本足够低廉，独立美发师切口得以扩张，随后少量团队套餐层在雅加达上线前拉升 ARPU。
    y3RevenueK: 588.75
    y3EbitdaK: -633.94
    cashLowPointK: 238.18
    keyAssumptionChanges:
    - "第 3 年退出时 1000 家活跃商户，与商业计划的 SOM 情景一致。"
    - "通过更好的支付捕获加有限 $30/月团队套餐采用，混合年化 ARPU 达到 $0.90k。"
    - "入驻和支持操作手册标准化后，毛利率仅在第 3 年才达到 70% 目标。"
  upside:
    description: 定金采用落地迅速，合作伙伴批量队列有效，小型沙龙提前升级，无需大幅扩充团队。
    y3RevenueK: 720.0
    y3EbitdaK: -470.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - "通过更密集的社群和学校合作伙伴关系，第 3 年末活跃商户约 1150 家。"
    - "平台内 GMV 捕获增强加 25% 团队套餐采用率，混合年化 ARPU 约 $1.00k。"
    - "消息和支持成本随账户规模摊薄，毛利率提升至约 72%。"
