  firstCustomer: "马尼拉大都会的独立美甲技师，拥有 60–120 名固定客户，目前用 WhatsApp 接单并手动收取 GCash 付款，每周因爽约损失 2–4 个预约档"
  buyingTrigger: "一次爽约或重复预订导致档期白白浪费，而为此购买的耗材已无法退回"
  currentAlternative: "手动 WhatsApp 私信协调预约，加上逐笔发送 GCash 付款链接，以及纸质或 Notes 应用记录预约"
  switchingReason: "零订阅费消除了财务门槛；在 WhatsApp 中分享一个一键 GCash 预约链接就能替代全套手动流程，自动提醒立刻挽回爽约定金收入"
  pricingHypothesis: "月订阅费 0%；通过平台处理的支付收取 1.5% 交易手续费，与 GCash 商家标准费率持平，并因捆绑预约工作流而具备合理溢价"
