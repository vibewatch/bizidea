    mitigation: "在头 6 个月建立深度 GCash 和 GoPay API 合作关系，并完成本地语言入驻；在 Fresha 推出菲律宾专属产品之前，马尼拉活跃美发师达到 1 万名。"
  - name: 支付费率受压
    description: "GCash 或 GoPay 可能压低交易手续费、开发竞争性预约功能，或推出白标预约产品，从而消除 1.5% 的利润空间。"
    mitigation: "在第 18 个月前将主要营收来源切换为面向成长中连锁沙龙的高级劳动力管理订阅，降低对支付抽佣的依赖，构建更具防御性的经常性收入基础。"
  - name: 低 ARPU 制约风投规模
    description: "月度 GMV 较低的单个美发师可能无法产生足够的交易手续费收入，难以在不迅速积累到难以置信的美发师数量的情况下支撑风投级增长。"
    mitigation: "从第 6 个月起同步拓展沙龙连锁客户（3–10 个门店）——连锁客户通过多席位劳动力管理产生 5–10 倍的 ARPU，且因运营痛点而非价格敏感性驱动，销售周期更短。"
