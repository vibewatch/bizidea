differentiator: >-
  Unlike Fresha and Western competitors that require desktop onboarding,
  English-language UX, and credit-card payment infrastructure, this platform is
  built WhatsApp-native for markets where the phone is the entire business. The
  zero-subscription-fee model eliminates the primary adoption barrier for informal
  economy operators, and local payment rail integrations (GCash, GoPay, M-Pesa)
  remove the setup friction that stalls every alternative. Local-language
  onboarding and culturally adapted service menus create switching costs a global
  platform cannot replicate quickly, and the booking-data-as-credit-scoring moat
  enables embedded BNPL and growth products unavailable from any incumbent.
