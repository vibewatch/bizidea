ideaScorecard:
  signalStrength:
    score: 4
    rationale: "Three corroborating sources confirm Fresha's unicorn milestone and SEA and Africa expansion intent; KKR's explicit market targeting provides strong institutional validation of the geographic opportunity."
  painIntensity:
    score: 5
    rationale: "130,000 businesses adopting a single platform proves the fragmentation pain is acute; in SEA and Africa the pain is amplified by informal payment infrastructure and WhatsApp-only workflow — no-shows costing 15–30% of revenue is a quantifiable daily loss."
  wedgeClarity:
    score: 4
    rationale: "WhatsApp-native booking link with GCash integration is a sharp, specific entry that matches how the target customer already operates; zero subscription fee removes the primary adoption barrier identified by Fresha's own growth history."
  defensibility:
    score: 3
    rationale: "Network effects within stylist communities and payment rail partnerships create switching costs, but Fresha or a local clone could replicate the core product in 12–18 months; the moat deepens with booking-data-as-credit-signal for BNPL."
  ventureScale:
    score: 4
    rationale: "400,000+ registered stylists in Philippines alone implies a large GMV opportunity in one country; Indonesia adds 500K+ more; Africa multiplies further — the $15B GMV Fresha processes in Western markets is the comparable ceiling."
topRisks:
  - name: Fresha accelerates SEA localization
    description: "KKR capital could enable Fresha to move faster into Metro Manila and Jakarta than the 12–24 month window assumption, crowding out a new entrant before it reaches critical density."
    mitigation: "Build deep GCash and GoPay API partnerships and local-language onboarding in the first 6 months; establish 10,000 active stylists in Metro Manila before Fresha launches a Philippines-specific product."
  - name: Payment fee compression
    description: "GCash or GoPay could reduce transaction fees, build competing booking features, or launch a white-label booking product that eliminates the 1.5% margin."
    mitigation: "Transition the primary revenue stream to premium workforce management subscriptions for growing salon chains by month 18, reducing dependence on payment take-rate and building a more defensible recurring revenue base."
  - name: Low ARPU limits venture scale
    description: "Individual stylists with low monthly GMV may generate insufficient transaction fee revenue to sustain VC-grade growth without reaching implausibly large stylist counts quickly."
    mitigation: "Pursue salon chain customers (3–10 locations) in parallel from month 6 — chains generate 5–10x ARPU through multi-seat workforce management and have faster sales cycles driven by operational pain rather than price sensitivity."
