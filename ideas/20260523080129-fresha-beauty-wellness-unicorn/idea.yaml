  currentAlternative: "Manual WhatsApp DM booking coordination plus individual GCash payment link sharing and paper or Notes app appointment tracking"
  switchingReason: "Zero subscription cost removes the financial barrier; a single 1-tap GCash booking link shared in WhatsApp replaces the entire manual process, with automated reminders that immediately recover no-show deposit revenue"
  pricingHypothesis: "0% monthly subscription; 1.5% transaction fee on payments processed through the platform, competitive with GCash Business standard rates and justified by the booking-bundled workflow"
