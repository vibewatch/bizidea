  marketMapDiagram:
    title: Beauty booking stack map
    mermaid: |-
      quadrantChart
        title Market map
        x-axis Low localization --> High localization
        y-axis Low workflow depth --> High workflow depth
        Mindbody: [0.22, 0.80]
