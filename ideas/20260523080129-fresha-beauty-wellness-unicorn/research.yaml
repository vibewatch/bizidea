        Booksy: [0.61, 0.60]
        Parlon: [0.72, 0.43]
        Proposed startup: [0.90, 0.77]
  fiveForces:
    supplierPower:
      score: 3
      rationale: >-
        Supplier power is moderate because Meta and local PSPs control critical messaging and payment rails, and each
        can change pricing, approval rules, or payout behavior; however, the startup still has multiple PSP options
        across target geographies.
      sourceRefs:
        - 76
        - 77
        - 79
        - 80
        - 81
        - 82
        - 83
    buyerPower:
      score: 4
      rationale: >-
        Buyer power is high because the beachhead customer is small, price-sensitive, and can fall back to manual chat,
        light marketplaces, or low-cost incumbents with limited contractual lock-in.
      sourceRefs:
        - 42
        - 49
        - 51
        - 58
        - 99
        - 109
    threatOfEntrants:
      score: 4
      rationale: >-
        Threat of entrants is high because core APIs for messaging and wallet payments are already available, which
        lowers raw product-building barriers; the harder part is distribution and localized trust.
      sourceRefs:
        - 76
        - 79
        - 81
        - 82
        - 108
    threatOfSubstitutes:
      score: 5
      rationale: >-
        Threat of substitutes is very high because manual WhatsApp coordination plus cash or wallet transfers already
        works “well enough” for many stylists, and generic reminder or marketplace tools partially solve the same pain.
      sourceRefs:
        - 21
        - 31
        - 58
        - 99
        - 105
    competitiveRivalry:
      score: 4
      rationale: >-
        Rivalry is high because global suites, mobile marketplaces, and local beauty-tech tools all border the same
        workflow, even if none yet owns the exact localized wedge.
      sourceRefs:
        - 42
        - 45
        - 49
        - 51
        - 56
        - 91
  pestle:
    - factor: political
      impact: positive
      point: >-
        BSP is still actively improving digital payment settlement infrastructure, which is supportive for wallet-linked
        SMB workflows.
      sourceRefs:
        - 65
    - factor: economic
      impact: positive
      point: >-
        Beauty and personal care spend is still growing in the Philippines and Indonesia, which supports software-layer
        demand even before full formalization.
      sourceRefs:
        - 2
        - 10
    - factor: social
      impact: positive
      point: >-
        Phone, internet, and social penetration are already high enough in both the Philippines and Indonesia to support
        messaging-led client acquisition and booking behavior.
      sourceRefs:
        - 31
        - 32
    - factor: technological
      impact: positive
      point: >-
        WhatsApp Flows plus local PSP APIs materially reduce the cost and complexity of building a wallet-first
        appointment workflow.
      sourceRefs:
        - 76
        - 81
        - 82
    - factor: legal
      impact: negative
      point: >-
        Data-privacy compliance, merchant-acquiring rules, and Indonesia's fintech supervision requirements add real
        operating overhead if the startup touches funds or scales customer-data processing.
      sourceRefs:
        - 63
        - 64
        - 73
  adoptionFrictionMatrix:
    - friction: Merchant KYC and payout onboarding for home-based salons
      severity: high
      affectedBuyer: Solo stylist-owner
      mitigation: >-
        Launch through PSP partners and push most compliance burden into existing merchant-onboarding flows rather than
        seeking direct acquiring status early.
      sourceRefs:
        - 64
        - 79
        - 81
        - 82
    - friction: Client trust in paying a deposit through chat
      severity: medium
      affectedBuyer: Stylist-owner and end customer
      mitigation: >-
        Start with optional or low first-visit deposits, emphasize reminders and social proof, and make
        refund/cancellation rules explicit.
      sourceRefs:
        - 99
        - 100
        - 101
    - friction: WhatsApp template-message costs and policy constraints
      severity: medium
      affectedBuyer: Platform operator
      mitigation: >-
        Use templates sparingly, drive interactions into open service windows, and reserve paid messages for high-value
        confirmations and reminders.
      sourceRefs:
        - 76
        - 77
    - friction: Switching away from manual tools that already feel familiar
      severity: medium
      affectedBuyer: Solo stylist-owner
      mitigation: >-
        Keep onboarding under five minutes, let pros share a simple booking link, and avoid asking for desktop setup or
        deep data migration up front.
      sourceRefs:
        - 31
        - 52
        - 58
market:
  tam:
    value: $11.7M
    rationale: >-
      Midpoint of 10,881-23,027 indexed Philippine beauty salons [110][109] × assumed $46k annual processed GMV per
      business (40% of Fresha's roughly $115k global average from $15B GMV / 130k businesses [91]) × 1.5% take rate ≈
      $11.7M.
    isEstimate: true
    sourceRefs:
      - 91
      - 109
      - 110
  sam:
    value: $4.6M
    rationale: >-
      Metro Manila's 6,683 indexed beauty salons [109] × assumed $46k annual processed GMV per business × 1.5% take rate
      ≈ $4.6M.
    isEstimate: true
    sourceRefs:
      - 91
      - 109
  som:
    value: $0.7M
    rationale: >-
      Reach 1,000 active businesses by year 3 across Metro Manila plus adjacent Philippine cities, each processing
      roughly $46k annually, then capture 1.5% of GMV: 1,000 × $46k × 1.5% ≈ $0.7M.
    isEstimate: true
    sourceRefs:
      - 31
      - 91
      - 109
bottomUpSizingDrivers:
  - driver: Total addressable units
    value: 10,881-23,027 indexed Philippine beauty salons; midpoint 16,954 used for TAM
    source: "[109][110]"
  - driver: Beachhead units
    value: 6,683 indexed Metro Manila beauty salons
    source: "[109]"
  - driver: Average annual processed GMV per business
    value: ~$46k est. = 40% × ($15B / 130k businesses)
    source: "[91] + calc"
  - driver: Monetization assumption
    value: 1.5% transaction take rate
    source: calc
