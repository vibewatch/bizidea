competitors:
  - name: Fresha
    stage: scale-up
    wedge: Beauty/wellness OS plus marketplace plus integrated payments at global scale
    pricing: >-
      Independent plan about $19.95/month or $14.95 per team member, plus 20% marketplace new-client fee and 2.29%-2.79%
      payment fees
    strength: Global scale, strong product breadth, marketplace demand, and proven GMV flywheel.
    weaknessVsUs: >-
      Still not built around WhatsApp-native onboarding or local-wallet-first checkout for informal micro-salons in
      emerging markets.
    sourceRefs:
      - 42
      - 91
  - name: Booksy
    stage: scale-up
    wedge: Mobile-first beauty marketplace with strong consumer discovery and simple SMB tools
    pricing: $29.99/month Biz; $39.99/month Biz+; $54.99/month Business
    strength: Strong after-hours booking behavior, consumer marketplace pull, and easy mobile UX.
    weaknessVsUs: >-
      Lighter business management, regionally uneven marketplace coverage, and no clear local-wallet localization thesis
      for Southeast Asia.
    sourceRefs:
      - 51
      - 52
  - name: Mindbody
    stage: incumbent
    wedge: Enterprise-grade scheduling, payments, analytics, and marketplace infrastructure for wellness businesses
    pricing: >-
      Quote-based official tiers (Starter / Accelerate / Ultimate) plus paid add-ons such as Messenger[ai] and branded
      app
    strength: Deep feature set, integrations, analytics, and brand trust across wellness verticals.
    weaknessVsUs: Overbuilt and likely overpriced for the solo stylist-owner who mainly wants phone-native booking and deposits.
    sourceRefs:
      - 45
  - name: Vagaro
    stage: scale-up
    wedge: Affordable all-in-one salon and spa software with payments, marketplace, and payroll add-ons
    pricing: $30/month individual plus $10/additional staff and payment fees from roughly 2.2%-3.5% + fixed fees
    strength: Rich feature depth at SMB-friendly headline pricing.
    weaknessVsUs: Still oriented toward fuller salon management and card-centric checkout rather than wallet-led chat commerce.
    sourceRefs:
      - 49
  - name: Parlon
    stage: seed
    wedge: Local Philippine beauty-tech brand with salon network and fintech integrations
    pricing: Not publicly disclosed
    strength: Local brand familiarity and evidence of real salon aggregation in the Philippines.
    weaknessVsUs: Appears to be earlier-stage and less focused on a pure WhatsApp-native micro-salon operating layer.
    sourceRefs:
      - 56
regulatoryTechnicalConstraints:
  - point: >-
      Direct merchant acquisition or merchant-fund handling in the Philippines can trigger BSP Merchant Acquisition
      License / registration obligations.
    sourceRefs:
      - 64
  - point: >-
      Philippine customer-data processing at scale can require DPO/DPS registration and broader Data Privacy Act
      compliance discipline.
    sourceRefs:
      - 63
  - point: >-
      Indonesia expansion can trigger OJK sandbox, licensing, local data-center, and consumer-protection requirements if
      the company performs regulated fintech activities directly.
    sourceRefs:
      - 73
  - point: WhatsApp reminder economics are exposed to template-message pricing and service-window rules.
    sourceRefs:
      - 76
      - 77
validationSignals:
  - point: Fresha shows category-scale demand with 130k businesses, 35M appointments per month, and $15B annual GMV.
    sourceRefs:
      - 88
      - 91
  - point: >-
      Booksy reports 38% of bookings happen after hours and that automatic reminders reduce no-shows by at least 25%,
      which supports the self-serve plus deposit thesis.
    sourceRefs:
      - 52
  - point: >-
      Belliata shows smaller, mobile-oriented beauty discovery tools can aggregate the long tail, claiming 10k+
      businesses and 30k+ professionals across 26 countries.
    sourceRefs:
      - 58
  - point: Metro Manila alone appears dense enough for a focused first market with 6,683 indexed salons.
    sourceRefs:
      - 109
  - point: >-
      Kenyan SME data shows digital acceptance can directly reduce lost sales and security pain, which supports the
      longer-term Africa expansion logic.
    sourceRefs:
      - 30
      - 105
openQuestions:
  - >-
    What percentage of first-time clients in Metro Manila will accept a deposit request inside chat versus only a
    reminder workflow?
  - How fast can home-based salons clear PSP KYC and payout onboarding without high drop-off?
  - >-
    Can WhatsApp acquisition and reminder costs stay attractive once template-message pricing is fully loaded into
    contribution margin?
  - >-
    How quickly will Fresha, Parlon, or another local player ship a wallet-native, messaging-first workflow in the
    Philippines?
