        通用提醒或市集工具也能部分解决同样的痛点。
      sourceRefs:
        - 21
        - 31
        - 58
        - 99
        - 105
    competitiveRivalry:
      score: 4
      rationale: >-
        竞争激烈——全球套件、移动市集和本地美容科技工具都在同一工作流边界上竞争，尽管
        目前没有哪家精确占据本地化切口。
      sourceRefs:
        - 42
        - 45
        - 49
        - 51
        - 56
        - 91
  pestle:
    - factor: political
      impact: positive
      point: >-
        BSP 仍在积极改善数字支付结算基础设施，对钱包关联 SMB 工作流有利。
      sourceRefs:
        - 65
    - factor: economic
      impact: positive
      point: >-
        菲律宾和印度尼西亚的美容和个人护理消费仍在增长，即使在完全正规化之前也能支撑
        软件层需求。
      sourceRefs:
        - 2
        - 10
    - factor: social
      impact: positive
      point: >-
        菲律宾和印度尼西亚的手机、互联网和社交媒体渗透率已足够高，可以支撑消息驱动的
        客户获取和预约行为。
      sourceRefs:
        - 31
        - 32
    - factor: technological
      impact: positive
      point: >-
        WhatsApp Flows 加本地 PSP API，大幅降低了构建钱包优先预约工作流的成本和复杂度。
      sourceRefs:
        - 76
        - 81
        - 82
    - factor: legal
      impact: negative
      point: >-
        若初创公司直接涉及资金处理或扩大客户数据处理规模，数据隐私合规、商户收单规则
        和印度尼西亚金融科技监管要求将带来切实的运营开销。
      sourceRefs:
        - 63
        - 64
        - 73
  adoptionFrictionMatrix:
    - friction: 家庭美容沙龙的商户 KYC 和付款入驻
      severity: high
      affectedBuyer: 独立沙龙老板兼从业者
      mitigation: >-
        通过 PSP 合作伙伴上线，将大部分合规负担推入现有商户入驻流程，而非早期寻求
        直接收单资质。
      sourceRefs:
        - 64
        - 79
        - 81
        - 82
    - friction: 客户对在聊天内支付定金的信任度
      severity: medium
      affectedBuyer: 沙龙老板兼从业者及终端客户
      mitigation: >-
        首次到访从可选或低额定金开始，强调提醒效果和社会证明，并明确退款和取消规则。
      sourceRefs:
        - 99
        - 100
        - 101
    - friction: WhatsApp 模板消息费用和政策约束
      severity: medium
      affectedBuyer: 平台运营方
      mitigation: >-
        节制使用模板消息，将更多互动引入开放服务窗口，将付费消息保留用于高价值的确认
        和提醒。
      sourceRefs:
        - 76
        - 77
    - friction: 从已熟悉的手动工具切换时的惰性
      severity: medium
      affectedBuyer: 独立沙龙老板兼从业者
      mitigation: >-
        将入驻时间控制在 5 分钟以内，让从业者分享一条简单的预约链接，避免要求桌面设置
        或前期大量数据迁移。
      sourceRefs:
        - 31
        - 52
        - 58
market:
  tam:
    value: $11.7M
    rationale: >-
      菲律宾索引美容沙龙数量中位数（10,881–23,027）[110][109] × 每家商户年均处理 GMV
      约 $46k（Fresha $150 亿 GMV / 13 万商户全球均值的 40%）[91] × 1.5% 抽佣率 ≈ $1170 万。
    isEstimate: true
    sourceRefs:
      - 91
      - 109
      - 110
  sam:
    value: $4.6M
    rationale: >-
      马尼拉大都会 6,683 家索引美容沙龙 [109] × 每家商户年均处理 GMV 约 $46k × 1.5%
      抽佣率 ≈ $460 万。
    isEstimate: true
    sourceRefs:
      - 91
      - 109
  som:
    value: $0.7M
    rationale: >-
      第 3 年在马尼拉大都会及菲律宾邻近城市达到 1000 家活跃商户，每家年处理约 $46k，
      捕获 1.5% 的 GMV：1,000 × $46k × 1.5% ≈ $70 万。
    isEstimate: true
    sourceRefs:
      - 31
      - 91
      - 109
