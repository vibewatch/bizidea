categoryDynamics:
  growthRate: 11.2% CAGR
  growthRateSourceRefs:
    - 2
  tailwinds:
    - point: >-
        菲律宾美容和个人护理消费预计在 2030 年前快速增长，印度尼西亚仍是体量庞大且持续
        增长的美容市场。
      sourceRefs:
        - 2
        - 10
    - point: >-
        菲律宾和印度尼西亚的移动、互联网和社交渗透率已足以支撑手机优先的入驻和预约行为。
      sourceRefs:
        - 31
        - 32
    - point: >-
        品类领导者证明预约加支付能为美容从业者创造可量化的价值，包括更多非工作时段预约
        和更少爽约。
      sourceRefs:
        - 52
        - 91
  headwinds:
    - point: >-
        目标用户手动聊天加钱包或现金支付这套替代方案已"够用"，提高了切换摩擦。
      sourceRefs:
        - 21
        - 85
        - 99
    - point: 全球现有厂商和本地工具一旦发现使用场景有吸引力，随时可以下沉市场或本地化。
      sourceRefs:
        - 42
        - 49
        - 56
        - 91
    - point: 即使核心 API 已可用，合规、KYC 和付费消息经济学仍会增加运营摩擦。
      sourceRefs:
        - 63
        - 64
        - 77
competitors:
  - name: Fresha
    stage: scale-up
    wedge: Beauty/wellness OS plus marketplace plus integrated payments at global scale
    pricing: >-
      独立套餐约 $19.95/月或每名团队成员 $14.95，加上 20% 市集新客手续费和 2.29%–2.79%
      支付手续费
    strength: 全球规模、强大的产品广度、市集需求拉动和经验证的 GMV 飞轮。
    weaknessVsUs: >-
      仍未围绕 WhatsApp 原生入驻或面向新兴市场非正规微型沙龙的本地钱包优先结账构建。
    sourceRefs:
      - 42
      - 91
  - name: Booksy
    stage: scale-up
    wedge: Mobile-first beauty marketplace with strong consumer discovery and simple SMB tools
    pricing: "$29.99/月 Biz；$39.99/月 Biz+；$54.99/月 Business"
    strength: 强劲的非工作时段预约行为、消费者市集拉动和易用的移动端体验。
    weaknessVsUs: >-
      商业管理功能较轻，市集覆盖在区域上参差不齐，东南亚缺乏明确的本地钱包本地化方向。
    sourceRefs:
      - 51
      - 52
  - name: Mindbody
    stage: incumbent
    wedge: Enterprise-grade scheduling, payments, analytics, and marketplace infrastructure for wellness businesses
    pricing: >-
      官方报价套餐（Starter / Accelerate / Ultimate）加付费附加服务（如 Messenger[ai] 和
      品牌应用）
    strength: 深度功能集、丰富集成、强大分析和跨健康垂直的品牌信任。
    weaknessVsUs: "功能过重、价格可能过高——对主要需要手机原生预约和定金收取的独立沙龙老板来说并不合适。"
    sourceRefs:
      - 45
  - name: Vagaro
    stage: scale-up
    wedge: Affordable all-in-one salon and spa software with payments, marketplace, and payroll add-ons
    pricing: "$30/月个人版加每增加一名员工 $10，支付手续费约 2.2%–3.5% 加固定费用"
    strength: 以 SMB 友好价格提供丰富功能深度。
    weaknessVsUs: "仍面向更完整的沙龙管理和以信用卡为中心的结账，而非钱包驱动的聊天商务。"
    sourceRefs:
      - 49
  - name: Parlon
    stage: seed
    wedge: Local Philippine beauty-tech brand with salon network and fintech integrations
    pricing: 未公开披露
    strength: 菲律宾本地品牌认知度和真实的沙龙聚合证据。
    weaknessVsUs: "看起来处于更早期阶段，对纯粹的 WhatsApp 原生微型沙龙运营层关注度不高。"
    sourceRefs:
      - 56
regulatoryTechnicalConstraints:
  - point: >-
      在菲律宾直接参与商户收单或处理商户资金，可能触发 BSP 商户收单牌照/注册义务。
    sourceRefs:
      - 64
  - point: >-
      菲律宾客户数据大规模处理可能需要 DPO/DPS 注册和更全面的《数据隐私法》合规纪律。
    sourceRefs:
      - 63
  - point: >-
      印度尼西亚扩张若公司直接从事受监管金融科技业务，可能触发 OJK 沙盒、牌照、本地
      数据中心和消费者保护要求。
    sourceRefs:
      - 73
  - point: "WhatsApp 提醒经济学受模板消息计费和服务窗口规则影响。"
    sourceRefs:
      - 76
      - 77
validationSignals:
  - point: "Fresha 以 13 万商户、每月 3500 万次预约和 $150 亿年 GMV 展示了品类级别的规模需求。"
    sourceRefs:
      - 88
      - 91
  - point: >-
      Booksy 报告 38% 的预约发生在非工作时段，自动提醒将爽约率降低至少 25%，支持了自助
      加定金的论点。
    sourceRefs:
      - 52
  - point: >-
      Belliata 证明规模较小的移动端美容发现工具可以聚合长尾，声称覆盖 26 个国家超过
      1 万家商户和 3 万名从业者。
    sourceRefs:
      - 58
  - point: "马尼拉大都会本身密度已足够作为第一个聚焦市场，仅索引沙龙就有 6,683 家。"
    sourceRefs:
      - 109
  - point: >-
      肯尼亚 SME 数据显示数字收单能直接减少销售损失和安全痛点，支持了更长期的非洲扩张
      逻辑。
    sourceRefs:
      - 30
      - 105
openQuestions:
  - >-
    马尼拉大都会有多大比例的首次客户愿意在聊天内接受定金请求，而非仅接受提醒工作流？
  - "家庭美容沙龙能以多快的速度通过 PSP KYC 和付款入驻，且流失率不高？"
  - >-
    WhatsApp 获客和提醒成本在模板消息计费完全计入贡献利润后，能否保持吸引力？
  - >-
