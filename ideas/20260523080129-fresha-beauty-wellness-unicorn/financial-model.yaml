modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> ActivatedStylists
      ActivatedStylists --> PaymentEnabledBusinesses
      PaymentEnabledBusinesses --> ProcessedGMV
      ProcessedGMV --> TakeRateRevenue
      PaymentEnabledBusinesses --> TeamPlanRevenue
      TakeRateRevenue --> GrossProfit
      TeamPlanRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: The base case is driven by scaling active payment-enabled businesses from 55 at Y1 exit to 1,000 at Y3 exit while blended ARPU only reaches about $0.90K.
- checkName: Must go right
  finding: Deposits must stay on-platform long enough for payment capture and low-CAC community referrals to lift gross profit per stylist.
- checkName: Model breaks if
  finding: If off-platform payment leakage keeps ARPU closer to $0.75K or KYC slows activation, the company likely needs more cash before the Jakarta proof point.
- checkName: Next-round proof
  finding: The next financing is justified by showing ~700 active businesses, paid team-plan adoption, and a repeatable Manila-to-Jakarta onboarding playbook.
sanityChecks:
  ruleOf40: Y3 growth 304.1% + EBITDA margin -107.7% = 196.4%
  burnMultiple: Approx. Y2 burn multiple 2.6x and Y3 burn multiple 1.0x using exit ARR expansion.
  revenuePerFte: $65.4K Y3 (benchmark $200–400K SaaS)
  flags:
  - Base case still exits Y3 deeply EBITDA negative because the 1.5% take-rate wedge produces modest ARPU against a multi-country operating team.
  - Revenue per FTE is far below typical SaaS benchmarks, so the model requires team-plan upsell or materially higher payment capture to look venture efficient.
  - The path to 1,000 active businesses assumes KYC and PSP onboarding stay manageable for informal salons in both Manila and Jakarta.
  - CAC is community-led and low by assumption; if referrals do not sustain, the funding ask likely moves above the current pre-seed amount.
