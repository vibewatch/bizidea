currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-23] first full month after the plan date'
- id: A2
  name: Opening cash and pre-seed size
  value: '2000.0'
  unit: USDk
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] base case uses the bottom of range because the team is Manila/Jakarta-lean and the model is explicitly capital constrained'
- id: A3
  name: Customer unit
  value: active payment-enabled beauty business
  unit: definition
  source: '[BP milestones active payment-enabled businesses] + [BP businessModel unitOfValue paid appointment GMV processed through the platform]'
- id: A4
  name: Y1 customer adds by month
  value: '[0,0,5,5,5,5,5,5,5,5,5,10]'
  unit: net new active businesses
  source: '[BP milestones 0-12 months] reaches 55 retained payment-enabled stylists by year end, just above the 50 target'
- id: A5
  name: Y2 customer endpoints
  value: '[120,220,320,420]'
  unit: EOP active businesses by quarter
  source: '[BP milestones 12-24 months] paced to land in the lower half of the 300-500 active-business target by Q4Y2'
- id: A6
  name: Y3 customer endpoints
  value: '[550,700,850,1000]'
  unit: EOP active businesses by quarter
  source: '[BP milestones 24-36 months; BP market.som; RS market.som] reaches the stated ~1,000 active businesses by Y3 exit'
- id: A7
  name: Annual appointment GMV per active business
  value: '46.0'
  unit: USDk per business per year
  source: '[RS market.bottomUpSizingDrivers average annual processed GMV per business ~$46k]'
- id: A8
  name: Monetization ladder
  value: 1.5% take rate plus $30/mo team add-on for upgraded salons
  unit: pricing
  source: '[BP gtm pricing 1.5% take rate] + [BP investorMemo.initialContract $20-$40 per month team-workflow add-on; midpoint $30 used]'
- id: A9
  name: Blended annual ARPU ramp
  value: Y1 monthly annualized ARPU 0.24-0.60; Y2 quarterly 0.56,0.60,0.64,0.70; Y3 quarterly 0.75,0.80,0.85,0.90
  unit: USDk per active business per year
  source: '[A7] x rising on-platform payment capture plus modest [A8] team-plan adoption; capped near the [BP market.som] implied ~$0.7k take-rate ceiling with a small software uplift'
- id: A10
  name: Revenue recognition
  value: average active businesses in period multiplied by blended annual ARPU
  unit: formula
  source: 'Startup-finance heuristic, named source: Financial Modeler mid-period activation convention'
- id: A11
  name: Gross margin ramp
  value: Y1 45%-60%; Y2 62%-67%; Y3 68%-70%
  unit: gross margin percent
  source: '[BP businessModel targetGrossMarginPct 70] with early drag from PSP, messaging, and onboarding support noted in [RS market.headwinds]'
- id: A12
  name: Loaded salary bands
  value: FounderCEO 90; Engineering 96; ProductDesign 72; Operations 60; SalesCommunity 66; MerchantSuccess 48; LaunchPartnerships 66
  unit: USDk per FTE per year
  source: '[BP team] + startup-finance heuristic, named source: seed-stage Southeast Asia software startup loaded-comp bands'
- id: A13
  name: Hiring sequence
  value: FounderCEO and first engineer at start; product in Q2Y1; operations in Q3Y1; GTM/community in Q4Y1; second engineer in Q1Y2; merchant success in Q2Y2; Jakarta launch/partnerships in Q2Y3; second GTM in Q4Y3
  unit: timing
  source: '[BP team startTiming] + [BP strategicChoices.sequencingRationale] + conservative hiring heuristic to keep the model lean'
- id: A14
  name: Non-payroll operating spend ramp
  value: Y1 monthly S&M 2.0-8.0, R&D 4.5-7.0, G&A 3.0-5.5; Y2-Y3 quarterly S&M 36-70, R&D 20-31, G&A 14-21
  unit: USDk
  source: '[BP operations] + [BP fundingAsk.useOfFundsSummary] + startup-finance heuristic for PSP integration, cloud, travel, community events, and compliance counsel'
- id: A15
  name: Monthly churn for unit economics
  value: '2.5'
  unit: percent
  source: Startup-finance heuristic for early SMB workflow software with informal operators; balanced against [BP mustBeTrue payment-enabled stylists retain above 60% at 30 days]
- id: A16
  name: Blended CAC
  value: '0.6'
  unit: USDk per active business
  source: '[BP gtm founder-led and community-led WhatsApp referrals] + [BP funnelTargets referral 25%+] imply sub-$1K customer acquisition at scale despite light community spend'
- id: A17
  name: Funding sizing rule
  value: reach Q2Y3 proof point plus 6 months of buffer
  unit: policy
  source: Developer contract + [BP milestones] next-financing proof modeled as 700 active businesses, working team-plan upsell, and Jakarta launch readiness
- id: A18
  name: Cash flow simplification
  value: ending cash equals opening cash plus cumulative EBITDA
  unit: formula
  source: 'Startup-finance heuristic, named source: pre-seed asset-light software cash simplification'
