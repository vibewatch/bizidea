scenarios:
  downside:
    description: Payment capture stays partial, KYC friction slows activation, and team-plan conversion lags the solo wedge.
    y3RevenueK: 440.0
    y3EbitdaK: -720.0
    cashLowPointK: 40.0
    keyAssumptionChanges:
    - Y3 exit customers reach ~800 instead of 1,000.
    - Y3 annual ARPU tops out near $0.75K because more bookings stay off-platform.
    - Gross margin stalls around 67% as support and messaging costs stay elevated.
  base:
    description: Metro Manila referrals keep acquisition cheap enough to scale the solo wedge, then a modest team-plan layer lifts ARPU before Jakarta launch.
    y3RevenueK: 588.75
    y3EbitdaK: -633.94
    cashLowPointK: 238.18
    keyAssumptionChanges:
    - Y3 exits at 1,000 active businesses, matching the business-plan SOM case.
    - Blended annual ARPU reaches $0.90K through better payment capture plus limited $30/month team-plan adoption.
    - Gross margin reaches the 70% target only by Y3 once onboarding and support playbooks standardize.
  upside:
    description: Deposit adoption lands quickly, partner cohorts work, and small salons upgrade earlier without requiring a much larger team.
    y3RevenueK: 720.0
    y3EbitdaK: -470.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - Y3 exit customers reach ~1,150 through denser community and school partnerships.
    - Blended annual ARPU reaches about $1.00K with stronger on-platform GMV capture and 25% team-plan adoption.
    - Gross margin improves to ~72% as messaging and support costs fall per account.
