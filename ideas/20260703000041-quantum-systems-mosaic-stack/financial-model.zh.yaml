    upsideCase: "第四名工程师延迟到种子轮之后再招"
    y3RevenueImpactK: 0.0
    cashImpactK: -85.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Named tender leads] --> Discovery[Technical discovery]
      Discovery --> Pilots[Paid tender pilots]
      Pilots --> Subs[Regression subscriptions]
      Subs --> Revenue[Revenue]
      Revenue --> COGS[Cloud + support COGS]
      Revenue --> GrossProfit[Gross profit]
      COGS --> GrossProfit
      GrossProfit --> Opex[Payroll + operating spend]
      Opex --> Cash[Ending cash]
modelSanity:
  - checkName: 收入引擎
    finding: "基准情形下的收入主要来自第 1 年 3 个付费客户增长到 9 个客户、ACV 约 $200K 的过程，而不是靠大规模
      SaaS 漏斗驱动。"
  - checkName: 必须做对的事
    finding: "中立证据包必须按计划把试点转化为年度回归测试订阅，因为延迟一个季度会耗费约 $182K 现金，并
      拖累约 $83K 的第 3 年营收。"
  - checkName: 模型崩溃的条件
    finding: "如果主权交付让毛利率一直停在 65% 附近、第 3 年客户数卡在 8 个，下行情形的 EBITDA 会跌到约
      -$557K，现金需求也会超过 $2.0M。"
  - checkName: 下一轮融资的证明条件
    finding: "只有当公司在第 2 年第 4 季度前达到 7 个客户，并拿下一条获认可的合作伙伴路径，同时带着可信的
      第二套骨干系统上线计划进入第 3 年，下一轮融资才站得住脚。"
sanityChecks:
  ruleOf40: "第 3 年增长率 63.6% + EBITDA 利润率 -12.4% = 51.2%"
  burnMultiple: "第 2 年燃烧倍数约 0.6 倍，对应 $900K 的净新增营收；第 3 年改善到约 0.3 倍。"
  revenuePerFte: "第 3 年第 4 季度按 7 名全职员工计算，人均营收 $257K（对标基准 $200-400K，SaaS 行业水平）"
  flags:
    - "即便达到了研究测算出的 9 个客户 SOM，第 3 年依然是 EBITDA 负值，说明这门生意能否成立，取决于能否把
      引擎复用到第二套骨干系统，而不只是填满 MOSAIC 这个细分市场。"
    - "模型假设有两笔新增转化会在第 3 年开始前完成；如果采购评审把这些成交推迟哪怕一个季度，融资需求都会
      迅速上升。"
    - "毛利率对离线和主权支持要求依然敏感；如果交付需求超出 BP 的运营假设，公司会向软件驱动服务的经济模型
      靠拢。"
