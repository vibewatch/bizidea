scenarios:
  downside:
    description: "试点转化慢了一个季度，离线交付始终高度依赖人工支持，第 3 年末落地 8 个客户，而不是 9 个。"
    y3RevenueK: 1425.0
    y3EbitdaK: -557.3
    cashLowPointK: -2008.8
    keyAssumptionChanges:
      - "综合 ARPU 降至 $190K"
      - "稳态毛利率上限降至 65%"
      - "客户数到第 3 年第 4 季度只达到 8 个，而不是 9 个"
  base:
    description: "基准情形沿用 BP 中的 SOM：9 个客户，年度综合价值约 $200K，稳态毛利率 70%。"
    y3RevenueK: 1800.0
    y3EbitdaK: -223.8
    cashLowPointK: -1453.9
    keyAssumptionChanges:
      - "第 1 年末达到 3 个付费客户"
      - "第 2 年末达到 7 个付费客户"
      - "第 3 年维持 9 个付费客户，ACV 约 $200K"
  upside:
    description: "证据包被更快接受，第二个载荷品类更早落地，加上一次骨干系统相邻的向上销售拉高了 ACV。"
    y3RevenueK: 2135.0
    y3EbitdaK: 53.7
    cashLowPointK: -1020.0
    keyAssumptionChanges:
      - "综合 ARPU 升至 $210K"
      - "第 3 年客户数达到 10-11 个"
      - "随着部署更好地模板化，稳态毛利率提升至 72%"
