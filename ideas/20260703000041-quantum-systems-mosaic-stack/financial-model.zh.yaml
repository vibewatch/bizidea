slug: mosaic-interop-conformance-os
date: '2026-07-03'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: 模型起始时的期初现金
    value: '0'
    unit: USDK
    source: '[建模惯例] 资金缺口通过负值现金滚存和 fundingAsk 呈现，而不是假设一笔期初现金。'
  - id: A2
    name: 模型起始月份
    value: '2026-07'
    unit: YYYY-MM
    source: '[BP date] 模型从报告所在月份开始。'
  - id: A3
    name: 第 1 年付费客户爬坡
    value: 到第 12 个月累计 3 个付费客户，首个付费试点在第 6 个月，第 9 个月和第 12 个月各新增一个
    unit: customersEop
    source: '[BP milestones 0–12 months] 2 个付费招标试点加 1 份年度回归测试订阅，意味着第 1 年末共有 3 个付费客户。'
  - id: A4
    name: 第 2 年付费客户爬坡
    value: 从第 2 年第 1 季度到第 4 季度分别达到 4、5、6、7 个客户
    unit: customersEop
    source: '[BP milestones 12–24 months] 到第 24 个月，在滩头市场内增长到 6-9 个付费客户。'
  - id: A5
    name: 第 3 年付费客户爬坡
    value: 从第 3 年第 1 季度起维持 9 个客户
    unit: customersEop
    source: '[BP market.som] [RS market.som] 第 3 年 SOM 为 9 个客户，每家年度综合价值约 $200k。'
  - id: A6
    name: 每个活跃客户的年度综合收入
    value: '200'
    unit: USDK per customer-year
    source: '[BP gtm.pricing] [BP market.som] [RS market.som] $60k-$90k 的认证费加 $90k-$130k 的回归测试支持，
      取中点，并向研究测算出的约 $200k 第 3 年价值取整。'
  - id: A7
    name: 毛利率演进路径
    value: 第 1 年 65%，第 2 年 68%，第 3 年 70%
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct] [RS reportMemo.sensitivityCases] 早期试点更依赖人工支持，
      随着部署逐步模板化，稳态毛利率将达到 70% 的目标。'
  - id: A8
    name: 创始人/CEO 全成本薪酬
    value: '140'
    unit: USDK per year
    source: '[BP team] 欧洲国防创业公司的经验法则：创始人拿低于市场水平的现金薪酬，另加薪酬税和福利。'
  - id: A9
    name: 平台工程全成本薪酬
    value: '170'
    unit: USDK per FTE per year
    source: '[BP team] 面向欧洲协议/仿真工程师的创业公司财务经验法则，含薪酬税和福利。'
  - id: A10
    name: 解决方案/部署全成本薪酬
    value: '155'
    unit: USDK per FTE per year
    source: '[BP team] 面向主权部署/客户上线工程师的创业公司财务经验法则，含薪酬税和福利。'
  - id: A11
    name: 合作伙伴/GTM 全成本薪酬
    value: '150'
    unit: USDK per FTE per year
    source: '[BP team] 面向需要频繁出差的国防合作伙伴负责人的创业公司财务经验法则。'
  - id: A12
    name: 超出 BP 明确列出岗位的招聘时点
    value: 第三名工程师在第 2 年第 2 季度到岗；第四名工程师在第 3 年第 4 季度加入
    unit: hire timing
    source: '[BP product.twelveMonth] [BP product.twentyFourMonth] [BP strategicChoices.sequencingRationale]
      只有在第一套载荷工作流跑通、第二套骨干系统模块启动之后，才需要额外的工程产能。'
  - id: A13
    name: 创始人职能分配
    value: 60% 用于销售与市场，40% 用于综合管理
    unit: percent of founder cash comp
    source: '[BP gtm] [BP team] 创始人主导销售是早期的主要动作，但采购、法务和运营开销依然占相当比重。'
  - id: A14
    name: 非薪资运营支出爬坡
    value: 第 1 年月均约 $20K，第 2 年月均约 $33K，第 3 年月均约 $41K
    unit: USDK
    source: '[BP fundingAsk] [BP operations] [RS distributionChannels] [RS regulatoryTechnicalConstraints]
      涵盖差旅、安全/法务、保险、仿真工具和主权交付开销的经验法则。'
  - id: A15
    name: 稳态获客成本（CAC）
    value: '82.5'
    unit: USDK per new customer
    source: '[BP gtm.funnelTargets] 面向低成交量、高信任度国防销售、针对具名招标的创始人主导销售经验法则。'
  - id: A16
    name: 月度客户流失率
    value: '1.8'
    unit: percent
    source: '[RS reportMemo.sensitivityCases] 针对集中度较高的国防客户群体的保守经验法则——续约情况良好，
      但并非板上钉钉。'
  - id: A17
    name: 融资规模测算逻辑
    value: '2.0'
    unit: USDM
    source: '[BP fundingAsk] 基础模型在建模的现金低点前需要约 $1.45M；融资额向下取整到 BP 所述 $2-4M 区间的
      下限，以保留采购时点缓冲和主权交付应急空间。'
