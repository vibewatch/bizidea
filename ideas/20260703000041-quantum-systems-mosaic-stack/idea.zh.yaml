problem: >-
  欧洲各国部委和主承包商正在向 Quantum Systems 的 MOSAIC 软件骨干系统靠拢，把它当成连接盟军无人空中、
  水面和水下机队的纽带，其背后是 $8B 估值和 Airbus 的合作关系撑腰。既不隶属于 Quantum、也未与其结盟的中型欧洲传感器
  和载荷厂商（EO/IR 相机、电子战（EW）载荷、反无人机传感器）现在面对的招标项目，在授标前就明确要求证明具备 MOSAIC
  互操作性。它们今天唯一能证明兼容性的办法，是与 Quantum 展开一场定制化、缓慢的一对一集成谈判——这既把自己的路线图
  和知识产权暴露给一家同时也是平台竞争对手的公司，耗时又可能比招标时间表还长几个月。
targetUser:
  primary: >-
    某中型欧洲 EO/IR、电子战或反无人机载荷制造商的工程副总裁或系统集成负责人，为了在某个北约相关或涉乌克兰的招标项目
    中获得资格，必须证明自己与 Quantum Systems 的 MOSAIC 连接机队具备互操作性
  secondary: >-
    同一家载荷制造商中负责投标响应和合规证据包的业务拓展负责人
  buyer: >-
    该载荷制造商的工程副总裁或业务拓展负责人，预算随即将到来的某个具体招标截止日期而释放
startupThesis:
  nonObviousInsight: >-
    多数观察者把 Quantum 的这轮融资读成一个硬件和产量故事。更关键的转变其实是：MOSAIC 正在成为盟军无人机队事实上的
    互操作标准，这让欧洲每一家其他的载荷和传感器厂商，其路线图都要依附于一家资本雄厚、同时又拥有平台的竞争对手的
    定制集成排期队列，从而催生了对一条中立、更快的可证明兼容路径的迫切需求。
  beachhead: >-
    德国、法国和波罗的海国家的 EO/IR、电子战和反无人机载荷制造商，正在为某个要求证明与 Quantum Systems 无人机队
    具备 MOSAIC 互操作性的北约相关或涉乌克兰招标项目准备投标响应，时间窗口是未来 6-12 个月
  wedge: >-
    一套独立的 MOSAIC 兼容适配器 SDK，配上一个模拟总线合规测试平台，让载荷厂商能在数周内自我认证消息和控制回路的
    互操作性，产出一份可用于投标的、经得起审计的合规报告——全部基于已公开的采购接口要求和开放的国防通信标准搭建，
    而不触碰 Quantum 的专有内部资料
  whyNowCatalyst: >-
    Quantum 的 $1.2B 融资、翻倍的估值、Airbus 参投领投，以及把 MOSAIC 连接交付规模化推向盟友市场的明确计划，都表明
    "MOSAIC 互操作性"即将从一项加分项变成招标书里的硬性条款，这给非 Quantum 阵营的载荷厂商留出一个狭窄的窗口期去
    完成认证——否则就会在默认规则下把标丢给 Quantum 系供应商。
  ventureScalePath: >-
    先从某一载荷品类的 MOSAIC 合规认证做起，再把适配器和测试平台引擎扩展到覆盖其他竞争性的专有无人系统骨干系统
    （比如 Anduril 的 Lattice 或 Helsing 的技术栈），伴随它们的规模化扩张，逐步成为跨厂商无人系统互操作性的中立、
    受北约认可的认证权威机构，并叠加一层持续合规监测的经常性 SaaS 收入——每当某套骨干系统推送软件更新时都能收费。
solution: >-
  产品是一项围绕两个组件搭建的互操作性认证服务：一是适配器 SDK，把载荷厂商现有的遥测、控制和状态消息，翻译成基于
  公开采购接口要求和北约相关消息标准衍生出的 MOSAIC 兼容格式规范；二是模拟总线合规测试平台，在不需要接触 Quantum
  专有源码或测试设备的情况下，用真实的 MOSAIC 任务场景对载荷适配器做回放测试。跑一遍测试平台，就能产出一份打分制
  的合规报告，涵盖消息合规性、延迟预算和故障处理情况，载荷厂商可以把它直接附在投标文件里作为第三方互操作性证据。
  由于认证方从不接触 Quantum 的知识产权，也从不代表 Quantum，它可以为所有竞标同一批 MOSAIC 相关招标的非 Quantum
  厂商提供服务，而不会像 Quantum 自己主导的集成项目那样存在利益冲突。
goToMarketSeed:
  firstCustomer: >-
    一家 50-300 人规模的欧洲 EO/IR 或电子战载荷制造商，正面临某个把 MOSAIC 互操作性列为资格要求的北约相关或涉乌克兰
    招标项目的投标截止日期
  buyingTrigger: >-
    某个具体的招标 RFP 或部委框架协议把 MOSAIC（或 MOSAIC 连接机队）互操作性列为评分或资格标准，且提交截止日期在
    未来两个季度以内
  currentAlternative: >-
    直接向 Quantum Systems 提出一对一定制集成申请，或者带着未经验证的互操作性声明投标、自行承担资格风险
  switchingReason: >-
    第一位客户转向本产品的原因是：通过独立测试平台自我认证，能在数周内产出一份经得起审计的合规报告，而不必在
    Quantum 自家的合作伙伴集成排期队列里等上数月，而且不会把专有载荷知识产权或路线图细节暴露给一家同时也是平台级
    竞争对手的公司
  pricingHypothesis: >-
    按次收取与具体招标截止日期挂钩的合规测试认证费，再加上一份年度订阅——用于随 MOSAIC 接口版本变化持续重新认证
