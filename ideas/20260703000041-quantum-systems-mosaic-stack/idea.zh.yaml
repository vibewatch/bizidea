    currentAlternative: 直接向 Quantum Systems 提出一对一集成申请，或在标书中做未经验证的兼容性声明
    successMetric: 从搭建适配器到提交合规报告所需的周数
  - job: >-
      当 MOSAIC 接口版本变化时，帮助已认证的载荷厂商重新验证兼容性，让他们能维持现有的部委合同资格，而不必重走一遍
      完整的集成周期
    currentAlternative: 等待 Quantum 主导的下一轮集成周期，或部委要求的重新测试
    successMetric: 从接口变更通知到重新获得合规认证之间的时间
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 三条同一天发布、已核实的来源，给出了具体的估值、投资方和实战部署细节，证实了 MOSAIC 的市场地位，
      不过第三方厂商的痛点强度是推断出来的，而非直接报道。
  painIntensity:
    score: 4
    rationale: 面对具名招标截止日期、又没有独立认证路径的载荷厂商，其痛点尖锐且有明确的时间窗口，尽管三角验证
      集群本身把痛点强度评为最弱的一个维度。
  wedgeClarity:
    score: 5
    rationale: 一套与具体招标要求挂钩的合规 SDK 加打分制测试平台，是一次界定清晰、范围狭窄的首次合作，交付物
      明确可作为证据。
  defensibility:
    score: 4
    rationale: 跨载荷品类、后续再跨竞争性骨干系统积累起来的适配器和合规用例库会形成真实的转换成本，不过 Quantum
      终究可能自行发布 SDK。
  ventureScale:
    score: 4
    rationale: 首个切口局限于一套骨干系统和一个载荷品类，但同一套认证引擎能随品类扩张，泛化到多个专有无人系统
      骨干系统上。
topRisks:
  - name: 现有厂商发布自家 SDK
    description: Quantum Systems 可能推出免费的官方 MOSAIC 集成 SDK，或扩大自己的合作伙伴计划，从而削弱对独立
      认证方的需求。
    mitigation: 抢在官方 SDK 上线之前快速成为受信任的中立认证方，并主打利益冲突这个角度——平台竞争对手自己的
      工具解决不了其他厂商的这个问题。
  - name: 接口逆向工程带来的知识产权和法律风险
    description: 如果构建 MOSAIC 兼容适配器时用到的信息超出了公开披露的接口要求，可能引来 Quantum 的知识产权或
