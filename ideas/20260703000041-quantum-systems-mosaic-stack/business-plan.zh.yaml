slug: mosaic-interop-conformance-os
date: "2026-07-03"
executiveSummary: >-
  Mosaic Interop Conformance OS 是一层中立的招标就绪工具，服务那些必须证明自己与 Quantum Systems 的
  MOSAIC 连接机队具备兼容性、又不想挤进 Quantum 自家集成排期队列的欧洲载荷厂商。第一个客户是德国、法国或
  波罗的海地区一家 50-300 人规模的 EO/IR、电子战或反无人机载荷厂商，正面临两个季度以内的北约相关或涉乌克兰
  投标截止日期。第一版产品刻意做窄：一套适配器 SDK 加模拟总线合规测试平台，全部基于公开接口要求和开放标准
  搭建，产出一份涵盖消息合规性、延迟和故障处理的、经得起审计的报告。这个切口的吸引力在于，购买触发点、
  分销打法和定价基础都围绕同一个事件对齐：一个招标截止日期，它会为更快的互操作性证据创造预算。这门生意应该
  先直接切入具名项目，再把每一次付费认证转化成年度回归测试订阅——因为骨干系统版本或载荷固件总会变。研究支持
  软件定义战争和互操作性这个宏观顺风，但目前还没有强有力的公开证据表明大量在跑的招标已经明确点名 MOSAIC，
  也没有证据表明各国部委会接受一份没有原始设备制造商（OEM）签字的第三方报告。滩头市场刻意做得很小，预估近期
  SAM 为 $3.6M、第 3 年 SOM 为 $1.8M，所以这门生意能不能成立，取决于公司能否证明中立性真的重要，并在
  24 个月内把同一套合规引擎复用到其他骨干系统生态。在拿出这个证据之前，公司应该守住一个载荷品类、一种证据
  格式和一个地理集群，而不是滑向泛用型自主软件或全栈系统集成。
problem:
  - "中型欧洲载荷厂商如果无法在投标截止日期前证明具备 MOSAIC 互操作性，可能直接失去投标资格；但原始设备
    制造商（OEM）主导的集成又很慢，还会把知识产权、路线图细节和进度控制权暴露给一家平台厂商。"
  - "开放架构标准描述了互操作性的基本原理，却无法针对某一个专有骨干系统、或不断出现的软件版本变更，产出
    可直接用于投标的合格/不合格证据。"
solution:
  - "提供一套适配器 SDK，把载荷厂商现有的遥测、控制和状态消息，映射成基于公开接口要求和 FACE、SOSA、DDS
    等标准衍生出的 MOSAIC 兼容格式规范，并为每一次映射记录清晰的法律来源。"
  - "运行一个模拟总线合规测试平台，为消息合规性、延迟和故障处理打分，再把结果打包成可直接用于投标的证据包
    和持续的回归测试订阅，按需提供欧盟托管或离线部署方式。"
whyWeWin:
  - "中立性是最初的切口，因为买家能更快拿到证明，而不必把载荷知识产权或路线图暴露给一家可能也在争夺同一
    项目预算的骨干系统厂商。"
  - "护城河是跨载荷品类、跨骨干系统版本累积起来的映射、故障模式、修复方案和可复用证据模板组成的回归测试
    语料库，而不只是第一个适配器。"
  - "把销售锚定在具名招标和版本变更事件上，公司靠的是一个可衡量的结果来竞争——而 OEM 排期队列、开放技术栈
    厂商和内部团队往往在这一点上交付得更慢。"
strategicChoices:
  beachhead: >-
    德国、法国和波罗的海国家的 EO/IR 和电子战载荷厂商，正在为未来 6-12 个月内某个 Quantum 系无人系统项目
    准备一次具名投标。
  wedgeRationale: >-
    一份针对具体招标的合规套餐，能在数周内解决一个有预算、有截止日期压着的痛点；相比之下，更宽泛的自主
    平台、咨询驻场服务或多骨干系统套件，都需要更长的信任建立和集成周期，买家才能判断出价值。
  sequencingRationale: >-
    先从一个载荷品类和只基于公开规范搭建的实验室证据做起，把法律风险和产品范围都控制住；先靠创始人亲自打单
    切入具名招标，再考虑招募规模化销售团队；等报告格式在真实采购评审中站住脚之后，再引入试验场和主承包商
    合作伙伴；只有在核心测试平台和证据模板确实证明可复用之后，才扩展到第二套骨干系统。
  notYet:
    - "完整的自主、任务规划或飞控软件。"
    - "美国涉密项目和大范围的主承包商定制集成。"
    - "在报告获得认可之前，先建立内部物理试验场认证资质。"
    - "在 MOSAIC 工作流转化出付费客户之前，先推出多骨干系统产品模块。"
market:
  tam: >-
    预估滩头市场 TAM 为 $10.8M，来自德国、法国和波罗的海国家约 60 家潜在厂商，按每家约 $180k 的首年综合
    价值估算。
  sam: >-
    预估近期 SAM 为 $3.6M，来自约 20 家在未来 12 个月内面临北约相关或涉乌克兰投标压力的活跃厂商。
  som: >-
    预估第 3 年 SOM 为 $1.8M，来自 9 家客户，按每家约 $200k 的年度综合价值估算，前提是买家接受第三方
    报告并为版本回归测试支持续费。
  segments:
    - "竞标 MOSAIC 相关无人系统项目的中型欧洲 EO/IR、电子战和反无人机载荷制造商。"
    - "需要随骨干系统版本变化反复获取互操作性证据的非 Quantum 载荷厂商或集成商。"
  buyingProcess: >-
    一名负责投标或业务拓展的负责人先锁定一个具名招标项目，再拉上系统集成和工程团队证明接口兼容性。当工程
    副总裁或系统集成负责人判断一份中立证据包比等待 OEM 或主承包商主导的集成更快、更安全时，预算才会释放，
    过程中往往还需要主承包商或采购评审人员在提交前给出意见。
product:
  mvp: >-
    MVP 支持一个载荷品类——最可信的首选是 EO/IR——涵盖格式映射、适配器测试、延迟和故障打分，并在受控实验室
    或欧盟托管环境中生成一份经得起审计的合规报告。在买家验证报告格式有效之前，暂不包含官方 OEM 签字认可、
    实飞验证和多骨干系统覆盖。
  sixMonth: >-
    上线第一套针对某一载荷品类的招标就绪工作流，配套与部委和主承包商评分语言对齐的证据模板，并提供欧盟
    托管和离线部署两种方式。
  twelveMonth: >-
    增加针对接口版本变更的持续回归测试、覆盖第二个载荷品类，并通过一家可信的试验场或集成商引入合作伙伴
    交付的物理验证附加服务。
  twentyFourMonth: >-
    复用合规引擎，推出第二套骨干系统模块，把公司重新定位成一个跨骨干系统的中立证据层，而不再只是一家
    MOSAIC 专属服务商。
  keyBets:
    - "公开标准加上招标文件，能暴露出足够的接口细节，从而在不触碰 OEM 知识产权的前提下生成有用的合格/
      不合格证据。"
    - "买家愿意为缩短合格投标所需时间、以及持续的版本支持付费，而不只是为一次性咨询工时付费。"
    - "同一套数据模型能以核心测试平台的高复用率支撑第二套骨干系统。"
gtm:
  wedge: >-
    先为某一具名的载荷加骨干系统组合出售一次付费的招标就绪认证，再把中标或入围的供应商转化成一份随接口
    变化续费的年度回归测试订阅。
  channels:
    - "创始人亲自主导，直接向目标厂商的工程副总裁、系统集成负责人和捕获项目负责人销售，围绕具名招标展开。"
    - "已经能看到德国、法国和波罗的海地区项目时间表的采购顾问、国防行业协会和前评审专家。"
    - "一旦有了首批试点，可以为证据格式背书或联合打包的试验场、主承包商和开放架构项目。"
  funnelTargets: "具名目标客户→合格技术洽谈转化率 40%+，洽谈→付费招标试点转化率 25-35%，付费试点→获接受
    证据包转化率 50%+，首个获接受证据包→年度回归测试订阅转化率 60%+。"
  pricing: >-
    按具名招标和载荷线收取固定费用，首次合规测试通常为 $60k-$90k，另加 $90k-$130k 的年度订阅，涵盖版本
    回归测试、重复证据包和支持的部署方式；这与投标预算的量级相符，也能保住研究测算出的约 $180k 首年综合价值。
businessModel:
  revenueStreams:
    - "固定费用的招标就绪认证项目。"
    - "年度持续合规与版本回归测试订阅。"
    - "合作伙伴交付的主权部署或试验场验证附加服务。"
  unitOfValue: "针对具名项目或可复用投标套餐的、按载荷线加骨干系统版本计价的支持型认证基线。"
  targetGrossMarginPct: 70
  expansionLevers:
    - "在同一个厂商账户内为更多载荷系列做认证。"
    - "随接口变化，把一次性招标项目转化为年度回归测试保障。"
    - "一旦 MOSAIC 工作流和证据包得到验证，就增加第二套骨干系统模块。"
strategyMap:
  northStarMetric: "获得年度支持保障、并在实际投标或项目评审中被接受的载荷-骨干系统认证基线数量。"
  inputMetrics:
    - "从启动到第一份证据包所需的天数。"
    - "合格洽谈转化为付费试点的比例。"
    - "付费试点转化为被接受报告的比例。"
    - "首次认证之后的年度订阅续购率。"
    - "在版本变更后 72 小时内完成重新测试的回归案例占比。"
  moatsToBuild:
    - "按载荷品类划分、可追溯来源的格式规范和适配器映射库。"
    - "跨版本积累的消息故障、延迟阈值和修复方案回归测试语料库。"
    - "获得主承包商、评审专家和试验场合作伙伴信任的招标就绪证据模板。"
    - "面向欧盟国防客户的主权部署和出口管制操作手册。"
  killCriteria:
    - "如果最初 20 家目标厂商里，能在 12 个月内指出一个明确要求骨干系统互操作性证据的具名项目的不到 5 家，
      说明时机判断错了。"
    - "如果最初 5 个付费试点中没有一份报告，能被主承包商、前评审专家或采购负责人视为无需 OEM 改写就能直接
      用于投标，那么独立认证这门生意就站不住脚。"
    - "如果首年综合价值低于 $120k，或每次部署需要超过 4 个工程师周的定制工作，经济模型就会滑向咨询公司。"
  mermaid: |
    flowchart LR
      Wedge[Named tender conformance wedge] --> MVP[Single payload class harness]
      MVP --> Proof[Accepted evidence pack plus annual regression]
      Proof --> Expansion[Second backbone and multi-payload growth]
investorMemo:
  verdict:
    call: Watch
    conviction: "采购切口逻辑自洽，但目前买家接受度和市场广度的证据都还太薄，还不足以拿去投风险投资合伙人会。"
    whyBelieve: "当一套骨干系统成为事实上的机队标准时，被截止日期追着跑的载荷厂商，确实很可能需要一条比
      OEM 主导集成更快、更中立的路径。"
    whyDoubt: "公开可见的滩头市场很小，如果主承包商、部委或 Quantum 坚持要官方认证，这门生意可能被绕过。"
    nextDiligence: "在给 MOSAIC 之外的扩张下注之前，先拿下两个共创客户、完成一次采购格式评审，并落地一个
      与具名招标挂钩的付费试点。"
  firstCustomer:
    title: "某欧洲 EO/IR 载荷供应商的系统集成负责人"
    profile: "一家 120 人规模的德国或法国载荷厂商，向无人系统项目销售相机或 ISR 模块，手上有一个活跃的
      北约相关投标，提交前需要骨干系统级的互操作性证据。"
    trigger: "某个具名招标或主承包商团队要求在未来两个季度内提供 MOSAIC 或同等互操作性证明。"
    buyer: "工程副总裁"
    initialContract: >-
      针对一个载荷和一次具名招标的 $60k-$90k 固定认证项目，一旦厂商采纳覆盖软件更新和新投标的经常性回归
      测试保障，转化为 $150k-$220k 的年度合同。
  mustBeTrue:
    - "德国、法国和波罗的海国家至少有 20 家目标厂商，将在 12 个月内面临 MOSAIC 相关或同等无人系统项目的
      投标压力。"
    - "来自中立实验室的独立合规报告要足够被认可，能在没有 OEM 拥有权的情况下影响入围或授标决策。"
    - "首个载荷适配器能在不使用 OEM 专有数据的前提下，仅凭公开标准和 RFP 文本，在 6 周以内搭建完成。"
    - "买家愿意为更快的资格认证和持续的回归测试支持，支付大约 $150k-$220k 的首年价值。"
    - "核心测试平台能在第 24 个月前复用，推出第二套骨干系统模块；否则市场天花板对风险投资回报来说就太小了。"
  diligenceQuestions:
    - "今天有哪些在跑的招标或框架项目明确要求 MOSAIC 或类似骨干系统的互操作性？"
    - "谁真正有权批准可接受的证据包：部委、主承包商、试验场，还是原始设备制造商（OEM）？"
    - "要产出一份可信的报告，需要共享哪些客户数据和接口细节，同时又不触碰出口管制问题？"
    - "每个载荷品类的首次部署需要多少个工程师周，其中有多大比例能够模板化？"
    - "如果 Quantum 发布官方 SDK 或认证路径，中立性还能不能赢得足够的预算和信任？"
operatingAssumptions:
  - assumption: "主承包商和各国部委会把中立的第三方合规报告当作有用的投标证据来对待，哪怕在正式的 OEM
      背书出现之前。"
    basis: research.yaml
    validationTest: "从至少 3 位前评审专家、主承包商或采购负责人那里拿到书面反馈，并用一次影子投标评审，
      确认这份报告格式在投标中真的能用。"
    decisionImpact: "如果不成立，就从独立认证方转型为服务主承包商或 OEM 集成团队的工具供应商。"
  - assumption: "目标地理区域内有足够多的近期机会，能在第二套骨干系统扩张之前，支撑起创始人亲自主导的销售。"
    basis: research.yaml
    validationTest: "列出 20 家目标厂商名单，确认其中至少 8 家在 6 个月内有具名项目、时间表和利益相关方会议。"
    decisionImpact: "如果不成立，就更早扩大地理范围或骨干系统覆盖面，并针对一个太小的切口削减烧钱速度。"
  - assumption: "公开标准和采购文件暴露的接口细节，足以搭建一个在法律上站得住、技术上也可信的测试平台。"
    basis: idea.yaml
    validationTest: "实现一次 EO/IR 载荷映射，请两名客户方工程师做评审，全程不需要任何 OEM 掌控的技术数据。"
    decisionImpact: "如果不成立，产品就会带上法律风险，或变得定制化程度太高而无法规模化，公司应停止宣称
      自己是中立认证方。"
  - assumption: "主权或离线部署可以在不把公司变成低毛利服务商的前提下得到支持。"
    basis: research.yaml
    validationTest: "以欧盟托管或离线模式交付前两个试点，每客户每月的定制运维工作量控制在 2 个工程师周以内。"
    decisionImpact: "如果不成立，定价、招聘和融资需求都会整体转向专业化服务模式。"
  - assumption: "一旦 MOSAIC 工作流得到验证，合规引擎就能以较高的核心复用率支撑第二套骨干系统。"
    basis: operator judgment
    validationTest: "在第 18 个月前完成一份第二骨干系统设计研究，并找到一位付费共创客户，展示核心测试平台
      组件至少 60% 的复用率。"
    decisionImpact: "如果不成立，这门生意就会一直局限在狭窄的 MOSAIC 细分市场，难以支撑起风险投资级别的回报。"
experimentRoadmap:
  - horizon: 0–90 天
    experiment: "为德国、法国和波罗的海国家的 EO/IR、电子战和反无人机载荷厂商，搭建一份具名客户和招标地图。"
    hypothesis: "至少 8 家合格客户存在一个正在进行或即将到来的项目，其中互操作性证据处于关键路径上。"
    successMetric: "8 家以上合格客户，各自拥有具名项目、截止日期、买家和技术评审人。"
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: "起草一份模拟证据包，与前评审专家、采购顾问和一支主承包商捕获团队一起做评审。"
    hypothesis: "公司能把结果打包成买家会当作可信投标证据来对待的格式。"
    successMetric: "完成 3 场评审会议，拿到 1 份书面确认——该证据包可用于影子投标。"
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: "仅使用公开接口要求和开放标准，搭建首个 EO/IR 适配器和模拟总线测试平台原型。"
    hypothesis: "不依赖 OEM 掌控的源码或硬件，也能生成有用的合格/不合格与延迟证据。"
    successMetric: "一个可运行的演示版本，能在启动后 30 天内产出一份打分报告。"
    owner: 创始工程师
  - horizon: 3–6 个月
    experiment: "把共创客户转化为针对某一载荷品类的、与招标挂钩的付费试点。"
    hypothesis: "只要报告能缩短获得合格投标资格的时间，买家愿意在正式 OEM 认可之前就付费。"
    successMetric: "2 个付费试点，每个 \"$60k+\"，都有具名招标截止日期和商定的成功标准。"
    owner: 创始人/CEO
  - horizon: 6–12 个月
    experiment: "签下一家试验场或主承包商合作伙伴，围绕证据工作流联合打包物理验证或验收附加服务。"
    hypothesis: "可信的合作伙伴能在不需要公司自建试验场能力的情况下，实质性提升认可度。"
    successMetric: "签下 1 个合作伙伴，完成 1 次联合交付的证据工作流。"
    owner: 合作伙伴负责人
  - horizon: 6–12 个月
    experiment: "把第一个试点转化为提供欧盟托管或离线交付的年度回归测试订阅。"
    hypothesis: "版本变更监测和重复证据包会带来超出首次投标之外的持续价值。"
    successMetric: "1 个账户达到年化 \"$150k+\" 价值，且在一次版本或固件变更后成功完成重新测试。"
    owner: 解决方案工程师
  - horizon: 12–18 个月
    experiment: "开展第二套骨干系统的设计研究和有限的试点范围界定。"
    hypothesis: "MOSAIC 工作流打造出的是一套可复用的合规引擎，而不是一次性的服务产物。"
    successMetric: "预估核心测试平台复用率 60%+，为一个相邻骨干系统生态完成 1 份付费设计研究。"
    owner: 协议工程师
operations:
  - "维护监管链记录，证明每一次格式映射都来自公开接口要求或开放标准，而不是对 OEM 的逆向工程。"
  - "在任何受管制的技术数据进入系统之前，先完成出口管制审查，提供欧盟托管和离线两种部署方式。"
  - "把每一份结果打包成经过前采购或主承包商评审专家审核过的可复用证据模板。"
  - "每次载荷固件或骨干系统版本变更都跑一次回归测试，并为每位客户保留经签署的审计历史。"
  - "用试验场和集成商合作伙伴来做实飞验证，而不是过早自建内部硬件实验室或涉密设施。"
team:
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: "亲自主导销售、共创客户招募和采购格式的迭代，因为最初的交易是截止日期驱动、需要顾问式沟通的。"
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: "搭建首个适配器、测试平台、证据生成器和版本回归测试工作流，这是做出可信试点的前提。"
  - role: 协议工程师
    startTiming: 第 3 个月
    rationale: "把消息格式规范、故障案例和标准映射编码固化，让产品变成可复用的东西，而不是一次性的定制集成工作。"
  - role: 解决方案工程师
    startTiming: 第 6 个月
    rationale: "交付主权部署方案、客户上线和经常性的回归测试运维，避免核心工程团队被这些工作压垮。"
  - role: 合作伙伴负责人
    startTiming: 第 9 个月
    rationale: "在首个证据格式经直接客户验证之后，搭建试验场、主承包商和行业协会渠道。"
milestones:
  - horizon: 0–12 个月
    items:
      - "发布首个仅基于公开规范和标准搭建、聚焦 EO/IR 的合规测试平台。"
      - "签下 6-8 个共创客户，并把其中至少 2 个转化为付费招标试点。"
      - "让 1 份证据包获得主承包商、前评审专家或采购负责人认可，确认可用于投标。"
      - "推出 1 份提供欧盟托管或离线交付的年度回归测试订阅。"
  - horizon: 12–24 个月
    items:
      - "增加第二个载荷品类和一套生产级的版本回归测试工作流。"
      - "为证据包争取到一条合作伙伴交付的试验场或主承包商验收路径。"
      - "在坚守德国、法国和波罗的海国家滩头市场的同时，把付费客户增长到 6-9 家。"
      - "根据复用情况和合作伙伴需求，就是否扩展第二套骨干系统做出决策。"
  - horizon: 24–36 个月
    items:
      - "推出第二套骨干系统模块，重新定位为跨骨干系统的中立证据层。"
      - "支持客户数达到 9 家或以上，多数采用年度回归测试方案。"
      - "在多个载荷品类和主权部署模式下统一证据模板。"
      - "决定公司是继续做一家专注的认证公司，还是扩展成更广泛的互操作性平台。"
risks:
  - risk: "Quantum 或另一家骨干系统厂商发布官方 SDK 或认证工作流，压缩中立性这个切口的空间。"
    likelihood: High
    impact: High
    mitigation: "快速行动，抢先拿下独立证据格式的话语权，并在任何一家 OEM 能够定义这个品类之前，扩展到
      多骨干系统工作流。"
  - risk: "主承包商或部委拒绝把第三方报告视为足够、坚持要求 OEM 签字认可。"
    likelihood: High
    impact: High
    mitigation: "与可信的试验场或主承包商合作伙伴联合打包证据，如果早期认可度迟迟没有出现，就停止单独出售
      独立认证服务。"
  - risk: "滩头市场太小、增长太慢，在扩张之前撑不起风险投资级别的规模。"
    likelihood: High
    impact: High
    mitigation: "第一轮融资保持克制，在第 18 个月前验证第二骨干系统的复用可行性，避免在拿出证据之前就建立
      庞大的固定销售团队。"
  - risk: "出口管制、主权和离线要求把部署变成高接触型服务。"
    likelihood: Medium
    impact: High
    mitigation: "尽早把欧盟托管和离线模式产品化，为主权支持单独定价，并拒绝会破坏可复用性的定制化环境要求。"
  - risk: "公开接口要求不足以为某些载荷品类搭建技术上可信的合规测试。"
    likelihood: Medium
    impact: Medium
    mitigation: "从标准对齐程度最强的载荷品类做起，并对每一条映射假设保持法律审查。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 个月的资金将用于搭建首个载荷品类测试平台、招募 6-8 个共创客户、完成 2-3 个付费招标试点、建立主权
    部署能力、拿下一条获认可的证据工作流，并就是否扩展第二套骨干系统做出决策。
