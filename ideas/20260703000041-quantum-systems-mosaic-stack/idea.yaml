  buyingTrigger: >-
    A specific tender RFP or ministry framework agreement names MOSAIC (or
    MOSAIC-connected fleet) interoperability as a scoring or qualification
    criterion, with a submission deadline inside the next two quarters
  currentAlternative: >-
    A bespoke bilateral integration request directly to Quantum Systems, or
    submitting the tender with an unverified interoperability claim and
    absorbing the qualification risk
  switchingReason: >-
    The first customer switches because self-certifying through an independent
    harness produces an audit-ready conformance report in weeks instead of
