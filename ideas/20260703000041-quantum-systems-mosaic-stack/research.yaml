  adoptionFrictionMatrix:
  - friction: No public OEM conformance spec exists for every edge case in a proprietary backbone
    severity: high
    affectedBuyer: VP Engineering
    mitigation: Build strictly from public interface requirements, open standards, and tender language; avoid reverse-engineering and document every mapping assumption.
