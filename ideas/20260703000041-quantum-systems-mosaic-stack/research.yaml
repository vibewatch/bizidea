  validationPlan:
  - priority: high
    question: Which live or near-term tenders explicitly require MOSAIC or equivalent third-party interoperability evidence?
    evidenceToGather: Named TED notices, prime team-room requirements, and ministry framework documents from 5-10 target programs.
  - priority: high
    question: Will a prime or ministry accept an independent conformance report without OEM sign-off?
    evidenceToGather: Procurement-officer and prime-integrator interviews plus one shadow bid package reviewed by a former evaluator.
  - priority: medium
    question: What is the real ACV and cycle-time delta versus OEM or prime-led integration?
    evidenceToGather: Quote comparisons, engineering-hour logs, and win/loss data from 3-5 design partners.
  - priority: medium
    question: What hosting, clearance, and controlled-data model is required for initial deployments?
    evidenceToGather: Customer security questionnaires, export-control counsel review, and architecture reviews with two pilot accounts.
