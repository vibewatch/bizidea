slug: mosaic-interop-conformance-os
date: "2026-07-03"
executiveSummary: >-
  Mosaic Interop Conformance OS is a neutral tender-readiness layer for
  European payload vendors that must prove compatibility with Quantum Systems'
  MOSAIC-linked fleets without entering Quantum's own integration queue. The
  initial customer is a 50-300 employee EO/IR, EW, or counter-drone payload
  maker in Germany, France, or the Baltics facing a named NATO-aligned or
  Ukraine-adjacent bid deadline within two quarters. The first product is
  deliberately narrow: an adapter SDK plus simulated-bus conformance harness
  built from public interface requirements and open standards, producing an
  audit-ready report on message compliance, latency, and failure handling. That
  wedge is attractive because the buying trigger, distribution motion, and
  pricing basis all line up around one event: a tender deadline that creates
  budget for faster interoperability evidence. The business should sell direct
  into named programs, then convert each paid certification into an annual
  regression subscription as backbone versions or payload firmware change.
  Research supports the macro tailwind toward software-defined warfare and
  interoperability, but it does not yet show strong public evidence that many
  live tenders explicitly name MOSAIC or that ministries will accept a
  third-party report without OEM sign-off. The beachhead market is intentionally
  small, with an estimated $3.6M near-term SAM and $1.8M year-3 SOM, so the
  venture case only works if the company proves neutrality matters and reuses
  the same conformance engine across additional backbone ecosystems within 24
  months. Until that proof exists, the company should stay disciplined on one
  payload class, one evidence format, and one geography cluster rather than
  drifting into general autonomy software or full-stack systems integration.
problem:
  - Mid-size European payload makers can lose tender eligibility if they cannot show MOSAIC interoperability before bid deadlines, yet OEM-led integration is slow and exposes IP, roadmap detail, and schedule control to a platform owner.
  - Open-architecture standards describe interoperability primitives, but they do not produce tender-ready pass/fail evidence for one proprietary backbone or for recurring software-version changes.
solution:
  - Provide an adapter SDK that maps a payload maker's telemetry, control, and status messages into MOSAIC-compatible schemas derived from public interface requirements and standards such as FACE, SOSA, and DDS, with documented legal provenance for each mapping.
  - Run a simulated-bus conformance harness that scores message compliance, latency, and failure handling, then package the result as a bid-ready evidence pack and ongoing regression subscription with EU-hosted or air-gapped delivery when required.
whyWeWin:
  - Neutrality is the initial wedge because the buyer gets faster proof without handing payload IP or roadmap visibility to a backbone owner that may also compete for the same program budget.
  - The moat is the regression corpus of mappings, failure modes, remediation patterns, and reusable evidence templates across payload classes and backbone versions, not just the first adapter.
  - By anchoring sales to named tenders and version-change events, the company competes on a measurable outcome that OEM queues, open-stack vendors, and in-house teams often deliver more slowly.
strategicChoices:
  beachhead: >-
    EO/IR and EW payload vendors in Germany, France, and the Baltics preparing
    one named bid into a Quantum-linked unmanned program within the next 6-12
    months.
  wedgeRationale: >-
    A tender-specific conformance package solves a budgeted, deadline-driven
    pain in weeks; broader autonomy platforms, consulting retainers, or
    multi-backbone suites require longer trust-building and integration before a
    buyer can judge value.
  sequencingRationale: >-
    Start with one payload category and lab-based evidence built only from
    public specs so legal risk and product scope stay contained; sell founder-led
    into named tenders before hiring scale sales; add test-range and prime
    partners only after the report format survives real procurement reviews; and
    expand to a second backbone only once the core harness and evidence
    templates are demonstrably reusable.
  notYet:
    - Full autonomy, mission-planning, or flight-control software.
    - U.S. classified programs and broad prime-contractor custom integration.
    - In-house physical range accreditation before report acceptance is proven.
    - Multi-backbone product modules before the MOSAIC workflow converts paying customers.
market:
  tam: >-
    Estimated beachhead TAM $10.8M from roughly 60 likely vendors in Germany,
    France, and the Baltics at about $180k blended first-year value.
  sam: >-
    Estimated near-term SAM $3.6M from roughly 20 vendors with active
    NATO-aligned or Ukraine-adjacent bid pressure inside the next 12 months.
  som: >-
    Estimated year-3 SOM $1.8M from 9 customers at about $200k blended annual
    value, assuming buyers accept third-party reports and renew for version
    regression support.
  segments:
    - Mid-size European EO/IR, EW, and counter-drone payload manufacturers selling into MOSAIC-linked unmanned programs.
    - Non-Quantum payload vendors or integrators that need repeat interoperability evidence as backbone versions change.
  buyingProcess: >-
    A capture or business-development owner identifies a named tender, then
    pulls in systems integration and engineering to prove interface
    compatibility. Budget is released when the VP Engineering or Head of Systems
    Integration decides a neutral evidence pack is faster or safer than waiting
    for OEM or prime-led integration, often with prime or procurement reviewer
    input before submission.
product:
  mvp: >-
    MVP supports one payload class, most credibly EO/IR first, through schema
    mapping, adapter testing, latency and failure scoring, and an audit-ready
    conformance report generated in a controlled lab or EU-hosted environment.
    It excludes official OEM sign-off, live-flight validation, and
    multi-backbone coverage until buyers validate the report format.
  sixMonth: >-
    Ship the first tender-readiness workflow for one payload class, evidence
    templates aligned to ministry and prime scoring language, and EU-hosted
    plus air-gapped deployment options.
  twelveMonth: >-
    Add continuous regression testing for interface version changes, second
    payload-category coverage, and partner-delivered physical-validation add-ons
    through a trusted range or integrator.
  twentyFourMonth: >-
    Reuse the conformance engine to launch a second backbone module and
    reposition the company as a neutral cross-backbone evidence layer rather
    than a MOSAIC-only services shop.
  keyBets:
    - Public standards plus tender documents expose enough interface detail to create useful pass/fail evidence without OEM IP.
    - Buyers will pay for time-to-qualified-bid and repeat version support, not just one-off consulting hours.
    - The same data model can support a second backbone with material reuse of the core harness.
gtm:
  wedge: >-
    Sell a paid tender-readiness certification for one named payload and
    backbone combination, then convert the winning or shortlisted supplier into
    an annual regression subscription as interfaces change.
  channels:
    - Founder-led direct sales into VP Engineering, Head of Systems Integration, and capture leads at target vendors around named tenders.
    - Procurement advisors, defence-industry associations, and former evaluators who already see program timelines in Germany, France, and the Baltics.
    - Test ranges, primes, and open-architecture projects that can endorse or co-package the evidence format once initial pilots exist.
  funnelTargets: "Named accounts→qualified technical discovery 40%+, discovery→paid tender pilot 25-35%, paid pilot→accepted evidence pack 50%+, accepted first pack→annual regression subscription 60%+."
  pricing: >-
    Fixed fee per named tender and payload line, typically $60k-$90k for the
    first conformance run, plus $90k-$130k annual subscription for version
    regression, repeat evidence packs, and supported deployment options; this
    aligns with bid-enablement budgets and preserves the researched ~$180k
    blended first-year value.
businessModel:
  revenueStreams:
    - Fixed-fee tender-readiness certification engagements.
    - Annual continuous conformance and version-regression subscriptions.
    - Partner-delivered sovereign deployment or range-validation add-ons.
  unitOfValue: Supported payload-line by backbone-version certification baseline for a named program or repeatable bid package.
  targetGrossMarginPct: 70
  expansionLevers:
    - Certify additional payload families within the same vendor account.
    - Convert one-off tender projects into annual regression coverage as interfaces change.
    - Add second-backbone modules once the MOSAIC workflow and evidence pack are proven.
strategyMap:
  northStarMetric: Number of active payload-backbone certification baselines under annual support and accepted in live bid or program reviews.
  inputMetrics:
    - Days from kickoff to first evidence pack.
    - Qualified discovery to paid pilot conversion rate.
    - Paid pilot to accepted-report conversion rate.
    - Annual subscription attach rate after first certification.
    - Share of regression cases rerun within 72 hours of a version change.
  moatsToBuild:
    - Provenance-tracked schema and adapter mapping library by payload class.
    - Regression corpus of message failures, latency thresholds, and remediation patterns across versions.
    - Tender-ready evidence templates trusted by primes, evaluators, and test partners.
    - Sovereign deployment and export-control operating playbook for EU defence accounts.
  killCriteria:
    - If fewer than 5 of the first 20 target vendors can point to a named program requiring backbone interoperability evidence within 12 months, the timing thesis is wrong.
    - If zero of the first 5 paid pilots result in a report that a prime, former evaluator, or procurement lead treats as bid-usable without OEM rewrite, standalone certification is not viable.
    - If first-year blended value stays below $120k or each deployment requires more than 4 engineer-weeks of custom work, the economics collapse into consultancy.
  mermaid: |
    flowchart LR
      Wedge[Named tender conformance wedge] --> MVP[Single payload class harness]
      MVP --> Proof[Accepted evidence pack plus annual regression]
      Proof --> Expansion[Second backbone and multi-payload growth]
investorMemo:
  verdict:
    call: Watch
    conviction: Coherent procurement wedge, but current evidence is still too thin on buyer acceptance and market breadth to justify a venture partner meeting.
    whyBelieve: Deadline-driven payload vendors plausibly need a faster and more neutral path than OEM-led integration when one backbone becomes the de facto fleet standard.
    whyDoubt: The public beachhead is small and may be disintermediated if primes, ministries, or Quantum insist on official certification.
    nextDiligence: Secure two design partners, one procurement-format review, and one paid pilot tied to a named tender before underwriting expansion beyond MOSAIC.
  firstCustomer:
    title: Head of Systems Integration at a European EO/IR payload supplier
    profile: A 120-person German or French payload maker selling camera or ISR modules into unmanned programs, with one active NATO-aligned bid that now needs backbone-level interoperability evidence before submission.
    trigger: A named tender or prime team-room requirement asks for MOSAIC or equivalent interoperability proof within the next two quarters.
    buyer: VP Engineering
    initialContract: >-
      $60k-$90k fixed certification engagement for one payload and one named
      tender, converting to a $150k-$220k annual contract once the vendor adopts
      recurring regression coverage across software updates and new bids.
  mustBeTrue:
    - At least 20 target vendors in Germany, France, and the Baltics will face MOSAIC-linked or equivalent unmanned-stack bid pressure inside 12 months.
    - Independent conformance reports from a neutral lab are acceptable enough to influence shortlist or award decisions without OEM ownership of the evidence.
    - A first payload adapter can be built from public standards and RFP language in under 6 weeks without using proprietary OEM data.
    - Buyers will pay roughly $150k-$220k in first-year value for faster qualification and repeat regression support.
    - The core harness can be reused to launch a second backbone module by month 24, or the market ceiling remains too small for venture returns.
  diligenceQuestions:
    - Which live tenders or framework programs explicitly require MOSAIC or similar backbone interoperability today?
    - Who actually signs off on an acceptable evidence pack: ministry, prime, test range, or OEM?
    - What customer data and interface detail must be shared to produce a credible report without export-control problems?
    - How many engineer-weeks does the first deployment require per payload class, and what percentage can be templated?
    - If Quantum releases an official SDK or certification path, does neutrality still win enough budget and trust?
operatingAssumptions:
  - assumption: Primes and ministries will treat a neutral third-party conformance report as useful bid evidence even before formal OEM endorsement exists.
    basis: research.yaml
    validationTest: Get written feedback from at least 3 former evaluators, primes, or procurement leads and use one shadow bid review to confirm the report format is bid-usable.
    decisionImpact: If false, reposition from independent certifier to tooling provider for primes or OEM integration teams.
  - assumption: The target geography contains enough near-term opportunities to support founder-led sales before second-backbone expansion.
    basis: research.yaml
    validationTest: Build a list of 20 target vendors and confirm at least 8 have named programs, timelines, and stakeholder meetings within 6 months.
    decisionImpact: If false, expand geography or backbone scope earlier and cut burn against a too-small wedge.
  - assumption: Public standards and procurement documents expose enough interface detail to build a legally defensible and technically credible harness.
    basis: idea.yaml
    validationTest: Implement one EO/IR payload mapping and have two customer-side engineers review it without requiring any OEM-controlled technical data.
    decisionImpact: If false, the product becomes legally risky or too custom to scale, and the company should stop claiming neutral certification.
  - assumption: Sovereign or air-gapped deployments can be supported without turning the company into a low-margin services shop.
    basis: research.yaml
    validationTest: Deliver the first two pilots in EU-hosted or air-gapped mode with less than 2 engineer-weeks of custom operations work per customer month.
    decisionImpact: If false, pricing, hiring, and funding requirements all change toward a specialised services model.
  - assumption: The conformance engine can support a second backbone with high core reuse once the MOSAIC workflow is proven.
    basis: operator judgment
    validationTest: Produce a second-backbone design study and one paid design partner showing at least 60% reuse of core harness components by month 18.
    decisionImpact: If false, the business remains a narrow MOSAIC niche and is unlikely to support venture-scale returns.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Build a named-account and tender map across Germany, France, and the Baltics for EO/IR, EW, and counter-drone payload vendors.
    hypothesis: At least 8 qualified accounts have a live or near-term program where interoperability evidence is on the critical path.
    successMetric: 8+ qualified accounts with named program, deadline, buyer, and technical reviewer.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Draft a mock evidence pack and review it with former evaluators, procurement advisors, and one prime-integrator capture team.
    hypothesis: The startup can package results in a format buyers would treat as credible tender evidence.
    successMetric: 3 review sessions completed and 1 written statement that the pack is usable in a shadow bid.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Prototype the first EO/IR adapter and simulated-bus harness using only public interface requirements and open standards.
    hypothesis: Useful pass/fail and latency evidence can be generated without OEM-controlled source code or hardware.
    successMetric: One working demo that produces a scored report within 30 days of kickoff.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Convert design partners into paid tender-linked pilots for one payload class.
    hypothesis: Buyers will pay before formal OEM acceptance if the report shortens time to qualified bid.
    successMetric: 2 paid pilots at "$60k+" each with named tender deadlines and agreed success criteria.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Sign one test-range or prime partner to co-package physical-validation or acceptance add-ons around the evidence workflow.
    hypothesis: Trusted partners can materially improve acceptance without the startup building its own range capability.
    successMetric: 1 signed partner and 1 co-delivered evidence workflow.
    owner: Partnerships lead
  - horizon: 6–12 months
    experiment: Convert the first pilot into an annual regression subscription with EU-hosted or air-gapped delivery.
    hypothesis: Version-change monitoring and repeat evidence packs create recurring value beyond the initial bid.
    successMetric: 1 account at "$150k+" annualized value with one successful rerun after a version or firmware change.
    owner: Solutions engineer
  - horizon: 12–18 months
    experiment: Run a second-backbone design study and limited pilot scoping exercise.
    hypothesis: The MOSAIC workflow creates a reusable conformance engine rather than a one-off services artifact.
    successMetric: 60%+ estimated core harness reuse and 1 paid design study for an adjacent backbone ecosystem.
    owner: Protocol engineer
operations:
  - Maintain chain-of-custody records proving every schema mapping comes from public interface requirements or open standards rather than OEM reverse engineering.
  - Offer EU-hosted and air-gapped deployment modes with export-control review before any controlled technical data enters the system.
  - Package every result in a repeatable evidence template reviewed by former procurement or prime evaluators.
  - Run regression tests on every payload firmware or backbone-version change and keep signed audit history per customer.
  - Use range and integrator partners for live validation instead of building internal hardware labs or classified facilities early.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales, design-partner recruitment, and procurement-format iteration because the first deals are deadline-driven and consultative.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the first adapter, harness, evidence generator, and version-regression workflow needed for a credible pilot.
  - role: Protocol engineer
    startTiming: Month 3
    rationale: Encode message schemas, failure cases, and standards mappings so the product becomes repeatable instead of custom integration work.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Deliver sovereign deployment patterns, customer onboarding, and recurring regression operations without overwhelming core engineering.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Build test-range, prime, and industry-association channels after the first evidence format is proven with direct customers.
milestones:
  - horizon: 0–12 months
    items:
      - Publish the first EO/IR-focused conformance harness built only from public specs and standards.
      - Sign 6-8 design partners and convert at least 2 into paid tender pilots.
      - Get 1 evidence pack reviewed as bid-usable by a prime, former evaluator, or procurement lead.
      - Launch 1 annual regression subscription with EU-hosted or air-gapped delivery.
  - horizon: 12–24 months
    items:
      - Add a second payload category and a production-grade version-regression workflow.
      - Secure a partner-delivered range or prime acceptance path for the evidence pack.
      - Grow to 6-9 paying customers while staying inside the Germany, France, and Baltics beachhead.
      - Make a go or no-go decision on second-backbone expansion based on reuse and partner demand.
  - horizon: 24–36 months
    items:
      - Launch a second backbone module and reposition as a neutral cross-backbone evidence layer.
      - Reach 9 or more supported customers with most on annual regression plans.
      - Standardize evidence templates across multiple payload categories and sovereign deployment modes.
      - Decide whether to remain a focused certification company or expand into a broader interoperability platform.
risks:
  - risk: Quantum or another backbone vendor publishes an official SDK or certification workflow that compresses the neutrality wedge.
    likelihood: High
    impact: High
    mitigation: Move quickly to own the independent evidence format and broaden into multi-backbone workflows before any one OEM can define the category.
  - risk: Primes or ministries refuse to treat a third-party report as sufficient without OEM sign-off.
    likelihood: High
    impact: High
    mitigation: Co-package evidence with trusted range or prime partners and stop selling standalone certification if acceptance does not materialize early.
  - risk: The beachhead is too small or too slow to support venture-scale growth before expansion.
    likelihood: High
    impact: High
    mitigation: Keep the first raise modest, validate second-backbone reuse by month 18, and avoid building a large fixed sales organization before proof.
  - risk: Export-control, sovereignty, and air-gap requirements turn deployments into high-touch services.
    likelihood: Medium
    impact: High
    mitigation: Productize EU-hosted and air-gapped patterns early, price sovereign support separately, and refuse bespoke environments that break repeatability.
  - risk: Public interface requirements are insufficient to build technically credible conformance tests for some payload classes.
    likelihood: Medium
    impact: Medium
    mitigation: Start with payload categories where standards alignment is strongest and maintain legal review on every mapping assumption.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months funds the first payload-class harness, 6-8 design partners, 2-3
    paid tender pilots, sovereign deployment capability, one accepted evidence
    workflow, and a go or no-go decision on second-backbone expansion.
