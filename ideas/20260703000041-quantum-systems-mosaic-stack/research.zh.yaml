competitors:
  - name: Quantum Systems integration route
    stage: 现有厂商
    wedge: 面向多域无人机队的官方 MOSAIC 骨干系统和 OEM 主导的集成路径。
    pricing: 定制化的合作伙伴/项目集成定价
    strength: 实战验证过的骨干系统，对路线图、接口和买家关系拥有直接掌控权。
    weaknessVsUs: 不中立：第三方厂商仍可能担心排期风险、知识产权暴露，以及证据被平台拥有者掌控。
    sourceRefs:
      - 1
      - 2
      - 3
      - 4
      - 5
  - name: Auterion
    stage: 成长期公司
    wedge: 开放无人机操作系统、Nemyx 蜂群协同层，以及支撑可互操作自主系统的 SDK/合作伙伴生态。
    pricing: 定制化的企业/项目定价
    strength: 强有力的反锁定叙事、已公开的 SDK，以及跨厂商互操作性的实证案例。
    weaknessVsUs: 本质上仍是全栈和生态提供商，而不是针对某一骨干系统的中立招标认证方。
    sourceRefs:
      - 13
      - 14
      - 15
      - 16
      - 17
      - 40
  - name: Anduril Lattice
    stage: 成长期公司
    wedge: 带有 SDK、合作伙伴计划和国防软件生态的任务自主操作系统。
    pricing: 定制化的企业/项目定价
    strength: 成熟的软件定义生态，在任务自主部署上有信誉，还配有集成商工具。
    weaknessVsUs: 卖的就是骨干系统本身；解决不了竞标另一家 OEM 技术栈的厂商所面临的中立性问题。
    sourceRefs:
      - 18
      - 19
      - 20
      - 21
  - name: Shield AI Hivemind / V-BAT
    stage: 成长期公司
    wedge: 与平台无关的自主技术栈、SDK，以及面向拒止环境的 ISR（情报、监视与侦察）套件。
    pricing: 定制化的国防项目定价
    strength: 在 GPS 和通信拒止环境下，自主能力、仿真和多载荷适配上都有很强的信誉。
    weaknessVsUs: 整套方案是为交付自主能力和机体优化的，不是为那些不想押注单一技术栈厂商的供应商提供中立证据层。
    sourceRefs:
      - 22
      - 23
      - 24
  - name: In-house / prime integrator labs
    stage: 现有替代方案
    wedge: 在投标团队或主承包商技术栈内部完成的、针对具体项目的集成、测试和证据生成工作。
    pricing: 内部工程成本/一次性工程费用（NRE）
    strength: 受到各国部委和主承包商信任，也更容易适配涉密或主权方面的约束。
    weaknessVsUs: 速度慢、重复做的成本高，也不擅长跨招标项目和版本变化搭建可复用的合格/不合格证据。
    sourceRefs:
      - 8
      - 9
      - 10
      - 39
