        - 15
        - 23
        - 38
    threatOfSubstitutes:
      score: 5
      rationale: 如果创业公司无法证明自己在招标就绪上更快、更可信，买家随时可以退回 OEM 排期队列、开放技术栈厂商、主承包商集成商或内部团队。
      sourceRefs:
        - 13
        - 18
        - 19
        - 20
        - 22
        - 24
        - 39
    competitiveRivalry:
      score: 4
      rationale: 今天还没有对手把自己定位成中立的 MOSAIC 认证方，但资金雄厚的自主技术栈和互操作性生态，已经在争夺同一块国防软件预算和客户关系资源。
      sourceRefs:
        - 4
        - 13
        - 18
        - 22
        - 40
  pestle:
    - factor: 政治
      impact: positive
      point: 北约和欧盟机构正把更高的国防投资承诺和协同研发优先事项制度化，这让互操作性变成了董事会层面的议题。
      sourceRefs:
        - 25
        - 27
        - 28
    - factor: 经济
      impact: positive
      point: 国防开支上升，加上自主系统厂商获得强劲融资，让这个切口更贴近现有预算，而不只是纯粹的臆测。
      sourceRefs:
        - 25
        - 26
        - 27
        - 36
        - 40
    - factor: 社会
      impact: negative
      point: 国防采购依然高度依赖人脉和信任，这可能让熟悉的主承包商和 OEM 更占优势，而不是一个新出现的中立认证方。
      sourceRefs:
        - 8
        - 31
        - 32
        - 39
    - factor: 技术
      impact: positive
      point: SDK、蜂群技术栈、开放标准和 DDS 式消息传递已经足够成熟，合规测试可以做成产品，而不只是靠定制工程解决。
      sourceRefs:
        - 10
        - 12
        - 15
        - 19
        - 23
        - 24
        - 38
    - factor: 法律
      impact: negative
      point: 出口管制和技术援助相关规定，约束了认证方处理国防数据、支持服务和跨境合作的方式。
      sourceRefs:
        - 28
        - 29
        - 30
    - factor: 环境
      impact: neutral
      point: 运营效率和后勤保障固然重要，但检索到的材料把续航、生存能力和拒止环境下的表现——而不是可持续性——当作购买驱动因素。
      sourceRefs:
        - 22
  adoptionFrictionMatrix:
    - friction: 专有骨干系统的所有边界情况，并不存在公开的 OEM 合规规范
      severity: high
      affectedBuyer: 工程副总裁
      mitigation: 严格只基于公开接口要求、开放标准和招标文本搭建；避免逆向工程，并为每一条映射假设留存文档。
      sourceRefs:
        - 1
        - 6
        - 7
        - 10
    - friction: 主承包商或部委仍可能坚持要求 OEM 或试验场背书的验收
      severity: high
      affectedBuyer: 业务拓展负责人
      mitigation: 与可信的测试合作伙伴联合销售，并按买家已经在用的评分格式打包结果。
      sourceRefs:
        - 8
        - 9
        - 20
        - 21
        - 39
    - friction: 敏感或受出口管制的数据可能会挡住标准云端交付模式
      severity: medium
      affectedBuyer: 安全与合规负责人
      mitigation: 提供离线和欧盟托管的部署选项，并配套清晰的出口管制操作流程。
      sourceRefs:
        - 29
        - 30
    - friction: 如果扩张跟不上，单一骨干系统的滩头市场会限制近期 ARR 的上限
      severity: high
      affectedBuyer: CEO/战略负责人
      mitigation: 用第一套 MOSAIC 工作流搭建一个可复用的合规引擎，为将来扩展到 Auterion、Anduril 和 Shield 相关项目做准备。
      sourceRefs:
        - 13
        - 18
        - 22
        - 40
