    buyerPower:
      score: 4
      rationale: 初期买家群体集中且老练，每个客户在掏钱之前，都能把创业公司拿去和 OEM 集成、主承包商或内部工程团队做比较。
      sourceRefs:
        - 8
        - 9
        - 31
