openQuestions:
  - 有哪些在跑或即将到来的招标明确要求 MOSAIC 或同等的第三方互操作性证据？
  - 主承包商或部委会不会在没有 OEM 背书的情况下，接受第三方合规报告？
  - 目标地理区域内，有多少 50-300 人规模的 EO/IR、电子战或反无人机厂商，真正面临迫近的无人系统技术栈投标压力？
