        - 33
        - 34
        - 35
    threatOfEntrants:
      score: 3
      rationale: 开放标准和厂商 SDK 降低了搭建原型的成本，但信任、出口管制纪律、采购认可度和持久的回归测试语料库，依然构成实质性的壁垒。
      sourceRefs:
        - 6
