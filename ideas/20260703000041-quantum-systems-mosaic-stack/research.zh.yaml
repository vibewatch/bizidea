    supplierPower:
      score: 4
      rationale: 产品依赖不断演变的骨干系统接口、开放标准和被接受的采购措辞；平台拥有者和标准生态决定了什么能被认证、多久要更新一次。
      sourceRefs:
        - 1
        - 10
        - 12
        - 19
