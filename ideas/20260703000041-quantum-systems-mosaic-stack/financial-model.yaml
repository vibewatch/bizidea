assumptions:
  - id: A1
    name: Starting cash at model start
    value: '0'
    unit: USDK
    source: '[Modeling convention] Cash need is shown through negative cash roll-forward and fundingAsk rather than assumed opening cash.'
  - id: A2
    name: Model start month
    value: '2026-07'
    unit: YYYY-MM
    source: '[BP date] Model starts in the report month.'
  - id: A3
    name: Year 1 paying-customer ramp
    value: 3 paying logos by M12, with first paid pilot in M6 and additional wins in M9 and M12
    unit: customersEop
    source: '[BP milestones 0–12 months] 2 paid tender pilots plus 1 annual regression subscription implies 3 paying logos exiting Y1.'
  - id: A4
    name: Year 2 paying-customer ramp
    value: 4, 5, 6, and 7 customers exiting Q1Y2 to Q4Y2
    unit: customersEop
    source: '[BP milestones 12–24 months] Grow to 6-9 paying customers inside the beachhead by month 24.'
  - id: A5
    name: Year 3 paying-customer ramp
    value: 9 customers from Q1Y3 onward
    unit: customersEop
    source: '[BP market.som] [RS market.som] Year-3 SOM is 9 customers at about $200k blended annual value.'
  - id: A6
    name: Blended annual revenue per active customer
    value: '200'
    unit: USDK per customer-year
    source: '[BP gtm.pricing] [BP market.som] [RS market.som] Midpoint blend of $60k-$90k certification plus $90k-$130k regression support, rounded to the researched ~$200k year-3 value.'
  - id: A7
    name: Gross margin path
    value: 65% in Y1, 68% in Y2, 70% in Y3
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct] [RS reportMemo.sensitivityCases] Early pilots are more support-heavy; steady state reaches the 70% target once deployments template better.'
  - id: A8
    name: Founder / CEO loaded compensation
    value: '140'
    unit: USDK per year
    source: '[BP team] European defence-startup heuristic for a founder taking below-market cash pay plus payroll taxes and benefits.'
  - id: A9
    name: Platform engineering loaded compensation
    value: '170'
    unit: USDK per FTE per year
    source: '[BP team] Startup-finance heuristic for protocol / simulation engineers in Europe including payroll taxes and benefits.'
  - id: A10
    name: Solutions / deployment loaded compensation
    value: '155'
    unit: USDK per FTE per year
    source: '[BP team] Startup-finance heuristic for a sovereign-deployment / onboarding engineer including payroll taxes and benefits.'
  - id: A11
    name: Partnerships / GTM loaded compensation
    value: '150'
    unit: USDK per FTE per year
    source: '[BP team] Startup-finance heuristic for a defence partnerships lead with travel-heavy enterprise selling.'
  - id: A12
    name: Headcount timing beyond named BP hires
    value: Third engineer starts in Q2Y2; fourth engineer is added in Q4Y3
    unit: hire timing
    source: '[BP product.twelveMonth] [BP product.twentyFourMonth] [BP strategicChoices.sequencingRationale] Extra engineering capacity is needed only after the first payload workflow works and the second-backbone module begins.'
  - id: A13
    name: Founder functional allocation
    value: 60% sales & marketing / 40% G&A
    unit: percent of founder cash comp
    source: '[BP gtm] [BP team] Founder-led sales dominates early motion, but procurement, legal, and operating overhead remain material.'
  - id: A14
    name: Non-payroll operating spend ramp
    value: Y1 averages ~$20K/mo, Y2 averages ~$33K/mo, and Y3 averages ~$41K/mo
    unit: USDK
    source: '[BP fundingAsk] [BP operations] [RS distributionChannels] [RS regulatoryTechnicalConstraints] Heuristic for travel, security/legal, insurance, simulation tooling, and sovereign-delivery overhead.'
  - id: A15
    name: Steady-state CAC
    value: '82.5'
    unit: USDK per new customer
    source: '[BP gtm.funnelTargets] Founder-led enterprise-sales heuristic based on low-volume, high-trust defence selling into named tenders.'
  - id: A16
    name: Monthly logo churn
    value: '1.8'
    unit: percent
    source: '[RS reportMemo.sensitivityCases] Conservative heuristic for concentrated defence accounts where renewals are strong but not guaranteed.'
  - id: A17
    name: Funding round sizing logic
    value: '2.0'
    unit: USDM
    source: '[BP fundingAsk] Base model needs roughly $1.45M of cash through the modeled low point; the raise is rounded to the bottom of the BP $2-4M range to preserve procurement-timing buffer and sovereign-delivery contingency.'
