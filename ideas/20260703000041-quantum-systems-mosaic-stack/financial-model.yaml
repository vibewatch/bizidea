scenarios:
  downside:
    description: Pilots convert one quarter slower, air-gapped delivery stays high-touch, and Y3 exits at 8 logos instead of 9.
    y3RevenueK: 1425.0
    y3EbitdaK: -557.3
    cashLowPointK: -2008.8
    keyAssumptionChanges:
      - Blended ARPU falls to $190K
      - Steady-state gross margin caps at 65%
      - Customer ramp reaches 8 rather than 9 logos by Q4Y3
  base:
    description: "Base case follows the BP SOM: 9 customers at about $200K blended annual value with 70% steady-state gross margin."
    y3RevenueK: 1800.0
    y3EbitdaK: -223.8
    cashLowPointK: -1453.9
    keyAssumptionChanges:
      - 3 paying logos exit Y1
      - 7 paying logos exit Y2
      - 9 paying logos sustain through Y3 at ~$200K ACV
  upside:
    description: Evidence packs are accepted faster, a second payload category lands earlier, and one backbone-adjacent upsell lifts ACV.
    y3RevenueK: 2135.0
    y3EbitdaK: 53.7
    cashLowPointK: -1020.0
    keyAssumptionChanges:
      - Blended ARPU rises to $210K
      - Y3 customer count reaches 10-11 logos
      - Steady-state gross margin improves to 72% as deployments template better
