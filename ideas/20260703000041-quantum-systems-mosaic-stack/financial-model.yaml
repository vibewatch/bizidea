modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Named tender leads] --> Discovery[Technical discovery]
      Discovery --> Pilots[Paid tender pilots]
      Pilots --> Subs[Regression subscriptions]
      Subs --> Revenue[Revenue]
      Revenue --> COGS[Cloud + support COGS]
      Revenue --> GrossProfit[Gross profit]
      COGS --> GrossProfit
      GrossProfit --> Opex[Payroll + operating spend]
      Opex --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is mostly the result of moving from 3 paying logos in Y1 to 9 logos at roughly $200K ACV, not a broad-volume SaaS funnel.
  - checkName: Must go right
    finding: Neutral evidence packs must convert pilots into annual regression subscriptions on schedule because a one-quarter slip costs about $182K of cash and about $83K of Y3 revenue.
  - checkName: Model breaks if
    finding: If sovereign delivery keeps gross margin near 65% and Y3 logos stall at 8, downside EBITDA falls to about -$557K and cash need expands past $2.0M.
  - checkName: Next-round proof
    finding: The next round is justified only if the company reaches 7 customers plus one accepted partner pathway by Q4Y2 and enters Y3 with a credible second-backbone launch plan.
sanityChecks:
  ruleOf40: Y3 growth 63.6% + EBITDA margin -12.4% = 51.2%
  burnMultiple: Y2 burn multiple ~0.6x on $900K of net new revenue; improves to ~0.3x in Y3.
  revenuePerFte: $257K Y3 using 7 FTE at Q4Y3 (benchmark $200–400K SaaS)
  flags:
    - Y3 is still EBITDA-negative even after reaching the researched 9-customer SOM, so the venture case depends on reusing the engine across a second backbone rather than only filling the MOSAIC niche.
    - The model assumes two additional conversions happen by the start of Y3; if procurement reviews push those wins out by even one quarter, funding need steps up quickly.
    - Gross margin remains sensitive to air-gapped and sovereign support requirements; if delivery needs exceed the BP operating assumption, the company drifts toward software-enabled services economics.
