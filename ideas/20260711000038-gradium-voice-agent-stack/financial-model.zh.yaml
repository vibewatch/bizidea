scenarios:
  downside:
    description: 安全审查拖期、同客户扩张更慢，公司到 Y3 末只做到 5 条线上工作流，价格和毛利率也都更弱。
    y3RevenueK: 772.8
    y3EbitdaK: -940.8
    cashLowPointK: 235.1
    keyAssumptionChanges:
    - 由于试点转生产和第 2 工作流扩张都各自慢了约 2 个季度，季末工作流数到 Q4Y2 只到 3，到 Q4Y3 只到 5。
    - 随着买方把合同范围压到单队列、并在用量计费上更强势，单条工作流的混合年收入从 $190K 降到 $175K。
    - 由于欧盟区托管部署和合规工作比预期更定制化，毛利率从 72% 压到 68%。
  base:
    description: 2 个付费试点顺利转成案例，首批客户按工作流扩张，公司在 seed 轮前不增设专职销售团队的情况下，于 Q4Y3 做到 8 条线上工作流。
    y3RevenueK: 1235.1
    y3EbitdaK: -577.2
    cashLowPointK: 812.4
    keyAssumptionChanges:
    - 工作流数沿用 A6 和 A7：Y1 末 2 条付费工作流，Q4Y2 到 4 条线上工作流，Q4Y3 到 8 条。
    - 单条工作流的混合年收入维持在 $190K，里面已经打包了订阅、用量和高级部署收入。
    - 欧盟区托管交付和路由模板逐步可复用，而不是继续重服务化，因此毛利率能守住 72% 目标。
  upside:
    description: 试点验证更早拿下，首批客户扩张更快，公司到 Y3 末做到 10 条线上工作流，收入结构和毛利率也略好一些。
    y3RevenueK: 1527.8
    y3EbitdaK: -335.9
    cashLowPointK: 1374.8
    keyAssumptionChanges:
    - 由于首个客户内扩张和相邻队列上线都快于基准情景，季末工作流数到 Q4Y2 达到 6，到 Q4Y3 达到 10。
    - 随着基准分析和高级部署模块更早挂载，单条工作流的混合年收入从 $190K 提升到 $195K。
    - 路由模板和合规材料在多个客户间复用后，毛利率从 72% 提升到 74%。
sensitivity:
- variable: ARPU
  downsideCase: 单条工作流的混合年收入降到 $175K。
  baseCase: 单条工作流的混合年收入维持在 $190K。
  upsideCase: 随着更强的用量与分析模块挂载，单条工作流的混合年收入升到 $205K。
  y3RevenueImpactK: -97.5
  cashImpactK: -116.1
- variable: CAC
  downsideCase: 由于创始人主导销售和采购周期一直偏重，混合 CAC 升到 $125K。
  baseCase: 混合 CAC 维持在 $105K。
  upsideCase: 随着案例积累和集成商引荐提升成交率，混合 CAC 降到 $90K。
  y3RevenueImpactK: 0.0
  cashImpactK: -160.0
- variable: 流失率
  downsideCase: 由于首批客户没有按计划加第 2 工作流，月度工作流流失率升到 2.0%。
  baseCase: 月度工作流流失率维持在 1.5%。
  upsideCase: 随着基准面板提升黏性，月度工作流流失率改善到 1.0%。
  y3RevenueImpactK: -110.9
  cashImpactK: -79.8
- variable: 销售周期
  downsideCase: 试点启动和正式切流都各自往后拖了约 1 个季度。
  baseCase: 首个付费试点在 90–180 天内落地，后续扩张沿用 A7 节奏。
  upsideCase: 安全审查和正式切流足够快，后续每一年都能多拉进 1 条工作流。
  y3RevenueImpactK: -237.6
  cashImpactK: -273.6
- variable: 毛利率
  downsideCase: 由于欧盟区托管交付仍然高度定制，毛利率掉到 68%。
  baseCase: 毛利率维持在 72%。
  upsideCase: 当策略模板和日志控制标准化后，毛利率升到 75%。
  y3RevenueImpactK: 0.0
  cashImpactK: -81.3
- variable: 招聘节奏
  downsideCase: 在收入扩张被验证前，产品/合规工程师从 M31 提前到 M25 入场。
  baseCase: 第 6 个岗位在 M31 入职，此时市场上已跑出 4 条线上工作流。
  upsideCase: 如果前 5 名 FTE 就能撑住客户扩张，第 6 个非关键岗位会推迟到 seed 轮之后。
  y3RevenueImpactK: 0.0
  cashImpactK: -90.0
modelDiagram:
  title: 单位经济模型流
  mermaid: |
    flowchart LR
      TargetQueues --> PaidWorkflows
      PaidWorkflows --> LiveWorkflows
      LiveWorkflows --> ExpansionWorkflows
      LiveWorkflows --> Revenue
      ExpansionWorkflows --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入引擎，是把付费工作流从 Y1 末的 2 条拉到 Q4Y3 的 8 条，按每条约 $190K 年化收入计算，而且大部分增长来自同客户扩张。
- checkName: 必须做对的事
  finding: 前 2 个付费试点必须足够快地转成可引用的生产队列，这样创始人主导销售和首位客户成功负责人才能在没有专职销售团队的情况下，把客户继续往内扩。
- checkName: 模型会在哪儿失效
  finding: 如果采购和合规拖延让公司到 Q4Y3 只能停在 5 条工作流而不是 8 条，下行情景会把现金打到约 $235K，并迫使公司更早融资。
- checkName: 下一轮证明点
  finding: 一条可信的下一轮融资故事，应当是：2–3 个客户、4 条线上工作流、1 次第 2 工作流扩张，以及一套可复用的欧盟区托管集成打法，同时手上还剩约 6 个月现金缓冲。
sanityChecks:
  ruleOf40: Y3 增长 116.7% + EBITDA 利润率 -46.7% = 70.0%。
  burnMultiple: Y2 burn multiple 约 2.3x：$864.0K 的 EBITDA burn，对应约 $380.0K 的净新增 ARR。
  revenuePerFte: 按 6 名 FTE 计算，Y3 年末每名 FTE 对应收入约 $206K（SaaS 基准为 $200–400K）。
  flags:
  - 基准情景一直依赖创始人主导的新客户销售直到种子轮里程碑，因此只要顶部漏斗或采购节奏慢一点，现金跑道受损会比团队编制计划反映得更快。
  - 只有在欧盟区托管部署、日志控制和合规材料大多可以复用时，毛利率才能守住 72%；一旦演变成定制服务，模型就会失真。
  - 汽车滩头市场足以支撑前 8 条工作流，但单靠它撑不起风险投资级结果，因此在首批案例成型后，相邻高紧急度语音扩张仍然必须跑通。
  - 即便在基准情景下，公司到 Y3 仍然是 EBITDA 负值，所以现金还剩最后 6–9 个月时，就该启动 seed 融资流程。
