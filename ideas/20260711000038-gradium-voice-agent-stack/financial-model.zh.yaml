slug: interrupt-safe-voice-router
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: 月
  source: '[BP date 2026-07-11] 模型与商业计划同月启动，因此第 0 个月的团队排期可以直接映射到前 12 个月。'
- id: A2
  name: 种子前轮交割后的期初现金
  value: '3.0'
  unit: 百万美元
  source: '[BP fundingAsk.targetFundingRangeUsd $3–4M; BP fundingAsk.runwayMonths 18] 基准情景取区间下沿，再额外加 6 个月融资缓冲，因此形成 24 个月运营计划。'
- id: A3
  name: 收入单位
  value: 处于试点或生产合同下的一条付费工作流
  unit: 定义
  source: '[BP businessModel.unitOfValue; BP gtm.pricing] 这里按工作流定价，不按坐席定价，所以模型里的“客户”指的是工作流合同，不是企业账号数。'
- id: A4
  name: 每条工作流的混合年收入
  value: '190'
  unit: 千美元 / 工作流-年
  source: '[BP gtm.pricing $120k-$220k annual subscription per live workflow plus usage; Research market.sam/som modeled near $180k per workflow] 基准情景取 $190K，既落在商业计划定价区间内，也把用量费和高级部署模块考虑进去。'
- id: A5
  name: 每条付费工作流的月度确认收入
  value: '15.8'
  unit: 千美元 / 工作流-月
  source: '[A4] $190K 年化后约等于每月 $15.8K；而商业计划里 90 天试点的中位价 $45K，折到月度也差不多，因此模型把一条付费工作流从试点启动起就视为开始贡献收入。'
- id: A6
  name: 第 1 年工作流爬坡
  value: M1-M12 期末工作流数 = 0,0,0,1,1,1,2,2,2,2,2,2
  unit: 数量
  source: '[BP experimentRoadmap first paid shadow pilot in 90–180 days; BP milestones 0–12 months close two paid shadow pilots and launch one production workflow] 基准情景在 Y1 末有 2 条付费工作流，其中 1 条已经转为线上。'
- id: A7
  name: 第 2 / 3 年工作流里程碑
  value: Q1Y2 2，Q2Y2 3，Q3Y2 3，Q4Y2 4，Q1Y3 5，Q2Y3 6，Q3Y3 7，Q4Y3 8
  unit: 季末工作流数
  source: '[BP milestones 12–24 months reach four live workflows; BP milestones 24–36 months reach eight live workflows; Research market.som $1.4M] 基准情景对齐运营里程碑，Y3 末的规模也大致贴合模型里的 SOM。'
- id: A8
  name: 目标毛利率
  value: '72'
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct 72] 因此基准情景把 COGS 固定为收入的 28%。'
- id: A9
  name: 用于单位经济模型的月度工作流流失率
  value: '1.5'
  unit: 百分比
  source: '[BP investorMemo.mustBeTrue on second-workflow expansion and 90-day security review; startup-finance heuristic] 企业工作流合同应当有黏性，但公司仍处于 种子前轮阶段，还没完全平台化。'
- id: A10
  name: 混合 CAC
  value: '105'
  unit: 千美元 / 工作流
  source: '[BP gtm founder-led outbound, paid pilots, and integrator referrals; startup-finance heuristic] 企业销售周期长、试点占比高，在形成可复用部署打法之前，CAC 会一直偏高。'
- id: A11
  name: 各角色的完全成本现金薪酬
  value: 创始人/CEO 180；创始工程师 190；解决方案架构师 170；语音基础设施工程师 180；客户成功/扩张负责人 140；产品/合规工程师 180
  unit: 千美元 / 年
  source: '[BP team roles and sequencingRationale; startup-finance heuristic for a lean early enterprise infrastructure team, inclusive of payroll tax and benefits.] 这里采用的是精简型早期企业基础设施团队口径，已经把工资税和福利算进去。'
- id: A12
  name: 招聘节奏
  value: M1 创始人和创始工程师；M4 解决方案架构师；M7 语音基础设施工程师；M13 客户成功/扩张负责人；M31 产品/合规工程师
  unit: 时点
  source: '[BP team startTiming for the first five roles; BP sequencingRationale] 模型把第 6 个岗位推迟到 Y3，因为在 seed 轮之前，核心还是创始人主导销售和客户内扩张。'
- id: A13
  name: 非薪资运营开支爬坡
  value: S&M 从 5K/mo 升到 13K/mo，R&D 工具和云成本从 10K/mo 升到 18K/mo，G&A 与合规从 8K/mo 升到 14K/mo，时间从 Y1 起点走到 Y3 末。
  unit: 千美元 / 月
  source: '[BP operations, risks, and EU-hosted compliance requirements; startup-finance heuristic] 公司在 GTM 上保持精简，但仍要为云基准测试、隐私/法务工作和客户差旅留出预算。'
- id: A14
  name: 薪资口径
  value: 所有 FTE 薪酬都记在 salaryK；salesMarketingK、researchDevelopmentK 和 generalAdministrativeK 只包含非薪资运营开支。
  unit: 口径
  source: '[Financial Modeler modeling policy] 这样 headcount 薪酬就能和 P&L 的 salary line 以及 headcountAnnualizedPayrollK 直接对上。'
- id: A15
  name: 现金转换假设
  value: EBITDA 近似代表现金变动
  unit: 口径
  source: '[Startup-finance heuristic] 在这个 种子前轮阶段，模型不单独刻画债务、capex、税项或明显的营运资本时差。'
- id: A16
  name: 用于融资需求的下一轮里程碑
  value: 到 Q4Y2，公司应做到 2–3 个客户、4 条线上工作流、1 次第 2 工作流扩张，以及一套可复用的欧盟区托管集成打法
  unit: 里程碑
  source: '[BP milestones 12–24 months; BP fundingAsk.useOfFundsSummary] 这就是 种子前轮融资规模的目标验证点，并额外预留了 6 个月融资缓冲。'
- id: A17
  name: 工作流爬坡已按流失和转化净额计算
  value: 表里的工作流数已经扣除了试点转化与早期低流失的净影响
  unit: 口径
  source: '[A6, A7, and A9] 在这个规模上，模型直接跟踪净付费工作流数，而不是在月表里再拆开建试点转正和偶发流失。'
