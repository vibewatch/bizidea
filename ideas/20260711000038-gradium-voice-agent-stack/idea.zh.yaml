topRisks:
- name: 平台打包
  description: 语音基础设施厂商可能会把基础路由和兜底能力直接塞进自己的 SDK。
  mitigation: 继续保持跨电话、模型和边缘栈的中立性，并靠跨供应商路由数据和工作流模板取胜——这些都不是单一厂商会优先做的。
- name: 汽车销售拖慢
  description: OEM 和道路救援运营商的采购周期可能很慢，安全审查重，而且受季节影响大。
  mitigation: 先卖给外包道路救援运营商，并在影子模式下只试一个溢出队列，用清晰的时延与闭环 ROI 面板推动成交。
- name: 可靠性负担
  description: 如果这层路由本身又加了复杂度和额外毫秒，产品反而会把自己承诺要解决的问题做得更糟。
  mitigation: 先从语言和通话类型最窄的子集起步，严格卡 SLO，并在只监听或影子路由模式下先把价值跑通，再接管线上流量。
