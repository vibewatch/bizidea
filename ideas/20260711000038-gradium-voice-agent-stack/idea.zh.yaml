problem: 欧洲道路救援和服务热线想把紧急、多语种来电交给 AI 语音智能体，但每多一层语音、翻译或兜底环节，就会烧掉宝贵的毫秒，打断自然对话。机器人一旦停顿过长或转接时机踩错，来电者就会抢话、挂断，或者直接点名要人工。大多数团队能把电话平台、STT、TTS 和翻译供应商拼起来，但手里仍然没有一套运行时，能把单轮时延、语义级轮次切换和故障切换当成一笔统一的运营预算来管。
targetUser:
  primary: 欧洲道路救援服务商或车企救援中心里负责自动化或客户运营的负责人，正在推进多语种 AI 语音分流。
  secondary: 负责电话系统、语音供应商和调度集成的车联服务工程负责人或联络中心平台负责人。
  buyer: 对服务指标和自动化预算负责的客户运营 VP、救援服务 GM 或车联服务负责人。
startupThesis:
  nonObviousInsight: 难点早已不是语音模型能不能用，而是能不能把语音识别、翻译、轮次检测和播报压进同一个亚秒级预算里。随着这些基础能力都能买到，真正值钱的控制点就上移到运行时——每一轮该把什么放到哪儿跑，由它来决定。
  beachhead: 面向单一汽车品牌、覆盖 4–10 种语言的欧洲道路救援与经销商服务运营商，先把多语种故障受理和拖车调度电话自动化。
  wedge: 一台单轮路由引擎，靠语义级轮次检测、语言策略和时延预算，为紧急服务电话选择 STT、翻译、TTS 路径，并设定转人工阈值。
  whyNowCatalyst: Gradium 的融资、早期收入和企业落地说明，语音基础能力终于好到可以上线了；接下来最急的瓶颈，不是模型本身，而是时延和轮次切换的编排。
  ventureScalePath: 先从汽车紧急服务线路切入，再把同一套路由运行时扩到保险 FNOL、公用事业停电响应、旅行中断、医疗预约等场景——凡是多语种语音智能体既要像即时响应、又必须稳的地方，都能用。
solution: Interrupt-Safe Voice Router 夹在电话或 CCaaS、企业工作流和底层语音供应商之间。它会测量每一轮对话，用语义级轮次检测判断智能体什么时候该开口，再按语言、设备上下文、网络状况和时延预算，在已批准的供应商之间路由 STT、翻译和 TTS。面对紧急服务队列，它还能在不打断调度、排班或用户认证工具调用的前提下，从云端语音生成降级到缓存或端侧提示。首发版本自带故障受理、位置采集、拖车授权和经销商转接模板，并配上可视化面板，按地区展示闭环率、打断率、中位响应时延和转人工原因。
goToMarketSeed:
  firstCustomer: 覆盖 4 种以上语言、为单一汽车品牌每月处理至少 50,000 通故障与服务分流来电的欧洲道路救援运营商或 OEM 自营救援中心。
  buyingTrigger: 在季节性高峰暴露出人手极限之前，团队启动一个夜间故障受理或服务溢出电话的自动化试点。
  currentAlternative: 老式 IVR 加外包双语坐席，或者建在 CCaaS 与电话基础设施上的内部方案，只是外挂了一个语音 API。
  switchingReason: 这套路由器能把最伤用户信任的尴尬停顿和打断失败砍掉，同时给团队带来多供应商兜底能力，不用再花几个季度自己造语音编排。
  pricingHypothesis: 按活跃工作流收取年度平台订阅费，再按每千次路由语音轮次或落在时延 SLA 内的通话分钟数收取用量费。
