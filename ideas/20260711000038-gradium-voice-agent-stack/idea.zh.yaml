jobsToBeDone:
- job: 当我们把多语种故障电话自动化时，帮运营团队把 AI 应答压到足够快，守住来电者信任，这样就能在不增加坐席的前提下闭环更多紧急请求。
  currentAlternative: 老式 IVR 树、外包双语坐席，以及对放弃或转接来电的人工复盘。
  successMetric: AI 处理来电的闭环率与中位响应时延
- job: 当某家语音供应商在某种语言上变慢或退化时，帮平台团队自动切到备用路径，这样服务线路就能继续在线，不用重写提示词或通话流程。
  currentAlternative: 写死的供应商路由规则，以及由工程团队手动处理事故。
  successMetric: 语音供应商事故后的恢复时长，以及仍落在时延 SLA 内的通话占比
