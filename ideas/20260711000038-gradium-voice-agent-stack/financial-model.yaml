slug: interrupt-safe-voice-router
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: month
    source: '[BP date 2026-07-11] The model starts in the same month as the business plan so Month 0 team timing maps directly into the first 12 months.'
  - id: A2
    name: Opening cash from pre-seed close
    value: '3.0'
    unit: USDM
    source: '[BP fundingAsk.targetFundingRangeUsd $3–4M; BP fundingAsk.runwayMonths 18] Base case uses the low end of the stated range and adds a six-month fundraising buffer, producing a 24-month operating plan.'
  - id: A3
    name: Revenue unit
    value: One paying workflow under pilot or production contract
    unit: definition
    source: '[BP businessModel.unitOfValue; BP gtm.pricing] Pricing is per workflow rather than per seat, so customers in this model are workflow contracts, not enterprise logos.'
  - id: A4
    name: Blended annual revenue per workflow
    value: '190'
    unit: USDK per workflow-year
    source: '[BP gtm.pricing $120k-$220k annual subscription per live workflow plus usage; Research market.sam/som modeled near $180k per workflow] Base case uses $190K to stay inside BP pricing while reflecting usage and premium deployment modules.'
  - id: A5
    name: Monthly revenue recognition per paying workflow
    value: '15.8'
    unit: USDK per workflow-month
    source: '[A4] $190K annualized equals about $15.8K per month; a midpoint $45K ninety-day pilot from BP pricing is close enough to the same monthly value that the model treats a paying workflow as revenue-bearing from pilot start.'
  - id: A6
    name: Year 1 workflow ramp
    value: M1-M12 EOP workflows = 0,0,0,1,1,1,2,2,2,2,2,2
    unit: count
    source: '[BP experimentRoadmap first paid shadow pilot in 90–180 days; BP milestones 0–12 months close two paid shadow pilots and launch one production workflow] Base case ends Y1 with two paying workflows, one of which has converted live.'
  - id: A7
    name: Year 2 and Year 3 workflow milestones
    value: Q1Y2 2, Q2Y2 3, Q3Y2 3, Q4Y2 4, Q1Y3 5, Q2Y3 6, Q3Y3 7, Q4Y3 8
    unit: quarter-end workflows
    source: '[BP milestones 12–24 months reach four live workflows; BP milestones 24–36 months reach eight live workflows; Research market.som $1.4M] The base case matches the operating milestones and exits Y3 near the modeled SOM.'
  - id: A8
    name: Target gross margin
    value: '72'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 72] The model therefore holds COGS at 28% of revenue in the base case.'
  - id: A9
    name: Monthly workflow churn used for unit economics
    value: '1.5'
    unit: percent
    source: '[BP investorMemo.mustBeTrue on second-workflow expansion and 90-day security review; startup-finance heuristic] Enterprise workflow contracts should be sticky, but the company is still pre-seed and not yet fully platformized.'
  - id: A10
    name: Blended CAC
    value: '105'
    unit: USDK per workflow
    source: '[BP gtm founder-led outbound, paid pilots, and integrator referrals; startup-finance heuristic] Long enterprise cycles and pilot-heavy selling keep CAC high until there is a repeatable deployment playbook.'
  - id: A11
    name: Loaded cash compensation by role
    value: Founder/CEO 180; Founding engineer 190; Solutions architect 170; Voice infra engineer 180; Customer success/expansion lead 140; Product/compliance engineer 180
    unit: USDK per year
    source: '[BP team roles and sequencingRationale; startup-finance heuristic for a lean early enterprise infrastructure team, inclusive of payroll tax and benefits.]'
  - id: A12
    name: Hiring cadence
    value: M1 founder and founding engineer; M4 solutions architect; M7 voice infra engineer; M13 customer success/expansion lead; M31 product/compliance engineer
    unit: timing
    source: '[BP team startTiming for the first five roles; BP sequencingRationale] The model delays the sixth hire until Y3 because founder-led sales and same-account expansion dominate before the seed round.'
  - id: A13
    name: Non-payroll operating spend ramp
    value: S&M 5K/mo to 13K/mo, R&D tooling and cloud 10K/mo to 18K/mo, G&A and compliance 8K/mo to 14K/mo from Y1 start to Y3 end
    unit: USDK per month
    source: '[BP operations, risks, and EU-hosted compliance requirements; startup-finance heuristic] The company stays lean on GTM but still funds cloud benchmarking, privacy/legal work, and customer travel.'
  - id: A14
    name: Salary line policy
    value: All FTE compensation is carried in salaryK; salesMarketingK, researchDevelopmentK, and generalAdministrativeK are non-payroll operating spend only
    unit: policy
    source: '[Financial Modeler modeling policy] This keeps headcount payroll directly reconcilable to the P&L salary line and to headcountAnnualizedPayrollK.'
  - id: A15
    name: Cash conversion assumption
    value: EBITDA approximates cash movement
    unit: policy
    source: '[Startup-finance heuristic] No debt, capex, taxes, or material working-capital timing differences are modeled at this pre-seed stage.'
  - id: A16
    name: Next-round milestone used for the ask
    value: By Q4Y2 the company should have 4 live workflows across 2-3 accounts, one second-workflow expansion, and a repeatable EU-hosted integration playbook
    unit: milestone
    source: '[BP milestones 12–24 months; BP fundingAsk.useOfFundsSummary] This is the proof point used to size the pre-seed round with a six-month fundraising buffer.'
  - id: A17
    name: Workflow ramp is net of churn and conversion
    value: Displayed workflow counts already net pilot conversion and low early churn
    unit: policy
    source: '[A6, A7, and A9] At this scale the model tracks net paying workflows rather than separately modeling pilot conversion and occasional workflow churn in the monthly table.'
