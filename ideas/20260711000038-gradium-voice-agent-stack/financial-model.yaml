scenarios:
  downside:
    description: Security review slips, same-account expansion is slower, and the company exits Y3 with only five live workflows at weaker price and margin.
    y3RevenueK: 772.8
    y3EbitdaK: -940.8
    cashLowPointK: 235.1
    keyAssumptionChanges:
      - Quarter-end workflows reach only 3 by Q4Y2 and 5 by Q4Y3 because pilot-to-production and second-workflow expansion both slip by about two quarters.
      - Blended annual revenue per workflow falls from $190K to $175K as buyers constrain scope to one queue and push harder on usage pricing.
      - Gross margin compresses from 72% to 68% because EU-hosted deployment and compliance work stays more bespoke than planned.
  base:
    description: Two paid pilots convert into references, the first accounts expand by workflow, and the company reaches eight live workflows by Q4Y3 without adding a dedicated sales team before seed.
    y3RevenueK: 1235.1
    y3EbitdaK: -577.2
    cashLowPointK: 812.4
    keyAssumptionChanges:
      - Workflow counts follow A6 and A7 from two paying workflows at Y1 end to four live workflows at Q4Y2 and eight at Q4Y3.
      - Blended annual revenue per workflow stays at $190K with subscription, usage, and premium deployment revenue packaged into one workflow-level ARPU.
      - Gross margin holds at the 72% target because EU-hosted delivery and routing templates become repeatable rather than services-heavy.
  upside:
    description: Pilot proof lands earlier, first customers expand faster, and the company exits Y3 with ten live workflows at slightly better mix and gross margin.
    y3RevenueK: 1527.8
    y3EbitdaK: -335.9
    cashLowPointK: 1374.8
    keyAssumptionChanges:
      - Quarter-end workflows reach 6 by Q4Y2 and 10 by Q4Y3 because first-account expansion and adjacent-queue launches happen faster than the base case.
      - Blended annual revenue per workflow rises from $190K to $195K as benchmark analytics and premium deployment modules attach earlier.
      - Gross margin improves from 72% to 74% once routing templates and compliance artifacts are reused across accounts.
sensitivity:
  - variable: ARPU
    downsideCase: Blended annual revenue per workflow falls to $175K.
    baseCase: Blended annual revenue per workflow stays at $190K.
    upsideCase: Blended annual revenue per workflow reaches $205K with stronger usage and analytics attach.
    y3RevenueImpactK: -97.5
    cashImpactK: -116.1
  - variable: CAC
    downsideCase: Blended CAC rises to $125K because founder-led sales and procurement cycles stay heavy.
    baseCase: Blended CAC stays at $105K.
    upsideCase: Blended CAC falls to $90K once references and integrator introductions improve close rates.
    y3RevenueImpactK: 0.0
    cashImpactK: -160.0
  - variable: churn
    downsideCase: Monthly workflow churn rises to 2.0% because first accounts do not add second workflows as planned.
    baseCase: Monthly workflow churn stays at 1.5%.
    upsideCase: Monthly workflow churn improves to 1.0% after benchmark dashboards make the router stickier.
    y3RevenueImpactK: -110.9
    cashImpactK: -79.8
  - variable: sales cycle
    downsideCase: Pilot start and production cutover each slip by roughly one quarter.
    baseCase: The first paid pilot lands inside 90-180 days and expansions follow the A7 cadence.
    upsideCase: Security review and production cutover compress enough to pull one extra workflow into each later year.
    y3RevenueImpactK: -237.6
    cashImpactK: -273.6
  - variable: gross margin
    downsideCase: Gross margin falls to 68% because EU-hosted delivery stays customized.
    baseCase: Gross margin stays at 72%.
    upsideCase: Gross margin reaches 75% once policy templates and logging controls standardize.
    y3RevenueImpactK: 0.0
    cashImpactK: -81.3
  - variable: hiring pace
    downsideCase: The product/compliance engineer is pulled forward from M31 to M25 before revenue expansion is proven.
    baseCase: The sixth hire starts in M31 after four live workflows are already in market.
    upsideCase: The noncritical sixth hire slips until after the seed close if customer expansion stays inside the first five FTE.
    y3RevenueImpactK: 0.0
    cashImpactK: -90.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetQueues --> PaidWorkflows
      PaidWorkflows --> LiveWorkflows
      LiveWorkflows --> ExpansionWorkflows
      LiveWorkflows --> Revenue
      ExpansionWorkflows --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from taking paying workflows from two at Y1 end to eight at Q4Y3 at roughly $190K annualized per workflow, with most growth coming from same-account expansion.
  - checkName: Must go right
    finding: The first two paid pilots must convert into referenceable production queues quickly enough that founder-led sales and the first customer-success hire can expand accounts without a dedicated sales team before seed.
  - checkName: Model breaks if
    finding: If procurement and compliance delays hold the company near five workflows instead of eight by Q4Y3, the downside case cuts cash to about $235K and forces an earlier raise.
  - checkName: Next-round proof
    finding: A credible seed story is four live workflows across two to three accounts, one second-workflow expansion, and a repeatable EU-hosted integration playbook reached with roughly six months of cash buffer.
sanityChecks:
  ruleOf40: Y3 growth 116.7% + EBITDA margin -46.7% = 70.0%.
  burnMultiple: 'Y2 burn multiple is ~2.3x: $864.0K EBITDA burn against about $380.0K of net new ARR.'
  revenuePerFte: $206K Y3 revenue per end-of-year FTE on 6 FTE (benchmark $200–400K SaaS).
  flags:
    - The base case depends on founder-led new-logo sales all the way to the seed milestone, so any slowdown in top-of-funnel or procurement timing hurts runway faster than the headcount plan implies.
    - Gross margin only holds at 72% if EU-hosted deployments, logging controls, and compliance artifacts stay mostly reusable rather than turning into custom services.
    - The automotive beachhead can support the first eight workflows but not a venture-scale outcome by itself, so adjacent urgent-voice expansion still has to work after the first references are in place.
    - Even in the base case the company remains EBITDA-negative in Y3, so management should start the seed process before cash drops into the final six to nine months of runway.
