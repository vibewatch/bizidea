slug: interrupt-safe-voice-router
date: "2026-07-11"
executiveSummary: >-
  Interrupt-Safe Voice Router sells a vendor-neutral control plane for
  multilingual urgent service calls, starting with European roadside-assistance
  operators and OEM assistance centers handling breakdown-intake across four or
  more languages. The immediate pain is not speech quality but per-turn
  orchestration: each STT, translation, and TTS step adds delay, causing failed
  barge-in, caller frustration, and human transfer on high-stakes calls. The
  first product is a shadow-mode and then production router that arbitrates
  speech vendors, turn-taking, and human handoff inside a fixed latency budget
  while preserving incumbent telephony, CCaaS, and dispatch systems. The
  go-to-market system is founder-led sales into one after-hours or overflow
  queue before seasonal spikes, sold first as a paid latency audit and
  shadow-routing pilot that converts into a per-workflow annual subscription
  plus usage. Research supports category demand and comparable voice spend, but
  the initial European automotive beachhead is only a modeled $7.2M SAM, so the
  company becomes venture-scale only if the same runtime expands into adjacent
  urgent voice workflows after automotive proof. The moat, if it forms, comes
  from turn-level routing data, workflow templates, and compliance and
  integration playbooks rather than from owning core speech models. Public
  research does not disclose real deployment volumes or baseline latency
  benchmarks for this wedge, so the first pilot must establish those proof
  points. This is therefore a pre-seed plan designed to win one to two paid
  pilots and one production workflow before broadening the platform story.
problem:
  - "Urgent multilingual service calls punish awkward pauses and bad interruption handling immediately with abandonment, repeat speech, or demand for a human agent."
  - "Assistance teams can buy telephony, STT, translation, and TTS components, but they still lack one runtime that manages all of those steps under a single per-turn latency budget."
  - "Internal builds on incumbent CCaaS and telephony stacks make provider failover, language policy, and handoff logic brittle and slow to improve."
solution:
  - "A per-turn routing engine chooses STT, translation, TTS, fallback, and human handoff policy by language, workflow step, and network condition."
  - "Shadow-mode analytics and live dashboards show containment, interruption success, latency-budget compliance, and transfer-to-human causes by queue and region."
  - "Automotive templates for breakdown intake, location capture, tow authorization, and dealer handoff reduce deployment work for the first production queue."
whyWeWin:
  - "The product fits buyers who want better voice performance without ripping out incumbent telephony, CCaaS, dispatch, or speech vendors."
  - "Urgent multilingual automotive queues generate proprietary turn-level routing and transfer-cause data that bundled voice platforms do not optimize across multiple providers."
  - "A narrow workflow wedge plus EU deployment and compliance playbooks gives the startup a faster proof cycle than launching as a generic voice-agent platform."
strategicChoices:
  beachhead: >-
    European roadside-assistance operators and OEM assistance centers automating
    after-hours breakdown-intake and overflow service triage for one automotive
    brand across four to ten languages.
  wedgeRationale: >-
    This queue has visible budget, high caller urgency, and multilingual
    complexity, so a latency-routing win is measurable and commercially relevant
    after a single pilot. Broader contact-center wedges would produce slower
    proof, lower urgency, and more direct competition from bundled voice-agent
    platforms.
  sequencingRationale: >-
    Start with measurement and shadow routing, then take control of one live
    queue, then expand inside the same account before entering a new vertical.
    That order matches buyer proof requirements, keeps engineering focused on
    reliability and integrations first, and delays channel scaling until a
    repeatable deployment playbook exists.
  notYet:
    - "Generic voice-agent builder or studio for every enterprise workflow"
    - "US SMB self-serve motion"
    - "Expansion into insurer FNOL or utility outage response before two automotive production references"
market:
  tam: "$450.0M"
  sam: "$7.2M"
  som: "$1.4M"
  segments:
    - "European roadside-assistance operators"
    - "Auto OEM connected-services and dealer-service assistance programs"
  buyingProcess: >-
    A service-operations sponsor opens budget when after-hours or seasonal
    overflow threatens SLA or staffing. Platform engineering validates
    SIP/WebSocket fit, security and legal review AI disclosure and data-transfer
    architecture, and the buyer expects a paid shadow pilot before production
    cutover.
product:
  mvp: >-
    A shadow-mode router for one breakdown-intake workflow that measures turn
    latency, interruption handling, and handoff causes across four languages
    while sitting on top of existing telephony and dispatch systems. It should
    support two speech-provider paths, policy-based fallback, and dashboards for
    containment and latency-budget compliance.
  sixMonth: >-
    Convert the best pilot into a live after-hours workflow with automated
    provider failover, human handoff thresholds, EU-hosted logging, and weekly
    routing-policy tuning.
  twelveMonth: >-
    Add tow authorization, dealer handoff, and a second telephony or CCaaS
    connector so the first customer can expand into adjacent automotive queues
    without a reimplementation.
  twentyFourMonth: >-
    Add benchmark-driven auto-optimization, partner-managed deployments, and a
    second urgent-voice vertical once automotive references prove the
    control-plane model.
  keyBets:
    - "Shadow routing can show a measurable interruption and latency win before buyers will allow live cutover."
    - "A single account can expand from one queue to multiple workflows fast enough to offset a modest initial SAM."
    - "EU-hosted or hybrid deployment can preserve gross margin above 70% while satisfying privacy review."
    - "Vendor neutrality remains differentiated even as full-stack voice platforms add basic routing."
gtm:
  wedge: >-
    Sell a paid latency audit and 90-day shadow-routing pilot for one
    after-hours or overflow breakdown-intake queue, then convert only if the
    router beats the incumbent flow on latency-budget compliance, interruption
    success, and human-transfer causes.
  channels:
    - "Founder-led outbound to European assistance operators and OEM service leaders"
    - "Systems integrators modernizing CCaaS and telephony for assistance centers"
    - "Selective referral partnerships with telephony and voice-platform vendors where vendor neutrality is preserved"
  funnelTargets: "Intro meeting -> workflow audit 50%+, audit -> paid shadow pilot 40%+, pilot -> production 60%+, production -> second workflow 50%+ within 9 months"
  pricing: >-
    $30k-$60k paid shadow pilot, then $120k-$220k annual subscription per live
    workflow plus usage fees per 1,000 routed turns or protected call minutes;
    pricing is tied to latency-budget compliance and containment improvement
    rather than seat count.
businessModel:
  revenueStreams:
    - "Annual subscription per live workflow"
    - "Usage fees per 1,000 routed voice turns or protected call minutes"
    - "Premium EU-hosted or hybrid deployment and analytics modules"
  unitOfValue: "One live workflow managed under a defined latency SLA, plus routed turns or call minutes."
  targetGrossMarginPct: 72
  expansionLevers:
    - "Add more queues inside the same automotive account"
    - "Sell compliance, analytics, and benchmark-driven optimization modules"
    - "Repurpose the same control plane for insurer FNOL and utility outage workflows after automotive proof"
strategyMap:
  northStarMetric: "Protected call minutes that stay inside the customer-agreed latency budget and avoid unnecessary human transfer."
  inputMetrics:
    - "Paid shadow pilots launched"
    - "Share of eligible turns inside latency budget"
    - "Interruption success rate versus incumbent flow"
    - "Pilot-to-production conversion rate"
    - "Second-workflow expansion rate within existing accounts"
  moatsToBuild:
    - "Turn-level routing benchmark data by language, network condition, and workflow step"
    - "Workflow templates tied to dispatch and assistance operations"
    - "Compliance and deployment playbooks for EU-hosted urgent voice"
    - "Customer dashboards that codify transfer causes and latency ROI"
  killCriteria:
    - "After three shadow pilots, the router still cannot improve interruption success by at least 15 percentage points versus the incumbent flow."
    - "Fewer than 30% of breakdown-intake calls are safe to AI-route in the first two design partners."
    - "Pilot-to-production conversion stays below 33% or procurement and security review exceeds six months in the first three accounts."
  mermaid: |
    flowchart LR
      Wedge[After-hours automotive queue] --> MVP[Shadow router + dashboard]
      MVP --> Proof[Paid pilot proves latency and interruption gains]
      Proof --> Expansion[More workflows per account]
investorMemo:
  verdict:
    call: Watch
    conviction: "Compelling pre-seed wedge with real pain, but conviction stays limited until one neutral-router pilot beats bundled alternatives in live traffic."
    whyBelieve: "Urgent multilingual automotive queues create a sharp need for vendor-neutral latency control, and buyers already fund production voice infrastructure."
    whyDoubt: "The initial beachhead is small and crowded, and the market may prefer full-stack vendors or managed solutions over a standalone routing layer."
    nextDiligence: "See one paid shadow pilot convert to production after proving better latency-budget compliance and interruption handling across four languages without replacing incumbent telephony."
  firstCustomer:
    title: "Head of automation at a European roadside-assistance operator"
    profile: "Operator handling 50,000+ monthly inbound breakdown and service-triage calls for one automotive brand across 4-10 languages on incumbent CCaaS and dispatch systems."
    trigger: "A seasonal spike or after-hours automation project exposes that the current IVR-plus-agent flow cannot scale without missed SLAs or rising outsourcing cost."
    buyer: "VP Customer Operations"
    initialContract: "$30k-$60k 90-day shadow pilot on one overflow queue, converting to $120k-$220k annual per workflow plus usage if agreed latency and containment targets are met."
  mustBeTrue:
    - "At least 40% of the target breakdown-intake queue is safe to AI-route after policy gating and human handoff rules."
    - "Shadow routing improves interruption success by at least 15 percentage points and keeps at least 90% of eligible turns inside the agreed latency budget."
    - "Two of the first three design partners buy a neutral control plane without replacing incumbent telephony or speech vendors."
    - "At least half of production accounts add a second workflow within nine months."
    - "Security and legal review closes in 90 days or less with EU-hosted or hybrid architecture."
  diligenceQuestions:
    - "Which two call types inside breakdown intake are sufficiently repetitive to automate first without harming dispatch quality?"
    - "How often do target accounts already expose SIP or WebSocket surfaces that permit shadow routing without a rip-and-replace project?"
    - "When buyers evaluate PolyAI, Vapi, Retell, or Twilio, why would they add a neutral router instead of consolidating on one stack?"
    - "What percentage of year-three revenue depends on second-workflow expansion versus new-logo sales?"
    - "How much services effort is required per deployment once privacy, disclosure, and localization rules are included?"
operatingAssumptions:
  - assumption: "Target accounts will approve a paid shadow pilot before a broader voice-platform replacement."
    basis: research.yaml
    validationTest: "Convert at least 2 of the first 5 qualified opportunities into paid pilots scoped to one overflow queue."
    decisionImpact: "If false, reposition as a services-heavy solution sold through integrators or abandon the neutral-router motion."
  - assumption: "Existing telephony and CCaaS stacks expose enough SIP, WebSocket, and event hooks for shadow routing."
    basis: research.yaml
    validationTest: "Complete one reference integration on two common stacks with live media, transcript, and transfer events in 30 days or less each."
    decisionImpact: "If false, narrow the ICP to supported stacks and reduce the near-term TAM."
  - assumption: "One automotive workflow can support $120k-$220k annual software pricing after pilot conversion."
    basis: idea.yaml
    validationTest: "Get one signed production proposal at or above $120k annualized after a successful pilot."
    decisionImpact: "If false, broaden scope per contract or lower burn and funding expectations."
  - assumption: "Automotive can generate enough benchmark data and account expansion before adjacent vertical expansion is required."
    basis: research.yaml
    validationTest: "See at least one customer commit to a second queue within nine months of the first production launch."
    decisionImpact: "If false, enter insurer FNOL or utility outage earlier and adjust product templates."
  - assumption: "EU-hosted or hybrid deployment can satisfy privacy review without collapsing gross margin."
    basis: operator judgment
    validationTest: "Model and test one EU-hosted deployment with target gross margin above 70% and procurement approval inside 90 days."
    decisionImpact: "If false, raise pricing, reduce deployment scope, or shift to partner-hosted delivery."
experimentRoadmap:
  - horizon: 0–90 days
    experiment: "Interview 20 assistance-ops and platform leaders, then request workflow and queue data from the top prospects."
    hypothesis: "After-hours breakdown intake is the cleanest first budget line because pain, volume, and approval path align."
    successMetric: "10 or more target accounts rank latency or interruption handling as a top-three issue and 3 agree to share call-flow data."
    owner: "Founder / CEO"
  - horizon: 0–90 days
    experiment: "Run replay benchmarks on recorded or simulated calls across four languages against a single-provider baseline."
    hypothesis: "The router can outperform a single-provider path on latency-budget compliance and interruption handling without changing downstream workflows."
    successMetric: "Replay tests show at least a 15-point lift in interruption success and at least 90% of eligible turns inside the agreed budget."
    owner: Founding eng
  - horizon: 90–180 days
    experiment: "Sell and deliver one paid shadow pilot on an after-hours or overflow queue."
    hypothesis: "Operations buyers will pay for a narrow audit and pilot before approving full cutover."
    successMetric: "A $30k-$60k pilot is signed and reviewed weekly by a named customer sponsor."
    owner: "Founder / CEO"
  - horizon: 90–180 days
    experiment: "Build a reference integration package for two telephony or CCaaS stacks plus one dispatch connector."
    hypothesis: "Standard connectors reduce pilot deployment time enough to support repeatable enterprise sales."
    successMetric: "Two integrations are completed in 30 days or less each with live transfer and handoff events."
    owner: Solutions architect
  - horizon: 6–12 months
    experiment: "Cut over the highest-performing pilot queue into live production."
    hypothesis: "The router can stay reliable under live traffic and preserve caller trust better than the incumbent flow."
    successMetric: "More than 90% of eligible turns stay inside budget, uptime remains within contract, and the pilot converts to an annual subscription."
    owner: "Voice infra engineer"
  - horizon: 12–18 months
    experiment: "Test second-workflow or second-vertical expansion using the same routing core."
    hypothesis: "Once one queue is live, the control plane can expand with limited extra implementation effort."
    successMetric: "One second workflow goes live or one insurer or utility pilot launches with less than 20% new code."
    owner: "Founder / CEO"
operations:
  - "Turn-level observability pipeline for latency, interruption success, fallback reason, and human-transfer cause by language and provider"
  - "Weekly routing-policy review with customer operations, platform engineering, and dispatch stakeholders"
  - "EU retention, disclosure, and transfer-assessment workflow packaged into a deployment checklist"
  - "On-call incident playbook with automated provider failover and cached prompt fallback"
  - "Partner enablement for SIP and WebSocket deployment through telephony and CCaaS integrators"
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: "Own the routing core, observability stack, and first replay benchmark."
  - role: "Founder / CEO"
    startTiming: Month 0
    rationale: "Run founder-led sales, pilot design, and partnerships with assistance operators and integrators."
  - role: Solutions architect
    startTiming: Month 3
    rationale: "Shorten enterprise deployment cycles across telephony, CCaaS, and dispatch systems."
  - role: "Voice infra engineer"
    startTiming: Month 6
    rationale: "Improve policy engine, vendor failover, and benchmarking once live pilot data arrives."
  - role: "Customer success / expansion lead"
    startTiming: Month 12
    rationale: "Convert pilot users into production references and expand from one queue to multiple workflows."
milestones:
  - horizon: 0–12 months
    items:
      - "Close two paid shadow pilots in automotive assistance."
      - "Launch one production after-hours breakdown-intake workflow across at least four languages."
      - "Ship an EU-hosted deployment option, disclosure pack, and two reference telephony or CCaaS integrations."
      - "Demonstrate more than 90% of eligible turns inside the agreed latency budget on the first production queue."
  - horizon: 12–24 months
    items:
      - "Reach four live workflows across two to three accounts."
      - "Add tow authorization or dealer-service overflow as the first expansion queue."
      - "Sign the first systems-integrator or telephony referral partner with a repeatable deployment playbook under six weeks."
  - horizon: 24–36 months
    items:
      - "Reach eight live workflows, roughly matching the year-three SOM model."
      - "Expand into one adjacent urgent-voice vertical such as insurer FNOL or utility outage response."
      - "Automate benchmark-driven routing recommendations across supported languages and providers."
risks:
  - risk: "Bundled voice platforms add good-enough routing and undercut the neutral control plane."
    likelihood: High
    impact: High
    mitigation: "Win on cross-provider benchmark data, automotive workflow templates, and observability that bundled vendors do not prioritize."
  - risk: "Too little of the breakdown-intake queue is safe to automate, limiting usage volume and ROI."
    likelihood: Medium
    impact: High
    mitigation: "Start with after-hours overflow, strict policy gating, and shadow mode to identify the first automatable subflows."
  - risk: "Security, privacy, and localization review stretches pilots past a normal enterprise buying cycle."
    likelihood: High
    impact: Medium
    mitigation: "Productize EU-hosted options, disclosure scripts, retention defaults, and TIA templates before scaling outbound."
  - risk: "The router adds operational complexity or latency during provider incidents."
    likelihood: Medium
    impact: High
    mitigation: "Measure added milliseconds per hop, keep cached fallback prompts, and fail open to human transfer or the incumbent path."
  - risk: "The company expands into adjacent verticals too early and loses focus before automotive repeatability is proven."
    likelihood: Medium
    impact: Medium
    mitigation: "Gate non-automotive expansion on two production automotive references and a documented deployment playbook."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3–4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of core engineering, pilot deployments, compliance architecture, and founder-led sales to reach two paid pilots, one production account, and a repeatable integration playbook."
