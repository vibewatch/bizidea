    rationale: 模型假设：全球约 2,500 条高紧急度、多语种语音工作流，每条工作流每年约花 $180k 在编排层；这一支出用公开语音智能体定价做了基准，并用更广义的 Voice AI 基础设施增长做交叉校验。
    isEstimate: true
    sourceRefs:
    - 5
    - 9
    - 22
    - 29
  sam:
    value: $7.2M
    rationale: 模型假设：欧洲约 40 条道路救援或 OEM 服务工作流，每条每年约花 $180k；这里用 ARC Europe 的跨国覆盖做锚点，只刻画一个高度集中的滩头市场，而不是整个语音市场。
    isEstimate: true
    sourceRefs:
    - 28
    - 32
    - 33
  som:
    value: $1.4M
    rationale: 假设公司到第 3 年做到约 8 条线上工作流；这个节奏反映了企业集成周期长，也反映了产品必须先用影子路由证明提升，再谈正式切流。
    isEstimate: true
    sourceRefs:
    - 28
    - 30
    - 39
