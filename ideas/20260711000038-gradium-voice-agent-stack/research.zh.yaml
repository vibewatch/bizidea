  sourceRefs:
  - 12
openQuestions:
- 一个目标救援中心每月 50k+ 通来电里，按语言和来电类型划分，究竟有多少比例可以在不伤害调度质量的前提下交给 AI 路由？
- 目标 OEM 救援中心主要跑在哪些 CCaaS 和电话栈上？这些栈是否暴露了足够实时的钩子，能支撑影子路由和逐轮策略控制？
- 不同国家或地区的语言要求，会不会逼着团队在简单翻译之外，再做本地化提示词、披露或转人工规则？
- 早期买方会接受一层中立中间件的独立采购吗？还是会在品类成熟前，更期待一整包托管方案？
