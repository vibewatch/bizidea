    calls before a seasonal volume spike exposes staffing limits
  currentAlternative: >-
    Legacy IVR plus outsourced bilingual agents, or an internal build on CCaaS
    and telephony infrastructure with one voice API bolted on
  switchingReason: >-
    The router cuts the awkward pauses and failed barge-in events that kill
    caller trust, while giving the team multi-vendor fallback without spending
    quarters building speech orchestration in-house
  pricingHypothesis: >-
