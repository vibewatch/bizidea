jobsToBeDone:
  - job: >-
      When we automate multilingual breakdown calls, help our operations team
      keep the AI answer fast enough to maintain caller trust, so we can contain
      more urgent requests without adding agents.
    currentAlternative: >-
      Legacy IVR trees, outsourced bilingual agents, and manual review of
      abandoned or transferred calls
