topRisks:
  - name: Platform bundling
    description: Voice infrastructure vendors could add basic routing and fallback features directly into their SDKs.
    mitigation: Stay vendor-neutral across telephony, model, and edge stacks, and win on cross-provider routing data plus workflow templates that single vendors will not prioritize.
  - name: Automotive sales drag
    description: OEM and assistance-operator procurements can be slow, security-heavy, and seasonal.
    mitigation: Sell first to outsourced assistance operators and pilot one overflow queue in shadow mode with a clear latency and containment ROI dashboard.
  - name: Reliability burden
    description: If the routing layer adds complexity or extra milliseconds, the product can worsen the exact problem it promises to solve.
    mitigation: Start with narrow languages and call types, enforce strict SLOs, and prove value in listen-only or shadow-routing mode before taking full control of live traffic.
