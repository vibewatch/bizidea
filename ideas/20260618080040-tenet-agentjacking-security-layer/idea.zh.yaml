topRisks:
- name: 文档系统集成拖慢进度
  description: iManage、NetDocuments 和电子取证部署往往高度定制，集成一旦过慢，就容易把公司拖成服务型生意。
  mitigation: 先盯住 Microsoft 365 里最高风险的外发动作，再覆盖最常见的 DMS API；先上影子模式，再把首批共创客户沉淀出的策略模板产品化。
- name: 法律行业采购周期保守
  description: 律所可能承认风险真实存在，但在更多同行公开披露事故，或客户明确要求控制前，仍会拖着不批预算。
  mitigation: 别卖抽象的未来风险，要卡着即将上线的决策节点和客户安全审查去卖，用被拦动作证据和更快过生产审批来讲 ROI。
- name: 横向平台蚕食市场
  description: 通用智能体安全厂商可能补上简单的法律连接器，再把这个场景打包进更宽的管控平面里。
  mitigation: 把法律专属策略图谱、审计导出，以及围绕特权保护和伦理隔离墙的工作流语义抓牢——这些都是横向厂商深入建模成本很高的部分。
