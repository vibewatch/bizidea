problem: 大型律所和 ALSP 想让自主智能体去做尽调、取证和案件知识检索，但这些智能体越来越多地被接入文档系统、邮件和客户工作区，里面装着特权材料。一个被劫持的提示词、一个权限过宽的连接器，或一次跑偏动作，都可能在人工发现前把错误文件暴露出去。现有 DLP、IAM 和日志工具，要么在访问获批之后才生效，要么在动作发生后才补救，于是律所只能二选一：冻结部署，或者承担一种连客户都解释不清的保密风险。
targetUser:
  primary: 在 Am Law 200 律所和 ALSP 内，负责部署自主案件工作流智能体的法律创新与安全负责人。
  secondary: 在受监管企业里，试点文档审阅或案件检索智能体的内部法务运营团队。
  buyer: 大型律所里的 Chief Information Security Officer、Chief Knowledge Officer，或法律创新负责人。
startupThesis:
  nonObviousInsight: 自主智能体运行时安全第一个真正跑出来的市场，未必在软件工程，而可能先在法律工作里爆发。原因很简单：法律系统本来就有明确的案件隔离墙、特权边界和文档元数据，正好适合拿来做仿真约束。真正变化的是，法律组织已不再只测一个孤立 chatbot；这组线索显示，真实客户正把智能体数量从 2 个拉到 20 多个，而执行前动作仿真也恰好到了可落地的时间点。
  beachhead: 滩头市场是 Am Law 200 律所和大型 ALSP 电子取证服务商——它们使用 iManage 或 NetDocuments，再叠加 Microsoft 365 和 Relativity，去跑尽调、取证摘要和案件知识检索类 AI 助手。
  wedge: 切口是一层案件边界运行时防火墙：仿真智能体下一次文件打开、导出、邮件发送和工作区查询，再拦下违反客户、案件或特权策略的动作。
  whyNowCatalyst: Tenet 的来源显示，法律行业客户正从 2 个活跃智能体扩到 20 多个，同时真实攻击尝试已经被拦住，运行时控制因此从“未来需要”变成“当前上线闸门”。
  ventureScalePath: 先在法律文档系统里落地——这里一次泄露就可能伤到特权保护和客户信任；随后把同一套执行前控制层扩进会计、咨询、保险理赔等高权限知识工作智能体。
solution: 产品通过 API 代理和最小权限凭证，夹在法律 AI 智能体与 iManage、NetDocuments、Microsoft 365、Relativity 等系统之间。智能体要打开工作区、导出一组文件、发送附件邮件或批量检索前，平台会先用案件元数据、伦理隔离墙、客户限制和最近对话上下文做一次动作仿真。高风险动作会被直接拦下，或转给人工审批，同时附上一条解释轨迹，清楚指出究竟是哪条策略触发。安全和知识团队能拿到每一次智能体动作尝试的可回放审计轨迹，也能先跑影子模式，把权限过宽的智能体在正式上线前揪出来。因为这层切口发生在执行前，而且天然理解案件语义，它能抓住通用 DLP、IAM 和事后日志漏掉的失败。
goToMarketSeed:
  firstCustomer: 第一类客户应是一家 Am Law 200 律所：有集中化的知识或创新团队，使用 iManage 或 NetDocuments、Microsoft 365，并且至少已经跑着或即将上线 3 个 AI 智能体试点，场景覆盖尽调、取证或案件检索。
  buyingTrigger: 买点通常出现在助手试点准备从少量项目扩到全所案件工作流时，尤其是安全团队刚发现某个权限过宽智能体，或刚拦下一次提示词注入测试。
  currentAlternative: 人工安全审查、通用 DLP 与 CASB、只读型受限试点，以及事后再撤权限的内部脚本。
  switchingReason: 这层防火墙让律所能把卡住的试点推进到生产——在暴露发生前先执行案件感知控制；现有替代方案不是把可用性砍没了，就是发现问题时已经太晚。
  pricingHypothesis: 按受保护智能体数量、接入仓库数量和被监控的高风险动作数量收取年度平台费；审批工作流和审计导出做高级模块。
