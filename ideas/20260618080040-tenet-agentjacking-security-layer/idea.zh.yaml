jobsToBeDone:
- job: 当律所想把 AI 助手从试点推到生产时，帮安全和知识团队在特权动作真正执行前先踩刹车，这样他们就能批准案件绑定智能体上线，而不必拿客户保密去冒险。
  currentAlternative: 只读试点、人工访问审查，以及通用 DLP 告警
  successMetric: 获批智能体动作导致的特权文件暴露事件为零
- job: 当客户或内部风险委员会追问 AI 智能体到底碰了哪个案件时，帮我们拿出每一步动作尝试的审计级回放，这样既能守住特权保护，也能扩大部署信心。
  currentAlternative: 散落在 DMS、邮件系统和智能体厂商之间的碎片化日志
  successMetric: 回答一次智能体访问审计或客户安全问卷所需的时间
