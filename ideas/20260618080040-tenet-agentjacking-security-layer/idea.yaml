jobsToBeDone:
  - job: >-
      When our firm wants to move AI assistants from pilot to production,
      help the security and knowledge team stop privileged actions before
      they execute, so they can approve matter-bound agents without risking
      client confidentiality.
    currentAlternative: Read-only pilots, manual access reviews, and generic DLP alerts
    successMetric: Zero privileged-document exposure incidents from approved agent actions
  - job: >-
      When a client or internal risk committee asks how an AI agent touched a
      matter, help us produce an audit-grade replay of every attempted
      action, so we can defend privilege and expand deployment confidence.
    currentAlternative: Fragmented logs across DMS, email, and agent vendors
    successMetric: Time to answer an agent-access audit or client security questionnaire
