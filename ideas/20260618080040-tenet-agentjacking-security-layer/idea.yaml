problem: >-
  Large law firms and alternative legal service providers want autonomous
  agents to help with due diligence, discovery, and matter knowledge search,
  but those agents increasingly receive access to document systems, email,
  and client workspaces that contain privileged material. A hijacked prompt,
  overbroad connector, or off-script action can expose the wrong documents
  before a human notices. Existing DLP, IAM, and log tools act after access
  is granted or after the action occurs, so firms either freeze deployment or
  accept a confidentiality risk they cannot explain to clients.
targetUser:
  primary: Legal innovation and security leaders at Am Law 200 firms and alternative legal services providers deploying autonomous matter-workflow agents.
  secondary: In-house legal operations teams at regulated enterprises piloting document-review or matter-search agents.
  buyer: Chief Information Security Officer, Chief Knowledge Officer, or head of legal innovation at a large law firm.
startupThesis:
  nonObviousInsight: >-
    The first breakout runtime-security market for autonomous agents may be
    legal work, not software engineering, because legal systems already have
    explicit matter walls, privilege boundaries, and document metadata that a
    simulator can enforce. What changed is that legal organizations are no
    longer testing one chatbot in isolation; the cluster shows a real legal
    customer moving from two to more than twenty agents just as pre-execution
    action simulation becomes possible.
  beachhead: >-
    Am Law 200 firms and large ALSP e-discovery providers using iManage or
    NetDocuments plus Microsoft 365 and Relativity to run AI assistants for
    due diligence, discovery summarization, and matter knowledge search.
  wedge: >-
    A matter-boundary runtime firewall that simulates each agent's next file
    open, export, email send, and workspace query, then blocks actions that
    violate client, matter, or privilege policies.
  whyNowCatalyst: >-
    Tenet's source reports show legal-sector customers scaling from two to
    more than twenty live agents while attempted attacks are already being
    blocked, turning runtime control from a future requirement into a current
    production go-live gate.
  ventureScalePath: >-
    Start in legal document systems where one leak can jeopardize privilege
    and client trust, then expand the same pre-execution control layer into
    accounting, consulting, insurance claims, and other high-privilege
    knowledge-work agents.
solution: >-
  The product sits between legal AI agents and systems such as iManage,
  NetDocuments, Microsoft 365, and Relativity through API proxies and scoped
  credentials. Before an agent can open a workspace, export a document set,
  email an attachment, or run a bulk retrieval, the platform simulates the
  intended action against matter metadata, ethical walls, client restrictions,
  and recent conversation context. High-risk actions are blocked or routed
  for human approval with an explanation trace that shows exactly which
  policy fired. Security and knowledge teams get a replayable audit trail of
  every attempted agent action plus a shadow mode that surfaces
  over-permissioned agents before production cutover. Because the wedge is
  pre-execution and matter-aware, it catches failures that generic DLP, IAM,
  and post-hoc logs miss.
goToMarketSeed:
  firstCustomer: >-
    An Am Law 200 firm with a centralized knowledge or innovation team,
    iManage or NetDocuments, Microsoft 365, and at least three live or
    imminent AI agent pilots for due diligence, discovery, or matter search.
  buyingTrigger: >-
    A planned rollout from a handful of assistant pilots to firmwide matter
    workflows, especially after security uncovers an over-permissioned agent
    or a blocked prompt-injection test.
  currentAlternative: >-
    Manual security review, generic DLP and CASB controls, restrictive
    read-only pilots, and internal scripts that revoke access after the fact.
  switchingReason: >-
    The firewall lets firms move from stalled pilots to production by
    enforcing matter-aware controls before exposure occurs, while current
    alternatives either destroy usability or detect problems too late.
  pricingHypothesis: >-
    Annual platform license priced by number of protected agents, connected
    repositories, and monitored high-risk actions, with premium modules for
    approval workflows and audit exports.
