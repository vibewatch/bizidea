topRisks:
  - name: Document-system integration drag
    description: >-
      iManage, NetDocuments, and e-discovery deployments are highly
      customized, which could make integration too slow and services-heavy.
    mitigation: >-
      Start with the highest-risk outbound actions in Microsoft 365 plus the
      most common DMS APIs, ship shadow mode first, and productize policy
      templates from the first design partners.
  - name: Conservative legal buying cycles
    description: >-
      Law firms may agree the risk is real but still delay budget until more
      peers disclose incidents or clients demand controls explicitly.
    mitigation: >-
      Sell against imminent go-live decisions and client security reviews,
      using blocked-action evidence and faster production approval as the
      near-term ROI story.
  - name: Horizontal platform encroachment
    description: >-
      Generic agent-security vendors could add simple legal connectors and try
      to bundle this use case into a broader control plane.
    mitigation: >-
      Own the legal-specific policy graph, audit exports, and workflow
      semantics around privilege and ethical walls that horizontal vendors
      will find costly to model deeply.
