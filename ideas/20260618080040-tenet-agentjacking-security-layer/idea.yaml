differentiator: >-
  Horizontal agent-security platforms will focus on generic policies across
  many apps, while legal AI vendors mostly optimize drafting, retrieval, or
  workflow speed and leave security to the customer. This company wins by
  owning the matter-policy graph itself: client walls, privilege rules,
  workspace boundaries, and outbound document actions. That makes the product
  legible to both the CISO and the knowledge team and gives it a data moat in
  blocked-action traces and matter-specific policy outcomes that generic DLP
  vendors will struggle to replicate.
