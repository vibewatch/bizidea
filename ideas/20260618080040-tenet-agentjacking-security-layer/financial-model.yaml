slug: matter-boundary-agent-firewall
date: '2026-06-18'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: '[BP date 2026-06-18] The model starts in the month after the business plan date.'
- id: A2
  name: Opening cash from pre-seed
  value: '2.6'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] Base case uses a $2.6M pre-seed, enough to reach the Q4Y2 milestone plus a six-month buffer per the stage rule.'
- id: A3
  name: Paid pilot and onboarding fee
  value: '40'
  unit: USDK per new customer
  source: '[BP gtm pricing $25k-$50k pilot; BP investorMemo.initialContract] Base case uses the midpoint-plus for a paid shadow-mode pilot that includes implementation and security-review packaging.'
- id: A4
  name: Blended annual recurring revenue per active customer
  value: '195'
  unit: USDK per customer-year
  source: '[BP gtm pricing $150k-$250k ARR; BP market.som 25 customers at about $175k blended ARR; BP businessModel revenueStreams] Base case assumes a $175K core subscription plus roughly $20K of approval, audit, and governed-action module uplift at steady state.'
- id: A5
  name: Target gross margin
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] Held flat across the model until deployment work is fully standardized.'
- id: A6
  name: Year 1 customer landing pattern
  value: M6, M9, and M12 go live; 3 paying customers exit Y1
  unit: timing
  source: '[BP milestones 0-12 months sign 3-5 paid pilots and convert at least 2; BP gtm funnelTargets median pilot kickoff-to-production under 150 days] Base case assumes the first three accounts arrive in the back half of Y1.'
- id: A7
  name: Year 2 and Year 3 customer milestones
  value: Q1Y2 5, Q2Y2 7, Q3Y2 9, Q4Y2 11, Q1Y3 14, Q2Y3 18, Q3Y3 22, Q4Y3 25
  unit: customers EOP
  source: '[BP milestones 12-24 months reach 8-12 production customers; BP milestones 24-36 months reach roughly 20-25 production customers; Research market.som 25 production customers] The landing pattern hits the low end of Y2 and the top end of Y3 without assuming hypergrowth.'
- id: A8
  name: Loaded cash compensation by role
  value: Founder CEO 180; Founding eng 210; Product security lead 220; Integrations lead 200; GTM lead 190; Solutions engineer 180; Policy engineer 210; Customer success lead 150; Account executive 200; Product manager 190; Integration engineer II 180
  unit: USDK per year
  source: '[BP team roles and startTiming; startup-finance heuristic for a lean U.S.-based enterprise software team, inclusive of payroll tax and benefits.]'
- id: A9
  name: Hiring cadence
  value: M1 Founder CEO and Founding eng; M2 Product security lead; M4 Integrations lead; M9 GTM lead; M13 Solutions engineer; M16 Policy engineer; M20 Customer success lead; M22 Account executive; M27 Product manager; M31 Integration engineer II
  unit: timing
  source: '[BP team startTiming and rationales; BP milestones] Base case adds customer-facing and scaling hires only after the first pilots convert and the deployment motion is becoming repeatable.'
- id: A10
  name: Functional payroll allocation
  value: Founder 70% S&M / 30% G&A; Founding eng 100% R&D; Product security lead 75% R&D / 25% G&A; Integrations lead 100% R&D; GTM lead 100% S&M; Solutions engineer 60% S&M / 40% R&D; Policy engineer 100% R&D; Customer success lead 50% S&M / 50% G&A; Account executive 100% S&M; Product manager 100% R&D; Integration engineer II 100% R&D
  unit: allocation
  source: '[BP team rationales] Used to roll headcount cost into the functional P&L lines.'
- id: A11
  name: Non-payroll operating spend ramp
  value: S&M non-payroll grows from 8K/mo to 26K/mo, R&D tooling/cloud from 12K/mo to 26K/mo, and G&A from 7K/mo to 14K/mo over 36 months
  unit: USDK per month
  source: '[Startup-finance heuristic anchored to BP deployment, travel, cloud, compliance, and security-review-kit needs.]'
- id: A12
  name: Steady-state monthly logo churn
  value: '2.0'
  unit: percent
  source: '[BP risks and expansion assumptions; startup-finance heuristic] The forecast assumes early accounts are sticky but still concentrated in a narrow legal vertical, so unit economics use a conservative steady-state churn rate instead of near-zero enterprise churn.'
- id: A13
  name: Blended CAC
  value: '92'
  unit: USDK per customer
  source: '[BP gtm founder-led enterprise sales and later partner channels; model Y1-Y2 sales and marketing spend] The model uses roughly the first 24 months of S&M spend divided by 11 landed accounts.'
- id: A14
  name: Revenue recognition policy
  value: Monthly recurring revenue equals average active customers in the month times A4 divided by 12, plus A3 for each new customer that starts in the month
  unit: policy
  source: '[BP businessModel revenueStreams and pricing] Keeps revenue directly tied to customer count, subscription ARPU, and new-logo onboarding.'
- id: A15
  name: Cash conversion policy
  value: EBITDA approximates cash movement
  unit: policy
  source: '[Startup-finance heuristic] No debt, capex, tax, or material working-capital swings are modeled at this stage.'
- id: A16
  name: Next-round milestone
  value: By Q4Y2 reach 11 production customers, launch the repeatable NetDocuments-ready integration path, and prove 2 partner-sourced opportunities before raising the seed
  unit: milestone
  source: '[BP milestones 12-24 months; BP fundingAsk.useOfFundsSummary] The funding ask is sized to reach that milestone and still leave six months of buffer.'
