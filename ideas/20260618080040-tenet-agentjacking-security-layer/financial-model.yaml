scenarios:
  downside:
    description: Budget forms more slowly, Microsoft or DMS-native controls win more bake-offs, and the company exits Y3 with only 20 production customers.
    y3RevenueK: 2922.5
    y3EbitdaK: -748.7
    cashLowPointK: -537.7
    keyAssumptionChanges:
    - Quarter-end customers slip to 7 by Q4Y2 and 20 by Q4Y3 as sales cycles lengthen and fewer pilots convert.
    - Blended recurring revenue falls from $195K to $180K and paid pilot fees move to $35K as buyers narrow first-workflow scope.
    - Gross margin compresses from 70% to 68% because integrations and security review remain partly services-heavy.
  base:
    description: Three design-partner pilots convert into references, deployment becomes repeatable inside the core stack, and the company exits Y3 with 25 production customers.
    y3RevenueK: 3842.6
    y3EbitdaK: -46.4
    cashLowPointK: 396.8
    keyAssumptionChanges:
    - Quarter-end customers follow A7 to 11 production accounts by Q4Y2 and 25 by Q4Y3.
    - Blended recurring revenue stays at $195K per active customer and each new logo contributes a $40K paid pilot or onboarding fee.
    - Gross margin holds at the 70% BP target because iManage-plus-M365 deployment becomes productized instead of services-led.
  upside:
    description: Design-partner proof lands faster, partner referrals contribute earlier, and the company exits Y3 with 28 production customers at slightly higher price and margin.
    y3RevenueK: 4820.0
    y3EbitdaK: 734.4
    cashLowPointK: 927.3
    keyAssumptionChanges:
    - Quarter-end customers reach 12 by Q4Y2 and 28 by Q4Y3 as lighthouse references compress the sales cycle.
    - Blended recurring revenue rises from $195K to $205K and paid pilots move to $45K as approval and audit modules become standard.
    - Gross margin improves from 70% to 72% after connector reuse and deployment templating reduce variable support work.
sensitivity:
- variable: ARPU
  downsideCase: Blended recurring revenue per active customer slips to $175K as buyers limit scope to one protected workflow.
  baseCase: Blended recurring revenue stays at $195K.
  upsideCase: Blended recurring revenue reaches $210K after approval and audit modules attach earlier.
  y3RevenueImpactK: -336.7
  cashImpactK: -233.5
- variable: CAC
  downsideCase: Blended CAC rises to roughly $120K because direct founder-led selling stays the main acquisition motion.
  baseCase: Blended CAC stays near $92K with partner-sourced opportunities helping from Y2 onward.
  upsideCase: Blended CAC falls to roughly $75K once references and ecosystem referrals do more of the qualification work.
  y3RevenueImpactK: 0.0
  cashImpactK: -120.0
- variable: churn
  downsideCase: Net retention weakens because customers stay on one workflow and Y3 exit customers fall from 25 to 22.
  baseCase: Customers expand into additional governed workflows and the model exits Y3 at 25 customers.
  upsideCase: Expansion is stronger and customer count holds despite normal logo churn.
  y3RevenueImpactK: -436.9
  cashImpactK: -155.2
- variable: sales cycle
  downsideCase: Pilot-to-production timing stretches by about one quarter across the board.
  baseCase: Median pilot kickoff to production decision stays close to the BP target of under 150 days.
  upsideCase: Security review and procurement compress after the first reference customers.
  y3RevenueImpactK: -681.9
  cashImpactK: -723.5
- variable: gross margin
  downsideCase: Gross margin falls to 67% because deployment and audit support remain more manual than planned.
  baseCase: Gross margin holds at 70%.
  upsideCase: Gross margin reaches 73% once the connector and policy templates stabilize.
  y3RevenueImpactK: 0.0
  cashImpactK: -118.6
- variable: hiring pace
  downsideCase: Product manager and second integration engineer are pulled six months earlier to deal with custom work.
  baseCase: Late-Y2 and Y3 hires follow A9.
  upsideCase: Those two hires can wait six months because the product proves more repeatable.
  y3RevenueImpactK: 0.0
  cashImpactK: -184.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> ARR[Subscription and module ARR]
      ARR --> GrossProfit
      GrossProfit --> Cash
      MatterMetadata --> DecisionAccuracy
      DecisionAccuracy --> PilotConversion
      PilotConversion --> ProductionCustomers
modelSanity:
- checkName: Revenue engine
  finding: Base-case Y3 revenue comes from 25 production customers by Q4Y3 at $195K blended recurring ARPU plus $40K paid pilot or onboarding revenue on each new logo.
- checkName: Must go right
  finding: The model assumes iManage-plus-M365 deployments fall to roughly four weeks and pilot-to-production conversion stays at or above the BP 50% threshold, or the sales-cycle sensitivity quickly consumes runway.
- checkName: Model breaks if
  finding: If price slips toward $180K and integrations stay services-heavy, the downside case turns cash negative before the next round even without a larger hiring plan.
- checkName: Next-round proof
  finding: Reaching 11 production customers by Q4Y2 with partner-sourced pipeline and visible multi-workflow expansion is the proof point that supports a seed round before the month-29 cash low point.
sanityChecks:
  ruleOf40: Y3 growth 147.0% + EBITDA margin -1.2% = 145.8%
  burnMultiple: Y2 burn multiple 0.6x on $1.56M net new ARR; burn nearly reaches breakeven in Y3.
  revenuePerFte: $349.3K Y3 using 11 Q4Y3 FTE (benchmark $200–400K enterprise SaaS)
  flags:
  - The company still depends on a narrow Am Law 200 plus iManage plus Microsoft 365 wedge, so a few delayed accounts materially move the model.
  - Base case assumes buyers keep paying for a neutral control layer instead of accepting Microsoft or DMS-native governance as good enough.
  - Gross margin only works if deployment becomes productized; any drift toward custom integration work pushes the downside case below zero cash.
