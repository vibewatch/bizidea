  - point: 法律团队采纳 AI 的速度很快，而工作量和“用现有人手做更多事”的压力还在继续上升。
    sourceRefs:
    - 33
    - 35
    - 39
  - point: 买方越来越希望 AI 直接嵌在系统记录层里，而不是把文件搬到外部工具。
    sourceRefs:
    - 11
    - 45
  - point: 监管与职业机构正在把部署推向更明确的监督和文档化 safeguard。
    sourceRefs:
    - 72
    - 74
    - 75
  headwinds:
  - point: 买方完全可以先依赖伦理隔离墙、DLP、应用原生控制和人工审查，把采购往后拖。
    sourceRefs:
    - 5
    - 10
    - 13
    - 15
    - 16
    - 17
    - 50
  - point: 更宽的 AI 安全市场推进很快，法律专用玩家如果起速慢，空白地带可能会被提前压缩。
    sourceRefs:
    - 56
    - 58
    - 59
    - 63
competitors:
- name: Tenet Security
  stage: 种子轮
  wedge: 执行前仿真智能体最可能的下一步动作，再在真正运行前做拦截。
  pricing: 企业定制定价；未找到公开目录价。
  strength: 它最接近“运行时智能体执行控制”与“攻击仿真”这条直接叙事。
  weaknessVsUs: 横向定位给更深的法律案件与特权策略图谱留出了空间。
  sourceRefs:
  - 1
  - 2
- name: Lakera / Check Point
  stage: 规模化
  wedge: 面向企业 GenAI 和智能体的 AI 原生 guardrail、红队和运行时防护。
  pricing: 企业定制定价。
  strength: 被 Check Point 收购后，安全买方可信度和企业渠道都在增强。
  weaknessVsUs: 产品默认不围绕法律仓库语义或案件专属审批流来构建。
  sourceRefs:
  - 56
  - 58
- name: Prompt Security
  stage: 规模化
  wedge: 覆盖员工与智能体使用场景的企业级 GenAI 发现、治理和提示词风险控制。
  pricing: 企业定制定价。
  strength: 对组织内部 shadow AI 和基于提示词的治理覆盖面很广。
  weaknessVsUs: 治理导向更重，但对法律工作流里的跨案件文档动作适配度没那么强。
  sourceRefs:
  - 54
- name: Zenity
  stage: 规模化
  wedge: 面向企业 AI 智能体的 AI 安全姿态管理、可观测性和响应。
  pricing: 企业定制定价。
  strength: 主打企业级智能体资产的广覆盖可观测性和运行时响应。
  weaknessVsUs: 相比案件感知的执行前阻断，它更像横向 AI-SPM 与检测产品。
  sourceRefs:
  - 59
- name: Microsoft Purview / Copilot Control System
  stage: 在位企业
  wedge: 内建在 Microsoft 365 Copilot 里的治理、DLP、合规和智能体控制。
  pricing: 打包在更大的 Microsoft 365 与 Purview 预算里；独立经济性取决于租户。
  strength: 分发强、身份集成深，而且掌握 Graph 与邮箱权限。
  weaknessVsUs: 主要局限在 Microsoft 范围内，对非 Microsoft 系统上的法律案件边界并不天然理解。
  sourceRefs:
  - 15
  - 16
  - 17
  - 20
  - 21
regulatoryTechnicalConstraints:
- point: 产品必须坚持最小权限，因为 Graph 和 Exchange 的应用权限一旦放宽，就会把自主工作流过度授权。
  sourceRefs:
  - 20
  - 21
- point: 部署必须满足数据保护、保密和人工监督预期，不能把 AI 当成普通 SaaS 功能随手接进去。
  sourceRefs:
  - 72
  - 74
  - 75
- point: 来自文档、邮件和其他检索内容的间接提示词注入，已经是 agentic workflow 里的一级威胁。
  sourceRefs:
  - 22
  - 25
  - 26
- point: 架构应尽量把审计能力留在原系统里，而不是把敏感内容搬进另一个失控工作区。
  sourceRefs:
  - 11
  - 13
  - 42
validationSignals:
- point: iManage 的装机规模和在 Am Law 的渗透率，说明这是一个足够集中的生态，适合聚焦型 GTM。
  sourceRefs:
  - 4
- point: Akin 的全所级 NetDocuments rollout 说明，大型律所已经愿意把嵌入式 AI 真正跑在敏感仓库上。
  sourceRefs:
  - 11
- point: 使用 GenAI 的法律从业者，已经从边缘少数派走向实质性的市场份额。
  sourceRefs:
  - 30
  - 35
- point: 企业法务部门同时在报告工作量走高和技术投入意愿延续。
  sourceRefs:
  - 33
  - 39
- point: Harvey–iManage 集成说明，法律 AI 栈已经互联到足以让跨系统控制点变得重要。
  sourceRefs:
  - 45
openQuestions:
- 哪一个首个工作流，在失败容忍度最低的同时，又能制造最尖锐的买方痛点：批量导出、外发邮件，还是跨案件检索？
- iManage、NetDocuments 和 Relativity 能否通过稳定 API 暴露足够多的案件与特权元数据，避免部署演成重服务项目？
- 买方会更偏好中立控制平面，还是继续沿用 Microsoft、Harvey 和 DMS 厂商的原生控制？
- 在运行时审批真正成为一条预算线之前，客户和内部风险委员会到底需要看到多少审计证据？
