    sourceRefs:
    - 72
    - 75
    - 78
  validationPlan:
  - priority: high
    question: 'Which first action is painful enough to budget for pre-execution control: bulk export, outbound email, or cross-matter retrieval?'
    evidenceToGather: Ten to fifteen workflow interviews plus shadow-mode logs from one iManage shop and one NetDocuments shop.
  - priority: high
    question: Can the product use existing matter and ethical-wall metadata without becoming a services-heavy integration project?
    evidenceToGather: API proof-of-concept across iManage, NetDocuments, Microsoft 365, and one Relativity environment.
  - priority: medium
    question: Will buyers prefer a neutral control plane over vendor-native controls from Microsoft or legal AI apps?
    evidenceToGather: Security-review bake-offs and procurement feedback from design-partner RFPs.
