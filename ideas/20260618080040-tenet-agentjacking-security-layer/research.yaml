competitors:
- name: Tenet Security
  stage: seed
  wedge: Pre-execution simulation of likely agent actions before they run.
  pricing: Custom enterprise pricing; no public list price found.
  strength: Closest direct expression of runtime agent enforcement and attack simulation.
  weaknessVsUs: Horizontal framing leaves room for a deeper legal matter and privilege policy graph.
  sourceRefs:
  - 1
  - 2
- name: Lakera / Check Point
  stage: scale-up
  wedge: AI-native guardrails, red teaming, and runtime protection for enterprise GenAI and agents.
  pricing: Custom enterprise pricing.
  strength: Security-buyer credibility and expanding enterprise channel after Check Point acquisition.
  weaknessVsUs: Not built around legal repository semantics or matter-specific approval flows.
  sourceRefs:
  - 56
  - 58
- name: Prompt Security
  stage: scale-up
  wedge: Enterprise GenAI discovery, governance, and prompt-risk controls across employee and agent usage.
  pricing: Custom enterprise pricing.
  strength: Broad coverage of shadow AI and prompt-based governance across the organization.
  weaknessVsUs: Governance-heavy posture is less tailored to cross-matter document actions in legal workflows.
  sourceRefs:
  - 54
- name: Zenity
  stage: scale-up
  wedge: AI security posture management, observability, and response for enterprise AI agents.
  pricing: Custom enterprise pricing.
  strength: Broad observability and runtime response language aimed at enterprise agent estates.
  weaknessVsUs: More horizontal AI-SPM and detection oriented than matter-aware pre-execution blocking.
  sourceRefs:
  - 59
- name: Microsoft Purview / Copilot Control System
  stage: incumbent
  wedge: Built-in governance, DLP, compliance, and agent controls inside Microsoft 365 Copilot.
  pricing: Bundled within broader Microsoft 365 and Purview spend; standalone economics vary by tenant.
  strength: Distribution, native identity integration, and control over Graph and mailbox permissions.
  weaknessVsUs: Primarily Microsoft-scoped and not inherently aware of legal matter boundaries across non-Microsoft systems.
  sourceRefs:
  - 15
  - 16
  - 17
  - 20
  - 21
