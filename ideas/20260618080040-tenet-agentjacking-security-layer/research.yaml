  adoptionFrictionMatrix:
  - friction: Connector and permission-model complexity across DMS, mail, and review tools
    severity: high
    affectedBuyer: Security and IT owners
    mitigation: Start with shadow mode and the narrowest high-risk actions on Microsoft 365 plus one DMS.
    sourceRefs:
