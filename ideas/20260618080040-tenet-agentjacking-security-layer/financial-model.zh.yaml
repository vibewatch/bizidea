scenarios:
  downside:
    description: 预算形成更慢，Microsoft 或 DMS 原生控制赢下更多对比测试，公司到 Y3 末只做到 20 个生产客户。
    y3RevenueK: 2922.5
    y3EbitdaK: -748.7
    cashLowPointK: -537.7
    keyAssumptionChanges:
    - 季度末客户数滑到 Q4Y2 仅 7 个、Q4Y3 仅 20 个，因为销售周期拉长、试点转化也更少。
    - 混合经常性收入从 $195K 降到 $180K，付费试点费降到 $35K，因为买方把首个工作流范围压得更窄。
    - 毛利率从 70% 压缩到 68%，因为集成和安全审查仍部分呈现重服务特征。
  base:
    description: 3 个共创客户试点顺利转成 reference，核心技术栈里的部署变得可复制，公司到 Y3 末做到 25 个生产客户。
    y3RevenueK: 3842.6
    y3EbitdaK: -46.4
    cashLowPointK: 396.8
    keyAssumptionChanges:
    - 季度末客户数按 A7 路径推进，到 Q4Y2 达到 11 个生产账户、Q4Y3 达到 25 个。
    - 混合经常性收入维持在每个活跃客户 $195K，每个新 logo 贡献 $40K 的付费试点或 onboarding 收入。
    - 毛利率维持在 BP 目标 70%，因为 iManage + M365 的部署被产品化，而不是继续靠服务推进。
  upside:
    description: 共创客户证明更快落地，伙伴推荐更早贡献线索，公司以略高价格和毛利在 Y3 末做到 28 个生产客户。
    y3RevenueK: 4820.0
    y3EbitdaK: 734.4
    cashLowPointK: 927.3
    keyAssumptionChanges:
    - 季度末客户数到 Q4Y2 达到 12 个、Q4Y3 达到 28 个，因为 lighthouse reference 压缩了销售周期。
    - 混合经常性收入从 $195K 升到 $205K，付费试点提高到 $45K，因为审批和审计模块变成标准配置。
    - 毛利率从 70% 提升到 72%，因为连接器复用和部署模板化降低了可变支持工作量。
sensitivity:
- variable: ARPU
  downsideCase: 单个活跃客户的混合经常性收入跌到 $175K，因为买方把范围限制在一个受保护工作流。
  baseCase: 单个活跃客户的混合经常性收入维持在 $195K。
  upsideCase: 审批与审计模块更早挂载后，混合经常性收入升到 $210K。
  y3RevenueImpactK: -336.7
  cashImpactK: -233.5
- variable: CAC
  downsideCase: 混合 CAC 升到约 $120K，因为获客仍主要靠创始人直销。
  baseCase: 随着 Y2 起伙伴来源机会开始起作用，混合 CAC 稳在约 $92K。
  upsideCase: reference 和生态转介绍承担了更多资格筛选后，混合 CAC 降到约 $75K。
  y3RevenueImpactK: 0.0
  cashImpactK: -120.0
- variable: churn
  downsideCase: 净留存转弱，因为客户只停留在单一工作流，Y3 末客户数从 25 个掉到 22 个。
  baseCase: 客户会扩进更多受治理工作流，模型在 Y3 末保持 25 个客户。
  upsideCase: 扩张更强，即便存在正常 logo churn，客户总数也能稳住。
  y3RevenueImpactK: -436.9
  cashImpactK: -155.2
- variable: sales cycle
  downsideCase: 试点转生产节奏整体延后约一个季度。
  baseCase: 从试点启动到生产决策的中位时长，基本守住 BP 设定的 150 天以内。
  upsideCase: 首批 reference 客户出现后，安全审查和采购流程进一步压缩。
  y3RevenueImpactK: -681.9
  cashImpactK: -723.5
- variable: gross margin
  downsideCase: 毛利率降到 67%，因为部署和审计支持比计划更依赖人工。
  baseCase: 毛利率维持在 70%。
  upsideCase: 连接器和策略模板稳定后，毛利率升到 73%。
  y3RevenueImpactK: 0.0
  cashImpactK: -118.6
- variable: hiring pace
  downsideCase: 为应对定制工作，Product manager 和第二位集成工程师都要提前 6 个月入场。
  baseCase: Y2 后半和 Y3 的招聘按 A9 节奏推进。
  upsideCase: 如果产品证明更可复制，这两个岗位都可以再往后推 6 个月。
  y3RevenueImpactK: 0.0
  cashImpactK: -184.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> ARR[Subscription and module ARR]
      ARR --> GrossProfit
      GrossProfit --> Cash
      MatterMetadata --> DecisionAccuracy
      DecisionAccuracy --> PilotConversion
      PilotConversion --> ProductionCustomers
modelSanity:
- checkName: Revenue engine
  finding: 基准情景下，Y3 收入来自 Q4Y3 的 25 个生产客户：每个客户 $195K 的混合经常性 ARPU，再叠加每个新 logo 的 $40K 付费试点或 onboarding 收入。
- checkName: Must go right
  finding: 模型隐含假设是：iManage + M365 部署会压到约 4 周，且试点转生产至少维持在 BP 设定的 50% 阈值，否则销售周期敏感性会很快吞掉现金跑道。
- checkName: Model breaks if
  finding: 如果价格往 $180K 走低、集成又持续重服务，即便不扩大招聘计划，下行情景也会在下一轮融资前先把现金打穿。
- checkName: Next-round proof
  finding: 在月度现金低点（第 29 个月）到来前，做到 Q4Y2 的 11 个生产客户、形成伙伴来源 pipeline，并在多工作流扩张上拿到可见证据，才足以支撑种子轮。
sanityChecks:
  ruleOf40: Y3 growth 147.0% + EBITDA margin -1.2% = 145.8%
  burnMultiple: Y2 burn multiple 0.6x on $1.56M net new ARR; burn nearly reaches breakeven in Y3.
  revenuePerFte: $349.3K Y3 using 11 Q4Y3 FTE (benchmark $200–400K enterprise SaaS)
  flags:
  - 公司仍高度依赖“Am Law 200 + iManage + Microsoft 365”这条窄切口，所以少数几个账户延期，就会明显改写模型。
  - 基准情景默认买方会持续为一层中立控制层付费，而不是接受 Microsoft 或 DMS 原生治理已经够用。
  - 毛利率只有在部署真正产品化后才站得住；只要稍微往定制集成飘，下行情景就会掉到零以下现金。
