slug: matter-boundary-agent-firewall
date: '2026-06-18'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date 2026-06-18] 模型从商业计划日期之后的下一个月启动。'
- id: A2
  name: pre-seed 期初现金
  value: '2.6'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 基准情景采用 $2.6M 的 pre-seed，足以打到 Q4Y2 里程碑，并按阶段规则额外留出 6 个月缓冲。'
- id: A3
  name: 付费试点与上线费用
  value: '40'
  unit: USDK per new customer
  source: '[BP gtm pricing $25k-$50k pilot; BP investorMemo.initialContract] 基准情景取偏上中位数，对应一个包含实施与安全审查打包的付费影子模式试点。'
- id: A4
  name: 单个活跃客户的混合年度经常性收入
  value: '195'
  unit: USDK per customer-year
  source: '[BP gtm pricing $150k-$250k ARR; BP market.som 25 customers at about $175k blended ARR; BP businessModel revenueStreams] 基准情景假设核心订阅为 $175K，再叠加约 $20K 的审批、审计和治理动作模块增购。'
- id: A5
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 在部署工作彻底标准化前，模型里先按恒定值处理。'
- id: A6
  name: 第 1 年客户落地节奏
  value: M6、M9 和 M12 上线；Y1 末共有 3 个付费客户
  unit: timing
  source: '[BP milestones 0-12 months sign 3-5 paid pilots and convert at least 2; BP gtm funnelTargets median pilot kickoff-to-production under 150 days] 基准情景假设前 3 个账户都落在 Y1 下半年。'
- id: A7
  name: 第 2 年与第 3 年客户里程碑
  value: Q1Y2 5、Q2Y2 7、Q3Y2 9、Q4Y2 11、Q1Y3 14、Q2Y3 18、Q3Y3 22、Q4Y3 25
  unit: customers EOP
  source: '[BP milestones 12-24 months reach 8-12 production customers; BP milestones 24-36 months reach roughly 20-25 production customers; Research market.som 25 production customers] 这一路径在不假设超高速增长的前提下，Y2 打到区间低端，Y3 打到区间高端。'
- id: A8
  name: 按角色计算的 fully-loaded 现金薪酬
  value: Founder CEO 180; Founding eng 210; Product security lead 220; Integrations lead 200; GTM lead 190; Solutions engineer 180; Policy engineer 210; Customer success lead 150; Account executive 200; Product manager 190; Integration engineer II 180
  unit: USDK per year
  source: '[BP team roles and startTiming; startup-finance heuristic for a lean U.S.-based enterprise software team, inclusive of payroll tax and benefits.] 这里采用偏精简的美国企业软件团队假设，已包含工资税与福利。'
- id: A9
  name: 招聘节奏
  value: M1 Founder CEO and Founding eng; M2 Product security lead; M4 Integrations lead; M9 GTM lead; M13 Solutions engineer; M16 Policy engineer; M20 Customer success lead; M22 Account executive; M27 Product manager; M31 Integration engineer II
  unit: timing
  source: '[BP team startTiming and rationales; BP milestones] 基准情景只会在首批试点转化、部署打法开始可复制之后，才继续补客户面对面和扩张型岗位。'
- id: A10
  name: 职能薪酬分摊
  value: Founder 70% S&M / 30% G&A; Founding eng 100% R&D; Product security lead 75% R&D / 25% G&A; Integrations lead 100% R&D; GTM lead 100% S&M; Solutions engineer 60% S&M / 40% R&D; Policy engineer 100% R&D; Customer success lead 50% S&M / 50% G&A; Account executive 100% S&M; Product manager 100% R&D; Integration engineer II 100% R&D
  unit: allocation
  source: '[BP team rationales] 用于把人力成本滚进职能 P&L 科目。'
- id: A11
  name: 非薪酬运营支出爬坡
  value: S&M 非薪酬从 8K/mo 增至 26K/mo，R&D 工具/云从 12K/mo 增至 26K/mo，G&A 在 36 个月内从 7K/mo 增至 14K/mo
  unit: USDK per month
  source: '[Startup-finance heuristic anchored to BP deployment, travel, cloud, compliance, and security-review-kit needs.]'
- id: A12
  name: 稳态月度 logo churn
  value: '2.0'
  unit: percent
  source: '[BP risks and expansion assumptions; startup-finance heuristic] 预测假设早期账户粘性较强，但仍集中在偏窄的法律垂类，所以单位经济模型采用保守的稳态 churn，而不是接近零的企业级 churn。'
- id: A13
  name: 混合 CAC
  value: '92'
  unit: USDK per customer
  source: '[BP gtm founder-led enterprise sales and later partner channels; model Y1-Y2 sales and marketing spend] 模型大致以首 24 个月 S&M 支出除以 11 个落地账户来估算。'
- id: A14
  name: 收入确认规则
  value: 月度经常性收入 = 当月平均活跃客户数 × A4 ÷ 12，再加上当月每个新客户对应的 A3 试点/上线费用
  unit: policy
  source: '[BP businessModel revenueStreams and pricing] 让收入直接绑定客户数、订阅 ARPU 和新 logo 上线收入。'
- id: A15
  name: 现金转换规则
  value: EBITDA 近似等于现金变动
  unit: policy
  source: '[Startup-finance heuristic] 这个阶段暂不建模债务、capex、税项或明显的营运资金波动。'
- id: A16
  name: 下一轮融资里程碑
  value: 到 Q4Y2 做到 11 个生产客户，推出可复制、可延伸到 NetDocuments 的集成路径，并在启动种子轮前证明 2 个伙伴来源机会
  unit: milestone
  source: '[BP milestones 12-24 months; BP fundingAsk.useOfFundsSummary] 本轮融资规模按“打到该里程碑后仍再留 6 个月缓冲”来反推。'
