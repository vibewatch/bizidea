slug: matter-boundary-agent-firewall
date: "2026-06-18"
executiveSummary: >-
  Matter-boundary Agent Firewall should start as an iManage-plus-Microsoft 365
  runtime control layer for Am Law 200 firms, not as a general AI governance
  suite or a full legal AI application. The first customer is a large law firm
  with a centralized innovation or knowledge team, at least three live or
  imminent matter-workflow agents, and a security review blocking broader
  production rollout until agent actions can be audited and constrained before
  execution. The product wedge is to simulate and gate a narrow set of
  high-risk actions such as workspace open, bulk export, outbound email, and
  cross-matter retrieval using existing matter, ethical-wall, and privilege
  metadata. This beachhead is attractive because the research shows legal AI is
  moving into production-adjacent use, while incumbent controls remain split
  across DMS permissions, Microsoft governance, and app-specific safeguards.
  The company should sequence shadow mode first, blocking second, and broader
  workflow automation only after it proves low false positives and acceptable
  deployment effort in one DMS ecosystem. Market inputs support a focused but
  narrow initial opportunity at roughly $175.0M TAM, $50.0M SAM, and $4.4M
  modeled year-3 SOM, so venture upside depends on winning the legal go-live
  control point and then expanding to adjacent high-privilege knowledge
  workflows. The biggest disconfirming risks are that integrations become
  services-heavy or buyers accept bundled Microsoft or DMS controls as
  sufficient. Public inputs do not show actual standalone pricing acceptance or
  stable cross-system metadata coverage in production, so those gaps must be
  resolved in the first six pilots.
problem:
  - Large law firms are operationalizing AI inside document, email, and discovery systems, but autonomous agents can inherit enough access to cross matter, client, or privilege boundaries before a human intervenes.
  - Existing controls live in separate DMS permissions, ethical walls, Microsoft governance, and post-hoc logging tools, so firms either keep agents read-only or accept a confidentiality risk they cannot defend to clients and internal risk committees.
solution:
  - Insert a neutral runtime gate between legal AI agents and systems of record that simulates each high-risk action against matter metadata, ethical walls, privilege rules, and scoped credentials before execution.
  - Start with shadow mode and approval-backed blocking for file open, export, email, and retrieval actions across Microsoft 365 plus one legal DMS so firms can clear production security reviews without replacing incumbent tools.
whyWeWin:
  - The product is built around legal matter and privilege semantics across systems, while Microsoft, DMS vendors, and horizontal AI-security firms each control only part of the workflow.
  - The wedge attaches to a current buying event: moving from AI pilot to production in a setting where one boundary breach can stall firmwide rollout.
  - Blocked and approved action traces can compound into a proprietary policy and evaluation dataset that improves detection quality and procurement credibility.
strategicChoices:
  beachhead: >-
    U.S.- and UK-linked Am Law 200 firms standardized on Microsoft 365 and
    iManage, with centralized innovation or knowledge teams rolling out
    autonomous agents for due diligence, matter search, or discovery support.
  wedgeRationale: >-
    iManage-plus-Microsoft 365 creates faster proof than a broader legal stack
    because it concentrates buyer demand, exposes the highest-value matter and
    email actions, and avoids spreading the company across too many permission
    models before the control narrative is proven.
  sequencingRationale: >-
    The company should first prove shadow-mode visibility and high-risk action
    blocking on one DMS stack, then add approval workflows, second-stack
    integrations, and partner distribution only after it can show that pilots
    convert without custom deployment work or unacceptable workflow latency.
  notYet:
    - NetDocuments and Relativity parity before the iManage motion is repeatable
    - Full legal AI governance, model evaluation, or prompt-filtering platform claims outside the action-control wedge
    - Corporate legal department self-serve motion before law-firm security and knowledge teams provide design-partner evidence
    - Cross-vertical expansion into accounting, consulting, or insurance before the legal policy graph is proven in production
market:
  tam: "$175.0M estimated TAM based on roughly 700 global high-complexity legal organizations at about $250k annual control-plane spend."
  sam: "$50.0M estimated SAM based on roughly 250 English-language law-firm, ALSP, and enterprise legal accounts that fit the near-term stack and buyer profile."
  som: "$4.4M modeled year-3 SOM based on roughly 25 production customers at about $175k blended ARR after pilot-led expansion."
  segments:
    - "Primary segment: Am Law 200 firms using Microsoft 365 and iManage for sensitive matter workflows"
    - "Secondary segment: ALSPs and large enterprise legal teams with similar document and confidentiality constraints"
  buyingProcess: >-
    The operational champion is likely the head of legal innovation, Chief
    Knowledge Officer, or security leader sponsoring AI rollout, but budget and
    deployment approval typically require CISO, IT, and practice-risk
    sign-off. The most credible path is a paid shadow-mode pilot tied to a
    live agent rollout, converting once the firm sees blocked-risk evidence,
    acceptable latency, and audit outputs that satisfy security review.
product:
  mvp: >-
    MVP should support Microsoft 365 plus iManage, one policy graph for matter
    boundaries and privilege rules, shadow-mode replay, and inline approval or
    block decisions for workspace open, bulk retrieval, export, and outbound
    email actions. It must produce an explanation trace and immutable audit log
    for every attempted covered action.
  sixMonth: >-
    Launch 2-3 design-partner pilots, ship shadow mode, prove API-level policy
    evaluation on the first covered actions, and package a security-review kit
    that shortens procurement for firms already scaling agents.
  twelveMonth: >-
    Add production blocking and human approval workflows, reduce deployment to
    a repeatable playbook for Microsoft 365 plus iManage, and convert at least
    2 pilot accounts into annual production contracts.
  twentyFourMonth: >-
    Expand into NetDocuments and selected Relativity-adjacent actions, then use
    the same policy engine and audit layer to cover more legal workflows and
    begin testing one adjacent high-privilege vertical.
  keyBets:
    - Buyers will fund pre-execution control sooner than they fund another legal AI assistant.
    - Existing matter and ethical-wall metadata is rich enough to support accurate runtime decisions without manual remapping of every workspace.
    - Security teams will tolerate the added control layer if it gates only a narrow set of risky actions and preserves workflow speed elsewhere.
    - A cross-system legal policy graph will differentiate more durably than generic prompt-security or DLP claims.
gtm:
  wedge: >-
    Sell a paid production-readiness pilot for one live legal agent workflow by
    running shadow mode first and then enabling approval-backed blocking on the
    highest-risk actions that currently prevent broader rollout.
  channels:
    - Direct founder-led sales to CISOs, Chief Knowledge Officers, and heads of legal innovation at target firms
    - Security-review-driven pilots co-sponsored by innovation and IT teams during active agent rollout decisions
    - Later partnerships with legal AI vendors, iManage ecosystem partners, and legal cybersecurity consultancies after the first deployments are repeatable
  funnelTargets: "Target-account intro→qualified pilot 20-30%, pilot→production 50%+, and median pilot kickoff→production decision under 150 days."
  pricing: >-
    Start with a paid pilot and annual subscription priced by protected agents,
    covered repositories, and governed high-risk actions, because the buyer is
    paying to unlock production deployment rather than to buy seats. Initial
    assumption is a $25k-$50k pilot that converts to roughly $150k-$250k ARR
    for the first production deployment, with expansion from more agents,
    repositories, and approval modules.
businessModel:
  revenueStreams:
    - Annual platform subscription for the runtime control layer
    - Usage-based fees tied to protected agents, connected repositories, and governed high-risk action volume
    - Premium modules for approval workflows, audit exports, and advanced policy packs
  unitOfValue: Protected high-privilege legal agent deployment
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more agent workflows and repositories inside the same firm
    - Expand from iManage-first deployments into NetDocuments and Relativity-adjacent use cases
    - Reuse the policy graph and audit layer in adjacent high-privilege knowledge-work verticals
strategyMap:
  northStarMetric: High-risk agent actions governed within policy with zero privileged-data incidents in production accounts
  inputMetrics:
    - Paid pilot to production conversion rate
    - Percentage of covered risky actions correctly allowed, blocked, or escalated
    - Median deployment time for Microsoft 365 plus iManage customers
    - Security review completion rate without custom control redesign
    - Number of protected production agents per customer
  moatsToBuild:
    - Cross-system legal policy graph linking matter IDs, ethical walls, privilege rules, and action scopes
    - Dataset of blocked, approved, and human-overridden actions tied to real legal workflows
    - Deployment and audit artifacts that reduce procurement friction for regulated legal buyers
  killCriteria:
    - Fewer than 3 paid pilots after 30 qualified target-account conversations
    - Pilot to production conversion below 50% across the first 6 pilots
    - Median Microsoft 365 plus iManage deployment time remains above 6 weeks after the third pilot
    - More than 70% of late-stage prospects choose Microsoft or DMS-native controls after live evaluation
  mermaid: |
    flowchart LR
      Wedge[Am Law iManage + M365 wedge] --> MVP[Shadow-mode and action-gating MVP]
      MVP --> Proof[Blocked-risk evidence and production approvals]
      Proof --> Expansion[Second DMS, more workflows, adjacent verticals]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong pain and a coherent wedge, but conviction stays limited until the team proves repeatable integrations and standalone budget acceptance.
    whyBelieve: The company targets a real production blocker in a market where AI adoption, confidentiality pressure, and cross-system workflow complexity are all rising at once.
    whyDoubt: The beachhead is narrow and incumbents already control permissions, governance, and distribution, so a standalone window exists only if deployment is fast and materially better.
    nextDiligence: Confirm that 3-5 paid pilots on Microsoft 365 plus iManage convert to annual contracts because the product catches risks buyers cannot solve with existing controls.
  firstCustomer:
    title: Am Law 200 legal innovation and security sponsor
    profile: A large law firm with centralized innovation leadership, Microsoft 365, iManage, and at least three live or imminent matter-workflow agents touching privileged content.
    trigger: A move from contained AI pilots to broader matter workflows, especially after a prompt-injection test or over-permission finding makes security block rollout.
    buyer: Chief Information Security Officer, Chief Knowledge Officer, or head of legal innovation
    initialContract: "$25k-$50k paid shadow-mode pilot tied to one workflow, converting to roughly $150k-$250k annual ARR for the first production deployment."
  mustBeTrue:
    - At least half of qualified target firms must plan to move legal agents into production workflows within the next 12 months.
    - Microsoft 365 plus iManage metadata must support accurate matter-boundary decisions without more than 4 weeks of deployment work for most pilots.
    - The product must show pilot-to-production conversion of 50% or better at price points that support at least $150k initial ARR.
    - Live evaluations must prove the control layer catches meaningful boundary or prompt-driven violations that incumbent controls do not stop pre-execution.
    - Early customers must expand from one governed workflow to multiple protected agents within 12 months, or the business will stall at narrow point solutions.
  diligenceQuestions:
    - Which exact action unlocks budget first: outbound email, bulk export, workspace open, or cross-matter retrieval?
    - How often do target firms already have active agent rollouts versus still being in policy drafting and experimentation?
    - Can iManage and Microsoft permission models be normalized into a productized policy graph without recurring custom services?
    - What evidence makes a buyer choose a neutral runtime layer over Microsoft Purview, DMS-native controls, or legal AI vendor safeguards?
    - How many agents and repositories does one production customer realistically protect in year 1 after the first workflow goes live?
operatingAssumptions:
  - assumption: Law-firm buyers will pay for a neutral runtime control layer instead of treating Microsoft and DMS controls as sufficient.
    basis: research.yaml
    validationTest: Close at least 3 paid pilots where the budget owner explicitly rejects a bundle-only alternative and signs a standalone pilot scope.
    decisionImpact: If false, the company should shift toward embedded or partner distribution instead of scaling direct standalone sales.
  - assumption: iManage plus Microsoft 365 is a narrow enough stack to make deployment repeatable inside 4 weeks by the third pilot.
    basis: idea.yaml
    validationTest: Track implementation time across the first 3 pilots and require at least 2 to reach shadow mode in 20 business days or less.
    decisionImpact: If false, the company should narrow the covered actions further or reconsider venture-scale assumptions because onboarding will be too services-heavy.
  - assumption: Matter, ethical-wall, and privilege metadata can drive low-false-positive runtime decisions for the first covered actions.
    basis: research.yaml
    validationTest: Replay at least 200 historical actions across 2 design partners and keep incorrect block or escalation decisions below 5% on the covered workflows.
    decisionImpact: If false, the roadmap should move toward audit-only visibility rather than inline blocking, reducing pricing power and differentiation.
  - assumption: Buyers will accept shadow mode first and then enable production blocking after seeing evidence, rather than demanding full automation or rejecting added controls outright.
    basis: operator judgment
    validationTest: In the first 5 qualified pilots, at least 3 must agree in writing to a shadow-mode-to-blocking rollout plan during procurement.
    decisionImpact: If false, the go-to-market motion should shift to advisory visibility tooling or narrower approval workflows with lower ACV expectations.
  - assumption: Expansion inside a firm will come from more agents and repositories, not just renewal of one isolated workflow.
    basis: idea.yaml
    validationTest: Within 12 months of first production deployment, at least 2 early customers must add a second protected workflow or materially increase governed action volume.
    decisionImpact: If false, the company should treat the business as a niche compliance point solution and reduce hiring and fundraising plans.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: Buyer and trigger interviews
    hypothesis: Target firms already have named agent rollout decisions and specific security objections that map to a pre-execution control purchase.
    successMetric: 15 qualified interviews with at least 10 matching the beachhead stack and 8 confirming a live rollout trigger in the next 12 months.
    owner: Founder CEO
  - horizon: "0–90 days"
    experiment: Historical-action replay on one iManage environment
    hypothesis: Matter and privilege metadata can classify the first covered actions accurately enough for shadow-mode deployment.
    successMetric: Replay at least 100 historical actions with fewer than 5% materially incorrect allow or block outcomes.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Paid shadow-mode pilot packaging
    hypothesis: Firms will pay for production-readiness evidence before they are ready to authorize live blocking.
    successMetric: 3 signed paid pilots with consistent scope, pricing band, and security-review artifacts.
    owner: Founder CEO
  - horizon: "90–180 days"
    experiment: Security-review kit validation
    hypothesis: A packaged control narrative, audit sample, and least-privilege architecture materially improves procurement speed.
    successMetric: At least 3 prospects complete security review without requiring a bespoke control redesign.
    owner: Product security lead
  - horizon: "6–12 months"
    experiment: Production blocking rollout
    hypothesis: Buyers will enable blocking for a narrow set of high-risk actions after shadow-mode evidence shows acceptable false-positive rates.
    successMetric: 2 production customers activate blocking or approval mode on at least 2 covered action types with zero reported privileged-data incidents for 90 days.
    owner: Product lead
  - horizon: "12–18 months"
    experiment: Second-stack expansion test
    hypothesis: The policy engine and deployment playbook can extend from iManage to NetDocuments without doubling implementation effort.
    successMetric: First NetDocuments pilot reaches shadow mode in no more than 125% of the median iManage deployment time.
    owner: Integrations lead
operations:
  - Maintain a versioned legal policy library mapping matter IDs, ethical walls, privilege rules, and action scopes across connected systems.
  - Preserve immutable replay logs and explanation traces for every covered action to support client audits, incident review, and procurement.
  - Standardize least-privilege credential setup, connector deployment, and shadow-mode activation so the first stack can be implemented without custom engineering.
  - Run post-pilot reviews comparing blocked actions, human overrides, latency, and expansion readiness before widening workflow scope.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own buyer discovery, founder-led sales, pricing, and the legal-risk narrative until the pilot motion is repeatable.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the policy engine, action simulation layer, and first Microsoft 365 plus iManage integrations.
  - role: Product security lead
    startTiming: Month 2
    rationale: Convert technical controls into a procurement-ready security-review kit and keep the architecture aligned with least-privilege and audit requirements.
  - role: Integrations lead
    startTiming: Month 4
    rationale: Productize connectors, reduce deployment time, and prepare the path to NetDocuments after the first iManage pilots.
  - role: GTM lead
    startTiming: Month 9
    rationale: Add pipeline capacity only after pilot scope, pricing, and conversion show a repeatable enterprise motion.
milestones:
  - horizon: "0–12 months"
    items:
      - Sign 3-5 paid pilots in the Am Law iManage plus Microsoft 365 beachhead.
      - Prove shadow mode on the first covered actions with fewer than 5% materially incorrect decisions.
      - Convert at least 2 pilots into annual production contracts with blocking or approval mode enabled.
      - Reduce deployment to a repeatable playbook that reaches shadow mode in 4 weeks or less for the core stack.
  - horizon: "12–24 months"
    items:
      - Reach 8-12 production customers protecting multiple legal agents or workflows.
      - Launch NetDocuments support and package approval workflows plus audit exports as standard modules.
      - Establish at least 2 ecosystem partners that can source qualified pilots without custom integration promises.
      - Demonstrate expansion inside existing customers through more repositories, agents, or governed actions.
  - horizon: "24–36 months"
    items:
      - Reach roughly 20-25 production customers or equivalent ARR consistent with the modeled SOM.
      - Decide whether to deepen as the legal runtime-control leader or expand into one adjacent high-privilege vertical based on retention and win rates.
      - Show that the policy graph and blocked-action dataset materially improve deployment speed and evaluation win rates versus horizontal alternatives.
risks:
  - risk: iManage and Microsoft integrations remain too custom and turn onboarding into a services business.
    likelihood: High
    impact: High
    mitigation: Start with a narrow action set, ship shadow mode first, and refuse bespoke workflows until the core deployment playbook is repeatable.
  - risk: Microsoft, iManage, or NetDocuments bundle enough native governance to erase the standalone wedge.
    likelihood: Medium
    impact: High
    mitigation: Focus positioning on cross-system, matter-aware pre-execution control and prove live violations that native controls miss.
  - risk: Law-firm buyers agree the risk is real but delay budget until a public incident or explicit client mandate appears.
    likelihood: Medium
    impact: High
    mitigation: Sell against active rollout gates, blocked prompt-injection tests, and security-review deadlines rather than abstract future risk.
  - risk: Blocking introduces latency or false positives that make lawyers and knowledge teams bypass the system.
    likelihood: Medium
    impact: High
    mitigation: Sequence from shadow mode to a very small set of risky actions, measure override rates, and keep low-risk actions outside the gate at first.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to build the first-stack runtime and policy engine, clear
    3-5 paid pilots, prove pilot-to-production conversion on Microsoft 365 plus
    iManage, and turn the deployment and security-review motion into a
    repeatable foundation before scaling GTM.
