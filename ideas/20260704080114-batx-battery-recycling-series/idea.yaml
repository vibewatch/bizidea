topRisks:
  - name: "Early-market software budget"
    description: "Some recyclers may still treat operational software as optional while they prioritize plant capex and metallurgy hires."
    mitigation: "Sell into line-commissioning moments with ROI framed around recovered-yield uplift, batch-loss avoidance, and faster working-capital turnover."
  - name: "Sparse historical data"
    description: "New plants and inconsistent lot records could make early yield predictions noisy and slow product trust."
    mitigation: "Start with human-in-the-loop workflows, lab-assisted baselines, and conservative prediction confidence bands that improve as each plant runs more lots."
  - name: "ERP or in-house encroachment"
    description: "Large recyclers could extend generic ERP, LIMS, or internal analytics tools instead of buying a new platform."
    mitigation: "Own the cross-plant yield benchmark dataset and supplier-settlement workflow that generic systems and single-plant internal tools cannot easily replicate."
