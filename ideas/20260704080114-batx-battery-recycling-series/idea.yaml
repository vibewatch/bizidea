problem: >-
  Battery recyclers scaling commercial capacity receive feedstock that varies wildly by chemistry, contamination, and
  paperwork completeness. Each lot is manually sampled, priced, and routed with spreadsheets, lab emails, and
  plant-manager intuition, so one bad decision can contaminate a batch, miss recovery targets, or create payout
  disputes with suppliers. As plants add refining capacity, gross margin depends less on nameplate throughput than on
  how fast and accurately they can turn mixed battery waste into predictable metal output.
targetUser:
  primary: "COO or plant-operations head at an Indian battery recycler commissioning its first commercial lithium-ion refining line for lithium, cobalt, nickel, and graphite recovery"
  secondary: "Commercial feedstock managers at battery manufacturers that sell recurring scrap lots into domestic recyclers"
  buyer: "COO, VP Operations, or Head of Commercial at a battery recycler"
startupThesis:
  nonObviousInsight: >-
    The next bottleneck in battery recycling is not more hydromet IP; it is the operational and commercial layer
    between mixed battery waste and refining lines. Once a recycler starts processing both manufacturing scrap and
    end-of-life packs, every incoming lot behaves like a small commodities position with uncertain recovery value. The
    company that wins will control lot-level yield prediction, routing, and settlement — not just the metallurgy.
  beachhead: "Indian battery recyclers commissioning their first commercial lithium-ion refining line and processing both cell-manufacturing scrap and contracted end-of-life battery lots"
  wedge: "A lot-intake and yield-control system that classifies incoming lots, recommends sampling and line routing, forecasts recovered metal output, and reconciles supplier payouts against actual assays"
  whyNowCatalyst: >-
    BatX is using fresh Series A capital to expand recycling and refining capacity for both end-of-life batteries and
    manufacturing scrap, making variable-feedstock control an immediate bottleneck instead of a back-office nuisance.
  ventureScalePath: >-
    Start as the operating system for recycler intake and yield control, then expand upstream into scrap-generator
    procurement and downstream into recycled-material qualification, offtake contracting, financing, and eventually a
    marketplace for secondary critical minerals.
solution: >-
  The product is a lot-intake and yield-control system for battery recyclers. Operators upload supplier manifests,
  chemistry hints, teardown notes, and lab sample data; the system recommends sampling depth, pre-processing steps, and
  which refining line should handle the lot. It forecasts recoverable lithium, cobalt, nickel, and graphite by lot,
  then compares forecast versus actual assay results after recovery to continuously improve pricing and routing.
  Commercial teams use the same record to generate supplier settlements and working-capital views instead of
  reconciling spreadsheets, ERP exports, and lab emails. Over time, the company builds a proprietary input-to-output
  dataset that can underpin financing, offtake contracts, and downstream qualification products.
goToMarketSeed:
  firstCustomer: "An Indian battery recycler commissioning its first commercial lithium-ion refining line and onboarding recurring supply contracts for both manufacturing scrap and end-of-life battery packs"
  buyingTrigger: "A new recycling or refining line goes live, or the recycler signs its first multi-supplier scrap intake contracts and must make weekly pricing, routing, and yield calls"
  currentAlternative: "Manual workflow using spreadsheets, generic ERP or LIMS modules, lab emails, and plant-manager heuristics for lot pricing and line routing"
  switchingReason: >-
    The wedge reduces batch-loss risk, improves recovered-metal yield, and shortens supplier-settlement cycles in a
    way generic plant software cannot, because it links intake classification directly to downstream recovery and
    payout outcomes.
  pricingHypothesis: "Annual software fee per plant plus usage pricing per lot or tonne processed, with a premium module for supplier settlement and assay reconciliation"
