differentiator: >-
  Generic ERP, LIMS, and metals-trading tools stop at inventory or lab records; they do not tell a recycler what a
  specific mixed lot will actually yield on a given line or how that should change supplier pricing. This company
  starts at lot classification and closes the loop at assay-backed settlement, creating a proprietary dataset linking
  input mix, contamination profile, routing choice, and recovered-metal output. That dataset becomes the basis for
  better pricing, faster working-capital cycles, and downstream recycled-material qualification that point solutions
  cannot match.
