slug: battery-feedstock-yield-os
date: '2026-07-04'
executiveSummary: >-
  Battery Feedstock Yield OS is a lot-intake and yield-control system for Indian battery recyclers who are moving from
  pilot to commercial-scale lithium-ion refining. The trigger is concrete: a recycler commissions its first
  commercial refining line, or signs its first multi-supplier scrap intake contracts, and suddenly has to make weekly
  pricing, routing, and payout calls on mixed manufacturing scrap and end-of-life packs with only spreadsheets, lab
  emails, and plant-manager intuition. The wedge is narrow on purpose: classify incoming lots, recommend sampling
  depth and line routing, forecast recoverable lithium, cobalt, nickel, and graphite, and reconcile that forecast
  against actual assay results to settle supplier payouts. Competitors sit adjacent to this loop — EPR/compliance
  platforms, battery-passport suites, marketplaces, and LIMS vendors — but none of them own the forecast-versus-actual
  and settlement record inside the plant. The researched market is real but thin at the beachhead (TAM ~$17.4M, SAM
  ~$5.4M, SOM ~$2.1M across roughly 7 reachable plant logos by year 3), so venture-scale outcomes depend on the
  company using this operating data to expand upstream into scrap-generator procurement and downstream into
  recycled-material qualification, offtake, and financing infrastructure. The first 12 months are about proving
  forecast accuracy and settlement-cycle compression with 3-5 design partners, not about maximizing logo count. The
  biggest open risk is budget behavior: recyclers scaling plant capex may treat operational software as discretionary
  next to metallurgy hires, and sparse historical lot data could make early predictions noisy enough to slow trust.
problem:
  - >-
    Incoming battery lots vary wildly by chemistry, contamination, and paperwork completeness, and each lot is
    manually sampled, priced, and routed using spreadsheets, lab emails, and plant-manager judgment — so one bad call
    can contaminate a batch, miss recovery targets, or trigger a supplier payout dispute.
  - >-
    As recyclers add refining capacity for both cell-manufacturing scrap and end-of-life packs, gross margin depends
    less on nameplate throughput and more on how fast and accurately mixed waste becomes predictable, settled metal
    output — a commercial-operations problem that generic ERP, LIMS, and compliance tools do not solve end to end.
solution:
  - >-
    A lot-intake and yield-control system where operators upload supplier manifests, chemistry hints, teardown notes,
    and lab sample data; the system recommends sampling depth, pre-processing steps, and which refining line should
    take the lot, then forecasts recoverable lithium, cobalt, nickel, and graphite before the lot is processed.
  - >-
    A closed-loop settlement record that compares forecast versus actual post-run assay results to continuously
    improve pricing and routing, and that commercial teams use directly to generate supplier settlements instead of
    reconciling ERP exports, lab emails, and spreadsheets by hand.
whyWeWin:
  - >-
    The company owns the forecast-versus-actual dataset linking lot composition, routing choice, and recovered
    output by chemistry — a data asset that compliance, passport, marketplace, and LIMS incumbents each touch only a
    piece of, per the researched competitive landscape.
  - >-
    Distribution rides an existing budget conversation: the sale happens at line-commissioning moments when yield,
    batch-loss, and settlement pain is already acute, so the product borrows budget from LIMS, compliance, and
    plant-operations line items rather than pitching a new experimental software category.
strategicChoices:
  beachhead: >-
    Indian battery recyclers commissioning their first commercial lithium-ion refining line and simultaneously
    onboarding recurring scrap-intake contracts from both battery manufacturers (manufacturing scrap) and contracted
    end-of-life battery collectors.
  wedgeRationale: >-
    Lot intake, sampling, routing, and settlement is a narrow, measurable workflow with a clear buyer (COO / Head of
    Recycling Operations), a clear trigger (new line commissioning or first multi-supplier contract), and a fast
    proof point (forecast-vs-actual yield variance, days-to-settle). Starting broader — e.g. a full recycler ERP or a
    cross-chain battery-passport platform — would require competing head-on with better-funded incumbents before the
    company has any proprietary data to differentiate on.
  sequencingRationale: >-
    Product sequencing follows the money: intake classification and yield forecasting first (where batch-loss risk
    is highest and ROI is easiest to prove), then supplier settlement and reconciliation (where the recurring
    revenue and stickiness live), then cross-plant benchmarking and upstream/downstream expansion once the core
    dataset exists. Hiring follows the same order — domain-expert founder-led sales and a forecasting data
    scientist first, implementation/customer-success only once design partners are running real lots, and a
    dedicated commercial hire only after the first 2-3 reference customers exist.
  notYet:
    - >-
      Upstream scrap-generator procurement tooling for battery manufacturers — tempting because it is adjacent and
      mentioned in the venture-scale path, but premature before the recycler-side dataset and trust exist.
    - >-
      Downstream offtake contracting, financing infrastructure, or a secondary critical-minerals marketplace —
      deferred until the company has multiple plants' worth of assay-backed settlement history to underwrite those
      products credibly.
    - >-
      Non-India geographies — the beachhead thesis depends on a specific, concentrated cohort of India-based
      recyclers scaling commercial capacity now; expanding geography before saturating that cohort dilutes the
      design-partner advantage.
market:
  tam: "$17.4M (58 India scheme-eligible critical-mineral recyclers x ~$300k estimated annual plant software spend)"
  sam: "$5.4M (18 battery-focused recyclers/refiners, ~30% of the organized-recycler upper bound, x ~$300k annual spend)"
  som: "$2.1M (7 plant logos by year 3 x ~$300k annual spend, consistent with a concentrated cohort and high-touch commissioning sales)"
  segments:
    - "Battery recyclers adding commercial lithium-ion recycling and refining capacity (primary buyer)"
    - "Battery manufacturers with recurring scrap streams that need transparent recycler settlements (secondary, procurement-side)"
  buyingProcess: >-
    The economic buyer is the COO, VP Operations, or Head of Recycling Operations, sold at the moment a new line goes
    live or the first multi-supplier scrap contracts are signed; plant-operations and lab/metallurgy teams are the
    daily users who validate the forecast before the buyer commits budget.
product:
  mvp: >-
    A lot-intake workbench that ingests supplier manifests and lab sample data, classifies lot chemistry and
    contamination risk, and recommends sampling depth plus line routing for a single refining line at one design
    partner plant.
  sixMonth: >-
    Forecast recoverable lithium, cobalt, nickel, and graphite per lot, and close the loop by comparing forecast
    against actual post-run assay results across 3-5 design-partner plants, with human-in-the-loop confidence bands
    while the model is data-poor.
  twelveMonth: >-
    Ship the supplier-settlement and reconciliation module (premium tier) so commercial teams generate assay-backed
    payouts directly from the platform, and reach the first 2-3 paying plant-logo contracts beyond design partners.
  twentyFourMonth: >-
    Deliver cross-plant yield and settlement benchmarking across 5-7 paying plants, and pilot the first upstream
    (scrap-generator procurement) or downstream (recycled-material qualification) extension with an existing
    customer, gated on data-loop maturity rather than calendar time.
  keyBets:
    - "Forecast-vs-actual yield variance narrows measurably within 2-3 processing cycles per plant, even starting from sparse historical data."
    - "Settlement-cycle compression (days-to-close) is a strong enough ROI story on its own to justify the premium module price, independent of yield-forecast accuracy."
    - "Design partners will share manifest, sampling, and assay data needed to train lot-level models, given a human-in-the-loop, conservative-confidence rollout."
gtm:
  wedge: >-
    Sell directly to recycler COOs/plant heads at the moment a new refining line is commissioned or the first
    multi-supplier scrap contracts are signed, replacing spreadsheets, lab emails, and generic ERP/LIMS modules with
    an assay-backed intake-to-settlement record.
  channels:
    - "Direct founder-led sales to recycler COOs and plant heads during line commissioning"
    - "Partnerships with battery manufacturers running closed-loop scrap programs into recyclers"
    - "Pull-through introductions from assay labs, analytical-instrument vendors, and LIMS providers that already touch the sampling surface"
    - "Warm intros from investors and recycling consultants backing new plant capacity (e.g. the BatX Series A cohort)"
  funnelTargets: "lead -> design-partner LOI 40-60% (concentrated, high-touch cohort); design partner -> paid plant contract 50%+ within 2 processing cycles"
  pricing: >-
    Annual software subscription per plant/refining line, plus usage-based fees per lot or tonne processed, with a
    premium module priced separately for supplier settlement, audit trails, and downstream buyer reporting —
    anchored to the researched ~$300k blended annual contract value per plant.
businessModel:
  revenueStreams:
    - "Annual software subscription per plant or refining line"
    - "Usage-based fee per lot or tonne processed through the system"
    - "Premium module fees for supplier settlement, audit trails, and downstream buyer/compliance reporting"
  unitOfValue: "One classified, routed, and assay-reconciled battery lot processed through the platform"
  targetGrossMarginPct: 75
  expansionLevers:
    - "Add refining lines and plants within an existing recycler account as capacity scales"
    - "Upsell the supplier-settlement and reconciliation premium module after core intake/yield adoption"
    - "Expand into upstream scrap-generator procurement modules with battery-manufacturer partners"
    - "License cross-plant yield and settlement benchmarks to downstream buyers or financing partners once data density supports it"
strategyMap:
  northStarMetric: "Number of plant-refining-lines with live forecast-vs-actual yield tracking and assay-backed settlement in production"
  inputMetrics:
    - "Forecast-vs-actual recovered-metal variance per lot, by chemistry"
    - "Days to close supplier settlement and share of lots triggering disputes"
    - "Design-partner-to-paid-contract conversion rate"
    - "Number of processing cycles until model confidence bands tighten per plant"
  moatsToBuild:
    - "Proprietary forecast-vs-actual dataset linking lot composition, routing choice, and recovered output by chemistry"
    - "Commercial dataset on supplier quality, assay disputes, and settlement outcomes that generic LIMS/ERP systems do not capture"
    - "Cross-plant yield and dwell-time benchmarks that get more defensible as more recyclers feed the same decision loop"
  killCriteria:
    - "Fewer than 2 of the first 5 design partners convert to a paid contract within 12 months of pilot start"
    - "Forecast-vs-actual variance fails to narrow by a measurable margin (e.g. no improvement trend) after 3 processing cycles at 2+ plants"
    - "Average sales cycle from first contact to signed contract exceeds 9 months across 3+ prospects, indicating the software-budget assumption is wrong"
  mermaid: |
    flowchart LR
      Wedge[Line-commissioning wedge] --> MVP[Lot intake + yield forecast MVP]
      MVP --> Proof[Forecast-vs-actual + settlement proof at design partners]
      Proof --> Expansion[Cross-plant expansion + upstream/downstream data products]
investorMemo:
  verdict:
    call: "Watch"
    conviction: >-
      The wedge, buyer, and trigger are unusually well specified for a pre-product-market-fit deal, but the
      researched beachhead TAM ($17.4M) and SOM ($2.1M) are thin for a standalone venture outcome and the thesis
      leans heavily on an unproven expansion path.
    whyBelieve: >-
      A named, funded operator cohort (led by BatX's Series A) is scaling commercial refining capacity right now,
      creating a concrete, time-bound line-commissioning trigger and a concentrated first-customer list.
    whyDoubt: >-
      The core India recycler market is small (SOM ~$2.1M across ~7 plants by year 3), so the investment case depends
      on unvalidated upstream/downstream expansion rather than the researched wedge alone.
    nextDiligence: >-
      Sign and instrument 3-5 design-partner LOIs to measure real forecast-vs-actual variance and settlement-cycle
      compression before committing capital beyond a seed check.
  firstCustomer:
    title: "COO / Head of Recycling Operations at an Indian battery recycler commissioning its first commercial Li-ion refining line"
    profile: >-
      A recycler that has raised or deployed capital to add refining capacity and is simultaneously onboarding
      recurring scrap-intake contracts from both battery manufacturers and end-of-life collectors.
    trigger: "A new recycling/refining line goes live, or the recycler signs its first multi-supplier scrap intake contracts and must make weekly pricing, routing, and yield calls."
    buyer: "COO, VP Operations, or Head of Recycling Operations"
    initialContract: >-
      A design-partner pilot on one refining line (low or waived first-cycle fee) converting within 2 processing
      cycles to an annual per-plant subscription plus usage fees, targeting the researched ~$300k blended ACV.
  mustBeTrue:
    - "Recyclers commissioning new lines will allocate discretionary software budget alongside plant capex and metallurgy hires within the same fiscal cycle."
    - "Forecast-vs-actual recovered-metal variance narrows measurably within 2-3 processing cycles even from sparse historical lot data."
    - "Supplier-settlement cycle time and dispute rate are large enough today (per the researched dataMoats and validationSignals) to justify a premium reconciliation module."
    - "No incumbent (EPR platform, battery-passport suite, marketplace, or LIMS vendor) extends into lot-level routing and settlement fast enough to foreclose the wedge in the first 18 months."
    - "The India beachhead cohort (~7 reachable plant logos) is large enough, and referenceable enough, to support expansion into upstream or downstream products before the core market saturates."
  diligenceQuestions:
    - "What is the current forecast-versus-actual recovered-metal variance by chemistry at target plants, and how was it measured?"
    - "How long do supplier settlements take today, and what share of lots trigger disputes, at 2-3 named prospective design partners?"
    - "Which system currently owns manifests, assays, and payouts at the target accounts — LIMS, ERP, EPR portal workflows, or spreadsheets — and what would it take to displace it?"
    - "How concentrated is the reachable 7-plant SOM cohort, and what happens to the model if fewer than 5 of them commission commercial lines in the funding window?"
    - "What is the credible path and evidence for the upstream/downstream expansion the venture-scale thesis depends on?"
operatingAssumptions:
  - assumption: "Recyclers commissioning a new refining line will fund plant-operations software as part of the same commissioning budget cycle, not as a deferred purchase."
    basis: "idea.yaml"
    validationTest: "Track whether 3-5 design-partner LOIs convert to paid contracts within 2 processing cycles of pilot start."
    decisionImpact: "If budget conversion fails, shift GTM to a usage-only, no-upfront-fee model and lengthen the sales-cycle assumption in the funding ask."
  - assumption: "Forecast confidence can improve fast enough from human-in-the-loop baselines that plants trust routing recommendations within their first few processing cycles."
    basis: "operator judgment"
    validationTest: "Measure forecast-vs-actual variance trendline across the first 3 processing cycles at each design partner."
    decisionImpact: "If variance does not narrow, delay the settlement/premium module and invest more in lab-assisted baseline accuracy before selling routing automation."
  - assumption: "The researched blended ACV of ~$300k per plant-year is achievable at India-based recyclers rather than requiring steep discounting to win the first logos."
    basis: "research.yaml"
    validationTest: "Benchmark actual signed contract values against the $300k estimate across the first 3 paid contracts."
    decisionImpact: "If real ACV lands materially below $300k, the SAM/SOM and funding runway both need to be revised downward before raising a larger round."
  - assumption: "The reachable beachhead is genuinely limited to ~7 plant logos in the 3-year window, not a larger uncounted set of smaller or informal recyclers."
    basis: "research.yaml"
    validationTest: "Cross-check the 58-company scheme-eligible list and 551 CPCB registrations against how many are realistically running commercial Li-ion refining lines with multi-chemistry recovery."
    decisionImpact: "If the addressable count is meaningfully smaller, prioritize expansion into upstream/downstream products earlier than the current 24-month milestone."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Sign 3-5 design-partner LOIs with recyclers commissioning a new line or first multi-supplier contract."
    hypothesis: "Line-commissioning moments create urgent enough pain that operators will commit real manifest and assay data to a design partnership without a signed commercial contract yet."
    successMetric: "3+ signed design-partner LOIs with committed data access within 90 days."
    owner: "Founder / commercial lead"
  - horizon: "0-90 days"
    experiment: "Build the human-in-the-loop lot-classification and sampling-recommendation workbench for one refining line."
    hypothesis: "A conservative, human-reviewed recommendation (not full automation) is enough to get plant-manager trust and usage in the first cycles."
    successMetric: "Plant operators use the workbench recommendation (accept or override with logged reason) on 80%+ of incoming lots at the first design partner."
    owner: "Founding engineer"
  - horizon: "3-6 months"
    experiment: "Instrument forecast-vs-actual variance tracking across 3-5 design partners and publish a variance trendline."
    hypothesis: "Forecast accuracy improves measurably within 2-3 processing cycles even starting from sparse historical data."
    successMetric: "Variance narrows by a measurable, reportable margin at 3+ of 5 design partners by month 6."
    owner: "Data scientist / founding engineer"
  - horizon: "3-6 months"
    experiment: "Pilot the supplier-settlement reconciliation workflow at one design partner with active supplier disputes."
    hypothesis: "Assay-backed settlement records reduce days-to-close and dispute rate enough to justify a premium price."
    successMetric: "Days-to-close settlement drops by a measurable margin versus the partner's pre-pilot baseline."
    owner: "Implementation / customer success"
  - horizon: "6-12 months"
    experiment: "Convert 2-3 design partners to paid annual-plus-usage contracts at or near the $300k blended ACV target."
    hypothesis: "Design partners who see variance improvement and settlement compression will pay full price rather than requiring steep discounts."
    successMetric: "2+ signed paid contracts at 70%+ of target ACV by month 12."
    owner: "Founder / commercial lead"
  - horizon: "9-15 months"
    experiment: "Test one pull-through channel partnership with an assay lab or analytical-instrument vendor."
    hypothesis: "Lab and instrument vendors can generate qualified introductions because they already touch the sampling workflow the product depends on."
    successMetric: "At least 1 qualified design-partner or sales lead sourced through a lab/instrument partner by month 15."
    owner: "Founder / commercial lead"
  - horizon: "12-18 months"
    experiment: "Scope one upstream (scrap-generator procurement) or downstream (recycled-material qualification) extension with an existing paying customer."
    hypothesis: "Customers with a working intake-to-settlement loop will want the platform extended toward their own upstream or downstream counterparties."
    successMetric: "One signed scoping agreement or paid pilot for an upstream/downstream extension by month 18."
    owner: "Founder / product lead"
operations:
  - "Design-partner onboarding runbook covering manifest ingestion, lab-data intake, and sampling-recommendation review before any automation is trusted."
  - "Direct integration or structured export/import with each partner's existing LIMS/ERP so the platform does not require a rip-and-replace decision."
  - "Data-sharing and confidentiality agreements with design partners covering lot-level manifest, assay, and settlement data used to train forecasting models."
  - "Assay-lab and analytical-instrument vendor relationships as both a data-quality anchor and a pull-through referral channel."
team:
  - role: "Founding engineer (forecasting + data platform)"
    startTiming: "Month 0"
    rationale: "Owns the lot-classification, sampling-recommendation, and yield-forecasting core; must ship the human-in-the-loop MVP before any design partner will trust automation."
  - role: "Founder / domain-expert commercial lead"
    startTiming: "Month 0"
    rationale: "Carries direct relationships and credibility with recycler COOs and plant heads; sells into commissioning moments where trust in metallurgy/operations judgment is the gating factor."
  - role: "Applied data scientist (yield modeling)"
    startTiming: "Month 4-6"
    rationale: "Needed once 2-3 design partners are generating enough lot-level forecast-vs-actual data to move past human-in-the-loop baselines."
  - role: "Implementation / customer success engineer"
    startTiming: "Month 6-9"
    rationale: "Tied to onboarding the first paying plants beyond design partners; high-touch commissioning-linked onboarding cannot scale on founder time alone past 2-3 accounts."
  - role: "Commercial / sales hire"
    startTiming: "Month 9-12"
    rationale: "Added only once 2-3 reference customers exist, to scale direct sales into the remaining beachhead cohort without diluting founder-led selling during the trust-building phase."
milestones:
  - horizon: "0-12 months"
    items:
      - "Sign 3-5 design-partner LOIs and ship the human-in-the-loop lot intake + yield forecast MVP on one refining line per partner"
      - "Demonstrate a measurable forecast-vs-actual variance improvement trend across 3+ design partners"
      - "Pilot the supplier-settlement reconciliation module at 1+ design partner with active dispute history"
      - "Convert 2-3 design partners to paid annual-plus-usage contracts"
  - horizon: "12-24 months"
    items:
      - "Reach 5-7 paying plant logos, consistent with the researched SOM cohort"
      - "Ship the premium settlement/audit-trail module as a standalone upsell across the existing base"
      - "Establish at least one pull-through channel relationship with an assay lab or instrument vendor"
      - "Scope the first upstream or downstream product extension with an existing paying customer"
  - horizon: "24-36 months"
    items:
      - "Reach the researched ~$2.1M SOM run-rate across the reachable India beachhead cohort"
      - "Launch cross-plant yield and settlement benchmarking as a distinct data product"
      - "Validate and begin monetizing at least one upstream/downstream expansion (procurement, qualification, or offtake-adjacent data)"
risks:
  - risk: "Recyclers scaling plant capex may treat operational software as optional relative to metallurgy hires and capital equipment."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Sell into line-commissioning moments with ROI framed around recovered-yield uplift, batch-loss avoidance, and faster working-capital turnover rather than as a discretionary IT purchase."
  - risk: "Sparse historical lot data at new or expanding plants makes early yield predictions noisy and slows product trust."
    likelihood: "High"
    impact: "Medium"
    mitigation: "Start with human-in-the-loop workflows, lab-assisted baselines, and conservative confidence bands that tighten as each plant runs more lots."
  - risk: "Large recyclers extend generic ERP, LIMS, or internal analytics tools instead of adopting a new platform."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Own the cross-plant yield benchmark dataset and supplier-settlement workflow that generic systems and single-plant internal tools cannot easily replicate; integrate with rather than replace existing LIMS/ERP."
  - risk: "The researched beachhead is small (SOM ~$2.1M, ~7 plants), so the core India-recycler market alone may not support a venture-scale outcome."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Treat upstream (procurement) and downstream (qualification, offtake, financing) expansion as an explicit, tested milestone by month 18-24, not a vague long-term aspiration."
  - risk: "Feedstock shortages or weak metals prices could push recyclers into semi-shutdown procurement modes, stretching sales cycles."
    likelihood: "Medium"
    impact: "Medium"
    mitigation: "Bias contract structure toward usage-sensitive pricing so revenue and customer economics track plant utilization rather than assuming fixed throughput."
fundingAsk:
  round: "seed"
  targetFundingRangeUsd: "$1.5-3M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway to fund a founding engineer and domain-expert commercial lead from day one, add a data
    scientist and implementation engineer once design partners are live, sign and instrument 3-5 design-partner
    pilots, ship the yield-forecast MVP and settlement module, and convert the first 2-3 paying plant contracts
    toward the researched ~$300k blended ACV.
