topRisks:
  - name: "早期市场的软件预算"
    description: "一些回收商在优先考虑工厂资本开支和冶金人才招聘时,可能仍把运营软件视为可有可无。"
    mitigation: "在产线调试的关键节点切入销售,把投资回报讲清楚——聚焦回收产率提升、批损规避和更快的营运资金周转。"
  - name: "历史数据稀缺"
    description: "新工厂和不一致的批次记录可能让早期产率预测噪声偏大,拖慢产品信任建立。"
    mitigation: "先用人机协同的工作流、实验室辅助的基线,以及保守的预测置信区间起步,随着每家工厂处理更多批次逐步收紧。"
  - name: "ERP 或内部工具的蚕食"
    description: "大型回收商可能选择扩展通用 ERP、LIMS 或内部分析工具,而不是购买一个新平台。"
    mitigation: "牢牢掌握通用系统和单厂内部工具难以复制的跨工厂产率基准数据集和供应商结算工作流。"
