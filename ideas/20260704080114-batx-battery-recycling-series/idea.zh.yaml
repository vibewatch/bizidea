problem: >-
  电池回收商在扩大商业产能时,收到的原料在化学成分、污染程度和单据完整性上千差万别。
  每一批货都靠人工取样、定价、分流——用 Excel 表格、实验室邮件和厂长的经验判断,
  一次错误决策就可能污染整批料、错失回收目标,或引发与供应商的付款纠纷。随着工厂
  增加提炼产能,毛利率越来越取决于能多快、多准地把混合电池废料变成可预测的金属
  产出,而不是取决于铭牌吞吐量。
targetUser:
  primary: "正在调试首条商业化锂电池提炼线、负责锂、钴、镍、石墨回收的印度电池回收商 COO 或工厂运营负责人"
  secondary: "把周期性废料批次卖给国内回收商的电池制造商商业化原料经理"
  buyer: "电池回收商的 COO、运营副总裁或商务负责人"
startupThesis:
  nonObviousInsight: >-
    电池回收的下一个瓶颈不是更多的湿法冶金专利,而是混合电池废料和提炼线之间的
    运营与商务层。一旦回收商同时处理制造废料和报废电池组,每一批入库货物都像
    一笔回收价值不确定的小型大宗商品仓位。谁能掌控批次级产率预测、分流和结算,
    谁就能赢——而不只是掌控冶金技术。
  beachhead: "正在调试首条商业化锂电池提炼线、同时处理电芯制造废料和合同报废电池批次的印度电池回收商"
  wedge: "一套批次入库与产率控制系统——对入库批次分类、推荐取样和分流路线、预测回收金属产出,并将供应商结算与实际化验结果核对"
  whyNowCatalyst: >-
    BatX 正用新一轮 Series A 资金扩大报废电池和制造废料两端的回收与提炼产能,
    这让可变原料的管控立刻从后台琐事变成迫在眉睫的瓶颈。
  ventureScalePath: >-
    先做回收商入库和产率管控的操作系统,再向上游拓展到废料生产商采购,向下游拓展到
    再生材料认证、承购合同、融资服务,最终打造二级关键矿物交易市场。
solution: >-
  产品是面向电池回收商的批次入库与产率控制系统。操作人员上传供应商清单、化学成分
  提示、拆解记录和实验室样本数据;系统推荐取样深度、预处理步骤,以及该批货应由
  哪条提炼线处理。它按批次预测可回收的锂、钴、镍、石墨产量,再把预测值与回收后的
  实际化验结果对比,持续改进定价和分流决策。商务团队用同一份记录生成供应商结算单
  和营运资金视图,不再需要手工核对 Excel 表格、ERP 导出数据和实验室邮件。随着时间
  推移,公司会积累一套专有的"输入到输出"数据集,可以支撑融资、承购合同和下游
  认证产品。
