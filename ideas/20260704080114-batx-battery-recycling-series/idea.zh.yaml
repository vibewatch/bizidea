differentiator: >-
  通用 ERP、LIMS 和金属交易工具止步于库存或实验室记录;它们不会告诉回收商某一批
  具体的混合原料在某条产线上到底能产出多少,也不会告诉他们这该如何改变供应商定价。
  这家公司从批次分类做起,一路闭环到有化验依据的结算,由此构建出一套连接原料构成、
  污染状况、分流选择和回收金属产出的专有数据集。这套数据集就是更好定价、更快
  营运资金周转,以及点解决方案做不到的下游再生材料认证的基础。
