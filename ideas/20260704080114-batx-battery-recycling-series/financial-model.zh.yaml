slug: battery-feedstock-yield-os
date: '2026-07-04'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[business-plan.yaml date] 计划日期为 2026-07-04,模型从同一个执行月份起算。'
- id: A2
  name: 种子轮完成后期初现金
  value: '1500'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd $1.5-3M] 基准情景采用所述种子轮区间的低端,因为招聘按里程碑门槛推进,市场也较为集中。'
- id: A3
  name: 收入单位
  value: 一家按年费加用量计费的付费工厂客户/精炼产线
  unit: definition
  source: '[business-plan.yaml gtm.pricing; businessModel.revenueStreams] 收入按每个付费工厂部署建模,包含订阅、使用量和结算模块的组合。'
- id: A4
  name: 稳态混合 ACV
  value: '300'
  unit: USDK/plant-year
  source: '[business-plan.yaml gtm.pricing; research.yaml market.som; bottomUpSizingDrivers] 计划和调研都把成熟工厂合同锚定在每年约 $300K。'
- id: A5
  name: Y1 每个活跃付费工厂的实际收入
  value: M7-M8 $12K/mo; M9-M10 $14K/mo; M11-M12 $16K/mo
  unit: USDK/plant-month
  source: '[business-plan.yaml investorMemo.firstCustomer.initialContract] 试点起步价低或免费,在前两个处理周期内向生产定价过渡。'
- id: A6
  name: Y2 每个活跃付费工厂的实际收入
  value: Q1Y2 $55K; Q2Y2 $55K; Q3Y2 $60K; Q4Y2 $65K
  unit: USDK/plant-quarter
  source: '[business-plan.yaml milestones 12-24 months; research.yaml willingnessToPay] 第 2 年假设前 5 个付费工厂已上线,但使用量和溢价模块渗透仍在爬坡。'
- id: A7
  name: Y3 每个活跃付费工厂的实际收入
  value: Q1Y3 $70K; Q2Y3 $72K; Q3Y3-Q4Y3 $75K
  unit: USDK/plant-quarter
  source: '[business-plan.yaml milestones 24-36 months; research.yaml market.som] 退出定价在第 3 年达到调研得到的约 $300K 年度混合价值。'
- id: A8
  name: Y1 付费工厂路径
  value: 'M1-M6: 0; M7-M8: 1; M9-M11: 2; M12: 3'
  unit: customersEop
  source: '[business-plan.yaml milestones 0-12 months; experimentRoadmap 6-12 months] 计划预期在 3-5 个共创客户试点之后,第 12 个月能有 2-3 个转为付费。'
- id: A9
  name: Y2-Y3 付费工厂路径
  value: Q1Y2 4; Q2Y2 4; Q3Y2 5; Q4Y2 5; Q1Y3 6; Q2Y3 6; Q3Y3 7; Q4Y3 7
  unit: customersEop
  source: '[business-plan.yaml milestones 12-24 months and 24-36 months; research.yaml market.som] 基准情景在第 24 个月达到 5 个付费工厂,到第 3 年退出时达到调研得到的 7 家滩头工厂。'
- id: A10
  name: 收入确认时点
  value: 按每月或每季度期间内的平均客户数计算
  unit: policy
  source: '[创业金融启发] 假设新工厂在周期内均匀落地,而不是第一天就全部到位。'
- id: A11
  name: 服务交付成本路径
  value: Y1 付费月份占收入 28-30%；Y2 22-24%；Y3 19-20%
  unit: percent of revenue
  source: '[business-plan.yaml operations; risks; targetGrossMarginPct 75] 早期部署实施投入较重,随着化验、分流和结算工作流模板化,毛利率逐步改善。'
- id: A12
  name: 实施类薪酬分摊
  value: 45% COGS / 20% S&M / 35% G&A
  unit: allocation
  source: '[business-plan.yaml team Implementation / customer success engineer; operations] 引导上线的人力投入直接支撑交付、参照案例和客户管理。'
- id: A13
  name: 长期毛利率目标
  value: '75'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] 模型只在第 3 年后期才对齐计划所述的目标毛利率。'
- id: A14
  name: 创始人 / 商务负责人薪酬(含负担)
  value: '150'
  unit: USDK/year
  source: '[创业金融启发:印度种子阶段工业 SaaS 领导层薪酬;business-plan.yaml team 中的创始人/领域专家商务负责人岗位] 创始人现金薪酬保持精简,但包含各项负担成本。'
- id: A15
  name: 工程岗薪酬(含负担)
  value: '125'
  unit: USDK/year/FTE
  source: '[创业金融启发:印度种子阶段应用软件工程师薪酬;business-plan.yaml team 中的创始工程师岗位] 对应资深产品与集成工程师水平,但不到美国大厂现金薪酬水平。'
- id: A16
  name: 应用数据科学家薪酬(含负担)
  value: '135'
  unit: USDK/year/FTE
  source: '[创业金融启发,锚定于 business-plan.yaml team 中的应用数据科学家岗位] 产率建模人才定价略高于核心工程岗,因为化学成分专属数据稀缺。'
- id: A17
  name: 实施 / 客户成功薪酬(含负担)
  value: '90'
  unit: USDK/year/FTE
  source: '[创业金融启发,锚定于 business-plan.yaml team 中的实施/客户成功工程师岗位] 需要现场投入较重的引导上线人才,但薪酬低于核心建模岗位。'
- id: A18
  name: 商务 / 销售薪酬(含负担)
  value: '115'
  unit: USDK/year/FTE
  source: '[创业金融启发,锚定于 business-plan.yaml team 中的商务/销售岗位和 gtm.channels] 包含差旅和与调试时机挂钩的企业级销售浮动薪酬。'
- id: A19
  name: G&A / 运营薪酬(含负担)
  value: '70'
  unit: USDK/year/FTE
  source: '[创业金融启发,锚定于 business-plan.yaml operations] 精简的财务和供应商管理支持,只在团队达到 6+ 全职人力后才增加。'
- id: A20
  name: 招聘节奏
  value: 第 1 个月招创始人和创始工程师；第 5 个月招应用数据科学家;第 7 个月招实施/客户成功;第 10 个月招商务/销售;第 15 个月招第二名工程师;第 19 个月招运营;第 31 个月招第二名实施岗
  unit: timing
  source: '[business-plan.yaml team; strategicChoices.sequencingRationale] 招聘跟着验证里程碑走,GTM 和支持岗位只在有了第一批参照客户之后才增加。'
- id: A21
  name: 职能薪酬分摊
  value: Founder 75% S&M / 25% G&A; engineering 100% R&D; data scientist 100% R&D; sales 100% S&M; ops 100% G&A
  unit: allocation
  source: '[business-plan.yaml team rationales; operations] 把薪酬映射到每个岗位实际服务的运营职能。'
- id: A22
  name: 非薪酬运营支出爬坡
  value: Y1 S&M $8K/mo + 5% of revenue, R&D $7K/mo, G&A $6K/mo; Y2 S&M $10K/mo + 6% of revenue, R&D $8K/mo, G&A $7K/mo; Y3 S&M $12K/mo + 6% of revenue, R&D $9K/mo, G&A $8K/mo
  unit: USDK/month
  source: '[创业金融启发,锚定于 business-plan.yaml operations、risks 和 fundingAsk.useOfFundsSummary] 覆盖工厂差旅、云服务、法务、数据接入、保险,以及实验室/仪器合作伙伴赋能。'
- id: A23
  name: 现金转换政策
  value: EBITDA 约等于经营现金变动
  unit: policy
  source: '[创业金融启发] 模型在种子阶段不考虑债务、税款、资本开支和重大营运资金波动。'
- id: A24
  name: 月流失率
  value: '2.0'
  unit: percent
  source: '[针对工业工作流 SaaS 的创业金融启发] 工厂级部署一旦上线应有较强粘性,但早期预算风险让留存假设保持保守。'
- id: A25
  name: CAC 计算口径
  value: 36 个月销售与市场费用总额除以 7 家付费工厂
  unit: formula
  source: '[使用基准情景利润表计算;business-plan.yaml gtm.channels] 集中式企业销售是对照创始人主导、差旅密集的完整 GTM 投入来衡量的。'
- id: A26
  name: 融资跑道目标
  value: '24'
  unit: months
  source: '[business-plan.yaml fundingAsk.runwayMonths 18 + financial-model rule 6-month buffer] 这一轮融资的规模要能撑过下一个验证节点,并留有缓冲现金。'
- id: A27
  name: 下一轮里程碑
  value: 到第 24 个月:5 家付费工厂、结算模块上线、一条化验实验室或仪器引荐渠道,以及一份签署的上下游范围界定协议
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; experimentRoadmap 12-18 months] 这是这轮融资要达到的验证成果包。'
- id: A28
  name: 基准销售周期
  value: 从首次认真的工厂洽谈到签约付费合同约需 6 个月
  unit: months
  source: '[business-plan.yaml strategyMap.killCriteria sales cycle >9 months is failure; gtm.funnelTargets] 模型假设基准情景明显优于止损标准,但仍属于企业级销售周期长度。'
- id: A29
  name: 资金用途分配
  value: 40% engineering / 25% GTM / 10% G&A / 25% six-month buffer
  unit: allocation
  source: '[business-plan.yaml fundingAsk.useOfFundsSummary + model cash curve] 大部分现金投向产品、交付和创始人主导销售,并特意保留里程碑后的储备金。'
