scenarios:
  downside:
    description: 预算审批放缓,到第 3 年第 4 季度只有 5 家工厂在付费,订阅加使用量的价值上限低于调研得到的 $300K ACV。
    y3RevenueK: 1230.5
    y3EbitdaK: -310.6
    cashLowPointK: -102.3
    keyAssumptionChanges:
    - 第 3 年第 4 季度末停在 5 个付费工厂,而不是 7 个。
    - 实际年度价值退出时接近每工厂约 $280K,而不是约 $300K。
    - 服务交付成本保持在偏高的几个百分点,因为引导上线和化验核对仍然更依赖定制化处理。
  base:
    description: 共创客户在两个处理周期内转化,第 3 年退出达到 7 个付费工厂,每工厂混合年度价值达到调研得到的约 $300K 水平。
    y3RevenueK: 1829.5
    y3EbitdaK: 160.7
    cashLowPointK: 558.9
    keyAssumptionChanges:
    - 第 12 个月 3 个付费工厂,第 2 年第 4 季度 5 个,第 3 年第 4 季度 7 个。
    - 实际定价从第 1 年偏向试点的收入,逐步升到第 3 年后期约 $300K 的年度混合价值。
    - 招聘持续按里程碑门槛推进,第二位实施岗位人员要等到第 3 年扩张迹象明显后才增加。
  upside:
    description: 参照客户转化更快,一个拓展部署落地,公司达到 8 个创收工厂或产线,溢价模块渗透率更好。
    y3RevenueK: 2132.0
    y3EbitdaK: 428.7
    cashLowPointK: 710.7
    keyAssumptionChanges:
    - 第 3 年第 4 季度末达到 8 个付费工厂或产线,而不是 7 个。
    - 由于结算和报告模块更早渗透,混合年度价值退出时接近约 $325K。
    - 因为可复制的引导上线打法在第 2 年中期就已成型,服务交付成本下降更快。
sensitivity:
- variable: ARPU(单客户平均年度价值)
  downsideCase: 退出年度价值停滞在每工厂约 $270K 附近。
  baseCase: 退出年度价值达到每工厂约 $300K。
  upsideCase: 由于使用量和模块渗透更强,退出年度价值达到约 $325K。
  y3RevenueImpactK: -182.9
  cashImpactK: -217.0
- variable: CAC(获客成本)
  downsideCase: 差旅密集的创始人主导销售加上引荐乏力,把 CAC 推高到约 $190K。
  baseCase: 在集中式调试销售下,CAC 维持在约 $169.7K。
  upsideCase: 热情引荐和实验室伙伴让 CAC 保持在约 $155K 附近。
  y3RevenueImpactK: 0.0
  cashImpactK: -125.5
- variable: 流失率
  downsideCase: 如果工作流在调试后显得可有可无,月流失率升向 3.0%。
  baseCase: 一旦结算记录嵌入日常运营,月流失率维持在 2.0%。
  upsideCase: 因为有化验依据的记录变成了系统记录级基础设施,月流失率维持在约 1.5%。
  y3RevenueImpactK: -183.5
  cashImpactK: -137.0
- variable: 销售周期
  downsideCase: 工厂预算审批从首次接触到签约拉长到 9 个月。
  baseCase: 基准情景假设与调试挂钩的销售周期约为 6 个月。
  upsideCase: 参照工厂把周期压缩到 4-5 个月。
  y3RevenueImpactK: -146.0
  cashImpactK: -233.9
- variable: 毛利率
  downsideCase: 因为引导上线和化验工作流仍偏定制化,退出毛利率停滞在约 72%。
  baseCase: 退出毛利率达到商业计划目标的约 75%。
  upsideCase: 随着打法和集成更快标准化,退出毛利率达到约 77%。
  y3RevenueImpactK: 0.0
  cashImpactK: -89.5
- variable: 招聘节奏
  downsideCase: 第二位工程师、运营支持和第二位实施岗位人员,在里程碑验证完成之前就被提前招入。
  baseCase: 扩招要等到前 5 个付费工厂到位、实施工作量明显之后才启动。
  upsideCase: 随着引导上线更加可复制,后置的扩招仍然能支撑增长。
  y3RevenueImpactK: 0.0
  cashImpactK: -93.8
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Trigger[Line commissioning trigger] --> DesignPartners[Design partner pilots]
      DesignPartners --> PaidPlants[Paying plants]
      PaidPlants --> Premium[Settlement and reporting module]
      Premium --> Revenue[Subscription plus usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自把第 12 个月的 3 个付费工厂,转化为第 3 年第 4 季度的 7 个,同时每工厂年度价值从偏向试点的定价升向调研得到的约 $300K 退出水平。
- checkName: 必须做对的事
  finding: 至少要有 2-3 个共创客户在大约两个处理周期内转化为付费,公司才能在这个只有 7 个客户名额的小滩头市场耗尽之前,拿到参照工厂案例。
- checkName: 模型会在何种情况下失灵
  finding: 如果销售周期拉长到接近 9 个月,或实际 ACV 停留在接近 $280K,下行情景会在证明相邻拓展之前,把现金烧到零以下约 $0.1M。
- checkName: 下一轮融资的验证依据
  finding: 到第 24 个月左右,只要拿到 5 个付费工厂、一个已上线的结算模块、一条引荐渠道和一份已签的相邻产品拓展范围协议,下一轮融资就站得住脚。
sanityChecks:
  ruleOf40: 第 3 年增长率 81.6% + EBITDA 利润率 8.8% = 90.4%
  burnMultiple: 第 2 年烧钱倍数约为 0.5 倍,以约 $0.34M 的 EBITDA 消耗对照约 $0.72M 的净新增 ARR;基准情景在第 3 年第 2 季度转为 EBITDA 转正。
  revenuePerFte: 第 3 年末 8 名全职员工对应人均收入 $229K(工业软件基准为 $200-400K)
  flags:
  - 第 3 年基准情景仍落在调研得到的约 $2.1M SOM 之内,因此风险投资级的上行空间依赖于上游或下游相邻产品,而不能只靠回收商滩头市场本身。
  - 由于每一单都是集中式、与调试时机挂钩的企业销售,混合 CAC 的绝对金额偏高;引荐渠道疲软会迅速拖慢回本速度。
  - 只有当实施和化验核对工作在第 2 年后期变得更加模板化,而不是逐工厂地保持服务密集,毛利率才能达到 75% 的目标。
  - 人均收入落在软件基准的低端,因为现场实施和工业数据集成让这个模式比纯 SaaS 更"重交付"。
  - 现金按 EBITDA 建模,因此预付差旅、实验室集成的现金时点差异,或意外资本开支都会压缩看得见的缓冲现金。
