competitors:
- name: Recykal
  stage: scale-up
  wedge: 面向注册、报告、回收目标和积分的电池 EPR 与循环经济工作流。
  pricing: Custom enterprise / service pricing
  strength: 非常契合印度合规、EPR 数据和生产商-回收商协同需求。
  weaknessVsUs: 不掌控回收商内部的产线分流、回收金属预测或有化验依据的结算逻辑。
  sourceRefs:
  - 4
  - 28
- name: Circulor
  stage: scale-up
  wedge: 面向受监管电池价值链的电池护照、供应链可追溯性和尽职调查证据。
  pricing: Custom enterprise subscription
  strength: 监管定位很强,对护照和再生成分数据需求给出了产品化的解决方案。
  weaknessVsUs: 运作在工厂车间之上;它不是决定取样深度、路线选择或回收后供应商付款的系统。
  sourceRefs:
  - 8
  - 29
  - 35
- name: Circunomics
  stage: scale-up
  wedge: 面向电池资产、回收商和护照就绪交易的数字交易市场与生命周期管理。
  pricing: Custom platform pricing
  strength: 把化学成分、物流和交易市场数据标准化,能拓宽回收商的采购和销售网络。
  weaknessVsUs: 止步于工厂级产率管控,做不到与实际回收产出的结算核对。
  sourceRefs:
  - 29
  - 30
- name: Thermo Fisher SampleManager LIMS
  stage: incumbent
  wedge: 面向先进电池运营的实验室信息化、可追溯性和仪器联通。
  pricing: Custom enterprise LIMS subscription
  strength: 处理严肃电池运营已经很看重的样本可追溯性、数据完整性和分析基础设施。
  weaknessVsUs: 它是一套实验室和质量系统,不是负责批次定价、分流和付款的回收商原生商务操作系统。
  sourceRefs:
  - 16
  - 17
- name: In-house spreadsheet + EPR/LIMS stack
  stage: incumbent
  wedge: 由 Excel 表格、实验室报告、EPR 工作流和操作员经验法则搭建的人工管控层。
  pricing: Existing software plus internal labor
  strength: 已经嵌入日常运营、灵活,且不需要走新供应商审批流程。
  weaknessVsUs: 一旦化学成分波动、付款争议和可审计分流决策需要一份单一闭环记录时,就会失灵。
  sourceRefs:
  - 5
  - 17
  - 18
  - 31
