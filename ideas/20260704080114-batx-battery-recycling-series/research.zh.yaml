    severity: high
    affectedBuyer: 工厂运营负责人
    mitigation: 先建立严格的取样规程、化学成分置信区间和实验室集成,而不是第一天就承诺全自动分流。
    sourceRefs:
    - 18
    - 20
    - 23
    - 24
  - friction: 商务团队可能抵触把模型输出用于供应商定价和付款
    severity: high
    affectedBuyer: COO 或商务负责人
    mitigation: 在按化学成分证明预测对实际的表现之前,始终保留独立化验核对和人工审批环节。
    sourceRefs:
    - 27
    - 31
    - 32
  - friction: 数据分散在 CPCB 工作流、实验室系统和 Excel 表格之间
    severity: medium
    affectedBuyer: 运营系统负责人
    mitigation: 先与现有 EPR 和 LIMS 体系并肩落地,等数据连续性得到证明后再向更深的 ERP 或结算替代拓展。
    sourceRefs:
    - 4
    - 5
    - 17
    - 28
  - friction: 原料供应和黑粉价格的变化速度可能快于工厂重新训练运营规则的速度
    severity: medium
    affectedBuyer: CFO 或工厂总经理
    mitigation: 使用按化学成分定制的分流模板,并结合采购和价格信号频繁重新校准模型。
    sourceRefs:
    - 25
    - 27
    - 32
