slug: battery-feedstock-yield-os
date: '2026-07-04'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[business-plan.yaml date] the plan is dated 2026-07-04 and the model starts in the same execution month.'
- id: A2
  name: Opening cash after seed close
  value: '1500'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd $1.5-3M] the base case uses the low end of the stated seed range because hiring stays milestone-gated and the market is concentrated.'
- id: A3
  name: Revenue unit
  value: One paying plant logo / refining line on annual-plus-usage terms
  unit: definition
  source: '[business-plan.yaml gtm.pricing; businessModel.revenueStreams] revenue is modeled per paying plant deployment, with subscription, usage, and settlement-module mix.'
- id: A4
  name: Steady-state blended ACV
  value: '300'
  unit: USDK/plant-year
  source: '[business-plan.yaml gtm.pricing; research.yaml market.som; bottomUpSizingDrivers] both the plan and research anchor the mature plant contract at about $300K per year.'
- id: A5
  name: Y1 realized revenue per active paying plant
  value: M7-M8 $12K/mo; M9-M10 $14K/mo; M11-M12 $16K/mo
  unit: USDK/plant-month
  source: '[business-plan.yaml investorMemo.firstCustomer.initialContract] pilots start low-paid or waived and convert toward production pricing over the first two processing cycles.'
- id: A6
  name: Y2 realized revenue per active paying plant
  value: Q1Y2 $55K; Q2Y2 $55K; Q3Y2 $60K; Q4Y2 $65K
  unit: USDK/plant-quarter
  source: '[business-plan.yaml milestones 12-24 months; research.yaml willingnessToPay] year 2 assumes the first 5 paying plants are live but still ramping usage and premium-module attach.'
- id: A7
  name: Y3 realized revenue per active paying plant
  value: Q1Y3 $70K; Q2Y3 $72K; Q3Y3-Q4Y3 $75K
  unit: USDK/plant-quarter
  source: '[business-plan.yaml milestones 24-36 months; research.yaml market.som] exit pricing reaches the researched ~$300K annual blended value by year 3.'
- id: A8
  name: Y1 paying-plant path
  value: 'M1-M6: 0; M7-M8: 1; M9-M11: 2; M12: 3'
  unit: customersEop
  source: '[business-plan.yaml milestones 0-12 months; experimentRoadmap 6-12 months] the plan expects 2-3 paid conversions by month 12 after 3-5 design-partner pilots.'
- id: A9
  name: Y2-Y3 paying-plant path
  value: Q1Y2 4; Q2Y2 4; Q3Y2 5; Q4Y2 5; Q1Y3 6; Q2Y3 6; Q3Y3 7; Q4Y3 7
  unit: customersEop
  source: '[business-plan.yaml milestones 12-24 months and 24-36 months; research.yaml market.som] base case reaches 5 paying plants by month 24 and the researched 7-plant beachhead by year 3 exit.'
- id: A10
  name: Revenue recognition timing
  value: Midpoint customer count within each month or quarter
  unit: policy
  source: '[startup-finance heuristic] new plants are assumed to land evenly through the period instead of on day one.'
- id: A11
  name: Service-delivery cost path
  value: Y1 paid months 28-30% of revenue; Y2 22-24%; Y3 19-20%
  unit: percent of revenue
  source: '[business-plan.yaml operations; risks; targetGrossMarginPct 75] early deployments are implementation-heavy, then margin improves as assay, routing, and settlement workflows template out.'
- id: A12
  name: Implementation payroll allocation
  value: 45% COGS / 20% S&M / 35% G&A
  unit: allocation
  source: '[business-plan.yaml team Implementation / customer success engineer; operations] onboarding labor directly supports delivery, references, and account administration.'
- id: A13
  name: Long-term gross margin target
  value: '75'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] the model is underwritten to the plan’s stated target only by late year 3.'
- id: A14
  name: Founder / commercial lead loaded compensation
  value: '150'
  unit: USDK/year
  source: '[startup-finance heuristic: India seed-stage industrial SaaS leadership pay; business-plan.yaml team Founder / domain-expert commercial lead] founder cash pay stays lean but includes burden.'
- id: A15
  name: Engineering loaded compensation
  value: '125'
  unit: USDK/year/FTE
  source: '[startup-finance heuristic: India seed-stage applied software engineering pay; business-plan.yaml team Founding engineer] reflects senior product and integration engineering without US big-tech cash levels.'
- id: A16
  name: Applied data scientist loaded compensation
  value: '135'
  unit: USDK/year/FTE
  source: '[startup-finance heuristic anchored to business-plan.yaml team Applied data scientist] yield-modeling talent prices slightly above core engineering because chemistry-specific data is scarce.'
- id: A17
  name: Implementation / customer success loaded compensation
  value: '90'
  unit: USDK/year/FTE
  source: '[startup-finance heuristic anchored to business-plan.yaml team Implementation / customer success engineer] field-heavy onboarding talent is needed but remains below core modeling hires.'
- id: A18
  name: Commercial / sales loaded compensation
  value: '115'
  unit: USDK/year/FTE
  source: '[startup-finance heuristic anchored to business-plan.yaml team Commercial / sales hire and gtm.channels] includes travel and variable compensation for commissioning-timed enterprise sales.'
- id: A19
  name: G&A / ops loaded compensation
  value: '70'
  unit: USDK/year/FTE
  source: '[startup-finance heuristic anchored to business-plan.yaml operations] lean finance and vendor management support is added only after the team reaches 6+ FTE.'
- id: A20
  name: Hiring cadence
  value: M1 founder and founding engineer; M5 applied data scientist; M7 implementation / customer success; M10 commercial / sales; M15 second engineer; M19 ops; M31 second implementation hire
  unit: timing
  source: '[business-plan.yaml team; strategicChoices.sequencingRationale] hiring follows proof milestones, with GTM and support added only after the first reference customers exist.'
- id: A21
  name: Functional payroll allocation
  value: Founder 75% S&M / 25% G&A; engineering 100% R&D; data scientist 100% R&D; sales 100% S&M; ops 100% G&A
  unit: allocation
  source: '[business-plan.yaml team rationales; operations] maps payroll into the operating functions each role actually serves.'
- id: A22
  name: Non-payroll opex ramp
  value: Y1 S&M $8K/mo + 5% of revenue, R&D $7K/mo, G&A $6K/mo; Y2 S&M $10K/mo + 6% of revenue, R&D $8K/mo, G&A $7K/mo; Y3 S&M $12K/mo + 6% of revenue, R&D $9K/mo, G&A $8K/mo
  unit: USDK/month
  source: '[startup-finance heuristic anchored to business-plan.yaml operations, risks, and fundingAsk.useOfFundsSummary] covers plant travel, cloud, legal, data ingestion, insurance, and lab / instrument partner enablement.'
- id: A23
  name: Cash conversion policy
  value: EBITDA approximates operating cash movement
  unit: policy
  source: '[startup-finance heuristic] the model excludes debt, taxes, capex, and material working-capital swings at seed stage.'
- id: A24
  name: Monthly churn
  value: '2.0'
  unit: percent
  source: '[startup-finance heuristic for industrial workflow SaaS] plant-level deployments should be sticky after go-live, but early budget risk keeps retention assumptions conservative.'
- id: A25
  name: CAC convention
  value: Total 36-month sales and marketing spend divided by 7 paying plants
  unit: formula
  source: '[model calculation using base-case P&L; business-plan.yaml gtm.channels] concentrated enterprise selling is measured against the full founder-led and travel-heavy GTM buildout.'
- id: A26
  name: Funding runway target
  value: '24'
  unit: months
  source: '[business-plan.yaml fundingAsk.runwayMonths 18 + financial-model rule 6-month buffer] the round is sized to carry the plan through the next proof point and still leave buffer cash.'
- id: A27
  name: Next-round milestone
  value: 5 paying plants, live settlement module, one assay-lab or instrument referral channel, and one signed upstream/downstream scoping agreement by month 24
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; experimentRoadmap 12-18 months] this is the proof package the round is sized to reach.'
- id: A28
  name: Base sales cycle
  value: About 6 months from first serious plant conversation to paid contract
  unit: months
  source: '[business-plan.yaml strategyMap.killCriteria sales cycle >9 months is failure; gtm.funnelTargets] the model assumes the base case is meaningfully better than the kill criterion but still enterprise-length.'
- id: A29
  name: Use-of-funds split
  value: 40% engineering / 25% GTM / 10% G&A / 25% six-month buffer
  unit: allocation
  source: '[business-plan.yaml fundingAsk.useOfFundsSummary + model cash curve] most cash goes to product, delivery, and founder-led selling, with a deliberate post-milestone reserve.'
