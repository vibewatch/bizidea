scenarios:
  downside:
    description: Budget approval slips, only 5 plants are paying by Q4Y3, and subscription-plus-usage value tops out below the researched $300K ACV.
    y3RevenueK: 1230.5
    y3EbitdaK: -310.6
    cashLowPointK: -102.3
    keyAssumptionChanges:
    - Q4Y3 ends at 5 paying plants instead of 7.
    - Realized annual value exits closer to about $280K per plant instead of about $300K.
    - Service-delivery cost stays a few points higher because onboarding and assay reconciliation remain more bespoke.
  base:
    description: Design partners convert within two processing cycles, year-3 exit reaches 7 paying plants, and blended annual value per plant reaches the researched ~$300K level.
    y3RevenueK: 1829.5
    y3EbitdaK: 160.7
    cashLowPointK: 558.9
    keyAssumptionChanges:
    - 3 paying plants by M12, 5 by Q4Y2, and 7 by Q4Y3.
    - Realized pricing steps from pilot-heavy Y1 revenue to about $300K annual blended value by late Y3.
    - Hiring remains milestone-gated and does not add a second implementation hire until year 3 expansion is visible.
  upside:
    description: Reference customers convert faster, one expansion deployment lands, and the company reaches 8 revenue-generating plants or lines with better premium-module attach.
    y3RevenueK: 2132.0
    y3EbitdaK: 428.7
    cashLowPointK: 710.7
    keyAssumptionChanges:
    - Q4Y3 ends at 8 paying plants or lines instead of 7.
    - Blended annual value exits closer to about $325K as settlement and reporting modules attach sooner.
    - Service-delivery cost drops faster because repeatable onboarding playbooks emerge by mid-Y2.
sensitivity:
- variable: ARPU
  downsideCase: Exit annual value stalls near $270K per plant.
  baseCase: Exit annual value reaches about $300K per plant.
  upsideCase: Exit annual value reaches about $325K with stronger usage and module attach.
  y3RevenueImpactK: -182.9
  cashImpactK: -217.0
- variable: CAC
  downsideCase: Travel-heavy founder-led selling and weak referrals push CAC toward about $190K.
  baseCase: CAC stays near $169.7K with concentrated commissioning sales.
  upsideCase: Warm intros and lab partners hold CAC closer to about $155K.
  y3RevenueImpactK: 0.0
  cashImpactK: -125.5
- variable: churn
  downsideCase: Monthly churn rises toward 3.0% if the workflow feels discretionary after commissioning.
  baseCase: Monthly churn holds at 2.0% once settlement records are embedded.
  upsideCase: Monthly churn stays near 1.5% because the assay-backed record becomes system-of-record infrastructure.
  y3RevenueImpactK: -183.5
  cashImpactK: -137.0
- variable: sales cycle
  downsideCase: Plant budget conversion stretches toward 9 months from first contact to paid contract.
  baseCase: The base case assumes about a 6-month commissioning-linked sales cycle.
  upsideCase: Reference plants compress the cycle toward 4-5 months.
  y3RevenueImpactK: -146.0
  cashImpactK: -233.9
- variable: gross margin
  downsideCase: Exit gross margin stalls around 72% because onboarding and assay workflows remain bespoke.
  baseCase: Exit gross margin reaches the BP target of about 75%.
  upsideCase: Exit gross margin reaches about 77% as playbooks and integrations standardize faster.
  y3RevenueImpactK: 0.0
  cashImpactK: -89.5
- variable: hiring pace
  downsideCase: The second engineer, ops support, and second implementation hire are pulled forward before milestone proof is complete.
  baseCase: Scale hires wait until after the first 5 paying plants and visible implementation load.
  upsideCase: Later scale hires still support growth because onboarding becomes more repeatable.
  y3RevenueImpactK: 0.0
  cashImpactK: -93.8
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Trigger[Line commissioning trigger] --> DesignPartners[Design partner pilots]
      DesignPartners --> PaidPlants[Paying plants]
      PaidPlants --> Premium[Settlement and reporting module]
      Premium --> Revenue[Subscription plus usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue comes from converting 3 paid plants by M12 into 7 by Q4Y3 while annual value per plant rises from pilot-heavy pricing toward the researched ~$300K exit level.
- checkName: Must go right
  finding: At least 2-3 design partners must convert within roughly two processing cycles so the company has reference plants before the small 7-logo beachhead is exhausted.
- checkName: Model breaks if
  finding: If sales cycles stretch toward 9 months or realized ACV stays closer to $280K, the downside case takes cash roughly $0.1M below zero before adjacent expansion is proven.
- checkName: Next-round proof
  finding: The next raise is justified once 5 paying plants, a live settlement module, one referral channel, and one signed adjacent-product scope are in hand by about month 24.
sanityChecks:
  ruleOf40: Y3 growth 81.6% + EBITDA margin 8.8% = 90.4%
  burnMultiple: Y2 burn multiple is about 0.5x using roughly $0.34M of EBITDA burn against about $0.72M of net new ARR; the base case turns EBITDA positive in Q2Y3.
  revenuePerFte: $229K Y3 on 8 ending FTE (benchmark $200-400K industrial SaaS)
  flags:
  - The year-3 base case still sits inside the researched ~$2.1M SOM, so venture-scale upside depends on adjacent upstream or downstream products rather than the recycler beachhead alone.
  - Blended CAC is high in absolute dollars because every win is a concentrated commissioning-timed enterprise sale; weak partner referrals would slow payback quickly.
  - Gross margin only reaches the 75% target if implementation and assay-reconciliation work becomes more templated by late Y2 rather than staying services-heavy plant by plant.
  - Revenue per FTE lands near the low end of software benchmarks because field implementation and industrial data integration make this a heavier-delivery model than pure SaaS.
  - Cash is modeled as EBITDA, so prepaid travel, lab-integration cash timing, or unexpected capex would reduce the visible buffer.
