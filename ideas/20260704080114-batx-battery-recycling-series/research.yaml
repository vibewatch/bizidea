  "validationPlan":
  - "priority": "high"
    "question": "What is the current variance between predicted and actual recovered lithium, nickel, cobalt, or graphite by lot and chemistry at target plants?"
    "evidenceToGather": "Lot-level manifests, pre-run sample data, route decisions, and post-run assay outcomes from 3-5 design partners."
  - "priority": "high"
    "question": "How long do supplier settlements take today, and what share of lots trigger commercial disputes after processing?"
    "evidenceToGather": "Settlement ledgers, dispute logs, and commercial reconciliation files from recycler feedstock teams."
  - "priority": "medium"
    "question": "Which incumbent system owns manifests, assays, and payouts today: EPR portal workflows, LIMS, ERP, or spreadsheets?"
    "evidenceToGather": "Current-state workflow maps plus screenshots or exports from LIMS, ERP, and CPCB-facing compliance processes."
  - "priority": "medium"
    "question": "How quickly is the beachhead shifting from consumer-electronics scrap toward EV and LFP-heavy feedstock, and does that change ROI?"
    "evidenceToGather": "Quarterly chemistry mix, supplier mix, and recovered-value breakdowns across early customers."
