"reportMemo":
  "executiveTakeaways":
  - "The wedge is not generic recycler ERP; it is the assay-backed operating layer between mixed feedstock intake and downstream metal recovery."
  - "India is timely because policy, visible plant expansion, and tighter traceability expectations are all moving at once."
  - "Budget credibility comes from existing pain in EPR reporting, lab workflows, supplier payouts, and yield volatility rather than from a speculative new software category."
  - "Competition is real but mostly adjacent: compliance platforms, battery-passport tools, marketplaces, and LIMS vendors cover pieces of the job without owning the full loop."
  - "Adoption risk is mostly about trust and integration into plant and commercial workflows, not about whether the underlying data science can be built."
  "marketDefinition": "India-first operating software for lithium-ion battery recyclers and refiners that must classify mixed incoming lots, choose sampling and routing paths, predict recovered metal output, and reconcile supplier payouts after assay."
  "customerAndBuyer": "Primary users are plant-operations leaders, metallurgy or lab teams, and commercial feedstock managers. The economic buyer is usually the COO, Head of Recycling Operations, or commercial lead because the workflow spans throughput, margin, and supplier settlements."
  "buyingTriggers":
  - "point": "A recycler commissions a new line or expands refining capacity, turning lot classification and routing from an ad hoc plant judgment into a repeatable operating problem."
    "sourceRefs":
    - 11
    - 12
    - 13
    - 14
    - 15
  - "point": "The operator has to satisfy EPR, reporting, marking, or battery-passport expectations and needs an auditable system of record across manifests, assays, and recycling outcomes."
    "sourceRefs":
