    - 32
  "competitiveLandscape": "Competition is fragmented across compliance and EPR platforms, battery-passport and traceability suites, battery marketplaces, LIMS and lab-informatics tools, and in-house spreadsheet stacks. The open gap is a recycler-native system of record that links incoming lot quality to routing decisions, recovered-metal forecasts, and supplier settlement after actual assay."
  "incumbentThesis":
  - "incumbentClass": "Compliance and EPR workflow platforms"
    "point": "These systems already help with registration, targets, and certificate workflows, but they do not decide what a mixed lot will yield on a specific line or how that should change supplier settlement."
    "sourceRefs":
    - 4
    - 5
    - 28
  - "incumbentClass": "Battery-passport and traceability suites"
    "point": "Passport vendors are strong on chain-of-custody, due diligence, and recycled-content evidence, but they are upstream of day-to-day intake triage, assay variance, and routing economics inside the recycler."
    "sourceRefs":
    - 7
    - 8
    - 29
    - 35
  - "incumbentClass": "Battery marketplaces and lifecycle platforms"
    "point": "Marketplace-style tools standardize battery data and connect sellers, owners, and recyclers, yet they stop short of plant-specific yield forecasting and reconciliation against recovered output."
    "sourceRefs":
    - 29
    - 30
  - "incumbentClass": "LIMS and lab informatics"
    "point": "Thermo-class tools handle traceability, sample integrity, and instrument connectivity, but they are not the commercial operating system for lot pricing, routing, and post-run settlement."
    "sourceRefs":
    - 16
    - 17
    - 31
  - "incumbentClass": "In-house spreadsheets and plant heuristics"
    "point": "Manual workflows remain flexible and familiar, but they fragment procurement, assay, and reporting data exactly where chemistry volatility and payout disputes make closed-loop learning most valuable."
    "sourceRefs":
    - 5
    - 17
    - 18
    - 31
    - 34
  "regulatoryLandscape": "Battery recyclers are moving from loose waste-handling workflows into a regime with centralized EPR registration, auditable reporting, explicit product markings, and growing lifecycle traceability expectations. For export-oriented or OEM-linked operators, EU battery rules and passport workstreams increase the value of granular, lot-level records that can survive buyer scrutiny."
  "technologyLandscape": "The enabling stack is already mature enough to build this product: automated sorting research, online elemental analysis, lab informatics, and passport-oriented data models all exist. What is missing is a recycler-native decision layer that turns those inputs into lot routing, yield forecasting, and settlement actions inside the plant."
