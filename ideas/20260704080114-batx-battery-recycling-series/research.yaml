    - 32
  "willingnessToPay":
    "summary": "Willingness to pay is credible because operators are already putting meaningful capital into recycling and refining capacity while black-mass pricing, assay accuracy, and procurement volatility directly affect yield economics and supplier settlements. The product can borrow budget from LIMS, compliance, and plant-operations workflows instead of asking for a purely experimental AI line item."
    "sourceRefs":
    - 11
    - 12
    - 13
    - 14
    - 17
