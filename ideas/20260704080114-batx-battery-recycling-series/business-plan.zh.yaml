slug: battery-feedstock-yield-os
date: '2026-07-04'
executiveSummary: >-
  电池原料产率操作系统是一套面向印度电池回收商的批次入库与产率控制系统,服务对象是正从中试
  走向商业化锂电池提炼规模的回收商。触发时机非常具体:回收商调试首条商业化提炼线,或签下第一批
  多供应商废料入库合同,突然就要每周对混合制造废料和报废电池组做定价、分流和付款决策——手上只有
  Excel 表格、实验室邮件和厂长的经验判断。这个切口刻意做窄:对入库批次分类,推荐取样深度和产线
  分流,预测可回收的锂、钴、镍、石墨,再把预测值与实际化验结果核对,用来结算供应商货款。竞对都
  站在这个闭环的外围——EPR/合规平台、电池护照套件、交易市场和 LIMS 供应商——但没有一家掌握工厂内部
  "预测对实际"和结算这条记录。已调研的市场是真实存在的,但滩头市场规模偏薄(TAM 约 $17.4M,SAM 约
  $5.4M,到第 3 年 SOM 约 $2.1M,对应约 7 个可触达的工厂客户),因此风险投资级的结果取决于公司能否
  用这些运营数据向上游拓展到废料生产商采购,向下游拓展到再生材料认证、承购和融资基础设施。
  头 12 个月的重点是与 3-5 个共创客户一起验证预测准确度和结算周期压缩,而不是拉多少客户数量。
  最大的悬而未决的风险是预算行为:正在扩大工厂资本开支的回收商可能把运营软件当作冶金人才招聘
  旁边的可有可无项,而稀缺的历史批次数据可能让早期预测噪声大到拖慢信任建立。
problem:
  - >-
    入库电池批次在化学成分、污染程度和单据完整性上千差万别,每一批都靠 Excel 表格、实验室邮件和
    厂长判断来人工取样、定价、分流——一次错误决策就可能污染整批料、错失回收目标,或引发供应商
    付款纠纷。
  - >-
    随着回收商为电芯制造废料和报废电池组同时增加提炼产能,毛利率越来越取决于混合废料能多快、
    多准地变成可预测、已结算的金属产出,而不是取决于铭牌吞吐量——这是一个通用 ERP、LIMS 和
    合规工具都解决不了的商务运营问题。
solution:
  - >-
    一套批次入库与产率控制系统,操作人员上传供应商清单、化学成分提示、拆解记录和实验室样本数据;
    系统推荐取样深度、预处理步骤,以及该批货该由哪条提炼线处理,在处理之前就预测可回收的锂、钴、
    镍、石墨产量。
  - >-
    一套闭环结算记录,把预测值与回收后的实际化验结果对比,持续改进定价和分流,商务团队直接用它
    生成供应商结算单,不必再手工核对 ERP 导出数据、实验室邮件和 Excel 表格。
whyWeWin:
  - >-
    公司掌握着把批次构成、分流选择和按化学成分划分的回收产出连接起来的"预测对实际"数据集——
    根据调研到的竞争格局,合规、护照、交易市场和 LIMS 这几类现有厂商每家都只碰到其中一小块。
  - >-
    分销搭的是已有预算对话的顺风车:销售发生在产线调试的关键节点,此时产率、批损和结算的痛点
    已经很尖锐,所以产品是从 LIMS、合规和工厂运营的预算项里借钱,而不是去推销一个全新的实验性
    软件品类。
strategicChoices:
  beachhead: >-
    正在调试首条商业化锂电池提炼线、同时从电池制造商(制造废料)和签约报废电池回收方(报废电池)
    引入周期性废料入库合同的印度电池回收商。
  wedgeRationale: >-
    批次入库、取样、分流和结算是一个范围窄、可衡量的工作流,买家明确(COO / 回收运营负责人),
    触发时机明确(新产线调试或首份多供应商合同),证明速度快(预测对实际的产率偏差、结算天数)。
    如果一开始就做得更宽——比如一个完整的回收商 ERP 或跨链电池护照平台——就得在公司还没有任何
    专有数据可以做区隔之前,正面硬刚资金更充裕的现有厂商。
  sequencingRationale: >-
    产品排序跟着钱走:先做入库分类和产率预测(这里批损风险最高、投资回报最容易证明),再做
    供应商结算和核对(这里藏着经常性收入和粘性),最后是核心数据集成型之后的跨工厂对标和
    上下游拓展。招聘也是同样的顺序——先是懂行业的创始人主导销售和一位做预测的数据科学家,
    等共创客户真正跑起真实批次之后才招实施/客户成功岗位,专职商务岗位则要等到有 2-3 个参照
    客户之后才招。
  notYet:
    - >-
      面向电池制造商的上游废料生产商采购工具——虽然诱人,因为它紧邻主业且在风险投资级路径中
      被提及,但在回收商侧的数据集和信任建立起来之前还为时过早。
    - >-
      下游承购合同、融资基础设施,或二级关键矿物交易市场——推迟到公司积累起多家工厂、
      有化验依据的结算历史,足以为这些产品的可信度背书之后再做。
    - >-
      非印度地理市场——滩头市场的论点依赖于一个具体、集中的正在扩大商业化产能的印度回收商群体;
      在这个群体饱和之前就扩张地理范围,会稀释共创客户带来的优势。
market:
  tam: "$17.4M(58 家符合印度计划资格的关键矿物回收商 × 估算约 $300k 的工厂软件年支出)"
  sam: "$5.4M(18 家聚焦电池的回收商/提炼商,约占有组织回收商上限的 30% × 约 $300k 年支出)"
  som: "$2.1M(到第 3 年 7 个工厂客户 × 约 $300k 年支出,与集中的客户群体和高触达式调试期销售一致)"
  segments:
    - "正在新增商业化锂电池回收与提炼产能的电池回收商(主要买家)"
    - "有周期性废料供应、需要透明回收商结算的电池制造商(次要买家,采购侧)"
  buyingProcess: >-
    经济买家通常是 COO、运营副总裁或回收运营负责人,销售发生在新产线投产或签下第一批多供应商
    废料合同的时刻;工厂运营和实验室/冶金团队是日常用户,负责在买家投入预算前验证预测结果。
product:
  mvp: >-
    一个批次入库工作台,接入供应商清单和实验室样本数据,对批次化学成分和污染风险分类,
    为一位共创客户工厂的单条提炼线推荐取样深度和产线分流。
  sixMonth: >-
    按批次预测可回收的锂、钴、镍、石墨,并在 3-5 家共创客户工厂之间闭环——把预测值与回收后
    实际化验结果对比,模型数据稀缺阶段用人机协同的置信区间兜底。
  twelveMonth: >-
    上线供应商结算与核对模块(溢价层),让商务团队直接从平台生成有化验依据的付款,并在共创
    客户之外拿下第一批 2-3 个付费工厂客户合同。
  twentyFourMonth: >-
    在 5-7 家付费工厂之间交付跨工厂产率与结算对标,并与一个现有客户一起试点第一个上游
    (废料生产商采购)或下游(再生材料认证)拓展项目,进度由数据闭环成熟度而非日历时间决定。
  keyBets:
    - "即使从稀缺的历史数据起步,预测对实际的产率偏差也会在每家工厂 2-3 个处理周期内显著收窄。"
    - "结算周期压缩(关闭天数)本身就是一个足够有说服力的投资回报故事,足以支撑溢价模块的定价,不必依赖产率预测准确度。"
    - "只要采用人机协同、保守置信度的推行方式,共创客户愿意分享训练批次级模型所需的清单、取样和化验数据。"
gtm:
  wedge: >-
    在新提炼线调试或签下第一批多供应商废料合同的时刻,直接向回收商 COO/厂长销售,
    用一份有化验依据的入库到结算记录,取代 Excel 表格、实验室邮件和通用 ERP/LIMS 模块。
  channels:
    - "在产线调试期间,创始人主导直接向回收商 COO 和厂长销售"
    - "与运营闭环废料项目的电池制造商合作"
    - "来自化验实验室、分析仪器供应商和已经接触取样环节的 LIMS 供应商的引荐"
    - "来自投资人和背后支持新工厂产能的回收顾问的热情引荐(例如 BatX 的 Series A 投资人圈子)"
  funnelTargets: "线索到共创客户意向书 40-60%(集中的高触达客户群体);共创客户到付费工厂合同,2 个处理周期内 50% 以上"
  pricing: >-
    按工厂/提炼线收取年度软件订阅费,叠加按处理批次或吨位计费的使用费,供应商结算、审计留痕
    和下游买家报告的溢价模块单独定价——锚定调研得到的每工厂约 $300k 混合年度合同价值。
businessModel:
  revenueStreams:
    - "按工厂或提炼线收取的年度软件订阅费"
    - "按处理批次或吨位计费的使用费"
    - "供应商结算、审计留痕和下游买家/合规报告的溢价模块费用"
  unitOfValue: "一个经过分类、分流并完成化验核对的电池批次,流经该平台处理完毕"
  targetGrossMarginPct: 75
  expansionLevers:
    - "随着产能扩大,在现有回收商账户内新增提炼线和工厂"
    - "在核心入库/产率功能被采用后,追加销售供应商结算与核对溢价模块"
    - "与电池制造商合作伙伴一起拓展到上游废料生产商采购模块"
    - "数据密度足够后,把跨工厂产率与结算基准数据授权给下游买家或融资伙伴"
strategyMap:
  northStarMetric: "已上线预测对实际产率跟踪和有化验依据结算的工厂提炼线数量"
  inputMetrics:
    - "按化学成分划分的每批预测对实际回收金属偏差"
    - "关闭供应商结算所需天数,以及引发争议的批次占比"
    - "共创客户到付费合同的转化率"
    - "每家工厂模型置信区间收紧所需的处理周期数"
  moatsToBuild:
    - "连接批次构成、分流选择和按化学成分划分回收产出的专有预测对实际数据集"
    - "关于供应商质量、化验争议和结算结果的商务数据集,通用 LIMS/ERP 系统捕捉不到"
    - "跨工厂产率与滞留时间基准,随着更多回收商接入同一决策闭环而愈发难以复制"
  killCriteria:
    - "首批 5 个共创客户中,不足 2 个在试点启动 12 个月内转为付费合同"
    - "在 2 个以上工厂经过 3 个处理周期后,预测对实际偏差仍未出现可衡量的收窄趋势(即没有改善趋势)"
    - "从首次接触到签约的平均销售周期在 3 个以上潜在客户中超过 9 个月,说明软件预算假设有误"
  mermaid: |
    flowchart LR
      Wedge[Line-commissioning wedge] --> MVP[Lot intake + yield forecast MVP]
      MVP --> Proof[Forecast-vs-actual + settlement proof at design partners]
      Proof --> Expansion[Cross-plant expansion + upstream/downstream data products]
investorMemo:
  verdict:
    call: "观察"
    conviction: >-
      对于一个尚未验证产品市场契合度的交易而言,这个切口、买家和触发时机都刻画得异常清楚,
      但调研得到的滩头市场 TAM($17.4M)和 SOM($2.1M)对独立支撑一个风险投资级结果来说偏薄,
      整个论点很大程度上依赖一条尚未验证的扩张路径。
    whyBelieve: >-
      一个有名有资金的运营商群体(以 BatX 的 Series A 为首)正在扩大商业化提炼产能,
      这创造出一个具体、有时限的产线调试触发时机,以及一份集中的首批客户名单。
    whyDoubt: >-
      印度回收商这个核心市场规模不大(到第 3 年 SOM 约 $2.1M,覆盖约 7 家工厂),
      所以投资逻辑依赖于尚未验证的上下游拓展,而不能只靠已调研的这个切口。
    nextDiligence: >-
      在承诺种子轮之外的更多资金之前,先签下并落地跟踪 3-5 份共创客户意向书,
      实测真实的预测对实际偏差和结算周期压缩情况。
  firstCustomer:
    title: "正在调试首条商业化锂电池提炼线的印度电池回收商 COO / 回收运营负责人"
    profile: >-
      一家已经募集或投入资金新增提炼产能、同时正从电池制造商和报废电池回收方两端
      引入周期性废料入库合同的回收商。
    trigger: "新的回收/提炼线投产,或回收商签下第一批多供应商废料入库合同,必须开始每周做定价、分流和产率决策。"
    buyer: "COO、运营副总裁或回收运营负责人"
    initialContract: >-
      在一条提炼线上做共创客户试点(首个周期低价或免费),在 2 个处理周期内转为
      按工厂收取的年度订阅加使用费,目标是调研得到的约 $300k 混合年度合同价值。
  mustBeTrue:
    - "回收商在调试新产线时,会在同一财年周期内把可自由支配的软件预算和工厂资本开支、冶金人才招聘一起批出来。"
    - "即使从稀缺的历史批次数据起步,预测对实际的回收金属偏差也会在 2-3 个处理周期内显著收窄。"
    - "供应商结算周期和争议率今天就足够大(根据调研的 dataMoats 和 validationSignals),值得为溢价核对模块买单。"
    - "没有任何现有厂商(EPR 平台、电池护照套件、交易市场或 LIMS 供应商)能在头 18 个月内快速扩展到批次级分流和结算,从而封杀这个切口。"
    - "印度滩头市场群体(约 7 个可触达的工厂客户)足够大、也足够可参照,能在核心市场饱和之前支撑向上下游产品扩张。"
  diligenceQuestions:
    - "目标工厂目前按化学成分划分的预测对实际回收金属偏差是多少?怎么测出来的?"
    - "在 2-3 个已确定的潜在共创客户处,供应商结算今天要花多久,有多少比例的批次引发争议?"
    - "目标客户目前是哪套系统在掌管清单、化验和付款——LIMS、ERP、EPR 门户工作流,还是 Excel 表格?要取代它需要什么条件?"
    - "可触达的 7 家工厂 SOM 群体集中度如何?如果融资窗口期内实际调试商业化产线的工厂不足 5 家,模型会怎样?"
    - "风险投资级论点所依赖的上下游拓展,有什么可信的路径和证据?"
operatingAssumptions:
  - assumption: "回收商在调试新提炼线时,会把工厂运营软件当作同一次调试预算周期的一部分来出资,而不是推迟采购。"
    basis: "idea.yaml"
    validationTest: "跟踪 3-5 份共创客户意向书是否在试点启动的 2 个处理周期内转为付费合同。"
    decisionImpact: "如果预算转化失败,就把 GTM 打法改成仅按使用量付费、无预付费用的模式,并拉长融资额度里的销售周期假设。"
  - assumption: "预测置信度能从人机协同基线足够快地提升,让工厂在最初几个处理周期内就信任分流建议。"
    basis: "operator judgment"
    validationTest: "跟踪每个共创客户前 3 个处理周期的预测对实际偏差趋势线。"
    decisionImpact: "如果偏差没有收窄,就推迟结算/溢价模块,把更多投入放在实验室辅助基线准确度上,再销售分流自动化。"
  - assumption: "调研得到的每工厂约 $300k 混合年度合同价值,在印度本土回收商身上是可实现的,不需要大幅降价才能拿下最初的客户。"
    basis: "research.yaml"
    validationTest: "用前 3 份已签付费合同的实际金额,对照 $300k 的估算值做基准比对。"
    decisionImpact: "如果实际合同价值明显低于 $300k,就必须在募集更大一轮之前,向下修正 SAM/SOM 和资金跑道。"
  - assumption: "可触达的滩头市场真的局限于 3 年窗口期内约 7 个工厂客户,而不是一个未被计入的、由更多小型或非正规回收商组成的更大群体。"
    basis: "research.yaml"
    validationTest: "把 58 家符合计划资格的公司名单和 551 个 CPCB 注册记录做交叉核对,看有多少真正在运行具备多化学成分回收能力的商业化锂电池提炼线。"
    decisionImpact: "如果可触达数量明显更小,就要把上下游产品拓展提前到当前 24 个月里程碑之前来做。"
experimentRoadmap:
  - horizon: "0-90 天"
    experiment: "与正在调试新产线或签下第一份多供应商合同的回收商签下 3-5 份共创客户意向书。"
    hypothesis: "产线调试的关键节点会制造出足够紧迫的痛点,让运营方在还没签正式商业合同之前,就愿意投入真实的清单和化验数据做共创。"
    successMetric: "90 天内签下 3 份以上共创客户意向书,并获得承诺的数据访问权限。"
    owner: "创始人 / 商务负责人"
  - horizon: "0-90 天"
    experiment: "为一条提炼线搭建人机协同的批次分类和取样推荐工作台。"
    hypothesis: "一个保守、经人工复核的建议(而非全自动化)就足以在最初几个周期赢得厂长信任并被使用。"
    successMetric: "在第一个共创客户处,工厂运营人员对工作台建议的采纳率(接受或带记录原因的驳回)达到 80% 以上。"
    owner: "创始工程师"
  - horizon: "3-6 个月"
    experiment: "在 3-5 家共创客户之间搭建预测对实际偏差跟踪机制,并发布偏差趋势线。"
    hypothesis: "即使从稀缺的历史数据起步,预测准确度也会在 2-3 个处理周期内显著提升。"
    successMetric: "到第 6 个月,5 家共创客户中有 3 家以上的偏差出现可衡量、可报告的收窄。"
    owner: "数据科学家 / 创始工程师"
  - horizon: "3-6 个月"
    experiment: "在一个存在活跃供应商争议的共创客户处试点供应商结算核对工作流。"
    hypothesis: "有化验依据的结算记录能足够多地降低关闭天数和争议率,值得为此支付溢价。"
    successMetric: "结算关闭天数相较该客户试点前的基线出现可衡量的下降。"
    owner: "实施 / 客户成功"
  - horizon: "6-12 个月"
    experiment: "把 2-3 个共创客户转为按年度加使用量收费、价格接近 $300k 混合目标的付费合同。"
    hypothesis: "看到偏差改善和结算压缩效果的共创客户,会愿意按全价付费,而不需要大幅折扣。"
    successMetric: "到第 12 个月,签下 2 份以上付费合同,金额达到目标合同价值的 70% 以上。"
    owner: "创始人 / 商务负责人"
  - horizon: "9-15 个月"
    experiment: "测试与一家化验实验室或分析仪器供应商的引荐渠道合作。"
    hypothesis: "实验室和仪器供应商已经接触到产品所依赖的取样工作流,能带来合格的引荐线索。"
    successMetric: "到第 15 个月,通过实验室/仪器合作伙伴获得至少 1 个合格的共创客户或销售线索。"
    owner: "创始人 / 商务负责人"
  - horizon: "12-18 个月"
    experiment: "与一个现有付费客户一起,规划一个上游(废料生产商采购)或下游(再生材料认证)拓展项目。"
    hypothesis: "有一套跑通的入库到结算闭环的客户,会希望把平台向他们自己的上下游对手方延伸。"
    successMetric: "到第 18 个月,签下一份上下游拓展项目的范围界定协议或付费试点。"
    owner: "创始人 / 产品负责人"
operations:
  - "共创客户引导手册,覆盖清单接入、实验室数据接入,以及任何自动化被信任之前的取样建议复核。"
  - "与每个客户现有 LIMS/ERP 直接集成或提供结构化导入导出,让平台不必强推推倒重来的决策。"
  - "与共创客户签订数据共享和保密协议,覆盖用于训练预测模型的批次级清单、化验和结算数据。"
  - "与化验实验室和分析仪器供应商建立关系,既是数据质量的锚点,也是引荐渠道。"
team:
  - role: "创始工程师(预测与数据平台)"
    startTiming: "第 0 个月"
    rationale: "负责批次分类、取样建议和产率预测的核心功能;必须先交付人机协同版 MVP,共创客户才会信任自动化。"
  - role: "创始人 / 懂行业的商务负责人"
    startTiming: "第 0 个月"
    rationale: "掌握与回收商 COO 和厂长的直接关系和信誉;在调试关键节点销售,此时对冶金/运营判断的信任是决定性因素。"
  - role: "应用数据科学家(产率建模)"
    startTiming: "第 4-6 个月"
    rationale: "一旦 2-3 个共创客户产生足够多的批次级预测对实际数据,就需要这个角色来超越人机协同基线。"
  - role: "实施 / 客户成功工程师"
    startTiming: "第 6-9 个月"
    rationale: "负责共创客户之外首批付费工厂的引导上线;高触达、与调试挂钩的引导工作,超过 2-3 个客户就不能单靠创始人时间撑住。"
  - role: "商务 / 销售岗位"
    startTiming: "第 9-12 个月"
    rationale: "只有在有 2-3 个参照客户之后才招,以便在信任建立阶段不稀释创始人主导销售的同时,把直销扩展到剩余的滩头客户群体。"
milestones:
  - horizon: "0-12 个月"
    items:
      - "签下 3-5 份共创客户意向书,并在每个客户一条提炼线上交付人机协同的批次入库加产率预测 MVP"
      - "在 3 个以上共创客户之间证明预测对实际偏差有可衡量的改善趋势"
      - "在 1 个以上有活跃争议历史的共创客户处试点供应商结算核对模块"
      - "把 2-3 个共创客户转为年度加使用量的付费合同"
  - horizon: "12-24 个月"
    items:
      - "达到 5-7 个付费工厂客户,与调研得到的 SOM 客户群体一致"
      - "把溢价结算/审计留痕模块作为独立追加销售项,推广到现有客户基础"
      - "至少与一家化验实验室或仪器供应商建立引荐渠道关系"
      - "与一个现有付费客户一起规划第一个上游或下游产品拓展项目"
  - horizon: "24-36 个月"
    items:
      - "在可触达的印度滩头客户群体中,达到调研得到的约 $2.1M SOM 运行速率"
      - "把跨工厂产率与结算对标作为独立数据产品推出"
      - "验证并开始将至少一项上游/下游拓展(采购、认证或承购相邻数据)变现"
risks:
  - risk: "正在扩大工厂资本开支的回收商,可能相对于冶金人才和资本设备,把运营软件视为可选项。"
    likelihood: "Medium"
    impact: "High"
    mitigation: "在产线调试的关键节点切入销售,把投资回报讲清楚——聚焦回收产率提升、批损规避和更快的营运资金周转,而不是当作可有可无的 IT 采购。"
  - risk: "新建或扩产工厂历史批次数据稀缺,让早期产率预测噪声偏大,拖慢产品信任建立。"
    likelihood: "High"
    impact: "Medium"
    mitigation: "先用人机协同的工作流、实验室辅助的基线,以及保守的置信区间起步,随着每家工厂处理更多批次逐步收紧。"
  - risk: "大型回收商选择扩展通用 ERP、LIMS 或内部分析工具,而不是采用一个新平台。"
    likelihood: "Medium"
    impact: "High"
    mitigation: "牢牢掌握通用系统和单厂内部工具难以复制的跨工厂产率基准数据集和供应商结算工作流;与现有 LIMS/ERP 集成而非取代。"
  - risk: "调研得到的滩头市场偏小(SOM 约 $2.1M,约 7 家工厂),仅靠印度回收商这一核心市场可能撑不起一个风险投资级结果。"
    likelihood: "Medium"
    impact: "High"
    mitigation: "把上游(采购)和下游(认证、承购、融资)拓展当作第 18-24 个月的明确、可测试里程碑,而不是模糊的长期愿景。"
  - risk: "原料短缺或金属价格疲软可能把回收商推入半停产式采购模式,拉长销售周期。"
    likelihood: "Medium"
    impact: "Medium"
    mitigation: "让合同结构更偏向按使用量定价,使收入和客户经济模型跟着工厂产能利用率走,而不是假设固定吞吐量。"
fundingAsk:
  round: "seed"
  targetFundingRangeUsd: "$1.5-3M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 个月的资金跑道,从第一天起养一位创始工程师和一位懂行业的商务负责人,等共创客户上线后
    再增加一位数据科学家和一位实施工程师,签下并落地跟踪 3-5 个共创客户试点,交付产率预测 MVP
    和结算模块,把前 2-3 个付费工厂合同做到调研得到的约 $300k 混合年度合同价值。
