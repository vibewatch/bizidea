topRisks:
- name: 主平台挤压
  description: Havoc、主承包商或大型自主厂商都可能向下延伸到任务意图工具层，压缩创业公司可赢的空间。
  mitigation: 聚焦第三方栈上的厂商中立混合舰队互操作和审计能力，专打单一厂商平台最弱的地方。
- name: 国防采用偏慢
  description: 即便技术试点成功，部委采购周期仍可能拖慢付费量产落地。
  mitigation: 先从演习预算、合同变更和集成商主导的试点切入，在完整 program of record 立项之前先把软件卖进去。
- name: 涉密部署复杂
  description: 隔离网、边缘环境和高安全约束会让集成又贵又慢。
  mitigation: 先以本地化 appliance 形态交付，第一批只做少量连接器，并优先挑那些已在可接触的非密靶场运行混合舰队的项目。
