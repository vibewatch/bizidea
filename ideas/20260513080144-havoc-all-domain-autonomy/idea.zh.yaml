jobsToBeDone:
- job: 当一场混合舰队海上演习进入规划阶段时，帮助项目交付负责人把指挥官意图转成各家厂商都能执行的任务包，这样他们就能按时出发，而不是再耗上几周补定制集成。
  currentAlternative: 电子表格任务计划，加上服务驱动的中间件工作
  successMetric: 每场演习减少的任务准备天数
- job: 当自主任务中的通信开始退化时，帮助自主作战负责人套用事先批准的兜底行为，这样既能继续让资产发挥作用，也不会踩穿控制规则。
  currentAlternative: 操作员分别在多个厂商控制台上手工干预
  successMetric: 在退化连接下仍能维持的任务时长占比
