problem: 国防项目现在已经能在一场任务里投放几十架无人机、无人艇和地面系统，但规划和监管仍然卡在各家厂商自己的控制台、电子表格版 CONOPS，以及大量定制集成上。一旦链路退化，操作员需要的是事先批准的兜底行为，以及一条清楚的审计链——谁在什么规则下，把什么权限交给了哪台机器。这道缺口会拖慢演习节奏、抬高集成服务成本，也直接压住一个战术单元能安全控制的资产上限。
targetUser:
  primary: 海上防务集成商里的自主作战负责人，正在为某个盟军海军或美国海岸防御单位运行混合 USV 与 UAV 试点
  secondary: 海军自主作战单元里负责无人任务分配的战术演习规划官
  buyer: 负责无人试点合同的项目平台主管副总裁或项目经理
startupThesis:
  nonObviousInsight: 难点早就不是让单个平台自己飞起来、跑起来，而是把指挥官意图翻成带宽感知、厂商中立的任务下发和兜底策略，并一次性发给多种不同自主系统。
  beachhead: 海岸监视和反水雷演习：防务集成商需要在间歇通信环境下，协调来自 3+ 家厂商的 20-200 个混合 USV 与 UAV
  wedge: 一套本地部署的任务意图编译器，把一份获批计划转成各平台专属任务包、失联兜底行为，以及横跨现有自主栈的人类可读审计日志
  whyNowCatalyst: 当一名操作员已经被要求在 GPS-denied、混合平台任务里带起数千个资产时，部委和集成商现在就需要一层任务意图层，而不是再等一年继续做定制集成。
  ventureScalePath: 先拿下海上混合舰队演习，再扩到所有把空、海、地资产拼在一起的盟军多域无人项目，后续再延伸到同样受退化连接约束的商业海工、港口和关键基础设施机器人舰队。
solution: Mixed Fleet Intent Compiler 读取任务计划、交战规则、地理围栏、资产健康状态和通信假设，再为每家厂商的栈生成平台专属任务包和兜底策略。它以可部署的边缘或本地控制层形态运行在现有自主软件之上，因此项目方不用更换现有载具和地面站。产品给操作员一个统一审批界面、一套带宽感知的授权逻辑，以及事后回放能力——能看清下发了什么意图、资产如何调整、人类又在什么时候重新接管。首批部署聚焦海岸监视和反水雷演习，因为在这些场景里，异构舰队和间歇连接已经足以把手工规划彻底拖垮。
goToMarketSeed:
  firstCustomer: 一家 100-1,000 人的防务集成商，正为某个美国海军、海军陆战队或盟军海军项目办公室准备一场由 20-100 个混合 USV 与 UAV 组成的海岸监视或反水雷演习
  buyingTrigger: 新的演习、试点中标或合同变更，让一个作战单元必须监管比现有厂商专用控制台更多的平台
  currentAlternative: 厂商专用控制站，加上定制中间件、电子表格任务规划和服务驱动的系统集成
  switchingReason: 这个切口能压缩演习准备时间、减少定制集成，还能在不更换硬件或自主栈的前提下，给指挥官一套可审计的失联处置手册。
  pricingHypothesis: 按活跃平台数量和任务单元计费的年度项目许可，第一年再叠加付费部署与集成服务
