topRisks:
  - name: Prime platform squeeze
    description: >-
      Havoc, primes, or major autonomy vendors could extend downward into
      mission-intent tooling and compress the startup's room to win.
    mitigation: >-
      Focus on vendor-neutral mixed-fleet interoperability and auditability
      across third-party stacks where single-vendor platforms are weakest.
  - name: Slow defense adoption
    description: >-
      Ministry procurement cycles can delay paid production even after a
      technically successful pilot.
    mitigation: >-
      Enter through exercise budgets, contract modifications, and
      integrator-owned pilots that can buy software before a full program of
      record.
  - name: Classified deployment complexity
    description: >-
      Air-gapped, edge, and security-constrained environments can make
      integrations expensive and slow.
    mitigation: >-
      Ship as an on-prem appliance with a narrow first connector set and
      prioritize programs that already run mixed fleets on accessible
      unclassified ranges.
