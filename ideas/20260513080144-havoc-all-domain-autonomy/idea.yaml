problem: >-
  Defense programs can now field dozens of drones, vessels, and ground systems
  in one mission, but planning and supervising them still happens in
  vendor-specific consoles, spreadsheet CONOPS, and custom integration work.
  When links degrade, operators need pre-approved fallback behaviors and a
  clean audit trail of who delegated what, to which machine, under which rules.
  That gap slows exercises, inflates integration services, and caps how many
  assets one tactical cell can safely control.
targetUser:
  primary: >-
    Autonomy operations director at a maritime defense integrator running mixed
    USV and UAV pilots for one allied navy or U.S. coastal defense unit
  secondary: >-
    Tactical exercise planning officer responsible for unmanned tasking inside a
    naval autonomy cell
  buyer: VP Programs or program manager owning the unmanned pilot contract
startupThesis:
  nonObviousInsight: >-
    The hard part is no longer getting one vehicle to act autonomously; it is
    translating commander intent into bandwidth-aware, vendor-neutral tasking
    and fallback policies for many different autonomous systems at once.
  beachhead: >-
    Coastal surveillance and mine-countermeasure exercises where a defense
    integrator must coordinate 20-200 mixed USVs and UAVs from 3+ vendors under
    intermittent communications
  wedge: >-
    An on-prem mission-intent compiler that converts one approved plan into
    platform-specific task bundles, comm-loss fallback behaviors, and a
    human-readable audit log across existing autonomy stacks
  whyNowCatalyst: >-
    As one operator is expected to supervise thousands of assets in GPS-denied,
    mixed-platform missions, ministries and integrators need a mission-intent
    layer now rather than another year of bespoke integration.
  ventureScalePath: >-
    Start with maritime mixed-fleet exercises, then expand into every allied
    multi-domain unmanned program that combines air, sea, and ground assets,
    and later into commercial offshore, port, and critical-infrastructure
    robotic fleets that face similar degraded-connectivity coordination
    problems.
solution: >-
  Mixed Fleet Intent Compiler ingests a mission plan, rules of engagement,
  geofences, asset health, and communications assumptions, then generates
  platform-specific task bundles and fallback policies for each vendor stack.
  It runs as a deployable edge or on-prem control layer above existing autonomy
  software, so programs keep their current vehicles and ground stations. The
  product gives operators a single approval surface, bandwidth-aware delegation
  logic, and after-action replay showing what intent was issued, how assets
  adapted, and when humans re-took control. Early deployments focus on coastal
  surveillance and mine-countermeasure exercises where heterogeneous fleets and
  intermittent connectivity already break manual planning.
goToMarketSeed:
  firstCustomer: >-
    A 100-1,000 employee defense integrator preparing a 20-100 asset coastal
    surveillance or mine-countermeasure exercise with mixed USVs and UAVs for
    one U.S. Navy, Marine, or allied navy program office
  buyingTrigger: >-
    A new exercise, pilot award, or contract modification that requires one
    operations cell to supervise more platforms than current vendor-specific
    consoles can handle
  currentAlternative: >-
    Vendor-specific control stations plus custom middleware, spreadsheet
    mission planning, and services-led systems integration
  switchingReason: >-
    The wedge cuts exercise prep time, reduces bespoke integration, and gives
    commanders an auditable comm-loss playbook without forcing a hardware or
    autonomy-stack replacement.
  pricingHypothesis: >-
    Annual program license priced by active platform count and mission cells,
    with paid deployment and integration services in year one
