differentiator: >-
  Unlike vehicle-autonomy vendors, this company does not try to own the robot
  brain or sell new hardware. Its moat is a vendor-neutral mission schema, a
  comms-loss policy library, and an audit graph built around repeated
  mixed-fleet deployments. That makes it valuable precisely where primes, OEMs,
  and ministries have to combine multiple platforms on one program and still
  prove human control.
