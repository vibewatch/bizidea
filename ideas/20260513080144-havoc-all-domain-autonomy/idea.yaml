jobsToBeDone:
  - job: >-
      When a mixed-fleet maritime exercise is being planned, help a program
      delivery lead turn commander intent into vendor-specific task packages, so
      they can launch on time without weeks of custom integration.
    currentAlternative: Spreadsheet mission plans plus services-led middleware work
    successMetric: Days of mission-prep time removed per exercise
  - job: >-
      When communications degrade during an autonomous mission, help an
      autonomy operations lead apply pre-approved fallback behaviors, so they
      can keep assets productive without violating control rules.
    currentAlternative: Manual operator intervention in multiple vendor consoles
    successMetric: Percentage of mission time maintained under degraded connectivity
