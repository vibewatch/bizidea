slug: mixed-fleet-intent-compiler
date: '2026-05-13'
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: 月
  source: '[BP date 2026-05-13]'
- id: A2
  name: pre-seed 交割后的起始现金
  value: '3000'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $3-5M]；基础情景按 $3.0M 交割，覆盖 Y2 里程碑并额外留出 6 个月现金缓冲。'
- id: A3
  name: 付费试点价格
  value: '300'
  unit: USDK / 次演习
  source: '[BP gtm.pricing $250k-$500k paid pilot]；基础情景取中位数，对应一场演习和首批连接器。'
- id: A4
  name: 稳定期量产 ACV
  value: '2100'
  unit: USDK / 项目年
  source: '[BP gtm.pricing $1.5M-$3.0M annual program license]；基础情景采用低于 $3.0M SOM 上限的保守中位值。'
- id: A5
  name: 第 1 年收入爬坡
  value: 在 M7 和 M10 分别签下 2 个付费试点；首年确认收入合计 $675K
  unit: 时点
  source: '[BP milestones: sign 2 paid pilots and convert at least 1 to production]；[Research buyingTriggers and distributionChannels: live exercise inside 90-180 days]。'
- id: A6
  name: 第 2 年量产爬坡
  value: Q1Y2-Q4Y2 收入分别为 375、525、750 和 1050 USDK，年末共有 4 个量产项目在线
  unit: 按季度 USDK
  source: '[BP milestones 12-24 months: reach 4 production programs]；基础情景假设采购节奏依然不均，大部分年度许可收入落在 H2。'
- id: A7
  name: 第 3 年每个在线项目的已实现收入
  value: '2100'
  unit: USDK / 项目年
  source: '[Research market.som rationale: 4 landed programs at ~$3.0M each]；基础情景只按每个项目 $2.1M 已实现收入承保，因为部分任务单元扩张会逐步到位。'
- id: A8
  name: 毛利率爬坡
  value: Y1 为 55%，Y2 为 62%，Y3 为 70%
  unit: 毛利率百分比
  source: '[BP businessModel.targetGrossMarginPct 70]；创业财务经验假设认为，早期试点服务占比更高，随着连接器复用，交付毛利会改善。'
- id: A9
  name: 创始人现金薪酬
  value: '180'
  unit: 年化 USDK
  source: 创业财务经验假设：国防科技创始人在 pre-seed 阶段按低于市场的现金薪酬领薪。
- id: A10
  name: 工程团队现金薪酬
  value: '200'
  unit: 年化 USDK / FTE
  source: '[BP team requires compiler, autonomy, and security talent]；创业财务经验假设，对应接近涉密能力的机器人软件人才及薪酬负担。'
- id: A11
  name: 部署 / 集成人员现金薪酬
  value: '180'
  unit: 年化 USDK / FTE
  source: '[BP team: forward deployed integration engineer]；创业财务经验假设，对应差旅负担较重的现场部署人才。'
- id: A12
  name: 销售 / 合作人员现金薪酬
  value: '190'
  unit: 年化 USDK / FTE
  source: '[BP sequencingRationale: scaled sales later]；创业财务经验假设，对应 1 名国防大客户销售，现金薪酬适中并带浮动激励。'
- id: A13
  name: 运营 / G&A 现金薪酬
  value: '150'
  unit: 年化 USDK / FTE
  source: '[BP team: program operations lead]；创业财务经验假设，对应财务、合同与后台支持。'
- id: A14
  name: 招聘节奏
  value: M0 配 CEO 和创始工程师，M1 配任务自主负责人，M4 配前置部署工程师，M6 配安全 / 平台工程师，M9 配项目运营；Y2 再加 1 名销售、1 名工程师、第 2 名前置部署 FTE 和 1 名财务 / 运营；Y3 再加 2 名工程师、1 名销售和 1 名前置部署 FTE
  unit: 时点
  source: '[BP team startTiming and sequencingRationale]，再叠加创业财务经验假设：创始人主导销售何时可以交接给小型 GTM 团队。'
- id: A15
  name: 非薪酬运营开支
  value: 销售与差旅每月 12-32 USDK，研发工具与安全每月 12-28 USDK，G&A / 法务 / 合规每月 16-29 USDK
  unit: USDK / 月
  source: '[Research regulatoryTechnicalConstraints: secure on-prem and edge deployments raise cost]；创业财务经验假设，对应国防软件里的差旅、法务、保险和合规成本。'
- id: A16
  name: 稳定期 CAC
  value: '600'
  unit: USDK / 量产项目
  source: '[BP gtm.funnelTargets] and [Research reportMemo.customerAndBuyer]；经验假设已计入创始人时间、差旅、方案设计和集中型买方带来的长销售周期。'
- id: A17
  name: 月度流失代理值
  value: '3.0'
  unit: 百分比
  source: 创业财务经验假设：把年度续约与预算风险折算成 LTV 计算可用的月度等价值；研究输入里没有公开可比数据。
- id: A18
  name: 现金转换政策
  value: EBITDA 近似等于现金变动
  unit: 政策
  source: 创业财务经验假设：此阶段暂不单独建模债务、capex 或营运资金占用。
