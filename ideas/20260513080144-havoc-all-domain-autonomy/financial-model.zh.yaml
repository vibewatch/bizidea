scenarios:
  downside:
    description: 试点转量产比预期晚 1-2 个季度，已实现 ACV 落在接近 $1.8M，毛利率也只能停在 60% 出头。
    y3RevenueK: 5400.0
    y3EbitdaK: 450.0
    cashLowPointK: 250.0
    keyAssumptionChanges:
    - 到 Q4Y3 在线的量产项目只有 3 个，而不是 4 个。
    - 稳定期每个项目收入按 $1.8M，而不是 $2.1M。
    - 由于安全部署仍偏服务化，毛利率只能做到 62%。
  base:
    description: 2 个付费试点最终转成 4 个项目的滩头阵地，而连接器复用把毛利率一路抬到 Y3 的 70% 目标。
    y3RevenueK: 8400.0
    y3EbitdaK: 2580.0
    cashLowPointK: 1376.1
    keyAssumptionChanges:
    - Y1 落地 2 个付费试点，Q4Y2 前共有 4 个量产项目在线。
    - Y3 每个量产项目平均已实现收入为 $2.1M。
    - 随着部署工作开始复用，毛利率从 Y1 的 55% 爬升到 Y3 的 70%。
  upside:
    description: 转化发生在 90-180 天周期的快端，H2Y3 再落地 1 个联盟后续项目，账户扩张把 ACV 推到基础情景之上。
    y3RevenueK: 10500.0
    y3EbitdaK: 3900.0
    cashLowPointK: 1600.0
    keyAssumptionChanges:
    - H2Y3 再新增第 5 个量产项目或联盟相邻项目。
    - 成熟项目的已实现收入随着回放和策略附加模块升到约 $2.4M。
    - 连接器与策略库复用快于计划，毛利率能做到 73%。
