  baseCase: $2.1M 的单个在线项目已实现收入
  upsideCase: $2.4M 的单个在线项目已实现收入
  y3RevenueImpactK: -1200.0
  cashImpactK: -840.0
- variable: 毛利率
  downsideCase: 由于安全部署仍是定制化交付，稳定期 GM 只有 62%
  baseCase: 稳定期 GM 为 70%
  upsideCase: 若连接器复用更强，稳定期 GM 可到 73%
  y3RevenueImpactK: 0.0
  cashImpactK: -672.0
