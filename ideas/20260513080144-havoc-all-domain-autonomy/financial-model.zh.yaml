  baseCase: 月度续约风险代理值为 3%
  upsideCase: 月度续约风险代理值为 2%
  y3RevenueImpactK: -900.0
  cashImpactK: -650.0
- variable: CAC
  downsideCase: 每个量产项目 $750K
  baseCase: 每个量产项目 $600K
  upsideCase: 每个量产项目 $450K
  y3RevenueImpactK: -300.0
  cashImpactK: -600.0
- variable: 招聘节奏
  downsideCase: 收入兑现前提前 2 个季度招人，并保留所有 Y3 编制
  baseCase: 只有在试点转化证据出现后，才增加 GTM 和部署编制
  upsideCase: 把非客户面对岗位延后到 Q2Y3 之后再补
  y3RevenueImpactK: 0.0
  cashImpactK: -500.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      TargetAccounts --> QualifiedPilots
      QualifiedPilots --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基础情景的收入引擎，是把 2 个演习预算支持的试点转成 4 个量产项目，到 Y3 每个项目约实现 $2.1M 收入。
- checkName: 必须做对的事
  finding: 公司必须把连接器复用率拉高到足以让安全部署在前两个在线项目之后不再持续吞掉毛利。
- checkName: 模型会失效的情况
  finding: 如果试点审批拖向 12 个月周期，销售周期敏感性已经说明 pre-seed 轮融资额必须明显增加，因为 Y2 仍然亏损。
- checkName: 下一轮融资的证明点
  finding: 一旦 4 个量产项目在线，且公司能证明 Y3 毛利改善来自可复用连接器而不是定制服务，下一轮融资就有了充分理由。
sanityChecks:
  ruleOf40: Y3 增长 211% + EBITDA 利润率 31% = 242%；方向上很强，但也被小体量 Y2 基数之上、呈现跳跃式增长的国防合同节奏放大了。
  burnMultiple: Y2 的 burn multiple 约为 0.3x（约 $0.5M EBITDA burn，对应约 $2.0M 的同比收入增量），到 Y3 转为现金创造。
  revenuePerFte: Y3 为 $600K（$8.4M 收入 / 14 FTE）；高于典型 SaaS，原因是合同按项目规模计价，而且模型假设部署工作能被控制住。
  flags:
  - 基础情景仍假设到第 10 个月能签下 2 个付费试点，并在 Y2 结束前做到 4 个量产项目；若国防采购再延迟，所需融资会高于当前 ask。
  - 厂商中立自主编排的公开定价与留存可比样本很少，因此 CAC 和 churn 仍主要是经验假设，而不是基准验证值。
  - 收入集中度很高：Y3 只有 4 个量产项目时，只要 1 次续约延迟，或被主承包商打包带走，就会明显改写结果。
  - Y3 的人均收入很有吸引力，但前提是安全本地交付能变成可复用流程，而不是重新滑回重服务部署。
