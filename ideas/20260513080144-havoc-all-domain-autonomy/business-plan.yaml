slug: mixed-fleet-intent-compiler
date: '2026-05-13'
executiveSummary: >-
  Mixed Fleet Intent Compiler targets maritime defense integrators and naval
  unmanned cells that must run a 20-200 asset coastal surveillance or
  mine-countermeasure exercise before existing vendor consoles and custom
  middleware can scale. It sits above current autonomy stacks as an on-prem
  mission-intent compiler that turns one approved plan into platform-specific
  task bundles, comm-loss fallback behaviors, and an auditable human-control
  log. This is a tight first wedge because the buyer already has a live
  exercise budget, a clear schedule-risk trigger, and visible pain from mixed
  USV/UAV coordination under degraded communications. The company should sell
  the first deployment as a paid program pilot tied to one imminent exercise,
  then convert to an annual program license priced by active platform count and
  mission cells once the software shortens prep time and is reused in
  production. The strongest reason this can win is neutrality: primes,
  autonomy-stack vendors, and domain-specific mission systems all have product
  gravity, but customers may not want any one platform vendor to own the
  cross-vendor mission schema and override record. The plan deliberately avoids
  selling a new autonomy brain, new hardware, or broad all-domain
  command-and-control before it proves repeatable value in maritime exercises.
  Venture upside exists only if the product expands from planning and audit
  into recurring policy enforcement, additional mission cells, and more allied
  programs after the first 3-4 beachhead deployments. The largest disconfirming
  risk is that primes bundle enough orchestration into broader contracts that
  buyers accept single-vendor stacks instead of funding a neutral layer. Public
  pricing comparables are thin in the inputs, so pilot pricing, conversion
  rates, and exact first-year ACV remain assumptions to validate early.
problem:
  - Mixed-fleet maritime programs still plan through vendor consoles, spreadsheet CONOPS, and custom middleware, so exercise prep time grows faster than fleet size.
  - When communications degrade, operators need pre-approved fallback behavior and a defensible audit trail, but those controls are rarely generated consistently across third-party autonomy stacks.
  - Program managers and integrators can already field dozens of unmanned assets, yet human supervision and cross-vendor tasking remain the bottleneck that caps one mission cell's safe span of control.
solution:
  - Compile one commander-approved mission plan, rules of engagement, geofences, asset health inputs, and communications assumptions into platform-specific task bundles for existing USV and UAV stacks.
  - Package comm-loss fallback policies and a human-readable audit log as first-class outputs so the same system that accelerates launch also supports responsible-autonomy review.
  - Deploy on-prem or at the tactical edge above current ground stations so customers keep their existing vehicles and control software while reducing bespoke integration.
whyWeWin:
  - The company sells a neutral plan-to-tasking layer, not a vehicle, autonomy brain, or new console, which makes it easier for integrators and ministries to use across rival vendors.
  - The beachhead is tied to a near-term exercise or contract modification with visible schedule and integration pain, giving the first customer a budgeted reason to buy now instead of waiting.
  - Reusable mission schemas, adapter templates, fallback-policy libraries, and replay data compound with each deployment and are harder for one-off services teams to replicate.
  - Standards momentum around STANAG 4586, UCI, OMS, and open autonomy architectures makes a vendor-neutral layer technically more plausible than a few years ago.
strategicChoices:
  beachhead: Maritime defense integrators and naval unmanned cells running 20-200 asset coastal surveillance or mine-countermeasure exercises with mixed USVs and UAVs from at least three vendors under intermittent communications.
  wedgeRationale: >-
    This workflow has the clearest buying trigger, shortest proof cycle, and
    least platform conflict. A customer can judge value in one exercise cycle
    by whether the compiler shortens planning time, reduces bespoke middleware
    work, and produces an audit-ready comm-loss playbook. Broader all-domain
    mission software would force the company into longer procurement cycles and
    direct competition with better-capitalized primes before it has proof.
  sequencingRationale: >-
    Product starts with mission-plan ingest, task-bundle compilation, fallback
    policy generation, and replay because those features are required to win the
    first pilot and create reusable deployment data. GTM stays founder-led into
    integrators and exercise owners until two connector paths and one approval
    workflow are repeatable. Hiring follows the same order: core compiler and
    integration talent first, then secure deployment and forward-deployed
    support, and only later a scaled sales motion or broader partner program.
  notYet:
    - Selling a full autonomy brain or replacing platform-specific control software
    - Expanding into commercial offshore, port, or critical-infrastructure fleets before three defense logos are live
    - Taking on broad all-domain command-and-control workflows before maritime tasking and audit outputs are repeatable
    - Chasing deeply classified programs that require custom integrations before the unclassified or sanitized beachhead is proven
market:
  tam: "$700.0M TAM based on roughly 175 U.S. and allied unmanned program cells at about $4.0M annual software plus deployment value for orchestration and audit workflows."
  sam: "$135.0M SAM based on roughly 45 maritime coastal-surveillance and mine-countermeasure mission cells at about $3.0M annual contract value."
  som: "$12.0M year-3 SOM based on 4 landed beachhead programs at about $3.0M ACV through integrator-led exercises and follow-on production options."
  segments:
    - Maritime defense integrators running mixed USV/UAV exercises for U.S. Navy, Marine, and allied naval customers
    - Allied naval unmanned program offices and prime-led multi-domain programs after the maritime wedge proves out
  buyingProcess: >-
    Sales should start with the autonomy operations director, mission planner,
    or exercise lead 90-180 days before a live event, then move to the VP
    Programs or program manager once the team sees a draft mission package and
    audit log tied to the upcoming exercise. The first deal should be framed as
    a program pilot funded from exercise, pilot, or contract-modification
    budgets, with annual conversion only after the workflow is reused in a
    second event or production cycle.
product:
  mvp: >-
    MVP covers mission-plan ingest, vendor-specific task-bundle generation,
    comm-loss fallback policy templates, and after-action replay for one mixed
    USV/UAV maritime exercise. It should support a narrow first connector set
    and run on-prem or at the edge rather than trying to replace existing
    autonomy stacks.
  sixMonth: >-
    Support one paid pilot with two connector paths, one approval workflow for
    fallback policies, replay exports, and a deployable on-prem package for an
    unclassified or sanitized exercise environment.
  twelveMonth: >-
    Add additional maritime mission templates, standards-aligned schema
    mappings, reusable audit artifacts, and a second production deployment that
    reuses most of the first connector and policy library.
  twentyFourMonth: >-
    Expand from exercise planning into recurring program operations, runtime
    policy enforcement, more mission cells within each account, and adjacent
    coalition or multi-domain unmanned workflows that share the same neutral
    tasking layer.
  keyBets:
    - Buyers will fund a neutral intent layer before a prime or autonomy vendor bundles enough similar functionality into the broader contract.
    - Two initial connector paths can cover most first-year opportunities without turning each deployment into a bespoke integration project.
    - Sanitized mission plans and after-action data are sufficient to prove ROI before the company must support deeply classified deployments.
    - Audit and fallback outputs matter enough in responsible-autonomy reviews to become part of the buying decision, not just a compliance afterthought.
gtm:
  wedge: Sell a paid mission-intent pilot to a defense integrator or naval autonomy cell with a live coastal-surveillance or mine-countermeasure exercise inside 90-180 days, then convert to an annual program license once the customer reuses the workflow and audit outputs in the next event.
  channels:
    - Founder-led direct sales into defense integrators, naval autonomy cells, and program managers tied to upcoming exercises
    - Prime contractor and autonomy-OEM partnerships where the company is positioned as the neutral orchestration layer above existing vehicles and mission systems
    - Program-driven pilots tied to DIU, Replicator-style experimentation, or contract modifications rather than waiting for a full program of record
  funnelTargets: "Target account to qualified pilot 20-30%, qualified pilot to paid pilot 30-40%, paid pilot to annual production 50%+, and production account to second mission-cell expansion 30%+ within 12 months."
  pricing: >-
    Price the first deployment as a $250k-$500k paid pilot for one exercise and
    first connector set, converting to a $1.5M-$3.0M annual program license
    priced by active platform count and mission cells, with additional
    deployment fees for secure or edge environments. This matches the research
    assumption that the buyer funds the sale from a program budget rather than a
    seat-based software line.
businessModel:
  revenueStreams:
    - Paid pilots tied to a specific exercise, pilot award, or contract modification
    - Annual software licenses priced per active program, platform count, and mission cells
    - Deployment, connector, and secure-environment integration fees
    - Expansion modules for replay analytics, additional policy libraries, and runtime policy enforcement
  unitOfValue: Active mixed-fleet program-year
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more mission cells, vehicle types, and connector coverage within the same integrator or ministry account
    - Expand from exercise planning into recurring operational tasking and policy enforcement
    - Reuse the neutral schema and audit workflow across coalition partners and adjacent ground or air programs
    - Sell updated fallback-policy libraries and replay analytics into already deployed accounts
strategyMap:
  northStarMetric: Number of production mission cells running approved plans through the compiler across two or more exercise or operational cycles
  inputMetrics:
    - Paid pilots signed per quarter
    - Days of exercise-prep time removed per deployment
    - Pilot-to-production conversion rate
    - Median time to onboard a new platform adapter
    - Percentage of missions with approved fallback policies and replay exports generated from the product
  moatsToBuild:
    - Vendor-neutral mission schema and adapter library across mixed maritime fleets
    - Proprietary fallback-policy and replay dataset from degraded-communications deployments
    - Human-approval and override workflow embedded in program reviews and after-action processes
  killCriteria:
    - Fewer than 2 paid pilots signed after 12 months of focused maritime-integrator selling
    - Pilot-to-production conversion below 30% after the first 4 paid pilots
    - Median adapter onboarding remains above 6 engineer-weeks after the third deployment
    - Customers refuse to use the audit log or fallback output in any formal exercise review or production workflow
  mermaid: |
    flowchart LR
      Wedge[Maritime exercise wedge] --> MVP[Intent compiler MVP]
      MVP --> Proof[Shorter prep plus audit proof]
      Proof --> Expansion[More mission cells and programs]
investorMemo:
  verdict:
    call: Watch
    conviction: Clear customer pain and timing, but conviction depends on proving that a neutral layer gets funded before primes absorb the workflow.
    whyBelieve: The plan targets a budgeted exercise bottleneck where mixed-fleet coordination, degraded comms, and auditability all matter at once, creating a plausible entry point for a neutral overlay.
    whyDoubt: The standalone category is modest and crowded, so the company may be trapped between bundled prime offerings and services-heavy integrations before software economics emerge.
    nextDiligence: Secure two paid pilots with maritime integrators and verify that at least one converts into an annual production contract without requiring a bespoke classified build.
  firstCustomer:
    title: Program manager at a maritime defense integrator
    profile: A 100-1,000 employee defense integrator preparing a 20-100 asset coastal-surveillance or mine-countermeasure exercise with mixed USVs and UAVs for a U.S. or allied naval customer.
    trigger: An upcoming exercise, pilot award, or contract modification forces one operations cell to supervise more unmanned assets than current vendor consoles and custom middleware can safely support.
    buyer: VP Programs or program manager
    initialContract: $250k-$500k paid pilot for one exercise and first connector set, converting to a $1.5M-$3.0M annual program license if the workflow is reused in the next event or production cycle.
  mustBeTrue:
    - At least 5 of the first 12 target integrator or naval buyers confirm they can fund a paid pilot from an upcoming exercise or modification budget inside 180 days.
    - Two initial connector paths cover more than 60% of qualified first-year opportunities without custom platform replacement.
    - At least 50% of paid pilots convert to annual production contracts after the customer reuses the workflow in a second event.
    - Customers accept the audit log and fallback-policy outputs as part of a real exercise review or responsible-autonomy approval step.
    - Prime or autonomy-stack vendors do not displace the neutral layer before the company lands 4 production programs.
  diligenceQuestions:
    - Which exact budget line pays for the first pilot: exercise operations, integration services, or program software?
    - How often do target programs require deeply classified data before they will trust tasking and fallback recommendations?
    - Which two autonomy stacks or message schemas cover the largest share of near-term maritime opportunities?
    - Will integrators buy a neutral layer if Anduril, Havoc, Shield AI, or a prime offers adjacent orchestration in the same procurement?
    - What evidence from the first deployment proves schedule compression strongly enough to justify annual conversion?
operatingAssumptions:
  - assumption: Maritime integrators can approve a paid pilot from exercise or contract-modification budgets within one selling cycle.
    basis: research.yaml
    validationTest: Close 2 paid pilots tied to live exercises within 180 days without waiting for a full program-of-record procurement.
    decisionImpact: If false, the company must lean harder on prime channels or move upmarket into slower but larger programs.
  - assumption: A narrow first connector set can cover most early pipeline demand.
    basis: research.yaml
    validationTest: Map 10 qualified opportunities and confirm at least 6 fit the first two connector paths with onboarding under 30 engineer-days.
    decisionImpact: If false, deployment cost and sales velocity break the software thesis and force a much narrower ICP.
  - assumption: Sanitized mission data is sufficient to prove the value of task compilation, fallback outputs, and replay before full classified deployment.
    basis: research.yaml
    validationTest: Run one pilot on unclassified or sanitized inputs and confirm the customer adopts at least one generated task bundle or policy artifact.
    decisionImpact: If false, the roadmap and funding need must shift earlier toward secure enclaves and classified support.
  - assumption: Customers will pay pilot and production pricing that matches a program-budget sale rather than demanding mostly services billing.
    basis: idea.yaml
    validationTest: Get signed pricing from 2 design partners at or above the proposed pilot band and one written indication of annual license budget.
    decisionImpact: If false, pricing, gross margin targets, and the funding plan need to be reset around a services-led model.
  - assumption: The same neutral schema and audit workflow can expand beyond the beachhead into additional mission cells and adjacent unmanned programs.
    basis: operator judgment
    validationTest: In the first 4 production deployments, at least 2 customers request expansion into a second mission cell, additional vehicle type, or adjacent program.
    decisionImpact: If false, investors should underwrite the company as a niche maritime workflow product rather than a broader autonomy control layer.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12 maritime integrator program managers, autonomy leads, and exercise planners and collect the artifacts they use today for mixed-fleet mission planning and comm-loss approval.
    hypothesis: The first buyer will pay to compress planning and audit work for a live exercise, not to buy generic autonomy software.
    successMetric: At least 8 interviews rank planning overhead or fallback-approval burden as a top-3 problem and 3 accounts volunteer a near-term exercise for follow-up.
    owner: CEO
  - horizon: 0–90 days
    experiment: Produce one manual prototype that converts a sample mission plan into task bundles, fallback behaviors, and a replayable audit log using analyst support behind the scenes.
    hypothesis: Buyers will judge value by whether the output is decision-ready for an upcoming exercise before they care about full automation.
    successMetric: 3 design partners confirm the output is materially better than current spreadsheets or middleware documentation and agree to scope a paid pilot.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Build the first two connector paths for the autonomy stacks or message schemas that appear most often in qualified pipeline accounts.
    hypothesis: Two connectors can unlock most of the first-year beachhead without a custom integration motion.
    successMetric: More than 60% of qualified opportunities fit one of the connector paths and median onboarding stays under 30 engineer-days.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run the first paid pilot in an unclassified or sanitized coastal-surveillance or mine-countermeasure exercise environment.
    hypothesis: The compiler can remove measurable prep time and create audit artifacts the customer will actually use in review.
    successMetric: Customer confirms at least a 20% reduction in prep effort or bespoke integration work and requests a production proposal within 30 days.
    owner: Mission autonomy lead
  - horizon: 180–360 days
    experiment: Deliver a second deployment that reuses the first connector and policy library while adding one new mission cell or vehicle type.
    hypothesis: Expansion economics improve materially after the first deployment because the adapter and policy work is reusable.
    successMetric: Second deployment reaches production in 50% or less of the implementation time of the first and stays within target gross-margin assumptions.
    owner: Forward deployed engineer
  - horizon: 180–540 days
    experiment: Review the mission schema and audit output with a coalition interoperability or standards lead and map the product to one STANAG/UCI-aligned workflow.
    hypothesis: Standards alignment can reduce buyer fear of another proprietary middleware layer and improve coalition expansion odds.
    successMetric: One design partner or advisor confirms the schema can round-trip through a standards-aligned workflow without major redesign.
    owner: Product lead
operations:
  - Air-gapped and edge deployment process with versioned releases, rollback, and support for sanitized data environments
  - Mission-schema and fallback-policy QA process with human review before exercise output is approved
  - Adapter certification checklist for each supported autonomy stack and message schema
  - After-action replay and audit retention process that supports customer review without exposing unnecessary classified context
  - Prime, integrator, and standards-partner management for connector access and deployment approvals
team:
  - role: CEO
    startTiming: Month 0
    rationale: Founder-led selling is required to win the first design partners, shape the beachhead, and navigate defense program timing.
  - role: Founding eng
    startTiming: Month 0
    rationale: The company needs core product ownership over mission-plan ingest, schema management, and connector architecture from day one.
  - role: Mission autonomy lead
    startTiming: Month 1
    rationale: Domain credibility is needed to turn commander intent and fallback behavior into workflows that operators and buyers will trust.
  - role: Forward deployed integration engineer
    startTiming: Month 4
    rationale: Early success depends on getting on-prem pilots live quickly without stalling the core product team on customer-specific deployment work.
  - role: Security or platform engineer
    startTiming: Month 6
    rationale: On-prem packaging, audit controls, and secure-environment support become gating requirements once the first pilot is successful.
  - role: Program operations lead
    startTiming: Month 9
    rationale: Repeatable delivery, support, and production renewals need a dedicated owner before the company adds more than two live accounts.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2 paid maritime-integrator pilots tied to live exercises
      - Ship 2 repeatable connector paths and one standards-aligned mission schema
      - Convert at least 1 pilot into an annual production contract
      - Demonstrate a measurable reduction in exercise-prep effort or bespoke middleware work
  - horizon: 12–24 months
    items:
      - Reach 4 production programs and $12.0M modeled SOM trajectory across beachhead accounts
      - Add replay analytics, broader fallback-policy libraries, and second mission-cell expansion within existing customers
      - Land at least 1 coalition or adjacent unmanned program that reuses the core maritime tasking model
  - horizon: 24–36 months
    items:
      - Expand from exercise planning into recurring operational tasking and policy enforcement
      - Support multi-program portfolio visibility across at least 2 large integrator or ministry relationships
      - Prove whether the company can move beyond maritime into broader allied multi-domain unmanned workflows
risks:
  - risk: Prime or autonomy-stack vendors bundle enough orchestration to block a neutral layer before the company lands references.
    likelihood: High
    impact: High
    mitigation: Stay focused on mixed-vendor programs where customers resist handing the mission schema and audit layer to a direct platform rival.
  - risk: Defense procurement timing delays conversion from pilot to annual production contract.
    likelihood: High
    impact: High
    mitigation: Enter through exercise budgets, contract modifications, and integrator-owned pilots that can buy before a full program-of-record cycle.
  - risk: Secure or edge deployment requirements turn each account into a custom integration project.
    likelihood: Medium
    impact: High
    mitigation: Standardize the first connector set, support sanitized environments first, and hire platform or security capability before broadening the ICP.
  - risk: Customers value the workflow mainly as services-assisted planning support rather than software they will renew.
    likelihood: Medium
    impact: High
    mitigation: Tie early success to reusable outputs, annual conversion criteria, and strict limits on one-off feature work that does not improve the base product.
  - risk: The beachhead proves real but too narrow to support venture-scale expansion.
    likelihood: Medium
    impact: Medium
    mitigation: Instrument demand for second mission cells, adjacent vehicle types, and runtime policy modules from the first production cohort before scaling sales spend.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway should fund the core compiler team, first two connector paths, on-prem deployment capability, and enough forward-deployed support to land 2 paid pilots and convert at least 1 into production.
