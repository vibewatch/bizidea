competitors:
- name: Havoc
  stage: 扩张期
  wedge: 覆盖海、空、陆的一人多平台全域协同自主与 C2。
  pricing: 定制项目 / 合同报价
  strength: 叙事最接近，已有 25,000+ 小时部署、100+ 平台和主承包商背书。
  weaknessVsUs: 它是集成式自主栈和软件定义硬件模式，对那些需要压在第三方系统之上的中立编排层的买方来说，中立性反而不够。
  sourceRefs:
  - 1
- name: Anduril Mission Autonomy
  stage: 在位企业
  wedge: 任务自主软件，让多支无人系统团队在单一人类操作员监管下跨海、陆、空协同。
  pricing: 定制政府 / 企业报价
  strength: 分发能力很强，对异构无人团队的产品定位也很清楚。
  weaknessVsUs: 整栈高度一体化；客户未必愿意让 Anduril 掌握跨竞争平台的中立任务 schema 和审计工作流。
  sourceRefs:
  - 2
- name: Shield AI Hivemind
  stage: 扩张期
  wedge: 定位成可跑在多平台、多域上的任务自主大脑。
  pricing: 定制合同定价
  strength: 平台无关的自主信息传递能力，以及不断扩大的伙伴生态。
  weaknessVsUs: 重心仍在自主大脑，而不是审批界面设计、任务包编译和以审计为先的兜底工作流。
  sourceRefs:
  - 8
- name: Palantir Maven Smart System
  stage: 在位企业
  wedge: 用 AI 界面把分散的军用系统和情报来源融合成单一作战图景。
  pricing: program-of-record / 合同定价
  strength: 预算重力强，机构采纳也深，已经进入正式 DoD 项目。
  weaknessVsUs: 它擅长数据融合和作战决策支持，但不擅长在混合舰队里生成平台专属任务和失联策略。
  sourceRefs:
  - 12
- name: Thales PathMaster
  stage: 在位企业
  wedge: 面向海军的开放架构反水雷任务管理核心，支持第三方资产接入。
  pricing: 定制海军项目定价
  strength: 在反水雷场景里有真实作战履历，也明确强调开放系统之上的系统。
  weaknessVsUs: 更偏海上 MCM 垂直，而不是面向混合多厂商舰队的更广义全域编译器。
  sourceRefs:
  - 32
regulatoryTechnicalConstraints:
- point: 对抗、间歇或被拒止的通信不是边角问题，而是一阶设计约束。
  sourceRefs:
  - 24
  - 34
  - 36
- point: 负责任 AI 治理要求部署前后都要能拿出明确的人类判断、失效保护和可审阅产物。
  sourceRefs:
  - 41
  - 46
- point: 联盟互操作取决于 STANAG 4586 和 UCI/OMS 式 schema 这类对齐标准的接口。
  sourceRefs:
  - 48
  - 58
  - 59
  - 62
- point: 安全的本地或边缘部署会抬高集成成本，即便软件价值主张很清楚，也可能拖慢试点。
  sourceRefs:
  - 34
  - 41
  - 60
- point: 反水雷领域已经有成熟任务系统，因此创业公司必须学会共存，而不是指望整体替换。
  sourceRefs:
  - 29
  - 32
validationSignals:
- point: Havoc 声称一名作战人员就能对数千个异构自主系统完成任务下发、监视和监管。
  sourceRefs:
  - 1
- point: Task Force 59 在累计 30,000+ 小时 USV 运行和多次多国演习后，已达到全面作战能力。
  sourceRefs:
  - 24
- point: BALTOPS 23 把 UUV、UAV 和 USV 组合进反水雷流程，既缩短时间线，也降低了人员风险。
  sourceRefs:
  - 28
- point: 美国海军已宣布其机器人化 MCM 任务包达到 IOC。
  sourceRefs:
  - 29
- point: DIU 围绕 Replicator 对齐的自主海上能力收到了 100+ 份申请，说明供给和买方活动都是真实存在的。
  sourceRefs:
  - 111
openQuestions:
- 在主承包商把等价功能打包进更大自主栈之前，集成商会不会先买一层中立任务意图层？
- 哪组首批连接器最容易形成可复用切口：MCM 系统、海上 ISR USV，还是混合 USV/UAV 演习？
- 要让审计日志和兜底策略库明显优于手工中间件，到底需要多少涉密任务上下文？
- 一套任务 schema 能否满足联盟互操作要求，而不重新变成脆弱的定制集成层？
