slug: mixed-fleet-intent-compiler
date: '2026-05-13'
executiveSummary: Mixed Fleet Intent Compiler 面向海上防务集成商和海军无人单元：它们必须在现有厂商控制台和定制中间件还没法扩容之前，先把一场 20-200 资产规模的海岸监视或反水雷演习跑起来。产品压在现有自主栈之上，以本地部署的任务意图编译器形态，把一份获批计划转成平台专属任务包、失联兜底行为和可审计的人类控制日志。这个首个切口很扎实，因为买方手里已经有真实演习预算、明确的进度风险触发器，以及混合 USV/UAV 在退化通信下协同的可见痛点。公司应把首个部署卖成绑定一场临近演习的付费项目试点；一旦软件能缩短准备时间，并在量产阶段复用，再转成按活跃平台数和任务单元定价的年度项目许可。它最有可能赢的原因是中立性：主承包商、自主栈厂商和领域任务系统都自带产品重力，但客户未必愿意把跨厂商任务 schema 和覆盖记录交给任何一家平台厂商。整个计划刻意不去卖新的自主大脑、新硬件，或在海上演习价值尚未可复用之前就贸然做泛化的全域指挥控制。只有当产品能从规划和审计扩到持续策略执行、更多任务单元和更多盟军项目，在最初 3-4 个滩头部署后继续放大时，才有真正的风险投资上行。最大的反证风险是，主承包商会把足够多的编排能力打包进更大的合同里，让买方接受单厂商整栈，而不是为中立层单独拨款。公开定价可比样本仍然很薄，所以试点定价、转化率和首年 ACV 现在都还是需要尽早验证的假设。
problem:
- 混合舰队海上项目至今仍靠厂商控制台、电子表格版 CONOPS 和定制中间件做规划，因此舰队规模越大，演习准备时间涨得越快。
- 一旦通信退化，操作员需要的是事先批准的兜底行为和站得住脚的审计链，但这些控制在第三方自主栈之间很少能被一致生成。
- 项目经理和集成商现在已经能把几十个无人资产拉上场，可真正卡住规模上限的，仍然是人类监督和跨厂商任务下发。
solution:
- 把一份指挥官批准的任务计划、交战规则、地理围栏、资产健康输入和通信假设，编译成现有 USV 与 UAV 栈可直接执行的平台专属任务包。
- 把失联兜底策略和人类可读审计日志当作一等输出，这样系统既能加快发射准备，也能支撑负责任自主审查。
- 以本地部署或战术边缘部署的方式压在现有地面站之上，让客户保留现有载具和控制软件，同时减少定制集成。
whyWeWin:
- 公司卖的是中立的“计划到任务”层，不是载具、本体自主大脑，也不是新控制台；这让它更容易被集成商和部委放到彼此竞争的厂商之上。
- 滩头场景绑定的是近期演习或合同变更，进度风险和集成痛点都很显性，因此首个客户现在就有带预算的购买理由，不必继续观望。
- 可复用的任务 schema、适配器模板、兜底策略库和回放数据会随着每次部署越滚越厚，不是一支一次性服务团队就能轻易复制。
- 围绕 STANAG 4586、UCI、OMS 和开放自主架构的标准化势头，已经让厂商中立层在技术上比几年前更站得住。
strategicChoices:
  beachhead: 在间歇通信环境下，运行 20-200 资产规模海岸监视或反水雷演习的海上防务集成商和海军无人单元；它们同时使用至少三家厂商的混合 USV 与 UAV。
  wedgeRationale: 这条工作流买点最清楚、验证周期最短、平台冲突也最小。客户只要跑完一个演习周期，就能判断编译器有没有缩短规划时间、减少定制中间件工作，并产出可进审计的失联手册。若一开始就做更宽泛的全域任务软件，公司会在还没拿到证明之前，就被拖进更长的采购周期和更强势的主承包商正面竞争。
  sequencingRationale: 产品先做任务计划导入、任务包编译、兜底策略生成和回放，因为这些能力既是赢下首个试点的门槛，也是沉淀可复用部署数据的起点。GTM 前期继续由创始人直接打进集成商和演习负责人，等两条连接器路径和一条审批流程都跑通，再谈规模化销售和更大的伙伴计划。招聘顺序也一样：先补核心编译器和集成人才，再补安全部署和前线支持，最后才放大销售动作。
  notYet:
  - 不卖完整自主大脑，也不替换各平台现有控制软件
  - 在三个国防 logo 跑通之前，不急着扩到商业海工、港口或关键基础设施舰队
  - 在海上任务下发和审计输出尚未可复用之前，不碰宽泛的全域指挥控制工作流
  - 在非密或脱敏滩头场景尚未验证之前，不追那些一上来就要求深度定制集成的高度涉密项目
market:
  tam: 约 $700.0M TAM：大致对应 175 个美国及盟友无人项目单元，每个单元每年约 $4.0M 的编排与审计软件加部署价值。
  sam: 约 $135.0M SAM：大致对应 45 个海上海岸监视与反水雷任务单元，每个单元年合同价值约 $3.0M。
  som: 第 3 年可触达的 $12.0M SOM：按 4 个已落地滩头项目、每个约 $3.0M ACV 估算，由集成商主导演习切入再转量产。
  segments:
  - 为美国海军、海军陆战队和盟军海军客户运行混合 USV/UAV 演习的海上防务集成商
  - 等海上切口跑通后，再进入盟军海军无人项目办公室和主承包商主导的多域项目
  buyingProcess: 销售应该从演习前 90-180 天的自主作战负责人、任务规划官或演习负责人打起；当团队看到和即将到来的演习绑定的任务包草案与审计日志，再推进到 VP Programs 或项目经理。首单最好包装成由演习预算、试点预算或合同变更预算支付的项目试点，等工作流在第二场活动或量产周期里被复用后，再谈年度转化。
product:
  mvp: MVP 覆盖任务计划导入、厂商专属任务包生成、失联兜底策略模板，以及一场混合 USV/UAV 海上演习的事后回放。首批只支持很窄的连接器集合，并以本地或边缘部署方式运行，而不是妄图替换现有自主栈。
  sixMonth: 支持 1 个付费试点，交付两条连接器路径、一条兜底策略审批流程、回放导出能力，以及可在非密或脱敏演习环境部署的本地化安装包。
  twelveMonth: 补齐更多海上任务模板、对齐标准的 schema 映射、可复用审计产物，以及第二个量产部署——大部分连接器和策略库都沿用首个部署成果。
  twentyFourMonth: 从演习规划扩到持续的项目运行、运行时策略执行、每个账户里的更多任务单元，以及共享同一中立任务层的联盟或多域无人工作流。
  keyBets:
  - 在主承包商或自主厂商把相似功能打包进大合同之前，买方愿意先为中立意图层付费。
  - 前两条连接器路径足以覆盖首年大部分机会，不会把每次部署都拖成定制集成项目。
  - 脱敏任务计划和事后数据足以先证明 ROI，而不是一开始就要支持深度涉密部署。
  - 审计和兜底输出在负责任自主审查里足够关键，能真正进入购买决策，而不只是合规附件。
gtm:
  wedge: 面向 90-180 天内就有海岸监视或反水雷演习的防务集成商或海军自主单元，先卖一单付费任务意图试点；等客户在下一场活动里复用这套工作流和审计输出，再转成年项目许可。
  channels:
  - 由创始人直接销售给与临近演习绑定的防务集成商、海军自主单元和项目经理
  - 与主承包商及自主 OEM 合作，把公司定位成压在现有载具和任务系统之上的中立编排层
  - 围绕 DIU、Replicator 式实验或合同变更做项目试点，而不是苦等完整 program of record
  funnelTargets: 目标账户到合格试点 20-30%，合格试点到付费试点 30-40%，付费试点到年度量产 50%+，量产账户在 12 个月内再扩第二个任务单元 30%+。
  pricing: 首个部署按一场演习和首批连接器打包成 $250k-$500k 的付费试点；之后转成按活跃平台数和任务单元定价的 $1.5M-$3.0M 年度项目许可，涉密或边缘环境另收部署费。这个定价假设的前提，是买方会从项目预算里出钱，而不是从按席位计费的软件科目里买。
businessModel:
  revenueStreams:
  - 绑定特定演习、试点中标或合同变更的付费试点
  - 按活跃项目、平台数量和任务单元计价的年度软件许可
  - 部署、连接器和安全环境集成费用
  - 面向回放分析、更多策略库和运行时策略执行的扩展模块
  unitOfValue: 活跃混合舰队项目年
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一集成商或部委账户里增加更多任务单元、载具类型和连接器覆盖
  - 从演习规划扩到持续的作战任务下发与策略执行
  - 把中立 schema 与审计工作流复用到联盟伙伴及相邻的地面或空中项目
  - 向已部署账户继续销售升级版兜底策略库和回放分析
strategyMap:
  northStarMetric: 在两个及以上演习或作战周期里，通过编译器跑获批计划的量产任务单元数量
  inputMetrics:
  - 每季度签下的付费试点数
  - 每次部署减少的演习准备天数
  - 试点转量产比率
  - 接入一个新平台适配器的中位时间
  - 由产品生成并带审批通过的兜底策略与回放导出在任务中的占比
  moatsToBuild:
  - 覆盖混合海上舰队的厂商中立任务 schema 与适配器库
  - 来自退化通信部署的专有兜底策略与回放数据集
  - 嵌入项目评审与事后复盘流程的人类审批与覆盖工作流
  killCriteria:
  - 聚焦海上集成商销售 12 个月后，付费试点仍少于 2 个
  - 前 4 个付费试点之后，试点转量产低于 30%
  - 第 3 次部署之后，适配器接入中位时间仍高于 6 个工程师周
  - 客户在正式演习复盘或量产流程中，依旧拒绝使用审计日志或兜底输出
  mermaid: |
    flowchart LR
      Wedge[Maritime exercise wedge] --> MVP[Intent compiler MVP]
      MVP --> Proof[Shorter prep plus audit proof]
      Proof --> Expansion[More mission cells and programs]
investorMemo:
  verdict:
    call: 观察
    conviction: 客户痛点和时间窗口都很清楚，但能不能投，取决于公司能否证明：在主承包商把工作流吃进去之前，中立层就能先拿到预算。
    whyBelieve: 计划抓住的是一个已经有预算的演习瓶颈：混合舰队协同、退化通信和可审计性会同时爆发，确实给中立覆盖层留出一个可信入口。
    whyDoubt: 独立品类规模不算大，竞争又挤，公司很可能在主承包商打包方案和服务化集成之间被夹住，软件经济性还没长出来就被拖死。
    nextDiligence: 先拿下 2 个海上集成商付费试点，并验证其中至少 1 个能在不做定制涉密版本的前提下转成年量产合同。
  firstCustomer:
    title: 海上防务集成商里的项目经理
    profile: 一家 100-1,000 人的防务集成商，正为美国或盟军海军客户准备一场由 20-100 个混合 USV 与 UAV 组成的海岸监视或反水雷演习。
    trigger: 临近的演习、试点中标或合同变更，让一个作战单元必须监管比现有厂商控制台和定制中间件更大规模的无人资产。
    buyer: VP Programs 或项目经理
    initialContract: 首单是 $250k-$500k 的付费试点，覆盖一场演习和首批连接器；如果客户在下一次活动或量产周期里继续复用，再转成 $1.5M-$3.0M 的年度项目许可。
  mustBeTrue:
  - 前 12 个目标集成商或海军买方里，至少 5 个确认能在 180 天内用即将到来的演习或改装预算支付付费试点。
  - 前两条连接器路径能覆盖首年 60% 以上的合格机会，而不用替换平台本身。
  - 客户在第二场活动里复用工作流后，至少 50% 的付费试点能转成年量产合同。
  - 客户愿意把审计日志和兜底策略输出纳入真实演习复盘或负责任自主审批环节。
  - 在公司落地 4 个量产项目之前，主承包商或自主栈厂商不会先把中立层挤掉。
  diligenceQuestions:
  - 首个试点到底走哪条预算线：演习运营、集成服务，还是项目软件预算？
  - 目标项目到底要多深的涉密数据，才会信任任务下发和兜底建议？
  - 哪两套自主栈或消息 schema 能覆盖近期海上机会里最大的份额？
  - 如果同一轮采购里 Anduril、Havoc、Shield AI 或主承包商也卖相邻编排能力，集成商还会不会买中立层？
  - 首个部署要拿出什么证据，才能证明进度压缩强到足以支撑年度转化？
operatingAssumptions:
- assumption: 海上集成商能在一个销售周期内，用演习预算或合同变更预算批准一单付费试点。
  basis: research.yaml
  validationTest: 在 180 天内围绕真实演习签下 2 个付费试点，而不用等完整 program-of-record 采购。
  decisionImpact: 如果做不到，公司就得更依赖主承包商渠道，或者上探到更慢但更大的项目。
- assumption: 一组很窄的首批连接器就能覆盖大部分早期管道需求。
  basis: research.yaml
  validationTest: 把 10 个合格机会逐一映射，确认至少 6 个能落进前两条连接器路径，且接入时间低于 30 个工程日。
  decisionImpact: 如果做不到，部署成本和销售速度都会击穿软件模型，只能把 ICP 再收窄。
- assumption: 在真正支持全涉密部署前，脱敏任务数据已经足以证明任务编译、兜底输出和回放的价值。
  basis: research.yaml
  validationTest: 用非密或脱敏输入跑一个试点，并确认客户至少采用一份系统生成的任务包或策略产物。
  decisionImpact: 如果做不到，路线图和融资需求都必须更早转向安全域和涉密支持。
- assumption: 客户愿意接受与项目预算相匹配的试点和量产价格，而不是逼公司主要按服务计费。
  basis: idea.yaml
  validationTest: 从 2 个共创客户那里拿到不低于建议试点价位的签字价格，并拿到 1 份年度许可预算的书面意向。
  decisionImpact: 如果做不到，定价、毛利目标和融资计划都要按服务驱动模型重算。
- assumption: 同一套中立 schema 与审计工作流，能从滩头切口扩到更多任务单元和相邻无人项目。
  basis: 运营判断
  validationTest: 在前 4 个量产部署里，至少有 2 个客户提出扩到第二个任务单元、更多载具类型或相邻项目。
  decisionImpact: 如果做不到，投资人就应该把公司按海上垂直工作流产品，而不是更大的自主控制层来承保。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 12 位海上集成商项目经理、自主负责人和演习规划官，收集他们今天用来做混合舰队任务规划和失联审批的真实材料。
  hypothesis: 首个买方愿意付钱，是为了压缩真实演习里的规划和审计工作，而不是购买泛化自主软件。
  successMetric: 至少 8 场访谈把规划开销或兜底审批负担列进前三大问题，且有 3 个账户愿意拿近期演习继续跟进。
  owner: CEO
- horizon: 0–90 天
  experiment: 先做一个人工辅助的样板原型，把一份示例任务计划转成任务包、兜底行为和可回放的审计日志。
  hypothesis: 买方会先看输出能不能直接用于即将到来的演习决策，而不是一开始就关心全自动化。
  successMetric: 3 个共创客户确认，这套输出明显优于现有电子表格或中间件文档，并同意进入付费试点范围界定。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 先搭出最常出现在合格管道里的两条自主栈或消息 schema 连接器路径。
  hypothesis: 两条连接器就能解锁首年大部分滩头机会，而不用走定制集成路线。
  successMetric: 60% 以上的合格机会落在这两条连接器路径内，且接入中位时间低于 30 个工程日。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 在一个非密或脱敏的海岸监视/反水雷演习环境里，跑通首个付费试点。
  hypothesis: 这套编译器既能实打实减少准备时间，也能产出客户真会拿去评审的审计材料。
  successMetric: 客户确认准备工作或定制集成工作量至少下降 20%，并在 30 天内要求量产方案。
  owner: 任务自主负责人
- horizon: 180–360 天
  experiment: 交付第二个部署，复用首套连接器和策略库，同时新增一个任务单元或一种载具类型。
  hypothesis: 首个部署之后，扩张经济性会明显改善，因为适配器和策略工作可以复用。
  successMetric: 第二个部署的落地时间不超过首个的一半，并且毛利仍能落在目标假设内。
  owner: 前置部署工程师
- horizon: 180–540 天
  experiment: 把任务 schema 和审计输出交给一位联盟互操作或标准负责人评审，映射到一条 STANAG/UCI 对齐工作流。
  hypothesis: 与标准对齐能降低买方对“又一个专有中间层”的顾虑，并提升联盟扩张概率。
  successMetric: 至少有 1 个共创客户或顾问确认，这套 schema 可以在不做大改的前提下，与标准对齐工作流双向往返。
  owner: 产品负责人
operations:
- 建立隔离网和边缘部署流程，支持版本化发布、回滚，以及脱敏数据环境。
- 建立任务 schema 与兜底策略的 QA 流程，在演习输出获批前保留人工复核。
- 为每一种支持的自主栈和消息 schema 建立适配器认证清单。
- 建立事后回放与审计留存流程，既支持客户复盘，也避免暴露不必要的涉密上下文。
- 管理主承包商、集成商和标准伙伴关系，确保能拿到连接器访问权限和部署批准。
team:
- role: 首席执行官
  startTiming: 第 0 月
  rationale: 要拿下首批共创客户、打磨滩头切口并卡住防务项目节奏，前期必须由创始人亲自打单。
- role: 创始工程师
  startTiming: 第 0 月
  rationale: 从第一天起，公司就必须自己掌握任务计划导入、schema 管理和连接器架构这些核心产品能力。
- role: 任务自主负责人
  startTiming: 第 1 月
  rationale: 只有补上领域可信度，才能把指挥官意图和兜底行为变成操作员和买方都敢信的工作流。
- role: 前置部署集成工程师
  startTiming: 第 4 月
  rationale: 早期能不能赢，关键在于本地部署试点能否尽快上线，而不是让核心产品团队一直被客户部署细节拖住。
- role: 安全 / 平台工程师
  startTiming: 第 6 月
  rationale: 一旦首个试点成功，本地打包、审计控制和安全环境支持就会变成硬门槛。
- role: 项目运营负责人
  startTiming: 第 9 月
  rationale: 在公司拥有超过两个活跃账户之前，就要有人专门把交付、支持和量产续约做成可复制流程。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2 个绑定真实演习的海上集成商付费试点
  - 交付 2 条可复用连接器路径和 1 套与标准对齐的任务 schema
  - 至少把 1 个试点转成年量产合同
  - 证明演习准备工作或定制中间件工作量有可量化下降
- horizon: 12–24 个月
  items:
  - 在滩头账户里做到 4 个量产项目，并跑上 $12.0M 的建模 SOM 轨迹
  - 补齐回放分析、更宽的兜底策略库，以及老客户里的第二个任务单元扩张
  - 至少拿下 1 个复用海上核心任务模型的联盟或相邻无人项目
- horizon: 24–36 个月
  items:
  - 从演习规划扩到持续的作战任务下发与策略执行
  - 在至少 2 个大型集成商或部委关系里，支持跨项目组合可视化
  - 验证公司能否从海上继续扩到更广的盟军多域无人工作流
risks:
- risk: 主承包商或自主栈厂商把足够多的编排能力打包进去，在公司拿到标杆客户前就封死中立层。
  likelihood: High
  impact: High
  mitigation: 继续聚焦混合多厂商项目，专打那些客户不愿把任务 schema 和审计层交给直接平台对手的场景。
- risk: 国防采购节奏拖慢试点转年度量产合同。
  likelihood: High
  impact: High
  mitigation: 先从演习预算、合同变更和集成商自有试点切入，让客户在完整 program-of-record 周期前就能先买。
- risk: 安全或边缘部署要求把每个账户都拖成定制集成项目。
  likelihood: Medium
  impact: High
  mitigation: 把首批连接器标准化、优先支持脱敏环境，并在扩大 ICP 前先补齐平台或安全能力。
- risk: 客户主要把这套工作流当成需要服务辅助的规划支持，而不是愿意续费的软件。
  likelihood: Medium
  impact: High
  mitigation: 把早期成败绑到可复用输出、年度转化标准，以及严格限制那些不能增强基础产品的一次性需求上。
- risk: 滩头需求确实存在，但太窄，撑不起风险投资级扩张。
  likelihood: Medium
  impact: Medium
  mitigation: 在放大销售投入前，先从第一批量产客户里量化第二任务单元、相邻载具类型和运行时策略模块的真实需求。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3-5M
  runwayMonths: 18
  useOfFundsSummary: 18 个月跑道应足以覆盖核心编译器团队、前两条连接器路径、本地部署能力，以及拿下 2 个付费试点并至少把 1 个转量产所需的前置部署支持。
