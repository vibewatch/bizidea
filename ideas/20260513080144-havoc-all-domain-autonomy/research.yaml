    - 8
  - "incumbentClass": "Data-fusion and C2 platforms"
    "point": "Palantir and L3Harris can centralize data and supervision, but they do not automatically solve vendor-specific task-bundle generation and comm-loss policy translation across heterogeneous autonomy stacks."
    "sourceRefs":
    - 12
    - 92
  - "incumbentClass": "Domain-specific mission systems"
    "point": "Thales PathMaster is credible in mine warfare and open architecture, yet its strength is maritime mission management rather than a generalized all-domain compiler that sits above arbitrary vendors."
    "sourceRefs":
