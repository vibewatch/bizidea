    - 46
  "willingnessToPay":
    "summary": "Public pricing is scarce, but spending evidence is strong: Havoc and Saronic raised large rounds around collaborative and maritime autonomy, L3Harris markets one-interface control of thousands of heterogeneous assets, DIU is pushing non-traditional vendors into Replicator, and defense-tech funding hit a record in 2025. That supports quote-based program budgets for orchestration software when it reduces exercise risk and integration labor [1][15][92][107][111]."
    "sourceRefs":
