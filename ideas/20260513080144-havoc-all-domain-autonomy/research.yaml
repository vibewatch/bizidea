  "competitiveLandscape": "Competition is intense but mostly adjacent. Havoc, Anduril, and Shield AI attack mission autonomy and command layers; Palantir compresses data fusion and targeting workflows; Thales owns a strong open-architecture mine-warfare core; primes and integrators can also stitch together in-house middleware. The startup wins only if it becomes the neutral “intent-to-tasking plus audit” layer that customers can place above mixed third-party stacks without handing the schema to a direct platform rival [1][2][8][12][32][52][92]."
  "incumbentThesis":
  - "incumbentClass": "Autonomy-stack vendors"
    "point": "Anduril, Shield AI, and Havoc ship autonomy or collaborative-control layers, but integrators and ministries may resist letting a direct platform competitor own the neutral mission schema, fallback policy library, and audit corpus across third-party fleets."
    "sourceRefs":
