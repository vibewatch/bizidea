modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      TargetAccounts --> QualifiedPilots
      QualifiedPilots --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by converting 2 exercise-funded pilots into 4 production programs at about $2.1M realized revenue per program by Y3.
- checkName: Must go right
  finding: The company has to keep connector reuse high enough that secure deployments stop consuming gross margin after the first two live programs.
- checkName: Model breaks if
  finding: If pilot approval drifts toward a 12-month cycle, the sales-cycle sensitivity shows the pre-seed round must grow materially because Y2 remains loss-making.
- checkName: Next-round proof
  finding: The next financing is justified once 4 production programs are live and the company can show that Y3 margins are benefiting from reusable connectors rather than custom services.
sanityChecks:
  ruleOf40: Y3 growth 211% + EBITDA margin 31% = 242%; directionally strong but flattered by a lumpy defense-contract ramp off a small Y2 base.
  burnMultiple: Y2 burn multiple is about 0.3x ($0.5M EBITDA burn on roughly $2.0M of year-over-year revenue expansion), then flips cash-generative in Y3.
  revenuePerFte: $600K Y3 ($8.4M revenue on 14 FTE; above typical SaaS because contracts are program-sized and the model assumes deployment work stays bounded).
  flags:
  - The base case still assumes 2 paid pilots are signed by Month 10 and 4 production programs are live by the end of Y2; defense-procurement slips would push the funding need above the current ask.
  - Public pricing and retention comparables for vendor-neutral autonomy orchestration are thin, so CAC and churn remain heuristic rather than benchmarked.
  - 'Revenue concentration is high: with only 4 production programs in Y3, one delayed renewal or a prime-led bundle could move results materially.'
  - Y3 revenue per FTE is attractive but only believable if secure on-prem delivery becomes repeatable instead of turning into a services-heavy deployment motion.
