assumptions:
- id: A1
  name: Model start month
  value: 2026-05
  unit: month
  source: '[BP date 2026-05-13]'
- id: A2
  name: Starting cash after pre-seed close
  value: '3000'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $3-5M]; base case uses a $3.0M close to fund the Y2 milestone set plus a six-month cash buffer.'
- id: A3
  name: Paid pilot price
  value: '300'
  unit: USDK per exercise
  source: '[BP gtm.pricing $250k-$500k paid pilot]; base case uses the midpoint for one exercise and first connector set.'
- id: A4
  name: Steady-state production ACV
  value: '2100'
  unit: USDK per program-year
  source: '[BP gtm.pricing $1.5M-$3.0M annual program license]; base case uses a conservative midpoint below the $3.0M SOM ceiling.'
- id: A5
  name: Year-1 revenue ramp
  value: 2 paid pilots signed in M7 and M10; 1st-year recognized revenue totals $675K
  unit: timing
  source: '[BP milestones: sign 2 paid pilots and convert at least 1 to production]; [Research buyingTriggers and distributionChannels: live exercise inside 90-180 days].'
- id: A6
  name: Year-2 production ramp
  value: Q1Y2-Q4Y2 revenue of 375, 525, 750, and 1050 USDK with 4 production programs live by year-end
  unit: USDK by quarter
  source: '[BP milestones 12-24 months: reach 4 production programs]; base case assumes procurement stays lumpy and most annual-license revenue lands in H2.'
- id: A7
  name: Year-3 realized revenue per live program
  value: '2100'
  unit: USDK per program-year
  source: '[Research market.som rationale: 4 landed programs at ~$3.0M each]; base case underwrites only $2.1M realized revenue per program because some mission-cell expansion arrives gradually.'
- id: A8
  name: Gross margin ramp
  value: 55% Y1, 62% Y2, 70% Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70]; startup-finance heuristic assumes pilots are services-heavy early and delivery margins improve after connector reuse.'
- id: A9
  name: Founder cash compensation
  value: '180'
  unit: USDK annualized
  source: Startup-finance heuristic for a defense-tech founder taking below-market cash comp at pre-seed.
- id: A10
  name: Engineering cash compensation
  value: '200'
  unit: USDK annualized per FTE
  source: '[BP team requires compiler, autonomy, and security talent]; startup-finance heuristic for cleared-adjacent robotics software talent with payroll burden.'
- id: A11
  name: Deployment or integration cash compensation
  value: '180'
  unit: USDK annualized per FTE
  source: '[BP team: forward deployed integration engineer]; startup-finance heuristic for field deployment talent with travel-heavy support load.'
- id: A12
  name: Sales or partnerships cash compensation
  value: '190'
  unit: USDK annualized per FTE
  source: '[BP sequencingRationale: scaled sales later]; startup-finance heuristic for one defense-account executive with modest cash plus variable comp.'
- id: A13
  name: Operations or G&A cash compensation
  value: '150'
  unit: USDK annualized per FTE
  source: '[BP team: program operations lead]; startup-finance heuristic for finance, contracts, and back-office support.'
- id: A14
  name: Hiring ramp
  value: CEO and founding eng at M0, mission autonomy lead in M1, forward deployed engineer in M4, security or platform engineer in M6, program ops in M9, then one seller, one engineer, a second deployment FTE, and a finance or ops hire during Y2; Y3 adds two engineers, one seller, and one deployment FTE
  unit: timing
  source: '[BP team startTiming and sequencingRationale] plus startup-finance heuristic for when founder-led sales can hand off to a small GTM team.'
- id: A15
  name: Non-payroll operating spend
  value: Sales and travel 12-32 USDK per month, R&D tooling and security 12-28 USDK per month, and G&A/legal/compliance 16-29 USDK per month
  unit: USDK per month
  source: '[Research regulatoryTechnicalConstraints: secure on-prem and edge deployments raise cost]; startup-finance heuristic for travel, legal, insurance, and compliance in defense software.'
- id: A16
  name: Steady-state CAC
  value: '600'
  unit: USDK per production program
  source: '[BP gtm.funnelTargets] and [Research reportMemo.customerAndBuyer]; heuristic assumes founder time, travel, solutioning, and long enterprise capture cycles in a concentrated buyer set.'
- id: A17
  name: Monthly churn proxy
  value: '3.0'
  unit: percent
  source: Startup-finance heuristic that translates annual program-renewal and budget risk into a monthly equivalent for LTV math; public comparables were not available in research inputs.
- id: A18
  name: Cash conversion policy
  value: EBITDA approximates cash movement
  unit: policy
  source: 'Startup-finance heuristic: no debt, capex, or working-capital build is modeled separately at this stage.'
