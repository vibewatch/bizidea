slug: portfolio-backed-upi-credit-api
date: '2026-07-02'
executiveSummary: >-
  组合抵押 UPI 信用 API，是一层放贷编排与抵押品管控服务，面向想在不自己做放贷方的前提下，为客户组合提供即时流动性的印度券商和财富应用。研究证实基础轨道已经就位：RBI 已经放开了 UPI 上的预授信信用额度，银行已经在运营资产抵押产品，公开的共同基金抵押贷款（LAMF）产品也证明了终端借款人的真实需求。第一个值得押注的切口，是面向用户规模 200 万到 1500 万、AUM 可观、没有自有银行或 NBFC 的独立券商和财富应用，做纯共同基金抵押的信用产品——因为这批买家的痛点紧迫，而自身信贷基础设施薄弱。产品应该先做成一个仅覆盖共同基金、人工参与决策的系统，负责抵押品估值、授权采集、放贷方策略编排、保证金处置和报送，而不是一上来就做多资产的通用放贷平台。市场打法只有在满足以下条件时才成立：首个客户正处于竞争或变现压力下、愿意为首发套餐付费，并且认为这比花 12 到 18 个月自建、外加损失掉的 AUM 活跃度更划算。最强的战略资产是分销侧的持仓集成、跨放贷方复用的规则库，以及关于提款、违约和回收行为的跨平台表现数据。最大的证伪风险不是消费者需求，而是中型券商到底更愿意要白标嵌入式信用产品，还是更愿意走转介分成的路子。由于测算出的滩头市场 TAM 只有约 1200 万美元，且分销商付费意愿的直接证据仍然有限，投资姿态定为"观察"，要等公司拿到放贷方的条款清单，并落地一到两个付费共创客户之后再评估。
problem:
  - "印度的独立券商和财富应用握着客户的大量投资组合，却没法在不自建放贷合作关系、抵押品管控和数字信贷合规能力的情况下，提供即时的组合抵押流动性。"
  - "自建这套系统需要接入 CAMS、KFintech 或存管工作流、放贷方策略逻辑、违约处置和 UPI 信用管控，这些大多数产品团队根本没法在一个路线图周期内做出来。"
solution:
  - "提供一个 API 和运营控制台，把分销商的持仓账本接到合作银行或 NBFC，用于发放共同基金抵押的 UPI 信用额度。"
  - "自动化资格核验、折价率、授权、补仓和冻结流程、放贷方报送和异常处理，同时让分销商保留客户关系和应用界面。"
whyWeWin:
  - "产品是围绕分销商的持仓数据、产品路线图和合规流程设计的，而不是围绕放贷方核心系统设计的，这就缩短了非银行平台的上线时间。"
  - "每一次部署都在积累可复用的抵押品规则、放贷方策略模板，以及跨平台的表现数据——这些是通用 CLOU 厂商和直接面向消费者的放贷方天然不会拥有的。"
strategicChoices:
  beachhead: "印度独立折扣券商和共同基金直投应用，用户规模 200 万到 1500 万，客户 AUM 超过 5 亿美元，没有自有银行或 NBFC，正在上线共同基金抵押的流动性功能。"
  wedgeRationale: "这个细分市场有明确的触发点——功能追平和 ARPU 压力——却缺乏自建放贷方和抵押品运营的能力。从共同基金切入比做更广的组合信用更快见效，因为 CAMS 和 KFintech 的质押流程比股票直接质押更标准化，而且中型分销商的推进速度，比内部团队更强的前三大券商更快。"
  sequencingRationale: "顺序是先搭放贷方矩阵，再建共同基金抵押引擎，然后落地付费共创客户，最后才是股票扩展——且只有在违约处置和合规管控已在生产环境跑通之后才推进。这个顺序让招聘先聚焦在风控和集成工作上，再铺开大规模市场打法，避免过早承诺前两家放贷方都不会核保的资产类别或用例。"
  notYet:
    - "在共同基金质押覆盖和违约处置流程验证之前，先做股票抵押信用"
    - "有自有放贷或银行牌照的前三大券商"
    - "直接面向消费者的贷款分销"
    - "通用无抵押或先买后付（BNPL）信用产品"
market:
  tam: "约 1200 万美元估算 TAM，基于约 20 个可触达的印度券商和财富平台，每个已上线应用年收入约 60 万美元测算。"
  sam: "约 600 万美元估算滩头 SAM，基于约 10 个没有自有放贷牌照的独立平台，每个应用混合年收入约 60 万美元测算。"
  som: "约 180 万美元估算第 3 年 SOM，基于 4 个已投产客户，分阶段上线并完成放贷方接入后，每个应用混合年收入约 45 万美元测算。"
  segments:
    - "主要客群：没有自有放贷牌照的印度独立折扣券商和共同基金直投应用"
    - "次要客群：持有散户投资资产的独立财富管理、智能投顾和新银行财富板块"
  buyingProcess: >-
    日常推动者通常是产品负责人或新业务负责人，但风控、合规以及合作放贷方的项目团队，必须在上线前批准抵押品规则、授权流程和违约处置方案。一旦该功能被纳入活跃留存、变现或竞争响应的路线图，经济层面的审批通常落在 CEO 或产品负责人身上。
product:
  mvp: >-
    MVP 应支持面向一个分销商、两套放贷方策略配置的共同基金抵押 UPI 信用额度，涵盖持仓接入、资格规则、折价率计算、授权采集、额度开通、补仓和冻结流程，以及放贷方报送。清算和异常处理应保持人工参与决策，并排除直接股票、另类资产和全自动催收。
  sixMonth: "上线 2-3 个共创客户试点，覆盖 CAMS 或 KFintech 的共同基金数据，控制台可配置放贷方策略，具备用途和 MCC 管控，以及每日抵押品健康监测。"
  twelveMonth: "把 1-2 个试点转为正式投产，为一家获批放贷方补上有选择的存管支持的直接股票抵押，并上线更强的审计日志、审批流程和平台分析。"
  twentyFourMonth: "针对 4 个投产客户，在共同基金和精选股票资产上运营为一个多放贷方的抵押编排层，配备可复用的违约处置手册、更快的接入模板，以及关于开通率和风险表现的基准数据。"
  keyBets:
    - "共同基金是正确的首发抵押品类别，因为数字质押覆盖比股票更干净。"
    - "中型分销商会为白标嵌入式信用付费，而不是默认选择简单的转介分成模式。"
    - "两家或更多放贷方会接受一套可配置的策略引擎，而不是要求为每个项目做定制集成。"
    - "人工参与决策的违约处置，会比一上来就承诺全自动化更快赢得信任。"
gtm:
  wedge: "把一份付费的共同基金抵押 CLOU 上线套餐，卖给一家需要应用内流动性、又不想自建放贷方和抵押品运营体系的独立券商或财富应用。"
  channels:
    - "创始人主导的外呼触达，锁定 10-20 个目标券商和财富应用的 CEO、产品负责人和新业务负责人"
    - "与寻求资产抵押信用分销渠道的合作银行、NBFC 和 CLOU 基础设施提供商联合销售"
    - "与 CAMS、KFintech 以及已在抵押品流程中的相邻放贷厂商建立集成和转介合作"
  funnelTargets: "目标客户到合格商机转化率 25%-35%，合格商机到付费试点转化率 20%-30%，试点到正式投产转化率 50% 以上，投产到第二家放贷方或资产扩展转化率 12 个月内 40% 以上。"
  pricing: "先收取一笔付费的上线与集成费，再按年收取平台费，外加已提取余额 50-100 个基点的分成，因为买家会拿这笔支出，和 12 到 18 个月的内部自建成本、流失的应用内借贷需求，以及放贷方与抵押品运营的持续成本作比较。"
businessModel:
  revenueStreams:
    - "首次上线的付费实施和放贷方策略搭建费"
    - "抵押品监控、管控和报送的年度平台订阅费"
    - "与合作放贷方就已提取信用额度余额的收入分成"
    - "新增放贷方、资产类别和高级风控模块的扩展费"
  unitOfValue: "每个已上线的分销商项目，加上受监控的已提取信用额度余额"
  targetGrossMarginPct: 70
  expansionLevers:
    - "为同一分销商增加第二、第三家放贷方，做额度冗余和定价冗余"
    - "在共同基金运营稳定后，从共同基金扩展到精选的直接股票抵押"
    - "向现有客户销售合规、审计和基准分析模块"
    - "用同一套抵押品引擎，从券商拓展到独立财富平台和新银行财富板块"
strategyMap:
  northStarMetric: "在放贷方策略范围内、且没有未解决抵押品违约的已提取组合抵押 UPI 信用余额"
  inputMetrics:
    - "从试点签约到首笔实际生效信用额度的天数"
    - "通过数字质押流程实现运营化的目标客户 AUM 百分比"
    - "试点转正式投产的转化率"
    - "解决补仓、冻结或违约事件的中位时长"
    - "已投产平台上符合条件用户的月度开通率"
  moatsToBuild:
    - "覆盖折价率、集中度限制、违约触发和清算顺序的跨放贷方规则库"
    - "对接 CAMS、KFintech 和存管工作流的分销商侧集成，能缩短上线周期"
    - "关于多个非银行平台开通率、使用率、违约频率和回收表现的基准数据"
  killCriteria:
    - "前 6 个月内，不足 2 家放贷方为非银行分销商主导的共同基金 CLOU 提供商业条款草案。"
    - "首批 8 个合格 ICP 客户中，不足 2 家愿意接受付费试点，而不是走转介或观望自建的路子。"
    - "首个共创客户目标共同基金 AUM 中，能数字化运营化的比例低于 70%。"
  mermaid: |
    flowchart LR
      Wedge[Mutual fund CLOU wedge] --> MVP[Collateral and lender control MVP]
      MVP --> Proof[Paid pilots and low breach ops]
      Proof --> Expansion[Equities and multi lender expansion]
investorMemo:
  verdict:
    call: "观察"
    conviction: "基础设施切口清晰，监管时机也真实存在，但在买方预算和放贷方意愿被付费部署验证之前，信心程度仍属中等。"
    whyBelieve: "轨道、借款人行为和相邻基础设施赛道都已得到验证，这让分销商侧的抵押品编排，成为一个可信的下一个控制点。"
    whyDoubt: "客户名单本身高度集中，而核心需求问题——白标嵌入式信用 vs. 转介分成——在真实买家群体中仍未得到证实。"
    nextDiligence: "拿到 2 份放贷方条款清单、2 个付费共创客户试点，以及一份能证明共同基金运营在上线时可数字化运转的抵押品覆盖矩阵。"
  firstCustomer:
    title: "印度独立折扣券商的产品负责人"
    profile: "一家位于孟买或班加罗尔的券商或共同基金直投应用，用户规模 200 万到 1500 万，客户 AUM 超过 5 亿美元，没有自有放贷牌照，想加一个信用驱动的留存功能，又不想自建信贷团队。"
    trigger: "竞对上线了应用内的抵押信用产品，或者活跃客户增长放缓到一定程度，让存量 AUM 变现成了董事会级别的优先事项。"
    buyer: "产品负责人"
    initialContract: "8-12 周的付费试点，价格约 4 万-8 万美元，针对首个共同基金抵押产品；一旦首家放贷方和首批用户群跑起来，转为约 20 万-45 万美元的年度平台收入，外加按余额分成。"
  mustBeTrue:
    - "至少 2 家受监管的放贷方，必须在可标准化的条款下，为非银行分销商核保共同基金抵押 CLOU。"
    - "至少 30% 的合格滩头平台，必须更愿意选择白标嵌入式信用，而不是转介分成。"
    - "首批共创客户，必须能通过数字质押流程，运营化至少 70% 的合格共同基金 AUM。"
    - "至少 50% 的付费试点，必须在上线后 6 个月内转为正式投产。"
    - "一个投产客户，必须能支撑约 20 万-45 万美元的年化收入，且不需要重度服务化的部署模式。"
  diligenceQuestions:
    - "上线时到底是哪一类放贷方——私人银行、小型金融银行（SFB）还是 NBFC——会真正为分销商主导的共同基金 CLOU 核保？"
    - "券商内部到底是谁在拍这个商业案子：CEO、产品负责人、信贷负责人，还是某个收入负责人？"
    - "当白标嵌入式信用和转介分成两个选项都存在时，独立券商选转介分成的频率有多高？"
    - "目标持仓中，能通过 CAMS、KFintech 和存管工作流实现数字质押的比例是多少？"
    - "针对投资抵押的计息信用额度，用途标记和 MCC 管控会被限定得有多窄？"
operatingAssumptions:
  - assumption: "共同基金应该是唯一的首发抵押品类别。"
    basis: research.yaml
    validationTest: "与 2 个共创客户搭建一份抵押品覆盖矩阵，确认目标合格 AUM 中至少 70% 能通过 CAMS 或 KFintech 实现数字质押，且无需人工例外处理。"
    decisionImpact: "如果不成立，先把产品收窄到转介或分析工作流，或者推迟上线，直到能可靠支持一个更小的资产切片。"
  - assumption: "中型券商会为白标嵌入式信用付费，而不是默认走直接放贷方的转介路子。"
    basis: idea.yaml
    validationTest: "与 ICP 客户进行 8 场商业对话，并在目标套餐上拿下至少 2 份付费试点承诺。"
    decisionImpact: "如果不成立，重新定位为放贷方分销层，或者放弃以分销商为先的切口。"
  - assumption: "两家或更多放贷方会支持一种 LSP 式架构，让本公司只掌控抵押品和流程，而不掌控资金流转。"
    basis: research.yaml
    validationTest: "完成 10 场放贷方访谈，拿到 2 份覆盖贷款价值比、折价率、用途管控和违约处置的条款清单草案。"
    decisionImpact: "如果不成立，销售节奏会停滞，公司必须收窄到单一放贷方类别，或者重新考虑商业模式。"
  - assumption: "用途标记和 MCC 限制之下，仍然留有足够的合规用例，能撑起有意义的提款量。"
    basis: operator judgment
    validationTest: "和法律顾问及一家试点放贷方一起审查一份项目草案，确认允许用例矩阵能支持至少一个高频消费流动性用例。"
    decisionImpact: "如果不成立，围绕更小的一批获批商户类别，或者一套非 UPI 的放款还款流程，重新设计产品。"
  - assumption: "一个已上线项目，无需重度定制服务，就能做到 20 万-45 万美元的年化收入。"
    basis: operator judgment
    validationTest: "为 3 份试点方案定价，确认至少 1 份在部署周期低于 120 天的情况下，转化到目标收入区间的正式投产。"
    decisionImpact: "如果不成立，公司必须下调 ACV 预期、更激进地做标准化，或者扩大范围以支撑企业级定价。"
experimentRoadmap:
  - horizon: "0-90 天"
    experiment: "走访 10 家放贷方——覆盖私人银行、小型金融银行（SFB）和 NBFC——比较项目条款。"
    hypothesis: "至少 2 类放贷方，会在不要求本公司承担资产负债表风险的前提下，为分销商主导的共同基金 CLOU 核保。"
    successMetric: "拿到 2 份条款清单草案和一套首选策略模板。"
    owner: "创始人/CEO"
  - horizon: "0-90 天"
    experiment: "把一个共创客户的持仓数据，映射到 CAMS 或 KFintech 的质押流程和资格规则。"
    hypothesis: "一套可复制的共同基金抵押引擎，能覆盖大部分合格 AUM，且无需人工操作。"
    successMetric: "目标合格 AUM 数字化覆盖率至少达 70%，并跑通一套违约处理流程。"
    owner: "创始工程负责人"
  - horizon: "0-90 天"
    experiment: "与券商和财富应用进行 8 场买家发现与定价访谈。"
    hypothesis: "买家愿意为付费上线套餐买单，而不是选择转介分成模式。"
    successMetric: "至少 2 个 ICP 客户，同意 4 万-8 万美元区间的定价试点。"
    owner: "创始人/CEO"
  - horizon: "90-180 天"
    experiment: "上线 2 个共同基金抵押 CLOU 付费试点，配合人工参与决策的违约处置。"
    hypothesis: "产品能在一个产品周期内上线，并转化真实用户，不出现运营性崩溃。"
    successMetric: "2 个付费试点在启动后 120 天内上线，且至少 1 个转为正式投产。"
    owner: "风控与放贷运营负责人"
  - horizon: "90-180 天"
    experiment: "与一家放贷方和一个分销商合规团队，测试用途管控和 MCC 策略控制台。"
    hypothesis: "只要管控可配置且可审计，合规买家就会批准一个范围收窄的 v1 版本。"
    successMetric: "签下一份合规文件包，且没有阻碍试点上线的关键管控缺口。"
    owner: "风控与放贷运营负责人"
  - horizon: "180-360 天"
    experiment: "通过放贷方以及 RTA 或存管合作伙伴寻找商机。"
    hypothesis: "在一个高度集中的客户市场里，合作伙伴主导的分销能降低获客成本。"
    successMetric: "通过合作伙伴渠道，获得至少 3 个合格商机和 1 个付费试点。"
    owner: "合作伙伴负责人"
  - horizon: "180-360 天"
    experiment: "为一家放贷方增加直接股票抵押支持，并衡量扩展是否在不拖慢上线速度的前提下提升 ACV。"
    hypothesis: "有选择的股票抵押支持，对合同价值的提升，会大于它对实施复杂度的增加。"
    successMetric: "至少 1 个投产客户扩大范围，且整体部署周期保持在 150 天以内。"
    owner: "创始工程负责人"
operations:
  - "每天或更快地对照 CAMS、KFintech 和存管数据源，重新计算抵押品资格、折价率和违约状态。"
  - "维护不可篡改的授权、MCC、放贷方策略和审计日志，让受监管的放贷方能出示合规证据。"
  - "在违约率和管控稳定之前，坚持人工审核补仓、冻结和清算的异常队列。"
  - "每周与分销商和放贷方团队联合复盘开通情况、违约事件和策略变更。"
  - "把放贷方接入、风控审批和对账，打包成可复用的标准手册，而不是定制化服务。"
team:
  - role: "创始人/CEO"
    startTiming: "第 0 个月"
    rationale: "亲自把控放贷方和共创客户的销售，因为风险最高的问题是买方紧迫感和合作方意愿。"
  - role: "创始工程负责人"
    startTiming: "第 0 个月"
    rationale: "为共同基金 MVP 搭建持仓接入、规则引擎、授权流程和违约自动化。"
  - role: "解决方案与集成工程师"
    startTiming: "第 3-6 个月"
    rationale: "把 CAMS、KFintech 和分销商数据集成产品化，让试点不至于沦为纯服务性工作。"
  - role: "风控与放贷运营负责人"
    startTiming: "第 3-6 个月"
    rationale: "把放贷方策略翻译成可配置的管控措施，并负责合规、违约处置手册和上线准备。"
  - role: "合作伙伴负责人"
    startTiming: "第 9-12 个月"
    rationale: "只有在首家放贷方和共创客户打法都跑通、可复制之后，才扩大渠道来源的销售管道。"
milestones:
  - horizon: "0-12 个月"
    items:
      - "在滩头市场拿下 2 份放贷方条款清单和 3-5 个共创客户。"
      - "上线一个覆盖 CAMS 或 KFintech、具备授权和 MCC 管控、人工参与决策违约处置的纯共同基金 MVP。"
      - "签下 2 个付费试点，并至少将 1 个平台转为正式投产。"
  - horizon: "12-24 个月"
    items:
      - "达到 2-3 个投产客户，并证明试点转正式投产的转化率高于 50%。"
      - "为最活跃的投产客户，增加一套获批的直接股票工作流和第二家放贷方冗余。"
      - "建立至少 2 条能带来合格销售管道的合作伙伴渠道。"
  - horizon: "24-36 个月"
    items:
      - "达到 4 个滩头投产客户，与研究测算出的第 3 年 SOM 一致。"
      - "针对已上线项目，推出关于开通率、使用率、违约和回收表现的基准分析。"
      - "在不超出组合抵押信用范围的前提下，开始向独立财富平台和新银行财富板块做有选择的扩展。"
risks:
  - risk: "放贷方或 NPCI 把 CLOU 的用途标记限定得过窄，导致分销商主导的项目无法带来足够的提款量。"
    likelihood: "High"
    impact: "High"
    mitigation: "只针对放贷方已批准的用例上线，配置可调整的 MCC 和用途管控，且至少覆盖两类放贷方，让产品不被绑死在单一解读上。"
  - risk: "独立券商更倾向转介分成或直接放贷方合作，而不愿为白标基础设施付费。"
    likelihood: "High"
    impact: "High"
    mitigation: "只向真正拥有产品路线图决定权的客户销售，要求走付费试点，并在客户发现阶段量化留存和收入提升相对转介模式的差距。"
  - risk: "市场下行引发的相关性违约，超出本公司自动化能力和放贷方的信任上限。"
    likelihood: "Medium"
    impact: "High"
    mitigation: "在扩大资产覆盖范围前，采用保守的初始折价率、人工审核的违约队列，以及历史压力测试。"
  - risk: "Spense、M2P 或其他相邻基础设施厂商，把业务向下游延伸到分销商侧的抵押品编排。"
    likelihood: "Medium"
    impact: "High"
    mitigation: "率先在共同基金优先的集成上取胜，用分销商专属手册缩短上线周期，并加深专有的跨平台抵押品表现数据。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "资助 18 个月的放贷方接入、共同基金 MVP 搭建、3-5 个共创客户部署、合规与审计打包，以及创始人主导的市场打法，目标是拿下 2 个付费试点和首批 1-2 个投产客户。"
