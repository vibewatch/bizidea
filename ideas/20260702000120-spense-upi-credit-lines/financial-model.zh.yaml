slug: portfolio-backed-upi-credit-api
date: '2026-07-02'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: pre-seed 交割后期初现金
    value: '1500'
    unit: usdK
    source: '[BP fundingAsk.targetFundingRangeUsd $2-4M；模型按较克制的低端 $1.5M 建模，因为计划本身立足印度本地、按里程碑逐步放款]'
  - id: A2
    name: 每个客户的试点费
    value: '20'
    unit: usdK per month
    source: '[BP investorMemo.initialContract 8-12 周付费试点 $40k-$80k；模型按 3 个月约 $60K 建模]'
  - id: A3
    name: 试点周期
    value: '3'
    unit: months
    source: '[BP investorMemo.initialContract 8-12 周试点]'
  - id: A4
    name: 首个投产客户的收入爬坡
    value: '30'
    unit: usdK per month
    source: '[BP investorMemo.initialContract $200k-$450k 年度投产合同；模型让新客户从 $360K ARR 起步]'
  - id: A5
    name: 投产后半年的收入爬坡
    value: '35'
    unit: usdK per month
    source: '[BP gtm.pricing 年度平台费加已提取余额 50-100 个基点；模型假设使用率会在第 7-12 个月把客户拉到 $420K ARR]'
  - id: A6
    name: 成熟期投产收入
    value: '40'
    unit: usdK per month
    source: '[BP market.som 约 4 个客户、每个应用混合年收入约 45 万美元；成熟运行速率设为 $480K，使第 3 年混合平均值贴近 SOM 锚点]'
  - id: A7
    name: 付费客户上线时间表
    value: M7, M11, M16, M25
    unit: month index
    source: '[BP milestones 要求第 1 年 2 个付费试点加 1 个投产客户，第 2 年 2-3 个投产客户，第 3 年 4 个投产客户]'
  - id: A8
    name: 试点转投产的滞后时间
    value: '0'
    unit: months after pilot end
    source: '[BP investorMemo.mustBeTrue 称 50% 以上的付费试点应在 6 个月内转化；基准情景假设会转化的客户在 3 个月试点结束后立即转化]'
  - id: A9
    name: 试点期 COGS 占比
    value: '50'
    unit: percent of revenue
    source: '[BP product.mvp 和 operations 在上线时把清算和异常处理保持人工参与决策]'
  - id: A10
    name: 投产早期 COGS 占比
    value: '35'
    unit: percent of revenue
    source: '[BP businessModel.targetGrossMarginPct = 70；早期已上线客户仍需承担接入和放贷方策略支持成本]'
  - id: A11
    name: 投产中期 COGS 占比
    value: '30'
    unit: percent of revenue
    source: '[BP businessModel.targetGrossMarginPct = 70；共同基金工作流标准化之后毛利率改善]'
  - id: A12
    name: 成熟期投产 COGS 占比
    value: '28'
    unit: percent of revenue
    source: '[BP businessModel.targetGrossMarginPct = 70，加上研究 reportMemo.dataMoats 的论点——可复用规则和自动化应能提升交付效率]'
  - id: A13
    name: 月度流失率
    value: '1.5'
    unit: percent
    source: '[经验假设：企业级金融科技基础设施粘性较强、转换成本明显，但早期客户集中度带来一定风险]'
  - id: A14
    name: 每个投产客户的综合获客成本
    value: '110'
    unit: usdK
    source: '[BP gtm 创始人主导外呼 + 10-20 个目标客户 + 20-30% 商机转试点率 + 50% 以上试点转投产率；经验假设涵盖创始人时间、差旅和尽调成本]'
  - id: A15
    name: 管理层满载薪酬
    value: '132'
    unit: usdK annual
    source: '[经验假设：印度金融科技创始人现金薪酬加福利和薪酬负担]'
  - id: A16
    name: 工程满载薪酬
    value: '90'
    unit: usdK annual
    source: '[经验假设：印度资深金融科技工程师薪酬加负担]'
  - id: A17
    name: 解决方案与风控满载薪酬
    value: '78'
    unit: usdK annual
    source: '[经验假设：集成工程师或放贷运营专员薪酬加负担]'
  - id: A18
    name: 销售与合作满载薪酬
    value: '84'
    unit: usdK annual
    source: '[经验假设：印度企业级合作负责人薪酬加负担；浮动佣金计入获客成本而非薪酬]'
  - id: A19
    name: 财务与合规满载薪酬
    value: '60'
    unit: usdK annual
    source: '[经验假设：精简型财务或合规经理薪酬加负担]'
  - id: A20
    name: 招聘启动时间表
    value: Solutions M5, Risk M6, Eng2 M8, Partnerships M11, Eng3 M16, Finance/Compliance M18, Sales2 M28
    unit: month index
    source: '[BP team.startTiming，加上 BP strategicChoices.sequencingRationale——让放贷方和抵押品工作先于更大范围的市场打法招聘]'
  - id: A21
    name: 非人力研发支出
    value: 7 / 8 / 9
    unit: usdK per month in Y1/Y2/Y3
    source: '[经验假设：云服务、安全、可观测性和放贷方沙箱成本]'
  - id: A22
    name: 非人力销售与市场支出
    value: 5 / 7 / 9
    unit: usdK per month in Y1/Y2/Y3
    source: '[经验假设：创始人主导外呼、孟买/班加罗尔差旅和有选择的行业活动]'
  - id: A23
    name: 非人力行政管理支出
    value: 17 / 19 / 21
    unit: usdK per month in Y1/Y2/Y3
    source: '[研究 regulatoryTechnicalConstraints 加上 BP operations 意味着需要持续的法务、审计、保险和合规打包支出]'
  - id: A24
    name: 创始人职能分配
    value: 50 / 50
    unit: percent S&M / G&A
    source: '[BP team 显示创始人既主导放贷方和共创客户销售，也负责公司运营和审批]'
  - id: A25
    name: 基准销售周期
    value: '7'
    unit: months
    source: '[BP market.buyingProcess 要求产品、风控、合规、放贷方和 CEO 层层审批；经验假设把基准情景定在约 7 个月]'
  - id: A26
    name: 现金转化假设
    value: EBITDA approximates operating cash
    unit: policy
    source: '[经验假设：精简型软件模型，基准情景下资本支出、负债和营运资金拖累都很小]'
