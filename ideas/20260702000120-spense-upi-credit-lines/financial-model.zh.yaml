scenarios:
  downside:
    description: 第 3、4 个客户各自延后约一个季度，定价落在试点区间的低端，人工运营让毛利率始终低于目标水平。
    y3RevenueK: 1358.0
    y3EbitdaK: -344.0
    cashLowPointK: -68.6
    keyAssumptionChanges:
      - "付费客户上线时间从 M7/M11/M16/M25 推迟到 M8/M12/M20/M30。"
      - "试点定价落在每月 1.8 万美元，成熟期投产收入封顶在每月约 3.5 万美元附近。"
      - "成熟期 COGS 维持在约 32%，而不是 28%，因为违约处置仍需更多人工介入。"
  base:
    description: 三个投产客户在第 2 年第四季度前上线，第四个客户在第 3 年上线，每个已上线客户的混合收入逐步收敛到 45 万美元的 SOM 锚点。
    y3RevenueK: 1750.0
    y3EbitdaK: -5.8
    cashLowPointK: 486.2
    keyAssumptionChanges:
      - "付费客户按 M7、M11、M16、M25 的节奏上线。"
      - "新投产客户月收入从 3 万美元爬升到 3.5 万美元，再到 4 万美元，因为平台费和按提款分成逐步成熟。"
      - "毛利率从试点期偏重的 50% COGS，改善到成熟期 28% COGS，最终略高于 70% 的目标线。"
  upside:
    description: 第二和第四个客户更早启动，成熟期使用率爬坡更快，标准化让毛利率超过目标下限。
    y3RevenueK: 1868.0
    y3EbitdaK: 118.8
    cashLowPointK: 622.3
    keyAssumptionChanges:
      - "付费客户上线时间提前到 M7/M10/M15/M23。"
      - "月度投产收入爬升到约 3.1 万美元、3.6 万美元、4.2 万美元，因为第二家放贷方的额度更早到位。"
      - "成熟期 COGS 改善到约 26%，因为放贷方规则和抵押品工作流标准化得更快。"
sensitivity:
  - variable: ARPU
    downsideCase: 新投产客户月收入按 2.8 万/3.2 万/3.5 万美元爬坡，而不是 3 万/3.5 万/4 万美元。
    baseCase: 新投产客户月收入按 3 万/3.5 万/4 万美元爬坡。
    upsideCase: 新投产客户月收入按约 3.1 万/3.6 万/4.2 万美元爬坡。
    y3RevenueImpactK: -193.0
    cashImpactK: -179.1
  - variable: CAC
    downsideCase: 因为更多交易需要创始人重度参与差旅和合规工作，CAC 升到约 14 万美元。
    baseCase: 靠放贷方和生态转介减少无效获客，CAC 保持在约 11 万美元附近。
    upsideCase: 一旦转介贡献更大比例的合格商机，CAC 降到约 9 万美元。
    y3RevenueImpactK: -40.0
    cashImpactK: -90.0
  - variable: churn
    downsideCase: 如果早期一个客户在上线后回归转介分成模式，月度流失率会漂到 2.5%。
    baseCase: 一旦抵押品和放贷方工作流上线，嵌入式信用足够粘性，月度流失率维持在 1.5%。
    upsideCase: 如果首批客户群扩展到第二家放贷方和分析模块，月度流失率改善到 1.0%。
    y3RevenueImpactK: -120.0
    cashImpactK: -115.0
  - variable: sales cycle
    downsideCase: 因为放贷方、合规和 CEO 的审批对不上节奏，销售周期拉长到约 9 个月。
    baseCase: 从首次会面到付费试点启动，销售周期平均约 7 个月。
    upsideCase: 一旦已有真实的竞争触发因素和放贷方条款清单，销售周期压缩到约 5.5 个月。
    y3RevenueImpactK: -170.0
    cashImpactK: -217.8
  - variable: gross margin
    downsideCase: 成熟期 COGS 卡在约 30%，模型最终落在 66%-67% 的毛利率。
    baseCase: 模型在第 3 年落在约 70% 的毛利率，与商业计划目标一致。
    upsideCase: 成熟期 COGS 改善到约 26%，把第 3 年毛利率拉高到 72% 以上。
    y3RevenueImpactK: 0.0
    cashImpactK: -54.7
  - variable: hiring pace
    downsideCase: 第三名工程师和第二名市场打法岗位，都在收入跟上之前提前一个季度到岗。
    baseCase: 招聘保持按里程碑推进，第二名 GTM 岗位要等到第 4 个客户在推进中才补。
    upsideCase: 因为合作伙伴转介减少了近期覆盖需求，第二名 GTM 岗位要等到第 3 年第二季度之后才补。
    y3RevenueImpactK: -25.0
    cashImpactK: -36.0
modelDiagram:
  title: "单位经济模型流程"
  mermaid: |
    flowchart LR
      Accounts[Target broker and wealth accounts] --> Pilots[Paid pilots]
      Pilots --> Production[Production logos]
      Production --> Utilization[Platform fee plus draw-share]
      Utilization --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景收入来自第 3 年年末的四个付费券商或财富客户，随着试点费转化为经常性的平台费加提款分成收入，第 3 年每个已上线客户平均收入约 43.8 万美元。
  - checkName: 必须跑通的事
    finding: 模型需要第 3 个客户在第 16 个月、第 4 个客户在第 25 个月上线，因为销售周期一旦明显长于约 7 个月，就是最容易同时拖垮收入和里程碑时间线的因素。
  - checkName: 模型失效条件
    finding: 如果采购流程延后一个季度，且成熟期项目卡在月收入约 3.5 万美元、自动化程度更低，下行情景现金会在下一轮融资前转负。
  - checkName: 下一轮融资证明
    finding: 能支撑 seed 轮的证明点是三个投产客户、50% 以上的试点转化率，以及第 2 年第四季度前具备第二家放贷方接入能力，第 4 个投产客户则在第 3 年验证这套模式的可复制性。
sanityChecks:
  ruleOf40: 第 3 年增长 69% + EBITDA 利润率 -0.3% = 68.8%
  burnMultiple: 第 2 年 burn multiple 为 0.4x（EBITDA 消耗 37.4 万美元，对应 84.5 万美元新增净收入）；第 3 年接近盈亏平衡，约 0.0x。
  revenuePerFte: 按第 3 年年末 9 名 FTE 计算，人均收入约 19.4 万美元（对标 SaaS 基准 20 万-40 万美元）
  flags:
    - "测算出的 pre-seed 融资需求（约 150 万美元）低于商业计划 200 万-400 万美元的目标区间，向投资人路演前需要先协调好融资规模、招聘布局和业务范围。"
    - "整个第 3 年计划只靠四个客户支撑，一次放贷方审批延误就可能大幅拖动收入、里程碑和融资时间线。"
    - "人均收入略低于典型 SaaS 基准，意味着公司在证明更高客户密度之前，招聘提前的空间有限。"
    - "毛利率只有在放贷方策略复用和人工参与决策的违约处置都按计划标准化之后才能达标；否则 EBITDA 会持续大幅为负。"
