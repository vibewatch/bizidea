jobsToBeDone:
  - job: >-
      当注册用户需要短期现金、又不想卖掉共同基金或股票持仓时，帮券商或财富应用以这份组合为抵押，提供即时 UPI 信用额度，让用户拿到流动性的同时，不丢市场敞口、也不触发纳税。
    currentAlternative: "赎回共同基金份额，或者跳到另一个应用申请个人贷款"
    successMetric: "符合条件用户中的信用额度开通率，以及从申请到资金到账的平均时长"
  - job: >-
      当市场波动侵蚀质押抵押品的价值时，帮放贷合作银行或 NBFC 自动执行追加保证金和可控清算，让它们能放出资产抵押信用，而不需要人工盯盘，也不会碰上意外损失。
    currentAlternative: "由放贷合作方风控团队人工审查组合、临时催收"
    successMetric: "发现并解决保证金缺口所需天数，以及已提取余额中实际发生的信贷损失占比"
ideaScorecard:
  signalStrength:
    score: 4
    rationale: "两篇独立信源的文章证实了银行端的实际落地、有资金支持的 UPI 信用额度上线，以及被点名的抵押品类型，但都没有直接谈到券商应用侧的需求。"
  painIntensity:
    score: 4
    rationale: "散户投资者经常需要周转资金，眼下要么卖资产，要么离开应用，而券商平台自己没法提供信用产品时，就会流失活跃度和收入。"
  wedgeClarity:
    score: 4
    rationale: "首发产品的 API 范围窄且界定清楚：针对一种抵押品、一个渠道，做抵押品估值、放贷合作方编排和追加保证金自动化。"
  defensibility:
    score: 3
    rationale: "银行和 NBFC 放贷合作关系，加上跨平台的抵押品风控数据集，构成了真实的转换成本，不过 Spense 这类资金雄厚的现有厂商，也可能把业务往下游延伸进这个渠道。"
  ventureScale:
    score: 4
    rationale: "只要在折扣券商的共同基金抵押信用上跑通，就能扩展到股票、更多资产类别，乃至每一个持有散户投资资产的印度平台。"
topRisks:
  - name: "现有厂商向下游延伸"
    description: "Spense 或类似的面向银行的基础设施厂商，可能把现有的银行关系和 UPI 信用额度管道，直接延伸到券商和财富应用，侵蚀这家公司的切口。"
    mitigation: "抢先做好非银行平台集成和存管/RTA 数据合作，在面向银行的现有厂商把这个渠道列为优先级之前，与两家以上银行/NBFC 锁定独家或优先的放贷合作条款。"
  - name: "市场下行导致抵押品价值崩塌"
    description: "股票或共同基金市场的急跌，可能同时在大量用户身上触发追加保证金，一下子把放贷合作方的风险偏好和公司的自动催收逻辑都逼到极限。"
    mitigation: "按资产类别设定保守的贷款价值比和折价率，上线前用历史回撤数据压力测试追加保证金自动化流程，并在多家放贷合作方之间分散风险，避免单一资产负债表独自承受相关性冲击。"
  - name: "监管与牌照风险"
    description: "印度储备银行（RBI）在数字信贷、UPI 信用额度和抵押品支持消费信贷上的规则，可能收紧，也可能要求公司自己持有放贷或 NBFC 牌照，而不能只做纯粹的基础设施。"
    mitigation: "把公司严格架构成技术与风控编排层，所有放贷风险敞口和牌照都由受监管的银行和 NBFC 持有，并及早聘请合规法律顾问，跟踪 RBI 的数字信贷和 UPI 信用额度指引。"
