problem: >-
  数以百万计的印度散户投资者，把共同基金和股票直接持有在券商、财富管理应用里——这些平台既不是银行也不是非银行金融公司（NBFC）。一旦需要短期周转资金，他们真正能选的只有两条路：赎回份额（因此触发纳税、丢掉市场敞口），或者干脆离开应用去申请一笔个人贷款。券商和财富平台都想提供"用投资组合借钱、用 UPI 还款"的功能，把闲置的 AUM 变现留客，但从零搭建实时抵押品估值、自动追加保证金和受监管的放贷合作关系，需要 12 到 18 个月，还得有专门的信贷风控人才——而这恰恰是大多数产品团队缺的。
targetUser:
  primary: >-
    印度中型折扣券商或财富管理应用的产品负责人或新业务负责人，平台注册用户 200 万到 1500 万，客户持有可观的共同基金和股票仓位，自己名下没有银行或 NBFC 牌照。
  secondary: >-
    同一批平台的风控和合规负责人，任何信用功能上线前，都得由他们审批抵押品监控和追加保证金的逻辑。
  buyer: "券商/财富平台的产品负责人或 CEO，信贷风控和合规部门作为审批方"
startupThesis:
  nonObviousInsight: >-
    所有人都默认 UPI 信用额度这个机会属于银行和服务银行的基础设施厂商，因为 Spense 这类玩家正是照着这个方向在做。但抵押品不在银行手里，而是在券商和财富应用手里。真正卡住的瓶颈，不再是银行端的发卡能力，而是怎么让那些已经握着共同基金和股票组合的非银行平台，不用自建抵押品风控和放贷运营体系，就能接入银行或 NBFC 的资产负债表和 UPI 信用额度轨道。
  beachhead: >-
    印度中型折扣券商和财富管理应用，用户规模 200 万到 1500 万，共同基金和股票 AUM 可观，自己没有银行或 NBFC 牌照，想在一个产品周期内上线"用投资组合借钱"的即时 UPI 信用功能。
  wedge: >-
    一个 API 加一个控制台，接入券商或财富应用的持仓账本，实时给可用作抵押的共同基金和股票估值，通过合作银行或 NBFC 的资产负债表发放 UPI 信用额度，并在组合价值下跌时自动触发追加保证金、补仓和催收。
  whyNowCatalyst: >-
    Spense 刚拿到融资要上线 UPI 信用额度，加上它 20 万张以上的卡基，证明了监管轨道和银行对资产抵押 UPI 信用的需求都已经就位。接下来的竞争压力，会转移到那些能在不变成银行的前提下，把同款功能提供给自己用户的券商和财富应用身上。
  ventureScalePath: >-
    先从一种抵押品（共同基金）、一个分销渠道（折扣券商应用）切入，再扩展到股票和另类资产，增加更多放贷合作银行和 NBFC 做资产负债表冗余，最终成为每一个持有散户投资资产的印度平台——包括智能投顾、保险联结型投资应用、新银行的财富板块——默认使用的抵押品与信用额度基础设施层。
solution: >-
  组合抵押 UPI 信用 API，是一层即插即用的放贷基础设施，面向已经持有客户共同基金和股票组合的平台。它通过现有的存管和 RTA 集成读取持仓数据，按折价率和集中度规则实时计算可用抵押品价值，再通过公司放贷合作网络里的一家或多家银行/NBFC，以这些抵押品为基础发放 UPI 信用额度。一旦市场走势侵蚀客户质押持仓的价值，系统会按每家放贷合作方的风控政策，自动触发追加保证金请求、部分冻结信用额度或可控清算，并自动完成催收和对账，不需要人工介入。券商或财富应用保留客户关系和界面；API 负责抵押品监控、放贷合作方编排和监管报送。
goToMarketSeed:
  firstCustomer: >-
    一家总部在孟买或班加罗尔的折扣券商或共同基金直投应用，注册用户 200 万到 1500 万，客户 AUM 至少 5 亿美元，没有银行或 NBFC 牌照，正积极想加一个放贷或信用功能来提升用户活跃度和人均收入。
  buyingTrigger: >-
    产品和增长负责人看到竞对银行或金融科技公司上线了 UPI 信用额度，想在两个季度内追平这个功能，但内部测算显示，自建抵押品风控和放贷合作基础设施要一年多时间，还得组建专门的信贷团队。
  currentAlternative: >-
    要么手动搭建一次性的 NBFC 合作集成、没有实时保证金管理，要么让用户去赎回基金份额或跳到另一个应用申请通用个人贷款——这两条路都会把活跃度和收入拱手让给竞争对手。
  switchingReason: >-
    这个 API 把原本 12 到 18 个月的自建加持牌流程，压缩成平台工程团队一个产品周期就能上线的集成，同时把抵押品、信贷和监管风险，转移给专门为此打造的合作方，而不是靠内部临时拼凑的流程扛。
  pricingHypothesis: >-
    按每个接入应用收取基础平台费，再加上已提取信用额度余额 50 到 150 个基点的收入分成，与背后的放贷银行或 NBFC 合作方分账。
whyNow:
  - point: >-
      银行已经在相当规模上跑通了 UPI 信用额度，说明监管轨道和消费体验模式都是验证过的，不是纸上谈兵，这就降低了为非银行分销商复刻同一条轨道的风险。
    signalRefs: ["银行对资产抵押信用产品的需求已获验证"]
    sourceRefs: [1]
  - point: >-
      一家专门的基础设施玩家眼下正拿着融资推进 UPI 信用额度的上线，这意味着未来 12 个月里，每一个持有可投资资产的消费端平台都会面临功能追赶的竞争压力。
    signalRefs: ["UPI 信用额度轨道已经跑通"]
    sourceRefs: [1]
  - point: >-
      共同基金和股票被明确列为合格抵押品类型，证实任何持有这些资产的平台——不只是银行——都能接入同一套核保逻辑。
    signalRefs: ["抵押品类型已被明确并标准化"]
    sourceRefs: [2]
  - point: >-
      Agentic AI 已经压低了资产抵押信用产品在开户、服务和催收上的运营成本，使得服务一长串中型券商和财富应用变得经济可行，而不再只服务大银行才划算。
    signalRefs: ["Agentic AI 服务正在成为运营范本"]
    sourceRefs: [2]
  - point: >-
      一线金融科技投资人正在为可复用的信用额度基础设施这条赛道下注，说明资本和放贷合作银行，都会愿意支持一个专注非银行渠道、追逐同一条轨道的新进入者。
    signalRefs: ["金融科技基础设施投资人正在为这条赛道背书"]
    sourceRefs: [1]
differentiator: >-
  面向银行的基础设施厂商，是为已经握有资产负债表和银行牌照的银行做优化的；它们天生就不是为了对接券商应用的持仓账本，也不是为了卖给没有信贷职能的产品团队。这家公司反其道而行：从非银行平台的数据和用户体验出发，把银行或 NBFC 当成 API 背后可替换的资产负债表合作方。这让它对券商和财富应用而言集成更快，而且随着时间推移防御力更强——因为跨多个非银行平台积累的抵押品监控和追加保证金逻辑，会沉淀成一份纯银行端厂商没有的专有风控数据集。
conceptDiagram:
  title: "组合抵押信用额度流程"
  mermaid: |
    flowchart LR
      Investor[Investor Holdings] --> App[Broking/Wealth App]
      App --> API[Portfolio Credit API]
      API --> Valuation[Real-Time Collateral Valuation]
      Valuation --> Partner[Bank/NBFC Balance Sheet]
      Partner --> UPI[Credit Line on UPI]
      Valuation --> MarginCall[Margin Call Automation]
      UPI --> Outcome[Instant liquidity without selling investments]
      MarginCall --> Outcome
