scenarios:
  downside:
    description: Logo 3 and 4 each slip by roughly one quarter, pricing lands toward the low end of the pilot band, and manual ops keep margins below target.
    y3RevenueK: 1358.0
    y3EbitdaK: -344.0
    cashLowPointK: -68.6
    keyAssumptionChanges:
      - Paid logo starts move from M7/M11/M16/M25 to M8/M12/M20/M30.
      - Pilot pricing lands at $18K per month and mature production tops out near $35K per month.
      - Mature COGS holds near 32% instead of 28% because breach handling stays more manual.
  base:
    description: Three production logos are live by Q4Y2, the fourth launches in Y3, and blended revenue per live logo converges toward the $450K SOM anchor.
    y3RevenueK: 1750.0
    y3EbitdaK: -5.8
    cashLowPointK: 486.2
    keyAssumptionChanges:
      - Paid logo starts follow M7, M11, M16, and M25.
      - New production logos ramp from $30K to $35K to $40K monthly as platform fees and draw-based share mature.
      - Gross margin improves from pilot-heavy 50% COGS to a 28% mature COGS rate, landing just above the 70% target.
  upside:
    description: The second and fourth logos start earlier and mature utilization ramps faster, while standardization lifts gross margin above the target floor.
    y3RevenueK: 1868.0
    y3EbitdaK: 118.8
    cashLowPointK: 622.3
    keyAssumptionChanges:
      - Paid logo starts pull forward to M7/M10/M15/M23.
      - Monthly production revenue ramps to about $31K, $36K, and $42K as second-lender capacity arrives sooner.
      - Mature COGS improves to roughly 26% as lender rules and collateral workflows standardize faster.
sensitivity:
  - variable: ARPU
    downsideCase: New production logos ramp at $28K / $32K / $35K per month instead of $30K / $35K / $40K.
    baseCase: New production logos ramp at $30K / $35K / $40K per month.
    upsideCase: New production logos ramp at roughly $31K / $36K / $42K per month.
    y3RevenueImpactK: -193.0
    cashImpactK: -179.1
  - variable: CAC
    downsideCase: CAC rises to about $140K because more deals require founder-heavy travel and compliance work.
    baseCase: CAC holds near $110K with lender and ecosystem referrals reducing prospecting waste.
    upsideCase: CAC falls to about $90K once referrals source a larger share of qualified opportunities.
    y3RevenueImpactK: -40.0
    cashImpactK: -90.0
  - variable: churn
    downsideCase: Monthly churn drifts to 2.5% if one early logo reverts to referral economics after launch.
    baseCase: Monthly churn remains 1.5% because embedded credit is sticky once collateral and lender workflows are live.
    upsideCase: Monthly churn improves to 1.0% if the first cohort expands to second-lender and analytics modules.
    y3RevenueImpactK: -120.0
    cashImpactK: -115.0
  - variable: sales cycle
    downsideCase: Cycle extends to about 9 months because lender, compliance, and CEO approvals do not line up.
    baseCase: Cycle averages about 7 months from first meeting to paid pilot start.
    upsideCase: Cycle compresses to about 5.5 months when a live competitive trigger and lender term sheet already exist.
    y3RevenueImpactK: -170.0
    cashImpactK: -217.8
  - variable: gross margin
    downsideCase: Mature COGS stalls around 30% and the model exits near 66-67% gross margin.
    baseCase: The model lands near 70% gross margin in Y3, in line with the business-plan target.
    upsideCase: Mature COGS improves toward 26%, lifting Y3 gross margin above 72%.
    y3RevenueImpactK: 0.0
    cashImpactK: -54.7
  - variable: hiring pace
    downsideCase: The third engineer and second GTM hire both come forward by a quarter before revenue catches up.
    baseCase: Hiring remains milestone-gated, with the second GTM hire waiting until logo 4 is in flight.
    upsideCase: The second GTM hire waits until after Q2Y3 because partner referrals reduce near-term coverage needs.
    y3RevenueImpactK: -25.0
    cashImpactK: -36.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts[Target broker and wealth accounts] --> Pilots[Paid pilots]
      Pilots --> Production[Production logos]
      Production --> Utilization[Platform fee plus draw-share]
      Utilization --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from four paying broker or wealth logos by Y3 end, with Y3 average revenue per live logo at roughly $438K as pilot fees convert into recurring platform plus draw-share revenue.
  - checkName: Must go right
    finding: The model needs logo 3 by M16 and logo 4 by M25, because a sales cycle materially longer than about 7 months is the fastest way to miss both revenue and milestone timing.
  - checkName: Model breaks if
    finding: If procurement slips by a quarter and mature programs stall near $35K monthly revenue with lower automation, downside cash turns negative before the next round.
  - checkName: Next-round proof
    finding: The seed-ready proof point is three production logos, 50%+ pilot conversion, and second-lender readiness by Q4Y2, with the fourth production logo validating repeatability in Y3.
sanityChecks:
  ruleOf40: Y3 growth 69% + EBITDA margin -0.3% = 68.8%
  burnMultiple: Y2 burn multiple 0.4x (EBITDA burn $374K on $845K net new revenue); Y3 is ~0.0x at near-breakeven.
  revenuePerFte: $194K Y3 using 9 year-end FTE (benchmark $200-400K SaaS)
  flags:
    - The computed pre-seed need (~$1.5M) is below the business plan's $2-4M target range, so raise size, hiring geography, and scope need harmonization before pitching investors.
    - Only four logos drive the full Y3 plan, so one delayed lender approval can materially move revenue, milestones, and financing timing.
    - Revenue per FTE is just below a typical SaaS benchmark, which means the company has limited room to pull hiring forward before proving more logo density.
    - Gross margin only reaches the target if lender-policy reuse and human-in-the-loop breach ops standardize as planned; otherwise EBITDA stays meaningfully negative.
