  adoptionFrictionMatrix:
  - friction: Lender acquisition and policy alignment
    severity: high
    affectedBuyer: CEO or product sponsor
    mitigation: Start with two design-partner lenders and a configurable policy engine rather than bespoke logic per institution.
    sourceRefs:
