    - 2
    - 3
    - 90
  - friction: Operationalizing liens across RTAs and depositories
    severity: high
    affectedBuyer: Risk and compliance approver
    mitigation: Launch first on mutual funds with standard lien flows, then expand into direct equities after operational SLAs are proven.
    sourceRefs:
    - 15
    - 25
    - 27
    - 82
  - friction: Purpose-tagging and MCC restrictions on interest-bearing credit lines
    severity: medium
