  adoptionFrictionMatrix:
  - friction: 获取放贷方并对齐策略
    severity: high
    affectedBuyer: CEO 或产品发起人
    mitigation: 先从两家共创放贷方和一套可配置的策略引擎入手，而不是为每家机构单独定制逻辑。
    sourceRefs:
    - 1
    - 2
    - 3
    - 90
  - friction: 在 RTA 和存管机构之间实现质押运营化
    severity: high
    affectedBuyer: 风控与合规审批人
    mitigation: 先从有标准质押流程的共同基金上线，等运营层面的 SLA 得到验证后，再扩展到直接股票。
    sourceRefs:
    - 15
    - 25
    - 27
    - 82
  - friction: 计息信用额度的用途标记和 MCC 限制
    severity: medium
