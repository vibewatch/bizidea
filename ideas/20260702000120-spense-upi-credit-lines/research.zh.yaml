    - 40
  - friction: 企业客户名单本身很小
    severity: high
    affectedBuyer: 创始人或市场打法负责人
    mitigation: 直接做高客单价销售，并借助放贷方转介，优先触达规模最大的独立平台。
    sourceRefs:
    - 41
