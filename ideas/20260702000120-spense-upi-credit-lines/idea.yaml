topRisks:
  - name: "Incumbent downstream extension"
    description: "Spense or a similar bank-facing infrastructure player could extend its existing bank relationships and Credit Line on UPI plumbing directly to broking and wealth apps, eroding this company's wedge."
    mitigation: "Move first on non-bank platform integrations and depository/RTA data partnerships, and lock in exclusive or preferred lending-partner terms with two or more banks/NBFCs before a bank-facing incumbent prioritizes this channel."
  - name: "Collateral value collapse in a market downturn"
    description: "A sharp equity or mutual-fund market drop could trigger simultaneous margin calls across many users, straining lending-partner risk appetite and the company's automated collections logic all at once."
    mitigation: "Set conservative loan-to-value ratios and haircuts by asset class, stress-test margin-call automation against historical drawdowns before launch, and diversify across multiple lending partners so no single balance sheet absorbs a correlated shock."
  - name: "Regulatory and licensing exposure"
    description: "RBI rules on digital lending, UPI credit lines, and collateral-backed consumer credit could tighten or require the company itself to hold a lending or NBFC license rather than operate purely as infrastructure."
    mitigation: "Structure the company strictly as a technology and risk-orchestration layer with regulated banks and NBFCs holding all lending exposure and licenses, and engage compliance counsel early to track RBI digital-lending and UPI credit-line guidelines."
