jobsToBeDone:
  - job: >-
      When a registered user needs short-term cash but does not want to sell down their mutual-fund or equity holdings, help the broking or wealth app offer an instant UPI credit line against that portfolio, so the user gets liquidity without losing market exposure or triggering tax events.
    currentAlternative: "Redeeming mutual-fund units or applying for a personal loan on a separate app"
    successMetric: "Credit-line activation rate among eligible users and average time from request to funds available"
  - job: >-
      When market volatility erodes the value of pledged collateral, help the lending-partner bank or NBFC automatically enforce margin calls and controlled liquidations, so they can extend asset-backed credit without manual monitoring or unexpected losses.
    currentAlternative: "Manual portfolio review and ad hoc collections by the lending partner's risk team"
    successMetric: "Days to detect and resolve a margin shortfall, and realized credit losses as a percentage of drawn balances"
