problem: >-
  Millions of Indian retail investors hold mutual funds and direct equities on broking and wealth-management apps that are not banks or NBFCs. When these investors need short-term liquidity, their only real options are redeeming units (crystallizing tax and losing market exposure) or exiting the app entirely for a personal-loan product. Broking and wealth platforms want to offer "borrow against your portfolio, repay via UPI" to retain and monetize idle AUM, but building real-time collateral valuation, margin-call automation, and a regulated lending-partner relationship from scratch takes 12-18 months and specialized credit-risk talent most product teams do not have.
targetUser:
  primary: >-
    Head of Product or Head of New Initiatives at a mid-size Indian discount broking or wealth-management app with 2-15 million registered users, meaningful client mutual-fund and direct-equity holdings, and no captive bank or NBFC arm.
  secondary: >-
    Risk and compliance leads at the same platforms who must sign off on collateral-monitoring and margin-call logic before any credit feature ships.
  buyer: "Head of Product or CEO of the broking/wealth platform, with credit risk and compliance as approvers"
startupThesis:
  nonObviousInsight: >-
    Everyone assumes the Credit Line on UPI opportunity belongs to banks and the infra vendors that serve them, because that is where Spense and similar players are building. But banks do not hold the collateral - broking and wealth apps do. The real bottleneck moving forward is not bank-side card issuance, it is giving non-bank platforms that already hold mutual fund and equity portfolios a way to plug into a bank or NBFC balance sheet and the UPI credit-line rail without building collateral-risk and lending-ops infrastructure themselves.
  beachhead: >-
    Mid-size Indian discount broking and wealth-management apps with 2-15 million users, meaningful mutual-fund and direct-equity AUM, and no in-house bank or NBFC, that want to launch an instant "borrow against your portfolio" UPI credit feature within one product cycle.
  wedge: >-
    A single API and dashboard that plugs into a broking or wealth app's holdings ledger, values eligible mutual-fund and equity collateral in real time, issues a Credit Line on UPI through a partner bank or NBFC balance sheet, and automates margin calls, top-ups, and collections when portfolio value drops.
  whyNowCatalyst: >-
    Spense's newly funded Credit Line on UPI launch and its 200,000-plus card base prove the regulatory rail and bank appetite for asset-backed UPI credit both now exist, which means the next competitive pressure point shifts to whichever broking and wealth apps can offer the same feature to their own users without becoming a bank themselves.
  ventureScalePath: >-
    Start with one collateral type (mutual funds) and one distribution channel (discount broking apps), expand to direct equities and alternative assets, add more lending-partner banks and NBFCs for balance-sheet redundancy, and become the default collateral-and-credit-line infrastructure layer for every Indian platform that holds retail investment assets, including robo-advisors, insurance-linked investment apps, and neobank wealth tabs.
solution: >-
  Portfolio-Backed UPI Credit API is a drop-in lending-infrastructure layer for platforms that already hold client mutual-fund and equity portfolios. It ingests holdings data via existing depository and RTA integrations, computes real-time eligible collateral value with haircut and concentration rules, and originates a Credit Line on UPI against that collateral through one or more partner banks or NBFCs on the company's lending panel. When markets move against a client's pledged holdings, the system automatically triggers margin top-up requests, partial credit-line freezes, or controlled liquidation in line with each lending partner's risk policy, and routes collections and reconciliation without manual ops. The broking or wealth app keeps the customer relationship and UI; the API owns collateral monitoring, lending-partner orchestration, and regulatory reporting.
goToMarketSeed:
  firstCustomer: >-
    A Mumbai or Bengaluru-based discount broking or direct mutual-fund investment app with 2-15 million registered users, at least $500M in client AUM, and no existing bank or NBFC license, actively looking to add a lending or credit feature to increase engagement and revenue per user.
  buyingTrigger: >-
    Product and growth leadership see a competitor bank or fintech launch Credit Line on UPI and want feature parity within two quarters, but internal analysis shows building collateral-risk and lending-partner infrastructure in-house would take over a year and a dedicated credit team.
  currentAlternative: >-
    Manual, one-off NBFC partnership integrations with no real-time margining, or telling users to redeem fund units or apply for a generic personal loan on a separate app, both of which lose engagement and revenue to competitors.
  switchingReason: >-
    The API replaces a 12-18 month build-and-license effort with an integration the platform's engineering team can ship in one product cycle, while shifting collateral, credit, and regulatory risk to a purpose-built partner instead of an internally improvised process.
  pricingHypothesis: >-
    A base platform fee per integrated app plus a revenue share of 50-150 basis points on drawn credit-line balances, split with the underlying lending bank or NBFC partner.
