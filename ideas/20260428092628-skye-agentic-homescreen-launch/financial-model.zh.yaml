slug: family-widget-command-center
date: "2026-04-28"
currency: USD
modelStartMonth: "2026-05"
assumptions:
  - id: A1
    name: 模型起始时间
    value: "2026-05"
    unit: month
    source: "[BP date 2026-04-28；模型从次月开始]"
  - id: A2
    name: 付费家庭定义与起始基数
    value: "M1 时付费家庭为 0；本模型中的客户是付费家庭，不是免费激活用户"
    unit: households
    source: "[BP product/gtm + startup-finance modeling convention]"
  - id: A3
    name: 混合确认 ARPU
    value: "每个付费家庭每月 $5.60（年化 $67.20）"
    unit: USD per month
    source: "[BP gtm.pricing 中的 $7.99/月 与 $44.99/年；Research willingnessToPay 区间；按 45% 月付 / 55% 年付的经验混合计算]"
  - id: A4
    name: 毛利率
    value: "80%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A5
    name: 月度付费流失率
    value: "4.5%"
    unit: percent
    source: "[BP funnel target 中付费用户第 6 个月留存 65%+；据此换算的早期消费订阅混合流失率经验值]"
  - id: A6
    name: 第一年每月新增付费家庭爬坡
    value: "[0, 0, 10, 20, 30, 45, 60, 80, 110, 140, 170, 210]"
    unit: households by month
    source: "[BP experimentRoadmap 中 15 户 concierge 原型与 100 户 beta；采用偏保守的等候名单到付费转化爬坡假设]"
  - id: A7
    name: 第二年新增付费家庭爬坡
    value: "Q1Y2 1,050；Q2Y2 1,550；Q3Y2 2,400；Q4Y2 3,300"
    unit: households by quarter
    source: "[BP GTM channels 为 App Store + parent creators + referrals；假设在扩大投放前已证明留存]"
  - id: A8
    name: 第三年新增付费家庭爬坡
    value: "Q1Y3 5,400；Q2Y3 8,400；Q3Y3 12,000；Q4Y3 15,600"
    unit: households by quarter
    source: "[Research SOM 意味着第 3 年可触达约 4 万户；基准场景仍低于滩头 SAM 的 1%]"
  - id: A9
    name: pre-seed 交割到账现金
    value: "$2.40M"
    unit: USD
    source: "[BP fundingAsk target range 为 $1.5M-$2.5M；模型按上沿建模，以覆盖验证计划和 6 个月缓冲]"
  - id: A10
    name: 全包薪酬附加系数
    value: "按现金薪酬的 15% 计提"
    unit: percent
    source: "[Startup-finance heuristic；用于覆盖工资税和种子阶段基础福利]"
  - id: A11
    name: 各岗位现金薪酬区间
    value: "创始人 $120K；创始工程负责人 $170K；产品/设计负责人 $140K；增长负责人 $110K；iOS/全栈工程师 $160K；ML 工程师 $180K；生命周期营销负责人 $100K；支持运营 $70K；隐私顾问 retainer 按年化 $60K 估算"
    unit: USD per year
    source: "[BP team 角色设置 + 美国种子阶段创业公司薪酬经验值]"
  - id: A12
    name: 招聘时间安排
    value: "M1 founder、founding eng、founding product/design；M1 privacy advisor；M6 growth lead；M7 second eng；M13 ML eng；M19 lifecycle marketer；M25 support ops；M28 third eng"
    unit: start month
    source: "[BP team startTiming + milestone sequencing]"
  - id: A13
    name: 研发非工资支出
    value: "M1-M3 每月 $4K，M4-M6 每月 $5K，M7-M12 每月 $6K，M13-M18 每月 $7K，M19-M24 每月 $8K，M25-M36 每月 $10K"
    unit: USD thousands per month
    source: "[Startup-finance heuristic；覆盖云资源、QA 与产品基础设施等非可变成本]"
  - id: A14
    name: GTM 项目支出
    value: "Y1 从每月 $1K 增至 $18K；Y2 从每月 $20K 增至 $42K；Y3 从每月 $45K 增至 $85K"
    unit: USD thousands per month
    source: "[BP GTM channels 与 referral tests；采用保守的创作者合作和 App Store 投放爬坡]"
  - id: A15
    name: G&A 非工资支出
    value: "M1-M6 每月 $5K，M7-M12 每月 $6K，M13-M24 每月 $7K，M25-M36 每月 $8K"
    unit: USD thousands per month
    source: "[BP 中的隐私/数据控制要求 + 创业公司法务与财务经验值]"
  - id: A16
    name: 可变 COGS 构成
    value: "20% of revenue"
    unit: percent of revenue
    source: "[BP target gross margin；包含 app store 分成、托管成本与模型/API 成本]"
  - id: A17
    name: 稳态混合 CAC
    value: "每新增一个付费家庭约 $30"
    unit: USD
    source: "[由模型中第 3 年 GTM 支出除以新增付费家庭数推导，并留出保守缓冲]"
