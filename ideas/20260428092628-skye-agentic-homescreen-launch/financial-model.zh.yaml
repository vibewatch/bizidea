fundingAsk:
  round: pre-seed
  amountM: 2.4
  runwayMonths: 24
  milestone: 在第 18 个月达到约 3,000 个付费家庭，周 4 留存 40%+，在主流组织器定价下试用转付费 8%+，并建立一个能将 CAC 回收期控制在 12 个月以内的转介绍/App Store 增长机制，同时保留 6 个月现金缓冲以筹备 seed 轮融资。
  useOfFunds:
    - bucket: Engineering
      amountUsd: 1080000
      percentage: 45.0
    - bucket: GTM
      amountUsd: 540000
      percentage: 22.5
    - bucket: G&A
      amountUsd: 420000
      percentage: 17.5
    - bucket: Buffer (6 mo)
      amountUsd: 360000
      percentage: 15.0
scenarios:
  downside:
    description: App Store/转介绍扩张更慢、实际定价更低、留存更差，使产品始终无法达到可重复的消费订阅经济模型。
    y3RevenueK: 849.8
    y3EbitdaK: -1626.4
    cashLowPointK: -1603.5
    keyAssumptionChanges:
      - Y2-Y3 新增付费家庭比基础情形低 30%。
      - 综合 ARPU 下降到每月 $5.30。
      - 月度流失率上升到 5.5%。
  base:
    description: 公司证明了学校交接切口，通过家长创作者与转介绍放大规模，并以接近主流家庭组织应用的价格带完成变现。
    y3RevenueK: 1337.4
    y3EbitdaK: -1236.3
    cashLowPointK: -1155.8
    keyAssumptionChanges:
      - 基础模型假设 A3 到 A16 成立。
      - 招聘按照计划中的里程碑门控节奏推进。
      - 除 pre-seed 外，不包含额外融资。
  upside:
    description: 更好的留存与转介绍循环，让类似 Skye 的小组件行为复利式增长，并在只有温和提价的情况下更快拉动付费家庭增长。
    y3RevenueK: 1727.7
    y3EbitdaK: -924.1
    cashLowPointK: -797.8
    keyAssumptionChanges:
      - Y2-Y3 新增付费家庭比基础情形高 20%。
      - 综合 ARPU 上升到每月 $5.90。
      - 月度流失率改善到 4.0%。
sensitivity:
  - variable: ARPU
    downsideCase: "由于年付占比更高且月付转化较弱，综合月度 ARPU 为 $4.90"
    baseCase: "$5.60 综合月度 ARPU"
    upsideCase: "受更好的月付留存和更轻折扣影响，综合月度 ARPU 升至 $6.20"
    y3RevenueImpactK: 143.0
    cashImpactK: 114.0
  - variable: CAC
    downsideCase: "$45 CAC，因为创作者和付费社交渠道表现不及转介绍"
    baseCase: "$30 CAC"
    upsideCase: "$20 CAC，得益于更强的转介绍占比和更高的 App Store 效率"
    y3RevenueImpactK: 120.0
    cashImpactK: 180.0
  - variable: churn
    downsideCase: "5.5% 月度流失率"
    baseCase: "4.5% 月度流失率"
    upsideCase: "4.0% 月度流失率"
    y3RevenueImpactK: 236.0
    cashImpactK: 190.0
  - variable: sales cycle
    downsideCase: "试用转付费变慢，且 25% 的季度新增推迟一个季度到来"
    baseCase: "当前候补名单→试用和试用→付费的节奏"
    upsideCase: "试用转付费改善，付费新增提前 1 个月到来"
    y3RevenueImpactK: 95.0
    cashImpactK: 140.0
  - variable: gross margin
    downsideCase: "由于更高的 app-store 和模型成本，毛利率降至 75%"
    baseCase: "80% 毛利率"
    upsideCase: "由于推理和托管效率提升，毛利率升至 85%"
    y3RevenueImpactK: 0.0
    cashImpactK: 67.0
  - variable: hiring pace
    downsideCase: "两个计划中的岗位在收入证明前提早两个季度入职"
    baseCase: "按里程碑门控的招聘计划执行"
    upsideCase: "在留存证明更清晰前，增长和支持岗位延后一季度入职"
    y3RevenueImpactK: 80.0
    cashImpactK: 160.0
modelDiagram:
  title: 单位经济流程
  mermaid: |
    flowchart LR
      Leads[App Store + 创作者 + 转介绍] --> Activated[激活家庭]
      Activated --> Paid[付费家庭]
      Paid --> Revenue[订阅收入]
      Revenue --> GrossProfit[扣除 app store + 托管 + 模型成本后的毛利润]
      GrossProfit --> Cash[扣除 R&D + GTM + G&A 后的现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基础情形的收入由付费家庭增长驱动——从 M12 的 786 个增长到 Q4Y3 的 38,774 个，综合月度 ARPU 为 $5.60，而其中大部分增长来自转介绍和 App Store 转化。
  - checkName: 必须做对的事
    finding: 公司必须先在主流组织器价格带下证明周 4 留存和 8%+ 的试用转付费，才能合理地进入基础情形和上行情形中的 Y2-Y3 获客爬坡。
  - checkName: 模型会失效如果
    finding: 下行情形显示，如果流失率升至 5.5%，且付费新增比预期低 30%，那么在任何新融资到来前，现金缺口会扩大到约 -$1.60M。
  - checkName: 下一轮融资证明包
    finding: seed 轮故事依赖于第 18 个月时形成一套证明包：约 3,000 个付费家庭、可量化的漏接交接下降，以及低于 12 个月的 CAC 回收期，而这正是 $2.4M pre-seed 融资额的合理性所在。
sanityChecks:
  ruleOf40: "Y3 增长率 490.7% + EBITDA 利润率 -92.4% = 398.3%；方向上很强，但由于 Y2 收入基数仍小，其意义并不算太大。"
  burnMultiple: "Y3 burn multiple 为 0.6x，计算基于 $1.24M 净烧钱与年末付费家庭增长带来的约 $2.11M 新增 ARR。"
  revenuePerFte: "Y3 为 $149K，按 9.0 个期末 FTE 计算（低于典型 SaaS 基准，但对于仍在购买增长的早期消费订阅业务仍属可接受区间）。"
  flags:
    - Y1 收入刻意维持在极低水平；这轮融资的目标是为学习与留存验证提供资金，而不是追求早期变现。
    - 基础情形仍要求付费家庭新增从 M12 的 210 个增长到 M36 的 5,600 个，因此转介绍和 App Store 效率至关重要。
    - 如果没有后续融资，现金会在 Y3 转负，这与本轮融资的设计一致：它只覆盖到下一个里程碑外加 6 个月缓冲，而非覆盖至盈亏平衡。
    - 每个期末 FTE 对应收入仍低于成熟 SaaS 的效率基准，因此后续融资轮会期待比当前 pre-seed 计划更清晰的增长效率。
