fundingAsk:
  round: pre-seed
  amountM: 2.4
  runwayMonths: 24
  milestone: 在第 18 个月达到约 3,000 个付费家庭、第 4 周留存 40%+、主流家庭组织定价下的试用转付费 8%+，并通过转介绍与 App Store 组合把 CAC 回本压到 12 个月以内，同时保留 6 个月现金缓冲以便发起 seed 融资。
  useOfFunds:
    - bucket: Engineering
      amountUsd: 1080000
      percentage: 45.0
    - bucket: GTM
      amountUsd: 540000
      percentage: 22.5
    - bucket: G&A
      amountUsd: 420000
      percentage: 17.5
    - bucket: Buffer (6 mo)
      amountUsd: 360000
      percentage: 15.0
scenarios:
  downside:
    description: 如果 App Store 与转介绍扩张更慢、实际定价更低、留存也更差，产品就难以形成可复用的消费订阅经济模型。
    y3RevenueK: 849.8
    y3EbitdaK: -1626.4
    cashLowPointK: -1603.5
    keyAssumptionChanges:
      - 第 2-3 年新增付费家庭比基准场景低 30%。
      - 混合 ARPU 下降到每月 $5.30。
      - 月度流失率升至 5.5%。
  base:
    description: 公司证明了“学校交接”这个切口可行，借助家长创作者与转介绍扩张，并以接近主流家庭组织应用的价格完成变现。
    y3RevenueK: 1337.4
    y3EbitdaK: -1236.3
    cashLowPointK: -1155.8
    keyAssumptionChanges:
      - 基准模型中的 A3-A16 假设保持成立。
      - 招聘按里程碑触发的节奏推进。
      - 模型中不计入 pre-seed 之后的新增融资。
  upside:
    description: 如果留存和转介绍都更强，类似 Skye 的小组件行为就会带来更快的付费家庭增长，而定价只需小幅上抬。
    y3RevenueK: 1727.7
    y3EbitdaK: -924.1
    cashLowPointK: -797.8
    keyAssumptionChanges:
      - 第 2-3 年新增付费家庭比基准高 20%。
      - 混合 ARPU 升至每月 $5.90。
      - 月度流失率改善到 4.0%。
sensitivity:
  - variable: ARPU
    downsideCase: "每月混合 ARPU 降到 $4.90，原因是年付占比更高、月付转化更弱"
    baseCase: "每月混合 ARPU 为 $5.60"
    upsideCase: "若月付留存更好、折扣更少，混合 ARPU 升到每月 $6.20"
    y3RevenueImpactK: 143.0
    cashImpactK: 114.0
  - variable: CAC
    downsideCase: "$45 CAC，原因是创作者和付费社媒渠道不如转介绍有效"
    baseCase: "CAC 为 $30"
    upsideCase: "$20 CAC，前提是转介绍占比更高且 App Store 效率更强"
    y3RevenueImpactK: 120.0
    cashImpactK: 180.0
  - variable: churn
    downsideCase: "月度流失率 5.5%"
    baseCase: "月度流失率 4.5%"
    upsideCase: "月度流失率 4.0%"
    y3RevenueImpactK: 236.0
    cashImpactK: 190.0
  - variable: sales cycle
    downsideCase: "试用转付费变慢，且 25% 的季度新增要晚一个季度才落地"
    baseCase: "采用当下的等候名单→试用→付费转化节奏"
    upsideCase: "试用转付费改善，新增付费时间整体提前 1 个月"
    y3RevenueImpactK: 95.0
    cashImpactK: 140.0
  - variable: gross margin
    downsideCase: "若 app store 分成和模型成本更高，毛利率降到 75%"
    baseCase: "毛利率 80%"
    upsideCase: "若推理与托管效率提升，毛利率升到 85%"
    y3RevenueImpactK: 0.0
    cashImpactK: 67.0
  - variable: hiring pace
    downsideCase: "若有两名计划中的员工提前两个季度入职，收入尚未被证明前现金压力会更大"
    baseCase: "按里程碑触发的招聘计划执行"
    upsideCase: "增长与支持岗位延后一个季度，等留存更明确后再招"
    y3RevenueImpactK: 80.0
    cashImpactK: 160.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Leads[App Store + 创作者 + 转介绍] --> Activated[激活家庭]
      Activated --> Paid[付费家庭]
      Paid --> Revenue[订阅收入]
      Revenue --> GrossProfit[扣除 app store、托管与模型成本后的毛利]
      GrossProfit --> Cash[再扣除 R&D、GTM 与 G&A 后的现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准场景下，收入来自付费家庭数的增长——从 M12 的 786 户增加到 Q4Y3 的 38,774 户，混合月 ARPU 为 $5.60，而真正拉动增长的主要是转介绍和 App Store 转化。
  - checkName: 必须同时跑通的关键点
    finding: 公司必须先证明第 4 周留存与主流家庭组织定价下 8%+ 的试用转付费，才有资格去承接第 2-3 年的获客扩张节奏。
  - checkName: 模型会失效的情形
    finding: downside 情景显示，只要月度流失升到 5.5%、新增付费家庭少 30%，在没有新融资前，现金缺口就会扩大到约 -$1.60M。
  - checkName: 下一轮融资需要的证明包
    finding: seed 轮叙事依赖于第 18 个月拿出一组硬指标：约 3,000 个付费家庭、能量化的漏接减少，以及低于 12 个月的 CAC 回本周期，而这正是 $2.4M pre-seed 资金想换来的里程碑。
sanityChecks:
  ruleOf40: "按第 3 年增长率 490.7% 加上 EBITDA 利润率 -92.4% 计算，Rule of 40 为 398.3%；方向上很强，但由于第 2 年收入基数仍小，这个指标参考意义有限。"
  burnMultiple: "第 3 年 burn multiple 约为 0.6x，即用 $1.24M 净消耗去换约 $2.11M 的净新增 ARR。"
  revenuePerFte: "按期末 9.0 个 FTE 计算，第 3 年人均收入约为 $149K；低于成熟 SaaS 基准，但对仍在买增长的早期消费订阅业务来说尚算合理。"
  flags:
    - 第 1 年收入刻意保持很低；这一轮融资主要用于学习、验证留存，而不是提早追逐变现。
    - 基准场景要求新增付费家庭从 M12 的 210 户爬到 M36 的 5,600 户，因此转介绍与 App Store 效率至关重要。
    - 在没有 follow-on 融资的情况下，现金会在第 3 年转负；这与本轮融资只覆盖下一阶段里程碑加 6 个月缓冲、而非直达盈亏平衡的定位一致。
    - 期末人均收入仍低于成熟 SaaS 的效率基准，因此后续融资会希望看到更干净的增长效率。