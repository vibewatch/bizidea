differentiator: >-
  Most consumer AI products still expect a single user to open an app and type a request. This concept is differentiated by being shared, proactive, and stateful: it tracks a household graph, resolves conflicts in real time, and lives where the user already looks dozens of times a day. That creates better retention than generic assistants and a richer data moat than standalone family calendar apps.
