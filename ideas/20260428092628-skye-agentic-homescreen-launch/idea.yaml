problem: Busy dual-income families coordinate school logistics, calendar changes, chores, and errands across too many fragmented apps, then still miss the one update that matters in the next hour. Chatbots are too heavy for repeated daily coordination, while calendars, reminders, and family organizer apps are passive and require someone to keep opening them. The result is real household stress concentrated on one parent who becomes the default operator.
targetUser:
  primary: Primary household planner in dual-income iPhone-heavy families with children ages 5-12
  secondary: Co-parent or caregiver who shares pickup, activity, and errand responsibilities
  buyer: Household primary planner
startupThesis:
  nonObviousInsight: The winning consumer AI interface may be a shared, stateful widget layer that compresses family coordination into glanceable next-action tiles instead of another text box.
  beachhead: U.S. dual-income families with 1-3 school-age children who already share iPhones, calendars, and reminders but still coordinate pickups and after-school changes over text.
  wedge: An AI family command-center widget stack that turns calendars, school messages, errands, and task ownership into live homescreen cards with one-tap confirm, delegate, and reschedule actions.
  whyNowCatalyst: Skye's widget-first launch, early funding, and waitlist traction show consumers are newly ready to adopt an AI-native homescreen instead of opening a chat app for every task.
  ventureScalePath: Start with family logistics, then expand into the broader household operating system for shopping, travel, elder care, home services, and eventually a cross-device ambient assistant layer.
solution: Family Widget Command Center connects shared calendars, reminders, email forwards from schools, and household to-dos into a single AI-managed family graph. Its initial product is a set of iPhone widgets that show each person's next responsibility, flag conflicts before they become misses, and offer one-tap actions like swap pickup, notify the other parent, or move the errand. Instead of asking users to prompt an assistant, the system proactively rewrites the day's plan when a soccer practice moves or a meeting runs late. Over time, it learns household routines, surfaces recurring bottlenecks, and becomes the default interface for daily family operations.
goToMarketSeed:
  firstCustomer: U.S. millennial mothers in dual-income suburban households with two children, shared iPhone usage, and weekly after-school scheduling complexity
  buyingTrigger: A new school term, camp season, or repeated missed-pickup and scheduling incidents that make the current family coordination setup feel unsustainable
  currentAlternative: Shared iCloud or Google calendars, Apple Reminders, group texts, Notes, and family organizer apps like Cozi
  switchingReason: A proactive homescreen widget removes the need to open multiple apps or prompt a chatbot, while still giving families clear ownership and instant action on the next task
  pricingHypothesis: Freemium for one caregiver plus one child profile, then $14.99 per month per household for shared widgets, automations, and premium integrations
