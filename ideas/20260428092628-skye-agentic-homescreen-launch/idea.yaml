jobsToBeDone:
  - job: When our family's schedule changes midweek, help me instantly see who owns what next, so we can avoid missed pickups and last-minute chaos.
    currentAlternative: Group texts plus manually edited shared calendars
    successMetric: Fewer missed or late handoffs per month
  - job: When I look at my phone between meetings, help me resolve the next household decision in one tap, so I do not become the default family project manager.
    currentAlternative: Calendar checking, Notes lists, and mental load on one parent
    successMetric: Reduced daily coordination time for the primary planner
