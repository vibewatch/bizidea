topRisks:
  - name: Weak willingness to pay
    description: Families may love the convenience but still default to free calendars, texts, and reminders.
    mitigation: Target high-chaos households first, measure avoided misses and time saved, and keep a sharp premium paywall around shared automations.
  - name: Platform dependency
    description: Heavy reliance on iOS widgets and Apple policies could limit distribution or core functionality.
    mitigation: Build core planning logic independent of the widget shell and prepare companion experiences in messages, watch, and email.
  - name: Data trust barrier
    description: Users may hesitate to connect school emails, calendars, and household data to a new AI product.
    mitigation: Start with minimal permissions, transparent data controls, and local-first handling for the most sensitive household context.
