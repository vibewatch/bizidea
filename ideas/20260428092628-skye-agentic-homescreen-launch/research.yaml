  - 31
openQuestions:
- Will the target buyer trust a new app with school emails and calendar access, or is a calendar-only MVP the only viable entry wedge?
- Does a homescreen widget materially reduce missed handoffs versus a better-configured shared calendar plus reminders?
- 'Which household segment will retain best: two-parent dual-income families, co-parenting setups, or families coordinating with outside caregivers?'
- Can the startup sustain pricing materially above mainstream family-organizer apps without bundling hardware or commerce value?
