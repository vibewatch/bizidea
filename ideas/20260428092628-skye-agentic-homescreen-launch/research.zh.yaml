    - 30
  adoptionFrictionMatrix:
  - friction: 安全地连接日历和邮件
    severity: high
    affectedBuyer: 家庭主要规划者
    mitigation: 先从最小权限与手动转发学校邮件流程做起，再逐步请求更广泛的收件箱权限。
    sourceRefs:
    - 5
    - 15
    - 16
    - 18
  - friction: 围绕儿童和家庭数据的信任问题
    severity: high
    affectedBuyer: 家庭主要规划者
    mitigation: 提供透明控制、严格的数据保留范围，以及对任何儿童相关流程给出清晰的家长同意边界。
    sourceRefs:
    - 19
  - friction: 家庭使用习惯形成
    severity: high
    affectedBuyer: 全体家庭成员
    mitigation: 利用小组件、提醒和明确的责任闭环，让用户无需打开应用也会频繁查看产品。
    sourceRefs:
    - 2
    - 3
    - 20
    - 27
  - friction: 明确预算偏低
    severity: medium
    affectedBuyer: 家庭购买者
