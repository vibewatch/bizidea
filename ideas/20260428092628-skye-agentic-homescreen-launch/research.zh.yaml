    - 30
  adoptionFrictionMatrix:
  - friction: 安全地连接日历和邮箱
    severity: high
    affectedBuyer: 主要家庭安排者
    mitigation: 从最小权限和手动邮件转发工作流开始，等建立信任后再请求更广的收件箱权限。
    sourceRefs:
    - 5
    - 15
    - 16
    - 18
  - friction: 围绕儿童与家庭数据的信任问题
    severity: high
    affectedBuyer: 主要家庭安排者
    mitigation: 提供透明的数据控制、尽量短的数据保留周期，以及对任何儿童相关流程都划清家长同意边界。
    sourceRefs:
    - 19
  - friction: 让全家形成新习惯
    severity: high
    affectedBuyer: 整个家庭
    mitigation: 通过小组件、提醒和明确的责任归属闭环，让产品不需要“先打开应用”也能被自然查看。
    sourceRefs:
