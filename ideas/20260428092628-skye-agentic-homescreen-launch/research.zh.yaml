competitors:
- name: Cozi
  stage: incumbent
  wedge: 历史悠久的家庭组织器，提供共享日历、提醒、清单和餐食规划。
  pricing: Cozi Gold $39/year；提供免费层级。
  strength: 强势的美国品牌、广泛的功能集、386K 条 App Store 评分，以及依靠转介绍增长的历史。
  weaknessVsUs: 它主要是一个被动式组织应用，而不是主动式的 iPhone 小组件指挥中心；AI 和快捷行动编排能力有限。
  sourceRefs:
  - 20
  - 21
  - 22
- name: FamilyWall
  stage: scale-up
  wedge: 一体化家庭 OS，覆盖日历、消息、文档、预算和位置。
  pricing: 试用后 $44.99/year 或 $7.99/month。
  strength: 功能广度很强，且在日历之外也支持面向家庭的特定工作流。
  weaknessVsUs: 更重的产品形态容易显得杂乱，带来更大的隐私暴露面，也并非围绕 iPhone 原生的一眼可见行动而设计。
  sourceRefs:
  - 23
  - 24
- name: TimeTree
  stage: scale-up
  wedge: 以共享日历为先的网络，提供小组件、事件聊天和庞大的全球用户基础。
  pricing: Premium 为 $44.99/year 或 $4.49/month。
  strength: 规模大、参与度高，并明确支持小组件和多日历。
  weaknessVsUs: 它优化的是日历共享，而不是家庭任务归属和 AI 驱动的冲突解决；其围绕未来数据的广告策略也可能引发信任问题。
  sourceRefs:
  - 25
  - 26
  - 32
- name: Hearth Display
  stage: scale-up
  wedge: 高端数字家庭显示设备，提供日常安排、任务、AI helper 和餐食规划。
  pricing: 设备 $699，另需购买起价为 $86.40/year 的会员资格。
  strength: 对“心理负担”的表达强、家庭界面始终可见，并证明家庭愿意为此类产品付费。
  weaknessVsUs: 需要专用硬件并依赖家庭内场景；当主要规划者不在墙面设备旁时，价值会下降。
  sourceRefs:
  - 27
  - 28
  - 29
- name: Skylight Calendar
  stage: scale-up
  wedge: 数字墙面日历，支持共享任务、清单、餐食规划和 premium 导入工具。
  pricing: 需要购买硬件，并通过 Calendar Plus 增购；价格随套餐而变。
  strength: 家庭可见性这一使用场景很清晰，并提供 Magic Import 和奖励等高级功能。
  weaknessVsUs: 硬件优先模式增加了成本和设置摩擦，而拟议创业公司可以直接存在于家庭成员反复查看的手机上。
  sourceRefs:
  - 30
  - 31
regulatoryTechnicalConstraints:
- point: EventKit 访问需要显式授权和正确的 iOS usage-description key；请求超出必要范围的访问，会增加信任和审核风险。
  sourceRefs:
  - 5
- point: 小组件刷新有预算限制，对高频查看的小组件而言，通常大致被限制在每天 40 到 70 次 reload，这限制了主屏幕能有多“实时”。
  sourceRefs:
  - 2
  - 3
- point: Gmail read/modify scopes 属于受限权限；如果数据被存储在服务端，还可能需要额外验证甚至安全评估。
  sourceRefs:
  - 16
  - 18
- point: Calendar API 的配额和速率限制会让重轮询架构变得脆弱；更优模式是 push notifications 和 sync tokens。
  sourceRefs:
  - 17
- point: 如果儿童档案、精确位置或直接收集儿童数据成为核心功能，COPPA 义务将显著增加合规成本。
  sourceRefs:
  - 19
validationSignals:
- point: 据报道，Skye 在正式发布前就围绕“以 iPhone 小组件驱动的 AI”论点筹集了超过 $3.58M pre-seed 资金，并建立了数万人的候补名单。
  sourceRefs:
  - 1
- point: Cozi 在 App Store 上拥有 386K 条评分，表明围绕家庭组织软件的消费行为具有大规模和持续性。
  sourceRefs:
  - 20
- point: FamilyWall 拥有 18K 条 App Store 评分和广泛的 premium 套餐，说明用户仍愿意采用并为家庭协同产品付费。
  sourceRefs:
  - 24
- point: TimeTree 在 App Store 上宣称拥有 70M 全球用户，并且在 2022 年前就已超过 37M 用户，这证明共享日历行为可以达到相当大的规模。
  sourceRefs:
  - 25
  - 26
- point: Hearth 表示自己已进入超过 15,000 个家庭，并展示了 786 条产品评价，验证了家庭愿意为“始终可见的协同界面”买单。
  sourceRefs:
  - 27
  - 29
- point: Skylight 和 Hearth 现在都在销售带有 AI 风格导入、餐食规划和奖励机制的功能，这说明该品类正从被动显示走向更主动的家庭工具。
  sourceRefs:
  - 27
  - 30
  - 31
openQuestions:
- 目标买家会信任一款新应用，愿意提供学校邮件和日历访问权限吗，还是说“仅日历”的 MVP 才是唯一可行的入场切口？
- 相比一个配置得更好的共享日历加提醒事项，主屏幕小组件是否真的能显著减少漏接交接？
- 哪类家庭细分会有最好的留存：双职工双亲家庭、共同抚养家庭，还是需要与外部照护者协同的家庭？
- 如果不捆绑硬件或电商价值，创业公司能否长期维持高于主流家庭组织应用的定价？
