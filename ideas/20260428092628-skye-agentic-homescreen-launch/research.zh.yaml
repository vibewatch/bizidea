competitors:
- name: Cozi
  stage: incumbent
  wedge: 老牌家庭组织工具，提供共享日历、提醒、清单和餐食规划。
  pricing: $39/year Cozi Gold；也提供免费层。
  strength: 美国品牌认知强、功能面广、App Store 有 38.6 万条评分，而且长期靠转介绍扩张。
  weaknessVsUs: 更像被动式组织应用，而不是主动式 iPhone 小组件指挥中心；AI 与快捷行动编排能力有限。
  sourceRefs:
  - 20
  - 21
  - 22
- name: FamilyWall
  stage: scale-up
  wedge: 一体化家庭 OS，涵盖日历、消息、文档、预算与定位。
  pricing: 试用后为 $44.99/year 或 $7.99/month。
  strength: 功能面更宽，且在家庭专属工作流上比单纯日历更完整。
  weaknessVsUs: 产品偏重、容易显得杂乱，也带来更大的隐私暴露面；核心交互并不是 iPhone 原生的“扫一眼即可行动”。
  sourceRefs:
  - 23
  - 24
- name: TimeTree
  stage: scale-up
  wedge: 以共享日历为核心的网络，支持小组件、活动聊天和大规模全球用户。
  pricing: Premium 为 $44.99/year 或 $4.49/month。
  strength: 规模大、活跃度高，并明确支持小组件和多日历场景。
  weaknessVsUs: 更适合共享排程，而不是家庭任务归属与 AI 驱动的冲突处理；其未来数据广告化方向也可能带来信任顾虑。
  sourceRefs:
  - 25
  - 26
  - 32
- name: Hearth Display
  stage: scale-up
  wedge: 高端数字家庭显示设备，提供日常习惯、任务、AI 助手和餐食规划。
  pricing: 设备 $699，外加必需的会员费，起价 $86.40/year。
  strength: 对“家庭心智负担”的表达很强，表面始终可见，也证明家庭愿意为此付费。
  weaknessVsUs: 需要专用硬件，且价值主要发生在家里；当主要安排者离开墙面设备时，帮助就会打折。
  sourceRefs:
  - 27
  - 28
  - 29
- name: Skylight Calendar
  stage: scale-up
  wedge: 数字墙面日历，支持共享任务、清单、餐食规划和高级导入工具。
  pricing: 先购买硬件，再加购 Calendar Plus；具体价格取决于套装。
  strength: 家庭可见性场景很清楚，并提供 Magic Import 与奖励机制等高级功能。
  weaknessVsUs: 硬件优先模式带来更高成本和更重的设置摩擦，而拟议中的创业公司可以直接活在家庭成员最常看的手机上。
  sourceRefs:
  - 30
  - 31
regulatoryTechnicalConstraints:
- point: EventKit 访问需要显式权限和正确的 iOS usage-description 配置；如果应用申请了超出实际需要的访问范围，信任和审核风险都会上升。
  sourceRefs:
  - 5
- point: 小组件刷新有预算限制；对于高频被查看的小组件，通常每天约只能刷新 40-70 次，因此主屏并没有想象中那么“实时”。
  sourceRefs:
  - 2
  - 3
- point: Gmail 的 read/modify scopes 属于受限范围；如果数据存储在服务端，往往还需要额外验证，甚至安全评估。
  sourceRefs:
  - 16
  - 18
- point: Calendar API 的配额和限流，让频繁轮询型架构很脆弱；更合适的模式是使用 push 通知和 sync tokens。
  sourceRefs:
  - 17
- point: 如果儿童档案、精确位置，或直接收集儿童数据变成核心功能，COPPA 合规负担会明显上升。
  sourceRefs:
  - 19
validationSignals:
- point: 据报道，Skye 在正式发布前，已围绕“以 iPhone 小组件为核心的 AI 体验”拿到超过 $3.58M 的 pre-seed，并积累了数万名等候名单用户。
  sourceRefs:
  - 1
- point: Cozi 在 App Store 有 38.6 万条评分，说明家庭组织软件是一个规模化且持续存在的消费行为。
  sourceRefs:
  - 20
- point: FamilyWall 在 App Store 有 1.8 万条评分，并且长期销售高级订阅，说明用户仍愿意采用并为家庭协同产品付费。
  sourceRefs:
  - 24
- point: TimeTree 在 App Store 宣称有 7000 万全球用户，而且在 2022 年就已突破 3700 万注册用户，这证明共享日历行为可以做到非常大规模。
  sourceRefs:
  - 25
  - 26
- point: Hearth 表示自己已经进入 1.5 万多个家庭，并展示了 786 条产品评价，说明家庭愿意为“始终可见”的协同表面买单。
  sourceRefs:
  - 27
  - 29
- point: Skylight 与 Hearth 现在都在宣传 AI 风格的导入、餐食规划和奖励功能，说明这个品类正从被动展示走向更主动的家庭工具。
  sourceRefs:
  - 27
  - 30
  - 31
openQuestions:
- 目标买家是否会信任一款新应用，把学校邮件和日历访问权交给它，还是说“只接日历”的 MVP 才是唯一可行入口？
- 主屏小组件是否真的能比配置更好的共享日历加提醒，更有效地减少交接失误？
- 在双职工家庭、共同抚养家庭和依赖外部照护者的家庭之间，哪一个细分群体的留存会最好？
- 如果不绑定硬件或电商价值，创业公司能否把定价长期维持在明显高于主流家庭组织应用的水平？
