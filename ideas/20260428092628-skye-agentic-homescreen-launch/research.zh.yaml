    sourceRefs:
    - 19
  - factor: 经济
    impact: negative
    point: 消费软件确实有付费意愿，但上限有限；主流家庭组织订阅价格明显低于许多 SaaS 品类。
    sourceRefs:
    - 21
    - 23
    - 26
  - factor: 社会
    impact: positive
