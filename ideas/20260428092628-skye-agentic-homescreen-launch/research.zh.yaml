    sourceRefs:
    - 19
  - factor: economic
    impact: negative
    point: 消费软件的付费意愿真实存在，但上限有限，主流组织器订阅价格远低于许多 SaaS 产品。
    sourceRefs:
    - 21
    - 23
    - 26
  - factor: social
    impact: positive
    point: 母亲更常报告育儿压力和疲惫，这让“降低心理负担”和“共享责任”成为强有力的情绪切入点。
    sourceRefs:
    - 9
  - factor: technological
    impact: positive
    point: widgets、Live Activities、App Intents 和 Apple Intelligence 提高了原生主动式主屏幕产品在技术上的可行性。
