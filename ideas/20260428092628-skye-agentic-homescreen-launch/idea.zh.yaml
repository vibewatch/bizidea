jobsToBeDone:
  - job: 当我们家的日程在一周中途发生变化时，帮我立刻看清接下来谁负责什么，这样我们就能避免错过接送和最后一分钟的混乱。
    currentAlternative: 群聊短信加手动编辑的共享日历
    successMetric: 每月迟到或漏接的交接次数减少
  - job: 当我在开会间隙看手机时，帮我用一次点击就处理下一个家庭决策，这样我就不用继续当默认的家庭项目经理。
    currentAlternative: 翻日历、看 Notes 列表，以及由一位家长独自承担的心智负担
    successMetric: 主要安排者每天花在协同上的时间下降
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这个信号簇同时具备明确产品切口、等候名单证据和融资支持，足以说明用户行为可能正在变化。
  painIntensity:
    score: 3
    rationale: 家庭协同确实高频且令人头疼，但多数家庭往往选择忍受，而不是把它明确列成预算项目。
  wedgeClarity:
    score: 4
    rationale: 初始场景、目标用户和界面都足够具体收窄，因此可以很快验证。
  defensibility:
    score: 3
    rationale: 护城河首先来自家庭关系图数据与使用习惯留存，不过平台风险仍不可忽视。
  ventureScale:
    score: 4
    rationale: 家庭后勤这个切口有机会扩展成更广泛的家庭操作系统，并带来订阅和消费交易的上行空间。
topRisks:
  - name: 付费意愿偏弱
    description: 家庭也许会喜欢这种便利，但最终仍可能回到免费的日历、短信和提醒工具。
    mitigation: 先锁定高混乱度家庭，量化减少的遗漏和节省的时间，并把共享自动化放进一条足够锋利的付费墙里。
  - name: 平台依赖
    description: 对 iOS 小组件和 Apple 政策的高度依赖，可能限制分发或核心功能发挥。
    mitigation: 让核心规划逻辑独立于小组件壳层之外，并提前准备消息、手表和邮件等配套体验。
  - name: 数据信任门槛
    description: 用户可能会犹豫，是否要把学校邮件、日历和家庭数据接进一款新的 AI 产品。
    mitigation: 从最小权限起步，提供透明的数据控制，并对最敏感的家庭上下文优先采用本地优先处理。