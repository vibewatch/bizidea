    signalRefs: ["AI 原生产品设计就是核心命题"]
    sourceRefs: [2]
differentiator: >-
  大多数消费级 AI 产品仍假设单个用户会打开应用并输入请求。这个概念的差异化在于它是共享的、主动的、有状态的：它跟踪一个家庭图谱，实时解决冲突，并存在于用户每天已经会看几十次的位置。这带来的留存会优于通用助手，也能形成比独立家庭日历应用更丰富的数据护城河。
