jobsToBeDone:
  - job: 当我们家的日程在周中发生变化时，帮我立刻看清接下来谁负责什么，这样我们就能避免漏接和最后一刻的混乱。
    currentAlternative: 群聊短信加手动编辑的共享日历
    successMetric: 每月漏接或延误交接次数减少
  - job: 当我在会议间隙看一眼手机时，帮我用一次点击解决下一个家庭决策，这样我就不会变成默认的家庭项目经理。
    currentAlternative: 查看日历、Notes 清单，以及由某一位家长独自承担的心理负担
    successMetric: 主要规划者的日常协调时间减少
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这个信号簇同时包含具体产品切口、候补名单证据和融资信息，足以较强地说明用户行为可能正在变化。
  painIntensity:
    score: 3
    rationale: 家庭协调确实高频且令人头疼，但人们往往选择忍受，而不会把它明确列入预算。
  wedgeClarity:
    score: 4
    rationale: 初始使用场景、目标用户和界面都足够狭窄且具体，可以较快验证。
  defensibility:
    score: 3
    rationale: 护城河将从家庭图谱数据与使用习惯留存开始形成，但平台风险依然不可忽视。
  ventureScale:
    score: 4
    rationale: 家庭后勤这一切入口可以扩展成更广泛的家庭操作系统，并带来订阅与电商增量空间。
topRisks:
  - name: 付费意愿偏弱
    description: 家庭用户可能很喜欢这种便利性，但最终仍会回到免费的日历、短信和提醒事项工具。
    mitigation: 先聚焦高混乱度家庭，量化减少遗漏和节省时间的效果，并把共享自动化牢牢放在清晰的付费墙之后。
  - name: 平台依赖
    description: 对 iOS 小组件和 Apple 政策的高度依赖，可能限制分发或核心功能。
    mitigation: 让核心规划逻辑独立于小组件外壳存在，并准备在消息、手表和邮件中提供配套体验。
  - name: 数据信任壁垒
    description: 用户可能不愿把学校邮件、日历和家庭数据连接到一个新的 AI 产品中。
    mitigation: 从最小权限开始，提供透明的数据控制，并对最敏感的家庭上下文采用本地优先处理。
