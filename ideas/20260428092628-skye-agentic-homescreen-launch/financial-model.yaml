modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[App Store + creators + referrals] --> Activated[Activated households]
      Activated --> Paid[Paid households]
      Paid --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit after app store + hosting + model costs]
      GrossProfit --> Cash[Cash after R&D + GTM + G&A]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by paid-household growth from 786 households at M12 to 38,774 by Q4Y3 on a $5.60 blended monthly ARPU, with referrals and App Store conversion doing most of the work.
  - checkName: Must go right
    finding: The company must clear week-4 retention and 8%+ trial-to-paid at mainstream organizer pricing before leaning into the Y2-Y3 acquisition ramp in the base and upside cases.
  - checkName: Model breaks if
    finding: The downside case shows that if churn drifts to 5.5% and paid adds run 30% light, cash draw deepens to roughly -$1.60M before any new financing.
  - checkName: Next-round proof
    finding: The seed story is a month-18 proof package of ~3,000 paying households, measurable missed-handoff reduction, and CAC payback below 12 months, which is what justifies the $2.4M pre-seed ask.
sanityChecks:
  ruleOf40: "Y3 growth 490.7% + EBITDA margin -92.4% = 398.3%; directionally strong but not very meaningful because Y2 revenue is still small."
  burnMultiple: "Y3 burn multiple 0.6x using $1.24M net burn against ~$2.11M net new ARR from year-end paid-household growth."
  revenuePerFte: "$149K Y3 using 9.0 exit FTE (below typical SaaS benchmarks, but within range for an early consumer-subscription business still buying growth)."
  flags:
    - Y1 revenue is intentionally de minimis; this raise funds learning and retention proof rather than early monetization.
    - The base case still requires paid-household additions to scale from 210 in M12 to 5,600 in M36, so referral and App Store efficiency are critical.
    - Cash turns negative in Y3 without a follow-on round, which is consistent with the ask being sized to the next milestone plus a 6-month buffer rather than to breakeven.
    - Revenue per exit FTE remains below mature SaaS efficiency benchmarks, so later rounds will expect cleaner growth efficiency than this pre-seed plan shows.
