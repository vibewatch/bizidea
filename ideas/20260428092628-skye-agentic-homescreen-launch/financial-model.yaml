    - bucket: Engineering
      amountUsd: 1080000
      percentage: 45.0
    - bucket: GTM
      amountUsd: 540000
      percentage: 22.5
    - bucket: G&A
      amountUsd: 420000
      percentage: 17.5
    - bucket: Buffer (6 mo)
      amountUsd: 360000
      percentage: 15.0
scenarios:
  downside:
    description: Slower App Store/referral scaling, lower realized pricing, and worse retention keep the product below repeatable consumer-subscription economics.
    y3RevenueK: 849.8
    y3EbitdaK: -1626.4
    cashLowPointK: -1603.5
    keyAssumptionChanges:
      - Y2-Y3 new paid household adds run 30% below base.
      - Blended ARPU falls to $5.30 per month.
      - Monthly churn rises to 5.5%.
  base:
    description: The company proves the school-handoff wedge, scales through parent creators plus referrals, and monetizes near mainstream family-organizer price points.
    y3RevenueK: 1337.4
    y3EbitdaK: -1236.3
    cashLowPointK: -1155.8
    keyAssumptionChanges:
      - Base model assumptions A3 through A16 hold.
      - Hiring follows the planned milestone-gated schedule.
      - No additional financing is included beyond the pre-seed.
  upside:
    description: Better retention and referral loops let Skye-like widget behavior compound into faster paid-household growth with only modest pricing uplift.
    y3RevenueK: 1727.7
    y3EbitdaK: -924.1
    cashLowPointK: -797.8
    keyAssumptionChanges:
      - Y2-Y3 new paid household adds run 20% above base.
      - Blended ARPU rises to $5.90 per month.
      - Monthly churn improves to 4.0%.
