assumptions:
  - id: A1
    name: Model start
    value: "2026-05"
    unit: month
    source: "[BP date 2026-04-28; model begins the following month]"
  - id: A2
    name: Paying household definition and starting base
    value: "0 paying households at M1; customers in this model are paid households, not free activations"
    unit: households
    source: "[BP product/gtm + startup-finance modeling convention]"
  - id: A3
    name: Blended recognized ARPU
    value: "$5.60 per paid household per month ($67.20 annualized)"
    unit: USD per month
    source: "[BP gtm.pricing $7.99/mo and $44.99/yr; Research willingnessToPay bands; heuristic 45% monthly / 55% annual mix]"
  - id: A4
    name: Gross margin
    value: "80%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A5
    name: Monthly paid churn
    value: "4.5%"
    unit: percent
    source: "[BP funnel target paid month-6 retention 65%+; heuristic equivalent blended churn for an early consumer subscription]"
  - id: A6
    name: Y1 new paid households ramp
    value: "[0, 0, 10, 20, 30, 45, 60, 80, 110, 140, 170, 210]"
    unit: households by month
    source: "[BP experimentRoadmap 15-household concierge then 100-household beta; conservative waitlist-to-paid ramp heuristic]"
  - id: A7
    name: Y2 new paid households ramp
    value: "Q1Y2 1,050; Q2Y2 1,550; Q3Y2 2,400; Q4Y2 3,300"
    unit: households by quarter
    source: "[BP GTM channels App Store + parent creators + referrals; assumes retention proof is achieved before scaling]"
  - id: A8
    name: Y3 new paid households ramp
    value: "Q1Y3 5,400; Q2Y3 8,400; Q3Y3 12,000; Q4Y3 15,600"
    unit: households by quarter
    source: "[Research SOM implies ~40K reachable households by year 3; base case stays below 1% of beachhead SAM]"
  - id: A9
    name: Pre-seed cash at close
    value: "$2.40M"
    unit: USD
    source: "[BP fundingAsk target range $1.5M-$2.5M; modeled at upper end to fund proof plan plus 6-month buffer]"
  - id: A10
    name: Loaded compensation factor
    value: "15% on cash salary"
    unit: percent
    source: "[Startup-finance heuristic for payroll taxes and basic benefits at seed stage]"
  - id: A11
    name: Cash salary bands by role
    value: "Founder $120K; Founding eng $170K; Product/design $140K; Growth lead $110K; iOS/full-stack eng $160K; ML eng $180K; Lifecycle marketer $100K; Support ops $70K; privacy advisor retainer $60K equivalent"
    unit: USD per year
    source: "[BP team roles + U.S. seed-stage startup compensation heuristic]"
  - id: A12
    name: Hiring timing
    value: "M1 founder, founding eng, founding product/design; M1 privacy advisor; M6 growth lead; M7 second eng; M13 ML eng; M19 lifecycle marketer; M25 support ops; M28 third eng"
    unit: start month
    source: "[BP team startTiming + milestone sequencing]"
  - id: A13
    name: R&D non-payroll spend
    value: "M1-M3 $4K/mo, M4-M6 $5K/mo, M7-M12 $6K/mo, M13-M18 $7K/mo, M19-M24 $8K/mo, M25-M36 $10K/mo"
    unit: USD thousands per month
    source: "[Startup-finance heuristic for cloud tools, QA, and product infrastructure outside variable COGS]"
  - id: A14
    name: GTM program spend
    value: "Y1 ramps from $1K/mo to $18K/mo; Y2 from $20K/mo to $42K/mo; Y3 from $45K/mo to $85K/mo"
    unit: USD thousands per month
    source: "[BP GTM channels and referral tests; conservative creator plus App Store spend ramp]"
  - id: A15
    name: G&A non-payroll spend
    value: "M1-M6 $5K/mo, M7-M12 $6K/mo, M13-M24 $7K/mo, M25-M36 $8K/mo"
    unit: USD thousands per month
    source: "[BP privacy/data controls plus startup legal/accounting heuristic]"
  - id: A16
    name: Variable COGS composition
    value: "20% of revenue"
    unit: percent of revenue
    source: "[BP target gross margin; includes app store fees, hosting, and model/API usage]"
  - id: A17
    name: Steady-state blended CAC
    value: "$30 per new paid household"
    unit: USD
    source: "[Derived from modeled Y3 GTM spend per new paid household with conservative buffer]"
