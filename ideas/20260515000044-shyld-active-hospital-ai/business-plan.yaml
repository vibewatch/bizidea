slug: or-turnover-control-plane
date: '2026-05-15'
executiveSummary: >-
  Operating-room turnover is still coordinated through manual checklists, hallway handoffs, and partial system timestamps,
  even though each delayed clean pushes case starts back and each missed step raises infection-control exposure. The best
  first customer is a multi-hospital U.S. health system running 10-40 inpatient ORs per site with visible late-start or
  turnover-variance pressure, because the same buyer already owns both capacity and quality outcomes. The product wedge is
  an edge-deployed turnover control plane that verifies terminal-clean and UV-C completion, timestamps staff movement, and
  produces a trusted room-ready signal for charge nurses without requiring a heavy EHR replacement. Go-to-market should
  stay narrow: sell to perioperative leadership after a throughput initiative, HAI review, or surgical growth plan makes
  lost room minutes economically urgent, then start with a paid pilot on one campus before expanding across the system.
  Pricing should be tied to monitored rooms and implementation because buyers are purchasing recovered throughput and
  auditability, not generic AI automation. The strategic advantage is the room-level event dataset, service-line-specific
  readiness rules, and benchmark layer that schedule software, ambient platforms, and UV-C hardware do not own by default.
  The deliberate sequencing is to prove room-ready accuracy and pilot conversion in OR turnover before expanding into
  sterile processing, inpatient EVS, or regulated cleanrooms. The largest disconfirming risk is that hospitals treat the
  system as advisory only and do not operationally trust a single room-ready event enough to change staffing and scheduling
  behavior. Public evidence supports the pain and category momentum, but no public pricing or deployment counts are
  disclosed for the closest analog, so the first year must generate customer-owned proof on install friction,
  willingness-to-pay, and production conversion.
problem:
  - Perioperative teams still lack a room-level source of truth for whether terminal-clean steps happened in sequence, so charge nurses rely on manual walk-throughs and fragmented logs to decide if the next case can start.
  - Hospitals can already buy schedule optimization, RTLS, and disinfection hardware, but those tools do not verify actual room readiness, leaving throughput gains and infection-control accountability incomplete.
solution:
  - Deploy a room-native control plane that uses edge cameras and sensors to detect case end, staff flow, equipment removal, cleaning milestones, UV-C completion, and final room-ready status in real time.
  - Turn each turnover into an auditable sequence record with SLA clocks, exception alerts, and predicted ready times, starting from a schedule feed and local room instrumentation instead of a broad hospital IT overhaul.
whyWeWin:
  - The product sells one high-stakes operational decision, "is this OR actually ready now?", where proof quality matters more than breadth and where incumbent schedule tools or smart-hospital platforms do not currently own the workflow.
  - Every deployment compounds a proprietary dataset of turnover events, exceptions, and benchmark patterns across campuses, which improves alert quality and creates expansion leverage into adjacent audited room workflows.
strategicChoices:
  beachhead: Multi-hospital U.S. surgical systems with 10-40 inpatient ORs per campus and persistent turnover overruns or first-case start delays in orthopedic, general, and cardiovascular service lines.
  wedgeRationale: >-
    OR turnover creates faster proof than broader hospital-operations software because the workflow is frequent, the buyer
    already feels the cost in missed case capacity, and success can be measured in minutes recovered, readiness accuracy,
    and audit evidence within one quarter. Starting with one room-ready decision is more credible than selling generic
    smart-hospital sensing or full perioperative orchestration on day one.
  sequencingRationale: >-
    The company should first ship verified room-state detection, exception handling, and perioperative command views for a
    limited pilot footprint because operational trust is the gating asset. Only after paid pilots show lower turnover
    variance and production conversion should the team add broader analytics, cross-campus benchmarking, partner
    integrations, and a scaled sales motion; otherwise product scope, implementation burden, and enterprise selling will
    outrun proof.
  notYet:
    - Full smart-hospital platform positioning across every clinical unit
    - Broad cleanroom and pharmaceutical expansion before multi-campus OR proof exists
    - Autonomous clinical or disinfection-efficacy claims that raise regulatory burden
    - Deep EHR replacement or enterprise command-center software beyond the room-ready workflow
market:
  tam: "$963.1M estimated wedge TAM: 3,567 system-affiliated community hospitals times an estimated 15 inpatient ORs per hospital at roughly $18,000 annual software ARPU per monitored OR."
  sam: "$321.1M estimated beachhead SAM: a filtered 25% of system hospitals concentrated in multi-campus, throughput-constrained programs at roughly 20 monitored ORs each and the same $18,000 annual ARPU."
  som: "$10.8M estimated year-3 SOM: 20 health systems times 2 campuses times 15 ORs per campus at roughly $18,000 annual ARPU."
  segments:
    - Multi-hospital health systems with high-throughput inpatient surgical suites
    - Academic medical centers and larger ambulatory surgery networks expanding multi-site perioperative operations
  buyingProcess: >-
    The typical champion is the director or VP of perioperative services, with infection-prevention and EVS leaders as key
    validators and the COO, CNO, or perioperative executive as the economic buyer. Deals should begin as a paid pilot on
    one campus after a throughput initiative, HAI review, or surgical-growth mandate, then convert to an annual system
    contract once the room-ready signal is trusted in live operations and security review is cleared.
product:
  mvp: >-
    The MVP includes room instrumentation, case-end detection, staff entry and exit tracking, cleaning-step verification,
    UV-C completion capture, charge-nurse and EVS dashboards, exception alerts, audit logs, and a schedule-feed
    integration. It should be narrow enough to prove that one campus can trust the room-ready event and reduce turnover
    variance without a large integration project.
  sixMonth: >-
    Launch one pilot campus with 8-12 ORs, keep ambiguous events in human review, and deliver customer-owned reporting on
    ready-time accuracy, turnover minutes, and missed-step exceptions.
  twelveMonth: >-
    Convert 3 paid pilots to production, add cross-campus benchmarking, deployment templates, and integration hooks into
    perioperative scheduling or messaging systems, and keep new-campus rollout under eight weeks.
  twentyFourMonth: >-
    Expand across multi-campus systems, add adjacent audited workflows such as procedure rooms or sterile-processing
    handoffs, and introduce benchmark products that increase value beyond the initial room-ready alert.
  keyBets:
    - Charge nurses will act on a verified room-ready event if false positives remain low enough to trust in live case flow.
    - Buyers will fund a room-native layer without demanding a full perioperative suite replacement.
    - Privacy and facilities objections can be managed with edge processing, limited retention, and narrow pilot governance.
    - Cross-campus workflow data will materially improve benchmarking and alert quality beyond what single-site competitors can offer.
gtm:
  wedge: Sell a trusted room-ready signal for OR turnover to perioperative leaders when delayed starts or HAI scrutiny make manual readiness calls economically and operationally unacceptable.
  channels:
    - Founder-led direct sales into perioperative and surgical-services leadership
    - Infection-prevention and EVS-sponsored pilots tied to audit or cleaning-verification mandates
    - Partner-led co-selling with UV-C and adjacent perioperative AI vendors once the room-ready signal is proven
  funnelTargets: "Intro→workflow audit 25-35%, audit→paid pilot 35-45%, pilot→annual production 50%+, first-campus→second-campus expansion within 9 months in 50%+ of converted accounts."
  pricing: >-
    Charge an annual subscription per monitored room plus one-time deployment and validation fees, with premium pricing for
    cross-campus benchmarking and analytics. This matches the buying logic because capacity recovery, auditability, and
    rollout complexity scale with room count and campus footprint rather than generic software seats.
businessModel:
  revenueStreams:
    - Annual software subscription per monitored room or campus deployment
    - One-time implementation, validation, and workflow-mapping fees
    - Expansion modules for benchmark analytics, additional units, and partner integrations
  unitOfValue: Trusted monitored operating room with verified readiness events
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more ORs and campuses inside the same health system
    - Layer on cross-campus benchmarking and readiness analytics
    - Expand into adjacent audited workflows such as procedure rooms, sterile processing handoffs, and inpatient EVS
    - Become the orchestration layer around UV-C and perioperative optimization partners
strategyMap:
  northStarMetric: Quarterly monitored turnovers with a trusted room-ready event acted on by perioperative staff
  inputMetrics:
    - Ready-time prediction accuracy versus actual room release
    - Median turnover minutes and turnover variance by monitored OR
    - Percent of turnovers with completed, audit-ready sequence records
    - Paid pilot to annual production conversion rate
    - Expansion rate from first campus to second campus within existing accounts
  moatsToBuild:
    - Timestamped dataset of room-level turnover events, exceptions, and ready-state outcomes
    - Service-line-specific readiness rules and exception logic tuned to perioperative workflows
    - Cross-campus benchmark layer showing staffing, variance, and compliance patterns
    - Deployment and governance playbooks that shorten installation and security approval cycles
  killCriteria:
    - If the first 3 paid pilots cannot improve trusted ready-time accuracy enough for charge nurses to use the signal in live operations, abandon the room-ready thesis.
    - If pilot sites do not reduce turnover variance or recover at least 5-10 minutes on median monitored turnovers within one quarter, narrow the wedge or reposition as compliance software only.
    - If fewer than 50% of paid pilots convert to annual production after measurable operational gains, the buyer pain or budget path is too weak for venture-scale growth.
  mermaid: |
    flowchart LR
      Wedge[OR room-ready wedge] --> MVP[Room instrumentation and turnover control MVP]
      MVP --> Proof[Trusted ready signal plus audit proof]
      Proof --> Expansion[Multi-campus benchmark and adjacent workflow expansion]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Medium conviction if the company can show one trusted room-ready signal and pilot conversion; low conviction if deployments stay advisory and services-heavy.
    whyBelieve: The wedge targets a painful, measurable operating decision where buyers already spend on adjacent tools but still lack a verified room-state source of truth.
    whyDoubt: Privacy approvals, workflow trust, and multi-stakeholder procurement could keep this as a niche implementation business instead of a compounding software platform.
    nextDiligence: Confirm with customer-owned pilot data that one campus can deploy quickly, improve readiness accuracy, and convert perioperative users from manual walk-throughs to live operational use.
  firstCustomer:
    title: VP of Perioperative Services at a multi-hospital health system
    profile: Runs a surgical network with 20-80 inpatient ORs across multiple campuses, is under pressure to improve throughput, and must also answer for infection-control compliance.
    trigger: A throughput-improvement mandate, HAI review, or surgical-growth plan exposes lost case capacity from slow or inconsistent room turnover.
    buyer: VP of Perioperative Services, Chief Nursing Officer, or hospital COO
    initialContract: "$75K-$150K paid pilot across 8-12 monitored ORs on one campus, converting to a $250K-$500K annual campus contract or larger multi-campus expansion if turnover variance falls and the room-ready signal is used in production."
  mustBeTrue:
    - Pilot campuses must show charge nurses acting on the room-ready signal in live operations within 90 days.
    - The first 3 paid pilots must each reduce turnover variance or recover at least 5-10 median minutes per monitored room within one quarter.
    - At least 50% of paid pilots must convert to annual production contracts within six months of pilot completion.
    - Security, privacy, and facilities reviews must allow standard pilot deployment without custom governance work that turns every sale into a bespoke project.
    - Gross margin must still trend above 70% after hardware support, implementation labor, and human exception review are included.
  diligenceQuestions:
    - How often do perioperative leaders currently quantify lost case capacity from turnover delays strongly enough to fund a new budget line?
    - What false-positive or false-negative rate can charge nurses tolerate before they revert to manual room checks?
    - Which stakeholder truly owns the budget: perioperative operations, infection prevention, EVS, or hospital operations leadership?
    - How much installation and governance work is required before the first monitored room can go live?
    - Do UV-C or perioperative AI partners accelerate sales, or do they complicate ownership of the room-ready signal?
operatingAssumptions:
  - assumption: Multi-hospital perioperative leaders will buy a room-native control layer if it shows capacity recovery and compliance evidence without replacing incumbent scheduling tools.
    basis: research.yaml
    validationTest: Secure 10 discovery calls and at least 3 paid pilot agreements that keep existing scheduling systems in place while funding a narrow OR turnover deployment.
    decisionImpact: If false, the company must reposition as a partner feature layer or abandon direct enterprise sales into perioperative operations.
  - assumption: Charge nurses will trust and operationalize a single room-ready event when false alerts are rare and exceptions are reviewable.
    basis: idea.yaml
    validationTest: Measure live usage of the room-ready alert during the first 90 days and require 80%+ of monitored turnover decisions to reference the signal or its exception log.
    decisionImpact: If false, the product becomes passive monitoring software, weakening ROI and reducing pricing power.
  - assumption: Edge deployment and limited retained footage are sufficient to clear typical privacy, facilities, and union objections in the beachhead accounts.
    basis: research.yaml
    validationTest: Track approval cycle time, required policy exceptions, and installation blockers across the first 5 target systems.
    decisionImpact: If false, sales cycles lengthen materially and the wedge may need to shift toward lower-value, non-room-sensing workflows.
  - assumption: A per-room subscription model near the researched ARPU can be approved as operating budget rather than a capital-like exception purchase.
    basis: operator judgment
    validationTest: Test 3 pricing packages in discovery and require at least 5 target buyers to indicate they can sponsor a paid pilot without capital-committee escalation.
    decisionImpact: If false, the company must lower initial scope, rely on partners, or accept slower enterprise procurement.
  - assumption: Cross-campus benchmark data will become strategically valuable enough to improve retention and expansion beyond the initial room-ready alert.
    basis: research.yaml
    validationTest: During the first 12 months, interview converted customers and require at least 2 systemwide expansions to cite benchmark comparisons as part of the purchase rationale.
    decisionImpact: If false, expansion will depend mostly on implementation footprint rather than software leverage, reducing moat depth.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Win 3 design-partner health systems and collect baseline turnover, late-start, and audit data for one service-line workflow on each campus.
    hypothesis: Buyers will share data and engage when the offer is framed as recovered surgical capacity plus cleaning-sequence proof.
    successMetric: 3 signed pilot LOIs and baseline process maps covering at least 20 monitored ORs in aggregate.
    owner: CEO founder
  - horizon: 0–90 days
    experiment: Run a concierge turnover-observation pilot with human review before full automation.
    hypothesis: Even a semi-manual room-state workflow can prove that trusted readiness events improve staff coordination and expose skipped steps.
    successMetric: 100 monitored turnovers with documented ready-time predictions, exception logs, and at least one customer-validated operational KPI improvement.
    owner: Clinical implementation lead
  - horizon: 90–180 days
    experiment: Ship MVP room instrumentation, alerting, and audit logs into one live campus with a schedule-feed integration.
    hypothesis: A narrow deployment can go live without broad hospital IT integration if the implementation stays focused on one perioperative workflow.
    successMetric: First production pilot live within 8 weeks of kickoff and no unresolved security blocker after customer review.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Test pricing and conversion across one-campus pilot packages versus multi-campus expansion proposals.
    hypothesis: Buyers prefer a monitored-room pricing model with a clear conversion path once operational proof exists.
    successMetric: At least 2 paid pilots signed and one campus-expansion proposal accepted at the modeled per-room pricing basis.
    owner: CEO founder
  - horizon: 180–270 days
    experiment: Add cross-campus benchmarking and compare adoption and conversion against pilot sites without benchmark views.
    hypothesis: Benchmark context increases executive urgency and helps expand from the first campus to additional sites.
    successMetric: 50%+ of converted customers request second-campus rollout after seeing comparative variance and readiness data.
    owner: Product lead
  - horizon: 270–540 days
    experiment: Launch one partnership with a UV-C vendor or perioperative AI vendor and test co-sell efficiency.
    hypothesis: Partners with adjacent budget access can shorten sales cycles once the startup owns the room-ready signal.
    successMetric: 25%+ of qualified pipeline is partner-sourced and at least one partner-sourced account converts to a paid pilot.
    owner: Strategic partnerships lead
operations:
  - Edge-device installation, calibration, and governance SOPs that minimize retained footage and document room coverage boundaries
  - Schedule-feed ingestion and room-event mapping workflows for each pilot campus
  - Human-in-the-loop exception review for ambiguous or high-risk turnover events
  - Quarterly customer ROI reviews on turnover minutes, ready-time trust, audit completeness, and campus-expansion readiness
  - Partner operating model with UV-C vendors, facilities teams, and perioperative consultants when the workflow expands beyond the first campus
team:
  - role: CEO founder
    startTiming: Month 0
    rationale: Founder-led selling is necessary because the company must navigate perioperative, infection-prevention, facilities, and executive stakeholders before the wedge is proven.
  - role: Founding eng
    startTiming: Month 0
    rationale: The core risk is building reliable room-state detection, audit logs, and deployment scaffolding that can survive hospital-grade environments.
  - role: Clinical implementation lead
    startTiming: Month 1
    rationale: Early success depends on mapping turnover protocols, training staff, and turning pilot observations into trusted operational workflows rather than raw alerts.
  - role: Edge or ML engineer
    startTiming: Month 3
    rationale: Model tuning, hardware reliability, and low-latency inference become bottlenecks once the first pilot moves beyond concierge operation.
  - role: Strategic partnerships or enterprise sales lead
    startTiming: Month 9
    rationale: Add commercial capacity only after paid-pilot conversion, pricing, and one partner motion are demonstrated, otherwise sales effort outruns proof.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3-5 design partners in multi-hospital surgical systems
      - Launch at least 3 paid pilots and convert at least 2 to annual production
      - Prove trusted room-ready usage and measurable turnover-variance reduction on one campus
      - Keep initial campus deployment under eight weeks with standard governance materials
      - Establish one repeatable pricing package and one accepted partner or integration path
  - horizon: 12–24 months
    items:
      - Expand converted customers to second and third campuses
      - Reach 8-10 production health-system customers with standardized rollout playbooks
      - Introduce cross-campus benchmarking and one adjacent audited workflow module
      - Generate qualified pipeline from at least one UV-C or perioperative software partner
  - horizon: 24–36 months
    items:
      - Reach the researched year-3 SOM footprint of roughly 20 systems and 600 monitored ORs
      - Support multi-campus deployments with benchmark data and lower implementation effort per new site
      - Expand selectively into procedure rooms, sterile-processing handoffs, or inpatient EVS without losing focus on audited room workflows
risks:
  - risk: Charge nurses and perioperative leaders may not trust the room-ready signal enough to change live operations.
    likelihood: High
    impact: High
    mitigation: Start with human-reviewed exception handling, instrument trust and usage metrics from day one, and refuse expansion until live operational adoption is visible.
  - risk: Privacy, facilities, or labor objections may delay in-room sensing deployments.
    likelihood: High
    impact: High
    mitigation: Use edge processing, limited retention, narrow pilot scopes, and prebuilt governance materials, and prioritize systems with stronger digital-operations sponsorship.
  - risk: Budget ownership may remain split across perioperative ops, infection prevention, EVS, and IT.
    likelihood: Medium
    impact: High
    mitigation: Sell against one quantified capacity and compliance outcome, anchor the champion in perioperative leadership, and use paid pilots with explicit economic owners.
  - risk: Adjacent incumbents could add basic room-state features once the category proves valuable.
    likelihood: Medium
    impact: Medium
    mitigation: Differentiate on auditability, cross-campus benchmarks, and workflow-specific deployment speed rather than generic sensing claims.
  - risk: Install and support work could make the business too services-heavy to sustain software margins.
    likelihood: Medium
    impact: High
    mitigation: Standardize hardware packages, narrow the initial use case, and hire implementation talent before scaling sales headcount.
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months of runway to ship a trusted OR-turnover MVP, complete 3-5 paid pilots, convert the first production
    campuses, harden edge deployment and governance workflows, and build the small implementation and partnership team
    needed to prove multi-campus expansion.
