slug: or-turnover-control-plane
date: '2026-05-15'
executiveSummary: >-
  手术室周转仍依赖人工清单、走廊交接和不完整的系统时间戳协调——但每次清洁延误都会推后手术开台，
  每个遗漏步骤都会抬高感染防控风险。最理想的首批客户是运营 10–40 间住院手术室、且存在明显延迟开台
  或周转波动压力的美国多院区医疗系统，因为同一个买方同时负责产能与质量结果。产品切口是一套边缘部署的
  周转控制层：核验终末清洁和 UV-C 完成情况、记录人员动线时间戳，并为责任护士生成可信的房间就绪信号，
  无需大规模替换 EHR。GTM 策略保持聚焦：在吞吐量改善计划、HAI 审查或外科增长计划让闲置手术室时间
  产生经济压力后，向围手术期领导层发起销售，先在单个院区开展付费试点，再向全系统扩展。定价应绑定
  监控手术间数量和实施复杂度，因为买方购买的是可回收的吞吐量和可审计性，而非通用 AI 自动化。
  战略优势在于房间级别事件数据集、专科就绪规则，以及排班软件、环境智能平台和 UV-C 硬件天然不具备的
  基准对比层。刻意的推进顺序：先在手术室周转中证明房间就绪准确率和试点转化，再向消毒供应、住院 EVS
  或受监管洁净室扩展。最大的证伪风险是医院将该系统视为仅供参考——运营层面的信任度不足以支撑真实的
  排班和人员调度行为。公开证据支持痛点和品类势头，但最相近的类比产品未披露任何公开定价或部署数量，
  因此第一年必须靠客户自有数据证明安装摩擦、付费意愿和生产环境转化。
problem:
  - 围手术期团队仍缺乏房间级别的真实来源，无法确认终末清洁步骤是否按顺序完成——责任护士只能靠人工巡查和碎片化日志来判断下一台手术能否开始。
  - 医院已经能买到排期优化、RTLS 和消毒硬件，但这些工具无法核验实际的房间就绪状态，导致吞吐量提升和感染防控问责均不完整。
solution:
  - 部署一套原生于房间的控制层，用边缘摄像头和传感器实时检测手术结束、人员流动、设备移除、清洁里程碑、UV-C 完成及最终房间就绪状态。
  - 将每次周转转化为可审计的顺序记录，附带 SLA 计时、异常告警和预测就绪时间——从排班数据接入和本地房间仪器起步，无需大规模医院 IT 改造。
whyWeWin:
  - 产品只解决一个高风险运营决策——"这间手术室现在真的就绪了吗？"——在这里，证据质量比覆盖广度更重要，而现有排期工具和智慧医院平台都不掌握这个工作流。
  - 每次部署都在积累跨院区周转事件、异常和基准规律的专有数据集，提升告警质量并创造向相邻已审计房间工作流扩展的杠杆。
strategicChoices:
  beachhead: 美国多院区外科系统，每个院区拥有 10–40 间住院手术室，骨科、普通外科和心血管外科服务线存在持续的周转超时或首台手术延迟。
  wedgeRationale: >-
    手术室周转比更宽泛的医院运营软件产生更快的验证——工作流高频发生，买方已能直接感受到
    错失手术容量的代价，且成果可在一个季度内用节省的分钟数、就绪准确率和审计证据量化。
    从一个房间就绪决策切入，比第一天就兜售通用智慧医院感知或完整围手术期编排更有说服力。
  sequencingRationale: >-
    公司应先在有限试点范围内交付经过核验的房间状态检测、异常处理和围手术期指挥视图，
    因为运营信任是最核心的资产。只有付费试点显示出更低的周转波动和生产环境转化后，
    才应追加更广泛的分析、跨院区基准对比、合作伙伴集成和规模化销售动作——否则产品范围、
    实施负担和企业销售将跑在验证前面。
  notYet:
    - 在每个临床单元全面布局的智慧医院平台定位
    - 在多院区手术室验证存在之前就大规模扩入洁净室和制药环境
    - 可能提高监管负担的自主临床或消毒效力声明
    - 超出房间就绪工作流的深度 EHR 替换或企业指挥中心软件
market:
  tam: "$963.1M 估算切口 TAM：3,567 家系统附属社区医院 × 估算每院 15 间住院手术室 × 估算每间监控手术室年软件 ARPU $18,000。"
  sam: "$321.1M 估算滩头 SAM：筛选 25% 的多院区、吞吐量受限项目，假设每个项目监控 20 间手术室，年 ARPU 同为 $18,000。"
  som: "$10.8M 估算第 3 年 SOM：20 家医疗系统 × 2 个院区 × 每个院区 15 间手术室 × 年 ARPU $18,000。"
  segments:
    - 拥有高吞吐量住院手术套间的多院区医疗系统
    - 扩张中的学术医疗中心及规模较大的门诊手术网络（多院区围手术期运营）
  buyingProcess: >-
    典型的内部推动者是围手术期服务主任或副总裁，感染防控和 EVS 负责人为关键验证者，
    COO、护理总监或围手术期高管为经济买方。交易应在吞吐量改善计划、HAI 审查或外科增长任务触发后，
    先在单个院区以付费试点启动，待房间就绪信号在实际运营中得到信任且安全审查通过后，
    再转为年度系统合同。
product:
  mvp: >-
    MVP 包括房间仪器安装、手术结束检测、人员进出追踪、清洁步骤核验、UV-C 完成捕获、
    责任护士和 EVS 仪表盘、异常告警、审计日志以及排班数据接入。范围应足够窄，
    以证明单个院区能够信任房间就绪事件并降低周转波动，而无需大型集成项目。
  sixMonth: >-
    在 8–12 间手术室的单一试点院区上线，对模糊事件保留人工复核，
    并向客户交付就绪时间准确率、周转分钟数和遗漏步骤异常的自有报告。
  twelveMonth: >-
    将 3 个付费试点转为生产部署，增加跨院区基准对比、部署模板，
    以及接入围手术期排班或消息系统的集成钩子，并将新院区上线周期控制在八周以内。
  twentyFourMonth: >-
    在多院区系统全面扩张，新增操作室或消毒供应交接等相邻已审计工作流，
    并推出能在初始房间就绪告警之外持续提升合同价值的基准产品。
  keyBets:
    - 只要误报率足够低，责任护士会在实际手术流程中依赖经过核验的房间就绪事件。
    - 买方会在不要求替换完整围手术期套件的前提下为房间原生层买单。
    - 边缘处理和有限录像保留可以化解典型的隐私、设施和劳工反对意见。
    - 跨院区工作流数据将大幅提升基准对比和告警质量，超出单院区竞争对手的能力边界。
gtm:
  wedge: 当延误开台或 HAI 审查使人工就绪判断在经济上和运营上都无法接受时，向围手术期管理者销售可信的手术室周转房间就绪信号。
  channels:
    - 创始人主导向围手术期和外科服务领导层直接销售
    - 绑定审计或清洁核验任务的感染防控和 EVS 赞助试点
    - 房间就绪信号经验证后，与 UV-C 及相邻围手术期 AI 厂商联合销售
  funnelTargets: "首次接触→工作流审计 25–35%，审计→付费试点 35–45%，试点→年度生产 50%+，首院区→第二院区扩展在 50%+ 已转化客户中 9 个月内完成。"
  pricing: >-
    按监控手术间数量收取年度订阅费，另加一次性部署和验证费用，跨院区基准对比和分析功能高级定价。
    这与采购逻辑吻合——产能回收、可审计性和部署复杂度都随手术间数量和院区规模扩展，而非随软件席位扩展。
businessModel:
  revenueStreams:
    - 按监控手术间数或院区部署收取年度软件订阅费
    - 一次性实施、验证和工作流映射费用
    - 基准分析、附加单元和合作伙伴集成的扩展模块
  unitOfValue: 具有经过核验的就绪事件的可信监控手术室
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一医疗系统内增加更多手术室和院区
    - 叠加跨院区基准对比和就绪分析
    - 扩展至操作室、消毒供应交接、住院 EVS 等相邻已审计工作流
    - 成为 UV-C 和围手术期优化合作伙伴的编排与审计层
strategyMap:
  northStarMetric: 围手术期员工实际依据房间就绪事件行动的季度受监控周转总量
  inputMetrics:
    - 就绪时间预测准确率与实际房间释放时间对比
    - 按监控手术室统计的中位周转分钟数及周转波动
    - 完成可审计顺序记录的周转占比
    - 付费试点转为年度生产的转化率
    - 现有账户中首个院区扩展至第二个院区的速度
  moatsToBuild:
    - 带时间戳的房间级别周转事件、异常及就绪状态结果数据集
    - 针对围手术期工作流调优的专科就绪规则和异常逻辑
    - 展示人员配置、波动和合规规律的跨院区基准对比层
    - 缩短安装和安全审批周期的部署与治理手册
  killCriteria:
    - 如果前 3 个付费试点无法将可信就绪时间准确率提升到责任护士愿意在实际手术流程中使用的水平，放弃房间就绪论点。
    - 如果试点院区在一个季度内未能降低周转波动或每间监控手术室的中位周转时间减少不足 5–10 分钟，收窄切口或重新定位为仅合规软件。
    - 如果在可量化运营提升后不足 50% 的付费试点转为年度生产合同，买方痛点或预算路径对风险投资规模增长而言过于薄弱。
  mermaid: |
    flowchart LR
      Wedge[OR room-ready wedge] --> MVP[Room instrumentation and turnover control MVP]
      MVP --> Proof[Trusted ready signal plus audit proof]
      Proof --> Expansion[Multi-campus benchmark and adjacent workflow expansion]
investorMemo:
  verdict:
    call: 进一步调查
    conviction: 如果公司能展示一个可信的房间就绪信号和试点转化，信心中等；如果部署停留在建议层面且服务成分过重，信心偏低。
    whyBelieve: 切口瞄准一个痛苦且可量化的运营决策——买方已在相邻工具上花钱，但仍缺乏经过核验的房间状态真实来源。
    whyDoubt: 隐私审批、工作流信任和多方采购可能让这家公司止步于利基实施业务，而无法成长为复利式软件平台。
    nextDiligence: 用客户自有试点数据确认单个院区能快速部署、提升就绪准确率，并将围手术期用户从人工巡查转为实时运营使用。
  firstCustomer:
    title: 多院区医疗系统围手术期服务副总裁
    profile: 管理跨多个院区共 20–80 间住院手术室的外科网络，承受提升吞吐量的压力，同时需要对感染防控合规负责。
    trigger: 吞吐量改善任务、HAI 审查或外科增长计划暴露了因手术室周转缓慢或不一致造成的手术容量损失。
    buyer: 围手术期服务副总裁、护理总监或医院 COO
    initialContract: "$75K–$150K 的付费试点覆盖单个院区 8–12 间监控手术室，若周转波动下降且房间就绪信号投入生产使用，转为 $250K–$500K 的年度院区合同或更大规模的多院区扩展。"
  mustBeTrue:
    - 试点院区必须在 90 天内让责任护士在实际运营中使用房间就绪信号。
    - 前 3 个付费试点必须各自在一个季度内降低周转波动或每间监控手术室节省至少 5–10 分钟的中位时间。
    - 至少 50% 的付费试点必须在试点完成后六个月内转为年度生产合同。
    - 安全、隐私和设施审查必须允许标准试点部署，不能因每次销售都需要定制治理工作而变成特定项目。
    - 硬件支持、实施人工和人工异常复核纳入计算后，毛利率仍须维持在 70% 以上。
  diligenceQuestions:
    - 围手术期管理者目前有多频繁地量化周转延误带来的手术容量损失，其程度是否足以开辟新预算项目？
    - 责任护士能容忍多高的误报或漏报率，超过该阈值就会退回到人工房间核查？
    - 谁才是真正的预算掌控者：围手术期运营、感染防控、EVS 还是医院运营领导层？
    - 第一间监控手术室上线前需要多少安装和治理工作？
    - UV-C 或围手术期 AI 合作伙伴能否加速销售，还是会让房间就绪信号的所有权变得复杂？
operatingAssumptions:
  - assumption: 多院区围手术期管理者会购买房间原生控制层，只要它能展示产能回收和合规证据，且无需替换现有排班工具。
    basis: research.yaml
    validationTest: 获得 10 次探索性沟通和至少 3 个付费试点协议，保留现有排班系统的同时为窄切口手术室周转部署提供资金。
    decisionImpact: 若假设不成立，公司必须重新定位为合作伙伴功能层，或放弃直接向围手术期运营层做企业销售。
  - assumption: 当误报率足够低且异常可复核时，责任护士会信任并将单一的房间就绪事件落地到日常运营中。
    basis: idea.yaml
    validationTest: 衡量前 90 天内房间就绪告警的实际使用情况，要求 80%+ 的监控周转决策引用该信号或其异常日志。
    decisionImpact: 若假设不成立，产品退化为被动监控软件，削弱 ROI 和定价能力。
  - assumption: 边缘处理和有限录像保留足以化解滩头客户典型的隐私、设施和工会反对意见。
    basis: research.yaml
    validationTest: 追踪前 5 个目标系统的审批周期时间、所需政策例外情况和安装阻碍。
    decisionImpact: 若假设不成立，销售周期大幅拉长，切口可能需要转向价值更低的非房间感知工作流。
  - assumption: 接近研究 ARPU 水平的按手术间订阅模式，可以作为运营预算审批，而非资本类例外采购。
    basis: operator judgment
    validationTest: 在探索阶段测试 3 种定价套餐，要求至少 5 个目标买方表示无需资本委员会升级审批即可发起付费试点。
    decisionImpact: 若假设不成立，公司必须降低初始范围、依赖合作伙伴或接受更慢的企业采购节奏。
  - assumption: 跨院区基准数据将积累足够的战略价值，在初始房间就绪告警之外提升客户留存和扩展。
    basis: research.yaml
    validationTest: 前 12 个月内访谈已转化客户，要求至少 2 次系统级扩展将基准对比作为采购理由之一。
    decisionImpact: 若假设不成立，扩展主要依赖实施规模而非软件杠杆，削弱护城河深度。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 赢得 3 家共创客户医疗系统，并在每个院区收集单一服务线工作流的基准周转、延迟开台和审计数据。
    hypothesis: 当方案被定位为"回收手术容量 + 清洁顺序证明"时，买方会分享数据并深度参与。
    successMetric: 签署 3 份试点意向书，合计覆盖至少 20 间监控手术室的基准流程图。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 在完全自动化之前，以人工复核为主开展管家式周转观察试点。
    hypothesis: 即便是半人工的房间状态工作流，也能证明可信的就绪事件可改善人员协调并暴露遗漏步骤。
    successMetric: 100 次受监控周转，附有记录在案的就绪时间预测、异常日志，以及至少一项客户认可的运营 KPI 改善。
    owner: 临床实施负责人
  - horizon: 90–180 天
    experiment: 将 MVP 房间仪器、告警和审计日志接入一个包含排班数据接入的实际院区。
    hypothesis: 只要实施范围聚焦于单一围手术期工作流，窄范围部署无需大规模医院 IT 集成即可上线。
    successMetric: 首个生产试点在启动后 8 周内上线，且客户审查后无未解决的安全阻碍。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 对单院区试点套餐与多院区扩展提案分别测试定价和转化效果。
    hypothesis: 一旦有运营验证，买方倾向于按监控手术间数量定价且有清晰转化路径的模式。
    successMetric: 至少签署 2 个付费试点，并有 1 个院区扩展提案按建模的按手术间定价基础被接受。
    owner: 创始人/CEO
  - horizon: 180–270 天
    experiment: 新增跨院区基准对比，并对比有无基准视图的试点院区在采用率和转化上的差异。
    hypothesis: 基准对比上下文提升高管紧迫感，帮助客户从首个院区扩展到更多院区。
    successMetric: 50%+ 的已转化客户在看到波动对比和就绪数据后申请第二院区上线。
    owner: 产品负责人
  - horizon: 270–540 天
    experiment: 与一家 UV-C 厂商或围手术期 AI 厂商启动一个合作关系，测试联合销售效率。
    hypothesis: 拥有相邻预算入口的合作伙伴可以在初创公司掌握房间就绪信号后缩短销售周期。
    successMetric: 25%+ 的合格销售漏斗来自合作伙伴，且至少一个合作伙伴来源的账户转为付费试点。
    owner: 战略合作负责人
operations:
  - 边缘设备安装、标定和治理 SOP，最小化录像留存并记录房间覆盖边界
  - 每个试点院区的排班数据接入和房间事件映射工作流
  - 对模糊或高风险周转事件的人工异常复核
  - 按季度向客户复盘周转分钟数、就绪信任度、审计完整性和院区扩展就绪情况的 ROI
  - 当工作流扩展至首个院区之外时，与 UV-C 厂商、设施团队和围手术期顾问建立合作运营模式
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 切口尚未经过验证之前，必须由创始人主导销售，因为需要同时驾驭围手术期、感染防控、设施和高管等多方利益相关者。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 核心风险是构建能在医院级环境中稳定运行的房间状态检测、审计日志和部署脚手架。
  - role: 临床实施负责人
    startTiming: Month 1
    rationale: 早期成功取决于映射周转流程、培训员工，并将试点观察转化为可信的运营工作流，而非原始告警。
  - role: 边缘/机器学习工程师
    startTiming: Month 3
    rationale: 一旦首个试点超越管家式运营，模型调优、硬件稳定性和低延迟推理就会成为瓶颈。
  - role: 战略合作/企业销售负责人
    startTiming: Month 9
    rationale: 只在付费试点转化、定价和至少一个合作伙伴动作得到验证后再增加商务人员，否则销售投入会跑在验证前面。
milestones:
  - horizon: 0–12 个月
    items:
      - 在多院区外科系统中签署 3–5 家共创客户
      - 启动至少 3 个付费试点，并将至少 2 个转为年度生产
      - 在单个院区证明可信的房间就绪使用情况和可量化的周转波动下降
      - 将首个院区部署控制在 8 周以内，并提供标准治理材料
      - 建立一个可复制的定价套餐和一条经验证的合作伙伴或集成路径
  - horizon: 12–24 个月
    items:
      - 将已转化客户扩展至第二和第三个院区
      - 达到 8–10 家拥有标准化上线手册的生产级医疗系统客户
      - 推出跨院区基准对比和一个相邻已审计工作流模块
      - 从至少一家 UV-C 或围手术期软件合作伙伴获得合格销售线索
  - horizon: 24–36 个月
    items:
      - 达到研究中第 3 年 SOM 目标——约 20 家系统、600 间监控手术室
      - 凭借基准数据和更低的每新增院区实施成本支持多院区部署
      - 在不失去已审计房间工作流焦点的前提下，有选择地扩展至操作室、消毒供应交接或住院 EVS
risks:
  - risk: 责任护士和围手术期管理者可能对房间就绪信号的信任度不足以改变实际运营。
    likelihood: High
    impact: High
    mitigation: 从人工复核异常处理起步，从第一天就追踪信任度和使用率指标，并拒绝在实际运营采用可见之前扩展。
  - risk: 隐私、设施或劳工反对意见可能延迟房间内传感部署。
    likelihood: High
    impact: High
    mitigation: 使用边缘处理、有限录像保留、窄试点范围和预置治理材料，优先选择数字化运营赞助较强的系统。
  - risk: 预算归属可能持续分散在围手术期运营、感染防控、EVS 和 IT 之间。
    likelihood: Medium
    impact: High
    mitigation: 围绕一个量化的产能和合规结果来销售，将项目负责人锁定在围手术期领导层，并以明确经济负责人的付费试点启动。
  - risk: 相邻现有厂商可能在品类价值得到验证后增加基础的房间状态功能。
    likelihood: Medium
    impact: Medium
    mitigation: 在可审计性、跨院区基准和专项工作流部署速度上差异化，而非依赖通用感知声明。
  - risk: 安装和支持工作可能使业务服务成分过重，无法维持软件毛利率。
    likelihood: Medium
    impact: High
    mitigation: 标准化硬件套餐、收窄初始用例，并在扩大销售人员规模之前提前招募实施人才。
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    资助 18 个月的现金跑道，交付可信的手术室周转 MVP，完成 3–5 个付费试点，转化首批生产院区，
    强化边缘部署和治理工作流，并组建证明多院区扩展所需的小型实施和合作伙伴团队。
