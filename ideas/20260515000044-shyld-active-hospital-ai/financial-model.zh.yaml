modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      WorkflowAudits --> PaidCampuses
      PaidCampuses --> ActiveCampuses
      ActiveCampuses --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基础情景由付费院区从 Y1 末 3 个增长至 Y3 末 40 个驱动，每院区年经常性收入爬坡至研究稳态 $270K。
- checkName: 必须做对的事
  finding: 公司必须证明可信的房间就绪信号和 8 周以内的部署，使首院区试点在同一医疗系统内真正扩展至第二院区。
- checkName: 模型崩溃条件
  finding: 若隐私审查导致 Y3 院区数停留在 30 出头，或稳态 ARPU 停滞在 $240K 附近，现金缓冲将大幅压缩，下一轮融资很可能提前。
- checkName: 下一轮融资证明
  finding: 下一轮融资的依据是达到 8–10 家生产系统、展示第二院区扩展，并证明基准分析能在不大规模重置服务的情况下扩大合同范围。
sanityChecks:
  ruleOf40: Y3 growth 365.9% + EBITDA margin 25.7% = 391.5%
  burnMultiple: Approx. Y2 burn multiple 0.5x using exit ARR growth from 3 campuses at $180K to 12 campuses at $225K; Y3 is cash-generative.
  revenuePerFte: $556.9K Y3 (benchmark $200–400K SaaS)
  flags:
  - Rule-of-40 数值异常高，因为 Y2 收入基数仍小，该指标夸大了成熟运营效率。
