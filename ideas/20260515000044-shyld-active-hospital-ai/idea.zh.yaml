problem: >-
  围手术期管理者仍在用人工清单、走廊口头协调和定期巡检来管理手术室周转——但每一次清洁延误都会推迟下一台手术，
  每一个遗漏步骤都会抬高感染风险。感染防控团队几乎没有房间级别的证据来证明终末清洁流程已按顺序执行，
  责任护士只能凭感觉判断手术间是否真正就绪。RTLS、EHR 时间戳和员工培训工具只能抓住工作流的碎片，
  却无法还原房间内真实发生了什么。
targetUser:
  primary: 美国医疗系统中负责高周转压力的围手术期服务或感染防控主任
  secondary: 手术室责任护士、环境服务（EVS）主管及消毒供应中心负责人
  buyer: 围手术期服务副总裁、护理总监或医院 COO
startupThesis:
  nonObviousInsight: >-
    突破口不是又一个医院 AI 仪表盘，而是边缘原生模型现在已能直接观察房间内的实体工作流——
    创业公司无需等待漫长的 EHR 集成项目，就能向买方交付可量化的产能与合规结果。
  beachhead: >-
    美国多院区外科系统，每个院区拥有 10–40 间住院手术室，长期面临周转超时、首台手术延迟开台
    及骨科、普通外科、心血管外科感染防控审计压力。
  wedge: >-
    边缘部署的周转控制层：实时监控术后房间重置，核验终末清洁和 UV-C 步骤，记录人员动线时间戳，
    并在手术间真正就绪的那一刻立即通知责任护士。
  whyNowCatalyst: >-
    Shyld 完成融资且引用的 93% 污染降低数据表明，医院正在为能直接在病房内起效、无需大规模 IT 改造
    就能降低感染风险、释放手术容量的智能体买单。
  ventureScalePath: >-
    一旦嵌入围手术期周转流程，平台可扩展至操作室、隔离病房、中央消毒交接、住院 EVS，
    以及任何流程可追溯性同等重要的受监管洁净室运营场景。
solution: >-
  产品是一套用于手术室周转的原生运营层。它通过边缘摄像头和房间传感器识别手术结束、人员进出、
  设备移除、清洁里程碑、UV-C 完成及最终就绪状态，并将这些活动汇聚成供责任护士和 EVS 负责人使用的
  实时控制层。每次周转都会生成一条可审计的顺序记录、SLA 计时、遗漏步骤的异常告警，
  以及预测就绪时间——而非人工猜测。医院从单个院区和排班数据接入开始，无需庞大的 EMR 集成，
  缩短了实施周期，让首个 ROI 证明直接绑定在周转分钟数、准时开台率和感染防控合规上。
  随着时间推移，系统积累出关于房间规律、人员瓶颈和污染风险特征的专有数据集，
  可驱动基准对比和相邻工作流自动化。
goToMarketSeed:
  firstCustomer: >-
    区域性和学术性医疗系统，多院区共 20–80 间住院手术室，有主动的吞吐量提升任务，
    且感染防控团队在 HAI 审查或择期手术容量目标未达标后面临压力。
  buyingTrigger: >-
    围手术期吞吐量改善计划、感染防控通报或 HAI 激增，或因手术室周转缓慢导致手术容量损失的外科增长计划。
  currentAlternative: 人工周转清单、责任护士现场巡查、EVS 日志、门禁或 RTLS 时间戳以及通用摄像头回放系统
  switchingReason: >-
    专为工作流设计的房间智能体胜过碎片化工具——它核验真实的清洁顺序、实时预测就绪状态，
    并生成同时绑定产能与合规结果的审计记录。
  pricingHypothesis: 按监控手术间数量收取年订阅费，另收部署费；多院区基准对比功能额外定价
