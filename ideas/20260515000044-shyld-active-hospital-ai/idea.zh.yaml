topRisks:
  - name: 临床信任危机
    description: 一次错误或遗漏的周转核验可能制造感染风险，并迅速摧毁围手术期管理者的信任。
    mitigation: 起步阶段保留人工异常复核、设置保守告警阈值，并将审计记录绑定到现有感染防控流程。
  - name: 房间传感部署阻力
    description: 摄像头、传感器和工作流监控可能触发隐私、设施和工会方面的顾虑，拖慢部署进度。
    mitigation: 使用边缘处理且尽量少保留录像，提前让护理和设施负责人参与，并在有明确治理框架的小范围试点中启动。
  - name: 跨部门预算归属不清
    description: 围手术期运营、感染防控、EVS 和 IT 可能各自认为是自己的职责范围，即便痛点真实存在也会导致采购卡住。
    mitigation: 围绕一个量化指标（如每个手术室每次周转节省的分钟数）来销售，将项目负责人锁定在围手术期领导层，并将首次部署打包为容量 ROI 试点。
