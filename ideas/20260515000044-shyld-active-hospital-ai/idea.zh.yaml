differentiator: >-
  大多数医疗 AI 厂商卖的是环境笔记录入、通用分析或止步于观察的横向计算机视觉。
  这家公司从一个高风险工作流切入——在那里，证明实体操作步骤的确切顺序比宽度更重要——
  然后把观察结果转化为运营决策和审计证据。
  护城河来自房间级别的工作流数据、专科就绪规则，以及与围手术期运营的深度集成，而非单靠通用模型。
