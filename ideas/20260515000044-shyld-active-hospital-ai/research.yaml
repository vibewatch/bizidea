openQuestions:
- What per-room annual price and deployment fee can perioperative buyers approve without escalating the purchase into a capital-style committee process?
- How many target hospitals will allow in-room sensing during turnover without union, privacy, or credentialing objections that delay pilots?
- Can the startup prove a single trusted room-ready event that charge nurses will act on in real time?
- Will the strongest partner motion be with UV-C vendors, perioperative AI vendors, or hospital digital-transformation teams?
