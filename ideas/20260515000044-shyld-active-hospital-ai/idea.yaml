differentiator: >-
  Most healthcare AI vendors sell ambient note-taking, generic analytics, or
  horizontal computer vision that stops at observation. This company starts with
  a single high-stakes workflow where proving the exact order of physical steps
  matters, then turns those observations into operational decisions and audit
  evidence. The defensibility comes from room-level workflow data, service-line
  specific readiness rules, and integrations into perioperative operations rather
  than from a commodity model alone.
