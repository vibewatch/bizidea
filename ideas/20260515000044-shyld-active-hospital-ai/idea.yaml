problem: >-
  Perioperative leaders still run operating-room turnover with manual checklists,
  hallway coordination, and periodic audits even though every delayed clean
  pushes back case starts and every missed step increases infection risk.
  Infection-prevention teams rarely have room-level proof that terminal-clean
  protocols were executed in sequence, while charge nurses are forced to guess
  when a room is genuinely ready. RTLS, EHR timestamps, and staff training tools
  capture fragments of the workflow but not the physical source of truth inside
  the room.
targetUser:
  primary: Director of perioperative services or infection prevention at a U.S. health system with high OR throughput pressure
  secondary: OR charge nurses, EVS supervisors, and sterile processing leaders
  buyer: VP of Perioperative Services, Chief Nursing Officer, or hospital COO
startupThesis:
  nonObviousInsight: >-
    The breakthrough is not another hospital AI dashboard; it is that edge-native
    models can now observe physical room workflows directly, so startups can sell
    measurable capacity and compliance outcomes without waiting for a deep EHR
    integration project.
  beachhead: >-
    Multi-hospital U.S. surgical systems operating 10-40 inpatient ORs per site,
    with persistent turnover overruns, late first-case starts, and infection
    prevention audit pressure in orthopedic, general, and cardiovascular service
    lines.
  wedge: >-
    Edge-deployed turnover control plane that watches post-case room reset,
    verifies terminal-clean and UV-C steps, timestamps staff movement, and alerts
    charge nurses the moment a room is actually ready for the next patient.
  whyNowCatalyst: >-
    Shyld’s financing and cited 93% contamination reduction show hospitals are
    now funding room-native agents that can cut infection risk and unlock
    surgical capacity without a multi-year IT overhaul.
  ventureScalePath: >-
    Once embedded in perioperative turnover, the platform can expand into
    procedure rooms, isolation rooms, central sterile handoffs, inpatient EVS,
    and regulated cleanroom operations where proof of process matters as much as
    data capture.
solution: >-
  The product is a room-native operating layer for surgical turnover. It uses
  edge cameras and room sensors to detect case end, staff entry and exit,
  equipment removal, cleaning milestones, UV-C completion, and final readiness,
  then turns that activity into a live control plane for charge nurses and EVS
  leads. Each turnover gets an auditable sequence record, SLA clock, exception
  alerts for skipped steps, and a predicted ready time instead of a manual guess.
  Hospitals start with one site and a schedule feed rather than a heavy EMR
  integration, which shortens implementation and keeps the first ROI proof tied
  to turnover minutes, on-time starts, and infection-prevention compliance.
  Over time, the system builds a proprietary dataset on room patterns, staffing
  bottlenecks, and contamination-risk signatures that can power benchmarking and
  adjacent workflow automation.
goToMarketSeed:
  firstCustomer: >-
    Regional and academic health systems with 20-80 inpatient ORs across multiple
    campuses, active throughput-improvement mandates, and infection-control teams
    under pressure after HAI reviews or missed elective-case capacity targets.
  buyingTrigger: >-
    A perioperative throughput initiative, an infection-control citation or HAI
    spike, or a surgical growth plan that exposes lost case capacity from slow
    room turnover.
  currentAlternative: Manual turnover checklists, charge-nurse walk-throughs, EVS logs, badge or RTLS timestamps, and generic camera review systems
  switchingReason: >-
    A workflow-specific room agent beats fragmented tools because it verifies the
    actual clean sequence, predicts readiness in real time, and produces an
    audit trail tied to both capacity and compliance outcomes.
  pricingHypothesis: Annual subscription priced per monitored room plus deployment fees and premium analytics for multi-site benchmarking
