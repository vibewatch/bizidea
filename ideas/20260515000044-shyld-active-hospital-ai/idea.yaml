topRisks:
  - name: Clinical trust failure
    description: A missed or incorrect turnover verification could create infection risk and quickly kill credibility with perioperative leaders.
    mitigation: Start with human-in-the-loop exception review, conservative alert thresholds, and audit trails tied to existing infection-control protocols.
  - name: Room instrumentation friction
    description: Cameras, sensors, and workflow monitoring can trigger privacy, facilities, and union concerns that slow deployment.
    mitigation: Use edge processing with minimal retained footage, involve nursing and facilities leaders early, and begin in a limited pilot footprint with clear governance.
  - name: Cross-functional budget ambiguity
    description: Perioperative ops, infection prevention, EVS, and IT may all feel partial ownership, making procurement stall even when the pain is real.
    mitigation: Sell against one quantified outcome such as turnover minutes recovered per OR, tie the champion to perioperative leadership, and package the first deployment as a capacity ROI pilot.
