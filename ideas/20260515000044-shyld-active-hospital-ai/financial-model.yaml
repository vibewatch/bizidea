modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      WorkflowAudits --> PaidCampuses
      PaidCampuses --> ActiveCampuses
      ActiveCampuses --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: The base case is driven by paid campuses growing from 3 at Y1 exit to 40 at Y3 exit while annual recurring revenue per campus ramps to the researched $270K steady state.
- checkName: Must go right
  finding: The company must prove a trusted room-ready signal and sub-eight-week deployment so first-campus pilots actually expand to second campuses inside the same health system.
- checkName: Model breaks if
  finding: If privacy reviews keep Y3 campus count in the low 30s or steady-state ARPU stalls near $240K, the cash cushion compresses sharply and the next round likely pulls forward.
- checkName: Next-round proof
  finding: The next financing is justified by reaching 8-10 production systems, showing second-campus expansion, and proving benchmark analytics can increase contract scope without a services-heavy reset.
sanityChecks:
  ruleOf40: Y3 growth 365.9% + EBITDA margin 25.7% = 391.5%
  burnMultiple: Approx. Y2 burn multiple 0.5x using exit ARR growth from 3 campuses at $180K to 12 campuses at $225K; Y3 is cash-generative.
  revenuePerFte: $556.9K Y3 (benchmark $200–400K SaaS)
  flags:
  - Rule-of-40 looks unusually high because Y2 revenue is still small, so the metric overstates mature operating efficiency.
  - CAC and churn are modeled at the campus-equivalent level even though real procurement happens at health-system level, so cohort metrics are still heuristics until actual renewals exist.
  - Base-case margin improvement assumes implementation templates and exception handling reduce white-glove labor after the first few deployments.
  - The model excludes one-time deployment fees, which is conservative on revenue but means cash collection timing for services is not explicitly shown.
