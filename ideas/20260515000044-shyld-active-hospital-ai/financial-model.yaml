scenarios:
  downside:
    description: Privacy review drag and lower pilot room counts keep pricing and campus expansion below the base conversion plan.
    y3RevenueK: 4800.0
    y3EbitdaK: 350.0
    cashLowPointK: 250.0
    keyAssumptionChanges:
    - Steady-state campus ARPU reaches only $240K because average monitored rooms stay closer to 12-13 per campus.
    - Y3 ends at roughly 32 active campuses instead of 40 as procurement and facilities approvals lengthen expansion timing.
    - Gross margin exits near 67% because human review and deployment labor stay elevated for longer.
  base:
    description: Three paid pilot campuses convert into repeatable multi-campus rollouts and the business reaches the researched 40-campus footprint by Q4Y3.
    y3RevenueK: 6682.5
    y3EbitdaK: 1714.47
    cashLowPointK: 1017.66
    keyAssumptionChanges:
    - Campus ARPU ramps from $180K in pilot-scale year one to the researched $270K steady-state campus value by year three.
    - Active campuses grow from 3 at Y1 exit to 12 at Y2 exit and 40 at Y3 exit as second-campus expansion begins working.
    - Gross margin reaches the 70% target once deployment templates and exception review improve across repeat rollouts.
  upside:
    description: One partner channel starts working and benchmark-led expansion pushes both campus count and realized room density above plan.
    y3RevenueK: 8265.0
    y3EbitdaK: 2900.0
    cashLowPointK: 1400.0
    keyAssumptionChanges:
    - Steady-state campus ARPU reaches about $285K as more campuses deploy the full 15-16 room configuration plus benchmark analytics.
    - Y3 ends at roughly 48 active campuses because partner-sourced accounts expand faster after the first production proofs.
    - Gross margin exits near 73% as implementation labor per campus falls faster than expected.
