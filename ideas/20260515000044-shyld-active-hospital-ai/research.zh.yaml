competitors:
- name: LeanTaaS
  stage: scale-up
  wedge: AI 驱动的手术室排班、手术间使用率和人员配置优化。
  pricing: 定制企业定价；已抓取页面中未披露房间级别定价。
  strength: 大规模装机量和公开 ROI 声明。
  weaknessVsUs: 不核验实体的房间重置步骤，也不提供房间原生的就绪审计记录。
  sourceRefs:
  - 14
  - 15
  - 18
- name: Qventus
  stage: scale-up
  wedge: 用于外科增长和围手术期自动化的 AI 队友。
  pricing: 定制企业定价；已抓取页面中未披露房间级别定价。
  strength: 绑定利润率和增长的强力高管话术。
  weaknessVsUs: 在房间层之上优化利用率，不确认终末清洁顺序或实际房间就绪状态。
  sourceRefs:
  - 19
