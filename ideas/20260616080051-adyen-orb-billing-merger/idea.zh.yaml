jobsToBeDone:
  - job: >-
      当一个高速增长的 AI 客户突然飙升用量时，帮助我们的财务和产品团队决定是延伸信用、要求充值，还是限制用量，从而在不扼杀扩张的前提下保护毛利率。
    currentAlternative: >-
      电子表格信用审核、简单账户上限和月末账单催收
    successMetric: "高用量账户留存的毛利率，以及按时回收的消费比例"
  - job: >-
      当出现付款失败或账单争议时，帮助团队自动将这些信号转化为权限和催收动作，让高风险账户在损失叠加之前停止消耗高成本基础设施。
    currentAlternative: >-
      人工催收邮件加上割裂的计费与产品访问规则
    successMetric: "坏账率、非自愿流失率，以及从付款失败到风险动作的响应时间"
