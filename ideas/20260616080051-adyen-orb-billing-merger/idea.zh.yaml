problem: >-
  AI 原生软件厂商现在让客户在现金尚未完全到账前就消耗算力、存储和 Agent 操作。一旦定价从席位制切换为用量制，单个高速增长的账户就可能积累大量应收余额，随后遭遇扣款失败或催收问题，让厂商承担真实的基础设施成本。计费系统可以在事后计算账单，却很少能告诉产品和财务团队：何时该要求预付充值、调整信用条款，或在毛利流失前中断高风险用量。
targetUser:
  primary: >-
    AI 原生软件公司（B 轮至 D 轮）的财务、计费或商业化负责人，该公司采用自助用量计费且具有显著的单事件 COGS
  secondary: >-
    使用席位加用量混合定价的开发工具和 API 平台的收入运营或支付负责人
  buyer: >-
    AI 原生 B2B 软件厂商的 CFO、VP Finance 或商业化总经理
startupThesis:
  nonObviousInsight: >-
    持久的切入点不是又一个开票层，而是一个用量信用决策引擎——逐事件判断某个账户应该获得更多用量、转为预付充值、切换至需审批的账单模式，还是根据支付健康状况和毛利敞口进行限流。
  beachhead: >-
    拥有 5,000–50,000 个月活自助工作区、采用席位加用量混合定价、且卡付账户绑定超过每月 10 万美元可变推理或存储 COGS 的 B 轮至 D 轮 AI 开发与 Agent 平台
  wedge: >-
    一个用量利润控制平面，位于产品权限、事件账本与 PSP 之间，决定何时允许更多用量、要求预付充值、切换计费条款或对高风险账户限流
  whyNowCatalyst: >-
    Adyen 收购 Orb 以及将计费信号与支付风险挂钩的明确并购逻辑，表明原始计量已不再是终点；商户现在需要在事件级用量之上叠加实时资金回收逻辑。
  ventureScalePath: >-
    从单位经济模型在后付费用量下最快崩溃的 AI 原生厂商起步，再扩展至云数据库、通信 API、数据平台，以及任何每个事件都有真实 COGS 和支付风险的用量计费软件业务。
solution: >-
  产品从 Orb 或其他计费栈摄取原始用量事件，从 PSP 和 ERP 摄取客户支付状态，从 CRM 和计费系统摄取合同或信用条款。针对每个账户，实时计算敞口评分：已计未收的用量、近期付款失败、消费加速、毛利率画像以及承诺余额。随后在产品和财务端触发正确动作：允许继续用量、要求预付充值、转为需审批的账单模式、强制软限额，或在下一次高成本用量爆发前降级服务。财务团队可获得模拟功能，查看信用阈值如何按客户群影响回收率、坏账和净收入留存。产品团队可获得 API 和 Webhook，让权限与资金现实保持同步，而无需等到月末账单才发现问题。
goToMarketSeed:
  firstCustomer: >-
    拥有 10,000 个以上卡付工作区、混合席位加用量定价、且持续出现未付超额仍在消耗模型或存储成本的 Series C AI 代码或 Agent 平台
  buyingTrigger: >-
    推出用量定价、在成长账户上出现扣款失败流失，或从预付余额扩展至后付月结账单
  currentAlternative: >-
    计量与计费平台、自研权限脚本、人工财务审核和简单账户上限
  switchingReason: >-
    控制平面无需替换商户现有计费栈即可保护毛利率——利用事件级用量加支付健康状况，在未收账款变成坏账之前介入。
  pricingHypothesis: >-
    年度平台费加上受保护或已回收用量收入的 0.5%–2%，或按活跃的受管理消费账户计费
