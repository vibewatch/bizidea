topRisks:
  - name: "现有厂商捆绑销售"
    description: "计费服务商或 PSP 可能添加轻量级敞口管控，让独立控制平面看起来可有可无。"
    mitigation: "保持栈无关性，跨计费、支付、权限和 ERP 系统进行编排，优先在商户需要跨厂商策略决策而非单一服务商功能的场景中取胜。"
  - name: "ROI 可见性不足"
    description: "许多客户尚未清晰衡量事件级毛利流失或坏账，这可能拖慢采购决策。"
    mitigation: "以历史回放和基于客户群的前后对比报告作为切入点，将模型输出与已回收收入、已阻止敞口和非自愿流失挂钩。"
  - name: "集成摩擦"
    description: "连接遥测、计费、PSP 和产品权限系统可能延长部署周期，推迟价值实现。"
    mitigation: "上线时预置最常用计费和支付栈的连接器，并将首个用例收窄至自助卡付账户。"
