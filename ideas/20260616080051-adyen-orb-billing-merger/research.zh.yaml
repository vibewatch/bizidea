openQuestions:
- AI 原生厂商中仍运行卡付后付费用量的实际年度坏账或未付超额池有多大？
- CFO 们会在重大损失事件发生前采购独立控制平面，还是捆绑计费功能在痛苦变得急迫之前始终「足够好」？
- 哪些 PSP 和计费栈暴露了足够的实时支付健康信号，以支持无不可接受假阳性的自动限流？
- 成功的团队从后付费敞口迁移至预付余额、阈值计费或企业承诺的速度有多快，从而缩小滩头切入点？
