competitors:
- name: Adyen + Orb
  stage: incumbent
  wedge: 事件级企业计费，结合直接支付、欺诈和交易成功上下文。
  pricing: "定制企业定价；Orb 定价页面指向具有更深金融栈集成的高级和企业计划。"
  strength: 原始用量计费与实时支付数据之间的强战略契合，以及来自 AI 原生客户案例的验证。
  weaknessVsUs: 长期融合激励将客户拉向 Adyen 自身技术栈，而非跨多 PSP 和计费系统的中立控制层。
  sourceRefs:
  - 1
  - 29
  - 35
  - 36
  - 44
  - 45
- name: Stripe + Metronome
  stage: incumbent
  wedge: 在 Stripe 生态内整合经常性计费、收入回收和实时计量。
  pricing: "企业主导定价；Stripe 文档将新用量计费项目指向 Metronome，Metronome 定价为销售驱动。"
  strength: 庞大的分发能力、内置支付回收工具，以及 OpenAI 和 Replicate 等复杂用量合同的参考客户。
  weaknessVsUs: 针对 Stripe 计费与支付栈优化，而非决定何时允许高风险用量继续的跨厂商策略引擎。
  sourceRefs:
  - 49
  - 50
  - 58
  - 59
  - 85
- name: m3ter
  stage: scale-up
  wedge: 计量、定价和金融运营基础设施，为现代定价升级 CRM 和 ERP 系统。
  pricing: "定制实施和支持主导定价。"
  strength: 围绕数据来源、定价逻辑和收入分析的深厚财务与计费运营公信力。
  weaknessVsUs: 不原生拥有决定下一个高成本事件是否应被允许的支付健康和权限决策循环。
  sourceRefs:
  - 65
  - 66
  - 72
- name: Lago
  stage: scale-up
  wedge: 开源、支付无关的计费基础设施，含权限、预付余额和阈值计费。
  pricing: "开源/自托管选项加云定价计划。"
  strength: 灵活架构、支付无关的定位，以及对权限、渐进式计费和预付款的明确支持。
  weaknessVsUs: 仍要求客户自行组装将支付健康与用量权限关联的策略层和运营手册。
  sourceRefs:
  - 76
  - 78
  - 79
  - 80
  - 83
regulatoryTechnicalConstraints:
- point: 托管客户资金或储值将触发更严格的资金转移分析；保持编排定位可使边界更清晰。
  sourceRefs:
