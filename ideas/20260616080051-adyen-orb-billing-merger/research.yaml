  validationPlan:
  - priority: high
    question: Do target CFOs and monetization leaders quantify bad-debt or overage leakage enough to fund a standalone control plane before a major loss event?
    evidenceToGather: Ten buyer interviews plus two historical cohort reviews quantifying unpaid usage, failed-payment recovery, and compute margin leakage.
  - priority: high
    question: Can the product intervene fast enough through billing and PSP webhooks without false-positive throttles on good customers?
    evidenceToGather: A shadow-mode pilot on one self-serve cohort using usage events, PSP status, and contract rules to score exposure and compare interventions against actual outcomes.
  - priority: medium
    question: Will design partners prefer a neutral orchestration layer over deeper bundling from their existing billing vendor?
    evidenceToGather: Win/loss interviews across teams already using Orb, Stripe/Metronome, or m3ter, plus one paid proof-of-concept with multi-vendor stack complexity.
