  adoptionFrictionMatrix:
  - friction: Usage, payment, CRM, and entitlement data live in different systems.
    severity: high
    affectedBuyer: CFO or VP Finance
    mitigation: Start with read-only ingestion and alerting on one cohort before automating throttles or billing-term changes.
