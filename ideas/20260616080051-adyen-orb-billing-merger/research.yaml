competitors:
- name: Adyen + Orb
  stage: incumbent
  wedge: Event-level enterprise billing combined with direct payment, fraud, and transaction-success context.
  pricing: "Custom enterprise pricing; Orb’s pricing page points to Advanced and Enterprise plans with deeper finance-stack integrations."
  strength: Strong strategic fit between raw usage billing and real-time payment data, plus validation from AI-native customer logos.
  weaknessVsUs: Long-term convergence incentives pull customers toward Adyen’s own stack rather than a neutral control layer across multiple PSPs and billing systems.
  sourceRefs:
  - 1
  - 29
  - 35
  - 36
  - 44
  - 45
- name: Stripe + Metronome
  stage: incumbent
  wedge: Recurring billing, revenue recovery, and real-time metering consolidated inside the Stripe ecosystem.
  pricing: "Enterprise-led pricing; Stripe’s docs point new usage-billing builds toward Metronome and Metronome pricing is sales-led."
  strength: Massive distribution, built-in payment recovery tooling, and reference customers like OpenAI and Replicate for complex usage contracts.
  weaknessVsUs: Optimized for Stripe’s billing-and-payments stack rather than a cross-vendor policy engine that decides when risky usage should continue.
  sourceRefs:
  - 49
  - 50
  - 58
  - 59
  - 85
- name: m3ter
  stage: scale-up
  wedge: Metering, rating, and finance-operating infrastructure that upgrades CRM and ERP systems for modern pricing.
  pricing: "Custom implementation and support-led pricing."
  strength: Deep finance and billing-ops credibility around data sourcing, rating logic, and revenue analysis.
  weaknessVsUs: Does not natively own the payment-health and entitlement-decision loop that determines whether the next expensive event should be allowed.
  sourceRefs:
  - 65
  - 66
  - 72
- name: Lago
  stage: scale-up
  wedge: Open-source, payment-agnostic billing infrastructure with entitlements, prepaid credits, and threshold billing.
  pricing: "Open-source/self-hosted option plus cloud pricing plans."
  strength: Flexible architecture, payment-agnostic posture, and explicit support for entitlements, progressive billing, and prepayments.
  weaknessVsUs: Still asks the customer to assemble the policy layer and operational playbooks that connect payment health to usage permissions.
  sourceRefs:
  - 76
  - 78
  - 79
  - 80
  - 83
