problem: >-
  AI-native software vendors now let customers consume compute, storage, and
  agent actions before cash is fully secured. Once pricing shifts from seats to
  usage, a single fast-growing account can create a large accrued balance, hit a
  card failure or collections problem, and leave the vendor holding real
  infrastructure costs. Billing systems can calculate the invoice after the
  fact, but they rarely tell product and finance teams when to demand a prepaid
  top-up, change credit terms, or cut off risky usage before margin leaks.
targetUser:
  primary: >-
    Head of Finance, Billing, or Monetization at a Series B-D AI-native
    software company with self-serve usage billing and meaningful per-event
    COGS
  secondary: >-
    Revenue operations or payments leaders at developer-tool and API platforms
    using hybrid seat-plus-usage pricing
  buyer: >-
    CFO, VP Finance, or GM of Monetization at an AI-native B2B software vendor
startupThesis:
  nonObviousInsight: >-
    The durable wedge is not another invoicing layer. It is a usage-credit
    decision engine that judges, event by event, whether an account should get
    more spend, move to prepaid credits, shift to invoice approval, or face
    throttling based on payment health and gross-margin exposure.
  beachhead: >-
    Series B-D AI developer and agent platforms with 5,000-50,000 monthly
    active self-serve workspaces, hybrid seat-plus-usage pricing, and more than
    $100k per month of variable inference or storage COGS tied to card-billed
    accounts
  wedge: >-
    A usage-margin control plane that sits between product entitlements, event
    ledgers, and PSPs to decide when to allow more usage, ask for prepaid
    credits, switch billing terms, or throttle a risky account
  whyNowCatalyst: >-
    Adyen's Orb acquisition and the explicit deal thesis around linking billing
    signals to payment risk show that raw metering is no longer the endpoint;
    merchants now need real-time cash-collection logic on top of event-level
    usage.
  ventureScalePath: >-
    Start with AI-native vendors whose unit economics break fastest under
    postpaid usage, then expand into cloud databases, communications APIs, data
    platforms, and any usage-metered software business where every event has
    real COGS and payment risk.
solution: >-
  The product ingests raw usage events from Orb or other billing stacks,
  customer payment status from PSPs and ERPs, and contract or credit terms from
  CRM and billing systems. For each account, it computes a live exposure score:
  accrued but uncollected usage, recent payment failures, spend acceleration,
  gross-margin profile, and promised commit balance. It then triggers the right
  action in product and finance: allow more usage, ask for a prepaid top-up,
  convert the account to invoice with approval, enforce soft caps, or step down
  service before another expensive usage burst lands. Finance teams get
  simulations that show how credit thresholds affect collection rate, bad debt,
  and net revenue retention by cohort. Product teams get APIs and webhooks to
  keep entitlements synced with cash reality instead of waiting for month-end
  invoice surprises.
goToMarketSeed:
  firstCustomer: >-
    A Series C AI code or agent platform with 10,000+ card-billed workspaces,
    hybrid seat-plus-usage pricing, and recurring cases where unpaid overages
    still consume model or storage costs
  buyingTrigger: >-
    Launching usage-based pricing, seeing card-failure churn on growing
    accounts, or expanding from prepaid credits to postpaid monthly invoicing
  currentAlternative: >-
    Metering and billing platforms, homegrown entitlement scripts, manual
    finance reviews, and blunt account caps
  switchingReason: >-
    The control plane protects gross margin without replacing the merchant's
    billing stack, using event-level usage plus payment health to intervene
    before uncollected spend becomes bad debt.
  pricingHypothesis: >-
    Annual platform fee plus 0.5%-2% of protected or recovered usage revenue,
    or pricing by active spend-managed account
