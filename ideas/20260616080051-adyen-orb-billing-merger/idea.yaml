jobsToBeDone:
  - job: >-
      When a fast-growing AI customer suddenly spikes usage, help our finance
      and product teams decide whether to extend credit, request a top-up, or
      cap usage, so we protect gross margin without killing expansion.
    currentAlternative: >-
      Spreadsheet credit reviews, blunt account caps, and month-end invoice
      follow-up
    successMetric: "Gross margin retained on high-usage accounts and percentage of spend collected on time"
  - job: >-
      When payment failures or disputed invoices appear, help our team
      translate those signals into entitlement and collections actions
      automatically, so risky accounts stop consuming costly infrastructure
      before losses compound.
    currentAlternative: >-
      Manual collections emails plus disconnected billing and product-access
      rules
    successMetric: "Bad-debt rate, involuntary churn rate, and time from failed payment to risk action"
ideaScorecard:
  signalStrength:
    score: 4
    rationale: "A $335 million acquisition and multiple same-day reports validate that event-level billing plus payments is becoming a real infrastructure category."
  painIntensity:
    score: 4
    rationale: "For AI-native vendors with variable COGS, every failed payment can leave real compute and storage spend unrecovered, even if the broader cluster only hints at the pain."
  wedgeClarity:
    score: 5
    rationale: "Usage-margin control for card-billed AI software accounts is a narrow workflow with an identifiable buyer, trigger, and measurable outcome."
  defensibility:
    score: 4
    rationale: "Cross-system exposure data, account-level payment outcomes, and policy playbooks can become sticky, though billing incumbents may try to add adjacent controls."
  ventureScale:
    score: 4
    rationale: "The beachhead is focused, but the same usage-credit layer can spread into cloud, API, and broader usage-metered software categories."
topRisks:
  - name: "Incumbent bundling"
    description: "Billing providers or PSPs may add lightweight exposure controls and make a standalone layer seem optional."
    mitigation: "Stay stack-agnostic, orchestrate across billing, payment, entitlement, and ERP systems, and win where merchants need cross-vendor policy decisions rather than one-provider features."
  - name: "ROI visibility gaps"
    description: "Many customers do not yet measure event-level margin leakage or bad debt cleanly, which can slow the buying case."
    mitigation: "Start in shadow mode with historical replay and cohort-based before-and-after reporting tied to collected revenue, prevented exposure, and involuntary churn."
  - name: "Integration friction"
    description: "Connecting telemetry, billing, PSP, and product-entitlement systems can lengthen deployment and delay time to value."
    mitigation: "Launch with prebuilt connectors for the most common billing and payment stacks and a narrow first use case on self-serve card-billed accounts."
