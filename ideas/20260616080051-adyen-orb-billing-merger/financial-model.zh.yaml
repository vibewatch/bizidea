scenarios:
  downside:
    description: "整合型现有厂商将毛利管控功能捆绑入 Adyen+Orb 和 Stripe+Metronome，将试点转化率压至 30%、ACV 降至 $32k；公司放缓招聘以保住现金"
    y3RevenueK: 892.0
    y3EbitdaK: -1493.0
    cashLowPointK: 650.0
    keyAssumptionChanges:
      - "试点转生产转化率从 52% 降至 30%（A10）"
      - "受竞争压力和初始范围缩小影响，ACV 降至 $32k（A7、A8、A9）"
      - "Y3 人员上限 10 人以控制消耗；推迟招募第二客户主管和数据工程师（A19）"
      - "Seed 轮推迟至 Q2Y3 或未能完成；公司在 Y3 继续依靠 pre-seed 资金运营"
  base:
    description: "52% 试点转化率、$37k 混合 ACV、Y3 末 40 个生产客户，Q1Y3 完成 $600 万 Seed 轮融资"
    y3RevenueK: 1715.0
    y3EbitdaK: -1205.0
    cashLowPointK: 997.5
    keyAssumptionChanges: []
  upside:
    description: "合作伙伴渠道贡献 30% 新客户，转化率提升至 62%，ACV 扩展至 $45k；Y3 末 55 个生产客户"
    y3RevenueK: 2200.0
    y3EbitdaK: -900.0
    cashLowPointK: 1300.0
    keyAssumptionChanges:
      - "借助更精准的资质筛选，试点转生产转化率从 52% 提升至 62%（A10）"
      - "多队列交易和高级模块落地，ACV 扩展至 $45k（A9）"
      - "合作伙伴渠道以更低 CAC 贡献 Y3 新客户管道的 30%（A20）"
      - "Y3 末客户数达 55 个（vs 基准 40 个），推动订阅收入走高（A22）"

sensitivity:
  - variable: ARPU
    downsideCase: "$32k ACV——队列扩展放缓，无可变费用接受，现有厂商定价压力"
    baseCase: "$37k ACV——$35k 初始加第二队列交易带来 6% 扩展的混合值"
    upsideCase: "$45k ACV——40% 基础客户采纳多队列加高级策略库模块"
    y3RevenueImpactK: -130.0
    cashImpactK: -91.0
  - variable: CAC
    downsideCase: "转化率降至 30%；每个新客户需 18 个试点；销售与市场费用上升 30%"
    baseCase: "52% 转化率；每个新客户约 1.9 个试点；销售与市场费用参照 A20"
    upsideCase: "62% 转化率加合作伙伴转介；有效 CAC 降至 $38k"
    y3RevenueImpactK: -400.0
    cashImpactK: -320.0
  - variable: 流失率
    downsideCase: "月流失 1.5%（年 18%）——客户迁移至预付余额工作流"
    baseCase: "月流失 1.0%（年 12%）——共创客户高接触度维持较高留存"
    upsideCase: "月流失 0.5%（年 6%）——跨系统审计轨迹形成切换成本"
    y3RevenueImpactK: -58.0
    cashImpactK: -58.0
  - variable: 毛利率
    downsideCase: "65% 毛利率——集成复杂性需要更多云资源和外包支持"
    baseCase: "70% 毛利率——符合 BP 目标；Y2 规模下通过共享基础设施实现"
    upsideCase: "75% 毛利率——连接器复用和自动化评分在 Y3 降低单客户基础设施成本"
    y3RevenueImpactK: 0.0
    cashImpactK: -86.0
  - variable: 销售周期
    downsideCase: "平均 5 个月周期——采购审查和 PCI 边界讨论拉长交易"
    baseCase: "平均 3 个月周期——旁路模式试点范围让初始审查保持轻量"
    upsideCase: "2 个月周期——产品化审计加合作伙伴温热引荐压缩时间线"
    y3RevenueImpactK: -150.0
    cashImpactK: -120.0
  - variable: "试点定价"
    downsideCase: "$20k 均值——买家将试点视为免费 POC 施加价格压力"
    baseCase: "各年 $25–38k 均值——付费项目与历史队列回放价值挂钩"
    upsideCase: "$45k 均值——买家将回放审计视为战略毛利分析而非 IT 评估"
    y3RevenueImpactK: -145.0
    cashImpactK: -145.0

modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Accounts[Target Accounts\nSeries B-D AI Vendors] --> Disc[Qualified Discovery\n20-30% of outreach]
      Disc --> Pilot[Paid Shadow Pilot\n$25-38K fee]
      Pilot --> Conv{52% Convert\nto Production}
      Conv -->|Yes| Sub[Annual Subscription\n$35-40K ACV]
      Conv -->|No| Lost[Lost Pipeline]
      Sub --> MRR[Monthly Recurring\nRevenue]
      Sub --> Expand[Cohort Expansion\n40% within 12 mo]
      Expand --> MRR
      MRR --> GP[Gross Profit\n70-75% GM]
      GP --> Cash[Operating Cash]
      Cash --> Burn[Net Burn\nfunded by pre-seed]

modelSanity:
  - checkName: 收入引擎
    finding: "收入由一次性试点费（Y1 均值 $37.5k，Y3 降至 $25k）和 40 个生产客户订阅（Y3 末 ACV $40k）的递减混合构成，订阅在 Y3 中期超越试点费占比。"
  - checkName: 必须做对的事
    finding: "试点转生产转化率必须维持在 50% 以上，$25–38k 试点费必须部分抵消 CAC；若转化率跌至 30%，Y2 消耗倍数 3.7 倍将恶化，pre-seed 资金将无法顺利桥接至 Seed 轮。"
  - checkName: 模型失效条件
    finding: "整合型现有厂商（Adyen+Orb、Stripe+Metronome）在初创公司达到 20 个生产客户之前发布跨栈毛利管控功能，将导致转化率崩溃，现金跌破 Q4Y2 的 $99.75 万底线，且没有清晰的 Seed 轮里程碑。"
  - checkName: 下轮融资证明
    finding: "Q1Y3 建模的 $600 万 Seed 轮要求 pre-seed 阶段交付 12 个生产客户及至少 2 份 ROI 案例研究（显示受保护毛利 > 试点费用 2 倍），与 fundingAsk 里程碑和 BP 淘汰标准阈值一致。"

sanityChecks:
  ruleOf40: "Y2 至 Y3 收入增长 147% 减去 Y3 EBITDA 利润率 70% = 40 法则得分 77（正值；在产品市场契合前阶段增长主导；预计 Series A 后经常性收入规模扩大带动利润率改善）"
  burnMultiple: "Y2 消耗倍数 3.7 倍（净消耗 $123.8 万 / 新 ARR $33.3 万，来自 9 个新客户 × $37k ACV）；Y2 $42 万试点费部分抵消；目标在 Y3 随订阅占比提升降至 2 倍以下"
  revenuePerFte: "Y3 人均收入 $17.2 万（平均约 10 人；低于 $20–40 万 SaaS 基准）——在产品市场契合前阶段属于预期内；Series A 前须随连接器复用降低单客户交付成本而升至 $25 万以上"
  flags:
    - "Q1Y3 开始假设 $600 万 Seed 轮（A21）；若未完成，Y3 Q4 运营现金将转负约 $-20.7 万——在 Q4Y2 之前完成 Seed 轮是最重要的单一执行依赖"
    - "Y1 收入 100% 集中在 3 个客户；任何单一客户在续签前流失，都将对 ARR 和 Seed 轮叙事造成重大稀释"
    - "52% 试点转生产转化率尚未验证；BP 淘汰标准要求前 4 个试点中至少 2 个展示 2 倍 ROI——模型以此作为转化率下限"
    - "$35–40k ACV 为建模值但未经证实；若买家将试点定性为咨询项目而非 SaaS 部署，实际 ACV 可能更低"
    - "Y2 消耗倍数 3.7 倍高于资本效率早期 SaaS 的 2 倍以下基准；仅在试点费维持且 H2Y2 客户数提速的情况下改善"
    - "Y3 人均收入 $17.2 万低于 SaaS 中位数 $20–40 万；反映高研发投入和早期市场销售——pre-Seed 前可接受，但 Series A 信用要求须升至 $25 万以上"
    - "TAM/SAM 分别为 $5820 万/$1750 万，体量偏小；模型 Y3 收入约 $171.5 万对应 $1750 万 SAM——需扩展至邻近品类（云数据库、通信 API）才能支撑大体量风投结果"
