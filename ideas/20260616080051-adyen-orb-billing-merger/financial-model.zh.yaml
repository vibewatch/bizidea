slug: usage-margin-guard
date: '2026-06-16'
currency: USD
modelStartMonth: '2026-07'

assumptions:
  - id: A1
    name: Pre-seed 融资
    value: "3000"
    unit: thousandUSD
    source: "[BP fundingAsk] $2–4M 目标区间中点；在第 1 个月计入现金"
  - id: A2
    name: 模型起始月份
    value: "2026-07"
    unit: YYYY-MM
    source: "[BP date 2026-06-16] 报告日期的次月"
  - id: A3
    name: 起始生产客户数
    value: "0"
    unit: count
    source: "[BP milestones] 首批试点在第 3–5 个月完成；生产转化从第 6 个月开始"
  - id: A4
    name: Y1 试点费均值
    value: "37.5"
    unit: thousandUSD
    source: "[BP pricing] $25k–$50k 试点区间中点；Y1 共 3 个试点，分别在第 3、5、8 个月"
  - id: A5
    name: Y2 试点费均值
    value: "30.0"
    unit: thousandUSD
    source: "[BP pricing + heuristic] 产品化使入职成本比 Y1 试点费压缩约 20%；与早期 B2B SaaS 实施费下降趋势一致"
  - id: A6
    name: Y3 试点费均值
    value: "25.0"
    unit: thousandUSD
    source: "[BP sequencingRationale + heuristic] 进一步产品化和合作伙伴来源交易降低均值；连接器复用缩短部署时间"
  - id: A7
    name: Y1 年度订阅 ACV
    value: "35"
    unit: thousandUSD
    source: "[research bottomUpSizingDrivers] 建模 $35,000 ARR，以现有计费/基础设施支出基准为锚；75 个客户 × $35k = $260 万 SOM"
  - id: A8
    name: Y2 年度订阅 ACV
    value: "37"
    unit: thousandUSD
    source: "[BP expansionLevers] 40% 的客户在 12 个月内扩展至第二队列；混合 ARPU 较 Y1 初始 ACV 提升约 6%"
  - id: A9
    name: Y3 年度订阅 ACV
    value: "40"
    unit: thousandUSD
    source: "[BP expansionLevers + heuristic] 多队列和高级模块扩展；较初始 $35k ACV 提升约 14%；与该阶段 B2B SaaS NRR >110% 一致"
  - id: A10
    name: 试点转生产转化率
    value: "52"
    unit: percent
    source: "[BP funnelTargets] 试点转年度生产 50%+；模型使用 52% 作为略高于最低值的改进；无历史数据——若跌破 30% 则触发淘汰标准"
  - id: A11
    name: 月度流失率
    value: "1.0"
    unit: percentPerMonth
    source: "[heuristic] 早期 B2B SaaS 共创客户；年流失约 12%；与高接触度和人工续签支持一致；Churnkey/Stripe 非自愿流失基准提供下限参考"
  - id: A12
    name: 目标毛利率
    value: "70"
    unit: percent
    source: "[BP businessModel targetGrossMarginPct] 明确目标 70%；Y2 实现；Y1 约 69%（基础设施爬坡期），Y3 约 75%（规模化+自动化）"
  - id: A13
    name: Y1 COGS 构成
    value: "35"
    unit: percentOfRevenue
    source: "[heuristic] 云计算 + 试点部署基础设施 + 数据 API 成本；约 $2k/月基础 + 每个试点 $5k；35% 收入对早期不稳定收入是保守估计"
  - id: A14
    name: Y2 COGS 构成
    value: "30"
    unit: percentOfRevenue
    source: "[heuristic] 共享基础设施随增长摊薄；30% 反映约 8–12 个生产客户、每账户云成本适中的情况"
  - id: A15
    name: Y3 COGS 构成
    value: "25"
    unit: percentOfRevenue
    source: "[heuristic] 40 个生产客户；连接器复用和评分引擎效率降低单客户基础设施成本；25% 与 75% 毛利率目标一致"
  - id: A16
    name: Y1 人员计划
    value: "2 FTE Q1Y1 → 5 FTE Q4Y1"
    unit: FTE
    source: "[BP team] 创始人/CEO 和创始工程师从第 0 个月；解决方案工程师第 4 个月；产品/管控负责人第 7 个月；合作伙伴负责人第 10 个月"
  - id: A17
    name: 含附加成本的人均薪酬（均值）
    value: "155"
    unit: thousandUSDPerYear
    source: "[heuristic] 美国旧金山湾区初创公司薪酬，含 20% 福利/社保负担；CEO $18 万，创始工程师 $19.2 万，解决方案工程师 $16.8 万，产品负责人 $18 万，合作伙伴负责人 $15.6 万（均为到手含税总额）"
  - id: A18
    name: Y2 新增人员
    value: "+3 FTE（第二工程师 Q1Y2，客户主管 1 号 Q2Y2，客户成功 Q3Y2）"
    unit: FTE
    source: "[BP milestones 12-24 months] 达到 10–15 个生产客户需要专职客户主管和客户成功；第二工程师用于连接器规模化"
  - id: A19
    name: Y3 新增人员
    value: "+4 FTE（客户主管 2 号 Q1Y3，第三工程师 Q2Y3，客户成功 2 号 Q3Y3，数据工程师 Q4Y3）"
    unit: FTE
    source: "[BP milestones 24-36 months] 规模化至 40 个以上客户需要第二客户主管、第三工程师深化策略库、第二客户成功负责入职、数据/系统工程师建立敞口曲线数据集"
  - id: A20
    name: 非薪酬销售与市场费用爬坡
    value: "4 → 38"
    unit: thousandUSDPerMonth
    source: "[heuristic] 创始人内容 + 会议 $4k/月早期；到 Q4Y3 规模化至 $38k/月以支持两名客户主管和合作伙伴活动；与 Y3 总收入约 15–20% 的销售与市场费用率一致"
  - id: A21
    name: Seed 轮融资（Q1Y3 建模）
    value: "6000"
    unit: thousandUSD
    source: "[heuristic + BP investorMemo] pre-seed 资金支撑至 Q4Y2（剩余约 $99.8 万）；假设 $600 万 Seed 轮在 Y3 初完成（12 个生产客户验证后）；作为 Q1Y3 现金流入建模以展示可行的三年轨迹；已在 sanityChecks.flags 中标注"
  - id: A22
    name: 客户增长轨迹
    value: "0 → 3 → 12 → 40 生产客户（Y1/Y2/Y3 末）"
    unit: count
    source: "[BP milestones] Y1：2–3 个生产客户；Y2：10–15 个生产客户（模型：12）；Y3：向 75 客户 SOM 推进（模型：40 为保守基准）"
  - id: A23
    name: 无资本性支出假设
    value: "0"
    unit: thousandUSD
    source: "[heuristic] 纯软件产品；云基础设施为运营支出；无硬件或办公室租约；现金消耗 = EBITDA 消耗"
  - id: A24
    name: 收入确认
    value: "试点费在签约当月确认；订阅 MRR 从生产上线日起按月确认"
    unit: policy
    source: "[BP businessModel] 试点为付费项目（不递延）；年度订阅从生产上线日起计"

