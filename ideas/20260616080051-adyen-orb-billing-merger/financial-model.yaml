modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts[Target Accounts\nSeries B-D AI Vendors] --> Disc[Qualified Discovery\n20-30% of outreach]
      Disc --> Pilot[Paid Shadow Pilot\n$25-38K fee]
      Pilot --> Conv{52% Convert\nto Production}
      Conv -->|Yes| Sub[Annual Subscription\n$35-40K ACV]
      Conv -->|No| Lost[Lost Pipeline]
      Sub --> MRR[Monthly Recurring\nRevenue]
      Sub --> Expand[Cohort Expansion\n40% within 12 mo]
      Expand --> MRR
      MRR --> GP[Gross Profit\n70-75% GM]
      GP --> Cash[Operating Cash]
      Cash --> Burn[Net Burn\nfunded by pre-seed]

modelSanity:
  - checkName: Revenue engine
    finding: "Revenue is a declining-share mix of one-time pilot fees ($37.5K avg Y1, $25K by Y3) and growing monthly subscription from 40 production customers at $40K ACV by end Y3, with subscription overtaking pilot fees in mid-Y3."
  - checkName: Must go right
    finding: "Pilot-to-production conversion must hold at or above 50% and the $25-38K pilot fee must partially offset CAC; if conversion slips to 30%, the Y2 burn multiple of 3.7× worsens and the pre-seed does not bridge cleanly to a Seed raise."
  - checkName: Model breaks if
    finding: "Integrated incumbents (Adyen+Orb, Stripe+Metronome) ship cross-stack margin-control features before the startup reaches 20 production customers, collapsing conversion rates and leaving cash below the $997K Q4Y2 floor with no clear Seed milestone."
  - checkName: Next-round proof
    finding: "The $6M Seed raise modeled in Q1Y3 requires the pre-seed phase to deliver 12 production customers with at least 2 ROI case studies showing protected margin > 2× pilot fee, consistent with the fundingAsk milestone and BP killCriteria thresholds."

sanityChecks:
  ruleOf40: "Y2-to-Y3 revenue growth 147% minus Y3 EBITDA margin 70% = Rule-of-40 score 77 (positive; growth dominates at pre-product-market-fit stage; margin improvement expected post-Series-A as recurring base scales)"
  burnMultiple: "Y2 burn multiple 3.7x (net burn $1,238K / new ARR $333K from 9 new customers × $37K ACV); partially offset by $420K pilot fees in Y2; target <2x by Y3 as subscription share grows"
  revenuePerFte: "$172K/FTE in Y3 (avg ~10 FTE; below $200-400K SaaS benchmark) — expected at pre-PMF stage; must reach $250K+ before Series A as connector reuse reduces per-customer delivery cost"
  flags:
    - "Seed raise of $6M assumed at start of Q1Y3 (A21); without it, operating cash goes negative in Q4Y3 at ~$-207K — raising Seed by Q4Y2 is the single most important execution dependency"
    - "Y1 revenue is 100% concentrated in 3 customers; any single customer churn before renewal is highly dilutive to ARR and to Seed-raise narrative"
    - "Pilot-to-production conversion rate of 52% is unvalidated; BP killCriteria require at least 2 of 4 first pilots to show 2x ROI — model uses this as the conversion floor"
    - "ACV of $35-40K is modeled but unproven; actual ACV may be lower if buyers frame pilot as a consulting engagement rather than a SaaS deployment"
    - "Burn multiple of 3.7x in Y2 is above the <2x benchmark for capital-efficient early-stage SaaS; improves only if pilot fees are maintained and customer count accelerates in H2Y2"
    - "Revenue/FTE of $172K in Y3 is below the $200-400K SaaS median; reflects high R&D and early-market sales investment — acceptable pre-Seed but must improve to $250K+ for Series A credibility"
    - "TAM/SAM is modest at $58.2M/$17.5M; model reaches ~$1.7M Y3 revenue against a $17.5M SAM — requires adjacent category expansion (cloud DB, comms API) to support a broad venture outcome"
