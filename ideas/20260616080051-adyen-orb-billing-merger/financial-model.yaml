assumptions:
  - id: A1
    name: Pre-seed raise
    value: "3000"
    unit: thousandUSD
    source: "[BP fundingAsk] midpoint of $2-4M target range; loaded into cash at M1"
  - id: A2
    name: Model start month
    value: "2026-07"
    unit: YYYY-MM
    source: "[BP date 2026-06-16] month following report date"
  - id: A3
    name: Starting production customers
    value: "0"
    unit: count
    source: "[BP milestones] first pilots close in M3-M5; production conversions begin M6"
  - id: A4
    name: Pilot fee Y1 avg
    value: "37.5"
    unit: thousandUSD
    source: "[BP pricing] midpoint of $25k-$50k pilot range; 3 pilots in Y1 at M3, M5, M8"
  - id: A5
    name: Pilot fee Y2 avg
    value: "30.0"
    unit: thousandUSD
    source: "[BP pricing + heuristic] productization reduces onboarding cost by ~20% vs Y1 pilot fee; consistent with early-stage B2B SaaS implementation fee compression"
  - id: A6
    name: Pilot fee Y3 avg
    value: "25.0"
    unit: thousandUSD
    source: "[BP sequencingRationale + heuristic] further productization and partner-sourced deals lower avg fee; connector reuse shortens deployment time"
  - id: A7
    name: Annual subscription ACV Y1
    value: "35"
    unit: thousandUSD
    source: "[research bottomUpSizingDrivers] modeled $35,000 ARR anchored to existing billing/infrastructure spend floors; 75 customers × $35k = $2.6M SOM"
  - id: A8
    name: Annual subscription ACV Y2
    value: "37"
    unit: thousandUSD
    source: "[BP expansionLevers] 40% of customers expand to second cohort within 12 months; blended ARPU rises ~6% vs Y1 initial ACV"
  - id: A9
    name: Annual subscription ACV Y3
    value: "40"
    unit: thousandUSD
    source: "[BP expansionLevers + heuristic] multi-cohort and premium-module expansion; ~14% lift over initial $35k ACV; consistent with B2B SaaS NRR >110% at this stage"
  - id: A10
    name: Pilot-to-production conversion rate
    value: "52"
    unit: percent
    source: "[BP funnelTargets] pilot-to-annual-production 50%+ stated; model uses 52% as slight improvement over minimum; no historical data — kill criteria if drops below 30%"
  - id: A11
    name: Monthly churn rate
    value: "1.0"
    unit: percentPerMonth
    source: "[heuristic] early-stage B2B SaaS design partners; annual churn ~12%; consistent with high engagement and manual renewal support; Churnkey/Stripe involuntary-churn benchmark informs floor"
  - id: A12
    name: Target gross margin
    value: "70"
    unit: percent
    source: "[BP businessModel targetGrossMarginPct] stated 70%; achieved by Y2; Y1 ~69% (infra ramp), Y3 ~75% (scale + automation)"
  - id: A13
    name: Y1 COGS composition
    value: "35"
    unit: percentOfRevenue
    source: "[heuristic] cloud compute + pilot-setup infrastructure + data-API costs; ~$2k/month base + $5k per pilot; 35% of early lumpy revenue is conservative for pre-scale software"
  - id: A14
    name: Y2 COGS composition
    value: "30"
    unit: percentOfRevenue
    source: "[heuristic] shared infra amortizes across growing customer base; 30% reflects ~8-12 production customers with modest per-account cloud cost"
  - id: A15
    name: Y3 COGS composition
    value: "25"
    unit: percentOfRevenue
    source: "[heuristic] 40 production customers; connector reuse and scoring-engine efficiency reduce per-customer infra cost; 25% consistent with 75% gross margin target"
  - id: A16
    name: Y1 headcount plan
    value: "2 FTE Q1Y1 → 5 FTE Q4Y1"
    unit: FTE
    source: "[BP team] Founder/CEO and Founding Eng at M0; Solutions Eng M4; Product/Controls Lead M7; Partnerships Lead M10"
  - id: A17
    name: Loaded payroll per FTE (average)
    value: "155"
    unit: thousandUSDPerYear
    source: "[heuristic] U.S. SF-Bay-Area startup rates with 20% benefits/payroll-tax load; CEO $180k, Founding Eng $192k, Solutions Eng $168k, Product Lead $180k, Partnerships Lead $156k loaded"
  - id: A18
    name: Y2 headcount additions
    value: "+3 FTE (2nd Eng Q1Y2, AE1 Q2Y2, CS Q3Y2)"
    unit: FTE
    source: "[BP milestones 12-24 months] reach 10-15 production customers requires dedicated AE and customer-success; 2nd Eng needed for connector scale"
  - id: A19
    name: Y3 headcount additions
    value: "+4 FTE (AE2 Q1Y3, 3rd Eng Q2Y3, CS2 Q3Y3, Data Eng Q4Y3)"
    unit: FTE
    source: "[BP milestones 24-36 months] scale to 40+ customers requires second AE, third engineer for policy-library depth, second CS for onboarding, and data/systems engineer for exposure-curve dataset"
  - id: A20
    name: Non-salary S&M spend ramp
    value: "4 → 38"
    unit: thousandUSDPerMonth
    source: "[heuristic] founder-led content + conferences $4k/mo early; scales to $38k/mo by Q4Y3 to support two AEs plus partner events; consistent with ~15-20% of total revenue on S&M by Y3"
  - id: A21
    name: Seed raise modeled in Q1Y3
    value: "6000"
    unit: thousandUSD
    source: "[heuristic + BP investorMemo] pre-seed funds through Q4Y2 (~$998k remaining); $6M Seed raise assumed at start of Y3 after 12 production customers validated; modeled as cash inflow in Q1Y3 to show viable 3-year trajectory; flagged in sanityChecks.flags"
  - id: A22
    name: Customer trajectory
    value: "0 → 3 → 12 → 40 production customers (EOP Y1/Y2/Y3)"
    unit: count
    source: "[BP milestones] Y1: 2-3 production; Y2: 10-15 production (model: 12); Y3: scale toward 75-customer SOM (model: 40 as conservative base)"
  - id: A23
    name: No capex assumption
    value: "0"
    unit: thousandUSD
    source: "[heuristic] software-only product; cloud infra is opex; no hardware or office lease; cash burn = EBITDA burn"
  - id: A24
    name: Revenue recognition
    value: "pilot fees recognized in month signed; subscription MRR recognized monthly from production go-live"
    unit: policy
    source: "[BP businessModel] pilot is a paid engagement (not deferred); annual subscription starts at production launch date"

