problem: "很多 B2B 软件公司第一批 AI 功能都是围绕 Azure 独家的 OpenAI 接入搭起来的，也默认一条云路径就够了。现在这次重置后，企业买家可以要求在自己偏好的云上获得同样的 OpenAI 功能；与此同时，Azure 仍可能更早拿到新功能，或在无法支持时直接缺席。结果就是产品团队不得不分叉集成、重复跑安全和质量测试，还要手工追踪哪个租户能在什么云上使用哪个模型。"
targetUser:
  primary: 在已向企业客户交付 OpenAI 工作流的 Series B+ B2B SaaS 公司里，负责 AI 平台的主管或工程副总裁
  secondary: 负责维护供应商集成与评测体系的资深平台工程师或 ML 基础设施负责人
  buyer: 工程副总裁、CTO 或首席产品官
startupThesis:
  nonObviousInsight: "真正的市场变化不只是 OpenAI 算力更多了，而是跨云的 OpenAI 接入正在变成按客户合同而异的能力，因此应用厂商现在更需要可移植性、一致性和路由能力，而不是再来一个模型网关。"
  beachhead: 2025-2026 年基于 Azure OpenAI 推出 copilot、如今又收到《财富》 2000 客户要求其在 AWS 或直连 OpenAI 上提供同样工作流的企业 SaaS 厂商。
  wedge: 一个带合同感知能力的运行时，把同一个 OpenAI 功能映射到多种云分发通道，并提供一致性测试、租户路由和能力感知型故障切换。
  whyNowCatalyst: "OpenAI 现在可以在任何云服务商上提供产品，而 Azure 仍保有优先权，除非它无法支持某项能力；这让跨云兼容立刻变成一个必须出货的问题。"
  ventureScalePath: "先从企业 SaaS 产品的 OpenAI 可移植性切入，再扩展到更广义的模型合同编排、云特定评测、审计轨迹、成本控制，以及卖给大企业 AI 应用时需要的谈判数据。"
solution: "这款产品给 SaaS 团队一个控制平面，让他们能通过 Azure、直连 OpenAI 以及其他受支持的云通道，交付同一个由 OpenAI 驱动的功能。团队只需定义一次功能，系统就会在统一的应用 API 背后，处理不同提供商的认证、模型命名、配额行为、策略设置和发布规则。上线前，它会在不同云之间运行一致性评测，找出输出、时延、工具支持或安全行为上的差异。运行时，系统会按合同、地理位置或能力可用性为每个租户做路由；当首选云无法支持所需功能时，还能自动切换。每一次响应都会写入审计轨迹，证明究竟是哪朵云、哪个模型和哪条策略路径服务了该客户。"
goToMarketSeed:
  firstCustomer: 拥有 200-1,000 名员工的客服自动化、法律科技或垂直 SaaS 厂商；它已经上线 Azure OpenAI 助手，并且有一位《财富》 100 准客户在签约前要求 AWS 或厂商直连部署的一致性。
  buyingTrigger: 企业采购、安全或续约谈判要求提供非 Azure 的部署选项，或 Azure 无法支持新需要的 OpenAI 能力。
  currentAlternative: 内部多提供商抽象层，加上手工 QA、按提供商拆分的功能开关，以及开源 API 网关或重试工具。
  switchingReason: 这套控制平面能把一个高风险、跨多个季度的平台分叉，压缩成更快的上线节奏，并把一致性缺口、客户定制路由和可供采购团队审阅的证据直接摆到台面上。
  pricingHypothesis: 平台年费加路由用量费起步，每条产品线 ARR 约为 $60k-$150k；随后按活跃租户合同数和 token 量扩张。
