jobsToBeDone:
  - job: "当大客户为某个 AI 功能指定特定云时，帮助产品平台团队把同一个 OpenAI 工作流继续跑起来，从而在不重做定制开发的情况下拿下或续签该账户。"
    currentAlternative: 内部分叉集成加上跨提供商的手工验证
    successMetric: 支持新的客户云所需时间，以及因此保住的企业交易数量
  - job: "当某个提供商缺少关键能力或调整发布时间时，帮助 AI 平台负责人安全切换流量，从而避免宕机和功能回退。"
    currentAlternative: 手写的提供商故障切换脚本，加上基于表格的版本跟踪
    successMetric: 云特定事故数量下降，以及恢复功能可用性的时间缩短
