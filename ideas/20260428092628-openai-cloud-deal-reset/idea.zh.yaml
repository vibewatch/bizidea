problem: '许多 B2B 软件公司围绕仅限 Azure 的 OpenAI 访问构建了第一批 AI 功能，并假设单一路径的云集成已经足够。此次重置意味着企业买家如今可以要求在其偏好的云上获得同一个 OpenAI 驱动的功能，而 Azure 仍可能优先获得功能，或缺失其无法支持的能力。产品团队最终不得不分叉集成、重新运行安全与质量测试，并手动跟踪哪个租户可以在什么云上使用哪个模型。'
targetUser:
  primary: 'Series B+ B2B SaaS 公司中负责向企业客户交付 OpenAI 驱动工作流的 AI 平台负责人或 VP Engineering'
  secondary: '负责维护提供方集成和评估的资深平台工程师或 ML 基础设施负责人'
  buyer: 'VP Engineering、CTO 或 Chief Product Officer'
startupThesis:
  nonObviousInsight: '真正的市场变化不只是 OpenAI 容量更多了；而是 OpenAI 访问正变成跨云、按客户合同而异的能力，因此应用厂商现在更需要可移植性、一致性与路由，而不是另一个模型网关。'
  beachhead: '在 2025-2026 年推出了基于 Azure OpenAI 的 Copilot，并且如今正面临 Fortune 2000 客户要求在 AWS 或直连 OpenAI 上提供同一工作流的企业 SaaS 厂商。'
  wedge: '一个合同感知运行时，将一个 OpenAI 驱动的功能映射到多个云分发渠道，并提供一致性测试、租户路由和能力感知故障切换。'
  whyNowCatalyst: 'OpenAI 现在可以在任何云提供商上提供产品，而 Azure 仍保有优先权，除非其无法支持某项能力，这让跨云兼容性立即变成了一个交付问题。'
  ventureScalePath: '先从企业 SaaS 产品的 OpenAI 可移植性切入，再扩展到更广泛的模型合同编排、云特定评估、审计轨迹、支出控制，以及面向所有销售给大型企业的 AI 应用的谈判数据。'
solution: '该产品为 SaaS 团队提供一个控制平面，用于通过 Azure、直连 OpenAI 以及其他受支持的云渠道交付同一个 OpenAI 支撑的功能。团队只需定义一次功能，系统便会在统一的应用 API 背后处理提供方特定的认证、模型命名、配额行为、策略设置和发布规则。上线前，它会运行跨云一致性评估，展示输出、延迟、工具支持或安全行为在哪些方面存在差异。运行时，它会依据合同、地理位置或能力可用性为每个租户路由，并在首选云无法支持所需功能时进行故障切换。每一次响应都会被记录到审计轨迹中，以证明是哪个云、模型和策略路径为每位客户提供了服务。'
goToMarketSeed:
  firstCustomer: '一家具备 200-1,000 名员工的支持自动化、legal-tech 或垂直 SaaS 厂商，其 Azure OpenAI 助手已上线，并且有一个 Fortune 100 潜在客户在签约前要求 AWS 或厂商直连部署一致性。'
  buyingTrigger: '企业采购、安全或续约谈判要求提供非 Azure 部署选项，或者 Azure 无法支持新近所需的 OpenAI 能力。'
  currentAlternative: '内部多提供方抽象层，加上人工 QA、按提供方区分的功能开关，以及开源 API 网关或重试工具。'
  switchingReason: '该控制平面把一个高风险、持续多个季度的平台分叉，变成更快的上线过程，并带来可见的一致性缺口、按客户定制的路由，以及可用于采购审查的证据。'
  pricingHypothesis: '按产品线收取年度平台费并叠加路由使用量，起价约为每条产品线 $60k-$150k ARR，并随活跃租户合同数和 token 量扩展。'
whyNow:
  - point: 'OpenAI 产品现在可以通过任何云提供商提供，因此企业软件厂商不能再假设单一云集成就能满足每个客户。'
