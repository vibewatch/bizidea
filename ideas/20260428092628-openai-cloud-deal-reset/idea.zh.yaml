jobsToBeDone:
  - job: '当大型客户为某个 AI 功能指定特定云时，帮助产品平台团队让同一个 OpenAI 工作流持续运行，以便他们无需定制重建就能拿下或续签该客户。'
    currentAlternative: 内部分叉集成以及跨提供方的人工验证
    successMetric: 支持新客户云所需时间，以及被挽回的企业交易数量
  - job: '当某个提供方缺少所需能力或改变发布节奏时，帮助 AI 平台负责人安全地切换流量，以避免宕机和功能回退。'
    currentAlternative: 人工维护的提供方故障切换脚本和基于表格的发布跟踪
    successMetric: 云特定事故减少幅度，以及恢复功能可用性的时间
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 交易重置是明确且具有战略意义的，但该事件簇同日只有两个经验证的来源。
  painIntensity:
    score: 4
    rationale: 由于云约束而失去企业交易或破坏旗舰 AI 工作流，对面向大型客户销售的 SaaS 厂商来说是强烈痛点。
  wedgeClarity:
    score: 5
    rationale: 针对已在 Azure 上运行的厂商，跨云 OpenAI 功能可移植性是一个狭窄、及时且适合设计合作伙伴的切入口。
  defensibility:
    score: 4
    rationale: 防御性可以来自一致性数据集、路由策略、应用集成以及按客户积累的兼容性历史，不过大型平台也可能进入。
  ventureScale:
    score: 5
    rationale: 这个滩头市场可以成长为更广泛的模型合同编排、评估以及企业 AI 部署治理控制平面。
topRisks:
  - name: 平台捆绑
    description: OpenAI、Microsoft 或云提供商可能会加入自己的可移植性工具，为客户提供原生路径。
    mitigation: 从基础设施之上切入，提供应用特定的一致性测试、租户路由和单云工具不会优先支持的采购证据。
  - name: 需求集中
    description: 只有一部分 SaaS 厂商会在短期内感受到紧迫的多云 OpenAI 压力，这可能使早期管道变窄。
    mitigation: 先卖给那些一个被阻塞的 Fortune 500 续约或采购审查就能立即产生 ROI 和案例紧迫性的厂商。
  - name: 抽象不完美
    description: 不同云之间的模型行为和功能可用性差异可能大到让某些工作流无法实现完美可移植。
    mitigation: 明确支持的功能模板，在上线前暴露不兼容性，并销售可见性和回退行为的保证，而不是承诺魔法般的完全一致。