topRisks:
  - name: 平台捆绑
    description: OpenAI、Microsoft 或云服务商可能会补上自己的可移植工具，直接给客户提供原生路径。
    mitigation: 先站到基础设施之上，做单云工具不会优先满足的应用级一致性测试、租户路由和采购证据。
  - name: 需求过于集中
    description: 短期内只有一部分 SaaS 厂商会感受到迫切的多云 OpenAI 压力，这可能压窄早期销售漏斗。
    mitigation: 先卖给那些一笔被卡住的《财富》 500 续约或采购审查就能立刻产生 ROI 和案例紧迫感的厂商。
  - name: 抽象层不够完美
    description: 不同云之间的模型行为和功能可用性差异，可能大到让某些工作流根本做不到完全可移植。
    mitigation: 明确支持的功能模板，在上线前先把不兼容点亮出来，并出售“可见性 + 回退能力”的确定性，而不是承诺魔法般的完全一致。