    rationale: 这次合作重置写得很明确，战略意义也很强，但事件簇当天只有两条经过验证的来源。
  painIntensity:
    score: 4
    rationale: 因云约束而丢掉企业订单，或让旗舰 AI 工作流失灵，对卖向大客户的 SaaS 厂商来说是高度疼痛的问题。
  wedgeClarity:
    score: 5
