competitors:
- name: Portkey
  stage: 成长期
  wedge: 面向企业的 AI 网关，提供跨提供商的可观测性、治理、预算和访问控制。
  pricing: 偏销售驱动、偏企业；公开页面更强调企业评测和客户背书，而不是透明的自助分层。
  strength: 在访问控制、预算和多提供商治理上有很强的企业打包能力。
  weaknessVsUs: 它依然被作为横向 AI 运营栈来销售，而不是面向单个 SaaS 功能、具备合同感知能力的 OpenAI 可移植层。
  sourceRefs:
  - 26
  - 27
  - 38
- name: LiteLLM
  stage: 开源
  wedge: 兼容 OpenAI 的代理，覆盖 100+ 模型，带有路由、透传、预算和多租户能力。
  pricing: 默认开源，并通过企业版本增销；自托管选项很强。
  strength: 开发者采用广、提供商覆盖面大、扩展性强，是 build-vs-buy 对比里的默认基线。
  weaknessVsUs: 买家仍需自己承担企业级 QA、合同映射和采购证据；它更像工具箱，而不是一个完成度高的可移植产品。
  sourceRefs:
  - 21
  - 22
  - 23
- name: Helicone
  stage: 成长期
  wedge: AI 网关加可观测性，支持提供商路由，以及兼容 OpenAI 的 100+ 模型访问。
  pricing: Pro $79/月，Team $799/月，Enterprise 定制。
  strength: 提供商路由故事明确，而且公开定价让试用门槛很低。
  weaknessVsUs: 重心还是路由和分析；几乎没有证据表明它深做了 SaaS 厂商需要的租户合同一致性工作流。
  sourceRefs:
  - 24
  - 25
- name: Cloudflare AI Gateway
  stage: 平台型巨头
  wedge: 网络边缘 AI 网关，提供路由、BYOK、DLP、缓存、统一计费和提供商连接器。
  pricing: 目前核心能力免费，高级能力叠加在套餐限制和更广泛的 Cloudflare 账户经济之上。
  strength: 分发能力强、安全心智强、功能发布速度快，是最可信的横向平台威胁。
  weaknessVsUs: 它优化的是流量管理，而不是应用级一致性证据或具备合同感知能力的产品发布逻辑。
  sourceRefs:
  - 16
  - 17
  - 18
  - 19
  - 20
  - 36
  - 39
regulatoryTechnicalConstraints:
- point: Azure 的配额按区域、订阅以及模型 / 部署类型分配，所以企业租户不能被当成一个同质化资源池。
  sourceRefs:
  - 5
- point: AWS 的跨区域推理和提供商特定路由，会带来额外的签名、鉴权与运营复杂度。
  sourceRefs:
  - 11
  - 15
- point: 不同托管路径的隐私声明不同，因此面向客户的文档与合同措辞本身就是产品要求的一部分。
  sourceRefs:
  - 6
  - 15
  - 31
- point: Azure、AWS 和网关护栏层的安全与过滤行为并不相同，所以可移植性不能默认拥有一致的内容审核结果。
  sourceRefs:
  - 12
  - 36
- point: 企业买家期待的不只是基本 uptime，还会要求网关配置和 AI 流量具备审计性与变更追踪。
  sourceRefs:
  - 29
  - 36
  - 37
validationSignals:
- point: Microsoft 与 OpenAI 已明确重写合作关系，让 OpenAI 可以在任何云上提供产品，同时保留 Azure 的主要合作伙伴身份。
  sourceRefs:
  - 1
  - 2
- point: Microsoft 文档明确说明可以在同一 client 生态里切换直连 OpenAI 与 Azure OpenAI，这说明可移植性已经是一个现实的工程问题，而不是概念题。
  sourceRefs:
  - 3
  - 4
- point: AWS 正通过 Converse API、推理配置文件和提示路由，标准化多模型使用方式，这说明买家已经在期待跨模型、跨区域的编排能力。
  sourceRefs:
  - 10
  - 11
  - 12
- point: Cloudflare 持续扩张 AI Gateway；其 2026 年 4 月更新加入了无需改客户端的网关级自动重试。
  sourceRefs:
  - 17
  - 39
- point: LiteLLM、Helicone 和 Portkey 这类开源或创业工具，都在销售多提供商路由与治理，这本身就在验证抽象层需求。
  sourceRefs:
  - 21
  - 24
  - 26
- point: Flexera 对 753 位云决策者的调查表明，组织一边继续为多云复杂性头疼，一边又在加大 AI、FinOps、安全和可持续性投入。
  sourceRefs:
  - 28
openQuestions:
- 多少设计伙伴潜在客户既有已上线的 Azure OpenAI 功能，又有正在发生的非 Azure 客户需求，而不是对未来的想象？
- 买家会愿意为一套独立控制平面单独付费，还是他们默认这类能力应该被放进现有网关或云合同里？
- 最少需要什么样的一致性工件，才能说服采购：输出差异报告、路由日志、模型支持矩阵，还是整套部署证明包？
- 产品真的能稳定地叠在 LiteLLM 或 Cloudflare 这类现有网关之上，还是买家会太早要求架构上的 rip-and-replace？
