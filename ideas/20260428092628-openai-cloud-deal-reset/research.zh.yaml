  validationPlan:
  - priority: 高
    question: 企业潜在客户到底多频繁地已经在要求非 Azure 的 OpenAI 部署一致性？
    evidenceToGather: 访谈 12 位已经上线 Azure OpenAI 功能的 SaaS 平台负责人；收集 2 个因云选择要求而丢单或续约延迟的案例。
  - priority: 高
    question: '最先能打开预算的到底是哪种交付物：一致性评测、租户路由，还是采购证据？'
    evidenceToGather: 与工程副总裁、资深平台工程师和解决方案架构师做问题排序访谈；让他们围绕一个被卡住的客户需求给每类工件打分。
  - priority: 中
    question: 产品能否叠在现有网关之上，而不是替换它们？
    evidenceToGather: 在一个已经使用 Cloudflare、LiteLLM、Helicone 或 Portkey 的设计伙伴环境上做原型，验证创业公司能否以编排层而非替代者身份落地。
  - priority: 中
    question: 输出差异要大到什么程度，买家才会认为可移植性承诺已经失败？
    evidenceToGather: 围绕 3-5 条真实工作流建立一致性基准，并请设计伙伴给出可接受的时延、安全和答案质量阈值。
