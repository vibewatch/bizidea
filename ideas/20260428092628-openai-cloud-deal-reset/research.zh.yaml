  growthRate: 2023 至 2025 年间，美国员工在工作中使用 AI 的比例从 20% 翻倍到 40%
  growthRateSourceRefs:
  - 34
  tailwinds:
  - point: Microsoft-OpenAI 的重写，使多云 OpenAI 分发对企业买家而言在结构上更可信。
    sourceRefs:
    - 1
    - 2
  - point: 云平台和网关都在持续发布路由、计费和安全原语，这证明需求真实存在，即便品类定义仍在流动中。
    sourceRefs:
    - 12
    - 17
    - 21
    - 24
    - 39
  - point: 企业 AI 采用和生产率信号支持 SaaS 厂商持续承受向客户交付 AI 功能的路线图压力。
    sourceRefs:
    - 33
    - 34
    - 35
  headwinds:
