topRisks:
  - name: Platform bundling
    description: OpenAI, Microsoft, or cloud providers could add their own portability tooling and give customers a native path.
    mitigation: Start above the infrastructure layer with app-specific parity testing, tenant routing, and procurement evidence that single-cloud tools will not prioritize.
  - name: Demand concentration
    description: Only a subset of SaaS vendors will feel urgent multi-cloud OpenAI pressure in the near term, which could narrow early pipeline.
    mitigation: Sell first to vendors where one blocked Fortune 500 renewal or procurement review creates immediate ROI and reference urgency.
  - name: Imperfect abstraction
    description: Model behavior and feature availability may differ enough across clouds that perfect portability is impossible for some workflows.
    mitigation: Be explicit about supported feature templates, surface incompatibilities before launch, and sell guaranteed visibility plus fallback behavior rather than magic uniformity.
