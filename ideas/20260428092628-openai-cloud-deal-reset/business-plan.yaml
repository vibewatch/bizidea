slug: model-portability-control-plane
date: "2026-04-28"
executiveSummary: >-
  Model Portability Control Plane should launch as a narrow enterprise infrastructure company for SaaS vendors that already ship a live Azure OpenAI feature and now face customer demands for AWS or direct OpenAI parity. The catalyst is specific and recent: OpenAI can now serve products across any cloud, while Azure still keeps priority unless it cannot support a capability, which turns cloud choice into an immediate product and procurement problem. The first product should not be a generic LLM gateway, because Cloudflare, LiteLLM, Helicone, and Portkey already cover much of that layer. Instead, v1 should own contract-aware parity testing, tenant routing, capability-aware failover, and audit evidence for one customer-facing AI workflow. The fastest buying trigger is revenue preservation, such as a blocked Fortune 100 deal, renewal risk, or security review that requires a non-Azure deployment path. Research supports real pain but also a narrow initial market, with an estimated U.S. beachhead of roughly 412 software publishers in the 200-999 employee band and a year-3 reachable SOM of about $2.2M, so the company must expand into broader model-contract orchestration after proving the wedge. The biggest disconfirming risk is that buyers assemble enough of v1 themselves using existing gateways, OpenAI-compatible SDKs, and internal feature flags. Third-party deployment evidence is still limited in the source set, so the plan should be run as a proof-heavy pre-seed effort with explicit kill criteria around deal-trigger frequency, pilot conversion, and willingness to pay.
problem:
  - Enterprise SaaS vendors that launched AI features on Azure now face customer-specific demands to offer the same workflow on AWS or direct OpenAI without a product fork.
  - Provider quotas, safety behavior, regions, and capability timing differ across Azure, AWS-linked paths, and direct OpenAI, so basic API normalization does not preserve product behavior.
  - Internal abstractions and horizontal gateways still leave teams to run parity testing, tenant routing, and procurement-ready audit packaging themselves.
solution:
  - Provide a control plane that maps one customer-facing OpenAI feature to Azure, direct OpenAI, and selected AWS-linked paths behind a single application API.
  - Run cross-cloud parity evaluations before release and surface capability gaps, latency differences, safety deltas, and unsupported configurations before a customer rollout.
  - Route each tenant by contract, geography, and feature availability at runtime while recording an audit trail of cloud path, model, policy, and failover decisions.
whyWeWin:
  - The wedge sits above commodity gateway infrastructure at the point where SaaS vendors lose revenue, namely shipping one contracted feature across cloud-specific buyer requirements.
  - A proprietary corpus of cross-cloud parity results plus tenant-level routing history can compound into sticky implementation data that open-source proxies do not create by default.
  - Selling into blocked deals and renewals creates sharper ROI than selling generic routing or observability to teams still experimenting.
strategicChoices:
  beachhead: Series B+ B2B SaaS vendors with 200-1,000 employees that launched an Azure OpenAI copilot in 2025-2026 and now have at least one enterprise customer or prospect asking for AWS or direct OpenAI deployment parity.
  wedgeRationale: >-
    This beachhead matches the researched first-customer profile, has a clear economic buyer, and concentrates urgency around a single shipped workflow tied to a live revenue event. It should produce faster proof than targeting all multi-model infrastructure teams because the pain is not abstract developer convenience; it is a specific deal or renewal at risk unless one feature can be redeployed without a rewrite.
  sequencingRationale: >-
    Product should start with parity testing, tenant routing, and audit evidence because those are the minimum artifacts needed to close a portability-driven enterprise request. GTM should begin with founder-led sales into a small number of Azure-anchored SaaS vendors and design partners, then add gateway, cloud-architecture, and security-review partners once production references exist. Hiring should follow that sequence with core engineering first, solutions support second, and broader product or partnerships only after pilot-to-production conversion is repeatable.
  notYet:
    - Generic multi-model gateway for any provider mix
    - Internal employee copilot deployments
    - SMB self-serve onboarding
    - Broad sovereign or on-prem AI orchestration beyond the initial cloud paths
market:
  tam: "$89.0M estimated U.S. TAM based on roughly 412 software publishers with 200-999 employees, 1.8 customer-facing AI feature lines per company, and about $120k annual control-plane spend per line."
  sam: "$21.6M near-term SAM based on the same beachhead filtered to companies actively commercializing customer-facing AI, about 1.5 feature lines per active firm, and about $100k annual spend."
  som: "$2.2M year-3 SOM based on roughly 18 product lines at about $120k ARR each under a founder-led enterprise motion."
  segments:
    - Azure-anchored enterprise SaaS vendors selling customer-facing AI workflows into Fortune 2000 accounts
    - Larger software vendors and platform teams that already use a gateway but still need contract-aware portability evidence
  buyingProcess: >-
    Evaluation usually starts with the Head of AI Platform, staff platform engineer, or ML infrastructure lead after a strategic account requests a non-Azure path or Azure cannot support a needed capability. Budget and production approval typically require VP Engineering, CTO, or CPO sponsorship plus security, procurement, and architecture review that asks for parity proof, routing controls, and auditability.
product:
  mvp: >-
    MVP should include provider adapters for Azure OpenAI, direct OpenAI, and one AWS-linked path; a policy engine for tenant routing by contract, region, and capability; parity evaluations on target workflows; and an audit log with deployment attestation outputs. It should integrate above an application's existing feature code and avoid building a full horizontal gateway from scratch.
  sixMonth: Ship two paid pilots and one production deployment with parity reports, routing policies, audit exports, and support for sitting above at least one existing gateway or proxy already used by a design partner.
  twelveMonth: Add capability and region matrices, rollout controls, spend and quota guardrails, reusable evaluation templates for common SaaS copilots, and deeper integration with gateway ecosystems rather than forcing rip-and-replace.
  twentyFourMonth: Expand into a broader model-contract orchestration layer with additional providers, negotiation and compliance evidence packages, policy benchmarking, and multi-workflow governance for large SaaS platforms.
  keyBets:
    - Buyers will pay first for parity proof and tenant routing, not for generic API normalization.
    - The product can sit above existing gateway infrastructure and avoid a costly architectural replacement sale.
    - Output and policy divergence across clouds is manageable enough that buyers still value controlled portability.
    - Cross-cloud parity datasets become a defensible asset before horizontal gateways move upstack.
gtm:
  wedge: Sell a portability control plane for one shipped OpenAI feature that is blocking or threatening a specific enterprise deal, then expand within the account to additional product lines and contracts.
  channels:
    - Founder-led outbound to VP Engineering, CTO, and AI platform leaders at Azure-anchored SaaS vendors
    - Referrals from cloud architects, migration consultancies, and security-review partners involved in multi-cloud redesigns
    - Integration-led pull through gateway and SDK ecosystems such as Cloudflare- or LiteLLM-adjacent deployments
  funnelTargets: "Target account to qualified portability opportunity 15-25%, qualified opportunity to paid pilot 25%+, pilot to production 50%+, production account to second feature line 50%+ within 12 months."
  pricing: Annual platform fee plus routed usage and parity-evaluation fees, starting around $60k-$150k ARR per product line because value scales with protected enterprise revenue, deployment complexity, and number of governed tenant contracts rather than seats.
businessModel:
  revenueStreams:
    - Annual subscription for the portability control plane, policy engine, and audit workflows
    - Usage fees for routed production traffic and parity-evaluation runs
    - Premium compliance and deployment evidence packages for procurement-heavy enterprise deals
    - Early implementation and solutions services during design-partner deployments
  unitOfValue: Customer-facing AI feature line under governed multi-cloud deployment
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more AI feature lines within an existing SaaS product portfolio
    - Increase governed tenant contracts and production traffic volume
    - Upsell compliance evidence, spend controls, and benchmarking modules
    - Expand from OpenAI portability into broader model-contract orchestration across providers
strategyMap:
  northStarMetric: Monthly production tenant contracts served through a governed portable AI feature without cloud-specific code forks
  inputMetrics:
    - Number of qualified portability-trigger opportunities
    - Paid pilot conversion rate
    - Pilot to production conversion rate
    - Percentage of releases with completed parity reports before rollout
    - Runtime failover success rate on supported workflows
    - Net revenue retention by product line
  moatsToBuild:
    - Cross-cloud parity dataset tied to real customer workflows and acceptance thresholds
    - Tenant-contract routing history and audit evidence embedded in procurement and renewal processes
    - Deep adapters and rollout templates for common SaaS copilot patterns
    - Integration posture that works above incumbent gateways instead of competing only on commodity proxy features
  killCriteria:
    - Fewer than 4 of the first 15 target accounts confirm a current or recent non-Azure portability demand tied to a live deal or renewal.
    - Fewer than 3 paid pilots launch within the first 9 months of founder-led selling.
    - Pilot to production conversion stays below 40% after 5 paid pilots.
    - More than half of design-partner deployments require replacing an incumbent gateway instead of integrating above it.
  mermaid: |
    flowchart LR
      Wedge[Blocked enterprise portability request] --> MVP[Parity testing plus tenant routing MVP]
      MVP --> Proof[Paid pilots and production parity proof]
      Proof --> Expansion[Broader model-contract orchestration]
investorMemo:
  verdict:
    call: Watch
    conviction: Clear timing and customer pain, but the beachhead is narrow and horizontal substitutes may absorb much of v1 before durable pricing is proven.
    whyBelieve: The partnership reset creates a concrete new deployment problem for Azure-anchored SaaS vendors selling into large enterprises, and that problem aligns with a budgeted revenue-preservation trigger.
    whyDoubt: Existing gateways, SDK portability, and internal platform teams may be good enough until a company proves that parity evidence and tenant routing deserve a standalone budget.
    nextDiligence: Confirm at least two current blocked or delayed enterprise deals where buyers would pay for portability artifacts now rather than waiting for an internal build or gateway extension.
  firstCustomer:
    title: Head of AI Platform at an Azure-first enterprise SaaS vendor
    profile: A 200-1,000 employee SaaS company with a live customer-facing copilot, one to three product lines using OpenAI, and active Fortune 2000 procurement pressure for cloud-specific deployment options.
    trigger: A strategic prospect or renewal requires AWS or direct OpenAI deployment parity, or Azure cannot support a needed capability or region on the deal timeline.
    buyer: VP Engineering
    initialContract: "$20k-40k paid pilot over 8-12 weeks converting to roughly $60k-150k ARR per product line plus usage once one contracted workflow is live in production."
  mustBeTrue:
    - At least one in three qualified target accounts must report a recent portability-driven deal delay, security review, or renewal risk.
    - Buyers must rank parity evaluations and tenant routing above generic gateway features as the first artifact they would fund.
    - At least half of paid pilots must convert to production within six months.
    - The product must integrate above an incumbent gateway or internal abstraction in most deployments rather than requiring rip-and-replace.
    - Early customers must expand from one workflow to at least one additional contract, tenant segment, or feature line within 12 months.
  diligenceQuestions:
    - How many current prospects have a live Azure OpenAI feature and an active non-Azure customer request today?
    - Which artifact opens budget first for buyers: parity report, routing policy engine, or procurement attestation package?
    - How acceptable is output divergence across clouds before customers consider the portability promise broken?
    - Can the startup sit above Cloudflare, LiteLLM, Helicone, or Portkey in real deployments without unacceptable latency or support burden?
    - What would cause a cloud provider or horizontal gateway to package the same parity and contract-routing layer within 12 months?
  riskHeatmap:
    - risk: Market demand is too episodic because only a small subset of SaaS vendors have immediate non-Azure portability pressure.
      likelihood: Medium
      impact: High
      leadingIndicator: Fewer than 4 of the first 15 target accounts identify a current deal or renewal tied to portability pain.
      mitigation: Focus outreach on vendors already selling into Fortune 2000 buyers and treat blocked-account evidence as a hard qualification gate.
    - risk: Horizontal gateways and open-source proxies make v1 look like a commodity extension.
      likelihood: High
      impact: High
      leadingIndicator: Discovery calls collapse into price comparisons with Cloudflare, LiteLLM, Helicone, or Portkey instead of parity and contract-workflow discussions.
      mitigation: Position above the proxy layer, integrate with existing gateways, and lead demos with parity evidence and tenant-contract workflows.
    - risk: Technical divergence across clouds makes portability unreliable on important workflows.
      likelihood: Medium
      impact: High
      leadingIndicator: More than 20% of pilot workflow tests fail agreed parity thresholds or require unsupported cloud-specific exceptions.
      mitigation: Limit v1 to supported workflow templates, publish capability boundaries early, and sell controlled portability with explicit fallback behavior.
    - risk: Sales become services-heavy because each deployment is highly customized.
      likelihood: Medium
      impact: Medium
      leadingIndicator: Implementation and custom engineering exceed 25% of pilot revenue or delay production go-live beyond 90 days.
      mitigation: Standardize adapters, rollout templates, and procurement evidence packs, and decline workflows that need bespoke application redesign.
operatingAssumptions:
  - assumption: The most efficient entry point is a SaaS vendor with an already-shipped Azure OpenAI feature and a current enterprise portability request.
    basis: idea.yaml
    validationTest: In the first 15 target-account conversations, at least 5 match this profile and agree the issue is active rather than hypothetical.
    decisionImpact: If false, narrow the ICP further by vertical or trigger event before building broader product coverage.
  - assumption: Buyers will fund parity testing and tenant routing as a standalone line item when the purchase is tied to protected revenue.
    basis: research.yaml
    validationTest: Convert at least 3 qualified opportunities into paid pilots at $20k+ without bundling the product into a broader services statement of work.
    decisionImpact: If false, reposition as an add-on module within existing gateways or pursue channel white-label distribution.
  - assumption: The product can integrate above existing gateways or internal abstractions in most customer environments.
    basis: research.yaml
    validationTest: Complete 2 design-partner implementations where the startup sits above an incumbent gateway or proxy with acceptable latency and support effort.
    decisionImpact: If false, customer acquisition will slow and the roadmap must shrink to a smaller set of opinionated reference architectures.
  - assumption: Cross-cloud behavior differences are significant enough to create pain but bounded enough to support repeatable parity thresholds.
    basis: operator judgment
    validationTest: On 3-5 real workflows, keep parity pass rates above 80% using explicit customer-approved thresholds for quality, latency, and safety behavior.
    decisionImpact: If false, reposition toward visibility and audit tooling rather than portability claims.
  - assumption: The company can expand from OpenAI portability into a broader model-contract orchestration platform after the first 6-10 customers.
    basis: idea.yaml
    validationTest: By month 12, at least half of active customers request adjacent controls such as spend governance, broader provider support, or additional governed workflows.
    decisionImpact: If false, the company remains a niche control layer and funding requirements should be reduced accordingly.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 SaaS platform leaders with live Azure OpenAI features and document recent blocked deals, renewals, or security reviews tied to cloud-choice demands.
    hypothesis: Portability pain is concentrated in a small but reachable set of vendors with active revenue triggers.
    successMetric: At least 5 target accounts report a current or recent portability-driven commercial event and 3 agree to technical follow-up.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run problem-ranking sessions comparing parity reports, tenant routing, procurement evidence, and generic failover against a real customer request.
    hypothesis: Buyers will fund parity and contract-routing artifacts before they fund another horizontal gateway.
    successMetric: At least 8 of 12 qualified buyers rank parity plus routing in the top two budget-worthy deliverables.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build a design-partner prototype that compares one production workflow across Azure OpenAI and direct OpenAI with audit logging and manual routing rules.
    hypothesis: A narrow prototype can prove differentiated value without replacing the customer's existing gateway stack.
    successMetric: One design partner completes test traffic and validates at least 3 actionable parity or capability gaps.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Launch 2 paid pilots with a fixed portability package including parity evaluation, routing policy setup, and deployment attestation outputs.
    hypothesis: A productized pilot scope can convert faster than bespoke consulting.
    successMetric: Two paid pilots launched with implementation completed in under 45 days each.
    owner: Solutions engineer
  - horizon: 6–12 months
    experiment: Integrate above one incumbent gateway environment and one internal abstraction environment to test architecture flexibility.
    hypothesis: The startup can win as an orchestration layer above existing infrastructure rather than a replacement.
    successMetric: Two production-capable integrations completed with no rip-and-replace requirement and no more than 10% latency overhead.
    owner: Founding eng
  - horizon: 6–12 months
    experiment: Test account expansion by adding a second feature line or tenant segment in the first production customer.
    hypothesis: Once the first workflow is live, adjacent product lines and contracts are a natural upsell path.
    successMetric: One production customer expands to a second governed workflow or contract segment within 6 months of go-live.
    owner: Product lead
operations:
  - Maintain a release-readiness process that requires parity evaluation, capability matrix review, and customer-specific routing approval before production rollout.
  - Store tenant-contract metadata, routing decisions, and failover events in an audit log suitable for procurement and renewal reviews.
  - Use a design-partner implementation playbook that standardizes adapters, data boundaries, and success criteria to keep pilots under 45 days.
  - Monitor provider quotas, region support, and capability changes weekly across Azure, direct OpenAI, and supported AWS-linked paths.
  - Build security and privacy documentation early because cloud-path claims and audit evidence are part of the product, not only the sales process.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build provider adapters, parity evaluation infrastructure, and the policy engine that determine whether the product is more than a thin proxy.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales, design-partner discovery, and the translation of blocked deal pain into a repeatable wedge narrative.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Shorten pilot deployment cycles, support integrations above incumbent stacks, and capture implementation patterns for productization.
  - role: Product lead
    startTiming: Month 6
    rationale: Turn design-partner learnings into repeatable workflow templates, procurement artifacts, and expansion modules.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Develop referral and integration channels with cloud architects, gateway ecosystems, and security-review partners after initial production proof exists.
milestones:
  - horizon: 0–12 months
    items:
      - Validate that portability-triggered pain exists in at least 5 qualified target accounts.
      - Ship a prototype across Azure OpenAI and direct OpenAI for one real workflow.
      - Launch 3 paid pilots and convert at least 2 to production.
      - Prove the product can sit above at least one incumbent gateway or internal abstraction.
      - Publish a repeatable deployment attestation and audit package used in one enterprise review.
  - horizon: 12–24 months
    items:
      - Expand production coverage to 8-10 product lines under management.
      - Add AWS-linked production path support, capability matrices, and spend or quota guardrails.
      - Win at least 3 customers that expand beyond the initial workflow into additional contracts or feature lines.
      - Establish a small partner channel that produces qualified portability opportunities without heavy custom services.
  - horizon: 24–36 months
    items:
      - Broaden from OpenAI portability into a multi-provider model-contract orchestration layer.
      - Launch benchmarking and policy modules built from accumulated parity and routing data.
      - Reach referenceable enterprise deployments across multiple geographies with documented audit and routing controls.
      - Decide whether to scale as a broader platform or remain a focused control layer based on retention and expansion data.
risks:
  - risk: The initial market is too narrow to support venture-style growth without rapid expansion beyond the beachhead.
    likelihood: High
    impact: High
    mitigation: Treat the beachhead as a proof wedge, define expansion requests early, and cut spending if cross-provider orchestration demand does not appear by month 12.
  - risk: Incumbent gateways, cloud platforms, or open-source tools add parity and contract-routing features quickly.
    likelihood: High
    impact: High
    mitigation: Differentiate with workflow-specific parity datasets, audit packaging, and integration above incumbent stacks instead of competing on basic proxy features.
  - risk: Workflow differences across clouds make promised portability too inconsistent for production trust.
    likelihood: Medium
    impact: High
    mitigation: Start with constrained workflow templates, explicit acceptance thresholds, and capability-aware fallback rather than broad portability claims.
  - risk: Pilot deployments turn into custom services engagements with poor gross margin and slow learning loops.
    likelihood: Medium
    impact: Medium
    mitigation: Productize pilots, cap custom work, and reject customer requests that require application redesign rather than control-plane logic.
  - risk: Buyers expect portability controls to be bundled into an existing gateway, cloud contract, or services engagement.
    likelihood: Medium
    impact: High
    mitigation: Anchor pricing to protected revenue and procurement acceleration, and test white-label or channel packaging if standalone willingness to pay is weak.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: Build the core engineering and solutions team, complete 3-5 paid pilots, prove production retention and expansion in the narrow beachhead, and generate enough parity and routing data to justify a broader platform roadmap.
