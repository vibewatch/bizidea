scenarios:
  downside:
    description: Slower portability-trigger frequency and weaker pilot conversion keep the company in a services-heavy proof phase.
    y3RevenueK: 1485.0
    y3EbitdaK: -1042.0
    cashLowPointK: -286.0
    keyAssumptionChanges:
      - Customer adds fall from 18 to 13 by Q4Y3.
      - Y3 blended monthly revenue per line stays at 10.5K instead of 12.0K.
      - Gross margin tops out at 67% instead of 72%.
  base:
    description: Founder-led sales converts a narrow but real pain wedge into 18 governed product lines by Q4Y3 without aggressive hiring.
    y3RevenueK: 2142.0
    y3EbitdaK: -718.3
    cashLowPointK: 235.7
    keyAssumptionChanges:
      - 5 paying lines by M12, 11 by Q4Y2, and 18 by Q4Y3.
      - Blended monthly revenue per active line rises from 10.0K in Y1 to 12.0K in Y3.
      - Gross margin improves from 68% in Y1 to 72% in Y3.
  upside:
    description: Deal-trigger frequency proves stronger than expected and early accounts expand into second workflows faster.
    y3RevenueK: 2820.0
    y3EbitdaK: -358.0
    cashLowPointK: 512.0
    keyAssumptionChanges:
      - Customer count reaches 22 lines by Q4Y3.
      - Y3 blended monthly revenue per line reaches 12.8K through usage and second-line expansion.
      - Gross margin reaches 75% as onboarding becomes more standardized.
sensitivity:
  - variable: ARPU
    downsideCase: Y3 blended monthly revenue per line holds at 10.5K.
    baseCase: Y3 blended monthly revenue per line reaches 12.0K.
    upsideCase: Y3 blended monthly revenue per line reaches 12.8K.
    y3RevenueImpactK: -315.0
    cashImpactK: -227.0
  - variable: CAC
    downsideCase: CAC rises to 85K because sales cycles need more founder and solutions time.
    baseCase: CAC is 65K.
    upsideCase: CAC falls to 50K through partner referrals and repeatable pilot packaging.
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
  - variable: churn
    downsideCase: Monthly churn is 2.0% because portability need is episodic.
    baseCase: Monthly churn is 1.25%.
    upsideCase: Monthly churn is 0.8% with strong expansion inside product portfolios.
    y3RevenueImpactK: -180.0
    cashImpactK: -135.0
  - variable: sales cycle
    downsideCase: Pilot close cycle stretches from 4 months to 6 months.
    baseCase: Portability-triggered deals close in about 4 months.
    upsideCase: Design-partner references cut cycle to 3 months.
    y3RevenueImpactK: -252.0
    cashImpactK: -190.0
  - variable: gross margin
    downsideCase: Gross margin peaks at 67% because support remains manual.
    baseCase: Gross margin reaches 72%.
    upsideCase: Gross margin reaches 75%.
    y3RevenueImpactK: 0.0
    cashImpactK: -107.0
  - variable: hiring pace
    downsideCase: Hiring stays on plan even if revenue slips.
    baseCase: Hiring follows the current conservative ramp.
    upsideCase: One eng and one GTM hire are delayed by two quarters unless conversion stays on plan.
    y3RevenueImpactK: 0.0
    cashImpactK: 165.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> QualifiedOpps
      QualifiedOpps --> Pilots
      Pilots --> ProductionContracts
      ProductionContracts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes mostly from growing governed product lines from 5 in Y1 to 18 in Q4Y3 while blended line value rises from $10K to $12K monthly.
  - checkName: Must go right
    finding: The company must repeatedly convert blocked portability requests into paid pilots fast enough to justify founder-led CAC of roughly $65K.
  - checkName: Model breaks if
    finding: The downside case goes cash-negative if sales cycles stretch and ARPU stalls because the narrow wedge does not support the planned hiring base.
  - checkName: Next-round proof
    finding: The next financing is justified when pilots convert into production, the product works above an incumbent gateway, and the company shows credible expansion toward 8-10 governed lines.
sanityChecks:
  ruleOf40: Y3 growth 126.6% + EBITDA margin -33.5% = 93.1%
  burnMultiple: Y3 burn multiple 0.6x based on $718.3K burn over $1.197M net new revenue versus Y2.
  revenuePerFte: $175K Y3 based on $2.142M revenue over 12.25 average FTE (below mature SaaS benchmark $200-400K).
  flags:
    - Base case still ends Y3 with only $235.7K cash, so a new round likely needs to start fundraising before Q4Y3.
    - Revenue per FTE remains light because the wedge still carries implementation and parity-work burden.
    - The model assumes incumbents do not bundle parity evidence and contract-routing deeply enough to compress pricing before the startup earns reference accounts.
    - Y2 customer count slightly exceeds the BP 8-10 line milestone, so execution has limited room for slip.
