competitors:
- name: Portkey
  stage: scale-up
  wedge: Enterprise AI gateway with observability, governance, budgets, and access control across providers.
  pricing: Sales-led / enterprise-oriented; public page emphasizes enterprise evaluation and testimonials rather than transparent self-serve tiers.
  strength: Strong enterprise packaging around access, budgets, and multi-provider governance.
  weaknessVsUs: Still marketed as a horizontal AI operations stack, not a contract-aware OpenAI portability layer for one SaaS feature across clouds.
  sourceRefs:
  - 26
  - 27
  - 38
- name: LiteLLM
  stage: open-source
  wedge: OpenAI-compatible proxy spanning 100+ models with routing, passthrough, budgets, and multi-tenancy.
  pricing: Open-source default with enterprise upsell; strong self-hosted option.
  strength: Developer adoption, breadth of provider support, and extensibility make it the default build-vs-buy baseline.
  weaknessVsUs: Requires the buyer to own enterprise QA, contract mapping, and procurement evidence; closest to a toolkit, not a finished portability product.
  sourceRefs:
  - 21
  - 22
  - 23
- name: Helicone
  stage: scale-up
  wedge: AI gateway plus observability with provider routing and OpenAI-compatible access to 100+ models.
  pricing: Pro $79/month, Team $799/month, Enterprise custom.
  strength: Clear provider-routing story and public pricing that make it easy to trial.
  weaknessVsUs: Center of gravity is routing and analytics; less evidence of deep tenant-contract parity workflows for SaaS vendors.
  sourceRefs:
  - 24
  - 25
- name: Cloudflare AI Gateway
  stage: incumbent platform
  wedge: Network-edge AI gateway with routing, BYOK, DLP, caching, unified billing, and provider connectors.
  pricing: Free core features today; premium features layered over plan limits and broader Cloudflare account economics.
  strength: Distribution, security posture, and fast feature velocity make it the most credible horizontal platform threat.
  weaknessVsUs: Optimizes traffic management, not application-specific parity evidence or contract-aware product rollout logic.
  sourceRefs:
  - 16
  - 17
  - 18
  - 19
  - 20
  - 36
  - 39
