openQuestions:
- How many design-partner prospects have a live Azure OpenAI feature and a current non-Azure customer demand, rather than a hypothetical future ask?
- Will buyers pay a standalone control-plane budget, or do they expect this functionality to sit inside an existing gateway or cloud contract?
- 'What minimum parity artifact convinces procurement: output-diff reports, routing logs, model-support matrices, or a deployment attestation package?'
- Can the product reliably sit above existing gateways like LiteLLM or Cloudflare, or will buyers force a rip-and-replace architecture decision too early?
