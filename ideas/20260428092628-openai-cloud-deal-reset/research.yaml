    - 7
    - 37
  - point: Integration-led distribution through existing gateway and SDK ecosystems can create pull once buyers already standardize on gateway-compatible tooling.
    sourceRefs:
    - 16
    - 17
    - 21
    - 24
  partnershipEcosystem:
  - point: Azure and AWS implementation partners can surface portability pain when customers request specific cloud alignment during security or architecture review.
    sourceRefs:
    - 7
    - 15
  - point: Gateway and developer-tool ecosystems are practical integration partners because buyers already expect OpenAI-compatible endpoints and SDK support.
    sourceRefs:
    - 16
