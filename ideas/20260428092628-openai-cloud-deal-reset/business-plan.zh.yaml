slug: model-portability-control-plane
date: "2026-04-28"
executiveSummary: >-
  Model Portability Control Plane 应该以一家聚焦且狭窄的企业基础设施公司形态启动，服务对象是那些已经把 Azure OpenAI 功能正式上线、如今又面临客户要求其在 AWS 或直连 OpenAI 上做到一致交付的 SaaS 厂商。催化因素既具体又新近发生：OpenAI 现在可以在任何云上提供产品，而 Azure 仍保有优先权，除非它无法支持某项能力，这让云选择立刻从后台技术选型变成产品与采购问题。第一版产品不该做成通用 LLM 网关，因为 Cloudflare、LiteLLM、Helicone 和 Portkey 已经覆盖了这层的大部分能力。相反，v1 应该抓住具备合同感知能力的一致性测试、租户路由、能力感知型故障切换，以及围绕单个面向客户的 AI 工作流所需的审计证据。最强的购买触发点是保收入，比如一笔被卡住的《财富》 100 交易、续约风险，或要求非 Azure 部署路径的安全审查。研究表明痛点真实，但初始市场也很窄：美国 200-999 人的软件出版商滩头市场估计约 412 家，第 3 年可触达的 SOM 约为 $2.2M，因此公司必须在验证切口成立后，扩展到更广的模型合同编排。最有力的反证风险在于，买家可能靠现成网关、兼容 OpenAI 的 SDK 和内部功能开关，就能自己拼出 v1 的大部分能力。来源集里第三方部署证据仍然有限，所以这项计划应以重证据的 pre-seed 尝试推进，并设定清晰的停止标准，围绕交易触发频率、试点转化率和付费意愿做判断。
problem:
  - 已在 Azure 上推出 AI 功能的企业 SaaS 厂商，如今要面对客户按合同提出的要求：同一个工作流必须能在 AWS 或直连 OpenAI 上交付，而且不能因此分叉产品。
  - Azure、与 AWS 相连的路径以及直连 OpenAI 在配额、安全行为、区域和能力发布时间上都不一样，所以简单的 API 标准化并不能保住产品层的一致体验。
  - 自研抽象层和横向网关仍然把一致性测试、租户路由以及可供采购审阅的审计打包工作留给团队自己完成。
solution:
  - 提供一个控制平面，在统一的应用 API 背后，把同一个面向客户的 OpenAI 功能映射到 Azure、直连 OpenAI 和选定的 AWS 相关路径。
  - 在发布前运行跨云一致性评测，把能力缺口、时延差异、安全行为变化和不受支持的配置提前亮出来，避免客户上线后才踩坑。
  - 运行时按合同、地域和功能可用性为每个租户做路由，同时记录云路径、模型、策略和故障切换决策的完整审计轨迹。
whyWeWin:
  - 这个切口压在通用网关基础设施之上，正好卡在 SaaS 厂商最容易丢收入的位置：如何在不同云约束下交付同一个已签约功能。
  - 跨云一致性结果的专有语料，加上租户级路由历史，可以沉淀成默认不会被开源代理自动生成的黏性实施数据。
  - 把销售锚在被卡住的交易与续约上，比向仍在内部试验的团队兜售通用路由或可观测性，更容易讲清 ROI。
strategicChoices:
  beachhead: 200-1,000 人规模的 Series B+ B2B SaaS 厂商；它们在 2025-2026 年推出了基于 Azure OpenAI 的 copilot，如今至少有一位企业客户或潜在客户要求其在 AWS 或直连 OpenAI 上做到部署一致。
  wedgeRationale: >-
    这个滩头市场与研究里的首个客户画像完全对齐，经济买家也很明确，而且紧迫性都集中在一个已经出货、并与真实收入事件挂钩的工作流上。与其面向所有多模型基础设施团队撒网，不如先抓住这类场景，因为这里的痛点不是抽象的开发者便利，而是一笔交易或续约如果没有办法在不重写的前提下重部署同一个功能，就会直接出问题。
  sequencingRationale: >-
    产品应该先做一致性测试、租户路由和审计证据，因为这些正是关闭一笔由可移植性驱动的企业需求所必需的最小交付物。GTM 应从创始人主导销售切入，先拿下少量以 Azure 为锚点的 SaaS 厂商和设计伙伴；等到有生产级案例，再补上网关、云架构和安全审查伙伴。招聘节奏也应跟着这个顺序走：先核心工程，再解决方案支持，只有当试点到生产的转化变得可重复后，才扩大产品或合作岗位。
  notYet:
    - 面向任意提供商组合的通用多模型网关
    - 企业内部员工 copilot 部署
    - 面向 SMB 的自助式导入
    - 超出初始云路径范围的广义主权云或本地 AI 编排
market:
  tam: "$89.0M 的美国 TAM 估算，基于约 412 家 200-999 人的软件出版商、每家公司 1.8 条面向客户的 AI 功能线，以及每条功能线每年约 $120k 的控制平面支出。"
  sam: "$21.6M 的近期开拓 SAM，基于同一滩头市场，但只统计那些正在积极商业化面向客户 AI 的公司，假设每家活跃公司约 1.5 条功能线、每年支出约 $100k。"
  som: "$2.2M 的第 3 年 SOM，基于创始人主导的企业销售路径下，大约 18 条产品线、每条约 $120k ARR。"
  segments:
    - 向《财富》 2000 客户销售面向客户 AI 工作流、并以 Azure 为锚点的企业 SaaS 厂商
    - 已经使用网关，但仍然需要具备合同感知能力的可移植性证据的更大软件厂商与平台团队
  buyingProcess: >-
    评估通常从 AI 平台负责人、资深平台工程师或 ML 基础设施负责人开始，触发点往往是一家战略客户要求提供非 Azure 路径，或 Azure 无法及时支持某项关键能力。预算和生产批准通常还需要工程副总裁、CTO 或 CPO 背书，并经历安全、采购和架构审查，这些环节会要求看到一致性证明、路由控制和可审计性。
product:
  mvp: >-
    MVP 应包含 Azure OpenAI、直连 OpenAI 和一条 AWS 相关路径的提供商适配器；一个按合同、区域和能力进行租户路由的策略引擎；针对目标工作流的一致性评测；以及带部署证明输出的审计日志。它应该叠在应用现有功能代码之上，而不是从零重做一套完整的横向网关。
  sixMonth: 在 6 个月内交付 2 个付费试点和 1 个生产部署，内容包括一致性报告、路由策略、审计导出，并证明产品至少可以叠在一个设计伙伴已在使用的网关或代理之上。
  twelveMonth: 增加能力与区域矩阵、发布控制、成本与配额护栏、常见 SaaS copilot 的可复用评测模板，并更深入地接入网关生态，而不是强迫客户做 rip-and-replace。
  twentyFourMonth: 扩展到更广的模型合同编排层，支持更多提供商、谈判与合规证据包、策略基准，以及面向大型 SaaS 平台的多工作流治理。
  keyBets:
    - 买家首先愿意为一致性证明和租户路由付费，而不是为通用 API 标准化买单。
    - 产品能叠在现有网关基础设施之上，避免一场昂贵的架构替换销售。
    - 云之间的输出和策略差异虽然存在，但仍在可控范围内，因此买家依然认可“受控可移植性”的价值。
    - 在横向网关上移之前，跨云一致性数据集能先成为可防御资产。
gtm:
  wedge: 先卖一个针对单个已上线 OpenAI 功能的可移植控制平面；这个功能已经在卡住或威胁一笔具体企业交易。拿下后，再在同一账户中扩展到更多产品线和合同。
  channels:
    - 面向以 Azure 为锚点的 SaaS 厂商，由创始人主导外呼工程副总裁、CTO 和 AI 平台负责人
    - 来自云架构师、迁移咨询公司和参与多云重构的安全审查伙伴的转介绍
    - 通过 Cloudflare 或 LiteLLM 等网关与 SDK 生态形成的集成拉动
  funnelTargets: "目标账户到合格可移植机会 15-25%，合格机会到付费试点 25%+，试点到生产 50%+，生产账户到第二条功能线 12 个月内达到 50%+。"
  pricing: 每条产品线每年收取平台费，并附加路由使用费和一致性评测费，起步约为 $60k-$150k ARR，因为价值不是按座席计，而是随所保护的企业收入、部署复杂度和受治理的租户合同数量增长。
businessModel:
  revenueStreams:
    - 面向可移植控制平面、策略引擎和审计工作流的年度订阅
    - 按路由生产流量和一致性评测次数收取的使用费
    - 面向重采购流程企业交易的高级合规与部署证据包
    - 设计伙伴部署阶段的早期实施与解决方案服务
  unitOfValue: 在受治理的多云部署下运行的一条面向客户的 AI 功能线
  targetGrossMarginPct: 70
  expansionLevers:
    - 在现有 SaaS 产品组合中加入更多 AI 功能线
    - 扩大受治理的租户合同数和生产流量规模
    - 增销合规证据、成本控制和基准测试模块
    - 从 OpenAI 可移植性扩展到更广的跨提供商模型合同编排
strategyMap:
  northStarMetric: 在没有云特定代码分叉的前提下，通过受治理的可移植 AI 功能服务的月度生产租户合同数
  inputMetrics:
    - 合格的可移植性触发机会数量
    - 付费试点转化率
    - 试点到生产的转化率
    - 上线前完成一致性报告的版本占比
    - 受支持工作流上的运行时故障切换成功率
    - 按产品线统计的净收入留存
  moatsToBuild:
    - 与真实客户工作流和验收阈值绑定的跨云一致性数据集
    - 嵌入采购与续约流程的租户合同路由历史和审计证据
    - 面向常见 SaaS copilot 模式的深度适配器与发布模板
    - 能叠在现有网关之上，而不是只在代理层商品功能上竞争的集成姿态
  killCriteria:
    - 前 15 个目标账户里，确认存在当前或近期、且与真实交易或续约相关的非 Azure 可移植需求的少于 4 家。
    - 创始人主导销售的前 9 个月里，付费试点少于 3 个。
    - 在完成 5 个付费试点后，试点到生产的转化率仍低于 40%。
    - 超过一半的设计伙伴部署都要求替换现有网关，而不是叠加集成。
  mermaid: |
    flowchart LR
      Wedge[被卡住的企业可移植性需求] --> MVP[一致性测试加租户路由 MVP]
      MVP --> Proof[付费试点与生产级一致性证明]
      Proof --> Expansion[更广的模型合同编排]
investorMemo:
  verdict:
    call: Watch
    conviction: 时点和客户痛点都很清晰，但滩头市场偏窄，而且横向替代品很可能在可持续定价被证明前就吸收掉 v1 的大部分价值。
    whyBelieve: 合作关系重置为那些以 Azure 为锚点、又向大型企业销售的 SaaS 厂商，制造了一个明确的新部署问题，而且这个问题会触发带预算的保收入型采购。
    whyDoubt: 在公司证明一致性证据和租户路由值得单列预算之前，现成网关、SDK 可移植性和内部平台团队很可能已经够用。
    nextDiligence: 确认至少有两笔当前被卡住或延迟的企业交易，买家愿意现在就为可移植性工件付费，而不是等待内部自研或网关扩展。
  firstCustomer:
    title: 以 Azure 为先的企业 SaaS 厂商中的 AI 平台负责人
    profile: 一家 200-1,000 人的 SaaS 公司，拥有已经上线的面向客户 copilot、1-3 条使用 OpenAI 的产品线，并且正承受来自《财富》 2000 买家的云特定部署压力。
    trigger: 一位战略级潜在客户或续约客户要求 AWS 或直连 OpenAI 的部署一致性，或者 Azure 无法在交易时间表内支持所需能力或区域。
    buyer: 工程副总裁
    initialContract: "$20k-40k 的 8-12 周付费试点；一旦单个签约工作流正式进生产，再转为每条产品线约 $60k-150k ARR 加使用费。"
  mustBeTrue:
    - 每 3 个合格目标账户里，至少有 1 个报告近期发生过由可移植性导致的交易延迟、安全审查或续约风险。
    - 买家在预算排序时，必须把一致性评测和租户路由排在通用网关功能之前。
    - 至少一半的付费试点必须在 6 个月内转成生产部署。
    - 大多数部署里，产品必须能叠在现有网关或内部抽象层之上，而不是要求完全替换。
    - 早期客户必须在 12 个月内从一个工作流扩展到至少一个额外的合同、租户分层或功能线。
  diligenceQuestions:
    - 现在有多少潜在客户今天就拥有已上线的 Azure OpenAI 功能，并且正面对真实的非 Azure 客户需求？
    - 对买家来说，最先能打开预算的是哪种工件：一致性报告、路由策略引擎，还是采购证明包？
    - 云之间输出差异要大到什么程度，客户才会认为“可移植性”这个承诺已经失效？
    - 在真实部署里，这家创业公司能否叠在 Cloudflare、LiteLLM、Helicone 或 Portkey 之上，而不会带来不可接受的时延或支持负担？
    - 如果一家云服务商或横向网关在 12 个月内打包了同样的一致性与合同路由层，会发生什么？
  riskHeatmap:
    - risk: 初始市场需求过于零散，因为只有少数 SaaS 厂商正在承受即时的非 Azure 可移植压力。
      likelihood: Medium
      impact: High
      leadingIndicator: 前 15 个目标账户里，少于 4 家识别出当前与可移植痛点相关的交易或续约事件。
      mitigation: 把外呼重点放在已经卖进《财富》 2000 的厂商身上，并把被卡账户的证据设成硬性筛选门槛。
    - risk: 横向网关和开源代理会让 v1 看起来像一个商品化扩展。
      likelihood: High
      impact: High
      leadingIndicator: 发现阶段的对话不断滑向与 Cloudflare、LiteLLM、Helicone 或 Portkey 的价格比较，而不是围绕一致性和合同工作流展开。
      mitigation: 把定位放在代理层之上，与现有网关集成，并在演示里先展示一致性证据和租户合同工作流。
    - risk: 云之间的技术差异会让关键工作流上的可移植性变得不可靠。
      likelihood: Medium
      impact: High
      leadingIndicator: 超过 20% 的试点工作流测试无法通过约定的一致性阈值，或必须引入不受支持的云特例。
      mitigation: 把 v1 限制在受支持的工作流模板内，尽早公开能力边界，并出售带明确回退行为的“受控可移植性”。
    - risk: 销售最终会变成高度服务化，因为每个部署都需要大量定制。
      likelihood: Medium
      impact: Medium
      leadingIndicator: 实施和定制工程消耗超过试点收入的 25%，或让生产上线时间拖过 90 天。
      mitigation: 标准化适配器、发布模板和采购证据包，并拒绝那些需要重做应用本身而非控制平面逻辑的工作流。
operatingAssumptions:
  - assumption: 最高效的切入点，是一家已经把 Azure OpenAI 功能上线、且当前正面对企业可移植性需求的 SaaS 厂商。
    basis: idea.yaml
    validationTest: 在前 15 次目标账户访谈中，至少有 5 家符合这一画像，并明确表示这是正在发生而不是假设中的问题。
    decisionImpact: 如果不成立，就需要按垂直行业或触发事件进一步收窄 ICP，再决定是否扩大产品覆盖面。
  - assumption: 当购买与保住收入直接挂钩时，买家愿意把一致性测试和租户路由作为单独预算项来买单。
    basis: research.yaml
    validationTest: 至少把 3 个合格机会转成单笔金额 $20k+ 的付费试点，而且不依赖把产品塞进更大的服务型 SOW 中。
    decisionImpact: 如果不成立，就要把产品重定位成现有网关里的附加模块，或转向渠道白标分发。
  - assumption: 在多数客户环境里，产品都能叠在现有网关或内部抽象层之上。
    basis: research.yaml
    validationTest: 完成 2 个设计伙伴实施，且创业公司均叠在现有网关或代理之上，同时控制好时延和支持成本。
    decisionImpact: 如果不成立，获客会明显变慢，路线图必须收缩到更少、也更强约束的参考架构。
  - assumption: 云之间的行为差异足以制造痛点，但又没有大到无法建立可重复的一致性阈值。
    basis: operator judgment
    validationTest: 在 3-5 个真实工作流上，基于客户明确批准的质量、时延和安全阈值，让一致性通过率保持在 80% 以上。
    decisionImpact: 如果不成立，就要把定位从“可移植性”转向“可见性与审计工具”。
  - assumption: 在拿下前 6-10 个客户后，公司可以从 OpenAI 可移植性扩展成更广义的模型合同编排平台。
    basis: idea.yaml
    validationTest: 到第 12 个月时，至少一半活跃客户主动提出需要相邻控制项，比如成本治理、更广的提供商支持，或更多受治理工作流。
    decisionImpact: 如果不成立，公司就会停留在小众控制层，融资需求也应相应下调。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 15 位已经上线 Azure OpenAI 功能的 SaaS 平台负责人，记录最近因云选择要求而被卡住的交易、续约或安全审查。
    hypothesis: 可移植性痛点集中在一小批但可以触达的厂商身上，而且都有真实的收入触发因素。
    successMetric: 至少 5 个目标账户报告当前或近期发生过由可移植性驱动的商业事件，且其中 3 家同意进入技术跟进。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 围绕一个真实客户需求，做问题优先级排序访谈，比较一致性报告、租户路由、采购证据和通用故障切换的预算优先级。
    hypothesis: 买家会先为一致性和合同路由工件买单，而不是为另一个横向网关买单。
    successMetric: 在 12 位合格买家中，至少 8 位把“一致性 + 路由”排进前两名最值得预算的交付物。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 做一个设计伙伴原型，把一条生产工作流同时跑在 Azure OpenAI 和直连 OpenAI 上，并附带审计日志与手工路由规则。
    hypothesis: 一个足够窄的原型，就能在不替换客户现有网关栈的前提下证明差异化价值。
    successMetric: 1 家设计伙伴完成测试流量，并确认至少 3 个可执行的一致性或能力差距。
    owner: 创始工程师
  - horizon: 3–6 个月
    experiment: 推出 2 个付费试点，打包内容固定为一致性评测、路由策略配置和部署证明输出。
    hypothesis: 产品化试点范围会比定制咨询更快转化。
    successMetric: 2 个付费试点顺利启动，且每个实施都能在 45 天内完成。
    owner: 解决方案工程师
  - horizon: 6–12 个月
    experiment: 分别叠在一个现有网关环境和一个内部抽象环境之上，测试架构灵活性。
    hypothesis: 创业公司能以编排层身份胜出，而不是只能作为基础设施替换方案出售。
    successMetric: 完成 2 个具备生产能力的集成，不要求 rip-and-replace，且额外时延不超过 10%。
    owner: 创始工程师
  - horizon: 6–12 个月
    experiment: 在首个生产客户里测试账户扩张，新增第二条功能线或新的租户分层。
    hypothesis: 一旦第一条工作流跑通，相邻产品线和合同自然就是下一步增购路径。
    successMetric: 1 个生产客户在正式上线后 6 个月内，扩展到第二条受治理工作流或新的合同分层。
    owner: 产品负责人
operations:
  - 维护一套发布就绪流程，要求每次生产上线前都完成一致性评测、能力矩阵复核和客户特定路由审批。
  - 把租户合同元数据、路由决策和故障切换事件写进可供采购和续约审查的审计日志。
  - 使用设计伙伴实施手册，把适配器、数据边界和成功标准标准化，从而把试点周期压到 45 天内。
  - 每周监控 Azure、直连 OpenAI 和受支持 AWS 相关路径上的配额、区域支持与能力变化。
  - 尽早准备安全与隐私文档，因为云路径声明与审计证据本身就是产品的一部分，而不只是销售材料。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 负责搭建提供商适配器、一致性评测基础设施和策略引擎，决定产品究竟是不是一个不止于薄代理的真正产品。
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 负责创始人主导销售、设计伙伴发现，以及把被卡住的交易痛点翻译成可重复的切口叙事。
  - role: 解决方案工程师
    startTiming: Month 3
    rationale: 缩短试点部署周期，支持叠在现有栈之上的集成，并把实施模式沉淀成可产品化能力。
  - role: 产品负责人
    startTiming: Month 6
    rationale: 把设计伙伴的学习转成可重复的工作流模板、采购工件和扩展模块。
  - role: 合作负责人
    startTiming: Month 9
    rationale: 在初步生产证明出现后，发展来自云架构师、网关生态和安全审查伙伴的转介绍与集成渠道。
milestones:
  - horizon: 0–12 个月
    items:
      - 验证至少 5 个合格目标账户确实存在由可移植性触发的痛点。
      - 在 1 条真实工作流上完成 Azure OpenAI 与直连 OpenAI 的原型。
      - 启动 3 个付费试点，并至少把其中 2 个转成生产。
      - 证明产品至少能叠在一个现有网关或内部抽象层之上。
      - 发布一套可重复的部署证明与审计包，并至少在 1 次企业审查中实际使用。
  - horizon: 12–24 个月
    items:
      - 把生产覆盖扩大到 8-10 条在管产品线。
      - 增加 AWS 相关生产路径支持、能力矩阵以及成本或配额护栏。
      - 至少赢下 3 个客户，让其从初始工作流扩展到更多合同或功能线。
      - 建立一个小型合作渠道，在不过度依赖定制服务的情况下持续产出合格可移植机会。
  - horizon: 24–36 个月
    items:
      - 从 OpenAI 可移植性拓展到多提供商模型合同编排层。
      - 推出基于累积一致性和路由数据构建的基准测试与策略模块。
      - 在多个地理区域建立可供引用的企业部署案例，并拥有文档化的审计与路由控制。
      - 根据留存和扩张数据，决定是继续放大成更广平台，还是维持为聚焦控制层。
risks:
  - risk: 初始市场太窄，如果不能很快跳出滩头市场，就不足以支撑风险投资式增长。
    likelihood: High
    impact: High
    mitigation: 把滩头市场视作证明切口，尽早验证扩张请求；如果到第 12 个月还看不到跨提供商编排需求，就立即压缩开支。
  - risk: 现有网关、云平台或开源工具会很快补上一致性与合同路由能力。
    likelihood: High
    impact: High
    mitigation: 通过工作流级一致性数据集、审计打包能力以及叠在现有栈之上的集成方式拉开差异，而不是在基础代理功能上正面竞争。
  - risk: 云之间的工作流差异太大，导致承诺中的可移植性无法建立生产级信任。
    likelihood: Medium
    impact: High
    mitigation: 从受约束的工作流模板切入，定义清楚验收阈值，并提供能力感知型回退，而不是泛化地承诺全场景可移植。
  - risk: 试点部署最终演变成高定制、低毛利、学习循环很慢的服务项目。
    likelihood: Medium
    impact: Medium
    mitigation: 把试点产品化、限制定制范围，并拒绝那些需要重做应用设计而不是控制平面逻辑的客户需求。
  - risk: 买家期待这类可移植控制直接被打包进现有网关、云合同或服务项目里。
    likelihood: Medium
    impact: High
    mitigation: 把定价锚在保住的收入和采购提速上；如果独立付费意愿偏弱，就测试白标或渠道打包路径。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 用这笔钱搭起核心工程和解决方案团队，完成 3-5 个付费试点，在狭窄滩头市场里证明生产留存和扩张能力，并沉淀足够多的一致性与路由数据，为更广的平台路线图做支撑。