slug: model-portability-control-plane
date: '2026-04-28'
currency: USD
modelStartMonth: '2026-05'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-05'
    unit: month
    source: '[BP date and team startTiming Month 0]'
  - id: A2
    name: pre-seed 融资在模型起始时完成
    value: '2400'
    unit: USDK
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M；基准情景使用 $2.4M 来支持关键里程碑并留出缓冲]'
  - id: A3
    name: 初始客户数（M1）
    value: '0'
    unit: count
    source: '[BP executiveSummary and product stage: pre-revenue prototype / design-partner stage]'
  - id: A4
    name: Y1 每条活跃产品线的月度混合收入
    value: '10.0'
    unit: USDK per month
    source: '[BP pricing $60k-$150k ARR plus usage；BP firstCustomer pilot $20k-$40k over 8-12 weeks；保守混合启发式]'
  - id: A5
    name: Y2 每条活跃产品线的月度混合收入
    value: '10.5'
    unit: USDK per month
    source: '[BP pricing and expansionLevers；试点后温和扩展的启发式假设]'
  - id: A6
    name: Y3 每条活跃产品线的月度混合收入
    value: '12.0'
    unit: USDK per month
    source: '[BP pricing $60k-$150k ARR plus usage and research SOM of ~$120k ARR per line；假设存在适度使用量与第二条产品线扩展]'
  - id: A7
    name: Y1 客户增长节奏
    value: 'M12 时达到 5 条付费产品线'
    unit: count
    source: '[BP 0-12 month milestone: 3 paid pilots and at least 2 production conversions]'
  - id: A8
    name: Y2 客户增长节奏
    value: 'Q4Y2 时达到 11 条付费产品线'
    unit: count
    source: '[BP 12-24 month milestone: 8-10 product lines under management；基准情景假设来自 Y1 后期转化和一次早期扩展的轻微上行]'
  - id: A9
    name: Y3 客户增长节奏
    value: 'Q4Y3 时达到 18 条付费产品线'
    unit: count
    source: '[Research market.som: 18 product lines at roughly $120k ARR each]'
  - id: A10
    name: Y1 COGS 比率
    value: '32%'
    unit: percent of revenue
    source: '[BP targetGrossMarginPct 70；创业公司财务启发式：早期基础设施产品在上线和云成本效率较低时通常低于目标毛利]'
  - id: A11
    name: Y2 COGS 比率
    value: '30%'
    unit: percent of revenue
    source: '[BP targetGrossMarginPct 70；渐进式规模效率启发式]'
  - id: A12
    name: Y3 COGS 比率
    value: '28%'
    unit: percent of revenue
    source: '[BP targetGrossMarginPct 70；较成熟但仍偏早期的基础设施启发式，对应约 72% GM]'
  - id: A13
    name: 创始人 CEO 年现金薪酬
    value: '120'
    unit: USDK per year
    source: '[创业公司财务启发式：种子期创始人现金薪酬低于市场水平]'
  - id: A14
    name: 工程岗位年现金薪酬
    value: '180'
    unit: USDK per FTE per year
    source: '[美国早期基础设施创业公司资深工程师的创业公司财务启发式]'
  - id: A15
    name: 解决方案工程师年现金薪酬
    value: '150'
    unit: USDK per FTE per year
    source: '[技术型售后 / 实施岗位的创业公司财务启发式]'
  - id: A16
    name: 产品负责人年现金薪酬
    value: '170'
    unit: USDK per FTE per year
    source: '[seed/pre-seed 首位产品岗位的创业公司财务启发式]'
  - id: A17
    name: 销售或合作伙伴岗位年现金薪酬
    value: '160'
    unit: USDK per FTE per year
    source: '[首位企业 GTM 岗位的创业公司财务启发式，初始可变薪酬占比较低]'
  - id: A18
    name: G&A / 运营岗位年现金薪酬
    value: '110'
    unit: USDK per FTE per year
    source: '[精简运营岗位的创业公司财务启发式]'
  - id: A19
    name: 基础人员扩张节奏
    value: 'Q1Y1 2 FTE, Q2Y1 3, Q3Y1 5, Q4Y1 6, Q4Y2 11, Q4Y3 13'
    unit: FTE
    source: '[BP team startTiming for founder, founding eng, solutions engineer, product lead, partnerships lead + conservative hiring heuristic for Y2-Y3]'
  - id: A20
    name: Y1 非薪酬 opex 计划
    value: 'M1-M3: R&D tools 5K/mo, S&M 2K/mo, G&A overhead 6K/mo; M4-M6 adds pilot/admin support; M7-M12 adds modest GTM programs'
    unit: USDK per month
    source: '[以 BP founder-led sales 和强验证试点推进为锚点的创业公司财务启发式]'
  - id: A21
    name: Y2-Y3 非薪酬 opex 计划
    value: 'Y2 quarterly adders 54K, 57K, 60K, 66K; Y3 quarterly adders 69K, 72K, 78K, 84K'
    unit: USDK per quarter
    source: '[随 headcount 与企业销售增长的软件、差旅、法务、安全和 GTM 工具的创业公司财务启发式]'
  - id: A22
    name: 稳态 CAC
    value: '65'
    unit: USDK per new customer
    source: '[BP founder-led enterprise motion；早期企业基础设施销售的创业公司财务启发式]'
  - id: A23
    name: 稳态月流失率
    value: '1.25%'
    unit: percent
    source: '[采用年合约但留存尚未验证的早期企业基础设施产品之创业公司财务启发式]'
  - id: A24
    name: 现金转换简化假设
    value: 'EBITDA 近似等于现金变动'
    unit: policy
    source: '[建模启发式：在 pre-seed 基准情景中，不建模债务、capex 或显著营运资本波动]'
  - id: A25
    name: 融资里程碑定义
    value: '通过 3 个付费试点、2 个生产部署、1 个现有网关集成，并具备走向 8-10 条纳管产品线的明确路径，达到可重复、可进入 seed 的证明'
    unit: milestone
    source: '[BP milestones 0-12 months and 12-24 months]'
