scenarios:
  downside:
    description: 可移植性触发频率更慢、试点转化更弱，公司会被困在偏服务化、以验证为主的阶段。
    y3RevenueK: 1485.0
    y3EbitdaK: -1042.0
    cashLowPointK: -286.0
    keyAssumptionChanges:
      - 到 Q4Y3 的客户新增从 18 条降到 13 条。
      - Y3 每条产品线的月度混合收入停在 10.5K，而不是 12.0K。
      - 毛利率最高只能到 67%，而不是 72%。
  base:
    description: 创始人主导销售把一个狭窄但真实的痛点切口，转成到 Q4Y3 共 18 条受治理产品线，而且没有激进扩招。
    y3RevenueK: 2142.0
    y3EbitdaK: -718.3
    cashLowPointK: 235.7
    keyAssumptionChanges:
      - 到 M12 有 5 条付费产品线，到 Q4Y2 有 11 条，到 Q4Y3 有 18 条。
      - 每条活跃产品线的月度混合收入从 Y1 的 10.0K 上升到 Y3 的 12.0K。
      - 毛利率从 Y1 的 68% 提升到 Y3 的 72%。
  upside:
    description: 交易触发频率比预期更强，且早期账户更快扩展到第二条工作流。
    y3RevenueK: 2820.0
    y3EbitdaK: -358.0
    cashLowPointK: 512.0
    keyAssumptionChanges:
      - 到 Q4Y3 客户数达到 22 条产品线。
      - 通过使用量扩张和第二条功能线增购，Y3 每条产品线的月度混合收入达到 12.8K。
      - 随着导入流程标准化，毛利率提升到 75%。
sensitivity:
  - variable: ARPU
    downsideCase: Y3 每条产品线的月度混合收入停在 10.5K。
    baseCase: Y3 每条产品线的月度混合收入达到 12.0K。
    upsideCase: Y3 每条产品线的月度混合收入达到 12.8K。
    y3RevenueImpactK: -315.0
    cashImpactK: -227.0
  - variable: CAC
    downsideCase: CAC 升到 85K，因为销售周期需要更多创始人和解决方案团队投入。
    baseCase: CAC 为 65K。
    upsideCase: 通过合作伙伴转介绍和可重复的试点打包，CAC 降到 50K。
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
  - variable: churn
    downsideCase: 月流失率为 2.0%，因为可移植性需求过于事件驱动。
    baseCase: 月流失率为 1.25%。
    upsideCase: 在产品组合内部扩张顺利的情况下，月流失率降到 0.8%。
    y3RevenueImpactK: -180.0
    cashImpactK: -135.0
  - variable: sales cycle
    downsideCase: 试点成交周期从 4 个月拉长到 6 个月。
    baseCase: 由可移植性触发的交易大约在 4 个月内完成。
    upsideCase: 设计伙伴案例把周期缩短到 3 个月。
    y3RevenueImpactK: -252.0
    cashImpactK: -190.0
  - variable: gross margin
    downsideCase: 因支持仍然偏手工，毛利率最高只有 67%。
    baseCase: 毛利率达到 72%。
    upsideCase: 毛利率达到 75%。
    y3RevenueImpactK: 0.0
    cashImpactK: -107.0
  - variable: hiring pace
    downsideCase: 即便收入失速，招聘仍按计划推进。
    baseCase: 招聘遵循当前保守爬坡。
    upsideCase: 只要转化率没达标，就把 1 名工程和 1 名 GTM 招聘各延后两个季度。
    y3RevenueImpactK: 0.0
    cashImpactK: 165.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads --> QualifiedOpps
      QualifiedOpps --> Pilots
      Pilots --> ProductionContracts
      ProductionContracts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基础情景下，收入主要来自受治理产品线从 Y1 的 5 条增长到 Q4Y3 的 18 条，同时每条产品线的月价值从 $10K 提升到 $12K。
  - checkName: 必须做对的事
    finding: 公司必须足够稳定地把被卡住的可移植性需求转成付费试点，才能证明约 $65K 的创始人主导 CAC 是合理的。
  - checkName: 模型何时会失效
    finding: 如果销售周期拉长且 ARPU 停滞，下行情景会直接变成现金转负，因为这个狭窄切口撑不起计划中的招聘基线。
  - checkName: 下一轮融资证明
    finding: 当试点转成生产、产品能叠在现有网关之上、并且公司展示出向 8-10 条受治理产品线扩张的可信路径时，下一轮融资才真正站得住。
sanityChecks:
  ruleOf40: Y3 growth 126.6% + EBITDA margin -33.5% = 93.1%
  burnMultiple: Y3 burn multiple 0.6x based on $718.3K burn over $1.197M net new revenue versus Y2.
  revenuePerFte: $175K Y3 based on $2.142M revenue over 12.25 average FTE (below mature SaaS benchmark $200-400K).
  flags:
    - 基础情景到 Y3 结束时仍只剩 $235.7K 现金，因此公司大概率需要在 Q4Y3 之前启动下一轮融资。
    - 每名 FTE 对应收入仍然偏低，因为这个切口依旧带着实施和一致性工作负担。
    - 模型默认现有厂商不会在公司拿到标杆客户前，就把一致性证据与合同路由深度打包进产品里，从而压缩定价。
    - Y2 的客户数略高于 BP 里 8-10 条产品线的里程碑，所以执行层面几乎没有失误空间。