slug: model-portability-control-plane
date: '2026-04-28'
currency: USD
modelStartMonth: '2026-05'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-05'
    unit: month
    source: '[BP date and team startTiming Month 0]'
  - id: A2
    name: pre-seed 融资在模型启动时到账
    value: '2400'
    unit: USDK
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M; base case uses $2.4M to fund milestones plus buffer]'
  - id: A3
    name: 起始客户数（M1）
    value: '0'
    unit: count
    source: '[BP executiveSummary and product stage: pre-revenue prototype / design-partner stage]'
  - id: A4
    name: Y1 每条活跃产品线的月度混合收入
    value: '10.0'
    unit: USDK per month
    source: '[BP pricing $60k-$150k ARR plus usage; BP firstCustomer pilot $20k-$40k over 8-12 weeks; conservative blended heuristic]'
  - id: A5
    name: Y2 每条活跃产品线的月度混合收入
    value: '10.5'
    unit: USDK per month
    source: '[BP pricing and expansionLevers; modest post-pilot expansion heuristic]'
  - id: A6
    name: Y3 每条活跃产品线的月度混合收入
    value: '12.0'
    unit: USDK per month
    source: '[BP pricing $60k-$150k ARR plus usage and research SOM of ~$120k ARR per line; assumes modest usage and second-line expansion]'
  - id: A7
    name: Y1 客户爬坡
    value: '到 M12 达到 5 条付费产品线'
    unit: count
    source: '[BP 0-12 month milestone: 3 paid pilots and at least 2 production conversions]'
  - id: A8
    name: Y2 客户爬坡
    value: '到 Q4Y2 达到 11 条付费产品线'
    unit: count
    source: '[BP 12-24 month milestone: 8-10 product lines under management; base case assumes slight upside from late-Y1 conversions and one early expansion]'
  - id: A9
    name: Y3 客户爬坡
    value: '到 Q4Y3 达到 18 条付费产品线'
    unit: count
    source: '[Research market.som: 18 product lines at roughly $120k ARR each]'
  - id: A10
    name: Y1 COGS 比例
    value: '32%'
    unit: percent of revenue
    source: '[BP targetGrossMarginPct 70; startup-finance heuristic: early infra products run below target GM while onboarding and cloud costs are inefficient]'
  - id: A11
    name: Y2 COGS 比例
    value: '30%'
    unit: percent of revenue
    source: '[BP targetGrossMarginPct 70; gradual scale efficiency heuristic]'
  - id: A12
    name: Y3 COGS 比例
    value: '28%'
    unit: percent of revenue
    source: '[BP targetGrossMarginPct 70; mature-but-still-early infra heuristic yields ~72% GM]'
  - id: A13
    name: 创始人/CEO 年度现金薪酬
    value: '120'
    unit: USDK per year
    source: '[Startup-finance heuristic: seed founder cash salary kept below market]'
  - id: A14
    name: 工程岗位年度现金薪酬
    value: '180'
    unit: USDK per FTE per year
    source: '[Startup-finance heuristic for senior early-stage infra engineering in U.S.]'
  - id: A15
    name: 解决方案工程师年度现金薪酬
    value: '150'
    unit: USDK per FTE per year
    source: '[Startup-finance heuristic for technical post-sales / implementation hire]'
  - id: A16
    name: 产品负责人年度现金薪酬
    value: '170'
    unit: USDK per FTE per year
    source: '[Startup-finance heuristic for first product hire at seed/pre-seed]'
  - id: A17
    name: 销售或合作岗位年度现金薪酬
    value: '160'
    unit: USDK per FTE per year
    source: '[Startup-finance heuristic for first enterprise GTM hire with low initial variable mix]'
  - id: A18
    name: G&A / 运营岗位年度现金薪酬
    value: '110'
    unit: USDK per FTE per year
    source: '[Startup-finance heuristic for lean operations hire]'
  - id: A19
    name: 基础人头爬坡
    value: 'Q1Y1 为 2 FTE，Q2Y1 为 3，Q3Y1 为 5，Q4Y1 为 6，Q4Y2 为 11，Q4Y3 为 13'
    unit: FTE
    source: '[BP team startTiming for founder, founding eng, solutions engineer, product lead, partnerships lead + conservative hiring heuristic for Y2-Y3]'
  - id: A20
    name: Y1 非人力 opex 节奏
    value: 'M1-M3：R&D 工具 5K/mo，S&M 2K/mo，G&A 开销 6K/mo；M4-M6 增加试点与行政支持；M7-M12 增加适度 GTM 项目'
    unit: USDK per month
    source: '[Startup-finance heuristic anchored to BP founder-led sales and proof-heavy pilot motion]'
  - id: A21
    name: Y2-Y3 非人力 opex 节奏
    value: 'Y2 各季度增量为 54K、57K、60K、66K；Y3 各季度增量为 69K、72K、78K、84K'
    unit: USDK per quarter
    source: '[Startup-finance heuristic for software, travel, legal, security, and go-to-market tools scaling with headcount and enterprise sales]'
  - id: A22
    name: 稳态 CAC
    value: '65'
    unit: USDK per new customer
    source: '[BP founder-led enterprise motion; startup-finance heuristic for early enterprise infrastructure sales]'
  - id: A23
    name: 稳态月度流失率
    value: '1.25%'
    unit: percent
    source: '[Startup-finance heuristic for early enterprise infrastructure products with annual contracts but unproven retention]'
  - id: A24
    name: 现金转换简化假设
    value: 'EBITDA approximates cash movement'
    unit: policy
    source: '[Modeling heuristic: no debt, capex, or material working-capital swing modeled in pre-seed base case]'
  - id: A25
    name: 融资里程碑定义
    value: '达到可重复、可进入 seed 的证明状态：3 个付费试点、2 个生产部署、1 个现有网关集成，并且能看到通往 8-10 条受治理产品线的路径'
    unit: milestone
    source: '[BP milestones 0-12 months and 12-24 months]'
