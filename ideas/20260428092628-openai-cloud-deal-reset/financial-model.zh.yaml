scenarios:
  downside:
    description: 可移植性触发频率更慢、试点转化更弱，使公司停留在以服务为主的验证阶段。
    y3RevenueK: 1485.0
    y3EbitdaK: -1042.0
    cashLowPointK: -286.0
    keyAssumptionChanges:
      - 客户新增数到 Q4Y3 从 18 降至 13。
      - Y3 每条产品线的月度混合收入停留在 10.5K，而非 12.0K。
      - 毛利率最高仅达到 67%，而非 72%。
  base:
    description: 创始人主导销售将一个狭窄但真实的痛点切口，在不激进扩招的情况下，于 Q4Y3 转化为 18 条纳管产品线。
    y3RevenueK: 2142.0
    y3EbitdaK: -718.3
    cashLowPointK: 235.7
    keyAssumptionChanges:
      - M12 达到 5 条付费产品线，Q4Y2 达到 11 条，Q4Y3 达到 18 条。
      - 每条活跃产品线的月度混合收入从 Y1 的 10.0K 提升到 Y3 的 12.0K。
      - 毛利率从 Y1 的 68% 提升到 Y3 的 72%。
  upside:
    description: 交易触发频率强于预期，且早期账户更快扩展到第二个工作流。
    y3RevenueK: 2820.0
    y3EbitdaK: -358.0
    cashLowPointK: 512.0
    keyAssumptionChanges:
      - 客户数到 Q4Y3 达到 22 条产品线。
      - Y3 每条产品线的月度混合收入通过使用量和第二条产品线扩展提升至 12.8K。
      - 随着上线流程更标准化，毛利率达到 75%。
sensitivity:
  - variable: ARPU
    downsideCase: Y3 每条产品线的月度混合收入停留在 10.5K。
    baseCase: Y3 每条产品线的月度混合收入达到 12.0K。
    upsideCase: Y3 每条产品线的月度混合收入达到 12.8K。
    y3RevenueImpactK: -315.0
    cashImpactK: -227.0
  - variable: CAC
    downsideCase: CAC 上升至 85K，因为销售周期需要更多创始人与解决方案团队时间。
    baseCase: CAC 为 65K。
    upsideCase: 通过合作伙伴转介绍和可重复的试点打包，CAC 降至 50K。
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
  - variable: churn
    downsideCase: 由于可移植性需求具有偶发性，月流失率为 2.0%。
    baseCase: 月流失率为 1.25%。
    upsideCase: 在产品组合内部扩展强劲时，月流失率为 0.8%。
    y3RevenueImpactK: -180.0
    cashImpactK: -135.0
  - variable: sales cycle
    downsideCase: 试点成交周期从 4 个月拉长至 6 个月。
    baseCase: 由可移植性触发的交易大约在 4 个月内成交。
    upsideCase: 设计合作伙伴参考案例将周期缩短到 3 个月。
    y3RevenueImpactK: -252.0
    cashImpactK: -190.0
  - variable: gross margin
    downsideCase: 由于支持仍然依赖人工，毛利率峰值仅为 67%。
    baseCase: 毛利率达到 72%。
    upsideCase: 毛利率达到 75%。
    y3RevenueImpactK: 0.0
    cashImpactK: -107.0
  - variable: hiring pace
    downsideCase: 即使收入下滑，招聘仍按计划推进。
    baseCase: 招聘遵循当前保守节奏。
    upsideCase: 除非转化保持在计划水平，否则 1 名工程师和 1 名 GTM 招聘将延后两个季度。
    y3RevenueImpactK: 0.0
    cashImpactK: 165.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Leads[线索] --> QualifiedOpps[合格商机]
      QualifiedOpps --> Pilots[试点]
      Pilots --> ProductionContracts[生产合同]
      ProductionContracts --> Revenue[收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景收入主要来自纳管产品线从 Y1 的 5 条增长到 Q4Y3 的 18 条，同时单条产品线月价值从 $10K 提升到 $12K。
  - checkName: 必须正确实现之处
    finding: 公司必须足够快地把受阻的可移植性需求反复转化为付费试点，才能证明约 $65K 的创始人主导 CAC 是合理的。
  - checkName: 模型失效条件
    finding: 如果销售周期拉长且 ARPU 停滞，下行情景会转为现金为负，因为狭窄切口不足以支撑计划中的招聘基数。
  - checkName: 下一轮融资所需证明
    finding: 当试点转为生产、产品能叠加在现有网关之上，并且公司展示出向 8-10 条纳管产品线扩展的可信路径时，下一轮融资才具备充分理由。
sanityChecks:
  ruleOf40: Y3 growth 126.6% + EBITDA margin -33.5% = 93.1%
  burnMultiple: Y3 burn multiple 为 0.6x，基于相较于 Y2 的 $1.197M 净新增收入，对应 $718.3K 的现金消耗。
