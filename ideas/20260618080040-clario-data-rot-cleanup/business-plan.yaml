slug: support-agent-expiry-gate
date: "2026-06-18"
executiveSummary: >-
  This company sells a knowledge-expiry gate to multi-product B2B software companies whose AI support agents are grounded on mixed repositories such as Confluence, SharePoint, Google Drive, and Zendesk. The initial buyer is the support or knowledge leader who is about to expand a support copilot from pilot to broad rollout and cannot tolerate deprecated product content producing customer-facing answers. The product wins by sitting upstream of answer generation: it decides which documents are eligible for retrieval, quarantines high-risk content, and routes remediation to owners in Slack or Teams. The beachhead is intentionally narrow because mixed-repository support AI creates a visible trust failure faster than broader "AI readiness" or storage-governance programs. Go-to-market starts with paid pilots on one acquired, sunset, or migrated product line, where stale-content risk is easiest to prove and remediation can be measured within weeks. The market evidence supports urgency, adjacent budget, and a plausible $288.0M SAM, but there is still no direct proof in the inputs of what share of bad support answers is caused by stale documents versus ranking or model issues. The company should therefore raise a seed round to prove three things in the next 18 months: mixed-repository retrieval is common enough, precision is high enough for buyers to trust automated quarantine, and support leaders will fund the control layer as a rollout accelerator rather than defer to native platform features.
problem:
  - Support and employee AI agents increasingly ground answers on mixed documentation estates where stale product pages, duplicate how-tos, and ex-employee leftovers still appear authoritative.
  - Once deprecated content reaches a customer-facing answer, the cost is rollout distrust and support risk, not just excess storage or governance overhead.
  - Current alternatives split the workflow across manual audits, native article-verification tools, and broad governance suites that do not own cross-repository answer eligibility.
solution:
  - Connect to Confluence, SharePoint, Google Drive, Zendesk, and related systems to build a document-level eligibility graph keyed to freshness, ownership, product status, and retrieval exposure.
  - Quarantine high-risk content from AI indexes immediately or route keep, archive, merge, refresh, and ownership actions to business owners in Slack and Teams.
  - Give support and AI-platform teams an auditable record of which documents were blocked, why, and what changed before rollout expansion.
whyWeWin:
  - The wedge is narrower than generic data cleanup and closer to budget than records-management software because it attaches directly to wrong-answer risk in active AI rollouts.
  - Cross-repository eligibility plus answer-exposure telemetry creates a proprietary dataset that native knowledge tools and search layers do not capture by default.
  - Product-lifecycle policies for acquisitions, product sunsets, and migrations make the workflow operationally sticky in the exact moments buyers need fast proof.
strategicChoices:
  beachhead: Support operations and knowledge teams at 500-5,000 employee B2B software companies with multiple product lines, mixed repositories, and a live AI support-agent rollout.
  wedgeRationale: This segment has urgent, customer-visible failure modes, enough repository sprawl to need a separate control layer, and a clear buying trigger when a copilot expands beyond a native help center.
  sequencingRationale: Start with one support-agent surface and one high-risk product line because that keeps integration scope, change management, and false-positive risk manageable while producing proof that can later support broader repository and workflow expansion.
  notYet:
    - Broad enterprise storage cleanup sold primarily on cost reduction.
    - Employee IT agents and sales-enablement agents before support-answer telemetry is proven.
    - Building a net-new search or RAG stack instead of integrating with existing retrieval infrastructure.
market:
  tam: $1.0B modeled as about 8,000 target firms at roughly $120k annual spend.
  sam: $288.0M modeled as about 2,400 English-first North American and European firms with mixed repositories and active support-AI rollouts.
  som: $4.8M modeled as 40 reachable customers by year 3 at roughly $120k ACV.
  segments:
    - Multi-product B2B software vendors deploying customer-facing support agents on mixed repositories.
    - Internal IT and enablement teams at the same firms once the support wedge is proven.
  buyingProcess: >-
    The sale typically starts with a support or knowledge leader who owns rollout risk, then expands to the CIO, security, or platform team for integration and governance review. A credible initial deal needs one visible trigger event, one bounded repository set, and a proof path tied to rollout safety rather than a broad records program.
product:
  mvp: >-
    Ship Confluence, SharePoint, and Zendesk connectors; freshness and ownership scoring; manual-review queues in Slack or Teams; and one-way quarantine from AI indexes with an audit log. The MVP should support one product-line pilot and report stale-source exposure before and after remediation.
  sixMonth: Add Google Drive, product-sunset policy templates, retrieval-exposure dashboards, and approval workflows tuned for precision-first quarantine.
  twelveMonth: Add Salesforce Service Cloud and broader repository coverage, benchmark reports by product line, and admin controls that let partners deploy repeatable rollout playbooks.
  twentyFourMonth: Expand the eligibility graph from support AI into employee IT, onboarding, and enablement agents while keeping the product positioned as the control layer rather than a generic governance suite.
  keyBets:
    - Mixed-repository support rollouts are common enough to justify a standalone control layer.
    - Buyers will trust high-risk auto-quarantine when precision is shown on a bounded product line.
    - Retrieval-exposure telemetry materially improves remediation prioritization versus manual audits.
    - Native support and governance platforms will remain partial solutions rather than close the cross-repository gap in the next 24 months.
gtm:
  wedge: Paid design-partner pilots for one active support-agent rollout, typically after an acquisition, product sunset, or knowledge-base migration exposes stale-answer risk.
  channels:
    - Founder-led direct sales to VP Support Operations, Head of Knowledge, and CIO-sponsored AI rollout owners.
    - Referral and co-sell partnerships with Zendesk, Salesforce, Microsoft, and Atlassian ecosystem integrators.
    - Knowledge-management consultants and BPO-led remediation programs that already run article audits.
  funnelTargets: target account→discovery 20%+, discovery→paid pilot 30%+, pilot→production 60%+, production→second repository or second agent surface 50%+ within 12 months
  pricing: Annual subscription priced by connected knowledge collections and protected agent surfaces, plus a usage component tied to quarantined or remediated documents; this matches the buyer's goal of reducing answer risk through measurable action, not passive analysis.
businessModel:
  revenueStreams:
    - Annual platform subscription
    - Usage-based remediation or protected-surface fees
    - Deployment and policy-template packages sold through partners
  unitOfValue: Protected knowledge collections and agent surfaces, with expansion driven by remediated document volume.
  targetGrossMarginPct: 75
  expansionLevers:
    - Add repositories within the same account after the first product-line proof point.
    - Extend from customer support agents to employee IT and enablement agents.
    - Sell lifecycle-policy templates and partner-led rollout packages for acquisitions, sunsets, and migrations.
strategyMap:
  northStarMetric: Percentage of AI answers grounded only on current, approved knowledge across protected agent surfaces.
  inputMetrics:
    - Quarantined stale-source citations per protected agent surface
    - Pilot-to-production conversion rate
    - Median time from flagged document to owner decision
    - Precision of high-risk quarantine recommendations
    - Expansion rate from first repository to second repository
  moatsToBuild:
    - Cross-repository eligibility graph linked to product lifecycle and ownership
    - Retrieval-exposure and remediation outcome dataset
    - Repeatable policy templates for acquisitions, sunsets, and migrations
  killCriteria:
    - Fewer than 3 of the first 10 pilots convert to production within 6 months, or precision on high-risk quarantine cannot exceed 85% on customer-reviewed samples.
  mermaid: |
    flowchart LR
      Wedge[Support-agent expiry gate] --> MVP[Mixed-repository eligibility graph]
      MVP --> Proof[Quarantine precision and rollout trust proof]
      Proof --> Expansion[More repositories then employee-agent workflows]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Clear pain and a disciplined wedge, but conviction depends on proving stale-doc causality and buyer-owned budget in real support rollouts.
    whyBelieve: The plan attacks a live, buyer-visible failure mode that sits between governance suites and support platforms, with a coherent first customer and measurable proof path.
    whyDoubt: Incumbents already own pieces of retention, article hygiene, and enterprise search, and the inputs do not yet prove that stale documents are the dominant root cause of bad answers.
    nextDiligence: Confirm with design-partner retrieval logs that stale-document exposure is frequent enough and precise enough to justify paid production deployment.
  firstCustomer:
    title: Head of Support Operations at a multi-product B2B software company
    profile: 1,000-employee software vendor with Confluence, SharePoint, and Zendesk, at least one sunset or acquired product line, and a support copilot moving from pilot to broad rollout.
    trigger: Wrong or risky answers traced to deprecated product documentation during a rollout expansion, migration, or product sunset.
    buyer: VP of Support Operations or Head of Knowledge Management
    initialContract: $60k-$120k paid pilot covering one product line and one agent surface, converting to roughly $120k-$250k annual production as repositories and surfaces expand.
  mustBeTrue:
    - At least half of qualified support-AI targets index mixed repositories beyond their native help center.
    - In customer postmortems, stale or orphaned content explains a material share of bad answers versus ranking or model defects.
    - Buyers will pay for a separate control layer instead of relying on native Zendesk, Salesforce, Microsoft, or Google features.
    - High-risk quarantine recommendations can reach at least 85% precision before broad automation.
    - One successful support wedge can expand into additional repositories or adjacent agent workflows inside the same account.
  diligenceQuestions:
    - How often do live support copilots retrieve from Confluence, SharePoint, or Drive rather than only the help center?
    - What retrieval-log evidence shows stale documents causing wrong answers in production?
    - Which budget owner signs first when the problem is framed as rollout trust rather than governance?
    - How much manual review is still required to reach acceptable quarantine precision?
    - What native roadmap risk exists from Zendesk, Microsoft, Atlassian, or Google over the next 12-24 months?
operatingAssumptions:
  - assumption: Support-AI teams will share enough retrieval logs and repository metadata to measure stale-answer exposure during pilots.
    basis: research.yaml
    validationTest: Secure three design-partner pilots with read access to retrieval logs, ownership metadata, and quarantine actions within the first 90 days.
    decisionImpact: If false, narrow the product to native support-platform content first and delay cross-repository positioning.
  - assumption: A precision-first quarantine workflow can deliver visible answer-risk reduction before buyers demand full automation.
    basis: operator judgment
    validationTest: Run blind reviews on 500 flagged documents across two pilot estates and measure approved quarantine precision above 85%.
    decisionImpact: If false, shift the product toward advisory remediation and lower expansion expectations and pricing.
  - assumption: Support operations can own the first budget without requiring a company-wide governance initiative.
    basis: idea.yaml
    validationTest: Close at least two paid pilots where the commercial sponsor sits in support or knowledge, not a central records team.
    decisionImpact: If false, reframe distribution around CIO-led governance programs and lengthen sales-cycle assumptions.
  - assumption: Product-sunset and migration policies are a repeatable enough use case to create reusable deployment templates.
    basis: research.yaml
    validationTest: Convert three pilots triggered by sunsets, acquisitions, or migrations using the same policy pack with less than two weeks of custom setup each.
    decisionImpact: If false, services burden stays high and gross-margin targets and hiring plans must change.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Secure five design-partner discovery projects focused on one sunset or acquired product line.
    hypothesis: Triggered buyers will engage faster on bounded rollout-risk problems than on broad AI-readiness messaging.
    successMetric: Five qualified design partners and at least two signed paid pilots.
    owner: CEO
  - horizon: 0–90 days
    experiment: Build a pilot connector set for Confluence, SharePoint, and Zendesk with audit logging and one-way quarantine.
    hypothesis: One narrow integration bundle is enough to prove stale-answer exposure in the target estate.
    successMetric: First pilot deployed across three systems in under 30 days.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run customer-reviewed precision tests on flagged high-risk documents.
    hypothesis: Precision-first scoring can exceed 85% on quarantine recommendations before full automation.
    successMetric: Greater than 85% approval on reviewed quarantine recommendations across two pilots.
    owner: Product lead
  - horizon: 90–180 days
    experiment: Test pricing on annual platform fee plus usage-based remediation.
    hypothesis: Buyers prefer action-linked pricing to seat-based pricing because it maps to rollout risk reduction.
    successMetric: At least two pilots accept the proposed pricing frame without requesting per-seat packaging.
    owner: CEO
  - horizon: 180–360 days
    experiment: Launch one partner-led deployment with a knowledge-management consultant or ecosystem integrator.
    hypothesis: Partners can shorten security review and change management for repository-heavy accounts.
    successMetric: One partner-sourced production customer and pilot deployment time reduced by 25%.
    owner: Partnerships lead
  - horizon: 180–360 days
    experiment: Expand one production account from support to a second repository or adjacent employee-agent workflow.
    hypothesis: The support wedge creates a credible expansion path inside the same account.
    successMetric: One production customer expands ACV by at least 50% within 12 months.
    owner: Customer success lead
operations:
  - Permission-aware connector onboarding and security review for each repository.
  - Retrieval-log ingestion, document scoring, and quarantine event processing with audit trails.
  - Slack and Teams remediation queues with ownership reassignment and approval workflows.
  - Services-assisted policy setup for product sunsets, acquisitions, and knowledge-base migrations.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build connectors, eligibility scoring, and quarantine controls for the first pilot systems.
  - role: Product lead
    startTiming: Month 0
    rationale: Own ICP discipline, policy templates, and the precision-versus-automation tradeoff in early deployments.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Shorten pilot deployment and security review while translating repository sprawl into measurable rollout-risk metrics.
  - role: Account executive
    startTiming: Month 6
    rationale: Convert founder-led demand into a repeatable pilot-to-production sales process once messaging and pricing are validated.
  - role: Customer success and remediation ops
    startTiming: Month 9
    rationale: Drive adoption, expansion, and policy tuning after the first production customers go live.
milestones:
  - horizon: 0–12 months
    items:
      - "Ship MVP connectors for Confluence, SharePoint, and Zendesk with audit-ready quarantine workflows."
      - "Close 5-8 paid pilots tied to active support-agent rollouts."
      - "Convert at least 3 pilots to production and prove greater than 85% precision on high-risk quarantine recommendations."
  - horizon: 12–24 months
    items:
      - "Add Google Drive and Salesforce coverage plus reusable policy templates for sunsets, acquisitions, and migrations."
      - "Reach 10-15 production customers and establish at least two partner-assisted deployments."
      - "Expand at least 50% of production accounts to a second repository or second agent surface."
  - horizon: 24–36 months
    items:
      - "Become the system of record for AI-eligible knowledge in 30-40 accounts."
      - "Launch controlled expansion into employee IT and enablement agents without repositioning as a generic governance suite."
      - "Demonstrate referenceable proof that the product shortens rollout time and reduces stale-source answer incidents."
risks:
  - risk: Native platform vendors extend article verification or retention into cross-repository quarantine faster than expected.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on mixed-repository telemetry, lifecycle policy templates, and faster remediation workflows tied to answer exposure.
  - risk: Customers lack ownership metadata, product tags, or retrieval logs needed for high-confidence scoring.
    likelihood: High
    impact: High
    mitigation: Start with high-signal systems, require bounded pilots, infer missing ownership where possible, and keep humans in the loop early.
  - risk: Buyers agree on the problem but do not assign separate budget outside existing support or governance spend.
    likelihood: Medium
    impact: High
    mitigation: Anchor ROI on rollout acceleration and bad-answer reduction, and price against measurable remediation outcomes.
  - risk: False-positive quarantines create operational friction and undermine trust in automation.
    likelihood: Medium
    impact: Medium
    mitigation: Tune for precision first, require approvals on high-impact content, and publish customer-visible audit reasons for each quarantine.
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3-5M
  runwayMonths: 18
  useOfFundsSummary: Fund product engineering for core connectors and audit infrastructure, services-assisted deployments for the first 8-10 pilots, and the initial GTM team needed to convert pilots into repeatable production revenue.
