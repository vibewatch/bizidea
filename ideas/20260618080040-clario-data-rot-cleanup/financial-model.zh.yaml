assumptions:
  - id: A1
    name: 种子轮规模
    value: "4.0"
    unit: 百万美元
    source: "[BP fundingAsk targetFundingRangeUsd $3-5M; midpoint used]"
  - id: A2
    name: 试点 ARPU
    value: "80"
    unit: 千美元/年
    source: "[BP investorMemo.firstCustomer initialContract $60k-$120k; midpoint $80K used]"
  - id: A3
    name: 基础生产 ARPU
    value: "120"
    unit: 千美元/年
    source: "[BP investorMemo.firstCustomer converting to $120k-$250k; research.market.som models $120K ACV]"
  - id: A4
    name: 扩展后生产 ARPU
    value: "180"
    unit: 千美元/年
    source: "[BP expansionLevers second-repository expansion adds 50% ACV; heuristic $120K x 1.5 = $180K]"
  - id: A5
    name: 试点转生产转化率
    value: "60"
    unit: 百分比
    source: "[BP gtm.funnelTargets pilot-to-production 60%+]"
  - id: A6
    name: 试点转化滞后期
    value: "4"
    unit: 个月
    source: "[Startup-finance heuristic: enterprise POC-to-production typical 90-120 days; BP targets 6-month conversion window, conservative 4-month lag used]"
  - id: A7
    name: 生产上线 12 个月内的账户扩展率
    value: "40"
    unit: 生产账户百分比
    source: "[BP milestones 12-24 months expand at least 50% of accounts; base model uses 40% as conservative floor]"
  - id: A8
    name: 年度营收流失率
    value: "10"
    unit: 百分比
    source: "[Startup-finance heuristic: 10% annual churn for mid-market B2B SaaS with sticky compliance-adjacent workflow; BP kill criteria require pilot conversion proof before automation]"
  - id: A9
    name: 规模化后目标毛利率
    value: "75"
    unit: 百分比
    source: "[BP businessModel.targetGrossMarginPct: 75]"
  - id: A10
    name: 可变服务 COGS
    value: "15"
    unit: 营收百分比
    source: "[Startup-finance heuristic: services-assisted deployment model; BP operatingAssumptions policy-setup services burden; PS cost per pilot approximately $12-18K]"
  - id: A11
    name: 第一年云基础设施基础成本
    value: "5"
    unit: 千美元/月
    source: "[Startup-finance heuristic: connector infra on AWS or GCP for small-scale retrieval indexing; scales to $8K/month Y2 and $12K/month Y3]"
  - id: A12
    name: 创始工程师全成本
    value: "250"
    unit: 千美元/年
    source: "[Startup-finance heuristic: senior B2B SaaS engineer in SF or NYC market $185-200K base plus 25% payroll tax and benefits overhead]"
  - id: A13
    name: 产品负责人全成本
    value: "225"
    unit: 千美元/年
    source: "[Startup-finance heuristic: B2B SaaS product lead $165K base plus 25% overhead]"
  - id: A14
    name: 解决方案工程师全成本
    value: "200"
    unit: 千美元/年
    source: "[Startup-finance heuristic: enterprise pre-sales and deployment SE $145K base plus 25% overhead; allocated to S&M as presales-dominant role]"
  - id: A15
    name: 客户经理全成本
    value: "175"
    unit: 千美元/年
    source: "[Startup-finance heuristic: enterprise AE $125K base plus 25% overhead; variable commission excluded from salary line]"
  - id: A16
    name: 客户成功全成本
    value: "150"
    unit: 千美元/年
    source: "[Startup-finance heuristic: B2B CS ops $110K base plus 25% overhead; allocated to COGS as direct post-sale delivery cost]"
  - id: A17
    name: CEO 全成本
    value: "250"
    unit: 千美元/年
    source: "[Startup-finance heuristic: seed-stage founder CEO $175-200K salary plus benefits; allocated to G&A]"
  - id: A18
    name: 首个付费试点启动月份
    value: "M4"
    unit: 月份
    source: "[BP experimentRoadmap 0-90 days targets two signed paid pilots; conservative assumption first commercial close at month 4 after 3 months of design-partner discovery]"
  - id: A19
    name: 解决方案工程师加入时间
    value: "Month 3"
    unit: 月份
    source: "[BP team role Solutions engineer startTiming: Month 3]"
  - id: A20
    name: 客户经理加入时间
    value: "Month 6"
    unit: 月份
    source: "[BP team role Account executive startTiming: Month 6]"
  - id: A21
    name: 客户成功加入时间
    value: "Month 9"
    unit: 月份
    source: "[BP team role Customer success startTiming: Month 9]"
  - id: A22
    name: 市场营销与活动预算
    value: "5"
    unit: 千美元/月（第一年）
    source: "[Startup-finance heuristic: seed B2B content and event sponsorship $5K/month; grows to $8K Y2 and $15K Y3 as partner channel opens]"
  - id: A23
    name: G&A 行政管理费用
    value: "5"
    unit: 千美元/月（第一年）
    source: "[Startup-finance heuristic: legal retainer plus SaaS tooling $5K/month; grows to $6K Y2 and $8K Y3]"
  - id: A24
    name: 研发工具与软件
    value: "3"
    unit: 千美元/月
    source: "[Startup-finance heuristic: dev tools GitHub, Jira, cloud development credits $3K/month constant throughout model]"
  - id: A25
    name: CAC 基准
    value: "50"
    unit: 千美元
    source: "[Derived: Y2 S&M spend $608K divided by 12 net new Y2 customers equals $50.7K; rounded to $50K; founder-led sales with triggered inbound buyers compresses CAC versus pure outbound]"
  - id: A26
    name: 第 3 年目标客户数
    value: "38"
    unit: 账户数
    source: "[BP market.som 40 reachable customers; model reaches 38 at blended $140K ARPU giving $5.3M ARR run-rate, bracketing the $4.8M SOM]"
