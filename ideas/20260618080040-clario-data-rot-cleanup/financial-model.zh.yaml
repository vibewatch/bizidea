scenarios:
  downside:
    description: >-
      试点转生产率降至 40%，年度流失率升至 15%，账户扩展因归属元数据缺失或误判引发的信任危机而推迟至第 24 个月之后。
    y3RevenueK: 2400.0
    y3EbitdaK: -1100.0
    cashLowPointK: 1900.0
    keyAssumptionChanges:
      - "试点转生产率从 60% 降至 40%"
      - "年度流失率从 10% 升至 15%"
      - "账户扩展推迟至第 24 个月之后"
      - "合同范围缩小，ARPU 压缩至 $110K"
  base:
    description: >-
      试点转生产率 60%，年度流失率 10%，40% 的生产账户在上线 12 个月内扩展到第二个知识库，第 3 年末达到 38 个客户、年收入 $4.0M。
    y3RevenueK: 4020.0
    y3EbitdaK: 156.6
    cashLowPointK: 2436.1
    keyAssumptionChanges:
      - "试点转生产率 60%"
      - "年度流失率 10%"
      - "12 个月内账户扩展率 40%"
      - "基础生产 ARPU $120K，扩展后升至 $180K"
  upside:
    description: >-
      试点转生产率因可引用的精准度证明达到 70%，年度流失率降至 5%，60% 的账户在 12 个月内扩展——产品成为 AI 合格知识的记录系统。
    y3RevenueK: 5600.0
    y3EbitdaK: 1540.0
    cashLowPointK: 2531.4
    keyAssumptionChanges:
      - "试点转生产率升至 70%"
      - "年度流失率降至 5%"
      - "12 个月内 60% 的账户完成扩展"
      - "混合生产 ARPU $150K"
sensitivity:
  - variable: ARPU
    downsideCase: "$96K/年（-20%）：买家将合同上限控制在更少知识库，或谈判更窄的初始范围"
    baseCase: "基础生产 ACV $120K/年，见 A3"
    upsideCase: "$150K/年（+25%）：多知识库扩展加速，用量部分拉升收入"
    y3RevenueImpactK: -804.0
    cashImpactK: -603.0
  - variable: CAC
    downsideCase: "试点转化率降至 40%、销售周期延长，有效 CAC 升至 $80K，回收期延至 10.7 个月"
    baseCase: "60% 试点转化率加创始人主导的触发买家销售，CAC $50K，回收期 6.7 个月，见 A25"
    upsideCase: "通过转介速度和合作伙伴来源交易，CAC 降至 $32K，回收期 4.3 个月"
    y3RevenueImpactK: -1100.0
    cashImpactK: -825.0
  - variable: 流失率
    downsideCase: "误判隔离摩擦或现有平台缩小差距，年度流失率升至 15%"
    baseCase: "基于跨库工作流依赖的粘性，年度流失率 10%，见 A8"
    upsideCase: "产品成为 AI 合格知识的可审计记录系统，年度流失率降至 5%"
    y3RevenueImpactK: -600.0
    cashImpactK: -450.0
  - variable: 销售周期
    downsideCase: "CIO 安全审查和跨库变更管理导致平均销售周期 6 个月"
    baseCase: "对产品下线或知识库迁移触发买家，平均销售周期 3 个月"
    upsideCase: "合作伙伴来源和转介合格的交易，销售周期 1.5 个月"
    y3RevenueImpactK: -480.0
    cashImpactK: -360.0
  - variable: 毛利率
    downsideCase: "归属元数据缺失导致每个试点需要定制化设置，服务负担持续偏高，毛利率 68%"
    baseCase: "可复用策略模板降低每次部署的专业服务成本，第 3 年毛利率 75–76%，见 A9 和 A10"
    upsideCase: "模板复用和自动化逐步替代规模化后的手动导入，毛利率升至 81%"
    y3RevenueImpactK: 0.0
    cashImpactK: -320.0
  - variable: 招聘节奏
    downsideCase: "所有岗位招聘推迟一个季度：客户获取能力下降，第 3 年营收减少"
    baseCase: "按商业计划团队时间表及第 2–3 年增长计划招聘，见 A19–A21"
    upsideCase: "招聘提前一个季度：更早的 AE 和 SE 产能带来更多营收、减少积压"
    y3RevenueImpactK: -300.0
    cashImpactK: 180.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      TargetAccounts[Target Accounts] --> Pilot[Paid Pilot 80K ACV]
      Pilot --> Production[Production 60pct conv]
      Production --> BaseARR[Base ARR 120K]
      Production --> Expansion[Expansion 40pct within 12mo]
      Expansion --> ExpandedARR[Expanded ARR 180K]
      BaseARR --> GP[Gross Profit 75pct GM]
      ExpandedARR --> GP
      GP --> OpEx[Operating Expenses]
      GP --> EBITDA[EBITDA]
      EBITDA --> Cash[Cash Position]
modelSanity:
  - checkName: 营收引擎
    finding: "ARR 通过 60% 的试点转生产率和 40% 的账户知识库扩展实现复利增长，第 3 年末 ARR 运行率达 $5.3M。"
  - checkName: 必须成立的前提
    finding: "试点转生产率必须维持在 60% 或以上；若降至 40%，第 3 年客户数从 38 家降至约 26 家，第 3 年 EBITDA 推至 -$1.1M，需在 A 轮之前桥接资金。"
  - checkName: 模型崩溃条件
    finding: "Microsoft Purview 或 Zendesk 在 18 个月内推出原生跨库隔离，ARPU 压缩 20%、销售周期延长，第 3 年 EBITDA 从 +$157K 降至约 -$650K。"
  - checkName: 下轮融资证据
    finding: "当 12 个以上生产客户在线、ARR $1.5M+、Q4Y2 EBITDA 接近盈亏平衡且隔离精准度可引用超过 85% 时，A 轮融资条件成熟——与 18 个月种子里程碑一致。"
sanityChecks:
  ruleOf40: "第 2 年到第 3 年营收增长 137% 加第 3 年 EBITDA 利润率 3.9% 等于 140.9%；受早期低基数放大，但方向健康"
  burnMultiple: "第 1 年净烧钱 $972.8K 除以第 1 年净新增 ARR $840K 等于 1.16 倍（基准健康值低于 1.5 倍）"
  revenuePerFte: "第 3 年每 FTE 营收 $268K（$4,020K / 15 人；SaaS 基准 $200K–$400K）"
  flags:
    - "第 1 年毛利率 53%，受低营收规模相对于固定基础设施和客户成功成本的影响；模型到第 3 年末毛利率达 76%。"
    - "扩展营收约占第 3 年 ARR 的 33%；40% 账户扩展率若有任何延迟，将使第 3 年 EBITDA 减少约 $450K。"
    - "$4M 种子轮在基础情景烧钱速度下提供 36 个月以上资金跑道；A 轮未建模，但可能在第 18–24 个月融资，用于加速第 3 年招聘计划。"
    - "前五个生产客户约占第 3 年 ARR 的 22%；第 2 年若单个大客户流失，将使第 3 年营收减少约 7%。"
