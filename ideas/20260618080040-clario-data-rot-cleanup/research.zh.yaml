competitors:
- name: Clario
  stage: seed
  wedge: 企业 ROT 清理，含 Slack 和 Teams 整改工作流及基于成果的计费。
  pricing: 基于成果；客户对已标记文件采取行动时才付费。
  strength: 直接攻击 AI 落地所用同一知识库中的冗余、过时和琐碎文件。
  weaknessVsUs: 宽泛的清理定论；对客服智能体回答资格和回答曝光遥测的定位不够精准。
  sourceRefs:
  - 12
  - 13
- name: Microsoft Purview
  stage: incumbent
  wedge: Microsoft 365 内的保留、档案和数据生命周期治理。
  pricing: 按需付费 / 企业 Microsoft 许可。
  strength: 对 SharePoint、OneDrive 和合规团队拥有深度的控制平面访问。
  weaknessVsUs: 在纯 Microsoft 资产上最强；不专门针对跨库的客服回答隔离。
  sourceRefs:
  - 19
  - 20
  - 21
  - 22
  - 23
- name: Zendesk
  stage: incumbent
  wedge: 服务平台内的原生知识库加文章验证。
  pricing: 公开方案起价 $19/月，AI 和服务高级层高于入门价。
  strength: 已嵌入客服工作流，可将知识卫生与智能体运营挂钩。
  weaknessVsUs: 聚焦 Zendesk 原生内容和审核流，而非覆盖 Confluence、SharePoint 和 Drive 的混合知识库。
  sourceRefs:
  - 29
  - 30
  - 31
- name: Egnyte
  stage: scale-up
  wedge: 企业内容云部署的内容生命周期管理和 ROTS 风格控制。
  pricing: 起价 $22/用户/月。
  strength: 强大的治理框架，含 AI 分类和生命周期控制。
  weaknessVsUs: 在客服回答工作流和产品生命周期上下文中嵌入较浅。
  sourceRefs:
