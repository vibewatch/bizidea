  sensitivityCases:
  - case: 原生套件缩小差距
    impact: 若 Microsoft 或 Zendesk 从保留和文章验证延伸至跨库回答资格和自动隔离，独立产品的紧迫性下降，差异化必须转向多栈遥测和工作流深度。
    sourceRefs:
    - 19
    - 21
    - 29
    - 31
  - case: 元数据匮乏的客户
    impact: 若页面归属权、产品标签和使用遥测缺失，导入周期拉长、人工审核成本上升，短期 ROI 下降。
    sourceRefs:
    - 18
    - 22
    - 23
    - 31
  - case: AI 落地范围保持窄小
    impact: 若客服 Copilot 保持只读或局限于原生知识库，买家可推迟独立控制层，更长时间容忍手动清理。
    sourceRefs:
