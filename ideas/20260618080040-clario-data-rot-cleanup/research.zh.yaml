  validationPlan:
  - priority: high
    question: 客服 AI 团队在原生帮助中心之外是否索引了混合知识库，错误回答中有多大比例来自过时文档而非排序或模型问题？
    evidenceToGather: 试点检索日志、错误回答事后复盘，以及按产品线划分的知识库重叠数据。
  - priority: high
    question: 共创客户能否在没有漫长安全审查的情况下开放内容归属权、产品生命周期元数据和归档权限？
    evidenceToGather: 安全调查问卷、管理员角色映射，以及在 SharePoint、Confluence 和一个支持平台上的一次集成试点。
  - priority: medium
    question: 客服负责人在批准自动隔离文档之前，需要多高的精准度门槛，而非将每个条目都路由到人工审核？
    evidenceToGather: 在一条已退役产品线上进行盲测实验，并收集责任人审批结果。
  - priority: medium
    question: '谁先签单：客服运营、CIO，还是知识管理？'
    evidenceToGather: 按落地阶段和知识库复杂度分层的十个发现通话。
