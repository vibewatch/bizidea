  searchedQueries:
  - 查找企业 AI 就绪问题的近期权威来源，涵盖数据质量差、过时文档或影响检索增强生成、客服 Copilot 或企业 AI 智能体的非结构化内容蔓延。优先筛选分析师、一手来源和头部媒体报道。
  - 查找企业知识管理、客服 AI 和涉及 Confluence、SharePoint、Google Drive、Zendesk、Salesforce Service Cloud、Slack 和 Teams 的文档治理工作流的权威来源，重点关注过时内容、内容生命周期、归档和 AI 信任。
  - 查找企业 AI 知识清理或文档治理产品的竞争者和替代方案的权威来源——包括 Clario、Microsoft Purview、BigID、Egnyte、Atlassian、Box、Glean、Guru 及相关厂商。优先筛选产品、定价和官方文档页面。
  - 查找与企业 AI 知识治理、数据准确性、档案保留、隐私和 AI 风险管理相关的权威监管和标准来源。优先筛选 EU AI 法案、NIST AI RMF、GDPR 准确性和治理指南及类似官方来源。
  - 查找对向中市场和企业级 B2B 软件公司落地 AI 客服智能体的软件产品进行自下而上 TAM/SAM/SOM 测算的权威来源。优先筛选政府统计数据、官方备案、分析师摘要或广泛引用的行业数据（涵盖企业数量、AI 采用、知识工作者软件或客服自动化）。
  - 查找关于过时文档、陈旧 Confluence 页面、过时 SharePoint 内容、过时 Zendesk 帮助中心文章，或 AI/搜索返回过时企业知识的可访问社区论坛页面和厂商支持社区讨论。
  - BigID 的 AI 治理、数据发现、AI 数据安全态势管理和定价申请官方产品页面。
  - Egnyte 的治理、内容智能、AI、生命周期/保留和客户案例官方产品页面。
  - Zendesk 关于内容提示、文章验证和文章归档的官方帮助中心文档。
  - Google Vault 关于 Google Workspace 中保留规则、保留命令和数据生命周期管理的官方帮助页面。
  - Microsoft Learn 关于档案管理、保留标签和与文档治理相关的 SharePoint 站点生命周期的官方页面。
