jobsToBeDone:
  - job: >-
      当我们在收购和已下线产品的文档上部署客服智能体时，帮助知识团队在机器人回答客户之前隔离过时内容，让我们能扩大落地范围而不引发可避免的信任危机。
    currentAlternative: 手动内容审计和事后回答质检
    successMetric: AI 客服回答中过时来源引用的减少量
  - job: >-
      当某条产品线退役或某次重大发布改变工作流时，帮我们找到所有应归档、更新或屏蔽检索的文档，让智能体只使用当前指引。
    currentAlternative: 基于表格的内容清单和一次性清理项目
    successMetric: 产品变更后隔离或刷新所有受影响知识的耗时
ideaScorecard:
  signalStrength:
    score: 5
    rationale: >-
      集群融合了融资事件、跨来源的买家紧迫性、具体的知识库工作流和明确的 AI 失败数据——有力证明当下存在真实的采购需求。
  painIntensity:
    score: 5
    rationale: >-
      一个过时文档就能制造错误客户回答、让 AI 落地陷入停滞，并迫使管理层对整个客服智能体项目失去信心。
  wedgeClarity:
    score: 5
    rationale: >-
      针对客服和员工智能体的知识过期门控，是一个范围窄、工作流明确的产品，有清晰的首批买家和可量化的成果。
  defensibility:
    score: 4
    rationale: >-
      资格图谱、整改结果和生命周期专属策略模板应能累积成护城河，但大型治理厂商最终可能复制部分功能表面。
  ventureScale:
    score: 4
    rationale: >-
      客服知识库是强劲的滩头市场，一旦成为 AI 合格内容的记录系统，同一控制层可扩展至众多企业智能体工作流。
topRisks:
  - name: 现有治理厂商挤压
    description: >-
      存储治理或数据安全平台可能捆绑基础的过时内容检测，让这个品类看起来缺乏差异化。
    mitigation: >-
      从检索专属隔离、客服智能体回答遥测以及现有厂商未原生建模的产品生命周期策略起步。
  - name: 集成与元数据缺口
    description: >-
      许多企业缺乏清晰的内容归属权、产品标签或检索日志，可能削弱早期部署中的评分质量。
    mitigation: >-
      从信号最强的系统入手，从使用数据和组织数据中推断归属权，并推出人工在环审核队列，持续优化图谱。
  - name: ROI 证明路径可能间接
    description: >-
      买家可能认同过时内容是问题所在，但除非回答风险降低的效果迅速可见，否则难以直接与预算挂钩。
    mitigation: >-
      将试点锚定在一个正在运行的智能体落地项目上，汇报已隔离的错误回答来源和落地提速指标，并将部分定价与已完成的整改动作挂钩。
