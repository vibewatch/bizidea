problem: >-
  正在落地 AI 客服与员工智能体的 B2B 软件公司，从杂乱的 Confluence、SharePoint、Google Drive 和历史知识库中拉取内容——那里堆积着仍被检索系统视为权威的过时产品文档、重复操作指南和离职员工遗留内容。一旦废弃页面变成智能体的回答，问题已不是多余的存储开销，而是错误指引发给客户、AI 落地因此失去高管信任。知识团队可以定期做审计，但缺乏一套能持续判断哪些内容可以安全作为 AI 引用来源的机制。
targetUser:
  primary: >-
    在多产品 B2B 软件公司部署 AI 客服或员工智能体、需要管理大量历史文档资产的客服运营与知识管理负责人。
  secondary: >-
    在同一文档库上运行内部服务台和业务赋能智能体的 IT 服务与营收赋能团队。
  buyer: >-
    正在上线面向客户或内部员工的 AI 智能体的软件公司客服运营 VP、知识管理负责人或 CIO。
startupThesis:
  nonObviousInsight: >-
    AI 数据清理领域的持久赢家不会是宽泛的存储清洁工，而会是决定哪些文档有资格回答智能体提问的信任门控。变化在于：废弃内容现在在 AI 工作流中扮演着活跃决策逻辑的角色——一个过时页面已从归档杂物变成操作风险。
  beachhead: >-
    拥有 500 至 5,000 名员工、三条或以上被收购或已下线产品线、使用 Confluence 加 SharePoint 或 Google Drive、部署 Zendesk 或 Salesforce Service Cloud，并已上线 AI 客服智能体的 B2B 软件厂商。
  wedge: >-
    一套对每个文档按新鲜度、归属权、产品状态和检索曝光度评分的知识过期门控，在内容驱动客服回答之前，通过 Slack 和 Teams 将保留、归档、删除或隔离动作路由给相关责任人。
  whyNowCatalyst: >-
    集群表明 AI 就绪让 ROT 数据问题骤然紧迫：已停产品的知识库文章正实际存在于企业语料库中，数据质量差与 AI 项目大规模被叫停的风险直接挂钩，均有具体证据支撑。
  ventureScalePath: >-
    从保障 AI 客服回答起步，再将同一资格图谱延伸至员工 IT 智能体、销售赋能、入职培训、合规内容，乃至所有企业智能体只应基于当前已审批知识行动的工作流。
solution: >-
  产品接入文档和知识系统，构建页面、文件、所有者、产品线与最近可信日期的实时图谱，为每个条目打 AI 可用性评分。它结合元数据信号（年龄、所有者不活跃度、重复集群、过时文件类型）与业务信号（产品下线、版本说明变更、客服检索日志）。高风险文档立即从智能体索引中移除，或路由到 Slack 和 Teams 队列，责任人可在几分钟内批准归档、合并或刷新动作。系统向客服和 AI 平台团队精确展示哪些过时文档仍在影响智能体回答，从混乱语料库到 AI 安全知识库提供可审计路径。定价从年度平台费起步，并随可量化整改量扩展，将支出与已解决的回答风险挂钩。
goToMarketSeed:
  firstCustomer: >-
    一家拥有 1,000 名员工的 B2B 软件公司客服运营负责人，该公司有多个被收购产品、使用 Confluence 加 SharePoint 和 Zendesk Guide，并正将客服 Copilot 从试点推向大规模落地。
  buyingTrigger: >-
    Copilot、客服机器人或员工智能体上线后，从已废弃的产品文档中浮现出错误回答——尤其在合并、产品下线或知识库迁移之后。
  currentAlternative: >-
    手动知识审计、搜索相关性调优、临时归档项目、通用存储治理工具，以及让 AI 试点保持只读或窄范围运行。
  switchingReason: >-
    这个切口在错误回答到达客户之前就拦截过时文档，将清理工作转变为以回答风险排序的优先行动队列，而不仅仅是文件存储卫生。
  pricingHypothesis: >-
    按已连接知识集合和受保护智能体界面计价的年度订阅，加上与已隔离或已整改文档数量挂钩的用量部分。
whyNow:
  - point: >-
      Gartner 级别的废弃风险把 ROT 从后台数据治理的抱怨变成了当下可以申请预算的 AI 部署阻碍。
    signalRefs: ["AI 就绪让 ROT 清理成为预算项"]
    sourceRefs: [1]
  - point: >-
      问题集中在企业已用于智能体上下文的文档系统中，这让以知识库为中心的控制层比另一轮模型侧优化更加紧迫。
    signalRefs: ["非结构化知识库是故障高发地"]
    sourceRefs: [1]
  - point: >-
      已停产品的知识库文章和过时文件格式的实证，表明过时内容正在污染真实语料库，为围绕回答资格的精准切入奠定基础。
    signalRefs: ["弃用知识正在污染语料库"]
    sourceRefs: [2]
  - point: >-
      买家正在传递付费意愿——要的是基于行动的整改，而非只是可见性——支持构建一个隔离并路由工作的产品，而非又一个仪表板。
    signalRefs: ["买家要可量化的整改成果"]
    sourceRefs: [2, 3]
differentiator: >-
  宽泛的存储清理厂商以降低成本和通用治理为目标；客服 AI 厂商以生成回答为目标，往往默认语料库是可信的。这家公司站在两者之间缺失的控制节点上，掌握 AI 资格图谱——哪个文档是当前的、谁拥有它、它适用于哪个产品、以及它是否应该进入检索。随时间推移，护城河通过文档级整改结果、检索曝光数据和绑定产品生命周期事件的策略模板持续加深，这是通用治理平台无法深度建模的。
