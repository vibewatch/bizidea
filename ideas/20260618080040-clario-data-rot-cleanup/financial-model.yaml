scenarios:
  downside:
    description: >-
      Pilot-to-production conversion drops to 40%, annual churn rises to 15%,
      and account expansion is deferred beyond month 24 due to missing ownership
      metadata or false-positive trust failures eroding buyer confidence.
    y3RevenueK: 2400.0
    y3EbitdaK: -1100.0
    cashLowPointK: 1900.0
    keyAssumptionChanges:
      - "Pilot-to-production conversion drops from 60% to 40%"
      - "Annual churn rises from 10% to 15%"
      - "Account expansion deferred beyond month 24"
      - "ARPU compressed to $110K due to reduced-scope contracts"
  base:
    description: >-
      60% pilot-to-production conversion, 10% annual churn, and 40% of
      production accounts expanding to a second repository within 12 months of
      go-live, reaching 38 customers and $4.0M annual revenue by end of year 3.
    y3RevenueK: 4020.0
    y3EbitdaK: 156.6
    cashLowPointK: 2436.1
    keyAssumptionChanges:
      - "60% pilot-to-production conversion"
      - "10% annual churn"
      - "40% account expansion within 12 months"
      - "$120K base production ARPU rising to $180K on expansion"
  upside:
    description: >-
      Pilot-to-production conversion reaches 70% driven by referenceable
      precision proof, annual churn falls to 5%, and 60% of accounts expand
      within 12 months as the product becomes the system of record for AI-eligible
      knowledge.
    y3RevenueK: 5600.0
    y3EbitdaK: 1540.0
    cashLowPointK: 2531.4
    keyAssumptionChanges:
      - "Pilot-to-production conversion rises to 70%"
      - "Annual churn drops to 5%"
      - "60% of accounts expand within 12 months"
      - "$150K blended production ARPU"
sensitivity:
  - variable: ARPU
    downsideCase: "$96K annual (-20%): buyers cap contracts at fewer repositories or negotiate narrower initial scope"
    baseCase: "$120K annual base production ACV per A3"
    upsideCase: "$150K annual (+25%): faster multi-repository expansion and usage-component uplift"
    y3RevenueImpactK: -804.0
    cashImpactK: -603.0
  - variable: CAC
    downsideCase: "Effective CAC rises to $80K as pilot conversion drops to 40% and sales cycles lengthen; payback extends to 10.7 months"
    baseCase: "CAC $50K from 60% pilot conversion and founder-led triggered-buyer sales; payback 6.7 months per A25"
    upsideCase: "CAC falls to $32K through referral velocity and partner-sourced deals; payback 4.3 months"
    y3RevenueImpactK: -1100.0
    cashImpactK: -825.0
  - variable: churn
    downsideCase: "15% annual churn from false-positive quarantine friction or incumbent platform closing the gap"
    baseCase: "10% annual churn based on sticky cross-repository workflow dependency per A8"
    upsideCase: "5% annual churn as the product becomes the auditable system of record for AI-eligible knowledge"
    y3RevenueImpactK: -600.0
    cashImpactK: -450.0
  - variable: "sales cycle"
    downsideCase: "6-month average sales cycle due to CIO security review overhead and cross-repository change management"
    baseCase: "3-month average sales cycle for triggered buyers facing a product sunset or knowledge-base migration"
    upsideCase: "1.5-month cycle for partner-sourced and referral-qualified deals"
    y3RevenueImpactK: -480.0
    cashImpactK: -360.0
  - variable: "gross margin"
    downsideCase: "68% gross margin if services burden stays high due to missing ownership metadata requiring custom setup per pilot"
    baseCase: "75-76% gross margin by Y3 as reusable policy templates reduce per-deployment PS cost per A9 and A10"
    upsideCase: "81% gross margin as template reuse and automation displace manual onboarding at scale"
    y3RevenueImpactK: 0.0
    cashImpactK: -320.0
  - variable: "hiring pace"
    downsideCase: "Hiring delayed one quarter across all roles: slower customer acquisition capacity reduces year-3 revenue"
    baseCase: "Hiring on plan per BP team timing and Y2-Y3 growth ramp per A19-A21"
    upsideCase: "Hiring accelerated one quarter: earlier AE and SE capacity adds revenue and reduces backlog"
    y3RevenueImpactK: -300.0
    cashImpactK: 180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts[Target Accounts] --> Pilot[Paid Pilot 80K ACV]
      Pilot --> Production[Production 60pct conv]
      Production --> BaseARR[Base ARR 120K]
      Production --> Expansion[Expansion 40pct within 12mo]
      Expansion --> ExpandedARR[Expanded ARR 180K]
      BaseARR --> GP[Gross Profit 75pct GM]
      ExpandedARR --> GP
      GP --> OpEx[Operating Expenses]
      GP --> EBITDA[EBITDA]
      EBITDA --> Cash[Cash Position]
modelSanity:
  - checkName: Revenue engine
    finding: "ARR compounds through 60% pilot-to-production conversion and 40% of accounts doubling ACV via repository expansion, reaching a $5.3M ARR run-rate by end of year 3."
  - checkName: Must go right
    finding: "Pilot-to-production conversion must hold at or above 60%; a drop to 40% cuts year-3 customers from 38 to about 26 and pushes year-3 EBITDA to -$1.1M, requiring bridge capital before Series A."
  - checkName: Model breaks if
    finding: "Microsoft Purview or Zendesk ships native cross-repository quarantine within 18 months, compressing ARPU by 20% and extending sales cycles, dropping year-3 EBITDA from +$157K to approximately -$650K."
  - checkName: Next-round proof
    finding: "Series A is justified when 12 or more production customers are live at $1.5M+ ARR with Q4Y2 near-breakeven EBITDA and referenceable quarantine precision above 85%, consistent with the 18-month seed milestone."
sanityChecks:
  ruleOf40: "Y2-to-Y3 revenue growth 137% plus Y3 EBITDA margin 3.9% equals 140.9%; inflated by early-stage low base but directionally healthy"
  burnMultiple: "Y1 net burn $972.8K divided by Y1 net new ARR $840K equals 1.16x (benchmark healthy below 1.5)"
  revenuePerFte: "$268K Y3 ($4,020K / 15 FTEs; benchmark $200-400K SaaS)"
  flags:
    - "Y1 gross margin 53% due to low revenue scale versus fixed infrastructure and CS costs; model reaches 76% gross margin by end of year 3."
    - "Expansion revenue accounts for approximately 33% of year-3 ARR; any delay in 40% account-expansion adoption reduces year-3 EBITDA by approximately $450K."
    - "Seed round of $4M provides 36-plus months of runway at base case burn; a Series A is not modeled but will likely be raised at month 18-24 to fund an accelerated year-3 hiring plan."
    - "First five production customers represent approximately 22% of year-3 ARR; a single large-account churn event in year 2 reduces year-3 revenue by approximately 7%."
    - "CAC of $50K assumes founder-led efficiency with triggered inbound buyers; adding a full outbound sales motion in year 3 may raise effective CAC to $70-80K."
