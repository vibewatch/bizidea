    value: "5"
    unit: thousand USD per month Y1
    source: "[Startup-finance heuristic: seed B2B content and event sponsorship $5K/month; grows to $8K Y2 and $15K Y3 as partner channel opens]"
  - id: A23
    name: G&A administrative overhead
    value: "5"
    unit: thousand USD per month Y1
    source: "[Startup-finance heuristic: legal retainer plus SaaS tooling $5K/month; grows to $6K Y2 and $8K Y3]"
