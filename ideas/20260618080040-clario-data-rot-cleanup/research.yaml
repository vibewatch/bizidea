  sensitivityCases:
  - case: Native suites close the gap
    impact: If Microsoft or Zendesk expands from retention and article verification into cross-repository answer eligibility and automated quarantine, standalone urgency drops and differentiation must move toward multi-stack telemetry and workflow depth.
    sourceRefs:
    - 19
    - 21
    - 29
    - 31
  - case: Metadata-poor customers
    impact: If page ownership, product tagging, and usage telemetry are missing, onboarding stretches and human review cost rises, reducing near-term ROI.
    sourceRefs:
    - 18
    - 22
    - 23
    - 31
  - case: AI rollouts stay narrow
    impact: If support copilots remain read-only or confined to a native knowledge base, buyers can defer a separate control layer and tolerate manual cleanup longer.
    sourceRefs:
    - 5
    - 6
    - 7
    - 29
    - 32
  validationPlan:
  - priority: high
    question: Do support-AI teams index mixed repositories beyond the native help center, and how often do bad answers trace back to stale docs versus ranking or model issues?
    evidenceToGather: Pilot retrieval logs, wrong-answer postmortems, and repository-overlap data by product line.
  - priority: high
    question: Can design partners expose content ownership, product-lifecycle metadata, and archive permissions without a long security review?
    evidenceToGather: Security questionnaires, admin role mappings, and one integration pilot across SharePoint, Confluence, and a support platform.
  - priority: medium
    question: What precision threshold is required before support leaders will block documents automatically instead of routing every item to manual review?
    evidenceToGather: Blind-review experiments on a retired product line with owner approval outcomes.
  - priority: medium
    question: 'Which budget owner signs first: support operations, CIO, or knowledge management?'
    evidenceToGather: Ten discovery calls segmented by rollout stage and repository complexity.
