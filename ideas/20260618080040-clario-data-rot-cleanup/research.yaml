  searchedQueries:
  - Find recent authoritative sources on enterprise AI readiness problems caused by poor data quality, stale documentation, or unstructured content sprawl affecting retrieval-augmented generation, support copilots, or enterprise AI agents. Prioritize analyst, primary, and tier-one reporting.
  - Find authoritative sources on enterprise knowledge management, support AI, and document governance workflows involving Confluence, SharePoint, Google Drive, Zendesk, Salesforce Service Cloud, Slack, and Teams, especially around stale content, content lifecycle, archival, and AI trust.
  - 'Find authoritative sources on competitors and substitutes for an enterprise AI knowledge cleanup or document-governance product: Clario, Microsoft Purview, BigID, Egnyte, Atlassian, Box, Glean, Guru, and related players. Prioritize product, pricing, and official docs pages.'
  - Find authoritative regulatory and standards sources relevant to enterprise AI knowledge governance, data accuracy, records retention, privacy, and AI risk management. Prioritize EU AI Act, NIST AI RMF, GDPR accuracy and governance guidance, and similar official sources.
  - Find authoritative sources for bottom-up TAM/SAM/SOM sizing of a software product sold to midmarket and enterprise B2B software companies rolling out AI support agents. Prioritize government statistics, official filings, analyst summaries, or widely cited industry data on company counts, AI adoption, knowledge worker software, or support automation.
  - Find accessible community forum pages or vendor support community discussions about outdated documentation, stale Confluence pages, stale SharePoint content, stale Zendesk help center articles, or AI/search returning outdated enterprise knowledge.
  - Official BigID product pages for AI governance, data discovery, AI data security posture management, and pricing request.
  - Official Egnyte product pages for governance, content intelligence, AI, lifecycle or retention, and customer stories.
  - Official Zendesk help center docs for content cues, article verification, and archiving articles.
  - Official Google Vault help pages for retention rules, holds, and data lifecycle management in Google Workspace.
  - Official Microsoft Learn pages for records management, retention labels, and SharePoint site lifecycle relevant to document governance.
