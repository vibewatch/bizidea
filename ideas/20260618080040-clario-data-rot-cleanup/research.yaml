    - 38
    - 39
  dataMoats:
  - point: Document-level remediation decisions tied to explicit owners create a proprietary feedback loop that generic search layers do not capture.
    sourceRefs:
    - 18
    - 31
  - point: Cross-repository retrieval exposure plus remediation outcomes can become a unique training set for deciding what is safe to ground customer answers on.
    sourceRefs:
