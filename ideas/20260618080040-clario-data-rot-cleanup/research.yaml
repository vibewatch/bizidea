competitors:
- name: Clario
  stage: seed
  wedge: Enterprise ROT cleanup with Slack and Teams remediation workflows plus outcome-based billing.
  pricing: Outcome-based; paid when customers act on flagged files.
  strength: Directly attacks redundant, obsolete, and trivial files across the same repositories used in AI rollouts.
  weaknessVsUs: Broad cleanup thesis; less tightly positioned around support-agent answer eligibility and answer-exposure telemetry.
  sourceRefs:
  - 12
  - 13
- name: Microsoft Purview
  stage: incumbent
  wedge: Retention, records, and data-lifecycle governance across Microsoft 365.
  pricing: Pay-as-you-go / enterprise Microsoft licensing.
  strength: Deep control-plane access for SharePoint, OneDrive, and compliance teams.
  weaknessVsUs: Best where the estate is mostly Microsoft; not purpose-built for cross-repository support-answer quarantine.
  sourceRefs:
  - 19
  - 20
  - 21
  - 22
  - 23
- name: Zendesk
  stage: incumbent
  wedge: Native knowledge base plus article verification inside a service platform.
  pricing: Public plans start from $19 per month, with higher AI and service tiers above entry plans.
  strength: Already sits in the support workflow and can tie knowledge hygiene to agent operations.
  weaknessVsUs: Centers on Zendesk-native content and review flows rather than mixed Confluence, SharePoint, and Drive estates.
  sourceRefs:
  - 29
  - 30
  - 31
- name: Egnyte
  stage: scale-up
  wedge: Content lifecycle management and ROTS-style control for enterprise content cloud deployments.
  pricing: From $22 per user per month.
  strength: Strong governance framing with AI classification and lifecycle controls.
  weaknessVsUs: Less embedded in support-answer workflows and product-lifecycle context.
  sourceRefs:
  - 36
  - 37
- name: BigID
  stage: scale-up
  wedge: AI, data, and identity governance focused on risk, policy, and sensitive data control.
  pricing: Contact sales / enterprise quote.
  strength: Strong risk, identity, and policy posture for governance-led buyers.
  weaknessVsUs: Problem framing skews toward compliance and security rather than support-AI trust incidents.
  sourceRefs:
  - 38
  - 39
