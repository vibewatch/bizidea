openQuestions:
- What fraction of support-AI rollouts today index mixed repositories instead of only the native help center?
- How often do stale documents, rather than retrieval ranking or model behavior, explain bad support answers in production?
- Can design partners expose retrieval logs and content-ownership data without a prolonged security review?
- Will Microsoft or Zendesk ship cross-repository quarantine fast enough to compress the category window?
