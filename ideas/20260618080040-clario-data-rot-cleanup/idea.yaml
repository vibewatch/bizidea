differentiator: >-
  Broad storage-cleanup vendors optimize for cost reduction and generic
  governance, while support-AI vendors optimize for answer generation and often
  assume the corpus is trustworthy. This company sits in the missing control
  point between those layers by owning the AI eligibility graph: which document
  is current, who owns it, which product it applies to, and whether it should
  be allowed into retrieval at all. Over time the moat compounds through
  document-level remediation outcomes, retrieval exposure data, and policy
  templates tied to product lifecycle events that generic governance platforms
  do not model deeply.
