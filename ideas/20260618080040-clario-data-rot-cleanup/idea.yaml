topRisks:
  - name: Incumbent governance squeeze
    description: >-
      Storage-governance or data-security platforms could bundle basic stale
      content detection and make the category look undifferentiated.
    mitigation: >-
      Start with retrieval-specific quarantine, support-agent answer telemetry,
      and product-lifecycle policies that incumbents do not natively model.
  - name: Integration and metadata gaps
    description: >-
      Many enterprises lack clean content ownership, product tags, or retrieval
      logs, which could weaken scoring quality during early deployments.
    mitigation: >-
      Begin with the highest-signal systems, infer ownership from usage and org
      data, and ship human-in-the-loop review queues that improve the graph over
      time.
  - name: ROI proof may be indirect
    description: >-
      Buyers may agree stale content is a problem but struggle to tie cleanup
      directly to budget unless answer-risk reduction is visible quickly.
    mitigation: >-
      Anchor pilots on one live agent rollout, report quarantined bad-answer
      sources and rollout acceleration metrics, and price partly on completed
      remediation actions.
