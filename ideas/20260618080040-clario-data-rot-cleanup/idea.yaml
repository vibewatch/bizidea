jobsToBeDone:
  - job: >-
      When we launch a support agent across acquired and sunset product
      documentation, help our knowledge team quarantine stale content before the
      bot answers customers, so we can expand rollout without creating avoidable
      trust failures.
    currentAlternative: Manual content audits and post-hoc answer QA
    successMetric: Reduction in stale-source citations within AI support answers
  - job: >-
      When a product line is retired or a major release changes workflows, help
      us find every document that should be archived, updated, or blocked from
      retrieval, so agents only use current guidance.
    currentAlternative: Spreadsheet-based content inventories and one-off cleanup projects
    successMetric: Time to quarantine or refresh all affected knowledge after a product change
