market:
  tam:
    value: $658.2M
    rationale: '自下而上的估算：27,425 家拥有 20–499 名员工的美国杂货门店 [10] × 每店每年约 $24k 的生鲜决策自动化订阅费 = $658.2M。FMI 给出的 45,575 家超市门店总量则是一个自上而下的校验，说明这里采用的单位基数偏保守 [9]。'
    isEstimate: true
    sourceRefs:
    - 9
    - 10
  sam:
    value: $164.6M
    rationale: '滩头 SAM 假设，在 27,425 家适配门店里，大约 25% 属于拥有 5–30 家门店、商品运营集中、且数据管道足够现代化的区域 / 独立连锁：6,856 家门店 × $24k = $164.6M。这个 25% 是一个显式估算，锚定 Vori 面向独立杂货商的定位和更窄的滩头定义。'
    isEstimate: true
    sourceRefs:
    - 2
    - 10
  som:
    value: $2.9M
    rationale: Year-3 SOM 假设通过试点转正式，做到 120 家在营门店（例如 10 条连锁 × 12 家门店，或 15 条连锁 × 8 家门店）；120 × $24k = $2.88M。这个假设相对于 SAM 刻意保守，也考虑到了杂货行业长采购周期与变革管理摩擦。
    isEstimate: true
    sourceRefs:
    - 12
    - 19
    - 32
bottomUpSizingDrivers:
- driver: 总可触达单位数
  value: 27,425 家拥有 20–499 名员工的美国杂货门店
  source: '[10]'
- driver: 滩头适配比例
  value: 中型超市中的 25%
  source: est. constrained by beachhead definition and [2]
- driver: 建模中的单店 ARR
  value: $24,000/year
  source: est. informed by workflow scope and [11],[16],[20]
categoryDynamics:
  growthRate: 受访独立杂货商同店销售增长 1.8%（扣通胀后为 0.6%）
  growthRateSourceRefs:
  - 6
  tailwinds:
  - point: 杂货商对生鲜库存优化和运营效率工具的兴趣正在上升。
    sourceRefs:
    - 27
    - 7
  - point: 最近的融资与客户案例都说明，连通的杂货数据栈和生鲜 AI 产品已经能被商业化部署。
    sourceRefs:
    - 1
    - 28
    - 14
    - 22
  - point: 食物浪费背后的经济体量足够大，所以 shrink 下降是董事会级 ROI 议题，不只是可持续叙事。
    sourceRefs:
    - 15
    - 26
  headwinds:
  - point: 独立杂货商的利润仍然很薄，销售周期会高度 ROI 导向，也几乎不会容忍漫长实施。
    sourceRefs:
    - 5
    - 6
  - point: 数据质量和追溯要求，会在最需要自动化的生鲜品类里抬高导入摩擦。
    sourceRefs:
    - 24
    - 23
    - 25
  - point: 更宽的现有厂商可以把相邻功能直接打包进大套件，压缩独立品类的位置。
    sourceRefs:
    - 2
    - 11
    - 20
competitors:
- name: Vori
  stage: scale-up
  wedge: 面向独立杂货商的一体化 grocery OS，覆盖 POS、定价、订货、会员与报表。
  pricing: 定制报价 / 联系销售；抓取站点上没有公开标价。
  strength: 对独立杂货商的定位很准，而且掌握运营数据主干。
  weaknessVsUs: system-of-record 范围更宽，反而可能让 Vori 在同天易腐品决策上不如专门的 autopilot 聚焦。
  sourceRefs:
  - 2
  - 3
  - 28
- name: Afresh
  stage: scale-up
  wedge: AI 原生的生鲜订货、生产计划和库存管理平台。
  pricing: 定制报价 / 联系销售；抓取站点上没有公开标价。
  strength: 在生鲜品类里口碑深，公开客户包括 Albertsons 和 Fresh Thyme，同时强调低 IT 成本落地。
  weaknessVsUs: 更偏向宽口径的生鲜规划和大连锁工作流，而不是轻量的独立连锁决策层。
  sourceRefs:
  - 11
  - 12
  - 14
  - 13
- name: Upshop
  stage: scale-up
  wedge: 覆盖 AI 预测、订货、markdown 优化与食物浪费执行的生鲜运营套件。
  pricing: 定制报价 / 联系销售；抓取站点上没有公开标价。
  strength: 更靠执行端，公开展示了不少 markdown 和订货案例。
  weaknessVsUs: 产品面太宽，容易让人感觉这是个更大的运营套件，而不是专门服务 5–30 店连锁的易腐品毛利切口。
  sourceRefs:
  - 16
  - 18
  - 19
- name: RELEX Solutions
  stage: incumbent
  wedge: 面向杂货零售商的企业级预测、补货、商品运营与供应链优化套件。
  pricing: 定制报价 / 联系销售；抓取站点上没有公开标价。
  strength: 企业级信誉强、优化面广，而且已有多家头部杂货客户背书。
  weaknessVsUs: 对区域独立连锁而言，部署很可能更重、更宽也更贵，不如聚焦易腐品 autopilot 来得轻巧。
  sourceRefs:
  - 20
  - 21
  - 22
regulatoryTechnicalConstraints:
- point: 产品、属性和库存数据必须足够准确；GS1 的数据质量与生鲜标准已经说明，这是真正的实施前提，不是锦上添花。
  sourceRefs:
  - 24
  - 23
- point: 食品追溯要求会进一步提高对生鲜库存和供应商事件历史、以及决策记录保留的要求。
  sourceRefs:
  - 25
  - 23
- point: 任何 autopilot 想从建议走到动作，都必须拥有可靠的写入路径或交接路径，能把指令送进 POS、订货和供应商系统。
  sourceRefs:
  - 2
  - 30
  - 31
- point: 利润本就很薄的采购方，在产品上线初期会更偏好经理留在环里、分阶段 rollout，而不是全自动执行。
  sourceRefs:
  - 5
  - 12
  - 32
- point: 涉及食物浪费和可持续的任何效果主张，都必须建立在能量化基线上，因为采购方与相关方越来越把减废同时看作成本与环境绩效问题。
  sourceRefs:
  - 15
  - 26
validationSignals:
- point: Vori 在 2026 年 5 月融资 $22M，并表示平台已处理 $500M，说明独立杂货商软件既拿到了投资人信心，也确实跑出了真实交易量。
  sourceRefs:
  - 1
  - 28
- point: Afresh 拿得出 Albertsons 和 Fresh Thyme 等公开客户案例，说明杂货商已经愿意采购 AI 原生的生鲜运营软件。
  sourceRefs:
  - 14
  - 13
- point: Upshop 持续发布 markdown 优化和 computer-generated ordering 的案例，说明市场愿意把生鲜自动化从 dashboard 真正推进到运营现场。
  sourceRefs:
  - 18
  - 19
- point: RELEX 仍在拿下 Hy-Vee 这类聚焦新鲜度与在架可得性的杂货部署，说明这个品类对大零售商依然是战略级项目。
  sourceRefs:
  - 22
- point: 行业媒体和协会证据都显示，杂货商更广泛地把 POS 与生鲜库存技术提上优先级，这降低了品类教育成本。
  sourceRefs:
  - 7
  - 27
- point: Vori 与 KeHE、TrueCommerce 的合作，说明生态伙伴更愿意把供应商和订货流程数字化，而不是继续守着遗留的手工流程。
  sourceRefs:
  - 30
  - 31
openQuestions:
- 美国 5–30 店杂货连锁里，到底有多少已经把当天生鲜 markdown 和补货决策集中到总部，而不是完全留给门店？
- 独立连锁要看到多大的 shrink 降幅或毛利提升，才会从单部门扩到全链 rollout？
- 最常在早期部署里出问题的集成究竟是哪类：item master、供应商数据流、价格执行，还是损耗记录？
- grocery OS 厂商和批发伙伴会把易腐品 autopilot 当成互补型 attach 产品，还是自己准备吸收掉的功能？
