competitors:
- name: Vori
  stage: scale-up
  wedge: All-in-one grocery OS for independent grocers spanning POS, pricing, ordering, loyalty, and reporting.
  pricing: Custom / contact sales; no public list pricing on fetched site.
  strength: Strong independent-grocer positioning and control of the operational data backbone.
  weaknessVsUs: Broader system-of-record scope can make Vori less specialized on intra-day perishables decisions than a dedicated autopilot.
  sourceRefs:
  - 2
  - 3
  - 28
- name: Afresh
  stage: scale-up
  wedge: AI-native fresh ordering, production planning, and inventory management platform.
  pricing: Custom / contact sales; no public list pricing on fetched site.
  strength: Deep fresh-category credibility with named customers such as Albertsons and Fresh Thyme plus a clear low-IT-lift deployment pitch.
  weaknessVsUs: More centered on broader fresh planning and larger-chain workflows than on a lightweight independent-chain decision layer.
  sourceRefs:
  - 11
  - 12
  - 14
  - 13
- name: Upshop
  stage: scale-up
  wedge: Fresh operations suite covering AI forecasting, ordering, markdown optimization, and food-waste execution.
  pricing: Custom / contact sales; no public list pricing on fetched site.
  strength: Execution-heavy fresh tooling with visible markdown and ordering case studies.
  weaknessVsUs: Breadth can make the product feel like a larger operations suite rather than a tight perishables-margin wedge for 5–30 store chains.
  sourceRefs:
  - 16
  - 18
  - 19
- name: RELEX Solutions
  stage: incumbent
  wedge: Enterprise forecasting, replenishment, merchandising, and supply-chain optimization suite for grocery retailers.
  pricing: Custom / contact sales; no public list pricing on fetched site.
  strength: Strong enterprise credibility, broad optimization surface, and marquee grocery wins.
  weaknessVsUs: Likely heavier, broader, and more expensive to deploy than a focused perishables autopilot for regional independents.
  sourceRefs:
  - 20
  - 21
  - 22
