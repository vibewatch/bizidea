market:
  tam:
    value: $658.2M
    rationale: 'Bottom-up estimate: 27,425 U.S. grocery establishments with 20–499 employees [10] × est. $24k annual subscription per store for fresh decision automation = $658.2M. FMI’s broader 45,575-store supermarket count is a top-down check that the modeled unit base is conservative [9].'
    isEstimate: true
    sourceRefs:
    - 9
    - 10
  sam:
    value: $164.6M
    rationale: 'Beachhead SAM assumes ~25% of the 27,425-store fit universe belongs to 5–30 store regional/independent chains with centralized merchandising and modern enough data pipes: 6,856 stores × $24k = $164.6M. The 25% filter is an explicit estimate anchored to Vori’s built-for-independent-grocers positioning and the narrower beachhead definition.'
    isEstimate: true
    sourceRefs:
    - 2
    - 10
  som:
    value: $2.9M
    rationale: Year-3 SOM assumes 120 live stores (for example 10 chains × 12 stores or 15 chains × 8 stores) reached through pilot-to-rollout expansion; 120 × $24k = $2.88M. This is intentionally conservative relative to the modeled SAM and reflects long grocery procurement and change-management cycles.
    isEstimate: true
    sourceRefs:
    - 12
    - 19
    - 32
