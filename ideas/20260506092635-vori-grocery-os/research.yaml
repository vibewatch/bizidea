openQuestions:
- How many U.S. 5–30 store grocery chains actually have centralized authority over same-day fresh markdown and reorder decisions versus leaving them entirely to store managers?
- What minimum shrink reduction or gross-margin lift convinces an independent chain to expand from one department to chainwide rollout?
- 'Which integrations most often break early deployments: item master quality, supplier feeds, price execution, or spoilage logging?'
- Will grocery OS and wholesaler partners treat a perishables autopilot as a complementary attach product or as a feature they plan to absorb?
