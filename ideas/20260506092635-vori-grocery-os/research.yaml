  adoptionFrictionMatrix:
  - friction: Item-master, spoilage-code, and inventory-data quality varies widely by chain.
    severity: high
    affectedBuyer: VP Merchandising / IT
    mitigation: Start with chains already on modern POS or grocery OS and run a data-readiness audit before pilot kickoff.
