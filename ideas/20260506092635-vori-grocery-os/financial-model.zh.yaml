scenarios:
  downside:
    description: 销售周期被拉长，只有一部分试点能转正式生产，到 Y3 末 live stores 只能到约 90 家，而不是 120 家。
    y3RevenueK: 1600.0
    y3EbitdaK: -650.0
    cashLowPointK: 170.0
    keyAssumptionChanges:
      - 销售周期从 6 个月拉长到 9 个月。
      - Y3 末 live stores 从 120 家降到约 90 家。
      - 由于 onboarding 仍偏服务化，毛利率从 70% 降到 67%。
  base:
    description: Y1 有一个试点转正式生产；Y2 末 live stores 达到 40 家，Y3 末达到 120 家；毛利率维持在商业计划目标的 70%。
    y3RevenueK: 2112.0
    y3EbitdaK: -276.6
    cashLowPointK: 498.5
    keyAssumptionChanges:
      - 销售周期维持在约 6 个月。
      - 试点转正式生产维持在商业计划设定的 50% 下限。
      - 首次 rollout 平均约 8 家门店，成熟连锁到 Y3 约 12 家门店。
  upside:
    description: 伙伴转介绍在 Y2 开始起效，Y3 末 live stores 达到约 140 家，更优的定价结构让业务接近 EBITDA breakeven。
    y3RevenueK: 2550.0
    y3EbitdaK: 80.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - 销售周期从 6 个月压缩到 4-5 个月。
      - Y3 末 live stores 从 120 家提高到约 140 家。
      - 因绩效费占比更高、跨店扩张更快，每家 live store 的混合收入更好。
sensitivity:
  - variable: ARPU
    downsideCase: $24.0K blended annual revenue per live store
    baseCase: $25.9K blended annual revenue per live store
    upsideCase: $27.5K blended annual revenue per live store
    y3RevenueImpactK: -155.0
    cashImpactK: -109.0
  - variable: CAC
    downsideCase: $12.0K CAC per live store because pilots stay founder-heavy and partner referrals do not materialize
    baseCase: $10.0K CAC per live store
    upsideCase: $8.0K CAC per live store from referral leverage and faster chain expansion
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: 1.5% monthly store churn as weak pilots fail to expand
    baseCase: 0.8% monthly store churn
    upsideCase: 0.4% monthly store churn after margin lift is proven
    y3RevenueImpactK: -120.0
    cashImpactK: -90.0
  - variable: sales cycle
    downsideCase: 9 months because buyers demand more proof and integrations
    baseCase: 6 months
    upsideCase: 4-5 months after one strong reference account
    y3RevenueImpactK: -360.0
    cashImpactK: -250.0
  - variable: gross margin
    downsideCase: 65% from heavier implementation and support work
    baseCase: 70%
    upsideCase: 72% after onboarding and integrations become repeatable
    y3RevenueImpactK: 0.0
    cashImpactK: -130.0
  - variable: hiring pace
    downsideCase: Pull backend/data and second AE forward by two quarters before proof of repeatable rollout
    baseCase: Milestone-based hiring tied to live-store growth
    upsideCase: Delay one commercial hire until after 60 live stores
    y3RevenueImpactK: -40.0
    cashImpactK: -220.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      QualifiedChains --> PaidPilots
      PaidPilots --> LiveStores
      LiveStores --> SubscriptionRevenue
      LiveStores --> PilotAndFeeRevenue
      SubscriptionRevenue --> GrossProfit
      PilotAndFeeRevenue --> GrossProfit
      GrossProfit --> Cash
      Opex --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形的收入主要来自 live stores 从 Y1 末的 8 家扩到 Y3 末的 120 家，同时按约 $24K 订阅 ARR 叠加少量试点和实施费用。
  - checkName: 必须成立的前提
    finding: 模型要求首批试点能够转正式生产，并在每条连锁里扩到大约 8-12 家门店，才能让每家 live store 的 CAC 维持高效。
  - checkName: 模型会在哪种情况下失效
    finding: 如果销售周期超过 6 个月且 rollout 卡在约 90 家 live stores 以下，现金会明显吃紧；downside 情形下最低现金仅约 $170K。
  - checkName: 下一轮融资所需证明
    finding: 只要公司在 Y2 末做到 3-5 家正式生产连锁、40 家 live stores，并把 30 天 onboarding 跑成可复制流程，就足以支撑下一轮融资。
sanityChecks:
  ruleOf40: Y3 growth 266.7% + EBITDA margin -13.1% = 253.6%
  burnMultiple: Y1 burn multiple ~7.3x, improving to ~1.8x in Y2 and ~0.2x in Y3 as live-store expansion starts to outgrow burn.
  revenuePerFte: "$235K Y3 on 9 year-end FTE (benchmark $200–400K SaaS)"
  flags:
    - 基准情形假设到 Y3 末能跑到 120 家 live stores，但“当天生鲜决策是否足够集中”仍是一个核心待验证风险。
    - 如果早期连锁需要更多定制化数据清洗或服务型 onboarding，70% 毛利率可能偏乐观。
    - CAC 看起来很漂亮，是因为模型假设每条新连锁首轮就能扩到约 8 家门店；如果 rollout 更小，回本周期会明显变差。
    - 收入仍集中在少数几条杂货连锁里，因此只要一条连锁延后扩张，Y3 结果就会明显波动。
