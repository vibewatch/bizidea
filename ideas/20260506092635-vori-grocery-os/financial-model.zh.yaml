scenarios:
  downside:
    description: 销售周期拉长，只有部分试点能转正式，到 Y3 期末在营门店约 90 家，而不是 120 家。
    y3RevenueK: 1600.0
    y3EbitdaK: -650.0
    cashLowPointK: 170.0
    keyAssumptionChanges:
      - 销售周期从 6 个月拉长到 9 个月。
      - Y3 期末在营门店从 120 家降到约 90 家。
      - 由于导入流程仍偏服务化，毛利率从 70% 滑到 67%。
  base:
    description: Y1 有一个试点转正式，Y2 期末做到 40 家在营门店，Y3 期末做到 120 家，毛利率守住商业计划里的 70% 目标。
    y3RevenueK: 2112.0
    y3EbitdaK: -276.6
    cashLowPointK: 498.5
    keyAssumptionChanges:
      - 销售周期稳定在约 6 个月。
      - 试点转正式维持在商业计划给出的 50% 下沿。
      - 首次正式铺店平均约 8 家，成熟连锁到 Y3 平均扩到约 12 家门店。
  upside:
    description: 伙伴转介绍在 Y2 开始起作用，Y3 期末在营门店约 140 家，价格结构也更好，业务接近 EBITDA 盈亏平衡。
    y3RevenueK: 2550.0
    y3EbitdaK: 80.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - 销售周期从 6 个月缩短到 4-5 个月。
      - Y3 期末在营门店从 120 家升到约 140 家。
      - 由于绩效费占比更高、跨门店扩张更快，每家在营门店的混合收入进一步提高。
sensitivity:
  - variable: ARPU
    downsideCase: 每家在营门店混合年收入 $24.0K
    baseCase: 每家在营门店混合年收入 $25.9K
    upsideCase: 每家在营门店混合年收入 $27.5K
    y3RevenueImpactK: -155.0
    cashImpactK: -109.0
  - variable: CAC
    downsideCase: CAC 升到每家门店 $12.0K，因为试点仍高度依赖创始人推进，伙伴转介绍也没起来
    baseCase: 每家门店 CAC 为 $10.0K
    upsideCase: 借助转介绍和更大的链内扩店，CAC 降到每家门店 $8.0K
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: 月度门店流失率 1.5%，因为弱试点没能扩张
    baseCase: 月度门店流失率 0.8%
    upsideCase: 在毛利提升被验证后，月度门店流失率降到 0.4%
    y3RevenueImpactK: -120.0
    cashImpactK: -90.0
  - variable: sales cycle
    downsideCase: 买方要求更多证明与集成，销售周期拉长到 9 个月
    baseCase: 6 个月
    upsideCase: 在拿到一个强参考客户后缩到 4-5 个月
    y3RevenueImpactK: -360.0
    cashImpactK: -250.0
  - variable: gross margin
    downsideCase: 因实施和支持更重，毛利率降到 65%
    baseCase: 70%
    upsideCase: 导入流程与集成变得可复制后，毛利率升到 72%
    y3RevenueImpactK: 0.0
    cashImpactK: -130.0
  - variable: hiring pace
    downsideCase: 在铺店可复制性尚未验证前，就把后端/数据工程师和第二位 AE 提前两个季度招进来
    baseCase: 招聘节奏和在营门店增长挂钩
    upsideCase: 将一个商业岗位延后到 60 家在营门店之后再招
    y3RevenueImpactK: -40.0
    cashImpactK: -220.0
modelDiagram:
  title: 单位经济路径
  mermaid: |
    flowchart LR
      QualifiedChains --> PaidPilots
      PaidPilots --> LiveStores
      LiveStores --> SubscriptionRevenue
      LiveStores --> PilotAndFeeRevenue
      SubscriptionRevenue --> GrossProfit
      PilotAndFeeRevenue --> GrossProfit
      GrossProfit --> Cash
      Opex --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基线收入来自在营门店从 Y1 期末 8 家扩到 Y3 期末 120 家，单店按约 $24K 订阅 ARR，再加少量试点和实施费。
  - checkName: 必须跑通的地方
    finding: 模型要求前几个试点不仅能转正式，还要能在单条连锁里扩到约 8–12 家门店，这样每家门店的 CAC 才会足够健康。
  - checkName: 模型会在哪种情况下失灵
    finding: 如果销售周期超过 6 个月、铺店规模又卡在约 90 家以下，现金会明显吃紧，因为 downside 情形的最低现金只剩约 $170K。
  - checkName: 下一轮融资证明点
    finding: 当公司在 Y2 期末做到 3–5 家正式连锁、40 家在营门店，并把 30 天导入流程跑顺之后，下一轮融资理由才真正站稳。
sanityChecks:
  ruleOf40: Y3 增长率 266.7% + EBITDA 利润率 -13.1% = 253.6%
  burnMultiple: Y1 burn multiple 约 7.3x，Y2 改善到约 1.8x，Y3 进一步到约 0.2x，因为在营门店扩张开始快过 burn。
  revenuePerFte: Y3 年末 9 名 FTE 对应每人约 $235K 收入（SaaS 基准 $200–400K）
  flags:
    - 基线情形假设 Y3 期末能做到 120 家在营门店，但“当天生鲜决策是否足够集中”仍是核心待验证风险。
    - 如果早期连锁需要更多定制化数据清洗或更重实施，毛利率维持 70% 可能会偏乐观。
    - CAC 看起来很好，前提是首轮正式部署平均能在单条连锁里铺开约 8 家门店；若铺店更小，payback 会明显变差。
    - 收入仍集中在少数几条杂货连锁里，所以任何一家客户扩张延迟，都会对 Y3 结果产生明显影响。
