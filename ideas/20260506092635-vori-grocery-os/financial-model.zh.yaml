slug: perishable-margin-autopilot
date: '2026-05-06'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-06] 计划日期后的第一个完整运营月份。'
- id: A2
  name: 收入单位
  value: Live store-month
  unit: customer definition
  source: '[BP businessModel.unitOfValue] 收入按上线门店-月变现，而非按连锁 logo 变现。'
- id: A3
  name: 基础正式订阅价格
  value: '24.0'
  unit: USDK per store-year
  source: '[BP gtm.pricing + research.market.bottomUpSizingDrivers] 基础正式软件定价接近研究中的单店约 $24k ARR 情形。'
- id: A4
  name: 每家上线门店的综合收入
  value: '25.9'
  unit: USDK per store-year
  source: '[BP businessModel.revenueStreams + BP investorMemo.firstCustomer.initialContract] 模型在 $24k 基础上加入约 8% 的温和提升，来自试点、实施和绩效费的组合。'
- id: A5
  name: 上线门店爬坡
  value: 8 live stores by Y1 exit, 40 by Y2 exit, 120 by Y3 exit
  unit: stores
  source: '[BP milestones + research.market.som] 商业计划在 12-24 个月内目标达到 3-5 条正式上线连锁，而研究中的 SOM 假设第 3 年约有 120 家上线门店。'
- id: A6
  name: 每条连锁的平均上线规模
  value: 8 stores at first production rollout, ~12 stores per mature chain by Y3
  unit: stores per chain
  source: '[BP executiveSummary first customer 8-20 store chain + research.market.som example of ~10 chains x 12 stores] 用于将拿下的连锁客户转换为上线门店增长。'
- id: A7
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 稳态目标毛利率。'
- id: A8
  name: 销售成本占比
  value: '30'
  unit: percent of revenue
  source: '[BP businessModel.targetGrossMarginPct] 将销售成本设为收入的 30%，从而对应 70% 目标毛利率。'
- id: A9
  name: 门店月流失率
  value: '0.8'
  unit: percent
  source: 创业公司财务经验假设：一旦连锁验证了可衡量的损耗下降和毛利提升，这类 B2B 运营软件会较为粘性，但早期推广仍存在一定风险。
- id: A10
  name: 平均销售周期
  value: '6'
  unit: months
  source: '[BP investorMemo.riskHeatmap + research.categoryDynamics.headwinds] 毛利受压的杂货商使采购过程高度依赖 ROI，因此模型按约 6 个月成交周期处理。'
- id: A11
  name: 每家上线门店的 fully loaded CAC
  value: '10.0'
  unit: USDK per store
  source: 创业公司财务经验假设，基于创始人主导的连锁销售加合作伙伴转介：约 $80k 的连锁 CAC，分摊到首批 8 家门店上线。
- id: A12
  name: 试点转正式上线率
  value: '50'
  unit: percent
  source: '[BP gtm.funnelTargets] 基准情形采用所述 50%+ 试点转正式目标的下限。'
- id: A13
  name: 模型中的 pre-seed 融资起始现金
  value: '2400'
  unit: USDK
  source: '[BP fundingAsk.targetFundingRangeUsd] 模型在所述 $2M-$4M 区间内采用偏保守的 pre-seed 融资额。'
- id: A14
  name: 全口径薪酬附加比例
  value: '20'
  unit: percent benefits and payroll tax
  source: 创业公司财务经验假设；所有年化薪酬均按 fully loaded 口径，而非仅按基础工资。
- id: A15
  name: 全口径现金薪酬基准
  value: Founder CEO $150k, founding eng $160k, founding product/ops $140k, integration eng $150k, implementation lead $110k, AE1 $130k OTE, backend/data eng $150k, AE2 $135k OTE, customer success lead $110k; all before 20% load
  unit: annual USD
  source: 针对美国精简 pre-seed SaaS 团队的创业公司财务经验假设，现金薪酬低于大科技公司水平。
- id: A16
  name: 招聘节奏
  value: Founder trio at start; integration engineer in Q2Y1; implementation lead in Q4Y1; first AE in Q2Y2; backend/data engineer in Q4Y2; second AE in Q1Y3; customer success lead in Q3Y3
  unit: headcount plan
  source: '[BP team + BP strategicChoices.sequencingRationale] 招聘会延后到试点转化、且上线流程可复制之后。'
- id: A17
  name: 非薪酬运营支出爬坡
  value: ~$10k per month in Q1Y1 rising to ~$34k per month in Q4Y3
  unit: USDK per month
  source: '[BP operations + BP fundingAsk.useOfFundsSummary] 覆盖云工具、差旅、法务、财务、软件和行业活动支出，不假设大规模付费营销。'
- id: A18
  name: 现金转换假设
  value: EBITDA approximates operating cash flow
  unit: policy
  source: 创业公司财务经验假设；模型不包含债务、资本开支或显著营运资本波动。
- id: A19
  name: 融资里程碑
  value: Reach 3-5 production chains, 40 live stores, and a repeatable 30-day onboarding motion by the end of Y2
  unit: milestone
  source: '[BP milestones 12-24 months + BP operations] 用于确定本轮融资规模，并预留 6 个月现金缓冲。'
