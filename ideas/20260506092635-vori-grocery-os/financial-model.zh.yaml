scenarios:
  downside:
    description: 销售周期拉长，只有部分试点能转化，到 Y3 结束时上线门店仅约 90 家，而非 120 家。
    y3RevenueK: 1600.0
    y3EbitdaK: -650.0
    cashLowPointK: 170.0
    keyAssumptionChanges:
    - 销售周期从 6 个月延长至 9 个月。
    - Y3 结束时的上线门店从 120 家降至约 90 家。
    - 由于上线仍偏重服务，毛利率从 70% 下滑到 67%。
  base:
    description: Y1 有一个试点转化，Y2 结束时上线门店达到 40 家，Y3 结束时达到 120 家，毛利率保持在商业计划中的 70% 目标。
    y3RevenueK: 2112.0
    y3EbitdaK: -276.6
    cashLowPointK: 498.5
    keyAssumptionChanges:
    - 销售周期维持在约 6 个月。
    - 试点转正式上线率维持在商业计划 50% 底线。
    - 首次推广平均约 8 家门店，成熟连锁到 Y3 平均约 12 家门店。
  upside:
    description: 合作伙伴转介在 Y2 开始起效，Y3 结束时上线门店达到约 140 家，更优的定价组合使业务接近 EBITDA 盈亏平衡。
    y3RevenueK: 2550.0
    y3EbitdaK: 80.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - 销售周期从 6 个月压缩至 4-5 个月。
    - Y3 结束时的上线门店从 120 家提升至约 140 家。
    - 通过更高比例的绩效费和更快的多店扩张，每家上线门店的综合收入有所提升。
sensitivity:
- variable: ARPU
  downsideCase: $24.0K 每家上线门店的综合年收入
  baseCase: $25.9K 每家上线门店的综合年收入
  upsideCase: $27.5K 每家上线门店的综合年收入
  y3RevenueImpactK: -155.0
  cashImpactK: -109.0
- variable: CAC
  downsideCase: 由于试点仍高度依赖创始人且未形成合作伙伴转介，每家上线门店 CAC 为 $12.0K
  baseCase: 每家上线门店 CAC 为 $10.0K
  upsideCase: 依靠转介杠杆和更快的连锁扩张，每家上线门店 CAC 降至 $8.0K
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: churn
  downsideCase: 若弱试点无法扩展，门店月流失率为 1.5%
  baseCase: 门店月流失率为 0.8%
  upsideCase: 在毛利提升被证明后，门店月流失率降至 0.4%
  y3RevenueImpactK: -120.0
  cashImpactK: -90.0
- variable: sales cycle
  downsideCase: 因买方要求更多证明和集成，销售周期为 9 个月
  baseCase: 6 个月
  upsideCase: 在有一个强参考客户后，销售周期为 4-5 个月
  y3RevenueImpactK: -360.0
  cashImpactK: -250.0
- variable: gross margin
  downsideCase: 因实施和支持工作更重，毛利率为 65%
  baseCase: 70%
  upsideCase: 在上线和集成可复制后，毛利率为 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -130.0
- variable: hiring pace
  downsideCase: 在证明可复制推广之前，就将后端/数据工程师和第二名客户经理提前 2 个季度招聘
  baseCase: 与上线门店增长挂钩的里程碑式招聘
  upsideCase: 将一个商业岗位延后到 60 家上线门店之后再招
  y3RevenueImpactK: -40.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  QualifiedChains[合格连锁] --> PaidPilots[付费试点]\n  PaidPilots --> LiveStores[上线门店]\n  LiveStores --> SubscriptionRevenue[订阅收入]\n  LiveStores --> PilotAndFeeRevenue[试点与费用收入]\n  SubscriptionRevenue --> GrossProfit[毛利润]\n  PilotAndFeeRevenue --> GrossProfit\n  GrossProfit --> Cash[现金]\n  Opex[运营支出] --> Cash\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形收入由上线门店从 Y1 结束时的 8 家扩张到 Y3 结束时的 120 家驱动，单店订阅 ARR 约 $24K，另叠加温和的试点与实施费用。
- checkName: 必须成立的条件
  finding: 模型要求首批试点能完成转化，并在每条连锁中扩展到约 8-12 家门店，这样每家上线门店 CAC 才能保持高效率。
- checkName: 模型失效条件
  finding: 如果销售周期拉长到 6 个月以上，且上线规模停滞在约 90 家门店以下，现金会变得紧张，因为 downside 情形下现金会降至约 $170K。
- checkName: 下一轮融资所需证明
  finding: 当公司在 Y2 结束时达到 3-5 条正式上线连锁、40 家上线门店，以及可复制的 30 天上线动作时，下一轮融资就具备合理性。
sanityChecks:
  ruleOf40: Y3 growth 266.7% + EBITDA margin -13.1% = 253.6%
  burnMultiple: Y1 burn multiple 约为 7.3x，Y2 改善至约 1.8x，Y3 进一步改善至约 0.2x，因为上线门店扩张开始跑赢 burn。
  revenuePerFte: Y3 年末 9 名 FTE 对应每人约 $235K 收入（SaaS 基准为 $200–400K）
  flags:
  - 基准情形假设到 Y3 结束时能达到 120 家上线门店，尽管集中化的当日生鲜决策权仍是核心验证风险。
  - 如果早期连锁需要比计划更多的定制数据清洗或服务型上线，毛利率维持在 70% 可能过于乐观。
  - CAC 看起来有吸引力，只是因为模型假设首批连锁推广可一次落地约 8 家门店；若推广规模更小，回本周期会明显变差。
  - 收入仍集中在少数几条杂货连锁上，因此任何一次扩张延迟都可能显著影响 Y3 结果。
