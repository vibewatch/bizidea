slug: perishable-margin-autopilot
date: '2026-05-06'
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-06
    unit: YYYY-MM
    source: '[BP date 2026-05-06] 以商业计划日期后的首个完整运营月作为起点。'
  - id: A2
    name: 收入口径
    value: 在营门店-月
    unit: customer definition
    source: '[BP businessModel.unitOfValue] 收入按在营门店-月计费，而不是按连锁 logo 计费。'
  - id: A3
    name: 正式部署基础订阅单价
    value: '24.0'
    unit: USDK per store-year
    source: '[BP gtm.pricing + research.market.bottomUpSizingDrivers] 正式软件单价锚定在研究里每店约 $24k ARR 的区间。'
  - id: A4
    name: 每家在营门店的混合收入
    value: '25.9'
    unit: USDK per store-year
    source: '[BP businessModel.revenueStreams + BP investorMemo.firstCustomer.initialContract] 模型在 $24k 基础订阅之上，再加约 8% 的试点、实施和绩效费抬升。'
  - id: A5
    name: 在营门店爬坡
    value: Y1 期末 8 家、Y2 期末 40 家、Y3 期末 120 家
    unit: stores
    source: '[BP milestones + research.market.som] 商业计划要求 12–24 个月做到 3–5 家正式连锁，研究里的 SOM 则以第 3 年约 120 家在营门店为基线。'
  - id: A6
    name: 每条连锁的平均首轮铺店规模
    value: 首次正式铺开约 8 家门店，Y3 成熟客户约 12 家门店
    unit: stores per chain
    source: '[BP executiveSummary first customer 8-20 store chain + research.market.som example of ~10 chains x 12 stores] 用来把连锁赢单换算成在营门店增长。'
  - id: A7
    name: 目标毛利率
    value: '70'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct] 稳态目标毛利率。'
  - id: A8
    name: COGS 占比
    value: '30'
    unit: percent of revenue
    source: '[BP businessModel.targetGrossMarginPct] 将 COGS 设为收入的 30%，对应 70% 毛利率。'
  - id: A9
    name: 月度门店流失率
    value: '0.8'
    unit: percent
    source: 启发式创业财务假设：一旦运营软件证明能改善 shrink 和毛利，粘性会较强，但早期铺店仍存在一定流失风险。
  - id: A10
    name: 平均销售周期
    value: '6'
    unit: months
    source: '[BP investorMemo.riskHeatmap + research.categoryDynamics.headwinds] 毛利承压的杂货买方会把采购做得极其 ROI 导向，因此按约 6 个月建模。'
  - id: A11
    name: 每家在营门店的完全摊薄 CAC
    value: '10.0'
    unit: USDK per store
    source: 启发式创业财务假设：以创始人主导的连锁销售配合伙伴转介绍为基础，按单条连锁约 $80k CAC、首次铺 8 家店摊开。
  - id: A12
    name: 试点转正式比例
    value: '50'
    unit: percent
    source: '[BP gtm.funnelTargets] 基线情形采用 50%+ 目标的下沿。'
  - id: A13
    name: 预设 pre-seed 融资带来的期初现金
    value: '2400'
    unit: USDK
    source: '[BP fundingAsk.targetFundingRangeUsd] 模型在 $2M-$4M 区间里采用偏保守的融资额。'
  - id: A14
    name: 薪酬 fully loaded 系数
    value: '20'
    unit: percent benefits and payroll tax
    source: 启发式创业财务假设；所有年化薪酬都按 fully loaded 口径计，而不是只算基本工资。
  - id: A15
    name: Fully loaded 现金薪酬基准
    value: 创始人/CEO $150k、创始工程师 $160k、创始产品/运营 $140k、集成工程师 $150k、实施负责人 $110k、销售 AE1 $130k OTE、后端/数据工程师 $150k、销售 AE2 $135k OTE、客户成功负责人 $110k；以上均未含 20% load
    unit: annual USD
    source: 面向美国精干 pre-seed SaaS 团队的启发式假设，现金薪酬低于大厂水平。
  - id: A16
    name: 招聘节奏
    value: 创始三人组从 Day 1 上岗；Q2Y1 招集成工程师；Q4Y1 招实施负责人；Q2Y2 招首位 AE；Q4Y2 招后端/数据工程师；Q1Y3 招第二位 AE；Q3Y3 招客户成功负责人
    unit: headcount plan
    source: '[BP team + BP strategicChoices.sequencingRationale] 只有等试点转正式、导入流程开始可复制后，才逐步补人。'
  - id: A17
    name: 非薪酬运营开支爬坡
    value: Q1Y1 每月约 $10k，逐步升至 Q4Y3 每月约 $34k
    unit: USDK per month
    source: '[BP operations + BP fundingAsk.useOfFundsSummary] 覆盖云服务、差旅、法务、会计、软件和行业活动支出，不假设大规模付费投放。'
  - id: A18
    name: 现金转换假设
    value: EBITDA 近似经营现金流
    unit: policy
    source: 启发式创业财务假设；模型不含债务、资本开支或显著营运资本波动。
  - id: A19
    name: 下一轮融资里程碑
    value: 在 Y2 结束前做到 3–5 家正式连锁、40 家在营门店，并形成可复制的 30 天导入动作
    unit: milestone
    source: '[BP milestones 12-24 months + BP operations] 以此来反推本轮融资规模，并额外留 6 个月现金缓冲。'
