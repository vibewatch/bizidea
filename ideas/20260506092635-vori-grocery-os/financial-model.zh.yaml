slug: perishable-margin-autopilot
date: '2026-05-06'
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-06
    unit: YYYY-MM
    source: '[BP date 2026-05-06] 计划日期后的首个完整运营月份。'
  - id: A2
    name: 收入单位
    value: live store-month
    unit: customer definition
    source: '[BP businessModel.unitOfValue] 收入按 live store-month 计费，而不是按连锁 logo 计费。'
  - id: A3
    name: 基础正式生产订阅价格
    value: '24.0'
    unit: USDK per store-year
    source: '[BP gtm.pricing + research.market.bottomUpSizingDrivers] 基础正式生产软件价格接近研究测算里约 $24k 的单店 ARR。'
  - id: A4
    name: 每家 live store 的混合收入
    value: '25.9'
    unit: USDK per store-year
    source: '[BP businessModel.revenueStreams + BP investorMemo.firstCustomer.initialContract] 模型在 $24k 基础上加入约 8% 的 uplift，来自试点、实施和绩效费混合。'
  - id: A5
    name: Live-store 爬坡
    value: 8 live stores by Y1 exit, 40 by Y2 exit, 120 by Y3 exit
    unit: stores
    source: '[BP milestones + research.market.som] 商业计划目标是在 12-24 个月跑到 3-5 家正式连锁，研究中的 SOM 也假设第 3 年约 120 家 live stores。'
  - id: A6
    name: 每条连锁首次 rollout 的平均门店数
    value: 8 stores at first production rollout, ~12 stores per mature chain by Y3
    unit: stores per chain
    source: '[BP executiveSummary first customer 8-20 store chain + research.market.som example of ~10 chains x 12 stores] 用来把连锁签约数转换成 live-store 增长。'
  - id: A7
    name: 毛利率目标
    value: '70'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct] 稳态目标毛利率。'
  - id: A8
    name: COGS 比率
    value: '30'
    unit: percent of revenue
    source: '[BP businessModel.targetGrossMarginPct] 把 COGS 设为收入的 30%，对应 70% 毛利率目标。'
  - id: A9
    name: 月度门店流失率
    value: '0.8'
    unit: percent
    source: 对已证明能带来损耗改善和毛利提升、因而具备黏性的 B2B 运营软件所采用的 startup-finance 假设，但仍保留一定早期 rollout 风险。
  - id: A10
    name: 平均销售周期
    value: '6'
    unit: months
    source: '[BP investorMemo.riskHeatmap + research.categoryDynamics.headwinds] 利润承压的杂货商采购会高度看 ROI，因此按约 6 个月建模。'
  - id: A11
    name: 每家 live store 的 fully loaded CAC
    value: '10.0'
    unit: USDK per store
    source: 基于创始人主导的连锁销售加伙伴转介绍的 startup-finance 假设：约 $80k 的单条连锁 CAC，摊到首批 8 家门店 rollout 上。
  - id: A12
    name: 试点转正式生产率
    value: '50'
    unit: percent
    source: '[BP gtm.funnelTargets] 基准情形采用 50%+ 目标的下限。'
  - id: A13
    name: 预估 pre-seed 融资带来的期初现金
    value: '2400'
    unit: USDK
    source: '[BP fundingAsk.targetFundingRangeUsd] 模型采用所述 $2M-$4M 区间中偏保守的一笔 pre-seed 融资。'
  - id: A14
    name: 全负担薪酬加载系数
    value: '20'
    unit: percent benefits and payroll tax
    source: Startup-finance 假设；所有年化薪酬都按 fully loaded 口径而不是基础工资口径计算。
  - id: A15
    name: 全负担现金薪酬基准
    value: Founder CEO $150k, founding eng $160k, founding product/ops $140k, integration eng $150k, implementation lead $110k, AE1 $130k OTE, backend/data eng $150k, AE2 $135k OTE, customer success lead $110k; all before 20% load
    unit: annual USD
    source: 面向精简美国 pre-seed SaaS 团队、低于大厂水平现金薪酬的 startup-finance 假设。
  - id: A16
    name: 招聘节奏
    value: Founder trio at start; integration engineer in Q2Y1; implementation lead in Q4Y1; first AE in Q2Y2; backend/data engineer in Q4Y2; second AE in Q1Y3; customer success lead in Q3Y3
    unit: headcount plan
    source: '[BP team + BP strategicChoices.sequencingRationale] 只有当试点能转正式生产、onboarding 开始可复制后，才逐步加人。'
  - id: A17
    name: 非薪酬运营支出爬坡
    value: ~$10k per month in Q1Y1 rising to ~$34k per month in Q4Y3
    unit: USDK per month
    source: '[BP operations + BP fundingAsk.useOfFundsSummary] 覆盖云资源、差旅、法务、会计、软件和行业活动支出，但不假设大规模付费营销。'
  - id: A18
    name: 现金转换
    value: EBITDA approximates operating cash flow
    unit: policy
    source: Startup-finance 假设；模型里不纳入债务、capex 或显著的营运资本波动。
  - id: A19
    name: 下一轮融资里程碑
    value: Reach 3-5 production chains, 40 live stores, and a repeatable 30-day onboarding motion by the end of Y2
    unit: milestone
    source: '[BP milestones 12-24 months + BP operations] 用来确定本轮融资规模，并预留约 6 个月现金缓冲。'
