problem: "Independent grocers lose margin every day in produce, meat, bakery, and deli because markdowns, transfers, and reorder calls are still made by store managers using gut feel. They cannot match Walmart-scale merchandising science, yet a bad call on fresh inventory can erase an entire day's profit. Existing grocery software records what happened but rarely tells a store what to do in the next four hours."
targetUser:
  primary: "VP Merchandising or fresh-operations lead at a 5-30 store independent grocery chain"
  secondary: "Produce, meat, deli, and bakery managers at each store"
  buyer: "VP Merchandising, COO, or owner-operator"
startupThesis:
  nonObviousInsight: "The new opportunity is not another grocery system of record; it is a decision layer on top of newly unified payments, inventory, and pricing data that can automate perishable actions store by store, hour by hour."
  beachhead: "Independent regional grocers with 5-30 stores and high fresh mix, starting with daily markdown and reorder decisions for produce and meat departments."
  wedge: "A perishables margin autopilot that recommends and pushes same-day markdowns, reorder cuts, and inter-store transfer actions for fresh categories."
  whyNowCatalyst: "Vori's funding, traction, and self-driving grocery positioning show that independents finally have the live data infrastructure needed to trust automated merchandising decisions."
  ventureScalePath: "Start with perishables decisions, then expand into vendor ordering, promo planning, private-label assortment, labor forecasting, and retailer media monetization as the chain's merchandising control plane."
solution: "The product plugs into a grocer's POS, inventory, and pricing stack and builds a live view of each store's fresh-item velocity, margin, and expiry risk. Every morning and intraday, it generates SKU-store recommendations for markdown timing, price depth, reorder suppression, and transfer opportunities between nearby stores. Store managers approve or auto-apply actions inside a lightweight workflow, and the system measures recovered gross margin and shrink reduction against a baseline. Over time, the software learns each chain's demand patterns, vendor cadence, and markdown elasticity so more categories can run in auto-pilot mode."
goToMarketSeed:
  firstCustomer: "An 8-20 store independent grocery chain in the U.S. with centralized merchandising, meaningful produce and meat shrink, and a modern cloud POS or grocery OS deployment."
  buyingTrigger: "A new inventory or pricing system rollout, or a quarter where shrink and gross-margin variance force leadership to look for fast operational savings."
  currentAlternative: "Department-manager intuition, Excel-based ordering sheets, static markdown rules, and periodic consulting from wholesalers or category managers."
  switchingReason: "The wedge turns existing operating data into immediate margin recovery without replacing the grocer's core stack, and it can prove ROI in a single department within weeks."
  pricingHypothesis: "$1,500-$3,000 per store per month, plus an optional share of verified gross-margin lift or shrink reduction."
whyNow:
