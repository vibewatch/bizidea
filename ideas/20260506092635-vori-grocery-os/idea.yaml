topRisks:
  - name: "Weak data quality"
    description: "Independent grocers may still have inconsistent item masters, spoilage logging, or store-level execution data that weakens recommendation quality."
    mitigation: "Start with chains that already run modern POS and inventory systems, and build an onboarding layer that flags data gaps before automation goes live."
  - name: "Store-level adoption failure"
    description: "Department managers may ignore recommendations if they feel the system overrides local judgment or adds workflow friction."
    mitigation: "Launch with manager-in-the-loop approvals, show department-level ROI quickly, and reward adoption with simple mobile execution workflows."
  - name: "Platform dependency"
    description: "A grocery OS vendor could expand into this workflow once it sees customer demand and usage patterns."
    mitigation: "Move fast to build cross-platform integrations, own the highest-value perishables dataset, and partner with multiple software stacks instead of depending on one."
