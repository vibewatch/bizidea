    sourceRefs: [1]
  - point: 独立杂货商正面临来自 Walmart 和 Amazon 的明确竞争压力，因此节省利润的自动化不再是可有可无，而是已进入预算优先级。
    signalRefs: ["竞争压力正在逼独立杂货商升级系统"]
    sourceRefs: [1, 2, 3]
