problem: 独立杂货商每天都在果蔬、肉类、烘焙和熟食上损失毛利，因为降价、调拨和补货决策仍由门店经理凭经验拍板。他们无法匹敌 Walmart 级别的商品运营科学，而一次错误的生鲜库存决策就可能抹掉整天利润。现有杂货软件会记录发生了什么，却很少告诉门店接下来四小时该做什么。
targetUser:
  primary: 拥有 5-30 家门店的独立杂货连锁中的商品采购副总裁或生鲜运营负责人
  secondary: 各门店的果蔬、肉类、熟食和烘焙部门经理
  buyer: 商品采购副总裁、COO 或业主型经营者
startupThesis:
  nonObviousInsight: 新的机会不是再做一个杂货记录系统，而是在已经打通的支付、库存和定价数据之上建立决策层，按门店、按小时自动化易腐品动作。
  beachhead: 拥有 5-30 家门店且生鲜占比较高的区域型独立杂货商，从果蔬和肉类部门的日常降价与补货决策切入。
  wedge: 一个易腐品毛利自动驾驶系统，能为生鲜品类给出并推动当日降价、补货削减和跨店调拨动作。
  whyNowCatalyst: Vori 的融资、业务进展以及“自动驾驶杂货”定位表明，独立杂货商终于拥有了足以信任自动化商品决策的实时数据基础设施。
  ventureScalePath: 先从易腐品决策切入，再扩展到供应商订货、促销规划、自有品牌选品、劳动力预测和零售媒体变现，逐步成为连锁企业的商品运营控制平面。
solution: 产品接入杂货商的 POS、库存和定价系统，构建每家门店生鲜商品销售速度、毛利和临期风险的实时视图。每天早晨以及日间时段，系统都会按 SKU-门店生成关于降价时机、降价幅度、补货抑制和附近门店调拨机会的建议。门店经理可在轻量工作流中审批或自动应用动作，系统再以基线对照方式衡量毛利回收和损耗下降。随着时间推移，软件会学习每条连锁的需求模式、供应商节奏和降价弹性，从而让更多品类进入自动驾驶模式。
goToMarketSeed:
  firstCustomer: 一家位于美国、拥有 8-20 家门店的独立杂货连锁，具备集中式商品运营能力、果蔬和肉类损耗明显，并已部署现代云 POS 或杂货操作系统。
  buyingTrigger: 新库存或定价系统上线，或某个季度因损耗和毛利率波动迫使管理层寻找快速的运营节省。
  currentAlternative: 部门经理经验判断、基于 Excel 的订货表、静态降价规则，以及来自批发商或品类经理的周期性咨询。
  switchingReason: 这个切入点能在不替换杂货商核心技术栈的情况下，把现有运营数据转化为即时毛利回收，并且可在数周内于单一部门证明 ROI。
  pricingHypothesis: 每店每月 $1,500-$3,000，另可叠加经验证的毛利提升或损耗下降分成。
