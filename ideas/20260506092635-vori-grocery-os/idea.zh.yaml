jobsToBeDone:
- job: 当生鲜部门持有过多老化库存时，帮助商品运营负责人选择合适的降价、调拨或补货动作，从而在商品转为损耗前保护毛利。
  currentAlternative: 基于静态规则和表格复盘的经理判断
  successMetric: 按品类衡量的毛利提升与损耗下降
- job: 当同一连锁内各门店表现差异较大时，帮助中央商品运营团队标准化高频易腐品决策，从而在不事无巨细管理每位经理的情况下提升执行效果。
  currentAlternative: 电话、邮件和每周品类会议
  successMetric: 建议采纳率和品类毛利波动下降
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 该主题簇同时具备有分量的融资事件、明确的业务进展，以及一个服务不足零售细分中的清晰工作流切面。
  painIntensity:
    score: 4
    rationale: 生鲜损耗和错失降价时机既痛且频繁，不过小型杂货商的预算可能受限。
  wedgeClarity:
    score: 5
    rationale: 易腐品的降价、补货和调拨决策构成了一个狭窄且紧迫的首个工作流。
  defensibility:
    score: 4
    rationale: 连锁专属决策数据和集成深度能够形成粘性优势，但一旦 ROI 被验证，现有厂商也可能迅速跟进。
  ventureScale:
    score: 4
    rationale: 虽然切入口较窄，但向更广泛的商品运营与零售运营工作流扩展后，仍可支撑一家大型多产品公司。
topRisks:
- name: 数据质量薄弱
  description: 独立杂货商仍可能存在商品主数据、报损记录或门店执行数据不一致的问题，从而削弱建议质量。
  mitigation: 优先从已运行现代 POS 和库存系统的连锁切入，并建立在自动化上线前识别数据缺口的入驻层。
- name: 门店层面采纳失败
  description: 如果部门经理觉得系统压过本地判断或增加了流程摩擦，可能会忽视系统建议。
  mitigation: 先以经理审批在环的方式上线，尽快展示部门级 ROI，并通过简单的移动执行工作流激励采纳。
- name: 平台依赖
  description: 一旦某家杂货 OS 供应商看到客户需求和使用模式，可能会自行扩展进这个工作流。
  mitigation: 快速建立跨平台集成，掌握最有价值的易腐品数据集，并与多套软件栈合作而非依赖单一平台。
