problem: 独立杂货商每天都在果蔬、肉类、烘焙和熟食上丢利润，因为 markdown、调拨和补货判断仍由门店经理凭经验拍板。他们既没有 Walmart 级别的商品运营科学，一次鲜食品库存判断失误又足以吞掉整天利润。现有杂货软件大多只能记录发生了什么，却很少告诉门店接下来 4 小时该做什么。
targetUser:
  primary: 5-30 家门店独立连锁杂货商里的商品副总裁或生鲜运营负责人
  secondary: 各门店的果蔬、肉类、熟食和烘焙经理
  buyer: 商品副总裁、COO，或 owner-operator
startupThesis:
  nonObviousInsight: 新机会不在于再做一个杂货 system of record，而是在新近打通的支付、库存和定价数据之上，加一层决策层，把门店级、小时级的易腐品动作自动化。
  beachhead: 拥有 5-30 家门店、生鲜占比高的区域性独立杂货商，先从果蔬和肉类部门的每日 markdown 与补货决策切入。
  wedge: 一个易腐品利润自动驾驶层，能为生鲜品类推荐并推动当天的 markdown、补货削减和跨店调拨动作。
  whyNowCatalyst: Vori 的融资、业务进展和 self-driving grocery 定位说明：独立杂货商终于有了足够成熟的实时数据基础设施，可以开始信任自动化商品决策。
  ventureScalePath: 先拿下易腐品决策，再扩展到供应商下单、促销规划、自有品牌选品、排班预测和零售媒体变现，逐步成为整条连锁的商品运营控制平面。
solution: 产品接入杂货商的 POS、库存与定价系统，构建每家门店生鲜 SKU 的实时销量速度、利润和临期风险视图。每天早晨和营业中，它会生成 SKU-门店级建议，给出 markdown 时机、降价深度、抑制补货以及临近门店间的调拨机会。门店经理可以在一个轻量 workflow 里审批或自动应用这些动作，系统再把挽回的毛利和降损效果与基线对比。随着时间推移，软件会学到每条连锁的需求模式、供应商节奏和 markdown 弹性，让更多品类进入 autopilot 模式。
goToMarketSeed:
  firstCustomer: 在美国拥有 8-20 家门店、已实现集中商品管理、生鲜果蔬与肉类损耗明显、并已部署现代云 POS 或 grocery OS 的独立连锁杂货商。
  buyingTrigger: 新的库存或定价系统刚上线，或者某个季度损耗与毛利波动太大，迫使管理层去找能立刻见效的运营节流方案。
  currentAlternative: 部门经理凭经验判断、基于 Excel 的下单表、静态 markdown 规则，以及批发商或品类经理的周期性建议。
  switchingReason: 这个切口不用替换杂货商核心技术栈，就能把现有经营数据立刻变成利润修复动作，而且几周内就能在单个部门证明 ROI。
  pricingHypothesis: "$1,500-$3,000 per store per month，外加基于已验证毛利提升或损耗下降的可选分成。"
