differentiator: "大多数杂货工具停在 dashboard、预测，或者宽泛的 ERP 工作流。真正能赢的，是盯住独立杂货商每天都在疼、而且频率极高的那几刀：哪些货该 markdown、哪些订单该收、哪些库存该挪，在生鲜变成 shrink 之前先动手。真正有防守力的资产也不是通用模型，而是连锁自己那套 SKU-门店-日粒度的数据：临期风险、需求曲线、markdown 弹性，以及最终兑现出来的毛利结果。"
