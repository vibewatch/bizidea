jobsToBeDone:
  - job: 当生鲜部门压了太多老化库存时，帮助商品负责人选出最合适的 markdown、调拨或补货动作，好在商品变成损耗前把利润保住。
    currentAlternative: 经理凭经验判断，配合静态规则和表格复核
    successMetric: 按品类衡量的毛利提升与损耗下降
  - job: 当同一条连锁里各店表现差异很大时，帮助中央商品团队把高频易腐品决策标准化，好提升执行一致性，而不是天天盯着每个经理。
    currentAlternative: 电话、邮件和每周品类会议
    successMetric: 建议采纳率，以及品类毛利波动收窄
