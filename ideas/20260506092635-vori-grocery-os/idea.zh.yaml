problem: "独立杂货商在蔬果、肉类、烘焙和熟食上天天掉毛利，因为 markdown、调拨和补货决策仍靠店长拍脑袋。它们既没有 Walmart 级别的商品科学能力，一旦生鲜库存判断失手，整天利润就可能被一笔坏决策吃掉。现有杂货软件更多是在记账复盘，很少会告诉门店接下来四小时到底该做什么。"
targetUser:
  primary: "拥有 5–30 家门店的独立连锁杂货商里，负责生鲜经营的 VP Merchandising 或 fresh operations 负责人"
  secondary: "各门店的蔬果、肉类、熟食和烘焙部门经理"
  buyer: "VP Merchandising、COO 或 owner-operator"
startupThesis:
  nonObviousInsight: "新机会不是再做一套杂货 system of record，而是压在刚刚被打通的支付、库存和定价数据之上，再铺一层决策引擎，让易腐品动作能按门店、按小时自动跑起来。"
  beachhead: "先打拥有 5–30 家门店、生鲜占比高的独立区域杂货商，从蔬果和肉类部门的日常 markdown 与补货决策切进去。"
  wedge: "一套易腐品毛利自动驾驶，给出生鲜品类当天的 markdown、压缩补货和跨店调拨建议，并能直接推动执行。"
  whyNowCatalyst: "Vori 的融资、进展和 self-driving grocery 定位都说明，独立杂货商终于有了足够实时的数据基础设施，开始愿意相信自动化商品决策。"
  ventureScalePath: "先拿下易腐品决策，再扩到供应商订货、促销规划、自有品牌选品、用工预测和零售媒体变现，最终变成连锁的商品经营控制台。"
solution: "产品接入杂货商现有的 POS、库存和定价系统，搭出每家门店生鲜 SKU 的实时视图，看清动销、毛利和临期风险。每天清晨和营业中途，系统都会生成 SKU-门店级建议，告诉团队什么时候 markdown、降多深、哪些订单该压、附近门店有哪些货可以调。门店经理可以在轻量工作流里审批，或者让系统自动落地；平台再把回收的毛利和减少的 shrink 与基线逐项对比。时间一长，软件会学会每条连锁自己的需求节奏、供应商补货节拍和 markdown 弹性，于是更多品类都能切进 auto-pilot 模式。"
goToMarketSeed:
  firstCustomer: "美国一条拥有 8–20 家门店的独立杂货连锁，已经集中管理商品运营，蔬果和肉类 shrink 明显，而且已部署现代云 POS 或 grocery OS。"
  buyingTrigger: "刚上线新的库存或定价系统，或者某个季度 shrink 和毛利波动过大，逼着管理层去找能快速见效的运营降本方案。"
  currentAlternative: "部门经理凭经验拍板、靠 Excel 下单、沿用静态 markdown 规则，再加上批发商或品类经理定期给建议。"
  switchingReason: "这套切口能把已有经营数据当天变成毛利修复动作，不用替换核心系统，还能在几周内先在一个部门里把 ROI 跑出来。"
  pricingHypothesis: "$1,500-$3,000 per store per month，再加一层按经核验毛利提升或 shrink 降幅抽成的可选绩效费。"
