    signalRefs: ["定价、库存和支付正在收敛到同一数据平面", "市场正在转向 self-driving grocery workflow"]
    sourceRefs: [3]
differentiator: 大多数杂货工具止步于 dashboard、预测，或宽泛的 ERP workflow。这个项目赢在一条极其具体、且高频发生的决策回路：独立杂货商每天都会痛的，是哪些商品该 markdown、该少补、该先调走，才能在生鲜变成损耗前把利润保住。真正有防御性的资产不是一个通用模型，而是那份连锁特有的数据集：它把临期风险、需求曲线、markdown 弹性和 SKU-门店-日粒度的真实毛利结果连在一起。
