  mermaid: "flowchart LR\n  Buyer[商品采购副总裁] --> Pain[生鲜损耗与毛利流失]\n  Pain --> Product[易腐品毛利自动驾驶系统]\n  Product --> Outcome[更低损耗与更高毛利]\n"
