topRisks:
  - name: "数据质量偏弱"
    description: "独立杂货商的商品主数据、损耗记录和门店执行数据，仍可能很不一致，直接拖累建议质量。"
    mitigation: "先挑已经跑在现代 POS 和库存系统上的连锁，另外做一层导入检查，把数据缺口在自动化上线前就亮出来。"
  - name: "门店层面不采纳"
    description: "如果部门经理觉得系统压过了本地经验，或者额外增加了操作摩擦，他们就可能直接无视建议。"
    mitigation: "早期先让经理留在环里审批，尽快把部门级 ROI 跑出来，再用简单的移动端执行工作流去拉高采纳。"
  - name: "平台依赖"
    description: "一旦 grocery OS 厂商看见真实需求和使用模式，完全可能自己把这个工作流补进去。"
    mitigation: "尽快做跨平台集成，先拿下最有价值的易腐品数据集，同时绑定多套软件栈，而不是押注单一平台。"
