topRisks:
  - name: 数据质量偏弱
    description: 独立杂货商的商品主数据、损耗记录或门店执行数据可能仍不一致，从而拉低建议质量。
    mitigation: 先从已经跑在现代 POS 和库存系统上的连锁切入，并在自动化上线前做一层 onboarding 数据缺口检查。
  - name: 门店层采用失败
    description: 如果部门经理觉得系统压过了本地判断，或给 workflow 增加了摩擦，他们可能直接无视建议。
    mitigation: 先用经理审批在环模式快速上线，尽快展示部门级 ROI，再用简单的移动端执行 workflow 奖励采用。
  - name: 平台依赖
    description: 一旦看到客户需求和使用模式，grocery OS 厂商可能自己把这条 workflow 做进去。
    mitigation: 尽快建立跨平台集成、拿下最有价值的易腐品数据集，并与多套软件栈合作，而不是押注单一平台。
