scenarios:
  downside:
    description: Sales cycles stretch, only a subset of pilots convert, and store rollout reaches about 90 live stores by Y3 exit instead of 120.
    y3RevenueK: 1600.0
    y3EbitdaK: -650.0
    cashLowPointK: 170.0
    keyAssumptionChanges:
      - Sales cycle moves from 6 months to 9 months.
      - Y3 exit live stores fall from 120 to about 90.
      - Gross margin slips from 70% to 67% because onboarding stays service-heavy.
  base:
    description: One pilot converts in Y1, live-store rollout reaches 40 by Y2 exit and 120 by Y3 exit, and gross margin holds at the 70% business-plan target.
    y3RevenueK: 2112.0
    y3EbitdaK: -276.6
    cashLowPointK: 498.5
    keyAssumptionChanges:
      - Sales cycle holds near 6 months.
      - Pilot-to-production conversion stays at the 50% business-plan floor.
      - Expansion averages roughly 8 stores on first rollout and around 12 stores per mature chain by Y3.
  upside:
    description: Partner referrals start working in Y2, live-store rollout reaches about 140 stores by Y3 exit, and better pricing mix brings the business near EBITDA breakeven.
    y3RevenueK: 2550.0
    y3EbitdaK: 80.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - Sales cycle compresses from 6 months to 4-5 months.
      - Y3 exit live stores rise from 120 to about 140.
      - Blended revenue per live store improves through more performance-fee mix and faster multi-store expansion.
sensitivity:
  - variable: ARPU
    downsideCase: $24.0K blended annual revenue per live store
    baseCase: $25.9K blended annual revenue per live store
    upsideCase: $27.5K blended annual revenue per live store
    y3RevenueImpactK: -155.0
    cashImpactK: -109.0
  - variable: CAC
    downsideCase: $12.0K CAC per live store because pilots stay founder-heavy and partner referrals do not materialize
    baseCase: $10.0K CAC per live store
    upsideCase: $8.0K CAC per live store from referral leverage and faster chain expansion
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: 1.5% monthly store churn as weak pilots fail to expand
    baseCase: 0.8% monthly store churn
    upsideCase: 0.4% monthly store churn after margin lift is proven
    y3RevenueImpactK: -120.0
    cashImpactK: -90.0
  - variable: sales cycle
    downsideCase: 9 months because buyers demand more proof and integrations
    baseCase: 6 months
    upsideCase: 4-5 months after one strong reference account
    y3RevenueImpactK: -360.0
    cashImpactK: -250.0
  - variable: gross margin
    downsideCase: 65% from heavier implementation and support work
    baseCase: 70%
    upsideCase: 72% after onboarding and integrations become repeatable
    y3RevenueImpactK: 0.0
    cashImpactK: -130.0
  - variable: hiring pace
    downsideCase: Pull backend/data and second AE forward by two quarters before proof of repeatable rollout
    baseCase: Milestone-based hiring tied to live-store growth
    upsideCase: Delay one commercial hire until after 60 live stores
    y3RevenueImpactK: -40.0
    cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      QualifiedChains --> PaidPilots
      PaidPilots --> LiveStores
      LiveStores --> SubscriptionRevenue
      LiveStores --> PilotAndFeeRevenue
      SubscriptionRevenue --> GrossProfit
      PilotAndFeeRevenue --> GrossProfit
      GrossProfit --> Cash
      Opex --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by scaling live stores from 8 at Y1 exit to 120 at Y3 exit at roughly $24K subscription ARR plus modest pilot and implementation fees.
  - checkName: Must go right
    finding: The model needs the first pilots to convert and expand across roughly 8-12 stores per chain so CAC per live store stays efficient.
  - checkName: Model breaks if
    finding: Cash gets tight if sales cycles stretch past six months and rollout stalls below roughly 90 live stores, because downside cash falls toward about $170K.
  - checkName: Next-round proof
    finding: The next financing is justified once the company exits Y2 with 3-5 production chains, 40 live stores, and a repeatable 30-day onboarding motion.
sanityChecks:
  ruleOf40: Y3 growth 266.7% + EBITDA margin -13.1% = 253.6%
  burnMultiple: Y1 burn multiple ~7.3x, improving to ~1.8x in Y2 and ~0.2x in Y3 as live-store expansion starts to outgrow burn.
  revenuePerFte: "$235K Y3 on 9 year-end FTE (benchmark $200–400K SaaS)"
  flags:
    - The base case assumes 120 live stores by Y3 exit even though centralized same-day fresh decision authority is still a core validation risk.
    - Gross margin staying at 70% may prove optimistic if early chains require more custom data cleanup or services-heavy onboarding than planned.
    - CAC looks attractive only because the model assumes land-and-expand into about 8 stores per initial chain rollout; smaller rollouts would weaken payback materially.
    - Revenue remains concentrated in a small number of grocery chains, so one delayed expansion can move Y3 results meaningfully.
