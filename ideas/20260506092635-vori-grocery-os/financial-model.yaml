slug: perishable-margin-autopilot
date: '2026-05-06'
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: Model start month
    value: 2026-06
    unit: YYYY-MM
    source: '[BP date 2026-05-06] first full operating month after plan date.'
  - id: A2
    name: Revenue unit
    value: Live store-month
    unit: customer definition
    source: '[BP businessModel.unitOfValue] revenue is monetized per live store-month rather than per chain logo.'
  - id: A3
    name: Base production subscription price
    value: '24.0'
    unit: USDK per store-year
    source: '[BP gtm.pricing + research.market.bottomUpSizingDrivers] base production software lands near the researched ~$24k per-store ARR case.'
  - id: A4
    name: Blended revenue per live store
    value: '25.9'
    unit: USDK per store-year
    source: '[BP businessModel.revenueStreams + BP investorMemo.firstCustomer.initialContract] model includes a modest ~8% uplift over the $24k base from pilot, implementation, and performance-fee mix.'
  - id: A5
    name: Live-store ramp
    value: 8 live stores by Y1 exit, 40 by Y2 exit, 120 by Y3 exit
    unit: stores
    source: '[BP milestones + research.market.som] business plan targets 3-5 production chains by 12-24 months and research SOM assumes ~120 live stores by year 3.'
  - id: A6
    name: Average rollout size per chain
    value: 8 stores at first production rollout, ~12 stores per mature chain by Y3
    unit: stores per chain
    source: '[BP executiveSummary first customer 8-20 store chain + research.market.som example of ~10 chains x 12 stores] used to convert chain wins into live-store growth.'
  - id: A7
    name: Gross margin target
    value: '70'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct] steady-state target gross margin.'
  - id: A8
    name: COGS ratio
    value: '30'
    unit: percent of revenue
    source: '[BP businessModel.targetGrossMarginPct] COGS set to 30% so gross margin equals the 70% target.'
  - id: A9
    name: Monthly store churn
    value: '0.8'
    unit: percent
    source: 'Startup-finance heuristic for sticky B2B operations software once a chain proves measurable shrink and margin lift, but with some early rollout risk.'
  - id: A10
    name: Average sales cycle
    value: '6'
    unit: months
    source: '[BP investorMemo.riskHeatmap + research.categoryDynamics.headwinds] margin-constrained grocers make procurement ROI-heavy, so closes are modeled at roughly six months.'
  - id: A11
    name: Fully loaded CAC per live store
    value: '10.0'
    unit: USDK per store
    source: 'Startup-finance heuristic anchored to founder-led chain sales plus partner referrals: approximately $80k chain CAC spread across an initial 8-store rollout.'
  - id: A12
    name: Pilot-to-production conversion
    value: '50'
    unit: percent
    source: '[BP gtm.funnelTargets] base case uses the floor of the stated 50%+ pilot-to-production target.'
  - id: A13
    name: Opening cash from modeled pre-seed raise
    value: '2400'
    unit: USDK
    source: '[BP fundingAsk.targetFundingRangeUsd] model uses a conservative pre-seed raise inside the stated $2M-$4M range.'
  - id: A14
    name: Loaded payroll basis
    value: '20'
    unit: percent benefits and payroll tax
    source: Startup-finance heuristic; all annualized payroll figures are fully loaded rather than base salary only.
  - id: A15
    name: Loaded cash compensation benchmarks
    value: Founder CEO $150k, founding eng $160k, founding product/ops $140k, integration eng $150k, implementation lead $110k, AE1 $130k OTE, backend/data eng $150k, AE2 $135k OTE, customer success lead $110k; all before 20% load
    unit: annual USD
    source: 'Startup-finance heuristic for a lean U.S. pre-seed SaaS team with below-big-tech cash comp.'
  - id: A16
    name: Hiring ramp
    value: Founder trio at start; integration engineer in Q2Y1; implementation lead in Q4Y1; first AE in Q2Y2; backend/data engineer in Q4Y2; second AE in Q1Y3; customer success lead in Q3Y3
    unit: headcount plan
    source: '[BP team + BP strategicChoices.sequencingRationale] hires are delayed until pilots convert and onboarding becomes repeatable.'
  - id: A17
    name: Non-payroll operating spend ramp
    value: ~$10k per month in Q1Y1 rising to ~$34k per month in Q4Y3
    unit: USDK per month
    source: '[BP operations + BP fundingAsk.useOfFundsSummary] covers cloud tools, travel, legal, accounting, software, and trade-event spend without assuming large paid-marketing programs.'
  - id: A18
    name: Cash conversion
    value: EBITDA approximates operating cash flow
    unit: policy
    source: Startup-finance heuristic; no debt, capex, or material working-capital swings are modeled.
  - id: A19
    name: Funding milestone
    value: Reach 3-5 production chains, 40 live stores, and a repeatable 30-day onboarding motion by the end of Y2
    unit: milestone
    source: '[BP milestones 12-24 months + BP operations] used to size the current round plus a six-month cash buffer.'
