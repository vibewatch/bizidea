topRisks:
  - name: Workflow bypass
    description: >-
      Growth teams or agencies may publish off-platform assets to preserve
      speed, which would starve the product of coverage and undermine its
      promise.
    mitigation: >-
      Tie affiliate links, creator reimbursements, and final approval IDs to
      verified assets only, so unapproved posts cannot be paid, boosted, or
      counted toward campaign performance.
  - name: Narrow initial market
    description: >-
      Standalone prediction markets are a small buyer set, so the company could
      stall before reaching venture scale if expansion is delayed.
    mitigation: >-
      Build the data model around regulated outcome claims rather than
      prediction markets specifically, then expand into sportsbooks, crypto
      brokerages, and retail trading apps after the first few logos.
  - name: Liability expectations
    description: >-
      Customers may treat the software as a legal shield and blame the company
      when a misleading post slips through or a jurisdiction rule changes
      abruptly.
    mitigation: >-
      Position the product as a control and evidence layer, version every rule
      set with counsel-reviewed updates, and contractually exclude platform-side
      legal opinions or guarantees.
