    signalRefs: ["Integrity lapses now threaten registration and financing"]
    sourceRefs: [3, 4]
differentiator: >-
  Most regtech tools review policies or archive ads after the fact. This
  product verifies the truthfulness of each depicted financial outcome before
  publication by binding the creative asset to live market data, approved
  simulation records, geo rules, and compensation evidence. That makes it both
  a growth tool and a compliance artifact, which agency review, social
  listening tools, and generic archiving vendors do not provide.
