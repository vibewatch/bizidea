slug: verified-bet-campaign-rail
date: '2026-06-22'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date] 基准情形假设 pre-seed 在计划日期后的次月完成，运营支出也从那个月开始起跑。'
- id: A2
  name: pre-seed 完成后的起始现金
  value: '2.0'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M] 基准情形取区间下沿，因为公司到 Y3 都维持在 6 人团队。'
- id: A3
  name: 每个活跃付费账户的混合年收入
  value: '150.0'
  unit: USDK per account-year
  source: '[BP market SOM; BP investorMemo initialContract; Research bottomUpSizingDrivers] 当订阅、usage 和审计导出费都开始生效后，采用建模里 $120K-$150K ACV 的上沿。'
- id: A4
  name: 收入确认时点
  value: 每个月或每个季度按期中客户数确认收入
  unit: policy
  source: '[Startup-finance heuristic] 假设新付费 logo 平均在当月或当季中点落地，更贴近“试点转生产”的节奏，而不是第一天就吃满整期收入。'
- id: A5
  name: 毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel targetGrossMarginPct]'
- id: A6
  name: 月度流失率
  value: '1.5'
  unit: percent
  source: '[BP product payout gating and audit workflow stickiness] 创业财务启发式：适用于有一定控制层留存、但还没完全被验证的早期企业合规软件。'
- id: A7
  name: 第 1 年月末客户路径
  value: 0,0,0,1,1,2,2,2,2,3,3,3
  unit: active paid accounts
  source: '[BP milestones 0–12 months] 基准情形采用文中 3-5 家付费共创客户的下沿，并假设其中两家转得足够快，让 Y1 末有 3 个活跃付费 logo。'
- id: A8
  name: 第 2 年季度末客户数
  value: Q1Y2 4; Q2Y2 5; Q3Y2 6; Q4Y2 8
  unit: active paid accounts
  source: '[BP milestones 12–24 months] 对应计划里“到第 24 个月做到 6-8 家生产客户”的目标。'
- id: A9
  name: 第 3 年季度末客户数
  value: Q1Y3 9; Q2Y3 10; Q3Y3 11; Q4Y3 12
  unit: active paid accounts
  source: '[BP market SOM] 让 Y3 末对齐计划中可触达的 12 账户情形，同时因为客户是逐步爬坡进来的，全年确认收入略低于 $1.8M SOM。'
- id: A10
  name: 创始人/CEO 综合现金成本
  value: '90.0'
  unit: USDK per year
  source: '[BP team Founder CEO] 创业财务启发式：pre-seed 阶段偏克制的创始人工资。'
- id: A11
  name: 创始工程负责人综合现金成本
  value: '156.0'
  unit: USDK per year
  source: '[BP team Founding eng] 创业财务启发式：适用于高级技术联合创始人的现金包，含薪酬负担。'
- id: A12
  name: 全栈产品工程师综合现金成本
  value: '144.0'
  unit: USDK per year
  source: '[BP team Full-stack product engineer] 创业财务启发式：适用于早期企业软件里的产品型工程师。'
- id: A13
  name: 合规产品负责人综合现金成本
  value: '144.0'
  unit: USDK per year
  source: '[BP team Compliance product lead] 创业财务启发式：适用于受监管工作流创业公司里的规则与政策产品负责人。'
- id: A14
  name: 解决方案工程师综合现金成本
  value: '126.0'
  unit: USDK per year
  source: '[BP team Solutions engineer] 创业财务启发式：适用于集成很重、又要面客的工程岗位。'
- id: A15
  name: 客户经理综合现金成本
  value: '144.0'
  unit: USDK per year
  source: '[BP team Account executive] 创业财务启发式：适用于创始人协同打单、浮动薪酬不高的企业销售。'
- id: A16
  name: 招聘节奏
  value: M1 上创始人和创始工程负责人；M3 上全栈工程师；M6 上合规负责人和解决方案工程师；M12 上客户经理；基准情形下到 Y3 不再新增 FTE
  unit: timing
  source: '[BP team startTiming; BP strategicChoices sequencingRationale] 模型假设相邻垂直的证明来自复用同一套规则模型，而不是提前拉起一个重服务团队。'
- id: A17
  name: 职能薪酬分摊
  value: 创始人 70% S&M / 30% G&A；创始工程负责人和全栈工程师 100% R&D；合规负责人 70% R&D / 30% G&A；解决方案工程师 50% R&D / 50% G&A；客户经理 100% S&M
  unit: allocation
  source: '[BP team rationales; BP operations] 分摊逻辑按谁来卖这个切口、谁把规则引擎做成产品、谁负责客户实施和企业后台工作来配。'
- id: A18
  name: 非薪酬运营支出
  value: S&M 在 M1-M5 每月 3K、M6-M11 为 5K、M12-M15 为 8K、之后为 10K；R&D 在 M1-M5 为 4K、M6-M15 为 5K、之后为 6K；G&A 在 M1-M5 为 8K、M6-M15 为 10K、之后为 12K
  unit: USDK per month
  source: '[BP operations; startup-finance heuristic] 覆盖云工具、差旅、外部律师、保险，以及企业安全/合规开销，不额外假设一支服务交付 bench。'
- id: A19
  name: 现金转换政策
  value: EBITDA 近似等于现金变动
  unit: policy
  source: '[Startup-finance heuristic] 这家 pre-seed 软件公司不建债务、capex、税和明显的营运资金波动，因此 EBITDA 可近似视作现金变化。'
- id: A20
  name: 稳态 CAC
  value: '70.0'
  unit: USDK per new production account
  source: '[BP gtm funnelTargets; BP gtm channels] 启发式校准：适用于创始人主导外呼、付费试点转化，以及基准情形下 Y2 的销售与营销强度。'
- id: A21
  name: 融资里程碑
  value: 做到 8 个正式生产账户、落地 1 个相邻 sportsbook 或 trading-app 共创客户、部署周期压到 6 周以内，同时手里还留着 6 个月的 seed 缓冲
  unit: milestone
  source: '[BP milestones 12–24 months; BP fundingAsk runwayMonths] 用来决定 pre-seed 融资额和缓冲厚度。'
