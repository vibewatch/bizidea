scenarios:
  downside:
    description: 试点转化变慢，买家只愿意买监控 + 基础审计导出，公司到 Y3 末只做到 10 个活跃账户，混合 account-year 价值降到 $135K。
    y3RevenueK: 1198.1
    y3EbitdaK: -338.5
    cashLowPointK: 327.3
    keyAssumptionChanges:
    - Y1 末仍是 3 个活跃付费 logo，Y2 末做到 7 个，Y3 末做到 10 个，而不是 12 个。
    - 买家对赔付 gating 和高阶审计导出模块接受度有限，导致每个活跃账户的混合年收入从 $150K 降到 $135K。
    - 因为更多审计拼装和漂移复核还得靠人工，毛利率从 70% 掉到 67%。
  base:
    description: 创始人主导销售加 1 名客户经理，让最早几家共创客户在 Y3 末转成 12 个活跃付费账户，混合 account-year 价值维持在 $150K，同时团队始终控制在 6 个 FTE。
    y3RevenueK: 1500.2
    y3EbitdaK: -91.0
    cashLowPointK: 702.8
    keyAssumptionChanges:
    - 月末与季末客户数按 A7、A8 和 A9 走。
    - 每个活跃账户的混合年收入保持在 $150K，毛利率保持在 BP 目标的 70%。
    - 到 Y3 为止团队人数都封顶在 6 个 FTE，因此验证相邻垂直不需要提前招重服务团队。
  upside:
    description: agency 和律师转介绍把转化速度拉起来，让公司在 Y3 末做到 14 个活跃账户、混合 account-year 价值 $155K，利润率也略好一些。
    y3RevenueK: 1724.4
    y3EbitdaK: 100.3
    cashLowPointK: 977.8
    keyAssumptionChanges:
    - Y1 末做到 4 个活跃 logo，Y2 末做到 9 个，Y3 末做到 14 个，因为转介绍把共创客户转化提前了。
    - 随着赔付 gating 和审计导出更快挂上去，每个活跃账户的混合年收入从 $150K 升到 $155K。
    - 可复用规则模板减少了人工合规工作，毛利率从 70% 提升到 72%。
sensitivity:
- variable: ARPU
  downsideCase: 每个活跃账户的混合年收入落在 $135K，因为买家只买核心监控和审计包。
  baseCase: 每个活跃账户的混合年收入按模型保持在 $150K。
  upsideCase: 一旦赔付 gating 和审计导出挂载更稳定，每个活跃账户的混合年收入可到 $155K。
  y3RevenueImpactK: -150.2
  cashImpactK: -174.4
- variable: CAC
  downsideCase: 稳态 CAC 升到 $85K，因为创始人主导外呼没能足够快地被转介绍放大。
  baseCase: 稳态 CAC 按模型保持在 $70K。
  upsideCase: 律师、agency 和伙伴转介绍把线索预热后，稳态 CAC 可降到 $60K。
  y3RevenueImpactK: -75.0
  cashImpactK: -135.0
- variable: 流失率
  downsideCase: 月度流失率升到 2.0%，因为买家把产品当 incident 软件，而不是赔付控制系统。
  baseCase: 月度流失率按模型保持在 1.5%。
  upsideCase: 一旦 approval ID 深度嵌进赔付和审计工作流，月度流失率可降到 1.0%。
  y3RevenueImpactK: -150.0
  cashImpactK: -118.0
- variable: 销售周期
  downsideCase: 试点转正式生产拉长到 6-7 个月，导致 1-2 个 logo 被推迟到后面的季度。
  baseCase: 试点转正式生产大约需要 4-5 个月，和 BP 的实时 campaign 试点节奏一致。
  upsideCase: 拿到第一个可复用的合规 reference account 后，销售周期可压到 3-4 个月。
  y3RevenueImpactK: -150.0
  cashImpactK: -161.7
- variable: 毛利率
  downsideCase: 审计准备和漂移复核更依赖人工，所以毛利率停在 67%。
  baseCase: 毛利率保持在 BP 目标的 70%。
  upsideCase: 可复用规则模板减少人工异常处理后，毛利率可到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -74.4
- variable: 招聘节奏
  downsideCase: 在可重复性还没被证明前，Y3 就提前招 1 名平台工程师，只加成本，不加收入。
  baseCase: 团队到 Y3 始终维持 6 个 FTE，靠复用而不是扩编。
  upsideCase: 非关键招聘继续延后到 seed 轮之后，因为同一支团队就足以撑起第一个相邻垂直上线。
  y3RevenueImpactK: 0.0
  cashImpactK: -108.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: "flowchart LR\n  Leads[Founder-led outbound and referrals] --> PaidPilots\n  PaidPilots --> ProductionAccounts\n  ProductionAccounts --> Subscriptions\n  ProductionAccounts --> ApprovedAssets\n  ApprovedAssets --> UsageFees\n  Subscriptions --> Revenue\n  UsageFees --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准收入由活跃付费运营商数量驱动：Y1 末是 3 家，到 Y3 末爬到 12 家，每家约贡献 $150K 的混合年账户价值。
- checkName: 必须做对的事
  finding: 这支 6 人团队必须把试点转成可复制的赔付控制部署，而且不能再补一支重服务团队，否则利润结构会被打穿。
- checkName: 模型会在哪儿断
  finding: 如果买家不愿把赔付或 affiliate 激活绑到 approval ID 上，ARPU 和留存都会向 downside 靠拢，现金也会掉到约 $327K。
- checkName: 下一轮融资证明
  finding: 一旦公司做到 8 个正式生产账户、1 个相邻共创客户，并把部署周期压到 6 周以内且缓冲尚在，seed 故事就能讲顺。
sanityChecks:
  ruleOf40: Y3 增速 95.1% + EBITDA 利润率 -6.1% = 89.0%（方向上很强，但也仍受较小的 Y2 基数抬高）。
  burnMultiple: Y2 的 burn multiple 约为 0.8x，对应约 $750K 的净新增 ARR；Y3 约为 0.2x，对应约 $600K 的净新增 ARR。
  revenuePerFte: Y3 年末每个 FTE 对应约 $250K 收入，落在早期企业 SaaS 粗略的 $200K-$400K 基准带内。
  flags:
  - 模型假设在第一位客户经理之后不再净增人，因此公司必须在不提前扩服务或平台 headcount 的情况下，证明相邻垂直也能复用。
  - 滩头市场本身很集中：Y3 做到 12 个账户，已经吃掉建模里 $1.8M SOM 的大头，因此上行空间很依赖相邻 sportsbook 或 trading-app 扩张。
  - ARPU 的前提是买家同时采用基础订阅和高价值工作流模块，比如赔付 gating 与审计导出；如果只做监控部署，收入会低于计划。
  - 到 Y3 时 Rule of 40 看起来健康，但更关键的证明点其实是：试点能否转正式生产、部署速度够不够快，以及控制权是否真的落在 approval rail 手里。
