    - 28
  geographicConsiderations:
  - point: The U.S. is the right beachhead because prediction markets sit inside a state-versus-federal conflict while FTC disclosure expectations and platform gambling-ad rules still apply to the marketing layer.
    sourceRefs:
    - 26
