- point: In the UK, unauthorized influencers promoting regulated financial products without proper approval may commit a criminal offense.
  sourceRefs:
  - 22
- point: Platform policies require branded-content toggles or paid-promotion labels and reserve removal or restrictions for non-compliant content.
  sourceRefs:
  - 28
  - 20
  - 21
  - 12
- point: Gambling-promoting content rules vary by geography, must follow local law, and cannot target minors or non-approved jurisdictions.
  sourceRefs:
