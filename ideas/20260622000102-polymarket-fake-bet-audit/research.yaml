  adoptionFrictionMatrix:
  - friction: Agencies or creators bypass the system to move faster
    severity: high
    affectedBuyer: GC / growth operations
    mitigation: Tie affiliate links, reimbursements, and creator payouts to approved asset IDs so off-rail content is economically penalized.
