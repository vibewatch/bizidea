  validationPlan:
  - priority: high
    question: Will the first buyer budget live with legal/compliance, growth operations, or the agency partner?
    evidenceToGather: 10-12 interviews with prediction-market, sportsbook, and crypto-app GCs plus at least three agency-side operators to identify who owns campaign approvals and payouts today.
  - priority: high
    question: Can operators tie affiliate links, creator reimbursements, or final payouts to asset IDs approved in the rail?
    evidenceToGather: Workflow maps from one design partner showing how creator compensation is authorized, reconciled, and withheld after violations.
  - priority: medium
    question: Do platform APIs and crawlers expose enough metadata to hash-match reposted Shorts, Reels, and TikToks reliably?
    evidenceToGather: A technical pilot that ingests platform disclosures, captions, and media fingerprints across at least two creator platforms and one repost-monitoring feed.
