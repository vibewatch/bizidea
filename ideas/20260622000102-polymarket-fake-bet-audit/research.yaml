competitors:
- name: PerformLine
  stage: incumbent
  wedge: AI marketing compliance across pre-publication review, monitoring, remediation, and audit trails.
  pricing: Custom enterprise pricing; no public self-serve price on fetched pages.
  strength: Strong multi-channel workflow coverage for regulated marketing teams and clear pre-publication positioning.
  weaknessVsUs: Does not present a prediction-market-specific truth engine that binds each creator asset to live market data, payout proof, and geo permissions.
  sourceRefs:
  - 16
  - 15
- name: Red Marker
  stage: scale-up
  wedge: Advertising-compliance risk detection embedded into existing content and project workflows.
  pricing: Custom enterprise pricing not publicly listed on fetched page.
  strength: Real-time feedback and workflow integrations make it credible for regulated copy review at scale.
  weaknessVsUs: Broad copy and ad-risk review is still upstream of the harder problem of proving a depicted bet or payout is real and allowed.
  sourceRefs:
  - 17
- name: Smarsh
  stage: incumbent
  wedge: Books-and-records retention, supervision, and communications compliance for regulated industries.
  pricing: $8-$35+ per user per month typical cloud-archiving range on Vendr; otherwise quote-based enterprise pricing.
  strength: Deep trust in regulated communications capture and audit-ready retention.
  weaknessVsUs: Archive and supervision center of gravity means it captures evidence well but does not generate creator-safe outcome proofs before a post goes live.
  sourceRefs:
  - 18
  - 19
  - 34
- name: GeoComply
  stage: incumbent
  wedge: Geolocation, device identity, and anti-fraud controls for regulated platforms.
  pricing: Custom enterprise pricing.
  strength: Device-level location and spoofing decisions are already embedded in regulated operator stacks.
  weaknessVsUs: It can prove where a user or device is, but not whether the content being promoted depicts a truthful, approved, and disclosed outcome.
  sourceRefs:
  - 10
  - 24
- name: Haast
  stage: scale-up
  wedge: AI marketing-compliance automation with pre-launch review, monitoring, and horizon scanning.
  pricing: Custom enterprise pricing not publicly listed on fetched page.
  strength: Strong agentic-review narrative and explicit ROI around faster compliance approvals.
  weaknessVsUs: Generic regulated-content review is broader than the operator-specific market-state, payout, and creator-compensation binding this startup needs to own.
  sourceRefs:
  - 29
