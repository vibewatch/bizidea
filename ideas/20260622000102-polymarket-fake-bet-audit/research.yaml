openQuestions:
- Will operators let a third party sit in the payout, affiliate-link, or reimbursement release path, or only in creative approval?
- Which platforms expose enough metadata to hash-match reposted Shorts, Reels, and TikToks reliably after edits or remixes?
- Does the first buyer budget live with legal/compliance, growth operations, or agency procurement?
- Can the same rules engine generalize cleanly from prediction markets to sportsbooks and retail trading apps without a services-heavy rewrite?
