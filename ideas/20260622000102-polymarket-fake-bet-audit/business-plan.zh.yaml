slug: verified-bet-campaign-rail
date: '2026-06-22'
executiveSummary: Verified Bet Campaign Rail 卖的是一套工作流基础设施，目标客户是那些“付费创作者素材本身就可能变成欺骗证据”的 prediction-market 运营商。第一批用户，是面向美国市场、靠 agency 代运营 TikTok、Instagram 和 YouTube Shorts campaign 的运营商里的总法律顾问或增长运营负责人；这些素材会直接展示下注、赢钱或赔付。真正触发购买的，不是泛泛的营销升级，而是记者问询、监管方取证、州级执法函，或融资尽调——一旦逼着运营商把某条爆款素材的审批过程交代清楚，需求就会立刻变硬。MVP 要先做四件事：把展示结果和实时市场数据或已批准 demo 仓位对上；自动挂披露和地域规则；给最终素材做哈希；再把 approval ID 绑到赔付放款。这个滩头市场比“泛广告合规”更好打，因为现有厂商已经会归档内容、监控披露，但它们不会在发布前把创意素材和市场真相绑死。研究支持一个约 $6.0M 的滩头 SAM 和第 3 年约 $1.8M 的 SOM，不过这仍是估算；最大未决问题是，实际预算和流程控制权到底在合规、growth ops，还是 agency 采购手里。公司应该刻意延后大范围覆盖 sportsbook 和 brokerage，先证明 prediction-market 试点能转化、赔付 gating 也跑得通。最关键的证伪风险是：如果运营商只把它当可选审查软件，而不愿把创作者赔付、affiliate link 和审计响应都绑到这条轨道上，整个故事就会塌。
problem:
- prediction-market 运营商现在审批展示样例下注、赢钱或赔付的创作者短视频，靠的还是 agency brief、截图和表格清单，所以他们根本证明不了画面里的结果到底对应真实市场，还是仅仅是一个被批准的 demo 仓位。
- 一旦监管方、记者、投资人或董事会追问某条爆款帖子为何能过审，运营商手里并没有一条能快速串起素材、披露、地域权限、转发历史和创作者补偿的审计链。
solution:
- 做一条发布前审批轨道：直接从运营商的市场数据或已批准模拟仓位里生成下注卡片、赔率快照和赔付说明，然后在素材发出前挂上披露信息与司法辖区元数据。
- 每条过审素材都做哈希，连同背后的源数据快照和规则版本一起存档；同时把 approval ID 绑到 affiliate link 和创作者赔付上，再监控转发与改版，抓披露漂移和跑偏版本。
whyWeWin:
- 相邻厂商会做内容归档、文案审查，或地域限制，但没人补上最缺的那一步：在发布前，把创作者素材和实时市场真相绑死。
- 这套产品能直接嵌进运营商的赔付和 campaign 放量流程里，因此黏性来自真实运营控制和专有审计语料，而不是又一块孤立的政策看板。
strategicChoices:
  beachhead: 面向美国市场、要审批展示样例下注、赔率、赢钱或赔付的短视频创作者素材的 crypto 原生 prediction-market 运营商。
  wedgeRationale: 这个切片最容易先打出证据链，因为要核的 claim 很具体，买方已经感到监管和尽调压力，产品成效也能直接看过审素材覆盖率、赔付 gating 和审计响应时间，而不是虚的品牌指标。
  sequencingRationale: 先在一个真实创作者项目里，把发布前核验和事后审计还原做通；这是最小、也最能证明“把市场真相绑进素材”的工作流。接着再把赔付和 affiliate link 控制加上去，让这条轨道真正能约束行为；只有当试点在不靠重服务定制的情况下完成转化，才往 sportsbook 和 trading app 扩。
  notYet:
  - 在 prediction-market 工作流还没证明能重复转化前，就大范围铺 sportsbook、exchange 和 brokerage。
  - 去正面硬碰做全套 communications archive 或泛广告审核套件的老牌合规厂商。
  - 在审批和赔付控制之外，过早去做 creator CRM、付款处理或 agency 运营软件。
  - 在私有审计工作流还没跑通前，就先做面向消费者的信任徽章或公开证明。
market:
  tam: 估算 TAM 为 $36.0M：大约 240 个 prediction market、sportsbook 与相邻交易 app 运营群体，每个账户按每年约 $150k 的核验、地域控制、监控与审计导出价值计算。
  sam: 估算 SAM 为 $6.0M：大约 40 家带跨境创作者项目、且正暴露在监管压力下的 prediction-market 与 crypto 原生交易运营商。
  som: 估算第 3 年 SOM 为 $1.8M：在产品先拿下 prediction market、再吃进少量相邻 trading app 后，达到 12 个正式生产账户、每个约 $150k 混合 ACV。
  segments:
  - 由 agency 操盘创作者获客、且暴露在美国监管下的 crypto 原生 prediction-market 运营商
  - 通过创作者营销受监管结果的在线 sportsbook，以及 crypto 或社交交易 app
  buyingProcess: 最可能的 champion 是 GC 或合规负责人，growth operations 则会是日常操盘手，因为这条流程同时碰审批、赔付放款和 campaign 速度。可信的首单形态，是一个付费的实时 campaign 试点，或 incident-response 部署；当买家看到审批更快、审计包更干净、赔付控制也能执行后，再转成年约。
product:
  mvp: MVP 只覆盖一家运营商、一个短视频创作者项目、和一类 claim——比如样例下注、实时赔率或赔付说明。它接入市场与赔付数据，发出已批准模板或 demo 仓位，给导出素材做哈希，并在任何创作者拿到钱之前产出一份人工可复核的审计包。
  sixMonth: 6 个月内加上赔付与 affiliate link gating、地域规则同步，以及 TikTok、Instagram、YouTube 元数据抓取，让 3-5 个试点可以跑真实 campaign，并在几小时内还原任意一条过审素材。
  twelveMonth: 12 个月内把转发监控、可复用规则模板，和至少一个 geolocation 或身份集成做成产品化能力；随后把早期运营商转成年度合同，并测试一个 sportsbook 或 trading-app 共创客户。
  twentyFourMonth: 24 个月内，把同一套“已核验结果”轨道扩到 sportsbook 和相邻 trading app，同时把部署时间压在 6 周以内，不走重定制服务模式。
  keyBets:
  - 买方愿意让 approval ID 真正控制创作者赔付、报销或 affiliate link 激活，而不是把产品只当被动审查层。
  - 平台元数据和内容哈希，能在前三个支持渠道上足够稳定地匹配转发和改版内容，达到可执行的强度。
  - 先为 prediction market 搭出的规则图谱，可以扩到 sportsbook 和 trading app，而不用每进一个垂直就重写一遍产品。
  - 带人工复核的输出，足够让合规团队在监管、投资人或董事会的实时问询里，直接把审计包拿出来用。
gtm:
  wedge: 先卖一个 90 天的 incident-response + 实时 campaign 试点：先把历史创作者素材还原出来，再把一个正在运行的创作者项目迁到“已核验审批 + 赔付 gating”轨道上。
  channels:
  - 创始人亲自外呼 prediction-market 运营商里的总法律顾问、合规负责人和增长运营负责人
  - 由本就深度介入执法工作流的外部律师、regtech 顾问，以及 geolocation / communications-compliance 合作方转介绍
  - 通过本就负责已批准 brief 和赔付流程的 creator agency，把共创客户卖进受监管金融客户
  funnelTargets: lead→qualified pilot 15-25%，qualified pilot→paid pilot 35-50%，paid pilot→annual production 50%+，production→第二个项目或相邻垂直扩张在 12 个月内达到 25%+。
  pricing: 基础平台订阅 + 按过审素材和被监控的创作者或承包商席位收费；目标价位锚在创作者 campaign 花费的约 2-4%，因为痛点跟 campaign 体量、法务风险和审计负担走，而不是按员工席位走。
businessModel:
  revenueStreams:
  - 面向受监管创作者项目、提供已核验结果覆盖的年度平台订阅
  - 按过审素材和被监控的创作者或承包商席位收 usage 费
  - 为新工作流或新司法辖区收实施、审计导出和相邻规则包费用
  unitOfValue: 一条处在审计、披露和赔付控制之下的已批准创作者素材
  targetGrossMarginPct: 70
  expansionLevers:
  - 先在一个运营商账户里做大素材量、创作者数量和社媒渠道数
  - 把赔付 gating、审计导出和跨司法辖区规则覆盖做成高阶工作流模块
  - 等规则模型能泛化后，再把同一控制平面从 prediction market 扩到 sportsbook 和 trading app
strategyMap:
  northStarMetric: 通过已核验 approval ID 发布的付费创作者素材占比，以及这些素材能否在 24 小时内被完整还原成审计包。
  inputMetrics:
  - 从收到草稿到在首批支持渠道上完成合规审批的时间
  - 与已批准素材 ID 绑定的创作者赔付或 affiliate 激活占比
  - TikTok、Instagram 和 YouTube Shorts 上的转发或改版匹配率
  - 付费试点转年度生产合同的转化率
  - 每个生产客户新增的相邻项目或垂直数量
  moatsToBuild:
  - 把已批准创意哈希、市场快照、结算逻辑和补偿记录绑在一起的素材真相语料库
  - 横跨 prediction-market 合法性、平台披露规则以及赌博或金融推广约束的跨司法辖区规则图谱
  - 把审批和赔付控制连起来，让运营商和 agency 在轨道外发内容的经济性变差
  - 覆盖转发漂移、赔付冻结和整改结果的执法历史数据集，按渠道与司法辖区持续累积
  killCriteria:
  - 9 个月内拿不到 3 家以上付费共创客户
  - 前 4 个试点里，少于 70% 的付费创作者素材能绑到已批准素材 ID 和赔付控制
  - 前 5 个付费试点之后，试点转年度生产的转化率仍低于 40%
  - 第一个相邻 sportsbook 或 trading-app 部署，需要 8 周以上的定制集成或规则工作
  mermaid: "flowchart LR\n  Wedge[Prediction-market creator wedge] --> MVP[Verified asset and audit MVP]\n  MVP --> Proof[Paid pilots with payout gating]\n  Proof --> Expansion[Sportsbook and trading-app expansion]\n"
investorMemo:
  verdict:
    call: Watch
    conviction: 事件驱动的切口很强、买方痛点也清楚，但在预算归属和相邻市场扩张还没被付费试点证明前，判断力仍该收着。
    whyBelieve: 现在没有哪家现有厂商，能把“受监管金融结果的发布前核验”与审计证据、赔付控制、地域规则放进同一条工作流。
    whyDoubt: 现阶段滩头市场小而集中；如果买方不愿把 campaign 控制权接到这条轨道上，或相邻垂直扩张最后变成重服务模式，风投故事就立不住。
    nextDiligence: 优先找 5-10 家目标运营商，验证三件事：付费试点价格、赔付 gating 权限，以及一个相邻 sportsbook 或 trading-app 试点能否复用同一套规则模型。
  firstCustomer:
    title: 一家面向美国市场的 prediction-market 运营商里的总法律顾问
    profile: 这家 crypto 原生运营商要有跨境流量、由 agency 代运营的短视频创作者 campaign，而且董事会、投资人或监管方已经在盯它如何审批推广说法。
    trigger: 记者问询、CFTC 信息请求、州级执法函，或融资尽调，一旦逼着公司迅速把每条创作者素材和披露还原出来，购买意愿就会跳升。
    buyer: 总法律顾问或合规负责人
    initialContract: $30k-$60k 的付费试点，覆盖一个正在运行的创作者项目、周期 90-120 天；等赔付 gating 和持续监控上线后，再转成大约 $100k-$150k 的年订阅外加 usage fee。
  mustBeTrue:
  - 第一个可重复拿预算的角色，是 GC 或合规负责人，而不是一个缓慢的跨部门委员会。
  - 运营商愿意让创作者赔付、报销或 affiliate 激活依赖已批准素材 ID。
  - 转发监控能抓到足够多的跑偏版本，让内容发出后这条审计链仍然可执行。
  - 试点客户能按不低于建模里 $100k-$150k ACV 的价格转成年约。
  - 至少有一家相邻 sportsbook 或 trading-app 客户，可以在不重写规则引擎的情况下 onboard。
  diligenceQuestions:
  - 当一条受监管的创作者帖子真的要上线时，谁在实际掌管 campaign 审批和赔付放款？
  - 买方多频繁会遇到监管方、记者、投资人或董事会要求还原某一条具体创作者素材？
  - 创业公司能否拿到首发渠道所需的市场、赔付和平台元数据，去证明素材里的结果是真的？
  - PerformLine、Red Marker、Smarsh 或某个 geolocation 合作方，为什么不能把这个切口顺手打包进现有预算里？
  - 往 sportsbook 或 trading app 扩时，复用的到底还是同一产品，还是最后变成服务生意？
operatingAssumptions:
- assumption: 可重复的经济买方是 GC 或合规负责人，growth operations 则是日常 champion。
  basis: research.yaml
  validationTest: 做 10-12 个买家访谈，并至少关掉 2 个付费试点，要求同一个职能同时掌握预算审批和后续工作流权限。
  decisionImpact: 如果不成立，GTM 包装、定价权限和销售周期都会变，滩头市场吸引力也会低于当前假设。
- assumption: 运营商愿意让这条轨道卡住已批准创作者素材的赔付、报销或 affiliate link 激活。
  basis: research.yaml
  validationTest: 在前 2 个共创客户试点里，把 approval ID 接进至少一个赔付或 affiliate 放款环节，再量化被覆盖的付费素材占比。
  decisionImpact: 如果不成立，产品就会滑回监控软件，而不是控制系统；黏性和定价权都会被削弱。
- assumption: 平台元数据、内容哈希和爬虫覆盖，足以在前三个首发渠道上识别转发或改版素材。
  basis: research.yaml
  validationTest: 在 TikTok、Instagram 和 YouTube Shorts 上做技术试点，对已知转发/改版测试集要求至少 80% 匹配准确率。
  decisionImpact: 如果不成立，发布后的执法能力会缩水，路线图也该重新收回到发布前证明 + 人工审计。
- assumption: prediction-market 规则引擎可以扩到 sportsbook 和 trading app，而不必做重服务式重写。
  basis: operator judgment
  validationTest: 在第 12 个月前 scope 一个相邻垂直试点，确认能复用同一核心数据模型，并在 8 周内上线。
  decisionImpact: 如果不成立，风投级上行空间会被压扁，公司更适合按小众合规工作流来融资和定价。
- assumption: 买方接受这款产品是控制层和证据层，而不是外包法律意见。
  basis: research.yaml
  validationTest: 和 2 个试点客户跑完安全、法务与采购审查，采用人工审批、规则版本证据和律师审阅过的产品定位。
  decisionImpact: 如果不成立，责任风险会抬升、签约会显著变慢，公司可能得换市场或改成服务模式。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15-20 位参与创作者审批的 GC、合规负责人、增长运营负责人和 agency 操盘手，覆盖 prediction market 及相邻受监管 app。
  hypothesis: 最紧迫的首个工作流，就是那些展示样例下注、赢钱或赔付的短视频创作者素材，而且预算所有权在合规手里，不在泛营销团队。
  successMetric: 至少 10 次访谈提到近期审批或审计失误，且有 5 个账户同意继续做工作流梳理或试点范围设计。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 先用手工拉数和草拟审计包的方式，为一个共创客户还原 20-30 条历史创作者素材。
  hypothesis: 如果输出足够具体，足以应对董事会、投资人或监管方的真实问询，买方会在全自动工作流之前，先为“更快还原审计链”这件事付钱。
  successMetric: 客户看完历史还原输出后签下 1 个付费试点，并把样本集的审计包交付时间压到 24 小时以内。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 和一家运营商、一条 agency 流程一起，做创作者赔付或 affiliate link 的 approval-ID gating 原型。
  hypothesis: 一旦轨道外素材拿不到钱、拿不到加热，也记不了 campaign 业绩，执行力和 ROI 都会明显变强。
  successMetric: 试点里至少 70% 的付费测试素材，能在放款前绑定到一个 approval ID。
  owner: 创始工程负责人
- horizon: 90–180 天
  experiment: 上线 3 个覆盖 TikTok、Instagram 和 YouTube Shorts 的付费实时 campaign 试点。
  hypothesis: 比起泛合规软件评估，实时 campaign 试点更容易让买家立刻看到发布速度和审计响应的价值，因此转化更快。
  successMetric: 上线 3 个付费试点，其中 2 个在 6 周内完成，且至少 1 个转成年度生产合同。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 在前三个首发渠道上加上转发检测和披露漂移告警。
  hypothesis: 没有发布后监控，agency 和创作者就会绕过那组已批准素材。
  successMetric: 测试 campaign 里，至少 80% 的已知转发或改版版本能被匹配出来，而且每个试点都能在 48 小时内把告警内容处置完。
  owner: 创始工程负责人
- horizon: 180–365 天
  experiment: 用同一套核心规则模型和审批流程，跑一个相邻 sportsbook 或 trading-app 共创客户。
  hypothesis: 公司可以不重建产品、也不完全改写销售叙事，就从 prediction market 扩到相邻市场。
  successMetric: 1 个相邻共创客户在 scope 后 8 周内上线，且 ACV 预期和滩头账户大体相当。
  owner: 合规产品负责人
operations:
- 为每条被覆盖的创作者帖子保存素材哈希、市场快照、规则版本、人工审批人和放行决定的审批队列
- 把赔付和 affiliate link 变成控制点：轨道外素材不能付款、也不能激活
- 和平台政策源以及至少一个 geolocation 或身份合作方同步的地域规则更新流程
- 面向转发、改版和披露缺失的发布后抓取、漂移分诊与整改流程
- 围绕司法辖区变化、规则解释和合同定位，与外部律师保持固定复核节奏
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 品类定义、企业销售和共创客户招募，要求创始人能把监管痛点、增长工作流和产品节奏串起来。
- role: 创始工程负责人
  startTiming: Month 0
  rationale: 第一个真正的构建风险，是把运营商市场数据、素材哈希和赔付控制逻辑捏成同一条审批工作流。
- role: 全栈产品工程师
  startTiming: Month 3
  rationale: 试点需要更快迭代连接器、创作者侧素材生成和运营商 dashboard，这不是一位技术创始人能长期单扛的。
- role: 合规产品负责人
  startTiming: Month 6
  rationale: 规则图谱、政策更新和证据模型，需要一个能把法律要求翻成产品行为的人，而不是把公司拖成服务团队。
- role: 解决方案工程师
  startTiming: Month 6
  rationale: 早期客户要尽快上线，就离不开工作流梳理、agency 协同，以及赔付或 affiliate link 集成支持。
- role: 客户经理
  startTiming: Month 12
  rationale: 只有当试点打包方式、买家归属和定价在滩头市场可重复后，才值得加第一位带 quota 的销售。
milestones:
- horizon: 0–12 个月
  items:
  - 拿下 3-5 家 prediction-market 滩头市场的付费共创客户
  - 证明实时试点里至少 70% 的付费创作者素材，能绑到 approval ID 和赔付或 affiliate 控制上
  - 至少把 2 个试点转成年度生产合同
  - 做到任意一条过审素材都能在 24 小时内还原出审计包
- horizon: 12–24 个月
  items:
  - 把 TikTok、Instagram 和 YouTube Shorts 上的转发监控与规则更新做成标准能力
  - 至少接入 1 个 geolocation 或身份合作方，并跑 1 个相邻 sportsbook 或 trading-app 共创客户
  - 达到 6-8 家正式生产客户，年度定价可重复，实施时间压到 6 周以内
- horizon: 24–36 个月
  items:
  - prediction market 加首批相邻垂直合计做到约 12 个正式生产账户
  - 相邻垂直部署仍落在同一套核心规则与审批模型里，而不是变成定制项目
  - 把素材真相与执法数据集做成续约、upsell 和合作分发的核心护城河
risks:
- risk: agency 或创作者为了抢速度，绕开这条轨道发内容，让产品掉出真实 campaign 路径。
  likelihood: High
  impact: High
  mitigation: 把赔付、报销、affiliate 激活和绩效记账都绑到已批准素材 ID 上，让轨道外内容在经济上不划算。
- risk: 初始买家集合可能还是太窄，因为 prediction-market 合法性继续收缩，或运营商延后预算。
  likelihood: Medium
  impact: High
  mitigation: 底层数据模型围绕“受监管结果陈述”来建，而不是只围着 prediction market；并在第 12 个月前验证一个相邻 sportsbook 或 trading-app 动作。
- risk: 相邻合规厂商可能加出“够用”的结果核验能力，直接吃掉买家现有预算。
  likelihood: Medium
  impact: High
  mitigation: 差异化必须落在运营商数据绑定、审批到赔付的控制点，以及资产级审计还原上——这些能力，老玩家很难短时间拼出来。
- risk: 在首发渠道上，转发检测和披露漂移监控的可靠性可能低于计划。
  likelihood: Medium
  impact: Medium
  mitigation: 先从能暴露足够元数据的渠道开始；要求创作者从已批准素材发帖；在匹配率还没被证实前，人工整改流程继续保留。
- risk: 客户可能期待软件像法律护盾一样兜底，一旦误导内容漏网就把责任抬到公司头上。
  likelihood: Medium
  impact: High
  mitigation: 保留人工审批、所有规则集都做版本化管理，用律师审阅过的免责声明把产品定位清楚：它是控制层和证据层，不是法律意见。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这笔 18 个月资金，用来把核心连接器、规则引擎、赔付 gating、监控能力、外部律师支持和创始人主导企业销售都拉起来，目标是拿下 3-5 家共创客户、把早期运营商转化掉，并证明一条相邻垂直扩张路径。
