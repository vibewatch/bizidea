differentiator: 多数 regtech 工具做的是政策审查，或在内容发出去之后才归档。这款产品不一样：它在发布前就把创意素材和实时市场数据、已批准的模拟记录、地域规则、补偿证据绑在一起，直接核验每一条金融结果陈述是不是真的。于是它既是增长工具，也是合规凭证——这两点，agency 审核、social listening 工具和通用归档厂商都给不了。
