problem: 短视频创作者营销，已经成了 prediction-market app 的核心增长渠道；但合规团队现在批素材，靠的还是 agency 邮件、截图和事后下架。这套流程既核不了视频里展示的交易、赔付或赢钱结果是不是和真实市场一致，也核不了披露信息在转发后还在不在，更不知道内容有没有投到被禁止的地区。一旦监管方或投资人开始要证据，营销素材本身就会变成“误导宣传”的证据，而运营商手里连一条像样的审批审计链都拿不出来。
targetUser:
  primary: crypto 原生 prediction-market 运营商里，负责审批展示样例下注或赔付的创作者内容的总法律顾问和增长运营负责人。
  secondary: 在线 sportsbook 和社交交易 app 里，负责受监管获客的营销诚信团队。
  buyer: prediction-market 运营商的总法律顾问或合规负责人
startupThesis:
  nonObviousInsight: 真正要合规的对象，不是创作者合同，也不是 campaign brief，而是内容里展示的每一个市场结果。prediction-market 运营商明明已经掌握了地面真相——赔率、结算规则、地域规则、affiliate link 和补偿记录——但这些东西在内容发布前从没和创意素材绑死。谁能把实时市场数据变成创作者可直接拿去发、还带签名证明的素材，谁就能让“合规增长”比“造假增长”更快。
  beachhead: crypto 原生 prediction-market 运营商里的 GC 和 growth-ops 团队；他们要审批面向美国用户获客的 TikTok、Instagram 和 YouTube Shorts 素材，这些素材会直接展示样例下注、赢钱或赔付。
  wedge: 一条创作者 campaign 轨道：直接从运营商数据里生成已核验的下注卡片和赔付演示，自动挂上披露信息和地域规则；凡是说法对不上真实仓位或已批准模拟仓位的素材，一律不让发。
  whyNowCatalyst: Polymarket 这次事件说明，爆款创作者内容本身就会在最糟的时候变成欺骗证据——偏偏 prediction-market 运营商此时还同时面对州级封禁、CFTC 审视和机构尽调。
  ventureScalePath: 先从 prediction market 切进去，再把这套“核验 + 披露”轨道扩到在线 sportsbook、crypto 交易所、杠杆交易 app 和零售券商——凡是靠创作者去展示受监管金融结果的消费金融产品，都能接。
solution: 这是一套 SaaS 工作流，接进交易场所的市场与定价 API、创作者 brief 系统、affiliate link 和赔付台账。营销团队先选市场，再选 claim 类型——样例下注、实时赔率、历史赢钱，或赔付说明——系统就直接用真实市场数据或已批准的 demo 仓位，生成可披露的画面和文案，而不是拿假站录屏糊弄。每个导出的素材都会带上内容哈希、带时间戳的源数据快照、地域分发矩阵和补偿记录，让法务能精确还原“当时展示了什么、发到哪里、为什么允许发”。上层再加一层监控，盯 agency 或承包商的转发与改动，发现披露缺失或跑偏版本就报警，未核验素材甚至可以直接卡住创作者赔付。最后沉淀下来的，不再是一串邮件和“希望没人来问”，而是一套增长与合规共用的系统记录。
goToMarketSeed:
  firstCustomer: 第一批客户应是这样一类 crypto 原生 prediction-market 运营商：跨境流量大、TikTok 和 Instagram 创作者项目由 agency 代运营，而且董事会或监管方已经公开追问它们究竟怎么审批营销说法。
  buyingTrigger: 记者问询、CFTC 信息请求、州级执法函，或融资尽调审查，一旦逼着运营商把每条创作者素材和披露都交代清楚，单子就会被推动。
  currentAlternative: 现在的替代方案，是 agency 人工审核：用表格、共享盘、假站 demo、标准网红合同，再配合事后下架。
  switchingReason: 这条轨道既能更快做出合规素材，也更容易自证清白；而老办法到今天都证明不了一条爆款说法到底对应真实市场，还是只是投给了不该投的地区。
  pricingHypothesis: 按月收平台订阅费，再按已批准素材和被监控的创作者席位收费；起步价锚在受监管交易 app 创作者 campaign 花费的 2-4%。
