jobsToBeDone:
- job: 当运营商要为一个实时市场发起创作者 campaign 时，帮它只批准那些能被事实核验的帖子，好让获客继续跑、又不踩误导宣传的雷。
  currentAlternative: agency brief、表格、人工法务审核和事后下架
  successMetric: 带机器可核验证明发布的创作者素材占比，以及合规升级事件为零
- job: 当监管方、记者或投资人追问一条爆款帖子为什么能过审时，帮法务把当时的市场状态、披露信息和补偿记录完整还原出来，好让他们几小时内答复，而不是几周后还在翻档。
  currentAlternative: 截图、Slack 讨论串、agency 邮件和手工翻归档
  successMetric: 为任意一条创作者素材产出完整审计包所需的时间
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 四家同日独立来源，把误导机制、campaign 规模和正在发生的监管后果都写得很具体，所以这是一个时间戳清晰、强度够高的市场信号。
  painIntensity:
    score: 5
    rationale: 一场误导性的创作者 campaign，既可能打掉用户增长，也可能伤到联邦注册、州级市场准入和机构尽调，对运营商来说下行风险接近生死线。
  wedgeClarity:
    score: 5
    rationale: 在发布前核验素材里展示的下注和赔付，是一个足够窄、能验证、买家也清楚、还能产出明确 system-of-record 的工作流切口。
  defensibility:
    score: 4
    rationale: 一旦深接市场数据、赔付系统和审批流程，切换成本就会上来；同时每多审一场受监管 campaign，审计语料和规则引擎都会继续变强。
  ventureScale:
    score: 4
    rationale: 起步市场确实窄，但同一套“证明 + 披露”轨道可以继续扩到 sportsbook、crypto 交易所、券商和其他靠创作者做增长的受监管金融赛道。
topRisks:
- name: 绕过工作流
  description: 增长团队或 agency 可能为了抢速度，绕开系统直接发站外素材；一旦这样，产品覆盖率就会掉，承诺也会被掏空。
  mitigation: 把 affiliate link、创作者报销和最终审批 ID 只绑定到已核验素材上；没过审的帖子，就拿不到钱、拿不到加热，也记不了 campaign 业绩。
- name: 初始市场太窄
  description: 独立 prediction market 的买家本来就少；如果扩张推迟，公司可能还没长到风投级体量就先卡住。
  mitigation: 底层数据模型按“受监管结果陈述”来搭，而不是只盯 prediction market；拿下最早几家 logo 后，尽快往 sportsbook、crypto 券商和零售交易 app 扩。
- name: 责任预期失控
  description: 客户可能把软件当成“法律护盾”，一旦误导内容漏网，或司法辖区规则突然变化，就反过来追责公司。
  mitigation: 把产品定位成控制层和证据层；所有规则集都做版本管理并附带律师审阅更新，合同里也明确排除平台侧法律意见和担保。
