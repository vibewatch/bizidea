date: '2026-06-22'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: month
    source: '[BP date] Base case assumes the pre-seed closes and operating spend starts the month after the plan date.'
  - id: A2
    name: Starting cash after pre-seed close
    value: '2.0'
    unit: USDM
    source: '[BP fundingAsk targetFundingRangeUsd $2–4M] Base case uses the low end because the company stays a six-FTE team through Y3.'
  - id: A3
    name: Blended annual revenue per active paid account
    value: '150.0'
    unit: USDK per account-year
    source: '[BP market SOM; BP investorMemo initialContract; Research bottomUpSizingDrivers] Uses the top end of the modeled $120K-$150K ACV range once subscription, usage, and audit-export fees are active.'
  - id: A4
    name: Revenue recognition timing
    value: Midpoint customer count within each month or quarter
    unit: policy
    source: '[Startup-finance heuristic] Assumes new paying logos land halfway through the period on average, which matches a pilot-to-production motion rather than day-one full-quarter revenue.'
  - id: A5
    name: Gross margin
    value: '70'
    unit: percent
    source: '[BP businessModel targetGrossMarginPct]'
  - id: A6
    name: Monthly churn
    value: '1.5'
    unit: percent
    source: '[BP product payout gating and audit workflow stickiness] Startup-finance heuristic for early enterprise compliance software with meaningful but not yet proven control-layer retention.'
  - id: A7
    name: Y1 month-end customer path
    value: 0,0,0,1,1,2,2,2,2,3,3,3
    unit: active paid accounts
    source: '[BP milestones 0–12 months] Base case uses the low end of the stated 3-5 paid design partners and assumes two convert fast enough to support three active paid logos by Y1 exit.'
  - id: A8
    name: Y2 quarter-end customers
    value: Q1Y2 4; Q2Y2 5; Q3Y2 6; Q4Y2 8
    unit: active paid accounts
    source: '[BP milestones 12–24 months] Matches the stated goal of reaching 6-8 production customers by month 24.'
  - id: A9
    name: Y3 quarter-end customers
    value: Q1Y3 9; Q2Y3 10; Q3Y3 11; Q4Y3 12
    unit: active paid accounts
    source: '[BP market SOM] Aligns Y3 exit with the plan’s 12-account reachable case and keeps annual recognized revenue slightly below the $1.8M SOM because customers ramp into the year.'
  - id: A10
    name: Founder CEO loaded cash compensation
    value: '90.0'
    unit: USDK per year
    source: '[BP team Founder CEO] Startup-finance heuristic for a below-market founder salary at pre-seed stage.'
  - id: A11
    name: Founding eng loaded cash compensation
    value: '156.0'
    unit: USDK per year
    source: '[BP team Founding eng] Startup-finance heuristic for a senior technical founder cash package plus payroll burden.'
  - id: A12
    name: Full-stack product engineer loaded cash compensation
    value: '144.0'
    unit: USDK per year
    source: '[BP team Full-stack product engineer] Startup-finance heuristic for an early enterprise software product engineer.'
  - id: A13
    name: Compliance product lead loaded cash compensation
    value: '144.0'
    unit: USDK per year
    source: '[BP team Compliance product lead] Startup-finance heuristic for a rules-and-policy product owner in a regulated workflow startup.'
  - id: A14
    name: Solutions engineer loaded cash compensation
    value: '126.0'
    unit: USDK per year
    source: '[BP team Solutions engineer] Startup-finance heuristic for an integration-heavy customer-facing engineering role.'
  - id: A15
    name: Account executive loaded cash compensation
    value: '144.0'
    unit: USDK per year
    source: '[BP team Account executive] Startup-finance heuristic for a founder-assisted enterprise seller with modest variable comp.'
  - id: A16
    name: Hiring cadence
    value: Founder and founding eng in M1; full-stack engineer in M3; compliance lead and solutions engineer in M6; AE in M12; no additional FTE through Y3 in the base case
    unit: timing
    source: '[BP team startTiming; BP strategicChoices sequencingRationale] The model assumes adjacent-vertical proof comes from reusing the same rules model, not from pulling forward a services-heavy team.'
  - id: A17
    name: Functional payroll allocation
    value: Founder 70% S&M / 30% G&A; founding and full-stack engineers 100% R&D; compliance lead 70% R&D / 30% G&A; solutions engineer 50% R&D / 50% G&A; AE 100% S&M
    unit: allocation
    source: '[BP team rationales; BP operations] Allocation follows who sells the wedge, who productizes the rules engine, and who carries customer implementation and enterprise admin work.'
  - id: A18
    name: Non-payroll operating spend
    value: S&M 3K monthly in M1-M5, 5K in M6-M11, 8K in M12-M15, and 10K thereafter; R&D 4K in M1-M5, 5K in M6-M15, and 6K thereafter; G&A 8K in M1-M5, 10K in M6-M15, and 12K thereafter
    unit: USDK per month
    source: '[BP operations; startup-finance heuristic] Covers cloud tools, travel, external counsel, insurance, and enterprise security/compliance overhead without assuming a services bench.'
  - id: A19
    name: Cash conversion policy
    value: EBITDA approximates cash movement
    unit: policy
    source: '[Startup-finance heuristic] No debt, capex, taxes, or material working-capital swings are modeled for this pre-seed software business.'
  - id: A20
    name: Steady-state CAC
    value: '70.0'
    unit: USDK per new production account
    source: '[BP gtm funnelTargets; BP gtm channels] Heuristic calibrated to founder-led outbound, paid-pilot conversion work, and the observed Y2 sales-and-marketing intensity in the base case.'
  - id: A21
    name: Funding milestone
    value: Reach 8 production accounts, launch one adjacent sportsbook or trading-app design partner, and keep deployments below 6 weeks with six months of seed buffer
    unit: milestone
    source: '[BP milestones 12–24 months; BP fundingAsk runwayMonths] Used to size the pre-seed ask and buffer.'
