scenarios:
  downside:
    description: Pilot conversion slows, buyers cap scope at monitoring plus basic audit exports, and the company exits Y3 with 10 active accounts at a $135K blended account-year value.
    y3RevenueK: 1198.1
    y3EbitdaK: -338.5
    cashLowPointK: 327.3
    keyAssumptionChanges:
      - Y1 ends with 3 active paid logos, Y2 ends with 7, and Y3 exits with 10 instead of 12.
      - Blended annual revenue per active account falls from $150K to $135K as buyers resist payout-gating and premium audit-export attachments.
      - Gross margin slips from 70% to 67% because more audit assembly and drift review stays manual.
  base:
    description: Founder-led sales plus one AE convert the first design partners into 12 active paid accounts by Y3 exit at a $150K blended account-year value while the team stays at six FTE.
    y3RevenueK: 1500.2
    y3EbitdaK: -91.0
    cashLowPointK: 702.8
    keyAssumptionChanges:
      - Month-end and quarter-end customer counts follow A7, A8, and A9.
      - Blended annual revenue per active account stays at $150K and gross margin stays at the 70% BP target.
      - Headcount stays capped at six FTE through Y3, so adjacent-vertical proof does not require a services-heavy hiring pull-forward.
  upside:
    description: Agency and counsel referrals accelerate conversion, letting the company exit Y3 with 14 active accounts at a $155K blended account-year value and slightly better margins.
    y3RevenueK: 1724.4
    y3EbitdaK: 100.3
    cashLowPointK: 977.8
    keyAssumptionChanges:
      - Y1 exits with 4 active logos, Y2 with 9, and Y3 with 14 as referrals pull forward design-partner conversion.
      - Blended annual revenue per active account rises from $150K to $155K as payout gating and audit exports attach faster.
      - Gross margin improves from 70% to 72% because reusable rule templates reduce manual compliance work.
sensitivity:
  - variable: ARPU
    downsideCase: Blended annual revenue per active account settles at $135K because buyers only buy the core monitoring and audit package.
    baseCase: Blended annual revenue per active account holds at $150K as modeled.
    upsideCase: Blended annual revenue per active account reaches $155K once payout gating and audit exports attach more consistently.
    y3RevenueImpactK: -150.2
    cashImpactK: -174.4
  - variable: CAC
    downsideCase: Steady-state CAC rises to $85K because founder-led outbound does not become referral-assisted quickly enough.
    baseCase: Steady-state CAC stays at $70K as modeled.
    upsideCase: Steady-state CAC falls to $60K once counsel, agency, and partner referrals warm the pipeline.
    y3RevenueImpactK: -75.0
    cashImpactK: -135.0
  - variable: churn
    downsideCase: Monthly churn rises to 2.0% because buyers keep the product as incident software rather than a payout-control system.
    baseCase: Monthly churn stays at 1.5% as modeled.
    upsideCase: Monthly churn falls to 1.0% once approval IDs become embedded in payout and audit workflows.
    y3RevenueImpactK: -150.0
    cashImpactK: -118.0
  - variable: sales cycle
    downsideCase: Pilot-to-production stretches toward 6-7 months, pushing one or two logos into later quarters.
    baseCase: Pilot-to-production runs about 4-5 months, consistent with the BP’s live-campaign pilot motion.
    upsideCase: The cycle compresses toward 3-4 months after the first repeatable compliance reference account lands.
    y3RevenueImpactK: -150.0
    cashImpactK: -161.7
  - variable: gross margin
    downsideCase: Gross margin stays at 67% because audit preparation and drift review remain more manual.
    baseCase: Gross margin stays at the BP target of 70%.
    upsideCase: Gross margin reaches 72% as reusable rule templates reduce manual exception handling.
    y3RevenueImpactK: 0.0
    cashImpactK: -74.4
  - variable: hiring pace
    downsideCase: A platform engineer is hired in Y3 before repeatability is proven, adding cost without changing revenue.
    baseCase: The team stays at six FTE through Y3 and relies on reuse rather than headcount expansion.
    upsideCase: Noncritical hiring stays deferred until after the seed round because the same team can support the first adjacent-vertical launch.
    y3RevenueImpactK: 0.0
    cashImpactK: -108.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Founder-led outbound and referrals] --> PaidPilots
      PaidPilots --> ProductionAccounts
      ProductionAccounts --> Subscriptions
      ProductionAccounts --> ApprovedAssets
      ApprovedAssets --> UsageFees
      Subscriptions --> Revenue
      UsageFees --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by growing active paid operators from 3 at Y1 exit to 12 at Y3 exit at roughly $150K of blended annual account value.
  - checkName: Must go right
    finding: The six-person team must convert pilots into repeatable payout-control deployments without adding services-heavy headcount or the margin structure falls apart.
  - checkName: Model breaks if
    finding: If buyers refuse to tie payouts or affiliate activation to approval IDs, ARPU and retention compress toward the downside case and cash falls toward roughly $327K.
  - checkName: Next-round proof
    finding: The seed story works once the company reaches 8 production accounts, one adjacent design partner, and sub-6-week deployments with the buffer still intact.
sanityChecks:
  ruleOf40: Y3 growth 95.1% + EBITDA margin -6.1% = 89.0% (strong directionally, though still helped by the smaller Y2 base).
  burnMultiple: About 0.8x in Y2 on roughly $750K of net new ARR, improving to about 0.2x in Y3 on roughly $600K of net new ARR.
  revenuePerFte: $250K Y3 revenue per end-of-year FTE (within the rough $200K-$400K early enterprise SaaS benchmark).
  flags:
    - The model assumes no net hiring after the first AE, so the company must prove adjacent-vertical reuse without pulling forward services or platform headcount.
    - 'The beachhead is concentrated: 12 accounts by Y3 already captures most of the modeled $1.8M SOM, so upside depends on adjacent sportsbook or trading-app expansion.'
    - ARPU assumes buyers adopt both the base subscription and high-value workflow modules such as payout gating and audit exports; a monitoring-only deployment would land below plan.
    - Rule-of-40 looks healthy by Y3, but the more important proof points are pilot-to-production conversion, deployment time, and whether control truly sits with the approval rail.
