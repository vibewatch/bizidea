competitors:
- name: PerformLine
  stage: incumbent
  wedge: AI 营销合规，覆盖发布前审核、监控、整改和审计链。
  pricing: 企业定制定价，抓取到的页面上没有公开自助价格。
  strength: 面向受监管营销团队的多渠道工作流覆盖很强，发布前定位也清楚。
  weaknessVsUs: 它并没有给出 prediction-market 专用的真相引擎，无法把每条创作者素材绑定到实时市场数据、赔付证明和地域权限上。
  sourceRefs:
  - 16
  - 15
- name: Red Marker
  stage: scale-up
  wedge: 把广告合规风险检测嵌进现有内容与项目工作流。
  pricing: 抓取页面上没有公开价格，按企业定制定价。
  strength: 实时反馈加工作流集成，让它在大规模受监管文案审核上很可信。
  weaknessVsUs: 泛文案和广告风险审查，仍停在更上游的位置；最难的那步——证明展示的下注或赔付到底是真的、而且能发——它没解决。
  sourceRefs:
  - 17
- name: Smarsh
  stage: incumbent
  wedge: 面向受监管行业的留痕、监督和通信合规。
  pricing: $8-$35+ 每用户每月是 Vendr 给出的典型云归档价格带；其余仍以企业报价为主。
  strength: 在受监管通信捕获和审计级留存上，信任度很深。
  weaknessVsUs: 它擅长留证和监督，但不会在帖子上线前先为创作者生成可安全使用的结果证明。
  sourceRefs:
  - 18
  - 19
  - 34
- name: GeoComply
  stage: incumbent
  wedge: 面向受监管平台的 geolocation、设备身份和反欺诈控制。
  pricing: 企业定制定价。
  strength: 设备级位置判断和 spoofing 决策，已经深嵌在受监管运营商栈里。
  weaknessVsUs: 它能证明用户或设备在哪儿，却证明不了被推广的内容本身是否展示了真实、已批准且已披露的结果。
  sourceRefs:
  - 10
  - 24
- name: Haast
  stage: scale-up
  wedge: AI 营销合规自动化，覆盖发布前审核、监控和 horizon scanning。
  pricing: 抓取页面上没有公开价格，按企业定制定价。
  strength: agentic review 叙事很强，也明确讲了“更快审批”的 ROI。
  weaknessVsUs: 泛受监管内容审查的范围太宽，代替不了这个创业公司必须掌控的市场状态、赔付和创作者补偿绑定。
  sourceRefs:
  - 29
regulatoryTechnicalConstraints:
- point: 付费创作者背书必须清楚披露利益关系，而且不能就底层产品结果作出误导表述。
  sourceRefs:
  - 7
  - 9
  - 25
- point: 如果将来往 broker-dealer 类路径扩，面向零售用户的传播还要额外满足 principal review、通信标准和 books-and-records 留存。
  sourceRefs:
  - 6
  - 5
  - 4
- point: 在英国，未经适当批准就推广受监管金融产品的未授权 influencer，可能会触犯刑事责任。
  sourceRefs:
  - 22
- point: 各平台政策要求打开 branded-content 或 paid-promotion 标签；不合规内容，平台保留删除或限制处理权。
  sourceRefs:
  - 28
  - 20
  - 21
  - 12
- point: 推广赌博相关内容的规则会随地域变化，必须跟当地法律一致，也不能触达未成年人或未获批准的司法辖区。
  sourceRefs:
  - 11
  - 10
  - 36
validationSignals:
- point: WSJ 系报道称，1,105 条关于 Polymarket 的 TikTok 视频里有 778 条用了假站画面，这已经说明今天缺的是“素材级结果真实性核验”。
  sourceRefs:
  - 33
  - 35
- point: Polymarket 的隐性 influencer campaign 据称向 800 多个收款方打了超过 $2.5M，说明创作者营销预算大到足以养活一套合规基础设施。
  sourceRefs:
  - 37
- point: IAB 说美国 2025 年创作者广告支出达到 $37B，这证明 creator 已经是规模化媒体渠道，而不是小众实验。
  sourceRefs:
  - 32
- point: PerformLine 和 Haast 都在明确向受监管营销团队卖发布前审核与监控工作流，这说明相邻预算科目已经存在。
  sourceRefs:
  - 15
  - 29
openQuestions:
- 运营商会不会允许第三方坐进赔付、affiliate link 或报销放款链路，还是只肯让它卡在创意审批这一层？
- 哪些平台能暴露出足够的元数据，让系统在内容被改版或 remix 后，仍可靠地匹配到转发的 Shorts、Reels 和 TikTok？
- 第一笔买方预算到底在法务/合规、growth operations，还是 agency 采购？
- 同一套规则引擎，能不能不靠重服务重写，就从 prediction market 平滑扩到 sportsbook 和零售交易 app？
