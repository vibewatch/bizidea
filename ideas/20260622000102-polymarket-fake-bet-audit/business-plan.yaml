slug: verified-bet-campaign-rail
date: '2026-06-22'
executiveSummary: >-
  Verified Bet Campaign Rail sells workflow infrastructure to prediction-market
  operators whose paid creator assets can themselves become evidence of
  deception. The first user is the general counsel or growth-operations lead at
  a U.S.-exposed operator running agency-managed TikTok, Instagram, and YouTube
  Shorts campaigns that depict bets, wins, or payouts. The buying trigger is
  not a generic marketing initiative but a journalist inquiry, regulator
  request, state enforcement letter, or fundraising diligence process that
  forces the operator to reconstruct how a viral asset was approved. The MVP
  should verify depicted outcomes against live market data or approved demo
  positions, attach disclosure and geo rules, hash the final asset, and tie the
  approval ID to payout release. This is a better beachhead than generic ad
  compliance because incumbents already archive content and monitor
  disclosures, but they do not bind creative assets to market truth before
  publication. Research supports a modeled $6.0M beachhead SAM and $1.8M
  year-three SOM, but those figures remain estimates and the largest open
  question is whether workflow control and budget sit with compliance, growth
  operations, or agency procurement in practice. The company should deliberately
  defer broad sportsbook and brokerage coverage until it proves prediction-
  market pilot conversion and payout-gating adoption. The main disconfirming
  risk is that operators treat the product as optional review software rather
  than a control tied to creator payouts, affiliate links, and audit response.
problem:
  - Prediction-market operators still approve creator clips that show sample bets, wins, or payouts through agency briefs, screenshots, and spreadsheet checklists, so they cannot prove the depicted outcome matched live market truth or an approved demo position.
  - When a regulator, journalist, investor, or board member asks how a viral post was approved, the operator lacks a fast audit chain linking the asset to disclosures, geo permissions, repost history, and creator compensation.
solution:
  - Provide a pre-publication approval rail that generates bet cards, odds snapshots, and payout explainers from operator market data or approved simulated positions, then attaches disclosure and jurisdiction metadata before the asset is released.
  - Hash each approved asset, store the source snapshot and rule version behind it, tie the approval ID to affiliate links and creator payouts, and monitor reposts or edits for disclosure drift and off-template variants.
whyWeWin:
  - Adjacent vendors archive content, review copy, or enforce location, but none own the missing step of binding a creator asset to live market truth before publication.
  - The product can become part of the operator's payout and campaign-release workflow, which creates operational stickiness and a proprietary audit corpus rather than a standalone policy dashboard.
strategicChoices:
  beachhead: U.S.-exposed crypto-native prediction-market operators approving short-form creator assets that depict sample bets, odds, wins, or payouts for paid acquisition.
  wedgeRationale: This slice creates the fastest proof because the claim being checked is concrete, the buyer already feels regulatory and diligence pressure, and the product can measure success through approved-asset coverage, payout gating, and audit response time instead of softer brand metrics.
  sequencingRationale: Start with pre-publication verification and audit reconstruction on one live creator program because that is the smallest workflow that proves market-truth binding; add payout and affiliate-link controls next so the rail governs behavior, then expand to sportsbooks and trading apps only after pilots convert without services-heavy customization.
  notYet:
    - Broad sportsbook, exchange, and brokerage coverage before the prediction-market workflow converts repeatably
    - Full communications archiving or generic ad-review suites that compete head-on with incumbent compliance vendors
    - Creator CRM, payments processing, or agency operating software beyond the approval and payout-control touchpoints needed for enforcement
    - Consumer-facing trust badges or public attestations before the private audit workflow is proven
market:
  tam: $36.0M estimated TAM based on roughly 240 operator groups across prediction markets, sportsbooks, and adjacent trading apps at about $150k annual value per account
  sam: $6.0M estimated SAM based on roughly 40 prediction-market and crypto-native trading operators with cross-border creator programs and active regulatory exposure
  som: $1.8M estimated year-three SOM based on 12 production accounts at roughly $150k blended ACV after the product wins prediction markets and a small number of adjacent trading apps
  segments:
    - Crypto-native prediction-market operators with agency-run creator acquisition and U.S. regulatory exposure
    - Online sportsbooks and crypto or social-trading apps that market regulated outcomes through creators
  buyingProcess: The likely champion is the GC or head of compliance, with growth operations as the daily operator because the workflow touches approvals, payout release, and campaign speed. A credible first sale is a paid live-campaign pilot or incident-response deployment that converts to an annual contract once the buyer sees faster approvals, cleaner audit packets, and enforceable payout controls.
product:
  mvp: >-
    MVP covers one operator, one short-form creator program, and one claim class
    such as sample bets, live odds, or payout explainers. It ingests market and
    payout data, issues approved templates or demo positions, hashes the
    exported asset, and produces a human-reviewable audit packet before any
    creator is paid.
  sixMonth: Add payout and affiliate-link gating, geo-rule sync, and TikTok, Instagram, and YouTube metadata capture so 3-5 pilots can run live campaigns and reconstruct any approved asset within hours.
  twelveMonth: Productionize repost monitoring, reusable rule templates, and at least one geolocation or identity integration, then convert early operators to annual contracts and test one sportsbook or trading-app design partner.
  twentyFourMonth: Expand the same verified-outcome rail into sportsbooks and adjacent trading apps while keeping deployment time below six weeks and avoiding a custom-services implementation model.
  keyBets:
    - Buyers will let approval IDs control creator payouts, reimbursements, or affiliate-link activation rather than using the product as a passive review layer.
    - Platform metadata and content hashing will match reposted or edited assets reliably enough for enforcement on the first three supported channels.
    - A rules graph built for prediction markets can be extended to sportsbooks and trading apps without rewriting the product for each vertical.
    - Human-reviewed outputs will earn enough trust that compliance teams use the audit packet in live regulator, investor, or board responses.
gtm:
  wedge: Sell a 90-day incident-response plus live-campaign pilot that reconstructs historical creator assets, then moves one active creator program onto verified approval and payout gating.
  channels:
    - Founder-led outbound to general counsel, head of compliance, and growth-operations leads at prediction-market operators
    - Referrals from external counsel, regtech consultants, and geolocation or communications-compliance partners already involved in enforcement workflows
    - Design-partner sales through creator agencies that already manage approved briefs and payout operations for regulated-finance clients
  funnelTargets: lead→qualified pilot 15-25%, qualified pilot→paid pilot 35-50%, paid pilot→annual production 50%+, production→second program or adjacent-vertical expansion 25%+ within 12 months
  pricing: Base platform subscription plus per approved asset and monitored creator or contractor seat, targeted at roughly 2-4% of creator-campaign spend because the pain scales with campaign volume, legal exposure, and audit burden rather than employee seat count.
businessModel:
  revenueStreams:
    - Annual platform subscription for a regulated creator program under verified-outcome coverage
    - Usage fees per approved asset and monitored creator or contractor seat
    - Implementation, audit-export, and adjacent-rule-pack fees for new workflows or jurisdictions
  unitOfValue: Approved creator asset under audit, disclosure, and payout control
  targetGrossMarginPct: 70
  expansionLevers:
    - Increase asset volume, creator count, and social channels inside an existing operator account
    - Add payout gating, audit exports, and cross-jurisdiction rule coverage as premium workflow modules
    - Expand the same control plane from prediction markets into sportsbooks and trading apps once the rules model generalizes
strategyMap:
  northStarMetric: Percent of paid creator assets released through verified approval IDs and reconstructable as complete audit packets within 24 hours
  inputMetrics:
    - Time from draft receipt to compliant asset approval on the first supported channels
    - Share of creator payouts or affiliate activations tied to approved asset IDs
    - Repost or edit match rate across TikTok, Instagram, and YouTube Shorts
    - Paid pilot to annual production conversion rate
    - Number of adjacent programs or verticals added per production customer
  moatsToBuild:
    - Asset-truth corpus linking approved creative hashes to market snapshots, settlement logic, and compensation records
    - Cross-jurisdiction rules graph spanning prediction-market legality, platform disclosures, and gambling or financial-promotion constraints
    - Approval-to-payout control points that make off-rail content economically unattractive for operators and agencies
    - Enforcement history dataset covering repost drift, payout holds, and remediation outcomes by channel and jurisdiction
  killCriteria:
    - Fewer than 3 paid design partners within 9 months
    - Less than 70% of paid creator assets in the first 4 pilots can be tied to approved asset IDs and payout controls
    - Paid pilot to annual production conversion stays below 40% after the first 5 pilots
    - First adjacent sportsbook or trading-app deployment requires more than 8 weeks of custom integration or rule work
  mermaid: |
    flowchart LR
      Wedge[Prediction-market creator wedge] --> MVP[Verified asset and audit MVP]
      MVP --> Proof[Paid pilots with payout gating]
      Proof --> Expansion[Sportsbook and trading-app expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong incident-driven wedge and clear buyer pain, but conviction remains limited until budget ownership and adjacent-market expansion are proven in paid pilots.
    whyBelieve: No incumbent clearly owns pre-publication verification of depicted financial outcomes tied to audit evidence, payouts, and geo controls in one workflow.
    whyDoubt: The current beachhead is small and concentrated, and the venture case fails if buyers will not route campaign control through the rail or if expansion to adjacent verticals becomes services-heavy.
    nextDiligence: Validate 5-10 target operators on paid pilot pricing, payout-gating authority, and whether one adjacent sportsbook or trading-app pilot can reuse the same rules model.
  firstCustomer:
    title: General counsel at a U.S.-exposed prediction-market operator
    profile: A crypto-native operator with cross-border traffic, agency-managed short-form creator campaigns, and active board, investor, or regulatory scrutiny over how promotional claims are approved.
    trigger: A journalist inquiry, CFTC information request, state enforcement letter, or fundraising diligence review forces the company to reconstruct every creator asset and disclosure quickly.
    buyer: General counsel or head of compliance
    initialContract: $30k-$60k paid pilot for one active creator program over 90-120 days, converting to roughly $100k-$150k annual subscription plus usage fees once payout gating and ongoing monitoring go live.
  mustBeTrue:
    - The first repeatable budget owner is the GC or head of compliance rather than a slow multi-department committee.
    - Operators allow creator payouts, reimbursements, or affiliate activation to depend on approved asset IDs.
    - Repost monitoring catches enough off-template variants to make the audit trail enforceable after publication.
    - Pilot customers convert to annual contracts at pricing that matches or exceeds the modeled $100k-$150k ACV range.
    - One adjacent sportsbook or trading-app customer can onboard without a custom rewrite of the rules engine.
  diligenceQuestions:
    - Who actually owns campaign approval and payout release when a regulated creator post is live?
    - How often do buyers face regulator, journalist, investor, or board requests to reconstruct a specific creator asset?
    - Can the startup obtain the market, payout, and platform metadata needed to prove asset truth across all first-launch channels?
    - What would stop PerformLine, Red Marker, Smarsh, or a geolocation partner from bundling enough of this wedge into existing budgets?
    - Does the adjacent expansion path into sportsbooks or trading apps reuse the same product, or does it become a services business?
operatingAssumptions:
  - assumption: The repeatable economic buyer is the GC or head of compliance, with growth operations acting as the daily champion.
    basis: research.yaml
    validationTest: Run 10-12 buyer interviews and close at least 2 paid pilots where the same function owns both budget approval and ongoing workflow authority.
    decisionImpact: If false, GTM packaging, pricing authority, and sales-cycle length all change and the beachhead may be less attractive than assumed.
  - assumption: Operators will let the rail gate payouts, reimbursements, or affiliate-link activation for approved creator assets.
    basis: research.yaml
    validationTest: In the first 2 design-partner pilots, integrate the approval ID into at least one payout or affiliate-release step and measure the share of paid assets covered.
    decisionImpact: If false, the product becomes monitoring software rather than a control system, which weakens stickiness and pricing power.
  - assumption: Platform metadata, content hashing, and crawler coverage are sufficient to detect reposted or edited assets across the first three launch channels.
    basis: research.yaml
    validationTest: Run a technical pilot across TikTok, Instagram, and YouTube Shorts and require at least 80% match accuracy on known repost or edit test sets.
    decisionImpact: If false, post-publication enforcement shrinks and the roadmap should stay focused on pre-publication proof plus manual audits.
  - assumption: The prediction-market rules engine can generalize into sportsbooks and trading apps without a services-heavy rewrite.
    basis: operator judgment
    validationTest: Scope one adjacent-vertical pilot by month 12 and confirm deployment can reuse the same core data model and ship inside 8 weeks.
    decisionImpact: If false, venture-scale upside compresses and the company should be financed and valued as a niche compliance workflow.
  - assumption: Buyers will accept the product as a control and evidence layer, not as outsourced legal advice.
    basis: research.yaml
    validationTest: Complete security, legal, and procurement review with 2 pilot customers using human approval steps, rule-version evidence, and counsel-reviewed positioning.
    decisionImpact: If false, liability risk rises, contracting slows materially, and the company may need a different market or service model.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15-20 GCs, compliance leads, growth-operations leaders, and agency operators involved in creator approvals for prediction markets and adjacent regulated apps.
    hypothesis: The highest-urgency first workflow is short-form creator assets that depict sample bets, wins, or payouts, and the budget owner sits with compliance rather than generic marketing.
    successMetric: At least 10 interviews describe a recent approval or audit failure, and 5 accounts agree to workflow mapping or follow-up pilot scoping.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Reconstruct 20-30 historical creator assets for one design partner using manual data pulls and draft audit packets.
    hypothesis: Buyers will pay for faster audit reconstruction before full workflow automation if the output is specific enough for a live board, investor, or regulator response.
    successMetric: One paid pilot is signed after reviewing historical reconstruction output, and audit-packet turnaround drops below 24 hours on the sample set.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Prototype approval-ID gating for creator payouts or affiliate links with one operator and one agency workflow.
    hypothesis: Enforcement power and ROI increase materially once off-rail assets cannot be paid, boosted, or counted toward campaign performance.
    successMetric: At least 70% of paid test assets in the pilot can be tied to an approval ID before compensation is released.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Launch 3 paid live-campaign pilots spanning TikTok, Instagram, and YouTube Shorts.
    hypothesis: A live-campaign pilot converts faster than a generic compliance software evaluation because the buyer sees immediate release-speed and audit-response value.
    successMetric: 3 paid pilots launched, 2 completed inside 6 weeks, and at least 1 converted to an annual production contract.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Add repost detection and disclosure-drift alerts across the first three launch channels.
    hypothesis: Post-publication monitoring is necessary to keep agencies and creators from bypassing the approved asset set.
    successMetric: At least 80% of known repost or edit variants are matched in test campaigns, and each pilot resolves flagged drift inside 48 hours.
    owner: Founding eng
  - horizon: 180–365 days
    experiment: Run one adjacent sportsbook or trading-app design partner using the same core rules model and approval flow.
    hypothesis: The company can expand beyond prediction markets without rebuilding the product or changing the sales narrative completely.
    successMetric: One adjacent design partner launches within 8 weeks of scoping and reaches comparable ACV expectations to the beachhead accounts.
    owner: Compliance product lead
operations:
  - Approval queue that stores the asset hash, market snapshot, rule version, human approver, and release decision for every covered creator post
  - Payout and affiliate-link control points that block payment or activation for off-rail assets
  - Geo-rule update process synchronized with platform policy sources and at least one geolocation or identity partner
  - Post-publication crawl, drift triage, and remediation workflow for reposts, edits, and missing disclosures
  - External counsel review cadence for jurisdiction changes, rule interpretation, and contract positioning
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Category creation, enterprise selling, and design-partner recruitment require a founder who can connect regulatory pain, growth workflow, and product sequencing.
  - role: Founding eng
    startTiming: Month 0
    rationale: The first build risk is binding operator market data, asset hashing, and payout-control logic into one approval workflow.
  - role: Full-stack product engineer
    startTiming: Month 3
    rationale: Pilots need faster connector iteration, creator-facing asset generation, and operator dashboard work than one technical founder can sustain.
  - role: Compliance product lead
    startTiming: Month 6
    rationale: The rules graph, policy updates, and evidence model need an owner who can translate legal requirements into product behavior without turning the company into a services shop.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Early customers will need workflow mapping, agency coordination, and payout or affiliate-link integration support to go live quickly.
  - role: Account executive
    startTiming: Month 12
    rationale: Add a quota-carrying seller only after pilot packaging, buyer ownership, and pricing are repeatable across the beachhead.
milestones:
  - horizon: 0–12 months
    items:
      - Win 3-5 paid design partners in the prediction-market beachhead
      - Prove that at least 70% of paid creator assets in live pilots can be tied to approval IDs and payout or affiliate controls
      - Convert at least 2 pilots into annual production contracts
      - Ship audit packets that reconstruct any approved asset within 24 hours
  - horizon: 12–24 months
    items:
      - Standardize repost monitoring and rule updates across TikTok, Instagram, and YouTube Shorts
      - Add at least one geolocation or identity partner integration and one adjacent sportsbook or trading-app design partner
      - Reach 6-8 production customers with repeatable annual pricing and implementation time below 6 weeks
  - horizon: 24–36 months
    items:
      - Reach roughly 12 production accounts across prediction markets and first adjacent verticals
      - Keep adjacent-vertical deployments within the same core rules and approval model rather than custom project work
      - Establish the asset-truth and enforcement dataset as the primary moat for renewals, upsells, and partner distribution
risks:
  - risk: Agencies or creators bypass the rail to preserve speed, leaving the product outside the real campaign path.
    likelihood: High
    impact: High
    mitigation: Tie payouts, reimbursements, affiliate activation, and performance credit to approved asset IDs so off-rail content becomes economically unattractive.
  - risk: The initial buyer set remains too narrow because prediction-market legality contracts further or operators delay spend.
    likelihood: Medium
    impact: High
    mitigation: Build the data model around regulated outcome claims, not prediction markets alone, and test one adjacent sportsbook or trading-app motion by month 12.
  - risk: Adjacent compliance vendors add enough outcome-verification features to satisfy buyers inside existing budgets.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on operator data bindings, approval-to-payout controls, and asset-level audit reconstruction that incumbents would struggle to bolt on quickly.
  - risk: Repost detection and disclosure-drift monitoring are less reliable than planned on first-launch channels.
    likelihood: Medium
    impact: Medium
    mitigation: Start with channels that expose enough metadata, require creators to publish from approved assets, and keep manual remediation in the loop until match accuracy is proven.
  - risk: Customers expect the software to act as a legal shield and escalate liability when a misleading post slips through.
    likelihood: Medium
    impact: High
    mitigation: Keep human approvals in place, version every rule set, use counsel-reviewed disclaimers, and position the product as a control and evidence layer rather than legal advice.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the core connectors, rules engine, payout gating, monitoring, external-counsel support, and founder-led enterprise sales needed to win 3-5 design partners, convert early operators, and prove one adjacent-vertical expansion path.
