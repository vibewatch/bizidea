slug: ar-resistance-evidence-network
date: '2026-07-01'
executiveSummary: >-
  Series B–D oncology biotechs bringing first-in-class AR-pathway degraders into
  metastatic castration-resistant prostate cancer face an immediate operational
  bottleneck: finding the small subset of AR-driven resistant patients and
  generating sponsor-usable target-engagement evidence before the next board or
  partnering checkpoint. The current workflow is fragmented across community
  urology notes, pathology archives, genomic reports, biopsy scheduling, ctDNA
  routing, and spreadsheet follow-up, which drives slow enrollment, screen
  failures, and incomplete pharmacodynamic packets. This company sells a
  sponsor-funded workflow layer that assembles protocol-specific screening
  packets, retrieves missing records, and coordinates biopsy plus ctDNA evidence
  capture across 8–20 U.S. sites. The initial beachhead is intentionally
  narrow—U.S. mCRPC AR-pathway degrader studies at clinical-stage biotechs—
  because the buying trigger is strongest at IND clearance, site activation, and
  first-patient-in planning, when clinical-ops leaders need proof-of-mechanism
  speed more than another generic recruitment tool. Adjacent spend already
  exists in trial enablement, molecular profiling, site analytics, and
  right-in-time trial activation, so pricing can reallocate operating budget
  rather than invent a new AI line item. The main differentiation is
  sponsor-controlled AR-resistance qualification logic and cross-site
  mechanism-data completeness, not top-of-funnel lead volume. Two critical gaps
  remain unresolved in the research: it does not yet quantify the exact near-term
  protocol count beyond the initial buyer set, and it does not prove whether
  days to first qualified patient, screen-pass rate, or biomarker-packet
  completeness unlocks budget fastest. If early pilots show materially faster
  qualified enrollment and cleaner evidence packets on a repeatable template,
  the company can expand from prostate AR-degrader studies into broader
  hormone-driven and transcription-factor oncology programs; if not, it remains
  a services-heavy niche.

problem:
  - >-
    First-in-human and early-phase mCRPC AR-pathway degrader studies require
    more than diagnosis matching: sponsors need prior-line treatment history,
    molecular resistance evidence, and serial biopsy or ctDNA plans before a
    patient is truly screen-ready.
  - >-
    That evidence is fragmented across community urology notes, pathology
    archives, genomic reports, lab portals, and manual site follow-up, so the
    sponsor cannot reliably tell which candidates are truly eligible or which
    sites will produce usable mechanism data.
  - >-
    Generic substitutes—manual coordinator review, CRO recruitment support,
    molecular-lab matching portals, and horizontal trial software—optimize
    pieces of the workflow but do not own sponsor-specific AR-resistance
    qualification plus pharmacodynamic packet completeness end to end.

solution:
  - >-
    A human-in-the-loop workflow layer that ingests treatment history, genomic
    reports, and protocol-specific AR-resistance rules to flag likely eligible
    patients, retrieve missing records, and assemble sponsor-reviewed screening
    packets.
  - >-
    Site execution tooling that schedules biopsy and ctDNA windows, routes
    samples to lab partners, tracks completeness, and preserves auditability so
    translational teams receive interpretable pharmacodynamic packets on time.
  - >-
    Sponsor dashboards that benchmark referral sources, resistance profiles,
    screen-pass rates, and site-level biomarker completeness, allowing teams to
    tighten inclusion strategy while building a proprietary evidence network for
    future studies.

whyWeWin:
  - >-
    The company sits in the white space between recruitment vendors, CRO
    operations, and molecular profiling labs: a sponsor-controlled
    AR-resistance evidence layer spanning heterogeneous records and multiple
    workflow partners.
  - >-
    Starting with one narrow mCRPC degrader template creates faster proof than a
    broad oncology recruitment product because the first buyer already has an
    urgent IND-to-FPI trigger and a defined evidence burden.
  - >-
    Repeated deployments create a rule library linking treatment history,
    biomarkers, and protocol constraints, plus cross-site benchmarks on missing
    records, screen-pass rates, and mechanism-data completeness that generic
    platforms do not naturally collect.
  - >-
    The company can sell with, not directly against, incumbent labs, CROs, and
    horizontal trial-software vendors, as long as it remains the neutral
    sponsor-facing orchestration layer rather than trying to replace the full
    trial stack.

strategicChoices:
  beachhead: >-
    U.S. Series B–D oncology biotechs running 8–20-site Phase I or Phase II
    metastatic castration-resistant prostate cancer studies for first-in-class
    AR-pathway degraders, where each patient requires prior-line treatment
    history, molecular resistance qualification, and serial biopsy or ctDNA
    evidence.
  wedgeRationale: >-
    This entry point is narrow enough to productize one repeatable workflow but
    painful enough to win budget quickly: the sponsor is already spending on
    trial enablement, the patient pool is difficult to qualify, and the proof of
    concept depends on both enrollment speed and clean target-engagement data.
    Broader oncology matching or full CTMS replacement would add buyer and
    workflow complexity before the company has any study-level proof.
  sequencingRationale: >-
    Build sponsor-side qualification and evidence-packet orchestration first,
    because that is where the acute budget trigger sits at IND-to-FPI. Hire
    product/data engineering and clinical-ops implementation before a scaled AE
    team, because the first 3–5 studies require workflow design, compliance
    boundary definition, and partner coordination more than volume outbound.
    Add lab, CRO, and adjacent-program partnerships only after the core mCRPC
    template shows repeatable KPI lift and can be deployed without bespoke
    rebuilding.
  notYet:
    - Generic multi-tumor clinical trial matching marketplaces
    - Autonomous treatment recommendation or diagnostic decision support
    - Full CRO, CTMS, or EDC replacement
    - Non-U.S. expansion before the U.S. workflow and compliance boundary are proven
    - Academic-center-only strategy without community urology access

market:
  tam: "$75M (est. 250 annual U.S. biomarker-intensive hormone-driven or adjacent transcription-factor oncology study-years × ~$300k sponsor workflow spend per study-year)"
  sam: "$18M (est. ~60 annual U.S. study-years close to advanced prostate, AR-pathway, and adjacent hormone-driven protocols needing qualification plus serial evidence workflows)"
  som: "$4.2M year-3 (12 live sponsor studies at blended ~$350k per study-year across software, onboarding, and evidence-workflow support)"
  segments:
    - "Primary: U.S. clinical-stage oncology biotechs running mCRPC AR-pathway degrader studies"
    - "Secondary: Adjacent hormone-driven or transcription-factor oncology programs at the same sponsor base once the prostate workflow is proven"
  buyingProcess: >-
    The VP Clinical Operations or CMO usually initiates during IND clearance,
    site activation, or first-patient-in planning, with translational medicine
    and site-startup teams validating workflow fit. Sponsor QA/legal and key
    sites then review electronic-record, privacy, and sample-logistics controls;
    the first contract is most likely a single-study pilot tied to the
    activation window.

product:
  mvp: >-
    One protocol-specific mCRPC AR-pathway degrader workflow covering treatment
    history intake, genomic-report review, sponsor-reviewed screening-packet
    assembly, and biopsy or ctDNA task orchestration across the first 3–5 pilot
    sites. The MVP is explicitly human-in-the-loop and audit-ready rather than
    an autonomous patient-recommendation engine.
  sixMonth: >-
    Protocol template v1 live across 8–15 sites with lab-routing integrations,
    structured record-retrieval workflows for community and academic sites, and
    sponsor dashboards for days to first qualified patient, screen-pass rate,
    and biomarker-packet completeness.
  twelveMonth: >-
    Reusable multi-study configuration layer, role-based review controls, and
    cross-site benchmark reports that let a sponsor launch additional
    AR-pathway studies without rebuilding every qualification rule and evidence
    step from scratch.
  twentyFourMonth: >-
    Second protocol family for adjacent hormone-driven or transcription-factor
    oncology programs at existing sponsor accounts, while preserving the same
    sponsor-controlled orchestration layer across labs, CROs, and heterogeneous
    records.
  keyBets:
    - >-
      Sponsors will accept workflow orchestration positioned as controlled
      decision support with explicit human review, not autonomous treatment
      recommendation.
    - >-
      One mCRPC template can absorb enough protocol variation to keep
      implementation repeatable and target gross margins at or above 70%.
    - >-
      Cross-site benchmark data on qualification and mechanism-evidence
      completeness will become more valuable to sponsors than any single
      matching model.
    - >-
      Initial sponsor accounts will have adjacent hormone-driven or
      transcription-factor programs that can reuse the same workflow inside 24
      months.

gtm:
  wedge: >-
    Sell "AR-resistance qualification and mechanism-evidence orchestration" into
    IND-cleared, first-patient-in planning for 8–15-site mCRPC degrader studies;
    the first proof point is faster qualified enrollment plus cleaner
    pharmacodynamic packets, not generic AI recruitment.
  channels:
    - Founder-led outbound to VP Clinical Operations, translational leaders, and CMOs at Series B–D oncology biotechs
    - Investor, board, and KOL introductions into venture-backed oncology sponsor portfolios
    - Genomic-lab, central-lab, and CRO referral partnerships once the sponsor-owned workflow boundary is defined
  funnelTargets: "Target account → discovery 25–35%; discovery → paid design pilot 20–30%; pilot → study-wide production 50%+"
  pricing: >-
    Annual fee per active sponsor study, plus per-site onboarding and optional
    per-enrolled-patient evidence-workflow support. Initial pilots should land
    around $150k–$250k for the first 3–5 sites and expand toward the researched
    ~$300k–$350k blended study-year economics once the workflow covers the full
    study, because buyers already spend against enrollment, profiling, and
    trial-enablement budgets rather than net-new AI budgets.

businessModel:
  revenueStreams:
    - Annual sponsor subscription per active study
    - Per-site onboarding and protocol configuration fees
    - Optional per-enrolled-patient evidence-workflow support fees
    - Expansion modules for benchmark analytics and adjacent-program rollout
  unitOfValue: Active sponsor study with qualified-patient and mechanism-evidence workflows managed across sites
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one study to multiple AR-pathway studies at the same sponsor
    - Extend the workflow into adjacent hormone-driven or transcription-factor programs
    - Add benchmark analytics and companion-diagnostic workflow modules once the core packet flow is proven

strategyMap:
  northStarMetric: Qualified patients enrolled with complete sponsor-usable mechanism-evidence packets per active study quarter
  inputMetrics:
    - Days from site activation to first qualified patient
    - Screen-pass rate after sponsor packet submission
    - Biopsy and ctDNA packet completeness rate
    - Days from dosing to interpretable pharmacodynamic packet
    - Pilot-to-study-wide expansion rate
    - Number of sites and referral sources benchmarked per protocol template
  moatsToBuild:
    - AR-resistance qualification rule library linking treatment history, biomarkers, and protocol constraints
    - Cross-site benchmarks on missing records, screen-pass rates, and mechanism-data completeness
    - Sponsor-controlled referral and lab network that produces reusable evidence packets across studies
  killCriteria:
    - Fewer than 3 paid sponsor pilots by month 12 after 25 or more target-account conversations
    - Pilot studies fail to improve either time to first qualified patient by at least 25% or biomarker-packet completeness to 85% or better versus manual baseline
    - More than half of target sponsors or sites block the prescreening data-access boundary required for packet assembly
  mermaid: |
    flowchart LR
      Wedge[AR degrader mCRPC wedge] --> MVP[Qualification plus evidence workflow MVP]
      MVP --> Proof[Faster qualified enrollment and cleaner PD packets]
      Proof --> Expansion[Adjacent hormone-driven oncology programs]

investorMemo:
  verdict:
    call: Watch
    conviction: >-
      Interesting wedge with real buyer urgency, but conviction stays limited
      until the company proves data-access permission and repeatable gross
      margins across more than one live study.
    whyBelieve: >-
      Flare's financing, IND clearance, and planned Q3 2026 clinical start show
      that sponsors will spend now to de-risk AR-resistance enrollment and proof
      of mechanism workflows.
    whyDoubt: >-
      The measured near-term market is small, and the product can collapse into
      bespoke clinical-ops services if prescreen data access or serial biopsy
      logistics stay too site-specific.
    nextDiligence: >-
      Secure three sponsor design partners with baseline screen-pass and
      biomarker-completeness metrics, then show one pilot with at least 25%
      faster first qualified patient or at least 85% complete mechanism packets.
  firstCustomer:
    title: VP Clinical Operations at a clinical-stage oncology biotech
    profile: >-
      U.S. Series B–D oncology biotech activating an 8–15-site first-in-human
      or early Phase II mCRPC AR-pathway degrader study with lean internal
      translational ops and pressure to show mechanism data before the next
      board or partnering process.
    trigger: >-
      IND clearance, site activation, or first-patient-in planning exposes that
      manual chart review, biopsy scheduling, and ctDNA tracking will not
      deliver a fast proof-of-concept readout.
    buyer: VP Clinical Operations or CMO
    initialContract: >-
      Paid pilot of $150k–$250k for one protocol and the first 3–5 sites,
      expanding to roughly $300k–$400k annualized as the sponsor rolls the
      workflow across the full study and adds per-patient evidence support.
  mustBeTrue:
    - At least 10 U.S. sponsor studies over the next 24 months match the beachhead profile and require serial biopsy or ctDNA evidence workflows.
    - Clinical-ops buyers will sign a $150k–$250k pilot before enrollment slips, driven by IND-to-FPI pressure rather than only after a failed study start.
    - Sponsors and sites will permit a third-party workflow layer to assemble prescreening packets with auditable human review and acceptable privacy and compliance controls.
    - A repeatable mCRPC template can improve time to first qualified patient or screen-pass rate across multiple studies without more than 20% custom build per protocol.
    - Labs, CROs, and trial networks will not fully absorb the sponsor-controlled cross-site benchmarking layer before the company reaches about 12 live studies.
  diligenceQuestions:
    - Which named sponsor protocols besides FX-111 require this workflow in the next 24 months?
    - What are baseline days to first qualified patient, screen-pass rates, and biomarker-packet completeness on current manual workflows?
    - Can the product operate pre-consent, or must it stay inside site-driven prescreening and post-consent workflows?
    - How much of biopsy and ctDNA orchestration can be templated before gross margin falls below software-like levels?
    - Would Caris, Foundation, Labcorp, or CRO partners resell this layer, or do they view it as overlap with their roadmap?

operatingAssumptions:
  - assumption: >-
      Buyers can be closed before an enrollment failure if the sales motion
      attaches to an active IND-to-FPI window rather than generic AI tooling.
    basis: research.yaml
    validationTest: >-
      Run 15 sponsor interviews with VP Clinical Operations or CMO buyers who
      have an active study launch in the next 6 months; target 3 signed LOIs or
      paid pilots at $150k or more.
    decisionImpact: >-
      If false, the GTM must shift toward post-delay rescue or much lower ACVs,
      which compresses the year-3 SOM and weakens the venture case.
  - assumption: >-
      Days to first qualified patient and biomarker-packet completeness are
      strong enough outcome metrics to support roughly $300k–$350k blended
      study-year pricing.
    basis: research.yaml
    validationTest: >-
      In the first live pilot, capture manual baseline across 3–5 sites and
      convert only if the sponsor sees either at least 25% faster first
      qualified patient or at least 85% packet completeness at the proposed
      annualized price.
    decisionImpact: >-
      If false, pricing must move down or shift toward variable services, which
      reduces gross margin and slows hiring.
  - assumption: >-
      Sponsor and site compliance teams will allow controlled access to
      fragmented records for prescreening or sponsor-reviewed packet assembly.
    basis: research.yaml
    validationTest: >-
      Run 5 sponsor QA or legal reviews and 5 site privacy reviews; target
      approval for the proposed workflow boundary in at least 3 live accounts.
    decisionImpact: >-
      If false, deployment must move inside site teams or post-consent only,
      narrowing the moat and lengthening setup time.
  - assumption: >-
      One protocol family for mCRPC AR-pathway degraders is repeatable enough to
      keep custom work below 20% of implementation effort.
    basis: idea.yaml
    validationTest: >-
      Configure the first two studies using the same template and measure code
      or configuration reuse plus manual ops hours per enrolled patient.
    decisionImpact: >-
      If false, the company becomes implementation-heavy, needs more
      clinical-ops headcount, and is unlikely to sustain 70% gross margins.
  - assumption: >-
      Initial sponsor accounts will have adjacent hormone-driven or
      transcription-factor programs that can reuse the same evidence stack
      within 24 months.
    basis: operator judgment
    validationTest: >-
      Build a named-account pipeline map for the first 5 sponsors and confirm at
      least 2 adjacent expansion opportunities with the same buyer.
    decisionImpact: >-
      If false, the market remains close to the researched SAM and the funding
      strategy should stay capital-efficient rather than assuming broad
      platform expansion.

experimentRoadmap:
  - horizon: 0–90 days
    experiment: Sponsor KPI and pricing discovery sprint
    hypothesis: >-
      Clinical-ops buyers will prioritize a workflow purchase when it is tied to
      a live IND-to-FPI launch and framed around qualified enrollment speed plus
      mechanism-data completeness.
    successMetric: 8 of 15 target buyers identify this as a current budget problem and at least 3 agree to pilot terms
    owner: Founding CEO
  - horizon: 0–90 days
    experiment: Compliance boundary design review
    hypothesis: >-
      A sponsor-reviewed, human-in-the-loop workflow can access enough
      prescreening and packet-assembly data to be useful without triggering an
      unacceptable regulatory or privacy objection.
    successMetric: 3 sponsor or site teams approve the proposed workflow boundary or provide remediable redlines
    owner: Founding CEO and QA lead
  - horizon: 90–180 days
    experiment: First live mCRPC pilot across 3–5 sites
    hypothesis: >-
      The product can beat manual coordinator workflows on either time to first
      qualified patient or biomarker-packet completeness in one active study.
    successMetric: At least 25% faster first qualified patient or at least 85% complete mechanism packets versus baseline
    owner: Clinical operations lead
  - horizon: 90–180 days
    experiment: Tissue versus ctDNA workflow template benchmark
    hypothesis: >-
      A ctDNA-first path with tissue reflex can remove some scheduling delay
      without degrading sponsor confidence in the pharmacodynamic readout.
    successMetric: At least 30% of pilot candidates avoid tissue-driven delay while still producing sponsor-accepted evidence packets
    owner: Translational medicine lead
  - horizon: 180–365 days
    experiment: Lab or CRO co-sell pilot
    hypothesis: >-
      At least one lab or CRO partner will introduce qualified sponsor accounts
      without demanding ownership of the sponsor-facing benchmarking layer.
    successMetric: 2 qualified sponsor introductions and 1 signed pilot sourced from one partner within 180 days
    owner: Founding CEO
  - horizon: 365–540 days
    experiment: Adjacent-program expansion test
    hypothesis: >-
      The first sponsor buyer will expand the workflow into a second hormone-driven
      or transcription-factor program once the initial mCRPC study shows KPI lift.
    successMetric: 1 expansion contract at an existing sponsor by month 18
    owner: Founding CEO and product lead

operations:
  - "Data intake: treatment history, pathology, and genomic reports normalized into sponsor-reviewed screening packets; mCODE and USCDI used where available, manual exception handling where not."
  - "Compliance: explicit human signoff, auditable records, and workflow controls aligned to FDA expectations for electronic records and signatures in clinical investigations."
  - "Site execution: biopsy and ctDNA window management, central-lab routing, and completeness checks across academic and community GU sites."
  - "Analytics: dashboards by site, referral source, and resistance profile for screen-pass rate, missing-record causes, and pharmacodynamic packet turnaround."
  - "Key partners: academic GU centers, community urology networks, genomic and central labs, and CRO study teams."

team:
  - role: Founding CEO and oncology workflow seller
    startTiming: Month 0
    rationale: >-
      Owns sponsor discovery, pricing, and design-partner sales; requires enough
      oncology-clinical-ops fluency to sell to VP Clinical Operations and CMOs
      around a live study launch.
  - role: Founding product and data engineer
    startTiming: Month 0
    rationale: >-
      Builds the qualification rules engine, packet workflow, partner
      integrations, and auditability layer across heterogeneous oncology data
      sources.
  - role: Clinical operations implementation lead
    startTiming: Month 3
    rationale: >-
      Onboards sites, manages records retrieval and sample logistics, and
      ensures the first studies become repeatable templates instead of bespoke
      service projects.
  - role: Translational medicine and biomarker product lead
    startTiming: Month 6
    rationale: >-
      Encodes biopsy, ctDNA, and mechanism-readout requirements into product
      workflows and helps the sponsor trust packet completeness as evidence, not
      just coordination.
  - role: QA and partnerships manager
    startTiming: Month 9
    rationale: >-
      Formalizes sponsor QA reviews, electronic-record controls, and lab or CRO
      channel relationships once early pilots prove there is a repeatable core
      workflow to scale.

milestones:
  - horizon: 0–12 months
    items:
      - "Month 3: first sponsor design-partner LOI and compliance-approved workflow boundary"
      - "Month 6: one live pilot across 3–5 sites with baseline screen-pass and packet-completeness metrics captured"
      - "Month 9: two paid sponsor pilots and the first dashboard showing referral-source and site-conversion benchmarks"
      - "Month 12: three to four active studies and at least one case study with ≥25% faster first qualified patient or ≥85% complete mechanism packets"
  - horizon: 12–24 months
    items:
      - "Month 18: five active sponsor studies and one lab or CRO referral channel producing qualified introductions"
      - "Month 21: reusable multi-study configuration layer cuts setup time below four weeks for repeat AR-pathway studies"
      - "Month 24: first adjacent hormone-driven or transcription-factor protocol live at an existing sponsor and eight active studies total"
  - horizon: 24–36 months
    items:
      - "Month 30: cross-site benchmark library becomes a sponsor decision input for inclusion-criteria refinement across multiple programs"
      - "Month 36: 12 live studies at blended ~$350k study-year economics and a clear read on whether expansion supports a Series A story"

risks:
  - risk: Prescreening data access is blocked by site, privacy, or sponsor-QA constraints
    likelihood: High
    impact: High
    mitigation: >-
      Start with sponsor-reviewed, human-in-the-loop workflows; win approval at
      motivated sites first; and be prepared to deploy inside site-directed
      prescreening boundaries if third-party access is too broad initially.
  - risk: Serial biopsy and pathology workflows make the product feel like bespoke services
    likelihood: High
    impact: High
    mitigation: >-
      Limit the first release to one mCRPC template, price onboarding and custom
      work separately, and refuse adjacent feature requests until the common
      workflow is proven reusable across multiple studies.
  - risk: The AR-degrader buyer universe stays smaller for longer than expected
    likelihood: Medium
    impact: High
    mitigation: >-
      Keep burn aligned to a small number of high-value sponsor accounts and
      prioritize same-buyer expansion into adjacent hormone-driven or
      transcription-factor programs before broadening the sales motion.
  - risk: Labs, CROs, or trial networks bundle similar workflow features around their existing data assets
    likelihood: Medium
    impact: High
    mitigation: >-
      Position as the neutral sponsor-controlled orchestration layer across
      multiple vendors, and deepen the cross-site benchmark dataset that any one
      partner sees only partially.
  - risk: ctDNA-first workflows do not reduce enough tissue-driven delay to improve economics
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Support tissue-first and ctDNA-first paths from the start, measure where
      each works, and avoid promising a liquid-biopsy-only operating model until
      sponsor data proves it.

fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3–5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway to build the mCRPC qualification and evidence-workflow
    product, hire founding engineering plus clinical-ops and translational
    implementation talent, secure 3–4 paid sponsor pilots, define the
    compliance boundary with labs and sites, and reach a repeatable path toward
    5 or more active studies before the next financing decision.
