fundingAsk:
  round: pre-seed
  amountM: 3.0
  runwayMonths: 18
  milestone: >-
    Reach 5 active sponsor studies, one working lab or CRO referral channel, and
    reusable multi-study setup below four weeks by Month 18; the included
    six-month buffer carries the company to 8 live studies by Month 24.
  useOfFunds:
    - bucket: Engineering
      amountUsd: 1200000
      percentage: 40
    - bucket: GTM
      amountUsd: 750000
      percentage: 25
    - bucket: "G&A"
      amountUsd: 450000
      percentage: 15
    - bucket: "Buffer (6 mo)"
      amountUsd: 600000
      percentage: 20
scenarios:
  downside:
    description: >-
      Budget unlock proves slower and the workflow stays more services-heavy, so
      the company exits Y3 with only 9 live studies, pricing stays near the low
      end of the business-plan range, and the current pre-seed would be
      exhausted without cost controls or an extension round.
    y3RevenueK: 2696.5
    y3EbitdaK: -999.5
    cashLowPointK: -130.8
    keyAssumptionChanges:
      - "Y3 exit active studies cut to 9 instead of 12."
      - "Blended monthly revenue per study caps at $30K by Q4Y3 instead of $34K."
      - "Gross margin tops out at 67% because implementation remains bespoke."
  base:
    description: >-
      The base case hits the BP milestone path: 5 active studies by Month 18, 8
      by Month 24, and 12 by Month 36, with pricing moving from ~$200K pilots
      to ~$350K recurring study-years plus onboarding and evidence-support
      revenue.
    y3RevenueK: 3915.0
    y3EbitdaK: 1.6
    cashLowPointK: 1195.7
    keyAssumptionChanges:
      - "Customer ramp follows the milestone path from 4 active studies at Y1 exit to 12 at Y3 exit."
      - "Gross margin expands from 55% in pilot months to 72% in Q4Y3 as the template becomes reusable."
      - "One commercial hire in Y2 and one additional commercial hire in Y3 are enough because the market remains narrow and same-buyer expansion matters."
  upside:
    description: >-
      KPI proof lands early, one partner channel works by Y2, and same-buyer
      adjacent-program expansion lifts the company to 14 live studies by Y3 exit
      with better pricing and only one extra sales hire.
    y3RevenueK: 4836.5
    y3EbitdaK: 591.7
    cashLowPointK: 1505.0
    keyAssumptionChanges:
      - "Y3 exit active studies rise to 14 instead of 12."
      - "Blended monthly revenue per study reaches $36K by Q4Y3 through adjacent-program expansion and richer support mix."
      - "One extra sales hire is added in Month 25, but gross margin still reaches 75% as onboarding becomes repeatable."
sensitivity:
  - variable: ARPU
    downsideCase: "$300K recurring study-year with limited benchmark-analytics or support upsell"
    baseCase: "$375K blended unit economics from $350K recurring plus support mix"
    upsideCase: "$400K+ annualized study economics via benchmark analytics and broader evidence support"
    y3RevenueImpactK: -520.0
    cashImpactK: -380.0
  - variable: CAC
    downsideCase: "$140K CAC if founder outbound stays primary and partner referrals do not convert"
    baseCase: "$100K CAC with one referral channel and same-buyer expansion"
    upsideCase: "$70K CAC if lab or CRO referrals supply most qualified opportunities"
    y3RevenueImpactK: -150.0
    cashImpactK: -320.0
  - variable: churn
    downsideCase: "4.0% monthly as protocols end without adjacent-study expansion"
    baseCase: "2.5% monthly active-study churn"
    upsideCase: "1.5% monthly if same-buyer program expansion offsets study rolloff"
    y3RevenueImpactK: -290.0
    cashImpactK: -210.0
  - variable: sales cycle
    downsideCase: "9 months end-to-end; first paid pilot slips to M8"
    baseCase: "5-6 months; first paid pilot lands in M5"
    upsideCase: "4-5 months; partner-sourced pilot lands in M4"
    y3RevenueImpactK: -620.0
    cashImpactK: -450.0
  - variable: gross margin
    downsideCase: "65% Y3 gross margin because biopsy and packet workflows remain labor-intensive"
    baseCase: "71% Y3 gross margin"
    upsideCase: "75% Y3 gross margin with standardized packet assembly and less exception handling"
    y3RevenueImpactK: 0.0
    cashImpactK: -235.0
  - variable: hiring pace
    downsideCase: "Two non-critical hires pulled forward by one quarter without faster sales"
    baseCase: "9 FTE by Q4Y2 and 12 FTE by Q4Y3"
    upsideCase: "Back-half hires delayed one quarter if pilots slip and management preserves cash"
    y3RevenueImpactK: 0.0
    cashImpactK: -275.0
modelDiagram:
  title: active study economics
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ActiveStudies
      ActiveStudies --> StudyRevenue
      ActiveStudies --> BenchmarkData
      BenchmarkData --> Expansion
      Expansion --> ActiveStudies
      StudyRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Revenue is driven by active studies growing from 4 at Y1 exit to 12 at Y3 exit while pricing moves from ~$200K pilot work to ~$350K recurring study-years plus support.
  - checkName: Must go right
    finding: The model needs one live pilot by Month 6 and workflow reuse below the BP's 20% custom-work ceiling so gross margin can clear 70% by Y3.
  - checkName: Model breaks if
    finding: If prescreening access or evidence-packet logistics stretch the sales cycle toward 9 months, the downside case falls to $2.7M Y3 revenue and cash goes negative.
  - checkName: Next-round proof
    finding: A seed story exists once the pre-seed gets the company to 5 active studies, one referral channel, and setup time below four weeks before the Month-24 expansion target.
sanityChecks:
  ruleOf40: "Y3 growth 107% + EBITDA margin 0% = 107%"
