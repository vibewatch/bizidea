slug: ar-resistance-evidence-network
date: '2026-07-01'
executiveSummary: 把同类首创 AR 通路降解剂带进转移性去势抵抗性前列腺癌的 B–D 轮肿瘤生物科技公司，眼下最卡的不是找站点，而是能不能在下一次董事会或 BD 节点前，尽快找出那小撮 AR 驱动且已耐药的患者，并拿回申办方真正能用的在靶证据。现在这套流程散落在社区泌尿科病历、病理档案、基因检测报告、活检排期、ctDNA 流转和表格追踪里，所以入组慢、筛选失败率高、药效动力学资料包也常常不完整。公司卖的是一层由申办方买单的工作流层：围绕具体方案拼筛选资料包、补缺失病历，并在美国 8–20 个站点间协同活检和 ctDNA 证据留存。初始滩头市场故意收得很窄——美国临床阶段生物科技公司的 mCRPC AR 通路降解剂研究——因为最强的购买触发点就出现在 IND 放行、站点开站和首例患者入组计划阶段；这时候临床运营负责人最想买的是机制验证速度，而不是又一个通用招募工具。相邻预算本来就存在于试验支持、分子分型、站点 analytics 和临近患者就绪时的开站里，所以定价可以直接挪用运营预算，不必新造一条 AI 科目。真正的差异化不在漏斗顶部 lead 数，而在由申办方掌控的 AR 耐药资格判断逻辑，以及跨站点的机制数据完整性。研究里还有两个关键问题没打穿：一是除了首批买方之外，短期到底有多少方案；二是究竟“拿到首位合格患者的天数”“筛选通过率”还是“生物标志物资料包完整率”最能最快撬开预算。如果前期试点能在一个可复用模板上稳定把合格入组速度拉上来、把证据包做干净，公司就能从前列腺癌 AR 降解剂研究扩到更广的激素驱动和转录因子肿瘤项目；做不到，它就会停在一个服务味很重的细分生意里。
problem:
- 首次人体和早期 mCRPC AR 通路降解剂研究，要解决的不是简单的诊断匹配。申办方在患者真正进入筛选前，就得拿到既往治疗线、分子耐药证据，以及连续活检或 ctDNA 计划。
- 这些证据散在社区泌尿科病历、病理档案、基因报告、实验室门户和站点人工跟进里，所以申办方很难稳定判断谁真符合条件、哪个站点真能产出可用的机制数据。
- 无论是人工协调员审阅、CRO 招募支持、分子实验室匹配门户，还是横向试验软件，都只优化流程的一小段，没人把申办方专属的 AR 耐药资格判断和药效资料包完整性从头管到尾。
solution:
- 一层人工复核在环的工作流：吃进治疗史、基因报告和方案级 AR 耐药规则，标出高概率合格患者，补齐缺失病历，并拼出经申办方复核的筛选资料包。
- 站点执行工具负责排活检和 ctDNA 时间窗、把样本送往实验室合作方、跟踪完整性，并保留可审计性，让转化医学团队按时拿到可解释的药效动力学资料包。
- 申办方仪表盘会按转诊来源、耐药谱系、筛选通过率和站点生物标志物完整率做基准，让团队在研究进行中收紧纳入策略，同时为未来研究积累一张专有证据网络。
whyWeWin:
- 公司卡在招聘厂商、CRO 运营和分子分型实验室之间的空白层：一层由申办方掌控的 AR 耐药证据层，能跨异构病历，也能穿过多个工作流合作方。
- 先从一个狭窄的 mCRPC 降解剂模板切入，比做一个泛肿瘤招募产品更容易更快证明价值，因为第一批买方已经有明确的 IND 到 FPI 触发点，也背着清晰的证据负担。
- 反复部署会沉淀一套规则库，把治疗史、生物标志物和方案约束连起来，同时积累跨站点基准：缺失病历、筛选通过率，以及机制数据完整性——这些都不是通用平台天然会采集到的数据。
- 只要公司坚持做中立、面向申办方的编排层，而不是试图替换整套试验技术栈，它就能和现有实验室、CRO 以及横向试验软件一起卖，而不是正面硬碰。
strategicChoices:
  beachhead: 美国 B–D 轮肿瘤生物科技公司：它们在 8–20 个站点跑 I/II 期转移性去势抵抗性前列腺癌研究，测试同类首创 AR 通路降解剂；每位患者都要补齐既往治疗史、分子耐药资格判断，以及连续活检或 ctDNA 证据。
  wedgeRationale: 这个切口够窄，能把一个模板打磨成产品；又够痛，能很快拿预算——申办方本来就在为试验支持花钱，患者又很难判定资格，而 PoC 同时卡在入组速度和干净的在靶数据上。要是上来就做泛肿瘤匹配或整个 CTMS 替换，只会在还没有任何研究级证据前先把买方和工作流复杂度拉满。
  sequencingRationale: 先做申办方侧的资格判断和证据资料包编排，因为 IND 到 FPI 的预算痛点就卡在这里。前 3–5 个研究更需要工作流设计、合规边界定义和伙伴协同，不需要大规模 AE 团队，所以先配产品/数据工程和临床运营实施，再补销售。等核心 mCRPC 模板真能稳定抬 KPI、而且不必每次重搭，才去加实验室、CRO 和相邻项目的合作。
  notYet:
  - 泛肿瘤临床试验匹配 marketplace
  - 自动化治疗推荐或诊断决策支持
  - 替换整个 CRO、CTMS 或 EDC
  - 在美国工作流和合规边界跑通前，不做非美国扩张
  - 只做学术中心、不碰社区泌尿入口
market:
  tam: $75M（估算：美国每年约 250 个高生物标志物密度的激素驱动或相邻转录因子肿瘤研究年 × 每个研究年申办方工作流支出约 $300k）
  sam: $18M（估算：美国每年约 60 个靠近滩头市场的研究年，集中在晚期前列腺癌、AR 通路和相邻激素驱动方案，且需要资格判断加连续证据工作流）
  som: $4.2M 第 3 年（12 个在跑的申办方研究，软件、导入和证据工作流支持合计每个研究年混合约 $350k）
  segments:
  - 主要：运行 mCRPC AR 通路降解剂研究的美国临床阶段肿瘤生物科技公司
  - 次要：前列腺工作流跑通后，同一批申办方里的相邻激素驱动或转录因子肿瘤项目
  buyingProcess: 通常由 VP Clinical Operations 或 CMO 在 IND 放行、站点开站或首例患者入组计划阶段发起；转化医学和站点启动团队再去验证工作流是否贴合。随后，申办方 QA/法务和关键站点会审电子病历、隐私和样本物流控制；第一份合同最可能是绑在开站窗口上的单研究试点。
product:
  mvp: 一套围绕 mCRPC AR 通路降解剂的方案专属工作流：覆盖治疗史采集、基因报告审阅、申办方复核的筛选资料包拼装，以及在前 3–5 个试点站点间编排活检或 ctDNA 任务。MVP 明确坚持人工复核在环、随时可审计，而不是自动化患者推荐引擎。
  sixMonth: Protocol template v1 在 8–15 个站点上线，接上实验室路由集成，跑通社区与学术站点的结构化病历调取流程，并让申办方在仪表盘上看到：首位合格患者所需天数、筛选通过率，以及生物标志物资料包完整率。
  twelveMonth: 做出可复用的多研究配置层、基于角色的审阅控制，以及跨站点基准报表，让申办方启动更多 AR 通路研究时，不必从零重搭每条资格规则和每一步证据流程。
  twentyFourMonth: 在现有申办方账户里推出第二套方案家族，服务相邻的激素驱动或转录因子肿瘤项目，同时仍由同一层申办方掌控的编排层去串联实验室、CRO 和异构病历。
  keyBets:
  - 只要产品定位成“有明确人工复核的受控决策支持”，而不是自动化治疗推荐，申办方就愿意买这套工作流编排。
  - 一套 mCRPC 模板能吸收足够多的方案差异，让实施仍可复用，并把目标毛利率守在 70% 或更高。
  - 跨站点的资格判断与机制证据完整性基准，对申办方的价值会超过任何单一 matching model。
  - 首批申办方账户会在 24 个月内拿出相邻的激素驱动或转录因子项目，复用同一套工作流。
gtm:
  wedge: 把“AR 耐药资格判断 + 机制证据编排”卖进已获 IND、正计划首例患者入组的 8–15 站点 mCRPC 降解剂研究；第一批证明点不是泛化 AI 招募，而是更快的合格入组和更干净的药效动力学资料包。
  channels:
  - 创始人主导外呼，面向 B–D 轮肿瘤生物科技公司的 VP Clinical Operations、转化医学负责人和 CMO
  - 通过投资人、董事会和 KOL 关系切入风投支持的肿瘤申办方组合
  - 当申办方自有工作流边界被定义清楚后，再建立与基因实验室、中心实验室和 CRO 的转介绍合作
  funnelTargets: 目标账户 → 需求探索 25–35%；需求探索 → 付费共创试点 20–30%；试点 → 全研究正式上线 50%+
  pricing: 每个活跃申办方研究收年度费用，另加每站点导入费，以及可选的按已入组患者计费的证据工作流支持。首批试点应落在 $150k–$250k，覆盖前 3–5 个站点；等工作流跑完整项研究后，再往研究得出的 $300k–$350k 混合研究年经济模型扩。原因也很简单：买方本来就在为入组、分型和试验支持花钱，不是在申请一条全新的 AI 预算。
businessModel:
  revenueStreams:
  - 每个活跃研究收取年度申办方订阅费
  - 每站点导入与方案配置费
  - 可选的按已入组患者计费的证据工作流支持费
  - 用于基准分析和相邻项目铺开的扩展模块
  unitOfValue: 跨站点管理合格患者与机制证据工作流的活跃申办方研究
  targetGrossMarginPct: 70
  expansionLevers:
  - 从同一申办方的一项研究扩到多项 AR 通路研究
  - 把工作流延展到相邻的激素驱动或转录因子项目
  - 核心资料包流程跑顺后，再叠加基准分析和伴随诊断工作流模块
strategyMap:
  northStarMetric: 每个活跃研究季度里，带着完整、申办方可用的机制验证资料包完成入组的合格患者数
  inputMetrics:
  - 从站点开站到首位合格患者的天数
  - 申办方提交资料包后的筛选通过率
  - 活检与 ctDNA 资料包完整率
  - 从给药到形成可解释药效动力学资料包的天数
  - 从试点扩到全研究的转化率
  - 每个方案模板下被基准的站点和转诊来源数量
  moatsToBuild:
  - 把治疗史、生物标志物和方案约束连起来的 AR 耐药资格判断规则库
  - 围绕缺失病历、筛选通过率和机制数据完整性的跨站点基准
  - 由申办方掌控、可在多项研究间复用证据资料包的转诊与实验室网络
  killCriteria:
  - 第 12 个月前，在做过 25 次以上目标账户交流后，付费申办方试点仍少于 3 个。
  - Pilot 研究无法相对人工基线，把首位合格患者时间至少缩短 25%，或把生物标志物资料包完整率打到 85% 以上。
  - 超过一半的目标申办方或站点，卡死了拼资料包所需的预筛数据接入边界。
  mermaid: |
    flowchart LR
      Wedge[AR degrader mCRPC wedge] --> MVP[Qualification plus evidence workflow MVP]
      MVP --> Proof[Faster qualified enrollment and cleaner PD packets]
      Proof --> Expansion[Adjacent hormone-driven oncology programs]
investorMemo:
  verdict:
    call: 观察
    conviction: 切口有意思，买方也确实着急，但在公司证明自己能拿到 prescreen data access，并且在不止一个在跑研究上跑出可重复毛利之前，判断仍只能放在观察位。
    whyBelieve: Flare 的融资、IND 放行与 2026 年 Q3 临床启动计划说明：申办方现在就会为降低 AR 耐药入组与机制验证工作流的风险而花钱。
    whyDoubt: 可测的短期市场仍小，而且如果 prescreen 数据接入或连续活检物流过于站点定制化，产品很容易塌成一项 bespoke 临床运营服务。
    nextDiligence: 先拿下 3 个申办方共创客户，补齐基线筛选通过率和生物标志物完整率，再跑出 1 个试点：要么把首位合格患者速度提快至少 25%，要么把机制资料包完整率打到至少 85%。
  firstCustomer:
    title: 临床阶段肿瘤生物科技公司的 VP Clinical Operations
    profile: 美国 B–D 轮肿瘤生物科技公司，正要在 8–15 个站点启动一项首次人体或早期 II 期 mCRPC AR 通路降解剂研究；内部转化运营人手精简，又要在下一次董事会或 BD 进程前拿出机制数据。
    trigger: IND 放行、站点开站或首例患者入组计划一启动，就会暴露出：只靠手工查病历、排活检和追 ctDNA，根本交不出足够快的 PoC 读出。
    buyer: VP Clinical Operations 或 CMO
    initialContract: 先签一个 $150k–$250k 的付费试点，覆盖一个方案和前 3–5 个站点；等申办方把这套工作流扩到整项研究并加上按患者计费的证据支持后，再扩到年化约 $300k–$400k。
  mustBeTrue:
  - 未来 24 个月里，至少有 10 项美国申办方研究符合这个滩头市场画像，而且确实需要连续活检或 ctDNA 证据工作流。
  - 临床运营买方会在入组真正滑坡前，就因为 IND 到 FPI 的压力而签下 $150k–$250k 的试点，而不是等研究启动失败后才被动补救。
  - 申办方和站点会允许第三方工作流层在可审计的人审前提下拼接预筛资料包，而且隐私与合规控制能过关。
  - 一套可复用的 mCRPC 模板，能在多项研究里改善首位合格患者时间或筛选通过率，同时每个方案的定制开发不超过 20%。
  - 在公司做到大约 12 个在跑研究之前，实验室、CRO 和试验网络不会把由申办方掌控的跨站点基准层完整吸走。
  diligenceQuestions:
  - 除了 FX-111，未来 24 个月里还有哪些具名申办方方案需要这套工作流？
  - 现有手工工作流下，拿到首位合格患者的基线天数、筛选通过率和生物标志物资料包完整率分别是多少？
  - 产品能否在正式 consent 前运行，还是只能留在站点主导的预筛或 consent 之后的流程里？
  - 活检和 ctDNA 编排里，到底有多少能模板化，才不至于把毛利率打到软件以下？
  - Caris、Foundation、Labcorp 或 CRO 合作方会转卖这层能力，还是会把它看成和自己 roadmap 重叠？
operatingAssumptions:
- assumption: 只要销售动作绑在一个正在进行的 IND 到 FPI 窗口上，而不是泛化 AI 工具叙事，买方就能在入组出问题前被拿下。
  basis: research.yaml
  validationTest: 访谈 15 位未来 6 个月内有活跃研究启动计划的 VP Clinical Operations 或 CMO 买方，目标是拿到 3 份已签 LOI 或 $150k 以上的付费试点。
  decisionImpact: 如果这个假设不成立，GTM 就得转向“出问题后补救”的场景，或接受更低 ACV；那会压缩第 3 年 SOM，也削弱 venture 逻辑。
- assumption: 首位合格患者天数和生物标志物资料包完整率，足以支撑约 $300k–$350k 的混合研究年定价。
  basis: research.yaml
  validationTest: 在首个在跑试点里，先把 3–5 个站点的人工基线采全；只有当申办方看到首位合格患者速度快至少 25%，或资料包完整率达到至少 85%，才按提议的年化价格转正。
  decisionImpact: 如果这个假设不成立，定价就得下调，或更偏向可变服务收费；这会压低毛利，也会拖慢招聘节奏。
- assumption: 申办方和站点的合规团队，会允许在预筛或申办方复核的资料包拼装场景下，受控地接入这些碎片化病历。
  basis: research.yaml
  validationTest: 跑 5 次申办方 QA/法务审阅和 5 次站点隐私审阅；目标是在至少 3 个在跑账户里拿到对所提工作流边界的批准。
  decisionImpact: 如果这个假设不成立，部署就得退回站点团队内部，或只能放在 consent 之后；护城河会变浅，部署时间也会拉长。
- assumption: 围绕 mCRPC AR 通路降解剂的一套方案家族，足够可复用，能把定制工作压在实施工作量的 20% 以下。
  basis: idea.yaml
  validationTest: 用同一套模板配置前两个研究，测代码或配置复用率，以及每位入组患者对应的人工运营工时。
  decisionImpact: 如果这个假设不成立，公司就会变成实施驱动型生意，需要更多临床运营 headcount，也很难长期守住 70% 毛利。
- assumption: 首批申办方账户会在 24 个月内拿出可复用同一套证据栈的相邻激素驱动或转录因子项目。
  basis: 运营判断
  validationTest: 给前 5 个申办方账户画具名 pipeline map，并确认至少 2 个能由同一买方带出来的相邻扩容机会。
  decisionImpact: 如果这个假设不成立，市场就会更贴近研究里的 SAM，融资策略也该以资本效率为主，而不是预设自己会很快长成大平台。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 申办方 KPI 与定价发现冲刺
  hypothesis: 临床运营买方会优先购买一套工作流，只要它直接绑定正在进行的 IND 到 FPI 启动窗口，并把价值框在“合格入组速度 + 机制数据完整性”上。
  successMetric: 15 个目标买方里有 8 个把它认定为当前预算问题，且至少 3 个接受试点条款
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 合规边界设计审阅
  hypothesis: 一套由申办方复核、人工在环的工作流，可以在不触发不可接受的监管或隐私异议前提下，拿到足够多的预筛与资料包拼装数据。
  successMetric: 3 个申办方或站点团队批准所提工作流边界，或只提出可修复的修改意见
  owner: 创始人/CEO 与 QA 负责人
- horizon: 90–180 天
  experiment: 首个正在进行的 mCRPC 试点，覆盖 3–5 个站点
  hypothesis: 产品在一项活跃研究里，至少能在“首位合格患者时间”或“生物标志物资料包完整率”其中一项上跑赢人工协调员流程。
  successMetric: 相对基线，首位合格患者至少提速 25%，或完整机制资料包至少达到 85%
  owner: 临床运营负责人
- horizon: 90–180 天
  experiment: 组织样本与 ctDNA 工作流模板对照
  hypothesis: 以 ctDNA 为先、必要时回补组织样本的路径，有机会拿掉一部分排期延迟，同时不损伤申办方对药效读出的信心。
  successMetric: 至少 30% 的试点候选患者避开了由组织活检驱动的延迟，同时仍产出被申办方接受的证据资料包
  owner: 转化医学负责人
- horizon: 180–365 天
  experiment: 实验室或 CRO 联合销售试点
  hypothesis: 至少有 1 家实验室或 CRO 愿意介绍高质量申办方账户，而且不要求拿走面向申办方的基准层控制权。
  successMetric: 180 天内，由单一合作方带来 2 个高质量申办方介绍，并签下 1 个试点
  owner: 创始人/CEO
- horizon: 365–540 天
  experiment: 相邻项目扩容测试
  hypothesis: 只要最初的 mCRPC 研究把 KPI 拉起来，第一位申办方买方就会把工作流扩到第二个激素驱动或转录因子项目。
  successMetric: 第 18 个月前，在现有申办方里签下 1 份扩容合同
  owner: 创始人/CEO 与产品负责人
operations:
- 数据采集：把治疗史、病理和基因报告规范进由申办方复核的筛选资料包；能用 mCODE 与 USCDI 的地方就用，用不了就走人工例外处理。
- 合规：明确人工签核、可审计记录，以及对齐 FDA 在临床研究里对电子记录和签名的预期的工作流控制。
- 站点执行：跨学术与社区 GU 站点管理活检与 ctDNA 时间窗、中心实验室流转，以及完整性检查。
- 分析：按站点、转诊来源和耐药谱系拉仪表盘，看筛选通过率、缺失病历原因和药效动力学资料包周转时间。
- 关键伙伴：学术型 GU 中心、社区泌尿网络、基因与中心实验室，以及 CRO 研究团队。
team:
- role: 创始人/CEO 与肿瘤工作流销售负责人
  startTiming: 第 0 个月
  rationale: 负责申办方发现、定价和共创客户销售；要有足够强的肿瘤临床运营语言，才能围绕在跑研究 launch 把 VP Clinical Operations 和 CMO 讲明白。
- role: 创始产品与数据工程师
  startTiming: 第 0 个月
  rationale: 负责搭资格判断规则引擎、资料包工作流、合作方集成，以及跨异构肿瘤数据源的可审计层。
- role: 临床运营实施负责人
  startTiming: 第 3 个月
  rationale: 负责站点导入、病历调取与样本物流，确保前几项研究沉淀成可复用模板，而不是一堆定制化服务项目。
- role: 转化医学与生物标志物产品负责人
  startTiming: 第 6 个月
  rationale: 把活检、ctDNA 和机制读出的要求编码进产品工作流，让申办方相信资料包完整性代表的是证据，而不只是协调动作。
- role: QA 与合作伙伴经理
  startTiming: 第 9 个月
  rationale: 在早期试点证明核心工作流可复用后，把申办方 QA 审阅、电子记录控制，以及实验室/CRO 渠道关系正式搭起来。
milestones:
- horizon: 0–12 个月
  items:
  - 第 3 个月：拿到首个申办方共创客户 LOI，并跑通获合规批准的工作流边界
  - 第 6 个月：在 3–5 个站点跑出 1 个在跑试点，并采齐基线筛选通过率和资料包完整率
  - 第 9 个月：拿下 2 个付费申办方试点，并做出第一版仪表盘，展示转诊来源和站点转化基准
  - 第 12 个月：做到 3–4 个活跃研究，并至少产出 1 个案例：首位合格患者提速 ≥25%，或机制资料包完整率 ≥85%
- horizon: 12–24 个月
  items:
  - 第 18 个月：做到 5 个活跃申办方研究，并跑通 1 条能带来高质量线索的实验室或 CRO 转介绍渠道
  - 第 21 个月：可复用的多研究配置层把重复 AR 通路研究的部署时间压到 4 周以内
  - 第 24 个月：在现有申办方里跑起首个相邻的激素驱动或转录因子方案，总活跃研究数达到 8 个
- horizon: 24–36 个月
  items:
  - 第 30 个月：跨站点基准库开始成为多个项目收紧纳入标准时的决策输入
  - 第 36 个月：做到 12 个在跑研究，混合研究年经济模型约 $350k，并看清这条扩张路径是否撑得起一轮 Series A 叙事
risks:
- risk: 预筛数据接入被站点、隐私或申办方 QA 限制卡住
  likelihood: High
  impact: High
  mitigation: 先从申办方复核、人工在环的工作流切入；先在愿意配合的站点拿到批准；如果第三方接入一开始过宽，就准备把部署收进站点主导的预筛边界内。
- risk: 连续活检和病理流程让产品更像定制化服务
  likelihood: High
  impact: High
  mitigation: 首个版本只做一套 mCRPC 模板；把导入和定制工作单独定价；在共性工作流被证明可跨多项研究复用前，拒绝相邻功能需求。
- risk: AR 降解剂买方池比预期更久都维持在小范围
  likelihood: Medium
  impact: High
  mitigation: 把 burn 和少数高价值申办方账户对齐；在扩大销售动作前，优先做同一买方向相邻激素驱动或转录因子项目的扩容。
- risk: 实验室、CRO 或试验网络把相似工作流功能打包进既有数据资产
  likelihood: Medium
  impact: High
  mitigation: 把自己定位成跨多家厂商、由申办方掌控的中立编排层，同时继续加深跨站点基准数据集——这是任何单一伙伴都只能看到一部分的。
- risk: ctDNA 优先的流程不足以消掉足够多的组织活检延迟，经济模型拉不起来
  likelihood: Medium
  impact: Medium
  mitigation: 从第一天就同时支持 tissue-first 和 ctDNA-first 两条路径，实测各自在哪些场景有效；在申办方数据没跑出来前，不承诺纯液体活检模式。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月现金跑道做出 mCRPC 资格判断与证据工作流产品，补齐创始工程、临床运营和转化实施人才，拿下 3–4 个付费申办方试点，和实验室、站点一起把合规边界定义清楚，并在下一次融资决策前跑到 5 个以上活跃研究的可复用路径。
