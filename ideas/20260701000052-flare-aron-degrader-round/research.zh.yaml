  validationPlan:
  - priority: 高
    question: 未来 24 个月里，美国晚期前列腺癌或相邻激素驱动肿瘤里，究竟有多少申办方研究真的需要连续活检或 ctDNA 证据？
    evidenceToGather: 拉一份具名账户清单：目标申办方、在跑方案、生物标志物终点，以及计划中的站点覆盖范围。
  - priority: 高
    question: 最能最快撬开预算的 KPI 是什么：首位合格患者所需天数、筛选通过率，还是生物标志物资料包完整率？
    evidenceToGather: 在 1 个在跑方案和 3–5 个站点上做试点设计，并采齐人工工作流基线数据。
  - priority: 高
    question: 产品能否在正式试验知情同意前、在申办方和站点批准的数据边界内运行，还是只能留在站点主导的预筛支持场景？
    evidenceToGather: 访谈申办方法务/QA、站点隐私团队，以及贴近 IRB 的运营角色。
  - priority: 中
    question: 以液体活检为先的流程，到底能多大程度上绕开组织样本延迟，同时又不伤害转化结论的可信度？
    evidenceToGather: 回顾目标研究里组织样本与 ctDNA 决策路径的历史数据，以及不同 assay 的可解释性。
  - priority: 中
    question: 分子实验室和试验网络会成为真正的渠道，还是未来的竞争对手？
    evidenceToGather: 访谈合作方，测 reseller economics，并至少与 2 家实验室/网络运营者一起画清工作流边界。
