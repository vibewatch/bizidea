openQuestions:
- 除了 Flare 之外，未来 24 个月里还有多少美国申办方方案会需要 AR 耐药资格判断与机制证据工作流？
- 申办方和站点会允许第三方编排层在正式 consent 前接触预筛病历，还是产品必须收窄到更保守的运营边界？
- 在早期 ARON 研究里，ctDNA 优先的流程到底能不能显著减少活检延迟，还是连续组织取样仍会是主要的机制验证路径？
- 在实际成交里，哪条经济叙事最有效：更快拿到首位合格患者、更低筛选失败率，还是更高的生物标志物资料包完整率？
