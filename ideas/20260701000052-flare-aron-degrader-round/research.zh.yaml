  adoptionFrictionMatrix:
  - friction: 要在方案预筛时及时拿到异构的社区病历、治疗史和生物标志物报告，本身就很难。
    severity: 高
    affectedBuyer: VP Clinical Operations
    mitigation: 先从积极配合的站点网络和实验室数据源切入，再叠加由申办方复核的筛选资料包，不要第一天就承诺全自动化。
