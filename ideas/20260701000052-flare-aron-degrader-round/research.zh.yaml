    mitigation: 围绕狭窄的 mCRPC 初始工作流，把组织、血浆、流转和完整性检查先做成标准方案模板。
    sourceRefs:
    - 25
    - 26
    - 27
  - friction: QA 与合规会担心电子记录、电子签名和决策支持边界。
    severity: 中
    affectedBuyer: 临床运营与申办方 QA
    mitigation: 用 Part 11 风格的可审计性、明确的人审签核，以及保守的工作流定位，替代黑盒推荐。
    sourceRefs:
    - 10
    - 14
  - friction: 围绕 AR 通路项目的初始买方池太小。
    severity: 中
    affectedBuyer: CMO
    mitigation: 先打穿前列腺癌滩头市场，再把同一套证据栈扩到相邻的激素驱动与转录因子项目。
    sourceRefs:
