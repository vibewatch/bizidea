competitors:
- name: Caris Life Sciences Right-In-Time Trials
  stage: 现有厂商
  wedge: 把分子分型、临床试验导航和本地快速开站，塞进一张精准肿瘤网络。
  pricing: 企业/网络与检测合同定制报价；无公开目录价。
  strength: 这是最接近的相邻验证：生物标志物驱动的试验匹配和开站，已经值得被打包成网络化服务。
  weaknessVsUs: Caris 围绕的是它自己的 profiling 生态和 right-in-time network，不是跨异构数据源、由申办方掌控的 AR 耐药证据层。
  sourceRefs:
  - 15
  - 16
  - 17
- name: Medidata
  stage: 现有厂商
  wedge: 横向受监管 trial 平台，覆盖站点 analytics、统一工作流和肿瘤数据采集。
  pricing: 企业级定制合同；无公开目录价。
  strength: 对想要受管控工作流、预测式站点模型和可直接报批数据的申办方来说，Medidata 的可信度最强。
  weaknessVsUs: Medidata 天生是大而全的平台，并没有明显围绕 AR 通路资格判断逻辑或连续活检/ctDNA 证据完整性去做深。
  sourceRefs:
  - 11
  - 12
  - 13
- name: Clinical ink
  stage: 成长型公司
  wedge: 聚焦肿瘤的 eSource、患者体验与实时试验分析工具。
  pricing: 企业级定制报价；无公开目录价。
  strength: 它和受监管的站点执行、方案依从性可视化很贴。
  weaknessVsUs: 它更靠下游，解决的是入组之后的站点执行问题，不是最初那道“找到对的 AR 驱动耐药患者并拼好资格资料包”的坎。
  sourceRefs:
  - 14
- name: Massive Bio
  stage: 成长型公司
  wedge: 用 AI 做试验匹配，并为医生和患者提供转诊支持，合作版图很广。
  pricing: B2B 与合作方定制报价；无公开目录价。
  strength: 它在漏斗顶部覆盖广，也已有药企和合作伙伴关系。
  weaknessVsUs: 它的模型更宽、更偏转诊驱动，而不是围绕 AR 耐药证据、活检时间窗和申办方面向机制资料包去做深度方案定制。
  sourceRefs:
  - 18
- name: Foundation Medicine
  stage: 现有厂商
  wedge: 面向 CDx 等级组织与液体基因组分型，并向 bio药企提供临床开发服务。
  pricing: 面向 bio药企和检测的定制合同；无公开目录价。
  strength: 它掌握了精准肿瘤项目里最可信的生物标志物输入和伴随诊断基础设施。
  weaknessVsUs: 分型是必要条件，但远远不够：它本身解决不了申办方专属的病历调取、站点工作流协同，以及跨混合数据源的证据包完整性。
  sourceRefs:
  - 21
  - 23
regulatoryTechnicalConstraints:
- point: 用于临床研究的电子工作流，必须有可信的记录、签名和可审计性，才能过申办方 QA 和 FDA 预期。
  sourceRefs:
  - 10
  - 14
- point: mCRPC 活检的病理解读会被谱系可塑性和潜在的神经内分泌转化干扰，这把病理工作流标准化的门槛抬得很高。
  sourceRefs:
