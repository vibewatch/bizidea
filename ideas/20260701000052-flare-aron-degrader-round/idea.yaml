problem: >-
  First-in-class AR-pathway degraders in metastatic castration-resistant prostate cancer do not fail because sponsors lack site lists; they fail when teams cannot quickly surface the small subset of patients whose tumors remain AR-driven after prior hormonal therapies and then capture clean proof-of-mechanism samples. Today that work is split across community urology notes, pathology archives, genomic reports, biopsy logistics, and spreadsheet follow-up across sites. The result is slow enrollment, high screen-failure risk, and inconsistent target-engagement evidence exactly when a biotech needs a clear proof-of-concept story to preserve financing and partnering leverage.
targetUser:
  primary: >-
    VP Clinical Operations or translational medicine lead at a Series B-D oncology biotech launching a first-in-human metastatic castration-resistant prostate cancer study for an androgen-receptor degrader
  secondary: >-
    GU oncology biomarker leads and site-startup managers responsible for biopsy, ctDNA, and molecular screening workflows
  buyer: VP Clinical Operations or Chief Medical Officer
startupThesis:
  nonObviousInsight: >-
    As prostate-cancer innovation shifts from yet another androgen-pathway inhibitor to degraders aimed at the hormone-bound active receptor, the scarce asset is no longer only chemistry; it is a live network that can find AR-driven resistant patients and generate on-target evidence fast enough to justify concentrated pipeline spend.
  beachhead: >-
    Series B-D oncology biotechs running 8-20 U.S. site Phase I or Phase II metastatic castration-resistant prostate cancer studies for first-in-class androgen-receptor degraders, where every patient needs prior-line treatment history, molecular resistance qualification, and serial biopsy or ctDNA evidence
  wedge: >-
    An AR-resistance evidence network that flags likely eligible mCRPC patients, assembles protocol-specific screening packets, and standardizes biopsy and ctDNA target-engagement workflows across sites
  whyNowCatalyst: >-
    Flare's $85 million financing, IND clearance, and Q3 2026 start date make AR-resistance patient qualification and sample logistics a current budget line rather than a future oncology tooling idea.
  ventureScalePath: >-
    Start with AR-driven prostate-cancer degrader studies, then expand into other hormone-driven tumors, transcription-factor degrader programs, companion-diagnostic workflows, and eventually a broader proof-of-mechanism infrastructure layer for targeted oncology development.
solution: >-
  The startup sells a sponsor-funded operating layer for biotechs launching novel AR-pathway trials. It ingests treatment-sequence history, molecular reports, and site workflow data to flag likely AR-driven resistant patients, retrieve missing records, and assemble sponsor-ready screening packets. For enrolled patients, the product coordinates biopsy and ctDNA windows, lab routing, and completeness checks so translational teams receive consistent pharmacodynamic readouts across sites. Sponsor dashboards show which referral sources, resistance profiles, and centers convert fastest, reducing wasted screen slots and helping teams tighten inclusion strategy mid-study. Over time, the company builds a proprietary map of where AR-driven resistant patients are found, which evidence packages predict eligibility, and which sites can generate clean mechanism data under real trial constraints.
goToMarketSeed:
  firstCustomer: >-
    VP Clinical Operations at a Series B-D oncology biotech activating its first U.S. metastatic castration-resistant prostate cancer study across 8-15 sites for an androgen-receptor degrader after IND clearance, with lean internal translational ops and pressure to show proof of mechanism before the next board or partnering process
  buyingTrigger: >-
    The sponsor finalizes site activation or first-patient-in planning and realizes molecular pre-screening, biopsy scheduling, and ctDNA evidence capture are too manual to support a fast proof-of-concept readout.
  currentAlternative: >-
    Manual chart review by site coordinators, CRO-led recruitment services, molecular-lab portal searches, and spreadsheet-based biopsy and sample tracking
  switchingReason: >-
    A prostate-specific resistance workflow beats generic trial-recruitment tools because it packages the exact treatment history, molecular evidence, and pharmacodynamic sampling steps needed to enroll the right mCRPC patients and prove the drug is working on-target.
  pricingHypothesis: >-
    Annual fee per active sponsor study plus per-site onboarding and optional per-enrolled-patient evidence-workflow fees tied to screening throughput and biomarker completeness.
