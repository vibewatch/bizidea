topRisks:
  - name: Services creep
    description: Protocol-specific biomarker workflows could make the product feel like labor-heavy trial ops instead of software.
    mitigation: Start with one repeatable mCRPC workflow template around molecular pre-screening, biopsy, and ctDNA milestones, then productize the common steps across design partners.
  - name: Site data access friction
    description: Community urology groups and academic sites may not share treatment history and molecular data cleanly enough to surface eligible patients quickly.
    mitigation: Begin with motivated GU oncology centers and referral networks, use lightweight intake connectors before full integrations, and prove conversion lift study by study.
  - name: Adjacent vendor bundling
    description: CROs, molecular labs, or EDC vendors could add basic enrollment and sample-tracking features once the wedge is visible.
    mitigation: Win the category by owning resistance-specific qualification logic and sponsor-facing proof-of-mechanism benchmarking, while partnering with labs and CROs rather than replacing them.
