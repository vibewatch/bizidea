  validationPlan:
  - priority: high
    question: How many U.S. sponsor studies in advanced prostate or adjacent hormone-driven tumors will actually require serial biopsy or ctDNA evidence over the next 24 months?
    evidenceToGather: Named account list of target sponsors, active protocols, biomarker endpoints, and planned site footprints.
  - priority: high
    question: 'Which KPI unlocks budget fastest: days to first qualified patient, screen-pass rate, or biomarker-packet completeness?'
    evidenceToGather: Pilot design with baseline manual workflow data across one live protocol and 3-5 sites.
  - priority: high
    question: Can the product operate with sponsor- and site-approved data access before formal trial consent, or must it stay limited to site-driven prescreening support?
    evidenceToGather: Compliance interviews with sponsor legal/QA, site privacy teams, and IRB-adjacent operators.
  - priority: medium
    question: How often do liquid-biopsy-first workflows avoid tissue delay without degrading translational confidence?
    evidenceToGather: Retrospective review of tissue-versus-ctDNA decision paths and assay interpretability across target studies.
  - priority: medium
    question: Will molecular labs and trial networks be true channels or future competitors?
    evidenceToGather: Partner interviews, reseller economics, and workflow-boundary mapping with at least two lab/network operators.
