competitors:
- name: Caris Life Sciences Right-In-Time Trials
  stage: incumbent
  wedge: Combines molecular profiling, clinical-trial navigators, and rapid local site activation inside a precision-oncology network.
  pricing: Custom enterprise / network and testing contracts; no public list pricing.
  strength: Strongest adjacent proof that biomarker-linked trial matching and activation are valuable enough to package as a networked service.
  weaknessVsUs: Caris is optimized around its own profiling ecosystem and right-in-time network, not a sponsor-controlled AR-resistance evidence layer spanning heterogeneous data sources.
  sourceRefs:
  - 15
  - 16
  - 17
- name: Medidata
  stage: incumbent
  wedge: Horizontal regulated-trial platform covering site analytics, unified workflows, and oncology data capture.
  pricing: Custom enterprise contracts; no public list pricing.
  strength: Deep credibility with sponsors that want governed workflows, predictive site models, and approval-ready data.
  weaknessVsUs: Medidata is broad by design and does not appear specialized for AR-pathway qualification logic or serial biopsy/ctDNA evidence completeness.
  sourceRefs:
  - 11
  - 12
  - 13
- name: Clinical ink
  stage: scale-up
  wedge: Oncology-focused eSource, patient-experience, and real-time trial analytics tooling.
  pricing: Custom enterprise pricing; no public list pricing.
  strength: Well aligned with regulated site execution and protocol adherence visibility.
  weaknessVsUs: It sits farther downstream than the beachhead problem of finding the right AR-driven resistant patients and assembling qualification packets before enrollment.
  sourceRefs:
  - 14
- name: Massive Bio
  stage: scale-up
  wedge: AI-powered trial matching and referral support for physicians and patients across a large partner footprint.
  pricing: Custom B2B and partner pricing; no public list pricing.
  strength: Broad top-of-funnel reach and existing pharma and partner relationships.
  weaknessVsUs: The model is broader and referral-led rather than deeply protocol-specific around AR-resistance evidence, biopsy timing, and sponsor-facing mechanism packets.
  sourceRefs:
  - 18
- name: Foundation Medicine
  stage: incumbent
  wedge: CDx-grade tissue and liquid genomic profiling with biopharma services for clinical development.
  pricing: Custom biopharma and testing contracts; no public list pricing.
  strength: Owns highly credible biomarker inputs and companion-diagnostic infrastructure for precision-oncology programs.
  weaknessVsUs: 'Profiling is necessary but not sufficient: it does not itself solve sponsor-specific record retrieval, site workflow coordination, or evidence-packet completeness across mixed sources.'
  sourceRefs:
