openQuestions:
- How many U.S. sponsor protocols beyond Flare will require an AR-resistance qualification and mechanism-evidence workflow within the next 24 months?
- Will sponsors and sites allow a third-party orchestration layer to touch prescreening records before formal consent, or will the product need a narrower operational boundary?
- Can ctDNA-first workflows materially reduce biopsy delay in early ARON studies, or will serial tissue collection remain the dominant proof-of-mechanism path?
- 'Which economic argument closes fastest in practice: faster first qualified patient, lower screen-failure rate, or higher biomarker-packet completeness?'
