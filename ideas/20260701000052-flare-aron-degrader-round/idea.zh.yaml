topRisks:
- name: 服务化蔓延
  description: 如果每个方案的生物标志物工作流都过度定制，产品就会更像吃人力的试验运营服务，而不是软件。
  mitigation: 先围绕分子预筛、活检和 ctDNA 里程碑，把一套可复用的 mCRPC 工作流模板跑通，再把共创客户里反复出现的步骤产品化。
- name: 站点数据接入摩擦
  description: 社区泌尿科集团和学术站点未必愿意把治疗史和分子数据干净地交出来，这会拖慢合格患者的发现速度。
  mitigation: 先从积极配合的泌尿生殖肿瘤中心和转诊网络切入，先用轻量采集 connector，再慢慢走向完整集成，并一项研究一项研究地证明转化率提升。
- name: 相邻厂商打包
  description: 一旦这个切口被看见，CRO、分子实验室或 EDC 厂商都可能把基础入组和样本追踪功能一起打包进来。
  mitigation: 用耐药特异的资格判断逻辑和面向申办方的机制验证基准抢下品类心智，同时与实验室和 CRO 合作，而不是替代它们。
