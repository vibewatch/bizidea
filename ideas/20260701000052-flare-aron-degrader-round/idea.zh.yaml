problem: 在 mCRPC 里做同类首创 AR 通路降解剂，失败往往不是因为申办方拿不到站点名单，而是因为团队捞不出那一小撮在既往激素治疗后肿瘤仍由 AR 驱动的患者，也拿不到干净的机制验证样本。现在这套活分散在社区泌尿科病历、病理档案、基因检测报告、活检排期，以及各站点之间的表格追踪里。结果就是入组慢、筛选失败率高、靶点作用证据前后不一——偏偏这又发生在生物科技公司最需要讲清 PoC、守住融资和 BD 议价权的时候。
targetUser:
  primary: B–D 轮肿瘤生物科技公司里负责临床运营的 VP，或转化医学负责人；这家公司正要启动一项面向 mCRPC 的雄激素受体降解剂首次人体研究。
  secondary: 负责活检、ctDNA 与分子筛查流程的泌尿生殖肿瘤生物标志物负责人，以及站点启动经理。
  buyer: 临床运营 VP 或 CMO
startupThesis:
  nonObviousInsight: 当前列腺癌创新从“再做一个雄激素通路抑制剂”转向瞄准与激素结合的活性受体本身的降解剂，真正稀缺的资产就不再只是化学分子，而是一张持续运转的患者与证据网络：既能找到 AR 驱动且已耐药的患者，也能足够快地打出在靶证据，支撑公司继续集中投钱到这条管线上。
  beachhead: B–D 轮肿瘤生物科技公司：它们在美国跑 8–20 个站点的 I/II 期 mCRPC 研究，靶向同类首创雄激素受体降解剂；每位患者都要补齐既往治疗史、分子耐药资格判断，以及连续活检或 ctDNA 证据。
  wedge: 一张 AR 耐药证据网络：先标出大概率符合条件的 mCRPC 患者，再按方案拼好筛选资料包，并把各站点的活检与 ctDNA 在靶工作流标准化。
  whyNowCatalyst: Flare 的 $85M 融资、IND 放行和 2026 年 Q3 启动时间表，让 AR 耐药患者资格判断和样本物流从“未来可能需要的肿瘤工具”变成了眼下就要列预算的项目。
  ventureScalePath: 先从 AR 驱动的前列腺癌降解剂试验切进去，再扩到其他激素驱动肿瘤、转录因子降解剂项目、伴随诊断工作流，最终长成靶向肿瘤研发里的通用机制验证基础设施层。
solution: 公司卖的是一层由申办方买单的运营层，服务于启动新型 AR 通路试验的生物科技公司。它吃进治疗序列历史、分子报告和站点工作流数据，先标出大概率仍属 AR 驱动耐药的患者，再去补齐缺失病历，拼成申办方可直接审核的筛选资料包。对已入组患者，产品继续协调活检和 ctDNA 时间窗、实验室流转与完整性检查，让转化医学团队从不同站点拿回来的药效动力学读数足够一致。申办方仪表盘会告诉团队：哪些转诊来源、哪些耐药谱系、哪些中心转化最快，从而少浪费筛查名额，也能在研究中途及时收紧纳入策略。时间一长，公司会沉淀一张专有地图：AR 驱动耐药患者都在哪、哪类证据包最能预测资格通过、哪些站点能在真实试验约束下稳定产出干净的机制数据。
goToMarketSeed:
  firstCustomer: 一家 B–D 轮肿瘤生物科技公司的 VP Clinical Operations。公司在 IND 放行后，正要在美国 8–15 个站点启动首个 mCRPC 研究，测试雄激素受体降解剂；内部转化运营人手精简，又得在下一次董事会或 BD 进程前交出机制证据。
  buyingTrigger: 申办方把站点开站或首例患者入组计划敲定后，很快会发现：分子预筛、活检排期和 ctDNA 证据留存全靠手工，根本撑不起一轮快节奏的 PoC 读出。
  currentAlternative: 站点协调员手工查病历、CRO 提供招募服务、分子实验室门户检索，再加表格化的活检和样本追踪。
  switchingReason: 和通用试验招募工具比，前列腺癌专用的耐药工作流更能把 mCRPC 患者真正入组所需的治疗史、分子证据和药效采样步骤一次打包好，也更能证明药物确实打在靶上。
  pricingHypothesis: 每个活跃申办方研究收年度费用，外加每站点导入费；也可对每位已入组患者收可选的证据工作流费用，并与筛查吞吐量和生物标志物完整率挂钩。
