differentiator: 通用试验招募厂商优化的是 lead 量，CRO 管的是方案启动后的站点运营，分子检测实验室会出报告，但并不掌握申办方专属的资格判断逻辑。公司卡在这三者之间缺失的那一层：把治疗序列规则、AR 耐药证据和药效样本编排塞进一条专为 mCRPC 降解剂研究打造的工作流。它的护城河会越跑越深，因为会独家积累一套数据：哪些转诊来源、哪些生物标志物、哪些站点，最后真能转成既入组又拿得到可用机制数据的患者。
