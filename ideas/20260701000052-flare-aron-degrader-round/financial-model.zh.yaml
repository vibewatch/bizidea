fundingAsk:
  round: pre-seed
  amountM: 3.0
  runwayMonths: 18
  milestone: 第 18 个月做到 5 个活跃申办方研究、跑通 1 条能工作的实验室或 CRO 转介绍渠道，并把可复用的多研究部署时间压到 4 周以内；额外的 6 个月缓冲会把公司带到第 24 个月的 8 个在跑研究。
