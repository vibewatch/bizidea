scenarios:
  downside:
    description: 预算解锁比预期慢，工作流也更偏服务化，所以公司到 Y3 末只做到 9 个活跃研究，定价停在商业计划区间下沿附近；如果不控成本或补一轮续桥轮，这轮 pre-seed 资金会被烧完。
    y3RevenueK: 2696.5
    y3EbitdaK: -999.5
    cashLowPointK: -130.8
    keyAssumptionChanges:
    - Y3 末活跃研究数从 12 个下修到 9 个。
    - 每个研究的混合月收入到 Q4Y3 只到 $30K，而不是 $34K。
    - 因为实施仍偏定制，毛利率最高只能到 67%。
  base:
    description: 基准情景走的是 BP 里程碑：第 18 个月 5 个活跃研究，第 24 个月 8 个，第 36 个月 12 个；定价从约 $200K 的试点，逐步抬到约 $350K 的经常性研究年收入，再叠加导入和证据支持收入。
    y3RevenueK: 3915.0
    y3EbitdaK: 1.6
    cashLowPointK: 1195.7
    keyAssumptionChanges:
    - 客户爬坡沿着里程碑路径走：Y1 末 4 个活跃研究，Y3 末 12 个。
    - 随着模板变得可复用，毛利率从试点月份的 55% 扩到 Q4Y3 的 72%。
    - Y2 招 1 位商业化人员、Y3 再加 1 位就够了，因为市场仍窄，同一买方扩容比广撒网更重要。
  upside:
    description: KPI 证明提前打出来，Y2 就跑通一条合作方渠道，同一买方的相邻项目扩容把公司推到 Y3 末 14 个活跃研究；定价更好，且只多招 1 个销售。
    y3RevenueK: 4836.5
    y3EbitdaK: 591.7
    cashLowPointK: 1505.0
    keyAssumptionChanges:
    - Y3 末活跃研究数从 12 个抬到 14 个。
    - 借助相邻项目扩容和更丰富的支持服务组合，每个研究的混合月收入到 Q4Y3 能到 $36K。
    - 第 25 个月多招 1 位销售，但随着导入可复用，毛利率仍能到 75%。
sensitivity:
- variable: ARPU
  downsideCase: $300K 的经常性研究年收入，几乎没有基准分析或支持服务增购
  baseCase: $375K 的混合单位经济模型，来自 $350K 经常性收入加支持服务组合
  upsideCase: 通过基准分析和更广的证据支持，年化研究经济模型做到 $400K+
  y3RevenueImpactK: -520.0
  cashImpactK: -380.0
- variable: CAC
  downsideCase: 如果创始人外呼仍是主渠道、伙伴转介绍又不转化，CAC 为 $140K
  baseCase: 有 1 条转介绍渠道且能做同一买方扩容，CAC 为 $100K
  upsideCase: 如果实验室或 CRO 转介绍贡献大部分高质量机会，CAC 可降到 $70K
  y3RevenueImpactK: -150.0
  cashImpactK: -320.0
- variable: 流失率
  downsideCase: 如果方案结束后没有相邻研究扩容，月流失率为 4.0%
  baseCase: 活跃研究月流失率为 2.5%
  upsideCase: 如果同一买方的项目扩容能抵掉研究自然结束，月流失率可降到 1.5%
  y3RevenueImpactK: -290.0
  cashImpactK: -210.0
- variable: 销售周期
  downsideCase: 端到端 9 个月；首个付费试点滑到 M8
  baseCase: 5–6 个月；首个付费试点落在 M5
  upsideCase: 4–5 个月；由合作方带来的试点落在 M4
  y3RevenueImpactK: -620.0
  cashImpactK: -450.0
- variable: 毛利率
  downsideCase: Y3 毛利率只有 65%，因为活检和资料包工作流仍高度吃人
  baseCase: Y3 毛利率 71%
  upsideCase: 如果资料包拼装标准化、例外处理更少，Y3 毛利率可到 75%
  y3RevenueImpactK: 0.0
  cashImpactK: -235.0
- variable: 招聘节奏
  downsideCase: 在销售没更快跑出来的情况下，把 2 个非关键岗位提前 1 个季度招进来
  baseCase: Q4Y2 为 9 个 FTE，Q4Y3 为 12 个 FTE
  upsideCase: 如果试点滑坡、管理层优先保现金，则后半程招聘延后 1 个季度
  y3RevenueImpactK: 0.0
  cashImpactK: -275.0
modelDiagram:
  title: 活跃研究经济模型
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ActiveStudies
      ActiveStudies --> StudyRevenue
      ActiveStudies --> BenchmarkData
      BenchmarkData --> Expansion
      Expansion --> ActiveStudies
      StudyRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 收入来自活跃研究数从 Y1 末的 4 个爬到 Y3 末的 12 个，同时定价从约 $200K 的试点工作抬到约 $350K 的经常性研究年收入，并叠加支持服务。
- checkName: 必须成立的前提
  finding: 模型需要在第 6 个月前跑出 1 个在跑试点，并把工作流复用率压在 BP 设定的 20% 定制上限内，Y3 毛利率才有机会过 70%。
- checkName: 模型会失效的情况
  finding: 如果预筛接入或证据资料包物流把销售周期拖向 9 个月，下行情景的 Y3 收入就只剩 $2.7M，现金也会转负。
- checkName: 下一轮融资证明点
  finding: 只要这轮 pre-seed 把公司带到 5 个活跃研究、1 条转介绍渠道，以及 4 周以内的部署时间，再去冲第 24 个月的扩容目标，就足以讲一轮种子轮融资叙事。
sanityChecks:
  ruleOf40: Y3 增长 107% + EBITDA 利润率 0% = 107%
  burnMultiple: Y2 burn multiple 为 0.5x（增加 $1.57M 收入，烧掉 $770K），到 Y3 接近 0x。
  revenuePerFte: $326K 的 Y3 人均收入，对应 Q4Y3 的 12 个 FTE（工作流 SaaS 基准为 $200–400K）
  flags:
  - 研究里的 $4.2M SOM 更适合当年化节奏口径来看；Y3 全年收入只有 $3.9M，因为模型到 Q4Y3 才跑到 12 个活跃研究。
  - 12 个研究单位背后很可能对应少于 12 个申办方客户，所以只要一个方案延迟，年化收入就可能少约 $0.3–0.4M。
  - 只有当定制工作量压到 BP 所说的 20% 以下，毛利率才过得了 70%；否则下行情景还得多融钱。
  - 模型假设首个付费试点落在 M5，且第 9 个月的合规审批不会触发大规模工作流重构。
