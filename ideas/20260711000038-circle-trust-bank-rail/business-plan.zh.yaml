slug: trust-bank-entitlement-ledger
date: '2026-07-11'
executiveSummary: 稳定币基础设施的核心难题，正在从发行方自己的托管或支付执行，转向叠在受监管发行方之上的平台如何补齐控制和证据。首个客户应该是美国的嵌入式稳定币钱包或结算平台：至少 500 个企业钱包、通过总账户和发行方合作、并且未来两个季度内正在把底层迁到信托银行支撑的发行方或 Managed Payments 栈。产品第一步该做成只读的权益台账，把客户余额、铸造/销毁事件、赎回队列以及发行方或托管方头寸，对成每天的储备覆盖证明和异常日志。最顺手的购买触发器，是上线、审计或企业尽调在上线前就要求项目级储备和赎回证据。研究测得 TAM 约 $125M、SAM 约 $22M、第三年 SOM 约 $3M；这笔投资能不能成立，关键不在一次性报告项目，而在早期客户能否顺着多个项目、多家发行方和迁移工作流持续扩张。竞争会同时来自发行方通道、钱包控制厂商、加密会计工具，以及客户内部的 SQL / 表格工作流，所以公司必须保持中立，靠权益深度、审计认可和迁移控制取胜，而不是去拼执行通道。正确节奏是：先把报表导入、API 接入和证据包做出来；再补多项目和切换工作流；等美国滩头市场真正跑进生产环境后，再考虑欧洲或相邻合规模块。最关键的反证风险有两个：一是信托银行支撑的迁移仍然太少，二是发行方在客户愿意为独立控制层付费前，就已经把“够用的报告能力”打包进去了。
problem:
- 嵌入式稳定币平台仍然要证明：每一笔客户或项目余额、每一笔待赎回头寸，都能正确映射到受监管发行方的总账户储备和托管栈。
- 只靠内部 SQL、表格、发行方控制台和周期性鉴证 PDF，根本扛不住信托银行接入、企业尽调、审计复核和发行方迁移切换。
solution:
- 把平台子账簿、钱包或托管数据、铸造与销毁事件、赎回队列，以及发行方或托管方记录，统统接进一套只读权益台账，按天展示储备覆盖、赎回敞口和差异项。
- 再生成异常工作流、机器可读证据和迁移切换视图，让运营方、审计师、企业客户和银行合作方在上线前后都能看到同一份控制记录。
whyWeWin:
- 发行方和支付通道能展示自己的余额，却不会跨多个项目去重建下游平台的客户级权益模型和赎回队列。
- 通用台账工具和加密会计工具更像事后记账；这款产品从一开始就是围绕实时储备证明、差异项处理和发行方迁移控制来设计的。
- 每落地一家客户，都会沉淀发行方专属映射、异常历史和证据包模板；单一捆绑厂商想跨生态把这些一次抄走，会越来越难。
strategicChoices:
  beachhead: 美国本土的嵌入式稳定币钱包与结算平台，服务企业客户，通过发行方总账户运营；它们正在做信托银行或 Managed Payments 接入项目，而且上线前立刻就要证明储备覆盖。
  wedgeRationale: 这个滩头市场预算归属清楚、工作流窄、截止日期硬，因为迁移和尽调项目本来就逼着团队去拉齐同一套台账、赎回和发行方数据，而产品只是把这些数据组织成每天都能交付的证明。
  sequencingRationale: 先做只读对账和证据生成，因为买家会先信一套“能把余额解释清楚”的系统，才会信一套“能自动化工作流”的系统；等试点真正转正后，再把 API 覆盖、多项目切换工具，以及新司法辖区或相邻控制模块往下推。
  notYet:
  - 不碰稳定币执行、托管、发行或自营流动性功能。
  - 不做储备、赎回和迁移控制之外的大而全加密会计替代品。
  - 在美国信托银行打法可复制之前，不先打欧洲 MiCA 市场。
market:
  tam: 估算 TAM 为 $125M：大致对应 500 家全球目标运营方，每家年合同额约 $250k。
  sam: 估算 SAM 为 $22M：大约 110 家美国和欧洲运营方，近期就可能遇到信托银行或 MiCA 级别的储备与赎回证明要求，年合同额约 $200k。
  som: 估算第三年 SOM 为 $3M：通过以共创客户为主的企业销售动作，可触达约 12 家客户，每家年合同额约 $250k。
  segments:
  - 拥有发行方总账户的美国嵌入式稳定币钱包与结算平台
  - 通过受监管发行方采用托管式稳定币结算的 PSP、财资和平台型金融科技公司
  buyingProcess: 销售通常从一次迁移、Managed Payments 上线，或企业尽调请求开始——这些事件会把储备和赎回证据的缺口直接暴露出来。运营和财务系统团队先把工作流梳理清楚，再由合规和审计相关方定义输出要求，最后由 COO 或 CFO 批准付费试点。
product:
  mvp: MVP 是一套只读权益工作台，先覆盖一个法人实体、一个平台子账簿、一套钱包或托管栈，以及一条发行方数据源或报表路径。它能产出每日覆盖报告、差异项队列、赎回敞口视图和可下载证据包，但自己不承担托管或执行风险。
  sixMonth: 6 个月内交付共创客户版本：通过文件和 API 接入一套平台台账、一家钱包或托管服务商、一个发行方数据源，同时具备每日对账、异常管理和证据包导出。
  twelveMonth: 12 个月内补上多项目支持、迁移切换对比、标准化审计与企业尽调模板，并为首批 2 到 3 个付费客户做好生产级控制。
  twentyFourMonth: 24 个月内扩成多发行方运营台账：具备可复用映射、可对标的异常分析，以及在美国证明跑通后、向 MiCA 级别或其他司法辖区复制的第一套标准打法。
  keyBets:
  - 买家会先为上线准备和持续证明软件付费，而不是先买更广义的稳定币工作流自动化。
  - 哪怕 API 还不完整，只靠报表或平面文件导入，加上一条核心发行方或钱包集成，也足以先把 ROI 跑出来。
  - 只要数据血缘、差异项和赎回状态写得足够清楚，审计师和企业客户就会接受中立的权益证据包。
  - 即便发行方原生看板越做越强，迁移切换和多发行方报告仍会是差异化所在。
gtm:
  wedge: 卖一套付费的发行方迁移准备试点：把一个稳定币项目，对到一个由信托银行支撑的发行方或 Managed Payments 栈，并在上线前每天产出储备与赎回证明。
  channels:
  - 由创始人主导外呼，直接找正在推进发行方迁移或 Managed Payments 接入项目的 COO、CFO 和数字资产运营负责人。
  - 与发行方、支付通道、钱包控制厂商和托管方联合销售——它们想拿下更大的受监管客户时，需要一层中立证据层。
  - 通过加密会计、审计与鉴证合作伙伴转介绍——这些人本来就在帮客户诊断对账和尽调痛点。
  funnelTargets: 目标账户→合格迁移评审 25%+，合格评审→付费试点 20%+，付费试点→生产环境 60%+，生产客户→12 个月内扩到第二个项目或发行方 40%+。
  pricing: 按活跃稳定币项目数和已对账的总账户钱包规模收取年度企业订阅费，另加发行方和子账簿映射的接入费用。落地动作从一个 $60k-$100k 的付费试点开始，绑定一项迁移或接入项目；一旦日常证明和异常工作流跑进生产环境，再转成约 $180k-$250k ARR。
businessModel:
  revenueStreams:
  - 围绕权益证明、异常工作流和证据交付收取年度企业订阅费
  - 为发行方、钱包、托管方和子账簿映射收取接入与集成费用
  - 针对新增项目、法人实体和多发行方切换模块收取扩容费用
  - 面向审计师、企业客户和银行合作方的高级 API 与报告模块
  unitOfValue: 一个处于日常权益证明之下的活跃稳定币项目，以及与之对应、已完成对账的总账户钱包规模。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一家客户内部加第二、第三个项目
  - 在保持同一套权益模型的前提下，继续接入更多发行方、托管方或钱包
  - 首个项目上线后，再卖迁移切换模块和面向合作伙伴的报告模块
  - 只有当核心映射引擎跑通后，才从美国信托银行工作流扩到 MiCA 级别部署
strategyMap:
  northStarMetric: 每月有多少客户余额与赎回敞口，能在 24 小时内对齐到发行方储备或托管记录。
  inputMetrics:
  - 在真实发行方迁移或 Managed Payments 接入项目上签下多少付费试点
  - 日常权益差异项有多少能在 SLA 内解决
  - 给审计师或企业客户准备一份证据包需要多少小时
  - 试点转生产的转化率
  - 从首个项目扩到第二个项目或发行方的比例
  moatsToBuild:
  - 连接客户子账簿、铸造/销毁事件与发行方储备记录的发行方和项目专属映射模板
  - 覆盖数据滞后、未匹配销毁、未结算付款和赎回状态失败的异常历史数据集
  - 被审计师、企业客户和银行合作方接受的可复用证据包与尽调模板
  - 用同一套权益模型对比新旧发行方栈的迁移切换操作手册。
  killCriteria:
  - 前 20 个目标客户访谈里，如果不到 10 家确认未来 12 个月内有已获预算的迁移、接入或审计就绪项目，就该收手。
  - 聚焦销售 9 个月后，如果签不下至少 2 个付费试点，或任何试点在部署后 6 个月内都拿不出书面的生产转化计划，就该收手。
  - 如果没有任何试点能在 90 天内把证据包准备时间至少砍掉 50%，或把未解决的权益差异项至少压低 30%，就该收手。
  mermaid: |
    flowchart LR
      Wedge[发行方迁移试点] --> MVP[只读权益台账]
      MVP --> Proof[每日储备与赎回证明]
      Proof --> Expansion[多发行方控制平台]
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流痛点清楚、切口也连贯，但近期市场偏小，加上捆绑和数据访问风险偏高，判断力被压住了。
    whyBelieve: 信托银行接入和企业尽调，把问题直接推到财务团队面前：他们需要的是一套证明系统，而不是发行方通道、钱包控制工具或会计工具里各自断裂的一小段能力。
    whyDoubt: 如果 Circle 这类信托银行采用迟迟起不来，或者发行方在客户愿意为中立控制层付费前就把“够用的报告”补齐，这个品类可能始终长不大。
    nextDiligence: 接下来要找 5 到 10 个真实迁移项目，确认团队是否愿意为日常权益证明付出六位数年预算，而不是继续用发行方看板和内部 SQL 凑合。
  firstCustomer:
    title: 嵌入式稳定币结算平台的 COO 或数字资产运营负责人
    profile: 一家服务美国金融科技公司或 PSP 的稳定币 API 平台，拥有 500+ 企业钱包、通过发行方总账户运营，并且未来两个季度内已经签下迁往信托银行支撑发行方或 Managed Payments 栈的项目。
    trigger: 发行方迁移、信托银行接入，或企业尽调复核，会在上线前要求平台拿出项目级储备和赎回证据。
    buyer: COO 或 CFO
    initialContract: 首单是 $60k-$100k 的付费试点，覆盖一个法人实体、一个稳定币项目，以及一条发行方迁移或接入工作流；等日常证明和异常管理进入生产运营后，再转成约 $180k-$250k ARR。
  mustBeTrue:
  - 美国总账户稳定币平台里，得有一批客户会在未来 12 个月内面对已获预算的迁移或审计就绪工作。
  - 买家需要的确实是项目级储备和赎回证明，而不是只看发行方鉴证、合作方控制台和内部 SQL 就够。
  - 只接一套平台台账、一条发行方数据源和一条钱包或托管数据源，就能在 90 天内把 ROI 做出来。
  - 只要数据血缘和异常处理写清楚，审计师和企业客户就会接受中立的权益报告。
  - 早期客户会继续扩到更多项目、更多发行方或更多迁移模块，从而把 ACV 拉到 $200k+，而不是把公司拖成定制服务。
  diligenceQuestions:
  - 今天 Circle、Paxos 这类发行方栈，究竟会向下游平台开放哪些日常文件、API 和报表格式？
  - 目标平台里，到底有多少家已经具备明确预算负责人、上线日期和由审计驱动的证明要求？
  - 审计师、企业客户和银行合作方在批准一次上线或迁移前，真正会索要哪些证据材料？
  - 储备和赎回证明缺失或存在争议时，发行方迁移通常会拖延多久？
  - 真实采购里，平台拿这款产品对比的到底是内部 SQL、发行方看板、Fireblocks 级控制工具，还是加密会计工具？
operatingAssumptions:
- assumption: 信托银行接入和发行方迁移项目，会为储备与赎回证明软件拉出一笔独立预算。
  basis: research.yaml
  validationTest: 访谈 20 家目标美国平台，至少 10 家能说出明确预算负责人、上线时间表，以及和迁移、接入或尽调绑定的试点范围。
  decisionImpact: 如果这条不成立，公司就该转向嵌入合作伙伴分发，或做审计准备服务，而不是硬卖独立 SaaS。
- assumption: 只要拿到一份平台子账簿导出、一条发行方数据源和一条钱包或托管数据源，首个部署就能覆盖足够多的工作流并证明价值。
  basis: research.yaml
  validationTest: 收集 3 份来自真实或准真实集成场景的匿名数据包，确认 MVP 能重建至少 90% 的所需权益与赎回字段。
  decisionImpact: 如果这条不成立，路线图就会更偏集成重活，滩头市场也必须收窄到标准化栈，同时 seed 资金需求会上升。
- assumption: 只要数据血缘、异常项和赎回状态写清楚，审计师和企业客户就会接受平台生成的权益报告。
  basis: research.yaml
  validationTest: 拿一版日常权益报告草稿，找 2 家审计方和 3 家企业客户逐条审看，不能出现任何要求第一天就必须接入发行方原生签名 API 的硬性阻塞。
  decisionImpact: 如果这条不成立，公司就得更紧地绑定鉴证机构，或把自己重新定位成准备层，而不是主证明系统。
- assumption: 只要把试点和上线风险、审计就绪绑在一起，付费试点就能转成 $180k-$250k 的年度生产合同。
  basis: research.yaml
  validationTest: 跑 5 次定价对话，并在提议的年价带上拿下 2 个付费试点和书面转化标准。
  decisionImpact: 如果这条不成立，TAM 和 SOM 都会明显收缩，招聘和融资计划都该按更小的生意重置。
- assumption: 一个项目跑通后，客户会在第一年内继续扩到多发行方或迁移控制模块。
  basis: idea.yaml
  validationTest: 跟踪前 3 个生产客户，至少 2 家在 12 个月内明确第二个项目、第二个发行方或切换模块的范围。
  decisionImpact: 如果这条不成立，公司就更像“咨询 + 报告软件”，未必撑得起风险投资要求的经济模型。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 20 位目标运营方，再加 5 位参与真实稳定币迁移和 Managed Payments 上线的审计或鉴证合作伙伴。
  hypothesis: 最强购买触发器不是泛泛而谈的稳定币兴趣，而是上线、迁移或尽调的硬截止日期。
  successMetric: 至少 10 家目标平台确认未来 12 个月内有已获预算的项目，并且都点名同样 3 到 5 份关键证据材料。
  owner: CEO / 创始人主导销售
- horizon: 0–90 天
  experiment: 用 3 份匿名化的平台、钱包和发行方数据包，做出一个只读权益原型。
  hypothesis: 在 API 还没打全之前，只靠报表或文件导入，也足够先证明日常储备覆盖和差异项识别的价值。
  successMetric: 有 2 个潜在客户认可原型足以界定付费试点范围，而且模型能覆盖至少 90% 的必需字段。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 围绕真实发行方迁移或 Managed Payments 接入项目，跑 2 个付费试点。
  hypothesis: 日常权益证明能明显减少上线阻塞项，从而支撑年费软件合同。
  successMetric: 签下 2 个付费试点，且至少 1 个在 6 个月内进入书面的生产转化计划。
  owner: CEO / 创始人主导销售
- horizon: 90–180 天
  experiment: 拿证据包给审计师、1 家银行或合规合作方，以及企业对手方做联合评审。
  hypothesis: 只要数据血缘、异常日志和赎回状态写清楚，而且机器可读，中立证据层就能被接受。
  successMetric: 5 位评审里至少 4 位明确表示没有硬性阻塞，且有 1 家审计或鉴证机构愿意转介客户。
  owner: 产品与控制负责人
- horizon: 180–360 天
  experiment: 把多项目异常 SLA 和迁移切换视图，交付给首个生产客户。
  hypothesis: 相比发行方看板和通用对账工具，“迁移控制室”工作流会是更耐久的差异点。
  successMetric: 同一客户内的第二次部署至少快 30%，未解决的权益差异项至少下降 30%。
  owner: 解决方案工程师
- horizon: 180–540 天
  experiment: 让最强的生产客户扩到第二个项目或第二家发行方，并正式跑通 1 条和发行方、通道或会计合作方的联合销售动作。
  hypothesis: 只要单个客户内能扩张、合作伙伴也能持续带来线索，这就是平台型生意，而不是一次性实施项目。
  successMetric: 有 1 家客户把 ARR 至少拉高 1.5x，且合作伙伴带来至少 3 个合格机会。
  owner: CEO / 创始人主导销售
operations:
- 每天跑一次权益结账，把客户余额、铸造/销毁事件、赎回队列以及发行方储备或托管头寸，对进同一个异常队列。
- 维护证据留存、数据血缘日志和工单工作流，让审计师、银行合作方和企业客户不用再拉定制 SQL 就能检查。
- 与发行方、托管方、钱包服务商，以及会计或鉴证合作伙伴一起管理文件/API 交付、异常升级和切换操作手册。
- 把托管、发行、交易监控和资金划转留给受监管伙伴，自己只抓权益模型、差异项处理逻辑和证明层。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责把权益引擎、映射系统，以及首批发行方、钱包和子账簿连接器做出来——这些能力就是产品定义本身。
- role: CEO / 创始人主导销售
  startTiming: 第 0 个月
  rationale: 早期收入高度依赖创始人亲自打单：买家集中、客单价高，还得亲手拉起发行方、审计方和通道合作。
- role: 产品与控制负责人
  startTiming: 第 1 个月
  rationale: 把储备、赎回和审计义务翻成可部署的证据工作流，同时守住滩头市场范围，不让需求发散。
- role: 解决方案工程师
  startTiming: 第 4 个月
  rationale: 把接入过程产品化、缩短映射工作量，并把迁移项目沉淀成可复用的部署模式。
- role: 合作伙伴与客户执行经理
  startTiming: 第 12 个月
  rationale: 只有在付费试点开始转正后才加人，这样既能放大合作伙伴线索和新客户销售，也不会太早把团队拖成服务公司。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 3 家正在推进真实发行方迁移或 Managed Payments 接入项目的共创客户。
  - 交付 MVP：覆盖一种平台子账簿模式、一个钱包或托管集成、一条发行方数据源或报表路径，以及每日证据包生成。
  - 把 2 个付费试点转成生产合同。
  - 建立 1 条活跃的审计或会计转介渠道，以及 1 个发行方或通道数据共享合作。
- horizon: 12–24 个月
  items:
  - 做到 6 到 8 个生产客户，且至少 3 家客户扩到第二个项目或第二家发行方。
  - 把映射模板标准化，让第二次部署至少比第一次快 30%。
  - 上线多发行方切换工作台，以及面向合作伙伴交付证据的 API。
  - 新增 1 条可复制的联合销售动作，合作对象是发行方、钱包控制厂商或加密会计伙伴。
- horizon: 24–36 个月
  items:
  - 达到 10 到 12 家生产客户，与研究中的第三年 SOM 相匹配。
  - 只有在美国打法可复制后，才支持首个 MiCA 级别或其他司法辖区部署。
  - 发布跨发行方栈的异常率、证据周转时间和迁移阻塞项基准数据。
  - 证明公司能站在多家发行方和托管伙伴之上，成为中立的稳定币运营台账。
risks:
- risk: 由信托银行支撑的发行方采用可能仍然过于集中、也可能推进太慢，导致近期可服务的迁移项目太少，撑不起独立品类。
  likelihood: High
  impact: High
  mitigation: 只盯已经进入发行方筛选、接入或 Managed Payments 上线阶段的团队，同时覆盖面临同类权益问题的赞助银行或州信托栈。
- risk: 发行方和托管方可能只开放总账户级或报表级数据，导致证明精度受限、部署节奏变慢。
  likelihood: High
  impact: High
  mitigation: 先用报表导入和明确的未结项工作流落地，再去拿那些被客户尽调压力逼出来的更深文件和 API 合作。
- risk: 发行方、钱包控制厂商或加密会计工具，可能在创业公司证明独立预算之前，就先把“够用的报告能力”打包进来。
  likelihood: High
  impact: High
  mitigation: 坚持发行方中立，专注更难的客户到账户储备权益映射、多发行方切换，以及面向审计的异常证据。
- risk: 平台专属的子账簿映射工作，可能把业务拖得过度服务化，压慢毛利率提升。
  likelihood: Medium
  impact: High
  mitigation: 先围绕一种平台模式、一种发行方模式和一个钱包家族标准化，再把高频映射沉淀成可复用模板，之后才扩销售。
- risk: 如果没有更强的鉴证背书或发行方原生证明，审计师或企业客户可能不会接受平台自生成的证明层。
  likelihood: Medium
  impact: Medium
  mitigation: 和审计、鉴证伙伴共创输出，保留可复验的数据血缘，并把产品定位成准备与监控层——即便最终第三方鉴证仍不可省。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金，足够养一个 4 到 5 人团队，做出首批发行方、钱包和子账簿连接器，拿下 3 到 5 家付费共创客户，建立 1 条审计转介渠道和 1 条发行方或通道联合销售渠道，并积累足够多“试点转生产”的证据，判断信托银行权益证明能否独立站成一款软件。
