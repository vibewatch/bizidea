  - point: Direct reserve management replaces a fragmented bank-plus-custodian chain, forcing downstream platforms to remap how customer balances and redemption queues attach to the underlying stack.
    signalRefs: ["Reserve management moves in-house"]
    sourceRefs: [2]
  - point: Authority to custody institutional client assets means the regulated stack is meant to support third-party programs, not just Circle's internal treasury, enlarging the buyer surface for program-level proof software.
    signalRefs: ["Institutional custody buyer base opens"]
