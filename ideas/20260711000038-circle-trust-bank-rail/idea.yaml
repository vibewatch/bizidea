jobsToBeDone:
  - job: >-
      When we migrate to a trust-bank-backed issuer, help our ops and finance team prove every customer balance and redemption right against the issuer's reserve records, so we can go live without audit or enterprise-customer objections.
    currentAlternative: spreadsheet reconciliation plus monthly reserve attestations and issuer support tickets
    successMetric: hours to produce a clean program-level reserve report and number of go-live blockers
  - job: >-
      When an auditor or enterprise customer asks how omnibus balances are protected, help us deliver a daily machine-readable entitlement record, so we can close diligence reviews without custom SQL pulls.
    currentAlternative: ad hoc database queries, PDF attestations, and manual explanations from operations staff
    successMetric: days to answer diligence requests and reduction in unresolved entitlement exceptions
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Final OCC approval plus corroborating CNBC and Reuters coverage make the regulatory shift concrete, not speculative.
  painIntensity:
    score: 4
    rationale: Program-level reserve and redemption proof can become a go-live blocker once auditors, enterprise customers, or bank partners scrutinize an omnibus stablecoin stack.
  wedgeClarity:
    score: 4
    rationale: "The beachhead, trigger, and initial workflow are specific: program-level entitlement mapping for platforms actively migrating onto trust-bank-backed issuers."
  defensibility:
    score: 3
    rationale: Issuers could add lighter reporting features, but a neutral cross-issuer entitlement ledger can build durable value through templates, historical exception data, and migration workflows that no single issuer owns.
  ventureScale:
    score: 4
    rationale: The first market is narrow but important, and the control layer can expand into the default operating ledger for embedded stablecoin programs across issuers, geographies, and adjacent regulated digital-asset products.
topRisks:
  - name: Category timing
    description: Circle may stay an outlier longer than expected, leaving too few embedded stablecoin platforms on an immediate national trust bank migration path.
    mitigation: Start with teams already in issuer selection or onboarding and support state trust and sponsor-bank stablecoin stacks that need the same entitlement proof.
  - name: Issuer data access
    description: Trust-bank issuers may expose only partial reserve or custody feeds, limiting the fidelity of daily entitlement reconciliation.
    mitigation: Launch with customer-side ledger mapping and statement ingestion first, then win formal API and file-delivery partnerships with issuers whose enterprise customers demand better reporting.
  - name: Bundle pressure
    description: Large issuers or custody vendors could bundle basic reserve dashboards into their stack and undercut a standalone category before it matures.
    mitigation: Stay neutral across issuers, own the customer-facing entitlement model, and emphasize migration, multi-issuer reporting, and auditor workflows that bundled dashboards will not prioritize.
