problem: >-
  Embedded stablecoin platforms still own customer subledgers, redemption promises, and audit questions even when a regulated issuer or trust bank holds the underlying reserve and custody assets. As issuers internalize custody and reserve management under a national trust bank, those platforms must prove that each program balance and pending redemption maps cleanly into one federally supervised omnibus stack. Today that mapping lives in spreadsheets, custom SQL, and periodic attestation PDFs, which is too brittle for enterprise diligence, auditor review, and issuer migration cutovers.
targetUser:
  primary: Head of digital asset operations or finance systems at an embedded stablecoin platform with omnibus issuer accounts
  secondary: Compliance and audit-readiness lead at the same platform
  buyer: COO or CFO at the stablecoin platform
startupThesis:
  nonObviousInsight: >-
    A national trust bank charter does not remove downstream operational complexity; it raises the evidentiary bar. Once custody and reserves sit inside a federally supervised issuer, every non-bank platform on top of that stack still has to map its own customer subledger, redemption SLAs, and omnibus balances into the issuer's records. The missing category is not another custody API but a neutral entitlement ledger that translates platform-level balances into trust-bank-grade proof.
  beachhead: >-
    U.S.-based embedded stablecoin wallet-and-settlement platforms serving business customers through omnibus issuer relationships, already piloting a national-trust-bank-backed issuer, and facing auditor or enterprise-customer requests for per-program reserve coverage and redemption evidence
  wedge: >-
    A trust-bank entitlement ledger that ingests the platform's internal customer subledger, mint and burn activity, redemption queues, and the issuer's reserve and custody records, then produces a daily program-level proof of reserve coverage, redemption exposure, and exceptions.
  whyNowCatalyst: >-
    Circle's OCC approval and its plan to bring custody and eventually USDC reserves under federal oversight make trust-bank-backed stablecoin stacks real now, so downstream platforms need a way to prove their own balances and redemption rights inside that new perimeter.
  ventureScalePath: >-
    Start with reserve and redemption proof for embedded stablecoin programs, expand into issuer-migration tooling, counterparty reporting, and continuous controls across multiple issuers, then become the standard operating ledger that banks, issuers, auditors, and enterprise customers trust for omnibus stablecoin infrastructure.
solution: >-
  The product connects to a platform's internal ledger, wallet system, mint and burn workflow, and the issuer or custodian feeds that reflect trust-bank reserve and custody positions. It reconstructs a daily entitlement table showing which customer or program balances are backed by which omnibus positions, how much is pending redemption, and where timing or data mismatches exist. Teams get exception workflows for reserve shortfalls, stale issuer data, or mismapped redemptions, plus a machine-readable API and downloadable evidence pack for auditors, enterprise customers, and bank partners. During issuer migrations, the same ledger becomes the cutover control room, comparing old and new stacks until balances and redemption rights reconcile cleanly.
goToMarketSeed:
  firstCustomer: >-
    COO or head of digital asset operations at a U.S. stablecoin wallet-and-settlement API provider serving marketplaces or B2B payment platforms, with 500 or more business wallets and a live project to migrate from a bank-plus-custodian pair to a national trust bank-backed issuer in the next two quarters
  buyingTrigger: >-
    The platform signs an issuer migration or trust-bank onboarding project and its auditor, enterprise customer, or board asks for program-level reserve and redemption evidence before go-live
  currentAlternative: internal SQL and spreadsheet reconciliation across issuer dashboards, wallet data, and monthly attestation reports, plus ad hoc support tickets with the issuer
  switchingReason: >-
    The wedge gives the operator a daily, machine-readable entitlement record instead of periodic PDFs and one-off queries, reducing launch risk and making enterprise and audit reviews faster
  pricingHypothesis: annual enterprise subscription priced by active programs and reconciled omnibus wallets, with onboarding fees for issuer and subledger mapping
