    - 35
  geographicConsiderations:
  - point: The U.S. is the clearest beachhead because OCC, FDIC, NYDFS, and GENIUS-era expectations create a visible need for program-level evidence around reserves, redemption, and third-party oversight.
    sourceRefs:
