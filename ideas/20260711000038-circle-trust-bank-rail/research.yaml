    - 12
    - 14
  - friction: Internal and external ledgers drift because no canonical entitlement model exists
    severity: high
    affectedBuyer: Finance systems lead
    mitigation: Model every mint, burn, payout, and customer-balance state change into one immutable reconciliation layer with explicit open-item queues.
    sourceRefs:
    - 7
    - 32
    - 34
  - friction: Auditors and counterparties need more than reserve snapshots; they need controls evidence
    severity: high
