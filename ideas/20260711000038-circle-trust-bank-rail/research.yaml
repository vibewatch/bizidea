  adoptionFrictionMatrix:
  - friction: Issuer or custodian data may only be available at omnibus or statement level
    severity: high
    affectedBuyer: Head of digital asset operations
    mitigation: Start with statement ingestion and exception workflows, then earn API and file-delivery partnerships as proof demands rise.
