  validationPlan:
  - priority: high
    question: What exact files, APIs, and statement formats do target issuers and custodians expose today for reserve, custody, and redemption operations?
    evidenceToGather: Sample daily files and API payloads from three live or near-live issuer integrations, plus data-field mapping for program balances, mint or burn events, and pending redemptions.
  - priority: high
    question: How often do issuer migrations or trust-bank onboarding projects create launch delays tied to reconciliation or evidence gaps?
    evidenceToGather: Postmortems and milestone logs from five recent stablecoin program launches or migrations, including blocker categories and time-to-resolution.
  - priority: high
    question: Will auditors and enterprise counterparties accept a platform-generated entitlement report if the issuer data feed is only statement-based at first?
    evidenceToGather: Audit checklists, sample diligence requests, and redline feedback on a draft daily entitlement report from two auditors and three enterprise customers.
  - priority: medium
    question: 'Which exception types recur most often: stale reserve data, unmatched burns, unsettled payouts, or customer-level balance mismatches?'
    evidenceToGather: Ninety days of open-item logs from one design partner, categorized by root cause, financial exposure, and resolution path.
  - priority: low
    question: Can the first logo sell from the COO or CFO budget before a broader digital-asset platform initiative exists?
    evidenceToGather: Budget-owner interviews and at least five pricing conversations with platforms already buying custody, compliance, or crypto-accounting software.
