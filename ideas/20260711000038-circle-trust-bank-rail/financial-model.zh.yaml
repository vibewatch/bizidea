scenarios:
  downside:
    description: 试点启动继续后滑，到 Q4Y3 只有 10 个活跃付费项目上线，因此团队在实现自我造血前需要一笔小额过桥资金。
    y3RevenueK: 2181.0
    y3EbitdaK: -473.7
    cashLowPointK: -49.8
    keyAssumptionChanges:
    - 首批试点启动更晚，后续项目也都比基准情景慢约 2 个月，因此到 Q4Y3 只做到 10 个活跃付费项目。
    - 早期生产阶段的货币化更接近 ~$234K ARR，成熟项目更接近 ~$276K ARR，因为扩容模块落地更慢。
    - 由于接入工作始终更偏人工，毛利率最高只能到约 70%，而不是 73%。
  base:
    description: 由创始人主导的企业销售爬坡，在 Q4Y2 做到 8 个活跃付费项目，在 Q4Y3 做到 12 个，并在退出时接近盈亏平衡。
    y3RevenueK: 2846.0
    y3EbitdaK: 38.0
    cashLowPointK: 740.1
    keyAssumptionChanges:
    - 首批付费试点分别在 M5 和 M7 启动，随后团队在 Y2 和 Y3 基本每两个月新增 1 个付费项目。
    - 新项目先在 3 个月试点期贡献约 $90K，随后在早期生产阶段贡献约 $246K ARR，上线满 12 个月后随扩容走到约 $288K ARR 等值。
    - 团队在前 18 个月维持 5 FTE，到 Q4Y2 升到 7 FTE，到 Q4Y3 升到 10 FTE。
  upside:
    description: 发行方和审计转介把启动节奏往前拉，成熟项目也更早买入高级报告模块，因此 Y3 明显开始贡献现金。
    y3RevenueK: 3106.0
    y3EbitdaK: 239.4
    cashLowPointK: 957.8
    keyAssumptionChanges:
    - 首批试点提前 1 个月启动，后续节奏也被压缩；到 Q4Y3 虽然仍是 12 个活跃付费项目，但成熟客户组占比更高。
    - 早期生产阶段的货币化更接近 ~$264K ARR，成熟项目更接近 ~$294K ARR，因为面向合作伙伴的报告模块卖得更早。
    - 随着证据包模板和发行方映射被更频繁复用，H2Y3 毛利率可达约 74%。
sensitivity:
- variable: 销售周期
  downsideCase: 每个试点和生产启动都整体后滑约 2 个月。
  baseCase: 首批试点在 M5 和 M7 启动，随后大约每 2 个月落下 1 个新付费项目。
  upsideCase: 合作伙伴转介把启动节奏整体提前约 1 个月。
  y3RevenueImpactK: -196.5
  cashImpactK: -370.0
- variable: CAC
  downsideCase: 如果创始人主导销售仍然高度手工、合作伙伴转介也跑不出来，CAC 约为 $155K。
  baseCase: 基于 Y1-Y2 销售与市场费用除以 Q4Y2 的 6 个生产项目，CAC 约为 $120K。
  upsideCase: 如果发行方和审计渠道带来更热的机会，CAC 约为 $95K。
  y3RevenueImpactK: 0.0
  cashImpactK: -216.0
- variable: 招聘节奏
  downsideCase: 第二位工程师、第二位解决方案和第二位销售都比计划提前约 2 个月入职。
  baseCase: 前 M18 维持 5 FTE，Q4Y2 达到 7 FTE，Q4Y3 达到 10 FTE。
  upsideCase: 只有在生产证明清晰后才补后续招聘，因此整体再延后约 2 个月。
  y3RevenueImpactK: 0.0
  cashImpactK: -151.6
- variable: ARPU
  downsideCase: 早期生产阶段稳定在约 ~$234K ARR，成熟客户组稳定在约 ~$276K ARR 等值。
  baseCase: 早期生产阶段约 ~$246K ARR，成熟客户组约 ~$288K ARR 等值。
  upsideCase: 早期生产阶段提升到约 ~$258K ARR，成熟客户组提升到约 ~$300K ARR 等值。
  y3RevenueImpactK: -110.0
  cashImpactK: -115.6
- variable: 流失
  downsideCase: 由于续约或扩容后滑，老客户组的保留下来的收入比计划少约 8%。
  baseCase: 生产上线后使用 1.5% 的月度客户等效流失假设。
  upsideCase: 第二项目和合作伙伴报告模块能部分对冲客户流失，净留存略有改善。
  y3RevenueImpactK: -69.0
  cashImpactK: -52.0
- variable: 毛利率
  downsideCase: 如果接入工作始终更偏人工，Y3 退出时毛利率会卡在约 70%。
  baseCase: 毛利率从 M1 的 48% 爬到 H2Y3 的约 73%，长期稳态约 70%。
  upsideCase: 如果模板和映射能更高频复用，毛利率可达约 75%。
  y3RevenueImpactK: 0.0
  cashImpactK: -47.6
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      TargetAccounts[目标账户] --> QualifiedReviews[合格迁移评审]
      QualifiedReviews --> PaidPilots[付费试点]
      PaidPilots --> ProductionPrograms[生产环境项目]
      ProductionPrograms --> ExpansionPrograms[扩容模块或第二项目]
      ProductionPrograms --> Revenue[收入]
      ExpansionPrograms --> Revenue
      Revenue --> GrossProfit[毛利]
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[现金]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景由 Y1 的 2 个付费试点驱动，随后在 Q4Y2 做到 8 个活跃付费项目，在 Q4Y3 做到 12 个；成熟项目的年化已实现收入大致落在 $246K 到 $288K。
- checkName: 必须做对的事
  finding: 试点必须在大约 90 天内转正，而且团队在 Y1 之后还得维持“两个月新增 1 个付费项目”的节奏，同时不能养出一支很大的服务团队。
- checkName: 模型会在哪儿断
  finding: 下行情景已经说明：如果销售周期后滑 2 个月、扩容也更慢，Y3 结束前现金就会略微跌到零以下。
- checkName: 下一轮证明
  finding: 这轮 seed 的规模，就是为了把公司送到 Q4Y2 的证明包：8 个活跃付费项目，加上可复制的审计和发行方渠道证据，同时手里还保留约 6 个月缓冲。
sanityChecks:
  ruleOf40: Y3 增长 82% + EBITDA 利润率 1% = 83%
  burnMultiple: Y2 burn multiple 约 0.3x（$403.1K burn / $1219.5K 收入增长），到 Y3 EBITDA 转正。
  revenuePerFte: 按 Q4Y3 的 FTE 口径算，Y3 每名 FTE 对应约 $285K 收入（企业 SaaS 基准大约是 $200K-$400K）。
  flags:
  - 基准情景统计的是活跃付费项目，而不是终端钱包数；在多家平台真正上线前，单一客户集中度依然明显。
  - 模型假设发行方提供的报表或平面文件，足以支持早期部署；如果客户从第一天就要求带签名的项目级 API，销售周期和毛利率都会一起变差。
  - 到 Y3 也只配了 1 名专职运营/合规人员；如果鉴证或监管负担更重，seed 资金需求大概率会高于模型里的 $2.0M。
  - Y3 后段的 EBITDA 只是略微转正；如果在模板复用被证明之前就加完整的一线销售或实施层，现金跑道会明显被压缩。
