slug: trust-bank-entitlement-ledger
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-11] 模型从该版 business plan 日期之后的第一个完整月份起算。'
- id: A2
  name: 期初现金 / seed 融资
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk round seed, targetFundingRangeUsd $2–4M, runwayMonths 18] 模型取区间下沿，因为团队在前 18 个月维持 5 FTE 也仍能在 Q4Y2 里程碑时保住大约 6 个月现金缓冲。'
- id: A3
  name: 客户定义
  value: 一个在试点或生产环境中付费、并纳入日常权益证明的活跃稳定币项目
  unit: 定义
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] customersEop 统计的是活跃付费项目，而不是终端钱包数。'
- id: A4
  name: 首个付费试点时点
  value: M5 首个试点，M7 第二个试点
  unit: 月份
  source: '[BP experimentRoadmap 0–90 days prototype, 90–180 days paid pilots] 收入要等原型和共创客户阶段之后才开始，不会在模型起点立刻出现。'
- id: A5
  name: 付费项目爬坡
  value: M12 达到 2 个，Q4Y2 达到 8 个，Q4Y3 达到 12 个
  unit: 期末付费项目数
  source: '[BP milestones 0–12, 12–24, 24–36 months + Research market.som 12 year-3 logos] 基准情景沿着计划走：第 2 年做到 6–8 个生产客户，第 3 年约 12 个。'
- id: A6
  name: 付费试点定价
  value: $90K / 3 个月（约 $30K/月）
  unit: USD/项目
  source: '[BP gtm.pricing $60k-$100k paid pilot + BP investorMemo.firstCustomer.initialContract] 模型取高位，因为映射和接入费用一并打进迁移准备试点。'
- id: A7
  name: 早期生产合同定价
  value: $246K ARR（约 $20.5K/月）
  unit: USD/项目/年
  source: '[BP gtm.pricing $180k-$250k ARR + Research bottomUpSizingDrivers assumed ACV $200k-$250k] 首个完整年度生产合同取研究 ACV 区间的高位附近。'
- id: A8
  name: 成熟客户组已实现收入
  value: ~$288K ARR 等值，发生在上线 12 个月后（约 $24K/月）
  unit: USD/项目/年
  source: '[BP businessModel.expansionLevers + BP milestones expanded second program or issuer + startup-finance heuristic] 成熟客户组在首个生产年度之后，会叠加高级报告与扩容费用。'
- id: A9
  name: 试点转生产周期
  value: 约 90 天
  unit: 天
  source: '[BP investorMemo.mustBeTrue ROI under 90 days + BP experimentRoadmap paid-pilot conversion test] 模型假设每个试点要么很快转正，要么很快失败。'
- id: A10
  name: 毛利率爬坡
  value: M1 为 48%，M12 到 60%，H2Y3 约 73%
  unit: 毛利率
  source: '[BP businessModel.targetGrossMarginPct 70 + BP risks services-heavy mapping + Research regulatoryTechnicalConstraints] 早期部署更依赖人工，后续靠可复用映射和证据模板把毛利率拉到退出时高于 70%。'
- id: A11
  name: 创始人总包薪酬
  value: $180.0K
  unit: USD/年
  source: '[BP team CEO / founder-sales + startup-finance heuristic] 假设创始人工资保持精简，但含薪资税和福利。'
- id: A12
  name: 工程总包薪酬
  value: 首位工程师 $205.0K，后续工程招聘分别为 $195.0K 和 $190.0K
  unit: USD/年/FTE
  source: '[BP team Founding eng + startup-finance heuristic] 集成密集型金融基础设施需要资深工程师，但后续招聘可略低于创始工程师。'
- id: A13
  name: 产品与控制总包薪酬
  value: $190.0K
  unit: USD/年
  source: '[BP team Product and controls lead + startup-finance heuristic] 这是一个高领域密度岗位，既要做控制设计，也要负责客户证据工作流。'
- id: A14
  name: 解决方案与实施总包薪酬
  value: 首位招聘 $175.0K，第二位招聘 $165.0K
  unit: USD/年/FTE
  source: '[BP team Solutions engineer + startup-finance heuristic] 第一位更资深、也更贴客户；第二位能吃到操作手册更清晰的红利。'
- id: A15
  name: 销售与合作总包薪酬
  value: $220.0K
  unit: USD/年/FTE
  source: '[BP team Partnerships and account executive + startup-finance heuristic] 含企业销售的浮动薪酬，以及合作伙伴拓展所需差旅。'
- id: A16
  name: 运营与合规总包薪酬
  value: $140.0K
  unit: USD/年
  source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 后期只加 1 名运营，覆盖财务、供应商和控制运营，不搭大后台。'
- id: A17
  name: 招聘节奏
  value: M1 创始人、创始工程师和产品与控制负责人；M4 首位解决方案工程师；M12 首位销售；M19 第二位工程师；M24 第二位解决方案；M27 运营/合规；M33 第二位销售；M35 第三位工程师
  unit: 时间线
  source: '[BP team.startTiming + BP fundingAsk.useOfFundsSummary 4–5 person team for 18 months + BP strategicChoices.sequencingRationale] 在试点转生产跑出证明前，团队始终保持精瘦。'
- id: A18
  name: 薪酬在 P&L 中的分摊
  value: 创始人：55% S&M / 25% R&D / 20% G&A；工程：100% R&D；产品与控制：80% R&D / 20% G&A；解决方案：25% S&M / 75% R&D；销售：100% S&M；运营：100% G&A
  unit: 分摊
  source: '[BP team role rationales + BP operations] 这样既把人头成本完整滚进薪酬科目，也能反映部署阶段偏客户侧的工作量。'
- id: A19
  name: 非薪酬 Opex 爬坡
  value: 36 个月内，S&M 从 $7K→$15K/月，R&D 从 $9K→$13K/月，G&A 从 $7K→$11K/月
  unit: USD/月
  source: '[BP gtm.channels + BP operations + Research regulatoryLandscape + startup-finance heuristic] 覆盖云资源、差旅、法务、保险和轻量合规工具，不预设大规模付费获客。'
- id: A20
  name: 现金转换约定
  value: 用 EBITDA 近似现金变动
  unit: 公式
  source: '[startup-finance heuristic] 模型假设在 seed 阶段，capex、债务、税务和营运资本时点影响都不大。'
- id: A21
  name: 月度流失假设
  value: 1.5%
  unit: 每月百分比
  source: '[BP businessModel.expansionLevers + BP investorMemo.mustBeTrue + startup-finance heuristic] 这类嵌入式证明软件一旦上线会比较黏，但模型并不假设零流失。'
- id: A22
  name: CAC 约定
  value: $120K / 生产项目
  unit: USD/项目
  source: '[model calc using Y1-Y2 salesMarketingK divided by 6 production programs by Q4Y2 + BP gtm.funnelTargets] 用的是第一波企业客户批次，而不是完全成熟的渠道机器。'
- id: A23
  name: seed 轮融资里程碑
  value: 到 Q4Y2：8 个活跃付费项目、其中约 6 个已在生产环境、2 个可对外背书的试点转正案例、1 条审计转介渠道，以及 1 条发行方或通道联合销售动作
  unit: 里程碑
  source: '[BP milestones 12–24 months + BP fundingAsk.useOfFundsSummary + BP experimentRoadmap] 这就是下一轮融资前，seed 资金要买到的证明包。'
- id: A24
  name: 季度薪酬约定
  value: 季度薪酬线按季度内真实入职月份求和，而不是只看季度末快照
  unit: 约定
  source: '[Headcount column convention + BP team.startTiming] 这样薪酬科目才能和月度招聘节奏对上。'
