scenarios:
  downside:
    description: Pilot starts slip and only ten active paying programs are live by Q4Y3, so the team needs a small bridge instead of reaching self-funded breakeven.
    y3RevenueK: 2181.0
    y3EbitdaK: -473.7
    cashLowPointK: -49.8
    keyAssumptionChanges:
    - First pilots start later and later-stage starts remain about two months behind the base case, leaving 10 active paying programs by Q4Y3.
    - Early production monetizes closer to ~$234K ARR and mature programs closer to ~$276K ARR because expansion modules land more slowly.
    - Gross margin tops out around 70% instead of 73% as onboarding remains more manual.
  base:
    description: A founder-led enterprise ramp reaches eight active paying programs by Q4Y2 and twelve by Q4Y3 while exiting near breakeven.
    y3RevenueK: 2846.0
    y3EbitdaK: 38.0
    cashLowPointK: 740.1
    keyAssumptionChanges:
    - First paid pilots start in M5 and M7, then the team adds one new paying program roughly every two months through Y2 and Y3.
    - A new program contributes about $90K over a 3-month pilot, then about $246K ARR in early production and about $288K ARR-equivalent after twelve months of expansion.
    - Hiring stays at 5 FTE through month 18, reaches 7 FTE by Q4Y2, and reaches 10 FTE by Q4Y3.
  upside:
    description: Warm issuer and audit referrals pull starts forward and mature programs buy richer reporting modules, so Y3 becomes meaningfully cash-generative.
    y3RevenueK: 3106.0
    y3EbitdaK: 239.4
    cashLowPointK: 957.8
    keyAssumptionChanges:
    - First pilots start one month earlier and subsequent starts compress, keeping the same 12 active paying programs by Q4Y3 but with more mature cohorts.
    - Early production monetizes closer to ~$264K ARR and mature programs closer to ~$294K ARR because partner-facing reporting modules sell sooner.
    - Gross margin reaches about 74% by H2Y3 as evidence-pack templates and issuer mappings are reused more often.
sensitivity:
- variable: sales cycle
  downsideCase: Each pilot and production start slips by roughly 2 months.
  baseCase: First pilots start in M5 and M7, then one new paying program lands about every 2 months.
  upsideCase: Partner referrals pull starts forward by about 1 month.
  y3RevenueImpactK: -196.5
  cashImpactK: -370.0
- variable: CAC
  downsideCase: Around $155K CAC if founder-led conversion stays manual and partner referrals underperform.
  baseCase: About $120K CAC based on Y1-Y2 sales and marketing spend divided by 6 production programs by Q4Y2.
  upsideCase: About $95K CAC if issuer and audit channels create warmer opportunities.
  y3RevenueImpactK: 0.0
  cashImpactK: -216.0
- variable: hiring pace
  downsideCase: Second engineer, solutions, and second sales hires are pulled forward by about 2 months.
  baseCase: Keep 5 FTE through M18, 7 FTE by Q4Y2, and 10 FTE by Q4Y3.
  upsideCase: Delay later hires by about 2 months until production proof is visible.
  y3RevenueImpactK: 0.0
  cashImpactK: -151.6
- variable: ARPU
  downsideCase: Early production settles near ~$234K ARR and mature cohorts near ~$276K ARR-equivalent.
  baseCase: Early production is about ~$246K ARR and mature cohorts about ~$288K ARR-equivalent.
  upsideCase: Early production reaches about ~$258K ARR and mature cohorts about ~$300K ARR-equivalent.
  y3RevenueImpactK: -110.0
  cashImpactK: -115.6
- variable: churn
  downsideCase: Older cohorts retain about 8% less revenue than plan because renewals or expansions slip.
  baseCase: Use a 1.5% monthly logo-equivalent churn heuristic after production go-live.
  upsideCase: Net retention improves modestly as second-program and partner-reporting modules offset logo churn.
  y3RevenueImpactK: -69.0
  cashImpactK: -52.0
- variable: gross margin
  downsideCase: Y3 exit gross margin stalls near 70% because onboarding remains manual.
  baseCase: Gross margin ramps from 48% in M1 to about 73% by H2Y3 and roughly 70% steady-state.
  upsideCase: Gross margin reaches about 75% if templates and mappings become more reusable.
  y3RevenueImpactK: 0.0
  cashImpactK: -47.6
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts[Target accounts] --> QualifiedReviews[Qualified migration reviews]
      QualifiedReviews --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionPrograms[Production programs]
      ProductionPrograms --> ExpansionPrograms[Expansion modules or second programs]
      ProductionPrograms --> Revenue[Revenue]
      ExpansionPrograms --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[Cash]
modelSanity:
- checkName: Revenue engine
  finding: The base case is driven by two paid pilots in Y1, eight active paying programs by Q4Y2, and twelve by Q4Y3 at roughly $246K to $288K annualized realized revenue per mature program.
- checkName: Must go right
  finding: Pilots must convert in about 90 days and the team must keep landing roughly one new paying program every two months after Y1 without adding a large services bench.
- checkName: Model breaks if
  finding: The downside case shows that a two-month sales-cycle slip and slower expansion push cash slightly below zero before Y3 ends.
- checkName: Next-round proof
  finding: The seed is sized to reach the Q4Y2 proof package of eight active paying programs plus repeatable audit and issuer channel evidence while still holding about six months of buffer.
sanityChecks:
  ruleOf40: Y3 growth 82% + EBITDA margin 1% = 83%
  burnMultiple: Y2 burn multiple is about 0.3x ($403.1K burn on $1219.5K revenue growth), then EBITDA turns positive in Y3.
  revenuePerFte: About $285K Y3 revenue per Q4Y3 FTE (benchmark roughly $200K-$400K enterprise SaaS).
  flags:
  - Base case counts active paying programs rather than end-user wallets, so logo concentration remains meaningful until multiple platforms are live.
  - The model assumes statement or flat-file issuer data is good enough for early deployments; if customers require signed program-level APIs first, both sales cycle and gross margin worsen.
  - Only one dedicated ops/compliance hire exists by Y3; a heavier assurance or regulatory burden would likely push the seed need above the modeled $2.0M.
  - Late-Y3 EBITDA is only slightly positive, so adding a full field-sales or implementation layer before template reuse is proven would compress runway materially.
