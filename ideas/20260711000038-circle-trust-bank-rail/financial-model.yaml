slug: trust-bank-entitlement-ledger
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-11] the model starts in the first full month after the dated business plan.'
- id: A2
  name: Opening cash / seed raise
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk round seed, targetFundingRangeUsd $2–4M, runwayMonths 18] the model uses the low end because hiring stays at 5 FTE through month 18 and still preserves roughly a 6-month cash buffer by the Q4Y2 milestone.'
- id: A3
  name: Customer definition
  value: One active paying stablecoin program in pilot or production under daily entitlement proof
  unit: definition
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] customersEop counts active paying programs rather than end-user wallets.'
- id: A4
  name: First paid-pilot timing
  value: M5 first pilot, M7 second pilot
  unit: month
  source: '[BP experimentRoadmap 0–90 days prototype, 90–180 days paid pilots] the first revenue begins after the prototype and design-partner phase, not immediately at model start.'
- id: A5
  name: Active paying program ramp
  value: 2 by M12, 8 by Q4Y2, and 12 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0–12, 12–24, 24–36 months + Research market.som 12 year-3 logos] base case tracks the plan to reach 6–8 production customers by year 2 and ~12 by year 3.'
- id: A6
  name: Paid pilot pricing
  value: $90K over 3 months (~$30K/mo)
  unit: USD/program
  source: '[BP gtm.pricing $60k-$100k paid pilot + BP investorMemo.firstCustomer.initialContract] the model uses the high end because mapping and onboarding fees are bundled into the migration-readiness pilot.'
- id: A7
  name: Early production contract pricing
  value: $246K ARR (~$20.5K/mo)
  unit: USD/program/year
  source: '[BP gtm.pricing $180k-$250k ARR + Research bottomUpSizingDrivers assumed ACV $200k-$250k] the first full-year production contract sits near the top of the researched ACV band.'
- id: A8
  name: Mature cohort realized revenue
  value: ~$288K ARR-equivalent after 12 months (~$24K/mo)
  unit: USD/program/year
  source: '[BP businessModel.expansionLevers + BP milestones expanded second program or issuer + startup-finance heuristic] mature cohorts carry premium reporting and expansion fees after the initial production year.'
- id: A9
  name: Pilot-to-production cycle
  value: About 90 days
  unit: days
  source: '[BP investorMemo.mustBeTrue ROI under 90 days + BP experimentRoadmap paid-pilot conversion test] the model assumes each pilot converts or fails quickly.'
- id: A10
  name: Gross margin ramp
  value: 48% in M1, 60% by M12, and ~73% by H2Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP risks services-heavy mapping + Research regulatoryTechnicalConstraints] early deployments are more manual, then reusable mappings and evidence templates lift margin above the 70% target by exit.'
- id: A11
  name: Founder loaded compensation
  value: $180.0K
  unit: USD/year
  source: '[BP team CEO / founder-sales + startup-finance heuristic] assumes lean founder salary plus payroll taxes and benefits.'
- id: A12
  name: Engineering loaded compensation
  value: $205.0K for the first engineer, then $195.0K and $190.0K for later engineering hires
  unit: USD/year/FTE
  source: '[BP team Founding eng + startup-finance heuristic] integration-heavy financial infrastructure requires senior engineering talent but later hires can be slightly cheaper than the founding engineer.'
- id: A13
  name: Product and controls loaded compensation
  value: $190.0K
  unit: USD/year
  source: '[BP team Product and controls lead + startup-finance heuristic] reflects a domain-heavy product role spanning controls design and customer evidence workflows.'
- id: A14
  name: Solutions and implementation loaded compensation
  value: $175.0K for the first hire and $165.0K for the second hire
  unit: USD/year/FTE
  source: '[BP team Solutions engineer + startup-finance heuristic] the first hire is more senior and customer-facing; the second benefits from a clearer playbook.'
- id: A15
  name: Sales and partnerships loaded compensation
  value: $220.0K
  unit: USD/year/FTE
  source: '[BP team Partnerships and account executive + startup-finance heuristic] includes variable compensation and partner-development travel for enterprise sales.'
- id: A16
  name: Ops and compliance loaded compensation
  value: $140.0K
  unit: USD/year
  source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] one later-stage operator covers finance, vendor, and control operations without building a large back office.'
- id: A17
  name: Hiring timeline
  value: M1 founder, founding engineer, and product-controls lead; M4 first solutions engineer; M12 first sales hire; M19 second engineer; M24 second solutions hire; M27 ops/compliance; M33 second sales hire; M35 third engineer
  unit: timeline
  source: '[BP team.startTiming + BP fundingAsk.useOfFundsSummary 4–5 person team for 18 months + BP strategicChoices.sequencingRationale] headcount stays lean until pilot-to-production proof exists.'
- id: A18
  name: Payroll allocation to P&L lines
  value: Founder 55% S&M / 25% R&D / 20% G&A; engineering 100% R&D; product-controls 80% R&D / 20% G&A; solutions 25% S&M / 75% R&D; sales 100% S&M; ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] this keeps headcount cost fully rolled into the salary line while reflecting customer-facing deployment work.'
- id: A19
  name: Non-payroll opex ramp
  value: S&M $7K→$15K/mo, R&D $9K→$13K/mo, G&A $7K→$11K/mo across 36 months
  unit: USD/month
  source: '[BP gtm.channels + BP operations + Research regulatoryLandscape + startup-finance heuristic] covers cloud, travel, legal, insurance, and light compliance tooling without assuming broad paid-demand spend.'
- id: A20
  name: Cash conversion convention
  value: EBITDA approximates cash movement
  unit: formula
  source: '[startup-finance heuristic] capex, debt, taxes, and working-capital timing are assumed immaterial at seed stage.'
- id: A21
  name: Monthly churn heuristic
  value: 1.5%
  unit: percent/month
  source: '[BP businessModel.expansionLevers + BP investorMemo.mustBeTrue + startup-finance heuristic] embedded proof software should be sticky once live, but the model does not assume zero churn.'
- id: A22
  name: CAC convention
  value: $120K per production program
  unit: USD/program
  source: '[model calc using Y1-Y2 salesMarketingK divided by 6 production programs by Q4Y2 + BP gtm.funnelTargets] uses the first-wave enterprise cohort rather than a fully mature channel machine.'
- id: A23
  name: Funding milestone for the seed round
  value: 8 active paying programs, about 6 in production, 2 referenceable pilot-to-production conversions, 1 audit referral channel, and 1 issuer or rail co-sell motion by Q4Y2
  unit: milestone
  source: '[BP milestones 12–24 months + BP fundingAsk.useOfFundsSummary + BP experimentRoadmap] this is the proof package the seed needs to finance before the next round.'
- id: A24
  name: Quarterly salary convention
  value: Quarterly salary lines sum actual monthly hires inside each quarter instead of relying only on quarter-end snapshots
  unit: convention
  source: '[Headcount column convention + BP team.startTiming] ensures the salary line reconciles to the monthly hiring ramp.'
