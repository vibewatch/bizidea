  signalRefs:
  - 储备管理转入内部
  sourceRefs:
  - 2
- point: 既然牌照允许托管机构客户资产，就说明这套受监管栈本来就要承接第三方项目，而不只是 Circle 自己的资金池；项目级证明软件的买方范围随之放大。
  signalRefs:
  - 机构托管买方池打开
  sourceRefs:
  - 3
- point: 当加密公司从应用层走向核心金融基础设施，预算也会从交易 API 往控制、报告和运营软件转移。
  signalRefs:
  - 加密行业转向核心基础设施
  sourceRefs:
