jobsToBeDone:
- job: 当我们迁到由信托银行支撑的发行方时，帮运营和财务团队把每一笔客户余额、每一项赎回权都对到发行方储备记录上，这样我们上线时就不会被审计或企业客户卡住。
  currentAlternative: 用表格对账，外加月度储备鉴证和发给发行方的支持工单。
  successMetric: 产出一份干净的项目级储备报告要花多少小时，以及上线阻塞项还有多少。
- job: 当审计师或企业客户追问总账户余额到底怎么被保护时，帮我们交付一份每天更新、机器可读的权益记录，这样尽调就不用再靠定制 SQL 拉数。
  currentAlternative: 临时跑数据库查询、发 PDF 鉴证，再由运营同事人工解释。
  successMetric: 回答尽调请求需要多少天，以及未解决的权益异常项能减少多少。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: OCC 最终批准，再加上 CNBC 和 Reuters 的交叉报道，让这次监管变化足够具体，不是纯猜想。
  painIntensity:
    score: 4
    rationale: 一旦审计师、企业客户或银行合作方开始审视总账户稳定币栈，项目级储备和赎回证明很容易直接卡住上线。
  wedgeClarity:
    score: 4
    rationale: 滩头市场、购买触发器和第一条工作流都很具体：就是给正在迁往信托银行支撑发行方的平台做项目级权益映射。
  defensibility:
    score: 3
    rationale: 发行方自己也许会补一些轻量报告功能，但一套跨发行方的中立权益台账，能靠模板、历史异常数据和迁移工作流积累出更耐打的价值。
  ventureScale:
    score: 4
    rationale: 首个市场不大，但足够关键；这层控制能力有机会扩成跨发行方、跨地区、再到相邻受监管数字资产业务的默认运营台账。
topRisks:
- name: 赛道时点
  description: Circle 可能会在相当长时间内仍是少数案例，导致真正处在全国性信托银行迁移路径上的嵌入式稳定币平台太少。
  mitigation: 先盯已经在做发行方筛选或接入的团队，同时支持州信托和赞助银行稳定币栈——它们面对的是同一类权益证明问题。
- name: 发行方数据访问
  description: 信托银行发行方可能只开放部分储备或托管数据，限制日常权益对账的精度。
  mitigation: 先从客户侧台账映射和报表导入做起，再去拿那些被企业客户逼着提升报告能力的发行方 API 与文件交付合作。
- name: 捆绑压力
  description: 大型发行方或托管服务商可能会把基础储备看板直接打包进自家栈里，在独立品类成熟前就把价格压住。
  mitigation: 坚持跨发行方中立，牢牢抓住面向客户的权益模型，并突出迁移、多发行方报告和审计工作流——这些都不是捆绑看板会优先做好的。
