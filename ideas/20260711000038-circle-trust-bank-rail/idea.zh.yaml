problem: 即便底层储备和托管资产已经放在受监管的发行方或信托银行体内，嵌入式稳定币平台仍然要自己扛客户子账簿、赎回承诺和审计问答。一旦发行方把托管与储备管理收回到全国性信托银行体系里，这些平台就得证明：每一笔项目余额、每一笔待赎回头寸，都能干净地映射到同一个受联邦监管的总账户栈里。今天这件事还靠 Excel、定制 SQL 和周期性鉴证 PDF 在硬拼，拿去过企业尽调、审计复核或发行方迁移切换，稳定性远远不够。
targetUser:
  primary: 在嵌入式稳定币平台负责数字资产业务运营或财务系统的负责人，且平台通过发行方总账户运营。
  secondary: 同一平台里负责合规和审计就绪的负责人。
  buyer: 稳定币平台的 COO 或 CFO。
startupThesis:
  nonObviousInsight: 全国性信托银行牌照不会消灭下游运营复杂度，反而把证据门槛抬高。托管和储备一旦放进受联邦监管的发行方体内，叠在这层之上的每一家非银行平台，仍得把自己的客户子账簿、赎回 SLA 和总账户余额，逐笔对齐到发行方记录。缺的不是另一个托管 API，而是一套中立的权益台账：把平台层余额翻译成信托银行级别的证明。
  beachhead: 美国本土的嵌入式稳定币钱包与结算平台，服务企业客户，通过发行方总账户运营；它们已经在试点由全国性信托银行支撑的发行方，并且正被审计师或企业客户追着要项目级储备覆盖和赎回证据。
  wedge: 一套信托银行权益台账，吃进平台内部客户子账簿、铸造与销毁活动、赎回队列，以及发行方的储备与托管记录，然后每天产出项目级的储备覆盖、赎回敞口和异常项证明。
  whyNowCatalyst: Circle 获 OCC 批准、并计划把托管以及后续的 USDC 储备纳入联邦监管，让信托银行支撑的稳定币栈从概念变成现实；处在下游的平台现在就需要证明，它们自己的余额和赎回权如何落在这道新边界里。
  ventureScalePath: 先从嵌入式稳定币项目的储备和赎回证明切入，再扩到发行方迁移工具、对手方报告，以及跨多家发行方的持续控制，最后变成银行、发行方、审计师和企业客户都信任的标准运营台账。
solution: 产品接入平台内部台账、钱包系统、铸造/销毁流程，以及能够反映信托银行储备和托管头寸的发行方或托管方数据源。系统会重建一张每日权益表：哪些客户或项目余额由哪些总账户头寸支撑、当前有多少待赎回、哪里存在时点或数据不一致。团队可以围绕储备缺口、发行方数据滞后或赎回映射错误走异常流程；同时还能给审计师、企业客户和银行合作方导出机器可读 API 与下载版证据包。到了发行方迁移阶段，同一套台账还能变成切换控制室，对比新旧两套栈，直到余额和赎回权顺利对齐。
goToMarketSeed:
  firstCustomer: 首个客户应是美国稳定币钱包与结算 API 提供商的 COO 或数字资产运营负责人。这类公司服务平台型或 B2B 支付平台，拥有至少 500 个企业钱包，并且未来两个季度内就要把底层架构从银行加托管方，迁到由全国性信托银行支撑的发行方。
  buyingTrigger: 平台一旦签下发行方迁移或信托银行接入项目，审计师、企业客户或董事会通常会在上线前要求看到项目级储备和赎回证据。
  currentAlternative: 靠内部 SQL 和表格，在发行方控制台、钱包数据和月度鉴证报告之间做对账，再辅以零散的发行方支持工单。
  switchingReason: 这个切口把周期性 PDF 和一次性查询，换成每天都能生成、机器可读的权益记录，既降低上线风险，也让企业和审计审查更快过关。
  pricingHypothesis: 按活跃项目数和已对账的总账户钱包规模收年费；发行方映射和子账簿映射另收接入费用。
