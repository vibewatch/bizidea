  adoptionFrictionMatrix:
  - friction: 发行方或托管方数据可能只能拿到综合账户层或对账单层
    severity: 高
    affectedBuyer: 数字资产运营负责人
    mitigation: 先从对账单摄取和异常工作流做起，等证明需求上来，再逐步换到 API 和文件直连伙伴关系。
    sourceRefs:
    - 1
    - 12
    - 14
  - friction: 内外部账本会漂移，因为根本没有统一的权益模型
    severity: 高
    affectedBuyer: 财务系统负责人
    mitigation: 把每次铸造、销毁、出款和客户余额状态变化，都映射进一层不可变对账层，并配上明确的未决项队列。
    sourceRefs:
    - 7
    - 32
    - 34
  - friction: 审计师和交易对手要的不只是储备快照，他们要的是控制证据
    severity: 高
    affectedBuyer: COO 或 CFO
    mitigation: 从第一天起就让输出对齐稳定币控制标准、储备与赎回政策，以及可机读的证据包。
    sourceRefs:
    - 6
    - 17
    - 35
  - friction: 银行和合规伙伴会在批准上线前深挖第三方工作流
    severity: 中
    affectedBuyer: 合规或审计负责人
    mitigation: 用伙伴可直接审阅的审计轨迹、标准化工单和成文政策，让创业公司强化而不是拖累供应商监督。
