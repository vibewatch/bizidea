categoryDynamics:
  growthRate: 2025 年稳定币市值增长约 50%。
  growthRateSourceRefs:
  - 4
  tailwinds:
  - point: 联邦和州框架让稳定币更容易被机构理解，也就把控制和报告软件的预算放大了。
    sourceRefs:
    - 1
    - 4
    - 6
  - point: 托管式栈让 PSP 和银行不用自己扛起全部数字资产基础设施，也能采用稳定币结算。
    sourceRefs:
    - 12
    - 13
    - 14
  - point: 更快结算、流动性收益和跨境用例，正在把稳定币推入资金管理和支付基础设施讨论。
    sourceRefs:
    - 5
    - 18
    - 19
  headwinds:
  - point: 更长、也更垂直整合的中介链条，恰恰会在买方最需要可审计证明的地方削弱透明度。
    sourceRefs:
    - 4
    - 9
  - point: 储备、赎回、AML 和第三方留痕义务，让接入和证据设计比典型 SaaS 部署慢得多。
    sourceRefs:
    - 7
    - 8
    - 10
    - 11
    - 22
    - 27
    - 35
competitors:
- name: Fireblocks
  stage: 成熟厂商
  wedge: 数字资产运营的钱包、资金与策略控制
  pricing: $999/mo 入门版；企业版定制
  strength: 治理控制、交易策略，以及钱包/托管连接能力都很强。
  weaknessVsUs: 它从资产流转和策略出发，不是从跨发行方记录的客户到储备权益证明出发。
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
- name: zerohash
  stage: 扩张期
  wedge: 嵌入式稳定币出款、结算与 API 基础设施
  pricing: 未公开（需联系销售或完成开通）
  strength: 在金融科技、券商、银行和支付公司里有很强的嵌入式金融分发能力。
  weaknessVsUs: 优先解决执行通道，不是跨多个发行方和平台子账簿的中立银行级证明层。
  sourceRefs:
  - 24
  - 25
- name: BVNK
  stage: 扩张期
  wedge: 面向企业的稳定币原生全球支付与钱包
  pricing: 未公开（销售驱动）
  strength: 企业级通道偏合规优先，且具备多国家分发能力。
  weaknessVsUs: 它优化的是资金流转和企业接入，不是按项目重建储备覆盖或赎回异常。
  sourceRefs:
  - 26
  - 27
- name: Bitwave
  stage: 扩张期
  wedge: 数字资产会计、支付与审计就绪报告
  pricing: 定制定价
  strength: 更贴近财务负责人和审计师的话语体系，也能处理高吞吐交易跟踪。
  weaknessVsUs: 核心仍偏后交易和财务报告，不是带发行方侧证明的实时权益层。
  sourceRefs:
  - 28
  - 29
- name: Cryptio
  stage: 扩张期
  wedge: 数字资产 ERP、对账与审计就绪报告
  pricing: 未公开（需预约演示）
  strength: 在把链上活动与内部系统对账这件事上，姿态很强。
  weaknessVsUs: 看不出来它掌握了发行方储备映射、赎回队列或迁移切换控制。
  sourceRefs:
  - 30
regulatoryTechnicalConstraints:
- point: 储备和托管数据可能仍由发行方或托管方控制，限制了每日证明的颗粒度和时效。
  sourceRefs:
  - 1
  - 17
  - 12
- point: 稳定币发行方越来越需要及时的赎回权、隔离储备和代币操作控制，因此下游系统必须保留可审计映射，而不能只记简单交易日志。
  sourceRefs:
  - 6
  - 9
  - 35
- point: 第三方金融安排如今面临明确的每日对账和持续记录访问要求，这把数据留存和异常工作流的门槛又抬高了一档。
  sourceRefs:
  - 7
  - 8
  - 32
  - 33
validationSignals:
- point: Circle 正在积极向 PSP、金融科技、银行和平台销售托管式稳定币结算，服务那些不想自己管理数字资产的客户。
  sourceRefs:
  - 12
  - 13
  - 14
- point: Fireblocks 称，受访机构里近一半已经在用稳定币，另有 41% 正在试点或规划，这说明基础设施预算是真实存在的。
  sourceRefs:
  - 19
- point: Synctera 把 FBO 与合作方的日度对账、未决项复核和人工干预写得非常具体，几乎就是这家创业公司要吃掉的痛点。
  sourceRefs:
  - 32
- point: AICPA 风格的控制思路，正把稳定币鉴证从时点储备快照，推向持续性的代币操作控制。
  sourceRefs:
  - 35
openQuestions:
- Circle National Trust 会向下游平台开放按项目划分的 API，还是只给综合账户级对账单和鉴证式输出？
