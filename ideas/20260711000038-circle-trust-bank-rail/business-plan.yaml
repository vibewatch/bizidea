slug: trust-bank-entitlement-ledger
date: '2026-07-11'
executiveSummary: >-
  Stablecoin infrastructure is becoming a controls and evidence problem for the
  platforms that sit above regulated issuers, not just a custody or payments
  problem for the issuers themselves. The first customer is a U.S. embedded
  stablecoin wallet or settlement platform with 500+ business wallets, an
  omnibus issuer relationship, and a live migration to a trust-bank-backed
  issuer or managed-payments stack in the next two quarters. The product should
  start as a read-only entitlement ledger that reconciles customer balances,
  mint and burn events, redemption queues, and issuer or custodian positions
  into a daily proof of reserve coverage and exception log. The coherent buying
  trigger is a go-live, audit, or enterprise diligence review that requires
  program-level reserve and redemption evidence before launch. Research suggests
  an estimated $125M TAM, $22M SAM, and $3M year-3 SOM, which is investable
  only if early customers expand across multiple programs, issuers, and
  migration workflows rather than buying a one-off reporting project.
  Competition will come from issuer rails, wallet-control vendors, crypto
  accounting tools, and internal SQL or spreadsheet workflows, so the company
  must stay neutral and win on entitlement depth, audit acceptance, and
  migration control rather than execution. The deliberate sequencing is
  statement and API ingestion plus evidence packs first, multi-program and
  cutover workflows second, and Europe or adjacent compliance modules only
  after the U.S. beachhead converts into production. The biggest disconfirming
  risks are that trust-bank-backed migrations stay too rare or that issuers
  expose good-enough reporting before buyers fund a standalone control layer.
problem:
  - Embedded stablecoin platforms still have to prove that each customer or program balance and pending redemption maps correctly into a regulated issuer's omnibus reserve and custody stack.
  - Internal SQL, spreadsheets, issuer dashboards, and periodic attestation PDFs are too brittle for trust-bank onboarding, enterprise diligence, audit review, and issuer migration cutovers.
solution:
  - Ingest the platform's subledger, wallet or custody data, mint and burn events, redemption queues, and issuer or custodian records into a read-only entitlement ledger that shows daily reserve coverage, redemption exposure, and breaks.
  - Generate exception workflows, machine-readable evidence, and migration cutover views so operators, auditors, enterprise customers, and bank partners can inspect the same control record before and after go-live.
whyWeWin:
  - Issuers and payment rails can show their own balances, but they do not reconstruct the downstream platform's customer-level entitlement model or redemption queue across multiple programs.
  - Generic ledger and crypto-accounting tools help after the fact, while this product is designed around live reserve proof, break resolution, and issuer migration control.
  - Each deployment compounds issuer-specific mappings, exception histories, and evidence-pack templates that become harder for a single bundled vendor to replicate across ecosystems.
strategicChoices:
  beachhead: U.S.-based embedded stablecoin wallet and settlement platforms serving business customers through omnibus issuer relationships, with a live trust-bank or managed-payments onboarding project and immediate pressure to prove reserve coverage before go-live.
  wedgeRationale: This beachhead has a clear budget owner, a narrow workflow, and a measurable deadline because migration and diligence projects already require teams to gather the same ledger, redemption, and issuer data that the product organizes into daily proof.
  sequencingRationale: Start with read-only reconciliation and evidence generation because buyers will trust a system that explains balances before they trust one that automates workflows; only after pilot conversions should the company deepen API coverage, add multi-program cutover tools, and expand into new jurisdictions or adjacent control modules.
  notYet:
    - Stablecoin execution, custody, issuance, or principal liquidity functions
    - Broad crypto accounting replacement outside reserve, redemption, and migration control
    - Europe-first MiCA expansion before the U.S. trust-bank playbook is repeatable
market:
  tam: Estimated $125M TAM based on roughly 500 global target operators at about $250k annual contract value.
  sam: Estimated $22M SAM based on about 110 U.S. and EU operators likely to face trust-bank or MiCA-grade reserve and redemption proof requirements soon at about $200k ACV.
  som: Estimated $3M year-3 SOM based on 12 reachable logos at about $250k ACV through a design-partner-heavy enterprise motion.
  segments:
    - U.S. embedded stablecoin wallet and settlement platforms with omnibus issuer accounts
    - PSP, treasury, and marketplace fintechs adopting managed stablecoin settlement through regulated issuers
  buyingProcess: >-
    The sale usually starts when a migration, managed-payments rollout, or
    enterprise diligence request exposes missing reserve and redemption
    evidence. Operations and finance systems teams map the workflow first, then
    compliance and audit stakeholders define required outputs before the COO or
    CFO approves a paid pilot.
product:
  mvp: >-
    MVP is a read-only entitlement workspace for one legal entity, one
    platform subledger, one wallet or custody stack, and one issuer feed or
    statement path. It produces daily coverage reports, break queues,
    redemption exposure views, and downloadable evidence packs without taking
    custody or execution risk.
  sixMonth: Ship a design-partner product with file- and API-based ingestion for one platform ledger, one wallet or custody provider, and one issuer data source, plus daily reconciliation, exception management, and evidence-pack export.
  twelveMonth: Add multi-program support, migration cutover comparison, standardized audit and enterprise diligence templates, and production controls for the first 2 to 3 paying customers.
  twentyFourMonth: Expand into a multi-issuer operating ledger with reusable mappings, benchmark exception analytics, and the first repeatable playbook for MiCA-grade or additional jurisdictional deployments after U.S. proof.
  keyBets:
    - Buyers will pay for launch-readiness and ongoing proof software before they buy broader stablecoin workflow automation.
    - Statement or flat-file ingestion plus one core issuer or wallet integration is enough to show ROI before perfect API coverage exists.
    - Auditors and enterprise customers will accept a neutral entitlement evidence pack if lineage, breaks, and redemption states are explicit.
    - Migration cutover and multi-issuer reporting stay differentiated even if issuers ship better native dashboards.
gtm:
  wedge: Sell a paid issuer-migration readiness pilot that reconciles one stablecoin program to one trust-bank-backed issuer or managed-payments stack and produces daily reserve and redemption proof before go-live.
  channels:
    - Direct founder-led outbound to COOs, CFOs, and digital asset operations leads running live issuer migration or managed-payments onboarding projects
    - Co-sell with issuers, payment rails, wallet-policy vendors, and custodians that need a neutral evidence layer to win larger regulated customers
    - Referral-led sales through crypto-accounting, audit, and assurance partners already diagnosing reconciliation and diligence pain
  funnelTargets: "target account→qualified migration review 25%+, qualified review→paid pilot 20%+, paid pilot→production 60%+, production logo→second program or issuer expansion 40%+ within 12 months"
  pricing: Annual enterprise subscription priced by active stablecoin program and reconciled omnibus wallet footprint, plus onboarding fees for issuer and subledger mapping. The landing motion is a $60k-$100k paid pilot tied to one migration or onboarding project, converting to roughly $180k-$250k ARR once daily proof and exception workflows are live in production.
businessModel:
  revenueStreams:
    - Annual enterprise subscription for entitlement proof, exception workflows, and evidence delivery
    - Onboarding and integration fees for issuer, wallet, custody, and subledger mapping
    - Expansion fees for additional programs, legal entities, and multi-issuer cutover modules
    - Premium API and reporting modules for auditors, enterprise customers, and bank partners
  unitOfValue: One active stablecoin program and its reconciled omnibus wallet footprint under daily entitlement proof
  targetGrossMarginPct: 70
  expansionLevers:
    - Add second and third programs inside the same customer
    - Add additional issuer, custodian, or wallet integrations while keeping one entitlement model
    - Sell migration cutover and partner-facing reporting modules once the first program is live
    - Expand from U.S. trust-bank workflows into MiCA-grade deployments only after the core mapping engine is proven
strategyMap:
  northStarMetric: Monthly dollar value of customer balances and redemption exposures reconciled to issuer reserve or custody records within 24 hours
  inputMetrics:
    - Paid pilots signed on live issuer migration or managed-payments onboarding projects
    - Percentage of daily entitlement breaks resolved within SLA
    - Hours required to produce an auditor or enterprise evidence pack
    - Pilot-to-production conversion rate
    - Expansion from first program to second program or issuer
  moatsToBuild:
    - Issuer- and program-specific mapping templates between customer subledgers, mint and burn events, and issuer reserve records
    - Exception-history dataset covering stale feeds, unmatched burns, unsettled payouts, and redemption-state failures
    - Reusable evidence-pack and diligence templates accepted by auditors, enterprise customers, and bank partners
    - Migration cutover playbooks that compare old and new issuer stacks with the same entitlement model
  killCriteria:
    - Fewer than 10 of the first 20 target-customer interviews confirm a funded migration, onboarding, or audit-readiness project in the next 12 months.
    - Fewer than 2 paid pilots sign within 9 months of focused selling, or no pilot reaches a written production conversion plan within 6 months of deployment.
    - No pilot cuts evidence-pack preparation time by at least 50% or unresolved entitlement breaks by at least 30% within 90 days.
  mermaid: |
    flowchart LR
      Wedge[Issuer-migration pilot] --> MVP[Read-only entitlement ledger]
      MVP --> Proof[Daily reserve and redemption proof]
      Proof --> Expansion[Multi-issuer control platform]
investorMemo:
  verdict:
    call: Watch
    conviction: Clear workflow pain and a coherent wedge exist, but conviction is capped by a small near-term market and high bundling or data-access risk.
    whyBelieve: Trust-bank onboarding and enterprise diligence create a finance-owned proof problem that issuer rails, wallet controls, and accounting tools do not solve end to end.
    whyDoubt: The category may stay too narrow if Circle-like trust-bank adoption is slow or issuers add good-enough reporting before operators fund a neutral control layer.
    nextDiligence: Confirm with 5 to 10 live migration projects that teams will pay six-figure annual budgets for daily entitlement proof beyond issuer dashboards and internal SQL.
  firstCustomer:
    title: COO or digital asset operations lead at an embedded stablecoin settlement platform
    profile: A U.S. fintech or PSP-facing stablecoin API platform with 500+ business wallets, an omnibus issuer relationship, and a signed migration to a trust-bank-backed issuer or managed-payments stack inside two quarters.
    trigger: An issuer migration, trust-bank onboarding, or enterprise diligence review requires program-level reserve and redemption evidence before go-live.
    buyer: COO or CFO
    initialContract: $60k-$100k paid pilot for one legal entity, one stablecoin program, and one issuer migration or onboarding workflow, converting to roughly $180k-$250k ARR after daily proof and exception management become part of production operations.
  mustBeTrue:
    - A meaningful share of U.S. omnibus stablecoin platforms face funded migration or audit-readiness work in the next 12 months.
    - Buyers need program-level reserve and redemption proof beyond issuer attestations, partner consoles, and internal SQL.
    - One platform ledger plus one issuer feed and one wallet or custody feed can deliver ROI in under 90 days.
    - Auditors and enterprise customers will accept a neutral entitlement report if data lineage and exception handling are explicit.
    - Early customers will expand to additional programs, issuers, or migration modules, supporting $200k+ ACV without turning the business into custom services.
  diligenceQuestions:
    - Which exact daily files, APIs, and statement formats do Circle-, Paxos-, or similar issuer stacks expose to downstream platforms today?
    - How many target platforms already have a named budget owner, go-live date, and auditor-driven proof requirement?
    - What evidence artifacts do auditors, enterprise customers, and bank partners actually request before approving a launch or migration?
    - How often do issuer migrations slip because reserve and redemption proof is missing or disputed?
    - In real buying processes, does the platform compare this product against internal SQL, issuer dashboards, Fireblocks-class controls, or crypto-accounting tools?
operatingAssumptions:
  - assumption: Trust-bank onboarding and issuer migration projects create a distinct budget for reserve and redemption proof software.
    basis: research.yaml
    validationTest: Interview 20 target U.S. platforms and confirm at least 10 can name a budget owner, go-live timeline, and pilot scope tied to migration, onboarding, or diligence.
    decisionImpact: If false, the company should shift toward partner-embedded distribution or audit-preparation services instead of a standalone SaaS sale.
  - assumption: One platform subledger export plus one issuer feed and one wallet or custody feed cover enough of the workflow to show value in the first deployment.
    basis: research.yaml
    validationTest: Collect three anonymized data packs from live or near-live integrations and confirm the MVP reconstructs at least 90% of required entitlement and redemption fields.
    decisionImpact: If false, the roadmap becomes more integration-heavy, the beachhead must narrow to standardized stacks, and seed capital needs rise.
  - assumption: Auditors and enterprise customers will accept a platform-generated entitlement report if lineage, exceptions, and redemption states are explicit.
    basis: research.yaml
    validationTest: Redline a draft daily entitlement report with two auditors and three enterprise customers and require no blocker that forces issuer-native signed APIs on day one.
    decisionImpact: If false, the company must partner more tightly with assurance firms or reposition as a preparation layer rather than the primary proof system.
  - assumption: Paid pilots can convert into $180k-$250k annual production contracts when tied to launch risk and audit readiness.
    basis: research.yaml
    validationTest: Run five pricing conversations and secure two paid pilots with written conversion criteria at the proposed annual price band.
    decisionImpact: If false, TAM and SOM compress materially and the hiring or fundraising plan should reset to a smaller business.
  - assumption: Expansion from one program into multi-issuer or migration-control modules will happen inside the first year of a customer logo.
    basis: idea.yaml
    validationTest: Track the first three production customers and require at least two to scope a second program, second issuer, or cutover module within 12 months.
    decisionImpact: If false, the company behaves more like consulting plus reporting software and may not justify venture-scale economics.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 20 target operators plus 5 auditors or assurance partners involved in live stablecoin migrations and managed-payments rollouts.
    hypothesis: The strongest buying trigger is a go-live, migration, or diligence deadline rather than generic interest in stablecoins.
    successMetric: At least 10 target platforms confirm a funded project in 12 months and identify the same 3 to 5 gating evidence artifacts.
    owner: CEO / founder-sales
  - horizon: 0–90 days
    experiment: Build a read-only entitlement prototype from three anonymized platform, wallet, and issuer data packs.
    hypothesis: Statement or file-based ingestion is enough to show daily reserve coverage and break detection before full API access exists.
    successMetric: Two prospects agree the prototype is strong enough to scope a paid pilot and the model covers at least 90% of required fields.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run two paid pilots tied to live issuer migration or managed-payments onboarding projects.
    hypothesis: Daily entitlement proof reduces launch blockers enough to justify conversion into annual software.
    successMetric: Two paid pilots sign and at least one reaches a written production conversion plan within 6 months.
    owner: CEO / founder-sales
  - horizon: 90–180 days
    experiment: Review the evidence pack with auditors, one bank or compliance partner, and enterprise counterparties.
    hypothesis: A neutral evidence layer will be accepted if lineage, exception logs, and redemption states are explicit and machine-readable.
    successMetric: Four of five reviewers report no blocker objections and one audit or assurance firm agrees to refer customers.
    owner: Product and controls lead
  - horizon: 180–360 days
    experiment: Ship multi-program exception SLAs and migration cutover views into the first production customer.
    hypothesis: Migration control-room workflow is a durable differentiator versus issuer dashboards and generic reconciliation tools.
    successMetric: The second deployment inside the same logo is at least 30% faster and unresolved entitlement breaks drop by at least 30%.
    owner: Solutions engineer
  - horizon: 180–540 days
    experiment: Expand the strongest production logo to a second program or issuer and formalize one co-sell motion with an issuer, rail, or accounting partner.
    hypothesis: Expansion inside a logo and partner-sourced pipeline prove this is a platform business rather than a one-off implementation project.
    successMetric: One customer expands ARR by at least 1.5x and partners generate at least three qualified opportunities.
    owner: CEO / founder-sales
operations:
  - Run a daily entitlement close that reconciles customer balances, mint and burn events, redemption queues, and issuer reserve or custody positions into one exception queue.
  - Maintain evidence retention, data-lineage logs, and case workflows that auditors, bank partners, and enterprise customers can inspect without custom SQL pulls.
  - Manage file and API delivery, exception escalation, and cutover playbooks with issuers, custodians, wallet providers, and accounting or assurance partners.
  - Keep custody, issuance, transaction monitoring, and money movement with regulated partners while owning only the entitlement model, break-resolution logic, and proof layer.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the entitlement engine, mapping system, and first issuer, wallet, and subledger connectors that define the product.
  - role: CEO / founder-sales
    startTiming: Month 0
    rationale: Early revenue depends on founder-led selling into a concentrated buyer set and on forming issuer, audit, and rail partnerships.
  - role: Product and controls lead
    startTiming: Month 1
    rationale: Converts reserve, redemption, and audit obligations into deployable evidence workflows and keeps scope disciplined around the beachhead.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Productizes onboarding, shortens mapping work, and turns migration projects into reusable deployment patterns.
  - role: Partnerships and account executive
    startTiming: Month 12
    rationale: Added only after paid pilots convert, so partner-sourced pipeline and repeatable new-logo selling can scale without bloating services work.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 design partners running live issuer migration or managed-payments onboarding projects.
      - Ship MVP covering one platform subledger pattern, one wallet or custody integration, one issuer feed or statement path, and daily evidence-pack generation.
      - Convert 2 paid pilots into production contracts.
      - Establish one active audit or accounting referral channel and one issuer or rail data-sharing partnership.
  - horizon: 12–24 months
    items:
      - Reach 6 to 8 production customers and at least 3 logos expanded to a second program or issuer.
      - Standardize mapping templates so the second deployment is at least 30% faster than the first.
      - Launch multi-issuer cutover workspace and partner-facing API for evidence delivery.
      - Add one repeatable co-sell motion with an issuer, wallet-policy vendor, or crypto-accounting partner.
  - horizon: 24–36 months
    items:
      - Reach 10 to 12 production logos, consistent with the researched year-3 SOM.
      - Support the first MiCA-grade or additional jurisdiction deployment only after the U.S. playbook is repeatable.
      - Publish benchmark data on exception rates, evidence turnaround, and migration blockers across issuer stacks.
      - Prove the company can sit above multiple issuer and custody partners as the neutral stablecoin operating ledger.
risks:
  - risk: Trust-bank-backed issuer adoption may stay too concentrated or too slow, leaving too few near-term migration projects for a standalone category.
    likelihood: High
    impact: High
    mitigation: Focus only on teams already in issuer selection, onboarding, or managed-payments rollout and support adjacent sponsor-bank or state-trust stacks that share the same entitlement problem.
  - risk: Issuers and custodians may expose only omnibus or statement-level data, limiting proof fidelity and slowing deployments.
    likelihood: High
    impact: High
    mitigation: Launch with statement ingestion and explicit open-item workflows first, then win richer file and API partnerships where customer diligence pressure is strongest.
  - risk: Issuers, wallet-control vendors, or crypto-accounting tools may bundle good-enough reporting before the startup proves a separate budget.
    likelihood: High
    impact: High
    mitigation: Stay issuer-neutral and own the harder workflows of customer-to-reserve entitlement mapping, multi-issuer cutover, and auditor-facing exception evidence.
  - risk: Platform-specific subledger mappings may make the business too services-heavy and slow down gross-margin expansion.
    likelihood: Medium
    impact: High
    mitigation: Standardize around one platform pattern, one issuer pattern, and one wallet family first, then turn recurring mappings into reusable templates before scaling sales headcount.
  - risk: Auditors or enterprise customers may reject a platform-generated proof layer unless it comes with stronger assurance or issuer-native attestations.
    likelihood: Medium
    impact: Medium
    mitigation: Co-design outputs with audit and assurance partners, preserve deterministic lineage, and position the product as the preparation and monitoring layer even when third-party assurance remains required.
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: 18 months funds a 4 to 5 person team, first issuer, wallet, and subledger connectors, 3 to 5 paid design partners, one audit referral channel, one issuer or rail co-sell channel, and enough pilot-to-production evidence to know whether trust-bank entitlement proof can stand alone as software.
