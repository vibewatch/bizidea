    upsideCase: "Delay one non-critical support hire until after 15 live projects"
    y3RevenueImpactK: -90.00
    cashImpactK: -180.00
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      FounderLedSelling --> PaidPilots
      PaidPilots --> LiveProjects
      LiveProjects --> SubscriptionRevenue
      TurnoverModule --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
  - checkName: "Revenue engine"
    finding: "The base case is driven by active project count rising from 11 at Q4Y2 to 25 at Q4Y3 while ACV converges to the researched $200K level."
  - checkName: "Must go right"
    finding: "The team must keep pilot-to-production cycles near six months and make the read-only ProjectWise onboarding playbook repeatable before scaling GTM hiring."
  - checkName: "Model breaks if"
    finding: "If sales cycles stretch and gross margin stalls near 68%, downside cash turns negative before the company earns a clean seed story."
  - checkName: "Next-round proof"
    finding: "A credible seed raise is exiting Y2 with 11 live projects, one validated channel motion, and evidence that the first account can expand beyond its flagship project."
sanityChecks:
  ruleOf40: "Y3 growth 203.03% + EBITDA margin 6.75% = 209.78%"
  burnMultiple: "Y2 burn multiple 0.51x, improving to cash-generative -0.07x in Y3 on net new ARR."
  revenuePerFte: "$318K Y3 on 11 exit FTE (benchmark $200-400K SaaS)"
  flags:
    - "The base case ends exactly at the BP and research year-three SOM of 25 live projects, so any channel underperformance would push revenue below plan."
    - "Gross margin does not clear the BP target until Y3 because taxonomy mapping, approvals, and handover normalization are still partially human-assisted through early deployments."
    - "CAC and churn remain heuristic until the company observes real renewals and second-project expansion behavior on live contractor accounts."
    - "Base-case cash bottoms near $383K in Q1Y3, so management should begin seed preparation before full-year profitability is visible."
