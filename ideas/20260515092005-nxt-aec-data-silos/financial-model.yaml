    y3RevenueImpactK: -350.00
    cashImpactK: -255.00
  - variable: "CAC"
    downsideCase: "$65K CAC if every deal needs bespoke executive selling and partner motion underperforms"
    baseCase: "$50.3K CAC"
    upsideCase: "$40K CAC with stronger ecosystem referrals and repeatable case studies"
    y3RevenueImpactK: -80.00
