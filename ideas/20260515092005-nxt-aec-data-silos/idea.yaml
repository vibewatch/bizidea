jobsToBeDone:
  - job: >-
      When a major design revision lands before field execution, help the project controls team identify every impacted
      work package and issue one current release, so crews do not build from stale documents.
    currentAlternative: Spreadsheet transmittal logs, PDF comparison, and manual coordination across ProjectWise, email, and field software
    successMetric: Reduction in stale-package incidents and days from revision approval to field release
  - job: >-
      When owner turnover milestones approach, help the digital delivery lead assemble complete asset records from active
      project workflows, so the contractor can hand over faster without a manual document chase.
    currentAlternative: BIM coordinators and commissioning teams manually rebuilding turnover binders from folders and emails
    successMetric: Days saved on turnover package assembly and percentage of asset records accepted on first submission
ideaScorecard:
  signalStrength:
    score: 4
    rationale: The accelerator is a credible market signal because it combines funding, platform sponsorship, and explicit workflow pain, even if it is not yet startup-outcome proof.
  painIntensity:
    score: 4
    rationale: Bad release control drives rework, schedule slips, claims exposure, and painful owner handover effort on very large projects.
  wedgeClarity:
    score: 5
    rationale: Issued-for-construction release management on Bentley-centered megaprojects is a narrow workflow with a visible owner and measurable ROI.
  defensibility:
    score: 4
    rationale: A cross-system release graph and the resulting impact and handover dataset can compound into durable workflow lock-in, though incumbents may try to bundle adjacent features.
  ventureScale:
    score: 5
    rationale: The beachhead can expand from release packages into turnover, claims, commissioning, procurement impact, and portfolio-wide capital project governance.
topRisks:
  - name: Workflow inertia
    description: Project teams may tolerate painful manual release processes rather than introducing a new system into active megaprojects.
    mitigation: Start as an overlay on exported metadata and high-value release checkpoints, then prove fewer stale packages on one flagship project before deeper rollout.
  - name: Incumbent pushback
    description: Common data environment vendors could market adjacent release features once buyers validate the problem.
    mitigation: Focus on cross-system impact tracing and handover outcomes that file-centric incumbents cannot easily deliver across mixed stacks.
  - name: Messy project data
    description: Inconsistent naming, metadata gaps, and weak document discipline can make automated impact mapping unreliable on the first deployment.
    mitigation: Package implementation with taxonomy normalization, confidence flags, and human approval gates until each customer's data hygiene improves.
