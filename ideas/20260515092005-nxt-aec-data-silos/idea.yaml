problem: >-
  Design-build infrastructure contractors still manage project releases through a patchwork of ProjectWise folders, PDFs,
  RFIs, submittals, schedule exports, and field apps that do not agree on what changed or what is safe to build. When a
  design revision lands, teams manually determine which drawing package, work package, procurement item, and
  commissioning checklist it affects, so crews keep building from stale information and owners receive incomplete turnover
  data. Common data environments store files, but they rarely act as a release-control system spanning design, field
  execution, and asset handover.
targetUser:
  primary: Director of digital delivery or VDC at a mid-market design-build civil contractor running Bentley-centered workflows on rail, airport, water, or highway projects
  secondary: Project controls managers and field engineers responsible for drawing releases, RFIs, submittals, and turnover packages
  buyer: COO or VP of operations at an infrastructure contractor standardizing digital delivery across multiple active projects
startupThesis:
  nonObviousInsight: >-
    The next breakout AEC company will not win by creating another model authoring surface. It will win by becoming the
    release graph that decides which model revision, document, field instruction, and asset record is current enough to
    build against and complete enough to hand over. What changed is that Bentley and ecosystem players are now explicitly
    backing startups that sit above both open and proprietary systems, while cloud and AI workflows make cross-system
    change detection and packaging practical for the first time.
  beachhead: >-
    Design-build rail, airport, and water contractors managing weekly issued-for-construction package releases and owner
    turnover across Bentley ProjectWise, schedule tools, and field execution systems on $250M-$1B projects
  wedge: >-
    A release-control layer that ingests model revisions, RFIs, submittals, and schedule changes, then auto-generates
    field-ready work packages and turnover-ready asset dossiers with clear impact traces
  whyNowCatalyst: >-
    The NXT Activate launch shows there is now capital, integration access, and buyer pull specifically for startups that
    solve AEC data-silo pain across design through operation rather than inside one authoring tool.
  ventureScalePath: >-
    Start with issued-for-construction release management, expand into commissioning, claims defense, procurement impact,
    digital handover, and eventually the system of record for capital-project change governance from bid through asset
    operations.
solution: >-
  The product connects to Bentley-centered document repositories, model metadata, schedule feeds, and field systems to
  build an asset-and-work-package graph for each active project. When a revision, RFI answer, or submittal approval lands,
  it identifies every impacted drawing set, installation package, procurement dependency, and turnover deliverable, then
  proposes the minimum updated release package that crews should receive. Superintendents and project controls teams get a
  release queue with explicit lineage showing what changed, why it matters, and which downstream tasks are blocked until
  the new package is acknowledged. At handover, the same graph assembles owner-ready asset dossiers instead of forcing
  teams to rebuild turnover packages from scattered folders. The first deployment can start from exported metadata and
  document feeds, so contractors do not need to rip out incumbent CDE or field software to adopt it.
goToMarketSeed:
  firstCustomer: >-
    An ENR 400 design-build contractor delivering a large rail, airport, or water project with Bentley ProjectWise in the
    design office, PDFs or SharePoint-heavy release workflows, and contractual owner turnover requirements tied to digital
    asset data
  buyingTrigger: >-
    A major design revision, owner audit, or milestone handover exposes that current drawing-release and turnover
    workflows cannot prove which package was current in the field or whether asset records are complete
  currentAlternative: >-
    ProjectWise or other common data environments, Procore-style field workflows, spreadsheet trackers, PDF transmittals,
    email chains, and internal BIM coordinators manually stitching release packages together
  switchingReason: >-
    The wedge sits above the incumbent stack and turns existing project data into a single current-state release package,
    cutting rework and handover labor without asking the contractor to replace core authoring or field systems
  pricingHypothesis: >-
    Annual enterprise subscription priced per active megaproject, with premium modules for turnover automation and
    cross-project release analytics
