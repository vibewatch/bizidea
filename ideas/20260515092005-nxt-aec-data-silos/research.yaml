competitors:
- name: Bentley ProjectWise
  stage: incumbent
  wedge: Infrastructure CDE and project-delivery backbone for engineering records, reviews, and workflow states.
  pricing: Custom enterprise / contact sales
  strength: Deep infrastructure footprint, strong document lineage, and native fit in Bentley-heavy owner and contractor environments.
  weaknessVsUs: Strong inside the repository, weaker as a neutral release-graph across external RFIs, schedules, field acknowledgements, and turnover deltas.
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
- name: Autodesk Forma / Construction Operations
  stage: incumbent
  wedge: Connected design, submittal, closeout, and owner workflows with growing AI automation.
  pricing: Bundle / enterprise quote
  strength: Broad connected-workflow story across owners, designers, closeout, and AI-assisted submittals.
  weaknessVsUs: Better positioned in Autodesk-led stacks than Bentley-centric heavy-civil release governance; still broad-platform first, not release-control first.
  sourceRefs:
  - 5
  - 6
  - 8
  - 40
- name: Procore
  stage: incumbent
  wedge: Field-office execution platform covering drawings, RFIs, submittals, analytics, and lifecycle governance.
  pricing: Platform contract with unlimited users; not per-seat
  strength: Massive adoption, strong field usage, and wide integration ecosystem across project participants.
  weaknessVsUs: Excellent execution layer, but not purpose-built to compute cross-system release readiness or owner handover completeness on Bentley-heavy civil programs.
  sourceRefs:
  - 11
  - 12
  - 14
  - 17
- name: Oracle Aconex
  stage: incumbent
  wedge: Design-build CDE with configurable processes, audit trail, work packaging, and handover.
  pricing: Custom enterprise quote
  strength: Serious design-build credibility, unalterable recordkeeping, and explicit handover/process-management modules.
  weaknessVsUs: Still a heavyweight CDE/process engine rather than a fast overlay that reasons over mixed incumbent systems and calculates the minimum release package.
  sourceRefs:
  - 18
  - 19
  - 20
  - 21
- name: Revizto
  stage: scale-up
  wedge: 2D/3D coordination, issue management, and clash resolution for complex projects.
  pricing: Enterprise quote
  strength: Loved by BIM teams for speed, collaboration, and location-aware issue tracking on complex jobs.
  weaknessVsUs: Stops short of release-control, schedule-aware work packaging, and turnover orchestration.
  sourceRefs:
  - 22
  - 23
