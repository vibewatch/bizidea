  validationPlan:
  - priority: high
    question: 'Which KPI moves first on a flagship project: stale-package incidents, approval-cycle time, or turnover hours?'
    evidenceToGather: Pull a 60-90 day baseline from one live project covering revision approvals, RFI/submittal latency, field-package reissues, and closeout labor.
  - priority: high
    question: Who actually controls budget for a release-control overlay—the contractor COO, the digital-delivery leader, or the owner?
    evidenceToGather: Run buyer interviews across one contractor, one owner, and one project-controls lead and map current software plus manual-process spend.
  - priority: medium
