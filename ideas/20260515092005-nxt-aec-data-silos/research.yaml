reportMemo:
  executiveTakeaways:
  - 'The market is real, but the unmet need is narrower than “AEC data management”: contractors already buy CDE, PM, and coordination tools, yet still lack a neutral release-control layer that decides what is current, impacted, and safe to build across mixed stacks.'
  - Buyer urgency is highest on large infrastructure projects where owner handover, auditability, and phased issued-for-construction releases collide with manual RFI, submittal, and revision stitching.
  - 'Why now is credible: open standards (IFC 4.3, IDS, BCF), owner digital-delivery mandates, and vendor-led AI workflow automation lower the cost of building an overlay that reasons across existing systems rather than replacing them.'
  - Competition is intense around adjacent layers—ProjectWise, Aconex, Autodesk, Procore, and Revizto all cover pieces of the workflow—but none clearly owns cross-system release impact plus turnover readiness on Bentley-heavy civil programs.
  marketDefinition: Workflow-orchestration software for large infrastructure design-build projects that sits above document repositories, model-coordination tools, and field PM suites to turn revisions into field-ready release packages and owner-ready handover records.
  customerAndBuyer: Primary operators are digital-delivery/VDC leaders and project-controls managers on rail, airport, bridge, port, and water programs. Economic buyers are COO, VP Operations, or owner-side capital-project leaders who bear rework, schedule, claims, and handover risk.
  buyingTriggers:
  - point: A major design revision or phased package issue makes stale drawings, unresolved RFIs, and missing submittals visible to the field.
    sourceRefs:
    - 9
    - 12
    - 13
    - 14
  - point: Owner handover or agency BIM requirements force the team to prove as-built completeness, asset metadata quality, and model/document lineage.
    sourceRefs:
    - 27
    - 29
    - 30
  - point: Claims, disputes, or schedule pressure make audit trails and faster correspondence turnarounds operationally urgent.
    sourceRefs:
    - 20
    - 21
    - 32
  willingnessToPay:
    summary: Willingness to pay is enterprise and project-driven rather than seat-driven. Buyers already fund custom-priced CDE and PM platforms because poor data, rework, and manual closeout are expensive; an overlay can win budget if it measurably cuts stale-package incidents, RFI/submittal cycle time, and handover labor on one flagship project.
    sourceRefs:
    - 9
    - 17
    - 20
    - 23
  competitiveLandscape: 'Incumbents split the workflow by system boundary: Bentley and Oracle dominate infrastructure CDE/audit-trail behavior, Autodesk and Procore connect broad design/field workflows, and Revizto owns a fast issue-coordination layer. The startup’s gap is not “store documents” or “track issues”; it is to compute the minimum current release package and turnover delta across all of them.'
  incumbentThesis:
  - incumbentClass: Common data environments
    point: CDEs like ProjectWise and Aconex enforce document states, versions, and audit trails, but they do not automatically decide cross-system field-release scope from revisions, RFIs, submittals, schedule shifts, and turnover requirements.
    sourceRefs:
    - 1
    - 2
    - 18
    - 21
  - incumbentClass: Broad project-management suites
    point: Platforms like Autodesk Forma and Procore connect many workflows, but they optimize generic collaboration and execution rather than a heavy-civil release graph centered on Bentley-era engineering records and owner handover obligations.
    sourceRefs:
    - 5
    - 6
    - 11
    - 15
    - 16
  - incumbentClass: Model coordination tools
    point: Revizto is strong at clash and issue resolution, but its center of gravity is coordination, not contractual release control and turnover packaging.
    sourceRefs:
    - 22
    - 23
  - incumbentClass: Owner FM / handover standards
    point: COBie, FAA handover requirements, and FM-handover standards define outputs and data structures, but they do not provide the operating layer that assembles them from live project changes.
    sourceRefs:
    - 27
    - 30
  regulatoryLandscape: The constraint set is more contractual than statutory. ISO 19650-style CDE governance, COBie/FM handover expectations, and public-owner BIM guides increasingly shape how information must be structured, versioned, and turned over. That favors products that can preserve lineage and automate compliance checks rather than ad hoc document chasing.
  technologyLandscape: 'The enabling stack is finally mature enough for an overlay product: IFC 4.3 expands infrastructure semantics, IDS adds machine-readable exchange requirements, BCF normalizes issue context, and major vendors are teaching buyers to expect AI-assisted submittal, issue, and closeout workflows. The hard part remains data hygiene and authoritative state management across mixed systems.'
  distributionChannels:
  - point: Bentley ecosystem access is unusually valuable because the wedge lands in ProjectWise-heavy accounts and the NXT/Bentley accelerator explicitly targets workflow and data-silo pain.
    sourceRefs:
