openQuestions:
- What is the real annual budget authority for a release-control overlay on a $250M-$1B infrastructure project after incumbent software spend is already committed?
- 'Which first workflow is the cleanest beachhead in practice: issued-for-construction package control, RFI/submittal impact tracing, or turnover package assembly?'
- How often do owner handover packages get rejected or reworked today in rail, airport, and water projects, and what specific fields or documents cause the churn?
- How much connector depth is required to deliver value in live ProjectWise-heavy projects before customers demand full write-back automation?
