    evidenceToGather: Test one project export for naming consistency, metadata completeness, revision discipline, and asset/work-package mapping confidence.
  - priority: medium
    question: Which handover artifacts create the highest rejection or resubmission burden today?
    evidenceToGather: Review recent owner comments, CMMS import requirements, COBie fields, and rejected as-built package causes.
