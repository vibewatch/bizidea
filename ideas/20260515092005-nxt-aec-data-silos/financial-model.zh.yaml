modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      FounderLedSelling[创始人主导销售] --> PaidPilots[付费试点]
      PaidPilots --> LiveProjects[上线项目]
      LiveProjects --> SubscriptionRevenue[订阅收入]
      TurnoverModule[移交模块] --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit[毛利润]
      GrossProfit --> OperatingCash[经营现金]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的核心驱动，是活跃项目数从 Q4Y2 的 11 个升到 Q4Y3 的 25 个，同时 ACV 收敛到调研锚点 $200K。
- checkName: 必须做对的事
  finding: 团队必须把试点转生产周期控制在约 6 个月，并在扩大 GTM 招聘前，把只读式 ProjectWise 上手 playbook 跑成可复制流程。
- checkName: 模型失灵条件
  finding: 如果销售周期拉长、毛利率又卡在约 68%，公司在讲出漂亮 seed 故事前，现金就会先转负。
- checkName: 下一轮融资证据
  finding: 一个可信的 seed 融资故事，应当是在 Y2 结束时做到 11 个上线项目、跑通 1 条有效渠道，并证明首个账户能从旗舰项目往外扩。
sanityChecks:
  ruleOf40: Y3 growth 203.03% + EBITDA margin 6.75% = 209.78%
  burnMultiple: Y2 burn multiple 0.51x, improving to cash-generative -0.07x in Y3 on net new ARR.
  revenuePerFte: $318K Y3 on 11 exit FTE (benchmark $200-400K SaaS)
  flags:
  - 基准情形在第 3 年正好打到 BP 和 research 里的 25 个上线项目 SOM，因此任何渠道失速都会把收入打到计划线下方。
  - 直到 Y3，毛利率才真正越过 BP 目标，因为前几次部署里的分类映射、审批和移交归一仍部分依赖人工。
  - 在公司观察到真实续费和第二项目扩张前，CAC 与流失率都只能算经验值。
  - 基准情形下现金低点约出现在 Q1Y3 的 $383K，因此管理层应在全年盈利真正出现前就启动 seed 准备。
