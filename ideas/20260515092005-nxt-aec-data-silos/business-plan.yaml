slug: aec-release-control-plane
date: '2026-05-15'
executiveSummary: >-
  AEC Release Control Plane should start as a release-governance overlay for
  design-build infrastructure contractors running Bentley-centered workflows on
  rail, airport, water, and highway projects. The immediate pain is not generic
  document storage; it is that design revisions, RFIs, submittals, schedule
  updates, and turnover requirements live in separate systems, so project teams
  cannot reliably tell crews which package is current or prove handover
  completeness to owners. The first product should compute the minimum updated
  field-ready work package and turnover delta from read-only exports and
  metadata feeds before asking customers to replace their CDE or field stack.
  The initial buyer is likely a COO or VP of Operations, with daily operators in
  digital delivery, VDC, and project controls, and the strongest buying trigger
  is a major revision, owner audit, or milestone handover that exposes stale
  package risk. Pricing should follow the active-project budget, with a paid
  pilot that converts into an annual per-megaproject subscription near the
  researched $200K ACV range if release speed and handover metrics move. The
  core strategic choice is to win issued-for-construction release control first,
  then expand into turnover, commissioning, and portfolio governance, rather
  than spreading into broad authoring, generic coordination, or SMB
  collaboration. The market signal is credible because owners, standards bodies,
  and vendors are pushing lifecycle digital delivery, but the company still
  needs proof on budget ownership, data quality, and whether cross-system impact
  mapping is reliable enough on live ProjectWise-heavy jobs. No direct customer
  count or observed pilot ROI is provided in the inputs, so the first 12 months
  should be treated as a validation phase rather than assumed repeatable scale.
problem:
  - Large design-build infrastructure projects still release work through PDFs, folders, transmittals, RFIs, and schedule exports that do not agree on what changed or what is safe to build, creating rework, claims, and stale-package risk.
  - Owner handover remains a manual document chase because asset records, approvals, and as-built lineage are scattered across CDE, field, and turnover systems instead of assembled from one governed release record.
solution:
  - Build a release-control overlay that ingests model revisions, RFIs, submittals, schedule changes, and field acknowledgements to compute the minimum current work package for each affected scope.
  - Use the same asset-and-work-package graph to assemble owner-ready turnover dossiers and readiness checks, so the first deployment improves both field execution and handover without rip-and-replace migration.
whyWeWin:
  - The company sits above mixed incumbent systems instead of competing as another repository, which matches the researched buyer expectation that startups work across open and proprietary stacks rather than replacing them.
  - If it captures revision impact, acknowledgement lag, and turnover completeness across projects, it can build a proprietary release graph and benchmark dataset that file-centric CDEs and generic AI copilots do not own today.
strategicChoices:
  beachhead: Design-build rail, airport, and water contractors running weekly issued-for-construction releases in Bentley ProjectWise-heavy environments with contractual owner handover requirements.
  wedgeRationale: This slice has visible stale-package and turnover pain on every major revision, a clear operating owner in digital delivery and project controls, and budget justification tied to rework, claims, and closeout labor, so proof should emerge faster than in broad building-construction collaboration.
  sequencingRationale: Start with read-only ingest, impact tracing, and approval-gated package generation on one flagship project; add deeper connectors and turnover automation only after the team proves it can map messy project data reliably and convert one-project wins into second-project expansion.
  notYet:
    - Full CDE or field-system replacement
    - Generic commercial building collaboration workflows
    - Procurement, claims, or commissioning modules sold before release-control adoption is proven
    - Owner-side portfolio software sold without contractor workflow proof
market:
  tam: "$1.2B estimated TAM based on roughly 6,000 large infrastructure projects or owner programs globally at about $200K annual ACV per active project."
  sam: "$180.0M estimated SAM based on roughly 900 beachhead projects in North America, the UK, and similar markets using Bentley-centered or similarly fragmented infrastructure workflows."
  som: "$5.0M estimated year-three SOM based on about 25 live projects at roughly $200K annual ACV if one-project land-and-expand and Bentley or owner distribution channels work."
  segments:
    - Mid-market and upper-mid-market design-build civil contractors on rail, airport, water, bridge, and highway programs
    - Owner-side capital delivery and turnover teams that need auditable digital handover across those same programs
  buyingProcess: >-
    The motion likely starts with a digital delivery, VDC, or project-controls
    sponsor when a major revision, audit, or handover event exposes manual
    release failure. The COO, VP Operations, or owner-side capital-project
    leader signs once a paid flagship-project pilot proves faster release cycles,
    fewer stale-package incidents, and more complete handover records without
    disrupting the incumbent stack.
product:
  mvp: >-
    MVP is a read-only, approval-gated release-control workflow for one live
    infrastructure project. It ingests ProjectWise and adjacent exports,
    correlates revisions, RFIs, submittals, schedule references, and turnover
    items, and produces an impact-traced release queue plus a handover
    completeness view that humans approve before distribution.
  sixMonth: Land 2-3 design partners, ship ProjectWise-centered ingest with manual approval gates, and prove one repeatable workflow for release impact tracing, acknowledgement logging, and turnover-readiness reporting on a flagship project.
  twelveMonth: Add the most common adjacent connectors in qualified deals, convert successful pilots into annual production contracts, and expand from release governance into owner handover automation on the same projects.
  twentyFourMonth: Become the release and handover control plane for capital projects by adding portfolio analytics, commissioning and claims-adjacent visibility, and cross-project benchmarks on revision impact, approval lag, and closeout completeness.
  keyBets:
    - Read-only exports and metadata feeds are sufficient to generate reliable release impact mapping before deep write-back integrations are required.
    - Buyers will fund a separate overlay if it measurably cuts stale-package incidents, revision-to-release cycle time, and handover labor on one flagship project.
    - Turnover automation is the first natural expansion module because it reuses the same release graph and raises the buyer value from contractor efficiency to owner acceptance.
gtm:
  wedge: Sell a flagship-project pilot that turns mixed-system revisions into one current issued-for-construction package and one auditable turnover delta, framed around reduced rework, faster release decisions, and cleaner owner handover rather than generic AI productivity.
  channels:
    - Direct founder-led sales to digital delivery leaders, project-controls leaders, and operations executives at design-build infrastructure contractors
    - Bentley ecosystem and NXT-style accelerator relationships that can open ProjectWise-heavy design-partner accounts
    - Project-controls, ISO 19650, and digital-delivery implementation partners who already map customer workflows and metadata
    - Owner-side digital-delivery sponsors on transport and airport programs that can pressure contractors to adopt structured release and handover practices
  funnelTargets: "Target intro→qualified discovery 30%+, discovery→paid pilot 20-30%, paid pilot→annual production 50%+, first project→second project expansion within 12 months in 40%+ of successful accounts."
  pricing: Annual subscription priced per active megaproject, anchored around the researched ~$200K ACV with a paid pilot and optional turnover module; this matches project-budget ownership, avoids seat-based pricing in mixed-contractor teams, and ties value to governed release events on a live project.
businessModel:
  revenueStreams:
    - Annual software subscription per active project under release governance
    - Paid implementation and taxonomy-mapping services for initial connector setup and workflow normalization
    - Premium modules for turnover automation, cross-project analytics, and portfolio governance
  unitOfValue: Active megaproject governed for release control and turnover readiness.
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one flagship project to additional projects inside the same contractor or owner account
    - Add turnover automation after release governance is live on the first project
    - Layer portfolio analytics and benchmarking once multi-project data accumulates
strategyMap:
  northStarMetric: Monthly percentage of governed release packages issued with complete impact trace, field acknowledgement, and turnover linkage.
  inputMetrics:
    - Days from approved revision to approved field release
    - Stale-package incidents per project month
    - Percentage of impacted work packages mapped with reviewer-approved confidence
    - Pilot-to-production conversion rate
    - Asset records accepted on first owner handover submission
  moatsToBuild:
    - Cross-system release graph linking revisions, documents, work packages, acknowledgements, and turnover artifacts
    - Infrastructure-specific workflow templates for ProjectWise-heavy rail, airport, and water projects
    - Benchmark dataset on revision impact, approval lag, rework causes, and handover rejection patterns across projects
  killCriteria:
    - Fewer than 3 paid flagship-project pilots signed within 12 months of focused beachhead selling
    - No pilot shows at least 20% faster revision-to-release cycle time or a measurable reduction in stale-package incidents within 90 days of go-live
    - Reviewer-approved impact mapping stays below 80% on real project data after implementation and taxonomy normalization
  mermaid: |
    flowchart LR
      Wedge[Infrastructure release control wedge] --> MVP[Read-only approval-gated MVP]
      MVP --> Proof[Release speed and handover proof points]
      Proof --> Expansion[Multi-project governance expansion]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Strong wedge clarity and credible market timing, but conviction depends on proving budget ownership and reliable cross-system mapping on one Bentley-heavy megaproject.
    whyBelieve: The company targets a real operating gap between repository tools, field systems, and handover standards in a buyer segment that already funds adjacent software and feels rework and closeout pain acutely.
    whyDoubt: Incumbent suites, manual coordinators, and implementation partners are entrenched substitutes, so the startup fails if deployment becomes too services-heavy or if impact logic is not trusted quickly.
    nextDiligence: Validate one paid flagship-project pilot that shows faster release decisions, fewer stale-package errors, and buyer willingness to expand into annual production on the same account.
  firstCustomer:
    title: Director of Digital Delivery at an ENR 400 design-build infrastructure contractor
    profile: A contractor running a $250M-$1B rail, airport, or water project with ProjectWise in the design office, spreadsheet or PDF-heavy release coordination, and owner-mandated digital handover obligations.
    trigger: A major design revision, owner audit, or upcoming handover milestone exposes that the current process cannot prove which package was current in the field or whether asset records are complete.
    buyer: COO or VP of Operations
    initialContract: "$75K-$150K paid pilot on one flagship project over 4-6 months, converting to roughly $150K-$250K annual per-project subscription if release-cycle and handover KPIs improve."
  mustBeTrue:
    - At least 5 target contractors confirm that issued-for-construction release control is a budget-worthy pain separate from generic CDE or field software spend.
    - One live ProjectWise-heavy project can provide enough exported data to map at least 80% of impacted work packages with reviewer-approved confidence.
    - A paid pilot can reduce revision-to-release cycle time by 20% or more without requiring the contractor to replace incumbent systems.
    - Owner handover teams value the same release graph enough to buy or expand into a turnover module after initial release-control proof.
    - ProjectWise, Aconex, Autodesk, Procore, and Revizto users still describe cross-system release-package computation as a manual workflow rather than a solved incumbent feature.
  diligenceQuestions:
    - Who controls budget first on a flagship project: contractor operations, digital delivery, project controls, or the owner?
    - What minimum connector depth is required to show value before buyers demand write-back into incumbent systems?
    - Which KPI actually unlocks production conversion: fewer stale packages, faster approval cycles, lower handover labor, or claims defensibility?
    - How messy is project metadata in the first 10 target accounts, and what implementation effort does normalization require?
    - How fast can Bentley, owner, or consultant channels produce qualified pilots compared with direct selling alone?
operatingAssumptions:
  - assumption: Buyers will fund a separate release-control overlay if it proves measurable release-speed and handover gains on one flagship project.
    basis: research.yaml
    validationTest: Close at least 3 paid pilots where the customer already licenses incumbent CDE and field software but still signs a separate contract with agreed KPI baselines.
    decisionImpact: If false, the company should reposition as a module or services-enabled add-on inside an incumbent ecosystem rather than a standalone product.
  - assumption: Read-only exports and metadata from ProjectWise and adjacent systems are enough for the first version to deliver trusted impact mapping.
    basis: idea.yaml
    validationTest: Run data audits on 3 design-partner projects and confirm at least 80% reviewer-approved mapping accuracy before deep integration work.
    decisionImpact: If false, the beachhead must narrow to cleaner data environments and implementation cost will rise materially.
  - assumption: Bentley ecosystem and owner digital-delivery channels can materially lower early customer acquisition cost after the first direct wins.
    basis: research.yaml
    validationTest: Generate at least 3 qualified pilot opportunities from one ecosystem or owner channel within 6 months of the first successful case study.
    decisionImpact: If false, maintain founder-led direct sales longer and slow channel-dependent hiring.
  - assumption: Turnover automation is the best second module because buyers already feel closeout pain and it reuses the same release graph.
    basis: research.yaml
    validationTest: In discovery and pilot reviews, get at least half of paid design partners to rank handover completeness among their top two expansion use cases.
    decisionImpact: If false, prioritize release-adjacent modules such as RFI or submittal impact tracing before turnover packaging.
  - assumption: The business can hold software-like gross margins once taxonomy mapping and onboarding playbooks are standardized.
    basis: operator judgment
    validationTest: By the fifth production deployment, reduce implementation hours per project by at least 30% from the first two pilots while maintaining customer outcomes.
    decisionImpact: If false, the company should price implementation more aggressively or accept a more services-led business model with lower venture appeal.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: Interview 15 digital-delivery, project-controls, and operations leaders at rail, airport, and water contractors.
    hypothesis: The sharpest buying trigger is a recent major revision, owner audit, or handover deadline that exposes stale-package and lineage risk.
    successMetric: 10 interviews confirm a named trigger, current workflow owner, and pilot success metric.
    owner: CEO
  - horizon: "0–90 days"
    experiment: Audit exported data from 3 ProjectWise-heavy projects and build a prototype release-impact graph.
    hypothesis: Read-only exports plus metadata are sufficient to map most package impact without write-back integrations.
    successMetric: 80%+ reviewer-approved impact mapping on historical changes across at least 2 projects.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Run 2 paid flagship-project pilots with approval-gated package generation and weekly KPI reviews.
    hypothesis: A flagship-project overlay can cut revision-to-release cycle time and reduce stale-package incidents within one quarter.
    successMetric: 2 signed paid pilots and at least 1 pilot shows 20%+ faster release cycles plus a measurable stale-package reduction.
    owner: CEO
  - horizon: "90–180 days"
    experiment: Test pilot packaging with release-control only versus release-control plus turnover-readiness reporting.
    hypothesis: Including handover readiness increases buyer urgency and production conversion without materially slowing deployment.
    successMetric: 3 of 5 qualified buyers prefer the bundled pilot or accept a clear expansion path into turnover automation.
    owner: Product lead
  - horizon: "6–12 months"
    experiment: Launch one Bentley or implementation-partner channel motion using the first pilot case study.
    hypothesis: Ecosystem credibility materially shortens trust-building in ProjectWise-heavy accounts.
    successMetric: One partner motion produces at least 3 qualified opportunities or 1 additional paid pilot.
    owner: GTM lead
  - horizon: "12–18 months"
    experiment: Pilot one owner-side handover deployment using the same release graph from an existing contractor account.
    hypothesis: Owner acceptance and turnover completeness create a stronger expansion story than field-release automation alone.
    successMetric: One live expansion module sold and first-submission asset acceptance rate improves versus the customer's prior baseline.
    owner: Solutions architect
operations:
  - Baseline each pilot on revision-to-release cycle time, stale-package incidents, handover hours, and first-submission acceptance before product rollout.
  - Standardize taxonomy normalization, confidence scoring, and human approval gates so messy project data does not create uncontrolled releases.
  - Keep the product read-only until customer trust, permissions, and audit requirements support deeper integration and workflow write-back.
  - Align implementation with ISO 19650-style container states, BCF or issue-linking patterns, and COBie or equivalent handover requirements where relevant.
  - Run weekly release-governance reviews with project-controls teams and monthly executive KPI reviews with the economic buyer.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the release graph, ingestion layer, and approval-gated workflow engine that define the wedge.
  - role: Product and domain lead
    startTiming: Month 0
    rationale: Translates digital-delivery, project-controls, and handover workflows into product rules, metrics, and prioritization.
  - role: Founder seller
    startTiming: Month 0
    rationale: Owns beachhead discovery, closes flagship-project pilots, and turns pilot KPI proof into repeatable account expansion.
  - role: Solutions architect
    startTiming: Month 3
    rationale: Reduces deployment time by codifying taxonomy mapping, standards alignment, and customer-specific connector requirements.
  - role: GTM lead
    startTiming: Month 9
    rationale: Added only after the first pilot proof exists, to scale direct sales and ecosystem partnerships without outrunning product readiness.
milestones:
  - horizon: "0–12 months"
    items:
      - Sign 3 paid flagship-project pilots in the defined rail, airport, and water beachhead
      - Prove 20%+ faster revision-to-release cycle time or measurable stale-package reduction in at least 2 pilots
      - Convert at least 1 pilot into an annual production contract
      - Establish one repeatable ProjectWise-centered onboarding playbook and one validated channel motion
  - horizon: "12–24 months"
    items:
      - Reach 8-12 live projects across initial contractor and owner accounts
      - Launch turnover automation as a production expansion module on successful release-governance customers
      - Add the most common adjacent connectors found in qualified deals and reduce deployment time materially
      - Publish cross-project benchmarks on release lag, acknowledgement discipline, and handover completeness
  - horizon: "24–36 months"
    items:
      - Reach roughly 25 live projects, aligning with the modeled year-three SOM
      - Expand into portfolio governance and claims or commissioning-adjacent visibility using the same release graph
      - Establish multi-project expansion inside at least 3 contractor or owner groups
      - Become the default release and handover control layer for the chosen infrastructure beachhead before entering adjacent segments
risks:
  - risk: Project metadata and naming discipline are too inconsistent for reliable automated impact mapping.
    likelihood: High
    impact: High
    mitigation: Start with read-only ingest, taxonomy normalization, confidence scoring, and human approval gates until data quality is sufficient.
  - risk: Buyers decide incumbent tools plus manual coordinators are good enough, delaying separate budget approval.
    likelihood: Medium
    impact: High
    mitigation: Sell on quantified rework, release-lag, and handover labor reduction on one flagship project rather than abstract workflow modernization.
  - risk: Incumbents expose similar automation inside ProjectWise, Aconex, Autodesk, or Procore before the startup builds a differentiated dataset.
    likelihood: Medium
    impact: High
    mitigation: Focus on neutral cross-system package computation, turnover linkage, and project-specific benchmarks that are harder for repository-bound tools to replicate quickly.
  - risk: Deployment becomes too services-heavy because each project needs custom mapping and process design.
    likelihood: High
    impact: Medium
    mitigation: Constrain the first beachhead, price implementation explicitly, and hire solutions architecture only after early patterns become reusable.
  - risk: Sales cycles lengthen because contractor and owner budget ownership is unclear.
    likelihood: Medium
    impact: Medium
    mitigation: Qualify deals around a named trigger, named economic buyer, baseline KPIs, and a documented pilot-to-production conversion path before committing implementation capacity.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of product engineering, workflow and standards expertise, early solutions architecture, and founder-led enterprise selling needed to prove trusted release-control pilots, convert them into annual production contracts, and establish turnover automation as the first expansion module.
