problem: 设计施工一体化的基础设施承包商，如今仍靠 ProjectWise 文件夹、PDF、RFI、送审单、进度导出和现场 App 的拼盘来管理项目发布；这些系统彼此对不上，也说不清到底哪里变了、什么版本才能开工。设计修订一落地，团队还得手工判断它会影响哪些图纸包、工作包、采购项和调试清单，于是现场继续照着过期资料施工，业主拿到的移交数据也残缺不全。通用数据环境能存文件，但很少真能充当一套贯穿设计、现场执行和资产移交的发布控制系统。
targetUser:
  primary: 在中型设计施工一体化土木承包商里，负责铁路、机场、供水或公路项目、且工作流以 Bentley 为中心的数字交付或 VDC 负责人
  secondary: 负责图纸发布、RFI、送审单和移交包的项目控制经理与现场工程师
  buyer: 正在多个在建项目上统一数字交付体系的基础设施承包商 COO 或运营副总裁
startupThesis:
  nonObviousInsight: 下一家真正跑出来的 AEC 公司，不会靠再做一个模型创作界面赢，而会靠变成那张“发布图谱”：它决定哪份模型修订、文件、现场指令和资产记录已经新到足够施工，也完整到足够移交。变化在于，Bentley 和生态伙伴现在已经公开支持那些同时跑在开放系统和专有系统之上的创业公司，而云和 AI 工作流也第一次让跨系统的变更识别和打包变得可行。
  beachhead: 服务铁路、机场和供水领域的设计施工一体化承包商；这些团队在 $250M-$1B 项目上，每周都要跨 Bentley ProjectWise、进度工具和现场执行系统发布 issued-for-construction 包并完成业主移交。
  wedge: 做一层发布控制系统，吃进模型修订、RFI、送审单和进度变更，自动生成现场可执行的工作包，以及带清晰影响链路的可移交资产档案包。
  whyNowCatalyst: NXT Activate 的推出说明，围绕“从设计到运营阶段解决 AEC 数据孤岛”这件事，现在已经同时有资金、集成入口和买方拉力，而不只是局限在某一个创作工具内部。
  ventureScalePath: 先从 issued-for-construction 发布管理切进去，再扩到调试、索赔防御、采购影响、数字移交，最终变成覆盖投标到资产运营阶段的资本项目变更治理系统。
solution: 产品接到以 Bentley 为中心的文档库、模型元数据、进度数据流和现场系统后，会先给每个在建项目搭出一张“资产—工作包”图谱。一旦有修订、RFI 回复或送审批准落地，它就能找出受影响的图纸集、安装包、采购依赖和移交物，然后给出一套现场真正该收到的最小更新发布包。施工经理和项目控制团队看到的是一个发布队列，里面把“哪里变了、为什么重要、哪些下游任务得等新包确认后才能继续”全讲清楚。到了移交阶段，同一张图谱还能直接拼出业主可接收的资产档案包，而不是逼着团队再从零散文件夹里重建一遍。第一版部署只要读取导出的元数据和文档流，承包商不用先把现有 CDE 或现场软件整套换掉。
goToMarketSeed:
  firstCustomer: 一家 ENR 400 设计施工一体化承包商，正在交付大型铁路、机场或供水项目；设计办公室用 Bentley ProjectWise，发布流程仍重度依赖 PDF 或 SharePoint，而且合同里把数字资产数据纳入了业主移交要求。
  buyingTrigger: 一次重大设计修订、业主审计或关键里程碑移交，让团队暴露出：现有图纸发布和移交流程既证明不了现场手里哪一包才是最新，也证明不了资产记录是否完整。
  currentAlternative: ProjectWise 等通用数据环境、类似 Procore 的现场工作流、电子表格跟踪器、PDF 流转单、邮件链，以及内部 BIM 协调员手工把发布包拼起来。
  switchingReason: 这个切口直接压在现有技术栈上方，把项目里已有的数据收拢成一套“当前有效”的发布包，在不替换核心创作或现场系统的前提下，把返工和移交人力压下来。
  pricingHypothesis: 按活跃 megaproject 收年费企业订阅，另加移交自动化和跨项目发布分析等高级模块。
