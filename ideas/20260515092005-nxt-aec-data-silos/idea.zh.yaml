differentiator: 现有 AEC 系统很擅长把模型、文档或现场记录存好，但都更像各守一摊，做不到跨整条工作流回答项目团队：现在到底哪一版有效、哪些地方受影响、哪些内容可以放心执行。这个产品的赢法，是做出一张横跨设计库、现场指令和移交产物的变更图谱，同时兼容开放栈和专有栈。时间一长，这张图谱会沉淀成一套专有数据：修订影响、确认滞后、返工成因、移交完整度——这不是一个以文件为中心的 CDE 或通用 AI copilot 能轻易复刻的。
