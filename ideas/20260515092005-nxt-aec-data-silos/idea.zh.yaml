jobsToBeDone:
- job: 当重大设计修订在现场施工前落地时，帮项目控制团队迅速找出所有受影响的工作包，并只发出一套当前有效的发布包，别让班组再照着过期资料干活。
  currentAlternative: 靠电子表格流转日志、PDF 对比，以及在 ProjectWise、邮件和现场软件之间手工协调
  successMetric: 过期包事件下降，以及从修订批准到现场发布的天数缩短
- job: 当业主移交节点逼近时，帮数字交付负责人从在跑的项目工作流里拼出完整资产记录，让承包商更快交付，而不是再来一轮人工找文件。
  currentAlternative: 由 BIM 协调员和调试团队从文件夹与邮件里手工重建移交资料夹
  successMetric: 移交包组装节省的天数，以及首次提交就被接受的资产记录占比
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这项加速器是可信的市场信号，因为它同时给了资金、平台背书和明确工作流痛点，虽然还没证明能跑出创业结果。
  painIntensity:
    score: 4
    rationale: 发布控制做不好，会直接推高返工、拖慢工期、放大索赔敞口，也会让大项目的业主移交变得异常痛苦。
  wedgeClarity:
    score: 5
    rationale: 在以 Bentley 为中心的 megaproject 上做 issued-for-construction 发布管理，是一个边界清楚、负责人明确、ROI 可量化的窄工作流。
  defensibility:
    score: 4
    rationale: 跨系统发布图谱和由此沉淀的影响与移交数据，可以逐步累积成持久的工作流锁定，不过现有厂商也可能把相邻能力打包进来。
  ventureScale:
    score: 5
    rationale: 这个滩头市场能从发布包一路扩到移交、索赔、调试、采购影响和组合级资本项目治理。
topRisks:
- name: 流程惯性
  description: 项目团队可能宁愿忍受痛苦的手工发布流程，也不愿在正在运行的 megaproject 里再塞进一套新系统。
  mitigation: 先做导出元数据之上的叠加层，只卡住几个高价值发布节点；先在一个旗舰项目里证明过期包更少，再往深处铺。
- name: 现有厂商反击
  description: 一旦买方确认这个问题值得花钱，通用数据环境厂商可能迅速把相邻的发布功能推出来。
  mitigation: 把重点放在跨系统影响链路和移交结果上，这正是以文件为中心的现有厂商在混合技术栈里最难补齐的部分。
- name: 项目数据混乱
  description: 命名不一致、元数据缺口和文档纪律差，会让第一版部署里的自动影响映射不稳定。
  mitigation: 把分类体系归一、置信度标记和人工审批门槛打包进实施流程，等客户数据卫生提升后再逐步放开自动化。
