competitors:
- name: Bentley ProjectWise
  stage: incumbent
  wedge: 面向基础设施的 CDE 和项目交付主干，覆盖工程记录、审查和工作流状态。
  pricing: Custom enterprise / contact sales
  strength: 在基础设施领域渗透深、文档链路强，在 Bentley 重度的业主和承包商环境里天然贴合。
  weaknessVsUs: 它在资料库内部很强，但作为一张中立的发布图谱，要把外部 RFI、进度、现场确认和移交差异都串起来，仍偏弱。
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
- name: Autodesk Forma / Construction Operations
  stage: incumbent
  wedge: 连接设计、送审、收尾和业主工作流，并持续叠加 AI 自动化。
  pricing: Bundle / enterprise quote
  strength: 对业主、设计方、收尾和 AI 辅助送审有完整的连通工作流叙事。
  weaknessVsUs: 在 Autodesk 主导技术栈里更强，但不擅长以 Bentley 为中心的重型土木发布治理；它本质上仍是广平台优先，而不是发布控制优先。
  sourceRefs:
  - 5
  - 6
  - 8
  - 40
- name: Procore
  stage: incumbent
  wedge: 覆盖图纸、RFI、送审、分析和全生命周期治理的现场—办公室执行平台。
  pricing: Platform contract with unlimited users; not per-seat
  strength: 采用面极广、现场使用深，而且对项目参与方有丰富的集成生态。
  weaknessVsUs: 执行层非常强，但不是为 Bentley 重度土木项目上的跨系统发布就绪度和业主移交完整度而生。
  sourceRefs:
  - 11
  - 12
  - 14
  - 17
- name: Oracle Aconex
  stage: incumbent
  wedge: 面向设计施工一体化项目的 CDE，带可配置流程、审计轨迹、工作包和移交能力。
  pricing: Custom enterprise quote
  strength: 在设计施工领域很有 credibility，记录不可篡改，而且明确有移交和流程管理模块。
  weaknessVsUs: 它更像一个重量级 CDE / 流程引擎，而不是一个轻量 overlay，去跨混合现有系统计算最小发布包。
  sourceRefs:
  - 18
  - 19
  - 20
  - 21
- name: Revizto
  stage: scale-up
  wedge: 面向复杂项目的 2D / 3D 协同、问题管理和碰撞闭环。
  pricing: Enterprise quote
  strength: BIM 团队喜欢它的速度、协作体验和基于位置的问题跟踪。
  weaknessVsUs: 它还停在发布控制、带进度意识的工作包和移交编排之外。
  sourceRefs:
  - 22
  - 23
regulatoryTechnicalConstraints:
- point: 产品必须尊重 ISO 19650 风格的信息容器状态、元数据和 CDE 治理，而不是另起一套失控生命周期。
  sourceRefs:
  - 2
  - 28
- point: 基础设施模型联邦和数据质量检查，越来越要求 IFC 4.3 配合 IDS 这类显式信息要求。
  sourceRefs:
  - 24
  - 25
  - 34
  - 35
  - 36
- point: 问题与协同互操作最好能对齐 BCF 或等价的上下文交换模式。
  sourceRefs:
  - 23
  - 26
- point: 业主移交仍依赖 COBie 或等价形式的结构化资产数据，而不是只交 PDF 和文件夹。
  sourceRefs:
  - 27
  - 30
- point: 机构环境可能会限制批准的创作工具、EDMS 行为，以及竣工 BIM 交付物的具体格式。
  sourceRefs:
  - 30
  - 31
validationSignals:
- point: Bentley 和 NXT 专门围绕 AEC 数据孤岛和工作流痛点发起加速器，这是非常直接的品类验证信号。
  sourceRefs:
  - 33
- point: Procore 覆盖 300 万+ 项目、15,700+ 团队的规模说明：买方早就愿意为相邻的连接式施工软件大笔付费。
  sourceRefs:
  - 11
  - 15
  - 16
- point: Autodesk 正把送审和收尾自动化打包卖给业主与承包商，这说明预算确实在流向“压缩工作流”，而不是再买更多文件存储。
  sourceRefs:
  - 8
  - 40
- point: Revizto 报出 80K+ 项目，并给出节省工期和人力的客户证词，说明只要工作流收益足够明显，团队愿意采用 overlay。
  sourceRefs:
  - 22
  - 23
openQuestions:
- 在一个 $250M-$1B 的基础设施项目上，当现有软件预算已经花掉之后，发布控制 overlay 的真实年度预算权到底还有多少？
- 真正落地时，哪个首个工作流切口最干净——issued-for-construction 包件控制、RFI / 送审影响追踪，还是移交包组装？
- 今天在铁路、机场和供水项目里，业主移交包到底多常被打回或返工？最常出问题的字段或文档又是什么？
- 在真实的 ProjectWise 重度项目里，客户要看到价值，连接器到底要做多深，才会开始要求完整回写自动化？
