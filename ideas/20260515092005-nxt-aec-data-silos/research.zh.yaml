  adoptionFrictionMatrix:
  - friction: 真实项目里的元数据和命名规范很乱
    severity: high
    affectedBuyer: 数字交付 / VDC 负责人
    mitigation: 先做只读导入、分类归一和带置信度门槛的人工复核，再逐步自动化发布。
    sourceRefs:
    - 25
    - 27
    - 28
  - friction: 在正在运行的 megaproject 里插入一套新系统，本能会被抵触
    severity: high
    affectedBuyer: COO / 现场运营负责人
    mitigation: 别替换 CDE 或现场栈，而是在一个高风险发布关口先作为 overlay 落地。
    sourceRefs:
    - 1
    - 15
    - 31
  - friction: 跨组织的集成、身份和数据访问约束
    severity: medium
    affectedBuyer: IT / 数字交付 sponsor
    mitigation: 先用标准和导出数据流跑通价值，再在证据成立后补更深的集成。
    sourceRefs:
    - 21
    - 24
    - 26
  - friction: 现有软件预算已经花掉，必须很快证明 ROI
    severity: medium
    affectedBuyer: COO / CFO
    mitigation: 上线前先量好过期包、RFI 周期和收尾工时基线，并按月回报变化。
    sourceRefs:
    - 9
    - 20
    - 23
