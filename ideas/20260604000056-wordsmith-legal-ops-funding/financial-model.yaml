modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      FounderOutbound --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> ExpansionWorkflows
      ExpansionWorkflows --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: The base case grows to 22 paying legal teams by Q4Y3, with each logo starting as a paid pilot and older accounts expanding into a second workflow.
- checkName: Must go right
  finding: Onboarding has to stay at or below the 45-day target so services effort does not absorb the gross margin needed to fund new sales capacity.
- checkName: Model breaks if
  finding: If the company exits Y3 below 18 customers or gross margin slips toward 67%, the downside case nearly consumes the cash buffer before the next round.
- checkName: Next-round proof
  finding: A seed raise is easiest once the company shows 8-10 production customers, repeatable 45-day onboarding, and at least four second-workflow expansions.
sanityChecks:
  ruleOf40: Y3 growth 132.6% + EBITDA margin -26.5% = 106.1%
  burnMultiple: Y2 net burn $0.87M / net new revenue $0.76M = 1.14x; Y3 net burn $0.63M / net new revenue $1.35M = 0.46x.
  revenuePerFte: $215K Y3 on 11 EOY FTE (benchmark $200-400K SaaS)
  flags:
  - The model still shows negative EBITDA in Y3, so the next round depends on proving repeatable expansion rather than on near-term profitability.
  - Holding 70% gross margin assumes implementation and precedent ingestion get meaningfully more repeatable after the first few customers.
  - CAC and churn are still heuristic because the business has not yet observed real pilot-conversion and renewal cohorts.
