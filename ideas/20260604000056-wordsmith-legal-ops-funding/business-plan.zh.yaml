slug: outside-counsel-repatriation-os
date: '2026-06-04'
executiveSummary: Outside Counsel Repatriation OS 不该一上来做成宽法务 copilot，也不该去替代 CLM；更合理的起步形态，是一层面向精干内部法务团队的事项路由与先例复用层，服务美国和英国的 B2B 软件公司。第一批客户应是 ARR 在 $100 million 到 $1 billion 之间的软件公司：有 4-15 名律师、5-25 家海外子公司、每年 $500,000 到 $5 million 的外部律所支出，而且重复性的商业、供应商与隐私请求已经通过 Slack、Teams、Salesforce 和 email 持续涌入。购买触发点通常是 GC 被要求削减律所支出，或在不增加法务编制的前提下吃下新增交易与供应商工作量，因此收案纪律和工作分配可见性现在已经和预算直接挂钩。MVP 应该先给一条高频工作流搭一个结构化前门，在律师接手前补齐缺失事实、调出已批准的先例和历史意见，并只把真正的例外连同审计轨迹升级出去。公司能赢，不在于再做一个 drafting assistant，而在于成为那一层 operating layer：决定哪些事该留在内部，以及为什么。研究支持这是一个真实切口，估算的滩头 SAM 为 $81.0M、第 3 年 SOM 为 $4.5M，但这两个数字仍依赖一个尚未被验证的前提——买方会愿意为一层独立工作流软件支付约 $90k ACV。最大的反证风险有两个：先例导入比计划中更依赖服务；以及在创业公司把数据护城河做深之前，CLM 或 intake 在位厂商已经把足够多的法务前门能力打包进来，把价格打下来。因此，前 12 个月必须同时证明两件事：单条工作流上确实能量化减少外部律所使用；以及试点可以在不被定制化部署拖垮的情况下转成正式生产合同。
problem:
- 精干的内部法务团队今天仍然靠邮箱、聊天线程、表格和零散 playbook 去分诊重复性的商业、采购和隐私请求，所以律师不断重复回答常规问题，也把大量时间耗在补齐缺失事实。
- 一旦溢出事项默认送去外部律所，GC 面对的就是更慢的业务响应、对哪些工作本可留在内部的更差可见性，以及一条越来越受压的、以百万美元计的支出线。
solution:
- 把 Slack、Teams、Salesforce 和 email 里的法务请求接进来，转成结构化事项，并先把判断这项工作能否走内部批准路径所需的业务事实收齐。
- 把每个事项与 playbook、已批准立场以及导入的外部律所意见逐一匹配，让系统能基于明确证据和审计历史，推荐内部解决、升级给专家，或升级到外部。
whyWeWin:
- 切口比通用法务 AI 套件更窄：只盯住一条重复性的服务交付工作流，让支出节省、响应时长和路由质量都能在一个季度里量化。
- 真正耐打的资产是法务服务图谱——请求类型、缺失事实、先例使用、升级结果和避免掉的外部支出——而这些数据，通用 drafting copilot 和以合同为中心的系统都看不干净。
- 人在环中的建议、可审计的路由逻辑，以及跨系统部署方式，更贴合买方对信任的要求，而不是黑盒式自治。
strategicChoices:
  beachhead: 美国和英国的 B2B 软件与数字平台公司：内部法务 4-15 人、商业/供应商/隐私工作流每月请求 200 个以上，并且当前正被要求降低对外部律所的依赖。
  wedgeRationale: 这块市场里，经济买方集中、外部支出压力肉眼可见，而且重复工作会在进入律师队列前先出现在协作和 CRM 系统里。与其一上来服务所有法务部门，不如先做这一块，因为单个客户就能在一条工作流上证明周期缩短和支出改善，而不需要整套替换系统。
  sequencingRationale: 产品应该先从一条高频请求类型做起，用服务方式导入先例，并坚持人工审批路由，因为在早期部署里，信任和见效速度比功能广度更重要。GTM 也应先从创始人主导的试点开始，绑定年度规划或工作量峰值；只有当试点转化可重复后，再补集成与 onboarding 人才，并把生态合作当作放大器，而不是替代客户证据。
  notYet:
  - 不把律所作为主要客户
  - 不做完整的 CLM 替代，也不承担端到端合同生命周期
  - 暂不碰诉讼、劳动法以及高度定制的专家工作流
  - 不提供无需律师审批的全自动法务答复
market:
  tam: 估算 TAM 为 $315.0M：大约 3,500 家美国和英国目标企业 × 每年约 $90k 的平台支出。
  sam: 估算滩头 SAM 为 $81.0M：大约 900 家符合初始法务团队规模与支出画像的跨国软件和数字平台公司。
  som: 估算第 3 年 SOM 为 $4.5M：通过聚焦英美软件公司切口，拿下约 50 家客户、每家约 $90k ACV。
  segments:
  - 商业法务团队精简、但重复请求持续流入的跨国 B2B 软件公司
  - 隐私、采购和供应商审查需求集中的数字平台公司
  buyingProcess: 冠军用户通常是法务运营负责人或商业法务经理，但真正的经济买方是掌握外部律所预算和服务水平的 GC 或 VP Legal。最快的成交路径，是围绕一条工作流和一个业务单元卖付费试点；安全、采购，偶尔再加 IT，会围绕保密控制、可审计性和集成范围卡门。
product:
  mvp: MVP 是一条面向单一重复工作流的法务前门，例如供应商条款或隐私问卷。它应从 Slack、Teams、Salesforce 或 email 接入请求，补齐缺失事实，调出最接近的已批准 playbook 或历史意见，再带着可见的置信度阈值和审计轨迹，把事项路由到内部解决或升级路径。
  sixMonth: 在一条工作流主线上跑出 2-3 个付费试点，上线协作和 CRM 收案，并证明结构化收案 + 先例复用，确实能减少常规事项被外部升级。
  twelveMonth: 至少把 2 个试点转成年框正式合同，接入一个 CLM 或事项管理系统的轻量连接器和事项分析，并把第一条工作流扩到第二个相邻请求类型。
  twentyFourMonth: 在最好的客户里，成为商业、供应商和隐私服务交付的 operating layer；只有当实施和毛利趋势可重复后，再扩到支出 benchmark 和更多专家路由。
  keyBets:
  - 单一重复工作流可以在前 90-180 天内量化证明外部律所支出下降。
  - 客户会先接受一层独立路由软件，而不会等 CLM 或收案在位厂商补上同等的先例感知能力。
  - 历史 playbook 与备忘录的服务式导入，可以标准化到足以保住软件毛利的程度。
  - 商业、供应商和隐私工作流共享足够多的路由原语，因此第二条工作流的上线成本会低于第一条。
gtm:
  wedge: 先把一条高频法务请求类型卖成付费试点，目标是那些正在承受外部律所压力的 GC；等系统证明自己能更快响应、并减少常规事项外包占比后，再转成年订阅。
  channels:
  - 由创始人主导，直接卖给英国和美国软件公司的 GC、VP Legal 和法务运营负责人
  - 来自正在帮助法务部门重构工作分配的法务运营顾问与替代性法律服务商的转介绍
  - 等第一批案例跑出来后，再通过 CLM 或事项管理厂商做集成驱动的扩张与联合销售
  funnelTargets: 目标漏斗为：discovery→合格试点 25-35%，合格试点→付费试点 30-40%，试点→正式生产 50%+，正式生产→第二条工作流扩张在 12 个月内达到 50%+。
  pricing: 针对一条工作流收取付费试点和 onboarding 费用，随后按活跃法务请求量区间与覆盖工作流数量收年度 SaaS 订阅费；这更贴合买方的 ROI 逻辑——他们看重的是少付了多少律所钱、响应快了多少，以及重复工作流的使用频次，而不是 seat 数。
businessModel:
  revenueStreams:
  - 针对收案、路由、先例检索、审计日志和工作流分析的年度订阅
  - 第一条工作流与集成的 onboarding 和 playbook 导入费
  - 来自更多工作流、更高请求量区间以及 benchmark 分析的扩张收入
  unitOfValue: 在内部完成解决，或带着可审计上下文被升级处理的结构化法务请求
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一客户内，从一条工作流扩到相邻的商业、供应商和隐私请求类型
  - 当前门成为默认路径后，继续增加更多业务单元收案渠道和更高请求量区间
  - 当跨客户工作流数据足够多之后，把支出分配和周期 benchmark 变成可收费产品
  - 在路由层站稳后，进一步加深与 CLM、事项管理和支出分析系统的集成
strategyMap:
  northStarMetric: 在留痕可审计的前提下，由内部法务完成解决的重复性事项占比
  inputMetrics:
  - 签下的合格试点数量
  - 从请求进入到律师拿到可处理事项包的中位小时数
  - 无需外部律所即可解决的常规事项占比
  - 试点转正式生产的转化率
  - 第一条工作流的 onboarding 天数
  - 正式客户从第一条工作流扩到第二条工作流的比例
  moatsToBuild:
  - 跨系统的法务请求图谱：把收案来源、缺失事实、playbook 路径和升级结果连在一起
  - 基于历史建议、条款立场和外部律所备忘录标准化出来的客户专属先例语料
  - 围绕周期、工作结构和可避免外部支出的同类法务团队 benchmark
  - 可复用的连接器和工作流模板，进一步压缩目标技术栈里的部署时间
  killCriteria:
  - 聚焦滩头市场卖了 9 个月后，付费试点仍少于 2 个
  - 前 3 个试点未能把常规外部升级比例至少压低 20%
  - 前 3 次实施之后，单条工作流的 onboarding 中位时间仍高于 45 天
  mermaid: |
    flowchart LR
      Wedge[Commercial or privacy workflow wedge] --> MVP[Structured intake and routing MVP]
      MVP --> Proof[Cycle-time and outside-counsel proof]
      Proof --> Expansion[More workflows and benchmark data]
investorMemo:
  verdict:
    call: 值得见面 / 继续尽调
    conviction: 中等把握。买方痛点、预算触发点和赛道时点都是真实的，但前提是必须证明实施和先例导入仍能做成产品化。
    whyBelieve: 研究显示，法务部门现在既有工作量压力，也明确被要求把更多常规工作留在内部，因此一个窄路由层已经具备具体的预算叙事。
    whyDoubt: 如果 CLM 和收案在位厂商迅速把类似能力打包进去，或者信任与源数据清洗让部署长期重服务化，公司就会输。
    nextDiligence: 下一步要看的证据，是两个付费试点把常规外部升级至少压低 20%，其中一个账户转成年度生产合同，并在 45 天内完成第一条工作流 onboarding。
  firstCustomer:
    title: 由 GC 主导的跨国 SaaS 企业法务团队
    profile: ARR 在 $100 million 到 $1 billion 之间的软件公司，拥有 4-15 名律师、跨境商业与隐私工作，而且法务 intake 已经从 Slack、Teams、Salesforce 和 email 持续涌入。
    trigger: 年度规划里被要求削减外部律所支出，或企业销售与供应商工作突然增加，导致请求量上来，但法务编制没加。
    buyer: General Counsel 或 VP Legal
    initialContract: 先签一条工作流的 $25k-$50k 付费试点，周期 8-12 周；当响应时长和外部支出节省指标达标后，再转成大约 $80k-$120k 的年度订阅。
  mustBeTrue:
  - 至少一半的合格目标账户，确实有足够高的重复请求量和外部律所流失，能支撑每年 $80k-$120k 的软件支出。
  - 单条工作流能在前 180 天里把常规外部升级至少压低 20%，同时不增加法务风险事件。
  - 买方会在等待现有 CLM、收案或事项管理厂商补齐能力之前，先接受一层独立路由软件。
  - 历史备忘录、playbook 和条款指引，能够在第一条工作流上于 45 天内被标准化成可用的路由逻辑。
  - 人在环中的建议能力，加上足够强的安全控制，就足以通过英国和美国企业法务团队的采购审查。
  diligenceQuestions:
  - 哪些请求类型能在前 6 个月里最可量化地减少外部律所支出：供应商条款、隐私问卷、采购审查，还是商务 redline？
  - 有多少目标法务团队愿意买一个独立前门，而不是要求产品必须扩展现有 CLM 或事项栈？
  - 首次部署的工作里，playbook 清洗和软件配置分别占多大比例？这又会怎样改变毛利空间？
  - 英国和美国法务团队的采购里，反复卡住项目的安全、驻留和 zero-retention 要求到底有哪些？
  - 为什么买方会选择这套系统，而不是 Checkbox、Wordsmith、Ironclad 的扩展，或内部自建工作流？
operatingAssumptions:
- assumption: 滩头客户确实有足够的请求量和外部律所流失，能在试点之后支撑 $80k-$120k 的年合同。
  basis: research.yaml
  validationTest: 从 10 个合格潜在客户里收集事项量和律所支出基线，确认至少有 5 家每月处理 200 个以上请求，并且在目标 ACV 下能讲得通 12 个月 ROI。
  decisionImpact: 如果不成立，就把 ICP 收窄到请求量更大的大企业，或者把定价改成更偏管理服务的经济模型。
- assumption: 买方会在要求捆绑进现有 CLM 或事项管理系统之前，先接受独立路由层。
  basis: research.yaml
  validationTest: 在 10 次买方访谈里，确认至少 6 家愿意在不做 rip-and-replace、也不要求原生 CLM 扩展的情况下运行付费试点。
  decisionImpact: 如果不成立，就优先做合作伙伴与嵌入式分发，而不是继续独立直销。
- assumption: 以服务方式导入先例、playbook 和历史意见，可以标准化到足以在 45 天或更短时间里上线一条工作流。
  basis: research.yaml
  validationTest: 把前 3 个试点 onboarding 从头到尾计时，确保每个账户里，手工清洗加配置都控制在 45 天内。
  decisionImpact: 如果不成立，就暂停销售扩张、提高实施收费，并把第一条工作流继续收窄。
- assumption: 人工审批、审计日志、zero-retention 条款和区域数据控制，已经足以通过采购，而不必上完全私有化部署。
  basis: research.yaml
  validationTest: 前 2 个试点里都能通过安全与采购审查，且无需为单个客户搭建私有云架构。
  decisionImpact: 如果不成立，基础设施成本和销售周期都会变长，届时必须转向更高价格、只服务大型企业的策略。
- assumption: 商业、供应商和隐私工作流共享足够多的路由原语，能够高效支持第二条工作流扩张。
  basis: 运营判断
  validationTest: 在首个正式部署之后，为同一客户上线第二条工作流时，至少 50% 的路由组件和先例结构可以复用。
  decisionImpact: 如果不成立，就在更长时间里只守住单一工作流，同时下调 24 个月扩张预期。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 20 位目标 GC 和法务运营负责人，并收集请求量与外部律所支出的基线数据。
  hypothesis: 英国和美国的软件公司法务团队里，存在一个足够窄、但请求量足够高且外部流失明显的细分，可以立刻支撑试点。
  successMetric: 至少 10 个合格账户愿意共享基线指标，其中 5 家符合“每月 200+ 请求 + 明显常规外部支出”的目标画像。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 用导入的 playbook 和历史外部律所意见，在一条工作流上跑 concierge 试点。
  hypothesis: 在完整自动化之前，结构化收案和先例复用就能在真实工作流上减少律师分诊时间和外部升级。
  successMetric: 拿下 2 个付费试点承诺，并在试点账户里测到常规外部升级下降 20%+，或中位响应时长明显改善。
  owner: 法务产品负责人
- horizon: 90–180 天
  experiment: 对已经在用 Ironclad、Checkbox 或同类系统的买方，测试“独立叠加层”与“嵌入现有系统”的两种定位。
  hypothesis: 只要能证明更懂先例的路由和更清晰的支出分配可见性，创业公司就能以 overlay 形态拿下客户。
  successMetric: 至少 3 个试点买家选择 overlay 路线，而不要求产品先变成原生 CLM 模块。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 把安全、审计和治理控制打包好，送进采购审查。
  hypothesis: zero-retention 条款、审计日志、SSO 和区域托管选项，足以化解第一波买家的主要信任疑虑。
  successMetric: 前 2 个试点都能通过安全审查，而且不要求定制化私有部署。
  owner: 创始工程师
- horizon: 6–12 个月
  experiment: 把试点指标转成年度定价，并推动第二条工作流扩张。
  hypothesis: 只要试点和支出节省、响应时长证明挂钩，就能转成 $80k-$120k 年合同，并在 12 个月内扩到第二条工作流。
  successMetric: 至少 2 个试点转成正式生产，且有 1 个生产账户在上线后 6 个月内采用第二条工作流。
  owner: 创始人/CEO
- horizon: 12–18 个月
  experiment: 通过法务运营顾问和 ALSP 建立 partner-led pipeline。
  hypothesis: 一旦案例建立起来，那些本来就在重构法务服务交付的顾问，就能成为更低摩擦的分销渠道。
  successMetric: 合作伙伴来源机会占合格 pipeline 至少 20%，而且胜率不低于创始人主导的 outbound。
  owner: 合作伙伴负责人
operations:
- 为每条正式上线的工作流维护一套受治理的资产库：已批准 playbook、条款立场、历史意见与升级规则。
- 把 onboarding 做成可量化流程：每个试点都要记录事项量基线、外部支出结构、路由准确率和见效时间。
- 始终保留人工审批控制平面、不可篡改审计日志，以及随时可用于采购与 GC 监督的安全审查包。
- 为每条工作流埋点：请求来源、缺失事实、解决路径、周期时长和外部支出节省额，让 ROI 说法始终可以被证伪。
- 服务和合作伙伴只用来做源材料清洗与边角问题处理，路由逻辑和工作流数据的所有权必须握在自己手里。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 早期市场集中、且极度看重可信度，因此创始人必须亲自抓销售、试点设计和 GC 关系。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭出路由引擎、集成、审计控制和分析能力，支撑第一批付费试点。
- role: 法务产品负责人
  startTiming: 第 1 个月
  rationale: 把商业、供应商和隐私 playbook 翻译成工作流逻辑，确保早期部署始终贴着真实法务运营。
- role: 解决方案工程师
  startTiming: 第 4 个月
  rationale: 压缩 onboarding 阻力，把集成标准化，并把试点里一次性的配置工作抽成可复用模板。
- role: 客户成功/法务运营负责人
  startTiming: 第 6 个月
  rationale: 接管 onboarding、基线测量和工作流调优，避免创始人永久变成实施团队。
- role: 客户经理
  startTiming: 第 12 个月
  rationale: 只有在拿到案例客户、试点包可重复、采购打法清楚之后，才开始扩销售 pipeline。
milestones:
- horizon: 0–12 个月
  items:
  - 在英国和美国软件公司滩头市场里，签下 5-7 个合格的设计合作客户。
  - 围绕一条重复工作流上线 2-3 个付费试点，并至少把 1 个转成年度正式生产。
  - 在第一个正式生产账户里，证明常规外部升级下降 20%+，或拿到同等可量化的周期缩短结果。
  - 把单条工作流 onboarding 标准化到 45 天以内。
- horizon: 12–24 个月
  items:
  - 在滩头市场做到 8-12 家正式生产客户。
  - 至少在 4 家正式生产客户里完成第二条工作流扩张。
  - 把合作伙伴来源 pipeline 建成可重复的第二渠道。
  - 上线围绕周期、工作结构和可避免外部支出的 benchmark 报告。
- horizon: 24–36 个月
  items:
  - 在头部客户里，成为商业、供应商和隐私工作流的默认收案与路由层。
  - 只有在实施毛利和留存得到验证后，才扩到部分专家工作流。
  - 证明扩张收入和 benchmark 产品已成为增长的重要来源。
  - 为向更宽的法务服务交付平台迈进做准备，但不丢掉“外部律所回迁”这个核心切口。
risks:
- risk: CLM、收案或更宽的法务 AI 在位厂商补上了足够多的路由能力，导致差异化被压窄。
  likelihood: High
  impact: High
  mitigation: 先拿下一条工作流、把外部律所节省额量化出来，并在扩大产品范围之前先把先例和 benchmark 护城河做深。
- risk: 信任、保密或治理担忧让买方不愿让系统接触足够有价值的事项量。
  likelihood: High
  impact: High
  mitigation: 对建议结果保留人工审批，从第一天起就把审计和安全控制做好，并从风险更低、重复性更强的工作流开始。
- risk: 零散的 playbook、邮件和历史备忘录让 onboarding 过度依赖服务。
  likelihood: High
  impact: High
  mitigation: 把 v1 严格限制在一条工作流上，对 onboarding 收费，并把前几次部署沉淀成可复用的导入模板。
- risk: 独立法务前门的需求弱于预期，因为买方更想要现有系统的扩展。
  likelihood: Medium
  impact: High
  mitigation: 尽早测试 overlay 定位；如果买方持续要求依附在位系统分发，就及时转向嵌入式合作。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月的 runway 应足以覆盖创始产品与法务运营团队、第一条工作流所需的安全和集成工作、2-3 个付费试点，以及在放大销售前证明“试点到正式生产”可重复转化所需的证据。
