problem: >-
  Lean in-house legal teams at multinational software and internet companies are swamped by routine commercial, privacy, and
  procurement questions that arrive through Slack, Teams, ticketing systems, and CRM workflows all day long. Because the facts
  sit with business teams and prior guidance lives in email threads, outside-counsel memos, and scattered contract playbooks,
  legal ends up either re-answering the same questions or sending overflow matters to expensive law firms. That makes legal
  service delivery unpredictable, slows revenue and vendor onboarding, and leaves GCs with no clean system for deciding what
  should stay in-house versus what truly needs specialist counsel.
targetUser:
  primary: Legal operations leaders and commercial legal managers at multinational B2B software and digital-platform companies with lean in-house teams
  secondary: Privacy operations managers and procurement counsel responsible for recurring internal legal requests
  buyer: General Counsel or VP Legal at a U.S. or UK technology company under mandate to cut outside-counsel spend
startupThesis:
  nonObviousInsight: >-
    The next durable legal-tech winner is not the model that drafts clauses; it is the operating layer that decides which
    inbound matters can be handled safely in-house, gathers the missing business facts automatically, and packages only true
    exceptions for internal specialists or outside counsel. Once legal request volume moves into systems like Slack, Teams, and
    Salesforce, routing discipline and precedent reuse become more valuable than raw text generation.
  beachhead: >-
    U.S. and UK B2B software companies with 5-25 foreign subsidiaries, 4-15 in-house lawyers, and $500,000 to $5 million in
    annual outside-counsel spend that handle 200 or more monthly commercial, procurement, and privacy requests from sales,
    security, and vendor-management teams
  wedge: >-
    A matter-routing and precedent-reuse OS that captures inbound legal requests from collaboration and CRM systems, asks the
    requester for the missing facts, matches the matter to approved internal playbooks and prior outside-counsel guidance, and
    sends lawyers a structured recommendation with a confidence score and escalation path
  whyNowCatalyst: >-
    Wordsmith's funding, 500-plus-company footprint, and explicit pitch to move work away from law firms show legal departments
    now have both budget and executive air cover for software that expands in-house capacity instead of just drafting text.
  ventureScalePath: >-
    Starting with recurring commercial, procurement, and privacy requests creates a narrow capacity wedge, then expands into
    litigation intake, employment escalations, entity management, outside-counsel panel selection, legal-spend benchmarking, and
    eventually the system of record for enterprise legal service delivery.
solution: >-
  The product plugs into Slack, Teams, Salesforce, Jira, and the company's document systems so business users can ask for legal
  help where they already work. It turns each request into a structured matter by collecting facts such as contract type,
  customer segment, geography, data type, vendor criticality, and deadline before the request reaches a lawyer. The system then
  compares the matter against internal playbooks, prior approved clause positions, and uploaded outside-counsel advice to decide
  whether it can recommend an in-house answer, route to a specialist, or justify external escalation. Lawyers receive a compact
  packet containing the request facts, similar past matters, suggested fallback language or answer framework, and the business
  rationale for why the matter should remain internal or go out. Over time, the company builds a proprietary dataset on legal
  demand patterns, response times, and avoidable external spend that makes staffing, budgeting, and playbook tuning much smarter.
goToMarketSeed:
  firstCustomer: >-
    A U.S.- or UK-headquartered SaaS company with $100 million to $1 billion ARR, 10 or more international legal entities, a
    five-to-ten person in-house legal team, and recurring overflow to outside counsel for commercial, vendor, and privacy matters
  buyingTrigger: >-
    A GC mandate to cut outside-counsel spend during annual planning, a burst of enterprise deal volume, or a reorganization that
    leaves the legal team responsible for more regions or business units without new headcount
  currentAlternative: Email and spreadsheet intake, shared playbooks, ad hoc precedent search, matter-management tools, and outside law firms for overflow or specialist questions
  switchingReason: >-
    The first customer switches because the product does not ask legal to replace its core systems; it gives the team an immediate
    way to absorb more internal demand, standardize routing, and reduce avoidable law-firm bills with auditable matter histories
  pricingHypothesis: Annual SaaS platform fee based on active legal request volume and number of covered workflows, plus onboarding fees for playbook ingestion and system integrations
