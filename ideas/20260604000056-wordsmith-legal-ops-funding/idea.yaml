differentiator: >-
  Most legal AI products compete on drafting or contract review, which quickly converges as base models improve. This company is
  different because its core asset is the enterprise's legal service graph: which requests arrive from which teams, which facts
  are usually missing, what prior advice resolved similar matters, when escalation was actually necessary, and what work should
  have stayed in-house. That cross-workflow routing data makes the system more useful with each request and harder for a generic
  copilot or standalone CLM vendor to replicate.
