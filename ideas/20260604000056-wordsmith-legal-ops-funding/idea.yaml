jobsToBeDone:
  - job: >-
      When sales, procurement, or privacy teams submit a recurring legal request, help our in-house legal team collect the right
      facts and route the matter to the right playbook or reviewer, so we can answer faster without sending routine work to a law firm.
    currentAlternative: Email triage, spreadsheet queues, and manual precedent lookup by counsel or legal ops
    successMetric: Median response time per request and percentage of matters resolved without outside counsel
  - job: >-
      When our GC needs to cut outside-counsel spend, help us see which request types can move in-house safely, so we can reduce
      legal spend without increasing business risk or overwhelming the team.
    currentAlternative: Annual law-firm invoices, anecdotal matter reviews, and manual budgeting exercises
    successMetric: Outside-counsel spend avoided and in-house matter capacity gained per lawyer
ideaScorecard:
  signalStrength:
    score: 5
    rationale: The cluster combines large funding, clear buyer language, enterprise adoption at 500-plus companies, and an explicit spend-shift thesis.
  painIntensity:
    score: 4
    rationale: Rising outside-counsel spend and overloaded legal queues are painful and budget-visible, though less existential than core-operational outages.
  wedgeClarity:
    score: 4
    rationale: Matter routing and precedent reuse for recurring internal requests is specific, but requires careful workflow scoping to avoid becoming a broad platform too early.
  defensibility:
    score: 4
    rationale: The routing graph, precedent corpus, and legal-demand dataset can compound into a sticky system, though incumbents may attack adjacent features.
  ventureScale:
    score: 5
    rationale: Every large enterprise legal department struggles with service delivery, and the beachhead expands naturally into spend management, specialist workflows, and broader legal operations infrastructure.
topRisks:
  - name: Incumbent workflow squeeze
    description: CLM, matter-management, or broader legal AI vendors could add basic intake and routing features once the wedge proves valuable.
    mitigation: Start with cross-system matter routing and outside-counsel repatriation analytics that incumbents do not own, and integrate into their stacks rather than replace them.
  - name: Trust and liability concerns
    description: GCs may resist automation if they fear the system will misroute a risky matter or overstate precedent confidence.
    mitigation: Keep human approval on recommended resolutions, expose the underlying precedent and policy evidence, and begin with low-risk recurring request classes.
  - name: Playbook ingestion drag
    description: Early customers may have fragmented guidance across old memos, emails, and inconsistent clause playbooks, slowing time to value.
    mitigation: Sell one high-volume workflow first, provide services-led playbook cleanup, and use imported outside-counsel advice as the seed dataset for initial recommendations.
