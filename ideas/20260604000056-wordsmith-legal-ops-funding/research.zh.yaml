    - 34
    - 35
  - factor: 环境
    impact: neutral
    point: 环境因素今天还不是主要购买驱动，但企业采购仍更偏好能沿用现有系统、而不是发起大规模替换项目的厂商。
    sourceRefs:
    - 5
    - 24
  adoptionFrictionMatrix:
  - friction: 特权信息和个人数据暴露风险
    severity: 高
    affectedBuyer: GC 和安全审查人
    mitigation: 从第一天起就提供 zero-retention 条款、区域托管、加密、SSO 和审计日志。
