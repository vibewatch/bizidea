  pricing: 定制报价 / 演示驱动
  strength: 围绕 Slack、Teams、email 和事项分析做结构化收案，法务前门定位非常清晰。
  weaknessVsUs: 它更像收案与路由基础设施，还没有明显把外部律所意见导入，以及“哪些事该留在内部”做成核心能力。
  sourceRefs:
  - 22
  - 23
- name: Ironclad
  stage: 在位企业
  wedge: AI 驱动的 CLM 与以合同为中心的法务运营
  pricing: 定制报价 / 演示驱动
  strength: 企业品牌深、合同工作流扎实，而且已经和相邻法务工具建立生态连接。
  weaknessVsUs: 它以合同为核心，非合同类法务服务交付仍有空档，事项路由 OS 可以把这块拿下来。
  sourceRefs:
  - 24
  - 25
- name: Leah
  stage: 扩张期
  wedge: 覆盖法务、合规与企业风险的宽 Agentic 编排套件
  pricing: 定制报价 / 演示驱动
  strength: 定位雄心很大，代理能力横跨合同、义务、治理与风险。
  weaknessVsUs: 范围太宽，早期部署会显得比“只解决重复商业与隐私收案”的窄产品更重。
  sourceRefs:
  - 27
- name: Streamline AI
  stage: 扩张期
  wedge: 叠加在 CLM 旁边的法务收案自动化与事项管理
  pricing: 定制报价 / 演示驱动
  strength: 对“请求流入混乱”以及“CLM 只从请求变成合同之后才开始工作”的缺口，框定得很到位。
  weaknessVsUs: 公开证据更能证明它擅长收案和工作流，还不足以证明它已经建立起耐打的先例护城河或跨事项的支出压降系统。
  sourceRefs:
  - 28
regulatoryTechnicalConstraints:
- point: 平台必须真正守住客户保密义务，避免误用客户信息，而不只是“尽合理努力”而已。
  sourceRefs:
  - 31
- point: 部署 AI 需要正式治理机制、董事会或 COLP 监督，以及对相关法律框架的清楚理解。
  sourceRefs:
  - 32
  - 33
- point: 英国和欧盟部署需要满足 GDPR 导向的问责、透明和风险评估要求；而 EU AI Act 也会把部分高风险用例的合规门槛进一步抬高。
  sourceRefs:
  - 29
  - 30
  - 35
- point: 在美国，如果部署会处理加州个人数据，就要具备支持披露、删除、更正和限制处理等权利的控制能力。
  sourceRefs:
  - 34
validationSignals:
- point: Wordsmith 的 500+ 客户基础和 $70M Series B 说明，企业内部法务工作流自动化已经是一个真实的企业采购类目。
  sourceRefs:
  - 2
  - 3
- point: Trustpilot 报告称，在部署 Wordsmith 后，合同审阅处理时间下降了 85%。
  sourceRefs:
  - 7
- point: Financial Times 把 Wordsmith 用在法务、合规和公司秘书工作上，说明买方希望买的是更广的工作流基础设施，而不是单点工具。
  sourceRefs:
  - 8
- point: Harbor 报告称，65% 的法务部门在过去 1-2 年里有意识地把工作留在内部，这与创业 thesis 直接同向。
  sourceRefs:
  - 12
openQuestions:
- 在目标 GC 里，到底有多大比例愿意买独立法务前门，而不是坚持要在现有 CLM 或事项栈上做扩展？
- 哪些请求类型能最快、也最有防御性地减少外部律所支出：NDA、供应商条款、隐私问卷，还是商务合同 redline？
- 要把零散的历史备忘录和 playbook 变成可靠的先例层，到底需要多少服务工作？
- 对英国和欧盟买家来说，这套工作流何时会因为内部 AI 治理要求而被视为高风险，以至于必须上私有模型或私有云？
