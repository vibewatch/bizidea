  pestle:
  - factor: 政治
    impact: neutral
    point: 英国政策层面对 AI 仍偏向鼓励创新，这有利于试验，但采购团队实际仍要自己拼接多家监管机构的要求。
    sourceRefs:
    - 30
  - factor: 经济
    impact: positive
    point: 法务部门正承受成本压力，也越来越不愿再把外部律所当作默认溢出阀门，这会强化“收回内部处理”的 thesis。
    sourceRefs:
    - 11
    - 12
    - 18
  - factor: 社会
    impact: positive
    point: 内部业务团队越来越期待更快、更嵌入式的法务支持，而不是看不见进度的 inbox 队列，这会把法务推向服务交付型模式。
    sourceRefs:
    - 4
    - 22
  - factor: 技术
    impact: positive
