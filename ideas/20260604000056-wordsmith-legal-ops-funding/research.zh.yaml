    - 8
  - friction: 现有工具疲劳与软件利用不足
    severity: 中
    affectedBuyer: 法务运营负责人
    mitigation: 把自己定位成横跨 email、协作和 CLM 系统的一层，而不是 rip-and-replace 平台。
    sourceRefs:
    - 5
    - 17
    - 25
  - friction: 对 AI 输出与治理缺乏信任
    severity: 高
    affectedBuyer: GC 和合规负责人
    mitigation: 把人保留在审批环里，公开先例与规则依据，并把模型治理和升级逻辑写清楚。
    sourceRefs:
    - 21
    - 29
    - 32
