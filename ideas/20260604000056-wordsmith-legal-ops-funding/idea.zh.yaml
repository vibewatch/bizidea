jobsToBeDone:
- job: 当销售、采购或隐私团队提交重复性法务请求时，帮内部法务团队先收齐关键信息，并把事项路由到正确的 playbook 或审核人，这样我们就能更快回应，也不用把常规工作送去律所。
  currentAlternative: 邮件分诊、表格队列，以及由律师或法务运营手工查找先例
  successMetric: 单个请求的中位响应时长，以及无需外部律所即可解决的事项占比
- job: 当 GC 需要削减外部律所支出时，帮我们看清哪些请求类型可以安全收回内部处理，这样就能在不抬高业务风险、也不压垮团队的前提下降低法务开支。
  currentAlternative: 年度律所账单、凭经验的事项复盘，以及手工预算测算
  successMetric: 每位律师对应的外部律所支出节省额，以及新增的内部事项处理能力
