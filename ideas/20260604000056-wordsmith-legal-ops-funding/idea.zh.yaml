problem: 跨国软件和互联网公司的精干内部法务团队，天天都被商业、隐私和采购类的常规问题淹没，这些请求通过 Slack、Teams、工单系统和 CRM 工作流持续涌进来。事实掌握在业务团队手里，过去的指导意见又散落在邮件线程、外部律所备忘录和零散的合同 playbook 里，于是法务不是重复回答同一个问题，就是把溢出的事项继续外包给昂贵的律所。结果是法务交付不可预测，收入合同和供应商 onboarding 变慢，GC 也没有一套干净的系统去判断哪些事该留在内部，哪些才真的需要专业律师介入。
targetUser:
  primary: 跨国 B2B 软件和数字平台公司里，负责法务运营的负责人，以及负责商业法务的管理者；这类公司通常内部法务团队精简。
  secondary: 负责重复性内部法务请求的隐私运营经理和采购法务。
  buyer: 承担削减外部律所支出任务的美国或英国科技公司 General Counsel 或 VP Legal。
startupThesis:
  nonObviousInsight: 下一个真正耐打的 legal tech 胜者，不是哪个模型更会起草条款，而是哪一层操作系统能先判断哪些流入事项可以安全地在内部处理、自动补齐缺失的业务事实，再把真正的例外打包给内部专家或外部律所。一旦法务请求进入 Slack、Teams 和 Salesforce 这类系统，路由纪律和先例复用的价值就会超过单纯的文本生成。
  beachhead: 美国和英国的 B2B 软件公司：有 5-25 家海外子公司、4-15 名内部律师、每年外部律所支出在 $500,000 到 $5 million 之间，而且销售、安全和供应商管理团队每月会发来 200 个以上商业、采购与隐私请求。
  wedge: 一套事项路由与先例复用 OS：从协作系统和 CRM 抓进站法务请求，向提交人补齐缺失事实，把事项匹配到已批准的内部 playbook 和过往外部律所意见，再给律师推送带置信度分数和升级路径的结构化建议。
  whyNowCatalyst: Wordsmith 的融资、500+ 客户基础，以及明确宣称要把工作从律所拉回企业内部，都说明法务部门现在既有预算，也拿到了管理层授权，愿意为扩充内部产能的软件买单，而不只是为“写得更快”买单。
  ventureScalePath: 先从重复出现的商业、采购和隐私请求切入，拿到一个清晰的产能切口；随后扩到诉讼 intake、劳动法升级事项、实体管理、外部律所 panel 选择、法务支出 benchmarking，最终变成企业法务服务交付的 system of record。
solution: 产品接入 Slack、Teams、Salesforce、Jira 和公司的文档系统，让业务用户在原本工作的地方就能发起法务请求。它会先把每个请求结构化成一个事项，在真正进入律师工作台前，补齐合同类型、客户分层、地域、数据类型、供应商关键性和截止时间等关键信息。系统随后把该事项与内部 playbook、过往批准过的条款立场，以及上传的外部律所建议进行比对，判断应该推荐内部直接处理、转给某位专家，还是有充分理由升级到外部。律师收到的是一个紧凑的事项包：请求事实、类似历史事项、建议的 fallback 话术或答复框架，以及为什么该事项应该留在内部或外包的业务依据。随着使用积累，公司会沉淀关于法务需求模式、响应时长和可避免外部支出的专有数据集，让编制规划、预算管理和 playbook 调优都更聪明。
goToMarketSeed:
  firstCustomer: 第一批客户应是总部在美国或英国的 SaaS 公司：ARR 在 $100 million 到 $1 billion 之间、至少 10 个国际法律实体、5-10 人的内部法务团队，并且在商业、供应商和隐私事项上反复把溢出工作交给外部律所。
  buyingTrigger: 触发点通常是 GC 在年度规划时被要求削减外部律所支出，或者企业级交易量突然上来，又或者组织重组后法务要覆盖更多区域和业务单元，但没有新增编制。
  currentAlternative: 现有替代方案通常是邮件和表格收案、共享 playbook、临时先例搜索、事项管理工具，以及承接溢出或专业问题的外部律所。
  switchingReason: 第一批客户愿意切换，是因为这个产品不要求法务把核心系统整套替换掉；它先给团队一个立刻能用的办法，去接住更多内部需求、把路由标准化，并用可审计的事项历史减少原本本可避免的律所账单。
  pricingHypothesis: 按活跃法务请求量和覆盖工作流数量收取年度 SaaS 平台费，另收 playbook 导入和系统集成的实施费。
