topRisks:
- name: 现有工作流厂商挤压
  description: 一旦这个切口被证明有价值，CLM、事项管理或更宽的法务 AI 厂商都可能补上基础 intake 和路由能力。
  mitigation: 先从跨系统事项路由和外部律所回迁分析切入——这些能力并不掌握在现有厂商手里——并优先集成进它们的栈，而不是一上来替代它们。
- name: 信任与责任风险
  description: 如果 GC 担心系统会把高风险事项路由错，或对先例置信度判断过头，就会抗拒自动化。
  mitigation: 对建议结果保留人工审批，公开底层先例与政策证据，并从低风险、重复性强的请求类型开始。
- name: Playbook 导入拖慢落地
  description: 早期客户的指导材料可能散落在旧备忘录、邮件和不一致的条款 playbook 里，导致价值实现变慢。
  mitigation: 先卖一条高频工作流，用服务方式清理 playbook，再把导入的外部律所意见作为初始推荐的数据种子。
