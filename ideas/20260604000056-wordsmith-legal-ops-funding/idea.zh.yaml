differentiator: 大多数法务 AI 产品比的是起草或合同审阅能力，而随着底层模型提升，这一层很快会趋同。这个公司不一样，它真正的核心资产是企业的“法务服务图谱”：哪些请求来自哪些团队、通常缺哪些事实、过去什么建议解决过类似事项、何时真的需要升级、又有哪些工作本来就该留在内部。这些跨工作流路由数据会随着每一次请求持续复利，让系统越来越有用，也让通用 copilot 或独立 CLM 厂商更难复制。
