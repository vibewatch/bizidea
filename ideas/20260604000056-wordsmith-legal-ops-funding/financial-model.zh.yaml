  name: 首个正式订阅 ACV
  value: '120'
  unit: USDK per year
  source: '[BP investorMemo.firstCustomer conversion to annual subscription]，取陈述区间 $80k-$120k 的高位，适用于能量化节省外部律所支出的跨国软件客户'
- id: A6
  name: 第二条工作流上线后的成熟客户 ACV
  value: '156'
  unit: USDK per year
  source: '[BP businessModel.expansionLevers]、[BP milestones 12-24 months]，并结合“第二条工作流上线 + 更高请求量区间”的创业财务经验假设'
- id: A7
  name: 客户爬坡
  value: 4 paying logos by M12, 10 by Q4Y2, 22 by Q4Y3
  unit: customers
  source: '[BP milestones]、[Research market.som]，以及创始人主导的企业法务销售经验假设'
