scenarios:
  downside:
    description: 更长的采购周期和更重的上线服务，把转化推迟，也让毛利率低于计划。
    y3RevenueK: 1940.0
    y3EbitdaK: -983.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
    - Q4Y3 付费客户收在 18 家，而不是 22 家。
    - 由于以服务驱动的先例导入持续更重，毛利率最终停在约 67%。
    - 第二条工作流扩张比基准情形晚了约两个季度。
  base:
    description: 创始人主导的试点按计划转化，onboarding 可以逐步产品化，而成熟账户会在第一年后扩到第二条工作流。
    y3RevenueK: 2366.0
    y3EbitdaK: -627.1
    cashLowPointK: 867.3
    keyAssumptionChanges:
    - 业务在 Y2 末达到 10 家付费客户，Y3 末达到 22 家。
    - 新 logo 从付费试点起步，再转成 $120K 的年度正式合同。
    - 成熟客户在第二条工作流或更高请求量区间上线后，ACV 提升到约 $156K。
  upside:
    description: 案例客户和合作伙伴转介绍加快新增 logo，而实施也变得更可复制。
    y3RevenueK: 2715.0
    y3EbitdaK: -335.0
    cashLowPointK: 1085.0
    keyAssumptionChanges:
    - Q4Y3 达到 24 家付费客户，而不是 22 家。
    - 第二条工作流扩张在第 3 年落得更快，抬高了账户混合收入。
    - 随着 onboarding 模板和先例导入标准化，毛利率升到 72%。
