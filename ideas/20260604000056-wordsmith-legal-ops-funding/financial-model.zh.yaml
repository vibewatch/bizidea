modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      FounderOutbound --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> ExpansionWorkflows
      ExpansionWorkflows --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下，公司到 Q4Y3 可做到 22 个付费法务团队；每个 logo 都先从付费试点起步，老客户再扩到第二条工作流。
- checkName: 必须成立的前提
  finding: onboarding 必须稳稳守在 45 天目标以内，否则服务投入会吃掉支撑新销售产能所需的毛利。
- checkName: 模型失效条件
  finding: 如果公司在 Y3 末低于 18 家客户，或毛利率滑向 67%，下行情形下的现金缓冲在下一轮融资前几乎会被吃完。
- checkName: 下轮融资证明点
  finding: 一旦公司证明自己能做到 8-10 家正式生产客户、可重复的 45 天 onboarding，以及至少 4 个第二条工作流扩张账户，seed 融资就会容易得多。
sanityChecks:
  ruleOf40: Y3 增长率 132.6% + EBITDA 利润率 -26.5% = 106.1%
  burnMultiple: Y2 净烧钱 $0.87M / 净新增收入 $0.76M = 1.14x；Y3 净烧钱 $0.63M / 净新增收入 $1.35M = 0.46x。
  revenuePerFte: Y3 每名 FTE 对应收入 $215K / 年末 11 名 FTE（SaaS 基准 $200-400K）
  flags:
  - 模型在 Y3 仍是负 EBITDA，因此下一轮融资依赖的是“扩张可重复”的证明，而不是短期盈利。
  - 维持 70% 毛利率的前提，是实施和先例导入在前几家客户之后显著变得可复制。
  - CAC 和流失率仍主要是经验假设，因为公司还没有真正跑出试点转化和续约 cohort。
