  source: '[BP date]'
- id: A2
  name: pre-seed 交割后起始现金
  value: '3200'
  unit: USDK
  source: '[BP fundingAsk $2-4M]，采用 $3.2M 的偏高位中值情景，用来覆盖 18 个月计划和额外 6 个月缓冲的经验法则'
- id: A3
  name: 付费客户起点（M1）
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months]'
- id: A4
