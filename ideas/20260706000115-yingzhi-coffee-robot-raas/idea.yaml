topRisks:
  - name: OEM bundling
    description: Robot vendors may extend their own dashboards into basic fleet-operations workflows and try to bundle the category.
    mitigation: Start as the vendor-neutral profitability and operating-assurance layer that combines venue data, consumables, and service workflows across systems the OEM does not own.
  - name: Category adoption volatility
    description: Beverage-robot rollouts could stay concentrated in a few regions or venue types, limiting the initial market.
    mitigation: Focus on operators already expanding beyond pilots and design the product to extend into adjacent unattended food and retail robots.
  - name: Messy field data
    description: Telemetry, cleaning confirmations, and service tickets may be incomplete or inconsistent across sites and vendors.
    mitigation: Launch with lightweight mobile workflows and a narrow integration contract, then deepen automation after proving value on uptime and stockout reduction.
