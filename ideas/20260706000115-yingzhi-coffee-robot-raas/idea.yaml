problem: >-
  Once a food-service operator deploys robotic beverage stations across dozens of sites, the hard part is no longer
  proving a robot can make one drink; it is keeping every unit stocked, sanitized, calibrated, and profitable every day.
  Operators today juggle OEM dashboards, refill spreadsheets, and manual cleaning logs, so a syrup stockout, missed
  sanitation cycle, or slow maintenance response can erase the labor savings that justified RaaS in the first place.
  Because these robots sell perishable ingredients rather than just hardware uptime, an operational miss shows up as
  lost revenue, food-safety risk, and churned locations at the same time.
targetUser:
  primary: >-
    Regional operations leaders at China-based concessionaires and campus-food operators running 15-40 unattended coffee
    or ice-cream robots across office towers, rail stations, or hospital lobbies
  secondary: >-
    Field service and QA managers responsible for refill routing, sanitation logs, and uptime SLAs across those robot
    sites
  buyer: >-
    COO or VP of operations at a multi-site unattended food-service operator
startupThesis:
  nonObviousInsight: >-
    The durable flywheel in restaurant robotics is not selling more arms; it is owning the operating data that links cup
    output, consumables, cleaning, and service to site renewals. Once RaaS removes upfront capex, the real bottleneck
    shifts to keeping distributed robot locations reliably stocked, sanitized, and margin-positive.
  beachhead: >-
    China-based concessionaires and campus-food operators rolling 15-40 unattended coffee or ice-cream robots across
    office towers, rail stations, and hospital lobbies under multi-site RaaS contracts
  wedge: >-
    A vendor-neutral fleet operations layer that turns robot telemetry, ingredient usage, and sanitation events into
    refill routing, maintenance dispatch, and site-level margin alerts
  whyNowCatalyst: >-
    Yingzhi XBOT's funding, 1,000-location footprint, and RaaS-plus-supplies pricing show beverage robots are shifting
    from novelty hardware into distributed operating networks that need control software.
  ventureScalePath: >-
    Start with beverage and dessert robots at dense urban sites, expand into all unattended food automation, then broader
    service-robot fleet operations where consumables, uptime, and compliance determine renewals.
solution: >-
  The product sits above OEM dashboards and ingests robot telemetry, sales volume, ingredient consumption, cleaning
  confirmations, and service tickets from every location. It predicts stockouts, missed sanitation windows, calibration
  drift, and low-margin sites before they become customer-visible failures. Ops teams get refill routes, maintenance
  priorities, and venue-by-venue profitability views instead of separate vendor portals and spreadsheets. Each robot
  also produces an auditable operating log for venue partners and internal QA, turning distributed robots into a managed
  network rather than a collection of gadgets.
goToMarketSeed:
  firstCustomer: >-
    A China-based office-park or transit-hub concessionaire that has signed a 10-20 unit coffee-robot rollout with one
    OEM and still manages refills, cleaning, and service escalation through spreadsheets and local staff
  buyingTrigger: >-
    Expansion from a successful pilot to a 10-plus site rollout, or a cluster of stockout, sanitation, or uptime misses
    that threatens venue renewals under a RaaS contract
  currentAlternative: >-
    OEM dashboards, spreadsheet-based refill planning, manual sanitation logs, and reactive field-service dispatch run by
    local operators or integrators
  switchingReason: >-
    The wedge gives one cross-site view of margin, compliance, and service risk, cutting truck rolls and failed audits
    without forcing the operator to replace its robot vendor
  pricingHypothesis: >-
    Subscription priced per active robot per month, with higher tiers tied to managed sites and automated field-service
    routing
