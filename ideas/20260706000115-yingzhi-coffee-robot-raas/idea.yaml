differentiator: >-
  Restaurant software vendors manage menus and labor, while robot OEMs expose machine-specific dashboards. This company
  owns the missing layer between them: vendor-neutral fleet economics and operating assurance for unattended food
  robots. Its moat compounds from location-level data linking cup output, consumable usage, sanitation behavior, service
  response, and renewals across site archetypes, which neither a single OEM nor a generic CMMS captures well.
