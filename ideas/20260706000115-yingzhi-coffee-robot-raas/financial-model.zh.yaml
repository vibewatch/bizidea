slug: beverage-robot-fleet-os
date: '2026-07-06'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: month
  source: '[BP date 2026-07-06；按创业财务经验法则，从计划日期后的第一个完整月份开始。]'
- id: A2
  name: 期初现金 / 种子前轮融资
  value: '1.5'
  unit: USDM
  source: '[BP fundingAsk.targetFundingRangeUsd $1.5-3M]；基础情形取区间下限，因为团队保持精简，P&L 也没有把上线费算进收入。'
- id: A3
  name: 模型里的客户单位
  value: 一个付费运营商账户或一个城市簇部署
  unit: definition
  source: '[BP investorMemo.firstCustomer] 和 [BP businessModel.unitOfValue]；合同由运营方签，但价格是按机器人赚出来的。'
- id: A4
  name: 第 1 年每个付费客户的平均机器人数
  value: '15'
  unit: robots per customer
  source: '[BP milestones 0-12 months] 预计共创客户各自管理 10-20 台机器人；基础情形取中位数。'
- id: A5
  name: 第 2 年每个付费客户的平均机器人数
  value: '20'
  unit: robots per customer
  source: '[BP milestones 12-24 months] 目标是托管 150-250 台机器人；若到 Q4Y2 有 10 家客户，基础情形隐含每家约 20 台。'
- id: A6
  name: 第 3 年每个付费客户的平均机器人数
  value: '25'
  unit: robots per customer
  source: '[research.market.som] 和 [research.bottomUpSizingDrivers] 把第 3 年基础情形建模成 20 家客户 × 每家 25 台机器人。'
- id: A7
  name: 试点阶段每台机器人月费
  value: '200'
  unit: USD per robot per month
  source: '[BP milestones 0-12 months] 和 [BP experimentRoadmap] 把付费试点价格带定在每台机器人每月 $150-$250；基础情形取中位数。'
- id: A8
  name: 第 1 年每客户混合年 ARPU
  value: '36.0'
  unit: USDK
  source: '[由 A4 和 A7 推出]，即 15 台机器人 × 每月 $200 × 12 个月。'
- id: A9
  name: 正式生产阶段每台机器人月费（第 2 年和第 3 年）
  value: '250'
  unit: USD per robot per month
  source: '[research.bottomUpSizingDrivers Software ARPU $250 per robot per month] 和 [BP market.som]。'
- id: A10
  name: 第 2 年每客户混合年 ARPU
  value: '60.0'
  unit: USDK
  source: '[由 A5 和 A9 推出]，即 20 台机器人 × 每月 $250 × 12 个月。'
- id: A11
  name: 第 3 年每客户混合年 ARPU
  value: '75.0'
  unit: USDK
  source: '[由 A6 和 A9 推出]，即 25 台机器人 × 每月 $250 × 12 个月，也正好对应研究里的 20 客户、$1.5M SOM。'
- id: A12
  name: 上线费的收入处理口径
  value: 基础 P&L 不计一次性上线和集成费
  unit: policy
  source: '[BP gtm.pricing] 里包含上线费，但基础情形不把它算进营收，以免把早期进展讲得过满。'
- id: A13
  name: 第 1 年客户爬坡
  value: M1-M12 的 customersEop = 0, 0, 0, 1, 1, 1, 2, 2, 2, 3, 3, 3
  unit: customers
  source: '[BP milestones 0-12 months] 和 [BP experimentRoadmap]；计划在第 10 个月前拿下 3 家付费共创客户，并带到年末。'
- id: A14
  name: 第 2 年和第 3 年客户爬坡
  value: Q1Y2-Q4Y3 的 customersEop = 4, 6, 8, 10, 12, 14, 17, 20
  unit: customers
  source: '[BP milestones] 和 [research.market.som]；到 Q4Y2 做到 10 家年约客户，到 Q4Y3 打到研究里的 20 客户 SOM。'
- id: A15
  name: 毛利率爬坡
  value: Y1 58%-68%, Y2 70%-74%, Y3 74%-75%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 75]；前 18 个月会被移动工作流搭建、本地部署和客户成功投入压低。'
- id: A16
  name: 单位经济模型里的稳态月流失率
  value: '1.8'
  unit: percent
  source: '[创业财务经验法则：这类运营与合规软件一旦嵌进去会很黏，但 OEM 捆绑和买家集中仍是实打实风险。]'
- id: A17
  name: 显式预测里的流失处理口径
  value: 到第 3 年结束前，基础预测不计客户流失
  unit: forecast policy
  source: '[创业财务经验法则]；早期增长按集中首批客户内部扩张来建模，流失风险放到单位经济模型、情景分析和风险旗标里单列，而不在基础 P&L 里对冲。'
- id: A18
  name: 每个付费运营商的混合 CAC
  value: '32.0'
  unit: USDK
  source: '[BP gtm.channels; BP gtm.funnelTargets; research.reportMemo.distributionChannels]；创始人主导销售叠加 OEM 与 FM 转介，CAC 会低于纯外拓式企业销售，但每次成交仍要做基线分析和试点设计。'
- id: A19
  name: 平均销售周期
  value: '4'
  unit: months
  source: '[BP experimentRoadmap] 和 [research.reportMemo.buyingTriggers]；基础情形按从摸底和基线评估到付费试点决定大约一个季度。'
- id: A20
  name: 全包年薪区间
  value: 创始人 / 产品运营 84；工程 96；实施 / 客户成功 60；GTM / OEM 合作 72；运营 / G&A 48
  unit: USDK per FTE-year
  source: '[创业财务经验法则：面向中国企业软件和现场运营创业公司的精简现金薪酬，含社保与用工负担。]'
- id: A21
  name: 招聘顺序
  value: M1 配创始人和创始工程师；M3 配实施；M6 配 GTM；M9 配第二位工程师；Q2Y2 配第二位实施；Q4Y2 配运营；Q2Y3 配第三位工程师；Q3Y3 配第二位 GTM
  unit: timing
  source: '[BP team] 和 [BP strategicChoices.sequencingRationale]；后续招聘按里程碑触发，是同一套节奏往后延。'
- id: A22
  name: 非薪资运营预算
  value: 第 1 年每月 S&M 4.0-7.0、R&D 6.0-9.0、G&A 3.0-5.0；第 2 年每季度 S&M 21-30、R&D 24-33、G&A 12-21；第 3 年每季度 S&M 33-45、R&D 36-45、G&A 18-27
  unit: USDK
  source: '[BP operations] 加上创业财务经验法则，覆盖中国本地部署、密集城市簇试点差旅、法律 / 数据治理工作和审计日志留存。'
- id: A23
  name: 收入确认方法
  value: 平均活跃客户数 × 混合年 ARPU
  unit: formula
  source: '[由 A8-A14 推出]；月度营收按月均活跃客户数算，季度营收按季度平均活跃客户数算。'
- id: A24
  name: 现金滚动简化
  value: EBITDA 近似等于经营现金流
  unit: policy
  source: '[创业财务经验法则：早期规划模型]；不单独展开债务、CAPEX、税和营运资金时差。'
- id: A25
  name: 本轮融资要到达的里程碑
  value: 做到 10 家年约客户、150-250 台托管机器人，并为第二 OEM 或甜品扩张留出 6 个月缓冲
  unit: milestone
  source: '[BP milestones 12-24 months]、[BP fundingAsk] 和建模指令，要求把本轮资金配到下一个里程碑外加 6 个月缓冲。'
- id: A26
  name: 第 2 年和第 3 年的季度薪资平滑方法
  value: 薪资费用在 q4y1、q4y2 和 q4y3 的人数快照之间按季度平滑抬升
  unit: method
  source: '[建模指令]；Y2 和 Y3 的六列人数表格用的是年末快照，所以季度薪资按计划招聘时间平滑处理。'
