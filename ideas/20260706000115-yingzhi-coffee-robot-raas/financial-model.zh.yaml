scenarios:
  downside:
    description: OEM 和 FM 转介转化更慢，正式生产定价落在每台机器人每月 $220 左右，毛利率也只摸到约 70%。
    y3RevenueK: 825.0
    y3EbitdaK: -451.5
    cashLowPointK: 95.21
    keyAssumptionChanges:
    - Q4Y3 的客户数从 20 家滑到 16 家。
    - 第 3 年混合 ARPU 从每客户 $75K 降到 $66K。
    - 稳态毛利率停在 70%，而不是 75%。
  base:
    description: 主模型打到研究里的 20 客户 SOM，正式生产定价每台机器人每月 $250，目标毛利率 75%。
    y3RevenueK: 1087.51
    y3EbitdaK: -215.44
    cashLowPointK: 331.27
    keyAssumptionChanges:
    - Q4Y3 做到 20 家付费运营商账户。
    - 正式生产定价维持在每台机器人每月 $250。
    - 随着实施流程更可复制，毛利率爬到 75%。
  upside:
    description: 试点扩张来得更快，高级模块把实际价格再往上抬，而工作流引擎复用度也足以把毛利率推过目标。
    y3RevenueK: 1361.25
    y3EbitdaK: 5.55
    cashLowPointK: 489.26
    keyAssumptionChanges:
    - Q4Y3 的客户数从 20 家升到 24 家。
    - 第 3 年混合 ARPU 通过基准和合规 upsell 提升到每客户 $82.5K。
    - 稳态毛利率达到 76%。
sensitivity:
- variable: ARPU
  downsideCase: 每台机器人每月 $220 的正式生产价格
  baseCase: 每台机器人每月 $250 的正式生产价格
  upsideCase: 叠加高级基准和合规 upsell 后做到 $275
  y3RevenueImpactK: -130.51
  cashImpactK: -95.81
- variable: CAC
  downsideCase: 每家付费运营商的混合 CAC 升到 $40K
  baseCase: 每家付费运营商的混合 CAC 为 $32K
  upsideCase: OEM 和 FM 转介更强时，CAC 降到 $24K
  y3RevenueImpactK: 0.0
  cashImpactK: -160.0
- variable: 流失率
  downsideCase: 转成正式生产后，月度客户流失率为 3.0%
  baseCase: 月度客户流失率为 1.8%
  upsideCase: 事实底账黏性更强时，月度客户流失率降到 1.0%
  y3RevenueImpactK: -112.51
  cashImpactK: -82.31
- variable: 销售周期
  downsideCase: 从摸底到付费试点需要 6 个月
  baseCase: 4 个月
  upsideCase: 合作伙伴引荐可复制后缩短到 3 个月
  y3RevenueImpactK: -159.38
  cashImpactK: -117.47
- variable: 毛利率
  downsideCase: 由于集成仍偏手工，稳态毛利率为 70%
  baseCase: 目标毛利率 75%
  upsideCase: 遥测映射更干净、合作伙伴派单复用更高时做到 78%
  y3RevenueImpactK: 0.0
  cashImpactK: -52.31
