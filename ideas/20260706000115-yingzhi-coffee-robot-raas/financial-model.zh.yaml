modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Rollouts[Dense city-cluster rollouts] --> Customers[Paying operator accounts]\n  Customers --> Robots[Managed robots per account]\n  Robots --> Revenue[Per-robot subscription revenue]\n  Revenue --> GrossProfit[Gross profit after hosting and support]\n  GrossProfit --> Cash[Ending cash after opex]\n"
modelSanity:
- checkName: 营收引擎
  finding: 基础情形到第 3 年约 $1.09M 的营收，靠的是把 3 个付费试点转成 20 家年约客户，并把平均机器人密度从 15 台提到 25 台，同时维持研究里的每台机器人每月 $250 ARPU。
- checkName: 必须跑通的前提
  finding: OEM 或运营方的数据获取必须好到足以让 90 天试点证明上门车次或断货节省；因为模型默认客户会持续转化，不会在长时间的定制集成里卡住。
- checkName: 模型会在哪些情况下断
  finding: 只要正式生产定价掉到每台机器人 $220，或公司到第 3 年末只做到约 16 家客户，下行情形就会把营收压向 $0.83M，现金低点也会逼近约 $0.10M。
- checkName: 下一轮融资依据
  finding: 下一轮融资的依据，是在 Y2 结束时做到 10 家年约客户、150-250 台托管机器人，并至少跑出一个第二簇或第二 OEM 扩张，证明这条切口能跳出最窄的首个滩头市场。
sanityChecks:
  ruleOf40: Y3 growth 195.92% + EBITDA margin -19.81% = 176.11%.
  burnMultiple: Y2 burn multiple is about 0.98x on roughly $492.0K of net new ARR; Y3 improves to about 0.24x on roughly $900.0K of net new ARR.
  revenuePerFte: 按 Q4Y3 的 9 名 FTE 计，第 3 年人均营收为 $120.83K（新兴 SaaS 常见基准约 $200-400K）。
  flags:
  - 第 3 年退出时的 ARR 已接近研究里的初始 SOM，所以种子轮故事仍得靠第二 OEM 或甜品形态扩张，而不只是多铺几个办公咖啡城市簇。
  - 基础 P&L 假设到第 3 年都没有客户流失；如果早期锚客户丢掉一家，现金会比表面那条烧钱倍数暗示得更快见底。
  - 到第 3 年，人均营收依然低于经典 SaaS 基准，因为产品还背着实施和合规工作流负担。
  - 现金缓冲看起来健康，只是因为模型按种子前轮区间下限融资，且没把上线费算进来；一旦合规定制更重或服务工作更深，这块缓冲会被很快吃掉。
