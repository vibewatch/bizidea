modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Rollouts[Dense city-cluster rollouts] --> Customers[Paying operator accounts]
      Customers --> Robots[Managed robots per account]
      Robots --> Revenue[Per-robot subscription revenue]
      Revenue --> GrossProfit[Gross profit after hosting and support]
      GrossProfit --> Cash[Ending cash after opex]
modelSanity:
  - checkName: Revenue engine
    finding: The base case only reaches about $1.09M of Y3 revenue by turning 3 paid pilots into 20 annual customers and expanding average robot density from 15 to 25 at the researched $250 monthly robot ARPU.
  - checkName: Must go right
    finding: OEM or operator data access has to be good enough for 90-day pilots to prove truck-roll or stockout savings, because the model assumes customers keep converting without a long custom-integration pause.
  - checkName: Model breaks if
    finding: If production pricing settles near $220 per robot or the business exits Y3 with only about 16 customers, the downside case pushes revenue toward $0.83M and cash toward a roughly $0.10M low point.
  - checkName: Next-round proof
    finding: The next financing is justified by exiting Y2 with 10 annual customers, 150-250 robots under management, and at least one second-cluster or second-OEM expansion that shows the wedge can escape its narrow first beachhead.
sanityChecks:
  ruleOf40: Y3 growth 195.92% + EBITDA margin -19.81% = 176.11%.
  burnMultiple: Y2 burn multiple is about 0.98x on roughly $492.0K of net new ARR; Y3 improves to about 0.24x on roughly $900.0K of net new ARR.
  revenuePerFte: $120.83K Y3 using 9 Q4Y3 FTE (benchmark roughly $200-400K for emerging SaaS).
  flags:
    - Year-3 exit ARR of about $1.5M already touches the researched initial SOM, so the seed story still depends on second-OEM or dessert-format expansion rather than just more office-coffee clusters.
    - The base P&L assumes no logo churn through Y3; a single early anchor-customer loss would compress cash much faster than the headline burn multiple suggests.
    - Revenue per FTE remains below classic SaaS benchmarks because the product still carries implementation and compliance workflow load through Year 3.
    - The cash cushion looks healthy only because the model uses the low-end pre-seed raise and excludes onboarding-fee revenue; extra compliance customization or heavier services work would erode that buffer quickly.
