slug: beverage-robot-fleet-os
date: "2026-07-06"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-08"
    unit: month
    source: '[BP date 2026-07-06; startup-finance heuristic to start in the first full month after the plan date].'
  - id: A2
    name: Opening cash / pre-seed raise
    value: '1.5'
    unit: USDM
    source: '[BP fundingAsk.targetFundingRangeUsd $1.5-3M]; the base case uses the low end because the team stays lean and the P&L excludes onboarding fees.'
  - id: A3
    name: Customer unit in the model
    value: one paying operator account or city-cluster deployment
    unit: definition
    source: '[BP investorMemo.firstCustomer] and [BP businessModel.unitOfValue]; contracts are signed by operators even though price is earned per robot.'
  - id: A4
    name: Average robots per paying customer in Year 1
    value: '15'
    unit: robots per customer
    source: '[BP milestones 0-12 months] calls for design partners managing 10-20 robots each; the base case uses the midpoint.'
  - id: A5
    name: Average robots per paying customer in Year 2
    value: '20'
    unit: robots per customer
    source: '[BP milestones 12-24 months] targets 150-250 robots under management; with 10 customers by Q4Y2, the base case implies about 20 robots per customer.'
  - id: A6
    name: Average robots per paying customer in Year 3
    value: '25'
    unit: robots per customer
    source: '[research.market.som] and [research.bottomUpSizingDrivers] model the year-3 base case as 20 customers × 25 robots each.'
  - id: A7
    name: Pilot monthly price per robot
    value: '200'
    unit: USD per robot per month
    source: '[BP milestones 0-12 months] and [BP experimentRoadmap] target a paid pilot in the $150-$250 per robot per month band; the base case uses the midpoint.'
  - id: A8
    name: Year 1 blended annual ARPU per customer
    value: '36.0'
    unit: USDK
    source: '[Derived from A4 and A7] as 15 robots × $200 per month × 12 months.'
  - id: A9
    name: Production monthly price per robot in Year 2 and Year 3
    value: '250'
    unit: USD per robot per month
    source: '[research.bottomUpSizingDrivers Software ARPU $250 per robot per month] and [BP market.som].'
  - id: A10
    name: Year 2 blended annual ARPU per customer
    value: '60.0'
    unit: USDK
    source: '[Derived from A5 and A9] as 20 robots × $250 per month × 12 months.'
  - id: A11
    name: Year 3 blended annual ARPU per customer
    value: '75.0'
    unit: USDK
    source: '[Derived from A6 and A9] as 25 robots × $250 per month × 12 months, which matches the researched $1.5M SOM at 20 customers.'
  - id: A12
    name: Revenue treatment for onboarding fees
    value: Base P&L excludes one-time onboarding and integration fees
    unit: policy
    source: '[BP gtm.pricing] includes onboarding fees, but the base case omits them so revenue stays tied directly to customers × ARPU and early traction is not overstated.'
  - id: A13
    name: Year 1 customer ramp
    value: M1-M12 customersEop = 0, 0, 0, 1, 1, 1, 2, 2, 2, 3, 3, 3
    unit: customers
    source: '[BP milestones 0-12 months] and [BP experimentRoadmap]; the plan lands 3 paid design partners by month 10 and carries them through year-end.'
  - id: A14
    name: Year 2 and Year 3 customer ramp
    value: Q1Y2-Q4Y3 customersEop = 4, 6, 8, 10, 12, 14, 17, 20
    unit: customers
    source: '[BP milestones] and [research.market.som]; the ramp reaches 10 annual customers by Q4Y2 and the researched 20-customer SOM by Q4Y3.'
  - id: A15
    name: Gross margin ramp
    value: Y1 58%-68%, Y2 70%-74%, Y3 74%-75%
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 75] with early mobile-workflow setup, local hosting, and customer-success effort depressing the first 18 months.'
  - id: A16
    name: Steady-state monthly churn for unit economics
    value: '1.8'
    unit: percent
    source: '[startup-finance heuristic: sticky but still-early operations and compliance software] because customers should stay once embedded, but OEM bundling and narrow buyer concentration remain real risks.'
  - id: A17
    name: Explicit forecast churn policy
    value: No logo churn modeled through Year 3
    unit: forecast policy
    source: '[startup-finance heuristic] early growth is modeled as expansion inside a concentrated first cohort; churn risk is surfaced in unit economics, scenarios, and sanity flags instead of netting it inside the base P&L.'
  - id: A18
    name: Blended CAC per paying operator
    value: '32.0'
    unit: USDK
    source: '[BP gtm.channels; BP gtm.funnelTargets; research.reportMemo.distributionChannels] founder-led sales plus OEM and FM referrals should keep CAC below a pure outbound enterprise motion, but each win still needs baseline analysis and pilot design.'
  - id: A19
    name: Average sales cycle
    value: '4'
    unit: months
    source: '[BP experimentRoadmap] and [research.reportMemo.buyingTriggers]; the base case assumes roughly one quarter from discovery and baseline work to a paid pilot decision.'
  - id: A20
    name: Loaded annual salary bands
    value: Founder / product-ops 84; engineering 96; implementation / customer success 60; GTM / OEM partnerships 72; ops / G&A 48
    unit: USDK per FTE-year
    source: '[startup-finance heuristic: lean China enterprise-software and field-ops startup cash compensation including payroll burden].'
  - id: A21
    name: Hiring sequence
    value: Founder and founding engineer at M1; implementation at M3; GTM at M6; second engineer at M9; second implementation in Q2Y2; ops in Q4Y2; third engineer in Q2Y3; second GTM in Q3Y3
    unit: timing
    source: '[BP team] and [BP strategicChoices.sequencingRationale]; later hires are milestone-gated extensions of the same sequencing logic.'
  - id: A22
    name: Non-payroll operating budgets
    value: Y1 monthly S&M 4.0-7.0, R&D 6.0-9.0, G&A 3.0-5.0; Y2 quarterly S&M 21-30, R&D 24-33, G&A 12-21; Y3 quarterly S&M 33-45, R&D 36-45, G&A 18-27
    unit: USDK
    source: '[BP operations] plus startup-finance heuristic for China-local hosting, travel to dense-cluster pilots, legal / data-governance work, and audit-log retention.'
  - id: A23
    name: Revenue recognition method
    value: Average active customers × blended annual ARPU
    unit: formula
    source: '[Derived from A8-A14]; monthly revenue uses average monthly active customers and quarterly revenue uses average quarterly active customers.'
  - id: A24
    name: Cash roll-forward simplification
    value: EBITDA approximates operating cash flow
    unit: policy
    source: '[startup-finance heuristic: early-stage planning model] with no debt, capex, taxes, or material working-capital timing modeled separately.'
  - id: A25
    name: Funding milestone for the modeled round
    value: Reach 10 annual customers, 150-250 robots under management, and six months of buffer into second-OEM or dessert expansion
    unit: milestone
    source: '[BP milestones 12-24 months], [BP fundingAsk], and the Financial Modeler instruction to size the round to the next milestone plus 6 months of buffer.'
  - id: A26
    name: Quarterly payroll smoothing in Year 2 and Year 3
    value: Salary expense ramps gradually between the q4y1, q4y2, and q4y3 headcount snapshots
    unit: method
    source: '[Financial Modeler instructions] the six-column headcount schema uses year-end snapshots for Y2 and Y3, so quarterly salary expense is smoothed to the nearest planned hire timing.'
