scenarios:
  downside:
    description: OEM and FM referrals convert more slowly, production pricing settles closer to $220 per robot per month, and margin tops out near 70%.
    y3RevenueK: 825.0
    y3EbitdaK: -451.5
    cashLowPointK: 95.21
    keyAssumptionChanges:
      - Q4Y3 customer count slips from 20 to 16.
      - Year-3 blended ARPU falls from $75K to $66K per customer.
      - Steady-state gross margin stalls at 70% instead of 75%.
  base:
    description: The main model reaches the researched 20-customer SOM with $250 production pricing and a 75% gross-margin target.
    y3RevenueK: 1087.51
    y3EbitdaK: -215.44
    cashLowPointK: 331.27
    keyAssumptionChanges:
      - Q4Y3 reaches 20 paying operator accounts.
      - Production pricing holds at $250 per robot per month.
      - Gross margin ramps to 75% as implementation becomes more repeatable.
  upside:
    description: Pilot expansion lands faster, premium modules lift realized price, and the workflow engine reuses enough logic to push gross margin above target.
    y3RevenueK: 1361.25
    y3EbitdaK: 5.55
    cashLowPointK: 489.26
    keyAssumptionChanges:
      - Q4Y3 customer count rises from 20 to 24.
      - Year-3 blended ARPU climbs to $82.5K per customer through benchmark and compliance upsell.
      - Steady-state gross margin reaches 76%.
