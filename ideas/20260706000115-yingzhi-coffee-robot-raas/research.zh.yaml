competitors:
- name: COFE+ / Hi-Dolphin
  stage: scale-up
  wedge: 面向中国及海外公共场景的一体化咖啡机器人和无人零售栈。
  pricing: 未公开披露。
  strength: 宣称场景覆盖广、单次补货可支撑 300 杯、且一名运营员能管 5-10 台售卖亭。
  weaknessVsUs: 封闭栈，绑定自家机器和工作流，而不是厂商中立的控制层。
  sourceRefs:
  - 13
  - 14
  - 15
- name: RobotAnno
  stage: scale-up
  wedge: 面向机场、商场、医院和城市点位的咖啡 + 冰淇淋售卖亭自动化。
  pricing: 未公开披露。
  strength: 同时覆盖咖啡和冰淇淋自动化，并有中国机场和城市案例。
  weaknessVsUs: 产品以单厂商形态为主，并没有把自己定位成跨 OEM 的车队经济账软件。
  sourceRefs:
  - 16
  - 17
- name: Pudu Robotics
  stage: incumbent
  wedge: 具备远程管理和开放平台能力的大型服务机器人 OEM。
  pricing: 未公开披露。
  strength: 装机基数大，API 能力也足够往饮品机器人运营这类相邻场景延伸。
  weaknessVsUs: 不是为饮品场景而做，底层逻辑仍然锚在 Pudu 自家硬件和生态里。
  sourceRefs:
  - 18
  - 19
- name: Crown Digital / ELLA
  stage: scale-up
  wedge: 从售卖亭、App 到酒店落地模型的端到端机器人咖啡师形态。
  pricing: 未公开披露。
  strength: 饮品场景体验扎实，且是紧耦合的一体化无人服务形态。
  weaknessVsUs: 单厂商栈，不太适合中国多 OEM 车队。
  sourceRefs:
  - 20
- name: MaintainX
  stage: scale-up
  wedge: 带集成能力和移动工作流的通用维护与资产运营层。
  pricing: 有公开定价页；企业版需询价。
  strength: 集成能力、技师工作流工具和熟悉的企业软件销售动作都很强。
  weaknessVsUs: 通用 CMMS 逻辑不会去管饮品配方、耗材消耗、卫生窗口或点位级单位经济模型。
  sourceRefs:
  - 21
  - 22
regulatoryTechnicalConstraints:
- point: 现制饮品机器人看起来并不落在全国统一的单一许可桶里，所以不同城市、不同场景的食品经营解释会直接影响落地。
  sourceRefs:
  - 24
  - 25
  - 26
  - 27
- point: 任何面向顾客的数据、支持日志和敏感标识，都得在中国数据规则下做到最小化、本地治理和可审计。
  sourceRefs:
  - 23
  - 29
- point: 卫生、纠偏和服务事件日志，最好被当成事实底账长期保存，而不是继续散在临时表格里。
  sourceRefs:
  - 27
  - 29
  - 30
- point: 不同 OEM 的遥测开放度差异很大，所以创业公司在做深自动化前，必须先能容忍厂商导出和数据结构杂乱。
  sourceRefs:
  - 18
  - 19
  - 22
  - 28
validationSignals:
- point: Yingzhi 表示，其咖啡和冰淇淋机器人已部署在 1,000 多个点位，累计出杯超过 400 万。
  sourceRefs:
  - 1
  - 2
- point: COFE+ 声称一名员工可管理 5-10 台售卖亭，且一次补货能支撑约 300 杯，说明分布式运营复杂度是真存在的。
  sourceRefs:
  - 13
  - 14
- point: 像 Sodexo 这样的运营方，本来就横跨 1,000+ 个中国点位，刚好覆盖这条滩头市场涉及的场景。
  sourceRefs:
  - 6
- point: 中国咖啡需求和品牌门店增长都已经足够大，说明这条切口是站在真实品类上，不是在硬造一个市场。
  sourceRefs:
  - 7
  - 8
  - 10
  - 11
openQuestions:
- 中国有多少支 10 台以上的饮品机器人车队，已经能在不惹怒 OEM 的前提下，把遥测或 API 数据开放给第三方叠加层？
- 医院、校园、办公园区和交通枢纽里的现制饮品机器人，地方 SAMR 到底走哪条许可或备案路径？
- 不同场景里，15-40 台车队的真实补货工时、上门车次和正常运行指标分别是多少？
- 厂商中立在第一天就重要，还是得等运营方开始跨城市、跨形态混用 OEM 以后才真正变成痛点？
- 哪一种 ROI 叙事最容易拿到预算：上门车次下降、卫生保障、断货减少，还是场地方续约保护？
