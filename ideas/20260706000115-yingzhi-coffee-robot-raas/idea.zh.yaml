problem: 餐饮运营方一旦把机器人饮品点位铺到几十个，难点就不再是证明机器人能做出一杯饮料，而是每天都把每台机器补满、洗净、校准好，还得跑出正毛利。现在的运营方还在 OEM 后台、补货表格和手工清洁记录之间来回切，所以糖浆断货、错过清洁周期、维护响应过慢，都会把当初选择 RaaS 的那点省人收益吃掉。更麻烦的是，这类机器人卖的是会过期的原料，不只是设备正常运行时长；一次运营失手，会同时变成收入流失、食安风险和点位流失。
targetUser:
  primary: 在中国管理 15-40 台无人值守咖啡或冰淇淋机器人、覆盖写字楼、轨交站点或医院大堂的区域运营负责人
  secondary: 负责这些机器人点位补货路线、清洁日志和正常运行 SLA 的现场服务与 QA 经理
  buyer: 多点位无人值守餐饮运营商的 COO 或运营 VP
startupThesis:
  nonObviousInsight: 餐饮机器人里真正能滚起来的飞轮，不是多卖几条机械臂，而是掌握那套把出杯量、耗材、清洁和服务跟点位续约连起来的运营数据。RaaS 把前期硬件 CAPEX 拿掉后，真正卡住的就变成：怎么让分布式机器人点位持续不断货、清洁达标、而且毛利为正。
  beachhead: 在中国以多点位 RaaS 合同运营 15-40 台无人值守咖啡或冰淇淋机器人的餐饮承包商与校园餐饮运营方，场景集中在写字楼、轨交站点和医院大堂。
  wedge: 一层厂商中立的车队运营系统，把机器人遥测、原料消耗和清洁事件翻成补货路线、维护派单和点位毛利预警。
  whyNowCatalyst: Yingzhi XBOT 的融资、1,000 个点位规模，以及 RaaS + 耗材定价都说明，饮品机器人正从新奇硬件变成分布式运营网络，开始需要单独的控制软件。
  ventureScalePath: 先从饮品和甜品机器人切入城市高密场景，再往所有无人值守餐饮自动化扩，最后再延到更广的服务机器人车队——只要续约是由耗材、正常运行时长和合规决定，这套逻辑都能用。
solution: 产品压在 OEM 后台之上，吃进每个点位的机器人遥测、销量、原料消耗、清洁确认和服务工单，提前预判断货、错过清洁窗口、校准漂移和低毛利点位，在顾客感知之前把问题拦住。运营团队看到的不再是分散的厂商后台和表格，而是补货路线、维护优先级和逐点位盈利视图。每台机器人还会留下可审计的运营日志，方便场地方和内部 QA 查验，让分散的机器人真正像一张被管理的网络，而不是一堆设备。
goToMarketSeed:
  firstCustomer: 一家中国写字楼园区或交通枢纽餐饮承包商，刚和单一 OEM 签下一轮 10-20 台咖啡机器人的铺点，但补货、清洁和服务升级仍靠表格和本地人员在扛。
  buyingTrigger: 一个试点开始扩成 10 个以上点位的铺点，或连续的断货、卫生、正常运行时长问题，开始威胁场地方续约。
  currentAlternative: OEM 后台、按周排的补货表，以及现场团队手工记的清洁日志
  switchingReason: 这套切口能给运营方一张跨点位的利润、合规和服务风险总盘，让他们少跑冤枉路、少吃罚单，也不用为了上系统就把现有机器人厂商换掉。
  pricingHypothesis: 按每台活跃机器人每月订阅收费；更高档位再按托管点位数和自动化现场派单能力加价。
