differentiator: 餐饮软件厂商管的是菜单和人力，机器人 OEM 给的是单机后台。缺的那一层，是跨厂商的车队经济账和无人值守餐饮的运营兜底。这家公司补的正是这层。它的护城河会随着点位数据越滚越厚：出杯量、耗材消耗、清洁行为、服务响应和续约结果，会在不同场景类型之间连成一套基准数据；单一 OEM 和通用 CMMS 都很难补齐。
