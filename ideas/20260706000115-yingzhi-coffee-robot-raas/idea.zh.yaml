topRisks:
- name: OEM 捆绑
  description: 机器人厂商可能把自家的后台继续往基础车队运营工作流上做，试图把这个品类一起打包卖掉。
  mitigation: 先把自己钉成厂商中立的利润和运营兜底层，把场地方数据、耗材和服务工作流跨系统接起来，做 OEM 自己并不掌握的那部分。
- name: 品类渗透波动
  description: 饮品机器人铺点可能长期只集中在少数地区或少数场景，早期市场容易偏窄。
  mitigation: 先盯住那些已经准备从试点往外扩的运营方，并把产品设计成能顺手延到相邻的无人值守餐饮和零售机器人。
- name: 一线数据脏乱
  description: 各点位、各厂商的遥测、清洁确认和服务工单，可能都不完整，也不一致。
  mitigation: 先用轻量移动工作流和窄集成合同起步，等证明能改善正常运行时长和断货率后，再把自动化一步步做深。
