jobsToBeDone:
- job: 当餐饮承包商把饮品机器人从一个试点扩到几十个点位时，帮运营负责人把每台设备都补满、洗净、随时能修，这样他们在不把经理拖进救火模式的前提下，也能守住 RaaS SLA。
  currentAlternative: OEM 后台 + 表格版补货和清洁排班
  successMetric: 车队正常运行时长、断货率，以及单台机器人每月服务成本
- job: 当某个场地方准备因为销量或质量下滑而砍掉机器人时，帮现场服务负责人迅速看清问题到底出在需求、耗材、清洁还是维护，好在合同流失前把点位救回来。
  currentAlternative: 客户投诉之后再做人工巡点和被动派单
  successMetric: 问题点位恢复所需天数，以及场地方续约率
