  strength: Large installed base and APIs that could extend into adjacent beverage-robot operations.
  weaknessVsUs: Not beverage-specific and still anchored to Pudu hardware and ecosystem logic.
  sourceRefs:
  - 18
  - 19
- name: Crown Digital / ELLA
  stage: scale-up
  wedge: End-to-end robot barista format with kiosk, app, and hospitality deployment model.
  pricing: Not disclosed publicly.
  strength: Beverage-specific UX and a tightly integrated unattended service format.
  weaknessVsUs: Single-vendor stack and less suited to multi-OEM China fleets.
  sourceRefs:
  - 20
