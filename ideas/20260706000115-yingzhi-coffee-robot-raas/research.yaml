  validationPlan:
  - priority: high
    question: How many target operators already run 10-40 beverage robots and can expose daily telemetry, refill, and cleaning data quickly enough for a pilot?
    evidenceToGather: Collect data samples and org maps from 8-10 concessionaire or campus-ops prospects plus 3-5 OEM partners.
  - priority: high
    question: What local permit or filing path actually applies to fresh beverage robots in hospitals, campuses, office parks, and transit hubs?
    evidenceToGather: Document local SAMR interpretations and signed compliance checklists from at least three city pilots.
  - priority: medium
    question: 'Which KPI unlocks budget fastest: truck-roll reduction, stockout reduction, sanitation audit pass rate, or venue renewal risk?'
    evidenceToGather: Run before/after scorecards on 3-5 design-partner fleets and tie results to finance-owner review.
