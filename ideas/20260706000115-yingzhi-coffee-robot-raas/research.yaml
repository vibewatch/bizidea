  stage: scale-up
  wedge: Coffee plus ice-cream kiosk automation for airports, malls, hospitals, and urban sites.
  pricing: Not disclosed publicly.
  strength: Multi-category beverage automation with live China airport and urban case studies.
  weaknessVsUs: Product-led and vendor-specific; it does not position as cross-OEM fleet economics software.
  sourceRefs:
