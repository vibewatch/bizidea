openQuestions:
- How many China beverage-robot fleets above 10 units already expose telemetry or API data that a third-party overlay can ingest without OEM resistance?
- Which local permit or filing path do SAMR bureaus actually apply to fresh beverage robots in hospitals, campuses, office parks, and transit hubs?
- What are real refill labor hours, truck-roll rates, and uptime metrics across 15-40 robot fleets by venue type?
- Does vendor-neutrality matter on day one, or only once operators start mixing robot OEMs across cities and formats?
- 'Which ROI frame wins budget fastest: truck-roll reduction, sanitation assurance, stockout avoidance, or venue-renewal protection?'
