topRisks:
- name: 证据源太薄
  description: 这个品类的判断几乎来自一篇文章，所以实际工作流结构，以及商家把执行权交给 AI 的意愿，可能都没标题看起来那么成熟。
  mitigation: 先从一条异常队列的人在回路自动化做起，用可量化的积压下降去卖，而不是一上来就承诺全自治。
- name: 集成拖累
  description: 每个商家的帮助台、3PL、承运商和退货栈都可能不同，这会拖慢导入上线，也会压缩毛利。
  mitigation: 先把范围收在 Shopify Plus 加一个帮助台、一个退货平台，等部署模板跑通后再扩连接器。
- name: 政策与退款错误
  description: 如果误批了退货、补发或承运商索赔，不仅省不下钱，还会伤害客户信任。
  mitigation: 高风险案例继续卡在置信度阈值后面，保留完整审计轨迹，并在任何自治动作前要求商家先把政策配清楚。
