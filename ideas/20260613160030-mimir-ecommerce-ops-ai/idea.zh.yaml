jobsToBeDone:
- job: 促销期或承运商出问题后，售后工单会一下子堆起来。我们需要系统能自动完成正确的订单或配送动作，让运营团队清掉积压，而不是继续加客服。
  currentAlternative: 人工客服靠宏模板和手工清单，在帮助台、Shopify 和承运商后台之间复制信息。
  successMetric: 售后异常的自动化解决率，以及结案中位时长。
- job: 客户申请退货、补发或查询退款进度时，我们需要系统按正确政策触发下一步动作，让 CX 团队既能守住毛利，也能尽快结案。
  currentAlternative: 人工查政策，再到退货工具、表格以及财务或仓库交接环节里逐步执行。
  successMetric: 更少的退款流失、更低的政策错误率，以及更快的退货周期结案速度。
