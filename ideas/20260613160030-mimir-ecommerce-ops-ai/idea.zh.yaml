problem: 有一定跨境体量的 Shopify Plus 品牌，处理大多数售后异常时，客服仍要在帮助台、Shopify 后台、承运商后台、退货工具和表格之间来回切。地址变更、配送延迟、退货资格、补发订单、退款进度这些工单，表面看很重复，真做起来却要按政策跨多个系统执行。结果就是客服成本高、处理变慢，运营失误还会直接吃掉毛利、拉低复购。
targetUser:
  primary: 负责跨境售后支持的 Shopify Plus 品牌运营副总裁或客户体验副总裁
  secondary: 负责订单异常、承运商升级和退货流程的电商运营经理
  buyer: 首席运营官、运营副总裁 或 客户体验副总裁
startupThesis:
  nonObviousInsight: 下一家能做久的电商 AI 公司，不会是另一个前台导购助手。眼下更大的切口，在售后对话背后的执行层：这里工单量已经够大、政策边界也清楚，慢处理和乱处理带来的成本流失还很好量化。
  beachhead: 英国和欧洲的 Shopify Plus 时尚、美妆、家居品牌——每月至少发 10,000 单、覆盖至少 2 个国家，并长期有 WISMO、地址修改、配送延迟和退货状态工单。
  wedge: 一套异常处理自动驾驶：读懂帮助台对话、核对商家政策，然后在商家现有系统里完成已获批准的订单修改、承运商升级、退货授权、补发申请和退款状态更新。
  whyNowCatalyst: Mimir 的融资、每月 250,000 段对话量、跨国覆盖，以及它从客服工单继续往外扩，说明品牌现在准备买的已经不是“少回几句消息”的软件，而是真能跑工作流的执行软件。
  ventureScalePath: 先从售后异常处理切进去，再扩到退货处置、商品问题识别、配送承诺管理、保修流程，最终做成一套商家运营系统——凡是客户触发的运营任务，都由它来编排。
solution: 给有规模的 Shopify Plus 品牌做一层 AI 原生售后运营层。产品接上帮助台、Shopify、承运商追踪工具、3PL 系统和退货软件后，就能识别进来的问题、核验政策资格、建议或直接执行下一步，并留下完整审计轨迹。它不是只回一段宏模板，而是把底层动作做完：比如发货前批准地址修正、给卡住的包裹发起承运商追踪、按政策开退货标签，或在确认丢件后排队补发。高客单、易被滥用或贴着政策边界的案例仍由人工兜底，但大量可重复的运营动作会从“人盯收件箱”变成“系统直接执行”。
goToMarketSeed:
  firstCustomer: 欧洲一家 Shopify Plus 美妆或服饰品牌，每月 10,000 到 50,000 单，使用 Gorgias 或 Zendesk 加一套退货平台，而且每天都有一批和配送、退货异常相关的售后积压工单。
  buyingTrigger: 新进一个国家、更换 3PL 或承运商，或者撞上旺季订单峰值，把工单积压和退款风险顶到现有客服团队扛不住的程度。
  currentAlternative: 人工客服在 Gorgias 或 Zendesk、Shopify 后台、承运商后台、退货软件、宏模板和表格之间来回切，偶尔再配一些内部脚本。
  switchingReason: 这个切口解决的是商家栈里的底层运营动作，而不只是代写回复。所以品牌不需要重做客服系统，就能把处理速度拉起来、把人力成本压下去，也能少犯政策错误。
  pricingHypothesis: 按订单量和托管异常量收费的年度 SaaS 订阅；额外工作流连接器和高自治执行模块，再收溢价。
