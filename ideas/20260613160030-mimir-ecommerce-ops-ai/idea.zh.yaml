  wedgeClarity:
    score: 5
    rationale: 售后异常处理是条很窄的工作流：买方清楚、ROI 好算、集成面也一眼能看明白。
  defensibility:
    score: 4
    rationale: 即便连接器一开始不难复制，商家专属的政策逻辑、异常数据和动作层结果，也能慢慢滚成很强的工作流护城河。
  ventureScale:
    score: 4
