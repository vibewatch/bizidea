modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Pipeline[Qualified pipeline] --> Pilots[Paid pilots]
      Pilots --> Customers[Paying brands]
      Customers --> Revenue[Subscription and connector revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: Revenue engine
  finding: The base case is driven mostly by logo growth from 4 paying brands at the end of Y1 to 45 by Q4Y3 at a blended $39.6K annual ARPU.
- checkName: Must go right
  finding: The model depends on approval-mode trust and a narrow connector pack converting pilots into production without forcing a services-heavy deployment motion.
- checkName: Model breaks if
  finding: If sales cycles stretch and AI stays in draft mode, the downside case shows Y3 cash falling below zero before the company earns the next round.
- checkName: Next-round proof
  finding: A credible seed story is 4-6 production brands plus at least one second-workflow expansion inside a lighthouse account before the six-month buffer is consumed.
sanityChecks:
  ruleOf40: Y3 revenue growth 259.46% + EBITDA margin -44.36% = 215.1% (inflated by the small Y2 base).
  burnMultiple: Y3 burn multiple 0.49x from $583.9K burn against $1188.0K of net new ARR.
  revenuePerFte: $131.67K Y3 using year-end 10 FTE (benchmark $200–400K SaaS).
  flags:
  - Year-3 revenue per FTE is still below a mature SaaS benchmark, so the company needs workflow expansion or slower hiring to justify the next round.
  - The quarterly revenue convention assumes conversions land early enough in-quarter for end-of-period logos to approximate recognized revenue.
  - Base-case cash falls to about $120K by Q4Y3, leaving limited room for a delayed financing process.
  - Rule-of-40 looks strong mainly because Y2 revenue is small; it should not be read as mature operating efficiency.
