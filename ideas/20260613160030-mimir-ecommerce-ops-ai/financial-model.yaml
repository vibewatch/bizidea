slug: postpurchase-exception-autopilot
date: '2026-06-13'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: Starts the first full month after the 2026-06-13 business-plan date.
- id: A2
  name: Blended annual ARR per paying brand
  value: '39.6'
  unit: USDK per customer per year
  source: '[BP investorMemo.firstCustomer.initialContract; research.market.som] Production pricing is guided by the BP''s roughly $30k-$40k ARR conversion target and the research SOM of 45 customers at about $40k ARR.'
- id: A3
  name: Year 1 paying-customer ramp
  value: 0,0,0,0,0,1,1,1,2,2,3,4
  unit: customersEop by M1-M12
  source: '[BP milestones 0–12 months; BP experimentRoadmap] Base case assumes the first paid pilot starts in M6, two paid pilots are in market by month 12, and year 1 ends with four paying logos across pilot and first production contracts.'
- id: A4
  name: Year 2-3 quarter-end customer ramp
  value: 5,7,10,15,22,29,37,45
  unit: customersEop by Q1Y2-Q4Y3
  source: '[BP milestones; research.market.som] The ramp reaches 15 paying customers by the end of year 2 and the researched year-3 SOM of 45 customers at roughly $40k ARR.'
- id: A5
  name: Quarterly revenue recognition convention
  value: Quarterly revenue equals quarter-end customers multiplied by quarterly ARPU because deployments are assumed to land early in quarter once a pilot converts.
  unit: method
  source: '[BP gtm.wedge; BP investorMemo.firstCustomer.initialContract] The product sells 8-12 week pilots that convert into annual contracts, so the reporting simplification assumes conversions happen near the front half of each quarter.'
- id: A6
  name: Target gross margin
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] The business plan targets 70% gross margin for the software layer.'
- id: A7
  name: Loaded annual salary bands
  value: Founder/CEO 120; engineering 130; product/ops 115; customer success 90; sales 130; G&A 80
  unit: USDK per FTE per year
  source: UK/Europe pre-seed SaaS hiring heuristic sized to the BP's narrow beachhead and founder-led GTM plan.
- id: A8
  name: Headcount snapshot ramp
  value: Founder 1/1/1/1/1/1; Eng 1/2/2/2/3/4; Product/Ops 1/1/1/1/1/1; CS 0/0/0/1/1/2; Sales 0/0/0/0/1/1; G&A 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: FTE
  source: '[BP team; BP strategicChoices.sequencingRationale] The model follows the BP sequence: start with the three founders, add the integration engineer in months 4-6, add implementation coverage around months 9-12, and keep sales lean because GTM stays founder-led and partner-assisted.'
- id: A9
  name: Quarterly hiring month map
  value: Integration engineer M5; implementation lead M10; first seller M16; third engineer M22; G&A M24; second CS M30; fourth engineer M32
  unit: hire timing
  source: '[BP team; BP milestones 12–24 months] Smooths salary expense across Y2 and Y3 while staying consistent with the six-column headcount convention.'
- id: A10
  name: Non-payroll operating spend
  value: Y1 monthly S&M 8-12, R&D 6-8, G&A 3-5; Y2 quarterly S&M 36-45, R&D 24-30, G&A 15-21; Y3 quarterly S&M 48-66, R&D 33-42, G&A 21-27
  unit: USDK
  source: Startup-finance heuristic for cloud/inference, travel, legal/compliance, and partner motion for a lean B2B SaaS team.
- id: A11
  name: Fully loaded CAC
  value: '28.0'
  unit: USDK per customer
  source: '[BP gtm.funnelTargets; research.reportMemo.willingnessToPay] Founder-led outbound with a paid-pilot motion and 50%+ pilot-to-production conversion supports a CAC around $28K per production logo in the base case.'
- id: A12
  name: Monthly churn
  value: '1.5'
  unit: percent
  source: Startup-finance heuristic for early vertical SaaS with annual contracts, still-forming retention proof, and expansion-led account growth.
- id: A13
  name: Opening cash / pre-seed close
  value: '2200'
  unit: USDK
  source: '[BP fundingAsk.targetFundingRangeUsd; BP fundingAsk.runwayMonths] Uses a $2.2M pre-seed close within the BP''s $2-4M target range and sized to fund the first connector pack, initial pilots, and a six-month buffer beyond the year-2 milestone.'
- id: A14
  name: Downside case inputs
  value: ARPU 33.0, gross margin 65%, and Q4Y3 customers 32
  unit: scenario inputs
  source: '[research.reportMemo.sensitivityCases; BP risks] Models the case where buyers keep AI closer to draft mode and expansion inside accounts is slower.'
- id: A15
  name: Upside case inputs
  value: ARPU 43.2, gross margin 72%, and Q4Y3 customers 55
  unit: scenario inputs
  source: '[BP product.twentyFourMonth; research.market.som] Upside assumes higher-autonomy modules and second-workflow expansion lift both logo count and ARPU inside the same beachhead.'
