  adoptionFrictionMatrix:
  - friction: Merchant policies are often implicit or inconsistently documented.
    severity: high
    affectedBuyer: VP Operations or CX lead
    mitigation: Start with one narrow exception queue and force explicit policy approval before any autonomous action.
    sourceRefs:
