  - 40
openQuestions:
- How often will UK and EU Shopify Plus buyers approve true autonomous execution versus AI-generated drafts for refunds, replacements, and carrier escalations?
- Which helpdesk + returns + carrier combinations account for the first 50 realistic lighthouse customers, and how much services effort does each require?
- Will brands buy a new system of action, or prefer deeper modules from Gorgias, Narvar, Loop, or their existing returns vendor?
- Is Shopify Plus alone a large enough beachhead, or does the company need to support non-Shopify enterprise stacks earlier than the thesis assumes?
