  sensitivityCases:
  - case: Brands keep AI in draft mode only
    impact: If merchants will not allow autonomous actions on refunds, address edits, or carrier escalations, the product behaves more like a copilot and ARPU compresses toward helpdesk software.
    sourceRefs:
