topRisks:
  - name: Thin source base
    description: The category signal comes from a single article, so workflow mix and willingness to hand execution to AI may be less mature than the headline suggests.
    mitigation: Start with human-in-the-loop automations for one exception queue and sell on measured backlog reduction before promising full autonomy.
  - name: Integration drag
    description: Each merchant may run a different helpdesk, 3PL, carrier, and returns stack, which can slow onboarding and compress gross margin.
    mitigation: Standardize on Shopify Plus plus one helpdesk and one returns platform first, then expand connectors only after proving a repeatable deployment template.
  - name: Policy and refund errors
    description: Wrongly approving returns, replacements, or carrier claims could erase savings and damage customer trust.
    mitigation: Keep high-risk cases gated behind confidence thresholds, maintain full audit trails, and require explicit merchant policy configuration before any autonomous action.
