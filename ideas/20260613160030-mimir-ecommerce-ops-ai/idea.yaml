problem: >-
  Shopify Plus brands with meaningful cross-border volume still resolve most post-purchase exceptions by bouncing agents between the helpdesk,
  Shopify admin, carrier portals, returns tools, and spreadsheets. Tickets about address changes, delayed deliveries, return eligibility,
  replacement orders, and refund status look repetitive from the outside but actually require policy-aware execution across multiple systems.
  That makes support expensive, slows resolution, and turns operational mistakes into lost margin and lower repeat purchase rates.
targetUser:
  primary: VP of operations or customer experience at a Shopify Plus brand managing cross-border post-purchase support
  secondary: Ecommerce operations manager responsible for order exceptions, carrier escalations, and return workflows
  buyer: COO, VP Operations, or VP Customer Experience
startupThesis:
  nonObviousInsight: >-
    The next durable ecommerce AI company is not another front-end shopping assistant. The bigger near-term wedge is the execution layer
    behind post-purchase conversations, where merchants already have high ticket volume, clear policy boundaries, and measurable cost
    leakage from slow or inconsistent resolution.
  beachhead: >-
    European and UK Shopify Plus fashion, beauty, and home-goods brands shipping 10,000 or more orders per month across at least
    two countries and seeing persistent WISMO, address-change, delivery-delay, and return-status tickets
  wedge: >-
    An exception-resolution autopilot that reads the helpdesk conversation, checks merchant policy, and then completes approved
    order edits, carrier escalations, return authorizations, replacement requests, and refund updates across the merchant's existing
    systems
  whyNowCatalyst: >-
    Mimir's funding, 250,000 monthly conversation volume, cross-country footprint, and move beyond support tickets show that brands
    are ready to buy workflow execution software, not just chat deflection.
  ventureScalePath: >-
    Start with post-purchase exception handling, then expand into returns disposition, catalog issue detection, delivery promise
    management, warranty workflows, and eventually the full operating system that orchestrates how a merchant resolves any customer-
    triggered operations task.
solution: >-
  Build an AI-native operations layer for post-purchase exceptions at scaled Shopify Plus brands. The product connects to the helpdesk,
  Shopify, carrier tracking tools, 3PL systems, and returns software so it can classify an incoming issue, verify policy eligibility,
  propose or execute the next action, and leave a full audit trail. Instead of answering a customer with a macro, it completes the
  underlying work such as approving an address correction before fulfillment, opening a carrier trace on a stalled parcel, issuing a
  return label under the right policy, or queuing a replacement after proof of loss. Human agents stay in the loop for high-value,
  abuse-prone, or policy-edge cases, but the bulk of repeatable operations move from inbox labor to system action.
goToMarketSeed:
  firstCustomer: >-
    A Shopify Plus beauty or apparel brand in Europe doing 10,000 to 50,000 monthly orders, using Gorgias or Zendesk plus a returns
    platform, and carrying a daily backlog of post-purchase tickets tied to delivery and returns exceptions
  buyingTrigger: >-
    Entering a new country, switching 3PL or carrier partners, or hitting a seasonal order spike that pushes ticket backlog and refund
    risk above the capacity of the current support team
  currentAlternative: >-
    Human agents working from Gorgias or Zendesk, Shopify admin, carrier portals, returns software, macros, and spreadsheets plus
    occasional internal scripts
  switchingReason: >-
    This wedge resolves the underlying ops task inside the merchant's stack instead of just drafting replies, so the brand gets faster
    resolution, lower labor cost, and fewer policy mistakes without replatforming customer support
  pricingHypothesis: >-
    Annual SaaS subscription priced by order volume and managed exception volume, with premium fees for additional workflow connectors
    and high-autonomy execution modules
