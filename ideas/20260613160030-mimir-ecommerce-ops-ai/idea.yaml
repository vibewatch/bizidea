jobsToBeDone:
  - job: When post-purchase tickets pile up after a promotion or carrier disruption, help our ops team complete the right order or delivery action automatically, so they can clear backlog without hiring more agents.
    currentAlternative: Human agents copy information between the helpdesk, Shopify, and carrier portals using macros and manual checklists
    successMetric: Automated resolution rate and median time to close post-purchase exceptions
  - job: When a customer requests a return, replacement, or refund update, help our CX team apply the correct policy and trigger the next system action, so they can protect margin while resolving the case quickly.
    currentAlternative: Manual policy lookup and execution across returns tools, spreadsheets, and finance or warehouse handoffs
    successMetric: Lower refund leakage, fewer policy errors, and faster return-cycle resolution
ideaScorecard:
  signalStrength:
    score: 4
    rationale: A funded startup with real production volume, geographic breadth, and a stated expansion beyond support is a credible signal that the category is emerging.
  painIntensity:
    score: 4
    rationale: Post-purchase exceptions directly drive labor cost, refunds, repeat-purchase risk, and brand damage at scaled merchants.
  wedgeClarity:
    score: 5
    rationale: Post-purchase exception resolution is a narrow workflow with a clear buyer, measurable ROI, and obvious integration surface.
  defensibility:
    score: 4
