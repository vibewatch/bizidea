differentiator: >-
  Most ecommerce AI vendors still compete on conversation quality, generic support copilots, or marketing chat surfaces. This company
  starts one layer deeper on execution, where the moat comes from encoding merchant policies, carrier edge cases, and resolution steps
  across post-purchase systems. Over time it should accumulate a hard-to-replicate dataset on which exceptions can be safely automated,
  which policies drive refunds or replacements, and where operational failures begin before a customer ever complains.
