modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Pipeline[Qualified pipeline] --> Pilots[Paid pilots]
      Pilots --> Customers[Paying brands]
      Customers --> Revenue[Subscription and connector revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形主要靠付费品牌增长驱动：付费品牌数从 Y1 年末的 4 个，增到 Q4Y3 的 45 个，混合年化 ARPU 为 $39.6K。
- checkName: 哪些事必须跑对
  finding: 模型成立的前提，是审批模式信任和一套窄连接器包，能把试点转成生产，而不是把部署拖成重服务模式。
- checkName: 模型会在哪儿断
  finding: 如果销售周期拉长，AI 又始终停在代写模式，下行情形显示公司会在拿到下一轮融资前，Y3 现金就会先烧到负值。
- checkName: 下一轮证明点
  finding: 一套可信的 种子轮故事，应该是做到 4-6 个生产品牌，并在一个灯塔客户里至少跑出 1 个第 2 条工作流扩张，然后才把 6 个月缓冲花完。
sanityChecks:
  ruleOf40: Y3 收入增速 259.46% + EBITDA 利润率 -44.36% = 215.1%（主要被较小的 Y2 基数抬高）。
  burnMultiple: Y3 burn multiple 为 0.49x：即 $583.9K burn 对应 $1188.0K 的净新增 ARR。
  revenuePerFte: 按年末 10 FTE 计算，Y3 的人均收入为 $131.67K（成熟 SaaS 基准通常在 $200–400K）。
  flags:
  - 第 3 年的人均收入仍低于成熟 SaaS 基准，所以公司要么得做工作流扩张，要么得放慢招聘，下一轮故事才更站得住。
  - 季度收入确认规则假设转化足够早地发生在季度内，因此期末付费品牌数可以近似代表已确认收入。
  - 基准情形下，现金到 Q4Y3 只剩约 $120K，融资流程一旦拖延，余地很小。
  - Rule of 40 看起来很强，主要是因为 Y2 收入基数太小，不能把它当成成熟经营效率来读。
