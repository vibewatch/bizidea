slug: postpurchase-exception-autopilot
date: '2026-06-13'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: 月份
  source: 从 2026-06-13 的 business-plan 日期之后的第一个完整月份开始。
- id: A2
  name: 单个付费品牌的混合年化 ARR
  value: '39.6'
  unit: 千美元 / 客户 / 年
  source: '[BP investorMemo.firstCustomer.initialContract; research.market.som] 生产定价参考 BP 里约 $30k-$40k ARR 的转化目标，以及 research SOM 里约 45 个客户、每个约 $40k ARR 的设定。'
- id: A3
  name: 第 1 年付费客户爬坡
  value: 0,0,0,0,0,1,1,1,2,2,3,4
  unit: 按 M1-M12 统计的期末客户数
  source: '[BP milestones 0–12 months; BP experimentRoadmap] 基准情形假设第一个付费试点在 M6 启动，到第 12 个月市场上已有两个付费试点，且第 1 年结束时共有 4 个付费品牌，覆盖试点和首批生产合同。'
- id: A4
  name: 第 2-3 年季度末客户爬坡
  value: 5,7,10,15,22,29,37,45
  unit: 按 Q1Y2-Q4Y3 统计的期末客户数
  source: '[BP milestones; research.market.som] 客户数在第 2 年末达到 15 个付费客户，并在第 3 年末达到 research 里的 45 个客户、每个约 $40k ARR 的 SOM。'
- id: A5
  name: 季度收入确认规则
  value: 季度收入等于季度末客户数乘以季度 ARPU，因为模型假设试点一旦转正，部署通常会在季度前半段落地。
  unit: 方法
  source: 季度收入按“季度末客户数 × 季度 ARPU”计算，因为模型假设部署一旦从试点转正，通常会在季度前半段落地。
- id: A6
  name: 目标毛利率
  value: '70'
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct] BP 里软件层目标毛利率为 70%。'
- id: A7
  name: 全负载年薪区间
  value: 创始人/CEO 120；工程 130；产品/运营 115；客户成功 90；销售 130；综合行政 80
  unit: 千美元 / FTE / 年
  source: 适用于英国/欧洲种子前轮 SaaS 的招聘经验值，按 BP 的窄滩头市场和创始人主导 GTM 计划估算。
- id: A8
  name: 人头快照爬坡
  value: 创始人 1/1/1/1/1/1；工程 1/2/2/2/3/4；产品/运营 1/1/1/1/1/1；客户成功 0/0/0/1/1/2；销售 0/0/0/0/1/1；综合行政 0/0/0/0/1/1，对应 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: FTE
  source: '[BP team; BP strategicChoices.sequencingRationale] 模型遵循 BP 的节奏：从 3 位创始人起步，在第 4-6 个月补集成工程师，第 9-12 个月补实施覆盖；销售保持精简，因为 GTM 仍以创始人主导和伙伴协同为主。'
- id: A9
  name: 季度招聘月份映射
  value: 集成工程师 M5；实施负责人 M10；首位销售 M16；第 3 位工程师 M22；综合行政 M24；第 2 位客户成功 M30；第 4 位工程师 M32
  unit: 招聘时点
  source: '[BP team; BP milestones 12–24 months] 在保持 6 列人头口径一致的前提下，把 Y2 和 Y3 的薪资费用摊得更平滑。'
- id: A10
  name: 非薪资运营开支
  value: Y1 每月销售与市场 8-12、研发 6-8、综合行政 3-5；Y2 每季度销售与市场 36-45、研发 24-30、综合行政 15-21；Y3 每季度销售与市场 48-66、研发 33-42、综合行政 21-27
  unit: 千美元
  source: 面向精简型 B2B SaaS 团队的创业财务经验值，覆盖云和推理、差旅、法务/合规，以及伙伴拓展成本。
- id: A11
  name: 完全摊销 CAC
  value: '28.0'
  unit: 千美元 / 客户
  source: '[BP gtm.funnelTargets; research.reportMemo.willingnessToPay] 创始人主导外呼 + 付费试点模式 + 50%+ 的试点转生产转化，支撑基准情形下每个生产品牌约 $28K CAC。'
- id: A12
  name: 月流失率
  value: '1.5'
  unit: 百分比
  source: 适用于早期垂直 SaaS 的创业财务经验值：年费合同为主，但留存证明仍在形成，且账户增长主要靠扩张。
- id: A13
  name: 期初现金 / 种子前轮交割
  value: '2200'
  unit: 千美元
  source: '[BP fundingAsk.targetFundingRangeUsd; BP fundingAsk.runwayMonths] 采用 $2.2M 的种子前轮交割额，位于 BP 的 $2-4M 目标区间内，可覆盖首套连接器包、初始试点，以及第 2 年里程碑之后额外 6 个月缓冲。'
- id: A14
  name: 下行情形输入
  value: ARPU 33.0、毛利率 65%、Q4Y3 客户数 32
  unit: 情景输入
  source: '[research.reportMemo.sensitivityCases; BP risks] 这里模拟的是：买方把 AI 更多卡在代写模式，账户内扩张也更慢。'
- id: A15
  name: 上行情形输入
  value: ARPU 43.2、毛利率 72%、Q4Y3 客户数 55
  unit: 情景输入
  source: '[BP product.twentyFourMonth; research.market.som] 上行假设是，更高自治模块和第 2 条工作流扩张，把同一滩头市场里的客户数和 ARPU 一起抬高。'
