scenarios:
  downside:
    description: 商家大多只愿意把 AI 放在审批模式，所以 ARPU 被压缩，付费品牌扩张也大约晚了 3 个季度。
    y3RevenueK: 800.3
    y3EbitdaK: -935.4
    cashLowPointK: -343.5
    keyAssumptionChanges:
    - 随着自治模块解锁失败，混合 ARPU 从 $39.6K 降到 $33.0K。
    - 因为试点转生产变慢，季度末客户数在 Y3 只做到 32 个，而不是 45 个。
    - 由于实施和人工复核负担更重，毛利率降到 65%。
  base:
    description: 基准情形假设 Y1 有两个付费试点，Y2 做出可复用连接器包装，Y3 年底扩到 45 个付费品牌。
    y3RevenueK: 1316.7
    y3EbitdaK: -584.1
    cashLowPointK: 119.1
    keyAssumptionChanges:
    - 混合 ARPU 维持在每个付费品牌每年 $39.6K。
    - 季度末客户爬坡在 Q4Y2 达到 15 个，在 Q4Y3 达到 45 个。
    - 毛利率守住 BP 里的 70% 目标，同时人头在 Q4Y3 增到 10 FTE。
  upside:
    description: 上行情形假设，信任建立得足够快，高自治模块能更早卖出去，代理商也把更多合格线索带进同一目标客户画像。
    y3RevenueK: 1695.6
    y3EbitdaK: -354.8
    cashLowPointK: 450.1
    keyAssumptionChanges:
    - 随着客户加购第 2 条工作流和更高自治模块，混合 ARPU 升到 $43.2K。
    - 在伙伴协同扩张更快的情况下，季度末客户数在 Y3 达到 55 个。
    - 随着连接器包和复核策略标准化，毛利率提升到 72%。
