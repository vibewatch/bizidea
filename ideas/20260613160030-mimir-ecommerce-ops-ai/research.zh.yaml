  - 33
validationSignals:
- point: Mimir 称自己已经为约 60 个品牌、横跨 5 个国家，每月管理约 250,000 段客户对话。
  sourceRefs:
  - 1
- point: Mimir 对外营销强调的是深接电商栈，而不是一个孤立聊天机器人。
  sourceRefs:
  - 2
- point: parcelLab 举过 Bergzeit 的案例：改进配送沟通后，WISMO 下降了 21.5%。
  sourceRefs:
  - 28
- point: Narvar 表示，消费者平均每单会查 3-4 次物流；它在 2024 年退货研究里也认为，优化退货流程能把很多买家转向换货或店铺余额。
  sourceRefs:
  - 18
  - 40
openQuestions:
- 英国和欧盟的 Shopify Plus 买家，到底多常会批准真正的自治执行，而不是只允许 AI 代写退款、补发和承运商升级？
- 哪几种“帮助台 + 退货 + 承运商”组合，构成前 50 个现实灯塔客户？每种组合各自要耗掉多少服务工作？
- 品牌会不会愿意买一套新的执行系统，还是更倾向于等 Gorgias、Narvar、Loop 或现有退货厂商继续往深处做？
- 只做 Shopify Plus 这个滩头市场到底够不够大，还是说公司必须比最初判断更早支持非 Shopify 企业栈？
