  adoptionFrictionMatrix:
  - friction: 商家政策往往没有写明白，或者文档本身就不一致。
    severity: high
    affectedBuyer: 运营副总裁 或 CX 负责人
    mitigation: 先从一条很窄的异常队列切进去，并要求任何自治动作前都先把政策批准写清楚。
    sourceRefs:
    - 5
    - 7
    - 8
    - 23
  - friction: 每个商家的帮助台、承运商、退货和仓储组合都不一样。
    severity: high
    affectedBuyer: 电商运营经理
    mitigation: 首发版本围绕 Shopify Plus 加一小组连接器标准化，再用代理商辅助导入上线。
