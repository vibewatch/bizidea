slug: postpurchase-exception-autopilot
date: '2026-06-13'
executiveSummary: >-
  Postpurchase-exception-autopilot should sell a policy-safe execution layer to
  UK and Western European Shopify Plus brands whose post-purchase workload is
  dominated by delivery, address, return, and refund-status exceptions. The
  customer pain is specific: scaled brands still move agents between the
  helpdesk, Shopify admin, carrier portals, and returns tools to complete
  repetitive but margin-sensitive actions. The best first sale is a paid pilot
  for one brand using Gorgias or Zendesk plus one returns platform, where the
  buyer already feels backlog pressure from a new-country launch, carrier
  change, or seasonal spike. The MVP should focus on low-discretion workflows
  that can be audited and approved quickly, not on fully autonomous refunds
  across every exception type. This wedge is credible because adjacent budgets,
  competitors, and merchant behavior already exist, but the company wins only if
  it becomes the cross-system action layer rather than another AI reply surface.
  Research supports a meaningful but not massive beachhead, with an estimated
  $31.5M SAM and a year-3 reachable SOM of about $1.8M, so venture upside
  depends on expanding from post-purchase exceptions into broader merchant
  operations after proof. The biggest unresolved issue is customer willingness
  to let AI execute actions rather than draft them, especially where refunds,
  replacements, or abuse risk are involved. Until that trust is proven in live
  pilots, this should be treated as a pre-seed company worth watching or
  diligencing further rather than assuming category leadership.
problem:
  - Cross-border Shopify Plus brands still resolve many post-purchase exceptions through manual swivel-chair work across helpdesk, Shopify, carrier, and returns systems.
  - Slow or inconsistent handling of address changes, stalled deliveries, return eligibility, and refund-status cases drives labor cost, refund leakage, and repeat-purchase risk.
solution:
  - Connect the helpdesk conversation to merchant policy and existing commerce systems so the product can classify the issue, gather context, and complete approved exception actions with an audit trail.
  - Start in approval-mode for repetitive workflows such as pre-fulfillment address edits, carrier traces, return authorizations under explicit policy, and refund-status updates, then expand autonomy only where accuracy and trust are proven.
whyWeWin:
  - The wedge is narrower than generic support AI, so proof can be measured quickly through backlog reduction, resolution speed, and policy-error rates.
  - The product fits the existing merchant stack instead of asking brands to replace Shopify, their helpdesk, or returns tooling.
  - Merchant-specific policy graphs, approval history, and outcome data can compound into a defensible execution moat that adjacent communication tools do not own by default.
strategicChoices:
  beachhead: UK and Western European Shopify Plus apparel, beauty, and home-goods brands shipping 10,000 to 50,000 orders per month across at least two countries and already using Gorgias or Zendesk plus a returns platform.
  wedgeRationale: Address-change, delivery-delay, return-authorization, and refund-status workflows create faster proof than a broader post-purchase suite because they recur frequently, start from an existing support queue, have visible SLA pain, and can be gated by explicit policy before money moves.
  sequencingRationale: >-
    Start with one helpdesk, one returns platform, and a small set of
    merchant-approved exception actions in approval mode because trust,
    regulatory sensitivity, and connector sprawl are the real early constraints.
    Sell direct to operations and CX leaders with an active backlog or
    cross-border trigger, then add agency and platform partners only after the
    first pilots show repeatable onboarding and real KPI lift. Delay dedicated
    implementation hiring until the first connector pack is standardized so the
    company does not become a services business.
  notYet:
    - Full support-agent replacement or broad chatbot positioning.
    - Autonomous refunds, replacements, or fraud-sensitive actions without merchant-approved thresholds.
    - Non-Shopify enterprise stacks before the Shopify Plus connector pack converts reliably.
    - Upstream catalog, warranty, or warehouse workflows before post-purchase exception ROI is proven.
market:
  tam: Estimated $126.0M TAM from roughly 12,000 Europe and UK Shopify Plus stores, a 35% relevant category mix, and about $30k blended annual contract value.
  sam: Estimated $31.5M SAM for the subset of relevant brands shipping roughly 10k or more orders per month across at least two countries.
  som: Estimated $1.8M year-3 SOM assuming about 45 customers at roughly $40k ARR after workflow and connector expansion.
  segments:
    - Shopify Plus fashion and beauty brands with cross-border delivery and returns complexity.
    - Shopify Plus home-goods merchants with high WISMO and return-status ticket volume.
  buyingProcess: The operational champion is usually the ecommerce operations manager or CX lead who owns backlog, while the economic buyer is typically the VP of operations, VP customer experience, or COO. The fastest path is a paid pilot tied to one queue and a clear trigger such as a market launch, carrier transition, or seasonal surge, followed by production rollout once SLA and error-rate improvement are verified.
product:
  mvp: The MVP should ingest the customer conversation, Shopify order data, shipment status, and returns-policy context for one helpdesk and one returns platform, then route low-risk exception actions through approval mode with full logs. It should avoid broad omni-channel AI claims and limit autonomous execution to workflows with explicit merchant guardrails.
  sixMonth: Launch one paid pilot with address edits, carrier traces, return authorization, and refund-status workflows, plus dashboards for backlog, median time to resolution, approval rate, and policy-error incidents.
  twelveMonth: Add a repeatable connector pack for Gorgias or Zendesk, Shopify, one returns platform, and the highest-frequency carrier workflows, then convert 2 to 3 lighthouse brands into production references.
  twentyFourMonth: Expand from approval-mode exception handling into selective autonomy, then add adjacent workflows such as replacement approvals, returns disposition, and delivery-promise exception management inside existing accounts before moving beyond Shopify.
  keyBets:
    - Buyers will fund a system-of-action budget if the pilot proves lower handle time and fewer policy mistakes, not just nicer responses.
    - A narrow connector pack can cover enough of the first 25 target accounts to keep onboarding repeatable.
    - Approval-mode workflows will generate trust quickly enough to unlock higher-autonomy modules inside the same accounts.
    - Adjacent incumbents will remain communication-, tracking-, or returns-first long enough for the startup to own the cross-system execution layer.
gtm:
  wedge: Sell an 8 to 12 week paid pilot to a cross-border Shopify Plus brand with a live delivery or returns backlog, start in one post-purchase queue, and convert to annual software once the pilot shows faster resolution and lower policy-error rates.
  channels:
    - Founder-led outbound to VP operations, VP customer experience, and ecommerce operations managers at cross-border Shopify Plus brands.
    - Shopify Plus agencies and systems integrators that already help merchants launch localized stores and manage post-purchase stack complexity.
    - Co-sell and referral paths with helpdesk, returns, and tracking partners that benefit when more tickets become completed actions instead of drafted replies.
  funnelTargets: "target accounts→qualified discovery 20-30%, qualified discovery→paid pilot 25-35%, paid pilot→production 50%+, production→second workflow or country expansion 60%+ within 9 months"
  pricing: Paid pilot for one queue and one brand, then annual SaaS priced by monthly order volume and managed exception volume with additional fees for extra connectors and higher-autonomy workflows; this matches how adjacent vendors already charge by tickets, orders, shipments, or implementation scope.
businessModel:
  revenueStreams:
    - Annual SaaS subscription for live exception orchestration and audit workflows.
    - Usage or tier fees tied to managed exception volume and autonomy level.
    - Implementation and connector-pack fees for new system combinations or multi-country rollouts.
  unitOfValue: Live brand-month priced on monthly order volume and managed exception volume.
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one exception queue into multiple post-purchase workflows for the same brand.
    - Roll out from one country or brand entity into the merchant's broader European store footprint.
    - Add higher-value autonomy modules such as replacements, returns disposition, and delivery-promise recovery once approval-mode trust is established.
strategyMap:
  northStarMetric: Share of eligible post-purchase exceptions resolved within SLA through approved or autonomous system actions without policy-loss incidents.
  inputMetrics:
    - Qualified pilot pipeline from cross-border Shopify Plus brands in the target verticals.
    - Median time to resolution for in-scope exception queues versus pre-pilot baseline.
    - Approval-mode acceptance rate on recommended actions by workflow.
    - Policy-error or reversal rate on executed actions.
    - Pilot-to-production conversion and second-workflow expansion rate.
  moatsToBuild:
    - Merchant-specific policy graph linking ticket intent, country rules, approval thresholds, and allowed actions.
    - Cross-system execution dataset showing which exception patterns resolve safely and which ones require escalation.
    - Standardized connector and onboarding playbooks for the dominant Shopify Plus post-purchase stack combinations in Europe.
  killCriteria:
    - If fewer than 2 of the first 10 qualified prospects agree to a paid pilot with approval-mode execution, the buying trigger is weaker than the thesis assumes.
    - If the first 3 paid pilots fail to cut median time to resolution by at least 30% or keep policy-error rates below 1%, the ROI and trust case is not strong enough.
    - If no connector pack covers at least 40% of the first 25 target accounts, onboarding will stay too services-heavy to scale.
  mermaid: |
    flowchart LR
      Wedge[Cross-border Shopify Plus exception wedge] --> MVP[Approval-mode exception autopilot]
      MVP --> Proof[Faster SLA and lower policy errors]
      Proof --> Expansion[More workflows, more countries, higher autonomy]
investorMemo:
  verdict:
    call: Watch
    conviction: Medium conviction on pain and buyer relevance, but low conviction on autonomous-action trust until paid pilots prove approval-mode conversion.
    whyBelieve: The company targets a measurable workflow gap between support AI and post-purchase systems, where buyers already spend money and still rely on manual execution.
    whyDoubt: The beachhead is crowded and not huge, and adjacent vendors or cautious buyers may keep the product in draft mode instead of letting it become a true system of action.
    nextDiligence: Secure 2 paid pilots that start in approval mode, document baseline queue KPIs, and show whether buyers expand from one workflow into production pricing.
  firstCustomer:
    title: VP operations or CX leader at a cross-border Shopify Plus beauty or apparel brand
    profile: A 10,000 to 50,000 order per month merchant running Gorgias or Zendesk, a returns platform, and multi-country delivery operations with recurring exception backlog.
    trigger: Entering a new country, changing carriers or 3PLs, or hitting a seasonal spike that pushes delivery and returns tickets beyond current team capacity.
    buyer: COO, VP Operations, or VP Customer Experience
    initialContract: Paid 8 to 12 week pilot for one helpdesk queue and 2 to 4 workflows, converting to roughly $30k to $40k ARR plus connector fees if the pilot clears SLA and policy-error targets.
  mustBeTrue:
    - Buyers must approve paid pilots for execution workflows rather than limiting AI to drafted replies.
    - One narrow connector pack must cover a large enough share of target accounts to keep onboarding repeatable.
    - Approval-mode actions must reduce median resolution time enough to justify a new software line item.
    - Adjacent platforms must not close the execution gap before the startup lands lighthouse references.
    - Existing accounts must expand into more workflows or countries, because the standalone beachhead is too small for a large outcome without expansion.
  diligenceQuestions:
    - Which exact workflows do buyers allow into approval mode on day one, and which remain human-only?
    - How often do Gorgias or Zendesk plus one returns platform appear together in the first 25 realistic target accounts?
    - Does budget come from CX tooling, operations tooling, or a broader margin-improvement initiative?
    - What evidence shows policy errors stay low enough once the product moves from suggestion to execution?
    - Why will a merchant add this layer instead of waiting for Gorgias, Narvar, Loop, or internal scripts to improve?
operatingAssumptions:
  - assumption: The first buyers will accept approval-mode execution for low-risk exception actions before they accept fully autonomous refunds or replacements.
    basis: research.yaml
    validationTest: Close 2 paid pilots that include at least address edits, carrier traces, or return authorizations with explicit approval thresholds and weekly usage review.
    decisionImpact: If false, the product must reposition as a copilot, lowering ARPU and weakening the case for a standalone category company.
  - assumption: Gorgias or Zendesk plus one returns platform and Shopify covers enough of the first 25 target accounts to justify a narrow connector strategy.
    basis: research.yaml
    validationTest: Build an integration inventory for 25 named prospects and confirm at least 10 share the initial stack combination.
    decisionImpact: If false, the roadmap must prioritize broader integrations earlier and hiring shifts toward implementation and partner engineering.
  - assumption: Cross-border apparel, beauty, and home-goods brands will pay for measured labor and margin improvement, not only for customer-experience branding.
    basis: idea.yaml
    validationTest: Run 5 pricing and procurement conversations with economic buyers and secure written pilot success criteria tied to backlog, SLA, and policy-error metrics.
    decisionImpact: If false, messaging and pricing must shift toward a narrower CX budget or the ICP must move upmarket.
  - assumption: Approval-mode workflows can reduce median resolution time by at least 30% without pushing policy-error rates above 1%.
    basis: operator judgment
    validationTest: Instrument the first 3 paid pilots with before-and-after queue metrics and audit every executed action for reversals or policy exceptions.
    decisionImpact: If false, the product scope must narrow to fewer workflows or remain recommendations-only until reliability improves.
  - assumption: Existing customers will expand into more workflows or countries fast enough to reach the researched $1.8M year-3 SOM without supporting non-Shopify accounts immediately.
    basis: research.yaml
    validationTest: Track net revenue retention and second-workflow adoption in the first 5 production accounts over 12 months.
    decisionImpact: If false, the company must broaden the ICP sooner, likely increasing product complexity and fundraising needs.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12 cross-border Shopify Plus operations and CX leaders in apparel, beauty, and home goods.
    hypothesis: The most urgent trigger is not generic AI interest but backlog spikes tied to market launches, carrier changes, or seasonal peaks.
    successMetric: At least 8 interviews confirm a budgeted or actively painful trigger and 3 agree to pilot scoping.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build a prospect integration inventory covering helpdesk, returns, carrier, and order-edit tooling across 25 named accounts.
    hypothesis: A narrow initial connector pack can serve enough of the beachhead to keep time to pilot low.
    successMetric: At least 40% of target accounts match the initial connector pack and can be scoped without custom platform work.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Launch one paid pilot in approval mode for address edits, carrier traces, return authorizations, and refund-status workflows.
    hypothesis: Low-risk execution workflows can prove value before buyers allow broader autonomy.
    successMetric: Median resolution time improves by at least 30%, backlog drops by at least 20%, and policy-error rate stays below 1%.
    owner: Founding product/ops
  - horizon: 6–9 months
    experiment: Add the first repeatable agency-assisted onboarding playbook for the dominant helpdesk and returns stack combination.
    hypothesis: Partner-assisted deployment will reduce implementation drag without turning the company into a services vendor.
    successMetric: Second pilot launches at least 25% faster than the first and requires fewer than 20 hours of custom setup.
    owner: Integration engineer
  - horizon: 9–12 months
    experiment: Convert the first pilot into production and expand from one queue into a second workflow or second country inside the same account.
    hypothesis: Expansion within an existing customer is easier and more profitable than finding a new logo once trust is established.
    successMetric: First production customer adds a second workflow or geography within 6 months of go-live.
    owner: Founder CEO
  - horizon: 12–18 months
    experiment: Test a higher-autonomy module such as replacement approval or returns disposition inside one production account.
    hypothesis: Trust earned in approval mode can unlock higher-ARPU execution modules without unacceptable policy risk.
    successMetric: One production customer adopts the higher-autonomy module and maintains policy-error rates below the agreed threshold for 8 consecutive weeks.
    owner: Founding product/ops
operations:
  - Standardize a pre-pilot policy-mapping and data-readiness audit before any commercial commitment.
  - Run weekly pilot reviews tied to backlog, SLA, approval rate, reversals, and margin-sensitive outcomes such as refund leakage.
  - Build partner playbooks for Shopify Plus agencies, helpdesk vendors, and returns platforms instead of bespoke deployment projects.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Needed for founder-led selling, design-partner recruitment, and early partner relationships in a concentrated buyer set.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the orchestration core, first connectors, audit logging, and instrumentation required to prove reliability.
  - role: Founding product/ops
    startTiming: Month 0
    rationale: Maps merchant policies, scopes exception workflows, and runs pilots tightly enough to turn operational pain into product requirements.
  - role: Integration engineer
    startTiming: Month 4-6
    rationale: Becomes necessary once two pilots are active so connector standardization does not stall core product progress.
  - role: Customer success or implementation lead
    startTiming: Month 9-12
    rationale: Supports production rollout, KPI reviews, and account expansion while keeping onboarding repeatable.
milestones:
  - horizon: 0–12 months
    items:
      - Secure 2 paid pilots in the target beachhead with documented baseline queue metrics and explicit approval-mode scope.
      - Ship the first connector pack covering Shopify, one helpdesk family, one returns platform, and the highest-frequency carrier workflows.
      - Convert at least 1 pilot into a production contract after proving faster resolution and low policy-error rates.
      - Publish 1 lighthouse case study centered on backlog reduction, SLA improvement, and merchant trust progression.
  - horizon: 12–24 months
    items:
      - Reach 4 to 6 production brands and standardize onboarding for the dominant Shopify Plus post-purchase stack combinations.
      - Expand within existing accounts into second workflows, second countries, or higher-autonomy modules.
      - Establish at least 1 meaningful agency or platform referral channel that shortens sales cycles without owning the customer relationship.
  - horizon: 24–36 months
    items:
      - Reach the researched year-3 SOM target of roughly 45 customers at around $40k ARR equivalent.
      - Demonstrate that post-purchase exception handling can expand into a broader merchant operations layer without losing deployment speed or auditability.
      - Decide whether the next expansion is non-Shopify commerce stacks or adjacent workflows such as catalog issues and warranty operations.
risks:
  - risk: Buyers keep the product in draft or approval mode and never allow enough execution autonomy to support differentiated pricing.
    likelihood: High
    impact: High
    mitigation: Start with low-risk actions, instrument trust metrics, and price production value on completed approved actions rather than on autonomy claims alone.
  - risk: Merchant stack variation makes onboarding too custom and compresses gross margin.
    likelihood: High
    impact: High
    mitigation: Constrain the ICP to Shopify Plus plus a narrow connector pack until repeated deployments prove a standard implementation path.
  - risk: Adjacent vendors such as Gorgias, Narvar, Loop, or parcelLab deepen into actioning before the startup earns lighthouse references.
    likelihood: Medium
    impact: High
    mitigation: Stay focused on cross-system exception execution, move quickly on measurable proof points, and build merchant-specific policy and outcome data the incumbents do not already own.
  - risk: Policy mistakes on refunds, returns, or replacements erase savings and damage trust.
    likelihood: Medium
    impact: High
    mitigation: Require explicit merchant guardrails, keep sensitive workflows in approval mode until thresholds are met, and maintain full audit logs for every action.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway should fund the core orchestration product, 2 to 3 paid pilots, the first repeatable connector pack, approval and audit controls for policy-safe execution, and the small go-to-market and implementation team needed to prove production rollout and account expansion.
