  searchedQueries:
  - 哪些权威的美国来源描述了 DER 并网队列增长，以及太阳能、储能、EV 充电或柔性负荷申请相关的公用事业工作流瓶颈？
  - 哪些官方产品页面和权威报道能识别公用事业 DER 并网工作流软件、申请门户、研究自动化或配网规划领域的主要公司与现有工具？
  - 哪些美国官方监管、标准或公用事业行业来源最能说明 DER 并网工作流要求，包括 DOE i2X、FERC 改革、IEEE 1547 和各公用事业申请流程？
  - 哪些权威来源量化了美国电力公用事业数量、DER 采用增长，以及与并网相关的活动规模，从而帮助测算服务公用事业并网工作流团队的软件市场？
  - 寻找能证明 DER 并网工作流里仍存在手工文档审查、申请完整性检查、承载容量筛选或工程积压的官方公用事业、监管机构或行业来源。
  - 列出 PG&E、Southern California Edison、San Diego Gas & Electric、Hawaiian Electric、Con Edison、National Grid 和 Eversource 的官方分布式发电或 DER 并网页面。只用公用事业官方页面。
  - 列出 Duke Energy、Dominion Energy、Florida Power & Light、Georgia Power 和 Xcel Energy 的官方分布式发电或 DER 并网页面。只用公用事业官方页面。
  - 列出 APS、SRP、NV Energy、Oncor 和 SMUD 的官方分布式发电或 DER 并网页面。只用公用事业官方页面。
  - 列出 Ameren、ComEd、Pepco、BGE 和 PSE&G 的官方分布式发电或 DER 并网页面。只用公用事业官方页面。
  - 列出 Idaho Power、Puget Sound Energy、Portland General Electric、Avangrid 和 CPS Energy 的官方分布式发电或 DER 并网页面。只用公用事业官方页面。
  - 寻找 Pearl Street Technologies、Burns & McDonnell、POWER Engineers 等成熟供应商提供并网研究或并网积压软件的官方产品或服务页面。
  - 寻找关于美国公用电力公司、电力合作社和电力公用事业总数的官方或权威来源，用于估算公用事业软件市场规模。
  - 寻找能说明公用事业今天仍在手工审材料、核完整性、做承载容量筛选或处理工程积压的官方或权威证据。
