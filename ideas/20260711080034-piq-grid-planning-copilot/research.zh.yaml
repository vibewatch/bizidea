    - 29
    - 33
market:
  tam:
    value: $135.0M
    rationale: 估算美国约有 300 个公用事业辖区，DER 或大负荷并网量足以支撑一套专门工作流软件；按每个辖区每年大致 $0.45M 的软件与支持支出建模，对应 TAM $135.0M。
    isEstimate: true
    sourceRefs:
    - 6
    - 7
    - 8
  sam:
    value: $48.0M
    rationale: 第一阶段先盯大约 120 个规则公开、痛点显性的辖区，比如加州、纽约 / 新英格兰、夏威夷、伊利诺伊和乔治亚；按每个辖区每年约 $0.40M 的支出建模，对应 SAM $48.0M。
    isEstimate: true
    sourceRefs:
    - 10
    - 11
    - 19
    - 21
    - 22
    - 23
  som:
    value: $4.8M
    rationale: 第 3 年可触达情形按 12 个已落地公用事业辖区、每个辖区约 $0.40M 的平均 ACV 估算，增长来自试点转辖区和参考案例带动销售。
    isEstimate: true
    sourceRefs:
    - 24
    - 25
    - 27
    - 29
    - 33
