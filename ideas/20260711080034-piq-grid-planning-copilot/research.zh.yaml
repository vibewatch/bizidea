competitors:
- name: GridUnity
  stage: scale-up
  wedge: 面向公用事业公司的发电与负荷并网工作流平台
  pricing: 企业级定制定价；未公开披露
  strength: 在公用事业工作流和积压管理上定位明确，还有承载容量刷新案例作证。
  weaknessVsUs: 平台叙事更宽，没那么明显聚焦在中型公用事业团队最痛的“申请包到研究草稿”这一层。
  sourceRefs:
  - 24
  - 25
- name: Advanced Energy Analytics
  stage: startup
  wedge: 面向配电系统的自动化详细并网影响研究
  pricing: 企业级定制定价；未公开披露
  strength: 自动化详细研究与数据集成的技术故事很清楚。
  weaknessVsUs: 它默认输入更干净，没那么聚焦完整性审查、申请人沟通和队列分流。
  sourceRefs:
  - 26
  - 34
- name: Gridtwin
  stage: startup
  wedge: 地图优先的并网筛选，以及公用事业 / 开发商门户工作流
  pricing: 企业级定制定价；未公开披露
  strength: 在门户和承载容量上站位很强，也有公用事业落地证据。
  weaknessVsUs: 更偏筛选和规划可见性，而不是后台“研究启动”操作。
  sourceRefs:
  - 18
  - 23
  - 27
- name: Pearl Street Technologies
  stage: scale-up
  wedge: 服务输电机构与项目开发商的并网积压软件
  pricing: 企业级定制定价；未公开披露
  strength: 在积压缓解和建模领域品牌强、且在输电侧更有公信力。
  weaknessVsUs: 重心在大电网 / 输电工作流，不在配电申请包翻译层。
  sourceRefs:
  - 28
- name: Burns & McDonnell / 1898 & Co.
  stage: incumbent
  wedge: 以咨询交付为主的并网研究、规划和顾问服务
  pricing: 按项目收费；未公开披露
  strength: 公用事业信任深，而且能接住定制化研究和高峰溢出需求。
  weaknessVsUs: 属于重人工替代方案，软件反馈回路更弱，也不容易规模化沉淀工作流数据。
  sourceRefs:
  - 29
  - 30
regulatoryTechnicalConstraints:
- point: IEEE 1547 规定了 DER 并网的基础互操作、测试、性能和异常工况要求。
  sourceRefs:
  - 5
- point: 加州 Rule 21、纽约 SIR 等州级 / 公用事业规则，决定了产品必须按辖区编码工作流逻辑，而不可能只有一套全国通用清单。
  sourceRefs:
  - 10
  - 11
- point: 如果申请包缺少单线图、站点图、保护细节或储能专属假设，公用事业公司完全可以直接退件或拖延。
  sourceRefs:
  - 12
  - 13
  - 22
- point: 很多公用事业公司已经把申请人引到 CIT、PowerClerk 这类具名门户里，所以新软件必须和这些前台表面共存。
  sourceRefs:
  - 19
  - 20
  - 23
- point: 研究导出仍然要贴合现有分析与遥测生态，而不是再发明一套全新的操作环境。
  sourceRefs:
  - 31
  - 34
validationSignals:
- point: Piq Energy 拿到种子轮，说明投资人已经开始把 AI 驱动的电网规划和并网工具当成可投的品类。
  sourceRefs:
  - 32
- point: DOE 支持的 iQMS 明确把软件、预测、GIS 和 AI 用来减少 DER 队列的手工摩擦。
  sourceRefs:
  - 33
- point: GridUnity 披露，PG&E 在一次软件驱动的数据刷新后，公开的承载容量提高了近 400%。
  sourceRefs:
  - 25
- point: Gridtwin 声称在 Eversource 的并网门户上已有 1000+ 用户，说明公用事业公司确实会规模化采用外部并网软件。
  sourceRefs:
  - 27
openQuestions:
- 典型 5-10 人工程团队，按细分场景（太阳能、储能、EV、大负荷）到底一年处理多少申请、又有多少完整性失败？
- 目标公用事业公司里，已有多少比例用上了 PowerClerk 或类似门户？创业公司最好的落点，是不是附加层而不是替换？
- 滩头市场里到底是哪几套模型和 GIS 栈占主导？在不做重定制的前提下，能用到哪些导出表面？
- 在现有治理、审计和记录留存规则下，公用事业公司会不会允许 AI 起草回复信和改造范围？
