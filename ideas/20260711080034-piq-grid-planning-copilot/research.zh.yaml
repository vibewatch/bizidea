reportMemo:
  executiveTakeaways:
  - 最锋利的切口不是整套替换公用事业模型，而是把申请包翻成研究案例的那段交接。
  - 市场上已经有门户、研究引擎和咨询公司，但申请包到可研究案例之间那层翻译层还很碎。
  - 各地监管差异很大，所以每个审过的案例都会沉淀成一笔能复用的工作流和规则资产。
  - 最容易批预算的卖法，不是泛 AI 提效，而是工程吞吐提升和少用咨询公司的软件。
  marketDefinition: 美国优先的一套软件与工作流基础设施，服务配电公用事业公司的并网团队，处理 DER 和新兴大负荷申请。这个品类卡在受理门户和馈线研究工具之间：它负责把申请包数据结构化、执行各家公用事业的要求，并产出可开研究的案例和利益相关方沟通草稿。
  customerAndBuyer: 主要用户是公用事业并网经理、配网规划人员，以及审核太阳能、储能、EV 充电和其他分布式能源申请的工程团队。经济买方通常是并网、电网规划或工程运营总监；在公用电力和合作社体系里，还往往要再经过治理或采购层的把关。
  buyingTriggers:
  - point: 队列量还在涨，但公用事业公司对外描述的并网工作流，仍然是手工、纸质或碎片化的。
    sourceRefs:
    - 1
    - 2
    - 24
    - 33
  - point: 完整性审查会吃掉工程时间，因为在研究正式开始前，公用事业公司就要求齐备的一线图、站点图、保护设定和本地化表格。
    sourceRefs:
    - 11
    - 12
    - 13
    - 19
  - point: 来自 EV 基础设施和数据中心式需求的大负荷增长，把新的申请类别压进了同一批本就紧张的团队里。
    sourceRefs:
    - 2
    - 9
    - 35
  willingnessToPay:
    summary: 公用事业公司今天已经在为门户、研究、咨询和电网数据刷新买单。只有当一套新工作台能明确减少手工完整性审查、缩短研究启动时间，并在不逼着公用事业公司拆掉现有研究引擎的前提下提升队列透明度时，预算才最容易松动。
    sourceRefs:
    - 19
    - 20
    - 24
    - 25
    - 27
    - 29
    - 30
  competitiveLandscape: 竞争对手来自公用事业门户、自动化研究引擎、地图优先筛选工具、输电积压平台和咨询替代方案。真正的空白不是泛泛的“面向电网的 AI”，而是把一堆脏申请包翻成工程师可审研究案例的、公用事业专用翻译层。
  incumbentThesis:
  - incumbentClass: 公用事业申请门户
    point: 它们把受理和状态跟踪数字化了，但把图纸、设定和往来函翻成可研究案例这一步，往往还是靠人完成。
    sourceRefs:
    - 19
    - 20
    - 21
    - 23
    - 24
  - incumbentClass: 自动化研究引擎
    point: 一旦输入已经结构化，它们可以自动跑影响研究；但它们并不真正盯着申请包完整性和申请人与公用事业之间的来回补件。
    sourceRefs:
    - 26
    - 34
  - incumbentClass: 地图优先筛选工具
    point: 它们提升的是选址筛选和承载容量可见性，重心更偏规划洞察，而不是公用事业后台把申请拼成案例的那段操作。
    sourceRefs:
    - 18
    - 23
    - 27
  - incumbentClass: 工程咨询公司
    point: 它们能顶住高峰工作量和定制化研究，但知识停留在项目人工里，沉淀不成可复用的工作流数据集。
    sourceRefs:
    - 29
    - 30
  - incumbentClass: 规划与建模工具
    point: 它们仍然是下游真正的记录引擎；也正因为如此，一层翻译层更容易贴着它们落地，而不是上来就替换。
    sourceRefs:
    - 15
    - 16
    - 31
  regulatoryLandscape: 这套工作流不是被全国统一模板塑形，而是被州级费率和各家公用事业的流程规则塑形。Rule 21、New York SIR、IEEE 1547，以及各公用事业的完整性 / 保护要求，意味着产品必须保留辖区级规则、文件留存和工程师签字，而不能像通用文档助手那样处理。
  technologyLandscape: 底层条件终于像样了：公用事业公司现在已有门户、承载容量地图和可数字接入的研究引擎；厂商也在自动化研究、遥测接入和承载容量分析；DOE 支持的 iQMS 试点，则把自动化推进到过去纯手工的队列运营里。真正难的不是单点能力，而是编排——高准确率解析、规则映射，以及导出到现有模型、GIS 和 DERMS 环境。
  distributionChannels:
  - point: 直接卖给并网、配网规划和工程运营负责人，他们本来就背着队列 KPI。
    sourceRefs:
    - 24
    - 27
    - 29
  - point: 把咨询公司和实施伙伴当成渠道盟友，尤其是那些本来就在替公用事业公司承接溢出研究或集成工作的团队。
    sourceRefs:
    - 29
    - 30
    - 34
  - point: 借现代化项目和行业协会的背书，因为这些组织已经把并网定义成一个流程自动化问题。
    sourceRefs:
    - 7
    - 33
    - 35
  partnershipEcosystem:
  - point: 咨询和顾问公司会是重要落地伙伴，因为它们本来就在吃公用事业并网的溢出需求，也最懂本地研究惯例。
    sourceRefs:
    - 29
    - 30
  - point: 遥测、协议和模型集成厂商同样关键，因为真实部署必须连上 1547、2030.5、DNP3、SunSpec 以及研究工具工作流。
    sourceRefs:
    - 31
    - 34
  - point: 已经跑门户或公开并网工具的公用事业公司，是最好的早期试点，因为它们的工作流痛点既看得见，也量得出。
    sourceRefs:
    - 19
    - 20
    - 23
    - 27
  dataMoats:
  - point: 一套专有的申请包缺陷、按公用事业拆分的规则和工程师编辑库，会随着每个通过或被打回的申请越滚越值钱。
    sourceRefs:
    - 10
    - 11
    - 12
    - 13
    - 14
    - 16
  - point: 跨公用事业公司的承载容量、改造触发条件和研究结果基准数据，能进一步堆成一层决策支持系统。
    sourceRefs:
    - 1
    - 18
    - 25
    - 27
  - point: 补件请求、回复函和改造范围草稿的结构化语料，会在队列沟通层上形成一条很实用的护城河。
    sourceRefs:
    - 19
    - 20
    - 21
    - 22
  geographicConsiderations:
  - point: 先从规则公开、DER 渗透高的地区起步，比如加州、纽约 / 新英格兰、夏威夷、伊利诺伊和乔治亚；这些地方的流程、门户和痛点都更公开。
    sourceRefs:
    - 10
    - 11
    - 21
    - 22
    - 23
  - point: 公用电力和合作社辖区会把市场做大，但它们的治理和采购结构跟投资者持有型公用事业公司的买法并不一样。
    sourceRefs:
    - 6
    - 7
  sensitivityCases:
  - case: 公用事业公司已经上了门户
    impact: 产品必须以叠在现有门户旁边的“申请包到案例”工作台切入，而不是去做整套前门替换。
    sourceRefs:
    - 19
    - 20
    - 24
    - 27
  - case: 大负荷申请超出纯 DER 工作流
    impact: 路线图必须支持 EV 车队场站、数据中心和其他阶跃式负荷，否则需求一旦转向，滩头市场就会变窄。
    sourceRefs:
    - 2
    - 9
    - 35
  - case: 接入研究栈和遥测栈比预期更慢
    impact: 早期 SAM 会被压缩到那些导出更干净、模型栈更现代的公用事业公司身上，服务强度也会跟着上升。
    sourceRefs:
    - 25
    - 31
    - 34
  - case: 工程师不信自动草稿的准确度
    impact: 如果完整性检查和回函草稿仍然需要大量返工，产品就会显得是在加一层行政负担，而不是放大吞吐量。
    sourceRefs:
    - 11
    - 12
    - 13
    - 16
  validationPlan:
  - priority: high
    question: 这套工作台能否把某个公用事业队列里“收到申请 → 可启动研究”的中位时间至少砍掉 50%？
    evidenceToGather: 抓试点部署前后的时间戳工作流数据，并拆开看完整性审查、补件往返和工程师交接时间。
  - priority: high
    question: 结构化申请包受理，能不能减少每份申请的补数据往返次数？
    evidenceToGather: 统计试点前后的打回 / 退回申请数量、最常见缺失字段类别，以及开发商总回复轮次。
  - priority: medium
    question: 哪些模型和 GIS 栈组合最容易在不做重定制的情况下支持？
    evidenceToGather: 对使用 OpenDSS 邻近、CYME 邻近和内部自管馈线模型工作流的公用事业公司做技术范围梳理，同时确认所需导出字段。
  - priority: medium
    question: 公用事业公司到底想要一个贴着现有门户的附加层，还是一套更广义的并网操作系统？
    evidenceToGather: 围绕已经在用门户软件、咨询公司溢出支持和内部邮件 / 表格流程的公用事业公司，做买方访谈。
