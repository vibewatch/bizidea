  pestle:
  - factor: 政治
    impact: positive
    point: DOE i2X 等路线图把并网流程改革推成了主流的公用事业现代化议题，而不再只是边缘抱怨。
    sourceRefs:
    - 2
    - 4
  - factor: 经济
    impact: positive
    point: 电气化和数据中心增长抬高了人工并网吞吐瓶颈的机会成本。
    sourceRefs:
    - 6
    - 35
  - factor: 社会
    impact: neutral
    point: 申请人越来越期待透明、门户化的并网体验，但公用事业公司仍需要工程师能信得过的人工审查。
