    - 31
    - 34
  - friction: 监管可审计性与人工信任
    severity: high
    affectedBuyer: DER 并网经理
    mitigation: 每份草稿都要能回到具体规则检查，保留完整审计轨迹，并让工程师始终在审批环里。
