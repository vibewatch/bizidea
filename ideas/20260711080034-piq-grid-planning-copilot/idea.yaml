problem: >-
  Utilities trying to connect new solar, storage, EV-charging, and flexible-load
  projects still translate each application from PDFs, spreadsheets, and
  technical exhibits into utility-specific study assumptions by hand. Developers
  then wait while engineers chase missing data, rebuild cases, and draft
  responses inside legacy planning tools and email threads. Even when a project
  is viable, the queue can stall for administrative and study-prep reasons,
  delaying project finance, equipment orders, and the grid capacity buyers
  already want online.
targetUser:
  primary: >-
    DER interconnection manager or distribution-planning lead at a utility
    processing 100-1,000 annual solar, storage, EV-charging, and flexible-load
    applications
  secondary: >-
    Development manager at a storage, solar, or EV-charging developer
    submitting projects into multiple utility territories
  buyer: >-
    Director of grid planning, DER interconnection, or engineering operations
startupThesis:
  nonObviousInsight: >-
    The real scarcity is engineering throughput inside interconnection offices.
    Utilities can only connect new projects as fast as engineers can convert
    messy application packets into study-ready cases, so the first valuable
    product is not a full grid-model replacement but a workflow layer that
    productizes those repetitive judgments.
  beachhead: >-
    Initial screening and study scoping for utilities with 3-15 interconnection
    engineers that receive 100-1,000 annual solar, storage, EV-charging, and
    flexible-load applications and still move packet data into feeder-study
    tools by hand
  wedge: >-
    An interconnection workbench that ingests application packets, checks
    completeness, auto-builds first-pass study cases, and drafts developer
    response letters plus upgrade scopes for engineer approval.
  whyNowCatalyst: >-
    Piq's seed round and stated expansion of agentic grid-planning software to
    more utilities and developers show that interconnection-study automation is
    crossing from niche consulting into a sellable software category.
  ventureScalePath: >-
    Start with utility-side intake and study scoping, then expand into
    developer preflight submissions, upgrade-cost benchmarking, hosting-capacity
    planning, and the shared system of record for grid-connection decisions.
solution: >-
  The product sits between an incoming project application and the utility's
  legacy study environment. It parses single-line diagrams, load or generation
  profiles, protection settings, and prior correspondence, flags missing inputs,
  and creates a first-pass study package that an engineer can approve or edit
  instead of assembling from scratch. Utilities use it to triage queues,
  standardize assumptions, and draft upgrade or information-request letters;
  developers can later use a mirrored portal to see what is missing before
  resubmission. The first workflow is intake-to-study kickoff for distributed
  energy and flexible-load projects, where delay often comes from incomplete
  packets and repetitive model setup rather than hard grid physics. Over time,
  each reviewed case becomes training data on which application patterns,
  feeders, and design choices create upgrades, delays, or approvals.
goToMarketSeed:
  firstCustomer: >-
    An interconnection manager at a distribution utility with a 5-10 person
    engineering team and a backlog of 150-plus solar, storage, EV-depot, and
    flexible-load applications across multiple substations
  buyingTrigger: >-
    The queue grows faster than internal engineers can start studies, forcing
    the utility to miss developer-response targets or pay outside engineering
    support just to keep up.
  currentAlternative: >-
    Spreadsheet queue trackers, email threads, consultant study prep, and
    one-case-at-a-time work inside legacy distribution-planning tools.
  switchingReason: >-
    The workbench keeps the existing planning-model stack but automates the
    repetitive intake, completeness, and first-study setup steps that create
    most avoidable delay.
  pricingHypothesis: >-
    Annual subscription per utility territory or interconnection team, plus
    usage fees tied to active applications or feeder studies started.
