jobsToBeDone:
  - job: >-
      When a new batch of interconnection applications arrives, help the
      utility interconnection manager identify which packets are complete and
      start study setup, so engineers spend time reviewing cases instead of
      rebuilding them from scratch.
    currentAlternative: "Email, spreadsheets, and manual model preparation"
    successMetric: "Days from application receipt to engineer-approved study kickoff"
  - job: >-
      When a developer prepares a solar, storage, or flexible-load application,
      help the development manager submit a packet the utility can actually
      study, so the project avoids months of avoidable resubmissions.
    currentAlternative: "Consultants, internal spreadsheets, and repeated utility clarification cycles"
    successMetric: "Number of information-request loops before the utility accepts the application as study-ready"
