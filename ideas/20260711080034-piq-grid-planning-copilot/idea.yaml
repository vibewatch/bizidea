topRisks:
  - name: "Utility adoption friction"
    description: >-
      Utilities may resist letting software touch regulated engineering
      workflows and may default to consultants or incumbent internal processes.
    mitigation: >-
      Start as an engineer-review layer that produces draft study packages and
      audit logs while integrating into the existing planning stack rather than
      replacing it.
  - name: "Legacy-model integration"
    description: >-
      The product only works if it fits messy document repositories,
      feeder-study environments, and asset-data systems that vary by utility.
    mitigation: >-
      Target a narrow set of common data formats first, ship opinionated
      adapters, and sell early deployments with scoped implementation support.
  - name: "Two-sided focus creep"
    description: >-
      Trying to serve utilities and developers equally from day one could blur
      the roadmap and weaken the core wedge.
    mitigation: >-
      Win the utility-side intake workflow first, then expose a developer
      preflight portal only after the utility product is sticky.
