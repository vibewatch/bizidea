slug: interconnection-study-workbench
date: '2026-07-11'
executiveSummary: 这家公司应该先从一套并网研究工作台切入，目标是中型配电公用事业公司：它们的 DER 和柔性负荷队列增长速度，已经超过小型工程团队把申请包翻成可研究案例的速度。真正痛的不是潮流计算本身，而是 PDF、表格、邮件线程和咨询公司溢出工作之间那段手工的“申请包 → 研究案例”交接，这会拖慢公用事业公司的回复 SLA，也会打乱开发商项目排期。第一款产品必须收得很窄：一层由工程师把关的“受理到研究启动”工作台，负责检查申请包完整性、拼出首版研究包、起草补件函或改造函，并把结果导出到公用事业公司现有的研究环境。GTM 也要沿着这条工作流来打：先向一个积压 150+ 申请的公用事业辖区卖付费试点，按辖区或团队加申请量定价，并把咨询公司或系统集成商当成背书与落地伙伴，而不是主交付模式。之所以要贴着现有门户和研究工具起步，核心是更快拿到证明：公用事业公司本来就在为消化积压和少用咨询公司预算，而整套模型替换只会把销售周期拖得更慢、可信度也更低。这个切口如果跑通，真正沉淀下来的资产是规则与结果数据：它覆盖申请包缺陷、工程师修改、往来函模式、触发改造的条件和研究结果，而这些数据现有厂商天然抓不成可复用资产。最主要的反证风险是，各地规则、脏源文件和模型栈差异太大，最后把部署拖成重服务项目，或者让工程师迟迟不敢在生产里用。当前建模的 SAM 和 SOM 分别是 $48.0M 与 $4.8M；而真实申请量、主流模型栈，以及公用事业公司对 AI 起草函件的容忍度都还没坐实，所以这是不是一笔风险投资级的软件生意，取决于公司能否在扩编前先证明跨第二个辖区也能重复部署，并且能顺着相邻模块继续扩。
problem:
- 只有 3-15 名工程师的公用事业并网团队，今天还是要花上几天，把申请包里的一线图、保护设定、站点图纸和往来函件，翻成各家公用事业自己的研究假设，馈线分析这才刚刚开始。
- 现有门户、研究引擎和咨询公司，要么只把受理流程数字化，要么只跑下游分析，但都没真正砍掉积压的根源：完整性审查、补件往返和首版案例组装的循环。
solution:
- 提供一套工作台：吃进 DER 和柔性负荷申请包，按各家公用事业规则做完整性和规则检查，把技术数据结构化，并生成一份工程师可审的研究包和利益相关方沟通草稿。
- 先作为贴在现有门户和研究工具旁边的附加层切入；只有等公用事业侧的受理层先跑出信任，再把同一套数据模型扩到开发商预检、改造基准和大负荷并网工作流。
whyWeWin:
- 这个切口正好打在现有厂商留下的断点上：门户负责收件，研究引擎负责分析结构化案例，真正把申请包翻成可研究案例的那一段，今天仍靠咨询公司和人工硬接。
- 产品可以贴着现有规划栈落地，不必要求公用事业公司整套替换；这更符合受监管买家采用新软件的方式，也更容易量化“少用咨询公司”的 ROI。
- 每一份通过或被改正的草稿，都会继续堆厚一套专有的规则、缺陷和工程师编辑数据集，既能提高准确率，也能跨公用事业公司做基准分析。
strategicChoices:
  beachhead: 先拿下一个已经有面向申请人的门户、但仍靠工程师、表格和咨询公司溢出支持，把申请包翻成可研究案例的中型配电公用事业 DER 并网队列。
  wedgeRationale: 从门户之后、研究引擎之前切入，既能把最手工的瓶颈单独拎出来，又能用“研究启动天数”和“补件来回轮次”证明价值，同时避开与现有规划系统正面做整套替换。
  sequencingRationale: 公司应该先拿下公用事业侧受理和研究范围界定，再把导出式集成与规则库标准化，最后才加开发商预检或大负荷模块；因为早期证明必须盯住一个可量化的吞吐 KPI，而不是讲一个宽泛的双边平台故事。
  notYet:
  - 在公用事业侧审核工作流还没拿到可引用案例前，就先卖开发商侧提交门户
  - 整套馈线研究引擎替换或 DERMS 功能
  - 输电或大电网并网工作流
  - 在集成还没跑出可复制性前，就向低申请量公用事业公司做全国扩张
market:
  tam: 建模 TAM 为 $135.0M：美国大约 300 个公用事业辖区，DER 或大负荷并网量足以支撑每年约 $450k 的软件与支持支出。
  sam: 建模 SAM 为 $48.0M：大约 120 个第一波辖区，集中在规则公开、痛点显性的地区，队列压力和公开流程都让创始人主导销售更可行。
  som: 第 3 年 SOM 为 $4.8M：假设拿下 12 个公用事业辖区，平均 ACV 约 $400k，增长来自试点转辖区和参考案例带动销售。
  segments:
  - 每年有 100-1,000 份 DER 或大负荷申请、并配有 3-15 名并网工程师的中型配电公用事业公司
  - 后续可用同一套规则层做预检提交的多辖区太阳能、储能、EV 充电和柔性负荷开发商
  buyingProcess: 销售通常从并网经理或规划负责人开始：他们错过回复时限、看到咨询费上升，或者遇到储能、EV 或大负荷申请带来的明显队列激增。经济买方一般是并网、电网规划或工程运营总监；最快路径是在一条队列上先做付费试点，之后再走采购或公用事业治理审查，推到整个辖区的年度部署。
product:
  mvp: MVP 是一套面向单一公用事业队列的“工程师在环”受理到研究启动工作台：解析申请包文档，套用各家公用事业的完整性规则，拼出首版研究案例，起草补件函或改造函，并带着完整审计轨迹，把结构化数据导出到现有研究工作流。第一天就别承诺把所有模型、GIS 和 DERMS 系统都深度自动化；先靠结构化导出和人工审批把事情跑起来。
  sixMonth: 上线 2-3 个付费试点，沉淀出可复用的完整性规则库、缺陷标签、回复模板，以及至少 1 条通向常见“门户 + 研究工具”环境的导出路径。
  twelveMonth: 补上缺陷类别、补件来回轮次和研究启动周期的基准报告；产品化 2-3 个集成适配器；并只对已经上线核心工作流的公用事业客户，发布一个受限版开发商预检模块。
  twentyFourMonth: 在同一套规则引擎上支持大负荷和 EV 车队场站申请，扩到 8-12 个生产环境公用事业辖区，并把跨公用事业公司的改造与队列结果数据做成一层能抬高 ACV 的基准层。
  keyBets:
  - 只要产品保留规则级可审计性、且不遮住底层申请证据，公用事业公司会信任“工程师审核后通过”的自动草稿。
  - 在更深的模型栈适配器做出来之前，导出优先的集成方式足够让首批试点快到还能守住软件毛利。
  - 按辖区收六位数合同，比按席位卖效率工具，更容易用工程吞吐和减少咨询公司的 ROI 说服买方。
  - 同一套结构化申请包与回函数据，可以在不打乱“公用事业优先”路线图的前提下，支撑开发商预检和大负荷扩张。
gtm:
  wedge: 向一个手里压着 150+ 申请、团队 5-10 人的公用事业辖区卖付费试点，把产品讲成：不替换现有门户或规划引擎的前提下，最快把“从收到申请到启动研究”的天数砍下来的工具。
  channels:
  - 面向并网、配网规划和工程运营负责人的创始人主导直销
  - 与已经服务超负荷公用事业公司的并网咨询公司、电网规划精品咨询机构和系统集成商建立转介与实施合作
  - 借 DOE 现代化项目、公用电力 / 合作社协会，以及高 DER 辖区参考客户来建立公信力
  funnelTargets: 目标账户→合格试点 15-25%，合格试点→付费试点 30-50%，付费试点→生产环境 60%+，首个生产辖区→12 个月内扩到第二个辖区或开发商预检模块 40%+。
  pricing: $50k-$100k 的 3-6 个月单队列付费试点，若证明研究启动至少快 50%、且补件来回明显减少，再转成每个公用事业辖区或并网团队约 $200k-$400k 的年度订阅，加上实施费以及与活跃申请或已启动研究包挂钩的使用费；这种卖法比按席位计价更贴合买方为缓解积压拨预算的方式。
businessModel:
  revenueStreams:
  - 每个公用事业辖区或并网团队在生产环境使用工作台时收年度订阅费
  - 新公用事业部署收一次性实施与数据映射费用
  - 开发商预检、基准分析和队列沟通等高级模块收使用费或模块费
  unitOfValue: 通过平台把一条公用事业辖区或并网队列，从收包推进到工程师批准启动研究。
  targetGrossMarginPct: 70
  expansionLevers:
  - 从同一公用事业账户的一条队列，扩到相邻辖区、馈线或申请类别
  - 增加开发商预检工作流，在正式提交前先减少补数据来回
  - 等数据足够后，卖改造触发条件、缺陷率和研究结果的基准分析
  - 把同一套规则层延伸到 EV 车队场站、柔性负荷和其他大负荷并网工作流
strategyMap:
  northStarMetric: 每月通过平台从收件推进到“可启动研究”的、并已获工程师批准的申请数量。
  inputMetrics:
  - 已签付费公用事业试点数量
  - 从收到申请到可启动研究的中位天数
  - 每份申请的补数据 / 信息请求轮次
  - 自动生成研究包里，仅需轻微工程师修改即可通过的比例
  - 付费试点转年度生产环境的转化率
  moatsToBuild:
  - 把按公用事业拆分的规则库，与申请缺陷、工程师修改和已批准研究输出绑在一起
  - 跨公用事业公司的改造触发、周期时间和队列结果基准数据
  - 嵌进公用事业日常节奏里的工作流适配器和往来函模板
  killCriteria:
  - 在聚焦销售 12 个月后，面向已上门户的中型公用事业公司仍签不下 3 个付费试点
  - 没有任何试点能把“收到申请到可启动研究”的中位时间至少砍掉 50%
  - 经过两轮试点迭代后，工程师对自动生成研究包的接受率仍低于 60%
  - 超过一半的合格商机都要求无法在 6 周内标准化的定制集成或规则映射
  mermaid: |
    flowchart LR
      Wedge[门户到研究的翻译切口] --> MVP[工程师在环工作台]
      MVP --> Proof[周期时间证明]
      Proof --> Expansion[开发商预检与大负荷扩张]
investorMemo:
  verdict:
    call: 观察
    conviction: 运营痛点很硬，但市场规模和集成可复制性仍要靠试点先跑出证明，才能算一笔清晰的风险投资级软件下注。
    whyBelieve: 公用事业并网团队面对的是可量化的吞吐瓶颈，“申请包到研究”的交接仍然碎片化，而早期部署有机会沉淀出一套可防守的规则与结果数据集。
    whyDoubt: 建模 SAM 不算大，采购摩擦高，而且如果集成太定制化，软件毛利可能在相邻工作流扩张被证实前就被封顶。
    nextDiligence: 先给一家已上门户的公用事业公司包一笔付费试点，并验证两件事：研究周期是否明显改善，以及第二个辖区能否不靠定制开发就重复落地。
  firstCustomer:
    title: 中型配电公用事业公司的 DER 并网经理
    profile: 一个辖区内有 5-10 名并网工程师，手里压着 150+ 份太阳能、储能、EV 充电或柔性负荷申请，已经上了申请门户，而且咨询费或积压压力已经很显眼。
    trigger: 队列增长速度超过工程师启动研究的速度，导致回复时限被错过、补件请求反复，或外部工程支出持续抬头。
    buyer: DER 并网、电网规划或工程运营总监
    initialContract: 先签一笔 $50k-$100k 的单队列试点；若公用事业公司证明研究启动至少快 50%，且补件来回明显减少，再转成约 $200k-$400k ARR，加实施费。
  mustBeTrue:
  - 至少有 100-120 个第一波公用事业辖区，年申请量和积压痛点足以支撑超过 $200k 的经常性软件支出。
  - 一套工程师在环工作台，能把中位“研究就绪启动时间”至少砍掉 50%，同时不抬高合规或审计风险。
  - 已经在用 PowerClerk、CIT 或类似门户的公用事业公司，仍会买一层翻译层附加件，而不是等现有厂商自己补工作流。
  - 前 3-5 个部署能靠标准化规则库和导出适配器上线，而不是每单都做项目制集成。
  - 公用事业侧的缺陷、编辑和结果数据，能在 24 个月内值钱到足以撑起开发商预检或基准扩张。
  diligenceQuestions:
  - 在研究列出的第一波地区里，今天到底有哪些具体公用事业辖区符合“年申请量 100-1,000、工程师 3-15 人”的滩头画像？
  - 公用事业买家到底更常为新工作流软件拨款，还是扩展 PowerClerk、GridUnity、咨询公司或内部流程？
  - 滩头市场的主流模型、GIS 和导出栈到底是什么？不写定制代码的前提下，能覆盖几套？
  - 如果工程师仍然保留签字权，法务、合规和档案团队会不会放行 AI 起草的回复信？
  - 有多少试点客户愿意让公司保留匿名化编辑和结果数据，用来搭护城河？
operatingAssumptions:
- assumption: 即使产品起步只是叠在现有门户旁边，只要能提升工程吞吐、减少咨询公司使用，公用事业公司也愿意签六位数年合同。
  basis: research.yaml
  validationTest: 12 个月内，按拟议的辖区定价拿下 2 个付费试点和至少 1 个年度生产环境合同。
  decisionImpact: 如果不成立，公司就得转向更低价模块、咨询公司渠道转售，或更偏服务驱动的模式。
- assumption: 导出优先的集成方式，足以让首批试点在 4-6 周内跑起来。
  basis: idea.yaml
  validationTest: 靠门户导出和人工数据映射，在 1 家共创客户处部署试点，并把上线时间控制在 6 周内，不做定制 API。
  decisionImpact: 如果不成立，烧钱速度会上升，滩头市场会被缩到更干净的公用事业公司，公司也可能更早需要 seed 级融资。
- assumption: 在初期调优后，工程师对自动生成的完整性发现、研究输入或回函草稿，至少有 60% 能在仅做轻微修改后接受。
  basis: 经营判断
  validationTest: 用 1 家公用事业共创客户的 100 份历史申请跑模型，按产物类别量化接受率和修改率。
  decisionImpact: 如果不成立，产品就该退回到结构化受理和缺陷编码，而不是继续推自动案例组装或自动沟通草稿。
- assumption: 已经上了门户的公用事业公司会是最快采纳者，因为剩下的瓶颈在“申请包到研究”的交接，而不是前端受理。
  basis: research.yaml
  validationTest: 访谈 8 家具名门户部署的公用事业公司，并至少拿下 1 个不用替换门户、只讲附加层故事就能成交的试点。
  decisionImpact: 如果不成立，GTM 就应转向前门工具更弱的公用事业公司，或去找现有门户厂商合作。
- assumption: EV 车队场站和数据中心等大负荷工作流，与 DER 申请逻辑足够相似，能在第 2 年成为扩张方向。
  basis: research.yaml
  validationTest: 拿 3 份大负荷申请样本去对核心数据模型，确认至少 70% 的必填字段和审核步骤能复用 DER 工作流。
  decisionImpact: 如果不成立，公司就该更久留在 DER 和储能里，近中期的风险投资级扩张叙事也会变弱。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 位位于高 DER、已上门户辖区的公用事业并网负责人、规划经理和咨询伙伴。
  hypothesis: 队列积压、咨询费和回复时限压力，已经构成了一笔有预算的付费“申请包到研究”工作台试点机会。
  successMetric: 至少 10 场访谈确认积压痛点正在发生，且有 5 家同意继续做工作流映射。
  owner: CEO
- horizon: 0–90 天
  experiment: 与 1 家共创客户一起，对最近 100 份太阳能、储能和柔性负荷申请做历史申请包审计。
  hypothesis: 一套标准化缺陷分类和完整性引擎，可以抓住大多数补数据和研究启动延误。
  successMetric: 在工程师复核下，工具对完整性缺陷和所需后续动作的分类准确率至少达到 80%。
  owner: 产品负责人
- horizon: 0–90 天
  experiment: 基于 1 个现有门户或文档仓库，做出一条导出式案例组装原型，接进公用事业公司的研究启动工作流。
  hypothesis: 即便不深度打通每一套现有系统，也能交付对试点有意义的价值。
  successMetric: 在工程师总复核时间低于 30 分钟的情况下，生成 1 份端到端研究包草稿，并把试点准备周期压在 6 周内。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 把 2 家共创客户转成各自围绕 1 条过载队列的付费试点。
  hypothesis: 只要把价值框成工程吞吐和减少咨询公司，而不是泛 AI 效率，公用事业公司就愿意为这条工作流买单。
  successMetric: 签下 2 个付费试点，并至少有 1 个把中位“研究就绪启动时间”相对旧流程缩短 50%。
  owner: CEO
- horizon: 90–180 天
  experiment: 在试点转化时测试按辖区收年度费、再叠加实施打包的定价方式。
  hypothesis: 对公用事业公司来说，按辖区定价并叠加使用费或实施费，比按席位定价更容易批。
  successMetric: 至少 2 位买家接受书面版“试点 → 生产环境”报价，而不是要求纯工时计费。
  owner: CEO
- horizon: 180–360 天
  experiment: 让 1 个生产环境客户扩到第二条队列，并基于真实缺陷数据上线一个受限版开发商预检模块。
  hypothesis: 公用事业侧的规则与缺陷数据集，可以顺着相邻场景扩出去，而不会太早分裂成第二条产品线。
  successMetric: 至少 1 个生产客户在初始队列之外继续扩单，且预检模块把退回申请量至少压低 25%。
  owner: 产品负责人
operations:
- 维护按公用事业拆分的完整性、回函模板和审计轨迹库；每一次工程师修改都要打标签，反哺模型重训。
- 每周和公用事业内部推进人一起过队列，让草稿输出真正变成运营工具，而不是旁路分析。
- 把集成打包成可复用适配器，接到现有门户、文档库和研究导出上；只有在部署复杂度超出标准模板时，才调咨询伙伴进场。
- 按申请跟踪周期时间、缺陷和改造触发指标，让基准数据从第一天起就开始积累。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责搭出定义产品切口的解析、规则、导出和可审计层。
- role: 电网工作流产品与实施负责人
  startTiming: 第 0 个月
  rationale: 把杂乱的公用事业审核习惯，翻成可复用的规则库、模板和试点作战手册。
- role: 创始人主导 GTM
  startTiming: 第 0 个月
  rationale: 必须从一开始就亲自上，因为首批客户只是一小群资深公用事业运营者，他们买的是信任、参考案例和明确的队列 KPI。
- role: 解决方案工程师
  startTiming: 第 4 个月
  rationale: 把门户、文档和研究工具适配器标准化，避免试点变成一单一个定制集成项目。
- role: 监管与数据运营负责人
  startTiming: 第 8 个月
  rationale: 公司跨辖区扩张后，这个角色负责维护按辖区拆分的规则、审计材料和已标注训练数据。
milestones:
- horizon: 0–12 个月
  items:
  - 在已上门户、且符合 3-15 人工程团队滩头画像的公用事业辖区里，签下 3 个付费试点。
  - 至少把 2 个试点转成年费生产部署，并用“研究启动快 50%”和更少的补件来回证明价值。
  - 标准化一套规则与导出模板，能在至少 2 个辖区复用，而不写定制代码。
- horizon: 12–24 个月
  items:
  - 做到 6-8 个生产环境公用事业辖区，并把标准客户的部署时间压在 6 周内。
  - 在现有公用事业客户里上线基准分析和一个受限版开发商预检模块。
  - 在不打断核心 DER 工作流的前提下，支持 1 类新的申请，如 EV 车队场站或其他大柔性负荷。
- horizon: 24–36 个月
  items:
  - 做到约 12 个已落地公用事业辖区，与研究里的第 3 年 SOM 保持一致。
  - 在第一波重点地区，成为能贴在现有门户或研究栈旁边的、可被引用的附加层。
  - 把规则与结果数据集继续扩成更高 ACV 的基准分析、沟通和大负荷模块，同时把毛利率目标稳在 70% 以上。
risks:
- risk: 不同公用事业公司的集成和规则映射差异太大，最后把部署拖成重服务项目。
  likelihood: High
  impact: High
  mitigation: 先盯已经上门户的公用事业公司，优先发导出式适配器；在两地还没能复用同一模板前，不做地域扩张。
- risk: 工程师或合规团队不信自动生成的研究输入或回函草稿，达不到生产环境可用水平。
  likelihood: Medium
  impact: High
  mitigation: 把工程师牢牢放在签字环里，每份草稿都展示规则级证据，并在扩大自动化范围前先量化接受率。
- risk: 在创业公司真正扎进去之前，现有门户、研究厂商或咨询公司就把工作流缺口补上了。
  likelihood: Medium
  impact: Medium
  mitigation: 靠翻译层数据集、贴着现有工具的更快部署，以及人工替代方案和通用门户都抓不到的基准洞察来赢。
- risk: 如果大负荷、开发商或基准扩张迟迟跑不出来，最初的公用事业切口会显得太窄。
  likelihood: Medium
  impact: High
  mitigation: 给第二条队列扩张和大负荷复用设硬性止损条件，在相邻模块抬升 ACV 的证明没出来前，不要提前扩编。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金将覆盖核心产品工程、2-3 个共创客户试点、可复用的门户与研究导出适配器、首批辖区的监管规则库，以及足够的创始人主导 GTM 和解决方案交付能力，让公司先证明“试点 → 生产环境”转化，再谈更广的市场扩张。
