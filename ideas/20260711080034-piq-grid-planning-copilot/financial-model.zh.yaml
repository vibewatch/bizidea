slug: interconnection-study-workbench
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-11] 模型从商业计划日期后的第一个完整月开始。'
- id: A2
  name: 期初现金 / pre-seed 融资额
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M and runwayMonths 18] 基准情形取区间下沿，因为团队在 Y2 前都保持精简，只做叠加层。'
- id: A3
  name: 客户定义
  value: 1 个活跃付费公用事业辖区或过载队列；无论仍在付费试点，还是已经进到年度生产环境，都算。
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.unitOfValue + BP investorMemo.firstCustomer.initialContract] 落地动作一次只拿下一条队列或一个辖区。'
- id: A4
  name: 第 1 年客户爬坡
  value: M1-M12 customersEop = 0,0,0,0,1,1,1,2,2,3,3,3
  unit: count
  source: '[BP milestones 0–12 months] 计划在第一年拿下 3 个付费试点，并在更大范围扩张前至少转正 2 个。'
- id: A5
  name: 第 2 年与第 3 年客户里程碑
  value: Q1Y2 4; Q2Y2 5; Q3Y2 6; Q4Y2 7; Q1Y3 8; Q2Y3 9; Q3Y3 10; Q4Y3 12
  unit: count
  source: '[BP milestones 12–24 and 24–36 months + Research market.som 12 territories] 基准情形落在 BP 写明的 Y2 6-8 个辖区里程碑内，并在 Y3 达到研究里 12 个辖区的 SOM。'
- id: A6
  name: 单个活跃辖区的综合月收入爬坡
  value: M5-M10 以试点为主，单月 $16K；M11-M12 升到 $20K；Y2 末到 $26K；Y3 末到 $31K。
  unit: USDK per customer-month
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som $0.40M ACV] 这个综合值反映了付费试点向 $200K-$400K 年度生产合同转化，再叠加早期基准分析或预检加购。'
- id: A7
  name: 用于单位经济模型的期末年化 ARPU
  value: '372'
  unit: USDK per customer-year
  source: '[A6 + Research market.som] Q4Y3 末的 ARPU 来自每个活跃辖区月收入 $31K 的年化。'
- id: A8
  name: 毛利率爬坡
  value: Y1 为 48%-58%，Y2 为 64%-70%，Y3 为 71%-74%。
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on export-first integrations + startup-finance heuristic] 早期试点会被更多服务与实施拖住毛利，等规则库和适配器可复用后，毛利率才往上走。'
- id: A9
  name: 稳态月流失率
  value: '1.5'
  unit: percent
  source: '[BP risks + Research sensitivityCases + startup-finance heuristic] 一旦嵌进公用事业工作流，黏性本应很强；但采购摩擦和信任风险仍要求我们在早期把流失假设放保守。'
- id: A10
  name: 各岗位全包现金薪酬
  value: 创始人 150；创始工程师 190；产品 / 实施负责人 160；解决方案工程师 165；监管 / 数据运营负责人 150；集成工程师 185；客户经理 190；客户成功 145；第二位解决方案工程师 165；生态合作负责人 170；财务 / 运营 120
  unit: USDK per FTE-year
  source: '[BP team roles + startup-finance heuristic] 全包薪酬包含工资、薪资税和福利，对标一支精简的美国垂直软件团队。'
- id: A11
  name: 招聘节奏
  value: M1 招创始人、创始工程师和产品 / 实施负责人；M4 招解决方案工程师；M8 招监管 / 数据运营负责人；M11 招集成工程师；M16 招客户经理；M20 招客户成功；M25 招第二位解决方案工程师；M29 招生态合作负责人；M31 招财务 / 运营。
  unit: timing
  source: '[BP team startTiming + BP strategicChoices.sequencingRationale] 先招产品化和部署岗位，等多辖区可复制性跑出来，再放大 GTM 和后台招聘。'
- id: A12
  name: 薪酬在 P&L 科目中的分摊
  value: 创始人 70% S&M / 30% G&A；创始工程师与集成工程师 100% R&D；产品 / 实施负责人 60% R&D / 40% G&A；解决方案工程师与监管 / 数据运营负责人 50% R&D / 50% G&A；客户经理与生态合作负责人 100% S&M；客户成功 40% S&M / 60% G&A；财务 / 运营 100% G&A。
  unit: allocation
  source: '[BP team rationales + BP operations] 这套分摊跟计划里谁来负责产品化、部署、销售、可审计性和客户支持保持一致。'
- id: A13
  name: 非薪酬运营预算爬坡
  value: 非薪酬月支出从 $26K 起步，到 Q4Y3 升到 $59K，覆盖差旅、云 / 推理、法务、保险和实施工具。
  unit: USDK per month
  source: '[BP operations + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 预算保持精简，但要覆盖现场部署差旅、受监管买家的法务工作，以及文档处理基础设施。'
- id: A14
  name: 收入确认政策
  value: 每期确认收入 = 期内平均活跃客户数 × 该阶段的综合月 ARPU。
  unit: policy
  source: '[BP businessModel revenueStreams + A6] 这样做让确认收入直接跟客户数，以及从试点到生产的定价爬坡挂钩。'
- id: A15
  name: 现金转换政策
  value: 现金变动 = EBITDA。
  unit: policy
  source: '[Startup-finance heuristic] 模型在 pre-seed 阶段不单独叠加债务、资本开支、税项或实质性的营运资金时点差。'
- id: A16
  name: 用于单位经济模型的综合 CAC
  value: '160'
  unit: USDK per new production territory
  source: '[BP gtm.funnelTargets + BP channels + startup-finance heuristic] 这个数在原始 S&M / 新客户计算上再往上取整，覆盖创始人销售时间、采购差旅和公用事业定制化商机界定。'
- id: A17
  name: 下一轮融资的里程碑
  value: 到 Q4Y2 前，公司需要做到 6-8 个生产辖区、标准部署用时低于 6 周，并在至少 1 个在线账户里挂上基准分析或预检扩张。
  unit: milestone
  source: '[BP milestones 12–24 months + BP fundingAsk.useOfFundsSummary] 这是能支撑 seed 融资的证明点。'
- id: A18
  name: 第 3 年后段扩张跳升
  value: 第 3 年最后两单辖区的赢单，建立在参考账户已经证明第二个辖区模板可复用、且大负荷工作流能复用之后。
  unit: qualitative
  source: '[BP milestones 24–36 months + BP investorMemo.mustBeTrue] 基准情形假设，只有在证明可复制后，Y3 最后两单辖区才会加速落地。'
- id: A19
  name: 用于确定轮次规模的跑道目标
  value: 24 个月跑到 Q4Y2 的证明点，再加大约 6 个月缓冲，用来准备 seed 融资。
  unit: months
  source: '[BP fundingAsk.runwayMonths 18 + invocation rule requiring a 6-month buffer] 这套精简招聘计划，把基准情形的跑道拉长到高于 BP 最低要求。'
