scenarios:
  downside:
    description: 试点转正大约晚一个季度，ARPU 比计划低 10%，而且集成比预期更重服务。
    y3RevenueK: 2650.2
    y3EbitdaK: -518.3
    cashLowPointK: -371.3
    keyAssumptionChanges:
    - Q4Y2 结束时只有 6 个生产辖区，而不是 7 个。
    - Q4Y3 结束时只有 10 个辖区，而不是 12 个。
    - 综合月 ARPU 比基准爬坡低 10%。
    - 由于适配器仍是半定制状态，毛利率比基准低 5 个点。
  base:
    description: Y1 的 3 个付费试点，逐步转成 Q4Y2 的 7 个活跃付费辖区，并在 Q4Y3 走到 12 个；同时 Y3 毛利率突破 70%。
    y3RevenueK: 3311.0
    y3EbitdaK: 94.3
    cashLowPointK: 400.9
    keyAssumptionChanges:
    - 3 个付费试点都在 Y1 内成交，且至少 2 个在年内转正。
    - 活跃付费辖区从 M12 的 3 个，升到 Q4Y2 的 7 个，再到 Q4Y3 的 12 个。
    - 随着生产环境定价和首批附加模块挂上，综合月 ARPU 在末期走到约 $31K。
    - 模板与导出路径可复用后，毛利率在期末大约走到 74%。
  upside:
    description: 参考案例带动销售和第二条队列扩张，把新增客户时间点整体前拉；同时基准分析或预检模块进一步抬升 ARPU 和毛利。
    y3RevenueK: 4136.3
    y3EbitdaK: 778.2
    cashLowPointK: 706.1
    keyAssumptionChanges:
    - Q4Y2 走到 8 个辖区，Q4Y3 走到 14 个。
    - 因为更快转正、模块挂得更快，综合月 ARPU 比基准高约 8%。
    - 导出模板更早复用，让毛利率比基准再高约 2 个点。
sensitivity:
- variable: ARPU
  downsideCase: 综合 ARPU 末值停在约 $28K MRR，而不是 $31K。
  baseCase: 综合 ARPU 末值约为 $31K MRR / $372K 年化。
  upsideCase: 随着附加模块挂得更强，综合 ARPU 末值达到约 $34K MRR。
  y3RevenueImpactK: -331.0
  cashImpactK: -361.7
- variable: 销售周期
  downsideCase: Y2-Y3 整体上，试点转生产环境大约晚一个季度。
  baseCase: 付费试点大致在 6-9 个月内转正，参考案例再打开下一个辖区。
  upsideCase: 生产环境转化和第二辖区扩单都比基准提前约一个季度。
  y3RevenueImpactK: -351.0
  cashImpactK: -401.6
- variable: 毛利率
  downsideCase: 由于部署仍是半定制，稳态毛利率最高只能到约 69%。
  baseCase: 毛利率在 Y2 期间穿过 70%，并在 Y3 末靠近 74%。
  upsideCase: 若适配器更早复用，毛利率可达 75%-77%。
  y3RevenueImpactK: 0.0
  cashImpactK: -256.9
- variable: 流失率
  downsideCase: 月客户流失率稳定在约 2.5%。
  baseCase: 月客户流失率约 1.5%。
  upsideCase: 等工作流真正嵌进去后，月客户流失率约 1.0%。
  y3RevenueImpactK: -337.5
  cashImpactK: -245.2
- variable: CAC
  downsideCase: 由于采购更慢、创始人差旅维持高位，综合 CAC 升到约 $190K。
  baseCase: 综合 CAC 按 $160K 建模。
  upsideCase: 靠伙伴引荐和更强的参考案例，综合 CAC 降到约 $130K。
  y3RevenueImpactK: 0.0
  cashImpactK: -94.8
- variable: 招聘节奏
  downsideCase: 在可复制性跑出来前，就把 AE、第二位解决方案工程师和生态合作岗位提前了一个季度。
  baseCase: 商业化和部署招聘跟着证明门槛走。
  upsideCase: 非关键 GTM 招聘延后一个季度，等可复制性更清楚再开。
  y3RevenueImpactK: 0.0
  cashImpactK: -131.1
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      TargetAccounts[目标公用事业账户] --> PaidPilots[付费试点]
      PaidPilots --> ProductionTerritories[生产辖区]
      ProductionTerritories --> Revenue[综合 ARPU]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金跑道]
modelSanity:
- checkName: 收入引擎
  finding: 基准收入来自 Y1 的 3 个试点，逐步滚到 Q4Y2 的 7 个付费辖区和 Q4Y3 的 12 个；综合 ARPU 末值约 $31K / 月。
- checkName: 必须跑顺的环节
  finding: 导出优先部署和可复用辖区模板必须站住，这样毛利率才能从试点期的 50% 多，爬到 Q4Y3 大约 74%。
- checkName: 模型会失效的情况
  finding: 如果生产环境转化晚一个季度、集成又让毛利率低 5 个点，下行情形在 Y3 结束前会把现金打到约 -$370K。
- checkName: 下一轮融资证明点
  finding: 一旦公司做到 6-8 个生产辖区、标准部署低于 6 周，并在 1 个在线账户里跑出基准分析或预检扩张，就有理由讲下一轮 seed。
sanityChecks:
  ruleOf40: Y3 增长 110.7% + EBITDA 利润率 2.8% = 113.5%。
  burnMultiple: Y2 的烧钱倍数约 0.5x（收入增长 +$1315.5K，对应 EBITDA -$613.4K）；到 Y3 转为 EBITDA 为正。
  revenuePerFte: Q4Y3 每名 FTE 对应约 $301K 的 Y3 收入（垂直 SaaS 基准为 $200-400K）。
  flags:
  - 基准情形仍押在前 12 个月拿下 3 个付费试点上；而公用事业采购本身就慢，一旦销售晚一个季度，Y3 收入就会少约 $351K，现金少约 $401K。
  - 毛利率直到 Y2 / Y3 才穿过 70% 目标，所以只要定制集成或重人工复核超预期，Y3 就会重新翻回 EBITDA 为负。
  - $2.0M 这轮融资落在 BP 区间下沿，而基准情形的现金低点只有约 $0.4M，所以 seed 融资要在 Q2Y3 之前就启动。
  - 第 3 年上行情形仍依赖基准分析或预检扩张来抬 ARPU，而不只是多拿客户，因为第一波可拿下的客户池也就约 120 个辖区。
