problem: 公用事业公司要把新的太阳能、储能、EV 充电和柔性负荷项目接上电网，今天还是得把每份申请里的 PDF、表格和技术附件，人工翻成各家公用事业自己的研究假设。开发商随后只能等工程师补缺数据、重建案例，再在老旧规划工具和邮件线程里一轮轮回复。项目就算本身可行，也常常因为行政流程和研究准备卡在队列里，项目融资、设备下单，以及买方已经等着上线的电网容量都会被一起拖慢。
targetUser:
  primary: 每年处理 100-1,000 份太阳能、储能、EV 充电和柔性负荷申请的公用事业公司里，负责 DER 并网或配网规划的经理 / 负责人
  secondary: 同时向多个公用事业辖区提交项目的储能、太阳能或 EV 充电开发商开发经理
  buyer: 电网规划、DER 并网或工程运营总监
startupThesis:
  nonObviousInsight: 真正稀缺的不是电网模型，而是并网办公室里的工程吞吐量。公用事业公司能接入多少新项目，取决于工程师多快能把凌乱的申请包翻成可研究的案例。所以第一款有价值的产品，不该是整套电网模型替换，而应该是一层把这些重复判断产品化的工作流。
  beachhead: 切入点先放在那类公用事业公司：它们有 3-15 名并网工程师，每年收到 100-1,000 份太阳能、储能、EV 充电和柔性负荷申请，而且今天还在靠人工把申请包数据搬进馈线研究工具。
  wedge: 做一套并网工作台：吃进申请包，检查完整性，自动搭出首版研究案例，并替工程师起草给开发商的回复信和改造范围，最后由工程师审批。
  whyNowCatalyst: Piq 拿到种子轮融资，并明确要把代理式电网规划软件扩到更多公用事业公司和开发商，说明并网研究自动化正从小众咨询活，跨进可售卖的软件品类。
  ventureScalePath: 先拿下公用事业侧的受理和研究范围界定，再往开发商预检提交、改造成本基准、承载容量规划，以及电网接入决策的共享底账继续扩。
solution: 产品卡在项目申请进入和公用事业老旧研究环境之间。它会解析单线图、负荷或发电曲线、保护设定和历史往来函，标出缺失输入，并先拼出一份工程师可审批、可修改的首版研究包，而不是让工程师从零开始搭。公用事业公司可以用它给队列做分流、统一研究假设，并起草改造函或补件函；后续开发商也能在镜像门户里先看到自己缺了什么，再决定是否重提。第一条工作流聚焦分布式能源和柔性负荷项目从受理到研究启动，因为这里的延误常常不是卡在硬核电网物理，而是卡在申请包不完整和模型搭建反复。时间越久，每个审过的案例都会沉淀成训练数据：哪些申请模式、馈线条件和设计选择更容易触发改造、延误或审批。
goToMarketSeed:
  firstCustomer: 一位公用事业配网公司的并网经理：团队 5-10 人，手里压着 150+ 份太阳能、储能、EV 车队充电和柔性负荷申请，分布在多个变电站。
  buyingTrigger: 队列增长速度超过内部工程师启动研究的速度，逼得公用事业公司要么错过给开发商的回复时限，要么只能继续花钱买外部工程支持。
  currentAlternative: 表格版队列跟踪、邮件线程、咨询公司做研究准备，以及老旧配网规划工具里一案一案地手工推进。
  switchingReason: 这套工作台保留现有规划模型栈，但把最容易制造可避免延误的几步——受理、完整性检查和首版研究搭建——自动化掉。
  pricingHypothesis: 按公用事业辖区或并网团队收年度订阅费，再叠加与活跃申请量或已启动馈线研究挂钩的使用费。
