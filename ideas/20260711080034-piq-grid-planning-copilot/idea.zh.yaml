jobsToBeDone:
- job: 当一批新的并网申请进来时，帮公用事业并网经理先看清哪些申请包是完整的、哪些已经可以启动研究，这样工程师的时间就花在审案例上，而不是从零重搭。
  currentAlternative: 邮件、表格和人工准备模型
  successMetric: 从收到申请到工程师批准启动研究的天数
- job: 当开发商准备提交太阳能、储能或柔性负荷申请时，帮开发经理把申请包一次交到公用事业公司真能开研究的程度，避免项目因为本可避免的重复补件被拖上几个月。
  currentAlternative: 咨询公司、内部表格，以及一轮轮找公用事业公司澄清
  successMetric: 公用事业公司把申请认定为可开研究前，需要走多少轮补件 / 信息请求
