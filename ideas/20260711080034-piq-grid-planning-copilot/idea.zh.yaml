topRisks:
- name: 公用事业采纳阻力
  description: 公用事业公司可能不愿意让软件碰受监管的工程工作流，最后还是回到咨询公司或内部老流程。
  mitigation: 先把产品定位成工程师审核层：产出研究包草稿和审计日志，同时嵌进现有规划栈，而不是上来就替换。
- name: 老旧模型集成
  description: 只有真正塞进那些杂乱的文档仓库、馈线研究环境和资产数据系统里，产品才跑得起来，而这些系统每家公用事业公司都不一样。
  mitigation: 先盯住一小组常见数据格式，优先发一批有明确倾向的适配器，并把早期部署和范围清晰的实施支持一起卖。
- name: 双边聚焦失控
  description: 如果从第一天就想同时把公用事业公司和开发商两边都服务好，路线图很容易发散，核心切口也会被削弱。
  mitigation: 先拿下公用事业侧受理工作流；等公用事业产品真正粘住之后，再开放开发商预检门户。
