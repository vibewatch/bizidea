differentiator: 老牌规划工具擅长在数据已经结构化后做潮流分析；咨询公司和队列追踪表，则在前面那段脏活——把申请包翻成可研究案例——硬扛过去。通用 AI 助手会总结文档，但不懂各家公用事业的并网规则、回函模板和建模假设。这家公司能赢，在于它把这层翻译层拿住：每个通过、拒绝或触发改造的案例都会反哺系统；同时它是嵌进现有规划软件，而不是逼公用事业公司整套替换。
