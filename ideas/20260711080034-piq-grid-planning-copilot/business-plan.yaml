slug: interconnection-study-workbench
date: '2026-07-11'
executiveSummary: >-
  This company should start as an interconnection study workbench for mid-sized
  distribution utilities whose DER and flexible-load queues are growing faster
  than small engineering teams can convert application packets into study-ready
  cases. The acute pain is not power-flow math itself; it is the manual
  packet-to-study handoff across PDFs, spreadsheets, email threads, and
  consultant overflow, which delays utility response targets and developer
  project schedules. The first product should stay narrow: an engineer-in-the-loop
  intake-to-study kickoff layer that checks packet completeness, assembles a
  first-pass study package, drafts information-request or upgrade letters, and
  exports into the utility's existing study environment. Go-to-market should
  mirror that workflow by selling a paid pilot to one utility territory with
  150-plus queued applications, pricing by territory or team plus application
  volume, and using consultants or system integrators as credibility and
  rollout partners rather than as the primary delivery model. The strategic
  reason to start beside existing portals and study tools is speed of proof:
  utilities already budget for backlog reduction and consultant avoidance, while
  full model replacement would trigger a slower and less credible sales cycle.
  If the wedge works, the durable asset is a rules and outcome dataset spanning
  packet defects, engineer edits, correspondence patterns, upgrade triggers, and
  study outcomes that incumbents do not naturally capture in reusable form. The
  main disconfirming risk is that jurisdiction-specific rules, messy source
  documents, and model-stack variability make deployments too services-heavy or
  keep engineer trust too low for production use. The initial modeled SAM and
  SOM are $48.0M and $4.8M, and because actual application volumes, dominant
  model stacks, and utility tolerance for AI-generated draft letters remain
  open, the venture case depends on proving repeatable second-territory
  deployments plus adjacent expansion before scaling headcount.
problem:
  - Utility interconnection teams with 3-15 engineers still spend days translating one-line diagrams, protection settings, site plans, and correspondence from application packets into utility-specific study assumptions before any feeder analysis starts.
  - Existing portals, study engines, and consultants either digitize intake or run downstream analysis, but none reliably eliminate the backlog-causing loop of completeness review, missing-data requests, and first-pass case assembly.
solution:
  - Provide a workbench that ingests DER and flexible-load application packets, applies utility-specific completeness and rules checks, structures the technical data, and generates an engineer-reviewable study package plus draft stakeholder communications.
  - Start as an add-on beside existing portals and study tools, then expand the same data model into developer preflight, upgrade benchmarking, and large-load interconnection workflows only after the utility-side intake layer is trusted.
whyWeWin:
  - The wedge targets the narrow workflow that incumbents leave fragmented: portals capture submissions, study engines analyze structured cases, and consultants bridge the gap manually.
  - The product can fit beside existing planning stacks instead of asking utilities to replace them, which matches how regulated buyers adopt new software and makes consultant-avoidance ROI easier to measure.
  - Every approved or corrected draft compounds a proprietary rules, defect, and engineer-edit dataset that improves accuracy and supports benchmark analytics across utilities.
strategicChoices:
  beachhead: One overloaded DER interconnection queue at a mid-sized distribution utility that already has an applicant-facing portal but still relies on engineers, spreadsheets, and consultant overflow to turn packets into study-ready cases.
  wedgeRationale: Starting after the portal and before the study engine isolates the most manual bottleneck, lets the company prove value on days-to-study-kickoff and missing-data loops, and avoids a rip-and-replace sales motion against incumbent planning systems.
  sequencingRationale: The company should win utility-side intake and study scoping first, standardize export-based integrations and rule libraries second, and only then add developer preflight or large-load modules, because early proof depends on one measurable throughput KPI rather than a broad two-sided platform story.
  notYet:
    - Developer-facing submission portals sold before the utility-side review workflow is referenceable
    - Full feeder-study engine replacement or DERMS functionality
    - Transmission or bulk-power interconnection workflows
    - National expansion into low-volume utilities without repeatable integrations
market:
  tam: $135.0M modeled TAM from about 300 U.S. utility territories with enough DER or large-load interconnection volume to justify roughly $450k of annual software and support spend.
  sam: $48.0M modeled SAM from about 120 first-wave territories in public-rule, high-visibility regions where queue pain and published procedures make founder-led selling feasible.
  som: $4.8M year-3 SOM assuming 12 landed utility territories at about $400k average annual contract value through pilot-to-territory expansion and reference selling.
  segments:
    - Mid-sized distribution utilities with 100-1,000 annual DER or large-load applications and 3-15 interconnection engineers
    - Multi-territory solar, storage, EV-charging, and flexible-load developers that can later use the same rules layer for preflight submissions
  buyingProcess: >-
    The sale usually starts when the interconnection manager or planning lead
    misses response targets, sees consultant spend rise, or faces a visible
    queue surge from storage, EV, or large-load applications. The economic
    buyer is typically a director of interconnection, grid planning, or
    engineering operations, and the fastest path is a paid pilot on one queue
    before a territory-wide annual rollout through procurement or
    public-utility governance review.
product:
  mvp: >-
    MVP is an engineer-in-the-loop intake-to-study kickoff workbench for one
    utility queue that parses packet documents, applies utility-specific
    completeness rules, assembles a first-pass study case, drafts information
    requests or upgrade letters, and exports structured data into the incumbent
    study workflow with a full audit trail. It should rely on structured
    exports and human approval first rather than promise deep automation across
    every model, GIS, and DERMS system on day one.
  sixMonth: Launch 2-3 paid pilots with repeatable completeness-rule libraries, defect tagging, draft response templates, and at least one export path into a common portal-plus-study-tool environment.
  twelveMonth: Add benchmark reporting on defect categories, missing-data loops, and study-start cycle time; productize 2-3 integration adapters; and release a limited developer preflight module only for utilities already live on the core workflow.
  twentyFourMonth: Support large-load and EV-depot applications on the same rules engine, expand into 8-12 production utility territories, and turn cross-utility upgrade and queue-outcome data into a benchmark layer that raises ACV.
  keyBets:
    - Utilities will trust engineer-reviewed drafts if the product preserves rule-level auditability and never hides the underlying packet evidence.
    - Export-first integrations can get the first pilots live fast enough to preserve software margins before deeper model-stack adapters are built.
    - Six-figure territory contracts are easier to justify on engineering-throughput and consultant-avoidance ROI than seat-based productivity claims.
    - The same structured packet and response dataset can support developer preflight and large-load expansion without breaking the utility-first roadmap.
gtm:
  wedge: Sell a paid pilot into one utility territory with a 150-plus application backlog and a 5-10 person interconnection team, positioning the product as the fastest way to cut days-to-study-kickoff without replacing the existing portal or planning engine.
  channels:
    - Founder-led direct sales to interconnection, distribution-planning, and engineering-operations leaders
    - Referral and implementation partnerships with interconnection consultants, grid-planning boutiques, and system integrators already serving overloaded utilities
    - Credibility building through DOE modernization programs, public-power or cooperative associations, and reference customers in high-DER territories
  funnelTargets: "Target account→qualified pilot 15-25%, qualified pilot→paid pilot 30-50%, paid pilot→production 60%+, first production territory→second territory or developer-preflight expansion within 12 months 40%+."
  pricing: "$50k-$100k paid pilot for one queue over 3-6 months, converting to roughly $200k-$400k annual subscription per utility territory or interconnection team plus implementation fees and usage tied to active applications or study packages started; this matches backlog-reduction budgeting better than seat pricing."
businessModel:
  revenueStreams:
    - Annual subscription for each utility territory or interconnection team running the workbench in production
    - One-time implementation and data-mapping fees for new utility deployments
    - Usage or premium modules for developer preflight, benchmark analytics, and queue communications
  unitOfValue: Active utility territory or interconnection queue moved from packet receipt to engineer-approved study kickoff through the platform.
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one queue to adjacent territories, feeders, or application classes inside the same utility account
    - Add developer preflight workflows that reduce missing-data loops before submission
    - Sell benchmark analytics on upgrade triggers, defect rates, and study outcomes once enough utility data exists
    - Extend the same rules layer into EV-depot, flexible-load, and other large-load interconnection workflows
strategyMap:
  northStarMetric: Engineer-approved applications moved from receipt to study-ready kickoff through the platform per month.
  inputMetrics:
    - Number of paid utility pilots signed
    - Median days from application receipt to study-ready kickoff
    - Missing-data or information-request loops per application
    - Percentage of autogenerated study packages accepted with only minor engineer edits
    - Paid pilot to annual production conversion rate
  moatsToBuild:
    - Utility-specific rule libraries linked to packet defects, engineer edits, and approved study outputs
    - Cross-utility benchmark data on upgrade triggers, cycle times, and queue outcomes
    - Embedded workflow adapters and correspondence templates that sit inside the utility's daily operating cadence
  killCriteria:
    - Fewer than 3 paid utility pilots are signed within 12 months of focused selling into portal-equipped mid-sized utilities
    - No pilot cuts median time from application receipt to study-ready kickoff by at least 50%
    - Engineer acceptance of autogenerated study packages stays below 60% after two pilot iterations
    - More than half of qualified deals require bespoke integrations or rule mapping that cannot be standardized within 6 weeks
  mermaid: |
    flowchart LR
      Wedge[Portal-to-study translation wedge] --> MVP[Engineer-in-loop workbench]
      MVP --> Proof[Cycle-time proof]
      Proof --> Expansion[Developer preflight and large-load expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Compelling operational pain, but market size and integration repeatability still need pilot proof before this is a clear venture-backed software bet.
    whyBelieve: Utility interconnection teams face a measurable throughput bottleneck, the packet-to-study handoff is still fragmented, and early deployments could create a defensible rules-and-outcomes dataset.
    whyDoubt: The modeled SAM is modest, procurement friction is high, and bespoke integrations could cap software margins before expansion into adjacent workflows is proven.
    nextDiligence: Underwrite one paid pilot with a portal-equipped utility and verify both cycle-time improvement and repeatable second-territory deployment without custom buildout.
  firstCustomer:
    title: DER interconnection manager at a mid-sized distribution utility
    profile: A utility territory with 5-10 interconnection engineers, 150-plus queued solar, storage, EV-charging, or flexible-load applications, an existing applicant portal, and visible consultant or backlog pressure.
    trigger: The queue grows faster than engineers can start studies, causing missed response targets, repeated information requests, or rising outside engineering spend.
    buyer: Director of DER interconnection, grid planning, or engineering operations
    initialContract: "$50k-$100k pilot on one queue, converting to roughly $200k-$400k ARR plus implementation if the utility proves at least 50% faster study kickoff and materially fewer missing-data loops."
  mustBeTrue:
    - At least 100-120 first-wave utility territories have enough annual application volume and backlog pain to justify more than $200k of recurring software spend.
    - An engineer-in-the-loop workbench can cut median time to study-ready kickoff by at least 50% without increasing compliance or audit risk.
    - Utilities using PowerClerk, CIT, or similar portals will still buy a translation-layer add-on instead of waiting for incumbent vendors to extend their workflow.
    - The first 3-5 deployments can launch with standardized rule libraries and export adapters rather than project-specific integration work.
    - The utility-side dataset on defects, edits, and outcomes becomes valuable enough to support developer-preflight or benchmark expansion within 24 months.
  diligenceQuestions:
    - Which specific utility territories in the researched first-wave regions fit the 100-1,000 application and 3-15 engineer beachhead profile today?
    - How often do utility buyers fund new workflow software versus expanding PowerClerk, GridUnity, consultant, or in-house process work?
    - What exact model, GIS, and export stacks dominate the beachhead, and how many can be supported without bespoke code?
    - Will legal, compliance, and records teams approve AI-generated draft response letters if engineers remain the sign-off point?
    - How many pilot customers are willing to let the company retain anonymized edits and outcome data to build the moat?
operatingAssumptions:
  - assumption: Utilities will pay six-figure annual contracts for engineering-throughput gains and consultant avoidance even if the product is initially layered beside existing portals.
    basis: research.yaml
    validationTest: Close 2 paid pilots and at least 1 annual production contract at proposed territory-based pricing within 12 months.
    decisionImpact: If false, the company must shift toward lower-price modules, consultant-channel resale, or a services-led model.
  - assumption: Export-first integrations are sufficient to make the first pilots operational within 4-6 weeks.
    basis: idea.yaml
    validationTest: Deploy one design-partner pilot using portal exports and manual data mapping, and keep launch time under 6 weeks without custom API work.
    decisionImpact: If false, burn increases, the beachhead narrows to cleaner utilities, and the company may need seed-sized capital earlier.
  - assumption: Engineers will accept at least 60% of autogenerated completeness findings, study inputs, or draft letters with only minor edits after initial tuning.
    basis: operator judgment
    validationTest: Run the model on 100 historical applications and measure acceptance or edit rates by artifact type with a utility design partner.
    decisionImpact: If false, the product should retreat to structured intake and defect coding rather than automated case assembly or draft communications.
  - assumption: Utilities already using portals are the fastest adopters because the remaining bottleneck is the packet-to-study handoff, not applicant intake.
    basis: research.yaml
    validationTest: Interview 8 utilities with named portal deployments and secure at least 1 pilot where the add-on story wins without replacing the portal.
    decisionImpact: If false, GTM should shift toward utilities with weaker front-door tools or toward incumbent portal partnerships.
  - assumption: Large-load workflows for EV depots and data centers are similar enough to DER packet logic to become a year-2 expansion vector.
    basis: research.yaml
    validationTest: Map 3 large-load application examples against the core data model and confirm that at least 70% of required fields and review steps can reuse the DER workflow.
    decisionImpact: If false, expansion should stay inside DER and storage longer, reducing the near-term venture-scale narrative.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 utility interconnection leaders, planning managers, and consultant partners in portal-equipped high-DER territories.
    hypothesis: Queue backlog, consultant spend, and response-target pressure create a budgeted trigger for a paid packet-to-study workbench pilot.
    successMetric: At least 10 interviews confirm active backlog pain and 5 agree to a workflow-mapping follow-up.
    owner: CEO
  - horizon: 0–90 days
    experiment: Run a historical packet audit with one design partner across 100 recent solar, storage, and flexible-load applications.
    hypothesis: A standard defect taxonomy and completeness engine can capture the majority of missing-data and study-kickoff delays.
    successMetric: The tool correctly classifies at least 80% of completeness defects and required follow-ups against engineer review.
    owner: Product lead
  - horizon: 0–90 days
    experiment: Prototype export-based case assembly from one existing portal or document repository into the utility's study-start workflow.
    hypothesis: Useful pilot value can be delivered without deep API integration into every incumbent system.
    successMetric: One end-to-end draft study package is produced in under 30 minutes of total engineer review time and pilot setup stays under 6 weeks.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Convert 2 design partners into paid pilots tied to one overloaded queue each.
    hypothesis: Utilities will pay for the workflow once value is framed as engineering throughput and consultant avoidance rather than generic AI productivity.
    successMetric: Two paid pilots signed and at least one shows 50% faster median time to study-ready kickoff versus the prior process.
    owner: CEO
  - horizon: 90–180 days
    experiment: Test territory-based annual pricing and implementation packaging at pilot conversion.
    hypothesis: Per-territory pricing with usage or implementation add-ons is easier for utilities to approve than seat-based pricing.
    successMetric: At least 2 buyers accept written pilot-to-production pricing without demanding pure time-and-materials billing.
    owner: CEO
  - horizon: 180–360 days
    experiment: Launch one production account expansion into a second queue plus a limited developer preflight module based on real defect data.
    hypothesis: The utility-side rules and defect dataset can drive adjacent expansion without creating a second product line too early.
    successMetric: One production customer expands beyond the initial queue and the preflight module reduces returned applications by at least 25%.
    owner: Product lead
operations:
  - Maintain utility-specific completeness, response-template, and audit-trail libraries with every engineer edit labeled for model retraining.
  - Run weekly queue reviews with the utility champion so draft outputs become operational tooling rather than a side analysis.
  - Package integrations as reusable adapters into incumbent portals, document stores, and study exports; use consultant partners only where deployment complexity exceeds the standard template.
  - Track cycle-time, defect, and upgrade-trigger metrics per application so benchmark data compounds from day one.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the parsing, rules, export, and auditability layer that defines the product wedge.
  - role: Grid workflow product and implementation lead
    startTiming: Month 0
    rationale: Converts messy utility review practices into repeatable rule libraries, templates, and pilot playbooks.
  - role: Founder-led GTM
    startTiming: Month 0
    rationale: Needed immediately because the first customers are a small set of senior utility operators who buy on trust, references, and quantified queue KPIs.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Standardizes portal, document, and study-tool adapters so pilots do not become bespoke integration projects.
  - role: Regulatory and data operations lead
    startTiming: Month 8
    rationale: Owns jurisdiction-specific rule maintenance, audit artifacts, and labeled training data as the company expands across territories.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 paid pilots in portal-equipped utility territories that match the 3-15 engineer beachhead.
      - Convert at least 2 pilots to annual production deployments by proving 50% faster study kickoff and fewer missing-data loops.
      - Standardize one rules and export template that works across at least 2 jurisdictions without custom code.
  - horizon: 12–24 months
    items:
      - Reach 6-8 production utility territories and keep deployment time for standard accounts under 6 weeks.
      - Launch benchmark analytics and a limited developer preflight module inside existing utility accounts.
      - Support one new application class such as EV depots or other large flexible loads without breaking the core DER workflow.
  - horizon: 24–36 months
    items:
      - Reach about 12 landed utility territories, consistent with the researched year-3 SOM.
      - Become a referenceable add-on beside incumbent portals or study stacks in the first-wave regions.
      - Expand the rules and outcome dataset into higher-ACV benchmark, communications, and large-load modules while keeping gross-margin targets above 70%.
risks:
  - risk: Integration and rule mapping vary so much by utility that deployments become services-heavy.
    likelihood: High
    impact: High
    mitigation: Start with portal-equipped utilities, ship export-based adapters first, and stop geographic expansion until two jurisdictions reuse the same template.
  - risk: Engineers or compliance teams do not trust autogenerated study inputs or draft letters enough for production use.
    likelihood: Medium
    impact: High
    mitigation: Keep engineers in the sign-off loop, show rule-level evidence on every draft, and measure acceptance rates before expanding automation scope.
  - risk: Incumbent portals, study vendors, or consultants close the workflow gap before the startup becomes entrenched.
    likelihood: Medium
    impact: Medium
    mitigation: Win on the translation dataset, faster deployment beside existing tools, and benchmark insights that labor-based substitutes and generic portals do not capture.
  - risk: The initial utility wedge remains too narrow if large-load, developer, or benchmark expansion does not materialize.
    likelihood: Medium
    impact: High
    mitigation: Set explicit kill criteria on second-queue expansion and large-load reuse, and avoid over-hiring ahead of proof that adjacent modules lift ACV.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: 18 months funds core product engineering, two to three design-partner pilots, reusable portal and study-export adapters, regulatory rule libraries for the first jurisdictions, and enough founder-led GTM plus solutions capacity to prove pilot-to-production conversion before broader market expansion.
