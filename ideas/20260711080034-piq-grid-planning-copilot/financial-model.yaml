slug: interconnection-study-workbench
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-11] The model starts in the first full month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed ask
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M and runwayMonths 18] The base case uses the bottom of the stated range because hiring stays lean and overlay-only through Y2.'
- id: A3
  name: Customer definition
  value: One active paying utility territory or overloaded queue, whether still in paid pilot or already on annual production.
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.unitOfValue + BP investorMemo.firstCustomer.initialContract] The land motion is one queue or territory at a time.'
- id: A4
  name: Year 1 customer ramp
  value: M1-M12 customersEop = 0,0,0,0,1,1,1,2,2,3,3,3
  unit: count
  source: '[BP milestones 0–12 months] The plan targets 3 paid pilots in the first year and at least 2 production conversions before broader expansion.'
- id: A5
  name: Year 2 and Year 3 customer milestones
  value: Q1Y2 4; Q2Y2 5; Q3Y2 6; Q4Y2 7; Q1Y3 8; Q2Y3 9; Q3Y3 10; Q4Y3 12
  unit: count
  source: '[BP milestones 12–24 and 24–36 months + Research market.som 12 territories] The base case lands inside the stated 6-8 territory Y2 milestone and reaches the researched 12-territory Y3 SOM.'
- id: A6
  name: Blended monthly revenue per active territory ramp
  value: Pilot-heavy M5-M10 at $16K, M11-M12 at $20K, Y2 exits at $26K, and Y3 exits at $31K.
  unit: USDK per customer-month
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som $0.40M ACV] The blend reflects paid pilots converting into $200K-$400K annual production contracts plus early benchmark or preflight upsell.'
- id: A7
  name: Exit annual ARPU for unit economics
  value: '372'
  unit: USDK per customer-year
  source: '[A6 + Research market.som] Q4Y3 exit ARPU annualizes the blended $31K monthly revenue per active territory.'
- id: A8
  name: Gross margin ramp
  value: 48%-58% in Y1, 64%-70% in Y2, and 71%-74% in Y3.
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on export-first integrations + startup-finance heuristic] Early pilots carry more services and implementation drag before rule libraries and adapters become reusable.'
- id: A9
  name: Steady-state monthly churn
  value: '1.5'
  unit: percent
  source: '[BP risks + Research sensitivityCases + startup-finance heuristic] Utility workflows should be sticky once embedded, but procurement friction and trust risk still justify a conservative early-stage churn assumption.'
- id: A10
  name: Loaded cash compensation by role
  value: Founder 150; founding engineer 190; product/implementation lead 160; solutions engineer 165; regulatory/data ops 150; integration engineer 185; account executive 190; customer success 145; second solutions engineer 165; partnerships 170; finance/ops 120
  unit: USDK per FTE-year
  source: '[BP team roles + startup-finance heuristic] Loaded compensation includes salary, payroll tax, and benefits for a lean U.S.-based vertical software team.'
- id: A11
  name: Hiring cadence
  value: M1 founder, founding engineer, and product/implementation lead; M4 solutions engineer; M8 regulatory/data ops; M11 integration engineer; M16 account executive; M20 customer success; M25 second solutions engineer; M29 partnerships; M31 finance/ops.
  unit: timing
  source: '[BP team startTiming + BP strategicChoices.sequencingRationale] Productization and deployment hires precede scaled GTM, and back-office hiring waits for multi-territory proof.'
- id: A12
  name: Payroll allocation to P&L lines
  value: Founder 70% S&M / 30% G&A; founding and integration engineers 100% R&D; product/implementation 60% R&D / 40% G&A; solutions and regulatory/data ops 50% R&D / 50% G&A; AE and partnerships 100% S&M; customer success 40% S&M / 60% G&A; finance/ops 100% G&A.
  unit: allocation
  source: '[BP team rationales + BP operations] The split follows who owns productization, deployment, selling, auditability, and customer support in the plan.'
- id: A13
  name: Non-payroll operating budget ramp
  value: Monthly non-payroll spend starts at $26K and rises to $59K by Q4Y3 across travel, cloud/inference, legal, insurance, and implementation tooling.
  unit: USDK per month
  source: '[BP operations + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] The budget stays lean but reflects field deployment travel, regulated-buyer legal work, and document-processing infrastructure.'
- id: A14
  name: Revenue recognition policy
  value: Monthly revenue equals average active customers in the period multiplied by the blended monthly ARPU for that stage of maturity.
  unit: policy
  source: '[BP businessModel revenueStreams + A6] This keeps recognized revenue tied directly to customer count and the pricing ramp from pilot to production.'
- id: A15
  name: Cash conversion policy
  value: Cash movement equals EBITDA.
  unit: policy
  source: '[Startup-finance heuristic] The model does not separately layer debt, capex, taxes, or material working-capital timing at pre-seed scale.'
- id: A16
  name: Blended CAC for unit economics
  value: '160'
  unit: USDK per new production territory
  source: '[BP gtm.funnelTargets + BP channels + startup-finance heuristic] Rounded above the raw S&M/new-logo math to include founder selling time, procurement travel, and utility-specific deal scoping.'
- id: A17
  name: Funding milestone for the next round
  value: By Q4Y2 the company should reach 6-8 production territories, keep standard deployments under 6 weeks, and attach benchmark or developer-preflight expansion in at least one live account.
  unit: milestone
  source: '[BP milestones 12–24 months + BP fundingAsk.useOfFundsSummary] This is the proof point that justifies a seed round.'
- id: A18
  name: Late Year 3 expansion step-up
  value: The last two Year 3 territory wins land after reference accounts prove a reusable second-jurisdiction template and large-load workflow reuse.
  unit: qualitative
  source: '[BP milestones 24–36 months + BP investorMemo.mustBeTrue] The base case assumes proof of repeatability before the final Y3 step up.'
- id: A19
  name: Runway target used for the round size
  value: 24 months to Q4Y2 proof plus roughly 6 months of buffer while the seed raise is prepared.
  unit: months
  source: '[BP fundingAsk.runwayMonths 18 + invocation rule requiring a 6-month buffer] The lean hiring plan stretches the base case beyond the BP minimum runway target.'
