scenarios:
  downside:
    description: Pilot conversions slip by roughly one quarter, ARPU lands 10% below plan, and integrations stay more services-heavy than expected.
    y3RevenueK: 2650.2
    y3EbitdaK: -518.3
    cashLowPointK: -371.3
    keyAssumptionChanges:
    - Q4Y2 ends at 6 production territories instead of 7.
    - Q4Y3 ends at 10 territories instead of 12.
    - Blended monthly ARPU is 10% below the base ramp.
    - Gross margin runs 5 points below base because adapters remain semi-bespoke.
  base:
    description: Three paid pilots in Y1 convert into 7 active paying territories by Q4Y2 and 12 by Q4Y3 while gross margin clears 70% in Y3.
    y3RevenueK: 3311.0
    y3EbitdaK: 94.3
    cashLowPointK: 400.9
    keyAssumptionChanges:
    - 3 paid pilots close inside Y1 and at least 2 convert before year-end.
    - Active paying territories rise from 3 at M12 to 7 at Q4Y2 and 12 at Q4Y3.
    - Blended monthly ARPU exits at about $31K as production pricing and first add-ons attach.
    - Gross margin exits at roughly 74% once templates and exports become reusable.
  upside:
    description: Reference-led selling and second-queue expansion pull customer additions forward while benchmark or preflight modules lift ARPU and margin.
    y3RevenueK: 4136.3
    y3EbitdaK: 778.2
    cashLowPointK: 706.1
    keyAssumptionChanges:
    - Q4Y2 reaches 8 territories and Q4Y3 reaches 14.
    - Blended monthly ARPU runs about 8% above base through faster production and module attach.
    - Gross margin runs about 2 points above base because export templates reuse earlier.
sensitivity:
- variable: ARPU
  downsideCase: Exit blended ARPU stays near $28K MRR instead of $31K.
  baseCase: Exit blended ARPU is about $31K MRR / $372K annualized.
  upsideCase: Exit blended ARPU reaches about $34K MRR through stronger add-on attach.
  y3RevenueImpactK: -331.0
  cashImpactK: -361.7
- variable: sales cycle
  downsideCase: Pilot-to-production conversion slips by about one quarter across Y2-Y3.
  baseCase: Paid pilots convert inside roughly 6-9 months and references unlock the next territory.
  upsideCase: Production conversions and second-territory expansions land about one quarter earlier.
  y3RevenueImpactK: -351.0
  cashImpactK: -401.6
- variable: gross margin
  downsideCase: Steady-state gross margin tops out around 69% because deployments stay semi-bespoke.
  baseCase: Gross margin moves through 70% in Y2 and exits Y3 near 74%.
  upsideCase: Gross margin reaches 75%-77% with earlier adapter reuse.
  y3RevenueImpactK: 0.0
  cashImpactK: -256.9
- variable: churn
  downsideCase: Monthly logo churn settles near 2.5%.
  baseCase: Monthly logo churn is about 1.5%.
  upsideCase: Monthly logo churn is about 1.0% once workflows embed.
  y3RevenueImpactK: -337.5
  cashImpactK: -245.2
- variable: CAC
  downsideCase: Blended CAC rises toward $190K because procurement takes longer and founder travel stays high.
  baseCase: Blended CAC is modeled at $160K.
  upsideCase: Blended CAC falls toward $130K via partner-led intros and stronger references.
  y3RevenueImpactK: 0.0
  cashImpactK: -94.8
- variable: hiring pace
  downsideCase: AE, second solutions, and partnerships hires are pulled forward one quarter before repeatability is proven.
  baseCase: Commercial and deployment hires follow proof gates.
  upsideCase: Non-critical GTM hiring is deferred one quarter until repeatability is clearer.
  y3RevenueImpactK: 0.0
  cashImpactK: -131.1
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts[Target utility accounts] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionTerritories[Production territories]
      ProductionTerritories --> Revenue[Blended ARPU]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from 3 Y1 pilots compounding into 7 paying territories by Q4Y2 and 12 by Q4Y3, with blended ARPU exiting near $31K monthly.
- checkName: Must go right
  finding: Export-first deployments and reusable jurisdiction templates must hold so gross margin can rise from pilot-era highs-50s to roughly 74% by Q4Y3.
- checkName: Model breaks if
  finding: If production conversions slip a quarter and integrations keep gross margin 5 points lower, the downside case bottoms near -$370K cash before Y3 ends.
- checkName: Next-round proof
  finding: A seed case is justified once the company shows 6-8 production territories, sub-6-week standard deployments, and one benchmark or preflight expansion inside a live account.
sanityChecks:
  ruleOf40: Y3 growth 110.7% + EBITDA margin 2.8% = 113.5%.
  burnMultiple: Y2 burn multiple ≈ 0.5x (-$613.4K EBITDA on +$1315.5K revenue growth), improving to positive EBITDA in Y3.
  revenuePerFte: $301K Y3 revenue per Q4Y3 FTE (benchmark $200–400K vertical SaaS).
  flags:
  - The base case still depends on landing 3 paid pilots in the first 12 months despite utility procurement friction; a one-quarter sales slip removes about $351K of Y3 revenue and about $401K of cash.
  - Gross margin does not clear the 70% target until Y2/Y3, so bespoke integrations or heavy human review can flip Y3 back to negative EBITDA.
  - The $2.0M round sits at the bottom of the BP range and the base case cash low point is only about $0.4M, so seed fundraising should begin before Q2Y3.
  - Year-3 upside still relies on ARPU lift from benchmark or preflight expansion, not just raw logo growth, because the logo universe is only about 120 first-wave territories.
