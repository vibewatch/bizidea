- point: DOE-backed iQMS work is explicitly aimed at reducing manual DER queue friction with software, forecasting, GIS, and AI.
  sourceRefs:
  - 33
- point: GridUnity cites a PG&E deployment where posted integration capacity increased nearly 400% after a software-driven refresh.
  sourceRefs:
  - 25
- point: Gridtwin claims 1000+ users on the Eversource interconnection portal, implying utilities will adopt external interconnection software at real scale.
  sourceRefs:
  - 27
openQuestions:
- How many annual applications and completeness failures does the median 5-10 engineer utility actually handle by segment (solar, storage, EV, large load)?
- What fraction of target utilities already use PowerClerk or similar portals, and does the startup land best as an add-on rather than a replacement?
- Which model and GIS stacks dominate the beachhead, and what export surfaces are available without heavy custom work?
- Will utilities permit AI-generated draft response letters and upgrade scopes under current governance, audit, and record-retention rules?
