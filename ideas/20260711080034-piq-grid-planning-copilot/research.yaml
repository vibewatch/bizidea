  sensitivityCases:
  - case: Utilities already have portals in place
    impact: The product must land as a packet-to-case workbench layered beside existing portals rather than as a rip-and-replace front door.
    sourceRefs:
    - 19
    - 20
    - 24
    - 27
  - case: Large-load applications outgrow DER-only workflows
    impact: The roadmap must support EV depots, data centers, and other step-change loads, or the beachhead narrows as demand shifts.
    sourceRefs:
    - 2
    - 9
    - 35
  - case: Integration into study and telemetry stacks is slower than expected
    impact: Early SAM compresses toward utilities with cleaner exports and modern model stacks, increasing services intensity.
    sourceRefs:
    - 25
    - 31
    - 34
  - case: Draft accuracy is not trusted by engineers
    impact: If completeness checks and correspondence drafts still need heavy rework, the product feels like extra admin rather than throughput leverage.
    sourceRefs:
    - 11
    - 12
    - 13
    - 16
  validationPlan:
  - priority: high
    question: Can the workbench cut median time from application receipt to study-ready kickoff by at least 50% in one utility queue?
    evidenceToGather: Timestamped workflow data before and after pilot deployment, broken out by completeness review, information-request loops, and engineer handoff time.
  - priority: high
    question: Does structured packet intake reduce the number of missing-data loops per application?
    evidenceToGather: Pre/post counts of rejected or returned applications, dominant missing-field categories, and total developer-response cycles.
  - priority: medium
    question: Which model and GIS stack combinations are easiest to support without heavy custom work?
    evidenceToGather: Technical scoping across utilities using OpenDSS-adjacent, CYME-adjacent, and internally managed feeder-model workflows plus required export fields.
  - priority: medium
    question: Do utilities want an add-on to existing portals or a broader interconnection operating system?
    evidenceToGather: Buyer interviews across utilities already using portal software, consultant overflow, and internal email/spreadsheet workflows.
