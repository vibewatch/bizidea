competitors:
- name: GridUnity
  stage: scale-up
  wedge: Utility-facing generation and load interconnection workflow platform
  pricing: Custom enterprise pricing; not publicly disclosed
  strength: Strong utility workflow and backlog-management positioning with case-study proof around hosting-capacity refresh work.
  weaknessVsUs: Broader platform framing makes it less obviously focused on the packet-to-study draft layer for midsize utility teams.
  sourceRefs:
  - 24
  - 25
- name: Advanced Energy Analytics
  stage: startup
  wedge: Automated detailed interconnection impact studies for distribution systems
  pricing: Custom enterprise pricing; not publicly disclosed
  strength: Clear technical story around automating detailed studies and data integration.
  weaknessVsUs: Assumes cleaner inputs and is less centered on completeness review, applicant communications, and queue triage.
  sourceRefs:
  - 26
  - 34
- name: Gridtwin
  stage: startup
  wedge: Map-first interconnection screening and utility/developer portal workflows
  pricing: Custom enterprise pricing; not publicly disclosed
  strength: Strong portal and hosting-capacity positioning with utility deployment evidence.
  weaknessVsUs: More focused on screening and planning visibility than back-office study kickoff operations.
  sourceRefs:
  - 18
  - 23
  - 27
- name: Pearl Street Technologies
  stage: scale-up
  wedge: Interconnection backlog software for transmission providers and project developers
  pricing: Custom enterprise pricing; not publicly disclosed
  strength: Recognized backlog-reduction and modeling brand with strong transmission/provider credibility.
  weaknessVsUs: Center of gravity is bulk-power and transmission workflows rather than distribution packet translation.
  sourceRefs:
  - 28
- name: Burns & McDonnell / 1898 & Co.
  stage: incumbent
  wedge: Consulting-led interconnection studies, planning, and advisory services
  pricing: Project-based services pricing; not publicly disclosed
  strength: Deep utility trust and ability to handle bespoke studies or overflow workloads.
  weaknessVsUs: Labor-heavy substitute with weaker software feedback loops and less scalable workflow data capture.
  sourceRefs:
  - 29
  - 30
regulatoryTechnicalConstraints:
- point: IEEE 1547 sets baseline interoperability, testing, performance, and abnormal-condition requirements for DER interconnection.
  sourceRefs:
  - 5
- point: State and utility rules such as California Rule 21 and New York SIR force jurisdiction-specific workflow logic rather than a single national checklist.
  sourceRefs:
  - 10
  - 11
- point: Utilities can reject or delay packets that lack one-line diagrams, site plans, protection details, or storage-specific assumptions.
  sourceRefs:
  - 12
  - 13
  - 22
- point: Many utilities already route applicants through named portals such as CIT or PowerClerk, so new software must coexist with those surfaces.
  sourceRefs:
  - 19
  - 20
  - 23
- point: Study exports still need to fit existing analysis and telemetry ecosystems rather than invent a brand-new operating environment.
  sourceRefs:
  - 31
  - 34
