  adoptionFrictionMatrix:
  - friction: Legacy model and GIS integration
    severity: high
    affectedBuyer: Utility engineering operations leader
    mitigation: Start with structured exports and engineer review instead of attempting a full study-engine replacement.
    sourceRefs:
    - 25
    - 31
    - 34
  - friction: Regulatory auditability and human trust
    severity: high
    affectedBuyer: DER interconnection manager
    mitigation: Tie every draft output to rule-specific checks, preserve audit trails, and keep engineers in the approval loop.
    sourceRefs:
