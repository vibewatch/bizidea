jobsToBeDone:
  - job: When my company wants to let employees use AI to buy routine items, help me enforce policy and catch bad deals, so they can automate purchasing without creating finance risk.
    currentAlternative: Manual approvals inside procurement software plus email negotiation
    successMetric: Percent of tail-spend transactions completed autonomously within policy at equal or better unit pricing
  - job: When an internal buying agent negotiates with suppliers, help me see whether the agent got a market-competitive outcome, so they can trust autonomous purchasing instead of second-guessing every order.
    currentAlternative: Spot-checking a few quotes manually or relying on supplier list prices
    successMetric: Savings or avoided overpayment per transaction relative to baseline workflow
