topRisks:
  - name: Slow enterprise rollout
    description: Many companies may allow AI assistance before they allow AI agents to commit spend, stretching sales cycles.
    mitigation: Start as a benchmark-and-approval layer for human-led purchases so customers get savings and audit value before full autonomy.
  - name: Integration fragmentation
    description: Suppliers and procurement stacks will adopt MCP and agent standards unevenly, making end-to-end automation messy.
    mitigation: Support MCP first but ship practical email, browser, and ERP connectors so the product works before standards are universal.
  - name: Liability from bad purchases
    description: A few visible agent mistakes or overpayments could damage trust and stall adoption.
    mitigation: Enforce spend thresholds, exception routing, full audit logs, and conservative default policies while building insurer and compliance partnerships over time.
