    sourceRefs: [9, 14, 17, 18, 22, 24]
  - point: Buyers are already shifting from chatbots to delegated work products, so procurement is next if someone can make the transactions governable.
    signalRefs:
      - Users are moving from chat to delegated work
    sourceRefs: [19, 20, 27, 32, 45]
differentiator: "This is not another AI procurement copilot; it is the transaction control plane for any procurement copilot or agent. The wedge is where trust actually breaks: permissions, benchmarking, model-quality disclosure, and exception routing at the moment an agent tries to negotiate or spend money. Because it is MCP-native and model-agnostic, it can become the neutral trust layer across many agent vendors rather than a single-agent application. Its long-term moat is the outcome dataset linking agent configuration, negotiation behavior, supplier type, and realized price quality."
