scenarios:
  downside:
    description: Pilot conversion slips and expanded accounts land closer to high-$60Ks ACV, not the full mature case.
    y3RevenueK: 1049.4
    y3EbitdaK: -1076.9
    cashLowPointK: -371.6
    keyAssumptionChanges:
      - Y2-Y3 customer adds slow to 19 total new logos after Year 1 instead of 25.
      - Mature ACV falls from $80.4K to roughly $69.6K.
      - Gross margin stays 2 points below base in each year.
  base:
    description: Five paid design partners in Year 1 compound into 30 paying customers by Year 3 with category expansion on roughly half of retained accounts.
    y3RevenueK: 1482.4
    y3EbitdaK: -726.9
    cashLowPointK: 145.9
    keyAssumptionChanges:
      - New-logo plan closes 5 customers in Y1, 10 in Y2, and 15 in Y3.
      - Land ACV starts near $48K and expands toward an $80.4K blended mature ACV after 9 months.
      - Gross margin improves from 72% in Y1 to 76% in Y3 while hiring stays lean.
  upside:
    description: Partner help and faster trust-building pull deals forward, and more accounts expand into higher-usage production deployments.
    y3RevenueK: 1793.4
    y3EbitdaK: -472.6
    cashLowPointK: 476.1
    keyAssumptionChanges:
      - Y2-Y3 customer adds increase to 30 total new logos after Year 1 instead of 25.
      - Mature ACV rises to roughly $86K as more accounts add categories and usage.
      - Gross margin improves 1 point above base in each year.
sensitivity:
  - variable: ARPU
    downsideCase: Expanded accounts settle near a $70K mature ACV.
    baseCase: Expanded accounts settle near an $80K mature ACV.
    upsideCase: Expanded accounts settle near an $89K mature ACV.
    y3RevenueImpactK: -136.8
    cashImpactK: -133.9
  - variable: sales cycle
    downsideCase: Several pilot decisions slip by one quarter.
    baseCase: Founder-led sales plus references convert on the planned cadence.
    upsideCase: References and partner intros pull multiple decisions forward.
    y3RevenueImpactK: -242.2
    cashImpactK: -283.5
  - variable: churn
    downsideCase: Older cohorts begin churning at ~1% monthly before broad expansion.
    baseCase: No realized churn appears in the 36-month model horizon.
    upsideCase: Retention stays perfect through the modeled period.
    y3RevenueImpactK: -177.2
    cashImpactK: -171.3
  - variable: gross margin
    downsideCase: Gross margin exits Y3 at 74% because implementation remains too bespoke.
    baseCase: Gross margin exits Y3 at 76%.
    upsideCase: Gross margin exits Y3 at 77%+ as workflows standardize faster.
    y3RevenueImpactK: 0.0
    cashImpactK: -43.7
  - variable: CAC
    downsideCase: Keeping pipeline full requires about $4K more S&M spend per month.
    baseCase: Y3 blended CAC stays around $50K per customer.
    upsideCase: Referrals and founder credibility lower paid acquisition needs.
    y3RevenueImpactK: 0.0
    cashImpactK: -144.0
  - variable: hiring pace
    downsideCase: Planned hires start about 2 months earlier than revenue maturity.
    baseCase: Hiring stays on the lean plan shown in headcount.
    upsideCase: Key hires are delayed until usage proves out.
    y3RevenueImpactK: 0.0
    cashImpactK: -206.5
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> SubscriptionRevenue
      ProductionCustomers --> UsageRevenue
      SubscriptionRevenue --> GrossProfit
      UsageRevenue --> GrossProfit
      GrossProfit --> Opex
      Opex --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by 30 paying accounts by Y3, with land ACV near $48K expanding toward roughly $80K once categories and usage ramp.
  - checkName: Must go right
    finding: Pilot-to-production conversion has to stay near the plan's 50%+ target so the second AE sells repeatable deployments instead of bespoke pilots.
  - checkName: Model breaks if
    finding: A one-quarter sales-cycle slip plus weaker expansion drops Y3 revenue to about $1.0M and takes cash roughly $372K below zero.
  - checkName: Next-round proof
    finding: The seed case is credible if the company exits Y2 around 15 customers and exits Y3 near $2.0M ARR with burn multiple below 1x.
sanityChecks:
  ruleOf40: Y3 growth 144.8% + EBITDA margin -49.0% = 95.8%
  burnMultiple: Y2 burn multiple 1.40x, improving to 0.68x in Y3 on exit ARR growth from $0.95M to $2.02M.
  revenuePerFte: $165K Y3 on average 9.0 FTE and $148K on ending 10 FTE (benchmark $200-400K SaaS).
  flags:
    - Y3 revenue per ending FTE is still below mature SaaS benchmarks, so the next round depends on continued ARR growth rather than current efficiency.
    - The P&L assumes no realized logo churn inside 36 months; LTV uses a separate 1.8% monthly churn heuristic and should be read as directional.
    - Ending cash is only $145.9K in the base case, so even modest sales-cycle slippage or margin pressure would force an earlier raise.
    - The model assumes category expansion happens within 9 months for roughly half of retained accounts; if expansion is slower, CAC payback stretches materially.
