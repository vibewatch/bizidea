topRisks:
  - name: 企业落地节奏缓慢
    description: 许多企业可能在允许 AI 辅助之后，仍需较长时间才允许 AI 智能体承诺支出，拉长销售周期。
    mitigation: 首先作为人工主导采购的基准对比与审批层，让客户在实现完全自主之前先获得节省效益和审计价值。
  - name: 集成碎片化
    description: 供应商和采购技术堆栈对 MCP 及智能体标准的采用参差不齐，使端到端自动化难以整齐落地。
    mitigation: 优先支持 MCP，同时提供实用的邮件、浏览器和 ERP 连接器，确保产品在标准普及前就能运转。
  - name: 错误采购引发的法律责任
    description: 少数几次可见的智能体失误或超支可能损害信任、阻碍采用。
    mitigation: 执行支出阈值、异常路由、完整审计日志和保守默认策略，同时逐步与保险和合规合作伙伴建立关系。
