problem: 企业希望让 AI 代理处理低金额采购，但今天的采购流程仍依赖邮件、表格和人工审批，因为没有人真正信任代理能在协商后直接承诺支出。Anthropic 的 Project Deal 证明代理已经能完成真实交易，但也暴露出更强模型能拿到更好价格，而较弱代理的使用者可能根本察觉不到损失。这就给财务团队带来了隐性的多付钱与治理问题。现有采购套件本来就是给人用的，不是为需要实时权限、基准比价和可审计性的自主对手方设计的。
targetUser:
  primary: 500-5,000 人规模、科技、生物科技和研发密集型企业中的采购运营经理，这些公司有大量尾部支出采购
  secondary: 正在为员工采购流程上线内部 AI 助手的财务系统负责人
  buyer: 财务副总裁或采购负责人
startupThesis:
  nonObviousInsight: 代理到代理商业最先跑出来的真实市场，不会是开放式消费者集市，而会是企业尾部支出采购：这里低风险采购高频发生、节省金额可量化，而且一旦财务团队意识到较弱代理会悄悄亏钱，就会愿意为控制层买单。
  beachhead: 希望员工用 AI 助手从已批准供应商采购办公设备、开发者外设、实验室耗材和周边礼品，单笔金额在 $5,000 以下的中型企业
  wedge: 一个 MCP 原生控制平面，位于员工采购代理和供应商端点之间，负责执行支出政策、比价已协商价格、披露代理/模型质量，并且只把异常案例转给人工处理
  whyNowCatalyst: Anthropic 的 Project Deal 证明了代理商业能完成真实交易，而 MCP 标准化以及 Anthropic 自己在信任与权限上的工作，让专门的治理层第一次既可行又紧迫。
  ventureScalePath: 先从尾部支出采购护栏切入，再扩展到供应商入驻、合同与服务采购、自主应付账款，以及更广义的跨供应商代理交易信任层。
solution: 这个产品为每个企业采购代理提供一个受治理的交易封套，其中包含支出上限、批准供应商名单、协商指令和升级规则。能接 MCP 的地方就通过 MCP 接入采购系统、ERP 和供应商渠道；没有标准的地方，则回退到邮件或浏览器自动化。在每次协商过程中，系统会把报价与历史成交和市场基线做对比，识别可能由弱代理导致的不佳结果；一旦价格偏差或风险超过阈值，就要求人工批准。每笔交易都会生成可审计的对话记录、政策决策日志，以及可直接发给供应商和财务的订单包。随着时间推移，公司会沉淀一套专有数据集，把代理对代理交易结果沉淀为自主采购默认的基准和信任层。
goToMarketSeed:
  firstCustomer: 一家 1,000 人规模、AI 原生的软件公司；其采购团队本来就高频处理笔记本、显示器、开发工具和办公设备采购，并希望在严格支出上限下试点 AI 辅助采购
  buyingTrigger: 管理层批准在内部使用 AI 助手处理委托工作，而财务被要求在不放大控制风险的前提下支持自主采购
  currentAlternative: 人工采购流程，加上传统采购软件，以及通过邮件进行的临时人工议价
  switchingReason: 首批客户之所以切换，是因为这个产品能在自动化高频低金额采购的同时，保住现有系统做不到的政策执行、价格保护和人工监督
  pricingHypothesis: 基于年度自主支出管理规模收取 SaaS 平台费，设置最低平台订阅费，并按完成交易量加收使用费
