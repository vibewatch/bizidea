problem: 企业希望让 AI 智能体处理低价值采购，但当下的采购流程仍依赖邮件、电子表格和人工审批——没有人信任智能体能自主谈判并承诺支出。Anthropic 的 Project Deal 证明智能体已能完成真实交易，但同时也暴露出更强模型能谈出更好价格、而弱模型用户浑然不觉的问题。这给财务团队留下了隐性超支和治理漏洞。既有采购软件是为人类买家设计的，无法为自主对手方提供实时所需的权限管控、基准对比和可审计能力。
targetUser:
  primary: 拥有大量尾款采购的 500 至 5,000 人规模科技、生物技术及研发密集型企业中的采购运营经理
  secondary: 正在为员工采购流程落地内部 AI 助手的财务系统负责人
  buyer: 财务副总裁或采购总监
startupThesis:
  nonObviousInsight: 智能体间商业的第一个真实市场不是开放的消费者集市，而是企业尾款采购——低价值采购频率高、节省成本能量化，一旦财务团队意识到弱模型会悄悄亏钱，他们就愿意为一个管控层买单。
  beachhead: 希望员工用 AI 助手向认可供应商采购办公设备、开发者外设、实验室耗材和周边礼品（单笔 5,000 美元以下）的中型市场企业
  wedge: 一个 MCP 原生的管控层，嵌于员工采购智能体与供应商端点之间，执行支出策略、基准对比谈判价格、披露智能体与模型质量，并将异常案例路由至人工审核
  whyNowCatalyst: Anthropic 的 Project Deal 验证了智能体商业可以完成真实交易；MCP 标准化和 Anthropic 在信任与权限方面的研究，使一个专门的治理层既切实可行，又比以往任何时候都更紧迫。
  ventureScalePath: 从尾款采购护栏起步，逐步扩展至供应商入驻、合同与服务采购、自主应付账款，以及跨供应商智能体交易的更广泛信任层。
solution: 产品为每个企业采购智能体提供一个受治理的交易边界，包含支出限额、认可供应商名单、谈判指令和上报规则。通过 MCP 接入采购系统、ERP 和供应商渠道；在标准缺失时回退至邮件或浏览器自动化。每次谈判期间，系统将报价与历史交易和市场基准对比，标记可能的弱模型表现，并在差异或风险超过阈值时要求人工审批。每笔交易生成可审计的对话记录、策略决策日志和供应商就绪的订单包，交付给财务团队。随着时间推移，公司积累起一个包含智能体对智能体交易结果的私有数据集，成为自主采购的默认基准与信任层。
goToMarketSeed:
  firstCustomer: 一家 1,000 人规模的 AI 原生软件企业，其采购团队已管理大量笔记本、显示器、开发工具和办公设备采购，并希望在严格支出限额下试点 AI 辅助采购
  buyingTrigger: 管理层批准内部使用 AI 助手处理委托事务，财务部门被要求在不增加管控风险的前提下支持自主采购
  currentAlternative: 人工采购流程加上既有采购软件，以及通过邮件进行的临时人工谈判
  switchingReason: 首个客户切换的原因是：产品能自动化大量低金额采购，同时保留策略执行、价格保护和人工监管——这些是既有套件无法为智能体主导交易提供的能力
  pricingHypothesis: 基于年度自主支出管理规模收取 SaaS 平台费，包含最低平台订阅费，并按每笔完成交易收取用量费
