differentiator: 这不是又一个 AI 采购副驾，而是面向任何采购副驾或采购智能体的交易控制平面。切入口正是信任真正失效的地方：当智能体尝试谈判或花钱时，权限控制、基准对标、模型质量披露和异常路由。由于它原生支持 MCP 且与模型无关，它可以成为跨多个智能体厂商的中立信任层，而不是单一智能体应用。其长期护城河是把智能体配置、谈判行为、供应商类型与实际价格质量连接起来的结果数据集。
