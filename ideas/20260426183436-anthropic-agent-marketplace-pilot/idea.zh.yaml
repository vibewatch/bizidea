differentiator: 这不是另一个 AI 采购副驾，而是任何采购副驾或采购代理都能接入的交易控制平面。真正断裂的地方不在前端体验，而在信任边界：当代理开始协商价格或动用资金时，权限、基准比价、模型质量披露和异常分流才是核心切口。因为它是 MCP 原生且与模型无关，所以它有机会成为多个代理供应商之间的中立信任层，而不是单一代理应用。长期护城河来自结果数据：把代理配置、协商行为、供应商类型与最终价格质量连起来。
