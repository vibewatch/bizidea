    sourceRefs: [19, 20, 27, 32, 45]
differentiator: "这不是又一个 AI 采购副驾驶；而是任何采购副驾驶或智能体之上的交易管控层。切入点在于信任真正断裂的地方：智能体试图谈判或支出时的权限管控、基准对比、模型质量披露和异常路由。因为 MCP 原生且模型无关，它可以成为跨越多个智能体厂商的中立信任层，而非单一智能体应用。其长期护城河是将智能体配置、谈判行为、供应商类型与实际价格质量关联起来的结果数据集。"
