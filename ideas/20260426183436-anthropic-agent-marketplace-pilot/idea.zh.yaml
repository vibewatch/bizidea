jobsToBeDone:
  - job: 当公司希望让员工用 AI 采购日常物品时，帮我执行政策并拦住糟糕交易，这样他们就能在不增加财务风险的前提下自动化采购。
    currentAlternative: 在采购软件里走人工审批，再配合邮件议价
    successMetric: 在不差于现有单价、最好还能更优的前提下，尾部支出交易中有多少比例能在政策范围内自主完成
  - job: 当内部采购代理与供应商协商时，帮我看清代理拿到的结果是否具有市场竞争力，这样他们就能信任自主采购，而不是每一单都反复人工复核。
    currentAlternative: 人工抽查少量报价，或者直接参考供应商标价
    successMetric: 相对基线流程，每笔交易节省了多少钱，或避免了多少多付金额
