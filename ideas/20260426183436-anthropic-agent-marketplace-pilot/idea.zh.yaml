problem: 企业希望让 AI 智能体处理低价值采购，但当下采购流程仍依赖邮件、电子表格和人工审批，因为没有人真正信任智能体去谈判并承诺支出。Anthropic 的 Project Deal 表明，智能体已经能够完成真实交易，但也表明更强的模型能拿到更好的价格，而较弱智能体的用户可能并不会注意到损失。这给财务团队带来了隐性的多付费与治理问题。现有采购套件是为人类设计的，而不是为那些需要实时权限控制、基准对标和可审计性的自主交易对手设计的。
targetUser:
  primary: 拥有大量尾部支出的 500-5,000 人科技、生物科技和研发密集型公司的采购运营经理
  secondary: 负责在员工采购流程中推进内部 AI 助手落地的财务系统负责人
  buyer: 财务副总裁或采购负责人
startupThesis:
  nonObviousInsight: 智能体对智能体商业的第一个真实市场不是开放的消费者集市，而是企业尾部支出场景：这里低风险采购持续发生、节省效果可量化，一旦财务团队意识到较弱的智能体会在无形中亏钱，他们就会愿意为控制层付费。
  beachhead: 希望员工使用 AI 助手从已批准供应商采购 $5,000 以下办公设备、开发者外设、实验室耗材和周边礼品的中型企业
  wedge: 一个原生支持 MCP 的控制平面，位于员工采购智能体与供应商端点之间，用于执行支出策略、对谈判价格做基准对标、披露智能体/模型质量，并仅将异常情况转交给人工。
  whyNowCatalyst: Anthropic 的 Project Deal 证明智能体商业可以完成真实交易，而 MCP 的标准化以及 Anthropic 在信任与权限方面的工作，使专用治理层第一次既可行又紧迫。
  ventureScalePath: 先从尾部支出采购护栏切入，再扩展到供应商入驻、合同与服务采购、自主应付账款，以及跨供应商智能体交易的更广泛信任层。
solution: 该产品为每个企业采购智能体提供一个受控交易封装，包含支出上限、已批准供应商列表、谈判指令和升级规则。在具备条件的地方，它通过 MCP 接入采购系统、ERP 和供应商渠道；在缺乏标准的地方，则退回到邮件/浏览器自动化。在每次谈判过程中，它会将报价与历史交易和市场基线进行对标，标记可能由弱智能体造成的不佳结果，并在偏差或风险超过阈值时要求审批。每笔交易都会生成可审计的对话记录、策略决策日志以及面向财务的供应商可用订单包。随着时间推移，公司会建立一套专有的智能体对智能体交易结果数据集，成为自主采购的默认基准与信任层。
