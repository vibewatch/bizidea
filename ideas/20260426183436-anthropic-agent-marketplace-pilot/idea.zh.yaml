topRisks:
- name: 企业落地推进缓慢
  description: 许多公司可能会先允许 AI 提供辅助，再允许 AI 智能体承诺支出，这会拉长销售周期。
  mitigation: 先作为人类主导采购中的对标与审批层切入，让客户在全面自主前先获得节省与审计价值。
- name: 集成碎片化
  description: 供应商和采购技术栈对 MCP 与智能体标准的采用速度不会一致，导致端到端自动化较为混乱。
  mitigation: 优先支持 MCP，但同时提供实用的邮件、浏览器和 ERP 连接器，使产品在标准普及之前也能运行。
- name: 错误采购带来的责任风险
  description: 少数可见的智能体失误或多付费事件，就可能损害信任并阻碍采用。
  mitigation: 在逐步建立保险和合规合作伙伴关系的同时，执行支出阈值、异常路由、完整审计日志和保守默认策略。
