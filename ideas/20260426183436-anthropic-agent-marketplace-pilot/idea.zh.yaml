jobsToBeDone:
  - job: 当公司希望让员工用 AI 采购日常物品时，帮我执行策略、识别不良交易，让他们实现自动化采购而不给财务带来风险。
    currentAlternative: 采购软件内的人工审批加上邮件谈判
    successMetric: 在同等或更优单价下，在策略范围内自主完成的尾款采购交易占比
  - job: 当内部采购智能体与供应商谈判时，帮我判断智能体是否拿到了市场竞争力价格，从而信任自主采购、不用逐单复查。
    currentAlternative: 抽查少量报价，或直接依赖供应商目录价
    successMetric: 相对基准流程，每笔交易节省或避免超支的金额
