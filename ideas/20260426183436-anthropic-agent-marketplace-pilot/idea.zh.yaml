topRisks:
  - name: 企业落地节奏偏慢
    description: 许多公司可能会先允许 AI 提供辅助，而不会立刻允许 AI 代理直接承诺支出，从而拉长销售周期。
    mitigation: 先做人工主导采购的基准比价与审批层，让客户在全面自主前先拿到节省和审计价值。
  - name: 集成碎片化
    description: 供应商和采购技术栈对 MCP 与代理标准的采用会非常不均衡，导致端到端自动化很难一口气跑通。
    mitigation: 优先支持 MCP，但也提供实用的邮件、浏览器和 ERP 连接器，让产品在标准普及前就能工作。
  - name: 错误采购带来的责任风险
    description: 只要出现几次高曝光的代理失误或多付钱事件，信任就可能受损，进而拖慢市场采用。
    mitigation: 强制支出阈值、异常分流、完整审计日志，以及保守的默认政策；同时逐步建立保险和合规合作关系。
