jobsToBeDone:
- job: 当我的公司希望让员工使用 AI 采购日常物品时，请帮助我执行策略并识别糟糕交易，从而在不制造财务风险的前提下实现采购自动化。
  currentAlternative: 在采购软件中进行人工审批，再辅以邮件谈判
  successMetric: 在策略范围内、并以持平或更优单价自主完成的尾部支出交易占比
- job: 当内部采购智能体与供应商谈判时，请帮助我判断它是否获得了具备市场竞争力的结果，从而让我能够信任自主采购，而不是对每一笔订单反复质疑。
  currentAlternative: 人工抽查少量报价，或依赖供应商挂牌价
  successMetric: 相较基线流程，每笔交易实现的节省或避免的多付金额
