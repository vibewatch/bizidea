scenarios:
  downside:
    description: 试点转化放缓，扩展账户 ACV 落在 $60K 高位而非完整成熟情景。
    y3RevenueK: 1049.4
    y3EbitdaK: -1076.9
    cashLowPointK: -371.6
    keyAssumptionChanges:
      - 第 2、3 年新增客户数放缓至首年之后合计 19 个，而非 25 个。
      - 成熟 ACV 从 $80.4K 降至约 $69.6K。
      - 各年毛利率均低于基础情景 2 个百分点。
  base:
    description: 第 1 年 5 个付费共创客户，到第 3 年末复利增长至 30 个付费客户，约一半留存账户完成品类扩展。
    y3RevenueK: 1482.4
    y3EbitdaK: -726.9
    cashLowPointK: 145.9
    keyAssumptionChanges:
      - 新客计划：Y1 关闭 5 个，Y2 关闭 10 个，Y3 关闭 15 个。
      - 落地 ACV 约 $48K，9 个月后扩展至约 $80.4K 的混合成熟 ACV。
      - 毛利率从 Y1 的 72% 提升至 Y3 的 76%，招聘维持精简节奏。
  upside:
    description: 合作伙伴助力和更快建立信任提前拉动交易，更多账户扩展至更高用量的生产部署。
    y3RevenueK: 1793.4
    y3EbitdaK: -472.6
    cashLowPointK: 476.1
    keyAssumptionChanges:
      - 第 2、3 年新增客户增至首年之后合计 30 个，而非 25 个。
      - 成熟 ACV 升至约 $86K，更多账户增加品类和用量。
      - 各年毛利率均高于基础情景 1 个百分点。
sensitivity:
  - variable: ARPU
    downsideCase: 扩展账户成熟 ACV 稳定在约 $70K。
    baseCase: 扩展账户成熟 ACV 稳定在约 $80K。
    upsideCase: 扩展账户成熟 ACV 稳定在约 $89K。
    y3RevenueImpactK: -136.8
    cashImpactK: -133.9
  - variable: 销售周期
    downsideCase: 多个试点决策推迟约一个季度。
    baseCase: 创始人主导销售加上客户推荐，按计划节奏完成转化。
    upsideCase: 推荐和合作伙伴引荐提前拉动多个决策。
    y3RevenueImpactK: -242.2
    cashImpactK: -283.5
  - variable: 流失率
    downsideCase: 老客户群在大规模扩展前开始以约 1% 月流失率流失。
    baseCase: 36 个月模型周期内无实际流失。
    upsideCase: 整个建模期内留存率保持完美。
    y3RevenueImpactK: -177.2
    cashImpactK: -171.3
  - variable: 毛利率
    downsideCase: Y3 末毛利率仅 74%，因实施仍过于定制化。
    baseCase: Y3 末毛利率 76%。
    upsideCase: 工作流标准化提速，Y3 末毛利率超 77%。
    y3RevenueImpactK: 0.0
    cashImpactK: -43.7
  - variable: CAC
    downsideCase: 维持管线满载需每月多投约 $4K 销售与营销费用。
    baseCase: Y3 混合 CAC 维持在约每客户 $50K。
    upsideCase: 口碑推荐和创始人信誉降低付费获客需求。
    y3RevenueImpactK: 0.0
    cashImpactK: -144.0
  - variable: 招聘节奏
    downsideCase: 计划招聘较收入成熟提前约 2 个月启动。
    baseCase: 招聘严格按精简计划执行。
    upsideCase: 关键招聘推迟至用量数据验证后再启动。
    y3RevenueImpactK: 0.0
    cashImpactK: -206.5
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> SubscriptionRevenue
      ProductionCustomers --> UsageRevenue
      SubscriptionRevenue --> GrossProfit
      UsageRevenue --> GrossProfit
      GrossProfit --> Opex
      Opex --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基础情景收入由 Y3 末 30 个付费客户驱动，落地 ACV 约 $48K，随品类和用量爬坡后扩展至约 $80K。
  - checkName: 必须跑通的假设
    finding: 试点转生产的转化率须维持在计划 50%+ 附近，这样第二名 AE 才能售出可复制的部署，而非定制试点。
  - checkName: 模型崩溃条件
    finding: 销售周期推迟一个季度加上扩展不及预期，Y3 收入将降至约 $1.0M，现金约低于零线 $372K。
  - checkName: 下一轮融资证明
    finding: 若公司 Y2 末约有 15 个客户、Y3 末 ARR 接近 $2.0M 且烧钱倍数低于 1x，种子轮融资情景可信。
sanityChecks:
  ruleOf40: Y3 增长率 144.8% + EBITDA 利润率 -49.0% = 95.8%
  burnMultiple: Y2 烧钱倍数 1.40x，Y3 ARR 从 $0.95M 增至 $2.02M，降至 0.68x。
  revenuePerFte: Y3 平均 9.0 FTE 对应 $165K，期末 10 FTE 对应 $148K（SaaS 基准 $200–400K）。
  flags:
    - Y3 期末人均收入仍低于成熟 SaaS 基准，下一轮融资依赖持续 ARR 增长而非当前效率。
    - P&L 假设 36 个月内无实际客户流失；LTV 使用独立的 1.8% 月流失启发式规则，应视为方向性参考。
    - 基础情景期末现金仅 $145.9K，即便是轻微的销售周期延迟或毛利压力都可能迫使提前融资。
    - 模型假设约一半留存账户在 9 个月内完成品类扩展；若扩展较慢，CAC 回收期将显著拉长。
