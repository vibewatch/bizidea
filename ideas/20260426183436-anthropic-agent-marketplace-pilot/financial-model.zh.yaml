scenarios:
  downside:
    description: 试点转正变慢，扩张账户的 ACV 更接近 $60k 高位，而不是完全达到成熟情形。
    y3RevenueK: 1049.4
    y3EbitdaK: -1076.9
    cashLowPointK: -371.6
    keyAssumptionChanges:
      - 第 2-3 年新增客户在第 1 年后合计只有 19 个，而不是 25 个。
      - 成熟 ACV 从 $80.4K 降到约 $69.6K。
      - 每一年的毛利率都比基准情形低 2 个百分点。
  base:
    description: 第 1 年的 5 个付费共创客户，逐步滚动成第 3 年的 30 个付费客户，其中约一半留存账户完成品类扩张。
    y3RevenueK: 1482.4
    y3EbitdaK: -726.9
    cashLowPointK: 145.9
    keyAssumptionChanges:
      - 新增客户计划为第 1 年 5 个、第 2 年 10 个、第 3 年 15 个。
      - 初始 ACV 约为 $48K，并在 9 个月后随品类和使用量爬坡，扩展向 $80.4K 的混合成熟 ACV。
      - 在招聘保持精简的同时，毛利率从第 1 年的 72% 改善到第 3 年的 76%。
  upside:
    description: 伙伴渠道和更快建立的信任把交易提前拉进来，也让更多账户扩展到更高使用量的生产部署。
    y3RevenueK: 1793.4
    y3EbitdaK: -472.6
    cashLowPointK: 476.1
    keyAssumptionChanges:
      - 第 1 年后，第 2-3 年新增客户总数从 25 个提升到 30 个。
      - 成熟 ACV 升到约 $86K，因为更多账户增加了品类和使用量。
      - 每一年的毛利率都比基准情形高 1 个百分点。
sensitivity:
  - variable: ARPU
    downsideCase: 扩张账户最终停在约 $70K 的成熟 ACV。
    baseCase: 扩张账户最终停在约 $80K 的成熟 ACV。
    upsideCase: 扩张账户最终停在约 $89K 的成熟 ACV。
    y3RevenueImpactK: -136.8
    cashImpactK: -133.9
  - variable: sales cycle
    downsideCase: 多个试点决策整体顺延 1 个季度。
    baseCase: 创始人主导销售加客户引用背书，按计划节奏转化。
    upsideCase: 客户口碑和伙伴引荐让多笔决策提前落地。
    y3RevenueImpactK: -242.2
    cashImpactK: -283.5
  - variable: churn
    downsideCase: 老 cohort 在大规模扩张前就开始以约 1% 的月流失率流失。
    baseCase: 36 个月模型期内不出现实际流失。
    upsideCase: 留存率在整个建模期内保持满格。
    y3RevenueImpactK: -177.2
    cashImpactK: -171.3
  - variable: gross margin
    downsideCase: 因为实施仍然过于定制化，第 3 年末毛利率只能到 74%。
    baseCase: 第 3 年末毛利率达到 76%。
    upsideCase: 随着工作流更快标准化，第 3 年末毛利率提升到 77%+。
    y3RevenueImpactK: 0.0
    cashImpactK: -43.7
  - variable: CAC
    downsideCase: 为了维持线索池，每月需要额外增加约 $4K 销售与市场支出。
    baseCase: 第 3 年混合 CAC 维持在每客户约 $50K。
    upsideCase: 转介绍和创始人信誉降低了付费获客需求。
    y3RevenueImpactK: 0.0
    cashImpactK: -144.0
  - variable: hiring pace
    downsideCase: 计划中的招聘比收入成熟节奏提前约 2 个月发生。
    baseCase: 招聘保持为 headcount 里展示的精简计划。
    upsideCase: 核心岗位会等使用量被证明后再延后招聘。
    y3RevenueImpactK: 0.0
    cashImpactK: -206.5
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[线索] --> PaidPilots[付费试点]
      PaidPilots --> ProductionCustomers[生产客户]
      ProductionCustomers --> SubscriptionRevenue[订阅收入]
      ProductionCustomers --> UsageRevenue[使用收入]
      SubscriptionRevenue --> GrossProfit[毛利]
      UsageRevenue --> GrossProfit
      GrossProfit --> Opex[运营费用]
      Opex --> Cash[现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形下的收入由第 3 年 30 个付费账户驱动，初始 ACV 约 $48K，随着品类和使用量爬坡，逐步接近约 $80K 的成熟水平。
  - checkName: 必须成立的前提
    finding: 试点到生产的转化率必须接近计划里的 50%+，否则第 2 名 AE 卖出去的就会是定制试点，而不是可复制部署。
  - checkName: 模型会失效的情况
    finding: 如果销售周期整体晚 1 个季度，再叠加扩张偏弱，第 3 年收入会降到约 $1.0M，现金最低点也会跌到大约 -$372K。
  - checkName: 下一轮融资证明
    finding: 如果公司在第 2 年末做到约 15 个客户，并在第 3 年末接近 $2.0M ARR，且 burn multiple 低于 1x，那么种子轮故事就是可信的。
sanityChecks:
  ruleOf40: 第 3 年增长率 144.8% + EBITDA 利润率 -49.0% = 95.8%
  burnMultiple: 第 2 年 burn multiple 为 1.40x，并在第 3 年随退出 ARR 从 $0.95M 增长到 $2.02M 而改善到 0.68x。
  revenuePerFte: 以平均 9.0 FTE 计算，第 3 年每 FTE 收入为 $165K；以期末 10 FTE 计算为 $148K（对比 SaaS 基准为 $200-400K）。
  flags:
    - 第 3 年按期末 FTE 计算的收入效率仍低于成熟 SaaS 基准，因此下一轮融资更依赖 ARR 继续增长，而不是当前效率。
    - 损益表假设 36 个月内没有实际 logo churn；LTV 则单独采用 1.8% 的月 churn 假设，因此应把这部分结果视为方向性参考。
    - 基准情形下期末现金只剩 $145.9K，因此哪怕销售周期轻微拖延，或毛利率承压，都可能迫使公司更早融资。
    - 模型假设约一半留存账户会在 9 个月内完成品类扩张；如果扩张更慢，CAC 回本周期会明显拉长。