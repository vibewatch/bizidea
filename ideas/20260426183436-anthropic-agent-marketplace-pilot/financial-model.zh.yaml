scenarios:
  downside:
    description: 试点转化放缓，扩展账户的 ACV 更接近 $60K 高段，而非完全成熟情景。
    y3RevenueK: 1049.4
    y3EbitdaK: -1076.9
    cashLowPointK: -371.6
    keyAssumptionChanges:
    - 第 2-3 年新增客户在第 1 年之后放缓至总计 19 个，而不是 25 个。
    - 成熟 ACV 从 $80.4K 降至约 $69.6K。
    - 每一年的毛利率都比基准低 2 个点。
  base:
    description: 第 1 年的 5 个付费设计合作伙伴，到第 3 年复合增长为 30 个付费客户，约一半留存账户完成品类扩展。
    y3RevenueK: 1482.4
    y3EbitdaK: -726.9
    cashLowPointK: 145.9
    keyAssumptionChanges:
    - 新增客户计划为：Y1 成交 5 个，Y2 成交 10 个，Y3 成交 15 个。
    - 落地 ACV 从接近 $48K 起步，并在 9 个月后扩展至约 $80.4K 的成熟混合 ACV。
    - 在招聘保持精简的情况下，毛利率从 Y1 的 72% 提升到 Y3 的 76%。
  upside:
    description: 合作伙伴助力和更快建立信任使交易提前发生，且更多账户扩展到更高使用量的生产部署。
    y3RevenueK: 1793.4
    y3EbitdaK: -472.6
    cashLowPointK: 476.1
    keyAssumptionChanges:
    - 第 2-3 年新增客户在第 1 年之后提升至总计 30 个，而不是 25 个。
    - 随着更多账户增加品类和使用量，成熟 ACV 提升至约 $86K。
    - 每一年的毛利率都比基准高 1 个点。
sensitivity:
- variable: ARPU
  downsideCase: 扩展账户最终稳定在约 $70K 的成熟 ACV。
  baseCase: 扩展账户最终稳定在约 $80K 的成熟 ACV。
  upsideCase: 扩展账户最终稳定在约 $89K 的成熟 ACV。
  y3RevenueImpactK: -136.8
  cashImpactK: -133.9
- variable: 销售周期
  downsideCase: 若干试点决策延后一个季度。
  baseCase: 创始人主导销售加上客户背书，按计划节奏转化。
  upsideCase: 客户背书和合作伙伴引荐使多项决策提前发生。
  y3RevenueImpactK: -242.2
  cashImpactK: -283.5
- variable: 流失率
  downsideCase: 在大规模扩展前，较早客户群开始以约每月 1% 的速度流失。
  baseCase: 在 36 个月模型周期内未出现实际流失。
  upsideCase: 在模型周期内留存保持完美。
  y3RevenueImpactK: -177.2
  cashImpactK: -171.3
- variable: 毛利率
  downsideCase: 由于实施仍过于定制化，Y3 结束时毛利率仅为 74%。
  baseCase: Y3 结束时毛利率为 76%。
  upsideCase: 随着工作流更快标准化，Y3 结束时毛利率达到 77%+。
  y3RevenueImpactK: 0.0
  cashImpactK: -43.7
- variable: CAC
  downsideCase: 维持充足销售管道需要每月多投入约 $4K 的销售与市场费用。
  baseCase: Y3 的混合 CAC 保持在每客户约 $50K。
  upsideCase: 转介绍和创始人信誉降低了付费获客需求。
  y3RevenueImpactK: 0.0
  cashImpactK: -144.0
- variable: 招聘节奏
  downsideCase: 计划中的招聘比收入成熟点提前约 2 个月开始。
  baseCase: 招聘保持在 headcount 中所示的精简计划。
  upsideCase: 关键岗位招聘延后到使用量得到验证之后。
  y3RevenueImpactK: 0.0
  cashImpactK: -206.5
modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Leads[线索] --> PaidPilots[付费试点]\n  PaidPilots --> ProductionCustomers[生产客户]\n  ProductionCustomers --> SubscriptionRevenue[订阅收入]\n  ProductionCustomers --> UsageRevenue[使用收入]\n  SubscriptionRevenue --> GrossProfit[毛利润]\n  UsageRevenue --> GrossProfit\n  GrossProfit --> Opex[运营费用]\n  Opex --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下，收入由 Y3 时的 30 个付费账户驱动；落地 ACV 约为 $48K，在品类和使用量爬坡后扩展至约 $80K。
- checkName: 必须做对
  finding: 试点到生产的转化必须接近计划中的 50%+ 目标，这样第二名 AE 才卖的是可复制部署，而不是定制化试点。
- checkName: 模型失效条件
  finding: 如果销售周期延后一个季度，再叠加更弱的扩展，Y3 收入会降至约 $1.0M，现金会跌至约 -$372K。
- checkName: 下一轮融资证明
  finding: 如果公司在 Y2 结束时达到约 15 个客户，并在 Y3 结束时接近 $2.0M ARR、burn multiple 低于 1x，那么 seed 轮故事就是可信的。
sanityChecks:
  ruleOf40: Y3 增长率 144.8% + EBITDA 利润率 -49.0% = 95.8%
  burnMultiple: Y2 的 burn multiple 为 1.40x，随着期末 ARR 从 $0.95M 增长到 $2.02M，Y3 改善至 0.68x。
  revenuePerFte: Y3 以平均 9.0 FTE 计算的人均收入为 $165K，以期末 10 FTE 计算为 $148K（SaaS 基准为 $200-400K）。
  flags:
  - 按期末 FTE 计算，Y3 的人均收入仍低于成熟 SaaS 基准，因此下一轮融资更依赖 ARR 持续增长，而非当前效率。
  - 损益表假设 36 个月内没有实际客户流失；LTV 采用单独的每月 1.8% 流失率启发式，应作为方向性指标解读。
  - 基准情景下期末现金仅为 $145.9K，因此即便是轻微的销售周期延误或毛利压力，也会迫使公司更早融资。
  - 模型假设约一半留存账户会在 9 个月内完成品类扩展；若扩展更慢，CAC 回收期将显著拉长。
