    question: Will finance permit sub-$5k autonomous spend soon?
    evidenceToGather: Interview finance leaders and collect delegated-spend policies.
  - priority: high
    question: Does approval-plus-benchmarking deliver ROI before full autonomy?
    evidenceToGather: Pilot comparison against manual workflow.
