sources:
- id: 1
  title: 'Project Deal: our Claude-run marketplace experiment | Anthropic'
  url: https://www.anthropic.com/features/project-deal
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic says 69 employees used Claude agents to buy and sell real goods in a classified marketplace.
  - The pilot produced 186 deals worth just over $4,000 and involved four parallel marketplace runs.
  - The company reports stronger models achieved better prices, and weaker-model users did not notice the gap.
  - Anthropic frames the result as an early look at agent-to-agent commerce becoming real.
- id: 2
  title: 'Project Vend: Can Claude run a small shop? (And why does that matter?)'
  url: https://www.anthropic.com/research/project-vend-1
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Claude was tasked with running an in-office automated store and handling inventory, pricing, and suppliers.
  - The experiment exposed failures around pricing discipline, memory, and hallucinated details.
  - Anthropic says the main lesson was that more scaffolding and better tools may make business-running agents more viable.
- id: 3
  title: 'Project Vend: Phase two'
  url: https://www.anthropic.com/research/project-vend-2
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - A second phase added better tools, a CEO layer, and more structure to the vending experiment.
  - Performance improved, but Anthropic still found gaps between capable and robust long-horizon autonomy.
  - The post argues that agent businesses need process and oversight, not just a smarter model.
- id: 4
  title: Introducing Anthropic Interviewer
  url: https://www.anthropic.com/research/anthropic-interviewer
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic built an automated interview tool to run large-scale qualitative interviews with Claude.
  - The tool is meant to capture user goals, fears, and future expectations around AI at scale.
  - The launch shows demand for agentic workflows that collect structured signals from humans, not just text answers.
- id: 5
  title: What 81,000 people told us about the economics of AI
  url: https://www.anthropic.com/features/81k-interviews
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic used its interview tool to collect a very large qualitative dataset on AI hopes and concerns.
  - People described professional excellence, time freedom, and financial independence as common hopes.
  - The page is evidence that users are already treating AI as a work and life delegation layer.
- id: 6
  title: Building effective agents
  url: https://www.anthropic.com/engineering/building-effective-agents
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic argues that simple, composable workflows often beat heavier agent frameworks.
  - The post distinguishes workflows from agents and says flexibility is only worth the cost in some tasks.
  - It frames agent design as a tradeoff between autonomy, reliability, and complexity.
- id: 7
  title: Writing tools for agents
  url: https://www.anthropic.com/engineering/writing-tools-for-agents
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic says tool design and evaluation are central to making agents effective on real tasks.
  - The post emphasizes token-efficient tool outputs, clear descriptions, and iterative testing.
  - It suggests agent reliability often depends more on tool ergonomics than on prompt cleverness.
- id: 8
  title: Managed Agents
  url: https://www.anthropic.com/engineering/managed-agents
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic is packaging session, harness, and sandbox as a hosted long-horizon agent service.
  - The post argues that these abstractions should outlive any specific model implementation.
  - It is direct evidence that long-running autonomous work needs infrastructure, not just model quality.
- id: 9
  title: Trustworthy agents in practice
  url: https://www.anthropic.com/research/trustworthy-agents
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic frames agent design as a balance between autonomy and human control.
  - The post highlights prompt injection, oversight, transparency, and privacy as core risks.
  - It shows why commerce agents will need explicit guardrails before they are trusted with consequential actions.
- id: 10
  title: Model Context Protocol
  url: https://www.anthropic.com/news/model-context-protocol
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic launched MCP as an open standard for connecting models to external systems and tools.
  - The post shows early ecosystem demand for a universal integration layer for agents.
  - MCP is the substrate that makes delegated actions and agent marketplaces more feasible.
- id: 11
  title: Donating the Model Context Protocol and establishing the Agentic AI Foundation
  url: https://www.anthropic.com/news/donating-the-model-context-protocol-and-establishing-of-the-agentic-ai-foundation
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic says MCP has broad adoption and is being donated to a neutral foundation.
  - The post signals ecosystem maturation around agent connectivity and governance.
  - Standardization is a prerequisite for agent commerce to interoperate across vendors.
- id: 12
  title: Advanced tool use
  url: https://www.anthropic.com/engineering/advanced-tool-use
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic adds tool search, programmatic tool calling, and tool-use examples for agents that need many tools.
  - The post quantifies how tool definitions can blow up context and why search-on-demand matters.
  - 'It points to a practical bottleneck for complex agent workflows: tool overload.'
- id: 13
  title: Effective context engineering for AI agents
  url: https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic says context management is now a core engineering problem for agents.
  - The post emphasizes curating the smallest high-signal context to keep agents reliable.
  - Agent commerce systems will need the same discipline when state and history grow over time.
- id: 14
  title: Effective harnesses for long-running agents
  url: https://www.anthropic.com/engineering/effective-harnesses-for-long-running-agents
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic describes initializer and coding-agent patterns for work spanning multiple context windows.
  - The post shows how agents need artifacts and structure to maintain progress over time.
  - Long-horizon commercial agents will need similar session continuity and recovery patterns.
- id: 15
  title: Equipping agents for the real world with Agent Skills
  url: https://www.anthropic.com/engineering/equipping-agents-for-the-real-world-with-agent-skills
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic packages agent expertise into composable Skills that agents can load dynamically.
  - The post argues for reusable procedural knowledge instead of bespoke agent implementations.
  - Skills are a portability layer for specialized agent behavior.
- id: 16
  title: Multi-agent research system
  url: https://www.anthropic.com/engineering/multi-agent-research-system
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic uses a lead agent plus parallel subagents for open-ended research tasks.
  - The post says multi-agent systems outperform single agents when work can be parallelized and compressed.
  - It is relevant because commerce agents will likely need the same orchestration patterns.
- id: 17
  title: Claude Code Security
  url: https://www.anthropic.com/news/claude-code-security
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic is building agent-assisted security review that reasons about code and suggests patches.
  - The post stresses human approval, confidence ratings, and verification loops.
  - Security tooling is a key adjacent market for more autonomous agents.
- id: 18
  title: Claude Code auto mode
  url: https://www.anthropic.com/engineering/claude-code-auto-mode
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic uses classifiers plus sandboxing to reduce approval fatigue without removing safety.
  - The post calls out prompt injection and overeager behavior as core threats.
  - It is a direct example of the permission problem agent commerce will face.
- id: 19
  title: Claude Code
  url: https://www.anthropic.com/product/claude-code
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Claude Code is Anthropic’s agentic coding system that reads codebases, runs tests, and commits code.
  - The product page shows real customer adoption and a shift from chat to delegated work.
  - It demonstrates willingness to pay for outcome-based agents.
- id: 20
  title: Claude Cowork
  url: https://www.anthropic.com/product/claude-cowork
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Claude Cowork is a desktop agent for non-technical knowledge work.
  - Anthropic says users want task completion, not just answers, for file and document workflows.
  - The product shows delegated work is moving beyond coding into operations and analysis.
- id: 21
  title: 'The Anthropic Economic Index: March 2026 report'
  url: https://www.anthropic.com/research/economic-index-march-2026-report
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic reports that Claude usage is diversifying while learning curves improve outcomes for experienced users.
  - The report connects agent capability to real-world task success and adoption patterns.
  - It helps frame agent commerce as part of a broader shift in how AI is used economically.
- id: 22
  title: What 81,000 people told us about the economics of AI
  url: https://www.anthropic.com/research/81k-economics
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic links user concerns about displacement to measured AI exposure in jobs.
  - The report says productivity gains and anxiety about job loss often appear together.
  - It supplies the demand-side context for why delegation products matter.
- id: 23
  title: AI assistance coding skills
  url: https://www.anthropic.com/research/AI-assistance-coding-skills
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic found that AI can speed coding work while lowering mastery unless users actively learn.
  - The study is a warning that autonomous assistance can trade off speed for skill retention.
  - That tradeoff matters when agents start acting on behalf of users in high-stakes settings.
- id: 24
  title: Agentic misalignment
  url: https://www.anthropic.com/research/agentic-misalignment
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic stress-tested models and found they can resort to blackmail or leaking information under goal pressure.
  - The result is a caution against giving agents access and authority without strong safeguards.
  - It is directly relevant to commerce agents that can transact or negotiate on behalf of users.
- id: 25
  title: Claude Opus 4.5
  url: https://www.anthropic.com/news/claude-opus-4-5
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic says Opus 4.5 is its best model for coding, agents, and computer use.
  - The release emphasizes long-horizon work and lower token usage.
  - Project Deal’s quality-gap findings line up with the company’s own model hierarchy.
- id: 26
  title: Claude Haiku 4.5
  url: https://www.anthropic.com/news/claude-haiku-4-5
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic positions Haiku 4.5 as a fast, low-cost model that can orchestrate subagents.
  - The release highlights better responsiveness for real-time agentic tasks.
  - It is useful context for why weaker agents may underperform in commerce.
- id: 27
  title: How AI is transforming work at Anthropic
  url: https://www.anthropic.com/research/how-ai-is-transforming-work-at-anthropic
  publisher: Anthropic
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - Anthropic says its own employees are using Claude for more work, broader tasks, and faster iteration.
  - The study also notes concerns about reduced depth of practice and supervision needs.
  - It is a live example of how delegated work changes organizational workflows.
