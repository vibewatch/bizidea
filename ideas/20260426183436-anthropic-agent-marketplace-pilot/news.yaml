  - 20
  - 21
  - 46
- title: Users are moving from chat to delegated work
  summary: Claude Code, Claude Cowork, and Anthropic’s own worker studies show rising demand for outcome-based agents that complete tasks rather than merely answer questions.
  sourceRefs:
