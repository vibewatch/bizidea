- title: Agent commerce works in low-stakes pilots
  summary: Anthropic’s pilot cleared 186 real-world deals with no human sign-off during negotiation, showing that agent-to-agent commerce is not purely theoretical.
  sourceRefs:
  - 1
  - 4
  - 5
- title: Scaffolding beats clever prompting
  summary: Across Anthropic’s agent stack, tool design, context management, sandboxing, and harnesses matter more than prompt style alone.
  sourceRefs:
