  validationPlan:
  - priority: high
    question: 财务团队会不会很快允许 $5k 以下的自主支出？
    evidenceToGather: 访谈财务负责人，并收集委托支出政策。
  - priority: high
    question: 在全面自主之前，审批加基准比价是否已经能交付 ROI？
    evidenceToGather: 与人工流程做试点对比。
