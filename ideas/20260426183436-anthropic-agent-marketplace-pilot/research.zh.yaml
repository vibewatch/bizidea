  validationPlan:
  - priority: high
    question: 财务部门是否会在短期内允许低于 $5k 的自主支出？
    evidenceToGather: 访谈财务负责人并收集委派支出政策。
  - priority: high
    question: 在全面自主之前，“审批 + 基准对标”能否先交付 ROI？
    evidenceToGather: 将试点与人工流程进行对比。
