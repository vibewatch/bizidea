slug: assay-packet-copilot
date: '2026-05-19'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: 从 2026-05-19 business-plan 日期后的首个完整月份开始。
- id: A2
  name: 客户计数单位
  value: 受控发现项目
  unit: customer_definition
  source: '[BP businessModel.unitOfValue] 定价和扩张都按在运行的发现项目计算，因此模型里的 customer 以受控项目为单位，而不是按企业账户数计算。'
- id: A3
  name: 付费试点套餐
  value: $125.0K over 4 months
  unit: usdK_per_pilot
  source: '[BP investorMemo.firstCustomer.initialContract] 对应 1 条受控工作流和实验包模板配置时，取已给出 $100k-$150k 付费试点区间的中点。'
- id: A4
  name: 生产阶段 ACV
  value: $300.0K per governed program per year
  unit: usdK_per_program_year
  source: '[BP market.som + research.market.som] 两个文件都把第 3 年可触达情形落在单个受控项目年 ACV 约 $300K。'
- id: A5
  name: 单项目收入确认
  value: $31.25K per month during the 4 pilot months, then $25.0K per month in production
  unit: usdK_per_program_month
  source: 由 A3 和 A4 推导得出，因此收入可以和试点月份加年度订阅精确对上。
- id: A6
  name: 毛利率
  value: 72%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 目标毛利率为 72%。'
- id: A7
  name: 项目爬坡节奏
  value: 2 live programs by M8, 5 by Q4Y2, and 9 by Q4Y3 with 7 in production by the end of Y3
  unit: live_programs
  source: '[BP milestones + research.market.som] 对齐计划：Y1 跑出 2 个付费试点，Y2 完成 2+ 个生产转化并拿到 1 个第二项目扩张，Y3 再扩大多项目 rollout，同时仍低于完整的 15 个项目 SOM。'
- id: A8
  name: 销售周期与转化
  value: 6-month median enterprise cycle, 25% qualified-buyer-to-paid-pilot, and 50% pilot-to-production conversion
  unit: funnel
  source: '[BP gtm.funnelTargets + BP risks] 基准情景保留 business-plan 的转化目标，但假设药企验证和采购仍会把周期拉到约 6 个月。'
- id: A9
  name: 月流失率
  value: 1.5%
  unit: percent
  source: 针对黏性较强但仍处早期的企业工作流软件的创业财务经验值。
- id: A10
  name: 全口径 CAC
  value: $180.0K per production program
  unit: usdK_per_program
  source: '[BP gtm.channels + research.reportMemo.distributionChannels] 由创始人主导的企业销售、试点交付和重验证部署，会带来较高但仍可承受的 CAC。'
- id: A11
  name: 全成本薪酬带宽
  value: 创始人 $120K；工程 $180K；科学工作流 $190K；解决方案 $160K；质量/合规 $170K；销售/GTM $170K；客户成功/运营 $110K
  unit: usdK_per_fte_year
  source: 针对美国早期生命科学工作流软件的创业财务经验值，并锚定到 business-plan 里的团队角色和企业销售招聘需求。
- id: A12
  name: 人员爬坡快照
  value: Founder 1/1/1/1/1/1; engineering 1/1/2/2/3/3; scientific workflow 1/1/1/1/1/1; solutions 0/1/1/1/1/2; quality/compliance 0/0/0/1/1/1; sales/GTM 0/0/0/1/1/1; customer success/ops 0/0/0/0/1/2 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team + strategicChoices.sequencingRationale] 先按 Month 0、Month 4、Month 9 的明确招聘顺序走，再在拿到生产证明后，只增加最低限度的工程和售后产能。'
- id: A13
  name: 非薪酬运营支出
  value: Rises from $18K per month in Q1Y1 to $54K per month by Q4Y3
  unit: usdK_per_month
  source: 创业财务经验值，覆盖云算力、验证支持、客户差旅、法务/合规，以及受监管企业部署所需的软件工具。
- id: A14
  name: seed 交割后的起始现金
  value: $3.0M
  unit: usdM
  source: '[BP fundingAsk.targetFundingRangeUsd] 取已给出 $3-5M seed 区间下沿，确保计划保持精干、并围绕里程碑推进。'
- id: A15
  name: 资金用途配比
  value: 45% engineering/product, 24% GTM, 13% G&A and compliance, 18% six-month buffer
  unit: allocation
  source: 由模型中的 18 个月 burn 结构和在达到 seed 里程碑后仍保留 6 个月缓冲的要求推导而来。
- id: A16
  name: Y2-Y3 运营费用平滑
  value: Quarterly opex rises gradually from $388.8K in Q1Y2 to $594.6K in Q4Y3 instead of stepping only at the required year-end snapshots
  unit: method
  source: '[Financial Modeler instructions] 薪资和非薪酬成本在各个快照列之间做平滑处理，这样季度 opex 轨迹才能和分阶段招聘保持一致。'
- id: A17
  name: 下行情景调整
  value: $250K ACV, 68% gross margin, 9-month cycle, and only 8 live programs by Q4Y3
  unit: scenario_inputs
  source: 基于 BP 与 research 中关于现有厂商缩小功能差距、预算可选性以及药企采购拉长的风险构建。
- id: A18
  name: 上行情景调整
  value: $340K ACV, 75% gross margin, 4-5 month cycle, and 10 live programs by Q4Y3
  unit: scenario_inputs
  source: 上行情景假设实验包 ROI 很早就被看见、1 条伙伴渠道开始可复制，而且第二项目扩张快于基准计划。
- id: A19
  name: 现金流简化假设
  value: Cash movement equals EBITDA in this operating model
  unit: method
  source: 针对早期软件公司的创业财务经验值：规划期内不单列债务、capex 或显著营运资本波动，因此现金变动等于 EBITDA。
