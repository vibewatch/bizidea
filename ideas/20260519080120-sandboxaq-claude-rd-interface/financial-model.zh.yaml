scenarios:
  downside:
    description: 现有厂商补功能更快、买方紧迫性更弱，会把销售周期拖向 9 个月，导致第 3 年末在运行项目更少。
    y3RevenueK: 1706.0
    y3EbitdaK: -1033.7
    cashLowPointK: 86.5
    keyAssumptionChanges:
    - 生产 ACV 从每个受控项目 $300K 降到 $250K。
    - 由于实施更偏服务化，毛利率从 72% 降到 68%。
    - 公司在 Y3 结束时只有 8 个在运行项目而不是 9 个，且试点转生产更慢。
  base:
    description: 2 个早期付费试点转成一套可复制的受控项目打法，到 Y2 末达到 5 个生产项目，到 Y3 末达到 9 个在运行项目。
    y3RevenueK: 2344.2
    y3EbitdaK: -506.1
    cashLowPointK: 957.9
    keyAssumptionChanges:
    - 生产 ACV 维持每项目 $300K，试点定价维持在 business-plan 区间中点。
    - 毛利率维持 business plan 的 72% 目标。
    - 试点转生产维持在接近 50%，并且有 1 个账户会在 12 个月内扩到第二个项目。
  upside:
    description: 在首批标杆账户里，缩短周期的价值很快变得显而易见，从而压缩销售周期，并提前拉动第二项目扩张。
    y3RevenueK: 3033.8
    y3EbitdaK: 81.6
    cashLowPointK: 1950.9
    keyAssumptionChanges:
    - 随着买方采用高级分析和相邻工作流覆盖，生产 ACV 从 $300K 提升到 $340K。
    - 随着实验包模板和验证资产标准化交付，毛利率从 72% 提高到 75%。
    - 由于 1 条伙伴渠道跑通，且 4-5 个月销售周期加快扩张，公司到 Q4Y3 可达 10 个在运行项目。
sensitivity:
- variable: ARPU
  downsideCase: $250K ACV：如果买方把使用量锁在 1 条很窄的工作流上，并抗拒高级分析。
  baseCase: $300K ACV / 每个受控项目。
  upsideCase: $340K ACV：随着相邻工作流扩张和分析增购而实现。
  y3RevenueImpactK: -430.0
  cashImpactK: -310.0
- variable: CAC
  downsideCase: $220K CAC：如果每次部署都需要创始人和解决方案团队大量定制投入。
  baseCase: 模型基准情景下，由创始人主导的企业销售对应 $180K CAC。
  upsideCase: $150K CAC：如果 1 条伙伴渠道可以先筛买方，并且实施更少定制化。
  y3RevenueImpactK: 0.0
  cashImpactK: -160.0
- variable: 流失率
  downsideCase: 月流失率 2.5%：如果产品长期停留在项目制，买方也迟迟不做多项目标准化。
  baseCase: 月流失率 1.5%。
  upsideCase: 月流失率 1.0%：当实验包模板和结果追踪真正嵌入流程后。
  y3RevenueImpactK: -120.0
  cashImpactK: -95.0
- variable: 销售周期
  downsideCase: 9 个月：因为买方选择等待现有 ELN 或模型厂商的路线图。
  baseCase: 6 个月：由创始人主导销售，并采用验证优先部署。
  upsideCase: 4-5 个月：当标杆实施和伙伴引荐缩短尽调后。
  y3RevenueImpactK: -638.0
  cashImpactK: -540.0
- variable: 毛利率
  downsideCase: 68%：如果试点继续偏服务化，验证工作也始终高度定制。
  baseCase: 目标毛利率 72%。
  upsideCase: 75%：当实验包模板和 QA 资产能够跨账户复用后。
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: 招聘节奏
  downsideCase: 在生产证明尚不充分前，就提前补齐更多售后和合规岗位。
  baseCase: Y2 只再加 1 名工程师，并在转化完成后才扩解决方案和客户成功。
  upsideCase: 把第 2 个客户成功岗位延后到伙伴带来的扩张开始可复制之后。
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Targets[Target pharma programs] --> Pilots[Paid pilots]\n  Pilots --> Production[Production governed programs]\n  Production --> Expansion[Second-program expansion]\n  Expansion --> Revenue[Subscription and usage revenue]\n  Revenue --> GrossProfit[72% gross profit]\n  GrossProfit --> Opex[Hiring plus compliance and delivery spend]\n  Opex --> Cash[Ending cash]"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入，来自把 2 个早期试点转成生产，再在 Y2 新增 3 个项目，并以约 $300K ACV 在 Y3 末做到 9 个在运行的受控项目。
- checkName: 必须成立的前提
  finding: 试点转生产必须接近 business-plan 设定的 50%，而且至少有 1 个账户要在 12 个月内扩到第二个项目。
- checkName: 模型会在哪种情况下失效
  finding: 如果买方选择等待现有厂商，导致周期拖向 9 个月，下行情景的现金最低点会逼近 $0.1M，公司需要在 Y3 结束前桥接融资。
- checkName: 下一轮融资证明点
  finding: 只要公司以 5 个生产项目、1 套可复制扩张动作，以及“部署稳定低于 10 周”的证明结束 seed 阶段，下一轮融资就更站得住。
sanityChecks:
  ruleOf40: Y3 增长率 83.8% 加 EBITDA 利润率 -21.6% = 62.2%。
  burnMultiple: Y2 的 burn multiple 约为 0.9x，对应约 $900.0K 的净新增 ARR；Y3 约为 0.8x，因为有 2 个后期试点尚未完全转成生产。
  revenuePerFte: Y3 人均收入为 $213.1K：即 $2344.2K 收入 / Q4Y3 的 11 名 FTE，处在 $200K-$400K 工作流软件基准的低端。
  flags:
  - 模型默认药企买方现在就会为一层中立实验包治理掏钱，而不是等 Benchling、Dotmatics 或 SandboxAQ 自己延长栈能力。
  - 到 Y3，人均收入只刚刚越过软件基准下沿，因此任何额外服务工作或过早招聘，都会明显拉差 burn 效率。
  - 基准情景下，公司在 Y3 末仍有 2 个在运行试点处于转化中，因此下一轮融资质量取决于试点到生产节奏是否真能按模型跑出。
  - 如果验证包、CRO 导出或数据映射继续一户一户定制，毛利率会很快下滑。
