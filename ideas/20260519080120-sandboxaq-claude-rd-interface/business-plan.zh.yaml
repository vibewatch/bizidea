slug: assay-packet-copilot
date: 2026-05-19
executiveSummary: 这家公司应该被搭成一层受控实验包：服务那些刚开始在每周化合物优先级评审里使用可由 Claude 调用的定量模型的头部药企 hit-to-lead 团队。第一位用户，是想拿到模型支持的下一步建议、又不想排队等计算专家的转化药理或药物化学负责人。真正拍板的人，则是发现信息学负责人或计算化学副总裁，因为采购会碰到验证、模型访问策略和 CRO 交接。MVP 不该去替 Benchling、Dotmatics、LIMS 或上游模型厂商；它该做的是抓取外部 Claude 会话、强制执行获批 assay 模板，再导出带评审签字、可由实验台团队或 CRO 直接执行的实验包。最好的切口，是美国头部药企里做小分子效价排序和下一步实验规划的团队：这条流程周周重复，交接痛点肉眼可见，验证面也比更泛的科研 AI 治理窄。研究证明市场确实需要可追踪性和工作流控制，但还没证明买方会不会在等 Benchling、Dotmatics 或 SandboxAQ 自己补功能之前，先为一层中立层掏钱。只要公司能成为“从开放式模型查询到审计就绪实验包”的最快路径，并持续沉淀模板、评审策略和实验包到结果的追踪数据，它就有机会赢。董事会层面真正要问的是：在现有厂商补齐之前，早期试点能不能把周期缩短和专家时间节省做得足够明显，从而把预算拉出来。
problem:
- 随着 Claude 和 MCP 把定量模型开放给更多科学家，每周的 hit-to-lead 决策都会冒出不可复现的提示、隐含假设和手工整理实验包的问题，导致 assay 请求迟迟批不下来。
- 发现信息学团队必须横跨外部会话、多家模型厂商和 CRO 交接，去治理模型驱动建议；但 ELN 和模型厂商大多只会在自家栈里做事后记录。
- 每次交接失真都可能白白耗掉几周 assay 时间，也会迅速消耗团队对科学 AI 的信任；所以买方要的先是可审阅性，而不是更大范围的自动化。
solution:
- 把 Claude 会话上下文、获批数据集、模型版本、关键假设和评审签字收进按 assay 定制的实验包模板，先服务效价排序和下一步实验规划。
- 面向内部实验室或 CRO 伙伴导出可执行的实验简报；只要数据、参数边界或溯源不完整，就直接阻断实验包生成。
- 横向比较不同模型版本的输出，并把越界警告显式抬出来，让信息学负责人在不丢控制权的前提下扩大模型使用。
whyWeWin:
- 切口不是再做一个模型厂商，也不是替掉 ELN，而是在 Claude 会话和实验记录之间补上一层中立治理。
- 购买触发点非常具体：一旦团队把可由 Claude 调用的科研模型放进流程，评审会上产生的模型建议就会超过专家能手工整理的上限。
- 湿实验和 CRO 交接能带来可量化 ROI——更快的实验包准备、更少的专家居中协调，以及更少的评审往返。
- 如果创业公司尽早拿下标杆项目，可复用的实验包模板、评审策略和实验包到结果追踪数据，会逐步沉淀成切换成本。
strategicChoices:
  beachhead: 首个滩头市场，是美国头部 30 家药企里已经在使用外部定量模型、且将不少 assay 执行外包给 CRO 的小分子 hit-to-lead 团队。
  wedgeRationale: 这一小块场景有每周重复的决策节奏、昂贵的下游实验，以及能立刻感知治理痛点的信息学买方。相比泛化的科研 AI 治理产品，它更容易先把一类实验包、一个买方和一套 ROI 叙事验证出来。
  sequencingRationale: 先从效价排序和下一步实验包做起，因为它们最接近明确的审批动作，也最容易作为现有 ELN 和模型栈之上的叠加层出售。只有当公司证明了从试点到生产的转化能力后，才应该再扩相邻工作流、做更深的系统记录层集成，以及更广的地域 rollout，让产品范围、销售动作、招聘和合规负担始终对齐。
  notYet:
  - 在药企证明跑出来之前，不碰材料科学和催化剂工作流
  - 在效价和细胞模型实验包模板还没跑顺之前，不扩 ADME、安全性和 developability 模块
  - 不做完整 ELN、LIMS 或模型厂商替代
  - 在美国共创客户打法和可追踪性控制没被证明之前，不做 EU-first 扩张
market:
  tam: 模型化 TAM 约为 $360.0M：假设全球约 150 家大型生物医药及相邻发现机构，每家约 8 个暴露给 AI 的项目，每个受控项目年 ACV 约 $300k。
  sam: 模型化 SAM 约为 $45.0M：针对全球前 30 家药企，每家约有 5 个可触达的小分子 hit-to-lead 项目，而且这些项目已经在依赖外部模型或重度 CRO 交接。
  som: 模型化第 3 年 SOM 约为 $4.5M：对应 5 家企业客户、每家约 3 个在运行的受控项目，单项目 ACV 约 $300k。
  segments:
  - 做效价排序和下一步实验评审的头部药企 hit-to-lead 团队
  - 想在多条研发项目线上统一科研 AI 治理的发现信息学团队
  buyingProcess: 一旦某个发现项目启用了可由 Claude 调用的模型，而每周评审会开始产出超出专家整理上限的模型建议，评估往往就会启动。只有当产品能嵌进现有验证流程和 CRO 交接流程，并拿出更快审批、溯源更干净的可信路径时，发现信息学负责人或计算化学副总裁才会签字。
product:
  mvp: 第一版是带 concierge 支持的控制平面，先服务 1 个 hit-to-lead 项目：抓取 Claude 会话、强制执行效价或细胞模型实验包模板、记录与签名绑定的审批动作，再把 CRO-ready 实验包导入现有评审流程。每份实验包都必须保留人工审批，产品定位是叠加层，不替掉 ELN 或 LIMS。
  sixMonth: 6 个月目标：上线首个生产版 MVP，覆盖效价排序和下一步实验包生成，并带上数据集引用、模型版本跟踪、越界警告，以及可被内部实验室和 CRO 使用的导出格式。
  twelveMonth: 12 个月目标：把效价和细胞模型工作流沉淀成可复用的实验包模板库，补上跨模型比对、审批仪表盘，以及能量化准备时间下降、实验包完整度和评审吞吐的证据包。
  twentyFourMonth: 24 个月目标：扩到 ADME、developability 等相邻发现工作流，做更深的 ELN 与 LIMS 集成，并提供能跨项目比较实验包质量和下游 assay 结果的组合视图。
  keyBets:
  - 效价排序和下一步实验规划，是频率够高、痛点够深、也最容易被做成可复制产品的窄工作流。
  - 相比更激进的自治科研 agent，买方会更快接受一层保留人工审批的叠加层。
  - 实验包生成能拿掉大部分手工文档工作，同时不削弱科研判断和可审计性。
  - 跨项目的实验包模板和结果追踪数据，比一次性服务型工作流更能沉淀防御力。
gtm:
  wedge: 把公司卖成一层控制层：让头部药企团队能在每周 hit-to-lead 决策里使用可由 Claude 调用的定量模型，而不额外背上治理债务，也不用手工拼实验包。
  channels:
  - 由创始人亲自去卖给发现信息学负责人、计算化学副总裁和转化药理负责人
  - 在 1 个真实在跑的 hit-to-lead 项目里，以每周评审会为核心做共创部署
  - 通过上游模型厂商和 Claude 生态引荐切入那些下游运营层缺位的场景
  - 围绕实验包导出和交接痛点，从 CRO 与 assay 运营伙伴处拿转介绍
  funnelTargets: 目标账户到合格买方 20%+，合格买方到付费试点 25%+，付费试点到生产项目 50%+，首个项目到账户内第二个项目扩张在 12 个月内达到 40%+
  pricing: 按在运行的发现项目收取年度订阅费，外加实施与验证包；当受控模型运行或实验包导出量更高时，再按量收费。这样的价值锚点更符合买方，因为它替代的是项目层面的专家居中协调和手工实验包准备，而不是再卖一个终端用户 seat。
businessModel:
  revenueStreams:
  - 按受控发现项目收取年度软件订阅费
  - 为实验包模板配置和工作流映射收取实施与验证费用
  - 超出合同基线后，对受控模型运行和实验包导出收取按量费用
  - 向重复采购的企业客户出售高级组合分析和额外工作流模块
  unitOfValue: 带获批实验包模板、受控模型会话和生产级交接流程的在运行发现项目
  targetGrossMarginPct: 72
  expansionLevers:
  - 在同一药企账户内扩更多 hit-to-lead 及相邻临床前项目
  - 从效价和细胞模型实验包，扩到 ADME、developability 和安全性工作流
  - 出售高级跨模型比较和实验包到结果分析模块
  - 通过模型厂商、科研咨询公司和 CRO 集成走伙伴分发
strategyMap:
  northStarMetric: 带完整溯源、无需人工返工、并最终转成已执行 assay 的模型驱动实验包数量
  inputMetrics:
  - 从模型查询到评审批准实验包的中位小时数
  - 首次评审即通过、且没有缺失溯源字段的实验包占比
  - 每个活跃项目在每周评审准备中省下的专家工时
  - 付费试点到生产项目的转化率
  - 生产客户在 12 个月内新增第二个受控项目的占比
  moatsToBuild:
  - 贴着真实 hit-to-lead 流程构建的获批 assay 模板、参数边界和评审策略库
  - 把提示、模型、假设和下游 assay 结果连起来的实验包到结果数据集
  - 能横跨多家模型厂商和记录系统的内嵌审批与 CRO 交接工作流
  killCriteria:
  - 前 10 个目标药企账户里，不到 3 家愿意在当前预算周期为付费试点拨款
  - 前 3 个付费试点无法把实验包准备时间较团队当前人工流程至少砍掉 50%
  - 前 5 次付费部署后，试点到生产转化率仍低于 40%
  - 超过一半的严肃潜客明确要求等现有 ELN 或模型厂商发布对应功能
  mermaid: "flowchart LR\n  Wedge[Hit-to-lead packet wedge] --> MVP[Governed Claude session to packet MVP]\n  MVP --> Proof[Faster approvals and cleaner CRO handoffs]\n  Proof --> Expansion[Multi-workflow scientific AI control layer]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流切口和买方痛点都很强，但在中立实验包层能否独立拉出预算之前，判断仍要保守。
    whyBelieve: 公司瞄准的是“模型输出到 assay 执行”之间那道具体的运营断层；在这里，可审阅性、溯源和 CRO 交接质量，比再加一个前沿模型更重要。
    whyDoubt: 现有 ELN、工作流和模型厂商，都可能补出足够好的实验包化和可追踪性能力，从而在创业公司拿到标杆客户前拖慢采用。
    nextDiligence: 下一步关键证明，是 2–3 个头部药企付费试点：它们要能明显加快实验包审批、降低专家负担，并至少有 1 个转成生产项目。
  firstCustomer:
    title: 由发现信息学负责人牵头的一个小分子 hit-to-lead 共创项目
    profile: 全球前 30 药企团队，包含 10–30 名药物化学和转化药理科学家，已经在使用外部模型，并且每周评审会都会触发 CRO assay 交接。
    trigger: 某个在跑项目启用了可由 Claude 调用的定量模型，评审会上产出的模型建议开始超过专家能打包和审批的上限。
    buyer: 发现信息学负责人或计算化学副总裁
    initialContract: 首单应是 1 条受控 hit-to-lead 工作流加实验包模板配置的 $100k-$150k 付费试点；一旦团队在每周评审和 CRO 交接里真正用上生产级实验包，就转成 $250k-$400k 的年度项目订阅。
  mustBeTrue:
  - 前 10 个目标药企账户里，至少有 3 家把外部 Claude 实验包治理视为今年可预算的问题。
  - 前 3 个试点能在不增加科研返工的前提下，把实验包准备时间至少砍掉 50%。
  - 超过 80% 的实验包字段可以直接从会话和模型上下文自动生成，且评审人编辑时间少于 15 分钟。
  - 至少 2 个早期试点在结束后 6 个月内转成每年 $250k 以上的生产合同。
  - 至少 1 个生产客户能在 12 个月内扩到第二个项目或相邻工作流。
  diligenceQuestions:
  - 发现信息学负责人现在就会买一层中立实验包层，还是会等 Benchling、Dotmatics 或 SandboxAQ 自己扩栈？
  - 效价排序和下一步实验规划是不是最佳首个工作流，还是别的实验包类型更容易转化买方？
  - 最先能打开预算的 KPI 到底是什么：省专家时间、缩周期、补完整度，还是增强合规姿态？
  - 在 assay 规划决策里，买方需要保留多少人工评审，才会真的信任系统？
  - 公司能否拿到足够权利去构建实验包到结果的基准数据，而不引发 IP 或数据共享阻力？
operatingAssumptions:
- assumption: 发现信息学负责人会在等现有 ELN 或模型厂商补功能之前，先为一层中立控制层买单。
  basis: research.yaml
  validationTest: 访谈 15 个目标买方，并至少拿下 3 个付费试点；商业赞助人必须是信息学或计算化学负责人，而不是免费共创客户。
  decisionImpact: 如果不成立，公司就该转向伙伴分发、白标打包，或嵌进现有工作流里的服务型附加销售。
- assumption: 效价排序和下一步实验规划是最佳首个工作流，因为它们兼具高重复频率、显性交接痛点和较可控的验证面。
  basis: research.yaml
  validationTest: 和一位共创客户比较 3 类候选工作流，确认效价或细胞模型实验包是不是最短的付费落地路径，且 ROI 最容易量化。
  decisionImpact: 如果不成立，路线图就该把滩头市场移到重复性和买方紧迫性更强的工作流，而不是死守原切口。
- assumption: 只要产品能拿掉专家居中协调和手工拼实验包，买方就愿意为每个受控项目每年支付约 $250k-$400k。
  basis: research.yaml
  validationTest: 把 2 个试点转成 $250k 以上的年度合同，且买方明确把缩短周期和治理价值列为采购原因。
  decisionImpact: 如果不成立，公司大概率需要更低价的打包方式、更重的服务，或更大的平台叙事来支撑风投回报。
- assumption: 实验包生成能从会话上下文里自动填好大部分溯源和工作流字段，而不会给科学家增加额外文档工作。
  basis: operator judgment
  validationTest: 在前 2 个试点里，测量是否有超过 80% 的实验包字段被预填，且评审人中位编辑时间低于 15 分钟。
  decisionImpact: 如果不成立，采用摩擦会上升，产品就该继续收窄范围，或先深做工作流捕捉和系统集成，再扩销售。
- assumption: 混合栈集成可以一直保持为叠加层，并在不迫使客户替换 ELN 或 LIMS 的前提下，于 10 周内落地。
  basis: idea.yaml
  validationTest: 完成前 3 次部署时，每个账户只允许 1 条实验包导出路径、1 套审批工作流，且客户定制工程不超过 4 周。
  decisionImpact: 如果不成立，实施负担会拖长销售周期，公司要么缩窄 ICP、要么多融资、要么更依赖伙伴。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 位来自头部 30 家药企的发现信息学、计算化学和转化药理负责人。
  hypothesis: 外部 Claude 实验包治理是和模型 rollout、每周评审工作流直接挂钩、且当前就能列预算的痛点。
  successMetric: 至少 8 位买方把这个问题排进未来一段时间最重要的前三个工作流优先级，且至少 3 位愿意推进付费试点范围界定。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 跟一轮真实的 hit-to-lead 周评审，并用团队现有材料手工做出一个实验包原型。
  hypothesis: 实验包准备时间、溯源缺口和 CRO 交接摩擦足够明显，足以支撑一个狭窄但成立的 ROI 叙事。
  successMetric: 明确记录一套当前流程：至少需要 1 个工作日人工准备，并能识别出 5 个以上可模板化的高频字段。
  owner: 科学工作流负责人
- horizon: 90–180 天
  experiment: 签下 2 个关于效价排序和下一步实验包生成的付费试点。
  hypothesis: 即便还没完全自动化，只要产品能嵌进现有审批流程并把人保留在环里，买方也愿意付费。
  successMetric: 拿下 2 个每个至少 $100k 的付费试点，都有清晰的生产转化路径，而且不要求替换现有 ELN。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 和一位共创客户一起验证 1 条 CRO 导出集成和 1 套审批签名工作流。
  hypothesis: 创业公司可以占住实验包层，而不被迫去做系统记录层。
  successMetric: 有 1 个试点账户接受导出的实验包和评审日志进入生产使用，且没有出现关键 QA 或审计阻塞。
  owner: 创始工程师
- horizon: 180–365 天
  experiment: 在首批付费试点中量化周期缩短、实验包完整度和节省下来的专家工时。
  hypothesis: 在更长期结果数据还没积累起来之前，运营 ROI 已经强到足以把试点转成年度项目订阅。
  successMetric: 实验包准备时间至少下降 50%，首次评审完整度至少达到 90%，并且至少有 1 个试点转成生产。
  owner: 解决方案架构师
operations:
- 建立标准化的实验包模板编写流程：每条受支持 assay 工作流都要明确参数边界、必填证据字段和审批步骤。
- 准备覆盖审计轨迹、签名含义、记录保留和模型版本可追踪性的验证与 QA 包，用于每次部署。
- 在试点 rollout 期间，和信息学、科研负责人及面向 CRO 的运营人员保持每周实施节奏。
- 搭建受控集成层，连接 Claude 会话、获批模型端点，以及写回客户记录系统的结构化实验包导出。
- 建立 customer success 手册，在项目层面持续跟踪准备时间下降、评审吞吐和生产转化。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 前几单必须由创始人亲自打，因为早期成交更依赖买方发现、产品打包和伙伴信任，而不是规模化获客。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 核心技术风险，在于能否稳定抓到会话、卡住溯源、记录审批，并把结果稳定导进混合企业系统。
- role: 科学工作流负责人
  startTiming: 第 0 个月
  rationale: 产品必须把 assay 模板和评审逻辑贴住真实 hit-to-lead 决策流程来编码，而不是停留在泛 AI 治理理论。
- role: 解决方案架构师
  startTiming: 第 4 个月
  rationale: 企业试点需要有人把客户记录系统、CRO 交接和验证需求，翻成标准化部署模式。
- role: 质量与合规负责人
  startTiming: 第 9 个月
  rationale: 当试点开始转生产时，公司需要专人负责验证材料、可追踪性控制和审计就绪姿态。
milestones:
- horizon: 0–12 个月
  items:
  - 在头部 30 家药企的 hit-to-lead 项目里拿下 2 个付费共创试点
  - 上线生产版 MVP，覆盖效价排序和下一步实验包生成，并带审批日志和 CRO-ready 导出
  - 在 1 条真实的每周评审工作流里，证明实验包准备时间至少下降 50%
  - 建立一套可复用的验证包，能在试点部署中通过客户 QA 和信息学评审
- horizon: 12–24 个月
  items:
  - 至少把 2 个试点账户转成年付生产合同，并让其中 1 个扩到第二个受控项目
  - 在首批客户中补上可复用的细胞模型模板、跨模型比较和组合报告
  - 固化 1 条 CRO 或科研服务集成路径，减少手工重排实验包格式
  - 形成一套标杆实施手册，把新账户部署时间稳定压在 10 周以内
- horizon: 24–36 个月
  items:
  - 在证明初始效价切口后，扩到 ADME 或 developability 等相邻工作流
  - 跨多个客户沉淀实验包到结果的基准数据，增强留存和定价权
  - 在可追踪性和验证姿态成熟后，扩到更广的美国市场和选择性的欧洲药企部署
  - 通过模型厂商或科研工作流咨询伙伴，建立伙伴驱动分发
risks:
- risk: 现有 ELN 或模型厂商补出足够多的实验包化和可追踪性能力，让独立切口变窄。
  likelihood: High
  impact: High
  mitigation: 把差异拉在跨外部会话和多家模型厂商的中立性、更快部署，以及更深的工作流专用实验包模板上。
- risk: 药企的验证和采购周期把试点拖得太久，导致学习速度和收入都被饿住。
  likelihood: High
  impact: High
  mitigation: 先以影子模式切入，保留强制人工审批，并只卖进 1 个真实在跑、流程窄且 ROI 清楚的项目。
- risk: 如果实验包生成让科学家觉得是在额外做文档工作，产品会被直接拒绝。
  likelihood: Medium
  impact: High
  mitigation: 从会话上下文自动预填实验包字段，显式量化编辑时间；只要还没快过现有人工流程，就继续收窄范围。
- risk: 即使治理层做得对，只要源数据差或模型越界输出，实验包照样会失去信任。
  likelihood: Medium
  impact: High
  mitigation: 每份实验包都强制要求数据集引用、参数边界和不确定性警告；证据不全就不允许导出。
- risk: 如果相邻工作流在早期证明之后始终打不开，滩头市场可能窄到撑不起风投级增长。
  likelihood: Medium
  impact: Medium
  mitigation: 把效价工作流当成证明切口，但要在前 18 个月同步测试细胞模型和相邻临床前实验包的扩张拉力。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: 这轮资金要覆盖 18 个月：把产品做出来，补齐质量与合规能力，落 2–3 个头部药企共创部署，并由创始人主导企业销售，先证明在首个滩头市场里“试点到生产”的转化。
