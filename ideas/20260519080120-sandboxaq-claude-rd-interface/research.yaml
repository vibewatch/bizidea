  fiveForces:
    supplierPower:
      score: 3
      rationale: MCP and model-agnostic orchestration reduce dependence on any single upstream model vendor, but supplier relationships still matter.
      sourceRefs: [3, 13, 16]
    buyerPower:
      score: 4
      rationale: Large-pharma buyers are concentrated, have existing informatics stacks, and will demand proof that a new layer fits governance and security requirements before rollout.
      sourceRefs: [9, 21, 25]
    threatOfEntrants:
      score: 3
      rationale: Workflow software is buildable, but assay-specific templates, reviewer policies, and packet-to-outcome traces take time to accumulate and validate.
      sourceRefs: [8, 11, 21, 24]
    threatOfSubstitutes:
      score: 4
      rationale: Manual analyst mediation, ELNs, DMTA suites, and model vendors already cover parts of the job, so the product must prove it reduces toil and governance risk together.
      sourceRefs: [10, 13, 15]
    competitiveRivalry:
      score: 4
      rationale: Adjacent incumbents are already moving toward AI-native workflows, even if none yet owns the exact packetization wedge.
      sourceRefs: [6, 13, 14, 15]
  pestle:
    - factor: political
      impact: neutral
      point: Public-sector AI governance is becoming more formal, which raises process expectations but also legitimizes spend on control layers.
      sourceRefs: [20, 21, 22]
    - factor: economic
      impact: positive
      point: Drug-discovery and pharma R&D remain large enough that even small cycle-time gains are valuable.
      sourceRefs: [23, 25, 26]
    - factor: social
      impact: positive
      point: Scientists increasingly expect AI help in daily work, but only if outputs can be trusted and tied back to evidence.
      sourceRefs: [5, 24]
    - factor: technological
      impact: positive
      point: MCP and agentic tooling lower the integration barrier for connecting models, records, and workflow systems.
      sourceRefs: [3, 4, 6]
    - factor: legal
      impact: positive
      point: Part 11-style controls and EU AI traceability obligations make approval-gated provenance more valuable over time.
      sourceRefs: [17, 18, 19, 20, 22]
  adoptionFrictionMatrix:
    - friction: Validation burden for a new control layer
      severity: high
      affectedBuyer: Discovery informatics
      mitigation: Start with shadow-mode packet generation and compare against historical decisions before allowing direct export to CROs.
      sourceRefs: [9, 21, 22]
    - friction: Scientists may see documentation as extra work
      severity: medium
      affectedBuyer: Medicinal chemistry lead
      mitigation: Auto-generate packets from existing session context and make approval faster than current manual prep.
      sourceRefs: [8, 10, 11]
    - friction: Incumbent ELN vendors can claim the feature set
      severity: high
      affectedBuyer: Platform owner
      mitigation: Differentiate on cross-tool neutrality, faster deployment, and external-session capture outside the incumbent stack.
      sourceRefs: [6, 7, 14]
    - friction: Model outputs can still fail if source data are inconsistent
      severity: high
      affectedBuyer: Computational chemistry lead
      mitigation: Force explicit dataset references, assumptions, and out-of-domain warnings into every packet.
      sourceRefs: [24]
