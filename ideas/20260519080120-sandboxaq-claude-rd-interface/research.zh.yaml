  adoptionFrictionMatrix:
  - friction: 新控制层的验证负担
    severity: 高
    affectedBuyer: 发现信息学
    mitigation: 先用影子模式生成实验包，再和历史决策对比，确认无误后再允许直接导出给 CRO。
    sourceRefs:
    - 9
    - 21
    - 22
  - friction: 科学家可能把文档记录看成额外负担
    severity: 中
    affectedBuyer: 药物化学负责人
    mitigation: 直接从现有会话上下文自动生成实验包，并让审批速度快过当前人工准备。
