competitors:
- name: SandboxAQ
  stage: 扩张期
  wedge: 通过 MCP 和企业授权，把基于物理的大型定量模型用于药物发现。
  pricing: 企业授权 / 前沿合作（定制）
  strength: 模型深度强，而且有清晰路径把定量模型直接挂到 Claude 一类界面背后。
  weaknessVsUs: 它掌握的是模型访问，不是横跨多家模型厂商和外部会话的中立评审与实验包层。
  sourceRefs:
  - 1
  - 2
  - 13
- name: Benchling
  stage: 现有厂商
  wedge: 统一的研发数据平台，带 agent、模型中枢、MCP 连接器和合规级审计轨迹。
  pricing: 定制化企业平台定价，另含附加模块、验证支持和服务
  strength: 如果团队已经深度待在结构化 ELN 和系统记录层里，它是位置最好的现有厂商。
  weaknessVsUs: 对那些发生在 Benchling 之外、但又要被整理成实验包的模型决策，它的捕捉和治理并不天然顺手。
  sourceRefs:
  - 6
  - 7
  - 9
- name: Dotmatics Luma
  stage: 现有厂商
  wedge: AI 原生的多模态科研平台，所有动作都有日志、审批闸门和可审计报告。
  pricing: 定制化企业定价（已抓取页面未公开）
  strength: 在治理叙事和科研数据、工作流覆盖面上都很强。
  weaknessVsUs: 平台太宽，导致“外部 Claude 到实验包”的切口更像众多功能之一，而不是产品核心。
  sourceRefs:
  - 14
- name: Schrödinger LiveDesign
  stage: 现有厂商
  wedge: 云原生 DMTA 协作与 ML copilot，深度嵌进计算设计工作流。
  pricing: 企业软件 / 预约演示模式
  strength: 非常贴合药物化学，并明确支持和 CRO 伙伴共享数据。
  weaknessVsUs: 它优化的是以 Schrödinger 为中心的设计流程，而不是跨混合助手和模型栈的可移植治理层。
  sourceRefs:
  - 15
  - 16
- name: BenchSci
  stage: 扩张期
  wedge: 建立在生物证据知识图谱上的疾病生物学 copilot。
  pricing: 定制化企业定价（已抓取页面未公开）
  strength: 在临床前立项和实验设计里，证据基础扎实、科研可信度也强。
  weaknessVsUs: 它更偏证据和靶点选择，而不是跨模型溯源、审批和 assay 实验包导出。
  sourceRefs:
  - 12
regulatoryTechnicalConstraints:
- point: 在受监管环境里，电子记录系统必须经过验证，记录可调取，并带有安全、带时间戳的审计轨迹。
  sourceRefs:
  - 17
- point: 如果审批工作流要替代人工评审记录，就必须明确签名含义、时间戳和不可抵赖能力。
  sourceRefs:
  - 18
  - 19
- point: AI 治理越来越强调风险管理、人工监督和可追踪性，而不是接受黑箱模型输出。
  sourceRefs:
  - 20
  - 21
  - 22
- point: 模型建议的可靠性，最终取决于喂给它的结构化数据和上下文元数据。
  sourceRefs:
  - 24
validationSignals:
- point: 89% 的受访生物科技科学家已经把 copilot 或推理工具当作数据询问的第一入口。
  sourceRefs:
  - 5
- point: Benchling 报告称，只要工作流被结构化并链接回源数据，科研 AI 的报告准备时间就能大幅下降。
  sourceRefs:
  - 8
  - 10
- point: SandboxAQ 明确表示，先进定量模型现在已经可以在 Claude 里通过自然语言提示调用。
  sourceRefs:
  - 1
  - 2
- point: Benchling 与 Anthropic 的集成已经在主打“一键可追踪”和自动继承审计日志，这说明买方确实在意这层能力。
  sourceRefs:
  - 6
openQuestions:
- 发现信息学负责人会不会很快为一层中立控制层买单，还是会等 ELN 厂商自己发类似功能？
- 第一条工作流到底该选哪条，才能最容易跑出证明点：效价排序、细胞模型规划、developability，还是 ADME 交接？
- 在不让买方担心科学判断和责任控制被削弱的前提下，评审工作量最多能拿掉多少？
- 实验包到结果的追踪数据，能不能强到足以挡住现有厂商补功能？
