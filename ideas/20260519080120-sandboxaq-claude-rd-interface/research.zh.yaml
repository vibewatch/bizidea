reportMemo:
  executiveTakeaways:
  - 大型药企科学家已经把 copilot 当成默认入口，但一到监管更重、数据更乱的工作流，采用就会掉下来，因为信任在这里最容易断裂 [5, 24]。
  - why-now 很具体：可由 Claude 调用的科研模型和 MCP 正在比信息学团队手工治理的速度更快地放大模型访问 [1, 2, 3, 4]。
  - 现有厂商动作很快，但它们大多只在工作已经待在自己栈里时占优；真正的空白，是把外部 Claude 会话中立地抓进来，再转成可执行的实验包 [6, 7, 13, 14, 15]。
  - 产品不能被卖成一个通用 chatbot，而要被卖成受控工作流基础设施，因为真正的痛点是手工交接、可复现性流失，以及 CRO 或湿实验实验包准备太慢 [8, 10, 11]。
  marketDefinition: 相关赛道不是泛 AI 助手，而是受控的科研工作流软件：它负责捕捉由 LLM 和模型参与的发现推理，把它和源数据、审批动作连起来，再导出可执行的实验包，而不是只留下松散的聊天记录 [3, 6, 8, 17]。
  customerAndBuyer: 一线用户，是那些已经能通过自然语言界面调用高级模型、但仍需要发现信息学负责人把输出做成可审、可共享、可执行的转化药理和药物化学科学家。经济买方则是发现信息学负责人或计算化学副总裁，因为采购会碰到验证、安全、数据结构和跨团队工作流设计 [5, 9, 11]。
  buyingTriggers:
  - point: 团队一旦打开 Claude 或 MCP 可访问的科研模型，很快就会出现一个失衡：能产出模型建议的人变多了，但能负责记录和评审的专家并没有同步增加。
    sourceRefs:
    - 1
    - 2
    - 3
    - 4
  - point: 项目负责人会发现，每周评审决策仍然要靠手工拼 PowerPoint、实验记录本和发给 CRO 的 PDF，才能真正批准一条 assay 请求。
    sourceRefs:
    - 8
    - 10
    - 11
  - point: AI 试点一旦走到安全、IP 或合规评审环节，就可能因为溯源、验证和审计性还不够可靠而卡住，没法规模 rollout。
    sourceRefs:
    - 5
    - 6
    - 9
    - 21
    - 22
  willingnessToPay:
    summary: 如果把产品定位成项目级基础设施，付费意愿应该不低：现有平台本来就在卖带验证支持的定制化企业套餐，而用户仍要把大量时间花在报告整理、CRO 数据处理和机构记忆回溯上。
    sourceRefs:
    - 9
    - 10
    - 11
  competitiveLandscape: 竞争真实存在，但很分散。Benchling 和 Dotmatics 占着结构化系统记录层，Schrödinger 占着 DMTA 协作，BenchSci 占着以证据为底的疾病生物学 copilot，SandboxAQ 则占着模型接入切口。到目前为止，还没有谁明确吃下“跨模型、跨外部 Claude 会话捕捉，再加实验包治理”这一层 [6, 7, 12, 13, 14, 15]。
  incumbentThesis:
  - incumbentClass: 云平台
    point: Claude 和 MCP 让访问门槛下降了，但平台本身不会自动变成科研系统记录层或审批工作流。
    sourceRefs:
    - 3
    - 4
  - incumbentClass: ELN 与信息学套件
    point: 像 Benchling 这样的平台，在工作本来就发生在它的数据模型里时最强；但对于发生在系统边界之外的外部会话和模型决策，它们不会自动抓到。
    sourceRefs:
    - 6
    - 7
    - 9
  - incumbentClass: 模型厂商
    point: SandboxAQ 这一类厂商的优势在预测模型和授权模式，不在中立溯源、跨模型比对或更大工作流里的评审签字。
    sourceRefs:
    - 1
    - 2
    - 13
  - incumbentClass: 计算设计套件
    point: Schrödinger 这一类工具在站内 DMTA 协作上很强，但它们的协作模型仍然绑在自家设计环境里，不像可跨混合系统流转的实验包层。
    sourceRefs:
    - 15
    - 16
  regulatoryLandscape: 真正的负担，不是某一本药物发现专用法规，而是一个组合要求：凡是电子生成的科研决策，都必须可追踪、可归属、可审阅、可关联审批，并且在 AI 深度嵌入健康和生命科学工作流后仍然可治理 [17, 18, 19, 20, 21, 22]。
  technologyLandscape: 技术栈正在收敛到几层：通过 MCP 接模型、面向垂直场景的科研 agent、结构化内部记录，以及与模型无关的编排层。这正给一层控制平面留出空间——它站在开放式 AI 推理和正式实验记录之间 [3, 4, 6, 7, 13, 14, 16]。
  distributionChannels:
  - point: 先通过发现信息学团队和一个 hit-to-lead 共创客户落地，等实验包模板和评审规则验证完，再按项目逐步扩张。
    sourceRefs:
    - 5
    - 9
    - 11
  - point: 借助模型厂商和 AI 平台集成的生态分发，因为这些上游本身也需要可信的下游落地层。
    sourceRefs:
    - 1
    - 3
    - 4
    - 6
  - point: 把产品和面向 CRO 的文档流、数据导入工作流一起打包，因为交接质量问题最显性，也最容易马上省时间。
    sourceRefs:
    - 8
    - 10
    - 15
  partnershipEcosystem:
  - point: Anthropic 和 MCP 生态伙伴很关键，因为它们会放大那些发生在受控信息学系统之外的科研会话数量。
    sourceRefs:
    - 3
    - 4
    - 6
  - point: SandboxAQ 以及 Schrödinger 这类模型提供方，是天然的上游合作伙伴：它们解决的是预测访问，不是下游溯源和实验包化。
    sourceRefs:
    - 13
    - 16
  - point: CRO 和外部数据导入集成很有战略价值，因为只要一份获批实验包能直接触发外部执行，产品价值就会明显上升。
    sourceRefs:
    - 10
    - 11
    - 15
  dataMoats:
  - point: 随着更多项目使用系统，一套可复用的获批实验包模板、参数边界和评审工作流会越来越值钱。
    sourceRefs:
    - 8
    - 11
    - 21
  - point: 实验包到结果的追踪数据，可以沉淀成一套私有数据集，把提示、模型、假设和下游 assay 结果质量连起来。
    sourceRefs:
    - 8
    - 11
    - 24
  - point: 如果产品能持续证明：哪些来源、模型和假设会导向更好的实验决策，那么跨模型比对历史本身就会变成信任护城河。
    sourceRefs:
    - 13
    - 16
    - 24
  geographicConsiderations:
  - point: 美国大型药企是最干净的首发市场，因为 Part 11 相关预期和企业软件预算都比较清楚。
    sourceRefs:
    - 17
    - 18
    - 19
    - 25
  - point: 随着 2026 年 8 月 AI Act 义务生效，欧盟部署会更强调可追踪性和透明度。
    sourceRefs:
    - 22
  - point: 全球药企 rollout 仍然需要一层统一治理，因为大买家本来就在美国和欧洲两地做研发，也广泛外包。
    sourceRefs:
    - 4
    - 21
    - 25
  sensitivityCases:
  - case: 如果 Benchling 或 Dotmatics 很快补上外部会话实验包化
    impact: 切口会变窄，创业公司必须把“跨工具中立、更快上线、assay 模板更深”这三点拉开差距。
    sourceRefs:
    - 6
    - 7
    - 14
  - case: 如果模型厂商补上一方溯源和审批功能
    impact: 创业公司就有被上游平台吞掉的风险，除非它能证明自己在跨厂商对比、评审策略和 CRO-ready 打包上的独立价值。
    sourceRefs:
    - 1
    - 13
    - 16
  - case: 如果买方把早期发现 AI 治理视为可选项，而不是眼前急事
    impact: 销售周期会拉长，ROI 证明就得更多靠缩短周期和节省专家时间，而不是合规紧迫性。
    sourceRefs:
    - 5
    - 8
    - 10
  validationPlan:
  - priority: 高
    question: 会不会有一个全球前 30 药企的 hit-to-lead 团队，愿意把每周人工做的评审实验包换成这个产品？
    evidenceToGather: 跟一轮真实评审流程，量出现有准备时间，再测试“生成实验包 + 签字”是否能在不增加科研返工的前提下缩短周期。
  - priority: 高
    question: 发现信息学负责人会把外部 Claude 会话捕捉看成缺失的控制层，还是会认为这只是 ELN 厂商该补的一个功能？
    evidenceToGather: 在使用 Benchling、Dotmatics 和混合栈的团队里做 5 场买方访谈，摸清预算归属、紧迫度，以及 build-vs-buy 倾向。
  - priority: 中
    question: 现在面向 CRO 的 assay 请求里，有多少还在靠人工对齐源假设、文件版本和模型溯源？
    evidenceToGather: 收集一支药企团队和一家 CRO 的匿名交接样本、修订往返和失效模式。
  - priority: 中
    question: 哪类 assay 工作流最容易先形成护城河：效价排序、细胞模型、ADME，还是 developability？
    evidenceToGather: 与一位共创客户一起比较 3 类工作流的历史实验包复杂度、重复频率和评审负担。
