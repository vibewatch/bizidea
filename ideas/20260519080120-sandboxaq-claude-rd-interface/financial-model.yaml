assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: month
  source: Starts the first full month after the 2026-05-19 business-plan date.
- id: A2
  name: Customer counting unit
  value: Governed discovery program
  unit: customer_definition
  source: '[BP businessModel.unitOfValue] Pricing and expansion are per live discovery program, so modeled customers are governed programs rather than enterprise logos.'
- id: A3
  name: Paid pilot package
  value: $125.0K over 4 months
  unit: usdK_per_pilot
  source: '[BP investorMemo.firstCustomer.initialContract] Midpoint of the stated $100k-$150k paid pilot range for one governed workflow and packet-template setup.'
- id: A4
  name: Production ACV
  value: $300.0K per governed program per year
  unit: usdK_per_program_year
  source: '[BP market.som + research.market.som] Both files size the reachable year-3 case at roughly $300K annual ACV per governed program.'
- id: A5
  name: Revenue recognition per program
  value: $31.25K per month during the 4 pilot months, then $25.0K per month in production
  unit: usdK_per_program_month
  source: Derived from A3 and A4 so revenue reconciles to pilot months plus annual subscriptions.
- id: A6
  name: Gross margin
  value: 72%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 72% target gross margin.'
- id: A7
  name: Program ramp
  value: 2 live programs by M8, 5 by Q4Y2, and 9 by Q4Y3 with 7 in production by the end of Y3
  unit: live_programs
  source: '[BP milestones + research.market.som] Mirrors the plan for 2 paid pilots in Y1, 2+ production conversions and one second-program expansion in Y2, then broader multi-program rollout in Y3 while staying below the full 15-program SOM.'
- id: A8
  name: Sales cycle and conversion
  value: 6-month median enterprise cycle, 25% qualified-buyer-to-paid-pilot, and 50% pilot-to-production conversion
  unit: funnel
  source: '[BP gtm.funnelTargets + BP risks] Base case keeps the business-plan conversion targets but assumes pharma validation and procurement still stretch the cycle to about 6 months.'
- id: A9
  name: Monthly churn
  value: 1.5%
  unit: percent
  source: Startup-finance heuristic for sticky but still early enterprise workflow software sold into top-pharma programs.
- id: A10
  name: Fully loaded CAC
  value: $180.0K per production program
  unit: usdK_per_program
  source: '[BP gtm.channels + research.reportMemo.distributionChannels] Founder-led enterprise sales, pilot delivery, and validation-heavy deployments imply a high but still manageable CAC.'
- id: A11
  name: Loaded salary bands
  value: Founder $120K; engineering $180K; scientific workflow $190K; solutions $160K; quality/compliance $170K; sales/GTM $170K; customer success/ops $110K
  unit: usdK_per_fte_year
  source: Startup-finance heuristic for U.S.-based early-stage life-sciences workflow software, anchored to the business-plan team roles and enterprise hiring needs.
- id: A12
  name: Headcount ramp snapshots
  value: Founder 1/1/1/1/1/1; engineering 1/1/2/2/3/3; scientific workflow 1/1/1/1/1/1; solutions 0/1/1/1/1/2; quality/compliance 0/0/0/1/1/1; sales/GTM 0/0/0/1/1/1; customer success/ops 0/0/0/0/1/2 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team + strategicChoices.sequencingRationale] Follow the named Month 0, Month 4, and Month 9 hires first, then add only the minimum engineering and post-sale capacity needed after production proof.'
- id: A13
  name: Non-payroll operating spend
  value: Rises from $18K per month in Q1Y1 to $54K per month by Q4Y3
  unit: usdK_per_month
  source: Startup-finance heuristic covering cloud compute, validation support, customer travel, legal/compliance work, and software tooling for a regulated enterprise deployment motion.
- id: A14
  name: Starting cash after seed close
  value: $3.0M
  unit: usdM
  source: '[BP fundingAsk.targetFundingRangeUsd] Modeled at the low end of the stated $3-5M seed range to keep the plan lean and milestone-driven.'
- id: A15
  name: Use-of-funds mix
  value: 45% engineering/product, 24% GTM, 13% G&A and compliance, 18% six-month buffer
  unit: allocation
  source: Derived from the modeled 18-month burn mix and the requirement to preserve six months of cushion after the seed milestone.
- id: A16
  name: Y2-Y3 opex smoothing
  value: Quarterly opex rises gradually from $388.8K in Q1Y2 to $594.6K in Q4Y3 instead of stepping only at the required year-end snapshots
  unit: method
  source: '[Financial Modeler instructions] Salary and non-payroll costs are smoothed between snapshot columns so the quarterly opex path stays consistent with staged hiring.'
- id: A17
  name: Downside scenario deltas
  value: $250K ACV, 68% gross margin, 9-month cycle, and only 8 live programs by Q4Y3
  unit: scenario_inputs
  source: Built from BP and research risks around incumbents closing the feature gap, optional budget perception, and longer pharma procurement.
- id: A18
  name: Upside scenario deltas
  value: $340K ACV, 75% gross margin, 4-5 month cycle, and 10 live programs by Q4Y3
  unit: scenario_inputs
  source: Upside assumes packet ROI is obvious early, one partner channel becomes repeatable, and second-program expansion lands faster than the base plan.
- id: A19
  name: Cash-flow simplification
  value: Cash movement equals EBITDA in this operating model
  unit: method
  source: Startup-finance heuristic for an early software company with no modeled debt, capex, or material working-capital swings in the plan horizon.
