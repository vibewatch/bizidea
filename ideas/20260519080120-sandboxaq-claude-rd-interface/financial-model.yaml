scenarios:
  downside:
    description: Incumbent feature catch-up and slower buyer urgency stretch the cycle toward 9 months, leaving fewer programs live by the end of year 3.
    y3RevenueK: 1706.0
    y3EbitdaK: -1033.7
    cashLowPointK: 86.5
    keyAssumptionChanges:
    - Production ACV falls from $300K to $250K per governed program.
    - Gross margin drops from 72% to 68% as implementation stays more services-heavy.
    - The company exits Y3 with 8 live programs instead of 9 and slower pilot-to-production timing.
  base:
    description: Two early paid pilots convert into a repeatable governed-program motion that reaches 5 production programs by the end of Y2 and 9 live programs by the end of Y3.
    y3RevenueK: 2344.2
    y3EbitdaK: -506.1
    cashLowPointK: 957.9
    keyAssumptionChanges:
    - Production ACV stays at $300K per program and pilot pricing stays at the midpoint of the business-plan range.
    - Gross margin holds at the 72% target from the business plan.
    - Pilot-to-production conversion stays near 50% and one account expands to a second program within 12 months.
  upside:
    description: Cycle-time savings become obvious in the first reference accounts, shortening the sales cycle and pulling forward second-program expansion.
    y3RevenueK: 3033.8
    y3EbitdaK: 81.6
    cashLowPointK: 1950.9
    keyAssumptionChanges:
    - Production ACV rises from $300K to $340K as buyers adopt premium analytics and adjacent workflow coverage.
    - Gross margin improves from 72% to 75% as packet templates and validation assets standardize delivery.
    - The company reaches 10 live programs by Q4Y3 because one partner channel and faster 4-5 month cycles accelerate expansion.
sensitivity:
- variable: ARPU
  downsideCase: $250K ACV if buyers cap usage at one narrow workflow and resist premium analytics.
  baseCase: $300K ACV per governed program.
  upsideCase: $340K ACV with adjacent workflow expansion and analytics upsell.
  y3RevenueImpactK: -430.0
  cashImpactK: -310.0
- variable: CAC
  downsideCase: $220K CAC if every deployment needs bespoke founder and solutions effort.
  baseCase: $180K CAC in the modeled founder-led enterprise motion.
  upsideCase: $150K CAC if one partner channel pre-qualifies buyers and implementation needs less custom work.
  y3RevenueImpactK: 0.0
  cashImpactK: -160.0
- variable: churn
  downsideCase: 2.5% monthly churn if the product stays project-like and buyers delay multi-program standardization.
  baseCase: 1.5% monthly churn.
  upsideCase: 1.0% monthly churn once packet templates and outcome traces become embedded.
  y3RevenueImpactK: -120.0
  cashImpactK: -95.0
- variable: sales cycle
  downsideCase: 9 months because buyers wait for incumbent ELN or model-vendor roadmaps.
  baseCase: 6 months with founder-led selling and validation-first deployments.
  upsideCase: 4-5 months once reference implementations and partner intros shorten diligence.
  y3RevenueImpactK: -638.0
  cashImpactK: -540.0
- variable: gross margin
  downsideCase: 68% if pilots stay services-heavy and validation work remains bespoke.
  baseCase: 72% target gross margin.
  upsideCase: 75% once packet templates and QA assets are reusable across accounts.
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: hiring pace
  downsideCase: Pull forward extra post-sale and compliance hires before production proof is visible.
  baseCase: Add only one more engineer in Y2 and scale solutions and customer success after conversions.
  upsideCase: Delay the second customer-success hire until partner-sourced expansions are repeatable.
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Targets[Target pharma programs] --> Pilots[Paid pilots]
      Pilots --> Production[Production governed programs]
      Production --> Expansion[Second-program expansion]
      Expansion --> Revenue[Subscription and usage revenue]
      Revenue --> GrossProfit[72% gross profit]
      GrossProfit --> Opex[Hiring plus compliance and delivery spend]
      Opex --> Cash[Ending cash]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by turning 2 early pilots into production, adding 3 more programs through Y2, and ending Y3 with 9 live governed programs at roughly $300K ACV.
- checkName: Must go right
  finding: Pilot-to-production conversion must stay near the 50% business-plan target and at least one account must expand to a second program within 12 months.
- checkName: Model breaks if
  finding: If buyers wait for incumbents and the cycle drifts toward 9 months, downside cash falls toward roughly $0.1M and the company needs a bridge before Y3 ends.
- checkName: Next-round proof
  finding: The next financing is supported once the company exits seed with 5 production programs, one repeatable expansion motion, and proof that deployments stay under 10 weeks.
sanityChecks:
  ruleOf40: Y3 growth 83.8% plus EBITDA margin -21.6% = 62.2%.
  burnMultiple: Y2 burn multiple is about 0.9x on roughly $900.0K of net-new ARR; Y3 is about 0.8x because two late-stage pilots have not fully converted yet.
  revenuePerFte: $213.1K Y3 using $2344.2K revenue against 11 Q4Y3 FTE, near the low end of the $200K-$400K workflow-software benchmark.
  flags:
  - The model assumes pharma buyers fund a neutral packet-governance layer now instead of waiting for Benchling, Dotmatics, or SandboxAQ to extend their stack.
  - Revenue per FTE only clears the low end of software benchmarks by Y3, so any extra services work or early hiring can meaningfully worsen burn efficiency.
  - The base case ends Y3 with 2 live pilots still converting, so next-round quality depends on maintaining the modeled pilot-to-production cadence.
  - Gross margin can slip quickly if validation packages, CRO exports, or data-mapping work remain bespoke account by account.
