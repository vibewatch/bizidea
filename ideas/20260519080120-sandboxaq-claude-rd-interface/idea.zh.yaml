jobsToBeDone:
- job: 当每周的 hit-to-lead 评审需要把模型输出转成 assay 请求时，帮转化药理负责人产出一份可复现的建议实验包，让他们不用再追着模型专家跑，也能批准下一步实验。
  currentAlternative: 由计算化学专家手工拼出的 PowerPoint 摘要，再加邮件往返的实验台备注
  successMetric: 从模型查询到 assay 请求获批的时间，从按天计压到按小时计
- job: 当发现信息学团队开始铺开可由 Claude 调用的科研模型时，帮他们把获批模板和评审链路卡进系统，这样用量扩大时也不会把治理风险一起放大。
  currentAlternative: 零散的提示词指南文档加人工收集审计材料
  successMetric: 带完整溯源记录的受控模型决策占比超过 90%
