problem: 通过 Claude 查询定量药物发现模型已经越来越容易，但大多数药企团队还没法把这些输出安全地用进真实实验规划。随着更多科学家可以直接用自然语言索取模型建议，实验室会遇到一种新的失效模式：提示不可复现、隐含假设没人说清、模型输出交到 assay 设计或 CRO 指令时层层失真。现有 ELN、LIMS 和模型厂商要么只做事后记录，要么只开放单一模型家族，都补不上自然语言科研工作流里的受控决策层。
targetUser:
  primary: 大型药企里的转化药理和药物化学科学家；他们需要模型支持的下一步建议，但不想自己写代码。
  secondary: 负责科研软件准入、模型访问和可审计性的发现信息学团队。
  buyer: 发现信息学负责人或计算化学副总裁
startupThesis:
  nonObviousInsight: MCP 原生接入不只是把科学模型普及给更多人，它真正转移的是瓶颈：卡点从模型访问，变成可复现性和信任。一旦非专业用户也能在 Claude 里调用前沿定量模型，稀缺资产就不再是模型本身，而是那层能把开放式提问收束成可审阅、受 SOP 约束实验决策的工作流。
  beachhead: 首个滩头市场，是全球前 30 大药企里做小分子 hit-to-lead 的团队：它们已经采购外部定量模型，却仍要靠少数计算专家把效价和细胞模型输出翻成湿实验 assay 计划。
  wedge: 切口是一个原生跑在 Claude 里的实验包生成器：把提示词、数据集、模型版本、假设和评审签字都收进来，再把模型输出改写成可直接用于效价排序和下一步实验规划的建议。
  whyNowCatalyst: SandboxAQ 接入 Claude 说明，定量模型正从专家专用工具走向主流 LLM 界面，市场会立刻需要一层控制机制，把这些输出真正变成可用于研发决策的东西。
  ventureScalePath: 先从效价和细胞模型工作流切入，再往 ADME、安全性、制剂、材料和催化剂项目扩，这家公司有机会变成企业级科研研发里“模型到实验决策”的系统记录层。
solution: 产品通过一个面向科研工作流构建的 MCP 控制平面，把 Claude 接到获批的内外部定量模型上。科学家依然可以用自然语言提问，但每条工作流都会被 assay 模板、参数边界、必填控制项和底层证据引用收紧。软件会记录提示历史、数据集、模型版本和不确定性备注，再把结果整理成实验台团队或 CRO 真能执行的实验简报。它还会横向比较不同模型版本的输出，并在建议依赖越界假设或缺少验证时发出提示。第一版产品聚焦 hit-to-lead 项目的效价排序和下一步实验规划，因为这里每一次交接出错，都会白白损失几周 assay 时间。
goToMarketSeed:
  firstCustomer: 首个客户应该是全球前 30 大药企中的一个发现项目：团队里有 10–30 名药物化学和转化药理科学家，每周开 hit-to-lead 评审会，并把 assay 执行外包给一个或多个 CRO。
  buyingTrigger: 团队一旦开始使用可从 Claude 调用的定量模型，就会突然需要可复现的模型输出，来支撑每周的化合物优先级决策。
  currentAlternative: 目前的替代方案，是分析师人工居中协调，再配上计算化学专家维护的 PowerPoint 摘要、ELN 记录和定制脚本。
  switchingReason: 这个切口一边替团队省下稀缺专家时间，一边给实验台负责人和信息学负责人一份能审、能共享、也能跨内部团队和 CRO 留痕的实验包。
  pricingHypothesis: 定价假设是按活跃发现项目收取年度平台订阅费，再叠加受控模型运行次数和导出实验包的按量收费。
