differentiator: SandboxAQ 及类似厂商卖的是模型访问，现有实验室软件记录的是下游结果；这家公司卡住的正是中间缺掉的那一层：把自然语言模型会话受控地转成可执行实验包。因为它既不押注单一模型、又按具体工作流设计，所以能同时挂在内部模型、外部模型和未来更多 MCP 端点之上，而不是赌某一套科研模型栈。时间拉长后，它真正沉淀下来的私有资产会是获批 assay 模板库、评审策略，以及模型到结果的追踪数据——这些东西，才会让科学 AI 真正在企业级研发里跑起来。
