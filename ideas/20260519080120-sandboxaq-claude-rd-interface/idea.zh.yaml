topRisks:
- name: 平台下场侵蚀
  description: 科研模型厂商或 Claude 平台方，自己就可能补上基础溯源和工作流打包能力。
  mitigation: 先把中立审批、跨厂商比较和 CRO 交接工作流做深——这些都不是单一模型厂商天然拥有的地盘。
- name: 验证周期过长
  description: 药企团队可能需要几个月的影子模式证据，才肯让新层进入 assay 规划。
  mitigation: 先在一条效价排序工作流上落地，用历史项目做基准比对，先证明周期缩短，再谈更大范围 rollout。
- name: 科研责任风险
  description: 在高风险研发环境里，只要一次建议失误或模型输出边界没卡住，信任就会很快崩。
  mitigation: 保留人工审批闸门，显式暴露不确定性和来源溯源；一旦输入超出验证范围，就直接拦截实验包导出。
