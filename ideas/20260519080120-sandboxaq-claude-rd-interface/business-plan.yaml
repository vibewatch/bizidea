slug: assay-packet-copilot
date: 2026-05-19
executiveSummary: >-
  This company should be built as a governed experiment-packet layer for
  large-pharma hit-to-lead teams that are starting to use Claude-accessible
  quantitative models in weekly compound-prioritization work. The first user is
  a translational pharmacology or medicinal chemistry lead who wants model-backed
  next-step recommendations without waiting on a computational specialist. The
  economic buyer is the Head of Discovery Informatics or VP Computational
  Chemistry because the purchase touches validation, model access policy, and CRO
  handoff. The MVP should not try to replace Benchling, Dotmatics, LIMS, or the
  upstream model vendor; it should capture external Claude sessions, enforce
  approved assay templates, and export reviewer-signed packets that a bench team
  or CRO can execute. The best wedge is U.S.-led small-molecule potency-ranking
  and next-experiment planning inside top-30 pharma because the workflow repeats
  weekly, the handoff pain is visible, and the validation surface is narrower
  than broader scientific AI governance. Research supports real demand for
  traceability and workflow control, but it does not yet prove buyers will fund a
  neutral layer before waiting for Benchling, Dotmatics, or SandboxAQ to extend
  their products. The company can win if it becomes the fastest path from
  free-form model query to audit-ready assay packet across mixed model stacks,
  then compounds into packet templates, review policies, and packet-to-outcome
  traces. The board-level question is whether early pilots show enough cycle-time
  reduction and specialist-time savings to create budget pull before incumbents
  close the gap.
problem:
  - As Claude and MCP expose quantitative models to more scientists, weekly hit-to-lead decisions create irreproducible prompts, hidden assumptions, and manual packet prep before anyone can approve an assay request.
  - Discovery informatics teams must govern model-backed recommendations across external sessions, multiple model vendors, and CRO handoffs, but ELNs and model vendors mostly capture records inside their own stack after the fact.
  - Each bad handoff can cost weeks of assay time and erode trust in scientific AI, so buyers need reviewability before they need broader automation.
solution:
  - Capture Claude session context, approved datasets, model version, assumptions, and reviewer sign-off in assay-specific packet templates for potency ranking and next-experiment planning.
  - Export an execution-ready experiment brief for internal labs or CRO partners while blocking packet generation when data, parameter bounds, or provenance are incomplete.
  - Compare outputs across model versions and surface out-of-domain warnings so informatics leaders can scale model access without surrendering control.
whyWeWin:
  - The wedge is model-neutral governance between Claude sessions and the experiment record, not another model vendor or ELN replacement.
  - The buying trigger is specific: once a team enables Claude-accessible scientific models, review meetings generate more model-backed recommendations than specialists can manually document.
  - Wet-lab and CRO handoffs create measurable ROI through faster packet preparation, lower specialist mediation, and fewer review loops.
  - Reusable packet templates, reviewer policies, and packet-to-outcome traces can compound into switching costs if the startup lands early reference programs.
strategicChoices:
  beachhead: U.S.-based small-molecule hit-to-lead teams inside top-30 pharma companies that already use external quantitative models and outsource meaningful assay execution to CRO partners.
  wedgeRationale: This slice has a weekly decision cadence, high-cost downstream experiments, and a clear informatics buyer who feels the governance pain as soon as model access broadens beyond specialists. It creates faster proof than a broad scientific-AI governance product because one packet type, one buyer, and one ROI story can be validated first.
  sequencingRationale: Start with potency-ranking and next-experiment packets because they sit closest to a concrete approval event and can be sold as an overlay on existing ELN and model stacks. Only after the company proves pilot-to-production conversion should it add adjacent workflows, deeper system-of-record integrations, and broader geographic rollout, keeping product scope, sales motion, hiring, and compliance burden aligned.
  notYet:
    - Materials science and catalyst workflows before pharma proof exists
    - ADME, safety, and developability modules before potency and cell-model packet templates are repeatable
    - Full ELN, LIMS, or model-vendor replacement
    - EU-first expansion before the U.S. design-partner playbook and traceability controls are proven
market:
  tam: Modeled TAM of about $360.0M based on roughly 150 large biopharma and adjacent discovery organizations, about 8 AI-exposed programs each, and an estimated $300k annual ACV per governed program.
  sam: Modeled SAM of about $45.0M for top-30 pharma accounts with roughly 5 reachable small-molecule hit-to-lead programs per company that already depend on external models or heavy CRO handoffs.
  som: Modeled year-3 SOM of about $4.5M assuming 5 enterprise customers and about 3 live governed programs per customer at roughly $300k ACV.
  segments:
    - Top-30 pharma hit-to-lead teams running potency-ranking and next-experiment reviews
    - Discovery informatics groups standardizing scientific AI governance across multiple R&D programs
  buyingProcess: Evaluation likely starts when a discovery program enables Claude-accessible models and weekly review meetings begin generating model-backed recommendations faster than specialists can document them. The Head of Discovery Informatics or VP Computational Chemistry signs once the product can fit into existing validation and CRO handoff workflows and show a credible path to faster approvals with cleaner provenance.
product:
  mvp: Concierge-assisted control plane for one hit-to-lead program that captures Claude sessions, enforces potency or cell-model packet templates, records signature-linked approvals, and exports CRO-ready packets into existing review workflows. Human approval remains mandatory for every packet and the product acts as an overlay rather than replacing ELN or LIMS systems.
  sixMonth: Ship the first production MVP for potency-ranking and next-experiment packet generation with dataset references, model-version tracking, out-of-domain warnings, and export formats usable by internal labs and CRO partners.
  twelveMonth: Add a reusable packet-template library for potency and cell-model workflows, cross-model comparison, approval dashboards, and evidence packs that quantify prep-time reduction, packet completeness, and reviewer throughput across the first several programs.
  twentyFourMonth: Expand into adjacent discovery workflows such as ADME and developability, deeper ELN and LIMS integrations, and portfolio views that benchmark packet quality and downstream assay outcomes across programs.
  keyBets:
    - Potency-ranking and next-experiment planning are the narrowest workflows with enough frequency and pain to support a repeatable product.
    - Buyers will accept an overlay with human approval faster than they will accept a broader autonomous scientific agent.
    - Packet generation can remove most manual documentation burden without weakening scientific judgment or auditability.
    - Cross-program packet templates and outcome traces become more defensible than a one-off services workflow.
gtm:
  wedge: Sell the company as the control layer that lets top-30 pharma teams use Claude-accessible quantitative models in weekly hit-to-lead decisions without adding governance debt or manual packet assembly.
  channels:
    - Founder-led enterprise sales to Heads of Discovery Informatics, VP Computational Chemistry, and translational pharmacology leaders
    - Design-partner deployments inside one live hit-to-lead program with weekly review meetings
    - Upstream model-vendor and Claude ecosystem introductions where downstream operationalization is missing
    - CRO and assay-operations partner referrals tied to packet export and handoff pain
  funnelTargets: "Target account to qualified buyer 20%+, qualified buyer to paid pilot 25%+, paid pilot to production program 50%+, first program to second-program expansion 40%+ within 12 months"
  pricing: Annual subscription priced per live discovery program with a paid implementation and validation package, plus usage-based fees for governed model runs or packet exports at higher volumes. This fits the buyer's value equation because it replaces specialist mediation and manual packet preparation at the program workflow level rather than selling another end-user seat.
businessModel:
  revenueStreams:
    - Annual software subscription per governed discovery program
    - Implementation and validation fees for packet-template setup and workflow mapping
    - Usage-based fees for governed model runs and packet exports above contracted baseline volume
    - Premium portfolio analytics and additional workflow modules for repeat enterprise customers
  unitOfValue: Live discovery program with approved packet templates, governed model sessions, and production handoff workflows
  targetGrossMarginPct: 72
  expansionLevers:
    - Additional hit-to-lead and adjacent preclinical programs within the same pharma account
    - Expansion from potency and cell-model packets into ADME, developability, and safety workflows
    - Premium cross-model comparison and packet-to-outcome analytics modules
    - Partner-led distribution through model vendors, scientific consultancies, and CRO integrations
strategyMap:
  northStarMetric: Number of approved model-backed experiment packets that convert into executed assays with full provenance and no manual rework
  inputMetrics:
    - Median hours from model query to reviewer-approved packet
    - Percentage of packets accepted at first review without missing provenance fields
    - Specialist hours removed from weekly review preparation per active program
    - Paid pilot to production-program conversion rate
    - Percentage of production customers adding a second governed program within 12 months
  moatsToBuild:
    - Library of approved assay templates, parameter bounds, and review policies mapped to real hit-to-lead workflows
    - Packet-to-outcome dataset linking prompts, models, assumptions, and downstream assay results
    - Embedded approval and CRO-handoff workflows that sit across mixed model vendors and record systems
  killCriteria:
    - Fewer than 3 of the first 10 target pharma accounts agree to fund a paid pilot in the current budget cycle
    - The first 3 paid pilots fail to cut packet-preparation time by at least 50% versus the team's current manual process
    - Pilot-to-production conversion stays below 40% after the first 5 paid deployments
    - More than half of serious prospects insist the need should wait for an incumbent ELN or model vendor release
  mermaid: |
    flowchart LR
      Wedge[Hit-to-lead packet wedge] --> MVP[Governed Claude session to packet MVP]
      MVP --> Proof[Faster approvals and cleaner CRO handoffs]
      Proof --> Expansion[Multi-workflow scientific AI control layer]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong workflow wedge and buyer pain, but conviction stays limited until a neutral packet layer proves separate budget pull against incumbents.
    whyBelieve: The company targets a concrete operating failure between model output and assay execution where reviewability, provenance, and CRO handoff quality matter more than adding another frontier model.
    whyDoubt: Incumbent ELN, workflow, and model vendors may add enough packetization and traceability to slow adoption before the startup wins reference accounts.
    nextDiligence: The next proof point is 2 to 3 paid top-pharma pilots that show materially faster packet approval, lower specialist load, and at least one conversion into a production program.
  firstCustomer:
    title: Head of Discovery Informatics sponsoring one small-molecule hit-to-lead design-partner program
    profile: Top-30 pharma team with 10 to 30 medicinal chemistry and translational pharmacology scientists, active external model usage, and recurring CRO assay handoffs from weekly review meetings.
    trigger: Claude-accessible quantitative models are enabled for a live program and review meetings start producing more model-backed recommendations than specialists can package and approve.
    buyer: Head of Discovery Informatics or VP Computational Chemistry
    initialContract: $100k-$150k paid pilot for one governed hit-to-lead workflow and packet-template setup, converting to a $250k-$400k annual program subscription once the team uses production packets in weekly reviews and CRO handoffs.
  mustBeTrue:
    - At least 3 of the first 10 target pharma accounts treat external-Claude packet governance as a budgetable problem this year.
    - The first 3 pilots cut packet-preparation time by at least 50% without increasing scientific rework.
    - More than 80% of packet fields can be auto-generated from session and model context with less than 15 minutes of reviewer edits.
    - At least 2 early pilots convert into annual production contracts of $250k or more within 6 months of pilot completion.
    - At least one production customer expands to a second program or adjacent workflow within 12 months.
  diligenceQuestions:
    - Will discovery informatics leaders buy a neutral packet layer now or wait for Benchling, Dotmatics, or SandboxAQ to extend their stack?
    - Is potency-ranking and next-experiment planning the best first workflow, or does another packet type convert faster with buyers?
    - What KPI opens budget first in practice: specialist-time savings, cycle-time reduction, packet completeness, or compliance posture?
    - How much manual review must remain for buyers to trust the system in assay-planning decisions?
    - Can the company secure enough rights to build packet-to-outcome benchmarks without triggering IP or data-sharing objections?
operatingAssumptions:
  - assumption: Discovery informatics leaders will fund a neutral control layer before waiting for incumbent ELN or model vendors to close the feature gap.
    basis: research.yaml
    validationTest: Interview 15 target buyers and secure at least 3 paid pilots where the commercial sponsor is the informatics or computational chemistry leader rather than a free design partner.
    decisionImpact: If false, the company should shift toward partner distribution, white-label packaging, or a services-led attach sale inside incumbent workflows.
  - assumption: Potency-ranking and next-experiment planning are the best first workflows because they combine repeat frequency, visible handoff pain, and a bounded validation surface.
    basis: research.yaml
    validationTest: Compare 3 workflow candidates with one design partner and confirm potency or cell-model packets generate the shortest path to paid deployment and measurable ROI.
    decisionImpact: If false, the roadmap should move the beachhead to the workflow with the strongest repeatability and buyer urgency rather than preserving the original wedge.
  - assumption: Buyers will pay roughly $250k-$400k annualized per governed program if the product removes specialist mediation and manual packet assembly.
    basis: research.yaml
    validationTest: Convert 2 pilots into annual contracts at or above $250k while buyers cite cycle-time reduction and governance value as the reason.
    decisionImpact: If false, the company likely needs lower-cost packaging, heavier services, or a broader platform story to support venture returns.
  - assumption: Packet generation can auto-fill most provenance and workflow fields from session context without creating extra documentation work for scientists.
    basis: operator judgment
    validationTest: In the first 2 pilots, measure whether more than 80% of packet fields are prefilled and median reviewer edit time stays below 15 minutes.
    decisionImpact: If false, adoption friction rises and the product should narrow scope or invest more deeply in workflow capture and integrations before scaling sales.
  - assumption: Mixed-stack integration can remain an overlay and deploy in under 10 weeks without forcing ELN or LIMS replacement.
    basis: idea.yaml
    validationTest: Complete the first 3 deployments with one packet export path, one approval workflow, and fewer than 4 weeks of customer-specific engineering per account.
    decisionImpact: If false, implementation burden will lengthen sales cycles and the company should narrow ICP, raise more capital, or rely more on partners.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 discovery informatics, computational chemistry, and translational pharmacology leaders at top-30 pharma targets.
    hypothesis: External-Claude packet governance is a current budgetable pain tied to model rollout and weekly review workflows.
    successMetric: At least 8 buyers rank the problem in their top three near-term workflow priorities and at least 3 agree to scope a paid pilot.
    owner: Founder / CEO
  - horizon: 0–90 days
    experiment: Shadow one live hit-to-lead weekly review cycle and manually generate a packet prototype from the team's current artifacts.
    hypothesis: Packet prep time, provenance gaps, and CRO-handoff friction are visible enough to support a narrow ROI story.
    successMetric: Document a baseline process that takes at least one business day of manual preparation and identify 5 or more recurring packet fields that can be templatized.
    owner: Scientific workflow lead
  - horizon: 90–180 days
    experiment: Close 2 paid pilot deployments for potency-ranking and next-experiment packet generation.
    hypothesis: Buyers will pay before full automation exists if the product fits existing approval workflows and keeps humans in the loop.
    successMetric: Two paid pilots at or above $100k each with a defined production conversion path and no requirement to replace incumbent ELN systems.
    owner: Founder / CEO
  - horizon: 90–180 days
    experiment: Validate one CRO export integration and one approval-signature workflow with a design partner.
    hypothesis: The startup can own the packet layer without being forced to become the system of record.
    successMetric: One pilot account accepts production use of exported packets and review logs without a critical QA or audit blocker.
    owner: Founding eng
  - horizon: 180–365 days
    experiment: Measure cycle-time reduction, packet completeness, and specialist hours saved across the first paid pilots.
    hypothesis: Operational ROI is strong enough to convert pilots into annual program subscriptions before broader outcome data accrues.
    successMetric: At least 50% lower packet-preparation time, at least 90% packet completeness at first review, and one pilot-to-production conversion.
    owner: Solutions architect
operations:
  - Standard packet-template authoring process with explicit parameter bounds, required evidence fields, and approval steps for each supported assay workflow
  - Validation and QA package covering audit trails, signature meaning, record retention, and model-version traceability for each deployment
  - Weekly implementation cadence with informatics, scientific leads, and CRO-facing operators during pilot rollout
  - Controlled integration layer for Claude sessions, approved model endpoints, and structured packet exports into customer record systems
  - Customer success playbook that measures prep-time reduction, reviewer throughput, and production conversion at the program level
team:
  - role: Founder / CEO
    startTiming: Month 0
    rationale: Founder-led selling is required because the first deals depend on buyer discovery, packaging, and partner trust more than scaled demand generation.
  - role: Founding eng
    startTiming: Month 0
    rationale: The core technical risk is reliable session capture, provenance enforcement, approval logging, and repeatable export into mixed enterprise systems.
  - role: Scientific workflow lead
    startTiming: Month 0
    rationale: The product must encode assay-specific templates and reviewer logic that match real hit-to-lead decision workflows rather than generic AI governance theory.
  - role: Solutions architect
    startTiming: Month 4
    rationale: Enterprise pilots need someone who can translate customer record systems, CRO handoffs, and validation needs into standard deployment patterns.
  - role: Quality and compliance lead
    startTiming: Month 9
    rationale: As pilots move into production, the company needs dedicated ownership of validation artifacts, traceability controls, and audit-readiness posture.
milestones:
  - horizon: 0–12 months
    items:
      - Land 2 paid design-partner pilots inside top-30 pharma hit-to-lead programs
      - Ship production MVP for potency-ranking and next-experiment packet generation with approval logs and CRO-ready export
      - Prove at least 50% reduction in packet-preparation time in one live weekly review workflow
      - Establish a repeatable validation package that passes customer QA and informatics review in pilot deployments
  - horizon: 12–24 months
    items:
      - Convert at least 2 pilot accounts into annual production contracts and expand one account to a second governed program
      - Add reusable cell-model templates, cross-model comparison, and portfolio reporting across the first customer base
      - Formalize one CRO or scientific-services integration path that reduces manual packet reformatting
      - Build a reference implementation playbook that keeps deployment under 10 weeks for new accounts
  - horizon: 24–36 months
    items:
      - Expand into adjacent workflows such as ADME or developability after proving the initial potency wedge
      - Build packet-to-outcome benchmarks across multiple customers to strengthen retention and pricing power
      - Enter broader U.S. and selected EU pharma deployments once the traceability and validation posture is mature
      - Establish partner-led distribution through model vendors or scientific workflow consultancies
risks:
  - risk: Incumbent ELN or model vendors add enough packetization and traceability to narrow the standalone wedge.
    likelihood: High
    impact: High
    mitigation: Differentiate on neutrality across external sessions and model vendors, faster deployment, and deeper workflow-specific packet templates.
  - risk: Pharma validation and procurement cycles delay pilots long enough to starve learning and revenue.
    likelihood: High
    impact: High
    mitigation: Start in shadow mode, keep human approval mandatory, and sell into one live program with a narrow workflow and clear operational ROI.
  - risk: Scientists reject the product if packet generation feels like extra documentation work.
    likelihood: Medium
    impact: High
    mitigation: Auto-fill packet fields from session context, measure edit time explicitly, and cut scope until the workflow is faster than the current manual process.
  - risk: Poor source data or out-of-domain model output undermines trust in the packet regardless of the governance layer.
    likelihood: Medium
    impact: High
    mitigation: Require dataset references, parameter bounds, and uncertainty warnings in every packet and block export when evidence is incomplete.
  - risk: The beachhead is too narrow to support venture-scale growth if adjacent workflows do not open after early proof.
    likelihood: Medium
    impact: Medium
    mitigation: Treat potency workflows as a proof wedge, but test expansion pull into cell models and adjacent preclinical packets within the first 18 months.
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of product build, quality and compliance work, 2 to 3 top-pharma design-partner deployments, and founder-led enterprise sales to prove pilot-to-production conversion in the initial beachhead.
