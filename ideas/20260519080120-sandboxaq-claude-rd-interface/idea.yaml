problem: >-
  Quantitative drug-discovery models are becoming easy to query through Claude, but most pharma teams still cannot use
  those outputs safely in real experiment planning. Once more scientists can ask for model recommendations in plain
  English, labs face a new failure mode: irreproducible prompts, hidden assumptions, and weak handoffs from model output
  into assay design or CRO instructions. Existing ELNs, LIMS, and model vendors either record work after the fact or
  expose one model family, but they do not provide a governed decision layer across natural-language scientific workflows.
targetUser:
  primary: Translational pharmacology and medicinal chemistry scientists at large pharma companies who need model-backed next-step recommendations without writing code.
  secondary: Discovery informatics teams responsible for approved scientific software, model access, and auditability.
  buyer: Head of Discovery Informatics or VP Computational Chemistry
startupThesis:
  nonObviousInsight: >-
    MCP-native access does not just democratize scientific models; it shifts the bottleneck to reproducibility and trust.
    As soon as non-specialists can invoke frontier quantitative models from Claude, the scarce asset is no longer model
    access but a workflow layer that turns free-form queries into reviewable, SOP-bound experiment decisions.
  beachhead: >-
    Small-molecule hit-to-lead teams at top-30 pharma companies that already license external quantitative models but
    still depend on a handful of computational specialists to turn potency and cell-model outputs into wet-lab assay
    plans.
  wedge: >-
    A Claude-native experiment packet builder that captures prompt, dataset, model version, assumptions, and reviewer
    sign-off, then converts model outputs into assay-ready recommendations for potency-ranking and next-experiment
    planning.
  whyNowCatalyst: >-
    SandboxAQ's Claude launch shows that quantitative models are moving from specialist tooling into a mainstream LLM
    interface, creating immediate demand for controls that make those outputs usable in real R&D decisions.
  ventureScalePath: >-
    Starting with potency and cell-model workflows, the company can expand into ADME, safety, formulation, materials, and
    catalyst programs, becoming the system of record for model-to-experiment decisions across enterprise scientific R&D.
solution: >-
  The product connects Claude to approved internal and external quantitative models through an MCP control plane built for
  scientific workflows. Scientists can ask natural-language questions, but each workflow is constrained by assay-specific
  templates, parameter bounds, required controls, and citation of the underlying evidence. The software records prompt
  history, datasets, model versions, and uncertainty notes, then packages the result into an experiment brief a bench
  team or CRO can actually execute. It also compares outputs across model versions and flags when a recommendation relies
  on out-of-domain assumptions or missing validation. The initial product focuses on potency ranking and next-experiment
  planning for hit-to-lead programs where each bad handoff costs weeks of assay time.
goToMarketSeed:
  firstCustomer: >-
    A top-30 pharma discovery program with 10-30 medicinal chemistry and translational pharmacology scientists running
    weekly hit-to-lead review meetings and outsourcing assay execution to one or more CRO partners.
  buyingTrigger: A team adopts Claude-accessible quantitative models and suddenly needs reproducible model outputs for weekly compound-prioritization decisions.
  currentAlternative: Manual analyst mediation plus PowerPoint summaries, ELN notes, and bespoke scripts maintained by computational chemistry specialists.
  switchingReason: >-
    The wedge saves scarce specialist time while giving bench and informatics leaders a reviewable experiment packet they
    can trust, share, and audit across internal teams and CROs.
  pricingHypothesis: Annual platform subscription priced by active discovery program plus usage-based fees for governed model runs and exported experiment packets.
