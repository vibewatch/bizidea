differentiator: >-
  SandboxAQ and similar vendors sell model access, while incumbent lab software stores downstream records; this company
  owns the missing layer in between: governed conversion of natural-language model sessions into executable experiment
  packets. Because it is model-neutral and workflow-specific, it can sit across internal models, vendor models, and
  future MCP endpoints instead of betting on one scientific model stack. Over time, its proprietary asset becomes the
  library of approved assay templates, review policies, and model-to-outcome traces that make scientific AI usable at
  enterprise scale.
