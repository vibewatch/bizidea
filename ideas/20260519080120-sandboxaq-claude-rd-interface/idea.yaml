topRisks:
  - name: Platform encroachment
    description: Scientific model vendors or Claude platform providers could add basic provenance and workflow packaging themselves.
    mitigation: Start with model-neutral approvals, cross-vendor comparisons, and CRO handoff workflows that single-model vendors do not own.
  - name: Slow validation cycles
    description: Pharma teams may require months of shadow-mode evidence before trusting a new layer in assay planning.
    mitigation: Launch on one potency-ranking workflow, benchmark against historical campaigns, and prove cycle-time reduction before broader rollout.
  - name: Scientific liability
    description: A bad recommendation or poorly bounded model output could undermine trust quickly in a high-stakes R&D environment.
    mitigation: Keep a human approval gate, expose uncertainty and source provenance, and block packet export when inputs fall outside validated ranges.
