topRisks:
  - name: Framework bundling by incumbents
    description: Drata, Vanta, or enterprise GRC suites could add ISO 42001 templates and compress the feature gap.
    mitigation: Focus on AI-vendor-specific control mapping, procurement trust rooms, and counsel-auditor collaboration workflows that generic tools do not own.
  - name: Standards volatility
    description: AI governance expectations may shift faster than certification bodies and customers converge on stable evidence requirements.
    mitigation: Build the product around reusable control primitives and source-linked narratives so new standards can be added without rebuilding customer workflows.
  - name: Services-heavy onboarding
    description: Early customers may expect white-glove compliance consulting, hurting software margins and implementation speed.
    mitigation: Productize onboarding around partner-led templates, bounded integrations, and paid expert packages delivered through audit and legal partners.
