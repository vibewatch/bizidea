jobsToBeDone:
  - job: When a regulated-enterprise pilot is moving into production, help the AI vendor's security lead prove control coverage across multiple standards so they can unblock procurement and deployment.
    currentAlternative: Drata or Vanta exports plus spreadsheets, consultants, and manually assembled evidence folders.
    successMetric: Days from buyer questionnaire or audit kickoff to approved production launch.
  - job: When product or model changes occur during certification prep, help the COO and counsel understand which controls and narratives changed so they can avoid rework and failed audits.
    currentAlternative: Manual change logs, Notion pages, and consultant-led status trackers.
    successMetric: Reduction in duplicated evidence requests and audit findings per certification cycle.
