problem: >-
  AI application vendors trying to sell into banks, insurers, and other regulated enterprises hit a
  new bottleneck before revenue scales: they must prove security, governance, and model controls
  across multiple frameworks at once. Generic GRC tools help collect evidence, but they do not
  translate product changes, model usage, and data flows into reusable narratives for SOC 2 Type 2,
  ISO 27001, ISO 42001, and customer due-diligence packets. The result is founders, security leads,
  consultants, and outside counsel recreating the same control story in spreadsheets every time a
  buyer, auditor, or certifier asks.
targetUser:
  primary: Head of Security, COO, or founding GRC lead at a 30-300 employee AI software vendor selling into banks, insurers, and other regulated enterprises in the US and EU.
  secondary: Outside counsel and fractional compliance consultancies that run audit-readiness programs for AI vendors.
  buyer: COO, CTO, or Head of Security sponsoring enterprise trust and certification readiness.
startupThesis:
  nonObviousInsight: >-
    The scarce resource is no longer AI feature velocity; it is the ability to convert changing
    models, vendors, and workflows into defensible control evidence across both classic security
    standards and the new AI-governance layer. Seed-stage AI vendors now need multi-framework trust
    infrastructure years earlier than legacy SaaS companies did because regulated buyers ask for it
    before pilots expand.
  beachhead: >-
    Series A and Series B AI workflow startups with 50-200 employees that are moving their first
    banking or insurance pilots into production while pursuing combined SOC 2 Type 2, ISO 27001,
    and ISO 42001 readiness.
  wedge: >-
    An AI-certification control map that links product architecture, model vendors, data flows,
    policies, and change logs into reusable auditor-ready and buyer-ready evidence packets across
    SOC 2 Type 2, ISO 27001, ISO 42001, and enterprise security questionnaires.
  whyNowCatalyst: >-
    Compuvi's seed-funded push into certifications and US/EU expansion signals that preventive
    compliance has moved from back-office cleanup to a front-line prerequisite for selling AI into
    regulated enterprises.
  ventureScalePath: >-
    Start with AI vendors preparing for their first high-stakes certifications, then expand into
    ongoing third-party assurance, customer trust exchanges, auditor integrations, and eventually a
    network layer where regulated enterprises continuously monitor the compliance posture of their AI
    suppliers.
solution: >-
  The product is a preventive compliance workspace built around a control graph instead of a checklist.
  It ingests architecture docs, model inventories, vendor lists, policies, tickets, and deployment
  changes, then maps each artifact to overlapping controls across SOC 2 Type 2, ISO 27001, ISO
  42001, and buyer questionnaires. It generates gap analyses, evidence requests, and auditor-ready
  narratives that can be reused across frameworks instead of recreated per audit. For sales and
  procurement, it publishes a permissioned trust room with pre-approved answers, citations, and
  legal review notes. Over time, the graph becomes the system of record for how the company proves
  responsible AI operations to customers, certifiers, and counsel.
goToMarketSeed:
  firstCustomer: >-
    A 50-200 employee AI automation startup selling KYC, claims, underwriting, or document
    workflows into mid-market banks and insurers in the US or EU, with its first combined SOC 2
    Type 2, ISO 27001, and ISO 42001 program starting in the next 6 months.
  buyingTrigger: A regulated-enterprise pilot is ready to expand to production and the vendor receives certification requirements or security questionnaires that can block revenue.
  currentAlternative: Spreadsheet-based control trackers layered on top of Drata or Vanta, plus consultants, outside counsel, and ad hoc document folders.
  switchingReason: >-
    The wedge collapses duplicate work across audits and buyer reviews by keeping one cited control
    graph for security, AI governance, and procurement instead of separate projects for each
    framework and customer.
  pricingHypothesis: Annual subscription priced by entity, frameworks in scope, and connected evidence sources, starting around $30k-$80k ARR before audit-support and counsel-collaboration add-ons.
