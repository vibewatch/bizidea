slug: ai-certification-control-map
date: '2026-06-13'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date]'
- id: A2
  name: pre-seed 交割后期初现金
  value: '3000'
  unit: usdK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M]；模型按 $3.0M 交割额测算，以覆盖 Q4Y2 里程碑并留出 6 个月缓冲。'
- id: A3
  name: 起始付费客户数（M1）
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months]'
- id: A4
  name: 客户爬坡
  value: M12 达到 3 家，Q4Y2 达到 15 家，Q4Y3 达到 80 家
  unit: customers
  source: '[BP milestones], [BP market.som], [Research market.som]；基础情景故意低于 120 家客户的 SOM 路径，保持保守。'
- id: A5
  name: 单客户混合定价路径
  value: 试点前几个月年化约 $48K，至 Y3 末混合 ACV 提升到 $66K
  unit: USD/客户/年
  source: '[BP investorMemo.firstCustomer.initialContract], [BP gtm.pricing], [BP market.som ~$65k blended ACV]'
- id: A6
  name: 稳态毛利率目标
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A7
  name: COGS 下降路径
  value: 首个试点月为收入的 45%，到 Y3 降至 30%
  unit: percent of revenue
  source: '[BP strategicChoices.sequencingRationale], [BP operations]，再结合重实施型合规软件产品化的创业财务经验估算。'
- id: A8
  name: 月度客户流失率
  value: '1.5'
  unit: percent
  source: 依据粘性较强、但仍处早期的 B2B 合规基础设施创业财务经验估算。
- id: A9
  name: 混合 CAC
  value: '24'
  unit: usdK per customer
  source: '[BP gtm.funnelTargets], [Research reportMemo.distributionChannels], [BP operatingAssumptions partner channels]，再叠加创始人主导的企业 SaaS 经验假设。'
- id: A10
  name: 创始人 / CEO 全成本薪酬
  value: '180'
  unit: usdK annual
  source: '[BP team Founder/CEO]，再结合 pre-seed 阶段薪酬经验假设。'
- id: A11
  name: 工程全成本薪酬
  value: '175'
  unit: usdK annual
  source: '[BP team Founding eng]，再结合创业期基础设施工程师薪酬经验假设。'
- id: A12
  name: 合规产品负责人全成本薪酬
  value: '160'
  unit: usdK annual
  source: '[BP team Compliance product lead]，再结合 regtech 产品负责人薪酬经验假设。'
- id: A13
  name: 实施 / 解决方案工程师全成本薪酬
  value: '145'
  unit: usdK annual
  source: '[BP team Implementation and solutions engineer]，再结合早期解决方案工程岗位薪酬经验假设。'
- id: A14
  name: 伙伴 / 销售全成本薪酬
  value: '170'
  unit: usdK annual
  source: '[BP team Partnerships lead]，再结合伙伴主导企业 GTM 的薪酬经验假设。'
- id: A15
  name: G&A / 客户成功全成本薪酬
  value: '110'
  unit: usdK annual
  source: 依据精简财务、供应商风险运营和售后覆盖的创业财务经验估算。
- id: A16
  name: 招聘顺序
  value: M4 招产品负责人，M7 招实施，M10 招伙伴负责人，M15 招第二名工程师，M18 招第二名 GTM，M20 招 G&A/客户成功，M27 招第二名实施，M30 招第三名工程师，M33 招第二名 G&A/客户成功
  unit: month index
  source: '[BP team], [BP strategicChoices.sequencingRationale]'
- id: A17
  name: 非薪酬研发支出爬坡
  value: Y1 每月 6K-9K，Y2 每季度 27K-30K，Y3 每季度 33K-39K
  unit: usdK
  source: '[BP product], [BP operations]，再结合云、安全和开发者工具方面的创业财务经验估算。'
- id: A18
  name: 非薪酬销售与市场支出爬坡
  value: Y1 每月 4K-10K，Y2 每季度 24K-42K，Y3 每季度 48K-66K
  unit: usdK
  source: '[BP gtm.channels], [Research reportMemo.distributionChannels]，再结合差旅、活动和内容投入经验估算。'
- id: A19
  name: 非薪酬 G&A 支出爬坡
  value: Y1 每月 8K-10K，Y2 每季度 30K-39K，Y3 每季度 45K-60K
  unit: usdK
  source: '[BP operations], [BP risks]，再结合法务、保险、审计准备和供应商安全方面的经验估算。'
- id: A20
  name: 现金转换政策
  value: 用 EBITDA 近似现金变动
  unit: policy
  source: 创业财务简化假设；未单独建模债务、资本开支或营运资金科目。
- id: A21
  name: 基础销售周期
  value: 4-6 个月
  unit: months
  source: '[BP gtm.funnelTargets], [BP market.buyingProcess], [Research reportMemo.buyingTriggers]'
- id: A22
  name: 到 Q4Y2 的伙伴来源管道占比
  value: '30'
  unit: 合格销售管道占比
  source: '[BP experimentRoadmap co-sell target], [BP milestones active partner relationships], [BP operatingAssumptions partner distribution]'
- id: A23
  name: 收入建模简化处理
  value: 付费就绪项目费用并入单客户混合收入，不单列服务收入线
  unit: policy
  source: '[BP gtm.pricing], [BP investorMemo.firstCustomer.initialContract]；这样能把收入始终和付费客户数挂钩。'
