fundingAsk:
  round: pre-seed
  amountM: 3.0
  runwayMonths: 24
  milestone: 做到 12-15 个年费客户，把交出首份获批证据包的中位时间压到 30 天以内，并让至少 30% 的合格销售管道来自伙伴渠道，同时保留 6 个月缓冲。
  useOfFunds:
  - bucket: 工程
    amountUsd: 1200000
    percentage: 40.0
  - bucket: GTM
    amountUsd: 780000
    percentage: 26.0
  - bucket: G&A
    amountUsd: 360000
    percentage: 12.0
  - bucket: 缓冲（6 个月）
    amountUsd: 660000
    percentage: 22.0
scenarios:
  downside:
    description: 伙伴渠道晚一年才成熟，客户导入也更定制化，所以客户增长落后于计划，毛利率长期带着重服务属性。
    y3RevenueK: 1895.0
    y3EbitdaK: -760.0
    cashLowPointK: 150.0
    keyAssumptionChanges:
    - Q4Y3 客户数不是 80 家，而是停在 55 家。
    - 由于第二套框架扩张落地更晚，混合 ACV 到期末只能接近 $60K，而不是 $66K。
    - 证据映射和评审支持仍然更依赖人工，所以期末毛利率只能做到约 66%。
  base:
    description: 公司把早期的付费合规就绪项目转成年费软件，先完成第 2 年的滩头里程碑，再通过认证机构、审计和律师渠道加速，而不必先养一整支重型企业地面销售团队。
    y3RevenueK: 2730.8
    y3EbitdaK: -217.8
    cashLowPointK: 622.0
    keyAssumptionChanges:
    - 客户数在 M12 达到 3 家、Q4Y2 达到 15 家、Q4Y3 达到 80 家，仍低于计划里 120 家客户的 SOM 上限。
    - 单客户混合收入会从早期试点经济性，逐步收敛到 Y3 末约 $66K 的年化 ACV。
    - 只有当导入模板和边界清晰的集成真正压低人工工作量后，毛利率才会触到 70% 目标。
  upside:
    description: 伙伴转介绍和可复用控制模板比预期更早起效，在大体相同的运营底座上，既拉快了客户增长，也让毛利率扩张更干净。
    y3RevenueK: 3625.0
    y3EbitdaK: 320.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
    - Q4Y3 客户数不是 80 家，而是达到 100 家。
    - 因为更多客户采用第二套框架和买家尽调扩展，混合 ACV 到期末接近 $70K。
    - 由于实施更模板化、伙伴参与更多，期末毛利率可以接近 72%。
sensitivity:
- variable: ARPU
  downsideCase: 期末混合 ACV 只能做到 $60K。
  baseCase: 期末混合 ACV 达到 $66K。
  upsideCase: 期末混合 ACV 达到 $70K。
  y3RevenueImpactK: -330.0
  cashImpactK: -280.0
- variable: CAC
  downsideCase: 由于伙伴获客不及预期，CAC 升到 $32K。
  baseCase: 依靠创始人主导销售和伙伴转介绍，CAC 维持在 $24K。
  upsideCase: 当渠道贡献了三分之一的合格销售管道后，CAC 降到 $18K。
  y3RevenueImpactK: -140.0
  cashImpactK: -230.0
- variable: churn
  downsideCase: 如果试点没能转成更深的工作流使用，月流失率会慢慢漂到 2.2%。
  baseCase: 月流失率维持在 1.5%。
  upsideCase: 一旦客户在产品内把多套框架标准化，月流失率会改善到 1.0%。
  y3RevenueImpactK: -190.0
  cashImpactK: -170.0
- variable: 销售周期
  downsideCase: 如果采购方和外部评审方仍坚持先看导出材料，中位销售周期会拉长到 7-8 个月。
  baseCase: 围绕真实的认证与尽调触发点，中位销售周期为 4-6 个月。
  upsideCase: 如果伙伴能把正在推进中的交易带进来，中位销售周期会压到 3-4 个月。
  y3RevenueImpactK: -420.0
  cashImpactK: -460.0
- variable: 毛利率
  downsideCase: 期末毛利率只能做到 66%。
  baseCase: 期末毛利率达到 70%。
  upsideCase: 期末毛利率达到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -190.0
- variable: 招聘节奏
  downsideCase: 第三名工程师和第二名实施岗位都提前两个季度招进来。
  baseCase: 招聘仍按里程碑闸门推进，整体与团队计划大致一致。
  upsideCase: 后台岗位会更晚才补，直到伙伴来源管道被验证跑顺。
  y3RevenueImpactK: -60.0
  cashImpactK: -250.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Trigger[受监管试点扩张触发点] --> Pilot[付费合规就绪项目]
      Pilot --> Annual[年度软件合同]
      Annual --> Expansion[更多框架与买家工作流]
      Expansion --> Revenue[订阅收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金跑道]
modelSanity:
- checkName: 收入引擎
  finding: 基础情景的收入引擎，是先把少数由创始人卖出的就绪项目转成客户，到 Q4Y2 做出 15 家滩头客户；再把伙伴协助拿下的年度合同放大到 Q4Y3 的 80 家客户。
- checkName: 必须成立
  finding: 公司必须把客户导入压在边界清晰的集成范围内，才能把交出首份获批证据包的中位时间压到 30 天以内，并让 70% 毛利率真正落地。
- checkName: 模型失灵条件
  finding: 如果伙伴渠道失速，销售周期又被拉向 8 个月，下行情景会把现金压到接近 $150K，下一轮融资却还站不稳。
- checkName: 下一轮证明
  finding: 下一轮前必须证明三件事：做到 12-15 个年费客户、让伙伴来源管道有实质规模，以及第二套框架扩张确实能拉升 ACV，而不必额外养一支庞大的地面销售团队。
sanityChecks:
  ruleOf40: Y3 增长 415% + EBITDA 利润率 -8% = 407%（方向上很强，但也被较小的 Y2 基数放大了）。
  burnMultiple: Y2 约为 1.5x，到了 Y3 随着净新增 ARR 跑赢 burn，逐步改善到约 0.1x。
  revenuePerFte: 按 Q4Y3 的 11 名 FTE 计算，Y3 人均收入约 $248K（落在 SaaS 常见的 $200-400K 区间内，但前提是伙伴杠杆真的跑起来）。
  flags:
  - 客户数从 Q4Y2 的 15 家一下跳到 Q4Y3 的 80 家，目标很激进，前提是伙伴主导分发能很快变成可复制动作。
  - 模型只有在部署始终卡在商业计划里描述的边界连接器范围内，才能摸到 70% 毛利率；一旦映射走向定制化，毛利会被压缩。
  - 收入被简化成单客户混合经常性价值，真实会计口径里，早期很可能会呈现更多服务收入，毛利率曲线也会更起伏。
