  pestle:
  - factor: 政治
    impact: negative
    point: 跨境 AI 治理不是由一套统一规则主导，而是被多家监管机构和监督主体共同塑形，这会抬高供应商做映射的成本。
    sourceRefs:
    - 6
    - 8
    - 9
    - 14
  - factor: 经济
    impact: positive
    point: 周边 GRC 和合规市场仍在双位数增长，企业也在继续增加 GRC 预算，为工作流自动化腾出了新增支出。
    sourceRefs:
    - 23
    - 24
    - 25
  - factor: 社会
    impact: positive
    point: 客户、投资人和供应商越来越要求看得见的安全与负责任 AI 证明，信任证据因此成了正常企业销售的一部分。
    sourceRefs:
    - 27
    - 29
  - factor: 技术
    impact: positive
    point: 集成自动化和 AI 辅助答题，让持续抓证据和复用问卷在技术上已经跑得通。
