    - 8
    - 14
  adoptionFrictionMatrix:
  - friction: 在多套框架之间做初始控制映射，本身就复杂且跨团队。
    severity: high
    affectedBuyer: 安全负责人或早期 GRC 负责人
    mitigation: 先拿预先映射好的控制库和伙伴主导导入切入，把首个项目收缩到风险最高的几条工作流。
    sourceRefs:
    - 10
    - 12
    - 16
    - 17
  - friction: 来自工程与云系统的证据质量参差不齐。
    severity: high
    affectedBuyer: CTO 或平台团队
    mitigation: 优先接云、身份、代码和工单系统，并在证据对外复用前保留人工审批。
    sourceRefs:
    - 28
    - 32
    - 37
  - friction: 法务和采购团队可能不信任生成式叙事。
    severity: medium
    affectedBuyer: COO 和外部律师
    mitigation: 不要走自由生成路线，而是用带引用的输出、评审工作流和不可篡改的来源历史来建立信任。
    sourceRefs:
    - 1
    - 19
    - 21
    - 37
  - friction: 框架和监管预期还在变。
    severity: medium
    affectedBuyer: COO
    mitigation: 把控制项建成可复用原语，并持续维护对照映射，让新增义务可以叠上来，而不是把整套证据库推倒重来。
    sourceRefs:
    - 6
    - 12
    - 33
