competitors:
- name: Vanta
  stage: scale-up
  wedge: 宽泛的合规自动化平台，覆盖 ISO 42001、实时控制监测、集成和统一仪表盘。
  pricing: 定制定价；本次抓取到的产品页没有公开价目表。
  strength: 自动化能力强、集成叙事密，而且从安全合规往 AI 治理延伸的路径很顺。
  weaknessVsUs: 平台框架偏宽，仍给更聚焦 AI 供应商的产品留了位置——后者可以把模型、法务和买家证据编进同一张带引用的图。
  sourceRefs:
  - 28
  - 29
  - 30
- name: Secureframe
  stage: scale-up
  wedge: 端到端合规平台，覆盖 ISO 42001 指导、持续监测和结构化导入。
  pricing: 定制定价；抓取页面没有公开报价。
  strength: 端到端合规价值主张清楚，也明确补了 ISO 42001 教育层。
  weaknessVsUs: 对采购信任资料室工作流，以及律师与买家尽调之间可复用的 AI 专属叙事，掌控并不够明确。
  sourceRefs:
  - 32
  - 33
- name: Sprinto
  stage: scale-up
  wedge: 把合规、信任中心和安全问卷工作流打包在一起的自动化信任平台。
  pricing: 定制定价；抓取页面没有公开报价。
  strength: 比多数合规厂商更靠近问卷这段下游工作流。
  weaknessVsUs: 当前对外定位仍是宽泛的信任自动化，而不是深度的 AI 治理操作系统。
  sourceRefs:
  - 34
- name: OneTrust
  stage: incumbent
  wedge: 覆盖 50+ 标准、法规和框架的企业级合规自动化平台。
  pricing: 企业定制定价；抓取页面没有公开报价。
  strength: 企业级覆盖面广，又紧邻隐私、风险和治理预算中心。
  weaknessVsUs: 对一家 50-200 人的 AI 供应商来说，它大概率又重又宽，不适合只为更快拿证和复用买家证明而买。
  sourceRefs:
  - 23
  - 35
- name: Whistic
  stage: scale-up
  wedge: 面向第三方风险工作流的 AI 驱动供应商评估、持续监测和信任中心交换平台。
  pricing: 定制定价；抓取页面没有公开报价。
  strength: 非常贴合买家评审这一段流程，也明确把信任中心交换当成卖点。
  weaknessVsUs: 它并不把自己定位成认证与 AI 管理体系的系统记录，因此仍依赖上游先在别处把证据生产出来。
  sourceRefs:
  - 20
  - 36
regulatoryTechnicalConstraints:
- point: 一套可审计的 AI 管理体系，不能只是存文档；它必须有足够结构，能把政策、责任归属、风险评估和持续改进讲清楚。
  sourceRefs:
  - 2
  - 4
  - 10
  - 12
- point: 金融行业供应商面临的第三方监管和集中度审查都在变严，这会抬高 ICT 依赖证据的时效性和可归属性要求。
  sourceRefs:
  - 7
  - 8
- point: 数据保护和安全开发指引要求企业把 AI 如何使用个人数据、如何解释决策、以及如何保护生产环境里的 AI 系统，完整记录下来。
  sourceRefs:
  - 14
  - 15
- point: 问卷回答必须始终有证据支撑、且版本可追踪，否则它们不会加速采购和审计，反而会变成新的责任点。
  sourceRefs:
  - 19
  - 20
  - 21
  - 22
validationSignals:
- point: Compuvi 明确把新资金投向 SOC 2 Type 2、ISO 27001 和 ISO 42001，同时扩张美欧销售；这直接说明，信任证明已经成了早期 GTM 基础设施的一部分。
  sourceRefs:
  - 1
- point: 65% 的组织表示，客户、投资人和供应商越来越要求它们拿出合规证明。
  sourceRefs:
  - 27
- point: 46% 的组织称，在合作期间遇到过供应商发生安全事件，这也解释了为什么买家尽调和信任材料会越滚越多。
  sourceRefs:
  - 27
- point: Hyperproof 说 91% 的受访者已经有中心化 GRC 团队，63% 预计 GRC 预算还会增长，说明围绕工作流自动化的预算中心正在成熟。
  sourceRefs:
  - 25
openQuestions:
- 在客户还没有明确强制要求之前，会有多少 A/B 轮 AI 供应商主动去做 ISO 42001？
- 审计师和认证机构会不会把可复用证据图当成首选工作层，还是依旧坚持手工打包材料？
- 外部律师愿不愿意直接在这条工作流里协作，还是只愿意审导出的证据包？
- 现有厂商会多快从泛泛的 AI 治理内容，走到针对产品、模型和数据流的专属控制映射？
