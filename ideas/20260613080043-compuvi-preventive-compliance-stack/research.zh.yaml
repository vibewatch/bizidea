    - 4
    - 19
    - 28
    - 37
  - factor: 法律
    impact: negative
    point: AI Act、DORA、隐私与行业监管一起抬高了面向受监管客户的供应商所需承担的文档与监控义务。
    sourceRefs:
    - 5
