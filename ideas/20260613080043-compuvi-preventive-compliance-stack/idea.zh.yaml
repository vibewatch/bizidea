problem: AI 应用供应商想把产品卖进银行、保险公司等受监管企业，往往还没把收入放大，就先被一道新瓶颈卡住：它们必须同时证明自己在安全、治理和模型控制上符合多套框架。通用 GRC 工具能帮忙收集证据，但没法把产品变更、模型使用和数据流整理成可复用的叙事，去应对 SOC 2 Type 2、ISO 27001、ISO 42001 以及客户尽调材料。结果就是，每次买家、审计师或认证机构一开口，创始人、安全负责人、顾问和外部律师都得在表格里把同一套控制故事再做一遍。
targetUser:
  primary: 主要用户是 30-300 人的 AI 软件供应商里的安全负责人、COO 或早期 GRC 负责人；这些公司正在把产品卖给美欧的银行、保险公司等受监管企业。
  secondary: 次要用户是为 AI 供应商跑审计准备项目的外部律师和兼职合规顾问机构。
  buyer: 买单人通常是 COO、CTO 或安全负责人，目标是把企业信任和认证准备这件事真正推进下去。
startupThesis:
  nonObviousInsight: 现在最稀缺的资源，已经不是 AI 功能迭代速度，而是能不能把不断变化的模型、供应商和工作流，沉淀成既能过传统安全标准、又能过新一层 AI 治理要求的可辩护控制证据。种子期 AI 公司比老一代 SaaS 公司更早需要这套多框架信任基础设施，因为受监管买家在试点扩张前就会先问。
  beachhead: 滩头市场是 50-200 人的 A 轮、B 轮 AI 工作流创业公司：它们正把第一批银行或保险试点推向生产，同时准备把 SOC 2 Type 2、ISO 27001 和 ISO 42001 一起补齐。
  wedge: 切口是一张 AI 认证控制图，把产品架构、模型供应商、数据流、政策和变更日志连成一体，生成可在 SOC 2 Type 2、ISO 27001、ISO 42001 以及企业安全问卷之间复用、且能直接给审计师和买家看的证据包。
  whyNowCatalyst: Compuvi 拿种子轮去冲认证并扩张美欧市场，说明预防式合规已经不是后台收尾工作，而是 AI 卖进受监管企业前线必须先补的一关。
  ventureScalePath: 先拿下第一批要做高风险认证的 AI 供应商，再往持续第三方保障、客户信任交换、审计集成推进，最后做成一层网络：让受监管企业能持续监控自己的 AI 供应商合规状态。
solution: 产品不是围着核对表转，而是围着控制图搭一个预防式合规工作台。它会吃进架构文档、模型清单、供应商列表、政策、工单和部署变更，再把每份材料映射到 SOC 2 Type 2、ISO 27001、ISO 42001 以及买家问卷中重叠的控制项上。系统会生成差距分析、证据请求和可直接给审计师看的叙事；这些内容可以跨框架复用，而不是每次审计都从头写。对销售和采购团队，它会提供一个带权限的信任资料室，里面放好预审过的答案、引用和法务批注。时间一长，这张图就会变成公司向客户、认证机构和律师证明自己在负责任地运营 AI 的系统记录。
goToMarketSeed:
  firstCustomer: 第一类客户应是 50-200 人的 AI 自动化创业公司，向美欧中型银行和保险公司卖 KYC、理赔、核保或文档工作流，而且未来 6 个月内就要启动第一次 SOC 2 Type 2、ISO 27001 和 ISO 42001 联合认证项目。
  buyingTrigger: 当受监管企业试点准备转生产，供应商又收到认证要求或安全问卷，而这些东西足以卡住收入时，购买就会被触发。
  currentAlternative: 现有替代方案通常是叠在 Drata 或 Vanta 之上的表格控制台，再加上顾问、外部律师和临时文档文件夹。
  switchingReason: 这个切口把多套审计和买家评审里的重复活并到一起：公司只要维护一张带引用的控制图，就能同时覆盖安全、AI 治理和采购，而不是每个框架、每个客户都开一个单独项目。
  pricingHypothesis: 定价假设是按法律实体、覆盖框架数量和接入证据源收费，年费起步大约 $30k-$80k ARR；审计支持和律师协作再做附加模块。
