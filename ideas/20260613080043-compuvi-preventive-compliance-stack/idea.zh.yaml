topRisks:
- name: 现有厂商把框架能力打包带走
  description: Drata、Vanta 或企业级 GRC 套件一旦补上 ISO 42001 模板，就可能迅速压缩功能差距。
  mitigation: 把重心压在 AI 供应商专属的控制映射、采购信任资料室，以及律师与审计师协作工作流上——这些不是通用工具天然拥有的。
- name: 标准还在持续变化
  description: AI 治理要求的变化速度，可能快过认证机构和客户对稳定证据要求的收敛速度。
  mitigation: 围绕可复用的控制原语和带来源引用的叙事来搭产品，这样新增标准时不用把客户工作流推倒重来。
- name: 导入过程过于偏服务化
  description: 早期客户可能希望拿到高触达式合规咨询，拖累软件毛利和交付速度。
  mitigation: 把导入流程产品化：围绕伙伴模板、边界清晰的集成和通过审计/法律伙伴交付的付费专家包来做。
