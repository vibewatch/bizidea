jobsToBeDone:
- job: 当受监管企业试点要转生产时，帮 AI 供应商的安全负责人把多套标准下的控制覆盖证明出来，好让采购和部署继续推进。
  currentAlternative: Drata 或 Vanta 导出的材料，再加表格、顾问和手工拼出来的证据文件夹。
  successMetric: 从收到买家问卷或审计启动，到生产正式获批上线的天数。
- job: 当产品或模型在认证准备阶段发生变化时，帮 COO 和律师快速看清哪些控制项和叙事变了，避免返工和审计失败。
  currentAlternative: 手工变更日志、Notion 页面，以及顾问驱动的状态表。
  successMetric: 每轮认证周期里，重复证据请求和审计发现项的下降幅度。
