scenarios:
  downside:
    description: >-
      Partner channels mature a year later and onboarding stays more bespoke, so customer
      growth trails plan and margins remain services-heavy.
    y3RevenueK: 1895.0
    y3EbitdaK: -760.0
    cashLowPointK: 150.0
    keyAssumptionChanges:
      - "Q4Y3 customers end at 55 instead of 80."
      - "Blended ACV exits near $60K instead of $66K because second-framework expansion lands later."
      - "Gross margin exits near 66% because evidence mapping and reviewer support stay more manual."
  base:
    description: >-
      The company converts early paid readiness projects into annual software, reaches the
      year-two beachhead milestone, and then accelerates through certifier, audit, and counsel
      channels without hiring a full enterprise field team.
    y3RevenueK: 2730.8
    y3EbitdaK: -217.8
    cashLowPointK: 622.0
    keyAssumptionChanges:
      - >-
        Customer count grows to 3 by M12, 15 by Q4Y2, and 80 by Q4Y3, which is below the
        120-customer SOM ceiling in the plan.
      - "Blended per-logo revenue normalizes from early pilot economics into about $66K annualized ACV by Y3 exit."
      - >-
        Gross margin reaches the 70% target only after onboarding templates and bounded
        integrations reduce manual work.
  upside:
    description: >-
      Partner referrals and repeatable control templates work earlier than planned, allowing
      faster logo growth and cleaner gross-margin expansion on roughly the same operating base.
    y3RevenueK: 3625.0
    y3EbitdaK: 320.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
      - "Q4Y3 customers end at 100 instead of 80."
      - "Blended ACV exits near $70K because more logos adopt second-framework and buyer-diligence expansions."
      - "Gross margin exits near 72% because implementation becomes more template-led and partner-assisted."
sensitivity:
  - variable: ARPU
    downsideCase: "Exit blended ACV reaches only $60K."
    baseCase: "Exit blended ACV reaches $66K."
    upsideCase: "Exit blended ACV reaches $70K."
    y3RevenueImpactK: -330.0
    cashImpactK: -280.0
  - variable: CAC
    downsideCase: "CAC rises to $32K because partner sourcing underperforms."
    baseCase: "CAC is $24K with founder-led selling plus partner referrals."
    upsideCase: "CAC falls to $18K once channels supply a third of qualified pipeline."
    y3RevenueImpactK: -140.0
    cashImpactK: -230.0
  - variable: churn
    downsideCase: >-
      Monthly churn drifts to 2.2% as pilots fail to convert into deeper workflow use.
    baseCase: "Monthly churn stays at 1.5%."
    upsideCase: >-
      Monthly churn improves to 1.0% once customers standardize multiple frameworks in-product.
    y3RevenueImpactK: -190.0
    cashImpactK: -170.0
  - variable: "sales cycle"
    downsideCase: >-
      Median sales cycle extends to 7-8 months because procurement and external reviewers stay
      export-first.
    baseCase: "Median sales cycle is 4-6 months around live certification and diligence triggers."
    upsideCase: "Median sales cycle compresses to 3-4 months when partners introduce in-flight deals."
    y3RevenueImpactK: -420.0
    cashImpactK: -460.0
  - variable: "gross margin"
    downsideCase: "Exit gross margin reaches only 66%."
    baseCase: "Exit gross margin reaches 70%."
    upsideCase: "Exit gross margin reaches 72%."
    y3RevenueImpactK: 0.0
    cashImpactK: -190.0
  - variable: "hiring pace"
    downsideCase: "The third engineer and second implementation hire are pulled forward by two quarters."
    baseCase: "Hiring remains milestone-gated and roughly matches the team plan."
    upsideCase: "Later back-office hiring waits until partner-sourced pipeline is proven."
    y3RevenueImpactK: -60.0
    cashImpactK: -250.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Trigger[Regulated pilot expansion trigger] --> Pilot[Paid readiness project]
      Pilot --> Annual[Annual software contract]
      Annual --> Expansion[More frameworks and buyer workflows]
      Expansion --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: >-
      Base-case revenue is driven by turning a handful of founder-sold readiness projects into
      15 beachhead customers by Q4Y2 and then scaling partner-assisted annual contracts to 80
      customers by Q4Y3.
  - checkName: "Must go right"
    finding: >-
      The company has to keep onboarding inside the bounded integration scope so median time to
      first approved evidence packet falls below 30 days and 70% gross margin becomes real.
  - checkName: "Model breaks if"
    finding: >-
      If partner channels slip and the sales cycle stretches toward 8 months, the downside case
      pushes cash near $150K before the next round is justified.
  - checkName: "Next-round proof"
    finding: >-
      The seed-ready proof point is 12-15 annual customers, meaningful partner-sourced
      pipeline, and evidence that second-framework expansion lifts ACV without adding a large
      field-sales team.
sanityChecks:
  ruleOf40: >-
    Y3 growth 415% + EBITDA margin -8% = 407% (directionally strong but inflated by the small
    Y2 base).
  burnMultiple: >-
    Approx. 1.5x in Y2, improving toward 0.1x in Y3 as net new ARR outpaces burn.
  revenuePerFte: >-
    $248K Y3 based on 11 Q4Y3 FTE (within a plausible $200-400K SaaS range, but only if
    partner leverage works).
  flags:
    - >-
      The jump from 15 customers at Q4Y2 to 80 at Q4Y3 is ambitious and depends on
      partner-led distribution becoming repeatable quickly.
    - >-
      The model reaches the 70% gross-margin target only if deployments stay within the
      bounded connector scope described in the business plan; bespoke mapping would compress
      margin.
    - >-
      Revenue is simplified into blended per-logo recurring value, so actual accounting could
      show more services revenue and slightly lumpier gross margin in early periods.
