  - id: A14
    name: "Partnerships / sales loaded compensation"
    value: "170"
    unit: "usdK annual"
    source: "[BP team Partnerships lead] plus partner-led enterprise GTM heuristic"
  - id: A15
    name: "G&A / customer success loaded compensation"
    value: "110"
    unit: "usdK annual"
    source: "Startup-finance heuristic for lean finance, vendor-risk ops, and post-sale coverage."
  - id: A16
    name: "Hiring sequence"
    value: >-
      M4 product lead, M7 implementation, M10 partnerships, M15 second engineer,
      M18 second GTM, M20 G&A/CS, M27 second implementation, M30 third engineer,
      M33 second G&A/CS
    unit: "month index"
    source: "[BP team], [BP strategicChoices.sequencingRationale]"
  - id: A17
    name: "Non-payroll R&D spend ramp"
    value: "6K-9K monthly in Y1, 27K-30K quarterly in Y2, 33K-39K quarterly in Y3"
    unit: "usdK"
    source: >-
      [BP product], [BP operations] plus startup-finance heuristic for cloud, security, and
      developer tooling
  - id: A18
    name: "Non-payroll sales and marketing spend ramp"
    value: "4K-10K monthly in Y1, 24K-42K quarterly in Y2, 48K-66K quarterly in Y3"
    unit: "usdK"
    source: >-
      [BP gtm.channels], [Research reportMemo.distributionChannels] plus
      travel/event/content heuristic
  - id: A19
    name: "Non-payroll G&A spend ramp"
    value: "8K-10K monthly in Y1, 30K-39K quarterly in Y2, 45K-60K quarterly in Y3"
    unit: "usdK"
    source: >-
      [BP operations], [BP risks] plus legal, insurance, audit-prep, and vendor-security
      heuristic
  - id: A20
    name: "Cash conversion policy"
    value: "EBITDA approximates cash movement"
    unit: "policy"
    source: >-
      Startup-finance heuristic; no debt, capex, or working-capital lines are separately
      modeled.
  - id: A21
    name: "Base sales cycle"
    value: "4-6 months"
    unit: "months"
    source: >-
      [BP gtm.funnelTargets], [BP market.buyingProcess], [Research reportMemo.buyingTriggers]
  - id: A22
    name: "Partner-sourced pipeline share by Q4Y2"
    value: "30"
    unit: "percent of qualified pipeline"
    source: >-
      [BP experimentRoadmap co-sell target], [BP milestones active partner relationships],
      [BP operatingAssumptions partner distribution]
  - id: A23
    name: "Revenue modeling simplification"
    value: >-
      Paid readiness fees are normalized into blended per-logo revenue rather than shown as a
      separate services line
    unit: "policy"
    source: >-
      [BP gtm.pricing], [BP investorMemo.firstCustomer.initialContract]; keeps revenue tied to
      paying-customer count.
