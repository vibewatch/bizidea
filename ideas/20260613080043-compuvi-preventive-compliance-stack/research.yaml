  geographicConsiderations:
    - point: EU-facing vendors face the highest urgency because AI Act obligations are phasing in and DORA sharpens ICT third-party oversight in financial services.
      sourceRefs:
        - 6
        - 7
        - 8
        - 12
    - point: UK buyers add data protection and secure-AI expectations, which increases the need for documented oversight even without an omnibus UK AI law.
      sourceRefs:
        - 14
        - 15
    - point: US demand is still framework-led rather than law-led, so NIST-style governance and customer diligence can create earlier commercial pressure than formal regulation.
      sourceRefs:
        - 4
        - 12
        - 29
  sensitivityCases:
    - case: Incumbents bundle ISO 42001 into existing compliance suites faster than expected
      impact: A startup focused only on certification checklists gets squeezed; the defensible position shifts toward AI-specific evidence modeling, counsel collaboration, and procurement workflow reuse.
      sourceRefs:
        - 28
        - 32
        - 35
    - case: EU high-risk AI obligations land later or more narrowly for the beachhead than expected
      impact: Sales motions lean more on buyer diligence acceleration than on regulatory urgency, lowering urgency for companies without near-term regulated customers.
      sourceRefs:
        - 6
        - 12
        - 39
    - case: Questionnaires remain highly bespoke despite CAIQ and SIG standards
      impact: Customer onboarding stays service-heavy, so the company needs strong partner delivery and response-library tooling to protect margins.
      sourceRefs:
        - 16
        - 17
        - 20
        - 21
        - 22
  validationPlan:
    - priority: high
      question: How many AI vendors entering bank or insurer production actually run a combined SOC 2, ISO 27001, and ISO 42001 motion within the same 12-month window?
      evidenceToGather: Ten customer interviews plus recent audit-scope data from certifiers serving AI-native companies.
    - priority: high
      question: Will auditors, certifiers, and outside counsel treat a reusable control graph as a preferred working layer rather than another export to review?
      evidenceToGather: Partner design calls with two certifiers, two audit firms, and three AI-specialist law firms.
    - priority: medium
      question: What measurable sales acceleration comes from moving buyer diligence into a cited trust room instead of bespoke questionnaires?
      evidenceToGather: Win-loss and cycle-time data from pilot customers handling regulated procurement.
    - priority: medium
      question: 'Which integrations matter most in the first 90 days: cloud, code, identity, ticketing, or document stores?'
      evidenceToGather: Implementation logs from early pilots and auditor feedback on missing evidence sources.
