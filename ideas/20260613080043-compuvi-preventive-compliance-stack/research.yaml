openQuestions:
  - How many Series A/B AI vendors will pursue ISO 42001 before a customer explicitly mandates it?
  - Will auditors and certifiers accept a reusable evidence graph as a preferred working layer, or still insist on manual artifact packaging?
  - Do outside counsel want to collaborate inside the workflow, or only review exported evidence packets?
  - How quickly will incumbents move from generic AI-governance content to product-model-data-flow-specific control mapping?
