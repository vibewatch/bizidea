problem: 工业机器人和自动化团队手里越来越多的是时延敏感的 C/C++ 路径，通用处理器已经顶不住控制环路和传感器融合的预算。把软件直接编到 FPGA 的编译器把 RTL 团队这道门槛拿掉了，但它并没有解决真正的运营活：哪些热点值得上硬件、生成的协处理器在真实时序约束下能不能和原行为完全一致，以及上线后怎么安全回滚。每做一次加速器，固件、控制、测试和 FPGA 工具链都要拉成一个定制项目，结果不是算力买大了，就是项目推进卡住。
targetUser:
  primary: 仓储机器人和工业自动化 OEM 里负责嵌入式平台与性能的负责人：他们想把电机控制或传感器融合环路卸到 FPGA 上，又不想自建 RTL 团队。
  secondary: 负责给整批机器人里的 FPGA 版本做验证准入的控制系统验证经理和现场可靠性工程师。
  buyer: 嵌入式工程 VP、机器人平台总监，或控制软件负责人。
startupThesis:
  nonObviousInsight: 真正会长成大公司的，不会只是把 C 编成硬件的编译器，而会是那套底账系统：它决定哪些代码值得上硬件，把生成加速器打包成可安全发布的单元，并在量产里持续盯着跑。等验证式编译让 RTL 专长不再是硬门槛，新的瓶颈就会挪到加速器的准入、放量发布，以及跨软硬件栈的可观测性上。
  beachhead: 那些正在出货一块 Xilinx 或 Intel FPGA 控制板、且某个电机控制或传感器融合环路已经达不到时延或功耗目标的仓储机器人和工业自动化 OEM。
  wedge: 一个只读的发布控制平面：先给 C/C++ 热点做画像，再把编译生成的 FPGA 协处理器包进确定性的固件接口里，并为单个板卡项目自动吐出证明包、回滚和遥测工件。
  whyNowCatalyst: BoolSi 的 seed 融资、可验证编译的说法以及 63x 基准，让把代码直接编到 FPGA 这件事第一次靠谱到值得软件主导的机器人团队现在就试；一试，就会立刻需要围绕生成加速器的发布工具。
  ventureScalePath: 先从一条机器人控制器发布链切进去，再扩到工业视觉、汽车 ECU、医疗设备、电信，最后变成跨 FPGA 和 ASIC 的软件定义硅项目控制平面。
solution: 产品接进客户的固件仓库、性能剖析轨迹、HIL 台架，以及 BoolSi 或同类编译器产出的 FPGA 工具链结果。它先排出哪些计算热点值得卸到 FPGA，再用标准驱动和内存接口模板把生成加速器包起来，并生成一份等价性证明包，写清预期行为、时序预算和回退条件。对发布经理来说，它会生成带版本的上线包，配好可安全回滚的固件组合，以及最少但够用的遥测项，让团队能在已部署机器人里盯住时延回退和加速器故障。第一版部署只读地挂在现有 CI、台架测试和编译器输出外围，团队不用重做整套嵌入式栈，就能先把一个加速器发出去。时间一长，公司会学到哪些工作负载形态、接口和上线保护措施，最容易把软件热点真正变成量产加速器。
goToMarketSeed:
  firstCustomer: 一家 100–800 人的仓储机器人或工业自动化 OEM，拥有 20–60 名嵌入式工程师、一个基于 Xilinx 的控制器项目，且即将到来的 2027 版发布正被传感器融合或电机控制时延卡住。
  buyingTrigger: 团队没打到实时延迟或功耗目标，管理层拍板上 FPGA 加速，同时没人想为了一个板卡项目去招一整支 RTL 团队、再把它管起来。
  currentAlternative: 继续手调 C/C++、换更大的处理器、找 FPGA 顾问手写 HDL，再靠表格把固件和测试团队的发布协同拼起来。
  switchingReason: 第一位客户会切换，是因为这套产品能把一个高风险加速器项目，在几周而不是几个月里，变成带证明包、回滚和运行时可见性的可发布版本。
  pricingHypothesis: 按活跃加速器项目或板卡发布订阅收费，另售现场遥测和额外工具链集成等高级模块。
