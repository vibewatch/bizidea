jobsToBeDone:
- job: 当某个传感器融合环路已经打不进控制预算时，帮我们的嵌入式平台负责人把一套安全的 FPGA 加速器发出去，这样他们不用搭 RTL 团队也能守住上线节点。
  currentAlternative: 手调 C++、找 FPGA 顾问，或者直接把这个功能往后拖。
  successMetric: 从锁定热点到加速器版本获批上线的周数。
- job: 当围绕生成协处理器的固件在周期后段又改了时，让我们的验证团队知道这次发布依然安全，这样他们就能避免整批机器人出现回归和紧急回滚。
  currentAlternative: 台架测试、自写脚本和人工发布评审。
  successMetric: 每个板卡项目里，后期加速器回归或紧急回滚的减少幅度。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 同日两篇已验证的融资来源，再加上明确基准、工作流和路线图细节，即便没有客户背书，信号也足够强。
  painIntensity:
    score: 5
    rationale: 一条在出货中的机器人项目上跑不进实时目标的环路，足以卡住功能、逼着团队换更贵的硬件，甚至拖延上市，这个经济痛点很急。
  wedgeClarity:
    score: 5
    rationale: 围绕一个板卡项目上的一个编译生成加速器做发布控制平面，买家、触发点和可量化结果都很清楚，切口很窄。
  defensibility:
    score: 4
    rationale: 跨项目积累下来的热点选择数据、接口模板、发布失败模式和工作流集成，能形成真实的切换成本，虽然编译器厂商也可能跟进。
  ventureScale:
    score: 4
    rationale: 滩头市场很具体，但只要软件团队先做 FPGA、后做 ASIC，这套控制平面就能一路扩出去。
topRisks:
- name: 编译器厂商往上打包
  description: BoolSi 或更大的综合厂商可能往上延伸到发布打包层，独立切口会被压窄。
  mitigation: 保持编译器无关，支持混合工具链，并在买家需要跨多个加速器来源统一证明包和发布工作流的地方赢下来。
- name: 类别时点
  description: 如果把软件直接编到 FPGA 这件事继续停留在实验阶段，量产买家的增长可能会比预期慢。
  mitigation: 先抓那些已经在真实板卡项目上试跑生成加速器的团队，同时支持手工或顾问产出的 FPGA 结果，作为过渡台阶。
- name: 安全证明负担
  description: 如果证据不够扎实，机器人和工业买家可能不会让这套产品碰实时或安全相关版本。
  mitigation: 先把产品做成带人工签字的决策支持，接上 HIL 和现场遥测证据，并让每一条建议都经得起审计。
