competitors:
- name: AMD Vitis
  stage: incumbent
  wedge: AMD 统一的软件栈，覆盖嵌入式应用、HLS、库和 FPGA 部署。
  pricing: 免费入门层，加付费年度版和永久版工具层。
  strength: 和 AMD adaptive SoC 及既有 FPGA 开发者工作流是一方集成。
  weaknessVsUs: 它围绕工具链，不围绕发布；做不了混合栈和现场遥测上的中立底账系统。
  sourceRefs:
  - 4
  - 5
  - 6
- name: Siemens Catapult
  stage: incumbent
  wedge: 面向 ASIC 和 FPGA 团队的企业级 C++/SystemC HLS，加上验证支持。
  pricing: 定制化企业授权。
  strength: 在复杂硬件设计组织里，HLS 和验证可信度很深。
  weaknessVsUs: 优化的是设计效率，不是生成加速器外围的固件配对、回滚规则或整批设备遥测。
  sourceRefs:
  - 7
  - 8
- name: NI VeriStand
  stage: incumbent
  wedge: 面向嵌入式控制系统的 HIL 验证和实时测试编排。
  pricing: 永久授权或年度订阅。
  strength: 实验室验证工作流可信，控制系统测试覆盖广。
  weaknessVsUs: 止步于台架；它不会给热点排优先级，也不会把生成协处理器打包成可安全发布的单元。
  sourceRefs:
  - 9
  - 10
- name: Mender
  stage: scale-up
  wedge: 面向嵌入式设备群的 OTA 部署、同步更新和 A/B 回滚。
  pricing: 托管套餐和企业版。
  strength: 回滚机制扎实，整机更新概念也和部署安全高度契合。
  weaknessVsUs: 不理解 FPGA 接口、HLS 工件，也不管生成加速器上线前的证明工作。
  sourceRefs:
  - 24
  - 25
  - 26
- name: Memfault
  stage: scale-up
  wedge: 嵌入式可观测性、固件调试、OTA 和质量漏出监控。
  pricing: 开发者免费层，加按设备收费的付费方案。
  strength: 运行时遥测和发布后故障发现很强。
  weaknessVsUs: 它是在事后观察设备，不会把生成 FPGA 加速器打包，也不会在发布前证明等价性。
  sourceRefs:
  - 27
  - 28
  - 29
