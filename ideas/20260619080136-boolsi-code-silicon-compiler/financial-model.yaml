modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base case revenue comes from 2 paid pilots in Y1, 9 active governed programs by Q4Y2, and 36 by Q4Y3 at roughly $150K ARR plus $20K onboarding.
- checkName: Must go right
  finding: Founder-led selling has to turn into partner-assisted pipeline by Y2 so the company can add about 27 net new programs during Y3 without hiring far ahead of demand.
- checkName: Model breaks if
  finding: If Y2 exits below roughly 5 active programs or gross margin stays below 66%, the cash low point drops toward the downside case before seed-quality proof exists.
- checkName: Next-round proof
  finding: The next financing is justified once the company shows 3-5 production customers, 9 governed programs, and 2 partner-sourced deployments with standardized integrations by Q4Y2.
sanityChecks:
  ruleOf40: Y3 growth 459% + EBITDA margin 9% = 468%.
  burnMultiple: Y2 burn multiple is about 1.1x on $1.05M of net new ARR; Y3 is EBITDA-positive, so burn multiple stops being the limiting metric.
  revenuePerFte: $288K Y3 (benchmark $200-400K infrastructure SaaS).
  flags:
  - The jump from 9 active programs at Q4Y2 to 36 at Q4Y3 requires partner channels and second-program expansion to work almost immediately after the first case study.
  - The model assumes $20K onboarding is enough to cover early implementation work while still reaching 70% gross margin by Y3.
  - Production pricing is anchored to adjacent tooling budgets, but no named design partner has yet validated that a neutral release plane wins a standalone budget line.
  - Cash bottoms in Q1Y3, so a one-quarter delay in conversions would likely pull seed fundraising forward.
