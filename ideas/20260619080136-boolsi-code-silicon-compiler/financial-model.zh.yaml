- id: A4
  name: 导入费
  value: '20'
  unit: USDK per new production program
  source: '[BP businessModel.revenueStreams 包含付费导入；经验估算约为 $150K ARR 的 13%]'
- id: A5
  name: 第 1 年客户爬坡路径
  value: M9 前拿下 2 个付费试点，M12 前转成 2 个量产项目
  unit: programs
  source: '[BP product.sixMonth, product.twelveMonth, milestones 0-12 months]'
- id: A6
  name: 期末活跃项目爬坡
  value: Q1Y2=2, Q2Y2=3, Q3Y2=5, Q4Y2=9, Q1Y3=15, Q2Y3=22, Q3Y3=30, Q4Y3=36
  unit: programs
  source: '[BP milestones 12-24 and 24-36 months; BP market.som 30 家客户 x 1.2 个项目 = 36 个项目]'
- id: A7
  name: 毛利率爬坡
  value: Y1 65%, Y2 68%, Y3 70%
  unit: gross margin pct
  source: '[BP businessModel.targetGrossMarginPct 70; BP operatingAssumptions 假设到第 5 个账户时实现标准化]'
- id: A8
  name: 月度流失率
  value: '1.2'
  unit: pct
  source: '[经验假设：高 ACV、可扩张的关键基础设施软件]'
- id: A9
  name: 综合 CAC
  value: '105'
  unit: USDK per new production program
  source: '[经验假设：$125K-$175K ACV 的创始人主导企业销售动作；BP gtm 也是创始人直销加合作方转介绍]'
- id: A10
  name: 各岗位完全成本薪酬
  value: 工程 180 / 产品 192 / 销售 168 / 解决方案 174 / G&A 144
  unit: USDK annual per FTE
  source: '[经验假设：美国初创公司现金薪酬，加上高级招聘约 20% 的薪税负担]'
- id: A11
  name: 初始团队与招聘时点
  value: 起步 3 FTE，之后在 M4、M8、M12、M15、M18、M21、M24、M27、M30、M33、M36 各加 1 人
  unit: months
  source: '[BP team startTiming; Y2-Y3 继续沿同样职能补人以打到里程碑]'
- id: A12
  name: 非薪酬运营开支
  value: Y1 每月 17-18.5，Y2 每月 23，Y3 每月 32
  unit: USDK per month
  source: '[经验假设：pre-seed 基础设施创业公司在云、工具、差旅、法务和行政上的支出]'
- id: A13
  name: 起始融资轮
  value: '2.5'
  unit: USDM
  source: '[BP fundingAsk 为 pre-seed $2M-$4M、18 个月跑道；模型按阶段合同额外加 6 个月缓冲]'
- id: A14
  name: 销售周期压缩
  value: 初期 6 个月，随着合作方进入缩短到 4-5 个月
  unit: months
  source: '[BP gtm 假设创始人主导销售、顾问/HIL 转介绍，以及合作方来源部署里程碑]'
- id: A15
  name: 现金转换简化假设
  value: 用 EBITDA 近似代表经营性现金流变动
  unit: policy
  source: '[经验假设：pre-seed 阶段不单独建模债务、税项和资本开支]'
