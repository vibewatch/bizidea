scenarios:
  downside:
    description: 合作渠道晚了两个季度，量产 ARPU 落在计划下沿，服务标准化也比预期慢。
    y3RevenueK: 2900.0
    y3EbitdaK: -420.0
    cashLowPointK: 95.0
    keyAssumptionChanges:
    - 量产订阅稳定在接近 $140K ARR，导入费 $15K。
    - Q4Y3 末活跃项目大约只有 24 个，而不是 36 个。
    - 实施仍然偏重，所以毛利率最多只能到 66%。
  base:
    description: 两次试点都在 Y1 转正，合作方来源商机从 Y2 开始帮上忙，模块附着率把每个活跃项目的综合 ARR 稳在 $150K。
    y3RevenueK: 4031.3
    y3EbitdaK: 374.4
    cashLowPointK: 357.4
    keyAssumptionChanges:
    - 付费试点定价维持在约 $60K，量产落在约 $150K ARR，另加 $20K 导入费。
    - 活跃在管项目从 Y1 末的 2 个爬到 Y3 末的 36 个。
    - 毛利率从试点占比较高的 Y1 的 65%，逐步爬到 Y3 的 70%。
  upside:
    description: 一个案例就把转介绍速度带起来，现有 OEM 内部扩张更快，高级模块也把实际 ACV 抬上去。
    y3RevenueK: 5250.0
    y3EbitdaK: 1020.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - 到 Y2 中期，合作渠道把销售周期压到大约 4 个月。
    - Q4Y3 末活跃项目大约到 42 个，第二项目扩张更快。
    - 遥测和审计模块挂上之后，量产综合 ARR 往 $160K 靠。
