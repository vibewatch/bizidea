modelDiagram:
  title: 单位经济流转
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入来自 Y1 的 2 个付费试点、Q4Y2 的 9 个活跃在管项目，以及 Q4Y3 的 36 个项目，综合单价约 $150K ARR 外加 $20K 导入费。
- checkName: 必须做对的事
  finding: 到 Y2，创始人主导销售必须变成合作方辅助的获客管道，这样公司才能在不大幅提前招人的情况下，于 Y3 新增约 27 个净项目。
- checkName: 模型失灵条件
  finding: 如果 Y2 末活跃项目低于约 5 个，或者毛利率始终上不去 66%，那在 seed 轮该有的证明点出来前，现金低点就会往 downside 情景那边掉。
- checkName: 下一轮融资证明点
  finding: 只要公司在 Q4Y2 前证明 3-5 个量产客户、9 个在管项目、2 个合作方来源部署，以及标准化集成已经跑通，就有理由去讲下一轮融资。
sanityChecks:
  ruleOf40: Y3 增长 459% + EBITDA 利润率 9% = 468%。
  burnMultiple: Y2 的烧钱倍数约为 1.1x，对应 $1.05M 的净新增 ARR；Y3 已转 EBITDA 为正，烧钱倍数不再是卡脖子指标。
  revenuePerFte: $288K Y3（基准为 $200-400K 的基础设施 SaaS）。
  flags:
  - 从 Q4Y2 的 9 个活跃项目跳到 Q4Y3 的 36 个，要求合作渠道和第二项目扩张在首个案例出来后几乎立刻起效。
  - 模型假设 $20K 的导入费足以覆盖早期实施工作，同时还能在 Y3 把毛利率抬到 70%。
  - 量产定价是按相邻工具预算锚定的，但还没有点名共创客户验证：一套中立发布控制平面真的能拿到独立预算项。
  - 现金低点出现在 Q1Y3，所以只要转化晚一个季度，seed 融资大概率就得提前。
