  validationPlan:
  - priority: high
    question: How many target buyers are already trying generated or HLS-built accelerators on live board programs rather than only in lab demos?
    evidenceToGather: Ten design-partner interviews across robotics and industrial OEMs plus five FPGA consultancies or systems integrators that see current accelerator pilots.
  - priority: high
    question: Can the product ingest real artifacts from BoolSi, Vitis HLS, or Catapult and emit a useful proof, rollback, and telemetry packet without sitting in the critical path?
    evidenceToGather: One proof-of-concept on an actual controller program with compiler outputs, HIL logs, and firmware release records from a design partner.
  - priority: medium
    question: What is the minimum evidence bundle a verification or safety lead will trust before allowing a generated accelerator into release review?
    evidenceToGather: Structured review sessions with verification leads, safety consultants, and field-reliability owners using a mock release packet.
  - priority: low
    question: How much of the telemetry and rollback workflow must work in air-gapped or intermittently connected industrial environments?
    evidenceToGather: Discovery calls focused on plant networking constraints plus one pilot that exercises delayed or staged telemetry upload.
