openQuestions:
- How many robotics and industrial OEMs will ship compiler-generated accelerators in production before 2028 rather than stopping at lab pilots?
- 'Which upstream artifact formats are stable enough to normalize first: BoolSi, AMD Vitis HLS, Siemens Catapult, or consultant-built HDL flows?'
- What minimum evidence packet will a verification or safety lead accept before approving a generated accelerator for a real release queue?
- Can runtime telemetry cleanly separate accelerator-specific faults from surrounding firmware, networking, or sensor issues without creating a support burden?
