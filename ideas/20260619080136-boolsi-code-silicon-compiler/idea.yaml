topRisks:
  - name: "Compiler-vendor bundling"
    description: "BoolSi or a larger synthesis vendor could extend upward into release packaging and narrow the independent wedge."
    mitigation: "Stay compiler-agnostic, support mixed toolchains, and win where buyers need proof and rollout workflows that span multiple accelerator sources."
  - name: "Category timing"
    description: "If software-to-FPGA compilation stays experimental longer than expected, the number of production buyers may grow slowly."
    mitigation: "Start with teams already piloting generated accelerators on one live board program and support manual or consultant-built FPGA outputs as a stepping stone."
  - name: "Safety-proof burden"
    description: "Robotics and industrial buyers may reject the product if its evidence is not rigorous enough for real-time or safety-adjacent releases."
    mitigation: "Launch as decision support with human signoff, integrate HIL and field telemetry evidence, and make every recommendation auditable."
