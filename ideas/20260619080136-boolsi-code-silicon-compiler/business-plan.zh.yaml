slug: generated-fpga-release-plane
date: '2026-06-19'
executiveSummary: 这家公司应该先做成一层中立的发布运营层，服务北美仓储机器人和工业自动化 OEM：它们想把某条时延敏感的电机控制或传感器融合环路卸到 FPGA 上，但又不想自建 RTL 团队。最急的痛点不是把代码编成硬件，而是如何证明一个加速器能带着被接受的 HIL 证据、回滚逻辑和现场遥测，安全装进控制器版本里发出去。第一版产品要只读地挂在 BoolSi、AMD Vitis HLS、Siemens Catapult 或顾问手工产出的 FPGA 结果外围，然后为一个板卡项目吐出带版本的证明包、固件配对和部署清单。首位买家会是嵌入式工程 VP 或机器人平台负责人——他们已经为一条没打到时延或功耗目标的发布在掏钱。定价应从付费试点加按活跃加速器项目收年费开始，因为预算来自一个已经被批准的发布风险和工具问题，而不是通用开发工具科目。公司要刻意不去做编译器、不去接管 HIL 基础设施，也不去替换 OTA 和可观测性栈；真正的切口，是把这些层协调起来。研究证明，相邻的 HLS、HIL、OTA 和遥测软件里已经有预算，但真实在跑的量产生成加速器项目数量仍是假设，而且材料里没有点名共创客户或可复现的客户结果。所以这是一笔逻辑完整、但对时点很敏感的 pre-seed 机会：前 12 个月必须证明买家时点、独立预算，以及厂商中立的差异化确实存在。
problem:
- 软件主导的机器人和工业团队现在已经能在没有 RTL 团队的情况下尝试 FPGA 加速，但他们依然没有一套可复用的方法，去选对热点、验证等价性，并把加速器打包成能发布的控制器版本。
- 验证、固件、HIL、回滚和现场可靠性工作散在不同工具和服务商手里，所以一个加速器项目常常被拉成定制化的集成与签核工程，最后不是拖慢发布，就是把买家逼回更大的 CPU 或顾问方案。
solution:
- 做一套只读的发布控制平面，吃进编译器或 HLS 输出、固件元数据、HIL 轨迹和板级约束，然后为单个加速器项目给热点排优先级，并生成确定性的接口、证明和发布工件。
- 再补上带版本的上线包、回滚阈值和发布后遥测挂钩，让买家不用替换现有 FPGA、实验室、OTA 或可观测性系统，就能把一个生成协处理器推进发布评审并分阶段上线。
whyWeWin:
- 公司赢的方式，是做编译器、HIL、OTA 和遥测系统之间的中立协调层，而不是和任何一类现有厂商正面硬碰。
- 一旦它握住跨客户的热点经济账、被接受的证明包、接口模板和回滚触发模式数据，切换成本就会比单点 HLS 工具或实验室工具涨得更快。
strategicChoices:
  beachhead: 北美仓储机器人和工业自动化 OEM：20–60 名嵌入式工程师、一块 FPGA 控制板、以及一版被电机控制或传感器融合时延卡住的 2027 发布。
  wedgeRationale: 这个分层有明确触发点，本来就有 HIL 和发布预算，也有一个能在几周内验证价值的板卡项目；比起卖通用编译器平台或大而全的嵌入式 DevOps 套件，更快拿到验证。
  sequencingRationale: 先只读地挂在一个板卡发布上，先证明“证明包被接受”和“周期时间缩短”这两件事，再要求买家改部署或实验室基础设施；等第一个项目转正后，再补更多上游适配器、标准化集成和合作渠道，然后才扩到监管更重或多板卡环境。
  notYet:
  - 自建编译器、综合引擎或 FPGA 工具链
  - 自己持有 HIL 硬件，或替换 NI/Speedgoat 这类验证基础设施
  - 全面替换 OTA 或设备可观测性系统
  - 优先做汽车、医疗或 ASIC-first 项目——这些都需要更深的认证工作流
  - 没有真实加速器项目的小型自助式嵌入式团队
market:
  tam: 估算 TAM 为 $1.1B：全球大约 6,000 个活跃加速器项目，每个项目约 $175K ARR。
  sam: 估算 SAM 为 $135.0M：北美和欧洲大约 900 个机器人或工业自动化项目，每个项目约 $150K ARR，而且这些团队已经把控制、HIL 和发布工作流做得比较成熟。
  som: 估算第 3 年 SOM 为 $4.5M：约 30 家客户、每家 1.2 个活跃项目、每个项目约 $125K ARR，建立在高触达共创客户打法之上。
  segments:
  - 北美仓储机器人 OEM 控制器团队
  - 正在出货 FPGA 驱动的运动控制或传感器融合控制器的工业自动化 OEM
  buyingProcess: 销售动作会在某个明确的板卡项目没打到时延或功耗目标、管理层批准为单次发布上 FPGA 加速时启动。经济决策权大概率在嵌入式工程 VP 或机器人平台负责人手里，而验证、固件和现场可靠性负责人会重点看，这套产品能不能和现有 HIL、发布和回滚流程共存。
product:
  mvp: MVP 是围绕一个控制器板卡项目的只读发布运营工作流。它吃进上游加速器工件、固件和 HIL 证据，然后吐出热点推荐、等价性证明包、固件-加速器版本包，以及供人工审批的遥测和回滚闸门。
  sixMonth: 拿下 2–3 个共创客户，上线一条生成加速器流程和一条传统 HLS 流程的适配器，并在一个真实板卡项目上跑通 1 个付费试点，让它产出一份被接受的发布评审包。
  twelveMonth: 把首批试点转成量产合同，补上 HIL 证据、OTA 发布包元数据和现场遥测的标准化集成，并在至少一个混合工具链客户上做到不靠一次性定制服务也能跑通。
  twentyFourMonth: 在机器人和工业客户内部，把这套产品做成跨多个板卡项目的生成加速器或 HLS 加速器发布底账系统；然后先扩到工业视觉和欧洲合规更重的部署，再碰 ASIC 工作流。
  keyBets:
  - 买家会比起直接放进构建或部署关键路径的工具，更快信任一个只读叠层。
  - 同时支持编译生成的和传统 HLS 输出，能把可服务市场做大到足以对冲赛道时点风险。
  - 验证负责人会接受带人工签字的结构化证明包，而不是每次都要求一套完全手工的发布材料。
  - 回滚和遥测挂钩，比单做热点排序更能带来扩张路径。
gtm:
  wedge: 围绕一个正在进行的控制器发布卖付费试点：把客户今天靠表格、顾问和实验室交接才勉强推进的高风险加速器项目，更快变成一份经得起审计的证明包、固件配对和回滚包。
  channels:
  - 创始人主导直销给嵌入式工程 VP、机器人平台负责人和控制软件负责人
  - 围绕一个明确板卡项目，由 FPGA 顾问公司和 HIL 集成商转介绍
  - 等首批适配器和案例出来后，再和上游编译器及 HLS 厂商建立合作
  funnelTargets: 把合格线索→付费试点做到 20–30%，付费试点→量产做到 50% 以上，且赢单里有 40% 以上能在 12 个月内从第一个量产板卡项目扩到第二个项目。
  pricing: 按活跃加速器项目或板卡发布收年费订阅，另加付费导入和集成费。这样既贴合买家今天给 HLS、HIL、OTA 和可观测性软件的预算方式，也能把合同从 $50K-$100K 试点，推到每个活跃项目约 $125K-$175K 年度 ARR——前提是发布评审已经接受，部署遥测也接上了。
businessModel:
  revenueStreams:
  - 围绕活跃加速器项目的发布运营年费订阅
  - 付费导入、工件映射和工作流集成服务
  - 面向遥测策略、审计历史和额外上下游适配器的高级模块
  unitOfValue: 通过平台纳管的活跃加速器项目和控制板卡发布。
  targetGrossMarginPct: 70
  expansionLevers:
  - 从同一 OEM 的一个加速器项目扩到多个板卡项目
  - 等核心发布工作流被信任后，再加遥测、审计和合规模块
  - 在不改下游发布动作的情况下，接入更多上游加速器来源
  - 等首批案例证明价值后，再借顾问公司和 HIL 合作方做渠道
strategyMap:
  northStarMetric: 通过平台纳管、且带着被接受的证明包和回滚计划进入量产的加速器项目数。
  inputMetrics:
  - 围绕明确控制器发布启动的付费试点数
  - 从选定热点到发布评审包被接受的天数
  - 试点转量产的转化率
  - 无需完整人工返工就能通过的发布包占比
  - 现有账户内第二个项目的扩张率
  moatsToBuild:
  - 一套跨工具链模板库，把热点类型、板级接口、HIL 证据和被接受的发布包结构串起来
  - 和真实加速器上线结果绑定的现场遥测与回滚阈值数据
  - 通过顾问公司、HIL 集成商和编译器生态打进嵌入式渠道
  killCriteria:
  - 聚焦滩头市场卖 12 个月之后，付费试点或签约共创客户仍少于 3 个
  - 没有任何试点能把发布准备周期缩短至少 50%，或在不并行保留整套人工流程的情况下拿到验证团队接受
  - 超过一半的合格潜在客户都坚持认为，这层发布能力必须由编译器、顾问公司或现有实验室厂商免费打包
  mermaid: |
    flowchart LR
      Wedge[One-board release wedge] --> MVP[Read-only release plane MVP]
      MVP --> Proof[Accepted proof and rollback packet]
      Proof --> Expansion[More programs and partner channels]
investorMemo:
  verdict:
    call: 观察
    conviction: 切口逻辑很强，但在真实客户把活跃加速器采用和独立预算都证明出来之前，判断仍应停在中低确信度。
    whyBelieve: 邻近的 HLS、HIL、OTA 和可观测性预算本来就存在，而且没有哪家现有厂商明显拿下了跨这些系统的中立发布运营层。
    whyDoubt: 如果大多数团队最终停在实验室试点，或者编译器厂商把足够多的证明、发布和遥测工作流打进自家栈里，这个类别就可能长不起来。
    nextDiligence: 确认 ICP 里至少有 3–5 个真实在跑的板卡项目，并拿下一个付费试点，用真实加速器工件产出一份被接受的证明包和回滚包。
  firstCustomer:
    title: 第一次做加速器发布的机器人控制器项目负责人
    profile: 一家 100–800 人的仓储机器人或工业自动化 OEM，拥有 20–60 名嵌入式工程师、一块 FPGA 控制板，且某个发布正被电机控制或传感器融合时延卡住。
    trigger: 某个明确发布没打到实时或功耗目标，管理层批准上 FPGA 加速，而团队既没有内部 RTL 组织，也没有可复用的发布流程。
    buyer: 嵌入式工程 VP 或机器人平台负责人
    initialContract: $50K-$100K 的付费试点，先服务一个板卡项目；如果第一份发布包进入量产评审，就转成每个活跃加速器项目约 $125K-$175K 的年度订阅，另加导入费。
  mustBeTrue:
  - 至少 5 个目标账户确认，它们已经在真实的 2026–2027 板卡项目上尝试编译生成或传统 HLS 加速器，而不只是实验室演示。
  - 一套只读工作流，能在一个真实项目里把从候选热点到发布评审包被接受的时间至少砍掉 50%。
  - 验证负责人愿意在人工签字前提下接受平台生成的证明包，而不是要求每次加速器发布都再走一套完全独立的手工流程。
  - 买家愿意从现有工具预算里，为每个活跃项目支付大约 $125K-$175K ARR，而不是要求现有厂商免费打包进去。
  - 至少有一个合作渠道在首个案例出来后，能比创始人纯外呼更快带来合格试点。
  diligenceQuestions:
  - 有多少 ICP 团队在未来 12 个月里，手上真有一个会尝试 FPGA 加速的板卡项目？
  - 在 BoolSi、Vitis HLS、Catapult 和顾问手写 HDL 之间，哪些上游工件格式最稳定、最适合先标准化？
  - 在允许生成加速器进入发布评审前，验证或安全负责人最低会接受什么样的证明包？
  - 到底是哪项 KPI 最能打开预算和转化：周期时间缩短、少花顾问费、bug 漏出更少，还是回滚风险更低？
  - 编译器厂商和顾问公司最终会合作、打包，还是堵住一个中立发布控制平面？
operatingAssumptions:
- assumption: 已经有足够多的 ICP 团队在尝试加速器发布，足够支撑公司在类别真正放大前先打透一个聚焦滩头市场。
  basis: research.yaml
  validationTest: 访谈 10 家 OEM 和 5 家顾问公司或 HIL 集成商，确认至少 5 个符合 ICP 的 2026–2027 在跑板卡项目愿意评估付费试点。
  decisionImpact: 如果不成立，就把支持范围先扩到顾问构建或传统 HLS 流程，并在采用速度追上来前推迟按类别招人。
- assumption: 买家愿意为每个活跃项目支付大约 $125K-$175K ARR 的独立软件预算。
  basis: research.yaml
  validationTest: 从已经在相邻 HLS、HIL、OTA 或遥测工具上花钱的账户里，拿下至少 3 个年化价值高于 $100K 的付费试点或量产预算 LOI。
  decisionImpact: 如果不成立，就把产品改成合作方分发的模块或服务驱动工作流，而不是独立平台。
- assumption: 一层只读工作流能在不进关键路径的前提下，产出被接受的证明、版本和回滚工件。
  basis: idea.yaml
  validationTest: 和 1 个共创客户做 POC，用真实编译器输出、HIL 日志和固件发布记录跑一遍，并拿到客户验证负责人的书面认可，确认这份包对发布评审有用。
  decisionImpact: 如果不成立，实施负担和信任摩擦都会大幅抬升，产品就得先收窄成分析或顾问式工作流。
- assumption: 支持非 BoolSi 的上游流程，既是对冲类别时点的必要条件，技术上也能在不靠重定制服务的情况下做到。
  basis: research.yaml
  validationTest: 前 12 个月至少上线 1 条传统 HLS 流和 1 条顾问构建或手工 FPGA 流，并在 2 次客户或合作方评估里用起来。
  decisionImpact: 如果不成立，公司就会过度暴露在单一编译器生态里，可服务市场会明显缩小。
- assumption: 前几次部署可以被标准化到第 5 个量产账户时还保得住软件式毛利。
  basis: operator judgment
  validationTest: 在保持试点结果指标不变的前提下，把每个账户的实施工时从前两个试点到第 5 次量产部署至少压低 30%。
  decisionImpact: 如果不成立，招聘、定价和融资需求都会上升，公司可能得接受一个更低毛利的解决方案模式。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 位机器人和工业 OEM 的嵌入式平台、验证与可靠性负责人，再加上相邻顾问公司。
  hypothesis: 第一笔预算会围绕某个明确板卡发布中的时延或功耗失手打开，而不是围绕泛泛的 FPGA 工具兴趣。
  successMetric: 10 次访谈能确认触发点、预算拍板人、当前发布流程，以及愿意评估试点。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 做一个共创客户原型：吃进一套加速器工件、固件元数据和 HIL 轨迹，然后输出一份模拟的证明包和回滚包。
  hypothesis: 只读工件层已经足够做出一份验证团队愿意审的东西，不必深度替换工具链。
  successMetric: 1 个共创客户评审这份包，并确认至少 80% 的发布评审必备内容已经具备或易于适配。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 在真实控制器项目上跑 2 个付费试点：一个走生成加速器流，一个走传统 HLS 或顾问构建流。
  hypothesis: 这个切口对不止一种上游来源都成立，而且能把发布准备时间至少压缩 50%。
  successMetric: 签下 2 个付费试点，且至少 1 个试点达到周期时间目标并进入正式发布评审。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 把创始人直销和顾问公司/HIL 集成商带来的试点动作对着做 A/B 测试。
  hypothesis: 一旦有了第一份证明工件和案例，合作方带路能更快建立信任、也更顺地把单子推进。
  successMetric: 1 个合作方来源的试点，比可比的直销路径至少快 25% 成交，或在占用更少创始人时间的情况下拿到更高成单率。
  owner: 创始销售
- horizon: 6–12 个月
  experiment: 把 1 套 OTA 发布包系统和 1 个遥测栈接进试点账户。
  hypothesis: 分阶段发布和运行时证据是量产转化的硬条件，不是可有可无的扩展模块。
  successMetric: 2 个试点账户在量产决策流程里用到分阶段发布元数据和发布后遥测挂钩。
  owner: 解决方案架构师
- horizon: 12–18 个月
  experiment: 让 2 个量产客户从一个板卡项目扩到第二个加速器项目。
  hypothesis: 在进入新垂类或新地域之前，账户内扩张这条路要先跑通。
  successMetric: 2 个客户新增第二个纳管加速器项目，并以不低于原账户水平完成续约。
  owner: 产品负责人
operations:
- 早期部署里，产品始终保持只读；每一份输出都要挂回源工件、人工审批和版本历史。
- 维护上游编译器/HLS 输出和下游 HIL、OTA、遥测系统的适配库，而不是自己重造这些层。
- 每个试点都先量化发布准备时间、证明包接受度、回滚就绪度和发布后事故信号，再谈扩张。
- 每周和嵌入式、验证、现场可靠性负责人一起开联合发布评审，把人工覆盖和缺失证据记下来。
- 给顾问公司和 HIL 集成商打包标准化伙伴打法，避免部署再次退化成定制项目管理。
team:
- role: 创始工程师
  startTiming: 第 0 月
  rationale: 搭核心的工件摄取、证明包和工作流引擎——这就是切口本体。
- role: 创始销售
  startTiming: 第 0 月
  rationale: 负责 ICP 摸排、签下付费试点，并把早期发布结果变成可复制需求。
- role: FPGA 验证产品负责人
  startTiming: 第 0 月
  rationale: 把加速器准入、HIL 证据和发布评审要求翻成客户愿意信的产品逻辑。
- role: 解决方案架构师
  startTiming: 第 4 月
  rationale: 把固件仓库、实验室工具、OTA 元数据和遥测集成标准化，避免试点摊成定制服务。
- role: 嵌入式可靠性工程师
  startTiming: 第 8 月
  rationale: 负责量产转化所需的上线闸门、遥测模型和回滚逻辑。
- role: 合作负责人
  startTiming: 第 12 月
  rationale: 在首批案例出来后，把顾问公司、HIL 和上游工具关系变成可重复的获客管道。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2–3 个仓储机器人或工业自动化付费共创客户，每家都要有 1 个正在跑的控制板项目。
  - 上线一套只读发布控制平面，能针对至少 2 条上游流程产出热点排序、证明包、固件配对和回滚元数据。
  - 做完 2 个付费试点，并让至少 1 个在真实加速器发布上转入量产使用。
  - 发布 1 个案例，证明周期时间缩短且验证工作流被接受。
- horizon: 12–24 个月
  items:
  - 做到 3–5 个量产客户，并拿下至少 2 个来自合作方转介的部署。
  - 把 1 套 HIL 栈、1 套 OTA 发布包工作流和 1 套遥测系统做成标准化集成——而且要覆盖大多数合格商机。
  - 把每个新账户的实施工时相对前两个试点至少压低 30%。
  - 让至少 2 个客户从 1 个纳管加速器项目扩到多个板卡项目。
- horizon: 24–36 个月
  items:
  - 做到大约 30 家客户或约 36 个活跃纳管加速器项目，对齐研究里第 3 年的 SOM 情形。
  - 在扩到更强监管或更偏 ASIC 的工作流之前，先成为机器人和工业客户里的中立发布底账系统。
  - 用累计下来的证明包、遥测和回滚数据，推出基准与策略模板，进一步拉动续约与合作渠道。
risks:
- risk: 软件到 FPGA 的采用长期停在试点
  likelihood: High
  impact: High
  mitigation: 尽早支持传统 HLS 和顾问构建的 FPGA 输出，这样在生成硅采用真正成熟前，产品也能先服务真实加速器项目。
- risk: 编译器或 HLS 厂商把足够多的发布工作流打包进去
  likelihood: High
  impact: High
  mitigation: 保持工具链中立，并在跨栈证明打包、发布协同和现场反馈闭环上做得比单一厂商栈更深。
- risk: 验证或安全负责人不接受自动生成的证据，用在安全相关发布上
  likelihood: Medium
  impact: High
  mitigation: 让人始终在审批环里，把等价性结论和 HIL 轨迹、可审计的回滚阈值绑在一起，并把产品定位成结构化发布支持，而不是自动签核。
- risk: 早期部署因客户工件和实验室流程过于异构而变成重服务
  likelihood: Medium
  impact: Medium
  mitigation: 先设最低工件就绪门槛，尽快把第一批适配器产品化，并在标准化提升前把导入单独收费。
- risk: 第一个滩头市场太窄，seed 融资前跑不出足够获客管道
  likelihood: Medium
  impact: Medium
  mitigation: 只有在首批机器人案例和合作渠道都开始工作后，再扩到相邻的工业自动化和工业视觉项目。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要覆盖 18 个月跑道：把只读发布控制平面做出来，招齐核心产品与解决方案团队，拿下 2–3 个共创客户，做完 2 个付费试点，支持至少 2 条上游加速器流程，并在进入 seed 轮前证明首批量产转化可以复制。
