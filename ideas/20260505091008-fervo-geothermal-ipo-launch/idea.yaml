topRisks:
  - name: Deal volume starts narrow
    description: Enhanced geothermal commercial deals may ramp slower than expected, limiting early software volume.
    mitigation: Start with data-center developers that are actively shopping for firm clean power and design the workflow to extend into adjacent firm-power categories once the first customers are live.
  - name: Hard-to-get project data
    description: Developers may resist sharing enough technical information to support standardized underwriting.
    mitigation: Begin on the buyer side with diligence checklists and redline workflow, then earn seller participation by showing faster close rates for projects that provide structured data.
  - name: Buyers build internally
    description: Large hyperscalers or utilities may prefer in-house teams and custom tools for power procurement.
    mitigation: Target mid-market colocation platforms and infrastructure funds first, where the pain is acute but internal geothermal expertise is thin, and build a benchmark network they cannot easily recreate alone.
