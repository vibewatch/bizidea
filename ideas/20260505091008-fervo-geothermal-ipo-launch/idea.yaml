    signalRefs: [Institutional capital is ready for geothermal risk]
    sourceRefs: [3]
  - point: Oilfield-derived drilling and sensing methods create monitorable milestones that software can standardize across deals, reducing first-of-a-kind friction.
    signalRefs: [Oilfield-style execution is making geothermal more software-manageable]
    sourceRefs: [3]
differentiator: Most energy procurement software is generic PPA workflow or power-market analytics. This product is purpose-built for enhanced geothermal, where reservoir uncertainty, drilling execution, and contract structure all have to be translated into one shared underwriting language for buyers and sellers. Its moat is the structured dataset of geothermal diligence questions, milestone evidence, and negotiated fallback terms gathered across early commercial deals.
