problem: Data-center developers and power origination teams urgently need firm, clean electricity for new campuses, but enhanced geothermal projects are still evaluated through bespoke consultant memos, spreadsheets, and legal redlines. That slows PPAs and capacity reservations right when scarce 24/7 power is becoming a gating factor for site selection. Novel reservoir and construction risk also makes internal investment committees hesitant to back geothermal deals without a repeatable underwriting process.
targetUser:
  primary: VP Power or Head of Energy Procurement at US colocation and AI data-center developers pursuing 50-300 MW campuses in western power markets
  secondary: Business development teams at enhanced geothermal developers selling first-of-a-kind PPAs
  buyer: VP Power Procurement or Chief Development Officer at a regional data-center platform
startupThesis:
  nonObviousInsight: The bottleneck is no longer proving enhanced geothermal can work; it is translating geothermal project risk into a procurement and finance workflow that data-center buyers, lenders, and insurers can all sign off on quickly.
  beachhead: Power origination teams at mid-market US data-center developers that are evaluating their first geothermal-backed power contract for a new western campus
  wedge: A geothermal offtake underwriting workspace that standardizes reservoir diligence, construction milestone tracking, and contract fallback language into a buyer-ready deal room
  whyNowCatalyst: Fervo’s IPO launch and the surrounding coverage show capital is available and data-center demand is real, so the next bottleneck shifts to faster diligence and contracting for geothermal power deals.
  ventureScalePath: Start as the system of record for geothermal PPA underwriting, then expand into firm-clean-power procurement across geothermal, long-duration storage hybrids, and other hard-to-bank infrastructure categories where buyers need shared diligence and risk monitoring.
solution: The product gives power buyers a structured workspace for evaluating geothermal projects before signing PPAs or reserving capacity. It ingests developer data rooms, organizes technical and commercial diligence into comparable scorecards, tracks milestone evidence from drilling and construction, and flags contract terms that do not match the buyer’s risk posture. For sellers, it provides a repeatable package for answering buyer, lender, and insurer questions once instead of rebuilding diligence for every deal. Over time, the platform becomes the benchmark layer for which project milestones and contract structures actually predict on-time, on-spec geothermal delivery.
goToMarketSeed:
  firstCustomer: A western US colocation developer with two to five planned AI campuses that has clean-power mandates but no in-house geothermal underwriting team
  buyingTrigger: A new campus enters power procurement and the local utility cannot offer enough firm capacity on the required timeline
  currentAlternative: Energy consultants, internal spreadsheets, outside counsel, and bespoke project-finance diligence
  switchingReason: The platform compresses months of fragmented geothermal diligence into a shared workflow with standardized risk language, helping the buyer move faster without taking opaque reservoir risk onto its balance sheet
  pricingHypothesis: Annual SaaS fee by active campus plus a success fee per megawatt of contracted geothermal capacity
