jobsToBeDone:
  - job: When a new data-center campus needs firm clean power fast, help the power procurement lead compare geothermal options and package the risk for internal approval, so they can secure capacity before competitors do.
    currentAlternative: Consultant-led diligence and spreadsheet-based PPA evaluation
    successMetric: Time from first project review to signed term sheet
  - job: When an enhanced geothermal developer enters talks with an unfamiliar buyer, help the development team present a standardized diligence package, so they can shorten sales cycles and reduce repetitive technical reviews.
    currentAlternative: Custom data rooms and one-off email Q&A
    successMetric: Number of diligence cycles required before commercial agreement
