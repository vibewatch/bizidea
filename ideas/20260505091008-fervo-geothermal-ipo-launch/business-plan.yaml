slug: geothermal-offtake-underwriting-os
date: 2026-05-05
executiveSummary: >-
  This company will sell workflow software that helps western U.S. data-center
  power teams underwrite, negotiate, and monitor enhanced-geothermal PPAs before
  scarce firm clean power is locked up. The first customer is a mid-market
  colocation or AI-campus developer pursuing a 50-300 MW campus and facing a
  utility timeline that cannot meet energization needs. The immediate pain is
  that geothermal diligence is still handled through consultant memos,
  spreadsheets, and legal redlines, which slows term sheets and makes internal
  investment committees treat geothermal as opaque risk. The product wedge is a
  shared underwriting workspace that standardizes reservoir diligence,
  construction milestones, insurer and lender questions, and fallback contract
  language into one auditable deal room. The timing is supported by Fervo's IPO
  launch, reported cornerstone demand, signed utility PPAs, and a disclosed
  multi-gigawatt development pipeline, all against rising data-center power
  demand. The researched beachhead is attractive but small, with a modeled
  beachhead TAM of $31.5M, so the company must first win geothermal proof and
  then expand into adjacent firm-clean-power underwriting categories. Go to
  market should start with founder-led sales into live campus procurements, then
  add seller-side reuse and advisor referrals once the first buyer deployment is
  in production. The main gaps are still factual rather than storytelling:
  near-term deal volume, seller willingness to share technical evidence, and
  pricing acceptance all need validation before a strong seed case exists.
problem:
  - >-
    Data-center site selection is increasingly gated by firm power availability,
    but enhanced-geothermal diligence is still bespoke, slow, and hard for
    investment committees to compare across projects.
  - >-
    Buyers without in-house geothermal expertise and sellers running one-off data
    rooms both waste time across consultants, counsel, and spreadsheet workflows,
    delaying capacity reservations and PPA execution.
solution:
  - >-
    Build a geothermal underwriting workspace that ingests seller data rooms and
    structures technical, commercial, and contractual diligence into a single
    buyer-ready scorecard.
  - >-
    Pair milestone evidence tracking with clause libraries and approval workflows
    so buyers, sellers, advisors, and insurers can reuse one shared diligence
    package instead of recreating it for every deal.
whyWeWin:
  - >-
    The product is purpose-built for geothermal bankability, linking reservoir
    evidence, drilling execution, insurance questions, and contract fallback
    terms rather than treating the deal as a generic renewable PPA.
  - >-
    The wedge targets mid-market data-center developers where time-to-power is
    urgent but internal geothermal underwriting depth is thin, making the pain
    acute and the incumbent default mostly services-based.
  - >-
    Cross-deal milestone, clause, and diligence-response data can compound into a
    defensible benchmark layer that adjacent workflow vendors do not yet own.
strategicChoices:
  beachhead: >-
    Western U.S. mid-market data-center developers evaluating their first
    geothermal-backed PPA or capacity reservation for a new 50-300 MW campus.
  wedgeRationale: >-
    This entry point reaches a buyer with an immediate board-level trigger
    time-to-power for a campus while avoiding broader renewable procurement where
    incumbents already have scale and the problem is less specialized.
  sequencingRationale: >-
    Start on the buyer side because a live procurement creates urgency, budget,
    and a clear first workflow; then use that buyer deployment to pull in sellers
    as reusable diligence publishers; then formalize advisor, insurer, and
    independent-engineer participation once the product has one accepted
    milestone schema and reference outcome.
  notYet:
    - Generic wind and solar procurement workflow
    - Hyperscaler custom tooling programs
    - Post-COD geothermal plant operations software
    - Asia-Pacific expansion before western U.S. proof
market:
  tam: >-
    $31.5M beachhead TAM based on 75 active U.S. buyer and developer accounts at
    roughly $420k blended annual value per active account.
  sam: >-
    $12.6M immediate SAM based on 30 near-term western buyer, seller, and
    investor accounts likely to run live geothermal procurements in the next few
    years.
  som: >-
    $4.2M year-3 SOM based on winning 10 live accounts through a high-touch
    enterprise motion.
  segments:
    - Mid-market western data-center developers and colocation platforms
    - Enhanced-geothermal developers and their financing or advisory counterparts
  buyingProcess: >-
    The sale should begin when a campus power team enters live procurement and
    pulls in outside advisors, legal counsel, and internal approval stakeholders.
    The economic buyer is the executive accountable for site development and
    time-to-power, with technical reviewers and counsel shaping the workflow
    requirements.
product:
  mvp: >-
    Version one should include secure document ingestion, a geothermal diligence
    checklist, milestone evidence tracker, issue log, and contract fallback
    library for one active campus workflow. It should support buyer-side
    evaluation first, with seller-facing publishing limited to structured
    responses and permissioned document sharing.
  sixMonth: >-
    Launch a buyer-side MVP for one geothermal procurement with scorecards,
    milestone tracking, role-based access, and exportable approval memos.
  twelveMonth: >-
    Add seller-side reusable diligence packages, benchmark views across early
    deals, and workflow integrations for outside counsel and independent
    engineers.
  twentyFourMonth: >-
    Extend the same underwriting object to adjacent firm-clean-power categories
    such as geothermal plus storage hybrids or other hard-to-bank clean
    infrastructure deals.
  keyBets:
    - Buyers will treat geothermal underwriting as a distinct software workflow, not just advisor work product
    - Sellers will share enough technical and construction evidence to standardize milestones
    - A narrow ontology can reduce cycle time without forcing the company into heavy engineering services
    - Adjacent firm-power categories will accept the same underwriting schema after geothermal proof
gtm:
  wedge: >-
    Sell a campus-specific geothermal underwriting workspace into the first live
    procurement where a buyer needs firm clean power faster than the utility can
    provide it.
  channels:
    - Founder-led direct sales into live campus power procurements
    - Developer-led distribution through reusable buyer-facing diligence rooms
    - Referral partnerships with energy procurement advisors, independent engineers, and project-finance counsel
  funnelTargets: "Lead→qualified pilot 20-30%; pilot→paid production 50%+; paid account→second campus or seller expansion within 12 months 30%+"
  pricing: >-
    Start with an annual subscription priced per active campus procurement plus a
    one-time implementation and data-onboarding fee; test a limited
    megawatt-linked expansion component only after validating that buyers do not
    view it as a conflict with neutral underwriting.
businessModel:
  revenueStreams:
    - Annual subscription per active campus procurement
    - Implementation and data-onboarding fees
    - Seller and advisor benchmark modules after initial dataset formation
  unitOfValue: Active campus procurement workflow under management
  targetGrossMarginPct: 70
  expansionLevers:
    - Multi-campus expansion within the same buyer account
    - Seller-side subscriptions for reusable diligence publishing
    - Advisor and insurer seats around live deals
    - Extension into adjacent firm-clean-power underwriting categories
strategyMap:
  northStarMetric: Contracted geothermal megawatts managed through the platform that reach signed term sheet or PPA
  inputMetrics:
    - Number of live buyer design partners
    - Time from data-room ingest to buyer approval memo
    - Pilot-to-production conversion rate
    - Seller data package completion rate
    - Number of reusable benchmarked clauses and milestones
  moatsToBuild:
    - Proprietary geothermal diligence ontology accepted by buyers and sellers
    - Benchmark dataset linking milestones and contract structures to commercial outcomes
    - Embedded workflow position with advisors, counsel, and independent engineers
  killCriteria:
    - Fewer than 3 qualified live campus design partners after 6 months of founder-led selling
    - No buyer willing to pay at least $75k for a pilot after 10 structured discovery processes
    - Seller data-sharing pilots fail to produce a minimum viable milestone schema across 3 projects
  mermaid: |
    flowchart LR
      Wedge[Western data-center geothermal procurement] --> MVP[Buyer-side underwriting workspace]
      MVP --> Proof[Paid pilot and signed term sheet]
      Proof --> Expansion[Seller reuse and advisor channel]
      Expansion --> Platform[Adjacent firm-clean-power underwriting]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong timing and pain, but the initial market is small and live deal volume still needs proof
    whyBelieve: Data-center power scarcity and geothermal commercialization create a real workflow gap that existing PPA and VDR platforms do not solve.
    whyDoubt: The beachhead TAM is only tens of millions and may not compound into venture scale unless the company wins credible expansion into adjacent firm-power workflows.
    nextDiligence: Confirm at least three live western campus procurements and one paid buyer pilot that replaces consultant-spreadsheet workflow rather than merely documenting it.
  firstCustomer:
    title: VP Power at a western colocation platform pursuing its first geothermal-backed campus
    profile: A developer with two to five planned AI or colocation campuses, one live 50-300 MW site in procurement, and no dedicated geothermal underwriting team.
    trigger: Utility service or grid upgrades miss the campus energization timeline, forcing evaluation of firm clean power alternatives now.
    buyer: VP Power Procurement or Chief Development Officer
    initialContract: Pilot covering one active campus at roughly $75k-$150k, with conversion to a $200k-$400k annual subscription if the workflow reaches term sheet and expands to additional campuses or seller collaboration.
  mustBeTrue:
    - At least 10 western buyer teams will run real geothermal procurements in the next 24 months
    - Buyers will pay software budgets above specialist-advisor spend to compress geothermal diligence cycle time
    - Sellers will share enough drilling, reservoir, and construction evidence to power a standardized workflow
    - LevelTen, Pexapark, Ansarada, and advisors will not close the subsurface-diligence gap fast enough to preempt the wedge
    - The geothermal schema will transfer into at least one adjacent firm-clean-power category by year 3
  diligenceQuestions:
    - How many live western campus procurements are genuinely evaluating geothermal today
    - Which artifacts do buyers need for internal approval that current advisors do not already provide
    - What percentage of seller technical evidence can be shared pre-NDA and post-NDA
    - Will buyers accept campus-based subscription pricing or force pure services economics
    - What specific adjacent category can reuse the underwriting object with minimal product rewrite
  riskHeatmap:
    - risk: Near-term geothermal deal volume is too thin for repeatable enterprise sales
      likelihood: High
      impact: High
      leadingIndicator: Fewer than 5 credible live buyer opportunities enter pipeline in the first 9 months
      mitigation: Start with concentrated western buyers and build product primitives that can extend into adjacent firm-power categories without a full rebuild.
    - risk: Sellers refuse to share sufficient technical and construction evidence
      likelihood: Medium
      impact: High
      leadingIndicator: Pilot developers will only provide generic documents and cannot populate a consistent milestone schema
      mitigation: Begin with buyer-side checklists and approval workflows, then earn seller participation by showing faster diligence cycles and tighter permission controls.
    - risk: Buyers default to advisors, spreadsheets, or internal tools instead of new software
      likelihood: Medium
      impact: High
      leadingIndicator: Discovery calls end in requests for consulting deliverables rather than workflow access
      mitigation: Price around a live procurement outcome, show measurable cycle-time reduction, and package advisor participation inside the workflow.
    - risk: Adjacent incumbents add geothermal-specific templates before the startup builds data moats
      likelihood: Medium
      impact: Medium
      leadingIndicator: Existing PPA or VDR vendors release geothermal diligence modules and win lighthouse buyers
      mitigation: Move quickly on domain-specific ontology, benchmark data, and reference customers that prove better underwriting outcomes rather than generic workflow breadth.
operatingAssumptions:
  - assumption: Western mid-market data-center developers will run enough live geothermal procurements to support 3 paid pilots in the first 12 months
    basis: research.yaml
    validationTest: Interview 10 ICP buyers and secure 3 signed design-partner LOIs tied to active campus procurement timelines
    decisionImpact: If false, expand the initial wedge sooner to adjacent firm-clean-power procurements instead of staying geothermal-only
  - assumption: Geothermal developers and advisors will share enough subsurface and construction evidence to create a reusable milestone schema
    basis: research.yaml
    validationTest: Run 3-5 pilot data-room trials and verify at least 80% of required milestone fields can be populated from real project materials
    decisionImpact: If false, narrow the product to buyer-side approval and redline workflow rather than shared underwriting infrastructure
  - assumption: Buyers will accept annual campus-based software pricing in the $200k-$400k range after a pilot
    basis: idea.yaml
    validationTest: Test pilot proposals with 5 buyers and convert at least 2 to annual subscriptions without attaching heavy consulting scope
    decisionImpact: If false, the company must reduce implementation load, change pricing basis, or accept lower ACVs and a different funding plan
  - assumption: The product can go live in less than 4 weeks per deal without building a services-heavy engineering organization
    basis: operator judgment
    validationTest: Measure implementation time, manual analyst hours, and custom template requests across the first 3 deployments
    decisionImpact: If false, gross-margin targets and pre-seed capital needs both change materially
  - assumption: The geothermal underwriting object will transfer to at least one adjacent firm-clean-power category by year 3
    basis: operator judgment
    validationTest: Prototype one adjacent workflow by month 18 and confirm 2 design partners see over 70% schema reuse
    decisionImpact: If false, the company remains a niche vertical tool with weaker venture-scale potential
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Run structured discovery with western data-center power teams and collect real geothermal diligence artifacts
    hypothesis: Buyers experience geothermal offtake as a distinct approval workflow pain worth dedicated software budget
    successMetric: 10 interviews completed and 3 buyers share live checklists, redlines, or approval memo structures
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Secure 3 design-partner LOIs tied to named campus procurements
    hypothesis: Time-to-power urgency will convert discovery into committed pilot demand
    successMetric: 3 signed LOIs with live procurement dates and identified executive sponsors
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Pilot seller-side data ingestion with 3 geothermal developers or advisors
    hypothesis: A reusable milestone schema can be populated from real project data without exposing unacceptable IP
    successMetric: 80% of MVP fields completed across 3 projects and fewer than 10 material confidentiality objections
    owner: Geothermal diligence lead
  - horizon: 90–180 days
    experiment: Deploy MVP on one active buyer workflow with scorecards, issue logs, and clause library
    hypothesis: The product can reduce diligence coordination time versus spreadsheet and email workflows
    successMetric: Buyer reports at least 30% reduction in time to internal approval package
    owner: Founding eng
  - horizon: 180–360 days
    experiment: Convert pilot to annual production contract and add one additional campus or seller participant
    hypothesis: Value persists beyond a one-off diligence sprint and expands within the same account ecosystem
    successMetric: 1 paid annual contract and 1 intra-account expansion event
    owner: Founder CEO
  - horizon: 180–360 days
    experiment: Formalize advisor and independent-engineer referral partnerships
    hypothesis: Trusted domain intermediaries can become a repeatable distribution and validation layer
    successMetric: 3 signed referral or workflow-standard partnerships generating 25% of qualified pipeline
    owner: Partnerships lead
operations:
  - Secure, permissioned document ingestion and NDA-aware sharing must be in place before seller-side onboarding
  - Maintain a versioned geothermal diligence taxonomy reviewed quarterly with independent engineers and project-finance counsel
  - Track each deployment against implementation time, approval-cycle compression, and benchmark-data capture to avoid sliding into custom services
  - Build a small external network of geothermal engineers, insurers, and counsel to validate milestone thresholds and fallback language
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Must own customer discovery, design-partner sales, and category framing with buyers and geothermal counterparties.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the secure workflow core, document model, and benchmark data layer fast enough to support live procurements.
  - role: Product and solutions lead
    startTiming: Month 3
    rationale: Translate buyer workflows into product requirements and keep implementations repeatable instead of custom.
  - role: Geothermal diligence lead
    startTiming: Month 6
    rationale: Codify milestone schema, validate seller evidence quality, and earn trust with independent engineers, lenders, and insurers.
  - role: Partnerships or enterprise seller
    startTiming: Month 9
    rationale: Turn early buyer proofs into a pipeline through developers, advisors, and multi-campus expansion.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 design partners tied to live campus procurements
      - Launch MVP and complete 1 paid buyer pilot
      - Prove one reusable milestone schema across at least 3 geothermal projects
      - Convert first pilot into an annual production contract
  - horizon: 12–24 months
    items:
      - Reach 5-7 annual accounts across buyers, sellers, and advisors
      - Publish first benchmark dataset for milestone evidence and fallback clauses
      - Add seller-side reusable diligence publishing and advisor workflow integrations
      - Validate one adjacent firm-clean-power underwriting workflow
  - horizon: 24–36 months
    items:
      - Reach 10 live annual accounts and roughly the modeled $4.2M SOM
      - Expand beyond geothermal into at least one adjacent bankability workflow
      - Establish the platform as the default shared workspace for buyer, seller, and advisor underwriting on target deals
risks:
  - risk: Near-term enhanced-geothermal commercial deal volume ramps slower than expected
    likelihood: High
    impact: High
    mitigation: Keep the beachhead narrow, prove one buyer workflow first, and design the product for adjacent firm-power expansion.
  - risk: Seller data access is too limited to support standardized benchmarks
    likelihood: Medium
    impact: High
    mitigation: Start from buyer-side workflows, build strong permissioning, and use early proofs to earn deeper seller participation.
  - risk: Buyers prefer consultants and internal tools over a new workflow product
    likelihood: Medium
    impact: High
    mitigation: Anchor sales in live procurements, measure cycle-time reduction, and package advisors inside the product rather than competing with them head on.
  - risk: Generic procurement or PPA platforms move into geothermal before the startup has data moats
    likelihood: Medium
    impact: Medium
    mitigation: Differentiate on domain ontology, benchmark data, and reference outcomes instead of generic document workflow.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to build the secure underwriting MVP, hire the initial domain
    and product team, complete 3-5 design-partner deployments, and prove a paid
    buyer-to-production conversion motion before broader category expansion.
