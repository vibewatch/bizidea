slug: geothermal-offtake-underwriting-os
date: 2026-05-05
executiveSummary: 这家公司将销售工作流软件，帮助美国西部数据中心电力团队在稀缺的稳定清洁电力被锁定之前，对增强型地热 PPA 进行承保、谈判和监控。首个客户是正在推进 50-300 MW 园区、且面临公用事业时间表无法满足通电需求的中端托管或 AI 园区开发商。眼前的痛点在于，地热尽调仍通过顾问备忘录、电子表格和法律红线来完成，这会拖慢条款清单进度，并让内部投资委员会把地热视为不透明风险。产品切入点是一个共享承购风控工作台，将储层尽调、建设里程碑、保险方与贷款方问题以及兜底合同语言标准化，汇总到一个可审计的交易资料室中。时机由 Fervo 的 IPO 启动、基石需求报道、已签约的公用事业 PPA，以及其披露的多 GW 开发管线共同支撑，而背景是数据中心电力需求持续上升。研究得到的滩头市场有吸引力但规模不大，模型中的 TAM 为 $31.5M，因此公司必须先在地热场景中建立证明，再扩展到相邻的稳定清洁电力承保品类。GTM 应从创始人主导、面向真实园区采购的销售开始，在首个买方部署上线后，再增加卖方复用和顾问转介。当前主要缺口仍是事实层面而非叙事层面：近期交易量、卖方共享技术证据的意愿，以及定价接受度都需要验证，强有力的种子轮故事才会成立。
problem:
- 数据中心选址越来越受制于稳定电力可得性，但增强型地热尽调仍然高度定制、进展缓慢，也难以让投资委员会跨项目比较。
- 缺乏内部地热专长的买方，以及为每笔交易单独搭建数据室的卖方，都在顾问、法律顾问和电子表格工作流之间浪费大量时间，延缓容量预留和 PPA 执行。
solution:
- 构建一个地热承购风控工作台，接入卖方数据室，并将技术、商业和合同尽调整理成一套买方可直接使用的评分卡。
- 把里程碑证据跟踪与条款库、审批工作流结合起来，让买方、卖方、顾问和保险方可以复用同一套共享尽调资料，而不是为每笔交易重复搭建。
whyWeWin:
- 产品围绕地热可融资性而生，将储层证据、钻井执行、保险问题和合同兜底条款连在一起，而不是把交易当作一份普通可再生能源 PPA。
- 切入点锁定中端数据中心开发商：这些客户对获电时效极为敏感，但内部地热承保深度有限，因此痛点强、现有默认方案又主要依赖服务。
- 跨交易积累的里程碑、条款与尽调响应数据可以复利形成防御性基准层，这是相邻工作流厂商尚未占据的位置。
strategicChoices:
  beachhead: 正在为新的 50-300 MW 园区评估首份地热支持型 PPA 或容量预留的美国西部中端数据中心开发商。
  wedgeRationale: 这一切入口触达的是一个有即时董事会级触发因素——园区获电时效——的买方，同时避开了 incumbents 已有规模、且问题不够专业化的广义可再生能源采购。
  sequencingRationale: 先从买方侧切入，因为真实采购自带紧迫性、预算和清晰的首个工作流；再利用这一买方部署把卖方拉进来，作为可复用的尽调发布者；最后在产品拥有一套被接受的里程碑 schema 和参考结果后，正式引入顾问、保险方和独立工程师参与。
  notYet:
  - 通用风电和光伏采购工作流
  - 超大规模云厂商的定制工具项目
  - 商业运营后的地热电站运维软件
  - 在美国西部验证前就扩张到亚太
market:
  tam: $31.5M 的滩头市场 TAM，基于 75 个活跃美国买方和开发商账户，每个活跃账户混合年度价值约 $420k。
  sam: $12.6M 的即时 SAM，基于未来几年最可能开展真实地热采购的 30 个西部买方、卖方和投资方账户。
  som: $4.2M 的第 3 年 SOM，基于通过高触达企业销售拿下 10 个真实账户。
  segments:
  - 美国西部中端数据中心开发商和托管平台
  - 增强型地热开发商及其融资或顾问对手方
  buyingProcess: 销售应从园区电力团队进入真实采购、并拉入外部顾问、法律顾问和内部审批方时启动。经济买方是对选址开发和获电时效负责的高管，技术评审方和法律顾问则决定工作流需求。
product:
  mvp: 第一版应包括安全文档接入、地热尽调清单、里程碑证据跟踪器、问题日志，以及适用于一个活跃园区工作流的合同兜底条款库。它应先支持买方侧评估，而卖方侧发布功能仅限于结构化响应与基于权限的文档共享。
  sixMonth: 为一笔地热采购上线买方侧 MVP，具备评分卡、里程碑跟踪、基于角色的访问控制和可导出的审批备忘录。
  twelveMonth: 增加卖方侧可复用尽调资料包、跨早期交易的基准视图，以及面向外部法律顾问和独立工程师的工作流集成。
  twentyFourMonth: 将同一承保对象扩展到相邻的稳定清洁电力类别，如地热加储能混合体或其他难以融资的清洁基础设施交易。
  keyBets:
  - 买方会把地热承保视为独立的软件工作流，而不仅是顾问交付物
  - 卖方会分享足够多的技术与建设证据，以实现里程碑标准化
  - 狭窄本体可以在不把公司拖入重工程服务的情况下缩短周期
  - 在地热场景验证后，相邻稳定电力类别会接受同一承保 schema
gtm:
  wedge: 在首个真实采购场景中，向需要比公用事业更快获得稳定清洁电力的买方销售一套按园区定制的地热承购风控工作台。
  channels:
  - 由创始人主导、直接销售给正在进行园区电力采购的团队
  - 通过可复用、面向买方的尽调数据室，由开发商带动分发
  - 与能源采购顾问、独立工程师和项目融资律师建立转介合作
  funnelTargets: 线索→合格试点 20-30%；试点→付费正式部署 50%+；付费账户→12 个月内扩展到第二园区或卖方侧 30%+
  pricing: 先按活跃园区采购收取年度订阅费，并叠加一次性实施和数据接入费用；只有在确认买方不会将其视为与中立承保相冲突之后，再测试有限的与兆瓦数挂钩的扩展收费。
businessModel:
  revenueStreams:
  - 按活跃园区采购收取年度订阅费
  - 实施与数据接入费用
  - 初始数据集形成后的卖方和顾问基准模块
  unitOfValue: 被管理的活跃园区采购工作流
  targetGrossMarginPct: 70
  expansionLevers:
  - 同一买方账户内的多园区扩展
  - 面向卖方的可复用尽调发布订阅
  - 围绕真实交易的顾问和保险方席位
  - 扩展到相邻稳定清洁电力承保类别
strategyMap:
  northStarMetric: 通过平台管理并进入已签条款清单或 PPA 阶段的已签约地热兆瓦数
  inputMetrics:
  - 活跃买方设计合作伙伴数量
  - 从数据室接入到买方审批备忘录的时间
  - 试点转正式部署转化率
  - 卖方数据资料包完成率
  - 可复用的基准条款和里程碑数量
  moatsToBuild:
  - 被买卖双方接受的专有地热尽调本体
  - 把里程碑与合同结构关联到商业结果的基准数据集
  - 与顾问、法律顾问和独立工程师深度嵌入的工作流位置
  killCriteria:
  - 创始人主导销售 6 个月后，合格的真实园区设计合作伙伴少于 3 个
  - 完成 10 次结构化需求发现后，仍无买方愿意为试点支付至少 $75k
  - 卖方数据共享试点无法在 3 个项目上产出最低可用的里程碑 schema
  mermaid: "flowchart LR\n  Wedge[美国西部数据中心地热采购] --> MVP[买方侧承购风控工作台]\n  MVP --> Proof[付费试点与已签条款清单]\n  Proof --> Expansion[卖方复用与顾问渠道]\n  Expansion --> Platform[相邻稳定清洁电力承保]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 时机与痛点都很强，但初始市场规模较小，真实交易量仍需证明
    whyBelieve: 数据中心电力稀缺与地热商业化共同创造出一个真实的工作流缺口，而现有 PPA 与 VDR 平台并不能解决它。
    whyDoubt: 滩头市场 TAM 仅为数千万美元；除非公司能可信地扩展到相邻稳定电力工作流，否则难以复利到风险投资级规模。
    nextDiligence: 确认至少三个正在进行的美国西部园区采购，以及一个真正替代顾问+表格工作流、而不仅是把它文档化的付费买方试点。
  firstCustomer:
    title: 一家美国西部托管平台中负责电力的 VP，正为其首个由地热支持的园区推进采购
    profile: 一家开发商规划了两个到五个 AI 或托管园区，其中一个 50-300 MW 场站正处于采购中，且没有专门的地热承保团队。
    trigger: 公用事业供电或电网升级无法匹配园区通电时间表，被迫立即评估稳定清洁电力替代方案。
    buyer: 电力采购副总裁或首席开发官
    initialContract: 针对一个活跃园区的试点，金额约为 $75k-$150k；如果工作流推进到条款清单并扩展到额外园区或卖方协作，则转为 $200k-$400k 的年度订阅。
  mustBeTrue:
  - 未来 24 个月内，至少有 10 个美国西部买方团队会发起真实地热采购
  - 买方愿意支付高于专业顾问费用的软件预算，以压缩地热尽调周期
  - 卖方会分享足够多的钻井、储层和建设证据来驱动标准化工作流
  - LevelTen、Pexapark、Ansarada 以及顾问不会足够快地补上地下尽调缺口，从而提前堵死切入口
  - 到第 3 年，地热 schema 能迁移到至少一个相邻的稳定清洁电力类别
  diligenceQuestions:
  - 今天究竟有多少真实的美国西部园区采购在评估地热
  - 当前顾问尚未提供的、买方为内部审批真正需要的材料有哪些
  - 卖方技术证据中有多大比例可以在 NDA 前和 NDA 后共享
  - 买方会接受按园区计费的订阅，还是会强行把经济模型压回纯服务模式
  - 哪一个具体相邻类别能在几乎不重写产品的情况下复用这一承保对象
  riskHeatmap:
  - risk: 近期地热交易量过薄，无法支持可复用的企业销售
    likelihood: 高
    impact: 高
    leadingIndicator: 前 9 个月进入销售漏斗的可信真实买方机会少于 5 个
    mitigation: 从集中的西部买方切入，并构建可在不完全重做的前提下扩展到相邻稳定电力类别的产品原语。
  - risk: 卖方拒绝分享足够的技术和建设证据
    likelihood: 中
    impact: 高
    leadingIndicator: 试点开发商只愿提供泛化文档，无法填充一致的里程碑 schema
    mitigation: 先从买方侧清单和审批工作流开始，再通过更快的尽调周期与更严密的权限控制来争取卖方参与。
  - risk: 买方更倾向于顾问、电子表格或内部工具，而不是新软件
    likelihood: 中
    impact: 高
    leadingIndicator: 需求发现电话最终变成咨询交付请求，而不是工作流访问请求
    mitigation: 围绕真实采购结果定价，展示可衡量的周期缩短，并把顾问参与打包进工作流。
  - risk: 相邻 incumbents 在公司建立数据护城河前就推出地热专用模板
    likelihood: 中
    impact: 中
    leadingIndicator: 现有 PPA 或 VDR 厂商发布地热尽调模块并拿下灯塔客户
    mitigation: 尽快在领域本体、基准数据和参考客户上建立领先，证明自己带来的是更好的承保结果，而不是更广的通用工作流。
operatingAssumptions:
- assumption: 美国西部中端数据中心开发商会启动足够多的真实地热采购，以支持前 12 个月内 3 个付费试点
  basis: research.yaml
  validationTest: 访谈 10 个 ICP 买方，并拿到 3 份与活跃园区采购时间表绑定的设计合作伙伴 LOI
  decisionImpact: 如果不成立，就应更早把初始切口扩展到相邻稳定清洁电力采购，而不是只做地热
- assumption: 地热开发商和顾问会分享足够的地下与建设证据，以形成可复用的里程碑 schema
  basis: research.yaml
  validationTest: 运行 3-5 次试点数据室测试，并验证至少 80% 的必需里程碑字段可以从真实项目材料中填充
  decisionImpact: 如果不成立，就应把产品收窄到买方侧审批与红线工作流，而不是共享承保基础设施
- assumption: 试点结束后，买方会接受 $200k-$400k 区间的按年度、按园区的软件定价
  basis: idea.yaml
  validationTest: 向 5 个买方测试试点提案，并至少将其中 2 个转为年度订阅，且不附带重咨询范围
  decisionImpact: 如果不成立，公司就必须降低实施负担、调整定价基础，或接受更低 ACV 与不同的融资计划
- assumption: 产品可以在每笔交易不到 4 周内上线，而无需建立一个服务密集的工程组织
  basis: 运营判断
  validationTest: 在前 3 次部署中测量实施时间、人工分析师工时以及定制模板请求数
  decisionImpact: 如果不成立，毛利率目标和 pre-seed 资本需求都会发生实质变化
- assumption: 到第 3 年，地热承保对象会迁移到至少一个相邻的稳定清洁电力类别
  basis: 运营判断
  validationTest: 在第 18 个月前原型化一个相邻工作流，并确认 2 个设计合作伙伴认为可复用 schema 超过 70%
  decisionImpact: 如果不成立，公司将停留在狭窄的垂直工具层，风险投资级规模潜力减弱
experimentRoadmap:
- horizon: 0–90 天
  experiment: 与美国西部数据中心电力团队开展结构化需求访谈，并收集真实地热尽调材料
  hypothesis: 买方会把地热承购视为值得配置专门软件预算的独立审批工作流痛点
  successMetric: 完成 10 次访谈，且有 3 个买方分享真实清单、红线或审批备忘录结构
  owner: 创始人 CEO
- horizon: 0–90 天
  experiment: 拿下 3 份与指定园区采购绑定的设计合作伙伴 LOI
  hypothesis: 获电时效紧迫性会把需求发现转化为确定的试点需求
  successMetric: 拿到 3 份已签 LOI，包含真实采购日期和明确的高管赞助人
  owner: 创始人 CEO
- horizon: 90–180 天
  experiment: 与 3 家地热开发商或顾问试点卖方侧数据接入
  hypothesis: 可复用的里程碑 schema 可以由真实项目数据填充，同时不暴露不可接受的知识产权
  successMetric: 在 3 个项目中完成 80% 的 MVP 字段，且重大保密异议少于 10 项
  owner: 地热尽调负责人
- horizon: 90–180 天
  experiment: 在一个活跃买方工作流上部署含评分卡、问题日志和条款库的 MVP
  hypothesis: 与电子表格和邮件工作流相比，产品能够降低尽调协调时间
  successMetric: 买方报告其内部审批资料准备时间至少缩短 30%
  owner: 创始工程师
- horizon: 180–360 天
  experiment: 把试点转化为年度正式合同，并增加一个额外园区或卖方参与方
  hypothesis: 价值不仅存在于一次性尽调冲刺中，还会在同一账户生态内持续并扩展
  successMetric: 拿下 1 份付费年度合同，以及 1 次账户内扩展事件
  owner: 创始人 CEO
- horizon: 180–360 天
  experiment: 正式建立顾问和独立工程师转介合作
  hypothesis: 被信任的领域中介可以成为可复用的分发与验证层
  successMetric: 签下 3 份转介或工作流标准合作，使其贡献 25% 的合格销售线索
  owner: 合作负责人
operations:
- 在卖方侧接入前，必须具备安全、基于权限的文档接入与感知 NDA 的共享能力
- 维护一个带版本管理的地热尽调分类体系，并由独立工程师与项目融资律师每季度复审
- 围绕实施时间、审批周期压缩和基准数据捕获来跟踪每次部署，避免滑向定制服务
- 建立一个小型外部网络，由地热工程师、保险方和法律顾问共同验证里程碑阈值与兜底语言
team:
- role: 创始人 CEO
  startTiming: 第 0 个月
  rationale: 必须负责客户需求发现、设计合作伙伴销售，以及与买方和地热对手方之间的品类叙事。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 要足够快地构建安全工作流核心、文档模型与基准数据层，以支撑真实采购。
- role: 产品与解决方案负责人
  startTiming: 第 3 个月
  rationale: 把买方工作流转化为产品需求，并让实施保持可复用，而不是走向定制。
- role: 地热尽调负责人
  startTiming: 第 6 个月
  rationale: 负责固化里程碑 schema、验证卖方证据质量，并与独立工程师、贷款方和保险方建立信任。
- role: 合作或企业销售负责人
  startTiming: 第 9 个月
  rationale: 将早期买方验证转化为通过开发商、顾问和多园区扩张形成的销售漏斗。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 3 个与真实园区采购绑定的设计合作伙伴
  - 上线 MVP 并完成 1 个付费买方试点
  - 在至少 3 个地热项目上验证一套可复用的里程碑 schema
  - 将首个试点转化为年度正式合同
- horizon: 12–24 个月
  items:
  - 在买方、卖方和顾问之间达到 5-7 个年度账户
  - 发布首版里程碑证据与兜底条款基准数据集
  - 增加卖方侧可复用尽调发布和顾问工作流集成
  - 验证一个相邻的稳定清洁电力承保工作流
- horizon: 24–36 个月
  items:
  - 达到 10 个活跃年度账户，并接近模型中的 $4.2M SOM
  - 从地热扩展到至少一个相邻的可融资性工作流
  - 把平台建立为目标交易中买方、卖方与顾问承保的默认共享工作台
risks:
- risk: 近期增强型地热商业交易量放量慢于预期
  likelihood: 高
  impact: 高
  mitigation: 保持滩头市场狭窄，先证明一个买方工作流，并把产品设计为可扩展到相邻稳定电力场景。
- risk: 卖方数据获取过于受限，无法支持标准化基准
  likelihood: 中
  impact: 高
  mitigation: 从买方侧工作流开始，建立强权限体系，并用早期验证去赢得更深的卖方参与。
- risk: 买方更偏好顾问和内部工具，而不是新的工作流产品
  likelihood: 中
  impact: 高
  mitigation: 把销售锚定在真实采购中，衡量周期压缩，并把顾问包装进产品，而不是正面与他们竞争。
- risk: 在公司建立数据护城河之前，通用采购或 PPA 平台就进入地热领域
  likelihood: 中
  impact: 中
  mitigation: 在领域本体、基准数据和参考结果上建立差异化，而不是停留在通用文档工作流层面。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 为期 18 个月的资金将用于构建安全的承购风控 MVP、招聘初始领域与产品团队、完成 3-5 个设计合作伙伴部署，并在更广泛品类扩张前证明从付费买方试点到正式部署的转化路径。
