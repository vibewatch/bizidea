slug: geothermal-offtake-underwriting-os
date: 2026-05-05
executiveSummary: >-
  这家公司将销售一套工作流软件，帮助美国西部数据中心电力团队在稀缺的稳定清洁电力被锁定前，对增强型地热 PPA 进行承保、谈判和持续跟踪。首个客户会是正在推进 50-300 MW 园区、且公用事业时间表已无法满足通电需求的中型托管或 AI 园区开发商。眼下最直接的痛点在于，地热尽调仍靠顾问备忘录、电子表格和法务红线来推进，这会拖慢 term sheet，也会让内部投资委员会把地热视为不透明风险。产品切口是一套共享承保工作台，把储层尽调、施工里程碑、保险方和贷款方问题，以及合同兜底条款整合进一个可审计的交易空间。时点之所以成立，是因为 Fervo 的 IPO 启动、已报道的基石需求、已签署的公用事业 PPA，以及披露出来的多 GW 开发管线，恰好叠加在持续上升的数据中心电力需求上。研究显示，这个滩头市场很有吸引力，但规模并不大，模型测得的滩头 TAM 为 $31.5M，所以公司必须先在地热场景里跑出可信验证，再扩展到相邻的稳定清洁电力承保品类。GTM 应先从创始人主导销售切入在途园区采购，等首个买方部署跑通后，再叠加卖方复用和顾问转介。当前最大的缺口仍偏事实验证，而不是故事包装：近期真实交易量、卖方是否愿意共享技术证据，以及市场能否接受定价，都还要再验证，种子轮逻辑才能更扎实。
problem:
  - >-
    数据中心选址越来越受稳定电力可得性限制，但增强型地热尽调仍是定制化、低效率且难以让投资委员会横向比较的流程。
  - >-
    买方缺少内部地热能力，卖方则在一遍遍重建一次性数据室，双方都把时间浪费在顾问、律师和电子表格流程上，最终拖慢容量预留与 PPA 签署。
solution:
  - >-
    搭建一个地热承保工作台，接入卖方数据室，并把技术、商业与合同尽调结构化成一套买方可直接审阅的评分卡。
  - >-
    再叠加里程碑证据跟踪、条款库和审批工作流，让买方、卖方、顾问和保险方可以复用同一套共享尽调包，而不是每笔交易都从头再做一遍。
whyWeWin:
  - >-
    这款产品是围绕地热可融资性专门设计的：它把储层证据、钻井执行、保险问题和合同兜底条款串在一起，而不是把交易当成一份普通可再生能源 PPA 来处理。
  - >-
    这个切口瞄准的是中型数据中心开发商——它们的通电时点非常紧，但内部地热承保能力又薄，因此痛点更尖锐，而现有默认方案大多还是重服务模式。
  - >-
    跨交易沉淀的里程碑、条款与尽调回复数据，会逐步形成一个有防御力的基准层，而相邻工作流厂商目前还没有掌握这层资产。
strategicChoices:
  beachhead: >-
    正在为新的 50-300 MW 园区评估首份地热支撑 PPA 或容量预留的美国西部中型数据中心开发商。
  wedgeRationale: >-
    这个切入口抓住的是一个有即时董事会级触发因素的买方——园区通电时间——同时避开更广泛的可再生能源采购市场，因为那里的现有厂商已经形成规模，问题也没这么专业化。
  sequencingRationale: >-
    先从买方侧入手，因为一笔在途采购自带紧迫感、预算和清晰的首个工作流；再借助这个买方部署把卖方拉进来，成为可复用的尽调发布方；等产品有了一个被接受的里程碑 schema 和参考结果后，再把顾问、保险方和独立工程师正式纳入流程。
  notYet:
    - 通用风电和光伏采购工作流
    - 超大云厂商的定制化工具项目
    - COD 后的地热电站运营软件
    - 在美国西部验证前就进入 Asia-Pacific
market:
  tam: >-
    滩头 TAM 为 $31.5M，基于 75 个活跃美国买方和开发商账户，以及每个活跃账户约 $420k 的综合年度价值测得。
  sam: >-
    即时 SAM 为 $12.6M，基于未来几年最可能发起实时地热采购的 30 个美国西部买方、卖方和投资者账户。
  som: >-
    第 3 年 SOM 为 $4.2M，前提是通过高触达企业销售动作赢下 10 个实时账户。
  segments:
    - 美国西部中型数据中心开发商和托管平台
    - 增强型地热开发商及其融资或顾问合作方
  buyingProcess: >-
    销售应从园区电力团队进入实时采购阶段时启动，因为这时他们会把外部顾问、法务以及内部审批干系人都拉进来。经济买方是对园区开发和通电时点负责的高管，而技术评审者与律师会共同决定工作流需求。
product:
  mvp: >-
    版本一应包含安全文档接入、地热尽调清单、里程碑证据跟踪器、问题日志，以及面向一个在途园区工作流的合同兜底条款库。第一阶段先支持买方侧评估，卖方侧能力只开放结构化回复和基于权限的文档共享。
  sixMonth: >-
    为一笔地热采购上线买方侧 MVP，覆盖评分卡、里程碑跟踪、基于角色的权限控制，以及可导出的审批备忘录。
  twelveMonth: >-
    增加卖方可复用尽调包、跨早期交易的基准视图，以及面向外部律师和独立工程师的工作流集成。
  twentyFourMonth: >-
    把同一个承保对象扩展到相邻的稳定清洁电力品类，例如地热加储能混合体，或其他难以银行化的清洁基础设施交易。
  keyBets:
    - 买方会把地热承保视为一个独立的软件工作流，而不只是顾问产出的附属文档
    - 卖方愿意共享足够多的技术和施工证据，从而形成标准化里程碑
    - 一个窄而深的本体可以压缩周期时间，而不把公司拖进重工程服务
    - 在地热跑通后，相邻稳定电力品类会接受同一套承保 schema
gtm:
  wedge: >-
    在买方需要比公用事业更快拿到稳定清洁电力的首笔在途采购中，卖出一个园区级地热承保工作台。
  channels:
    - 创始人主导、直接切入在途园区电力采购
    - 通过可复用的面向买方尽调空间，由开发商带动分发
    - 与能源采购顾问、独立工程师和项目融资律师建立转介合作
  funnelTargets: "Lead→qualified pilot 20-30%；pilot→paid production 50%+；paid account→12 个月内扩展到第二园区或卖方侧 30%+"
  pricing: >-
    先按活跃园区采购收取年度订阅费，再加一次性实施与数据接入费用；只有在验证买方不会把它视作损害中立承保的激励冲突后，再测试有限的按兆瓦挂钩扩展收费。
businessModel:
  revenueStreams:
    - 按活跃园区采购收取年度订阅费
    - 实施与数据接入费用
    - 在初始数据集形成后，向卖方和顾问出售基准模块
  unitOfValue: 在管的活跃园区采购工作流
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一买方账户内扩展到多个园区
    - 向卖方提供可复用尽调发布订阅
    - 为实时交易周边的顾问和保险方提供席位
    - 延伸到相邻的稳定清洁电力承保品类
strategyMap:
  northStarMetric: 通过平台管理、并进入已签署 term sheet 或 PPA 阶段的地热签约兆瓦数
  inputMetrics:
    - 实时买方共创客户数量
    - 从数据室接入到买方审批备忘录完成的时间
    - 试点转生产的转化率
    - 卖方数据包完成率
    - 可复用且带基准的条款与里程碑数量
  moatsToBuild:
    - 被买卖双方接受的专有地热尽调本体
    - 将里程碑和合同结构与商业结果关联起来的基准数据集
    - 与顾问、律师和独立工程师深度嵌合的工作流位置
  killCriteria:
    - 创始人主导销售 6 个月后，仍拿不到 3 个合格的实时园区共创客户
    - 做完 10 次结构化需求验证后，仍没有买方愿意为试点支付至少 $75k
    - 卖方数据共享试点在 3 个项目中仍无法产出一个最低可用的里程碑 schema
  mermaid: |
    flowchart LR
      Wedge[美国西部数据中心地热采购] --> MVP[买方侧承保工作台]
      MVP --> Proof[付费试点与已签署 term sheet]
      Proof --> Expansion[卖方复用与顾问渠道]
      Expansion --> Platform[相邻稳定清洁电力承保]
investorMemo:
  verdict:
    call: Watch
    conviction: 时点和痛点都很强，但初始市场较小，而且真实交易量仍需验证
    whyBelieve: 数据中心电力稀缺和地热商业化共同制造了一个真实的工作流缺口，而现有 PPA 与 VDR 平台都没补上。
    whyDoubt: 滩头 TAM 只有几千万美元；如果公司不能可信地扩展到相邻稳定电力工作流，就很难真正长成风险投资级别规模。
    nextDiligence: 先确认至少 3 笔美国西部在途园区采购，以及 1 个付费买方试点，而且它确实替代了顾问+电子表格工作流，而不是只把原流程文档化。
  firstCustomer:
    title: 在美国西部托管平台中负责首个地热支撑园区的 VP Power
    profile: 一家有 2 到 5 个规划中 AI 或托管园区、其中 1 个 50-300 MW 站点正处于采购中，且没有专职地热承保团队的开发商。
    trigger: 公用事业供电或电网升级赶不上园区通电时间表，逼着团队现在就评估稳定清洁电力替代方案。
    buyer: VP Power Procurement or Chief Development Officer
    initialContract: 覆盖 1 个在途园区的试点，价格约 $75k-$150k；如果工作流推进到 term sheet，并扩展到更多园区或卖方协同，再转成 $200k-$400k 的年度订阅。
  mustBeTrue:
    - 未来 24 个月里，至少会有 10 个美国西部买方团队跑真实地热采购
    - 买方愿意拿出高于专业顾问支出的软件预算，来压缩地热尽调周期时间
    - 卖方会共享足够多的钻井、储层和施工证据，支撑标准化工作流
    - LevelTen、Pexapark、Ansarada 和顾问团队来不及补上地下风险尽调缺口，从而无法提前堵死这个切口
    - 到第 3 年，这套地热 schema 至少能迁移到 1 个相邻稳定清洁电力品类
  diligenceQuestions:
    - 现在到底有多少美国西部在途园区采购真的在评估地热
    - 买方做内部审批时需要哪些材料，而这些材料是当前顾问没有提供好的
    - 卖方技术证据中，有多大比例可以在 NDA 前后分别共享
    - 买方是否接受按园区订阅定价，还是会把经济模型压回纯服务费
    - 哪个具体相邻品类能以最小产品重写成本复用这套承保对象
  riskHeatmap:
    - risk: 近期地热交易量太薄，难以支撑可重复的企业销售
      likelihood: High
      impact: High
      leadingIndicator: 前 9 个月里进入销售漏斗的可信实时买方机会少于 5 个
      mitigation: 先集中做美国西部买方，并把产品原语设计成无需整体重构就能扩展到相邻稳定电力品类。
    - risk: 卖方拒绝共享足够多的技术与施工证据
      likelihood: Medium
      impact: High
      leadingIndicator: 试点开发商只能提供泛化文档，无法填充一致的里程碑 schema
      mitigation: 先从买方侧清单和审批工作流切入，再用更快的尽调周期和更细的权限控制，换取卖方参与。
    - risk: 买方继续依赖顾问、电子表格或内部工具，而不是新的软件
      likelihood: Medium
      impact: High
      leadingIndicator: 需求沟通最后都变成要咨询交付物，而不是要工作流访问权限
      mitigation: 围绕实时采购结果来定价，量化周期压缩效果，并把顾问参与打包进工作流，而不是正面替代他们。
    - risk: 相邻现有厂商会在公司建立数据护城河前，先补上地热模板
      likelihood: Medium
      impact: Medium
      leadingIndicator: 现有 PPA 或 VDR 厂商发布地热尽调模块，并拿下灯塔客户
      mitigation: 更快做出领域本体、基准数据和参考客户，证明自己改善的是承保结果，而不是只多一个通用工作流。
operatingAssumptions:
  - assumption: 美国西部中型数据中心开发商会发起足够多的实时地热采购，从而在前 12 个月支撑 3 个付费试点
    basis: research.yaml
    validationTest: 访谈 10 个 ICP 买方，并拿到 3 份与活跃园区采购时间表绑定的共创客户 LOI
    decisionImpact: 如果不成立，就要更早把初始切口扩到相邻稳定清洁电力采购，而不是继续只盯着地热
  - assumption: 地热开发商和顾问愿意共享足够多的地下与施工证据，以形成可复用的里程碑 schema
    basis: research.yaml
    validationTest: 运行 3-5 个试点数据室测试，验证至少 80% 的必需里程碑字段能从真实项目材料中填满
    decisionImpact: 如果不成立，产品就要收缩为买方侧审批与红线工作流，而不是共享承保基础设施
  - assumption: 试点之后，买方会接受 $200k-$400k 区间的按园区年度软件定价
    basis: idea.yaml
    validationTest: 向 5 个买方测试试点提案，并至少把其中 2 个转成年订阅，且不附带沉重的咨询范围
    decisionImpact: 如果不成立，公司就必须降低实施负担、改变定价单位，或者接受更低 ACV 与不同融资计划
  - assumption: 每笔交易的上线时间可以控制在 4 周以内，而不需要建立重服务型工程组织
    basis: operator judgment
    validationTest: 跟踪前 3 次部署中的实施时长、人工分析小时数和定制模板请求
    decisionImpact: 如果不成立，毛利目标和 pre-seed 资金需求都会明显变化
  - assumption: 到第 3 年，这个地热承保对象可以迁移到至少 1 个相邻稳定清洁电力品类
    basis: operator judgment
    validationTest: 在第 18 个月前做出 1 个相邻工作流原型，并确认 2 个共创客户认为 schema 复用度超过 70%
    decisionImpact: 如果不成立，公司就会停留在一个垂直利基工具，风险投资级别空间也会变弱
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 与美国西部数据中心电力团队开展结构化需求访谈，并收集真实地热尽调材料
    hypothesis: 买方会把地热承购视为一个独立审批工作流痛点，并愿意为此支付专门的软件预算
    successMetric: 完成 10 次访谈，且有 3 个买方共享实时清单、红线或审批备忘录结构
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 拿下 3 份与具名园区采购绑定的共创客户 LOI
    hypothesis: 对通电时间的紧迫感足以把需求访谈转成明确的试点需求
    successMetric: 3 份已签 LOI，且都带实时采购日期和明确的高管赞助人
    owner: 创始人/CEO
  - horizon: 90–180 天
    experiment: 与 3 家地热开发商或顾问开展卖方侧数据接入试点
    hypothesis: 可以用真实项目数据填出一套可复用的里程碑 schema，而不会暴露不可接受的 IP
    successMetric: 在 3 个项目中填满 80% 的 MVP 字段，且重大保密异议少于 10 个
    owner: 地热尽调负责人
  - horizon: 90–180 天
    experiment: 在 1 个活跃买方工作流中部署含评分卡、问题日志和条款库的 MVP
    hypothesis: 相比电子表格和邮件流程，产品能明显压缩尽调协调时间
    successMetric: 买方报告内部审批材料准备时间至少缩短 30%
    owner: 创始工程师
  - horizon: 180–360 天
    experiment: 把试点转成年度生产合同，并新增 1 个园区或 1 个卖方参与方
    hypothesis: 产品价值不会只停留在一次性尽调冲刺，而能在同一账户生态里扩展开来
    successMetric: 1 份付费年度合同，以及 1 次账户内扩展事件
    owner: 创始人/CEO
  - horizon: 180–360 天
    experiment: 正式建立顾问和独立工程师转介合作
    hypothesis: 可信的领域中介可以成为可重复的分发与验证层
    successMetric: 签下 3 份转介或工作流标准合作协议，并贡献 25% 的合格销售漏斗
    owner: 合作负责人
operations:
  - 在卖方侧接入前，必须先具备安全、按权限控制的文档接入与 NDA 感知共享能力
  - 维护一个带版本的地热尽调分类体系，并由独立工程师和项目融资律师每季度复核
  - 逐项跟踪部署时长、审批周期压缩效果以及基准数据采集情况，避免产品一路滑向定制服务
  - 建立一个小型外部网络，覆盖地热工程师、保险方和律师，用来校验里程碑阈值和兜底条款
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 必须亲自负责客户发现、共创客户销售，以及面向买方和地热交易对手的品类叙事。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 需要足够快地搭出安全工作流核心、文档模型和基准数据层，来支撑在途采购。
  - role: 产品与解决方案负责人
    startTiming: Month 3
    rationale: 把买方工作流翻译成产品需求，同时让实施保持可重复，而不是走向定制化。
  - role: 地热尽调负责人
    startTiming: Month 6
    rationale: 负责固化里程碑 schema、校验卖方证据质量，并赢得独立工程师、贷款方和保险方的信任。
  - role: 合作或企业销售负责人
    startTiming: Month 9
    rationale: 把早期买方验证扩展成通过开发商、顾问和多园区扩张驱动的销售管线。
milestones:
  - horizon: 0–12 个月
    items:
      - 签下 3 个与实时园区采购绑定的共创客户
      - 上线 MVP 并完成 1 个付费买方试点
      - 在至少 3 个地热项目中验证 1 套可复用里程碑 schema
      - 把首个试点转成年度生产合同
  - horizon: 12–24 个月
    items:
      - 在买方、卖方和顾问侧达到 5-7 个年度账户
      - 发布首个里程碑证据和兜底条款基准数据集
      - 增加卖方侧可复用尽调发布与顾问工作流集成
      - 验证 1 个相邻稳定清洁电力承保工作流
  - horizon: 24–36 个月
    items:
      - 达到 10 个年度活跃账户，并接近模型中的 $4.2M SOM
      - 从地热扩展到至少 1 个相邻可融资工作流
      - 在目标交易中，把平台建立成买方、卖方和顾问共享承保工作台的默认选择
risks:
  - risk: 近期增强型地热商业交易量爬坡慢于预期
    likelihood: High
    impact: High
    mitigation: 保持滩头市场足够窄，先证明 1 个买方工作流，再把产品设计成能扩展到相邻稳定电力品类。
  - risk: 卖方数据访问受限，无法支持标准化基准
    likelihood: Medium
    impact: High
    mitigation: 从买方侧工作流切入，强化权限控制，再用早期验证逐步换取更深的卖方参与。
  - risk: 买方更偏好顾问和内部工具，而不是新的工作流产品
    likelihood: Medium
    impact: High
    mitigation: 把销售锚定在在途采购上，持续量化周期压缩，并把顾问放进产品，而不是和他们正面对打。
  - risk: 在公司建立数据护城河前，通用采购或 PPA 平台先杀入地热
    likelihood: Medium
    impact: Medium
    mitigation: 依靠领域本体、基准数据和参考结果拉开差距，而不是只拼通用文档工作流。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: >-
    这笔钱将覆盖 18 个月，用于搭建安全承保 MVP、补齐首批领域与产品团队、完成 3-5 次共创客户部署，并在更大品类扩张前先证明买方从试点走向生产付费的转化逻辑。
