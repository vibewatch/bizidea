scenarios:
  downside:
    description: Slower commercial geothermal deal flow pushes two logos into Y4, price realization softens, and onboarding stays more manual.
    y3RevenueK: 3050.0
    y3EbitdaK: -980.0
    cashLowPointK: -320.0
    keyAssumptionChanges:
      - Base subscription realization falls from $330K to $300K.
      - Two planned Q3-Q4Y3 logo starts slip into Y4.
      - Gross margin falls from 72% to 68%.
  base:
    description: The company lands 10 paid logos by Q4Y3, keeps implementation repeatable, and reaches a revenue run-rate close to the BP's $4.2M SOM.
    y3RevenueK: 3993.0
    y3EbitdaK: -343.5
    cashLowPointK: 300.2
    keyAssumptionChanges:
      - Three Y1 pilots occur on schedule and all convert by month 13.
      - Base subscription stays at $330K with 30% expansion attach.
      - Gross margin holds at 72% through disciplined implementation scope.
  upside:
    description: Pilot conversions happen one quarter faster and seller/advisor modules attach earlier, creating earlier revenue density without a major hiring step-up.
    y3RevenueK: 4625.0
    y3EbitdaK: 120.0
    cashLowPointK: 430.0
    keyAssumptionChanges:
      - All three pilot logos convert without timing slippage.
      - Expansion attach rises from 30% to 40%.
      - One additional logo closes in Q4Y3.
sensitivity:
  - variable: ARPU
    downsideCase: Base subscription realization at $300K with weaker upsell mix
    baseCase: $330K base subscription plus 30% attach of a $120K module
    upsideCase: $360K effective base pricing with better seller/advisor upsell
    y3RevenueImpactK: -399.0
    cashImpactK: -287.0
  - variable: CAC
    downsideCase: Fully loaded CAC rises to $275K because founder-led sales does not scale cleanly
    baseCase: $220K blended CAC on a concentrated enterprise motion
    upsideCase: CAC falls to $180K once referral partners contribute pipeline
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
  - variable: churn
    downsideCase: Monthly churn rises to 2.5% as workflows remain project-specific
    baseCase: Monthly churn stays at 1.5%
    upsideCase: Monthly churn improves to 1.0% after benchmark data becomes sticky
    y3RevenueImpactK: -260.0
    cashImpactK: -190.0
  - variable: sales cycle
    downsideCase: Pilot-to-production and procurement close cycles extend by roughly 3 months
    baseCase: 3-month pilot with conversion in one to two quarters
    upsideCase: Production conversion happens inside 90 days for lighthouse accounts
    y3RevenueImpactK: -540.0
    cashImpactK: -410.0
  - variable: gross margin
    downsideCase: Gross margin drops to 65% if onboarding becomes services-heavy
    baseCase: Gross margin holds at 72%
    upsideCase: Gross margin reaches 75% with better templates and seller-side reuse
    y3RevenueImpactK: 0.0
    cashImpactK: -280.0
  - variable: hiring pace
    downsideCase: Two GTM/product hires are pulled 6 months forward before demand warrants them
    baseCase: Hires stay aligned to account milestones
    upsideCase: One noncritical hire is deferred until after 6 annual accounts
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> QualifiedPilots
      QualifiedPilots --> AnnualAccounts
      AnnualAccounts --> ExpansionModules
      AnnualAccounts --> SubscriptionRevenue
      ExpansionModules --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit
      CACSpend --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case growth comes from moving from 3 Y1 pilots to 10 paid logos by Q4Y3 at $330K base ACV plus onboarding fees and a 30% expansion attach rate.
  - checkName: Must go right
    finding: The first three pilots must convert and reference-sell into the next 3-4 annual accounts, because the concentrated market leaves little room for a weak lighthouse cohort.
  - checkName: Model breaks if
    finding: If geothermal deal volume slips by two logos and gross margin falls into the high 60s, the downside case turns cash negative before the next round.
  - checkName: Next-round proof
    finding: A credible seed story is 5-6 annual accounts, benchmark dataset v1, and one adjacent workflow design partner inside the funded runway.
sanityChecks:
  ruleOf40: "Y3 growth 85.2% + EBITDA margin -8.6% = 76.6%"
  burnMultiple: "Y2 burn multiple is ~0.3x: $605.9K EBITDA burn against roughly $1.92M of net new ARR (from ~$0.66M exit ARR in Y1 to ~$2.58M in Y2)."
  revenuePerFte: "$319K Y3 on ~12.5 average FTE (benchmark $200–400K vertical SaaS)"
  flags:
    - The model still depends on a very small number of real geothermal procurements, so two delayed deals materially change Y3 cash.
    - Y1-Y2 revenue includes pilot and implementation fees; if customers force a services-heavy scope without software conversion, both ARPU and gross margin fall.
    - A $2.0M round works only if secure onboarding stays repeatable; heavier compliance or custom engineering would push the company toward the upper half of the BP's $2-4M range.
