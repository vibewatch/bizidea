  defensibility:
    score: 4
    rationale: 防御力来自跨早期交易积累的专有尽调基准与合同数据。
  ventureScale:
    score: 5
    rationale: 一旦赢下地热承保，就有机会向稳定清洁电力基础设施中的更广泛可融资性软件市场扩张。
topRisks:
- name: 交易量起步较窄
  description: 增强型地热商业交易的放量速度可能低于预期，限制早期软件交易量。
  mitigation: 从积极采购稳定清洁电力的数据中心开发商切入，并把工作流设计为在首批客户上线后可延伸至相邻的稳定电力类别。
- name: 项目数据难获取
  description: 开发商可能不愿分享足够多的技术信息，难以支持标准化承保。
  mitigation: 先从买方侧的尽调清单与红线工作流做起，再通过证明结构化数据能提升成交速度来吸引卖方参与。
- name: 买方选择自建
  description: 大型云厂商或公用事业公司可能倾向于使用内部团队和定制工具完成电力采购。
  mitigation: 优先服务中端托管平台和基础设施基金，这些客户痛点尖锐但内部地热专长较薄弱，并建立他们难以独自复制的基准网络。
