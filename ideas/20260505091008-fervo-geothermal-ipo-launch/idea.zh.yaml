problem: 数据中心开发商和电力采购团队迫切需要为新园区锁定稳定、清洁的电力，但增强型地热项目如今仍主要靠定制顾问备忘录、电子表格和法务红线来评估。这会拖慢 PPA 谈判和容量预留，而此时稀缺的 24/7 电力已经成了选址的硬门槛。与此同时，新型储层和施工风险也让内部投资委员会不愿轻易支持地热交易，除非团队能拿出一套可重复的承保流程。
targetUser:
  primary: 在美国西部电力市场推进 50-300 MW 园区的数据中心托管商和 AI 数据中心开发商中的 VP Power 或 Head of Energy Procurement
  secondary: 向首批 PPA 买方出售项目的增强型地热开发商业务拓展团队
  buyer: 区域性数据中心平台的 VP Power Procurement 或 Chief Development Officer
startupThesis:
  nonObviousInsight: 现在的瓶颈已经不是证明增强型地热能不能做出来，而是把地热项目风险翻译成一套让数据中心买方、放贷方和保险方都能迅速签字认可的采购与融资工作流。
  beachhead: 正在为美国西部新园区评估首份地热支撑电力合同的中型数据中心开发商电力采购团队
  wedge: 一个地热承购承保工作台，把储层尽调、施工里程碑跟踪和合同兜底条款标准化，整理成买方可直接审阅的交易空间
  whyNowCatalyst: Fervo 的 IPO 启动及相关报道说明，资本已经就位、数据中心需求也是真实存在的，因此下一个瓶颈会转向如何更快完成地热电力交易的尽调和签约。
  ventureScalePath: 先成为地热 PPA 承保的记录系统，再扩展到地热、长时储能混合体以及其他难以银行化的基础设施品类，覆盖所有需要共享尽调和风险监控的稳定清洁电力采购场景。
solution: 这款产品为电力买方提供一个结构化工作台，帮助他们在签署 PPA 或预留容量前评估地热项目。它可以接入开发商的数据室，把技术和商务尽调整理成可对比的评分卡，跟踪钻井和施工环节的里程碑证据，并标记与买方风险偏好不匹配的合同条款。对卖方而言，它则提供一套可复用的资料包，让他们不必为每一笔交易重复回答买方、贷款方和保险方的问题。长期来看，这个平台会沉淀成一个基准层，告诉市场哪些项目里程碑和合同结构，才真正能预测地热项目按时、按规格交付。
goToMarketSeed:
  firstCustomer: 美国西部一家规划中有 2 到 5 个 AI 园区、拥有清洁电力目标但没有内部地热承保团队的托管型数据中心开发商
  buyingTrigger: 新园区进入电力采购阶段，而本地公用事业公司无法在要求时间内提供足够的稳定容量
  currentAlternative: 能源顾问、内部电子表格、外部律师，以及定制化项目融资尽调
  switchingReason: 这个平台把原本零散、耗时数月的地热尽调压缩进一个共享工作流，并用标准化风险语言协助买方更快推进，而不必把不透明的储层风险直接背到自己的资产负债表上
  pricingHypothesis: 按活跃园区收取年度 SaaS 费用，外加按已签约地热容量的每兆瓦成功费
whyNow:
  - point: Fervo 的 IPO 路演表明，增强型地热已经进入需要机构级尽调的融资阶段，不再只是探索性研究。
    signalRefs: [增强型地热获得公开市场背书]
    sourceRefs: [1, 2]
  - point: 相关报道把地热描绘成应对数据中心负载飙升的方案，因此电力采购团队现在有了必须尽快评估项目的运营紧迫感。
    signalRefs: [数据中心负载正把地热拉进紧迫采购清单]
    sourceRefs: [2]
  - point: 基石需求说明，只要项目风险能被整理成清晰可读的承保包，市场上就有资本等着投进去。
    signalRefs: [机构资本已准备好承接地热风险]
    sourceRefs: [3]
  - point: 源自油田行业的钻井和传感方法带来了可监控的里程碑，软件可以据此跨交易标准化，降低首创类项目的推进摩擦。
    signalRefs: [油田式执行让地热更适合被软件化管理]
    sourceRefs: [3]
differentiator: 大多数能源采购软件要么是通用 PPA 工作流，要么是电力市场分析工具。这款产品则专为增强型地热打造，因为在这个场景里，储层不确定性、钻井执行和合同结构都必须被翻译成一套买卖双方共用的承保语言。它的护城河在于，会持续积累早期商业交易中的地热尽调问题、里程碑证据，以及谈判中形成的兜底条款结构化数据集。
