topRisks:
  - name: 交易量一开始会很窄
    description: 增强型地热商业交易的爬坡速度可能低于预期，限制早期软件使用量。
    mitigation: 先锁定正在积极寻找稳定清洁电力的数据中心开发商，并把工作流设计成客户一上线就能向相邻稳定电力品类扩展。
  - name: 项目数据难拿
    description: 开发商可能不愿分享足够多的技术信息，导致标准化承保难以推进。
    mitigation: 先从买方侧的尽调清单和红线工作流切入，再用更快成交的数据证明，换取卖方参与并提供结构化资料。
  - name: 买方选择内部自建
    description: 大型云厂商或公用事业公司可能更倾向于用内部团队和定制工具处理电力采购。
    mitigation: 先瞄准中型托管平台和基础设施基金——这里痛点很强，但内部地热能力薄，再建立他们难以单独复制的基准网络。
