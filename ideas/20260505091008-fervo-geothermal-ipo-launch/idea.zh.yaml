jobsToBeDone:
  - job: 当一个新的数据中心园区需要尽快拿到稳定清洁电力时，帮助电力采购负责人比较不同地热方案，并把风险整理成内部可审批的材料，好让他们在竞争对手之前锁定容量。
    currentAlternative: 由顾问主导的尽调，以及基于电子表格的 PPA 评估
    successMetric: 从首次项目评审到签署 term sheet 的时间
  - job: 当增强型地热开发商开始与陌生买方谈判时，帮助业务拓展团队提供一套标准化尽调资料包，从而缩短销售周期，减少重复性的技术审查。
    currentAlternative: 定制数据室和一次性的邮件问答
    successMetric: 达成商业协议前所需的尽调轮次数
