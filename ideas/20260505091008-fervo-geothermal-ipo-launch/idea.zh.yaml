jobsToBeDone:
- job: 当新的数据中心园区需要快速获得稳定清洁电力时，帮助电力采购负责人比较地热选项，并将风险打包为内部审批材料，以便在竞争对手之前锁定容量。
  currentAlternative: 由顾问主导的尽调与基于表格的 PPA 评估
  successMetric: 从首次项目评审到签署条款清单的时间
- job: 当增强型地热开发商与陌生买方展开谈判时，帮助开发团队提供标准化尽调资料包，以缩短销售周期并减少重复的技术审核。
  currentAlternative: 定制数据室与一次性邮件问答
  successMetric: 达成商业协议前所需的尽调轮次
