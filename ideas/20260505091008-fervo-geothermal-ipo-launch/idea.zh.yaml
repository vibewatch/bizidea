problem: 数据中心开发商和电力采购团队迫切需要为新园区获取稳定、清洁的电力，但增强型地热项目仍然依赖定制顾问备忘录、电子表格和法律红线来评估。这会在稀缺的 24/7 电力正成为选址门槛时拖慢 PPA 和容量预留。新型储层与建设风险也使内部投资委员会不愿在缺少可复用承保流程的情况下支持地热交易。
targetUser:
  primary: 在美国西部电力市场推进 50-300 MW 园区的数据中心托管与 AI 数据中心开发商中的电力副总裁或能源采购负责人
  secondary: 向市场销售首创型 PPA 的增强型地热开发商业务发展团队
  buyer: 区域性数据中心平台的电力采购副总裁或首席开发官
startupThesis:
  nonObviousInsight: 瓶颈已经不再是证明增强型地热是否可行，而是能否把地热项目风险转译为数据中心买方、贷款方和保险方都能快速签字认可的采购与融资工作流。
  beachhead: 正在为美国西部新园区评估首份地热支持型电力合同的中端数据中心开发商电力采购团队
  wedge: 一个地热承购风控工作台，将储层尽调、建设里程碑跟踪和合同兜底条款标准化，形成买方可直接使用的交易资料室
  whyNowCatalyst: Fervo 的 IPO 启动及周边报道表明资本已经到位、数据中心需求也真实存在，因此下一个瓶颈转向更快完成地热电力交易的尽调与签约。
  ventureScalePath: 先成为地热 PPA 承保的系统记录层，再扩展到地热、长时储能混合体及其他难以融资的基础设施类别中的稳定清洁电力采购场景，在这些领域，买方都需要共享尽调与风险监控。
solution: 该产品为电力买方提供一个结构化工作台，用于在签署 PPA 或预留容量前评估地热项目。它可接入开发商数据室，将技术与商业尽调整理为可比较的评分卡，跟踪钻井和建设阶段的里程碑证据，并标记与买方风险偏好不匹配的合同条款。对卖方而言，它提供一套可复用的资料包，让其无需为每笔交易重复回答买方、贷款方和保险方问题。随着时间推移，平台会成为衡量哪些项目里程碑与合同结构真正能够预测地热项目按时、按规格交付的基准层。
goToMarketSeed:
  firstCustomer: 一家在美国西部规划了两个到五个 AI 园区、拥有清洁电力目标但缺乏内部地热承保团队的托管型数据中心开发商
  buyingTrigger: 新园区进入电力采购阶段，而当地公用事业公司无法在所需时间内提供足够的稳定容量
  currentAlternative: 能源顾问、内部电子表格、外部法律顾问以及定制化项目融资尽调
  switchingReason: 平台把原本分散数月的地热尽调压缩为带有标准化风险语言的共享工作流，帮助买方更快推进，而无需将不透明的储层风险直接装入资产负债表。
  pricingHypothesis: 按活跃园区收取年度 SaaS 费用，并按已签约地热容量的每兆瓦收取成功费
