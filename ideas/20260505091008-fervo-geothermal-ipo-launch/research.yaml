"reportMemo":
  "executiveTakeaways":
  - "The investable signal is real: Fervo's IPO launch, reported $6.5B valuation target, and $350M of cornerstone demand show enhanced geothermal has crossed into institutional financing, not just pilot-stage storytelling [1,2,3]."
  - "Commercial offtake is emerging faster than buyer tooling: Fervo already signed 320 MW of 15-year PPAs with Southern California Edison while disclosing a 3.65 GW broader pipeline, implying diligence volume can grow before category software exists [4,16]."
  - "Urgency comes from data-center power scarcity: Google is pairing new data-center capacity with clean generation, Latitude reports that “all the cheap power is gone,” and EPRI-cited forecasts put data centers at 9%-17% of U.S. electricity demand by 2030 [9,10,18]."
  - "The wedge is credible because geothermal risk is becoming monitorable through drilling, completion, and sensing milestones rather than pure science risk; Fervo's drilling-time reductions and DOE's EGS framework support structured underwriting [5,14]."
  - "Adjacent incumbents prove budget and workflow demand, but they stop short of subsurface diligence: LevelTen, Pexapark, and Ansarada each monetize PPA data or procurement workflow without owning reservoir-risk translation [19,20,21,22]."
  - "The beachhead is strategically attractive but small: modeled geothermal-offtake workflow TAM is in the tens of millions, so venture scale likely requires expansion into adjacent firm-clean-power underwriting once initial credibility is built [13,16,24,25]."
  "marketDefinition": "This report defines the market as workflow software used by U.S. large-load buyers and geothermal developers to underwrite, negotiate, and monitor enhanced-geothermal PPAs or capacity reservations for new data-center campuses, initially concentrated in western markets where BLM-managed resources and projects such as Cape Station are active [4,6,15]. It intentionally excludes generic renewable procurement analytics, post-COD asset operations software, utility bill management, and geothermal generation hardware/EPC [19,20,21,22,28]."
  "customerAndBuyer": "Primary ICP: VP/Head of Power or Energy Procurement at mid-market colocation and AI data-center developers pursuing new 50-300 MW campuses in western U.S. markets. Economic buyer: the executive accountable for time-to-power and site development, not only sustainability. Urgent jobs-to-be-done are comparing geothermal offers, translating reservoir/construction risk into investment-committee language, coordinating outside advisors and legal redlines, and preserving optionality when utility timelines slip [10,19,22,29]. Budget is most likely pulled from development or energy procurement because the trigger is campus energization risk, not a discretionary ESG tool purchase [9,10,18]."
  "buyingTriggers":
  - "point": "A new campus needs firm power on a timeline the utility cannot meet with conventional service, making co-located or contracted clean generation a site-selection issue."
    "sourceRefs":
    - 9
    - 10
    - 18
  - "point": "State and federal scrutiny of large-load interconnection and cost allocation raises the penalty for poorly structured procurements."
    "sourceRefs":
    - 12
    - 29
  - "point": "A live geothermal offtake opportunity appears, but the buyer lacks in-house geothermal underwriting depth and wants to move before scarce firm capacity is locked up."
    "sourceRefs":
    - 4
    - 16
  "willingnessToPay":
    "summary": "Direct public pricing for this exact workflow is scarce, but willingness to pay is directionally supported by three facts: buyers already hire specialist advisors because PPAs have decade-plus financial consequences [19]; adjacent vendors sell premium market-intelligence and risk-management workflows into the same teams [20,21]; and complex renewables procurement already supports dedicated secure-software budgets rather than ad hoc file sharing [22]."
    "sourceRefs":
    - 19
    - 20
    - 21
    - 22
  "competitiveLandscape": "Today's landscape fragments into (i) PPA marketplaces and transaction infrastructure such as LevelTen [19,20], (ii) PPA pricing/risk platforms such as Pexapark [21], and (iii) generic infrastructure procurement/diligence rooms such as Ansarada [22]. The real substitutes are independent engineers, counsel, and spreadsheets [19,21]. None of these options treats reservoir uncertainty, drilling milestones, insurance questions, and fallback contract language as one shared underwriting object for geothermal buyers and sellers [4,5,14]."
  "incumbentThesis":
  - "incumbentClass": "PPA marketplaces"
    "point": "Platforms like LevelTen win at broad renewable deal sourcing and benchmarking, but they do not translate reservoir and construction evidence into buyer-ready geothermal underwriting packages by default."
    "sourceRefs":
    - 19
    - 20
  - "incumbentClass": "PPA pricing and risk platforms"
    "point": "Pexapark-type tools are strong on price discovery, merchant risk, and settlement support, yet they assume the asset is fundamentally bankable and therefore miss first-of-a-kind subsurface diligence."
    "sourceRefs":
    - 21
  - "incumbentClass": "Generic workflow / VDR platforms"
    "point": "Ansarada-style procurement rooms can manage secure documents and RFP governance, but they lack geothermal-specific checklists, milestone thresholds, and benchmarking data."
    "sourceRefs":
    - 22
  - "incumbentClass": "In-house teams plus advisors"
    "point": "Hyperscalers and major utilities can assemble bespoke expertise, but mid-market buyers still face a slow, services-heavy process built around consultant memos, spreadsheets, and redlines."
    "sourceRefs":
    - 19
    - 29
  "regulatoryLandscape": "Geothermal projects still face western public-land leasing and environmental-review steps; the BLM manages geothermal leasing across roughly 245 million acres and reports 51 operating geothermal power plants on BLM-managed lands [15]. Recent BLM categorical exclusions can shorten resource-confirmation reviews, but development still depends on permitting and subsequent environmental analysis [26]. On the load side, large-load interconnection and cost-allocation rules are moving quickly through FERC and state utility proceedings, increasing diligence complexity for new campuses [12,29]. Project finance also depends on monetizing clean-energy tax credits via transferability or elective-pay mechanics [27]."
  "technologyLandscape": "Enhanced geothermal systems rely on creating or reopening permeability and circulating fluids through hot rock, which makes subsurface evidence and drilling execution central to underwriting [14]. Fervo's reported 70% year-over-year drilling-time reduction at Cape Station and Google's operational Nevada project suggest oilfield-style execution is making geothermal more repeatable [5,8]. Other approaches, including Quaise's superhot geothermal and Eavor's closed-loop system, widen the eventual supplier base and support an asset-agnostic underwriting layer if the startup wins the milestone schema first [24,25]."
