assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-06"
    unit: month
    source: "[BP date 2026-05-05]；模型从次月开始"
  - id: A2
    name: 付费 logo 爬坡
    value: "Y1 3 个付费试点，Y2 末 6 个年度账户，Y3 末 10 个付费 logo"
    unit: count
    source: "[BP operatingAssumptions, milestones 0-12 / 12-24 / 24-36 months]"
  - id: A3
    name: 试点费用
    value: "105"
    unit: USDK per pilot over 3 months
    source: "[BP investorMemo.firstCustomer pilot $75k-$150k]；取中间略偏上的基准值"
  - id: A4
    name: 基础年订阅价
    value: "330"
    unit: USDK per annual account
    source: "[BP operatingAssumptions annual pricing $200k-$400k]；对高触达企业工作流取偏上中位"
  - id: A5
    name: 实施费用
    value: "60"
    unit: USDK per new annual account
    source: "[BP gtm pricing includes one-time implementation and data-onboarding fee]；创业财务经验值"
  - id: A6
    name: 扩展模块附加率
    value: "30% of annual accounts add a $120K module after 6 months"
    unit: percent and USDK
    source: "[BP funnelTargets 30%+ expansion within 12 months; BP businessModel expansion levers]；对节奏的运营经验假设"
  - id: A7
    name: 收入确认
    value: "试点收入在 3 个月内直线确认；订阅从上线后按月确认"
    unit: policy
    source: "基于 BP 订阅工作流模型的创业 SaaS 财务经验"
  - id: A8
    name: 毛利率
    value: "72%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 70]；只有把服务范围卡住，才能略高于目标"
  - id: A9
    name: 月度 logo 流失率
    value: "1.5%"
    unit: percent
    source: "垂直企业 SaaS 经验值；因工作流嵌在在途采购中，所以假设流失较低"
  - id: A10
    name: 线索到合格试点转化率
    value: "25%"
    unit: percent
    source: "[BP gtm.funnelTargets 20-30%]"
  - id: A11
    name: 试点转生产转化
    value: "67% within 6 months, with the third pilot converting by month 13"
    unit: percent
    source: "[BP gtm.funnelTargets 50%+; BP milestone convert first pilot in year 1]"
  - id: A12
    name: 高管全成本现金薪酬
    value: "180"
    unit: USDK annual per executive FTE
    source: "[BP team Founder CEO]；包含税费/福利的创业财务经验值"
  - id: A13
    name: 工程岗位全成本现金薪酬
    value: "216"
    unit: USDK annual per engineering FTE
    source: "[BP team Founding eng plus later product build needs]；包含税费/福利的创业财务经验值"
  - id: A14
    name: 产品与解决方案岗位全成本现金薪酬
    value: "168"
    unit: USDK annual per product FTE
    source: "[BP team Product and solutions lead]；包含税费/福利的创业财务经验值"
  - id: A15
    name: 地热尽调负责人全成本现金薪酬
    value: "192"
    unit: USDK annual per domain FTE
    source: "[BP team Geothermal diligence lead]；包含税费/福利的创业财务经验值"
  - id: A16
    name: 销售与合作岗位全成本现金薪酬
    value: "180"
    unit: USDK annual per GTM FTE
    source: "[BP team Partnerships or enterprise seller]；包含税费/福利的创业财务经验值"
  - id: A17
    name: 客户成功岗位全成本现金薪酬
    value: "150"
    unit: USDK annual per CS FTE
    source: "基于 BP 对可重复实施和实时工作流支持的要求所做的创业财务经验假设"
  - id: A18
    name: 运营与财务岗位全成本现金薪酬
    value: "120"
    unit: USDK annual per ops FTE
    source: "后期后台支持的创业财务经验值"
  - id: A19
    name: 销售与市场非人力开支
    value: "14K/mo Y1, 20K/mo Y2, 24K/mo Y3 plus 4% variable on revenue after first sales hire"
