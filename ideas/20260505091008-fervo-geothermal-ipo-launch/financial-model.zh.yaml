scenarios:
  downside:
    description: 商业化地热交易流更慢，导致 2 个 logo 推迟到 Y4，价格实现走弱，且接入过程更依赖人工。
    y3RevenueK: 3050.0
    y3EbitdaK: -980.0
    cashLowPointK: -320.0
    keyAssumptionChanges:
      - 基础订阅实现价格从 $330K 降到 $300K。
      - 原计划在 Q3-Q4Y3 启动的 2 个 logo 延后到 Y4。
      - 毛利率从 72% 降到 68%。
  base:
    description: 公司在 Q4Y3 前拿下 10 个付费 logo，保持实施可重复，并把收入 run-rate 拉到接近 BP 的 $4.2M SOM。
    y3RevenueK: 3993.0
    y3EbitdaK: -343.5
    cashLowPointK: 300.2
    keyAssumptionChanges:
      - Y1 的 3 个试点按计划发生，并全部在第 13 个月前完成转化。
      - 基础订阅维持在 $330K，且有 30% 的扩展模块附加率。
      - 通过严格控制实施范围，毛利率保持在 72%。
  upside:
    description: 试点转化比计划快 1 个季度，卖方/顾问模块更早附加，在不明显增加招聘的前提下更早形成收入密度。
    y3RevenueK: 4625.0
    y3EbitdaK: 120.0
    cashLowPointK: 430.0
    keyAssumptionChanges:
      - 3 个试点 logo 全部按时转化，没有节奏滑坡。
      - 扩展模块附加率从 30% 提高到 40%。
      - Q4Y3 额外拿下 1 个 logo。
sensitivity:
  - variable: ARPU
    downsideCase: 基础订阅实现价降至 $300K，且 upsell 结构更弱
    baseCase: $330K 基础订阅，另加 30% 的 $120K 模块附加率
    upsideCase: 基础定价等效提升到 $360K，卖方/顾问 upsell 更强
    y3RevenueImpactK: -399.0
    cashImpactK: -287.0
  - variable: CAC
    downsideCase: 因创始人主导销售难以顺滑扩张，Fully loaded CAC 升至 $275K
    baseCase: 高度集中的企业销售动作下，综合 CAC 为 $220K
    upsideCase: 转介伙伴开始贡献管线后，CAC 降至 $180K
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
  - variable: churn
    downsideCase: 由于工作流仍过于项目化，月流失升至 2.5%
    baseCase: 月流失保持在 1.5%
    upsideCase: 基准数据变得更粘后，月流失改善到 1.0%
    y3RevenueImpactK: -260.0
    cashImpactK: -190.0
  - variable: sales cycle
    downsideCase: 试点转生产和采购关闭周期整体拉长约 3 个月
    baseCase: 3 个月试点，并在 1-2 个季度内完成转化
    upsideCase: 灯塔客户能在 90 天内完成生产转化
    y3RevenueImpactK: -540.0
    cashImpactK: -410.0
  - variable: gross margin
    downsideCase: 若接入过程变成重服务模式，毛利率降到 65%
    baseCase: 毛利率保持在 72%
    upsideCase: 模板更完善、卖方侧复用更多时，毛利率提升到 75%
    y3RevenueImpactK: 0.0
    cashImpactK: -280.0
  - variable: hiring pace
    downsideCase: 需求还没起来前，就把 2 个 GTM/产品岗位提前 6 个月招进来
    baseCase: 招聘节奏与账户里程碑保持一致
    upsideCase: 1 个非关键岗位推迟到达到 6 个年度账户后再招
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads --> QualifiedPilots
      QualifiedPilots --> AnnualAccounts
      AnnualAccounts --> ExpansionModules
      AnnualAccounts --> SubscriptionRevenue
      ExpansionModules --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit
      CACSpend --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景的增长来自这样一条路径——从 Y1 的 3 个试点，走到 Q4Y3 的 10 个付费 logo，定价为 $330K 基础 ACV，再叠加接入费和 30% 扩展模块附加率。
  - checkName: 必须做对的事
    finding: 前 3 个试点必须完成转化，并能继续带来接下来的 3-4 个年度账户；因为市场高度集中，首批灯塔客户一旦弱，回旋空间很小。
  - checkName: 模型会在哪些地方失效
    finding: 如果地热交易量少掉 2 个 logo，且毛利率掉到高 60% 区间，那么 downside 情景会在下一轮融资前把现金打成负数。
  - checkName: 下一轮融资证明点
    finding: 一个可信的 seed 故事应该是：5-6 个年度账户、benchmark dataset v1，以及 1 个相邻工作流共创客户，都在这轮 runway 内拿到。
sanityChecks:
  ruleOf40: "Y3 增长 85.2% + EBITDA margin -8.6% = 76.6%"
  burnMultiple: "Y2 burn multiple 约为 0.3x：$605.9K EBITDA burn，对应约 $1.92M 的新增 ARR（从 Y1 末约 $0.66M exit ARR 增长到 Y2 的约 $2.58M）。"
  revenuePerFte: "Y3 约 $319K / FTE，按约 12.5 平均 FTE 计算（垂直 SaaS 基准约 $200–400K）"
  flags:
    - 模型依赖的真实地热采购数量仍然很少，因此哪怕只延后 2 笔交易，Y3 现金都会明显受影响。
    - Y1-Y2 收入里包含试点费和实施费；如果客户把范围压成重服务而不是软件转化，ARPU 和毛利率都会下滑。
    - 只有在安全接入保持可重复的前提下，$2.0M 这一轮才够用；如果合规或定制工程更重，公司就会被推向 BP 所说 $2-4M 区间的上半段。
