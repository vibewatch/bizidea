scenarios:
  downside:
    description: 商业化地热交易流转变慢，两个 logo 推迟到 Y4，价格实现走弱，且接入仍更依赖人工。
    y3RevenueK: 3050.0
    y3EbitdaK: -980.0
    cashLowPointK: -320.0
    keyAssumptionChanges:
    - 基础订阅实现价从 $330K 降到 $300K。
    - 原计划 Q3-Q4Y3 启动的两个 logo 顺延到 Y4。
    - 毛利率从 72% 降到 68%。
  base:
    description: 公司在 Q4Y3 前拿下 10 个付费 logo，保持实施可复用，并达到接近 BP 中 $4.2M SOM 的收入 run-rate。
    y3RevenueK: 3993.0
    y3EbitdaK: -343.5
    cashLowPointK: 300.2
    keyAssumptionChanges:
    - Y1 的三个试点按计划发生，并都在第 13 个月前完成转化。
    - 基础订阅保持在 $330K，且有 30% 的扩展附加率。
    - 通过严格控制实施范围，毛利率维持在 72%。
  upside:
    description: 试点转化提前一个季度发生，卖方/顾问模块更早附加，在无需大幅加人的情况下形成更早的收入密度。
    y3RevenueK: 4625.0
    y3EbitdaK: 120.0
    cashLowPointK: 430.0
    keyAssumptionChanges:
    - 三个试点 logo 全部按时转正。
    - 扩展附加率从 30% 提升到 40%。
    - Q4Y3 额外签下一个 logo。
sensitivity:
- variable: ARPU
  downsideCase: 基础订阅实现价为 $300K，且追加销售组合更弱
  baseCase: $330K 的基础订阅，加上 $120K 模块 30% 的附加率
  upsideCase: 在卖方/顾问追加销售更强的情况下，有效基础定价为 $360K
  y3RevenueImpactK: -399.0
  cashImpactK: -287.0
- variable: CAC
  downsideCase: 若创始人主导销售无法顺畅规模化，完全成本 CAC 将升至 $275K
  baseCase: 在集中式企业销售动作下，混合 CAC 为 $220K
  upsideCase: 转介伙伴开始贡献管线后，CAC 降至 $180K
  y3RevenueImpactK: 0.0
  cashImpactK: -220.0
- variable: 流失率
  downsideCase: 若工作流仍高度项目化，月流失率将升至 2.5%
  baseCase: 月流失率维持在 1.5%
  upsideCase: 在基准数据变得更具粘性后，月流失率改善至 1.0%
  y3RevenueImpactK: -260.0
  cashImpactK: -190.0
- variable: 销售周期
  downsideCase: 试点转正式部署以及采购成交周期大致延长 3 个月
  baseCase: 3 个月试点，并在一到两个季度内转正
  upsideCase: 对灯塔客户可在 90 天内完成正式转化
  y3RevenueImpactK: -540.0
  cashImpactK: -410.0
- variable: 毛利率
  downsideCase: 若接入变成重服务模式，毛利率将降至 65%
  baseCase: 毛利率维持在 72%
  upsideCase: 通过更好的模板和卖方侧复用，毛利率达到 75%
  y3RevenueImpactK: 0.0
  cashImpactK: -280.0
- variable: 招聘节奏
  downsideCase: 在需求尚未证明前，两名 GTM/产品招聘提前 6 个月发生
  baseCase: 招聘节奏与账户里程碑保持一致
  upsideCase: 一名非关键岗位招聘推迟到达到 6 个年度账户之后
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  Leads[线索] --> QualifiedPilots[合格试点]\n  QualifiedPilots --> AnnualAccounts[年度账户]\n  AnnualAccounts --> ExpansionModules[扩展模块]\n  AnnualAccounts --> SubscriptionRevenue[订阅收入]\n  ExpansionModules --> SubscriptionRevenue\n  SubscriptionRevenue --> GrossProfit[毛利润]\n  CACSpend[CAC 投入] --> GrossProfit\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景增长来自：Y1 的 3 个试点，在 Q4Y3 前扩展到 10 个付费 logo，基础 ACV 为 $330K，并叠加接入费用和 30% 的扩展附加率。
- checkName: 必须做对的事
  finding: 前 3 个试点必须能够转正，并通过参考销售带来接下来的 3-4 个年度账户，因为集中型市场几乎不给首批灯塔客户表现不佳留余地。
- checkName: 模型失效条件
  finding: 如果地热交易量少掉两个 logo，且毛利率跌入 60% 高位区间，下行情景会在下一轮融资前转为现金为负。
- checkName: 下一轮证明点
  finding: 可信的种子轮故事应是：达到 5-6 个年度账户、完成 benchmark dataset v1，并在融资跑道内拿下一个相邻工作流设计合作伙伴。
sanityChecks:
  ruleOf40: Y3 growth 85.2% + EBITDA margin -8.6% = 76.6%
  burnMultiple: 'Y2 burn multiple is ~0.3x: $605.9K EBITDA burn against roughly $1.92M of net new ARR (from ~$0.66M exit ARR in Y1 to ~$2.58M in Y2).'
  revenuePerFte: $319K Y3 on ~12.5 average FTE (benchmark $200–400K vertical SaaS)
  flags:
  - 模型仍然依赖极少数真实地热采购，因此只要有两笔交易延后，就会实质改变 Y3 现金。
  - Y1-Y2 收入包含试点费和实施费；如果客户强行要求重服务范围而不能转为软件，ARPU 与毛利率都会下滑。
  - 只有在安全接入保持可复用的前提下，$2.0M 融资才成立；若合规或定制工程更重，公司将被推向 BP 所述 $2-4M 区间的上半段。
