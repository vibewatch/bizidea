  - id: A20
    name: R&D 非人力开支
    value: "10K/mo Y1, 14K/mo Y2, 18K/mo Y3"
    unit: USDK per month
    source: "云、合规安全与产品工具的创业财务经验值"
  - id: A21
    name: G&A 非人力开支
    value: "14K/mo Y1, 17K/mo Y2, 20K/mo Y3"
    unit: USDK per month
