  marketMapDiagram:
    title: 地热尽调软件市场图谱
    mermaid: "quadrantChart\n  title 地热尽调市场图谱\n  x-axis 低专业化 --> 高专业化\n  y-axis 低紧迫性 --> 高紧迫性\n  quadrant-1 通用工作流\n  quadrant-2 专业工作流\n  quadrant-3 可有可无的分析\n  quadrant-4 关键采购基础设施\n  Ansarada: [0.25, 0.35]\n  Pexapark: [0.55, 0.55]\n  LevelTen: [0.50, 0.70]\n  Consultants: [0.75, 0.62]\n  Proposed startup: [0.90, 0.90]\n"
