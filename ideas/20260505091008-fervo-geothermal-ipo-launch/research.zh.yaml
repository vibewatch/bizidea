"reportMemo":
  "executiveTakeaways":
  - "投资信号是真实的：Fervo 的 IPO 启动、报道中的 $6.5B 估值目标，以及 $350M 的基石需求，说明增强型地热已经跨入机构融资阶段，不再只是试点期叙事 [1,2,3]。"
  - "商业承购跑得比采购方工具更快：Fervo 已与 Southern California Edison 签下 320 MW、为期 15 年的 PPA，并披露了更广泛的 3.65 GW 项目管线，这意味着在品类软件出现之前，尽调需求量就可能先涨起来 [4,16]。"
  - "紧迫性来自数据中心电力稀缺：Google 正把新增数据中心容量与清洁发电配套，Latitude 报道称“便宜电都没了”，而 EPRI 相关预测显示到 2030 年数据中心可能占到美国用电需求的 9%-17% [9,10,18]。"
  - "这个切口站得住脚，因为地热风险正在从纯科学风险转变为可通过钻井、完井和传感里程碑来监控的风险；Fervo 的钻井时间下降以及 DOE 的 EGS 框架，都支持结构化承保 [5,14]。"
  - "相邻现有厂商证明了预算和工作流需求确实存在，但它们都没深入到地下风险尽调：LevelTen、Pexapark 和 Ansarada 都能靠 PPA 数据或采购工作流赚钱，却没有把储层风险翻译成可执行的承保语言 [19,20,21,22]。"
  - "滩头市场在战略上很有吸引力，但规模不大：模型测得的地热承购工作流 TAM 只有数千万美元，因此若想达到风险投资级别规模，大概率需要在初步站稳后扩展到相邻的稳定清洁电力承保场景 [13,16,24,25]。"
  "marketDefinition": "本报告将市场定义为：供美国大负荷采购方与地热开发商使用、用于承保、谈判和监控增强型地热 PPA 或容量预留的软件工作流；其初期重点集中在西部市场，因为 BLM 管理的资源以及 Cape Station 等项目都集中在这里 [4,6,15]。这个定义刻意排除了通用可再生能源采购分析、COD 后资产运营软件、公用事业账单管理，以及地热发电硬件/EPC [19,20,21,22,28]。"
  "customerAndBuyer": "核心 ICP：在美国西部推进 50-300 MW 新园区的中型托管和 AI 数据中心开发商中的 VP/Head of Power 或 Energy Procurement。经济采购方是对通电时间和园区开发进度负责的高管，而不只是可持续发展团队。最紧迫的 jobs-to-be-done 包括：比较地热报价、把储层/施工风险翻译成投资委员会能看懂的语言、协调外部顾问与法务红线，以及在公用事业时间表延误时保留选择权 [10,19,22,29]。预算最可能从开发预算或能源采购预算中调出，因为触发点是园区通电风险，而不是一个可选的 ESG 工具采购 [9,10,18]。"
  "buyingTriggers":
  - "point": "新园区需要的稳定电力时点，公用事业用常规供电方案满足不了，因此就地配套或通过合同锁定清洁发电，开始变成选址问题。"
    "sourceRefs":
    - 9
    - 10
    - 18
  - "point": "州和联邦层面对大负荷并网与成本分摊的审查正在加强，采购结构一旦设计不好，代价会更高。"
    "sourceRefs":
    - 12
    - 29
  - "point": "眼前出现一笔真实的地热承购机会，但采购方内部缺少足够深的地热承保能力，又想赶在稀缺稳定容量被锁定前先动起来。"
    "sourceRefs":
    - 4
    - 16
  "willingnessToPay":
    "summary": "这类工作流的公开定价几乎没有，但付费意愿可以从三个事实侧面得到支持：采购方现在就会雇专业顾问，因为 PPA 的财务后果往往持续十年以上 [19]；相邻厂商已经在向同一批团队售卖高价的市场情报和风险管理工作流 [20,21]；而复杂的可再生能源采购也早就需要专门的安全软件预算，不再靠临时文件传输来处理 [22]。"
    "sourceRefs":
    - 19
    - 20
    - 21
    - 22
  "competitiveLandscape": "今天的竞争格局可以拆成三类：(i) LevelTen 一类的 PPA 市场与交易基础设施 [19,20]；(ii) Pexapark 一类的 PPA 定价/风险平台 [21]；(iii) Ansarada 一类的通用基础设施采购/尽调空间 [22]。真正的替代方案仍是独立工程师、外部律师和电子表格 [19,21]。这些选项没有任何一个会把储层不确定性、钻井里程碑、保险问题和合同兜底条款，当成同一个共享的地热承保对象来处理 [4,5,14]。"
  "incumbentThesis":
  - "incumbentClass": "PPA 市场平台"
    "point": "像 LevelTen 这样的产品在广谱可再生能源交易撮合和基准分析上很强，但默认并不会把储层与施工证据整理成采购方可直接使用的地热承保包。"
