    - 19
    - 21
  - friction: 大型负载并网与成本分摊规则在买方规划园区时仍在变化。
    severity: 高
    affectedBuyer: 首席开发官 / 电力副总裁
    mitigation: 按市场嵌入可配置的监管工作流和司法辖区专属证据请求。
    sourceRefs:
    - 12
    - 29
  - friction: 如果平台成为系统记录层，客户可能会期待签约后的持续监控。
    severity: 中
    affectedBuyer: 客户成功与产品团队
    mitigation: 通过里程碑仪表盘与伙伴集成来应对，而不是组建一个服务密集的工程团队。
    sourceRefs:
    - 5
    - 20
    - 22
market:
  tam:
    value: $31.5M
    rationale: 自下而上的滩头市场模型：75 个活跃的美国买方/开发商账户（60 个买方团队和 15 个地热卖方团队）× 每个活跃账户约 $420k 的混合年度平台与工作流收入。账户数锚定于大型负载需求上升 [10]、Fervo 披露的 3.65 GW 近期管线 [16]，以及聚焦美国西部而非长期地热全景。DOE 对地热 60-90 GW 的长期潜力则作为自上而下的交叉校验，说明品类天花板远大于初始工作流切口 [13]。
    isEstimate: true
    sourceRefs:
    - 10
    - 13
    - 16
    - 23
  sam:
    value: $12.6M
    rationale: 即时可服务市场假设有 30 个近期账户（25 个西部买方团队以及 5 个活跃地热卖方/投资方），最可能在未来几年内进行真实采购 × 同样约 $420k 的混合年度价值。约束来自当前商业交易量，而非买方痛点。
    isEstimate: true
    sourceRefs:
    - 4
    - 10
    - 16
    - 29
  som:
    value: $4.2M
    rationale: 第 3 年可触达份额假设通过高触达企业销售在活跃采购中拿下 10 个真实账户，这与面向集中型买卖双方的服务辅助销售方式相一致。
    isEstimate: true
    sourceRefs:
    - 17
    - 19
    - 22
