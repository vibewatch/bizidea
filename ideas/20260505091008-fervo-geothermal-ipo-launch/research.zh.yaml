  adoptionFrictionMatrix:
  - friction: 开发商可能犹豫是否分享足够多的地下数据，以支持标准化的买方承保。
    severity: 高
    affectedBuyer: 地热开发商与买方尽调负责人
    mitigation: 先从买方侧清单/红线工作流切入，并在 NDA 与里程碑门槛下逐步开放卖方数据层。
    sourceRefs:
    - 14
    - 22
  - friction: 目前真实地热采购仍然较少，限制了短期 logo 数量。
    severity: 高
    affectedBuyer: 创始人与 GTM 负责人
    mitigation: 聚焦已经在应对西部电力瓶颈的买方，然后把工作流扩展到相邻的稳定清洁资产。
    sourceRefs:
    - 16
    - 24
    - 25
  - friction: 长期 PPA 采购依旧高度依赖律师和顾问。
    severity: 中
    affectedBuyer: 电力采购高管
    mitigation: 将产品定位为现有顾问的共享基础设施，而不是替代法律或工程签字。
