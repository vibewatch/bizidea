  "regulatoryLandscape": "地热项目在美国西部仍要经过公共土地租赁和环境审查流程；BLM 管理着大约 245 million acres 的地热租赁，并披露其管理土地上已有 51 座在运地热电站 [15]。BLM 新近推出的分类豁免可以缩短资源确认环节，但项目开发仍要依赖许可审批和后续环境分析 [26]。负荷侧这边，大负荷并网和成本分摊规则正在 FERC 与各州公用事业程序中快速变化，给新园区增加了更多尽调复杂度 [12,29]。项目融资还依赖通过可转让或 elective-pay 机制把清洁能源税收抵免变现 [27]。"
  "technologyLandscape": "增强型地热系统依赖于建立或重新打开渗透通道，并让流体在高温岩层中循环，因此地下证据和钻井执行会成为承保的核心 [14]。Fervo 报告称 Cape Station 的钻井时间同比下降 70%，加上 Google 在 Nevada 的项目已投入运行，这些信号都说明，油田式执行正在让地热更可复制 [5,8]。其他路线——包括 Quaise 的超热地热和 Eavor 的闭环系统——会继续扩大未来供应商池；如果这家创业公司能先赢下里程碑 schema，它就有机会建立一个与具体资产类型无关的承保层 [24,25]。"
