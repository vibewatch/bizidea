modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Evergreen launch triggers] --> Pilots[Paid pilots]
      Partners[Administrator referrals] --> Pilots
      Pilots --> Customers[Annual customers]
      Customers --> Revenue[Subscription + case fees]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by moving from one paid pilot in Y1 to 8 active customers by Q4Y2 and 15 by Q4Y3 at roughly $240K exit ARR per customer.
- checkName: Must go right
  finding: Pilot-to-annual conversion plus one productive administrator referral must show up by Y2 because sensitivity shows sales-cycle slippage is the fastest way to consume the seed buffer.
- checkName: Model breaks if
  finding: The downside case appears if Y2 exits closer to 6 than 8 customers and gross margin stalls below 72%, because cash turns negative before Y3 ends.
- checkName: Next-round proof
  finding: The next financing is justified once the company reaches 5-8 paying accounts, 80%+ reviewer acceptance, and a repeatable $200K+ ACV motion with referral evidence.
sanityChecks:
  ruleOf40: Y3 growth 164.2% + EBITDA margin -15.7% = 148.5%.
  burnMultiple: Y2 burn multiple is about 0.8x on roughly $1.42M of net new ARR; Y3 improves to about 0.3x on roughly $1.73M of net new ARR.
  revenuePerFte: $274K Y3 using $3.01M revenue and 11 year-end FTE (benchmark $200–400K SaaS).
  flags:
  - Quarterly Y2-Y3 revenue assumes customers that appear in a quarter go live early enough to contribute for that quarter, so a one-quarter sales slip would pressure cash materially.
  - The base case needs the company to hit the high end of the BP’s 5-8 customer milestone by Q4Y2; landing only 5-6 accounts likely requires slower hiring or extra capital.
  - Gross margin only reaches the 75% target once implementation and integration work standardize, so persistent bespoke work would weaken payback and burn multiple.
