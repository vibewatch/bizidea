scenarios:
  downside:
    description: Pilot conversion is slower, one administrator referral slips out of Y2, and gross margin tops out below the software target.
    y3RevenueK: 2131.5
    y3EbitdaK: -1188.4
    cashLowPointK: -858.1
    keyAssumptionChanges:
    - Q4Y2 exits at 6 customers instead of 8.
    - Q4Y3 exits at 12 customers instead of 15.
    - Steady-state gross margin reaches 72% instead of 75%.
  base:
    description: One paid pilot in Y1 converts into an 8-customer Q4Y2 base and a 15-customer Q4Y3 exit while margin reaches the BP target.
    y3RevenueK: 3012.0
    y3EbitdaK: -471.8
    cashLowPointK: 158.1
    keyAssumptionChanges:
    - Q4Y2 exits at 8 active customers and Q4Y3 exits at 15.
    - Per-customer monthly revenue steps from pilot pricing to $20.0K by Q4Y3.
    - Gross margin reaches 75% by Y3 as implementation becomes more repeatable.
  upside:
    description: Reference wins and one channel partner accelerate logo adds, so the company approaches the research SOM exit earlier and nearly breaks even in Y3.
    y3RevenueK: 3417.0
    y3EbitdaK: -102.7
    cashLowPointK: 561.3
    keyAssumptionChanges:
    - Q4Y2 exits at 9 customers and Q4Y3 exits at 17.
    - Exit ARR per customer reaches about $252K through richer case-volume and integration fees.
    - Steady-state gross margin reaches 77% as integrations standardize faster.
