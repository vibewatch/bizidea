slug: evergreen-transfer-agency-agent
date: '2026-07-01'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: '[BP date 2026-07-01] Because the business plan is dated on the first day of the month, the model starts immediately in July 2026.'
- id: A2
  name: Opening cash from seed raise
  value: '2800'
  unit: USD K
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M; BP fundingAsk.runwayMonths 18] The model uses a $2.8M seed so the company reaches the 8-customer Q4Y2 milestone and still carries the required 6-month buffer into Q2Y3.'
- id: A3
  name: Customer unit definition
  value: one paying evergreen manager or administrator deployment
  unit: customer
  source: '[BP businessModel.unitOfValue; BP executiveSummary] The first contract lands on one reviewed exception queue for one paying operating entity before broader multi-workflow expansion.'
- id: A4
  name: Paid pilot pricing
  value: $112.5K over 90 days
  unit: USD K per pilot
  source: '[BP investorMemo.firstCustomer.initialContract $75k-$150k pilot] The model uses the midpoint pilot value to price the first paid design partner in Y1.'
- id: A5
  name: Steady-state annual contract value
  value: $240K ARR per customer
  unit: USD K per customer-year
  source: '[BP investorMemo.firstCustomer.initialContract $200k-$250k annual contract; research.market.som 15 customers x ~$240k ACV] The base case uses the midpoint-to-low end of the annual range and matches the research SOM math.'
- id: A6
  name: Y1 customer ramp
  value: 0 customers through M9, then 1 paid pilot in M10-M12
  unit: customers
  source: '[BP milestones 0-12 months; BP product.sixMonth] The first year only assumes one paid pilot because the plan says the first 90 days must validate price, queue selection, and reviewer acceptance before broader rollout.'
- id: A7
  name: Y2 customer ramp
  value: Q1Y2/Q2Y2/Q3Y2/Q4Y2 customers = 2/4/6/8
  unit: customers
  source: '[BP milestones 12-24 months 5-8 paying customers; BP product.twelveMonth; BP gtm.funnelTargets] The base case chooses the high end of the BP milestone because the seed plan adds the first AE only after the first pilot is live.'
- id: A8
  name: Y3 customer ramp
  value: Q1Y3/Q2Y3/Q3Y3/Q4Y3 customers = 10/12/14/15
  unit: customers
  source: '[BP milestones 24-36 months 15+ managers; research.market.som 15 customers by year 3] The base case exits Y3 at 15 customers, matching the published SOM target rather than assuming faster land-grab expansion.'
- id: A9
  name: Blended monthly revenue per active customer
  value: Y1 pilot months $37.5K; Y2 quarters $18.0K/$18.5K/$19.0K/$19.5K; Y3 quarters $19.0K/$19.5K/$20.0K/$20.0K
  unit: USD K per customer-month
  source: '[A4; A5; BP businessModel.revenueStreams] The blend steps down from pilot pricing into annual software, case-volume fees, and modest implementation revenue while still exiting Q4Y3 at $3.6M ARR (15 customers x $240K).'
- id: A10
  name: Gross margin ramp
  value: Y1 pilot months 50%; Y2 quarters 58%/62%/66%/70%; Y3 quarters 72%/74%/75%/75%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 75; BP strategicChoices.sequencingRationale] Early deployments carry heavier implementation and review-support cost before the model reaches the long-run software margin target.'
- id: A11
  name: Monthly churn
  value: '2.0'
  unit: percent
  source: Startup-finance heuristic for sticky but still early enterprise workflow software where human-approved operational tooling should retain well once embedded, but product and compliance risk still justify non-zero churn.
- id: A12
  name: Loaded annual salary bands
  value: Founder/CEO $160K; Founding Engineer $190K; Compliance/Ops $150K; Integrations Engineer $180K; AE/Partnerships $170K; Implementation/CS $140K; G&A/Finance $120K
  unit: USD K per FTE-year
  source: '[BP team] Startup-finance heuristic for a U.S. seed-stage enterprise software team with one domain expert, one workflow engineer, and lean go-to-market staffing.'
- id: A13
  name: Hiring schedule and headcount snapshots
  value: M4 Compliance/Ops; M7 Integrations Engineer; M10 AE/Partnerships; M15 Implementation/CS; M20 second Integrations Engineer and second AE; M27 second Compliance/Ops plus G&A; M30 second Implementation/CS. Snapshot FTE by role across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3 = Founder 1/1/1/1/1/1, Founding Engineer 1/1/1/1/1/1, Compliance 0/1/1/1/1/2, Integrations 0/0/1/1/2/2, AE 0/0/0/1/2/2, Implementation 0/0/0/0/1/2, G&A 0/0/0/0/0/1
  unit: hires and FTE snapshots
  source: '[BP team; BP strategicChoices.sequencingRationale; BP milestones] The plan hires domain expertise before scale GTM and only adds support capacity after the first pilot and the first repeatable annual contracts.'
- id: A14
  name: Non-salary operating budgets
  value: Y1 S&M monthly 10/10/12/12/14/14/16/16/18/20/20/20; Y1 R&D monthly 12/12/13/13/15/15/17/17/18/18/18/18; Y1 G&A monthly 8/8/8/10/10/10/11/11/12/12/12/12. Y2 quarterly S&M/R&D/G&A = 70/55/40, 80/60/45, 90/65/50, 100/70/55. Y3 quarterly S&M/R&D/G&A = 105/72/58, 115/77/63, 125/82/68, 135/87/73
  unit: USD K
  source: '[BP operations; BP fundingAsk.useOfFundsSummary] Startup-finance heuristic for founder travel, channel development, cloud/inference, legal/compliance, insurance, and implementation overhead around a regulated workflow product.'
- id: A15
  name: Quarterly recognition and payroll smoothing method
  value: Y2-Y3 quarterly revenue uses the quarter-end active-customer count and salary expense is rolled up from the underlying month-by-month hiring schedule
  unit: method
  source: '[Financial Modeler contract headcount convention; BP gtm.funnelTargets] The artifact only exposes quarterly rows after Y1, so the model assumes contracts that appear in a quarter are live early enough to contribute for that quarter; this is called out again in sanityChecks.flags because later closes would reduce cash.'
- id: A16
  name: Fully loaded CAC
  value: '120'
  unit: USD K per customer
  source: Model-derived from roughly $522K of non-salary sales and marketing spend through Y2 plus partial founder and AE compensation across the first 8 active customers, rounded for a conservative enterprise-sales CAC.
- id: A17
  name: Downside scenario deltas
  value: Q4Y2 exits at 6 customers, Q4Y3 at 12, exit ARR per customer falls to about $228K, and steady-state gross margin reaches only 72%
  unit: scenario inputs
  source: '[BP risks buyer power and deployment friction; research.reportMemo.sensitivityCases] The downside concentrates on the most credible failure mode: slower conversion and more services-heavy delivery.'
- id: A18
  name: Upside scenario deltas
  value: Q4Y2 exits at 9 customers, Q4Y3 at 17, exit ARR per customer rises to about $252K, and steady-state gross margin reaches 77%
  unit: scenario inputs
  source: '[BP businessModel.expansionLevers; BP milestones] The upside assumes early reference wins plus one productive administrator channel without changing the core product scope.'
- id: A19
  name: Cash conversion simplification
  value: EBITDA approximates cash movement after the seed close
  unit: method
  source: Startup-finance heuristic for an asset-light software company with no debt, capex, or tax line modeled separately at this stage.
- id: A20
  name: Next-round milestone and runway definition
  value: 8 paying customers by Q4Y2 plus 6 months of buffer into Q2Y3
  unit: milestone
  source: '[BP fundingAsk.runwayMonths 18; BP milestones 12-24 months] The funding ask is sized to hit the BP’s repeatability milestone and then preserve an explicit six-month cash cushion before the next financing.'
