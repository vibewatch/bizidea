problem: >-
  Private-credit and real-estate managers launching evergreen funds still process
  subscriptions, redemptions, cash movements, and investor notices across
  separate ERP systems, bank portals, shared inboxes, document folders, and
  spreadsheets. The same data gets retyped multiple times per transaction, then
  checked again by fund accounting, treasury, transfer-agency, and administrator
  teams. As tighter regulation and wealth-channel distribution raise volume while
  qualified accountants decline, the real bottleneck becomes exception handling
  rather than ledger entry. Firms end up paying senior ops staff to assemble case
  files by hand, slowing investor processing and raising operational risk.
targetUser:
  primary: Head of fund operations or transfer-agency lead at a private-credit or real-estate manager running evergreen wealth-channel funds
  secondary: Fund accounting, treasury, and investor-operations teams reviewing subscription, redemption, and cash-exception cases
  buyer: COO or CFO at the management company
startupThesis:
  nonObviousInsight: >-
    The next big private-markets software wedge is not another core accounting
    system; it is the exception-resolution layer created when evergreen funds
    make private assets behave more like high-frequency retail products. Core
    records already live in ERP and banking systems, but the painful work sits
    between them in procedures, emails, documents, and approvals. If a startup
    can compile each firm's playbook and keep humans in review, it can automate
    the last mile that managers and administrators still run by spreadsheet.
  beachhead: >-
    Subscription, redemption, and cash-exception handling for U.S. and UK
    private-credit and real-estate managers running 2-6 evergreen funds through
    private banks or RIAs, with investor records split across ERP, banking
    portals, email, and document storage
  wedge: >-
    A transfer-agency workflow agent that assembles each investor case, matches
    instructions to prior records, drafts next actions and notices, and routes
    approvals with a full audit trail
  whyNowCatalyst: >-
    Nomerra's funding and the sources' repeated emphasis on evergreen
    structures, new investor channels, accountant shortages, and audit-ready
    agents show that private-markets firms now have a near-term scaling problem
    in back-office workflow rather than a vague future AI ambition.
  ventureScalePath: >-
    Start with evergreen-fund transfer agency and cash exceptions, then expand
    into fund accounting close, treasury forecasting, investor servicing, and
    the broader operating layer used by managers, administrators, and asset
    servicers across private markets.
solution: >-
  The product sits above a manager's existing ERP, banking portals, email
  queues, and document repositories to build a live case file for every
  subscription, redemption, cash movement, or investor instruction mismatch. It
  reads forms, notices, prior investor records, and procedure docs, then
  proposes the next action, creates reviewer checklists, and drafts outbound
  notices or internal handoffs with citations. Humans approve every action
  before anything is posted or sent, preserving the audit trail private markets
  need. The first ROI is not "AI chat"; it is faster turnaround on
  exception-heavy investor operations with fewer rekeys and fewer misses at
  month-end or reporting time. As the system sees more resolved cases, it learns
  which edge conditions, counterparties, and procedures drive the most
  operational drag.
goToMarketSeed:
  firstCustomer: >-
    A $5B-$25B AUM private-credit or real-estate manager with 2-5 evergreen
    vehicles, distribution through private banks or RIAs, one internal fund-ops
    team, and recurring subscription or redemption exceptions landing in shared
    inboxes and spreadsheets
  buyingTrigger: >-
    Launch of a new evergreen vehicle, entry into a new wealth-distribution
    channel, or a quarter-end spike in subscriptions, redemptions, and investor
    reporting that overwhelms existing staff
  currentAlternative: >-
    Fund-accounting systems, bank portals, email inboxes, spreadsheets, and
    third-party administrator workflows stitched together with manual review
  switchingReason: >-
    The wedge removes the highest-friction exception work without asking the
    firm to replace core systems, while giving compliance and operations leaders
    a reviewable audit trail
  pricingHypothesis: >-
    Annual platform subscription priced by active evergreen vehicles and
    processed exception cases, with premium fees for banking, administrator, and
    document-system integrations
