jobsToBeDone:
  - job: >-
      When subscription or redemption instructions hit multiple inboxes and
      systems, help the fund-ops lead build a complete reviewed case fast, so
      they can process the investor without rekeying or missed checks.
    currentAlternative: Manual reconciliation across spreadsheets, email, bank portals, and administrator handoffs
    successMetric: Turnaround time per subscription or redemption case and reduction in reopened exceptions
  - job: >-
      When a cash movement or investor record does not match across systems, help
      the treasury or fund-accounting lead identify the break and route the
      right approval, so they can keep reporting and close processes on
      schedule.
    currentAlternative: Ad hoc exception queues managed in shared inboxes and spreadsheet trackers
    successMetric: Days to resolve cash exceptions and number of unresolved breaks entering month-end
