topRisks:
  - name: Regulatory-accuracy risk
    description: A bad AI-prepared subscription, redemption, or notice workflow could create investor harm and shut down expansion inside regulated fund operations.
    mitigation: Start with approval-gated case assembly and reviewer routing, keep citations for every field and action, and avoid autonomous posting in the first deployments.
  - name: Integration drag
    description: ERP, banking, email, and document systems are fragmented enough to slow deployments and make pilots feel expensive.
    mitigation: Begin with read-only ingestion for one evergreen fund, support inbox and file-drop connectors first, and deepen systems integration only after proving exception-resolution value.
  - name: Incumbent and admin inertia
    description: Managers may prefer adding administrator hours or waiting for existing fund-accounting vendors instead of buying a new workflow layer.
    mitigation: Sell into evergreen launches or channel expansions, quantify turnaround gains on one exception queue, and position the product as additive to administrators and core systems.
