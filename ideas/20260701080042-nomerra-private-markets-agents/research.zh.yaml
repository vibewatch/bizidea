competitors:
- name: Nomerra
  stage: 种子轮
  wedge: 带审计轨迹的 AI 原生私募市场运营智能代理，覆盖基金会计、资金和过户代理。
  pricing: 定制 / 未披露
  strength: 与拟议创业公司叙事最接近，而且已经围绕可审计工作流自动化定位。
  weaknessVsUs: 非常早期，仍横跨多个后台领域，留出了更窄的常青过户代理异常切口。
  sourceRefs:
  - 1
- name: Juniper Square
  stage: 规模化
  wedge: 连接 GP 软件、基金管理、投资者服务、募资和 AI 赋能 IR 工作流。
  pricing: 定制 / 未披露
  strength: 装机基础大，在管理和募资环节拥有很强的投资者工作流上下文。
  weaknessVsUs: 平台取向太宽，在认购、赎回和现金异常案件汇编上不够专门。
  sourceRefs:
  - 8
  - 9
  - 23
- name: Allvue Systems
  stage: 现有厂商
  wedge: 私募债和另类投资会计、报告与投资者门户软件。
  pricing: 定制 / 未披露
  strength: 私募信贷领域深度强，在另类资产管理人中会计可信度高。
  weaknessVsUs: 记录系统和报告重心更强，弱在横跨邮件、文档和门户的常青异常编排。
  sourceRefs:
  - 10
  - 11
  - 25
- name: SS&C
  stage: 现有厂商
  wedge: 全球规模的零售另类资产过户代理、投资者服务和私募信贷运营。
  pricing: 定制 / 服务较重
  strength: 服务规模根深蒂固，复杂结构可信度高，已有投资者服务足迹。
  weaknessVsUs: 服务主导模型更难按一家管理人的常青异常工作流调优，对中端团队也会显得重。
  sourceRefs:
