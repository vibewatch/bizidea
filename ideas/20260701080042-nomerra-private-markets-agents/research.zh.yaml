  pricing: 定制 / 未披露
  strength: 开户切口紧凑、合规负担重，工作流归属清晰。
  weaknessVsUs: 强在摄取和投资者合规，弱在赎回、资金或认购后的异常处理。
  sourceRefs:
  - 12
  - 29
