slug: evergreen-transfer-agency-agent
date: '2026-07-01'
executiveSummary: >-
  常青型私募信贷和地产基金已经把认购、赎回和现金差错处理拖成了结构性瓶颈：252
  只在美注册的活跃常青载体、全球 520 只常青基金，如今投资者交易还要靠 ERP、银行
  门户、邮件和 Excel 表格来回转手，而合格会计人才池十年里已经缩水三分之一。我们
  在打造一个审批门控的案件汇编智能代理，架在管理人现有系统之上，把每一笔认购、赎
  回或现金差错案件连同引用依据一并编好，起草下一步动作和外发通知，再交人工签字
  放行——不经批准绝不过账。滩头市场是管理规模 $5B-$25B、经 RIA 或私人银行渠道
  运营 2-6 只常青载体的私募信贷和地产管理人，卖点是投资者处理更快、更经得起审
  计，而不是替换人手，直接对 COO 或 CFO 谈。Nomerra 融到 $2M 说明投资人看好这
  层工作流，但没有任何资料点出过户代理这条线上已有付费客户、披露过定价，或者说
  清楚哪条队列——认购、赎回还是现金差错——转化最快，所以头 90 天必须先把这件事
  验证清楚，再谈铺开。我们的切口比 Nomerra 宣称的基金会计-资金-过户代理全景要
  窄：先只做过户代理和现金差错，基金会计结算和资金预测等第一个垂直跑通了再说。
  护城河是每家客户专属的流程与异常图谱，加上一份逐笔标注的智能代理动作通过/驳回
  历史记录——这是现有厂商和通用 AI 工具短期内很难复制的。最大的风险是 AI 起草
  的投资者操作出错带来的监管合规风险，应对办法是至少头两年里每一笔过账和通知都
  要人工批准。我们要融一轮种子轮，资金用于落地三个共创客户部署、验证异常处理周
  转时间的提升，并在扩大工作流覆盖面之前先跑通可复制的 $200k+ ACV 销售打法。
problem:
  - >-
    运营常青型财富渠道基金的私募信贷和地产管理人，认购、赎回、现金划转和投资者
    通知都摊在互不相通的 ERP、银行门户、共享邮箱、文件夹和 Excel 表格里处理，同
    一笔数据基金会计、资金、过户代理和管理人团队要反复重录、反复核对，一笔交易
    能被检查好几遍。
  - >-
    监管收紧和新的财富分销渠道正在推高交易量，合格会计人才池却在同步萎缩——过
    去十年缩水约三分之一，而私募市场预计五年内规模翻三倍——瓶颈因此从记账本身
    转移到了异常处理上，只能靠资深运营人员手工拼凑。
solution:
  - >-
    一个审批门控的工作流智能代理，读取管理人 ERP、银行门户、邮件队列和文档库里的
    表单、通知、历史投资者记录和流程文档，给每一笔认购、赎回或现金差错都建一份
    实时案件档案，再带引用依据提出下一步动作建议。
  - >-
    每一笔起草的过账、通知或内部交接，发出或入账前都要先过人工审核，既保住私募
    市场要求的审计轨迹，又把员工从组装案件档案的活里解放出来，改做审核 AI 起草
    的工作；每结案一次，还能反哺该客户专属的异常模式模型。
whyWeWin:
  - >-
    我们比 Nomerra 宣称的基金会计/资金/过户代理全景要窄：只做常青过户代理和现
    金差错这一个切口，能先在一条队列上证明周转时间的投资回报，管理人不必一上来
    就把核心账本或预测业务交给我们。
  - >-
    全能型过户代理和 GP 平台（Juniper Square、Allvue、SS&C）掌握着记录系统或服
    务规模，但要围着一家公司的异常处理手册去配置，结构上天生慢；我们卡在它们系
    统之间的流程与异常层，不是要取代它们。
  - >-
    邮箱、门户和文档库都走只读接入，部署几周就能启动，不用像替换核心系统那样等
    上几个季度——这也印证了技术格局研究的判断：OCR/IDP 和邮件授权工具已经足够
    成熟，能撑起"辅助准备、不做自主决策"这类工作流。
strategicChoices:
  beachhead: >-
    面向管理规模 $5B-$25B、经私人银行或 RIA 分销 2-6 只常青基金的美英私募信贷
    和地产管理人，做认购、赎回和现金差错处理——这类客户的投资者记录本就散落在
    ERP、银行门户、邮件和文档存储里。
  wedgeRationale: >-
    过户代理异常范围窄、可重复，买家也认得清——COO/CFO 通过基金运营负责人拍
    板——一个季度内就能用周转时间量出成效；基金会计结算或资金预测就不一样，得
    先攒够系统信任，销售周期也更长，验证点出现之前谈不上任何证据。
  sequencingRationale: >-
    我们先做邮箱/文档的只读接入，银行或 ERP API 对接放后面；先卖通一条异常队
    列，再谈扩展第二条；渠道伙伴（资产服务商或过户代理顾问）要等直销把周转时间
    的说法验证过了才引入——研究显示买方议价能力强，价值没证明之前必须把转换成
    本压低。
  notYet:
    - >-
      基金会计结算自动化和资金现金预测——Nomerra 自己的定位把这两块当作相邻业
      务，但它们需要的账本信任程度，远超首次部署买家愿意给的量级。
    - >-
      全面取代资产服务商现有的合作关系；第一年我们把资产服务商和过户代理顾问当
      渠道伙伴来对接，而不是挤掉他们。
    - >-
      自主（不经人工审核）过账或直接面向投资者的沟通——监管和声誉风险决定了这
      条路走不通，除非攒够好几个季度的审核通过率数据。
market:
  tam: "$420.0M（预估，参照 research.yaml：约 1,200 家目标机构 x 约 $350k ACV）"
  sam: "$45.0M（预估，参照 research.yaml：约 180 家符合首批客户画像的美英常青管理人 x 约 $250k 首年 ACV）"
  som: "$3.6M（预估，参照 research.yaml：第 3 年 15 家客户 x 约 $240k ACV）"
  segments:
    - >-
      运营常青型财富渠道基金的私募信贷和地产管理人（主战场：管理规模 $5B-$25B、
      2-6 只载体）
    - >-
      代多家管理人处理半流动性私募基金的基金资产服务商（次要战场，走伙伴渠道）
  buyingProcess: >-
    基金运营负责人或过户代理主管，通常是在新常青载体上线或财富渠道扩张时发现这
    个痛点；预算由 COO 或 CFO 拍板，他们一般会先要求在一条异常队列上做限定范围
    的试点，拿到可衡量的周转时间和重开案件率数据，才会签全公司范围的合同。
product:
  mvp: >-
    一个只读的案件汇编智能代理，先啃一只常青基金的认购和赎回异常：接入邮箱、门户
    导出文件和上传文档，把指令和历史投资者记录做匹配，带引用依据起草下一步动作
    和外发通知，每一项都要过人工审批队列，全程留痕。
  sixMonth: >-
    把同一批共创客户的覆盖范围从认购/赎回异常扩展到现金差错处理，给一两个指定
    的 ERP/银行平台加装直连只读接口，减少手工导出步骤，再上线一个审核分析仪表
    盘，按队列展示周转时间和重开案件率。
  twelveMonth: >-
    在过户代理和现金差错这两条队列上拿下 5-8 家付费常青管理人客户，和一家资产
    服务商或过户代理顾问敲定正式渠道合作，并根据现有客户验证过的需求，开始为下
    一个扩展模块——基金会计结算异常处理——做需求梳理。
  twentyFourMonth: >-
    成为 15 家以上常青管理人和至少一家资产服务商认定的异常处理记录层，基金会计
    结算和资金现金预测模块进入付费试点阶段，流程与异常图谱也要成熟到能在老客户
    身上量出实打实的审核时间缩减。
  keyBets:
    - >-
      买家会先为经过审核的案件准备软件付费，再谈信任任何自主过账——这和研究发
      现一致：运营团队想要 AI 打下手，不是替他们做判断。
    - >-
      光靠邮箱和文档的只读接入，就足够证明周转时间的投资回报，首次部署不需要深
      度对接 ERP/银行 API。
    - >-
      认购、赎回、现金差错这三条异常队列里，总有一条转化明显更快，头 90 天的共
      创客户需求梳理电话会摸清是哪一条。
gtm:
  wedge: >-
    给正在新上线载体或拓展财富分销渠道的 $5B-$25B 管理人，卖一个限定范围、审批
    门控的试点——聚焦一只常青基金的认购与赎回异常队列，定价目标是一个季度内证
    明周转时间的缩短。
  channels:
    - >-
      创始人主导销售，直接对接目标管理人的 COO、CFO 和基金运营负责人——目标客
      户通过常青载体上线和 RIA/私人银行分销公告来筛选
    - >-
      和已经卡在异常工作流瓶颈里的资产服务商、过户代理顾问建立转介和联合销售伙
      伴关系
    - >-
      共创客户试点卡准常青基金上线或财富渠道扩张的节点，这时候采购触发因素本来
      就已经在起作用
  funnelTargets: "线索 -> 限定范围试点转化率 25-35%；试点 -> 两个季度内转为付费年度合同 50%+"
  pricing: >-
    年度平台订阅费按活跃常青载体数量计价，再加每处理一笔异常案件的量费，直连银
    行、资产服务商或文档系统的对接另收溢价费；这套定价对应的是研究验证过的付费
    意愿基础——现有的过户代理和后台现代化预算，而不是另开一条新预算线。
businessModel:
  revenueStreams:
    - 按活跃常青载体计价的年度软件订阅
    - 按处理的异常案件或投资者交易计价的量费
    - 流程梳理与系统对接的一次性实施费
  unitOfValue: 每只常青载体、每一笔经审核通过的已结投资者异常案件
  targetGrossMarginPct: 75
  expansionLevers:
    - 在现有客户账户内增加现金差错和基金会计结算队列
    - 从单一载体试点扩展到覆盖管理人全部常青基金
    - 借助资产服务商和过户代理顾问伙伴，打入他们现有的管理人客户群
strategyMap:
  northStarMetric: 已上线、经审核通过的异常队列所覆盖的常青载体数量
  inputMetrics:
    - 认购/赎回/现金差错案件的周转时间中位数
    - 智能代理处理后案件的重开率
    - 试点转付费合同的转化率
    - 每季度完成的共创客户需求梳理电话会数量
  moatsToBuild:
    - 基于每家管理人对智能代理动作的通过/驳回记录，搭建的客户专属流程与异常图谱
    - 覆盖常青基金运营中 ERP 导出、银行门户、邮件和文档库的跨系统连接器库
    - 在监管审计约束下，持续提升起草动作准确率的审核通过数据集
  killCriteria:
    - >-
      10 场共创客户访谈里，确认愿意为一条异常队列在需求梳理后两个季度内付
      $150k+ 的不到 2 场
    - >-
      试点跑满两个完整季度后，重开异常率相较基线的改善不到 30%
    - >-
      12 个月内没有任何资产服务商或过户代理顾问渠道伙伴，把转介转化为付费试点
  mermaid: |
    flowchart LR
      Wedge[Evergreen transfer-agency and cash-exception wedge] --> MVP[Read-only case-assembly MVP]
      MVP --> Proof[Design-partner turnaround-time proof]
      Proof --> Expansion[Cash-break and accounting-close expansion]
      Expansion --> Channel[Administrator and TA-consultant channel]
investorMemo:
  verdict:
    call: "值得会面 / 进一步调研"
    conviction: >-
      信心中等：痛点和时机都有扎实证据支撑，但没有任何资料证实已有具名的常青过
      户代理付费客户或价位，下一次会面应该聚焦在验证第一个共创客户上。
    whyBelieve: >-
      结构性证据——常青 AUM 增长、会计人才供给下滑、加上 Nomerra 自己的融
      资——都指向同一个正在发生的后台扩张瓶颈，而且有一个清晰、狭窄、经得起审
      计的自动化切口可以打。
    whyDoubt: >-
      研究里的空白说得很明白：没有具名客户，没有披露定价，也没有证据说明哪条异
      常队列转化最快，所以这套打法眼下还是一个待验证的假设，算不上验证过的打
      法。
    nextDiligence: >-
      至少找 3 家目标管理人跑一遍共创客户需求梳理电话会，确认预算归谁管、是否愿
      意为一条队列付 $150k-$250k，以及认购、赎回、现金差错这三种异常类型里，哪
      一种离签下试点最近。
  firstCustomer:
    title: 中型常青管理人的基金运营负责人 / 过户代理主管
    profile: >-
      管理规模 $5B-$25B、经私人银行或 RIA 分销 2-5 只常青载体的私募信贷或地产
      管理人，内部只有一个基金运营团队，靠共享邮箱和 Excel 表格处理反复出现的认
      购和赎回异常。
    trigger: >-
      新常青载体上线、进入新的财富分销渠道，或者季末认购、赎回和投资者报告集中
      冲量，把现有人手压垮。
    buyer: 管理公司的 COO 或 CFO
    initialContract: >-
      针对一条异常队列的限定范围 90 天试点，定价约 $75k-$150k，一旦证明周转时
      间和重开案件率有改善，转为 $200k-$250k 的年度合同。
  mustBeTrue:
    - 一家 $5B-$25B 的常青管理人，会在一个财年周期内为一条异常队列点名并优先分配预算。
    - 只读的邮箱/文档接入，足以提供起草准确、可引用案件结论所需的上下文，不需要深度对接 ERP 或银行 API。
    - 试点头两个季度里，审核人员会信任并通过大多数智能代理起草的动作，而不是大多驳回。
    - 头 12 个月内，至少有一家资产服务商或过户代理顾问会转介或联合销售出一个付费试点。
    - 选定的第一条队列（认购、赎回或现金差错）能拿出可衡量的周转时间改善，同时不增加重开或升级案件。
  diligenceQuestions:
    - 具体访谈过哪些管理人或资产服务商？有没有人确认过试点的预算数字或时间表？
    - 有什么证据能说明，审核人员通过智能代理起草动作的比例，足够高到能对得起订阅价格、划算过现有人力成本？
    - 对于异常数据主要存在无法导出记录的系统里的公司，产品的只读接入方案怎么应对？
    - 在不用从头重建案件汇编逻辑的前提下，接入第二个共创客户的流程集，现实的时间和成本要多少？
    - 如果 Nomerra 或某个 GP 平台类现有厂商，在 12 个月内上线一个更窄的常青异常功能，这个切口还守得住吗？
operatingAssumptions:
  - assumption: >-
      一家 $5B-$25B AUM 的常青管理人，会先为一条经审核的异常队列每年付
      $150k-$250k，再谈扩展到其他工作流。
    basis: research.yaml
    validationTest: >-
      完成 10 场共创客户访谈（依据 research.yaml 的 validationPlan），确认现有
      FTE 负荷、SLA 痛点和预算归属；至少从 3 家里拿到签字的定价意向。
    decisionImpact: >-
      如果验证出来的付费意愿只有 $50k-$75k，定价模型就要改成按案件量收费，融资
      额度和招聘节奏也得跟着放慢。
  - assumption: >-
      邮箱、文档库和门户导出的只读接入，足够搭建准确的案件档案，早期不需要深度
      对接 ERP 或银行 API。
    basis: idea.yaml
    validationTest: >-
      只用只读连接器，在一个共创客户处部署 MVP，衡量案件汇编准确率和审核通过率
      是否达标（不做实质修改的审核通过率 80%+）。
    decisionImpact: >-
      如果只读数据不够用，路线图就得把 ERP/银行对接工作提前，首笔收入的时间要
      多等一到两个季度，实施成本也会上升。
  - assumption: >-
      认购和赎回异常，比现金差错更快转化成签约试点。
    basis: 运营判断
    validationTest: >-
      在敲定工程排期之前，跑三场共创客户需求梳理电话会（依据 research.yaml 的
      validationPlan），对比三种异常类型的基线处理周期、重开率和审核人力配置。
    decisionImpact: >-
      如果现金差错处理转化更快，MVP 范围和首轮销售话术就要重新排序，改成先打现
      金差错，再做认购/赎回。
  - assumption: >-
      头 12 个月内，资产服务商或过户代理顾问渠道伙伴关系能转化出一笔付费转介。
    basis: research.yaml
    validationTest: >-
      接触至少 2 家资产服务商和 3 家过户代理顾问，谈联合销售或转介协议，跟踪两
      个季度内是否有人带来合格的试点线索。
    decisionImpact: >-
      如果没有渠道伙伴关系转化成功，打法就继续全靠创始人主导销售直接进行，原计
      划的伙伴关系岗位改招一名额外的 AE。
operations:
  - >-
    高触达式引导上线，范围限定在一只在营常青基金的异常队列，每个客户都指定专人
    负责实施
  - >-
    每一笔过账或面向投资者的动作都强制走人工审批工作流，全程留存审计轨迹
  - >-
    邮箱只读接入、门户导出和文档库连接器的参考架构，试点验证通过后才扩展到直连
    ERP/银行 API
  - >-
    每个新客户上线前，都要有合规与法务顾问关系来审核通知模板和审计轨迹要求
team:
  - role: 创始工程师（工作流/数据管道）
    startTiming: 第 0 个月
    rationale: >-
      必须先把核心案件汇编引擎和连接器框架搭起来，共创客户试点才能开始接入真实
      数据。
  - role: 创始人主导销售 / 客户成功负责人
    startTiming: 第 0 个月
    rationale: >-
      共创客户需求梳理电话会和试点销售必须由创始人亲自跑，因为买家（COO/CFO）
      看重的行业信誉，普通 AE 现阶段给不了。
  - role: 合规/运营领域招聘（前基金运营或过户代理主管）
    startTiming: 第 3-4 个月
    rationale: >-
      要把每家客户专属的标准作业流程和异常处理手册准确编码进产品，需要真正跑过过户代
      理或基金运营工作流的人，光靠工程人才不够。
  - role: 第二名工程师（系统集成）
    startTiming: 第 6-9 个月
    rationale: >-
      第一个共创客户验证完只读接入之后，直连 ERP/银行连接器就会变成扩展到第二
      个客户之外的瓶颈。
  - role: 客户经理 / 伙伴关系负责人
    startTiming: 第 9-12 个月
    rationale: >-
      只有直销试点打法和周转时间的证明点都齐了，资产服务商和过户代理顾问的渠道
      拓展才谈得上可行。
milestones:
  - horizon: 0-12 个月
    items:
      - "完成 10 场共创客户访谈和 3 场需求梳理电话会，确认预算归属、定价和优先异常队列"
      - "在 1-2 个共创客户处上线认购/赎回异常的只读案件汇编 MVP"
      - "至少把 1 个共创客户转化为签约的 90 天付费试点，并测出周转时间基线"
      - "在第一个正式试点中，确认智能代理起草动作的审核通过率达到 80%+"
  - horizon: 12-24 个月
    items:
      - "在过户代理和现金差错队列上拿下 5-8 家付费常青管理人客户"
      - "至少签下 1 个能带来转介试点的资产服务商或过户代理顾问渠道伙伴"
      - "上线现金差错模块，并开始为基金会计结算扩展做需求梳理"
      - "在至少 3 个客户账户上，证明重开异常率下降 30%+"
  - horizon: 24-36 个月
    items:
      - "成为 15 家以上常青管理人和 1 家以上资产服务商认定的异常处理记录层"
      - "为基金会计结算和资金现金预测模块跑付费试点"
      - "用可复制的 $200k+ ACV 销售打法，达到 $3.6M ARR 的 SOM 目标"
risks:
  - risk: >-
      AI 起草的认购、赎回或通知流程一旦出错，可能损害投资者利益，并在受监管的基
      金运营范围内触发监管或声誉层面的扩张叫停。
    likelihood: Medium
    impact: High
    mitigation: >-
      坚持审批门控的案件汇编流程，每个字段和动作都要走带引用依据的审核路由，至
      少头两年所有部署都不做自主过账。
  - risk: >-
      ERP、银行、邮件和文档系统各自为政，拖慢部署速度，也让共创客户觉得试点成
      本偏高。
    likelihood: High
    impact: Medium
    mitigation: >-
      先从一只常青基金的只读接入做起，优先打通邮箱和文件投递连接器，深层系统对
      接留到异常处理价值验证过之后再做。
  - risk: >-
      管理人更倾向于多买些资产服务商工时，或者等现有基金会计供应商自己加上 AI
      功能，而不是买一层全新的工作流。
    likelihood: Medium
    impact: High
    mitigation: >-
      瞄准正在上线常青载体或拓展渠道、痛点最急的窗口去卖，在一条异常队列上量化
      周转时间的提升，并把产品定位成资产服务商和核心系统的补充，而不是替代品。
  - risk: >-
      现有厂商（Juniper Square、Allvue、SS&C）或 Nomerra 自己，比预期更快地把
      一个更窄的常青异常功能捆绑进产品，侵蚀这个切口的差异化。
    likelihood: Medium
    impact: Medium
    mitigation: >-
      尽早和共创客户一起把流程与异常图谱、审核通过数据集滚起来，在现有厂商推出
      类似窄功能之前先筑起转换成本。
  - risk: >-
      买方议价能力强（买家数量少、又老练，大不了多靠资产服务商或人工顶一阵，推
      迟采购），这会把销售周期拉得比现金跑道假设更长。
    likelihood: Medium
    impact: Medium
    mitigation: >-
      把外呼销售卡准真正的采购触发点（常青载体上线、渠道扩张、季末冲量），不做
      泛泛的陌拜，并把试点定价压低到让对方找不到拖延预算的借口。
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 个月的现金跑道，用来养一名创始工程师和一名领域专家，把案件汇编引擎和连接
    器框架打磨到位；创始人主导销售拿下 5-8 个共创客户和早期付费账户；再启动资产
    服务商/过户代理顾问渠道的初步拓展，目标是在 A轮之前证明可复制的
    $200k+ ACV 经济模型。
