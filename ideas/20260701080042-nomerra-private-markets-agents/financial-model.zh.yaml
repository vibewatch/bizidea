slug: evergreen-transfer-agency-agent
date: '2026-07-01'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date 2026-07-01] 由于商业计划书日期是当月第一天，模型从 2026 年 7 月立即起算。'
- id: A2
  name: 种子轮到账后的期初现金
  value: '2800'
  unit: USD K
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M; BP fundingAsk.runwayMonths 18] 模型按 $2.8M 的种子轮建模，让公司既能做到 Q4Y2 8 家客户的里程碑，又能把所需的 6 个月缓冲带进 Q2Y3。'
- id: A3
  name: 客户计量单位定义
  value: 一个付费常青管理人或资产服务商部署
  unit: customer
  source: '[BP businessModel.unitOfValue; BP executiveSummary] 第一份合同先落在一个付费运营主体的一条经审核异常队列上，再谈更广的多工作流扩展。'
- id: A4
  name: 付费试点定价
  value: $112.5K over 90 days
  unit: USD K per pilot
  source: '[BP investorMemo.firstCustomer.initialContract $75k-$150k pilot] 模型用试点价格区间的中点，给 Y1 第一个付费共创客户定价。'
- id: A5
  name: 稳态年度合同价值
  value: 每客户 $240K ARR
  unit: USD K per customer-year
  source: '[BP investorMemo.firstCustomer.initialContract $200k-$250k annual contract; research.market.som 15 customers x ~$240k ACV] 基准情景取年度区间中低段的数值，并与研究里的 SOM 测算对齐。'
- id: A6
  name: 第 1 年客户爬坡路径
  value: M9 之前 0 个客户，M10-M12 新增 1 个付费试点
  unit: customers
  source: '[BP milestones 0-12 months; BP product.sixMonth] 第一年只假设一个付费试点，因为计划要求头 90 天必须先验证价格、队列选择和审核通过率，再谈铺开。'
- id: A7
  name: 第 2 年客户爬坡路径
  value: Q1Y2/Q2Y2/Q3Y2/Q4Y2 客户数 = 2/4/6/8
  unit: customers
  source: '[BP milestones 12-24 months 5-8 paying customers; BP product.twelveMonth; BP gtm.funnelTargets] 基准情景取 BP 里程碑的高值，因为种子轮计划要等第一个试点跑起来之后才招第一个 AE。'
- id: A8
  name: 第 3 年客户爬坡路径
  value: Q1Y3/Q2Y3/Q3Y3/Q4Y3 客户数 = 10/12/14/15
  unit: customers
  source: '[BP milestones 24-36 months 15+ managers; research.market.som 15 customers by year 3] 基准情景 Y3 年末落在 15 家客户，对齐已公布的 SOM 目标，而不是假设更快的跑马圈地式扩张。'
- id: A9
  name: 每个活跃客户的月度混合收入
  value: Y1 试点月 $37.5K；Y2 各季度 $18.0K/$18.5K/$19.0K/$19.5K；Y3 各季度 $19.0K/$19.5K/$20.0K/$20.0K
  unit: USD K per customer-month
  source: '[A4; A5; BP businessModel.revenueStreams] 混合收入从试点定价逐步过渡到年度软件费、案件量费和少量实施收入，最终仍在 Q4Y3 落在 $3.6M ARR（15 家客户 x $240K）。'
- id: A10
  name: 毛利率爬坡路径
  value: Y1 试点月 50%；Y2 各季度 58%/62%/66%/70%；Y3 各季度 72%/74%/75%/75%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 75; BP strategicChoices.sequencingRationale] 早期部署背着更重的实施和审核支持成本，模型要爬到长期软件毛利率目标还需要时间。'
- id: A11
  name: 月流失率
  value: '2.0'
  unit: percent
  source: 创业公司财务经验法则：企业工作流软件一旦嵌入后黏性应当较强，因为操作都经人工审核，但产品和合规风险仍然支撑非零流失率的假设。
- id: A12
  name: 全额年薪区间
  value: 创始人/CEO $160K；创始工程师 $190K；合规/运营 $150K；集成工程师 $180K；客户经理/合作 $170K；实施/客户成功 $140K；G&A/财务 $120K
  unit: USD K per FTE-year
  source: '[BP team] 创业公司财务经验法则：一支美国种子期企业软件团队，配一名领域专家、一名工作流工程师，GTM 人手精简。'
- id: A13
  name: 招聘节奏与人头快照
  value: M4 招合规/运营；M7 招集成工程师；M10 招客户经理/合作；M15 招实施/客户成功；M20 招第二名集成工程师和第二名 AE；M27 招第二名合规/运营及 G&A；M30 招第二名实施/客户成功。按 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3 的 FTE 快照：创始人 1/1/1/1/1/1，创始工程师 1/1/1/1/1/1，合规 0/1/1/1/1/2，集成 0/0/1/1/2/2，AE 0/0/0/1/2/2，实施 0/0/0/0/1/2，G&A 0/0/0/0/0/1
  unit: hires and FTE snapshots
  source: '[BP team; BP strategicChoices.sequencingRationale; BP milestones] 计划先招领域专家，再扩 GTM 规模，支持性人手要等第一个试点和第一批可复制的年度合同出现之后才增加。'
- id: A14
  name: 非薪酬运营预算
  value: Y1 各月 S&M 10/10/12/12/14/14/16/16/18/20/20/20；Y1 各月 R&D 12/12/13/13/15/15/17/17/18/18/18/18；Y1 各月 G&A 8/8/8/10/10/10/11/11/12/12/12/12。Y2 各季度 S&M/R&D/G&A = 70/55/40、80/60/45、90/65/50、100/70/55。Y3 各季度 S&M/R&D/G&A = 105/72/58、115/77/63、125/82/68、135/87/73
  unit: USD K
  source: '[BP operations; BP fundingAsk.useOfFundsSummary] 创业公司财务经验法则，覆盖创始人差旅、渠道拓展、云/推理、法务合规、保险，以及围绕受监管工作流产品的实施开销。'
- id: A15
  name: 季度收入确认与薪酬平滑方法
  value: Y2-Y3 季度收入按季末活跃客户数计算，薪酬支出则从底层逐月招聘计划汇总而来
  unit: method
  source: '[Financial Modeler contract headcount convention; BP gtm.funnelTargets] 该产物 Y1 之后只展示季度行，模型因此假设一个季度里出现的合同都足够早生效，能为当季贡献收入；sanityChecks.flags 里会再次提醒这一点，因为签约延后会压低现金。'
- id: A16
  name: 全额 CAC
  value: '120'
  unit: USD K per customer
  source: 模型推算：Y2 末累计约 $522K 的非薪酬销售与市场支出，加上创始人和 AE 部分薪酬分摊到前 8 个活跃客户上，取整得到一个偏保守的企业销售 CAC。
- id: A17
  name: 下行情景变量
  value: Q4Y2 年末落在 6 家客户，Q4Y3 年末 12 家，单客户退出期 ARR 降到约 $228K，稳态毛利率只到 72%
  unit: scenario inputs
  source: '[BP risks buyer power and deployment friction; research.reportMemo.sensitivityCases] 下行情景聚焦在最可信的失败模式上：转化更慢，交付也更偏服务化。'
- id: A18
  name: 上行情景变量
  value: Q4Y2 年末落在 9 家客户，Q4Y3 年末 17 家，单客户退出期 ARR 升到约 $252K，稳态毛利率达到 77%
  unit: scenario inputs
  source: '[BP businessModel.expansionLevers; BP milestones] 上行情景假设早期标杆案例，加上一个见效的资产服务商渠道，产品核心范围不变。'
- id: A19
  name: 现金转换简化假设
  value: 种子轮交割后，EBITDA 近似等于现金变动
  unit: method
  source: 创业公司财务经验法则：轻资产软件公司现阶段不单独建模债务、资本支出或税项。
- id: A20
  name: 下一轮融资里程碑与跑道定义
  value: Q4Y2 做到 8 家付费客户，外加进入 Q2Y3 的 6 个月缓冲
  unit: milestone
  source: '[BP fundingAsk.runwayMonths 18; BP milestones 12-24 months] 融资额度按能达到 BP 里程碑、还能在下一轮之前留出明确 6 个月现金缓冲来测算。'
