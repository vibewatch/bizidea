modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads[Evergreen launch triggers] --> Pilots[Paid pilots]
      Partners[Administrator referrals] --> Pilots
      Pilots --> Customers[Annual customers]
      Customers --> Revenue[Subscription + case fees]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入的驱动，是从 Y1 一个付费试点，走到 Q4Y2 8 家活跃客户、Q4Y3 15 家，单客户年末 ARR 约 $240K。
- checkName: 必须跑通的事
  finding: 试点转年度合同，加上一笔见效的资产服务商转介，必须在 Y2 就出现，因为敏感性分析显示，销售周期一旦拖延，是耗尽种子轮缓冲最快的方式。
- checkName: 模型失效条件
  finding: 如果 Y2 年末更接近 6 家客户而不是 8 家，毛利率又卡在 72% 以下，下行情景就会出现，因为现金会在 Y3 结束前转负。
- checkName: 下一轮融资证明
  finding: 一旦公司做到 5-8 个付费客户、审核通过率 80%+，并且有转介证据支撑可复制的 $200K+ ACV 打法，下一轮融资的故事就站得住。
sanityChecks:
  ruleOf40: Y3 增长 164.2% + EBITDA 利润率 -15.7% = 148.5%。
  burnMultiple: Y2 烧钱倍数约 0.8x，对应约 $1.42M 的新增 ARR；Y3 改善至约 0.3x，对应约 $1.73M 的新增 ARR。
  revenuePerFte: Y3 人均收入 $274K，按 $3.01M 收入和年末 11 名 FTE 计算（对标 SaaS 基准 $200-400K）。
  flags:
  - Y2-Y3 季度收入假设一个季度里出现的客户都足够早上线、能为当季贡献收入，一旦销售延后一个季度，现金压力会明显加大。
  - 基准情景要求公司在 Q4Y2 做到 BP 5-8 家客户里程碑的高值；如果只落地 5-6 家，招聘节奏很可能要放慢，或者需要额外融资。
  - 毛利率要等实施和集成工作标准化之后才能到 75% 的目标，如果定制化工作一直挥之不去，回本周期和烧钱倍数都会变差。
