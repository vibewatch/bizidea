scenarios:
  downside:
    description: 试点转化更慢，一笔资产服务商转介滑出 Y2，毛利率也顶不到软件目标。
    y3RevenueK: 2131.5
    y3EbitdaK: -1188.4
    cashLowPointK: -858.1
    keyAssumptionChanges:
    - Q4Y2 年末落在 6 家客户，而不是 8 家。
    - Q4Y3 年末落在 12 家客户，而不是 15 家。
    - 稳态毛利率到 72%，而不是 75%。
  base:
    description: Y1 的一个付费试点，转化成 Q4Y2 8 家客户的基础盘和 Q4Y3 15 家客户的年末水平，毛利率也达到 BP 目标。
    y3RevenueK: 3012.0
    y3EbitdaK: -471.8
    cashLowPointK: 158.1
    keyAssumptionChanges:
    - Q4Y2 年末 8 家活跃客户，Q4Y3 年末 15 家。
    - 单客户月收入从试点定价逐步升到 Q4Y3 的 $20.0K。
    - 随着实施工作越来越可复制，毛利率到 Y3 升到 75%。
  upside:
    description: 标杆案例和一个渠道伙伴加快新客户签约，公司因此更早逼近研究里的 SOM 年末水平，Y3 也接近打平。
    y3RevenueK: 3417.0
    y3EbitdaK: -102.7
    cashLowPointK: 561.3
    keyAssumptionChanges:
    - Q4Y2 年末 9 家客户，Q4Y3 年末 17 家。
    - 靠更多案件量费和集成费，单客户年末 ARR 达到约 $252K。
    - 集成标准化更快，稳态毛利率到 77%。
