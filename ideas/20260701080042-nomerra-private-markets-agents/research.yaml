"reportMemo":
  "executiveTakeaways":
  - "Evergreen private-market wrappers have moved from niche to core distribution infrastructure: Dakota tracks 252 active registered evergreen vehicles with $431B in net assets, while Preqin counted 520 evergreen funds and $350B NAV by end-2023, so operational tooling is now a scale bottleneck rather than a pilot problem [3][20]."
  - "The beachhead pain is not ledgering; it is lifecycle coordination across subscriptions, redemptions, KYC/AML, cash, and valuation workflows that legacy point tools and outsourced handoffs still fragment [2][13][29][37]."
  - "Competition is real but diffuse: incumbents own systems of record and servicing scale, while AI-native challengers and onboarding tools attack slices of the workflow; no dominant vendor yet owns evergreen exception-resolution across email, portals, bank flows, and docs [1][8][10][12][13][21]."
  - "The best initial wedge is approval-gated case assembly for transfer-agency and cash exceptions, because regulation increasingly widens retail access but also tightens liquidity, investor-protection, and audit expectations [16][17][18][19]."
  "marketDefinition": "The relevant market is evergreen private-markets operations workflow software: systems that sit between investor onboarding, transfer agency, fund administration, treasury, and reporting stacks to prepare and route subscription, redemption, and cash-exception work with a defensible audit trail [2][3][20]."
  "customerAndBuyer": "Day-to-day users are fund operations, transfer-agency, treasury, and investor-services teams at managers or administrators handling continuous subscriptions, redemptions, and cash exceptions. The budget owner is usually the COO, CFO, or head of operations when a firm is launching a new evergreen product or expanding into RIA/private-bank distribution [2][6][37]."
  "buyingTriggers":
  - "point": "Launch of a new evergreen or semi-liquid vehicle forces managers to redesign subscriptions, liquidity, valuation, and investor-service operations."
    "sourceRefs":
    - 2
    - 16
    - 17
  - "point": "Expansion into RIAs or private banks raises transaction count, reporting expectations, and operational scrutiny from wealth channels."
    "sourceRefs":
