    - 39
  "willingnessToPay":
    "summary": "Willingness to pay is credible because the budget already exists inside transfer agency, retail-alts operations, fund administration, and digital workflow modernization. The startup is not creating a new category so much as redirecting spend away from manual exception labor and fragmented service-provider coordination."
    "sourceRefs":
    - 7
