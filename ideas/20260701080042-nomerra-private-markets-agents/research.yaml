    - 21
    - 27
  "competitiveLandscape": "Competition is strongest around adjacent layers rather than the exact wedge: Nomerra is closest on AI-native private-markets ops, Juniper and Allvue come from platform-of-record positions, SS&C owns servicing scale, and Passthrough plus Broadridge own workflow slices. The gap is still the evergreen-specific exception layer that assembles a case from documents, portals, cash data, and prior records before a human approves the next step [1][8][10][12][13][21]."
  "incumbentThesis":
  - "incumbentClass": "Full-service transfer agents"
    "point": "They win on compliance and scale, but the operating model is often service-heavy and slower to configure around one manager’s evergreen exception playbook."
    "sourceRefs":
