jobsToBeDone:
- job: 当认购或赎回指令打进多个邮箱和系统时，帮助基金运营负责人快速拼出一份完整、经审核的案件，让他们不用重录数据、也不漏掉检查项，就能处理投资者。
  currentAlternative: 在电子表格、邮件、银行门户和资产服务商交接之间手工对账
  successMetric: 每笔认购或赎回案件的周转时间，以及重开异常的下降幅度
- job: 当现金划转或投资者记录在多个系统间对不上时，帮助资金或基金会计负责人定位差错并流转正确审批，让报告和结算流程按计划收口。
  currentAlternative: 在共享邮箱和电子表格追踪器里临时管理异常队列
  successMetric: 现金差错解决天数，以及进入月末仍未解决的差错数量
