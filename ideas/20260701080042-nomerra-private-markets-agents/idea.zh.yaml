topRisks:
- name: 监管准确性风险
  description: 一次 AI 准备错误的认购、赎回或通知工作流，可能损害投资者利益，并让公司在受监管的基金运营里停止扩张。
  mitigation: 先做审批门控的案件汇编和审核人路由，每个字段和动作保留引用依据，首批部署避免自主过账。
- name: 集成拖慢部署
  description: ERP、银行、邮件和文档系统足够碎片化，会拖慢部署，也会让试点显得昂贵。
  mitigation: 从一只常青基金的只读摄取做起，优先支持邮箱和文件投递连接器，只有在证明异常处理价值后才深化系统集成。
- name: 现有厂商和资产服务商惯性
  description: 管理人可能更愿意增加资产服务商工时，或等待现有基金会计供应商上线功能，而不是购买新的工作流层。
  mitigation: 瞄准常青载体上线或渠道扩张窗口销售，在一条异常队列上量化周转收益，并把产品定位为资产服务商和核心系统的补充。
