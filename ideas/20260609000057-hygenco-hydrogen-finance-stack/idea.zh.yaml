problem: 绿氢开发商现在还在用表格、邮箱和共享盘管理 lender drawdown、EPC 里程碑、OEM 文档和承购条件。只要少一张证书、里程碑更新晚一步，或 covenant 对不上，多边机构和设备融资方就可能卡住放款，把商业投运日一再往后拖。现有施工 PM 和数据室工具都不是为“把杂乱项目证据整理成 lender-ready 的 drawdown 包”这件事设计的。
targetUser:
  primary: 在建设首批商业化工业绿氢工厂的开发商里，负责项目融资和项目控制的负责人。
  secondary: 为这些工厂提供融资的气候基础设施投资人中的组合管理与资产管理团队。
  buyer: 绿氢开发商的 CFO 或项目融资负责人
startupThesis:
  nonObviousInsight: 绿氢现在新的瓶颈，不是证明技术能不能跑，而是要向 lender 和融资伙伴证明：每座工厂都在几十个对手方之间，以可融资、可审计的方式往前推进。
  beachhead: 在印度建设首个 20-200 MW 合成氨或炼厂供氢项目、背后有多边机构或设备融资资本、内部项目控制团队又很精简的绿氢开发商。
  wedge: 一套 lender readiness 工作流，把 EPC 进度、OEM 文档、许可和承购证据收进可直接用于 drawdown 的包里，并持续跟踪 covenant。
  whyNowCatalyst: IFC 和 Siemens 支持 Hygenco 的股权融资，说明绿氢工厂已经进入机构资本主导的部署阶段，drawdown readiness 不再是未来的运营问题，而是眼前就会卡住项目的瓶颈。
  ventureScalePath: 先从绿氢项目 drawdown 切入，再扩到持续的 covenant 监控、基础设施基金的组合对标，以及合成氨、e-fuels、碳捕集工厂等相邻工业脱碳项目。
solution: 做一套面向绿氢开发商的项目融资控制塔。产品把融资条件、EPC 里程碑计划、OEM 文档要求和承购义务拉进同一套运行流程。每个对手方都围绕具体里程碑或 covenant 上传对应证据，平台则在提交 drawdown 申请前先把缺失依赖揪出来。这样 lender 和内部财务团队看到的是实时状态、完整审计链，以及一键导出的 drawdown 包，而不是一轮轮定制化邮件催办。时间拉长以后，公司还能对比项目最常卡在哪些环节，再把这套风险 intelligence 卖给债权、保险和基础设施投资人。
goToMarketSeed:
  firstCustomer: 一家印度绿氢开发商，手里有一个由 DFI 或设备融资方支持的旗舰项目，负责项目融资和控制的人合计不到 10 个。
  buyingTrigger: 融资交割，或新获资金支持工厂的第一笔重大 EPC / 设备 drawdown。
  currentAlternative: 表格、邮件、通用数据室、Primavera 或 MS Project，以及外部项目融资顾问。
  switchingReason: 这个切口能缩短 drawdown 周期，减少因文档漏项导致的 COD 延误，因为融资条件、证据收集和 lender 汇报都落在同一套系统里。
  pricingHypothesis: 每个活跃项目按年收平台费，再对每个 lender、EPC 或 OEM 工作区收一次性 onboarding 费用。
