    rationale: 这个切口可以从氢能扩到更广的工业脱碳项目融资与组合风险软件。
topRisks:
- name: 品类形成太慢
  description: 绿氢商业化部署的爬坡速度可能低于预期，短期内能买软件的客户就会太少。
  mitigation: 先盯已经完成 financial close 的开发商卖，同时把产品设计成能延伸到相邻的氨、e-fuel 和碳捕集项目。
- name: 工作流过于碎片化
  description: 关键数据分散在 lender、EPC、OEM、法务团队和内部项目工具里，实施很容易变脏变重。
  mitigation: 先围绕 drawdown 包组装这一条高价值用例切入，在深度集成之前先支持轻量上传。
- name: 在位企业外溢
  description: 一旦市场被验证，施工 PM 套件、顾问或数据室厂商都可能顺势切进这条工作流。
  mitigation: 先把通用工具抓不住的 finance ontology、lender 模板和里程碑 benchmark 数据集握在手里。
