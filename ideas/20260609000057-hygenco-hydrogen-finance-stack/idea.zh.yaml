jobsToBeDone:
- job: 当新融资到位的氢能工厂进入首批采购里程碑时，帮开发商财务负责人尽快拼出 lender-ready 证据，这样他们就能在不拖施工的前提下把资金提出来。
  currentAlternative: 靠邮件、表格、共享盘和顾问做的清单手工追文档。
  successMetric: 从里程碑完成到 lender 放款的天数。
- job: 当基础设施投资人在交割后跟踪氢能项目时，帮组合团队更早看到 covenant 风险和缺失依赖，这样他们能在进度拖慢、回报受损之前先介入。
  currentAlternative: 定期状态电话、顾问备忘录和静态月报。
  successMetric: 在错过 drawdown 或 COD 变更前，被提前发现的重要延误数量。
