differentiator: 通用施工软件能跟任务，通用虚拟数据室能存文件，但两者都不理解 project finance 里的 conditions precedent、covenant 状态和 drawdown 打包逻辑。这家公司做的是“可融资性”的操作系统：每份文档、每个里程碑都明确对应它能解锁的那笔资本。等平台沉淀下各类里程碑延误模式、lender 提问模板和跨项目对手方表现之后，还能长出一套改进承保和融资效率的专有数据集。
