scenarios:
  downside:
    description: 项目中标后到 post-close 的支出启动更慢，所以公司到 Q4Y3 只能做到 4 个活跃项目，而且 onboarding 里更大一部分仍是重服务。
    y3RevenueK: 1080.0
    y3EbitdaK: -278.0
    cashLowPointK: 612.0
    keyAssumptionChanges:
    - Y2 和 Y3 的新项目转化整体慢 1 个季度
    - 综合 ARPU 掉到 $275K，因为 lender 模块没有挂上去
    - 由于更多 onboarding 工作仍靠人工，毛利率压缩到 65%
  base:
    description: Y1 的 2 个付费共创客户完成转正，公司到 Q4Y2 做到 5 个活跃生产项目，成熟账户在 Y3 再把综合 ARPU 小幅抬升。
    y3RevenueK: 1560.0
    y3EbitdaK: 52.0
    cashLowPointK: 1155.5
    keyAssumptionChanges:
    - 到 Q4Y2 有 5 个活跃项目上线
    - 毛利率稳定在 BP 目标的 70%
    - Y3 的综合 ARPU 靠 lender 和 benchmark 模块抬到 $312K
  upside:
    description: 靠伙伴转介绍和模板复用，公司到 Q4Y3 拿下 6 个活跃项目，并更快把业务扩到 lender 分析模块。
    y3RevenueK: 1980.0
    y3EbitdaK: 286.0
    cashLowPointK: 1155.5
    keyAssumptionChanges:
    - 到 Q4Y3 有 6 个活跃项目上线
    - 组合模块挂载更强，综合 ARPU 到 $330K
    - 模板复用降低实施人力后，毛利率提升到 72%
