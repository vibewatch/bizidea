slug: hydrogen-drawdown-control-tower
date: '2026-06-09'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: 从 2026-06-09 business-plan 日期之后的第一个完整月份开始。
- id: A2
  name: pre-seed 交割后期初现金
  value: '2200'
  unit: USDK
  source: '[BP fundingAsk $2-4M range] 基准模型按 $2.2M 交割，足够覆盖两年执行，再留 6 个月缓冲。'
- id: A3
  name: 起始付费项目数（M1）
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] 公司从零收入起步，先得签下共创客户。'
- id: A4
  name: 新项目定价
  value: $120K onboarding + 每个活跃已融资项目每年 $300K 订阅费
  unit: pricing
  source: '[BP investorMemo.firstCustomer.initialContract]、[BP gtm.pricing]、[Research market.sam/som]'
- id: A5
  name: 客户爬坡
  value: M12 做到 2 个活跃项目，Q4Y2 做到 5 个，Q4Y3 仍维持 5 个
  unit: customers
  source: '[BP milestones]、[Research market.som]'
- id: A6
  name: Y3 成熟账户 ARPU 提升
  value: 靠 lender 汇报和 benchmark 模块，把综合年 ARPU 提升 4% 到 $312K
  unit: percent_and_usdK
  source: '[BP businessModel.expansionLevers]、[BP product.twentyFourMonth]'
- id: A7
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A8
  name: 月流失率
  value: '1.5'
  unit: percent
  source: 面向项目融资团队出售的黏性企业工作流软件创业财务经验值：切换成本高，但品类仍早。
- id: A9
  name: 完整 CAC
  value: '110'
  unit: USDK per customer
  source: '[BP gtm.funnelTargets]、[BP risks]，以及创始人主导、成交周期 6-9 个月的基础设施软件销售经验值。'
- id: A10
  name: 全负载薪资带
  value: CEO $120K；工程 $110K；项目融资解决方案 $100K；客户成功 $80K；销售/合作 $100K
  unit: USDK per FTE per year
  source: '[BP team]，再加上以印度为主的创业财务经验值，创始人现金薪酬低于市场。'
- id: A11
  name: 超出 BP 具名团队后的招聘节奏
  value: M1 创始团队到位，M3 招产品工程师，M6 招客户成功，M9 招合作负责人，Y2 招第 3 名工程师和第 2 名销售，Y3 再招第 4 名工程师和第 2 名客户成功
  unit: timing
  source: '[BP team]、[BP strategicChoices.sequencingRationale]，以及先交付后扩张的平滑化经验值。'
- id: A12
  name: 非薪酬运营支出爬坡
  value: Y1 每月 opex $60K-$95K，Y2 每季度 opex $240K-$255K，Y3 每季度 opex $250K-$268K
  unit: USDK
  source: '[Research regulatoryLandscape]、[BP operations]，以及覆盖云、安全、差旅、法务和实施工具的创业财务经验值。'
- id: A13
  name: 现金转换简化
  value: EBITDA 近似代表现金变动
  unit: policy
  source: 创业财务经验值；模型未单独预测债务、capex、税项或营运资本波动。
- id: A14
  name: 下行情景调整项
  value: Q4Y3 只有 4 个项目，ARPU $275K，毛利率 65%，转化再慢 1 个季度
  unit: scenario_inputs
  source: '[BP risks]、[Research sensitivityCases]'
- id: A15
  name: 上行情景调整项
  value: Q4Y3 做到 6 个项目，ARPU $330K，毛利率 72%，伙伴驱动扩张更快
  unit: scenario_inputs
  source: '[BP experimentRoadmap]、[BP milestones 24-36 months]'
