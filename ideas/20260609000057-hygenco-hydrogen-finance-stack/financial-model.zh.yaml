modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      FinancedProjects[Funded hydrogen projects] --> PaidPilots[Paid onboarding and pilot]
      PaidPilots --> ActiveProjects[Active production projects]
      ActiveProjects --> SubscriptionRevenue[Per-project annual subscription]
      ActiveProjects --> ExpansionModules[Lender and benchmark modules]
      SubscriptionRevenue --> GrossProfit[Gross profit at 70% margin]
      ExpansionModules --> GrossProfit
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景到 Y3 收入 $1.56M，靠的是把 Y1 的两个付费试点转成 5 个活跃的已融资项目账户，再叠加适度的 lender 模块增购，而不是盲目追更多 logo。
- checkName: 必须跑通的前提
  finding: 外部对手方必须真的愿意通过工作流上传证据，这样 onboarding 才能保持模板化，70% 毛利目标也才站得住。
- checkName: 模型会在哪崩
  finding: 如果已融资的印度项目继续拖，或者实施始终高度服务化，模型就会滑向下行情景：Y3 收入只有约 $1.08M，现金压力也会明显变大。
- checkName: 下一轮融资 proof
  finding: 等做到 5 个活跃生产项目，并至少有 1 个 lender 式扩展模块跑出来，证明 land-and-expand 收入足以对冲 logo 基数窄的问题，下一轮融资才真正站得住。
sanityChecks:
  ruleOf40: Y3 增长率 55.2% + EBITDA 利润率 3.3% = 58.5%
  burnMultiple: Y2 burn multiple 约为 0.3x：$296.5K burn 对应约 $900K 净新增 ARR；Y3 则转为轻微 EBITDA 盈利。
  revenuePerFte: Q4Y3 每名 FTE 对应 Y3 收入 $156K（对实施占比较高的垂直 SaaS 来说偏精简但可接受，仍低于成熟横向 SaaS 基准）。
  flags:
  - 基准情景到 Y3 仍只依赖印度窄滩头市场里的 5 个活跃项目，所以客户集中度依旧很高。
  - Y3 增长更多来自全年经常性收入和模块挂载，而不是大范围新 logo 扩张，因此下一轮融资前必须证明扩展型收入是可持续的。
  - 如果 EPC、OEM 和 lender 不愿在工作区里 self-serve，服务负担会迅速上升，并把毛利率拉到 BP 目标以下。
