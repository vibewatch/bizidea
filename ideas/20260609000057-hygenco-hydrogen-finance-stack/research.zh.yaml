    sourceRefs:
    - 24
  adoptionFrictionMatrix:
  - friction: 项目管线仍早且分布不均
    severity: 高
    affectedBuyer: 开发商 CFO / 项目融资负责人
    mitigation: 先从已完成 financial close 或至少已中标的开发商切入，不要在所有公告项目上广撒网。
    sourceRefs:
    - 17
    - 18
    - 19
  - friction: 数据散在 EPC、OEM、顾问和 lender 手里
    severity: 高
    affectedBuyer: 项目控制负责人
    mitigation: 先用与里程碑模板绑定的 upload-first 证据收集切入，再谈深度集成。
    sourceRefs:
    - 5
    - 23
    - 26
  - friction: 标准和认证要求仍在持续变化
    severity: 中
    affectedBuyer: 合规与 HSE 相关方
    mitigation: 保留一层可编辑规则，适配标准、出口证书和 lender 特定要求。
    sourceRefs:
    - 13
    - 14
    - 16
    - 24
  - friction: 在位工具已经占住相邻工作流
    severity: 中
    affectedBuyer: IT 和 PMO 发起人
    mitigation: 把产品定位成盖在进度、文档和 VDR 工具之上的 finance-control 层，而不是替代它们。
    sourceRefs:
    - 29
    - 30
    - 31
    - 33
    - 34
