  sourceRefs:
  - 26
  - 27
openQuestions:
- 到 2028 年之前，到底有多少印度绿氢或绿氨项目会真正走到 financial close，而不是一直停留在公告阶段？
- 哪些 lender 和保险模板会在不同项目里反复出现，频率高到足以在第一年就支撑一套可复用产品 ontology？
- EPC 和 OEM 会不会接受直接上传证据的工作流，还是开发商仍坚持由 PMO 居中处理，从而拖慢采用？
- 如果氢能自身扩张速度低于政策目标暗示的水平，这个切口还能多快扩到相邻工业脱碳项目？
