competitors:
- name: Procore
  stage: incumbent
  wedge: 现场到后台的施工管理与文档协同
  pricing: Custom enterprise pricing / demo-led sale
  strength: 在施工相关方之间做项目可视化和协同的采用度很高。
  weaknessVsUs: 它天生不做 lender conditions precedent、drawdown 包和氢能特有的合规证据映射。
  sourceRefs:
  - 29
- name: Oracle Aconex / Primavera
  stage: incumbent
  wedge: 资本项目的文档控制，以及进度与项目控制主干
  pricing: Custom enterprise pricing / contact-sales model
  strength: 在复杂基础设施项目上，完整项目记录和排程能力很强。
  weaknessVsUs: 它优化的是项目控制，不是面向 covenant 跟踪和 lender-ready 打包的财务工作流。
  sourceRefs:
  - 30
  - 31
- name: Autodesk Construction Cloud
  stage: incumbent
  wedge: 设计-施工协同与施工工作流管理
  pricing: Custom enterprise pricing / sales-assisted purchase
  strength: 当设计、文档和现场协作必须跨交付团队保持一致时，这类工具很有用。
  weaknessVsUs: 面向资金方的财务工作流依然是间接的，尤其 drawdown 和合规证据这一层。
  sourceRefs:
  - 32
- name: Ansarada
  stage: incumbent
  wedge: 虚拟数据室与安全尽调工作流
  pricing: Custom or transaction-led pricing
  strength: 在高风险交易里，权限、Q&A 和尽调室体验都很强。
  weaknessVsUs: 它更适合做静态安全资料室，不适合做一套随施工融资执行持续运转、按里程碑推进的操作系统。
  sourceRefs:
  - 33
- name: Datasite
  stage: incumbent
  wedge: 卖方尽调与交易数据室
  pricing: Custom enterprise pricing / demo-led sale
  strength: 在复杂交易里，尽调流程和安全文档交换都很成熟。
  weaknessVsUs: 它不掌握交割后 EPC 进度、OEM 证据与经常性 lender 汇报之间的运营闭环。
  sourceRefs:
  - 34
regulatoryTechnicalConstraints:
- point: 位于工业客户场地内的氢能项目，可能需要调整环评批复；同时储运设计也必须满足许可条件和安全评估。
  sourceRefs:
  - 1
  - 15
- point: 印度的氢能标准和审批体系仍在多个部委与标准机构之间持续演进，导致流程设计难以标准化复用。
  sourceRefs:
  - 13
  - 14
  - 16
- point: 面向出口的绿氨和氢能项目越来越需要 RFNBO 式的可追溯性与认证证据，而不只是施工状态更新。
  sourceRefs:
  - 24
validationSignals:
- point: IFC 对 Hygenco 的披露说明，融资方已经要求开发商拿出结构化的 ESG、安全、标准和行动计划证据。
  sourceRefs:
  - 1
- point: SECI 支持的项目需要在 36 个月内投产，并按季度提交进度报告，因此天然形成了可预期的文档与里程碑跟踪节奏。
  sourceRefs:
  - 18
  - 19
- point: Avaada 和 ACME 的公开项目都说明，出口承购、技术伙伴和分阶段投产已经在印度氢能建设里深度缠在一起。
  sourceRefs:
  - 20
  - 21
  - 23
  - 25
  - 37
