    sourceRefs:
    - 27
    - 28
  - point: 面向出口的绿氨项目越来越需要认证和技术证明，证据负担自然变重。
    sourceRefs:
    - 23
    - 24
    - 25
  headwinds:
  - point: 需求不确定、下游基础设施又缺位，仍让大多数印度拟建产能停留在公告阶段。
    sourceRefs:
    - 17
  - point: 项目融资依旧依赖让利资金、稳固承购和谨慎的风险分配，而不是标准化的 merchant 模式。
    sourceRefs:
    - 4
