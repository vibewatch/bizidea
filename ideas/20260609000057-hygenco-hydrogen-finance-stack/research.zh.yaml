  pestle:
  - factor: 政治
    impact: positive
    point: 印度有明确的 mission 支持、补贴计划和 open-access 减负，因此第一波买家池子是看得见的。
    sourceRefs:
    - 9
    - 10
    - 12
  - factor: 经济
    impact: negative
    point: 资本开支高、需求又弱，仍让大多数已公告产能迟迟进不了执行阶段。
    sourceRefs:
    - 4
    - 17
  - factor: 社会
    impact: neutral
    point: 工业脱碳压力确实给了氢能叙事加分，但买家真正要的是商业上站得住的项目，而不是象征性项目。
    sourceRefs:
    - 12
