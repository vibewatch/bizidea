openQuestions:
- How many Indian green-hydrogen or ammonia projects will actually reach financial close by 2028 rather than remain at announcement stage?
- Which lender and insurer templates recur often enough across projects to justify a reusable product ontology in year one?
- Will EPCs and OEMs accept direct evidence-upload workflows, or will developers insist on a PMO-mediated process that slows adoption?
- How quickly can this wedge expand into adjacent industrial-decarbonization projects if hydrogen alone scales slower than policy targets imply?
