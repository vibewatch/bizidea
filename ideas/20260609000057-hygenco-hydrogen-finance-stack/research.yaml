competitors:
- name: Procore
  stage: incumbent
  wedge: Field-to-office construction management and document coordination
  pricing: Custom enterprise pricing / demo-led sale
  strength: High adoption for project visibility and collaboration across construction stakeholders.
  weaknessVsUs: Does not natively map lender conditions precedent, drawdown packages, or hydrogen-specific compliance evidence.
  sourceRefs:
  - 29
- name: Oracle Aconex / Primavera
  stage: incumbent
  wedge: Document control plus schedule and project-controls backbone for capital projects
  pricing: Custom enterprise pricing / contact-sales model
  strength: Strong complete-project-record and scheduling capabilities on complex infrastructure jobs.
  weaknessVsUs: Optimized for project controls, not finance-specific covenant tracking and lender-ready package assembly.
  sourceRefs:
  - 30
  - 31
- name: Autodesk Construction Cloud
  stage: incumbent
  wedge: Design-build collaboration and construction workflow management
  pricing: Custom enterprise pricing / sales-assisted purchase
  strength: Useful where model, document, and field collaboration need to stay connected across delivery teams.
  weaknessVsUs: Finance and capital-provider workflows remain indirect, especially for drawdowns and compliance evidence.
  sourceRefs:
  - 32
- name: Ansarada
  stage: incumbent
  wedge: Virtual data rooms and secure diligence workflows
  pricing: Custom or transaction-led pricing
  strength: Strong permissions, Q&A, and diligence-room experience for high-stakes transactions.
  weaknessVsUs: Works best as a static secure room, not as an ongoing milestone-linked operating system for construction finance execution.
  sourceRefs:
  - 33
- name: Datasite
  stage: incumbent
  wedge: Sell-side due diligence and dealmaking data rooms
  pricing: Custom enterprise pricing / demo-led sale
  strength: Mature diligence workflow and secure document exchange for complex transactions.
