  searchedQueries:
  - Find recent authoritative sources on green hydrogen project financing, project delays, lender requirements, and bankability for commercial projects in India and globally. Prioritize IEA, IRENA, regulators, government programs, DFIs, Reuters, Bloomberg, Hydrogen Insight, and company docs. Include accessible URLs.
  - Find authoritative sources on India's National Green Hydrogen Mission, SIGHT incentives, SECI hydrogen tenders, and MNRE guidance relevant to commercial project development and financing. Include official government URLs and reputable reporting.
  - Find accessible sources on hydrogen project bankability, offtake risk, permitting delays, and infrastructure financing challenges. Prioritize World Bank, RMI, Mission Possible Partnership, IEA, Hydrogen Council, DNV, Deloitte, and law firms with practical project finance analysis.
  - Find accessible official or reputable sources on hydrogen safety standards, permitting, water use, certification, and export rules relevant to green hydrogen projects in India and globally. Prioritize DOE, NFPA, EU delegated acts, Indian government, ISO-related pages, and IEA/IRENA.
  - Find accessible sources on hydrogen demand creation, green ammonia offtake, refinery and steel use cases, and industrial decarbonization buyers in India. Prioritize IEA, IRENA, McKinsey, S&P Global, Reuters, company MoUs, and government sources.
  - Find accessible sources on virtual data room and project finance workflow software used in infrastructure and energy transactions, including Ansarada, Datasite, Intralinks, Oracle Aconex, Procore, Autodesk, and any project finance covenant monitoring tools.
  - Find accessible company or reputable news sources for ACME, Avaada, Ohmium, Hygenco, and L&T projects in India with project size, timeline, financing, offtake, or manufacturing details.
  - Find accessible official IFC, Siemens Financial Services, or Hygenco releases on the Hygenco funding round or related project finance support. Return direct URLs.
