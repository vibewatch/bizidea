- id: A3
  name: Starting paying projects (M1)
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] The company starts pre-revenue and must first
    sign design partners.'
- id: A4
  name: New-project pricing
  value: $120K onboarding plus $300K annual subscription per active financed project
  unit: pricing
  source: '[BP investorMemo.firstCustomer.initialContract], [BP gtm.pricing], [Research
    market.sam/som]'
- id: A5
  name: Customer ramp
  value: 2 active projects by M12, 5 by Q4Y2, and 5 by Q4Y3
  unit: customers
  source: '[BP milestones], [Research market.som]'
- id: A6
  name: Y3 ARPU uplift on mature accounts
  value: 4% uplift to $312K blended annual ARPU from lender reporting and benchmark
    modules
  unit: percent_and_usdK
  source: '[BP businessModel.expansionLevers], [BP product.twentyFourMonth]'
- id: A7
  name: Target gross margin
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A8
  name: Monthly churn
  value: '1.5'
  unit: percent
  source: Startup-finance heuristic for sticky enterprise workflow software sold into
    project-finance teams with high switching cost but early category risk.
- id: A9
  name: Fully loaded CAC
  value: '110'
  unit: USDK per customer
  source: '[BP gtm.funnelTargets], [BP risks], enterprise infrastructure-software
    sales heuristic for founder-led six-to-nine-month deals.'
- id: A10
  name: Loaded salary bands
  value: CEO $120K; engineering $110K; project-finance solutions $100K; customer success
    $80K; sales/partnerships $100K
  unit: USDK per FTE per year
  source: '[BP team] plus India-focused startup-finance heuristic with below-market
    founder cash comp.'
- id: A11
  name: Hiring ramp beyond named BP team
  value: Founding team by M1, product engineer by M3, customer success by M6, partnerships
    lead by M9, third engineer by Y2, second seller by Y2, fourth engineer and second
    customer-success hire by Y3
  unit: timing
  source: '[BP team], [BP strategicChoices.sequencingRationale], smoothing heuristic
    for delivery-first scaling.'
- id: A12
  name: Non-payroll operating spend ramp
  value: Y1 opex $60K-$95K per month, Y2 opex $240K-$255K per quarter, Y3 opex $250K-$268K
    per quarter
  unit: USDK
  source: '[Research regulatoryLandscape], [BP operations], startup-finance heuristic
    for cloud, security, travel, legal, and implementation tooling.'
- id: A13
  name: Cash conversion simplification
  value: EBITDA approximates cash movement
  unit: policy
  source: Startup-finance heuristic; the model does not separately forecast debt,
    capex, taxes, or working-capital swings.
- id: A14
  name: Downside scenario deltas
  value: 4 projects by Q4Y3, $275K ARPU, 65% gross margin, and one-quarter slower
    conversions
  unit: scenario_inputs
  source: '[BP risks], [Research sensitivityCases]'
- id: A15
  name: Upside scenario deltas
  value: 6 projects by Q4Y3, $330K ARPU, 72% gross margin, and faster partner-led
    expansion
  unit: scenario_inputs
  source: '[BP experimentRoadmap], [BP milestones 24-36 months]'
