modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      FinancedProjects[Funded hydrogen projects] --> PaidPilots[Paid onboarding and pilot]
      PaidPilots --> ActiveProjects[Active production projects]
      ActiveProjects --> SubscriptionRevenue[Per-project annual subscription]
      ActiveProjects --> ExpansionModules[Lender and benchmark modules]
      SubscriptionRevenue --> GrossProfit[Gross profit at 70% margin]
      ExpansionModules --> GrossProfit
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: The base case gets to $1.56M of Y3 revenue by converting two Y1 pilots
    into five active financed-project accounts and adding modest lender-module uplift
    rather than chasing many logos.
- checkName: Must go right
  finding: External counterparties must actually upload evidence through the workflow
    so onboarding stays template-driven and the 70% gross-margin target remains credible.
- checkName: Model breaks if
  finding: If funded Indian projects slip or implementations stay services-heavy,
    the model falls toward the downside case where Y3 revenue is only about $1.08M
    and cash tightens materially.
- checkName: Next-round proof
  finding: The next financing is justified once five active production projects and
    at least one lender-style expansion module show that land-and-expand revenue can
    offset the narrow logo base.
sanityChecks:
  ruleOf40: Y3 growth 55.2% + EBITDA margin 3.3% = 58.5%
  burnMultiple: Y2 burn multiple is about 0.3x based on $296.5K burn against roughly
    $900K net new ARR; Y3 turns slightly EBITDA positive.
  revenuePerFte: $156K Y3 revenue per Q4Y3 FTE (lean but acceptable for implementation-heavy
    vertical SaaS; below mature horizontal SaaS benchmarks).
  flags:
  - The base case still depends on only five active projects in a narrow Indian beachhead,
    so customer concentration remains high through Y3.
  - Y3 growth comes more from full-year recurring revenue and module attach than from
    broad new-logo expansion, so the next round needs proof that expansion spend is
    durable.
  - If EPCs, OEMs, and lenders do not self-serve in the workspace, services load can
    rise quickly and pull gross margin below the BP target.
