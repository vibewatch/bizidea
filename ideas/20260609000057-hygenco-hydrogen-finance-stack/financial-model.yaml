scenarios:
  downside:
    description: Project awards slip into slower post-close spending, so the company
      reaches only 4 active projects by Q4Y3 and must absorb more services-heavy onboarding.
    y3RevenueK: 1080.0
    y3EbitdaK: -278.0
    cashLowPointK: 612.0
    keyAssumptionChanges:
    - One-quarter slower new-project conversions across Y2 and Y3
    - Blended ARPU falls to $275K because lender modules do not attach
    - Gross margin compresses to 65% as more onboarding work stays manual
  base:
    description: Two paid design partners convert in Y1, the company reaches 5 active
      production projects by Q4Y2, and mature accounts lift blended ARPU modestly
      in Y3.
    y3RevenueK: 1560.0
    y3EbitdaK: 52.0
    cashLowPointK: 1155.5
    keyAssumptionChanges:
    - Five active projects are live by Q4Y2
    - Gross margin holds at the BP target of 70%
    - Y3 blended ARPU rises to $312K through lender and benchmark modules
  upside:
    description: Partner referrals and template reuse let the company land 6 active
      projects by Q4Y3 while expanding faster into lender analytics.
    y3RevenueK: 1980.0
    y3EbitdaK: 286.0
    cashLowPointK: 1155.5
    keyAssumptionChanges:
    - Six active projects are live by Q4Y3
    - Blended ARPU reaches $330K with stronger portfolio-module attach
    - Gross margin improves to 72% as template reuse reduces implementation labor
