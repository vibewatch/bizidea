problem: >-
  Green-hydrogen developers manage lender drawdowns, EPC milestones, OEM documentation, and offtake conditions across spreadsheets, inboxes, and shared drives. Once multilateral and equipment-finance investors enter a project, every missing certificate, delayed milestone update, or covenant mismatch can stall disbursements and push commercial operation dates. Existing construction PM and data-room tools were not built to turn messy project evidence into lender-ready drawdown packages.
targetUser:
  primary: Project finance and project controls leaders at green-hydrogen developers building their first commercial industrial plants.
  secondary: Portfolio and asset-management teams at climate infrastructure investors financing those plants.
  buyer: CFO or Head of Project Finance at a green-hydrogen developer
startupThesis:
  nonObviousInsight: The new bottleneck in green hydrogen is not proving the technology can work; it is proving to lenders and financing partners that each plant is progressing in a bankable, auditable way across dozens of counterparties.
  beachhead: Indian green-hydrogen developers building their first 20-200 MW ammonia or refinery-supply project with multilateral or equipment-finance capital and a lean internal project-controls team.
  wedge: A lender-readiness workflow that collects EPC progress, OEM documents, permits, and offtake evidence into drawdown-ready packages with covenant tracking.
  whyNowCatalyst: IFC- and Siemens-backed equity into Hygenco signals that green-hydrogen plants are entering institutionally financed deployment, making drawdown readiness an immediate bottleneck instead of a future ops problem.
  ventureScalePath: Start with green-hydrogen project drawdowns, then expand into ongoing covenant monitoring, portfolio benchmarking for infrastructure funds, and adjacent industrial-decarbonization projects such as ammonia, e-fuels, and carbon-capture plants.
solution: >-
  Build a project-finance control tower for green-hydrogen developers. The product ingests financing conditions, EPC milestone schedules, OEM documentation requests, and offtake obligations into one operating workflow. Each counterparty uploads evidence against the specific milestone or covenant it satisfies, while the platform flags missing dependencies before a drawdown request is submitted. Lenders and internal finance teams get a live status view, an audit trail, and one-click drawdown packs instead of bespoke email chases. Over time, the company can benchmark where projects stall and sell that risk intelligence to debt, insurance, and infrastructure investors.
goToMarketSeed:
  firstCustomer: An Indian green-hydrogen developer with one flagship project backed by a DFI or equipment-finance investor and fewer than 10 people covering project finance plus controls.
  buyingTrigger: Financial close or the first major EPC and equipment drawdown on a newly funded plant.
  currentAlternative: Spreadsheets, email, generic data rooms, Primavera or MS Project, and outside project-finance consultants.
  switchingReason: This wedge shortens drawdown cycles and reduces COD-slipping document misses by giving one system of record for financing conditions, evidence collection, and lender reporting.
  pricingHypothesis: Annual platform fee per active project plus paid onboarding for each lender, EPC, or OEM workspace.
