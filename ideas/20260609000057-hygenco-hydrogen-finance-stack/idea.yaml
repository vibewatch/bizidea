jobsToBeDone:
  - job: When a newly financed hydrogen plant reaches its first procurement milestones, help the developer's finance lead assemble lender-ready evidence fast, so they can draw capital without delaying construction.
    currentAlternative: Manual document chasing across email, spreadsheets, shared drives, and consultant-built checklists.
    successMetric: Days from milestone completion to lender disbursement.
  - job: When an infrastructure investor monitors a hydrogen project after closing, help the portfolio team see covenant risk and missing dependencies early, so they can intervene before schedule slip hits returns.
    currentAlternative: Periodic status calls, consultant memos, and static monthly reports.
    successMetric: Number of material delays caught before a missed drawdown or COD shift.
