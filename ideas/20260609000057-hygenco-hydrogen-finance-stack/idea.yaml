topRisks:
  - name: Slow category formation
    description: Green-hydrogen commercial deployment may scale slower than expected, limiting near-term software buyers.
    mitigation: Start with developers already at financial close and design the product to extend into adjacent ammonia, e-fuel, and carbon-capture projects.
  - name: Workflow fragmentation
    description: Critical data sits across lenders, EPCs, OEMs, legal teams, and internal project tools, which can make implementation messy.
    mitigation: Begin with a single high-value use case of drawdown-package assembly and support lightweight uploads before deeper integrations.
  - name: Incumbent spillover
    description: Construction PM suites, consultants, or data-room vendors could move into this workflow once the market proves real.
    mitigation: Own the finance-specific ontology, lender templates, and milestone benchmark dataset that generic tools do not capture.
