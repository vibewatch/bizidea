- name: Aembit
  stage: scale-up
  wedge: 面向智能体 AI 和软件工作负载的 IAM，提供无密钥、基于策略的短期访问。
  pricing: 定制报价（网站无公开定价）。
  strength: 面向智能体工作负载的强运行时访问控制叙事，以及明确围绕持续验证和任务级策略的定位。
  weaknessVsUs: 仍偏向宽泛工作负载 IAM，而非漏洞感知的智能体信任中间件；本产品可凭借更深的 GitHub/Jira/Slack 委托和漏洞联动吊销形成差异化。
  sourceRefs:
  - 12
  - 13
- name: Astrix Security
  stage: scale-up
  wedge: AI 智能体、MCP 服务器和 NHI 的发现、修复和安全部署。
  pricing: 定制/演示主导定价。
  strength: 强大的发现叙事和围绕可见性、过度权限和策略违规的客户证明。
  weaknessVsUs: 偏向资产清点和态势；本产品可以更聚焦，凭借内联凭证认证、委托令牌和工程智能体写入路径管控取胜。
  sourceRefs:
  - 14
  - 15
- name: Oasis Security
  stage: scale-up
  wedge: 跨云、SaaS 和本地系统的智能体访问管理和 NHI 治理。
  pricing: 定制/演示主导定价。
  strength: 宽泛的治理叙事、强劲的投资背书，以及明确的跨 GitHub、云和 SaaS 面的 AI 智能体定位。
  weaknessVsUs: 宽泛的平台范围可能为专注 GitHub 优先、专注任务级凭证认证和漏洞感知暂停/吊销工作流的更尖锐信任中间件留出空间。
  sourceRefs:
  - 84
  - 105
- name: Teleport
  stage: scale-up
  wedge: 机器和工作负载身份，基于 SPIFFE 对齐的短期身份和基础设施访问。
  pricing: 基于用量的定制报价；机器/工作负载身份是计费指标。
  strength: 在工作负载身份、SPIFFE 和基础设施认证上深厚的技术可信度。
  weaknessVsUs: 主要面向基础设施和工作负载，并非专为跨 SaaS 的智能体委托或围绕编程智能体的漏洞情报设计。
  sourceRefs:
  - 107
  - 108
- name: CyberArk
  stage: incumbent
  wedge: 跨密钥、证书、工作负载身份和 SSH 密钥的全谱系机器身份安全。
  pricing: 企业销售 / 定制定价。
  strength: 广泛的机器身份覆盖、自动化能力和现有厂商的企业关系。
  weaknessVsUs: 广度使其在智能体原生委托链和快速迭代的编程智能体工作流上态度不够鲜明；初创公司可凭借专注度和产品速度取胜。
  sourceRefs:
  - 25
regulatoryTechnicalConstraints:
- point: MCP 授权是可选且依赖传输层的，买家将面临跨智能体工具不一致的认证模式，除非有中间件统一规范。
  sourceRefs:
  - 78
- point: GitHub、AWS、Azure、GCP 和 Vault 都以短期凭证为核心，这意味着产品必须在签发、续期和吊销令牌时高度可靠，不能引入工作流中断。
  sourceRefs:
  - 40
  - 10
  - 75
  - 60
- point: 最小权限、提示注入防御和可审计性已是主流 AI 安全框架的核心治理要求。
  sourceRefs:
  - 80
  - 83
- point: SaaS/API 生态暴露了异构的令牌、权限范围和服务账号模型，因此集成广度是技术护城河，同时也是交付负担。
  sourceRefs:
  - 89
  - 40
validationSignals:
- point: GitHub 已推出异步编程智能体，配备明确的人工审批、分支保护和会话日志——证明具有写入权限的智能体工作流已足够主流，需要相应管控。
  sourceRefs:
  - 30
- point: GitGuardian 发现 2025 年 GitHub 公开仓库中新增 2865 万个硬编码密钥，并在 MCP 相关配置文件中记录到 24,008 个唯一密钥——展示了智能体时代密钥扩散的速度。
  sourceRefs:
  - 115
- point: Entro 和 Veza 的数据均显示 NHI 数量已大幅超过人类账户并集中了高风险权限，支持"非托管非人访问已是企业级问题"的论点。
  sourceRefs:
  - 27
  - 111
- point: Oasis 和 Astrix 围绕 NHI 和 AI 时代身份安全完成大额融资，而 Lyrie 正在明确宣传 Agent Trust Protocol——表明一场真实的但仍在成形中的品类之争正在展开。
  sourceRefs:
  - 105
  - 106
openQuestions:
- 买家是否更倾向于从 GitHub 优先的产品向外扩展，还是期望在承诺之前第一天就覆盖 GitHub、Jira、Slack、Okta 和云 IAM？
- 初创公司能否收集到足够的漏洞和吊销遥测，使其明显优于通用短期凭证中间件？
- 随着智能体部署扩展到工程团队之外，预算将在身份/IAM 负责人还是平台安全负责人之间如何分配？
- MCP 授权、SPIFFE 和 OpenID 智能体身份标准能否足够快地收敛，在现有厂商完成品类捆绑之前降低集成成本？
