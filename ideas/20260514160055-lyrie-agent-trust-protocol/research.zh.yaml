market:
  tam:
    value: $3.8B
    rationale: "自下而上估算：50,000 个组织已采用 GitHub Copilot；假设市场完全成熟后这些组织在智能体信任和吊销管控上平均年支出约 $75k（50,000 × $75k = $3.75B）。ACV 代理值对于 250 席 Copilot Pro+ 年度名单预算（约 $117k/年，按 $39/用户/月计算）而言刻意偏保守。"
    isEstimate: true
    sourceRefs:
    - 33
    - 29
  sam:
    value: $300M
    rationale: "滩头限定：假设约 10% 的当前 Copilot 采用组织符合论文画像（软件密集型公司，100–1,000 名工程师，具有写入权限的活跃智能体），即 5,000 个账户。按 GitHub-云-SaaS 控制平面初始占用范围约 $60k ACV 建模（5,000 × $60k = $300M）。"
    isEstimate: true
    sourceRefs:
    - 33
    - 29
    - 111
  som:
    value: $6.0M
    rationale: "第三年可触达份额：80 家客户 × 约 $75k ACV，对于聚焦共创客户模式的单一切口而言合理可信，前提是产品成为内部编程智能体的默认审批和吊销层。80 × $75k = $6.0M。"
    isEstimate: true
    sourceRefs:
    - 29
    - 108
    - 12
