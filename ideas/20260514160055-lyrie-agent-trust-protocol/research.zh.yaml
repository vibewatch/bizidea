  adoptionFrictionMatrix:
  - friction: 安全团队可能将本产品视为继 IAM、PAM、vault 和 CNAPP 之后又一个管控平面。
    severity: high
    affectedBuyer: CISO / IAM leader
    mitigation: 用一个可量化的工作流切入——例如 GitHub 到云的委托令牌签发加即时吊销——而非泛泛的治理宣传。
