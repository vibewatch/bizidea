differentiator: >-
  现有的 IAM、PAM 和密钥管理工具是为人类、服务账号和静态工作负载设计的，不适用于在单个工作流中跨多
  个工具委托任务的自主行动者。智能体可观测性产品告诉团队事后发生了什么，而本产品控制的是智能体是否应当
  被信任去执行——并能在漏洞条件变化时实时吊销该信任。可防御的切口是三者的组合：智能体原生凭证认证、
  漏洞感知吊销，以及深度集成到早期智能体部署风险最集中的写入面。
