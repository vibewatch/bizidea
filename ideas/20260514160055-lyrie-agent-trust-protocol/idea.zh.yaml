jobsToBeDone:
  - job: "当内部编程智能体触及生产系统时，帮助平台团队签发最小权限凭据并证明谁做了什么——让团队在通过安全审查的前提下顺利推进自动化落地。"
    currentAlternative: "共享服务账号加手工日志审查。"
    successMetric: "新增具有写入权限的智能体上线审批时间降至两周以内，且每次操作都有可验证的委托链。"
  - job: "当出现影响智能体技术栈的新漏洞时，帮助安全团队迅速定位受影响的智能体并立即吊销高风险访问——把爆炸半径控制住，同时不关停所有自动化。"
    currentAlternative: "全局熔断开关加电子表格访问清单。"
    successMetric: "暴露评估与吊销在 30 分钟内完成。"
