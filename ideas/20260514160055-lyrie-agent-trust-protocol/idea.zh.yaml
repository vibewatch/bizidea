problem: >-
  企业正在将编程和运维智能体接入 GitHub、云控制台、工单系统和财务工具，却仍像管理长期有效的服务账号那样
  为这些智能体配置凭据。安全团队无法证明是哪个智能体发起了操作、哪条委托链授权了该操作、以及在模型、
  工具或工作流发生变更后是否应当吊销权限。一旦出现新漏洞，唯一的应对方式就是全面停机——因为根本没有
  支持精细化信任和快速吊销的控制平面。
targetUser:
  primary: "将自主编程和 IT 智能体部署到生产工作流的安全工程师与平台工程师。"
  secondary: "AI 原生软件公司的身份架构师和 AppSec 主管。"
  buyer: "首席信息安全官 (CISO) 或平台工程副总裁。"
startupThesis:
  nonObviousInsight: >-
    智能体系统中最大的新风险，不只是模型输出质量，而是在工具之间持久存在、跨越委托操作、随漏洞条件变化
    的非托管非人身份。一旦智能体能够跨代码、SaaS 和金融系统执行操作，企业就需要专为自主行动者设计的、
    类 IAM 的生命周期管控。
  beachhead: >-
    已有 100–1,000 名工程师、正在运行内部编程或 IT 自动化智能体、且这些智能体对 GitHub、Jira、Slack
    及至少一个云环境具有写入权限的 B 轮至 E 轮 B2B 软件公司。
  wedge: >-
    一个智能体身份中间件，为每项任务签发凭证认证、发布策略绑定的委托令牌，并支持跨 GitHub、云 IAM
    和 SaaS 管理工具的一键吊销。
  whyNowCatalyst: >-
    智能体专项漏洞跟踪和开放信任协议，正好在智能体获得代码、API、金融工具和客户数据访问权的同一时刻
    涌现。安全团队迫切需要一种标准化的方式来验证和吊销非人行动者。
  ventureScalePath: >-
    从工程和 IT 智能体起步，逐步扩展到财务、支持、采购和面向合作伙伴的智能体，成为企业自主工作的信任、
    审计和事件响应层。
solution: >-
  产品嵌入在智能体运行时与高风险工具之间，在任何写入操作执行前为每项智能体任务建立可验证的身份。它将
  每一次操作绑定到委托链、策略范围、人类负责人和吊销状态，并生成安全团队无需手工拼接日志即可审查的
  审计轨迹。系统将已披露的智能体漏洞映射到受影响的身份、模型、工具和工作流，使暴露的智能体能够被自动
  降级、暂停或重新限权。首批集成将优先覆盖 GitHub、AWS、Okta、Jira、Slack 和内部智能体编排器——
  因为早期具有写入能力的智能体在这些位置造成的风险最为尖锐。
