topRisks:
  - name: "协议碎片化"
    description: "多种智能体框架和信任标准可能并行涌现，让单一控制平面接口难以通用化。"
    mitigation: "早期支持多个运行时，并将产品锚定在策略执行和吊销结果上，而不是依附某一特定协议。"
  - name: "现有厂商扩张"
    description: "大型 IAM、PAM 或云安全厂商可能将现有产品延伸到智能体身份领域，压缩切入点空间。"
    mitigation: "凭借更快的集成、更丰富的委托上下文和漏洞感知管控，率先拿下最早的具有写入权限的编程智能体工作流——这些是现有厂商尚未具备的能力。"
  - name: "市场时机"
    description: "部分企业可能仍处于智能体试点阶段，推迟预算投入，直到具有写入能力的部署成为普遍现象。"
    mitigation: "瞄准已在生产环境运行内部编程或 IT 智能体的共创客户，将产品定位为扫清安全审批障碍的加速器。"
