market:
  tam:
    value: $3.8B
    rationale: 'Bottom-up estimate: 50,000 organizations have adopted GitHub Copilot; assume a fully developed market where those orgs average ~$75k annual spend for agent trust and revocation controls (50,000 × $75k = $3.75B). The ACV proxy is intentionally conservative versus a 250-seat Copilot Pro+ budget of ~$117k/year at list price ($39/user/month).'
    isEstimate: true
    sourceRefs:
    - 33
    - 29
  sam:
    value: $300M
    rationale: 'Beachhead constraint: assume ~10% of current Copilot-adopting organizations match the thesis profile (software-heavy firms with 100-1,000 engineers and live write-capable agents), or 5,000 accounts. Model ~$60k ACV for the initial GitHub-cloud-SaaS control plane footprint (5,000 × $60k = $300M).'
    isEstimate: true
    sourceRefs:
    - 33
    - 29
    - 111
  som:
    value: $6.0M
    rationale: 'Reachable year-3 share: 80 customers at ~$75k ACV, which is plausible for a focused design-partner motion in one wedge if the product becomes the default approval and revocation layer for internal coding agents. 80 × $75k = $6.0M.'
    isEstimate: true
    sourceRefs:
    - 29
    - 108
    - 12
