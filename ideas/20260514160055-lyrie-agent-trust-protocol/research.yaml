  adoptionFrictionMatrix:
  - friction: Security teams may view the startup as yet another control plane alongside IAM, PAM, vaulting, and CNAPP.
    severity: high
    affectedBuyer: CISO / IAM leader
    mitigation: Lead with one measurable workflow such as GitHub-to-cloud delegated token issuance plus instant revoke, not a generic governance pitch.
    sourceRefs:
    - 25
    - 111
    - 107
  - friction: Platform teams fear latency or broken automation if every agent action passes through an external broker.
    severity: high
    affectedBuyer: Platform engineering
    mitigation: Use existing OIDC and workload federation primitives so the product adds policy and attestation without forcing long-lived credential storage or manual ticketing.
    sourceRefs:
    - 40
    - 10
    - 75
  - friction: Standards are still unsettled across MCP, agent frameworks, and delegated authority models.
    severity: medium
    affectedBuyer: Security architect
    mitigation: 'Be standards-friendly: support OAuth/OIDC, SPIFFE, MCP authorization, and pluggable policies instead of a proprietary agent runtime.'
