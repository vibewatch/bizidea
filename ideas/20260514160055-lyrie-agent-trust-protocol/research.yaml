  - friction: Some buyers will prefer posture visibility first and postpone inline enforcement until after an incident.
    severity: medium
    affectedBuyer: Security operations
    mitigation: Package discovery, simulation, and incident-response workflows as an on-ramp to inline control.
    sourceRefs:
    - 84
