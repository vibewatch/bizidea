scenarios:
  downside:
    description: "Pilot conversion slows, Y3 logo growth ends at 65 customers, and ACV plateaus around $65K as buyers buy a narrower control layer."
    y3RevenueK: 2510.0
    y3EbitdaK: -640.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
      - "Y3 customers exit at 65 instead of 80."
      - "Steady-state ACV is $65K instead of $75K."
      - "Gross margin stalls near 72% because onboarding and integration support remain manual."
  base:
    description: "Model matches the operating plan: 8 customers in Y1, 20 in Y2, 80 in Y3, with ARPU stepping from pilots to $75K mature ACV."
    y3RevenueK: 3562.6
    y3EbitdaK: -30.7
    cashLowPointK: 776.7
    keyAssumptionChanges:
      - "No changes versus assumptions A1-A24."
  upside:
    description: "Design-partner references and co-sell pull forward demand, pushing the company to 90 customers and faster premium-module attach by Y3."
    y3RevenueK: 4510.0
    y3EbitdaK: 420.0
    cashLowPointK: 920.0
    keyAssumptionChanges:
      - "Y3 customers exit at 90 instead of 80."
      - "Steady-state ACV reaches $85K with faster expansion into incident-response automation."
      - "Gross margin reaches 78% as integrations and onboarding become more repeatable."
