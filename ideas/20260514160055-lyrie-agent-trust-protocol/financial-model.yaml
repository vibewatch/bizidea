    value: "Second engineer M4; security research M10; first AE M12; second AE M16; solutions M18; third engineer M20; fourth engineer M28; ops M31"
    unit: timing
    source: "[BP team startTiming + sequencingRationale] integrations engineering comes before enterprise sales; later hires smoothed quarterly."
  - id: A18
    name: Y1 non-payroll opex
    value: "20–35K per month"
    unit: USDK
    source: "[BP operations + experimentRoadmap] + startup-finance heuristic for cloud, security tooling, legal, compliance, travel, and pilot onboarding."
  - id: A19
    name: Y2 non-payroll opex
    value: "115–168K per quarter"
    unit: USDK
    source: "[BP operations + product roadmap] + startup-finance heuristic as integrations, incident-response dataset, and customer onboarding expand."
  - id: A20
    name: Y3 non-payroll opex
    value: "178–210K per quarter"
    unit: USDK
    source: "[BP product twentyFourMonth + operations] + startup-finance heuristic for larger cloud footprint, compliance, partner motion, and support."
  - id: A21
    name: Revenue recognition method
    value: "Average active customers in period × stage ARPU"
    unit: formula
    source: "[BP pricing + milestones] + modeling convention to reconcile revenue with customer counts without separate cohort tables."
  - id: A22
    name: Steady-state CAC
    value: "30.0"
    unit: USDK
    source: "[BP gtm direct outbound + design-partner motion] + startup-finance heuristic for founder-led then 1-AE enterprise security sales."
  - id: A23
    name: Funding ask sizing rule
    value: "Reach Q4Y2 milestone plus 6 months of buffer"
    unit: policy
    source: "[BP fundingAsk runwayMonths 20 + milestone target] adjusted upward by the explicit 6-month buffer requirement in this financial model."
  - id: A24
    name: Cash flow simplification
    value: "Ending cash = opening cash + cumulative EBITDA"
    unit: formula
    source: "Startup-finance heuristic: assume minimal working-capital swings, capex, and debt for a software-only seed company."
