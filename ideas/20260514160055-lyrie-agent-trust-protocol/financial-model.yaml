modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads["Target accounts"] --> Pilots["Paid pilots"]
      Pilots --> Customers["Production customers"]
      Customers --> Expansion["More identities + integrations"]
      Customers --> Revenue["Subscription revenue"]
      Expansion --> Revenue
      Revenue --> GrossProfit["Gross profit"]
      GrossProfit --> Cash["Cash / runway"]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by reaching 20 production customers by Q4Y2 and then scaling to 80 customers at ~$75K ACV by Q4Y3."
  - checkName: Must go right
    finding: "The GitHub-to-AWS wedge has to convert design partners into annual contracts before the second AE and later hiring ramp fully hit the P&L."
  - checkName: Model breaks if
    finding: "If sales cycles drift toward 9 months or mature ACV stays closer to $65K, downside cash goes negative before the company earns a strong next-round narrative."
  - checkName: Next-round proof
    finding: "The next financing case is 20 production customers, a ~$1.2M ARR run-rate, and live exploit-aware revocation that proves the product is more than a pilot tool."
sanityChecks:
  ruleOf40: "Y3 growth 324.1% + EBITDA margin -0.9% = 323.3% (directionally strong but inflated by the small Y2 revenue base)."
  burnMultiple: "Y2 burn multiple is ~2.0x (EBITDA burn $1.4M / net new ARR run-rate ~$0.72M), improving sharply as Y3 expansion fills the installed base."
  revenuePerFte: "$356K Y3 revenue per year-end FTE (benchmark ~$200–400K enterprise SaaS heuristic)."
  flags:
    - "The jump from 20 customers at Q4Y2 to 80 at Q4Y3 requires a much more repeatable sales motion than the model has yet proven."
    - "Gross margin improvement depends on reducing white-glove integration and onboarding work even while connector breadth expands."
    - "Rule-of-40 is not a useful quality signal until the company grows beyond the sub-$1M annual revenue base in Y2."
    - "Cash never goes negative in the base case only because the seed round is assumed to close at model start; any financing delay would tighten runway materially."
