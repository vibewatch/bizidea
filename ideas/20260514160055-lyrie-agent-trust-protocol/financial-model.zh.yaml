    - bucket: Engineering
      amountUsd: 1400000
      percentage: 41.2
    - bucket: GTM
      amountUsd: 850000
      percentage: 25.0
    - bucket: "G&A"
      amountUsd: 470000
      percentage: 13.8
    - bucket: "Buffer (6 mo)"
      amountUsd: 680000
      percentage: 20.0
scenarios:
  downside:
    description: "试点转化放缓，Y3 客户数止步于 65 家，ACV 因买家只采购较窄的管控层而停滞在约 $65K。"
    y3RevenueK: 2510.0
    y3EbitdaK: -640.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
      - "Y3 客户数最终为 65 家，而非 80 家。"
      - "稳态 ACV 为 $65K，而非 $75K。"
      - "毛利率停滞在约 72%，因为 onboarding 和集成支持仍需人工介入。"
  base:
    description: "模型与运营计划一致：Y1 8 家客户，Y2 20 家，Y3 80 家，ARPU 从试点阶段逐步提升到 $75K 成熟期 ACV。"
    y3RevenueK: 3562.6
    y3EbitdaK: -30.7
    cashLowPointK: 776.7
    keyAssumptionChanges:
      - "相对假设 A1–A24 无变化。"
  upside:
    description: "共创客户背书和联合销售提前拉动需求，Y3 达到 90 家客户，高级模块附加率更快。"
    y3RevenueK: 4510.0
    y3EbitdaK: 420.0
    cashLowPointK: 920.0
    keyAssumptionChanges:
      - "Y3 客户数最终为 90 家，而非 80 家。"
      - "随着事件响应自动化扩展提速，稳态 ACV 达到 $85K。"
      - "随着集成和 onboarding 可重复性提升，毛利率达到 78%。"
