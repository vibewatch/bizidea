    y3RevenueImpactK: -120.0
    cashImpactK: -250.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads["目标客户"] --> Pilots["付费试点"]
      Pilots --> Customers["生产客户"]
      Customers --> Expansion["更多身份 + 集成"]
      Customers --> Revenue["订阅收入"]
      Expansion --> Revenue
      Revenue --> GrossProfit["毛利润"]
      GrossProfit --> Cash["现金 / 资金跑道"]
modelSanity:
  - checkName: 收入引擎
    finding: "基准情景收入由 Y2 第四季度达到 20 家生产客户、Y3 第四季度以约 $75K ACV 扩展到 80 家客户驱动。"
  - checkName: 必须走对的事
    finding: "GitHub 到 AWS 切口必须在第二位客户主管及后续招聘全面拉高 P&L 之前，将共创客户转化为年度合同。"
  - checkName: 模型崩塌临界点
    finding: "如果销售周期延长到 9 个月，或成熟期 ACV 停滞在约 $65K，下行情景现金在公司建立强势下轮融资叙事之前会转为负值。"
  - checkName: 下轮融资证明点
    finding: "下轮融资的核心证明是：20 家生产客户、约 $1.2M ARR 跑率，以及已上线的漏洞感知吊销——证明产品不只是试点工具。"
sanityChecks:
  ruleOf40: "Y3 增长率 324.1% + EBITDA 利润率 -0.9% = 323.3%（方向性强劲，但因 Y2 收入基数较小而数值虚高）。"
  burnMultiple: "Y2 烧钱倍数约为 2.0x（EBITDA 烧钱 $1.4M / 净新增 ARR 跑率约 $0.72M），随 Y3 扩展填满存量客户基础后急剧改善。"
  revenuePerFte: "Y3 年末 FTE 人均收入 $356K（企业 SaaS 经验基准约 $200–400K）。"
  flags:
    - "从 Y2 第四季度 20 家客户跳升到 Y3 第四季度 80 家，需要比模型目前证明的更具可重复性的销售动作。"
    - "毛利率改善依赖于在扩大连接器广度的同时减少高触达集成和 onboarding 的人工工作量。"
    - "在 Y2 年度收入超过 $1M 之前，Rule of 40 不是有效的质量信号。"
    - "基准情景现金始终不为负，是因为假设种子轮在模型起点完成交割；任何融资延迟都会实质性地压缩资金跑道。"
