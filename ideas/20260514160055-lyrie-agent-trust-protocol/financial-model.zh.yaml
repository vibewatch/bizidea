slug: privileged-agent-attestation-layer
date: "2026-05-14"
currency: USD
modelStartMonth: "2026-06"
assumptions:
  - id: A1
    name: 模型起点时种子轮到账的期初现金
    value: "3400.0"
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $3–5M] + 初创财务经验值：取中低位，保证覆盖下一里程碑加 6 个月缓冲。"
  - id: A2
    name: 起始客户数（第 1 个月）
    value: "0"
    unit: count
    source: "[BP product + milestones] 成立时尚未产生收入；MVP 和试点搭建完成后才开始获客。"
  - id: A3
    name: 第 1 年客户增长节奏
    value: "第 12 个月达到 8 家客户"
    unit: count
    source: "[BP milestones 0–12 months] 第 4–7 个月签下 3–5 家付费试点，第 9–12 个月完成转化和后续赢单；按月线性插值。"
  - id: A4
    name: 第 2 年客户增长节奏
    value: "Y2 第四季度达到 20 家客户"
    unit: count
    source: "[BP milestones 12–24 months] 明确目标为 20 家付费生产客户；按季度插值至 11、14、17、20。"
  - id: A5
    name: 第 3 年客户增长节奏
    value: "Y3 第四季度达到 80 家客户"
    unit: count
    source: "[BP market SOM + milestones 24–36 months] 明确目标为 80 家客户；按季度插值至 32、46、62、80。"
  - id: A6
    name: 试点期 ARPU
    value: "24.0"
    unit: annualK
    source: "[BP gtm pricing + investorMemo firstCustomer] 付费共创客户初始合同区间的低端。"
  - id: A7
    name: Y2 生产期 ARPU
    value: "60.0"
    unit: annualK
    source: "[BP market SAM + milestones 12–24 months] 20 家客户 × 约 $60k ACV，对应约 $1.2M ARR 跑率。"
  - id: A8
    name: Y3 成熟期 ARPU
    value: "75.0"
    unit: annualK
    source: "[BP market SOM + businessModel expansionLevers] 80 家客户 × 约 $75k ACV，对应约 $6.0M ARR 跑率。"
  - id: A9
    name: 毛利率提升路径
    value: "Y1 72.5%，Y2 75.0%，Y3 76.3%"
    unit: percent
    source: "[BP businessModel targetGrossMarginPct 75] + 初创财务经验值：早期高触达 onboarding 在集成稳定前会压低毛利率。"
  - id: A10
    name: 单位经济模型月度客户流失率
    value: "1.2"
    unit: percent
    source: "[BP strategicChoices beachhead + enterprise annual contracts] + 种子轮企业安全 SaaS 留存率的初创财务经验值。"
  - id: A11
    name: 创始人/CEO 含税薪酬
    value: "220.0"
    unit: annualK
    source: "[BP team Founding CEO / GTM lead] + 初创财务经验值：低于市场价的创始人现金薪酬，附约 20% 社会负担。"
  - id: A12
    name: 工程师含税薪酬
    value: "210.0"
    unit: annualK
    source: "[BP team Founding engineer / Second engineer] + 初创财务经验值：美国安全基础设施工程师现金薪酬加工资负担。"
  - id: A13
    name: 安全研究主管含税薪酬
    value: "220.0"
    unit: annualK
    source: "[BP team Head of security research] + 高级安全研究人员招聘的初创财务经验值。"
  - id: A14
    name: 企业客户主管含税薪酬
    value: "240.0"
    unit: annualK
    source: "[BP team Enterprise account executive] + 种子轮企业安全销售代表 OTE 和负担的初创财务经验值。"
  - id: A15
    name: 解决方案/成功人员含税薪酬
    value: "180.0"
    unit: annualK
    source: "初创财务经验值：企业安全 SaaS 首位技术 onboarding/成功人员。"
  - id: A16
    name: G&A/运营人员含税薪酬
    value: "160.0"
    unit: annualK
    source: "初创财务经验值：首位财务/运营人员，仅在可重复收入动作清晰可见后才加入。"
  - id: A17
    name: 招聘计划
    value: "第 4 个月第二位工程师；第 10 个月安全研究；第 12 个月首位客户主管；第 16 个月第二位客户主管；第 18 个月解决方案人员；第 20 个月第三位工程师；第 28 个月第四位工程师；第 31 个月运营人员"
    unit: timing
    source: "[BP team startTiming + sequencingRationale] 集成工程先于企业销售；后期招聘按季度平滑。"
  - id: A18
    name: Y1 非薪资运营支出
    value: "每月 20–35K"
    unit: USDK
    source: "[BP operations + experimentRoadmap] + 初创财务经验值：涵盖云资源、安全工具、法务、合规、差旅和试点 onboarding。"
  - id: A19
    name: Y2 非薪资运营支出
    value: "每季度 115–168K"
    unit: USDK
    source: "[BP operations + product roadmap] + 初创财务经验值：集成、事件响应数据集和客户 onboarding 规模扩大后相应增长。"
  - id: A20
    name: Y3 非薪资运营支出
    value: "每季度 178–210K"
    unit: USDK
    source: "[BP product twentyFourMonth + operations] + 初创财务经验值：更大云资源占用、合规、合作伙伴动作和支持扩展。"
  - id: A21
    name: 收入确认方式
    value: "期内平均活跃客户数 × 阶段 ARPU"
    unit: formula
    source: "[BP pricing + milestones] + 建模惯例：在不使用独立同期群表的前提下，使收入与客户数协调一致。"
  - id: A22
    name: 稳态 CAC
    value: "30.0"
    unit: USDK
    source: "[BP gtm direct outbound + design-partner motion] + 初创财务经验值：创始人主导后转为单位企业安全销售的 CAC。"
  - id: A23
    name: 融资规模测算规则
    value: "覆盖 Y2 第四季度里程碑加 6 个月缓冲"
    unit: policy
    source: "[BP fundingAsk runwayMonths 20 + milestone target] 根据本财务模型明确的 6 个月缓冲要求上调。"
  - id: A24
    name: 现金流简化假设
    value: "期末现金 = 期初现金 + 累计 EBITDA"
    unit: formula
    source: "初创财务经验值：纯软件种子轮公司营运资金波动、资本支出和债务均极小，予以简化处理。"
