operations:
  - "Policy engine: rule evaluation for delegation scope and token issuance; must be highly available because all agent write actions gate on it."
  - "Integration layer: maintain certified connectors for GitHub OIDC, AWS STS, Azure Workload Identity, GCP WIF, Okta, Jira, and Slack; connector reliability is a contractual SLA."
  - "Vulnerability knowledge graph: continuously ingest agent-specific CVEs, MCP misconfiguration patterns, and framework advisories; map each to affected agent identity profiles."
  - "Audit log pipeline: emit structured per-action audit events to customer SIEM (Splunk, Datadog, AWS Security Lake) without requiring a new query language."
  - "Incident-response runbooks: ship documented playbooks for the three most common scenarios—new agent rollout, vulnerability disclosure, and rogue agent containment."
  - "Key partners: GitHub, AWS, Azure, GCP, Okta (technical integration), HashiCorp Vault (revocation primitive), security consultancies (deal sourcing and implementation support)."

team:
  - role: "Founding CEO / GTM lead"
    startTiming: "Month 0"
    rationale: "Enterprise security sales to CISOs requires a founder who can run design-partner discovery, negotiate LOIs, and build a trusted advisor relationship before the product is complete."
  - role: "Founding engineer (identity/security infrastructure)"
    startTiming: "Month 0"
    rationale: "GitHub OIDC, AWS STS, and SPIFFE integration depth is the product's proof-of-value in pilots; needs deep workload identity and cloud IAM experience, not general full-stack."
  - role: "Second engineer (integrations and policy engine)"
    startTiming: "Month 3"
    rationale: "Expanding from GitHub-to-AWS to Okta, Jira, and Slack connectors is the primary product milestone at months 4–9; a dedicated integrations engineer unblocks this without distracting the founding engineer from the core attestation and revocation primitives."
  - role: "Head of security research (exploit-to-identity mapping)"
    startTiming: "Month 9"
    rationale: "The vulnerability knowledge graph is the durable differentiator; a dedicated security researcher is needed once the core product is in production with 10+ customers to prevent the knowledge graph from becoming stale."
  - role: "Enterprise account executive"
    startTiming: "Month 12"
    rationale: "Hire only after the pilot-to-production conversion motion is documented and at least 5 paying customers are live; premature sales hiring without a repeatable proof-of-value wastes runway."

