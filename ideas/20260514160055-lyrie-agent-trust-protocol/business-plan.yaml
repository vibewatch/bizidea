      - "Evaluate Series A raise based on NRR, CAC payback, and pipeline coverage."

risks:
  - risk: "Incumbent cloud or dev platform (GitHub, AWS, Okta) ships native cross-tool agent delegation and revocation that covers the GitHub-to-cloud path with comparable depth."
    likelihood: Medium
    impact: High
    mitigation: "Accelerate integration breadth beyond GitHub-AWS (Jira, Slack, Okta, GCP) so the cross-vendor delegation graph is not replicable by any single platform; publish exploit-aware revocation benchmarks before incumbents enter."
  - risk: "Well-funded competitors (Aembit, Oasis, Astrix) commoditize short-lived agent credentialing faster than the startup can build the delegation graph moat."
    likelihood: High
    impact: High
    mitigation: "Focus pilot evaluations on the exploit-aware revocation metric and cross-tool delegation completeness, not generic NHI inventory—these are not on competitor near-term roadmaps per research."
  - risk: "Write-capable agent deployments stay mostly read-only or in pilot stages through 2026–2027, shrinking the addressable base of buyers with urgent budget."
    likelihood: Medium
    impact: Medium
    mitigation: "Target only companies with agents already in production (confirmed in discovery call); do not waste sales cycles on companies still evaluating agent tooling."
  - risk: "Protocol fragmentation (MCP, SPIFFE, OpenID agent-identity work, vendor-specific token formats) makes a universal control plane interface technically costly to maintain."
    likelihood: Medium
    impact: Medium
    mitigation: "Build on OIDC/OAuth standards-layer primitives; expose a plugin API for new runtimes rather than hardcoding each framework."
  - risk: "Platform team latency or reliability concerns block adoption—buyers fear the attestation broker becomes a single point of failure for all agent automation."
    likelihood: High
    impact: Medium
    mitigation: "Design for zero-additional-RTT hot path using OIDC token exchange; publish reliability SLA with 99.9% uptime guarantee and support async audit-only mode for latency-sensitive workflows."
  - risk: "Security buyers deprioritize inline enforcement in favor of posture/discovery overlays, delaying conversion from pilot to production contract."
    likelihood: Medium
    impact: Medium
    mitigation: "Package discovery and simulation modules as an on-ramp to inline enforcement; let buyers start with read-only visibility and escalate to enforcement after an internal tabletop exercise."

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3–5M"
  runwayMonths: 20
