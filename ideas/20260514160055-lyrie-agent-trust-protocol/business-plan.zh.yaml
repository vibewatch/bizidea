slug: privileged-agent-attestation-layer
date: "2026-05-14"
executiveSummary: >-
  企业正将具有写入权限的编程和 IT 智能体接入 GitHub、云 IAM、Jira、Slack 和财务系统，却仍像管理
  长期有效的服务账号那样为其配置凭据——没有任务级委托、没有可验证的凭证认证链、没有漏洞出现时的快速
  吊销路径。本产品是一个专为智能体身份设计的中间件，嵌入在智能体运行时与高风险写入面之间，签发短期
  任务凭证、执行策略绑定的委托授权，并在漏洞条件或工作流上下文变化时自动触发吊销。滩头市场是已有
  100–1,000 名工程师、运行具有 GitHub 和云写入权限的内部编程或 IT 自动化智能体的 B 轮至 E 轮软件
  公司；安全审查或漏洞披露是最直接的购买触发器。SAM 估算为 $300M（5,000 个符合条件的账户 × 约
  $60k ACV），第三年可触达市场约为 $6M（80 家共创客户 × 约 $75k ACV）；研究阶段无独立客户案例
  可参考，这些估算均为需通过共创客户试点验证的自下而上推算。

problem:
  - "自主编程和 IT 智能体获得了对 GitHub、云控制台、Jira、Slack 和 SaaS 管理工具的写入访问权，却以共享长期有效的服务账号形式配置——没有可验证的委托链。"
  - "安全团队无法证明是哪个智能体执行了操作、哪个人批准了委托、当时生效的权限范围是什么——审计、合规和事件响应全靠手工，既慢又容易出错。"
  - "当智能体专项漏洞被披露时，唯一的封控手段是全面停机，因为根本没有精细化吊销的控制平面。"
  - "现有 IAM、PAM 和密钥管理工具是为人类和静态工作负载设计的，既无法建模任务级凭证认证，也不支持自主委托图谱或针对智能体的漏洞感知吊销。"

solution:
  - "一个智能体身份中间件：拦截每一次具有写入权限的智能体操作，签发将该操作绑定到委托链、策略范围和人类负责人的短期任务凭证，然后放行或阻断执行。"
  - "漏洞感知吊销：系统将已披露的智能体漏洞（MCP 配置错误、密钥泄漏、运行时缺陷）映射到活跃身份，自动降级、暂停或重新限权受影响的智能体。"
  - "无需手工拼日志即可按操作生成审计轨迹——可对接 SIEM，涵盖智能体身份、工具、操作、结果和吊销状态。"
  - "首批集成覆盖 GitHub、AWS IAM、Okta、Jira、Slack 和常见智能体编排器；基于 OIDC/SPIFFE/工作负载联邦等现有基础设施原语构建，而非自研运行时。"

whyWeWin:
  - "现有厂商（Okta、CyberArk、Teleport、Aembit）只能在各自的信任域或宽泛的工作负载身份范围内停步——没有任何一家能提供统一的跨 GitHub-云-SaaS 委托图谱，加上针对编程智能体的漏洞感知吊销。"
  - "态势类厂商（Astrix、Oasis）提供资产清点和发现能力；本产品在写入操作发生的瞬间实施内联执行——这是唯一能阻止而非仅报告未授权智能体行为的管控手段。"
  - "委托图谱（人类负责人 → 智能体运行时 → 仓库/任务 → 已签发令牌 → 下游操作 → 吊销结果）随每个集成工作流不断增值，替换成本随之递增，形成数据护城河。"
  - "标准友好架构（OAuth/OIDC、SPIFFE、MCP 授权）避免了专有运行时锁定，降低了买家对架构死胡同的顾虑。"
  - "早期共创客户聚焦 GitHub 到云的写入路径，在现有厂商以同等深度跟进之前，先交付可量化的价值证明（上线审批耗时和吊销耗时指标）。"

strategicChoices:
  beachhead: "已有 100–1,000 名工程师（美国 B 轮至 E 轮软件公司），具有写入 GitHub 和至少一个云环境权限的内部编程或 IT 自动化智能体已在运行，且平台团队正面临待处理的安全审查或漏洞触发的回滚。"
  wedgeRationale: >-
    这个细分已有生产环境运行的智能体、明确的安全审查强制触发因素，以及愿意为"解除安全审批阻塞"
    买单的平台团队。发现优先或泛企业打法需要更长的价值证明周期；内联凭证认证切口能在数周内交付可
    量化的上线审批耗时和吊销耗时指标，而非数季度后才见效。
  sequencingRationale: >-
    先构建 GitHub 到 AWS 的委托和吊销，因为这是编程智能体频率最高的写入路径，也是 GitGuardian
    记录到密钥扩散速度最快的地方。用共创客户的安全审查打开局面，证明指标，再扩展集成到 Okta、
    Jira、Slack 和其他云目标。集成工程要先于企业销售招聘，因为买家的概念验证卡在深度上，而不是
    定位上。
  notYet:
    - "财务、采购和面向合作伙伴的智能体工作流（推迟到 GitHub-云切口验证后再进入）。"
    - "本地部署和气隙企业场景（推迟；在实现产品-市场契合前增加交付复杂度）。"
    - "与 Astrix 和 Oasis 竞争的通用态势/仪表盘产品（保持聚焦于内联执行）。"
    - "MSSP 或咨询主导的 OEM 模式（推迟到 20+ 生产客户验证直销模式之后）。"

market:
  tam: "$3.8B（自下而上：50,000 个采用 Copilot 的组织 × 约 $75k 完整 ACV；研究估算）"
  sam: "$300M（5,000 个符合条件的 100–1,000 人工程师组织，已有写入权限的活跃智能体 × 约 $60k ACV；研究估算）"
  som: "$6.0M 第三年 ARR（80 家客户 × 约 $75k ACV；需经共创客户转化验证；研究估算）"
  segments:
    - "主要：在 B 轮至 E 轮软件公司部署具有 GitHub 和云写入权限的内部编程智能体的安全与平台工程团队。"
    - "次要：通过密钥事件或合规审计发现 NHI 扩散的大型企业身份架构师和 AppSec 主管。"
  buyingProcess: >-
    首席信息安全官 (CISO) 或平台工程副总裁发起采购，通常由具有写入权限的智能体上线或安全审查触发；
    平台工程师在 4–8 周付费试点中评估 GitHub、云 IAM 的集成深度和吊销耗时，然后审批年度平台订阅。

product:
  mvp: "面向 GitHub 到 AWS 写入操作的内联凭证认证中间件：任务级短期令牌签发、委托链日志、策略执行和一键吊销仪表盘；通过 GitHub OIDC 和 AWS STS 集成。"
  sixMonth: "新增 Okta 和 Jira 集成；针对 MCP 和常见智能体框架发布漏洞-身份映射；启动 5–8 家客户的共创客户试点计划。"
  twelveMonth: "新增 Slack 管理和 GCP 集成；推出由漏洞情报触发的自动化吊销；达到 15–20 家生产客户，发布首个吊销耗时基准。"
  twentyFourMonth: "扩展到财务和 HR 智能体工作流；通过 GitHub 和 AWS Marketplace 启动合作伙伴联合销售；构建委托图谱分析层服务 CISO 报告；目标 60–80 家客户。"
  keyBets:
    - "OIDC/SPIFFE 原生架构意味着客户无需新增运行时——凭证认证复用现有令牌管道。"
    - "漏洞-身份映射是可防御的差异化点；持续投入构建并更新智能体漏洞知识图谱。"
    - "可量化的上线审批耗时和吊销耗时指标，将是试点阶段最核心的转化证明。"

gtm:
  wedge: "面向正在进行平台安全审查的内部编程智能体，提供 GitHub 到云的委托令牌签发和即时吊销。"
  channels:
    - "直接触达已公开发布 AI 编程智能体功能的 B 轮至 E 轮软件公司的安全和平台工程负责人。"
    - "通过开发者安全会议和 GitHub Copilot 生态伙伴活动建立共创客户漏斗。"
    - "10+ 家生产客户上线后，通过 GitHub、AWS 和 Azure 合作伙伴计划获取联合销售转介绍。"
    - "以 NHI 和云安全咨询公司为渠道增力，覆盖发现服务账号扩散的客户账户。"
  funnelTargets: "外呼到合格试点转化率：15–25%；试点到年度合同转化率：50%+（参照同类身份控制平面转化基准；待验证假设）。"
  pricing: "年度平台费（$24k–$48k 基础费）加活跃智能体身份按数量计费（约 $600–$1,200/智能体身份/年）；用量计费组件将成本与智能体规模挂钩，保持初始 ACV 的可及性，同时随客户扩展智能体项目自然增长。"

businessModel:
  revenueStreams:
    - "年度平台订阅（基础访问、策略引擎、审计轨迹）。"
    - "活跃智能体身份按数量计费（随客户智能体规模增长而扩展）。"
    - "高级事件响应自动化模块（漏洞感知自动吊销、桌面推演工具）。"
  unitOfValue: "纳入管理的活跃智能体身份数量。"
  targetGrossMarginPct: 75
  expansionLevers:
    - "新集成面：扩展到更多云、SaaS 管理和财务工具，带动按身份数量和操作量计费的增长。"
    - "智能体规模增长：客户扩展智能体项目时，活跃身份数量和受保护操作量自动增长。"
    - "事件响应模块增购：由漏洞披露或桌面推演触发。"
    - "从工程/IT 智能体扩展到财务、支持和采购智能体工作流。"

strategyMap:
  northStarMetric: "具有已验证委托链的纳管活跃智能体身份数量。"
  inputMetrics:
    - "每个客户已上线的具有写入权限的智能体集成数量。"
    - "从漏洞披露到受影响身份权限收缩的中位吊销耗时。"
    - "试点到生产转化率。"
    - "净收入留存率（通过新集成和智能体规模增长实现扩展）。"
  moatsToBuild:
    - "跨工具委托图谱：连接人类负责人、智能体运行时、仓库、已签发令牌和吊销结果。"
    - "漏洞-身份映射数据集：持续更新智能体专项 CVE、MCP 配置错误和框架漏洞。"
    - "与 GitHub、AWS、Okta、Jira、Slack 的深度集成：每连接一个工作流，切换成本随之加深。"
    - "吊销耗时基准：率先发布可验证指标的厂商将主导 RFP 评估标准。"
  killCriteria:
    - "产品上线 12 个月内，少于 5 家共创客户转为付费合同。"
    - "试点阶段中位吊销耗时指标未能明显优于现有 PAM 或 vault 方案。"
    - "GitHub、AWS 或 Okta 等主要云或开发平台推出覆盖范围相当的原生跨工具智能体委托和吊销功能。"
    - "在 10 个合格竞争评估机会中，对抗 Aembit 或 Oasis 的胜率低于 40%。"
  mermaid: |
    flowchart LR
      Beachhead["B 轮至 E 轮编程智能体团队\n（GitHub + 云写入权限）"] --> Pilot["共创客户试点\n（GitHub 到 AWS 凭证认证 + 吊销）"]
      Pilot --> Proof["价值证明\n（上线审批耗时、吊销耗时）"]
      Proof --> Expand["集成扩展\n（Okta、Jira、Slack、GCP）"]
      Expand --> Graph["委托图谱护城河\n（跨工具身份数据集）"]
      Graph --> Platform["信任平台\n（财务、HR、合作伙伴智能体）"]

investorMemo:
  verdict:
    call: "进一步深入调研"
    conviction: "痛点强度和切入点清晰度高，但公开证据基础单薄、相邻厂商竞争激烈，需要共创客户验证来确认时机判断。"
    whyBelieve: "具有写入权限的智能体正在进入生产环境，而企业尚未建立控制平面；没有任何现有 IAM 或态势厂商提供统一的跨 GitHub-云-SaaS 委托图谱加漏洞感知吊销。"
    whyDoubt: "Aembit、Oasis 和 Astrix 资金充足且正在积极转型；如果云平台捆绑了足够的原生管控，在启动建立委托图谱护城河之前，本公司的定价能力可能已被压缩。"
    nextDiligence: "与 8–10 家 B 轮至 E 轮软件公司的平台安全负责人进行共创客户探索访谈，在具有写入权限的智能体部署达到临界规模之前，确认他们为内联凭证认证付费的意愿。"
  firstCustomer:
    title: "B 轮至 E 轮 B2B 软件公司的平台安全负责人。"
    profile: "300–2,000 人的软件公司，平台团队已允许内部编程智能体提交 PR、修改基础设施配置或执行 SaaS 管理任务，安全团队正因审计管控缺失而阻止大规模推广。"
    trigger: "安全审查阻止了智能体进一步上线，或新的智能体专项漏洞披露迫使临时全量回滚自动化操作。"
    buyer: "首席信息安全官 (CISO) 或平台工程副总裁。"
    initialContract: "$24k–$48k 试点 ACV（覆盖 GitHub 到云的凭证认证范围），随集成和智能体规模扩大，有望扩展至 $75k–$120k；试点上线后 60–90 天内预计从试点转为年度合同。"
  mustBeTrue:
    - "2026 年，具有写入权限的编程和 IT 智能体已在足够多的 B 轮至 E 轮软件公司的生产环境中运行，足以产生对内联身份管控的主动预算——而不只是认知层面的关注。"
    - "安全和平台工程团队会为第三方中间件付费，而不是扩展现有 IAM/PAM 或等待云原生捆绑——因为集成广度和漏洞感知吊销不在任何厂商的 12–18 个月路线图上。"
    - "委托图谱和漏洞-身份数据集随使用时间复利式地形成切换成本，使单厂商捆绑式替代在 12–18 个月生产使用后在经济上不再具有吸引力。"
    - "吊销耗时可以从数小时/数天（电子表格加全局熔断）压缩到 30 分钟以内，且客户会将这一指标视为 RFP 资格标准。"
    - "公司能在产品上线 12 个月内以直接外呼方式签下 5+ 家付费共创客户——在需要规模化销售团队之前完成。"
  diligenceQuestions:
    - "你们是否已与 10+ 位 B 轮至 E 轮软件公司的平台安全负责人沟通，确认 2026 年有独立于现有 IAM/PAM 支出的智能体身份管控预算？"
    - "在竞争评估中，对阵 Aembit、Oasis 和 Astrix 的胜负比例如何？各结果背后的核心决策标准是什么？"
    - "买家更倾向于内联令牌中间件，还是先从态势/发现层开始？这一偏好如何影响成交周期和初始 ACV？"
    - "GitHub 到 AWS 委托路径今天的技术成熟度如何：演示可用、试点可用，还是生产就绪？各阶段之间差多少工程月？"
    - "漏洞-身份映射数据集是否已生成任何客户可证明的、优于基础 vault 或 PAM 工作流的更快分类或吊销案例？"
    - "创始团队在身份、安全基础设施或企业 SaaS 方面的既往经验如何？这对第一年内拿下 CISO 级别合同的能力有何影响？"

operatingAssumptions:
  - assumption: "当前采用 Copilot 的组织中，5–10% 已在生产环境中部署具有写入权限的智能体，并在积极寻求身份管控方案。"
    basis: research.yaml
    validationTest: "针对 50 位 B 轮至 E 轮平台安全负责人开展共创客户外呼活动；衡量其中报告已部署写入权限智能体且有明确身份管控需求的比例。"
    decisionImpact: "如果合格比例低于 3%，第 1–2 年可触达的 TAM 对种子轮规模的直销模式过于单薄；需要转向态势/发现作为切入路径。"
  - assumption: "买家会在拥有数十个生产智能体之前，以 $40k–$75k ACV 为内联凭证认证付费，将产品定位为安全审批的前提条件，而非事后的治理叠加层。"
    basis: research.yaml
    validationTest: "在产品预发布阶段与至少 5 家共创客户谈定 LOI 或试点协议，锁定明确 ACV；如果没有任何 LOI 超过 $20k，重新定价或重新定位。"
    decisionImpact: "如果付费意愿低于 $20k ACV，单位经济模型可能无法支撑直接企业销售模式，需要转向 PLG 或合作伙伴主导模式。"
  - assumption: "GitHub OIDC 和 AWS STS 集成可以在 3 个月内由 2–3 人创始工程团队构建到试点可用质量。"
    basis: "operator judgment"
    validationTest: "公司成立 60 天内完成端到端凭证认证和吊销的内部概念验证，覆盖合成的 GitHub Actions 编程智能体工作流。"
    decisionImpact: "如果仅 GitHub 到 AWS 路径的集成复杂度就超过 6 个月，MVP 必须缩小范围（例如只覆盖 GitHub），或更早招募工程人员。"
  - assumption: "漏洞感知吊销（将已披露的 CVE 和 MCP 配置错误映射到活跃智能体身份）在前 12 个月内，相较于通用短期凭证管理是有意义的差异化点。"
    basis: research.yaml
    validationTest: "与共创客户进行 3 次桌面推演，使用真实或合成的智能体漏洞披露场景；衡量自动权限收缩工作流是否比其现有熔断开关更快、更精准。"
    decisionImpact: "如果客户将漏洞感知吊销视为锦上添花而非决策标准，应在产品路线图中降低漏洞知识图谱的优先级，转而加速集成广度。"
  - assumption: "在 GitHub 优先深度和漏洞感知吊销速度上，公司能在有活跃编程智能体部署的企业的竞争评估中胜过 Aembit、Oasis 和 Astrix，即使无法匹配它们更广泛的 NHI 资产清点覆盖。"
    basis: research.yaml
    validationTest: "在前 10 个合格企业机会中追踪胜负；只在有书面对比记录的情况下才接受交易。"
    decisionImpact: "如果对抗资金充足竞争对手的胜率低于 40%，差异化叙事必须调整，或公司必须收购态势能力以避免被定位为功能不完整。"

experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "共创客户发现冲刺"
    hypothesis: "8–10 家 B 轮至 E 轮软件公司的平台安全负责人会确认：具有写入权限的智能体上线受阻于身份/审计缺口，而非其他因素。"
    successMetric: "10 次沟通中有 6+ 次确认存在主动安全审查阻塞并愿意参与付费试点。"
    owner: "创始人/CEO 兼 GTM 负责人"
  - horizon: "0–90 天"
    experiment: "GitHub 到 AWS 凭证认证概念验证"
    hypothesis: "基于 OIDC 的任务级令牌签发和吊销，可在 60 天内为 GitHub Actions 编程智能体工作流构建到演示可用质量。"
    successMetric: "上线演示：端到端凭证认证、委托链日志，以及对合成写入操作的一键吊销。"
    owner: "创始工程师"
  - horizon: "90–180 天"
    experiment: "3 家共创客户付费试点"
    hypothesis: "内联凭证认证能降低新具有写入权限的智能体工作流的上线审批耗时，并将模拟漏洞的吊销耗时从数天压缩到 30 分钟以内。"
    successMetric: "签下 3 份 $10k–$24k 的试点协议；至少 2 个试点中实测吊销耗时低于 30 分钟。"
    owner: "创始人/CEO + 创始工程师"
  - horizon: "90–180 天"
    experiment: "漏洞-身份映射原型"
    hypothesis: "利用公开漏洞情报和智能体元数据，将 GitGuardian 风格的 MCP 配置错误模式映射到活跃智能体身份在技术上可行。"
    successMetric: "原型在漏洞披露后 24 小时内，将至少一个真实或合成的 MCP 漏洞映射到共创客户环境中的受影响智能体身份。"
    owner: "创始工程师"
  - horizon: "180–270 天"
    experiment: "竞争胜负追踪"
    hypothesis: "在有活跃编程智能体部署的企业的评估中，GitHub 优先深度和漏洞感知吊销速度能胜过 Aembit 和 Oasis。"
    successMetric: "前 10 个合格竞争评估中胜率 ≥ 50%。"
    owner: "创始人/CEO"
  - horizon: "270–365 天"
    experiment: "GitHub 和 AWS Marketplace 联合销售动作"
    hypothesis: "在 10+ 家生产客户可供背书后，上架 GitHub Marketplace 和 AWS Marketplace 能加速入境线索。"
    successMetric: "上架 90 天内，每月至少有 2 个可归因于 Marketplace 上架的合格入境线索。"
    owner: "GTM 负责人 + 合作伙伴"

operations:
  - "策略引擎：委托权限范围和令牌签发的规则评估；必须高可用，因为所有智能体写入操作都在此处门控。"
  - "集成层：维护 GitHub OIDC、AWS STS、Azure Workload Identity、GCP WIF、Okta、Jira 和 Slack 的认证连接器；连接器可靠性是合同 SLA 的核心。"
  - "漏洞知识图谱：持续摄入智能体专项 CVE、MCP 配置错误模式和框架安全公告；将每条信息映射到受影响的智能体身份档案。"
  - "审计日志管道：向客户 SIEM（Splunk、Datadog、AWS Security Lake）发送结构化的按操作审计事件，无需客户学习新查询语言。"
  - "事件响应运行手册：为三类最常见场景——新智能体上线、漏洞披露和失控智能体封控——提供文档化的标准操作流程。"
  - "核心合作伙伴：GitHub、AWS、Azure、GCP、Okta（技术集成）、HashiCorp Vault（吊销原语）、安全咨询公司（商机来源和实施支持）。"

team:
  - role: "创始人/CEO 兼 GTM 负责人"
    startTiming: "第 0 个月"
    rationale: "向 CISO 的企业安全销售需要创始人能主导共创客户发现、谈判 LOI，并在产品完成之前就建立起可信顾问关系。"
  - role: "创始工程师（身份/安全基础设施）"
    startTiming: "第 0 个月"
    rationale: "GitHub OIDC、AWS STS 和 SPIFFE 集成深度是产品在试点中的价值证明；需要深厚的工作负载身份和云 IAM 经验，而非通用全栈背景。"
  - role: "第二位工程师（集成与策略引擎）"
    startTiming: "第 3 个月"
    rationale: "从 GitHub 到 AWS 扩展到 Okta、Jira 和 Slack 连接器是第 4–9 个月的核心产品里程碑；专职集成工程师能解除这一阻塞，同时让创始工程师保持专注于核心凭证认证和吊销原语。"
  - role: "安全研究主管（漏洞-身份映射）"
    startTiming: "第 9 个月"
    rationale: "漏洞知识图谱是持久差异化点；在核心产品进入生产、服务 10+ 家客户后，需要专职安全研究员，防止知识图谱因更新不及时而失去价值。"
  - role: "企业客户主管"
    startTiming: "第 12 个月"
    rationale: "只有在试点到生产的转化流程已有文档记录、至少 5 家付费客户已上线后才招募；在没有可重复的价值证明之前过早招募销售，只会浪费资金跑道。"

milestones:
  - horizon: "0–12 个月"
    items:
      - "交付 GitHub 到 AWS 凭证认证和吊销概念验证（第 2 个月）。"
      - "签下 3–5 份共创客户付费试点，ACV $10k–$24k（第 4–7 个月）。"
      - "在至少 2 个生产试点环境中证明吊销耗时低于 30 分钟（第 8 个月）。"
      - "上线 Okta 和 Jira 集成；试点客户升级为完整平台订阅（第 9–12 个月）。"
      - "基于试点指标和 LOI 管道完成种子轮融资（第 10–12 个月）。"
  - horizon: "12–24 个月"
    items:
      - "达到 20 家付费生产客户，平均 $60k ACV（~$1.2M ARR）。"
      - "上线由实时漏洞情报触发的漏洞感知自动化吊销（第 14 个月）。"
      - "新增 Slack 管理和 GCP 集成；在 GitHub Marketplace 和 AWS Marketplace 上架（第 18 个月）。"
      - "发布首份公开吊销耗时基准，确立产品作为品类参考指标的地位。"
      - "招募第一位企业客户主管，启动对 200 人+ 目标客户名单的结构化外呼。"
  - horizon: "24–36 个月"
    items:
      - "达到 80 家付费客户，平均 $75k ACV（~$6M ARR，与研究 SOM 吻合）。"
      - "将产品扩展到财务和 HR 智能体工作流；面向 CISO 报告推出委托图谱分析层。"
      - "对阵 Aembit、Oasis、Astrix 的竞争评估胜率 ≥ 50%（有书面记录）。"
      - "根据 NRR、CAC 回收期和管道覆盖率评估 A 轮融资时机。"

risks:
  - risk: "GitHub、AWS 或 Okta 等主要云或开发平台推出跨工具原生智能体委托和吊销，覆盖深度与 GitHub 到云路径相当。"
    likelihood: Medium
    impact: High
    mitigation: "加速 GitHub-AWS 以外的集成广度（Jira、Slack、Okta、GCP），使跨厂商委托图谱无法被任何单一平台复制；在现有厂商进入之前发布漏洞感知吊销基准。"
  - risk: "资金充足的竞争对手（Aembit、Oasis、Astrix）将短期智能体凭证管理商品化的速度，快于本公司建立委托图谱护城河的速度。"
    likelihood: High
    impact: High
    mitigation: "在试点评估中聚焦漏洞感知吊销指标和跨工具委托完整性，而非通用 NHI 资产清点——这些不在竞争对手的近期路线图上（根据研究）。"
  - risk: "具有写入权限的智能体部署在 2026–2027 年仍主要停留在只读或试点阶段，使有紧迫预算的可触达买家池缩水。"
    likelihood: Medium
    impact: Medium
    mitigation: "只瞄准智能体已在生产环境运行（在探索访谈中已确认）的公司；不把销售资源浪费在仍在评估智能体工具的公司上。"
  - risk: "协议碎片化（MCP、SPIFFE、OpenID 智能体身份标准、厂商专有令牌格式）使通用控制平面接口在技术上维护成本极高。"
    likelihood: Medium
    impact: Medium
    mitigation: "基于 OIDC/OAuth 标准层原语构建；为新运行时暴露插件 API，而非硬编码每个框架。"
  - risk: "平台团队对延迟或可靠性的顾虑阻碍采用——买家担心凭证认证中间件成为所有智能体自动化的单点故障。"
    likelihood: High
    impact: Medium
    mitigation: "使用 OIDC 令牌交换设计零额外 RTT 热路径；发布 99.9% 可用性 SLA，并为延迟敏感工作流支持异步仅审计模式。"
  - risk: "安全买家优先考虑态势/发现叠加层而非内联执行，推迟从试点到生产合同的转化。"
    likelihood: Medium
    impact: Medium
    mitigation: "将发现和模拟模块打包为内联执行的切入路径；让买家先从只读可见性开始，经内部桌面推演后再升级到执行模式。"

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3–5M"
  runwayMonths: 20
  useOfFundsSummary: "20 个月资金跑道用于：2 名额外工程师（集成与策略引擎）、第 9 个月的安全研究员 1 名、产品基础设施与集成维护、5–8 家共创客户的高触达 onboarding，以及第 12 个月的销售/GTM 联合创始人或首位客户主管——目标是 20 家付费客户和约 $1.2M ARR 作为 A 轮触发器。"
