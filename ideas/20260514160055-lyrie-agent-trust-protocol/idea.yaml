topRisks:
  - name: "Protocol fragmentation"
    description: "Multiple agent frameworks and trust standards could emerge, making one control-plane interface hard to universalize."
    mitigation: "Support several runtimes early and anchor the product on policy enforcement and revocation outcomes rather than any single protocol."
  - name: "Incumbent expansion"
    description: "Large IAM, PAM, or cloud-security vendors could extend existing products into agent identity and narrow the wedge."
    mitigation: "Win the earliest write-capable coding-agent workflows with faster integrations, richer delegation context, and exploit-aware controls incumbents do not yet offer."
  - name: "Market timing"
    description: "Some enterprises may still be piloting agents, delaying budget until write-capable deployments become common."
    mitigation: "Target design partners that already have internal coding or IT agents in production and position the product as the blocker-clearing layer for security approval."
