modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified BYOC vendors] --> Pilots[Paid pilots]
      CACSpend[CAC spend] --> Pilots
      Pilots --> Customers[Production customers]
      Customers --> Tenants[More live tenants]
      Tenants --> Revenue[Annual subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[Ending cash]
      Churn[Churn and security friction] --> Customers
modelSanity:
- checkName: Revenue engine
  finding: The base case is driven by growing from 2 production vendors at Y1 end to 28 by Q4Y3 at a $130K blended ACV, with most value coming from repeatable AWS deployments and tenant expansion.
- checkName: Must go right
  finding: Security reviews have to approve a standard redacted-bundle workflow often enough that partner-assisted pilots can convert into 14 production customers by Q4Y2.
- checkName: Model breaks if
  finding: If sales cycles stretch toward 8-9 months or gross margin stalls below 67%, the downside case keeps EBITDA deeply negative and shrinks the cash floor to roughly $0.6M.
- checkName: Next-round proof
  finding: A seed-ready story appears once the company can show 14-20 production customers, partner-assisted installs, and release-regression upsell without losing the path to 70% gross margin.
sanityChecks:
  ruleOf40: Y3 growth 148.0% + EBITDA margin -5.2% = 142.8%.
  burnMultiple: Y2 burn multiple 0.8x based on $0.83M burn over $1.02M net new revenue; Y3 burn multiple 0.1x as the model reaches positive EBITDA in Q4Y3.
  revenuePerFte: $274.1K Y3 using Q4Y3 headcount of 10 FTE (benchmark roughly $200K-$400K for B2B infrastructure SaaS).
  flags:
  - The model assumes enough target accounts will approve outbound redacted incident bundles to reach 14 production customers by month 24, but research still leaves budget ownership and export-policy pass rates unresolved.
  - Gross margin only reaches the 70% business-plan target if deployment work stays near the plan threshold of under two engineer-weeks per customer; otherwise solutions work will push the funding need higher.
  - Revenue excludes paid pilots and onboarding fees, which keeps ARR conservative but means the cash path may diverge if the company leans harder into services to win early deals.
