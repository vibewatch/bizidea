scenarios:
  downside:
    description: Security approvals, partner activation, and production conversions slip by roughly two quarters while pricing stays closer to the low end of the business-plan range.
    y3RevenueK: 2310.0
    y3EbitdaK: -490.5
    cashLowPointK: 619.5
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 24 instead of 28.
    - Blended ACV stays at $120K instead of $130K because premium retention and protected-environment upsells land later.
    - Gross margin tops out at 68% because deployments remain more services-heavy than planned.
  base:
    description: AWS-first deployments become repeatable, the first partner channel contributes in Y2, and premium retention / protected-environment upsells modestly lift blended ACV.
    y3RevenueK: 2740.8
    y3EbitdaK: -142.8
    cashLowPointK: 1086.6
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 28 with $130K blended ACV.
    - Gross margin ramps from 65% in Y1 to the 70% target in Y3.
    - Headcount stays lean at 10 FTE by Q4Y3 while partner-assisted installs start to reduce founder bottlenecks.
  upside:
    description: Pilot conversion and partner referrals improve, and release-regression plus retention modules attach earlier without requiring a much larger team.
    y3RevenueK: 3465.3
    y3EbitdaK: 433.5
    cashLowPointK: 1490.3
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 32 instead of 28.
    - Blended ACV rises to $135K as premium modules attach to more production accounts.
    - Gross margin reaches 72% as policy templates and deployment playbooks reduce custom work.
