slug: byoc-agent-support-relay
date: "2026-06-24"
executiveSummary: >-
  BYOC agent support relay is a vendor-support infrastructure company for AI
  software vendors that deploy agents inside customer-owned cloud accounts. The
  beachhead is Series A-C vendors with 5-20 live BYOC tenants in regulated
  sectors where weekly escalations still depend on customer-run log pulls and
  ad hoc scripts. The first product is not a broad observability suite; it is
  an AWS-first in-tenant trace relay and policy engine that produces redacted
  incident bundles, release-regression diffs, and fleet health signals without
  exporting raw prompts or traces by default. That wedge matches the researched
  buying trigger of a new enterprise BYOC win, renewal, or bad release that
  overwhelms the vendor's reliability team. Pricing should start with a paid
  pilot and then convert to per-live-tenant annual subscriptions because value
  scales with isolated deployments, not seats. The sequencing is intentionally
  narrow: prove one support workflow, one cloud, and one export-approval model
  before expanding into multi-cloud coverage, SLA proof, or billing analytics.
  The strongest reasons to engage are clear pain, premium budget precedent, and
  a differentiated workflow relative to generic observability tools. The
  biggest disconfirming risk is that security teams refuse any outbound
  artifact egress or that the true count of vendors with enough live BYOC
  tenants is smaller than assumed. Research also does not resolve the dominant
  private-cloud agent frameworks or the first budget owner, so the first six
  months must treat connector selection and budget ownership as explicit tests.
problem:
  - AI vendors lose root-cause speed once their product runs inside customer VPCs and support teams depend on customer-run log pulls, dashboards, and SSH sessions to diagnose incidents.
  - Existing observability products either require sensitive telemetry to leave the tenant or price unsampled AI traces poorly, while manual workflows cannot compare incidents or regressions across isolated customer environments.
solution:
  - Deploy an AWS-first in-tenant collector and policy engine that captures full agent traces locally and exports only approved redacted incident bundles, regression diffs, and fleet health summaries.
  - Give vendor reliability teams a central cross-tenant support console for P1 triage, release comparison, and export approval without forcing the end customer to replace Datadog, Grafana, or CloudWatch.
whyWeWin:
  - The product serves the vendor's support and release-debugging workflow rather than asking the end customer to buy another observability backend, which avoids a head-on platform replacement sale.
  - Reusable masking policies, export templates, and a growing corpus of redacted incident bundles and fixes across many tenants compound into faster diagnosis and a workflow moat.
strategicChoices:
  beachhead: Series B AI software vendors selling copilots or agents into banks, insurers, publishers, and similar regulated enterprises through AWS BYOC deployments, with 5-20 live customer tenants and recurring Sev-1 support load.
  wedgeRationale: This customer slice already feels the cost of manual evidence gathering, has a clear renewal-linked trigger, and can justify six-figure reliability spend sooner than broader AI vendors or end-enterprise platform teams.
  sequencingRationale: Start with AWS plus OTel-aligned trace capture because the first goal is to prove faster incident resolution under real security review, then add release-regression and benchmarking workflows once pilot data is flowing, and only then expand cloud coverage and channels after deployment speed is repeatable.
  notYet:
    - Selling a generic observability replacement or end-customer dashboard to enterprise platform teams.
    - Supporting one-off on-prem or air-gapped deployments before the AWS BYOC playbook is repeatable.
    - Expanding into SLA reporting, usage-billing evidence, or broad AI eval tooling before the incident-bundle wedge converts to production.
market:
  tam: >-
    Estimated $300M TAM based on roughly 2,500 global AI vendors that could
    face BYOC or private-cloud support pain at about $120k annual spend per
    vendor.
  sam: >-
    Estimated $84M SAM based on roughly 700 current Series A-C vendors already
    selling regulated-enterprise BYOC deployments and likely to feel recurring
    support pain.
  som: >-
    Estimated $7.2M year-3 SOM based on 60 reachable customers at about $120k
    blended ACV through founder-led sales and deployment-partner leverage.
  segments:
    - AI application vendors with 5-20 live regulated-enterprise BYOC tenants and a dedicated reliability or solutions team.
    - Private-deployment software vendors outside the strictest regulated sectors that still need release debugging and cross-tenant evidence across isolated customer clouds.
  buyingProcess: >-
    Reliability or solutions leaders usually champion the purchase after a new
    BYOC win, a painful escalation, or a release regression, but the deal
    closes only after CTO or VP Engineering sponsorship and security-architecture
    approval of the install and export policy. Budget may sit in reliability,
    support operations, or platform security, so discovery must map the
    economic owner early in each deal.
product:
  mvp: >-
    MVP covers AWS deployments first: OTel-aligned trace capture, local prompt
    and tool-call retention, redaction policy templates, human-approved incident
    bundle export, release-diff views, and a central fleet health console for
    one vendor across 5-20 tenants. It deliberately excludes multi-cloud,
    customer-facing dashboards, and broad model-evaluation workflows.
  sixMonth: Ship a production-ready AWS collector, policy templates for masking and retention, export approvals with audit logs, and support-ticket packaging that gets the first actionable incident bundle out in under 30 days from kickoff.
  twelveMonth: Add release-regression benchmarking, benchmark snapshots across tenants, and the next most-requested cloud connector only after AWS deployments consistently reach first value with minimal custom work.
  twentyFourMonth: Expand from support relay into private-deployment SLA proof, upgrade validation, and usage-billing evidence while keeping policy-safe in-tenant computation as the architectural core.
  keyBets:
    - Buyers will value faster safe evidence export more than a broader observability dashboard in the first budget cycle.
    - An AWS-first deployment path can reach first value in four to six weeks with limited custom engineering.
    - Redacted incident bundles and regression fingerprints will become reusable assets that improve pilot-to-production conversion and future diagnosis.
gtm:
  wedge: Sell a paid support-visibility pilot for the first 1-3 BYOC tenants immediately after a renewal, launch, or incident, then convert into a production subscription once the relay proves faster triage and safer release debugging.
  channels:
    - Founder-led direct sales into CTOs, VPs of Engineering, and heads of customer reliability at AI vendors already selling BYOC.
    - Cloud-deployment consultancies and systems integrators already implementing private networking and security review for enterprise tenants.
    - Customer-success and reference-account introductions from existing BYOC enterprise customers that are already escalating support pain.
  funnelTargets: "Target account→qualified pilot 20-30%, qualified pilot→paid pilot 50%+, paid pilot→production 60%+, production account→5+ live tenants under relay within 9 months in 50%+ of accounts."
  pricing: >-
    Start with a $15k-$25k paid pilot for 60-90 days covering 1-3 live tenants,
    then convert to an annual subscription priced per live BYOC tenant with an
    $80k-$150k base ACV for vendors operating 5-20 tenants, plus premium
    charges for longer retention, protected environments, and higher analyzed
    run volume. This aligns price to the buyer's deployment complexity and
    support burden better than seat-based pricing.
businessModel:
  revenueStreams:
    - Annual subscription priced by live BYOC tenant count with platform minimums.
    - Premium retention, fleet benchmarking, and release-validation modules.
    - Security-review onboarding and deployment services sold as bounded packages.
  unitOfValue: Live BYOC tenant under relay policy, with upsell tied to retained trace days and analyzed agent runs.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more live tenants and cloud environments within the same vendor account.
    - Expand from incident bundles into release validation, benchmarking, and SLA evidence.
    - Reuse approved policy templates to shorten rollout into new regulated customer logos.
strategyMap:
  northStarMetric: Number of production live BYOC tenants automatically generating approved incident bundles and release diffs for the vendor support team.
  inputMetrics:
    - Time from kickoff to first actionable incident bundle.
    - Qualified pilot to paid pilot conversion rate.
    - Paid pilot to production conversion rate.
    - Median MTTR improvement on incidents where the relay is used.
    - Expansion rate from first production tenant to five or more covered tenants in an account.
  moatsToBuild:
    - Policy-template library for masking, retention, and export approvals by regulated use case.
    - Redacted incident-bundle corpus linking trace patterns to resolutions across many isolated tenants.
    - AWS and OTel deployment playbooks that reduce security-review and onboarding friction.
  killCriteria:
    - If fewer than 3 of the first 10 qualified prospects allow any outbound redacted bundle after security review, the relay export thesis is wrong.
    - If the first 3 deployments cannot reach an actionable incident bundle within 30 days and less than 2 engineer-weeks of custom work, repeatable GTM is broken.
    - If fewer than 2 paid pilots convert to "$80k+" production subscriptions by month 12, the ROI and pricing model are too weak.
  mermaid: |
    flowchart LR
      Wedge[BYOC support relay] --> MVP[AWS-first incident bundle MVP]
      MVP --> Proof[Faster triage and paid pilot conversion]
      Proof --> Expansion[More tenants plus release validation and SLA evidence]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong problem signal and credible budget precedent, but conviction stays moderate until security-review pass rates and real tenant counts are proven.
    whyBelieve: The company attacks a specific and painful support workflow where BYOC deployment, AI telemetry volume, and enterprise security policy now intersect.
    whyDoubt: The beachhead may be narrower than it appears and some customers may refuse any artifact egress, which would force a different product and pricing model.
    nextDiligence: Validate with 8-10 target vendors that at least two will approve a paid pilot with outbound redacted bundles inside one budget cycle.
  firstCustomer:
    title: Head of Customer Reliability at a Series B AI software vendor
    profile: A 300-800 employee vendor with 5-20 AWS BYOC tenants in banking, insurance, or publishing, a 3-8 person reliability team, and weekly escalations that currently require customer-run log pulls.
    trigger: A new regulated-enterprise launch, renewal, or bad release exposes that the support team cannot debug isolated tenants fast enough with current tooling.
    buyer: VP Engineering or CTO
    initialContract: >-
      $15k-$25k paid pilot for 1-3 tenants converting to an $80k-$150k annual
      subscription once 5-20 live tenants are under policy, with upsell for
      retention and release-validation modules.
  mustBeTrue:
    - At least one target segment has enough vendors with 5 or more live BYOC tenants to support efficient founder-led pipeline generation now.
    - Security teams will approve a predefined redacted export schema often enough that the relay can operate without full manual bespoke review every time.
    - The relay reduces time to first actionable root-cause packet and overall MTTR enough that buyers fund it from an existing reliability or support budget.
    - An AWS-first deployment can be packaged tightly enough that pilots do not become custom services projects.
    - Incumbent observability and self-hosted tooling do not solve cross-tenant vendor support workflows well enough to erase the wedge before expansion.
  diligenceQuestions:
    - How many live BYOC tenants do the best initial prospects actually run today, not merely pilot?
    - What exact fields and approvals must be present before a security team allows outbound incident bundles?
    - Which cloud and agent-framework combinations dominate the first 20 prospects and therefore define the connector roadmap?
    - "Where did comparable buyers fund adjacent tools: reliability, support operations, or security architecture?"
    - What measurable MTTR delta would make a prospect convert from pilot to a six-figure annual contract?
operatingAssumptions:
  - assumption: Enough Series A-C AI vendors already operate 5 or more live BYOC tenants to produce a focused initial market.
    basis: research.yaml
    validationTest: Build a named list of 40 target vendors and confirm at least 15 fit the tenant-count and regulated-customer profile.
    decisionImpact: If false, narrow the ICP further or shift toward a broader private-deployment software market before scaling sales hiring.
  - assumption: Security teams will approve outbound redacted bundles when policy templates, audit logs, and retention controls are predefined.
    basis: research.yaml
    validationTest: Complete 5 formal security reviews and secure approval for a standard export schema in at least 3 of them.
    decisionImpact: If false, reorient the product toward fully in-tenant diagnosis and operator assist rather than relay-centric workflows.
  - assumption: Buyers will fund the product from reliability or support pain before a major public incident forces spend.
    basis: idea.yaml
    validationTest: Win at least 3 paid pilots from prospects motivated by renewal, launch, or repeated Sev-1 load rather than a one-off breach or outage.
    decisionImpact: If false, the sales motion becomes event-driven and pipeline quality drops, which weakens the venture-scale case.
  - assumption: An AWS-first OTel-aligned deployment can reach first value with less than 2 engineer-weeks of custom work per customer.
    basis: operator judgment
    validationTest: Complete the first 3 pilot deployments with the same core collector, policy, and export playbook and stay below that customization threshold.
    decisionImpact: If false, gross margin and sales efficiency break, so the product must narrow scope or make services a deliberate revenue line.
  - assumption: Pilot customers will accept per-tenant pricing with annual contract value above $80k once 5 or more live tenants are covered.
    basis: research.yaml
    validationTest: Get 2 signed production proposals at "$80k+" ACV tied to tenant count and retention tiers by month 12.
    decisionImpact: If false, the market may support only smaller tooling budgets and the funding plan should compress accordingly.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Build a named target-account list and interview 25 prospects already selling BYOC into regulated enterprises.
    hypothesis: At least 10 prospects have recurring support pain and 5 or more live or imminent BYOC tenants.
    successMetric: 10 qualified accounts with tenant count, trigger event, and named economic buyer captured.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run structured security reviews around a sample export schema, masking policy, and audit-log design with 6 prospects.
    hypothesis: A standard redacted-bundle template will be acceptable in at least half of qualified accounts.
    successMetric: 3 prospects approve a concrete outbound artifact schema for pilot use.
    owner: Founder product
  - horizon: 0–90 days
    experiment: Ship the first AWS collector and incident-bundle prototype on top of OTel-aligned traces.
    hypothesis: One design partner can see a useful root-cause packet inside 30 days without replacing existing observability tooling.
    successMetric: 1 design partner receives an actionable incident bundle from a live or replayed workflow within 30 days.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Convert 3 design partners into paid pilots with explicit MTTR and deployment-speed success criteria.
    hypothesis: Buyers will pay for support visibility before the full release-benchmarking roadmap is built.
    successMetric: 3 paid pilots signed at "$15k+" each with agreed conversion criteria.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Launch release-regression diffs and convert the first 2 paid pilots into production subscriptions.
    hypothesis: Release debugging plus incident bundles creates a stronger ROI case than incident relay alone.
    successMetric: 2 production customers at "$80k+" ACV and documented MTTR or escalation-load improvement.
    owner: Engineering lead
  - horizon: 6–12 months
    experiment: Recruit 2 cloud-deployment partners and test whether they can deliver the packaged AWS playbook.
    hypothesis: Partner-led installs can reduce founder time without increasing customization.
    successMetric: 2 signed partners and 1 partner-assisted deployment reaching first value in under 45 days.
    owner: Head of partnerships
operations:
  - Maintain a standard security-review package covering network topology, export schema, masking defaults, retention settings, and deletion workflows.
  - Instrument every deployment with named customer-side security owner, reliability owner, and escalation contact before going live.
  - Export incident bundles into the customer's existing ticketing and audit systems instead of building a broad control tower on day one.
  - Track deployment effort, approval-cycle time, and post-incident outcomes account by account so product and GTM decisions stay tied to measurable proof.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales, design-partner recruitment, and ICP discipline because the first deals require problem education and sharp qualification.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the AWS collector, policy engine, export pipeline, and first fleet-health workflow needed for credible pilots.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Compress deployment time, standardize security-review artifacts, and protect core engineering bandwidth as pilots multiply.
  - role: Security / policy product lead
    startTiming: Month 6
    rationale: Turn pilot learnings into reusable masking templates, approval flows, and retention controls that procurement teams trust.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Scale the deployment channel only after the AWS playbook is repeatable and partner enablement can be productized.
milestones:
  - horizon: 0–12 months
    items:
      - Package the AWS-first collector, policy templates, and incident-bundle export workflow.
      - Sign 6-8 design partners and convert at least 3 into paid pilots.
      - Put 2 customers into production at "$80k+" annualized value.
      - Prove first value in 30 days and keep customization below 2 engineer-weeks per pilot.
  - horizon: 12–24 months
    items:
      - Add the next cloud connector only after AWS deployments are repeatable.
      - Grow to 12-15 production customers and expand multiple tenants inside the best accounts.
      - Launch release-regression benchmarking and policy-template reuse as standard upsells.
      - Establish partner-sourced pipeline as a meaningful share of qualified pilots.
  - horizon: 24–36 months
    items:
      - Expand from support relay into SLA proof, upgrade validation, and billing-evidence workflows.
      - Build a recognized corpus of cross-tenant incident patterns and remediation templates.
      - Reach category credibility as the default vendor-support layer for private-cloud AI deployments without becoming a generic observability suite.
risks:
  - risk: Security teams may reject any outbound artifact egress even after masking and approval controls.
    likelihood: High
    impact: High
    mitigation: Qualify hard on export policy early, standardize the approval package, and maintain an in-tenant-only fallback product direction.
  - risk: The number of vendors with enough live BYOC tenants may be smaller than research estimates.
    likelihood: Medium
    impact: High
    mitigation: Build a named pipeline before scaling spend and expand into adjacent private-deployment software vendors only after the initial ICP is measured.
  - risk: Deployment complexity may force heavy custom work and reduce gross margin.
    likelihood: Medium
    impact: High
    mitigation: Stay AWS-first, reject edge-case installs early, and hire solutions talent before adding more clouds or features.
  - risk: Incumbent observability suites or self-hosted tools may add policy-aware export features quickly.
    likelihood: Medium
    impact: Medium
    mitigation: Differentiate on vendor-support workflow depth, cross-tenant comparisons, and faster production deployment rather than broader telemetry breadth.
  - risk: Buyers may treat the product as a nice-to-have debugging aid instead of a budgeted reliability layer.
    likelihood: Medium
    impact: Medium
    mitigation: Sell only against explicit trigger events and require quantified MTTR or escalation-load goals in every pilot.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the AWS-first product build, 6-8 design partners, 3 paid pilots, first production conversions, and the early solutions, security-policy, and partner hires needed to prove repeatable enterprise deployment and GTM.
