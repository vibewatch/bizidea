competitors:
- name: Tsuga
  stage: scale-up
  wedge: 将遥测数据留在客户云内的 BYOC 可观测性平台，主张 AI 时代的经济逻辑使传统 SaaS 可观测性模式难以为继。
  pricing: 定制报价；公司描述采用按 GB 计费模型，Tech Funding News 报道合同均价为六位数。
  strength: 叙事高度契合、多云定位，以及企业愿意为私有云 AI 可观测性支付高端预算的早期证明。
  weaknessVsUs: 作为更宽泛的可观测性平台构建；初创公司可在厂商安全支持包和跨租户调试工作流上保持更聚焦。
  sourceRefs:
  - 2
  - 5
- name: Langfuse
  stage: scale-up
  wedge: 具有强大自托管控制的开源 LLM 可观测性、评估和 prompt 工具。
  pricing: 免费至 $2,499/月云企业版；支持自托管。
  strength: 开发者口碑佳，脱敏/留存/审计控制完善，自托管故事可信。
  weaknessVsUs: 为单一环境内的应用团队可观测性优化，而非跨多个隔离客户租户的策略感知故障中继。
  sourceRefs:
  - 6
  - 8
  - 9
- name: LangSmith
  stage: scale-up
  wedge: 覆盖可观测性、评估、部署和安全沙箱的集成 Agent 生命周期平台。
  pricing: 免费开发者层，$39/席位 Plus 套餐，混合或自托管部署企业/定制报价。
  strength: 与 LangChain 生态深度契合，并有可信的自托管和 Kubernetes 运营方案。
  weaknessVsUs: 最适合希望采用宽泛 Agent 平台的买家；较少聚焦于跨 BYOC 租户的厂商到客户证据导出。
  sourceRefs:
  - 10
  - 12
  - 15
- name: Arize Phoenix / AX
  stage: scale-up
  wedge: 具有私有连接部署选项和 OTel 对齐的企业级 AI 评估和可观测性。
  pricing: Phoenix 开源免费；AX 新增付费和定制企业层，含私有连接和合规功能。
  strength: 评估技术栈完善，私有连接支持到位，企业合规态势良好。
  weaknessVsUs: 重心是集中式 AI 工程和评估，而非跨客户自有云的支持专用中继和导出策略。
  sourceRefs:
  - 16
  - 17
  - 20
- name: Datadog Agent Observability
  stage: incumbent
  wedge: 在宽泛的可观测性和安全平台上叠加的 Agent 可观测性功能。
  pricing: 基于模块的平台定价，加 AI 可观测性场景的报价驱动采购。
  strength: 庞大的已安装基础，以及可观测性管道和敏感数据扫描等周边工具。
  weaknessVsUs: 仍假设以 Datadog 为中心的后端和宽泛的平台覆盖，而初创公司可以专注于客户自有环境内的支持安全证据流。
  sourceRefs:
  - 25
  - 26
  - 27
  - 28
regulatoryTechnicalConstraints:
- point: 在受监管环境中访问模型和传输遥测数据，私有网络和无公共出站模式往往是强制要求。
  sourceRefs:
  - 29
  - 30
  - 31
  - 34
- point: prompt 和日志的脱敏、删除和可审计性必须是产品一等功能，而非后处理步骤。
  sourceRefs:
  - 6
  - 8
  - 18
  - 33
- point: 零留存承诺因云和功能而异；部分服务商工作流仍会留存或监控 prompt 或响应内容。
  sourceRefs:
  - 33
  - 35
- point: AI Act 式要求将自动事件记录、上市后监控和故障证据推入运行时技术栈更深层。
  sourceRefs:
  - 14
  - 32
  - 38
validationSignals:
- point: Tsuga 在此架构领域已报告数百万美元 ARR、六位数均价合同及具名客户。
  sourceRefs:
  - 2
- point: 邻近可观测性厂商现已将 BYOC、本地部署和隔离部署模式作为一等方案提供。
  sourceRefs:
  - 21
  - 22
  - 17
  - 40
- point: 各大云厂商已将私有连接和更严格的 AI 服务数据边界控制常态化，降低技术可行性风险。
  sourceRefs:
  - 29
  - 31
  - 34
  - 35
- point: 遥测层正在围绕 OTel 式语义标准化，降低新进入者的连接器风险。
  sourceRefs:
  - 13
  - 19
  - 39
openQuestions:
- 有多少家目标厂商已在运营（而非仅试点）5 个以上在线 BYOC 租户？
- 客户会允许出站的脱敏支持包，还是坚持要求全租户内诊断并对每次导出人工审批？
- 当前私有云生产中哪些 Agent 框架占主导，从而决定必备连接器路线图？
- 在采购第一年，预算归属于平台工程、客户可靠性还是安全架构？
