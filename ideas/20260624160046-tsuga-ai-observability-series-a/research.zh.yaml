      - 35
      - 39
    buyerPower:
      score: 4
      rationale: 买家高度集中、技术能力强，且在差异化不足时有能力退回自研脚本或现有可观测性合同。
      sourceRefs:
      - 2
      - 21
      - 23
      - 26
    threatOfEntrants:
      score: 3
      rationale: 开源追踪和 OTel 降低了最小可行产品的组装成本，但私有连接、安全审查和实例群运营公信力仍构成有意义的执行壁垒。
      sourceRefs:
      - 17
      - 12
      - 31
      - 40
    threatOfSubstitutes:
      score: 5
      rationale: 客户自建看板、Datadog 类平台、自托管工具和手动支持脚本各自能替代工作流的一部分。
      sourceRefs:
      - 6
      - 21
      - 25
      - 29
      - 40
    competitiveRivalry:
      score: 4
      rationale: 市场已有初创公司、开源和在位厂商共同聚焦 Agent 可观测性，因此胜出取决于切口清晰度，而非纯粹的功能广度。
      sourceRefs:
      - 2
      - 10
      - 16
      - 25
  pestle:
  - factor: political
    impact: negative
    point: 数字主权和行业监管推动企业转向客户控制的部署，并强化证据处理要求。
    sourceRefs:
    - 33
    - 34
    - 38
  - factor: economic
    impact: positive
    point: 六位数品类交易和日益上涨的可观测性成本焦虑，为能在不重复全栈支出的前提下压缩 MTTR 的工具创造了预算空间。
    sourceRefs:
    - 2
    - 3
    - 23
    - 26
  - factor: social
    impact: positive
    point: 企业信任越来越依赖于将 prompt 和追踪留在客户边界内，而非要求厂商广泛访问。
    sourceRefs:
    - 3
    - 21
    - 33
    - 35
  - factor: technological
    impact: positive
    point: OTel 和 AI 专项追踪规范使产品更容易插入各种 Agent 技术栈，无需另辟遥测标准。
    sourceRefs:
    - 13
    - 19
    - 39
  - factor: legal
    impact: negative
    point: AI Act 式日志记录和上市后义务提高了可审计性、留存策略和故障报告的门槛。
    sourceRefs:
    - 14
    - 32
    - 38
  - factor: environmental
    impact: neutral
    point: AI 遥测体量快速膨胀；租户内过滤和选择性导出有助于避免不必要的数据重复传输和存储。
    sourceRefs:
    - 3
    - 21
    - 27
  adoptionFrictionMatrix:
  - friction: 每个租户的安全和网络审查
    severity: high
    affectedBuyer: 工程副总裁和客户安全审查方
    mitigation: 提供预设的 PrivateLink 和私有端点参考架构，附带最小权限 IAM 模板。
    sourceRefs:
    - 17
    - 29
    - 31
    - 34
  - friction: 界定哪些数据可以离开租户
    severity: high
    affectedBuyer: 可靠性负责人和客户安全团队
    mitigation: 在试点启动前提供脱敏、留存、审计日志和审批默认配置。
    sourceRefs:
    - 6
    - 8
    - 18
    - 33
  - friction: 跨租户异构 Agent 和追踪技术栈
    severity: medium
    affectedBuyer: 平台工程团队
    mitigation: 依托 OTel 对齐的连接器，而非针对每个框架的定制 Agent。
    sourceRefs:
    - 13
    - 19
    - 39
  - friction: 证明 ROI 优于现有看板
    severity: medium
    affectedBuyer: CTO 或注重财务的买家
    mitigation: 以获取首个可操作包的时间、MTTR 降低幅度和发版回归检测为试点锚点。
    sourceRefs:
    - 2
    - 21
    - 24
