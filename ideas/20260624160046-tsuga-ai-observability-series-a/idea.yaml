differentiator: >-
  Traditional observability vendors want the customer to buy another backend; this startup sells the vendor a
  support-specific relay purpose-built for fleets of isolated customer-cloud deployments. The core IP is policy-aware
  evidence packaging: full traces stay local, while only approved summaries, diffs, and redacted artifacts leave the
  tenant. That makes the product useful even when the customer already has Datadog, Grafana, or CloudWatch, because it
  solves the vendor's cross-tenant debugging and release-support problem rather than replacing the customer's tooling.
