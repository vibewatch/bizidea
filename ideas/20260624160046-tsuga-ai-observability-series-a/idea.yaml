jobsToBeDone:
  - job: When a BYOC customer reports an agent failure, help the vendor reliability lead collect usable evidence without violating the customer's data-boundary rules, so they can resolve the incident quickly.
    currentAlternative: Manual log exports coordinated over support tickets and shared dashboards
    successMetric: Time to first actionable root-cause packet and MTTR for severity-one incidents
  - job: When a vendor ships a new agent release across isolated customer tenants, help the platform team compare behavior safely, so they can catch regressions before renewals or escalations.
    currentAlternative: Limited sampling from customer dashboards and ad hoc release spreadsheets
    successMetric: Regression-detection rate and reduction in customer-escalated release incidents
