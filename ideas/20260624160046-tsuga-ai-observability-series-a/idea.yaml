problem: >-
  AI application vendors increasingly win enterprise deals only if they deploy inside the customer's own cloud account,
  but that deployment model blinds the vendor once production incidents start. Support teams need raw traces, prompt
  lineage, and agent-call context to debug failures, yet security teams will not allow unrestricted telemetry exfiltration.
  Existing observability stacks either require shipping sensitive data to external SaaS or charge per byte, which makes
  unsampled AI traces economically painful at scale.
targetUser:
  primary: Head of Customer Reliability or AI Platform at a Series A-C software vendor shipping BYOC agent deployments into regulated enterprises
  secondary: Solutions architects and escalation engineers supporting private-cloud customer tenants
  buyer: VP Engineering or CTO
startupThesis:
  nonObviousInsight: >-
    BYOC changes observability from a buyer-owned dashboard problem into a vendor-support infrastructure problem. The
    winning product is not another Datadog clone; it is a policy engine that computes full-fidelity support evidence
    inside each tenant cloud and exports only the minimum approved data needed to diagnose, compare, and fix incidents
    across a fleet of isolated customer environments.
  beachhead: >-
    Remote support and release debugging for Series A-C AI application vendors that deploy copilots or agents into
    customer-owned AWS accounts at banks, insurers, publishers, and other data-sensitive enterprises
  wedge: >-
    An in-tenant trace relay that captures full agent execution data, applies customer-defined redaction and export
    policy, and emits vendor-safe support bundles plus fleet-level health signals
  whyNowCatalyst: >-
    Tsuga's traction shows enterprises now insist on in-cloud AI observability because AI traces are both too sensitive
    and too voluminous for legacy SaaS observability patterns.
  ventureScalePath: >-
    Start with P1 support and release-debugging workflows, then expand into private-deployment SLA proof, upgrade
    validation, fleet benchmarking, usage-based billing evidence, and eventually the remote-operations control plane for
    all BYOC AI software vendors.
solution: >-
  The product deploys a lightweight collector and policy engine into each customer tenant where the AI vendor already
  runs its application. It records complete agent traces, prompt lineage, confidence scores, and call graphs locally,
  then automatically generates redacted incident bundles, regression diffs, and benchmark snapshots that the vendor can
  access centrally. Customers control what fields can leave the account, how long evidence is retained, and whether
  replay artifacts are exportable. Vendors get cross-tenant fleet health, release-quality comparisons, and much faster
  incident resolution without asking customers to open broad observability access.
goToMarketSeed:
  firstCustomer: >-
    Series B AI software vendor with 5-20 live BYOC tenants in banking, insurance, or publishing, a 3-8 person
    reliability team, and weekly production escalations that currently require customer-run log pulls
  buyingTrigger: A recent enterprise win or renewal that requires private-cloud deployment and creates more support escalations than the vendor can handle manually
  currentAlternative: Ad hoc SSH and log-pull workflows, customer-run Datadog or Grafana dashboards, and one-off support scripts maintained by solutions engineers
  switchingReason: >-
    The relay cuts MTTR without forcing raw prompt or trace data out of the tenant, while giving the vendor a central
    view across all private deployments that manual workflows and customer-owned dashboards cannot provide.
  pricingHypothesis: Per live BYOC tenant per month with premium tiers based on retained trace days, protected environments, and number of agent runs analyzed
