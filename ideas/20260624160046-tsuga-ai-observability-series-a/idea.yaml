topRisks:
  - name: Slow security reviews
    description: Each customer tenant may require a separate security and procurement review before the relay can be installed.
    mitigation: Start with vendors already selling BYOC into regulated accounts and provide opinionated reference architectures, redaction defaults, and audit artifacts.
  - name: Incumbent observability overlap
    description: Customers may argue their existing Datadog, Grafana, or CloudWatch stack should already solve the problem.
    mitigation: Position the product as vendor-side support infrastructure that works on top of customer-owned tools and focuses on cross-tenant evidence packaging rather than replacing the stack.
  - name: Beachhead too narrow
    description: The number of vendors with enough live BYOC tenants could be smaller than expected in the first year.
    mitigation: Land in BYOC support first, then expand to release validation, SLA proof, and billing evidence for the broader private-deployment software market.
