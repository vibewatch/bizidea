modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Qualified BYOC vendors] --> Pilots[Paid pilots]
      CACSpend[CAC spend] --> Pilots
      Pilots --> Customers[Production customers]
      Customers --> Tenants[More live tenants]
      Tenants --> Revenue[Annual subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[Ending cash]
      Churn[Churn and security friction] --> Customers
modelSanity:
- checkName: 收入引擎
  finding: 基础情景由生产厂商从第 1 年末 2 家增长至 Q4Y3 的 28 家驱动，混合 ACV $130K，大部分价值来自可复制的 AWS 部署和租户扩张。
- checkName: 必须成立的条件
  finding: 安全审查必须以足够高的频率批准标准脱敏包工作流，使合作伙伴辅助试点能在 Q4Y2 前转化为 14 家生产客户。
- checkName: 模型崩溃条件
  finding: 若销售周期拉长至 8 至 9 个月或毛利率滞留在 67% 以下，悲观情景将使 EBITDA 持续深度为负，现金底部收缩至约 $0.6M。
- checkName: 下一轮融资证明点
  finding: 当公司能展示 14 至 20 家生产客户、合作伙伴辅助安装和发版回归追加销售、且不偏离 70% 毛利率路径时，种子轮故事成立。
sanityChecks:
  ruleOf40: 第 3 年增长率 148.0% + EBITDA 利润率 -5.2% = 142.8%。
  burnMultiple: 第 2 年消耗倍数 0.8x，基于 $0.83M 消耗对应 $1.02M 净新增收入；第 3 年消耗倍数 0.1x，模型在 Q4Y3 达到正 EBITDA。
  revenuePerFte: 第 3 年每 FTE 收入 $274.1K，采用 Q4Y3 人员编制 10 FTE（B2B 基础设施 SaaS 基准约 $200K-$400K）。
  flags:
  - 模型假设有足够多的目标账号批准出站脱敏故障包，以在第 24 个月前达到 14 家生产客户，但研究仍未厘清预算归属和导出策略通过率。
  - 毛利率只有在部署工作量控制在商业计划约定的每客户两个工程师周阈值附近时才能达到 70% 目标；否则解决方案工作将推高融资需求。
  - 收入不含付费试点和入驻费用，使 ARR 保持保守，但若公司为赢得早期订单更多依赖服务，现金路径可能出现偏差。
