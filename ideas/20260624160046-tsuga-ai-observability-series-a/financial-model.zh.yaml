scenarios:
  downside:
    description: 安全审批、合作伙伴激活和生产转化各滑后约两个季度，定价偏向商业计划区间低端。
    y3RevenueK: 2310.0
    y3EbitdaK: -490.5
    cashLowPointK: 619.5
    keyAssumptionChanges:
    - Q4Y3 生产客户期末数达到 24 家而非 28 家。
    - 混合 ACV 维持在 $120K 而非 $130K，因为高端留存和受保护环境追加销售落地更晚。
    - 毛利率上限为 68%，因为部署比计划更依赖服务。
  base:
    description: 以 AWS 为先的部署变得可复制，第一个合作伙伴渠道在第 2 年贡献收入，高端留存和受保护环境追加销售适度提升混合 ACV。
    y3RevenueK: 2740.8
    y3EbitdaK: -142.8
    cashLowPointK: 1086.6
    keyAssumptionChanges:
    - Q4Y3 生产客户期末数达到 28 家，混合 ACV $130K。
    - 毛利率从第 1 年 65% 增长至第 3 年目标 70%。
    - 第 4 季度第 3 年人员编制精简保持在 10 FTE，合作伙伴辅助安装开始减少创始人瓶颈。
  upside:
    description: 试点转化和合作伙伴引荐改善，发版回归和留存模块更早附加，无需显著扩大团队规模。
    y3RevenueK: 3465.3
    y3EbitdaK: 433.5
    cashLowPointK: 1490.3
    keyAssumptionChanges:
    - Q4Y3 生产客户期末数达到 32 家而非 28 家。
    - 混合 ACV 升至 $135K，高端模块附加至更多生产账号。
    - 毛利率达到 72%，策略模板和部署操作手册减少定制化工作。
