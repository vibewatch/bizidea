competitors:
  - name: Tsuga
    stage: scale-up
    wedge: >-
      BYOC observability platform that keeps telemetry in the customer cloud and argues AI-era economics break legacy SaaS observability models.
    pricing: >-
      Custom; company describes a per-GB model and Tech Funding News reports six-figure average contracts.
    strength: >-
      Strong narrative fit, multi-cloud positioning, and early proof that enterprises will pay premium budgets for private-cloud AI observability.
    weaknessVsUs: >-
      Built as a broader observability platform; the startup can stay narrower around vendor-safe support bundles and cross-tenant debugging workflows.
    sourceRefs:
      - 2
      - 5
  - name: Langfuse
    stage: scale-up
    wedge: >-
      Open-source LLM observability, evals, and prompt tooling with strong self-hosted controls.
    pricing: >-
      Free to $2,499/month cloud enterprise; self-host supported.
    strength: >-
      Developer love, strong masking/retention/audit controls, and a credible self-host story.
    weaknessVsUs: >-
      Optimized for app-team observability inside one environment, not policy-aware incident relay across many isolated customer tenants.
    sourceRefs:
      - 6
      - 8
      - 9
  - name: LangSmith
    stage: scale-up
    wedge: >-
      Integrated agent lifecycle platform spanning observability, evals, deployment, and secure sandboxes.
    pricing: >-
      Free developer tier, $39 per seat Plus plan, and enterprise/custom for hybrid or self-hosted deployment.
    strength: >-
      Deep LangChain ecosystem fit plus credible self-host and Kubernetes operations story.
    weaknessVsUs: >-
      Best when the buyer wants a broad agent platform; less centered on vendor-to-customer evidence export across BYOC tenants.
    sourceRefs:
      - 10
      - 12
      - 15
  - name: Arize Phoenix / AX
    stage: scale-up
    wedge: >-
      Enterprise AI evaluation and observability with private-connect deployment options and OTel alignment.
    pricing: >-
      Phoenix OSS is free; AX adds paid and custom enterprise tiers with private-connect and compliance features.
    strength: >-
      Strong evaluation stack, private-connect support, and enterprise compliance posture.
    weaknessVsUs: >-
      Center of gravity is centralized AI engineering and evals rather than support-specific relay and export policy across customer-owned clouds.
    sourceRefs:
      - 16
      - 17
      - 20
  - name: Datadog Agent Observability
    stage: incumbent
    wedge: >-
      Agent observability added onto a broad observability and security platform.
    pricing: >-
      Module-based platform pricing plus quote-led adoption for AI observability use cases.
    strength: >-
      Huge installed base and adjacent tools such as observability pipelines and sensitive data scanning.
    weaknessVsUs: >-
      Still assumes a Datadog-centric backend and broad platform footprint, while the startup can focus on support-safe evidence flow inside customer-owned environments.
    sourceRefs:
      - 25
      - 26
      - 27
      - 28
