    score: 4
    rationale: 脱敏策略、租户侧采集器和跨租户证据打包能够叠加成工作流护城河，但大型可观测性厂商最终可能切入邻近领域。
  ventureScale:
    score: 4
    rationale: 滩头市场较窄，但可扩展为 BYOC AI 软件实例群在支持、升级和商业分析层面的默认运营层。
topRisks:
  - name: 安全审查耗时过长
    description: 每个客户租户在安装中继前可能需要独立进行安全和采购审查。
    mitigation: 优先与已向受监管账号销售 BYOC 的厂商合作，并提供有规范的参考架构、脱敏默认配置和审计产物。
  - name: 在位可观测性厂商功能重叠
    description: 客户可能认为其现有的 Datadog、Grafana 或 CloudWatch 方案已能解决问题。
    mitigation: 将产品定位为运行于客户自有工具之上的厂商侧支持基础设施，聚焦跨租户证据打包，而非替换现有技术栈。
  - name: 滩头市场过于狭窄
    description: 第一年内拥有足够多在线 BYOC 租户的厂商数量可能少于预期。
    mitigation: 先在 BYOC 支持场景落地，再扩展到发版验证、SLA 证明和更广泛私有部署软件市场的计费证据。
