problem: >-
  AI 应用厂商越来越多地只有在部署于客户自有云账号内才能赢得企业订单，但一旦生产故障爆发，这种部署模式便让厂商陷入支持盲区。支持团队需要原始追踪、prompt 溯源和 Agent 调用上下文来排查故障，而安全团队又不允许不受限制地将遥测数据外传。现有可观测性方案要么要求将敏感数据发送至外部 SaaS，要么按字节收费——在规模化场景下，完整无采样的 AI 追踪在经济上极为痛苦。
targetUser:
  primary: 向受监管企业交付 BYOC Agent 部署的 A 轮至 C 轮 AI 软件厂商中，负责客户可靠性或 AI 平台的负责人
  secondary: 为私有云客户租户提供支持的解决方案架构师和升级处理工程师
  buyer: 工程副总裁或 CTO
startupThesis:
  nonObviousInsight: >-
    BYOC 把可观测性从买方侧的看板问题变成了厂商侧的支持基础设施问题。胜出的产品不是另一个 Datadog 克隆，而是一个策略引擎——它在每个租户云内计算高保真支持证据，只导出经过批准的最小数据集，用以跨隔离客户环境诊断、对比和修复故障。
  beachhead: >-
    向银行、保险公司、出版商等数据敏感型企业通过 AWS BYOC 部署 Copilot 或 Agent 的 A 轮至 C 轮 AI 应用厂商的远程支持与发版调试场景
  wedge: >-
    部署于租户内的 trace 中继，捕获完整 Agent 执行数据，按客户自定义的脱敏和导出策略处理，并生成厂商可用的支持包及实例群级健康信号
  whyNowCatalyst: >-
    Tsuga 的市场牵引力表明：因为 AI 追踪既高度敏感又体量庞大，企业已开始坚持要求 AI 可观测性留在云内——传统 SaaS 可观测性模式已不适用。
  ventureScalePath: >-
    从 P1 支持和发版调试工作流起步，再扩展至私有部署 SLA 证明、升级验证、实例群基准测试、按用量计费证据，最终成为所有 BYOC AI 软件厂商的远程运维控制平面。
solution: >-
  产品在客户租户内（即 AI 厂商已部署应用的地方）部署轻量级采集器和策略引擎。它在本地记录完整的 Agent 追踪、prompt 溯源、置信度分数和调用图，再自动生成脱敏后的故障包、回归差异和基准快照，供厂商集中访问。客户控制哪些字段可以离开账号、证据保留多久，以及是否允许导出回放产物。厂商无需要求客户开放广泛的可观测性访问权限，即可获得跨租户实例群健康状况、发布质量对比，并大幅加快故障处理速度。
goToMarketSeed:
  firstCustomer: >-
    在银行、保险或出版领域拥有 5 至 20 个在线 BYOC 租户的 B 轮 AI 软件厂商，配有 3 至 8 人的可靠性团队，且每周都会产生当前依赖客户手动拉取日志的生产升级处理
  buyingTrigger: 最近赢得或续约的一笔企业订单要求私有云部署，由此产生的支持升级处理量超出厂商手动处理能力
  currentAlternative: 临时性的 SSH 和日志拉取流程、客户自建的 Datadog 或 Grafana 看板，以及由解决方案工程师维护的一次性支持脚本
  switchingReason: >-
    中继在不强迫将原始 prompt 或追踪数据移出租户的前提下压缩 MTTR，同时为厂商提供跨所有私有部署的集中视图——这是手动流程和客户自建看板无法实现的。
  pricingHypothesis: 按每个在线 BYOC 租户每月计费，高级层级基于保留追踪天数、受保护环境数量及分析的 Agent 运行次数
whyNow:
  - point: AI 遥测数据量正在让传统按字节计费的可观测性定价对 Agent 工作负载在结构上失去经济可行性。
    signalRefs: [AI Agent 遥测经济已失效]
    sourceRefs: [1]
  - point: 企业买家现在要求遥测数据和 prompt 留在自有云账号内，为厂商制造了新的工具空白。
    signalRefs: [企业买家要求可观测性留在客户云内]
    sourceRefs: [1, 2]
  - point: 调试现代 Agent 需要 prompt 级追踪、置信度分数和调用图，而不只是日志和指标。
    signalRefs: [Prompt 级追踪已成刚需]
    sourceRefs: [2]
  - point: 具名客户和六位数合同证明高端 BYOC AI 可靠性基础设施已有真实预算。
    signalRefs: [高端 BYOC 工具已有真实预算, 品类加速形成]
    sourceRefs: [2, 3]
differentiator: >-
  传统可观测性厂商希望客户购买另一套后端；这家初创公司卖给厂商的是专为隔离客户云部署实例群打造的、以支持为核心的中继。核心 IP 是策略感知的证据打包能力：完整追踪留在本地，只有经过批准的摘要、差异和脱敏产物才能离开租户。这使该产品在客户已有 Datadog、Grafana 或 CloudWatch 的情况下依然有价值——因为它解决的是厂商跨租户调试和发版支持问题，而不是替换客户的工具链。
conceptDiagram:
  title: BYOC 支持中继
  mermaid: |
    flowchart LR
      Buyer[BYOC AI vendor] --> Pain[Blind support inside customer clouds]
      Pain --> Product[In-tenant trace relay and policy engine]
      Product --> Outcome[Faster MTTR with safe cross-tenant insight]
businessModelCanvas:
  customerSegments:
    - 向受监管企业销售 BYOC 部署的 A 轮至 C 轮 AI 软件厂商
    - 为私有云客户租户提供支持的平台和可靠性团队
  valuePropositions:
    - 无需外传原始数据即可调试私有云 AI 故障
    - 在保护客户控制权的前提下，为厂商提供跨租户实例群视图
    - 降低支持压力，推动 BYOC 产品的企业续约
  channels:
    - 创始人直接向 AI 厂商的 CTO 和工程副总裁主导销售
    - 与云部署咨询公司和参考架构合作伙伴建立合作
    - 通过现有 BYOC 企业账号的客户成功团队引荐
  customerRelationships:
    - 高触达式实施，包含共同安全审查
    - 与发版质量和 MTTR 挂钩的持续可靠性评审
  revenueStreams:
    - 按在线 BYOC 租户数订阅
    - 高级分析和数据保留层级
    - 企业入驻及安全审查服务
  keyResources:
    - 租户内采集器和策略引擎
    - 跨租户实例群分析后端
    - 安全与合规参考架构
  keyActivities:
    - 为 Agent 框架和云运行时构建连接器
    - 维护脱敏、导出策略和证据打包逻辑
    - 运营实例群健康分析和发版差异工作流
  keyPartners:
    - AWS 及私有云部署合作伙伴
    - 拥有 BYOC 部署的 AI 应用厂商
    - 服务受监管企业的系统集成商
  costStructure:
    - 中央分析平台的云基础设施
    - 部署工程和客户支持
    - 安全、合规及连接器维护
jobsToBeDone:
  - job: 当 BYOC 客户报告 Agent 故障时，帮助厂商可靠性负责人在不违反客户数据边界规则的前提下收集可用证据，从而快速处理故障。
    currentAlternative: 通过支持工单和共享看板协调的手动日志导出
    successMetric: 获得首个可操作根因包的时间，以及 Sev-1 故障的 MTTR
  - job: 当厂商向隔离的客户租户推送新版 Agent 时，帮助平台团队安全地对比行为，在续约或升级处理发生前捕获回归。
    currentAlternative: 来自客户看板的有限采样数据和临时发版电子表格
    successMetric: 回归检测率及客户上报发版故障的减少量
