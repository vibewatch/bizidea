topRisks:
- name: OEM 功能蚕食
  description: 施工设备厂商可能把自己的安全看板越做越全，并主张承包商不需要独立中间层。
  mitigation: 先盯住跨厂商的承包商客户——他们需要中立的审批流程，也要能横向比较多种机型和 OEM。
- name: 早期预算归属不清
  description: 安全、运营和创新团队都可能关心这件事，但早期谁都不一定单独握着软件预算。
  mitigation: 卡在试点扩容节点切进去——这时自主化 capex 已经批了，再把定价和更快上线、更低工地延误成本绑在一起。
- name: 部署过重、服务化过头
  description: 早期客户可能会要求大量定制工地配置和事故复盘，最后把公司做成咨询项目。
  mitigation: 把滩头市场收窄到可复制的光伏工地流程，从前几次 rollout 开始就把遥测适配器、审批模板和规则库产品化。
