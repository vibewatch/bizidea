problem: 公用事业级光伏承包商现在已经能试点自主打桩机和土方设备，但他们仍然拿不出一套可信办法，证明这些机器在活跃工地里靠近混编人类班组时依旧安全。班组布局、材料堆场、车流路径和可视条件每天都在变，OEM 自带的安全功能和静态隔离区抓不住这些边缘情况。结果就是自主化 rollout 更慢、安全缓冲做得过大，现场负责人也说不清一台机器到底在什么条件下才算足够安全、能挨着人干活。
targetUser:
  primary: 在多个活跃工地部署自主打桩或开沟设备的公用事业级光伏 EPC 的安全负责人和施工技术负责人
  secondary: 在自主设备项目上负责日常人机混编作业规划的工地总监和 EHS 经理
  buyer: 大型光伏自营施工承包商里的 EHS、副总裁、施工运营负责人或现场技术负责人
startupThesis:
  nonObviousInsight: 施工自主化的护城河，正在从“机器能不能自己干活”转向“在人机混编、真实又混乱的现场里，能不能拿出足够证据证明人和机器能安全共处”。变化点在于：像 Built 这样的车队已经产出了足够多的现场数据，可以建模边缘案例；同时，设备开始从单一机器人扩到多种机型，临时拼凑的现场安全流程已经脆到撑不起规模化。
  beachhead: 北美公用事业级光伏 EPC 和自营土建承包商——这些公司同时运营 5-20 个活跃工地，并在评估让自主打桩、开沟或物料搬运设备与人工班组并行作业。
  wedge: 一套人机混编自主作业安全 OS，吃进机器感知日志、工地图纸、作业计划和未遂事故复盘，为每个活跃工地定义当天的作业边界、人员风险区、停机条件和部署审批证据。
  whyNowCatalyst: Built 和 Penn 围绕边缘案例数据展开合作，说明这个赛道的瓶颈已经从“证明机器人能干这个活”转成“证明它能在真实施工现场里围着人安全运转”。
  ventureScalePath: 先从公用事业级光伏工地切入，再扩到道路施工、土方、矿区周边施工，以及更大范围的自主重型设备混编车队，成为户外自主化的人机安全流程和证据层。
solution: 混编人机作业安全 OS 夹在机器 OEM 遥测之上、现场运营之下。它把自主设备的感知事件、工地边界、班组安排、交通路线和主管观察拼成一套工地专属安全案例，并且随着现场条件变化按天刷新。产品会标出哪些区域的可视性、遮挡或人员行为风险已经超过批准阈值，给出更紧或更松的作业边界建议，并为 EHS 和工地管理层产出经得起审计、可直接交班使用的审批结果。未遂事故复盘流程会把每一次停机、人工接管或识别失败都沉淀成结构化训练数据，并推动跨工地的作业规则更新。时间一长，公司会积累出户外施工场景里最深的人机混编自主作业数据集。
goToMarketSeed:
  firstCustomer: 北美前 20 的公用事业级光伏自营施工承包商：同时运行多个工地，并正把来自一个或多个厂商的第一批 3-10 台自主打桩或开沟设备推向现场。
  buyingTrigger: 当承包商准备把孤立试点扩到真正的人机混编生产作业，EHS 负责人必须先签字确认作业规则，更多机器或工地才能上线。
  currentAlternative: OEM 自带安全功能、人工瞭望员、静态隔离区、纸质 JHA、电控遥测看板，以及工地主管的个人判断。
  switchingReason: 这个切口能把杂乱的现场事件沉淀成可审计的日度审批和可复用的安全规则，而且不绑任何单一机器厂商；承包商因此能缩小一刀切隔离区，更快放开自主化。
  pricingHypothesis: 按活跃自主工地或机器车队收取年订阅费，另外为遥测适配器、工地图层配置和安全规则校准收实施费。
whyNow:
- point: 现场数据量已经不再是瓶颈——50,000+ 小时运行和 40+ 个活跃工地说明，自主施工已经积累出足够多的真实世界证据，可以支撑一层安全运营软件。
  signalRefs:
  - 施工安全实时数据终于大到能做基准了
  sourceRefs:
  - 1
- point: 这个赛道最难却还没解掉的问题，已经变成遮挡、异常体态这类工人边缘案例；相比再做一个任务型自主 demo，人机混编安全软件更急。
  signalRefs:
  - 真正难的是人机混编的边缘案例
  sourceRefs:
  - 1
- point: 学界和产业方已经明确把重点放在补上“受控验证”和“真实工况稳健性”之间的差距，这给现场治理软件打开了清晰的预算窗口和可信度窗口。
  signalRefs:
  - 只在受控环境里验证，已经不够支撑上线
  sourceRefs:
  - 2
- point: 安全正在被定义成行业标准层，数据管线也会从单一机型扩到更多设备，所以买家很快就需要一套能覆盖同一工地多种自主车辆的统一流程。
  signalRefs:
  - 安全正在变成跨厂商的行业层
  - 施工自主化正从单一机型扩到多种设备
  sourceRefs:
  - 2
  - 3
differentiator: OEM 可以把感知模型和急停逻辑做进机器里，但承包商仍然需要一层中立的运营系统，来决定机器该在什么地方、什么时间、什么条件下，靠近人工班组运转。差异化不只是“看见人”，而是把跨工地的未遂事故证据、作业计划上下文和厂商无关的遥测数据，变成每天的作业边界和签批流程。真正的防御性来自一个谁都单独看不到的专有数据集：人机混编的边缘案例、工地级政策结果，以及它们之间的映射。
