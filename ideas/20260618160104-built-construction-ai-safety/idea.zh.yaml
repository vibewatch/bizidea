jobsToBeDone:
- job: 当我们把自主打桩或开沟设备从试点区扩到真正的活跃工地时，帮 EHS 和现场负责人判断每个班次的安全作业边界，这样我们既能提高机器利用率，也不会把工人暴露在说不清的风险里。
  currentAlternative: 人工瞭望员、静态隔离区、OEM 看板和纸质班前安全会
  successMetric: 获批进入人机混编作业的班次数占比，以及因安全原因导致的机器停工下降幅度
- job: 当出现未遂事故、停机事件或识别失败时，帮运营团队把它沉淀成可复用的现场规则和证据，让下一个工地不必从头再踩一遍同样的坑。
  currentAlternative: 主管复盘、电子表格记录，以及临时找厂商升级
  successMetric: 从事故复盘到新规则上线的时间，以及跨工地重复边缘事件的下降幅度
