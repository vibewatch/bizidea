- point: Teleo’s Tomahawk case shows contractors want autonomy options and value one operator managing several machines.
  sourceRefs:
  - 21
openQuestions:
- 'Which function signs the contract first in practice: EHS, construction operations, or innovation/technology?'
- Will insurers accept narrower exclusion zones if approvals are software-generated but auditable?
- How much of the required telemetry is available by API across OEMs versus trapped inside proprietary machine stacks?
- How transferable are mixed-crew rules across solar, roadbuilding, quarry, and mining-adjacent environments?
