  validationPlan:
  - priority: high
    question: Who actually owns the budget when a solar EPC expands from isolated robot pilots to mixed-crew production work?
    evidenceToGather: Run 10 customer interviews with VP EHS, construction ops, and field-tech leaders at top solar EPCs; collect one real buying committee map and budget source per account.
  - priority: high
    question: Can the product measurably reduce blanket exclusion zones or safety-related stoppages without increasing incident exposure?
    evidenceToGather: Pilot on two sites and compare shift approvals, stop events, override frequency, and near-miss recurrence before and after rule-driven operating envelopes.
  - priority: medium
    question: Which machine and workflow integrations are table stakes for launch?
    evidenceToGather: Collect actual event schemas and export paths from at least one Built-style OEM stack, one Teleo-style retrofit stack, and one incumbent workflow system such as Procore or HammerTech.
