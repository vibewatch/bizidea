competitors:
- name: Built Robotics
  stage: scale-up
  wedge: OEM-style autonomy and solar piling platform with field-proven safety positioning
  pricing: Custom enterprise / project pricing; not publicly listed
  strength: Best current solar-specific field dataset and direct control over machine behavior on live jobsites.
  weaknessVsUs: Vendor-tied stack; not a neutral approval layer spanning multiple machine vendors or customer-owned workflows.
  sourceRefs:
  - 1
  - 2
  - 4
  - 40
- name: Teleo
  stage: scale-up
  wedge: Supervised-autonomy retrofit that lets one operator control multiple heavy machines remotely
  pricing: Custom enterprise pricing; not publicly listed
  strength: Strong operational story around labor leverage and remote control of legacy equipment.
  weaknessVsUs: Optimizes machine operation, not site-wide mixed-crew safety cases, permits, and daily operating envelopes.
  sourceRefs:
  - 21
  - 39
- name: Pronto
  stage: scale-up
  wedge: OEM-agnostic off-road autonomy with layered safety and post-SafeAI multi-sensor capabilities
  pricing: Custom enterprise pricing; not publicly listed
  strength: Credible safety-focused autonomy stack and consolidation momentum in off-road autonomy.
  weaknessVsUs: More quarry/mining-centric today and still centered on vehicle autonomy rather than contractor-side governance workflows.
  sourceRefs:
  - 25
  - 27
- name: Procore
  stage: incumbent
  wedge: Construction observation and incident workflow inside an existing project-management footprint
  pricing: Enterprise SaaS; custom pricing
  strength: Already present in contractor workflows and familiar to safety teams.
  weaknessVsUs: Lacks native autonomy telemetry, perception-event analysis, and mixed-crew operating-rule logic.
  sourceRefs:
  - 28
- name: Intenseye
  stage: scale-up
  wedge: Real-time AI safety monitoring and serious-risk detection from camera infrastructure
  pricing: Custom enterprise pricing
  strength: Modern AI posture around real-time safety signals rather than lagging paperwork.
  weaknessVsUs: Not designed as the site-approval system for autonomous heavy-equipment fleets and machine-specific stop conditions.
  sourceRefs:
  - 35
regulatoryTechnicalConstraints:
- point: OSHA has no robotics-specific standard for construction, so employers still must prove safe operations via general provisions, hazard analysis, and recognized controls.
  sourceRefs:
  - 10
  - 13
  - 14
  - 15
- point: Struck-by risk remains a top construction hazard, so any mixed-crew product must show strong personnel detection, geofence enforcement, and stop logic.
  sourceRefs:
  - 12
  - 16
- point: Autonomy standards for off-road equipment are still being coordinated through AEM-led processes rather than through one settled procurement checklist.
  sourceRefs:
  - 18
