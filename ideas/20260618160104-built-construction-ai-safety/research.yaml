market:
  tam:
    value: $64.0M
    rationale: 'Bottom-up beachhead TAM: conservative 32 GW of annual solar additions (EIA says solar is more than half of 64 GW planned new U.S. 2025 capacity) divided by Built’s observed ~75 MW/site equivalent from 3 GW across 40+ sites, then multiplied by an estimated $150k software fee per active site-year: 32,000 MW / 75 x $150k ≈ $64M.'
    isEstimate: true
    sourceRefs:
    - 1
    - 8
  sam:
    value: $12.0M
    rationale: 'Beachhead SAM assumes the first realistic target set is ~20 large North American solar EPC/self-perform contractors, each averaging four autonomy-ready active sites in a year, at the same $150k per site-year software fee: 20 x 4 x $150k = $12M.'
    isEstimate: true
    sourceRefs:
    - 21
    - 37
    - 38
  som:
    value: $1.5M
    rationale: 'A credible year-3 SOM is 10 active sites under contract at ~$150k per site-year, reached through 2-3 design-partner EPCs expanding from pilots to fleet programs: 10 x $150k = $1.5M.'
    isEstimate: true
    sourceRefs:
    - 21
    - 37
    - 38
