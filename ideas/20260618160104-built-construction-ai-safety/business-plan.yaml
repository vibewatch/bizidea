slug: mixed-crew-autonomy-safety
date: '2026-06-18'
executiveSummary: >-
  Utility-scale solar contractors are starting to move autonomous piling, trenching, and material-handling machines from isolated pilots into active mixed-crew production work, but they still lack a neutral way to prove when those machines can safely operate near people. The first customer is a large North American solar EPC or self-perform civil contractor running multiple active sites and deploying its first 3-10 autonomous machines across one or more vendors. The product should start as a mixed-crew autonomy safety OS that ingests machine events, site maps, work plans, permits, and near-miss reviews to generate auditable daily operating envelopes, stop conditions, and shift approvals. Go-to-market should center on the pilot-expansion moment when a VP of EHS or construction operations must sign off before more machines or sites go live, because that is when pain, budget urgency, and measurable ROI align. The pricing and implementation model should stay tightly linked to that workflow: a paid first-site deployment plus annual per-site software priced against avoided stoppages, narrower blanket exclusion zones, and faster rollout of approved mixed-crew shifts. The near-term market is real but modest, with research supporting roughly $12.0M SAM and $1.5M year-3 SOM in the solar beachhead, so disciplined expansion into broader outdoor autonomy is required for venture scale. The main execution risks are unclear budget ownership, OEM feature creep, and services-heavy deployments that prevent software margins from emerging. Research also leaves three material gaps to close early: named buyer proof, insurer acceptance of software-backed approvals, and practical cross-OEM telemetry access.
problem:
  - Solar EPCs expanding from isolated robot pilots to active mixed-crew work cannot defend daily human-machine operating rules with OEM dashboards, paper JHAs, static exclusion zones, and supervisor judgment alone.
  - Safety-related stoppages, oversized buffers, and inconsistent near-miss learning slow autonomy rollout across sites and vendors, even when the underlying machines can perform the task.
solution:
  - Build a contractor-side safety OS that combines perception events, machine stop and override logs, site boundaries, crew plans, and permit workflows into a daily mixed-crew operating envelope for each active site.
  - Generate auditable shift approvals, near-miss reviews, and reusable rule updates so EHS and field leaders can expand autonomy with evidence instead of blanket exclusion zones.
whyWeWin:
  - The wedge sits in the buyer-owned approval workflow above OEM control stacks and alongside incumbent EHS systems, which creates value precisely when customers run multiple sites, machine types, or vendors.
  - The defensible dataset is the linkage between site context, edge-case detections, approved operating rules, and actual outcomes, not just raw telemetry or generic safety observations.
  - The product can complement Procore- or HammerTech-style workflows instead of asking contractors to replace existing safety administration systems during a live rollout.
strategicChoices:
  beachhead: North American utility-scale solar EPCs and self-perform civil contractors running 5-20 active sites and expanding autonomous piling, trenching, or material-movement machines into mixed-crew production work, with Texas as the best first geography.
  wedgeRationale: Daily mixed-crew shift approval is a narrower and more urgent entry point than generic construction safety analytics because it has a clear trigger, a small buying committee, and direct ROI in approved shifts, stoppage reduction, and rollout speed.
  sequencingRationale: Start with one repeatable solar workflow, one or two telemetry adapters, and one existing permit or observation integration so the company can prove decision usefulness before adding benchmarking, partner channels, and adjacent verticals; hiring should follow that order, with safety and integration depth before scaled sales.
  notYet:
    - Roadbuilding, quarry, mining-adjacent, or general civil workflows before the solar approval packet is repeatable across at least three contractor logos
    - Real-time machine control, autonomy-stack replacement, or OEM-specific perception features
    - Insurer underwriting, formal certification authority, or broad contractor EHS system-of-record ambitions
market:
  tam: $64.0M bottom-up beachhead TAM based on modeled annual U.S. utility-scale solar site-years and an estimated $150k software fee per active autonomous site-year.
  sam: $12.0M near-term SAM assuming roughly 20 large North American solar EPC or self-perform contractors averaging four autonomy-ready active sites per year.
  som: $1.5M credible year-3 SOM based on 10 active sites under contract across 2-3 design-partner EPCs at roughly $150k per site-year.
  segments:
    - Large North American utility-scale solar EPCs and self-perform contractors deploying autonomous heavy equipment on active sites
    - Large civil contractors adopting mixed fleets of autonomous outdoor equipment after the solar workflow is proven
  buyingProcess: The sale starts when an active pilot expands into mixed-crew production work and leadership needs auditable signoff before more machines or sites go live. The economic buyer is most likely the VP of EHS or construction operations, with field technology leaders, site superintendents, and safety managers shaping requirements and adoption.
product:
  mvp: Build one end-to-end solar-site workflow that ingests exported or API-fed machine events, site layout, crew plans, and existing permit or observation data, then produces a supervisor-reviewable operating envelope and shift approval packet. The MVP should prove one live site's approval decision, not attempt to be a generic construction autonomy platform.
  sixMonth: Land 2-3 design partners, ship one OEM or retrofit-autonomy adapter plus one EHS workflow integration, and deliver human-reviewed daily approval packets that change at least one real deployment decision.
  twelveMonth: Convert the first approval workflow into a subscription product with audit trails, reusable rule libraries, multi-site dashboards, and benchmark reporting on stoppages, overrides, and recurring edge cases.
  twentyFourMonth: Expand from solar-site approvals into multi-machine, multi-site governance for broader outdoor autonomy programs while staying contractor-side and avoiding direct machine-control scope.
  keyBets:
    - Contractors will fund the product from autonomy-expansion or safety-digitization budgets before a standalone category budget exists.
    - Exported event logs plus a small number of high-value integrations are enough to create a useful MVP before deep cross-OEM API coverage exists.
    - Customers will pay recurring software to narrow blanket exclusion zones and reduce safety-related stoppages rather than only buying one-off safety consulting.
    - The same mixed-crew approval logic will transfer from solar into adjacent outdoor autonomy workflows once the first dataset is proven.
gtm:
  wedge: Sell a paid first-site deployment to a top-tier solar EPC that is moving from an isolated robot pilot into active mixed-crew production and needs an auditable approval workflow before rolling autonomy to more shifts, machines, or sites.
  channels:
    - Founder-led direct sales to VP EHS, VP construction operations, and field-technology leaders at large solar EPCs
    - OEM and retrofit-autonomy referrals where the product remains contractually contractor-side and vendor-neutral
    - Integration-led expansion through existing safety workflow platforms and implementation partners
  funnelTargets: "Qualified ICP meetings to paid design partner 20-30%, paid design partner to annual subscription 50%+, first-site subscription to multi-site expansion 60%+ within 12 months"
  pricing: Paid implementation plus annual subscription priced per active autonomous site-year, targeting roughly $150k per live site-year with first contracts structured as $75k-$125k for one-site deployment and calibration, converting to $150k-$300k annual recurring revenue once 1-2 active sites run the approval workflow continuously.
businessModel:
  revenueStreams:
    - Annual subscription per active autonomous site-year
    - Implementation fees for telemetry adapters, site-map setup, and rule calibration
    - Premium benchmark, reporting, and multi-site governance modules for fleet customers
  unitOfValue: Active autonomous site-year under mixed-crew governance
  targetGrossMarginPct: 70
  expansionLevers:
    - More active sites per contractor
    - More machine types and vendor integrations within the same enterprise account
    - Benchmarking and governance modules for multi-site fleet programs
    - Expansion into adjacent outdoor autonomy categories after the solar beachhead
strategyMap:
  northStarMetric: Active mixed-crew site-shifts approved through the platform without a repeat severe safety event
  inputMetrics:
    - Paid design partners signed per half-year
    - Percentage of mixed-crew shifts approved versus baseline
    - Safety-related machine stoppages per active site
    - Time from near-miss review to updated operating rule
    - First-site subscription to multi-site expansion rate
    - Share of active sites covered by normalized telemetry adapters
  moatsToBuild:
    - Cross-site dataset linking edge cases, site context, approved rules, and operating outcomes
    - Buyer-trusted approval packet and rule-library format that fits existing construction safety workflows
    - Integration layer spanning OEM telemetry, permits, observations, and site maps across mixed fleets
  killCriteria:
    - Fewer than 2 paid design partners sign within 9 months
    - No pilot shows at least a 15% improvement in approved mixed-crew shifts or a 20% reduction in safety-related stoppages within 6 months
    - Less than 50% of paid first-site deployments convert to annual subscriptions after one completed approval cycle
  mermaid: |
    flowchart LR
      Wedge[Mixed-crew solar approval wedge] --> MVP[First-site approval packet MVP]
      MVP --> Proof[Approved shifts and fewer stoppages]
      Proof --> Expansion[Multi-site fleet governance]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong workflow clarity and real safety pain, but budget ownership and market breadth are not yet proven enough for high-conviction underwriting.
    whyBelieve: The company targets the exact approval bottleneck that appears when construction autonomy leaves isolated pilots and must coexist with human crews on active sites.
    whyDoubt: The solar beachhead is narrow and buyers can still stitch together OEM dashboards, human spotters, and incumbent EHS software until a neutral layer proves hard ROI.
    nextDiligence: Secure two paid design partners, prove one converts to annual software, and show measurable reduction in stoppages or blanket exclusion zones without worse near-miss recurrence.
  firstCustomer:
    title: VP EHS at a multi-site utility-scale solar EPC
    profile: A top-20 North American self-perform solar contractor running multiple active sites, deploying its first 3-10 autonomous machines, and already using digital permit or observation workflows.
    trigger: Expansion from an isolated autonomy pilot into active mixed-crew production where EHS must approve daily operating rules before more machines or sites go live.
    buyer: VP of EHS or VP of construction operations
    initialContract: $75k-$125k paid first-site deployment with telemetry and workflow setup, converting to $150k-$300k annual recurring revenue for 1-2 active sites and then fleet agreements as additional sites adopt the approval workflow.
  mustBeTrue:
    - At least 5 of the first 10 ICP interviews confirm mixed-crew approval is a budgeted problem this year, not just a future concern.
    - At least 2 design partners can provide enough machine-event and safety-workflow data to automate a useful first approval packet.
    - One live pilot demonstrates at least a 15% increase in approved mixed-crew shifts or a 20% reduction in safety-related stoppages without higher near-miss recurrence.
    - At least 50% of paid first-site deployments convert to annual subscriptions within 6 months of go-live.
    - At least one customer running multiple machine types or vendors says contractor-side neutrality matters more than buying another OEM dashboard.
  diligenceQuestions:
    - Which function actually owns budget at pilot expansion: EHS, construction operations, or field technology?
    - How much of the required telemetry is accessible by API or export across the first two target machine stacks?
    - Will insurers or risk advisors treat the approval packet as credible decision support for narrower exclusion zones?
    - Why will Procore, HammerTech, or the leading OEMs not absorb this workflow once demand is proven?
    - How many autonomy-ready solar EPC accounts can realistically buy in the next 24 months before the company must expand beyond solar?
operatingAssumptions:
  - assumption: The first repeatable buyer is a large North American solar EPC or self-perform contractor expanding autonomy across multiple active sites.
    basis: research.yaml
    validationTest: Interview 15 target accounts and verify that at least 5 have a live or imminent mixed-crew rollout decision within two quarters.
    decisionImpact: If false, narrow to one OEM ecosystem or broaden earlier into adjacent heavy-equipment verticals.
  - assumption: The product can command roughly $150k per active site-year because it is funded from autonomy-expansion or enterprise safety-digitization budgets.
    basis: research.yaml
    validationTest: In the first 5 proposals, record the funding line, economic buyer, and willingness to pay for both the first-site deployment and recurring subscription.
    decisionImpact: If false, pricing must move downmarket, attach to partner channels, or rely more heavily on services.
  - assumption: Exported event logs plus one or two initial integrations are enough to produce a decision-useful approval packet.
    basis: idea.yaml
    validationTest: Build one manual-plus-software pilot using machine events, site maps, permits, and near-miss reviews, then confirm the customer uses it in a real approval meeting.
    decisionImpact: If false, the roadmap must prioritize deep OEM integrations before sales can scale.
  - assumption: EHS leaders will trust a software-backed recommendation if every rule is auditable against existing permits, hazards, and near-miss records.
    basis: operator judgment
    validationTest: Run approval reviews with at least 3 design-partner stakeholder groups and measure whether they accept, modify, or reject the platform's proposed operating envelope.
    decisionImpact: If false, the product should remain a human-reviewed workflow tool rather than claiming automated decision support.
  - assumption: The same approval workflow will expand into roadbuilding, quarry, or mining-adjacent autonomy once solar proof exists.
    basis: research.yaml
    validationTest: By month 12, validate at least 5 non-solar accounts with similar mixed-crew approval pain and comparable data availability.
    decisionImpact: If false, the company should operate as a focused niche software business and reduce venture-scale funding expectations.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview VP EHS, operations, and field-technology leaders at 15 large solar EPC or self-perform contractor accounts.
    hypothesis: The pilot-expansion approval moment is urgent enough to fund paid software this year.
    successMetric: 5+ accounts confirm a live or imminent mixed-crew rollout decision and willingness to evaluate a paid first-site deployment.
    owner: CEO/founder
  - horizon: 0–90 days
    experiment: Build a manual first approval packet for one design partner using exported machine events, site maps, permits, and near-miss reviews.
    hypothesis: A useful first operating-envelope recommendation can be produced before deep API coverage exists.
    successMetric: Customer uses the packet in a real shift or rollout review and requests a second review cycle.
    owner: Founding product lead
  - horizon: 90–180 days
    experiment: Ship one OEM or retrofit-autonomy adapter and one permit or observation integration for the first paid deployment.
    hypothesis: Limited but structured integrations are enough to make the workflow repeatable across similar solar sites.
    successMetric: One customer runs daily approvals through the product for at least 30 consecutive active shifts.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Compare approved mixed-crew shifts, stoppages, overrides, and near-miss recurrence on two sites before and after rule-driven operating envelopes.
    hypothesis: The product can create measurable operational improvement without weakening safety outcomes.
    successMetric: At least one site shows a 15% gain in approved shifts or a 20% reduction in safety-related stoppages with no worse near-miss recurrence.
    owner: Safety workflow lead
  - horizon: 180–365 days
    experiment: Convert 2-3 paid first-site deployments into annual multi-site subscriptions with reusable rule libraries.
    hypothesis: The workflow is recurring software, not just launch consulting.
    successMetric: 50%+ of paid deployments convert and at least one customer expands to a second site.
    owner: CEO/founder
  - horizon: 180–365 days
    experiment: Run one channel test with an autonomy OEM or workflow partner while preserving contractor-side neutrality.
    hypothesis: Partner-sourced pipeline can accelerate access without turning the product into a white-labeled OEM feature.
    successMetric: 2 qualified opportunities sourced through partners and no requirement to cede customer ownership or neutral reporting.
    owner: CEO/founder
operations:
  - Standardize ingestion of machine stop, override, person-detection, and geofence events into a normalized event schema.
  - Embed approvals into existing permit, pre-task, and observation workflows so site teams do not adopt a parallel safety process.
  - Maintain auditable records of every recommended operating envelope, human override, and resulting near-miss review.
  - Define clear product boundaries that keep the company in decision-support and governance rather than formal certification or machine control.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Needed immediately to build telemetry ingestion, rule logic, audit trails, and the first approval workflow.
  - role: Founder-led sales / CEO
    startTiming: Month 0
    rationale: Early deals require direct customer discovery, buying-committee mapping, and careful positioning against OEMs and incumbent EHS tools.
  - role: Safety workflow lead
    startTiming: Month 2
    rationale: Converts OSHA-style hazard logic, site procedures, and near-miss patterns into credible operating-envelope rules and review workflows.
  - role: Integration engineer
    startTiming: Month 6
    rationale: Required once design partners prove the wedge and more telemetry and workflow connectors become the bottleneck.
  - role: Customer deployment lead
    startTiming: Month 9
    rationale: Supports repeatable onboarding, review cadence, and multi-site rollout without letting implementations become open-ended consulting projects.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2-3 paid design partners in the solar beachhead.
      - Ship MVP approval packets, one telemetry adapter, and one permit or observation integration.
      - Prove at least one measurable improvement in approved shifts or stoppage reduction on a live site.
      - Convert at least one paid first-site deployment into annual subscription revenue.
  - horizon: 12–24 months
    items:
      - Expand at least one customer from one site to two or more active sites.
      - Launch reusable rule libraries, multi-site dashboards, and benchmark reporting.
      - Support mixed fleets spanning at least two machine types or vendors within one enterprise account.
      - Validate 3-5 adjacent non-solar accounts for the next beachhead.
  - horizon: 24–36 months
    items:
      - Reach 10 active sites under contract across 2-3 enterprise customers.
      - Establish the product as the default contractor-side governance layer for one adjacent outdoor autonomy vertical.
      - Add partner-ready reporting for insurers, safety advisors, or owner oversight without taking certification liability.
risks:
  - risk: Budget ownership remains ambiguous across EHS, operations, and innovation teams.
    likelihood: High
    impact: High
    mitigation: Sell into live pilot-expansion decisions, map the buying committee early, and package pricing against avoided delays and approved-site expansion rather than generic safety software value.
  - risk: OEMs extend their dashboards and claim they already cover mixed-crew safety.
    likelihood: Medium
    impact: High
    mitigation: Focus on contractor-side neutrality, multi-vendor workflows, and integrations with incumbent permit and observation systems that OEM tools do not own.
  - risk: Early deployments become consulting-heavy and suppress software gross margins.
    likelihood: High
    impact: Medium
    mitigation: Restrict the first beachhead to repeatable solar workflows, standardize adapters and rule templates, and hire deployment talent only after the core workflow is productized.
  - risk: Insurers or legal teams reject software-backed approvals as insufficient for changing exclusion zones.
    likelihood: Medium
    impact: High
    mitigation: Keep human signoff in the loop, anchor outputs in auditable hazard controls, and involve risk advisors in early packet reviews.
  - risk: Solar robotics adoption stays pilot-scale longer than expected.
    likelihood: Medium
    impact: High
    mitigation: Preserve a narrow solar wedge for proof, but validate adjacent outdoor autonomy segments by month 12 so expansion does not depend on one category's timing.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to secure 2-3 paid design partners, ship the first repeatable approval workflow with initial integrations, prove subscription conversion and measurable site-level ROI, and validate whether adjacent outdoor autonomy markets expand the beachhead into a venture-scale company.
