market:
  tam:
    value: $64.0M
    rationale: 自下而上的滩头 TAM：保守按年新增 32 GW 光伏计算（EIA 表示美国 2025 年计划新增 64 GW 里，太阳能占比过半），再用 Built 已观察到的“3 GW / 40+ 工地 ≈ 每工地 75 MW”等价值，乘以每个活跃工地年约 $150k 的软件费：32,000 MW / 75 x $150k ≈ $64M。
    isEstimate: true
    sourceRefs:
    - 1
    - 8
  sam:
    value: $12.0M
    rationale: 滩头 SAM 假设：首批现实可打的客户约为 20 家北美大型光伏 EPC / 自营施工承包商，每家每年平均 4 个具备自主化条件的活跃工地，软件费同样按每工地年 $150k 计：20 x 4 x $150k = $12M。
    isEstimate: true
    sourceRefs:
    - 21
    - 37
    - 38
  som:
    value: $1.5M
    rationale: 可信的第 3 年 SOM 是 10 个签约活跃工地，单价约 $150k / site-year；路径是 2-3 家共创 EPC 从试点逐步扩到车队项目：10 x $150k = $1.5M。
    isEstimate: true
    sourceRefs:
    - 21
    - 37
    - 38
