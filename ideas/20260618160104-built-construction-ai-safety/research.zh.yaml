  pricing: 企业 / 项目定制定价；未公开
  strength: 目前最强的光伏现场专属数据集之一，而且直接掌控 live 工地上的机器行为。
  weaknessVsUs: 栈与单一厂商深度绑定；不是覆盖多厂商、多工作流的中立审批层。
  sourceRefs:
  - 1
  - 2
  - 4
  - 40
- name: Teleo
  stage: scale-up
  wedge: 监督式自主改装方案，让一名操作员能远程同时控制多台重型设备
  pricing: 企业定制定价；未公开
  strength: 在劳动力杠杆和传统设备远程控制上，运营故事很强。
  weaknessVsUs: 优化的是机器运行，而不是全工地的人机混编安全案例、许可和日度作业边界。
  sourceRefs:
  - 21
  - 39
- name: Pronto
  stage: scale-up
  wedge: 厂商无关的越野自主化方案，带分层安全能力，并在收购 SafeAI 后具备更强多传感器能力
  pricing: 企业定制定价；未公开
  strength: 安全导向的自主化主栈可信，而且在越野自主化领域具备整合势能。
  weaknessVsUs: 今天更偏采石场 / 矿区场景，重心仍在车辆自主化，而不是承包商侧治理工作流。
  sourceRefs:
  - 25
  - 27
- name: Procore
  stage: incumbent
  wedge: 在既有项目管理版图里承接施工观察和事故工作流
  pricing: 企业 SaaS；定制定价
  strength: 已经深埋在承包商工作流里，安全团队也熟。
  weaknessVsUs: 缺少原生自主化遥测、感知事件分析和人机混编作业规则逻辑。
  sourceRefs:
  - 28
- name: Intenseye
  stage: scale-up
  wedge: 基于摄像头基础设施的实时 AI 安全监测和严重风险识别
  pricing: 企业定制定价
  strength: 相比事后文档，实时安全信号这一套 AI 叙事更现代。
  weaknessVsUs: 它不是为自主重型设备车队的工地审批系统设计的，也不理解机器专属停机条件。
  sourceRefs:
  - 35
regulatoryTechnicalConstraints:
- point: OSHA 没有针对施工机器人的专门标准，因此雇主仍需靠一般条款、危险源分析和认可控制手段来证明作业安全。
  sourceRefs:
  - 10
  - 13
  - 14
  - 15
- point: “struck-by” 仍是施工现场头部危险源，所以任何人机混编产品都必须证明：人员识别、geofence 执行和停机逻辑足够可靠。
  sourceRefs:
  - 12
  - 16
- point: 越野设备自主化标准仍在 AEM 主导的协调进程中，市场上还没有一份尘埃落定的采购清单。
  sourceRefs:
  - 18
  - 19
validationSignals:
- point: Built 和 Penn xLAB 已经明确把“人机混编边缘案例数据”定义成施工自主化的下一个瓶颈。
  sourceRefs:
  - 1
- point: Rosendin 正在 Texas 测试自主光伏板安装机器人，说明承包商愿意让机器人和现场班组并行作业。
  sourceRefs:
  - 37
- point: Mortenson 获 DOE 支持的光伏机器人试验表明，只要工作流收益清楚，大型承包商愿意试点与工人近距离协作的自动化。
  sourceRefs:
  - 38
- point: Teleo 在 Tomahawk 的案例说明，承包商确实想要自主化选项，也认可“一名操作员管多台机器”的价值。
  sourceRefs:
  - 21
openQuestions:
- 现实里最先签合同的到底是谁：EHS、施工运营，还是创新 / 技术团队？
- 如果审批是软件生成但可审计，保险方会接受缩小隔离区吗？
- 不同 OEM 里，所需遥测到底有多少能通过 API 拿到，又有多少被锁在私有机器栈里？
- 人机混编规则在光伏、道路施工、采石场和矿区周边场景之间，到底能迁移多少？
