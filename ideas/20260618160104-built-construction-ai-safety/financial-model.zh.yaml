modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Trigger[试点扩容触发] --> PaidDeployment[付费首站部署]\n  PaidDeployment --> RecurringSites[经常性活跃工地]\n  CACSpend[CAC 投入] --> PaidDeployment\n  RecurringSites --> Revenue[订阅收入]\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> EBITDA[EBITDA]\n  EBITDA --> Cash[期末现金]\n  Churn[流失与工地流失] --> RecurringSites\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的核心驱动力，是把经常性活跃工地从 Y1 的 2 个扩到 Q4Y3 的 10 个，每个工地对应约 $150K 的年化软件价值。
- checkName: 必须跑通的事
  finding: 首批付费部署必须先转成可复制的多工地订阅，公司才能在 6 人核心团队之外继续加人。
- checkName: 模型失效条件
  finding: 如果预算归属和保险方接受度迟迟解不开，销售周期会被拉长，规模化证明到来之前，下行情景会烧掉大部分剩余现金缓冲。
- checkName: 下一轮融资证明点
  finding: 一旦公司证明至少 1 个多工地客户扩张，并拿下约 6 个经常性 live 工地，同时还能说明光伏经验可以迁移到下一个户外自主化切口，就有机会讲出 seed-ready 的故事。
sanityChecks:
  ruleOf40: Y3 增长率 88.9% + EBITDA 利润率 -30.5% = 58.4%。
  burnMultiple: Y2 burn multiple 为 1.1x：约 $0.65M 的 burn 对应 $0.58M 的净新增收入；Y3 为 0.6x，因为收入增长已经快过剩余 burn。
  revenuePerFte: 按 Q4Y3 的 6 FTE 计算，Y3 的 revenue per FTE 为 $212,500（对标 B2B SaaS 常见区间约 $200K-$400K）。
  flags:
  - 基准情景只靠光伏就已经在 Q4Y3 跑到研究支持的 10 个工地 SOM，因此真正的 venture 上行仍取决于：能否证明这套工作流能迁移到相邻户外自主化垂直场景。
  - Y3 的 revenue per FTE 约 $213K，只到健康 SaaS 效率区间的下沿，说明 GTM 仍然偏部署驱动。
  - 基准 P&L 故意不计入付费实施收入，模型更保守；但反过来，短期现金回流也更依赖订阅启动时点，而不是服务回款。
  - 保险方和风险顾问的接受度仍未验证；如果软件支持的审批在现实里并不能缩小隔离区，流失率和销售周期大概率会一起变差。
