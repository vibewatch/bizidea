scenarios:
  downside:
    description: 预算归属依旧混乱，保险方建立信任更慢，企业级 rollout 卡在每个客户更少的工地数上。
    y3RevenueK: 1012.5
    y3EbitdaK: -676.0
    cashLowPointK: 335.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 只到 8，而不是 10，因为扩张平均晚了约两个季度。
    - 毛利率只能维持在约 65%，因为部署和遥测工作仍更依赖人工。
    - 客户在生产环境里缩小隔离区之前，还要多花一个季度做销售教育和评审。
  base:
    description: 公司把第一个工地打磨成可复制的光伏工作流，在 Y2 增加 1 个规模化 GTM 招聘，并在 Q4Y3 达到研究支持的 10 个工地 SOM。
    y3RevenueK: 1275.0
    y3EbitdaK: -389.0
    cashLowPointK: 622.3
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 达到 10，每个活跃工地的年化 ARPU 为 $150K。
    - 尽管早期 rollout 仍有服务辅助，毛利率依旧守住 70% 的 business-plan 目标。
    - 到 Q4Y3 仍把总人数压在 6 FTE，逼着公司先证明可复制性，再去招更广的扩张团队。
  upside:
    description: 共创客户扩得更快，benchmarking 报告更早挂上去，而光伏验证又把相邻户外自主化需求提前拉动。
    y3RevenueK: 1500.0
    y3EbitdaK: -237.0
    cashLowPointK: 774.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 达到 12 而不是 10，因为有 1 个 logo 更快扩到更多工地。
    - 毛利率改善到 72%，因为集成和规则模板的复用性更强。
    - 伙伴转介绍缩短了从“试点扩容触发”到“开始经常性订阅”的时间。
