slug: mixed-crew-autonomy-safety
date: '2026-06-18'
executiveSummary: 公用事业级光伏承包商正把自主打桩、开沟和物料搬运设备，从孤立试点推向真正的人机混编生产作业；但他们仍然缺一套中立机制，来证明这些机器到底何时能在有人作业的环境里安全运行。第一批客户应该是北美大型光伏 EPC 或自营土建承包商：同时运营多个活跃工地，并正把第一批 3-10 台自主设备接入一个或多个厂商体系。产品起步形态应该是一套混编人机作业安全 OS，接入机器事件、工地图层、作业计划、许可和未遂事故复盘，生成可审计的日度作业边界、停机条件和班次审批。GTM 要卡在试点扩容时刻：当 EHS 或施工运营副总裁必须签字，更多机器或工地才能上线，痛点、预算紧迫感和可量化 ROI 才真正对齐。定价和实施模型也要死扣这个工作流：先收一个付费首站部署费，再按工地收年化软件费，对标的是减少停工、缩小一刀切隔离区，以及更快放开获批的人机混编班次。短期市场真实存在，但体量不大——研究支持光伏滩头市场约 $12.0M 的 SAM、到第 3 年约 $1.5M 的 SOM，所以想做成 venture 级公司，必须有纪律地扩到更广的户外自主化场景。核心执行风险有三点：预算归属不清、OEM 功能蚕食，以及部署过重导致软件毛利出不来。研究还留下三个必须尽早补上的缺口：点名买家证明、保险方是否接受软件支持的审批，以及跨 OEM 遥测接入到底能不能落地。
problem:
- 光伏 EPC 把机器人从孤立试点扩到活跃工地的人机混编作业时，单靠 OEM 看板、纸质 JHA、静态隔离区和主管判断，已经撑不起每天的人机作业规则。
- 即便底层机器已经能把活干完，安全相关停工、过大的缓冲区，以及未遂事故经验无法在跨工地、跨厂商间复用，仍会拖慢自主化 rollout。
solution:
- 做一套站在承包商一侧的安全 OS，把感知事件、机器停机与人工接管日志、工地边界、班组计划和许可流程拼成每个活跃工地当天的人机混编作业边界。
- 产出可审计的班次审批、未遂事故复盘和可复用的规则更新，让 EHS 和现场负责人拿证据放开自主化，而不是继续靠一刀切隔离区。
whyWeWin:
- 切口卡在买家自己掌控的审批工作流：它位于 OEM 控制栈之上、现有 EHS 系统旁边。客户一旦同时跑多个工地、多种机型或多家厂商，这层价值就会冒出来。
- 真正能积累成壁垒的不是原始遥测，也不是泛泛的安全观察，而是工地上下文、边缘案例识别、批准过的作业规则和实际结果之间的对应关系。
- 产品可以补位 Procore、HammerTech 一类现有工作流，而不是在 live rollout 期间要求承包商把整个安全管理系统重来一遍。
strategicChoices:
  beachhead: 北美公用事业级光伏 EPC 和自营土建承包商——这些公司运营 5-20 个活跃工地，并正把自主打桩、开沟或物料搬运设备推向真正的人机混编生产作业；第一站最佳地域是 Texas。
  wedgeRationale: 相比泛化的施工安全分析，日度人机混编班次审批更窄也更急：触发条件清楚，采购委员会规模小，而且 ROI 能直接落到获批班次、停工下降和 rollout 速度上。
  sequencingRationale: 先把一个可复制的光伏工作流跑通，只做 1-2 个遥测适配器、1 个现有许可或观察集成；先证明这套决策真有用，再加 benchmarking、伙伴渠道和相邻垂直场景。招人顺序也该跟着这个节奏走：先补安全和集成深度，再谈规模化销售。
  notYet:
  - 在光伏审批包还没在至少 3 个承包商品牌上跑通之前，不碰道路施工、采石场、矿区周边或泛土建流程。
  - 不做实时机器控制、不替代自主化主栈，也不做 OEM 专属感知功能。
  - 不碰保险核保、正式认证职责，也不去做承包商全栈 EHS system of record。
market:
  tam: $64.0M 的自下而上滩头 TAM：按美国公用事业级光伏年化工地年数建模，再乘以每个活跃自主工地年约 $150k 的软件费。
  sam: $12.0M 的近端 SAM：假设约 20 家北美大型光伏 EPC 或自营施工承包商，每家每年平均有 4 个具备自主化条件的活跃工地。
  som: $1.5M 的可信第 3 年 SOM：2-3 家共创 EPC 旗下合计 10 个签约活跃工地，按每工地年约 $150k 计费。
  segments:
  - 在活跃工地部署自主重型设备的北美大型公用事业级光伏 EPC 和自营施工承包商
  - 在光伏工作流被验证后，开始采用多种户外自主设备车队的大型土建承包商
  buyingProcess: 销售起点是：一个活跃试点准备扩到真正的人机混编生产作业，管理层在更多机器或工地上线之前，需要一份可审计的签批。最可能的经济买家是 EHS 或施工运营副总裁；现场技术负责人、工地总监和安全经理则会共同定义需求并推动采纳。
product:
  mvp: 先把一个端到端的光伏工地工作流做透：接入导出的或 API 推送的机器事件、工地布局、班组计划和现有许可/观察数据，然后产出一份主管可复核的作业边界和班次审批包。MVP 要证明的是一个真实工地的审批决策，而不是一开始就做成通用施工自主平台。
  sixMonth: 拿下 2-3 家共创客户，上线 1 个 OEM 或改装自主方案适配器、1 个 EHS 工作流集成，并交付有人审阅的日度审批包，至少实打实改变一次部署决策。
  twelveMonth: 把第一条审批工作流做成年订阅产品：带审计轨迹、可复用规则库、多工地看板，以及围绕停工、人工接管和重复边缘案例的基准报告。
  twentyFourMonth: 从光伏工地审批扩到更广的户外自主项目，支持多机器、多工地治理，但始终站在承包商一侧，不碰直接机器控制。
  keyBets:
  - 在独立品类预算真正形成前，承包商仍愿意从自主化扩容预算或安全数字化预算里为这款产品买单。
  - 在深度跨 OEM API 覆盖还不存在之前，靠导出的事件日志和少量高价值集成，就足够做出有用的 MVP。
  - 客户愿意为缩小一刀切隔离区、减少安全停工而持续付软件费，而不只买一次性安全咨询。
  - 一旦首个数据集跑通，同样的人机混编审批逻辑就能从光伏迁移到相邻的户外自主化场景。
gtm:
  wedge: 卖给头部光伏 EPC 一个付费首站部署：客户正把机器人从孤立试点推向真正的人机混编生产，并且在把自主化扩到更多班次、机器或工地之前，需要一套可审计的审批流程。
  channels:
  - 创始人主导，直接卖给大型光伏 EPC 的 VP EHS、VP 施工运营和现场技术负责人
  - 来自 OEM 和改装自主方案厂商的转介绍，但合同关系必须保持承包商侧、厂商中立
  - 沿着现有安全工作流平台和实施伙伴做集成式扩张
  funnelTargets: 从合格 ICP 会议到付费共创客户 20-30%；从付费共创客户到年订阅 50%+；从首站订阅到多工地扩张在 12 个月内达到 60%+。
  pricing: 先收实施费，再按活跃自主工地年收年订阅费，目标约为每个 live site-year $150k。首批合同可做成 $75k-$125k 的单工地部署和校准费；一旦 1-2 个活跃工地持续跑审批流程，再转成 $150k-$300k 的年度经常性收入。
businessModel:
  revenueStreams:
  - 按活跃自主工地年收年订阅费
  - 遥测适配器、工地图层配置和规则校准的实施费
  - 面向车队客户的高级基准、报告和多工地治理模块
  unitOfValue: 处于人机混编治理下的活跃自主工地年
  targetGrossMarginPct: 70
  expansionLevers:
  - 单个承包商覆盖更多活跃工地
  - 在同一个企业账户里接入更多机型和厂商
  - 为多工地车队项目叠加 benchmarking 和治理模块
  - 在光伏滩头市场跑通后扩到相邻户外自主化品类
strategyMap:
  northStarMetric: 通过平台获批的人机混编工地班次数，而且没有重复出现严重安全事件
  inputMetrics:
  - 每半年签下的付费共创客户数
  - 与基线相比，获批进入人机混编作业的班次占比
  - 每个活跃工地的安全相关机器停工次数
  - 从未遂事故复盘到新作业规则上线的时间
  - 首站订阅扩到多工地的转化率
  - 被标准化遥测适配器覆盖的活跃工地占比
  moatsToBuild:
  - 把边缘案例、工地上下文、已批准规则和实际作业结果连起来的跨工地数据集
  - 能嵌入现有施工安全流程、并获得买家信任的审批包与规则库格式
  - 跨混编车队接通 OEM 遥测、许可、观察和工地图层的集成层
  killCriteria:
  - 9 个月内签不下至少 2 家付费共创客户
  - 6 个月内没有任何试点证明：获批班次提升至少 15%，或安全相关停工下降至少 20%
  - 完成一个审批周期后，付费首站部署转成年订阅的比例低于 50%
  mermaid: "flowchart LR\n  Wedge[光伏混编审批切口] --> MVP[首站审批包 MVP]\n  MVP --> Proof[获批班次更多、停工更少]\n  Proof --> Expansion[多工地车队治理]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流切口很清楚，安全痛点也真实，但预算归属和市场外延还没被证明到足以支撑高确信度下注。
    whyBelieve: 公司瞄准的正是施工自主化离开孤立试点、开始和人工班组在活跃工地共处时，最卡人的审批瓶颈。
    whyDoubt: 光伏滩头市场偏窄；在中立层拿出硬 ROI 之前，买家仍能把 OEM 看板、人工瞭望员和现有 EHS 软件拼成“够用”的替代方案。
    nextDiligence: 尽快拿下两家付费共创客户，证明至少一家能转成年化软件合同，并在不恶化未遂事故复发的前提下，实证停工下降或一刀切隔离区缩小。
  firstCustomer:
    title: 多工地公用事业级光伏 EPC 的 VP EHS
    profile: 北美前 20 的自营光伏承包商之一：同时运营多个活跃工地，部署第一批 3-10 台自主设备，并且已经在用数字化许可或观察流程。
    trigger: 自主化从孤立试点扩到真正的人机混编生产作业；在更多机器或工地上线前，EHS 必须先批准每日作业规则。
    buyer: VP of EHS 或 VP of construction operations
    initialContract: $75k-$125k 的付费首站部署，含遥测和工作流配置；随后转成 1-2 个活跃工地对应的 $150k-$300k 年度经常性收入，再随着更多工地接入审批流程，升级到车队协议。
  mustBeTrue:
  - 前 10 次 ICP 访谈里，至少有 5 家明确表示：人机混编审批是今年有预算的问题，而不是以后再看的担忧。
  - 至少 2 家共创客户能提供足够的机器事件和安全工作流数据，让首版审批包具备自动化价值。
  - 至少 1 个 live pilot 能证明：在不提高未遂事故复发率的前提下，获批班次提升至少 15%，或安全相关停工下降至少 20%。
  - 付费首站部署里，至少 50% 能在上线后 6 个月内转成年订阅。
  - 至少 1 家同时运行多种机型或多家厂商的客户明确表示：承包商侧中立性比再买一个 OEM 看板更重要。
  diligenceQuestions:
  - 试点扩容时，预算到底归谁：EHS、施工运营，还是现场技术团队？
  - 前两套目标机器栈里，所需遥测有多少能通过 API 或导出方式拿到？
  - 保险方或风险顾问会不会把这套审批包视作缩小隔离区时可信的决策支持？
  - 一旦需求被证明，为什么 Procore、HammerTech 或头部 OEM 不会把这条工作流吃掉？
  - 在必须跳出光伏之前，未来 24 个月里真正能买单的自主化光伏 EPC 账户到底有多少？
operatingAssumptions:
- assumption: 首个可复制买家是北美大型光伏 EPC 或自营施工承包商，他们正把自主化扩到多个活跃工地。
  basis: research.yaml
  validationTest: 访谈 15 个目标账户，确认至少 5 家会在未来两个季度内做出 live 或即将上线的人机混编 rollout 决策。
  decisionImpact: 如果不成立，就要么收窄到单一 OEM 生态，要么更早扩到相邻重型设备垂直场景。
- assumption: 产品能拿到每个活跃工地年约 $150k 的价格，因为预算会来自自主化扩容或企业级安全数字化。
  basis: research.yaml
  validationTest: 在前 5 份提案里，记录首站部署和后续订阅各自的预算科目、经济买家和付费意愿。
  decisionImpact: 如果不成立，定价就得往下走、更多绑定伙伴渠道，或者更重依赖服务收入。
- assumption: 只靠导出的事件日志加上一两个初始集成，就足以产出对决策有用的审批包。
  basis: idea.yaml
  validationTest: 做一个“人工 + 软件”的试点，接入机器事件、工地图层、许可和未遂事故复盘，然后确认客户会在真实审批会上使用它。
  decisionImpact: 如果不成立，路线图就必须把深度 OEM 集成提前到销售规模化之前。
- assumption: 只要每条规则都能对照现有许可、危险源和未遂事故记录接受审计，EHS 负责人就会信任软件给出的建议。
  basis: 运营判断
  validationTest: 和至少 3 组共创客户利益相关方一起跑审批评审，衡量他们接受、修改还是否决平台提出的作业边界。
  decisionImpact: 如果不成立，产品就应该老老实实做“有人审阅的工作流工具”，而不是声称能自动做决策支持。
- assumption: 一旦光伏场景跑出证据，同一套审批工作流就能扩到道路施工、采石场或矿区周边自主化。
  basis: research.yaml
  validationTest: 到第 12 个月时，验证至少 5 个非光伏账户，确认它们也有人机混编审批痛点，且数据可得性接近。
  decisionImpact: 如果不成立，公司就该按聚焦型利基软件公司来经营，并下调 venture 级融资预期。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 家大型光伏 EPC 或自营施工承包商账户里的 VP EHS、运营负责人和现场技术负责人。
  hypothesis: 试点扩容这个审批节点，今年已经足够急，急到客户愿意为付费软件买单。
  successMetric: 至少 5 个账户确认：他们有 live 或即将发生的人机混编 rollout 决策，并愿意评估付费首站部署。
  owner: CEO/创始人
- horizon: 0–90 天
  experiment: 用导出的机器事件、工地图层、许可和未遂事故复盘，为一家共创客户手工做出第一版审批包。
  hypothesis: 在深度 API 覆盖还不存在之前，也能先产出有用的首版作业边界建议。
  successMetric: 客户会在真实班次评审或 rollout 评审里使用这份审批包，并要求进入第二轮复审。
  owner: 创始产品负责人
- horizon: 90–180 天
  experiment: 为第一笔付费部署上线 1 个 OEM 或改装自主方案适配器，以及 1 个许可或观察集成。
  hypothesis: 只要集成范围有限但结构化，就足够让工作流在相似光伏工地上可复制。
  successMetric: 至少 1 个客户连续 30 个活跃班次通过产品跑日度审批。
  owner: 创始工程负责人
- horizon: 90–180 天
  experiment: 对比两个工地在规则驱动作业边界上线前后的获批班次、停工、人工接管和未遂事故复发。
  hypothesis: 产品能在不削弱安全结果的情况下，带来可量化的运营改进。
  successMetric: 至少 1 个工地实现：获批班次提升 15%，或安全相关停工下降 20%，且未遂事故复发没有变差。
  owner: 安全工作流负责人
- horizon: 180–365 天
  experiment: 把 2-3 个付费首站部署转成年化、多工地订阅，并跑出可复用规则库。
  hypothesis: 这条工作流是经常性软件，不只是上线期咨询。
  successMetric: 50%+ 的付费部署转成订阅，且至少 1 个客户扩到第二个工地。
  owner: CEO/创始人
- horizon: 180–365 天
  experiment: 在保持承包商侧中立的前提下，和一家自主 OEM 或工作流伙伴跑一轮渠道测试。
  hypothesis: 伙伴引流能加快获客，但不会把产品变成 OEM 的白标功能。
  successMetric: 通过伙伴拿到 2 个合格机会，且不需要让出客户所有权或中立报告权。
  owner: CEO/创始人
operations:
- 把机器停机、人工接管、人员识别和 geofence 事件统一进一套标准化事件 schema。
- 把审批嵌进现有的许可、班前任务和观察工作流，而不是逼现场团队再学一套平行流程。
- 把每次建议的作业边界、人工覆盖和随后的未遂事故复盘都留下可审计记录。
- 把产品边界划清：只做决策支持和治理，不碰正式认证，也不碰机器控制。
team:
- role: 创始工程负责人
  startTiming: Month 0
  rationale: 一开始就得有人把遥测接入、规则逻辑、审计轨迹和第一条审批工作流搭起来。
- role: 创始人主导销售 / CEO
  startTiming: Month 0
  rationale: 早期交易必须靠创始人亲自做客户发现、采购委员会映射，以及在 OEM 和现有 EHS 工具之间把定位讲清楚。
- role: 安全工作流负责人
  startTiming: Month 2
  rationale: 把 OSHA 风格的危险源逻辑、现场流程和未遂事故模式，翻成可信的作业边界规则和复审工作流。
- role: 集成工程师
  startTiming: Month 6
  rationale: 等共创客户证明切口成立后，更多遥测和工作流连接器会变成新瓶颈，这时就必须补位。
- role: 客户部署负责人
  startTiming: Month 9
  rationale: 把 onboarding、复审节奏和多工地 rollout 做成可复制动作，避免实施一路滑成开放式咨询项目。
milestones:
- horizon: 0–12 个月
  items:
  - 在光伏滩头市场签下 2-3 家付费共创客户。
  - 上线 MVP 审批包、1 个遥测适配器，以及 1 个许可或观察集成。
  - 在真实工地证明：获批班次更多，或停工显著下降。
  - 至少把 1 个付费首站部署转成年度订阅收入。
- horizon: 12–24 个月
  items:
  - 至少把 1 个客户从 1 个工地扩到 2 个及以上活跃工地。
  - 上线可复用规则库、多工地看板和 benchmarking 报告。
  - 在一个企业账户内支持至少两种机型或两家厂商的混编车队。
  - 为下一块滩头市场验证 3-5 个非光伏相邻账户。
- horizon: 24–36 个月
  items:
  - 在 2-3 家企业客户中，把签约活跃工地做到 10 个。
  - 在至少一个相邻户外自主化垂直场景里，把产品做成默认的承包商侧治理层。
  - 为保险方、安全顾问或业主监督方增加可供伙伴使用的报告能力，但不承担认证责任。
risks:
- risk: EHS、运营和创新团队之间的预算归属始终说不清。
  likelihood: High
  impact: High
  mitigation: 卡在真实试点扩容决策上卖，尽早摸清采购委员会，并把定价锚定在“少延误、更多工地获批上线”而不是泛化安全软件价值上。
- risk: OEM 继续扩展自己的看板，并宣称已经覆盖了人机混编安全。
  likelihood: Medium
  impact: High
  mitigation: 强调承包商侧中立、多厂商工作流，以及和现有许可/观察系统的集成——这些都不是 OEM 工具真正掌控的地方。
- risk: 早期部署过度咨询化，把软件毛利压不出来。
  likelihood: High
  impact: Medium
  mitigation: 先把首个滩头市场收窄到可复制的光伏流程，把适配器和规则模板标准化；在核心工作流产品化之前，不急着大规模招部署团队。
- risk: 保险方或法务团队不接受软件支持的审批，认为它不足以支撑改变隔离区。
  likelihood: Medium
  impact: High
  mitigation: 保留人工签字，把输出锚定在可审计的危险源控制上，并让风险顾问尽早参与审批包评审。
- risk: 光伏机器人采纳速度长期停留在试点级。
  likelihood: Medium
  impact: High
  mitigation: 继续守住窄光伏切口来拿首批证据，但在第 12 个月前就验证相邻户外自主化场景，别把扩张完全押在单一品类节奏上。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这轮资金要覆盖 18 个月：拿下 2-3 家付费共创客户，上线第一条可复制的审批工作流和初始集成，证明订阅转化与工地层面的可量化 ROI，并验证相邻户外自主化市场能否把这个滩头市场扩成 venture 级公司。
