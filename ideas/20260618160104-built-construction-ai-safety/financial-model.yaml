modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Trigger[Pilot expansion trigger] --> PaidDeployment[Paid first-site deployment]
      PaidDeployment --> RecurringSites[Recurring active sites]
      CACSpend[CAC spend] --> PaidDeployment
      RecurringSites --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[Ending cash]
      Churn[Churn and site loss] --> RecurringSites
modelSanity:
- checkName: "Revenue engine"
  finding: "The base case is driven by expanding from 2 recurring active sites in Y1 to 10 by Q4Y3 at roughly $150K annual software value per site."
- checkName: "Must go right"
  finding: "The first paid deployments have to convert into repeatable multi-site subscriptions before the company adds headcount beyond a 6-FTE core team."
- checkName: "Model breaks if"
  finding: "If budget ownership and insurer acceptance stay unresolved, sales cycles lengthen and the downside case burns most of the remaining cash buffer before scale proof arrives."
- checkName: "Next-round proof"
  finding: "A seed-ready story appears once the company shows at least one multi-site customer expansion and about 6 recurring live sites with evidence that solar can generalize into the next outdoor-autonomy wedge."
sanityChecks:
  ruleOf40: "Y3 growth 88.9% + EBITDA margin -30.5% = 58.4%."
  burnMultiple: "Y2 burn multiple 1.1x based on $0.65M burn over $0.58M net new revenue; Y3 burn multiple 0.6x as revenue growth outpaces remaining burn."
  revenuePerFte: "$212,500 Y3 using Q4Y3 headcount of 6 FTE (benchmark roughly $200K-$400K B2B SaaS)."
  flags:
  - "The modeled solar-only base case reaches the research-backed 10-site SOM by Q4Y3, so venture upside still depends on proving the workflow transfers into adjacent outdoor-autonomy verticals."
  - "Revenue per FTE reaches about $213K in Y3, which is only the low end of healthy SaaS efficiency and reflects a still-deployment-heavy go-to-market motion."
  - "The base P&L excludes paid implementation revenue to stay conservative, but that also means near-term cash conversion depends heavily on subscription timing rather than services invoices."
  - "Insurer and risk-advisor acceptance is still unproven; if software-backed approvals do not narrow exclusion zones in practice, churn and sales-cycle assumptions likely deteriorate together."
