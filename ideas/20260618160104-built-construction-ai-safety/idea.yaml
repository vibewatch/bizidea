differentiator: >-
  OEMs can ship perception models and emergency-stop logic, but contractors still need a neutral operating layer that
  decides where, when, and under what conditions machines should run near human crews. The differentiator is not
  just detecting people; it is turning cross-site near-miss evidence, work-plan context, and vendor-agnostic telemetry
  into daily operating envelopes and sign-off workflows. That creates defensibility through a proprietary dataset of
  mixed-crew edge cases and site-level policy outcomes that no single OEM or contractor sees in aggregate.
