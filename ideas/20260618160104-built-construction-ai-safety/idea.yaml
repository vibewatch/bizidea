problem: >-
  Utility-scale solar contractors can now pilot autonomous piling and earthmoving machines, but they still lack a
  credible way to run those machines safely around mixed human crews on active sites. Daily changes in crew layout,
  staging areas, traffic paths, and visibility create edge cases that OEM safety features and static exclusion zones do
  not capture well. The result is slower autonomy rollout, oversized safety buffers, and field leaders who cannot prove
  when a machine is safe enough to operate near people.
targetUser:
  primary: Safety and construction technology leaders at utility-scale solar EPCs deploying autonomous piling or trenching equipment across multiple active sites
  secondary: Site superintendents and EHS managers responsible for daily mixed-crew work planning on autonomous-machine projects
  buyer: VP of EHS, construction operations, or field technology at a large solar self-perform contractor
startupThesis:
  nonObviousInsight: >-
    The moat in construction autonomy is shifting away from autonomous machine control and toward site-specific evidence
    that humans and machines can safely coexist under messy real-world conditions. What changed is that fleets like
    Built's now generate enough field data to model edge cases, while expansion beyond a single robot type makes
    ad hoc site safety processes too brittle to scale.
  beachhead: >-
    North American utility-scale solar EPCs and self-perform civil contractors running 5-20 active sites and evaluating
    autonomous pile-driving, trenching, or material-movement machines alongside human crews
  wedge: >-
    A mixed-crew autonomy safety OS that ingests machine perception logs, site maps, work plans, and near-miss reviews to
    define daily operating envelopes, personnel-risk zones, stop conditions, and deployment approval evidence for each
    active site
  whyNowCatalyst: >-
    Built and Penn's edge-case data partnership signals that the category's bottleneck has moved from proving a robot can
    do the task to proving it can operate safely around people on real construction sites.
  ventureScalePath: >-
    Start with utility-scale solar sites, then expand into roadbuilding, earthmoving, mining-adjacent construction, and
    mixed fleets of autonomous heavy equipment as the neutral safety workflow and evidence layer for outdoor autonomy.
solution: >-
  Mixed Crew Autonomy Safety OS would sit above machine OEM telemetry and below field operations. It would combine
  autonomy perception events, site boundaries, crew assignments, traffic plans, and supervisor observations into a
  site-specific safety case that refreshes daily as conditions change. The product would flag where visibility,
  occlusion, or personnel-behavior risk exceeds approved thresholds, recommend tighter or looser operating envelopes, and
  produce auditable shift-ready approvals for EHS and site leadership. A near-miss review workflow would turn every stop,
  override, or detection failure into structured training data and operating-rule updates across sites. Over time, the
  company would build the deepest cross-site dataset on safe mixed-crew autonomy in outdoor construction.
goToMarketSeed:
  firstCustomer: >-
    A top-20 North American utility-scale solar self-perform contractor running multiple simultaneous sites and deploying
    its first 3-10 autonomous piling or trenching machines from one or more vendors
  buyingTrigger: >-
    A contractor approves expansion from an isolated pilot into active mixed-crew production work where EHS leaders must
    sign off on operating rules before more machines or sites go live
  currentAlternative: >-
    OEM safety features, human spotters, static exclusion zones, paper job hazard analyses, telematics dashboards, and
    site-supervisor judgment
  switchingReason: >-
    This wedge lets contractors narrow blanket exclusion zones and expand autonomy faster by turning messy field events
    into auditable daily approvals and reusable safety rules that are independent of any one machine vendor.
  pricingHypothesis: >-
    Annual subscription priced per active autonomous site or per machine fleet, with implementation fees for telemetry
    adapters, site-map setup, and safety-rule calibration
