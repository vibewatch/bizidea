topRisks:
  - name: OEM feature creep
    description: Construction machine vendors may add their own safety dashboards and argue that contractors do not need an independent layer.
    mitigation: Focus on cross-vendor contractors that need neutral approval workflows and benchmarking across multiple machine types and OEMs.
  - name: Weak initial budget owner
    description: Safety, operations, and innovation teams may all care, but none may own a standalone software budget early on.
    mitigation: Sell into pilot-expansion moments where autonomy capex is already approved and tie pricing to faster utilization and lower site-delay costs.
  - name: Services-heavy deployments
    description: Early customers may demand custom site setup and incident review that turns the company into a consultancy.
    mitigation: Constrain the beachhead to repeatable solar-site workflows and productize telemetry adapters, approval templates, and rule libraries from the first few rollouts.
