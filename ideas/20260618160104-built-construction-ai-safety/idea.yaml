jobsToBeDone:
  - job: >-
      When we expand autonomous piling or trenching from a pilot zone into an active site, help our EHS and field leaders
      decide the safe operating envelope for each shift, so we can increase machine utilization without exposing workers
      to unclear risk.
    currentAlternative: Human spotters, static exclusion zones, OEM dashboards, and paper pre-task safety meetings
    successMetric: Percentage of shifts approved for mixed-crew operation and reduction in safety-related machine stoppages
  - job: >-
      When a near-miss, stop event, or detection failure occurs, help our operations team turn it into reusable site rules
      and evidence, so the next site does not relearn the same failure mode from scratch.
    currentAlternative: Supervisor debriefs, spreadsheet logs, and ad hoc vendor escalation
    successMetric: Time from incident review to updated operating rule and reduction in repeated edge-case events across sites
