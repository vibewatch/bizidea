differentiator: >-
  Incumbent live-betting vendors mostly help operators move prices on a fixed menu; this product helps them manufacture the menu itself. The wedge is not generic sports AI but a narrow workflow that packages market generation, policy gating, trader review, and settlement logic into one operator-facing layer. That makes the first deployment believable for smaller licensed books that cannot staff a large quant and trading organization. If it works, the company owns the authoring layer that determines what gets traded, not just the odds on someone else's market.
