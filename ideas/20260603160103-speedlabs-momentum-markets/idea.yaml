  buyingTrigger: >-
    Renewal of a live-odds supplier contract or a product roadmap push to increase in-play handle without hiring additional traders.
  currentAlternative: Manual trading desks plus pre-authored live prop templates from incumbent odds-feed providers
  switchingReason: >-
    The operator gets more market inventory and faster reaction to game momentum without building a quant team or replacing its full sportsbook stack.
  pricingHypothesis: Platform fee plus usage-based pricing tied to live events processed or gross handle from generated momentum contracts
