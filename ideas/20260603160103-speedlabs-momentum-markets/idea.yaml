topRisks:
  - name: Regulatory acceptance
    description: Regulators or operator compliance teams may reject dynamically generated contracts if approval and settlement logic are not auditable enough.
    mitigation: Start with a narrow catalog of pre-approved contract templates, keep human trader approval in the loop, and log every generation and pricing decision for review.
  - name: Data and settlement reliability
    description: Latency, feed errors, or ambiguous event definitions could create bad pricing or settlement disputes during live games.
    mitigation: Use official data feeds, constrain launch windows to high-confidence event types, and provide deterministic settlement rules with automated exception workflows.
  - name: Buyer urgency dilution
    description: Some sportsbooks may see richer live market menus as a nice-to-have and defer adoption if incumbent vendors can mimic the feature set.
    mitigation: Sell against measurable in-play handle uplift in one sport, integrate into existing stacks instead of requiring a full rip-and-replace, and prove ROI before wider rollout.
