slug: momentum-market-factory
date: '2026-06-03'
executiveSummary: >-
  This company should start as a compliance-first market-authoring layer for
  licensed European and Latin American tier-2 sportsbooks that already run
  meaningful live soccer and basketball betting but still depend on third-party
  odds and manual trader intervention for new market creation. The urgent pain
  is not pricing alone; it is the inability to author, approve, publish, and
  settle new five-minute contracts quickly enough to capture live momentum
  swings before bettor attention moves on. The most credible first product is
  an API plus trader cockpit that only generates pre-approved momentum-market
  templates with explicit suspension rules, deterministic settlement logic, and
  trader override, because regulation and auditability are the gating
  constraints in the research. This beachhead is narrower than a full sportsbook
  platform, but it is faster to prove because one operator can measure new
  markets launched per match, handle uplift, trader-acceptance rate, and
  settlement exceptions over a single season. The company should sell into live
  odds renewal or in-play product refresh cycles rather than try to create a
  new budget line, and it should position against incumbents on deployment
  speed, template governance, and workflow fit rather than on breadth of data or
  all-in-one sportsbook coverage. The venture case is plausible but not yet
  strong enough for high conviction because the researched TAM is modest and
  public proof of operator ROI is still missing. The key expansion path is to
  become the trusted authoring layer for more sports, more jurisdictions, and
  eventually risk and hedging workflows after proving the soccer and basketball
  wedge. The biggest disconfirming risk is that regulators, compliance teams, or
  official-data licensors require slower case-by-case approval than template
  governance allows. Two important evidence gaps remain: public customer
  references do not show measured handle uplift from momentum markets, and the
  exact budget owner and price ceiling for this layer are still inferred rather
  than directly observed.
problem:
  - Mid-market regulated sportsbooks can reprice existing live bets, but they usually cannot author, policy-check, publish, and settle brand-new short-duration markets fast enough to monetize live momentum swings.
  - Smaller operators already outsource odds, risk, and platform components, so hiring a larger quant and trading desk to expand in-play inventory is expensive relative to the uncertain ROI of richer live markets.
solution:
  - Deliver an API plus trader cockpit that converts official game-feed events into pre-approved five-minute momentum contracts for soccer and basketball, with pricing, suspension rules, and settlement metadata attached.
  - Keep the trader in control while automating the default workflow, so operators can launch more live markets per match without replacing their sportsbook stack or relying on open-ended black-box generation.
whyWeWin:
  - Incumbents sell broad live trading, data, and platform suites; this company sells the narrower authoring workflow that determines which live moments become compliant markets at all.
  - If early deployments succeed, the company can accumulate hard-to-copy data on template performance, trader overrides, settlement outcomes, and jurisdiction-specific policy rules across operators.
strategicChoices:
  beachhead: Licensed European and Latin American tier-2 sportsbooks focused on live soccer and basketball, with outsourced live trading infrastructure and no deep internal quant team.
  wedgeRationale: This buyer already spends on external in-play infrastructure, feels direct pressure to grow live handle before upcoming seasons, and can test a narrow add-on faster than a full sportsbook replacement or a broad all-sports AI trading suite.
  sequencingRationale: Start with pre-approved soccer and basketball momentum templates, trader review, and deterministic settlement for one operator and one jurisdiction; add repeatable platform connectors, compliance tooling, and adjacent sports only after pilots prove handle lift and low exception rates.
  notYet:
    - Consumer-facing betting products
    - Open-ended market generation outside pre-approved template families
    - Full sportsbook platform replacement
    - Long-tail sports and U.S. market expansion before Europe and Latin America repeatability is proven
market:
  tam: Estimated $126.0M TAM based on about 360 operator groups or brands that could plausibly spend roughly $350k annually on a live market-authoring layer.
  sam: Estimated $27.0M SAM based on about 90 licensed Europe and Latin America operators in the soccer and basketball beachhead at roughly $300k annual spend.
  som: Estimated $2.4M year-3 SOM based on 8 customers at about $300k ARR each.
  segments:
    - Licensed mid-market sportsbooks in Europe and Latin America with meaningful live soccer and basketball handle
    - Prediction-market operators entering live sports after the sportsbook wedge is proven
  buyingProcess: >-
    The champion is usually the head of in-play trading or sportsbook product
    lead when a live-odds renewal, seasonal planning cycle, or handle-growth
    mandate exposes the limits of current live market inventory. The economic
    buyer is typically the VP Sportsbook, trading GM, or regional GM who signs
    once a paid pilot shows measurable handle uplift, low integration risk, and
    auditable settlement behavior.
product:
  mvp: >-
    MVP is a narrow API plus trader cockpit for one operator, one jurisdiction,
    and soccer and basketball only, generating pre-approved five-minute momentum
    templates from official game data with trader review, suspension controls,
    and deterministic settlement.
  sixMonth: Ship one design-partner pilot with official-feed ingestion, 10-20 pre-approved template families, trader approval workflow, audit logs, and dashboards for published markets per match, handle contribution, and settlement exceptions.
  twelveMonth: Add repeatable connectors for two common sportsbook platforms, expand the template library within soccer and basketball, and complete one certification or legal-compliance package that shortens deployment in the next two jurisdictions.
  twentyFourMonth: Expand into additional sports and a broader operator authoring layer with policy management, performance benchmarking, and optional risk and hedging workflows once the first geography and sport pair shows repeatable production adoption.
  keyBets:
    - Operators will adopt a narrow market-authoring add-on faster than a broader sportsbook platform change.
    - Pre-approved templates with trader override will clear compliance and trust hurdles faster than autonomous open-ended generation.
    - Soccer and basketball alone provide enough live event cadence to prove ROI before expanding sport coverage.
gtm:
  wedge: >-
    Sell a paid seasonal pilot to one licensed tier-2 sportsbook that is
    renewing live-odds infrastructure or pushing for more in-play handle, using
    incremental live markets per match, handle uplift, trader time saved, and
    settlement exception rate as the proof points.
  channels:
    - Founder-led direct sales to sportsbook trading and product leaders
    - Integration-led partnerships with sportsbook platform vendors and managed-trading providers
    - Trust-led introductions through official-data, integrity, testing, and jurisdictional compliance partners
  funnelTargets: "Lead to qualified pilot 15-25%, qualified pilot to paid pilot 30-40%, paid pilot to production 50%+, first production logo to second same-platform logo within 9 months."
  pricing: >-
    Price as an annual platform subscription per operator brand and jurisdiction,
    plus usage tied to published momentum markets or live events processed after
    pilot thresholds are met; this matches enterprise procurement better than a
    pure revenue-share model while still aligning price with inventory growth.
businessModel:
  revenueStreams:
    - Annual subscription for the market-authoring API and trader cockpit
    - Implementation and compliance-onboarding fees for new operator launches
    - Usage fees tied to published momentum markets or live events processed
    - Optional premium modules for policy governance, benchmarking, and expanded sport coverage
  unitOfValue: One operator brand-jurisdiction live-betting workflow using the market-authoring layer
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one sport pair and one jurisdiction to more markets within the same operator
    - Add more operator brands on the same sportsbook platform connector
    - Sell policy-governance, benchmarking, and risk-control modules on top of the core workflow
strategyMap:
  northStarMetric: Monthly handle from generated momentum markets that reach production settlement with low exception rates
  inputMetrics:
    - Published momentum markets per match
    - Trader acceptance rate for suggested templates
    - Handle per match from generated markets
    - Settlement exception rate
    - Paid pilot to production conversion rate
  moatsToBuild:
    - Dataset linking game state, generated templates, trader overrides, acceptance, and settlement outcomes
    - Jurisdiction-specific policy and suspension rules encoded into reusable launch templates
    - Reusable connectors into common sportsbook platforms, official-data feeds, and compliance workflows
  killCriteria:
    - Fewer than 3 paid pilots signed within 12 months of focused selling into the defined beachhead
    - No pilot shows at least 10% handle uplift or at least 25% more live markets per match without a material rise in settlement exceptions
    - Fewer than 50% of paid pilots convert to annual production contracts because compliance, ROI, or integration objections remain unresolved
  mermaid: |
    flowchart LR
      Wedge[Compliance-first momentum market wedge] --> MVP[Template API and trader cockpit MVP]
      MVP --> Proof[Handle uplift and low-exception proof]
      Proof --> Expansion[Multi-sport and multi-operator authoring layer]
investorMemo:
  verdict:
    call: Watch
    conviction: Credible workflow wedge in a real buyer budget, but conviction stays moderate until pilots prove regulatory acceptance and measurable handle lift against strong incumbents.
    whyBelieve: The plan targets a documented operator workflow gap between pricing existing bets and manufacturing new compliant live markets, in a category where buyers already outsource infrastructure.
    whyDoubt: Incumbents can bundle similar capabilities, and the available market plus unresolved compliance friction may limit venture-scale outcomes if pilots do not convert quickly.
    nextDiligence: Secure 3-5 target operator and compliance references plus one shadow or paid pilot showing template approval, live-market launch volume, and incremental handle versus current live props.
  firstCustomer:
    title: Tier-2 regulated sportsbook with strong live soccer handle and outsourced trading stack
    profile: A licensed operator in Europe or Latin America running soccer and basketball in-play betting through third-party odds or managed-trading infrastructure, with a mandate to improve live inventory before the next major season.
    trigger: Renewal of a live-odds or managed-trading contract, or a product plan that demands higher in-play handle without adding headcount to the trading desk.
    buyer: VP Sportsbook or General Manager of Trading
    initialContract: $75k-$125k paid pilot for one sport pair and one jurisdiction over a season, converting to roughly $250k-$350k ARR when the operator expands production usage and additional template families.
  mustBeTrue:
    - Target operators must accept pre-approved template governance as sufficient for five-minute live markets in at least the first two target jurisdictions.
    - One pilot operator must show measurable handle uplift or materially higher live-market volume versus its current live-prop baseline.
    - Buyers must prefer an add-on authoring layer over waiting for Sportradar, Genius, EveryMatrix, or managed-trading providers to bundle the feature.
    - Two or three sportsbook platform and feed connectors must cover most early pipeline opportunities without forcing custom deployments on every deal.
    - The company must keep settlement exceptions and compliance escalations low enough that production conversion exceeds the specialist-vendor threshold.
  diligenceQuestions:
    - Which target jurisdictions will actually accept template-based approval for dynamically generated momentum markets?
    - What handle uplift, hold quality, and trader-efficiency gains did comparable micro-market deployments create for operators?
    - Who signs the budget most often in practice: trading, product, regional GM, or procurement through an existing platform vendor?
    - How quickly can Sportradar, Genius, EveryMatrix, Altenar, or nVenue match the core workflow if customer demand becomes obvious?
    - What percentage of early target operators share the same front-end, feed, and managed-trading stack needed for repeatable deployment?
operatingAssumptions:
  - assumption: Mid-market operators will buy a narrow authoring layer instead of waiting for a broader incumbent bundle.
    basis: research.yaml
    validationTest: Close at least 3 paid pilots in 12 months where the buyer selects the specialist layer despite already using a major incumbent for odds, feeds, or platform infrastructure.
    decisionImpact: If false, the company should shift toward partner-embedded distribution or abandon the standalone wedge.
  - assumption: Pre-approved template governance with trader override is enough to satisfy early compliance reviews.
    basis: research.yaml
    validationTest: Obtain two external legal or certification opinions plus one operator compliance approval for the first template families in target jurisdictions.
    decisionImpact: If false, roadmap priority moves from growth features to compliance tooling and the market-entry pace slows materially.
  - assumption: Soccer and basketball momentum contracts produce buyer-visible ROI without unacceptable settlement disputes.
    basis: idea.yaml
    validationTest: Run replay analysis and at least one live pilot showing at least 10% handle uplift or materially more markets per match while keeping settlement exceptions below a predefined operator threshold.
    decisionImpact: If false, the company must narrow the contract types further, change the target sport, or reconsider the category.
  - assumption: A small connector set can cover enough of the early market to keep implementations productized.
    basis: research.yaml
    validationTest: Map the first 15 qualified opportunities and confirm that two sportsbook platform connectors and one official-feed integration cover at least 70% of them.
    decisionImpact: If false, gross-margin targets fall and the beachhead must narrow to one dominant stack or geography.
  - assumption: Buyers will accept subscription plus usage pricing at roughly the modeled $250k-$350k ARR level after pilot conversion.
    basis: operator judgment
    validationTest: Test pricing with at least 10 qualified buyers and convert two paid pilots at or above the planned annual price band.
    decisionImpact: If false, the company must lower ACV expectations, adopt different usage metrics, or raise less capital for a slower build.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12-15 sportsbook trading leaders, product leads, and compliance owners across Europe and Latin America.
    hypothesis: Budget becomes real when live-odds renewal and in-play handle pressure coincide with dissatisfaction about current market inventory speed.
    successMetric: At least 8 interviews confirm the same buying trigger and 4 agree to evaluate a paid pilot structure.
    owner: CEO
  - horizon: 0–90 days
    experiment: Build a replay-based shadow pilot on official match data for soccer and basketball momentum templates.
    hypothesis: A narrow set of template families can create more tradable moments than current live props without creating unmanageable settlement ambiguity.
    successMetric: Shadow results show a credible uplift in market count and a low manual-exception rate across at least 50 historical matches.
    owner: Founding eng
  - horizon: 0–90 days
    experiment: Commission jurisdiction and testing review for the first template families in two target markets.
    hypothesis: Template governance, trader override, and audit logging can clear an acceptable path to production without case-by-case approval for every generated market.
    successMetric: Two written legal or certification assessments identify a viable launch path with no blocking issue for the initial template catalog.
    owner: Compliance lead
  - horizon: 90–180 days
    experiment: Launch one paid design-partner pilot for one operator, one jurisdiction, and one season.
    hypothesis: Operators will adopt the product if integration is narrow and proof is framed around handle growth plus control, not generic AI claims.
    successMetric: One paid pilot goes live and publishes production markets with trader usage above 70% of eligible matches.
    owner: CEO
  - horizon: 90–180 days
    experiment: Productize two sportsbook platform connectors and one feed integration from the first pilot pipeline.
    hypothesis: A small integration footprint can unlock a repeatable second and third logo without services-heavy deployment.
    successMetric: Connector package reduces projected implementation time for the next qualified operator by at least 40%.
    owner: Solutions engineer
  - horizon: 180–360 days
    experiment: Test direct sales against one partner-led channel through a managed-trading or platform vendor.
    hypothesis: Partner-led distribution lowers trust friction and shortens sales cycles once the first case study exists.
    successMetric: One partner channel produces at least 3 qualified opportunities or 1 additional paid pilot within 6 months.
    owner: GTM lead
operations:
  - Keep every template family tied to explicit suspension rules, settlement rules, and trader override before expanding catalog breadth.
  - Maintain auditable logs for generation, approval, price changes, and settlement exceptions to support operator compliance reviews.
  - Run weekly operator scorecards on markets published per match, handle contribution, trader acceptance, and exception rate.
  - Standardize platform and feed integrations around a small connector set instead of accepting custom workflow promises in early deals.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Owns the API, trader cockpit, audit trail, and connector architecture that make the narrow add-on deployment credible.
  - role: Trading and ML lead
    startTiming: Month 0
    rationale: Designs template logic, pricing behavior, and replay validation so the product improves market depth without sacrificing control.
  - role: Compliance lead
    startTiming: Month 1
    rationale: Converts jurisdiction rules, testing requirements, and responsible-gambling obligations into product constraints and launch playbooks.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Productizes sportsbook platform and feed integrations so the second and third deployments do not become custom services projects.
  - role: GTM lead
    startTiming: Month 6
    rationale: Runs a focused enterprise sales motion into live-odds renewal and in-play expansion cycles once the first pilot proof exists.
  - role: Customer success and trader ops lead
    startTiming: Month 9
    rationale: Supports production launches, weekly performance reviews, and template tuning across early operator accounts.
milestones:
  - horizon: 0–12 months
    items:
      - Secure two legal or certification opinions covering the initial template families in the first target jurisdictions
      - Complete replay validation for soccer and basketball momentum templates on at least 50 matches
      - Launch one paid pilot and convert at least one operator to production usage
      - Ship two repeatable sportsbook platform connectors and one official-feed integration
  - horizon: 12–24 months
    items:
      - Reach 3-5 production operators in Europe and Latin America
      - Expand the template catalog within soccer and basketball and enter one adjacent sport
      - Standardize policy governance and benchmarking modules across production customers
      - Demonstrate a repeatable partner-led distribution motion with at least one platform or managed-trading provider
  - horizon: 24–36 months
    items:
      - Reach 8 production operators and approximately the researched year-3 SOM
      - Expand into more jurisdictions with a reusable compliance playbook
      - Add risk-control or hedging workflow modules on top of the authoring layer
      - Establish the product as a system of record for which live moments become operator-approved markets
risks:
  - risk: Regulators or operator compliance teams may reject template-based governance for dynamically generated live markets.
    likelihood: High
    impact: High
    mitigation: Start with a narrow catalog of pre-approved template families, obtain external legal and testing opinions early, and preserve trader sign-off plus full audit logs.
  - risk: Latency, feed quality, or ambiguous event definitions may cause bad pricing or settlement disputes during live play.
    likelihood: Medium
    impact: High
    mitigation: Use official-data inputs, constrain launch windows to high-confidence event types, and block expansion until exception handling is deterministic.
  - risk: Incumbents may bundle similar micro-market capabilities into existing enterprise contracts before the startup wins repeatable distribution.
    likelihood: High
    impact: Medium
    mitigation: Differentiate on faster deployment, operator template governance, and focus on underserved mid-market accounts that do not want a platform replacement.
  - risk: Buyers may treat richer live inventory as a nice-to-have rather than a must-fund project.
    likelihood: Medium
    impact: Medium
    mitigation: Sell against seasonal handle-growth targets, live-odds renewal events, and pilot KPIs tied directly to handle lift and trader efficiency.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: Build the first production-ready template authoring stack, clear early compliance and testing work, hire core engineering, trading, and solutions staff, and close the first 2-3 operator pilots needed to validate repeatable deployment and pricing.
