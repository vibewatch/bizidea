modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      Leads[Qualified operator leads] --> Pilots[Paid pilots]
      Pilots --> Customers[Production operators]
      Customers --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自：Y1 末 1 家正式生产运营商，增长到 Y3 末 8 家，期间 ACV 保持在 $300K。
- checkName: 必须跑通的事
  finding: 公司必须在 Q4Y2 之前把首个运营商案例变成可复制的 6 个月企业销售流程，否则 downside 情景会迫使其更早再融资。
- checkName: 模型会失效的条件
  finding: 如果监管审批把销售周期拖到 9 个月，同时流失率升到 3%，现金会在达到 seed 里程碑前转负。
- checkName: 下一轮融资证明点
  finding: 只要 pre-seed 把公司带到 4-5 家正式生产运营商、拿下一个可复用连接器，并形成可信的合规打法，就能讲出下一轮 seed 故事。
sanityChecks:
  ruleOf40: Y3 增长 138% + EBITDA 利润率 -38% = 100%。
  burnMultiple: Y2 burn multiple 约为 1.1x，计算口径是 $1.27M EBITDA burn，对应 1 家到 5 家正式生产运营商在 $300K ACV 下带来的 $1.20M 净新增 ARR。
  revenuePerFte: Y3 人均收入约 $225K（$2.03M 收入 / Q4 的 9 名 FTE；SaaS 基准大致为 $200–400K）。
  flags:
  - 即便 SOM 达成，基准情景仍假设公司从约 90 家滩头市场运营商里拿下 8 家，因此企业客户集中风险依旧很高。
  - 模型为求保守，没有计入实施费收入；这既压低了上行空间，也掩盖了如果连接器无法复用，实施过程会变得多重服务化。
  - EBITDA 到 Y3 仍为负，因此公司依旧需要 seed 轮，或者必须明显更快转化，才能避免带着过薄的现金缓冲运营。
