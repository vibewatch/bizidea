slug: momentum-market-factory
date: '2026-06-03'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始时现金余额
  value: '4000'
  unit: usdK
  source: '[BP fundingAsk] 目标融资额是 $2-4M、覆盖 18 个月；模型取区间上沿，为重合规建设和额外 6 个月缓冲提供资金。'
- id: A2
  name: 起始客户数 (M1)
  value: '0'
  unit: count
  source: '[BP executiveSummary] 公司以零收入起步，必须先拿下一个付费运营商部署。'
- id: A3
  name: 每家运营商的正式生产 ACV
  value: '300'
  unit: usdK_per_year
  source: '[BP market.som; BP investorMemo.firstCustomer] 第 3 年 SOM 按每家运营商约 $300K ARR 估算；正式生产定价也由 $250K-$350K 区间转化而来。'
- id: A4
  name: 每家活跃运营商的月度经常性收入
  value: '25'
  unit: usdK_per_month
  source: '[A3] 收入按 ACV / 12 确认；模型为保守起见，不计实施费带来的上行。'
- id: A5
  name: 毛利率
  value: '70'
  unit: pct
  source: '[BP businessModel.targetGrossMarginPct] 目标毛利率为 70%。'
- id: A6
  name: 首个经常性客户出现时间
  value: M9
  unit: month
  source: '[BP experimentRoadmap; BP milestones 0–12 months] 首个付费试点会在 90-180 天内上线，首个正式生产转化在第 1 年末落地，因此经常性收入在 Y1 后段才开始。'
- id: A7
  name: Y2 各季度末客户数
  value: 2, 3, 4, 5
  unit: count
  source: '[BP milestones 12–24 months] 模型假设 Y2 末达到 5 家正式生产运营商，与“3-5 家运营商”的里程碑区间一致。'
- id: A8
  name: Y3 各季度末客户数
  value: 6, 7, 8, 8
  unit: count
  source: '[BP milestones 24–36 months; Research market.som] 模型在 Y3 末达到 8 家正式生产运营商，对应研究里的 SOM 路径，而没有假设超出计划的份额。'
- id: A9
  name: 平均销售周期
  value: '6'
  unit: months
  source: '[BP gtm.wedge; BP market.buyingProcess; Research adoptionFrictionMatrix] 受监管运营商销售被建模为 6 个月、多方参与的企业采购流程。'
- id: A10
  name: 完全摊薄 CAC
  value: '110'
  unit: usdK_per_customer
  source: '[Startup-finance heuristic: early regulated enterprise SaaS] 这个数字综合了创始人/AE 时间、差旅、合规尽调以及拿下体育博彩运营商试点的成本。'
- id: A11
  name: 月度流失率
  value: '2.0'
  unit: pct
  source: '[BP mustBeTrue; startup-finance heuristic] 接入完成后产品理应具备粘性，但考虑到早期客户集中与采购风险，仍采用 2.0% 的月流失假设。'
- id: A12
  name: 产品工程全包薪酬
  value: '190'
  unit: usdK_per_fte_year
  source: '[Startup-finance heuristic: enterprise infrastructure engineering] 用于 API、数据和连接器工程师，包含薪资税费与福利。'
- id: A13
  name: 交易与 ML 全包薪酬
  value: '220'
  unit: usdK_per_fte_year
  source: '[BP team] 负责定价和回放验证的专门人才，现金成本按高于普通工程师处理。'
- id: A14
  name: 合规与 QA 全包薪酬
  value: '180'
  unit: usdK_per_fte_year
  source: '[BP team; Research regulatoryTechnicalConstraints] 在受监管博彩基础设施里，早期必须有人专门负责合规。'
- id: A15
  name: 解决方案与成功团队全包薪酬
  value: '160'
  unit: usdK_per_fte_year
  source: '[BP team] 集成和交易运营支持的薪酬低于核心工程，但高于通用支持岗位。'
- id: A16
  name: 销售与合作团队全包薪酬
  value: '180'
  unit: usdK_per_fte_year
  source: '[BP gtm.channels; startup-finance heuristic] 创始人主导销售加一名 GTM 负责人，薪酬按技术型企业销售水平建模。'
- id: A17
  name: 招聘节奏快照
  value: 4, 5, 6, 7, 8, 9
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale] 招聘保持精简，遵循计划：先搭核心产品，再补集成、GTM 和客户成功。'
- id: A18
  name: 非薪酬运营开支爬坡
  value: Y1 每月 28-38K；Y2 每季度 114-145K；Y3 每季度 160-165K
  unit: usdK
  source: '[BP operations; Research adoptionFrictionMatrix; startup-finance heuristic] 包括云成本、官方数据源费用、差旅、法务、认证和软件成本，同时尽量让部署保持产品化。'
- id: A19
  name: 现金桥接处理方式
  value: EBITDA 近似代表现金变动
  unit: policy
  source: '[Startup-finance heuristic] 在规模化之前，模型假设资本开支、债务服务和税负都可忽略，因此期末现金按期初现金加 EBITDA 滚动。'
- id: A20
  name: 费用归类口径
  value: 产品和交易计入 R&D；销售计入 S&M；合规与解决方案主要计入 G&A
  unit: policy
  source: '[BP team; BP operations] 让薪酬汇总与模型中的 P&L 科目保持一致。'
