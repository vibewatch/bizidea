scenarios:
  downside:
    description: 监管审查拖慢正式生产转化，伙伴渠道没能按时打开，公司在第 3 年结束时只有 6 家正式生产运营商。
    y3RevenueK: 1425.0
    y3EbitdaK: -1190.0
    cashLowPointK: -260.0
    keyAssumptionChanges:
    - 销售周期拉长到 9 个月。
    - 月流失率升到 3.0%。
    - Y2 末只有 3 家运营商，Y3 末只有 6 家。
  base:
    description: 一支精干、聚焦运营商的团队在 Y1 后段拿下首个转化，Y2 末做到 5 家正式生产运营商，并在 Y3 末走到计划中的 8 家运营商 SOM 路径。
    y3RevenueK: 2025.0
    y3EbitdaK: -772.5
    cashLowPointK: 617.5
    keyAssumptionChanges:
    - ACV 稳定在 $300K，毛利率 70%。
    - Y2 末达到 5 家运营商，Y3 末达到 8 家。
    - 招聘保持精简，到 Q4Y3 只有 9 名 FTE。
  upside:
    description: 案例验证缩短了销售周期，治理模块抬高了 ACV，公司在人员编制几乎不增加的前提下，略微跑赢基准采用路径。
    y3RevenueK: 2675.0
    y3EbitdaK: -240.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
    - 销售周期改善到 5 个月。
    - 通过治理和基准模块，综合 ACV 提升到 $325K。
    - Y3 末达到 10 家正式生产运营商。
