topRisks:
- name: 监管接受度
  description: 如果审批链路和结算逻辑不够可审计，监管方或运营商合规团队可能不会接受动态生成的合约。
  mitigation: 先从范围很窄的预审批合约模板目录做起，把人工交易员审批保留在环路里，并记录每一次生成和定价决策以便复核。
- name: 数据与结算可靠性
  description: 延迟、数据源错误或事件定义含糊，都会在比赛进行中带来错误定价或结算争议。
  mitigation: 使用官方数据源，把上线窗口限定在高置信度事件类型，并提供确定性的结算规则和自动化异常处理流程。
- name: 买方紧迫感被稀释
  description: 有些体育博彩运营商可能只把更丰富的滚球菜单当成锦上添花；如果现有厂商也能快速模仿，这类客户就会推迟采购。
  mitigation: 围绕单一项目里可量化的滚球投注额提升来卖，接进现有系统栈而不是要求整体替换，并先把 ROI 证出来再扩面。
