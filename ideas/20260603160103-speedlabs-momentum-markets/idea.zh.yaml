jobsToBeDone:
- job: 当比赛动量变化快到交易台来不及反应时，帮我立刻上线一份符合政策的五分钟新合约，这样我就能在不增加交易员的情况下拿到更多滚球投注额。
  currentAlternative: 给现有滚球玩法重新定价，或者干脆放过这个瞬间。
  successMetric: 单场滚球投注额提升，以及每场赛事成功上线且盈利的实时市场数量。
