differentiator: 现有滚球厂商大多帮运营商在固定菜单上改价格；这家公司要做的是把菜单本身生产出来。真正的切口不是泛化的体育 AI，而是一条很窄却很硬的工作流：把市场生成、政策闸门、交易员复核和结算逻辑打包进同一层面向运营商的系统里。这样一来，没有能力搭大型量化和交易组织的持牌中小运营商，也更可能真的部署第一版。如果跑通，公司拿下的就不是别人市场上的赔率，而是决定“什么能被交易”的生成层。
