problem: 中型体育博彩运营商在滚球业务里不是赢就是输，但它们的实盘系统至今仍围着预先写好的玩法和人工交易员干预在转。比赛一旦突然变盘，它们可以调赔率，却往往来不及新建、风控核查并结算全新的微型市场，抓不住那一刻的热度。结果就是投注额白白流失，也让中小运营商在事件供给的灵活度上显得比交易所和预测平台更老旧。
targetUser:
  primary: 持牌中型体育博彩运营商中负责滚球交易的负责人，重点做足球和篮球
  secondary: 正在把实时体育合约做起来的预测市场运营方产品负责人
  buyer: 体育博彩业务 VP 或交易总经理
startupThesis:
  nonObviousInsight: 实时体育里最难的已经不是给下一条盘口定价，而是要足够快地做出一个合规、能结算的市场对象，跟上球迷的注意力。只要体育专用模型能把合约本身写出来，没有顶级量化团队的运营商也能参战；他们要的不是又一条赔率源，而是一座专门做市场的工厂。
  beachhead: 滩头市场是欧洲和拉美的持牌体育博彩运营商：它们靠第三方滚球赔率源做足球和篮球，但内部没有量化团队来上线五分钟动量合约。
  wedge: 一套 API 加交易员控制台，把官方比赛数据事件转成预审批的五分钟动量合约，自动定价，并连同结算规则一起推送到运营商现有前端。
  whyNowCatalyst: 短周期事件合约的真实需求已经出现，而模型也开始能实时生成体育专用市场；对准备迎接下一轮体育赛季的运营商来说，动态造盘现在成了当务之急。
  ventureScalePath: 先从足球和篮球的动量合约切入，再扩成覆盖更多项目的完整市场生成层，往后叠加留存引擎、可供联盟营销使用的组件、自动风控，最终做成跨运营商的流动性与对冲网络。
solution: Momentum Market Factory 给体育博彩运营商的不是静态赔率源，而是一套实时市场生成 API。它会监听官方比赛数据，识别诸如“接下来五分钟属于 A 队”这类高确定性的动量时刻，按运营商政策打分，然后只发布那些已经过审批的合约模板，并附上定价和结算元数据。交易员仍保留覆盖权，但默认流程已经自动化到足以让一家中型运营商在每场比赛里新增几十个滚球合约，而不必养一整支大型交易台。产品先从足球和篮球起步，因为这两类比赛事件节奏快、数据结构化程度高、运营商本来就在这里吃到最多实时参与。往后，这套系统会变成真正决定“哪些瞬间值得被做成市场”的操作层。
goToMarketSeed:
  firstCustomer: 首个客户应是一家欧洲或拉美持牌的二线体育博彩运营商：它有可观的足球滚球投注额，依赖外包赔率源，同时被要求在下个大赛季前把滚球利润率拉上去。
  buyingTrigger: 触发采购的节点通常是滚球赔率供应合同续约，或者产品路线图要求在不增加交易员编制的前提下提高滚球投注额。
  currentAlternative: 人工交易台，加上现有赔率源厂商提供的预设滚球玩法模板。
  switchingReason: 运营商可以在不自建量化团队、也不替换整套体育博彩系统的前提下，拿到更多市场库存和更快的比赛动量响应。
  pricingHypothesis: 平台费加按量计费，计费基准可以是处理的实时事件数，或生成的动量合约对应的总投注额。
