modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified operator leads] --> Pilots[Paid pilots]
      Pilots --> Customers[Production operators]
      Customers --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by growing from 1 production operator at Y1 exit to 8 at Y3 exit on a flat $300K ACV.
  - checkName: Must go right
    finding: The company must turn the first operator case study into repeatable 6-month enterprise sales before Q4Y2 or the downside case forces another raise early.
  - checkName: Model breaks if
    finding: If regulatory approvals stretch sales cycles to 9 months and churn rises to 3%, cash turns negative before the model reaches the seed milestone.
  - checkName: Next-round proof
    finding: The pre-seed earns a seed story if it gets the company to 4-5 production operators with one repeatable connector and a credible compliance playbook.
sanityChecks:
  ruleOf40: "Y3 growth 138% + EBITDA margin -38% = 100%."
  burnMultiple: "Y2 burn multiple is about 1.1x using $1.27M EBITDA burn over $1.20M net new ARR from 1 to 5 production operators at $300K ACV."
  revenuePerFte: "$225K Y3 ($2.03M revenue / 9 Q4 FTE; benchmark roughly $200–400K SaaS)."
  flags:
    - Base case still assumes the company wins 8 of roughly 90 beachhead operators, so enterprise concentration risk remains high even if the SOM is achieved.
    - The model excludes implementation-fee revenue for conservatism, which understates upside but also hides how services-heavy onboarding could become if connectors are not repeatable.
    - EBITDA stays negative through Y3, so the company still needs a seed round or materially faster conversion to avoid operating with a thin cash cushion.
