scenarios:
  downside:
    description: >-
      Regulatory reviews slow production conversion, partner channels do not
      open on time, and the company exits Year 3 with only 6 production
      operators.
    y3RevenueK: 1425.0
    y3EbitdaK: -1190.0
    cashLowPointK: -260.0
    keyAssumptionChanges:
      - Sales cycle stretches to 9 months.
      - Monthly churn rises to 3.0%.
      - Y2 exits at 3 operators and Y3 exits at 6.
  base:
    description: >-
      A lean operator-focused team lands one late-Y1 conversion, exits Y2 at 5
      production operators, and reaches the planned 8-operator SOM path by Y3
      exit.
    y3RevenueK: 2025.0
    y3EbitdaK: -772.5
    cashLowPointK: 617.5
    keyAssumptionChanges:
      - ACV holds at $300K with 70% gross margin.
      - Y2 exits at 5 operators and Y3 exits at 8.
      - Hiring stays lean at 9 FTE by Q4Y3.
  upside:
    description: >-
      Case-study proof shortens sales cycles, governance modules lift ACV, and
      the company slightly outgrows the base adoption path without materially
      increasing headcount.
    y3RevenueK: 2675.0
    y3EbitdaK: -240.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
      - Sales cycle improves to 5 months.
      - Blended ACV rises to $325K through governance and benchmarking modules.
      - Y3 exits at 10 production operators.
