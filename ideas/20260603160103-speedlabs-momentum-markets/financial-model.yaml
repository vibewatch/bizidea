assumptions:
  - id: A1
    name: Starting cash at model start
    value: "4000"
    unit: usdK
    source: "[BP fundingAsk] Target raise is $2-4M for 18 months; model uses the top of range to fund a compliance-heavy build plus 6 months of buffer."
  - id: A2
    name: Starting customers (M1)
    value: "0"
    unit: count
    source: "[BP executiveSummary] Company starts pre-revenue and must first earn a paid operator deployment."
  - id: A3
    name: Production ACV per operator
    value: "300"
    unit: usdK_per_year
    source: "[BP market.som; BP investorMemo.firstCustomer] Year-3 SOM assumes about $300K ARR per operator and production pricing converts from a $250K-$350K band."
  - id: A4
    name: Monthly recurring revenue per active operator
    value: "25"
    unit: usdK_per_month
    source: "[A3] Revenue is recognized as ACV / 12; model excludes implementation-fee upside for conservatism."
  - id: A5
    name: Gross margin
    value: "70"
    unit: pct
    source: "[BP businessModel.targetGrossMarginPct] Target gross margin is 70%."
  - id: A6
    name: First recurring customer timing
    value: "M9"
    unit: month
    source: "[BP experimentRoadmap; BP milestones 0–12 months] First paid pilot goes live inside 90-180 days and first production conversion lands by the end of Year 1, so recurring revenue starts late in Y1."
  - id: A7
    name: Y2 quarter-end customers
    value: "2, 3, 4, 5"
    unit: count
    source: "[BP milestones 12–24 months] Model exits Y2 at 5 production operators, consistent with the 3-5 operator milestone range."
  - id: A8
    name: Y3 quarter-end customers
    value: "6, 7, 8, 8"
    unit: count
    source: "[BP milestones 24–36 months; Research market.som] Model reaches 8 production operators by Y3 exit, matching the researched SOM path rather than assuming share beyond the plan."
  - id: A9
    name: Average sales cycle
    value: "6"
    unit: months
    source: "[BP gtm.wedge; BP market.buyingProcess; Research adoptionFrictionMatrix] Regulated operator sales are modeled as a six-month multi-stakeholder enterprise process."
  - id: A10
    name: Fully loaded CAC
    value: "110"
    unit: usdK_per_customer
    source: "[Startup-finance heuristic: early regulated enterprise SaaS] Blends founder/AE time, travel, compliance diligence, and pilot closing cost for sportsbook operators."
  - id: A11
    name: Monthly churn
    value: "2.0"
    unit: pct
    source: "[BP mustBeTrue; startup-finance heuristic] Product should be sticky after integration, but early concentration and procurement risk justify a 2.0% monthly churn assumption."
  - id: A12
    name: Product engineering loaded salary
    value: "190"
    unit: usdK_per_fte_year
    source: "[Startup-finance heuristic: enterprise infrastructure engineering] Used for API, data, and connector engineers including payroll taxes and benefits."
  - id: A13
    name: Trading and ML loaded salary
    value: "220"
    unit: usdK_per_fte_year
    source: "[BP team] Specialized pricing and replay-validation talent is modeled above standard engineering cash comp."
  - id: A14
    name: Compliance and QA loaded salary
    value: "180"
    unit: usdK_per_fte_year
    source: "[BP team; Research regulatoryTechnicalConstraints] Early compliance ownership is mandatory in regulated betting infrastructure."
  - id: A15
    name: Solutions and success loaded salary
    value: "160"
    unit: usdK_per_fte_year
    source: "[BP team] Integration and trader-ops support sits below core engineering comp but above generic support staffing."
  - id: A16
    name: Sales and partnerships loaded salary
    value: "180"
    unit: usdK_per_fte_year
    source: "[BP gtm.channels; startup-finance heuristic] Founder-led sales plus one GTM lead are modeled at technical enterprise-sales compensation."
  - id: A17
    name: Hiring snapshots
    value: "4, 5, 6, 7, 8, 9"
    unit: fte
    source: "[BP team; BP strategicChoices.sequencingRationale] Hiring stays lean and follows the plan: core build first, then integrations, GTM, and customer success."
  - id: A18
    name: Non-payroll operating spend ramp
    value: "Y1 monthly 28-38K; Y2 quarterly 114-145K; Y3 quarterly 160-165K"
    unit: usdK
    source: "[BP operations; Research adoptionFrictionMatrix; startup-finance heuristic] Includes cloud, official-feed costs, travel, legal, certification, and software while keeping deployments productized."
  - id: A19
    name: Cash bridge treatment
    value: "EBITDA approximates cash movement"
    unit: policy
    source: "[Startup-finance heuristic] Model assumes negligible capex, debt service, and taxes before scale so ending cash rolls from starting cash plus EBITDA."
  - id: A20
    name: Opex bucket mapping
    value: "Product and trading to R&D; sales to S&M; compliance and solutions mainly to G&A"
    unit: policy
    source: "[BP team; BP operations] Keeps payroll roll-up consistent with the P&L buckets used in the model."
