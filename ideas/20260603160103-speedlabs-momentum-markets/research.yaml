  validationPlan:
  - priority: high
    question: Will Europe and LatAm tier-2 operators accept pre-approved template governance as sufficient for dynamically generated five-minute markets?
    evidenceToGather: Ten operator and compliance interviews plus two external legal memos covering template approval, suspension rules, and settlement review in target jurisdictions.
  - priority: high
    question: What handle uplift and margin quality do momentum contracts produce versus existing live props in soccer and basketball?
    evidenceToGather: A shadow pilot using official feed replays and one design-partner operator to compare contract volume, acceptance rate, and settlement exceptions against current live props.
  - priority: medium
