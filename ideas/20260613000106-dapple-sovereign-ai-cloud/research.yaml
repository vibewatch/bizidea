  searchedQueries:
  - Find authoritative recent sources on sovereign AI cloud, private AI infrastructure for regulated enterprises, and data residency requirements in EU APAC Middle East. Focus on official company pages, regulators, and major news from 2024-2026.
  - Find authoritative sources on private AI infrastructure offerings and sovereign cloud products from HPE, Dell, VMware, Nutanix, NVIDIA, AWS, Azure, and Google Cloud, including pricing or product pages where available.
  - 'Find official regulatory and policy sources relevant to in-country AI deployment and data residency: GDPR/EDPB, EU AI Act, NIS2, Singapore PDPA or MAS guidance, India DPDP Act, Saudi PDPL, and health-sector privacy rules.'
  - Find official sources for the number of ECB supervised significant institutions or banks in the euro area, and any official EU count of credit institutions or banks relevant to regulated financial institutions.
  - Find official sources for numbers of licensed banks or regulated banks in Singapore, Hong Kong, Saudi Arabia, and UAE, plus official lists or statistics pages.
  - Find authoritative surveys or official sources about AI adoption, data residency, or cloud risk in banking and regulated enterprises, especially in EU or APAC, 2024-2026.
  - Find official EBA or ECB guidance on cloud outsourcing, ICT risk, or operational resilience relevant to banks using cloud or AI.
  - Find official ENISA or EU sources on data localization, cloud security, or sovereignty relevant to regulated cloud deployments.
  - official VMware Private AI Foundation with NVIDIA product page current URL
  - official Nutanix enterprise AI or GPT-in-a-Box product page current URL
