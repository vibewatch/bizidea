  validationPlan:
  - priority: high
    question: How many target banks already operate dedicated GPU clusters or private AI enclaves?
    evidenceToGather: Partner interviews with OEMs, colos, and bank infrastructure teams plus deployment-reference counts by region.
  - priority: high
    question: What audit artifacts do bank supervisors or internal audit functions ask for most often on AI infrastructure?
    evidenceToGather: Redacted audit requests, consulting playbooks, and customer discovery with compliance teams.
  - priority: medium
    question: Can a vendor-neutral attestation layer integrate deeply enough with SIEM/GRC systems to replace spreadsheet-based evidence packs?
    evidenceToGather: Prototype integrations with at least one SIEM, one ticketing system, and one GRC repository.
