  pricing: Sovereignty pricing is not public on cited pages.
  strength: Deep enterprise trust, identity stack, and broad hybrid-control footprint.
  weaknessVsUs: Best fit when the customer standardizes on Azure; not purpose-built as an auditor-first attestation layer across mixed hardware estates.
