  baseCase: 基础情景：路径为 6-7 个月
  upsideCase: 上行情景：路径缩短到 4-5 个月
  y3RevenueImpactK: 450.0
  cashImpactK: 280.0
- variable: 毛利率
  downsideCase: 下行情景：因定制实施更重，毛利率只有 65%
  baseCase: 基础情景：毛利率 70%
  upsideCase: 上行情景：因连接器复用更高，毛利率 73%
  y3RevenueImpactK: 0.0
  cashImpactK: 164.3
- variable: 招聘节奏
  downsideCase: 下行情景：两个非关键 GTM 和支持岗位提前两个季度招聘
  baseCase: 基础情景：到 Q4Y3 以精简方式爬坡到 11 FTE
  upsideCase: 上行情景：公司把一个支持岗位推迟到第二辖区验证后再招
  y3RevenueImpactK: 90.0
  cashImpactK: 180.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Audits[Audit and remediation triggers] --> Pilots[Paid pilot and hardening motion]\n  Pilots --> Customers[Production bank subscriptions]\n  Customers --> Clusters[1.2 managed clusters per bank]\n  Clusters --> Revenue[Subscription revenue]\n  Revenue --> GrossProfit[70% gross profit]\n  GrossProfit --> Cash[Cash and runway]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景的核心，是把由合规触发的试点转成每年约 $120K 的正式账户，并从 Y2 退出时的 18 个客户继续复利到 Q4Y3 的 35 个。
- checkName: 必须做对的事
  finding: 产品必须足够产品化，才能守住 70% 毛利率；同时在首批正式案例出来后，至少有一条附着式或咨询渠道，能稳定缩短银行销售周期。
- checkName: 模型会失效，如果
  finding: 如果真正拥有可接入私有集群的银行太少，而定制集成又把毛利率拖向 65%，下行情景会把现金压到接近过桥融资区间。
- checkName: 下一轮验证点
  finding: Y2 结束时做到 18 个正式客户、1 个可复用的 APAC 辖区包，以及 1 条有效伙伴渠道，是最清晰的 seed 轮跳升里程碑。
sanityChecks:
  ruleOf40: Y3 增长率 180.8% + EBITDA 利润率 8.7% = 189.5%。
  burnMultiple: Y2 burn multiple 约为 0.4x（4 个客户增至 18 个客户，对应约 $1.68M 的净新增 ARR，而 EBITDA 消耗约 $709K）；Y3 在 EBITDA 口径上转为现金自生成。
  revenuePerFte: 按 Q4Y3 的 11 FTE 计算，Y3 人均收入约 $299K（新兴 SaaS 的参考区间大约是 $200-400K）。
  flags:
  - 基础情景仍假设客户数会从 Y2 退出时的 18 个快速跳到 Y3 退出时的 35 个，因此伙伴可信度和辖区包复用必须按计划到位。
  - 模型有意排除了试点和 onboarding 收入，这让早期结果更保守，但如果试点在转正式前就能顺利变现，也可能低估商业牵引。
  - 只有当实施范围足够收窄、可复用时，毛利率才能守住；如果安全或监管映射工作高度定制化，公司就会滑向重服务业务。
