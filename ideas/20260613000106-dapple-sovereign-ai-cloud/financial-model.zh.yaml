slug: sovereign-cluster-autopilot
date: '2026-06-13'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date] 取自 2026-06-13 business-plan 日期后的第一个完整月份。'
- id: A2
  name: 期初现金 / pre-seed 融资额
  value: $2.3M
  unit: usdM
  source: '[BP fundingAsk] 商业计划目标是 $2-4M 的 pre-seed；模型取 $2.3M，因为这样既能达到 Y2 验证里程碑，又大致还能保留 6 个月缓冲。'
- id: A3
  name: 起始正式生产客户数（M1）
  value: '0'
  unit: count
  source: '[BP executiveSummary; BP milestones] 模型起点假设没有正式订阅客户，因为前 12 个月仍在验证付费试点和首批转化。'
- id: A4
  name: 稳定期单个正式银行客户年 ARPU
  value: $120.0K per customer-year
  unit: usdK_per_customer_year
  source: '[BP gtm.pricing; BP market.som; research.market.som] SOM 反推显示，每个客户约对应 1.2 个受管集群、每集群约 $100K ARR，因此每个正式银行账户约 $120K ARR。'
- id: A5
  name: 保守收入确认口径
  value: 基础 P&L 只确认订阅收入，不计单独的试点费和 onboarding 费
  unit: method
  source: '[BP gtm.pricing; BP businessModel.revenueStreams] 商业计划里包含付费试点和 onboarding 费用，但基础情景故意不计入，以免一次性服务把收入修饰得太好看。'
- id: A6
  name: 第 1 年正式客户爬坡
  value: M1-M12 customersEop = 0, 0, 0, 0, 1, 1, 1, 2, 2, 3, 3, 4
  unit: customers
  source: '[BP product.sixMonth; BP milestones 0-12 months; BP experimentRoadmap] 这里假设试点在第 4 个月后开始转正，基础情景下第 12 个月有 4 个正式账户上线。'
- id: A7
  name: 第 2 年和第 3 年客户爬坡
  value: Q1Y2-Q4Y3 customersEop = 6, 9, 13, 18, 23, 28, 32, 35
  unit: customers
  source: '[BP milestones; BP market.som; research.market.som] 这一爬坡在不假设滩头市场完全饱和的前提下，于第 3 年达到商业计划里的约 35 个正式客户。'
- id: A8
  name: 收入确认时点
  value: 新转成正式生产的账户，在其转化所在季度或月份大致确认半个期间的收入
  unit: method
  source: '[BP gtm.funnelTargets; BP investorMemo.nextDiligence] 模型按中点确认转化，因为银行通常是在试点复盘后签约，而不是在某个期间第一天全部生效。'
- id: A9
  name: 目标毛利率
  value: 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 模型把 COGS 设为收入的 30%，对应商业计划里的目标毛利结构。'
- id: A10
  name: 月流失率
  value: 1.5%
  unit: percent
  source: 面向受监管银行销售合规基础设施的软件创业财务经验值：一旦部署，留存应当很强，但早期产品风险和厂商打包风险仍会带来非零客户流失。
- id: A11
  name: 完全摊销 CAC
  value: $40.0K per production customer
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; BP operatingAssumptions] 创始人主导的企业销售加上伙伴转介，应能把 CAC 压在大型企业软件平均水平以下；但每家银行仍需要长周期验证、安全评审和实施支持。'
- id: A12
  name: 全负荷薪酬带宽
  value: Founder CEO $120K; engineering $150K; compliance product $140K; solutions engineering $120K; sales or partnerships $130K; G&A or ops $90K; customer success $110K
  unit: usdK_per_fte_year
  source: 这是一个精简、风投支持的基础设施软件团队的创业财务经验值：现金薪酬低于上市公司，但会配较多股权。
- id: A13
  name: 人员爬坡快照
  value: Founder CEO 1/1/1/1/1/1；engineering 1/1/1/2/3/3；compliance product 1/1/1/1/1/1；solutions engineering 0/1/1/1/1/2；sales or partnerships 0/0/0/1/1/2；G&A or ops 0/0/0/0/1/1；customer success 0/0/0/0/0/1，分别对应 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale] 模型遵循商业计划的顺序：先补产品和合规招聘，再补方案支持，等正式验证出现后才放大 GTM。'
- id: A14
  name: Y2 和 Y3 薪酬平滑
  value: 季度薪酬费用会在 Q4Y1、Q4Y2 和 Q4Y3 的快照之间逐步爬坡，而不是只在年末跳变
  unit: method
  source: '[Financial Modeler instructions] 薪酬费用线会在要求的快照列之间平滑处理，让逐季度招聘曲线更可信。'
- id: A15
  name: 非薪酬运营预算
  value: Y1 monthly S&M $8K-$12K, R&D $12K-$16K, G&A $8K-$10K; Y2 quarterly S&M $45K-$75K, R&D $45K-$55K, G&A $27K-$36K; Y3 quarterly S&M $84K-$102K, R&D $54K-$60K, G&A $36K-$42K
  unit: usdK
  source: '[BP operations; BP fundingAsk.useOfFundsSummary] 预算保持精简，只覆盖顾问差旅、云/安全工具，以及企业法务或合规开销，不假设 pre-seed 阶段就搭大规模外勤团队。'
- id: A16
  name: 现金滚动约定
  value: 期末现金 = 期初现金 + EBITDA
  unit: method
  source: 这是轻资产软件公司的创业财务经验值：现阶段债务、CapEx、税和营运资本波动都可以视为不重要。
- id: A17
  name: 下行与上行情景变动
  value: 下行情景使用 Q4Y3 26 个客户、65% 毛利率和 2.0% 月流失率；上行情景使用 Q4Y3 42 个客户、72% 毛利率和 1.0% 月流失率
  unit: scenario_inputs
  source: '[BP risks; research.reportMemo.sensitivityCases] 这组情景直接映射两个关键不确定性：到底有多少银行拥有可接入的私有集群，以及合规层相对打包式基础设施能拉开多大差异化。'
