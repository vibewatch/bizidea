scenarios:
  downside:
    description: 集群附着机会出现得更慢，试点转正更晚，部署也比计划更偏重服务交付。
    y3RevenueK: 2430.0
    y3EbitdaK: -310.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - Q4Y3 客户数做到 26，而不是 35。
    - 毛利率停在 65%，而不是 70%。
    - 月流失率升到 2.0%。
    - 伙伴带来的 pipeline 大致延后两个季度。
  base:
    description: 创始人主导的试点顺利转成正式订阅，首条附着式或咨询渠道在 Y2 验证点出现后开始放大。
    y3RevenueK: 3285.0
    y3EbitdaK: 287.2
    cashLowPointK: 723.9
    keyAssumptionChanges:
    - Q4Y3 客户数做到 35。
    - 单个正式客户年 ARPU 稳定在约 $120K。
    - 毛利率达到商业计划目标的 70%。
    - Q4Y3 团队规模达到 11 FTE。
  upside:
    description: 银行更快扩到第二个集群，APAC 辖区包复用效果更好，渠道伙伴也缩短了从试点到正式的时间。
    y3RevenueK: 4050.0
    y3EbitdaK: 640.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
    - Q4Y3 客户数做到 42，而不是 35。
    - 毛利率提升到 72%。
    - 月流失率改善到 1.0%。
    - 试点转正式的时间大约缩短一个季度。
