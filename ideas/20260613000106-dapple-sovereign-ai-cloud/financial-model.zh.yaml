  upsideCase: 上行情景：每个正式客户年收入 $132K
  y3RevenueImpactK: 328.5
  cashImpactK: 230.0
- variable: CAC
  downsideCase: 下行情景：完全摊销 CAC 为 $50K，因为更多交易需要创始人和伙伴直接投入
  baseCase: 基础情景：完全摊销 CAC 为 $40K
  upsideCase: 上行情景：若附着式伙伴带来更高意向试点，CAC 降到 $30K
  y3RevenueImpactK: 0.0
  cashImpactK: 140.0
