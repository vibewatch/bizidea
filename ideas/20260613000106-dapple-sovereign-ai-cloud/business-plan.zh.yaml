slug: sovereign-cluster-autopilot
date: '2026-06-13'
executiveSummary: Sovereign Cluster Autopilot 应该以厂商中立的合规控制平面切入，服务那些已经部署或正在采购专用 AI 基础设施的受监管银行，而不是再做一个私有 AI 平台或托管 GPU 云。首个客户应是一家 EU 二线银行：已经有本地或机房托管 GPU 集群，手上有活跃的审计或监管发现，但还没有持续证明 AI 工作负载在驻留、访问和策略层面合规的办法。产品切口是一套一天内完成加固和证据产出的工作流，把现有集群变成审计就绪环境，并持续输出合规证明、证据链路和可导出报告，供安全与合规团队使用。研究支持这个痛点触发点，因为云外包、运营韧性和 AI 治理审查，已经让证据产出变成银行内部有预算支持的整改项目。公司在启动阶段应明确避开算力、模型托管或泛 MLOps 编排——这些预算已经被现有厂商占住，真正更锋利的预算触发点，是正在推进中的基础设施需要做合规整改。最大的战略下注在于：目标银行里，已经有足够多的私有 AI 容量或近期集群项目，足以支撑一个软件附着式打法。最大的反证风险不是产品做不出来，而是市场是否就绪：如果真正上线集群的银行太少，或者厂商原生的主权方案已经“够用”，这个切口会很快被压扁。这是个可信的 pre-seed 机会，ACV 做到六位数有现实基础，但在 EU 银行业务之外扩张之前，公司必须先证明附着率、试点转正式，以及辖区包复用能力。
problem:
- 采用专用基础设施跑 AI 的受监管银行，今天仍要把 Terraform、策略工具、SIEM 日志、顾问工作底稿和电子表格拼在一起，才能证明数据驻留、访问控制和运行时合规。
- 这种碎片化工作流会把每一次审计、监管复核或新工作负载上线，都拖成一个缓慢的整改项目——哪怕底层集群早就已经存在。
solution:
- 提供一个厂商中立的控制平面：先把集群基线加固，再持续把运行时状态对照辖区和行业策略检查，最后输出审计方能直接阅读的证据包。
- 接入银行现有的身份、SIEM、Kubernetes 和基础设施自动化栈，让银行不用更换硬件供应商、也不用迁移工作负载，就能把现在的私有集群变成审计就绪环境。
whyWeWin:
- 公司瞄准的是基础设施采购之上的那个有预算的痛点：客户集群已经买了，或者正在买，真正缺的是怎么持续证明它合规。
- 护城河会随着辖区专属控制包、跨审计周期积累的证据链路，以及可信集成能力一起加深；这些都比单纯的 policy-as-code 更难复制。
strategicChoices:
  beachhead: 处在云外包、DORA 或 AI 治理审查中的 EU 二线银行，而且已经在运行或采购 1–3 个专用 AI 集群。
  wedgeRationale: 这个滩头市场有明确预算触发点、买方集中、控制要求也更容易标准化。相比一开始就打医疗、政府或泛企业 AI，银行能更快给出验证：它们本来就要面对正式审计，有明确控制责任人，只要能明显缩短证据收集时间、降低整改风险，就能合理支付六位数预算。
  sequencingRationale: 产品应该先从 EU 银行业务里的集群加固、策略包和证据导出做起，因为这里是“紧迫性、数据驻留、可审计性”交叉最窄也最清晰的一条工作流。GTM 先保持创始人主导销售，围绕共创客户和交付纪律打磨，在规模化销售前把产品证明跑通；招聘上先补产品、合规映射和方案交付，再考虑更广的伙伴拓展。等一个区域先证明辖区策略可复用、试点能顺利转正式，再谈地域和垂直扩张。
  notYet:
  - 托管 GPU 主机业务，或转售主权云容量
  - 面向没有私有集群团队的通用模型治理套件
  - 在 EU 银行生产环境验证之前就扩张到医疗和政府
  - 在合规切口尚未守住之前，就做跨集群调度和成本优化模块
market:
  tam: 估算 TAM 为 $1.1B：长期看大约有 3,600 家受监管企业会需要主权/私有 AI 控制平面，按每家约 2.5 个受管集群、每集群每年约 $120k 软件支出计算。
  sam: 估算 SAM 为 $72.0M：未来三年里，大约有 450 家 EU、APAC 和 GCC 的受监管银行会把主权 AI 集群真正运转起来，按每家约 1.6 个集群、每集群约 $100k ARR 计算。
  som: 估算第 3 年 SOM 为 $4.2M：按 35 个客户、每家约 1.2 个受管集群、每集群约 $100k ARR 计算。
  segments:
  - 在欧元区和周边 APAC 金融中心运行或采购专用 AI 集群的二线、三线银行
  - 后续同样需要在私有 AI 基础设施上满足驻留和审计控制的医疗系统与政府周边运营方
  buyingProcess: 购买流程通常始于一次审计发现、监管要求，或私有 AI 部署项目，暴露出驻留、访问或控制漂移证据缺失。平台负责人和安全架构团队先看技术适配，随后由合规、采购和风控团队评估证据模型；最终拍板的通常是 CISO 或基础设施负责人。
product:
  mvp: MVP 先做 EU 银行优先的控制平面：加固一个基于 Kubernetes 的 GPU 集群，把运行时状态映射到一小组高优先级的银行业与数据驻留控制项，再导出带链路溯源、审计方能直接阅读的证据。它应该接入客户现有环境里的一套身份系统、一套 SIEM，以及最主流的 IaC 或策略工具，而不是替换客户已有平台。
  sixMonth: 在 EU 银行里部署 2–3 个付费共创试点，交付 EU 银行业策略包，支持活跃审计的证据导出，并证明一个集群能在 30 天内变成审计就绪环境。
  twelveMonth: 把首批试点转成正式订阅，补齐主流 SIEM、SSO 和工单系统的可复用连接器，并在不跳出银行业的前提下，把策略覆盖扩到一个 APAC 辖区包。
  twentyFourMonth: 成为单个客户多个集群持续合规证明的记录系统，补上审批工作流和整改跟踪等相邻模块，并通过伙伴有选择地扩到医疗或 GCC 主权部署。
  keyBets:
  - 目标银行里，已经有足够多的私有 AI 集群或已获预算的集群项目，能支撑附着式 SaaS 生意。
  - 只要证据链路、人工复核点和导出格式足够清楚，合规团队会信任自动化证据。
  - 一个聚焦 EU 银行业的窄控制库，能在辖区碎片化拖垮交付能力之前，先在足够多客户里复用起来。
  - 试点价值会体现在证据产出更快、整改工作更少，而不是泛 AI 平台功能更全。
gtm:
  wedge: 先把一个带有活跃监管或内部审计发现的银行，卖成付费合规缺口审计 + 加固试点；再把那套集群转成银行默认的、可持续输出合规证明的私有 AI 环境。
  channels:
  - 创始人主导，直销受监管银行里的 CISO、基础设施负责人和 AI 平台负责人
  - 与已经深度参与整改项目的云风险、审计和监管咨询机构合作，做转介和交付
  - 与交付专用集群项目的 OEM、机房托管商和主权云运营方做附着式合作
  funnelTargets: 目标账户→合格试点 20–30%；合格试点→付费试点 35–45%；付费试点→正式合同 50%+；正式客户→第二集群或第二辖区扩张在 12 个月内做到 40%+。
  pricing: 先卖一个 $25k–75k 的付费审计与加固试点，再转成每个受管集群每年约 $80k–150k 的订阅费，加上 onboarding 费用。买方比较的不是 seat 数，而是顾问主导整改、反复审计准备和工作负载上线延误的成本。
businessModel:
  revenueStreams:
  - 按受管合规集群收取年度订阅费
  - 一次性 onboarding 与框架映射费用
  - 整改工作流、多集群组合视图，以及后续跨辖区策略包等高级模块
  unitOfValue: 处于持续合规证明之下的专用 AI 集群
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一家银行账户里加第二、第三个集群
  - 销售更多辖区包和行业控制库
  - 从合规证明延伸到整改工作流和审批记录系统
  - 先在银行落地，再通过伙伴把同一套控制模型扩到医疗和政府账户
strategyMap:
  northStarMetric: 处于持续合规证明下的生产环境 AI 集群数
  inputMetrics:
  - 带有活跃审计或监管触发点的付费试点签约数
  - 从拿到集群访问权限到产出首个审计就绪证据包的中位时长
  - 试点转正式的转化率
  - 无需手工收集证据即可持续通过的策略检查占比
  - 每个正式客户平均集群数
  - 至少在 3 个账户里复用的辖区包数量
  moatsToBuild:
  - 面向受监管私有 AI 环境的辖区专属控制与证据库
  - 把漂移、整改、审批和审计输出串起来的历史证据图谱
  - 覆盖混合厂商环境下的身份、SIEM、Kubernetes 和基础设施自动化的可信集成层
  killCriteria:
  - 聚焦创始人主导销售 9 个月、触达 40+ 合格账户后，付费银行试点仍少于 2 个
  - 不到 50% 的试点能转正式，因为手工证据包对客户来说依旧“够用”
  - 前 5 个部署里，大多数都要花超过 60 天或大量定制工程才能交付
  - 增加第二个辖区包时，可复用的核心控制对象少于 60%
  mermaid: "flowchart LR\n  Wedge[Bank compliance wedge] --> MVP[Audit-ready cluster MVP]\n  MVP --> Proof[Faster evidence and production proof]\n  Proof --> Expansion[More clusters, more jurisdictions, more verticals]\n"
investorMemo:
  verdict:
    call: 值得见面 / 继续深挖
    conviction: 痛点可信，首个切口也足够锋利；但能有多大把握，还取决于到底有多少银行已经拥有可接入的私有 AI 集群。
    whyBelieve: 公司卖的是一个有预算支持的整改工作流。银行本来就要面对明确的数据驻留、外包和 AI 治理证据负担，而现有厂商无法在混合基础设施上把这件事干净地做完。
    whyDoubt: 如果集群采用率比预期薄，或者厂商原生的主权栈已经足够满足审计要求，这个独立软件切口可能永远做不大。
    nextDiligence: 先证明一个付费银行试点，能转成六位数正式合同，显著缩短审计准备时间，并且存在可信的第二集群扩张路径。
  firstCustomer:
    title: 欧元区二线银行里由 CISO 赞助的 AI 基础设施项目
    profile: 一家受监管银行，已经有或刚采购了本地/机房托管 GPU 集群，平台团队不大，但正急着为 AI 工作负载补齐驻留、访问和控制态势文档。
    trigger: 一次监管要求、内部审计发现，或生产级 AI 上线，让银行暴露出自己无法及时为私有 AI 环境产出证据。
    buyer: 首席信息安全官或基础设施负责人
    initialContract: 先签一个 $25k–75k 的付费试点，对一个集群做加固和合规证明；一旦被采纳为默认证据层，再转成每集群每年约 $80k–150k 的订阅，加上 onboarding 费用。
  mustBeTrue:
  - 至少一半的合格目标银行，必须已经上线或将在未来 12 个月内启动有预算的专用 AI 集群项目。
  - 一个付费试点，必须把审计证据准备时间相对客户当前手工流程压缩至少 50%。
  - 至少 50% 的付费试点，必须能转成每集群 ARR 高于 $80k 的正式订阅。
  - 一套 EU 银行业控制库，必须能在至少 3 个银行账户里复用，而不需要定制重建。
  - 至少一个附着式伙伴渠道，必须在第 12 个月前比创始人主动外拓更快地产出合格试点。
  diligenceQuestions:
  - 目标银行里，到底有多少已经在运行或明确采购私有 AI 集群，而不是继续依赖超大规模云厂商的推理服务？
  - 最能触发预算的审计证据到底是什么：驻留证明、访问日志、整改工作流，还是外包控制？
  - 什么样的证据格式和复核流程，才能让合规团队愿意信自动化，而不是继续依赖顾问和电子表格？
  - 为什么银行要买这一层，而不是继续扩展 Azure、Oracle、Nutanix、Red Hat，或自己的内部 DevSecOps 栈？
  - OEM、机房托管或咨询伙伴，能否加速分发，同时又不把公司拖进低毛利的定制交付？
operatingAssumptions:
- assumption: 目标银行里，已经有足够多的专用 AI 集群，或正在积极采购这类集群，足以让附着式 GTM 成立。
  basis: research.yaml
  validationTest: 访谈 12–15 位目标银行基础设施负责人，再加上 5 家 OEM 或机房托管伙伴；确认滩头区域至少有 8 个近期集群项目。
  decisionImpact: 如果不成立，就把范围收窄到由伙伴驱动的绿地集群项目，或者直接放弃独立控制平面的命题。
- assumption: 只要证据链路和人工复核检查点足够明确，合规团队就会接受自动化合规证明。
  basis: research.yaml
  validationTest: 和 3 个银行合规团队做设计评审，在正式大规模开发前拿到一套试点证据包的书面验收标准。
  decisionImpact: 如果不成立，就把产品重心转向工作流编排和证据拼装，而不是自动化合规声明。
- assumption: EU 银行业控制包能覆盖足够多的高价值检查项，在跨辖区扩张前就先证明 ROI。
  basis: idea.yaml
  validationTest: 把 MVP 反向映射到 10 份近期审计请求或控制问题上，证明一套库能覆盖至少 70% 的高频证据需求。
  decisionImpact: 如果不成立，就降低地域野心，先卖一个更窄的单框架模块。
- assumption: 实施过程必须足够产品化，才能把软件毛利率守在 70% 以上。
  basis: operator judgment
  validationTest: 跟踪前 5 个试点的部署工时、伙伴转包和定制集成工作；标准化工作至少应占交付价值的 70%。
  decisionImpact: 如果不成立，就提高价格、收窄支持栈，并在安装面收紧之前推迟销售招聘。
- assumption: 附着式伙伴能带来合格机会，而不是拿走大部分经济价值。
  basis: research.yaml
  validationTest: 签下 2 份试点转介或附着式合作协议，并在前 12 个月内确认至少 3 个毛利结构可接受的合格引荐。
  decisionImpact: 如果不成立，就让 GTM 继续以直销为主，把伙伴仅视为实施支持。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 集群就绪度与买方普查
  hypothesis: 滩头市场里，真正有集群项目且证据痛点明确的银行足够多，能支撑一条聚焦的创始人主导销售路径。
  successMetric: 完成 12+ 场合格银行访谈、5 场伙伴访谈，并在欧元区滩头市场里锁定 8 个有名有姓的近期集群机会。
  owner: CEO
- horizon: 0–90 天
  experiment: 证据包设计评审
  hypothesis: 只要链路和导出格式符合当前审计做法，合规团队会信任一条收窄后的自动化证据工作流。
  successMetric: 3 个银行合规团队认可一版证据结构草案，其中 1 个同意用真实控制集做试点。
  owner: 合规产品负责人
- horizon: 90–180 天
  experiment: 首个付费加固与合规证明试点
  hypothesis: 一家存在活跃审计发现的银行，会愿意为一个集群的加固和持续合规证明付费，而不是继续靠顾问手工收证据。
  successMetric: 签下 1 个高于 $25k 的付费试点，明确买方、集群范围，并在 45 天内上线。
  owner: CEO
- horizon: 90–180 天
  experiment: 核心集成包
  hypothesis: 一套身份集成、一套 SIEM 集成，再加一套 IaC 或策略连接器，就足以支撑首批可重复部署。
  successMetric: 2 个试点环境用同样 3 个核心连接器上线，按部署工作量计算，定制代码占比低于 20%。
  owner: 创始工程师
- horizon: 180–365 天
  experiment: 试点转正式
  hypothesis: 只要审计准备时间明显下降，银行就会把一个试点集群转成年费订阅，并扩展到相邻工作负载。
  successMetric: 至少 1 个试点在结果复盘后 60 天内，转成 ARR 高于 $80k 的 12 个月合同。
  owner: CEO
- horizon: 180–365 天
  experiment: 第二辖区包复用测试
  hypothesis: 同一套控制对象模型，能在不定制重建的前提下支撑一个 APAC 银行业辖区。
  successMetric: 第二个辖区包里，至少 60% 的控制对象和证据结构能复用第一个辖区的成果。
  owner: 合规产品负责人
operations:
- 维护一个带版本管理的辖区包、证据映射和控制测试库，并明确 owner 与复核节奏。
- 每个试点都走结构化实施复盘，把缺失的集成、手工步骤和不可复用工作回灌到产品优先级。
- 销售阶段判断要绑定审计发现、集群就绪度和明确经济买方，而不是泛化的企业线索打分。
- 监管解释和框架验证交给长期合作的顾问伙伴，证据收集与合规证明逻辑则留在软件里。
- 逐集群跟踪部署、支持和异常处理工时，在毛利被侵蚀前就看清服务化膨胀。
team:
- role: 创始人 / CEO
  startTiming: Month 0
  rationale: 负责创始人主导销售、银行调研和伙伴拓展，因为首批客户集中而且由触发事件驱动。
- role: 创始工程师
  startTiming: Month 0
  rationale: 搭建控制平面、证据引擎和核心集成，决定部署能否保持产品化。
- role: 合规产品负责人
  startTiming: Month 1
  rationale: 把银行控制项和辖区要求翻成可复用证据包，而不是做成定制咨询交付物。
- role: 方案工程师
  startTiming: Month 4
  rationale: 减轻创始人的实施负担，缩短从试点签约到集群上线的时间。
- role: GTM 负责人
  startTiming: Month 9
  rationale: 只有在首个生产级参考客户出现后，才开始搭建可重复的外拓和伙伴渠道动作。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2–3 个与活跃审计或监管触发点绑定的付费银行试点。
  - 部署 1 个具备持续合规证明和证据导出的 EU 银行业生产就绪集群。
  - 在首个生产客户身上，把审计准备时间至少压缩 50%。
  - 至少把 1 个试点转成六位数年化订阅。
- horizon: 12–24 个月
  items:
  - 在 2 个正式银行账户内支持多集群部署。
  - 上线 1 个可复用的第二辖区银行包，控制对象复用率至少 60%。
  - 建立 1 条能稳定贡献合格 pipeline 的附着式或咨询渠道。
  - 把标准化软件和可重复 onboarding 稳定维持在目标毛利结构之上。
- horizon: 24–36 个月
  items:
  - 做到约 35 个正式客户，并达到约 $4.2M 的 ARR 等价 SOM 规模假设。
  - 用同一套证据架构，有选择地扩到医疗或 GCC 主权部署。
  - 补上整改工作流和组合层控制能力，同时不变成泛私有云平台。
risks:
- risk: 可接入的私有 AI 集群在目标银行里太少，可触达市场会明显收缩。
  likelihood: High
  impact: High
  mitigation: 只筛选那些有明确集群项目的账户，同时建设 OEM、机房托管和主权云渠道，让产品附着到已经在部署中的基础设施上。
- risk: 厂商原生的主权栈或私有 AI 栈，打包的证明能力已经足够，让独立软件层变得没必要。
  likelihood: Medium
  impact: High
  mitigation: 坚持跨厂商、审计优先、证据原生，专注那些混合环境里厂商工具只管自己栈边界的空白地带。
- risk: 辖区碎片化会把控制包维护拖成一个重服务型业务。
  likelihood: Medium
  impact: High
  mitigation: 启动阶段先限定在 EU 银行业，按模块交付辖区包，在新增地区前先要求可量化的复用结果。
- risk: 企业销售与安全审查周期，可能会跑赢 18 个月的 pre-seed 跑道。
  likelihood: Medium
  impact: High
  mitigation: 优先切入正在发生的整改事件，把试点定价成有预算支持的缺口审计项目，并在拿下首个正式转化前推迟非关键招聘。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 覆盖 18 个月的创始人主导销售、核心产品和合规包开发、首批银行试点，以及把单集群试点转成可重复正式订阅所需的方案交付能力。
