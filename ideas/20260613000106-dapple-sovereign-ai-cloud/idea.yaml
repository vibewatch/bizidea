      The addressable market spans financial services, healthcare, and government globally; adjacent
      expansion into workload scheduling and cost metering can compound ARR significantly beyond the
      compliance wedge.
topRisks:
  - name: Regulatory fragmentation
    description: >-
      Compliance requirements vary materially across EU, APAC, and the Middle East, making framework
      maintenance expensive and error-prone as regulations evolve and diverge.
    mitigation: >-
      Build a modular framework library with structured community and partner contributions, and engage
      local regulatory advisory firms in each target jurisdiction to validate and maintain mappings.
  - name: Bundling by hardware vendors
    description: >-
      Dapple or a hyperscaler could add native compliance-attestation tooling to their dedicated cloud
      offerings, compressing the addressable market for a standalone product.
    mitigation: >-
      Focus on infrastructure-agnostic multi-vendor support and deep regulatory-framework specificity
      that vendor-bundled tools will not prioritise, and lock in early anchor customers before bundled
      alternatives mature.
  - name: Long enterprise sales cycles
    description: >-
      Regulated enterprise buyers have 9–18 month procurement cycles, making early revenue growth
      difficult and extending runway requirements substantially.
    mitigation: >-
      Offer a no-cost 30-day compliance-gap audit as a paid pilot entry point, targeting customers with
      an active audit finding or regulatory examination to compress decision timelines.
