jobsToBeDone:
  - job: >-
      When we receive an AI governance audit finding, help our CISO demonstrate that all AI workloads
      are running in compliant, data-resident infrastructure so we can satisfy regulators without a
      six-month remediation project.
    currentAlternative: Manual spreadsheet-based compliance evidence collection supported by external consultants
    successMetric: Compliance attestation report generated and delivered within 24 hours of an audit request
  - job: >-
      When we want to onboard a new AI model to our on-prem cluster, help our AI platform team
      provision and harden the environment in days not months so we can move faster than the compliance
      backlog.
    currentAlternative: Manual Terraform scripts plus ad-hoc OPA policies assembled by a small internal DevOps team
    successMetric: New AI workload environment provisioned, scanned, and approved by compliance in under 48 hours
