  wedgeClarity:
    score: 4
    rationale: >-
      The first product — automated provisioning and compliance attestation for on-prem AI clusters —
      is specific and actionable with a clear buyer, trigger, and current alternative.
  defensibility:
    score: 3
    rationale: >-
      Compliance framework library and integrations create switching costs, but the core tooling
