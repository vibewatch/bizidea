problem: >-
  Regulated enterprises in financial services, healthcare, and government must run AI workloads
  within specific national boundaries to satisfy data-residency mandates, yet standing up and
  operating a dedicated, single-tenant AI cluster requires AI-infrastructure engineering expertise
  they do not have. Shared hyperscale clouds cannot provide the isolation, audit trails, or
  in-country guarantees these buyers need. The result is that compliance-driven organisations either
  forgo AI adoption or spend months and large consulting budgets manually operationalising their own
  dedicated clusters with no continuous compliance monitoring in place.
targetUser:
  primary: >-
    AI platform leads and CISOs at Tier-2 and Tier-3 banks, insurers, and healthcare systems in the
    EU, APAC, and Middle East that must keep AI workloads on-premises or in-country.
  secondary: >-
    Government-adjacent technology buyers and defence contractors required by law to run sovereign AI
    infrastructure.
  buyer: >-
    Chief Information Security Officer or Head of Cloud and Infrastructure at a regulated financial or
    healthcare institution.
startupThesis:
  nonObviousInsight: >-
    Dapple's $30M raise is not primarily a hardware-scarcity story — it reveals that enterprises are
    blocked by the operational complexity of running dedicated AI infra, not by lack of GPU supply.
    The winning wedge automates the Enterprise OS layer — provisioning, compliance attestation, audit
    logging, and lifecycle management of in-country clusters — as software-margin SaaS, not as a
    capital-intensive bundled cloud.
  beachhead: >-
    Compliance teams at Tier-2 banks in the EU and APAC that need to run LLMs on-premises to satisfy
    GDPR or PDPA data-residency requirements but lack dedicated AI-infrastructure engineers.
  wedge: >-
    A one-click provisioning and continuous compliance-attestation engine that turns an empty
    on-premises or colo GPU cluster into a hardened, audit-ready AI runtime in under a day.
  whyNowCatalyst: >-
    Dapple's $30M seed round confirms the market for dedicated, in-country AI infra is opening now
    as enterprises hit the wall on shared-cloud compliance — creating immediate demand for the
    automation layer above the hardware.
  ventureScalePath: >-
    Start with EU and APAC regulated banks, expand to healthcare and government verticals, then become
    the platform-of-record for the entire sovereign AI infrastructure stack; adjacent expansion into
    model governance, cross-cluster workload scheduling, and cost metering can compound ARR well beyond
    the initial compliance wedge.
solution: >-
  A SaaS-plus-agent platform that automates the full lifecycle of a dedicated, in-country AI cluster:
  one-click provisioning against approved hardware configurations, continuous compliance scanning
  against GDPR, PDPA, PDPB, PDPL, and sector-specific frameworks, immutable audit logs for regulatory
  review, and a declarative policy engine that enforces data-residency constraints at the workload
  layer. The product integrates with existing SSO and SIEM tooling and surfaces a real-time compliance
  dashboard for CISOs and external auditors. Unlike Dapple, the platform is infrastructure-agnostic:
  it operates atop any dedicated hardware — vendor-supplied, colo-hosted, or on-premises — avoiding
  vendor lock-in and enabling a pure software-margin model.
goToMarketSeed:
  firstCustomer: >-
    Head of AI Infrastructure at a Tier-2 European bank (€50B–€500B AUM) under active ECB supervisory
    review for AI governance, with an existing on-prem GPU cluster and no automated compliance tooling.
  buyingTrigger: >-
    Receipt of a regulatory examination letter or internal audit finding that AI workloads are not
    demonstrably compliant with data-residency obligations, creating immediate budget urgency.
  currentAlternative: >-
    Manual processes run by cloud and compliance consultants, plus a patchwork of open-source tools
    (Terraform, OPA, Falco) assembled by internal DevOps teams with no unified compliance dashboard
    or continuous monitoring.
  switchingReason: >-
    Compresses time to compliance attestation from weeks of consulting work to a same-day automated
    scan and report at a fraction of the consulting cost, with continuous monitoring that manual
    processes cannot provide.
  pricingHypothesis: >-
    Annual SaaS subscription priced per managed GPU cluster (e.g. $50K–$150K per cluster per year),
    with a one-time professional-services onboarding fee for initial hardening and framework mapping.
