problem: 金融、医疗和政府领域的受监管企业，必须把 AI 工作负载放在特定国界内运行，才能满足数据驻留要求；但要搭建并运营一个专用、单租户 AI 集群，需要它们并不具备的 AI 基础设施工程能力。共享型超大规模云给不了这些买方需要的隔离性、审计轨迹和境内保证。结果就是，合规驱动型组织要么放弃采用 AI，要么花上数月和大笔咨询预算，手工把自己的专用集群运转起来，而且全程没有持续合规监控。
targetUser:
  primary: EU、APAC 和中东的二线、三线银行、保险公司和医疗系统里的 AI 平台负责人与 CISO；这类机构必须把 AI 工作负载保留在本地或境内。
  secondary: 依法必须运行主权 AI 基础设施的政府周边技术买方和国防承包商。
  buyer: 受监管金融机构或医疗机构的首席信息安全官，或云与基础设施负责人。
startupThesis:
  nonObviousInsight: Dapple 的 $30M 融资，核心并不是硬件稀缺，而是揭示了企业真正被卡住的点在于怎么把专用 AI 基础设施跑起来，而不是买不到 GPU。真正能赢的切口，是把 Enterprise OS 这一层——资源开通、合规证明、审计日志和境内集群生命周期管理——做成高软件毛利的 SaaS，而不是重资本的一体化云。
  beachhead: EU 和 APAC 二线银行里的合规团队。它们需要把 LLM 跑在本地，满足 GDPR 或 PDPA 的数据驻留要求，但手里没有专门的 AI 基础设施工程师。
  wedge: 一个一键开通、持续输出合规证明的引擎，能在一天内把空白的本地或机房托管 GPU 集群变成加固完成、审计就绪的 AI 运行环境。
  whyNowCatalyst: Dapple 的 $30M 种子轮确认，专用、境内部署 AI 基础设施的市场现在就开始打开了。企业在共享云合规上已经撞墙，于是对硬件之上的自动化层立刻有了需求。
  ventureScalePath: 先从 EU 和 APAC 的受监管银行切入，再扩到医疗和政府垂直行业，最后成为整套主权 AI 基础设施栈的记录平台。再往外延伸到模型治理、跨集群调度和成本计量，ARR 有机会远远超过最初的合规切口。
solution: 一个 SaaS + agent 平台，自动化覆盖专用、境内部署 AI 集群的全生命周期：基于经批准的硬件配置一键开通；按 GDPR、PDPA、PDPB、PDPL 和行业专属框架持续扫描合规；生成可供监管审查的不可变审计日志；再用声明式策略引擎在工作负载层强制执行数据驻留约束。产品接入现有 SSO 和 SIEM 工具，并给 CISO 与外部审计方提供实时合规看板。与 Dapple 不同，这个平台不绑定基础设施：无论是厂商提供、机房托管，还是本地自建的专用硬件，都能跑在上面，从而避开厂商锁定，守住纯软件毛利。
goToMarketSeed:
  firstCustomer: 首个客户应是处在 ECB AI 治理审查中的欧洲二线银行 AI 基础设施负责人（AUM €50B–€500B），银行已经有本地 GPU 集群，但还没有自动化合规工具。
  buyingTrigger: 收到监管检查函，或内部审计发现 AI 工作负载无法证明满足数据驻留义务，预算紧迫性会立刻拉满。
  currentAlternative: 现在的替代方案，是云与合规顾问主导的手工作业，加上内部 DevOps 团队拼出来的一套开源工具组合（Terraform、OPA、Falco）；没有统一合规看板，也没有持续监控。
  switchingReason: 它把原本要花数周咨询工时的合规证明，压缩成当天就能跑完的自动化扫描和报告，成本只是咨询方案的一小部分；同时还能提供手工流程做不到的持续监控。
  pricingHypothesis: 按受管 GPU 集群收取年度 SaaS 订阅费（例如每集群每年 $50K–$150K），外加一次性专业服务 onboarding 费用，用于首轮加固和框架映射。
