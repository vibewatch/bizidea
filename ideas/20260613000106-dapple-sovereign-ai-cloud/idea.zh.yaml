jobsToBeDone:
- job: 当我们收到 AI 治理审计发现时，帮 CISO 证明所有 AI 工作负载都跑在合规、数据驻留达标的基础设施上，这样就不用再做一个长达半年的整改项目去应付监管。
  currentAlternative: 依赖外部顾问，用电子表格手工收集合规证据
  successMetric: 收到审计请求后 24 小时内生成并交付合规证明报告
- job: 当我们要把新 AI 模型接入本地集群时，帮 AI 平台团队在几天而不是几个月内完成环境开通和加固，这样业务推进速度才不会被合规积压拖住。
  currentAlternative: 由小型内部 DevOps 团队手工拼接 Terraform 脚本和临时 OPA 策略
  successMetric: 新的 AI 工作负载环境在 48 小时内完成开通、扫描并拿到合规批准
ideaScorecard:
