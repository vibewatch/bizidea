topRisks:
- name: 监管碎片化
  description: EU、APAC 和中东的合规要求差异很大，法规一边演化一边分化，框架维护会变得昂贵又容易出错。
  mitigation: 把框架库做成模块化结构，引入社区和伙伴共建，并在每个目标司法辖区接入本地监管顾问，持续验证和维护映射。
- name: 硬件厂商打包销售
  description: Dapple 或超大规模云厂商完全可能把原生合规证明工具打进自己的专用云方案里，压缩独立产品的可服务市场。
  mitigation: 把重点放在厂商中立的多供应商支持，以及打得更深的监管框架细节上——这些都不是厂商打包工具的优先级；同时尽早拿下锚点客户。
- name: 企业销售周期过长
  description: 受监管企业买方的采购周期往往有 9–18 个月，前期营收增长会很难，现金跑道压力也会被明显拉长。
  mitigation: 提供 30 天免费合规缺口审计，作为付费试点入口；优先瞄准已经有审计发现或监管检查的客户，压缩决策时间线。
