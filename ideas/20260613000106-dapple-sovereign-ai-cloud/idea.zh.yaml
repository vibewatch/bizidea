  painIntensity:
    score: 4
    rationale: 监管合规和数据驻留要求，确实给受监管企业采用 AI 带来了有预算支撑的紧迫性；痛点是真实的，只是公开来源里还没有被广泛记录。
  wedgeClarity:
    score: 4
    rationale: 首个产品——面向本地 AI 集群的自动化开通与合规证明——具体、可执行，买方、触发点和现有替代方案都很清楚。
