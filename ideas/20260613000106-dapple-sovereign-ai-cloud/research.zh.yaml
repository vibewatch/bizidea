- name: Microsoft Sovereign AI / Azure sovereignty stack
  stage: 在位企业
  wedge: 覆盖数据驻留、密钥管理、机密计算和混合管理的主权公有云控制。
  pricing: 引用页面没有公开主权定价。
  strength: 企业信任深、身份栈强，混合控制覆盖也广。
  weaknessVsUs: 当客户完全标准化在 Azure 上时最合适；但它不是专门为混合硬件环境里的审计优先证明层设计的。
  sourceRefs:
  - 13
  - 14
  - 28
- name: Oracle Sovereign AI / Dedicated Region
  stage: 在位企业
  wedge: 通过主权云、专属区域和隔离部署模式交付主权 AI 工作负载。
  pricing: 按报价提供 / 引用页面未公开。
  strength: 主权部署菜单完整，对运维控制和驻留的定位也很清楚。
  weaknessVsUs: 它会把买方推向 Oracle 基础设施，而不是在客户已有集群之上证明合规。
  sourceRefs:
  - 20
  - 21
  - 34
  - 35
- name: Nutanix Enterprise AI
  stage: 在位企业
  wedge: 构建在 Nutanix 混合基础设施上的全栈企业 AI 软件。
  pricing: 引用页面没有公开定价。
  strength: 混合/私有云分发强，企业运维模型也很熟悉。
  weaknessVsUs: 它讲的是更宽的私有 AI 平台故事；相比我们的银行合规切口，仍需要更多定制化规则与证据拼装。
  sourceRefs:
  - 22
  - 39
- name: Red Hat OpenShift AI
  stage: 在位企业
  wedge: 用于构建、部署和监控 AI 应用与模型的开放式混合 AI 平台。
  pricing: 订阅定价在引用页面没有公开。
  strength: 以 Kubernetes 为中心的平台可移植性强，在企业和受监管行业里也有很强可信度。
  weaknessVsUs: 它提供的是底座，监管专属的证明与合规工作流仍得由客户或集成方自己搭。
  sourceRefs:
  - 23
  - 40
regulatoryTechnicalConstraints:
- point: 金融行业买方必须持续监控和审计外包云服务，而不是只在采购阶段批准一次。
  sourceRefs:
  - 2
  - 5
- point: 数据保护和 AI 治理义务要求合法处理、留存文档化控制，并能解释敏感数据和模型是如何被处理的。
  sourceRefs:
  - 6
  - 8
- point: 沙特等 GCC 本地化制度会带来显著实施差异，无法靠一套全球模板抽象掉。
  sourceRefs:
  - 21
  - 24
- point: 可行产品必须把 policy-as-code、infrastructure-as-code、运行时检测和访问控制证据串到异构环境里。
  sourceRefs:
  - 13
  - 46
  - 47
  - 48
validationSignals:
- point: Dapple 的种子轮融资以及其企业生产客户的表述，验证了专用 AI 环境存在真实在线需求。
  sourceRefs:
  - 1
- point: EBA 指出，AI、云、钱包、大数据分析和生物识别已经广泛进入 EU 银行业，而且多数银行整合这些技术已超过 5 年。
  sourceRefs:
  - 4
- point: CSA 在 2026 年金融服务调查里称，62% 的机构已经部署 AI agent，85% 预计自治 AI 驱动的金融交易会快速增长。
  sourceRefs:
  - 10
- point: 香港监管方在最新月报里列出 175 家授权机构，说明单一滩头市场里就有很高密度的受监管买方。
  sourceRefs:
  - 25
openQuestions:
- 目标二线银行里，到底有多少已经在运行专用 GPU 集群，而不是继续依赖超大规模云厂商的托管推理？
- 在与 AI 相关的监管复核里，最常被要求的审计材料是什么：数据驻留证明、访问日志、模型来源，还是外包控制？
- 哪些区域伙伴——机房托管、OEM 还是监管顾问——最能高效地把集群项目转成软件主导的合规账户？
- 在监管方或内部审计仍要求人工签字之前，证据工作流到底有多少比例可以自动化？
