      - 46
      - 48
    competitiveRivalry:
      score: 4
      rationale: 私有 AI 基础设施早已被专用云厂商、超大规模云厂商和平台方围住；创业公司必须守住一个更窄的合规原生切口，而不是去讲宽泛的基础设施故事。
      sourceRefs:
      - 1
      - 20
      - 22
      - 23
  pestle:
  - factor: 政治
    impact: positive
    point: 公共部门和区域主权计划，正在把境内控制合法化为政策目标，而不只是 IT 偏好。
    sourceRefs:
