    mitigation: 按模块交付辖区包，在扩张前用本地律师或伙伴机构完成验证。
    sourceRefs:
    - 6
    - 7
    - 21
    - 24
    - 26
  - friction: 与身份、SIEM 和 Kubernetes 工具的集成负担
    severity: 中
    affectedBuyer: 平台工程负责人
    mitigation: 先为目标细分市场里最主流的身份、日志和 IaC 栈提供预构建连接器。
    sourceRefs:
    - 13
    - 23
    - 27
