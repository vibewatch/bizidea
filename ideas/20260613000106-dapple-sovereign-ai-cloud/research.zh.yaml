market:
  tam:
    value: $1.1B
    rationale: 估算方法是：长期看全球约有 3,600 家受监管企业会需要主权/私有 AI 控制平面 × 每家 2.5 个受管集群 × 每集群每年 $120k 软件支出，得到约 $1.08B。
    isEstimate: true
    sourceRefs:
    - 4
    - 9
    - 10
    - 11
    - 12
  sam:
    value: $72.0M
    rationale: 滩头市场假设是：未来三年里，约 450 家 EU / APAC / GCC 受监管银行会把主权 AI 集群真正运转起来 × 每家 1.6 个集群 × 每集群 $100k ARR，得到约 $72M；这个单位池以 ECB 监管群体、香港授权机构、MAS 监管银行和 GCC 银行名录为锚，再按真实集群就绪度打折。
    isEstimate: true
    sourceRefs:
    - 3
    - 25
    - 42
    - 43
    - 44
  som:
    value: $4.2M
    rationale: 第 3 年可触达情景按 35 个客户 × 每家 1.2 个受管集群 × $100k ARR 计算，反映出银行采购周期很长，但一旦活跃审计或外包发现出现，紧迫性也很强。
    isEstimate: true
    sourceRefs:
    - 2
    - 11
    - 15
    - 16
