  adoptionFrictionMatrix:
  - friction: 客户必须已经拥有或正在积极采购专用 AI 算力
    severity: 高
    affectedBuyer: 基础设施负责人
    mitigation: 与 OEM、主权云和机房托管伙伴打包交付，让软件直接附着到正在推进的集群项目。
    sourceRefs:
    - 15
    - 19
    - 20
  - friction: 合规团队可能不信任黑盒自动化
    severity: 高
    affectedBuyer: CISO / 合规负责人
    mitigation: 把证据链路、人工复核检查点和审计可读导出开放出来，而不是只给一个通过/不通过分数。
