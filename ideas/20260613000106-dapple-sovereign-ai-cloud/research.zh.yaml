  searchedQueries:
  - 查找 2024-2026 年关于主权 AI 云、受监管企业私有 AI 基础设施和数据驻留要求的权威近期来源。优先官方公司页面、监管机构文件和主流新闻。
  - 查找 HPE、Dell、VMware、Nutanix、NVIDIA、AWS、Azure 和 Google Cloud 的私有 AI 基础设施方案与主权云产品的权威来源，包括能拿到的定价或产品页面。
  - 查找与境内部署 AI 和数据驻留相关的官方监管与政策来源：GDPR/EDPB、EU AI Act、NIS2、新加坡 PDPA 或 MAS 指引、印度 DPDP Act、沙特 PDPL，以及医疗行业隐私规则。
  - 查找 ECB 直接监管的重要机构或欧元区银行数量等官方来源，以及任何与受监管金融机构相关的官方 EU 银行数量来源。
  - 查找新加坡、香港、沙特和 UAE 的持牌银行或受监管银行数量的官方来源，以及官方名录或统计页面。
  - 查找关于银行和受监管企业在 AI 采用、数据驻留或云风险上的权威调查或官方来源，重点看 EU 或 APAC，时间范围 2024-2026。
  - 查找 EBA 或 ECB 关于云外包、ICT 风险或运营韧性的官方指引，这些内容与银行使用云或 AI 直接相关。
  - 查找 ENISA 或 EU 关于数据本地化、云安全或主权控制的官方来源，这些内容与受监管云部署相关。
  - 查找 VMware Private AI Foundation with NVIDIA 的官方产品页面当前 URL。
  - 查找 Nutanix enterprise AI 或 GPT-in-a-Box 的官方产品页面当前 URL。
