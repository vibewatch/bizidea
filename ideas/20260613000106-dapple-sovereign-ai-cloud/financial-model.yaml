slug: sovereign-cluster-autopilot
date: '2026-06-13'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: Model start month
    value: '2026-07'
    unit: month
    source: '[BP date] First full month after the 2026-06-13 business-plan date.'
  - id: A2
    name: Opening cash / pre-seed ask
    value: '$2.3M'
    unit: usdM
    source: '[BP fundingAsk] The business plan targets a $2-4M pre-seed; the model uses $2.3M because it reaches the Y2 proof milestone and still preserves roughly six months of buffer.'
  - id: A3
    name: Starting production customers (M1)
    value: '0'
    unit: count
    source: '[BP executiveSummary; BP milestones] No production subscription is assumed at model start because the first 12 months are still proving paid pilots and initial conversions.'
  - id: A4
    name: Steady-state annual ARPU per production bank
    value: '$120.0K per customer-year'
    unit: usdK_per_customer_year
    source: '[BP gtm.pricing; BP market.som; research.market.som] SOM math implies about 1.2 managed clusters per customer at roughly $100K ARR per cluster, or about $120K ARR per production bank account.'
  - id: A5
    name: Conservative revenue treatment
    value: Base P&L recognizes subscription revenue only and excludes separate pilot and onboarding fees
    unit: method
    source: '[BP gtm.pricing; BP businessModel.revenueStreams] The business plan includes paid pilots and onboarding fees, but the base case omits them so revenue is not flattered by one-time services.'
  - id: A6
    name: Year 1 production-customer ramp
    value: 'M1-M12 customersEop = 0, 0, 0, 0, 1, 1, 1, 2, 2, 3, 3, 4'
    unit: customers
    source: '[BP product.sixMonth; BP milestones 0-12 months; BP experimentRoadmap] This assumes pilots begin converting after month 4 and four production accounts are live by month 12 in the base case.'
  - id: A7
    name: Year 2 and Year 3 customer ramp
    value: 'Q1Y2-Q4Y3 customersEop = 6, 9, 13, 18, 23, 28, 32, 35'
    unit: customers
    source: '[BP milestones; BP market.som; research.market.som] The ramp reaches the business-plan year-3 SOM case of roughly 35 production customers without assuming full beachhead saturation.'
  - id: A8
    name: Revenue-recognition timing
    value: New production accounts contribute roughly half a period of revenue in the quarter or month they convert
    unit: method
    source: '[BP gtm.funnelTargets; BP investorMemo.nextDiligence] The model recognizes midpoint conversions because banks sign after pilot review rather than all on day one of a period.'
  - id: A9
    name: Target gross margin
    value: '70%'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct] COGS is modeled at 30% of revenue to match the business-plan target margin profile.'
  - id: A10
    name: Monthly churn
    value: '1.5%'
    unit: percent
    source: 'Startup-finance heuristic for compliance infrastructure sold into regulated banks: retention should be strong once deployed, but early-product and vendor-bundling risk still create nonzero logo churn.'
  - id: A11
    name: Fully loaded CAC
    value: '$40.0K per production customer'
    unit: usdK_per_customer
    source: '[BP gtm.channels; BP gtm.funnelTargets; BP operatingAssumptions] Founder-led enterprise selling plus partner referrals should keep CAC below large-enterprise software norms, but each bank still requires long proof, security review, and implementation support.'
  - id: A12
    name: Loaded salary bands
    value: Founder CEO $120K; engineering $150K; compliance product $140K; solutions engineering $120K; sales or partnerships $130K; G&A or ops $90K; customer success $110K
    unit: usdK_per_fte_year
    source: 'Startup-finance heuristic for a lean venture-backed infrastructure software team with below-public-company cash comp and meaningful equity.'
  - id: A13
    name: Headcount ramp snapshots
    value: 'Founder CEO 1/1/1/1/1/1; engineering 1/1/1/2/3/3; compliance product 1/1/1/1/1/1; solutions engineering 0/1/1/1/1/2; sales or partnerships 0/0/0/1/1/2; G&A or ops 0/0/0/0/1/1; customer success 0/0/0/0/0/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3'
    unit: fte
    source: '[BP team; BP strategicChoices.sequencingRationale] The model follows the business-plan order of product and compliance hiring first, solutions support second, and scaled GTM only after production proof exists.'
  - id: A14
    name: Payroll smoothing in Y2 and Y3
    value: Quarterly salary expense ramps gradually between Q4Y1, Q4Y2, and Q4Y3 snapshots rather than stepping only at year-end
    unit: method
    source: '[Financial Modeler instructions] The salary line is smoothed between the required snapshot columns so hiring stays believable quarter to quarter.'
  - id: A15
    name: Non-payroll operating budgets
    value: 'Y1 monthly S&M $8K-$12K, R&D $12K-$16K, G&A $8K-$10K; Y2 quarterly S&M $45K-$75K, R&D $45K-$55K, G&A $27K-$36K; Y3 quarterly S&M $84K-$102K, R&D $54K-$60K, G&A $36K-$42K'
    unit: usdK
    source: '[BP operations; BP fundingAsk.useOfFundsSummary] Lean budgets reflect advisory travel, cloud/security tooling, and enterprise legal or compliance overhead without assuming a large field organization pre-seed.'
  - id: A16
    name: Cash roll-forward convention
    value: Ending cash equals opening cash plus EBITDA
    unit: method
    source: 'Startup-finance heuristic for an asset-light software company with immaterial debt, capex, taxes, and working-capital swings at this stage.'
  - id: A17
    name: Downside and upside scenario deltas
    value: 'Downside uses 26 Q4Y3 customers, 65% gross margin, and 2.0% monthly churn; upside uses 42 Q4Y3 customers, 72% gross margin, and 1.0% monthly churn'
    unit: scenario_inputs
    source: '[BP risks; research.reportMemo.sensitivityCases] The scenario set maps directly to the two key uncertainties: how many banks have attachable private clusters and how differentiated the compliance layer remains versus bundled infrastructure.'
