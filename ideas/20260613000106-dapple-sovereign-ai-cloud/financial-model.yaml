scenarios:
  downside:
    description: Cluster attach opportunities emerge more slowly, pilots convert later, and deployments stay more services-heavy than planned.
    y3RevenueK: 2430.0
    y3EbitdaK: -310.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - Q4Y3 customers reach 26 instead of 35.
      - Gross margin stays at 65% instead of 70%.
      - Monthly churn rises to 2.0%.
      - Partner-sourced pipeline slips by roughly two quarters.
  base:
    description: Founder-led pilots convert into production subscriptions and the first attach or advisory channel starts compounding after Y2 proof points.
    y3RevenueK: 3285.0
    y3EbitdaK: 287.2
    cashLowPointK: 723.9
    keyAssumptionChanges:
      - Q4Y3 customers reach 35.
      - Annual ARPU stays near $120K per production customer.
      - Gross margin reaches the 70% business-plan target.
      - Headcount reaches 11 FTE by Q4Y3.
  upside:
    description: Banks expand to second clusters faster, the APAC pack reuses well, and channel partners shorten time from pilot to production.
    y3RevenueK: 4050.0
    y3EbitdaK: 640.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
      - Q4Y3 customers reach 42 instead of 35.
      - Gross margin improves to 72%.
      - Monthly churn improves to 1.0%.
      - Pilot-to-production time shortens by about one quarter.
