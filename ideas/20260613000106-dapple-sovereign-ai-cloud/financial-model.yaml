    baseCase: $40K fully loaded CAC
    upsideCase: $30K CAC if attach partners source higher-intent pilots
    y3RevenueImpactK: 0.0
    cashImpactK: 140.0
  - variable: churn
    downsideCase: 2.0% monthly logo churn
    baseCase: 1.5% monthly logo churn
    upsideCase: 1.0% monthly logo churn
    y3RevenueImpactK: 210.0
    cashImpactK: 150.0
  - variable: sales cycle
    downsideCase: 9-month path from paid pilot to production subscription
    baseCase: 6-7 month path
    upsideCase: 4-5 month path
    y3RevenueImpactK: 450.0
    cashImpactK: 280.0
  - variable: gross margin
    downsideCase: 65% gross margin from heavier custom implementation
    baseCase: 70% gross margin
    upsideCase: 73% gross margin from higher connector reuse
    y3RevenueImpactK: 0.0
    cashImpactK: 164.3
  - variable: hiring pace
    downsideCase: Two noncritical GTM and support hires are pulled forward by two quarters
    baseCase: Lean ramp to 11 FTE by Q4Y3
    upsideCase: The company delays one support hire until after second-jurisdiction proof
    y3RevenueImpactK: 90.0
    cashImpactK: 180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Audits[Audit and remediation triggers] --> Pilots[Paid pilot and hardening motion]
      Pilots --> Customers[Production bank subscriptions]
      Customers --> Clusters[1.2 managed clusters per bank]
      Clusters --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: The base case is driven by converting compliance-triggered pilots into roughly $120K annual production accounts and compounding from 18 customers at Y2 exit to 35 by Q4Y3.
  - checkName: Must go right
    finding: The product must stay productized enough for 70% gross margin while one attach or advisory channel reliably shortens bank sales cycles after the first production references.
  - checkName: Model breaks if
    finding: If too few banks have attachable private clusters and custom integration drags margin toward 65%, the downside case pushes cash close to a bridge-round zone.
  - checkName: Next-round proof
    finding: Exiting Y2 with 18 production customers, one reusable APAC pack, and a productive partner channel is the clearest milestone for a seed step-up.
sanityChecks:
  ruleOf40: Y3 growth 180.8% + EBITDA margin 8.7% = 189.5%.
  burnMultiple: Y2 burn multiple is about 0.4x ($709K EBITDA burn against roughly $1.68M of net new ARR from 4 to 18 customers); Y3 turns cash generative on an EBITDA basis.
  revenuePerFte: $299K Y3 using 11 Q4Y3 FTE (benchmark roughly $200-400K for emerging SaaS).
  flags:
    - The base case still assumes a fast jump from 18 customers at Y2 exit to 35 at Y3 exit, so partner credibility and jurisdiction-pack reuse must arrive on schedule.
    - The model intentionally excludes pilot and onboarding revenue, which keeps early results conservative but can understate commercial traction if pilots monetize well before full subscription conversion.
    - Gross margin only holds if implementation stays narrow and reusable; heavy bespoke security or regulator mapping work would turn the company into a services-heavy business.
