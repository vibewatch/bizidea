problem: >-
  Personalized gene-medicine teams can now win funding and scientific attention, but each new patient still triggers a brittle scramble across regulatory, CMC, QA, and bedside care teams. Under an umbrella IND, they must reuse the right shared modules, document patient-specific deltas, release a one-off lot, and time shipment and dosing without the slack of conventional biotech operations. Today that work lives in spreadsheets, CRO trackers, and SOP binders, creating avoidable delays and audit risk exactly when THRIVE requires first-in-human speed.
targetUser:
  primary: >-
    Translational operations and regulatory leads at THRIVE-funded pediatric gene-medicine programs preparing multiple individualized first-in-human cases under a shared umbrella IND
  secondary: >-
    CMC, QA, and cell and gene therapy suite managers responsible for patient-specific lot release and treatment scheduling
  buyer: Executive director of cell and gene therapy operations or Head of Regulatory Operations
startupThesis:
  nonObviousInsight: >-
    If one platform must carry many individualized products, the scarce asset is no longer only the edit design; it is the reusable operating template that separates shared program modules from patient-specific deltas and keeps release plus dosing on one clock. The winner can become the control plane for industrialized rare-disease medicine before most teams realize they are building an operations company, not just a science company.
  beachhead: >-
    THRIVE-funded children's hospitals and academic gene-medicine centers running 3-12 individualized CRISPR or ASO patients per year under a shared umbrella IND, where one translational team must coordinate CMC, QA, release, and bedside dosing across bespoke lots
  wedge: >-
    An umbrella-IND execution OS that versions shared regulatory modules against patient-specific changes, auto-assembles release packets, and synchronizes manufacturing, shipment, and dosing milestones for each case
  whyNowCatalyst: >-
    ARPA-H's THRIVE program couples up to $160 million of funding with a year-three first-in-human deadline and a year-five umbrella-architecture requirement, turning ops software from nice-to-have into a gating dependency.
  ventureScalePath: >-
    Start with THRIVE-funded personalized genetic medicines, then expand into adjacent ASO, gene-editing, cell-and-gene, and other ultra-small-batch advanced-therapy programs that need reusable regulatory modules, chain-of-identity coordination, and case-cycle analytics across hospitals, biotechs, CDMOs, and regulators.
solution: >-
  The product is a program OS for individualized genetic medicines. It stores the master umbrella-IND module library, captures the patient-specific delta for each case, and auto-assembles regulatory, QA, and release packets from approved templates. It then ties manufacturing milestones, chain-of-identity checkpoints, shipping windows, and bedside dosing slots into one case timeline with role-based approvals. Program leaders see which cases are blocked by CMC, quality review, logistics, or clinic scheduling and what can be reused for the next patient. Over time, the startup builds the most valuable dataset in the category: which module patterns survive review, where bespoke lots fail release, and how long each center takes from case nomination to dosing.
goToMarketSeed:
  firstCustomer: >-
    Executive director of a CHOP-like pediatric gene-medicine program or Gemma-like platform biotech that has THRIVE funding, expects 3-5 individualized patients to reach first-in-human work, and has internal CMC plus hospital treatment operations but no shared umbrella-IND control layer
  buyingTrigger: >-
    Receipt of THRIVE funding or an internal green light for the first patient under an umbrella-IND workstream, which creates immediate pressure to reuse modules and coordinate release and dosing timelines
  currentAlternative: Spreadsheets, eTMF or eQMS systems, CRO project managers, and manual batch-release checklists
  switchingReason: >-
    A purpose-built OS shortens each new patient cycle because it separates reusable program modules from patient-specific deltas and keeps CMC, QA, regulatory, logistics, and bedside teams on one timeline.
  pricingHypothesis: >-
    Annual subscription per active personalized-medicine program plus implementation fees and per-patient orchestration charges tied to each released individualized product
