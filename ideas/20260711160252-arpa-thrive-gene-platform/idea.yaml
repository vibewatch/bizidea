jobsToBeDone:
  - job: >-
      When an umbrella-IND program opens a new individualized patient case, help the program ops lead reuse approved shared modules and assemble the patient-specific release packet, so the team can reach dosing faster with less regulatory churn.
    currentAlternative: Spreadsheets, shared drives, and CRO-managed checklists
    successMetric: Days from case nomination to complete patient-ready release dossier
  - job: >-
      When a bespoke lot is moving toward treatment, help CMC, QA, logistics, and clinic teams coordinate release, shipment, and bedside scheduling, so no patient loses a dosing window because of a handoff error.
    currentAlternative: Manual project management across email, meetings, and static SOP binders
    successMetric: On-time patient dosing rate and number of release-to-dosing delays per case
