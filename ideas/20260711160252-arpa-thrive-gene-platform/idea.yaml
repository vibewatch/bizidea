topRisks:
  - name: Small early buyer pool
    description: The first wave of customers may be limited to a handful of THRIVE-funded programs and adjacent rare-disease teams.
    mitigation: Start with THRIVE for urgency, then expand quickly into ASO, gene-editing, and other personalized advanced-therapy programs that share the same workflow.
  - name: Regulatory conservatism
    description: Teams may resist putting new software anywhere near submission and release workflows that could affect patient treatment.
    mitigation: Launch as a configurable orchestration and audit-trail layer with human approvals and exportable packets, not as an autonomous submission system.
  - name: Hospital integration drag
    description: Pediatric centers and biotech partners often operate across fragmented document, quality, and scheduling systems that slow implementation.
    mitigation: Begin with a standalone case timeline and packet builder, then integrate only into the highest-friction systems after proving cycle-time gains.
