slug: umbrella-ind-execution-os
date: '2026-07-11'
executiveSummary: >-
  The strongest initial company here is not a gene-design platform; it is a
  human-in-the-loop execution OS for U.S. pediatric and academic gene-medicine
  programs that must run multiple individualized patients under one umbrella
  IND. The first customer is a THRIVE-funded program director or Head of Gene
  Therapy Operations at a CHOP-like center that expects 3-12 individualized
  cases per year and cannot keep regulatory, CMC, QA, logistics, and bedside
  teams aligned in spreadsheets. The MVP should land as an overlay that
  versions shared modules against patient-specific deltas, assembles release
  packets from approved templates, and tracks each case from nomination through
  dosing without replacing eQMS or eTMF systems. GTM, pricing, and onboarding
  should all revolve around the same event: THRIVE funding or approval of the
  first umbrella-IND patient, followed by a one-program design-partner
  deployment and conversion to recurring program spend. The market evidence
  supports urgent pain, named initial buyers, and credible budget existence,
  but the initial logo count is small: the researched beachhead is only about
  15 near-term U.S. programs and a modeled year-3 SOM of $1.6M. The reason
  this can still become a fundable software company is if the same control
  plane extends into ASO, base-editing, and other ultra-small-batch
  advanced-therapy programs that share module reuse and release-coordination
  pain. The best moat is a proprietary library of accepted module patterns,
  release deviations, and case-cycle benchmarks that adjacent QMS or
  chain-of-custody vendors do not capture today. The main diligence gaps are
  who truly owns budget after a pilot, how much workflow is reusable across
  modalities, and whether early accounts will trust software-generated packet
  drafts without creating a new validation burden.
problem:
  - >-
    Each individualized patient forces teams to manually reuse shared
    regulatory and quality modules while rebuilding patient-specific deltas
    across spreadsheets, shared drives, CRO trackers, and SOP binders.
  - >-
    Lot release, shipment, chain-of-identity checkpoints, and bedside dosing
    sit on one critical path, so one late QA or clinic handoff can waste a
    narrow treatment window.
  - >-
    THRIVE's year-three first-in-human deadline and year-five
    umbrella-architecture requirement make execution delay a funding and
    credibility risk, not just an operational nuisance.
solution:
  - >-
    Build a standalone execution layer that stores master umbrella-IND
    modules, versions patient-specific deltas, and assembles regulatory, QA,
    and release packets with human approvals and exportable audit trails.
  - >-
    Give each patient case a shared timeline that synchronizes manufacturing
    milestones, batch review, shipment windows, chain-of-identity checkpoints,
    and bedside dosing schedules.
  - >-
    Benchmark cycle time, template reuse, rework, and deviations across cases
    so each new patient makes the next program faster and less error-prone.
whyWeWin:
  - >-
    The wedge sits exactly where urgency, budget, and measurable ROI meet: the
    first umbrella-IND patient after THRIVE or similar platform funding.
  - >-
    An overlay architecture fits buyer reality better than a replacement pitch
    because target programs already run QMS, document, courier, and hospital
    scheduling systems they will not rip out.
  - >-
    Every deployment compounds module, deviation, and case-timing data that
    generic quality suites, CROs, and cell-therapy orchestration tools do not
    structure around shared-module reuse.
strategicChoices:
  beachhead: >-
    U.S. THRIVE-funded children's hospitals and academic gene-medicine centers
    running 3-12 individualized CRISPR, base-editing, or ASO patients per
    year under a shared umbrella IND.
  wedgeRationale: >-
    This is the fastest path to proof because the buyer set is concentrated
    and named, the pain is already budgeted inside funded platform programs,
    and success can be measured on one live workflow: days saved from case
    nomination to release-ready dosing. Selling broader rare-disease
    infrastructure or generic gene-therapy software would dilute urgency and
    introduce too many workflow variants before the core control-plane thesis
    is proven.
  sequencingRationale: >-
    Start with packet assembly, case timelines, and approvals because those
    solve the first customer's immediate deadline without requiring deep
    replacement of QMS or eTMF systems. Keep sales founder-led and
    implementation-heavy until 2-4 reference programs prove cycle-time
    improvement and expose which integrations are truly mandatory. Only then
    add deeper connectors, CDMO and site-network collaboration, and adjacency
    expansion, because product scope, GTM, and hiring all depend on proving
    template reuse first.
  notYet:
    - Autonomous submission or release decisions without human approval
    - Broad cell-therapy or CAR-T orchestration where shared-module delta logic is weaker
    - International rollouts before 3-5 U.S. reference accounts
    - Full QMS, eTMF, or hospital scheduler replacement
market:
  tam: "$18.8M estimated TAM at the current wedge, modeled as about 47 individualized or ultra-small-batch programs at roughly $400k blended annual ACV; venture upside requires expansion beyond this starting market."
  sam: "$6.0M near-term U.S. beachhead SAM, modeled as 15 named THRIVE and BGTC-style programs at roughly $400k annual ACV."
  som: "$1.6M modeled year-3 SOM, equivalent to 4 production programs at roughly $400k annual ACV."
  segments:
    - THRIVE-funded children's hospitals and academic gene-medicine centers
    - Rare-disease platform biotechs and adjacent individualized ASO or base-editing programs
  buyingProcess: >-
    The motion starts when a program receives THRIVE-like funding or approves
    its first patient under an umbrella-IND pathway, which turns manual packet
    assembly and release coordination into a near-term execution risk. A
    program director or Head of Gene Therapy Operations typically sponsors the
    deployment, but regulatory operations, CMC/QA, and clinic leadership must
    all sign off before recurring budget is approved.
product:
  mvp: >-
    MVP is a standalone execution workspace for one personalized-medicine
    program that holds the umbrella-module library, captures patient-specific
    deltas, assembles exportable release packets, and tracks case milestones
    through dosing with role-based approvals. It should work first through
    controlled uploads and lightweight connectors so the first customer can
    prove ROI without a multi-system replacement project.
  sixMonth: >-
    Ship 2 design-partner deployments with module versioning, patient-case
    timelines, packet assembly, approval history, baseline cycle-time
    dashboards, and at least one reusable integration into a document or
    quality system.
  twelveMonth: >-
    Add reusable modality templates across the first customer cohort,
    benchmark reporting on nomination-to-dosing cycle time and release
    rework, and deeper integration into the highest-friction QMS, courier, or
    scheduling systems identified in pilots.
  twentyFourMonth: >-
    Expand to multi-program rollouts within existing accounts, CDMO and
    satellite-site collaboration, and the first adjacent ASO or non-THRIVE
    individualized gene-medicine programs that share the same control-plane
    primitives.
  keyBets:
    - Early accounts will accept export-based workflows and one narrow connector before demanding full validated integration.
    - At least half of packet structure and approval logic is reusable across the first 3-5 programs.
    - Human-in-the-loop packet drafts can earn trust from regulatory and QA teams if every field is traceable to an approved source.
    - Design-partner programs generate enough cases and budget to support roughly $400k annual program contracts once in production.
gtm:
  wedge: >-
    Sell a one-program deployment that turns the first umbrella-IND patient
    from a spreadsheet-driven scramble into a release-ready, auditable case
    timeline with one owner and one system of record.
  channels:
    - Founder-led direct sales into THRIVE performers, CHOP and BGTC-style centers, and rare-disease platform biotechs
    - Investigator, consortium, and advisory referrals from pediatric gene-therapy leaders and bespoke-gene-therapy networks
    - CDMO, regulatory-consulting, and quality-modernization partners after the first production reference
  funnelTargets: "Target account -> qualified workflow assessment 35-50%; qualified assessment -> paid design partner 25-35%; paid design partner -> annual production contract 50%+; production account -> second program or adjacent-site expansion within 12 months 30%+"
  pricing: >-
    Start with a paid implementation and design-partner deployment for one
    program, then convert to an annual subscription per active
    personalized-medicine program plus per-patient orchestration fees for
    released cases. A working assumption is roughly $300k-$450k annual
    contract value in production, consistent with the researched $400k ACV
    market model and the fact that buyers are protecting funded first-in-human
    timelines rather than buying generic IT seats, but exact budget ownership
    must still be validated.
businessModel:
  revenueStreams:
    - Annual subscription per active umbrella-IND or individualized-medicine program
    - One-time implementation, workflow mapping, and template configuration fees
    - Per-patient orchestration fees and premium modules for CDMO or site-network collaboration
  unitOfValue: Active personalized-medicine program running patient cases through the execution OS
  targetGrossMarginPct: 70
  expansionLevers:
    - Add additional programs, sites, or disease cohorts inside the same hospital or platform-biotech account
    - Extend from THRIVE-funded programs into adjacent ASO, base-editing, and other ultra-small-batch advanced-therapy programs
    - Sell benchmarking, deviation intelligence, and reusable module libraries as the case dataset compounds
    - Add partner-facing workflows for CDMOs, logistics providers, and satellite treatment sites
strategyMap:
  northStarMetric: Number of individualized patient cases that reach release-ready status and on-time dosing through the platform
  inputMetrics:
    - Paid design partners signed
    - Median days from case nomination to complete release dossier
    - On-time dosing rate after lot release
    - Percentage of packet sections reused from approved templates
    - Paid design partner to annual production conversion rate
    - Number of external handoff delays per case
  moatsToBuild:
    - Accepted shared-module and patient-delta library across umbrella-IND programs
    - Deviation, rework, and cycle-time benchmark dataset spanning regulatory, CMC, QA, logistics, and clinic handoffs
    - Integration and permissioning layer across quality, document, courier, and treatment-site systems
  killCriteria:
    - Fewer than 2 paid design partners signed within 9 months of focused selling
    - Median case-packet cycle time falls by less than 20% after the first 3 completed live or retrospective deployments
    - Fewer than 2 of the first 4 pilots convert to annual production budget
    - Less than 50% of core packet fields or workflow stages are reusable across the first 3 customer programs
    - More than half of qualified accounts require deep validated system replacement before they will pilot
  mermaid: |
    flowchart LR
      Wedge[Umbrella IND beachhead] --> MVP[Human-in-the-loop execution OS]
      MVP --> Proof[Faster packet assembly and on-time dosing]
      Proof --> Expansion[More programs and adjacent advanced-therapy workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: Acute pain and a sharp wedge merit tracking, but conviction is capped until the company proves budget ownership and adjacency beyond a tiny first market.
    whyBelieve: THRIVE, BGTC, and CHOP-style programs create a real near-term bottleneck where reusable module software can save time on funded first-in-human work.
    whyDoubt: The initial beachhead is only a handful of programs and incumbents plus services could absorb enough of the workflow to limit standalone ACV.
    nextDiligence: Win 2 paid design partners and show one converts to recurring program budget after at least 20% faster release-packet assembly and fewer release-to-dosing delays.
  firstCustomer:
    title: Executive director of pediatric gene therapy operations at a THRIVE-funded center
    profile: A CHOP-like children's hospital or academic gene-medicine center running 3-12 individualized patients per year with internal CMC, QA, and bedside treatment teams but no shared umbrella-IND control layer.
    trigger: Receipt of THRIVE funding or approval to open the first patient under an umbrella-IND workstream.
    buyer: Executive director of cell and gene therapy operations
    initialContract: "$100k-$150k paid design-partner implementation for one program, converting to roughly $300k-$450k annual program spend plus per-patient fees if the first 2 cases show faster packet completion and cleaner release-to-dosing coordination."
  mustBeTrue:
    - THRIVE and BGTC-style programs must fund a dedicated execution OS instead of extending spreadsheets, playbooks, and existing quality systems.
    - At least half of paid pilots must convert to annual production contracts around the modeled $400k ACV.
    - Overlay deployment with controlled exports and light integrations must be acceptable for the first live production use.
    - Shared-module and approval templates must transfer across enough programs to reduce deployment effort after customer 2.
    - Adjacent ASO, base-editing, or other ultra-small-batch programs must expand the reachable logo count materially beyond the initial 15-program beachhead.
  diligenceQuestions:
    - Which title signs recurring budget after a pilot: platform PI, regulatory operations, gene therapy operations, or quality leadership?
    - How many live cases per year and what current nomination-to-dosing cycle time does each target account actually run?
    - Which packet sections and approvals are truly reusable across AAV, base editing, ASO, and CRISPR programs?
    - Which systems are mandatory before the first live case: QMS, LIMS, courier workflow, hospital scheduler, or all four?
    - What validation or IT burden does software-generated packet assembly create inside target hospitals and sponsor QA groups?
operatingAssumptions:
  - assumption: The economic buyer can allocate roughly $300k-$450k of recurring program budget without the purchase being treated as central IT spend.
    basis: research.yaml
    validationTest: Map procurement on 10 target accounts and secure 2 paid pilots where operating leadership, not central IT, signs the SOW.
    decisionImpact: If false, lower ACV expectations or package the product through services and implementation partners instead of direct software budget.
  - assumption: Export-first deployment plus one narrow integration is enough to create first-production value.
    basis: idea.yaml
    validationTest: Launch the first 2 design partners in under 8 weeks without deep QMS or scheduler integration and still support one real case.
    decisionImpact: If false, implementation becomes too heavy for a pre-seed GTM plan and the roadmap must shift toward integration infrastructure.
  - assumption: More than 50% of module structure and approval logic is reusable across the first 3 customer programs.
    basis: research.yaml
    validationTest: Compare packet fields, review stages, and deviations across 3 customers and measure reusable components.
    decisionImpact: If false, narrow to one modality or accept a more services-heavy business with lower gross margin.
  - assumption: Human-in-the-loop packet drafting will be trusted if traceability and approvals are explicit.
    basis: research.yaml
    validationTest: Track reviewer override rates and sign-off acceptance across the first 20 generated packet sections or 5 case packets.
    decisionImpact: If false, narrow the product to orchestration and timeline visibility instead of draft generation.
  - assumption: Adjacent individualized therapies outside THRIVE share enough workflow primitives to at least double the reachable logo count.
    basis: operator judgment
    validationTest: Qualify 10 non-THRIVE programs and confirm at least 4 report the same module-reuse and release-coordination pain plus similar approval steps.
    decisionImpact: If false, the company is a niche workflow business and should cap capital raised and hiring accordingly.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Shadow 3 retrospective or live patient cases across 2 THRIVE or BGTC-like programs and map every document, approval, and handoff.
    hypothesis: The manual burden is concentrated in a repeatable set of module-reuse, packet-assembly, and release-coordination steps.
    successMetric: A shared workflow map identifies at least 3 high-frequency artifacts and 2 measurable delays common across all cases.
    owner: CEO founder
  - horizon: 0–90 days
    experiment: Run 12 buyer interviews with platform PIs, gene therapy operations, regulatory operations, and QA leaders, including procurement mapping.
    hypothesis: One accountable economic buyer and a repeatable buying trigger exist despite multi-stakeholder workflow ownership.
    successMetric: At least 8 of 12 accounts point to the same budget owner or buying committee and 3 agree to paid design-partner scoping.
    owner: CEO founder
  - horizon: 90–180 days
    experiment: Deliver a concierge packet-builder pilot on historical case data for one THRIVE-like program before full automation.
    hypothesis: A design partner will pay for module versioning and packet assembly even before deep integrations.
    successMetric: One paid pilot signed and draft packet preparation time reduced by at least 20% versus the customer's historical process.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Launch the first live one-program deployment with export-based workflow plus one document or quality integration.
    hypothesis: The product can support a real patient case without full QMS or scheduler replacement.
    successMetric: Go-live in under 8 weeks, complete one live case, and cut nomination-to-release-dossier time by at least 20%.
    owner: Implementation lead
  - horizon: 180–360 days
    experiment: Add benchmark reporting and template reuse across the first 3 customer programs.
    hypothesis: Cross-program benchmark and reuse data increase conversion and make onboarding materially faster.
    successMetric: At least 50% of core packet content is reusable and onboarding time for customer 3 is 30% faster than customer 1.
    owner: Regulatory product lead
  - horizon: 180–540 days
    experiment: Qualify one adjacent ASO or non-THRIVE individualized program and test the same control plane.
    hypothesis: The wedge expands beyond THRIVE without rebuilding the product from scratch.
    successMetric: Two qualified adjacency opportunities and one signed pilot with at least 40% workflow overlap to existing templates.
    owner: CEO founder
operations:
  - Standardize each deployment around workflow mapping, module library setup, baseline metrics, and weekly blocker review across regulatory, CMC, QA, logistics, and clinic leads.
  - Maintain exportable audit trails, role-based approvals, and explicit source-to-packet traceability as core product and operating requirements from day one.
  - Build a narrow integration catalog for document systems, quality workflows, courier milestones, and site scheduling while using implementation playbooks rather than bespoke code whenever possible.
team:
  - role: CEO founder
    startTiming: Month 0
    rationale: Owns founder-led sales, design-partner selection, pricing, and adjacency learning while the true budget owner and expansion path are still being proven.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the module data model, workflow engine, permissions layer, and first integrations that determine time to value.
  - role: Implementation lead
    startTiming: Month 2
    rationale: Encodes customer-specific workflows, shortens deployment time, and turns early pilots into reusable onboarding playbooks.
  - role: Regulatory product lead
    startTiming: Month 3
    rationale: Translates THRIVE, BGTC, and hospital QA requirements into templates, approval logic, and outputs customers will trust.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Adds CDMO, consultant, and consortium channel capacity only after the first production reference proves the product can coexist with incumbent systems.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 paid design partners across THRIVE or BGTC-like accounts
      - Complete 1 live and 2 retrospective or pilot deployments with measured baseline and post-deployment cycle-time data
      - Prove at least 20% faster packet assembly on the first supported cases
      - Establish one reusable integration pattern and identify the repeatable budget owner
  - horizon: 12–24 months
    items:
      - Convert at least 2 pilots into annual production contracts
      - Reach 3-4 production programs with reusable module templates and benchmark reporting
      - Land the first adjacent ASO or non-THRIVE program using the same core workflow
      - Formalize 2 partner motions with regulatory consultants, CDMOs, or consortium advisors
  - horizon: 24–36 months
    items:
      - Reach 4 production programs consistent with the modeled $1.6M year-3 SOM or deliberately narrow the company if sales stall
      - Expand to multi-site or CDMO collaboration inside at least 2 accounts
      - Prove adjacency with at least 2 non-THRIVE production or pilot logos
      - Use aggregate module and deviation benchmarks to improve onboarding speed or win rate versus the year-one baseline
risks:
  - risk: The early buyer pool may be too small to support a standalone venture outcome before adjacency is proven.
    likelihood: High
    impact: High
    mitigation: Keep hiring and burn aligned to 2-4 flagship programs, and treat ASO, base-editing, and other ultra-small-batch adjacencies as required proof, not optional upside.
  - risk: Regulatory and QA leaders may view software-generated packet drafts as a new validation burden rather than time savings.
    likelihood: High
    impact: High
    mitigation: Start with human-in-the-loop packet assembly, explicit provenance, exportable artifacts, and no autonomous release claims.
  - risk: Modality differences and hospital system fragmentation may make deployments too bespoke to scale efficiently.
    likelihood: Medium
    impact: High
    mitigation: Separate common workflow primitives from modality-specific checklists, qualify integrations early, and gate adjacency expansion until reuse is measured.
  - risk: Existing quality suites, orchestration vendors, or services firms may extend into enough of the workflow to reduce standalone budget appetite.
    likelihood: Medium
    impact: High
    mitigation: Win on program-level control-plane value, measured cycle-time reduction, and proprietary module-plus-deviation data that adjacent tools do not capture.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to win 2-3 paid design partners, build the human-in-the-
    loop module and packet engine, ship the first reusable integration
    playbooks, hire implementation and regulatory product talent, and prove at
    least one adjacency beyond the initial THRIVE cohort before scaling sales.
