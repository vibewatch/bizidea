scenarios:
  downside:
    description: >-
      Pilot starts and conversions slip by roughly one to two quarters, the fourth program is
      still pilot-like deep into Y3, and validated integration work keeps margins below target.
    y3RevenueK: 1380.0
    y3EbitdaK: -445.8
    cashLowPointK: 230.2
    keyAssumptionChanges:
      - >-
        Production program ACV lands closer to $360K than $400K.
      - >-
        The fourth program converts late enough that Y3 carries more pilot revenue and fewer
        full-rate months.
      - >-
        Gross margin stays near 65% because services and compliance effort remain heavier for
        longer.
  base:
    description: >-
      Three design partners land in Y1, all convert within about six months, and a fourth
      adjacency program converts in Y2 so Y3 exits at four production programs.
    y3RevenueK: 1574.7
    y3EbitdaK: -240.9
    cashLowPointK: 652.8
    keyAssumptionChanges:
      - >-
        Pilot wins land in M6, M9, M12, and M23, with production conversions in M15, M18, M21, and
        M28.
      - >-
        Each mature production program reaches roughly $400K blended annual revenue at 70% gross
        margin.
      - >-
        Hiring stays lean at seven exit-Y2 FTE and eight exit-Y3 FTE.
  upside:
    description: >-
      The fourth program lands earlier, one existing account expands into collaboration or
      partner-facing modules, and the company keeps hiring flat while production revenue scales.
    y3RevenueK: 1890.0
    y3EbitdaK: 17.7
    cashLowPointK: 1095.6
    keyAssumptionChanges:
      - >-
        The fourth program converts by early Y3 and one incumbent account adds expansion revenue
        before year end.
      - >-
        Blended production revenue rises toward roughly $420K equivalent as partner-facing modules
        arrive earlier.
      - >-
        Gross margin improves to 72% because template reuse and overlay deployment stay intact.
sensitivity:
  - variable: "ARPU"
    downsideCase: "$360K blended production ACV"
    baseCase: "$400K blended production ACV"
    upsideCase: "$425K blended production ACV"
    y3RevenueImpactK: -160.0
    cashImpactK: -112.0
  - variable: "CAC"
    downsideCase: "$170K fully loaded CAC"
    baseCase: "$130K fully loaded CAC"
    upsideCase: "$100K fully loaded CAC"
    y3RevenueImpactK: 0.0
    cashImpactK: -160.0
  - variable: "churn"
    downsideCase: "3.5% steady-state monthly churn"
    baseCase: "2.5% steady-state monthly churn"
    upsideCase: "1.5% steady-state monthly churn"
    y3RevenueImpactK: -90.0
    cashImpactK: -95.0
  - variable: "sales cycle"
    downsideCase: "8-month pilot-to-production cycle"
    baseCase: "About 6 months from paid pilot to production"
    upsideCase: "4-5 months from paid pilot to production"
    y3RevenueImpactK: -195.0
    cashImpactK: -210.0
  - variable: "gross margin"
    downsideCase: "65%"
    baseCase: "70%"
    upsideCase: "72%"
    y3RevenueImpactK: 0.0
    cashImpactK: -79.0
  - variable: "hiring pace"
    downsideCase: "Bring engineer 3 and full-time QA-compliance support forward into Q2Y3"
    baseCase: "Headcount table shown in the base model"
    upsideCase: "Delay engineer 3 until after the next round"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Trigger[THRIVE or umbrella IND trigger] --> Pilot[Paid design partner]
      Pilot --> Production[Production program]
      Production --> Revenue[Subscription plus patient orchestration revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: >-
      Base-case revenue is driven by three Y1 design partners converting into four roughly $400K
      production programs by mid-Y3, not by broad logo volume.
  - checkName: Must go right
    finding: >-
      Paid pilots must convert within about six months while deployments stay export-first instead
      of becoming deep validated integration projects.
  - checkName: Model breaks if
    finding: >-
      If the fourth program slips and blended production revenue falls toward $360K, downside cash
      compresses toward roughly $230K even without extra hiring.
  - checkName: Next-round proof
    finding: >-
      The next financing is justified once the company shows two or more production conversions,
      one adjacency logo, and measured packet-cycle improvement above 20%.
sanityChecks:
  ruleOf40: >-
    Y3 growth 40.0% + EBITDA margin -15.3% = 24.7%, directionally better than Y2 but still well
    below mature software efficiency thresholds.
  burnMultiple: >-
    Burn multiple stays around 0.5x in both Y2 and Y3 using EBITDA loss over net new revenue,
    which is efficient for a niche enterprise workflow company but not yet clearly improving.
  revenuePerFte: >-
    $197K Y3 using 8 exit FTE, just below the $200-400K SaaS benchmark and acceptable only if
    implementations keep getting more templated.
  flags:
    - >-
      The initial beachhead is only about 15 near-term programs, so the model still requires
      adjacency proof by year two rather than just better THRIVE penetration.
    - >-
      The base case assumes no logo churn inside the first 36 months because each account is still
      within its initial contract window, so early non-renewal would hit cash faster than shown.
    - >-
      Revenue per exit FTE is only about $197K, so a services-heavy deployment motion would likely
      force either slower hiring or a larger next round.
    - >-
      Gross margin holds at 70% only if narrow connectors and export-first workflows remain
      acceptable to QA and regulatory teams.
