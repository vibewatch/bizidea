openQuestions:
- 'Who actually owns budget for an execution OS in target accounts: platform PI, regulatory operations, clinical gene therapy operations, or quality leadership?'
- How much of the workflow can be standardized across AAV, LNP, base editing, and ASO programs before implementation work overwhelms product leverage?
- Will FDA and institutional QA groups accept software-generated modular packets as submission-support artifacts without creating a new validation burden?
- 'Which external systems are mandatory for the first deployment: QMS, LIMS, courier workflows, hospital scheduling, or all of the above?'
