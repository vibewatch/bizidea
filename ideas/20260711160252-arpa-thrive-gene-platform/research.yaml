  validationPlan:
  - priority: high
    question: Which exact artifacts are still being assembled manually when a personalized program moves from variant selection to release and dosing?
    evidenceToGather: Shadow 2-3 THRIVE- or CHOP-like teams through one live or retrospective case and map every document, approval, and handoff.
  - priority: high
    question: 'Who actually owns the budget for an execution OS: platform PI, regulatory operations, clinical gene therapy operations, or quality?'
    evidenceToGather: Run 10-12 buyer interviews across THRIVE performers, BGTC participants, and adjacent academic centers with a procurement map for each program.
  - priority: medium
    question: Which existing systems are non-negotiable integration points in the first deployment?
    evidenceToGather: Collect stack diagrams from 5 target programs covering QMS, LIMS, document systems, courier workflows, and clinic scheduling tools.
