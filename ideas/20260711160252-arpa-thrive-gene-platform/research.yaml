competitors:
- name: TrakCel
  stage: scale-up
  wedge: Cell and gene therapy orchestration centered on chain of identity, chain of custody, and patient journey visibility.
  pricing: Custom enterprise pricing; no public rate card.
  strength: Clear public depth in patient-journey and chain-of-custody orchestration for advanced therapies.
  weaknessVsUs: Public materials do not position TrakCel around umbrella-IND module reuse or patient-specific regulatory packet versioning.
  sourceRefs:
  - 26
- name: Deloitte ConvergeHEALTH CGT Vantage
  stage: services-led platform
  wedge: Cell orchestration solution for end-to-end patient treatment journeys and manufacturer/CDMO coordination.
  pricing: Custom enterprise pricing; typically sold as solution plus services.
  strength: Strong fit where a program wants cross-organization journey visibility across complex CGT stakeholders.
  weaknessVsUs: Still framed as general CGT journey orchestration rather than reusable personalized-medicine filing and release logic.
  sourceRefs:
  - 28
- name: MasterControl
  stage: incumbent
  wedge: Quality and manufacturing digitization for CGT, including batch records, review by exception, traceability, and release support.
  pricing: Custom enterprise pricing; no public rate card.
  strength: Strong narrative around QA/QC bottlenecks, traceability, and shrinking batch-review time.
  weaknessVsUs: Quality-first orientation does not equal a program-level control plane for shared regulatory modules and bedside coordination.
  sourceRefs:
  - 29
  - 30
- name: Veeva Vault Quality
  stage: incumbent
  wedge: End-to-end quality process and content management, including QMS, QualityDocs, validation, training, and batch release.
  pricing: Custom enterprise pricing; no public rate card.
  strength: Broad quality-suite coverage and proof that CGT manufacturers already buy modern cloud quality systems.
  weaknessVsUs: Veeva’s public CGT positioning is still quality-document and batch-release centric, not patient-specific execution across the whole program clock.
  sourceRefs:
  - 31
  - 32
