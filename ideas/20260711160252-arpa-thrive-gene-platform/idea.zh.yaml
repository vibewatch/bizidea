differentiator: 通用 eTMF 和 eQMS 产品只是存文档，而细胞疗法“从采集到回输”的工具默认的是标准化产品沿既定路径流转。这家公司盯的是个体化基因药物独有的问题：共享项目模块 + 患者专属差异项，以及一次性批次放行 + 床旁给药，要一起挂在同一个项目时钟上。它的护城河会越滚越大——来自成功的伞形 IND 模式、放行偏差，以及病例周期基准数据；每多一位患者，数据就更厚一层。
