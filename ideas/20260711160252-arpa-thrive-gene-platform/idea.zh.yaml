problem: 个体化基因药物团队现在能拿到资金、也能拿到科学关注，但每新增一位患者，监管、CMC、QA 和床旁治疗团队还是得临时拉起一场脆弱的联合作业。在伞形 IND 下面，他们既要复用正确的共享模块，又要写清楚患者专属差异项，还得放行一批一次性的定制批次，并把发运和给药卡进极窄的时间窗——根本没有传统生物科技运营那种缓冲空间。今天，这些工作还散在电子表格、CRO 跟踪器和 SOP 活页夹里；偏偏 THRIVE 又要求团队按首例人体试验的速度推进，于是本可避免的延误和审计风险都被放大。
targetUser:
  primary: 在 THRIVE 资助下，准备在同一伞形 IND 下推进多个个体化首例人体病例的儿科基因药物项目里的转化运营与监管负责人
  secondary: 负责患者定制批次放行和治疗排期的 CMC、QA 以及细胞与基因治疗中心管理者
  buyer: 细胞与基因治疗运营执行总监，或监管运营负责人
startupThesis:
  nonObviousInsight: 当一个平台要承接很多个体化产品时，最稀缺的资产就不再只是编辑设计本身，而是那套可复用的运营模板——它能把共享项目模块和患者专属差异项拆开管理，并把放行和给药钉在同一只时钟上。谁先把这层控制平面做出来，谁就能在大多数团队意识到自己做的不只是科学公司、也是运营公司之前，先拿下工业化罕见病药物的控制权。
  beachhead: 拿到 THRIVE 资助的儿童医院和学术基因药物中心；它们在同一伞形 IND 下每年要跑 3-12 例个体化 CRISPR 或 ASO 患者，而且同一支转化团队得同时盯 CMC、QA、放行和床旁给药。
  wedge: 一套伞形 IND 执行 OS：把共享监管模块和患者专属变更做版本管理，自动组装放行资料包，并为每个病例同步制造、发运和给药里程碑。
  whyNowCatalyst: ARPA-H 的 THRIVE 计划把最高 $160M 的资金、第 3 年首例人体试验 硬期限 和第 5 年伞形架构要求绑在一起，让运营软件从“有最好”变成“不过线就卡死”的基础依赖。
  ventureScalePath: 先吃下 THRIVE 资助的个体化基因药物项目，再扩到相邻的 ASO、基因编辑、细胞与基因治疗，以及其他超小批量先进疗法项目——这些项目同样需要可复用的监管模块、身份链协同，以及跨医院、生物科技公司、CDMO 和监管方的病例周期分析。
solution: 产品是一套面向个体化基因药物的项目 OS。它保存主伞形 IND 的模块库，记录每个病例的患者专属差异项，再从已批准模板里自动拼出监管、QA 和放行资料包。随后，系统把制造里程碑、身份链检查点、发运窗口和床旁给药时段都拉进同一张病例时间线，并按角色做审批。项目负责人一眼就能看到，哪些病例卡在 CMC、质量审核、物流或门诊排期，哪些模块下一位患者还能继续复用。时间一长，公司会攒出这个品类里最值钱的数据：哪些模块模式最容易过审、哪些定制批次最容易放行失败、以及每个中心从病例立项到给药到底要跑多久。
goToMarketSeed:
  firstCustomer: 像 CHOP 那样的儿科基因药物项目执行总监，或像 Gemma 那样的平台型生物科技公司负责人：已经拿到 THRIVE 资助，预计会有 3-5 位个体化患者进入首例人体阶段，内部既有 CMC 也有医院治疗运营，但还没有统一的伞形 IND 控制层。
  buyingTrigger: 拿到 THRIVE 资助，或内部批准在某个伞形 IND 工作流下推进首位患者；一旦这件事发生，复用模块和协同放行/给药时间线的压力就立刻出现。
  currentAlternative: 电子表格、eTMF / eQMS 系统、CRO 项目经理，以及手工批次放行清单
  switchingReason: 专门为这类项目做的 OS 能把每位新患者的周期缩短下来，因为它把可复用的项目模块和患者专属差异项拆开管理，又把 CMC、QA、监管、物流和床旁团队都拉进同一条时间线。
  pricingHypothesis: 按每个活跃的个体化药物项目收年度订阅费，外加实施费，以及按每个已放行个体化产品收取的按患者编排费用。
