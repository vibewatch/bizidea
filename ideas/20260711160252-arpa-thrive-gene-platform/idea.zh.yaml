jobsToBeDone:
- job: 当某个伞形 IND 项目新开一位个体化患者病例时，帮项目运营负责人复用已批准的共享模块，并把患者专属放行资料包拼出来，这样团队就能在更少的监管来回里更快完成给药。
  currentAlternative: 电子表格、共享盘和 CRO 代管清单
  successMetric: 从病例立项到完整、可给药的放行资料包所需天数
- job: 当一批定制批次正往治疗节点推进时，帮 CMC、QA、物流和门诊团队把放行、发运和床旁排期卡到一起，这样患者不会因为交接失误错过给药窗口。
  currentAlternative: 靠邮件、会议和静态 SOP 活页夹做手工项目管理
  successMetric: 按时给药率，以及每个病例从放行到给药的延误次数
