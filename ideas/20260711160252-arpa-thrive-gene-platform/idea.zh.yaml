topRisks:
- name: 早期买方池太小
  description: 第一波客户很可能只是一小撮拿到 THRIVE 资助的项目，以及相邻的罕见病团队。
  mitigation: 先吃 THRIVE 这波急单，再尽快扩进 ASO、基因编辑和其他共享同类工作流的个体化先进疗法项目。
- name: 监管团队天然保守
  description: 只要软件碰到申报和放行流程，团队就可能担心它会直接影响患者治疗，从而拒绝采用。
  mitigation: 产品先作为可配置的编排层和审计轨迹层落地，所有关键节点都保留人工审批和可导出资料包，而不是做自动化申报系统。
- name: 医院集成拖慢上线
  description: 儿科中心和生物科技伙伴常常横跨碎片化的文档、质量和排程系统，实施速度很容易被拖慢。
  mitigation: 先用独立的病例时间线和资料包生成器落地，证明周期提速之后，再只接入那些最卡脖子的系统。
