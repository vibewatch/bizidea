slug: umbrella-ind-execution-os
date: '2026-07-11'
executiveSummary: 这里最该起的一家公司不是新的基因设计平台，而是一套有人审把关的执行 OS，服务美国儿科和学术基因药物项目：它们必须在同一伞形 IND 下跑多个个体化患者。首个客户应该是拿到 THRIVE 资助的项目主任，或像 CHOP 这样的中心里的基因治疗运营负责人；这类团队每年预期会有 3-12 个个体化病例，却没法靠电子表格把监管、CMC、QA、物流和床旁团队盯在一起。MVP 不该去替换 eQMS 或 eTMF，而是作为叠加层落地：给共享模块和患者专属差异项做版本管理，用已批准模板拼出放行资料包，并把每个病例从立项一路盯到给药。GTM、定价和上线都该围绕同一个触发器展开：拿到 THRIVE 资助，或批下首个伞形 IND 患者；先卖一套单项目的共创客户部署，再转成持续性的项目预算。市场证据说明，痛点足够急、首批买方有名有姓、预算也确实存在；但客户数很小，研究得出的滩头市场只有美国约 15 个近期开跑项目，模型里第 3 年 SOM 也只有 $1.6M。它之所以还有机会长成可融资的软件公司，前提是同一套控制平面能扩进 ASO、碱基编辑和其他超小批量先进疗法项目——这些项目同样会被模块复用和放行协同卡住。最好的护城河是专有运营数据：哪些模块模式更容易过审、哪些放行偏差最常出现、以及每个病例从诊断到放行和给药到底要多久；这些都是相邻的 QMS 或身份链厂商今天抓不到的数据。最关键的尽调缺口有三处：试点之后预算到底归谁、跨技术路径有多少流程真能复用，以及早期客户会不会因为验证负担而不信任软件自动起草的资料包。
problem:
- 每位个体化患者一进来，团队就得在电子表格、共享盘、CRO 跟踪器和 SOP 活页夹之间，手工复用共享监管/质量模块，再重建患者专属差异项。
- 批次放行、发运、身份链检查点和床旁给药全挂在同一条关键路径上，任何一个 QA 或门诊交接晚一步，都可能浪费掉极窄的治疗窗口。
- THRIVE 第 3 年首例人体硬期限和第 5 年伞形架构要求，把执行延误从运营烦恼抬成了资金和信誉风险。
solution:
- 做一层独立的执行层：保存主伞形 IND 模块，为患者专属差异项做版本管理，并在人工审批和可导出审计轨迹下，组装监管、QA 和放行资料包。
- 给每个患者病例一条共享时间线，把制造里程碑、批次审核、发运窗口、身份链检查点和床旁给药排期拧到一起。
- 跨病例统计周期时长、模板复用、返工和偏差，让每多一位患者，下一项目就更快、也更少出错。
whyWeWin:
- 切口正好卡在紧迫感、预算和可量化 ROI 的交点上：就是 THRIVE 或类似平台资助落地后的首位伞形 IND 患者。
- 叠加层架构比“全量替换”更贴合买方现实，因为目标项目已经在跑 QMS、文档、快递和医院排程系统，不可能全都拔掉重来。
- 每次部署都会沉淀模块、偏差和病例时序数据；这些数据，通用质量套件、CRO 和细胞疗法编排工具都不会围绕共享模块复用来组织。
strategicChoices:
  beachhead: 美国拿到 THRIVE 资助的儿童医院和学术基因药物中心；它们在同一伞形 IND 下每年运行 3-12 位个体化 CRISPR、碱基编辑或 ASO 患者。
  wedgeRationale: 这是最快能跑出证明的路径，因为买方高度集中且有名有姓，痛点已经被写进获资助的平台项目预算里，成功与否也能在一条真实工作流上量出来：从病例立项到可给药放行所省下的天数。如果一开始就卖更宽泛的罕见病基础设施或通用基因治疗软件，只会把紧迫感稀释掉，还会在核心控制平面命题没被证明前，提前背上太多工作流变体。
  sequencingRationale: 先做资料包组装、病例时间线和审批，因为这三件事正好解决首个客户眼前的硬期限，又不需要深度替换 QMS 或 eTMF。销售坚持由创始人亲自打，实施前期宁可重一点，直到 2-4 个标杆项目证明周期真的能缩短，并暴露出哪些集成是硬性要求。只有那时，才值得加更深的连接器、CDMO/站点网络协同和相邻品类扩张——因为产品边界、GTM 和招聘节奏都取决于模板复用能不能先跑通。
  notYet:
  - 没有人工审批的自动化申报或放行决策
  - 更宽泛的细胞疗法或 CAR-T 编排——那里共享模块/差异项逻辑没这么强
  - 在拿下 3-5 个美国标杆客户前，不做国际化铺开
  - 不替换整套 QMS、eTMF 或医院排程系统
market:
  tam: 当前切口下的估算 TAM 为 $18.8M：约 47 个个体化或超小批量项目，每个按约 $400k 的综合年 ACV 计算；要想撑起风投回报，必须从这个起步市场继续外扩。
  sam: 美国近期滩头市场的 SAM 约为 $6.0M：15 个有名有姓的 THRIVE / BGTC 类项目，每个按约 $400k 年 ACV 计算。
  som: 模型里的第 3 年 SOM 为 $1.6M，相当于 4 个正式生产项目，每个按约 $400k 年 ACV 计。
  segments:
  - 拿到 THRIVE 资助的儿童医院和学术基因药物中心
  - 罕见病平台型生物科技公司，以及相邻的个体化 ASO / 碱基编辑项目
  buyingProcess: 销售动作往往从一件事开始：项目拿到 THRIVE 一类资助，或批准在伞形 IND 路径下推进首位患者。到了这一步，手工拼资料包和放行协同就会立刻变成近端执行风险。部署通常由项目主任或基因治疗运营负责人发起，但只有监管运营、CMC/QA 和门诊管理层都点头，持续预算才批得下来。
product:
  mvp: MVP 是给单一个体化药物项目用的独立执行工作台：里面放伞形模块库、记录患者专属差异项、拼可导出的放行资料包，并通过按角色审批把病例里程碑一路盯到给药。第一版应该主要靠受控上传和轻量连接器跑起来，让首个客户先把 ROI 证明出来，而不是卷进一场多系统替换工程。
  sixMonth: 6 个月内要交付 2 个共创客户部署，覆盖模块版本管理、患者病例时间线、资料包组装、审批历史、基础周期仪表盘，以及至少 1 个可复用的文档或质量系统集成。
  twelveMonth: 12 个月内，把首批客户群体里可复用的技术路径模板做出来，上线病例立项到给药周期和放行返工的基准报表，并接入试点里识别出的最卡脖子的 QMS、快递或排程系统。
  twentyFourMonth: 24 个月内，扩到存量客户里的多项目铺开、CDMO / 卫星站点协同，以及首个相邻的 ASO 或非 THRIVE 个体化基因药物项目——前提是它们共享同一套控制平面原语。
  keyBets:
  - 早期客户在要求全量验证集成之前，愿意先接受导出优先的工作流和一条窄连接器。
  - 前 3-5 个项目里，至少一半的资料包结构和审批逻辑是可复用的。
  - 只要每个字段都能回链到已批准来源，监管和 QA 团队就会信任有人审把关的资料包草稿。
  - 共创客户项目产生的病例量和预算，足以在正式生产阶段支撑约 $400k 的年合同。
gtm:
  wedge: 先卖一套单项目部署：把首位伞形 IND 患者从“靠电子表格硬扛”的混乱状态，拉成一条可放行、可审计，而且有唯一负责人的病例时间线。
  channels:
  - 创始人主导直销，先打 THRIVE 执行团队、CHOP / BGTC 类中心和罕见病平台型生物科技公司
  - 通过儿科基因治疗负责人、联盟网络和顾问转介绍
  - 在拿到第一份正式生产标杆后，再接入 CDMO、监管咨询和质量现代化伙伴
  funnelTargets: 目标客户 -> 合格工作流评估 35-50%；合格评估 -> 付费共创客户 25-35%；付费共创客户 -> 年度正式生产合同 50%+；正式生产客户 -> 12 个月内第二项目或相邻站点扩张 30%+
  pricing: 先卖一套单项目的付费实施与共创客户部署，再转成年费：按每个活跃的个体化药物项目收订阅，再叠加已放行病例的按患者编排费用。当前工作假设是，正式生产阶段的年度合同价值约在 $300k-$450k，和研究里按 $400k ACV 搭的市场模型一致；毕竟买方在保护的是已经拿到资助的首例人体时间线，而不是在买通用 IT 席位。但预算到底由谁拍板，还得继续验证。
businessModel:
  revenueStreams:
  - 按每个活跃的伞形 IND 或个体化药物项目收年度订阅费
  - 一次性的实施、工作流映射和模板配置费用
  - 按患者编排费用，以及面向 CDMO / 站点网络协同的高级模块
  unitOfValue: 通过执行 OS 跑患者病例的活跃个体化药物项目
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一家医院或平台型生物科技客户内部，加更多项目、更多站点或更多病种队列
  - 从 THRIVE 资助项目扩到相邻的 ASO、碱基编辑和其他超小批量先进疗法项目
  - 随着病例数据集变厚，把基准、偏差洞察和可复用模块库单独卖出去。
  - 增加面向 CDMO、物流服务商和卫星治疗站点的伙伴工作流
strategyMap:
  northStarMetric: 通过平台跑到“可放行 + 按时给药”状态的个体化患者病例数
  inputMetrics:
  - 签下的付费共创客户数
  - 从病例立项到完整放行资料包的中位天数
  - 放行后按时给药率
  - 从已批准模板里复用的资料包章节占比
  - 付费共创客户转成年度正式生产合同的比例
  - 每个病例的外部交接延误次数
  moatsToBuild:
  - 跨伞形 IND 项目的已验证共享模块与患者差异项库
  - 覆盖监管、CMC、QA、物流和门诊交接的偏差、返工与周期基准数据集
  - 跨质量、文档、快递和治疗站点系统的集成与权限层
  killCriteria:
  - 聚焦销售 9 个月后，签下的付费共创客户少于 2 个
  - 前 3 次完整的真实或回溯部署后，中位病例资料包周期缩短不到 20%
  - 前 4 个试点里，转成年度正式生产预算的少于 2 个
  - 前 3 个客户项目里，可复用的核心资料包字段或工作流阶段不到 50%
  - 超过一半的合格账户都要求先做深度验证系统替换，才愿意试点
  mermaid: |
    flowchart LR
      Wedge[Umbrella IND beachhead] --> MVP[Human-in-the-loop execution OS]
      MVP --> Proof[Faster packet assembly and on-time dosing]
      Proof --> Expansion[More programs and adjacent advanced-therapy workflows]
investorMemo:
  verdict:
    call: 观察
    conviction: 痛点够急、切口也锋利，值得继续盯；但在公司证明预算归属和滩头市场之外的扩张性之前，判断上限仍然受限。
    whyBelieve: THRIVE、BGTC 以及类似 CHOP 的项目，确实把可复用模块软件推到了一个真实的近端瓶颈上——它能帮拿到资助的首例人体工作节省时间。
    whyDoubt: 首个滩头市场只有寥寥几个项目，而现有厂商再加服务团队，可能已经吃掉了足够多的工作流，压缩独立软件 ACV。
    nextDiligence: 拿下 2 个付费共创客户，并证明其中 1 个在放行资料包组装提速至少 20%、放行到给药延误更少之后，愿意转成持续性项目预算。
  firstCustomer:
    title: THRIVE 资助中心里的儿科基因治疗运营执行总监
    profile: 像 CHOP 那样的儿童医院或学术基因药物中心：每年跑 3-12 位个体化患者，内部有 CMC、QA 和床旁治疗团队，但没有统一的伞形 IND 控制层。
    trigger: 拿到 THRIVE 资助，或批准在某个伞形 IND 工作流下启动首位患者。
    buyer: 细胞与基因治疗运营执行总监
    initialContract: 先签一份单项目 $100k-$150k 的付费共创客户实施合同；如果前 2 个病例能证明资料包完成更快、放行到给药协同更顺，再转成约 $300k-$450k 的年度项目预算，外加按患者费用。
  mustBeTrue:
  - THRIVE / BGTC 类项目必须愿意为专用执行 OS 单独掏钱，而不是继续堆电子表格、操作手册和现有质量系统。
  - 至少一半的付费试点，要能按模型里的约 $400k ACV 转成年度正式生产合同。
  - 带受控导出和轻集成的叠加式部署，必须足以支撑第一批真实生产使用。
  - 共享模块和审批模板要能在足够多的项目之间迁移复用，让客户 2 之后的部署成本明显往下掉。
  - THRIVE 之外的相邻 ASO、碱基编辑或其他超小批量项目，必须把可触达客户数显著拉大，不能只停在最初的 15 个滩头项目。
  diligenceQuestions:
  - 试点结束后，持续预算到底由谁签字：平台 PI、监管运营、基因治疗运营，还是质量负责人？
  - 每个目标账户一年到底跑多少个活病例，目前从病例立项到给药的周期有多长？
  - AAV、碱基编辑、ASO 和 CRISPR 项目之间，哪些资料包章节和审批步骤真的能复用？
  - 首个真实病例上线前，哪些系统是硬性集成点：QMS、LIMS、快递工作流、医院排程，还是四个都要？
  - 软件自动组装资料包，会给目标医院和申办方 QA 团队额外带来多大的验证或 IT 负担？
operatingAssumptions:
- assumption: 经济买方能在不被当成中心 IT 采购的前提下，拨出约 $300k-$450k 的持续性项目预算。
  basis: research.yaml
  validationTest: 在 10 个目标账户里把采购链路摸清，并拿下 2 个由业务负责人而非中心 IT 签署 SOW 的付费试点。
  decisionImpact: 如果不成立，就要下修 ACV 预期，或改成通过服务/实施伙伴打包销售，而不是直卖软件预算。
- assumption: 导出优先的部署方式，再加 1 条窄集成，就足以做出首个真实生产价值。
  basis: idea.yaml
  validationTest: 前 2 个共创客户都要在 8 周内上线，且无需深接 QMS 或排程系统也能支持 1 个真实病例。
  decisionImpact: 如果不成立，实施会重到不适合 pre-seed 阶段的 GTM 计划，路线图就得转向集成基础设施。
- assumption: 前 3 个客户项目里，超过 50% 的模块结构和审批逻辑是可复用的。
  basis: research.yaml
  validationTest: 比较 3 个客户的资料包字段、审核阶段和偏差记录，量出可复用组件占比。
  decisionImpact: 如果不成立，就要收窄到单一技术路径，或接受更偏服务型、毛利率更低的生意。
- assumption: 只要可追溯性和审批都写清楚，人工把关的资料包草稿就能被信任。
  basis: research.yaml
  validationTest: 跟踪前 20 个自动生成章节或前 5 个病例资料包里的审核覆盖率、改写率和签字接受度。
  decisionImpact: 如果不成立，产品就要收窄成编排与时间线可视化，而不是资料包起草。
- assumption: THRIVE 之外的相邻个体化疗法，和它共享足够多的流程原语，至少能把可触达客户数翻一倍。
  basis: operator judgment
  validationTest: 筛 10 个非 THRIVE 项目，确认至少 4 个同样在抱怨模块复用和放行协同，而且审批步骤也高度相似。
  decisionImpact: 如果不成立，这家公司就是个窄工作流生意，融资规模和招聘节奏都该一起收住。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 跟着 2 个 THRIVE / BGTC 类项目，旁观 3 个回溯或真实患者病例，把每一份文档、审批和交接全都画出来。
  hypothesis: 手工负担其实集中在一组可重复的模块复用、资料包组装和放行协同步骤上。
  successMetric: 做出一张共享工作流地图，至少找出 3 类高频工件和 2 个跨所有病例都存在的可量化延误。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 访谈 12 位平台 PI、基因治疗运营、监管运营和 QA 负责人，并把采购链路一并摸清。
  hypothesis: 虽然工作流归属跨很多人，但真正拍板的经济买方和可重复的购买触发器依然存在。
  successMetric: 12 个账户里，至少 8 个指向同一个预算负责人或同一类采购委员会，且至少 3 个愿意进入付费共创客户范围界定。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 在还没做深自动化前，先围绕一家 THRIVE 类项目的历史病例数据，交付人工代跑式资料包生成试点。
  hypothesis: 即便没有深集成，只靠模块版本管理和资料包组装，也会有共创客户愿意付钱。
  successMetric: 签下 1 个付费试点，且资料包草稿准备时间比客户历史流程至少缩短 20%。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 先用导出型工作流 + 1 条文档或质量集成，跑起第一个单项目真实部署。
  hypothesis: 即便不替换整套 QMS 或排程系统，产品也能支撑一个真实患者病例。
  successMetric: 8 周内上线、完成 1 个真实病例，并把从病例立项到放行资料包的时间至少缩短 20%。
  owner: 实施负责人
- horizon: 180–360 天
  experiment: 在前 3 个客户项目里加上基准报表和模板复用能力。
  hypothesis: 跨项目的基准与复用数据，能提高转化率，也能明显缩短后续上线时间。
  successMetric: 核心资料包内容至少有 50% 可复用，且客户 3 的上线时间比客户 1 快 30%。
  owner: 监管产品负责人
- horizon: 180–540 天
  experiment: 筛 1 个相邻的 ASO 或非 THRIVE 个体化项目，用同一套控制平面做验证。
  hypothesis: 这个切口不靠重做产品，就能从 THRIVE 扩到相邻赛道。
  successMetric: 拿到 2 个合格的相邻机会，并签下 1 个试点；它与现有模板的工作流重合度至少达到 40%。
  owner: 创始人/CEO
operations:
- 把每次部署都标准化成四件事：工作流映射、模块库搭建、基线指标采集，以及监管、CMC、QA、物流和门诊负责人的每周 blocker 复盘。
- 从第一天起，就把可导出的审计轨迹、按角色审批，以及从来源到资料包的明确可追溯性，当成产品和运营硬约束。
- 先做一套窄而够用的集成目录，覆盖文档系统、质量流程、快递里程碑和站点排程；能用实施操作手册复用的地方，就尽量别写定制代码。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 在真正的预算负责人 和扩张路径都还没被证明之前，必须亲自抓创始人主导销售、共创客户筛选、定价和相邻需求学习。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责把模块数据模型、工作流引擎、权限层和第一批集成做出来；这些直接决定客户多久能见到价值。
- role: 实施负责人
  startTiming: 第 2 个月
  rationale: 把客户特有流程编码进去，缩短部署时间，并把早期试点沉淀成可复用的上线操作手册。
- role: 监管产品负责人
  startTiming: 第 3 个月
  rationale: 把 THRIVE、BGTC 和医院 QA 要求翻成模板、审批逻辑和客户愿意信的输出结果。
- role: 合作负责人
  startTiming: 第 9 个月
  rationale: 只有第一份正式生产标杆证明产品能与现有系统共存之后，才补上 CDMO、顾问和联盟渠道能力。
milestones:
- horizon: 0–12 个月
  items:
  - 在 THRIVE / BGTC 类账户里签下 3 个付费共创客户。
  - 完成 1 次真实部署，以及 2 次回溯或试点部署，并留下部署前后的周期基线数据。
  - 在首批支撑的病例上，证明资料包组装速度至少快 20%。
  - 跑出 1 套可复用的集成模式，并识别出可重复的预算负责人。
- horizon: 12–24 个月
  items:
  - 至少把 2 个试点转成年度正式生产合同。
  - 做到 3-4 个正式生产项目，并跑通可复用模块模板与基准报表。
  - 用同一套核心工作流拿下第一个相邻的 ASO 或非 THRIVE 项目。
  - 和监管顾问、CDMO 或联盟顾问固化 2 种伙伴打法。
- horizon: 24–36 个月
  items:
  - 做到 4 个正式生产项目，与模型里的第 3 年 $1.6M SOM 对齐；如果销售跑不动，就主动收窄公司边界。
  - 在至少 2 个账户里扩到多站点或 CDMO 协作。
  - 至少用 2 个非 THRIVE 的正式生产或试点客户，把相邻验证做实。
  - 用汇总后的模块与偏差 基准，把上线速度或赢单率明显拉高到超过第 1 年基线。
risks:
- risk: 在相邻扩张被证明之前，早期买方池可能小到撑不起一家独立的风投型公司。
  likelihood: High
  impact: High
  mitigation: 招聘和 burn 都按 2-4 个旗舰项目来配；ASO、碱基编辑和其他超小批量相邻赛道，不是可选 upside，而是必须交出来的验证。
- risk: 监管和 QA 负责人可能会把软件生成的资料包草稿，当成新的验证负担，而不是节省时间。
  likelihood: High
  impact: High
  mitigation: 先从人工把关的资料包组装、明确来源、可导出工件和不做自动放行声明开始。
- risk: 不同 技术路径 的差异，加上医院系统过于碎片化，可能让部署过于定制，难以高效规模化。
  likelihood: Medium
  impact: High
  mitigation: 把共通的工作流原语和 技术路径 专属检查表拆开建，及早筛集成点，并在量出复用率前，不贸然扩相邻赛道。
- risk: 现有质量套件、编排厂商或服务公司，可能会把足够多的工作流吃进去，削弱独立预算意愿。
  likelihood: Medium
  impact: High
  mitigation: 差异化要压在项目级控制平面的价值、可量化的周期缩短，以及相邻工具抓不到的模块 + 偏差专有数据上。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要覆盖 18 个月，让团队拿下 2-3 个付费共创客户、把人工把关的模块与资料包引擎做出来、交付第一套可复用集成 操作手册、招到实施与监管产品人才，并在扩大销售前，先证明最初 THRIVE 队列之外至少有 1 条相邻扩张路径。
