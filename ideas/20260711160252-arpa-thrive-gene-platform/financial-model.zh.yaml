modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Trigger[THRIVE or umbrella IND trigger] --> Pilot[Paid design partner]
      Pilot --> Production[Production program]
      Production --> Revenue[Subscription plus patient orchestration revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入不是靠客户数海量增长，而是靠 Y1 的 3 个共创客户在 Y3 年中之前转成 4 个、每个约 $400K 的正式生产项目。
- checkName: 必须跑顺的地方
  finding: 付费试点必须在大约 6 个月内转成正式合同，同时部署得继续走“导出优先”路线，不能演变成深度验证集成项目。
- checkName: 模型会坏在
  finding: 如果第 4 个项目继续往后拖，且综合正式生产收入往 $360K 靠，哪怕不额外招人，downside 情形里的现金低点也会被压到约 $230K。
- checkName: 下一轮证明点
  finding: 下一轮融资站得住脚，前提是公司至少拿下 2 次正式生产转化、1 个相邻客户，并把资料包周期缩短幅度稳定做到 20% 以上。
sanityChecks:
  ruleOf40: Y3 增长 40.0% + EBITDA 利润率 -15.3% = 24.7%；方向上比 Y2 好，但离成熟软件公司的效率线还差得远。
  burnMultiple: 按 EBITDA 亏损 / 净新增收入计算，Y2 和 Y3 的 burn multiple 都在约 0.5x；对一家窄企业工作流公司来说算高效，但改善趋势还不够硬。
  revenuePerFte: 按年末 8 名 FTE 算，Y3 人均收入约 $197K；略低于 SaaS 常见的 $200-400K 区间，只有在实施越来越模板化的前提下才算站得住。
  flags:
  - 初始滩头市场只有约 15 个近端项目，所以模型到第 2 年就必须交出相邻扩张证明，不能只靠更深吃透 THRIVE。
  - 基准情形假设前 36 个月没有客户流失，因为每个账户都还在首个合同窗口内；如果早期就出现不续约，现金会比模型里掉得更快。
  - 按退出时 FTE 计，人均收入只有约 $197K；如果部署动作过于服务化，公司大概率只能更慢招人，或者更早去拿下一轮。
  - 毛利率能守在 70%，前提是窄连接器和导出优先工作流持续被 QA 与监管团队接受。
