scenarios:
  downside:
    description: 试点启动和转正式生产都比计划晚约 1-2 个季度；第 4 个项目到 Y3 深处还停留在试点态，且验证型集成工作把毛利率持续压在目标以下。
    y3RevenueK: 1380.0
    y3EbitdaK: -445.8
    cashLowPointK: 230.2
    keyAssumptionChanges:
    - 正式生产项目的 ACV 更接近 $360K，而不是 $400K。
    - 第 4 个项目转化太晚，导致 Y3 里试点收入占比更高，满价月份更少。
    - 由于服务和合规投入更重、持续更久，毛利率只能停在约 65%。
  base:
    description: Y1 拿下 3 个共创客户，全部在约 6 个月内转正；Y2 再把第 4 个相邻项目转成正式生产，因此 Y3 退出时一共 4 个正式生产项目。
    y3RevenueK: 1574.7
    y3EbitdaK: -240.9
    cashLowPointK: 652.8
    keyAssumptionChanges:
    - 试点在 M6、M9、M12 和 M23 落地；正式生产转化发生在 M15、M18、M21 和 M28。
    - 每个成熟的正式生产项目，综合年收入约 $400K，毛利率 70%。
    - 招聘继续保持精益：Y2 末 7 名 FTE，Y3 末 8 名 FTE。
  upside:
    description: 第 4 个项目更早落地，其中一个现有账户还扩展到协作模块或面向伙伴的模块；与此同时，公司在正式生产收入放大时仍把招聘压平。
    y3RevenueK: 1890.0
    y3EbitdaK: 17.7
    cashLowPointK: 1095.6
    keyAssumptionChanges:
    - 第 4 个项目在 Y3 前段就转正，且至少 1 个现有账户在年末前带来扩张收入。
    - 随着面向伙伴的模块更早上线，综合正式生产收入抬到约等效 $420K。
    - 模板复用和叠加式部署保持成立，毛利率提升到 72%。
