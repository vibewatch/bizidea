    - 27
    - 29
  adoptionFrictionMatrix:
  - friction: 提交相邻自动化的信任门槛
    severity: high
    affectedBuyer: 监管或临床运营负责人
    mitigation: 先把产品做成有人审把关的资料包生成器：可导出审计轨迹、审批历史和清晰的模块版本管理都得摆在台面上，而不是一上来就讲自动化申报。
    sourceRefs:
    - 5
    - 14
    - 15
  - friction: 接入质量、制造和站点系统
    severity: high
    affectedBuyer: 平台运营负责人
    mitigation: 先以叠加层方式落地，通过 API 或受控文件交换接进去，再考虑深度打通每一套 QMS、LIMS 或排程系统。
    sourceRefs:
    - 26
    - 28
    - 29
    - 31
  - friction: 早期客户市场太小，而且高度依赖标杆转介绍
    severity: high
    affectedBuyer: 创始人 / CEO
    mitigation: 先拿下 2-4 个旗舰 THRIVE / BGTC 共创客户，并公开展示可量化的周期缩短或资料包返工下降。
    sourceRefs:
    - 3
    - 10
    - 34
  - friction: AAV、LNP、碱基编辑和 ASO 项目之间存在 技术路径 差异
    severity: medium
    affectedBuyer: 产品与实施负责人
    mitigation: 把共享工作流原语和 技术路径 专属检查表拆开建，让模板按平台分支，而不是每遇到一种平台就重写核心系统。
    sourceRefs:
    - 2
    - 13
    - 18
market:
  tam:
    value: $18.8M
    rationale: TAM 按 47 个年度项目许可证来算，每个约 $400k ACV = 7 支 THRIVE 团队 + 8 个 BGTC 临床测试案例 + 约 32 个相邻项目；后者近似取自 ASGCT 3,243 个活跃基因/细胞/RNA 试验中的约 1%，假设它们会落到个体化或超小批量执行工作流里。
    isEstimate: true
    sourceRefs:
    - 3
    - 10
    - 23
  sam:
    value: $6.0M
    rationale: 近期美国滩头市场的 SAM 按 15 个有名有姓项目 x $400k ACV 来算：7 支 THRIVE 执行团队 + 最多 8 个 BGTC 测试案例试验。
    isEstimate: true
    sourceRefs:
    - 3
    - 10
  som:
    value: $1.6M
    rationale: 第 3 年可触达的 SOM 按 4 个共创客户项目 x $400k ACV 来算；大约是已识别滩头市场的四分之一，也和首批客户高度集中的事实一致。
    isEstimate: true
    sourceRefs:
    - 3
    - 10
    - 34
