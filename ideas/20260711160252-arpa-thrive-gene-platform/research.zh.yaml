categoryDynamics:
  growthRate: 更广义 CGT 市场到 2034 年的 CAGR 为 18.7%
  growthRateSourceRefs:
  - 30
  tailwinds:
  - point: ARPA-H 同时在给平台开发和分布式制造拨钱，这会继续增加需要可重复执行基础设施的项目数量。
    sourceRefs:
    - 3
    - 27
  - point: FDA 正在明确测试更灵活的证据与 主协议 结构，面向个体化疗法的平台执行因此更相关。
    sourceRefs:
    - 5
    - 6
    - 9
  - point: 更广义赛道依然很深：全球有 3,243 个活跃的基因、细胞或 RNA 疗法试验，非肿瘤方向也在升温，为滩头市场之外的长期扩张留了路。
    sourceRefs:
    - 23
    - 25
  headwinds:
  - point: 首批买方市场天然集中在少数拿到资金的项目和顶尖中心周围。
    sourceRefs:
    - 3
    - 10
  - point: 即便政策更灵活，CMC、质量和面向监管方的证据负担依然很重。
    sourceRefs:
    - 8
    - 15
  - point: 项目完全可以先拿 QMS 工具、编排工具和现成 操作手册 顶住，而不是马上去买一套新的系统记录源。
    sourceRefs:
    - 11
    - 26
    - 29
    - 31
competitors:
- name: TrakCel
  stage: 成长期
  wedge: 围绕身份链、保管链和患者旅程可视化做细胞与基因治疗编排。
  pricing: 定制企业定价；无公开价目表。
  strength: 公开材料里，对先进疗法的患者旅程和保管链编排讲得最深。
  weaknessVsUs: 公开材料没有把 TrakCel 定位成伞形 IND 模块复用或患者专属监管资料包版本管理工具。
  sourceRefs:
  - 26
- name: Deloitte ConvergeHEALTH CGT Vantage
  stage: 服务型平台
  wedge: 面向端到端患者治疗旅程，以及制造商 / CDMO 协同的细胞编排方案。
  pricing: 定制企业定价；通常和服务一起打包出售。
  strength: 当项目需要跨组织看清复杂 CGT 干系人的整体旅程时，它的契合度很强。
  weaknessVsUs: 它依然更像通用 CGT 旅程编排，而不是面向个体化基因药物的可复用申报与放行逻辑。
  sourceRefs:
  - 28
- name: MasterControl
  stage: 现有厂商
  wedge: 面向 CGT 的质量与制造数字化，包括批记录、例外审核、可追溯性和放行支持。
  pricing: 定制企业定价；无公开价目表。
  strength: 在 QA / QC 瓶颈、可追溯性和缩短批次审核时间上，公开叙事很强。
  weaknessVsUs: 以质量为先，不等于一套能把共享监管模块和床旁协同都挂进去的项目级控制平面。
  sourceRefs:
  - 29
  - 30
- name: Veeva Vault Quality
  stage: 现有厂商
  wedge: 端到端质量流程与内容管理，包括 QMS、QualityDocs、验证、培训和批次放行。
  pricing: 定制企业定价；无公开价目表。
  strength: 质量套件覆盖广，而且已证明 CGT 制造商愿意为现代云质量系统买单。
  weaknessVsUs: Veeva 面向 CGT 的公开定位仍然是质量文档和批次放行，而不是贯穿整个项目时钟的患者专属执行层。
  sourceRefs:
  - 31
  - 32
regulatoryTechnicalConstraints:
- point: THRIVE 明确要求临床与监管创新，并给出第 3 年启动首例人体、第 5 年扩到伞形 IND 的目标。
  sourceRefs:
  - 3
- point: 基因治疗 IND 仍然需要详尽的 CMC 证据，覆盖安全性、身份、质量、纯度以及强度或效价。
  sourceRefs:
  - 8
  - 14
  - 15
- point: FDA 还没有把基因疗法里的“平台化 reuse”完全标准化，因此申办方必须为哪些东西能在不同患者或产品间沿用给出充分论证。
  sourceRefs:
  - 6
  - 13
- point: Master protocol 和伞形逻辑能帮忙，但扎实的自然病史数据和设计得当的临床研究依然是硬前提。
  sourceRefs:
  - 5
  - 9
  - 16
validationSignals:
- point: CHOP 和 Penn 已经把 KJ 的疗法在几个月内推到患者身上，随后又把计划扩成覆盖 7 种尿素循环障碍的伞形试验模型。
  sourceRefs:
  - 4
  - 18
- point: BGTC 正在明确搭建一套标准化运营 操作手册，包括最多 8 个临床测试案例、主监管文件和统一制造流程。
  sourceRefs:
  - 10
  - 11
- point: ARPA-H 正在以足够大的规模给多个项目拨款，足以支撑非玩具级的执行基础设施；CHOP 和 JAX 的例子都在 $30M 以上。
  sourceRefs:
  - 3
  - 33
  - 34
- point: 现有 CGT 厂商已经在这个赛道卖编排、批次放行和质量层，这本身就证明软件预算存在——只是精确切口还空着。
  sourceRefs:
  - 26
  - 29
  - 31
  - 32
openQuestions:
- 在目标账户里，一套执行 OS 的预算到底归谁：平台 PI、监管运营、临床基因治疗运营，还是质量负责人？
- AAV、LNP、碱基编辑和 ASO 项目之间，到底有多少工作流能标准化到不把实施工作量做炸？
- FDA 和机构 QA 团队会不会接受软件生成的模块化资料包，把它当成申报支持工件，而不会反过来制造新的验证负担？
- 第一次部署时，哪些外部系统是硬性要求：QMS、LIMS、快递工作流、医院排程，还是全都要？
