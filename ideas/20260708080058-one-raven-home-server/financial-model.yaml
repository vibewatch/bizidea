fundingAsk:
  round: pre-seed
  amountM: 2.6
  runwayMonths: 24
  milestone: Reach 8 production deployments, publish one builder-owned callback or closeout case study, and enter the second-platform
    decision with six months of buffer after Q4Y2.
  useOfFunds:
    - bucket: Engineering
      amountUsd: 1300000
      percentage: 50
    - bucket: GTM
      amountUsd: 780000
      percentage: 30
    - bucket: G&A
      amountUsd: 234000
      percentage: 9
    - bucket: Buffer (6 mo)
      amountUsd: 286000
      percentage: 11
scenarios:
  downside:
    description: Builder pilots convert more slowly, second-community expansion slips, and realized production pricing stays
      below the modeled homes-per-division path.
    y3RevenueK: 2160.0
    y3EbitdaK: -559.1
    cashLowPointK: 164.0
    keyAssumptionChanges:
      - Q4Y3 customersEop lands around 15 instead of 18 because paid-pilot to production conversion softens below the BP target.
      - Exit blended monthly ARPU lands near $16.2K instead of $17.2K because fewer divisions add second communities.
      - Gross margin only reaches about 70 percent by Q4Y3 because device QA and support remain more services-heavy.
  base:
    description: Founder-led pilots convert on schedule, the narrow one-platform playbook repeats across builder divisions,
      and exit ARR reaches the researched year-3 SOM without assuming a full-year run at that level.
    y3RevenueK: 2486.4
    y3EbitdaK: -298.4
    cashLowPointK: 395.5
    keyAssumptionChanges:
      - CustomersEop reaches 3 by M12, 8 by Q4Y2, and 18 by Q4Y3.
      - Blended monthly ARPU rises from pilot-heavy Y1 levels to about $17.2K by Q4Y3 as more homes per builder division activate.
      - Gross margin reaches 72 percent in Q4Y3 as certification, commissioning, and buyer handoff steps standardize.
  upside:
    description: Partner channels start contributing earlier, more builders expand from one community to multiple communities,
      and template reuse improves margin faster than planned.
    y3RevenueK: 3002.4
    y3EbitdaK: 123.1
    cashLowPointK: 567.7
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches about 20 instead of 18 as partner-sourced expansion adds two more deployments.
      - Exit blended monthly ARPU reaches about $18.2K because more accounts roll into higher-home-count division contracts.
      - Gross margin reaches roughly 74 percent by Q4Y3 because fewer field exceptions require custom support.
sensitivity:
  - variable: ARPU
    downsideCase: Average homes per production deployment stays below plan and exit blended monthly ARPU runs about 10 percent
      lower.
    baseCase: Exit blended monthly ARPU reaches about $17.2K as divisions expand beyond the first community.
    upsideCase: More divisions add second communities and analytics modules, lifting exit blended monthly ARPU above $18K.
    y3RevenueImpactK: -248.6
    cashImpactK: -190.0
  - variable: CAC
    downsideCase: Partner referrals underperform and acquisition efficiency drifts toward roughly $105K per net new paying
      account.
    baseCase: CAC stays near $85.9K with founder-led selling plus selective partner sourcing.
    upsideCase: Integrator and platform partners source more of the pipeline and CAC trends toward the low-$70Ks.
    y3RevenueImpactK: -120.0
    cashImpactK: -260.0
  - variable: churn
    downsideCase: Monthly churn rises toward 3.5 percent if vendors internalize parts of the workflow or pilots fail to expand.
    baseCase: Monthly churn holds near 2.5 percent once accounts convert into production closeout workflows.
    upsideCase: Monthly churn stays near 1.5 percent because the workflow becomes the builder system of record.
    y3RevenueImpactK: -170.0
    cashImpactK: -140.0
  - variable: sales cycle
    downsideCase: Named-account to paid-pilot plus pilot-to-production takes closer to 6 months than 4 months.
    baseCase: Warm builder conversations convert to paid pilots in roughly 4 months and production in the following quarter.
    upsideCase: Design-partner proof compresses the cycle toward 3 months for the next builders.
    y3RevenueImpactK: -400.0
    cashImpactK: -310.0
  - variable: gross margin
    downsideCase: Gross margin stalls around 67-70 percent because device fragmentation keeps implementation more manual.
    baseCase: Gross margin reaches the BP target band and exits Y3 at about 72 percent.
    upsideCase: Gross margin moves into the mid-70s as QA matrices and onboarding templates become more reusable.
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: hiring pace
    downsideCase: Two Y3 scale hires are pulled forward before the first production playbook is fully repeatable.
    baseCase: "Hiring follows the plan: field and QA capacity first, then a second seller and later engineering support."
    upsideCase: The last engineer can slip past Q4Y3 without constraining delivery because the first platform remains narrow.
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetBuilders[Target builders] --> PaidPilots[Paid pilot communities]
      PaidPilots --> ProductionDeployments[Production deployments]
      ProductionDeployments --> ActivatedHomes[Activated homes]
      ActivatedHomes --> Revenue[Subscription plus per-home revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base revenue comes from converting 3 Y1 paid pilots into 8 production deployments by Q4Y2 and then expanding
      to 18 builder or division accounts at roughly $3.7M exit ARR by Q4Y3.
  - checkName: Must go right
    finding: The one-platform, narrow-device implementation path must stay reusable enough that 11 ending FTE can support
      18 deployments while gross margin still exits above 70 percent.
  - checkName: Model breaks if
    finding: If sales cycles drift toward 6 months or vendors keep the builder console in-house, the downside case drives
      cash toward roughly $164K before the next financing window.
  - checkName: Next-round proof
    finding: The seed story is 8 production deployments and one builder-owned callback or closeout case study by Q4Y2 with
      enough buffer left to fund the second-platform decision.
sanityChecks:
  ruleOf40: Y3 growth 182.6% + EBITDA margin -12.0% = 170.6%
  burnMultiple: Y2 burn multiple is about 1.0x using roughly $1.0M of EBITDA burn against about $1.0M of net new ARR from
    the Y1 exit run-rate to the Q4Y2 exit run-rate.
  revenuePerFte: "$226K Y3 on 11 ending FTE (benchmark $200-400K implementation-heavy SaaS)"
  flags:
    - customersEop includes paid pilots and production deployments, so true production-logo count is lower than the headline
      customer count until early Y2.
    - The Y3 ARPU path assumes builders expand from one community into larger division contracts; if expansion stays single-community,
      revenue falls faster than headcount can shrink.
    - Gross margin only reaches the low-70s if device and firmware QA stays templated; extra fragmentation would push more
      work into services and compress cash runway.
    - Cash is modeled as EBITDA only, so pilot prepayments, implementation reimbursements, or modest capex could move the
      actual cash trough earlier or later by a few hundred thousand dollars.
