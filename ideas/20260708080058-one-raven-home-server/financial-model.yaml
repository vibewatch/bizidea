slug: local-smart-home-commissioning
date: "2026-07-08"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-07"
    unit: month
    source: '[BP date 2026-07-08] the model starts in the same month as the dated business plan because the pre-seed plan
      and first interviews begin immediately.'
  - id: A2
    name: Opening cash / pre-seed raise
    value: '2600'
    unit: USD K
    source: '[BP fundingAsk.targetFundingRangeUsd $2-4M and runwayMonths 18] the model uses a low-midpoint $2.6M raise because
      it reaches the Q4Y2 proof point and still carries roughly six months of modeled burn.'
  - id: A3
    name: Paying customer definition
    value: active paid pilot community or production builder/division deployment
    unit: definition
    source: '[BP gtm.wedge plus BP businessModel.revenueStreams] customersEop counts any builder account already paying for
      pilot or production scope.'
  - id: A4
    name: Paid pilot value
    value: '45'
    unit: USD K per pilot
    source: '[BP investorMemo.firstCustomer.initialContract $30K-$60K paid pilot] the model uses the midpoint and recognizes
      it over about three months.'
  - id: A5
    name: Production pricing structure
    value: 40 + 0.2 per activated home-year
    unit: USD K per customer-year
    source: '[Research bottomUpSizingDrivers ~$40k annual subscription assumption and ~$200 per home] plus [BP investorMemo.firstCustomer.initialContract
      production pricing framework].'
  - id: A6
    name: Y1 end-of-month paying customer ramp
    value: 0,0,0,1,1,1,2,2,2,3,3,3
    unit: customersEop
    source: '[BP milestones sign 3 paid pilot communities in 0-12 months and convert at least 2 into production] the ramp
      keeps founder-led selling conservative.'
  - id: A7
    name: Y2 quarter-end paying customer ramp
    value: 4,5,7,8
    unit: customersEop
    source: '[BP milestones expand to at least 8 builder or division production deployments in 12-24 months].'
  - id: A8
    name: Y3 quarter-end paying customer ramp
    value: 10,12,15,18
    unit: customersEop
    source: '[BP milestones reach about 18 builder or division customers by 24-36 months] and [Research market.som 15,000
      homes across about 18 customers].'
  - id: A9
    name: Y1 blended monthly ARPU schedule
    value: M1-M12 = 0,0,0,15.0,15.0,15.0,13.0,12.0,12.0,11.0,11.0,11.0
    unit: USD K per average active customer-month
    source: '[A4-A5] early revenue is pilot-heavy, then mixes into first production subscriptions while one pilot remains
      in flight at year-end.'
  - id: A10
    name: Y2 blended monthly ARPU schedule
    value: Q1-Q4 = 12.0,13.0,14.0,14.5
    unit: USD K per average active customer-month
    source: '[A5] and [BP milestones 8 production deployments by 24 months] as more homes per builder division go live after
      pilot conversion.'
  - id: A11
    name: Y3 blended monthly ARPU schedule
    value: Q1-Q4 = 15.5,16.0,17.0,17.2
    unit: USD K per average active customer-month
    source: '[A5] and [Research market.som ~15,000 homes across 18 customers] which implies roughly $3.7M exit ARR at the
      end of Y3 rather than on day one of Y3.'
  - id: A12
    name: Gross margin ramp
    value: Y1 revenue months 35-58%; Y2 60-68%; Y3 69-72%
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 70] plus startup-finance heuristic that early smart-home workflow pilots
      carry heavier implementation and support drag before QA templates become repeatable.'
  - id: A13
    name: Hiring sequence
    value: M1 Founder/CEO + Founding Eng + Product/Implementation; M4 Solutions; M7 QA/Integrations; M10 GTM; M16 Platform
      Eng; M20 Customer Success; M22 G&A; M31 Account Executive; M34 Integrations Eng
    unit: timeline
    source: '[BP team.startTiming Month 0/3/6/9] and [BP strategicChoices.sequencingRationale] with later hires added only
      after the first production playbook starts to repeat.'
  - id: A14
    name: Founder loaded compensation
    value: '150'
    unit: USD K per year
    source: '[BP experimentRoadmap owner CEO founder] plus startup-finance heuristic for a lean pre-seed founder cash salary
      including payroll taxes and benefits.'
  - id: A15
    name: Engineering loaded compensation
    value: '180'
    unit: USD K per engineer-year
    source: '[BP team Founding eng and QA/integrations engineer roles] plus startup-finance heuristic for integration-heavy
      early technical hires.'
  - id: A16
    name: Product / implementation loaded compensation
    value: '150'
    unit: USD K per year
    source: '[BP team Product and implementation lead] plus startup-finance heuristic for a senior workflow owner who spans
      product design and deployment.'
  - id: A17
    name: Solutions / success loaded compensation
    value: '140'
    unit: USD K per year
    source: '[BP team Solutions engineer] plus startup-finance heuristic for a deployment and customer-success operator in
      an implementation-heavy motion.'
  - id: A18
    name: Sales / partnerships loaded compensation
    value: '175'
    unit: USD K per year
    source: '[BP team GTM and partnerships lead] plus startup-finance heuristic for early enterprise GTM with travel and variable
      compensation.'
  - id: A19
    name: G&A / ops loaded compensation
    value: '120'
    unit: USD K per year
    source: '[BP operations and fundingAsk.useOfFundsSummary] plus startup-finance heuristic for a lean ops and compliance
      hire.'
  - id: A20
    name: Payroll allocation to P&L lines
    value: Founder 60% S&M / 40% G&A; Product/Implementation 40% S&M / 60% R&D; Solutions/Success 50% S&M / 50% R&D; Engineering
      100% R&D; Sales 100% S&M; G&A 100% G&A
    unit: allocation
    source: '[BP team rationales + BP operations] map each role to the operating function it mainly supports.'
  - id: A21
    name: Non-salary opex ramp
    value: Y1 monthly 16-26; Y2 quarterly 84-108; Y3 quarterly 114-141
    unit: USD K
    source: '[BP fundingAsk.useOfFundsSummary and BP operations] plus startup-finance heuristic covering cloud tooling, travel,
      legal, insurance, certification work, and partner support.'
  - id: A22
    name: Steady-state monthly churn
    value: '2.5'
    unit: percent per month
    source: "Startup-finance heuristic for early builder workflow SaaS: annual contracts and embedded closeout processes create\
      \ stickiness, but platform-vendor overlap keeps churn above mature vertical SaaS levels."
  - id: A23
    name: CAC convention
    value: Y2-Y3 S&M spend divided by 15 net new paying accounts
    unit: formula
    source: '[BP gtm funnel targets and founder-led/direct + partner channels] with the model using total Y2-Y3 sales and
      marketing spend as the acquisition cost base.'
  - id: A24
    name: Cash conversion convention
    value: cash movement equals EBITDA
    unit: formula
    source: "Startup-finance heuristic: capex, debt service, taxes, and working-capital timing are assumed immaterial relative\
      \ to burn at pre-seed scale."
  - id: A25
    name: Next-round milestone and 6-month buffer
    value: 8 production deployments plus 1 builder-owned ROI case study by Q4Y2, with ~286K of buffer for the next 6 months
      of burn
    unit: milestone
    source: '[BP milestones 12-24 months + BP fundingAsk.runwayMonths 18] and model-calculated Q1-Q2Y3 burn of about $286.6K.'
  - id: A26
    name: Delivery leverage
    value: 11 ending FTE supports 18 deployments because scope stays on one platform and a narrow device matrix through Y3
    unit: capacity
    source: '[BP product.twentyFourMonth + BP operatingAssumptions one platform and narrow device categories first] plus startup-finance
      heuristic for avoiding a services-heavy field team too early.'
