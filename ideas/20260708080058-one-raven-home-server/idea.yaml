topRisks:
  - name: Device fragmentation
    description: Local-first smart-home deployments can span many locks, thermostats, sensors, and firmware combinations that make standardization hard early on.
    mitigation: Start with one local-first platform, three to four device categories, and repeatable floorplan templates before widening hardware support.
  - name: Builder channel inertia
    description: Production homebuilders may default to bundled cloud vendors or avoid an extra workflow unless the ROI is obvious during community rollout.
    mitigation: Land through one pilot community with a preferred installer and measure reduced callbacks, faster closeouts, and clearer buyer handoff against the status quo.
  - name: Limited remote telemetry
    description: A privacy-first architecture can make remote troubleshooting harder than cloud-connected systems, which may weaken the value proposition if support feels blind.
    mitigation: Use homeowner-approved diagnostics, local health snapshots, and staged update bundles that preserve privacy while still giving support teams actionable signals.
