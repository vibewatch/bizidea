problem: >-
  Production homebuilders increasingly include locks, thermostats, sensors, and
  automations as part of the new-home package, but rollout still depends on
  cloud vendor portals, installer punch lists, and homeowner-care tickets. That
  creates a painful gap at closing: builders must prove every device works,
  transfer control cleanly to the buyer, and absorb support blowback from
  outages or opaque data practices. Local-first servers fix privacy and uptime
  at the product layer, but they also remove the default cloud console builders
  relied on for commissioning and support. Without a builder-specific
  operations layer, each community rollout risks truck rolls, warranty cost,
  and confused buyers who do not know what data their home is collecting.
targetUser:
  primary: Head of smart-home product or digital innovation at a U.S. production homebuilder delivering 300 to 2,000 annual single-family closings with a standardized connected-home package
  secondary: Field operations, low-voltage integrator, and homeowner-care managers responsible for device commissioning and post-close support
  buyer: COO, chief customer officer, or division president at a production homebuilder launching a builder-included smart-home package
startupThesis:
  nonObviousInsight: >-
    The breakout opportunity is not another smart-home hub. Once device control
    moves onto an in-home server, the scarce capability becomes operational:
    commissioning hundreds of homes consistently, governing updates without a
    cloud back end, and handing buyers a clear privacy and ownership
    experience. What changed is that local-first architecture is being funded
    and pushed into a homebuilder channel now, so rollout and lifecycle
    software becomes newly necessary instead of a nice add-on for hobbyists.
  beachhead: >-
    Commissioning and homeowner handoff for Sun Belt production homebuilders
    delivering 300 to 2,000 annual single-family closings with a standardized
    package of local hub, smart lock, thermostat, and leak or motion sensors
  wedge: >-
    A local-smart-home deployment console that templates device packages by
    floorplan, validates on-site install health at close, generates a buyer
    privacy passport, and packages support-safe update and diagnostic workflows
    for offline systems
  whyNowCatalyst: >-
    One Raven's launch and planned third-quarter homebuilder partnerships turn
    local-first smart homes from an enthusiast niche into a builder channel,
    making commissioning, handoff, and update governance an immediate rollout
    problem.
  ventureScalePath: >-
    Start with builder rollout and homeowner handoff, then expand into
    build-to-rent turnover, warranty analytics, insurer-approved device
    verification, utility demand-response integrations, and the long-term
    operating layer for privacy-first connected homes.
solution: >-
  The product sits between local-first smart-home platforms, device
  installers, and builder closing teams. Before a home closes, it imports the
  community's standard device package, floorplan, and installer checklist, then
  verifies that every lock, thermostat, sensor, automation, and local server is
  configured correctly on the home network. At buyer handoff, it generates a
  plain-English privacy passport showing what devices exist, what data stays
  local, what updates are enabled, and how ownership transfers to the
  homeowner. After move-in, support teams can request homeowner-approved
  diagnostics and push preapproved update bundles without falling back to a
  cloud-first control model or sending a truck for every issue. Builders adopt
  it as an overlay on existing installer and homeowner-care workflows rather
  than replacing their preferred device vendors.
