      - 11
      - 37
      - 39
  pestle:
  - factor: 政治
    impact: positive
    point: 州和联邦层面的物联网安全基线动作，让隐私安全的推广方式更容易得到开发商和合作伙伴的理解与采信。
    sourceRefs:
    - 24
    - 25
    - 28
    - 30
  - factor: 经济
    impact: positive
    point: 即便新房建造量仍然具有周期性、对购房承受力敏感，智能家居功能需求也在持续扩大。
    sourceRefs:
    - 33
    - 35
    - 36
  - factor: 社会
    impact: positive
    point: 买家越来越期待联网功能，但反感碎片化的应用、不透明的数据做法和不稳定的云端表现。
    sourceRefs:
    - 26
    - 27
    - 31
    - 38
    - 39
