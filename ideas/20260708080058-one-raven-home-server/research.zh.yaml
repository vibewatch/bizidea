    sourceRefs:
    - 24
    - 25
    - 29
  - factor: 环境
    impact: neutral
    point: 节能、舒适和漏水检测这些用例能为故事加分，但最初的切口仍然主要由支持成本、隐私和验收调试的投资回报驱动。
    sourceRefs:
    - 5
    - 8
    - 35
  adoptionFrictionMatrix:
  - friction: 各社区之间存在过多设备协议、固件版本和边界路由器假设
    severity: 高
    affectedBuyer: 智能家居产品负责人
    mitigation: 先从一个本地优先平台、一种边界路由器模式和一份精简设备品类清单做起，再拓宽兼容范围。
    sourceRefs:
    - 15
    - 17
    - 20
    - 21
    - 22
  - friction: 交房前验收调试和买家交接仍然是现场服务工作流，而不只是软件工作流
    severity: 高
    affectedBuyer: 现场运营或集成商负责人
    mitigation: 按户型模板化，要求合格/不合格的交房收尾核验，并从同一份清单生成买家可用的交接材料包。
    sourceRefs:
    - 3
    - 5
    - 7
    - 9
  - friction: 当产品承诺把数据留在本地时，远程支持会变得更难
    severity: 高
    affectedBuyer: 业主关怀经理
    mitigation: 使用业主授权诊断、本地健康快照和范围狭窄的更新包，而不是常态化遥测。
    sourceRefs:
    - 2
    - 3
    - 16
    - 21
    - 39
  - friction: 如果投资回报不明确，开发商可能默认选择现有云端项目或人工验收清单
    severity: 中
    affectedBuyer: COO 或分部总裁
    mitigation: 在一个试点社区里主打返修减少、交房收尾提速和更清晰的隐私承诺。
    sourceRefs:
    - 7
    - 31
    - 37
    - 38
