  amountM: 2.6
  runwayMonths: 24
  milestone: 达到 8 个正式生产部署，发布一篇由开发商署名的返修或交房收尾案例研究，并在 Q4Y2 之后留出六个月缓冲进入第二平台决策阶段。
  useOfFunds:
    - bucket: 工程
      amountUsd: 1300000
      percentage: 50
    - bucket: GTM
      amountUsd: 780000
      percentage: 30
    - bucket: G&A
      amountUsd: 234000
      percentage: 9
    - bucket: 缓冲（6 个月）
      amountUsd: 286000
      percentage: 11
scenarios:
  downside:
    description: 开发商试点转化更慢，第二个社区的扩展推迟，实际实现的正式生产定价低于建模中的每分部住宅数路径。
    y3RevenueK: 2160.0
    y3EbitdaK: -559.1
    cashLowPointK: 164.0
    keyAssumptionChanges:
      - Q4Y3 customersEop 落在约 15 而不是 18，因为付费试点转正式生产的转化率弱于 BP 目标。
      - 退出时混合月度 ARPU 落在约 1.62 万美元而不是 1.72 万美元，因为更少分部新增第二个社区。
      - 毛利率到 Q4Y3 只达到约 70%，因为设备质量保证和支持仍然偏服务型。
  base:
    description: 创始人主导的试点按计划转化，单一平台的精简打法在开发商各分部间复制，退出 ARR 达到研究测算的第 3 年 SOM 水平，但并不假设全年都维持在这个水平。
    y3RevenueK: 2486.4
    y3EbitdaK: -298.4
    cashLowPointK: 395.5
    keyAssumptionChanges:
      - customersEop 到 M12 达到 3，到 Q4Y2 达到 8，到 Q4Y3 达到 18。
      - 混合月度 ARPU 从第 1 年试点为主的水平升至 Q4Y3 约 1.72 万美元，因为每个开发商分部激活更多住宅。
      - 随着认证、验收调试和买家交接步骤标准化，毛利率在 Q4Y3 达到 72%。
  upside:
    description: 合作伙伴渠道更早开始贡献，更多开发商从一个社区扩展到多个社区，模板复用让毛利率提升快于计划。
    y3RevenueK: 3002.4
    y3EbitdaK: 123.1
    cashLowPointK: 567.7
    keyAssumptionChanges:
      - Q4Y3 customersEop 达到约 20 而不是 18，因为合作伙伴引流带来两个额外部署。
      - 退出时混合月度 ARPU 达到约 1.82 万美元，因为更多账户转入住宅数更高的分部合同。
      - 毛利率到 Q4Y3 达到约 74%，因为需要定制支持的现场异常更少。
sensitivity:
  - variable: ARPU
    downsideCase: 每个正式部署的平均住宅数低于计划，退出时混合月度 ARPU 下滑约 10%。
    baseCase: 随着分部从第一个社区继续扩展，退出时混合月度 ARPU 达到约 1.72 万美元。
    upsideCase: 更多分部新增第二个社区并采用数据分析模块，把退出时混合月度 ARPU 抬升到 1.8 万美元以上。
    y3RevenueImpactK: -248.6
    cashImpactK: -190.0
  - variable: CAC
    downsideCase: 合作伙伴转介表现不佳，获客效率滑向每个净新增付费账户约 10.5 万美元。
    baseCase: 在创始人主导销售加上有选择性的合作伙伴引流下，CAC 保持在约 8.59 万美元附近。
    upsideCase: 集成商和平台合作伙伴带来更多销售管道，CAC 趋向 7 万美元出头。
    y3RevenueImpactK: -120.0
    cashImpactK: -260.0
  - variable: 流失率
    downsideCase: 如果厂商把部分工作流收归自用，或试点未能扩展，月度流失率升向 3.5%。
    baseCase: 一旦账户转入正式生产交房收尾工作流，月度流失率稳定在约 2.5%。
    upsideCase: 因为该工作流成为开发商的系统记录中枢，月度流失率保持在约 1.5%。
    y3RevenueImpactK: -170.0
    cashImpactK: -140.0
  - variable: 销售周期
    downsideCase: 从目标账户到付费试点再到正式生产的周期接近 6 个月，而不是 4 个月。
    baseCase: 有意向的开发商对话大约在 4 个月内转为付费试点，下一季度转为正式生产。
    upsideCase: 共创客户的验证效果把周期压缩到约 3 个月，惠及下一批开发商。
    y3RevenueImpactK: -400.0
    cashImpactK: -310.0
  - variable: 毛利率
    downsideCase: 由于设备碎片化让实施持续偏人工化，毛利率停滞在约 67%-70%。
    baseCase: 毛利率达到 BP 目标区间，第 3 年退出时约为 72%。
    upsideCase: 随着质量保证矩阵和入驻模板变得更可复用，毛利率进入 70% 中段。
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: 招聘节奏
    downsideCase: 在首个正式生产打法完全可复制之前，就提前招入两名第 3 年规模化岗位。
    baseCase: "招聘按计划进行：先补齐现场和质量保证能力，随后增加第二名销售，再补充工程支持。"
    upsideCase: 由于第一个平台范围仍然精简，最后一名工程师招聘可以推迟到 Q4Y3 之后而不影响交付。
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      TargetBuilders[Target builders] --> PaidPilots[Paid pilot communities]
      PaidPilots --> ProductionDeployments[Production deployments]
      ProductionDeployments --> ActivatedHomes[Activated homes]
      ActivatedHomes --> Revenue[Subscription plus per-home revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景的收入来自这样一条路径：把第 1 年的 3 个付费试点转化为 Q4Y2 的 8 个正式生产部署，再扩展到 18 个开发商或分部账户，Q4Y3 退出 ARR 约 370 万美元。
  - checkName: 必须跑对的环节
    finding: 单一平台、精简设备的实施路径必须保持足够可复用，才能让 11 名期末全职员工支撑 18 个部署，同时毛利率仍能保持在 70% 以上退出。
  - checkName: 模型会在什么情况下失效
    finding: 如果销售周期拖向 6 个月，或厂商把开发商控制台收归自用，下行情景会把现金推向约 16.4 万美元，逼近下一轮融资窗口之前的临界点。
  - checkName: 下一轮证明点
    finding: 种子轮的故事是到 Q4Y2 实现 8 个正式生产部署，加上一篇由开发商署名的返修或交房收尾案例研究，同时还留有足够缓冲支持第二平台决策。
sanityChecks:
  ruleOf40: Y3 增长 182.6% + EBITDA 利润率 -12.0% = 170.6%
  burnMultiple: 第 2 年烧钱倍数约为 1.0 倍，用大约 100 万美元的 EBITDA 烧钱除以从第 1 年退出运行率到 Q4Y2 退出运行率之间约 100 万美元的净新增 ARR 计算得出。
  revenuePerFte: "$226K，Y3 按 11 名期末 FTE 计算（实施负担较重的 SaaS 基准为 $200-400K）"
  flags:
    - customersEop 同时包含付费试点和正式生产部署，因此在第 2 年早期之前，真实的正式生产客户数低于表面上的客户总数。
    - 第 3 年 ARPU 路径假设开发商会从一个社区扩展到更大规模的分部合同；如果扩展始终停留在单社区水平，收入下滑的速度会快于人员编制能够收缩的速度。
    - 只有当设备与固件质量保证保持模板化，毛利率才能达到 70% 出头；额外的碎片化会把更多工作推向服务型支出，压缩现金跑道。
    - 现金测算只以 EBITDA 为准，因此试点预付款、实施报销或适度的资本支出，都可能让实际现金低点提前或延后出现，幅度在数十万美元级别。
