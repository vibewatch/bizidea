slug: local-smart-home-commissioning
date: "2026-07-08"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-07"
    unit: month
    source: '[BP date 2026-07-08] 模型与有日期的商业计划书同月起步，因为种子前计划和首批访谈会立即启动。'
  - id: A2
    name: 期初现金 / 种子前融资额
    value: '2600'
    unit: USD K
    source: '[BP fundingAsk.targetFundingRangeUsd $2-4M 及 runwayMonths 18] 模型采用 260 万美元这一区间偏低的中位数，因为这个金额既能撑到 Q4Y2 的验证点，又还留有约六个月的建模烧钱缓冲。'
  - id: A3
    name: 付费客户定义
    value: 处于活跃计费状态的付费试点社区或正式生产开发商/分部部署
    unit: definition
    source: '[BP gtm.wedge 及 BP businessModel.revenueStreams] customersEop 统计所有已经为试点或正式生产范围付费的开发商账户。'
  - id: A4
    name: 付费试点单价
    value: '45'
    unit: USD K per pilot
    source: '[BP investorMemo.firstCustomer.initialContract 3 万至 6 万美元的付费试点] 模型采用中位数，并在约三个月内确认收入。'
  - id: A5
    name: 正式生产定价结构
    value: 40 + 每个已激活住宅每年 0.2
    unit: USD K per customer-year
    source: '[Research bottomUpSizingDrivers 约 4 万美元的年度订阅假设及约 200 美元/套住宅] 加上 [BP investorMemo.firstCustomer.initialContract 正式定价框架]。'
  - id: A6
    name: 第 1 年月末付费客户爬坡
    value: 0,0,0,1,1,1,2,2,2,3,3,3
    unit: customersEop
    source: '[BP milestones 在 0-12 个月签下 3 个付费试点社区，并把至少 2 个转为正式生产] 该爬坡节奏保持创始人主导销售的保守假设。'
  - id: A7
    name: 第 2 年季末付费客户爬坡
    value: 4,5,7,8
    unit: customersEop
    source: '[BP milestones 在 12-24 个月扩展到至少 8 个开发商或分部的正式部署]。'
  - id: A8
    name: 第 3 年季末付费客户爬坡
    value: 10,12,15,18
    unit: customersEop
    source: '[BP milestones 到 24-36 个月达到约 18 个开发商或分部客户] 及 [Research market.som 1.5 万套住宅覆盖约 18 个客户]。'
  - id: A9
    name: 第 1 年混合月度 ARPU 排期
    value: M1-M12 = 0,0,0,15.0,15.0,15.0,13.0,12.0,12.0,11.0,11.0,11.0
    unit: USD K per average active customer-month
    source: '[A4-A5] 早期收入以试点为主，随后随首批正式生产订阅混入而变化，年末仍有一个试点在进行中。'
  - id: A10
    name: 第 2 年混合月度 ARPU 排期
    value: Q1-Q4 = 12.0,13.0,14.0,14.5
    unit: USD K per average active customer-month
    source: '[A5] 及 [BP milestones 24 个月内实现 8 个正式部署]，随着试点转化后每个开发商分部上线更多住宅。'
  - id: A11
    name: 第 3 年混合月度 ARPU 排期
    value: Q1-Q4 = 15.5,16.0,17.0,17.2
    unit: USD K per average active customer-month
    source: '[A5] 及 [Research market.som 约 1.5 万套住宅覆盖 18 个客户]，这意味着第 3 年退出 ARR 约为 370 万美元，而不是第 3 年从第一天就达到这个水平。'
  - id: A12
    name: 毛利率爬坡
    value: Y1 收入月份 35-58%；Y2 60-68%；Y3 69-72%
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 70] 加上创业公司财务经验法则：早期智能家居工作流试点在质量保证模板变得可复用之前，实施和支持负担更重。'
  - id: A13
    name: 招聘顺序
    value: M1 创始人/CEO + 创始工程师 + 产品/实施；M4 解决方案；M7 QA/集成；M10 GTM；M16 平台工程；
      M20 客户成功；M22 G&A；M31 客户经理；M34 集成工程
    unit: timeline
    source: '[BP team.startTiming Month 0/3/6/9] 及 [BP strategicChoices.sequencingRationale]，后续招聘只有在首个正式生产打法开始可复制之后才加入。'
  - id: A14
    name: 创始人满载薪酬
    value: '150'
    unit: USD K per year
    source: '[BP experimentRoadmap owner CEO founder] 加上创业公司财务经验法则，覆盖种子前精简创始人现金薪资、税费和福利。'
  - id: A15
    name: 工程满载薪酬
    value: '180'
    unit: USD K per engineer-year
    source: '[BP team Founding eng 和 QA/integrations engineer 岗位] 加上创业公司财务经验法则，覆盖集成负担重的早期技术岗位。'
  - id: A16
    name: 产品/实施满载薪酬
    value: '150'
    unit: USD K per year
    source: '[BP team Product and implementation lead] 加上创业公司财务经验法则，覆盖一位横跨产品设计与部署的资深工作流负责人。'
  - id: A17
    name: 解决方案/客户成功满载薪酬
    value: '140'
    unit: USD K per year
    source: '[BP team Solutions engineer] 加上创业公司财务经验法则，覆盖实施负担重的部署与客户成功岗位。'
  - id: A18
    name: 销售/合作伙伴满载薪酬
    value: '175'
    unit: USD K per year
    source: '[BP team GTM and partnerships lead] 加上创业公司财务经验法则，覆盖带差旅和绩效薪酬的早期企业级市场拓展岗位。'
  - id: A19
    name: 综合管理/运营满载薪酬
    value: '120'
    unit: USD K per year
    source: '[BP operations 及 fundingAsk.useOfFundsSummary] 加上创业公司财务经验法则，覆盖精简的运营与合规岗位。'
  - id: A20
    name: 薪酬分摊到损益表科目
    value: 创始人 60% S&M / 40% G&A；产品/实施 40% S&M / 60% R&D；解决方案/客户成功 50% S&M / 50% R&D；工程
      100% R&D；销售 100% S&M；G&A 100% G&A
    unit: allocation
    source: '[BP team rationales + BP operations] 把每个岗位映射到其主要支撑的运营职能。'
  - id: A21
    name: 非薪资运营支出爬坡
    value: Y1 月度 16-26；Y2 季度 84-108；Y3 季度 114-141
    unit: USD K
    source: '[BP fundingAsk.useOfFundsSummary 及 BP operations] 加上创业公司财务经验法则，覆盖云端工具、差旅、法务、保险、认证工作和合作伙伴支持。'
  - id: A22
    name: 稳态月度流失率
    value: '2.5'
    unit: percent per month
    source: "创业公司财务经验法则，针对早期开发商工作流 SaaS：年度合同和嵌入式交房收尾流程带来一定粘性，但平台厂商的功能重叠让流失率仍高于成熟垂直 SaaS 的水平。"
  - id: A23
    name: CAC 计算口径
    value: Y2-Y3 S&M 支出 ÷ 15 个净新增付费账户
    unit: formula
    source: '[BP gtm 漏斗目标及创始人主导直销加合作伙伴渠道]，模型以第 2-3 年销售和市场总支出作为获客成本口径。'
  - id: A24
    name: 现金流换算口径
    value: 现金变动等于 EBITDA
    unit: formula
    source: "创业公司财务经验法则：在种子前阶段，资本支出、债务偿付、税费和营运资本时点差异相对烧钱规模而言可忽略不计。"
  - id: A25
    name: 下一轮里程碑与 6 个月缓冲
    value: 到 Q4Y2 实现 8 个正式生产部署，加 1 篇开发商署名的 ROI 案例研究，并为接下来 6 个月
      的烧钱留出约 286K 缓冲
    unit: milestone
    source: '[BP milestones 12-24 个月 + BP fundingAsk.runwayMonths 18] 及模型计算出的约 28.66 万美元 Q1-Q2Y3 烧钱额。'
  - id: A26
    name: 交付杠杆
    value: 到 Y3 期末，11 名 FTE 可支撑 18 个部署，前提是范围始终锁定在单一平台和精简设备矩阵内
    unit: capacity
    source: '[BP product.twentyFourMonth + BP operatingAssumptions 先专注一个平台和精简设备品类] 加上创业公司财务经验法则，避免过早组建服务负担重的现场团队。'
