    - 覆盖各类设备组合和固件版本的质量保证
jobsToBeDone:
  - job: >-
      当一套住宅即将交房时，帮助开发商和安装商核实每一台设备、每一个自动化场景和所有权设置，让买家入住一个能正常运行、且能听懂的隐私承诺的智能家居套装。
    currentAlternative: 安装商验收清单、云端厂商管理面板，以及交房时手动设置的应用账户
    successMetric: 交房 30 天内零智能家居返修的住宅占比
  - job: >-
      当业主反映交房后出现智能家居问题时，帮助业主关怀团队在不派人上门的情况下完成诊断和处理，让保修成本在本地优先系统下也能可控。
    currentAlternative: 先电话排障，再派安装商上门
    successMetric: 平均解决时长，以及无需上门即可解决的案例占比
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 新融资、具体的产品架构、公开的价格区间，加上即将开放的开发商渠道，即便还没有具名客户，也构成了一个可信的商业信号。
  painIntensity:
    score: 4
    rationale: 开发商通过返修、交房风险和买家信任问题切身感受到这种痛点，不过这属于运营层面的痛，而不是生死攸关的合规问题。
  wedgeClarity:
    score: 5
    rationale: 面向本地优先开发商套装的验收调试和业主交接是一个范围很窄的工作流，有明确的负责人、触发点和可衡量的支持成本节省。
  defensibility:
    score: 4
    rationale: 专有的部署模板、安装故障数据和交房后支持结果会随时间复利积累，不过这个切口一旦证明足够重要，大型智能家居厂商也可能向相邻领域延伸。
  ventureScale:
    score: 4
    rationale: 一个稳固的开发商滩头市场可以扩展到租赁物业转手、保险验证、公用事业项目以及更广泛的隐私优先住宅运营，尽管起点是一条聚焦的渠道。
topRisks:
  - name: 设备碎片化
    description: 本地优先智能家居部署可能涉及大量门锁、恒温器、传感器和固件组合，早期很难标准化。
    mitigation: 先从一个本地优先平台、三到四个设备品类和可复用的户型模板做起，再逐步扩大硬件支持范围。
  - name: 开发商渠道惰性
    description: 规模化住宅开发商可能默认选择捆绑的云端厂商，或者在投资回报不明显时不愿意增加额外工作流程。
    mitigation: 先通过一个试点社区落地，联合一家中意的安装商，用返修减少、交房收尾加快、买家交接更清晰这些指标对比现状。
  - name: 远程遥测能力有限
    description: 隐私优先架构可能让远程排障比云连接系统更难，如果支持感觉像"盲操作"，可能削弱价值主张。
    mitigation: 使用业主授权诊断、本地健康快照和分阶段更新包，在保留隐私的同时仍给支持团队提供可操作的信号。
