competitors:
- name: One Raven
  stage: seed
  wedge: Privacy-first, on-prem smart-home server sold through homebuilders.
  pricing: $2.5k-$3.5k system per home; no subscriptions
  strength: Strong local-first narrative, pre-paired system design, and explicit builder-channel intent.
  weaknessVsUs: A full-stack hardware platform is less vendor-agnostic than a dedicated commissioning and handoff overlay for whichever local-first stack a builder chooses.
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
- name: Alarm.com
  stage: incumbent
  wedge: Cloud-first smart-home and security platform with dealer and builder programs.
  pricing: Builder and dealer service plans; public standard pricing not posted
  strength: Deep distribution, single-app experience, over-the-air updates, and existing builder references such as D.R. Horton.
  weaknessVsUs: Its model presumes ongoing cloud coordination, while the proposed startup is built around local-first commissioning, privacy handoff, and offline-safe support.
  sourceRefs:
  - 5
  - 6
  - 7
  - 37
  - 38
- name: SmartRent
  stage: scale-up
  wedge: Real-estate smart-property platform with builder handoff and operator ROI messaging.
  pricing: Custom enterprise quote
  strength: Credibility in real-estate operations, handoff language, and deployment analytics.
  weaknessVsUs: Its center of gravity is cloud property operations rather than privacy-first single-family commissioning and post-close diagnostics.
  sourceRefs:
  - 9
  - 10
- name: Control4
  stage: incumbent
  wedge: Professionally installed whole-home control for builders, developers, and custom homes.
  pricing: Custom integrator quote
  strength: Strong pro-install ecosystem and flexible package architecture for future upgrades.
  weaknessVsUs: It is optimized for integrator-led whole-home control, not standardized production-builder closeout workflow and callback analytics.
  sourceRefs:
  - 11
  - 12
- name: Home Assistant
  stage: open-source ecosystem
  wedge: Local-first open smart-home platform with optional official hardware and broad integration support.
  pricing: Open-source software; Home Assistant Green hardware starts at $199
  strength: Strong privacy and local-control posture, broad integration surface, and active Matter or Thread support.
  weaknessVsUs: It proves local control, but it does not by itself solve builder commissioning, homeowner passport, or warranty-team workflow.
  sourceRefs:
  - 13
  - 14
  - 15
  - 16
regulatoryTechnicalConstraints:
- point: California requires reasonable security features for connected devices and specifically treats unique default credentials or forced first-use credential changes as reasonable for internet-exposed authentication.
  sourceRefs:
  - 24
- point: Oregon applies a parallel reasonable-security standard to connected devices sold in the state.
  sourceRefs:
  - 25
- point: Matter commissioning assigns fabric credentials after discovery, PASE, attestation, and certificate exchange, so builder workflows need rollback and exception handling rather than a loose install checklist.
  sourceRefs:
  - 17
  - 18
  - 19
- point: Thread-based deployments depend on border routers and low-bandwidth mesh assumptions, which limits how casually builders can add device classes without testing.
  sourceRefs:
  - 20
  - 22
- point: Secure OTA management is table stakes for long-lived builder-installed systems, especially when the selling point is local control and longevity.
  sourceRefs:
  - 21
  - 23
  - 28
