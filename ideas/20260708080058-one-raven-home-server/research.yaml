openQuestions:
- Will One Raven and similar local-first platforms expose enough workflow hooks for a third-party commissioning overlay, or will they keep the builder console in-house?
- What reduction in 30-day smart-home callbacks is necessary for a production builder to add a new closeout step or console?
- How many lock, thermostat, leak-sensor, and camera SKUs can the first product support before template management overwhelms implementation capacity?
- Will homeowners accept explicit remote-diagnostics consent flows if the privacy passport is clear, or will support teams still default to truck rolls?
