  validationPlan:
  - priority: high
    question: 'Which team actually owns the smart-home callback budget at target builders: smart-home product, field ops, homeowner care, or the integrator?'
    evidenceToGather: Pilot-account org charts, warranty cost centers, and callback data for the first 30 days after close.
  - priority: high
    question: How many device SKUs and firmware combinations can a builder support before template management becomes operationally messy?
    evidenceToGather: Community-level device BOMs, firmware matrices, and closeout punch-list exports from 3-5 pilot communities.
  - priority: medium
    question: Will local-first platform vendors expose enough APIs or workflow hooks for a third-party commissioning overlay?
    evidenceToGather: Partner conversations, sandbox docs, and integration tests with one local-first platform and one Matter-heavy device bundle.
  - priority: medium
    question: Will homeowners accept explicit consent flows for remote diagnostics if privacy explanations are clear?
    evidenceToGather: Usability testing of buyer passports and post-close diagnostic permission prompts with recent new-home buyers.
