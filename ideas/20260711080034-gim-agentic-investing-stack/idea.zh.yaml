topRisks:
- name: 内部自建偏好
  description: 成熟基金可能会把上线工具视为核心 IP，更愿意自己接，而不是买软件。
  mitigation: 先做一层窄控制编译器和链路层，接进现有研究栈；先证明它能更快把试点发出去，再去争更宽的工作流所有权。
- name: 赛道时点
  description: 很多基金还在试点期，愿意为智能体执行工具单独做预算的客户，在前 12–18 个月里可能仍然不多。
  mitigation: 先卖给已经在跑低资金实盘试跑的多小组基金，等采用面拉开，再扩到长仓管理人、外包交易台和主经纪商伙伴。
- name: 亏损后的采用冻结
  description: 一旦出现高关注度的智能体交易亏损或监管处罚，整个赛道的预算都可能被按暂停键。
  mitigation: 把产品定位成“人类在环”的安全与证据层，默认先上影子模式、不可篡改审计日志和硬性资金上限。
