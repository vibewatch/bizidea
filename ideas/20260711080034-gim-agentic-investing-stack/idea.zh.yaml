jobsToBeDone:
- job: 当 PM 想把真金白银配到某个 AI 生成的信号上时，帮平台和交易团队把它安全推到实盘，这样他们不用花上几周重接流程，就能启动一轮实盘试跑。
  currentAlternative: 影子账本、手工代码交接和表格审批
  successMetric: 从影子账本达到阈值到第一笔限额实盘委托的天数
- job: 当实盘试跑和纸面表现出现偏离时，帮基金判断问题出在信号、执行路径还是市场环境，这样他们就能有把握地决定该关停、缩仓还是继续放大策略。
  currentAlternative: 券商 TCA、PM 经验判断和临时复盘
  successMetric: 找出影子与实盘表现偏差根因并采取动作的时间
