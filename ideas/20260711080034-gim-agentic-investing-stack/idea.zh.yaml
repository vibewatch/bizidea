problem: 市场中性股票基金已经在内部试 LLM 和智能体投研栈，但从纸面 alpha 到实盘委托的最后一公里，依然要靠量化开发重写、影子账本、风控委员会材料和手工 OMS 配置来接。一旦智能体能持续生成、测试、改写假设，这道交接就成了瓶颈：有潜力的信号往往要等上几周才能推到实盘，而已经开出去的试跑仓位，对模型为何改动、批了哪些限额、什么时候该关停，留痕又很弱。结果不是基金把创新节奏放慢，就是带着难以接受的操作风险和投资授权风险去碰真金白银。
targetUser:
  primary: AUM 在 $500M-$5B、运行 2–8 个 PM 小组、接多家主经纪商，并已在内部试 AI 投研的市场中性股票对冲基金，其系统化平台负责人或 COO
  secondary: 负责把影子账本信号推到限额实盘试跑账本的量化研究负责人或 PM 小组负责人
  buyer: 多 PM 小组市场中性基金的 COO、电子交易负责人或 CTO
startupThesis:
  nonObviousInsight: 稀缺资产已经不是原始信号生成，而是“可信上线”。一旦多智能体系统能自己改写假设，最值钱的工作流就不再是多生几个想法，而是把这些不断变化的想法编译成券商可安全接收的实盘委托，同时把证据、限额和关停条件一并带上。
  beachhead: 滩头市场是美国和新加坡的市场中性股票对冲基金：AUM 在 $500M-$5B、配 2–8 个 PM 小组、用 Bloomberg EMSX 或 FlexTrade、至少接两家主经纪商，而且内部生成的 AI 信号在上盘前仍要人工交给量化开发接手。
  wedge: 一个信号上线工作台：把每个智能体生成的信号先在影子模式里重放，给出上线准备度评分，再把 OMS 配置、券商节流阀、资金上限和熔断开关编成一份可上线包。
  whyNowCatalyst: GIM 的 Series A 和被 ACL 接收的 CogAlpha 架构说明，智能体投资栈现在既拿到了资本背书，也拿到了技术背书，正在从研究跨向实盘执行；基金得在内部试点碰真金白银之前，先把上线控制层补上。
  ventureScalePath: 先从市场中性股票基金切入，再把同一套上线与归因层扩到长仓管理人、全球宏观小组、外包交易台、主经纪商，最后做成 AI 原生资本市场执行的中立控制平面。
solution: 产品夹在研究智能体和 OMS/EMS 栈之间。它把每一版假设、回测窗口、影子账本结果、因子暴露、换手率，以及提示词或数据的每次改动都记下来，再按投资授权规则、流动性上限、券商特定委托约束和 PM 批准的资金上限去评估信号。某个小组准备上盘时，系统会自动生成审批包，把选定限额编成可部署的 OMS 或券商指令，再带着自动节流和关停条件启动试跑。上线后，它继续对比影子表现、真实成交和滑点，让团队看清问题出在想法、市场环境，还是执行路径。时间一长，它就会变成全基金跨小组管理“假设从哪来、影子怎么转实盘”的底账。
goToMarketSeed:
  firstCustomer: 位于纽约或新加坡、AUM 在 $1B-$3B、有 3–6 个 PM 小组、内部已用 LLM 辅助信号研究，且经常做低资金实盘试跑的市场中性股票基金，其 COO 或系统化平台负责人
  buyingTrigger: 某个 PM 小组想把新的 AI 信号从影子账本推到实盘试跑，但风控和交易团队在拨资金前，要求先看到证据、券商定制控制和关停方案。
  currentAlternative: 内部 Python 研究流水线、影子账本、表格版审批清单、量化开发手工配 OMS 规则，以及人工交易员签字放行。
  switchingReason: 这条切口把原本要折腾几周的一次性接线活，变成可重复的控制工作流：有变更链路、能审计，也更适合低资金实盘试跑。
  pricingHypothesis: 按 PM 小组或执行团队收平台年费，外加按每月推上线的实盘试跑策略数量计费。
