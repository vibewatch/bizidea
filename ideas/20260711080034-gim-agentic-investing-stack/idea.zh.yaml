differentiator: OMS 和券商风控工具，只有在策略已经被硬编码之后才开始校验委托；AI 投研工作台则大多停在想法生成或备忘录起草。这家公司占住的是“不断演化的智能体假设”和“实盘资金”之间的上线边界：把模型变更链路、投资授权规则和券商控制，编成一个可部署产物。它的护城河，一是跨 PM 小组、券商和市场环境的影子转实盘结果数据集，二是对 OMS、EMS 和主经纪商栈的深度集成——基金不会愿意把这套东西重做两遍。
