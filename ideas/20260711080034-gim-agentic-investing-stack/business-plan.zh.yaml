slug: paper-to-live-signal-os
date: '2026-07-11'
executiveSummary: “从纸面到实盘”信号操作系统，是给那些已经在内部跑 AI 投研、但把实盘试跑仍交给表格、量化开发重写和手工 OMS 设置的市场中性股票基金补的一层控制软件。研究支撑时点判断：对冲基金已经大面积放开生成式 AI 使用，智能体试点并不稀奇，而 GIM 在 2026 年融资时也明确把赛道定义成“从研究走向实盘执行”。首个客户应是一家美国市场中性基金，AUM 在 $1B-$3B、有 3–6 个 PM 小组、用 Bloomberg EMSX 或 FlexTrade、接多家主经纪商，而且经常跑低资金实盘试跑。产品不该去碰 alpha 生成，也不该替代 OEMS；它该做的是，把某个小组的影子账本证据、审批逻辑、券商限额和关停条件，编成一份可部署的实盘试跑包。这条切口把首个用户、预算触发点、定价单位和分发路径都拧在了一起：COO 或系统化平台负责人买的是一条更快、更安全的通路，把信号从影子阈值推到第一笔实盘委托。创业故事站得住，是因为中立的上线数据、人工覆盖历史和规则模板能跨小组、跨基金累起来；但如果目标基金里真正把 AI 改写过的信号推向实盘的还太少，或者买家认定这功能只能长在现有 OEMS 套件里，这个故事就会断。估算 SAM 为 $43.2M，第 3 年 SOM 为 $7.2M，所以美国滩头跑通后，扩到新加坡和相邻买方工作流很关键。现在的研究还没确认每月真实上线量、买家偏好的部署模式，也没确认中立控制层能否稳定赢过内部自建，所以前 12 个月更该盯付费试点转化和第二个小组扩张，而不是先大举招人。
problem:
- AI 辅助研究现在能生成的候选信号，已经多过风控、交易和量化平台团队能安全放进实盘资金里的速度，所以真正卡住的是“从纸面到实盘”的上线环节。
- 现在这套流程还要靠手工看影子账本、做委员会材料、量化开发重写 OMS 规则和逐家券商配置控制，结果一拖就是几周，而且信号为什么变、谁批的、批了什么，都留痕不清。
- 一旦实盘和影子表现分叉，基金往往拿不出一份共享底账，把模型改动、批准限额和关停逻辑串起来，操作风险、授权风险和账簿记录风险都会上来。
solution:
- 把信号版本、回测窗口、因子和流动性暴露、提示词或数据改动、以及影子账本结果，全收进一张链路图，服务每个候选实盘策略。
- 给信号打实盘准备度分，生成审批包，并把券商和 OEMS 指令连同资金上限、节流阀和熔断开关，一起编到 1 条试跑策略里。
- 上线后持续对比影子表现、真实成交和滑点，让基金能基于证据决定是缩仓、关停，还是继续放大策略，而不是事后猜。
whyWeWin:
- 创业公司占住了一条中立工作流边界：相邻的 AI 投研副驾和现有 OEMS 套件都没真正占住——那就是“不断演化的 AI 假设”到“实盘资金”之间的上线步骤。
- 它一边提升可审计性和上线速度，一边又不用基金推倒现有研究栈、OEMS 或主经纪商关系重来，所以比全平台替换更容易被买。
- 影子转实盘转化数据、人工覆盖历史和可复用的规则模板，能跨小组、券商和市场环境越滚越厚，最后长成护城河。
strategicChoices:
  beachhead: 美国市场中性股票对冲基金，AUM 在 $1B-$3B，有 3–6 个 PM 小组、至少 2 家主经纪商、内部已上 LLM 辅助研究，而且眼下就要通过 Bloomberg EMSX 或 FlexTrade 把 1 条限额实盘试跑推上线。
  wedgeRationale: 先盯 1 个小组的纸面转实盘，是最快能打出验证的起点，因为痛点、买家和成功指标都卡在同一件事上：某个小组已经准备拨真金白银，但风控和交易还要证据、券商控制和关停逻辑。要是一开始就同时做长仓、全球宏观，或者整只基金级工作流改造，只会在核心控制层还没被信任前，先把数据形态、委员会和集成面一起摊大。
  sequencingRationale: 先把链路采集、审批包和一套可部署的控制编译器做出来，再谈更深的分析能力或外扩，因为今天真正卡门的是上线安全和可审计性。前 3–4 个试点之前，销售都由创始人亲自打；每一批共创客户只支持 1 套主 OEMS；等试点转生产跑通，证明这条工作流可重复，再加第二套栈和渠道伙伴。
  notYet:
  - 不做自主信号生成、策略选择或委托路由。
  - 在拿到 2–3 家美国标杆基金之前，不向长仓、全球宏观或多资产工作流大举铺开。
  - 不做替换式 OEMS、EMS 或主经纪商工作流套件。
  - 在美国打法和新加坡后续扩张还没跑顺前，不碰欧洲和复杂跨境监管扩张。
market:
  tam: 估算 TAM 为 $180.0M：全球大约 1,000 个活跃用 AI 的 PM 小组或执行团队，每个每年约花 $180k 购买控制平面。
  sam: 估算 SAM 为 $43.2M：美国和新加坡 60 家目标基金，每家按 4 个小组、每个小组约 $180k ARR 算，只看 $500M-$5B 这段滩头市场。
  som: 估算第 3 年 SOM 为 $7.2M：做到 40 个实盘小组，每个约 $180k ARR，打法是先拿 1 个小组，再在同一家基金里往上扩。
  segments:
  - 内部已经在做 AI 辅助研究、且经常跑低资金实盘试跑的美国市场中性股票对冲基金。
  - 以新加坡为基地的市场中性或多策略管理人，以及在美国验证之后能复用同一套上线控制层的相邻外包交易工作流。
  buyingProcess: 当某个小组想把影子账本推到实盘资金，而现有审批栈开始卡住时，发起人通常是 COO、系统化平台负责人或交易负责人。真要上生产，还得让 CTO、安全、风控和合规一起点头，因为部署方式、账簿记录和外包控制，跟产品功能一样重要。
product:
  mvp: MVP 是一套给 1 个 PM 小组、1 条实盘试跑通道用的 VPC 或受限写入控制工作台。它要吃进信号链路和影子账本证据，自动生成审批包，把资金上限、节流阀和熔断开关编进现有 OEMS 和券商工作流，并跟踪影子对实盘的偏差；不做 alpha 生成、完整 OMS 替换，也不做自主路由。
  sixMonth: 6 个月内，给 1 套主 OEMS 栈完成共创客户部署：能从现有研究流水线用文件或 API 接数据，跑审批工作流、生成实盘试跑包，并给 2–3 家基金提供影子模式漂移看板。
  twelveMonth: 12 个月内，把 2 个试点转成生产，上第二套 OEMS 或券商控制模板，为常见多主经纪商配置做出可复用规则包，并发布一套异常语料库，说明试点为什么被缩仓、暂停或关停。
  twentyFourMonth: 24 个月内，支撑 4–6 家生产基金的全基金铺开部署，能跨小组做影子转实盘基准；只有在美国部署和定价都跑顺之后，才把同一控制平面开给第 1 家新加坡基金或 1 条相邻买方工作流。
  keyBets:
  - 目标基金已经把足够多的 AI 生成或 AI 改写信号推到实盘，值得单独上一层控制软件。
  - 相比等 Bloomberg、FlexTrade、TS Imagine 或内部团队把类似控制打包进去，中立的上线层能更快拿下市场。
  - VPC 或受限写入的部署方式，过安全审查会比全定制本地部署更快。
  - 规则模板和人工覆盖历史，会让第二个小组的扩张明显比第一次部署更轻。
gtm:
  wedge: 当美国市场中性基金的某个 PM 小组想把影子账本信号推到实盘资金时，卖一单付费的单小组试点，用有治理的上线工作流替掉表格审批和量化开发手工配 OMS。
  channels:
  - 创始人主导，直销美国多小组市场中性基金的 COO、系统化平台负责人、交易负责人和 CTO。
  - 等 1 套栈的部署跑通后，争取 Bloomberg、FlexTrade、TS Imagine 以及买方工作流实施顾问的共创客户和转介绍。
  - 等产品能拿出可复用的控制模板和清晰的控制归属边界，再接主经纪商和外包交易台的介绍流量。
  funnelTargets: 目标账户引介→合格工作流评审 35-50%；合格工作流评审→付费试点 20-30%；付费试点→生产 50%+；首个生产小组→12 个月内第二个小组扩张 60%+
  pricing: 先卖 1 个 PM 小组、1 条实盘试跑通道的 90 天付费试点，价格在 $75k-$125k；之后转成年化约 $150k-$250k / 小组，再加按每月推上线策略数计费的用量费。这样和预算触发点对得上：买家付钱买的是更快、更安全地把策略推到真金白银，而不是再买一个研究席位或整套 OEMS 替换。
businessModel:
  revenueStreams:
  - 按 PM 小组或执行团队收平台年订阅费。
  - 按每月通过平台推上线的实盘试跑策略数量收用量费。
  - 按新增 OEMS、券商或部署集成收实施和连接器费用。
  - 面向全基金铺开部署的高级漂移归因、基准和规则模板模块。
  unitOfValue: 1 个通过这层控制软件推实盘试跑策略的 PM 小组或执行团队
  targetGrossMarginPct: 70
  expansionLevers:
  - 从第 1 个小组扩到同一家基金里的更多小组和策略通道。
  - 补更多券商和 OEMS 控制模板，既缩短部署时间，也抬高留存。
  - 实盘试跑进入生产后，再加卖漂移归因、基准报告和异常分析。
  - 先在新加坡复用，再扩到长仓或外包交易等相邻买方工作流。
strategyMap:
  northStarMetric: 每月通过平台推上线、且前 30 天始终跑在批准限额内的实盘试跑策略数
  inputMetrics:
  - 每月至少出现 1 次 AI 到实盘推进事件的合格目标基金数。
  - 从影子就绪到第一笔限额实盘委托的中位天数。
  - 由平台生成完整链路、审批和券商控制包的上线占比。
  - 付费试点转生产比例。
  - 现有基金里的第二个小组扩张率。
  moatsToBuild:
  - 把信号链路、批准限额、执行路径和实际滑点连起来的影子转实盘转化数据。
  - 一套异常与人工覆盖语料库，说明风控、交易或合规团队为什么缩仓或关停某个试点。
  - 适配混合 OEMS 和多主经纪商环境的可复用规则模板与控制编译器。
  - 安全与审计部署手册，让每拿下一个新客户，采购速度都更快。
  killCriteria:
  - 前 12 家合格美国目标基金里，不到 2 家在 12 个月内签下付费试点。
  - 前 3 个试点不能把纸面转实盘周期至少砍掉 50%，或压到 3 个工作日以内。
  - 到第 18 个月，付费试点转生产的比例仍低于 40%，或实际年化价格仍低于每个小组 $150k。
  - 前 3 家生产基金里，没有一家能在 9 个月内从第 1 个小组扩到第 2 个小组或第 2 条策略通道。
  mermaid: |
    flowchart LR
      Wedge[One-pod signal promotion pilot] --> MVP[Lineage plus approval packet plus control compiler]
      MVP --> Proof[Faster launches, audit trail, second-pod expansion]
      Proof --> Expansion[More funds, Singapore, adjacent buy-side workflows]
investorMemo:
  verdict:
    call: 观察
    conviction: 这是一条有真实紧迫性的控制层切口，卡在真金白银开始分配的瞬间；但买家频率、部署模式和独立预算的证据仍然太薄，不足以推进到合伙人会议。
    whyBelieve: 创业公司占住了一条窄但重要的工作流边界，而相邻的投研和执行厂商都没公开真正占住：把 AI 生成的信号，变成可审计、券商可安全接收的实盘试跑。
    whyDoubt: 首个市场很集中、采购很重，又具备内部自建能力，所以公司很可能在数据护城河和渠道伙伴长出来之前，就先卡住。
    nextDiligence: 先拿到 3 个付费试点，并证明至少 2 个能明显缩短上线周期、过掉安全审查，而且能从第 1 个小组扩出去。
  firstCustomer:
    title: 一家美国 $1B-$3B 市场中性股票基金的 COO 或系统化平台负责人
    profile: 一家具备 3–6 个 PM 小组、用 Bloomberg EMSX 或 FlexTrade、至少接两家主经纪商，并且会从内部 AI 辅助研究里不断挑低资金实盘试跑机会的股票市场中性基金。
    trigger: 某个小组想把 1 条 AI 改写过的信号从影子账本推向实盘资金，但按现在的审批和券商控制流程，还是要花上几天到几周的人肉工作。
    buyer: COO
    initialContract: 1 个小组、1 条策略通道的 90 天付费试点，价格在 $75k-$125k；如果基金能更快发出实盘试跑、审计材料也更干净，再转成每个小组约 $150k-$250k 的年费加用量费。
  mustBeTrue:
  - 至少三分之一的合格美国目标基金，已经每月至少一次把 AI 生成或 AI 改写信号推到实盘资金里。
  - 买家愿意为一层独立的上线控制软件拨预算，而不是认定这功能只能长在现有 OEMS 或内部自建里。
  - 前 3 个试点能在压缩纸面转实盘周期 50%+ 的同时，减少量化开发和交易设置的人肉工作。
  - VPC 或受限写入部署能过安全审查，而不至于把每一单都逼成定制本地部署项目。
  - 至少一半早期生产基金，会在 12 个月内从第 1 个小组扩到第 2 个小组或第 2 条策略通道。
  diligenceQuestions:
  - 有多少目标基金已经每月至少做 1 次从 AI 到实盘的推进，而不是只停留在研究侧试点？
  - 第一笔预算到底归谁管？谁又能基于安全或平台理由一票否决采购？
  - 基金会接受长在 Bloomberg、FlexTrade 或 TS Imagine 之外的一层中立控制软件吗？
  - 前 5 个客户里，必须满足的部署模型到底是什么：VPC、受限写入 SaaS，还是本地部署？
  - 哪些主经纪商和 OEMS 伙伴暴露出的控制面，足够把部署做成可重复的模板？
operatingAssumptions:
- assumption: 已经有足够多的目标基金在用 AI 辅助研究跑低资金、可重复的实盘试跑，所以需求是“现在就痛”，不是“以后也许会痛”。
  basis: research.yaml
  validationTest: 确认 10 家受访的美国或新加坡目标基金里，至少 4 家已经每月至少把 AI 生成或 AI 改写信号推到实盘资金一次。
  decisionImpact: 如果不成立，公司应暂缓直推执行导向 GTM，转去做更广的信号治理或研究工作流软件。
- assumption: 在 Bloomberg、FlexTrade、TS Imagine 或内部平台团队把工作流打包之前，一层中立的上线控制层就能先拿到预算。
  basis: research.yaml
  validationTest: 在现有厂商方案或内部自建的对照下赢下 2 个付费试点，并记录买家为什么选独立控制层。
  decisionImpact: 如果不成立，公司应转向 OEM 合作、嵌入式分发，或更窄的合规模块。
- assumption: VPC 或受限写入部署已经能满足多数早期客户，不必走全定制本地部署路线。
  basis: research.yaml
  validationTest: 拿 1 个已签的 VPC 或受限写入试点过掉安全审查，并从 4 个合格账户收集部署要求。
  decisionImpact: 如果不成立，招聘、烧钱和融资需求都会上升，因为产品会变成更重的实施生意。
- assumption: 只要产品真能缩短上线周期、提升可审计性，每个小组每年约 $150k-$250k 的定价就是可接受的。
  basis: 团队判断
  validationTest: 至少向 5 个合格买家展示生产定价，并在这个价位上拿到 2 条书面转化路径或 LOI。
  decisionImpact: 如果不成立，公司必须收窄范围、下调 ACV 假设，并让招聘和融资计划更保守。
- assumption: 小组级 先落地再扩张 之所以成立，是因为规则模板和券商映射能在同一家基金的不同小组之间复用。
  basis: idea.yaml
  validationTest: 前 4 家生产基金里，至少 2 家在 9 个月内出现第二个小组或第二条策略的扩张。
  decisionImpact: 如果不成立，模型里的 SOM 和风险投资级扩张路径都会变弱，公司应该按更窄的工作流软件生意来经营。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈工作流负责人，并收集目标基金真实的实盘上线材料。
  hypothesis: 手工瓶颈主要卡在审批包组装和券商控制配置，不在原始信号生成。
  successMetric: 完成 10 场合格访谈，拿到至少 5 份真实表格、材料 或上线包，并归并成 1 份可重复工作流规格。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 拿历史信号上线案例做影子模式审批包原型。
  hypothesis: 只靠 1 套“链路 + 控制编译”工作流，就能复原实盘试跑所需的大部分信息，不必再手工做 材料。
  successMetric: 2 家共创客户确认，他们当前审批材料里至少 80% 能直接由产品输入生成。
  owner: 创始工程师
- horizon: 0–90 天
  experiment: 和目标基金一起跑部署与安全审查。
  hypothesis: VPC 或受限写入部署足以满足相当一部分买家，第一年不必被迫走完整本地部署。
  successMetric: 完成 4 次安全审查，至少 1 个试点在没有强制本地部署要求的情况下获批。
  owner: 创始产品/风险系统负责人
- horizon: 3–6 个月
  experiment: 围绕一次真实的影子转实盘事件，启动 1 个付费单小组试点。
  hypothesis: 产品能把从影子就绪到第一笔限额实盘委托的时间至少砍掉 50%。
  successMetric: 首个付费试点里，纸面转实盘中位周期下降 50%+，或压到 3 个工作日以内。
  owner: 解决方案工程师
- horizon: 6–12 个月
  experiment: 在第一批试点上验证定价和转生产。
  hypothesis: 只要定价绑在 1 个小组的实盘试跑工作流上，而不是按席位或整平台替换卖，买家就会转单。
  successMetric: 至少 2 个付费试点转成 $150k+ 的年化生产合同。
  owner: 创始人/CEO
- horizon: 6–12 个月
  experiment: 验证第二个小组扩张和伙伴带部署。
  hypothesis: 可复用规则模板和 1 条已验证的 OEMS 路径，会明显缩短下一个小组或下一个基金的 铺开部署 时间。
  successMetric: 1 家客户扩到第二个小组，且 1 个伙伴协助部署项目能在少于 6 周的集成工作里上线。
  owner: 解决方案工程师
operations:
- 采用 VPC 或受限写入部署，带不可篡改审计日志、基于角色的审批和可回取的上线记录。
- 每周做一次上线复盘，对照影子与实盘表现，把暂停、缩仓和关停决定明确记进系统。
- 为每套已支持的 OEMS 和券商配置建立连接器与规则模板库，让后续部署复用前面做过的工作。
- 把共创客户成功评审绑到周期缩短、试点转生产和第二个小组扩张这些指标上。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 先由创始人亲自打透这个集中度很高的买家群体，同时把 OEMS、主经纪商和共创客户关系织起来，再考虑招背 销售指标 的销售。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 把链路存储、控制编译器、审计层和部署控制做出来，这些正是产品护城河所在。
- role: 创始产品/风险系统负责人
  startTiming: 第 0 个月
  rationale: 把对冲基金上线工作流、审批逻辑和成功指标翻成一个风控和交易团队愿意信的产品。
- role: 解决方案工程师
  startTiming: 第 3 个月
  rationale: 把混合 OEMS 和多主经纪商集成做成可复用模板，同时把试点部署周期压短。
- role: 安全/平台工程师
  startTiming: 第 6 个月
  rationale: 安全审查和账簿记录控制很可能就是采购闸门，所以部署加固要在大规模 GTM 之前到位。
- role: 企业客户销售
  startTiming: 第 12 个月
  rationale: 只有在定价、买家归属和试点转生产都被证明之后，才加专职销售火力。
milestones:
- horizon: 0–12 个月
  items:
  - 完成 10 次工作流访谈，并从目标基金拿到 5 份真实上线材料。
  - 和已经在内部跑 AI 辅助研究的美国市场中性基金签下 3 个付费共创试点。
  - 交付 1 条可生产的 OEMS 路径、审批包生成能力，以及 VPC 或受限写入部署控制。
  - 至少把 2 个试点转成生产，同时把纸面转实盘的中位周期压到 3 个工作日以内。
- horizon: 12–24 个月
  items:
  - 做到 4–6 家生产基金和 12–15 个实盘小组。
  - 补出第 2 套 OEMS 或券商控制模板族群，并在客户之间沉淀一套可复用异常语料库。
  - 至少一半生产基金出现第二个小组扩张。
  - 只有在美国转化指标已经可重复之后，才拿下第 1 个新加坡 客户 或 1 个伙伴带来的相邻部署。
- horizon: 24–36 个月
  items:
  - 做到约 40 个实盘小组，对应模型里的 $7.2M SOM 目标。
  - 在不重建核心控制层的前提下，启动第 1 个长仓或外包交易的相邻工作流试点。
  - 把影子转实盘基准和人工覆盖历史做成竞争单里的差异化销售资产。
  - 围绕可重复 ACV、扩张和集成回本来讲 A 轮故事，而不是只讲赛道叙事。
risks:
- risk: 会把 AI 生成或 AI 改写信号推到实盘资金的目标基金太少，形成不了足够急迫的需求。
  likelihood: Medium
  impact: High
  mitigation: 只盯已经在跑低资金实盘试跑的基金，在资格筛选里强制验证当前上线量；如果前 10 个账户都证实不了重复性痛点，就停止广铺 GTM。
- risk: 成熟基金会把上线工具视为核心 IP，更愿意内部自建。
  likelihood: High
  impact: High
  mitigation: 先以一层很薄的控制编译器和链路层切进去，直接接现有研究代码，再用更快上线和更强审计性去证明自己比内部流程更值钱。
- risk: Bloomberg、FlexTrade、TS Imagine 或其他现有厂商，会在公司护城河成形前就把基础链路和发布控制打包进去。
  likelihood: Medium
  impact: High
  mitigation: 用跨栈中立性、混合环境里的更快部署速度，以及现有厂商拿不到的影子转实盘结果数据来拉开差距。
- risk: 安全、部署和账簿记录要求会把每一单都拉成定制企业项目。
  likelihood: Medium
  impact: High
  mitigation: 尽早标准化 VPC 和受限写入部署模式，把控制归属边界文档化，并在价格还撑不住前，不轻易承诺完整本地部署支持。
- risk: 一旦出现高关注度的智能体交易亏损或监管动作，围绕 AI 到实盘工作流的支出就可能冻结。
  likelihood: Medium
  impact: High
  mitigation: 把产品明确定位成人类在环的安全、证据和关停层，并让所有部署默认先跑影子模式、资金上限和明确关停条件。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $4-6M
  runwayMonths: 18
  useOfFundsSummary: 18 个月跑道应该足够覆盖创始产品和工程团队、安全级部署控制、1 条主 OEMS / 券商集成路径和 1 条次级路径，以及 3–4 个付费试点，目标是至少把 2 家基金转成生产，并验证第二个小组扩张。
