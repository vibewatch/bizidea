jobsToBeDone:
  - job: >-
      When a PM wants to allocate real capital to an AI-generated signal, help the platform and trading team promote it safely, so they can launch a live pilot without weeks of manual rewiring.
    currentAlternative: "Shadow books, manual code handoffs, and spreadsheet approvals"
    successMetric: "Days from shadow-book threshold hit to first capped live order"
  - job: >-
      When a live pilot diverges from paper performance, help the fund determine whether the issue is the signal, the execution route, or the market regime, so they can kill, resize, or keep scaling the strategy with confidence.
    currentAlternative: "Broker TCA, PM judgement, and ad hoc post-mortems"
    successMetric: "Time to root-cause and act on shadow-vs-live performance drift"
