topRisks:
  - name: "In-house build bias"
    description: >-
      Sophisticated funds may view promotion tooling as core IP and try to wire it themselves instead of buying software.
    mitigation: >-
      Start as a narrow compiler and lineage layer that plugs into existing research stacks, proving faster pilot launches before asking to own broader workflow.
  - name: "Category timing"
    description: >-
      Many funds are still in pilot mode, so the number willing to budget for agentic execution tooling may stay small in the first 12 to 18 months.
    mitigation: >-
      Sell first to multi-pod funds already launching low-capital live pilots, then expand into long-only managers, outsourced trading desks, and prime-broker partners as adoption broadens.
  - name: "Adoption shock after losses"
    description: >-
      A high-profile agent-driven trading loss or regulatory action could freeze budgets across the category.
    mitigation: >-
      Position the product as the human-in-the-loop safety and evidence layer, with shadow-mode-first deployment, immutable audit logs, and hard capital caps by default.
