problem: >-
  Market-neutral equity funds are piloting internal LLM and agent research stacks, but the last mile from paper alpha to live orders still runs through quant-dev rewrites, shadow books, risk committee decks, and manual OMS configuration. Once agents can generate, test, and refine hypotheses continuously, that handoff becomes the bottleneck: promising signals wait weeks for promotion, while live pilots go out with weak lineage on why the model changed, what limits were approved, and when it should be shut off. Funds either slow innovation or accept unacceptable operational and mandate risk around live capital.
targetUser:
  primary: >-
    Head of systematic platform or COO at a $500M-$5B market-neutral equity hedge fund running 2-8 PM pods, multiple prime brokers, and internal AI research pilots
  secondary: >-
    Quant research lead or PM pod head responsible for promoting shadow-book signals into a capped live pilot book
  buyer: >-
    COO, head of electronic trading, or chief technology officer at a multi-pod market-neutral fund
startupThesis:
  nonObviousInsight: >-
    The scarce asset is no longer raw signal generation; it is trusted promotion. As soon as multi-agent systems can self-revise hypotheses, the highest-value workflow shifts to compiling those evolving ideas into broker-safe live orders with evidence, limits, and kill criteria attached.
  beachhead: >-
    Paper-to-live promotion for U.S. and Singapore market-neutral equity hedge funds with $500M-$5B AUM, 2-8 PM pods, Bloomberg EMSX or FlexTrade, and at least two prime brokers where internally generated AI signals still need manual quant-dev handoff before trading
  wedge: >-
    A signal-promotion workbench that replays each agent-generated signal in shadow mode, scores readiness, and compiles a go-live packet with OMS configs, broker throttles, capital caps, and kill switches.
  whyNowCatalyst: >-
    GIM's Series A and ACL-accepted CogAlpha architecture show agentic investing stacks now have both capital and technical credibility to cross from research into live execution, forcing funds to build promotion controls before internal pilots touch real money.
  ventureScalePath: >-
    Start with market-neutral equity funds, then expand the same promotion and attribution layer into long-only managers, global-macro pods, outsourced trading desks, prime brokers, and eventually a vendor-neutral control plane for AI-native capital-markets execution.
solution: >-
  The product sits between research agents and the OMS or EMS stack. It logs every hypothesis version, backtest window, shadow-book result, factor exposure, turnover, and prompt or data change, then evaluates the signal against mandate rules, liquidity limits, broker-specific order constraints, and PM-approved capital caps. When a pod wants to go live, the system generates an approval packet, compiles the chosen limits into deployable OMS or broker instructions, and launches the pilot with automatic throttles and kill conditions. After launch, it compares shadow performance to realized fills and slippage so teams can see whether failure came from the idea, the market regime, or the execution path. Over time it becomes the system of record for hypothesis lineage and shadow-to-live conversion across every pod.
goToMarketSeed:
  firstCustomer: >-
    COO or head of systematic platform at a New York or Singapore market-neutral equity fund with $1B-$3B AUM, 3-6 pods, internal LLM-assisted signal research, and recurring low-capital live pilots
  buyingTrigger: >-
    A PM pod wants to promote a new AI-generated signal from shadow book into a live pilot, but risk and trading teams require evidence, broker-specific controls, and a kill plan before capital is allocated.
  currentAlternative: >-
    In-house Python research pipelines, shadow books, spreadsheet approval checklists, OMS rule configuration by quant developers, and human trader sign-off.
  switchingReason: >-
    The wedge removes weeks of one-off plumbing by turning promotion into a repeatable control workflow with lineage, auditability, and safer low-capital rollouts.
  pricingHypothesis: >-
    Annual platform fee per PM pod or execution team, plus usage priced by the number of live pilot strategies promoted each month.
