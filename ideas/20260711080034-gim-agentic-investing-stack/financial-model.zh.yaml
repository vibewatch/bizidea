slug: paper-to-live-signal-os
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型启动月份
  value: 2026-08
  unit: month
  source: '[BP date 2026-07-11] 模型从商业计划日期后的第一个完整运营月开始。'
- id: A2
  name: 期初现金 / 种子轮融资
  value: '4.0'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $4-6M; BP runwayMonths 18] 基准情形按种子轮区间下沿建模，并额外加上 6 个月缓冲，把现金跑道拉到 24 个月。'
- id: A3
  name: 模型里的付费客户单位
  value: 一个付费的对冲基金账户，在这层上线控制软件上跑 1 个或多个实盘试跑小组；同一基金里小组扩张先体现在 ARPU，再体现在客户数。
  unit: definition
  source: '[BP market.buyingProcess; BP businessModel.unitOfValue] 经济买家在基金层，但只要同一基金里有更多小组和策略通道被这套控制层接管，收入就会先在账户内往上长。'
- id: A4
  name: 付费试点定价
  value: '100'
  unit: USDK per 90-day pilot
  source: '[BP gtm.pricing $75k-$125k pilot] 模型取首个单小组付费共创试点的中位数。'
- id: A5
  name: 每个实盘小组的生产年收入
  value: '180'
  unit: USDK ARR per pod
  source: '[Research market.som $180k ARR per pod; BP gtm.pricing $150k-$250k annual per pod plus usage] 这是成熟期单个生产小组的稳态价格，尚未把温和的用量和基准增购完全算满。'
- id: A6
  name: 付费基金爬坡
  value: M1-M12 期末基金数 = 0,0,0,1,1,1,2,2,2,2,3,3；Q1Y2 3；Q2Y2 4；Q3Y2 5；Q4Y2 5；Q1Y3 6；Q2Y3 7；Q3Y3 7；Q4Y3 8。
  unit: funds
  source: '[BP milestones; BP funnelTargets] 这个节奏能让公司在 Y1 落下 3 家付费共创基金，Y2 达到 4-6 家生产基金里程碑，并在 Y3 末拿到支撑 40 个小组 SOM 假设的 8 个账户。'
- id: A7
  name: 每家活跃付费基金的混合年收入
  value: M4-M6 $400K；M7-M9 $360K；M10-M12 $420K；Q1Y2 $432K；Q2Y2 $456K；Q3Y2 $504K；Q4Y2 $540K；Q1Y3 $594K；Q2Y3 $675K；Q3Y3 $765K；Q4Y3 $900K。
  unit: USDK per active fund-year
  source: '[Derived from A4-A6; BP pricing; BP expansionLevers] 随着基金从 1 条付费试点通道扩到多个受治理的实盘小组，并叠加轻度用量和分析增购，混合 ARPU 会一路往上抬。'
- id: A8
  name: 毛利率爬坡
  value: Y1 的试点月份毛利率 48%-56%；Y2 各季度毛利率 58%-64%；到 Q4Y3 稳态毛利率 70%。
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70; BP operating assumptions on VPC deployment] 早期毛利率压在长期目标以下，因为部署、安全审查和集成工作在模板化之前仍然很重。'
- id: A9
  name: 各岗位全成本现金薪酬
  value: 创始人/CEO 200；工程 240；产品/风险 225；解决方案/实施 210；安全/平台 240；企业销售 230；客户成功/运营 170。
  unit: USDK per year per FTE
  source: '[BP team; startup-finance heuristic for senior buy-side infrastructure talent with payroll taxes and benefits] 现金薪酬高于通用 SaaS 水平，因为对冲基金工作流、安全和 OEMS 集成人才都不便宜。'
- id: A10
  name: 招聘节奏
  value: M1 创始人/CEO、工程、产品/风险；M3 首位解决方案/实施；M6 安全/平台；M12 企业销售；M18 第 2 位工程；M20 第 2 位解决方案/实施；M31 客户成功/运营。
  unit: timing
  source: '[BP team startTiming; BP strategicChoices.sequencingRationale] 先补交付和安全能力，再谈更广商业扩张；在试点转生产没被证明前，团队始终保持精简。'
- id: A11
  name: 职能薪酬分摊
  value: CEO：75% S&M / 25% G&A；工程：100% R&D；产品/风险：100% R&D；解决方案：30% S&M / 70% G&A；安全/平台：70% R&D / 30% G&A；销售：100% S&M；客户成功/运营：25% S&M / 75% G&A。
  unit: allocation
  source: '[BP team rationales] 用来把总薪酬滚进各条职能 opex，同时把 COGS 留给与收入挂钩的服务和托管成本。'
- id: A12
  name: 非薪酬运营开支政策
  value: Y1 月度 S&M = $18K-$28K，另加收入的 3%-4.5%；Y1 月度 R&D = $28K-$36K；Y1 月度 G&A = $20K-$26K。Y2 季度 S&M = $84K-$102K，另加收入的 5%-5.5%；Y2 季度 R&D = $102K-$120K；Y2 季度 G&A = $72K-$84K。Y3 季度 S&M = $108K-$126K，另加收入的 6.5%-7.0%；Y3 季度 R&D = $126K-$144K；Y3 季度 G&A = $84K-$102K。
  unit: USDK
  source: '[Startup-finance heuristic anchored to BP operations, security reviews, VPC deployment, travel-heavy founder sales, legal/compliance, and cloud data infrastructure.] 基于运营、安全审查、VPC 部署、重差旅的创始人销售、法务/合规和云数据基础设施做的经验估算。'
- id: A13
  name: 单位经济模型参考 ARPU
  value: '720'
  unit: USDK per fund-year
  source: '[Derived from A5] 一家具备约 4 个受治理实盘小组的成熟基金，在进入后期扩张到 5 个小组之前，年收入大约就是 $720K。'
- id: A14
  name: 稳态 CAC
  value: '260'
  unit: USDK per new paying fund
  source: '[BP funnelTargets; Research reportMemo.distributionChannels; startup-finance heuristic] 创始人主导的企业销售、安全尽调和 OEMS 集成范围界定，会让拿下每家基金都像一场低七位数销售努力级别的流程，直到转介绍开始积累。'
- id: A15
  name: 月度流失率
  value: '2.0'
  unit: percent
  source: '[BP businessModel.expansionLevers; startup-finance heuristic] 一旦嵌进基金工作流，产品会很黏；但对冲基金买家池很集中，策略切换也真实存在，所以仍按非零流失处理。'
- id: A16
  name: 现金转换政策
  value: EBITDA 大致等于经营现金变动
  unit: policy
  source: '[Startup-finance heuristic] 当前模型里不考虑债务、capex、税或实质性的营运资金波动。'
- id: A17
  name: 用于定融资额的种子轮里程碑
  value: 到第 24 个月做到 5 家生产基金、12-15 个实盘小组、第 2 套 OEMS 或券商控制模板家族，以及至少一半生产基金完成第二个小组扩张，同时手里还要留着大约 6 个月现金缓冲。
  unit: milestone
  source: '[BP milestones 12-24 months; BP fundingAsk.useOfFundsSummary] 这个验证包就是种子轮融资额的定标点。'
- id: A18
  name: 在验证出来前不做大规模商业扩张
  value: 到 Y3 年底团队仍控制在 9 FTE，基准情形里不再新增第 2 个背销售指标的销售。
  unit: policy
  source: '[BP strategicChoices.sequencingRationale; BP investorMemo.nextDiligence] 在试点转化、部署可复用性和第二个小组扩张都看清之前，烧钱必须克制。'
