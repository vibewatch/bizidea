scenarios:
  downside:
    description: 试点转生产整体慢了约 1 个季度，扩张只落在更少的基金里，而且直到 Y3 部署仍然偏重服务。
    y3RevenueK: 3425.6
    y3EbitdaK: -1263.6
    cashLowPointK: -995.2
    keyAssumptionChanges:
    - Y3 末只有 6 家付费基金，而不是 8 家；扩张规模也更接近 30 个实盘小组，而不是 40 个。
    - 每家活跃基金的混合年收入峰值更接近 $750K，而不是 $900K，因为第二个小组扩张和用量抬升来得更晚。
    - 由于部署和控制模板工作仍然偏定制，毛利率会比基准情形低约 3 个点。
  base:
    description: 3 家共创基金都变成可引用客户，第二个小组扩张按计划出现，公司在 Q4Y3 达到研究里假设的 40 个小组 SOM。
    y3RevenueK: 4940.0
    y3EbitdaK: -230.6
    cashLowPointK: 295.1
    keyAssumptionChanges:
    - 付费基金按 A6 的节奏爬坡，Y3 末达到 8 个账户。
    - 每家活跃基金的混合年收入按 A7 走，到 Q4Y3 年末的年化节奏约为 $900K。
    - 毛利率从高触达试点交付一路爬升，到 Q4Y3 达到 70% 的稳态目标。
  upside:
    description: 标杆客户效应把转生产往前拉，第二个小组扩张更早发生，而且年底前多转进 1 家基金，却没有同比例增加招聘。
    y3RevenueK: 6761.3
    y3EbitdaK: 1017.6
    cashLowPointK: 958.4
    keyAssumptionChanges:
    - Y3 末达到 9 家付费基金、约 48 个实盘小组，因为 H2Y3 又多落了 1 家生产基金。
    - 随着用量和分析增购更早落地，每家活跃基金的混合年收入到 Q4Y3 提前抬到约 $960K。
    - 部署手册和 OEMS 模板更快可复用，毛利率也会更早改善。
sensitivity:
- variable: 销售周期
  downsideCase: 安全和平台尽调让 2 个后期转化各自再慢约 1 个季度。
  baseCase: 付费试点和转生产按 A6 节奏落地。
  upsideCase: 可引用部署压缩尽调周期，把 1 个生产转化提前拉进 H1Y3。
  y3RevenueImpactK: -780.0
  cashImpactK: -520.0
- variable: ARPU
  downsideCase: 成熟基金停在更接近 4 个小组，年末 ARPU 只能维持在约 $780K。
  baseCase: 成熟基金到 Q4Y3 达到约 5 个受治理小组，年末 ARPU 约 $900K。
  upsideCase: 随着用量、基准报告和更快扩张出现，年末 ARPU 往 $960K 走。
  y3RevenueImpactK: -560.0
  cashImpactK: -360.0
- variable: 招聘节奏
  downsideCase: 在部署可复用性没被证明前，被迫提前多招 1 名实施或安全岗位。
  baseCase: 团队按 A10 节奏招聘，Y3 年底停在 9 FTE。
  upsideCase: 客户成功岗位推迟到下一轮融资之后再招。
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
- variable: CAC
  downsideCase: CAC 升到接近 $320K，因为创始人销售和伙伴 赋能 对每家基金都还是定制活。
  baseCase: 随着首批可引用客户出现，CAC 稳在约 $260K。
  upsideCase: 等 OEMS 和顾问转介绍开始灌 线索池，CAC 降到接近 $220K。
  y3RevenueImpactK: 0.0
  cashImpactK: -240.0
- variable: 流失率
  downsideCase: 月度流失率升到 3.0%，因为不是每家生产基金都能扩出第二个小组。
  baseCase: 随着控制层嵌进生产治理，月度流失率维持在约 2.0%。
  upsideCase: 随着人工覆盖历史和基准报告抬高切换成本，月度流失率改善到 1.5%。
  y3RevenueImpactK: -320.0
  cashImpactK: -180.0
- variable: 毛利率
  downsideCase: 稳态毛利率最高只能到约 67%，因为 VPC 部署和模板工作仍然太偏服务。
  baseCase: 毛利率在 Q4Y3 达到 70% 目标。
  upsideCase: 部署手册和控制模板更可复用，毛利率提升到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      TargetFunds --> PaidPilots
      PaidPilots --> ProductionFunds
      ProductionFunds --> PodExpansion
      PodExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入来自 Q4Y3 的 8 家付费基金；每个成熟账户会从 1 条付费试点通道逐步扩到大约 5 个受治理实盘小组，对应 $900K 的年末 ARPU。
- checkName: 必须跑对的事
  finding: 试点转生产和第二个小组扩张必须大致贴着 BP 漏斗目标走，因为 Y2 之后模型只再加了 3 家净新增基金。
- checkName: 模型会在哪儿断
  finding: 只要部署或安全审批再慢 1 个季度，downside 情形的现金就会在公司碰到 Q4Y3 盈利拐点前先掉到 0 以下。
- checkName: 下一轮证明点
  finding: 只要公司在第 24 个月前做到 5 家生产基金、12-15 个实盘小组、第 2 套 OEMS 可复用，并能看到清晰的扩张回本，种子轮就算值。
sanityChecks:
  ruleOf40: Y3 增长 151.4% + EBITDA 利润率 -4.7% = 146.7%。
  burnMultiple: Y2 的 burn multiple 约为 1.1x：$1588.1K EBITDA burn，对应大约 $1440K 的净新增 ARR（Y1 exit ARR 约 $1260K，Y2 到约 $2700K）。
  revenuePerFte: Y3 年底 9 FTE，对应每名年末 FTE 贡献 $548.9K 收入（粗略企业 SaaS 基准：$200K-$400K）。
  flags:
  - 基准情形高度依赖少数早期标杆基金内部的第二个小组扩张，不只是靠拿新客户。
  - 融资方案按 BP 种子轮区间下沿来配，所以只要被迫走本地部署或安全审批显著放慢，就得更早再融资。
  - 模型把 Y3 团队压在 9 FTE，效率很高，但几乎不给重服务部署模式留冗余。
  - 基准情形里现金最低点只有约 $0.3M，且要到 Q4Y3 才盈利，所以管理层在业务自我造血前，还是得提前启动下一轮融资。
