  sensitivityCases:
  - case: 智能体 AI 主要还停在研究侧
    impact: 如果机构只是把 AI 用在记笔记或分析，而不是实盘上线，这个产品更像一项“先做着防未来”的项目，而不是眼下就痛的控制采购。
    sourceRefs:
    - 3
    - 4
    - 5
  - case: 现有 OEMS 厂商补出基础链路和发布工具
    impact: 除非创业公司能靠跨栈中立性、更丰富的影子转实盘证据，以及在混合供应商环境里更快的实施速度取胜，否则差异化会被迅速压窄。
