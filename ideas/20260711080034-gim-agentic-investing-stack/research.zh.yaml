    - 33
  validationPlan:
  - priority: high
    question: 目标基金到底多频繁把 AI 生成或 AI 改写信号推到实盘？哪一步最耗人？
    evidenceToGather: 和美国、新加坡对冲基金的 COO、量化平台负责人、交易负责人做 8-10 场工作流访谈，并拿到真实的影子账本上线包或表格样本。
  - priority: high
    question: 基金会不会买一层中立控制软件，还是一定要把功能长在 Bloomberg、FlexTrade 或 TS Imagine 的现有工作流里？
    evidenceToGather: 和现有 OEMS 用户做 3 场 赢单/输单 访谈，再加至少 2 家实施伙伴或顾问，了解这些栈是怎么部署的。
  - priority: medium
    question: 哪种部署模型最容易过数据安全门槛：VPC、本地部署，还是受限写入的托管 SaaS？
    evidenceToGather: 和 4 家目标基金跑安全与合规审查，并整理潜在买家要求的控制清单。
  - priority: medium
    question: 主经纪商或外包交易台能不能从阻力，变成渠道？
    evidenceToGather: 做 5 场伙伴对话，重点看转介绍经济账、控制归属边界，以及各家券商配置边界。
