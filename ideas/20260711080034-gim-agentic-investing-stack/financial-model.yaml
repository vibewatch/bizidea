slug: paper-to-live-signal-os
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: Model start month
    value: 2026-08
    unit: month
    source: '[BP date 2026-07-11] The model starts in the next full operating month after the business-plan date.'
  - id: A2
    name: Opening cash / seed raise
    value: '4.0'
    unit: USDM
    source: '[BP fundingAsk targetFundingRangeUsd $4-6M; BP runwayMonths 18] Base case underwrites the low end of the stated seed range and adds the required 6-month buffer to size a 24-month run.'
  - id: A3
    name: Modeled customer unit
    value: Paying hedge-fund account using the promotion-control layer for one or more live-pilot pods; pod expansion is captured inside ARPU before logo count.
    unit: definition
    source: '[BP market.buyingProcess; BP businessModel.unitOfValue] The economic buyer is a fund-level operator, but revenue expands as more pods and strategy lanes are governed inside the same fund.'
  - id: A4
    name: Paid pilot pricing
    value: '100'
    unit: USDK per 90-day pilot
    source: '[BP gtm.pricing $75k-$125k pilot] The model uses the midpoint for the first one-pod paid design-partner pilot.'
  - id: A5
    name: Production revenue per live pod
    value: '180'
    unit: USDK ARR per pod
    source: '[Research market.som $180k ARR per pod; BP gtm.pricing $150k-$250k annual per pod plus usage] This is the steady production pod price before modest usage and benchmarking uplift.'
  - id: A6
    name: Paying fund ramp
    value: M1-M12 EOP funds = 0,0,0,1,1,1,2,2,2,2,3,3; Q1Y2 3; Q2Y2 4; Q3Y2 5; Q4Y2 5; Q1Y3 6; Q2Y3 7; Q3Y3 7; Q4Y3 8.
    unit: funds
    source: '[BP milestones; BP funnelTargets] This pace lands 3 paid design-partner funds in Y1, reaches the 4-6 production-fund milestone by Y2, and exits Y3 with 8 accounts supporting the 40-pod SOM case.'
  - id: A7
    name: Blended annual revenue per active paying fund
    value: M4-M6 $400K; M7-M9 $360K; M10-M12 $420K; Q1Y2 $432K; Q2Y2 $456K; Q3Y2 $504K; Q4Y2 $540K; Q1Y3 $594K; Q2Y3 $675K; Q3Y3 $765K; Q4Y3 $900K.
    unit: USDK per active fund-year
    source: '[Derived from A4-A6; BP pricing; BP expansionLevers] Blended ARPU rises as funds move from one paid pilot lane to multiple governed live pods plus light usage and analytics upsell.'
  - id: A8
    name: Gross margin ramp
    value: Y1 pilot months 48%-56% GM; Y2 quarterly GM 58%-64%; Q4Y3 steady-state GM 70%.
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 70; BP operating assumptions on VPC deployment] Early gross margin is held below the long-term target because deployment, security review, and integration work remain high-touch until templates are reusable.'
  - id: A9
    name: Loaded cash compensation by role
    value: Founder CEO 200; engineering 240; product/risk 225; solutions/implementation 210; security/platform 240; enterprise sales 230; customer success/ops 170.
    unit: USDK per year per FTE
    source: '[BP team; startup-finance heuristic for senior buy-side infrastructure talent with payroll taxes and benefits] Cash comp is set above generic SaaS levels because hedge-fund workflow, security, and OEMS integration talent is expensive.'
  - id: A10
    name: Hiring cadence
    value: M1 founder CEO, engineering, product/risk; M3 first solutions/implementation; M6 security/platform; M12 enterprise sales; M18 second engineer; M20 second solutions/implementation; M31 customer success/ops.
    unit: timing
    source: '[BP team startTiming; BP strategicChoices.sequencingRationale] The model adds delivery and security capacity before broad commercial scale and keeps the team lean until pilot-to-production conversion is proven.'
  - id: A11
    name: Functional payroll allocation
    value: CEO 75% S&M / 25% G&A; engineering 100% R&D; product/risk 100% R&D; solutions 30% S&M / 70% G&A; security/platform 70% R&D / 30% G&A; sales 100% S&M; customer success/ops 25% S&M / 75% G&A.
    unit: allocation
    source: '[BP team rationales] Used to roll total salary into the functional opex lines while keeping COGS as revenue-linked service and hosting costs.'
  - id: A12
    name: Non-payroll operating spend policy
    value: Y1 monthly S&M = $18K-$28K plus 3%-4.5% of revenue; Y1 monthly R&D = $28K-$36K; Y1 monthly G&A = $20K-$26K. Y2 quarterly S&M = $84K-$102K plus 5%-5.5% of revenue; Y2 quarterly R&D = $102K-$120K; Y2 quarterly G&A = $72K-$84K. Y3 quarterly S&M = $108K-$126K plus 6.5%-7.0% of revenue; Y3 quarterly R&D = $126K-$144K; Y3 quarterly G&A = $84K-$102K.
    unit: USDK
    source: '[Startup-finance heuristic anchored to BP operations, security reviews, VPC deployment, travel-heavy founder sales, legal/compliance, and cloud data infrastructure.]'
  - id: A13
    name: Unit-economics reference ARPU
    value: '720'
    unit: USDK per fund-year
    source: '[Derived from A5] A mature fund running about 4 governed live pods at $180K each yields roughly $720K annual revenue before late-stage expansion to 5 pods.'
  - id: A14
    name: Steady-state CAC
    value: '260'
    unit: USDK per new paying fund
    source: '[BP funnelTargets; Research reportMemo.distributionChannels; startup-finance heuristic] Founder-led enterprise selling, security diligence, and OEMS integration scoping make each initial fund win a low-seven-figure-sales-effort process before referrals compound.'
  - id: A15
    name: Monthly churn
    value: '2.0'
    unit: percent
    source: '[BP businessModel.expansionLevers; startup-finance heuristic] Once embedded in a fund workflow the product should be sticky, but a concentrated hedge-fund buyer set and strategy turnover still justify non-trivial logo risk.'
  - id: A16
    name: Cash conversion policy
    value: EBITDA approximates operating cash movement
    unit: policy
    source: '[Startup-finance heuristic] The model excludes debt, capex, taxes, and material working-capital swings at this stage.'
  - id: A17
    name: Seed milestone used to size the round
    value: By month 24 reach 5 production funds, 12-15 live pods, a second OEMS or broker-control template family, and second-pod expansion in at least half of production funds while still holding roughly 6 months of cash buffer.
    unit: milestone
    source: '[BP milestones 12-24 months; BP fundingAsk.useOfFundsSummary] This is the proof package used to size the seed ask.'
  - id: A18
    name: No broad commercial build before proof
    value: End-of-year headcount stays at 9 FTE through Y3 and no second quota-carrying seller is added in the base case.
    unit: policy
    source: '[BP strategicChoices.sequencingRationale; BP investorMemo.nextDiligence] The plan keeps burn disciplined until pilot conversion, deployment repeatability, and second-pod expansion are all visible.'
