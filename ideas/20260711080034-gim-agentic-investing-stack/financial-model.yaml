scenarios:
  downside:
    description: Pilot-to-production conversion slips by about one quarter, expansion lands in fewer funds, and deployment stays more services-heavy through Y3.
    y3RevenueK: 3425.6
    y3EbitdaK: -1263.6
    cashLowPointK: -995.2
    keyAssumptionChanges:
      - Y3 exits at 6 paying funds instead of 8, with expansion topping out closer to 30 live pods than 40.
      - Blended annual revenue per active fund peaks around $750K instead of $900K because second-pod expansion and usage uplift arrive later.
      - Gross margin stays roughly 3 points below the base case because deployment and control-template work remain more custom.
  base:
    description: Three design-partner funds become referenceable accounts, second-pod expansion appears on schedule, and the company reaches the researched 40-pod SOM case by Q4Y3.
    y3RevenueK: 4940.0
    y3EbitdaK: -230.6
    cashLowPointK: 295.1
    keyAssumptionChanges:
      - Paying funds follow A6 and exit Y3 at 8 accounts.
      - Blended annual revenue per active fund follows A7 and reaches about $900K at the Q4Y3 exit rate.
      - Gross margin ramps from high-touch pilot delivery to the 70% steady-state target by Q4Y3.
  upside:
    description: Reference wins pull conversions forward, second-pod expansion lands earlier, and one additional fund converts before year-end without a proportionate hiring step-up.
    y3RevenueK: 6761.3
    y3EbitdaK: 1017.6
    cashLowPointK: 958.4
    keyAssumptionChanges:
      - Y3 exits at 9 paying funds and roughly 48 live pods because one extra production fund lands in H2Y3.
      - Blended annual revenue per active fund reaches about $960K by Q4Y3 as usage and analytics upsell arrive earlier.
      - Gross margin improves faster as deployment playbooks and OEMS templates become reusable across more funds.
sensitivity:
  - variable: sales cycle
    downsideCase: Security and platform diligence adds roughly one quarter to two late-stage conversions.
    baseCase: Paid pilots and conversions land on the A6 timetable.
    upsideCase: Referenceable deployments compress diligence and pull one production conversion into H1Y3.
    y3RevenueImpactK: -780.0
    cashImpactK: -520.0
  - variable: ARPU
    downsideCase: Mature funds stall closer to 4 pods and blended exit ARPU stays near $780K.
    baseCase: Mature funds reach about 5 governed pods and $900K exit ARPU by Q4Y3.
    upsideCase: Usage, benchmarking, and faster expansion push exit ARPU toward $960K.
    y3RevenueImpactK: -560.0
    cashImpactK: -360.0
  - variable: hiring pace
    downsideCase: One extra implementation or security hire is pulled forward before deployment repeatability is proven.
    baseCase: Headcount follows A10 and ends Y3 at 9 FTE.
    upsideCase: The customer success hire is deferred until after the next financing.
    y3RevenueImpactK: 0.0
    cashImpactK: -260.0
  - variable: CAC
    downsideCase: CAC rises toward $320K because founder sales and partner enablement remain bespoke for each fund.
    baseCase: CAC stays near $260K as the first reference accounts improve conversion efficiency.
    upsideCase: CAC falls toward $220K once OEMS and consultant referrals start feeding the pipeline.
    y3RevenueImpactK: 0.0
    cashImpactK: -240.0
  - variable: churn
    downsideCase: Monthly churn rises to 3.0% because pilot workflows do not expand inside every production fund.
    baseCase: Monthly churn holds near 2.0% as the control layer becomes embedded in production governance.
    upsideCase: Monthly churn improves to 1.5% as override history and benchmark reporting raise switching costs.
    y3RevenueImpactK: -320.0
    cashImpactK: -180.0
  - variable: gross margin
    downsideCase: Steady-state gross margin tops out around 67% because VPC deployment and template work stay service-heavy.
    baseCase: Gross margin reaches the 70% target by Q4Y3.
    upsideCase: Gross margin reaches 72% as deployment playbooks and control templates become more reusable.
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetFunds --> PaidPilots
      PaidPilots --> ProductionFunds
      ProductionFunds --> PodExpansion
      PodExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from 8 paying funds by Q4Y3, with each mature account expanding from one paid pilot lane toward roughly 5 governed live pods and a $900K exit ARPU.
  - checkName: Must go right
    finding: Pilot-to-production conversion and second-pod expansion must stay near the BP funnel targets, because the model adds only three net new funds after Y2.
  - checkName: Model breaks if
    finding: A one-quarter slip in deployment or security approvals pushes the downside case below zero cash before the company reaches the Q4Y3 profitability inflection.
  - checkName: Next-round proof
    finding: The seed round is justified if the company reaches 5 production funds, 12-15 live pods, second OEMS repeatability, and visible expansion payback by month 24.
sanityChecks:
  ruleOf40: Y3 growth 151.4% + EBITDA margin -4.7% = 146.7%.
  burnMultiple: 'Y2 burn multiple is ~1.1x: $1588.1K EBITDA burn against roughly $1440K of net new ARR (from about $1260K exit ARR in Y1 to about $2700K in Y2).'
  revenuePerFte: '$548.9K Y3 revenue per end-of-year FTE on 9 FTE (rough enterprise SaaS benchmark: $200K-$400K).'
  flags:
    - The base case depends heavily on second-pod expansion inside a small set of early reference funds, not just on new-logo growth.
    - The funding plan uses the low end of the BP seed range, so a required on-prem path or materially slower security approvals would force an earlier raise.
    - The model keeps headcount at only 9 FTE through Y3, which is efficient but leaves little room for a services-heavy deployment motion.
    - Cash bottoms around $0.3M in the base case before Q4Y3 profitability, so management would still need to start the next financing process before the business is self-funding.
