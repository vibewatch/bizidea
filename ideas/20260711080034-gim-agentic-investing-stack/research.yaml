openQuestions:
- How many U.S. and Singapore market-neutral funds already promote AI-generated or AI-edited signals into live capital on at least a monthly basis?
- Will buyers accept a neutral promotion-control layer, or will they insist that lineage and approval workflows live inside existing Bloomberg, FlexTrade, or TS Imagine environments?
- Which prime brokers and execution partners are willing to expose enough control surfaces—capital caps, throttles, or kill templates—to make deployment materially faster?
- Does the security bar force most early deployments into VPC or on-prem models, changing implementation cost and sales velocity?
