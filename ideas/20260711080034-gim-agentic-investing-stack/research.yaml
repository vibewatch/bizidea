  validationPlan:
  - priority: high
    question: How often do target funds already promote AI-generated or AI-edited signals into live capital, and which step consumes the most human time?
    evidenceToGather: Eight to ten workflow interviews with US and Singapore hedge-fund COOs, quant-platform leads, and heads of trading, plus real examples of shadow-book promotion packets or spreadsheets.
  - priority: high
    question: Will funds buy a neutral control layer, or will they insist the feature lives inside an existing Bloomberg, FlexTrade, or TS Imagine workflow?
    evidenceToGather: Three win/loss interviews with incumbent OEMS users and at least two implementation partners or consultants who deploy those stacks.
  - priority: medium
    question: 'Which deployment model clears the data-security bar fastest: VPC, on-prem, or hosted SaaS with limited write access?'
    evidenceToGather: Security and compliance reviews with four target funds plus a checklist of required controls from prospective buyers.
  - priority: medium
    question: Can prime brokers or outsourced-trading desks become channels instead of blockers?
    evidenceToGather: Five partnership conversations covering referral economics, control ownership, and broker-specific configuration boundaries.
