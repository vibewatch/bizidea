slug: paper-to-live-signal-os
date: "2026-07-11"
executiveSummary: >-
  Paper-to-live signal OS is a control layer for market-neutral equity funds
  that already run internal AI research but still promote live pilots through
  spreadsheets, quant-dev rewrites, and manual OMS setup. Research supports the
  timing: hedge funds already grant broad GenAI access, agentic pilots are
  common, and GIM's 2026 financing explicitly frames the market as moving from
  research into live execution. The first customer should be a U.S.
  market-neutral fund with $1B-$3B AUM, 3-6 PM pods, Bloomberg EMSX or
  FlexTrade, multiple prime brokers, and recurring low-capital live pilots. The
  product should not try to generate alpha or replace the OEMS; it should
  compile one pod's shadow-book evidence, approval logic, broker limits, and
  kill criteria into a deployable live-pilot packet. That wedge ties the first
  user, budget trigger, pricing basis, and distribution motion into one system:
  a COO or head of systematic platform buys a safer and faster path from shadow
  threshold to first live order. The venture case is plausible because
  vendor-neutral promotion data, override history, and policy templates can
  compound across pods and funds, but it breaks if too few target funds already
  move AI-edited signals into live capital or if buyers insist the feature must
  live inside incumbent OEMS suites. Estimated SAM is $43.2M and modeled year-3
  SOM is $7.2M, so expansion to Singapore and then adjacent buy-side workflows
  matters after the U.S. beachhead is proven. Research does not yet confirm
  exact monthly promotion volumes, preferred deployment model, or whether a
  neutral layer can consistently win against internal builds, so the first 12
  months should be judged by paid pilot conversion and second-pod expansion
  rather than by broad hiring.
problem:
  - >-
    AI-assisted research can now generate more candidate signals than risk,
    trading, and quant-platform teams can safely clear for live capital, making
    paper-to-live promotion the bottleneck.
  - >-
    The current process still requires manual shadow-book analysis, committee
    decks, quant-dev OMS rewrites, and broker-specific control setup, creating
    multi-week delays and weak lineage on why a signal changed and who approved
    it.
  - >-
    When live and shadow performance diverge, funds often lack one shared
    record of model changes, approved limits, and kill logic, which raises
    operational, mandate, and books-and-records risk.
solution:
  - >-
    Ingest signal versions, backtest windows, factor and liquidity exposures,
    prompt or data changes, and shadow-book results into one lineage graph for
    each candidate live strategy.
  - >-
    Score live-readiness, generate an approval packet, and compile broker and
    OEMS instructions with capital caps, throttles, and kill switches for one
    pilot strategy.
  - >-
    Compare shadow performance with realized fills and slippage after launch so
    the fund can decide whether to resize, kill, or expand the strategy based
    on evidence rather than post-mortem guesswork.
whyWeWin:
  - >-
    The startup owns a vendor-neutral workflow boundary that adjacent research
    copilots and incumbent OEMS suites do not clearly own: the promotion step
    between evolving AI hypotheses and live capital.
  - >-
    It improves auditability and deployment speed without asking a fund to rip
    out its research stack, OEMS, or prime-broker relationships, which lowers
    adoption friction versus full-platform replacements.
  - >-
    Shadow-to-live conversion data, override history, and reusable policy
    templates can compound into a moat across pods, brokers, and market
    regimes.
strategicChoices:
  beachhead: >-
    U.S. market-neutral equity hedge funds with $1B-$3B AUM, 3-6 PM pods, at
    least two prime brokers, internal LLM-assisted research, and an imminent
    need to promote one capped live pilot through Bloomberg EMSX or FlexTrade.
  wedgeRationale: >-
    One-pod paper-to-live promotion is the fastest proof point because the
    pain, buyer, and success metric are already aligned around a single event:
    a pod is ready to allocate real capital but risk and trading still need
    evidence, broker controls, and kill logic. Starting broader across
    long-only, global macro, or full-fund workflow transformation would slow
    proof by adding new data shapes, committees, and integration surfaces
    before the core control layer is trusted.
  sequencingRationale: >-
    Build lineage capture, approval packets, and one deployable control
    compiler before deeper analytics or expansion because launch safety and
    auditability are the gating problems today. Keep sales founder-led through
    the first 3-4 pilots, support only one primary OEMS stack per
    design-partner cohort, and add a second stack plus channel partners only
    after pilot-to-production conversion proves the workflow is repeatable.
  notYet:
    - Autonomous signal generation, strategy selection, or order routing.
    - Broad launches into long-only, global macro, or multi-asset workflows before 2-3 U.S. reference funds exist.
    - A rip-and-replace OEMS, EMS, or prime-broker workflow suite.
    - Europe and complex cross-border regulatory expansion before the U.S. playbook and Singapore follow-on are repeatable.
market:
  tam: >-
    Estimated $180.0M TAM from roughly 1,000 global AI-active PM pods or
    execution teams at about $180k annual control-plane spend each.
  sam: >-
    Estimated $43.2M SAM from 60 U.S. and Singapore target funds with roughly 4
    pods each at about $180k ARR per pod within the $500M-$5B beachhead.
  som: >-
    Estimated $7.2M year-3 SOM from 40 live pods at about $180k ARR each after
    a one-pod land-and-expand motion.
  segments:
    - U.S. market-neutral equity hedge funds with internal AI-assisted research and recurring low-capital live pilots.
    - Singapore-based market-neutral or multi-strat managers and adjacent outsourced-trading workflows that can reuse the same promotion-control layer after U.S. proof.
  buyingProcess: >-
    The sponsor is usually the COO, head of systematic platform, or head of
    trading when a pod wants to move from shadow book to live capital and the
    current approval stack becomes a bottleneck. Production rollout requires
    CTO, security, risk, and compliance sign-off because deployment model,
    books-and-records, and outsourcing controls matter as much as product
    features.
product:
  mvp: >-
    MVP is a VPC or limited-write control workbench for one PM pod and one live
    pilot lane. It ingests signal lineage and shadow-book evidence, generates
    an approval packet, compiles caps, throttles, and kill switches into the
    incumbent OEMS and broker workflow, and tracks shadow-versus-live drift; it
    excludes alpha generation, full OMS replacement, and autonomous routing.
  sixMonth: >-
    Ship design-partner deployment for one primary OEMS stack, file or API
    ingestion from the existing research pipeline, approval workflow, live-pilot
    packet generation, and drift dashboards for 2-3 funds in shadow mode.
  twelveMonth: >-
    Convert 2 pilots to production, add a second OEMS or broker-control
    template, build reusable policy packs for common multi-prime setups, and
    release an exception corpus showing why pilots were resized, paused, or
    killed.
  twentyFourMonth: >-
    Support fund-wide rollout across 4-6 production funds, benchmark
    shadow-to-live conversion across pods, and open the same control plane to a
    first Singapore fund or one adjacent buy-side workflow only after U.S.
    deployment and pricing are repeatable.
  keyBets:
    - Target funds already promote enough AI-generated or AI-edited signals into live capital to justify a dedicated control layer.
    - A neutral promotion layer can win faster than waiting for Bloomberg, FlexTrade, TS Imagine, or internal teams to bundle similar controls.
    - VPC or limited-write deployment will clear security reviews faster than full on-prem custom builds.
    - Policy templates and override history will make second-pod expansion materially easier than the first deployment.
gtm:
  wedge: >-
    Sell a paid one-pod pilot to a U.S. market-neutral fund at the moment a PM
    pod wants to move a shadow-book signal into live capital, replacing
    spreadsheet approvals and custom quant-dev OMS setup with a governed
    promotion workflow.
  channels:
    - Founder-led direct sales to COOs, heads of systematic platform, heads of trading, and CTOs at multi-pod U.S. market-neutral funds.
    - Design-partner and consultant referrals from Bloomberg, FlexTrade, TS Imagine, and buy-side workflow implementers once one stack-specific deployment is proven.
    - Prime-broker and outsourced-trading introductions after the product can show reusable control templates and clear ownership boundaries.
  funnelTargets: "target-account intro→qualified workflow review 35-50%; qualified workflow review→paid pilot 20-30%; paid pilot→production 50%+; first production pod→second pod expansion 60%+ within 12 months"
  pricing: >-
    Start with a paid 90-day pilot in the $75k-$125k range for one PM pod and
    one live pilot lane, then convert to roughly $150k-$250k annual per pod
    plus usage-based fees tied to the number of live pilot strategies promoted
    each month. This matches the budget trigger: the buyer pays for faster and
    safer promotion into real capital, not for another research seat or a full
    OEMS replacement.
businessModel:
  revenueStreams:
    - Annual platform subscription per PM pod or execution team in production use.
    - Usage-based fees for live pilot strategies promoted through the platform each month.
    - Implementation and connector fees for new OEMS, broker, or deployment integrations.
    - Premium drift attribution, benchmarking, and policy-template modules for fund-wide rollout.
  unitOfValue: One PM pod or execution team promoting live pilot strategies through the control layer
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from the first pod to additional pods and strategy lanes inside the same fund.
    - Add more broker and OEMS control templates to shorten deployment and raise retention.
    - Upsell drift attribution, benchmark reporting, and exception analytics once live pilots are in production.
    - Reuse the control layer in Singapore and then adjacent buy-side workflows such as long-only or outsourced trading.
strategyMap:
  northStarMetric: Monthly live pilot strategies promoted through the platform that remain inside approved limits for their first 30 days
  inputMetrics:
    - Qualified target funds with at least one AI-to-live promotion event per month.
    - Median days from shadow readiness to first capped live order.
    - Percentage of promotions with a complete lineage, approval, and broker-control packet generated from the platform.
    - Paid pilot-to-production conversion rate.
    - Second-pod expansion rate within existing funds.
  moatsToBuild:
    - Shadow-to-live conversion data linking signal lineage, approved limits, execution route, and realized slippage.
    - An exception and override corpus showing why risk, trading, or compliance teams resized or killed pilots.
    - Reusable policy templates and control compilers for mixed OEMS and multi-prime environments.
    - Security and audit deployment playbooks that make procurement faster with each new logo.
  killCriteria:
    - "Fewer than 2 of the first 12 qualified U.S. target funds sign a paid pilot within 12 months."
    - "The first 3 pilots fail to cut the paper-to-live cycle by at least 50% or to 3 business days or less."
    - "Paid pilot-to-production conversion stays below 40% or realized annual pricing lands below $150k per pod by month 18."
    - "None of the first 3 production funds expands from the first pod to a second pod or strategy lane within 9 months."
  mermaid: |
    flowchart LR
      Wedge[One-pod signal promotion pilot] --> MVP[Lineage plus approval packet plus control compiler]
      MVP --> Proof[Faster launches, audit trail, second-pod expansion]
      Proof --> Expansion[More funds, Singapore, adjacent buy-side workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: >-
      Interesting control-layer wedge with real urgency at the point live
      capital is allocated, but evidence on buyer frequency, deployment model,
      and standalone budget is still too thin for a partner meeting.
    whyBelieve: >-
      The startup owns a narrow but important workflow boundary that adjacent
      research and execution vendors do not publicly own: turning AI-generated
      signals into auditable, broker-safe live pilots.
    whyDoubt: >-
      The first market is concentrated, procurement-heavy, and capable of
      internal builds, so the business could stall before the data moat and
      channel partnerships compound.
    nextDiligence: >-
      Get three paid pilots and show that at least two reduce promotion cycle
      time materially, clear security review, and expand beyond the first pod.
  firstCustomer:
    title: COO or Head of Systematic Platform at a $1B-$3B U.S. market-neutral equity fund
    profile: >-
      A multi-pod equity market-neutral fund with 3-6 PM pods, Bloomberg EMSX
      or FlexTrade, at least two prime brokers, and recurring low-capital live
      pilots sourced from internal AI-assisted research.
    trigger: >-
      A pod wants to move one AI-edited signal from shadow book into live
      capital, but the current approval and broker-control process would still
      take days or weeks of manual work.
    buyer: COO
    initialContract: >-
      Paid 90-day pilot in the $75k-$125k range for one pod and one strategy
      lane, converting to roughly $150k-$250k annual per pod plus usage if the
      fund launches live pilots faster and with cleaner audit artifacts.
  mustBeTrue:
    - At least a third of qualified U.S. target funds already promote AI-generated or AI-edited signals into live capital at least monthly.
    - Buyers will fund a standalone promotion-control layer instead of insisting the feature live only inside an incumbent OEMS or internal build.
    - The first 3 pilots cut paper-to-live cycle time by 50%+ while reducing manual quant-dev and trading setup work.
    - VPC or limited-write deployment clears security review without forcing every deal into a custom on-prem implementation.
    - At least half of early production funds expand from the first pod to a second pod or strategy lane within 12 months.
  diligenceQuestions:
    - How many target funds already run monthly AI-to-live promotions versus only research-side pilots?
    - Which buyer actually owns the first budget and who can veto the purchase on security or platform grounds?
    - Will funds accept a neutral control layer outside Bloomberg, FlexTrade, or TS Imagine workflows?
    - Which deployment model is mandatory for the first 5 customers: VPC, limited-write SaaS, or on-prem?
    - Which prime brokers and OEMS partners expose enough control surfaces to make deployment repeatable?
operatingAssumptions:
  - assumption: Enough target funds already run recurring low-capital live pilots from AI-assisted research to create urgent demand now rather than later.
    basis: research.yaml
    validationTest: Confirm at least 4 of 10 interviewed U.S. or Singapore target funds already promote AI-generated or AI-edited signals into live capital at least monthly.
    decisionImpact: If false, the company should delay direct execution-focused GTM and reposition toward broader signal-governance or research workflow software.
  - assumption: A vendor-neutral promotion layer can win budget before the workflow is bundled by Bloomberg, FlexTrade, TS Imagine, or internal platform teams.
    basis: research.yaml
    validationTest: Win 2 paid pilots against an incumbent-stack or internal-build alternative and document why the buyer chose a separate layer.
    decisionImpact: If false, the company should pivot toward OEM partnerships, embedded distribution, or a narrower compliance module.
  - assumption: VPC or limited-write deployment is sufficient for most early customers and avoids a fully custom on-prem roadmap.
    basis: research.yaml
    validationTest: Pass security review with one signed VPC or limited-write pilot and collect deployment requirements from 4 qualified accounts.
    decisionImpact: If false, hiring, burn, and funding needs rise because the product becomes a heavier implementation business.
  - assumption: Roughly $150k-$250k annual per pod pricing is acceptable once the product shortens promotion cycles and improves auditability.
    basis: operator judgment
    validationTest: Present production pricing to at least 5 qualified buyers and secure 2 written conversion paths or LOIs within that range.
    decisionImpact: If false, the company must simplify scope, lower ACV assumptions, and keep headcount and funding plans more conservative.
  - assumption: Pod-level land-and-expand works because policy templates and broker mappings are reusable across pods inside one fund.
    basis: idea.yaml
    validationTest: See second-pod or second-strategy expansion in at least 2 of the first 4 production funds within 9 months.
    decisionImpact: If false, the modeled SOM and venture-scale path weaken and the business should be run as a narrower workflow company.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview workflow owners and collect live promotion artifacts from target funds.
    hypothesis: The manual bottleneck is concentrated in approval packet assembly and broker-control setup, not in raw signal generation.
    successMetric: Ten qualified interviews and at least 5 real spreadsheets, decks, or promotion packets mapped into one repeatable workflow spec.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Prototype shadow-mode approval packet generation on historical signal promotions.
    hypothesis: One lineage plus control-compiler workflow can reproduce most of the information needed for a live pilot without manual deck building.
    successMetric: Two design partners confirm that at least 80% of their current approval artifact can be generated from product inputs.
    owner: Founding eng
  - horizon: 0–90 days
    experiment: Run deployment and security reviews with target funds.
    hypothesis: VPC or limited-write deployment will satisfy enough buyers to avoid a full on-prem build in the first year.
    successMetric: Four security reviews completed and at least one pilot approved without a mandatory on-prem requirement.
    owner: Founding product / risk systems
  - horizon: 3–6 months
    experiment: Launch a paid one-pod pilot for a live shadow-to-live promotion event.
    hypothesis: The product can cut time from shadow readiness to first capped live order by at least 50%.
    successMetric: Median paper-to-live cycle time falls by 50%+ or to 3 business days or less in the first paid pilot.
    owner: Solutions engineer
  - horizon: 6–12 months
    experiment: Validate pricing and production conversion on the first pilot cohort.
    hypothesis: Buyers will convert if pricing is tied to one pod's live-pilot workflow rather than to seats or full-platform replacement.
    successMetric: At least 2 paid pilots convert to $150k+ annual production contracts.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Test second-pod expansion and partner-led deployment.
    hypothesis: Reusable policy templates and one proven OEMS path materially reduce rollout time for the next pod or fund.
    successMetric: One customer expands to a second pod and one partner-assisted deployment launches in under 6 weeks of integration work.
    owner: Solutions engineer
operations:
  - VPC or limited-write deployment with immutable audit logs, role-based approvals, and retrievable promotion records.
  - Weekly promotion reviews comparing shadow and live performance with explicit pause, resize, and kill decisions captured in the system.
  - Connector and policy-template library for each supported OEMS and broker setup so later deployments reuse earlier work.
  - Design-partner success reviews tied to cycle-time reduction, pilot-to-production conversion, and second-pod expansion criteria.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales into a concentrated buyer set and build OEMS, prime-broker, and design-partner relationships before hiring quota-carrying sales.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the lineage store, policy compiler, audit layer, and deployment controls that define the product moat.
  - role: Founding product / risk systems
    startTiming: Month 0
    rationale: Translate hedge-fund promotion workflow, approval logic, and success metrics into a product that risk and trading teams will trust.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Turn mixed OEMS and multi-prime integrations into repeatable templates and keep pilot deployment timelines short.
  - role: Security / platform engineer
    startTiming: Month 6
    rationale: Security review and books-and-records controls are likely procurement gates, so deployment hardening should arrive before broad GTM.
  - role: Enterprise account executive
    startTiming: Month 12
    rationale: Add dedicated sales capacity only after pricing, buyer ownership, and pilot-to-production conversion are proven.
milestones:
  - horizon: 0–12 months
    items:
      - Complete 10 workflow interviews and collect 5 real promotion artifacts from target funds.
      - Sign 3 paid design-partner pilots with U.S. market-neutral funds already running internal AI-assisted research.
      - Ship one production-ready OEMS path, approval packet generation, and VPC or limited-write deployment controls.
      - Convert at least 2 pilots to production while cutting median paper-to-live cycle time to 3 business days or less.
  - horizon: 12–24 months
    items:
      - Reach 4-6 production funds and 12-15 live pods.
      - Add a second OEMS or broker-control template family and a reusable exception corpus across customers.
      - Show second-pod expansion in at least half of production funds.
      - Land the first Singapore logo or one partner-led adjacent deployment only after U.S. conversion metrics are repeatable.
  - horizon: 24–36 months
    items:
      - Reach roughly 40 live pods, consistent with the modeled $7.2M SOM target.
      - Launch the first adjacent workflow pilot in long-only or outsourced trading without rebuilding the core control layer.
      - Make shadow-to-live benchmarks and override history a differentiated sales asset in competitive deals.
      - Build a series A case around repeatable ACV, expansion, and integration payback rather than around category narrative alone.
risks:
  - risk: Too few target funds move AI-generated or AI-edited signals into live capital often enough to create urgent demand.
    likelihood: Medium
    impact: High
    mitigation: Target only funds already running low-capital live pilots, require evidence of current promotion volume in qualification, and stop broad GTM if the first 10 accounts do not confirm recurring workflow pain.
  - risk: Sophisticated funds treat promotion tooling as core IP and prefer to build internally.
    likelihood: High
    impact: High
    mitigation: Land as a thin control compiler and lineage layer that plugs into existing research code, then prove faster launch and better auditability than internal workflows.
  - risk: Bloomberg, FlexTrade, TS Imagine, or other incumbents bundle basic lineage and release controls before the startup establishes a moat.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on cross-stack neutrality, faster deployment across mixed environments, and proprietary shadow-to-live outcome data that incumbents do not aggregate.
  - risk: Security, deployment, and books-and-records requirements make every deal a custom enterprise project.
    likelihood: Medium
    impact: High
    mitigation: Standardize VPC and limited-write deployment patterns early, document control ownership clearly, and avoid promising full on-prem support until pricing supports it.
  - risk: A high-profile agentic trading loss or regulatory action freezes spending on AI-to-live workflows.
    likelihood: Medium
    impact: High
    mitigation: Position the product as the human-in-the-loop safety, evidence, and shutdown layer and default every deployment to shadow mode, capital caps, and explicit kill criteria.
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$4-6M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Eighteen months of runway should fund the founding product and engineering
    team, security-grade deployment controls, one primary and one secondary
    OEMS or broker integration path, and 3-4 paid pilots aimed at converting at
    least 2 funds to production and proving second-pod expansion.
