slug: memory-pathway-orchestrator
date: '2026-05-19'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date] 模型从计划日期后的下一个月启动，这样 pre-seed 资金会在经营支出开始前到账。'
- id: A2
  name: 期初现金
  value: '2500.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 基准情形采用 $2.5M pre-seed，落在目标区间偏下中部，足够跑到 Y2 末的验证节点，并留出缓冲。'
- id: A3
  name: 起始客户数（M1）
  value: '0'
  unit: count
  source: '[BP product MVP + milestones] 公司从零收入起步，只有在聚焦切口的工作流 MVP 可以部署后，才会拿到首个付费试点。'
- id: A4
  name: Y1 客户爬坡
  value: 到 M9 拿下 3 个付费试点，到 M12 有 1 个转成正式商用；Y1 结束时活跃客户为 3 个。
  unit: count/timing
  source: '[BP milestones 0-12 months + BP investorMemo.initialContract] 以“12 个月内签下 3 个付费试点，并至少把 1 个试点客户转成多诊所年度正式商用合同”为锚。'
- id: A5
  name: Y2 客户爬坡
  value: 季度末客户数：Q1Y2 为 4，Q2Y2 为 5，Q3Y2 为 7，Q4Y2 为 9。
  unit: count
  source: '[BP milestones 12-24 months] 采用“到第 24 个月已有 8-12 个在线诊所集团”的目标，并把新增客户平滑分布到全年。'
- id: A6
  name: Y3 客户爬坡
  value: 季度末客户数：Q1Y3 为 9，Q2Y3 为 10，Q3Y3 为 11，Q4Y3 为 12。
  unit: count
  source: '[Research market.som + BP sequencingRationale] 增长保持先落地再扩张节奏，而不是超高速扩张，因为实施和临床信任仍会限制部署速度。'
- id: A7
  name: 定价阶梯
  value: 付费试点年化 MRR 约等于 $60K；Y2 混合已实现 ARPU 约为 $128K；Y3 退出时 ARPU 约为 $146K。
  unit: annualK per customer
  source: '[BP gtm.pricing + BP investorMemo.initialContract] 保持在计划里 15-30 家诊所客户 $120K-$220K 生产态 ARR 区间内，试点收入按低位确认。'
- id: A8
  name: 收入确认方法
  value: 每月或每季度的活跃客户数，乘以混合已实现月度 ARPU。
  unit: formula
  source: '[BP gtm.pricing] 这样收入就能直接锚定客户数，同时反映试点向正式商用转化带来的客单价变化。'
- id: A9
  name: 毛利率爬坡
  value: Y1 为 55%，Y2 为 64%，Y3 为 70%。
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 早期试点要承担更多人工实施和支持成本；只有到 Y3 部署标准化后，模型才跑到计划里的目标毛利率。'
- id: A10
  name: 稳定态 CAC
  value: '70.0'
  unit: USDK per customer
  source: '[BP gtm.funnelTargets + Research fiveForces.buyerPower] 医疗企业销售和试点转化的 CAC 会高于 SMB SaaS；模型采用仍然偏精简的创始人主导企业销售假设。'
- id: A11
  name: 单位经济模型里的月度客户流失率
  value: '1.5'
  unit: percent
  source: '[Startup-finance heuristic] 多院点医疗工作流软件如果真正嵌进运营和年度合同里，可以支撑较低的客户流失率，但这个切口本身还年轻。'
- id: A12
  name: 含全成本的薪资带宽
  value: 创始人 150；工程 180；临床工作流 150；实施/解决方案 140；销售/GTM 170；G&A/运营 120。
  unit: annualK per FTE
  source: '[BP team + startup-finance heuristic] 采用精简版美国 health-tech 现金薪酬假设，工资税和福利已全部计入。'
- id: A13
  name: 招聘节奏
  value: 临床工作流负责人在 M1 到岗；实施岗位在 M4；GTM 负责人在 M9；第 2 名工程师在 M15；第 2 名 GTM 在 M18；第 2 名实施岗位在 M27；G&A 岗位在 M33。
  unit: timing
  source: '[BP team + BP strategicChoices.sequencingRationale] 先补产品和部署能力，再扩销售；只有在诊所集群打法能重复后才往后加人。'
- id: A14
  name: 人数终点
  value: Q4Y1 为 5 名 FTE，Q4Y2 为 7 名 FTE，Q4Y3 为 9 名 FTE。
  unit: FTE
  source: '[BP team + BP milestones] 团队规模压在 pre-seed 预算能承受的范围里，同时还能支撑试点、实施模板和节制扩张。'
- id: A15
  name: 经营费用方法
  value: 各部门费用包含薪资，以及云资源、差旅、实施支持、法务和合规开销。
  unit: policy
  source: '[BP operations + Research adoptionFrictionMatrix] 这反映的是一家工作流软件公司：仍然要承担客户定制化实施和建立信任的成本。'
- id: A16
  name: 现金流简化
  value: 期末现金等于期初现金加累计 EBITDA。
  unit: formula
  source: '[Startup-finance heuristic] 假设 capex、债务、税和营运资金扭曲都可以忽略，符合轻资产 SaaS 工作流公司的情况。'
- id: A17
  name: 融资规模规则
  value: 融资要足够跑到 Y2 末标准化里程碑，并在进入 Y3 时保留约 6 个月缓冲。
  unit: policy
  source: '[BP fundingAsk runwayMonths 18 + model requirement] 模型把计划里 18 个月的融资框架，延展成“里程碑 + 缓冲”的 pre-seed 融资。'
