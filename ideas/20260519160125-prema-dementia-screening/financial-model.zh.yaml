scenarios:
  downside:
    description: 试点晚 1 个季度签下，试点转正式商用持续低于计划里的 50% 目标，而且由于实施仍偏服务化，毛利率最高只能到 66%。
    y3RevenueK: 1117.0
    y3EbitdaK: -910.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
    - 首个付费试点从 M5 推迟到 M8。
    - Q4Y2 客户数落在 7 个，而不是 9 个。
    - Y3 毛利率只能到 66%，而不是 70%。
  base:
    description: 创始人主导销售在 Y1 拿下 3 个付费试点，其中 1 个在 M12 转成正式商用；依靠 先落地再扩张，到 Q4Y3 客户基数增长到 12 个在线诊所集团。
    y3RevenueK: 1469.2
    y3EbitdaK: -626.5
    cashLowPointK: 290.9
    keyAssumptionChanges:
    - 到 M9 拿下 3 个付费试点，到 M12 有 1 个转成正式商用。
    - 季度末客户数在 Q4Y2 达到 9 个，在 Q4Y3 达到 12 个。
    - 随着实施模板标准化，毛利率从 Y1 的 55% 提升到 Y3 的 70%。
  upside:
    description: H2Y2 开始有 1 个渠道伙伴持续输送合格商机，试点转正式商用好于计划，而且公司在不明显增加人数的前提下，于 Y3 多拿下 2 个诊所集团。
    y3RevenueK: 1763.0
    y3EbitdaK: -430.0
    cashLowPointK: 430.0
    keyAssumptionChanges:
    - 从 H2Y2 开始，1 个伙伴渠道贡献合格试点。
    - Q4Y3 客户数达到 14 个，而不是 12 个。
    - 因为实施拖累更低，Y3 毛利率提升到 72%。
sensitivity:
- variable: ARPU
  downsideCase: 由于买方把价格压在试点水平附近，Y3 混合退出 ARPU 下滑到 $132K。
  baseCase: Y3 混合退出 ARPU 达到每客户 $146K。
  upsideCase: 通过更多多诊所扩张和使用量计费，Y3 混合退出 ARPU 提升到 $160K。
  y3RevenueImpactK: -147.0
  cashImpactK: -103.0
- variable: CAC
  downsideCase: 随着采购和临床验证要求拉长，CAC 升到 $85K。
  baseCase: 在创始人主导销售和窄 ICP 的前提下，CAC 维持在 $70K。
  upsideCase: 一旦转介绍和伙伴来源线索出现，CAC 降到 $55K。
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: 流失率
  downsideCase: 由于试点很难稳定扩张，月度流失率升到 2.5%。
  baseCase: 工作流嵌入诊所运营后，月度流失率维持在 1.5%。
  upsideCase: 随着扩张模块提升粘性，月度流失率降到 1.0%。
  y3RevenueImpactK: -90.0
  cashImpactK: -130.0
- variable: 销售周期
  downsideCase: Y1-Y2 各阶段的试点签约时间都整体晚 1 个季度。
  baseCase: 创始人主导的 4-6 个月销售周期按模型节奏转成付费试点。
  upsideCase: 伙伴介绍把成交时间大约缩短 2 个月。
  y3RevenueImpactK: -220.0
  cashImpactK: -210.0
- variable: 毛利率
  downsideCase: 因为实施工作仍然高度定制，Y3 毛利率最高只能到 66%。
  baseCase: Y3 毛利率达到 business plan 里的 70% 目标。
  upsideCase: 随着支持和部署成本呈次线性扩张，Y3 毛利率提升到 73%。
  y3RevenueImpactK: 0.0
  cashImpactK: -58.8
- variable: 招聘节奏
  downsideCase: 为了覆盖定制化工作，Y2 提前补招 2 名实施/支持人员。
  baseCase: 招聘按 A13 的精简顺序推进，Y3 末达到 9 名 FTE。
  upsideCase: 由于模板降低了人工负担，1 个非关键运营岗位延后 2 个季度再招。
  y3RevenueImpactK: -60.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      AbnormalScreens[Abnormal screens] --> ManagedPathways[Managed pathways]
      ClinicSubscriptions[Clinic subscriptions] --> Revenue
      ManagedPathways --> UsageFees[Usage fees]
      ManagedPathways --> ClinicSubscriptions
      UsageFees --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下的 Y3 收入，来自 12 个在线诊所集团；在试点转成多诊所正式合同后，每家每月大约支付 $11K-$12.2K。
- checkName: 必须做对的事
  finding: 到 M12-M18，试点转正式商用必须守住计划里的 50%+ 目标，否则收入爬坡会落后于固定且偏实施导向的成本底盘。
- checkName: 模型失效条件
  finding: 如果销售周期晚 1 个季度，或毛利率卡在 66% 以下，悲观情形下公司会在拿到 可发起 seed 融资的验证节点 之前先把现金打穿。
- checkName: 下一轮验证
  finding: 只要公司在 Y2 末证明：已有 9 个在线诊所集团、1 套可复用集成模式，以及可供渠道复制的 ROI 故事，就足以支撑 seed 融资。
sanityChecks:
  ruleOf40: Y3 增长率 91.8% + EBITDA 利润率 -42.6% = 49.2%。
  burnMultiple: Y2 烧钱倍数 为 1.3x（-EBITDA $832.7K / 净新增收入 $647.5K）；Y3 烧钱倍数 为 0.9x（-EBITDA $626.5K / 净新增收入 $703.2K）。
  revenuePerFte: 按 Q4Y3 的 9 名 FTE 计算，Y3 每名 FTE 对应收入为 $163.2K（成熟 SaaS 基准大约为 $200-$400K）。
  flags:
  - 模型假设 3 个付费试点都能在 M9 前落地，而且至少有 1 个在 M12 转成正式商用；只要晚 1 个季度，现金压力就会明显放大。
  - 由于医疗实施、照护者工作流设计和客户 验证 仍然带着明显服务属性，每名 FTE 的收入低于典型 SaaS 基准。
  - 毛利率要到 Y3 才达到 business plan 目标；如果 EHR 定制或支持强度比模型更深，下一轮融资大概率会继续后延。
