slug: memory-pathway-orchestrator
date: '2026-05-19'
executiveSummary: >-
  The company should start as a vendor-agnostic workflow layer for U.S.
  senior-focused primary care groups that already run cognitive screening but
  still lose patients between an abnormal result and the next diagnostic or
  care-planning step. The first customer is a 10-50 clinic value-based senior
  care group with centralized referral operations, because abnormal screens,
  caregiver outreach, and specialty bottlenecks all sit under one operator with
  budget accountability. The wedge is deliberately narrow: ingest an abnormal or
  concerning screen, collect missing caregiver and symptom history, assemble the
  chart packet, prioritize urgency, and book the next best step without asking
  the clinic to replace its screening vendor. This is a faster proof point than
  building another digital assessment because the researched market already
  shows screening deployment, Medicare follow-up hooks, and coordination pain,
  while substitutes remain mostly manual. Go-to-market, pricing, and product
  scope should stay coupled around that same workflow, starting with a paid
  pilot priced against reduced leakage and faster time to scheduled workup in a
  small clinic cluster. The strongest long-term asset is a cross-vendor dataset
  showing which screen-positive patients convert into completed diagnostics,
  care plans, specialist visits, and research-ready referrals under specific
  workflow interventions. The company should explicitly avoid standalone
  diagnostic claims and position as workflow enablement, because the research
  shows regulatory and clinician-trust constraints around broad asymptomatic
  screening. Evidence for the wedge is credible but still incomplete on exact
  reimbursement capture, baseline leakage rates, and implementation burden at
  target accounts, so the first 12 months must produce customer-owned funnel and
  cycle-time data before the company broadens into memory clinics, payer
  pathways, or research monetization.
problem:
  - Abnormal cognitive screens still turn into nurse callbacks, referral faxes, spreadsheet waitlists, and incomplete chart packets, so patients disappear before a workup is scheduled.
  - Value-based senior care groups and memory programs feel the pain in both care quality and operations: delayed follow-up weakens CPT 99483 and GUIDE-aligned workflows, burdens caregivers, and leaves specialists and research teams with poorly prepared referrals.
solution:
  - Build a workflow layer that receives abnormal-screen output or manual clinician concern, captures caregiver history and required documentation, applies site-specific routing rules, and drives the patient to a scheduled next step within days.
  - Give operations leaders dashboards on leakage, aging, and conversion from abnormal screen to completed workup, then expand only after proof into research-ready referral packaging and specialty memory-clinic coordination.
whyWeWin:
  - The product sits after any screening tool rather than replacing it, which matches how buyers already operate and creates a cleaner sales motion than competing head-on with assessment vendors.
  - Each deployment compounds proprietary routing, caregiver-intake, and conversion data on what actually moves screen-positive patients to completed follow-up, which generic EHR workflows and services firms do not capture systematically.
strategicChoices:
  beachhead: U.S. value-based senior care groups with 10-50 clinics already performing cognitive screening in Medicare Annual Wellness Visit workflows and managing abnormal results through centralized referral teams.
  wedgeRationale: >-
    This segment already has screening volume, an economic owner, and measurable
    downstream leakage, so the company can prove value on time to scheduled next
    step and conversion to completed workup faster than by selling into broad
    health systems, specialty memory clinics first, or direct-to-consumer
    screening.
  sequencingRationale: >-
    Start with low-integration intake, routing, document assembly, and
    scheduling support because buyers will trust a layer-on-top workflow product
    before they trust automated diagnosis or deep EHR replacement. After 3-5
    paid pilots show lower leakage and faster cycle time, add repeatable
    integrations, partner distribution through screening vendors, and only then
    a research-referral module, because earlier expansion would mix proof points
    and increase implementation load before the core wedge is validated.
  notYet:
    - Standalone diagnostic or asymptomatic-screening claims
    - Broad health-system rollout beyond the defined senior-care ICP
    - Full memory-clinic operating system or payer care-management platform
    - Parkinson's, MCI monitoring, and other adjacent neurodegeneration workflows
market:
  tam: "$252.7M estimated wedge TAM based on Medicare Advantage cognitive-screen touchpoints, abnormal-screen follow-up volume, and about $100 workflow value per managed pathway."
  sam: "$63.2M estimated beachhead SAM for multi-site senior-focused provider groups already operationalizing cognitive workflows."
  som: "$1.1M estimated year-3 SOM based on roughly 18 reachable multi-site customers through an implementation-led land-and-expand motion."
  segments:
    - U.S. value-based senior care groups with centralized referral operations
    - Multi-site memory clinics and neurology groups seeking cleaner early-stage referrals
  buyingProcess: >-
    The clinical-operations leader or medical director is the usual champion
    once abnormal-screen volume, referral delays, or GUIDE and care-planning
    workflow reviews expose leakage. Deals should begin as a paid pilot across a
    small clinic cluster, with physician leadership and IT approving once the
    workflow fits existing screening tools and shows measurable cycle-time and
    documentation improvement.
product:
  mvp: >-
    MVP should ingest abnormal-screen results from one digital tool plus manual
    entry, trigger caregiver and symptom intake, assemble a dementia workup
    packet, prioritize the case by clinic rules, and hand off into scheduling or
    referral queues with audit logs. It should prove that the company can reduce
    median days from abnormal screen to scheduled next step without making
    diagnostic claims or requiring a full EHR implementation.
  sixMonth: Ship 2-3 paid pilots with manual fallback, caregiver-intake workflows, chart-packet generation, referral dashboards, and baseline-to-live measurement of abnormal-screen leakage and cycle time.
  twelveMonth: Add repeatable integrations for the top early screening inputs and one EHR export path, launch configurable routing templates, and prove pilot-to-production conversion inside at least one 15-30 clinic customer.
  twentyFourMonth: Expand into memory-clinic and research-referral modules, add benchmark reporting on pathway conversion by cohort and site, and support multi-partner distribution while staying the vendor-agnostic after-the-screen layer.
  keyBets:
    - Buyers will pay for follow-up orchestration without replacing their current screening vendor.
    - Low-integration deployment can still improve median time to scheduled next step by at least 30%.
    - Caregiver-intake automation and chart-packet assembly remove enough staff work to justify clinic-based SaaS pricing.
    - Cross-vendor pathway data becomes more defensible than any one screening modality.
gtm:
  wedge: Sell abnormal-screen follow-up conversion for one senior-care clinic cluster before attempting a broader dementia-workflow platform story.
  channels:
    - Founder-led direct sales to VP Clinical Operations, CMO, and referral leadership at multi-site senior-care groups
    - Co-selling and referral partnerships with digital cognitive assessment vendors that need downstream workflow completion
    - Select memory-clinic and research-network partnerships after the primary-care wedge produces clean referrals
  funnelTargets: "Lead→qualified pilot 20-30%, qualified pilot→paid pilot 40-50%, paid pilot→production 50%+, first cluster→multi-clinic expansion within 6 months in 50%+ of production wins."
  pricing: >-
    Price as an annual per-clinic subscription plus a usage fee for completed
    abnormal-screen pathways or research-ready referrals, with a one-time
    implementation fee for workflow mapping. This matches how buyers perceive
    value: the fixed component covers recurring operational oversight, while the
    variable component tracks the volume of cases actually pushed through the
    pathway.
businessModel:
  revenueStreams:
    - Annual software subscription by clinic count for abnormal-screen workflow orchestration
    - One-time implementation and pathway-configuration fees
    - Usage-based fees for completed abnormal-screen pathways or research-ready referrals
    - Premium analytics and benchmarking for referral leakage, waitlist aging, and conversion performance
  unitOfValue: Managed abnormal-screen pathway completed to a scheduled next step
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one clinic cluster to all clinics in the same senior-care group
    - Add memory-clinic and neurology-group modules once referral quality is proven
    - Layer on research-referral packaging and trial-readiness workflows
    - Sell pathway benchmarking and routing intelligence derived from cross-site conversion data
strategyMap:
  northStarMetric: Quarterly abnormal-screen cases converted to a scheduled next step within 7 days
  inputMetrics:
    - Median days from abnormal screen to scheduled next step
    - Percent of abnormal screens with complete caregiver and chart packet within 72 hours
    - Abnormal-screen to completed workup conversion rate
    - Paid pilot to production conversion rate
    - Multi-clinic expansion rate inside existing accounts
  moatsToBuild:
    - Cross-vendor routing dataset linking screen outputs, intake completeness, and follow-up conversion outcomes
    - Dementia-specific caregiver-intake and chart-packet workflow templates by clinic type
    - Integration and implementation playbooks for the most common senior-care screening and EHR environments
    - Benchmark database on referral leakage, waitlist aging, and next-step completion by site
  killCriteria:
    - If the first 3 paid pilots fail to reduce median days from abnormal screen to scheduled next step by at least 30%, the core workflow wedge is not strong enough.
    - If fewer than 50% of paid pilots convert to production despite measured operational improvement, buyer pain or budget ownership is weaker than assumed.
    - If the product cannot ingest 2 common upstream screening inputs plus manual entry without custom implementation in the first year, the vendor-agnostic thesis breaks.
  mermaid: |
    flowchart LR
      Wedge[Abnormal-screen workflow wedge] --> MVP[Routing intake and scheduling MVP]
      MVP --> Proof[Cycle-time and leakage proof points]
      Proof --> Expansion[Multi-clinic rollout and research modules]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong wedge clarity but only medium conviction until live pilots prove leakage reduction, budget ownership, and deployment speed.
    whyBelieve: The startup targets a real bottleneck created by growing cognitive-screen adoption and aligns its first product with an operator-controlled workflow that incumbents still handle manually.
    whyDoubt: Assessment vendors, EHR workarounds, and service-heavy dementia programs could absorb enough of the pain that a standalone workflow layer never reaches durable ACV or margin.
    nextDiligence: Confirm with customer-owned pilot data that one 15-30 clinic senior-care group can cut abnormal-screen leakage and schedule next steps materially faster without a heavy integration project.
  firstCustomer:
    title: VP Clinical Operations at a value-based senior care group
    profile: Runs referral operations for 15-30 clinics already performing cognitive screening in annual wellness workflows and is measured on leakage, documentation quality, and specialty access.
    trigger: Launch of a digital cognitive-screening program or a visible spike in abnormal results that exposes neurology delays, caregiver follow-up gaps, and incomplete referral packets.
    buyer: VP Clinical Operations or Chief Medical Officer
    initialContract: "$30K-$70K paid pilot for 3-5 clinics over 90-120 days, converting to about $120K-$220K ARR plus pathway fees for a 15-30 clinic group if next-step scheduling time and leakage improve."
  mustBeTrue:
    - A 3-5 clinic pilot must reduce median days from abnormal screen to scheduled next step by at least 30% within 120 days.
    - At least 50% of paid pilots must convert to production within 6 months of pilot completion.
    - The first implementation pattern must support 2 upstream screening inputs plus manual entry without custom work that drives gross margin below target.
    - Buyers must accept per-clinic plus usage-based pricing at levels consistent with six-figure annual contracts for multi-clinic groups.
    - The company must show that vendor-neutral follow-up orchestration wins even when assessment vendors already offer basic care-plan or reporting features.
  diligenceQuestions:
    - What percentage of abnormal cognitive screens in the target ICP currently fail to convert into a scheduled next step within 30 days?
    - Which screening vendors and EHR stacks dominate the first 20 target accounts, and how reusable is the integration pattern?
    - Does the economic buyer fund this from operations, quality, or innovation budget, and what ROI threshold unlocks production rollout?
    - How much caregiver outreach and chart assembly can be automated before clinical teams feel safety or trust concerns?
    - In live evaluations, why does a buyer choose this layer over BrainCheck, Linus Health, internal referral teams, or existing EHR task workflows?
operatingAssumptions:
  - assumption: Senior-care operators will buy a vendor-agnostic follow-up layer without replacing the screening tool already in use.
    basis: research.yaml
    validationTest: Close at least 3 paid pilots where the screening vendor remains in place and buyers still approve a pilot budget for follow-up orchestration.
    decisionImpact: If false, the company must pivot to channel-led distribution through one screening vendor or narrow to a single upstream platform.
  - assumption: Low-integration deployment with one EHR export path is enough to prove value before deeper integrations.
    basis: research.yaml
    validationTest: Launch 2 pilots in under 8 weeks each using one digital screening feed and one manual workflow, with live scheduling or referral handoff.
    decisionImpact: If false, implementation becomes too services-heavy and the beachhead must narrow to one stack or larger ACV accounts.
  - assumption: Caregiver-intake and packet assembly automation remove enough manual work to justify per-clinic SaaS pricing.
    basis: idea.yaml
    validationTest: Measure coordinator time saved and packet completeness in pilots and show at least 25% reduction in manual preparation effort.
    decisionImpact: If false, pricing must move down or the product must emphasize referral recovery and research monetization instead of operational labor savings.
  - assumption: Abnormal-screen follow-up volume in the beachhead is high enough to support multi-clinic annual contracts rather than one-off projects.
    basis: research.yaml
    validationTest: Collect baseline funnel data from at least 5 target groups showing sustained monthly abnormal-screen case volume and repeat workflow pain.
    decisionImpact: If false, the company should move upmarket, focus on memory clinics, or abandon the current wedge.
  - assumption: Vendor-neutral workflow data will remain differentiated even as assessment vendors add adjacent care-plan features.
    basis: operator judgment
    validationTest: Run 10 competitive interviews and 3 paid pilots to see whether buyers prefer a cross-vendor layer when current and prospective assessment tools coexist.
    decisionImpact: If false, defensibility weakens and the company may need to bundle with one dominant screening partner or reposition around services.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 clinical-operations leaders, referral managers, and medical directors in the defined ICP and collect current-state funnel baselines.
    hypothesis: Buyers feel urgent pain when abnormal-screen volume, caregiver outreach burden, and specialist delays appear in the same workflow review.
    successMetric: 10 interviews confirm the same buying trigger pattern and 5 target accounts share baseline leakage and cycle-time data.
    owner: CEO founder
  - horizon: 0–90 days
    experiment: Run a concierge pilot that manually assembles caregiver intake and chart packets for one design partner before full automation.
    hypothesis: Even a semi-manual workflow can prove faster scheduling and cleaner referral packets, validating the product wedge before deeper buildout.
    successMetric: 25 abnormal-screen cases processed with at least 30% faster time to scheduled next step versus baseline and no material clinical escalations missed.
    owner: Clinical workflow lead
  - horizon: 0–90 days
    experiment: Build one ingestion prototype connecting a digital assessment output, manual entry flow, and document export into the customer's referral queue.
    hypothesis: A narrow MVP can go live without full EHR write-back if it reliably captures the abnormal result, missing history, and next-step packet.
    successMetric: One working pilot workflow launched in a design-partner environment with less than 8 weeks of implementation effort.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Convert 2-3 design partners into paid pilots with weekly ROI reviews on cycle time, leakage, and packet completeness.
    hypothesis: Buyers will pay once baseline pain is quantified and the workflow shows measurable improvement on a small clinic cluster.
    successMetric: 2 paid pilots signed and at least 1 shows 30% cycle-time improvement plus better packet completeness within 120 days.
    owner: CEO founder
  - horizon: 90–180 days
    experiment: Test pricing packaging with per-clinic subscription only versus per-clinic plus usage-based pathway fees.
    hypothesis: Buyers prefer a mixed model that aligns spend with both operational oversight and actual follow-up throughput.
    successMetric: At least 3 of 5 qualified buyers accept the mixed pricing model with a defined pilot-to-annual conversion path.
    owner: CEO founder
  - horizon: 180–360 days
    experiment: Launch one channel partnership with a screening vendor or GUIDE-aligned dementia-navigation program.
    hypothesis: An upstream or service partner can source better-qualified opportunities and shorten trust-building time after initial proof exists.
    successMetric: 25%+ of qualified pipeline comes from partners and at least 1 partner-sourced account converts to a paid pilot.
    owner: GTM lead
operations:
  - Maintain dementia-pathway SOPs for caregiver intake, triage escalation, chart-packet QA, and referral handoff in every pilot.
  - Keep a human-in-the-loop review for urgency routing and incomplete documentation until enough pilot data exists to tighten automation rules.
  - Standardize integrations around one screening feed, one manual-entry fallback, and one export pattern before promising deeper EHR write-back.
  - Run weekly customer scorecards on cycle time, leakage, packet completeness, and scheduled-next-step conversion.
  - Build partnerships with screening vendors, FHIR integration providers, and GUIDE-aligned operators only after the core clinic-cluster workflow is repeatable.
team:
  - role: CEO founder
    startTiming: Month 0
    rationale: Founder-led selling is required early because buyer trust, workflow discovery, and partnership design all depend on credible clinical-operations understanding.
  - role: Founding eng
    startTiming: Month 0
    rationale: Owns ingestion, routing logic, auditability, and the narrow integration layer needed to keep deployments lightweight.
  - role: Clinical workflow lead
    startTiming: Month 1
    rationale: Turns dementia-pathway requirements, caregiver-intake steps, and escalation rules into repeatable product and pilot playbooks.
  - role: Implementation and solutions engineer
    startTiming: Month 4
    rationale: Added once pilots start so the company can template integrations and shorten time from contract to live workflow.
  - role: GTM lead
    startTiming: Month 9
    rationale: Hire only after the first pilots create a measurable ROI story and at least one repeatable channel or outbound motion.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 paid pilots in the defined senior-care beachhead
      - Prove at least 30% improvement in median days from abnormal screen to scheduled next step in the first successful pilot
      - Launch one repeatable ingestion pattern covering a digital screening tool, manual entry, and document export
      - Convert at least 1 pilot account into a multi-clinic annual production contract
  - horizon: 12–24 months
    items:
      - Expand from first cluster wins to 8-12 live clinic groups with standardized implementation playbooks
      - Add memory-clinic and research-referral modules for customers that already proved the core follow-up workflow
      - Establish at least 1 channel partnership with a screening vendor or GUIDE-aligned dementia-navigation program
      - Build benchmark reporting on referral leakage, waitlist aging, and conversion by site
  - horizon: 24–36 months
    items:
      - Reach multi-clinic deployment density sufficient to validate the modeled year-3 SOM trajectory
      - Turn routing and conversion benchmarks into a differentiated expansion product for existing accounts
      - Expand into adjacent neurodegeneration pathways only if the dementia wedge retains target gross margin and partner pull
risks:
  - risk: Screening adoption remains narrower than expected because clinician trust in broad routine screening stays limited.
    likelihood: Medium
    impact: High
    mitigation: Position around abnormal or concerning results already in workflow, not broad asymptomatic screening, and prioritize customers already deploying cognitive assessments.
  - risk: Implementation and integration work make the product too services-heavy for venture-scale margins.
    likelihood: Medium
    impact: High
    mitigation: Keep the MVP low-integration, standardize on a narrow connector set, and delay deeper write-back until pilots prove ROI.
  - risk: Assessment vendors extend far enough downstream that buyers prefer bundled care-plan or workflow modules.
    likelihood: High
    impact: Medium
    mitigation: Emphasize vendor neutrality, faster deployment across mixed-screen environments, and superior operational reporting on follow-up conversion.
  - risk: No single budget owner feels enough economic urgency to fund production rollout after pilots.
    likelihood: Medium
    impact: High
    mitigation: Sell first into value-based senior-care operators where leakage, care-planning documentation, and specialty access already tie to operational and financial reviews.
  - risk: Caregiver outreach and documentation workflows create safety or compliance concerns if over-automated.
    likelihood: Medium
    impact: Medium
    mitigation: Maintain clinician-controlled escalation rules, audit logs, and human review for high-risk cases until workflow performance is well characterized.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of runway to secure design partners, build the low-integration workflow product, validate 3-5 paid pilots, and turn the first proven implementation pattern into a repeatable clinic-cluster sales and deployment motion.
