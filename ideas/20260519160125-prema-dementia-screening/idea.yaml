jobsToBeDone:
  - job: >-
      When an annual wellness visit produces an abnormal memory screen, help senior-care operations teams route the
      patient into the right next step quickly, so they can reduce leakage and avoid long diagnostic delays.
    currentAlternative: Manual referral coordination across nurses, call centers, and specialist fax workflows
    successMetric: Median days from abnormal screen to scheduled follow-up appointment
  - job: >-
      When a memory clinic or research site needs earlier-stage patients, help coordinators identify and pre-qualify the
      right screen-positive patients, so they can fill workups and studies with less manual chart review.
    currentAlternative: Manual chart review and opportunistic provider referrals
    successMetric: Percentage of eligible screen-positive patients who complete workup or research intake
