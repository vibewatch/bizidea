topRisks:
  - name: Clinical validation dependency
    description: If digital cognitive screens do not gain broader clinical trust, downstream workflow demand could stay niche.
    mitigation: Start with customers already deploying screening and position the product as vendor-agnostic infrastructure rather than a new diagnostic claim.
  - name: Slow healthcare integrations
    description: EHR and referral-system integration can stretch sales cycles and delay time to value.
    mitigation: Launch with lightweight intake, scheduling, and document-generation workflows first, then deepen integrations after measurable conversion gains.
  - name: Unclear reimbursement owner
    description: Clinics may agree the workflow pain is real but hesitate if savings or revenue capture are not obvious to one budget holder.
    mitigation: Sell first into value-based senior-care groups and research programs where reduced leakage and increased trial throughput have a visible economic owner.
