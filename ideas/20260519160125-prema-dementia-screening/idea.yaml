differentiator: >-
  Most cognitive-testing startups focus on the screen itself, while generic referral software misses the clinical nuance
  of dementia workups, caregiver intake, and research handoff. This company deliberately sits after any screening tool,
  making it easier to sell into clinics that do not want to swap vendors but do need follow-up discipline. Over time,
  it can build a proprietary dataset on which abnormal screens convert into completed diagnostics, specialist visits,
  and study enrollment, creating workflow and data defensibility.
