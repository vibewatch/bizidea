problem: >-
  Earlier dementia screening only helps if positive screens actually turn into timely follow-up, but most clinics still
  handle that handoff with manual callbacks, referral packets, and waitlists. As digital tests surface risk sooner,
  primary care and senior-care operators create a new queue of patients who need triage into confirmatory workups,
  memory specialists, caregiver intake, and sometimes research enrollment. The result is leakage, long delays, and lost
  chances to intervene while patients are still at an earlier stage.
targetUser:
  primary: >-
    VP Clinical Operations or medical director at a U.S. value-based senior care group running Medicare Annual Wellness
    Visits across 10-50 clinics
  secondary: >-
    Director of clinical research at a multi-site memory clinic or neurology group that needs more trial-ready patients
    with documented cognitive-screen results
  buyer: >-
    VP Clinical Operations, Chief Medical Officer, or head of specialty referrals at a multi-site senior-care provider
startupThesis:
  nonObviousInsight: >-
    Earlier digital screening shifts the bottleneck in dementia care away from test administration and into the messy
    downstream workflow of deciding who needs workup now, who can wait, and how to keep patients from disappearing
    between screening and specialist follow-up.
  beachhead: >-
    U.S. value-based senior care groups with 10-50 clinics that already perform tablet-based cognitive screening during
    Medicare Annual Wellness Visits and struggle to route abnormal results into memory workups
  wedge: >-
    An abnormal-screen follow-up orchestrator that prioritizes patients, collects caregiver history, assembles chart
    packets, and books the next best dementia-pathway step
  whyNowCatalyst: >-
    Prema's clinic deployment and funding for datasets plus regulatory work show that earlier dementia screening is
    becoming operationally real, which creates immediate demand for infrastructure after the screen.
  ventureScalePath: >-
    Once embedded in abnormal-screen follow-up, the company can expand into specialty memory clinics, pharma-sponsored
    recruitment, payer care-path management, and adjacent neurodegeneration workflows such as Parkinson's and mild
    cognitive impairment monitoring.
solution: >-
  The product sits downstream of any digital cognitive test or clinician-entered screen and converts an abnormal result
  into a structured next-step workflow. It captures caregiver and symptom history, pulls required chart context from the
  EHR, ranks urgency based on clinic rules, and routes each patient to the right follow-up path such as repeat testing,
  neurology referral, imaging workup, or research coordinator review. Operations leaders get dashboards for referral
  leakage, waitlist aging, and clinic-by-clinic conversion from abnormal screen to completed workup. Research teams can
  optionally receive consented, pre-qualified patients whose screening and follow-up data are already assembled. The
  first use case is simple: turn abnormal memory screens into scheduled memory-pathway actions within days instead of
  weeks.
goToMarketSeed:
  firstCustomer: >-
    A U.S. senior-focused primary care platform with 15-30 clinics that already runs cognitive screening in annual
    visits and has a central operations team managing specialty referrals
  buyingTrigger: >-
    Launch of a digital cognitive screening program or a spike in abnormal screens that exposes neurology referral
    delays and incomplete follow-up
  currentAlternative: Manual nurse triage in the EHR, referral faxing, call-center outreach, and spreadsheet waitlists
  switchingReason: >-
    The wedge does not ask clinics to change the screening tool; it fixes the operational gap after the result by
    shortening time to next step, reducing leakage, and producing cleaner documentation for specialists and research
    teams.
  pricingHypothesis: >-
    SaaS priced per clinic per month with an added usage fee for completed abnormal-screen pathways or research-ready
    referrals
