jobsToBeDone:
- job: 当年度健康就诊里出现异常记忆筛查时，帮老年照护运营团队尽快把患者导到合适的下一步，这样他们既能减少流失，也能避免诊断长期拖延。
  currentAlternative: 护士、呼叫中心和专科传真流程之间的人工转诊协调。
  successMetric: 从异常筛查到排上随访预约的中位天数。
- job: 当记忆门诊或研究机构需要更早阶段的患者时，帮协调员识别并预筛出合适的筛查阳性患者，这样他们能用更少的人工查病历填满进一步检查和研究入组。
  currentAlternative: 人工查病历和依赖医生临时转介。
  successMetric: 符合条件的筛查阳性患者里，完成进一步评估或研究登记的比例。
