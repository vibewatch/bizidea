differentiator: 多数认知测试创业公司盯的是筛查本身，通用转诊软件又吃不透痴呆评估、照护者信息采集和研究交接里的临床细节。这家公司刻意站在任何筛查工具之后，更容易卖进那些不想换供应商、但确实需要把后续流程管起来的诊所。时间一长，它还能沉淀一套专有数据集：哪些异常筛查结果最终转成了完成诊断、专科就诊和研究入组，从而同时建立流程护城河和数据护城河。
