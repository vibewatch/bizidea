topRisks:
- name: 临床验证依赖
  description: 如果数字认知筛查始终拿不到更广泛的临床信任，下游工作流需求就可能一直停留在小众市场。
  mitigation: 先从已经部署筛查的客户切入，把产品定位成厂商中立的基础设施，而不是新的诊断主张。
- name: 医疗集成推进缓慢
  description: EHR 和转诊系统集成很容易把销售周期拖长，也会延后价值兑现。
  mitigation: 先用轻量的采集、排期和文档生成工作流上线，等转化提升可量化后再加深集成。
- name: 报销归属不清
  description: 诊所也许认同工作流痛点真实存在，但如果节省成本或新增收入不能落到一个明确预算拥有者头上，就会犹豫。
  mitigation: 先卖给价值医疗型老年照护集团和研究项目；在这些场景里，减少流失和提升试验吞吐对应着清晰的经济责任人。
