problem: 更早期的痴呆筛查只有在阳性结果真的能接上后续时才有用，但大多数诊所现在还靠人工回拨电话、转诊资料包和等候名单来交接。数字化测试把风险更早筛出来后，基层医疗和老年照护运营方就会多出一批新患者，要把他们分流到确诊评估、记忆专科、照护者信息采集，有时还要进入研究招募。结果就是流失、长时间延误，以及在患者仍处于较早阶段时错过干预窗口。
targetUser:
  primary: 在美国一家价值医疗型老年照护集团负责临床运营的 VP Clinical Operations 或医疗负责人；该集团在 10-50 家诊所开展 Medicare Annual Wellness Visit。
  secondary: 多院点记忆门诊或神经科集团的临床研究负责人，需要更多带有完整认知筛查结果、可直接入组试验的患者。
  buyer: 多院点老年照护服务商里的 VP Clinical Operations、Chief Medical Officer 或专科转诊负责人。
startupThesis:
  nonObviousInsight: 更早期的数字筛查把痴呆照护的瓶颈，从“怎么做测试”挪到了更乱的下游流程：谁现在就该做进一步检查、谁可以先等、以及怎么避免患者在筛查和专科随访之间失联。
  beachhead: 已经在 Medicare Annual Wellness Visit 中用平板做认知筛查、却很难把异常结果导进记忆评估的美国价值医疗型老年照护集团（10-50 家诊所）。
  wedge: 一套异常筛查随访编排器——给患者排优先级、采集照护者病史、整理病历资料包，并安排痴呆路径里最合适的下一步。
  whyNowCatalyst: Prema 的诊所落地和投向数据集、监管工作的融资，说明更早期痴呆筛查正在真正进入运营场景，这会立刻带来“筛查之后怎么办”的基础设施需求。
  ventureScalePath: 一旦切进异常筛查后的随访环节，公司就能继续扩到专科记忆门诊、药企赞助招募、支付方路径管理，以及 Parkinson's 和轻度认知障碍监测等相邻神经退行性疾病流程。
solution: 产品接在任何数字认知测试或临床医生手工录入的筛查结果之后，把异常结果转成结构化的下一步工作流。它会采集照护者信息和症状史，从 EHR 抽取必要病历背景，按诊所规则判断轻重缓急，再把每位患者导向最合适的后续路径，比如复测、转神经科、影像检查或交给研究协调员审核。运营负责人能看到转诊流失、候诊名单积压和各诊所从异常筛查到完成评估的转化仪表盘。研究团队也可以选择接收已经取得同意、完成初筛、资料齐备的患者。第一个用例很简单：把异常记忆筛查结果在几天内推进成已排期的记忆路径动作，而不是拖上几周。
goToMarketSeed:
  firstCustomer: 一家聚焦美国老年人基层医疗的平台，拥有 15-30 家诊所，已经在年度就诊中开展认知筛查，并由中央运营团队统一管理专科转诊。
  buyingTrigger: 上线数字认知筛查项目，或异常筛查结果突然增多，暴露出神经科转诊延误和随访不完整的问题。
  currentAlternative: 在 EHR 里由护士手工分诊、传真转诊、呼叫中心外呼，以及用表格管理等候名单。
  switchingReason: 这个切口不要求诊所更换筛查工具；它修的是结果出来之后的运营断层——更快推进到下一步、减少流失，并给专科和研究团队产出更整洁的文档。
  pricingHypothesis: 按诊所按月收费的 SaaS，再叠加按完成的异常筛查路径或研究就绪转诊量计费。
