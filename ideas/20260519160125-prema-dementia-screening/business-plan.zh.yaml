slug: memory-pathway-orchestrator
date: '2026-05-19'
executiveSummary: 公司应该先做成一层厂商中立的工作流：服务那些已经在做认知筛查、却仍在异常结果和下一步诊断或照护规划之间大量丢人的美国老年基层医疗集团。第一个客户画像，是一家拥有 10-50 家诊所、转诊运营集中管理的价值医疗型老年照护集团，因为异常筛查、照护者外联和专科瓶颈都压在同一个运营方身上，也有明确预算归口。切口要刻意收窄：接住一次异常或可疑筛查，补齐缺失的照护者信息和症状史，整理病历资料包，排轻重缓急，再把下一步约出来，而且不要求诊所替换原有筛查厂商。比起再做一套数字评估，这条路径更快能跑出 验证节点，因为研究已经证明筛查在落地、Medicare 也给了后续随访钩子，而替代方案至今大多还是人工。GTM、定价和产品边界都要围着同一条工作流绑紧，先在小型诊所集群里做付费试点，用减少流失、缩短排上进一步评估的时间来定价。长期最强的资产，是一套跨厂商数据集：在特定工作流干预下，哪些筛查阳性患者最终转成了完成诊断、照护计划、专科就诊和研究就绪转诊。公司要明确避开“独立诊断”主张，把自己放在工作流赋能层，因为研究显示，广泛无症状筛查在监管和医生信任上都有限制。这个切口的证据已经够可信，但对目标客户的报销兑现、基线流失率和实施负担仍不完整，所以前 12 个月必须先做出客户自有的漏斗和周期时长数据，再考虑扩到记忆门诊、支付方路径或研究变现。
problem:
- 异常认知筛查现在仍然会落回护士回拨、传真转诊、表格等候名单和不完整的病历资料包，结果是患者在排上进一步检查之前就先流失。
- 价值医疗型老年照护集团和记忆项目在照护质量和运营两端都在吃这块痛：随访一拖，CPT 99483 和 GUIDE 对齐的工作流就会变弱，照护者负担会加重，专科和研究团队拿到的转诊也往往资料不齐。
solution:
- 做一层工作流，把异常筛查结果或医生手工标记的可疑情况接进来，采集照护者信息和必要文档，按站点规则分流，并在几天内把患者推进到已排期的下一步。
- 先给运营负责人看转诊流失、积压和从异常筛查到完成进一步评估的转化仪表盘；跑出 验证 之后，再扩到研究就绪转诊打包和专科记忆门诊协同。
whyWeWin:
- 产品接在任何筛查工具之后，而不是替换筛查本身，这更贴合买方现有做法，销售动作也比正面和评估厂商硬碰硬干净。
- 每一次部署都会沉淀专有的分流、照护者采集和转化数据，知道到底什么流程能把筛查阳性患者真正推到完成随访；通用 EHR 工作流和服务公司都很难系统性抓到这层数据。
strategicChoices:
  beachhead: 已经在 Medicare Annual Wellness Visit 工作流里做认知筛查、并通过集中转诊团队处理异常结果的美国价值医疗型老年照护集团（10-50 家诊所）。
  wedgeRationale: 这个细分已经有筛查量、经济责任人和可量化的下游流失，所以公司能比卖给大型医疗系统、先切专科记忆门诊或直接做 面向消费者 筛查，更快证明自己能把“排上下一步”和“完成评估”做出来。
  sequencingRationale: 先从低集成的采集、分流、资料整理和排期支持起步，因为买方会先信一层叠加式工作流产品，再去信自动诊断或深度 EHR 替换。等 3-5 个付费试点证明流失下降、周期缩短之后，再加可复用集成、通过筛查厂商走伙伴分发，并且只在那之后再做研究转诊模块；更早扩张只会把 验证节点 混在一起，还会在核心切口没验证前就把实施负担拉高。
  notYet:
  - 独立诊断或无症状普筛主张
  - 超出既定老年照护 ICP 的大医疗系统铺开
  - 完整的记忆门诊运营系统或支付方照护管理平台
  - Parkinson's、MCI 监测和其他相邻神经退行性疾病工作流
market:
  tam: $252.7M 的切口 TAM，基于 Medicare Advantage 认知筛查触点、异常筛查后的随访量，以及每条受管路径约 $100 的工作流价值估算。
  sam: $63.2M 的滩头 SAM，指已经在把认知工作流运营化的多院点老年照护服务商。
  som: $1.1M 的第 3 年 SOM，基于通过实施驱动的 先落地再扩张 动作，大约触达 18 家可拿下的多院点客户。
  segments:
  - 美国价值医疗型老年照护集团，且转诊运营集中管理
  - 想拿到更干净早期转诊的多院点记忆门诊和神经科集团
  buyingProcess: 一旦异常筛查量、转诊延误，或 GUIDE 与照护规划工作流复盘暴露出流失，临床运营负责人或医疗负责人通常就是 内部推动者。交易应该先从一个小诊所集群的付费试点开始；等工作流能兼容现有筛查工具，并在周期时长和文档质量上拿出可量化提升后，再由医生管理层和 IT 放行。
product:
  mvp: MVP 应该能接入一种数字筛查工具的异常结果和一种手工录入方式，触发照护者信息与症状采集，整理痴呆进一步评估资料包，按诊所规则排优先级，并带审计日志地交给排期或转诊队列。它要证明的是：公司能在不做诊断主张、也不要求完整 EHR 集成的前提下，把从异常筛查到排上下一步的中位天数压下来。
  sixMonth: 在 6 个月内交付 2-3 个带人工兜底的付费试点，包含照护者采集工作流、病历资料包生成、转诊仪表盘，以及异常筛查流失和周期时长从基线到上线后的对比。
  twelveMonth: 在 12 个月内为最核心的早期筛查输入加上可复用集成和 1 条 EHR 导出路径，上线可配置的分流模板，并在至少 1 个 15-30 家诊所客户里证明从试点到正式商用的转化。
  twentyFourMonth: 在 24 个月内扩到记忆门诊和研究转诊模块，补上按人群和站点看路径转化的 对标 报告，并支持多伙伴分发，同时继续守住“筛查之后、厂商中立”的定位。
  keyBets:
  - 即使不替换现有筛查厂商，买方也愿意为后续流程编排付费。
  - 低集成部署依然能把从异常筛查到排上下一步的中位时间至少压缩 30%。
  - 自动化照护者信息采集和病历资料包整理，足以省下足够多的人力，让诊所接受按点位收费的 SaaS 定价。
  - 跨厂商路径数据的防御力，会比任何单一筛查模态都更强。
gtm:
  wedge: 先在一个老年照护诊所集群里卖“异常筛查随访转化”，再讲更大的痴呆工作流平台故事。
  channels:
  - 由创始人直接卖给多院点老年照护集团里的 VP Clinical Operations、CMO 和转诊负责人
  - 与需要补齐下游工作流的数字认知评估厂商联合销售或互相转介
  - 等基层医疗切口能稳定产出高质量转诊后，再挑选记忆门诊和研究网络合作
  funnelTargets: 线索→合格试点 20-30%；合格试点→付费试点 40-50%；付费试点→正式商用 50%+；首个诊所集群→6 个月内扩到多诊所，在正式赢单里占 50%+。
  pricing: 按诊所收年度订阅费，再叠加按完成的异常筛查路径或研究就绪转诊量收费，并收一次性工作流映射实施费。这个定价贴合买方的价值感知：固定部分覆盖持续性的运营管理，浮动部分则跟真正被推进到下一步的病例量挂钩。
businessModel:
  revenueStreams:
  - 按诊所数量收取异常筛查工作流编排年度软件费
  - 一次性的实施费和路径配置费
  - 按完成的异常筛查路径或研究就绪转诊量收使用费
  - 针对转诊流失、候诊名单积压和转化表现的高级分析与对标服务
  unitOfValue: 一条被推进到已排期下一步的受管异常筛查路径。
  targetGrossMarginPct: 70
  expansionLevers:
  - 从一个诊所集群扩到同一老年照护集团下的全部诊所
  - 转诊质量跑通后，再加记忆门诊和神经科模块
  - 叠加研究转诊打包和试验就绪工作流
  - 把跨站点转化数据沉淀出的路径对标和分流洞察卖出来
strategyMap:
  northStarMetric: 每季度在 7 天内被推进到已排期下一步的异常筛查病例数。
  inputMetrics:
  - 从异常筛查到排上下一步的中位天数
  - 72 小时内补齐照护者信息和病历资料包的异常筛查占比
  - 异常筛查到完成进一步评估的转化率
  - 付费试点转正式商用的转化率
  - 现有客户内多诊所扩张率
  moatsToBuild:
  - 跨厂商分流数据集，把筛查输出、信息采集完整度和随访转化结果连起来
  - 按诊所类型整理出的痴呆专用照护者采集和病历资料包工作流模板
  - 面向最常见老年照护筛查和 EHR 环境的集成与实施手册
  - 按站点沉淀转诊流失、候诊积压和下一步完成率的对标数据库
  killCriteria:
  - 如果前 3 个付费试点没法把从异常筛查到排上下一步的中位天数至少压低 30%，核心工作流切口就不够强。
  - 如果在已经量化运营改善的情况下，付费试点转正式商用仍低于 50%，那买方痛点或预算归属就比假设更弱。
  - 如果产品在第 1 年还不能在不做定制开发的前提下接住 2 种常见上游筛查输入和手工录入，那“厂商中立”这套 thesis 就站不住。
  mermaid: |
    flowchart LR
      Wedge[Abnormal-screen workflow wedge] --> MVP[Routing intake and scheduling MVP]
      MVP --> Proof[Cycle-time and leakage proof points]
      Proof --> Expansion[Multi-clinic rollout and research modules]
investorMemo:
  verdict:
    call: 观察
    conviction: 切口很清楚，但在真实试点证明能减少流失、拿到预算归口并缩短部署时间之前，信念度只能算中等。
    whyBelieve: 这家创业公司瞄准的是认知筛查渗透提升后冒出来的真实瓶颈，而且第一款产品正好卡在运营方能控制的环节，而现有厂商大多还在靠人工处理。
    whyDoubt: 评估厂商、EHR 绕行方案和服务型痴呆项目，可能已经吃掉足够多的痛点，让一层独立工作流软件始终做不出耐久 ACV 和毛利。
    nextDiligence: 要先用客户自有试点数据确认：在一个拥有 15-30 家诊所的老年照护集团里，这套产品能否在不做重集成项目的情况下，显著减少异常筛查后的流失并更快把下一步排上。
  firstCustomer:
    title: 价值医疗型老年照护集团的 VP Clinical Operations
    profile: 负责 15-30 家诊所的转诊运营，这些诊所已经在年度健康工作流里做认知筛查，而且会以流失、文档质量和专科可及性来考核。
    trigger: 上线数字认知筛查项目，或异常结果明显增多，暴露出神经科延误、照护者随访缺口和转诊资料包不完整。
    buyer: VP Clinical Operations 或 Chief Medical Officer
    initialContract: 先签 3-5 家诊所、90-120 天、$30K-$70K 的付费试点；如果下一步排期时间和流失率改善，再转成 15-30 家诊所、约 $120K-$220K ARR 加路径计费的正式合同。
  mustBeTrue:
  - 一个 3-5 家诊所的试点必须在 120 天内把从异常筛查到排上下一步的中位天数至少压低 30%。
  - 至少 50% 的付费试点必须在试点结束后 6 个月内转成正式商用。
  - 第一套实施模式必须能在不做定制开发的前提下支持 2 种上游筛查输入加手工录入，否则毛利会掉到目标线以下。
  - 买方必须接受“按诊所 + 按使用量”的定价，而且价格水平要能支撑多诊所客户做到六位数年合同。
  - 即使评估厂商已经提供基础照护计划或报告功能，公司也必须证明厂商中立的后续编排层更能赢。
  diligenceQuestions:
  - 目标 ICP 里，目前有多少异常认知筛查在 30 天内没有转成已排期的下一步？
  - 前 20 个目标客户主要用哪些筛查厂商和 EHR 堆栈，这套集成模式到底有多可复用？
  - 经济买方会从运营、质量还是创新预算里付钱，什么 ROI 门槛能推动正式铺开？
  - 在不触发安全或信任顾虑的前提下，照护者外联和病历资料整理到底能自动化到什么程度？
  - 在真实评估里，买方为什么会选这层产品，而不是 BrainCheck、Linus Health、内部转诊团队或现有 EHR 任务流？
operatingAssumptions:
- assumption: 老年照护运营方愿意在不更换现有筛查工具的前提下，购买一层厂商中立的后续工作流。
  basis: research.yaml
  validationTest: 在筛查厂商不变的情况下，至少签下 3 个付费试点，证明买方仍愿意为后续编排单独批预算。
  decisionImpact: 如果不成立，公司就得转向通过某一个筛查厂商做渠道分发，或收窄到单一上游平台。
- assumption: 只靠低集成部署和 1 条 EHR 导出路径，就足以在深度集成前先证明价值。
  basis: research.yaml
  validationTest: 用 1 路数字筛查输入和 1 套手工流程，在 8 周内各上线 2 个试点，并真正打通排期或转诊交接。
  decisionImpact: 如果不成立，实施会过度服务化，公司要么收窄到单一技术栈，要么转向更高 ACV 的客户。
- assumption: 自动化照护者信息采集和资料包整理，能省下足够多人力，支撑按诊所收费的 SaaS 定价。
  basis: idea.yaml
  validationTest: 在试点中量化协调员节省的时间和资料包完整度，证明人工准备工作至少减少 25%。
  decisionImpact: 如果不成立，定价就得下调，或者把产品重心从节省人力转向挽回转诊和研究变现。
- assumption: 滩头市场里的异常筛查后续量，足以支撑多诊所年合同，而不只是一次性项目。
  basis: research.yaml
  validationTest: 从至少 5 家目标集团采集基线漏斗数据，证明异常筛查病例量持续、而且工作流痛点会反复出现。
  decisionImpact: 如果不成立，公司就该转向更大客户、聚焦记忆门诊，或放弃当前切口。
- assumption: 即使评估厂商补上周边照护计划功能，厂商中立的工作流数据仍会保持差异化。
  basis: 运营判断
  validationTest: 做 10 场竞品访谈和 3 个付费试点，验证当现有与潜在评估工具并存时，买方是否仍偏好跨厂商的一层。
  decisionImpact: 如果不成立，防御力会走弱，公司可能得和一个头部筛查伙伴绑定，或重做成服务定位。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 位目标 ICP 内的临床运营负责人、转诊经理和医疗负责人，并采集现状漏斗基线。
  hypothesis: 只要异常筛查量、照护者外联负担和专科延误同时出现在同一轮工作流复盘里，买方痛感就会很强。
  successMetric: 10 场访谈确认同一类购买触发模式，且 5 家目标客户愿意分享基线流失和周期时长数据。
  owner: 创始人 CEO
- horizon: 0–90 天
  experiment: 在完整自动化之前，先为 1 家共创客户跑一轮 人工代跑 试点，手工整理照护者信息和病历资料包。
  hypothesis: 即使是半人工流程，也能先证明排期更快、转诊资料更干净，从而验证产品切口。
  successMetric: 处理 25 个异常筛查病例；和基线相比，排上下一步的时间至少快 30%，且没有漏掉实质性的临床升级案例。
  owner: 临床工作流负责人
- horizon: 0–90 天
  experiment: 做出 1 个接入原型，把数字评估输出、手工录入流程和文档导出接进客户的转诊队列。
  hypothesis: 只要能稳定接住异常结果、缺失病史和下一步资料包，一个窄 MVP 不用完整 EHR 回写也能上线。
  successMetric: 在 1 个共创客户环境里上线可运行试点工作流，实施投入少于 8 周。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 把 2-3 家共创客户转成付费试点，并按周复盘周期时长、流失和资料包完整度 ROI。
  hypothesis: 当基线痛点被量化、而且小诊所集群上的工作流改善可见时，买方就会愿意付费。
  successMetric: 签下 2 个付费试点，且至少 1 个在 120 天内实现 30% 的周期改进和更高资料包完整度。
  owner: 创始人 CEO
- horizon: 90–180 天
  experiment: 测试两种定价打包：只按诊所订阅，或按诊所订阅 + 按路径量收费。
  hypothesis: 买方会更偏好混合模式，因为它同时对应持续运营管理和真实后续吞吐。
  successMetric: 至少 5 个合格买方里有 3 个接受混合定价，并认可从试点转年合约的路径。
  owner: 创始人 CEO
- horizon: 180–360 天
  experiment: 与 1 家筛查厂商或 GUIDE 对齐的痴呆导航项目启动渠道合作。
  hypothesis: 在初步 验证 已经成立后，上游或服务伙伴能带来更合格的商机，也能缩短建立信任的时间。
  successMetric: 25%+ 的合格 商机管道 来自合作伙伴，且至少 1 个伙伴来源客户转成付费试点。
  owner: GTM 负责人
operations:
- 在每个试点里都维护痴呆路径 SOP，覆盖照护者信息采集、分诊升级、病历资料包质检和转诊交接。
- 在积累出足够试点数据前，对轻重缓急分流和资料不完整病例保留人工复核。
- 先围绕 1 路筛查输入、1 套手工兜底和 1 种导出模式做标准化，再去承诺更深的 EHR 回写。
- 按周给客户跑分卡，盯周期时长、流失、资料包完整度和“排上下一步”的转化。
- 只有当核心诊所集群工作流已经能重复跑通之后，再去建立与筛查厂商、FHIR 集成服务商和 GUIDE 对齐运营方的伙伴关系。
team:
- role: 创始人 CEO
  startTiming: 第 0 个月
  rationale: 早期必须由创始人亲自打单，因为买方信任、工作流摸底和伙伴设计都依赖可信的临床运营理解。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责接入、分流逻辑、可审计性，以及维持轻量部署所需的窄集成层。
- role: 临床工作流负责人
  startTiming: 第 1 个月
  rationale: 把痴呆路径要求、照护者采集步骤和升级规则打磨成可重复的产品与试点 操作手册。
- role: 实施与解决方案工程师
  startTiming: 第 4 个月
  rationale: 等试点启动后再加入，把集成做成模板，缩短从签约到上线的时间。
- role: GTM 负责人
  startTiming: 第 9 个月
  rationale: 只有当首批试点已经跑出可量化 ROI、并出现至少 1 条可复用渠道或外呼打法后再招。
milestones:
- horizon: 0–12 个月
  items:
  - 在既定老年照护滩头市场签下 3 个付费试点
  - 在首个成功试点里，把从异常筛查到排上下一步的中位天数至少改善 30%
  - 上线 1 套可复用接入模式，覆盖数字筛查工具、手工录入和文档导出
  - 至少把 1 个试点客户转成多诊所年度正式商用合同
- horizon: 12–24 个月
  items:
  - 从首批诊所集群赢单扩到 8-12 个已上线诊所集团，并形成标准化实施 操作手册
  - 为已经验证核心随访工作流的客户加上记忆门诊和研究转诊模块
  - 至少建立 1 个与筛查厂商或 GUIDE 对齐痴呆导航项目的渠道合作
  - 建立按站点看转诊流失、候诊积压和转化的 对标 报告
- horizon: 24–36 个月
  items:
  - 把多诊所部署密度做到足以验证模型里的第 3 年 SOM 轨迹
  - 把分流与转化 对标 打造成现有客户的差异化扩张产品
  - 只有在痴呆切口继续守住目标毛利且有伙伴拉动时，才扩到相邻神经退行性疾病路径
risks:
- risk: 由于医生对常规普筛的信任仍有限，筛查渗透可能比预期更窄。
  likelihood: Medium
  impact: High
  mitigation: 围绕工作流里已经出现的异常或可疑结果来定位，而不是讲无症状普筛，并优先卖给已经部署认知评估的客户。
- risk: 实施和集成工作可能让产品过于服务化，做不出风投需要的毛利。
  likelihood: Medium
  impact: High
  mitigation: 把 MVP 做成低集成产品，围绕一组窄连接器做标准化，在试点证明 ROI 之前延后更深层回写。
- risk: 评估厂商可能向下游延伸得足够深，让买方更愿意买打包的照护计划或工作流模块。
  likelihood: High
  impact: Medium
  mitigation: 突出厂商中立、在混合筛查环境里更快上线，以及更强的随访转化运营报表。
- risk: 试点之后，可能没有单一预算拥有者觉得经济紧迫到足以支持正式铺开。
  likelihood: Medium
  impact: High
  mitigation: 先卖给价值医疗型老年照护运营方；这些场景里，流失、照护规划文档和专科可及性本来就会进入运营和财务复盘。
- risk: 如果照护者外联和文档流程自动化过度，可能引发安全或合规顾虑。
  likelihood: Medium
  impact: Medium
  mitigation: 在高风险病例上保留由临床团队控制的升级规则、审计日志和人工复核，直到工作流表现被充分刻画。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月跑道拿下共创客户，做出低集成工作流产品，验证 3-5 个付费试点，并把第一套被验证的实施模式打磨成可重复的诊所集群销售与部署动作。
