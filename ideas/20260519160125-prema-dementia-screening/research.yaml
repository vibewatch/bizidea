competitors:
- name: Linus Health
  stage: scale-up
  wedge: AI-enabled digital cognitive assessments with triage, provider reports, and health-system / life-science workflows.
  pricing: Custom enterprise pricing / no public list price found
  strength: Strong clinical-assessment story plus expansion into triage, health systems, payers, and trials.
  weaknessVsUs: Still anchored to selling its own assessment stack, which makes vendor-neutral post-screen orchestration less natural.
  sourceRefs:
  - 25
  - 30
  - 31
- name: BrainCheck
  stage: scale-up
  wedge: FDA Class II digital cognitive assessment plus care planning and longitudinal workflow tooling.
  pricing: Custom enterprise pricing / no public list price found
  strength: Clear workflow-first language, care-plan tooling, EHR integration emphasis, and growing installed base.
  weaknessVsUs: Platform is still centered on BrainCheck's own assessment and care modules rather than an agnostic after-the-screen layer.
  sourceRefs:
  - 33
  - 34
  - 35
  - 36
  - 37
- name: Altoida
  stage: scale-up
  wedge: 10-minute self-administered neuro-marker platform for early MCI and Alzheimer's detection.
  pricing: Contact sales / not publicly listed
  strength: Bold early-detection positioning and differentiated sensor-based assessment narrative.
  weaknessVsUs: Investigational, diagnostic-first positioning leaves a larger gap in operational referral and caregiver workflow execution.
  sourceRefs:
  - 13
- name: Cogstate
  stage: incumbent
  wedge: Longstanding digital cognition measurement, remote tracking, and healthcare/research partnerships.
  pricing: Custom enterprise / partnership pricing
  strength: Deep scientific credibility, 25-year operating history, and broad pharma/academic relationships.
  weaknessVsUs: Heritage is measurement and trials rather than front-line primary-care conversion of abnormal screens into coordinated next steps.
  sourceRefs:
  - 15
  - 39
regulatoryTechnicalConstraints:
- point: The product should avoid blanket asymptomatic-screening claims and instead support clinician-led follow-up after a concern or abnormal result, given USPSTF's evidence stance.
  sourceRefs:
  - 6
- point: CPT 99483 workflows require detailed history, functional review, caregiver involvement, and documented care-plan elements, so software must support documentation quality rather than bypass it.
  sourceRefs:
  - 2
- point: GUIDE-aligned deployments need caregiver support, care navigation, and coordination with community resources, which raises implementation scope but also validates the workflow.
  sourceRefs:
  - 5
- point: Interoperability expectations now favor USCDI, standardized APIs, and SMART/FHIR-style app access for production deployments.
  sourceRefs:
  - 22
  - 23
  - 24
validationSignals:
- point: Prema says its PREMAZ tool is already deployed in more than 30 clinics across the UK and the US, indicating the upstream screening category is operationally real.
  sourceRefs:
  - 12
- point: A 7-clinic primary care implementation generated 447 referrals for further assessment from 1,808 completed digital cognitive screens.
  sourceRefs:
  - 9
- point: The TabCAT-BHA implementation increased PCP cognitive diagnoses and was adopted by 95% of participating providers.
  sourceRefs:
  - 20
- point: BrainCheck says it now serves more than 500 healthcare organizations and added more than 150 new practices in 2025.
  sourceRefs:
  - 35
  - 36
- point: CMS has already created a dementia-care payment model that depends on navigation and caregiver support, validating the need for operational infrastructure.
  sourceRefs:
  - 5
openQuestions:
- What share of abnormal cognitive screens in target senior-care groups currently fail to convert into a scheduled next step within 30 days?
- Will buyers trust a vendor-agnostic workflow layer enough to route multiple screening-tool outputs through one system?
- How much implementation value must be packaged as service versus software in the first 12 months?
- Can research-site demand for trial-ready referrals become a meaningful second buyer before health-system sales cycles mature?
