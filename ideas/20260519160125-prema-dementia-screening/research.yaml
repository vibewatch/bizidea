  adoptionFrictionMatrix:
  - friction: Clinician trust in broad routine screening and false-positive management
    severity: high
    affectedBuyer: Primary care medical director
    mitigation: Position the product after a concerning or abnormal result and give clinicians structured next-step guidance rather than making standalone diagnostic claims.
    sourceRefs:
    - 6
    - 18
  - friction: Need for navigator-like staffing to chase caregivers and organize follow-up
    severity: high
    affectedBuyer: Clinical operations leader
    mitigation: Automate caregiver intake, chart packet assembly, and priority-based task routing so existing staff can cover more cases.
