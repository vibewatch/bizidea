    - 28
    - 30
  geographicConsiderations:
  - point: The U.S. is the clearest launch market because Medicare annual wellness, cognitive care planning, and GUIDE all create payment and workflow hooks.
    sourceRefs:
    - 2
    - 3
    - 4
    - 5
  - point: Deployment strategy should account for multilingual use and disparity reduction because underserved populations are often underdiagnosed and digital tools are increasingly designed for broader language coverage.
    sourceRefs:
    - 20
  sensitivityCases:
  - case: Screening remains complaint-driven rather than scaled
    impact: If clinics move slowly because of evidence caution or clinician skepticism, the startup must anchor on referral recovery after already-identified concerns instead of volume from broad routine screening.
    sourceRefs:
    - 6
    - 18
  - case: Integration and staffing burden stays high
    impact: Long implementation cycles or missing navigator capacity can delay activation even when the pain is real, so a low-integration MVP matters.
    sourceRefs:
    - 17
    - 23
    - 24
  - case: Assessment vendors bundle follow-up aggressively
    impact: If screening vendors turn care-plan modules into default bundles, standalone workflow software needs sharper vendor-neutral and operational ROI differentiation.
    sourceRefs:
    - 34
    - 35
    - 36
  validationPlan:
  - priority: high
    question: Do abnormal cognitive screens currently leak before workup scheduling in target senior-care groups?
    evidenceToGather: Baseline conversion funnel from abnormal screen to scheduled next step, including median days and drop-off reasons.
  - priority: high
    question: Can the product ingest screening output from at least two upstream tools plus manual entry without long IT projects?
    evidenceToGather: Pilot integrations and workflow shadowing with one DCA vendor feed and one manual/EHR workflow.
  - priority: medium
    question: How much caregiver outreach is required to complete a typical dementia workup packet?
    evidenceToGather: Time-and-motion study of caregiver history collection, scheduling, and record assembly.
  - priority: medium
    question: Will memory clinics or research teams pay for prequalified, consented referrals from primary care?
    evidenceToGather: Interviews and pilot conversion metrics with memory clinics, neurology groups, and trial coordinators.
