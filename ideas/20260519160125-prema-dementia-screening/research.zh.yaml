  fiveForces:
    supplierPower:
      score: 3
      rationale: EHR 厂商和上游评估提供方确实有杠杆，但 SMART on FHIR、USCDI 和 API 规则削弱了纯锁定效应。
      sourceRefs:
      - 22
      - 23
      - 24
    buyerPower:
      score: 4
      rationale: 买方集中在医疗服务商组织，销售周期长；只要工作流 ROI 和报销兑现讲不清楚，他们完全可以延后支出。
      sourceRefs:
      - 5
      - 17
      - 21
    threatOfEntrants:
      score: 3
      rationale: 做转诊工作流软件在技术上不难，但要把临床设计、集成和运营改善证据一起跑出来，门槛仍然不低。
      sourceRefs:
      - 9
      - 20
      - 24
    threatOfSubstitutes:
      score: 5
      rationale: 护士手工分诊、EHR 任务流、传真转诊、呼叫中心，以及评估厂商打包出来的模块，全都能替代。
      sourceRefs:
      - 8
      - 34
      - 37
    competitiveRivalry:
      score: 4
      rationale: 这个领域已经有多家融资充足或资历深厚的评估厂商，正往协同、监测和照护规划延伸。
      sourceRefs:
      - 31
      - 33
      - 35
      - 36
      - 39
  pestle:
  - factor: 政治
    impact: positive
    point: CMS 正在通过 GUIDE 明确为痴呆照护协同、照护者支持和导航买单。
    sourceRefs:
    - 5
  - factor: 经济
    impact: positive
    point: 痴呆已经带来极高支出；美国整体照护支付估计为 $360 billion，而且受影响人群的人均 Medicare 支出也明显更高。
    sourceRefs:
    - 21
  - factor: 社会
    impact: positive
    point: 照护者负担极重，因此能减少延误、给家庭更清晰下一步的工具，价值会更高。
    sourceRefs:
    - 21
  - factor: 技术
    impact: positive
    point: 数字认知工具越来越容易由非专科人员执行，也更容易嵌入日常工作流。
    sourceRefs:
    - 9
    - 20
    - 25
  - factor: 法律
    impact: negative
    point: USPSTF 仍认为广泛无症状筛查的证据不足，因此产品主张和工作流设计都应围绕已出现的可疑问题和医生主导随访。
    sourceRefs:
    - 6
  - factor: 法律
    impact: neutral
    point: 互操作规则和标准化 API 是利好，但也同步抬高了对安全、合规访问电子健康信息的要求。
    sourceRefs:
    - 23
    - 24
  adoptionFrictionMatrix:
  - friction: 医生对广泛常规筛查和假阳性管理的信任不足
    severity: 高
    affectedBuyer: 基层医疗医疗负责人
    mitigation: 把产品定位在异常或可疑结果之后，给医生提供结构化下一步建议，而不是做独立诊断主张。
    sourceRefs:
    - 6
    - 18
  - friction: 要像导航员一样追照护者、整理后续资料，需要额外人手
    severity: 高
    affectedBuyer: 临床运营负责人
    mitigation: 自动化照护者信息采集、病历资料包整理和基于优先级的任务分发，让现有团队覆盖更多病例。
    sourceRefs:
    - 9
    - 20
    - 21
  - friction: EHR 和转诊系统的集成工作量
    severity: 中
    affectedBuyer: CIO 或实施负责人
    mitigation: 先用基于 FHIR/API 的接入和文档导出，加上人工兜底，把早期试点跑起来。
    sourceRefs:
    - 22
    - 23
    - 24
  - friction: 预算拥有者需要非常具体的财务 验证
    severity: 中
    affectedBuyer: CFO 或运营 VP
    mitigation: 把价值主张明确绑定到可报销的照护规划、GUIDE 对齐导航，以及从异常筛查到完成下一步的流失下降。
    sourceRefs:
    - 2
    - 4
    - 5
