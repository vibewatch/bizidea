  strength: 工作流导向的话术清晰，强调照护计划、EHR 集成，而且装机面在扩大。
  weaknessVsUs: 平台核心仍然是 BrainCheck 自家的评估和照护模块，而不是一层中立的“筛查之后”工作流。
  sourceRefs:
  - 33
  - 34
  - 35
  - 36
  - 37
- name: Altoida
  stage: 扩张期
  wedge: 10 分钟自助式神经标志物平台，用于更早识别 MCI 和阿尔茨海默病。
  pricing: 联系销售 / 未公开列价
  strength: 更早识别的定位鲜明，而且有差异化的传感器评估叙事。
  weaknessVsUs: 它偏研究中、偏诊断的定位，反而在运营型转诊和照护者工作流执行上留下更大空白。
  sourceRefs:
  - 13
- name: Cogstate
  stage: 现有厂商
  wedge: 长期深耕数字认知测量、远程追踪，以及医疗和研究合作。
  pricing: 企业 / 合作伙伴定制定价
  strength: 科学可信度强，运营历史 25 年，并且和药企、学术机构关系深。
  weaknessVsUs: 它的基因仍是测量和试验，而不是把基层医疗里的异常筛查推进成协同化下一步。
  sourceRefs:
  - 15
  - 39
regulatoryTechnicalConstraints:
- point: 考虑到 USPSTF 的证据立场，产品应避免“广泛无症状筛查”主张，而是支持医生在出现可疑或异常结果后的随访。
  sourceRefs:
  - 6
- point: CPT 99483 工作流要求详细病史、功能回顾、照护者参与和完整照护计划记录，所以软件必须提升文档质量，而不是绕开这些要求。
  sourceRefs:
  - 2
- point: GUIDE 对齐的部署需要照护者支持、照护导航和社区资源协同，这会抬高实施范围，但也反过来验证了这条工作流的必要性。
  sourceRefs:
  - 5
- point: 现在的生产级部署越来越偏向 USCDI、标准化 API 和 SMART/FHIR 式应用接入。
  sourceRefs:
  - 22
  - 23
  - 24
validationSignals:
- point: Prema 表示，其 PREMAZ 工具已经在英国和美国 30 多家诊所落地，说明上游筛查这个品类已经进入真实运营。
  sourceRefs:
  - 12
- point: 一项覆盖 7 家诊所的基层医疗实施里，1,808 次数字认知筛查带来了 447 次进一步评估转诊。
  sourceRefs:
  - 9
- point: TabCAT-BHA 的实施提升了 PCP 的认知诊断数，而且 95% 的参与医生采纳了这套流程。
  sourceRefs:
  - 20
- point: BrainCheck 表示其服务对象已超过 500 家医疗机构，并在 2025 年新增 150 多家机构。
  sourceRefs:
  - 35
  - 36
- point: CMS 已经推出依赖导航和照护者支持的痴呆支付模式，这本身就验证了运营基础设施的需求。
  sourceRefs:
  - 5
openQuestions:
- 目标老年照护集团里，有多少异常认知筛查在 30 天内没能转成已排期的下一步？
- 买方会不会足够信任一层厂商中立工作流，把多种筛查工具的输出都交给同一个系统？
- 前 12 个月里，多少实施价值必须打包成人工服务，而不是软件本身？
- 在医疗系统销售周期成熟之前，研究机构对试验就绪转诊的需求，能否先长成第二类重要买方？
