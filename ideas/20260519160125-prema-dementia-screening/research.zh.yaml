reportMemo:
  executiveTakeaways:
  - 运营瓶颈正在从“做一次记忆筛查”转向“把可疑结果真正推进到下一步”。
  - Medicare 已经给认知随访提供了工作流和报销钩子，但诊所仍需要轻量执行软件，才能把闭环尽快补上。
  - 竞争最激烈的地方仍在评估厂商；更干净的切口，是一层厂商中立的异常筛查编排层，而不是再做一套测试。
  marketDefinition: 把老年人的异常或可疑认知筛查结果，推进成已排期的诊断、照护管理或研究下一步的工作流软件。
  customerAndBuyer: 第一批用户，是美国聚焦老年人的基层医疗集团和多院点记忆项目里的运营负责人、医疗负责人和转诊经理；购买中心会覆盖临床运营、医生管理层和 IT，因为产品能否成立，取决于转诊转化、文档质量和集成适配。
  buyingTriggers:
  - point: 一旦基层医疗开始铺数字认知评估，很快就会出现一批阳性或边缘病例，要做分诊、补文档和人工跟进。
    sourceRefs:
    - 9
    - 20
  - point: Medicare 已经把认知评估嵌进年度健康就诊，也覆盖独立的照护规划门诊，所以随访运营不是“可有可无的附加项”，而是可报销的工作流。
    sourceRefs:
    - 2
    - 3
    - 4
  - point: 像 GUIDE 这样的痴呆导航和照护者支持模式，会进一步放大协调下一步、支持家庭并减少流失的压力。
    sourceRefs:
    - 5
    - 21
  willingnessToPay:
    summary: 预算归口是存在的，因为认知随访已经踩在可报销的评估和照护规划环节上，CMS 也在为痴呆导航买单；但买方仍会要求软件先证明：转诊丢得更少、员工耗时更低、文档更干净，然后才愿意支付有意义的订阅费。
    sourceRefs:
    - 2
    - 4
    - 5
  competitiveLandscape: 市场上的商业化力量仍主要集中在识别、评估或照护计划生成，而不是把异常筛查跨厂商地推进成真正完成的下一步。当前最常见的替代方案，仍是 EHR 手工任务、传真转诊和呼叫中心外呼；与此同时，评估厂商也在逐步往相邻工作流功能延伸。
  incumbentThesis:
  - incumbentClass: EHR 平台
    point: 标准化 API 和数据共享规则确实让集成更可行，但通用病历系统默认并不会替你解决痴呆场景里的优先级判断、照护者信息采集或记忆路径编排。
    sourceRefs:
    - 22
    - 23
    - 24
  - incumbentClass: 筛查厂商
    point: 评估公司越来越多地加上报告和照护计划功能，但大多数仍围绕自家测试模态打转，而不是做成一层中立编排层，去接住诊所已经在用的各种筛查。
    sourceRefs:
    - 25
    - 31
    - 33
  - incumbentClass: 专科记忆门诊
    point: 专科机构掌握下游进一步评估的专业能力，但转诊延误和人力紧张说明，它们并不会自动解决基层医疗前端的流失。
    sourceRefs:
    - 8
    - 21
  - incumbentClass: 协同照护组织
    point: 偏服务化的痴呆照护模式，本身就证明了“协调”这件事有价值；问题在于，这套能力高度依赖人手和标准化流程，而软件可以把它产品化、规模化。
    sourceRefs:
    - 5
    - 34
  regulatoryLandscape: 最稳妥的定位是工作流赋能，而不是独立诊断：产品应该帮助医生在出现可疑信号后做好记录、分诊、转诊和照护者支持，而不是声称自己能独立诊断痴呆。
  technologyLandscape: 在技术层面，接入数字评估输出、照护者数据和照护计划材料已经足够成熟；真正耐久的价值，不会来自新模型架构，而会来自工作流贴合度、多语言可用性，以及把结果稳定交回 EHR 的能力。
  distributionChannels:
  - point: 直接卖进已经在尝试标准化认知工作流的老年基层医疗集团、老年医学项目和医疗系统。
    sourceRefs:
    - 9
    - 31
    - 36
  - point: 和能识别风险、却还缺下游闭环的数字认知评估厂商建立渠道合作。
    sourceRefs:
    - 26
    - 33
    - 37
  - point: 和研究机构及生命科学伙伴合作；当转诊经过预筛和整理后，更容易形成试验就绪人群。
    sourceRefs:
    - 12
    - 28
    - 30
  partnershipEcosystem:
  - point: 评估厂商是天然的上游伙伴，因为它们制造了信号，但不一定掌握跨站点的编排层。
    sourceRefs:
    - 25
    - 31
    - 33
  - point: FHIR 和 API 集成伙伴很关键，因为部署速度取决于能否轻量接数和交文档，而不只是单点 UX。
    sourceRefs:
    - 22
    - 23
    - 24
  - point: GUIDE 参与方和痴呆导航项目可以成为早期灯塔客户或服务伙伴，前提是买方本来就重视照护者支持和后续协同。
    sourceRefs:
    - 5
    - 21
  dataMoats:
  - point: 如果能积累一套跨厂商数据，知道哪些异常筛查最终转成了完成诊断、专科就诊或研究登记，公司就能在分流和预测上滚出优势。
    sourceRefs:
    - 9
    - 31
    - 33
  - point: 结构化的照护者病史和长期照护计划执行数据，比一次性的测试分数更有运营价值。
    sourceRefs:
    - 4
    - 21
    - 34
  - point: 只要和研究伙伴打通，创业公司就能逐步积累：到底哪类路径能最快产出试验就绪转诊。
    sourceRefs:
    - 12
    - 28
    - 30
  geographicConsiderations:
  - point: 美国是最清晰的起步市场，因为 Medicare 年度健康就诊、认知照护规划和 GUIDE 都给了支付与工作流钩子。
    sourceRefs:
    - 2
    - 3
    - 4
    - 5
  - point: 部署策略还要考虑多语言使用和缩小差异，因为服务不足人群常常被低诊断，数字工具也越来越强调更广的语言覆盖。
    sourceRefs:
    - 20
  sensitivityCases:
  - case: 筛查仍然以“有症状才做”为主，而没有大规模铺开
    impact: 如果诊所因为证据谨慎或医生怀疑而推进缓慢，创业公司就必须围绕已经出现的可疑结果做转诊挽回，而不是押注广泛常规筛查带来的量。
    sourceRefs:
    - 6
    - 18
  - case: 集成和人手负担始终偏高
    impact: 即使痛点真实，只要实施周期太长或导航人手不足，上线也会被拖慢，所以低集成 MVP 很关键。
    sourceRefs:
    - 17
    - 23
    - 24
  - case: 评估厂商强势打包后续模块
    impact: 如果筛查厂商把照护计划模块做成默认打包项，独立工作流软件就必须把“厂商中立”和“运营 ROI”讲得更尖。
    sourceRefs:
    - 34
    - 35
    - 36
  validationPlan:
  - priority: high
    question: 目标老年照护集团里，异常认知筛查在排上进一步评估前，是否真的大量流失？
    evidenceToGather: 采集从异常筛查到排上下一步的基线转化漏斗，包括中位天数和各环节流失原因。
  - priority: high
    question: 产品能否在不做长 IT 项目的前提下，接住至少 2 种上游筛查工具的输出，再加上手工录入？
    evidenceToGather: 在 1 家 DCA 厂商输入和 1 套手工/EHR 工作流上，做试点集成和流程跟岗。
  - priority: medium
    question: 完成一份典型痴呆进一步评估资料包，到底要做多少照护者外联？
    evidenceToGather: 做一轮 工时与动作研究，量化照护者病史采集、排期和资料整理。
  - priority: medium
    question: 记忆门诊或研究团队，是否愿意为来自基层医疗、已完成预筛和取得同意的转诊付费？
    evidenceToGather: 访谈记忆门诊、神经科集团和试验协调员，并追踪试点里的转化指标。
analysisModels:
  marketMapDiagram:
    title: 痴呆路径市场图
    mermaid: |-
      quadrantChart
        title Dementia pathway market
        x-axis Test-centric --> Workflow-centric
        y-axis Research/diagnosis focus --> Operational follow-up focus
