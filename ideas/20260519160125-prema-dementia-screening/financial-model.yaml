scenarios:
  downside:
    description: Pilots close one quarter later, production conversions stay below the plan's 50% target, and gross margin tops out at 66% because implementation stays service-heavy.
    y3RevenueK: 1117.0
    y3EbitdaK: -910.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
    - First paid pilot shifts from M5 to M8.
    - Q4Y2 customer count lands at 7 instead of 9.
    - Y3 gross margin reaches 66% instead of 70%.
  base:
    description: Founder-led sales land three paid pilots in Y1, one converts to production by M12, and land-and-expand grows the customer base to 12 live clinic groups by Q4Y3.
    y3RevenueK: 1469.2
    y3EbitdaK: -626.5
    cashLowPointK: 290.9
    keyAssumptionChanges:
    - Three paid pilots close by M9 and one converts to production by M12.
    - Quarter-end customers reach 9 by Q4Y2 and 12 by Q4Y3.
    - Gross margin improves from 55% in Y1 to 70% in Y3 as implementation templates standardize.
  upside:
    description: One channel partner starts sourcing qualified opportunities in H2Y2, pilot-to-production conversion beats plan, and the company adds two extra clinic groups in Y3 without meaningfully increasing headcount.
    y3RevenueK: 1763.0
    y3EbitdaK: -430.0
    cashLowPointK: 430.0
    keyAssumptionChanges:
    - One partner channel contributes qualified pilots starting in H2Y2.
    - Q4Y3 customer count reaches 14 instead of 12.
    - Y3 gross margin improves to 72% through lower implementation drag.
sensitivity:
- variable: ARPU
  downsideCase: Blended Y3 exit ARPU slips to $132K because buyers hold pricing near pilot levels.
  baseCase: Blended Y3 exit ARPU reaches $146K per customer.
  upsideCase: Blended Y3 exit ARPU reaches $160K through more multi-clinic expansions and usage fees.
  y3RevenueImpactK: -147.0
  cashImpactK: -103.0
- variable: CAC
  downsideCase: CAC rises to $85K as procurement and clinical proof requirements lengthen.
  baseCase: CAC stays at $70K with founder-led selling and a narrow ICP.
  upsideCase: CAC falls to $55K once referrals and partner-sourced leads appear.
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: churn
  downsideCase: Monthly churn runs at 2.5% because pilots do not expand reliably.
  baseCase: Monthly churn holds at 1.5% after workflows embed in clinic operations.
  upsideCase: Monthly churn drops to 1.0% as expansion modules improve stickiness.
  y3RevenueImpactK: -90.0
  cashImpactK: -130.0
- variable: sales cycle
  downsideCase: Pilot close timing slips by one quarter across Y1-Y2.
  baseCase: Founder-led 4-6 month cycles convert into paid pilots on the modeled schedule.
  upsideCase: Partner intros shorten close timing by roughly two months.
  y3RevenueImpactK: -220.0
  cashImpactK: -210.0
- variable: gross margin
  downsideCase: Y3 gross margin caps at 66% because implementation work remains custom.
  baseCase: Y3 gross margin reaches the 70% target in the business plan.
  upsideCase: Y3 gross margin reaches 73% as support and deployment costs scale sublinearly.
  y3RevenueImpactK: 0.0
  cashImpactK: -58.8
- variable: hiring pace
  downsideCase: Two extra implementation/support hires are pulled forward into Y2 to cover custom work.
  baseCase: Hiring follows the lean sequence in A13 and ends Y3 at 9 FTE.
  upsideCase: One noncritical operations hire slips two quarters because templates reduce manual load.
  y3RevenueImpactK: -60.0
  cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      AbnormalScreens[Abnormal screens] --> ManagedPathways[Managed pathways]
      ClinicSubscriptions[Clinic subscriptions] --> Revenue
      ManagedPathways --> UsageFees[Usage fees]
      ManagedPathways --> ClinicSubscriptions
      UsageFees --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case Y3 revenue comes from 12 live clinic groups paying roughly $11K-$12.2K monthly after pilots convert into multi-clinic production contracts.
- checkName: Must go right
  finding: Pilot-to-production conversion needs to stay near the plan's 50%+ target by M12-M18 or the revenue ramp will lag the fixed implementation-heavy cost base.
- checkName: Model breaks if
  finding: If sales cycles slip by a quarter or gross margin stalls below 66%, downside cash turns negative before the company reaches a seed-ready proof point.
- checkName: Next-round proof
  finding: A seed raise is justified once the company shows 9 live clinic groups, one repeatable integration pattern, and a channel-ready ROI story by the end of Y2.
sanityChecks:
  ruleOf40: Y3 growth 91.8% + EBITDA margin -42.6% = 49.2%.
  burnMultiple: Y2 burn multiple 1.3x (-EBITDA $832.7K / net new revenue $647.5K); Y3 burn multiple 0.9x (-EBITDA $626.5K / net new revenue $703.2K).
  revenuePerFte: $163.2K Y3 using Q4Y3 headcount of 9 FTE (benchmark roughly $200-$400K for mature SaaS).
  flags:
  - The model assumes all three paid pilots land by M9 and at least one converts to production economics by M12; a one-quarter slip materially pressures cash.
  - Revenue per FTE stays below a typical SaaS benchmark because healthcare implementation, caregiver-workflow design, and customer proof still require a meaningful services component.
  - Gross margin only reaches the business-plan target in Y3, so deeper-than-modeled EHR customization or support intensity would likely delay the next round.
