assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date] Model starts the month after the dated plan so the pre-seed cash is available before operating spend begins.'
- id: A2
  name: Opening cash
  value: '2500.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] Base case uses a $2.5M pre-seed, near the lower-middle of the stated range, sized to reach the end-Y2 proof point plus buffer.'
- id: A3
  name: Starting customers (M1)
  value: '0'
  unit: count
  source: '[BP product MVP + milestones] The company starts pre-revenue and lands its first paid pilot only after the narrow workflow MVP is deployable.'
- id: A4
  name: Y1 customer ramp
  value: Three paid pilots by M9, with one converting to production economics by M12; active logos end Y1 at 3.
  unit: count/timing
  source: '[BP milestones 0-12 months + BP investorMemo.initialContract] Anchored to signing 3 paid pilots and converting at least 1 pilot account into a multi-clinic annual production contract inside the first 12 months.'
- id: A5
  name: Y2 customer ramp
  value: 'Quarter-end customers: Q1Y2 4, Q2Y2 5, Q3Y2 7, Q4Y2 9.'
  unit: count
  source: '[BP milestones 12-24 months] Uses the stated 8-12 live clinic group target by month 24 and spreads the adds gradually across the year.'
- id: A6
  name: Y3 customer ramp
  value: 'Quarter-end customers: Q1Y3 9, Q2Y3 10, Q3Y3 11, Q4Y3 12.'
  unit: count
  source: '[Research market.som + BP sequencingRationale] Growth remains land-and-expand rather than hypergrowth because implementation and clinician trust still constrain deployment pace.'
- id: A7
  name: Pricing ladder
  value: Paid pilot about $60K annualized MRR equivalent; Y2 blended realized ARPU about $128K; Y3 exit ARPU about $146K.
  unit: annualK per customer
  source: '[BP gtm.pricing + BP investorMemo.initialContract] Kept inside the plan''s $120K-$220K production ARR range for a 15-30 clinic group, with pilots recognized at the low end.'
- id: A8
  name: Revenue recognition method
  value: Active customers in each month or quarter multiplied by a blended realized monthly ARPU.
  unit: formula
  source: '[BP gtm.pricing] This keeps revenue tied directly to customer counts while reflecting pilot-to-production mix shifts over time.'
- id: A9
  name: Gross margin ramp
  value: Y1 55%, Y2 64%, Y3 70%.
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] Early pilots carry more manual implementation and support cost; the model reaches the stated gross-margin target only once deployments are standardized in Y3.'
- id: A10
  name: Steady-state CAC
  value: '70.0'
  unit: USDK per customer
  source: '[BP gtm.funnelTargets + Research fiveForces.buyerPower] Healthcare enterprise sales and pilot conversion require a higher CAC than SMB SaaS; the model uses a still-lean founder-led enterprise-sales assumption.'
- id: A11
  name: Monthly logo churn for unit economics
  value: '1.5'
  unit: percent
  source: '[Startup-finance heuristic] Multi-site healthcare workflow software with annual contracts can underwrite low logo churn if the product is embedded in operations, but the wedge is still young.'
- id: A12
  name: Loaded salary bands
  value: Founder 150; Eng 180; Clinical workflow 150; Implementation/Solutions 140; Sales/GTM 170; G&A/Ops 120.
  unit: annualK per FTE
  source: '[BP team + startup-finance heuristic] Uses lean U.S. health-tech cash compensation with payroll taxes and benefits already loaded.'
- id: A13
  name: Hiring schedule
  value: Clinical workflow lead active at M1; implementation hire M4; GTM lead M9; second engineer M15; second GTM hire M18; second implementation hire M27; G&A hire M33.
  unit: timing
  source: '[BP team + BP strategicChoices.sequencingRationale] Product and deployment capacity come before scale sales, with later hires added only after a repeatable clinic-cluster motion exists.'
- id: A14
  name: Headcount endpoints
  value: 5 FTE by Q4Y1, 7 FTE by Q4Y2, 9 FTE by Q4Y3.
  unit: FTE
  source: '[BP team + BP milestones] Keeps the team lean enough for a pre-seed budget while supporting pilots, implementation templates, and measured expansion.'
- id: A15
  name: Operating expense method
  value: Department lines include payroll plus cloud, travel, implementation support, legal, and compliance overhead.
  unit: policy
  source: '[BP operations + Research adoptionFrictionMatrix] Reflects a workflow software company that still carries customer-specific implementation and trust-building costs.'
- id: A16
  name: Cash flow simplification
  value: Ending cash equals opening cash plus cumulative EBITDA.
  unit: formula
  source: '[Startup-finance heuristic] Assumes negligible capex, debt, taxes, and working-capital distortion for an asset-light SaaS workflow company.'
- id: A17
  name: Funding sizing rule
  value: Raise enough to reach the end-Y2 standardization milestone and retain roughly six months of buffer into Y3.
  unit: policy
  source: '[BP fundingAsk runwayMonths 18 + model requirement] The model extends the stated 18-month fundraising framing into a milestone-plus-buffer pre-seed raise.'
