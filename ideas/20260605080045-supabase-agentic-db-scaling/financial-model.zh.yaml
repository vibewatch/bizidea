slug: workspace-shard-control
date: '2026-06-05'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 起始客户数（M1）
  value: '0'
  unit: count
  source: '[BP milestones] 初始试点窗口前没有明确写出生产合同，所以模型从 0 个付费客户起步。'
- id: A2
  name: 综合年 ACV
  value: '58'
  unit: USD K per customer per year
  source: '[BP gtm.pricing] 生产合同按 $48k-$60k 区间的高位建模，因为企业买家还会为带监督的升迁事件付费。'
- id: A3
  name: 第 1 年客户爬坡
  value: 到 M12 达到 5 个客户
  unit: count
  source: '[BP milestones + investorMemo.firstCustomer] 第 1 年做到 5 个付费客户，与拿下 5-8 个共创客户、并把至少 3 个付费试点转成年合同的计划一致。'
- id: A4
  name: 第 2 年客户爬坡
  value: 到 Q4Y2 达到 22 个客户
  unit: count
  source: '[BP milestones] 基础情境落在 12-24 个月做到 20-25 个生产客户的计划区间内。'
- id: A5
  name: 第 3 年客户爬坡
  value: 到 Q4Y3 达到 60 个客户
  unit: count
  source: '[BP milestones + market.som] 模型在第 3 年达到计划里的约 60 个客户目标。'
- id: A6
  name: 目标毛利率
  value: '78'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 基础情境下毛利率按计划里写明的软件目标维持。'
- id: A7
  name: 月度流失率
  value: '1.0'
  unit: percent
  source: '[Heuristic: startup-finance benchmark] 企业级基础设施工作流黏性强，但仍面临供应商替代与自研替代风险，所以单位经济模型按月流失 1% 建模。'
- id: A8
  name: 综合 CAC
  value: '32'
  unit: USD K per customer
  source: '[BP gtm.channels + funnelTargets + research buyingTriggers] 创始人主导销售、安全审查和带监督试点意味着 CAC 会落在低 30K 美元区间。'
- id: A9
  name: 福利与薪酬附加负担
  value: '20'
  unit: percent of cash compensation
  source: '[Heuristic: startup-finance benchmark] fully loaded 薪酬按基础工资上浮 20%，覆盖福利、税费和招聘开销。'
- id: A10
  name: 创始人与技术岗位薪资带
  value: CEO $132K、CTO/安全 $168K、产品 $144K、平台工程 $150K，均为 fully loaded 年化
  unit: USD K annualized
  source: '[BP team + heuristic] 薪酬水平低于大厂，但足以招到能做数据平面邻近产品的资深基础设施人才。'
- id: A11
  name: 初始职能招聘
  value: 产品/解决方案 M6 入职，安全/可靠性 M9 入职，客户成功 M11 入职
  unit: timing
  source: '[BP team] 这些时间点与运营计划里点名的招聘节奏一致。'
- id: A12
  name: 后续招聘节奏
  value: 销售在 M7/M16/M35 入职，平台工程在 M8/M13/M22 入职，G&A 在 M19 入职
  unit: timing
  source: '[Heuristic: startup-finance benchmark] 新增招聘既要支撑 BP 里程碑，也要在生产转化跑通前把团队维持在精简状态。'
- id: A13
  name: 非薪酬运营开销
  value: 12-26
  unit: USD K per month
  source: '[Heuristic: startup-finance benchmark] 覆盖云工具、差旅、法务、保险和合规开支，并随客户数和企业销售活动增加而上升。'
- id: A14
  name: 模型起始融资需求
  value: '3.4'
  unit: USD M
  source: '[BP fundingAsk] 这笔融资落在计划的 $2M-$4M 区间内，并在模型现金低点之上留下约 6 个月缓冲。'
- id: A15
  name: 资金用途配比
  value: 45% 工程，25% GTM，10% G&A，20% 六个月缓冲
  unit: allocation
  source: '[BP fundingAsk.useOfFundsSummary + heuristic] 在 Supabase-first 证明跑通并交付第二个后端之前，工程仍然是最大的资金桶。'
