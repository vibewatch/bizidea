modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads --> QualifiedPilots\n  QualifiedPilots --> PaidContracts\n  PaidContracts --> ManagedWorkspaces\n  ManagedWorkspaces --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash"
modelSanity:
- checkName: 收入引擎
  finding: 基础情境把第 1 年的 5 次转化滚到 Q4Y2 的 22 个生产客户和 Q4Y3 的 60 个客户，综合 ACV 为 $58K，对应第 3 年收入 $2.4M、退出 ARR 约 $3.5M。
- checkName: 必须跑对
  finding: recommendation-first 试点必须接近计划里的 60%+“试点转年合同”目标，否则模型赶不上支撑下一轮融资的 Q4Y3 盈利季度。
- checkName: 模型会失效如果
  finding: 如果原生功能追赶或安全异议把第 3 年客户数压在 45 左右、ACV 压在 $52K 左右， downside 情境会在下一轮融资前把现金打到 0 以下。
- checkName: 下一轮融资证明
  finding: 如果能在第 2 年做到 20-25 个生产客户，并交付 Neon 加一个专用目标，就足以在完整经营杠杆出现前，为 seed 轮提供证明材料。
sanityChecks:
  ruleOf40: Y3 增长 223.4% + EBITDA 利润率 -20.1% = 203.3%
  burnMultiple: Y2 burn multiple 为 1.47x，基于 $1446.8K burn 和 $986.0K 的净新增 ARR。
  revenuePerFte: Q4Y3 头数口径下，每个 FTE 对应 Y3 收入约 $185K，对比基础设施 SaaS 常见的约 $200K-$400K benchmark。
  flags:
  - Y3 的每 FTE 收入仍低于成熟 SaaS 基准，所以模型默认现有团队会在第 3 年后继续把规模放大到更高毛利的扩展收入。
  - 现金投入明显前置在产品、安全和 GTM 招聘上，如果试点时间线错失，回旋空间并不大。
  - 融资情境默认多数早期买家能接受托管式控制平面访问；如果 BYO-cloud 要求更早变成主流，CAC 和实施成本都会抬升。
