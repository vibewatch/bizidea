scenarios:
  downside:
    description: 如果原生功能追赶更快、安全审批更慢，转化速度会下降，公司也会在更长时间里停留在 recommendation-first 模式。
    y3RevenueK: 1800.0
    y3EbitdaK: -980.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
    - 综合 ACV 降到 $52K。
    - 第 3 年结束时只有 45 个客户，而不是 60 个。
    - 第二个后端支持延后两个季度。
  base:
    description: Supabase-first 试点按计划转化，次级后端支持在第 2 年到位，公司在第 3 年结束时做到 60 个客户。
    y3RevenueK: 2406.9
    y3EbitdaK: -484.2
    cashLowPointK: 486.8
    keyAssumptionChanges:
    - 综合 ACV 维持在 $58K。
    - 客户数在 Q4Y2 达到 22 个，在 Q4Y3 达到 60 个。
    - 毛利率维持 78%，招聘按分阶段计划推进。
  upside:
    description: 如果共创客户转化更快、扩展模块更早带来收入，而且单账户升迁事件量更高，公司就能更早兑现收入。
    y3RevenueK: 3050.0
    y3EbitdaK: 140.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
    - 综合 ACV 提升到 $62K。
    - 第 3 年结束时达到 70 个客户。
    - 随着 onboarding 更可复制，毛利率改善到 80%。
