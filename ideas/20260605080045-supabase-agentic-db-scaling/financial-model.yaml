modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> QualifiedPilots
      QualifiedPilots --> PaidContracts
      PaidContracts --> ManagedWorkspaces
      ManagedWorkspaces --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: The base case turns five year-one conversions into 22 production customers by Q4Y2 and 60 by Q4Y3 at a $58K blended ACV, producing $2.4M of year-three revenue and about $3.5M exit ARR.
- checkName: Must go right
  finding: Recommendation-first pilots must convert close to the plan's 60%+ pilot-to-annual target or the model misses the Q4Y3 profitable quarter that supports the next round.
- checkName: Model breaks if
  finding: If native feature catch-up or security objections hold year-three customers near 45 and ACV near $52K, the downside case pushes cash below zero before new financing.
- checkName: Next-round proof
  finding: Reaching 20-25 production customers with Neon plus one dedicated target in year two creates the evidence base for a seed round before full operating leverage arrives.
sanityChecks:
  ruleOf40: Y3 growth 223.4% + EBITDA margin -20.1% = 203.3%
  burnMultiple: Y2 burn multiple 1.47x based on $1446.8K burn over $986.0K net new ARR.
  revenuePerFte: $185K Y3 revenue per FTE at Q4Y3 headcount versus an approximate $200K-$400K infrastructure-SaaS benchmark.
  flags:
  - Revenue per FTE remains below mature SaaS benchmarks in Y3, so the model depends on existing headcount scaling into higher-margin expansion revenue after year 3.
  - Cash is front-loaded into product, security, and go-to-market hiring before broad production conversion, which leaves limited room for missed pilot timelines.
  - The funding case assumes hosted control-plane access is acceptable for most early buyers; a faster shift toward BYO-cloud requirements would raise both CAC and implementation cost.
