assumptions:
- id: A1
  name: Starting customers (M1)
  value: '0'
  unit: count
  source: '[BP milestones] No production contracts are stated before the initial pilot window, so the model starts from zero paying customers.'
- id: A2
  name: Blended annual ACV
  value: '58'
  unit: USD K per customer per year
  source: '[BP gtm.pricing] Production contracts are modeled near the high end of the stated $48k-$60k range because enterprise buyers also pay for supervised promotion events.'
- id: A3
  name: Year-1 customer ramp
  value: 5 customers by M12
  unit: count
  source: '[BP milestones + investorMemo.firstCustomer] Five paying customers in year 1 is consistent with landing 5-8 design partners and converting at least 3 paid pilots into annual contracts.'
- id: A4
  name: Year-2 customer ramp
  value: 22 customers by Q4Y2
  unit: count
  source: '[BP milestones] The base case lands within the stated goal of 20-25 production customers in months 12-24.'
- id: A5
  name: Year-3 customer ramp
  value: 60 customers by Q4Y3
  unit: count
  source: '[BP milestones + market.som] The model reaches the plan target of roughly 60 customers by year 3.'
- id: A6
  name: Target gross margin
  value: '78'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] Gross margin is held at the stated software target for the base case.'
- id: A7
  name: Monthly churn
  value: '1.0'
  unit: percent
  source: '[Heuristic: startup-finance benchmark] Enterprise infrastructure workflows are sticky but still face vendor and build-vs-buy substitution risk, so the model uses 1% monthly churn for unit economics.'
- id: A8
  name: Blended CAC
  value: '32'
  unit: USD K per customer
  source: '[BP gtm.channels + funnelTargets + research buyingTriggers] Founder-led direct sales, security reviews, and supervised pilots imply a high-touch CAC in the low-$30Ks.'
- id: A9
  name: Benefits and payroll load
  value: '20'
  unit: percent of cash compensation
  source: '[Heuristic: startup-finance benchmark] Fully loaded payroll includes benefits, taxes, and recruiting overhead at 20% above base salary.'
- id: A10
  name: Founder and technical salary bands
  value: CEO $132K, CTO/Security $168K, Product $144K, Platform Eng $150K loaded annualized
  unit: USD K annualized
  source: '[BP team + heuristic] Compensation is set below big-tech levels but high enough to recruit experienced infrastructure talent for a data-plane-adjacent product.'
- id: A11
  name: Initial functional hires
  value: Product/Solutions at M6, Security/Reliability at M9, Customer Success at M11
  unit: timing
  source: '[BP team] These dates mirror the named hires in the operating plan.'
- id: A12
  name: Additional hiring ramp
  value: Sales in M7/M16/M35, Platform Engineering in M8/M13/M22, G&A in M19
  unit: timing
  source: '[Heuristic: startup-finance benchmark] Added hires support the BP milestones while keeping the team lean until production conversions are proven.'
- id: A13
  name: Non-payroll operating overhead
  value: 12-26
  unit: USD K per month
  source: '[Heuristic: startup-finance benchmark] Covers cloud tools, travel, legal, insurance, and compliance spend rising with customer count and enterprise sales activity.'
- id: A14
  name: Funding ask at model start
  value: '3.4'
  unit: USD M
  source: '[BP fundingAsk] The raise sits within the stated $2M-$4M target and leaves roughly six months of buffer above the modeled cash low point.'
- id: A15
  name: Use-of-funds mix
  value: 45% engineering, 25% GTM, 10% G&A, 20% six-month buffer
  unit: allocation
  source: '[BP fundingAsk.useOfFundsSummary + heuristic] Engineering remains the largest bucket until Supabase-first proof and a second backend are delivered.'
