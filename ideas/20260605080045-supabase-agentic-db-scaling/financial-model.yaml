scenarios:
  downside:
    description: Native feature catch-up and slower security approvals reduce conversion speed and keep the company in recommendation-first mode for longer.
    y3RevenueK: 1800.0
    y3EbitdaK: -980.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
    - Blended ACV falls to $52K.
    - Year-3 exits at 45 customers instead of 60.
    - Second-backend support slips by two quarters.
  base:
    description: Supabase-first pilots convert on plan, secondary backend support arrives in year 2, and the company exits year 3 at 60 customers.
    y3RevenueK: 2406.9
    y3EbitdaK: -484.2
    cashLowPointK: 486.8
    keyAssumptionChanges:
    - Blended ACV holds at $58K.
    - Customer count reaches 22 by Q4Y2 and 60 by Q4Y3.
    - Gross margin stays at 78% while hiring follows the staged plan.
  upside:
    description: Design partners convert faster, expansion modules pull through earlier, and the company monetizes more promotion-event volume per account.
    y3RevenueK: 3050.0
    y3EbitdaK: 140.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
    - Blended ACV rises to $62K.
    - Year-3 exits at 70 customers.
    - Gross margin improves to 80% as onboarding becomes more repeatable.
