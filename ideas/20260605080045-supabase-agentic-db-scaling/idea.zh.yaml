problem: AI 原生应用开发者越来越习惯让 copilots、内部代理，或自助式产品流程，为每个客户工作区、环境，乃至每条工作流分支都拉起一个新的 Postgres 数据库。问题还没长成传统意义上的数据库大规模，就先变成了舰队管理：这些小数据库继承了彼此不一致的租户策略、迁移策略和 HA 策略，随后总有几个工作区会突然发热，把团队逼进代价高昂的紧急切换。平台团队最后只能在供应商控制台、自写脚本和人工 runbook 之间来回折腾，判断哪些工作区必须隔离、重分片或迁移，同时还不能把企业级 SLA 弄断。
targetUser:
  primary: 在 Supabase 或兼容 Postgres 平台上为客户工作区自动开库的 AI 原生 SaaS 公司平台工程团队
  secondary: 把“一个工作区一个数据库”嵌进产品架构里的 B2B 应用开发者基础设施负责人
  buyer: 平台工程总监或开发者基础设施负责人
startupThesis:
  nonObviousInsight: AI 工具带来的不只是查询量上升，更是把“创建数据库”变成了默认的自动动作。等到多数新数据库都由代理创建，真正稀缺的资源就不再是算力，而是生命周期编排——怎么放置、怎么升迁、何时重分片，以及怎么在成千上万个小型 Postgres 集群里守住策略一致性。
  beachhead: 首个滩头市场，是那些使用 Supabase for Platforms、每月创建 300–5,000 个客户工作区的 AI 原生垂直 SaaS 平台团队。它们往往让每个企业工作区先跑在独立 Postgres 数据库上，一旦使用量跳升，又必须零停机完成升迁。
  wedge: 切口是一套工作区升迁控制平面。它卡在数据库开通路径上，为每个新库打租户和增长风险分，再把单实例 Postgres 零停机升到独立分片或专用集群的流程自动化。
  whyNowCatalyst: Supabase 这轮融资和 Multigres 的发布，把一件事公开讲明了：现在多数新数据库都由 AI 工具创建，而团队已经碰到普通单实例 Postgres 的极限。
  ventureScalePath: 先从基于 Supabase 的工作区升迁和生命周期治理切进去，再扩到跨云厂商的 Postgres 舰队管理、合规策略执行，以及所有把数据库当成一次性基础设施来用的 AI 原生产品的成本与性能优化。
solution: 产品接在数据库开通 API 和开发者工作流前面，在新工作区创建之前，就把每个数据库标上租户类别、数据敏感度、预期负载画像和升迁策略。之后它持续盯负载形态、噪音邻居信号、迁移准备度和租户增长，给出建议，或直接执行下一步：继续留在共享池、拆到独立实例，或迁到分片拓扑。它不要求平台团队自己写一堆定制 runbook，而是把零停机升迁、迁移规划、回滚检查和策略执行打成一条工作流，并附带审计轨迹。最初的切口不是替代 Postgres 本身，而是拿掉平台团队在“何时、怎样让工作区毕业出普通 Postgres”这件事上的运维税。
goToMarketSeed:
  firstCustomer: 首个客户画像，是一家 Series B-C 的 AI 原生运营软件公司：它用 Supabase for Platforms 为每个客户环境创建专属 Postgres 工作区，正准备交付首个 Fortune 500 级部署。
  buyingTrigger: 一次企业级上线、一次延迟事故，或一次安全审查，会暴露出高价值客户工作区已经不能继续留在默认单实例配置上。
  currentAlternative: 内部脚本，加上在供应商控制台和 Terraform 里做人工 DBA 审核
  switchingReason: 这套控制平面让团队可以更快、更稳地把发热工作区隔离出来，统一升迁策略，也不用为每个新企业客户都重写一遍迁移逻辑。
  pricingHypothesis: 定价可以做成按管理中活跃数据库数收费的用量型基础设施订阅，再对每次自动升迁或零停机迁移收取高阶服务费。
