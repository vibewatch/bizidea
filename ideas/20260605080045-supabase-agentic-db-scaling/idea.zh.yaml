topRisks:
- name: 云厂商功能追赶
  description: Supabase 或其他 Postgres 平台，可能把原生扩缩容一路补进这条工作流。
  mitigation: 要把差异化压在跨厂商编排、工作区级策略逻辑，以及高于单一数据库厂商的审计工作流上。
- name: 迁移失败的敏感度很高
  description: 只要有一次切换出错，信任就会受损，因为产品直接碰在线客户数据路径。
  mitigation: 先从建议模式、受限拓扑和分阶段执行做起，在全面自动化之前先把回滚检查点做扎实。
- name: DIY 惯性
  description: 强平台团队可能会觉得内部脚本暂时够用，直到数据库舰队真的开始失控。
  mitigation: 落地时要拿事故驱动的 ROI 说话，证明它能加快企业客户上线；同时接入现有 Terraform 和可观测性栈，而不是逼团队整套重来。
