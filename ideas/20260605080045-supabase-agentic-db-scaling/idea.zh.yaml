differentiator: 托管数据库厂商卖的是容量和底层能力，但真正没人替买家做的，是应用层那道决策：哪个工作区该继续共享、哪个该迁到独立实例、哪个该上分片。内部平台团队当然能把其中一部分写成脚本，但最脆的地方恰恰是跨职能工作流：怎么把负载信号映射到租户策略、怎么零停机切换、怎么把审计性守住。只要它能成为 Supabase、托管 Postgres 和自管集群之上的中立控制平面，而不是又一个托管数据库，它就能赢。
