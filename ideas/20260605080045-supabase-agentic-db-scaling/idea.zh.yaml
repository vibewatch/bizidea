jobsToBeDone:
- job: 当新的企业客户工作区开始长出默认 Postgres 配置时，帮平台团队安全地把它隔离并升迁出去，让他们不用单开一个定制迁移项目，也能守住 SLA 和安全承诺。
  currentAlternative: 内部 runbook、供应商控制台，以及临时改 Terraform
  successMetric: 从出现风险信号，到完成工作区升迁且客户无感知停机的时间
- job: 当 copilots 或自助流程不断创建新数据库时，帮基础设施团队自动套上合适的租户和扩缩容策略，避免数据库舰队失控，以及架构决策前后不一。
  currentAlternative: 人工架构评审和一次性脚本
  successMetric: 带着强制升迁策略创建的新数据库占比，以及无需人工审核的比例
