competitors:
- name: Supabase + Multigres
  stage: incumbent
  wedge: 通过 API 管理的 Postgres 平台，正在把原生横向扩展和 HA 原语往里补。
  pricing: Pro 版 $25/月起，外加每项目计算费用：从 $10/月（Micro）到 $3,730/月（16XL）；Enterprise 需定制。
  strength: 对已经在 Supabase 内部的客户，它掌握着开通路径、项目生命周期和未来的 Multigres 底座。
  weaknessVsUs: 它优化的是 Supabase 自己的资产，而不是横跨混合 Postgres 后端的中立生命周期与升迁层。
  sourceRefs:
  - 3
  - 4
  - 6
- name: Neon
  stage: scale-up
  wedge: 带 copy-on-write 分支能力、强调“每用户一个数据库”的 serverless Postgres。
  pricing: Launch 按量计费，每 CU 小时 $0.106，额外分支每分支每月 $1.50；Scale 档为每 CU 小时 $0.222。
  strength: 把隔离数据库和分支工作流做得既便宜又对开发者友好。
  weaknessVsUs: 它非常适合隔离和预览工作流，但不是一个横跨其他 Postgres 目标的完整工作区升迁编排器。
  sourceRefs:
  - 7
  - 8
  - 9
  - 10
- name: pgEdge
  stage: scale-up
  wedge: 面向 HA、地理分布和 AI 原生部署的开源分布式 / active-active Postgres。
  pricing: 抓取到的页面里，托管云版本价格以企业销售为主，需要联系销售。
  strength: 在多主、数据驻留、零停机扩展和 BYO-cloud 合规上故事很强。
  weaknessVsUs: 它提供的是目标数据库底座，不负责决定哪个工作区该何时迁过去。
  sourceRefs:
  - 18
  - 19
  - 20
- name: Crunchy Bridge
  stage: incumbent
  wedge: 完全托管、独立隔离的 Postgres 实例，附带 HA、支持和跨云部署。
  pricing: 生产计划约 $70/月（Standard-4）和 $140/月（Standard-8）起；开启 HA 后集群价格翻倍。
  strength: 独立实例路径简单，隔离性和生产支持都强。
  weaknessVsUs: 舰队级升迁逻辑、优先级判断和迁移编排仍然要买家自己做。
  sourceRefs:
  - 21
  - 22
regulatoryTechnicalConstraints:
- point: RLS 和共享池模型要求极其严谨的策略设计；PostgreSQL 在没有策略时默认拒绝，但表所有者和 BYPASSRLS 角色如果配置不慎，仍可绕过保护。
  sourceRefs:
  - 23
  - 24
- point: Autovacuum 和 VACUUM 会带来 I/O 与维护开销，所以热租户的升迁时机和迁移窗口都很敏感。
  sourceRefs:
  - 25
  - 31
- point: 企业部署可能要求私有网络、BYO cloud、SOC 2、HIPAA 或区域隔离，这会更偏向客户云部署模型。
  sourceRefs:
  - 3
  - 20
  - 21
- point: 云厂商路线图会变；Azure 正把用户从停用的 Cosmos DB for PostgreSQL 迁到 Elastic Clusters，所以编排层必须保持可迁移。
  sourceRefs:
  - 15
  - 16
validationSignals:
- point: Supabase for Platforms 明确面向 AI builder，并开放项目管理 API，证明开通工作流里确实有程序化插入点。
  sourceRefs:
  - 4
  - 5
- point: Neon 明确营销“每用户一个数据库”和即时分支，验证了买家对强隔离和 API 控制的真实需求。
  sourceRefs:
  - 8
  - 9
  - 10
- point: Citus 与 Azure 的文档都在强调噪音邻居、大租户、分片模型和租户级监控，说明这家创业公司要解决的运维痛点是真实存在的。
  sourceRefs:
  - 14
  - 15
  - 17
  - 27
- point: pgEdge 和 Crunchy Bridge 都把合规就绪的隔离部署放在前面，说明企业买家愿意为降低数据库运维风险付费。
  sourceRefs:
  - 20
  - 21
  - 22
openQuestions:
- 到底哪些遥测阈值——连接数、存储增长、vacuum 延迟，还是企业 SLA 违约——最能预测工作区什么时候需要升迁？
- 早期买家要的是 Supabase-first 的深度，还是从第一天起就要求横跨 Supabase、Neon 和专用 Postgres 的中立性？
- 首单合同里，软件 ACV 和付费迁移 / 专业服务各占多少？
- 安全团队会接受托管式控制平面吗，还是对大多数企业账户来说，BYO cloud 或私有部署才是硬门槛？
