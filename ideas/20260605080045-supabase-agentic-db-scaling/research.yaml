reportMemo:
  executiveTakeaways:
    - >-
      The wedge is real because AI builders are now launching most new databases on Supabase, while
      database-per-user and branch-heavy workflows make single-instance Postgres operations brittle
      as tenant counts rise.
    - >-
      Budget already exists inside database infrastructure spend: buyers are accustomed to paying
      per project, per branch, or per cluster, so a control plane can monetize against migration
      toil and outage prevention rather than inventing a net-new category.
    - >-
      Native scale options are multiplying—Multigres, Aurora Limitless, Citus-based Elastic
      Clusters, and pgEdge—so the startup only wins if it becomes the neutral promotion and policy
      layer above providers rather than another database vendor.
    - >-
      The sharp pain is not sharding in the abstract; it is deciding which workspace should stay
      pooled, be isolated, or move onto a distributed topology, and then executing that move without
      downtime or compliance regressions.
  marketDefinition: >-
    Control-plane software that monitors many small Postgres workspaces, enforces tenant policy, and
    automates promotion from shared or single-instance deployments into isolated or distributed
    topologies.
  customerAndBuyer: >-
    Primary users are platform engineers and infrastructure leads at AI-native SaaS companies that
    create a database or branch per customer workspace, preview environment, or agent workflow. The
    economic buyer is typically the Head of Platform Engineering, VP Infrastructure, or CTO, with
    security and compliance pulled in once enterprise tenants require private networking,
    auditability, or HIPAA/SOC 2 controls.
  buyingTriggers:
    - point: >-
        A large customer, security review, or regulated deployment forces the team off pooled
        defaults toward isolated or private Postgres environments.
      sourceRefs:
        - 3
        - 20
        - 21
        - 23
        - 24
    - point: >-
        The company starts creating many projects or branches programmatically and manual
        provisioning review no longer scales with the rate of database creation.
      sourceRefs:
        - 1
        - 4
        - 5
        - 8
        - 9
        - 10
    - point: >-
        Noisy neighbors, heavy tenant analytics, or maintenance pressure make single-instance
        performance unpredictable and trigger promotion work.
      sourceRefs:
        - 14
        - 17
        - 25
        - 27
  willingnessToPay:
    summary: >-
      Substitute spend is already visible in the stack: Supabase charges $10-$3,730+ per
      project-month for compute plus org fees, Neon charges $0.106 per CU-hour and $1.50 per extra
      branch-month, and Crunchy Bridge production instances start around $70-$560 per month before
      HA. A control plane priced as a 5-15% software overlay on that footprint is credible if it
      cuts migration toil and incident risk.
    sourceRefs:
      - 3
      - 7
      - 22
  competitiveLandscape: >-
    Competition splits into four camps: hosted Postgres platforms trying to add native scale,
    branch-first or serverless Postgres vendors, distributed or sharded Postgres stacks, and managed
    single-tenant Postgres that still leaves promotion orchestration to the buyer. The white space
    is a provider-neutral lifecycle layer that decides when a workspace should stay pooled, get
    isolated, or move onto shards.
  incumbentThesis:
    - incumbentClass: Hosted Postgres platforms
      point: >-
        Supabase already owns the provisioning path and is building Multigres, but its advantage is
        within the Supabase estate rather than neutral policy across mixed Postgres backends.
      sourceRefs:
        - 4
        - 5
        - 6
    - incumbentClass: Branch-first serverless Postgres
      point: >-
        Neon makes database-per-user and branching practical, but its core wedge is cheap isolation
        and developer velocity rather than deciding when a hot workspace should graduate to a
        different topology.
      sourceRefs:
        - 7
        - 8
        - 9
        - 10
    - incumbentClass: Distributed Postgres services
      point: >-
        Aurora Limitless and Citus-based Elastic Clusters lower the complexity of horizontal
        scaling, but buyers still need to identify which tenants should be sharded and when to move
        them.
      sourceRefs:
        - 11
        - 12
        - 13
        - 14
        - 15
    - incumbentClass: Active-active and geo Postgres
      point: >-
        pgEdge addresses multi-master and compliance-heavy deployments, but it is a destination
        substrate, not a workspace-level promotion control plane.
      sourceRefs:
        - 18
        - 19
        - 20
  regulatoryLandscape: >-
    The product is sold as infrastructure, so the gating factors are enterprise data-governance and
    operational assurance rather than a standalone database regulation. Buyers will care about
    strong tenant isolation, private networking or BYO cloud, audit logs, HIPAA and SOC 2 readiness,
    and avoiding architectures that silently bypass RLS or mix regulated tenants with noisy
    neighbors.
  technologyLandscape: >-
    The enabling pieces are mature: Postgres itself keeps improving for high-concurrency workloads,
    Neon and Supabase normalize API-driven project and branch creation, and distributed options from
    Multigres, Citus, Aurora Limitless, and pgEdge provide credible target topologies. The missing
    layer is orchestration logic that links tenant signals to safe promotion actions.
  distributionChannels:
    - point: >-
        Land through Supabase and Neon ecosystem integrations, templates, and AI-builder
        partnerships where the provisioning path is already programmatic.
      sourceRefs:
        - 4
        - 8
        - 9
        - 10
    - point: >-
        Sell directly to platform engineering after an enterprise onboarding, latency incident, or
        risky tenant migration exposes the limits of manual runbooks.
      sourceRefs:
        - 1
        - 3
        - 21
        - 22
        - 27
    - point: >-
        Use compliance-led BYO-cloud and private-networking motions with pgEdge, Crunchy Bridge, and
        cloud database consultancies for regulated buyers.
      sourceRefs:
        - 20
        - 21
        - 22
  partnershipEcosystem:
    - point: >-
        Supabase Management API and Supabase for Platforms are natural insertion points for
        provisioning hooks and workspace metadata capture.
      sourceRefs:
        - 4
        - 5
    - point: >-
        Neon API and branching endpoints let the startup trial recommendation and promotion logic in
        preview and test flows before touching production.
      sourceRefs:
        - 8
        - 10
    - point: >-
        Distributed backends such as Multigres, Aurora Limitless, Elastic Clusters, and pgEdge can
        be treated as promotion targets rather than only as competitors.
      sourceRefs:
        - 6
        - 12
        - 13
        - 15
        - 19
  dataMoats:
    - point: >-
        Cross-workspace telemetry on connection saturation, noisy-neighbor events, cutover duration,
        and rollback rates can make promotion recommendations smarter over time.
      sourceRefs:
        - 14
        - 17
        - 25
        - 27
    - point: >-
        Policy graphs that encode which tenants require private networking, BYO cloud, or stricter
        RLS checks become reusable across providers and accounts.
      sourceRefs:
        - 20
        - 21
        - 23
        - 24
    - point: >-
        Execution histories across Supabase projects, Neon branches, and distributed targets can
        become a differentiated rollback and runbook corpus.
      sourceRefs:
        - 4
        - 6
        - 8
        - 10
        - 15
  geographicConsiderations:
    - point: >-
        Buyers with EU or regulated workloads will push for region-aware placement and sometimes
        customer-cloud deployment rather than a fully shared control plane.
      sourceRefs:
        - 4
        - 20
        - 21
    - point: >-
        Multi-region and residency-sensitive workloads make active-active or sharded backends more
        attractive promotion targets.
      sourceRefs:
        - 13
        - 15
        - 19
    - point: >-
        The cleanest first wedge is English-speaking AI-native SaaS teams already using API-first
        Postgres platforms and self-serve provisioning.
      sourceRefs:
        - 1
        - 4
        - 28
  sensitivityCases:
    - case: Native feature catch-up
      impact: >-
        If Supabase, AWS, or Azure make workspace promotion sufficiently turnkey, the startup is
        pushed toward cross-provider policy and audit control rather than execution alone.
      sourceRefs:
        - 6
        - 12
        - 15
    - case: Shared-schema endurance
      impact: >-
        If buyers keep pooled RLS architectures longer than expected, conversion waits until a few
        whale tenants arrive and force isolation work.
      sourceRefs:
        - 23
        - 24
        - 29
    - case: Branch-first workflows accelerate
      impact: >-
        If branch-per-preview and database-per-user patterns spread faster than expected, the volume
        of workspaces under management can grow much faster than revenue per workspace.
      sourceRefs:
        - 8
        - 9
        - 10
    - case: Migration incident resets trust
      impact: >-
        A visible failed cutover would push customers toward recommendation-only mode and lengthen
        the path to full automation.
      sourceRefs:
        - 25
        - 27
  validationPlan:
    - priority: high
      question: >-
        At what workspace count or monthly migration load does automated promotion move from a
        nice-to-have into a budgeted control-plane purchase?
      evidenceToGather: >-
        Interview 12 platform teams using Supabase or Neon, capture workspace counts and migration
        frequency, and identify the point where runbooks or Terraform become unacceptable.
    - priority: high
      question: >-
        Will buyers trust recommendation-only mode first, or do they expect orchestration from day
        one?
      evidenceToGather: >-
        Run three design-partner pilots that compare recommendation-only alerts versus supervised
        execution and measure time-to-isolation and post-cutover incident rates.
    - priority: medium
      question: >-
        Which promotion targets matter first: dedicated Supabase projects, Neon projects,
        distributed Citus or Aurora shards, or isolated managed instances?
      evidenceToGather: >-
        Track the first ten prospects by current provider mix, target topology, and compliance
        requirements to rank the integration roadmap.
analysisModels:
  marketMapDiagram:
    title: Workspace promotion landscape
    mermaid: |-
      quadrantChart
        title Workspace promotion landscape
        x-axis Low lifecycle automation --> High lifecycle automation
        y-axis Single-instance orientation --> Distributed-topology depth
        Crunchy Bridge: [0.20, 0.22]
        Supabase: [0.45, 0.58]
        Neon: [0.67, 0.38]
        pgEdge: [0.58, 0.84]
        Aurora Limitless: [0.50, 0.90]
        Proposed startup: [0.90, 0.76]
  fiveForces:
    supplierPower:
      score: 3
      rationale: >-
        The product depends on cloud database APIs and on whatever backends buyers already use, but
        there are enough viable Postgres targets that no single supplier should dominate leverage.
      sourceRefs:
        - 4
        - 10
        - 15
        - 20
    buyerPower:
      score: 4
      rationale: >-
        Target buyers are sophisticated platform teams that can keep using shared-schema RLS, buy
        more managed Postgres, or extend internal scripts if a new control plane does not show clear
        migration-risk reduction.
      sourceRefs:
        - 9
        - 21
        - 22
        - 24
        - 29
    threatOfEntrants:
      score: 3
      rationale: >-
        A thin orchestration layer can be built on public APIs and existing Postgres primitives, but
        operational data, migration playbooks, and buyer trust are harder to reproduce quickly.
      sourceRefs:
        - 4
        - 8
        - 10
        - 24
    threatOfSubstitutes:
      score: 5
      rationale: >-
        Substitutes are strong: buyers can stay pooled with RLS, stick to schema-per-tenant or
        database-per-tenant runbooks, or simply move hot tenants onto bigger managed instances.
      sourceRefs:
        - 21
        - 22
        - 23
        - 24
        - 29
    competitiveRivalry:
      score: 4
      rationale: >-
        Rivalry is rising because hosted Postgres, distributed Postgres, and managed
        dedicated-instance vendors are all expanding into parts of the scaling problem.
      sourceRefs:
        - 6
        - 12
        - 15
        - 19
  pestle:
    - factor: political
      impact: neutral
      point: >-
        Provider roadmaps can shift quickly; Microsoft is retiring Cosmos DB for PostgreSQL and
        steering users toward Elastic Clusters, which increases buyer appetite for portable
        orchestration.
      sourceRefs:
        - 15
        - 16
    - factor: economic
      impact: positive
      point: >-
        Published infrastructure pricing on Supabase, Neon, and Crunchy Bridge means buyers already
        budget for per-project database spend, making a software overlay legible.
      sourceRefs:
        - 3
        - 7
        - 22
    - factor: social
      impact: positive
      point: >-
        AI tooling is changing who can spin up backends, which increases the rate of database
        creation even if DBA headcount does not scale with it.
      sourceRefs:
        - 1
        - 4
        - 28
    - factor: technological
      impact: positive
      point: >-
        Postgres itself and its ecosystem keep improving for high-concurrency and distributed
        workloads, so there are more credible target topologies than even two years ago.
      sourceRefs:
        - 6
        - 12
        - 13
        - 31
    - factor: legal
      impact: positive
      point: >-
        RLS, private networking, SOC2 and HIPAA posture, and BYO-cloud requirements push buyers
        toward explicit policy and audit layers instead of ad hoc scripts.
      sourceRefs:
        - 3
        - 20
        - 23
        - 24
  adoptionFrictionMatrix:
    - friction: Risk of customer-visible migration failure
      severity: high
      affectedBuyer: Platform engineering
      mitigation: >-
        Start in recommendation mode, preflight every cutover, and use target backends that already
        expose failover and distribution primitives.
      sourceRefs:
        - 6
        - 12
        - 13
        - 25
    - friction: No consensus on tenancy model across customers
      severity: high
      affectedBuyer: CTO or architecture lead
      mitigation: >-
        Support pooled, schema, database-per-tenant, and distributed promotion paths rather than
        forcing one pattern.
      sourceRefs:
        - 9
        - 14
        - 23
        - 27
        - 29
    - friction: Security teams resist broad third-party database access
      severity: high
      affectedBuyer: Security and compliance
      mitigation: Offer BYO cloud, private networking, least-privilege roles, and auditable execution trails.
      sourceRefs:
        - 3
        - 20
        - 21
        - 24
    - friction: Weak telemetry makes promotion timing noisy
      severity: medium
      affectedBuyer: SRE or DBA
      mitigation: >-
        Combine tenant-level stats, connection saturation, maintenance pressure, and branch activity
        into a single promotion score before automating moves.
      sourceRefs:
        - 14
        - 17
        - 25
