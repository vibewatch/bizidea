competitors:
  - name: Supabase + Multigres
    stage: incumbent
    wedge: API-managed Postgres platform that is adding native horizontal scaling and HA primitives.
    pricing: >-
      Pro starts at $25/month plus per-project compute from $10/month (Micro) to $3,730/month
      (16XL); Enterprise is custom.
    strength: >-
      Owns the provisioning path, project lifecycle, and upcoming Multigres substrate for customers
      already inside Supabase.
    weaknessVsUs: >-
      Optimizes the Supabase estate rather than acting as a neutral lifecycle and promotion layer
      across mixed Postgres backends.
    sourceRefs:
      - 3
      - 4
      - 6
  - name: Neon
    stage: scale-up
    wedge: Serverless Postgres with copy-on-write branches and strong database-per-user positioning.
    pricing: >-
      Launch is pay-as-you-go at $0.106 per CU-hour with extra branches at $1.50 per branch-month;
      Scale is $0.222 per CU-hour.
    strength: Makes isolated databases and branching operationally cheap and developer friendly.
    weaknessVsUs: >-
      Excellent for isolation and preview workflows, but not a full workspace promotion orchestrator
      across other Postgres targets.
    sourceRefs:
      - 7
      - 8
      - 9
      - 10
  - name: pgEdge
    stage: scale-up
    wedge: Open-source distributed and active-active Postgres for HA, geo, and AI-native deployments.
    pricing: Managed cloud pricing is enterprise-led or contact-sales on the fetched pages.
    strength: >-
      Strong story for multi-master, data residency, zero-downtime expansion, and BYO-cloud
      compliance.
    weaknessVsUs: >-
      Provides a target database substrate rather than deciding which workspace should move there
      and when.
    sourceRefs:
      - 18
      - 19
      - 20
  - name: Crunchy Bridge
    stage: incumbent
    wedge: Fully managed isolated Postgres instances with HA, support, and cloud-agnostic deployment.
    pricing: >-
      Production plans start around $70/month (Standard-4) and $140/month (Standard-8); HA doubles
      cluster price.
    strength: Simple dedicated-instance path with strong isolation and production support.
    weaknessVsUs: >-
      Still leaves fleet-level promotion logic, prioritization, and migration orchestration to the
      buyer.
    sourceRefs:
      - 21
      - 22
regulatoryTechnicalConstraints:
  - point: >-
      RLS and pooled models require rigorous policy design; PostgreSQL defaults to deny when no
      policy exists, but table owners and BYPASSRLS roles can bypass protections unless configured
      carefully.
    sourceRefs:
      - 23
      - 24
  - point: >-
      Autovacuum and VACUUM generate I/O and maintenance overhead, making hot-tenant promotion
      timing and migration windows operationally sensitive.
    sourceRefs:
      - 25
      - 31
  - point: >-
      Enterprise deployments may require private networking, BYO cloud, SOC 2, HIPAA, or regional
      isolation, which favors customer-cloud deployment models.
    sourceRefs:
      - 3
      - 20
      - 21
  - point: >-
      Provider roadmaps change; Azure is moving users from retired Cosmos DB for PostgreSQL toward
      Elastic Clusters, so the orchestration layer should stay portable.
    sourceRefs:
      - 15
      - 16
