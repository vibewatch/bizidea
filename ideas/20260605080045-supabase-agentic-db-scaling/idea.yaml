ideaScorecard:
  signalStrength:
    score: 5
    rationale: The cluster names a concrete bottleneck with three aligned sources and clear evidence that agent-created databases are already widespread.
  painIntensity:
    score: 4
    rationale: The problem is acute for platform teams once enterprise tenants arrive, though it is concentrated in fast-scaling builders rather than every Postgres user.
  wedgeClarity:
    score: 5
    rationale: Workspace promotion and zero-downtime tenant isolation is a narrow, budget-linked workflow with an obvious operational owner.
  defensibility:
    score: 4
    rationale: Deep integration into provisioning, migration policy, and workload history can create switching costs, though infrastructure vendors could move toward adjacent features.
  ventureScale:
    score: 5
    rationale: If AI-native products keep treating databases as disposable primitives, the control plane can expand from one provider wedge into the operating system for Postgres fleet lifecycle management.
topRisks:
  - name: Provider feature catch-up
    description: Supabase or another Postgres platform could extend native scaling features into parts of the workflow.
    mitigation: Focus on cross-provider orchestration, workspace-level policy logic, and audit workflows that sit above any one database vendor.
  - name: Migration failure sensitivity
    description: One bad cutover could damage trust because the product touches live customer data paths.
    mitigation: Start with recommendation mode, constrained topologies, and staged execution with rollback checkpoints before offering full automation.
  - name: DIY inertia
    description: Strong platform teams may believe internal scripts are good enough until the fleet becomes painful.
    mitigation: Land with incident-driven ROI, show faster enterprise onboarding, and integrate with existing Terraform and observability stacks instead of forcing a rip-and-replace.
