problem: >-
  像 Mosta 的 MainUSD 这样的可编程稳定币余额，如今不只是人类，AI 代理也能直接支取同一个余额，为卡片、发票、付款和 MCP 连接的工作流提供资金，覆盖 20 多条区块链和 150 多个国家。这压缩了传统上用来拦截错误、幻觉或欺诈性付款指令的人工复核窗口——付款离开账户前本该有这道关卡。正在试点代理发起付款的公司，被迫在两个坏选项之间二选一：要么用人工审批队列拖慢自动化本该带来的速度优势，要么放开代理的无护栏写入权限，让一次糟糕的工具调用就能在几秒内跨境掏空一整个资金池。
targetUser:
  primary: >-
    B 轮以上市场平台和垂直 SaaS 公司里的平台工程和财务系统负责人，他们正在落地接入 MCP 的 AI 采购或供应商付款代理，这些代理对可编程稳定币资金池拥有直接写入权限
  secondary: >-
    正在为人类和代理双重发起的付款采用 MainUSD 这类可编程稳定币余额的全球企业里的合规与资金运营负责人
  buyer: 负责代理工具和资金风险的工程/平台副总裁或财务系统负责人
startupThesis:
  nonObviousInsight: >-
    稀缺资源从来不是结算速度，而是慢通道无意间留出的那道隐性复核窗口。MainUSD 式的即时、多通道、覆盖 150 国的结算，恰好在代理开始直接发起付款的那一刻，把这道安全网彻底删掉。真正的缺口不是更快的通道或更慢的人工审批队列，而是一层为代理速度决策而生的实时授权层。
  beachhead: >-
    已经搭建了接入 MCP 的 AI 采购或供应商付款代理、目前只有仅拟稿写入权限的 B 轮以上市场平台和垂直 SaaS 公司——它们被卡在无法开放完全自主执行这一步，因为市面上还没有实时授权层可用
  wedge: >-
    一个即插即用的授权网关，拦截每一笔代理发起的付款意图，让它在抵达稳定币结算通道之前先过一遍毫秒级的供应商白名单、采购订单匹配和频率检查，再针对具体的代理、任务和模型调用给出留痕可审计的暂扣或放行决定
  whyNowCatalyst: >-
    Mosta 的 MainUSD 明确把单一可编程余额开放给接入 MCP 的 AI 代理，覆盖 150 多个国家，证明厂商已经默认代理——而不只是人——会自主、全球化地花掉公司的钱。
  ventureScalePath: >-
    从采购和供应商付款代理的护栏起步，扩展到差旅预订、订阅续费等其他触碰资金池的自主商务代理，最终成为跨稳定币和传统通道的代理发起资金流动的默认身份与访问层。
solution: >-
  我们提供一套 SDK 和 API，接在任何接入 MCP 或自研的 AI 代理与其底层可编程稳定币余额（比如 MainUSD）之间。代理生成的每一笔付款意图都会实时对照供应商白名单、采购订单与发票匹配、频率和风险敞口限额，以及基于历史代理行为训练的异常模型打分，然后在毫秒级内被暂扣或放行。审批通过的付款按底层通道原本的速度结算；被标记的付款则暂停，附带结构化说明并转交人工复核，通道支持的情况下还有一键可撤销的暂扣。每一次决策——涉及的代理、任务、模型调用，以及触发的策略——都会写入审计轨迹，供财务和安全团队用于 SOC2、反洗钱（AML）和内部风险审查。随着时间推移，这些异常模型和策略库会沉淀成一层可复用的信任层，客户每部署一个新代理都能直接复用同一个资金池上积累的经验。
goToMarketSeed:
  firstCustomer: >-
    一家 B 轮到 C 轮的垂直 SaaS 或 B2B 市场平台公司，它已经在用仅拟稿模式运行一个接入 MCP 的 AI 采购或供应商付款代理，代理连接的是 MainUSD 式可编程稳定币余额，现在想把代理切换到自主执行模式，覆盖排名前 20-50 的高频海外供应商
  buyingTrigger: >-
    公司内部决定把 AI 采购或付款代理从拟稿待批模式切换到自主执行，通常是被代理建议的付款量超出人工复核团队处理能力这一现实逼出来的
  currentAlternative: >-
    针对每一笔代理建议付款走基于 Slack 或 ERP 的人工审批队列，或者代理与稳定币余额之间一条没有护栏的直连 API
  switchingReason: >-
    通用 ERP 审批流程是按人的节奏设计的，跑不动覆盖 20 多条区块链、150 多个国家的次秒级、感知代理上下文的策略检查；而无护栏的直连又没有任何机制能在资金离开账户前拦下一张幻觉发票或一个被攻破的代理
  pricingHypothesis: 按代理发起并经过筛查的付款金额收取用量费，外加每个接入代理的平台费
whyNow:
  - point: >-
      Mosta 明确把 MainUSD 设计成让 AI 代理直接交易的产品，证明厂商预期代理很快就会自主持有和花钱，而不是要等上好几年。
    signalRefs:
