jobsToBeDone:
  - job: >-
      当我们让 AI 采购代理从仅拟稿模式转向自主付款执行时，帮助平台工程团队对每一笔付款做实时授权，这样代理就能按自己的节奏交易，而不被人工瓶颈卡住。
    currentAlternative: 针对每一笔代理建议的付款，在 Slack 或 ERP 里走人工审批队列
    successMetric: 无需人工复核就能自主放行的代理发起付款占比，以及审批队列积压的下降幅度
  - job: >-
      当合规或安全团队需要事后解释一笔代理发起的跨境稳定币付款时，帮他们生成一条完整的审计轨迹，关联到具体代理、任务和策略决策，这样他们才能通过 SOC2 和反洗钱审查，而不用手工拼凑日志。
    currentAlternative: 在事故或审计要求发生后，手工比对代理日志、大模型调用记录和结算记录
    successMetric: 为任意一笔代理发起付款生成可供审计说明所需的时间
ideaScorecard:
  signalStrength:
    score: 3
    rationale: >-
      只有一篇经抓取验证的信源（证据确信度 5 分中的 2 分）覆盖 Mosta 的发布，但把代理定位为一线经济主体的表述具体而扎实。
  painIntensity:
    score: 4
    rationale: >-
      随着代理发起的付款量增长，团队已经被卡在风险自主和审批队列瓶颈之间——这是一个真实存在的运营卡点。
  wedgeClarity:
    score: 4
    rationale: 一个范围收窄的授权网关产品，有清晰的从仅拟稿到自主执行的触发点，以及明确的集成界面。
  defensibility:
    score: 3
    rationale: >-
      通道方自己也能加上基础检查，不过跨通道、跨代理的异常数据会随时间复利积累，而单一发行商没有太大动力去通用化地建这套东西。
  ventureScale:
    score: 4
    rationale: >-
      滩头市场虽窄，但护栏模式能泛化到每一类自主商务代理和每一条结算通道，不局限于某一家稳定币发行商。
topRisks:
  - name: 通道方打包整合
    description: >-
      Mosta、Brale 或竞争对手稳定币发行商可能会在 MainUSD 内原生上线基础的支出限额和白名单功能，从而削弱独立护栏层的存在价值。
    mitigation: >-
      从第一天起就保持通道中立，同时对接多家稳定币发行商和卡组织，拿下没有单一发行商愿意通用化投入的跨通道策略引擎和审计轨迹。
  - name: 市场为时过早
    description: >-
      多数企业可能仍然对赋予 AI 代理真正的付款执行权限过于谨慎，导致试点体量长期偏小，撑不起这门生意。
    mitigation: >-
      先以影子模式上线，让护栏为每一笔代理建议的付款打分而不真正拦截，在客户把代理切到完全自主执行之前先积累信任和异常数据。
  - name: 责任风险敞口
    description: >-
      一笔漏过护栏的欺诈性或受制裁的跨境付款，可能让这家初创公司卷入责任纠纷，或招致针对代理执行资金流动的监管审查。
    mitigation: >-
      设定合同责任上限，接入成熟的制裁和反洗钱筛查服务商而不是自建筛查系统，并且无论自主程度多高，始终保留人工覆盖和一键熔断开关。
