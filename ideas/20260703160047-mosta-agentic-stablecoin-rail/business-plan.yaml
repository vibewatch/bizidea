slug: mosta-agentic-stablecoin-rail
date: "2026-07-03"
executiveSummary: >-
  The company sells a real-time authorization layer for AI-initiated supplier and contractor payments that sits in front of programmable stablecoin or hybrid payout rails. The first customer is a Series B-C marketplace, vertical SaaS, or fintech operator that already runs an MCP-connected procurement or vendor-payment agent in draft-only mode because human reviewers still gate every release. The buying trigger is specific: queue volume from recurring international vendors grows past what finance reviewers can clear, or the company launches a stablecoin or hybrid corridor where instant settlement removes the old review window. The MVP should start in shadow mode on one agent, one payment stack, and 20-50 approved vendors, proving which payment intents would clear automatically under vendor, invoice, purchase-order, and velocity rules before turning on hard release or hold. This beachhead is better than generic enterprise AP automation because the pain is tied to autonomous execution, irreversible cross-border settlement, and a budget owner who already funds payments, treasury, fraud, or finance-systems controls. Research supports a modeled $491M TAM, $176M SAM, and $6.8M year-three SOM for the initial category, but the strongest unknown is not market size; it is whether enough target accounts have real draft-only queue volume and production-ready business context at authorization time. The strategic risk is that rail-native or treasury-native vendors bundle good-enough policy controls before a standalone control plane becomes the default. Funding should therefore stay pre-seed sized and focused on shadow-mode proof, 3-5 paid design partners, and one repeatable pilot-to-production motion rather than broad rail coverage or consumer agent payments.
problem:
  - "Instant stablecoin or hybrid rails remove the multi-day review window just as AI agents begin initiating supplier and contractor payments directly, leaving companies stuck between slow manual approval queues and risky direct API access to treasury balances."
  - "Existing wallet, ERP, and approval tools do not evaluate agent, task, vendor, invoice, and corridor context together at authorization time, so they cannot explain or block a hallucinated invoice, compromised agent, duplicate payment, or out-of-policy payout before funds move."
solution:
  - "Insert an authorization gateway between the agent and the payment stack that scores each payment intent against vendor allowlists, invoice or PO matches, threshold and velocity policies, corridor rules, and partner-provided sanctions, AML, or account-validation checks."
  - "Start in shadow mode, then enforce millisecond hold or release decisions with a finance review console and audit log that ties every decision to the agent, task, model call, vendor, and final settlement outcome."
whyWeWin:
  - "Neither issuers and networks nor treasury and wallet vendors currently own the rail-agnostic, agent-aware decision layer that combines payment intent, business context, and policy evidence; adjacent competitors stop at settlement, ledgering, wallet governance, or manual approvals."
  - "A cross-customer corpus of agent-task-vendor outcomes, false positives, holds, and releases improves policy templates and anomaly detection faster than any single rail or in-house queue can, while the linked audit trail becomes procurement and compliance infrastructure rather than optional monitoring."
strategicChoices:
  beachhead: "Series B-C cross-border software, marketplace, and fintech operators moving recurring supplier or contractor payouts from draft-only agent suggestions to autonomous execution on provider-managed stablecoin or hybrid rails."
  wedgeRationale: >-
    This slice creates the fastest proof because recurring vendors provide structured context such as vendor master, invoice, PO, and threshold data, the buyer already feels approval-backlog pain, and a shadow-mode pilot can quantify auto-clear rate and reviewer hours saved within weeks. Broader agentic commerce, card spend, or consumer checkout would require harder identity, dispute, and merchant-acceptance problems before the core authorization thesis is proven.
  sequencingRationale: >-
    Product starts with supplier and contractor payouts in shadow mode, then turns on enforced hold and release for top recurring vendors, then adds second rails and adjacent payout workflows. GTM follows the same order: direct design-partner sales first, co-sell motions with stablecoin issuers and treasury vendors after one production proof point, and broader developer-led adoption only once audit and compliance buyers trust the evidence model. Hiring stays engineering- and solutions-heavy until the first 2-3 pilots convert because integration quality and policy accuracy matter more than top-of-funnel volume at this stage.
  notYet:
    - "Consumer agent commerce, checkout, and micropayments"
    - "Owning settlement, custody, or AML screening instead of integrating partners"
    - "Broad card, travel, and subscription-spend control before supplier and contractor payouts work repeatably"
    - "Domestic human-only AP approval workflows where instant settlement is not the bottleneck"
market:
  tam: "$491M estimated TAM based on research's bottom-up model of B2B stablecoin payment volume, enterprise workflows needing ex-ante authorization, and a 0.30% blended software yield"
  sam: "$176M estimated SAM for early-adopter software, marketplace, and fintech cross-border payment workflows moving toward autonomous execution"
  som: "$6.8M estimated year-three SOM based on 25 reachable accounts at roughly $90M annual screened volume and a 0.30% blended yield"
  segments:
    - "Cross-border software, marketplace, and fintech operators moving recurring supplier payouts from draft-only agent suggestions to autonomous execution"
    - "Global B2B platforms adding stablecoin or hybrid contractor payout rails but still keeping agents behind manual review queues"
  buyingProcess: >-
    The usual champion is a head of platform, payments, or finance systems who owns both agent tooling and treasury APIs, with compliance or treasury as required approvers. A credible first sale is a paid shadow-mode pilot on one agent and one vendor cohort that converts once the buyer sees a measurable auto-clear rate, faster queue throughput, and audit-ready evidence for every held or released payment.
product:
  mvp: >-
    MVP covers one agent, one payment stack, and one recurring supplier or contractor payout workflow. It ingests payment intents before execution, checks vendor allowlists, invoice or PO matches, corridor thresholds, and velocity limits, logs every decision, and routes exceptions to a human reviewer; the first release should support shadow mode before hard blocking or release.
  sixMonth: "Ship paid shadow-mode pilots with one stablecoin or hybrid rail connector, one ERP or AP data connector, a human review console, and partner-driven sanctions, AML, and account-validation checks so customers can prove auto-clear rate and backlog reduction safely."
  twelveMonth: "Turn on enforced hold or release for approved vendor cohorts, add a second rail or treasury connector, and productize a reusable policy template library by corridor, vendor class, and workflow."
  twentyFourMonth: "Expand from supplier payouts into contractor and treasury payouts, add fiat and stablecoin hybrid coverage behind the same authorization API, and launch benchmarking and audit analytics that make the control plane harder to replace."
  keyBets:
    - "Customers can provide vendor, invoice, PO, or contract context for most in-scope payment intents at authorization time."
    - "Shadow mode will show that 60%+ of recurring vendor payment intents can clear automatically under deterministic policy before anomaly models are heavily trained."
    - "Finance and compliance teams will accept human-reviewable holds and explicit policy evidence instead of forcing every agent payment back into generic ERP approval queues."
    - "The same policy engine can extend from supplier payouts to contractor and treasury payouts without turning into a custom-services business."
gtm:
  wedge: >-
    Sell a 90-day shadow-mode pilot that scores every draft-only agent payment for one recurring vendor cohort, proves which intents would have cleared automatically, and then turns on enforced hold or release for the safest subset of vendors. This ties the first customer, trigger, pricing, and proof point to the same workflow instead of asking buyers to fund a generic agent-governance platform.
  channels:
    - "Founder-led direct sales to heads of platform, payments, treasury, and finance systems at cross-border software and marketplace operators"
    - "Co-sell with stablecoin issuers, treasury platforms, and payment orchestration vendors that need a control layer to unblock autonomous execution"
    - "Developer-led pull through MCP, machine-payments, and treasury SDK integrations once the finance-control narrative is proven"
  funnelTargets: "lead→qualified design partner 15-25%, qualified design partner→paid shadow-mode pilot 40-50%, paid pilot→enforced production 50%+, production→second agent or workflow expansion 30%+ within 12 months"
  pricing: >-
    Annual platform minimum plus a basis-point fee on screened agent-initiated payment volume and a per-connected-agent floor. This aligns pricing with the liability and throughput transferred from human reviewers to the control plane; a credible landing motion is a $50k-$100k paid pilot converting to roughly $150k-$250k ARR plus usage once enforced hold or release is live.
businessModel:
  revenueStreams:
    - "Annual platform subscription for the authorization engine, review console, and audit workspace"
    - "Usage-based fee on screened agent-initiated payment volume"
    - "Onboarding and policy-design fees for new rails, workflows, or vendor cohorts"
  unitOfValue: "Agent-initiated payment intent screened and governed under policy"
  targetGrossMarginPct: 75
  expansionLevers:
    - "Add second and third agents or payout workflows inside an existing account"
    - "Expand from one rail to multi-rail stablecoin and hybrid fiat coverage without changing the customer's approval model"
    - "Upsell audit analytics, benchmarking, and premium policy packs for new corridors or vendor classes"
strategyMap:
  northStarMetric: "Production agent-initiated payment volume released under policy without human review or post-settlement policy escapes"
  inputMetrics:
    - "Shadow-mode auto-clear rate on recurring vendor cohorts"
    - "Median authorization latency from payment intent to release or hold"
    - "Percent of in-scope intents with vendor, invoice, or PO context attached at authorization time"
    - "Paid pilot to enforced production conversion rate"
    - "Net revenue retention from additional agents, rails, and workflows"
  moatsToBuild:
    - "Rail-agnostic dataset linking agent identity, task, vendor, corridor, amount, policy result, and settlement outcome"
    - "Policy template library built from real hold and release outcomes across vendor classes and cross-border corridors"
    - "Audit evidence graph that finance, compliance, and treasury teams accept as the system of record for agent-initiated payments"
  killCriteria:
    - "Fewer than 2 of the first 6 target accounts show at least 200 monthly draft-only agent payment intents or equivalent backlog, undermining the pain-frequency assumption."
    - "Shadow-mode pilots fail to auto-clear at least 50% of in-scope recurring vendor payments without materially increasing false positives."
    - "Paid pilot to enforced production conversion stays below 40% after the first 5 pilots."
    - "More than half of late-stage prospects choose bundled rail-native or treasury-native controls over the standalone control plane."
  mermaid: |
    flowchart LR
      Wedge[Draft-only agent payment backlog] --> MVP[Shadow-mode authorization MVP]
      MVP --> Proof[Auto-clear rate and audit proof]
      Proof --> Expansion[Enforced production plus multi-rail expansion]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Clear control-plane wedge with strong infrastructure tailwinds, but conviction stays capped until real draft-only queue volume and pilot conversion are proven."
    whyBelieve: "Major rails, networks, and agent-payment protocols validate that autonomous money movement is arriving now, while research still shows no default winner for pre-settlement, rail-agnostic authorization tied to agent and vendor context."
    whyDoubt: "If enterprises keep agents in draft-only mode longer than expected or accept bundled controls from treasury and rail vendors, the standalone wedge compresses before the company earns distribution and data advantages."
    nextDiligence: "Get shadow-mode logs and budget-owner interviews from 5-8 target accounts to prove queue volume, auto-clear rate, and willingness to pay for enforced release."
  firstCustomer:
    title: "Head of finance systems or VP payments at a Series B-C cross-border software or marketplace operator"
    profile: "A 100-500 employee company with recurring international supplier or contractor payouts, an MCP-connected procurement or payment agent, and a provider-managed stablecoin or hybrid payout stack that is still stuck in draft-only mode."
    trigger: "The company decides to move one agent from draft-and-approve to autonomous execution because reviewer backlog is growing or a new stablecoin or hybrid corridor removes the old settlement delay."
    buyer: "Head of Finance Systems, VP Payments, or Treasurer"
    initialContract: "90-day paid shadow-mode pilot for one agent and 20-50 approved vendors at $50k-$100k, converting to roughly $150k-$250k ARR plus volume fees when enforced hold or release goes live."
  mustBeTrue:
    - "Target accounts already hold enough draft-only agent payment volume that reviewer backlog is a board-level throughput or risk problem, not a future concern."
    - "At least half of in-scope recurring vendor payment intents can clear automatically under deterministic policy with acceptable false-positive rates."
    - "ERP, AP, and vendor-master systems expose enough real-time context to evaluate most payment intents before settlement."
    - "The economic buyer will fund a dedicated control layer from payments, treasury, fraud, or finance-systems budget rather than wait for bundled native controls."
    - "The product can expand from supplier payouts to adjacent contractor or treasury flows without a custom rewrite for each customer."
  diligenceQuestions:
    - "How many weekly or monthly agent-suggested payment intents sit in draft-only queues at 10 named target accounts?"
    - "Which system is the source of truth for vendor, invoice, PO, and corridor policy data at authorization time?"
    - "Who owns budget and signing authority first: platform, payments, treasury, fraud, or compliance?"
    - "What hold, release, reversal, or human-override semantics are acceptable on the first irreversible rails?"
    - "What prevents Stripe, Modern Treasury, Fireblocks, Circle, or the issuer from bundling enough of the wedge inside 24 months?"
operatingAssumptions:
  - assumption: "Target accounts already generate enough draft-only agent payment volume to justify a dedicated control plane."
    basis: research.yaml
    validationTest: "Collect shadow-mode or approval-queue logs from 5-8 design partners and confirm at least 200 monthly in-scope intents or comparable recurring backlog per account."
    decisionImpact: "If false, narrow to a single higher-frequency workflow or treat the market as a longer-term watchlist rather than a venture-backed wedge."
  - assumption: "Vendor, invoice, PO, or contract data is available fast enough to make sub-second authorization decisions for most recurring payments."
    basis: research.yaml
    validationTest: "Map live API fields and payload completeness across the first 3 design partners and require 80%+ coverage on in-scope intents before enabling enforced release."
    decisionImpact: "If false, MVP must stay shadow mode or shift to read-only analytics until data completeness improves."
  - assumption: "Shadow-mode proof is enough to convert buyers from manual queues to enforced hold or release for their safest vendor cohorts."
    basis: research.yaml
    validationTest: "Run 2-3 paid pilots and measure whether at least one customer turns on enforced release for 20-50 vendors within 90 days of seeing shadow-mode results."
    decisionImpact: "If false, the product risks becoming reporting software with weaker pricing and lower stickiness."
  - assumption: "Rail-agnostic positioning beats single-provider bundling for the first 24 months."
    basis: operator judgment
    validationTest: "Track win or loss reasons across the first 15 enterprise deals and confirm prospects cite multi-rail policy portability or agent-context depth as a decisive reason to buy."
    decisionImpact: "If false, partner more deeply with one provider or reposition as an embedded control module rather than a standalone platform."
  - assumption: "The policy engine can expand from supplier payouts into contractor and treasury payouts without material custom-services load."
    basis: idea.yaml
    validationTest: "Prototype one adjacent workflow by month 12 with an existing customer and require deployment inside 6-8 weeks using the same policy core."
    decisionImpact: "If false, keep the company focused on supplier payouts and finance it as a narrower category tool."
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Interview 12-15 heads of platform, payments, treasury, and finance systems at target operators and collect queue-volume, budget-owner, and agent-readiness data."
    hypothesis: "The first repeatable buyer is dealing with real draft-only backlog today, and budget sits with payments or finance systems rather than a generic AI innovation fund."
    successMetric: "At least 8 interviews confirm a live draft-only queue and 5 accounts identify one consistent signing function."
    owner: "Founder CEO"
  - horizon: "0–90 days"
    experiment: "Shadow-score historical payment intents from one design partner using vendor allowlist, invoice match, and velocity rules."
    hypothesis: "Deterministic policy can auto-clear most recurring vendor intents before anomaly modeling is required."
    successMetric: "50%+ of historical in-scope intents would clear automatically with less than 5% disputed decisions in retrospective review."
    owner: "Founding eng"
  - horizon: "90–180 days"
    experiment: "Launch 2 paid shadow-mode pilots on one agent, one rail, and one vendor cohort each."
    hypothesis: "A shadow-mode pilot sells faster than an end-to-end autonomy platform because buyers can quantify throughput gains without ceding control on day one."
    successMetric: "2 paid pilots launched and at least one renews or expands within 6 months."
    owner: "Founder CEO"
  - horizon: "90–180 days"
    experiment: "Run finance and compliance walkthroughs of hold or release, audit export, and human override on the first irreversible rail."
    hypothesis: "Risk teams will approve enforced release for a safe vendor cohort if every decision is explainable and reversible where the provider supports it."
    successMetric: "One pilot customer signs off on enforced release for 20-50 vendors and accepts the audit evidence format."
    owner: "Product / compliance lead"
  - horizon: "180–365 days"
    experiment: "Add a second rail or treasury connector and convert the first 2-3 pilots into annual production contracts."
    hypothesis: "Rail-agnostic portability and multi-workflow expansion materially increase willingness to pay and reduce bundling risk."
    successMetric: "2 annual contracts signed and at least one account expands to a second workflow or rail."
    owner: "Solutions engineer"
  - horizon: "12–18 months"
    experiment: "Pilot contractor or treasury payout coverage with one existing production customer."
    hypothesis: "The same authorization core generalizes beyond supplier invoices without a services-heavy rewrite."
    successMetric: "Adjacent workflow deploys in under 8 weeks with ACV expansion attached."
    owner: "Founding eng"
operations:
  - "Real-time authorization service with cached vendor and invoice context plus fail-closed hold behavior when required data is missing"
  - "Human review queue, audit export, and policy change-management process shared by finance, security, and treasury"
  - "Partnerships with sanctions, AML, and account-validation providers rather than building regulated screening in-house"
  - "Onboarding playbook to map agent identity, vendor cohorts, corridor rules, and ERP or AP data before production release"
  - "Co-sell enablement with issuers, treasury platforms, and orchestration vendors once the first production proof point is live"
team:
  - role: "Founder CEO / payments-risk lead"
    startTiming: "Month 0"
    rationale: "The first sale requires someone who can sell to platform, payments, and compliance stakeholders while shaping the policy model around real workflows."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Building the authorization engine, SDK, and shadow-mode pipeline is the core technical risk."
  - role: "Solutions engineer"
    startTiming: "Month 3"
    rationale: "Customer deployment depends on fast ERP or AP and payment-stack integration, not just core product code."
  - role: "Product / compliance lead"
    startTiming: "Month 6"
    rationale: "Policy templates, audit evidence, and partner screening workflows need dedicated ownership before hard-release production deployments."
  - role: "Founding GTM / design-partner lead"
    startTiming: "Month 9"
    rationale: "Once the first pilots are live, a dedicated operator is needed to manage a concentrated enterprise pipeline and co-sell partnerships without pulling the founder out of product discovery."
milestones:
  - horizon: "0-12 months"
    items:
      - "Sign 3 paid design partners and launch shadow-mode scoring on at least 2 live agent payment workflows."
      - "Prove 50%+ auto-clear rate on one recurring vendor cohort and cut manual reviewer touches by at least 30%."
      - "Turn on enforced hold or release for one production customer covering 20-50 approved vendors."
      - "Validate budget owner, data availability, and acceptable hold or release semantics across 5-8 target accounts."
  - horizon: "12-24 months"
    items:
      - "Convert 3-5 design partners into annual contracts in the $150k-$250k ARR plus usage band."
      - "Ship a second rail or treasury connector, reusable policy packs, and premium audit analytics."
      - "Expand at least 2 customers to a second agent or payout workflow."
      - "Establish one durable co-sell channel with a stablecoin issuer, treasury platform, or orchestration vendor."
  - horizon: "24-36 months"
    items:
      - "Approach the researched year-3 SOM of ~$6.8M through 20-25 production accounts and expanded screened volume."
      - "Cover supplier, contractor, and treasury payout workflows behind one authorization API."
      - "Make the agent-task-vendor outcome dataset a defensible benchmark and policy-training asset customers cannot reproduce in-house."
risks:
  - risk: "Enterprises may keep agents in draft-only mode longer than the plan assumes, limiting production volume and delaying usage-based revenue."
    likelihood: High
    impact: High
    mitigation: "Start with paid shadow-mode pilots, target customers already hitting approval bottlenecks, and support provider-managed stablecoin or hybrid flows so buyers do not need to hold stablecoins directly."
  - risk: "Rail, treasury, or wallet vendors could bundle sufficient policy controls before the standalone authorization layer becomes entrenched."
    likelihood: Medium
    impact: High
    mitigation: "Stay rail-agnostic, integrate with multiple providers, and differentiate on agent-task-vendor context, policy portability, and audit analytics rather than basic spend limits."
  - risk: "Missing or inconsistent ERP, AP, or vendor-master data could make real-time authorization noisy or services-heavy."
    likelihood: Medium
    impact: High
    mitigation: "Start with recurring vendor cohorts where context is cleanest, cache required data, and keep hard release off until coverage thresholds are met."
  - risk: "A false release involving sanctions, fraud, or a hallucinated invoice could create liability and trust damage."
    likelihood: Medium
    impact: High
    mitigation: "Use partner screening, fail-closed holds, explicit human override, and contractually narrow liability until the policy engine has production history."
  - risk: "Enterprise sales cycles may concentrate around a small number of technically sophisticated buyers who demand deep customization."
    likelihood: Medium
    impact: Medium
    mitigation: "Sell one narrow workflow with repeatable connectors and policy packs, and avoid taking on bespoke procurement automation or settlement orchestration scope."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "18 months funds a 4-5 person team, shadow-mode and enforced-release product development, first ERP or AP and rail connectors, 3-5 paid design-partner deployments, one co-sell channel, and enough production proof to decide whether a rail-agnostic agent-payment control plane can outgrow bundled alternatives."
