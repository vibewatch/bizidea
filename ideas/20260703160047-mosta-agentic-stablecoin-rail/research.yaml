competitors:
- name: Fireblocks
  stage: incumbent
  wedge: Wallet, custody, governance, and digital-asset policy infrastructure.
  pricing: Custom / enterprise sales
  strength: Strong governance and policy primitives at the wallet and treasury layer.
  weaknessVsUs: Wallet-centric rather than procurement-, vendor-, and model-call-aware across stablecoin and fiat workflows.
  sourceRefs:
  - 37
  - 40
- name: Modern Treasury
  stage: scale-up
  wedge: One API for fiat and stablecoins plus real-time ledger and payment operations.
  pricing: Custom / enterprise sales
  strength: Deep payment execution, balance management, and reconciliation credibility.
  weaknessVsUs: Optimizes movement and accounting, not agent-specific intent validation before settlement.
  sourceRefs:
  - 38
- name: BVNK
  stage: scale-up
  wedge: Stablecoin-native cross-border payments and orchestration infrastructure.
  pricing: Custom / enterprise sales
  strength: Clear focus on near-instant global value movement across fiat and stablecoin rails.
  weaknessVsUs: Closer to the rail and orchestration layer than to the transaction-level authorization and audit layer.
  sourceRefs:
  - 39
- name: Payman AI
  stage: startup
  wedge: Agentic banking orchestration with independent policy and execution layers.
  pricing: Custom / enterprise sales
  strength: Directly validates that AI-money workflows need a policy layer separated from reasoning.
  weaknessVsUs: Bank-centric and broader than the specific stablecoin cross-border vendor-payment wedge.
  sourceRefs:
  - 35
  - 36
- name: Skyfire
  stage: startup
  wedge: Agent identity, micropayments, and internet-native payment rails for AI agents.
  pricing: Custom / enterprise sales
  strength: Strong framing around agent identity, micropayments, and transaction-level trust.
  weaknessVsUs: More focused on agent-to-service commerce and identity than on enterprise AP-style control logic and ERP context.
  sourceRefs:
  - 34
