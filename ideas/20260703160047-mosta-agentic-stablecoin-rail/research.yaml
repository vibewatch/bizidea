openQuestions:
- How much screened annual volume can an early design-partner account route before it prefers lower basis-point pricing and higher fixed platform fees?
- Will issuers and treasury platforms bundle enough native policy controls in the next 12-18 months to narrow the standalone wedge materially?
- Which ERP, AP, and vendor-master integrations are reliable enough to support sub-second pre-settlement checks in production?
- What evidence package do risk teams need to accept agent-initiated payments on irreversible rails without forcing humans back into the critical path?
