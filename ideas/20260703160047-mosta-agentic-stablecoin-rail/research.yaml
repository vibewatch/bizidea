  sourceRefs:
  - 32
- point: Issuer-side regimes such as MiCA and Hong Kong’s stablecoin framework constrain which assets, issuers, and jurisdictions can be supported cleanly.
  sourceRefs:
  - 30
  - 31
- point: Payment fraud frameworks increasingly expect layered controls such as dual approval, account validation, and out-of-band verification for non-consumer credit pushes.
