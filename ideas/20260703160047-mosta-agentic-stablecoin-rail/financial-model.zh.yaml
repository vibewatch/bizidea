scenarios:
  downside:
    description: "生产转化推迟一到两个季度，导致公司在第三年结束时付费客户更少，可复用模板带来的毛利提升也更慢。"
    y3RevenueK: 3858.0
    y3EbitdaK: -246.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
    - 第三年第四季度期末客户数约为 16 个，而不是 20 个。
    - 混合年化价值收官在约 28.5 万美元，而不是 30 万美元，因为第二工作流扩展落地更晚。
    - 毛利率收官在约 72%，因为实施和合作方筛查工作仍更依赖人工。
  base:
    description: "三个付费共创客户跑通一条可复制的试点转生产路径，到第二年第四季度带来 9 个付费客户，第三年第四季度达到 20 个。"
    y3RevenueK: 4617.0
    y3EbitdaK: 306.6
    cashLowPointK: 711.7
    keyAssumptionChanges:
