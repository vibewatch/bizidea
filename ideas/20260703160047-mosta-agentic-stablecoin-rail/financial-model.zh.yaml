modelSanity:
- checkName: "收入引擎"
  finding: "基准收入的驱动力，是付费账户数从第一年收官的 3 个增长到第三年第四季度的 20 个，同时随着用量费和第二工作流扩展叠加，混合年化价值收官在约 30 万美元。"
- checkName: "必须跑对的环节"
  finding: "必须有至少 2-3 个试点在约 90 天内转化为生产环境，否则仅靠有节制的 GTM 扩张，模型撑不起第二年第二季度的里程碑。"
- checkName: "模型崩溃的临界点"
  finding: "如果销售周期拉长到 150 天左右，或毛利率停滞在约 72%，下行情形会把现金底部推向约 40 万美元，而这时种子轮就绪的验证还没有拿到。"
- checkName: "下一轮融资所需验证"
  finding: "种子轮的故事是：5 个付费客户、2-3 个生产转化、一个第二连接器，以及一条可复制的共同销售动作，证明这层独立控制层能跑赢打包方案。"
sanityChecks:
  ruleOf40: "第三年增速 169.5% + EBITDA 利润率 6.6% = 176.2%"
  burnMultiple: "第二年烧钱倍数约为 0.5 倍：约 78.07 万美元的 EBITDA 烧钱对应约 171.6 万美元的净新增 ARR；第三年第二季度 EBITDA 转正。"
  revenuePerFte: "第三年人均收入 30.78 万美元，对应 15 名期末全职员工（对标 SaaS 行业 20万-40万美元的基准）"
  flags:
  - 基准情形仍然假设在一个高度集中的买家池里，到第三年第四季度拿下 20 个付费客户，所以必须有一条共同销售渠道从偶发变成可复制。
  - customersEop 既包含付费试点也包含生产合同，所以完全经常性的生产客户数，在第一年和第二年早期都会滞后于表面统计口径。
  - 毛利率要达到 75%，前提是连接器、策略模板和合作方筛查流程都实现标准化；如果定制化接入长期持续，会明显压缩 EBITDA。
  - 商业计划书和研究部分都把真实的仅拟稿队列量列为核心未知数，所以如果共创客户的积压量不足，收入爬坡会在定价成为问题之前就先崩掉。
  - 如果公司无法证明通道无关的策略深度和审计证据的价值，通道原生或资金原生的打包管控方案可能会在第三年之前就压缩这道切口。
  - 现金按 EBITDA 建模；账单时点、实施预付款，或安全/合规方面的资本支出，都可能改变实际的现金跑道。
