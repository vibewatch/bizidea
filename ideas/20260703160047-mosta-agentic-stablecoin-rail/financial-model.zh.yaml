slug: "mosta-agentic-stablecoin-rail"
date: "2026-07-03"
currency: "USD"
modelStartMonth: "2026-08"
assumptions:
- id: "A1"
  name: "模型起始月"
  value: "2026-08"
  unit: "YYYY-MM"
  source: "[BP date 2026-07-03] 模型从有明确日期的商业计划书之后的第一个完整运营月开始。"
- id: "A2"
  name: "期初现金／种子前轮融资"
  value: "$2.3M"
  unit: "USD"
  source: "[BP fundingAsk.targetFundingRangeUsd $2-4M + BP fundingAsk.runwayMonths 18 + model cash curve] 基准情形采用精简的种子前轮规模，留出约六个月缓冲，用来达成第一个可复制的生产转化里程碑。"
- id: "A3"
  name: "起始付费账户数（M1）"
  value: "0"
  unit: "count"
  source: "[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，必须先拿下付费共创客户。"
- id: "A4"
  name: "付费账户定义"
  value: "付费账户指正在执行策略管控的付费影子模式试点，或者生产环境年度合同。"
  unit: "definition"
  source: "[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 统计所有已经在为试点或生产范围付费的客户。"
- id: "A5"
  name: "付费试点经济模型"
  value: "约 3 个月内 7.5 万美元（约合每月 2.5 万美元）"
  unit: "USD/account"
  source: "[BP investorMemo.firstCustomer.initialContract $50k-$100k pilot] 基准情形采用 90 天影子模式部署付费试点区间的中位值。"
- id: "A6"
  name: "生产合同底线"
  value: "在用量费和接入费叠加之前，年度合同价 21 万美元"
  unit: "USD/account/year"
  source: "[BP gtm.pricing roughly $150k-$250k ARR plus usage] 模型把首批生产客户落在 BP 年度区间的中段，然后再叠加筛查量费用增长。"
- id: "A7"
  name: "第三年到期时成熟账户的年化价值"
  value: "到第三年第四季度年化约 30 万美元"
  unit: "USD/account/year"
  source: "[Research market.som $6.8M based on 25 accounts × $90M screened volume × 0.30% yield = about $270K/account/year + BP businessModel.expansionLevers] 基准情形略高于研究部分的交叉验证值，因为最优质账户会叠加第二工作流扩展和接入费。"
- id: "A8"
  name: "客户增长曲线"
  value: "到第 12 个月 3 个付费账户，第二年第四季度 9 个，第三年第四季度 20 个"
  unit: "customersEop"
  source: "[BP milestones 0-12, 12-24, 24-36 + BP gtm.funnelTargets + Research market.som] 基准情形低于完整 25 个账户的 SOM，但仍假设到第三年会有一条共同销售渠道跑通并可复制。"
- id: "A9"
  name: "收入确认惯例"
  value: "展示收入等于期末付费账户数乘以该期实现的单账户收入：第一年约每月 2.2 万-2.5 万美元，第二年约每季度 6.3 万-7.2 万美元，第三年约每季度 7.2 万-7.5 万美元。"
  unit: "formula"
  source: "[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som] 这样能让收入直接追溯到付费账户数，以及试点转生产的混合比例。"
- id: "A10"
  name: "毛利率爬坡"
  value: "第一年 55%-62%，第二年 64%-71%，第三年 72%-75%"
  unit: "gross margin percent"
  source: "[BP businessModel.targetGrossMarginPct 75 + BP operations + Research reportMemo.partnershipEcosystem] 在连接器和策略模板实现标准化之前，合作方筛查和高触达接入会压低早期毛利率。"
- id: "A11"
  name: "招聘时间线"
  value: "第 1 个月创始人和创始工程师；第 4 个月解决方案工程师；第 7 个月产品/合规负责人；第 10 个月 GTM 负责人；第 13 个月第二名工程师；第 16 个月第二名解决方案工程师；第 22 个月第三名工程师；第 23 个月运营；第 27 个月第二名 GTM；第 28 个月第四名工程师；第 29 个月第二名产品/合规；第 31 个月第三名解决方案工程师；第 34 个月第五名工程师；第 35 个月第三名 GTM。"
  unit: "timeline"
  source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 在试点转生产的转化得到验证之前，招聘持续偏重工程和交付，随后才按节奏增加 GTM 人力。"
- id: "A12"
  name: "创始人综合薪酬"
  value: "$180K"
  unit: "USD/year"
  source: "[BP team Founder CEO / payments-risk lead + startup-finance heuristic] 精简的创始人现金薪酬，外加工资税和福利。"
- id: "A13"
  name: "工程综合薪酬"
  value: "$210K"
  unit: "USD/year"
  source: "[BP team Founding eng + startup-finance heuristic] 需要资深的支付与基础设施工程人才，但种子前轮的薪酬仍低于上市公司现金水平。"
- id: "A14"
  name: "解决方案综合薪酬"
  value: "$185K"
  unit: "USD/year"
  source: "[BP team Solutions engineer + BP operations onboarding playbook + startup-finance heuristic] 客户部署速度取决于 ERP/AP 和通道集成的质量。"
- id: "A15"
  name: "产品/合规综合薪酬"
  value: "$175K"
  unit: "USD/year"
  source: "[BP team Product / compliance lead + Research regulatoryLandscape + startup-finance heuristic] 策略模板、审计证据和合作方筛查流程需要专人负责。"
- id: "A16"
  name: "GTM 综合薪酬"
  value: "$190K"
  unit: "USD/year"
  source: "[BP team Founding GTM / design-partner lead + BP gtm.channels + startup-finance heuristic] 集中式企业销售和合作方动作需要差旅预算和浮动薪酬。"
- id: "A17"
  name: "行政管理/运营综合薪酬"
  value: "$130K"
  unit: "USD/year"
  source: "[BP fundingAsk.useOfFundsSummary 4-5 person team + startup-finance heuristic] 覆盖财务、供应商管理和合规运营，而不必搭建庞大的管理层。"
- id: "A18"
  name: "薪酬分摊到损益表科目"
  value: "创始人 45% 销售与市场 / 25% 研发 / 30% 行政管理；工程 100% 研发；解决方案 55% 销售与市场 / 45% 研发；产品/合规 60% 研发 / 40% 行政管理；GTM 100% 销售与市场；运营 100% 行政管理。"
  unit: "allocation"
  source: "[BP team role rationales + BP operations] 把薪酬映射进各项职能费用科目，同时体现创始人主导销售、解决方案侧重接入的特点。"
- id: "A19"
  name: "非薪酬运营支出爬坡"
  value: "月度非薪酬销售与市场/研发/行政管理支出，从第一年早期的 4000/1万/6000 美元，涨到第三年第四季度的 2.7万/3.2万/1.9万美元。"
  unit: "USD/month"
  source: "[BP operations + startup-finance heuristic] 覆盖云服务、审计工具、差旅、法务和保险，不假设有庞大的付费获客引擎。"
- id: "A20"
  name: "现金转换惯例"
  value: "现金变动等于 EBITDA。"
  unit: "formula"
  source: "[startup-finance heuristic] 在种子前轮规模下，资本支出、融资费用、税费和营运资金时点差异都假设可忽略不计。"
- id: "A21"
  name: "稳态月度客户流失率"
  value: "2.0%"
  unit: "percent per month"
  source: "[startup-finance heuristic for early enterprise workflow SaaS + BP businessModel.expansionLevers] 一旦策略模板和审计证据嵌入工作流，粘性应该会提升，但模型相对成熟的治理类软件仍保持保守。"
- id: "A22"
  name: "基准销售周期"
  value: "从付费试点启动到首次生产转化，约 90 天"
  unit: "days"
  source: "[BP gtm.wedge 90-day shadow-mode pilot + BP experimentRoadmap 90-180 days] 基准情形假设一个季度足以为第一个安全供应商群体验证自动过关率和放行管控。"
- id: "A23"
  name: "CAC 计算惯例"
  value: "36 个月销售与市场支出除以 20 个净新增付费账户"
  unit: "formula"
  source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] 这涵盖了整个建设期内创始人主导、合作方主导和集中式企业获客。"
- id: "A24"
  name: "用于融资规模测算的下一轮里程碑"
  value: "大约到第二年第二季度，公司应拥有 5 个付费客户、2-3 个生产转化、一个已上市的第二连接器，以及一条可信的共同销售渠道。"
  unit: "milestone"
  source: "[BP fundingAsk.runwayMonths 18 + BP milestones 12-24 months + BP experimentRoadmap 180-365 days] 种子前轮的规模是为了在转化、产品可移植性和分发渠道上拿到种子轮就绪的验证。"
- id: "A25"
  name: "季度薪资滚动惯例"
  value: "第二、三年的薪资行使用每个季度内实际的月度招聘情况，而不只是季末快照。"
  unit: "convention"
  source: "[Headcount column convention + BP team.startTiming] 这让薪资科目和月度招聘节奏内部保持一致，即便第二、三年的人员编制只展示年末快照。"
