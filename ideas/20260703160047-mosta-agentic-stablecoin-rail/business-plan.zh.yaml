slug: mosta-agentic-stablecoin-rail
date: "2026-07-03"
executiveSummary: >-
  这家公司卖的是一层实时授权层，挡在可编程稳定币或混合支付通道前面，专门管 AI 发起的供应商和承包商付款。第一个客户是一家 B 轮到 C 轮的市场平台、垂直 SaaS 或金融科技运营商，它已经在跑一个接入 MCP 的采购或供应商付款代理，但因为每一次放行都要经过人工复核，代理还停在仅拟稿模式。买入触发点很具体：来自高频海外供应商的队列量涨到财务复核人员处理不过来，或者公司上线了一条稳定币或混合通道，即时结算抹掉了原本的复核窗口。MVP 应该先在影子模式下跑起来，覆盖一个代理、一套支付栈、20-50 个已批准供应商，验证在开启硬性放行或暂扣之前，哪些付款意图能在供应商、发票、采购订单和频率规则下自动过关。这个滩头市场比通用型企业 AP 自动化更好切入，因为痛点绑定的是自主执行、不可逆的跨境结算，以及一个已经在为支付、资金、欺诈或财务系统管控掏钱的预算负责人。研究测算给出的是 4.91 亿美元 TAM、1.76 亿美元 SAM、第三年 680 万美元 SOM，但最大的未知数不是市场规模，而是目标客户里到底有多少真的存在仅拟稿队列积压，以及授权那一刻能不能拿到生产级的业务上下文。战略风险在于：通道原生或资金管理原生的厂商可能会在独立控制层站稳脚跟之前，先打包出足够用的策略管控功能。因此融资应该维持在种子前轮的规模，聚焦于影子模式验证、3-5 个付费共创客户，以及一条可复制的从试点到生产的路径，而不是铺开通道覆盖或做消费级代理支付。
problem:
  - "即时稳定币或混合通道消除了原本长达数日的复核窗口，恰好赶上 AI 代理开始直接发起供应商和承包商付款，把公司卡在了两难之间：要么用缓慢的人工审批队列，要么开放存在风险的资金池直连 API。"
  - "现有的钱包、ERP 和审批工具在授权那一刻并不会把代理、任务、供应商、发票和通道上下文放在一起评估，所以它们没法在资金转移前解释或拦下一张幻觉发票、一个被攻破的代理、一笔重复付款或一次违规支付。"
solution:
  - "在代理和支付栈之间插入一个授权网关，对每一笔付款意图打分，依据是供应商白名单、发票或采购订单匹配、阈值和频率策略、通道规则，以及合作方提供的制裁、反洗钱或账户校验检查。"
  - "先以影子模式起步，再执行毫秒级的暂扣或放行决策，配一个财务复核控制台和审计日志，把每一次决策关联到代理、任务、模型调用、供应商和最终结算结果。"
whyWeWin:
  - "无论是发行商和网络方，还是资金与钱包厂商，目前都没有拿下这层通道无关、感知代理的决策层——它把付款意图、业务上下文和策略证据揉在一起；相邻的竞争对手都止步于结算、记账、钱包治理或人工审批。"
  - "跨客户积累的代理-任务-供应商结果、误报、暂扣与放行数据，能比任何单一通道或内部队列更快地改进策略模板和异常检测，而关联审计轨迹会变成采购和合规的基础设施，不再只是可选的监控功能。"
strategicChoices:
  beachhead: "B 轮到 C 轮的跨境软件、市场平台和金融科技运营商，正在把经常性的供应商或承包商付款从仅拟稿的代理建议，切换到由服务商托管的稳定币或混合通道上的自主执行。"
  wedgeRationale: >-
    这个切片能最快出成果，因为高频供应商自带结构化上下文——供应商主数据、发票、采购订单、阈值数据一应俱全；买家早就在为审批积压的痛苦买单；一次影子模式试点几周内就能量化出自动过关率和省下的复核工时。而更广的代理型商务、卡片支出或消费者结账场景，得先解决更棘手的身份、纠纷和商户受理问题，才轮得到验证核心授权论点。
  sequencingRationale: >-
    产品先从影子模式下的供应商和承包商付款起步，再对高频供应商开启强制暂扣与放行，然后接入第二条通道和相邻的支付工作流。GTM 打法遵循同样的顺序：先直接销售给共创客户，等一个生产验证案例跑通后再和稳定币发行商、资金管理厂商共同销售，等审计和合规买家认可了这套证据模型之后，才推进更广泛的开发者主导采用。团队配置在前 2-3 个试点转化之前会一直偏重工程和交付，因为这个阶段集成质量和策略准确度比漏斗顶部的量更重要。
  notYet:
    - "消费者代理商务、结账和微支付"
    - "自己拿下结算、托管或反洗钱筛查，而不是对接合作方"
    - "在供应商和承包商付款还没跑通之前，就去做覆盖广泛的卡片、差旅和订阅支出管控"
    - "即时结算并非瓶颈的纯人工国内 AP 审批流程"
market:
  tam: "4.91 亿美元估算 TAM，基于研究部分自下而上测算的 B2B 稳定币支付量、需要事前授权的企业工作流，以及 0.30% 的混合软件收益率"
  sam: "1.76 亿美元估算 SAM，覆盖正在转向自主执行的早期采用型软件、市场平台和金融科技跨境支付工作流"
  som: "680 万美元估算第三年 SOM，基于 25 个可触达账户、每个账户约 9000 万美元年筛查量、0.30% 混合收益率"
  segments:
    - "正在把经常性供应商付款从仅拟稿的代理建议切换到自主执行的跨境软件、市场平台和金融科技运营商"
    - "正在增设稳定币或混合承包商支付通道、但仍把代理挡在人工复核队列之后的全球 B2B 平台"
  buyingProcess: >-
    通常的推动者是同时掌管代理工具和资金 API 的平台、支付或财务系统负责人，合规或资金部门则是必要的审批方。可信的首单打法是在一个代理和一批供应商上做一次付费影子模式试点，等买家看到可量化的自动过关率、更快的队列吞吐，以及每一笔暂扣或放行付款的可审计证据后，试点自然会转化。
product:
  mvp: >-
    MVP 覆盖一个代理、一套支付栈、一个经常性的供应商或承包商付款工作流。它在执行前摄入付款意图，检查供应商白名单、发票或采购订单匹配、通道阈值和频率限额，记录每一次决策，并把异常情况路由给人工复核；首个版本应该先支持影子模式，再上硬性拦截或放行。
  sixMonth: "上线付费影子模式试点，配一个稳定币或混合通道连接器、一个 ERP 或 AP 数据连接器、一个人工复核控制台，以及合作方驱动的制裁、反洗钱和账户校验检查，让客户能安全地验证自动过关率和积压下降情况。"
  twelveMonth: "对已批准的供应商群体开启强制暂扣或放行，接入第二条通道或资金管理连接器，并按通道、供应商类别和工作流打磨出一套可复用的策略模板库。"
  twentyFourMonth: "从供应商付款扩展到承包商和资金付款，在同一套授权 API 之下覆盖法币与稳定币混合场景，并推出让控制层更难被替换的基准分析与审计分析工具。"
  keyBets:
    - "客户能在授权那一刻，为多数范围内的付款意图提供供应商、发票、采购订单或合同上下文。"
    - "影子模式将证明，在异常模型经过充分训练之前，60% 以上的经常性供应商付款意图就能在确定性策略下自动过关。"
    - "财务和合规团队会接受人工可复核的暂扣加明确的策略证据，而不是把每一笔代理付款都硬塞回通用的 ERP 审批队列。"
    - "同一套策略引擎能从供应商付款延伸到承包商和资金付款，而不至于变成一门定制服务生意。"
gtm:
  wedge: >-
    卖一个 90 天的影子模式试点，为一个经常性供应商群体的每一笔仅拟稿代理付款打分，验证哪些意图原本能自动过关，然后对最安全的一批供应商开启强制暂扣或放行。这样第一个客户、触发点、定价和验证点都绑定在同一个工作流上，而不是让买家为一个泛泛的代理治理平台买单。
  channels:
    - "创始人主导，直接销售给跨境软件和市场平台运营商里的平台、支付、资金和财务系统负责人"
    - "与需要一层控制层来解锁自主执行的稳定币发行商、资金管理平台和支付编排厂商共同销售"
    - "通过 MCP、机器支付和资金 SDK 集成实现开发者主导的拉动，前提是财务管控的叙事已经跑通"
  funnelTargets: "线索到合格共创客户 15-25%，合格共创客户到付费影子模式试点 40-50%，付费试点到强制生产环境 50%以上，生产环境到第二个代理或工作流扩展 30%以上（12 个月内）"
  pricing: >-
    年度平台底价，加上对代理发起并经过筛查的付款量按基点收取的费用，外加每个接入代理的最低费用。这样定价把风险和吞吐量从人工复核人员转移到控制层的价值对应了起来；一个可信的落地打法是 5 万到 10 万美元的付费试点，等强制暂扣或放行上线后转化为约 15 万到 25 万美元 ARR 外加用量费。
businessModel:
  revenueStreams:
    - "针对授权引擎、复核控制台和审计工作区的年度平台订阅费"
    - "针对代理发起并经过筛查的付款量收取的用量费"
    - "针对新通道、新工作流或新供应商群体收取的接入与策略设计费"
  unitOfValue: "一笔经过策略筛查和管控的代理发起付款意图"
  targetGrossMarginPct: 75
  expansionLevers:
    - "在已有账户内增加第二个、第三个代理或支付工作流"
    - "从单一通道扩展到多通道稳定币与混合法币覆盖，客户的审批模式无需改变"
    - "向上销售审计分析、基准对比，以及面向新通道或新供应商类别的高级策略包"
strategyMap:
  northStarMetric: "在策略管控下、无需人工复核也不出现结算后策略失守的生产环境代理发起付款量"
  inputMetrics:
    - "高频供应商群体的影子模式自动过关率"
    - "从付款意图到放行或暂扣的授权延迟中位数"
    - "在授权时点已附带供应商、发票或采购订单上下文的范围内意图占比"
    - "付费试点到强制生产环境的转化率"
    - "来自新增代理、通道和工作流的净收入留存"
  moatsToBuild:
    - "关联代理身份、任务、供应商、通道、金额、策略结果和结算结果的通道无关数据集"
    - "从真实暂扣和放行结果中沉淀出的、按供应商类别和跨境通道细分的策略模板库"
    - "让财务、合规和资金团队都认可、可作为代理发起付款权威记录的审计证据图谱"
  killCriteria:
    - "首批 6 个目标客户里，只有不到 2 个每月存在至少 200 笔仅拟稿代理付款意图或同等积压量，说明痛点频率假设站不住脚。"
    - "影子模式试点在不明显增加误报的情况下，未能自动过关至少 50% 的范围内经常性供应商付款。"
    - "前 5 个试点跑完后，付费试点到强制生产环境的转化率仍低于 40%。"
    - "超过一半的后期潜在客户选择了通道原生或资金原生的打包管控方案，而不是独立控制层。"
  mermaid: |
    flowchart LR
      QieKou[仅拟稿代理付款积压] --> MVP[影子模式授权 MVP]
      MVP --> YanZheng[自动过关率与审计证据]
      YanZheng --> KuoZhan[强制生产环境加多通道扩展]
investorMemo:
  verdict:
    call: "观望"
    conviction: "控制层切口清晰，基础设施顺风强劲，但在真实仅拟稿队列量和试点转化率得到验证之前，信心上限仍受限。"
    whyBelieve: "主要通道、网络和代理支付协议都在验证自主资金流动正在到来，而研究显示，目前还没有厂商在结算前、通道无关、绑定代理与供应商上下文的授权层上占据默认赢家位置。"
    whyDoubt: "如果企业让代理停留在仅拟稿模式的时间比预期更长，或者接受资金和通道厂商打包提供的管控方案，独立切口会在公司建立起分发和数据优势之前就被压缩掉。"
    nextDiligence: "从 5-8 个目标客户那里拿到影子模式日志和预算负责人访谈，验证队列量、自动过关率和为强制放行付费的意愿。"
  firstCustomer:
    title: "B 轮到 C 轮跨境软件或市场平台运营商里的财务系统负责人或支付副总裁"
    profile: "一家 100-500 人的公司，有经常性的海外供应商或承包商付款，一个接入 MCP 的采购或付款代理，以及一套由服务商托管、仍卡在仅拟稿模式的稳定币或混合支付栈。"
    trigger: "公司决定把一个代理从拟稿待批切换到自主执行，原因是复核积压在增长，或是一条新的稳定币或混合通道抹掉了原本的结算延迟。"
    buyer: "财务系统负责人、支付副总裁，或司库"
    initialContract: "针对一个代理、20-50 个已批准供应商的 90 天付费影子模式试点，价格 5 万到 10 万美元，强制暂扣或放行上线后转化为约 15 万到 25 万美元 ARR 外加用量费。"
  mustBeTrue:
    - "目标客户已经积累了足够多的仅拟稿代理付款量，让复核积压成为董事会级别的吞吐或风险问题，而不只是未来才需要担心的事。"
    - "至少一半的范围内经常性供应商付款意图，能在可接受的误报率下按确定性策略自动过关。"
    - "ERP、AP 和供应商主数据系统能在结算前暴露出足够的实时上下文，评估大多数付款意图。"
    - "经济决策者愿意从支付、资金、欺诈或财务系统预算里拨款支持一层独立控制层，而不是等着厂商打包的原生管控。"
    - "产品能从供应商付款扩展到相邻的承包商或资金流程，不需要为每个客户单独重写一套。"
  diligenceQuestions:
    - "10 个指定目标客户里，每周或每月有多少笔代理建议的付款意图积压在仅拟稿队列里？"
    - "在授权那一刻，哪个系统是供应商、发票、采购订单和通道策略数据的权威来源？"
    - "谁最先掌握预算和签字权：平台、支付、资金、欺诈还是合规？"
    - "在第一批不可逆通道上，什么样的暂扣、放行、撤销或人工覆盖语义是可以接受的？"
    - "什么因素能阻止 Stripe、Modern Treasury、Fireblocks、Circle 或发行商在 24 个月内把这个切口的大部分能力打包进去？"
operatingAssumptions:
  - assumption: "目标客户已经产生足够的仅拟稿代理付款量，值得为其单独建一层控制层。"
    basis: research.yaml
    validationTest: "从 5-8 个共创客户那里收集影子模式或审批队列日志，确认每个账户每月至少有 200 笔范围内意图，或体量相当的经常性积压。"
    decisionImpact: "如果不成立，就收窄到单一高频工作流，或者把这个市场当成长期观察名单，而不是一个可以做成风投级项目的切口。"
  - assumption: "供应商、发票、采购订单或合同数据能快到支撑起对多数经常性付款的次秒级授权决策。"
    basis: research.yaml
    validationTest: "在前 3 个共创客户里梳理真实 API 字段和数据完整度，要求范围内意图的覆盖率达到 80% 以上，才能开启强制放行。"
    decisionImpact: "如果不成立，MVP 就必须继续留在影子模式，或者转向只读分析，直到数据完整度提升。"
  - assumption: "影子模式的验证结果，足以让买家把最安全的供应商群体从人工队列切换到强制暂扣或放行。"
    basis: research.yaml
    validationTest: "跑 2-3 个付费试点，衡量是否至少有一个客户在看到影子模式结果后 90 天内，对 20-50 个供应商开启强制放行。"
    decisionImpact: "如果不成立，产品就有沦为报表软件的风险，定价能力和粘性都会更弱。"
  - assumption: "在前 24 个月里，通道无关的定位胜过单一服务商的打包方案。"
    basis: operator judgment
    validationTest: "跟踪前 15 笔企业交易的成败原因，确认潜在客户是否把多通道策略可移植性或代理上下文深度当作决定性的购买理由。"
    decisionImpact: "如果不成立，就和单一服务商更深度地绑定合作，或者重新定位为嵌入式控制模块，而不是独立平台。"
  - assumption: "策略引擎能从供应商付款扩展到承包商和资金付款，而不会带来大量定制服务负担。"
    basis: idea.yaml
    validationTest: "在第 12 个月前，和一个现有客户一起用同一套策略核心打样一个相邻工作流，要求在 6-8 周内完成部署。"
    decisionImpact: "如果不成立，就让公司专注在供应商付款上，把它当成一个更窄品类的工具来经营。"
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "访谈目标运营商里的 12-15 位平台、支付、资金和财务系统负责人，收集队列量、预算负责人和代理就绪度数据。"
    hypothesis: "第一个可复制的买家如今正面临真实的仅拟稿积压，预算掌握在支付或财务系统手里，而不是某个泛泛的 AI 创新基金。"
    successMetric: "至少 8 场访谈证实存在真实的仅拟稿队列，5 个客户指认出一个一致的签字职能。"
    owner: "创始人 CEO"
  - horizon: "0–90 天"
    experiment: "用供应商白名单、发票匹配和频率规则，对一个共创客户的历史付款意图做影子打分。"
    hypothesis: "确定性策略能在需要异常建模之前，自动过关多数经常性供应商意图。"
    successMetric: "回溯审查中，50% 以上的历史范围内意图能自动过关，且有争议的决策低于 5%。"
    owner: "创始工程师"
  - horizon: "90–180 天"
    experiment: "针对一个代理、一条通道、一个供应商群体分别上线 2 个付费影子模式试点。"
    hypothesis: "影子模式试点比端到端自主平台更好卖，因为买家不用在第一天就交出控制权，也能量化出吞吐提升。"
    successMetric: "2 个付费试点上线，且至少有一个在 6 个月内续约或扩容。"
    owner: "创始人 CEO"
  - horizon: "90–180 天"
    experiment: "在第一条不可逆通道上，和财务、合规团队走一遍暂扣或放行、审计导出和人工覆盖的全流程。"
    hypothesis: "只要每一次决策都可解释、且在通道支持的情况下可撤销，风险团队就会批准对一个安全供应商群体开启强制放行。"
    successMetric: "一个试点客户签字同意对 20-50 个供应商开启强制放行，并认可这套审计证据格式。"
    owner: "产品/合规负责人"
  - horizon: "180–365 天"
    experiment: "接入第二条通道或资金连接器，把前 2-3 个试点转化为年度生产合同。"
    hypothesis: "通道无关的可移植性和多工作流扩展，能明显提升付费意愿并降低被打包整合的风险。"
    successMetric: "签下 2 份年度合同，且至少有一个账户扩展到第二个工作流或通道。"
    owner: "解决方案工程师"
  - horizon: "12–18 个月"
    experiment: "和一个现有生产客户一起试点承包商或资金付款覆盖。"
    hypothesis: "同一套授权核心能泛化到发票之外的场景，而不需要一次服务密集型的重写。"
    successMetric: "相邻工作流在 8 周内完成部署，并带来 ACV 扩容。"
    owner: "创始工程师"
operations:
  - "实时授权服务，缓存供应商和发票上下文，在关键数据缺失时默认走失败即暂扣（fail-closed）策略"
  - "由财务、安全和资金部门共用的人工复核队列、审计导出和策略变更管理流程"
  - "与制裁、反洗钱和账户校验服务商建立合作，而不是自建受监管的筛查能力"
  - "在生产环境上线前，先梳理代理身份、供应商群体、通道规则以及 ERP 或 AP 数据的接入手册"
  - "在第一个生产验证案例跑通后，配套发行商、资金平台和编排厂商的共同销售支持"
team:
  - role: "创始人 CEO / 支付风控负责人"
    startTiming: "第 0 个月"
    rationale: "第一单需要一个既能对平台、支付和合规相关方做销售，又能围绕真实工作流打磨策略模型的人。"
  - role: "创始工程师"
    startTiming: "第 0 个月"
    rationale: "搭建授权引擎、SDK 和影子模式数据管道，是核心技术风险所在。"
  - role: "解决方案工程师"
    startTiming: "第 3 个月"
    rationale: "客户部署的速度取决于 ERP/AP 和支付栈集成的效率，而不只是核心产品代码。"
  - role: "产品/合规负责人"
    startTiming: "第 6 个月"
    rationale: "在硬性放行的生产部署上线之前，策略模板、审计证据和合作方筛查流程需要专人负责。"
  - role: "创始人 GTM / 共创客户负责人"
    startTiming: "第 9 个月"
    rationale: "首批试点上线后，需要一位专职运营者来管理集中的企业管线和共同销售合作，避免创始人被从产品探索里拉走。"
milestones:
  - horizon: "0-12 个月"
    items:
      - "签下 3 个付费共创客户，并在至少 2 个真实代理付款工作流上启动影子模式打分。"
      - "在一个高频供应商群体上验证 50% 以上的自动过关率，并把人工复核触点砍掉至少 30%。"
      - "为一个生产客户开启强制暂扣或放行，覆盖 20-50 个已批准供应商。"
      - "在 5-8 个目标客户里验证预算负责人、数据可得性，以及可接受的暂扣或放行语义。"
  - horizon: "12-24 个月"
    items:
      - "把 3-5 个共创客户转化为 15 万到 25 万美元 ARR 加用量费区间的年度合同。"
      - "上线第二条通道或资金连接器、可复用策略包，以及高级审计分析。"
      - "把至少 2 个客户扩展到第二个代理或支付工作流。"
      - "和一家稳定币发行商、资金平台或编排厂商建立一条稳固的共同销售渠道。"
  - horizon: "24-36 个月"
    items:
      - "通过 20-25 个生产账户和扩大的筛查量，逼近研究测算的第三年约 680 万美元 SOM。"
      - "在同一套授权 API 之下覆盖供应商、承包商和资金付款工作流。"
      - "把代理-任务-供应商结果数据集打造成客户在内部无法复制的可防御基准和策略训练资产。"
risks:
  - risk: "企业让代理停留在仅拟稿模式的时间可能比计划设想的更长，限制生产量并推迟用量收入。"
    likelihood: High
    impact: High
    mitigation: "先从付费影子模式试点起步，瞄准那些已经撞上审批瓶颈的客户，并支持服务商托管的稳定币或混合流程，让买家不必直接持有稳定币。"
  - risk: "通道、资金或钱包厂商可能在独立授权层站稳脚跟之前，先打包出足够的策略管控能力。"
    likelihood: Medium
    impact: High
    mitigation: "保持通道中立，对接多家服务商，靠代理-任务-供应商上下文、策略可移植性和审计分析来做出差异化，而不是拼基础的支出限额。"
  - risk: "ERP、AP 或供应商主数据缺失或不一致，可能让实时授权变得噪声很大或极度依赖人工服务。"
    likelihood: Medium
    impact: High
    mitigation: "从上下文最干净的经常性供应商群体起步，缓存必需数据，在覆盖率达标之前先不开启硬性放行。"
  - risk: "一次涉及制裁、欺诈或幻觉发票的错误放行，可能造成责任风险和信任损失。"
    likelihood: Medium
    impact: High
    mitigation: "使用合作方筛查、失败即暂扣策略、明确的人工覆盖机制，并在策略引擎积累起生产历史之前，合同上把责任范围收窄。"
  - risk: "企业销售周期可能集中在少数技术能力强、要求深度定制的买家身上。"
    likelihood: Medium
    impact: Medium
    mitigation: "卖一个范围窄、连接器和策略包可复用的工作流，避免承接定制化的采购自动化或结算编排项目。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "18 个月的资金支撑起一支 4-5 人团队、影子模式与强制放行产品的开发、首批 ERP 或 AP 及通道连接器、3-5 个付费共创客户的部署、一条共同销售渠道，以及足够的生产验证，用来判断一层通道无关的代理支付控制层能否跑赢打包方案。"
