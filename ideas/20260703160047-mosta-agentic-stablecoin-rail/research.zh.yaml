openQuestions:
- 一个早期共创客户账户能路由多大的年筛查量，才会开始更倾向于更低的基点定价和更高的固定平台费？
- 未来 12-18 个月里，发行商和资金平台会不会打包出足够的原生策略管控，从而明显收窄这道独立切口？
- 哪些 ERP、AP 和供应商主数据集成，可靠到足以在生产环境里支撑次秒级的结算前检查？
- 风险团队需要什么样的证据包，才能在不把人重新拉回关键路径的情况下，接受不可逆通道上代理发起的付款？
