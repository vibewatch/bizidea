competitors:
- name: Fireblocks
  stage: incumbent
  wedge: 钱包、托管、治理与数字资产策略基础设施。
  pricing: 定制定价 / 企业销售
  strength: 在钱包和资金层拥有强大的治理与策略原语。
  weaknessVsUs: 以钱包为中心，而不是在稳定币和法币工作流中感知采购、供应商和模型调用。
  sourceRefs:
  - 37
  - 40
- name: Modern Treasury
  stage: scale-up
  wedge: 一套覆盖法币和稳定币的 API，加上实时账本与支付运营。
  pricing: 定制定价 / 企业销售
  strength: 在支付执行、余额管理和对账方面有深厚的可信度。
  weaknessVsUs: 优化的是资金转移和记账，而不是结算前针对代理的意图校验。
  sourceRefs:
  - 38
- name: BVNK
  stage: scale-up
  wedge: 稳定币原生的跨境支付与编排基础设施。
  pricing: 定制定价 / 企业销售
  strength: 专注于跨法币和稳定币通道的近乎即时全球资金转移。
  weaknessVsUs: 更接近通道和编排层，而不是交易级的授权与审计层。
  sourceRefs:
  - 39
- name: Payman AI
  stage: startup
  wedge: 代理型银行编排，策略层和执行层相互独立。
  pricing: 定制定价 / 企业销售
  strength: 直接验证了 AI 资金工作流需要一层与推理分离的独立策略层。
  weaknessVsUs: 以银行为中心，覆盖范围比稳定币跨境供应商付款这个具体切口更宽泛。
  sourceRefs:
  - 35
  - 36
- name: Skyfire
  stage: startup
  wedge: 面向 AI 代理的身份认证、微支付和互联网原生支付通道。
  pricing: 定制定价 / 企业销售
  strength: 在代理身份、微支付和交易级信任方面的叙事很扎实。
  weaknessVsUs: 更专注于代理对服务的商务和身份场景，而不是企业 AP 式的管控逻辑和 ERP 上下文。
  sourceRefs:
  - 34
regulatoryTechnicalConstraints:
- point: 代理支付系统需要明确的用户或企业同意、清晰的工具边界，以及可审计的操作轨迹，而不是宽泛的会话级授权。
  sourceRefs:
  - 8
  - 17
- point: 根据 FinCEN 指引，管理或兑换虚拟货币的主体可能触发类似货币转移的义务，这会影响产品设计和合作方选择。
  sourceRefs:
  - 32
- point: MiCA 和香港稳定币框架这类发行商侧监管制度，限制了哪些资产、发行商和司法辖区能被干净利落地支持。
  sourceRefs:
  - 30
  - 31
- point: 支付欺诈防控框架越来越要求针对非消费者贷记推送采用双重审批、账户校验和带外验证等分层管控。
  sourceRefs:
  - 33
