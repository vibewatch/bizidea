problem: >-
  Programmable stablecoin balances like Mosta's MainUSD now let AI agents, not just humans, draw down a single balance
  to fund cards, invoices, payouts, and MCP-connected workflows across 20-plus blockchains and 150-plus countries.
  That collapses the human review window that traditionally caught mistaken, hallucinated, or fraudulent payment
  instructions before funds left the building. Companies piloting agent-initiated payments are stuck choosing between
  manual approval queues that erase the speed benefit of automation, or unguarded agent write-access where one bad
  tool call can drain a treasury balance across borders in seconds.
targetUser:
  primary: >-
    Platform engineering and finance-systems leads at Series B+ marketplaces and vertical SaaS companies
    operationalizing MCP-connected AI procurement or vendor-payment agents with direct write access to a programmable
    stablecoin treasury balance
  secondary: >-
    Compliance and treasury operations leads at global businesses adopting programmable stablecoin balances like
    MainUSD for both human- and agent-initiated payments
  buyer: VP Engineering/Platform or Head of Finance Systems responsible for agent tooling and treasury risk
startupThesis:
  nonObviousInsight: >-
    The scarce resource was never settlement speed, it was the implicit review window slow rails created. MainUSD-style
    instant, multi-rail, 150-country settlement deletes that safety net at the exact moment agents start initiating
    payments directly, so the real gap is a real-time authorization layer built for agent-speed decisions, not a
    faster rail or a slower human approval queue.
  beachhead: >-
    Series B+ marketplace and vertical SaaS platforms that have built an MCP-connected AI procurement or
    vendor-payment agent with draft-only write access to a programmable stablecoin balance and are blocked from
    enabling full autonomous execution because no real-time authorization layer exists
  wedge: >-
    A drop-in authorization gateway that intercepts every agent-initiated payment intent before it reaches the
    stablecoin settlement rail, running millisecond vendor-allowlist, purchase-order-match, and velocity checks, then
    issuing an audit-logged hold or release tied to the specific agent, task, and model call
  whyNowCatalyst: >-
    Mosta's MainUSD explicitly extends a single programmable balance to MCP-connected AI agents across 150-plus
    countries, proving vendors already expect agents, not just people, to spend company money autonomously and
    globally.
  ventureScalePath: >-
    Start with procurement and vendor-payment agent guardrails, expand into travel-booking, subscription-renewal, and
    other autonomous commerce agents touching treasury, and become the default identity-and-access layer for
    agent-initiated money movement across stablecoin and traditional rails alike.
solution: >-
  We ship an SDK and API that sits between any MCP-connected or custom AI agent and its underlying programmable
  stablecoin balance such as MainUSD. Every payment intent the agent generates is scored in real time against vendor
  allowlists, purchase-order and invoice matches, velocity and value-at-risk limits, and anomaly models trained on
  prior agent behavior, then held or released in milliseconds. Approved payments settle exactly as fast as the
  underlying rail; flagged ones pause with a structured explanation routed to a human reviewer, plus a one-click
  reversible hold where the rail supports it. Every decision, the agent, the task, the model call, and the policy
  that fired, is logged into an audit trail finance and security teams can use for SOC2, AML, and internal risk
  reviews. Over time the anomaly models and policy library become a reusable trust layer customers extend to every
  new agent they deploy against the same treasury balance.
goToMarketSeed:
  firstCustomer: >-
    A Series B-C vertical SaaS or B2B marketplace company that already ships an MCP-connected AI procurement or
    supplier-payment agent in draft-only mode against a MainUSD-style programmable stablecoin balance, and wants to
    flip the agent to autonomous execution for its top 20-50 recurring international vendors
  buyingTrigger: >-
    The internal decision to move an AI procurement or payment agent from draft-and-approve to autonomous execution,
    typically forced once agent-suggested payment volume outpaces the human reviewers in the approval queue
  currentAlternative: >-
    A manual Slack- or ERP-based human approval queue for every agent-suggested payment, or an unguarded direct API
    connection between the agent and the stablecoin balance
  switchingReason: >-
    Generic ERP approval workflows are built for human-paced review and cannot run sub-second, agent-aware policy
    checks across 20-plus blockchains and 150-plus countries; an unguarded direct connection has no way to catch a
    hallucinated invoice or compromised agent before funds leave
  pricingHypothesis: Usage-based pricing on the dollar volume of agent-initiated payments screened, plus a platform fee per connected agent
