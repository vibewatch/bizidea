jobsToBeDone:
  - job: >-
      When we let an AI procurement agent move from draft-only to autonomous payment execution, help the platform
      engineering team authorize each payment in real time, so agents can transact at their own speed without a
      human bottleneck.
    currentAlternative: Human approval queue in Slack or the ERP for every agent-suggested payment
    successMetric: Share of agent-initiated payments cleared autonomously without human review, and reduction in approval-queue backlog
  - job: >-
      When a compliance or security team needs to explain an agent-initiated cross-border stablecoin payment after
      the fact, help them produce a full audit trail tied to the agent, task, and policy decision, so they can pass
      SOC2 and AML review without stitching logs by hand.
    currentAlternative: Manually correlating agent logs, LLM call transcripts, and rail settlement records after an incident or audit request
    successMetric: Time to produce an audit-ready explanation for any agent-initiated payment
ideaScorecard:
  signalStrength:
    score: 3
    rationale: >-
      Only one fetch-verified source (evidence confidence 2 of 5) covers Mosta's launch, but the framing of agents as
      first-class economic actors is concrete and specific.
  painIntensity:
    score: 4
    rationale: >-
      Teams are already blocked between risky unguarded autonomy and an approval-queue bottleneck as agent-initiated
      payment volume grows, a real operational chokepoint.
  wedgeClarity:
    score: 4
    rationale: A narrow authorization-gateway product with a clear draft-only-to-autonomous trigger and integration surface.
  defensibility:
    score: 3
    rationale: >-
      Rail providers could add basic checks themselves, though cross-rail, cross-agent anomaly data compounds over
      time in ways a single issuer has less incentive to build generically.
  ventureScale:
    score: 4
    rationale: >-
      The beachhead is narrow but the guardrail model generalizes to every category of autonomous commerce agent and
      every settlement rail, not just one stablecoin issuer.
topRisks:
  - name: Rail bundling
    description: >-
      Mosta, Brale, or a competing stablecoin issuer could ship basic spend limits and allowlists natively inside
      MainUSD, undercutting a standalone guardrail layer.
    mitigation: >-
      Stay rail-agnostic from day one, integrate with multiple stablecoin issuers and card programs, and own the
      cross-rail policy engine and audit trail that no single issuer has an incentive to build generically.
  - name: Premature market
    description: >-
      Most enterprises may still be too cautious to give AI agents real payment-execution authority, keeping pilot
      volume small for longer than the business can sustain.
    mitigation: >-
      Launch in shadow mode where the guardrail scores every agent-suggested payment without blocking it, building
      trust and anomaly data before customers flip agents to full autonomous execution.
  - name: Liability exposure
    description: >-
      A fraudulent or sanctioned cross-border payment that slips past the guardrail could expose the startup to
      liability disputes or regulatory scrutiny over agent-executed money movement.
    mitigation: >-
      Cap contractual liability, integrate established sanctions and AML screening providers rather than build
      screening in-house, and keep a human override and kill-switch always available regardless of autonomy level.
