slug: "mosta-agentic-stablecoin-rail"
date: "2026-07-03"
currency: "USD"
modelStartMonth: "2026-08"
assumptions:
  - id: "A1"
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-03] the model starts with the first full operating month after the dated business plan."
  - id: "A2"
    name: "Opening cash / pre-seed raise"
    value: "$2.3M"
    unit: "USD"
    source: "[BP fundingAsk.targetFundingRangeUsd $2-4M + BP fundingAsk.runwayMonths 18 + model cash curve] the base case uses a lean pre-seed sized to reach the first repeatable production-conversion milestone with about six months of buffer."
  - id: "A3"
    name: "Starting paying accounts (M1)"
    value: "0"
    unit: "count"
    source: "[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first win paid design partners."
  - id: "A4"
    name: "Paying account definition"
    value: "A paying account is either a paid shadow-mode pilot or a production annual contract under active policy enforcement."
    unit: "definition"
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] customersEop counts any logo already paying for pilot or production scope."
  - id: "A5"
    name: "Paid pilot economics"
    value: "$75K over about 3 months (~$25K/mo)"
    unit: "USD/account"
    source: "[BP investorMemo.firstCustomer.initialContract $50k-$100k pilot] the base case uses the midpoint paid-pilot value for a 90-day shadow-mode deployment."
  - id: "A6"
    name: "Production contract floor"
    value: "$210K ARR before usage and onboarding attach"
    unit: "USD/account/year"
    source: "[BP gtm.pricing roughly $150k-$250k ARR plus usage] the model lands initial production customers near the middle of the BP annual range before screened-volume fees scale."
  - id: "A7"
    name: "Year-3 exit annual value per mature account"
    value: "~$300K annualized by Q4Y3"
    unit: "USD/account/year"
    source: "[Research market.som $6.8M based on 25 accounts × $90M screened volume × 0.30% yield = about $270K/account/year + BP businessModel.expansionLevers] the base case exits slightly above the research cross-check because second-workflow expansion and onboarding fees attach inside the best accounts."
  - id: "A8"
    name: "Customer ramp"
    value: "3 paying accounts by M12, 9 by Q4Y2, 20 by Q4Y3"
    unit: "customersEop"
    source: "[BP milestones 0-12, 12-24, 24-36 + BP gtm.funnelTargets + Research market.som] the base case stays below the full 25-account SOM but still assumes one co-sell channel becomes repeatable by Y3."
  - id: "A9"
    name: "Revenue recognition convention"
    value: "Displayed revenue equals paying accountsEop multiplied by realized period revenue per account: Y1 about $22K-$25K per month, Y2 about $63K-$72K per quarter, and Y3 about $72K-$75K per quarter."
    unit: "formula"
    source: "[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som] this keeps revenue directly traceable to paying accounts and the blended pilot-to-production mix."
  - id: "A10"
    name: "Gross margin ramp"
    value: "55%-62% in Y1, 64%-71% in Y2, 72%-75% in Y3"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 75 + BP operations + Research reportMemo.partnershipEcosystem] partner screening and high-touch onboarding depress early margin before connectors and policy templates standardize."
  - id: "A11"
    name: "Hiring timeline"
    value: "M1 founder and founding engineer; M4 solutions engineer; M7 product/compliance lead; M10 GTM lead; M13 second engineer; M16 second solutions hire; M22 third engineer; M23 ops; M27 second GTM; M28 fourth engineer; M29 second product/compliance; M31 third solutions hire; M34 fifth engineer; M35 third GTM."
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays engineering- and deployment-heavy until pilot-to-production conversion is proven, then adds measured GTM capacity."
  - id: "A12"
    name: "Founder loaded compensation"
    value: "$180K"
    unit: "USD/year"
    source: "[BP team Founder CEO / payments-risk lead + startup-finance heuristic] lean founder cash compensation plus payroll taxes and benefits."
  - id: "A13"
    name: "Engineering loaded compensation"
    value: "$210K"
    unit: "USD/year"
    source: "[BP team Founding eng + startup-finance heuristic] senior payments and infrastructure engineering talent is required, but pre-seed pay stays below public-company cash levels."
  - id: "A14"
    name: "Solutions loaded compensation"
    value: "$185K"
    unit: "USD/year"
    source: "[BP team Solutions engineer + BP operations onboarding playbook + startup-finance heuristic] customer deployment depends on fast ERP/AP and rail integration quality."
  - id: "A15"
    name: "Product / compliance loaded compensation"
    value: "$175K"
    unit: "USD/year"
    source: "[BP team Product / compliance lead + Research regulatoryLandscape + startup-finance heuristic] policy templates, audit evidence, and partner-screening workflows need dedicated ownership."
  - id: "A16"
    name: "GTM loaded compensation"
    value: "$190K"
    unit: "USD/year"
    source: "[BP team Founding GTM / design-partner lead + BP gtm.channels + startup-finance heuristic] concentrated enterprise selling and partner motion require travel and variable compensation."
  - id: "A17"
    name: "G&A / ops loaded compensation"
    value: "$130K"
    unit: "USD/year"
    source: "[BP fundingAsk.useOfFundsSummary 4-5 person team + startup-finance heuristic] covers finance, vendor management, and compliance operations without building a large overhead layer."
  - id: "A18"
    name: "Payroll allocation to P&L lines"
    value: "Founder 45% S&M / 25% R&D / 30% G&A; engineering 100% R&D; solutions 55% S&M / 45% R&D; product/compliance 60% R&D / 40% G&A; GTM 100% S&M; ops 100% G&A."
    unit: "allocation"
    source: "[BP team role rationales + BP operations] maps payroll into functional expense lines while reflecting founder-led sales and solutions-heavy onboarding."
  - id: "A19"
    name: "Non-payroll opex ramp"
    value: "Monthly non-payroll S&M/R&D/G&A rises from $4K/$10K/$6K in early Y1 to $27K/$32K/$19K by Q4Y3."
    unit: "USD/month"
    source: "[BP operations + startup-finance heuristic] covers cloud, audit tooling, travel, legal, and insurance without assuming a large paid-demand engine."
  - id: "A20"
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA."
    unit: "formula"
    source: "[startup-finance heuristic] capex, financing fees, taxes, and working-capital timing are assumed immaterial at pre-seed scale."
  - id: "A21"
    name: "Steady-state monthly logo churn"
    value: "2.0%"
    unit: "percent per month"
    source: "[startup-finance heuristic for early enterprise workflow SaaS + BP businessModel.expansionLevers] the workflow should be sticky once policy templates and audit evidence are embedded, but the model remains conservative versus mature governance software."
  - id: "A22"
    name: "Base sales cycle"
    value: "Roughly 90 days from paid pilot start to first production conversion"
    unit: "days"
    source: "[BP gtm.wedge 90-day shadow-mode pilot + BP experimentRoadmap 90-180 days] the base case assumes one quarter is enough to prove auto-clear rate and release controls for the first safe vendor cohort."
  - id: "A23"
    name: "CAC convention"
    value: "36-month sales and marketing spend divided by 20 net new paying accounts"
    unit: "formula"
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures founder-led, partner-led, and concentrated enterprise acquisition across the buildout period."
  - id: "A24"
    name: "Next-round milestone for funding sizing"
    value: "By roughly Q2Y2 the company should have 5 paying logos, 2-3 production conversions, a second connector in market, and one credible co-sell motion."
    unit: "milestone"
    source: "[BP fundingAsk.runwayMonths 18 + BP milestones 12-24 months + BP experimentRoadmap 180-365 days] the pre-seed is sized to reach seed-ready proof on conversion, product portability, and distribution."
  - id: "A25"
    name: "Quarterly salary-roll convention"
    value: "Y2-Y3 salary rows use actual monthly hires inside each quarter rather than just quarter-end snapshots."
    unit: "convention"
    source: "[Headcount column convention + BP team.startTiming] this keeps the salary line internally consistent with the monthly hiring ramp even though Y2 and Y3 headcount only show year-end snapshots."
