scenarios:
  downside:
    description: "Production conversions slip by one to two quarters, so the company ends Y3 with fewer paying logos and slower margin lift from reusable templates."
    y3RevenueK: 3858.0
    y3EbitdaK: -246.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches about 16 instead of 20."
      - "Blended annual value exits near $285K instead of $300K because second-workflow expansion lands later."
      - "Gross margin exits near 72% because implementation and partner-screening work stay more manual."
  base:
    description: "Three paid design partners convert into a repeatable pilot-to-production motion, yielding 9 paying logos by Q4Y2 and 20 by Q4Y3."
    y3RevenueK: 4617.0
    y3EbitdaK: 306.6
    cashLowPointK: 711.7
    keyAssumptionChanges:
      - "3 paying accounts by M12, 9 by Q4Y2, and 20 by Q4Y3."
      - "Blended annual value exits near $300K as usage and second-workflow expansion attach."
      - "Gross margin reaches the BP target 75% by Q4Y3."
  upside:
    description: "A second connector and one co-sell partner shorten sales cycles, so production expansions arrive earlier and screened-volume revenue scales faster."
    y3RevenueK: 5420.0
    y3EbitdaK: 884.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches about 23 instead of 20."
      - "Blended annual value exits near $315K as second-workflow expansion and policy-pack attach improve."
      - "Gross margin reaches about 77% because onboarding reuse and screening efficiency improve faster."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Usage-based screened-volume revenue and expansion attach land about 10% below plan."
    baseCase: "Exit blended annual value reaches about $300K per paying account."
    upsideCase: "Second-workflow expansion and policy-pack attach push exit annual value toward about $315K."
    y3RevenueImpactK: -461.7
    cashImpactK: -340.0
  - variable: "CAC"
    downsideCase: "Partner introductions underperform and CAC drifts toward about $120K per logo."
    baseCase: "CAC stays near $95.6K with founder-led selling plus one concentrated co-sell motion."
    upsideCase: "Design-partner references and partner sourcing keep CAC near $85K."
    y3RevenueImpactK: -120.0
    cashImpactK: -220.0
  - variable: "churn"
    downsideCase: "Monthly churn rises toward 3.0% if buyers view the wedge as too narrow or accept bundled controls."
    baseCase: "Monthly churn holds at 2.0% once policy templates and audit evidence are embedded."
    upsideCase: "Monthly churn stays near 1.2% because the authorization layer becomes system-of-record infrastructure."
    y3RevenueImpactK: -180.0
    cashImpactK: -160.0
  - variable: "sales cycle"
    downsideCase: "Paid pilot to production stretches from about 90 days to about 150 days."
    baseCase: "The first safe vendor cohort converts in roughly one quarter after shadow-mode proof."
    upsideCase: "Budget-owner alignment and partner credibility compress conversion toward about 60-75 days."
    y3RevenueImpactK: -650.0
    cashImpactK: -360.0
  - variable: "gross margin"
    downsideCase: "Gross margin stalls near 72% because onboarding and screening remain semi-manual."
    baseCase: "Gross margin exits at 75% after connectors and policy templates are reused."
    upsideCase: "Gross margin reaches 77% as implementation and screening workflows standardize faster."
    y3RevenueImpactK: 0.0
    cashImpactK: -230.0
  - variable: "hiring pace"
    downsideCase: "Two scale hires are pulled forward before the second-connector motion is fully proven."
    baseCase: "Scale hiring follows the BP sequencing and stays tied to conversion proof."
    upsideCase: "One late-Y3 GTM hire waits until partner-sourced pipeline is visible."
    y3RevenueImpactK: 60.0
    cashImpactK: -260.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      TargetAccounts[Target accounts] --> PaidPilots[Paid shadow-mode pilots]
      PaidPilots --> Production[Production contracts]
      Production --> ScreenedVolume[Screened payment volume]
      ScreenedVolume --> Revenue[Platform plus usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base revenue is driven by moving from 3 paying accounts at Y1 exit to 20 by Q4Y3 while blended annual value exits near $300K as usage and second-workflow expansion attach."
  - checkName: "Must go right"
    finding: "At least 2-3 pilots must convert to production in about 90 days or the model cannot support the Q2Y2 milestone with only a measured GTM ramp."
  - checkName: "Model breaks if"
    finding: "If sales cycles stretch toward 150 days or gross margin stalls near 72%, the downside case drives the cash floor toward roughly $0.4M before seed-ready proof is reached."
  - checkName: "Next-round proof"
    finding: "The seed story is 5 paying logos, 2-3 production conversions, one second connector, and one repeatable co-sell motion that shows the standalone control plane can outgrow bundled alternatives."
sanityChecks:
  ruleOf40: "Y3 growth 169.5% + EBITDA margin 6.6% = 176.2%"
  burnMultiple: "Y2 burn multiple is about 0.5x using roughly $780.7K of EBITDA burn against about $1716.0K of net new ARR; Q2Y3 turns EBITDA positive."
  revenuePerFte: "$307.8K Y3 on 15 ending FTE (benchmark $200-400K SaaS)"
  flags:
    - "The base case still assumes 20 paying logos by Q4Y3 inside a concentrated buyer pool, so one co-sell channel must become repeatable rather than opportunistic."
    - "customersEop includes paid pilots and production contracts, so fully recurring production logos lag the headline count through Y1 and early Y2."
    - "Gross margin reaches 75% only if connectors, policy templates, and partner-screening workflows standardize; prolonged bespoke onboarding would compress EBITDA materially."
    - "Both the BP and research flag real draft-only queue volume as the core unknown, so weak design-partner backlog would break the revenue ramp before pricing becomes the issue."
    - "Rail-native or treasury-native bundled controls could narrow the wedge before Y3 if the company does not prove rail-agnostic policy depth and audit evidence value."
    - "Cash is modeled as EBITDA; billing timing, implementation prepayments, or security/compliance capex could shift actual runway."
