jobsToBeDone:
- job: 当我们的 AI 公司申请加拿大成长资本或算力支持时，帮运营团队拼出一套达到投资人标准的证据包，好让我们更快提交，而不是把高管拖进数周的文档拉扯。
  currentAlternative: 共享网盘、电子表格、顾问项目计划和创始人亲写备忘录
  successMetric: 从启动到申请材料可提交的天数
- job: 当联邦部门或皇家机构买方要求 AI 安全、隐私和本土就绪证明时，帮公共部门负责人用一套可复用的采购包回应，好让我们从政策兴趣走到付费试点。
  currentAlternative: 临时拼出的 RFP 回应、外部律师审阅和通用投标软件
  successMetric: 产出合规买方材料包所需时间，以及从会面到试点的转化率
