  painIntensity:
    score: 4
    rationale: 对 AI 规模化公司 来说，只要一条就绪流程没过，当期就可能同时卡住资本、基础设施或收入。
  wedgeClarity:
    score: 5
    rationale: 把同一套证据工作台复用到成长基金、算力申请和采购流程，是一个很窄、也能直接验证的切入产品。
  defensibility:
    score: 4
    rationale: 护城河可以从基准数据、可复用政策模板，以及跨财务、基础设施和公共部门团队的深度工作流集成里长出来。
  ventureScale:
    score: 5
    rationale: 主权 AI 计划正在全球扩散，因此加拿大这个滩头市场有机会长成更广义的政策驱动型 AI 商业化操作系统。
topRisks:
- name: 政策急转弯
  description: 如果渥太华调整项目标准或推迟立法，产品脚下这套工作流形状也会跟着变。
  mitigation: 把系统设计成“证据对象”和“模板”分离；一次政策变更应同时更新多条工作流，而不是把团队重新拖回定制服务。
- name: 实施过度依赖服务
  description: 早期客户可能期待顾问式扶持，因为他们的就绪数据散落在法务、财务和工程团队。
  mitigation: 把实施产品化：固定证据 结构定义、按角色拆任务，并把第一用例收窄到一条正在发生的提交流程。
- name: 早期买方池太窄
  description: 第一年里，只有一部分加拿大 AI 公司会同时需要政府资本、主权算力和采购就绪。
  mitigation: 先抓已经在追公共部门收入的 规模化公司，再通过 VC 和顾问渠道扩到相邻主权 AI 计划与组合层级工作流。
