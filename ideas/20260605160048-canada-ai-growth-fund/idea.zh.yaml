problem: 加拿大 AI 规模化公司 现在要同时过三道关联闸门：拿到成长资本、符合主权算力支持资格、通过公共部门采购与安全审查。同一家公司必须在财务、法务、工程和 GTM 文档里，同时证明自己对本国的战略价值、基础设施需求、治理成熟度和政策就绪度。多数团队现在还是靠写补助申请的顾问、电子表格、外部律师和一次性 演示材料 硬凑，结果就是申请更慢、买方信心更弱、核心高管时间被吃掉，而政策窗口偏偏就在这时打开。
targetUser:
  primary: 主要用户是正在申请渥太华支持的资本、主权算力或联邦采购机会的加拿大 AI 规模化公司 的 COO、CFO 和公共部门负责人。
  secondary: 次级用户是协助加拿大 AI 公司完成面向政府尽调的 VC 平台团队，以及兼职财务或政策运营人员。
  buyer: COO、CFO 或 VP Public Sector
startupThesis:
  nonObviousInsight: 稀缺的资产不再只是资本或 GPU，而是可复用的证据：证明一家公司既“足够加拿大”、又值得分配算力、也安全到政府可以买。政府一旦同时扮演投资人、算力分配者和锚定客户，真正有价值的软件就会变成那套证据系统：把一家公司内部同一套经营现实，翻成三条外部审批流程。
  beachhead: 员工 50–300 人、ARR 在 $5 million 到 $50 million、每月 GPU 支出不低，并计划在未来 12 个月内推进至少一个联邦、皇家机构或受监管公共部门项目的加拿大 AI 软件和模型公司
  wedge: 一个就绪度工作台，把同一张公司证据图谱直接转成 Canadian Tech Growth Fund 投资备忘录、Compute Access Fund 申请，以及达到采购标准的 AI 风险材料包，并能追踪责任人和续期资料截止日
  whyNowCatalyst: 渥太华同时推出了成长资本、主权算力投入、锚定客户需求，以及短期内即将落地的 AI 安全立法，逼着加拿大 AI 公司尽快把一层可审计的就绪体系跑起来，而不是继续靠定制文件被动应对。
  ventureScalePath: 先从正在穿越联邦资本与采购流程的加拿大 AI 公司切入，再把产品扩成欧洲、海湾地区和亚洲主权 AI 计划的控制层，因为越来越多政府会把算力补贴、产业政策和公共采购绑在一起。
solution: Canadian AI Readiness OS 把财务、云支出、模型治理和安全证据接进同一个工作台，专门服务政策驱动的商业化。第一版产品读入 股权结构表、招聘计划、云和 GPU 发票、部署架构、安全控制和客户背书，再从同一套数据里生成三类输出：成长基金投资材料、主权算力申请说明、政府买方风险材料包。团队可以把缺失证据分给财务、基础设施、法务或产品负责人，并跟踪每次提交前到底改了什么。客户不再需要去买泛 GRC 软件，或花咨询费把同一个故事改写一遍；他们拿到的是一套系统记录，专门帮公司变得可融资、可获算力、可进采购。时间越久，这家公司越能积累基准数据：哪些就绪度模式真正能替本土 AI 公司换来资本、算力和合同。
goToMarketSeed:
  firstCustomer: 首个客户应是一家位于多伦多或蒙特利尔的生成式 AI 公司：员工 75–250 人，ARR 在 $10 million 到 $30 million，每月 GPU 或云支出达到六位数，并刚招到公共部门负责人，正准备自己的第一个联邦试点或皇家机构采购响应。
  buyingTrigger: 公司在同一季度既决定申请渥太华支持的成长资本或算力支持，又在推进一个会要求 AI 安全、隐私和本土战略就绪证据的公共部门客户。
  currentAlternative: 补助与采购顾问、共享网盘数据室、电子表格清单、外部律师备忘录，以及通用 GRC 或投标软件。
  switchingReason: 这个切口能赢，是因为它把同一套证据复用到融资、算力和采购三条流程里，替创始人和法务省下数周工作量，同时把面向政府的叙事讲得更一致。
  pricingHypothesis: 按活跃就绪工作流和证据材料包收取年费订阅，另收政策模板导入的实施费；基准报告和外部利益相关方门户可作为高级模块单独加价。
