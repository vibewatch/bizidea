slug: canadian-ai-readiness-os
date: '2026-06-05'
executiveSummary: Canadian AI Readiness OS 应该以 先做加拿大 的证据系统切入，服务那些必须在同一经营窗口里同时跨过资本、算力和采购三道门槛的 AI 规模化公司。最直接的客户，是员工 50–300 人、GPU 支出明显、ARR 在 $5M-$50M、并正在推进联邦或皇家机构收入动作的加拿大 AI 公司，因为这类公司身上最集中地叠着渥太华支持的成长资本、Compute Access Fund 资格和买方尽调。产品起步不能做成泛 GRC 或泛投标软件；它得把一张内部证据图谱直接转成成长基金备忘录、算力申请说明和采购级 AI 风险材料包，并把责任人和续期日期都盯住。这个切口吸引人的地方在于：购买触发、首位用户、定价逻辑和验证指标，全都压在同一条真实提交流程上，而那正是创始人时间和顾问费用最痛的时候。GTM 应该由创始人主导、伙伴协助，通过 VC 平台团队、Scale AI 风格的商业化项目和采购顾问切入；一旦同一套证据跑出两条或以上外部流程，付费试点就该转成年订阅。明确的取舍是：在产品证明资本、算力和采购之间的复用真的存在、也值得软件化之前，先不要碰大而全的合规套件、SMB 初创公司或非加拿大项目。最大未决问题在于，Canadian Tech Growth Fund 的具体 评分标准 和部分后续政策模板 仍未公开，因此早期产品范围必须保持可配置，同时要尽快验证客户买的是软件，而不是捆绑顾问服务。只有先在加拿大拿下这个窄口子，再把工作流复制到其他主权 AI 市场，而不是只吃加拿大本地，这个 风险投资故事才站得住。
problem:
- 加拿大 AI 规模化公司 现在必须在资本、基础设施和采购三条独立流程里，同时证明自己的本土战略价值、算力需求和治理成熟度。
- 证据分散在财务、基础设施、法务、产品和公共部门团队手里，所以真实申请仍要靠电子表格、共享网盘、顾问和创始人亲写备忘录硬拼。
- 只要证据缺失或前后不一致，同一季度里基金申请会变慢、算力申请会变弱、付费公共部门试点也可能直接卡住。
solution:
- 先建一张证据图谱，把 股权结构表、招聘计划、GPU 和云支出、部署架构、安全控制、隐私材料和客户背书连起来。
- 再从同一套底层记录里产出三种工作流结果：成长基金材料包、Compute Access Fund 说明文件，以及政府买方 AI 风险包。
- 把缺失材料指派给明确负责人，跟踪多次提交流程之间的变化，并保留可审计导出，让客户回答政府问题时不用每次都从零开工。
whyWeWin:
- 这个产品解决的是跨工作流复用问题，而合规工具、RFP 工具和顾问各自只覆盖了其中一段。
- 这个切口踩在真实政策触发和清晰经济后果上，比起在没有 截止时间 的情况下卖一整套 AI 治理平台，更容易更快拿到验证。
- 如果公司能把客户结果、证据缺口和续期历史沉淀下来，就能长出一套相邻工具原生拿不到的基准数据。
strategicChoices:
  beachhead: 员工 50–300 人、ARR 在 $5M-$50M、每月 GPU 支出明显，并计划在 12 个月内追联邦、皇家机构或受监管公共部门收入的加拿大 AI 软件与模型公司。
  wedgeRationale: 这个窄入口更容易更快拿到验证，因为同一支管理团队会同时感受到三条关联 截止时间：政府资本、主权算力和买方尽调。如果更早切到泛 AI 治理或泛投标软件，紧迫感会被稀释、实施周期会被拉长，创业公司也会被迫在功能广度上和大厂硬碰。
  sequencingRationale: 先把可配置证据模型、文档生成和负责人任务分派，跑通一条真实提交流程；客户开始信任底层数据后，再加基准报告、续期工作流和外部门户。招聘和 GTM 也得按同样顺序来：先创始人亲自打单，再补政策运营和实施，等试点转年约可复用后再放大销售。
  notYet:
  - 面向安全和隐私团队的完整企业级 GRC 替代品。
  - 服务 SMB 或零收入初创公司的宽口径补助申请工具。
  - 在 5–10 个加拿大发布客户证明模型前，先做非加拿大主权项目模板。
market:
  tam: 估算 TAM 为 $90.0M：按 1,500+ 家加拿大 AI 公司、每家每年约 $60k 的就绪软件支出测算。
  sam: 估算 SAM 为 $15.0M：约 150 家符合滩头画像的加拿大 AI 规模化公司、每家约 $100k ACV。
  som: 估算第 3 年 SOM 为 $1.8M：通过直销和伙伴转介拿下 15 个生产客户、每家约 $120k ARR。
  segments:
  - 正在推进渥太华支持的资本、算力或采购流程的加拿大 AI 规模化公司。
  - 同时服务多家加拿大 AI 公司的 VC 平台团队和专业顾问。
  buyingProcess: 当 COO、CFO 或公共部门负责人撞上真实的基金、算力或采购 截止时间，发现同一套证据必须在多个团队间反复重建时，购买流程就会启动。买方通常会要求：先来一个绑定单次提交流程的付费试点，再过一轮安全与数据驻留审查，并证明产品既能减少顾问工时，也能提升响应质量。
product:
  mvp: MVP 应是一套加拿大托管的就绪工作台：支持手动上传、少量云支出与文档连接器、负责人任务分派、带版本的证据对象，以及成长基金、算力申请和采购风险输出模板。v1 不该去碰完整政策代写、自动法律意见或通用 RFP 套件替代。
  sixMonth: 先交付付费试点：跑通核心证据图谱、负责人工作流、加拿大托管导出，以及一套面向真实成长资本或算力申请、外加一条采购尽调流程的模板包。
  twelveMonth: 补上按角色审批、变更日志、供应商名录 与续期支持、证据缺口基准报告，以及更深的云支出、治理材料和利益相关方门户集成。
  twentyFourMonth: 只有在加拿大切口已经证明试点转化可复用、证据覆盖能复用后，再扩到更多受监管公共部门模板和首批非加拿大主权项目模块。
  keyBets:
  - 一套规范化证据模型，能填满基金、算力和采购流程里大部分必填字段。
  - 客户愿意接受“软件优先、实施有边界”的产品，而不是默认回到顾问重服务模式。
  - 加拿大托管部署和可审计导出，确实能明显提升公共部门敏感买方的信任。
  - 在拿下前 10 个客户后，成功证据模式的基准数据会变成一层更耐打的差异化。
gtm:
  wedge: 向一家加拿大 AI 规模化公司 卖出付费就绪试点：它所在季度正好把渥太华支持的资本或算力动作，与一笔公共部门交易叠在一起，并用实际结果证明同一张证据图谱能同时服务两边。
  channels:
  - 由创始人直接触达加拿大 AI 规模化公司 的 COO、CFO 和 VP Public Sector。
  - 与 VC 平台团队、Scale AI 风格商业化项目和加速器合作；这些机构本来就把后期 AI 公司聚到一起。
  - 通过采购、隐私和公共部门咨询机构建立转介与实施渠道。
  funnelTargets: 漏斗目标：Lead→合格试点 20–30%，合格试点→付费试点 40–50%，付费试点→年度生产合同 50%+；首单 ACV 在 $90k-$140k，此前先收 $35k-$60k 的试点费。
  pricing: 按客户账户下正在管理的活跃就绪工作流和证据包收年费，并在前面收一笔实施或试点费用；这个定价能对齐买方 ROI，因为客户买的不是 席位，而是在替代顾问工时、保护融资、算力和收入窗口。
businessModel:
  revenueStreams:
  - 面向就绪工作流与证据管理的年度平台订阅。
  - 首条真实提交流程的付费实施和模板配置费。
  - 基准报告、外部利益相关方门户和额外主权项目模板等高级模块。
  unitOfValue: 每个客户账户下正在管理的活跃就绪工作流与证据包。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一客户里，把成长资本、算力续期、供应商名录 更新和采购周期都装到更多工作流里。
  - 从一个业务单元或提交团队，扩到同一家公司里的财务、基础设施、法务和公共部门职能。
  - 一旦证据图谱成为内部系统记录，再卖基准分析和外部协作模块。
strategyMap:
  northStarMetric: 从同一张证据图谱发出的外部就绪工作流数量，以及这些工作流最终转成已获批资本、算力资格或付费公共部门机会的数量。
  inputMetrics:
  - 滩头市场里签下的付费试点数。
  - 从启动到首个“可提交材料包”的中位天数。
  - 至少在两条工作流间复用的必填证据字段占比。
  - 付费试点转年度生产合同的转化率。
  - 每个生产客户的平均活跃工作流数量。
  - 合格 线索池 中由伙伴带来的占比。
  moatsToBuild:
  - 一张标准化证据图谱，把财务、云支出、治理控制和公共部门尽调材料连起来。
  - 一套模板与基准数据，告诉团队哪些证据模式更容易换来成功提交和买方推进。
  - 加拿大托管的工作流与导出基础设施，内置变更日志、来源证明和续期历史；这些都是通用响应工具不会跟的。
  killCriteria:
  - 在创始人聚焦销售的前 9 个月里，签不到 2 个以上付费试点。
  - 前 3 个客户部署后，跨两条外部工作流可复用的必填证据字段占比仍低于 50%。
  - 产品上线 6 个月内，没有任何试点转成年费高于 $90k 的年度合同。
  - 前 3 个部署之后，每个客户的定制服务工时仍超过 40 小时。
  mermaid: |
    flowchart LR
      Wedge[Canadian readiness wedge] --> MVP[Evidence graph MVP]
      MVP --> Proof[Reusable submissions and pilot wins]
      Proof --> Expansion[More workflows and sovereign markets]
investorMemo:
  verdict:
    call: 值得见面 / 继续深挖
    conviction: 这是一个踩中政策窗口、首个买方也说得通的切口，但前提是先证明客户要买的是软件，而且跨流程复用真的成立；否则品类很容易塌回服务。
    whyBelieve: 公司瞄准的是一个真实的跨部门瓶颈：渥太华同时扮演投资人、算力分配者和锚定客户。
    whyDoubt: 只靠加拿大，本地需求天花板不高；一旦切口被证明值钱，相邻的合规、投标和 AI 治理厂商也可能很快本地化。
    nextDiligence: 确认至少 2 个付费试点：同一套证据支持多条外部流程，并在模型设定的价格区间内转成年约。
  firstCustomer:
    title: 一家加拿大生成式 AI 规模化公司 的 COO
    profile: 一家位于多伦多或蒙特利尔的 AI 公司：员工 75–250 人，ARR 在 $10M-$30M，每月云或 GPU 支出达到六位数，并刚建立公共部门收入动作。
    trigger: 公司所在季度一边想拿渥太华支持的资本或算力，一边又有联邦或皇家机构买方要求 AI 安全、隐私和本土就绪证据。
    buyer: COO
    initialContract: 先做一条真实提交流程上的 $35k-$60k 付费试点；只要至少两条工作流和一条买方尽调都从同一张证据图谱跑起来，再转成 $90k-$140k 的年订阅。
  mustBeTrue:
  - 至少 30% 的合格滩头市场公司，会在 12 个月窗口里同时面对资本、算力和采购就绪工作。
  - 一套规范化证据模型，必须能在前三类工作流里覆盖至少 60% 的必填输入，而不用按客户重建。
  - 至少一半付费试点，必须在 6 个月内转成 $90k+ 的年度合同。
  - 政府模板和评分标准必须在 12 个月内稳定到足以让公司把流程产品化，而不是长期像咨询店一样运转。
  - 在加拿大本地市场打满前，公司必须先识别出至少一个非加拿大主权 AI 市场，且工作流经济性类似。
  diligenceQuestions:
  - 第一版 Canadian Tech Growth Fund 申请包和评分 评分标准 什么时候出来？
  - 目标客户现在在顾问、提案工具和合规运营上已经花了多少钱？
  - 联邦 AI 采购机会里，到底有多大比例必须走 AI Source List，而不是其他采购路径？
  - 哪些证据材料几乎不用定制，就会同时出现在算力、资本和买方尽调里？
  - 现实里最初的预算控制权到底在谁手里：COO、CFO 还是 VP Public Sector？
operatingAssumptions:
- assumption: 目标 规模化公司 会为这套工作流买软件，而不是默认打包顾问服务。
  basis: research.yaml
  validationTest: 访谈 10–15 家合格公司，记录它们现在在顾问和工具上的支出，并在建议价格区间内签下至少 2 个付费试点。
  decisionImpact: 如果不成立，公司要么收窄成“顾问赋能的软件”，要么接受更低毛利的服务主导模式。
- assumption: 一张规范化证据图谱可以在有限定制下同时服务成长基金、算力申请和采购输出。
  basis: idea.yaml
  validationTest: 跑 3 个真实客户工作流，量化至少 60% 的必填字段和材料是否能在两个或以上输出间复用。
  decisionImpact: 如果不成立，产品范围就该收窄到付费意愿最强的单一工作流。
- assumption: 加拿大托管、可审计导出和来源日志，会高频出现在买方或内部安全审查中，并影响赢单率。
  basis: research.yaml
  validationTest: 在前 10 个合格机会里，跟踪驻留、主权或证据来源要求出现的频率。
  decisionImpact: 如果不成立，公司可以降低基础设施复杂度，把竞争焦点更多放在工作流速度，而不是托管姿态。
- assumption: 伙伴渠道之所以能贡献早期 线索池，是因为它们本来就把目标 ICP 聚在一起。
  basis: research.yaml
  validationTest: 签下 3 个转介或实施伙伴，并证明 12 个月内至少 25% 的合格 线索池 来自伙伴。
  decisionImpact: 如果不成立，招聘和现金计划就要更偏向更长时间的创始人主导外呼，而不是过早补渠道支持。
- assumption: 在加拿大市场触顶前，公司能找到一个存在类似主权 AI 工作流痛点的出口市场。
  basis: 团队判断
  validationTest: 18 个月内，在一个海外市场完成至少 10 次买方或顾问访谈，并确认触发条件和价格承受力可比。
  decisionImpact: 如果不成立，公司应按加拿大利基软件业务估值和融资，而不是按更大平台故事来讲。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 客户发现与预算映射
  hypothesis: COO、CFO 和公共部门负责人会把这件事描述成一个反复出现的跨部门软件问题，而不只是偶发的顾问活。
  successMetric: 完成 15 次合格访谈，其中 10 次明确提到顾问或手工流程带来的痛点，5 家愿意看试点范围。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 与 1 家共创客户设计证据模型
  hypothesis: 一套 证据结构定义 就能装下前三类工作流所需的核心财务、算力、治理和买方材料。
  successMetric: 签下 1 家共创客户，并画出覆盖其真实提交流程至少 80% 所需材料的 结构定义。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 在真实提交流程上拿下首个付费试点
  hypothesis: 如果产品能把文档折腾减下来，并从同一套证据生成两种外部输出，客户就愿意为一个有边界的试点付费。
  successMetric: 至少签下 2 个 $35k-$60k 的付费试点，且每个都能在 30 天内产出可提交材料包。
  owner: 创始人 / CEO
- horizon: 90–180 天
  experiment: 测试模板可配置性
  hypothesis: 可配置模板和变更日志能吸收政策模糊性，而不会把每次部署都拖成定制咨询。
  successMetric: 即便模板临时变化，每个试点的定制设置工时也不超过 40 小时。
  owner: 政策运营负责人
- horizon: 6–12 个月
  experiment: 试点转年约，并扩到第二条工作流
  hypothesis: 客户只要用产品跑过一条真实周期，就会愿意把更多就绪工作流标准化到同一平台上。
  successMetric: 至少 1 个试点转成 $90k+ 年约，并在上线后 90 天内激活第二条工作流。
  owner: 创始人 / CEO
- horizon: 12–18 个月
  experiment: 启动伙伴供给 线索池
  hypothesis: VC 平台团队、商业化项目和采购顾问带来的介绍，转化率会高于冷启动外呼。
  successMetric: 至少 25% 的合格 线索池 来自伙伴，且转成付费试点的比例高于创始人外呼。
  owner: GTM 负责人
operations:
- 所有部署都跑在加拿大托管基础设施上，并保留可审计的导出日志与由客户控制的文档留存。
- 维护一套带版本的模板库，覆盖成长资本、算力申请、供应商名录 和采购风险工作流，并把每次变更记清楚。
- 每周做客户就绪复盘：分派缺失证据、清除负责人阻塞，并盯住从 项目启动 到“可提交材料包”的时间。
- 持续记录被替代掉的顾问工时、证据复用率和试点结果，让定价和基准主张都站在证据上。
- 法务和政策解释必须保留人工复核；产品负责组织证据和流程，不提供法律意见。
team:
- role: 创始人 / CEO
  startTiming: 第 0 个月
  rationale: 在 ICP 和转化动作还没证实前，亲自负责销售、共创客户招募、定价和伙伴拓展。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责证据图谱、导出引擎，以及首批云支出和文档集成；这些决定切口能否真正产品化。
- role: 政策运营负责人
  startTiming: 第 2 个月
  rationale: 把不断变化的政府要求翻成可配置模板，避免早期部署滑成定制咨询。
- role: 实施工程师
  startTiming: 第 4 个月
  rationale: 当首批试点模式清楚后，负责实施、连接器加固和客户上线速度。
- role: GTM 负责人
  startTiming: 第 9 个月
  rationale: 只有在付费试点包装和转化证据已经清楚后，才增加 线索池 产能和伙伴管理。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2–3 个来自滩头市场的加拿大 AI 规模化公司付费试点。
  - 交付证据图谱 MVP，并能导出成长基金、算力申请和采购风险工作流。
  - 至少把 1 个试点转成 $90k+ 的年度生产合同。
- horizon: 12–24 个月
  items:
  - 做到 5–10 个生产客户，并把实施标准化到可复用模板和连接器包。
  - 上线基准报告、续期工作流和外部利益相关方门户，抬高 ACV。
  - 用可引用的买方调研和至少 1 个共创合作，验证一个非加拿大主权项目邻近市场。
- horizon: 24–36 个月
  items:
  - 在扩张每客户工作流数量的同时，朝研究里的 $1.8M 本土 SOM 情形推进。
  - 在已安装客户群里建立一套有防守力的数据集，覆盖证据复用、提交结果和续期模式。
  - 只有在加拿大试点转化、毛利率和部署范围都仍在计划内时，才进入第二个主权 AI 市场。
risks:
- risk: 项目标准和监管模板变化速度快过产品标准化工作流的速度。
  likelihood: High
  impact: High
  mitigation: 把证据对象和模板拆开，所有工作流都做版本化，并用政策运营团队维护一层统一模板，覆盖多家客户。
- risk: 早期客户要求顾问式实施，侵蚀毛利并拖慢产品学习速度。
  likelihood: Medium
  impact: High
  mitigation: 把部署范围收在一条真实提交流程内，给定制工作设上限，并在放大销售前先补实施和政策人才。
- risk: 加拿大滩头市场太小，在国际扩张被验证前不足以支撑 风险投资式增长。
  likelihood: High
  impact: High
  mitigation: 先在加拿大快速验证证据模型，再测试一个相邻主权市场，确认成立后再投入更大的 GTM 建设。
- risk: 相邻的合规、投标或 AI 治理厂商本地化足够多功能，削弱这个切口。
  likelihood: Medium
  impact: Medium
  mitigation: 竞争点放在跨工作流证据复用、基准数据、加拿大托管姿态，以及更快落地到真实提交流程。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱将支持一支 4–5 人团队，做出加拿大托管的证据图谱与模板引擎，完成 2–3 个付费试点，并在进入更大一轮融资前证明“试点转年约”与“伙伴协助线索池”成立。
