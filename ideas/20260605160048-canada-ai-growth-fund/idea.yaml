ideaScorecard:
  signalStrength:
    score: 4
    rationale: "Three same-day verified reports show Ottawa is creating capital, compute, and procurement motions at once, which is a strong and unusually coordinated signal."
  painIntensity:
    score: 4
    rationale: "For an AI scaleup, failing one readiness workflow can block capital, infrastructure, or revenue in the same period."
  wedgeClarity:
    score: 5
    rationale: "One evidence workspace reused across growth-fund, compute-access, and procurement workflows is a narrow and directly testable entry product."
  defensibility:
    score: 4
