topRisks:
  - name: "Policy whiplash"
    description: "If Ottawa changes program criteria or delays legislation, the exact workflow shape could move underneath the product."
    mitigation: "Design the system around reusable evidence objects and configurable templates so one policy change updates many workflows instead of forcing bespoke services."
  - name: "Services-heavy onboarding"
    description: "Early customers may expect consultant-style help because their readiness data is fragmented across legal, finance, and engineering teams."
    mitigation: "Productize onboarding around fixed evidence schemas, role-based tasks, and a narrow first use case tied to one live submission cycle."
  - name: "Narrow initial buyer pool"
    description: "Only a subset of Canadian AI firms will simultaneously need government capital, sovereign compute, and procurement readiness in the first year."
    mitigation: "Start with scaleups already pursuing public-sector revenue, then expand into adjacent sovereign AI programs and portfolio-level workflows through VC and advisor channels."
