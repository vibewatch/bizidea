  searchedQueries:
  - 查找关于加拿大 2026 AI 战略的最新且最权威资料，覆盖 Canadian Tech Growth Fund、Compute Access Fund、主权 AI 算力，以及政府作为锚定客户的角色。优先政府页面、加拿大主流科技媒体和一手来源。
  - 查找关于加拿大联邦 AI 采购、政府 AI 采用、AI 安全或隐私指导，以及 2025–2026 年与 deepfake、chatbot 或负责任 AI 相关的即将出台立法或政策的权威资料。
  - 查找关于加拿大 AI 初创与 规模化公司 市场规模、加拿大 AI 公司数量、加拿大 AI 投融资活动、GPU 或云容量约束，以及商业化瓶颈的资料。优先政府、行业协会、分析师评论和可信媒体。
  - 为帮助企业管理采购就绪、合规证据、投标流程和 AI 治理的软件，查找竞品与替代方案证据。若能拿到 Vanta、Drata、Loopio、Responsive 和 Credo AI 的定价页或产品页，也一并纳入。
  - 查找加拿大 AI 公司在推进公共部门销售、主权算力或合规就绪时的客户痛点证据，包括 RFP 要求、采购摩擦、云或 GPU 约束、顾问驱动替代方案，以及买方顾虑。尽量包含 RFP、论坛、评论或行业来源。
  - 查找 2024–2026 年关于加拿大 AI Compute Access Fund 的一手和可信资料，覆盖 proposal call、资格条件、授奖公告以及主权 AI 数据中心采购。
  - 查找与向联邦或皇家机构买方销售 AI 的厂商相关的权威加拿大采购与数字政府文件，包括 AI 供应商名录、负责任 AI 指导、指令、算法影响评估、采购现代化和生成式 AI 指南。
  - 查找关于加拿大企业与政府 AI 采用障碍的可信资料，包括信任、隐私、人才、数据治理和 ROI 障碍。优先 Statistics Canada、KPMG、Deloitte/CIFAR、Forbes、OECD 或政府来源。
  - 查找 Vanta、Drata、Loopio、Responsive、Credo AI、Hyperproof 和 OneTrust 的官方页面与可信分析，重点看产品定位、定价、合规自动化、RFP 工作流和 AI 治理。
  - 查找加拿大关于云主权、CLOUD Act、本地数据驻留顾虑、公共部门买方对加拿大托管基础设施的偏好，以及加拿大主权云计划的资料。
  - 查找对加拿大 AI 初创或 AI 公司数量的可信估算，尤其是 2024–2026 年的最新数字。优先行业协会、政府、CVCA、Deloitte、CIFAR 或加拿大生态报告。
  - 查找关于加拿大公共部门采购周期、提案负担，或企业与政府销售中使用顾问/投标软件/安全问卷的可信资料。尽量纳入与 Loopio 或 Responsive 这类 RFP 自动化工具有关的来源。
