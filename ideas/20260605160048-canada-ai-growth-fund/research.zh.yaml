  strength: 证据自动化、第三方风险和问卷工作流能力强。
  weaknessVsUs: 不是为加拿大算力基金、成长资本或采购就绪输出而设计。
  sourceRefs:
  - 22
- name: Loopio
  stage: 成长期
  wedge: RFP 响应与内容管理。
  pricing: 按报价定制。
  strength: 协作式响应流程和提案分析能力强。
  weaknessVsUs: 它从响应内容出发，而不是从跨部门经营证据或主权项目就绪出发。
  sourceRefs:
  - 24
- name: Responsive
  stage: 成长期
  wedge: 覆盖 RFP、安全问卷和买方提问的企业级响应智能。
  pricing: 联系销售的企业模式。
  strength: 装机量大，覆盖买方提问范围广。
  weaknessVsUs: 没有专门针对加拿大主权要求，也不覆盖融资与算力流程。
  sourceRefs:
  - 25
- name: Credo AI
  stage: 成长期
  wedge: AI 治理与负责任 AI 控制。
  pricing: 定制化 demo 驱动的企业销售。
  strength: 围绕 AI 政策、控制和风险证据原生打造。
  weaknessVsUs: 重心是模型治理，不是基金资格、算力说明和采购打包。
  sourceRefs:
  - 26
- name: OneTrust
  stage: 现有厂商
  wedge: 覆盖信任、隐私和 AI 治理的宽平台。
  pricing: 可扩展套餐 + 定制销售。
  strength: 在隐私、风险和 AI 政策上治理版图广。
  weaknessVsUs: 默认太宽也太泛，拿不下加拿大主权项目工作流这个窄口子。
  sourceRefs:
  - 27
regulatoryTechnicalConstraints:
- point: AI Compute Access Fund 的资格要求包括：必须是加拿大营利性 AI 公司、员工少于 500 FTE、研发在加拿大进行，且算力项目规模介于 $100k 到 $5M。
  sourceRefs:
  - 5
- point: 联邦 AI 使用预计需要对齐负责任 AI 指导、Directive on Automated Decision-Making，以及面向敏感信息的生成式 AI 护栏。
  sourceRefs:
  - 6
  - 28
- point: 即便数据托管在加拿大，只要云提供商由外国运营，仍可能暴露在外国法律程序之下，削弱单纯“数据驻留”叙事。
  sourceRefs:
  - 8
  - 19
  - 21
- point: 联邦 AI 采购已经采用 source list 和资格分层，这会直接决定厂商如何进入采购动作线。
  sourceRefs:
  - 7
validationSignals:
- point: 联邦 AI Source List 已从最初 74 家合格供应商扩展到 145 家，说明 AI 厂商确实存在一条正在运行的采购通道。
  sourceRefs:
  - 7
- point: 加拿大企业使用 AI 的比例在 2025 年 Q2 升至 12.2%，而 2024 年 Q2 只有 6.1%，采用速度明显加快。
  sourceRefs:
  - 13
- point: Scale AI 宣布 44 个新项目、对应 $129 million 投资，说明围绕本土 AI 的商业化活动仍在继续。
  sourceRefs:
  - 34
- point: Proposal Forge 以加拿大托管、审计轨迹和政府投标痛点卖 proposal automation，说明本地化工作流需求真实存在。
  sourceRefs:
  - 33
- point: KPMG 和 IBM 都把治理与监督缺口视为加拿大组织扩大 AI 采用的真实阻力。
  sourceRefs:
  - 16
  - 31
openQuestions:
- Canadian Tech Growth Fund 一旦公开申请材料后，到底会要求哪些字段、什么评分标准，以及怎样的续期资料频率？
- 未来几轮 Compute Access Fund 会不会与采购和成长基金流程共享可复用的数据结构，还是继续各走各的申请栈？
- 联邦或皇家机构 AI 试点，到底多大比例要先进入 source list，而不是走其他采购通道？
- 目标规模化公司里，到底有多大比例会在前六个月买软件，而不是继续期待打包顾问服务？
