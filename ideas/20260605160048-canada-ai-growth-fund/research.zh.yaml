  fiveForces:
    supplierPower:
      score: 3
      rationale: 产品依赖政策更新、云连接器和法律解释，但没有任何单一供应方能卡住整条就绪工作流。
      sourceRefs:
      - 19
      - 28
      - 30
    buyerPower:
      score: 4
      rationale: 滩头市场只是一小批后期加拿大 AI 公司，每个买方都可能在采用新软件前要求 ROI 证明或顾问式支持。
      sourceRefs:
      - 17
      - 29
    threatOfEntrants:
      score: 3
      rationale: 工作流软件不难做，但基准数据和政府敏感型 AI 团队的信任，需要更长时间才能攒起来。
      sourceRefs:
      - 7
      - 33
      - 34
    threatOfSubstitutes:
      score: 4
      rationale: 顾问、共享网盘、RFP 工具和合规平台，已经把工作里的一部分做到了“够用”，足以吃掉很多早期客户。
      sourceRefs:
      - 22
      - 24
      - 25
      - 33
    competitiveRivalry:
      score: 3
      rationale: 相邻品类很拥挤，但真正同时覆盖加拿大基金 + 算力 + 采购就绪的直接重叠仍然有限。
      sourceRefs:
      - 20
      - 22
      - 24
      - 26
      - 27
  pestle:
  - factor: 政治
    impact: positive
    point: 联邦产业政策现在把商业化、算力和战略采购绑在一起，短期内自然会冒出一个必须解决的就绪问题。
    sourceRefs:
    - 1
    - 2
    - 4
  - factor: 经济
    impact: neutral
    point: GPU 和基础设施成本让就绪体系更值钱，但也把早期买方池收窄到资金更充足的规模化公司。
    sourceRefs:
    - 5
    - 17
  - factor: 社会
    impact: negative
    point: 信任和隐私顾虑会加重尽调负担，尤其是面向政府敏感场景销售的 AI 厂商。
    sourceRefs:
    - 3
    - 9
    - 16
  - factor: 技术
    impact: positive
    point: 只要底层证据干净且可控，生成式 AI 和自动化响应技术确实能压缩文档拼装时间。
    sourceRefs:
    - 25
    - 28
  - factor: 法律
    impact: negative
    point: 外资云的司法辖区叠加即将到来的隐私/安全规则，让主权与可审计性更难证明。
    sourceRefs:
    - 8
    - 19
    - 21
  - factor: 环境
    impact: neutral
    point: 加拿大在能源和土地上的优势利好数据中心扩建，但基础设施规模仍决定了谁能真正参与。
    sourceRefs:
    - 4
    - 12
  adoptionFrictionMatrix:
  - friction: 证据散落在财务、基础设施、法务和 GTM 系统里
    severity: 高
    affectedBuyer: COO / CFO
    mitigation: 先搭一套规范化证据模型，并把缺失材料明确分配给负责人。
    sourceRefs:
    - 1
    - 5
    - 33
  - friction: 政府模板和政策细则还在变化
    severity: 高
    affectedBuyer: VP Public Sector
    mitigation: 交付可配置模板和变更日志，而不是把流程写死在文档里。
    sourceRefs:
    - 3
    - 30
  - friction: 数据驻留和安全顾虑限制了工具被接受的范围
    severity: 中
    affectedBuyer: 安全 / 法务买方
    mitigation: 提供加拿大托管、可审计导出，以及可追溯的证据来源。
    sourceRefs:
    - 8
    - 19
    - 33
  - friction: 早期客户依然可能期待服务型实施
    severity: 中
    affectedBuyer: Founder / customer success lead
    mitigation: 把实施打包成一条真实提交流程，模板范围固定、边界清楚。
    sourceRefs:
    - 17
    - 32
market:
