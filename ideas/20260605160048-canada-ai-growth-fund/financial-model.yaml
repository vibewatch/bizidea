scenarios:
  downside:
    description: "Policy templates stay ambiguous, partner referrals underdeliver, and customers keep the product at one workflow for longer."
    y3RevenueK: 1325.0
    y3EbitdaK: -565.0
    cashLowPointK: -145.0
    keyAssumptionChanges:
      - "Blended annual ARPU reaches only about $125K because benchmark and external portal modules attach later."
      - "Workflow-unit adds slow to roughly 3 in Y2 and 4 in Y3, ending near 12 active paid workflow units."
      - "Steady-state gross margin stalls near 70% as onboarding remains more services-heavy."
  base:
    description: "Founder-led pilots convert into a repeatable annual subscription motion, then existing accounts add capital, compute, and procurement workflows from the same evidence graph."
    y3RevenueK: 1806.47
    y3EbitdaK: -301.16
    cashLowPointK: 261.59
    keyAssumptionChanges:
      - "Annual revenue per active workflow unit reaches $145K by Y3 through module expansion and onboarding fees."
      - "Workflow-unit adds total 6 in Y2 and 7 in Y3, ending at 16 active paid workflow units."
      - "Gross margin rises from 52%-68% in Y1 to 74% exit margin by Q4Y3 as templates and connectors standardize."
  upside:
    description: "VC and program partners source warmer pipeline, Canada templates stabilize faster, and multi-workflow expansion lands earlier inside each production account."
    y3RevenueK: 2145.0
    y3EbitdaK: 35.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
      - "Blended annual ARPU reaches about $155K as benchmark reporting and external portals attach sooner."
      - "Workflow-unit adds accelerate to roughly 8 in Y3, ending near 18 active paid workflow units."
      - "Steady-state gross margin reaches 76% because implementations become mostly template-led."
sensitivity:
  - variable: ARPU
    downsideCase: "$130K annual revenue per active workflow unit"
    baseCase: "$145K annual revenue per active workflow unit"
    upsideCase: "$155K annual revenue per active workflow unit"
    y3RevenueImpactK: -190.0
    cashImpactK: -145.0
  - variable: CAC
    downsideCase: "$70K CAC if founder-led cycles stay bespoke"
    baseCase: "$57K CAC"
    upsideCase: "$45K CAC through stronger partner sourcing"
    y3RevenueImpactK: -80.0
    cashImpactK: -155.0
  - variable: churn
    downsideCase: 3.0% monthly churn after first annual terms
    baseCase: 2.0% monthly churn
    upsideCase: 1.5% monthly churn
    y3RevenueImpactK: -110.0
    cashImpactK: -90.0
  - variable: sales cycle
    downsideCase: 9-month pilot-to-production cycle
    baseCase: 6-7 month blended cycle
    upsideCase: 4-5 month cycle with live-deadline urgency
    y3RevenueImpactK: -300.0
    cashImpactK: -240.0
  - variable: gross margin
    downsideCase: 70% exit gross margin
    baseCase: 74% exit gross margin
    upsideCase: 76% exit gross margin
    y3RevenueImpactK: 0.0
    cashImpactK: -95.0
  - variable: hiring pace
    downsideCase: "Add GTM and support hires two quarters earlier than plan"
    baseCase: "Hire only after pilot-to-annual proof points"
    upsideCase: "Delay one commercial hire until Q4Y3 because partner channel carries more load"
    y3RevenueImpactK: -40.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> WorkflowUnits
      WorkflowUnits --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from 16 active paid workflow units by Q4Y3 at $145K blended ARPU as customers expand from one live submission workflow into recurring capital, compute, and procurement packs."
  - checkName: Must go right
    finding: "The team must prove pilot-to-annual conversion before pulling forward sales hiring, because the cash plan assumes founder-led selling and partner referrals create enough Y2 volume to reach 9 paid workflow units."
  - checkName: Model breaks if
    finding: "If sales cycles stretch toward nine months or gross margin stays near 70%, the $2.0M pre-seed no longer covers the path to export-adjacency proof and downside cash turns negative."
  - checkName: Next-round proof
    finding: "The next round is justified once the company exits Y2 with 5-7 production customers, 9 active paid workflow units, referenceable partner-sourced deals, and one non-Canadian design engagement."
sanityChecks:
  ruleOf40: "Y3 growth 151% + EBITDA margin -17% = 134%"
  burnMultiple: "Y2 burn multiple ~1.38x (-$745K EBITDA on +$539K revenue), improving to ~0.28x in Y3 (-$301K on +$1.09M revenue)."
  revenuePerFte: "$226K Y3 revenue per year-end FTE (benchmark $200-400K SaaS)."
  flags:
    - "Base case depends on multi-workflow expansion inside a small Canada-first beachhead; if most accounts buy only one workflow, revenue will track below plan."
    - "Canadian Tech Growth Fund and related policy templates are still evolving, so onboarding may remain more services-heavy than the model assumes."
    - "The model uses a clean EBITDA-to-cash simplification and assumes the full $2.0M round closes before M1; fundraising delay would tighten runway."
