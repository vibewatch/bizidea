scenarios:
  downside:
    description: 政策模板长期模糊、伙伴转介低于预期，客户也更久只买一条工作流。
    y3RevenueK: 1325.0
    y3EbitdaK: -565.0
    cashLowPointK: -145.0
    keyAssumptionChanges:
    - 由于基准报告和外部门户模块挂得更晚，混合年 ARPU 只能到约 $125K。
    - 工作流单元新增速度放慢到 Y2 大约 3 个、Y3 大约 4 个，年末约 12 个活跃付费工作流单元。
    - 由于实施仍偏重服务，稳态毛利率停在约 70%。
  base:
    description: 创始人主导拿下的试点能稳定转成年订阅，随后老客户会基于同一张证据图谱继续加资本、算力和采购工作流。
    y3RevenueK: 1806.47
    y3EbitdaK: -301.16
    cashLowPointK: 261.59
    keyAssumptionChanges:
    - 随着模块扩张和实施费兑现，到 Y3 每个活跃工作流单元的年收入达到 $145K。
    - Y2 新增 6 个工作流单元、Y3 新增 7 个，年末达到 16 个活跃付费工作流单元。
    - 随着模板和连接器标准化，毛利率从 Y1 的 52%-68% 提升到 Q4Y3 的 74% 退出水平。
  upside:
    description: VC 和项目伙伴带来更热的 线索池，加拿大模板更快稳定，而且每个生产客户里的多工作流扩张更早落地。
    y3RevenueK: 2145.0
    y3EbitdaK: 35.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - 由于基准报告和外部门户挂得更早，混合年 ARPU 可到约 $155K。
    - Y3 工作流单元新增速度提到约 8 个，年末接近 18 个活跃付费工作流单元。
    - 由于实施大多转成模板驱动，稳态毛利率达到 76%。
sensitivity:
- variable: ARPU
  downsideCase: 每个活跃工作流单元年收入 $130K
  baseCase: 每个活跃工作流单元年收入 $145K
  upsideCase: 每个活跃工作流单元年收入 $155K
  y3RevenueImpactK: -190.0
  cashImpactK: -145.0
- variable: CAC
  downsideCase: 如果创始人主导的销售周期一直高度定制，CAC 为 $70K
  baseCase: CAC 为 $57K
  upsideCase: 靠更强的伙伴供给把 CAC 压到 $45K
  y3RevenueImpactK: -80.0
  cashImpactK: -155.0
- variable: 流失率
  downsideCase: 首个年约之后月流失率 3.0%
  baseCase: 月流失率 2.0%
  upsideCase: 月流失率 1.5%
  y3RevenueImpactK: -110.0
  cashImpactK: -90.0
- variable: 销售周期
  downsideCase: 试点到生产要 9 个月
  baseCase: 混合销售周期 6-7 个月
  upsideCase: 靠真实 截止时间 紧迫感把周期压到 4-5 个月
  y3RevenueImpactK: -300.0
  cashImpactK: -240.0
- variable: 毛利率
  downsideCase: 退出毛利率 70%
  baseCase: 退出毛利率 74%
  upsideCase: 退出毛利率 76%
  y3RevenueImpactK: 0.0
  cashImpactK: -95.0
- variable: 招聘节奏
  downsideCase: 比计划提前两个季度补 GTM 和支持岗位
  baseCase: 只有在证明试点能转年约后才招聘
  upsideCase: 伙伴渠道承担更多工作，因此把 1 个商业化岗位延后到 Q4Y3
  y3RevenueImpactK: -40.0
  cashImpactK: -180.0
