  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> WorkflowUnits
      WorkflowUnits --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入来自 Q4Y3 年末 16 个活跃付费工作流单元，以及每个单元 $145K 的混合 ARPU；客户会从一条真实提交流程扩到持续性的资本、算力和采购材料包。
- checkName: 必须做对的事
  finding: 团队必须先证明试点能稳定转年约，再提前扩销售，因为现金计划假设 Y2 量的来源仍是创始人打单和伙伴转介，目标是做到 9 个付费工作流单元。
- checkName: 模型会失效的情况
  finding: 如果销售周期拉向 9 个月，或毛利率长期停在 70% 附近，这笔 $2.0M 种子前轮融资就撑不到出口相邻市场验证，下行情形下的现金也会转负。
- checkName: 下一轮融资证明点
  finding: 当公司在 Y2 年末做到 5–7 个生产客户、9 个活跃付费工作流单元、可引用的伙伴来源交易，以及 1 个非加拿大设计合作时，下一轮融资就说得通。
sanityChecks:
  ruleOf40: Y3 增长率 151% + EBITDA 利润率 -17% = 134%
  burnMultiple: Y2 burn multiple 约 1.38x（+$539K 收入对应 -$745K EBITDA），到 Y3 改善为约 0.28x（+$1.09M 收入对应 -$301K）。
  revenuePerFte: Y3 年末每个 FTE 对应 $226K 年收入（SaaS 基准约 $200-400K）。
  flags:
  - 基准情形依赖在一个 先做加拿大 的小滩头市场里，把每个客户扩成多工作流；如果多数账户始终只买一条工作流，收入就会落后于计划。
  - Canadian Tech Growth Fund 及相关政策模板仍在演变，因此实施可能会比模型假设更偏服务。
  - 模型把 EBITDA 近似成现金流，并假设整笔 $2.0M 融资在 M1 前完成；如果融资延迟，现金跑道会立刻收紧。
