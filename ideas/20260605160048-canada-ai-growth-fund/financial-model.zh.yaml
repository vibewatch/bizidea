  amountM: 2.0
  runwayMonths: 24
  milestone: 在发起 seed 轮前，于 Y2 结束时做到 5–7 个生产客户、9 个活跃付费工作流单元、一套可复用的“试点转年约”动作，并拿下 1 个非加拿大主权项目设计合作。
