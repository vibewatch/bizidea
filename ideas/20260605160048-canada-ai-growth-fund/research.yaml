  adoptionFrictionMatrix:
  - friction: Evidence is fragmented across finance, infra, legal, and GTM systems
    severity: high
    affectedBuyer: COO / CFO
    mitigation: Start with one canonical evidence model and explicit owners for missing artifacts.
