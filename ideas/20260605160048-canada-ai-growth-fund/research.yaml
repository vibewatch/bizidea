    - 21
  - point: A Canada-first product is credible locally, but the larger expansion path depends on similar sovereign-AI programs abroad.
    sourceRefs:
    - 18
    - 21
  sensitivityCases:
  - case: Growth-fund and procurement templates remain loosely specified
    impact: If application schemas stay ambiguous, onboarding becomes services-heavy and sales cycles extend.
    sourceRefs:
    - 1
    - 3
    - 30
  - case: Domestic compute capacity expands faster than expected
    impact: If supply becomes easier to secure, the wedge shifts from allocation-readiness toward procurement and governance readiness.
    sourceRefs:
    - 4
    - 5
    - 17
  - case: Adjacent incumbents bundle Canada templates
    impact: If proposal or compliance vendors localize quickly, differentiation must come from cross-workflow benchmarking and sovereign-program expertise.
    sourceRefs:
    - 22
    - 24
    - 25
    - 27
  validationPlan:
  - priority: high
    question: What exact fields, scoring rubric, and renewal cadence will the Canadian Tech Growth Fund require once materials are public?
    evidenceToGather: Obtain the first application pack, evaluation rubric, and any example investor memo or checklist from ISED or participating companies.
  - priority: high
    question: How many target scaleups will buy software rather than bundled advisory services in the first six months?
    evidenceToGather: Run founder and COO interviews with 10-15 Canadian AI firms and collect current spend on consultants, proposal tools, and compliance ops.
  - priority: medium
    question: How often do federal or crown-agency AI pilots require source-list participation versus other procurement vehicles?
    evidenceToGather: Review recent AI-related RFPs and interview procurement advisors who place vendors into federal pilots.
  - priority: medium
    question: Can one canonical evidence model really serve compute, capital, and procurement workflows without heavy customization?
    evidenceToGather: Pilot three live customer workflows and measure how much evidence is reusable across all three outputs.
