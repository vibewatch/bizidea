    - 40
  - point: Academic neurology groups and centers like NIMHANS/IISc/CBR-style collaborators help create India-specific calibration and credibility for local populations.
    sourceRefs:
    - 10
    - 11
    - 29
    - 31
    - 32
    - 35
  - point: Compliance and accreditation partners become important because local IVD approval, CAP/CLIA-style documentation, and SOP traceability will shape procurement.
    sourceRefs:
    - 8
