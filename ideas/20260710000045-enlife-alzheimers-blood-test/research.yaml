    - 28
  dataMoats:
  - point: A network-level dataset on specimen integrity, reruns, and site drift across collection centers becomes more useful with every fragile assay added.
    sourceRefs:
    - 13
    - 29
    - 30
  - point: Indian population-specific interpretive bands and indeterminate-zone outcomes could become defensible IP if the startup links raw biomarker readings to confirmatory follow-up.
    sourceRefs:
    - 10
    - 11
    - 32
    - 33
    - 34
    - 35
  - point: Closed-loop evidence on whether abnormal blood results actually reach PET/CSF or therapy evaluation can differentiate the startup from assay vendors that stop at test performance.
    sourceRefs:
    - 23
    - 24
    - 31
    - 36
  geographicConsiderations:
  - point: Metro-centered private diagnostic networks are the practical first wedge because India combines large hub-and-spoke lab infrastructure with significant out-of-pocket dementia care and specialist concentration in tertiary cities.
    sourceRefs:
    - 1
    - 3
    - 4
    - 5
    - 6
    - 7
  - point: 'Population transferability cannot be assumed: India-specific datasets and subgroup calibration matter if assays were trained mostly on Western cohorts.'
    sourceRefs:
    - 10
    - 11
    - 29
    - 33
    - 34
    - 35
  - point: Expansion should follow chains that already partner with tertiary neurology hospitals rather than rural-first rollouts, because confirmatory and treatment pathways are still capacity constrained.
    sourceRefs:
    - 1
    - 12
    - 20
    - 21
    - 36
    - 38
  sensitivityCases:
  - case: India rollout stays pilot-heavy because IVD approval, payer support, and therapy access move slower than assay headlines suggest.
    impact: Site-level software budgets arrive later and the startup sells more as validation/QC tooling than as a scaled operating system.
    sourceRefs:
    - 8
    - 9
    - 25
    - 26
  - case: Large labs and assay vendors bundle enough workflow support to satisfy initial buyers.
    impact: The startup must differentiate on vendor neutrality, Indian calibration, and cross-assay governance instead of generic launch dashboards.
    sourceRefs:
    - 14
    - 15
    - 17
    - 18
    - 19
    - 20
    - 21
    - 22
    - 39
    - 40
  - case: Real-world cutoff variability remains stubborn across comorbidities and collection conditions.
    impact: Central labs may delay broad site activation, increasing implementation time but strengthening demand for a QC-first rollout layer.
    sourceRefs:
    - 29
    - 30
    - 33
    - 34
    - 35
  validationPlan:
  - priority: high
    question: How many blood-biomarker pilots are Indian chains actually planning for the next 12-18 months, and with which assay vendors or hospital partners?
    evidenceToGather: Pipeline interviews with 8-10 medical directors, plus signed vendor MOUs or tertiary-hospital pilot announcements.
  - priority: high
    question: What proportion of samples from distributed collection centers fail or require rerun when new protein biomarker SOPs are first introduced?
    evidenceToGather: Pilot data from one chain comparing pre-analytic rejection, turnaround time, and rerun rates across 20-50 sites.
  - priority: medium
    question: How often do abnormal or indeterminate blood results convert into PET, CSF, or therapy evaluation within 30 days?
    evidenceToGather: Closed-loop referral audits with partner neurologists and memory clinics.
  - priority: low
    question: Which CDSCO pathway and documentation burden applies to imported versus locally developed Alzheimer biomarker assays?
    evidenceToGather: Regulatory counsel memo plus two vendor case studies.
