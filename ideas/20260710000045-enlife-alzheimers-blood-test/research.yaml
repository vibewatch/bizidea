    - 7
    - 10
    - 11
  - point: Assay vendors, reference labs, and analyzer partners are natural co-sell channels when they need a chain to operationalize a new biomarker menu across many sites.
    sourceRefs:
    - 14
    - 15
    - 17
    - 19
    - 20
    - 21
    - 22
    - 39
    - 40
  - point: Neurology and memory-clinic partners matter as referral amplifiers because they can specify reflex workups and validate whether abnormal results are being acted on.
    sourceRefs:
    - 1
    - 12
    - 23
    - 24
    - 36
  partnershipEcosystem:
  - point: Analyzer and assay partners such as Roche, Fujirebio/Labcorp, Quanterix/Lucent, Quest, and C2N can provide method-specific evidence and cutoffs but still need vendor-neutral deployment support inside chain operations.
    sourceRefs:
