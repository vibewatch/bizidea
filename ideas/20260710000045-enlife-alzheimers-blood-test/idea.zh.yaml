    - 与检测厂商、学术验证机构建立合作
  customerRelationships:
    - 高触达实施，逐站点完成上线
    - 持续提供数据分析、协议更新和季度上线复盘
  revenueStreams:
    - 每个新检测项目收取上线费
    - 按活跃采样点收取订阅费
    - 按出具报告套餐或转诊的异常病例收费
  keyResources:
    - 针对具体检测项目的上线与质控软件
    - 去标识化的参考区间与结局数据集
    - LIS 与实验室运营的集成模板
  keyActivities:
    - 为采样点和实验室工作流做上线接入
    - 监控站点漂移、周转时间和异常病例的闭环情况
    - 维护针对具体检测项目的证据包和转诊逻辑
  keyPartners:
    - 全国性和区域性诊断连锁
    - 三级神经科医院和记忆门诊
    - 检测开发商和学术生物标志物合作方
  costStructure:
    - 临床实施与客户成功
    - 产品、数据工程与系统集成
    - 医学事务、合规与合作伙伴管理
jobsToBeDone:
  - job: >-
      当诊断连锁要在分布式采样点试点阿尔茨海默病血检时，帮特检团队把样本采集标准化、放行可靠的结果，这样才能在不毁掉临床医生信任的前提下把项目上线。
    currentAlternative: 表格追踪、PDF 版 SOP、LIS 自定义字段，以及实验室经理的人工监管
    successMetric: >-
      合格样本占比至少 95%，中心实验室放行结果不超过 24 小时，因可预防的前分析错误导致的站点级重做率低于 2%
  - job: >-
      当阿尔茨海默病生物标志物结果异常时，帮实验室和接收病例的神经科医生把患者导向正确的下一步检查，避免高风险病例在血检之后就断了线。
    currentAlternative: 传真报告、电话随访，以及临时性的专科协调
    successMetric: 至少 80% 的异常病例在七天内得到确认并转入下一步确诊流程
