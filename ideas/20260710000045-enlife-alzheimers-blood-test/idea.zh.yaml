differentiator: >-
  检测厂商通常止步于生物标志物科学，通用实验室软件止步于订单和结果的传输。这家公司要拿下中间那层没人管的地带：分布式站点就绪度、本地参考区间建模，以及针对脆弱的新型神经诊断检测的反射式工作流编排。随着时间推移，去标识化的站点表现数据和下游结局数据会不断沉淀，形成一道新检测厂商和通用 LIS 厂商都不会自然积累起来的部署护城河。
conceptDiagram:
  title: 阿尔茨海默病血检上线
  mermaid: |
    flowchart LR
      买方[诊断连锁医学总监] --> 痛点[分布式阿尔茨海默病血检上线风险]
      痛点 --> 产品[上线管理系统：现场质控、参考区间校验、反射式转诊]
      产品 --> 结果[值得信任的当日神经生物标志物项目]
