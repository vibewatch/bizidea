problem: >-
  新一代阿尔茨海默病血检已经逼近常规实验室能落地的程度，诊断连锁再也不能把它当成纯研究用检测项目对待；但要把一款脆弱的新型神经退行性疾病检测安全地铺到几十个采样点，它们还没有靠得住的办法。眼下的退路仍是昂贵的
  PET 或 MRI 影像、脑脊液分析，以及东拼西凑的神经科随访——这些手段更慢、更侵入，对不少可能从新兴疗法中获益的患者来说往往来得太晚。只要一次上线出问题——样本质量差、本地参考区间不靠谱，或者异常病例被漏掉——就足以在这个品类站稳之前，先把临床医生的信任毁掉。
targetUser:
  primary: 印度诊断连锁里负责推出阿尔茨海默病血检项目的医学总监和特检项目负责人。
  secondary: 三级医院里接收这些实验室网络转来的异常生物标志物病例的神经科医生和记忆门诊协调员。
  buyer: 运营中心实验室的全国性诊断连锁的 COO 或首席医疗官。
startupThesis:
  nonObviousInsight: >-
    真正难的地方已经不是在实验室里发明一种血液生物标志物；一旦阿尔茨海默病检测能塞进常规诊断中心，稀缺的资产就变成了分布式站点上的运营信任——样本质量、针对特定人群的解读方式，以及确定性的下一步转诊路径。
  beachhead: >-
    拥有 100 个以上采样点、配一间中心免疫或分子参考实验室的印度诊断连锁，正在为 55 岁以上、有轻度认知症状的成人试点由神经科医生开单的阿尔茨海默病血检。
  wedge: >-
    一套上线管理系统：给采样点做认证、强制执行前分析 SOP、按站点和人群设置质控阈值，并为异常结果生成可配置的反射式复查包。
  whyNowCatalyst: >-
    eNLife 正推动在常规诊断中心实现两到五小时出结果，背后又有资金支持检测验证和印度本地数据集建设，这让上线基础设施立刻变成了瓶颈。
  ventureScalePath: >-
    一旦嵌入阿尔茨海默病血检的部署环节，公司就能往帕金森病、其他类型痴呆、神经炎症以及更广泛的专科生物标志物上线场景扩展，去标识化的上线数据和结局数据会不断累积，沉淀成一道网络效应护城河。
solution: >-
  产品卡在分析仪或 LIS 与下游神经科医生之间，充当新型神经生物标志物项目的部署层。每个采样点接入前，它先做针对具体检测项目的就绪核查、样本处理规则设定、周转监控，并在结果放行前发出站点级漂移预警。接着，它加上客户医疗团队认可的参考区间逻辑和解读证据包，让异常结果能自动触发正确的复检、影像检查或专科转诊流程——这套流程由实验室的医疗团队自行配置。首批客户从一个阿尔茨海默病检测套餐起步，但同一套技术栈可以支撑所有从研究阶段走进常规实验室的血液神经科检测。
goToMarketSeed:
  firstCustomer: >-
    印度某诊断连锁的医学总监：这家连锁在城市里有 100 个以上采样点、一间都市中心实验室，并已和三级神经科医院建立阿尔茨海默病血检的试点合作。
  buyingTrigger: >-
    一旦决定和神经科合作伙伴一起试点或验证阿尔茨海默病血检菜单，样本质量、结果一致性和异常病例交接的风险就立刻摆在眼前。
  currentAlternative: 手工 SOP 文件夹、LIS 自定义字段、表格，外加在 PET、MRI、CSF 或现有神经科诊疗流程之上手动协调转诊。
  switchingReason: >-
    这套上线管理系统能让连锁当天就获得运营上的底气：可用样本更多、站点监管更紧、解读更本地化，神经科转诊闭环也能跑通——而且不需要更换分析仪或核心 LIS。
  pricingHypothesis: 按新检测项目收取上线费，再加上按活跃采样点收取的订阅费，以及按出具报告套餐收取的工作流费用。
