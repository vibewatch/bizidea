    rationale: 滩头市场很窄，但同一套基础设施能扩展到其他神经退行性疾病和专科生物标志物领域。
topRisks:
  - name: 临床验证滞后
    description: 如果阿尔茨海默病血检的临床或监管验证比预期更慢，上线预算就可能停滞。
    mitigation: 先从服务试点和验证研究的工作流与质控层做起，再延伸支持相邻的神经生物标志物，而不是只押注一款检测。
  - name: 买方时点风险
    description: 很多诊断连锁可能会等到神经科需求更明确、报销政策更清晰之后，才愿意正式上线。
    mitigation: 优先瞄准已经和三级神经科伙伴一起推进特检上线的连锁，并围绕降低样本失败率和加快试点扩张来定价。
  - name: 临床责任边界
    description: 看起来像是在推荐诊疗路径的工作流软件，很容易触发医疗治理和责任方面的顾虑。
    mitigation: 把转诊逻辑的配置权留给客户的医疗团队，保留完整审计记录，并把输出定位为有证据支撑的决策辅助，而不是自主诊断。
