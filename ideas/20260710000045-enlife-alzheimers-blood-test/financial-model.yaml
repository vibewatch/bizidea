scenarios:
  downside:
    description: One pilot converts later, the fourth customer does not reach production before year end, and onboarding remains more manual than planned.
    y3RevenueK: 750.0
    y3EbitdaK: -486.2
    cashLowPointK: 331.3
    keyAssumptionChanges:
    - Q4Y3 ends with 3 production customers instead of 4 because pilot-to-production conversion slips below the BP 50%+ target.
    - Mature annual value stays closer to about $210K than the base-case $225K-$250K range because site expansion is slower.
    - Gross margin exits near 66% because QA review, referral routing, and rollout templates remain more bespoke.
  base:
    description: Two Y1 pilots convert, a third customer lands in Y2, the fourth production customer is live by Y3, and per-customer revenue approaches the researched SOM math.
    y3RevenueK: 935.0
    y3EbitdaK: -328.5
    cashLowPointK: 597.1
    keyAssumptionChanges:
    - Y1 ends with 2 paying pilot logos and both expand into production economics during Y2.
    - Q4Y3 reaches 4 production customers with blended annualized value near $250K at exit and about $225K in steady-state unit economics.
    - Gross margin reaches the BP target by Q4Y3 as SOP templates, analyzer playbooks, and routing packets become reusable.
  upside:
    description: A third logo signs earlier, a fourth logo scales faster, and one live account attaches a second neuro-biomarker workflow before year end.
    y3RevenueK: 1020.0
    y3EbitdaK: -256.0
    cashLowPointK: 698.1
    keyAssumptionChanges:
    - The third paying customer arrives one quarter earlier and the fourth ramps sites faster than the base case.
    - Exit annualized value reaches roughly $255K per customer because workflow fees and more active sites attach earlier.
    - Gross margin exits near 72% because implementation reuse and partner-led deployment shorten services work.
sensitivity:
- variable: ARPU
  downsideCase: Steady-state annual value lands near $200K instead of the researched $225K level.
  baseCase: Steady-state annual value is about $225K per production customer.
  upsideCase: Workflow fees and more active sites lift steady-state annual value toward $245K.
  y3RevenueImpactK: -95.0
  cashImpactK: -70.0
- variable: CAC
  downsideCase: Founder-led access and partner referrals underperform, pushing CAC toward roughly $250K per chain.
  baseCase: CAC stays near $205K because early selling is concentrated and design-partner led.
  upsideCase: Assay-vendor and neurology referrals keep CAC nearer $170K.
  y3RevenueImpactK: -120.0
  cashImpactK: -145.0
- variable: churn
  downsideCase: Monthly churn rises toward 3.0% if pilot economics fail to mature into repeatable production value.
  baseCase: Monthly churn holds near 1.5% once governance workflows are embedded.
  upsideCase: Monthly churn stays near 1.0% because routing, QC, and audit trails become sticky.
  y3RevenueImpactK: -85.0
  cashImpactK: -75.0
- variable: sales cycle
  downsideCase: Paid pilot to production stretches toward 6 months because medical-governance approvals and procurement take longer.
  baseCase: Paid pilot to production conversion takes about 3-4 months once a chain pilot is live.
  upsideCase: A live launch trigger and partner sponsor compress conversion toward about 2-3 months.
  y3RevenueImpactK: -185.0
  cashImpactK: -266.0
- variable: gross margin
  downsideCase: Gross margin exits near 66% because implementation and QA remain manual.
  baseCase: Gross margin reaches 70% by Q4Y3 after rollout templates and routing packets standardize.
  upsideCase: Gross margin reaches 72% if partner-assisted deployment cuts services time faster.
  y3RevenueImpactK: 0.0
  cashImpactK: -95.0
- variable: hiring pace
  downsideCase: The company adds extra implementation or GTM hires before the fourth production customer is proven.
  baseCase: Headcount stays at 7 ending FTE from Q4Y2 through Q4Y3 while the market proof catches up.
  upsideCase: One later hire is delayed until after the adjacent-program decision without slowing delivery.
  y3RevenueImpactK: 0.0
  cashImpactK: -160.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetChains[Target chains] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionPrograms[Production programs]
      ProductionPrograms --> SiteExpansion[More sites and workflow events]
      SiteExpansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue comes from converting 2 Y1 pilots into 4 production chains and lifting each program toward roughly 150 active sites and about $225K steady-state annual value.
- checkName: Must go right
  finding: Pilot-to-production conversion has to stay near the BP target and the third and fourth chain wins must arrive on time or the sales-cycle sensitivity overwhelms the narrow buyer pool.
- checkName: Model breaks if
  finding: If India rollout stays pilot heavy and gross margin stalls in the mid-60s, the downside case drives cash toward roughly $0.3M before the company proves adjacent-program expansion.
- checkName: Next-round proof
  finding: The next financing case is 4 production customers plus one credible adjacent neuro-biomarker expansion decision while cash is still around $0.6M, not just more pilot logos.
sanityChecks:
  ruleOf40: Y3 growth 59.8% + EBITDA margin -35.1% = 24.7%
  burnMultiple: Y3 burn multiple is about 0.9x using roughly $0.33M of EBITDA burn against about $0.35M of net new revenue.
  revenuePerFte: $133.6K Y3 on 7 ending FTE (benchmark $200–400K SaaS)
  flags:
  - Revenue per ending FTE remains below typical SaaS benchmarks, so the seed story depends on proving adjacent-program or geography expansion rather than only the India Alzheimer wedge.
  - The model only works because headcount stays flat at 7 FTE from Q4Y2 through Q4Y3; hiring ahead of proof is the fastest way to compress runway.
  - CustomersEop includes paying pilots as well as production programs in Y1, so recurring-only production logos lag the headline count until Y2.
  - The base case still assumes 2 paid pilots are signed and at least one converts inside the first 12 months even though BP and research both flag unresolved buyer-timing and regulation risk.
  - Cash is modeled as EBITDA, so enterprise procurement timing, prepayments, or compliance-heavy launch costs could move the real cash trough earlier than the P&L suggests.
