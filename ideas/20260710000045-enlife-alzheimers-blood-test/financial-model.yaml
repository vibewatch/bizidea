date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] the model starts with the first full operating month after the business-plan date.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk.targetFundingRangeUsd $2-3M + model cash curve] uses the low end of the stated range because the plan stays India-first, remains clinically operations heavy, and keeps headcount flat after Q4Y2.'
- id: A3
  name: Starting paying customers
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] the company starts pre-revenue and must first sign paid pilots.'
- id: A4
  name: Paying-customer definition
  value: One diagnostic-chain assay program under either a paid pilot or a production contract.
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.revenueStreams] customersEop counts any chain already paying for one Alzheimer''s rollout program so pilot and production revenue reconcile cleanly.'
- id: A5
  name: Paid pilot package
  value: $45K over roughly 3 months
  unit: USD/customer
  source: '[BP investorMemo.firstCustomer.initialContract $30K-$60K paid pilot] uses the midpoint of the stated pilot range.'
- id: A6
  name: Production contract value ramp
  value: About $180K ARR at first conversion, rising toward the researched $225K steady-state value and roughly $250K exit annualized revenue by Q4Y3 as site count and workflow fees expand.
  unit: USD/customer/year
  source: '[BP investorMemo.firstCustomer.initialContract $175K-$300K ARR + Research market.som 150 sites x $1.0K plus $75K program layer] the model lands inside both the BP and research bands.'
- id: A7
  name: Customer ramp
  value: 2 paying pilot logos by Y1 end, 3 paying logos by Q2Y2, and 4 production customers by Q4Y3.
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months + Research market.som 4 live customers in year 3] base case follows the stated beachhead and SOM path.'
- id: A8
  name: Revenue recognition convention
  value: 'Period-end paying customers multiplied by blended realized revenue per customer for that period: about $15K per month in Y1 pilots, $45K-$60K per quarter in Y2, and $53.8K-$62.5K per quarter in Y3.'
  unit: formula
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som] this keeps revenue directly traceable to customers and program-level expansion.'
- id: A9
  name: Gross margin ramp
  value: 40%-55% in Y1, 60%-66% in Y2, and 68%-70% in Y3.
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research regulatoryTechnicalConstraints] pilot launch work is services heavy before templates, SOPs, and referral packets become reusable.'
- id: A10
  name: Founder / CEO loaded compensation
  value: $110K
  unit: USD/year
  source: '[startup-finance heuristic for an India-first pre-seed healthtech founder salary] assumes modest cash pay plus payroll taxes and benefits.'
- id: A11
  name: Engineering loaded compensation
  value: $100K
  unit: USD/year
  source: '[startup-finance heuristic for senior India-based workflow and integration engineering] sized for a lean technical team supporting regulated lab integrations.'
- id: A12
  name: Product / implementation loaded compensation
  value: $80K
  unit: USD/year
  source: '[BP team Product and implementation lead + startup-finance heuristic] reflects a field-heavy deployment role rather than a large services bench.'
- id: A13
  name: Medical affairs / QA loaded compensation
  value: $90K
  unit: USD/year
  source: '[BP team Medical affairs and QA lead + startup-finance heuristic] covers domain expertise, threshold governance, and quality oversight in India.'
- id: A14
  name: Strategic partnerships / sales loaded compensation
  value: $105K
  unit: USD/year
  source: '[BP team Strategic partnerships lead + BP gtm.channels + startup-finance heuristic] assumes a concentrated enterprise-commercial role rather than a scaled field-sales org.'
- id: A15
  name: G&A / ops loaded compensation
  value: $55K
  unit: USD/year
  source: '[startup-finance heuristic + BP operations compliance burden] covers finance, documentation, and internal operations without a dedicated legal headcount.'
- id: A16
  name: Hiring timeline
  value: M1 founder, founding eng, and product/implementation; M2 medical affairs; M9 strategic partnerships; M16 second engineer; M21 ops; no additional hires before Q4Y3.
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale] keeps the company product-and-implementation first, then adds only the minimum GTM and ops support needed for four customers.'
- id: A17
  name: Payroll allocation to P&L lines
  value: Founder 60% S&M and 40% G&A; engineering 100% R&D; product/implementation 25% S&M and 75% R&D; medical affairs 60% R&D and 40% G&A; partnerships 100% S&M; ops 100% G&A.
  unit: allocation
  source: '[BP team role rationales + BP operations] translates the named roles into the operating lines used in the P&L.'
- id: A18
  name: Non-payroll opex ramp
  value: Monthly S&M/R&D/G&A starts at $6K/$7K/$5K, rises to $8K/$8K/$7K by late Y1, stays near $9K/$9K/$8K through most of Y2, and reaches $10K/$10K/$8K in Y3.
  unit: USD/month
  source: '[BP operations + BP experimentRoadmap + startup-finance heuristic] covers travel, cloud tooling, audit documentation, and calibration-partner work without assuming large paid marketing.'
- id: A19
  name: Steady-state monthly logo churn
  value: 1.5%
  unit: percent/month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP gtm.funnelTargets 50%+ production expansion] churn should stay low once a chain embeds governance workflows, but the product is still early.'
- id: A20
  name: CAC convention
  value: $205.2K equals total 36-month S&M spend divided by 4 net new paying chain customers.
  unit: USD/customer
  source: '[model calc + BP gtm founder-led direct sales motion] captures founder selling, partnerships work, and deployment-heavy customer acquisition across the buildout period.'
- id: A21
  name: Cash conversion convention
  value: Cash movement equals EBITDA.
  unit: formula
  source: '[startup-finance heuristic] capex, taxes, debt, and working-capital timing are treated as immaterial at this pre-seed scale.'
- id: A22
  name: Funding ask sizing
  value: $2.0M pre-seed sized for roughly 30 months of runway to reach four production customers and an adjacent-program decision point while retaining about $0.6M of cash.
  unit: USD
  source: '[BP fundingAsk.targetFundingRangeUsd $2-3M + BP milestones 24-36 months + model cash low point] uses the low end of the stated range because the team stays lean until expansion proof is visible.'
- id: A23
  name: Quarterly salary-roll convention
  value: Y2 and Y3 salary rows use the actual monthly hires inside each quarter rather than only the year-end headcount snapshots.
  unit: convention
  source: '[financial-model headcount column convention + BP team startTiming] keeps payroll internally consistent even though Y2 and Y3 snapshots are shown only at year end.'
