slug: alzheimers-assay-rollout-os
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] 模型从商业计划日期之后的第一个完整运营月份开始。'
- id: A2
  name: 期初现金 / 种子前融资
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk.targetFundingRangeUsd $2-3M + model cash curve] 取所述区间的低端，因为计划保持印度优先、临床运营偏重，且从第 2 年第 4 季度之后编制保持不变。'
- id: A3
  name: 起始付费客户数
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] 公司从零收入起步，必须先签下付费试点。'
- id: A4
  name: 付费客户定义
  value: 一家诊断连锁的一个阿尔茨海默病上线项目，处于付费试点或正式合同状态。
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.revenueStreams] customersEop 统计任何已经为一个阿尔茨海默病上线项目付费的连锁，让试点收入和正式收入能干净对账。'
- id: A5
  name: 付费试点套餐
  value: 约 3 个月 $45K
  unit: USD/customer
  source: '[BP investorMemo.firstCustomer.initialContract $30K-$60K paid pilot] 取所述付费试点区间的中位数。'
- id: A6
  name: 正式合同价值爬坡
  value: 首次转化时约 $180K ARR，逐步升向研究测算的 $225K 稳态值，到第 3 年第 4 季度随站点数和工作流费用扩张，退出年化收入约 $250K。
  unit: USD/customer/year
  source: '[BP investorMemo.firstCustomer.initialContract $175K-$300K ARR + Research market.som 150 sites x $1.0K plus $75K program layer] 模型落在 BP 和研究两个区间之内。'
- id: A7
  name: 客户爬坡节奏
  value: 第 1 年末拿下 2 个付费试点 logo，第 2 年第 2 季度拿到 3 个付费 logo，第 3 年第 4 季度拿到 4 个正式客户。
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months + Research market.som 4 live customers in year 3] 基准情形沿用所述滩头市场和 SOM 路径。'
- id: A8
  name: 收入确认口径
  value: '按期末付费客户数乘以该期的混合已实现单客户收入计算：第 1 年试点约每月 $15K，第 2 年每季度 $45K-$60K，第 3 年每季度 $53.8K-$62.5K。'
  unit: formula
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som] 这样收入能直接追溯到客户数和项目层扩张。'
- id: A9
  name: 毛利率爬坡
  value: 第 1 年 40%-55%，第 2 年 60%-66%，第 3 年 68%-70%。
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research regulatoryTechnicalConstraints] 在模板、SOP 和转诊包变得可复用之前，试点上线阶段服务成本偏重。'
- id: A10
  name: 创始人 / CEO 全成本薪酬
  value: $110K
  unit: USD/year
  source: '[startup-finance heuristic for an India-first pre-seed healthtech founder salary] 假设现金薪酬适中，外加社保福利。'
- id: A11
  name: 工程全成本薪酬
  value: $100K
  unit: USD/year
  source: '[startup-finance heuristic for senior India-based workflow and integration engineering] 按支撑受监管实验室集成的精简技术团队定薪。'
- id: A12
  name: 产品 / 实施全成本薪酬
  value: $80K
  unit: USD/year
  source: '[BP team Product and implementation lead + startup-finance heuristic] 对应一线部署为主的角色，而不是大型服务团队。'
- id: A13
  name: 医学事务 / QA 全成本薪酬
  value: $90K
  unit: USD/year
  source: '[BP team Medical affairs and QA lead + startup-finance heuristic] 覆盖印度本地的领域专业能力、阈值治理和质量监督。'
- id: A14
  name: 战略合作 / 销售全成本薪酬
  value: $105K
  unit: USD/year
  source: '[BP team Strategic partnerships lead + BP gtm.channels + startup-finance heuristic] 假设的是一个集中的企业级商务角色，而不是规模化的现场销售团队。'
- id: A15
  name: G&A / 运营全成本薪酬
  value: $55K
  unit: USD/year
  source: '[startup-finance heuristic + BP operations compliance burden] 覆盖财务、文档和内部运营，不设专职法务编制。'
- id: A16
  name: 招聘时间线
  value: 第 1 月招创始人、创始工程和产品/实施；第 2 月招医学事务；第 9 月招战略合作；第 16 月招第二名工程师；第 21 月招运营；第 3 年第 4 季度前不再新增招聘。
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale] 让公司先做好产品和实施，再只补上支撑 4 个客户所需的最少 GTM 和运营人力。'
- id: A17
  name: 薪酬在损益表科目间的分摊
  value: 创始人 60% 计入 S&M、40% 计入 G&A；工程 100% 计入 R&D；产品/实施 25% 计入 S&M、75% 计入 R&D；医学事务 60% 计入 R&D、40% 计入 G&A；合作伙伴 100% 计入 S&M；运营 100% 计入 G&A。
  unit: allocation
  source: '[BP team role rationales + BP operations] 把具体岗位对应到损益表使用的运营科目上。'
- id: A18
  name: 非薪酬运营支出爬坡
  value: 每月 S&M/R&D/G&A 起步为 $6K/$7K/$5K，第 1 年末升到 $8K/$8K/$7K，第 2 年大部分时间维持在约 $9K/$9K/$8K，第 3 年升到 $10K/$10K/$8K。
  unit: USD/month
  source: '[BP operations + BP experimentRoadmap + startup-finance heuristic] 覆盖出差、云端工具、审计文档和校准合作方工作，不假设大规模付费营销。'
- id: A19
  name: 稳态月度 logo 流失率
  value: 1.5%
  unit: percent/month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP gtm.funnelTargets 50%+ production expansion] 一旦连锁把治理工作流嵌入日常运营，流失率就该保持低位，但产品仍处于早期。'
- id: A20
  name: CAC 口径
  value: $205.2K，等于 36 个月总 S&M 支出除以 4 个净新增付费连锁客户。
  unit: USD/customer
  source: '[model calc + BP gtm founder-led direct sales motion] 涵盖创始人亲自销售、合作伙伴工作和整个建设期内部署密集型的获客投入。'
- id: A21
  name: 现金转换口径
  value: 现金变动等于 EBITDA。
  unit: formula
  source: '[startup-finance heuristic] 在这一种子前阶段，资本支出、税收、债务和营运资金时点被视为不重要。'
- id: A22
  name: 融资金额测算
  value: $2.0M 种子前融资，按约 30 个月现金跑道测算，用于达到 4 个正式客户并做出相邻项目决策，同时保留约 $0.6M 现金。
  unit: USD
  source: '[BP fundingAsk.targetFundingRangeUsd $2-3M + BP milestones 24-36 months + model cash low point] 取所述区间的低端，因为团队要保持精简，直到扩张证据出现。'
- id: A23
  name: 季度薪酬滚算口径
  value: 第 2、3 年的薪酬行按每个季度内实际的月度招聘计算，而不是只用年末编制快照。
  unit: convention
  source: '[financial-model headcount column convention + BP team startTiming] 即便第 2、3 年的编制快照只在年末展示，也让薪酬口径内部保持一致。'
