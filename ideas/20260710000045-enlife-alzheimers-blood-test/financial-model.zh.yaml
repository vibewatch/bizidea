scenarios:
  downside:
    description: 一个试点转化更晚，第 4 个客户在年底前没能进入正式阶段，上线依然比计划更依赖人工。
    y3RevenueK: 750.0
    y3EbitdaK: -486.2
    cashLowPointK: 331.3
    keyAssumptionChanges:
    - 由于试点转正式的转化率跌破 BP 设定的 50% 以上目标，第 3 年第 4 季度只有 3 个正式客户，而不是 4 个。
    - 由于站点扩张更慢，成熟年化价值更接近约 $210K，而不是基准情形的 $225K-$250K 区间。
    - 由于 QA 复核、转诊路由和上线模板仍偏定制化，毛利率在退出时接近 66%。
  base:
    description: 第 1 年两个试点转化成功，第 2 年拿下第三个客户，第 3 年第 4 个正式客户上线，单客户收入接近研究测算的 SOM 数值。
    y3RevenueK: 935.0
    y3EbitdaK: -328.5
    cashLowPointK: 597.1
    keyAssumptionChanges:
    - 第 1 年末拿下 2 个付费试点 logo，两者在第 2 年都扩展为正式经济模型。
    - 第 3 年第 4 季度达到 4 个正式客户，退出时混合年化价值约 $250K，稳态单位经济模型约 $225K。
    - 随着 SOP 模板、分析仪操作手册和转诊包变得可复用，毛利率在第 3 年第 4 季度达到 BP 目标水平。
  upside:
    description: 第三个 logo 更早签下，第四个 logo 扩张更快，且一个正式客户在年底前加装了第二个神经生物标志物工作流。
    y3RevenueK: 1020.0
    y3EbitdaK: -256.0
    cashLowPointK: 698.1
    keyAssumptionChanges:
    - 第三个付费客户提前一个季度到位，第四个客户扩站点的速度也快于基准情形。
    - 由于工作流费用和更多活跃站点更早叠加，退出年化价值升到每客户约 $255K。
    - 由于实施可复用性提升、伙伴协助部署缩短了服务工时，毛利率在退出时接近 72%。
sensitivity:
- variable: ARPU
  downsideCase: 稳态年化价值落在约 $200K，低于研究测算的 $225K 水平。
  baseCase: 每个正式客户的稳态年化价值约为 $225K。
  upsideCase: 工作流费用和更多活跃站点把稳态年化价值拉到约 $245K。
  y3RevenueImpactK: -95.0
  cashImpactK: -70.0
- variable: CAC
  downsideCase: 创始人渠道和合作伙伴转介表现不及预期，把每家连锁的 CAC 推高到约 $250K。
  baseCase: 由于早期销售集中且由共创客户带动，CAC 维持在约 $205K。
  upsideCase: 检测厂商和神经科转介让 CAC 更接近 $170K。
  y3RevenueImpactK: -120.0
  cashImpactK: -145.0
- variable: churn
  downsideCase: 如果试点经济模型未能成熟为可复制的正式价值，月度流失率升向 3.0%。
  baseCase: 治理工作流一旦嵌入，月度流失率维持在约 1.5%。
  upsideCase: 由于转诊、质控和审计记录变得有黏性，月度流失率维持在约 1.0%。
  y3RevenueImpactK: -85.0
  cashImpactK: -75.0
- variable: sales cycle
  downsideCase: 由于医疗治理审批和采购流程耗时更长，付费试点到正式合同的周期拉长到约 6 个月。
  baseCase: 一家连锁试点跑起来后，付费试点到正式合同的转化约需 3-4 个月。
  upsideCase: 有明确的上线触发点和合作方支持时，转化周期压缩到约 2-3 个月。
  y3RevenueImpactK: -185.0
  cashImpactK: -266.0
- variable: gross margin
  downsideCase: 由于实施和 QA 仍偏人工，毛利率退出时接近 66%。
  baseCase: 上线模板和转诊包标准化后，毛利率在第 3 年第 4 季度达到 70%。
  upsideCase: 如果伙伴协助部署更快压缩服务工时，毛利率达到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -95.0
- variable: hiring pace
  downsideCase: 公司在第四个正式客户得到验证之前，提前增加了实施或 GTM 人手。
  baseCase: 编制从第 2 年第 4 季度到第 3 年第 4 季度维持在 7 名期末 FTE，等待市场证据跟上。
  upsideCase: 一次后续招聘延迟到相邻项目决策之后，也不会拖慢交付。
  y3RevenueImpactK: 0.0
  cashImpactK: -160.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      目标连锁[目标连锁] --> 付费试点[付费试点]
      付费试点 --> 正式项目[正式项目]
      正式项目 --> 站点扩张[更多站点与工作流事件]
      站点扩张 --> 收入[收入]
      收入 --> 毛利[毛利]
      毛利 --> 现金[现金与现金跑道]
modelSanity:
- checkName: 收入引擎
  finding: 基准收入来自把第 1 年的 2 个试点转成 4 个正式连锁，并把每个项目拉到约 150 个活跃站点、约 $225K 的稳态年化价值。
- checkName: 必须跑通的地方
  finding: 试点转正式的转化率必须保持接近 BP 目标，第三、第四家连锁必须按时拿下，否则销售周期的敏感性会压垮这个本就狭窄的买家池。
- checkName: 模型会在哪种情况下失灵
  finding: 如果印度上线一直偏试点、毛利率停滞在 60% 出头，下行情形会在公司证明相邻项目扩张之前，把现金拉到约 $0.3M。
- checkName: 下一轮融资证明点
  finding: 下一轮融资的理由是 4 个正式客户，加上一次可信的相邻神经生物标志物扩展决策，而且现金仍保有约 $0.6M，不能只靠更多试点 logo。
sanityChecks:
  ruleOf40: Y3 增长 59.8% + EBITDA 利润率 -35.1% = 24.7%
  burnMultiple: Y3 burn multiple 约为 0.9x，对应约 $0.33M 的 EBITDA 烧钱和约 $0.35M 的净新增收入。
  revenuePerFte: Y3 每名期末 FTE 对应 $133.6K 收入（垂直 SaaS 基准约 $200-400K），期末共 7 名 FTE。
  flags:
  - 每名期末 FTE 对应的收入低于典型 SaaS 基准，所以种子轮叙事要靠相邻项目或地理扩张来撑，不能只靠印度阿尔茨海默病这一个切口。
  - 模型能跑通的前提，是编制从第 2 年第 4 季度到第 3 年第 4 季度维持在 7 名 FTE 不变；在证据出现前提前招聘，是最快吃掉现金跑道的方式。
  - customersEop 在第 1 年同时统计付费试点和正式项目，所以只算经常性正式 logo 的口径要到第 2 年才追上标题数字。
  - 即便 BP 和研究都提示买方时点和监管风险尚未解决，基准情形仍假设签下 2 个付费试点，且至少一个在头 12 个月内转化。
  - 现金按 EBITDA 建模，所以企业采购时点、预付款或合规密集的上线成本，都可能让真实现金低点比损益表显示的更早出现。
