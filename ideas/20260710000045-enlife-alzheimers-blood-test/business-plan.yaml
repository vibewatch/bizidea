slug: alzheimers-assay-rollout-os
date: '2026-07-10'
executiveSummary: >-
  Alzheimer's Assay Rollout OS should start as a vendor-neutral deployment layer
  for Indian diagnostic chains moving Alzheimer's blood tests from one central
  reference lab into 100+ collection centres. Commercialization is arriving
  faster than legacy lab software assumes: Labcorp, Quest, C2N, Roche, and
  Lucent/Quanterix already have commercial programs, and eNLife is explicitly
  targeting routine Indian diagnostic centres with two-to-five-hour turnaround.
  The first buyer is a chain medical director or CMO who has already decided to
  pilot an Alzheimer's blood-test menu and now owns sample-integrity,
  cutoff-governance, and abnormal-case handoff risk across distributed sites.
  The MVP should stay narrow: certify sites, enforce pre-analytic SOPs, hold
  questionable results, apply customer-approved dual-threshold or indeterminate
  workflows, and route abnormal cases into neurologist or confirmatory next
  steps. This is a better first product than a new assay or a generalized LIS
  replacement because the immediate budget sits in launch-risk reduction and
  clinical trust, not in biomarker discovery or wholesale workflow replacement.
  The near-term India Alzheimer wedge is commercially real but small, with
  research estimating about $11.4M TAM, $3.6M SAM, and $0.9M year-3 SOM, so
  venture upside depends on later expansion into additional neuro-biomarker
  programs or adjacent geographies. The biggest disconfirming risks are that
  Indian rollouts stay pilot-heavy because regulation, reimbursement, or
  therapy access lag, or that large labs and assay vendors bundle enough
  workflow support to absorb the budget. Key gaps remain the count of chains
  with live neurologist-linked pilots, the exact CDSCO path for imported versus
  local assays, and baseline sample-rejection and referral-conversion data, so
  the first 90 days should resolve those before scaling spend.
problem:
  - >-
    Distributed collection centres can turn a clinically promising Alzheimer's
    blood test into a trust-destroying rollout if specimen handling, storage,
    and release rules are not enforced site by site.
  - >-
    Generic LIS workflows, SOP binders, and spreadsheets do not manage dual
    thresholds, indeterminate results, or audit-ready neurologist handoff
    across a chain network.
  - >-
    Positive or indeterminate results still need confirmatory imaging, CSF, or
    therapy evaluation, but specialist capacity is concentrated in tertiary
    centres and manual follow-up drops cases.
solution:
  - >-
    Deploy a vendor-neutral rollout layer between the analyzer or LIS and the
    chain operations team that certifies sites, enforces pre-analytic SOPs, and
    holds or escalates questionable samples before results are released.
  - >-
    Let each customer's medical team configure threshold bands, indeterminate
    handling, and reflex-workup packets so the software supports medical
    governance instead of making autonomous diagnostic claims.
  - >-
    Track abnormal and indeterminate cases through neurologist acknowledgment or
    confirmatory next steps so the lab can prove its rollout closes the loop,
    not just generates reports.
whyWeWin:
  - >-
    Assay vendors and reference labs win on biomarker science or distribution,
    but they usually do not own third-party chain readiness, phlebotomy drift,
    or customer-specific routing logic.
  - >-
    Each deployment compounds site-level QC, rerun, and India-specific
    interpretive data that generic LIS middleware and manual teams do not
    centralize.
  - >-
    Closed-loop evidence on whether abnormal blood-test results reach the right
    next step can become a defensible workflow moat when new neuro-biomarker
    programs launch.
strategicChoices:
  beachhead: >-
    Metro-centered Indian diagnostic chains with 100+ collection centres, one
    central immunoassay or molecular reference lab, and tertiary neurology
    partners piloting neurologist-ordered Alzheimer's blood tests for
    symptomatic adults over 55.
  wedgeRationale: >-
    This entry point creates faster proof than selling a broad neurology
    platform because one chain controls site SOPs, central-lab release, and
    neurologist routing for one assay program. It yields measurable proof on
    sample rejection, turnaround, and referral closure before the company takes
    on broader geographies, new assays, or core-system replacement.
  sequencingRationale: >-
    Build the QC and routing overlay first, sell it founder-led to medical
    directors and CMOs, and hire medical affairs and implementation before
    scaling sales because liability boundaries and rollout playbooks matter more
    than top-of-funnel volume in the first year. Formal assay-vendor,
    academic-calibration, and neurology-referral partnerships should deepen only
    after one live chain proves that the software lowers preventable reruns and
    improves abnormal-case follow-through without replacing the LIS.
  notYet:
    - Building or owning the assay chemistry
    - Open population screening or direct-to-consumer Alzheimer's testing
    - Rural-first rollout before the metro neurology-partner playbook is proven
    - Parkinson's or other neurodegeneration programs before two Alzheimer's deployments reach production
market:
  tam: "$11.4M estimated India TAM for about 24 diagnostic-chain or tertiary-lab groups with 100+ site-equivalent reach."
  sam: "$3.6M estimated near-term SAM for 8 metro-focused networks that already fit neurologist-partner Alzheimer's pilots."
  som: "$0.9M modeled year-3 SOM from 4 production customers running one Alzheimer's program across about 150 active sites each."
  segments:
    - National diagnostic chains launching neurologist-ordered Alzheimer's blood-test programs
    - Specialty reference labs or regional chains serving tertiary neurology hospitals
  buyingProcess: >-
    A special-assays manager or medical director usually champions the deal once
    the chain decides to pilot an Alzheimer's blood-test menu, while the CMO or
    COO owns budget and liability. The credible entry motion is a paid pilot on
    one assay program and 20-50 collection sites, with neurologist partners
    approving routing logic before network-wide activation.
product:
  mvp: >-
    MVP is a vendor-neutral deployment layer for one Alzheimer's blood-test
    program that covers site certification, specimen-handling checklists,
    hold-release gates, turnaround and rerun dashboards, configurable
    indeterminate workflows, and referral packets for abnormal results. It
    should integrate with one central lab and 20-50 collection sites without
    replacing the core LIS.
  sixMonth: >-
    Launch 2 design-partner pilots with site onboarding, pre-analytic SOP
    enforcement, result hold-release rules, audit logs, and dashboards for
    rejection, rerun, turnaround, and abnormal-case acknowledgment.
  twelveMonth: >-
    Convert at least 2 pilots into production contracts, add reusable analyzer
    or vendor templates, and introduce India-specific calibration review plus
    referral-status tracking that customers can use in quarterly medical
    governance meetings.
  twentyFourMonth: >-
    Expand within live accounts from one Alzheimer's program to broader site
    coverage and at least one adjacent neuro-biomarker workflow only after the
    company proves the same QC, threshold, and routing stack repeats.
  keyBets:
    - Buyers will fund launch-risk reduction before reimbursement and regulatory pathways fully standardize.
    - An overlay deployment can go live faster than a LIS replacement and still control the failure points that matter.
    - India-specific threshold and indeterminate-band logic will matter enough to support retention and differentiation.
    - The same rollout stack can expand from Alzheimer's into adjacent neuro-biomarker programs inside existing chains.
gtm:
  wedge: >-
    Land as the rollout-and-trust layer for one Alzheimer's blood-test program
    inside one diagnostic chain, proving lower sample failure and cleaner
    abnormal-case routing before asking for broader LIS or multi-assay control.
  channels:
    - Founder-led direct sales to medical directors, CMOs, and special-assays leaders at large diagnostic chains
    - Co-sell motions with assay vendors, analyzer platforms, and reference-lab partners that need multi-site operationalization
    - Neurologist and memory-clinic partner referrals that validate routing logic and abnormal-case closure
  funnelTargets: "Target-account intro→qualified pilot 25-40%, qualified pilot→paid pilot 30-50%, paid pilot→production 50%+, production account→100+ site expansion or second program within 12 months 50%+."
  pricing: >-
    Charge a one-time assay-launch fee, an annual subscription per active
    collection site, and a per-result or routed-case workflow fee. This matches
    how buyers budget new assay rollouts and lets them underwrite spend against
    fewer reruns, faster release, and fewer lost abnormal cases rather than
    user seats.
businessModel:
  revenueStreams:
    - One-time assay-launch and implementation fees
    - Annual subscription per active collection site running a governed biomarker program
    - Usage fees per reported panel or routed abnormal or indeterminate case
    - Premium calibration, audit, and cross-assay governance modules
  unitOfValue: Active collection site running a governed Alzheimer's biomarker program, plus workflow events on reported panels or routed cases
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from 20-50 pilot sites to 100+ live sites inside the same chain
    - Add second and third neuro-biomarker programs inside existing customers
    - Package benchmark data on site QC, reruns, and referral closure across customers
    - Add assay-vendor or reference-lab channel distribution once the workflow is proven
strategyMap:
  northStarMetric: Percent of live Alzheimer's blood-test results released within target turnaround and closed-loop routed when abnormal or indeterminate
  inputMetrics:
    - Site certification completion rate before activation
    - Preventable sample rejection or rerun rate by collection site
    - Median hours from collection to central-lab result release
    - Percent of abnormal or indeterminate cases acknowledged by a neurologist or coordinator within 7 days
    - Paid pilot-to-production conversion rate
  moatsToBuild:
    - Site-level specimen-integrity and rerun dataset across distributed collection centres
    - India-specific threshold, indeterminate-zone, and exception-resolution dataset approved by customer medical teams
    - Closed-loop referral dataset linking blood-test results to confirmatory next steps and neurologist acknowledgment
    - Reusable vendor-neutral integration and rollout playbooks for chain operations
  killCriteria:
    - Fewer than 2 of the first 10 qualified Indian chains sign a paid pilot within 12 months.
    - The first 3 pilots fail to keep preventable sample rejection and reruns below 2% or fail to bring central-lab release below 24 hours at active sites.
    - Fewer than 50% of abnormal or indeterminate pilot cases reach documented neurologist or confirmatory-next-step acknowledgment within 7 days.
    - Pilot-to-production conversion stays below 50% or realized production pricing lands below $175K ARR for one live program.
  mermaid: |
    flowchart LR
      Wedge[One-chain Alzheimer's launch wedge] --> MVP[QC and routing MVP]
      MVP --> Proof[Lower reruns and closed-loop follow-up]
      Proof --> Expansion[More sites then more neuro assays]
investorMemo:
  verdict:
    call: "Watch"
    conviction: Clear operational pain and a coherent wedge, but the current India-only Alzheimer's buyer pool is too narrow and timing-sensitive for partner-level conviction today.
    whyBelieve: The company is selling the operational trust layer that every assay vendor leaves behind when a fragile Alzheimer's blood test moves into distributed routine labs.
    whyDoubt: If Indian programs remain manual pilots or vendor-bundled workflows, the standalone budget may never mature into venture-scale revenue.
    nextDiligence: Secure one paid multi-site pilot that proves lower reruns, faster release, and better abnormal-case follow-through, then test whether a second program expansion is real.
  firstCustomer:
    title: Medical director of a 100+ site Indian diagnostic chain Alzheimer's pilot
    profile: Operates a hub-and-spoke chain with one metro reference lab, 100+ collection centres, and tertiary neurology partners evaluating symptomatic older adults.
    trigger: The chain decides to launch or validate an Alzheimer's blood-test menu and needs auditable control over sample quality, threshold governance, and referral handoff.
    buyer: COO or Chief Medical Officer
    initialContract: "$30K-$60K paid pilot for one assay across 20-50 sites, converting to roughly $175K-$300K ARR when the chain expands to 100-150 active sites and keeps workflow fees live."
  mustBeTrue:
    - At least 4 Indian diagnostic chains must already plan neurologist-linked Alzheimer's blood-test pilots within the next 12-18 months.
    - The first 3 pilots must keep preventable sample rejection and reruns below 2% and central-lab release below 24 hours at activated sites.
    - Customers must accept a vendor-neutral overlay on top of their LIS and analyzer stack without requiring a full replacement project.
    - At least 50% of abnormal or indeterminate cases must reach documented neurologist or confirmatory-next-step acknowledgment within 7 days when routing is enabled.
    - Pilot accounts must expand to more sites or a second neuro-biomarker program within 12 months, or the wedge is too small for venture returns.
  diligenceQuestions:
    - Which Indian chains already have signed vendor or tertiary-hospital pilot agreements for Alzheimer's blood testing?
    - What baseline rejection, rerun, and turnaround metrics do their special-assay launches show across 20-50 sites?
    - Who controls budget and liability for rollout software when assay procurement, QA, and neurologist coordination span multiple departments?
    - How much workflow support are assay vendors or large reference labs already bundling into pilot programs?
    - What second assay or geography can credibly expand the business if Alzheimer's deployment remains pilot-heavy in India?
operatingAssumptions:
  - assumption: At least a handful of Indian chain buyers will start Alzheimer's blood-test pilots in the next 12-18 months.
    basis: research.yaml
    validationTest: Interview 8-10 medical directors and secure either 2 paid pilots or 4 signed LOIs within 9 months.
    decisionImpact: If false, broaden the wedge to vendor-neutral specialty-biomarker rollout beyond Alzheimer's or pause India-first scaling.
  - assumption: Buyers will accept a phase-one overlay that works on LIS exports or lightweight interfaces rather than demanding a core-system replacement.
    basis: idea.yaml
    validationTest: In the first 5 serious design-partner discussions, at least 3 agree to a pilot scope that starts without replacing the LIS.
    decisionImpact: If false, the roadmap must focus on fewer deep integrations, slower deployment, and a smaller ICP.
  - assumption: Lower reruns, faster release, and cleaner referral closure will produce enough quantified ROI to support at least $175K ARR for one live program.
    basis: research.yaml
    validationTest: The first 2 paid pilots show preventable reruns under 2%, release under 24 hours, and customer pre-approval for annual rollout pricing if those KPIs hold for 60 days.
    decisionImpact: If false, the product is likely a lower-value compliance tool rather than a venture-scale operating layer.
  - assumption: India-specific threshold and indeterminate-band logic materially improve medical-team trust versus vendor-default cutoffs alone.
    basis: research.yaml
    validationTest: One academic or chain partner completes a local calibration review and uses configured indeterminate-band logic in pilot governance.
    decisionImpact: If false, differentiation narrows to pre-analytics and routing, which weakens defensibility and pricing power.
  - assumption: Chains and neurologist partners will share enough follow-up status data for closed-loop referral tracking to matter.
    basis: research.yaml
    validationTest: At least 60% of abnormal or indeterminate pilot cases receive follow-up status updates from partner neurologists within 30 days.
    decisionImpact: If false, care-pathway analytics should be deprioritized and the roadmap should focus on lab-side QC only.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 10 medical directors or special-assays leaders and 5 neurologist partners in the beachhead segment.
    hypothesis: A narrow group of chains is already preparing real Alzheimer's blood-test pilots and feels the same launch-risk pain.
    successMetric: At least 6 chains confirm an active buying trigger and 3 agree to pilot-scoping follow-up.
    owner: CEO founder
  - horizon: 0–90 days
    experiment: Run one concierge rollout audit on historical special-assay or pilot data from a target chain.
    hypothesis: Sample rejection, rerun, and referral-handoff failure modes are measurable enough to baseline ROI before full product automation.
    successMetric: One chain shares site-level baseline data from at least 20 sites and signs a paid pilot scope.
    owner: Product and implementation lead
  - horizon: 90–180 days
    experiment: Ship the first MVP for one Alzheimer's assay program across 20-50 collection sites and one central lab.
    hypothesis: A vendor-neutral overlay can go live in under 8 weeks and control the highest-risk pre-analytic and routing steps.
    successMetric: First paid pilot is live within 8 weeks and produces weekly dashboards for reruns, release times, and abnormal-case closure.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Test pilot packaging and annual pricing with at least 3 qualified buyers.
    hypothesis: Buyers will pay for a defined launch package and accept a site-plus-workflow pricing model if KPI improvement is explicit.
    successMetric: At least 2 paid pilots are signed or one pilot plus one written annual-pricing pre-approval is secured.
    owner: CEO founder
  - horizon: 180–360 days
    experiment: Run one India-specific calibration and indeterminate-band review with an academic or tertiary-hospital partner.
    hypothesis: Local threshold review will improve customer medical-team confidence and create a durable differentiation layer.
    successMetric: One partner approves a production routing protocol that uses local calibration or indeterminate-band logic.
    owner: Medical affairs and QA lead
  - horizon: 180–540 days
    experiment: Expand the first production customer to 100+ sites or a second neuro-biomarker program.
    hypothesis: The same buyer will fund broader rollout once the first Alzheimer's program proves lower operational risk.
    successMetric: One expansion contract lifts the account above $175K ARR and adds either 50+ sites or one new biomarker workflow.
    owner: Strategic partnerships lead
operations:
  - Standardize every launch on a site-certification checklist, phlebotomy and centrifugation SOP sign-off, and a hold-release gate before chain-wide activation.
  - Maintain versioned threshold and routing logic approved by each customer's medical team with audit trails for every release, override, and referral packet.
  - Reconcile abnormal and indeterminate cases weekly with neurologist or memory-clinic partners to measure downstream follow-through.
  - Reuse vendor-neutral LIS export or API connectors and compliance documentation templates to shorten pilot setup.
team:
  - role: CEO founder
    startTiming: Month 0
    rationale: Owns founder-led sales, medical-director relationships, pilot packaging, and early assay-vendor or hospital partnerships while the market is still being defined.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the workflow engine, audit logging, hold-release rules, and vendor-neutral integrations that determine deployment speed and credibility.
  - role: Product and implementation lead
    startTiming: Month 1
    rationale: Encodes site-onboarding playbooks, reduces pilot setup time, and turns one-off customer workflows into repeatable deployment templates.
  - role: Medical affairs and QA lead
    startTiming: Month 2
    rationale: Owns threshold governance, academic calibration work, medical-team approvals, and the liability boundary between workflow support and clinical claims.
  - role: Strategic partnerships lead
    startTiming: Month 9
    rationale: Adds commercial leverage only after the first pilots prove ROI and the company has a repeatable story for assay vendors, labs, and neurology partners.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2 paid pilots with chains that each activate one Alzheimer's assay program across 20-50 sites.
      - Prove preventable sample rejection and reruns below 2% and central-lab release below 24 hours at pilot sites.
      - Document neurologist or confirmatory-next-step acknowledgment for at least 50% of abnormal or indeterminate cases within 7 days.
      - Finalize one academic or tertiary-hospital calibration partnership and standard medical-governance templates.
  - horizon: 12–24 months
    items:
      - Convert at least 2 pilots into production contracts spanning 100-150 active sites each.
      - Launch reusable vendor or analyzer templates and India-specific indeterminate-band governance inside production accounts.
      - Win the first expansion inside an existing customer through more sites or a second neuro-biomarker workflow.
      - Build a partner-assisted pipeline with at least 2 credible assay, reference-lab, or neurology-referral relationships.
  - horizon: 24–36 months
    items:
      - Reach 4 production customers and roughly $0.9M ARR in line with the researched year-3 SOM case.
      - Productize benchmark data on site QC, reruns, and referral closure across customers.
      - Prove whether adjacent neuro-biomarker expansion is repeatable enough to justify the next financing step.
      - Decide whether to stay India-first or enter a second geography based on pilot economics and regulatory progress.
risks:
  - risk: Alzheimer's blood-test adoption in India stays pilot-heavy because CDSCO, reimbursement, or therapy-access timing lags market headlines.
    likelihood: Medium
    impact: High
    mitigation: Start as launch and QC software for pilots, keep burn tied to signed deployments, and require second-program evidence before scaling the sales team.
  - risk: Assay vendors or large labs bundle enough workflow support to compress standalone software budget.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on vendor neutrality, cross-assay governance, India-specific calibration, and multi-partner referral tracking that bundled pathways do not naturally support.
  - risk: Routing and interpretation features trigger medical-liability or procurement concerns.
    likelihood: Medium
    impact: High
    mitigation: Keep all threshold and routing logic configurable by the customer's medical team, maintain full audit trails, and position outputs as governed workflow support.
  - risk: Real-world cutoff variability across populations and collection conditions is harder than expected.
    likelihood: Medium
    impact: High
    mitigation: Use phased site activation, indeterminate bands, local calibration reviews, and hold-release gates instead of one universal cutoff.
  - risk: The India Alzheimer's beachhead is too narrow for venture-scale returns if expansion does not materialize quickly.
    likelihood: High
    impact: High
    mitigation: Treat second-program or second-geography proof by month 18 as a board-level gate and reduce burn if expansion evidence does not appear.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-3M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months should fund a small clinical-operations-heavy team, ship the
    vendor-neutral rollout MVP, complete 2-3 multi-site chain pilots,
    establish calibration and compliance partnerships, and convert at least
    1-2 diagnostic chains into production Alzheimer's programs with a clear
    expansion path.
