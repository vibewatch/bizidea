  partnershipEcosystem:
    - point: Roche、Fujirebio/Labcorp、Quanterix/Lucent、Quest、C2N 等分析仪和检测伙伴，能提供方法特异的证据与阈值，但在连锁运营内部仍需要厂商中立的部署支持。
      sourceRefs:
