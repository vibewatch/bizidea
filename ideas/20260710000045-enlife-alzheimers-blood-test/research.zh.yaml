competitors:
  - name: C2N Diagnostics / PrecivityAD2
    stage: scale-up
    wedge: 基于质谱的血检，配套 APS2 算法，用于在有症状成人中检测淀粉样蛋白。
    pricing: 需医生开单的专科血检；报销和自费体系仍在形成。
    strength: 验证扎实、美国可及性广，而且 FDA 申报进展积极。
    weaknessVsUs: 它是中心化检测提供方，不是面向印度诊断连锁多站点上线的厂商中立操作系统。
    sourceRefs:
      - 17
      - 18
      - 19
  - name: Quest Diagnostics / AD-Detect
    stage: incumbent
    wedge: 依托广泛医生渠道，提供 LDT 生物标志物菜单和复合概率评分。
    pricing: Quest 体系内的医生开单 LDT；定价和报价通过 Quest 渠道处理。
    strength: 全国可及性强、真实世界样本量大，且临床医生覆盖面广。
    weaknessVsUs: 这是厂商专属的检测路径，而且有直接面向消费者的争议史；它并不解决跨站点就绪度或医院分流问题。
    sourceRefs:
      - 15
      - 16
  - name: Labcorp / Fujirebio Lumipulse
    stage: incumbent
    wedge: 依托大型患者服务网络，在全国分发获 FDA 批准的血检。
    pricing: 由 Labcorp 渠道承接经济模型的实验室分发型获 FDA 批准 IVD。
    strength: 拥有 2,200+ 个患者服务中心，并持续强化基层医疗教育。
    weaknessVsUs: 它更适合 Labcorp 自有渠道，而不是覆盖外部诊断连锁和多种检测的中立叠加层。
    sourceRefs:
      - 13
      - 14
  - name: Roche Elecsys
    stage: incumbent
    wedge: 依托已装机分析仪基础，在基层和二级医疗场景提供自动化 pTau181 和 pTau217 检测。
    pricing: 依托 Roche 兼容实验室的、与分析仪绑定的 IVD 检测。
    strength: 装机仪器基数大、具备基层排除型定位，而且 pTau217 已获 CE 标志。
    weaknessVsUs: 检测基础设施很强，但并不提供跨厂商的部署、QC 和反射式分流工作流。
    sourceRefs:
      - 20
      - 21
      - 22
  - name: Lucent Diagnostics / Quanterix
    stage: scale-up
    wedge: 基于超高灵敏度 Simoa 的 pTau217 和多标志物阿尔茨海默病血检。
    pricing: 专科血检和检测生态；编码与支付覆盖仍在演进。
    strength: 平台灵敏度高、报告准确率 >90%，并且有多标志物路线图。
    weaknessVsUs: 它是专科检测品牌，不是管理分布式采血、本地阈值和神经科交接的连锁运营层。
    sourceRefs:
      - 28
      - 39
      - 40
regulatoryTechnicalConstraints:
  - point: 现有 BBM 指南和获 FDA 批准的标签都面向有症状成人，并用于辅助判断，不适用于开放式人群筛查或单独确诊。
    sourceRefs:
      - 12
      - 20
      - 21
      - 23
      - 24
  - point: 要想可靠上线，必须把处理、存储和批次间控制标准化；pTau 也许相对稳定，但 Aβ 指标及其比值仍然对前分析很敏感。
    sourceRefs:
      - 29
      - 30
      - 33
      - 34
      - 35
  - point: 在印度商业化，仍需要符合 CDSCO 要求的 IVD 与监管文档，并配套本地验证计划，因此第一阶段更适合先卖工作流工具，而不是新的诊断声明。
    sourceRefs:
