  validationPlan:
    - priority: high
      question: 未来 12-18 个月里，印度诊断连锁到底在规划多少个血液生物标志物试点，分别会和哪些检测厂商或医院伙伴合作？
      evidenceToGather: 获取 8-10 位医学总监的储备项目访谈，以及已签署的厂商 MOU 或三级医院试点公告。
    - priority: high
      question: 当新的蛋白生物标志物 SOP 刚被引入时，分布式采样中心有多少比例的样本会失败或需要重做？
      evidenceToGather: 从一家连锁拿到试点数据，对比 20-50 个站点的前分析拒收率、周转时间和重做率。
    - priority: medium
      question: 异常或结果不确定的血检，在 30 天内有多大比例会真正转化为 PET、CSF 或治疗评估？
      evidenceToGather: 和合作神经科医生、记忆门诊一起做闭环转诊审计。
    - priority: low
      question: 进口与本地开发的阿尔茨海默病生物标志物检测，分别对应哪条 CDSCO 路径，以及多重的文档负担？
      evidenceToGather: 获取监管顾问备忘录外加两个厂商案例研究。
analysisModels:
  marketMapDiagram:
    title: AD 血液检测上线市场
    mermaid: |-
      quadrantChart
        title AD 血液检测上线市场
        x-axis 通用检测分销 --> 多站点上线专精
        y-axis 部署紧迫性低 --> 部署紧迫性高
        C2N: [0.42, 0.58]
        Quest: [0.34, 0.61]
        Labcorp-Fujirebio: [0.49, 0.74]
        Roche: [0.46, 0.71]
        Lucent-Quanterix: [0.59, 0.44]
        Proposed startup: [0.88, 0.92]
  fiveForces:
    supplierPower:
      score: 4
      rationale: 检测和分析仪厂商，再加上证据持有者，决定了可用阈值、平台和临床叙事，所以即便创业公司坚持厂商中立，也仍依赖上游科学生态。
      sourceRefs:
        - 19
        - 20
        - 21
        - 22
        - 29
        - 30
    buyerPower:
      score: 4
      rationale: 可成交的客户数不多，而且买家都很懂行；大型连锁可以延后采用、继续手工跑试点，或直接改买参考实验室服务。
      sourceRefs:
        - 3
        - 4
        - 5
        - 6
        - 7
        - 13
    threatOfEntrants:
      score: 3
      rationale: 工作流软件本身不难做，但想可信入场，靠的是临床合作、前分析经验和受信任的转诊设计，而不是通用 SaaS 功能。
      sourceRefs:
        - 29
        - 30
        - 31
        - 32
        - 36
    threatOfSubstitutes:
      score: 5
      rationale: 人工 SOP、核心 LIS 字段、外送 / 参考实验室，以及仅由专科主导的诊疗流程，都是根深蒂固的替代方案，而且新增采购摩擦几乎为零。
      sourceRefs:
        - 13
        - 15
        - 16
        - 17
        - 20
    competitiveRivalry:
      score: 4
      rationale: 即便几乎没人单独卖上线软件，检测厂商与大型实验室之间的竞争仍然激烈，因为每个买家本来就能选择另一条厂商绑定路径。
      sourceRefs:
        - 14
        - 15
        - 17
        - 18
        - 19
        - 20
        - 21
        - 39
        - 40
  pestle:
    - factor: political
      impact: negative
      point: 印度的痴呆诊疗路径还不成熟，也没有均匀铺开；IVD 批准速度也可能落后于市场热情。
      sourceRefs:
        - 1
        - 8
        - 9
    - factor: economic
      impact: positive
      point: 印度诊断市场以约 12% CAGR 增长，连锁化机构仍在持续整合中心实验室—采样点能力。
      sourceRefs:
        - 3
        - 4
    - factor: social
      impact: positive
      point: 人口老龄化和低诊断率，都会推高更早期认知评估的需求。
      sourceRefs:
        - 1
        - 2
        - 37
        - 38
    - factor: technological
      impact: positive
      point: 自动化 pTau217 和多标志物检测，让血液检测越来越适合常规实验室部署。
      sourceRefs:
        - 14
        - 20
        - 21
        - 33
        - 40
    - factor: legal
      impact: neutral
      point: 治疗标签和 BBM 指南都要求限定在有症状人群、遵守淀粉样蛋白确证逻辑并谨慎解读，而不是随意宣称开放筛查。
      sourceRefs:
        - 12
        - 23
        - 24
        - 29
        - 31
    - factor: environmental
      impact: neutral
      point: 血液检测减少了患者对 PET 或 CSF 中心出行的依赖，但冷链和样本处理在运营上依然关键。
      sourceRefs:
        - 10
        - 29
        - 30
  adoptionFrictionMatrix:
    - friction: 采样站点之间的前分析漂移
      severity: high
      affectedBuyer: 医学总监 / 质量负责人
      mitigation: 先做站点认证，明确离心和存储 SOP，并在结果发布前设置暂挂 / 放行闸门。
      sourceRefs:
        - 29
        - 30
    - friction: 阈值歧义与本地人群可迁移性
      severity: high
      affectedBuyer: 实验室医学团队与神经科合作伙伴
      mitigation: 采用双阈值、本地校准研究和不确定结果工作流，不要只靠一个硬阈值。
      sourceRefs:
        - 10
        - 11
        - 33
        - 34
        - 35
    - friction: 监管与报销不确定性
      severity: medium
      affectedBuyer: COO 或 CMO
      mitigation: 先把产品作为试点部署和附着在有症状人群项目上的 QC 软件来卖，并把质量成本收益写清楚。
      sourceRefs:
        - 8
        - 9
        - 25
        - 26
        - 27
        - 28
    - friction: 阳性结果后的专科瓶颈
      severity: high
      affectedBuyer: 神经科协同负责人 / 特检项目经理
      mitigation: 把反射式检查包和闭环转诊跟踪打包交付，尽量保住稀缺的专科产能。
      sourceRefs:
        - 1
        - 12
        - 20
        - 21
        - 23
        - 24
        - 36
market:
  tam:
    value: $11.4M
    rationale: '自下而上估算：印度约有 24 家诊断连锁或三级实验室集团，具备 100+ 等效站点的中心实验室—采样点覆盖 [3][4][5][6][7]；按每家 (300 个活跃站点 x 预计每站点每年 $1.25k 的部署 / QC 软件支出 + 每年 $100k 的检测项目层支出) 计算，TAM 约为 $11.4M；这还不到印度 $15-16B 诊断市场的 0.1%，方向上合理。[3]'
