        - 4
        - 5
        - 6
        - 7
        - 10
        - 11
    - point: 当检测厂商、参考实验室和分析仪伙伴需要一家连锁把新的生物标志物菜单落到很多站点时，它们天然就是联合销售渠道。
      sourceRefs:
