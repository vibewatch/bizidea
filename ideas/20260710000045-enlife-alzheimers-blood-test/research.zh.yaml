reportMemo:
  executiveTakeaways:
    - 商业化上线比多数实验室软件预想得更快：Labcorp、Quest、C2N、Roche、Quanterix/Lucent 都已把阿尔茨海默病血液检测推向商业市场，Alzheimer’s Association 也开始发布基于性能的 BBM 指南。[12][14][15][17][18][19][20][21][39][40]
    - 眼下的运营瓶颈不是生物标志物科学，而是分布式信任：样本处理、阈值设定和转诊路由，依然决定一家连锁能否从严密监管的试点走向规模化。[13][29][30][31][32][33][34][35][36]
    - 印度是可信的切口：痴呆负担大、诊断依旧偏晚，而且大型中心实验室—采样点诊断网络已存在；但潜在买家不多，所以滩头市场在商业上仍然很窄。[1][2][3][4][5][6][7][10][11]
    - 最好的切入点，是做一层检测厂商中立的上线软件，把异常病例升级到神经科或确证路径，而不是在检测化学本身上正面竞争。[10][11][13][14][15][17][20][21][39][40]
  marketDefinition: 面向印度的运营软件，服务对象是要在分布式采样站点上线阿尔茨海默病血液生物标志物的诊断连锁。产品位于检测厂商 / 参考实验室与连锁 LIS 之间，把样本处理、QC、解读阈值和异常病例分流固化成流程，适用于因认知下降接受评估的有症状成人。[3][4][8][9][12][13][29][30][33][34]
  customerAndBuyer: 真正拍板的是全国性诊断连锁或专科实验室集团的首席医疗官、COO 或医学总监，这些机构通常已经运营中心实验室—采样点网络。日常使用者是特检项目负责人、实验室 QA 团队和转诊协调员；神经科医生与记忆门诊是关键影响者，因为血检阳性或结果不确定的病例，仍要接入后续诊疗路径。[1][3][4][5][6][7][13][20][21]
  buyingTriggers:
    - point: 一旦决定上线或分销某款阿尔茨海默病血检，机构立刻就需要统一的前分析流程、全连锁适用规则和清晰的转诊路径。
      sourceRefs:
        - 10
        - 11
        - 12
        - 13
        - 14
        - 15
        - 17
        - 20
        - 21
    - point: 疾病修饰治疗的工作流要求在轻度认知障碍或轻度痴呆阶段更早确认淀粉样蛋白状态，这会在专家号耗尽前，加大前置识别和分诊患者的压力。
      sourceRefs:
        - 23
        - 24
        - 36
        - 37
        - 38
    - point: 当连锁把脆弱的检测从中央专家实验室推向大量采样点时，样本稳定性、阈值治理和不确定区间处理就会上升为董事会层面的临床质量风险。
      sourceRefs:
        - 29
        - 30
        - 33
        - 34
        - 35
  willingnessToPay:
    summary: 只要检测本身具有战略意义，预算就能成立。Labcorp、Quest、C2N、Roche、Quanterix/Lucent 的全国级发布说明，买方已经在吸收检测、分诊和合规成本；编码和 CMS gapfill 的推进也表明，即便广泛覆盖尚未稳定，报销基础设施已经开始成形。
    sourceRefs:
