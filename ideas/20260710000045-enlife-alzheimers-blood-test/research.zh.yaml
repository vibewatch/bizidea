    sourceRefs:
      - 3
      - 4
      - 5
      - 6
      - 7
  sam:
    value: $3.6M
    rationale: SAM 假设近期有 8 个买家——已经适合与一线城市神经科合作、开展阿尔茨海默病试点的全国连锁或专科网络 [5][6][7][10][11]；按每家 (250 个活跃站点 x 预计每站点每年 $1.2k + $150k 的项目层支出) 计算，约为 $3.6M。
