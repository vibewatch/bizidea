openQuestions:
  - 哪些印度诊断连锁已经和神经科建立了阿尔茨海默病血检试点或转诊协议，而不是仅停留在探索兴趣？
  - 进口 pTau217 或淀粉样蛋白比值检测，与本地开发检测相比，究竟对应哪种 CDSCO 分类和证据包？
