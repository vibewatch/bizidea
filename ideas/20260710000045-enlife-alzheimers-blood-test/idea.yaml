differentiator: >-
  Assay vendors usually stop at biomarker science, while generic lab software stops at order and result transport. This
  company owns the unserved middle layer: distributed-site readiness, local reference modeling, and reflex workflow
  orchestration for fragile new neurodiagnostic assays. Over time, de-identified site-performance and downstream
  outcome data create a deployment moat that new assay entrants and general LIS vendors do not naturally accumulate.
