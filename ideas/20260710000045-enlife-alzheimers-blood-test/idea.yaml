problem: >-
  Novel Alzheimer’s blood tests are close enough to routine-lab deployment that diagnostic chains can no longer treat
  them like research-only assays, but they still lack a safe way to launch a fragile new neurodegeneration test across
  dozens of collection sites. Today the fallback is expensive PET or MRI imaging, cerebrospinal fluid analysis, and
  ad hoc neurologist follow-up, which is slower, more invasive, and often too late for patients who may benefit from
  emerging treatments. One bad rollout with poor specimen quality, weak local reference ranges, or lost abnormal cases
  can destroy clinician trust before the category gets adopted.
targetUser:
  primary: Medical directors and special-assays program managers at Indian diagnostic chains launching Alzheimer’s blood testing.
  secondary: Neurologists and memory-clinic coordinators at tertiary hospitals receiving abnormal biomarker cases from those lab networks.
  buyer: COO or Chief Medical Officer of a national diagnostic chain running a central reference lab.
startupThesis:
  nonObviousInsight: >-
    The hard part is no longer inventing a blood biomarker in the lab; once Alzheimer’s testing fits routine
    diagnostic centres, the scarce asset becomes operational trust across distributed sites: specimen quality,
    population-specific interpretation, and deterministic next-step routing.
  beachhead: >-
    Indian diagnostic chains with 100 or more collection centres and one central immunoassay or molecular reference lab,
    piloting neurologist-ordered Alzheimer’s blood tests for adults over 55 with mild cognitive symptoms.
  wedge: >-
    A rollout OS that certifies collection sites, enforces pre-analytic SOPs, applies site- and population-aware QC
    thresholds, and generates configured reflex-workup packets for abnormal results.
  whyNowCatalyst: >-
    eNLife’s push toward two-to-five-hour testing in routine diagnostic centres, backed by funding for validation and
    India-specific dataset building, makes rollout infrastructure an immediate bottleneck.
  ventureScalePath: >-
    Once embedded in Alzheimer’s blood-test deployment, the company can expand into Parkinson’s, other dementia,
    neuroinflammation, and broader specialty-biomarker launches, with the de-identified rollout and outcomes dataset
    compounding into a network moat.
solution: >-
  The product sits between the analyzer or LIS and the downstream neurologist as a deployment layer for novel
  neuro-biomarker programs. It onboards each collection centre with assay-specific readiness checks, specimen handling
  rules, turnaround monitoring, and site-level drift alerts before results are released. It then adds customer-approved
  reference logic and interpretive evidence packets so abnormal results trigger the right repeat-test, imaging, or
  specialist-routing workflow configured by the lab’s medical team. Early customers start with one Alzheimer’s panel,
  but the same stack can support every blood-based neurology assay that graduates from research into routine labs.
goToMarketSeed:
  firstCustomer: >-
    The medical director of an Indian diagnostic chain with 100 or more urban collection centres, one metro reference
    lab, and pilot partnerships with tertiary neurology hospitals for Alzheimer’s blood testing.
  buyingTrigger: >-
    A decision to pilot or validate an Alzheimer’s blood-test menu with neurologist partners, creating immediate risk
    around sample quality, result consistency, and abnormal-case handoff.
  currentAlternative: Manual SOP binders, LIS custom fields, spreadsheets, and referral coordination layered on top of PET, MRI, CSF, or status-quo neurologist workups.
  switchingReason: >-
    The rollout OS gives chains same-day operational confidence: fewer unusable samples, tighter site oversight,
    localized interpretation, and closed-loop neurologist routing without replacing the analyzer or core LIS.
  pricingHypothesis: Launch fee per new assay program plus a per-active-site subscription and a per-reported-panel workflow fee.
