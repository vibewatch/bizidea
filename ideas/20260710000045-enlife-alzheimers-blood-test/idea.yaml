jobsToBeDone:
  - job: >-
      When a diagnostic chain pilots an Alzheimer’s blood test across distributed collection centres, help the
      special-assays team standardize specimen capture and release reliable results, so they can launch without
      destroying clinician trust.
    currentAlternative: Spreadsheet trackers, PDF SOPs, LIS custom fields, and manual lab-manager oversight
    successMetric: >-
      At least 95% acceptable samples, under 24-hour result release from the reference lab, and fewer than 2% site-level
      reruns caused by preventable pre-analytic errors
  - job: >-
      When an abnormal Alzheimer’s biomarker result is reported, help the lab and receiving neurologist route the
      patient into the right next-step workup, so high-risk cases are not lost after the blood test.
    currentAlternative: Faxed reports, phone follow-up, and ad hoc specialist coordination
    successMetric: At least 80% of abnormal cases acknowledged and routed to a confirmatory next step within seven days
