topRisks:
  - name: Clinical validation lag
    description: If Alzheimer’s blood tests take longer than expected to validate clinically or regulatorily, launch budgets could stall.
    mitigation: Start as the workflow and QC layer for pilots and validation studies, then support adjacent neuro biomarkers rather than depend on one assay alone.
  - name: Buyer timing risk
    description: Many diagnostic chains may wait for stronger neurologist demand or reimbursement clarity before formal rollouts.
    mitigation: Target chains already running special-assay launches with tertiary neurology partners and price around reduced sample failure and faster pilot expansion.
  - name: Clinical-liability boundary
    description: Workflow software that appears to recommend care pathways can trigger medical-governance and liability concerns.
    mitigation: Keep routing logic configurable by the customer’s medical team, maintain audit trails, and position outputs as evidence-backed decision support rather than autonomous diagnosis.
