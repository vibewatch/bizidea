slug: alzheimers-assay-rollout-os
date: '2026-07-10'
executiveSummary: >-
  阿尔茨海默病检测上线管理系统一开始就该做成一层厂商中立的部署层，服务正把阿尔茨海默病血检从一间中心参考实验室铺向 100
  多个采样点的印度诊断连锁。商业化的速度已经超过了老式实验室软件的预设：Labcorp、Quest、C2N、Roche 和
  Lucent/Quanterix 都已经有商业化项目在跑，而 eNLife 明确瞄准的正是两到五小时出结果的印度常规诊断中心。第一个买家，是已经决定试点阿尔茨海默病血检菜单、现在要为分布式站点上的样本完整性、阈值治理和异常病例交接担责的连锁医学总监或
  CMO。MVP 应该保持窄口径：给站点做认证、强制执行前分析 SOP、把存疑结果扣下来、按客户认可的双阈值或不确定结果流程处理，并把异常病例导向神经科或确证性的下一步检查。这比新做一款检测或整套替换 LIS 更适合当首发产品，因为眼下的预算就摆在降低上线风险和赢得临床信任上，不在生物标志物发现或推翻现有工作流上。近期的印度阿尔茨海默病切口商业上是真实的，但规模不大——研究估算
  TAM 约 $11.4M、SAM 约 $3.6M、第 3 年 SOM 约 $0.9M，所以风投级回报要靠后续扩展到其他神经生物标志物项目或相邻地理市场。最大的反证风险，是印度的上线可能因监管、报销或治疗可及性滞后而一直停留在试点阶段，或者大型实验室和检测厂商把足够多的工作流支持打包进产品，吃掉这块预算。眼下的关键缺口，是有多少连锁已经落地神经科联动的试点、进口与本地检测各自适用的
  CDSCO 路径细节，以及样本拒收率和转诊转化率的基线数据——头 90 天应该先把这些搞清楚，再决定要不要加大投入。
problem:
  - >-
    如果样本处理、储存和放行规则不能落到每个站点，分布式采样点足以把一款临床前景不错的阿尔茨海默病血检，变成一次毁掉信任的糟糕上线。
  - >-
    通用 LIS 工作流、SOP 文件夹和表格管不了双阈值、不确定结果，也管不了跨连锁网络的可审计神经科交接。
  - >-
    阳性或不确定的结果仍需要影像、CSF 或治疗评估来确认，但专科产能集中在三级中心，人工随访很容易把病例漏掉。
solution:
  - >-
    在分析仪或 LIS 与连锁运营团队之间部署一层厂商中立的上线层，给站点做认证、强制执行前分析 SOP，并在结果放行前扣下或升级存疑样本。
  - >-
    让每家客户的医疗团队自行配置阈值区间、不确定结果处理方式和反射式复查包，这样软件是在支撑医疗治理，而不是在做自主诊断判断。
  - >-
    跟踪异常和不确定病例，直到神经科确认或走完确证性的下一步，这样实验室才能证明自己的上线真正闭环，而不只是出报告。
whyWeWin:
  - >-
    检测厂商和参考实验室靠生物标志物科学或渠道分发取胜，但它们通常不掌握第三方诊断连锁内部的站点就绪度、采血漂移，或客户特定的转诊逻辑。
  - >-
    每一次部署都会沉淀站点级质控、重做和印度本地解读数据，这些是通用 LIS 中间件和人工团队都不会主动集中管理的。
  - >-
    异常血检结果是否真正走到了正确的下一步，这条闭环证据一旦积累起来，等新的神经生物标志物项目上线时就能变成一道防得住的工作流护城河。
strategicChoices:
  beachhead: >-
    以大城市为中心、拥有 100 个以上采样点、一间中心免疫或分子参考实验室，并与三级神经科建立合作的印度诊断连锁，正在为 55 岁以上有症状成人试点由神经科医生开单的阿尔茨海默病血检。
  wedgeRationale: >-
    这个切入点比卖一整套神经科平台更快出证据，因为一家连锁就能控制站点 SOP、中心实验室放行和一个检测项目的神经科转诊。在公司把手伸向更多地理市场、新检测或核心系统替换之前，它先能在样本拒收率、周转时间和转诊闭环上拿出可衡量的证据。
  sequencingRationale: >-
    先把质控和转诊叠加层做出来，由创始人亲自卖给医学总监和 CMO，在扩大销售团队之前先招医学事务和实施人员——因为第一年里，责任边界和上线打法比获客量重要得多。检测厂商、学术校准和神经科转诊这类正式合作关系，应该等一家连锁真正跑通、证明软件能减少可预防的重做并改善异常病例跟进之后，才值得深耕，而且不能替换掉 LIS。
  notYet:
    - 自建或拥有检测化学本身
    - 开放人群筛查或直接面向消费者的阿尔茨海默病检测
    - 在都市神经科合作打法验证前先做下沉市场
    - 在两个阿尔茨海默病项目跑进生产阶段之前，做帕金森病或其他神经退行性疾病项目
market:
  tam: "研究估算印度 TAM 约 $11.4M，对应约 24 家具备 100+ 站点等效覆盖的诊断连锁或三级实验室集团。"
  sam: "研究估算近期 SAM 约 $3.6M，对应 8 家已经适合神经科合作伙伴阿尔茨海默病试点的大城市网络。"
  som: "模型测算第 3 年 SOM 约 $0.9M，来自 4 个生产客户各在约 150 个活跃采样点运行一个阿尔茨海默病项目。"
  segments:
    - 正在推出神经科开单阿尔茨海默病血检项目的全国性诊断连锁
    - 服务三级神经科医院的专科参考实验室或区域连锁
  buyingProcess: >-
    连锁决定试点阿尔茨海默病血检菜单后，通常由特检项目经理或医学总监牵头推进，而 CMO 或 COO 掌握预算和责任。可信的切入动作，是在一个检测项目、20-50 个采样点上跑一次付费试点，转诊逻辑要在神经科合作伙伴认可后才推向全网络启用。
product:
  mvp: >-
    MVP 是面向单个阿尔茨海默病血检项目的厂商中立部署层，覆盖站点认证、样本处理核查表、扣留放行闸门、周转与重做仪表盘、可配置的不确定结果流程，以及异常结果转诊包。它应该能对接一间中心实验室和 20-50 个采样点，且不替换核心 LIS。
  sixMonth: >-
    上线 2 个共创客户试点，完成站点接入、前分析 SOP 强制执行、结果扣留放行规则、审计日志，以及拒收率、重做率、周转时间和异常病例确认的仪表盘。
  twelveMonth: >-
    把至少 2 个试点转成正式合同，加上可复用的分析仪或厂商模板，并引入印度本地校准复核和转诊状态跟踪，供客户在季度医疗治理会议上使用。
  twentyFourMonth: >-
    只有当公司证明同一套质控、阈值和转诊技术栈可以复制之后，才在现有客户内部把覆盖范围从一个阿尔茨海默病项目扩展到更多站点，并至少加上一个相邻神经生物标志物工作流。
  keyBets:
    - 在报销和监管路径完全成型之前，买家就会愿意为降低上线风险投钱。
    - 一层叠加式部署能比替换整套 LIS 更快上线，同时依然控制住真正要命的失败点。
    - 印度本地的阈值和不确定区间逻辑重要到足以撑起留存和差异化。
    - 同一套上线技术栈能从阿尔茨海默病扩展到现有连锁内的相邻神经生物标志物项目。
gtm:
  wedge: >-
    先在一家诊断连锁内、围绕一个阿尔茨海默病血检项目落地上线与信任层，证明样本失败率更低、异常病例转诊更干净，再去争取更大的 LIS 控制权或多检测项目的话语权。
  channels:
    - 创始人亲自直销大型诊断连锁的医学总监、CMO 和特检负责人
    - 与需要多站点运营化支持的检测厂商、分析仪平台和参考实验室伙伴联合销售
    - 神经科和记忆门诊伙伴转介，用来验证转诊逻辑和异常病例闭环
  funnelTargets: "目标客户接触到合格试点转化率 25-40%，合格试点到付费试点转化率 30-50%，付费试点到正式合同转化率 50% 以上，正式客户在 12 个月内扩展到 100+ 站点或第二个项目的比例 50% 以上。"
  pricing: >-
    收取一次性检测上线费、按活跃采样点收取的年度订阅费，以及按结果或转诊病例收取的工作流费用。这符合买家为新检测上线做预算的习惯，让他们能用更少的重做、更快的放行和更少的异常病例遗漏来验证支出是否值得，而不是按用户席位算账。
businessModel:
  revenueStreams:
    - 一次性检测上线费和实施费
    - 按运行受治理生物标志物项目的活跃采样点收取年度订阅费
    - 按出具报告套餐或转诊的异常或不确定病例收取使用费
    - 高级校准、审计和跨检测治理模块
  unitOfValue: 运行受治理阿尔茨海默病生物标志物项目的活跃采样点，加上出具报告或转诊病例产生的工作流事件
  targetGrossMarginPct: 70
  expansionLevers:
    - 从 20-50 个试点站点扩展到同一连锁内 100+ 个正式站点
    - 在现有客户内部加上第二、第三个神经生物标志物项目
    - 打包跨客户的站点质控、重做和转诊闭环基准数据
    - 工作流跑通后，加入检测厂商或参考实验室的渠道分发
strategyMap:
  northStarMetric: 阿尔茨海默病血检结果在目标周转时间内放行、且异常或不确定时被闭环转诊的比例
  inputMetrics:
    - 启用前的站点认证完成率
    - 按采样点统计的可预防样本拒收或重做率
    - 从采集到中心实验室结果放行的中位小时数
    - 异常或不确定病例在 7 天内被神经科医生或协调员确认的比例
    - 付费试点转正式合同的转化率
  moatsToBuild:
    - 跨分布式采样点的站点级样本完整性与重做数据集
    - 经客户医疗团队认可的印度本地阈值、不确定区间和异常处理数据集
    - 把血检结果与确证性下一步及神经科确认相连的闭环转诊数据集
    - 可复用的厂商中立集成和上线打法手册
  killCriteria:
    - 首批 10 家合格印度连锁中，12 个月内签下付费试点的不足 2 家。
    - 前 3 个试点未能把可预防的样本拒收和重做率压到 2% 以下，或未能把活跃站点的中心实验室放行时间压到 24 小时以内。
    - 试点中异常或不确定病例在 7 天内取得有记录的神经科或确证性下一步确认的比例不足 50%。
    - 付费试点转正式合同的比例始终低于 50%，或某个正式项目的实际定价低于 $175K ARR。
  mermaid: |
    flowchart LR
      切口[单一连锁阿尔茨海默病上线切口] --> 最小可行产品[质控与转诊 MVP]
      最小可行产品 --> 证据[重做更少、随访闭环]
      证据 --> 扩张[先扩站点、再扩神经检测]
investorMemo:
  verdict:
    call: "观察"
    conviction: 运营痛点清晰、切口成型，但目前只做印度阿尔茨海默病市场的买家池太窄、时点也太敏感，还撑不起合伙人层面的确信。
    whyBelieve: 这家公司卖的是运营信任层——每当一款脆弱的阿尔茨海默病血检走进分布式常规实验室，检测厂商都会留下这块空白。
    whyDoubt: 如果印度的项目一直停留在人工试点或厂商打包工作流里，独立软件预算可能永远长不到风投级规模。
    nextDiligence: 先拿下一个多站点付费试点，证明重做更少、放行更快、异常病例跟进更好，再验证第二个项目扩展是否真实可复制。
  firstCustomer:
    title: 一家 100+ 站点印度诊断连锁阿尔茨海默病试点的医学总监
    profile: 运营一套中心辐射式连锁，有一间都市中心实验室、100+ 个采样点，并与三级神经科伙伴一起评估有症状老年人。
    trigger: 连锁决定推出或验证阿尔茨海默病血检菜单，需要对样本质量、阈值治理和转诊交接拥有可审计的把控力。
    buyer: COO 或首席医疗官
    initialContract: "一个检测项目、20-50 个站点的付费试点收费 $30K-$60K，连锁扩展到 100-150 个活跃站点并持续产生工作流费用后，转为约 $175K-$300K ARR。"
  mustBeTrue:
    - 未来 12-18 个月内，至少 4 家印度诊断连锁必须已经在规划神经科联动的阿尔茨海默病血检试点。
    - 前 3 个试点必须把活跃站点的可预防样本拒收和重做率压到 2% 以下，中心实验室放行压到 24 小时以内。
    - 客户必须能接受在自有 LIS 和分析仪体系上叠加一层厂商中立的软件，而不需要整套替换项目。
    - 转诊功能启用后，至少 50% 的异常或不确定病例必须在 7 天内取得有记录的神经科或确证性下一步确认。
    - 试点账户必须在 12 个月内扩展到更多站点或第二个神经生物标志物项目，否则这个切口对风投回报来说就太小了。
  diligenceQuestions:
    - 哪些印度连锁已经和厂商或三级医院签署了阿尔茨海默病血检的试点协议？
    - 它们的特检项目在 20-50 个站点范围内，拒收率、重做率和周转时间的基线数据是什么？
    - 当检测采购、QA 和神经科协调跨越多个部门时，谁掌握上线软件的预算和责任？
    - 检测厂商或大型参考实验室已经把多少工作流支持打包进了试点项目？
    - 如果阿尔茨海默病部署在印度一直停留在试点阶段，哪个第二检测或第二地理市场能可信地撑起这份生意？
operatingAssumptions:
  - assumption: 未来 12-18 个月内，至少会有一批印度连锁买家启动阿尔茨海默病血检试点。
    basis: research.yaml
    validationTest: 访谈 8-10 位医学总监，9 个月内拿下 2 个付费试点或 4 份签署的意向书。
    decisionImpact: 如果不成立，就把切口从阿尔茨海默病扩大到厂商中立的专科生物标志物上线，或暂停印度优先的扩张节奏。
  - assumption: 买家会接受第一阶段只对接 LIS 导出数据或轻量接口的叠加层，而不要求整套核心系统替换。
    basis: idea.yaml
    validationTest: 在前 5 次认真的共创客户洽谈中，至少 3 家同意从不替换 LIS 的范围起步试点。
    decisionImpact: 如果不成立，路线图必须转向更少但更深的集成、更慢的部署节奏和更小的目标客户画像。
  - assumption: 更少的重做、更快的放行和更干净的转诊闭环，足以带来量化的投资回报，撑起单个正式项目至少 $175K ARR。
    basis: research.yaml
    validationTest: 前 2 个付费试点显示可预防重做率低于 2%、放行时间低于 24 小时，如果这些指标保持 60 天，客户预先认可年度上线定价。
    decisionImpact: 如果不成立，这更像是一个低价值的合规工具，而不是风投级的运营层。
  - assumption: 印度本地的阈值和不确定区间逻辑，比单纯用厂商默认阈值更能赢得医疗团队信任。
    basis: research.yaml
    validationTest: 一家学术或连锁合作方完成本地校准复核，并在试点治理中使用配置好的不确定区间逻辑。
    decisionImpact: 如果不成立，差异化就会收窄到前分析和转诊环节，防御力和定价权都会被削弱。
  - assumption: 连锁和神经科伙伴会分享足够的随访状态数据，让闭环转诊跟踪真正有意义。
    basis: research.yaml
    validationTest: 至少 60% 的异常或不确定试点病例，能在 30 天内从合作神经科获得随访状态更新。
    decisionImpact: 如果不成立，就该把诊疗路径分析降到次要优先级，路线图聚焦实验室侧质控即可。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 在滩头市场里访谈 10 位医学总监或特检负责人，以及 5 位神经科合作伙伴。
    hypothesis: 一小群连锁已经在筹备真正的阿尔茨海默病血检试点，也有着同样的上线风险痛点。
    successMetric: 至少 6 家连锁确认了明确的购买触发点，3 家同意进入试点范围洽谈。
    owner: CEO 创始人
  - horizon: 0–90 天
    experiment: 对目标连锁的历史特检或试点数据，跑一次一对一的上线审计。
    hypothesis: 样本拒收、重做和转诊交接的失败模式足够可量化，能在全面产品自动化之前先算出投资回报基线。
    successMetric: 一家连锁分享至少 20 个站点的站点级基线数据，并签下付费试点范围。
    owner: 产品与实施负责人
  - horizon: 90–180 天
    experiment: 为一个阿尔茨海默病检测项目，在 20-50 个采样点和一间中心实验室上线首个 MVP。
    hypothesis: 厂商中立叠加层能在 8 周内上线，并控制住风险最高的前分析和转诊环节。
    successMetric: 首个付费试点在 8 周内上线，并产出重做率、放行时间和异常病例闭环的周报仪表盘。
    owner: 创始工程
  - horizon: 90–180 天
    experiment: 和至少 3 个合格买家一起测试试点套餐和年度定价。
    hypothesis: 只要 KPI 改善是明确的，买家就会为固定的上线套餐付费，也会接受站点加工作流的定价模式。
    successMetric: 至少签下 2 个付费试点，或 1 个试点加 1 份书面的年度定价预先认可。
    owner: CEO 创始人
  - horizon: 180–360 天
    experiment: 和一家学术或三级医院伙伴一起，做一次印度本地的校准与不确定区间复核。
    hypothesis: 本地阈值复核能提升客户医疗团队的信心，形成一道站得住的差异化层。
    successMetric: 一家伙伴批准使用本地校准或不确定区间逻辑的正式转诊协议。
    owner: 医学事务与 QA 负责人
  - horizon: 180–540 天
    experiment: 把首个正式客户扩展到 100+ 个站点，或加上第二个神经生物标志物项目。
    hypothesis: 一旦首个阿尔茨海默病项目证明降低了运营风险，同一个买家就会为更大范围的上线出资。
    successMetric: 一份扩展合同把该账户拉高到 $175K ARR 以上，并加上 50+ 个站点或一个新的生物标志物工作流。
    owner: 战略合作负责人
operations:
  - 每次上线都要按站点认证核查表、采血与离心 SOP 签字确认、扣留放行闸门来标准化，才能推进连锁全网启用。
  - 维护经每家客户医疗团队认可的版本化阈值和转诊逻辑，为每一次放行、覆盖和转诊包保留审计记录。
  - 每周和神经科或记忆门诊伙伴一起核对异常和不确定病例，衡量下游跟进情况。
  - 复用厂商中立的 LIS 导出或 API 连接器以及合规文档模板，缩短试点搭建时间。
team:
  - role: CEO 创始人
    startTiming: Month 0
    rationale: 在市场格局还没定型的阶段，负责创始人主导销售、医学总监关系、试点包装，以及早期的检测厂商或医院合作。
  - role: 创始工程
    startTiming: Month 0
    rationale: 搭建决定部署速度和可信度的工作流引擎、审计日志、扣留放行规则和厂商中立集成。
  - role: 产品与实施负责人
    startTiming: Month 1
    rationale: 把站点接入打法沉淀成手册，缩短试点搭建时间，把一次性的客户工作流变成可复用的部署模板。
  - role: 医学事务与 QA 负责人
    startTiming: Month 2
    rationale: 负责阈值治理、学术校准工作、医疗团队审批，以及工作流支持与临床结论之间的责任边界。
  - role: 战略合作负责人
    startTiming: Month 9
    rationale: 只有等首批试点证明投资回报、公司也有了能讲给检测厂商、实验室和神经科伙伴的可复制故事，才补上商业杠杆。
milestones:
  - horizon: 0–12 个月
    items:
      - 签下 2 个付费试点，每家连锁在 20-50 个站点激活一个阿尔茨海默病检测项目。
      - 在试点站点把可预防样本拒收和重做率压到 2% 以下，中心实验室放行压到 24 小时以内。
      - 让至少 50% 的异常或不确定病例在 7 天内取得有记录的神经科或确证性下一步确认。
      - 敲定一个学术或三级医院校准合作，并形成标准的医疗治理模板。
  - horizon: 12–24 个月
    items:
      - 把至少 2 个试点转成覆盖各 100-150 个活跃站点的正式合同。
      - 在正式客户内部推出可复用的厂商或分析仪模板，以及印度本地不确定区间治理。
      - 在现有客户内部拿下首次扩展——更多站点或第二个神经生物标志物工作流。
      - 建立至少 2 个可信的检测、参考实验室或神经科转诊合作关系管道。
  - horizon: 24–36 个月
    items:
      - 达到 4 个正式客户，年化收入约 $0.9M，符合研究测算的第 3 年 SOM 情景。
      - 把跨客户的站点质控、重做和转诊闭环基准数据产品化。
      - 证明相邻神经生物标志物扩展是否足够可复制，值得启动下一轮融资。
      - 根据试点经济模型和监管进展，决定继续印度优先还是进入第二个地理市场。
risks:
  - risk: 如果 CDSCO、报销或治疗可及性的时点落后于市场热度，印度阿尔茨海默病血检的采用就会一直停留在试点阶段。
    likelihood: Medium
    impact: High
    mitigation: 先作为试点和验证研究的上线与质控软件切入，把烧钱节奏绑定到已签部署上，扩大销售团队前要求第二个项目的证据。
  - risk: 检测厂商或大型实验室把足够多的工作流支持打包进产品，压缩独立软件的预算空间。
    likelihood: Medium
    impact: High
    mitigation: 靠厂商中立、跨检测治理、印度本地校准和多伙伴转诊跟踪来做差异化，这些是打包路径天然不会覆盖的能力。
  - risk: 转诊和解读功能可能触发医疗责任或采购层面的顾虑。
    likelihood: Medium
    impact: High
    mitigation: 把所有阈值和转诊逻辑的配置权留给客户医疗团队，保留完整审计记录，并把输出定位为受治理的工作流支持。
  - risk: 不同人群和采集条件下的真实世界阈值波动，可能比预期更难驯服。
    likelihood: Medium
    impact: High
    mitigation: 用分阶段站点启用、不确定区间、本地校准复核和扣留放行闸门，取代单一统一阈值。
  - risk: 如果扩展没能很快出现，印度阿尔茨海默病滩头市场对风投级回报来说可能太窄。
    likelihood: High
    impact: High
    mitigation: 把第 18 个月前是否有第二项目或第二地理市场的证据，当成董事会层面的关卡；如果扩展证据没出现就压缩烧钱。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-3M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 个月应能支撑一支精简的临床运营重团队，做出厂商中立的上线 MVP，完成 2-3 个多站点连锁试点，建立校准和合规合作关系，并把至少
    1-2 家诊断连锁转化为正式的阿尔茨海默病项目，同时留出清晰的扩展路径。
