    score: 5
    rationale: Multiple same-day sources combine funding, product detail, institutional coverage, and volume claims around a clear operational bottleneck.
  painIntensity:
    score: 4
    rationale: Urgent supplier payments and audit exposure create material pain, but it is concentrated in customers already near stablecoin adoption.
  wedgeClarity:
