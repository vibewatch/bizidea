topRisks:
  - name: Adoption timing
    description: Stablecoin supplier payments may remain concentrated in a limited set of corridors and industries longer than expected.
    mitigation: Start with customers already running urgent or hard-to-bank supplier corridors and keep the product multi-rail so ROI also comes from exception control and audit speed.
  - name: Incumbent bundling
    description: AP suites, payment providers, or custodians could add basic screening and reconciliation once stablecoin volume grows.
    mitigation: Own the cross-provider invoice-wallet binding, approval graph, and ERP evidence layer that are harder for any single rail vendor to generalize.
  - name: Workflow trust gap
    description: Controllers will reject the system if wallet mappings or ledger outputs are even occasionally wrong on high-value payments.
    mitigation: Launch read-only first, require human approvals and dual controls, and invest early in deterministic wallet verification and exception handling.
