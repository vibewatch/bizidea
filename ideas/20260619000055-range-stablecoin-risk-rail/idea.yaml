jobsToBeDone:
  - job: When an urgent supplier invoice must clear outside banking hours, help our controller release a stablecoin payment with the right approvals, so we can protect supply continuity without breaking policy.
    currentAlternative: Bank wires plus spreadsheets, OTC desk portals, and manual finance sign-off
    successMetric: Time from approved invoice to supplier payment release and number of policy exceptions caught before execution
  - job: When month-end close arrives, help finance reconcile every stablecoin supplier payment back to invoice, fees, FX, and wallet movements, so auditors do not treat the flow as off-book.
    currentAlternative: Manual exports from provider portals, wallet screenshots, and spreadsheet journals
    successMetric: Hours to reconcile stablecoin supplier payments and percentage of payments with complete audit evidence
