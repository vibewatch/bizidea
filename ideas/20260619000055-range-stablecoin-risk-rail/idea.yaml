problem: >-
  Mid-market import distributors increasingly encounter suppliers who will accept stablecoin for urgent or off-hours
  settlement, but controllers cannot release a wallet payment with the same policy checks they use for bank wires. Invoice
  approval, beneficiary verification, wallet screening, sanctions review, and ERP booking are split across email, OTC
  portals, spreadsheets, and finance systems that do not understand on-chain movement. The result is a bad choice: keep
  using slower wires when timing matters, or let stablecoin payments bypass accounts-payable controls and create audit
  risk.
targetUser:
  primary: Controllers and AP operations leaders at mid-market import distributors piloting stablecoin supplier payments
  secondary: Treasury managers and finance systems leads at the same distributors
  buyer: CFO or VP Finance
startupThesis:
  nonObviousInsight: >-
    Stablecoin adoption in trade will not be won by the provider with the fastest rail. It will be won by the workflow
    that converts an approved invoice into a policy-cleared wallet release with evidence finance can post, audit, and
    defend. As institutional coverage expands across banks, custodians, wallets, and exchanges, the scarce product
    becomes pre-release control rather than raw payment access.
  beachhead: >-
    U.S.- and European import distributors in electronics, industrial parts, and apparel that process 200-plus overseas
    supplier payments per month, already use OTC desks or stablecoin-enabled payment providers for urgent settlements,
    and still run approvals inside legacy ERP and AP workflows
  wedge: >-
    An invoice-to-wallet release layer that matches supplier invoices to approved counterparties and wallets, screens the
    transfer before execution, routes maker-checker approvals, and posts journal-ready evidence back into ERP
  whyNowCatalyst: >-
    Range’s funding and product claims show that institutional stablecoin usage has reached finance-owned workflows,
    making pre-execution approval and unified ledger evidence the next blocker for commercial payments.
  ventureScalePath: >-
    Start with supplier payments for import-heavy distributors, then expand into freight forwarders, procurement
    platforms, B2B marketplaces, and eventually any finance team moving money across bank, custodian, wallet, and
    exchange rails.
solution: >-
  Build an ERP-linked control layer that sits between AP workflow, payment provider, wallet or custody account, and the
  general ledger. For each proposed stablecoin payment, the product checks invoice status, vendor identity, approved
  wallet address, sanctions and policy rules, funding source, and separation-of-duties requirements before funds move.
  It creates an auditable case record with who approved what, the on-chain transaction details, FX basis, fees, and
  journal entries, then syncs the outcome back into ERP and close workflows. Customers start read-only with
  reconciliation and release evidence, then activate execution approvals and provider routing across banks, custodians,
  and OTC partners.
goToMarketSeed:
  firstCustomer: >-
    A $100M-$500M revenue electronics or industrial-parts importer with Asia-based suppliers, 200-plus monthly overseas
    invoices, recurring urgent payment exceptions, and a finance team already testing stablecoin settlement through an
    OTC desk or payment platform
  buyingTrigger: >-
    A supplier demands faster release than wires can provide, the CFO approves a stablecoin payment pilot, or internal
    audit flags that wallet payments sit outside normal AP controls
  currentAlternative: >-
    Manual workflow across ERP approvals, spreadsheets, bank wires, OTC desk or payment-provider portals, wallet
    screenshots, and ad hoc controller sign-off
  switchingReason: >-
    Stablecoin payment providers move funds, but this product lets controllers apply invoice-level policy, beneficiary
    checks, and clean ledger evidence before any wallet release leaves the business
  pricingHypothesis: >-
    Annual SaaS subscription by legal entity and connected payment stack, plus usage-based fees on approved stablecoin
    supplier-payment volume
