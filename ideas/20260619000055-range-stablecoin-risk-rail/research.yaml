competitors:
- name: Range
  stage: scale-up
  wedge: Treasury, risk, and compliance layer for institutions operating across stablecoins and fiat.
  pricing: Custom / enterprise sales.
  strength: Strong narrative around pre-trade controls and unified treasury visibility with institutional proof points.
  weaknessVsUs: Broad institutional scope; less visibly anchored in invoice-native AP workflow for import distributors.
  sourceRefs:
  - 1
  - 3
- name: BVNK
  stage: scale-up
  wedge: Stablecoin-native global payments infrastructure with managed and self-managed delivery models.
  pricing: Custom / enterprise sales.
  strength: Owns payment execution, conversion, and compliance footprint across rails.
  weaknessVsUs: Execution-led platform; does not own invoice approval graph or cross-provider audit case.
  sourceRefs:
  - 34
  - 36
- name: Conduit
  stage: scale-up
  wedge: Programmatic stablecoin and fiat pay-ins, payouts, and on/off-ramp flows for cross-border businesses.
  pricing: Tiered by volume.
  strength: Detailed abstractions for counterparties, payment methods, quotes, and currency conversion flows.
  weaknessVsUs: Best at transaction orchestration, not controller-grade release control inside ERP.
  sourceRefs:
  - 40
  - 42
  - 44
  - 49
- name: Fireblocks
  stage: incumbent
  wedge: Wallet governance, policy engine, and enterprise stablecoin and custody infrastructure.
  pricing: $699 per month entry tier; enterprise custom above that.
  strength: Strong governance primitives and broad institutional footprint.
  weaknessVsUs: Starts from wallet movement and policy, not invoice matching and supplier-payment evidence.
  sourceRefs:
  - 4
  - 70
- name: Bitwave
  stage: scale-up
  wedge: Crypto accounting, subledger, and audit-ready reporting for finance teams.
  pricing: Custom / quote-led.
  strength: Clear finance-team fit for post-trade reconciliation and reporting.
  weaknessVsUs: Operates after execution and does not stop an unapproved wallet release before funds move.
  sourceRefs:
  - 63
  - 64
regulatoryTechnicalConstraints:
- point: Customer and counterparty onboarding requires KYB/KYC documents, verified payment methods, and sometimes enhanced compliance documentation before funds move.
  sourceRefs:
  - 45
  - 50
- point: Corridor launch depends on supported assets and operational onramp/offramp configurations, so coverage is not universal.
  sourceRefs:
  - 46
  - 49
  - 52
- point: Wallet screening and configurable exposure thresholds are table stakes for enterprise launches.
  sourceRefs:
  - 76
  - 82
  - 87
- point: Stablecoins create accounting, tax, and operational complexity that finance teams must solve alongside payment speed.
  sourceRefs:
  - 16
validationSignals:
- point: Range’s oversubscribed Series A shows investors will fund treasury, risk, and compliance layers around stablecoin usage, not only rails.
  sourceRefs:
  - 3
- point: Fireblocks reports that stablecoins already account for nearly half of transaction volume on its platform and that most surveyed firms are taking action.
  sourceRefs:
  - 4
- point: Stripe Treasury’s stablecoin accounts in 101 countries show mainstream PSPs are normalizing stablecoin balances and transfers for businesses.
  sourceRefs:
  - 9
- point: Conduit already models counterparties, payment methods, quotes, and offramps, suggesting the missing layer is orchestration rather than primitive rail access.
  sourceRefs:
  - 42
  - 44
  - 49
- point: Triple-A explicitly markets stablecoin cross-border payments to importers and exporters, validating the trade-payments use case.
  sourceRefs:
  - 100
openQuestions:
- Which supplier corridors create the highest share of after-hours stablecoin exceptions for mid-market import distributors?
- How often do controllers need to approve wallet changes separately from invoice approval in early stablecoin programs?
- Will payment providers and ERP integrators prefer to co-sell a control layer or to bundle shallow approval features themselves?
- What minimum evidence package does internal audit require before approving wallet-based supplier payments at first deployment?
