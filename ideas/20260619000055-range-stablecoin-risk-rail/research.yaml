market:
  tam:
    value: $0.8B
    rationale: 'Bottom-up: (U.S. target-sector wholesalers 50-499 employees = 4,363 from Census) + (EU wholesale enterprises 50-249 and 250+ = 22,680, multiplied by a 27.5% target-sector proxy = 6,237) gives ~10,600 relevant firms; at a modeled $75k ACV this yields about $795M. Cross-check: FXC sizes B2B cross-border flows far larger, leaving room for workflow software on a narrow wedge.'
    isEstimate: true
    sourceRefs:
    - 30
    - 32
    - 33
    - 64
    - 70
  sam:
    value: $159.0M
    rationale: 'Apply a 20% filter to the relevant-firm base for import-heavy, high-exception customers already near stablecoin adoption: ~2,120 entities x $75k ACV.'
    isEstimate: true
    sourceRefs:
    - 4
    - 5
    - 32
    - 33
  som:
    value: $4.5M
    rationale: Year-3 reachable share assumes about 75 customers at roughly $60k ARR each through direct sales plus rail and AP partner referrals.
    isEstimate: true
    sourceRefs:
    - 34
    - 40
    - 95
    - 96
