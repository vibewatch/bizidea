  sensitivityCases:
  - case: Stablecoin usage stays concentrated in a few corridors
    impact: SAM compresses and sales cycles lengthen because only already-converted importers feel acute pain.
    sourceRefs:
    - 5
    - 60
  - case: Payment providers add basic approval and screening features
