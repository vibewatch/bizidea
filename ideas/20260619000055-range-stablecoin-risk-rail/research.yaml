    - 82
    - 87
  validationPlan:
  - priority: high
    question: How often do urgent supplier payments already bypass normal AP controls in target import corridors?
    evidenceToGather: Controller interviews, exception logs, and one recent month of urgent-payment cases from 10-15 import distributors.
  - priority: high
    question: What minimum evidence package does internal audit require before approving wallet-based supplier payments?
    evidenceToGather: Sample audit checklists, maker-checker rules, and ERP journal artifacts from pilot customers and their auditors.
  - priority: medium
    question: Will payment providers and ERP integrators co-sell a control layer instead of building shallow approval features themselves?
    evidenceToGather: Partner conversations, integration scoping calls, and at least two joint pilot proposals.
