jobsToBeDone:
- job: 当一张紧急供应商发票必须在银行营业时间外结清时，帮控制负责人按正确审批放出一笔稳定币付款，这样我们既能保住供应连续性，也不用突破政策边界。
  currentAlternative: 银行电汇，加上电子表格、OTC 柜台门户和人工财务签字
  successMetric: 从发票获批到供应商付款放行的时间，以及在执行前拦下的政策异常数量
- job: 到了月末关账时，帮财务把每一笔稳定币供应商付款都对回发票、费用、FX 和钱包流水，这样审计师就不会把这条资金流当成账外项目。
  currentAlternative: 从服务商门户手工导出、截钱包图，再用电子表格补会计分录
  successMetric: 完成稳定币供应商付款对账所需小时数，以及具备完整审计证据的付款占比
