problem: 中端进口分销商越来越常碰到一类供应商：一旦要抢时效，或在银行下班后结算，对方就愿意收稳定币。但控制负责人没法像放银行电汇那样，对钱包付款套上同一套政策检查。发票审批、收款方核验、钱包筛查、制裁审查和 ERP 入账，被拆在邮件、OTC 门户、电子表格和看不懂链上资金流的财务系统里。结果只剩一个两难：要么继续走更慢的电汇，错过时效；要么让稳定币付款绕开 AP 控制，把审计风险吞下去。
targetUser:
  primary: 正在试点稳定币供应商付款的中端进口分销商里的控制负责人和 AP 运营负责人
  secondary: 同一批分销商里的资金平台主管和财务系统负责人
  buyer: CFO 或财务副总裁
startupThesis:
  nonObviousInsight: 贸易场景里的稳定币采用，最后不会由哪条通道最快来决定，而会由哪条工作流能把“已审批发票”稳稳变成“政策放行的钱包付款”来决定，而且这套过程要留下财务能入账、能审计、也能自证的证据。随着银行、托管方、钱包和交易所的机构覆盖越来越全，最稀缺的产品不再是支付入口，而是放款前控制。
  beachhead: 美国和欧洲的电子、工业零部件进口分销商：每月处理 200 笔以上海外供应商付款，已经在紧急结算里使用 OTC 柜台或支持稳定币的支付服务商，但审批还跑在老 ERP 和 AP 工作流里
  wedge: 一层从发票到钱包的放款控制层：把供应商发票和已批准的交易对手、钱包地址对上；在执行前完成筛查；走经办-复核审批；再把可直接入账的证据回写 ERP
  whyNowCatalyst: Range 的融资和产品表述说明，机构稳定币使用已经进入财务团队拥有的工作流，下一道真正的卡点就是执行前审批和统一总账证据。
  ventureScalePath: 先从进口型分销商的供应商付款切入，再扩到货代、采购平台、B2B 市场，最后进入所有同时跨银行、托管、钱包和交易所划款的财务团队。
solution: 做一层与 ERP 相连的控制层，卡在 AP 工作流、支付服务商、钱包或托管账户，以及总账之间。每一笔拟议中的稳定币付款，在资金动之前都先检查发票状态、供应商身份、已批准的钱包地址、制裁与内部政策规则、资金来源，以及职责分离要求。系统会把“谁审批了什么”、链上交易细节、FX 基础、费用和会计分录，整理成一份经得起审计的记录，再把结果同步回 ERP 和关账流程。客户先从只读的对账与放款证据开始，随后再打开执行审批，以及跨银行、托管方和 OTC 合作伙伴的路由能力。
goToMarketSeed:
  firstCustomer: 首个客户应是一家营收 $100M-$500M 的电子或工业零部件进口商：供应商主要在亚洲、每月有 200 笔以上海外发票、经常出现紧急付款例外，而且财务团队已经通过 OTC 柜台或支付平台试跑稳定币结算。
  buyingTrigger: 供应商要求比电汇更快的放款、CFO 批准稳定币付款试点，或内部审计指出钱包付款游离在正常 AP 控制之外。
  currentAlternative: ERP 审批、电子表格、银行电汇、OTC 柜台或支付服务商门户、钱包截图，再加上临时的控制负责人签字，全靠人工拼。
  switchingReason: 稳定币支付服务商能把钱打出去，但这款产品让控制负责人在任何钱包放款离开公司之前，就先把发票级政策、收款方核验和干净的总账证据跑通。
  pricingHypothesis: 按法人实体和接入的支付栈收年度 SaaS 订阅费，再叠加按已审批稳定币供应商付款量计费。
