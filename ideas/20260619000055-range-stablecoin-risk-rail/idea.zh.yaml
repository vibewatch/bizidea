topRisks:
- name: 采用时点
  description: 稳定币供应商付款可能会比预期更久地集中在少数走廊和行业里。
  mitigation: 先抓已经在跑紧急或难以走银行的供应商走廊的客户，并保持多通道能力，让 ROI 不只来自支付量，也来自异常控制和审计提速。
- name: 现有厂商打包
  description: 一旦稳定币量起来，AP 套件、支付服务商或托管方都可能补上基础筛查和对账。
  mitigation: 把跨服务商的发票-钱包绑定、审批图谱和 ERP 证据层做成核心资产——这些东西单一通道厂商更难通用化。
- name: 工作流信任缺口
  description: 只要高金额付款里偶尔出现钱包映射或总账输出错误，控制负责人就会直接否掉这套系统。
  mitigation: 先只读上线，强制人工审批和双人控制，并尽早把确定性的钱包核验与异常处理打磨出来。
