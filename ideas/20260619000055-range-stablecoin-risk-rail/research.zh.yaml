competitors:
- name: Range
  stage: 成长中
  wedge: 面向同时跑稳定币与法币的机构，提供资金、风控与合规层。
  pricing: 定制 / 企业销售。
  strength: 执行前控制和统一资金可视化的叙事很强，也有机构级验证点。
  weaknessVsUs: 覆盖范围更广，更像机构级资金平台；在进口分销商的发票原生 AP 工作流上，锚点没那么清晰。
  sourceRefs:
  - 1
  - 3
- name: BVNK
  stage: 成长中
  wedge: 以稳定币为原生的全球支付基础设施，既支持托管式，也支持自管理交付模式。
  pricing: 定制 / 企业销售。
  strength: 执行、兑换和合规足迹都握在自己手里。
  weaknessVsUs: 这是一个执行优先的平台；它不掌握发票审批图谱，也不掌握跨服务商的审计 case。
  sourceRefs:
  - 34
  - 36
- name: Conduit
  stage: 成长中
  wedge: 面向跨境企业的可编程稳定币与法币收款、付款，以及出入金流程。
  pricing: 按交易量分层。
  strength: 对交易对手、付款方式、报价和换汇流程都做了细致抽象。
  weaknessVsUs: 这是一个执行优先的平台；它不掌握发票审批图谱，也不掌握跨服务商的审计记录。
  sourceRefs:
  - 40
  - 42
  - 44
  - 49
- name: Fireblocks
  stage: 现有厂商
  wedge: 钱包治理、策略引擎，以及企业级稳定币和托管基础设施。
  pricing: $699/月的入门层；再往上走企业定制。
  strength: 治理原语很强，机构覆盖也很广。
  weaknessVsUs: 起点是钱包移动和策略，不是发票匹配与供应商付款证据。
  sourceRefs:
  - 4
  - 70
- name: Bitwave
  stage: 成长中
  wedge: 给财务团队用的加密会计、子总账和审计就绪报告。
  pricing: 定制 / 报价驱动。
  strength: 在执行后对账和报告这件事上，财务团队的适配度很高。
  weaknessVsUs: 它发生在执行之后，拦不住一笔未经批准的钱包放款。
  sourceRefs:
  - 63
  - 64
regulatoryTechnicalConstraints:
- point: 在资金动之前，客户和交易对手接入需要 KYB/KYC 材料、已验证付款方式，有时还要补更重的合规文件。
  sourceRefs:
  - 45
  - 50
- point: 走廊能不能上线，取决于支持哪些资产，以及出入金配置能不能落地，所以覆盖绝不是普适的。
  sourceRefs:
  - 46
  - 49
  - 52
- point: 钱包筛查和可配置的风险暴露阈值，是企业上线的基本门槛。
  sourceRefs:
  - 76
  - 82
  - 87
- point: 稳定币把会计、税务和运营复杂度一起带了进来；财务团队得和支付速度问题一起处理。
  sourceRefs:
  - 16
validationSignals:
- point: Range 的超额认购 Series A 说明，投资人愿意为围绕稳定币使用场景的资金、风控和合规层买单，而不只投通道。
  sourceRefs:
  - 3
- point: Fireblocks 报告称，稳定币已经占平台交易量的近一半，而且多数受访企业都在采取动作。
  sourceRefs:
  - 4
- point: Stripe Treasury 在 101 个国家推出稳定币账户，说明主流 PSP 正在把企业稳定币余额与转账常态化。
  sourceRefs:
  - 9
- point: Conduit 已经把交易对手、付款方式、报价和出金都抽象成模型，说明缺的不是基础通道，而是编排层。
  sourceRefs:
  - 42
  - 44
  - 49
- point: Triple-A 明确把稳定币跨境支付卖给进口商和出口商，这直接验证了贸易支付用例。
  sourceRefs:
  - 100
openQuestions:
- 对中端进口分销商来说，究竟哪些供应商走廊制造了最高比例的下班后稳定币例外付款？
- 在早期稳定币项目里，控制负责人到底有多频繁需要把钱包变更审批，单独从发票审批里拎出来？
- 支付服务商和 ERP 集成商会更愿意联合销售一层控制层，还是自己打包一个浅审批功能？
- 在首次部署基于钱包的供应商付款前，内部审计最低要求哪一套证据包？
