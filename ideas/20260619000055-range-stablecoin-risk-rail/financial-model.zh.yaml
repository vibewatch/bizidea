- variable: 销售周期
  downsideCase: 从付费试点到受治理的正式生产大约要 9 个月
  baseCase: 从付费试点到受治理的正式生产大约要 6 个月
  upsideCase: 伙伴准备充分时，大约 4-5 个月就能转正
  y3RevenueImpactK: -480.0
  cashImpactK: -330.0
- variable: 毛利率
  downsideCase: 稳定态毛利率 67%
  baseCase: 稳定态毛利率 70%
  upsideCase: 稳定态毛利率 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -58.5
- variable: 招聘节奏
  downsideCase: 比计划提前两个季度补实施与运营招聘
  baseCase: 到 Q4Y3 以精简方式爬到 9 FTE
  upsideCase: 把 1 个非关键岗位延后，直到伙伴带来的需求明显可复用
  y3RevenueImpactK: -40.0
  cashImpactK: -170.0
modelDiagram:
  title: 单位经济流
  mermaid: "flowchart LR\n  Leads[Qualified importer accounts] --> PaidPilots[Paid corridor pilots]\n  PaidPilots --> Customers[Production entities]\n  Customers --> Revenue[Subscription plus usage revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> EBITDA[EBITDA]\n  EBITDA --> Cash[Ending cash]\n  Partners[Rail and ERP partners] --> PaidPilots\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入，来自生产实体数从 M12 的 2 个长到 Q4Y3 的 36 个，且每个上线实体的综合年价值约为 $100K。
- checkName: 必须成立的事
  finding: 伙伴与创始人主导销售，必须能在大约 6 个月内把走廊试点转成受治理的正式生产，这样客户增长才跑得赢招聘。
- checkName: 模型失效条件
  finding: 如果服务商把“够用”的控制打包进去，而公司到第 3 年结束时更接近 30 个实体、定价也更低，现金就会迅速逼近下行情景的低点。
- checkName: 下一轮证明点
  finding: 当 Q4Y2 能同时展示 8 个生产实体、1 个由伙伴带来的部署和 1 次第二实体或第二走廊扩张时，下一轮融资才站得住。
sanityChecks:
  ruleOf40: 第 3 年增长 333% + EBITDA 利润率 -20% = 314%。
  burnMultiple: 第 2 年 burn multiple 为 2.8x：约 $1.07M burn / $0.38M 净新增收入；第 3 年随着收入增长跑赢剩余 burn，burn multiple 降到 0.3x。
  revenuePerFte: 按 Q4Y3 的 9 FTE 计算，第 3 年人均收入为 $217K（B2B SaaS 基准大约 $200K-$400K）。
  flags:
  - 模型默认：伙伴辅助部署能把生产实体从 Q4Y2 的 8 个拉到 Q4Y3 的 36 个；如果转介绍起不来，人均收入会很快掉回基准线以下。
  - 综合 ARPU 默认上线实体不只停在入门订阅价，而会继续叠上用量费和模块附加；如果客户长期停在 $60K-$75K ARR，融资需求大概率还得往上提。
  - 模型把毛利率固定在 70% 计划值，但在 ERP 与服务商接入模板真正标准化之前，早期交付很可能更偏重服务。
  - 在 $2.8M 种子轮下，现金仍保持为正；但下行情景也说明，只要有一年转化速度明显放慢，下一轮融资前几乎没有多少犯错空间。
