scenarios:
  downside:
    description: 如果服务商开始打包，试点转正也更慢，生产增长就会低于计划，而实施工作也会更像服务生意。
    y3RevenueK: 1473.75
    y3EbitdaK: -762.58
    cashLowPointK: 35.82
    keyAssumptionChanges:
    - 由于伙伴带来的商机到得更晚，Q4Y3 只做到 30 个生产实体，而不是 36 个。
    - 客户更贴近入门价位，导致单个生产实体的综合年收入降到约 $90K。
    - 因为接入与合规审查更久都还是人工，毛利率卡在约 67%。
  base:
    description: 公司把最早两场试点转成正式生产，在 Q4Y2 做到 8 个生产实体，然后靠伙伴辅助部署继续扩张，同时不让人员规模涨得太快。
    y3RevenueK: 1950.0
    y3EbitdaK: -385.0
    cashLowPointK: 405.16
    keyAssumptionChanges:
    - 完全按照 A1-A23 运行：单实体综合年收入 $100K，毛利率目标 70%。
    - 生产实体从 M12 的 2 个，增长到 Q4Y2 的 8 个，再到 Q4Y3 的 36 个。
    - 因为伙伴辅助部署降低了对大直销团队的需求，到 Q4Y3 人员规模仍控制在 9 FTE。
  upside:
    description: 如果伙伴转介绍和第二走廊扩张把收入提前拉动，而产品也能拿到定价区间高端，结果就会落在上行情景。
    y3RevenueK: 2415.01
    y3EbitdaK: -11.2
    cashLowPointK: 696.46
    keyAssumptionChanges:
    - 由于支付通道与 ERP 伙伴更早开始带单，Q4Y3 将做到 40 个生产实体，而不是 36 个。
    - 用量费和高级路由模块把单个生产实体的综合年收入抬到约 $105K。
    - ERP 与服务商模板减少了人工工作，毛利率改善到约 72%。
