scenarios:
  downside:
    description: Provider bundling and slower pilot conversion keep production growth below plan and leave implementation
      work more services-heavy.
    y3RevenueK: 1473.75
    y3EbitdaK: -762.58
    cashLowPointK: 35.82
    keyAssumptionChanges:
    - Q4Y3 ends at 30 production entities instead of 36 because partner-sourced deals arrive later.
    - Blended annual revenue per production entity falls to about $90K as customers stay closer to entry pricing.
    - Gross margin stalls near 67% because onboarding and compliance review stay manual for longer.
  base:
    description: The company converts two early pilots into production, reaches eight production entities by Q4Y2, and then
      scales through partner-assisted deployments without broadening headcount too quickly.
    y3RevenueK: 1950.0
    y3EbitdaK: -385.0
    cashLowPointK: 405.16
    keyAssumptionChanges:
    - Matches A1-A23 with blended annual revenue per entity of $100K and the 70% gross-margin target.
    - Production entities grow from 2 at M12 to 8 at Q4Y2 and 36 at Q4Y3.
    - Headcount stays lean at 9 FTE by Q4Y3 because partner-assisted deployment reduces the need for a large direct team.
  upside:
    description: Partner referrals and second-corridor expansions pull revenue forward while the product reaches the top end
      of the pricing range.
    y3RevenueK: 2415.01
    y3EbitdaK: -11.2
    cashLowPointK: 696.46
    keyAssumptionChanges:
    - Q4Y3 ends at 40 production entities instead of 36 as rail and ERP partners source deals earlier.
    - Blended annual revenue per production entity rises to about $105K through usage and premium routing modules.
    - Gross margin improves to roughly 72% as ERP and provider templates reduce manual work.
sensitivity:
- variable: ARPU
  downsideCase: $90K blended annual revenue per production entity
  baseCase: $100K blended annual revenue per production entity
  upsideCase: $110K blended annual revenue per production entity
  y3RevenueImpactK: -195.0
  cashImpactK: -136.5
- variable: CAC
  downsideCase: $70K fully loaded CAC because founder and partner effort stays high
  baseCase: $55K fully loaded CAC
  upsideCase: $45K fully loaded CAC with warmer referrals and repeatable templates
  y3RevenueImpactK: 0.0
  cashImpactK: -175.0
- variable: churn
  downsideCase: 2.5% monthly churn after first renewals
  baseCase: 1.8% monthly churn
  upsideCase: 1.2% monthly churn
  y3RevenueImpactK: -160.0
  cashImpactK: -110.0
- variable: sales cycle
  downsideCase: About 9 months from paid pilot to governed production
  baseCase: About 6 months from paid pilot to governed production
  upsideCase: About 4-5 months with strong partner preparation
  y3RevenueImpactK: -480.0
  cashImpactK: -330.0
- variable: gross margin
  downsideCase: 67% steady-state gross margin
  baseCase: 70% steady-state gross margin
  upsideCase: 72% steady-state gross margin
  y3RevenueImpactK: 0.0
  cashImpactK: -58.5
- variable: hiring pace
  downsideCase: Add implementation and ops hires two quarters earlier than planned
  baseCase: Lean ramp to 9 FTE by Q4Y3
  upsideCase: Delay one noncritical hire until partner-sourced demand is clearly repeatable
  y3RevenueImpactK: -40.0
  cashImpactK: -170.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified importer accounts] --> PaidPilots[Paid corridor pilots]
      PaidPilots --> Customers[Production entities]
      Customers --> Revenue[Subscription plus usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[Ending cash]
      Partners[Rail and ERP partners] --> PaidPilots
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing from 2 production entities at M12 to 36 by Q4Y3 at about $100K blended annual
    value per live entity.
- checkName: Must go right
  finding: Partner and founder-led sales must convert corridor pilots into governed production in roughly six months so customer
    growth outruns hiring.
- checkName: Model breaks if
  finding: If providers bundle good-enough controls and the business exits Y3 closer to 30 entities at lower pricing, cash
    compresses toward the downside low point.
- checkName: Next-round proof
  finding: The next financing is justified once Q4Y2 shows 8 production entities, one partner-sourced deployment, and one
    second-entity or second-corridor expansion.
sanityChecks:
  ruleOf40: Y3 growth 333% + EBITDA margin -20% = 314%.
  burnMultiple: Y2 burn multiple 2.8x on about $1.07M burn over $0.38M net new revenue; Y3 burn multiple 0.3x as revenue growth
    outruns remaining burn.
  revenuePerFte: $217K Y3 using Q4Y3 headcount of 9 FTE (benchmark roughly $200-400K B2B SaaS).
  flags:
  - The model depends on partner-assisted deployment scaling from 8 production entities at Q4Y2 to 36 at Q4Y3; if referrals
    lag, revenue per FTE falls back below benchmark quickly.
  - Blended ARPU assumes live entities reach more than entry subscription pricing through usage and module attach; if customers
    remain near $60K-$75K ARR, the funding ask likely needs to rise.
  - Gross margin is held at the 70% plan target even though early ERP and provider onboarding may remain more services-heavy
    until templates standardize.
  - Cash stays positive on a $2.8M seed, but the downside case shows that one bad year of slower conversion would leave very
    little room before the next raise.
