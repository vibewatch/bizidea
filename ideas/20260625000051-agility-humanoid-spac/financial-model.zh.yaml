slug: humanoid-standard-work-os
date: '2026-06-25'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date]; model starts the month after the plan date'
- id: A2
  name: 期初现金
  value: '100'
  unit: USD K
  source: 创始人出资公司进入种子融资阶段的初创财务惯例
- id: A3
  name: 种子轮在第 1 月完成
  value: '3200'
  unit: USD K
  source: '[BP fundingAsk] 种子轮目标 $3–5M；以低端建模，仍可覆盖里程碑加 6 个月缓冲'
- id: A4
  name: 成熟生产账户年度订阅费
  value: '300'
  unit: USD K ARR/account
  source: '[BP market.som] 第 3 年 15 个账户，每账户混合 ARR 约 $300K'
- id: A5
  name: 一次性认定/入驻费
  value: '50'
  unit: USD K/new customer
  source: '[BP investorMemo.initialContract] 首次项目 $75K–$150K；建模为 $50K 非经常性费用加经常性平台收入'
- id: A6
  name: 基准情景客户里程碑
  value: 3 / 8 / 15
  unit: Y1 end / Y2 end / Y3 end customers
  source: '[BP milestones] 第 1 年 1 个以上生产客户，第 2 年 6–8 个，第 3 年 15 个'
- id: A7
  name: 月度成交时间节点
  value: M5, M8, M11, M14, M17, M20, M23x2, M25, M28, M31x2, M34, M36x2
  unit: close schedule
  source: '[BP sequencingRationale + gtm.channels]; 平滑爬坡，在合作伙伴转介和 AE 招聘规模化之前保持创始人主导'
- id: A8
  name: 收入确认公式
  value: Recurring revenue = average active customers in month × $25K MRR; new customers add a $50K packet fee in close month
  unit: formula
  source: '[BP businessModel + investorMemo.initialContract]; blended SaaS + fixed-fee implementation model'
- id: A9
  name: 第 1 年毛利率爬坡
  value: 60% to 69%
  unit: gross margin %
  source: '[BP businessModel.targetGrossMarginPct] 目标 70%，第 1 年因早期入驻和安全文档开销打折'
- id: A10
  name: 第 2 年毛利率爬坡
  value: 70% to 74%
  unit: gross margin %
  source: '[BP milestones + operatingAssumptions] 随着入驻时间下降，产品化减少服务占比'
- id: A11
  name: 第 3 年毛利率爬坡
  value: 75% to 78%
  unit: gross margin %
  source: '[BP businessModel.targetGrossMarginPct] 可复用连接器和决策包库占主导后，成熟混合超过 70% 目标'
- id: A12
  name: 创始人全包现金薪酬
  value: '144'
  unit: USD K/year
  source: 种子阶段创始人薪资加薪酬税/福利的初创财务惯例
- id: A13
  name: 工程师全包现金薪酬
  value: '225'
  unit: USD K/year/FTE
  source: 美国机器人软件领域资深 B2B 数据/平台工程师的初创财务惯例
- id: A14
  name: 产品与安全负责人全包现金薪酬
  value: '212.4'
  unit: USD K/year/FTE
  source: 具备安全领域专长的应用机器人产品负责人的初创财务惯例
- id: A15
  name: 解决方案/客户成功全包现金薪酬
  value: '187.2'
  unit: USD K/year/FTE
  source: 企业解决方案工程师/客户成功混合岗的初创财务惯例
- id: A16
  name: 销售全包现金薪酬
  value: '200.4'
  unit: USD K/year/FTE
  source: 含种子阶段佣金的企业 AE 现金成本的初创财务惯例
- id: A17
  name: 招聘节奏
  value: Founder and first engineer at M1; product lead M4; solutions M7; AE M10; second engineer M11; engineer M15; solutions M18; AE M19; product M27; engineer M30; solutions M32
  unit: timing
  source: '[BP team + sequencingRationale] 招聘沿产品、交付、销售验证路径推进'
- id: A18
  name: 销售与市场非薪酬支出
  value: $15K base + $2K per active customer + step-ups of $10K at M10 and $8K at M19
  unit: USD K/month
  source: 创始人主导企业销售、合作伙伴差旅和轻量内容/项目支出的初创财务惯例
- id: A19
  name: 研发非薪酬支出
  value: $10K base + $1.2K per active customer
  unit: USD K/month
  source: 云服务、数据工具、测试环境和安全/合规软件的初创财务惯例
- id: A20
  name: 行政管理非薪酬支出
  value: $14K base + $3K step-up at M7 + $4K step-up at M19
  unit: USD K/month
  source: 随团队和合同规模扩张的法务、会计、保险和行政的初创财务惯例
- id: A21
  name: 稳态 CAC
  value: '120'
  unit: USD K/customer
  source: '[BP gtm.channels + funnelTargets] 加合作伙伴辅助来源的创始人主导企业销售的初创财务惯例'
- id: A22
  name: 稳态月度流失率
  value: '2.0'
  unit: '%'
  source: 反映早期品类预算风险的初创财务惯例，尽管扩张潜力较强
- id: A23
  name: 现金滚动简化
  value: Cash EOP = prior cash + EBITDA, with the seed raise added in M1 and no material debt/capex modeled
  unit: formula
  source: 早期软件公司的标准初创财务建模惯例
