scenarios:
  downside:
    description: 更长的委员会决策周期和较弱的 OEM 转介，使公司第 3 年仅达到 12 个账户，模块附加销售较轻，毛利率改善较慢。
    y3RevenueK: 2950.0
    y3EbitdaK: -1325.0
    cashLowPointK: -280.0
    keyAssumptionChanges:
    - 混合 ARR/账户降至 $275K
    - 第 4 年第 4 季度仅达到 12 个生产账户
    - 成熟毛利率上限约为 72%
    - 销售周期从 4 个月延长至 6 个月
  base:
    description: 基于里程碑的招聘加合作伙伴辅助创始人销售，将第 1 年 3 个付费账户转化为 15 个生产账户，第 4 年第 4 季度实现 $4.5M 退出 ARR。
    y3RevenueK: 3612.5
    y3EbitdaK: -620.4
    cashLowPointK: 495.8
    keyAssumptionChanges:
    - 第 4 年第 4 季度达到 15 个生产账户
    - 每账户成熟 ARR $300K 加 $50K 入驻费
    - 模型中毛利率从 60% 提升至 78%
    - 招聘在第 2 年全程保持里程碑门控
  upside:
    description: 更快的合作伙伴转介和更强的基准模块附加销售，在第 3 年产生 18 个账户，并形成温和的运营杠杆。
    y3RevenueK: 4630.0
    y3EbitdaK: 140.0
    cashLowPointK: 700.0
    keyAssumptionChanges:
    - 第 4 年第 4 季度达到 18 个生产账户
    - 混合 ARR/账户因基准和治理模块附加销售升至 $320K
    - 通过 OEM 和集成商来源，销售周期压缩至 3 个月
    - 因入驻保持产品化，毛利率更早达到 78%
