modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  QualifiedPipeline[Qualified pilots and partner referrals] --> Customers[Paying rollout programs]\n  Customers --> Revenue[Subscription revenue + packet fees]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> EBITDA[EBITDA after payroll and operating spend]\n  EBITDA --> Cash[Ending cash]"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景第 3 年收入来自 15 个付费推广项目，每个项目成熟 ARR $300K 加每个新客户 $50K 认定费。
- checkName: 必须做对的事
  finding: 公司必须将共创客户工作转化为可重复的入驻流程，以便毛利率能从 60% 末段升至 70% 中段，同时合作伙伴渠道将 CAC 维持在约 $120K。
- checkName: 模型崩溃条件
  finding: 如果销售周期漂移到 6 个月或毛利率停滞在 72% 附近，第 3 年末现金底线将在 A 轮证明就绪之前跌破零。
- checkName: 下轮融资故事
  finding: 下一次融资叙事是第 4 年第 4 季度前达到 8 个生产账户、2 次多站点扩张和低于 21 天的入驻时间——这正是种子融资额以 6 个月缓冲规模化之后的目标。
sanityChecks:
  ruleOf40: 第 3 年增长率 102.1% + EBITDA 利润率 -17.2% = 84.9%
  burnMultiple: 第 2 年在 $1.5M 净新 ARR 上烧钱倍数 0.8x；第 3 年在 $2.1M 净新 ARR 上改善至 0.3x
  revenuePerFte: 第 3 年使用平均 10.8 FTE，人均收入 $333K（垂直 SaaS 基准 $200–400K）
  flags:
  - 第 1 年假设在市场仍然偏窄的情况下签下三个付费客户，彼时团队还未完全验证每个运营商细分市场中谁拥有推广预算。
  - 基准情景在明确的月度客户时间表中假设零客户流失，而稳态单位经济模型假设月度流失率 2.0%；实际流失将提前下一轮融资。
  - 现金在第 3 年末触底约 $496K，因此成交或毛利率改善若滞后 1–2 个季度，将需要放慢招聘或寻求过桥融资。
  - 毛利率扩张有赖于将实施保持产品化；若连接器或安全工作变得定制化，75% 成熟毛利率假设将不成立。
