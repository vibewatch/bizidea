scenarios:
  downside:
    description: Longer committee cycles and weaker OEM referrals leave the company at 12 accounts by Y3 with lighter module attach and slower margin improvement.
    y3RevenueK: 2950.0
    y3EbitdaK: -1325.0
    cashLowPointK: -280.0
    keyAssumptionChanges:
    - Blended ARR/account falls to $275K
    - Only 12 production accounts by Q4Y3
    - Mature gross margin tops out near 72%
    - Sales cycle stretches from 4 months to 6 months
  base:
    description: Milestone-based hiring plus partner-assisted founder sales converts 3 Y1 paid accounts into 15 production accounts and $4.5M exit ARR by Q4Y3.
    y3RevenueK: 3612.5
    y3EbitdaK: -620.4
    cashLowPointK: 495.8
    keyAssumptionChanges:
    - 15 production accounts by Q4Y3
    - $300K mature ARR per account plus $50K onboarding fee
    - Gross margin rises from 60% to 78% across the model
    - Hiring stays milestone-gated through Y2
  upside:
    description: Faster partner referrals and stronger benchmark-module attach produce 18 accounts by Y3 with modest operating leverage.
    y3RevenueK: 4630.0
    y3EbitdaK: 140.0
    cashLowPointK: 700.0
    keyAssumptionChanges:
    - 18 production accounts by Q4Y3
    - Blended ARR/account rises to $320K from benchmark and governance module attach
    - Sales cycle compresses to 3 months through OEM and integrator sourcing
    - Gross margin reaches 78% earlier because onboarding stays productized
