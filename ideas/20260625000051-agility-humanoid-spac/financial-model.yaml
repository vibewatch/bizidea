  name: Sales fully loaded cash compensation
  value: '200.4'
  unit: USD K/year/FTE
  source: Startup-finance heuristic for enterprise AE cash cost including commissions at seed stage
- id: A17
  name: Hiring schedule
  value: Founder and first engineer at M1; product lead M4; solutions M7; AE M10; second engineer M11; engineer M15; solutions M18; AE M19; product M27; engineer M30; solutions M32
  unit: timing
  source: '[BP team + sequencingRationale] hiring follows product, delivery, then sales proof'
- id: A18
  name: Sales and marketing non-payroll spend
  value: $15K base + $2K per active customer + step-ups of $10K at M10 and $8K at M19
  unit: USD K/month
  source: Startup-finance heuristic for founder-led enterprise selling, partner travel, and light content/program spend
- id: A19
  name: R&D non-payroll spend
  value: $10K base + $1.2K per active customer
  unit: USD K/month
  source: Startup-finance heuristic for cloud, data tooling, test environments, and security/compliance software
- id: A20
  name: G&A non-payroll spend
  value: $14K base + $3K step-up at M7 + $4K step-up at M19
  unit: USD K/month
  source: Startup-finance heuristic for legal, accounting, insurance, and admin as the team and contracts scale
- id: A21
  name: Steady-state CAC
  value: '120'
  unit: USD K/customer
  source: '[BP gtm.channels + funnelTargets] plus startup-finance heuristic for founder-led enterprise sales with partner-assisted sourcing'
- id: A22
  name: Steady-state monthly churn
  value: '2.0'
  unit: '%'
  source: Startup-finance heuristic reflecting early-category budget risk despite strong expansion potential
- id: A23
  name: Cash roll-forward simplification
  value: Cash EOP = prior cash + EBITDA, with the seed raise added in M1 and no material debt/capex modeled
  unit: formula
  source: Standard startup-finance modeling heuristic for early software companies
