modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      QualifiedPipeline[Qualified pilots and partner referrals] --> Customers[Paying rollout programs]
      Customers --> Revenue[Subscription revenue + packet fees]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA after payroll and operating spend]
      EBITDA --> Cash[Ending cash]
modelSanity:
- checkName: Revenue engine
  finding: Base-case Y3 revenue comes from 15 paying rollout programs at $300K mature ARR plus a $50K qualification fee on each new logo.
- checkName: Must go right
  finding: The company must turn design-partner work into repeatable onboarding so gross margin can move from the high-60s to the mid-70s while partner channels keep CAC near $120K.
- checkName: Model breaks if
  finding: If sales cycles drift to 6 months or margin stalls near 72%, the late-Y3 cash floor drops below zero before Series A proof is ready.
- checkName: Next-round proof
  finding: The next financing story is 8 production accounts, 2 multi-site expansions, and sub-21-day onboarding by Q4Y2, which is exactly what the seed ask is sized to reach with 6 months of buffer.
sanityChecks:
  ruleOf40: Y3 growth 102.1% + EBITDA margin -17.2% = 84.9%
  burnMultiple: Y2 burn multiple 0.8x on $1.5M net new ARR; improves to 0.3x in Y3 on $2.1M net new ARR
  revenuePerFte: $333K Y3 using average 10.8 FTE (benchmark $200–400K vertical SaaS)
  flags:
  - Y1 assumes three paid logos in a still-narrow market before the team has fully validated who owns the rollout budget in every operator segment.
  - The base case carries zero logo churn through the explicit monthly customer schedule even though steady-state unit economics assume 2.0% monthly churn; real churn would pull forward the next raise.
  - Cash bottoms near $496K in late Y3, so a 1-2 quarter slip in closes or margin improvement would require slower hiring or bridge financing.
  - Gross-margin expansion depends on keeping implementation productized; if connector or safety work becomes bespoke, the 75% mature GM assumption will not hold.
