jobsToBeDone:
- job: 当一个人形机器人试点在真实仓库中展现出潜力时，帮助网络工业工程负责人选出下一个要复制的任务和站点，让他们在扩大自动化规模的同时，不必把每次推广都变成高风险的定制项目。
  currentAlternative: 通过供应商仪表盘、电子表格和 EHS 现场巡查进行人工试点评审
  successMetric: 从试点评审到第二站点启动的时间，以及启动后 60 天内达到目标干预率和吞吐量阈值的工作流比例
