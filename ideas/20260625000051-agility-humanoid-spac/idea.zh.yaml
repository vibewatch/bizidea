problem: 多站点仓库运营商现在可以购买人形机器人产能，但仍不清楚哪些工作流足够安全、经济上足够可复制，能从一个试点站点复制到下一个。OEM 仪表盘展示的是机器人运行时间和任务数量，而真正的扩张决策取决于干预率、标准作业变更、人机交接边缘案例和站点级 EHS 审批。随着具名运营商从试点小时数转向已订购的机队，瓶颈从机器人可用性转向了工作流认定。
targetUser:
  primary: 北美零售、电商和制造业仓库运营商中的网络工业工程负责人——这些运营商正在运行初步的人形机器人试点，用于箱体搬运、托盘移动或逆向物流工作流。
  secondary: 必须在第二个设施上线前审批 SOP 变更的站点 EHS 管理人员和持续改善负责人。
  buyer: 多站点仓库运营商的配送工程副总裁、自动化负责人或网络运营高管。
startupThesis:
  nonObviousInsight: 一旦人形机器人 OEM 拥有真实订单、量产产能和自己的机队云，稀缺的控制点不再是机器人编排，而是运营商侧的系统——由它决定哪些微工作流值得推广、人工保护措施需要如何调整，以及第二或第五个站点是否真正准备就绪。
  beachhead: 北美零售、电商和制造业仓库网络，拥有 3–20 个配送中心、一个正在运行的人形机器人试点，且内部工业工程团队正在决定是否将卸货、托盘转移或逆向物流搬运复制到其他站点。
  wedge: 一套标准作业认定操作系统，整合 WMS 或 WES 任务数据、机器人干预日志和 EHS 现场观测，对候选工作流进行排名，生成站点级 SOP，并为每个候选设施出具通过/不通过决策包。
  whyNowCatalyst: Agility 的 SPAC 融资、超过 $300M 的订单基础以及计划中的大规模部署，意味着运营商现在就必须选出可推广的工作流——尽管安全仍是首要阻碍。
  ventureScalePath: 从仓库人形机器人复制场景起步，逐步扩展为工厂、医院、机场及保险商核保工作流中实体 AI 部署的中立任务认定层。
solution: 产品位于 OEM 机队软件之上、仓库运营商推广委员会之下。它从 WMS 或 WES 系统提取任务历史，从人形机器人供应商获取干预与故障日志，从现场团队收集安全观测数据。随后按可重复性、异常负担、所需人员配置变更和站点级危险因素对每个候选工作流打分，生成更新后的 SOP 和扩张决策包。客户用它决定下一个站点、班次和任务应先启动哪个，而不是把每次新部署都当成定制咨询项目。随着时间推移，公司将积累最佳的跨站点基准——记录人形机器人部署在哪里卡住、哪些缓解措施有效、哪些工作流最终形成稳定的单位经济模型。
goToMarketSeed:
  firstCustomer: 收入超过 $1B 的零售商或制造商，拥有 5–10 个北美配送中心，在箱体搬运工作流中已完成一次付费的 Digit 式试点，且本财年有任务选定两个后续站点。
  buyingTrigger: 季度试点评审——运营商必须审批第二站点推广、为更多资本支出提供依据，或在早期操作员干预之后应对 EHS 异议。
  currentAlternative: 供应商工作坊、电子表格时间动作研究、WMS 数据导出、人工 EHS 现场巡查、内部工业工程评审，以及推迟推广的现状。
  switchingReason: 这个切口能精确告诉运营商哪些任务和站点已准备好推广，并在一个决策包中量化干预、安全和劳动力假设，而不是要求买家信任供应商的乐观预测或内部的临时讨论。
  pricingHypothesis: 按每个活跃人形机器人项目收取年度订阅费，外加按站点收取认定费，定价参照避免试点延误、劣质站点启动和外部集成咨询支出所能节省的成本。
