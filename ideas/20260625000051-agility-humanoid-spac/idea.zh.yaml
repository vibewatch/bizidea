topRisks:
- name: 早期市场规模有限
  description: 目前拥有实际运行人形机器人试点的仓库运营商数量有限，可能拖慢初期客户积累速度。
  mitigation: 优先锁定已将第二站点扩张列入预算的共创客户，并在人形机器人渗透率提升的过程中支持邻近的移动操控工作流。
- name: OEM 数据依赖
  description: 最佳认定模型需要机器人干预和故障数据，而部分供应商可能不愿意开放这些数据。
  mitigation: 从运营商自有的 WMS、工单、视频和 SOP 系统起步，再借助买家需求推动更深层遥测适配器的标准化。
- name: 咨询蔓延风险
  description: 如果每个站点看起来都独一无二，客户可能倾向于购买定制推广分析，而非买软件。
  mitigation: 围绕固定的任务本体、基准库和自动生成的审批决策包进行产品化，把专业服务控制在轻量且可复制的范围内。
