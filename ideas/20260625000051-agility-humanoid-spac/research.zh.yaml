competitors:
- name: Agility Arc
  stage: 在位企业
  wedge: 面向 Digit 项目的 OEM 原生部署和机队管理。
  pricing: 定制企业定价；未公开报价。
  strength: 掌握 Digit KPI、集成 API 和部署全生命周期工具。
  weaknessVsUs: 优化的是单一 OEM 机队的运行，而非买家跨供应商、跨工作流的中立推广决策与治理。
  sourceRefs:
  - 10
- name: InOrbit
  stage: 成长期公司
  wedge: 异构机器人机队的多车编排与仓库互操作性。
  pricing: 定制企业定价；未公开报价。
  strength: 互操作性、调度和统一运营控制方面能力突出。
  weaknessVsUs: 止步于为下一个设施生成委员会级安全/经济性决策包。
  sourceRefs:
  - 41
  - 42
- name: Formant
  stage: 成长期公司
  wedge: AI 驱动的实体运营事故管理与机构知识沉淀。
  pricing: 定制企业定价；未公开报价。
  strength: 在告警减少、诊断和运营记忆方面定位鲜明。
  weaknessVsUs: 是更宽泛的实体运营平台，而非专为人形机器人项目构建的工作流复制产品。
  sourceRefs:
  - 43
- name: Manhattan Active WMS/WES
  stage: 在位企业
  wedge: 跨人工、机器人和自动化的统一仓库执行与编排。
  pricing: 定制企业定价；未公开报价。
  strength: 深度的工作流上下文和企业级仓库核心渗透。
  weaknessVsUs: 设计目标是优化单一厂房的日常执行，而非基准测试某个人形机器人工作流是否值得跨站点复制。
  sourceRefs:
  - 47
- name: Blue Yonder Robotics Hub / WES
  stage: 在位企业
  wedge: 集中式机器人可视性，加上任务重排序和仓库执行编排。
  pricing: 定制企业定价；未公开报价。
  strength: 强大的多供应商仪表盘和仓库执行内的运营重排序能力。
  weaknessVsUs: 侧重吞吐量和中断响应，而非中立的推广认定、SOP 变化量和 EHS 治理。
  sourceRefs:
  - 49
  - 51
  - 52
regulatoryTechnicalConstraints:
- point: 目前没有专门针对人形机器人的 OSHA 规则；部署适用现有机器人安全 OSHA 规定和共识标准。
  sourceRefs:
  - 70
  - 71
- point: 腿式和动态稳定机器人仍处于新兴标准空白地带，需要针对每次部署制定专项安全案例。
  sourceRefs:
  - 73
- point: 当前的商业应用仍最适合在规定工作区或有界物料搬运任务内，而非无约束的自由行走。
  sourceRefs:
  - 58
- point: 随着具身 AI 在工业场景的部署，可信 AI 和安全架构的期望值正在持续提升。
  sourceRefs:
  - 72
  - 75
- point: 进入欧洲市场将增加 AI 法案文档、监督和运营商义务要求。
  sourceRefs:
  - 74
validationSignals:
- point: Agility 已报告超过 $300M 的 Digit v5 多年期订单和 30 家以上客户的管道。
  sourceRefs:
  - 1
  - 54
- point: GXO 从试点升级为多年商业 RaaS 协议，表明仓库买家愿意签署正式的部署合同。
  sourceRefs:
  - 9
- point: Digit 在 GXO 的实际设施中已移动超过 100,000 个托盘，提供了真实吞吐量证据，而非展示地板上的演示。
  sourceRefs:
  - 11
- point: Figure 在 BMW 的部署公布了明确的班次时长、运行时间和干预 KPI，说明整个品类正在产生真实运营数据。
  sourceRefs:
  - 17
- point: Apptronik 接近 $1B 的资本基础和具名合作伙伴关系，预示着拥挤的商业化竞赛将为运营商带来更多对中立推广工具的需求。
  sourceRefs:
  - 27
openQuestions:
- 买家会主动分享 OEM 干预日志，还是要求产品仅从运营商自有数据推断就绪度？
- EHS 负责人会把自动生成的推广决策包视为充分证据，还是仍坚持为每个设施委托定制的现场咨询？
- 哪个首选工作流——托盘转移、箱体搬运还是逆向物流——从试点成功到多站点可重复性的路径最清晰？
- OEM 机队云和 WMS/WES 现有厂商会多快将足够的认定逻辑纳入自身，从而压缩独立软件切口的空间？
