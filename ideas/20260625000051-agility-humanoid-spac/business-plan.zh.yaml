slug: humanoid-standard-work-os
date: '2026-06-25'
executiveSummary: 人形机器人仓库部署已具备商业实质，部分运营商必须决定哪些试点工作流值得第二站点推广——但决策过程仍分散在 OEM 仪表盘、WMS 数据导出、人工干预日志和 EHS 现场巡查之间。这家公司售卖运营商侧的标准作业认定操作系统，把碎片化的证据转化为针对下一个工作流、班次和设施的通过/不通过决策包。滩头市场是拥有 3–20 个站点、一个正在运行的人形机器人试点、且本财年有扩张或止步任务的北美零售、电商和制造业仓库网络。第一笔销售不是通用机器人软件，而是季度试点评审中网络工程和 EHS 团队用来为更多资本支出提供依据的付费决策系统。切口之所以有吸引力，在于 OEM 机队云和 WMS/WES 套件负责运营，但两者都不具备跨站点生成中立的、可审计的复制建议的能力。方案有意从运营商自有数据起步，让公司在谈判更深层 OEM 遥测访问权限之前先证明价值。最大风险是已安装基数仍偏小、OEM 功能捆绑，以及买家可能仍把每次推广视为定制咨询。调研未发现买家直接引语、该品类已发布的部署定价基准或标准事故分类体系，因此定价和买家流程假设需要尽早验证。
problem:
- 多站点仓库运营商目前还无法证明哪个人形机器人工作流足够安全、经济且可重现，能从一个试点站点复制到下一个。
- 扩张决策所需的证据分散在 WMS/WES 任务历史、OEM 干预日志、SOP 变更和 EHS 观测之间，导致每次推广都变成一次临时评审。
solution:
- 提取运营商工作流数据、干预日志和安全观测，按可重复性、异常负担、人员配置影响和站点级危险因素对候选人形机器人任务进行评分。
- 生成委员会级推广决策包，包含推荐的下一站点、所需 SOP 变更、明确的假设条件，以及供 EHS 和网络工程审批的通过/不通过决策。
whyWeWin:
- 产品保持中立、与运营商利益一致，而 OEM 工具优化的是单一机器人机队，仓库套件优化的是日常执行。
- 从运营商自有数据起步，减少对单一供应商的依赖，让公司在需要更深层遥测集成之前先证明价值。
- 每个通过认定的工作流都会为干预模式、SOP 变化量和达到稳定吞吐量所需时间积累专有基准——这是服务公司难以复制的资产。
strategicChoices:
  beachhead: 拥有 3–20 个设施、在托盘移动、箱体搬运或逆向物流中运行一个人形机器人试点、本财年有第二站点推广活跃决策的北美仓库网络。
  wedgeRationale: 这个切入点足够窄，买家、触发时机、工作流数据和审批决策包在一个动作中全部可见；更宽泛的机队编排或通用仓库分析会面临更强的现有厂商竞争和更慢的价值验证周期。
  sequencingRationale: 公司先为一个推广委员会交付评分和决策包产品，仅在共创客户证明决策包能加速审批之后，再添加基准仪表盘和 OEM 适配器；招聘沿该路径推进，产品和解决方案产能优先于重型销售团队，合作关系从 OEM 转介和集成商起步，而非宽泛的市场渠道。
  notYet:
  - 完整的机器人编排或远程操控
  - 通用仓库控制塔分析
  - 在北美验证结果和明确 AI 合规包装之前进行欧洲扩张
  - 在仓库基准密度形成之前进入医院、机场或消费者人形机器人工作流
market:
  tam: $450M——估算自约 1,500 家北美多站点运营商，这些运营商在下一波浪潮中可能支持人形机器人项目，年度认定软件预算参照约为 $300K。
  sam: $62.5M——限定约 250 家近期运营商，具备 3–20 个配送中心、一个已上线或即将启动的试点，以及活跃的后续站点决策。
  som: 第 3 年通过切入推广委员会瓶颈（而非整个自动化技术栈），以约 $300K 混合 ARR 触达 15 个生产账户，可实现约 $4.5M。
  segments:
  - 运行初步人形机器人试点的多站点零售、电商和制造业仓库运营商
  - 已在管理多变的劳动力受限物料搬运工作流的 3PL 和工厂网络运营商
  buyingProcess: 网络工业工程或持续改善团队负责组建决策包，但审批通常还需要站点 EHS 签字和副总裁级别的自动化或运营担保人。当运营商必须顶住延迟压力为第二站点推广辩护时，季度试点评审或资本支出检查点是最容易拿下预算的时机。
product:
  mvp: MVP 提取一个人形机器人试点工作流的 WMS/WES 数据导出、人工干预日志、SOP 文件和 EHS 记录，对就绪度进行评分，并为下一站点生成有版本记录的通过/不通过决策包。初始支持三种工作流类型：托盘移动、箱体转移和逆向物流搬运。
  sixMonth: 添加基准仪表盘、决策包审批工作流，以及首个 OEM 遥测来源的只读适配器，加上一种主要仓库系统数据导出格式。
  twelveMonth: 支持多站点对比、可复用的危险与缓解措施库，以及将入驻时间压缩到足以让多个账户部署标准化的生产级连接器。
  twentyFourMonth: 从以单一 OEM 为中心的滩头市场扩展至多供应商仓库项目和邻近的制造业物料流应用场景，同时保留相同的认定工作流。
  keyBets:
  - 运营商自有数据足以在深层 OEM 遥测到位之前生成可信的第一个决策包。
  - 第二站点审批用时和启动后干预稳定性可以量化到足以在一个采购周期内展示 ROI。
  - 固定的任务本体能让服务比例保持轻量，尽管每个站点都存在本地流程漂移。
  - 买家会更看重中立的跨站点基准，而非又一个单一供应商仪表盘。
gtm:
  wedge: 为一个正在运行的人形机器人试点销售第二站点认定决策包——运营商必须决定托盘移动、箱体搬运还是逆向物流应优先扩张。
  channels:
  - 直接由创始人主导销售，打入网络自动化和配送工程团队
  - 以 OEM 客户成功和部署转介为时机，踩准试点扩张评审节点
  - 集成商、WMS/WES 和安全咨询合作伙伴——他们已参与调试和变更管控
  funnelTargets: 共创客户介绍→合格试点转化率 25–35%；合格试点→付费生产转化率 50%+；生产账户→12 个月内第二个合格站点 60%+
  pricing: 按每个活跃人形机器人推广项目收取年度订阅费，外加固定的按站点认定与入驻费，定价参照避免推广延误、减少定制咨询和一次劣质第二站点启动的成本。
businessModel:
  revenueStreams:
  - 按每个活跃人形机器人推广项目收取年度平台订阅费
  - 固定范围的按站点认定与入驻费
  - 面向多站点运营商的高级基准和审计库模块
  unitOfValue: 一个活跃推广项目，加上平台上每个额外认定的站点或工作流决策包。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一仓库网络内增加更多站点
  - 每个 OEM 部署增加更多认定工作流
  - 随着运营商试用多个人形机器人平台，添加跨供应商支持
  - 向企业自动化负责人出售基准和治理模块
strategyMap:
  northStarMetric: 从平台认定工作流启动的额外生产站点，且在 60 天内达到目标吞吐量和干预阈值的数量。
  inputMetrics:
  - 从试点评审启动到推广决策包获批的天数
  - 无需定制外部咨询即获批的决策包比例
  - 合格试点到生产的转化率
  - 首个可用决策包的中位实施时间
  - 启动站点中在 60 天内达到干预和吞吐量目标的比例
  moatsToBuild:
  - 按工作流、危险模式和干预特征分类的跨站点基准数据集
  - 按仓库任务类型映射的可复用安全与 SOP 决策包库
  - 凭借成为跨 OEM、WMS/WES 系统和 EHS 利益相关方的中立证据层而赢得的运营商信任
  killCriteria:
  - 首批 10 个共创客户部署中不足 3 个能在 30 天内从运营商自有数据生成可信决策包。
  - 前 12 个月后付费试点到生产转化率仍低于 30%。
  - OEM 或仓库套件供应商在初创公司建立基准差异化之前，把等效的跨站点认定捆绑进现有预算。
  mermaid: "flowchart LR\n  Wedge[Second-site qualification wedge] --> MVP[Workflow scoring and rollout packet]\n  MVP --> Proof[Faster approvals and more stable launches]\n  Proof --> Expansion[More sites, workflows, and OEMs per account]\n"
investorMemo:
  verdict:
    call: 进一步接触/深入调查
    conviction: 切口早期有力、买家紧迫性真实，但信心仍取决于证明运营商自有数据和软件级部署经济性。
    whyBelieve: 具名商业人形机器人部署、活跃的第二站点决策和碎片化的审批工作流，构成了 OEM 和仓库工具无法干净解决的特定问题。
    whyDoubt: 近期客户基础仍偏小，如果决策包生成过于定制化，产品可能坍缩为 OEM 服务或集成商项目。
    nextDiligence: 与 8–10 个推广委员会确认：软件生成的决策包是否能实质性缩短第二站点审批时间，并在现有自动化项目预算内赢得六位数预算。
  firstCustomer:
    title: 拥有 5–10 个站点的仓库运营商中由 VP 主导的网络工程团队，且已有一个 Digit 式实际试点
    profile: 收入超过 $1B 的零售商、电商运营商、制造商或 3PL，拥有内部工业工程员工、一次付费人形机器人试点，以及本财年正在评审的两个候选后续设施。
    trigger: 团队必须在干预数据缺口或 EHS 异议下为第二站点推广提供依据的试点评审或资本支出检查点。
    buyer: 配送工程副总裁、自动化负责人或网络运营高管
    initialContract: 针对一个工作流和两个候选站点的 $75K–$150K 付费认定项目，第一次生产推广获批后转化为约 $200K–$350K 的年度平台 ARR 加按站点费用。
  mustBeTrue:
  - 至少一名具名运营商利益相关方将第二站点认定视为有预算的问题，而非 OEM 服务事项。
  - 第一个决策包主要能从运营商自有数据构建，无需等待专有 OEM 遥测。
  - EHS 和工业工程利益相关方将对可复用的决策包格式足够信任，从而减少定制分析时间。
  - 生产客户将在 12 个月内从一个工作流或站点扩展到至少一个以上。
  - 随着人形机器人市场成熟，中立基准数据将比单一供应商仪表盘更具价值。
  diligenceQuestions:
  - 谁今天真正拥有第二站点推广的最终通过/不通过决策权，软件预算在哪里？
  - 生成买家信任的决策包所真正需要的最少数据字段是什么？
  - OEM 或集成商在多大程度上已将这类分析作为部署经济性的一部分提供？
  - 哪个首选工作流从实际试点到可重复多站点证明的路径最短？
  - 什么证据能让 EHS 负责人在不委托定制第三方研究的情况下审批新站点？
operatingAssumptions:
- assumption: 运营商自有的 WMS 事件、SOP 文件和人工干预日志足以创建第一个有价值的决策包。
  basis: research.yaml
  validationTest: 在不使用原始 OEM 遥测的情况下完成一个共创客户决策包，并衡量买家是否仍在实际推广评审中使用它。
  decisionImpact: 若为假，公司必须更早优先建立 OEM 合作关系，并接受更慢的销售周期和更高的集成风险。
- assumption: 经济买家在网络自动化或配送工程领导层，而非采购或站点运营。
  basis: idea.yaml
  validationTest: 在零售、3PL 和制造业账户的 8–10 个推广委员会中梳理预算归属和签字权。
  decisionImpact: 若为假，需调整信息传递、渠道合作伙伴和定价依据，转向以采购为主导的 ROI 或站点级运营预算。
- assumption: 如果产品能减少延误并避免一次糟糕的推广决策，买家愿意支持六位数的年度软件支出。
  basis: research.yaml
  validationTest: 第一年内至少签下两笔超过 $75K 的付费项目和一笔超过 $200K ARR 的生产订阅。
  decisionImpact: 若为假，公司必须进一步缩小范围、降低入驻成本，或通过合作伙伴捆绑而非直销方式销售。
- assumption: 固定的工作流本体能让部署保持产品化，而非把每个账户都变成咨询项目。
  basis: idea.yaml
  validationTest: 将第一个决策包的中位实施时间控制在 30 天以内，且到第三个账户时定制化分类或连接器工作不超过交付时间的 25%。
  decisionImpact: 若为假，毛利率目标和规模假设将崩溃，需要转向以服务为重的模式或更窄的工作流聚焦。
- assumption: 18–24 个月内人形机器人实际项目的已安装基数将增长足够快，足以支撑种子阶段的增长。
  basis: research.yaml
  validationTest: 追踪北美可触达运营商的管道是否超越初始共创客户集，并在第 12 个月前产生至少 30 个合格潜在客户。
  decisionImpact: 若为假，公司应保持轻资本运营，向邻近的移动操控工作流延伸，或推迟更大规模的风险融资。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 与三家拥有一个实际人形机器人试点和活跃下一站点决策的运营商开展共创客户探索。
  hypothesis: 推广决策包是一个独立的采购对象，有明确的负责人、触发时机和预算行项。
  successMetric: 至少 3 家中有 2 家同意以真实推广评审为范围的付费或深度承诺试点。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 仅用 WMS 数据导出、SOP 文档和人工维护的干预日志构建一个决策包。
  hypothesis: 第一次价值交付不需要 OEM 专有遥测。
  successMetric: 一个客户决策包进入内部评审，且不被 OEM 数据请求阻断。
  owner: 创始工程师
- horizon: 3–6 个月
  experiment: 在不同仓库系统环境中测试两种固定范围的入驻套餐。
  hypothesis: 最小事件模式和可复用的分类体系能将实施时间控制在 30 天以内。
  successMetric: 首个可用决策包的中位时间低于 30 天，且定制工程工作不超过 25%。
  owner: 解决方案工程师
- horizon: 6–9 个月
  experiment: 与前两个付费客户试点基准仪表盘和危险库追加销售。
  hypothesis: 客户在第一次推广决策后会为可复用的基准和治理资产付费。
  successMetric: 至少 1 个客户从仅决策包范围扩展至含基准访问权限的年度订阅。
  owner: 产品负责人
- horizon: 9–12 个月
  experiment: 将一个 OEM 转介动作和一个集成商转介动作与试点扩张评审节点绑定，形成正式流程。
  hypothesis: 合作伙伴驱动的分发可以降低获客成本，同时不必过早推进分销商经济模型。
  successMetric: 至少 4 个合格商机通过合作伙伴来源，并有 1 个付费项目成交。
  owner: 创始人/CEO
- horizon: 12–18 个月
  experiment: 为正在向首个生产站点之外扩张的一个账户，发布多站点对比和审批工作流功能。
  hypothesis: 账户内扩张是实现稳定 ARR 和基准密度最快的路径。
  successMetric: 至少 2 个客户在初始启动后 12 个月内在平台上认定第二个站点或工作流。
  owner: 客户成功负责人
operations:
- 将最小仓库事件模式产品化，并对所有连接器工作进行版本控制和复用。
- 维护有审计轨迹的受控 SOP 和安全决策包库，记录每个推荐的缓解措施和审批。
- 与每个客户进行季度推广评审准备，确保产品与真实的资本支出和 EHS 决策保持关联。
- 有选择性地引入外部安全顾问以提升决策包可信度，但核心交付物保持软件生成、可重复。
- 围绕第二站点决策时机，为 OEM、集成商和仓库套件转介建立合作伙伴剧本。
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责数据模型、评分引擎、决策包生成器和首个仓库系统连接器。
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 必须直接打入早期推广委员会销售、从客户发现中塑造本体，并建立 OEM 和集成商关系。
- role: 应用机器人与安全产品负责人
  startTiming: Month 3
  rationale: 将干预数据和 EHS 要求转化为可重复的决策包格式和基准分类体系。
- role: 解决方案工程师
  startTiming: Month 6
  rationale: 降低跨 WMS/WES 环境的实施摩擦，防止部署演变为定制咨询。
- role: 企业客户主管
  startTiming: Month 9
  rationale: 仅在首批可重复付费项目证明买家、定价和合作伙伴来源管道后才加入。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 3 个有活跃人形机器人试点扩张决策的共创客户。
  - 交付三种初始工作流类型和一种主要仓库系统导出格式的 MVP 决策包生成功能。
  - 将至少 2 个共创客户转化为付费项目，至少 1 个转化为生产订阅。
  - 验证一条 OEM 转介路径和一条集成商转介路径。
- horizon: 12–24 个月
  items:
  - 达到 6–8 个生产账户，并在平台上证明至少 2 次多站点扩张。
  - 发布可复用的基准仪表盘、危险库模块，以及第二条 OEM 集成路径。
  - 将中位实施时间压缩至 21 天以内，同时将服务工作控制在交付时间的少数比例。
  - 在保留相同认定工作流的前提下，从纯仓库试点扩展至至少一个制造业物料流部署场景。
- horizon: 24–36 个月
  items:
  - 通过账户扩张和新客户达到 15 个生产账户和约 $4.5M ARR。
  - 支持多供应商人形机器人项目，成为跨多个站点推广认定的系统记录。
  - 打造出足够强的基准护城河，让合作伙伴主动把产品纳入扩张规划，而非将其视为可选分析工具。
risks:
- risk: 由于人形机器人试点已上线并有资金支持的第二站点决策的运营商太少，近期市场仍然过小。
  likelihood: Medium
  impact: High
  mitigation: 聚焦具有活跃推广任务的具名早期采用者，并在人形机器人渗透率滞后时，保持在其他移动操控工作流中的邻近扩展选项。
- risk: OEM 将足够强的推广分析能力捆绑进机队云，压垮独立切口。
  likelihood: Medium
  impact: High
  mitigation: 保持跨供应商中立，强调跨站点基准测试和审批工作流，在 OEM 工具扩张之前赢得运营商信任。
- risk: 客户要求定制化评估，将业务推向以服务为重的交付模式。
  likelihood: High
  impact: High
  mitigation: 强制执行固定的任务本体和有限的首批工作流，并积极衡量定制化工作量，在扩大范围之前保持约束。
- risk: 人机混合作业的 EHS 和安全标准仍不成熟，导致可复用的决策包格式难以获得信任。
  likelihood: Medium
  impact: Medium
  mitigation: 将工作聚焦于有界任务和规定区域，引入安全顾问，并随标准演进对决策包库进行版本管理。
- risk: 仓库系统与 OEM 工具之间的数据集成耗时超出预期。
  likelihood: Medium
  impact: Medium
  mitigation: 从数据导出和运营商维护的日志起步，只添加能实质性提升评分准确性或入驻速度的适配器。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: 资助 18 个月的产品构建、首批连接器、安全与工作流本体开发、3–5 个共创客户、初始合作渠道，以及向 2–4 个具有软件级部署指标的生产客户的转化。
