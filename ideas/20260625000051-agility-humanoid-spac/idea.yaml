problem: >-
  Multi-site warehouse operators can now buy humanoid capacity, but they still do
  not know which workflows are safe and economically repeatable enough to copy
  from one pilot site into the next. OEM dashboards show robot uptime and task
  counts, yet the real expansion decision depends on intervention rates,
  standard-work changes, human-handoff edge cases, and site-level EHS approval.
  As named operators move from pilot hours to ordered fleets, the bottleneck
  shifts from robot availability to workflow qualification.
targetUser:
  primary: >-
    Network industrial engineering leaders at North American retail,
    ecommerce, and manufacturing warehouse operators running an initial humanoid
    pilot for case handling, tote movement, or reverse-logistics workflows.
  secondary: >-
    Site EHS managers and continuous-improvement leaders who must approve SOP
    changes before a second facility goes live.
  buyer: >-
    VP of Distribution Engineering, Head of Automation, or network operations
    executive at a multi-site warehouse operator.
startupThesis:
  nonObviousInsight: >-
    Once a humanoid OEM has real orders, production capacity, and its own fleet
    cloud, the scarce control point is no longer robot orchestration. It is the
    operator-side system that decides which micro-workflows deserve rollout,
    what human safeguards must change, and whether a second or fifth site is
    truly ready.
  beachhead: >-
    North American retail, ecommerce, and manufacturing warehouse networks with
    3-20 distribution centers, one live humanoid pilot, and internal
    industrial-engineering teams deciding whether to replicate unloading, tote
    transfer, or reverse-logistics handling in additional sites.
  wedge: >-
    A standard-work qualification OS that combines WMS or WES task data, robot
    intervention logs, and EHS observations to rank candidate workflows,
    generate site-specific SOPs, and issue a go or no-go packet for each next
    facility.
  whyNowCatalyst: >-
    Agility's SPAC financing, $300 million-plus order base, and planned scaling
    to broader deployments mean operators must choose rollout-ready workflows
    now, even though safety is still the primary blocker.
  ventureScalePath: >-
    Start with warehouse humanoid replication, then expand into the neutral task
    qualification layer for physical-AI deployments across factories, hospitals,
    airports, and insurer underwriting workflows.
solution: >-
  The product sits above OEM fleet software and below the warehouse operator's
  rollout committee. It ingests task histories from WMS or WES systems,
  intervention and failure logs from the humanoid vendor, and on-floor safety
  observations from site teams. It then scores each candidate workflow by
  repeatability, exception burden, required staffing changes, and site-specific
  hazards, before generating updated SOPs and an expansion packet. Customers use
  it to decide which next site, shift, and task should launch first instead of
  running every new deployment as a bespoke consulting project. Over time, the
  company builds the best cross-site benchmark on where humanoid deployments
  stall, what mitigations work, and which workflows convert into durable unit
  economics.
goToMarketSeed:
  firstCustomer: >-
    A $1 billion-plus retailer or manufacturer with 5-10 North American
    distribution centers, one paid Digit-style pilot in a case-handling
    workflow, and a mandate to pick two follow-on sites this fiscal year.
  buyingTrigger: >-
    A quarterly pilot review where the operator must approve a second-site
    rollout, justify more capex, or answer EHS objections after early operator
    interventions.
  currentAlternative: >-
    Vendor workshops, spreadsheet time-and-motion studies, WMS exports, manual
    EHS walkthroughs, internal industrial-engineering reviews, and the status
    quo of delaying rollout.
  switchingReason: >-
    This wedge tells the operator which exact tasks and sites are rollout-ready,
    with quantified intervention, safety, and labor assumptions in one packet,
    instead of asking the buyer to trust vendor optimism or ad hoc internal
    debate.
  pricingHypothesis: >-
    Annual subscription per active humanoid program plus per-site qualification
    fees, priced against avoided pilot delays, bad-site launches, and external
    integration-consulting spend.
