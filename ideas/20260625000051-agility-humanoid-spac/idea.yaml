differentiator: >-
  Most robotics software helps the OEM run the robot. This company helps the
  operator decide whether a workflow deserves replication at all, using a
  repeatable task-qualification model that spans sites and eventually vendors.
  That position lets it accumulate proprietary benchmarks on intervention rates,
  SOP changes, and rollout failure modes that neither a single OEM nor a
  consulting team can easily match.
