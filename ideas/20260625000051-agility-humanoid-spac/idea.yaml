topRisks:
  - name: Narrow early market
    description: Only a limited number of warehouse operators have live humanoid pilots today, which can slow initial customer count.
    mitigation: Start with design partners already budgeting for second-site expansion and support adjacent mobile-manipulation workflows while humanoid penetration rises.
  - name: OEM data dependency
    description: The best qualification model needs robot intervention and failure data that some vendors may hesitate to expose.
    mitigation: Begin with operator-owned WMS, ticketing, video, and SOP systems, then use buyer demand to standardize deeper telemetry adapters.
  - name: Consulting creep
    description: Customers may try to buy bespoke rollout analysis instead of software if every site looks unique.
    mitigation: Productize around a fixed task ontology, benchmark library, and generated approval packet so professional services stay light and repeatable.
