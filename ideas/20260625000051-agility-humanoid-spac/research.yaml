  validationPlan:
  - priority: high
    question: Can we ingest enough operator-owned data without deep OEM cooperation?
    evidenceToGather: Run one design-partner pilot using WMS events, ticketing, SOP documents, and manual intervention logs before asking for raw OEM telemetry.
  - priority: high
    question: Who truly owns the go/no-go packet—industrial engineering, EHS, operations, or procurement?
    evidenceToGather: Interview 8-10 rollout committees across 3PL, retail, and manufacturing operators and map their approval workflows.
  - priority: medium
    question: Which first workflow delivers the cleanest proof of value?
    evidenceToGather: Compare tote handling, case transfer, and reverse-logistics motions on intervention rate, SOP delta, and time-to-second-site metrics.
  - priority: medium
    question: How much services content is unavoidable in the first year?
    evidenceToGather: Time-box two implementation sprints and measure connector work, taxonomies, and change-management effort needed for a production launch.
