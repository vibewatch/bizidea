  - 71
- point: Legged and dynamically stable robots still sit in an emerging standards gap that requires deployment-specific safety cases.
  sourceRefs:
  - 73
- point: Current commercial use still fits best inside defined work zones or bounded material-handling tasks rather than unconstrained floor roaming.
  sourceRefs:
  - 58
- point: Trustworthy-AI and safety-architecture expectations are rising alongside industrial deployment of embodied AI.
  sourceRefs:
  - 72
