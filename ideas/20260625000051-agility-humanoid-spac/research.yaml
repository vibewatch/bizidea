  adoptionFrictionMatrix:
  - friction: OEM telemetry and incident-log access
    severity: high
    affectedBuyer: Head of automation / industrial engineering lead
    mitigation: Start with operator-owned WMS, ticketing, and SOP data, then layer in OEM APIs only where they add decisive signal.
    sourceRefs:
    - 10
    - 28
    - 41
  - friction: EHS approval for mixed human-humanoid work
    severity: high
    affectedBuyer: Site EHS manager
    mitigation: Generate task-specific risk assessments, work-zone assumptions, and mitigation checklists as part of the rollout packet.
    sourceRefs:
    - 58
