topRisks:
  - name: Small initial customer base
    description: There are still relatively few autonomous trucking operators with enough scale to buy enterprise software today.
    mitigation: Start with the operators closest to renewals and financing events, then add insurers, lenders, and adjacent autonomy markets as second-side customers.
  - name: Integration burden
    description: Pulling clean data from autonomy stacks, telematics systems, and finance tools could make deployment too services-heavy.
    mitigation: Limit the first release to a small set of high-value data sources and ship fixed templates for the first underwriting packet types.
  - name: Counterparty acceptance
    description: Insurers and lenders may still prefer bespoke diligence over standardized software outputs.
    mitigation: Design the product around exportable evidence rooms, source citations, and configurable templates that mirror each counterparty's existing review process.
