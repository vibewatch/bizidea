differentiator: >-
  Most autonomy tooling stops at simulation, teleoperation, or internal analytics. This company sits at the commercial boundary where operators must convince insurers, financiers, and freight buyers that a route is safe and economically viable. That external-facing workflow creates defensibility because the product can accumulate normalized diligence templates, counterparty requirements, and eventually cross-fleet underwriting benchmarks that point tools do not capture.
