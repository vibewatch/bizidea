jobsToBeDone:
  - job: When a new driverless lane or renewal process starts, help autonomous trucking operators assemble credible safety and economics evidence, so they can win approval without weeks of manual analysis.
    currentAlternative: Spreadsheets, dashboard screenshots, and custom slide decks
    successMetric: Days to complete diligence packet and percentage of requested evidence delivered from system-generated records
  - job: When an insurer or lender asks for updated fleet performance, help operations and finance leaders answer with auditable route-level metrics, so they can reduce premium or financing friction.
    currentAlternative: Internal BI pulls plus analyst-written memos
    successMetric: Insurance renewal cycle time and change in premium, deductible, or financing terms
