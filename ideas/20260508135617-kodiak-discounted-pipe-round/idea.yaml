problem: >-
  Autonomous trucking operators can now show real paid driverless utilization, but every new lane, insurance renewal, financing package, and enterprise deal still requires custom safety and economics proof. Operations teams pull data from telematics, disengagement logs, dispatch systems, and finance spreadsheets to build one-off decks for lenders, insurers, and shippers, which slows deployments and weakens negotiating leverage exactly when capital is most punitive.
targetUser:
  primary: COO or VP Operations at a U.S. autonomous trucking operator running 10-50 fully driverless trucks on commercial routes
  secondary: Head of insurance, finance, or strategic partnerships at the same operator
  buyer: COO or CFO
startupThesis:
  nonObviousInsight: The bottleneck is no longer only autonomy performance; it is converting fragmented operating data into lender-, insurer-, and shipper-grade evidence fast enough to unlock cheaper capital and faster lane approvals.
  beachhead: Route-level underwriting and diligence packs for autonomous trucking operators entering insurance renewals, vehicle-financing negotiations, or new shipper lane launches
  wedge: A system of record that ingests autonomy, dispatch, maintenance, and revenue data and auto-generates counterparty-specific safety and unit-economics evidence rooms
  whyNowCatalyst: Kodiak's discounted financing despite real driverless traction signals that autonomous freight operators now need software that makes their fleets financeable and insurable, not just technically functional.
  ventureScalePath: Start with autonomous trucking, then expand the underwriting data layer into robotaxi, industrial autonomy, defense autonomy, and insurer or lender benchmarking products built on cross-fleet performance datasets.
solution: >-
  Build an underwriting OS for driverless freight fleets. The product connects to autonomy logs, telematics, TMS, maintenance systems, and financial systems, then standardizes route-level KPIs such as paid driverless hours, ODD compliance, intervention rates, incident history, utilization, freight volume, and gross margin by lane. It produces insurer-ready renewal packets, lender data rooms, and shipper diligence portals with cited source records instead of manual spreadsheets and narrative decks. Over time, the company can benchmark risk and economics across operators and routes, creating a proprietary dataset that improves underwriting recommendations and expansion planning.
goToMarketSeed:
  firstCustomer: COO at a U.S. autonomous trucking operator with 10-50 driverless trucks, at least one enterprise freight account, and an insurance renewal or fleet-financing process in the next 6 months
  buyingTrigger: A discounted capital raise, upcoming insurance renewal, or launch of a new paid driverless lane that requires external diligence
  currentAlternative: Internal build plus spreadsheets, BI dashboards, and ad hoc diligence decks assembled by operations and finance teams
  switchingReason: The wedge compresses weeks of cross-functional evidence gathering into a repeatable data room that helps the operator close financing, renew insurance, and win shipper trust with less manual work and better proof quality
  pricingHypothesis: Annual platform fee based on active driverless trucks plus per-counterparty diligence workspace fees for insurers, lenders, and shippers
