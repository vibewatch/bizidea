scenarios:
  downside:
    description: 交易对手接受度仍更偏定制，销售周期被拉长，工作区附着率也落后于 SOM 假设。
    y3RevenueK: 1765.0
    y3EbitdaK: -118.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
    - 第 3 年末车队客户从 15 家降至 12 家，因为事件驱动型成交平均推迟了约一个季度。
    - 由于客户购买的付费工作区更少，单个车队客户的混合年收入降至约 $220K。
    - 由于实施和分析师支持负担仍高，毛利率落在约 65%。
  base:
    description: 创始人主导销售每年拿下少量由事件触发的车队客户，同时工作区附着率把混合 ARPU 逐步抬向 SOM 路径。
    y3RevenueK: 2490.8
    y3EbitdaK: 246.6
    cashLowPointK: 1456.5
    keyAssumptionChanges:
    - 第 3 年末车队客户达到 15 家，与 business-plan 的 SOM 路径一致。
    - 单个车队客户的混合年收入维持在约 $246K，来源于平台费和工作区费用。
    - 团队规模在期末保持 8 个 FTE 的精简配置，使 EBITDA 能在 Q2Y3 转正。
  upside:
    description: 首批证据室变成被市场接受的参考工作流，在无需明显提前扩招的情况下缩短销售周期并提升工作区采用。
    y3RevenueK: 3110.0
    y3EbitdaK: 520.0
    cashLowPointK: 1485.0
    keyAssumptionChanges:
    - 由于经纪商和贷款方转介绍更早转化，第 3 年末车队客户从 15 家升至 18 家。
    - 随着交易对手工作区附着率更高，单个车队客户的混合年收入提升至约 $255K。
    - 由于模板和连接器复用更高效，毛利率提升到约 72%。
sensitivity:
- variable: ARPU
  downsideCase: 单个车队客户的混合年收入为 $220K。
  baseCase: 单个车队客户的混合年收入为 $246K。
  upsideCase: 单个车队客户的混合年收入为 $255K。
  y3RevenueImpactK: -263.0
  cashImpactK: -184.0
- variable: CAC
  downsideCase: CAC 升至 $110K，因为每笔交易都需要更多创始人时间、差旅和定制化证明工作。
  baseCase: 在创始人主导销售、叠加经纪商和贷款方暖引荐的情况下，CAC 为 $86K。
  upsideCase: 当参考客户缩短信任建立过程后，CAC 降至 $70K。
  y3RevenueImpactK: 0.0
  cashImpactK: -360.0
- variable: 流失率
  downsideCase: 月流失率升至 3.0%，因为车队把产品当成一次性事件工具。
  baseCase: 月流失率为 2.0%，客户数已按该流失率的净值建模。
  upsideCase: 随着跨路线、跨交易对手的证据复用增强，月流失率改善到 1.5%。
  y3RevenueImpactK: -180.0
  cashImpactK: -126.0
- variable: 销售周期
  downsideCase: 由于审核方仍要求定制化备忘录重写，平均销售周期拉长到约 6 个月。
  baseCase: 平均销售周期约为 4-5 个月，包含实施到首个材料包交付。
  upsideCase: 早期导出材料被接受后，平均销售周期可压缩到约 3 个月。
  y3RevenueImpactK: -410.0
  cashImpactK: -287.0
- variable: 毛利率
  downsideCase: 毛利率为 65%，因为重服务实施模式持续存在。
  baseCase: 毛利率为 70%，与 business plan 一致。
  upsideCase: 模板和连接器复用提升后，毛利率达到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -125.0
- variable: 招聘节奏
  downsideCase: 在可复用性被证明前，销售负责人和基准数据工程师各自提前一个季度入职。
  baseCase: 招聘按 A17 执行，在产品可复用之前始终保持落后于需求。
  upsideCase: 由于转介绍能支撑 pipeline，第二位 GTM 招聘可推迟一个季度且不损失收入。
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
modelDiagram:
  title: 承保 OS 单位经济流
  mermaid: "flowchart LR\n  Trigger[续保、融资或新路线触发] --> Leads[合格车队机会]\n  Leads --> Customers[付费车队客户]\n  Customers --> Workspaces[付费交易对手工作区]\n  Customers --> Revenue[车队订阅收入]\n  Workspaces --> Revenue\n  Revenue --> GrossProfit[70% 毛利]\n  GrossProfit --> Opex[薪酬与运营支出]\n  Opex --> Cash[期末现金与跑道]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入来自 Q4Y3 达到 15 家车队客户、每家约 $246K 的混合 ARR，并随着工作区附着率上升逐步接近 SOM 假设。
- checkName: 必须做对的事
  finding: 公司必须足够快地把真实事件试点转成被接受的年度工作流，把 CAC 控制在约 $86K，并避免交付模式滑向重服务。
- checkName: 模型失效条件
  finding: 最大风险是销售周期变慢且审核方坚持定制化要求；敏感性分析显示，这可能让 Y3 收入少约 $410K，现金少约 $287K。
- checkName: 下一轮融资证明
  finding: 计划中的种子轮证明点，是在 Q4Y2 前做到 6 家生产级车队、稳定 30 天材料包交付，并发布首个基准分析模块，同时仍保留 6 个月缓冲。
sanityChecks:
  ruleOf40: Y3 增长 153.1% + EBITDA 利润率 9.9% = 163.0%（由于 Y2 基数很小，这个指标被抬高）。
  burnMultiple: Y2 的 burn multiple 约为 0.6x：$448K 的 EBITDA burn 对应约 $800K 的净新增收入；Y3 转为 EBITDA 为正。
  revenuePerFte: Y3 期末 8 个 FTE 对应 $311K 的人均收入，处在 SaaS 粗略的 $200-400K 基准区间内。
  flags:
  - 模型假设公司能在第 3 年拿下研究中约 150 个北美自动驾驶项目里的 15 个，这在高度集中的市场里相当激进。
  - 如果经纪商、保险公司或贷款方持续要求定制化重写，毛利率可能跌破 70% 目标，工作流也会滑向服务。
  - Rule of 40 看起来很强，主要是因为公司建立在非常小的基数之上高速增长，而不是已经达到规模效率。
