slug: driverless-fleet-underwriting-os
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date] 使用 2026-05-08 business-plan 日期之后的第一个完整月份。'
- id: A2
  name: pre-seed 完成后的起始现金
  value: '2.5'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 基准情景取所述融资区间的中点。'
- id: A3
  name: 付费车队客户起点
  value: '0'
  unit: customers
  source: '[BP milestones 0-12 months] 公司仍处于早期，必须先签下首批 2-3 家付费共创客户。'
- id: A4
  name: 净新增付费车队客户爬坡
  value: Y1 期末 2；Y2 各季度期末 3、4、5、6；Y3 各季度期末 8、10、12、15
  unit: customers
  source: '[BP milestones + BP market.som + Research market.som] 对应 12-24 个月达到 5-7 家生产级车队，并在第 3 年达到 15 家。'
- id: A5
  name: 单个车队客户稳态混合年收入
  value: '246.0'
  unit: USDK per customer per year
  source: '[BP gtm.pricing + BP market.som + Research market.som] 采用约 $180K 的混合车队 ARR，外加约 $66K 的附加工作区收入；这与第 3 年 15 家车队配 25 个工作区的假设一致。'
- id: A6
  name: 收入确认节奏
  value: 新 logo 在拿下的当月或当季按半个周期确认收入
  unit: policy
  source: '[Startup-finance heuristic: early enterprise SaaS] 反映签约和实施启动后，在当月或当季中段上线。'
- id: A7
  name: 毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel targetGrossMarginPct]'
- id: A8
  name: 月度 logo 流失率
  value: '2.0'
  unit: percent
  source: '[Startup-finance heuristic: narrow vertical enterprise SaaS] 基准情景的客户数已经按净值建模，但由于买方集中度高，仍保留适度流失风险。'
- id: A9
  name: 创始人/CEO 全成本现金薪酬
  value: '132.0'
  unit: USDK per year
  source: '[BP team Founder CEO] 采用低于市场的创始人工资，并计入工资税和福利。'
- id: A10
  name: 创始工程师全成本现金薪酬
  value: '180.0'
  unit: USDK per year
  source: '[BP team Founding eng] 采用资深数据平台工程师的创业早期现金薪酬假设。'
- id: A11
  name: 解决方案工程师全成本现金薪酬
  value: '144.0'
  unit: USDK per year
  source: '[BP team Solutions engineer] 采用偏实施导向技术岗位的现金薪酬假设。'
- id: A12
  name: 产品与运营负责人全成本现金薪酬
  value: '156.0'
  unit: USDK per year
  source: '[BP team Product and operations lead] 采用合规要求较高工作流中的产品/运营复合型负责人现金薪酬假设。'
- id: A13
  name: 客户成功与合作负责人全成本现金薪酬
  value: '132.0'
  unit: USDK per year
  source: '[BP team Customer success and partnerships lead] 采用覆盖早期售后和渠道的现金薪酬假设。'
- id: A14
  name: 销售/GTM 负责人全成本现金薪酬
  value: '168.0'
  unit: USDK per year
  source: '[BP gtm founder-led direct sales] 采用 1 名企业销售、浮动现金较低的薪酬假设。'
- id: A15
  name: 基准数据工程师全成本现金薪酬
  value: '180.0'
  unit: USDK per year
  source: '[BP product twentyFourMonth] 采用在 12-24 个月路线图中交付跨车队基准模块所需新增工程师的薪酬假设。'
- id: A16
  name: 第二位 GTM 招聘全成本现金薪酬
  value: '156.0'
  unit: USDK per year
  source: '[BP milestones 24-36 months] 采用公司走出初始切口后新增覆盖岗位的薪酬假设。'
- id: A17
  name: 招聘时点
  value: M1 创始人 + 创始工程师；M4 解决方案工程师；M7 产品与运营负责人；M10 客户成功与合作负责人；M16 销售负责人；M22 基准数据工程师；M28 第二位 GTM 招聘
  unit: schedule
  source: '[BP team startTiming + startup-finance heuristic] 让早期招聘与既定岗位保持一致，并只新增 2 个与 24 个月产品和 GTM 里程碑绑定的扩张岗位。'
- id: A18
  name: 薪酬按职能分摊
  value: 创始人 100% 计入 S&M；工程岗位 100% 计入 R&D；解决方案工程师 70% 计入 R&D、30% 计入 G&A；产品与运营 60% 计入 R&D、40% 计入 G&A；客户成功与合作 50% 计入 S&M、50% 计入 G&A；销售岗位 100% 计入 S&M
  unit: allocation
  source: '[BP team rationales + BP gtm + BP operations] 按岗位主要职责——销售、建设或支撑实施与合作——来分配人力成本。'
- id: A19
  name: 非薪酬运营支出爬坡
  value: S&M：Y1 客户成功岗位加入前每月 5K，Y1 后段和 Q1Y2 为 7K，至 Q1Y3 前为 10K，第二位 GTM 入职后为 14K；R&D：早期 4K，产品岗位加入后 5K，基准工程岗位加入后 6K；G&A：早期 3K，客户成功岗位加入后 4K，Y3 为 5K
  unit: USDK per month
  source: '[Startup-finance heuristic] 以精简的差旅、法务、保险、云和工具预算为基础，匹配一家兼顾服务交付但仍以软件为主的 pre-seed 公司。'
- id: A20
  name: 混合 CAC
  value: '86.0'
  unit: USDK per fleet customer
  source: '[BP gtm channels + BP funnelTargets + modeled S&M spend] 以 36 个月建模的总销售与市场支出除以 15 个净新增车队 logo。'
- id: A21
  name: 现金转换简化
  value: 现金变动近似等于 EBITDA
  unit: policy
  source: '[Startup-finance heuristic] 这家 pre-seed 软件公司不建模债务、资本开支、税项或营运资金波动。'
- id: A22
  name: 融资请求对应的种子轮就绪里程碑
  value: 到 Q4Y2 实现 6 家生产级车队、30 天材料包被接受、1 个经纪商或 TMS 合作工作流，以及首个基准分析模块
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk runwayMonths] 采用 24 个月经营里程碑作为下一轮融资的证明点。'
