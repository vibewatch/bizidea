  ventureScale:
    score: 4
    rationale: 滩头市场很窄，但同一套证据层可以扩展到相邻自动驾驶市场，以及保险和贷款分析。
topRisks:
- name: 初始客户池过小
  description: 今天真正有规模、愿意购买企业软件的自动驾驶卡车运营商仍然不多。
  mitigation: 先瞄准最接近续保和融资节点的运营商，再逐步把保险公司、贷款方和相邻自动驾驶市场纳入第二侧客户。
- name: 集成负担过重
  description: 如果无法从自动驾驶栈、远程信息处理系统和财务工具中拉到干净数据，部署就可能过度依赖服务。
  mitigation: 第一版只接入少量高价值数据源，并为最早的承保材料包类型提供固定模板。
- name: 交易对手不接受
  description: 保险公司和贷款方可能仍偏好定制化尽调，而不愿采用标准化软件输出。
  mitigation: 围绕可导出的证据室、来源引用和可配置模板来设计产品，让它贴合各类交易对手现有的审核流程。
