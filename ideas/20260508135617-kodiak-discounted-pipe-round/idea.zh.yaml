  signalRefs:
  - 无人驾驶卡车已达到可承保的车队规模
  sourceRefs:
  - 2
- point: 付费无人驾驶小时数和货运吨位，提供了构建一类新软件所需的原材料——即可审计的安全与单位经济证据。
  signalRefs:
  - 商业规模的付费自动驾驶数据已经出现
  sourceRefs:
  - 3
- point: 向长途货运、工业、国防和具名商业客户扩张，会显著抬高尽调复杂度，也让统一证据层变得更迫切。
  signalRefs:
