jobsToBeDone:
- job: 当新的无人驾驶路线启动或续保流程开始时，帮自动驾驶卡车运营商快速拼出可信的安全与经济性证据，好让他们无需再花数周手工分析就能拿到批准。
  currentAlternative: 表格、仪表盘截图和定制化幻灯片
  successMetric: 完成尽调材料包所需天数，以及系统自动生成记录覆盖的所需证据比例
- job: 当保险公司或贷款方要求更新车队表现时，帮助运营和财务负责人用可审计的路线级指标做出回应，从而降低保费或融资摩擦。
  currentAlternative: 内部 BI 拉数加分析师手写备忘录
  successMetric: 保险续保周期，以及保费、免赔额或融资条款的变化
