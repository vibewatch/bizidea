problem: 自动驾驶卡车运营商如今已经能拿出真实的付费无人驾驶利用率，但每新开一条路线、每次续保、每个融资包、每笔企业合作，仍然要临时拼一套安全和经济性证明。运营团队得从自动驾驶日志、远程信息处理数据、脱离接管记录、调度系统和财务表格里手工拉数，再为贷款方、保险公司和货主做一次性材料。这会拖慢部署，也会在资本最苛刻的时候削弱议价能力。
targetUser:
  primary: 在美国运营 10-50 辆完全无人驾驶商业路线卡车的自动驾驶卡车公司 COO 或运营副总裁
  secondary: 同一家公司的保险、财务或战略合作负责人
  buyer: COO 或 CFO
startupThesis:
  nonObviousInsight: 真正卡住扩张的已不只是自动驾驶性能，而是能否足够快地把碎片化运营数据转成贷款方、保险公司和货主认可的证据，从而换来更便宜的资本和更快的路线审批。
  beachhead: 面向进入续保、车辆融资谈判或新货主路线启动阶段的自动驾驶卡车运营商，提供路线级承保与尽调材料包
  wedge: 一个系统记录层，接入自动驾驶、调度、维修和收入数据，自动生成针对不同交易对手的安全与单位经济证据室
  whyNowCatalyst: Kodiak 明明已经跑出真实的无人驾驶进展，却仍需折价融资，这说明自动驾驶货运公司现在需要的，不只是技术上可用的车队，而是能被金融机构和保险机构接受的车队。
  ventureScalePath: 先从自动驾驶卡车切入，再把承保数据层扩展到 robotaxi、工业自动化、国防自动化，以及基于跨车队业绩数据集构建的保险与贷款基准产品。
solution: 打造一个面向无人驾驶货运车队的承保 OS。产品接入自动驾驶日志、远程信息处理、TMS、维修系统和财务系统，把付费无人驾驶小时数、ODD 合规率、人工干预率、事故历史、利用率、货运量、路线毛利等路线级 KPI 标准化。随后，它会输出带来源引用的续保材料包、贷款数据室和货主尽调门户，替代手工表格和叙事型 deck。随着时间推移，公司还能在不同运营商和路线之间做风险与经济性基准，形成专有数据集，进一步提升承保建议和扩张规划能力。
goToMarketSeed:
  firstCustomer: 美国一家拥有 10-50 辆无人驾驶卡车、至少一个企业货运客户，并将在未来 6 个月内进入续保或车队融资流程的自动驾驶卡车运营商 COO
  buyingTrigger: 折价融资、即将到来的保险续保，或一条需要外部尽调的新付费无人驾驶路线启动
  currentAlternative: 内部自建，加上表格、BI 仪表盘，以及由运营和财务团队临时拼出来的尽调 deck
  switchingReason: 这个切口把原本需要几周、跨团队收集的证据工作压缩成可复用的数据室，帮助运营商用更少手工工作和更高质量的证明去完成融资、续保并赢得货主信任。
  pricingHypothesis: 按在保无人驾驶卡车数量收取年度平台费，并向保险公司、贷款方和货主按交易对手尽调工作区收取额外费用。
