competitors:
- name: Nirvana Insurance
  stage: 成长型公司
  wedge: 基于远程信息处理的卡车保险与风险管理，直接和保费结果挂钩。
  pricing: 保费；基于远程信息处理的承保以最高 20% 首年保费节省作为卖点。
  strength: 掌握保险公司关系，并能直接把更好的风险数据变现。
  weaknessVsUs: 它不是自动驾驶专用产品，也不是能跨贷款方、货主和多个交易对手复用的证据室。
  sourceRefs:
  - 19
  - 20
- name: Samsara
  stage: 现有厂商
  wedge: 车队远程信息处理、运营可视化，以及和保险合作方联动的安全项目。
  pricing: 企业定制定价；主推保险合作方折扣，而不是公开自助价格。
  strength: 已经嵌入车队数据采集和保险合作工作流。
  weaknessVsUs: 它优化的是通用车队运营，而不是自动驾驶专属安全案例或贷款尽调材料包。
  sourceRefs:
  - 18
- name: Platform Science
  stage: 现有厂商
  wedge: 面向车队的联网车辆 OS 与远程信息处理数据编排。
  pricing: 企业定制定价。
  strength: 在车辆数据底层和车队工作流集成上位置很强。
  weaknessVsUs: 它止步于数据管道层，没有把路线级自动驾驶车队证据打包给外部交易对手。
  sourceRefs:
  - 23
- name: Applied Intuition
  stage: 成长型公司
  wedge: 自动驾驶卡车栈、验证与车队软件基础设施。
  pricing: 企业定制授权。
  strength: 在自动驾驶产品广度上非常深，并在 AV 开发商和 OEM 中具备强信誉。
  weaknessVsUs: 它的核心价值是搭建和验证自动驾驶系统，而不是服务保险公司、贷款方和货主的商业尽调。
  sourceRefs:
  - 21
- name: Foretellix
  stage: 成长型公司
  wedge: 面向自动驾驶卡车开发商的安全驱动验证、确认和安全证据。
  pricing: 企业定制授权。
  strength: 在生成安全证据、追溯测试与需求方面拥有很强的技术信誉。
  weaknessVsUs: 它聚焦工程 V&V 工作流，而不是跨职能的承保和融资材料包。
  sourceRefs:
  - 22
