scenarios:
  downside:
    description: Counterparty acceptance stays more bespoke, the sales cycle stretches, and workspace attachment trails the SOM blend.
    y3RevenueK: 1765.0
    y3EbitdaK: -118.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
      - End-of-Y3 fleet customers fall from 15 to 12 because event-driven deals slip by roughly one quarter.
      - Blended annual revenue per fleet customer lands near $220K because customers buy fewer paid workspaces.
      - Gross margin settles near 65% as implementation and analyst support remain elevated.
  base:
    description: Founder-led selling converts a small number of trigger-driven fleets each year while workspace attachment lifts blended ARPU toward the SOM path.
    y3RevenueK: 2490.8
    y3EbitdaK: 246.6
    cashLowPointK: 1456.5
    keyAssumptionChanges:
      - End-of-Y3 fleet customers reach 15, matching the business-plan SOM path.
      - Blended annual revenue per fleet customer stays at about $246K from platform plus workspace fees.
      - Hiring remains lean at 8 exit FTE, allowing EBITDA to turn positive in Q2Y3.
  upside:
    description: The first evidence rooms become accepted reference workflows, which shortens sales cycles and increases workspace adoption without a major hiring pull-forward.
    y3RevenueK: 3110.0
    y3EbitdaK: 520.0
    cashLowPointK: 1485.0
    keyAssumptionChanges:
      - End-of-Y3 fleet customers rise from 15 to 18 as broker and lender referrals convert earlier.
      - Blended annual revenue per fleet customer improves to about $255K on stronger counterparty-workspace attach.
      - Gross margin rises to roughly 72% as implementations reuse templates and connectors more efficiently.
sensitivity:
  - variable: ARPU
    downsideCase: Blended annual revenue per fleet customer is $220K.
    baseCase: Blended annual revenue per fleet customer is $246K.
    upsideCase: Blended annual revenue per fleet customer is $255K.
    y3RevenueImpactK: -263.0
    cashImpactK: -184.0
  - variable: CAC
    downsideCase: CAC rises to $110K because each deal needs more founder time, travel, and bespoke proof work.
    baseCase: CAC is $86K with founder-led selling plus warm broker and lender introductions.
    upsideCase: CAC falls to $70K once reference accounts shorten trust-building.
    y3RevenueImpactK: 0.0
    cashImpactK: -360.0
  - variable: churn
    downsideCase: Monthly churn reaches 3.0% because fleets treat the product as a one-event tool.
    baseCase: Monthly churn is 2.0% and customer counts are modeled net of that churn.
    upsideCase: Monthly churn improves to 1.5% as evidence reuse grows across routes and counterparties.
    y3RevenueImpactK: -180.0
    cashImpactK: -126.0
  - variable: sales cycle
    downsideCase: Average cycle stretches to about 6 months because reviewers still ask for bespoke memo rewrites.
    baseCase: Average cycle is about 4-5 months including implementation to first packet.
    upsideCase: Average cycle compresses to about 3 months after early accepted exports build trust.
    y3RevenueImpactK: -410.0
    cashImpactK: -287.0
  - variable: gross margin
    downsideCase: Gross margin is 65% because services-heavy implementation persists.
    baseCase: Gross margin is 70%, matching the business plan.
    upsideCase: Gross margin reaches 72% after template and connector reuse improves.
    y3RevenueImpactK: 0.0
    cashImpactK: -125.0
  - variable: hiring pace
    downsideCase: The sales lead and benchmark-data engineer are each pulled forward by one quarter before repeatability is proven.
    baseCase: Hiring follows A17 and stays behind demand until the product is repeatable.
    upsideCase: The second GTM hire slips one quarter later with no revenue loss because referrals carry pipeline.
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
modelDiagram:
  title: Underwriting OS unit economics flow
  mermaid: |
    flowchart LR
      Trigger[Renewal financing or lane-launch trigger] --> Leads[Qualified fleet opportunities]
      Leads --> Customers[Paying fleet customers]
      Customers --> Workspaces[Paid counterparty workspaces]
      Customers --> Revenue[Fleet subscription revenue]
      Workspaces --> Revenue
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Opex[Payroll and operating spend]
      Opex --> Cash[Ending cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by 15 fleet customers by Q4Y3 at about $246K blended ARR each as workspace attachment approaches the SOM mix.
  - checkName: Must go right
    finding: The company must turn live-event pilots into accepted annual workflows fast enough to keep CAC near $86K and avoid a services-heavy delivery model.
  - checkName: Model breaks if
    finding: The largest risk is a slower sales cycle plus bespoke reviewer demands, which sensitivity shows can remove about $410K of Y3 revenue and about $287K of cash.
  - checkName: Next-round proof
    finding: The planned seed case is reaching 6 production fleets, repeatable 30-day packet delivery, and first benchmark analytics by Q4Y2 while still holding a 6-month buffer.
sanityChecks:
  ruleOf40: Y3 growth 153.1% + EBITDA margin 9.9% = 163.0% (flattered by the small Y2 base).
  burnMultiple: Y2 burn multiple is about 0.6x using $448K of EBITDA burn against roughly $800K of net-new revenue; Y3 becomes EBITDA positive.
  revenuePerFte: $311K Y3 revenue per 8 exit FTE (within the rough $200-400K SaaS benchmark band).
  flags:
    - The model assumes the company can win 15 of roughly 150 North American autonomy programs in the researched SAM by year 3, which is ambitious in a concentrated market.
    - If brokers, insurers, or lenders keep demanding bespoke rewrites, gross margin can fall below the 70% target and the workflow can drift toward services.
    - Rule-of-40 optics look strong only because the company is growing from a very small base rather than because it has already reached scale efficiency.
