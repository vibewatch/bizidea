assumptions:
  - id: A1
    name: Model start month
    value: '2026-06'
    unit: YYYY-MM
    source: '[BP date] Uses the first full month after the 2026-05-08 business-plan date.'
  - id: A2
    name: Starting cash after pre-seed close
    value: '2.5'
    unit: USDM
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M] Base case uses the midpoint of the stated raise range.'
  - id: A3
    name: Paying fleet-customer starting point
    value: '0'
    unit: customers
    source: '[BP milestones 0-12 months] The company is pre-scale and must still sign its first 2-3 paid design partners.'
  - id: A4
    name: Net paying fleet-customer ramp
    value: 'Y1 exit 2; Y2 quarter exits 3, 4, 5, 6; Y3 quarter exits 8, 10, 12, 15'
    unit: customers
    source: '[BP milestones + BP market.som + Research market.som] Tracks to 5-7 production fleets by months 12-24 and 15 fleets by year 3.'
  - id: A5
    name: Steady-state blended annual revenue per fleet customer
    value: '246.0'
    unit: USDK per customer per year
    source: '[BP gtm.pricing + BP market.som + Research market.som] Uses $180K blended fleet ARR plus about $66K of attached workspace revenue, which is consistent with 25 workspaces across 15 fleets by year 3.'
  - id: A6
    name: Revenue recognition timing
    value: New logos contribute half of the month or quarter in which they are won
    unit: policy
    source: '[Startup-finance heuristic: early enterprise SaaS] Reflects mid-period go-live after contract signature and implementation kickoff.'
  - id: A7
    name: Gross margin
    value: '70'
    unit: percent
    source: '[BP businessModel targetGrossMarginPct]'
  - id: A8
    name: Monthly logo churn
    value: '2.0'
    unit: percent
    source: '[Startup-finance heuristic: narrow vertical enterprise SaaS] Base-case customer counts are modeled net of churn, with modest churn risk retained because buyer concentration is high.'
  - id: A9
    name: Founder CEO loaded cash compensation
    value: '132.0'
    unit: USDK per year
    source: '[BP team Founder CEO] Startup-finance heuristic for below-market founder salary plus payroll taxes and benefits.'
  - id: A10
    name: Founding engineer loaded cash compensation
    value: '180.0'
    unit: USDK per year
    source: '[BP team Founding eng] Startup-finance heuristic for senior data-platform engineer plus payroll burden.'
  - id: A11
    name: Solutions engineer loaded cash compensation
    value: '144.0'
    unit: USDK per year
    source: '[BP team Solutions engineer] Startup-finance heuristic for implementation-heavy technical hire.'
  - id: A12
    name: Product and operations lead loaded cash compensation
    value: '156.0'
    unit: USDK per year
    source: '[BP team Product and operations lead] Startup-finance heuristic for a hybrid product/ops leader in a compliance-heavy workflow.'
  - id: A13
    name: Customer success and partnerships lead loaded cash compensation
    value: '132.0'
    unit: USDK per year
    source: '[BP team Customer success and partnerships lead] Startup-finance heuristic for early post-sale and channel coverage.'
  - id: A14
    name: Sales and GTM lead loaded cash compensation
    value: '168.0'
    unit: USDK per year
    source: '[BP gtm founder-led direct sales] Startup-finance heuristic for one enterprise seller with modest variable cash.'
  - id: A15
    name: Benchmark-data engineer loaded cash compensation
    value: '180.0'
    unit: USDK per year
    source: '[BP product twentyFourMonth] Startup-finance heuristic for an added engineer to ship cross-fleet benchmarks by the 12-24 month roadmap.'
  - id: A16
    name: Second GTM hire loaded cash compensation
    value: '156.0'
    unit: USDK per year
    source: '[BP milestones 24-36 months] Startup-finance heuristic for added coverage once the company expands beyond the initial wedge.'
  - id: A17
    name: Hiring timing
    value: 'M1 founder+founding eng; M4 solutions engineer; M7 product and ops lead; M10 customer success and partnerships; M16 sales lead; M22 benchmark-data engineer; M28 second GTM hire'
    unit: schedule
    source: '[BP team startTiming + startup-finance heuristic] Keeps early hiring aligned to stated roles and adds only two scale-up hires tied to the 24-month product and GTM milestones.'
  - id: A18
    name: Payroll allocation by function
    value: Founder 100% S&M; engineering roles 100% R&D; solutions engineer 70% R&D and 30% G&A; product and ops 60% R&D and 40% G&A; customer success and partnerships 50% S&M and 50% G&A; sales roles 100% S&M
    unit: allocation
    source: '[BP team rationales + BP gtm + BP operations] Allocates labor based on whether each role primarily sells, builds, or supports implementations and partners.'
  - id: A19
    name: Non-payroll operating spend ramp
    value: 'S&M 5K monthly in Y1 pre-CS, 7K in late Y1 and Q1Y2, 10K through Q1Y3, 14K after second GTM hire; R&D 4K early, 5K after product hire, 6K after benchmark-engineering hire; G&A 3K early, 4K after customer-success hire, 5K in Y3'
    unit: USDK per month
    source: '[Startup-finance heuristic] Lean travel, legal, insurance, cloud, and tooling budget sized for a services-aware but still software-first pre-seed.'
  - id: A20
    name: Blended CAC
    value: '86.0'
    unit: USDK per fleet customer
    source: '[BP gtm channels + BP funnelTargets + modeled S&M spend] Total modeled S&M spend over 36 months divided by 15 net new fleet logos.'
  - id: A21
    name: Cash conversion simplification
    value: Cash movement approximates EBITDA
    unit: policy
    source: '[Startup-finance heuristic] No debt, capex, taxes, or working-capital swings are modeled for this pre-seed software company.'
  - id: A22
    name: Seed-readiness milestone for funding ask
    value: '6 production fleets, accepted 30-day packets, one broker or TMS partner workflow, and first benchmark analytics module by Q4Y2'
    unit: milestone
    source: '[BP milestones 12-24 months + BP fundingAsk runwayMonths] Uses the 24-month operating milestone as the next financing proof point.'
