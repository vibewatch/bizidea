  fiveForces:
    supplierPower:
      score: 2
      rationale: >-
        Core inputs are integrations rather than a concentrated physical
        supplier base. Payment rails and middleware matter, but chains can
        connect to multiple vendors.
      sourceRefs: [18, 24, 25, 35]
    buyerPower:
      score: 4
      rationale: >-
        The buyer pool is narrow and can compare a specialist wedge against
        incumbent POS suites or manual processes before switching.
      sourceRefs: [15, 17, 28, 29]
    threatOfEntrants:
      score: 3
      rationale: >-
        Software entry barriers are moderate, but reliable integrations,
        manager trust, and chain-specific operational data create some
        defensibility.
      sourceRefs: [21, 23, 24, 30]
    threatOfSubstitutes:
      score: 4
      rationale: >-
        Manual planning, generic inventory tools, and incumbent POS modules
        remain credible substitutes until the startup proves a distinctly better
        control loop.
      sourceRefs: [17, 19, 21, 28]
    competitiveRivalry:
      score: 4
      rationale: >-
        Rivalry is high in adjacent categories even if the exact wedge is open
        because buyers already evaluate many POS, ordering, inventory, and
        labor vendors.
      sourceRefs: [17, 18, 19, 28, 29, 30, 35]
  pestle:
    - factor: political
      impact: neutral
      point: Open commerce initiatives broaden digital distribution options but do not eliminate the need for owned operational data.
      sourceRefs: [25]
    - factor: economic
      impact: positive
      point: Indian QSR expansion and margin pressure make waste and labor control more urgent.
      sourceRefs: [15, 16]
    - factor: social
      impact: positive
      point: Consumers already accept app-led ordering, loyalty, and in some formats beverage subscriptions.
      sourceRefs: [7, 8, 12, 32, 36, 37]
    - factor: technological
      impact: positive
      point: India-native recurring payments and ordering middleware reduce implementation friction for a subscription-aware ops layer.
      sourceRefs: [24, 34, 35]
    - factor: legal
      impact: neutral
      point: Closed-loop prepaid programs appear feasible, but privacy and food-service compliance still shape product design.
      sourceRefs: [22, 23, 33]
  adoptionFrictionMatrix:
    - friction: Fragmented app, POS, and inventory exports
      severity: high
      affectedBuyer: COO and operations team
      mitigation: Start with a narrow data contract using order, SKU, and redemption feeds rather than a full-system replacement.
      sourceRefs: [17, 18, 29, 35]
    - friction: Store-manager trust gap
      severity: high
      affectedBuyer: Area managers and store managers
      mitigation: Launch with recommendation mode, variance tracking, and exception alerts before automated ordering.
      sourceRefs: [21, 26, 27, 30]
    - friction: Small initial budget envelope
      severity: medium
      affectedBuyer: CFO or COO
      mitigation: Tie rollout to measurable waste, stockout, and labor savings using per-store pilots.
      sourceRefs: [20, 28, 30, 39]
    - friction: Payment and consent complexity
      severity: medium
      affectedBuyer: Product and legal owners
      mitigation: Use existing UPI AutoPay and closed-loop payment patterns rather than inventing bespoke payment logic.
      sourceRefs: [23, 24, 33]
