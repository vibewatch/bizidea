modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      TargetChains[Target chains] --> PaidPilots[Paid pilot stores]
      PaidPilots --> LiveStores[Live managed stores]
      LiveStores --> Revenue[Per-store SaaS revenue]
      Revenue --> GrossProfit[Gross profit at 70%]
      GrossProfit --> Cash[Ending cash after opex]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from expanding one 6-store pilot into roughly 70 live stores by Q4Y3 at the researched $2.988K annual per-store benchmark, which yields about $209K exit ARR but only $181K of recognized Y3 revenue.
- checkName: Must go right
  finding: The company has to convert the first pilot into chainwide rollout quickly enough that founder-led selling acquires logos while existing logos provide most store growth.
- checkName: Model breaks if
  finding: The model deteriorates fastest if data-readiness audits or buyer trust stretch the sales cycle toward nine months, because revenue stays tiny while the lean team still burns cash.
- checkName: Next-round proof
  finding: A credible seed raise needs Q4Y2 evidence of 2-3 production chains, 40-plus live stores, and a repeatable onboarding path that proves the wedge is product software rather than consulting.
sanityChecks:
  ruleOf40: Y3 growth 142.0% + EBITDA margin -203.0% = -61.0%.
  burnMultiple: Y1 burn multiple is about 18.9x on $29.9K exit ARR; Y2 improves to about 3.9x on $95.6K of net new ARR; Y3 is about 4.4x on $83.7K of net new ARR.
  revenuePerFte: $25.8K Y3 using annual revenue and 7 year-end FTE (benchmark $200–400K SaaS).
  flags:
  - The researched beachhead is so small that even hitting the full year-3 SOM only creates about $209K of exit ARR, which is far below typical venture-scale revenue density.
  - Revenue per FTE stays well below software benchmarks because the company must carry product and implementation capacity long before the wedge is large enough to absorb it.
  - The model assumes one chain pilot converts to multi-store rollout by late Y1; if that pilot stalls, the pre-seed round still funds learning but not a compelling seed narrative.
