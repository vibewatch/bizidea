slug: coffee-subscription-opsos
date: '2026-05-26'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: month
  source: Starts the first full month after the 2026-05-26 business-plan date.
- id: A2
  name: Annual software revenue per live store
  value: $2.988K
  unit: usdK_per_store_year
  source: '[research.market.bottomUpSizingDrivers; BP market] Research sizes the category at $2,988 annual software spend per store and the BP repeatedly anchors pricing near that benchmark.'
- id: A3
  name: Pilot store count
  value: 6 stores starting in M6
  unit: stores
  source: '[BP gtm.wedge; BP investorMemo.firstCustomer.initialContract] The BP calls for a paid 5-10 store pilot, so the base case starts with 6 stores once data-readiness work is done.'
- id: A4
  name: Store deployment ramp
  value: 10 live stores by M12, 42 by Q4Y2, and 70 by Q4Y3
  unit: stores
  source: '[BP milestones; research.market.som] The ramp converts the first pilot in year 1, reaches 2-3 production chains in year 2, and hits the researched year-3 SOM of about 70 stores.'
- id: A5
  name: Revenue recognition proxy
  value: Monthly revenue uses month-end live stores; Y2/Y3 quarterly revenue uses quarter-end live stores as a conservative simplification because chain rollouts are assumed to land early in each quarter after approval.
  unit: method
  source: '[BP experimentRoadmap; BP milestones] Rollouts happen in clustered chain expansions rather than evenly every week, so quarter-end store counts are used to keep revenue tied directly to customer count and ARPU.'
- id: A6
  name: Steady-state gross margin
  value: 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] The business plan targets a 70% gross margin for the software layer.'
- id: A7
  name: Loaded salary bands
  value: Founder/CEO $90K; engineering $60K; product/ops $50K; customer success/implementation $35K; G&A $30K
  unit: usdK_per_fte_year
  source: India vertical-SaaS startup-finance heuristic, chosen to match the BP team sequence and keep the company lean enough for a pre-seed plan.
- id: A8
  name: Headcount ramp snapshots
  value: Founder/CEO 1/1/1/1/1/1; engineering 1/2/2/2/2/3; product/ops 1/1/1/1/1/1; customer success/implementation 0/0/0/1/1/1; G&A 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale] The plan adds the integration engineer first, then implementation coverage only after chain rollout is productized, while keeping GTM founder-led through the narrow beachhead.'
- id: A9
  name: Non-payroll operating spend
  value: Y1 monthly S&M $12K-$16K, R&D $8K-$9K, G&A $4K-$6K; Y2 quarterly non-payroll opex $23K-$33K; Y3 quarterly non-payroll opex $32K-$34K
  unit: usdK
  source: Startup-finance heuristic for cloud hosting, travel to chain pilots, data tooling, legal, and software needed for a lean India-based vertical SaaS team.
- id: A10
  name: Starting cash after pre-seed close
  value: $2.0M
  unit: usdM
  source: '[BP fundingAsk] Modeled at the low end of the BP''s $2-4M pre-seed target because the base plan keeps headcount lean and stays focused on the narrow beverage-ops wedge.'
- id: A11
  name: Fully loaded CAC normalized per live store
  value: $1.8K per store
  unit: usdK_per_store
  source: '[BP gtm.funnelTargets] Derived from a founder-led chain sale with roughly 20-30% target-account-to-qualified-pilot, 30-40% qualified-to-paid-pilot, and 50%+ paid-pilot-to-production conversion, then normalized across 20-25 stores per chain.'
- id: A12
  name: Monthly churn
  value: 1.2%
  unit: percent
  source: Startup-finance heuristic for sticky but still early vertical SaaS contracts where logo churn should be low but footprint contraction risk still exists.
- id: A13
  name: Quarterly payroll smoothing
  value: Y2 and Y3 salary expense ramps smoothly between the year-end headcount snapshots instead of stepping only in Q4
  unit: method
  source: '[financial-modeler instructions] Quarterly salary lines are smoothed to stay consistent with the six-column headcount convention.'
- id: A14
  name: Scenario downside deltas
  value: Q4Y3 live stores 55, annual store spend $2.70K, and gross margin 64%
  unit: scenario_inputs
  source: '[BP risks; research.reportMemo.sensitivityCases] Downside reflects narrower prepaid-program prevalence, slower data readiness, and implementation-heavy rollouts.'
- id: A15
  name: Scenario upside deltas
  value: Q4Y3 live stores 85, annual store spend $3.30K, and gross margin 73%
  unit: scenario_inputs
  source: '[BP product.twentyFourMonth; BP milestones] Upside assumes the first adjacent module lands inside existing chains and lifts both coverage and per-store value.'
