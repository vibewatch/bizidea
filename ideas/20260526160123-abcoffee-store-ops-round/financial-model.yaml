scenarios:
  downside:
    description: Prepaid-program prevalence is narrower than expected, integration work stays bespoke, and the company exits Y3 with fewer deployed stores and lower realized pricing.
    y3RevenueK: 135.21
    y3EbitdaK: -406.97
    cashLowPointK: 455.0
    keyAssumptionChanges:
    - Q4Y3 live stores fall from 70 to 55.
    - Annual store spend falls from $2.99K to $2.70K.
    - Gross margin falls from 70% to 64% because onboarding stays service-heavy.
    - Sales cycles extend because more prospects fail data-readiness audits.
  base:
    description: One 6-store pilot converts into two to three lighthouse chains, reaching 70 live stores by Q4Y3 while staying at the researched per-store pricing benchmark.
    y3RevenueK: 180.78
    y3EbitdaK: -366.96
    cashLowPointK: 695.41
    keyAssumptionChanges:
    - Annual store spend stays at the researched $2.988K benchmark.
    - Gross margin holds at the BP target of 70%.
    - The first paid pilot starts in M6 and reaches 10 live stores by M12.
    - Q4Y3 live stores reach the researched SOM of 70 across 2-3 chains.
  upside:
    description: The first adjacent module lands inside lighthouse accounts, chain expansions move faster, and per-store pricing rises modestly as the product broadens beyond basic prep planning.
    y3RevenueK: 228.0
    y3EbitdaK: -285.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
    - Q4Y3 live stores rise from 70 to 85.
    - Annual store spend rises from $2.99K to $3.30K with an adjacent module attach.
    - Gross margin improves from 70% to 73% as integrations repeat.
    - Expansion inside landed chains happens faster than net-new logo acquisition.
