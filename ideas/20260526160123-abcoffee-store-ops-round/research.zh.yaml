  weaknessVsUs: 在排班、印度支付基础设施或咖啡订阅特有信号上差异不够强。
  sourceRefs:
  - 20
regulatoryTechnicalConstraints:
- point: 单商户饮品通行证可以适配闭环预付逻辑，但一旦更像钱包行为，支付复杂度就会上升。
  sourceRefs:
  - 23
  - 24
- point: 餐饮运营方仍需遵守 FSSAI 合规处理和留痕流程，所以软件建议必须贴着受监管的门店流程走。
  sourceRefs:
  - 22
- point: 任何使用订单、会员和核销数据的系统，都要承担 DPDP 时代的授权与数据治理义务。
  sourceRefs:
  - 33
- point: 产品只有在能读现有点单层和 POS 层的前提下才成立，不能要求整套技术栈重换。
  sourceRefs:
  - 17
  - 18
  - 28
  - 35
validationSignals:
- point: abcoffee 的预付饮品量和 app 订单占比已经足够高，需求规划因此是个软件问题。
  sourceRefs:
  - 1
  - 2
  - 3
- point: Third Wave 和 Blue Tokai 都在第一方数字化触点里展示出订阅或会员驱动的咖啡消费行为。
  sourceRefs:
  - 5
  - 7
  - 32
- point: Chaayos、Chai Point 这样的印度茶饮连锁，已经同时具备规模、自有 app 和会员或奖励机制。
  sourceRefs:
  - 8
  - 9
  - 10
  - 12
- point: 全球咖啡馆运营方仍在持续推广饮品订阅；即便不同品牌的机制不同，这个行为模型本身已被验证。
  sourceRefs:
  - 36
  - 37
openQuestions:
- 在 20–150 家门店这个区间里，到底有多少印度咖啡和精品茶连锁在跑真正的预付饮品通行证，而不是只有会员积分？
- 在首个 pilot 中，目标连锁究竟能从 app、POS 和库存系统给出多低延迟、什么 schema 质量的数据？
- 买方更偏好“经理在环”的建议模式，还是会足够快地信任自动采购建议？
- 自助点单机、办公室 vending 和强中央厨房属性的饮品网络，应该算同一套产品打法，还是相邻市场？
