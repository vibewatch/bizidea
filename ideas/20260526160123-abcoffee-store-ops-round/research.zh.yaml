  wedge: 印度本土的餐饮 POS、库存与供应链系统，面向多门店运营方。
  pricing: 按模块定制定价。
  strength: 本地分发强、集成广、功能面覆盖完整。
  weaknessVsUs: 它更像广义餐饮运营系统，对由订阅核销驱动的门店控制并不聚焦。
  sourceRefs:
  - 17
  - 29
