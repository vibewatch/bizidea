  stage: 成长中公司
  wedge: 面向餐饮连锁的点单、会员、官网和聚合平台中间件。
  pricing: 定制定价。
  strength: 已经卡在印度连锁的第一方与平台订单流之上。
  weaknessVsUs: 它停在需求捕获与路由层，没有往下做门店-时段的备料与补货。
