slug: coffee-subscription-opsos
date: '2026-05-26'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: 从 2026-05-26 的 business-plan 日期之后的首个完整月份开始。
- id: A2
  name: 每家已上线门店的年软件收入
  value: $2.988K
  unit: usdK_per_store_year
  source: '[research.market.bottomUpSizingDrivers; BP market] 研究把这个品类的单店年软件支出锚定在 $2,988，BP 也在多个位置围绕这一基准定价。'
- id: A3
  name: 试点门店数
  value: M6 起 6 家门店
  unit: stores
  source: '[BP gtm.wedge; BP investorMemo.firstCustomer.initialContract] BP 计划先跑一个 5–10 家门店的付费 pilot，所以 base case 假设在数据就绪工作完成后，从 6 家门店起步。'
- id: A4
  name: 门店部署爬坡
  value: M12 达到 10 家上线门店，Y2 Q4 达到 42 家，Y3 Q4 达到 70 家
  unit: stores
  source: '[BP milestones; research.market.som] 这个爬坡节奏对应的是：第 1 年转化首个 pilot；第 2 年做到 2–3 家生产级连锁；第 3 年达到研究测算约 70 家门店的 SOM。'
- id: A5
  name: 收入确认代理方法
  value: 月度收入按月末上线门店数确认；Y2/Y3 季度收入按季末上线门店数确认，作为偏保守的简化，因为假设连锁 rollout 在批准后通常在季度前段落地，而不是每周平均推进。
  unit: method
  source: '[BP experimentRoadmap; BP milestones] rollout 往往以成簇扩店的方式发生，而不是每周均匀推进，所以这里用季末门店数来确认收入，让收入和客户规模直接挂钩。'
- id: A6
  name: 稳态毛利率
  value: 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] business plan 把软件层的目标毛利率定在 70%。'
- id: A7
  name: 全成本薪酬区间
  value: Founder/CEO $90K；工程 $60K；产品/运营 $50K；客户成功/实施 $35K；G&A $30K
  unit: usdK_per_fte_year
  source: 针对印度垂直 SaaS 创业公司的财务经验法则，目的是贴合 BP 里的团队节奏，同时让公司在 pre-seed 阶段保持足够精瘦。
- id: A8
  name: 人员爬坡快照
  value: 按 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3 计：Founder/CEO 1/1/1/1/1/1；engineering 1/2/2/2/2/3；product/ops 1/1/1/1/1/1；customer success/implementation 0/0/0/1/1/1；G&A 0/0/0/0/1/1
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale] 计划先补集成工程师，等连锁 rollout 能产品化后再上实施覆盖，同时在狭窄滩头市场内持续由创始人亲自打单。'
- id: A9
  name: 非薪酬运营开支
  value: Y1 月度 S&M $12K-$16K、R&D $8K-$9K、G&A $4K-$6K；Y2 季度非薪酬 opex $23K-$33K；Y3 季度非薪酬 opex $32K-$34K
  unit: usdK
  source: 面向精瘦印度垂直 SaaS 团队的创业财务经验法则，覆盖云资源、链路试点差旅、数据工具、法务和软件支出。
- id: A10
  name: pre-seed 完成后的起始现金
  value: $2.0M
  unit: usdM
  source: '[BP fundingAsk] 按 BP $2–4M pre-seed 目标区间的低端建模，因为 base plan 团队精瘦，且持续聚焦狭窄的饮品运营切口。'
- id: A11
  name: 按已上线门店归一化后的全成本 CAC
  value: $1.8K per store
  unit: usdK_per_store
  source: '[BP gtm.funnelTargets] 基于创始人主导的连锁销售模型推导：目标客户→合格 pilot 约 20–30%，合格→付费 pilot 30–40%，付费 pilot→生产环境 50%+，再按每条连锁 20–25 家门店归一化。'
- id: A12
  name: 月度流失率
  value: 1.2%
  unit: percent
  source: 适用于高粘性但仍然很早期的垂直 SaaS 合同的经验法则：logo churn 应该较低，但门店覆盖收缩风险仍存在。
- id: A13
  name: 季度薪酬平滑
  value: Y2 和 Y3 的薪酬费用在年末人员快照之间平滑递增，而不是只在 Q4 阶梯式跳变
  unit: method
  source: '[financial-modeler instructions] 季度薪酬线按六列人员口径平滑处理，以保持一致。'
- id: A14
  name: 下行情景调整项
  value: Y3 Q4 上线门店 55 家、单店年支出 $2.70K、毛利率 64%
  unit: scenario_inputs
  source: '[BP risks; research.reportMemo.sensitivityCases] 下行反映的是预付计划渗透率更窄、数据就绪更慢，以及 rollout 更偏实施项目。'
- id: A15
  name: 上行情景调整项
  value: Y3 Q4 上线门店 85 家、单店年支出 $3.30K、毛利率 73%
  unit: scenario_inputs
  source: '[BP product.twentyFourMonth; BP milestones] 上行假设首个相邻模块在现有连锁里落地，同时抬升覆盖范围和单店价值。'
