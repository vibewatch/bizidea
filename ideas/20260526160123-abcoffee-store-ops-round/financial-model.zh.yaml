scenarios:
  downside:
    description: 真正采用预付计划的连锁比预期更少，集成工作一直停留在定制实施，公司到 Y3 结束时的已部署门店更少、实际单店定价也更低。
    y3RevenueK: 135.21
    y3EbitdaK: -406.97
    cashLowPointK: 455.0
    keyAssumptionChanges:
    - Y3 Q4 上线门店从 70 家降到 55 家。
    - 单店年支出从 $2.99K 降到 $2.70K。
    - 因为 onboarding 仍然偏服务化，毛利率从 70% 降到 64%。
    - 更多潜在客户通不过数据就绪审计，销售周期被拉长。
  base:
    description: 一个 6 家门店的 pilot 转成两到三家灯塔连锁，到 Y3 Q4 做到 70 家上线门店，同时维持研究里测得的单店定价基准。
    y3RevenueK: 180.78
    y3EbitdaK: -366.96
    cashLowPointK: 695.41
    keyAssumptionChanges:
    - 单店年支出维持在研究测得的 $2.988K 基准。
    - 毛利率稳定在 BP 目标的 70%。
    - 首个付费 pilot 从 M6 开始，到 M12 达到 10 家上线门店。
    - Y3 Q4 在 2–3 家连锁里做到研究测算的 70 家 SOM。
  upside:
    description: 首个相邻模块在灯塔客户内部落地，连锁扩张速度更快，随着产品能力从基础备料规划向外扩展，单店定价也小幅上升。
    y3RevenueK: 228.0
    y3EbitdaK: -285.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
    - Y3 Q4 上线门店从 70 家升到 85 家。
    - 随着相邻模块挂载，单店年支出从 $2.99K 提升到 $3.30K。
    - 随着集成重复利用，毛利率从 70% 提升到 73%。
    - 已签约连锁内部的扩张，快于新增 logo 的获取速度。
sensitivity:
- variable: ARPU
  downsideCase: $2.70K 单店年支出
  baseCase: $2.99K 单店年支出
  upsideCase: $3.30K 单店年支出
  y3RevenueImpactK: -17.5
  cashImpactK: -12.3
- variable: CAC
  downsideCase: 因为创始人主导销售拉长而升至每家活跃门店 $2.4K CAC
  baseCase: 每家活跃门店 $1.8K CAC
  upsideCase: 借助伙伴杠杆降至每家活跃门店 $1.4K CAC
  y3RevenueImpactK: 0.0
  cashImpactK: -42.0
- variable: 流失率
  downsideCase: 由于切口过窄或连锁收缩，月流失率升至 2.0%
  baseCase: 月流失率 1.2%
  upsideCase: 随着连锁扩张更顺，月流失率降至 0.8%
  y3RevenueImpactK: -12.0
  cashImpactK: -28.0
- variable: 销售周期
  downsideCase: 拖到 9 个月，因为数据导出和买方签字都更慢
  baseCase: 6 个月
  upsideCase: 靠可复制的集成 playbook 缩到 4.5 个月
  y3RevenueImpactK: -35.0
  cashImpactK: -95.0
- variable: 毛利率
  downsideCase: 由于支持和 onboarding 仍然手工，毛利率 64%
  baseCase: 目标毛利率 70%
  upsideCase: 连接器更干净时提升到 73%
  y3RevenueImpactK: 0.0
  cashImpactK: -10.8
- variable: 招聘节奏
  downsideCase: 提前一年多招 1 名工程师和 1 名实施负责人
  baseCase: 按 BP 节奏招聘
  upsideCase: 把最后一个工程岗位推迟到 post-seed 之后
  y3RevenueImpactK: 0.0
  cashImpactK: -120.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: "flowchart LR\n  TargetChains[目标连锁] --> PaidPilots[付费试点门店]\n  PaidPilots --> LiveStores[活跃管理门店]\n  LiveStores --> Revenue[按门店收取的 SaaS 收入]\n  Revenue --> GrossProfit[70% 毛利下的毛利润]\n  GrossProfit --> Cash[扣除 opex 后的期末现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: base case 的收入，来自把一个 6 店 pilot 扩成 Y3 Q4 约 70 家活跃门店，单店按研究测得的 $2.988K 年价位计费；这样可以做到约 $209K 的 exit ARR，但 Y3 实际确认收入只有 $181K。
- checkName: 必须做对的事
  finding: 公司必须足够快地把首个 pilot 转成全连锁 rollout，这样创始人主导销售负责拿下 logo，而已有 logo 贡献大部分门店增长。
- checkName: 模型会在哪儿断掉
  finding: 如果数据就绪审计或买方信任把销售周期拖向 9 个月，模型会最快恶化——因为收入仍然很小，但精瘦团队的现金消耗不会同步下降。
- checkName: 下一轮融资证明点
  finding: 要想拿到一轮有说服力的 seed，至少得在 Y2 Q4 证明：已有 2–3 家生产级连锁、40+ 家活跃门店，以及一条可复制的 onboarding 路径，足以说明这是一款产品软件而不是咨询项目。
sanityChecks:
  ruleOf40: Y3 增长率 142.0% + EBITDA 利润率 -203.0% = -61.0%。
  burnMultiple: Y1 的 burn multiple 约为 18.9x，对应 $29.9K 的 exit ARR；Y2 改善到约 3.9x，对应 $95.6K 的净新增 ARR；Y3 为约 4.4x，对应 $83.7K 的净新增 ARR。
  revenuePerFte: 按年度收入和年末 7 名 FTE 计算，Y3 的 revenue per FTE 为 $25.8K（SaaS 基准约 $200–400K）。
  flags:
  - 研究得出的滩头市场太小，即便在第 3 年吃到全部 SOM，exit ARR 也只有约 $209K，远低于典型风险投资项目需要的收入密度。
  - 收入/FTE 长时间显著低于软件行业基准，因为在切口还不够大之前，公司就必须提前承担产品和实施能力。
  - 模型假设一条连锁 pilot 会在 Y1 晚些时候转成多门店 rollout；如果这个 pilot 卡住，pre-seed 轮仍能支持学习，但讲不出有说服力的 seed 故事。
