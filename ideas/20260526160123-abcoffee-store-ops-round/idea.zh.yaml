topRisks:
- name: 集成阻力
  description: 咖啡连锁可能同时跑着割裂的 POS、点单和库存系统，拖慢部署节奏，也把价值兑现时间往后推。
  mitigation: 先找已经拥有自有点单 app 的连锁，从只覆盖 app 需求、关键原料和单店销量的窄数据协议起步。
- name: 预测信任缺口
  description: 如果系统在几个高峰时段判断失准，或者看起来脱离门店本地情境，门店运营方就可能直接无视建议。
  mitigation: 先以“经理在环”的建议模式上线，展示按时段拆开的偏差追踪，先在一个城市簇跑出结果，再向全连锁扩。
- name: 现有厂商打包跟进
  description: 一旦这个品类被验证有吸引力，大型餐饮软件厂商就可能补上基础预测能力。
  mitigation: 更快沉淀订阅专属数据集，吃透时段运营流程，并跨多个前端点单系统集成，而不是去做完整 POS 替代。
