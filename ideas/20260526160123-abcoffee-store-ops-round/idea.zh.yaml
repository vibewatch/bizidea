jobsToBeDone:
- job: 当咖啡连锁在规划次日门店备料时，帮助运营团队把 app 需求和预付饮品承诺转成合适的原料与排班方案，让高峰能接住需求，又不至于备太多。
  currentAlternative: 靠店长判断，再辅以 POS 导出和表格预测
  successMetric: 缺货率、原料浪费比例，以及单店贡献毛利
- job: 当连锁进入新城市开店时，帮助区域经理尽早发现哪些门店的订阅核销和订单结构已经偏离计划，好在单位经济模型恶化前就修正补货和排班。
  currentAlternative: 看日终报表，再由门店和总部运营被动打电话补救
  successMetric: 异常处理时长，以及预测饮品需求与实际需求的偏差
