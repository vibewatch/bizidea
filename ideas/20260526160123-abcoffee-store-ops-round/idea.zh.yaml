problem: 新兴咖啡连锁往往前台是消费级 app，后台却还靠表格、WhatsApp 消息和店长经验在跑。等到订阅和 app 订单占到有分量的比例后，运营团队每天都得判断每家店、每个时段该备多少牛奶、咖啡豆、冰块、点心和人手，但多数 QSR 技术栈仍把订阅当成营销功能，而不是运营输入。结果就是：高需求饮品容易缺货，慢店原料容易浪费，单位经济模型也会随着扩张进一步变差。
targetUser:
  primary: 印度 20–150 家店、拥有自有点单 app 和循环饮品订阅或预付通行证计划的咖啡或茶饮连锁的运营负责人或供应链负责人
  secondary: 负责备料计划、班次排班和每日原料下单的区域经理和店长
  buyer: COO 或运营副总裁
startupThesis:
  nonObviousInsight: 真正的洞见是：饮品订阅不只是拉忠诚度的闭环。只要连锁通过自有 app 预售了数万杯饮品，它就已经拿到可前瞻的需求信号，可以直接驱动门店运营。市场之所以变了，是因为数字化点单和订阅已经离收银台足够近，能直接影响采购、备料和排班，而传统餐饮系统原本就不是按这个逻辑设计的。
  beachhead: 印度的咖啡和精品茶连锁：20–150 家城市门店、集中采购、拥有自有移动点单 app，并且靠订阅或预付饮品通行证拉动高频外带需求
  wedge: 一套感知订阅的门店运营系统，把 app 订单、预付饮品承诺和历史售罄数据，转成门店-时段级的备料计划、原料补货目标和异常提醒
  whyNowCatalyst: abcoffee 的融资和公开投资方向说明，app 驱动、订阅占比高的饮品连锁，已经痛到愿意为后端新基础设施单独列预算。
  ventureScalePath: 先从咖啡连锁的饮品需求规划切入，再扩到中央厨房预测、浪费控制、排班、本地化选品、会员促销优化，最终做成数字原生快餐连锁的完整运营系统。
solution: 产品接入连锁的点单 app、POS 和基础库存数据流，同时利用预付订阅承诺和实时订单速度，按门店和时段预测饮品需求。系统会告诉每家店关键原料和即配备料该备多少、什么时候该向中央厨房或分销商触发补货，以及在高峰前哪些地方的需求很可能会顶穿人手或库存。区域经理拿到的不是又一个报表工具，而是一张异常看板：哪里可能缺货、哪里备多了、哪里订阅核销会突然冲高。第一款产品不是通用 AI 助手，而是把一个最痛的运营流程做成控制闭环，而且连锁手上本来就有足够的数据把它跑通。长期看，系统会沉淀关于核销行为、饮品结构、浪费和门店生产率的专有数据集，每开一家新店就会变得更准。
goToMarketSeed:
  firstCustomer: 一家拥有 30–80 家门店、集中在地铁城市、实行集中原料采购、自有 app 订单占比超过 25%，并且运营预付饮品订阅或会员计划的印度咖啡连锁
  buyingTrigger: 新城市开张、高峰外带时段反复缺货，或 CFO 在快速扩张后要求提升门店贡献毛利
  currentAlternative: 用表格手工做需求规划、靠店长拍脑袋下单、看基础 POS 报表，再配上并不建模订阅核销行为的通用餐饮 ERP 或库存工具
  switchingReason: 这个切口不用替换消费者 app 或核心 POS，就能直接改善单位经济模型，而且能很快用更少缺货、更低原料浪费和围绕可预测订阅需求的更紧排班来证明价值。
  pricingHypothesis: 按门店按月收平台费；更高档位再按月度订阅饮品量，以及被管理的 SKU 数量或时段数量计价。
