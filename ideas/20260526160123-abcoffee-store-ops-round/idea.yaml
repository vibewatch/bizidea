jobsToBeDone:
  - job: >-
      When a coffee chain is planning the next day's store prep, help the ops
      team convert app demand and prepaid drink commitments into the right
      ingredient and labor plan, so they can serve the rush without overproducing.
    currentAlternative: Store-manager judgment supported by POS exports and spreadsheet forecasts
    successMetric: Stockout rate, ingredient waste percentage, and contribution margin per store
  - job: >-
      When a chain opens new city clusters, help area managers spot stores where
      subscription redemption and order mix are drifting from plan, so they can
      correct replenishment and staffing before unit economics deteriorate.
    currentAlternative: End-of-day reporting and reactive calls between stores and central operations
    successMetric: Time to resolve exceptions and variance between forecasted and actual beverage demand
