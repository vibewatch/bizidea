problem: >-
  Emerging coffee chains often run stores with a consumer-grade app on the
  front end and spreadsheets, WhatsApp messages, and manager intuition on the
  back end. Once subscriptions and app orders become a meaningful share of
  demand, operators must decide how much milk, beans, ice, pastries, and labor
  each store needs by daypart, but most QSR stacks still treat subscriptions as
  a marketing feature instead of an operations input. The result is preventable
  stockouts on high-demand drinks, ingredient waste on slow stores, and weak
  unit economics that get worse as the chain expands.
targetUser:
  primary: >-
    Head of operations or supply chain at a 20-150 store coffee or tea chain in
    India with an owned ordering app and a recurring beverage subscription or
    prepaid pass program
  secondary: >-
    Area managers and store managers responsible for prep planning, shift
    staffing, and daily ingredient ordering
  buyer: COO or VP of operations
startupThesis:
  nonObviousInsight: >-
    The insight is that beverage subscriptions are not merely a loyalty loop.
    Once a chain pre-sells tens of thousands of drinks through its own app, it
    has forward-looking demand signals that can run store operations. The
    market changed because digital ordering and subscriptions now sit close
    enough to the cash register to inform procurement, prep, and staffing in a
    way legacy restaurant systems were not built to do.
  beachhead: >-
    Indian coffee and premium tea chains with 20-150 urban stores, centralized
    procurement, an owned mobile ordering app, and a subscription or prepaid
    beverage pass that drives repeat takeaway demand
  wedge: >-
    A subscription-aware store operations system that converts app orders,
    prepaid beverage commitments, and historical sell-through into store-daypart
    prep plans, ingredient replenishment targets, and exception alerts
  whyNowCatalyst: >-
    abcoffee's funding and stated investment priorities show that app-led,
    subscription-heavy beverage chains now feel backend operations pain strongly
    enough to budget for new infrastructure.
  ventureScalePath: >-
    Start with drink-demand planning for coffee chains, then expand into
    commissary forecasting, wastage control, labor scheduling, local assortment,
    loyalty promotion optimization, and eventually a full operating system for
    digitally native quick-service chains.
solution: >-
  The product plugs into a chain's ordering app, POS, and basic inventory feeds
  to forecast beverage demand by store and daypart using both paid-ahead
  subscription commitments and live order velocity. It tells each store how
  much of key ingredients and ready-to-serve prep it should hold, when to trigger
  replenishment from a commissary or distributor, and where demand looks likely
  to outrun labor or inventory before the rush starts. Area managers get an
  exception dashboard for likely stockouts, overproduction, and subscription
  redemption spikes rather than another reporting tool. The first product is not
  a generic AI assistant; it is a control loop for one painful operational
  workflow that chains already have the data to automate. Over time, the system
  builds a proprietary dataset on redemption behavior, drink mix, waste, and
  store productivity that improves every new store opening.
goToMarketSeed:
  firstCustomer: >-
    A 30-80 store Indian coffee chain with metro density, centralized ingredient
    procurement, more than 25 percent of orders through its own app, and a
    prepaid drink subscription or membership program
  buyingTrigger: >-
    A new city launch, recurring stockouts during peak takeaway windows, or a
    CFO mandate to improve store contribution margin after rapid expansion
  currentAlternative: >-
    Manual demand planning in spreadsheets, store-manager ordering judgment,
    basic POS reports, and generic restaurant ERP or inventory tools that do not
    model subscription redemption behavior
  switchingReason: >-
    The wedge improves unit economics without replacing the consumer app or core
    POS, and it can prove value quickly through fewer stockouts, lower ingredient
    waste, and tighter labor deployment around predictable subscription demand
  pricingHypothesis: >-
    Platform fee priced per store per month, with higher tiers based on monthly
    subscription beverage volume and the number of managed SKUs or dayparts
