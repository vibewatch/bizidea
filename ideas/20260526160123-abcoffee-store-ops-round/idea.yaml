differentiator: >-
  Restaurant inventory tools mostly look backward, while loyalty and app vendors
  optimize demand capture. This company sits in the missing middle by turning
  prepaid beverage demand and app order flow into operational actions at the
  store-daypart level. Its moat compounds from a chain-specific dataset linking
  subscription commitments, redemption timing, ingredient usage, rush-hour
  throughput, and realized margin by store format, which is difficult for
  generic restaurant software to replicate quickly.
