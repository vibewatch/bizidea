topRisks:
  - name: Integration friction
    description: Coffee chains may run fragmented POS, ordering, and inventory systems that slow deployment and delay time to value.
    mitigation: Start with chains that already own their ordering app and use a narrow initial data contract focused on app demand, key ingredients, and store-level sales.
  - name: Forecast trust gap
    description: Store operators may ignore recommendations if the system is wrong during a few peak periods or feels disconnected from local context.
    mitigation: Launch with manager-in-the-loop recommendations, show variance tracking by daypart, and prove wins in one city cluster before expanding chain-wide.
  - name: Incumbent bundling
    description: Large restaurant software vendors could add basic forecasting once the category proves attractive.
    mitigation: Move faster on the subscription-specific dataset, own the daypart ops workflow, and integrate across multiple front-end ordering systems rather than competing as a full POS replacement.
