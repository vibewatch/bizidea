scenarios:
  downside:
    description: Trigger frequency is weaker than planned, paid pilots convert more slowly, and onboarding remains too bespoke to hit the target margin profile.
    y3RevenueK: 2250.0
    y3EbitdaK: -220.0
    cashLowPointK: 80.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches about 17 instead of 25.
    - Blended annual value lands near $145K instead of the researched ~$160K level.
    - Gross margin exits around 65% because benchmark normalization and security packaging stay more manual.
  base:
    description: Design partners convert on roughly one-quarter proof cycles, the initial target matrix covers most demand, and modest per-target usage lifts contracts to the researched SOM level by Y3 exit.
    y3RevenueK: 3114.0
    y3EbitdaK: 242.5
    cashLowPointK: 369.6
    keyAssumptionChanges:
    - 3 paying accounts by M12, 10 by Q4Y2, and 25 by Q4Y3.
    - Exit blended annual value reaches about $160K per paying account.
    - Gross margin reaches the BP target 70% by Q4Y3 as benchmark and security-review work becomes more repeatable.
  upside:
    description: Cloud-partner sourcing works early, second-target usage attaches faster, and the team standardizes onboarding before adding much more headcount.
    y3RevenueK: 3600.0
    y3EbitdaK: 620.0
    cashLowPointK: 500.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches about 28 instead of 25.
    - Second-target and promoted-release-lane usage lift annual value toward about $175K.
    - Gross margin reaches about 72% because private-cluster and managed-cloud playbooks reuse faster than expected.
sensitivity:
- variable: ARPU
  downsideCase: Annual contracts and usage exit about 10% below plan.
  baseCase: Exit blended annual value reaches about $160K per paying account.
  upsideCase: Per-target and promoted-release-lane usage lifts annual value about 8% above plan.
  y3RevenueImpactK: -311.4
  cashImpactK: -220.0
- variable: CAC
  downsideCase: Founder-led and partner-sourced selling underperform, pushing CAC toward $65K.
  baseCase: CAC stays near $50K with concentrated direct outreach and limited paid marketing.
  upsideCase: Co-sell introductions keep CAC near $42K.
  y3RevenueImpactK: -120.0
  cashImpactK: -170.0
- variable: churn
  downsideCase: Monthly churn rises to about 3.0% if the wedge feels too episodic.
  baseCase: Monthly churn holds near 2.0% once the release-control workflow is embedded.
  upsideCase: Monthly churn stays near 1.2% because policy packs and failover drills become sticky workflow.
  y3RevenueImpactK: -150.0
  cashImpactK: -130.0
- variable: sales cycle
  downsideCase: Pilot-to-production conversion stretches from about 90 to about 150 days.
  baseCase: Paid pilots convert in roughly one quarter after one successful qualification cycle.
  upsideCase: A live procurement trigger and partner sponsor compress conversion toward about 60 days.
  y3RevenueImpactK: -420.0
  cashImpactK: -260.0
- variable: gross margin
  downsideCase: Gross margin stalls near 65% because benchmark setup and security packaging stay custom.
  baseCase: Gross margin exits at 70% after the adapter matrix and review pack standardize.
  upsideCase: Gross margin reaches 72% as private-cluster and managed-cloud workflows converge faster.
  y3RevenueImpactK: 0.0
  cashImpactK: -200.0
- variable: hiring pace
  downsideCase: Two scale hires are pulled into Y2 before the repeatable co-sell motion is proven.
  baseCase: Scale hiring waits until after conversion proof and follows the BP sequencing.
  upsideCase: The second solutions hire is delayed without slowing delivery because onboarding shrinks below two weeks.
  y3RevenueImpactK: 60.0
  cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TriggeredAccounts[Triggered coding-agent accounts] --> PaidPilots[Paid portability pilots]
      PaidPilots --> AnnualContracts[Annual production contracts]
      AnnualContracts --> TargetExpansion[More targets and release lanes]
      TargetExpansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue is driven by moving from 3 paying pilots or contracts at Y1 exit to 25 paying accounts by Q4Y3 while exit annual value lands near the researched $160K SOM level.
- checkName: Must go right
  finding: Paid pilots must convert to annual production in about one quarter and the initial Together/Fireworks/KServe-vLLM matrix must cover most demand, or the sales-cycle sensitivity pushes seed proof out.
- checkName: Model breaks if
  finding: If trigger frequency is weaker than planned and gross margin stalls near 65%, the downside case drives cash close to roughly $0.1M before the repeatable co-sell motion is proven.
- checkName: Next-round proof
  finding: The next financing case is 8-10 paying customers, 2-3 annual conversions, and one repeatable cloud-partner co-sell by late Y2, which is exactly what the $2.0M ask is sized to reach with buffer.
sanityChecks:
  ruleOf40: Y3 growth 205.9% + EBITDA margin 7.8% = 213.7%
  burnMultiple: Y2 burn multiple is about 0.8x using roughly $0.81M of EBITDA burn against about $1.05M of net new ARR; Q2Y3 turns EBITDA positive.
  revenuePerFte: $346K Y3 on 9 ending FTE (benchmark $200-400K SaaS)
  flags:
  - The year-3 base case lands all 25 researched SOM customers by Q4Y3, so the model assumes strong execution inside a concentrated buyer pool of roughly 300 SAM accounts.
  - CustomersEop includes paid pilots as well as annual contracts, so recurring-only production logos trail the headline count through most of Y1.
  - Gross margin reaches the 70% target only if benchmark setup, rollback drills, and security review packs become repeatable rather than bespoke services work.
  - Founder-led GTM does most of the early selling; if cloud-partner sourcing or founder access slips, customer count is the fastest way this model misses.
  - Cash is modeled as EBITDA, so pilot prepayments, enterprise procurement timing, or customer-specific security implementation costs could shift actual cash timing even if the P&L lands on plan.
