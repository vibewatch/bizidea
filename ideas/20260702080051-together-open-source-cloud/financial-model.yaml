slug: open-weight-release-packager
date: '2026-07-02'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-02] the model begins with the first full operating month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model burn curve] base case uses the low end of the asked range to reach late-Y2 seed proof with roughly six months of buffer.'
- id: A3
  name: Starting paying accounts
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first win paid portability pilots.'
- id: A4
  name: Paying account definition
  value: A paid pilot or an annual production contract under active release control.
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop counts any account already paying for pilot or production scope so Y1 pilot revenue reconciles cleanly.'
- id: A5
  name: Paid pilot economics
  value: $30K over about 2 months (~$15K/mo)
  unit: USD/account
  source: '[BP gtm.pricing $25k-$40k pilot + BP investorMemo.firstCustomer.initialContract 6-8 week pilot] the model uses the midpoint of the pilot band and recognizes it over roughly the pilot duration.'
- id: A6
  name: Annual contract and usage economics
  value: Production contracts start near $150K ARR and exit Y3 near $160K ARR as active deployment targets and promoted release lanes attach modest usage.
  unit: USD/account/year
  source: '[BP gtm.pricing $120k-$180k annual subscription plus usage + Research market.som 25 customers at ~$160k ACV] base case stays inside the BP range and matches the researched SOM math.'
- id: A7
  name: Customer ramp
  value: 3 paying accounts by M12, 10 by Q4Y2, 25 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months + Research market.som] the base case matches 3 paid pilots in Y1, 8-10 customers by late Y2, and roughly 25 customers by year 3.'
- id: A8
  name: Revenue recognition convention
  value: 'Period-end paying accounts multiplied by blended realized revenue per paying account for that period: about $12K-$15K per month in Y1, $33K-$38K per quarter in Y2, and $38K-$40K per quarter in Y3.'
  unit: formula
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som] this keeps revenue directly traceable to customers and the planned pilot-to-production mix.'
- id: A9
  name: Gross margin ramp
  value: 45%-52% in Y1, 56%-66% in Y2, and 68%-70% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + startup-finance heuristic] early pilot onboarding and benchmark normalization are services-heavy before adapters and security review packs become reusable.'
- id: A10
  name: Hiring timeline
  value: M1 founder and founding engineer; M4 platform/runtime engineer; M7 solutions engineer; M13 GTM/partnerships lead; M16 third engineer; M22 ops; M27 fourth engineer; M31 second solutions hire.
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays engineering-first, adds solutions before scale GTM, and keeps the team lean until repeatable cloud co-sell proof appears.'
- id: A11
  name: Founder loaded compensation
  value: $160K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic] reflects modest founder cash compensation plus payroll taxes and benefits at pre-seed stage.'
- id: A12
  name: Engineering loaded compensation
  value: $200K
  unit: USD/year
  source: '[BP team Founding eng and Platform/runtime engineer + startup-finance heuristic] the product needs senior infrastructure and model-release engineering talent, but compensation remains below late-stage market cash levels.'
- id: A13
  name: Solutions loaded compensation
  value: $170K
  unit: USD/year
  source: '[BP team Solutions engineer + startup-finance heuristic] covers technical onboarding, benchmark reviews, and enterprise security hand-holding without building a large services bench.'
- id: A14
  name: GTM / partnerships loaded compensation
  value: $180K
  unit: USD/year
  source: '[BP gtm.channels + BP milestones repeatable cloud co-sell motion + startup-finance heuristic] includes concentrated enterprise selling and partner development once the founder-led motion is proven.'
- id: A15
  name: G&A / ops loaded compensation
  value: $120K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] covers basic finance, vendor management, security paperwork, and internal operations.'
- id: A16
  name: Payroll allocation to P&L lines
  value: Founder 60% S&M / 20% R&D / 20% G&A; engineering 100% R&D; solutions 50% S&M / 50% R&D; GTM 100% S&M; ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] functional allocation reflects founder-led sales, engineering-heavy delivery, and solutions work split between onboarding and product feedback loops.'
- id: A17
  name: Non-payroll opex ramp
  value: Monthly non-payroll spend rises from S&M/R&D/G&A of $5K/$9K/$4K in early Y1 to $14K/$15K/$10K by Q4Y3.
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] covers benchmark compute, travel, legal, insurance, partner work, and compliance tooling without assuming a large brand-marketing engine.'
- id: A18
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at pre-seed scale.'
- id: A19
  name: Steady-state monthly logo churn
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP gtm.funnelTargets 40%+ expansion within 12 months] once the release-control layer is embedded, churn should be low but not mature-SaaS perfect.'
- id: A20
  name: Base sales cycle
  value: Roughly 90 days from paid pilot start to annual production conversion
  unit: days
  source: '[BP gtm.wedge 6-8 week pilot + BP experimentRoadmap 90-180 days + BP gtm.funnelTargets 50%+ pilot-to-production] the model assumes one quarter is enough to prove second-target qualification and close the first production commitment.'
- id: A21
  name: CAC convention
  value: Total 36-month sales and marketing spend divided by 25 net new paying accounts
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures founder-led selling, partner-sourced opportunities, and solutions-heavy acquisition work across the buildout period.'
- id: A22
  name: Next-round milestone for funding sizing
  value: By late Y2 the company should have 8-10 paying customers, 2-3 annual production conversions, and one repeatable cloud-partner co-sell motion.
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP investorMemo.verdict.nextDiligence] the pre-seed is sized to reach seed-ready proof on conversion, referenceability, and partner leverage.'
- id: A23
  name: Quarterly salary-roll convention
  value: Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only the quarter-end snapshots
  unit: convention
  source: '[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent with the monthly hiring ramp even when only year-end snapshots are exposed for Y2 and Y3.'
