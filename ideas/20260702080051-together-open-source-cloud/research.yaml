  - 4
  - 5
- name: Fireworks AI
  stage: scale-up
  wedge: Enterprise AI cloud with serverless, dedicated deployments, LoRA deployment, and traffic routers.
  pricing: Public serverless token pricing; dedicated and reserved capacity are sales-led.
  strength: Fast open-weight serving plus traffic-management and LoRA options.
  weaknessVsUs: Best at being the host, not the neutral release layer across hosts.
  sourceRefs:
  - 6
