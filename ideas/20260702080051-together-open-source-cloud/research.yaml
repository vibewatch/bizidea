  - 12
  - 13
  - 14
  - 15
- name: BentoML
  stage: scale-up
  wedge: Packages AI services into reproducible artifacts and supports canary deployment across cloud targets.
  pricing: Open-source packaging core; managed-cloud pricing is not publicly detailed in retained sources.
  strength: Closest conceptual match to artifact packaging and deployment reproducibility.
  weaknessVsUs: Needs extra provider-neutral benchmarking, cutover, and spend-routing logic to solve the full portability problem.
  sourceRefs:
  - 16
  - 17
- name: KServe + vLLM stack
  stage: open-source
  wedge: Kubernetes-native LLM serving with canary rollout, high-performance serving, caching, and self-hosted control.
  pricing: Open source; the buyer pays for Kubernetes, GPUs, and integration labor.
  strength: Maximum control for private clusters and sophisticated platform teams.
  weaknessVsUs: High assembly burden; release governance and cross-cloud equivalence still sit on the customer.
