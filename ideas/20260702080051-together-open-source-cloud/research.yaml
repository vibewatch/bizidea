  validationPlan:
  - priority: high
    question: How often do coding-agent vendors lose or delay enterprise deals because they cannot prove second-cloud failover or regional deployment control?
    evidenceToGather: Procurement redlines, deal postmortems, and references from 5-10 beachhead design partners.
  - priority: high
    question: Will design partners let the startup ingest model artifacts, eval suites, and deployment telemetry deeply enough to build a reusable migration corpus?
    evidenceToGather: Pilot data-sharing agreements, sample eval bundles, and security reviews of credential scope and storage.
  - priority: medium
    question: Is the first wedge better sold as failover insurance, cost leverage, or faster adoption of new hardware generations?
    evidenceToGather: Message tests across live opportunities, pilot win-loss notes, and time-to-value comparisons by trigger type.
