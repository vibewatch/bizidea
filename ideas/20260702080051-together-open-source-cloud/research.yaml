openQuestions:
- How many beachhead coding-agent vendors already run enough fine-tuned open-weight traffic to justify a neutral release layer today, versus still relying on frontier APIs?
- 'Which second-cloud requirement appears most often in live deals: failover, regional residency, or price leverage?'
- What minimum target matrix (for example Together, Fireworks, Baseten, and KServe or vLLM) covers most early demand without creating integration sprawl?
- Can the startup access enough real golden-task eval data to build a compounding regression moat without becoming services-heavy?
