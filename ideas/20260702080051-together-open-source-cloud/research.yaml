    ## WebSockets Functions annotated with `@modal.web_server`, `@modal.asgi_app`, or `@modal.wsgi_app` also support the WebSocket protocol. Consult your web framework for appropriate documentation on how to use WebSockets with that library. WebSockets on Modal maintain a single function call per connection, which can be useful for keeping state around. Most of the time, you will want to set your handler function to [allow concurrent inputs](/docs/guide/concurrent-inputs), which allows multiple simultaneous WebSocket connections to be handled by the same container. We support the full WebSocket protocol as per [RFC 6455](https://www.rfc-editor.org/rfc/rfc6455), but we do not yet have support for [RFC 8441](https://www.rfc-editor.org/rfc/rfc8441) (WebSockets over HTTP/2) or [RFC 7692](https://datatracker.ietf.org/doc/html/rfc7692) (`permessage-deflate` extension). WebSocket messages can be up to 2 MiB each. ## Performance and scaling If you have no active containers when the Web Function
    receives a request, it will experience a "cold start". Consult the guide page on [cold start performance](/docs/guide/cold-start) for more information on when Functions will cold start and advice how to mitigate the impact. If your Function uses `@modal.concurrent`, multiple requests to the same URL may be handled by the same container. Beyond this limit, additional containers will start up to scale your App horizontally. When you reach the Function''s limit on containers, requests will queue for handling. Each workspace on Modal has a rate limit on total operations. For a new account, this is set to 200 Function calls or HTTP requests per second, with a burst multiplier of 5 seconds. If you reach the rate limit, excess requests will return a [429 status code](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/429), and you''ll need to [get in touch](mailto:support@modal.com) with us about raising the limit. Web Function request bodies can be up to 4 GiB, and their response bodies
    are unlimited in size. ## Authentication Modal offers first-class Web Function protection via [proxy tokens](https://modal.com/docs/guide/webhook-proxy-auth). Proxy tokens protect Web Functions by requiring a key and token combination to be passed in the `Modal-Key` and `Modal-Secret` headers. Modal works as a proxy, rejecting requests that aren''t authorized to access your endpoint. We also support conventional techniques for securing web servers. ### Token-based authentication This is easy to implement in whichever framework you''re using. For example, if you''re using `@modal.fastapi_endpoint` or `@modal.asgi_app` with FastAPI, you can validate a Bearer token like this: ```python from fastapi import Depends, HTTPException, status, Request from fastapi.security import HTTPBearer, HTTPAuthorizationCredentials import modal image = modal.Image.debian_slim().pip_install("fastapi[standard]") app = modal.App("auth-example", image=image) auth_scheme = HTTPBearer() @app.function(secrets=[modal.Secret.from_name("my-web-auth-token")])
    @modal.fastapi_endpoint() async def f(request: Request, token: HTTPAuthorizationCredentials = Depends(auth_scheme)): import os print(os.environ["AUTH_TOKEN"]) if token.credentials != os.environ["AUTH_TOKEN"]: raise HTTPException( status_code=status.HTTP_401_UNAUTHORIZED, detail="Incorrect bearer token", headers={"WWW-Authenticate": "Bearer"}, ) # Function body return "success!" ``` This assumes you have a [Modal Secret](https://modal.com/secrets) named `my-web-auth-token` created, with contents `{AUTH_TOKEN: secret-random-token}`. Now, the URL will return a 401 status code, except when you hit it with the correct `Authorization` header set (note that you have to prefix the token with `Bearer `): ```bash curl --header "Authorization: Bearer secret-random-token" https://modal-labs--auth-example-f.modal.run ``` ### Client IP address You can access the IP address of the client making the request. This can be used for geolocation, whitelists, blacklists, and rate limits. ```python from fastapi
    import Request import modal image = modal.Image.debian_slim().pip_install("fastapi[standard]") app = modal.App(image=image) @app.function() @modal.fastapi_endpoint() def get_ip_address(request: Request): return f"Your IP address is {request.client.host}" ```)'
