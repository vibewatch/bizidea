    and humidity level for all hardware. ## Tabnine SaaS setup Tabnine''s SaaS deployment includes an end-to-end encryption system to ensure that the communication between our client’s users and our servers remains completely secure. * **End-to-end encryption:** As the user codes and Tabnine provides suggestions, the data sent from the user''s machine to our servers is encrypted using industry-standard encryption algorithms. This ensures that the data can’t be read or tampered with during transit. Likewise, when our servers send back code suggestions to the user''s machine, this data is also encrypted. This encryption process ensures that only the user''s machine and our servers can decrypt and understand the data, making it secure from eavesdropping or person-in-the-middle attacks. * **Transport Layer Security (TLS):** We use TLS — a widely adopted security protocol — for securing the communication channel between the client''s machine and our servers. TLS ensures that the data is not only
    encrypted but also that the integrity and authenticity of the data are maintained. * **No code storage policy (ephemeral processing):** At Tabnine, we recognize the sensitive nature of the codebase. This means that we adhere to a strict policy wherein no code is stored on our servers. The code is only ephemerally processed to provide coding suggestions and is then immediately discarded. This minimizes the risk of any unauthorized access or data breaches concerning your code. * **Data handling compliance:** In addition to end-to-end encryption, Tabnine complies with various international standards and regulations regarding data handling and privacy. This ensures that our practices are aligned with the best industry standards. * **Continuous monitoring and audits:** Our security team continuously monitors for vulnerabilities and conducts regular audits to ensure that our security infrastructure is up to the latest standards. This ensures that our customers'' data is handled with the utmost
    care and security. ## Application security **Software development life cycle:** Software development and change management at Tabnine are performed in a manner that helps ensure applications are properly designed, tested, approved, and aligned to Tabnine’s customers’ business objectives. Changes are discussed, evaluated, and approved by relevant managers from Product, Development, and DevOps. Changes are documented and approved within an SDLC application. Personnel responsibilities for the design, acquisition, implementation, configuration, modification, and management of systems are assigned. In addition, changes performed to the application are communicated to Tabnine’s customers through release notes. **Data encryption:** All traffic between the customer client and Tabnine’s Server is encrypted using HTTPS TLS 1.2. Stored data is encrypted on a disk using a 256-bit AES cipher. **Threat and mitigation analysis:** Tabnine will typically perform a threat and mitigation analysis with
    security consultants for new products and major changes. **User identity:** For cloud solutions, Tabnine uses [Google Cloud Identity](https://cloud.google.com/identity) to manage user identity, supporting customers using either strong user/password authentication **or** using provider identity including GitHub, Google, or Microsoft accounts using OAuth2 (user can only choose one of the methods, not both). In the self-hosted solution, built-in user/password authentication is available, as well as support for SAML2 SSO integration. **Authentication:** All requests from client to server are protected by JWT with an expiration period of 1 hour. **User permissions:** Tabnine provides two levels of user permissions. A user can be assigned to either "member" or "admin" on the Members page in Tabnine’s web admin application. Admin permission allows control over team membership, payments, and code repository integrations. **Self-service user management:** Tabnine provides a self-service user
    management system. The customer’s admins have access to a user management console. There, the team admin can manage users for the account. **Default password policy:** A user password must be at least six characters long and contain at least one letter and one digit character. Upon password loss, the user can unlock the account by going through the "forgot password" procedure, which allows them to choose a new password after being authenticated through email. ### Enterprise security Tabnine Enterprise customers Tabnine in a private installation to comply with the strictest enterprise security and privacy policies. --- # Agent Instructions This documentation is published with GitBook. GitBook is the documentation platform designed so that both humans and AI agents can read, navigate, and reason over technical content effectively. Learn more at gitbook.com. ## Querying This Documentation If you need additional information that is not directly available in this page, you can query the documentation
    dynamically by asking a question. Perform an HTTP GET request on the current page URL with the `ask` query parameter, and the optional `goal` query parameter: ``` GET https://docs.tabnine.com/main/welcome/readme/security.md?ask= &goal= ``` `ask` is the immediate question: it should be specific, self-contained, and written in natural language. `goal` is optional and describes the broader end goal you are ultimately trying to accomplish on behalf of the user. GitBook uses it to tailor the answer towards what is most useful for that goal. The response will contain a direct answer to the question and relevant excerpts and sources from the documentation. Use this mechanism when the answer is not explicitly present in the current page, you need clarification or additional context, or you want to retrieve related documentation sections.)'
