- name: Baseten
  stage: scale-up
  wedge: Inference platform with deployments, environments, CI/CD, regional routing, and fast iteration loops.
  pricing: Sales-led enterprise pricing; retained sources emphasize workflow features over a public rate card.
  strength: Closest managed-platform fit to release operations and enterprise deployment control.
  weaknessVsUs: Still centered on Baseten as the runtime rather than a cross-provider portability layer.
  sourceRefs:
