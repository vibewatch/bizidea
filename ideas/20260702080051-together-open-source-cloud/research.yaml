competitors:
- name: Together AI
  stage: scale-up
  wedge: Open-source AI cloud with serverless, dedicated endpoints, and coding-agent performance claims.
  pricing: Public token pricing plus dedicated GPU hourly rates.
  strength: Strong code-workload credibility and frontier hardware access.
  weaknessVsUs: Still optimized for Together's own estate and does not neutralize multi-provider packaging by default.
