problem: >-
  AI application vendors moving from frontier APIs to tuned open-weight code models now have more infrastructure choice,
  but every cloud exposes a different serving stack, model format, and performance envelope. When a team wants cheaper
  throughput, better hardware, or a second provider for uptime, migrating a production model still means hand-rebuilding
  runtimes, rerunning evals, and risking customer-visible latency regressions. That turns cloud choice into a release
  project instead of an operational knob, so teams either stay locked into one provider or delay their open-source roadmap.
targetUser:
  primary: Head of AI Platform at a 100-400 person coding-agent vendor running a fine-tuned open-weight code model on a single AI cloud
  secondary: ML platform engineer responsible for deployment, benchmark evaluation, and rollback
  buyer: VP Engineering or CTO
startupThesis:
  nonObviousInsight: >-
    The strategic control point in open-source AI will not just be the fastest cloud; it will be the release layer that
    keeps tuned models portable as price-performance leaderboards change. Once B200-backed, serverless open-weight clouds
    are good enough for coding agents, switching providers becomes frequent enough that portability becomes core
    infrastructure.
  beachhead: >-
    VC-backed code-review and code-completion vendors supporting 50-500 developer seats on a fine-tuned open-weight
    coding model, after a regulated design partner requires second-cloud failover before go-live.
  wedge: >-
    A release packager that turns a tuned code model, adapters, tokenizer settings, and golden coding-task evals into
    reproducible artifacts for multiple serverless and dedicated inference targets, then canaries cutovers before traffic
    shifts.
  whyNowCatalyst: >-
    Together's $800 million raise, on-demand B200 rollout, and public TPS claims for coding-agent workloads show that
    open-source-model clouds are now scaling fast enough to make portability an urgent operating problem.
  ventureScalePath: >-
    Start with coding-agent vendors, then expand the same release layer into support, document, and vertical AI
    applications that fine-tune open-weight models. Over time the company can own CI/CD, observability, rollback, and
    spend-routing for the broader open-source AI application stack.
solution: >-
  The product ingests a customer's tuned open-weight model, adapter stack, prompt template, tokenizer, and eval suite. It
  compiles provider-specific deployment bundles for each supported serverless or dedicated runtime, benchmarks them
  against the customer's coding tasks, and surfaces quality, latency, and cost deltas before release. It also manages
  shadow traffic, canary promotion, and one-click rollback so teams can add a second cloud or swap hardware generations
  without a migration fire drill. Over time it learns which runtime settings and hardware profiles work best for each
  workload, making portability smarter with every release.
goToMarketSeed:
  firstCustomer: >-
    VP Engineering at a 150-400 person coding-agent startup selling secure pull-request review and code-completion
    workflows to 50-300 engineer software teams, currently running one fine-tuned open-weight code model on a single AI
    cloud.
  buyingTrigger: >-
    A new enterprise prospect or renewal demands failover, procurement leverage, or lower-latency capacity before signing
    an annual contract.
  currentAlternative: Provider-specific DevOps scripts plus manual benchmark spreadsheets and ad hoc shadow-traffic tests
  switchingReason: >-
    The startup can add or swap an inference provider in days instead of weeks while preserving eval history, rollback
    paths, and customer-facing latency SLOs.
  pricingHypothesis: Annual platform fee plus usage-based pricing per active deployment target or promoted release lane
