jobsToBeDone:
  - job: When a better-priced or higher-performance AI cloud appears, help the AI platform lead port a tuned code model safely, so they can switch providers without breaking customer SLAs.
    currentAlternative: Manual runtime rewrites, provider dashboards, and one-off eval scripts
    successMetric: Second provider qualified and production-ready in under 7 days with no drop in eval pass rate or p95 latency
  - job: When a large customer demands failover before rollout, help the ML platform engineer add redundancy without duplicating months of deployment work, so they can close the deal confidently.
    currentAlternative: Stay single-cloud or build bespoke shadow environments by hand
    successMetric: Customer-facing failover drill passes and rollback completes in under 15 minutes
