topRisks:
  - name: Native-cloud catch-up
    description: Specialized AI clouds may ship their own migration and release tooling, reducing the need for an independent layer.
    mitigation: Stay neutral across multiple clouds and private clusters, and own the cross-provider benchmark and rollback workflows that vendor-native tools cannot cover.
  - name: Beachhead timing
    description: Many coding-agent vendors are still early and may not feel enough pain until they hit larger enterprise contracts.
    mitigation: Sell against concrete renewal or procurement events and target customers already running one production-tuned model with live design partners.
  - name: Runtime-surface sprawl
    description: Supporting too many model families and inference runtimes too early could turn the product into a costly integration project.
    mitigation: Start with a narrow matrix of code-model families and release targets, then expand only after repeated cutover patterns prove reusable.
