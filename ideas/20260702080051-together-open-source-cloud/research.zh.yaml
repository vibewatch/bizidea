  pricing: 公开的 token 定价，外加专用 GPU 小时费率。
  strength: 在代码负载上有很强的可信度，且能接入前沿硬件。
  weaknessVsUs: 仍然只为 Together 自己的地盘做优化，默认不会中立化多供应商打包。
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
  - 5
- name: Fireworks AI
  stage: scale-up
  wedge: 企业级 AI 云，提供无服务器、专用部署、LoRA 部署和流量路由器。
  pricing: 公开的无服务器 token 定价；专用和预留算力走销售主导模式。
  strength: 开放权重服务速度快，还有流量管理和 LoRA 选项。
  weaknessVsUs: 最擅长的是做主机本身，而不是跨主机的中立发布层。
  sourceRefs:
  - 6
  - 7
  - 8
  - 9
  - 10
- name: Baseten
  stage: scale-up
  wedge: 推理平台，提供部署、环境、CI/CD、区域路由和快速迭代闭环。
  pricing: 销售主导的企业定价；保留的信源更强调工作流功能，而非公开价目表。
  strength: 在托管平台里，与发布运营和企业级部署控制的契合度最高。
  weaknessVsUs: 仍然以 Baseten 自身作为运行时为中心，而不是一层跨供应商的可移植性层。
  sourceRefs:
  - 11
  - 12
  - 13
  - 14
  - 15
- name: BentoML
  stage: scale-up
  wedge: 把 AI 服务打包成可复现的制品，支持跨云目标的金丝雀部署。
  pricing: 打包核心开源；托管云定价在保留信源中未公开细节。
  strength: 在概念上，与制品打包和部署可复现性最契合。
  weaknessVsUs: 还需要额外的供应商中立基准测试、切换和支出路由逻辑，才能彻底解决可移植性问题。
  sourceRefs:
  - 16
  - 17
- name: KServe + vLLM stack
  stage: open-source
  wedge: Kubernetes 原生的 LLM 服务栈，具备金丝雀发布、高性能服务、缓存和自托管控制能力。
  pricing: 开源；买家要付费的是 Kubernetes、GPU 和集成人力。
  strength: 为私有集群和技术能力强的平台团队提供最大的控制权。
  weaknessVsUs: 组装成本高；发布治理和跨云等效性仍然要靠客户自己扛。
  sourceRefs:
