    - 18
    - 19
    - 21
    - 22
  - friction: 在切换前证明没有质量或延迟倒退
    severity: high
    affectedBuyer: 机器学习平台工程师
    mitigation: 任何生产环境晋升之前，都要求做黄金任务评测、影子流量和分阶段金丝雀验证。
    sourceRefs:
    - 2
    - 17
    - 18
    - 40
  - friction: 买家可能把可移植性当成一个附带功能，而不是一个独立品类
    severity: high
    affectedBuyer: 工程副总裁
    mitigation: 主打回归证据、故障转移保险和成本议价这些附带功能在跨供应商场景下解决不了的问题。
    sourceRefs:
    - 11
    - 16
    - 23
    - 25
    - 35
    - 36
  - friction: 私有部署与区域要求
    severity: medium
    affectedBuyer: CTO
    mitigation: 提供中立的控制平面部署方式，支持 VPC 或自托管模式，并明确支持区域端点。
