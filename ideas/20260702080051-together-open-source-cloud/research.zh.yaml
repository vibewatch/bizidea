  adoptionFrictionMatrix:
  - friction: 异构运行时与制品矩阵
    severity: high
    affectedBuyer: AI 平台负责人
    mitigation: 先从一个窄的目标矩阵做起，把适配器和部署元数据变成产品里的一等对象，而不是服务性工作。
    sourceRefs:
    - 3
