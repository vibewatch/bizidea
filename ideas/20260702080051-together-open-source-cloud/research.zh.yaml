  oneLineRelevance: '展示相邻竞品或替代方案能力的产品或文档证据。（Web Functions This guide explains how to set up Web Functions with Modal. All deployed Modal Functions can be [invoked from any other Python application](/docs/guide/trigger-deployed-functions) using the Modal client library. We additionally provide multiple ways to expose your Functions over the web for non-Python clients. You can [turn any Python function into a Web Function](#simple-endpoints) with a single line of code, you can [serve a full app](#serving-asgi-and-wsgi-apps) using frameworks like FastAPI, Django, or Flask, or you can [serve anything that speaks HTTP and listens on a port](#non-asgi-web-servers). Below we walk through each method, assuming you''re familiar with web applications outside of Modal. For a detailed walkthrough of basic Web Functions on Modal aimed at developers new to web applications, see [this tutorial](/docs/examples/basic_web). ## Simple endpoints The easiest way to make a Python function addressable over the web uses the [`@modal.fastapi_endpoint` decorator](/docs/sdk/py/latest/modal.fastapi_endpoint): ```python image = modal.Image.debian_slim().pip_install("fastapi[standard]") @app.function(image=image) @modal.fastapi_endpoint() def f(): return "Hello world!" ``` This decorator wraps the Modal Function in a [FastAPI application](#how-do-web-functions-run-in-the-cloud). *Note: Prior to v0.73.82, this function was named `@modal.web_endpoint`*. ### Developing with `modal serve` You can run this code as an ephemeral App, by running the command ```shell modal serve server_script.py ``` Where `server_script.py` is the file name of your code. This will create an ephemeral App for the duration of your script (until you hit Ctrl-C to stop it). It creates a temporary URL that you can use like any other REST endpoint. This URL is on the public internet. The `modal serve` command will live-update an App when any of its supporting files change. Live updating is particularly useful when working with apps containing web endpoints, as any changes made to Web Function handlers will show up almost immediately, without requiring a manual restart of the app. ### Deploying with `modal deploy` You can also deploy your App and create a persistent Web Function in the cloud by running `modal deploy`: ### Passing arguments When using `@modal.fastapi_endpoint`, you can add [query parameters](https://fastapi.tiangolo.com/tutorial/query-params/) which will be passed to your Function as arguments. For instance ```python image = modal.Image.debian_slim().pip_install("fastapi[standard]") @app.function(image=image) @modal.fastapi_endpoint() def square(x: int): return {"square": x**2} ``` If you hit this with a URL-encoded query string with the `x` parameter present, the Function will receive the value as an argument: ``` $ curl https://modal-labs--web-function-square-dev.modal.run?x=42 {"square":1764} ``` If you want to use a `POST` request, you can use the `method` argument to `@modal.fastapi_endpoint` to set the HTTP verb. To accept any valid JSON object, [use `dict` as your type annotation](https://fastapi.tiangolo.com/tutorial/body-nested-models/?h=dict#bodies-of-arbitrary-dicts) and FastAPI will handle the rest. ```python image = modal.Image.debian_slim().pip_install("fastapi[standard]") @app.function(image=image) @modal.fastapi_endpoint(method="POST") def square(item: dict): return {"square": item[''x'']**2} ``` This creates an endpoint that takes a JSON body: ``` $ curl -X POST -H ''Content-Type: application/json'' --data-binary ''{"x": 42}'' https://modal-labs--web-function-square-dev.modal.run {"square":1764} ``` This is often the easiest way to get started, but note that FastAPI recommends that you use [typed Pydantic models](https://fastapi.tiangolo.com/tutorial/body/) in order to get automatic validation and documentation. FastAPI also lets you pass data to Web Functions in other ways, for instance as [form data](https://fastapi.tiangolo.com/tutorial/request-forms/) and [file uploads](https://fastapi.tiangolo.com/tutorial/request-files/). ## How do Web Functions run in the cloud? Note that Web Functions, like everything else on Modal, only run when they need to. When you hit the URL the first time, it will boot up the container, which might take a few seconds. Modal keeps the container alive for a short period in case there are subsequent requests. If there are a lot of requests, Modal might scale up more containers running in parallel. For the shortcut `@modal.fastapi_endpoint` decorator, Modal wraps your function in a [FastAPI](https://fastapi.tiangolo.com/) application. This means that the [Image](/docs/guide/images) your Function uses must have FastAPI installed, and the Functions that you write need to follow its request and response [semantics](https://fastapi.tiangolo.com/tutorial). Web Functions can use all of FastAPI''s powerful features, such as Pydantic models for automatic validation, typed query and path parameters, and response types. Here''s everything together, combining Modal''s abilities to run functions in user-defined containers with the expressivity of FastAPI: ```python import modal from fastapi.responses import HTMLResponse from pydantic import BaseModel image = modal.Image.debian_slim().pip_install("fastapi[standard]", "boto3") app = modal.App(image=image) class Item(BaseModel): name: str qty: int = 42 @app.function() @modal.fastapi_endpoint(method="POST") def f(item: Item): import boto3 # do things with boto3... return HTMLResponse(f" Hello, {item.name}! ") ``` This Function would be called like so: ```bash curl -d ''{"name": "Erik", "qty": 10}'' \ -H "Content-Type: application/json" \ -X POST https://ecorp--web-demo-f-dev.modal.run ``` Or in Python with the [`requests`](https://pypi.org/project/requests/) library: ```python import requests data = {"name": "Erik", "qty": 10} requests.post("https://ecorp--web-demo-f-dev.modal.run", json=data, timeout=10.0) ``` ## Serving ASGI and WSGI apps You can also serve any app written in an [ASGI](https://asgi.readthedocs.io/en/latest/) or [WSGI](https://en.wikipedia.org/wiki/Web_Server_Gateway_Interface)-compatible web framework on Modal. ASGI provides support for async web frameworks. WSGI provides support for synchronous web frameworks. ### ASGI apps - FastAPI, FastHTML, Starlette For ASGI apps, you can create a function decorated with [`@modal.asgi_app`](/docs/sdk/py/latest/modal.asgi_app) that returns a reference to your web app: ```python image = modal.Image.debian_slim().pip_install("fastapi[standard]") @app.function(image=image) @modal.concurrent(max_inputs=100) @modal.asgi_app() def fastapi_app(): from fastapi import FastAPI, Request web_app = FastAPI() @web_app.post("/echo") async def echo(request: Request): body = await request.json() return body return web_app ``` Now, as before, when you deploy this script as a Modal App, you get a URL for your app that you can hit: The `@modal.concurrent` decorator enables a single container to process multiple inputs at once, taking advantage of the asynchronous event loops in ASGI applications. See [this guide](/docs/guide/concurrent-inputs) for details. #### ASGI Lifespan While we recommend using [`@modal.enter`](https://modal.com/docs/guide/lifecycle-functions#enter) for defining container lifecycle hooks, we also support the [ASGI lifespan protocol](https://asgi.readthedocs.io/en/latest/specs/lifespan.html). Lifespans begin when containers start, typically at the time of the first request. Here''s an example using [FastAPI](https://fastapi.tiangolo.com/advanced/events/#lifespan): ```python import modal app = modal.App("fastapi-lifespan-app") image = modal.Image.debian_slim().pip_install("fastapi[standard]") @app.function(image=image) @modal.asgi_app() def fastapi_app_with_lifespan(): from fastapi import FastAPI, Request def lifespan(wapp: FastAPI): print("Starting") yield print("Shutting down") web_app = FastAPI(lifespan=lifespan) @web_app.get("/") async def hello(request: Request): return "hello" return web_app ``` ### WSGI apps - Django, Flask You can serve WSGI apps using the [`@modal.wsgi_app`](/docs/sdk/py/latest/modal.wsgi_app) decorator: ```python image = modal.Image.debian_slim().pip_install("flask") @app.function(image=image) @modal.concurrent(max_inputs=100) @modal.wsgi_app() def flask_app(): from flask import Flask, request web_app = Flask(__name__) @web_app.post("/echo") def echo(): return request.json return web_app ``` See [Flask''s docs](https://flask.palletsprojects.com/en/2.1.x/deploying/asgi/) for more information on using Flask as a WSGI app. Because WSGI apps are synchronous, concurrent inputs will be run on separate threads. See [this guide](/docs/guide/concurrent-inputs) for details. ## Non-ASGI web servers Not all web frameworks offer an ASGI or WSGI interface. For example, [`aiohttp`](https://docs.aiohttp.org/) and [`tornado`](https://www.tornadoweb.org/) use their own asynchronous network binding, while others like [`text-generation-inference`](https://github.com/huggingface/text-generation-inference) actually expose a Rust-based HTTP server running as a subprocess. For these cases, you can use the [`@modal.web_server`](/docs/sdk/py/latest/modal.web_server) decorator to "expose" a port on the container: ```python @app.function() @modal.concurrent(max_inputs=100) @modal.web_server(8000) def my_file_server(): import subprocess subprocess.Popen("python -m http.server -d / 8000", shell=True) ``` Just like all Functions on Modal, this is only run on-demand. The function is executed on container startup, creating a file server at the root directory. When you hit the URL, your request will be routed to the file server listening on port `8000`. For `@modal.web_server` Functions, you need to make sure that the application binds to the external network interface, not just localhost. This usually means binding to `0.0.0.0` instead of `127.0.0.1`. See, for instance, our examples of how to serve [Streamlit](/docs/examples/