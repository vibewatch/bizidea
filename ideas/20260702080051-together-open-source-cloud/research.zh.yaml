regulatoryTechnicalConstraints:
- point: 企业级 AI 上线需要可审计的评测、治理和人工监督，而不是临时拼凑的发布脚本。
  sourceRefs:
  - 31
- point: 欧盟买家会关心相关的高风险义务，也会关心 GPAI 或提供方范围的界定——即便初创公司自己并不是基础模型的制造方。
  sourceRefs:
  - 32
  - 33
- point: 有些交易会要求区域路由，或自托管、VPC 部署模式，而不是共享的全球端点。
  sourceRefs:
  - 13
  - 37
- point: 金丝雀、缓存、路由这些运行时特性因服务栈而异，要在不同目标之间复现完全一致的行为并不简单。
  sourceRefs:
  - 18
  - 19
  - 20
  - 21
  - 22
- point: 专用算力、自动扩缩容和各主机特有的扩容行为因供应商而异，这让 SLA 级别的故障转移承诺变得复杂。
  sourceRefs:
  - 3
  - 4
  - 6
  - 8
  - 23
validationSignals:
- point: Databricks 报告称，使用 LLM 的企业中有 76% 选择开源模型。
  sourceRefs:
  - 29
- point: Menlo 估计 2025 年企业生成式 AI 支出达到 370 亿美元，其中应用层拿下了 190 亿美元。
  sourceRefs:
  - 28
- point: Together、Fireworks 和 Baseten 都在宣传自己在 AI 原生软件领域的生产客户，其中包括编码和企业 AI 领域的知名客户。
  sourceRefs:
  - 1
  - 10
  - 15
- point: Flexera 和 FinOps 基金会的数据显示，AI 成本正在被纳入正式的云与 FinOps 治理工作流。
  sourceRefs:
  - 26
  - 27
- point: Tabnine 的企业部署选项显示，编码助手买家已经在要求 VPC、本地部署和物理隔离交付方式。
  sourceRefs:
  - 37
openQuestions:
- 在滩头市场的代码智能体厂商里，现在有多少已经跑着足够多的微调开放权重流量、值得上一层中立发布层，又有多少仍依赖前沿 API？
- '在真实交易中，第二云需求最常见的是哪一种：故障转移、区域数据驻留，还是价格议价？'
- 怎样的最小目标矩阵（例如 Together、Fireworks、Baseten 加 KServe 或 vLLM）既能覆盖大部分早期需求，又不至于让集成范围失控扩张？
- 初创公司能不能拿到足够多真实的黄金任务评测数据，构建起一道不断累积的回归护城河，同时又不至于滑向重服务模式？
