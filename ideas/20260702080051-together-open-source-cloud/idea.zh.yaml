  painIntensity:
    score: 4
    rationale: 对靠企业级 SLA 卖产品的代码智能体厂商来说，绑定单一云意味着每次换供应商都是一次带风险的营收事件。
  wedgeClarity:
    score: 5
    rationale: 把调优开放权重代码模型打包，再在异构运行时之间做切换，是一个具体、买家明确的首发产品。
  defensibility:
    score: 4
