problem: >-
  AI 应用厂商从前沿 API 转向调优后的开放权重代码模型后，基础设施的选择变多了，但每家云厂商的服务栈、模型格式和性能区间都不一样。团队想要更便宜的吞吐、更好的硬件，或是为保证正常运行时间加一个备用供应商，迁移一个生产模型仍然意味着手工重建运行时、重跑评测，还要冒着客户能感知到的延迟劣化风险。云选择因此从一个操作旋钮变成了一个发布项目——团队要么被绑死在单一供应商上，要么只能把开源路线图往后拖。
targetUser:
  primary: 100-400 人规模代码智能体厂商的 AI 平台负责人，公司在单一 AI 云上运行着一个微调过的开放权重代码模型
  secondary: 负责部署、基准评测和回滚的机器学习平台工程师
  buyer: 工程副总裁（VP Engineering）或 CTO
startupThesis:
  nonObviousInsight: >-
    开源 AI 领域真正的战略控制点，不会只是跑得最快的那朵云，而是能让调优模型在性价比排行榜变动时依然保持可迁移的发布层。一旦搭载 B200 的无服务器开放权重云已经好到能撑起代码智能体，供应商切换就会变得足够频繁，可移植性本身也就成了核心基础设施。
  beachhead: >-
    拿到风投的代码审查和代码补全厂商，服务 50-500 个开发者席位，跑着一个微调开放权重编码模型——当一家受监管的共创客户在上线前要求第二云故障转移时，就是切入时机。
  wedge: >-
    一个发布打包工具，把调优代码模型、适配器、分词器设置和黄金编码任务评测打包成可复现的制品，适配多个无服务器和专用推理目标，再在切流量前做金丝雀验证。
  whyNowCatalyst: >-
    Together 的 8 亿美元融资、按需 B200 的铺开，以及代码智能体负载的公开 TPS 宣传，都说明开源模型云的扩张速度已经快到让可移植性变成一个紧迫的运营问题。
  ventureScalePath: >-
    先从代码智能体厂商切入，再把同一套发布层扩展到客服、文档处理等微调开放权重模型的各类垂直 AI 应用。长期看，公司可以拿下更广泛开源 AI 应用技术栈的 CI/CD、可观测性、回滚和支出路由能力。
solution: >-
  产品接入客户的调优开放权重模型、适配器栈、提示词模板、分词器和评测集，为每个支持的无服务器或专用运行时编译出对应的部署包，用客户自己的编码任务跑基准测试，在发布前就把质量、延迟和成本的差异摆出来。它还管理影子流量、金丝雀发布和一键回滚，团队加一朵云或换一代硬件都不用临时救火。随着发布次数增多，它会学到哪种运行时配置和硬件方案最适合哪类负载，可移植性也就一次比一次更聪明。
goToMarketSeed:
  firstCustomer: >-
    150-400 人规模代码智能体初创公司的工程副总裁，公司向 50-300 名工程师规模的软件团队销售安全的 PR 审查与代码补全工作流，目前在单一 AI 云上跑着一个微调开放权重代码模型。
  buyingTrigger: >-
    新签的企业客户或续约客户在签年度合同前，要求故障转移能力、采购议价空间或更低延迟的算力。
  currentAlternative: 各家供应商专属的 DevOps 脚本，加上手工基准测试表格和临时性的影子流量测试
  switchingReason: >-
    初创公司能在几天内（而不是几周）新增或更换推理供应商，同时保留评测历史、回滚路径和面向客户的延迟 SLO。
  pricingHypothesis: 年度平台费加上按活跃部署目标或已晋升发布通道计费的用量费
