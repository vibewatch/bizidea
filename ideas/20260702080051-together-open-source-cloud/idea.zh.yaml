  ventureScale:
    score: 5
    rationale: 同一套发布层可以从代码智能体扩展到更广阔的、构建在开放权重模型之上的 AI 应用世界。
topRisks:
  - name: 云厂商自建追赶
    description: 专注 AI 的云厂商可能会自己推出迁移和发布工具，削弱对独立层的需求。
    mitigation: 在多家云和私有集群之间保持中立，拿下厂商自带工具覆盖不到的跨供应商基准测试和回滚工作流。
  - name: 滩头市场时机
    description: 许多代码智能体厂商还处于早期，要等拿到更大的企业合同才会真正感到痛。
    mitigation: 盯着具体的续约或采购事件去卖，锁定那些已经在生产环境跑着调优模型、并有共创客户在验证的目标客户。
  - name: 运行时覆盖面失控扩张
    description: 过早支持太多模型系列和推理运行时，会把产品拖成一个烧钱的集成项目。
    mitigation: 先聚焦一小组代码模型系列和发布目标，等反复出现的切换模式被证明可复用后再扩张。
