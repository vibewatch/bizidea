jobsToBeDone:
  - job: 每当出现价格更低或性能更强的 AI 云，帮 AI 平台负责人把调优代码模型安全迁移过去，让他们换供应商也不会打破客户 SLA。
    currentAlternative: 手工重写运行时、翻供应商控制台，再加一次性评测脚本
    successMetric: 7 天内完成第二供应商的验证并投产，评测通过率和 p95 延迟都不下降
  - job: 每当大客户在上线前要求故障转移，帮机器学习平台工程师加上冗余，而不用把几个月的部署工作再做一遍，让他们能放心签单。
    currentAlternative: 继续困守单一云，或手工搭建定制化的影子环境
    successMetric: 面向客户的故障转移演练通过，回滚在 15 分钟内完成
