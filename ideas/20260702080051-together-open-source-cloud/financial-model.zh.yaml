scenarios:
  downside:
    description: 触发频率比计划弱，付费试点转化更慢，客户引导仍然过于定制化，达不到目标毛利率结构。
    y3RevenueK: 2250.0
    y3EbitdaK: -220.0
    cashLowPointK: 80.0
    keyAssumptionChanges:
    - 第三年第四季度末客户数约为 17 个，而非 25 个。
    - 混合年度价值落在约 14.5 万美元，而不是研究测算的约 16 万美元水平。
    - 毛利率收官在约 65%，因为基准测试标准化和安全打包仍需较多手工操作。
  base:
    description: 共创客户大约按一个季度的验证周期完成转化，初始目标矩阵覆盖了大部分需求，按目标计费的适度用量，把合同规模带到第三年末研究测算的 SOM 水平。
    y3RevenueK: 3114.0
    y3EbitdaK: 242.5
    cashLowPointK: 369.6
    keyAssumptionChanges:
    - 第 12 个月 3 个付费客户，第二年第四季度 10 个，第三年第四季度 25 个。
    - 收官时每个付费客户的混合年度价值约达 16 万美元。
    - 随着基准测试和安全评审工作变得更可复用，毛利率在第三年第四季度达到 BP 目标的 70%。
  upside:
    description: 云厂商合作获客提前见效，第二目标的用量更快接上，团队在大举扩编前就把客户引导流程标准化。
    y3RevenueK: 3600.0
    y3EbitdaK: 620.0
    cashLowPointK: 500.0
    keyAssumptionChanges:
    - 第三年第四季度末客户数约为 28 个，而非 25 个。
    - 第二目标和已晋升发布通道的用量，把年度价值拉升到约 17.5 万美元。
    - 私有集群和托管云的操作手册复用速度快于预期，毛利率达到约 72%。
sensitivity:
- variable: ARPU
  downsideCase: 年度合同和用量收官时比计划低约 10%。
  baseCase: 收官时每个付费客户的混合年度价值约达 16 万美元。
  upsideCase: 按目标和已晋升发布通道的用量，把年度价值拉升到比计划高约 8%。
  y3RevenueImpactK: -311.4
  cashImpactK: -220.0
- variable: CAC
  downsideCase: 创始人主导和合作伙伴带来的销售表现不及预期，把 CAC 推高到约 6.5 万美元。
  baseCase: 靠集中的直接触达和有限的付费营销，CAC 保持在约 5 万美元。
  upsideCase: 联合销售带来的引荐，让 CAC 保持在约 4.2 万美元。
  y3RevenueImpactK: -120.0
  cashImpactK: -170.0
- variable: 客户流失率
  downsideCase: 如果切口给人的感觉太偶发，月度流失率会升到约 3.0%。
  baseCase: 发布控制工作流嵌入客户流程后，月度流失率保持在约 2.0%。
  upsideCase: 策略包和故障转移演练变成粘性工作流后，月度流失率保持在约 1.2%。
  y3RevenueImpactK: -150.0
  cashImpactK: -130.0
- variable: 销售周期
  downsideCase: 试点转生产合同的周期，从约 90 天拉长到约 150 天。
  baseCase: 付费试点在一次成功的验证周期后，大约一个季度完成转化。
  upsideCase: 一个真实的采购触发场景加上合作伙伴引荐，把转化周期压缩到约 60 天。
  y3RevenueImpactK: -420.0
  cashImpactK: -260.0
- variable: 毛利率
  downsideCase: 由于基准测试搭建和安全打包仍是定制化操作，毛利率停滞在约 65%。
  baseCase: 适配器矩阵和评审材料包标准化后，毛利率收官于 70%。
  upsideCase: 私有集群和托管云工作流收敛速度更快，毛利率达到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -200.0
- variable: 招聘节奏
  downsideCase: 在可重复的联合销售动作被验证之前，两个规模化岗位的招聘就被提前到第二年。
  baseCase: 规模化招聘等到转化证据出现之后才启动，遵循 BP 的排序节奏。
  upsideCase: 第二名解决方案岗位的招聘被推迟，但交付没有变慢，因为客户引导周期缩短到两周以内。
  y3RevenueImpactK: 60.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      TriggeredAccounts[Triggered coding-agent accounts] --> PaidPilots[Paid portability pilots]
      PaidPilots --> AnnualContracts[Annual production contracts]
      AnnualContracts --> TargetExpansion[More targets and release lanes]
      TargetExpansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入增长，靠的是从第一年末的 3 个付费试点/合同，增长到第三年第四季度的 25 个付费客户，同时收官年度价值落在研究测算的 16 万美元 SOM 水平附近。
- checkName: 必须做对的事
  finding: 付费试点必须在大约一个季度内转化为年度生产合同，初始的 Together/Fireworks/KServe-vLLM 矩阵必须覆盖大部分需求，否则销售周期的敏感性会把种子轮验证的时间点往后推。
- checkName: 模型失效的条件
  finding: 如果触发频率比计划弱，且毛利率停滞在约 65%，下行情形会在可重复的联合销售动作被验证之前，把现金逼近约 10 万美元。
- checkName: 下一轮融资所需证据
  finding: 下一轮融资的论证是：到第二年末拿到 8-10 个付费客户、2-3 个年度合同转化，以及一套可重复的云厂商联合销售动作——这正是 200 万美元融资额度加上缓冲后应该达到的目标。
sanityChecks:
  ruleOf40: 第三年增长率 205.9% + EBITDA 利润率 7.8% = 213.7%
  burnMultiple: 第二年烧钱倍数约为 0.8 倍：约 81 万美元的 EBITDA 消耗对应约 105 万美元的净新增 ARR；第三年第二季度 EBITDA 转正。
  revenuePerFte: 第三年人均收入 34.6 万美元，对应期末 9 名全职员工（SaaS 行业基准为 20-40 万美元）
  flags:
  - 第三年基准情形假设研究测算的全部 25 个 SOM 客户都在第三年第四季度前拿下，这意味着模型假设在约 300 个 SAM 客户构成的集中买家池中执行力很强。
  - CustomersEop 既包含付费试点也包含年度合同，所以纯经常性收入的生产客户数，在第一年大部分时间里都落后于总客户数。
  - 只有当基准测试搭建、回滚演练和安全评审材料包变得可复用、而不是定制化服务工作时，毛利率才能达到 70% 的目标。
  - 早期销售大部分靠创始人主导的 GTM 完成；如果云厂商获客渠道或创始人的人脉出问题，客户数会是这个模型最先失守的地方。
  - 现金按 EBITDA 建模，所以即便损益表落在计划内，试点预付款、企业采购的时点或客户专属的安全实施成本，仍可能改变实际现金到账的时间。
