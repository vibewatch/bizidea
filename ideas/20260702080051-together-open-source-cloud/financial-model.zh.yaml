slug: open-weight-release-packager
date: '2026-07-02'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-02] 模型从商业计划书署期之后的第一个完整运营月开始。'
- id: A2
  name: 期初现金/种子前轮融资
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + 模型烧钱曲线] 基准情形取融资区间的低端，留出约六个月缓冲，撑到第二年末拿到种子轮验证所需的证据。'
- id: A3
  name: 起始付费客户数
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，必须先拿下付费的可移植性试点。'
- id: A4
  name: 付费客户定义
  value: 一个付费试点，或一份处于活跃发布控制下的年度生产合同。
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 统计所有已经为试点或生产范围付费的客户，让第一年的试点收入能干净对账。'
- id: A5
  name: 付费试点经济模型
  value: $30K over about 2 months (~$15K/mo)
  unit: USD/account
  source: '[BP gtm.pricing $25k-$40k pilot + BP investorMemo.firstCustomer.initialContract 6-8 周试点] 模型取试点定价区间的中点，并按大致的试点周期确认收入。'
- id: A6
  name: 年度合同与用量经济模型
  value: 生产合同起步约 15 万美元 ARR，随着活跃部署目标和已晋升发布通道带来适度用量，到第三年末升至约 16 万美元 ARR。
  unit: USD/account/year
  source: '[BP gtm.pricing 12-18 万美元年度订阅加用量 + Research market.som 25 个客户、约 16 万美元 ACV] 基准情形落在 BP 区间内，并与研究测算的 SOM 数据吻合。'
- id: A7
  name: 客户增长节奏
  value: 第 12 个月 3 个付费客户，第二年第四季度 10 个，第三年第四季度 25 个
  unit: customersEop
  source: '[BP milestones 0-12、12-24、24-36 个月 + Research market.som] 基准情形对应第一年 3 个付费试点、第二年末 8-10 个客户，以及第三年约 25 个客户。'
- id: A8
  name: 收入确认惯例
  value: '期末付费客户数乘以该期间每客户的混合已实现收入：第一年约每月 1.2-1.5 万美元，第二年约每季度 3.3-3.8 万美元，第三年约每季度 3.8-4.0 万美元。'
  unit: formula
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som] 这样收入能直接追溯到客户，以及计划中的试点转生产合同结构。'
- id: A9
  name: 毛利率爬坡曲线
  value: 第一年 45%-52%，第二年 56%-66%，第三年 68%-70%
  unit: 毛利率百分比
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + 创业财务经验法则] 早期试点引导和基准测试标准化偏服务型，等适配器和安全评审材料包变得可复用后才会改善。'
- id: A10
  name: 招聘时间线
  value: 第 1 个月创始人和创始工程师；第 4 个月平台/运行时工程师；第 7 个月解决方案工程师；第 13 个月 GTM/合作伙伴负责人；第 16 个月第三名工程师；第 22 个月运营；第 27 个月第四名工程师；第 31 个月第二名解决方案岗位。
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + 创业财务经验法则] 招聘始终以工程优先，在规模化 GTM 之前先补解决方案岗位，团队保持精简，直到出现可重复的云厂商联合销售证明。'
- id: A11
  name: 创始人全成本薪酬
  value: $160K
  unit: USD/year
  source: '[BP team Founder/CEO + 创业财务经验法则] 反映种子前轮阶段创始人适度的现金薪酬，加上薪资税和福利。'
- id: A12
  name: 工程岗全成本薪酬
  value: $200K
  unit: USD/year
  source: '[BP team Founding eng and Platform/runtime engineer + 创业财务经验法则] 产品需要资深的基础设施和模型发布工程人才，但薪酬水平仍低于后期阶段的市场现金标准。'
- id: A13
  name: 解决方案岗全成本薪酬
  value: $170K
  unit: USD/year
  source: '[BP team Solutions engineer + 创业财务经验法则] 覆盖技术引导、基准测试评审和企业安全方面的贴身支持，同时不组建庞大的服务团队。'
- id: A14
  name: GTM/合作伙伴岗全成本薪酬
  value: $180K
  unit: USD/year
  source: '[BP gtm.channels + BP milestones repeatable cloud co-sell motion + 创业财务经验法则] 涵盖集中式的企业销售和合作伙伴拓展，前提是创始人主导的销售打法已经被验证。'
- id: A15
  name: 行政/运营岗全成本薪酬
  value: $120K
  unit: USD/year
  source: '[BP operations + 创业财务经验法则] 覆盖基础财务、供应商管理、安全文档和内部运营工作。'
- id: A16
  name: 薪酬在损益表科目间的分摊
  value: 创始人：60% 销售与市场（S&M）/ 20% 研发（R&D）/ 20% 行政（G&A）；工程：100% 研发；解决方案：50% 销售与市场 / 50% 研发；GTM：100% 销售与市场；运营：100% 行政。
  unit: allocation
  source: '[BP team role rationales + BP operations] 职能分摊反映了创始人主导的销售、以工程为重的交付方式，以及解决方案工作在客户引导和产品反馈之间的划分。'
- id: A17
  name: 非薪酬运营支出爬坡
  value: 月度非薪酬支出从第一年初期的销售与市场/研发/行政各 5000/9000/4000 美元，增长到第三年第四季度的 1.4 万/1.5 万/1 万美元。
  unit: USD/month
  source: '[BP operations + 创业财务经验法则] 覆盖基准测试算力、差旅、法务、保险、合作伙伴工作和合规工具，不假设有一套庞大的品牌营销引擎。'
- id: A18
  name: 现金转化惯例
  value: 现金变动等于 EBITDA
  unit: formula
  source: '[创业财务经验法则] 在种子前轮规模下，假设资本支出、税费、融资费用和营运资金的时点差异都可忽略不计。'
- id: A19
  name: 稳态月度客户流失率
  value: 2.0%
  unit: 百分比/月
  source: '[早期企业级工作流 SaaS 的创业财务经验法则 + BP gtm.funnelTargets 12 个月内 40% 以上扩展率] 一旦发布控制层嵌入进客户工作流，流失率应该较低，但不会像成熟 SaaS 那样完美。'
- id: A20
  name: 基准销售周期
  value: 从付费试点启动到转化为年度生产合同，大约 90 天
  unit: days
  source: '[BP gtm.wedge 6-8 周试点 + BP experimentRoadmap 90-180 天 + BP gtm.funnelTargets 50% 以上试点转生产] 模型假设一个季度足以验证完第二目标，并拿下第一份生产合同承诺。'
- id: A21
  name: CAC 核算惯例
  value: 36 个月销售与市场总支出，除以 25 个净新增付费客户
  unit: formula
  source: '[模型基于基准情形销售与市场支出计算 + BP gtm.funnelTargets] 这涵盖了整个建设期内创始人主导的销售、合作伙伴带来的商机，以及以解决方案为主的获客工作。'
- id: A22
  name: 下一轮融资规模对应的里程碑
  value: 到第二年末，公司应该拥有 8-10 个付费客户、2-3 个年度生产合同转化，以及一套可重复的云厂商联合销售动作。
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP investorMemo.verdict.nextDiligence] 种子前轮的规模是为了在转化率、可参考案例和合作伙伴杠杆这三方面，拿到种子轮就绪的证据。'
- id: A23
  name: 季度薪资滚动核算惯例
  value: 第二、三年的薪资行采用季度内实际逐月入职情况，而不是只用季末快照
  unit: convention
  source: '[人员编制列惯例 + BP team startTiming] 即便第二、三年只展示年末快照，这样也能让薪资支出与逐月招聘节奏保持内部一致。'
