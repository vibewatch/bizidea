scenarios:
  downside:
    description: "Lender and ECA channels convert later, buyers stay closer to one active program, and the services mix remains heavier for longer."
    y3RevenueK: 3216.6
    y3EbitdaK: -1427.0
    cashLowPointK: -950.6
    keyAssumptionChanges:
    - "Q4Y3 active programs end at 36 instead of 50."
    - "Blended monthly revenue per program is roughly 8-10% below base."
    - "Gross margin exits at 70% instead of 72%."
  base:
    description: "Founder-led sales become channel-assisted in Y2, onboarding templates improve steadily, and the company reaches the researched SOM run-rate by Q4Y3."
    y3RevenueK: 4827.6
    y3EbitdaK: -219.9
    cashLowPointK: 218.0
    keyAssumptionChanges:
    - "No changes; this is the operating plan encoded in the main model."
  upside:
    description: "Pilot-to-production conversion and second-program expansion arrive earlier, so channel partners add more volume without a proportionate hiring step-up."
    y3RevenueK: 5725.0
    y3EbitdaK: 472.9
    cashLowPointK: 608.6
    keyAssumptionChanges:
    - "Q4Y3 active programs end at 56 instead of 50."
    - "Blended monthly revenue per program is roughly 3-4% above base."
    - "Gross margin exits at 73% instead of 72%."
sensitivity:
- variable: "ARPU"
  downsideCase: "Blended per-program revenue is 10% below plan because buyers resist premium implementation pricing."
  baseCase: "Blended per-program revenue follows the onboarding-plus-recurring mix in A10-A12."
  upsideCase: "Blended per-program revenue is 10% above plan because second-program expansions and partner economics show up faster."
  y3RevenueImpactK: -482.8
  cashImpactK: -347.6
- variable: "CAC"
  downsideCase: "CAC rises by roughly $20K per active program because partner referrals underperform and more deals need direct outbound."
  baseCase: "CAC holds near $85.9K per active program with founder-led sales and capital-partner referrals."
  upsideCase: "CAC falls by roughly $15K per active program as lender channels become repeatable."
  y3RevenueImpactK: -240.0
  cashImpactK: -300.0
- variable: "churn"
  downsideCase: "Monthly churn rises to 2.8% as single-program customers do not expand into repeat financings."
  baseCase: "Monthly churn remains 1.8% as multi-quarter programs and repeat workflows offset natural roll-off."
  upsideCase: "Monthly churn falls to 1.2% as more accounts run multiple programs in parallel."
  y3RevenueImpactK: -360.0
  cashImpactK: -260.0
- variable: "sales cycle"
  downsideCase: "Average sales cycle stretches by about 90 days because counsel and lender diligence remain bespoke."
  baseCase: "Fresh contract awards and change orders keep conversions near the founder-led plan."
  upsideCase: "Sales cycle shortens by about 45 days once two lender templates become trusted references."
  y3RevenueImpactK: -800.0
  cashImpactK: -700.0
- variable: "gross margin"
  downsideCase: "Gross margin exits Y3 at 68% because onboarding and redaction review stay manually intensive."
  baseCase: "Gross margin exits Y3 at 72%, slightly above the 70% plan target."
  upsideCase: "Gross margin exits Y3 at 74% because reusable templates and better routing reduce delivery effort."
  y3RevenueImpactK: 0.0
  cashImpactK: -193.1
- variable: "hiring pace"
  downsideCase: "Three Y3 hires are pulled forward one quarter before conversion fully proves out."
  baseCase: "Hiring follows the sequencing in A22, with scaled GTM added only after Y2 proof points."
  upsideCase: "Some late-Y3 hires can be delayed one quarter because partner channels scale more efficiently than expected."
  y3RevenueImpactK: -120.0
  cashImpactK: -220.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Awards[Contract awards / change orders] --> Pilots[Paid pilots]
      Pilots --> Programs[Active financed programs]
      Programs --> Subscription[Subscription revenue]
      Programs --> Services[Implementation + partner fees]
      Subscription --> Revenue[Total revenue]
