      Opex[Headcount + operating spend] --> EBITDA
      EBITDA --> Cash[Ending cash]
modelSanity:
- checkName: "Revenue engine"
  finding: "Base-case Y3 revenue reaches $4.8M only if active financed programs grow from 15 at Q4Y2 to 50 at Q4Y3 while blended monthly revenue per program rises from $11.5K to $13.3K."
- checkName: "Must go right"
  finding: "Capital-partner referrals must become repeatable by mid-Y2 so the company can add 35 net active programs in Y3 without building a much larger direct-sales team."
- checkName: "Model breaks if"
  finding: "If channels slip two quarters or blended per-program pricing falls back toward software-only levels, the downside case runs about $951K below zero before Y3 ends."
- checkName: "Next-round proof"
  finding: "The seed story works once the company proves 10 production customers, 15 active programs, and three repeat capital channels with Q4Y2 cash still around $0.7M."
sanityChecks:
  ruleOf40: "Y3 growth 303% + EBITDA margin -5% = 298% (well above 40 directionally, though still an early-stage base off a small Y2 revenue floor)."
  burnMultiple: "Y2 burn multiple is about 1.3x on net new ARR, then improves toward 0.1x in Y3 as gross profit catches up with fixed headcount."
  revenuePerFte: "$322K Y3 using Q4Y3 headcount of 15 FTE (within a rough $200-400K vertical SaaS benchmark range)."
  flags:
  - "The base case requires partner-led acceleration from 15 to 50 active programs in 12 months; if channel conversion is late, downside cash turns negative."
  - "Blended revenue per active program sits above the $96K market proxy because the model includes onboarding and partner economics; if those extras are discounted away, payback and Y3 revenue both weaken."
  - "Gross margin only reaches the low 70s if onboarding templates and redaction workflows become reusable instead of staying services-heavy."
