slug: "space-milestone-finance-os"
date: "2026-07-01"
currency: "USD"
modelStartMonth: "2026-07"
assumptions:
- id: "A1"
  name: "Model start month"
  value: "2026-07"
  unit: "month"
  source: "[BP date 2026-07-01]; model starts in the same month as the approved plan."
- id: "A2"
  name: "Opening cash from pre-seed raise"
  value: "3300"
  unit: "USD K"
  source: "[BP fundingAsk.targetFundingRangeUsd $2–4M and BP fundingAsk.runwayMonths 18]; model uses $3.3M so the company can reach the 10-customer/15-program proof point and still keep a six-month buffer."
- id: "A3"
  name: "Customer unit in the P&L"
  value: "active financed program under monitoring"
  unit: "unit"
  source: "[BP businessModel.unitOfValue Active financed sovereign program under monitoring]."
- id: "A4"
  name: "Paid onboarding per new financed program"
  value: "27.5"
  unit: "USD K per new program"
  source: "[BP investorMemo.firstCustomer initialContract $20k-35k paid onboarding and pilot]; model uses the midpoint."
- id: "A5"
  name: "Steady-state recurring annual software revenue per active program"
  value: "100"
  unit: "USD K per program-year"
  source: "[BP investorMemo.firstCustomer $80k-120k annual software revenue per active program]; [Research market.som monetization proxy ~$96k per program]; model rounds to $100k recurring at maturity."
- id: "A6"
  name: "Partner referral and volume-economics uplift"
  value: "10"
  unit: "USD K per active program-year"
  source: "[BP gtm.pricing optional basis-point referral economics]; [BP businessModel.revenueStreams referral or take-rate revenue on financing volume]."
- id: "A7"
  name: "Y1 end-of-month active financed programs"
  value: "0,0,0,0,1,1,1,2,2,2,3,4"
  unit: "programs"
  source: "[BP milestones 0-12 months three paid pilots, two production subscriptions, and at least one repeat financing workflow]; model exits Y1 with four active programs."
- id: "A8"
  name: "Y2 quarter-end active financed programs"
  value: "6,9,12,15"
  unit: "programs"
  source: "[BP milestones 12-24 months reach 10 production customers and 15 or more active financed programs under monitoring]."
- id: "A9"
  name: "Y3 quarter-end active financed programs"
  value: "23,31,40,50"
  unit: "programs"
  source: "[BP milestones 24-36 months reach roughly 50 active program-years]; [Research market.som $4.8M based on 50 active program-years]; operator judgment that the year-3 run-rate must approach 50 programs to reconcile the SOM narrative."
- id: "A10"
  name: "Y1 blended monthly revenue per active program"
  value: "M5-M12 = 27,27,27,25,25,25,28,30"
  unit: "USD K per average active program per month"
  source: "[A4-A6]; early months are onboarding-heavy, so blended revenue sits above recurring software alone."
- id: "A11"
  name: "Y2 blended monthly revenue per active program"
  value: "Q1-Q4 = 10.0,10.5,11.0,11.5"
  unit: "USD K per average active program per month"
  source: "[A4-A6]; [BP milestones 15+ active programs by end of Y2]; mix shifts from pilot onboarding toward recurring platform fees through the year."
- id: "A12"
  name: "Y3 blended monthly revenue per active program"
  value: "Q1-Q4 = 11.8,12.3,12.8,13.3"
  unit: "USD K per average active program per month"
  source: "[A4-A6]; [Research market.som $4.8M year-3 target]; blended yield rises as repeat programs and partner economics layer onto recurring software."
- id: "A13"
  name: "Gross margin ramp"
  value: "Y1 55-60%; Y2 62-68%; Y3 69-72%"
  unit: "percent"
  source: "[BP businessModel.targetGrossMarginPct 70]; startup-finance heuristic that managed onboarding and redaction QA are services-heavy before reusable templates lower delivery cost."
- id: "A14"
  name: "Monthly churn for unit economics"
  value: "1.8"
  unit: "percent"
  source: "Startup-finance heuristic for high-ACV workflow software tied to multi-year financing programs where retention is strong but individual programs still roll off."
- id: "A15"
  name: "Founder loaded annual cash compensation"
  value: "180"
  unit: "USD K"
  source: "Startup-finance heuristic for a pre-seed founder taking below-market cash compensation while still including payroll tax and benefits."
- id: "A16"
  name: "Engineering loaded annual compensation"
  value: "210"
  unit: "USD K per FTE"
  source: "[BP team founding eng plus later engineering hires]; startup-finance heuristic for senior workflow and security engineers in GovCon-adjacent B2B software."
- id: "A17"
  name: "Product and contract-finance loaded annual compensation"
  value: "200"
  unit: "USD K per FTE"
  source: "[BP team founding product and contract-finance lead]; startup-finance heuristic for a senior domain PM/operator."
- id: "A18"
  name: "Solutions and implementation loaded annual compensation"
  value: "160"
  unit: "USD K per FTE"
  source: "[BP team solutions engineer at Month 3]; startup-finance heuristic for implementation-heavy vertical SaaS delivery talent."
- id: "A19"
  name: "Capital partnerships loaded annual compensation"
  value: "180"
  unit: "USD K per FTE"
  source: "[BP team capital partnerships lead at Month 6]; startup-finance heuristic for a senior BD operator covering lenders, ECAs, and advisers."
- id: "A20"
  name: "Sales and customer-success loaded annual compensation"
  value: "170-190"
  unit: "USD K per FTE"
  source: "[BP sequencingRationale says scaled partnerships come only after pilots prove repeatability]; startup-finance heuristic for one early AE and later customer-success / revenue roles."
- id: "A21"
  name: "Finance and operations loaded annual compensation"
  value: "150"
  unit: "USD K per FTE"
  source: "Startup-finance heuristic for an end-of-period finance/ops hire once audit, compliance, and reporting load increases."
- id: "A22"
  name: "Hiring schedule"
  value: "M4 Solutions1; M7 Capital1; M10 Eng2; M14 Solutions2; M16 Sales1; M19 Eng3; M22 Sales2; M25 Capital2; M28 Solutions3; M29 Eng4; M31 Sales3; M33 Finance1"
  unit: "hires"
  source: "[BP team startTiming]; [BP strategicChoices.sequencingRationale]; model adds post-Y1 hires only as revenue milestones require more implementation, engineering, and channel capacity."
- id: "A23"
  name: "Non-salary sales and marketing spend"
  value: "6-45"
  unit: "USD K per month"
  source: "[BP gtm founder-led outbound, lender referrals, and corridor-specific partnerships]; startup-finance heuristic for travel, conferences, CRM, and deal support in a niche enterprise market."
- id: "A24"
  name: "Non-salary research and development spend"
  value: "12-42"
  unit: "USD K per month"
  source: "[BP product and operations require secure workspaces, redaction controls, audit logs, and lender templates]; startup-finance heuristic for cloud, security, and workflow tooling."
- id: "A25"
  name: "Non-salary G&A and compliance spend"
  value: "8-30"
  unit: "USD K per month"
  source: "[BP operations counsel-reviewed redaction, export controls, and audit logs]; startup-finance heuristic for legal, insurance, accounting, and compliance overhead."
- id: "A26"
  name: "Cash conversion assumption"
  value: "EBITDA approximates cash movement"
  unit: "policy"
  source: "Startup-finance heuristic for a software business with minimal capex and no balance-sheet lending exposure in the modeled period."
- id: "A27"
  name: "Blended CAC"
  value: "85.9"
  unit: "USD K per new active program"
  source: "Model-derived from Y1-Y2 sales and marketing spend of $1.288M over 15 active-program launches, consistent with a narrow ICP and partner-assisted pipeline."
- id: "A28"
  name: "Steady-state annual ARPU for unit economics"
  value: "110"
  unit: "USD K per active program"
  source: "[A5 recurring software $100k] + [A6 partner/referral uplift $10k]; onboarding is excluded from steady-state ARPU."
- id: "A29"
  name: "Next financing proof point"
  value: "10 production customers, 15 active programs, and 3 repeat capital channels by Q4Y2"
  unit: "milestone"
  source: "[BP milestones 12-24 months]; funding ask is sized to hit this milestone and still preserve roughly six months of buffer."
