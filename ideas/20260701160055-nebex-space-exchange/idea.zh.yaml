topRisks:
- name: 放贷方仍觉得太空合同太过定制化
  description: 就算数据更干净了，很多银行或基金可能还是回避主权太空应收账款，或者给出过于保守的定价。
  mitigation: 先从地面系统、载荷组件这类可重复出现的合同类型入手，优先和已经活跃在航空航天、出口金融或政府应收账款领域的放贷方合作。
- name: 里程碑证据混乱或存在争议
  description: 如果技术验收或变更单数据不完整，平台可能会算错融资资格或融资基数质量。
  mitigation: 在工作流里保留人工复核环节，每个里程碑都要求提供书面证据，并在放款前直接对接客户的项目管理和开票系统。
- name: 出口管制限制了数据共享
  description: 国家安全相关规定可能让供应商没法把放贷方想要的完整技术细节分享出去，拖慢自动化进程和跨境推广。
  mitigation: 先在非涉密的商业或对地观测项目上落地，采用可脱敏的尽调工作流，并与出口管制律师合作，划定安全的数据边界。
