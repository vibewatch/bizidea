jobsToBeDone:
- job: 当供应商准备为一份主权太空合同融资时，帮 CFO 做出一份放贷方可用的材料包，这样才能在下一笔里程碑回款前先支取营运资金。
  currentAlternative: 手工搭建数据室，再找银行、基金或现有投资人谈过桥融资
  successMetric: 从中标到完成融资所用的天数，以及合同金额中可融资的比例
- job: 当一个融资项目在运行时，帮财务和合同团队提前发现里程碑、许可或变更单方面的风险，这样才能保住可用额度、避免触发契约违约。
  currentAlternative: 靠表格追踪 ERP 导出数据、邮件收件箱和项目复盘会
  successMetric: 在里程碑逾期或契约意外触发之前，发现融资基数问题所需的时间
