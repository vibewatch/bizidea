problem: 商业太空供应商给主权项目供货时，往往要先垫上数月的工程、硬件和合规开支，才能等到一笔里程碑回款。通用型放贷机构很少看得懂出口许可限制、技术验收测试或政府变更单，CFO 只能靠稀释性股权融资、风险债，或看总包商脸色求点账期宽限来补缺口。结果就是，就算需求真实存在，健康的供应商也没法去投更大的合同，现金流也理不顺。
targetUser:
  primary: 50-300 人规模的美国和欧洲卫星、载荷、地面系统供应商的 CFO 和合同负责人，客户是海湾和亚太地区的主权太空项目
  secondary: 评估同类合同放款可行性的专业贷款机构、私募信贷方和出口融资合作伙伴
  buyer: 供应商方的 CFO 或财务副总裁
startupThesis:
  nonObviousInsight: 这个市场真正重要的变化，不只是太空支出在增加，而是交易所式的交易基础设施抢在融资标准建立之前先冒了出来。一个赛道已经有投资人背书、有明确的银行合作关系，却只有一个还没上线的交易所层，这时候真正值钱的控制点，就转移到了能让放贷方看懂里程碑合同的供应商侧数据模型上。谁能把合同打包、里程碑证据和出口合规证明标准化，谁就能成为太空金融的授信中间件——不用自己去做交易所也能拿下这个位置。
  beachhead: 50-300 人规模的美国或欧洲载荷、地面系统或卫星零部件供应商的 CFO 和合同团队，手上有 1-3 个价值 $5M-$50M 的主权合同，需要出口许可，里程碑回款要等 120-270 天
  wedge: 一个把合同变成融资基数的工作台：吃进中标文件、出口许可、里程碑证据和供应商发票，产出放贷方可用的应收账款材料包，并持续监测契约合规情况
  whyNowCatalyst: Nebex 融资 $30M、聚焦出口密集型的 $100M 以上交易，还搭上了摩根大通这层银行关系，这些都说明机构资本已经抢先进入太空金融，而供应商侧的现金流管理还没有像样的工具。
  ventureScalePath: 先从中小型太空供应商的里程碑融资切入，再扩展到发射、卫星服务和军民两用航空航天合同，最终成为跨境政府科技类应收账款的授信与分发轨道。
solution: 产品接入合同库、ERP 系统、项目管理工具和合规文件，为每一份主权太空合同建一份实时融资档案。它把里程碑计划、出口许可状态、技术验收证据、发票历史和变更单风险，统一整理成一份放贷方或基金能直接拿去做授信的融资基数视图。供应商用它申请放款、监控契约缓冲空间、分享脱敏后的尽调材料包，不用每换一个财务方就重建一次数据室。放贷方那边则能收到标准化提醒——里程碑延迟、许可到期、交易对手变更范围，太空应收账款因此不再是一桩桩孤注一掷的赌局，而更像是可以持续监控的资产。公司可以先做纯软件起步，等业绩数据积累够了，再叠加融资撮合或嵌入式资本。
goToMarketSeed:
  firstCustomer: 一家 75-250 人规模的美国卫星零部件或地面系统供应商，手握一份已签约的 $10M-$30M 海湾主权合同，备齐出口许可文件，里程碑回款要等 120-270 天
  buyingTrigger: 拿下一份跨境主权合同或变更单，导致下一笔里程碑回款前的营运资金需求上升
  currentAlternative: 过桥股权融资、风险债、手工搭建的放贷方数据室、总包商预付款，以及靠表格手动追踪合同
  switchingReason: 这个切口能把一份技术上很复杂的合同，变成一份银行愿意放款的应收账款材料包，缩短融资周期、减少股权稀释，而且不用逼供应商搬去一个新的交易市场
  pricingHypothesis: 按每个融资项目收取年度 SaaS 费用，外加对通过资本合作伙伴撮合的融资规模收取基点抽成
