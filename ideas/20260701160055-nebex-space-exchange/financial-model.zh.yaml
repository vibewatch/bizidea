scenarios:
  downside:
    description: 放贷方和 ECA 渠道转化得更晚，买家更多只停留在一个在管项目上，服务占比在更长时间里保持更重。
    y3RevenueK: 3216.6
    y3EbitdaK: -1427.0
    cashLowPointK: -950.6
    keyAssumptionChanges:
    - Q4Y3 在管项目数收于 36 个，而不是 50 个。
    - 每个项目的月度综合收入比基础情景低约 8-10%。
    - 毛利率收于 70%，而不是 72%。
  base:
    description: 创始人主导销售在第二年转为渠道辅助，引导上线模板持续改进，公司在 Q4Y3 达到研究测算的 SOM 运行速率。
    y3RevenueK: 4827.6
    y3EbitdaK: -219.9
    cashLowPointK: 218.0
    keyAssumptionChanges:
    - 无变化；这就是主模型里编码的运营计划。
  upside:
    description: 试点转生产的转化和第二个项目的扩容都提前到来，合作伙伴渠道带来更多业务量，而招聘规模不用同比例上升。
    y3RevenueK: 5725.0
    y3EbitdaK: 472.9
    cashLowPointK: 608.6
    keyAssumptionChanges:
    - Q4Y3 在管项目数收于 56 个，而不是 50 个。
    - 每个项目的月度综合收入比基础情景高约 3-4%。
    - 毛利率收于 73%，而不是 72%。
sensitivity:
- variable: ARPU
  downsideCase: 每个项目的综合收入比计划低 10%，因为买家抵触高价实施收费。
  baseCase: 每个项目的综合收入，按 A10-A12 中引导上线加经常性收入的组合走。
  upsideCase: 每个项目的综合收入比计划高 10%，因为第二个项目扩容和合作伙伴抽成更快显现。
  y3RevenueImpactK: -482.8
  cashImpactK: -347.6
- variable: CAC
  downsideCase: CAC 每个在管项目上升约 $20K，因为合作伙伴转介表现不及预期，更多交易需要直接外呼获客。
  baseCase: 在创始人主导销售和资本合作方转介的支撑下，CAC 保持在每个在管项目约 $85.9K。
  upsideCase: 随着放贷方渠道变得可重复使用，CAC 每个在管项目下降约 $15K。
  y3RevenueImpactK: -240.0
  cashImpactK: -300.0
- variable: churn
  downsideCase: 月流失率升至 2.8%，因为单项目客户没能扩展为重复融资。
  baseCase: 月流失率保持 1.8%，多季度项目和重复工作流抵消了自然到期流失。
  upsideCase: 月流失率降至 1.2%，因为更多账户同时并行运行多个项目。
  y3RevenueImpactK: -360.0
  cashImpactK: -260.0
- variable: sales cycle
  downsideCase: 平均销售周期拉长约 90 天，因为律师和放贷方的尽调仍然是定制化的。
  baseCase: 新合同中标和变更单，让转化速度保持在创始人主导计划的预期附近。
  upsideCase: 一旦两套放贷方模板成为可信的参考案例，销售周期缩短约 45 天。
  y3RevenueImpactK: -800.0
  cashImpactK: -700.0
- variable: gross margin
  downsideCase: 毛利率在第三年末收于 68%，因为引导上线和脱敏复核仍然高度依赖人工。
  baseCase: 毛利率在第三年末收于 72%，略高于计划目标的 70%。
  upsideCase: 毛利率在第三年末收于 74%，因为可复用模板和更好的路由减少了交付工作量。
  y3RevenueImpactK: 0.0
  cashImpactK: -193.1
- variable: hiring pace
  downsideCase: 在转化率尚未完全得到验证之前，第三年的三个招聘计划就提前了一个季度。
  baseCase: 招聘按 A22 中的顺序推进，规模化 GTM 只在第二年验证点达成之后才加码。
  upsideCase: 第三年后期的部分招聘可以延后一个季度，因为合作伙伴渠道的规模化效率超出预期。
  y3RevenueImpactK: -120.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济流程
  mermaid: |
    flowchart LR
      Awards[合同中标 / 变更单] --> Pilots[付费试点]
      Pilots --> Programs[在管融资项目]
      Programs --> Subscription[订阅收入]
      Programs --> Services[实施费 + 合作伙伴费用]
      Subscription --> Revenue[总收入]
      Services --> Revenue
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> EBITDA[EBITDA]
      Opex[人力 + 运营支出] --> EBITDA
      EBITDA --> Cash[期末现金]
modelSanity:
- checkName: 收入引擎
  finding: 基础情景下第三年收入要达到 $4.8M，前提是在管融资项目要从 Q4Y2 的 15 个增长到 Q4Y3 的 50 个，同时每个项目的月度综合收入要从 $11.5K 涨到 $13.3K。
- checkName: 必须成立的前提
  finding: 资本合作方转介必须在第二年年中前变得可重复，公司才能在第三年净增 35 个在管项目，而不用组建规模大得多的直销团队。
- checkName: 模型会崩溃的情形
  finding: 如果渠道延误两个季度，或者每个项目的综合定价回落到纯软件水平，下行情景会在第三年结束前跌破零线约 $951K。
- checkName: 下一轮融资的验证依据
  finding: 只要公司证明了 10 个生产客户、15 个在管项目和三条可重复的资本渠道，且 Q4Y2 现金仍维持在约 $0.7M，种子轮的故事就站得住。
sanityChecks:
  ruleOf40: 第三年增速 303% + EBITDA 利润率 -5% = 298%（方向上远高于 40，不过这仍是建立在第二年较小收入基数上的早期数字）。
  burnMultiple: 第二年的燃烧倍数（burn multiple）约为净新增 ARR 的 1.3 倍，第三年随着毛利润追上固定人力成本，改善到约 0.1 倍。
  revenuePerFte: 按 Q4Y3 的 15 名全职员工计算，第三年人均创收 $322K（落在垂直 SaaS 大致 $200-400K 的对标区间内）。
  flags:
  - 基础情景需要靠合作伙伴带动，在 12 个月内把在管项目从 15 个提速到 50 个；如果渠道转化延迟，下行情景的现金会转负。
  - 每个在管项目的综合收入高于 $96K 的市场代理值，因为模型里包含了引导上线费和合作伙伴抽成；如果去掉这些额外收入，回本周期和第三年收入都会走弱。
  - 毛利率只有在引导上线模板和脱敏工作流真正实现可复用、而不是继续依赖大量服务投入时，才能达到 70% 出头的水平。
