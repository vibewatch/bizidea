slug: space-milestone-finance-os
date: '2026-07-01'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date 2026-07-01]；模型与已批准计划的起始月份一致。'
- id: A2
  name: 种子前轮融资到账后的起始现金
  value: '3300'
  unit: USD K
  source: '[BP fundingAsk.targetFundingRangeUsd $2–4M 及 BP fundingAsk.runwayMonths 18]；模型采用 $3.3M，让公司既能达到 10 客户/15 项目的验证点，又能留出六个月的现金缓冲。'
- id: A3
  name: 损益表中的客户单位
  value: 受监控的在管融资项目
  unit: unit
  source: '[BP businessModel.unitOfValue：受监控的在管主权融资项目]。'
- id: A4
  name: 每个新融资项目的付费引导上线费
  value: '27.5'
  unit: USD K per new program
  source: '[BP investorMemo.firstCustomer initialContract：$20k-35k 付费引导上线加试点]；模型取中位数。'
- id: A5
  name: 每个在管项目的稳态经常性年度软件收入
  value: '100'
  unit: USD K per program-year
  source: '[BP investorMemo.firstCustomer：每个在管项目 $80k-120k 年度软件收入]；[Research market.som 变现代理值约 $96k/项目]；模型在成熟期按经常性收入 $100k 取整。'
- id: A6
  name: 合作伙伴转介与规模抽成带来的增益
  value: '10'
  unit: USD K per active program-year
  source: '[BP gtm.pricing：可选的基点转介抽成]；[BP businessModel.revenueStreams：融资规模转介或抽成收入]。'
- id: A7
  name: 第一年各月末在管融资项目数
  value: 0,0,0,0,1,1,1,2,2,2,3,4
  unit: programs
  source: '[BP milestones 0-12 个月：三个付费试点、两份生产订阅，以及至少一次重复融资流程]；模型第一年末在管项目数为 4 个。'
- id: A8
  name: 第二年各季末在管融资项目数
  value: 6,9,12,15
  unit: programs
  source: '[BP milestones 12-24 个月：达到 10 个生产客户、15 个及以上受监控的在管融资项目]。'
- id: A9
  name: 第三年各季末在管融资项目数
  value: 23,31,40,50
  unit: programs
  source: '[BP milestones 24-36 个月：达到约 50 个在管项目-年]；[Research market.som：基于 50 个在管项目-年测算 $4.8M]；运营判断认为第三年运行速率必须接近 50 个项目，才能与 SOM 叙事对上。'
- id: A10
  name: 第一年每个在管项目的月度综合收入
  value: M5-M12 = 27,27,27,25,25,25,28,30
  unit: USD K per average active program per month
  source: '[A4-A6]；早期月份以引导上线收入为主，所以综合收入高于单纯的经常性软件收入。'
- id: A11
  name: 第二年每个在管项目的月度综合收入
  value: Q1-Q4 = 10.0,10.5,11.0,11.5
  unit: USD K per average active program per month
  source: '[A4-A6]；[BP milestones：第二年末达到 15 个以上在管项目]；全年收入结构从试点引导逐步转向经常性平台费。'
- id: A12
  name: 第三年每个在管项目的月度综合收入
  value: Q1-Q4 = 11.8,12.3,12.8,13.3
  unit: USD K per average active program per month
  source: '[A4-A6]；[Research market.som：第三年目标 $4.8M]；随着重复项目和合作伙伴抽成叠加到经常性软件收入上，综合单价随之上升。'
- id: A13
  name: 毛利率爬坡
  value: Y1 55-60%; Y2 62-68%; Y3 69-72%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct：70]；创业公司财务经验法则——在可复用模板降低交付成本之前，托管式引导上线和脱敏质检以服务投入为主。'
- id: A14
  name: 单位经济模型使用的月流失率
  value: '1.8'
  unit: percent
  source: 创业公司财务经验法则，针对绑定多年期融资项目的高 ACV 工作流软件——留存率高，但单个项目仍会陆续到期退出。
- id: A15
  name: 创始人年度全成本现金薪酬
  value: '180'
  unit: USD K
  source: 创业公司财务经验法则，针对种子前轮阶段拿低于市场薪酬的创始人，已含薪资税和福利。
- id: A16
  name: 工程团队年度全成本薪酬
  value: '210'
  unit: USD K per FTE
  source: '[BP team：创始工程师及后续工程招聘]；创业公司财务经验法则，针对 GovCon 相关 B2B 软件中的资深工作流与安全工程师。'
- id: A17
  name: 产品与合同金融团队年度全成本薪酬
  value: '200'
  unit: USD K per FTE
  source: '[BP team：创始产品与合同金融负责人]；创业公司财务经验法则，针对资深领域产品经理/运营者。'
- id: A18
  name: 解决方案与实施团队年度全成本薪酬
  value: '160'
  unit: USD K per FTE
  source: '[BP team：解决方案工程师，Month 3 入职]；创业公司财务经验法则，针对实施密集型垂直 SaaS 交付人才。'
- id: A19
  name: 资本合作团队年度全成本薪酬
  value: '180'
  unit: USD K per FTE
  source: '[BP team：资本合作负责人，Month 6 入职]；创业公司财务经验法则，针对覆盖放贷方、ECA 和顾问的资深 BD 人员。'
- id: A20
  name: 销售与客户成功团队年度全成本薪酬
  value: 170-190
  unit: USD K per FTE
  source: '[BP sequencingRationale：规模化伙伴关系要等试点验证可重复性之后才展开]；创业公司财务经验法则，针对早期一名 AE 及后续客户成功/营收岗位。'
- id: A21
  name: 财务与运营团队年度全成本薪酬
  value: '150'
  unit: USD K per FTE
  source: 创业公司财务经验法则，针对审计、合规和报告负荷增加后、在周期末新增的财务/运营岗位。
- id: A22
  name: 招聘计划
  value: M4 Solutions1; M7 Capital1; M10 Eng2; M14 Solutions2; M16 Sales1; M19 Eng3; M22 Sales2; M25 Capital2; M28 Solutions3; M29 Eng4; M31 Sales3; M33 Finance1
  unit: hires
  source: '[BP team startTiming]；[BP strategicChoices.sequencingRationale]；模型只在营收里程碑要求更多实施、工程和渠道产能时，才在第一年之后新增招聘。'
- id: A23
  name: 非薪资类销售与市场支出
  value: 6-45
  unit: USD K per month
  source: '[BP gtm：创始人主导外联、放贷方转介和特定通路合作]；创业公司财务经验法则，覆盖小众企业市场中的差旅、会议、CRM 和交易支持支出。'
- id: A24
  name: 非薪资类研发支出
  value: 12-42
  unit: USD K per month
  source: '[BP product 与 operations：需要安全工作台、脱敏控制、审计日志和放贷方模板]；创业公司财务经验法则，覆盖云、安全和工作流工具支出。'
- id: A25
  name: 非薪资类行政管理与合规支出
  value: 8-30
  unit: USD K per month
  source: '[BP operations：经律师审核的脱敏、出口管制和审计日志]；创业公司财务经验法则，覆盖法务、保险、会计和合规方面的开销。'
- id: A26
  name: 现金转化假设
  value: EBITDA 近似等于现金变动
  unit: policy
  source: 创业公司财务经验法则，针对建模期内资本支出极少、且资产负债表上没有放贷敞口的软件业务。
- id: A27
  name: 综合获客成本（CAC）
  value: '85.9'
  unit: USD K per new active program
  source: 根据模型推算，第一、二年销售与市场支出 $1.288M，对应新增 15 个在管项目，与狭窄的目标客户画像及伙伴辅助获客管道相符。
- id: A28
  name: 单位经济模型中的稳态年度 ARPU
  value: '110'
  unit: USD K per active program
  source: '[A5 经常性软件收入 $100k] + [A6 合作伙伴/转介增益 $10k]；稳态 ARPU 不含引导上线费用。'
- id: A29
  name: 下一轮融资的验证点
  value: 10 production customers, 15 active programs, and 3 repeat capital channels by Q4Y2
  unit: milestone
  source: '[BP milestones 12-24 个月]；融资金额按达到这一里程碑、同时保留约六个月缓冲现金来测算。'
