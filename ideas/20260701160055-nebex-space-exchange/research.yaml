  pestle:
  - factor: political
    impact: positive
    point: Governments continue publishing space strategies, tenders, and budget requests, which keeps sovereign demand visible even before contracts are standardized.
    sourceRefs:
    - 9
    - 31
    - 28
  - factor: economic
    impact: negative
    point: Inflation, budget instability, and long payment cycles can erode the real value of fixed contracts and delay supplier investment.
    sourceRefs:
    - 4
    - 100
  - factor: social
    impact: negative
    point: Workforce and capability shortages still constrain aerospace and space supply chains, which increases execution risk on financed milestones.
    sourceRefs:
    - 97
