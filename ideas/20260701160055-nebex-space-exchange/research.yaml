competitors:
- name: Nebex
  stage: seed
  wedge: Space-economy exchange connecting sovereign buyers, space companies, and capital providers.
  pricing: Fee on closed deals / contact team; no public list pricing.
  strength: Direct category signal, strong founder credibility, and explicit banking relationships.
  weaknessVsUs: Appears focused on large deal matching and market infrastructure rather than lender-ready packaging for subscale suppliers.
  sourceRefs:
  - 67
  - 68
  - 107
- name: Taulia
  stage: incumbent
  wedge: Buyer-led supply-chain finance and supplier-liquidity platform, tightly linked to SAP workflows.
  pricing: Custom / contact sales.
  strength: Strong supplier-financing narrative, enterprise integration, and broad working-capital credibility.
  weaknessVsUs: Optimized for approved-payables and general supplier finance, not export-license-heavy space milestones.
  sourceRefs:
  - 70
- name: PrimeRevenue
  stage: scale-up
  wedge: Working-capital and supply-chain-finance network spanning buyers, suppliers, and funding banks.
  pricing: Flexible custom pricing via working-capital analyst.
  strength: Mature SCF onboarding and explicit supplier-funding workflow experience.
  weaknessVsUs: Still framed around generic SCF and invoice-driven liquidity rather than technical-acceptance evidence and sovereign-contract redactions.
  sourceRefs:
  - 75
  - 76
- name: Deltek Costpoint
  stage: incumbent
  wedge: GovCon ERP and compliance system of record for contract, labor, procurement, and audit data.
  pricing: Custom / demo-led enterprise pricing.
  strength: Deep credibility with FAR, DFARS, CAS, CMMC, billing, and audit-readiness in government contracting.
  weaknessVsUs: Tracks compliant execution but does not become the financing file or lender-monitoring layer.
  sourceRefs:
  - 94
- name: Icertis
  stage: incumbent
  wedge: AI-native CLM and contract-intelligence platform for enterprise obligations and workflow automation.
  pricing: Custom / demo-led enterprise pricing.
  strength: Strong contract abstraction, search, and workflow automation across enterprise teams.
  weaknessVsUs: Generic contract intelligence is not the same as borrowing-base logic, milestone tracking, or financing-partner collaboration.
  sourceRefs:
  - 80
