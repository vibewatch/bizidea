  adoptionFrictionMatrix:
  - friction: Export-control redaction and end-use evidence
    severity: high
    affectedBuyer: CFO and contracts lead
    mitigation: Launch with role-based sharing, document-level redaction, and counsel-reviewed evidence templates by jurisdiction.
    sourceRefs:
    - 22
    - 25
  - friction: Lender skepticism toward bespoke space receivables
    severity: high
    affectedBuyer: CFO and treasury team
    mitigation: Start with repeatable milestone types and lenders already comfortable with export or manufacturing finance.
    sourceRefs:
    - 52
    - 105
  - friction: Data extraction from ERP, CLM, and procurement files
    severity: medium
    affectedBuyer: Finance operations
    mitigation: Use managed onboarding first, then productize Deltek- and CLM-adjacent connectors once the field model stabilizes.
    sourceRefs:
    - 94
    - 80
  - friction: Long and uneven government funding cycles
    severity: high
    affectedBuyer: CFO and CEO
    mitigation: Sell around fresh awards and change orders, and tie early ROI to faster facility setup rather than generic workflow efficiency.
    sourceRefs:
    - 4
    - 55
    - 100
  - friction: Small initial buyer universe
    severity: medium
    affectedBuyer: Founder and revenue lead
    mitigation: Concentrate on one corridor first and use lender- and ecosystem-led referrals instead of broad top-of-funnel marketing.
    sourceRefs:
    - 31
    - 36
    - 47
market:
  tam:
    value: $117.6M
    rationale: Modeled 1,225 eventual U.S./Europe supplier-programs × ~$96k annual platform value = $117.6M. Units are anchored to the UK’s 1,907-space-organization / 266->£5M disclosures, scaled against U.S. private-sector space employment, then narrowed to mid-market supplier programs; the monetization proxy is estimated from quote-based CLM and SCF benchmarks.
    isEstimate: true
    sourceRefs:
    - 2
    - 4
    - 5
    - 76
    - 91
  sam:
    value: $31.7M
    rationale: Modeled 330 beachhead programs limited to U.S. and European suppliers pursuing sovereign or export-heavy contracts into APAC and Gulf-style markets × ~$96k = $31.7M.
    isEstimate: true
    sourceRefs:
    - 31
    - 36
    - 68
    - 91
  som:
    value: $4.8M
    rationale: Modeled 50 active program-years by year 3 × ~$96k = $4.8M, roughly 35-45 suppliers if each runs 1.1-1.4 financed programs and channel partners accelerate onboarding.
    isEstimate: true
    sourceRefs:
    - 55
    - 60
    - 91
    - 105
