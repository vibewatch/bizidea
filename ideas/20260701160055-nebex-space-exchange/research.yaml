openQuestions:
- Which Gulf sovereign buyers will allow enough milestone and compliance evidence to be shared with non-domestic lenders, and under what redaction rules?
- What advance rates do specialist lenders offer against pre-acceptance versus post-acceptance milestones on space hardware contracts?
- Will Nebex remain focused on roughly $100M-plus exchange-style deals, or will it move downmarket into supplier underwriting workflows?
- How many 50-300 employee U.S. and European space suppliers actually have two or more export-heavy sovereign programs in flight at once?
- Which systems dominate the target customer stack in practice—Deltek, SAP, NetSuite, homegrown PLM or ERP, or contract folders—and how much integration work is required per account?
