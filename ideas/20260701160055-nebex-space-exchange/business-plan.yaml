slug: space-milestone-finance-os
date: "2026-07-01"
executiveSummary: >-
  The company should launch as a software-first milestone-finance OS for
  mid-market space suppliers, not as another exchange, lender, or GovCon ERP.
  The beachhead is 75-250 employee U.S. and European satellite-component and
  ground-systems suppliers that have signed $10M-$30M Gulf sovereign contracts
  and face 120-270 day payment gaps between engineering spend and milestone
  cash. The MVP should ingest award documents, export licenses, milestone
  evidence, invoices, and change orders into a redaction-aware workspace that
  produces lender-ready receivables packages and ongoing covenant monitoring.
  Go-to-market should start with founder-led sales and lender or ECA referrals
  timed to fresh contract awards or scope-expanding change orders, because that
  is when the CFO feels immediate dilution and working-capital pressure.
  Pricing should be per active financed program with paid implementation and
  optional partner-volume take rates, matching value to each financed contract
  rather than seats. The best competitive position is below Nebex's large-deal
  exchange layer and beside Deltek, Icertis, and generic SCF networks as the
  supplier-side translation layer they do not provide. The plan deliberately
  avoids direct lending, classified programs, and broad aerospace expansion
  until the company proves that standardized evidence packs improve lender
  response times and pilot-to-production conversion. The core gaps are still
  material: the research does not establish real advance rates, signed design
  partners, or which system stack dominates the ICP, so the first 12 months
  must be treated as a falsification campaign as much as a build plan.
problem:
  - Suppliers front-load engineering, hardware, and export-compliance spend for months before sovereign milestone payments arrive.
  - Generalist lenders do not easily underwrite export-heavy space contracts, so CFOs rebuild bespoke data rooms and bridge the gap with dilutive or expensive capital.
  - GovCon ERP, CLM, and generic supply-chain-finance tools track pieces of execution, but none is the live borrowing-base and covenant-monitoring workspace for these contracts.
solution:
  - Build a redaction-aware workspace that turns award documents, milestone schedules, export licenses, invoices, and acceptance evidence into lender-ready receivables packages.
  - Monitor milestone slips, license expiry, scope changes, and invoice progress so supplier finance teams and capital partners can keep facilities eligible after close.
  - Start software-first with partner referrals into banks, ECAs, and private-credit funds only after the platform proves which contract structures are actually financeable.
whyWeWin:
  - The product sits in the gap between exchange infrastructure, internal systems of record, and generic supplier-finance rails, where no retained source showed a space-specific underwriting workspace.
  - Every financed program compounds proprietary data on milestone performance, buyer jurisdiction, redaction rules, and lender appetite that adjacent incumbents do not naturally collect.
  - Selling against a fresh contract award or change order ties ROI to shorter financing cycles and lower dilution, not to a broad transformation budget.
strategicChoices:
  beachhead: U.S. and European satellite-component and ground-systems suppliers with 75-250 employees, one to three signed Gulf sovereign contracts, export-license requirements, and 120-270 day milestone payment gaps.
  wedgeRationale: >-
    This slice has acute cash-flow pain, enough contract value to justify a
    six-figure software decision, and a measurable before-and-after outcome:
    whether one financed program closes faster and stays covenant-compliant. It
    should produce proof faster than selling to broad aerospace or defense
    because the workflow is narrower, the buyer is identifiable, and the
    current alternative is still manual data-room assembly.
  sequencingRationale: >-
    Product should begin with managed onboarding, lender-ready packaging, and
    monitoring before any direct capital or marketplace ambition, because lender
    trust and export-control handling are the real gating risks. GTM should
    start with founder-led sales plus lender, ECA, and adviser referrals around
    fresh awards, then add reusable integrations and channel partners only
    after pilots show that packages shorten diligence cycles. Hiring should
    follow that order: engineering and contract-finance product talent first,
    solutions capacity second, and scaled partnerships only once the first
    corridor produces repeatable references.
  notYet:
    - Running a marketplace for $100M-plus cross-border space deals
    - Putting capital on the balance sheet
    - Serving classified or highly restricted defense programs
    - Replacing ERP or CLM systems of record
market:
  tam: "$117.6M estimated TAM based on roughly 1,225 eventual addressable supplier-programs at about $96k modeled annual platform value."
  sam: "$31.7M estimated SAM for the initial U.S. and European supplier beachhead selling into Gulf and similar export-heavy sovereign programs."
  som: "$4.8M year-3 SOM based on roughly 50 active program-years, or about 35-45 suppliers running 1.1-1.4 financed programs each."
  segments:
    - Mid-market U.S. and European space hardware suppliers selling into sovereign programs with long milestone payment gaps
    - Aerospace lenders, export-finance partners, and private-credit funds underwriting the same receivables
  buyingProcess: >-
    Evaluation starts when a supplier wins a new sovereign contract, receives a
    change order, or has to renew a working-capital facility before the next
    milestone payment. A controller or contracts lead assembles evidence, but
    the CFO or VP Finance owns budget, and production approval likely requires
    export-control counsel, security review, and at least one financing partner
    willing to test the standardized package.
product:
  mvp: >-
    The MVP should support managed ingestion of contract awards, milestone
    schedules, export-license documents, invoices, and acceptance evidence into
    a secure workspace with lender templates, redaction controls, and covenant
    alerts. It should not include direct lending, a marketplace, or full ERP
    replacement in the first release.
  sixMonth: Ship production pilots with redaction-aware document sharing, milestone-to-eligibility mapping, lender-ready package generation, and alerts for milestone slip, license expiry, and change-order risk.
  twelveMonth: Add reusable workflow templates for the two most common system stacks discovered in pilots, multi-lender collaboration, audit exports, and baseline routing logic across bank, ECA-backed, and private-credit financing paths.
  twentyFourMonth: Expand from one corridor and one financed program workflow into portfolio analytics, repeat financing across multiple programs per supplier, and adjacent dual-use aerospace or government-tech receivables only after the initial wedge is proven.
  keyBets:
    - Suppliers will buy software before financing closes if it materially shortens diligence and reduces dilution pressure.
    - Specialist lenders will treat standardized milestone evidence as enough to issue actionable indicative terms.
    - Export-control redaction can be productized without stripping out the evidence lenders need.
    - The first corridor is dense enough to produce references before the company broadens into adjacent contract categories.
gtm:
  wedge: Land one financed sovereign program immediately after contract award or change order, prove faster lender diligence and cleaner covenant visibility, then expand to every financeable program inside the account.
  channels:
    - Founder-led outbound to CFOs, VP Finance leaders, and heads of contracts at target suppliers
    - Referrals from aerospace lenders, export-finance advisers, and ECA-adjacent banking partners
    - Implementation and data-readiness partners near GovCon ERP and CLM workflows
  funnelTargets: "Qualified discovery to paid pilot 20%+, paid pilot to production 50%+, and production customer to second financed program 60%+ within 12 months."
  pricing: Annual platform fee per active financed program, plus paid implementation and optional basis-point referral economics on partner-sourced financing volume, because value is created contract by contract rather than by seat count.
businessModel:
  revenueStreams:
    - Annual subscription per active financed program
    - Implementation and integration fees during onboarding
    - Referral or take-rate revenue on financing volume introduced through capital partners
    - Premium analytics and portfolio-monitoring modules as customers expand beyond a single contract
  unitOfValue: Active financed sovereign program under monitoring
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more financed programs and legal entities inside the same supplier account
    - Add more lender and ECA partners that reuse the same evidence package
    - Expand from the Gulf corridor into adjacent export-heavy sovereign or dual-use aerospace contracts
    - Upsell analytics, benchmarking, and portfolio-monitoring workflows once enough program history exists
strategyMap:
  northStarMetric: Monitored contract value that reaches lender-ready status and receives actionable financing terms.
  inputMetrics:
    - Median days from contract award or change order to lender-ready package
    - Percentage of packages accepted by financing partners without full manual rebuild
    - Median lender turnaround time to indicative terms
    - Paid pilot to production conversion rate
    - Active financed programs per production customer
    - Percentage of monitored programs with no missed evidence or covenant deadlines
  moatsToBuild:
    - Structured dataset on which milestone types, buyer jurisdictions, and compliance states actually finance
    - Reusable redaction and evidence templates by corridor, contract type, and lender class
    - Supplier-to-lender workflow history that shows which data gaps predict financing delays or exclusions
    - Partner-routing logic across bank, ECA-backed, and private-credit options
  killCriteria:
    - Fewer than 8 of the first 20 qualified suppliers confirm a financing pain severe enough to support software budget.
    - Fewer than 3 lenders or export-finance partners provide actionable indicative terms from the first 10 standardized dossiers.
    - Paid pilot to production conversion stays below 50% after the first 6 pilots.
    - Median package-preparation time fails to improve by at least 50% versus the customer's prior manual process after three live deployments.
  mermaid: |
    flowchart LR
      Wedge[Contract packaging wedge] --> MVP[Redaction-aware finance OS]
      MVP --> Proof[Faster term sheets and cleaner monitoring]
      Proof --> Expansion[More programs, more lenders, adjacent receivables]
investorMemo:
  verdict:
    call: Watch
    conviction: Real customer pain and a credible workflow wedge exist, but lender behavior and market density remain too unproven for a high-conviction partner meeting today.
    whyBelieve: The startup attacks a specific cash-flow bottleneck that exchange infrastructure, GovCon ERP, and generic SCF tools do not solve in one supplier-facing workflow.
    whyDoubt: The initial wedge is narrow, and the business breaks if lenders still treat these contracts as bespoke regardless of cleaner data.
    nextDiligence: Put 5-10 live contract dossiers in front of specialist lenders and verify that standardized packages produce repeatable indicative terms and paid supplier pilots.
  firstCustomer:
    title: CFO-led finance team at a mid-market satellite-component or ground-systems supplier
    profile: A 75-250 employee U.S. or European supplier with one signed $10M-$30M Gulf sovereign program, export-license paperwork, and a 120-270 day gap before the next paid milestone.
    trigger: Winning a new contract or change order that increases working-capital needs before the next accepted milestone invoice.
    buyer: CFO or VP Finance
    initialContract: "$20k-35k paid onboarding and pilot on one program, converting to roughly $80k-120k annual software revenue per active financed program plus implementation and optional partner referral economics."
  mustBeTrue:
    - At least half of the first 20 target suppliers have an immediate financing pain tied to one live sovereign program and will fund software before capital is secured.
    - Three or more specialist lenders or export-finance partners will issue actionable indicative terms from a standardized evidence pack without rebuilding the diligence process from scratch.
    - Counsel-approved redaction workflows let at least one U.S. supplier and one European supplier share enough evidence for underwriting without violating export-control obligations.
    - Paid pilots convert to annual production contracts at a 50%+ rate with blended ACV in the $80k-$120k range per active program.
    - The initial corridor is dense enough to reach roughly 50 active program-years by year 3, or the adjacent expansion thesis into broader government-tech receivables is false.
  diligenceQuestions:
    - What advance rates, exclusions, and pricing do lenders offer on pre-acceptance versus post-acceptance space milestones?
    - Which Gulf buyers and jurisdictions allow enough technical and compliance evidence to be shared with non-domestic lenders?
    - How many reachable suppliers actually run two or more financeable sovereign programs in a typical year?
    - Which system stack is most common in the ICP, and how much deployment work is required before the first lender-ready package is usable?
    - Does Nebex or any adjacent capital platform intend to move downmarket into supplier-side packaging and monitoring for sub-$50M programs?
operatingAssumptions:
  - assumption: Specialist lenders will use a standardized milestone-evidence package to issue actionable terms on at least some sovereign space contracts.
    basis: research.yaml
    validationTest: Run 5-10 live dossiers through at least 3 aerospace, export-finance, or private-credit lenders and track advance-rate indications, exclusions, and turnaround time.
    decisionImpact: If false, reposition toward internal monitoring and audit workflow rather than financing-origination enablement.
  - assumption: CFOs and VP Finance buyers will fund the first deployment if the product is sold around dilution avoidance and faster financing close, not generic workflow efficiency.
    basis: idea.yaml
    validationTest: Win at least 3 paid pilots from the target titles after 10-15 structured buyer interviews in the beachhead corridor.
    decisionImpact: If false, narrow the wedge to lender-side workflow, services-led packaging, or a lower-ACV contracts operations tool.
  - assumption: Export-control redaction and permissioning can be productized enough to satisfy counsel and lenders without fully manual document handling.
    basis: research.yaml
    validationTest: Complete one U.S. and one European pilot with counsel-reviewed sharing templates and no underwriting-blocking data-access issue.
    decisionImpact: If false, restrict the market to less controlled contract types or domestic-only workflows until compliance scope is simplified.
  - assumption: Per-program pricing around $80k-$120k annualized is acceptable because it remains small relative to the cost of delayed financing or dilutive bridge capital.
    basis: research.yaml
    validationTest: Convert 3 pilots into annual contracts at or near the target price band while keeping implementation scope controlled.
    decisionImpact: If false, lower ACV expectations, add service revenue, or shift to a lighter monitoring product with a different sales motion.
  - assumption: The initial supplier corridor is dense enough to support efficient customer acquisition before expansion into adjacent aerospace or government-tech receivables.
    basis: research.yaml
    validationTest: Build a named-account map of the first 100 targets and confirm enough live programs, buyer access, and repeat financing triggers to support the first 10 production customers.
    decisionImpact: If false, broaden the wedge earlier into adjacent export-heavy contract categories or abandon the corridor-first strategy.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Run 15 structured interviews with CFOs, controllers, and heads of contracts at target suppliers in the initial corridor.
    hypothesis: Contract award and change-order events create urgent financing pain that is budgetable at the CFO level.
    successMetric: At least 8 buyers describe a current or imminent program with a 120-day-plus cash gap and a willingness to test software before closing financing.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Collect 5-10 live contract dossiers and have specialist lenders review the standardized evidence pack.
    hypothesis: A structured package will generate faster and more consistent indicative terms than today's bespoke data-room process.
    successMetric: At least 3 lenders return actionable indicative terms or explicit eligibility feedback on 5 or more dossiers.
    owner: Capital partnerships lead
  - horizon: 0–90 days
    experiment: Build a managed MVP for one design partner that maps milestones, licenses, invoices, and acceptance evidence into a lender-ready package.
    hypothesis: The first product can prove value with managed ingestion and workflow before deep integrations are required.
    successMetric: One customer package is produced in less than 10 business days and accepted for live diligence by a financing partner.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Launch 2 paid pilots with covenant monitoring, lender collaboration, and redaction-aware document sharing.
    hypothesis: Suppliers will pay for ongoing monitoring once the first package reduces diligence friction on a live program.
    successMetric: Two pilots go live, at least one facility or term sheet is issued, and median preparation time falls by 30% or more versus the customer's baseline.
    owner: Founding product lead
  - horizon: 6–12 months
    experiment: Test one capital-channel motion and one implementation-partner motion in parallel.
    hypothesis: Lender or adviser referrals plus integration partners can create pipeline without turning the company into a services-heavy business.
    successMetric: The two channels generate 4 qualified opportunities and partner services stay below 20% of total pilot revenue.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Productize the top two data-ingestion patterns found in pilots into reusable workflows.
    hypothesis: Deployment time can fall materially after the first few customers without narrowing the ICP too far.
    successMetric: The second and third production deployments each go live within 30 days of kickoff.
    owner: Solutions engineer
operations:
  - Managed onboarding process that converts each new contract into a milestone map, evidence checklist, and lender template before automation is expanded.
  - Counsel-reviewed redaction and role-based access workflow for export-controlled documents by jurisdiction.
  - Weekly eligibility review that compares milestone status, open document gaps, and covenant headroom across every active program.
  - Audit-log architecture for document versions, approvals, evidence changes, and lender-facing actions.
  - Partner-routing playbook that decides whether a program fits bank, ECA-backed, or private-credit financing paths.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales, lender and adviser relationships, and the first corridor's account map.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the secure contract data model, workflow engine, redaction controls, and first reusable ingestion patterns.
  - role: Founding product and contract-finance lead
    startTiming: Month 0
    rationale: Translate sovereign contract evidence and underwriting questions into a narrow product buyers and lenders will trust.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Shorten onboarding cycles, harden customer data quality, and keep managed pilots from overwhelming the founding team.
  - role: Capital partnerships lead
    startTiming: Month 6
    rationale: Turn lender, ECA, and adviser relationships into a repeatable source of indicative terms and qualified opportunities.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 design partners in the U.S. and Europe to Gulf sovereign-contract corridor
      - Produce 10 lender-reviewed program dossiers and convert at least 3 paid pilots
      - Ship the redaction-aware workspace with lender templates, eligibility dashboards, and covenant alerts
      - Close 2 production subscriptions and at least one repeat financing workflow inside an existing customer
  - horizon: 12–24 months
    items:
      - Reach 10 production customers and 15 or more active financed programs under monitoring
      - Add reusable workflows for the two most common customer data stacks discovered in the first deployments
      - Establish 3 repeat capital-side channels across banks, ECA-linked lenders, or private-credit partners
      - Expand into one adjacent export-heavy corridor only after the first corridor shows repeatable pilot-to-production conversion
  - horizon: 24–36 months
    items:
      - Reach roughly 50 active program-years under monitoring, consistent with the researched year-3 SOM
      - Launch portfolio analytics and benchmark reporting derived from accumulated milestone and financing outcomes
      - Expand into adjacent dual-use aerospace or government-tech receivables with the same evidence and monitoring engine
risks:
  - risk: Lenders continue to view sovereign space receivables as too bespoke even after packaging is standardized.
    likelihood: Medium
    impact: High
    mitigation: Start with repeatable contract types, target lenders already active in export or manufacturing finance, and measure term-sheet responsiveness early.
  - risk: Export-control and national-security rules block enough evidence sharing to make underwriting workflows too manual.
    likelihood: High
    impact: High
    mitigation: Focus first on non-classified programs, use counsel-reviewed redaction templates, and build document-level permissions before deeper automation.
  - risk: The reachable supplier base is smaller or less frequent than the modeled SAM implies.
    likelihood: Medium
    impact: High
    mitigation: Build a named-account map early, prove density in one corridor, and expand into adjacent receivables categories if the base market is too thin.
  - risk: Nebex or adjacent ERP, CLM, or SCF incumbents extend downmarket into the same supplier-side workflow.
    likelihood: Medium
    impact: Medium
    mitigation: Win on workflow depth, lender-template reuse, and accumulated financing-performance data rather than on category storytelling alone.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: Build the founding team and first solutions capacity, ship a managed MVP with secure redaction workflows, run 3-5 paid pilots with lender partners, and prove repeatable pilot-to-production conversion before raising a seed round.
