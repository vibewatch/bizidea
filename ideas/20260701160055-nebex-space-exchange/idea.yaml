jobsToBeDone:
  - job: >-
      When preparing to finance a sovereign space contract, help the supplier
      CFO produce a lender-ready package, so they can draw working capital
      before the next milestone payment.
    currentAlternative: "Manual data rooms plus bridge-financing conversations with banks, funds, or existing investors"
    successMetric: "Days from contract award to financing close and percent of contract value financeable"
  - job: >-
      When a financed program is running, help finance and contracts teams spot
      milestone, license, or change-order risks early, so they can protect
      availability and avoid covenant breaches.
    currentAlternative: "Spreadsheet tracking across ERP exports, inboxes, and program-review calls"
    successMetric: "Time to identify a borrowing-base issue before a missed milestone or covenant surprise"
ideaScorecard:
  signalStrength:
    score: 4
    rationale: "A fresh $30M round, explicit bank relationship, and repeated coverage of cross-border deal friction make the signal concrete even though the market is still early."
  painIntensity:
    score: 4
    rationale: "Suppliers can miss growth opportunities or accept dilution when milestone payments lag and financiers cannot underwrite their contracts."
  wedgeClarity:
    score: 5
    rationale: "The first product is tightly scoped to lender-ready packaging and monitoring for a narrow set of sovereign space contracts."
  defensibility:
    score: 4
    rationale: "Normalized contract data, lender templates, and performance outcomes across financed programs create a proprietary underwriting dataset over time."
  ventureScale:
    score: 4
    rationale: "The beachhead is niche, but the model can expand into broader aerospace, defense, and government-tech receivables infrastructure."
topRisks:
  - name: "Lenders still view space contracts as too bespoke"
    description: "Even with cleaner data, many banks or funds may still avoid sovereign space receivables or price them too conservatively."
    mitigation: "Start with repeatable contract types such as ground systems and payload components, and partner first with lenders already active in aerospace, export finance, or government receivables."
  - name: "Milestone evidence is messy or disputable"
    description: "If technical acceptance or change-order data is incomplete, the platform could misstate funding eligibility or borrowing-base quality."
    mitigation: "Keep human review in the workflow, require documentary evidence at each milestone, and integrate directly with customer program-management and invoicing systems before financing is advanced."
  - name: "Export-control constraints limit data sharing"
    description: "National-security rules may prevent suppliers from sharing the full technical context lenders want, slowing automation and cross-border adoption."
    mitigation: "Launch on non-classified commercial or earth-observation programs with redaction-aware diligence workflows and partner with export-control counsel to define safe data boundaries."
