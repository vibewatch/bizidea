  growthRateSourceRefs:
  - 4
  tailwinds:
  - point: 机构资本正在抢先给太空金融管道基础设施投钱，工作流标准还没定型。
    sourceRefs:
    - 68
    - 107
  - point: 各国主权机构仍在持续发布战略、招标和合作邀约，制造出可重复出现的买家需求。
    sourceRefs:
    - 31
    - 28
    - 36
  - point: 公共出口金融机构已经在为出口商的营运资金和供应链金融提供担保，这就搭好了可以直接合作的轨道。
    sourceRefs:
    - 37
    - 55
    - 60
  headwinds:
  - point: 合规和出口管制负担压缩了供应商基数，也让放贷方的数据共享更复杂。
    sourceRefs:
    - 22
    - 25
    - 99
  - point: 预算的不可预测性和通胀，让供应商在需求到来之前不敢贸然扩产。
    sourceRefs:
    - 4
    - 96
    - 100
  - point: 在产能爬坡阶段，航空航天供应商的资金约束正变得越来越明显。
    sourceRefs:
    - 97
    - 105
competitors:
- name: Nebex
  stage: 种子期
  wedge: 连接主权买家、太空公司和资本方的太空经济交易所。
  pricing: 按成交交易收费/需联系团队；无公开定价。
  strength: 直接的赛道信号、强有力的创始人背书，以及明确的银行合作关系。
  weaknessVsUs: 看起来聚焦大额交易撮合和市场基础设施，而不是给中小型供应商做放贷方可用的材料打包。
  sourceRefs:
  - 67
  - 68
  - 107
- name: Taulia
  stage: 现有厂商
  wedge: 买方主导的供应链金融与供应商流动性平台，与 SAP 工作流深度绑定。
  pricing: 定制报价/需联系销售。
  strength: 供应商融资叙事扎实，企业级集成能力强，营运资金方面的信誉广泛。
  weaknessVsUs: 为已批准的应付账款和通用供应商金融而优化，不是为出口许可密集型的太空里程碑而设计。
  sourceRefs:
  - 70
- name: PrimeRevenue
  stage: 规模化阶段
  wedge: 覆盖买家、供应商和放款银行的营运资金与供应链金融网络。
  pricing: 通过营运资金分析师提供灵活定制报价。
  strength: 成熟的 SCF 引导上线流程，以及明确的供应商资金工作流经验。
  weaknessVsUs: 整体框架仍然围绕通用 SCF 和发票驱动的流动性，而不是技术验收证据和主权合同脱敏。
  sourceRefs:
  - 75
  - 76
- name: Deltek Costpoint
  stage: 现有厂商
  wedge: 面向合同、人力、采购和审计数据的 GovCon ERP 与合规记录系统。
  pricing: 定制报价/演示驱动的企业级定价。
  strength: 在政府合同领域的 FAR、DFARS、CAS、CMMC、计费和审计就绪方面有深厚信誉。
  weaknessVsUs: 能追踪合规执行，但没有成为融资档案或放贷方监控层。
  sourceRefs:
  - 94
- name: Icertis
  stage: 现有厂商
  wedge: 面向企业义务管理和工作流自动化的 AI 原生 CLM 与合同智能平台。
  pricing: 定制报价/演示驱动的企业级定价。
  strength: 在企业团队之间提供强大的合同抽象、检索和工作流自动化能力。
  weaknessVsUs: 通用合同智能，不等同于融资基数逻辑、里程碑追踪或融资合作方协作。
  sourceRefs:
  - 80
regulatoryTechnicalConstraints:
- point: ITAR 和欧盟两用物项规则要求对最终用户、最终用途和航空航天物项进行出口管制尽调，这限制了能与放贷方共享的内容。
  sourceRefs:
  - 22
  - 25
- point: 政府承包商类客户已经默认需要符合 FAR、DFARS、CAS、DCAA 等框架的审计轨迹和受管控流程。
  sourceRefs:
  - 94
- point: 专用零部件、测试产能和供应链瓶颈，可能拖延技术验收，进而影响融资资格。
  sourceRefs:
  - 96
  - 98
  - 102
  - 104
validationSignals:
- point: Nebex 融资 $30M，并新增摩根大通合作关系，为太空经济搭建金融基础设施。
  sourceRefs:
  - 68
  - 107
- point: EXIM 把一笔 $185M 的 CesiumAstro 制造贷款，作为太空通信融资的标杆案例来宣传。
  sourceRefs:
  - 52
- point: UKEF 明确为出口商及其供应商提供出口营运资金和供应链贴现支持，并附带部分担保。
  sourceRefs:
  - 55
  - 60
- point: ISRO 公开汇总了 20 多个中心的在招项目，证实商业供应商已经面对可重复出现的公共采购流程。
  sourceRefs:
  - 36
- point: 新加坡正积极邀请本地和国际太空公司入驻，把这个产业和自己的研发及区域商业生态绑定在一起。
  sourceRefs:
  - 31
openQuestions:
- 哪些海湾主权买家会允许把足够的里程碑和合规证据分享给非本国放贷方？具体适用什么样的脱敏规则？
- 针对太空硬件合同，专业放贷机构对验收前和验收后的里程碑分别提供怎样的放款比例？
- Nebex 会继续聚焦 $100M 以上的交易所式大单，还是会下沉到供应商授信工作流？
- 50-300 人规模的美国和欧洲太空供应商里，真正同时在跑两个及以上出口密集型主权项目的到底有多少？
- 目标客户的系统组合里，实际占主导的到底是 Deltek、SAP、NetSuite、自研 PLM 或 ERP，还是纯合同文件夹？每个账户需要多少集成工作量？
