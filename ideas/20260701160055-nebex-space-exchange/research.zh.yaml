  fiveForces:
    supplierPower:
      score: 3
      rationale: 专用零部件、测试产能和受合规限制的供应商池，让证据收集变得混乱，但软件供应商并不是核心瓶颈。
      sourceRefs:
      - 98
      - 102
    buyerPower:
      score: 4
      rationale: 相对较少的一批 CFO 和放贷方组合掌控着大额合同，他们随时可以退回手工流程、现有 ERP 或 CLM，或者通用型 SCF 方案。
      sourceRefs:
      - 75
      - 94
      - 105
    threatOfEntrants:
      score: 3
      rationale: 新的工作流工具是可以做出来的，但放贷方信任、出口管制流程知识和履约历史数据，构成了中等程度的壁垒。
      sourceRefs:
      - 68
      - 105
    threatOfSubstitutes:
      score: 4
      rationale: 现有的替代方案包括买方主导的 SCF、GovCon ERP、CLM、过桥融资和手工数据室，它们都只能解决问题的一部分。
      sourceRefs:
      - 70
      - 75
      - 94
      - 80
    competitiveRivalry:
      score: 3
      rationale: 目前直接做太空金融软件的专业玩家还很少，但实力强劲的相邻现有厂商已经占据了采购、合同或营运资金的轨道。
      sourceRefs:
      - 68
      - 70
      - 75
      - 94
      - 80
  pestle:
  - factor: 政治
    impact: positive
    point: 各国政府持续发布太空战略、招标和预算申请，这让主权需求在合同标准化之前就已经清晰可见。
    sourceRefs:
    - 9
    - 31
    - 28
  - factor: 经济
    impact: negative
    point: 通胀、预算不稳定和漫长的回款周期，会侵蚀固定合同的实际价值，拖延供应商的投资节奏。
    sourceRefs:
    - 4
    - 100
  - factor: 社会
    impact: negative
    point: 劳动力和产能短缺依然制约着航空航天和太空供应链，这增加了已融资里程碑的执行风险。
    sourceRefs:
    - 97
    - 98
    - 102
  - factor: 技术
    impact: positive
    point: 具备 AI 能力的 CLM 和 GovCon ERP 系统，让结构化的合同、采购和合规数据比以往周期更容易获取。
    sourceRefs:
    - 80
    - 94
  - factor: 法律
    impact: negative
    point: ITAR 和欧盟两用物项出口管制规则，提高了共享尽调数据的成本，也让跨境放贷方参与变得更复杂。
    sourceRefs:
    - 22
    - 25
  - factor: 环境
    impact: neutral
    point: 太空可持续性和太空碎片治理方面的努力，增加了需要留存的文档面，但它们不是这个切口最初的主要购买触发因素。
    sourceRefs:
    - 5
  adoptionFrictionMatrix:
  - friction: 出口管制脱敏与最终用途证据
    severity: high
    affectedBuyer: CFO 和合同负责人
    mitigation: 上线时就采用基于角色的共享、文档级脱敏，以及按司法辖区、经律师审核的证据模板。
    sourceRefs:
    - 22
    - 25
  - friction: 放贷方对定制化太空应收账款持怀疑态度
    severity: high
    affectedBuyer: CFO 和资金团队
    mitigation: 先从可重复的里程碑类型入手，找已经熟悉出口或制造业金融的放贷方合作。
    sourceRefs:
    - 52
    - 105
  - friction: 从 ERP、CLM 和采购文件中提取数据
    severity: medium
    affectedBuyer: 财务运营团队
    mitigation: 先用托管式引导上线，等字段模型稳定之后，再把贴近 Deltek 和 CLM 的连接器产品化。
    sourceRefs:
    - 94
    - 80
  - friction: 漫长且不均衡的政府资金周期
    severity: high
    affectedBuyer: CFO 和 CEO
    mitigation: 围绕新合同中标和变更单去卖，把早期 ROI 和更快的授信搭建挂钩，而不是泛泛的工作流效率。
    sourceRefs:
    - 4
    - 55
    - 100
  - friction: 初始买家范围较小
    severity: medium
    affectedBuyer: 创始人和营收负责人
    mitigation: 先集中做一条通路，靠放贷方和生态圈主导的转介，而不是宽泛的漏斗顶端营销。
    sourceRefs:
    - 31
    - 36
    - 47
market:
  tam:
    value: $117.6M
    rationale: 建模测算：1,225 个最终可触达的美国/欧洲供应商-项目组合 × 约 $96k 的年化平台价值 = $117.6M。基数单位锚定在英国披露的 1,907 家太空机构、266 家营收超 £5M 的机构，再对照美国私营部门太空就业规模做缩放，最终收窄到中型供应商项目；变现代理值参考了报价制 CLM 和 SCF 的对标数据估算而来。
    isEstimate: true
    sourceRefs:
    - 2
    - 4
    - 5
    - 76
    - 91
  sam:
    value: $31.7M
    rationale: 建模测算：330 个滩头市场项目，限定为追求主权或出口密集型合同、面向亚太和海湾类市场的美国和欧洲供应商 × 约 $96k = $31.7M。
    isEstimate: true
    sourceRefs:
    - 31
    - 36
    - 68
    - 91
  som:
    value: $4.8M
    rationale: 建模测算：第三年 50 个在管项目-年 × 约 $96k = $4.8M，如果每家供应商运行 1.1-1.4 个融资项目，且渠道伙伴加速引导上线，相当于约 35-45 家供应商。
    isEstimate: true
    sourceRefs:
    - 55
    - 60
    - 91
    - 105
