scenarios:
  downside:
    description: 预算审批更慢，导致有 1 个客户从 Y2 推迟到 Y3，同时压低混合 ARPU 和毛利率。
    y3RevenueK: 1300.0
    y3EbitdaK: -273.0
    cashLowPointK: 940.0
    keyAssumptionChanges:
    - 随着试点转正时用量扩张偏弱，混合年化 ARPU 降到 $200K。
    - 销售周期大致拉长 1 个季度，因此 Y2 末只有 5 个客户，而不是 6 个。
    - 由于实施工时没有按计划下降，毛利率最高只能到 65%。
  base:
    description: Y1 的 2 个付费设计伙伴转成参考案例驱动的增长，到 Y3 末做到 8 个客户。
    y3RevenueK: 1687.5
    y3EbitdaK: 62.8
    cashLowPointK: 1296.0
    keyAssumptionChanges:
    - 混合年化 ARPU 保持在 $225K。
    - 客户数从 Y1 末的 2 个增长到 Y2 末的 6 个，再到 Y3 末的 8 个。
    - 随着连接器复用提升，毛利率从 Y1 的 55% 改善到 Y3 的 70% 目标。
  upside:
    description: 参考案例和合作伙伴转介绍提前带来 1 个额外企业客户，同时小幅提高价格兑现。
    y3RevenueK: 2010.0
    y3EbitdaK: 295.0
    cashLowPointK: 1450.0
    keyAssumptionChanges:
    - 更强的用量增长和模块附加率把混合年化 ARPU 拉升到 $240K。
    - 借助合作伙伴转介绍，Y2 下半年多签 1 个客户，Y3 上半年再多签 1 个。
    - 随着可复用连接器覆盖大部分早期账户通道，毛利率提升到 72%。
