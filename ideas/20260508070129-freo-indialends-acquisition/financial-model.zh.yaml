modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  QualifiedPipeline[合格销售管道] --> NewCustomers[新客户]\n  NewCustomers --> ActiveCustomers[活跃客户]\n  ActiveCustomers --> Revenue[收入]\n  Revenue --> GrossProfit[毛利]\n  Revenue --> COGS[销售成本]\n  GrossProfit --> Opex[运营费用]\n  Opex --> EBITDA[EBITDA]\n  EBITDA --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自：Y1 做到 2 个付费客户、Y2 末做到 6 个、Y3 末做到 8 个，混合年化 ARPU 为 $225K。
- checkName: 必须跑通的点
  finding: 公司需要在第 12 个月前拿下 1 个非并购的新渠道上线案例，否则销售管道会被零散的并购事件卡死。
- checkName: 模型失效条件
  finding: 如果销售周期延后约 1 个季度、毛利率停在 65% 附近，下行情景下 EBITDA 会持续为负，现金低点会逼近约 $0.94M。
- checkName: 下一轮融资证明点
  finding: 达到可进行 seed 融资的标志是：4-6 个生产客户、实施工时持续下降、连接器复用率 >60%，并跑出 1 条参考案例驱动的扩张路径。
sanityChecks:
  ruleOf40: Y3 增长 87.5% + EBITDA 利润率 3.7% = 91.2%
  burnMultiple: Y2 burn multiple 为 0.35x（-$255.6K EBITDA / $731.2K 净新增收入）。
  revenuePerFte: 按期末 12 名 FTE 计算，Y3 人均收入为 $140.6K（低于纯 SaaS 的 $200-400K，但部分可由实施占比较高的交付模式解释）。
  flags:
  - 由于前 8 个客户仍需要较重的实施支持，Y3 之前的人均收入都低于纯 SaaS 基准。
  - 基准情景假设 Y4 之前没有客户流失；只要早期有 1 个部署失败，就会同时伤到 ARR 和参考案例质量。
  - 毛利率直到 Y3 才达到 70% 目标，因此连接器复用和严格收窄 ICP 是成败关键。
