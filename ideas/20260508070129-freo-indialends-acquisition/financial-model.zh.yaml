slug: lending-stack-integration-os
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP 日期 2026-05-08；模型从计划获批后的次月开始]'
- id: A2
  name: 期初现金等于已完成的 pre-seed 融资
  value: '2000'
  unit: USDK
  source: '[BP fundingAsk 为 $2-4M 区间；基准情景取下限 $2.0M]'
- id: A3
  name: 初始 ICP
  value: 正在推进迁移或渠道上线的 Series B+ 印度数字借贷机构 / NBFC 背书应用
  unit: segment
  source: '[BP executiveSummary；research reportMemo.customerAndBuyer]'
- id: A4
  name: 定价结构
  value: 实施费 + 年度平台订阅费 + 按完成流程 / 活跃贷方集成计费的用量费
  unit: pricing model
  source: '[BP gtm.pricing；BP businessModel.revenueStreams]'
- id: A5
  name: 每个活跃客户的混合年化 ARPU
  value: '225'
  unit: USDK
  source: '[BP investorMemo.initialContract 为每年 $150-250k 平台支出；research market.som 为约 $200k 混合 ARR；启发式取中值并加上适度用量]'
- id: A6
  name: 新客户收入确认方式
  value: 客户签约当期按半期贡献确认，之后按完整周期确认
  unit: policy
  source: '[创业公司财务启发式：企业签单到收入爬坡采用中点法]'
- id: A7
  name: 第 1 年新增付费客户数
  value: '2'
  unit: logos
  source: '[BP 里程碑 0-12 个月：拿下 2 个付费设计伙伴，并至少转化 1 个为生产客户]'
- id: A8
  name: 第 2 年末生产客户数
  value: '6'
  unit: logos
  source: '[BP 里程碑 12-24 个月：做到 4-6 个生产客户；基准情景取上限]'
- id: A9
  name: 第 3 年末客户数
  value: '8'
  unit: logos
  source: '[BP market SOM 为 8 个企业客户；BP 里程碑 24-36 个月：8+ 个账户]'
- id: A10
  name: 第 1 年毛利率
  value: '55'
  unit: percent
  source: '[BP operatingAssumptions：在连接器复用提升前，首批部署以服务交付为主]'
- id: A11
  name: 第 2 年毛利率
  value: '64'
  unit: percent
  source: '[BP 里程碑 12-24 个月：实施工时下降，并走向 >70% 毛利率]'
- id: A12
  name: 第 3 年毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A13
  name: 漏斗顶部转化目标
  value: 每季度 12-15 次合格 ICP 对话；设计伙伴到付费试点 30-40%；试点到生产 >60%
  unit: funnel
  source: '[BP gtm.funnelTargets]'
- id: A14
  name: 初始招聘节奏
  value: 起步即配创始人和工程师；第 1 个月补解决方案负责人；第 3 个月补产品/合规；第 6 个月补实施负责人；第 9 个月补 AE
  unit: hiring plan
  source: '[BP team]'
- id: A15
  name: 扩张招聘节奏
  value: 第 16 个月补工程师；第 19 个月补运营；第 22 个月补实施 FTE；第 25 个月补第二名 AE；第 31 个月补第 4 名工程师
  unit: hiring plan
  source: '[创业公司财务启发式，与 BP 里程碑保持一致：Y2 达到 4-6 个客户，Y3 达到 8+ 个]'
- id: A16
  name: 全包年化现金薪酬
  value: 创始人 72；工程师 57.6；解决方案 50.4；产品/合规 54；实施负责人 55.2；销售 54；运营 43.2；实施专员 48
  unit: USDK per FTE
  source: '[创业公司财务启发式：印度金融科技创业公司的现金薪资与福利混合水平]'
- id: A17
  name: 非薪资运营支出爬坡
  value: 从 Y1 早期每月约 18K 上升到 Y3 Q4 每月约 44K
  unit: USDK per month
  source: '[创业公司财务启发式：锚定受监管企业在云、法务、合规和差旅方面的需求]'
- id: A18
  name: 用于单位经济模型的稳态客户流失率
  value: '1.5'
  unit: percent per month
  source: '[创业公司财务启发式：适用于年合同、粘性较强的企业基础设施软件]'
- id: A19
  name: 显式预测中的流失假设
  value: Y4 之前不在模型中计入客户流失，因为前 8 个账户都是年合同部署，且参考案例风险高
  unit: forecast policy
  source: '[创业公司财务启发式，与 BP 强调保护早期参考案例保持一致]'
- id: A20
  name: 每个新客户的混合 CAC
  value: '95'
  unit: USDK
  source: '[模型推导的启发式：基于 Y2-Y3 销售与营销支出除以 6 个试点后赢单，锚定创始人主导的企业销售]'
- id: A21
  name: 现金转化假设
  value: EBITDA 近似代表经营现金变动；在这个阶段，capex 和营运资金波动影响很小
  unit: cash policy
  source: '[创业公司财务启发式：适用于 pre-seed 软件模型]'
- id: A22
  name: 融资目标
  value: 做到 4-6 个生产客户、1 个非并购部署、>60% 可复用连接器覆盖率，并保留 6 个月缓冲
  unit: milestone
  source: '[BP fundingAsk.useOfFundsSummary；BP milestones]'
