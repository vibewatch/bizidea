topRisks:
  - name: "Niche entry market"
    description: "Pure post-acquisition integrations could be too episodic if fintech M&A volume slows."
    mitigation: "Start with M&A migrations, then expand the same product into any new channel or lender-launch integration once inside the account."
  - name: "Internal-build competition"
    description: "Large fintechs may believe they can stitch acquired systems together with internal engineering."
    mitigation: "Win on speed, lender-specific templates, and audit logging that would take months for internal teams to reproduce."
  - name: "Regulatory sensitivity"
    description: "Handling credit workflows touches consent, KYC, and bureau processes that can become compliance liabilities."
    mitigation: "Position as an orchestration and evidence layer, avoid being lender-of-record, and build immutable logs plus configurable policy controls."
