topRisks:
- name: 切入市场偏窄
  description: 如果金融科技并购放缓，纯粹的并购后整合需求可能过于零散。
  mitigation: 先从并购迁移切入，进到客户后，再把同一产品扩展到任何新渠道或新贷方上线整合。
- name: 内部自建竞争
  description: 大型金融科技公司可能觉得自己靠内部工程团队就能把收购系统拼起来。
  mitigation: 靠速度、贷方特定模板和审计日志取胜——这些能力内部团队往往要花数月才能补齐。
- name: 监管敏感度高
  description: 处理信贷工作流会触及同意、KYC 和征信流程，一旦出问题就会变成合规责任。
  mitigation: 把产品定位为编排和证据层，避免成为放贷责任主体，并从一开始就提供不可篡改日志和可配置策略控制。
