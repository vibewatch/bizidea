problem: 当一家数字借贷机构收购贷款市场平台或获客渠道时，难点不在新闻稿，而在于如何在不拖住增长的前提下，把线索流、同意记录、征信查询、承保逻辑和贷方路由并成一套。大多数团队靠内部整合小组、脆弱的 API 和表格硬拼，结果就是申请被拒、合规断档，而且要拖上几个月，收购才真正开始贡献收入。在节奏很快的消费借贷里，这种延迟足以吃掉交易价值。
targetUser:
  primary: 正在整合收购来的贷款市场平台或 DSA 式获客渠道的印度消费金融科技公司借贷运营负责人或产品负责人
  secondary: 拥有多个外部贷方合作伙伴的数字借贷机构 CTO 或整合负责人
  buyer: 首席产品官或借贷负责人
startupThesis:
  nonObviousInsight: 在印度数字借贷里，整合只有在收购方能快速把获客、准入规则和合规证据打通到两套栈上时才会创造价值；只有分发、没有操作系统级整合，只会变成负毛利的复杂度。
  beachhead: 切入刚收购消费贷款市场平台的印度数字借贷机构的并购后整合，先从线索路由、同意与征信编排、贷方准入映射做起。
  wedge: 一个借贷整合控制平面，把收购来的流量映射进收购方的承保、合作贷方和贷后服务栈，同时保留来源归因和审计轨迹。
  whyNowCatalyst: Freo 收购 IndiaLends 说明，金融科技公司正在通过整合来扩张信贷分发，这让他们必须立刻把分散的借贷工作流并起来，而不是另起炉灶。
  ventureScalePath: 一旦先拿下并购后的整合场景，产品就可以扩展成多渠道信贷分发的记录系统：合作方接入、策略管理、贷后流转，以及跨贷方和产品的组合分析。
solution: 为必须把收购来的获客渠道并入单一运营栈的印度数字借贷机构，搭建一个整合控制平面。产品先把收购渠道里的申请人数据标准化，再编排同意、KYC、征信查询和贷方准入检查，随后把每笔申请路由到正确的承保和贷后处理路径。它还会保留收购资产的线索来源血缘，让团队在交易完成后按渠道看到转化、欺诈和单位经济模型。面向合规和合作方管理，系统会生成完整事件日志：谁采集了同意、触发了哪次征信调用、命中了哪条贷方策略、文件最终记到了哪里。首版部署不替换核心系统，只叠加在现有 LOS、CRM 和合作方 API 之上。
goToMarketSeed:
  firstCustomer: 一家 Series B+ 的印度消费金融科技公司或有 NBFC 背书的应用，拥有 1M+ 用户、3+ 借贷合作方，并且手上正有一个新收购的个人贷款市场平台要整合。
  buyingTrigger: 收购交割、迁移项目启动，或通过收购渠道上线新信贷产品。
  currentAlternative: 内部整合小组，加上表格、自定义中间件和现有 LOS/CRM 连接器。
  switchingReason: 专门做这件事的控制平面能缩短整合时间、减少断裂申请，并在不重建核心系统的情况下，为新旧漏斗同时提供可审计的证据。
  pricingHypothesis: 按年收取平台费，再按完成的申请流或活跃的合作贷方集成收取用量费。
