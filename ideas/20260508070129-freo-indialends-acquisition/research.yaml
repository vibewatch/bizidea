competitors:
- name: FinBox
  stage: scale-up
  wedge: Digital-lending operating system with decisioning, onboarding, risk, and ecosystem integrations.
  pricing: Custom enterprise pricing / request demo
  strength: Clear lending-specific positioning, fast go-live messaging, and strong ecosystem breadth.
  weaknessVsUs: Optimized for launching/scaling credit products broadly, not explicitly for post-acquisition source normalization and audit lineage across merged funnels.
  sourceRefs:
  - 18
  - 19
- name: Lentra
  stage: scale-up
  wedge: Intelligent lending cloud spanning origination, management, data, multi-bureau, AA, and verification modules.
  pricing: Custom enterprise pricing
  strength: End-to-end suite breadth and credibility with banks/NBFCs looking for broader modernization.
  weaknessVsUs: Heavier platform choice; less obviously the fastest overlay for urgent acquired-channel migrations.
  sourceRefs:
  - 20
- name: Decentro
  stage: scale-up
  wedge: API-first banking and lending infrastructure for KYC, banking, credit, and collections workflows.
  pricing: Custom enterprise pricing
  strength: Modular API depth plus lending case studies that show measurable process improvement.
  weaknessVsUs: More plumbing than control plane; customers still need cross-channel policy mapping, lineage, and migration governance.
  sourceRefs:
  - 21
  - 22
- name: Pennant Technologies
  stage: incumbent
  wedge: Composable lending platform / LOS-LMS stack for large financial institutions.
  pricing: Custom enterprise pricing
  strength: Proven large-scale transformation credibility, including Bajaj Finance’s 50M+ loan migration.
  weaknessVsUs: Best suited to broader core transformation projects; heavier and slower than an overlay built specifically for post-close funnel integration.
  sourceRefs:
  - 23
  - 24
