assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: month
  source: '[BP date 2026-05-08; model starts the month after plan approval]'
- id: A2
  name: Opening cash equals closed pre-seed round
  value: '2000'
  unit: USDK
  source: '[BP fundingAsk $2-4M range; base case uses low end $2.0M]'
- id: A3
  name: Initial ICP
  value: Series B+ Indian digital lender / NBFC-backed app with active migration or channel launch
  unit: segment
  source: '[BP executiveSummary; research reportMemo.customerAndBuyer]'
- id: A4
  name: Pricing architecture
  value: Implementation fee + annual platform subscription + usage per completed flow / active lender integration
  unit: pricing model
  source: '[BP gtm.pricing; BP businessModel.revenueStreams]'
- id: A5
  name: Blended annual ARPU per active customer
  value: '225'
  unit: USDK
  source: '[BP investorMemo.initialContract $150-250k annual platform spend; research market.som ~$200k blended ARR; heuristic uses midpoint plus modest usage]'
- id: A6
  name: Revenue recognition for new logos
  value: Half-period contribution in the period a customer is signed, then full contribution thereafter
  unit: policy
  source: '[Startup-finance heuristic: midpoint convention for enterprise bookings-to-revenue ramp]'
- id: A7
  name: Year 1 paid customer adds
  value: '2'
  unit: logos
  source: '[BP milestones 0-12 months: close 2 paid design partners and convert at least 1 to production]'
- id: A8
  name: Year 2 ending production customers
  value: '6'
  unit: logos
  source: '[BP milestones 12-24 months: reach 4-6 production customers; base case uses top end]'
- id: A9
  name: Year 3 ending customers
  value: '8'
  unit: logos
  source: '[BP market SOM 8 enterprise customers; BP milestones 24-36 months: 8+ accounts]'
- id: A10
  name: Year 1 gross margin
  value: '55'
  unit: percent
  source: '[BP operatingAssumptions: first deployments are services-heavy until connector reuse improves]'
- id: A11
  name: Year 2 gross margin
  value: '64'
  unit: percent
  source: '[BP milestones 12-24 months: declining implementation hours and path to >70% gross margin]'
- id: A12
  name: Year 3 gross margin
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A13
  name: Top-of-funnel conversion targets
  value: 12-15 qualified ICP conversations per quarter; 30-40% design-partner to paid pilot; >60% pilot to production
  unit: funnel
  source: '[BP gtm.funnelTargets]'
- id: A14
  name: Initial hiring cadence
  value: Founder and engineer at start; solutions lead month 1; product/compliance month 3; implementations lead month 6; AE month 9
  unit: hiring plan
  source: '[BP team]'
- id: A15
  name: Expansion hiring cadence
  value: Additional eng month 16, ops month 19, implementation FTE month 22, second AE month 25, fourth engineer month 31
  unit: hiring plan
  source: '[Startup-finance heuristic aligned to BP milestones for 4-6 customers by Y2 and 8+ by Y3]'
- id: A16
  name: Fully loaded annual cash compensation
  value: Founder 72; engineer 57.6; solutions 50.4; product/compliance 54; implementations lead 55.2; sales 54; ops 43.2; implementation associate 48
  unit: USDK per FTE
  source: '[Startup-finance heuristic: India fintech startup blended cash salary plus benefits]'
- id: A17
  name: Non-payroll operating spend ramp
  value: Rises from about 18K per month in early Y1 to about 44K per month by Q4 Y3
  unit: USDK per month
  source: '[Startup-finance heuristic anchored to regulated-enterprise cloud, legal, compliance, and travel needs]'
- id: A18
  name: Steady-state logo churn for unit economics
  value: '1.5'
  unit: percent per month
  source: '[Startup-finance heuristic for sticky enterprise infrastructure with annual contracts]'
- id: A19
  name: Explicit forecast churn assumption
  value: No modeled logo churn before Y4 because the first 8 accounts are annual-contract deployments with reference risk
  unit: forecast policy
  source: '[Startup-finance heuristic consistent with BP focus on protecting early references]'
- id: A20
  name: Blended CAC per new customer
  value: '95'
  unit: USDK
  source: '[Model-derived heuristic from Y2-Y3 sales and marketing spend over six post-pilot wins, anchored to founder-led enterprise sales]'
- id: A21
  name: Cash conversion assumption
  value: EBITDA approximates operating cash movement; capex and working-capital swings are immaterial at this stage
  unit: cash policy
  source: '[Startup-finance heuristic for pre-seed software model]'
- id: A22
  name: Fundraise objective
  value: Reach 4-6 production customers, one non-M&A deployment, >60% reusable connector coverage, and maintain 6 months of buffer
  unit: milestone
  source: '[BP fundingAsk.useOfFundsSummary; BP milestones]'
