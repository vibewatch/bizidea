modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      QualifiedPipeline --> NewCustomers
      NewCustomers --> ActiveCustomers
      ActiveCustomers --> Revenue
      Revenue --> GrossProfit
      Revenue --> COGS
      GrossProfit --> Opex
      Opex --> EBITDA
      EBITDA --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from reaching 2 paid logos in Y1, 6 by Y2 end, and 8 by Y3 end at a blended $225K annual ARPU.
- checkName: Must go right
  finding: The company needs one non-M&A channel-launch win by month 12 so the pipeline is not limited to episodic acquisition events.
- checkName: Model breaks if
  finding: If sales cycles slip about one quarter and gross margin stalls near 65%, downside EBITDA stays negative and cash low point falls toward about $0.94M.
- checkName: Next-round proof
  finding: A seed-ready milestone is 4-6 production customers with falling implementation hours, >60% connector reuse, and one reference-led expansion motion.
sanityChecks:
  ruleOf40: Y3 growth 87.5% + EBITDA margin 3.7% = 91.2%
  burnMultiple: Y2 burn multiple 0.35x (-$255.6K EBITDA / $731.2K net new revenue).
  revenuePerFte: $140.6K Y3 using 12 ending FTE (below $200-400K pure-play SaaS, but partly explained by implementation-heavy delivery).
  flags:
  - Revenue per FTE stays below pure-play SaaS benchmarks through Y3 because the first 8 accounts still require meaningful implementation support.
  - The base case assumes no logo churn before Y4; one failed early deployment would hurt both ARR and reference quality.
  - Gross margin only reaches the 70% target in Y3, so connector reuse and scoped ICP discipline are essential.
