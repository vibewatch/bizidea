scenarios:
  downside:
    description: 销售周期拉长，付费试点转年约的转化变慢，第 5 个 logo 要到 Y4 才拿到，而不是在 Q3Y3。
    y3RevenueK: 468.0
    y3EbitdaK: -440.0
    cashLowPointK: -1345.0
    keyAssumptionChanges:
    - 付费试点转年约从 BP 里的 50%+ 目标，下滑到约 40%。
    - 随着买家拿通用 FSM 价格做对照，退出 ACV 压缩到约 $135K。
    - 由于 onboarding 仍高度依赖服务，退出毛利率只能到约 68%。
  base:
    description: Y1 的 2 个付费试点，到 Y2 结束时转成 4 个年度客户，到 Q4Y3 达到 5 个；退出 ACV 接近研究支持的 $160K SOM 锚点。
    y3RevenueK: 636.0
    y3EbitdaK: -340.1
    cashLowPointK: -1246.2
    keyAssumptionChanges:
    - 客户爬坡遵循 BP 里程碑节奏：Y1 做 2 个试点，Y2 做 3-5 个年度客户。
    - 招聘遵循 BP 顺序，只有在“试点转正式合同”已经证明可复制后才扩大 GTM。
    - 随着集成越来越可复用，毛利率到 Y3 达到 72% 目标。
  upside:
    description: 试点证明更早落地，老客户更快扩到更多活跃城市，且 Y3 末还能再签下第 6 个 logo。
    y3RevenueK: 774.0
    y3EbitdaK: -245.0
    cashLowPointK: -1135.0
    keyAssumptionChanges:
    - 第 2 和第 3 个客户都比基准情景提前 1 个季度转化。
    - 由于多城市使用爬升更快，退出 ACV 提高到约 $170K。
    - 第 1 位销售在入职后 2 个季度内就进入产出状态。
sensitivity:
- variable: ARPU
  downsideCase: 由于折扣加大、城市范围更小，退出 ACV 只有 $135K
  baseCase: $156K 混合退出 ACV
  upsideCase: 随着多城市扩张更快，退出 ACV 达到 $170K
  y3RevenueImpactK: -84.0
  cashImpactK: -61.0
- variable: CAC
  downsideCase: 如果创始人外呼仍是唯一稳定渠道，CAC 升到 $70K
  baseCase: $55K CAC
  upsideCase: 如果更多投资人和运营者愿意引荐，CAC 降到 $45K
  y3RevenueImpactK: -24.0
  cashImpactK: -75.0
- variable: churn
  downsideCase: 若买家持续拿内部 BI 和 FSM 替代品做比较，月流失率升到 3.0%
  baseCase: 月流失率 1.8%
  upsideCase: 若工作流嵌入更强，月流失率降到 1.0%
  y3RevenueImpactK: -48.0
  cashImpactK: -36.0
- variable: 销售周期
  downsideCase: 从试点范围定义到付费启动需要 6 个月
  baseCase: 4 个月
  upsideCase: 若参考案例可复制，只需 3 个月
  y3RevenueImpactK: -96.0
  cashImpactK: -92.0
- variable: 毛利率
  downsideCase: 如果集成和质检仍更依赖人工，毛利率只有 68%
  baseCase: 72% 目标毛利率
  upsideCase: 若可复用数据连接器更多，毛利率可到 74%
  y3RevenueImpactK: 0.0
  cashImpactK: -25.0
- variable: 招聘节奏
  downsideCase: 把销售和第 2 位工程师都提前 2 个季度招进来
  baseCase: 按 BP 顺序招聘
  upsideCase: 把 1 个非核心岗位推迟到第 5 个 logo 成交后再招
  y3RevenueImpactK: 18.0
  cashImpactK: -120.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Leads[Founder and investor introductions] --> Pilots[Paid one-city pilots]\n  Pilots --> Annual[Annual city contracts]\n  Annual --> Usage[Partner and audit usage fees]\n  Annual --> Revenue[Subscription revenue]\n  Usage --> Revenue\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash after opex]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自到 Q4Y3 的 5 家运营商，每家退出 ACV 约 $156K，靠的是“付费试点转年度合同”的销售动作。
- checkName: 必须成立的事
  finding: 公司必须先把前 2 个付费试点转成多城市年约，然后才能加专职销售。
- checkName: 模型会在哪儿先断
  finding: 如果销售周期拖到 6 个月，同时买家把 ACV 压在通用 FSM 价格带附近，基准情景会最快失效。
- checkName: 下一轮融资证明点
  finding: 当 5 个年度客户都已上线，且至少 1 个相邻保洁部署证明公司能超出初始切口扩张时，下一轮融资才算站得住。
sanityChecks:
  ruleOf40: Y3 增速 86.8% + EBITDA 利润率 -53.5% = 33.3%。
  burnMultiple: Y2 的烧钱倍数约为 1.9x，对应约 $0.23M 的净新增 ARR；Y3 改善到约 1.0x，对应约 $0.34M 的净新增 ARR。
  revenuePerFte: 按年收入和年末 7 名 FTE 计算，Y3 每名 FTE 收入约 $91K（SaaS 对标通常为 $200–400K）。
  flags:
  - 第 3 年的基准情景已经碰到研究里 5 客户的 SOM 锚点，所以要讲成资本故事，后面仍得靠多城市和相邻品类扩张。
  - 由于集成、质检和开城入驻到 Y3 仍然比较重人力，单 FTE 收入明显低于经典 SaaS 基准。
  - 如果买家把价格压到通用 FSM 水平，毛利率和 CAC 回收都会很快滑向 downside case。
