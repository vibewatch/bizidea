slug: city-launch-quality-os
date: '2026-05-26'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: 月份
  source: '[BP date] 模型从 2026-05-26 这份 业务计划 日期后的第一个完整月份开始。'
- id: A2
  name: 融资前起始现金
  value: '50'
  unit: USDK
  source: '[创业财务经验假设: founder plus angel bridge] 让 pre-seed 融资前的现金消耗更直观看得见。'
- id: A3
  name: 首批付费试点到账时间
  value: 第 1 个付费试点在 M5 开始计费，第 2 个在 M9 开始计费
  unit: 时点
  source: '[BP milestones 0-12 months] 计划在第 1 年拿下 2 个付费共创试点，所以模型保守地把它们排在 Y1 后半段。'
- id: A4
  name: 付费试点月收入
  value: '7.5'
  unit: 每客户每月 USDK
  source: '[BP investorMemo.initialContract] 一个 $25K-$40K、持续约 4 个月的单城试点，对应每月约 $7.5K 收入。'
- id: A5
  name: 初始年度合同月收入
  value: '10.0'
  unit: 每客户每月 USDK
  source: '[BP investorMemo.initialContract] 模型把业务化合同的起点设在文中 $90K-$160K 年度区间的下沿。'
- id: A6
  name: 成熟阶段每个 logo 的扩展后收入
  value: '13.0'
  unit: 每客户每月 USDK
  source: '[research.market.som + BP businessModel] 研究假设第 3 年可拿下 5 个客户，对应约 $160K 的混合 ACV；折成成熟阶段月收入约 $13K。'
- id: A7
  name: 客户爬坡节奏
  value: Y1 结束 2 个 logo，Y2 结束 4 个，Y3 结束 5 个
  unit: 客户数
  source: '[BP milestones + research market.som] 这和第 1 年 2 个试点、第 2 年 3-5 个年度客户，以及第 3 年 5 客户的 SOM 锚点一致。'
- id: A8
  name: 毛利率爬坡
  value: Y1 约 60%，Y2 约 69%，Y3 到 72%
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct 72] 前期实施拖累会压低 Y1 毛利，之后才逐步追上计划里 72% 的目标毛利率。'
- id: A9
  name: 月度 logo 流失率
  value: 1.8%
  unit: 百分比
  source: '[创业财务经验假设: concentrated early enterprise SaaS] 低 客户 数、工作流很重的客户结构，对应的是保守但不至于灾难性的流失设定。'
- id: A10
  name: 创始人/CEO 全成本年薪
  value: '72'
  unit: 每年 USDK
  source: '[创业财务经验假设: India B2B SaaS] 创始人的现金薪酬控制在温和水平，但按全成本计入。'
- id: A11
  name: 工程岗位全成本年薪
  value: '84'
  unit: 每年 USDK
  source: '[创业财务经验假设: India B2B SaaS] 适用于创始工程师，以及 Y2 新增的第 2 位工程师。'
- id: A12
  name: 产品与实施负责人全成本年薪
  value: '66'
  unit: 每年 USDK
  source: '[创业财务经验假设: India B2B SaaS] 对应 BP 团队计划里的产品 + 实施复合角色。'
- id: A13
  name: 应用数据与运营分析师全成本年薪
  value: '55'
  unit: 每年 USDK
  source: '[创业财务经验假设: India B2B SaaS] 这个角色在拿到多个开城数据集后加入。'
- id: A14
  name: 客户成功岗位全成本年薪
  value: '48'
  unit: 每年 USDK
  source: '[创业财务经验假设: India B2B SaaS] 在前 2 个正式客户上线后，承接试点转年约。'
- id: A15
  name: 销售岗位全成本年薪
  value: '90'
  unit: 每年 USDK
  source: '[创业财务经验假设: India enterprise SaaS] 只有在“试点转年约”可复制之后才招销售。'
- id: A16
  name: 招聘顺序
  value: 产品岗位在 M2 入职，数据分析师在 M6，客户成功在 M9，第 2 名工程师在 Q4Y2 前加入，第 1 名销售在 Q4Y3 前加入
  unit: 时点
  source: '[BP team + BP strategicChoices.sequencingRationale] 模型遵循业务计划的指令：先补实施和数据，再扩大 GTM。'
- id: A17
  name: 非人力运营开支爬坡
  value: 从 M1 约 $29K 逐步爬升，到 Q4Y3 为 G&A 每季度约 $88K、销售每季度约 $55K、R&D 每季度约 $98K
  unit: 口径
  source: '[BP operations + BP risks + startup finance heuristic] 这部分覆盖开城城市差旅、合规、云成本、安全、法务，以及创始人主导的企业销售。'
- id: A18
  name: 现金转换口径
  value: EBITDA 近似等于经营现金流
  unit: 口径
  source: '[建模口径] 这一阶段不建模债务、capex 或显著的营运资本时点差。'
- id: A19
  name: 下一轮融资里程碑
  value: 达到 5 个年度客户、多城市 benchmark workflow 上线，并在相邻保洁场景完成 1 次部署
  unit: 里程碑
  source: '[BP milestones 12-36 months] 这是进入下一轮机构融资前必须拿到的证明点。'
- id: A20
  name: 稳定状态 CAC
  value: '55.0'
  unit: 每客户 USDK
  source: '[创业财务经验假设 + BP GTM] 创始人外呼加投资人引荐，面对一个很小的买家池，会把企业 CAC 推到较高但仍可接受的水平。'
- id: A21
  name: 成熟年化 ARPU
  value: '156.0'
  unit: 每客户每年 USDK
  source: '[模型输出 + research.market.som] Q4Y3 年化收入约 $780K，对应 5 个客户，略低于研究中约 $160K 混合 ACV 的 SOM 锚点。'
