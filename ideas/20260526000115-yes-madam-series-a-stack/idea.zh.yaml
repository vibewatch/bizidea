problem: 到家服务平台开新城市时，招聘表格、培训 WhatsApp 群、通用现场服务工具和人工质检往往各干各的。结果就是，团队很难提前判断一座城市是否有足够合格的服务伙伴撑起上线需求，同时还能守住服务一致性、复购和退款率。机构资本一进来，这种缺口就不再只是“草台班子运营”的小毛病，而会直接变成增长资金能不能高效投下去的主瓶颈。
targetUser:
  primary: 印度到家服务平台里负责从 2 座城市扩到 10 座城市的开城与供给运营负责人
  secondary: 负责服务伙伴就绪、质检完成率和复购表现的质量与培训经理
  buyer: 印度到家服务平台的 COO、运营 VP 或城市扩张负责人
startupThesis:
  nonObviousInsight: 到家服务扩张最难的，不是抽象地把需求和工人匹配起来，而是在人不停流动的情况下，把信任、接单满足率和服务质量一城一城复制出来。最后赢的会是一层把开城、服务伙伴就绪和质量保障揉成同一套运营系统的软件，而不是把招聘、派单和 CX 工具拆开各管一摊。
  beachhead: 先打印度上门美业和到家服务平台从第 3 座到第 10 座城市的开城场景——这里每次新增 300-1,500 名新入网服务伙伴，都得在前 90 天内把接单满足率和质检分数拉到目标线。
  wedge: 一套开城总控台：预测服务伙伴缺口，按服务 SKU 和微市场跟踪就绪度，安排影子质检，并在上线周前提前标出哪些新服务伙伴大概率过不了质量门槛。
  whyNowCatalyst: Yes Madam 的 Series A 明确要投向城市扩张、服务伙伴网络强化、技术和用户体验，这就马上带出了一个有预算的软件需求：把每次新城市上线做成可复制的运营动作。
  ventureScalePath: 先从到家服务平台的新城市开城就绪切进去，再往常态化用工规划、培训合规、激励设计、保修与退款预防延展，最后长成美业、保洁、维修、健康等双边服务网络的运营底账系统。
solution: 做一套给到家服务平台用的开城运营系统。产品把招聘漏斗、培训进度、服务品类覆盖、微市场需求预测、早期接单表现和质检结果拉到一起，给每个城市和每批服务伙伴算出一套就绪分。上线前，它能精确指出平台在哪些片区、技能标签、班次窗口或服务套餐上缺合格供给，并建议该继续招人、补训、推迟部分区域上线，还是收紧促销投放。上线后，系统继续盯复购质量、取消、投诉和质检结果，提前揪出正在下滑的服务伙伴批次或社区片区，别等用户体验全面变差才知道。时间拉长后，这会变成平台把融资真正换成稳定服务密度，而不是一城一城救火的运营总账。
goToMarketSeed:
  firstCustomer: 首个客户应是印度上门美业或保洁平台的城市扩张负责人：平台至少有 1,000 名活跃服务伙伴，刚完成一轮融资，并计划在未来 12 个月新开至少 2 座城市。
  buyingTrigger: 新城市开城计划获批，或某个季度服务伙伴招募与质量目标明显落后，赶不上新一轮增长资金的投放节奏。
  currentAlternative: 靠表格、WhatsApp 群、通用现场服务软件和线下质检清单手工串流程
  switchingReason: 平台能拿到一个统一总控台，提前看到开城风险，把服务伙伴就绪度和城市级需求绑起来，减少失败开城、退款和质量意外——这些问题，通用派单工具往往看不见。
  pricingHypothesis: 按活跃城市收年费的 SaaS 订阅，再叠加按被跟踪的服务伙伴数量或完成的质检工作流计费。
