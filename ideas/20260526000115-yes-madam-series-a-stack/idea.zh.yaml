topRisks:
- name: 初始买家池子有限
  description: 在印度，到能拿机构融资的到家服务平台数量一开始就不算多。
  mitigation: 先拿下已经融到资的头部客户，再沿着同一套开城工作流扩到相邻服务品类和中型网络。
- name: 现有工具存在重叠
  description: 部分运营团队可能会觉得，现有现场服务工具或内部 BI 已经足够覆盖开城运营。
  mitigation: 把产品定位压在开城前就绪度和批次级质量预测上——这恰恰是通用派单和 BI 堆栈很少原生解决的。
- name: 数据尾流很乱
  description: 招聘、培训、质检和派单数据可能散落在彼此断开的系统或非正式渠道里，削弱产品早期准确度。
  mitigation: 先从最窄的一组集成切入，再配一层轻量运营流程，在首个试点里把缺失的就绪信号补齐。
