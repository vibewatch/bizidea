jobsToBeDone:
- job: 当平台准备开一座新城市时，帮城市扩张负责人判断按服务类型和片区来看，是否已经备齐足够多的合格服务伙伴，这样团队既能按时上线，也不会把接单满足率和用户体验砸坏。
  currentAlternative: 人工维护的开城跟踪表、招聘团队在 WhatsApp 里的更新，以及通用派单看板
  successMetric: 前 30 天内按时上线且达到目标接单满足率的计划服务区域占比
- job: 当新一批服务伙伴开始接单时，帮质量团队尽早识别哪些技能、片区或培训批次更可能带来退款或投诉，让团队能在复购下滑前先出手。
  currentAlternative: 事后抽样 QA 和客服升级工单
  successMetric: 新服务伙伴批次在早期生命周期里的取消、退款和质检失败下降幅度
