differentiator: 这不是通用现场服务管理软件，不是招聘 ATS，也不是事后复盘的 CX 看板。产品专门解决双边平台最棘手的问题：一座城市到底能不能开、以及新服务伙伴爬坡时服务质量最先会在哪儿断。它的护城河，来自持续积累的一套数据：把招聘、培训、技能结构、片区覆盖、质检和开城后的质量结果，在每个微市场里一一连起来。
