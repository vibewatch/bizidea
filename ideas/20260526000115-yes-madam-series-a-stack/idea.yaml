jobsToBeDone:
  - job: When a marketplace is preparing to open a new city, help the city expansion lead know whether enough qualified partners are ready by service and locality, so they can launch on time without degrading fill rate or customer experience.
    currentAlternative: Manual launch trackers, recruiter updates in WhatsApp, and generic dispatch dashboards
    successMetric: Percentage of planned service zones launched on time with target fill rate in the first 30 days
  - job: When new partner cohorts start taking jobs, help the quality team detect which skills, neighborhoods, or training batches are likely to produce refunds or complaints, so they can intervene before repeat usage drops.
    currentAlternative: Post-hoc QA sampling and customer support escalations
    successMetric: Reduction in early-life cancellations, refunds, and audit failures for new partner cohorts
ideaScorecard:
  signalStrength:
    score: 4
    rationale: The trigger is concrete and capital-backed, though still supported by a single source.
  painIntensity:
    score: 4
    rationale: Failed city launches and weak service quality directly burn growth capital, hurt retention, and slow marketplace expansion.
  wedgeClarity:
    score: 5
    rationale: The first product is a narrow city-launch and partner-readiness control plane, not a broad marketplace suite.
  defensibility:
    score: 4
    rationale: Workflow embedding and the dataset connecting readiness inputs to post-launch outcomes create compounding product advantage.
  ventureScale:
    score: 5
    rationale: The same operating graph can expand across categories, geographies, and adjacent two-sided service networks with large GMV bases.
topRisks:
  - name: Limited initial buyer pool
    description: Indian home-service marketplaces raising institutional rounds are still a relatively small set of buyers at the start.
    mitigation: Land with the funded leaders first, then expand into adjacent service categories and mid-market networks using the same city-launch workflow.
  - name: Incumbent tool overlap
    description: Some operators may believe existing field-service or internal BI tools already cover launch operations well enough.
    mitigation: Position the product around pre-launch readiness and cohort-level quality prediction, which generic dispatch and BI stacks rarely solve natively.
  - name: Data exhaust is messy
    description: Hiring, training, audit, and dispatch data may live in disconnected systems or informal channels, weakening early product accuracy.
    mitigation: Start with a narrow integration set plus lightweight operator workflows that capture missing readiness signals during the first pilot.
