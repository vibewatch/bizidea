differentiator: >-
  This is not generic field-service management software, recruiter ATS, or a
  post-job CX dashboard. The product is purpose-built for the two-sided
  marketplace problem of deciding whether a city is truly ready to launch and
  where service quality will break first as new partners ramp. Its moat comes
  from the accumulated dataset linking hiring, training, skill mix, locality
  coverage, audits, and post-launch quality outcomes for each micro-market.
