problem: >-
  Home-service marketplaces usually enter a new city with fragmented playbooks
  across recruiter spreadsheets, trainer WhatsApp groups, generic field-service
  tools, and manual quality audits. That makes it hard to predict whether a city
  has enough qualified partners to meet launch demand while still protecting
  service consistency, repeat bookings, and refund rates. Once institutional
  capital arrives, these gaps stop being scrappy-ops issues and become the main
  bottleneck to deploying growth capital efficiently.
targetUser:
  primary: City expansion and supply operations leaders at Indian home-service marketplaces scaling from two to ten cities
  secondary: Quality and training managers responsible for partner readiness, audit completion, and repeat-service performance
  buyer: COO, VP Operations, or head of city expansion at an Indian home-service marketplace
startupThesis:
  nonObviousInsight: >-
    The hard part of scaling home services is not matching demand to workers in
    the abstract; it is reproducing trust, fill rate, and service quality city
    by city as the partner base turns over. The winner will be the software
    layer that treats city launch, partner readiness, and quality assurance as
    one operating system instead of separate recruiting, dispatch, and CX tools.
  beachhead: >-
    Indian beauty-at-home and domestic-service marketplaces launching their
    third to tenth city, where 300-1,500 newly onboarded service partners must
    reach target fill rate and audit scores within the first 90 days
  wedge: >-
    A city-launch control plane that forecasts partner gaps, tracks readiness by
    service SKU and micro-market, schedules shadow audits, and flags which new
    partners are likely to fail quality thresholds before launch week
  whyNowCatalyst: >-
    Yes Madam's Series A explicitly targets city expansion, partner-network
    strengthening, technology, and customer-experience improvements, creating an
    immediate budgeted need for software that makes each new-city launch
    operationally repeatable.
  ventureScalePath: >-
    Start with new-city launch readiness for home-service marketplaces, then
    expand into ongoing workforce planning, training compliance, incentive
    design, warranty and refund prevention, and eventually the system of record
    for two-sided service-network operations across beauty, cleaning, repair,
    and wellness platforms.
solution: >-
  Build a city-launch operating system for home-service marketplaces. The
  product ingests hiring funnel data, training progress, service-category
  coverage, micro-market demand forecasts, early-job performance, and audit
  results into one readiness score for every city and partner cohort. Before a
  launch, it shows exactly where the marketplace is short on qualified supply by
  locality, skill tag, shift window, or service package and recommends whether
  to recruit, retrain, delay launch zones, or tighten promo spend. After
  launch, it monitors repeat-booking quality, cancellations, complaints, and
  audit outcomes to identify which partner cohorts or neighborhoods are slipping
  before customer experience degrades broadly. Over time it becomes the
  operating ledger for how a marketplace turns funding into reliable service
  density rather than chaotic city-by-city firefighting.
goToMarketSeed:
  firstCustomer: >-
    The head of city expansion at an Indian at-home beauty or cleaning
    marketplace with 1,000+ active service partners, one recent fundraise, and
    plans to open two or more new cities in the next 12 months
  buyingTrigger: >-
    Approval of a new-city launch plan or a quarter where partner hiring and
    quality targets miss the timeline needed to deploy fresh growth capital
  currentAlternative: Manual workflow across spreadsheets, WhatsApp groups, generic field-service software, and in-person audit checklists
  switchingReason: >-
    The platform gets a single control plane that predicts launch risk early,
    ties partner readiness to city-level demand, and reduces failed launches,
    refunds, and quality surprises that generic dispatch tools do not catch.
  pricingHypothesis: Annual SaaS subscription priced per active city plus usage-based fees per tracked service partner or completed audit workflow
