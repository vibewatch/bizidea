openQuestions:
- How many Indian home-service marketplaces outside the obvious leaders are truly in the third-to-tenth-city expansion window with enough budget to buy specialized software?
- Which data systems already exist inside Yes Madam-like operators, and where is the cleanest integration wedge versus workflow replacement?
- 'Which KPI moves budget fastest in practice: launch delay, refund rate, repeat-booking decline, or partner churn?'
- Can one readiness model generalize across beauty, cleaning, repair, and care-at-home categories without losing predictive power?
