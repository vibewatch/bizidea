  adoptionFrictionMatrix:
  - friction: Operational data is fragmented across recruiting, training, dispatch, QA, and informal channels.
    severity: high
    affectedBuyer: COO / head of city expansion
    mitigation: Start with a pilot scorecard that ingests only the minimum launch-critical fields and capture missing signals through guided operator workflows.
