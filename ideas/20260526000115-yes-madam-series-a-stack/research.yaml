competitors:
- name: Zoho FSM
  stage: incumbent
  wedge: Affordable, broad FSM suite with work orders, reporting, automation, and mobile execution.
  pricing: Public tiered plans based on appointment volume, with free and paid editions.
  strength: Strong breadth, clear pricing, and enough workflow depth for many field-service teams.
  weaknessVsUs: Designed around work orders and service execution, not marketplace city-launch readiness, partner skill mix, or cohort risk.
  sourceRefs:
  - 19
  - 28
  - 29
  - 32
- name: Salesforce Field Service
  stage: incumbent
  wedge: Enterprise-grade field-service platform integrated with the wider Salesforce stack.
  pricing: Enterprise/custom field-service pricing layered on Salesforce service products.
  strength: Best-in-class platform breadth, integrations, and route optimization.
  weaknessVsUs: Heavyweight and generic for a fast-moving marketplace ops team that needs launch-readiness forecasting more than enterprise ticket orchestration.
  sourceRefs:
  - 36
  - 37
  - 38
- name: ServiceTitan
  stage: scale-up
  wedge: Home-service vertical software for contractor operations, dispatch, customer experience, and KPI management.
  pricing: Custom/enterprise-style pricing rather than transparent self-serve plans.
  strength: Deep home-service vocabulary and strong operational analytics for contractor-style businesses.
  weaknessVsUs: Built for service businesses that own technicians directly, not for two-sided marketplaces opening cities and balancing partner cohorts.
  sourceRefs:
  - 54
  - 56
  - 58
  - 60
- name: Fieldproxy
  stage: scale-up
  wedge: India-first AI-forward FSM positioned around dispatching, scheduling, and flexible mobile workflows.
  pricing: Public plan-based pricing.
  strength: Local-market relevance, flexible workflow framing, and accessible pricing.
  weaknessVsUs: Still centers dispatch and work orders; it does not natively own marketplace readiness, certification, and post-launch cohort quality loops.
  sourceRefs:
  - 39
  - 40
  - 45
- name: Workiz
  stage: scale-up
  wedge: Dispatch-centric home-service software for SMB operators with real-time boards and price-book tooling.
  pricing: Public pricing-plan packages.
  strength: Clear dispatch UX and familiar home-service operating primitives.
  weaknessVsUs: Optimized for local trade businesses, not for multi-city marketplace rollout and partner-readiness control.
  sourceRefs:
  - 48
  - 52
