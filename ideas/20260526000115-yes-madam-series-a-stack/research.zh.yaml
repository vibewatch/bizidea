openQuestions:
- 除了最显眼的头部玩家，印度到底还有多少到家服务平台真的处在第 3 座到第 10 座城市的扩张窗口，并且有预算购买专用软件？
- Yes Madam 这类平台内部已经有哪些数据系统，最干净的切入口是做集成，还是替换现有工作流？
- 在真实采购里，到底是开城延期、退款率、复购下滑，还是服务伙伴流失，最能最快撬动预算？
- 一套就绪模型能否同时覆盖美业、保洁、维修和居家护理，而不牺牲预测力？
