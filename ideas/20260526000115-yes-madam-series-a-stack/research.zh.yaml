  tailwinds:
  - point: 有组织化线上到家服务的增速远快于整体大盘，迫使运营商必须把运营做得更专业。
    sourceRefs:
    - 6
    - 7
  - point: 城市运营商越来越不是只拼低价，而是要拼信任、可靠性和可追责的服务质量。
    sourceRefs:
    - 6
    - 7
    - 14
  - point: 重培训的全栈模式已经证明，服务伙伴就绪和服务一致性是竞争优势的核心。
    sourceRefs:
    - 3
    - 14
  - point: 服务者正规化和福利计划，会让结构化服务者系统对聚合平台更有战略意义。
    sourceRefs:
    - 8
    - 9
    - 11
  headwinds:
  - point: 线上渗透率依然低，需求集中在少数城市，直接限制了短期买家数量。
    sourceRefs:
    - 7
  - point: 运营商仍要面对高峰时段供给不稳定，以及服务专业人员数字化能力参差不齐的问题。
    sourceRefs:
    - 7
  - point: 隐私和劳动法合规，会让围绕服务者记录和监控的实施复杂度上升。
    sourceRefs:
    - 9
    - 11
    - 12
  - point: 通用 FSM 和到家服务软件会持续带来价格与功能对比压力。
    sourceRefs:
    - 18
    - 19
    - 37
    - 39
    - 52
competitors:
- name: Zoho FSM
  stage: 现有厂商
  wedge: 价格可负担、功能面宽的 FSM 套件，覆盖工单、报表、自动化和移动执行。
  pricing: 公开分层定价，按预约量收费，同时提供免费版和付费版。
  strength: 功能广、价格清晰，对很多现场服务团队来说工作流深度也够。
  weaknessVsUs: 它围绕工单和服务执行设计，不是为平台的城市开城就绪、服务伙伴技能结构或批次风险而生。
  sourceRefs:
  - 19
  - 28
  - 29
  - 32
- name: Salesforce Field Service
  stage: 现有厂商
  wedge: 与更大 Salesforce 栈打通的企业级现场服务平台。
  pricing: 基于 Salesforce 服务产品叠加的企业级 / 定制现场服务定价。
  strength: 平台广度、集成能力和路径优化都是业内顶级。
  weaknessVsUs: 对于需要先做开城预测的快节奏平台运营团队来说，它太重也太通用。
  sourceRefs:
  - 36
  - 37
  - 38
- name: ServiceTitan
  stage: 成长型
  wedge: 面向承包商运营的到家服务垂直软件，覆盖派单、用户体验和 KPI 管理。
  pricing: 偏企业级 / 定制定价，而不是透明的自助套餐。
  strength: 对承包商式业务有很深的行业语义和很强的运营分析。
  weaknessVsUs: 它适合直接管理技师的服务公司，不适合要一城一城开出来、还要平衡服务伙伴批次的平台。
  sourceRefs:
  - 54
  - 56
  - 58
  - 60
- name: Fieldproxy
  stage: 成长型
  wedge: 印度本土、偏 AI 的 FSM，主打派单、排班和灵活的移动工作流。
  pricing: 公开套餐定价。
  strength: 本地市场贴合度高、工作流表述灵活，价格也更好切入。
  weaknessVsUs: 它的中心仍是派单和工单，并不原生拥有平台就绪、认证和开城后批次质量闭环。
  sourceRefs:
  - 39
  - 40
  - 45
- name: Workiz
  stage: 成长型
  wedge: 以派单为中心的到家服务软件，面向 SMB 运营商，强调实时看板和价格手册工具。
  pricing: 公开套餐式定价。
  strength: 派单 UX 清楚，也有到家服务团队熟悉的基础运营原语。
  weaknessVsUs: 它优化的是本地工种生意，不是多城市平台的 rollout 和服务伙伴就绪控制。
  sourceRefs:
  - 48
  - 52
