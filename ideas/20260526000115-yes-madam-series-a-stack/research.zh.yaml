  pestle:
  - factor: 经济
    impact: positive
    point: 印度有组织化线上到家服务规模还小，但增速明显快于大盘，这给了运营商投入流程软件的理由 [6][7]。
    sourceRefs:
    - 6
    - 7
  - factor: 社会
    impact: positive
    point: 便利、安全和核心家庭生活方式，正在提升消费者尝试有组织化到家服务的意愿，尤其是在高密度城市市场 [6][7]。
    sourceRefs:
    - 6
    - 7
  - factor: 技术
    impact: positive
    point: 移动工作流、路径规划、自动化和报表都已是成熟积木，所以只要拿对 data model，创业公司就能很快拼出一款像样产品 [20][21][28][32][38][40]。
    sourceRefs:
    - 20
    - 21
    - 28
    - 32
    - 38
    - 40
  - factor: 法律
    impact: negative
    point: 劳动法典中的身份确认和 DPDP Act，抬高了围绕服务者身份、福利资格和个人数据处理的合规负担 [9][11][12]。
    sourceRefs:
    - 9
    - 11
    - 12
  - factor: 政治
    impact: positive
    point: 政府持续推动平台劳动者登记与保障，反过来会放大结构化服务者记录和可携带身份系统的重要性 [8][9]。
    sourceRefs:
    - 8
    - 9
  adoptionFrictionMatrix:
  - friction: 运营数据散落在招聘、培训、派单、QA 和非正式渠道里。
    severity: 高
    affectedBuyer: COO / 城市扩张负责人
    mitigation: 先用试点记分卡只吃最少量、但真正决定开城的字段；缺的信号再通过引导式运营工作流补齐。
    sourceRefs:
    - 4
    - 14
    - 28
  - friction: 买家可能会觉得现有 FSM 或 BI 已经够用。
    severity: 高
    affectedBuyer: COO / 运营负责人
    mitigation: 把产品定位压在开城前就绪、批次失败预测和微市场风险上，而不是派单或工单处理。
    sourceRefs:
    - 19
    - 36
    - 39
    - 48
  - friction: 服务者身份、位置和表现数据会带来隐私与合规顾虑。
    severity: 中
