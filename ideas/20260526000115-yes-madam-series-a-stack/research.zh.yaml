    mitigation: 采用分角色权限、明确授权文案，以及与 DPDP 和劳动法流程对齐的窄数据留存策略。
    sourceRefs:
    - 9
    - 11
    - 12
  - friction: 在快速开城期间，一线团队会抗拒额外清单和影子质检。
    severity: 中
    affectedBuyer: 质量 / 培训经理
    mitigation: 把新增步骤直接挂在质检通过率和开城日接单满足率这类硬结果上，并用移动优先 UX 交付。
    sourceRefs:
    - 3
    - 16
    - 32
