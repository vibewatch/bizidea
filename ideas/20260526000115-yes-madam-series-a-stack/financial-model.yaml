scenarios:
  downside:
    description: "Sales cycles stretch, pilot-to-annual conversion slips, and the fifth logo moves into Y4 rather than Q3Y3."
    y3RevenueK: 468.0
    y3EbitdaK: -440.0
    cashLowPointK: -1345.0
    keyAssumptionChanges:
      - "Pilot-to-annual conversion falls from the BP's 50%+ target to roughly 40%."
      - "Exit ACV compresses toward $135K as buyers benchmark against generic FSM pricing."
      - "Gross margin exits near 68% because onboarding stays services-heavy."
  base:
    description: "Two Y1 paid pilots convert into four annual customers by Y2 exit and five by Q4Y3, with exit ACV near the research-backed $160K SOM anchor."
    y3RevenueK: 636.0
    y3EbitdaK: -340.1
    cashLowPointK: -1246.2
    keyAssumptionChanges:
      - "The customer ramp follows the BP milestone cadence of two pilots in Y1 and three to five annual customers in Y2."
      - "Hiring follows the BP sequence, with broader GTM added only after repeatable pilot conversion is proven."
      - "Gross margin reaches the 72% target by Y3 as integrations become more repeatable."
  upside:
    description: "Pilot proof lands earlier, existing accounts expand to more active cities faster, and a sixth logo signs late in Y3."
    y3RevenueK: 774.0
    y3EbitdaK: -245.0
    cashLowPointK: -1135.0
    keyAssumptionChanges:
      - "Second and third logos convert one quarter earlier than the base case."
      - "Exit ACV reaches about $170K as multi-city usage ramps faster."
      - "The first sales hire becomes productive within two quarters."
sensitivity:
  - variable: ARPU
    downsideCase: "$135K exit ACV from discounting and smaller city scopes"
    baseCase: "$156K blended exit ACV"
    upsideCase: "$170K exit ACV with faster multi-city expansion"
    y3RevenueImpactK: -84.0
    cashImpactK: -61.0
  - variable: CAC
    downsideCase: "$70K CAC if founder-led outbound remains the only reliable channel"
    baseCase: "$55K CAC"
    upsideCase: "$45K CAC with more investor and operator introductions"
    y3RevenueImpactK: -24.0
    cashImpactK: -75.0
  - variable: churn
    downsideCase: "3.0% monthly churn if buyers keep comparing against internal BI and FSM substitutes"
    baseCase: "1.8% monthly churn"
    upsideCase: "1.0% monthly churn with stronger workflow embedding"
    y3RevenueImpactK: -48.0
    cashImpactK: -36.0
  - variable: sales cycle
    downsideCase: "6 months from pilot scoping to paid start"
    baseCase: "4 months"
    upsideCase: "3 months with repeatable references"
    y3RevenueImpactK: -96.0
    cashImpactK: -92.0
  - variable: gross margin
    downsideCase: "68% if integrations and audits stay more manual"
    baseCase: "72% target gross margin"
    upsideCase: "74% with more reusable data connectors"
    y3RevenueImpactK: 0.0
    cashImpactK: -25.0
  - variable: hiring pace
    downsideCase: "Pull the sales hire and second engineer forward by two quarters"
    baseCase: "Hire to the BP sequence"
    upsideCase: "Delay one non-core hire until the fifth logo closes"
    y3RevenueImpactK: 18.0
    cashImpactK: -120.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Founder and investor introductions] --> Pilots[Paid one-city pilots]
      Pilots --> Annual[Annual city contracts]
      Annual --> Usage[Partner and audit usage fees]
      Annual --> Revenue[Subscription revenue]
      Usage --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after opex]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from five operators by Q4Y3 at roughly $156K exit ACV, reached through a paid-pilot-to-annual conversion motion."
  - checkName: Must go right
    finding: "The company has to convert the first two paid pilots into multi-city annual contracts before adding a dedicated sales hire."
  - checkName: Model breaks if
    finding: "The base case fails fastest if sales cycles stretch to six months while buyers cap ACV near generic FSM price bands."
  - checkName: Next-round proof
    finding: "The next financing is justified once five annual customers are live and at least one adjacent cleaning deployment proves expansion beyond the first wedge."
sanityChecks:
  ruleOf40: "Y3 growth 86.8% + EBITDA margin -53.5% = 33.3%."
  burnMultiple: "Y2 burn multiple is about 1.9x on roughly $0.23M of net new ARR; Y3 improves to about 1.0x on roughly $0.34M of net new ARR."
  revenuePerFte: "$91K Y3 using annual revenue and 7 year-end FTE (benchmark $200–400K SaaS)."
  flags:
    - "The year-3 base case already reaches the five-customer SOM anchor in research, so the venture case still depends on multi-city and adjacent-category expansion after the wedge works."
    - "Revenue per FTE remains well below classic SaaS benchmarks because integrations, audits, and launch onboarding stay labor intensive through Y3."
    - "If buyers force pricing toward generic FSM levels, both gross margin and CAC payback move quickly toward the downside case."
