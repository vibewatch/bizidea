slug: city-launch-quality-os
date: "2026-05-26"
currency: USD
modelStartMonth: "2026-06"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-06"
    unit: month
    source: "[BP date] The model starts in the first full month after the 2026-05-26 business-plan date."
  - id: A2
    name: Starting cash before financing
    value: "50"
    unit: USDK
    source: "[Startup finance heuristic: founder plus angel bridge] Keeps the pre-seed cash roll visible before the modeled round."
  - id: A3
    name: Time to first paid pilots
    value: "First paid pilot bills in M5 and second pilot bills in M9"
    unit: timing
    source: "[BP milestones 0-12 months] The plan targets two paid design-partner pilots in year 1, so the model stages them conservatively across the back half of Y1."
  - id: A4
    name: Paid pilot revenue per month
    value: "7.5"
    unit: USDK per customer per month
    source: "[BP investorMemo.initialContract] A $25K-$40K one-city pilot over roughly four months implies about $7.5K monthly pilot revenue."
  - id: A5
    name: Initial annual contract revenue per month
    value: "10.0"
    unit: USDK per customer per month
    source: "[BP investorMemo.initialContract] The lower end of the stated $90K-$160K annual range is modeled as the starting production contract."
  - id: A6
    name: Mature expanded revenue per logo
    value: "13.0"
    unit: USDK per customer per month
    source: "[research.market.som + BP businessModel] Research models five reachable customers at roughly $160K blended ACV by Y3, equivalent to about $13K monthly at maturity."
  - id: A7
    name: Customer ramp
    value: "Y1 exit 2 logos, Y2 exit 4 logos, Y3 exit 5 logos"
    unit: customers
    source: "[BP milestones + research market.som] This matches two pilots in Y1, three to five annual customers in Y2, and the five-customer Y3 SOM anchor."
  - id: A8
    name: Gross margin ramp
    value: "About 60% in Y1, 69% in Y2, and 72% by Y3"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 72] Early implementation drag depresses Y1 margin before the model reaches the plan's target gross margin."
  - id: A9
    name: Monthly logo churn
    value: "1.8%"
    unit: percent
    source: "[Startup finance heuristic: concentrated early enterprise SaaS] A low-logo, workflow-heavy customer base is modeled with conservative but not catastrophic churn."
  - id: A10
    name: Founder CEO loaded annual compensation
    value: "72"
    unit: USDK per year
    source: "[Startup finance heuristic: India B2B SaaS] Founder cash comp is kept moderate but fully loaded."
  - id: A11
    name: Engineering loaded annual compensation
    value: "84"
    unit: USDK per year
    source: "[Startup finance heuristic: India B2B SaaS] Used for founding engineering and the second engineer added in Y2."
  - id: A12
    name: Product and implementation lead loaded annual compensation
    value: "66"
    unit: USDK per year
    source: "[Startup finance heuristic: India B2B SaaS] Reflects a hybrid product and implementation role from the BP team plan."
  - id: A13
    name: Applied data and ops analyst loaded annual compensation
    value: "55"
    unit: USDK per year
    source: "[Startup finance heuristic: India B2B SaaS] Matches the BP role added once multiple launch datasets exist."
  - id: A14
    name: Customer success loaded annual compensation
    value: "48"
    unit: USDK per year
    source: "[Startup finance heuristic: India B2B SaaS] Supports pilot-to-annual conversion after the first two production customers are live."
  - id: A15
    name: Sales loaded annual compensation
    value: "90"
    unit: USDK per year
    source: "[Startup finance heuristic: India enterprise SaaS] Sales is hired only after repeatable pilot-to-annual conversion is proven."
  - id: A16
    name: Hiring sequence
    value: "Product in M2, data analyst in M6, customer success in M9, second engineer by Q4Y2, first sales hire by Q4Y3"
    unit: timing
    source: "[BP team + BP strategicChoices.sequencingRationale] The model follows the plan's instruction to hire implementation and data before broader GTM."
  - id: A17
    name: Non-payroll operating spend ramp
    value: "Ramps from about $29K in M1 to about $88K per quarter of G&A plus $55K per quarter of sales and $98K per quarter of R&D by Q4Y3"
    unit: policy
    source: "[BP operations + BP risks + startup finance heuristic] Covers travel to launch cities, compliance, cloud, security, legal, and founder-led enterprise selling."
  - id: A18
    name: Cash conversion convention
    value: "EBITDA approximates operating cash flow"
    unit: policy
    source: "[Modeling heuristic] No debt, capex, or material working-capital timing differences are modeled at this stage."
  - id: A19
    name: Funding milestone
    value: "Five annual customers, multi-city benchmarks live, and one adjacent cleaning deployment"
    unit: milestone
    source: "[BP milestones 12-36 months] This is the proof point needed before the next institutional round."
  - id: A20
    name: Steady-state CAC
    value: "55.0"
    unit: USDK per customer
    source: "[Startup finance heuristic + BP GTM] Founder-led outbound plus investor introductions into a small buyer pool implies high but still venture-viable enterprise CAC."
  - id: A21
    name: Mature annual ARPU
    value: "156.0"
    unit: USDK per customer per year
    source: "[Model output + research.market.som] Q4Y3 annualized revenue of about $780K over five customers lands just below the research SOM anchor of roughly $160K blended ACV."
