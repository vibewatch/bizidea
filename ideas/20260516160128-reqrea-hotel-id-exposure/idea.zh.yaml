differentiator: 通用身份验证 API 优化的是开户注册转化或欺诈评分，不是酒店场景下的留存策略、入住可审计性和对 PMS 友好的数据最小化。这个创业公司要拿下的是酒店身份控制面：什么必须留、可以放哪、谁能看、验证完什么时候该消失，都由它说了算。时间一长，护城河会来自酒店运营系统的深度集成、按门店类型和司法辖区沉淀的策略模板，以及一套越来越强的数据能力——在不伤入住完成率的前提下，把敏感影像留存压下去。
