problem: 酒店集团为了减少前台人力，正在铺到店前入住和自助入住，但不少玩家满足身份要求的办法，仍是让供应商采集并保存原始护照扫描件、驾照和自拍照片。这样一晚普通住宿，就被做成了长期躺在酒店直接控制范围之外的高风险个人数据档案。一旦存储策略、删除规则和访问控制松动，一条外包 KYC 流程就可能给酒店带来持续数年的通知、合规和品牌损失。
targetUser:
  primary: 使用外包在线入住或自助机入住，并在到店前或前台采集住客证件影像的 20-200 家门店酒店集团数字化运营或 IT 负责人
  secondary: 负责住客数据留存、事件响应准备和入住转化率的隐私、信息安全与前厅运营负责人
  buyer: 酒店集团的 CIO、首席数字官，或酒店运营副总裁
startupThesis:
  nonObviousInsight: 酒店身份问题真正卡住的，已经不是怎么确认住客是真人，而是验证完成后还要留下多少原始身份材料。数字化入住悄悄把酒店从“看一眼证件”的角色，变成了替供应商管理证件与自拍档案的操盘手。真正的赢家会是那层控制面：它把“已验证入住”的证明回写给酒店系统，同时大幅压缩原始影像留存。
  beachhead: 面向 20-200 家城市酒店门店、服务外籍和深夜住客、已上线自助或到店前入住的中端酒店集团，提供零拷贝住客身份验证
  wedge: 一套酒店身份金库：采集一次住客证件和自拍，完成核验与必需字段提取，然后只把签名证明、策略允许的字段和可审计的留存控制送进酒店 PMS 与入住流程
  whyNowCatalyst: Reqrea 暴露的 Tabiq 存储桶说明，外包数字化入住现在会把护照扫描件、驾照和自拍照片一存就是好几年。对酒店来说，能安全压缩身份数据留存，已经不是未来可选项，而是眼前就要采购的问题。
  ventureScalePath: 先从酒店集团住客入住切入，再扩到服务式公寓、青年旅舍、度假租赁、邮轮登船，以及那些既要核验身份、又想压低原始证件存储和事件责任的旅行运营供应商。
solution: 做一层住客身份金库，卡在酒店预订/自助机流程和真正记录入住的系统之间。产品只采一次证件影像和活体自拍，跑证件质量与匹配校验，只提取门店真正需要的字段，再把带签名的“已验证住客”记录回写到 PMS 或入住 App。原始影像不再扔进通用供应商存储，而是按严格留存策略保存、加密、分权访问，并在策略允许时自动删除。同一套控制面还给酒店运营方提供审计日志、驻留规则，以及供应商评审和事件响应所需的证据。第一步只做窄切口：在下一次安全审查或供应商续约前，替某一家酒店集团把外包数字化入住里的原始影像存储替换掉。
goToMarketSeed:
  firstCustomer: 一家区域性酒店集团，拥有 20-100 家市中心门店，外籍或深夜住客占比高，当前到店前入住或自助机入住栈会把护照或驾照影像存进供应商管理的云流程。
  buyingTrigger: 安全审计、供应商续约、泄露惊魂，或董事会开始追问住客身份证件和自拍核验数据到底怎么存、怎么删。
  currentAlternative: 把原始证件影像留在自家云存储里的外包数字化入住供应商，以及前台人工复印或往 PMS 附件里塞文件的老流程。
  switchingReason: 这个切口让酒店在保住自助入住便利的同时，缩小原始证件攻击面、收紧留存控制，并补上现在外包流程普遍拿不出的审计证据。
  pricingHypothesis: 按门店收年费，再按每次已验证入住计费；数据驻留、更长审计留存和供应商风险报告做成高级模块。
