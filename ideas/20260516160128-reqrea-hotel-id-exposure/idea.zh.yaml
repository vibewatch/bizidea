topRisks:
- name: 酒店集成拖慢推进
  description: 酒店集团改入住流程通常很慢，因为 PMS、自助机和供应商集成都很脆，而且常常要一店一店地磨。
  mitigation: 先做一层轻量身份层，插进现有入住供应商和 PMS 系统里，不强推整条流程重做。
- name: 留存规则太复杂
  description: 有些门店或司法辖区仍可能要求保留特定住客记录，单靠“全部删除”的简单叙事打不穿现实。
  mitigation: 做出把必填字段和原始影像拆开的策略模板，并支持按司法辖区和门店类型灵活配置留存。
- name: 现有厂商渠道挤压
  description: 一旦酒店买方开始追问，现有数字化入住供应商可能会很快补上基础加密或删除功能。
  mitigation: 用零拷贝证明、独立审计日志和跨供应商策略治理拉开差距，让酒店即便更换前端入住工具也能继续用这层能力。
