jobsToBeDone:
- job: 当我们让住客在到店前或自助机上完成入住时，帮酒店集团把身份核验和必需入住信息采集跑通，但别让原始护照和自拍文件散落在各家供应商存储里。这样我们既能把入住流程现代化，又不至于顺手造出一个泄露雷区。
  currentAlternative: 外包数字化入住供应商、PMS 附件，以及前台人工收集证件
  successMetric: 每次已验证入住对应的原始身份文件留存量下降
- job: 当安全或法务追问住客身份证件到底存在哪、要留多久时，帮运营和 IT 团队用一套可审计的策略与删除轨迹给出答案，这样我们能顺利过审，又不拖慢住客到店。
  currentAlternative: 供应商问卷、人工做存储盘点，以及用表格跟留存规则
  successMetric: 完成一次住客数据存储审计或供应商评审所需时间
