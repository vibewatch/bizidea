topRisks:
  - name: Hospitality integration drag
    description: Hotel groups may be slow to change guest check-in flows because PMS, kiosk, and vendor integrations are brittle and property-by-property.
    mitigation: Start as a thin identity layer that plugs into existing check-in vendors and PMS systems without forcing a full workflow replacement.
  - name: Retention-rule complexity
    description: Some properties or jurisdictions may still require storing certain guest records, which can limit a simplistic delete-everything pitch.
    mitigation: Build policy templates that separate required fields from raw images and support configurable retention by jurisdiction and property type.
  - name: Channel squeeze from incumbents
    description: Existing digital check-in vendors may add basic encryption or deletion features once hotel buyers raise the issue.
    mitigation: Differentiate on zero-copy attestations, independent audit logs, and multi-vendor policy governance that hotels can use even when they switch front-end check-in tools.
