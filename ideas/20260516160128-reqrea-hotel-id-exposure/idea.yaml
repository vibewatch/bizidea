differentiator: >-
  Generic identity-verification APIs are optimized for onboarding conversion or
  fraud scoring, not for hotel-grade retention policies, guest-stay auditability,
  and PMS-safe data minimization. This startup would own the hospitality control
  plane that decides what must be kept, where it may live, who can see it, and
  when it should disappear after verification. Over time, its moat comes from
  deep integrations into hotel operations systems, policy templates by property
  type and jurisdiction, and a growing dataset on how to reduce sensitive-image
  retention without hurting check-in completion.
