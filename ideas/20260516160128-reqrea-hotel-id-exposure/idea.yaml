problem: >-
  Hotel groups are rolling out pre-arrival and self-service check-in to reduce
  front-desk labor, but many still satisfy identity requirements by asking a
  vendor to collect and store raw passport scans, driver's licenses, and selfie
  photos. That turns a routine stay into a long-lived archive of breach-grade
  personal data sitting outside the hotel's direct controls. When storage
  policies, deletion rules, and access controls are weak, one outsourced KYC
  workflow can create years of notification, compliance, and brand damage.
targetUser:
  primary: >-
    Head of digital operations or IT at a 20-200 property hotel group using
    outsourced online or kiosk check-in that captures guest ID images before
    arrival or at the front desk
  secondary: >-
    Privacy, information-security, and front-office leaders responsible for
    guest data retention, incident readiness, and check-in conversion
  buyer: >-
    Chief information officer, chief digital officer, or vice president of hotel
    operations at the hotel group
startupThesis:
  nonObviousInsight: >-
    The real hospitality identity problem is no longer verifying that a guest is
    real. It is minimizing how many raw identity artifacts need to exist after
    that verification step. Digital check-in quietly transformed hotels from
    transient viewers of IDs into operators of vendor-managed document and
    selfie archives. The winner will be the control layer that returns a
    verified-stay attestation to hotel systems while sharply reducing raw image
    retention.
  beachhead: >-
    Zero-copy guest identity verification for mid-market hotel groups running
    self-service or pre-arrival check-in for foreign and late-night guests
    across 20-200 urban properties
  wedge: >-
    A hospitality identity vault that captures one guest document and selfie,
    performs verification and required field extraction, then passes only signed
    attestations, policy-approved fields, and audited retention controls into
    the hotel's PMS and check-in workflow
  whyNowCatalyst: >-
    Reqrea's exposed Tabiq bucket shows that outsourced digital check-in is now
    collecting passport scans, driver's licenses, and selfie photos for years at
    a time, making privacy-safe identity minimization an urgent hotel buying
    problem rather than a future nice-to-have.
  ventureScalePath: >-
    Start with hotel-group guest check-in, then expand into serviced apartments,
    hostels, vacation rentals, cruise embarkation, and travel-operations vendors
    that must verify identity while reducing raw document storage and incident
    liability.
solution: >-
  Build a guest identity vault that sits between the hotel's booking or kiosk
  flow and the systems that record the stay. The product captures ID images and
  a live selfie once, runs document-quality and match checks, extracts only the
  fields the property needs, and returns a signed "verified guest" record to the
  PMS or check-in app. Raw images are stored under strict retention policies,
  encrypted, access-scoped, and deleted automatically when policy allows instead
  of being left in general vendor storage. The same control plane gives hotel
  operators audit logs, residency rules, and evidence for vendor reviews or
  incident response. The narrow first use case is replacing raw-image storage in
  outsourced digital check-in for one hotel group before the next security
  review or vendor renewal.
goToMarketSeed:
  firstCustomer: >-
    A regional hotel group with 20-100 city-center properties, high foreign or
    late-night guest volume, and an outsourced pre-arrival or kiosk check-in
    stack that currently stores passport or license images in a vendor-managed
    cloud workflow
  buyingTrigger: >-
    A security audit, vendor renewal, breach scare, or board-level review of how
    guest identity documents and selfie verification data are stored and deleted
  currentAlternative: >-
    Outsourced digital check-in vendors that keep raw document images in their
    own cloud storage, plus manual front-desk photocopy or PMS attachment
    workflows
  switchingReason: >-
    The wedge lets hotels keep self-service check-in convenience while shrinking
    the raw-document attack surface, tightening retention controls, and creating
    audit evidence that current outsourced workflows rarely provide
  pricingHypothesis: >-
    Annual platform fee by property plus usage-based pricing per verified stay,
    with premium modules for data residency, longer audit retention, and vendor
    risk reporting
