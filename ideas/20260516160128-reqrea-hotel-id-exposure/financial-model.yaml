modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Triggers["Audit or renewal triggers"] --> Pilots["Paid pilots"]
      Pilots --> Production["Production hotel groups"]
      Production --> Properties["More properties and modules"]
      Properties --> Revenue["Platform + verified-stay revenue"]
      Revenue --> GrossProfit["Gross profit"]
      GrossProfit --> Cash["Cash / runway"]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by turning two paid year-1 design partners into six production hotel groups by Q4Y2 and then expanding to eight groups at about $180K exit ACV by Q4Y3.
  - checkName: Must go right
    finding: The model depends on audit- or renewal-driven pilots converting into annual software contracts within roughly six months so implementation work does not outrun recurring revenue.
  - checkName: Model breaks if
    finding: The biggest cash-risk condition is slower production conversion plus heavier exception handling, because the downside case pushes the cash low point below zero before the next round.
  - checkName: Next-round proof
    finding: The next financing case is strongest once the company shows six production hotel groups, standardized adapters, and expansion across roughly 120 served properties without gross-margin collapse.
sanityChecks:
  ruleOf40: "Y3 growth 110.3% plus EBITDA margin -16.6% = 93.7%; directionally strong but still dependent on a small Y2 revenue base."
  burnMultiple: "Y1 burn multiple is about 2.4x on roughly $0.29M exit ARR; Y2 improves to about 0.9x as exit ARR rises from about $0.29M to about $0.82M, and Y3 burn multiple improves further to about 0.3x."
  revenuePerFte: "$175K Y3 recognized revenue per Q4Y3 FTE, or about $206K on exit-ARR basis (benchmark $200-400K SaaS)."
  flags:
    - "The model assumes each landed hotel group expands from a 5-10 property pilot into roughly 12-15 production properties by Y3, which is necessary because the initial wedge market is only about $1.4M at year 3."
    - "Revenue per FTE only reaches the SaaS benchmark on an exit-ARR basis, so earlier-than-planned hiring or bespoke integration work would make the company look services-heavy."
    - "Base case still exits Y3 EBITDA-negative, so the company likely needs a next round unless production conversions accelerate or premium modules lift ARPU faster than modeled."
