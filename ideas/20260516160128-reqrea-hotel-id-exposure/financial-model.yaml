slug: zero-copy-guest-id
date: "2026-05-16"
currency: USD
modelStartMonth: "2026-06"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-06"
    unit: YYYY-MM
    source: "Starts the first full month after the 2026-05-16 business-plan date."
  - id: A2
    name: "Opening cash and pre-seed size"
    value: "2000.0"
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M] Base case uses a $2.0M pre-seed, the low end of the stated range, sized to reach the Q4Y2 milestone with roughly six months of buffer."
  - id: A3
    name: "Starting customers (M1)"
    value: "0"
    unit: hotel_groups
    source: "[BP executiveSummary + BP product.sixMonth] The company starts pre-revenue and closes its first paid pilot only after the initial vault, attestation write-back, and policy controls are usable."
  - id: A4
    name: "Y1 customer ramp"
    value: "2 paying hotel groups by M12 with first pilot in M6 and second in M10"
    unit: hotel_groups
    source: "[BP milestones 0-12 months] Anchored to the explicit goal of 2 paid design partners and at least 1 pilot-to-production conversion in year 1; monthly timing is a startup-finance interpolation."
  - id: A5
    name: "Y2 customer ramp"
    value: "Q1Y2 3, Q2Y2 4, Q3Y2 5, Q4Y2 6 hotel groups"
    unit: hotel_groups
    source: "[BP milestones 12-24 months] Matches the plan to reach 4-6 hotel-group customers and standardize the first adapter set by the end of year 2."
  - id: A6
    name: "Y3 customer ramp"
    value: "Q1Y3 6, Q2Y3 7, Q3Y3 8, Q4Y3 8 hotel groups"
    unit: hotel_groups
    source: "[BP market.som + BP milestones 24-36 months] Eight groups at roughly 15 properties each reaches the researched ~120-property year-3 wedge without assuming every target account is won."
  - id: A7
    name: "Pricing ladder"
    value: "$30K paid pilot over 3 months, ~$144K initial production ACV, and ~$180K mature hotel-group ACV"
    unit: usdK_per_customer_year
    source: "[BP investorMemo.firstCustomer.initialContract + BP gtm.pricing + BP market.som] Uses the midpoint of the $25K-50K paid pilot range, then scales toward the SOM math of roughly $12K annual spend per property across 12-15 properties per group."
  - id: A8
    name: "Y1 realized pricing schedule"
    value: "M6-M8 $10K revenue per pilot month, M9 $12K production revenue, M10-M11 $22K total monthly revenue, M12 $24K as usage and scope expand"
    unit: USDK_per_month
    source: "[BP investorMemo.firstCustomer.initialContract + startup-finance heuristic] Keeps year 1 pilot-heavy, with only one account converted to production before year-end."
  - id: A9
    name: "Y2 blended realized ACV"
    value: "Quarterly revenue of $90K, $126K, $162K, and $204K from 3, 4, 5, and 6 customers"
    unit: USDK_per_quarter
    source: "[BP milestones 12-24 months + BP businessModel.expansionLevers] Revenue rises with production conversion, more properties per group, and early premium compliance modules."
  - id: A10
    name: "Y3 blended realized ACV"
    value: "Quarterly revenue of $240K, $294K, $330K, and $360K with mature exit ACV near $180K per group"
    unit: USDK_per_quarter
    source: "[BP market.som + BP businessModel.expansionLevers] Exit ARR of about $1.44M aligns with the researched initial SOM while assuming most groups are still mid-rollout rather than fully saturated."
  - id: A11
    name: "Gross margin ramp"
    value: "Y1 60.6%, Y2 65.0%, Y3 70.0%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions manual fallback] Early deployments carry more onboarding and exception-handling cost, then reach the target margin as integrations and policy templates standardize."
  - id: A12
    name: "Monthly logo churn for unit economics"
    value: "1.2"
    unit: percent
    source: "[Startup-finance heuristic] Annual hotel-group workflow contracts with integration effort should churn below typical SMB SaaS, but not at near-zero enterprise infrastructure levels this early."
  - id: A13
    name: "Steady-state CAC"
    value: "70.0"
    unit: USDK_per_customer
    source: "[BP gtm.funnelTargets + BP gtm.channels] Founder-led trigger-based sales into CIO and operations buyers with pilots, security review, and procurement work supports a mid-five-figure fully loaded CAC."
  - id: A14
    name: "Loaded salary bands"
    value: "Founder/CEO 120; Engineering 180; Compliance/Product 150; Solutions/Success 140; Sales/Partnerships 170"
    unit: annualK_per_FTE
    source: "[BP team + startup-finance heuristic] Lean seed-stage cash comp plus payroll load for a hospitality infrastructure team that must hire senior trust-building talent but stay capital efficient."
  - id: A15
    name: "Hiring schedule"
    value: "Compliance/product active by M1, solutions by M4, partnerships lead by M10, second engineer during Y2, second GTM hire during Y3"
    unit: timing
    source: "[BP team + BP strategicChoices.sequencingRationale] Deployment trust and product proof come before scaled GTM, so headcount stays lean until after the first production rollout."
  - id: A16
    name: "Headcount endpoint"
    value: "3 FTE by Q1Y1, 5 by Q4Y1, 6 by Q4Y2, and 7 by Q4Y3"
    unit: FTE
    source: "[BP team + BP fundingAsk.useOfFundsSummary] Keeps the company small enough for a $2M pre-seed while still covering product, compliance, implementation, and founder-led sales needs."
  - id: A17
    name: "Non-payroll operating spend method"
    value: "Functional opex includes modest cloud, travel, compliance tooling, insurance, and legal costs on top of salary, but avoids a large services bench"
    unit: policy
    source: "[BP operations + startup-finance heuristic] The product is modeled as a thin software control layer, not a heavy implementation consultancy."
  - id: A18
    name: "Funding sizing rule"
    value: "Raise enough to reach the Q4Y2 milestone and keep about 6 months of cash buffer for Y3 expansion"
    unit: policy
    source: "[BP fundingAsk runwayMonths 18 + model requirement] The model extends the plan from an 18-month target to a milestone-plus-buffer raise."
  - id: A19
    name: "Cash flow simplification"
    value: "Ending cash equals opening cash plus cumulative EBITDA"
    unit: formula
    source: "[Startup-finance heuristic] Assumes limited working-capital swings, debt, capex, and deferred-revenue distortion for a software-first company."
  - id: A20
    name: "Scenario downside deltas"
    value: "Q4Y3 customers 6, mature ACV $156K, gross margin 64%, and sales cycle stretches to 9 months"
    unit: scenario_inputs
    source: "[BP risks + research sensitivityCases] Captures the case where buyers wait for incumbents or jurisdiction-specific exceptions keep the motion more services-heavy."
  - id: A21
    name: "Scenario upside deltas"
    value: "Q4Y3 customers 10, mature ACV $186K, gross margin 72%, and channel partners accelerate rollout by roughly 1 quarter"
    unit: scenario_inputs
    source: "[BP milestones 24-36 months + BP experimentRoadmap channel-fit test] Upside assumes the first partners source pipeline without turning the company into a reseller feature."
