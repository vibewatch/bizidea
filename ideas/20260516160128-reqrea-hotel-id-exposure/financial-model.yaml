scenarios:
  downside:
    description: "Hotel groups keep buying pilots, but incumbent vendors slow production conversion and exception-heavy jurisdictions keep the service mix higher than planned."
    y3RevenueK: 910.0
    y3EbitdaK: -430.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
      - "Q4Y3 customers reach 6 instead of 8."
      - "Mature ACV stalls near $156K because groups roll out to fewer properties and buy fewer premium modules."
      - "Gross margin only reaches 64% because manual fallback and bespoke integration support stay elevated."
  base:
    description: "The company closes two paid design partners in Y1, reaches 6 hotel groups by Q4Y2, and exits Y3 at roughly $1.44M ARR across 8 groups and about 120 served properties."
    y3RevenueK: 1224.0
    y3EbitdaK: -203.2
    cashLowPointK: 609.8
    keyAssumptionChanges:
      - "Matches A1-A21 with 2 paying groups by M12, 6 groups by Q4Y2, and 8 groups by Q4Y3."
      - "Uses the $30K pilot / ~$144K initial production / ~$180K mature ACV ladder."
      - "Gross margin ramps from 60.6% in Y1 to the 70% plan target in Y3 as deployments become more standardized."
  upside:
    description: "Audit-driven urgency and channel partners pull forward conversions, letting the company land more groups and expand more properties per group without meaningfully increasing support burden."
    y3RevenueK: 1500.0
    y3EbitdaK: -60.0
    cashLowPointK: 780.0
    keyAssumptionChanges:
      - "Q4Y3 customers reach 10 instead of 8 because partner-sourced pipeline becomes productive by late Y2."
      - "Mature ACV rises near $186K as more properties and vendor-risk reporting modules attach inside each group."
      - "Gross margin reaches 72% because policy templates and integrations stay productized."
