  upsideCase: 72% 的稳定毛利率
  y3RevenueImpactK: 0.0
  cashImpactK: -95.0
- variable: 招聘节奏
  downsideCase: 第 2 名工程师和第 2 名 GTM 比 A15 早 2 个季度加入
  baseCase: 按 A15 招聘
  upsideCase: 推迟 1 名 GTM 招聘，直到伙伴供给的管线清晰可见
  y3RevenueImpactK: -40.0
  cashImpactK: -140.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: "flowchart LR\n  Triggers[\"Audit or renewal triggers\"] --> Pilots[\"Paid pilots\"]\n  Pilots --> Production[\"Production hotel groups\"]\n  Production --> Properties[\"More properties and modules\"]\n  Properties --> Revenue[\"Platform + verified-stay revenue\"]\n  Revenue --> GrossProfit[\"Gross profit\"]\n  GrossProfit --> Cash[\"Cash / runway\"]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入的核心，是把第 1 年的 2 个付费共创客户转成 Q4Y2 的 6 个生产环境酒店集团，再在 Q4Y3 前扩到 8 个集团、退出 ACV 约 $180K。
- checkName: 必须做对什么
  finding: 模型成立的前提，是由审计或续约驱动的试点能在大约 6 个月内转成年软件合同，不然实施工作会跑在经常性收入前面。
- checkName: 什么情况下会断
  finding: 最大的现金风险，是转生产环境变慢叠加例外处理变重，因为下行情景会让下一轮融资前的现金低点跌到零以下。
- checkName: 下一轮证明点
  finding: 只要公司能拿出 6 个生产环境酒店集团、标准化适配器，以及在约 120 家服务门店里扩张而毛利不塌，下一轮融资故事就会最有说服力。
sanityChecks:
  ruleOf40: Y3 增速 110.3% 加 EBITDA 利润率 -16.6%，得到 93.7%；方向上很强，但仍建立在较小的 Y2 收入基数之上。
  burnMultiple: Y1 的 burn multiple 约为 2.4x，对应退出 ARR 约 $0.29M；Y2 随着退出 ARR 从约 $0.29M 抬到约 $0.82M，burn multiple 改善到约 0.9x；Y3 进一步改善到约 0.3x。
  revenuePerFte: 按 Q4Y3 FTE 计算，Y3 已确认收入的人均产出约 $175K；若按退出 ARR 算约为 $206K（对比 SaaS 基准 $200-400K）。
  flags:
  - 模型假设每个拿下的酒店集团都会从 5-10 家门店试点扩到 Y3 的约 12-15 家生产环境门店；这是必须的，因为初始切口第 3 年市场只有约 $1.4M。
  - 只有按退出 ARR 口径看，人均收入才勉强碰到 SaaS 基准；如果招聘提前，或集成工作过于定制，公司就会显得更像服务生意。
  - 基准情景到 Y3 结束仍是 EBITDA 为负，因此除非转生产环境更快，或高级模块把 ARPU 拉得比模型更高，公司大概率还需要下一轮融资。
