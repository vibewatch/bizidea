slug: zero-copy-guest-id
date: '2026-05-16'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: 从 2026-05-16 的 business-plan 日期后第一个完整月份开始。
- id: A2
  name: 期初现金与 pre-seed 规模
  value: '2000.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 基准情景采用 $2.0M 的 pre-seed，也就是区间下沿，目标是跑到 Q4Y2 里程碑时手里还留大约 6 个月缓冲。'
- id: A3
  name: 起始客户数（M1）
  value: '0'
  unit: hotel_groups
  source: '[BP executiveSummary + BP product.sixMonth] 公司从零收入起步，只有当首个身份金库、证明回写和策略控制可用后，才拿下第一个付费试点。'
- id: A4
  name: Y1 客户爬坡
  value: 到 M12 达到 2 个付费酒店集团，首个试点在 M6，第二个在 M10
  unit: hotel_groups
  source: '[BP milestones 0-12 months] 这里锚定的是第 1 年拿下 2 个付费共创客户、并至少完成 1 次试点转生产环境；月度节奏是创业财务上的插值。'
- id: A5
  name: Y2 客户爬坡
  value: Q1Y2 为 3 家、Q2Y2 为 4 家、Q3Y2 为 5 家、Q4Y2 为 6 家酒店集团
  unit: hotel_groups
  source: '[BP milestones 12-24 months] 这和计划一致：到第 2 年底达到 4-6 个酒店集团客户，并把首批适配器标准化。'
- id: A6
  name: Y3 客户爬坡
  value: Q1Y3 为 6 家、Q2Y3 为 7 家、Q3Y3 为 8 家、Q4Y3 为 8 家酒店集团
  unit: hotel_groups
  source: '[BP market.som + BP milestones 24-36 months] 8 个集团、每个约 15 家门店，基本对应研究里约 120 家门店的第 3 年切口，而且没有假设目标客户都能赢下。'
- id: A7
  name: 定价阶梯
  value: $30K 的 3 个月付费试点、约 $144K 的初始生产环境 ACV，以及约 $180K 的成熟酒店集团 ACV
  unit: usdK_per_customer_year
  source: '[BP investorMemo.firstCustomer.initialContract + BP gtm.pricing + BP market.som] 用 $25K-50K 付费试点区间的中位数，再往每家集团 12-15 家门店、每店年支出约 $12K 的 SOM 逻辑去抬。'
- id: A8
  name: Y1 实际定价节奏
  value: M6-M8 每个试点月收入 $10K，M9 为 $12K 生产环境收入，M10-M11 月总收入 $22K，M12 随使用量和范围扩大到 $24K
  unit: USDK_per_month
  source: '[BP investorMemo.firstCustomer.initialContract + startup-finance heuristic] 第 1 年以试点收入为主，年底前只有 1 个账户转成生产环境。'
- id: A9
  name: Y2 混合实际 ACV
  value: 来自 3、4、5、6 个客户的季度收入分别为 $90K、$126K、$162K 和 $204K
  unit: USDK_per_quarter
  source: '[BP milestones 12-24 months + BP businessModel.expansionLevers] 随着转生产环境、集团内门店增加和早期高级合规模块上架，收入继续抬升。'
- id: A10
  name: Y3 混合实际 ACV
  value: 季度收入分别为 $240K、$294K、$330K 和 $360K，退出时 ACV 接近每集团 $180K
  unit: USDK_per_quarter
  source: '[BP market.som + BP businessModel.expansionLevers] 退出时 ARR 约为 $1.44M，和研究里的初始 SOM 大体对齐，同时假设多数集团仍在 rollout 中段，而非完全吃满。'
- id: A11
  name: 毛利率爬坡
  value: Y1 为 60.6%，Y2 为 65.0%，Y3 为 70.0%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions manual fallback] 早期部署要扛更多上线与异常处理成本，等集成和策略模板标准化后，毛利才爬到目标值。'
- id: A12
  name: 用于单位经济模型的月度 logo 流失率
  value: '1.2'
  unit: percent
  source: '[Startup-finance heuristic] 酒店集团级工作流合同需要集成，因此流失率应低于典型 SMB SaaS，但在这么早的阶段也不会低到接近企业基础设施那种水平。'
- id: A13
  name: 稳定期 CAC
  value: '70.0'
  unit: USDK_per_customer
  source: '[BP gtm.funnelTargets + BP gtm.channels] 由创始人主导、围绕触发事件打进 CIO 和运营买方，还要穿过试点、安全审查与采购流程，因此全负载 CAC 会落在中五位数。'
- id: A14
  name: 全负载薪资带宽
  value: 创始人/CEO 120；工程 180；合规/产品 150；解决方案/成功 140；销售/合作 170
  unit: annualK_per_FTE
  source: '[BP team + startup-finance heuristic] 现金薪酬保持 seed 阶段的克制，但酒店基础设施团队必须尽早招到能建立信任的高级人才，同时守住资本效率。'
- id: A15
  name: 招聘节奏
  value: 合规/产品从 M1 起到岗，解决方案从 M4 起到岗，合作负责人从 M10 起到岗，第 2 名工程师在 Y2 加入，第 2 名 GTM 在 Y3 加入
  unit: timing
  source: '[BP team + BP strategicChoices.sequencingRationale] 先把部署信任和产品证明打出来，再放大 GTM，因此在首个生产环境 rollout 前，团队一直保持精简。'
- id: A16
  name: 终局团队规模
  value: Q1Y1 为 3 名 FTE、Q4Y1 为 5 名、Q4Y2 为 6 名、Q4Y3 为 7 名
  unit: FTE
  source: '[BP team + BP fundingAsk.useOfFundsSummary] 这样能让公司规模小到足以被 $2M pre-seed 养住，同时又覆盖产品、合规、实施和创始人主导销售的需要。'
- id: A17
  name: 非薪酬经营支出方法
  value: 职能性 opex 在薪资之外，只叠加适度的云成本、差旅、合规工具、保险和法务成本，不搭一支很大的服务团队
  unit: policy
  source: '[BP operations + startup-finance heuristic] 模型假设产品是一层轻量软件控制层，而不是重实施咨询公司。'
- id: A18
  name: 融资规模规则
  value: 融资规模要足够跑到 Q4Y2 里程碑，并为 Y3 扩张多留大约 6 个月现金缓冲
  unit: policy
  source: '[BP fundingAsk runwayMonths 18 + model requirement] 模型把原计划的 18 个月融资目标，拉成“覆盖里程碑 + 缓冲”的融资规模。'
- id: A19
  name: 现金流简化
  value: 期末现金等于期初现金加累计 EBITDA
  unit: formula
  source: '[Startup-finance heuristic] 对于一家以软件为主的公司，这里假设营运资本波动、债务、capex 和递延收入的扭曲都有限。'
- id: A20
  name: 下行情景调整
  value: Q4Y3 客户数为 6 家、成熟 ACV 为 $156K、毛利率为 64%，销售周期拉长到 9 个月
  unit: scenario_inputs
  source: '[BP risks + research sensitivityCases] 这一组输入描述的是：买方先等等现有厂商，或者各司法辖区例外太多，导致业务形态比预期更偏服务。'
- id: A21
  name: 上行情景调整
  value: Q4Y3 客户数为 10 家、成熟 ACV 为 $186K、毛利率为 72%，渠道伙伴把 rollout 大约提前 1 个季度
  unit: scenario_inputs
  source: '[BP milestones 24-36 months + BP experimentRoadmap channel-fit test] 上行假设是首批伙伴能开始供给管线，同时公司不会沦为渠道方的转售功能。'
