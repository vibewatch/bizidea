scenarios:
  downside:
    description: 酒店集团依旧愿意买试点，但现有供应商拖慢转生产环境，而且例外过多的司法辖区让服务成分高于计划。
    y3RevenueK: 910.0
    y3EbitdaK: -430.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
    - Q4Y3 客户数只到 6 家，而不是 8 家。
    - 成熟 ACV 卡在约 $156K，因为集团 rollout 到的门店更少，买的高级模块也更少。
    - 毛利率只能到 64%，因为人工兜底和定制集成支持始终偏高。
  base:
    description: 公司在 Y1 拿下 2 个付费共创客户，到 Q4Y2 达到 6 个酒店集团，并在 Y3 结束时于 8 个集团、约 120 家服务门店上跑出约 $1.44M ARR。
    y3RevenueK: 1224.0
    y3EbitdaK: -203.2
    cashLowPointK: 609.8
    keyAssumptionChanges:
    - 与 A1-A21 保持一致：到 M12 达到 2 个付费集团、Q4Y2 达到 6 个集团、Q4Y3 达到 8 个集团。
    - 采用 $30K 试点 / 约 $144K 初始生产环境 / 约 $180K 成熟 ACV 的阶梯。
    - 随着部署标准化，毛利率从 Y1 的 60.6% 爬到 Y3 的 70% 计划目标。
  upside:
    description: 审计驱动的紧迫感和渠道伙伴让转化前移，公司因此能拿下更多集团，并在不明显增加支持负担的前提下把每个集团铺到更多门店。
    y3RevenueK: 1500.0
    y3EbitdaK: -60.0
    cashLowPointK: 780.0
    keyAssumptionChanges:
    - Q4Y3 客户数达到 10 家，而不是 8 家，因为伙伴供给的管线在 Y2 后段开始起效。
    - 成熟 ACV 抬到约 $186K，因为更多门店和供应商风险报告模块挂进了每个集团。
    - 毛利率达到 72%，因为策略模板和集成始终保持产品化。
