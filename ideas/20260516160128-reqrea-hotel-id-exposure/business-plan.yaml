slug: zero-copy-guest-id
date: '2026-05-16'
executiveSummary: >-
  Zero Copy Guest ID should launch as a hospitality identity-control layer for hotel groups that already use digital or kiosk check-in, not as a
  broad guest-experience suite or consumer identity wallet. The first customer is a 20-100 property hotel group whose digital operations and
  security teams need to keep self-service arrival live while reducing exposure from stored passport scans, driver's licenses, and selfie
  photos. Research supports the wedge: travelers want to skip the desk, hotels remain labor constrained, and the Reqrea/Tabiq breach shows
  outsourced check-in vendors can quietly become multi-year archives of breach-grade identity data. The product should verify guest identity,
  extract only policy-approved fields, write a signed attestation back to PMS and check-in systems, and enforce deletion or retention rules by
  jurisdiction rather than promise universal no-storage behavior. Go-to-market should be event-driven and founder-led, selling into audit,
  vendor-renewal, or breach-scare moments where the buyer already has budget pressure and cannot accept a workflow rip-and-replace. The initial
  proof point is one hotel group deployment across a small set of PMS and kiosk integrations that shows lower retained raw-image volume without
  hurting check-in completion. The company can build a real control-layer moat through hospitality-specific policy templates, deletion evidence,
  and cross-vendor integrations, but the market evidence still leaves open whether buyers want an independent vault or only a white-label vendor
  feature. The year-3 SOM in the research is only $1.4M for the initial wedge, so expansion into adjacent lodging workflows matters early if the
  first product works.
problem:
  - "Hotel groups now use outsourced digital and kiosk check-in flows that collect passports, driver's licenses, and selfies, turning arrival automation into long-lived storage of breach-grade identity data."
  - "Security, privacy, and operations teams often cannot prove where those raw files live, who accessed them, or whether retention matches jurisdictional requirements."
solution:
  - "Provide a guest identity vault that verifies documents and selfie match once, returns only signed verification status plus required structured fields to hotel systems, and keeps raw artifacts under explicit policy control."
  - "Start as a thin control layer that plugs into existing PMS, kiosk, and pre-arrival stacks, with configurable residency, deletion timers, audit logs, and manual fallback for jurisdictions or properties that still require exceptions."
whyWeWin:
  - "The company is optimized for the real buyer pain in hospitality identity workflows: minimizing raw-image retention and proving policy compliance, not maximizing generic onboarding conversion."
  - "Hospitality-specific integrations, jurisdiction-aware retention templates, and cross-vendor deletion evidence create a more durable wedge than another secure-storage feature inside one check-in product."
strategicChoices:
  beachhead: "Mid-market hotel groups with 20-100 urban properties that already run outsourced pre-arrival or kiosk check-in for foreign and late-night guests and now face an audit, vendor renewal, or breach-scare review."
  wedgeRationale: >-
    This slice has the clearest trigger, buyer, and measurable ROI: the group already pays for digital arrival, cannot revert to manual check-in
    because of labor and guest-demand pressure, and can measure value through lower retained raw-document volume plus faster audit response. It
    creates faster proof than selling to independent hotels one by one or building for all lodging categories at launch.
  sequencingRationale: >-
    Product should begin with a narrow adapter layer for the most common PMS and kiosk stacks plus policy-aware retention controls, because
    implementation trust matters more than feature breadth. GTM should stay founder-led through the first design partners, then add selective PMS,
    kiosk, and compliance partners only after one deployment proves that deletion evidence and signed attestations survive real property
    operations without hurting guest arrival speed.
  notYet:
    - "Full guest-journey or PMS replacement suite"
    - "Direct-to-consumer travel identity wallet"
    - "Vacation rentals, cruise, and serviced-apartment expansion before the hotel-group wedge is repeatable"
    - "Fully automated biometric flow in every jurisdiction without manual fallback"
market:
  tam: "$240.0M estimated TAM based on roughly 20,000 beachhead-fit properties globally at about $12k annual identity-control spend per property."
  sam: "$72.0M estimated SAM for roughly 6,000 properties in Japan, Europe, and North America where digital arrival and document/biometric compliance pressure are highest."
  som: "$1.4M estimated year-3 SOM based on about 120 reachable properties through 6-12 hotel-group wins and channel partnerships at about $12k annual spend per property."
  segments:
    - "20-200 property hotel groups using digital or kiosk check-in"
    - "Hospitality software vendors that need a safer identity layer for existing hotel customers"
  buyingProcess: >-
    The process starts when a hotel group must answer an audit, legal, security, or vendor-renewal question about where guest identity files are
    stored and how long they are retained. The economic buyer is usually the CIO, chief digital officer, or VP of hotel operations, with privacy,
    security, and implementation teams validating retention logic and workflow fit before a pilot expands property by property.
product:
  mvp: >-
    MVP is a hospitality identity vault that captures one document and selfie, runs verification, extracts only required stay fields, and writes a
    signed verified-guest attestation back into a small number of PMS and kiosk or pre-arrival systems. It must also enforce per-jurisdiction
    retention rules, audit access, and support manual fallback where biometric or passport-copy rules require exceptions.
  sixMonth: "Launch one design partner on a limited PMS and check-in stack, prove signed attestation write-back, and show raw-image deletion or policy-based retention works without lowering check-in completion."
  twelveMonth: "Convert one to two hotel groups to annual contracts, add the next highest-share PMS and kiosk integrations, and ship policy templates for the first target geographies on the same control plane."
  twentyFourMonth: "Expand into multi-brand hotel groups and adjacent lodging workflows only after the core hotel deployment playbook, deletion evidence, and partner-driven distribution motion are repeatable."
  keyBets:
    - "Hotel groups will pay for an independent control layer without replacing their front-end check-in workflow."
    - "A narrow set of PMS and kiosk integrations covers enough of the beachhead to prove repeatability."
    - "Policy-aware minimization and deletion evidence matter more to buyers than generic encrypted storage claims."
    - "Manual fallback for hard jurisdictions preserves conversion while the company learns where full zero-copy behavior is legally possible."
gtm:
  wedge: "Sell a paid pilot to a hotel group facing an audit, vendor renewal, or breach-scare review, then make the vault the default identity-control layer behind its existing digital-arrival workflow."
  channels:
    - "Founder-led direct sales to CIO, digital operations, and hotel-operations leaders at multi-property groups"
    - "PMS and integration marketplace partnerships"
    - "Channel partnerships with kiosk, mobile check-in, and hospitality IT integrators"
    - "Security and privacy advisory firms already serving hotel groups"
  funnelTargets: "Target lead→qualified pilot 20-30%, qualified pilot→paid pilot 30-40%, pilot→production 50%+, and first-group rollout→second integration expansion 40%+ within 12 months."
  pricing: "Charge an annual platform fee by property plus per verified stay, with premium modules for data residency, longer audit retention, and vendor-risk reporting; this matches a buyer who budgets at the hotel-group level but wants usage aligned to real arrival volume."
businessModel:
  revenueStreams:
    - "Annual subscription by property or hotel group for the control plane, policy engine, and audit tooling"
    - "Usage fees per verified stay"
    - "Implementation and integration fees for initial rollout"
    - "Premium modules for residency controls, longer audit retention, and vendor-risk reporting"
  unitOfValue: "Verified stay processed under policy-controlled identity handling"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Roll out from one hotel group into more properties and brands on the same account"
    - "Add more PMS, kiosk, and pre-arrival integrations once the first stack is proven"
    - "Sell compliance reporting, residency, and vendor-governance modules to existing customers"
    - "Expand into adjacent lodging categories after the hotel-group control layer is repeatable"
strategyMap:
  northStarMetric: "Verified stays completed with policy-compliant identity handling and no unnecessary retained raw artifacts"
  inputMetrics:
    - "Paid design partners signed"
    - "Pilot-to-production conversion rate"
    - "Percentage of verifications deleted or retained on schedule by policy"
    - "Check-in completion rate versus customer baseline"
    - "Time to complete an audit or vendor-risk review"
    - "Number of production integrations per hotel group"
  moatsToBuild:
    - "Jurisdiction-aware policy templates separating required guest fields from unnecessary raw-image retention"
    - "Cross-vendor audit and deletion evidence tied to PMS, kiosk, and pre-arrival workflows"
    - "Integration adapters that make the vault easier to adopt than replacing existing arrival tooling"
  killCriteria:
    - "Fewer than 2 paid design partners after 9 months of focused selling into hotel-group audit or renewal triggers"
    - "Pilot deployments reduce retained raw identity artifacts by less than 50% without hurting check-in completion"
    - "More than 30% of target properties require bespoke integration or exception logic that breaks the thin-layer model"
  mermaid: |
    flowchart LR
      Wedge[Hotel-group audit wedge] --> MVP[Identity vault MVP]
      MVP --> Proof[Deletion and attestation proof]
      Proof --> Expansion[Multi-property and channel expansion]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Compelling incident-driven pain and a disciplined wedge, but conviction stays limited until buyer ownership and market size prove stronger than a niche compliance feature."
    whyBelieve: "The research shows hotels are pushing harder into self-service arrival while privacy and vendor-risk pressure make raw-document minimization a real and timely control problem."
    whyDoubt: "The initial SOM is modest, regulation is jurisdiction-specific, and incumbents may neutralize the pain with shorter-retention features before an independent vault becomes a category."
    nextDiligence: "The next proof point is two paid hotel-group pilots that show policy-compliant deletion, no drop in check-in conversion, and credible annual contract expansion beyond a one-off security project."
  firstCustomer:
    title: "CIO or VP of digital operations at a regional hotel group"
    profile: "A 20-100 property urban hotel group using outsourced pre-arrival or kiosk check-in for foreign and late-night guests and carrying visible audit or vendor-risk pressure."
    trigger: "A security review, breach scare, or vendor renewal forces the group to document where passport scans and selfies live and how long they are retained."
    buyer: "CIO, chief digital officer, or VP of hotel operations"
    initialContract: "$25k-50k paid pilot across 5-10 properties, converting to roughly $100k-250k annual platform contract for a broader rollout plus per verified-stay usage."
  mustBeTrue:
    - "Hotel groups will fund an independent control layer instead of waiting for existing check-in vendors to add enough retention controls."
    - "A small set of PMS and kiosk integrations covers enough of the beachhead to win the first 6-12 groups without heavy custom work."
    - "Policy-based minimization and deletion evidence reduce buyer risk enough to survive procurement even when some jurisdictions still require exceptions."
    - "Pilot deployments can preserve or improve check-in completion while sharply reducing retained raw identity files."
    - "The company can expand beyond the initial hotel wedge before the modest starting market caps venture upside."
  diligenceQuestions:
    - "Who owns budget when the pain appears: CIO, operations, privacy, or a check-in vendor already in the workflow?"
    - "Which target jurisdictions truly require retained passport copies or biometric processing, and how often will those exceptions appear in the beachhead?"
    - "Which PMS plus kiosk or pre-arrival stacks dominate 20-100 property hotel groups in the first target geographies?"
    - "Would hotel groups rather buy an independent vault directly or demand the same capability through current arrival vendors?"
    - "How much of the first contract is durable software spend versus one-time security remediation budget?"
operatingAssumptions:
  - assumption: "Hotel groups facing audit or vendor-renewal pressure will buy a thin identity-control layer without replacing their existing arrival workflow."
    basis: research.yaml
    validationTest: "Run 15-20 buyer interviews and secure at least 2 paid pilots from groups with named audit, renewal, or breach-scare triggers."
    decisionImpact: "If false, shift to a channel-first strategy through existing check-in vendors or narrow the product into embedded compliance tooling rather than direct software sales."
  - assumption: "The first 2-3 PMS and kiosk or pre-arrival integrations cover enough of the beachhead to support repeatable deployment."
    basis: research.yaml
    validationTest: "Map the dominant stacks in three launch geographies and confirm that at least 60% of qualified pipeline can be served with the first integration set."
    decisionImpact: "If false, narrow geography, raise services pricing, or defer scaled GTM until integration scope is simplified."
  - assumption: "Policy-aware retention and deletion evidence matter more to buyers than generic secure-storage claims from incumbents."
    basis: idea.yaml
    validationTest: "In pilot sales, win on a measured reduction in retained raw files and faster audit response rather than on feature breadth, and document the buyer's ranking of those criteria."
    decisionImpact: "If false, the wedge collapses into a feature request inside broader guest-journey suites and the company should reconsider standalone positioning."
  - assumption: "Manual fallback for biometric or passport-copy exception cases can keep the product legally usable while preserving target gross margin over time."
    basis: research.yaml
    validationTest: "Track exception rates in the first production deployments and keep manual review below 25% of verified stays in target geographies by the third customer."
    decisionImpact: "If false, the company must narrow geography, drop biometric flows in some markets, or accept a lower-margin services mix."
  - assumption: "Adjacent lodging and travel workflows provide a credible expansion path once the hotel-group wedge is proven."
    basis: operator judgment
    validationTest: "By month 15, validate at least 3 adjacent design-partner conversations in serviced apartments, rentals, or travel-operations software with similar minimization pain."
    decisionImpact: "If false, the company remains a narrow hotel compliance product and may not justify venture-scale funding."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Buyer trigger validation"
    hypothesis: "Audit, breach-scare, and vendor-renewal moments create enough urgency to sell a paid pilot to hotel groups already using digital arrival."
    successMetric: "At least 10 qualified buyer meetings and 2 paid pilot commitments from 20-100 property groups."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Integration stack mapping"
    hypothesis: "A narrow first set of PMS and kiosk or pre-arrival adapters covers the majority of high-intent beachhead demand."
    successMetric: "Integration map showing the first 2-3 target stacks cover at least 60% of qualified pipeline."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Policy-template launch"
    hypothesis: "Jurisdiction-aware retention templates can separate required fields from raw-image storage without creating legal or operational confusion."
    successMetric: "Working policy packs for the first launch geographies approved by design partners and used in one pilot rollout."
    owner: "Compliance product lead"
  - horizon: "90-180 days"
    experiment: "Deletion-proof pilot"
    hypothesis: "The vault can reduce unnecessary raw-image retention by at least 50% while preserving check-in completion versus the customer's baseline."
    successMetric: "One live pilot with measured retention reduction of 50%+ and no material decline in completion rate."
    owner: "Founding eng"
  - horizon: "6-12 months"
    experiment: "Pilot-to-production conversion"
    hypothesis: "Security and operations buyers will expand from a narrow pilot into an annual hotel-group contract once deletion evidence is proven."
    successMetric: "At least 1 paid pilot converts to a 12-month production agreement within 60 days of results review."
    owner: "Founder/CEO"
  - horizon: "12-18 months"
    experiment: "Channel-fit test"
    hypothesis: "PMS, kiosk, or hospitality IT partners can source pipeline and reduce deployment friction without collapsing the company into a reseller feature."
    successMetric: "2 active partners source at least 25% of qualified pipeline while maintaining direct ownership of the control-layer product."
    owner: "Partnerships lead"
operations:
  - "Maintain a controlled policy library by jurisdiction, property type, and identity workflow, with explicit review for every rules change."
  - "Operate access, deletion, and residency audit logging that customers can export for vendor reviews and incident response."
  - "Run an implementation playbook for PMS, kiosk, and pre-arrival integrations that minimizes guest-facing workflow changes at the property level."
  - "Keep a manual exception queue for biometric, passport-copy, and property-specific edge cases until policy coverage and automation are proven."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, design-partner selection, and the buyer narrative because the first deals are trigger-driven and credibility-sensitive."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the vault, signed attestation flow, and first PMS or kiosk integrations required for the thin-layer wedge."
  - role: "Compliance product lead"
    startTiming: "Month 1"
    rationale: "Translate hospitality and privacy rules into policy templates, fallback logic, and implementation guidance by geography."
  - role: "Solutions engineer"
    startTiming: "Month 4"
    rationale: "Reduce integration drag and keep founders from becoming the permanent professional-services team."
  - role: "Partnerships lead"
    startTiming: "Month 10"
    rationale: "Add structured PMS, kiosk, and advisory channels only after the first pilot-to-production motion is repeatable."
milestones:
  - horizon: "0-12 months"
    items:
      - "Close 2 paid design partners in the 20-100 property hotel-group segment."
      - "Launch the first production deployment on a limited PMS and digital-arrival stack."
      - "Demonstrate 50%+ reduction in unnecessary retained raw identity artifacts with no material drop in check-in completion."
      - "Convert at least 1 pilot into a 12-month annual contract."
  - horizon: "12-24 months"
    items:
      - "Reach 4-6 hotel-group customers and standardize the first integration adapter set."
      - "Ship policy templates and deletion evidence workflows for the initial launch geographies."
      - "Establish 2 channel or implementation partners that reduce acquisition or deployment cost."
      - "Prove expansion revenue from additional properties, brands, or compliance modules inside existing accounts."
  - horizon: "24-36 months"
    items:
      - "Reach the researched roughly 120 served properties in the initial wedge."
      - "Expand into at least 1 adjacent lodging workflow without breaking the core hotel deployment playbook."
      - "Show that audit evidence and policy governance, not one-off integration work, drive account retention and upsell."
risks:
  - risk: "Hotel groups may treat the pain as a vendor feature request and wait for current check-in providers to add enough controls."
    likelihood: Medium
    impact: High
    mitigation: "Sell into hard trigger moments, prove cross-vendor governance that one front-end vendor cannot offer, and use channel partnerships only after direct pain is validated."
  - risk: "Jurisdiction-specific passport and biometric rules may force too many exception paths for a simple zero-copy message."
    likelihood: High
    impact: High
    mitigation: "Lead with policy-aware minimization, not universal deletion, and ship manual fallback plus geography-specific templates from day one."
  - risk: "PMS and kiosk integration drag could turn each deployment into bespoke services work."
    likelihood: High
    impact: High
    mitigation: "Constrain the beachhead to the most common stacks first, hire solutions engineering early, and refuse custom workflows outside the initial adapter roadmap."
  - risk: "The initial wedge may be too small to support venture outcomes if adjacent expansion does not materialize."
    likelihood: Medium
    impact: High
    mitigation: "Track expansion signals early in adjacent lodging categories and be explicit that the hotel wedge is a proof point, not the full company."
  - risk: "A future breach or failed deletion event inside the startup's own system would destroy the trust-based positioning."
    likelihood: Medium
    impact: High
    mitigation: "Invest early in security operations, tight access controls, auditable deletion workflows, and clear incident-response processes before scaled selling."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Eighteen months of runway should fund the founding engineering, compliance, and solutions team; the first PMS and kiosk integrations; policy-template coverage for launch geographies; and proof that paid pilots convert into repeatable annual hotel-group contracts."
