reportMemo:
  executiveTakeaways:
  - The Reqrea/Tabiq exposure shows outsourced hotel check-in vendors can quietly become multi-year archives of passports, licenses, and selfies, turning a routine arrival workflow into breach-grade risk.
  - 'Hotels are unlikely to roll back digital arrival: 70% of travelers say they would skip the front desk, and Mews reports 30% of U.S. reservations already use kiosk check-in where it is offered.'
  - 'The market gap is not basic identity verification. It is policy-safe identity minimization: verifying once, passing only required fields and attestations into hotel systems, and proving deletion/access controls later.'
  - The most promising first buyers are multi-property hotel groups under staffing and audit pressure that already use digital check-in, kiosks, or pre-arrival registration and now need a safer control layer rather than a workflow rip-and-replace.
  marketDefinition: A hospitality identity-control layer that runs document and selfie verification for pre-arrival or kiosk check-in, then sends only policy-approved guest fields and verification status into PMS or check-in systems while minimizing raw document retention.
  customerAndBuyer: Primary users are digital operations, IT, privacy, and front-office leaders at 20-200 property hotel groups using outsourced online or kiosk check-in. The buyer is typically the CIO, chief digital officer, or VP of hotel operations who owns guest-arrival tooling and vendor risk.
  buyingTriggers:
  - point: A security review, breach scare, or vendor renewal forces the hotel group to explain where passport scans and selfies live and how long they are retained.
    sourceRefs:
    - 1
    - 4
    - 5
  - point: Persistent front-desk staffing shortages make hotels keep self-service arrival even when compliance teams become uncomfortable with raw ID storage.
    sourceRefs:
    - 12
    - 15
  - point: Traveler demand for skipping the desk means operators need a safer digital-arrival model, not a return to manual photocopying.
    sourceRefs:
    - 10
    - 11
    - 13
  willingnessToPay:
    summary: 'Hotels already fund arrival automation because labor and revenue effects are tangible: Mews markets seven-month payback, cites double-digit labor-hour savings, and reports higher upsell conversion through self-check-in. That means a minimization layer can ride existing digital check-in and compliance budgets even though public list pricing remains sparse.'
    sourceRefs:
    - 11
    - 12
    - 14
    - 15
  competitiveLandscape: Competition is real but mostly misaligned to the wedge. Canary and Mews optimize guest journey and PMS efficiency. Chekin optimizes legal registration plus identity match. Agilysys optimizes integrated kiosk hardware and PMS workflows. Oracle dominates the system of record. None of the fetched incumbents publicly position themselves around zero-copy attestations, cross-vendor retention governance, or independent deletion evidence; they sell secure storage, operational speed, or broader guest-experience suites.
  incumbentThesis:
  - incumbentClass: Cloud PMS platforms
    point: Oracle and similar PMS vendors already own the guest profile and workflow, but their incentive is to centralize more data in the PMS rather than strip raw ID artifacts down to attestations only.
    sourceRefs:
    - 17
    - 18
  - incumbentClass: Guest journey suites
    point: Canary wins on mobile check-in, messaging, and secure transactions, yet its public story is secure vendor-hosted workflows, not third-party-independent data minimization.
    sourceRefs:
    - 19
    - 20
  - incumbentClass: Local compliance/check-in tools
    point: Chekin is strong where guest reporting, biometrics, and smart-lock access must work together, but its public compliance model still assumes storing guest data and operating country-specific reporting rails.
    sourceRefs:
    - 21
    - 22
  - incumbentClass: Kiosk and hardware-linked arrivals
    point: Agilysys solves the arrival station itself with native PMS and key-dispensing integration, but that makes it a workflow endpoint rather than a neutral control layer that can govern multiple vendors.
    sourceRefs:
    - 23
  regulatoryLandscape: 'GDPR makes the core wedge legible: hotels and their processors must collect only necessary data, keep it no longer than necessary, and implement privacy by design and by default. Once selfie matching is used to uniquely identify a guest, biometric processing becomes special-category data with stricter conditions. Japan adds a harder hospitality-specific wrinkle: foreign guests without a domestic address must present passports and the government requests photocopying, so the product needs policy-aware retention rather than simplistic delete-everything rhetoric. Spain points the other way: the AEPD view summarized by Garrigues is that retaining photocopies to satisfy traveler-registration rules violates minimization because the copy contains more data than the law requires.'
  technologyLandscape: The ecosystem is technically tractable. Hotels increasingly use cloud PMSs and kiosk/mobile-arrival tooling, while Oracle and Apaleo expose guest-profile, booking, and event interfaces that can receive structured verification outputs. The control challenge is not whether OCR/selfie verification can be done; it is whether raw images remain trapped in vendor storage after verification and whether hotels can prove policy-compliant deletion across PMS, check-in, kiosk, and payment workflows.
  distributionChannels:
  - point: Direct sales into hotel-group CIO, digital ops, and security leaders during audit, breach-scare, or vendor-renewal cycles.
    sourceRefs:
    - 1
    - 15
  - point: PMS and integration marketplaces are plausible channels because Oracle and Apaleo already expose the APIs needed to receive verified attributes and trigger downstream workflows.
    sourceRefs:
    - 18
    - 24
  - point: Partnerships with kiosk, mobile check-in, and guest-engagement vendors can position the vault as a safer identity layer without replacing the front-end arrival experience.
    sourceRefs:
    - 13
    - 19
    - 23
  partnershipEcosystem:
  - point: PMS partners matter most because guest profiles, reservation state, and reporting live there; Oracle and API-first platforms are the systems a vault must write back into.
    sourceRefs:
    - 18
    - 24
  - point: Kiosk and room-access partners matter because many hotels tie ID validation to payment authorization, key issuance, and self-service arrival on property.
    sourceRefs:
    - 13
    - 23
  - point: Regional legal/compliance specialists are useful channel partners where traveler-registration rules vary sharply by country and property type.
    sourceRefs:
    - 3
    - 9
    - 22
  dataMoats:
  - point: Country-specific policy templates that separate required structured fields from unnecessary raw-image retention can become defensible operational know-how.
    sourceRefs:
    - 3
    - 4
    - 5
    - 9
  - point: Cross-vendor audit logs that prove access control, residency, and deletion are harder for point solutions to assemble than simple verification scores.
    sourceRefs:
    - 4
    - 5
    - 22
  - point: Integration data on which minimum field sets preserve check-in completion across PMSs, kiosks, and hotel groups can compound into a workflow moat.
    sourceRefs:
    - 11
    - 18
    - 24
  geographicConsiderations:
  - point: Japan requires passport presentation and government-requested photocopying for foreign guests without a Japanese address, so the product needs configurable retention logic for that market.
    sourceRefs:
    - 3
    - 8
  - point: EU and UK-style biometric rules raise the compliance burden for selfie matching, especially where explicit consent or another special-category condition is weak.
    sourceRefs:
    - 6
    - 7
  - point: 'Spain is an example of the opposite pressure: hotels may need traveler-registration data, but storing full passport copies can still breach minimization.'
    sourceRefs:
    - 9
    - 22
  sensitivityCases:
  - case: Incumbents add encrypted storage plus shorter retention timers
    impact: This would narrow a generic security pitch, but not the need for an independent, cross-vendor attestation and deletion-governance layer.
    sourceRefs:
    - 19
