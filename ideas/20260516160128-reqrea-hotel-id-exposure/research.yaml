openQuestions:
- Which hotel brands and property groups were using Tabiq, and how concentrated is vendor risk among 20-200 property operators?
- In practice, which jurisdictions in the beachhead truly require retained passport copies versus only visual inspection or structured field capture?
- Which PMS + kiosk + lock stacks dominate the mid-market urban hotel segment the startup wants to serve first?
- Will buyers prefer an independent vault sold to the hotel group, or a white-label control layer sold through existing check-in vendors?
