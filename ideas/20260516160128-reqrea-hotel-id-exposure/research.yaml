competitors:
- name: Canary Technologies
  stage: scale-up
  wedge: Hospitality-native guest engagement and mobile check-in suite with secure transactions and fraud tooling.
  pricing: Custom enterprise pricing; not publicly posted.
  strength: Strong hotel brand penetration, top-ranked contactless check-in positioning, and broad guest-journey product surface.
  weaknessVsUs: Publicly sells secure vendor-hosted workflows rather than an independent zero-copy attestation and deletion-governance layer.
  sourceRefs:
  - 19
  - 20
- name: Mews
  stage: scale-up
  wedge: Cloud PMS plus kiosk and guest portal for self-service arrival inside a broader hotel operating system.
  pricing: Tiered plans with quote-based pricing; payback claim public, list pricing not public.
  strength: Large modern install base, strong traveler-demand evidence, and measurable labor/upsell benefits from self-check-in.
  weaknessVsUs: Identity capture is a feature inside the PMS stack, not a neutral control layer purpose-built around minimization and retention governance.
  sourceRefs:
  - 11
  - 13
  - 14
  - 29
- name: Chekin
  stage: scale-up
  wedge: Guest registration, biometrics, legal reporting, and smart-lock-linked self-check-in for hospitality.
  pricing: Custom / not publicly posted.
  strength: Clear regulatory workflow fit, biometric match capability, and country-specific guest-reporting automation.
  weaknessVsUs: The public product still assumes storing and routing guest data for compliance workflows instead of minimizing raw-image persistence across vendors.
