slug: zero-copy-guest-id
date: '2026-05-16'
executiveSummary: Zero Copy Guest ID 应该先做成面向酒店集团的身份控制层，服务那些已经上线数字化入住或自助机入住的客户，而不是一上来就做大而全的住客体验套件或消费者身份钱包。第一批客户会是拥有 20-100 家门店的酒店集团：它们的数字化运营和安全团队既要保住自助到店体验，又得把护照扫描件、驾照和自拍照片的存储风险压下去。研究已经把切口说明白了：旅客想跳过前台，酒店前线人手依旧紧，而 Reqrea/Tabiq 泄露事件证明，外包入住供应商会在不知不觉中变成跨越数年的高风险身份档案库。产品该做的是验证住客身份、只提取策略允许的字段、把签名证明回写到 PMS 和入住系统，并按司法辖区执行删除或留存规则，而不是空喊“永不存储”。GTM 应该围绕具体事件、由创始人主导，专门打在审计、续约或泄露惊魂这些时点：买方此时已经有预算压力，也不接受把整条工作流推倒重来。第一个证明点，是在少量 PMS 和自助机集成上落地一个酒店集团项目，让原始影像留存明显下降，同时不伤入住完成率。公司有机会靠酒店场景策略模板、删除证据和跨供应商集成做出真正的控制层护城河，但市场证据还没回答清楚：买方究竟想要独立身份金库，还是只想让现有供应商贴牌补一个功能。研究里第 3 年的初始 SOM 只有 $1.4M，所以如果第一款产品跑通，尽早扩展到相邻住宿工作流很关键。
problem:
- 酒店集团如今大量采用外包数字化入住和自助机入住流程，流程里会采集护照、驾照和自拍，这让到店自动化变成了长期留存高风险身份数据的机器。
- 安全、隐私和运营团队往往说不清这些原始文件到底存在哪、谁访问过，以及留存方式是否符合各地监管要求。
solution:
- 提供一套住客身份金库：证件和自拍只核一次，把签名验真状态和必需的结构化字段回写到酒店系统，同时把原始材料放进明确的策略控制之下。
- 先做一层轻量控制层，接进现有 PMS、自助机和到店前入住栈；支持可配置的数据驻留、删除计时器、审计日志，以及在仍有例外要求的司法辖区或门店里提供人工兜底。
whyWeWin:
- 这家公司对准的是酒店身份流程里真正让买方掏钱的痛点：把原始影像留存压下来，并拿出合规证据，而不是去卷通用开户注册转化。
- 酒店专用集成、按司法辖区沉淀的留存模板，以及跨供应商删除证据，做出的切口会比某个入住产品里再加一个安全存储功能更稳。
strategicChoices:
  beachhead: 先打中端酒店集团：拥有 20-100 家城市门店，已经给外籍和深夜住客上线了外包到店前入住或自助机入住，而且正面临审计、供应商续约或泄露惊魂复盘。
  wedgeRationale: 这一段客户的触发点、买方和 ROI 都最清楚：他们已经在为数字化到店付费，受限于人手和住客需求，没法退回人工入住，而且价值也能直接量出来——原始证件留存量更低、审计响应更快。比起一家一家去卖独立酒店，或者一开始就覆盖所有住宿业态，这样更容易先做出证明。
  sequencingRationale: 产品要先从常见 PMS 和自助机栈的窄适配层切入，再叠加能识别策略的留存控制，因为比起功能广度，实施信任更重要。GTM 在拿下前几家共创客户前都该由创始人亲自打；只有当首个部署证明删除证据和签名证明能在真实门店流程里跑通、又不拖慢住客到店速度后，才加 PMS、自助机和合规伙伴。
  notYet:
  - 完整住客旅程或 PMS 替代套件
  - 面向消费者的旅行身份钱包
  - 在酒店集团切口还没跑顺前，就扩到度假租赁、邮轮和服务式公寓
  - 在所有司法辖区里都强推全自动生物识别流程而不留人工兜底
market:
  tam: 估算 TAM 为 $240.0M：全球约 20,000 家符合滩头市场特征的酒店门店，每家每年身份控制支出约 $12k。
  sam: 估算 SAM 为 $72.0M：日本、欧洲和北美约 6,000 家门店，这些地区数字化到店与证件/生物识别合规压力最高。
  som: 估算第 3 年 SOM 为 $1.4M：通过 6-12 个酒店集团客户和渠道合作，可触达约 120 家门店，每家每年支出约 $12k。
  segments:
  - 使用数字化或自助机入住的 20-200 家门店酒店集团
  - 想给现有酒店客户补一层更安全身份能力的酒店软件供应商
  buyingProcess: 购买流程通常从酒店集团必须回答一个问题开始：审计、法务、安全或供应商续约方在追问住客身份文件存在哪里、要留多久。经济买方通常是 CIO、首席数字官或酒店运营 VP；隐私、安全和实施团队会先验证留存逻辑与工作流适配，再决定是否把试点一店一店铺开。
product:
  mvp: MVP 是一套酒店身份金库：采集一次证件和自拍，完成核验，只提取必需的入住字段，再把签名的“已验证住客”证明写回少量 PMS 与自助机/到店前系统。它还必须能按司法辖区执行留存规则、审计访问，并在生物识别或护照复印法规要求例外时提供人工兜底。
  sixMonth: 在有限的 PMS 与入住栈上跑通一家共创客户，证明签名证明可以顺利回写，并证明原始影像删除或按策略留存不会拉低入住完成率。
  twelveMonth: 把 1-2 个酒店集团转成年约，补上下一批市场份额最高的 PMS 与自助机集成，并在同一套控制面上交付首批目标地区的策略模板。
  twentyFourMonth: 只有当核心酒店部署打法、删除证据和伙伴驱动分销都能重复复制后，才扩到多品牌酒店集团和相邻住宿工作流。
  keyBets:
  - 酒店集团愿意为独立控制层付费，而不是非得重做前端入住流程。
  - 少量 PMS 和自助机集成就足以覆盖滩头市场，先证明可复制性。
  - 对买方来说，能识别策略的数据最小化和删除证据，比现有厂商泛泛而谈的加密存储更重要。
  - 在法规更硬的地区保留人工兜底，能先守住转化，再慢慢摸清哪些地方真的能做到完整零拷贝。
gtm:
  wedge: 先卖给正面临审计、续约或泄露惊魂复盘的酒店集团一个付费试点，再把身份金库变成其现有数字化到店流程背后的默认身份控制层。
  channels:
  - 由创始人直销多门店酒店集团的 CIO、数字化运营和酒店运营负责人
  - PMS 与集成市场合作
  - 与自助机、移动入住和酒店 IT 集成商做渠道合作
  - 已在服务酒店集团的安全与隐私顾问机构
  funnelTargets: 目标漏斗为：线索→合格试点 20-30%，合格试点→付费试点 30-40%，试点→生产环境 50%+，首个集团上线→第二轮集成扩展在 12 个月内达到 40%+。
  pricing: 按门店收平台年费，再按每次已验证入住计费；数据驻留、更长审计留存和供应商风险报告做成高级模块。这样既符合酒店集团层面的预算口径，也能让使用量和真实到店量挂钩。
businessModel:
  revenueStreams:
  - 按门店或酒店集团订阅控制面、策略引擎与审计工具
  - 按每次已验证入住收使用费
  - 首轮上线的实施与集成费用
  - 数据驻留控制、更长审计留存和供应商风险报告等高级模块
  unitOfValue: 在策略控制下完成处理的一次已验证入住
  targetGrossMarginPct: 70
  expansionLevers:
  - 从一个酒店集团账户向更多门店和品牌扩张
  - 首套栈跑通后，再补更多 PMS、自助机和到店前入住集成
  - 向现有客户加卖合规报告、数据驻留和供应商治理模块
  - 在酒店集团控制层可复制后，再扩展到相邻住宿品类
strategyMap:
  northStarMetric: 在身份处理合规的前提下完成的已验证入住数量，且不留下不必要的原始材料
  inputMetrics:
  - 签下的付费共创客户数
  - 试点转生产环境的转化率
  - 按策略准时删除或留存的验证占比
  - 相对客户基线的入住完成率
  - 完成一次审计或供应商风险评审所需时间
  - 每个酒店集团的生产环境集成数量
  moatsToBuild:
  - 按司法辖区沉淀的策略模板，把必需住客字段和不必要的原始影像留存拆开
  - 绑定 PMS、自助机和到店前流程的跨供应商审计与删除证据
  - 让客户更容易接入身份金库，而不是被迫替换现有到店工具的适配器
  killCriteria:
  - 围绕酒店集团审计或续约触发点集中销售 9 个月后，付费共创客户仍少于 2 家
  - 试点部署在不伤入住完成率的前提下，把原始身份材料留存降幅做不到 50%
  - 目标门店里有超过 30% 需要定制集成或例外逻辑，导致轻量层模型失效
  mermaid: "flowchart LR\n  Wedge[Hotel-group audit wedge] --> MVP[Identity vault MVP]\n  MVP --> Proof[Deletion and attestation proof]\n  Proof --> Expansion[Multi-property and channel expansion]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 事件驱动的痛点和切口都很扎实，但在证明预算归属与市场空间不只是小众合规功能前，判断仍应克制。
    whyBelieve: 研究显示，酒店正继续把入住推向自助化；同时隐私与供应商风险压力，也让“压缩原始证件留存”成了真实且及时的控制问题。
    whyDoubt: 初始 SOM 不大，监管又高度分地区，现有厂商也可能先用更短留存等功能把痛点中和掉，导致独立身份金库迟迟长不成一个品类。
    nextDiligence: 下一步最关键的证据，是拿下 2 个酒店集团付费试点，并证明能合规删除、不伤入住转化，而且合同能从一次性安全项目扩成可信的年度合约。
  firstCustomer:
    title: 区域性酒店集团的 CIO 或数字化运营 VP
    profile: 一家拥有 20-100 家城市门店的酒店集团，为外籍和深夜住客使用外包到店前入住或自助机入住，而且当前明显承受着审计或供应商风险压力。
    trigger: 一次安全审查、泄露惊魂或供应商续约，让集团必须把护照扫描件和自拍到底存在哪、留多久解释清楚。
    buyer: CIO、首席数字官或酒店运营 VP
    initialContract: 先签 5-10 家门店、$25k-50k 的付费试点，再转成更大范围铺开的年度平台合同，年价值约 $100k-250k，并叠加按已验证入住计费。
  mustBeTrue:
  - 酒店集团愿意为独立控制层买单，而不是等现有入住供应商把留存控制补到“差不多够用”。
  - 少量 PMS 和自助机集成就足以覆盖滩头市场，让前 6-12 个集团客户在不过度定制的情况下拿下。
  - 基于策略的数据最小化与删除证据，足以降低买方风险，即便部分司法辖区依旧保留例外。
  - 试点部署既能把原始身份文件留存大幅压缩，也能保住甚至提升入住完成率。
  - 公司能在起步市场天花板压顶之前，尽快从酒店切口扩到更广的场景。
  diligenceQuestions:
  - 痛点出现时，预算到底掌握在 CIO、运营、隐私团队手里，还是其实已经被流程里的入住供应商占住？
  - 目标司法辖区里，哪些地方真的要求留存护照复印件或做生物识别处理？这些例外在滩头市场里出现频率有多高？
  - 首批目标地区中，20-100 家门店酒店集团最常见的 PMS、自助机和到店前入住栈到底是哪几套？
  - 酒店集团更愿意直接买独立身份金库，还是要求现有到店供应商补上同类能力？
  - 首单里到底有多少是真正可持续的软件收入，又有多少只是一次性的安全整改预算？
operatingAssumptions:
- assumption: 酒店集团在审计或供应商续约压力下，会愿意购买一层轻量身份控制层，而不是重做现有到店流程。
  basis: research.yaml
  validationTest: 跑 15-20 场买方访谈，并从明确面临审计、续约或泄露惊魂触发点的集团里拿到至少 2 个付费试点。
  decisionImpact: 如果这个假设不成立，就该转向通过现有入住供应商做渠道优先，或者把产品收窄成嵌入式合规工具，而不是直接卖软件。
- assumption: 首批 2-3 个 PMS 与自助机/到店前入住集成，足以覆盖滩头市场并支撑可复制部署。
  basis: research.yaml
  validationTest: 梳理 3 个启动地区的主流技术栈，并确认首批集成组合能覆盖至少 60% 的合格管线。
  decisionImpact: 如果不成立，就要收窄区域、提高服务定价，或把规模化 GTM 往后推，先把集成范围缩清楚。
- assumption: 对买方来说，能识别策略的留存控制与删除证据，比现有厂商泛泛而谈的安全存储更重要。
  basis: idea.yaml
  validationTest: 在试点销售里，拿“原始文件留存明显下降、审计响应更快”赢单，而不是靠堆功能，并记录买方对这些标准的排序。
  decisionImpact: 如果不成立，这个切口就会塌缩成更大住客旅程套件里的一个功能需求，公司需要重想独立定位。
- assumption: 生物识别或护照复印例外场景下的人工兜底，能让产品先合法可用，并随着时间推移守住目标毛利率。
  basis: research.yaml
  validationTest: 跟踪前几次生产环境部署中的例外比例，并在第 3 个客户落地时，把目标区域内人工复核占比压到已验证入住的 25% 以下。
  decisionImpact: 如果不成立，公司就得收窄地理范围、在部分市场放弃生物识别流程，或接受更低毛利、更多服务化的收入结构。
- assumption: 一旦酒店集团切口被证明，周边住宿与旅行流程会给出可信的扩张路径。
  basis: operator judgment
  validationTest: 到第 15 个月前，至少验证 3 个来自服务式公寓、租赁或旅行运营软件的相邻共创客户机会，确认它们有类似的数据最小化痛点。
  decisionImpact: 如果不成立，公司就会停留在狭窄的酒店合规产品形态，难以支撑风险投资级回报。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 买方触发点验证
  hypothesis: 审计、泄露惊魂和供应商续约这些时点，足以推动已经使用数字化到店的酒店集团购买付费试点。
  successMetric: 至少拿到 10 场合格买方会议和 2 个来自 20-100 家门店集团的付费试点承诺
  owner: 创始人/CEO
- horizon: 0-90 天
  experiment: 集成栈摸排
  hypothesis: 首批少量 PMS 与自助机/到店前适配器，就能覆盖大多数高意向滩头需求。
  successMetric: 形成一张集成地图，证明前 2-3 套目标栈覆盖至少 60% 的合格管线
  owner: 创始工程师
- horizon: 90-180 天
  experiment: 策略模板上线
  hypothesis: 按司法辖区设计的留存模板，能把必需字段和原始影像存储拆开，又不会带来法务或运营混乱。
  successMetric: 在首批启动地区做出可运行的策略包，经共创客户认可，并用于一次试点上线
  owner: 合规产品负责人
- horizon: 90-180 天
  experiment: 删除证明试点
  hypothesis: 身份金库能在不拉低客户基线入住完成率的前提下，把不必要的原始影像留存至少压低 50%。
  successMetric: 跑出 1 个真实试点，实测留存降幅超过 50%，且完成率没有明显下滑
  owner: 创始工程师
- horizon: 6-12 个月
  experiment: 试点转生产环境
  hypothesis: 一旦删除证据被证明，安全和运营买方会把窄试点扩成酒店集团年度合同。
  successMetric: 至少有 1 个付费试点在结果复盘后的 60 天内转成 12 个月生产环境协议
  owner: 创始人/CEO
- horizon: 12-18 个月
  experiment: 渠道适配测试
  hypothesis: PMS、自助机或酒店 IT 伙伴能带来管线、降低部署摩擦，同时不会把公司压成一个转售功能。
  successMetric: 2 个活跃伙伴带来至少 25% 的合格管线，同时公司仍直接掌握控制层产品所有权
  owner: 合作负责人
operations:
- 按司法辖区、门店类型和身份流程维护一套受控策略库，每次规则变更都做明确审查。
- 运行可导出的访问、删除和驻留审计日志，方便客户做供应商评审和事件响应。
- 建立一套 PMS、自助机和到店前集成实施手册，把门店端面向住客的流程改动压到最低。
- 在策略覆盖和自动化被证明前，保留一条人工例外队列，处理生物识别、护照复印和门店级边缘情况。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 亲自抓创始人主导销售、共创客户筛选和买方叙事，因为前几单都由触发事件驱动，信任门槛也高。
- role: 创始工程师
  startTiming: Month 0
  rationale: 搭出身份金库、签名证明回写流程，以及支撑轻量切口所需的首批 PMS/自助机集成。
- role: 合规产品负责人
  startTiming: Month 1
  rationale: 把酒店与隐私规则翻成按地区生效的策略模板、兜底逻辑和实施指引。
- role: 解决方案工程师
  startTiming: Month 4
  rationale: 把集成阻力压下去，避免创始人长期沦为职业化实施团队。
- role: 合作负责人
  startTiming: Month 10
  rationale: 只有在首个试点转生产环境动作可复制后，才系统引入 PMS、自助机和顾问渠道。
milestones:
- horizon: 0-12 个月
  items:
  - 拿下 2 个 20-100 家门店酒店集团付费共创客户。
  - 在有限的 PMS 与数字化到店栈上跑出首个生产环境部署。
  - 证明不必要的原始身份材料留存能下降 50%+，且入住完成率没有明显下滑。
  - 至少把 1 个试点转成 12 个月年度合同。
- horizon: 12-24 个月
  items:
  - 达到 4-6 个酒店集团客户，并把首批集成适配器标准化。
  - 交付首批启动地区的策略模板和删除证据工作流。
  - 建立 2 个能降低获客或部署成本的渠道/实施伙伴。
  - 证明现有客户内部来自更多门店、品牌或合规模块的扩张收入。
- horizon: 24-36 个月
  items:
  - 在初始切口里达到研究所测算的大约 120 家服务门店。
  - 在不打断核心酒店部署打法的前提下，扩到至少 1 个相邻住宿工作流。
  - 证明真正驱动留存和增购的是审计证据与策略治理，而不是一次性集成项目。
risks:
- risk: 酒店集团可能把痛点当成供应商功能需求，等现有入住供应商自己把控制补够。
  likelihood: Medium
  impact: High
  mitigation: 抓硬触发时点去卖，证明一线前端供应商给不了的跨供应商治理能力，并且只有在直接痛点被验证后才引入渠道合作。
- risk: 按司法辖区划分的护照与生物识别规则，可能让“零拷贝”这句话背后藏着太多例外路径。
  likelihood: High
  impact: High
  mitigation: 一开始就主打能识别策略的最小化，而不是“全部删除”，并同步上线人工兜底和按地区设计的模板。
- risk: PMS 和自助机集成拖慢推进，可能让每次部署都变成重服务项目。
  likelihood: High
  impact: High
  mitigation: 先把滩头市场收窄到最常见的几套栈，提前配解决方案工程，并拒绝首批适配路线图之外的定制流程。
- risk: 如果相邻扩张迟迟起不来，初始切口可能小到撑不起风险投资回报。
  likelihood: Medium
  impact: High
  mitigation: 尽早跟踪相邻住宿品类的扩张信号，并明确告诉团队：酒店切口只是证明点，不是公司全部。
- risk: 一旦创业公司自己的系统未来出现泄露或删除失败，整套“可信控制层”定位会被直接打穿。
  likelihood: Medium
  impact: High
  mitigation: 在规模化销售前就先把安全运营、严密访问控制、可审计删除流程和清晰事件响应机制补齐。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要撑出 18 个月跑道，用于创始工程、合规和解决方案团队，首批 PMS 与自助机集成，启动地区的策略模板覆盖，以及验证付费试点能转成可复制的酒店集团年度合同。
