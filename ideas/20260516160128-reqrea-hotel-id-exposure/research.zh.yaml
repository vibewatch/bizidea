    sourceRefs:
    - 10
    - 11
  - point: 酒店持续的人手短缺，逼着运营方继续自动化到店与登记任务。
    sourceRefs:
    - 12
    - 15
  - point: 云 PMS 与 API-first 基础设施，让专门的控制层更容易插进现有工作流。
    sourceRefs:
    - 18
    - 24
  headwinds:
  - point: 自拍生物识别匹配的合规门槛，比单纯收证件要高得多。
    sourceRefs:
