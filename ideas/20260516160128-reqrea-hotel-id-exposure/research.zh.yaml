reportMemo:
  executiveTakeaways:
  - Reqrea/Tabiq 泄露事件说明，外包酒店入住供应商会在不知不觉中积累跨越数年的护照、驾照和自拍档案，把本该普通的到店流程变成高风险数据暴露面。
  - 酒店大概率不会把数字化到店收回去：70% 的旅客表示愿意跳过前台，Mews 还称，美国已有 30% 的预订在支持该功能的场景下使用自助机入住。
  - 市场缺的不是基础身份验证，而是“安全最小化”这一层：核验一次，只把必需字段和证明送进酒店系统，之后还能拿出删除与访问控制证据。
  - 最值得先打的客户，是那些已经使用数字化入住、自助机或到店前登记、同时又承受人手和审计压力的多门店酒店集团；他们需要的是更安全的控制层，而不是把整个流程推倒重来。
  marketDefinition: 一层酒店身份控制能力：在到店前入住或自助机入住环节完成证件与自拍核验，然后只把策略允许的住客字段和验证状态写进 PMS 或入住系统，同时尽量压缩原始证件留存。
  customerAndBuyer: 核心使用者是使用外包在线入住或自助机入住的 20-200 家门店酒店集团里的数字化运营、IT、隐私和前厅负责人。买方通常是掌管到店工具和供应商风险的 CIO、首席数字官或酒店运营 VP。
  buyingTriggers:
  - point: 一旦遇到安全审查、泄露惊魂或供应商续约，酒店集团就必须解释清楚护照扫描件和自拍到底存在哪、留多久。
    sourceRefs:
    - 1
    - 4
    - 5
  - point: 前台长期人手紧，让酒店即便被合规团队追着问原始证件存储，也不愿放弃自助到店。
    sourceRefs:
    - 12
    - 15
  - point: 旅客就是想跳过前台，因此运营方需要的是更安全的数字化到店模型，而不是重新回到人工复印证件。
    sourceRefs:
    - 10
    - 11
    - 13
  willingnessToPay:
    summary: 酒店本来就在为到店自动化付费，因为人力和收入效果都能量化：Mews 宣传 7 个月回本、双位数工时节省，以及自助入住带来的 upsell 转化提升。也就是说，即便公开标价不多，一层身份最小化控制也可以挂靠现有数字化入住与合规预算。
    sourceRefs:
    - 11
    - 12
    - 14
    - 15
  competitiveLandscape: 竞争并不轻，但大多和切口并不完全对齐。Canary 和 Mews 优先优化的是住客旅程与 PMS 效率；Chekin 优化的是合规登记与身份匹配；Agilysys 优化的是一体化自助机硬件和 PMS 工作流；Oracle 则掌握记录系统。已抓取的现有厂商里，没有谁公开把零拷贝证明、跨供应商留存治理或独立删除证据当成主叙事；它们卖的是安全存储、运营提效，或者更广的住客体验套件。
  incumbentThesis:
  - incumbentClass: 云 PMS 平台
    point: Oracle 这类 PMS 供应商已经占住了住客档案和核心工作流，但它们的激励是把更多数据吸进 PMS，而不是把原始证件压缩成纯证明。
    sourceRefs:
    - 17
    - 18
  - incumbentClass: 住客旅程套件
    point: Canary 赢在移动入住、消息和安全交易，但它公开讲述的仍是安全托管流程，而不是独立于供应商之外的数据最小化。
    sourceRefs:
    - 19
    - 20
  - incumbentClass: 本地合规/入住工具
    point: Chekin 在住客报送、生物识别和智能门锁联动上很强，但它公开的合规模型依旧默认要存住客数据、跑各国上报链路。
    sourceRefs:
    - 21
    - 22
  - incumbentClass: 自助机与硬件型到店方案
    point: Agilysys 解决的是到店终端本身，靠原生 PMS 与发卡/发腕带集成做强闭环，但这更像工作流终点，而不是能横跨多家供应商的中立控制层。
    sourceRefs:
    - 23
  regulatoryLandscape: GDPR 让这个切口变得可讲：酒店及其处理方只能采集必要数据、留存时间不能超过必要范围，并且必须做到默认隐私和设计即隐私。一旦自拍匹配被用来唯一识别住客，生物识别处理就会变成特殊类别数据，条件也更严格。日本又加了一层酒店行业特有的复杂度：没有日本住址的外籍住客必须出示护照，政府还要求复印，所以产品不能讲成“全部删除”，而要讲“按策略留存”。西班牙则给出相反方向的压力：Garrigues 总结的 AEPD 观点认为，为满足旅客登记而保留整份证件复印件，违反了最小化原则，因为副本包含的数据超出了法律所需。
  technologyLandscape: 从技术上看，这个生态是能做通的。酒店越来越多地使用云 PMS 与自助机/移动到店工具，Oracle 和 Apaleo 也都暴露了住客档案、预订和事件接口，足以接收结构化验证结果。真正难的不是 OCR 或自拍核验能不能做，而是验证完成后原始影像会不会继续困在供应商存储里，以及酒店能不能横跨 PMS、入住、自助机和支付链路，证明删除动作符合策略。
  distributionChannels:
  - point: 在审计、泄露惊魂或供应商续约周期内，直接卖给酒店集团 CIO、数字化运营和安全负责人。
    sourceRefs:
    - 1
    - 15
  - point: PMS 与集成市场是可行渠道，因为 Oracle 和 Apaleo 已经开放了接收验证属性和触发下游流程所需的 API。
    sourceRefs:
    - 18
    - 24
  - point: 和自助机、移动入住、住客互动供应商合作，可以把身份金库放成更安全的一层，而不用替换前端到店体验。
    sourceRefs:
    - 13
    - 19
    - 23
  partnershipEcosystem:
  - point: PMS 伙伴最关键，因为住客档案、预订状态和报表都在那里；身份金库最终都得把结果回写进这些系统。
    sourceRefs:
    - 18
    - 24
  - point: 自助机和客房访问伙伴也重要，因为很多酒店把证件验证和支付授权、发卡、现场自助到店绑在一起。
    sourceRefs:
    - 13
    - 23
  - point: 在各国旅客登记规则差异很大的市场，本地法律/合规专家会是有价值的渠道伙伴。
    sourceRefs:
    - 3
    - 9
    - 22
  dataMoats:
  - point: 按国家沉淀的策略模板，如果能把必需的结构化字段和不必要的原始影像留存拆开，就会变成很难复制的运营经验。
    sourceRefs:
    - 3
    - 4
    - 5
    - 9
  - point: 能证明访问控制、数据驻留和删除动作的跨供应商审计日志，比单点验证分数更难拼出来。
    sourceRefs:
    - 4
    - 5
    - 22
  - point: 围绕不同 PMS、自助机和酒店集团积累“最小字段集”数据，又不伤入住完成率，会慢慢堆出真正的工作流护城河。
    sourceRefs:
    - 11
    - 18
    - 24
  geographicConsiderations:
  - point: 日本要求没有日本住址的外籍住客出示护照并按政府要求复印，因此产品在当地必须支持可配置的留存逻辑。
    sourceRefs:
    - 3
    - 8
  - point: EU/UK 式的生物识别规则会把自拍匹配的合规负担抬高，尤其在明确同意或其他特殊类别处理条件站不稳时。
    sourceRefs:
    - 6
    - 7
  - point: 西班牙体现的是另一种压力：酒店也许需要旅客登记数据，但保留整份护照复印件仍可能违反最小化原则。
    sourceRefs:
    - 9
    - 22
  sensitivityCases:
  - case: 现有厂商补上加密存储和更短留存计时器
    impact: 这会压缩一个泛安全故事的空间，但不会消掉对独立、跨供应商证明与删除治理层的需求。
    sourceRefs:
    - 19
    - 21
    - 23
  - case: 监管继续要求某些住客类别或司法辖区保留副本或额外字段
    impact: 产品必须支持基于规则的留存与字段提取，而不是承诺“永不存储”。
    sourceRefs:
    - 3
    - 8
    - 9
  - case: 云 PMS 供应商把开放的住客 API 与事件钩子扩得比预期更快
    impact: 分销会更顺、实施也更容易，但 PMS 供应商自己打包相邻控制能力的路径也会更清晰。
    sourceRefs:
    - 18
    - 24
    - 29
  validationPlan:
  - priority: 高
    question: 酒店集团会不会在不替换现有入住流程的前提下，为一层最小化控制付费？
    evidenceToGather: 与即将迎来安全审查或供应商续约的 20-100 家门店集团做共创客户访谈。
  - priority: 高
    question: 哪些司法辖区真的要求保留原始影像，哪些其实只要求人工查看或结构化字段采集？
    evidenceToGather: 为日本、西班牙、法国、德国和两个隐私监管较强的美国州获取外部律师备忘录。
  - priority: 中
    question: 哪几种 PMS、自助机和门锁组合主导 20-200 家门店这个细分？
    evidenceToGather: 梳理 3 个目标地区里最常见的集成栈，并为每套栈测试 1 个适配器。
