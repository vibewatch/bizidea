      sourceRefs:
      - 19
      - 21
      - 23
      - 29
  pestle:
  - factor: 政治
    impact: neutral
    point: 酒店住客登记义务仍按国家分化，因此产品必须沉淀本地化策略模板，不能指望一套全球默认值。
    sourceRefs:
    - 3
    - 9
  - factor: 经济
    impact: positive
    point: 酒店依旧顶着人手压力，所以即便风险团队想要更严控制，自助到店在经济上仍然有吸引力。
    sourceRefs:
    - 12
    - 15
  - factor: 社会
    impact: positive
    point: 旅客偏好正在转向跳过前台、使用自助工具，因此市场需要的是更安全的数字化入住，而不是回到人工纸质流程。
    sourceRefs:
    - 10
    - 11
  - factor: 技术
    impact: positive
    point: 云 PMS 与 API-first 技术栈，让“把验证动作和长期原始影像存储拆开”在工程上变得可行。
    sourceRefs:
    - 18
    - 24
  - factor: 法律
    impact: negative
    point: 生物识别处理和护照数据处理，会触发更严格的合法性、最小化和留存要求。
    sourceRefs:
    - 4
    - 5
    - 6
    - 7
  - factor: 环境
    impact: neutral
    point: 数字化到店减少了纸张处理，但真正有商业驱动力的还是安全与人效，而不是可持续叙事本身。
    sourceRefs:
    - 11
    - 12
  adoptionFrictionMatrix:
  - friction: PMS 与自助机集成复杂
    severity: 高
    affectedBuyer: 数字化运营负责人
    mitigation: 先做一个适配层，只把验证字段回写进少量高份额的 PMS 和自助机栈。
    sourceRefs:
    - 18
    - 24
  - friction: 自拍生物识别的合法使用
    severity: 高
    affectedBuyer: 隐私与合规负责人
    mitigation: 按司法辖区和门店策略提供可配置同意、人工兜底和“仅证件”模式。
    sourceRefs:
    - 6
    - 7
  - friction: 各司法辖区的护照与旅客登记规则差异
    severity: 高
    affectedBuyer: 酒店法务或安全发起人
    mitigation: 做策略模板，把法定必填字段和可选的原始影像采集拆开，并执行删除计时器。
    sourceRefs:
    - 3
    - 8
    - 9
  - friction: 前台和门店层面的变更管理
    severity: 中
    affectedBuyer: 运营 VP
    mitigation: 先覆盖在现有入住流程之上，让员工面对住客的流程保持不变，身份金库只在后台接管存储策略。
    sourceRefs:
    - 11
    - 12
    - 23
