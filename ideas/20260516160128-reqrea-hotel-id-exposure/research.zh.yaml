    - 23
competitors:
- name: Canary Technologies
  stage: 成长阶段
  wedge: 酒店原生的住客互动与移动入住套件，带安全交易和反欺诈工具。
  pricing: 定制企业定价；未公开。
  strength: 酒店品牌渗透强、无接触入住定位清晰、住客旅程产品面宽。
  weaknessVsUs: 它公开卖的是供应商托管的安全工作流，而不是独立的零拷贝证明与删除治理层。
  sourceRefs:
  - 19
  - 20
- name: Mews
  stage: 成长阶段
  wedge: 云 PMS，加上自助机和住客门户，把自助到店放进更大的酒店操作系统里。
  pricing: 分层套餐 + 报价制；公开宣称回本周期，但不公开列表价。
  strength: 现代酒店安装基数大、旅客需求证据强，而且自助入住的人效和 upsell 价值可量化。
  weaknessVsUs: 身份采集只是 PMS 栈里的一个功能，不是围绕最小化与留存治理打造的中立控制层。
  sourceRefs:
  - 11
  - 13
  - 14
  - 29
- name: Chekin
  stage: 成长阶段
  wedge: 面向酒店场景的住客登记、生物识别、法律报送和智能门锁联动自助入住。
  pricing: 定制 / 未公开。
  strength: 监管工作流契合度高，具备生物识别匹配能力和按国家自动报送能力。
  weaknessVsUs: 公开产品仍默认要为合规流程保存并流转住客数据，而不是跨供应商压缩原始影像留存。
  sourceRefs:
  - 21
  - 22
- name: Agilysys Express Kiosk
  stage: 现有厂商
  wedge: 一体化酒店自助机，原生接入 PMS，支持证件验证、支付、发卡/发腕带和视频协助。
  pricing: 定制企业定价；未公开。
  strength: PMS 集成很深，特别适合度假村或依赖硬件自助到店的门店。
  weaknessVsUs: 它和硬件、PMS 绑得很深，解决不了已经使用多套到店工具的集团在跨供应商证件治理上的问题。
  sourceRefs:
  - 23
regulatoryTechnicalConstraints:
- point: GDPR 要求个人数据处理遵循最小化、存储限制和可问责原则。
  sourceRefs:
  - 4
- point: 默认隐私/设计即隐私意味着酒店及处理方应只采每个用途真正必要的数据，并默认限制存储与可访问性。
  sourceRefs:
  - 5
- point: 如果生物识别数据被用来唯一识别住客，它就属于特殊类别数据，既要合法依据，也要满足有效的特殊类别处理条件。
  sourceRefs:
  - 6
  - 7
- point: 日本要求没有本地住址的外籍住客出示护照并复印，因此任何最小化产品都必须支持按规则处理例外。
  sourceRefs:
  - 3
  - 8
- point: 酒店集成必须能把结果回写进 PMS、支付和自助机工作流，而且不能拖慢到店速度或影响发卡。
  sourceRefs:
  - 18
  - 23
  - 24
validationSignals:
- point: 真实泄露已经证明，酒店入住供应商会暴露出海量身份证件和自拍档案。
  sourceRefs:
  - 1
- point: 旅客正在主动要求自助到店而不是前台排队，因此“更安全的数字化入住”是一个现实需求。
  sourceRefs:
  - 10
  - 11
- point: 酒店运营端，尤其前台，依旧被人手问题压着走，因此保留自动化的控制方案更容易被 justify。
  sourceRefs:
  - 12
  - 15
- point: 现有供应商已经在线采集护照影像、自拍、法定表单和支付信息，这说明流程本身已经成熟且有预算。
  sourceRefs:
  - 19
  - 21
  - 22
openQuestions:
- 到底是哪些酒店品牌和物业集团在使用 Tabiq？在 20-200 家门店运营商中，供应商风险集中度有多高？
- 在实际操作里，滩头市场里的哪些司法辖区真的要求保留护照复印件，哪些只需要人工核验或结构化字段采集？
- 这家创业公司最先该服务的中端城市酒店细分里，哪几套 PMS + 自助机 + 门锁栈占主流？
- 买方最终会偏好卖给酒店集团的独立身份金库，还是卖给现有入住供应商的白标控制层？
