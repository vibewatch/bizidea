scenarios:
  downside:
    description: 销售周期拉长，部分认可机构将 AI 限制在需大量准备工作的流程中，实施复用比计划晚到。
    y3RevenueK: 2130.0
    y3EbitdaK: -620.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
    - 第三年第四季度期末客户数约 9 个而非 12 个。
    - 退出时已实现 ARPU 稳定在约 28.5 万美元 ARR 而非约 31.2 万美元。
    - 第三年毛利率停滞在约 64%，因为入门仍服务密集。
  base:
    description: 两至三个付费试点按计划转化，正式 ACV 接近既定区间中位数，模板稳步提升部署复用率。
    y3RevenueK: 2938.5
    y3EbitdaK: -183.3
    cashLowPointK: 388.1
    keyAssumptionChanges:
    - 第 12 个月末 3 个付费账户，第二年第四季度末 7 个，第三年第四季度末 12 个。
    - 随监控和第二计划用量附加，退出时每有效账户已实现 ARPU 约 31.2 万美元 ARR。
    - 随连接器和条款模板可复用，第三年第四季度毛利率达到 70%。
  upside:
    description: 认可接受来得早，现有认证机构内部扩张更快，部署模板比计划提前标准化。
    y3RevenueK: 3640.0
    y3EbitdaK: 290.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - 第三年第四季度期末客户数约 14 个而非 12 个。
    - 随第二计划和监控扩张更早落地，退出时已实现 ARPU 约 33 万美元 ARR。
    - 定制实施工作下降快于计划，第三年毛利率约 72%。
sensitivity:
- variable: ARPU
  downsideCase: 正式定价和扩张比计划低约 10%。
  baseCase: 退出时混合 ARPU 约 31.2 万美元 ARR。
  upsideCase: 监控和第二计划扩张将退出 ARPU 拉高约 6%。
  y3RevenueImpactK: -294.0
  cashImpactK: -220.0
- variable: CAC
  downsideCase: 创始人和合作伙伴获客转化更慢，CAC 升至约 16 万美元。
  baseCase: 在窄幅认证机构切口上，CAC 稳定在约 13.3 万美元。
  upsideCase: 随转介绍和共创客户推荐复利积累，CAC 降至约 11.5 万美元。
  y3RevenueImpactK: -90.0
  cashImpactK: -180.0
- variable: 流失率
  downsideCase: 试点未能转化为黏性工作流，月流失率升至约 3.0%。
  baseCase: 账户进入正式阶段后，月流失率维持约 2.0%。
  upsideCase: 工作台嵌入认可审核运营后，月流失率维持约 1.5%。
  y3RevenueImpactK: -170.0
  cashImpactK: -130.0
- variable: 销售周期
  downsideCase: 预算审批和试点转正式合同拉长至约 180 天。
  baseCase: 付费试点按 90-120 天部署切口隐含的时机完成并转化。
  upsideCase: 认可舒适度和可参考性将全程周期压缩至约 120 天。
  y3RevenueImpactK: -360.0
  cashImpactK: -250.0
- variable: 毛利率
  downsideCase: 连接器保持定制化，毛利率上限约 64%。
  baseCase: 第三年平均毛利率约 68.7%，第三年第四季度退出时达 70.0%。
  upsideCase: 随入门模板化程度提高，毛利率约 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -190.0
- variable: 招聘节奏
  downsideCase: 两个增长岗在可重复性得到验证前提前启用。
  baseCase: 招聘遵循商业计划书中标准优先、实施优先的顺序。
  upsideCase: 第二个销售岗或第三个工程师可推迟一至两个季度，不影响部署进度。
  y3RevenueImpactK: 60.0
  cashImpactK: -210.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Pipeline[创始人主导 + 合作伙伴获客通道] --> PaidPilots[付费试点]
      PaidPilots --> ProductionPrograms[正式项目]
      ProductionPrograms --> Expansion[监控 + 第二计划扩张]
      Expansion --> Revenue[营收]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金与跑道]
modelSanity:
- checkName: 营收引擎
  finding: 基准营收由有效付费工作流从第一年末的 3 个增长至第三年第四季度的 12 个驱动，退出时每账户 ARR 随正式转化和扩张用量提升至约 31.2 万美元。
- checkName: 必须做对的事
  finding: 连接器和条款模板复用必须充分压缩部署工作量，使两位实施人员能在第二年第四季度支持 7 个有效账户，同时毛利率仍能爬坡至 70%。
- checkName: 模型失效条件
  finding: 若认可利益相关者将产品限制于仅准备工作流，或销售周期漂移至约 180 天，悲观情形中在季度 EBITDA 转正前现金低点将跌至约 14 万美元。
- checkName: 下轮融资证明
  finding: 下轮融资故事是第二年第四季度 5-8 个类正式账户、第三年第二季度约 9 个有效付费账户，季度消耗降至每月 3 万美元以下，第三年第四季度 EBITDA 转正。
sanityChecks:
  ruleOf40: 第三年增速 110.6% + EBITDA 利润率 -6.2% = 104.4%
  burnMultiple: 第二年消耗倍数约 0.7x，即约 70 万美元 EBITDA 消耗对应约 100 万美元净新增 ARR；第三年第四季度季度 EBITDA 转正。
  revenuePerFte: 第三年末 11 人团队，人均营收 26.7 万美元（SaaS 基准 20–40 万美元）
  flags:
  - 模型早期的 customersEop 包含付费试点，因此完全部署的正式客户数量在第二年中期前落后于标题账户数。
  - 模型假设一位专职认证标准负责人可支持首次邻近标准扩张；若计划差异比预期更大，需提前启用该岗位。
  - 认可接受度在决策包内是最大的非市场风险；若 AI 仅限于准备工作，ACV 和毛利率将大幅压缩。
  - 现金按 EBITDA 建模，因此忽略递延收入时差、实施预付款以及企业安全或审计日志所需的任何资本支出。
