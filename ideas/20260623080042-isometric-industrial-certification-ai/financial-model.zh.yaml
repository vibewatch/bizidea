slug: industrial-certifier-workbench
date: "2026-06-23"
currency: USD
modelStartMonth: "2026-07"
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-23] 运营模型从商业计划书日期后的第一个完整月份开始。'
- id: A2
  name: 期初现金/天使前轮融资
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP runwayMonths 18 + 模型现金低谷] 基准情形使用融资区间低端，因为六位数试点可抵消消耗，且第三年第四季度 EBITDA 转正。'
- id: A3
  name: 期初有效付费账户数
  value: '0'
  unit: 个
  source: '[BP milestones 0-12 months + BP experimentRoadmap] 公司从未产生收入阶段起步，必须先完成共创客户签约才有正式合同。'
- id: A4
  name: 有效付费账户定义
  value: 与一家认证机构签约的一个付费试点、正式项目或扩展工作流。
  unit: 定义
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] 模型计算收入实际定价所依据的付费工作流单元，而非仅统计法律实体客户数。'
- id: A5
  name: 付费试点经济模型
  value: $110K over about 4 months (~$27.5K per month)
  unit: USD/账户
  source: '[BP investorMemo.firstCustomer.initialContract $100k-$150k + BP gtm.wedge 90-120 day deployment] 基准情形使用保守的低中位付费试点值，覆盖一个计划家族和 1-2 个在线项目。'
- id: A6
  name: 正式账户每账户收入爬坡
  value: Q1Y2 ~$225K ARR, Q4Y2 ~$276K ARR, Q4Y3 ~$312K ARR
  unit: USD/账户/年
  source: '[BP investorMemo.firstCustomer.initialContract $250k-$350k annual subscription + optional usage + Research market.som $300k ACV] 模型略低于中位起步，随监控和第二计划追加销售出现后略高于中位退出。'
- id: A7
  name: 客户爬坡
  value: 3 paying accounts by M12, 7 by Q4Y2, 12 by Q4Y3
  unit: 期末客户数
  source: '[BP milestones + Research market.som 12 logos at ~$300k ACV] 基准增长为第一年 2-3 个付费试点，第二年末 5-8 个类正式账户，以及研究支持的第三年规模目标。'
- id: A8
  name: 收入确认惯例
  value: 期末有效付费账户数乘以该期间每账户混合已实现月收入。
  unit: 公式
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] 此方式使收入可直接追溯至账户数量和产品包装假设。'
- id: A9
  name: 毛利率爬坡
  value: 45%-52% in Y1, 60%-66% in Y2, 67%-70% in Y3
  unit: 毛利率百分比
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions reusable connectors below 10 weeks + Research sensitivityCases services-heavy risk] 仅当模板和连接器复用降低实施拖累时，利润率才会改善。'
- id: A10
  name: 招聘时间线
  value: M1 founder CEO and founding engineer; M4 certification standards lead; M7 product engineer; M10 solutions lead; M13 first sales/partnerships hire; M16 implementation hire; M19 second engineer; M22 ops; M28 second sales hire; M31 third engineer.
  unit: 时间线
  source: '[BP team + BP strategicChoices.sequencingRationale] 标准和实施人才先于规模化商业团队加入，因为信任和入门速度是早期瓶颈。'
- id: A11
  name: 创始人含税薪酬
  value: $150K
  unit: USD/年
  source: '[BP team Founder CEO + startup-finance heuristic] 精简创始人薪资，含工资税和福利。'
- id: A12
  name: 工程师含税薪酬
  value: $190K
  unit: USD/年
  source: '[BP team Founding eng and Product engineer + startup-finance heuristic] 反映高级工作流和集成工程人才，不假设上市公司现金薪酬包。'
- id: A13
  name: 认证标准岗含税薪酬
  value: $170K
  unit: USD/年
  source: '[BP team Certification standards lead + startup-finance heuristic] 领域和认可专业知识即使在精简的天使前团队中也享有溢价。'
- id: A14
  name: 解决方案/实施岗含税薪酬
  value: $155K
  unit: USD/年
  source: '[BP team Solutions / implementation lead + startup-finance heuristic] 涵盖细分企业工作流中的实施所有权和客户数据映射工作。'
- id: A15
  name: 销售/合作伙伴岗含税薪酬
  value: $175K
  unit: USD/年
  source: '[BP gtm.channels + BP firstCustomer buyer + startup-finance heuristic] 含创始人辅助企业销售的差旅和浮动薪酬。'
- id: A16
  name: 管理/运营岗含税薪酬
  value: $120K
  unit: USD/年
  source: '[BP operations + startup-finance heuristic] 涵盖精简的财务、供应商管理和合规行政工作。'
- id: A17
  name: 薪资 P&L 分配
  value: Founder 70% S&M and 30% G&A; standards 80% R&D and 20% G&A; solutions 40% S&M and 60% R&D; engineering 100% R&D; sales 100% S&M; ops 100% G&A.
  unit: 分配比例
  source: '[BP team role rationales + BP operations] 职能映射反映各角色在轻服务企业软件启动中的时间分配。'
- id: A18
  name: 非薪资运营支出爬坡
  value: Monthly non-payroll spend rises from S&M/R&D/G&A of $4K/$6K/$5K in early Y1 to $15K/$18K/$11K by Q4Y3.
  unit: USD/月
  source: '[BP operations + startup-finance heuristic] 涵盖云服务、差旅、法律、保险、计划支持和基础办公软件，不假设大规模付费推广营销。'
- id: A19
  name: 现金转换惯例
  value: 现金变动等于 EBITDA。
  unit: 公式
  source: '[startup-finance heuristic] 天使前规模下，资本支出、税务、债务服务和营运资金时差假设为不重要因素。'
- id: A20
  name: 稳态月度账户流失率
  value: 2.0%
  unit: 每月百分比
  source: '[startup-finance heuristic for early enterprise workflow SaaS] 年度合同和认可密集型工作流支持低流失率，但模型相对成熟基础设施 SaaS 保持保守。'
- id: A21
  name: CAC 惯例
  value: Y2-Y3 sales and marketing spend divided by 9 net new active paying accounts.
  unit: 公式
  source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] 捕获扩张期创始人主导、合作伙伴主导和实施辅助企业获客的综合成本。'
- id: A22
  name: 下轮融资的里程碑
  value: About 9 active paying accounts by Q2Y3 with 7 already live by Q4Y2 and Q4Y3 quarterly EBITDA turning positive.
  unit: 里程碑
  source: '[BP milestones 12-24 and 24-36 months + model cash curve] 融资规模设计为达到可重复正式验证，并仍保留约六个月的缓冲。'
