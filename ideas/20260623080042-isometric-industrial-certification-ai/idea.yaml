jobsToBeDone:
  - job: >-
      When a certifier wins a new SAF or green-steel program, help the lead
      auditor review sensor, lab, and chain-of-custody evidence faster, so they
      can issue a trusted decision without growing headcount linearly.
    currentAlternative: Spreadsheet sampling plans, PDF evidence packs, and manual reviewer checklists
    successMetric: Time from evidence submission to signed certification decision
  - job: >-
      When an enterprise buyer asks for ongoing verification after initial
      approval, help the certification operations team monitor evidence drift
      continuously, so they can keep the program compliant between audit cycles.
    currentAlternative: Periodic manual re-checks and customer-specific email requests for updated proof
    successMetric: Number of certified programs monitored continuously without adding auditors
