topRisks:
  - name: Accreditation resistance
    description: Certifiers may fear that AI-assisted review could jeopardize accreditation or make audit decisions harder to defend.
    mitigation: Start with human-in-the-loop exception review, immutable evidence trails, and one design partner willing to map the workflow explicitly to existing accreditation controls.
  - name: Evidence integration drag
    description: Sensor feeds, lab systems, ERP exports, and supplier documents may be too fragmented to normalize quickly in the first deployments.
    mitigation: Launch in one vertical with a constrained evidence template set and charge implementation for a repeatable connector and ontology package.
  - name: Channel-conflict perception
    description: Incumbent certifiers may worry the startup eventually wants to replace them, slowing adoption even if the product works.
    mitigation: Position the product as white-label infrastructure, avoid issuing certifications directly, and prove ROI by helping launch customers win or retain programs against faster rivals.
