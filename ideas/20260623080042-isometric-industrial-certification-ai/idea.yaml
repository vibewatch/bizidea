  signalStrength:
    score: 5
    rationale: The cluster combines primary-source funding, named enterprise customers, concrete time savings, and a stated $350B expansion market.
  painIntensity:
    score: 4
    rationale: Specialty certifiers face real backlog and margin pressure, though urgency varies by standard and program volume.
  wedgeClarity:
    score: 5
    rationale: The beachhead, buyer, data inputs, first workflow, and deployment model are all narrow enough to sell and research directly.
  defensibility:
    score: 4
