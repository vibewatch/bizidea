openQuestions:
- Will accreditation bodies and scheme owners allow AI-generated exception narratives inside accredited decision packs, or only permit AI in preparatory evidence handling?
- 'Which first wedge has the lowest integration burden per dollar of urgency: SAF, green steel, or recycled-content certification?'
- How many target certifiers can actually support APIs or structured exports from LIMS, ERP, and chain-of-custody systems versus PDFs and email?
- Can a white-label vendor win trust faster than a certifier building internally once the first design-partner templates exist?
