  validationPlan:
  - priority: high
    question: Will accreditation bodies allow AI-generated exception narratives and evidence packs inside accredited review workflows, or only allow AI as a preparatory tool?
    evidenceToGather: Interviews with two accreditation bodies, three scheme owners, and two certifier quality managers reviewing sample workbench outputs.
  - priority: high
    question: 'Which first vertical produces the highest repeatability-to-integration ratio: SAF, green steel, or recycled content?'
    evidenceToGather: Pilot scoping workshops with one certifier in each vertical measuring connector count, evidence types, and review time saved.
  - priority: medium
    question: What ACV and implementation scope can a 50-300 auditor TIC firm approve without a buyer subsidy?
    evidenceToGather: Budget and procurement interviews with six target certifiers plus analysis of current spending on audit prep, data wrangling, and subcontracted verification.
  - priority: medium
    question: How often do end customers explicitly force continuous monitoring or faster turnaround into certifier contracts?
    evidenceToGather: RFPs, renewal language, and deal-review interviews from steel, SAF, and recycled-content programs.
