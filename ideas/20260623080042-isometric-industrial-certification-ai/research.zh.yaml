openQuestions:
- 认可机构和计划所有者是否允许 AI 生成的异常叙述出现在认可决策包内，还是只允许 AI 用于准备性证据处理？
- 哪个首发切口每单位紧迫性的集成负担最低：SAF、绿色钢铁还是再生材料内容认证？
- 有多少目标认证机构实际上能从 LIMS、ERP 和监管链系统提供 API 或结构化导出，而非依赖 PDF 和电子邮件？
- 一旦首批共创客户模板存在，白标供应商能否比内部自建的认证机构更快赢得信任？
