competitors:
- name: Isometric
  stage: scale-up
  wedge: 面向碳、燃料和材料声明的 AI 原生认证平台和注册表。
  pricing: Flat buyer fee based on order size; public methodology says pricing varies by pathway rather than certificate value.
  strength: 在全量证据审核、公开注册表设计和具名企业采纳上有强有力的验证点。
  weaknessVsUs: 作为认证机构/平台所有者而非向现有获认可机构出售的中立白标工作台运营。
  sourceRefs:
  - 1
  - 3
  - 4
  - 5
  - 6
- name: Bureau Veritas
  stage: incumbent
  wedge: 全球 TIC 和可持续性认证服务，包括 ResponsibleSteel 和供应链项目。
  pricing: Custom quote; no public list pricing on fetched pages.
  strength: 深厚公信力、全球客户准入以及跨工业供应链的顾问和核查广度。
  weaknessVsUs: 公开定位以服务主导和认证主导为主，而非专属白标证据操作层。
  sourceRefs:
  - 66
- name: DNV
  stage: incumbent
  wedge: 能源和工业保证，包括 ResponsibleSteel 服务和数字审计工具。
  pricing: Custom quote; no public list pricing on fetched pages.
  strength: 强大的工业领域信任和对数字化审计的明确投入。
  weaknessVsUs: 数字工具被定位为 DNV 主导审计的延伸，而非出售给同行认证机构的中立平台。
  sourceRefs:
  - 74
  - 75
- name: Intertek
  stage: incumbent
  wedge: 跨再生材料内容、生物燃料、ESG 保证和认证的全面质量保证。
  pricing: Custom quote; no public list pricing on fetched pages.
  strength: 在目标细分领域横跨实物检测、实验室支持和认证的广度。
  weaknessVsUs: 产品组合广度使其更难为一个证据密集切口提供专属认证运营产品。
  sourceRefs:
  - 81
  - 85
- name: SCS Global Services
  stage: specialist
  wedge: 跨 ISCC、CORSIA、CBAM 相关碳足迹、再生材料内容和 RSB 的多标准可持续性核查。
  pricing: Custom quote; no public list pricing on fetched pages.
  strength: 直接覆盖拟议滩头市场中的精确标准和声明。
  weaknessVsUs: 仍自己将认证和核查服务货币化，而非向其他认证机构销售渠道中立工作台。
  sourceRefs:
  - 94
  - 98
  - 99
  - 102
regulatoryTechnicalConstraints:
- point: 获认可的认证机构仍需证明能力、一致性和公正性；AI 可以辅助但不能取消这些义务。
  sourceRefs:
  - 22
  - 17
  - 20
- point: 质量守恒和簿记与索权声明需要明确的系统边界、归因规则、转换系数、透明度和防双重计算控制。
  sourceRefs:
  - 15
  - 16
  - 111
- point: CORSIA 合格燃料必须通过已批准的可持续性认证路径，认证机构需将其可追溯性和报告规则操作化。
  sourceRefs:
  - 24
  - 25
  - 30
  - 42
- point: 低碳钢铁和进口钢铁的产品碳声明越来越证据密集，这加重了数据规范化和第三方核查的负担。
  sourceRefs:
  - 53
  - 112
  - 102
