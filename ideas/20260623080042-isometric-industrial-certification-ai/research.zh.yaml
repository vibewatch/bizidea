  validationPlan:
  - priority: high
    question: 认可机构是否允许 AI 生成的异常叙述和证据包出现在认可审核工作流中，还是只允许 AI 作为准备工具？
    evidenceToGather: 与两个认可机构、三个计划所有者和两个认证机构质量经理访谈，审阅工作台输出样本。
  - priority: high
    question: 哪个首发细分领域产生最高的可重复性与集成比值：SAF、绿色钢铁还是再生材料内容？
    evidenceToGather: 与各细分领域各一家认证机构开展试点范围界定研讨，测量连接器数量、证据类型和节省的审核时间。
  - priority: medium
    question: 一家拥有 50-300 名审计员的 TIC 公司在没有买方补贴的情况下能批准什么 ACV 和实施范围？
    evidenceToGather: 与六家目标认证机构进行预算和采购访谈，加上对当前审计准备、数据整理和外包核查支出的分析。
  - priority: medium
    question: 终端客户多频繁明确地将持续监控或更快周转纳入认证机构合同？
    evidenceToGather: 来自钢铁、SAF 和再生材料内容项目的 RFP、续期语言和交易审查访谈。
