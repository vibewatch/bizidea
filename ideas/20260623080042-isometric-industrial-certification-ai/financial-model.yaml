scenarios:
  downside:
    description: Sales cycles stretch, some accreditors limit AI to prep-heavy workflows, and implementation reuse arrives later than planned.
    y3RevenueK: 2130.0
    y3EbitdaK: -620.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches about 9 instead of 12.
    - Exit realized ARPU settles near $285K ARR instead of about $312K.
    - Y3 gross margin stalls near 64% because onboarding remains services-heavy.
  base:
    description: Two to three paid pilots convert on schedule, production ACV lands near the middle of the stated range, and templates steadily improve deployment reuse.
    y3RevenueK: 2938.5
    y3EbitdaK: -183.3
    cashLowPointK: 388.1
    keyAssumptionChanges:
    - 3 paying accounts by M12, 7 by Q4Y2, and 12 by Q4Y3.
    - Exit realized ARPU reaches roughly $312K ARR per active account as monitoring and second-scheme usage attach.
    - Gross margin reaches 70% in Q4Y3 as connectors and clause templates become reusable.
  upside:
    description: Accreditation acceptance comes early, expansion inside existing certifiers lands faster, and deployment templates standardize ahead of plan.
    y3RevenueK: 3640.0
    y3EbitdaK: 290.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches about 14 instead of 12.
    - Exit realized ARPU reaches roughly $330K ARR as second-scheme and monitoring expansion lands sooner.
    - Y3 gross margin reaches about 72% as custom implementation work falls faster than planned.
sensitivity:
- variable: ARPU
  downsideCase: Production pricing and expansion land about 10% below plan.
  baseCase: Exit blended ARPU reaches about $312K ARR per active account.
  upsideCase: Monitoring and second-scheme expansion lift exit ARPU about 6% above plan.
  y3RevenueImpactK: -294.0
  cashImpactK: -220.0
- variable: CAC
  downsideCase: CAC rises toward $160K as founder and partner sourcing convert more slowly.
  baseCase: CAC stays near $133K on a narrow certifier wedge.
  upsideCase: CAC falls toward $115K as referrals and design-partner references compound.
  y3RevenueImpactK: -90.0
  cashImpactK: -180.0
- variable: churn
  downsideCase: Monthly churn rises toward 3.0% because pilots do not convert into sticky workflow footprints.
  baseCase: Monthly churn holds near 2.0% once accounts are in production.
  upsideCase: Monthly churn stays near 1.5% because the workbench becomes embedded in accredited review operations.
  y3RevenueImpactK: -170.0
  cashImpactK: -130.0
- variable: sales cycle
  downsideCase: Budget approval and pilot-to-production conversion stretch toward 180 days.
  baseCase: Paid pilots close and convert on roughly the timing implied by the 90-120 day deployment wedge.
  upsideCase: Accreditation comfort and referenceability compress the cycle toward 120 days end to end.
  y3RevenueImpactK: -360.0
  cashImpactK: -250.0
- variable: gross margin
  downsideCase: Gross margin tops out near 64% because connectors remain bespoke.
  baseCase: Y3 gross margin averages about 68.7% and exits at 70.0%.
  upsideCase: Gross margin reaches about 72% as onboarding becomes more templated.
  y3RevenueImpactK: 0.0
  cashImpactK: -190.0
- variable: hiring pace
  downsideCase: Two growth hires are pulled forward before repeatability is proven.
  baseCase: Hiring follows the standards-first, implementation-first sequencing in the business plan.
  upsideCase: The second sales hire or third engineer can wait one to two quarters without slowing deployments.
  y3RevenueImpactK: 60.0
  cashImpactK: -210.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Pipeline[Founder-led + partner pipeline] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionPrograms[Production programs]
      ProductionPrograms --> Expansion[Monitoring + second-scheme expansion]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue is driven by growing active paying workflows from 3 at Y1 exit to 12 by Q4Y3 while exit ARR per account rises toward roughly $312K through production conversion and expansion usage.
- checkName: Must go right
  finding: Connector and clause-template reuse must cut deployment work enough that two implementation hires can support 7 active accounts by Q4Y2 while gross margin still climbs toward 70%.
- checkName: Model breaks if
  finding: If accreditation stakeholders restrict the product to prep-only workflows or sales cycles drift toward 180 days, the downside case falls toward a roughly $140K cash floor before positive quarterly EBITDA appears.
- checkName: Next-round proof
  finding: The next financing story is 5-8 production-style accounts by Q4Y2 and about 9 active paying accounts by Q2Y3 with quarterly burn falling below $30K per month and Q4Y3 EBITDA turning positive.
sanityChecks:
  ruleOf40: Y3 growth 110.6% + EBITDA margin -6.2% = 104.4%
  burnMultiple: Y2 burn multiple is about 0.7x using roughly $0.7M of EBITDA burn against about $1.0M of net new ARR; Q4Y3 turns quarterly EBITDA positive.
  revenuePerFte: $267K Y3 on 11 ending FTE (benchmark $200-400K SaaS)
  flags:
  - customersEop includes paid pilots early in the model, so fully deployed production-logo count lags the headline account count until mid-Y2.
  - The model assumes one dedicated certification-standards leader can support the first adjacent-standard expansion; if scheme variation is worse than expected, that hire must be pulled forward.
  - Accreditation acceptance inside decision packs is the biggest non-market risk; if AI is limited to preparation only, both ACV and gross margin compress materially.
  - Cash is modeled as EBITDA and therefore ignores deferred revenue timing, implementation prepayments, and any capex needed for enterprise security or audit logging.
