slug: industrial-certifier-workbench
date: "2026-06-23"
currency: USD
modelStartMonth: "2026-07"
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-23] the operating model starts in the first full month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP runwayMonths 18 + model cash trough] the base case uses the low end of the stated range because six-figure pilots offset burn and Q4Y3 turns EBITDA positive.'
- id: A3
  name: Starting active paying accounts
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months + BP experimentRoadmap] the company begins pre-revenue and must first close design partners before production contracts exist.'
- id: A4
  name: Active paying account definition
  value: One paid pilot, production program, or expansion workflow under contract with a certifier.
  unit: definition
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] the model counts the paid workflow unit that revenue is actually priced against rather than legal entity logos alone.'
- id: A5
  name: Paid pilot economics
  value: $110K over about 4 months (~$27.5K per month)
  unit: USD/account
  source: '[BP investorMemo.firstCustomer.initialContract $100k-$150k + BP gtm.wedge 90-120 day deployment] the base case uses a conservative lower-midpoint paid pilot for one scheme family and 1-2 live programs.'
- id: A6
  name: Production revenue per active account ramp
  value: Q1Y2 ~$225K ARR, Q4Y2 ~$276K ARR, Q4Y3 ~$312K ARR
  unit: USD/account/year
  source: '[BP investorMemo.firstCustomer.initialContract $250k-$350k annual subscription + optional usage + Research market.som $300k ACV] the model starts slightly below midpoint and exits slightly above it as monitoring and second-scheme upsell appear.'
- id: A7
  name: Customer ramp
  value: 3 paying accounts by M12, 7 by Q4Y2, 12 by Q4Y3
  unit: customersEop
  source: '[BP milestones + Research market.som 12 logos at ~$300k ACV] base growth follows 2-3 paid pilots in year 1, 5-8 production-like accounts by year 2, and the researched year-three scale target.'
- id: A8
  name: Revenue recognition convention
  value: Period-end active paying accounts multiplied by blended realized monthly revenue per account for that period.
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] this keeps revenue directly traceable to account count and packaging assumptions.'
- id: A9
  name: Gross margin ramp
  value: 45%-52% in Y1, 60%-66% in Y2, 67%-70% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions reusable connectors below 10 weeks + Research sensitivityCases services-heavy risk] margin improves only as templates and connector reuse reduce implementation drag.'
- id: A10
  name: Hiring timeline
  value: M1 founder CEO and founding engineer; M4 certification standards lead; M7 product engineer; M10 solutions lead; M13 first sales/partnerships hire; M16 implementation hire; M19 second engineer; M22 ops; M28 second sales hire; M31 third engineer.
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale] standards and implementation talent are added before a scaled commercial team because trust and onboarding speed are the early bottlenecks.'
- id: A11
  name: Founder loaded compensation
  value: $150K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic] lean founder pay with payroll taxes and benefits.'
- id: A12
  name: Engineering loaded compensation
  value: $190K
  unit: USD/year
  source: '[BP team Founding eng and Product engineer + startup-finance heuristic] reflects senior workflow and integration engineering talent without assuming public-company cash packages.'
- id: A13
  name: Certification standards loaded compensation
  value: $170K
  unit: USD/year
  source: '[BP team Certification standards lead + startup-finance heuristic] domain and accreditation expertise command a premium even in a lean pre-seed team.'
- id: A14
  name: Solutions / implementation loaded compensation
  value: $155K
  unit: USD/year
  source: '[BP team Solutions / implementation lead + startup-finance heuristic] covers implementation ownership and customer data-mapping work in a niche enterprise workflow.'
- id: A15
  name: Sales / partnerships loaded compensation
  value: $175K
  unit: USD/year
  source: '[BP gtm.channels + BP firstCustomer buyer + startup-finance heuristic] includes travel and variable compensation for founder-assisted enterprise selling.'
- id: A16
  name: G&A loaded compensation
  value: $120K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] covers lean finance, vendor management, and compliance administration.'
- id: A17
  name: Payroll allocation to P&L lines
  value: Founder 70% S&M and 30% G&A; standards 80% R&D and 20% G&A; solutions 40% S&M and 60% R&D; engineering 100% R&D; sales 100% S&M; ops 100% G&A.
  unit: allocation
  source: '[BP team role rationales + BP operations] functional mapping reflects where each role spends time in a services-light enterprise software launch.'
- id: A18
  name: Non-payroll opex ramp
  value: Monthly non-payroll spend rises from S&M/R&D/G&A of $4K/$6K/$5K in early Y1 to $15K/$18K/$11K by Q4Y3.
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] covers cloud, travel, legal, insurance, scheme support, and basic office software without assuming broad paid-demand marketing.'
- id: A19
  name: Cash conversion convention
  value: Cash movement equals EBITDA.
  unit: formula
  source: '[startup-finance heuristic] capex, taxes, debt service, and working-capital timing are assumed immaterial at pre-seed scale.'
- id: A20
  name: Steady-state monthly account churn
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow SaaS] annual contracts and accreditation-heavy workflows support low churn, but the model stays conservative versus mature infrastructure SaaS.'
- id: A21
  name: CAC convention
  value: Y2-Y3 sales and marketing spend divided by 9 net new active paying accounts.
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] captures founder-led, partner-led, and implementation-assisted enterprise acquisition in the scale-up period.'
- id: A22
  name: Next-round milestone for funding sizing
  value: About 9 active paying accounts by Q2Y3 with 7 already live by Q4Y2 and Q4Y3 quarterly EBITDA turning positive.
  unit: milestone
  source: '[BP milestones 12-24 and 24-36 months + model cash curve] the raise is sized to reach repeatable production proof and still preserve roughly six months of cushion.'
