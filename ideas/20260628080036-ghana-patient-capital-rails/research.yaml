openQuestions:
- "Which PFIs, beyond DBG itself, are actually preparing to originate 10-15 year milestone-based loans into Ghanaian startups rather than traditional SME books?"
- "What exact data, reporting, or eligibility rules will the eventual Ghana Innovation and Startup Bill impose, if any?"
- "Which sector KPIs are credit committees willing to accept as tranche-release evidence in agritech, healthtech, and edtech?"
- "Will first buyers prefer an overlay workspace above existing loan systems, or a deeper core integration sold inside broader lending-transformation projects?"
