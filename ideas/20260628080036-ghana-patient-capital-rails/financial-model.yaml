slug: "milestone-startup-lending-os"
date: "2026-06-28"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-07"
    unit: "YYYY-MM"
    source: "[BP date 2026-06-28] the model starts in the first full month after the dated business plan."
  - id: A2
    name: "Opening cash / current seed ask"
    value: "$1.6M"
    unit: "USD"
    source: "[BP fundingAsk.targetFundingRangeUsd $2-4M + BP strategicChoices.sequencingRationale + startup-finance heuristic for an Accra-based team] the model lands slightly below the stated range because hiring trails signed pilots and legal/compliance work stays partly outsourced."
  - id: A3
    name: "Customer unit"
    value: "One active paid lending program, whether still in paid pilot or already on annual subscription."
    unit: "definition"
    source: "[BP businessModel.unitOfValue + BP gtm.wedge + BP investorMemo.firstCustomer.initialContract] revenue is tracked per active lending program rather than by borrower seat."
  - id: A4
    name: "Revenue recognition convention"
    value: "Period-average active programs multiplied by the period's blended annualized revenue per live program."
    unit: "policy"
    source: "[startup-finance heuristic] this keeps revenue tied to customers × ARPU while allowing onboarding and premium-reporting mix to fade into the average contract value."
  - id: A5
    name: "Y1 customer path"
    value: "M1 0; M2 1; M3-M7 1; M8-M12 2."
    unit: "customersEop"
    source: "[BP milestones 0-12 months + BP experimentRoadmap] this matches one design-partner agreement by month 2 and 2 paying programs live by month 12."
  - id: A6
    name: "Y2 quarter-end customer path"
    value: "Q1Y2 2; Q2Y2 3; Q3Y2 3; Q4Y2 4."
    unit: "customersEop"
    source: "[BP milestones 12-24 months] this reaches the plan's 3 active paying programs and lets one additional Ghana program land before the pan-African probe."
  - id: A7
    name: "Y3 quarter-end customer path"
    value: "Q1Y3 4; Q2Y3 5; Q3Y3 5; Q4Y3 6."
    unit: "customersEop"
    source: "[BP milestones 24-36 months + Research market.som] the base case exits at 6 live programs, matching the researched year-3 SOM anchor."
  - id: A8
    name: "Blended annualized revenue per live program"
    value: "Y1 M2-M7 ~$84K; Y1 M8-M12 ~$90K; Y2 Q1 $90K, Q2 $92K, Q3 $95K, Q4 $96K; Y3 Q1 $104K, Q2 $108K, Q3 $112K, Q4 $132K."
    unit: "USDK/program-year"
    source: "[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research bottomUpSizingDrivers annual contract value] the ramp starts at pilot-plus-onboarding economics and exits near the top of the $80-120K subscription band once some programs add premium co-investor reporting."
  - id: A9
    name: "Gross margin ramp"
    value: "Y1 COGS run 38%-45% of revenue, Y2 33%-35%, and Y3 29%-32%, reaching about 70% steady-state gross margin."
    unit: "percent of revenue"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP executiveSummary implementation services diminish] early pilots carry heavier service and setup load before templates stabilize."
  - id: A10
    name: "Hiring cadence and flat post-M12 headcount"
    value: "CEO and founding engineer in M1; customer success / implementation in M3; sector specialist in M6; platform / integrations engineer in M12; no additional FTE before Y4."
    unit: "timing"
    source: "[BP team + BP strategicChoices.sequencingRationale] hiring trails signed pilots and keeps the company at 5 FTE after Y1 because the Ghana buyer pool is concentrated."
  - id: A11
    name: "Founding Commercial Lead loaded cash compensation"
    value: "$72K"
    unit: "USD/year"
    source: "Startup-finance heuristic for an Accra-based fintech founder salary including payroll taxes and benefits while the CEO still carries founder-led sales."
  - id: A12
    name: "Founding engineer loaded cash compensation"
    value: "$66K"
    unit: "USD/year"
    source: "Startup-finance heuristic for an Accra-based senior backend / workflow engineer building the milestone engine and reporting workflow described in BP product and team."
  - id: A13
    name: "Customer success / implementation lead loaded cash compensation"
    value: "$36K"
    unit: "USD/year"
    source: "Startup-finance heuristic for a local implementation leader who configures milestone libraries, trains lender users, and drives pilot conversion."
  - id: A14
    name: "Sector specialist loaded cash compensation"
    value: "$30K"
    unit: "USD/year"
    source: "Startup-finance heuristic for a Ghana-based agritech / healthtech domain specialist building KPI templates and validating them with credit committees."
  - id: A15
    name: "Platform / integrations engineer loaded cash compensation"
    value: "$60K"
    unit: "USD/year"
    source: "[BP fundingAsk.useOfFundsSummary 2 engineers + BP product twelveMonth/twentyFourMonth] startup-finance heuristic for the second engineer needed to harden exports and scope API integration."
  - id: A16
    name: "Payroll allocation"
    value: "CEO 75% S&M / 25% G&A; founding engineer 100% R&D; customer success 15% S&M / 20% R&D / 65% G&A; sector specialist 70% R&D / 30% G&A; platform engineer 100% R&D."
    unit: "allocation"
    source: "[BP team rationales + BP operations] the split follows who sells, productizes templates, and supports audit-heavy onboarding."
  - id: A17
    name: "Non-payroll operating budget ramp"
    value: "Monthly non-payroll S&M / R&D / G&A starts at $7.0K / $7.0K / $8.0K and exits Y3 at about $9.8K / $9.0K / $10.1K."
    unit: "USDK/month"
    source: "[BP operations + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] this covers cloud hosting, travel to PFIs, data-protection registration, outside counsel, insurance, and reporting tooling."
  - id: A18
    name: "Legal and compliance staffing strategy"
    value: "Privacy registration, DPIA support, and Startup Bill monitoring stay on external retainer instead of a full-time internal hire through Y3."
    unit: "operating model"
    source: "[BP operations legal partner retainer + Research regulatoryTechnicalConstraints] the base case assumes the company can satisfy compliance needs without pulling forward a dedicated G&A headcount hire."
  - id: A19
    name: "Cash conversion policy"
    value: "EBITDA approximates operating cash movement."
    unit: "policy"
    source: "[startup-finance heuristic] no separate debt service, taxes, capex, or working-capital timing is modeled at this stage."
  - id: A20
    name: "Steady-state monthly churn"
    value: "1.8%"
    unit: "percent"
    source: "[BP risks + Research reportMemo.competitiveLandscape + startup-finance heuristic] contracts should be sticky once committee workflows are embedded, but the concentrated buyer pool still justifies a meaningful churn assumption."
  - id: A21
    name: "CAC convention"
    value: "$86.0K"
    unit: "USD/new program"
    source: "Calculated from modeled Y2-Y3 sales and marketing spend of $344.2K divided by 4 net new live programs."
  - id: A22
    name: "Next-round proof milestone"
    value: "Exit Y3 with 6 live programs, first non-Ghana reference, three-sector milestone libraries, and roughly $0.8M annualized run-rate."
    unit: "milestone"
    source: "[BP milestones 24-36 months + BP strategicChoices.sequencingRationale + Research market.som] this is the operating proof point used to size the current round."
