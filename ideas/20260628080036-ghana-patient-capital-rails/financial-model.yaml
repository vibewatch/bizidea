scenarios:
  downside:
    description: "One pilot fails to renew, the second Ghana institution signs late, and premium reporting attach rates stay weak, leaving the company at 4 live programs by Y3 exit."
    y3RevenueK: 338.5
    y3EbitdaK: -379.6
    cashLowPointK: 296.4
    keyAssumptionChanges:
      - "Y1 exits with 1 live program instead of 2, Y2 exits with 3 instead of 4, and Y3 exits with 4 instead of 6."
      - "Blended annualized revenue per live program caps near $110K because buyers resist premium co-investor reporting."
      - "Gross margin stalls near 67%-68% as onboarding remains more manual and services-heavy."
  base:
    description: "The lighthouse converts on schedule, four Ghana programs are live by Y2 exit, and one regional reference lands by Y3 while blended contract value rises with premium reporting."
    y3RevenueK: 547.0
    y3EbitdaK: -224.4
    cashLowPointK: 545.9
    keyAssumptionChanges:
      - "Customer counts follow A5, A6, and A7, exiting Y1 with 2 live programs, Y2 with 4, and Y3 with 6."
      - "Blended annualized revenue per live program rises from about $90K at Y1 exit to about $132K in Q4Y3 as pilots mature and some programs add premium analytics."
      - "Headcount stays flat at 5 FTE after M12 and compliance-heavy work remains on external retainers."
  upside:
    description: "The first committee-pack reference accelerates follow-on deals, analytics attach sooner, and the company exits Y3 with 7 live programs and stronger pricing power."
    y3RevenueK: 699.2
    y3EbitdaK: -103.9
    cashLowPointK: 744.3
    keyAssumptionChanges:
      - "Y1 exits with 3 live programs, Y2 exits with 5, and Y3 exits with 7 as the Ghana lighthouse reference shortens follow-on sales cycles."
      - "Exit annualized revenue per live program rises toward $140K as premium co-investor reporting attaches to more accounts."
      - "Gross margin reaches roughly 72%-73% because milestone libraries and reporting workflows become more template-driven."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Blended steady-state program value settles closer to $110K because banks cap spend at the base subscription tier."
    baseCase: "Steady-state ARPU is modeled at $120K, with Q4Y3 annualized revenue per live program reaching about $132K on a partial premium-reporting mix."
    upsideCase: "Premium reporting attaches faster and pushes steady-state ARPU toward $130K+."
    y3RevenueImpactK: -53.0
    cashImpactK: -40.0
  - variable: "CAC"
    downsideCase: "CAC rises above $100K if founder-led outreach converts worse than planned and every institution needs longer procurement support."
    baseCase: "CAC is $86.0K using modeled Y2-Y3 sales and marketing spend per net new live program."
    upsideCase: "Warm referrals from DBG and technical-assistance partners pull CAC toward the low $70Ks."
    y3RevenueImpactK: 0.0
    cashImpactK: -68.0
  - variable: "churn"
    downsideCase: "One additional live program fails to renew by Y3, behaving like churn above the modeled 1.8% monthly rate."
    baseCase: "The model assumes 1.8% monthly churn, but the customer path already embeds a cautious expansion pace."
    upsideCase: "Committee-pack workflows become sticky enough that renewal behavior looks closer to 1.0%-1.2% monthly churn."
    y3RevenueImpactK: -78.0
    cashImpactK: -60.0
  - variable: "sales cycle"
    downsideCase: "Second and third institution wins each slip by one quarter because credit and procurement sign-off takes longer than planned."
    baseCase: "The base case assumes the overlay pitch keeps first-deal cycles inside the plan's 3-6 month range."
    upsideCase: "The lighthouse reference cuts one quarter from follow-on cycles once the first accepted committee pack exists."
    y3RevenueImpactK: -116.0
    cashImpactK: -101.0
  - variable: "gross margin"
    downsideCase: "Gross margin stalls near 67% because onboarding remains bespoke and lender data cleanup stays manual."
    baseCase: "Gross margin exits near the 70% business-plan target once implementation work becomes more templated."
    upsideCase: "Gross margin reaches 72%-73% as reusable milestone libraries and export templates lower service time per program."
    y3RevenueImpactK: 0.0
    cashImpactK: -29.0
  - variable: "hiring pace"
    downsideCase: "An extra implementation or compliance hire is pulled forward 12 months before revenue supports it."
    baseCase: "The base case keeps the team at 5 FTE from M12 through Y3 and uses external specialists for compliance-heavy work."
    upsideCase: "The company holds the same lean team shape and adds no full-time headcount before the next round."
    y3RevenueImpactK: 0.0
    cashImpactK: -74.0
modelDiagram:
  title: "milestone lending economics loop"
  mermaid: |
    flowchart LR
      FacilityLaunches[Funded lender programs] --> PaidPilots[Paid pilots]
      PaidPilots --> LivePrograms[Live lending programs]
      LivePrograms --> CommitteePacks[Committee review packs]
      CommitteePacks --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue comes from growing active paid lending programs from 2 at Y1 exit to 6 at Y3 exit while annualized value per live program rises from roughly $90K to about $132K."
  - checkName: "Must go right"
    finding: "The first accepted committee-pack reference has to convert into three additional Ghana programs and one regional win without forcing a larger team before revenue arrives."
  - checkName: "Model breaks if"
    finding: "If the company exits Y3 with only 4 live programs and weaker premium-reporting attach, cash compresses toward the downside low point near $296K."
  - checkName: "Next-round proof"
    finding: "The next raise is easiest once 6 live programs, a non-Ghana reference, and three-sector milestone libraries support roughly $0.8M of exit annualized run-rate."
sanityChecks:
  ruleOf40: "Y3 growth 112.2% + EBITDA margin -41.0% = 71.2% (healthy directionally, but still not efficient enough for a Ghana-only outcome)."
  burnMultiple: "About 2.0x in Y2 on roughly $204K of net new ARR, improving to about 0.6x in Y3 on roughly $408K of net new ARR."
  revenuePerFte: "$109K Y3 revenue per end-of-year FTE using 5 Q4Y3 FTE (below the rough $200–400K SaaS benchmark)."
  flags:
    - "The modeled $1.6M ask sits below the business-plan's stated $2-4M target and only works if the company keeps the team flat at 5 FTE and outsources compliance-heavy work."
    - "Revenue concentration is high: a single delayed or lost bank program can move annual revenue by roughly $90K-$130K because the Ghana logo pool is small."
    - "Y3 revenue per FTE remains below typical SaaS benchmarks, so the venture case still depends on pan-African expansion after the Ghana lighthouse phase."
    - "Gross margin only reaches the 70% target if onboarding stays template-driven and the company resists bespoke core-banking integration before customer density improves."
    - "The base case still assumes at least two Ghana PFIs convert from pilot conversations to live paid programs on the timeline implied by the business plan, which has not yet been validated by public proof points."
