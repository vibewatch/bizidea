jobsToBeDone:
  - job: >-
      当我们银行获得创业放贷额度时，帮助我们的信贷团队安排分阶段提款和里程碑审查，
      让我们在不放弃风险纪律的前提下审批更多企业。
    currentAlternative: "人工信贷备忘录、电子表格里程碑跟踪器和临时性投后沟通"
    successMetric: "从机构批准到首次放款的时间，以及每次借款方审查中的人工例外数量"
  - job: >-
      当公共支持方或联合投资方询问投资组合表现时，帮助我们的项目经理生成一份将
      资本部署、导师支持和创业进展串联起来的证据包，以便争取后续资金。
    currentAlternative: "从邮件更新、借款方文件和独立支持项目笔记中重建投资组合报告"
    successMetric: "生成投资委员会或联合投资方报告所需天数，以及每个项目撬动的后续资本"
ideaScorecard:
  signalStrength:
    score: 4
    rationale: "该集群明确指向创业放贷条款和支持结构的具体产品转变，尽管仅有一个经验证的来源支撑。"
  painIntensity:
    score: 4
    rationale: "贷款机构若无法将长期创业债务落地运营，资本就会被困住，项目即便有公共政策支持也难以规模化。"
  wedgeClarity:
    score: 5
    rationale: "面向 DBG 支持的农业科技、医疗科技和教育科技创业贷款的基于里程碑的操作系统，切口窄、买家明确，在单一机构上易于试点。"
  defensibility:
    score: 4
    rationale: "公司能围绕行业里程碑、导师干预和委员会级报告积累粘性工作流数据，但贷款机构可能尝试局部内部构建。"
  ventureScale:
    score: 4
    rationale: "加纳滩头市场集中，但同一基础设施可为多个前沿市场的混合融资和开发性银行创业放贷项目提供支持。"
topRisks:
  - name: 信息来源单薄
    description: "由于该集群依赖单一地区报告，实际推出模式、参与贷款机构和政策时间表可能与初始信号有所出入。"
    mitigation: "从可配置工作流开始，与共创客户验证假设，并将与法案挂钩的报告和资格逻辑视为可编辑的项目模板。"
  - name: 企业销售周期漫长
    description: "银行和公共资本项目推进可能缓慢，尤其是在引入新的创业放贷产品和委员会流程时。"
    mitigation: "先以一个机构的付费试点切入，快速交付报告成果，再在贷款机构证明能够部署资金并满足监督要求后扩展。"
  - name: 初期买家池规模有限
    description: "近期内可能启动耐心资本创业债务项目的加纳机构数量有限。"
    mitigation: "利用加纳赢得灯塔项目，再扩展至相邻的非洲市场和面临同样基于里程碑监控问题的其他混合融资贷款机构。"
