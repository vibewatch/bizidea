problem: >-
  加纳银行和开发性金融项目想要支持创业企业，但其贷款运营体系是为短期、抵押主导的中小企业信贷构建的，
  根本无法应对 10 至 15 年期、与公司里程碑挂钩的长期贷款。信贷团队缺少一套可复制的方式来分阶段安排
  提款、跟踪辅导是否真正改善了借款方的经营状况、并拿出证据证明创业企业仍符合公共激励或联合投资项目的
  资格。没有专用的运营层，耐心资本将继续缓慢部署、人工监控，难以扩展到少数精心打造的交易以外。
targetUser:
  primary: "在加纳银行或非银行金融机构担任创业/中小企业放贷负责人，负责将 DBG 支持的资金部署至农业科技、医疗科技和教育科技创业企业"
  secondary: "负责投后辅导、契约审查和项目报告的投资组合经理或创业支持负责人"
  buyer: "首席信贷官、中小企业/创业银行业务负责人，或 DBG 支持放贷机构的项目主任"
startupThesis:
  nonObviousInsight: >-
    瓶颈不再是加纳是否愿意为创业企业提供资金，而是贷款机构能否将政策对耐心资本的支持转化为
    一套让委员会、审计师和联合投资方都觉得足够严谨的信贷流程。一旦债务以创业里程碑而非硬性抵押品
    来分阶段安排，制胜产品就不是通用贷款管理系统，而是把核保、辅导、放款和激励资格整合进同一
    运营模型的工作流。
  beachhead: >-
    正在启动或扩展 DBG 支持放贷项目的加纳金融机构——面向营收后期农业科技、医疗科技和教育科技
    创业企业，需要 10 至 15 年期限、里程碑式放款以及定期投资组合审查，且不依赖传统抵押品工作流
  wedge: >-
    一套耐心资本放贷操作系统：将创业贷款结构化为基于里程碑的分阶段提款，跟踪导师行动和借款方 KPI，
    并为信贷委员会、联合投资方和公共项目报告生成合规审查包
  whyNowCatalyst: >-
    DBG 已公开将创业贷款转向长期贷款加辅导支持，同时《创业法案》或将正式确立创业企业定义、
    税收激励和联合投资规则，创造了对新核保与监控工作流的迫切需求。
  ventureScalePath: >-
    从运营公共或混合资本创业项目的加纳贷款机构起步，再扩展为覆盖开发性银行、主权基金、商业银行
    和影响力贷款机构的泛非洲操作系统——这些机构同样需要基于里程碑的核保、投后支持，以及创业
    债务投资组合间的证据共享。
solution: >-
  产品为贷款机构提供一个专属于创业债务的项目工作区：从资格筛查开始，将每笔获批贷款转化为
  与可衡量里程碑挂钩的分阶段放款计划——例如试点部署、收入门槛、诊所或学校合同、或供应链
  绩效。客户关系经理和导师在同一系统内记录干预措施，让贷款机构在下批提款前就能看到运营支持
  是否正在降低投资组合风险。信贷委员会获得标准化审查包，呈现契约状态、创业 KPI 趋势、
  行业特有风险，以及附在借款方名下的《创业法案》或税收激励相关文件。联合投资方和公共支持方
  收到审计就绪的投资组合摘要，贷款机构无需再用电子表格手工重建报告。随时间推移，这套操作系统
  将成为多家机构和多个国家的创业债务项目的默认服务与监控层。
goToMarketSeed:
  firstCustomer: >-
    一家选定的加纳全能银行或专业贷款机构，负责将 DBG 支持的资金部署至营收后期农业科技创业企业，
    并须配套 10 至 15 年期贷款、持续辅导及定期委员会审查
  buyingTrigger: >-
    获批进入 DBG 支持的创业放贷额度、新建农业科技、医疗科技或教育科技放贷业务条线，
    或在《加纳创新与创业法案》出台及预期联合投资流到来前建立内部管控
  currentAlternative: "中小企业贷款管理软件、电子表格契约跟踪器、邮件信贷备忘录，以及非正式导师沟通"
  switchingReason: >-
    这套操作系统让贷款机构能够凭借分阶段风险管控和一条贯通放贷与支持的审计链来部署耐心资本，
    远比把创业债务硬塞进为短期抵押贷款设计的工具更安全、更高效。
  pricingHypothesis: "按活跃放贷项目和借款方数量定价的年度 SaaS 订阅，另附工作流设计和报告模板的上线服务费"
whyNow:
  - point: "公开宣布的 10 至 15 年期创业贷款创造了标准中小企业系统从未为之设计的新型服务与核保工作流。"
    signalRefs: ["长期创业债务正获政策背书"]
    sourceRefs: [1]
  - point: "辅导支持已捆绑进债务产品，贷款机构现在需要能够在金融敞口旁同步跟踪运营支持的软件。"
    signalRefs: ["辅导支持已成信贷产品的组成部分"]
    sourceRefs: [1]
  - point: "农业科技、医疗科技和教育科技等优先赛道为创业公司提供了一个狭窄的首批切口——即便硬抵押品薄弱，里程碑也能被衡量。"
    signalRefs: ["资本正流向融资不足的细分赛道"]
    sourceRefs: [1]
  - point: "若《创业法案》统一创业企业定义、税收优惠和联合投资规则，更多机构将需要一套共同的资格认定与报告记录系统。"
    signalRefs: ["《创业法案》或将统一资格认定与联合投资规则"]
    sourceRefs: [1]
differentiator: >-
  通用核心银行和中小企业贷款系统默认摊还计划、抵押品档案和季度契约审查；加速器和创业支持项目
  则在没有贷款机构级管控的情况下管理辅导。这家创业公司填补了中间空白：让创业债务对信贷委员会
  和生态系统伙伴都清晰可读——把里程碑、导师干预、分批放款和项目合规整合进一条可审计的工作流。
  护城河来自行业专属里程碑模板、投资组合绩效基准，以及将创业运营进展与前沿市场债务项目还款和
  风险结果相关联的数据图谱。
