slug: "milestone-startup-lending-os"
date: "2026-06-28"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-07"
    unit: "YYYY-MM"
    source: "[BP date 2026-06-28] 模型从商业计划书日期后的第一个完整月份开始。"
  - id: A2
    name: "初始现金 / 当前种子轮融资需求"
    value: "$1.6M"
    unit: "USD"
    source: "[BP fundingAsk.targetFundingRangeUsd $2–4M + BP strategicChoices.sequencingRationale + 阿克拉团队的创业金融启发] 模型略低于申报范围，因为招聘跟随已签约试点，法律/合规工作部分外包。"
  - id: A3
    name: "客户单位"
    value: "一个活跃付费放贷项目，无论仍在付费试点还是已转为年度订阅。"
    unit: "定义"
    source: "[BP businessModel.unitOfValue + BP gtm.wedge + BP investorMemo.firstCustomer.initialContract] 收入按活跃放贷项目而非借款方席位跟踪。"
  - id: A4
    name: "收入确认惯例"
    value: "期间平均活跃项目数乘以该期间的混合年化每活跃项目收入。"
    unit: "政策"
    source: "[创业金融启发] 这将收入与客户 × ARPU 绑定，同时允许上线和高级报告组合淡入平均合同价值。"
  - id: A5
    name: "第 1 年客户路径"
    value: "M1 0；M2 1；M3–M7 1；M8–M12 2。"
    unit: "期末客户数"
    source: "[BP milestones 0–12 months + BP experimentRoadmap] 对应第 2 个月签署一个共创客户协议、第 12 个月 2 个付费项目上线。"
  - id: A6
    name: "第 2 年季度末客户路径"
    value: "Q1Y2 2；Q2Y2 3；Q3Y2 3；Q4Y2 4。"
    unit: "期末客户数"
    source: "[BP milestones 12–24 months] 达到计划中的 3 个活跃付费项目，并在泛非洲探索前让一个额外加纳项目落地。"
  - id: A7
    name: "第 3 年季度末客户路径"
    value: "Q1Y3 4；Q2Y3 5；Q3Y3 5；Q4Y3 6。"
    unit: "期末客户数"
    source: "[BP milestones 24–36 months + Research market.som] 基准情景以 6 个上线项目退出，与研究中第 3 年 SOM 锚点一致。"
  - id: A8
    name: "每个上线项目的混合年化收入"
    value: "Y1 M2–M7 约 $84K；Y1 M8–M12 约 $90K；Y2 Q1 $90K，Q2 $92K，Q3 $95K，Q4 $96K；Y3 Q1 $104K，Q2 $108K，Q3 $112K，Q4 $132K。"
    unit: "USDK/项目-年"
    source: "[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research bottomUpSizingDrivers 年度合同价值] 从试点加上线经济开始，在部分项目增加高级联合投资方报告后以接近 $80–120K 订阅带顶部的水平退出。"
  - id: A9
    name: "毛利率爬坡"
    value: "Y1 COGS 占收入 38%–45%，Y2 33%–35%，Y3 29%–32%，达到约 70% 的稳态毛利率。"
    unit: "收入百分比"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP executiveSummary 实施服务减少] 早期试点在模板稳定前承担更重的服务和配置负担。"
  - id: A10
    name: "招聘节奏和第 12 个月后扁平编制"
    value: "CEO 和创始工程师在 M1；客户成功/实施在 M3；行业专家在 M6；平台/集成工程师在 M12；Y4 前不增加额外全职人员。"
    unit: "时间节点"
    source: "[BP team + BP strategicChoices.sequencingRationale] 招聘跟随已签约试点，公司在 Y1 后保持 5 名全职员工，因为加纳买家池集中。"
  - id: A11
    name: "创始商务负责人含税现金薪酬"
    value: "$72K"
    unit: "USD/年"
    source: "阿克拉金融科技创始人薪资（含工资税和福利）的创业金融启发，CEO 仍承担创始人主导销售期间适用。"
  - id: A12
    name: "创始工程师含税现金薪酬"
    value: "$66K"
    unit: "USD/年"
    source: "阿克拉资深后端/工作流工程师的创业金融启发，负责构建商业计划书 product 和 team 中描述的里程碑引擎和报告工作流。"
  - id: A13
    name: "客户成功/实施负责人含税现金薪酬"
    value: "$36K"
    unit: "USD/年"
    source: "本地实施负责人的创业金融启发，负责配置里程碑库、培训贷款机构用户并推动试点转化。"
  - id: A14
    name: "行业专家含税现金薪酬"
    value: "$30K"
    unit: "USD/年"
    source: "加纳农业科技/医疗科技领域专家的创业金融启发，负责构建 KPI 模板并在信贷委员会验证。"
  - id: A15
    name: "平台/集成工程师含税现金薪酬"
    value: "$60K"
    unit: "USD/年"
    source: "[BP fundingAsk.useOfFundsSummary 2 名工程师 + BP product twelveMonth/twentyFourMonth] 第二名工程师的创业金融启发，负责强化导出并确定 API 集成范围。"
  - id: A16
    name: "薪酬分摊"
    value: "CEO 75% S&M / 25% G&A；创始工程师 100% R&D；客户成功 15% S&M / 20% R&D / 65% G&A；行业专家 70% R&D / 30% G&A；平台工程师 100% R&D。"
    unit: "分摊"
    source: "[BP team rationales + BP operations] 分摊遵循谁在销售、产品化模板和支持审计密集型上线工作的逻辑。"
  - id: A17
    name: "非薪酬运营预算爬坡"
    value: "月度非薪酬 S&M / R&D / G&A 从 $7.0K / $7.0K / $8.0K 起步，Y3 末退出约 $9.8K / $9.0K / $10.1K。"
    unit: "USDK/月"
    source: "[BP operations + BP fundingAsk.useOfFundsSummary + 创业金融启发] 涵盖云托管、拜访 PFI 差旅、数据保护注册、外部法律顾问、保险和报告工具。"
  - id: A18
    name: "法律和合规人员策略"
    value: "隐私注册、DPIA 支持和《创业法案》跟踪在 Y3 前以外部顾问保留合同方式处理，不设全职内部岗位。"
    unit: "运营模式"
    source: "[BP operations 法律伙伴保留合同 + Research regulatoryTechnicalConstraints] 基准情景假设公司无需提前引入专职 G&A 人员即可满足合规需求。"
  - id: A19
    name: "现金转换政策"
    value: "EBITDA 近似于运营现金变动。"
    unit: "政策"
    source: "[创业金融启发] 此阶段不对债务偿还、税务、资本支出或运营资金时间差单独建模。"
  - id: A20
    name: "稳态月度流失率"
    value: "1.8%"
    unit: "百分比"
    source: "[BP risks + Research reportMemo.competitiveLandscape + 创业金融启发] 委员会工作流嵌入后合同应具粘性，但集中买家池仍需考虑一定流失假设。"
  - id: A21
    name: "CAC 惯例"
    value: "$86.0K"
    unit: "USD/新项目"
    source: "由 Y2–Y3 建模销售和营销支出 $344.2K 除以 4 个净新上线项目计算得出。"
  - id: A22
    name: "下一轮融资证明里程碑"
    value: "Y3 以 6 个上线项目、首个非加纳参考、三行业里程碑库和约 $0.8M 年化运营收入退出。"
    unit: "里程碑"
    source: "[BP milestones 24–36 months + BP strategicChoices.sequencingRationale + Research market.som] 这是用于确定本轮规模的运营证明点。"
