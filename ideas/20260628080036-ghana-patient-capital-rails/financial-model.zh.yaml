scenarios:
  downside:
    description: "一个试点未能续约，第二家加纳机构签约推迟，高级报告附加率持续疲软，导致公司在 Y3 末仅有 4 个上线项目。"
    y3RevenueK: 338.5
    y3EbitdaK: -379.6
    cashLowPointK: 296.4
    keyAssumptionChanges:
      - "Y1 以 1 个上线项目退出（而非 2 个），Y2 以 3 个退出（而非 4 个），Y3 以 4 个退出（而非 6 个）。"
      - "混合年化每上线项目收入上限约 $110K，因为买家抵制高级联合投资方报告。"
      - "毛利率停滞在 67%–68% 附近，因为上线工作仍偏人工和服务密集。"
  base:
    description: "灯塔按计划转化，Y2 末 4 个加纳项目上线，Y3 前一个区域参考落地，同时随高级报告附加率上升混合合同价值提高。"
    y3RevenueK: 547.0
    y3EbitdaK: -224.4
    cashLowPointK: 545.9
    keyAssumptionChanges:
      - "客户数量遵循 A5、A6 和 A7，Y1 末 2 个上线项目，Y2 末 4 个，Y3 末 6 个。"
      - "混合年化每上线项目收入从 Y1 末约 $90K 上升至 Q4Y3 约 $132K，随试点成熟且部分项目增加高级分析。"
      - "第 12 个月后编制稳定在 5 名全职员工，合规密集工作继续使用外部顾问。"
  upside:
    description: "首份委员会审查包参考加速后续交易，分析附加更早，公司 Y3 末以 7 个上线项目和更强定价权退出。"
    y3RevenueK: 699.2
    y3EbitdaK: -103.9
    cashLowPointK: 744.3
    keyAssumptionChanges:
      - "Y1 以 3 个上线项目退出，Y2 以 5 个，Y3 以 7 个——加纳灯塔参考缩短后续销售周期。"
      - "退出年化每上线项目收入向 $140K 上升，因为高级联合投资方报告附加至更多账户。"
      - "毛利率达约 72%–73%，因为里程碑库和报告工作流变得更为模板化。"
sensitivity:
  - variable: "ARPU"
    downsideCase: "混合稳态项目价值稳定在约 $110K 附近，因为银行将支出上限设在基础订阅层。"
    baseCase: "稳态 ARPU 建模为 $120K，Q4Y3 年化每上线项目收入在部分高级报告组合下达约 $132K。"
    upsideCase: "高级报告附加更快，将稳态 ARPU 推向 $130K 以上。"
    y3RevenueImpactK: -53.0
    cashImpactK: -40.0
  - variable: "CAC"
    downsideCase: "若创始人主导外联转化率低于计划，且每家机构都需要更长的采购支持，CAC 可能升至 $100K 以上。"
    baseCase: "CAC 为 $86.0K，由 Y2–Y3 建模销售和营销支出除以 4 个净新上线项目计算。"
    upsideCase: "DBG 和技术援助伙伴的温热引荐将 CAC 拉向 $70K 出头。"
    y3RevenueImpactK: 0.0
    cashImpactK: -68.0
  - variable: "churn"
    downsideCase: "Y3 前一个额外上线项目未能续约，行为类似于超过建模 1.8% 月度流失率的流失。"
    baseCase: "模型假设月度流失率 1.8%，但客户路径已内置谨慎的扩张节奏。"
    upsideCase: "委员会审查包工作流变得足够粘性，续约行为接近每月 1.0%–1.2% 的流失率。"
    y3RevenueImpactK: -78.0
    cashImpactK: -60.0
  - variable: "sales cycle"
    downsideCase: "第二和第三家机构成交各推迟一个季度，因为信贷和采购审批耗时超出计划。"
    baseCase: "基准情景假设叠加层销售提案将首批交易周期控制在计划的 3 至 6 个月范围内。"
    upsideCase: "首份被接受的委员会审查包存在后，灯塔参考为后续销售周期缩短一个季度。"
    y3RevenueImpactK: -116.0
    cashImpactK: -101.0
  - variable: "gross margin"
    downsideCase: "毛利率停滞在 67% 附近，因为上线工作仍为定制化，贷款机构数据清理持续人工化。"
    baseCase: "毛利率在实施工作变得更为模板化后以接近商业计划书 70% 目标退出。"
    upsideCase: "毛利率达 72%–73%，因为可复用里程碑库和导出模板降低每个项目的服务时间。"
    y3RevenueImpactK: 0.0
    cashImpactK: -29.0
  - variable: "hiring pace"
    downsideCase: "一名额外的实施或合规人员提前 12 个月招募，早于收入支撑时机。"
    baseCase: "基准情景将团队从第 12 个月到 Y3 稳定在 5 名全职员工，合规密集工作使用外部专家。"
    upsideCase: "公司保持同样精简的团队结构，在下一轮融资前不增加全职人员。"
    y3RevenueImpactK: 0.0
    cashImpactK: -74.0
modelDiagram:
  title: "里程碑放贷经济循环"
  mermaid: |
    flowchart LR
      FacilityLaunches[Funded lender programs] --> PaidPilots[Paid pilots]
      PaidPilots --> LivePrograms[Live lending programs]
      LivePrograms --> CommitteePacks[Committee review packs]
      CommitteePacks --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "收入引擎"
    finding: "基准情景收入来自将活跃付费放贷项目从 Y1 末 2 个增长至 Y3 末 6 个，同时每个上线项目年化价值从约 $90K 上升至约 $132K。"
  - checkName: "必须成立的条件"
    finding: "首份被接受的委员会审查包参考必须转化为三个额外加纳项目和一个区域性胜利，且在收入到来前不强制扩大团队规模。"
  - checkName: "模型失效条件"
    finding: "若公司 Y3 末仅有 4 个上线项目且高级报告附加率偏弱，现金将压缩至悲观情景低点约 $296K。"
  - checkName: "下一轮证明"
    finding: "当 6 个上线项目、一个非加纳参考和三行业里程碑库支撑约 $0.8M 的退出年化运营收入时，下一轮融资最为顺畅。"
sanityChecks:
  ruleOf40: "Y3 增长率 112.2% + EBITDA 利润率 -41.0% = 71.2%（方向上健康，但仅靠加纳结果效率仍不足）。"
  burnMultiple: "Y2 约 $20.4 万净新 ARR 对应约 2.0x 燃烧倍数，Y3 约 $40.8 万净新 ARR 改善至约 0.6x。"
  revenuePerFte: "Y3 每年末全职员工收入 $10.9 万，使用 5 名 Q4Y3 全职员工（低于 SaaS 粗略基准 $20–40 万）。"
  flags:
    - "建模的 $1.6M 融资需求低于商业计划书申报的 $2–4M 目标，仅在公司将团队稳定在 5 名全职员工且将合规密集工作外包的情况下可行。"
    - "收入集中度高：单笔银行项目延迟或流失即可使年收入移动约 $9–13 万，因为加纳客牌池规模有限。"
    - "Y3 每全职员工收入低于典型 SaaS 基准，风险投资论点仍依赖加纳灯塔阶段后的泛非洲扩张。"
    - "毛利率仅在上线工作保持模板化且公司在客户密度提升前抵制定制核心银行集成的情况下才能达到 70% 目标。"
    - "基准情景仍假设至少两家加纳 PFI 按商业计划书隐含时间线从试点对话转为实际付费项目，这一点尚无公开证明点验证。"
