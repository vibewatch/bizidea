slug: milestone-startup-lending-os
date: "2026-06-28"
executiveSummary: >-
  加纳发展银行（DBG）已公开将创业贷款转向 10 至 15 年期耐心资本并捆绑辅导支持，由此产生的
  服务工作流缺口是标准中小企业贷款系统无法填补的。核心问题是运营层面的：加纳贷款机构无法
  安全地将提款分阶段绑定创业里程碑、在财务契约旁同步跟踪导师干预，也无法为信贷委员会和
  联合投资方生成审计就绪的证据包——否则就要从邮件和电子表格中手工重建报告。这家创业公司
  构建了一套基于里程碑的放贷操作系统，为贷款机构提供专属项目工作区，覆盖资格筛查、与行业
  KPI 挂钩的分阶段提款、导师行动记录，以及一键生成委员会审查包。滩头市场是正在将 DBG 支持
  资金部署至营收后期农业科技、医疗科技和教育科技创业企业的加纳金融机构，这些企业需要 10
  至 15 年期限。现有厂商中没有哪家明确主导加纳专属的耐心资本服务与导师联动里程碑治理；
  竞争者覆盖发起或核心放贷，但没有公共项目证据层。收入为每个活跃放贷项目的年度 SaaS 订阅
  （目标 ACV $80–120k），加上上线服务费，并以 70% 的毛利率为目标，随实施服务减少而提升。
  加纳买家池集中（估计约 15 个近期项目），因此风险投资逻辑取决于将一个灯塔交易转化为面向
  类似非洲 DFI 和混合融资贷款机构的可复制模式。证据基础依赖单一经验证的地区来源；首批 90
  天的客户探访必须确认贷款机构准备就绪度、可接受的里程碑类型和付费意愿，然后再确定完整
  产品范围。
problem:
  - "DBG 支持的贷款机构没有专用工作流来将提款分阶段绑定创业里程碑（如收入门槛或试点合同）——每笔交易都是为抵押主导短期中小企业信贷而设计的工具中的人工例外。"
  - "辅导支持已捆绑进耐心资本贷款，却通过临时电话和邮件跟踪，导师干预与契约或分批放款决策之间没有可审计的关联。"
  - "将资本部署、导师支持和借款方 KPI 关联起来的委员会就绪证据包需要为每个审查周期手工重建，每个项目耗费数天，并在各批次间引入不一致。"
  - "标准中小企业贷款管理系统默认摊还计划和硬性抵押品；10 至 15 年期基于里程碑的贷款期限强制产生容易出错的变通方案，破坏风险纪律，阻碍项目规模化。"
solution:
  - "一套将每笔获批创业贷款转化为分阶段提款计划的项目专属操作系统，配有可配置的行业里程碑（农业科技供应链绩效、医疗科技诊所合同、教育科技学校注册）、契约门槛和信贷委员会分批放款触发条件。"
  - "一个导师行动层：客户关系经理和外部导师按强制工作流记录结构化干预，使支持活动与同一系统内的金融敞口并列可审计。"
  - "一个委员会就绪报告模块：自动生成显示契约状态、KPI 趋势、行业里程碑证据和公共项目合规文件的审查包——消除每个信贷委员会周期前手工重建电子表格的环节。"
  - "作为叠加层部署在现有核心银行或 LOS 系统之上，通过文件导出和 API 接入，无需替换核心，降低集成风险，将销售周期缩短至 3 至 6 个月。"
whyWeWin:
  - "没有加纳专属竞争对手明确主导导师联动的耐心资本服务；nCino 和 Mambu 处理发起或核心放贷，但没有公共项目证据层和里程碑治理。"
  - "产品以项目叠加层而非核心替换的形式安装，比完整 LOS 切换更快更便宜，便于在试点中评估。"
  - "行业里程碑库和跨项目基准数据在两至三批群体后变得粘性，形成基于积累的信贷委员会验证运营知识的转换成本。"
  - "买家触发器是有资金支持的机构启动——预算已存在且紧迫性是真实的——而非自由裁量的技术投资。"
  - "DBG 自身架构明确要求 PFI 层面的 MEL、仪表板和数字融资组件，验证了编排层的价值并为早期销售创造了温热引荐渠道。"
strategicChoices:
  beachhead: >-
    正在启动或扩展 DBG 支持创业放贷项目的加纳银行和非银行金融机构——面向需要 10 至 15
    年期限、里程碑式提款和定期信贷委员会审查且不依赖传统抵押品工作流的营收后期农业科技创业企业。
  wedgeRationale: >-
    农业科技是 DBG 的首要优先行业，里程碑最清晰可测（供应链量、收购合同），是通往信贷委员会
    接受的概念验证最快路径。一份在实际项目中被接受的审查包比演示更有说服力，并创造了促成第二
    和第三家机构成交所需的参考案例。
  sequencingRationale: >-
    先建立农业科技里程碑库，签署一个付费共创客户试点，60 天内交付首份委员会审查包，再用该
    灯塔参考促成第二和第三个项目。招聘跟随已签约试点以保留现金跑道。核心银行 API 集成等到
    第 12 个月，避免在与共创客户确认集成需求前阻塞 MVP。泛非洲地区探索从第 12 个月开始，
    届时加纳参考案例已建立。
  notYet:
    - "在首个加纳灯塔项目产生经验证的联合投资方就绪参考前进行泛非洲扩张"
    - "前 12 个月内进行核心银行集成或核心替换——先以叠加层形式落地"
    - "面向借款方的移动应用——面向贷款机构的工作区是初始产品范围"
    - "耐心资本和创业债务细分以外的通用高成长中小企业放贷"
    - "股权或拨款项目管理——坚守债务工具侧，分批管控最为清晰"
market:
  tam: "$7.3M — 61 家可寻址加纳机构（23 家银行、26 家储蓄贷款机构、11 家融资公司、1 家开发性金融机构），按每个项目约 $120k ACV 估算（研究估计）"
  sam: "$1.8M — 预计近期 15 个加纳项目可能以约 $120k ACV 启动结构化创业放贷（研究估计）"
  som: "$0.7M — 第 3 年 6 个项目，约 $120k ACV；泛非洲扩张市场尚未测算（研究估计）"
  segments:
    - "运营 DBG 支持或中小企业 GO 关联创业及高成长中小企业放贷项目的加纳银行和非银行贷款机构"
    - "运营基于里程碑的混合融资放贷项目的泛非洲开发性银行、主权影响力基金和商业银行"
  buyingProcess: >-
    决策由首席信贷官（风险接受）和中小企业或创业银行业务负责人（项目所有者）共同做出；采购
    由新的 DBG 或担保机构额度分配、或联合投资到来前的委员会就绪审计触发；首批试点销售周期
    预计 3 至 6 个月；扩展续约由委员会报告成果和项目主任倡导驱动。
product:
  mvp: >-
    针对单一放贷项目的可配置里程碑提款工作区：资格筛查表、带农业科技行业 KPI 字段的分阶段
    提款计划、导师签到记录，以及 PDF 和 Excel 格式的一键委员会审查包导出。上线时无需核心
    银行集成；仅支持 CSV 导入导出。
  sixMonth: "至少与一位共创客户信贷委员会验证的三个农业科技里程碑模板；带完整审计跟踪的分批放款审批工作流；供项目主任使用的基础投资组合仪表板。"
  twelveMonth: "医疗科技和教育科技行业模板；为第二家机构提供多项目支持；将导师行动与投资组合结果关联的联合投资方报告模块；与一家加纳核心银行系统确定 API 集成范围。"
  twentyFourMonth: "与至少一家主要加纳核心银行系统的 API 集成上线；覆盖三个行业的跨项目基准分析；《创业法案》通过后的可配置合规资格模块；从加纳到西非的项目模板库。"
  keyBets:
    - "信贷委员会将接受基于 KPI 的结构化里程碑证据作为法律上充分的分批放款触发条件，前提是打包在标准化审查模板中——这在任何实际交易中尚未得到确认。"
    - "项目叠加层定位规避了核心替换异议，将企业销售周期从 12 个月缩短至 3 至 6 个月。"
    - "行业里程碑库成为主要转换成本，因为内部重建比保留平台更慢、更缺乏验证。"
gtm:
  wedge: >-
    创始人主导的一个 DBG 支持农业科技创业放贷机构的付费试点；在签约 60 天内交付首份委员会
    审查包，在年度订阅决策前建立内部拥护者；然后用已接受的审查包作为参考案例，扩展至第二个
    行业和第二家机构。
  channels:
    - "创始人直接向 15 家近期目标加纳机构的中小企业和创业银行业务负责人销售"
    - "DBG 项目办公室关系作为向参与金融机构引荐的温热渠道"
    - "中小企业 GO 和 IFC 关联技术援助提供方作为机构启动项目的联合销售伙伴"
    - "加纳生态系统顾问（影响力金融顾问、农业科技和医疗科技领域行业加速器）作为引荐来源"
  funnelTargets: "目标机构到探索会议 80%+；探索到试点范围确认 25–40%；试点确认到签约 50–65%；试点到年度合同转化 60%+"
  pricing: >-
    每个活跃放贷项目的年度 SaaS 订阅：1 至 30 个活跃创业借款方 ACV $80–120k；每个新项目
    启动的上线和工作流配置费 $15–25k；需要联合投资方或公共项目基准测试的项目每年高级分析
    模块费 $20–30k。定价锚定担保或联合投资机构解锁的项目预算，确保年费可作为运营支出而非
    资本支出决策被消化。
businessModel:
  revenueStreams:
    - "每个活跃放贷项目的年度平台订阅（每个项目内按借款方层级定价）"
    - "每个新项目启动的上线和工作流配置费"
    - "用于跨项目投资组合基准测试和联合投资方证据包的高级分析模块"
  unitOfValue: "活跃放贷项目（按项目内注册创业借款方数量定义）"
  targetGrossMarginPct: 70
  expansionLevers:
    - "单一机构内多项目扩展（农业科技到医疗科技到教育科技项目）"
    - "地理扩张至西非，再到更广泛的泛非洲 DFI 和混合融资项目"
    - "更高 ACV 层级的高级联合投资方和担保伙伴报告模块"
    - "面向生态系统组织和担保提供方的基准数据订阅"
strategyMap:
  northStarMetric: "通过操作系统完成下一批次放款的活跃里程碑式创业贷款数量（工作流采纳和信贷委员会信任的证明）"
  inputMetrics:
    - "每季度签约放贷项目数"
    - "每位借款方从机构批准到首次提款的天数（贷款机构流程效率）"
    - "每季度每位活跃借款方记录的导师签到次数"
    - "无需人工线下干预生成的委员会审查包数量"
    - "试点到年度合同转化率"
  moatsToBuild:
    - "行业里程碑库：农业科技、医疗科技和教育科技 KPI 基准随每个项目批次积累，内部复制需要真实的信贷委员会验证"
    - "跨项目绩效数据集，将导师质量、里程碑严格性和还款结果关联——覆盖 50 个以上借款方的 3 至 5 个项目后具备防御性"
    - "贷款机构工作流锁定：一旦委员会审查包格式嵌入信贷审批流程，替换操作系统需要重新培训整个信贷链"
    - "项目合规模板：若《加纳创业法案》获批，操作系统将成为资格文件和监管报告的参考实现"
  killCriteria:
    - "产品上线后 12 个月内签约付费项目少于 2 个"
    - "3 个完成试点后试点到年度合同转化率低于 30%"
    - "平均企业销售周期超过 9 个月且未发现结构性加速因素"
    - "PFI 将 DBG 机构额度大规模引向传统中小企业放贷而非基于里程碑的创业账簿"
  mermaid: |
    flowchart LR
      Beachhead[DBG agritech program] --> Pilot[Paid design-partner pilot]
      Pilot --> Pack[First committee review pack]
      Pack --> Proof[Lighthouse reference]
      Proof --> Expand[Healthtech and edtech programs]
      Expand --> PanAfrica[Pan-African DFI programs]
investorMemo:
  verdict:
    call: "继续推进 / 深入调研"
    conviction: "可信的运营切口与真实政策转变挂钩；信念取决于 90 天内确认 2 个以上 PFI 正积极建立基于里程碑的创业放贷业务"
    whyBelieve: "DBG 公开转向 10 至 15 年期创业贷款加捆绑辅导，产生了没有现有加纳专属厂商覆盖的即时工作流缺口，且买家触发器是有资金支持的机构，而非自由裁量采购。"
    whyDoubt: "证据基础是单一地区报告，加纳买家池太小，风险投资规模完全依赖泛非洲扩张，贷款机构可能用通用中小企业工具或电子表格替代，而非采纳新的软件类别。"
    nextDiligence: "确认至少 3 家加纳 PFI 正积极确定基于里程碑的创业放贷运营范围，并在 90 天内签署付费试点工作说明书。"
  firstCustomer:
    title: "DBG 参与加纳全能银行的中小企业/创业放贷负责人"
    profile: "拥有新批准的 DBG 支持机构、目标为营收后期农业科技创业企业的全能银行；5 至 50 人放贷团队，配有专职客户关系经理和向首席信贷官汇报的项目主任。"
    trigger: "收到要求里程碑治理和导师报告的 DBG 支持创业放贷额度，或在《加纳创新与创业法案》出台和预期联合投资尽调要求到来前建立内部管控。"
    buyer: "首席信贷官或中小企业/创业银行业务负责人"
    initialContract: "$15–25k 上线费加 $60–80k 首年订阅（1 至 15 个活跃借款方）；若试点在第 2 年扩展至第二个行业或 15 个以上借款方，年合同可达 $80–120k。"
  mustBeTrue:
    - "至少 5 家加纳 PFI 在 24 个月内建立基于里程碑的创业放贷项目，形成足够大的买家池，在泛非洲扩张前在加纳达到 $500–700k ARR。"
    - "目标 PFI 的信贷委员会在标准审查模板打包并经担保伙伴预确认后，将接受行业 KPI 里程碑作为法律上充分的分批放款证据。"
    - "贷款机构对导师跟踪集成的重视程度足以为叠加层付费，而非用现有 LOS 或 M&E 工具的廉价变通方案延伸。"
    - "产品可在合同签署后 8 周内以轻量级叠加层形式部署在现有核心银行或 LOS 系统之上，无需昂贵的定制集成项目。"
    - "加纳灯塔交易在 36 个月内可复制至至少 3 个其他非洲市场，解锁泛非洲风险投资论点和成长轮融资所需的 TAM。"
  diligenceQuestions:
    - "哪些具体 PFI 已收到或申请 DBG 支持创业放贷额度，且正在积极筹备内部基于里程碑的流程——而非仅仅计划中？"
    - "在创业借款方上生成一份委员会审查包的当前人工流程是什么，一个周期消耗多少人时？"
    - "目标 PFI 的首席信贷官能否在现有运营预算下签署试点工作说明书，还是需要新的资本支出委员会批准？"
    - "在没有《加纳创新与创业法案》明确监管指引的情况下，信贷委员会愿意将哪些行业 KPI 作为分批放款触发条件？"
    - "DBG 的 MEL 要求如何转化为 PFI 的具体报告义务，DBG 是否在项目层面授权或激励特定数字基础设施？"
    - "哪些竞争对手或咨询公司已就类似提案接触过目标 PFI，反应如何？"
operatingAssumptions:
  - assumption: "PFI 将在现有运营预算下为独立项目操作系统付费，无需新的资本支出审批或将采购捆绑进更广泛的放贷转型项目。"
    basis: "idea.yaml"
    validationTest: "在第 1 至 3 个月探索访谈中向 5 家目标 PFI 提出 $80–120k 定价；跟踪拒绝率和异议类型（预算 vs. 类别 vs. 集成）。"
    decisionImpact: "若独立采购需要资本支出审批，GTM 转为与放贷转型顾问联合销售，初始 ACV 降低；融资需求和人员计划需要修订。"
  - assumption: "每个项目年度 ACV $80–120k 在目标 PFI 现有运营预算内可实现；项目已通过机构启动解锁顾问和实施支出。"
    basis: "research.yaml"
    validationTest: "与 3 位共创客户候选人分别测试试点工作说明书（$15–25k）与年度平台提案（$80–120k）定价；观察付费意愿和阻力门槛。"
    decisionImpact: "若 ACV 须降至 $60k 以下才能成交，单位经济恶化，融资需求须增加或人员须减少以保留现金跑道。"
  - assumption: "目标 PFI 的信贷委员会在标准审查模板打包并经担保伙伴预确认后，将接受行业专属 KPI 里程碑作为法律上充分的分批放款证据。"
    basis: "idea.yaml"
    validationTest: "在 MVP 范围确定前与 2 位首席信贷官和 1 位担保伙伴验证 3 套农业科技里程碑样本；若里程碑被拒，确定可接受的证据格式。"
    decisionImpact: "若里程碑不被接受为放款触发条件，产品必须增加抵押品估值或担保账户功能，扩大范围并将 MVP 推迟至少 3 个月。"
  - assumption: "产品可在前 12 个月内通过 CSV 导出和基于文件的集成，以轻量级叠加层形式部署在现有核心银行或 LOS 系统之上，无需提前进行深层 API 集成。"
    basis: "research.yaml"
    validationTest: "在 MVP 范围确定前与 3 家共创客户机构的 IT 和运营团队确认集成需求；评估文件导出的数据交接是否对试点可接受。"
    decisionImpact: "若从第一天起就需要深层核心集成，构建成本和时间线将大幅增加，种子融资需求须增加 $50–100 万美元。"
  - assumption: "至少一个泛非洲地区（尼日利亚、肯尼亚或塞内加尔）拥有可比的耐心资本或混合融资创业放贷项目，并将接受加纳灯塔参考作为启动试点对话的充分证明。"
    basis: "运营判断"
    validationTest: "在第 12 个月使用加纳参考对 3 个非加纳 DFI 或混合融资项目进行资格预审；评估里程碑库和报告模型是否无需全面重新配置即可迁移。"
    decisionImpact: "若泛非洲扩张受当地监管或项目设计差异阻碍，风险投资规模上限为加纳级 ARR，无法在 A 轮融资；服务或平台收购成为退出路径。"
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "PFI 客户探索访谈"
    hypothesis: "12 位加纳中小企业或创业放贷负责人中至少 5 位将确认正在准备里程碑式提款流程，并将在未来 6 个月评估付费试点。"
    successMetric: "5 次以上探索访谈确认活跃项目启动；至少 2 位在 90 天内同意试点范围确认会议。"
    owner: "创始商务负责人"
  - horizon: "0–90 天"
    experiment: "与一个活跃放贷团队进行人工工作流跟踪"
    hypothesis: "跟踪一个活跃中小企业项目将揭示每个借款方审查周期至少 8 小时的人工工作，操作系统可直接消除。"
    successMetric: "记录显示至少 5 个人工步骤和每次借款方审查至少 2 小时可直接自动化的交接图。"
    owner: "创始商务负责人"
  - horizon: "90–180 天"
    experiment: "与信贷委员会验证农业科技里程碑库"
    hypothesis: "两位首席信贷官将确认所提议的 5 个农业科技 KPI 中至少 3 个在没有进一步监管指引的情况下可作为分批放款证据接受。"
    successMetric: "来自 2 位首席信贷官关于可接受里程碑类型的书面或录音确认；至少 1 位愿意在实际试点中使用。"
    owner: "创始工程师和商务负责人"
  - horizon: "90–180 天"
    experiment: "与一家共创客户机构签署首个付费试点工作说明书"
    hypothesis: "在签约 60 天内交付首份委员会审查包将建立一位内部拥护者，加速年度合同决策。"
    successMetric: "首份审查包在无重大线下人工返工的情况下被信贷委员会接受；在第 90 天前通过姓名确认内部拥护者。"
    owner: "客户成功负责人"
  - horizon: "180–270 天"
    experiment: "独立与捆绑定价模式测试"
    hypothesis: "独立年度订阅（$80–120k）在至少 3 位共创客户候选人中有 2 位优先于捆绑实施业务。"
    successMetric: "3 位候选人中 2 位接受独立订阅定价；成交时平均 ACV 高于 $80k。"
    owner: "创始商务负责人"
  - horizon: "270–365 天"
    experiment: "DBG 引荐渠道与冷外联对比"
    hypothesis: "通过 DBG 项目办公室介绍来源的交易比向同级 PFI 冷外联至少快 4 周成交。"
    successMetric: "DBG 引荐交易从首次会议到签约的时间比引荐渠道至少短 4 周；引荐渠道产生至少 2 个合格机会。"
    owner: "创始商务负责人"
  - horizon: "12–18 个月"
    experiment: "使用加纳灯塔参考进行泛非洲地区探索"
    hypothesis: "加纳灯塔参考足以与加纳以外西非 2 个以上 DFI 关联贷款机构开启试点对话。"
    successMetric: "第 18 个月前 2 个合格的非加纳管道机会推进至试点范围确认。"
    owner: "CEO"
operations:
  - "云托管多租户 SaaS；为合同和数据驻留设立加纳法人实体；根据加纳数据保护局注册要求，为每个贷款机构项目配置可定制数据处理协议"
  - "里程碑库以版本控制模板仓库维护；行业 KPI 更新由每个项目批次审查后信贷委员会反馈触发"
  - "MVP 数据集成通过 CSV/Excel 导入和 PDF/Excel 导出；目标在第 18 个月前通过 REST API 集成至少一家加纳核心银行系统"
  - "DPIA 和数据注册流程嵌入贷款机构上线清单；法律伙伴保留合同用于《创业法案》跟踪和持续隐私合规"
  - "项目成功经理负责上线后委员会审查包审核、季度借款方 KPI 审计和年度合同续签管理"
team:
  - role: "创始工程师（后端与工作流）"
    startTiming: "第 0 个月"
    rationale: "构建里程碑提款工作流引擎、分批放款审批链和委员会审查包生成；须熟悉金融科技合规要求和非洲银行集成模式。"
  - role: "创始商务负责人（CEO）"
    startTiming: "第 0 个月"
    rationale: "主导向目标 PFI 和 DBG 项目关系的创始人级销售；负责共创客户管道、试点范围确认和定价验证实验。"
  - role: "客户成功与实施负责人"
    startTiming: "第 3 个月"
    rationale: "为每个新项目配置里程碑库，培训客户关系经理，运营上线后支持；对试点到年度合同转化率至关重要。"
  - role: "行业专家（农业科技或医疗科技）"
    startTiming: "第 6 个月"
    rationale: "为第二优先行业开发 KPI 库和里程碑模板；在第二个产品版本发布前与信贷委员会和担保伙伴验证输入。"
milestones:
  - horizon: "0–12 个月"
    items:
      - "第 2 个月前与至少 1 家加纳 PFI 签署共创客户协议"
      - "第 4 个月前首位共创客户的 MVP 里程碑提款工作区上线"
      - "第 6 个月前首份农业科技委员会审查包生成并被信贷委员会接受"
      - "与 2 位首席信贷官和 1 位担保伙伴验证农业科技里程碑库"
      - "第 12 个月前 2 个付费项目上线，至少 1 个签署年度合同"
  - horizon: "12–24 个月"
    items:
      - "3 个活跃付费项目，ARR $25–40 万"
      - "医疗科技行业模板上线并被至少 1 个项目采用"
      - "联合投资方报告模块发布并在至少 1 个委员会周期中使用"
      - "与一家非加纳机构确定首个泛非洲扩张机会范围"
      - "与至少 1 家加纳核心银行系统的 API 集成上线"
  - horizon: "24–36 个月"
    items:
      - "6 个以上活跃项目，ARR $60–80 万"
      - "至少 1 笔非加纳泛非洲交易签署"
      - "覆盖 3 个以上行业和 50 个以上创业借款方的跨项目基准数据集"
      - "教育科技模板库发布；若法案通过则发布《创业法案》合规模块"
risks:
  - risk: "加纳买家池过于集中，无法在没有泛非洲扩张的情况下达到风险投资规模"
    likelihood: High
    impact: High
    mitigation: "利用加纳在第 12 个月建立灯塔参考；在第 12 至 18 个月进行泛非洲地区探索；第 3 年目标 3 个以上非加纳项目；将加纳 ARR 视为概念验证而非终点。"
  - risk: "企业销售周期超过每笔 6 个月，在达到 2 个付费项目前耗尽现金跑道"
    likelihood: High
    impact: Medium
    mitigation: "先以固定上线费（$15–25k）的付费试点形式销售，而非要求完整年度合同决策；60 天内交付首份委员会审查包以建立加速续约的内部拥护者。"
  - risk: "PFI 扩展通用中小企业贷款工具或电子表格工作流，而非采纳新的软件类别"
    likelihood: Medium
    impact: High
    mitigation: "靠特异性制胜：行业里程碑库和一键审查包难以在通用 LOS 中复制；将试点定价设在运营预算内可消化的水平，无需资本支出审批。"
  - risk: "信贷委员会拒绝将行业 KPI 里程碑作为分批放款的充分法律依据"
    likelihood: Medium
    impact: High
    mitigation: "在 MVP 范围确定前与 2 位首席信贷官和 1 位担保伙伴验证里程碑可接受性；若被拒，确定可接受的证据格式并在首个试点上线前调整产品范围。"
  - risk: "《加纳创新与创业法案》推迟或以比市场预期更轻的细节通过"
    likelihood: Medium
    impact: Low
    mitigation: "产品价值不依赖该法案；紧迫性转向纯运营效率而非政策合规；与法案挂钩的资格模块是附加功能，可推迟至第 18 个月以后。"
  - risk: "单一来源证据基础意味着实际贷款机构准备就绪度可能与初始 DBG 信号有所不同"
    likelihood: Medium
    impact: Medium
    mitigation: "在前 90 天内通过 8 至 12 次 PFI 探索访谈和一次工作流跟踪验证所有假设，然后再确定产品范围或在创始团队之外招聘。"
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: "18 个月现金跑道，用于招募 4 名创始团队成员（2 名工程师、商务负责人、客户成功负责人）、构建和发布 MVP、签署 2 个付费项目、与信贷委员会验证行业里程碑库，以及确定首个泛非洲扩张机会资格。"
