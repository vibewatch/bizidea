regulatoryTechnicalConstraints:
- point: "借款方数据控制者必须在注册时记录处理目的、接收方、安全措施及任何跨境传输。"
  sourceRefs:
  - 14
- point: "高风险处理及任何自动化或类画像工作流应经过 DPIA 流程。"
  sourceRefs:
  - 13
- point: "DBG 是通过 PFI 运作的批发机构，因此产品必须支持贷款机构间和贷款机构至借款方的交接，而非假设直接面向零售端的发起。"
  sourceRefs:
  - 1
  - 2
- point: "DBG 的架构已在 PFI 和终端借款方层面明确要求 MEL、仪表板和数字融资组件。"
  sourceRefs:
  - 2
  - 5
validationSignals:
- point: "IFC 的 Access Bank 机构在高达 $20M 等值中小企业放贷上配套 50% 担保及顾问支持，表明去风险放贷加能力建设的真实需求。"
  sourceRefs:
  - 7
- point: "中小企业 GO 已为金融和技术支持调动了 GHC 82 亿，说明项目预算足以容纳一个工作流层。"
  sourceRefs:
  - 4
- point: "GhISP 报告了投前和投后技术援助后的 6 笔总额 $15M 的投资交易，表明支持工作流在加纳已具重要价值。"
  sourceRefs:
  - 19
- point: "Shell Foundation 的辅导项目中 88% 的创业企业持续推进投资者对话，支持了导师联动监控的论点。"
  sourceRefs:
  - 25
- point: "VC4A 发现获得支持的加纳创业企业更频繁地获得投资且平均融资额更大，强化了结构化生态系统支持的价值。"
  sourceRefs:
  - 27
openQuestions:
- "除 DBG 本身外，哪些 PFI 实际上正在准备向加纳创业企业而非传统中小企业账簿发放 10 至 15 年期里程碑贷款？"
- "即将出台的《加纳创新与创业法案》（如有）将规定哪些具体数据、报告或资格规则？"
- "在农业科技、医疗科技和教育科技领域，信贷委员会愿意接受哪些行业 KPI 作为分批放款证据？"
- "首批买家会偏好叠加在现有贷款系统上的工作区，还是作为更广泛放贷转型项目内部更深层核心集成来购买？"
