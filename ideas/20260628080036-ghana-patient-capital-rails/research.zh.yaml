    - 34
    - 36
    - 37
  validationPlan:
  - priority: "high"
    question: "哪些 PFI 实际上正在准备在 DBG、中小企业 GO 或类似机构下发起里程碑式创业贷款？"
    evidenceToGather: "五至八次贷款机构访谈，加上与一个指定机构和审批工作流的确认试点范围。"
  - priority: "high"
    question: "贷款审批、导师沟通到委员会报告之间，目前有多少人工工作量？"
    evidenceToGather: "跟随一个活跃中小企业项目的放贷团队和一个技术援助/投资组合团队开展工作跟踪；梳理交接、电子表格和审批流程。"
  - priority: "medium"
    question: "哪些农业科技、医疗科技和教育科技 KPI 对信贷委员会来说可作为分批放款证据被接受？"
    evidenceToGather: "收集三份信贷审查包样本，与两位首席信贷官和一位担保伙伴验证里程碑库。"
  - priority: "low"
    question: "买家会直接为叠加层工作流付费，还是只在捆绑进更广泛的机构实施预算时才愿意买单？"
    evidenceToGather: "与两位共创客户和一位实施顾问，分别测试试点工作说明书定价与年度平台提案定价。"
