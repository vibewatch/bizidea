jobsToBeDone:
  - job: >-
      When our bank receives a startup-lending allocation, help our credit team structure drawdowns and milestone reviews,
      so we can approve more companies without abandoning risk discipline.
    currentAlternative: "Manual credit memos, spreadsheet milestone trackers, and ad hoc post-investment calls"
    successMetric: "Time from facility approval to first disbursement and number of manual exceptions per borrower review"
  - job: >-
      When public backers or co-investors ask how the portfolio is performing, help our program managers produce one
      evidence pack that links capital deployed, mentor support, and startup progress, so we can unlock follow-on funding.
    currentAlternative: "Rebuilding portfolio reports from email updates, borrower documents, and separate support-program notes"
    successMetric: "Days to produce an investment-committee or co-investor report and follow-on capital unlocked per program"
