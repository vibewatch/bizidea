topRisks:
  - name: Thin source base
    description: "Because the cluster rests on one regional report, the exact rollout model, participating lenders, and policy timeline may differ from the initial signal."
    mitigation: "Start with configurable workflows, validate assumptions with design partners, and treat bill-linked reporting and eligibility logic as editable program templates."
  - name: Long enterprise sales cycles
    description: "Banks and public-capital programs may move slowly, especially when introducing a new startup-lending product and committee process."
    mitigation: "Sell first as a paid pilot on one facility with fast reporting wins, then expand after the lender proves it can deploy capital and satisfy oversight requirements."
  - name: Small initial buyer pool
    description: "Only a limited number of Ghanaian institutions may launch patient-capital startup debt programs in the near term."
    mitigation: "Use Ghana to win lighthouse programs, then expand into adjacent African markets and other blended-finance lenders that face the same milestone-based monitoring problem."
