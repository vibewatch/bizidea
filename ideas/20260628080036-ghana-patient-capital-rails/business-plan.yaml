slug: milestone-startup-lending-os
date: "2026-06-28"
executiveSummary: >-
  Ghana Development Bank has publicly shifted startup lending toward 10- to 15-year patient capital paired with
  mentorship, creating an immediate servicing workflow gap that standard SME loan systems cannot handle. The
  core problem is operational: Ghanaian lenders cannot safely stage drawdowns against startup milestones, track
  mentor interventions alongside financial covenants, or produce audit-ready evidence packs for credit
  committees and co-investors without rebuilding reports manually from email and spreadsheets. This startup
  builds a milestone-based lending OS giving lenders a purpose-built program workspace covering eligibility
  intake, staged drawdowns tied to sector KPIs, mentor-action logging, and one-click committee review pack
  generation. The beachhead is Ghanaian financial institutions deploying DBG-backed capital into post-revenue
  agritech, healthtech, and edtech startups requiring 10- to 15-year tenors. No existing vendor clearly owns
  Ghana-specific patient-capital servicing with mentor-linked milestone governance; incumbents cover origination
  or core lending but not the public-program evidence layer. Revenue is an annual SaaS subscription per active
  lending program (target $80-120k ACV) plus onboarding fees, with a 70% gross-margin target as
  implementation services diminish. The Ghana buyer pool is concentrated (estimated 15 near-term programs), so
  the venture thesis depends on converting one lighthouse deal into a replicable model for similar African DFI
  and blended-finance lenders. The evidence base rests on a single verified regional source; customer discovery
  in the first 90 days must confirm lender readiness, acceptable milestone types, and willingness to pay before
  committing full product scope.
problem:
  - "DBG-backed lenders have no purpose-built workflow for staging drawdowns against startup milestones such
    as revenue thresholds or pilot contracts—every deal is a manual exception in tools built for
    collateral-led short-tenor SME credit."
  - "Mentorship is bundled into patient-capital loans but tracked in ad hoc calls and emails, leaving no
    auditable link between mentor interventions and covenant or tranche-release decisions."
  - "Committee-ready evidence packs linking capital deployed, mentor support, and borrower KPIs are rebuilt
    manually for each review cycle, costing days per program and introducing inconsistency across cohorts."
  - "Standard SME loan-management systems assume amortizing schedules and hard collateral; 10- to 15-year
    milestone-based tenors force error-prone workarounds that undermine risk discipline and prevent
    program scale."
solution:
  - "A program-specific OS that converts each approved startup loan into a staged drawdown plan with
    configurable sector milestones (agritech supply-chain performance, healthtech clinic contracts, edtech
    school enrollments), covenant thresholds, and credit-committee tranche-release triggers."
  - "A mentor-action layer where relationship managers and external mentors log structured interventions
    against a mandatory workflow, making support activity auditable alongside financial exposure in the
    same system."
  - "A committee-ready reporting module that auto-generates review packs showing covenant status, KPI
    trends, sector milestone evidence, and public-program compliance documents—eliminating manual
    spreadsheet rebuilds before each credit-committee cycle."
  - "Deployed as an overlay above existing core-banking or LOS systems via file exports and APIs; no core
    replacement required, reducing integration risk and shortening the sales motion to 3-6 months."
whyWeWin:
  - "No Ghana-specific competitor clearly owns mentor-linked patient-capital servicing; nCino and Mambu
    handle origination or core lending but not the public-program evidence layer and milestone governance."
  - "The product installs as a program overlay rather than a core replacement, making it faster and cheaper
    to evaluate in a pilot than a full LOS switch."
  - "Sector milestone libraries and cross-program benchmark data become sticky after two to three cohorts,
    creating switching costs grounded in accumulated credit-committee-validated operating knowledge."
  - "The buyer trigger is a funded facility launch—budget already exists and urgency is real—rather than a
    discretionary technology investment."
  - "DBG's own architecture explicitly requires MEL, dashboards, and digital financing components at PFI
    level, validating the orchestration layer and creating a warm referral channel for early sales."
strategicChoices:
  beachhead: >-
    Ghanaian banks and non-bank financial institutions launching or expanding DBG-backed startup-lending
    programs for post-revenue agritech startups requiring 10- to 15-year tenors, milestone-based
    disbursement, and recurring credit-committee reviews without traditional collateral workflows.
  wedgeRationale: >-
    Agritech is the top DBG priority sector with the clearest measurable milestones (supply-chain volume,
    offtake contracts), making it the fastest path to a credit-committee-accepted proof point. One working
    review pack accepted in a live program is more persuasive than a demo and creates the reference artifact
    needed to close the second and third institutions.
  sequencingRationale: >-
    Build the agritech milestone library first, sign one paying design-partner pilot, deliver the first
    committee review pack within 60 days, then use that lighthouse reference to close the second and third
    programs. Hiring trails signed pilots to preserve runway. Core-banking API integration waits until month
    12 to avoid blocking the MVP while integration requirements are still being confirmed with design
    partners. Pan-African geography probe starts at month 12 once the Ghana reference is established.
  notYet:
    - "Pan-African expansion before the first Ghana lighthouse program produces a verified co-investor-ready reference"
    - "Core-banking integration or core replacement in the first 12 months—land as overlay first"
    - "Consumer-facing borrower mobile app—lender-facing workspace is the initial product scope"
    - "Generic high-growth SME lending outside the patient-capital and startup-debt segment"
    - "Equity or grant-program management—stay on the debt-instrument side where tranche control is clearest"
market:
  tam: "$7.3M — 61 addressable Ghana institutions (23 banks, 26 savings and loans, 11 finance houses, 1 DFI) at ~$120k ACV per program (research estimate)"
  sam: "$1.8M — 15 near-term Ghana programs likely to launch structured startup lending at ~$120k ACV (research estimate)"
  som: "$0.7M — 6 programs by year 3 at ~$120k ACV; pan-African expansion market not yet sized (research estimate)"
  segments:
    - "Ghana banks and non-bank lenders operating DBG-backed or SME GO-linked startup and high-growth SME lending programs"
    - "Pan-African development banks, sovereign impact funds, and commercial banks running milestone-based blended-finance lending programs"
  buyingProcess: >-
    Decision made jointly by the chief credit officer (risk acceptance) and the SME or startup banking head
    (program owner); procurement is triggered by a new DBG or guarantee facility allocation or a committee-
    readiness audit ahead of incoming co-investment; first-pilot sales cycles expected at 3-6 months;
    expansion renewals driven by committee reporting wins and program director advocacy.
product:
  mvp: >-
    Configurable milestone-drawdown workspace for one lending program: eligibility intake form, staged
    drawdown plan with agritech-sector KPI fields, mentor check-in log, and one-click committee review pack
    export in PDF and Excel. No core-banking integration required at launch; CSV import and export only.
  sixMonth: "Three agritech milestone templates validated with at least one design-partner credit committee; tranche-release approval workflow with full audit trail; basic portfolio dashboard for program director."
  twelveMonth: "Healthtech and edtech sector templates; multi-program support for a second institution; co-investor reporting module linking mentor actions to portfolio outcomes; API integration scoped with one Ghanaian core-banking system."
  twentyFourMonth: "API integration live with at least one major Ghanaian core-banking system; cross-program benchmark analytics covering three sectors; configurable eligibility module for Startup Bill compliance if enacted; Ghana-to-West-Africa program template library."
  keyBets:
    - "Credit committees will accept structured KPI-based milestone evidence as legally adequate tranche-release trigger once packaged in a standardized review template—not confirmed in any live deal yet."
    - "Program overlay positioning avoids the core-replacement objection and shortens the enterprise sales cycle from 12 months to 3-6 months."
    - "Sector milestone libraries become the primary switching cost because rebuilding them internally is slower and less validated than retaining the platform."
gtm:
  wedge: >-
    Founder-led paid pilot on one DBG-backed agritech startup-lending facility; deliver the first committee
    review pack within 60 days of signing to create an internal champion before the annual subscription
    decision; then expand to a second sector and a second institution using the accepted review pack as a
    reference artifact.
  channels:
    - "Direct founder sales to heads of SME and startup banking at the 15 near-term Ghana target institutions"
    - "DBG program-office relationships as warm referral channel to participating financial institutions"
    - "SME GO and IFC-linked technical-assistance providers as co-sell partners on facility-launch projects"
    - "Ghana ecosystem advisers (impact-finance consultants, sector accelerators in agritech and healthtech) as referral sources"
  funnelTargets: "Target institution to discovery meeting 80%+; discovery to pilot scoping 25-40%; pilot scoping to signed SOW 50-65%; pilot to annual contract conversion 60%+"
  pricing: >-
    Annual SaaS subscription per active lending program: $80-120k ACV for 1-30 active startup borrowers;
    onboarding and workflow-configuration fee of $15-25k per new program launch; premium analytics module at
    $20-30k per year for programs requiring co-investor or public-program benchmarking. Pricing anchors to
    program budgets unlocked by guarantee or co-investment facilities, keeping the annual fee absorbable as
    an operational line rather than a capex decision.
businessModel:
  revenueStreams:
    - "Annual platform subscription per active lending program (per-borrower tiers within each program)"
    - "Onboarding and workflow-configuration fees per new program launch"
    - "Premium analytics module for cross-program portfolio benchmarking and co-investor evidence packs"
  unitOfValue: "Active lending program (defined by number of enrolled startup borrowers within a program)"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Multi-program expansion within a single institution (agritech to healthtech to edtech programs)"
    - "Geographic expansion into West Africa then broader pan-African DFI and blended-finance programs"
    - "Premium co-investor and guarantee-partner reporting modules at higher ACV tiers"
    - "Benchmark data subscriptions for ecosystem organizations and guarantee providers"
strategyMap:
  northStarMetric: "Number of active milestone-based startup loans reaching next tranche release through the OS (proof of workflow adoption and credit-committee trust)"
  inputMetrics:
    - "Signed lending programs per quarter"
    - "Days from facility approval to first drawdown per borrower (lender process efficiency)"
    - "Mentor check-ins logged per active borrower per quarter"
    - "Committee review packs generated without manual off-platform intervention"
    - "Pilot-to-annual-contract conversion rate"
  moatsToBuild:
    - "Sector milestone libraries: agritech, healthtech, and edtech KPI benchmarks accumulate with each program cohort and require real credit-committee validation to reproduce"
    - "Cross-program performance dataset linking mentor quality, milestone rigor, and repayment outcomes—defensible after 3-5 programs covering 50+ borrowers"
    - "Lender workflow lock-in: once the committee review pack format is embedded in the credit-approval cycle, replacing the OS requires retraining the entire credit chain"
    - "Program-compliance templates: if the Ghana Startup Bill is enacted, the OS becomes the reference implementation for eligibility documentation and regulatory reporting"
  killCriteria:
    - "Fewer than 2 paying programs signed within 12 months of product launch"
    - "Pilot-to-annual-contract conversion rate below 30% after 3 completed pilots"
    - "Average enterprise sales cycle exceeds 9 months with no structural accelerant identified"
    - "PFIs channel DBG facilities into conventional SME lending rather than milestone-based startup books at scale"
  mermaid: |
    flowchart LR
      Beachhead[DBG agritech program] --> Pilot[Paid design-partner pilot]
      Pilot --> Pack[First committee review pack]
      Pack --> Proof[Lighthouse reference]
      Proof --> Expand[Healthtech and edtech programs]
      Expand --> PanAfrica[Pan-African DFI programs]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Credible operational wedge tied to a real policy shift; conviction hinges on confirming 2+ PFIs are actively standing up milestone-based startup lending desks within 90 days"
    whyBelieve: "DBG's public shift to 10- to 15-year startup loans with bundled mentorship creates an immediate workflow gap that no existing Ghana-specific vendor addresses, and the buying trigger is a funded facility rather than a discretionary purchase."
    whyDoubt: "The evidence base is a single regional report, the Ghana buyer pool is small enough that venture scale depends entirely on pan-African expansion, and lenders may extend generic SME tools or spreadsheets rather than adopt a new software category."
    nextDiligence: "Confirm that at least 3 Ghanaian PFIs are actively scoping milestone-based startup lending operations and would sign a paid pilot SOW within 90 days."
  firstCustomer:
    title: "SME/Startup Lending Head at a DBG-participating Ghanaian universal bank"
    profile: "A universal bank with a newly approved DBG-backed facility targeting post-revenue agritech startups; 5-50 person lending team with a dedicated relationship manager and program director reporting to the chief credit officer."
    trigger: "Receiving a DBG-backed startup-lending allocation requiring milestone governance and mentor reporting, or preparing internal controls ahead of the Ghana Innovation and Startup Bill and expected co-investment due-diligence requirements."
    buyer: "Chief credit officer or head of SME/startup banking"
    initialContract: "$15-25k onboarding fee plus $60-80k first-year subscription for 1-15 active borrowers; path to $80-120k annual contract if the pilot expands to a second sector or 15+ borrowers in year 2."
  mustBeTrue:
    - "At least 5 Ghanaian PFIs will stand up milestone-based startup lending programs within 24 months, creating a buyer pool large enough to reach $500-700k ARR in Ghana before pan-African expansion."
    - "Credit committees at target PFIs will accept sector KPI milestones as legally adequate tranche-release evidence once packaged in a standardized review template and pre-cleared with a guarantee partner."
    - "Lenders value the mentor-tracking integration enough to pay for the overlay rather than extend an existing LOS or M&E tool with a cheaper workaround."
    - "The product can be deployed as a lightweight overlay above existing core-banking or LOS systems within 8 weeks of contract signing without a costly custom integration project."
    - "The Ghana lighthouse deal is replicable into at least 3 additional African markets within 36 months, unlocking the pan-African venture thesis and the TAM required for a growth-stage funding round."
  diligenceQuestions:
    - "Which specific PFIs have received or applied for DBG-backed startup lending lines and are actively preparing internal milestone-based processes right now—not merely planning to?"
    - "What is the current manual process for producing a committee review pack on a startup borrower, and how many person-hours does one cycle consume?"
    - "Would the chief credit officer at a target PFI sign a pilot SOW under existing operational budgets, or does it require a new capex committee approval?"
    - "Which sector KPIs are credit committees willing to treat as tranche-release triggers without explicit regulatory guidance from the Ghana Innovation and Startup Bill?"
    - "How does DBG's MEL requirement translate into concrete reporting obligations on PFIs, and does DBG mandate or incentivize specific digital infrastructure at the program level?"
    - "Which competitors or consulting firms have already approached target PFIs with a similar pitch, and what was the reception?"
operatingAssumptions:
  - assumption: "PFIs will pay for a standalone program OS under existing operational budgets rather than requiring a new capex approval or bundling the purchase into a broader lending-transformation project."
    basis: "idea.yaml"
    validationTest: "Present $80-120k pricing to 5 target PFIs during discovery interviews in months 1-3; track rejection rate and objection type (budget vs. category vs. integration)."
    decisionImpact: "If standalone purchase requires capex approval, GTM shifts to co-sell with lending-transformation consultants at lower initial ACV; funding ask and headcount plan need revision."
  - assumption: "Annual ACV of $80-120k per program is achievable within existing operational budgets at target PFIs; programs already have advisory and implementation spend unlocked by facility launches."
    basis: "research.yaml"
    validationTest: "Run pricing tests on pilot SOW ($15-25k) vs. annual platform proposal ($80-120k) with 3 design-partner candidates; observe willingness to pay and pushback thresholds."
    decisionImpact: "If ACV must drop below $60k to close deals, unit economics deteriorate and the funding ask must increase or headcount must decrease to preserve runway."
  - assumption: "Credit committees at target PFIs will accept sector-specific KPI milestones as legally adequate tranche-release evidence once presented in a standardized review template and pre-cleared with a guarantee partner."
    basis: "idea.yaml"
    validationTest: "Validate 3 sample agritech milestone sets with 2 chief credit officers and 1 guarantee partner before MVP scope is locked; identify which evidence formats are acceptable if milestones are rejected."
    decisionImpact: "If milestones are not accepted as release triggers, the product must add collateral-valuation or guarantee-ledger features, expanding scope and delaying the MVP by at least 3 months."
  - assumption: "The product can be deployed as a lightweight overlay above existing core-banking or LOS systems via CSV exports and file-based integrations in the first 12 months without requiring deep API integration upfront."
    basis: "research.yaml"
    validationTest: "Confirm integration requirements with IT and operations teams at 3 design-partner institutions before MVP scope is locked; assess whether data handoff by file export is acceptable for the pilot."
    decisionImpact: "If deep core integration is required from day one, build cost and timeline increase materially and the seed funding ask would need to increase by $500k-1M."
  - assumption: "At least one pan-African geography (Nigeria, Kenya, or Senegal) has comparable patient-capital or blended-finance startup lending programs that will accept the Ghana lighthouse reference as sufficient proof for a pilot conversation."
    basis: "operator judgment"
    validationTest: "Qualify 3 non-Ghana DFI or blended-finance programs at month 12 using the Ghana reference; assess if the milestone-library and reporting model translates without full re-configuration."
    decisionImpact: "If pan-African expansion is blocked by local regulatory or program-design differences, the venture is capped at Ghana-level ARR and is not financeable at Series A; pivot to services or platform acquisition becomes the exit path."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "PFI customer discovery interviews"
    hypothesis: "At least 5 of 12 Ghanaian SME or startup lending heads will confirm they are preparing milestone-based drawdown processes and would evaluate a paid pilot in the next 6 months."
    successMetric: "5+ discovery interviews confirm active program launch; at least 2 agree to a pilot scoping call within 90 days."
    owner: "Founding Commercial Lead"
  - horizon: "0-90 days"
    experiment: "Manual workflow shadow with one active lending team"
    hypothesis: "Shadowing one active SME program will reveal 8+ hours of manual work per borrower review cycle that the OS can directly eliminate."
    successMetric: "Documented handoff map showing at least 5 manual steps and 2+ hours per borrower review that are directly automatable by the OS."
    owner: "Founding Commercial Lead"
  - horizon: "90-180 days"
    experiment: "Agritech milestone library validation with credit committees"
    hypothesis: "Two chief credit officers will confirm that at least 3 of 5 proposed agritech KPIs are acceptable as tranche-release evidence without further regulatory guidance."
    successMetric: "Written or recorded confirmation from 2 CCOs on acceptable milestone types; at least 1 willing to use them in a live pilot."
    owner: "Founding Engineer and Commercial Lead"
  - horizon: "90-180 days"
    experiment: "First paid pilot SOW with one design-partner institution"
    hypothesis: "Delivering the first committee review pack within 60 days of signing will create an internal champion who accelerates the annual contract decision."
    successMetric: "First review pack accepted by the credit committee without significant off-platform rework; internal champion identified by name before day 90."
    owner: "Customer Success Lead"
  - horizon: "180-270 days"
    experiment: "Standalone vs. bundled pricing model test"
    hypothesis: "Standalone annual subscription ($80-120k) is preferred over a bundled implementation engagement by at least 2 of 3 design-partner candidates."
    successMetric: "2 of 3 candidates accept standalone subscription pricing; average ACV above $80k at close."
    owner: "Founding Commercial Lead"
  - horizon: "270-365 days"
    experiment: "DBG referral channel vs. cold outreach comparison"
    hypothesis: "Deals sourced through DBG program-office introductions close at least 4 weeks faster than cold founder outreach to the same PFI tier."
    successMetric: "Time from first meeting to signed SOW is at least 4 weeks shorter for DBG-referred deals; referral channel generates at least 2 qualified opportunities."
    owner: "Founding Commercial Lead"
  - horizon: "12-18 months"
    experiment: "Pan-African geography probe using Ghana lighthouse reference"
    hypothesis: "The Ghana lighthouse reference is sufficient to open pilot conversations with 2+ DFI-linked lenders outside Ghana in West Africa."
    successMetric: "2 qualified non-Ghana pipeline opportunities advanced to pilot scoping by month 18."
    owner: "CEO"
operations:
  - "Cloud-hosted multi-tenant SaaS; Ghanaian legal entity for contracting and data residency; configurable data-processing agreements per lender program per Ghana Data Protection Authority registration requirements"
  - "Milestone library maintained as version-controlled template repository; sector KPI updates triggered by credit-committee feedback after each program cohort review"
  - "MVP data integration via CSV/Excel import and PDF/Excel export; REST API to at least one Ghanaian core-banking system targeted by month 18"
  - "DPIA and data-registration process embedded in lender onboarding checklist; legal partner retainer for Startup Bill tracking and ongoing privacy compliance"
  - "Program success manager responsible for post-go-live committee pack review, quarterly borrower KPI audits, and annual contract renewal management"
team:
  - role: "Founding Engineer (backend and workflow)"
    startTiming: "Month 0"
    rationale: "Builds the milestone-drawdown workflow engine, tranche-release approval chain, and committee pack generation; must be comfortable with fintech compliance requirements and African banking integration patterns."
  - role: "Founding Commercial Lead (CEO)"
    startTiming: "Month 0"
    rationale: "Leads founder-level sales into target PFIs and DBG program relationships; owns design-partner pipeline, pilot scoping, and pricing validation experiments."
  - role: "Customer Success and Implementation Lead"
    startTiming: "Month 3"
    rationale: "Configures milestone libraries for each new program, trains relationship managers, and runs post-go-live support; critical for pilot-to-annual-contract conversion rate."
  - role: "Sector Specialist (agritech or healthtech)"
    startTiming: "Month 6"
    rationale: "Develops KPI libraries and milestone templates for the second priority sector; validates inputs with credit committees and guarantee partners before the second product release."
milestones:
  - horizon: "0-12 months"
    items:
      - "Design-partner agreement signed with at least 1 Ghanaian PFI by month 2"
      - "MVP milestone-drawdown workspace live for first design partner by month 4"
      - "First agritech committee review pack generated and accepted by a credit committee by month 6"
      - "Agritech milestone library validated with 2 chief credit officers and 1 guarantee partner"
      - "2 paying programs live with at least 1 on annual contract by month 12"
  - horizon: "12-24 months"
    items:
      - "3 active paying programs with $250-400k ARR"
      - "Healthtech sector template live and adopted by at least 1 program"
      - "Co-investor reporting module shipped and used in at least 1 committee cycle"
      - "First pan-African expansion opportunity scoped with a non-Ghana institution"
      - "API integration live with at least 1 Ghanaian core-banking system"
  - horizon: "24-36 months"
    items:
      - "6+ active programs with $600-800k ARR"
      - "At least 1 non-Ghana pan-African deal signed"
      - "Cross-program benchmark dataset covering 3+ sectors and 50+ startup borrowers"
      - "Edtech template library released; Startup Bill compliance module shipped if bill is enacted"
risks:
  - risk: "Ghana buyer pool is too concentrated to reach venture scale without pan-African expansion"
    likelihood: High
    impact: High
    mitigation: "Use Ghana to build a lighthouse reference by month 12; run pan-African geography probe at months 12-18; target 3+ non-Ghana programs by year 3; treat Ghana ARR as proof of concept, not destination."
  - risk: "Enterprise sales cycles exceed 6 months per deal and exhaust runway before reaching 2 paying programs"
    likelihood: High
    impact: Medium
    mitigation: "Sell first as a paid pilot with a flat onboarding fee ($15-25k) rather than requiring a full annual-contract decision; deliver the first committee pack within 60 days to create an internal champion who accelerates renewal."
  - risk: "PFIs extend generic SME loan tools or spreadsheet workflows rather than adopting a new software category"
    likelihood: Medium
    impact: High
    mitigation: "Win on specificity: sector milestone libraries and one-click review packs are difficult to replicate in a generic LOS; price the pilot at a level absorbable in operational budgets without capex approval."
  - risk: "Credit committees reject sector KPI milestones as insufficient legal basis for tranche release"
    likelihood: Medium
    impact: High
    mitigation: "Validate milestone acceptability with 2 CCOs and 1 guarantee partner before MVP scope is locked; if rejected, identify acceptable evidence formats and adjust product scope before the first pilot goes live."
  - risk: "Ghana Innovation and Startup Bill delayed or enacted with lighter detail than the market expects"
    likelihood: Medium
    impact: Low
    mitigation: "Product value does not depend on the bill; urgency shifts to pure operational efficiency rather than policy compliance; bill-linked eligibility module is additive and can be deferred to month 18+."
  - risk: "Single-source evidence base means actual lender readiness may differ from the initial DBG signal"
    likelihood: Medium
    impact: Medium
    mitigation: "Validate all assumptions via 8-12 PFI discovery interviews and one workflow shadow in the first 90 days before committing product scope or hiring beyond the founding team."
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "18 months of runway to hire 4 founding team members (2 engineers, commercial lead, customer success lead), build and ship MVP, sign 2 paying programs, validate sector milestone libraries with credit committees, and qualify the first pan-African expansion opportunity."
