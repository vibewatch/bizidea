problem: >-
  消费级 AI 视频应用能靠炫酷的生成效果吸引用户，却常常被夹在爆发式需求和残酷的推理成本之间——多生成一秒钟的高级画面就多烧一份昂贵算力，可大多数团队还在用静态规则和内部仪表盘管理定价、配额和供应商选择。一旦模型定价、延迟或质量发生变化，利润率崩塌的速度，比产品团队重新打包体验的速度还快。
targetUser:
  primary: 消费级 AI 视频应用的产品与变现负责人
  secondary: 负责推理预算和订阅利润率的基础设施与财务团队
  buyer: 规模化多模态消费级 AI 应用的总经理、产品副总裁或 CFO
startupThesis:
  nonObviousInsight: >-
    稀缺的环节已经不再是原始视频生成本身。一旦 AI 视频应用有了真实收入，战略瓶颈就变成：该把哪些用户任务分配给高级算力、哪些可以降档或复用，以及这些取舍如何转化成盈利的订阅方案。
  beachhead: >-
    拥有付费订阅、月活 10 万至 200 万、每月在文生视频、数字人或对口型生成上花费 $200K 以上的消费级 AI 视频应用
  wedge: >-
    一个利润率控制平面：预测每个生成任务的成本和预期价值，在模型供应商与质量档位之间调度生成，同时动态调整配额、缓存和付费墙权益
  whyNowCatalyst: >-
    Kling AI 曝出的收入规模，加上围绕算力经济学和竞争对手收缩讲述的融资故事，说明 AI 视频应用现在就需要利润率智能——等不到赛道成熟以后。
  ventureScalePath: >-
    从消费级 AI 视频应用起步，再扩展到 AI 图像、音频和 3D 应用、创作者平台和企业视频 SaaS，成为把多模态生成成本与定价、留存、毛利率连接起来的操作系统。
solution: >-
  打造一个控制平面，卡在 AI 视频应用的模型供应商、产品分析和订阅计费系统之间。产品摄入每个任务的成本、延迟、质量结果、退款和升级行为，然后按用户群、使用场景和套餐档位推荐或自动执行路由规则。客户不用重写核心应用，就能上线动态生成额度、高级渲染升级销售、缓存复用策略和供应商故障切换。久而久之，这套系统会变成利润率大脑，告诉团队哪些视频体验该做快、做便宜、做高级，或者该被限流。
goToMarketSeed:
  firstCustomer: >-
    一家获得风险投资、有一个爆款创作循环、生产环境里至少接入两家模型供应商、月推理账单超过 $250K 的消费级 AI 视频应用
  buyingTrigger: >-
    新上线的高级视频功能或一次病毒式增长高峰，让推理开支超过订阅收入，逼团队在一个规划周期内重新审视配额和定价
  currentAlternative: >-
    内部仪表盘、电子表格、静态订阅上限，以及写死的供应商路由规则
  switchingReason: >-
    这个切口把任务级生成成本和变现结果连了起来，调整路由、配额和升级销售的速度，比内部团队重建自家应用经济模型的速度快得多。
  pricingHypothesis: >-
    年度平台费，外加按月生成量计费的用量档位，或经核实毛利率提升的分成。
