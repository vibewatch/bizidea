topRisks:
  - name: 自建的诱惑
    description: AI 视频应用可能认为利润率工具足够关键，宁愿留在自家产品和数据团队手里也不外包。
    mitigation: 从已经在跑多供应商和动态套餐的客户切入，靠速度、跨供应商基准测试，以及内部很难自建的变现控制来取胜。
  - name: 供应商波动
    description: 模型质量、定价或 API 可用性的快速变化，可能让任何单一路由策略迅速过时。
    mitigation: 构建与供应商无关的集成，把策略逻辑和供应商适配器分离开，把产品定位成应对市场剧变最快的方式。
  - name: 过度优化可能伤害用户体验
    description: 如果路由或限流决策保住了利润率，却让输出质量明显下降，转化率和留存率都可能下滑。
    mitigation: 策略上线前先用分群护栏、质量底线控制，并直接测量退款、流失和升级提升情况，再逐步扩大范围。
