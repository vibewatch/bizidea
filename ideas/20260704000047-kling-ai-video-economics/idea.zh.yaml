jobsToBeDone:
  - job: >-
      当我们的 AI 视频应用上线新的高级创作功能时，帮产品团队判断哪些任务该用高价渲染、哪些该降档或封顶，让我们能在增长用量的同时不拖垮毛利率。
    currentAlternative: 电子表格配额规划加写死的模型规则
    successMetric: 每位付费订阅用户的毛利率和每次成功渲染的成本
  - job: >-
      当供应商之间的模型定价或质量发生变化时，帮运营团队快速重新调度生成、重新打包套餐限额，让我们不用重写产品也能守住转化和留存。
    currentAlternative: 人工翻看仪表盘加紧急工程改动
    successMetric: 部署新路由策略所需天数，以及上线后退款率或流失率的变化
