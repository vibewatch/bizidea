slug: video-margin-routing-os
date: '2026-07-04'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-04] 模型从商业计划日期之后的第一个完整运营月开始。'
- id: A2
  name: 期初现金/pre-seed 融资额
  value: $2.5M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情形采用中间值 pre-seed 融资额，足以验证到 seed 就绪程度，外加约六个月缓冲期。'
- id: A3
  name: 初始付费客户数
  value: '0'
  unit: 数量
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零营收状态起步，须先签下共创客户。'
- id: A4
  name: 付费客户定义
  value: 处于利润率管理工作流控制下的付费试点或年度生产账户
  unit: 定义
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 统计所有已为试点、平台、入职或用量挂钩范围付费的客户。'
- id: A5
  name: 付费试点经济模型
  value: 约 3 个月 $55K（约 $18K/月）
  unit: 美元/客户
  source: '[BP gtm.pricing $40k-$75k shadow-routing pilot] 模型对首个工作流部署采用试点定价区间的中间值。'
- id: A6
  name: 年度合同与扩展经济模型
  value: 生产合同起步接近研究估算的约 $180K 混合 ACV，随着用量档位、基准测试和溯源日志陆续附加，到 Q4Y3 年化价值升至约 $240K。
  unit: 美元/客户/年
  source: '[BP gtm.pricing $150k-$250k annual subscription plus usage band + BP businessModel.revenueStreams + Research market.som ~$180k blended ACV] 基准情形起步接近研究估算的 ACV，附加项接入后逐步向 BP 区间上半段靠拢。'
- id: A7
  name: 客户增长节奏
  value: M12 达 3 个付费客户，Q4Y2 达 8 个，Q4Y3 达 15 个
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets + Research market.som] 基准情形匹配早期 2-3 个共创客户、第二年 5-8 个生产客户，第三年仍低于研究估算的 30 家客户 SOM。'
- id: A8
  name: 收入确认惯例
  value: 期末付费客户数乘以该期间每个活跃客户的混合确认收入：Y1 每月 $18K-$20K，Y2 每季度 $50K-$55K，Y3 每季度 $56K-$60K。
  unit: 公式
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + BP businessModel.revenueStreams] 这让收入始终可直接追溯到客户数量，同时把试点、年度合同、入职费和用量扩展混合在一起。'
- id: A9
  name: 毛利率爬升路径
  value: Y1 50%-58%，Y2 64%-72%，Y3 74%-78%
  unit: 毛利率百分比
  source: '[BP businessModel.targetGrossMarginPct 78 + BP operations + BP strategicChoices.sequencingRationale] 早期影子模式入职偏重交付，之后适配器、计费连接器和策略手册才逐步变得可复制。'
- id: A10
  name: 招聘时间线
  value: M1 创始人和创始工程师；M3 应用数据工程师；M7 解决方案工程师；M10 GTM 负责人；M14 第二名工程师；M18 运营；M25 第二名解决方案人员；M27 第二名 GTM 人员；M31 第三名工程师
  unit: 时间线
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 招聘在试点转化之前保持精简，只有验证出 ROI 和买家归属后，才会增加实施和 GTM 产能。'
- id: A11
  name: 创始人含附加成本薪酬
  value: $160K
  unit: 美元/年
  source: '[BP team Founder / CEO + startup-finance heuristic] 较低的创始人现金薪酬，加上薪资税和福利。'
- id: A12
  name: 工程含附加成本薪酬
  value: $195K
  unit: 美元/年
  source: '[BP team Founding eng + startup-finance heuristic] 需要资深的集成和控制平面工程人才，但 pre-seed 阶段的现金薪酬仍低于上市公司水平。'
- id: A13
  name: 应用数据含附加成本薪酬
  value: $200K
  unit: 美元/年
  source: '[BP team Applied data engineer + startup-finance heuristic] 这个角色要把遥测数据转化成 ROI 证明、护栏和策略建议，而不是做通用分析。'
- id: A14
  name: 解决方案/客户成功含附加成本薪酬
  value: $170K
  unit: 美元/年
  source: '[BP team Solutions engineer + startup-finance heuristic] 体现了跨供应商、计费和分析集成的实施职责，但不组建庞大的服务团队。'
- id: A15
  name: GTM 含附加成本薪酬
  value: $190K
  unit: 美元/年
  source: '[BP team GTM lead + BP gtm.channels + startup-finance heuristic] 包含针对狭窄但高价值买家群体的集中企业拓客、差旅和浮动薪酬。'
- id: A16
  name: G&A/运营含附加成本薪酬
  value: $120K
  unit: 美元/年
  source: '[BP operations + startup-finance heuristic] 覆盖精简的财务、供应商管理和基础合规运营。'
- id: A17
  name: 薪资分配至损益表各项
  value: 创始人 60% S&M / 20% R&D / 20% G&A；工程 100% R&D；应用数据 20% S&M / 80% R&D；解决方案 60% S&M / 40% R&D；GTM 100% S&M；运营 100% G&A
  unit: 分配比例
  source: '[BP team role rationales + BP operations] 将每个角色映射至损益表使用的职能运营项目。'
- id: A18
  name: 非薪资运营支出爬升
  value: 月度非薪资支出从 M1-6 的 S&M/R&D/G&A 各 $5K/$9K/$6K，扩大到 M19-24 的 $10K/$13K/$9K，再到 M31-36 的 $16K/$18K/$11K。
  unit: 美元/月
  source: '[BP operations + BP product + startup-finance heuristic] 覆盖云评估、差旅、法务、保险和合作伙伴赋能，不含大规模付费获客支出。'
- id: A19
  name: 现金转换惯例
  value: 现金变动等于 EBITDA
  unit: 公式
  source: '[startup-finance heuristic] 假设在 pre-seed 规模下，资本支出、融资费用、税项和营运资金时点均可忽略不计。'
- id: A20
  name: 稳态月度流失率经验值
  value: 1.8%
  unit: 百分比/月
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP gtm founder-led motion] 用于单位经济模型和敏感性分析；整数客户的运营模型在前三年会四舍五入掉小数流失量。'
- id: A21
  name: 用于 CAC 计算的试点转年度合同转化率
  value: 60% 的付费试点转化为年度合同
  unit: 百分比
  source: '[BP gtm.funnelTargets paid pilot→annual contract 60%+] 用于把 15 个付费启动转化为 9 个生产当量转化数，供 CAC 计算使用。'
- id: A22
  name: CAC 计算方式
  value: $189.3K = 36 个月 S&M 总支出 / 9 个生产当量转化数
  unit: 美元/新增年度客户
  source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] 这比除以全部付费试点数更保守，因为投资逻辑依赖六位数年度合同，而不只是试点本身。'
- id: A23
  name: 用于融资规模测算的下一轮里程碑
  value: 到约 Q2Y2，公司应达到 5 个付费客户、至少 2-3 个试点转化、一个可复制的转介来源，并且入职时间正向 30 天以内推进。
  unit: 里程碑
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 0-12 and 12-24 months + BP experimentRoadmap 6-12 months] pre-seed 融资规模设定为足以在买家归属、ROI 和入职可复制性上验证到 seed 就绪程度，外加六个月现金缓冲。'
- id: A24
  name: 季度薪资滚动惯例
  value: Y2-Y3 薪资行使用每季度内实际的按月招聘情况，而不只是季末快照
  unit: 惯例
  source: '[Headcount column convention + BP team startTiming] 即便 Y2 和 Y3 的人员配置快照只显示年末时点，这样也能让薪资支出与按月招聘节奏保持内部一致。'
