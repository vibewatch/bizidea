scenarios:
  downside:
    description: 买家归属依然模糊，部分共创客户停留在纯分析阶段，入职标准化的到来比计划更晚。
    y3RevenueK: 2227.0
    y3EbitdaK: -534.9
    cashLowPointK: 362.3
    keyAssumptionChanges:
    - Q4Y3 付费客户数只有 12 个而非 15 个，因为 Y2 期间试点转年度合同的速度一直偏慢。
    - 混合年化价值最高只到约 $228K，而非基准情形的 $240K 退出水平。
    - 毛利率最终约为 74%，因为解决方案工作和数据映射比计划中更依赖定制。
  base:
    description: 共创客户按约一个季度的验证周期转化，预算由产品或财务负责人批准，控制平面从影子模式扩展到实时策略加附加模块。
    y3RevenueK: 2785.0
    y3EbitdaK: -36.0
    cashLowPointK: 883.8
    keyAssumptionChanges:
    - M12 达 3 个付费客户，Q4Y2 达 8 个，Q4Y3 达 15 个。
    - 随着年度合同、用量档位和高级模块陆续附加，每个付费客户的混合年化价值最终约为 $240K。
    - 随着入职和每周利润率复盘变得可复制，Q4Y3 毛利率达到 BP 设定的 78% 目标。
  upside:
    description: 参考客户让转介打法更早跑通，实时策略控制落地更快，模块附加也比计划更早地拉高了每个客户的价值。
    y3RevenueK: 3539.0
    y3EbitdaK: 618.1
    cashLowPointK: 1214.8
    keyAssumptionChanges:
    - Q4Y3 付费客户数达到 18 个而非 15 个，因为合作伙伴引荐和参考客户加速了客户增长。
    - 基准测试和溯源日志更早接入，混合年化价值达到约 $252K。
    - 集成和上线手册在各账户间复用得更快，毛利率最终接近 80%。
sensitivity:
- variable: ARPU
  downsideCase: 退出年化价值降至每付费客户约 $216K。
  baseCase: 退出年化价值约为每付费客户 $240K。
  upsideCase: 退出年化价值升至每付费客户约 $252K。
  y3RevenueImpactK: -278.5
  cashImpactK: -217.2
- variable: CAC
  downsideCase: 试点转年度合同的转化率走弱，CAC 升至 $230K 出头。
  baseCase: 依靠创始人主导和大量转介的销售方式，按生产当量转化计算的 CAC 维持在约 $189K。
  upsideCase: 热情的转介和更强的验证证据，把 CAC 压到接近 $160K。
  y3RevenueImpactK: -480.0
  cashImpactK: -310.0
- variable: 流失率
  downsideCase: 首批试点成熟后，月度流失率升至 2.5%。
  baseCase: 客户采用每周利润率复盘和策略日志后，月度流失率维持在 1.8%。
  upsideCase: 控制平面深度嵌入定价和权益工作流，月度流失率维持在接近 1.2%。
  y3RevenueImpactK: -180.0
  cashImpactK: -135.0
- variable: 销售周期
  downsideCase: 试点转年度合同的周期从约一个季度拉长到约两个季度。
  baseCase: 共创客户在拿到量化的利润率证明后，约一个季度内完成转化。
  upsideCase: 参考客户和预建适配器把转化周期压缩到约 60 天。
  y3RevenueImpactK: -430.0
  cashImpactK: -280.0
- variable: 毛利率
  downsideCase: Q4Y3 毛利率最高只到约 72%-74%。
  baseCase: Q4Y3 毛利率达到 78%。
  upsideCase: Q4Y3 毛利率达到约 80%。
  y3RevenueImpactK: 0.0
  cashImpactK: -167.0
- variable: 招聘节奏
  downsideCase: 两个 Y3 扩张岗位在转介可复制性得到验证之前就提前招聘。
  baseCase: 招聘节奏与客户验证和入职复用能力挂钩。
  upsideCase: 一个 Y3 后期岗位延后到 seed 融资流程之后再招，也不影响交付。
  y3RevenueImpactK: 0.0
  cashImpactK: -145.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  TargetAccounts[Target AI-video apps] --> PaidPilots[Paid shadow-routing pilots]\n  PaidPilots --> AnnualContracts[Annual platform contracts]\n  AnnualContracts --> Expansion[Usage bands and premium modules]\n  Expansion --> Revenue[Revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash and runway]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入由付费客户数从 Y1 末的 3 个增长到 Q4Y3 的 15 个驱动，同时随着年度合同、用量档位和高级模块附加，混合年化价值达到约 $240K。
- checkName: 必须做对的事
  finding: 共创客户必须在约一个季度内转化为年度合同，入职时间必须压缩到 30 天左右，否则狭窄的滩头市场撑不起 Y2 到 Y3 的客户增长。
- checkName: 模型失效的条件
  finding: 如果买家归属始终不清晰、入职始终依赖定制，下行情形会把 Y3 收入拉低到约 $2.2M，现金底线也只剩约 $0.36M。
- checkName: 下一轮融资的验证要点
  finding: seed 轮的故事是：5-8 家生产客户、2-3 次年度合同转化、一个可复制的转介渠道，以及在真实客户工作流上实测的 5% 以上成本下降或 3 个百分点以上的毛利率提升。
sanityChecks:
  ruleOf40: Y3 增长率 127.1% + EBITDA 利润率 -1.3% = 125.8%（因 Y2 基数较小而被推高）。
  burnMultiple: Y2 燃烧倍数约为 0.7 倍：约 $680.8K 的 EBITDA 燃烧对应约 $976.5K 的净新增收入；Y3 已接近盈亏平衡。
  revenuePerFte: Y3 末约每 FTE $278.5K（10 名 FTE，对标 SaaS 基准 $200-400K）。
  flags:
  - 基准情形依然需要在一个狭窄、集中的买家群体中拿下 15 个付费客户，销售管道质量和创始人主导的转化率必须保持异常高的水平。
  - CustomersEop 在早期阶段同时包含付费试点和年度合同，所以纯生产客户数在 Y1 和大部分 Y2 期间都低于表面统计数字。
  - 只有在用量扩展和高级模块能顺利附加、且部署不沦为定制服务项目的前提下，退出年化价值才能达到约 $240K。
  - 只有入职流程模板化、解决方案工作不再依赖定制，毛利率才能达到 BP 设定的 78% 目标。
  - 现金按 EBITDA 建模，因此预付试点款、递延收入或集成营运资金的时点变化，都可能让实际现金跑道有所增减。
