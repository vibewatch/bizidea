topRisks:
  - name: Internal-build temptation
    description: AI-video apps may believe margin tooling is strategic enough to keep inside their own product and data teams.
    mitigation: Start with customers already running multiple providers and dynamic plans, and win on speed, cross-vendor benchmarks, and monetization controls that are painful to recreate internally.
  - name: Vendor volatility
    description: Rapid shifts in model quality, pricing, or API availability could make any single routing strategy obsolete.
    mitigation: Build provider-agnostic integrations, keep policy logic separate from vendor adapters, and position the product as the fastest way to respond to market churn.
  - name: Over-optimization can hurt user delight
    description: If routing or throttling decisions protect margin but visibly reduce output quality, conversion and retention could fall.
    mitigation: Roll out policies with cohort-based guardrails, quality floors, and direct measurement of refunds, churn, and upgrade lift before broad rollout.
