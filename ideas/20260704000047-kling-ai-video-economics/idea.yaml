jobsToBeDone:
  - job: >-
      When our AI-video app launches a new premium creation feature, help our
      product team decide which jobs should use expensive renders and which
      should be downgraded or capped, so we can grow usage without destroying
      gross margin.
    currentAlternative: Spreadsheet quota planning plus hard-coded model rules
    successMetric: Gross margin per paid subscriber and cost per successful render
  - job: >-
      When model pricing or quality shifts across vendors, help our operations
      team reroute generation and repackage plan limits fast, so we can protect
      conversion and retention without a product rewrite.
    currentAlternative: Manual dashboard reviews and emergency engineering changes
    successMetric: Days to deploy new routing policy and change in refund or churn rate after rollout
