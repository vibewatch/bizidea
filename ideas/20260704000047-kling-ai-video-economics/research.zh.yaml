- name: fal.ai
  stage: 成长期
  wedge: 媒体模型市场，配上带队列、webhook 和 SDK 抽象的无服务器推理。
  pricing: 按模型、时长和功能档位的按量付费。
  strength: 当前视频模型目录覆盖广，开发者体验和托管基础设施都很强。
  weaknessVsUs: 生来是为了卖模型流量、跑模型流量，不是为了优化买家侧的订阅经济模型和配额策略。
  sourceRefs:
  - 11
  - 12
  - 13
  - 14
  - 35
- name: Replicate
  stage: 成长期
  wedge: 托管模型市场，硬件和产出计费都很透明。
  pricing: 按硬件时长或产出单位的按用量付费。
  strength: 模型覆盖面广，定价基准透明度也异常高。
  weaknessVsUs: 适合拿到模型访问权限，但不擅长把渲染选择和权益、升级或退款绑定起来。
  sourceRefs:
  - 10
  - 18
- name: Portkey
  stage: 成长期
  wedge: 面向路由、治理、监控和成本控制的 AI 网关。
  pricing: 核心企业网关免费，企业治理和平台功能走升级销售。
  strength: 在路由和治理上有真正的控制平面基因。
  weaknessVsUs: 面向通用 AI 和 LLM，而不是视频特有的积分标准化和变现逻辑。
  sourceRefs:
  - 27
- name: Helicone
  stage: 种子期
  wedge: 开源 AI 网关，具备可观测性、会话管理和自动故障回退。
  pricing: 免费档加付费 SaaS 套餐。
  strength: 开发者采用路径顺畅，可观测性灵活。
  weaknessVsUs: 不是围绕视频生成配额、套餐权益或买家侧利润率优化设计的。
  sourceRefs:
  - 28
- name: CloudZero
  stage: 成长期
  wedge: 面向工程团队的云成本效率和业务单位经济模型。
  pricing: 定制企业定价。
  strength: 把基础设施开支和业务结果、FinOps 工作流连接起来。
  weaknessVsUs: 作用在云账单层，而不是这家初创公司瞄准的单次渲染供应商路由和变现层。
  sourceRefs:
  - 29
regulatoryTechnicalConstraints:
- point: 欧盟规则越来越要求，照片级真实的图像、音频或视频内容一旦是生成或被篡改的，就必须有机器可读的标记和披露。
  sourceRefs:
  - 30
- point: 中国对深度合成施加了更严格的义务，包括面向公众服务的更强标签和身份相关管控。
  sourceRefs:
  - 31
- point: 各大分发平台如今要求或自动加注 AI 标签，即便是消费级应用，发布时的溯源意识也很重要。
  sourceRefs:
  - 32
  - 33
  - 36
- point: 供应商定价和 API 接口很碎片化；消费级订阅和开发者计费经常活在不同系统里，用的还是互不兼容的计量单位。
  sourceRefs:
  - 5
  - 16
  - 37
- point: 开放权重的替代方案是存在的，但运行它们依然需要 GPU 算力和编排工作，很多应用团队并不想自己直接扛下来。
  sourceRefs:
  - 10
  - 15
  - 18
validationSignals:
- point: Kling 在上线不到两年内，年化收入达到 $240M，企业用户数达到 3 万。
  sourceRefs:
  - 1
- point: HeyGen 经常性收入达到 $100M，付费客户约 20 万，证实了 AI 视频市场真实存在的付费意愿。
  sourceRefs:
  - 25
- point: InVideo 在同时向多个模型和语音供应商采购的情况下，ARR 达到 $70M，说明多供应商视频技术栈已经是运营现实。
  sourceRefs:
  - 26
- point: Runway 以 $5.3B 估值融资 $315M，用于继续扩充模型和算力，这是赛道依然具有战略重要性的强烈信号。
  sourceRefs:
  - 24
- point: Synthesia 以 $4B 估值融资 $200M，正把 AI 视频和智能体式企业工作流绑得更紧。
  sourceRefs:
  - 23
openQuestions:
- 目前有多少滩头市场 AI 视频应用在生产环境运行至少两家而非一家模型供应商？
- 买家签下六位数年度合同，所需的最低毛利率提升是多少？
- 预算应该先归谁：产品与变现、基础设施，还是财务？
- 在预览档或标准档，能接受多大的质量下降，而不影响转化或留存？
