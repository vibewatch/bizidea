  baseCase: Exit annualized value reaches about $240K per paying logo.
  upsideCase: Exit annualized value reaches about $252K per paying logo.
  y3RevenueImpactK: -278.5
  cashImpactK: -217.2
- variable: CAC
  downsideCase: Pilot-to-annual conversion weakens and CAC rises toward the low-$230Ks.
  baseCase: CAC stays near $189K on production-equivalent conversions through founder-led and referral-heavy sales.
  upsideCase: Warm referrals and stronger proof keep CAC closer to $160K.
  y3RevenueImpactK: -480.0
  cashImpactK: -310.0
- variable: churn
  downsideCase: Monthly churn rises to 2.5% once initial pilots mature.
  baseCase: Monthly churn holds at 1.8% after customers adopt weekly margin reviews and policy logs.
  upsideCase: Monthly churn stays near 1.2% because the control plane becomes embedded in pricing and entitlement workflow.
  y3RevenueImpactK: -180.0
  cashImpactK: -135.0
- variable: sales cycle
  downsideCase: Pilot-to-annual conversion stretches from about one quarter to about two quarters.
  baseCase: Design partners convert in roughly one quarter after quantified margin proof.
  upsideCase: References and prebuilt adapters compress conversion toward about 60 days.
  y3RevenueImpactK: -430.0
  cashImpactK: -280.0
- variable: gross margin
  downsideCase: Q4Y3 gross margin tops out near 72%-74%.
  baseCase: Q4Y3 gross margin reaches 78%.
  upsideCase: Q4Y3 gross margin reaches about 80%.
  y3RevenueImpactK: 0.0
  cashImpactK: -167.0
- variable: hiring pace
  downsideCase: Two Y3 scale hires are pulled forward before repeatable referrals are proven.
  baseCase: Hiring stays tied to customer proof and onboarding reuse.
  upsideCase: One late-Y3 hire waits until after the seed process without hurting delivery.
  y3RevenueImpactK: 0.0
  cashImpactK: -145.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts[Target AI-video apps] --> PaidPilots[Paid shadow-routing pilots]
      PaidPilots --> AnnualContracts[Annual platform contracts]
      AnnualContracts --> Expansion[Usage bands and premium modules]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue is driven by growing from 3 paying logos at Y1 exit to 15 by Q4Y3 while blended annualized value reaches about $240K as annual contracts, usage bands, and premium modules attach.
- checkName: Must go right
  finding: Design partners must convert to annual contracts in roughly one quarter and onboarding must compress toward 30 days, or the narrow beachhead will not support the Y2-to-Y3 logo ramp.
- checkName: Model breaks if
  finding: If buyer ownership stays unclear and onboarding remains bespoke, the downside case pulls Y3 revenue down to about $2.2M and leaves the cash floor near $0.36M.
- checkName: Next-round proof
  finding: The seed story is 5-8 production logos, 2-3 annual conversions, one repeatable referral channel, and measured 5%+ cost reduction or 3+ gross-margin points on live customer workflows.
sanityChecks:
  ruleOf40: Y3 growth 127.1% + EBITDA margin -1.3% = 125.8% (inflated by the small Y2 base).
  burnMultiple: Y2 burn multiple is about 0.7x using roughly $680.8K of EBITDA burn against about $976.5K of net new revenue; Y3 is nearly breakeven.
  revenuePerFte: About $278.5K Y3 on 10 ending FTE (benchmark $200-400K SaaS).
  flags:
  - The base case still requires 15 paying logos in a narrow, concentrated buyer set, so pipeline quality and founder-led conversion must stay unusually high.
  - CustomersEop includes paid pilots and annual contracts in the early periods, so production-only logos trail the headline count through much of Y1 and Y2.
  - Exit annualized value reaches about $240K only if usage-based expansion and premium modules attach without turning deployments into custom services projects.
  - Gross margin reaches the BP target 78% only if onboarding becomes templated and solutions work does not remain bespoke.
  - Cash is modeled as EBITDA, so prepaid pilots, deferred revenue, or integration working-capital timing could move actual runway up or down.
