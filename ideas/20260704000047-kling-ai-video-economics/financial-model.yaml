scenarios:
  downside:
    description: Buyer ownership stays fuzzy, some design partners remain analytics-only, and onboarding standardization arrives later than planned.
    y3RevenueK: 2227.0
    y3EbitdaK: -534.9
    cashLowPointK: 362.3
    keyAssumptionChanges:
    - Q4Y3 paying logos reach 12 instead of 15 because pilot-to-annual conversion stays slower through Y2.
    - Blended annualized value tops out near $228K rather than the $240K base-case exit level.
    - Gross margin exits near 74% because solutions work and data mapping stay more bespoke than planned.
  base:
    description: Design partners convert on roughly one-quarter proof cycles, budget is approved by product or finance owners, and the control plane expands from shadow mode into live policy plus add-on modules.
    y3RevenueK: 2785.0
    y3EbitdaK: -36.0
    cashLowPointK: 883.8
    keyAssumptionChanges:
    - 3 paying logos by M12, 8 by Q4Y2, and 15 by Q4Y3.
    - Blended annualized value per paying logo exits around $240K as annual contracts, usage bands, and premium modules attach.
    - Gross margin reaches the BP target 78% by Q4Y3 as onboarding and weekly margin reviews become repeatable.
  upside:
    description: Reference customers make the referral motion work earlier, live policy control lands faster, and module attach expands value per logo sooner than planned.
    y3RevenueK: 3539.0
    y3EbitdaK: 618.1
    cashLowPointK: 1214.8
    keyAssumptionChanges:
    - Q4Y3 paying logos reach 18 instead of 15 because partner introductions and references accelerate the logo ramp.
    - Blended annualized value reaches about $252K as benchmarking and provenance logging attach earlier.
    - Gross margin exits near 80% because integrations and rollout playbooks reuse faster across accounts.
