slug: video-margin-routing-os
date: '2026-07-04'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-04] the model begins with the first full operating month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $2.5M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses a mid-range pre-seed sized to reach seed-ready proof plus roughly six months of buffer.'
- id: A3
  name: Starting paying logos
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first secure design partners.'
- id: A4
  name: Paying logo definition
  value: A paid pilot or annual production account under margin-management workflow control
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop counts any logo already paying for pilot, platform, onboarding, or usage-linked scope.'
- id: A5
  name: Paid pilot economics
  value: $55K over about 3 months (~$18K/mo)
  unit: USD/logo
  source: '[BP gtm.pricing $40k-$75k shadow-routing pilot] the model uses the midpoint pilot value for first-workflow deployments.'
- id: A6
  name: Annual contract and expansion economics
  value: Production contracts start near the researched ~$180K blended ACV and exit around ~$240K annualized value by Q4Y3 as usage bands, benchmarking, and provenance logging attach.
  unit: USD/logo/year
  source: '[BP gtm.pricing $150k-$250k annual subscription plus usage band + BP businessModel.revenueStreams + Research market.som ~$180k blended ACV] the base case starts near the research ACV and exits toward the upper half of the BP range once add-ons attach.'
- id: A7
  name: Customer ramp
  value: 3 paying logos by M12, 8 by Q4Y2, 15 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets + Research market.som] the base case matches 2-3 early design partners, 5-8 production logos by year 2, and stays below the researched 30-logo SOM by year 3.'
- id: A8
  name: Revenue recognition convention
  value: 'Period-end paying logos multiplied by blended recognized revenue per active logo for that period: Y1 $18K-$20K per month, Y2 $50K-$55K per quarter, and Y3 $56K-$60K per quarter.'
  unit: formula
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + BP businessModel.revenueStreams] this keeps revenue directly traceable to customer counts while blending pilots, annual contracts, onboarding, and usage expansion.'
- id: A9
  name: Gross margin ramp
  value: 50%-58% in Y1, 64%-72% in Y2, 74%-78% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 78 + BP operations + BP strategicChoices.sequencingRationale] early shadow-mode onboarding is delivery-heavy before adapters, billing connectors, and policy playbooks become repeatable.'
- id: A10
  name: Hiring timeline
  value: M1 founder and founding engineer; M3 applied data engineer; M7 solutions engineer; M10 GTM lead; M14 second engineer; M18 ops; M25 second solutions hire; M27 second GTM hire; M31 third engineer
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays lean until pilots convert, then adds implementation and GTM capacity only after proof of ROI and buyer ownership.'
- id: A11
  name: Founder loaded compensation
  value: $160K
  unit: USD/year
  source: '[BP team Founder / CEO + startup-finance heuristic] modest founder cash pay plus payroll taxes and benefits.'
- id: A12
  name: Engineering loaded compensation
  value: $195K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] senior integration and control-plane engineering talent is required, but pre-seed cash comp stays below public-company levels.'
- id: A13
  name: Applied data loaded compensation
  value: $200K
  unit: USD/year
  source: '[BP team Applied data engineer + startup-finance heuristic] the role must turn telemetry into ROI proof, guardrails, and policy recommendations rather than generic analytics.'
- id: A14
  name: Solutions / customer success loaded compensation
  value: $170K
  unit: USD/year
  source: '[BP team Solutions engineer + startup-finance heuristic] reflects implementation ownership across provider, billing, and analytics integrations without building a large services bench.'
- id: A15
  name: GTM loaded compensation
  value: $190K
  unit: USD/year
  source: '[BP team GTM lead + BP gtm.channels + startup-finance heuristic] includes concentrated enterprise outreach, travel, and variable pay for a narrow but high-value buyer set.'
- id: A16
  name: G&A / ops loaded compensation
  value: $120K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] covers lean finance, vendor management, and basic compliance operations.'
- id: A17
  name: Payroll allocation to P&L lines
  value: Founder 60% S&M / 20% R&D / 20% G&A; engineering 100% R&D; applied data 20% S&M / 80% R&D; solutions 60% S&M / 40% R&D; GTM 100% S&M; ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] maps each role into the functional operating lines used in the P&L.'
- id: A18
  name: Non-payroll opex ramp
  value: Monthly non-payroll spend scales from S&M/R&D/G&A of $5K/$9K/$6K in M1-6 to $10K/$13K/$9K in M19-24 and $16K/$18K/$11K in M31-36.
  unit: USD/month
  source: '[BP operations + BP product + startup-finance heuristic] covers cloud evaluation, travel, legal, insurance, and partner enablement without assuming broad paid-demand spend.'
- id: A19
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] capex, financing fees, taxes, and working-capital timing are assumed immaterial at pre-seed scale.'
- id: A20
  name: Steady-state monthly churn heuristic
  value: 1.8%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP gtm founder-led motion] used for unit economics and sensitivity; the whole-logo operating model rounds away fractional churn during the first three years.'
- id: A21
  name: Pilot-to-annual conversion used for CAC
  value: 60% of paid pilots convert to annual contracts
  unit: percent
  source: '[BP gtm.funnelTargets paid pilot→annual contract 60%+] used to convert 15 paid starts into 9 production-equivalent conversions for CAC.'
- id: A22
  name: CAC calculation convention
  value: $189.3K = total 36-month S&M spend / 9 production-equivalent conversions
  unit: USD/new annual customer
  source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] this is more conservative than dividing by all paid pilots because the investor case depends on six-figure annual contracts, not pilots alone.'
- id: A23
  name: Next-round milestone for funding sizing
  value: By roughly Q2Y2 the company should have 5 paying logos, at least 2-3 pilot conversions, one repeatable referral source, and onboarding moving toward sub-30-day deployment.
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 0-12 and 12-24 months + BP experimentRoadmap 6-12 months] the pre-seed is sized to reach seed-ready proof on buyer ownership, ROI, and onboarding repeatability with six months of cash buffer.'
- id: A24
  name: Quarterly salary-roll convention
  value: Y2-Y3 salary rows use actual monthly hires inside each quarter rather than just quarter-end snapshots
  unit: convention
  source: '[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent with the monthly hiring ramp even though Y2 and Y3 headcount snapshots only show year-end points.'
