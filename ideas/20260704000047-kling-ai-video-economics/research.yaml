    - 34
    - 36
  geographicConsiderations:
  - point: North America appears to be the current revenue center in broad market pages, but China matters disproportionately
      because Kling and Hailuo show supplier momentum and China imposes stricter deep-synthesis obligations.
    sourceRefs:
    - 1
