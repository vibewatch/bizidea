  sensitivityCases:
  - case: Video model prices compress faster than expected
    impact: If open-weight or cheaper hosted models close the quality gap quickly, the wedge shifts from pure savings into
      experimentation speed, quota design, and monetization orchestration.
    sourceRefs:
    - 15
    - 18
    - 22
  - case: Suppliers bundle native economics tooling
    impact: If Runway, Google, or inference platforms expose better native routing and benchmarking, the startup must stay
      neutral across vendors and tie every decision to user value, not just API cost.
    sourceRefs:
    - 5
    - 11
    - 12
    - 16
    - 35
  - case: AI-video demand stays more enterprise than mass-consumer
    impact: If broad consumer creation remains cost-sensitive, the beachhead narrows toward prosumer and business-video apps
      with clearer ARPU and stronger willingness to pay.
    sourceRefs:
    - 20
    - 23
    - 25
    - 39
    - 40
  validationPlan:
  - priority: high
    question: How many beachhead apps already run two or more video model providers in production?
    evidenceToGather: Design-partner interviews, provider-billing screenshots, and technical architecture reviews from 10-15
      AI-video apps.
  - priority: high
    question: What savings or gross-margin lift threshold is required for a buyer to sign a six-figure annual contract?
    evidenceToGather: ROI interviews with product and finance owners plus a shadow-routing pilot that quantifies effective
      cost per usable render.
  - priority: medium
    question: How much quality degradation can customers tolerate in preview or standard tiers before conversion or retention
      suffers?
    evidenceToGather: A/B tests on preview-versus-premium generation tiers, rerender behavior, and refund or churn deltas
      by cohort.
