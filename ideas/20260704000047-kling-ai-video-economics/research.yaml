  adoptionFrictionMatrix:
  - friction: Teams do not know the true dollar cost per usable video
    severity: high
    affectedBuyer: VP Product or CFO
    mitigation: Normalize every model to dollars per second and dollars per usable render, including rerender and refund behavior.
    sourceRefs:
    - 5
    - 7
    - 8
    - 10
    - 16
    - 37
    - 38
  - friction: Cheaper models can hurt quality and increase rerenders
    severity: high
    affectedBuyer: Head of Product
    mitigation: Start with preview-versus-premium tiering, quality floors, and cohort A/B guardrails rather than blanket downgrades.
    sourceRefs:
    - 11
    - 12
    - 13
    - 14
    - 15
    - 18
    - 38
  - friction: Integration across async APIs, queues, and webhooks is messy
    severity: medium
    affectedBuyer: Infrastructure lead
    mitigation: Ship prebuilt adapters for the highest-volume providers and abstract queue, callback, and retry behavior behind
      one policy layer.
    sourceRefs:
    - 17
    - 35
  - friction: Compliance and platform-labeling workflows arrive late in the product cycle
    severity: medium
    affectedBuyer: GM or legal/trust owner
    mitigation: Make provenance defaults and publish-time label checks part of the control plane rather than a separate trust
      project.
    sourceRefs:
    - 30
    - 32
    - 33
    - 34
    - 36
