problem: >-
  European private-capital firms still run investor operations through Outlook,
  Excel, Word templates, and outsourced fund administrators, especially once a
  fund launch creates waves of subscription docs, side-letter obligations,
  capital calls, distribution notices, and LP questions. The painful work is
  not posting entries to a ledger; it is coordinating obligation-heavy investor
  communications accurately across managers, admins, counsel, and inboxes. When
  that coordination slips, firms create compliance risk, delay closings and cash
  movement, and burn senior ops time on exception handling.
targetUser:
  primary: Head of fund operations or COO at a European private-equity or venture manager with multiple active funds and outsourced administration
  secondary: Investor relations and fund-admin teams responsible for LP notices, closings, and ongoing fund communications
  buyer: COO, CFO, or head of operations at the management company
startupThesis:
  nonObviousInsight: >-
    The most under-softwared layer in private markets is not core accounting; it
    is the obligation and communication layer between the GP, fund admin,
    counsel, and LP. Once AI can reliably read side letters, notice templates,
    subscription packets, and email threads, a startup can own the messy
    workflow that legacy fund systems and general-purpose CRMs leave to humans.
  beachhead: >-
    Capital-call, distribution-notice, and side-letter obligation management for
    European PE and VC managers running 3-10 active funds with 50-300 LP
    entities per fund and at least one outsourced administrator
  wedge: >-
    An investor-operations agent that ingests side letters, notice templates,
    cap tables, and email threads, then drafts compliant LP notices, tracks
    obligation deadlines, and routes approval tasks across the GP and fund admin
  whyNowCatalyst: >-
    bunch's Series B and the repeated source framing around AI-native private
    markets infrastructure replacing spreadsheet-era fund operations show that
    buyers now have budget cover to modernize investor-operations workflows that
    used to remain trapped in email and Excel.
  ventureScalePath: >-
    Start with investor notices and side-letter compliance, then expand into LP
    onboarding, transfer workflows, fund closes, portfolio reporting, and the
    broader private-markets system of action that sits above legacy accounting
    and administrator software.
solution: >-
  The product is a workflow layer for every high-stakes LP communication after a
  fund launch. It connects fund data, investor records, side-letter terms,
  counsel-approved templates, and admin email threads to produce draft capital
  calls, distribution notices, reminder schedules, and approval checklists with
  a full audit trail. Instead of forcing a firm to replace its fund admin or
  general ledger, it sits on top of the existing stack and handles the
  error-prone orchestration work those systems do not own. Over time, it learns
  which investors need bespoke notice language, which obligations recur by fund
  type, and where handoffs between GP and admin most often break. The first ROI
  is fewer manual review hours and fewer notice mistakes; the longer-term moat
  is the obligation graph linking documents, deadlines, investor entities, and
  actual workflow outcomes across funds.
