differentiator: >-
  Most private-market software either handles accounting records or serves as a
  generic investor portal. This company owns the brittle gray zone between them:
  the document, deadline, and approval choreography required to communicate with
  LPs correctly under fund-specific obligations. The defensible asset is an
  obligation graph built from side letters, fund notices, investor entities, and
  workflow outcomes, which becomes more valuable as it absorbs the edge cases
  that spreadsheet-driven teams repeatedly mishandle.
