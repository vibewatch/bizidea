topRisks:
  - name: Legal-compliance accuracy
    description: A mistaken notice or missed side-letter obligation could damage investor trust and make the product hard to expand inside regulated fund workflows.
    mitigation: Start with approval-gated drafting, preserve full document citations for every obligation, and narrow early deployments to standardized notice types.
  - name: Slow incumbent-heavy sales
    description: Private-capital firms often default to existing fund administrators, counsel, and legacy systems instead of buying a new workflow layer quickly.
    mitigation: Sell into acute launch or capital-call events, integrate with outsourced admins rather than displacing them, and prove ROI on one live workflow first.
  - name: Edge-case document complexity
    description: Side letters, investor entity structures, and cross-border fund terms vary enough that generic extraction models can break on the hardest accounts.
    mitigation: Focus first on European PE and VC fund structures with common templates, keep human review in the loop, and build the product around reusable obligation patterns instead of full document autonomy.
