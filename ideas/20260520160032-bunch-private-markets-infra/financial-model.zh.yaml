scenarios:
  downside:
    description: 试点到生产的转化大约晚了两个季度，实施也比计划中更依赖人工。
    y3RevenueK: 2780.0
    y3EbitdaK: -618.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
    - 到 Q4Y3 只做到 28 个客户，因为行政管理方和律师转介绍起量更慢。
    - 毛利率最高只到约 63%，因为更多通知仍需要人工复核和重写。
    - 招聘收缩不够快，所以即便需求变慢，公司仍背着 Q2Y3 新增的解决方案和工程人力。
  base:
    description: 基准情形是先拿下 2–3 个付费试点，把它们转成可复制的生产客户，再在第 3 年靠转介绍放大。
    y3RevenueK: 3720.0
    y3EbitdaK: 53.9
    cashLowPointK: 765.0
    keyAssumptionChanges:
    - 客户数按照 A5 和 A6 的里程碑爬坡：从 M12 的 6 个，增至 Q4Y2 的 10 个，再到 Q4Y3 的 40 个。
    - 每个活跃部署的年化混合收入，逐步收敛到 A9 研究支持的 $145K 稳态值。
    - 随着实施逐渐标准化，毛利率从 Y1 的 41.9% 提升到 Y3 的 69.6%。
  upside:
    description: 转介绍渠道提前 1–2 个季度起效，早期客户里的第二条工作流扩张也更快。
    y3RevenueK: 4510.0
    y3EbitdaK: 524.0
    cashLowPointK: 960.0
    keyAssumptionChanges:
    - 到 Q4Y3 客户数达到约 46 个，因为首批生产胜利后，行政管理方转介绍加速。
    - 净扩张带来更多高阶模块收入，把每个部署的混合年化收入抬到基准情形之上。
    - 随着义务抽取和审批路由越来越少依赖人工支持，毛利率突破 72%。
sensitivity:
- variable: ARPU
  downsideCase: $130K 的稳态年度 ARPU。
  baseCase: $145K 的稳态年度 ARPU。
  upsideCase: $155K 的稳态年度 ARPU。
  y3RevenueImpactK: -390.0
  cashImpactK: -290.0
- variable: CAC
  downsideCase: CAC 升到 $95K，因为尽调仍高度定制，客户背书也不够厚。
  baseCase: 按模型假设的企业销售动作，CAC 为 $75K。
  upsideCase: 当转介绍带来更热的管道后，CAC 降到 $60K。
  y3RevenueImpactK: -120.0
  cashImpactK: -420.0
- variable: 流失率
  downsideCase: 月流失率 1.5%。
  baseCase: 月流失率 1.0%。
  upsideCase: 月流失率 0.7%。
  y3RevenueImpactK: -240.0
  cashImpactK: -210.0
- variable: 销售周期
  downsideCase: 试点到生产的转化再多拖一个季度。
  baseCase: 转化节奏按 A5 和 A6 的里程碑爬坡执行。
  upsideCase: 前两条转介绍渠道把成交周期缩短一个季度。
  y3RevenueImpactK: -760.0
  cashImpactK: -610.0
- variable: 毛利率
  downsideCase: Y3 毛利率卡在 63%。
  baseCase: Y3 毛利率达到 69.6%。
  upsideCase: Y3 毛利率达到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -245.0
- variable: 招聘节奏
  downsideCase: 在证据跑出来前，就把 Q2Y3 和 Q4Y3 的招聘提前。
  baseCase: 招聘按 A18 的顺序推进。
  upsideCase: 把一个非关键岗位延后到 seed 融资之后再招。
  y3RevenueImpactK: -80.0
  cashImpactK: -300.0
modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  LiveEvents[Live fund events] --> Customers[Paid deployments]\n  Customers --> ARPU[Blended ARPU]\n  ARPU --> Revenue[Revenue]\n  Revenue --> COGS[Implementation and support COGS]\n  COGS --> GrossProfit[Gross profit]\n  GrossProfit --> Opex[Payroll and operating spend]\n  Opex --> Cash[Ending cash]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下，收入的核心驱动是创始人主导的试点转成生产客户，到 Q4Y3 做到 40 个付费部署，而稳态 ARPU 约为研究支持的 $145K。
- checkName: 必须跑通的事
  finding: 公司必须在 Q4Y2 前，把首批生产胜利转成行政管理方和律师转介绍，否则 A6 里第 3 年的客户爬坡根本起不来。
- checkName: 模型会失效，如果
  finding: 如果附函抽取始终服务化，导致毛利率只能卡在约 63%，同时销售周期还再拖一个季度，这个模型就会断。
- checkName: 下一轮融资所需证明
  finding: 当公司做到约 10 个生产部署、2 条已跑通的转介绍渠道，并拿出第二条工作流扩张证据时，下一轮 seed 才真正站得住。
sanityChecks:
  ruleOf40: Rule of 40：Y3 增长 240.5% + EBITDA 利润率 1.4% = 241.9%。
  burnMultiple: Burn Multiple：Y2 为 1.4x = $1006.0K burn / $730.0K net new ARR。
  revenuePerFte: 人均收入：Y3 年底 14 名 FTE，对应每人 $266K（SaaS 基准约 $200–400K）。
  flags:
  - 模型假设一旦转介绍起效，GTM 动作就能在 Y3 把付费部署从 10 个跳到 40 个；如果渠道证明更慢，seed 叙事会很快变弱。
  - 只有当实施服务始终低于商业计划里的阈值，且手工通知重写在第 1 年后明显下降，毛利率才可能进入目标区间。
  - 基准情形下，现金最低点约为 $765K，所以如果转化晚两个季度，大概率需要桥接融资，而不是顺滑进入下一轮 seed。
