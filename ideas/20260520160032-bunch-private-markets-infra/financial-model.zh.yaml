slug: lp-notice-compliance-agent
date: '2026-05-20'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: 月
  source: '[BP date 2026-05-20] 取计划日期后的第一个完整月份。'
- id: A2
  name: 期初现金 / 模型假设的 pre-seed 融资
  value: '3000'
  unit: USDK
  source: '[BP fundingAsk $2.5–4.0M、runway 18 个月] 模型采用 $3.0M 的 pre-seed，既覆盖到 Q4Y2 里程碑，也多留 6 个月缓冲。'
- id: A3
  name: 模型中的客户单位
  value: 处于付费状态的基金家族，或已上线的通知工作流部署
  unit: 定义
  source: '[BP pricing 与 businessModel unitOfValue] 定价锚定活跃基金载体和 LP 实体复杂度，所以模型统计的是付费部署，而不是终端用户数。'
- id: A4
  name: 起始客户数（M1）
  value: '0'
  unit: 个
  source: '[BP product sixMonth] 在最初试点工作启动前，不假设已有付费部署。'
- id: A5
  name: 第 1 年客户爬坡
  value: M3 1; M5 2; M8 3; M10 4; M11 5; M12 6
  unit: 期末客户数
  source: '[BP product sixMonth / twelveMonth 与 gtm wedge] 反映前 6 个月拿下 2–3 个付费试点，并在第 12 个月前完成若干转正。'
- id: A6
  name: 第 2 年和第 3 年客户爬坡
  value: Q1Y2 7; Q2Y2 8; Q3Y2 9; Q4Y2 10; Q1Y3 15; Q2Y3 22; Q3Y3 32; Q4Y3 40
  unit: 期末客户数
  source: '[BP milestones 与 Research SOM] 在前 24 个月做到 5–8 个生产客户，并在 Q4Y3 逼近研究支持的第 3 年 40 客户 SOM。'
- id: A7
  name: 第 1 年每个活跃部署的年化混合收入
  value: 96-120
  unit: USDK / 客户年
  source: '[BP firstCustomer initialContract $20k–40k pilot 与 $90k–180k annual software contract] 前几个月把试点价格和首批生产合同混在一起，形成年化混合收入。'
- id: A8
  name: 第 2 年每个活跃部署的年化混合收入
  value: 111-143
  unit: USDK / 客户年
  source: '[BP pricing、实施收入与高阶套餐] 生产客户会逐步向完整年度合同价值靠拢，同时仍有部分实施收入混入。'
- id: A9
  name: 稳定期年度 ARPU
  value: '145'
  unit: USDK / 客户年
  source: '[Research market.sam 与 market.som] 研究把每家管理机构 / 部署的混合 ACV 锚在约 $145k。'
- id: A10
  name: 毛利率路径
  value: 41.9% Y1; 60.0% Y2; 69.6% Y3
  unit: 百分比
  source: '[BP businessModel targetGrossMarginPct 70 与服务密集型实施风险] 模型假设前期上线必须依赖大量人工与服务，第 3 年才接近目标区间。'
- id: A11
  name: 月流失率
  value: '1.0'
  unit: 百分比
  source: '[创业公司财务经验值：高黏性 B2B 工作流基础设施 + 年度合同] 这里刻意保守，不预设在信任建立前就能做到完美留存。'
- id: A12
  name: 创始人全成本薪酬
  value: '120'
  unit: USDK / 年
  source: '[创业公司财务经验值：欧洲 pre-seed 创始人薪资加雇佣负担] 用于薪酬汇总。'
- id: A13
  name: 工程岗位全成本薪酬
  value: '160'
  unit: USDK / 年
  source: '[创业公司财务经验值：欧洲早期产品工程师薪资加雇佣负担] 用于薪酬汇总。'
- id: A14
  name: 合规产品岗位全成本薪酬
  value: '140'
  unit: USDK / 年
  source: '[创业公司财务经验值：重领域知识的产品 / 合规岗位薪资加雇佣负担] 用于薪酬汇总。'
- id: A15
  name: 解决方案工程岗位全成本薪酬
  value: '150'
  unit: USDK / 年
  source: '[创业公司财务经验值：早期解决方案工程师薪资加雇佣负担] 用于薪酬汇总。'
- id: A16
  name: GTM / 合作岗位全成本薪酬
  value: '160'
  unit: USDK / 年
  source: '[创业公司财务经验值：以合作为主的早期销售岗位薪资加雇佣负担] 用于薪酬汇总。'
- id: A17
  name: 综合管理岗位全成本薪酬
  value: '100'
  unit: USDK / 年
  source: '[创业公司财务经验值：精简财务与运营支持薪资加雇佣负担] 用于薪酬汇总。'
- id: A18
  name: 招聘节奏
  value: 起步时为创始人和首位创始工程师；M2 招合规产品；M4 招解决方案工程师；M7 招第二位工程师；M10 招合作负责人；Q1Y2 招综合管理；Q2Y2 招第三位工程师；Q4Y2 招第二位合规和第二位 GTM；Q2Y3 招第二位解决方案和第四位工程师；Q4Y3 招第五位工程师和第三位 GTM
  unit: 排期
  source: '[BP team 与 strategicChoices sequencingRationale] 先补工程和合规，再跟方案支持；更广的 GTM 要等试点转化被证明后才启动。'
- id: A19
  name: 非薪酬研发支出节奏
  value: 14K/month in Q1Y1; 16K/month in Q2Y1; 18K/month in Q3Y1; 20K/month in Q4Y1; then 54K, 60K, 66K, 72K by quarter in Y2 and 78K, 84K, 90K, 96K by quarter in Y3
  unit: USDK
  source: '[创业公司财务经验值 + BP operations / security 要求] 云资源、文档处理和安全工具会随着生产部署增加而上升。'
- id: A20
  name: 非薪酬 GTM 支出节奏
  value: 4K/month in early Y1 rising to 10K/month by Q4Y1; then 24K, 27K, 30K, 36K by quarter in Y2 and 45K, 51K, 60K, 69K by quarter in Y3
  unit: USDK
  source: '[创业公司财务经验值 + BP founder-led GTM] 在转介绍和可复制转化出现前，市场费用保持克制。'
- id: A21
  name: 非薪酬综合管理支出节奏
  value: 8K/month in Q1Y1 rising to 12K/month in Q4Y1; then 30K, 33K, 36K, 39K by quarter in Y2 and 45K, 48K, 51K, 54K by quarter in Y3
  unit: USDK
  source: '[创业公司财务经验值 + Research GDPR / DORA 尽调] 随着买方尽调加深，法务、合规、保险和行政开销同步抬升。'
- id: A22
  name: 现金滚动规则
  value: 期末现金 = 期初现金 + EBITDA
  unit: 规则
  source: '[创业公司财务经验值] 这个早期软件模型忽略债务、资本开支和营运资本波动，视为影响不大。'
- id: A23
  name: 稳定期 CAC
  value: '75'
  unit: USDK per customer
  source: '[创业公司财务经验值：创始人主导的企业销售 + 合规尽调] 这里用在单位经济回收期，而不是直接拿早期 P&L 历史均值硬套。'
