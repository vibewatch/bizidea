jobsToBeDone:
- job: 当基金需要发出缴款通知或分配通知时，帮基金运营负责人尽快生成针对不同投资者的正确沟通内容和审批流程，这样资金能准时流动，合规错误也不会冒头。
  currentAlternative: 在 Excel 跟踪表、邮件线程和 Word 通知模板之间手工复核
  successMetric: 通知准备时间下降，以及通知更正次数或漏掉义务的情况减少
