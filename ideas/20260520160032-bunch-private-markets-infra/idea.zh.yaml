differentiator: 多数私募市场软件不是管会计记录，就是做通用投资者门户。这个公司盯的是两者之间那块最脆弱的灰区：为了在基金特定义务下把 LP 沟通做对，必须把文件、截止日和审批动作精确串起来。真正能守住的资产，是从附函、基金通知、投资者实体和工作流结果里长出来的义务图谱。随着系统不断吸收那些表格驱动团队最容易处理失误的边角案例，这张图谱会越来越值钱。
