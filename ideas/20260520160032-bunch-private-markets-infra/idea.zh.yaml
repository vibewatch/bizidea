topRisks:
- name: 法律与合规准确性
  description: 一旦通知出错，或漏掉附函义务，就可能伤到投资者信任，也会让产品更难继续向受监管的基金工作流深处扩张。
  mitigation: 先从带审批门的起草流程做起；每条义务都保留完整文件引用；早期部署只做标准化程度高的通知类型。
- name: 销售节奏慢，而且强依赖现有厂商
  description: 私募资本机构往往更愿意继续依赖现有基金行政管理方、律师和老系统，而不是很快买一层新的工作流软件。
  mitigation: 切入基金启动或缴款等高痛节点；优先与外包行政管理方集成，而不是替代他们；先在一条真实工作流上把 ROI 跑出来。
- name: 边角文件太复杂
  description: 附函、投资者实体结构和跨境基金条款差异很大，通用抽取模型在最复杂的账户上很容易失手。
  mitigation: 先聚焦模板较共性的欧洲 PE 与 VC 基金结构；把人工复核一直放在环里；产品设计围绕可复用的义务模式，而不是一上来追求文档全自动。
