  pestle:
  - factor: 政治
    impact: neutral
    point: 欧洲政策制定者仍在推动资本市场整合和私募资本扩张，这对长期需求是利好，但并不会抹掉本地运营复杂度。
    sourceRefs:
    - 19
    - 20
  - factor: 经济
    impact: positive
    point: 私募市场仍在增长，机构配置人也在继续加仓，这会持续推高复杂投资者工作流的处理量。
    sourceRefs:
