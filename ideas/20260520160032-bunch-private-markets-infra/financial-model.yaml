modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      LiveEvents[Live fund events] --> Customers[Paid deployments]
      Customers --> ARPU[Blended ARPU]
      ARPU --> Revenue[Revenue]
      Revenue --> COGS[Implementation and support COGS]
      COGS --> GrossProfit[Gross profit]
      GrossProfit --> Opex[Payroll and operating spend]
      Opex --> Cash[Ending cash]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by founder-led pilots converting into 40 paid deployments by Q4Y3 at a research-backed steady-state ARPU of about $145K.
- checkName: Must go right
  finding: The company must turn the first production wins into administrator and counsel referrals by Q4Y2 or the year-3 customer ramp in A6 does not materialize.
- checkName: Model breaks if
  finding: The model breaks if side-letter extraction stays services-heavy enough that gross margin stalls near 63% while sales cycles also slip a quarter.
- checkName: Next-round proof
  finding: The next seed round is justified once the company reaches about 10 production deployments, 2 live referral channels, and evidence of second-workflow expansion.
sanityChecks:
  ruleOf40: Y3 growth 240.5% + EBITDA margin 1.4% = 241.9%.
  burnMultiple: Y2 burn multiple 1.4x = $1006.0K burn / $730.0K net new ARR.
  revenuePerFte: $266K Y3 on 14 end-of-year FTE (benchmark $200-400K SaaS).
  flags:
  - The model assumes the go-to-market motion can jump from 10 to 40 paid deployments in Y3 once referrals activate; if channel proof is slower, the seed case weakens quickly.
  - Gross margin only reaches the target neighborhood if implementation services stay below the business-plan threshold and manual notice rewriting falls sharply after the first year.
  - Cash bottoms at about $765K in the base case, so a two-quarter conversion delay would likely require a bridge rather than a clean seed process.
