assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: month
  source: '[BP date 2026-05-20] first full month after the plan date.'
- id: A2
  name: Opening cash / modeled pre-seed round
  value: '3000'
  unit: USDK
  source: '[BP fundingAsk $2.5-4.0M and runway 18 months] model uses a $3.0M pre-seed to reach the Q4Y2 milestone plus a 6-month buffer.'
- id: A3
  name: Customer unit in the model
  value: active paying fund-family or notice-workflow deployment
  unit: definition
  source: '[BP pricing and businessModel unitOfValue] pricing is tied to active fund vehicles and LP-entity complexity, so the model counts paid deployments rather than end users.'
- id: A4
  name: Starting customers (M1)
  value: '0'
  unit: count
  source: '[BP product sixMonth] no paid deployment is assumed before the initial pilot work starts.'
- id: A5
  name: Year 1 customer ramp
  value: M3 1; M5 2; M8 3; M10 4; M11 5; M12 6
  unit: customersEop
  source: '[BP product sixMonth/twelveMonth and gtm wedge] reflects 2-3 paid pilots in the first 6 months and several conversions by month 12.'
- id: A6
  name: Year 2 and 3 customer ramp
  value: Q1Y2 7; Q2Y2 8; Q3Y2 9; Q4Y2 10; Q1Y3 15; Q2Y3 22; Q3Y3 32; Q4Y3 40
  unit: customersEop
  source: '[BP milestones and Research SOM] reaches 5-8 production customers in the first 24 months and approaches the research-backed 40-customer year-3 SOM by Q4Y3.'
- id: A7
  name: Year 1 blended annualized revenue per active deployment
  value: 96-120
  unit: USDK per customer-year
  source: '[BP firstCustomer initialContract $20k-40k pilot and $90k-180k annual software contract] early months blend pilot pricing with initial production conversions.'
- id: A8
  name: Year 2 blended annualized revenue per active deployment
  value: 111-143
  unit: USDK per customer-year
  source: '[BP pricing plus implementation revenue and premium tiers] production accounts expand toward full annual contract value while some implementation revenue still contributes to the blend.'
- id: A9
  name: Steady-state annual ARPU
  value: '145'
  unit: USDK per customer-year
  source: '[Research market.sam and market.som] research anchors a blended ACV of about $145k per manager/deployment.'
- id: A10
  name: Gross margin path
  value: 41.9% Y1; 60.0% Y2; 69.6% Y3
  unit: percent
  source: '[BP businessModel targetGrossMarginPct 70 and operating risk on services-heavy implementation] model assumes approval-gated launches are services-heavy first and only reach the target neighborhood by year 3.'
- id: A11
  name: Monthly churn
  value: '1.0'
  unit: percent
  source: '[Startup finance heuristic: sticky B2B workflow infrastructure with annual contracts] conservative enough to avoid assuming perfect retention before trust is proven.'
- id: A12
  name: Loaded founder compensation
  value: '120'
  unit: USDK per year
  source: '[Startup finance heuristic: European pre-seed founder salary plus burden] used in the salary roll-up.'
- id: A13
  name: Loaded engineering compensation
  value: '160'
  unit: USDK per year
  source: '[Startup finance heuristic: early product engineer in Europe plus burden] used in the salary roll-up.'
- id: A14
  name: Loaded compliance product compensation
  value: '140'
  unit: USDK per year
  source: '[Startup finance heuristic: domain-heavy product/compliance hire plus burden] used in the salary roll-up.'
- id: A15
  name: Loaded solutions engineering compensation
  value: '150'
  unit: USDK per year
  source: '[Startup finance heuristic: early solutions engineer plus burden] used in the salary roll-up.'
- id: A16
  name: Loaded GTM / partnerships compensation
  value: '160'
  unit: USDK per year
  source: '[Startup finance heuristic: partnerships-led early seller plus burden] used in the salary roll-up.'
- id: A17
  name: Loaded G&A compensation
  value: '100'
  unit: USDK per year
  source: '[Startup finance heuristic: lean finance and operations support plus burden] used in the salary roll-up.'
- id: A18
  name: Hiring sequence
  value: Founder and founding engineer at start; compliance product in M2; solutions engineer in M4; second engineer in M7; partnerships lead in M10; G&A in Q1Y2; third engineer in Q2Y2; second compliance and second GTM in Q4Y2; second solutions and fourth engineer in Q2Y3; fifth engineer and third GTM in Q4Y3
  unit: schedule
  source: '[BP team and strategicChoices sequencingRationale] engineering and compliance lead the plan, solutions follows pilots, and broader GTM is delayed until conversion proof exists.'
- id: A19
  name: Non-payroll R&D spend schedule
  value: 14K/month in Q1Y1; 16K/month in Q2Y1; 18K/month in Q3Y1; 20K/month in Q4Y1; then 54K, 60K, 66K, 72K by quarter in Y2 and 78K, 84K, 90K, 96K by quarter in Y3
  unit: USDK
  source: '[Startup finance heuristic plus BP operations/security requirements] cloud, document processing, and security tooling rise with production deployments.'
- id: A20
  name: Non-payroll GTM spend schedule
  value: 4K/month in early Y1 rising to 10K/month by Q4Y1; then 24K, 27K, 30K, 36K by quarter in Y2 and 45K, 51K, 60K, 69K by quarter in Y3
  unit: USDK
  source: '[Startup finance heuristic plus BP founder-led GTM] spend stays lean until referrals and repeatable conversions justify broader outreach.'
- id: A21
  name: Non-payroll G&A spend schedule
  value: 8K/month in Q1Y1 rising to 12K/month in Q4Y1; then 30K, 33K, 36K, 39K by quarter in Y2 and 45K, 48K, 51K, 54K by quarter in Y3
  unit: USDK
  source: '[Startup finance heuristic plus Research GDPR/DORA diligence] legal, compliance, insurance, and admin overhead scale with buyer diligence.'
- id: A22
  name: Cash roll-forward convention
  value: ending cash equals opening cash plus EBITDA
  unit: policy
  source: '[Startup finance heuristic] debt, capex, and working-capital swings are assumed immaterial for this early software model.'
- id: A23
  name: Steady-state CAC
  value: '75'
  unit: USDK per customer
  source: '[Startup finance heuristic for founder-led enterprise sales with compliance diligence] used for unit-economics payback rather than as a direct historical average of the early P&L.'
