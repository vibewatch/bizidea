competitors:
- name: bunch
  stage: scale-up
  wedge: AI-native private-markets operating layer spanning fund admin, transfer agency, investor portal, and document ingestion.
  pricing: Custom quote; no public pricing.
  strength: European-first product and regulatory positioning, plus live traction with 150+ fund managers and 12,000+ LPs.
  weaknessVsUs: Product is broad across the fund lifecycle; a startup can be more opinionated around side-letter obligations and notice-specific approval logic.
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
- name: Juniper Square
  stage: incumbent
  wedge: Large integrated software-and-services platform for fundraising, onboarding, investor management, fund administration, and payments.
  pricing: Custom quote; no public pricing.
  strength: Scale, brand trust, and deep workflow coverage across 2,000+ GPs and treasury/admin workflows.
  weaknessVsUs: Broader platform breadth can make the side-letter-plus-notice problem only one feature area rather than the product center of gravity.
  sourceRefs:
  - 6
  - 7
  - 8
  - 9
  - 11
- name: Passthrough
  stage: scale-up
  wedge: Subscription-document and KYC/AML workflow automation for investor onboarding.
  pricing: Custom quote; no public pricing.
  strength: Strong onboarding UX, repeat-investor flows, and compliance-oriented intake automation.
  weaknessVsUs: Concentrated on pre-close onboarding rather than post-close notices, recurring obligations, and distribution workflows.
  sourceRefs:
  - 14
- name: Fundwave
  stage: scale-up
  wedge: Venture-fund admin software with capital-call notice generation and portal delivery.
  pricing: Free trial; pricing not public.
  strength: Clear point solution for capital-call notices and lightweight workflow adoption.
  weaknessVsUs: Narrower and more venture-admin oriented, with less evidence of side-letter reasoning and compliance orchestration depth.
  sourceRefs:
  - 15
- name: LemonEdge
  stage: scale-up
  wedge: Next-generation fund accounting and operations engine for private markets.
  pricing: Custom quote; no public pricing.
  strength: Deep accounting automation and scalability for complex private-markets books and structures.
  weaknessVsUs: Accounting-led architecture still leaves room for a communication-and-obligation control layer sitting above the ledger.
  sourceRefs:
  - 12
  - 13
