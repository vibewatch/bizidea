  validationPlan:
  - priority: high
    question: How many European PE/VC managers with outsourced administration still own LP notice drafting and side-letter tracking internally?
    evidenceToGather: 10-15 interviews with COOs, heads of fund ops, and admin leads across 3-8 fund managers.
  - priority: high
    question: What percentage of side-letter obligations can be extracted with near-zero critical misses on real European fund packs?
    evidenceToGather: Blind pilot across at least 200 historical side-letter clauses and investor notice templates.
  - priority: medium
