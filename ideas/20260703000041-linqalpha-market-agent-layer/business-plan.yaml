slug: coverage-drift-monitor
date: "2026-07-03"
executiveSummary: >-
  Coverage Drift Monitor sells a thesis-native exception queue to U.S. active
  long-only equity managers whose sector pods must re-underwrite dozens of
  names between earnings. The initial wedge is deliberately narrow: one
  industrials or consumer pod, approved research exports plus licensed data,
  explicit thesis checkpoints for 25-50 covered names, and cited morning
  alerts tied to the fund's own underwriting logic. This timing is credible
  because idea.yaml and research.yaml both show firm-specific market agents
  becoming a real buy-side budget category, with LinqAlpha reporting more than
  70 financial institutions and over $5T AUM on platform while AlphaSense and
  FactSet keep productizing always-on research workflows. The company only
  works if it starts from internal thesis checkpoints rather than broad content
  search, so product scope, pricing, and onboarding are all aligned around one
  pod's morning meeting instead of a generic terminal. The beachhead is real
  but small — research estimates roughly $79.9M TAM, $16.2M SAM, and a
  reachable $4.0M year-3 SOM — so venture upside depends on later expansion
  into additional pods, adjacent asset classes, and governance modules rather
  than on the long-only wedge alone. The hard problems are trust and
  onboarding, not model novelty: archive entitlements, checkpoint maintenance,
  and confidence that the system will not miss a real thesis break. The first
  18 months therefore focus on proving that a pod will sign a $100k-$150k
  initial contract, that approved-export onboarding can go live without a
  multi-month compliance stall, and that alert precision is good enough to
  replace part of the manual morning sweep across one earnings cycle. Public
  evidence does not yet quantify actual exception volume or acceptable
  false-negative thresholds, so those are treated as explicit operating
  assumptions rather than hidden optimism.
problem:
  - Sector pods still map Bloomberg alerts, AlphaSense searches, inboxes, and junior analyst sweeps back to thesis assumptions by hand, so important changes are either missed or discovered too late for the morning meeting.
  - The failure mode is not lack of data but lack of a system that ties new evidence to the exact underwriting checkpoints that matter for each covered name, with citations and an audit trail.
solution:
  - Ingest approved internal research exports, watchlists, and licensed market-data feeds to turn each covered name into explicit thesis checkpoints around demand, margin, channel, tariff, management, or balance-sheet signals.
  - Run bounded agents that surface only cited exceptions against those checkpoints, then deliver a PM-ready morning queue plus feedback capture so dismissed and escalated alerts improve precision over time.
whyWeWin:
  - The product starts from the fund's own thesis graph and analyst feedback rather than from the world's content corpus, which is a different data asset than AlphaSense-style search or FactSet-style monitoring.
  - One-pod morning exception routing is narrower and faster to prove than a generic research copilot, giving the startup a path to trust before asking institutions to re-platform research.
  - Cited, auditable outputs and entitlement-safe deployment fit how institutional buyers actually adopt AI in research, which reduces the chance that governance blocks the deal after a technical pilot.
strategicChoices:
  beachhead: >-
    One industrials or consumer sector pod inside a U.S. active long-only
    equity manager with $20B-$100B AUM, 15-30 analysts, 50-150 covered names,
    Bloomberg and AlphaSense already deployed, and a daily CIO morning meeting.
  wedgeRationale: >-
    Industrials and consumer teams face frequent nonfinancial thesis drift from
    tariffs, supply chains, inventory, pricing, and demand shocks, so one pod
    can produce visible exception volume and time-to-decision proof faster than
    a broad multi-sector rollout or a hedge-fund style general research
    assistant.
  sequencingRationale: >-
    We start with approved exports, explicit checkpoint templates, and morning
    alert delivery before deep archive ingestion or cross-asset expansion
    because research highlights entitlement friction and trust as the first
    gating risks. Founder-led sales, solutions onboarding, and human-reviewed
    alerts come before scaling engineering or a full terminal UI because the
    first 2-3 design partners must validate alert precision, maintenance
    burden, and budget ownership.
  notYet:
    - Full cross-asset coverage across credit, macro, and multi-asset desks before the long-only pod workflow shows repeatable precision and expansion.
    - A standalone research terminal or generic chat assistant competing head-on with AlphaSense, FactSet, or LinqAlpha across every workflow.
    - Autonomous research conclusions or trade recommendations without human analyst review.
market:
  tam: "$79.9M based on ~111 eligible U.S. long-only manager complexes, 4 initial sector pods per firm, and roughly $180k annual pod contracts."
  sam: "$16.2M based on ~30 U.S. active long-only managers that match the first-customer profile, with 3 initial pods each at roughly $180k ACV."
  som: "$4.0M based on 20 live sector pods across roughly 10-12 firms at a blended ~$200k annual value by year 3."
  segments:
    - U.S. active long-only equity managers with 10-40 analysts and global industrial or consumer coverage responsibilities
    - Later expansion into credit, macro, and multi-asset investment organizations once the thesis-checkpoint engine is proven
  buyingProcess: >-
    The sector head or research-platform lead usually champions the pilot after
    a volatile quarter exposes manual-sweep limits. The Head of Research or CIO
    signs once security, entitlement, and governance reviewers are satisfied
    that outputs are cited, reviewable, and usable inside the existing morning
    meeting workflow.
product:
  mvp: >-
    An approved-export MVP for one sector pod that maps 25-50 names into
    explicit checkpoints, monitors cited external and internal evidence, and
    delivers a secure morning exception queue plus PM-ready summaries. No
    direct trading, no fully autonomous research writing, and no requirement to
    replace Bloomberg or AlphaSense on day one.
  sixMonth: >-
    Add analyst feedback capture, alert-quality scoring, and reusable
    industrial and consumer checkpoint templates, and pilot the workflow with
    2-3 design partners covering one earnings cycle.
  twelveMonth: >-
    Ship deeper connectors into note stores and research workspaces, expand
    from one pod to 2-3 pods within early customers, and introduce governance
    controls for retention, permissions, and review history.
  twentyFourMonth: >-
    If long-only pod expansion metrics hold, launch a second asset-class
    template set such as credit or macro and add premium governance and
    benchmarking modules rather than building a broad terminal.
  keyBets:
    - Approved exports and licensed feeds are enough to produce high-recall alerts before direct archive ingestion is approved.
    - Analysts will tolerate explicit checkpoint maintenance if templates and feedback loops keep setup bounded.
    - A one-pod deployment can expand to second pods and governance modules quickly enough to overcome the beachhead's small SAM.
gtm:
  wedge: >-
    Sell a morning-meeting exception queue for one sector pod, not a new
    research terminal. The first product replaces manual sweeps and noisy
    alerts with cited changes against the fund's own thesis.
  channels:
    - Founder-led direct sales to Heads of Research, CIOs, and research-platform leaders at target firms
    - Design-partner pilots with one industrial or consumer pod during a volatile quarter
    - Referrals and implementation support from research-data consultants and buy-side technology integrators
    - Embedded API or secure workspace delivery into existing research environments after the first pilots
  funnelTargets: "lead→qualified pilot 20-30%; qualified pilot→paid pilot 50%+; paid pilot→annual production 60%+; first-pod→second-pod expansion 50%+ within 12 months"
  pricing: >-
    Annual subscription priced per coverage pod with covered-name volume bands,
    targeting $100k-$150k for the first pod and $200k-$300k as second-pod,
    connector, and governance modules are added. This matches how buyers
    already budget for research intelligence and monitoring tools, and it ties
    price to monitored underwriting surface rather than seat count.
businessModel:
  revenueStreams:
    - Annual subscription per coverage pod
    - Covered-name or monitoring-volume expansion within each pod
    - Premium connectors, governance, and benchmarking modules
    - One-time onboarding for thesis mapping and entitlement-safe workflow setup
  unitOfValue: "Per active coverage pod and covered-name volume under continuous thesis monitoring"
  targetGrossMarginPct: 72
  expansionLevers:
    - Add second and third pods inside the same manager
    - Upsell governance, retention, and alert-quality benchmarking modules
    - Expand the same checkpoint engine into credit, macro, or multi-asset workflows
strategyMap:
  northStarMetric: "Median time from new external evidence to a PM-ready cited thesis update on an affected name"
  inputMetrics:
    - Alert precision after analyst review
    - Miss rate on analyst-escalated thesis changes
    - Covered names with maintained checkpoints
    - Paid pilot to production conversion rate
    - Pod expansion rate within existing customers
  moatsToBuild:
    - Firm-specific thesis graph showing which assumptions matter for each covered name
    - Analyst feedback corpus on which alerts were dismissed, escalated, or converted into thesis revisions
    - Reusable industrial and consumer checkpoint templates and cross-name causal signal libraries
  killCriteria:
    - Fewer than 2 of the first 8 target managers sign a paid one-pod pilot within 9 months.
    - After one earnings cycle, the system still misses more than 10% of analyst-escalated thesis breaks or produces less than 60% alert precision on reviewed exceptions.
    - Onboarding a 25-50 name pod requires more than 4 weeks or more than 2 analyst-hours per name, making expansion economics unattractive.
  mermaid: |
    flowchart LR
      Wedge[One pod coverage-drift queue] --> MVP[Approved export thesis checkpoint MVP]
      MVP --> Proof[Paid pilot precision and onboarding proof]
      Proof --> Expansion[Second pod expansion and new asset classes]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Compelling workflow wedge and real budget adjacency, but still too early and too narrow to underwrite before pod-level pilots prove precision, onboarding speed, and expansion."
    whyBelieve: "The plan attacks a real buy-side workflow failure with a fund-specific thesis graph and cited exception workflow that adjacent incumbents still do not position as their core product."
    whyDoubt: "Public evidence still does not quantify actual exception frequency, acceptable miss rates, or how quickly a one-pod product expands beyond a roughly 30-account beachhead."
    nextDiligence: "See one paid sector-pod deployment running on approved exports with measured alert precision and a credible second-pod expansion path after one earnings cycle."
  firstCustomer:
    title: "Head of Research at a $20B-$100B U.S. active long-only manager"
    profile: "A 15-30 analyst firm with industrial and consumer sector pods, Bloomberg and AlphaSense already deployed, and a daily CIO morning meeting covering 50-150 global names."
    trigger: "A tariff, supply-chain, or demand shock forces mid-quarter re-underwriting across dozens of names and the team can no longer trust manual sweeps to catch every thesis break before the morning meeting."
    buyer: "Head of Research or CIO"
    initialContract: "Paid first-pod deployment for 25-50 covered names at $100k-$150k in year one, converting to $200k-$300k as a second pod, premium connectors, and governance modules are added."
  mustBeTrue:
    - A target pod experiences enough between-earnings thesis drift that 5 or more thesis-relevant exceptions per week or an equivalent manual sweep burden is common in volatile periods.
    - Head of Research or CIO buyers will fund a $100k-$150k first-pod deployment from existing research, monitoring, or AI workflow budget.
    - Approved-export ingestion plus licensed feeds can achieve cited alert precision above 60% and miss fewer than 10% of analyst-escalated thesis breaks across one earnings cycle.
    - Checkpoint setup and maintenance can stay below 2 analyst-hours per name at onboarding and below 15 minutes per name per month thereafter.
    - At least half of successful first-pod deployments expand to a second pod or premium module within 12 months, proving the wedge can grow beyond a niche point solution.
  diligenceQuestions:
    - What is the actual weekly exception volume and analyst time spent on manual sweeps in 5-8 target industrial or consumer pods?
    - Which budget owner signs first, and which existing tool spend is realistically being displaced?
    - How much useful archive coverage is available through approved exports versus blocked behind entitlements or compliance review?
    - What false-negative rate will a CIO or Head of Research accept before trusting the morning queue as a production input?
    - Why does the first-pod workflow beat LinqAlpha or AlphaSense strongly enough that it will not be copied as a feature?
operatingAssumptions:
  - assumption: One industrials or consumer pod sees enough between-earnings thesis drift to justify a daily exception queue.
    basis: research.yaml
    validationTest: Collect 4 weeks of manual sweep logs and morning-meeting notes from 5-8 target pods, then count thesis-relevant exceptions and analyst hours spent on triage.
    decisionImpact: If volume is low, narrow the product to a sharper shock-driven use case or broaden into a wider recurring research workflow before scaling sales.
  - assumption: Approved exports from internal notes and licensed vendors are enough to deliver a useful MVP without direct archive ingestion.
    basis: research.yaml
    validationTest: Run security review plus an MVP pilot using only approved exports at 2 design partners and measure coverage gaps versus the analysts' desired source set.
    decisionImpact: If export-only coverage misses too much, the roadmap must prioritize direct connectors and accept a longer enterprise sales cycle.
  - assumption: Analysts can maintain checkpoint templates without turning onboarding into a consulting-heavy process.
    basis: research.yaml
    validationTest: Time a 20-name setup and first earnings-cycle maintenance pass, targeting less than 60 minutes per name to onboard and less than 15 minutes per name per month to maintain.
    decisionImpact: If maintenance is too heavy, the product must automate template creation or reduce monitored variables, which limits coverage breadth and ACV.
  - assumption: A $100k-$150k first-pod contract can be signed from existing research, monitoring, or AI workflow budget.
    basis: research.yaml
    validationTest: Map current spend and buyer ownership across 8-10 target accounts and require at least 2 paid pilots at or above the target first-year price.
    decisionImpact: If no reallocatable budget exists, pricing must drop or the company must sell a broader firm-level workflow rather than a one-pod wedge.
  - assumption: At least half of successful first-pod deployments expand to a second pod or premium module within 12 months.
    basis: idea.yaml
    validationTest: Track renewal and expansion intent across the first 3-4 paid customers and require 50% or better second-pod or module conversion.
    decisionImpact: If expansion does not materialize, the company remains a niche long-only tool and should cap burn or rethink the market.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Exception-volume baseline study with 8 target industrial or consumer pods using manual sweep logs and morning-meeting notes.
    hypothesis: Target pods face enough between-earnings thesis drift to justify a dedicated exception queue.
    successMetric: At least 5 of 8 pods confirm recurring weekly exception volume or manual triage burden large enough to support the paid-pilot story.
    owner: Founder / Head of GTM
  - horizon: 0-90 days
    experiment: Checkpoint-template sprint for 20 names using archived notes and approved exports from one design partner.
    hypothesis: Checkpoint onboarding can stay bounded without exhausting senior analyst time.
    successMetric: Median onboarding time below 60 minutes per name and analyst acceptance of the template structure after one review cycle.
    owner: Founder / domain lead
  - horizon: 3-6 months
    experiment: Entitlement-safe concierge MVP at the first design partner using approved exports and licensed feeds.
    hypothesis: Export-only ingestion is enough to generate cited alerts with usable recall before direct archive connectors are approved.
    successMetric: All alerts include citations and the pilot captures at least 80% of analyst-reviewed thesis-relevant events in scope.
    owner: Founding eng
  - horizon: 3-6 months
    experiment: Pricing and buyer validation on one-pod deployments sold directly to Heads of Research and CIOs.
    hypothesis: The first contract can close at $100k-$150k from existing research or AI workflow budget.
    successMetric: Two paid first-pod deployments signed at or above the target first-year contract value.
    owner: Founder / Head of GTM
  - horizon: 6-12 months
    experiment: Alert-quality review through one earnings cycle with analyst feedback capture turned on.
    hypothesis: Feedback loops reduce noise enough for the morning queue to replace part of the manual sweep.
    successMetric: Alert precision above 60%, miss rate below 10%, and daily usage retained through the full earnings cycle.
    owner: Solutions engineer / research ops lead
  - horizon: 12-18 months
    experiment: Second-pod or embedded-API expansion inside the first paid customers.
    hypothesis: Once one pod trusts the workflow, expansion to additional monitored names or delivery surfaces follows quickly.
    successMetric: 50% or more of the first 4 paying pods renew with a higher ACV through second-pod or module expansion.
    owner: Founder / Head of GTM
operations:
  - Entitlement-safe ingestion that starts with customer-approved exports, licensed vendor feeds, and line-level citation provenance.
  - Weekly alert-quality reviews with sector heads so every dismissal, escalation, and thesis revision feeds the precision model.
  - Delivery via secure morning packets, API outputs, or existing research workspaces rather than a greenfield UI on day one.
  - Solutions-led onboarding that creates reusable industrial and consumer checkpoint libraries before expanding to new pods.
  - Partner motion with data vendors and research-tech integrators for connectors, retention controls, and governance reviews.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: The checkpoint graph, retrieval layer, and cited alert engine are the MVP core and must exist before any design-partner pilot can run.
  - role: Founder / domain lead
    startTiming: Month 0
    rationale: A founder with buy-side research or research-platform credibility is needed to win access to internal archives, define checkpoint templates, and shorten the trust gap with Heads of Research.
  - role: Solutions engineer / research ops lead
    startTiming: Month 2-4
    rationale: Onboarding quality determines whether checkpoint setup becomes a moat or a services burden, so a dedicated operator is needed as soon as the first pilot starts.
  - role: Founding GTM
    startTiming: Month 6
    rationale: The SAM is concentrated and relationship-driven, so a focused seller should join only after the MVP and buyer narrative are strong enough for a paid-pilot motion.
  - role: Second engineer
    startTiming: Month 9-12
    rationale: Deeper note-store connectors, governance controls, and embedded delivery require additional product capacity once the first pod proves alert quality.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 2-3 design partners and go live on one industrial or consumer pod using approved-export ingestion.
      - Validate a $100k-$150k first-pod contract and identify a repeatable buyer inside research leadership.
      - Achieve greater than 60% alert precision with fewer than 10% misses on analyst-escalated thesis changes across one earnings cycle.
      - Keep onboarding below 4 weeks per pod and below 2 analyst-hours per name.
  - horizon: 12-24 months
    items:
      - Convert 3-5 pods across 2-4 firms into annual contracts and land at least 2 second-pod expansions.
      - Ship deeper note-store and workspace connectors plus governance, retention, and review-history controls.
      - Launch reusable industrial and consumer checkpoint templates that cut new-pod setup time by at least 30%.
  - horizon: 24-36 months
    items:
      - Reach the researched year-3 SOM of about 20 live pods across roughly 10-12 firms at a blended ~$200k annual value.
      - Prove one adjacent expansion path into credit, macro, or multi-asset workflows without losing long-only focus.
      - Turn alert-quality benchmarks and sector templates into a premium module that raises ACV and defends against bundling.
risks:
  - risk: Analysts and CIOs may not trust the system if it misses a material thesis break or floods the morning queue with noise.
    likelihood: High
    impact: High
    mitigation: Start with one pod, require cited outputs and human review, and instrument precision and miss-rate evaluation before any broad rollout.
  - risk: Archive entitlements, data permissions, and recordkeeping review could delay pilots enough to stall early revenue.
    likelihood: High
    impact: High
    mitigation: Begin with approved exports, limited source scope, explicit access controls, and retention-ready audit logs before asking for deep private-data connectors.
  - risk: Checkpoint maintenance may become a hidden services burden that senior analysts refuse to own.
    likelihood: Medium
    impact: High
    mitigation: Use sector templates, solutions-led onboarding, and strict scope limits on the number of variables tracked per name until maintenance costs are understood.
  - risk: AlphaSense, FactSet, LinqAlpha, or an internal research-tech team could add basic thesis-monitoring features faster than expected.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on explicit checkpoint management, workflow embedding, and the feedback dataset around what changed underwriting rather than on generic agent quality.
  - risk: The initial buyer universe is concentrated, so a slow enterprise sales cycle or weak expansion could make the company too small for venture returns.
    likelihood: Medium
    impact: High
    mitigation: Hold burn to a pre-seed plan, prove second-pod expansion early, and only invest aggressively in cross-asset growth after long-only retention data is real.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "18 months to build the one-pod approved-export MVP, close 2-3 paid design partners, prove alert precision and low-friction onboarding across one earnings cycle, and show second-pod expansion before raising a seed round for deeper connectors and cross-asset growth."
