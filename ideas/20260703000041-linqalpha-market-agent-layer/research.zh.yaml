categoryDynamics:
  growthRate: 采用代理指标：受访的财富与资管机构中，95% 已把 GenAI 扩展到多个应用场景，78% 正在探索 agentic AI。
  growthRateSourceRefs:
    - 37
  tailwinds:
    - point: 公开市场如今被普遍描述为变化太快、全球联动太强，传统研究工作流已经跟不上，因此持续监控开始变得战略上说得通。
      sourceRefs:
        - 4
        - 36
    - point: 研究平台正在把常驻监控和定制工作流代理产品化，买方也因此越来越习惯把自动化当成默认答案，而不是人工重复劳动。
      sourceRefs:
        - 12
        - 13
        - 15
    - point: AI-first operating model 承诺更宽覆盖、更快研究节奏，以及对持仓和风险做更动态的重估。
      sourceRefs:
        - 2
        - 37
  headwinds:
    - point: 主动管理人仍在对抗指数化产品持续抢份额，因此任何新工具都必须尽快在既有预算上证明 ROI。
      sourceRefs:
        - 1
    - point: 监管、隐私和准确率问题，仍然是 AI 辅助投资工作流走向生产信任的实质障碍。
      sourceRefs:
        - 3
        - 26
        - 27
        - 29
    - point: 老牌数据、搜索和模型供应商已经覆盖了大半工作流表面，完全可以横向长进相邻用例。
      sourceRefs:
        - 16
        - 17
        - 18
        - 19
        - 33
competitors:
  - name: LinqAlpha
    stage: scale-up
    wedge: 面向金融场景的多代理研究平台，会学习每个投资团队的框架，并交付带来源链接的全球市场情报。
    pricing: 公开未披露定价
    strength: 对品类的验证最强，跨资产野心明确，围绕团队专属代理和私有数据集成已经拿到真实买方牵引。
    weaknessVsUs: 平台定位过宽可能分散聚焦；拟议中的初创公司在显式检查点管理和单个行业小组的晨会异常路由上更窄、更专。
    sourceRefs:
      - 4
      - 8
      - 9
      - 10
  - name: AlphaSense
    stage: incumbent
    wedge: 高端市场情报平台，提供带引文的搜索、工作流代理、看板以及常驻型 SuperAnalyst 执行层。
    pricing: 年度订阅，可按企业整体或按席位计费
    strength: 内容语料深、监控体验强，而且正明显朝常驻金融工作流推进。
    weaknessVsUs: 它的起点是广义内容发现与工作流自动化，而不是基金自己的论点图谱和异常分类。
    sourceRefs:
      - 12
      - 13
      - 14
      - 15
  - name: FactSet
    stage: incumbent
    wedge: 嵌入机构数据与分析工作流中的模块化资管与 AI 组合监控栈。
    pricing: 公开未披露定价
    strength: 在买方组织里已经拥有数据授权、数据广度和安全分析足迹。
    weaknessVsUs: 它更像宽泛的数据与监控平台，而不是围绕内部研究档案做论点专属异常操作系统。
    sourceRefs:
      - 16
      - 17
  - name: Canalyst
    stage: scale-up
    wedge: 结构化模型与财报后更新层，帮助分析师扩大覆盖并保持财务模型最新。
    pricing: 公开未披露定价
    strength: 在结构化模型底座和基本面团队的财报后更新工作流上很强。
    weaknessVsUs: 它更偏向模型维护，而不是持续综合非财务证据去检验显式论点检查点。
    sourceRefs:
      - 18
      - 19
  - name: Boosted.ai
    stage: scale-up
    wedge: 专为金融打造的 AI，公开定位是现代投资的答案引擎。
    pricing: 公开未披露定价
    strength: 对买方用户的 AI 原生定位直接，而且明确强调信任与相关性优于通用助手。
    weaknessVsUs: 公开定位仍然偏宽，围绕金融问答展开，而不是一条界定清晰、以投资论点为原生对象的异常工作流。
    sourceRefs:
      - 33
regulatoryTechnicalConstraints:
  - point: AI 辅助研究提醒必须在既有监督、数据完整性、隐私和可靠性要求之内运行，而不是游离在这些要求之外。
    sourceRefs:
      - 26
      - 27
  - point: 提醒内容、支撑引文和业务沟通记录，可能都需要以正式记录的标准进行保存、检索和完整性保护。
    sourceRefs:
      - 28
      - 29
  - point: 如果输出进入正式研究工作流，研究报告规则和分析师利益冲突规则就会决定系统能怎么用、怎么被复核。
    sourceRefs:
      - 30
  - point: 想拿到生产信任，必须具备来源级引文、可观察检索过程，以及跨多代理步骤的评测能力——只会把最终答案写得流畅远远不够。
    sourceRefs:
      - 20
      - 22
      - 23
      - 24
validationSignals:
  - point: LinqAlpha 称，其平台已经服务 70 多家金融机构，以及管理资产超过 $5T 的买方客户。
    sourceRefs:
      - 4
  - point: Third Square 表示，LinqAlpha 把早期想法验证速度提到了 5-6 倍，并为新想法加入了 AI 生成的反向观点审计。
    sourceRefs:
      - 6
  - point: MUST Asset Management 直接把失败模式描述为“keyword tyranny”，这验证了市场需要的是动态叙事监控，而不是静态搜索。
    sourceRefs:
      - 7
  - point: OpenBB 已经在展示一种安全、可定制的工作区模式：专业研究代理不是把机构环境整体替换掉，而是以插件方式嵌进去。
    sourceRefs:
      - 32
