scenarios:
  downside:
    description: Archive review drags, first-pod pricing lands near the low end of the BP range, and manual checkpoint upkeep delays second-pod expansion.
    y3RevenueK: 2350.0
    y3EbitdaK: -340.0
    cashLowPointK: 210.0
    keyAssumptionChanges:
      - Q4Y3 ends near 15 paid pods instead of 20.
      - Blended pod value exits closer to ~$180K ARR instead of roughly $200K.
      - Gross margin stalls in the mid-60s because onboarding remains services-heavy.
  base:
    description: The company converts founder-led design partners into repeatable paid pods, then expands inside early accounts while templates lift margin toward the BP target.
    y3RevenueK: 3017.2
    y3EbitdaK: 30.4
    cashLowPointK: 536.0
    keyAssumptionChanges:
      - 3 paid pods by M12, 9 by Q4Y2, and 20 by Q4Y3.
      - Blended pod value reaches the researched ~$200K annual level by year-3 exit.
      - Gross margin reaches the BP target 72% by Q4Y3 as onboarding becomes more template-driven.
  upside:
    description: Reference accounts shorten sales cycles, governance modules attach earlier, and reusable checkpoint libraries cut implementation cost faster than planned.
    y3RevenueK: 3520.0
    y3EbitdaK: 290.0
    cashLowPointK: 650.0
    keyAssumptionChanges:
      - Q4Y3 reaches about 23 paid pods instead of 20.
      - Blended pod value exits near ~$215K ARR as governance and connector attach land sooner.
      - Gross margin rises toward 75% because reusable templates reduce services load.
sensitivity:
  - variable: ARPU
    downsideCase: First-pod pricing stays near $140K ARR and module attach is weaker, leaving blended pod value about 10% below plan.
    baseCase: Blended pod value exits near the researched ~$200K annual level, with premium governance and connector attach only in later cohorts.
    upsideCase: Second-pod expansion plus governance attach pushes mature pod value toward ~$220K ARR by Q4Y3.
    y3RevenueImpactK: -301.7
    cashImpactK: -225.0
  - variable: CAC
    downsideCase: Buyer education and compliance review increase blended CAC toward about $90K per new paying pod.
    baseCase: Founder-led selling and a concentrated account list keep blended CAC near $72.5K.
    upsideCase: Reference customers and integrator referrals pull blended CAC toward the mid-$60Ks.
    y3RevenueImpactK: -120.0
    cashImpactK: -350.0
  - variable: churn
    downsideCase: Monthly pod churn rises to 2.5% if alert precision disappoints or checkpoint upkeep feels too heavy.
    baseCase: Monthly churn holds near 1.8% once a pod is embedded in the morning meeting workflow.
    upsideCase: Monthly churn falls toward 1.2% as governance history and analyst feedback deepen switching costs.
    y3RevenueImpactK: -180.0
    cashImpactK: -160.0
  - variable: sales cycle
    downsideCase: Pilot-to-production conversion stretches from roughly one quarter to roughly two quarters because archive and entitlement review drags.
    baseCase: Paid pilots convert in about 90 days after one earnings-cycle proof and a willing research-budget owner.
    upsideCase: Referenceable precision metrics and approved-export playbooks compress conversion closer to 60 days.
    y3RevenueImpactK: -420.0
    cashImpactK: -310.0
  - variable: gross margin
    downsideCase: Gross margin stalls near the mid-60s if onboarding and checkpoint maintenance remain semi-manual.
    baseCase: Gross margin exits at the BP target 72% after template reuse and tighter entitlement-safe delivery.
    upsideCase: Margin reaches roughly 75% if templates and governance modules standardize faster than expected.
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
  - variable: hiring pace
    downsideCase: An extra solutions or GTM hire is pulled forward before repeatable second-pod expansion is visible.
    baseCase: Hiring waits for proof points and follows the BP sequencing around pilots, connectors, and governance.
    upsideCase: One late-Y3 scale hire slips without hurting bookings because templates lower implementation load.
    y3RevenueImpactK: 80.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetPods[Target sector pods] --> PaidPilots[Paid pilot pods]
      PaidPilots --> ProductionPods[Production and expanded pods]
      ProductionPods --> ARPU[Pod ARR plus modules]
      ARPU --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base revenue is driven by scaling from 3 paid pods at Y1 exit to 20 at Q4Y3 while blended pod value climbs toward the researched ~$200K annual level.
  - checkName: Must go right
    finding: The company must convert paid pilots in about one quarter and keep onboarding below 4 weeks, or the narrow pod wedge will not compound into second-pod expansion.
  - checkName: Model breaks if
    finding: If sales cycles stretch toward two quarters or gross margin stalls in the mid-60s, the downside case pushes the cash floor toward roughly $0.2M before seed proof is secure.
  - checkName: Next-round proof
    finding: The seed story is 5 paid pods across roughly 3 firms with >60% alert precision, one credible second-pod expansion path, and clear evidence that research leaders will fund annual production use.
sanityChecks:
  ruleOf40: Y3 growth 188.6% + EBITDA margin 1.0% = 189.6%
  burnMultiple: Y2 burn multiple is about 0.7x using roughly $0.87M of EBITDA burn against about $1.22M of net new ARR.
  revenuePerFte: $302K Y3 on 10 ending FTE (benchmark $200-400K SaaS)
  flags:
    - The year-3 case assumes the company reaches the full researched 20-pod SOM, so execution has to be strong even though the buyer pool is concentrated.
    - customersEop counts paid pods rather than whole-firm logos, which better matches pricing but can make headline customer counts look larger than unique logos.
    - Gross margin reaches the 72% target only if checkpoint templates and approved-export onboarding become repeatable; otherwise services drag will compress EBITDA.
    - The model reaches only near-breakeven in Y3, so a seed round is still likely needed to fund cross-asset expansion beyond the long-only beachhead.
    - Cash is modeled as EBITDA; deferred cash collections, prepaid pilots, or compliance-driven capex could shift the actual cash curve.
