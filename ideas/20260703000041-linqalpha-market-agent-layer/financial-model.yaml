slug: coverage-drift-monitor
date: '2026-07-03'
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: Model start month
    value: 2026-08
    unit: YYYY-MM
    source: '[BP date 2026-07-03] the model begins in the first full month after the dated business plan.'
  - id: A2
    name: Opening cash / pre-seed raise
    value: $2.4M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case sizes the raise to cover the 18-month proof plan plus roughly six months of buffer.'
  - id: A3
    name: Paying customer unit
    value: An active paid coverage pod, not a whole firm logo
    unit: definition
    source: '[BP gtm.pricing + BP businessModel.unitOfValue + Research market.som] pricing, SOM, and expansion are all expressed per pod.'
  - id: A4
    name: Starting paying pods (M1)
    value: '0'
    unit: count
    source: '[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first sign paid design partners.'
  - id: A5
    name: First-pod annual value
    value: $125K-$150K ARR
    unit: USD/pod/year
    source: '[BP gtm.pricing $100k-$150k for the first pod + BP investorMemo.firstCustomer.initialContract] the model starts near the middle-to-high end of the first-pod range once a paid pilot converts.'
  - id: A6
    name: Mature pod annual value
    value: ~$200K ARR by Q4Y3
    unit: USD/pod/year
    source: '[Research market.som blended ~$200k annual value + BP gtm.pricing $200k-$300k with modules] exit ARPU reaches the researched SOM level without assuming the top end of pricing.'
  - id: A7
    name: Revenue recognition convention
    value: Revenue equals period-end paid pods multiplied by blended realized revenue per pod for that period.
    unit: formula
    source: '[A3 + A5 + A6] early periods use lower paid-pilot/first-pod economics and later periods reflect module attach plus second-pod maturity.'
  - id: A8
    name: Pod ramp
    value: 3 paid pods by M12, 9 by Q4Y2, and 20 by Q4Y3
    unit: customersEop
    source: '[BP milestones 0-12 / 12-24 / 24-36 + Research market.som 20 live pods by year 3] base case matches the plan to prove 2-3 design partners first, then scale through expansion and new logos.'
  - id: A9
    name: Gross margin ramp
    value: 45%-58% in Y1, 60%-67% in Y2, and 69%-72% in Y3
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 72 + BP operations + Research reportMemo.sensitivityCases] early delivery is services-heavy before templates and governance tooling standardize onboarding.'
  - id: A10
    name: Hiring timeline
    value: Founder and founding engineer at M1; first solutions hire at M4; first GTM at M7; second engineer at M10; third engineer at M16; ops at M22; second solutions at M28; fourth engineer at M29; second GTM at M34.
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays lean until paid-pilot proof and later expansion justify added delivery and sales capacity.'
  - id: A11
    name: Founder loaded compensation
    value: $156K
    unit: USD/year
    source: '[BP team founder / domain lead + startup-finance heuristic] lean founder cash compensation with payroll taxes and benefits.'
  - id: A12
    name: Engineering loaded compensation
    value: $204K
    unit: USD/year
    source: '[BP team founding eng and later connector/governance roadmap + startup-finance heuristic] engineering pay reflects senior data / workflow talent at a pre-seed cash profile.'
  - id: A13
    name: Solutions / research ops loaded compensation
    value: $156K
    unit: USD/year
    source: '[BP team solutions engineer / research ops lead + BP operations + startup-finance heuristic] onboarding and alert-quality reviews need a technical customer-facing owner.'
  - id: A14
    name: Sales / GTM loaded compensation
    value: $180K
    unit: USD/year
    source: '[BP team founding GTM + BP gtm.channels + startup-finance heuristic] includes variable pay and travel for concentrated enterprise outreach.'
  - id: A15
    name: G&A / ops loaded compensation
    value: $120K
    unit: USD/year
    source: '[BP operations + startup-finance heuristic] covers finance, vendor, and compliance operations without building a full back office.'
  - id: A16
    name: Payroll allocation to P&L lines
    value: Founder 40% S&M / 40% R&D / 20% G&A; engineering 100% R&D; solutions 50% S&M / 50% R&D; GTM 100% S&M; ops 100% G&A
    unit: allocation
    source: '[BP team role rationales + BP operations] the model maps payroll to go-to-market, product, and admin work actually performed by each role.'
  - id: A17
    name: Non-payroll opex ramp
    value: Monthly non-payroll spend rises from S&M/R&D/G&A of $4K/$10K/$6K in early Y1 to $22K/$20K/$11.5K by Q4Y3.
    unit: USD/month
    source: '[BP operations + startup-finance heuristic] covers cloud/data costs, travel, legal, insurance, and compliance support without assuming a large demand-gen engine.'
  - id: A18
    name: Cash conversion convention
    value: Cash movement equals EBITDA
    unit: formula
    source: '[startup-finance heuristic] taxes, capex, financing fees, and working-capital timing are assumed immaterial at this pre-seed scale.'
  - id: A19
    name: Steady-state monthly pod churn
    value: 1.8%
    unit: percent/month
    source: '[startup-finance heuristic for workflow SaaS + BP gtm.funnelTargets + BP mustBeTrue expansion if trusted] a pod embedded in a morning meeting should be sticky, but early trust risk still warrants non-trivial churn.'
  - id: A20
    name: Base sales cycle
    value: ~90 days from paid-pilot start to annual production conversion
    unit: days
    source: '[BP experimentRoadmap 3-6 months + BP milestones 0-12 months] one earnings-cycle proof is assumed sufficient for initial budget conversion in the base case.'
  - id: A21
    name: CAC convention
    value: 36-month sales and marketing spend divided by 20 net new paid pods
    unit: formula
    source: '[model calc + BP gtm.funnelTargets + Research reportMemo.distributionChannels] the metric blends first-pod acquisition and lower-friction expansion pods inside a concentrated enterprise account list.'
  - id: A22
    name: Next-round milestone for funding sizing
    value: 5 paid pods by Q2Y2, alert precision above 60%, onboarding below 4 weeks, and evidence of at least one second-pod expansion path.
    unit: milestone
    source: '[BP fundingAsk.useOfFundsSummary + BP milestones 0-12 and 12-24 months + BP strategyMap.killCriteria] the pre-seed is meant to get the company to repeatable proof, not full market saturation.'
  - id: A23
    name: Quarterly salary-roll convention
    value: Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only quarter-end snapshots.
    unit: convention
    source: '[Headcount column convention + A10] this keeps salary expense internally consistent even though Y2 and Y3 headcount columns only show year-end snapshots.'
  - id: A24
    name: Use-of-funds mix
    value: 45% engineering / 25% GTM / 10% G&A / 20% six-month buffer
    unit: allocation
    source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] the budget stays engineering-led while reserving explicit cash for enterprise-sales slippage and compliance delays.'
