slug: coverage-drift-monitor
date: '2026-07-03'
executiveSummary: >-
  Coverage Drift Monitor
  向美国主动型只做多股票管理人卖的是一条以投资论点为原生对象的异常队列，服务那些必须在财报间隙重新审视几十个标的的行业小组。首个切口故意做窄：先做一个工业或消费行业小组，只接入获批研究导出和授权数据、为 25-50
  个覆盖标的建立明确论点检查点，并产出绑定基金自身投资判断逻辑的晨会引文提醒。这个时点站得住脚，因为 idea.yaml 和 research.yaml 都显示，机构专属市场代理正从概念走向真实的买方预算品类；LinqAlpha
  披露平台已有 70 多家金融机构、覆盖超过 $5T AUM，同时 AlphaSense 和 FactSet
  也在持续把常驻型研究工作流产品化。这个公司只有在一开始就围绕内部论点检查点展开，而不是围绕大而全的内容搜索展开，才有成立空间，因此产品边界、定价和接入流程
  全都要围绕一个行业小组的晨会，而不是再造一个通用终端。滩头市场真实但不大——研究估算 TAM 约 $79.9M、SAM 约 $16.2M、可触达的第 3 年 SOM 约
  $4.0M——所以真正的风险投资回报，不会来自只做多这个单点切口本身，而要来自后续向更多小组、相邻资产类别和治理模块的扩张。真正难的不是模型新奇度，而是信任与接入摩擦：档案授权、检查点维护，以及买方是否相信系统不会漏掉真正的论点失效。于是前 18 个月的任务就很明确：证明一个行业小组愿意签下 $100k-$150k 的首单，证明获批导出式接入
  不会卡在几个月的合规审查里，证明提醒精度足以在一个财报周期内替代掉一部分每天早晨的人工扫盘。公开信息还没有量化真实的异常量或可接受的漏报阈值，所以这些都被明确当作经营假设，而不是藏在模型里的乐观前提。
problem:
  - 行业小组今天仍然得手工把 Bloomberg 提醒、AlphaSense 搜索、收件箱信息和初级分析师扫盘结果，一条条映射回投资论点假设，因此重要变化不是被漏掉，就是晚到晨会之后才发现。
  - 真正的失败并不是数据不够，而是没有一套系统能把新证据精确挂到每个覆盖标的最关键的投资判断检查点上，并且同时给出引文和审计轨迹。
solution:
  - 接入获批的内部研究导出、观察名单和授权市场数据流，把每个覆盖标的拆成围绕需求、利润率、渠道、关税、管理层或资产负债表信号的明确论点检查点。
  - 运行边界明确的代理，只把这些检查点上的带引文异常顶出来，再交付一条 PM 可直接使用的晨会队列，并记录反馈，让被忽略和被升级的提醒持续提升精度。
whyWeWin:
  - 产品不是从全世界的内容库出发，而是从基金自己的论点图谱和分析师反馈出发；这套数据资产和 AlphaSense 式搜索、FactSet 式监控根本不是同一种东西。
  - “单个行业小组的晨会异常路由”比通用研究助手更窄、也更快能证明价值，初创公司可以先拿到信任，再谈让机构重构整个研究平台。
  - 带引文、可审计的输出加上授权安全的部署方式，更贴近机构买方真正采纳 AI 的路径，从而降低技术试点通过后仍被治理拦下来的概率。
strategicChoices:
  beachhead: 美国主动型只做多股票管理人里的一个工业或消费行业小组，AUM 在 $20B-$100B 之间，拥有 15-30 名分析师、覆盖 50-150 个标的，已部署 Bloomberg 和 AlphaSense，并且每天都有 CIO 晨会。
  wedgeRationale: 工业和消费团队经常会遇到关税、供应链、库存、定价和需求冲击带来的非财务论点漂移，因此单个小组比起广泛的多行业铺开，或对冲基金式的通用研究助手，更容易先跑出可见的异常量和决策提速证据。
  sequencingRationale: >-
    先做获批导出、显式检查点模板和晨会提醒交付，再谈深度档案接入或跨资产扩张，因为研究里最先暴露出来的卡点就是授权摩擦和信任。创始人主导销售、解决方案式接入 和人工复核提醒都必须先行；只有最初 2-3
    个共创客户验证了提醒精度、维护负担和预算归属，工程和终端界面才值得放大投入。
  notYet:
    - 在只做多行业小组工作流还没跑出可复制精度和扩张数据之前，不做信用、宏观和多资产团队 的全覆盖。
    - 不去做一个独立研究终端，也不正面和 AlphaSense、FactSet 或 LinqAlpha 在所有工作流上打全面战。
    - 没有人工分析师复核之前，不输出自主研究结论或交易建议。
market:
  tam: $79.9M，估算方法为：约 111 家符合条件的美国只做多管理人集团 × 每家 4 个初始行业小组 × 每个小组约 $180k 年合同额。
  sam: $16.2M，按约 30 家符合首批客户画像的美国主动型只做多管理人计算，每家先从 3 个小组、每个小组约 $180k ACV 起步。
  som: $4.0M，假设第 3 年能跑到约 10-12 家机构、20 个在运转的行业小组，混合年合同价值约 ~$200k。
  segments:
    - 拥有 10-40 名分析师、负责全球工业或消费覆盖的美国主动型只做多股票管理人
    - 一旦论点检查点引擎被验证，再向信用、宏观和多资产投资组织扩张
  buyingProcess: 通常是某个波动很大的季度先暴露出人工扫盘的极限，于是行业负责人或研究平台主管开始推动试点。等安全、授权和治理审查确认输出具备引文、可复核，并且能嵌入现有晨会工作流后，研究主管或 CIO 才会拍板。
product:
  mvp: >-
    一个面向单个行业小组的获批导出 MVP：把 25-50 个标的映射成明确检查点，持续监控内外部带引文证据，并交付安全的晨会异常队列和 PM 可直接使用的摘要。第一天不碰直接交易，不做全自动研究写作，也不要求替换 Bloomberg
    或 AlphaSense。
  sixMonth: 补上分析师反馈采集、提醒质量评分和可复用的工业/消费检查点模板，并与 2-3 个共创客户跑完一个完整财报周期。
  twelveMonth: 打通更深的笔记库和研究工作区连接器，在早期客户里从 1 个小组扩到 2-3 个小组，并上线留存、权限和复核历史等治理控制。
  twentyFourMonth: 如果只做多小组的扩张指标成立，再推出第二套资产类别模板，比如信用或宏观，并优先卖高级治理与基准模块，而不是做一个大而全的终端。
  keyBets:
    - 在直接接入深层档案获批之前，获批导出加授权数据流就足以做出高召回提醒。
    - 只要模板和反馈闭环把 配置控制住，分析师会接受显式维护检查点。
    - 单个小组部署能足够快地扩到第二个小组和治理模块，从而弥补滩头市场 SAM 偏小的问题。
gtm:
  wedge: 卖的是一个行业小组的晨会异常队列，不是一个新的研究终端。第一版产品要替代的是人工扫盘和嘈杂提醒，把基金自身投资论点上的变化直接顶出来。
  channels:
    - 创始人直接卖给目标机构的研究主管、CIO 和研究平台主管
    - 在高波动季度里，与一个工业或消费行业小组做共创试点
    - 通过研究数据顾问和买方技术集成商拿推荐和实施支持
    - 首批试点之后，再通过嵌入式 API 或安全工作区交付到现有研究环境里
  funnelTargets: 线索→合格试点 20-30%；合格试点→付费试点 50%+；付费试点→年度生产 60%+；首个小组→第二个小组扩张在 12 个月内达到 50%+。
  pricing: >-
    按覆盖小组收年度订阅费，并按覆盖标的量分档；首个小组目标价位 $100k-$150k，随着第二个小组、连接器和治理模块陆续加上去，价格提升到
    $200k-$300k。这个定价方式契合买方给研究情报和监控工具编预算的习惯，也让价格直接锚定在被持续监控的投资判断表面，而不是席位数。
businessModel:
  revenueStreams:
    - 按覆盖小组收取年度订阅费
    - 在同一小组内按覆盖标的数量或监控量扩容
    - 高级连接器、治理和基准模块
    - 围绕论点映射和授权安全工作流 配置 的一次性接入收费
  unitOfValue: 以持续进行论点监控的活跃覆盖小组和覆盖标的量为计价单位
  targetGrossMarginPct: 72
  expansionLevers:
    - 在同一家管理人里拿下第二个、第三个小组
    - 向上销售治理、留存和提醒质量基准模块
    - 把同一套检查点引擎扩到信用、宏观或多资产工作流
strategyMap:
  northStarMetric: 从外部新证据出现，到受影响标的生成一条 PM 可直接使用、且带引文的论点更新，中位耗时是多少
  inputMetrics:
    - 分析师复核后的提醒精度
    - 分析师升级的论点变化中的漏报率
    - 拥有持续维护检查点的覆盖标的数量
    - 付费试点转正式生产的转化率
    - 现有客户内部的小组扩张率
  moatsToBuild:
    - 一张机构专属论点图谱，清楚知道每个覆盖标的真正重要的假设是什么
    - 分析师关于哪些提醒被忽略、哪些被升级、哪些最终写进论点修订的反馈语料
    - 可复用的工业和消费检查点模板，以及跨标的因果信号库
  killCriteria:
    - 前 8 家目标管理人里，9 个月内付费签下单小组试点的少于 2 家。
    - 跑完一个财报周期后，系统仍漏掉超过 10% 的分析师升级论点失效，或经复核的异常精度低于 60%。
    - 一个覆盖 25-50 个标的小组接入周期超过 4 周，或每个标的耗费超过 2 个分析师工时，导致扩张经济性不成立。
  mermaid: |
    flowchart LR
      Wedge[One pod coverage-drift queue] --> MVP[Approved export thesis checkpoint MVP]
      MVP --> Proof[Paid pilot precision and onboarding proof]
      Proof --> Expansion[Second pod expansion and new asset classes]
investorMemo:
  verdict:
    call: 观望
    conviction: 工作流切口很抓人，预算邻接也真实，但在小组级试点证明提醒精度、接入速度和扩张能力之前，仍然太早、也太窄，不足以下注。
    whyBelieve: 这套方案对准了真实存在的买方工作流失效点：用基金专属论点图谱和带引文的异常工作流，去切相邻巨头尚未把它作为核心产品定位的空白。
    whyDoubt: 公开证据仍然没有量化真实异常频率、可接受漏报率，以及一个单小组产品如何足够快地扩出约 30 家账户的滩头市场。
    nextDiligence: 先看一个付费行业小组部署是否能在获批导出上真正跑起来，是否测得提醒精度，并在一个财报周期后展示可信的第二小组扩张路径。
  firstCustomer:
    title: AUM 在 $20B-$100B 的美国主动型只做多管理人的研究主管
    profile: 一家公司拥有 15-30 名分析师、工业和消费行业小组，已经部署 Bloomberg 与 AlphaSense，并且每天由 CIO 主持晨会，覆盖 50-150 个全球标的。
    trigger: 某次关税、供应链或需求冲击迫使团队在季度中段重写几十个标的的投资判断，人工扫盘已经不可能保证在晨会前抓到每一次论点失效。
    buyer: 研究主管或 CIO
    initialContract: 首年以 $100k-$150k 为 25-50 个覆盖标的签下首个小组的付费部署；随着第二个小组、高级连接器和治理模块加入，合同可提升至 $200k-$300k。
  mustBeTrue:
    - 目标小组在两次财报之间确实会经历足够多的论点漂移：每周至少 5 个与论点相关的异常，或等价的高强度人工扫盘负担，在波动期是常态。
    - 研究主管或 CIO 愿意从现有研究、监控或 AI 工作流预算中拿出 $100k-$150k，为首个小组部署买单。
    - 获批导出接入加授权数据流，能在一个财报周期内把带引文提醒精度做到 60% 以上，同时把分析师升级的论点失效漏报率压到 10% 以下。
    - 检查点配置与维护成本能控制在初次接入时每个标的不到 2 个分析师工时，之后每月每个标的不到 15 分钟。
    - 至少一半成功的首个小组部署，能在 12 个月内扩到第二个小组或高级模块，证明这个切口不只是一个小众点工具。
  diligenceQuestions:
    - 在 5-8 个目标工业或消费行业小组里，真实的每周异常量和分析师花在人工扫盘上的时间到底是多少？
    - 第一笔预算究竟由谁签——研究负责人、研究技术负责人，还是更宽泛的 AI / 创新预算——又会替代掉哪些既有工具支出？
    - 目标研究档案里，究竟有多少有用覆盖能直接通过获批导出拿到，多少会被权限或合规审查挡住？
    - 在把晨会队列当作生产输入之前，CIO 或研究主管能接受的漏报率到底是多少？
    - 为什么首个小组工作流能比 LinqAlpha 或 AlphaSense 明显更强，而不是很快就被复制成一个功能？
operatingAssumptions:
  - assumption: 一个工业或消费行业小组，在两次财报之间会出现足够多的论点漂移，足以支撑每日异常队列。
    basis: research.yaml
    validationTest: 从 5-8 个目标小组收集 4 周人工扫盘日志和晨会笔记，统计与论点相关的异常数量，以及分析师花在分拣上的工时。
    decisionImpact: 如果异常量偏低，就必须把产品收窄到更尖锐的冲击型场景，或在放大销售前扩成更宽的经常性研究工作流。
  - assumption: 内部笔记和授权供应商的获批导出，足以在不直接接入深层档案的情况下交付一个有用的 MVP。
    basis: research.yaml
    validationTest: 在 2 个共创客户上用只接获批导出的 MVP 加安全审查，测出覆盖缺口，并对照分析师期望的来源集合。
    decisionImpact: 如果只靠导出覆盖不到关键场景，路线图就必须优先做深度连接器，并接受更长的企业销售周期。
  - assumption: 分析师可以维护检查点模板，而不会让接入变成一个咨询项目。
    basis: research.yaml
    validationTest: 为 20 个标的计时一次完整配置和第一次财报周期维护，目标是每个标的初次接入少于 60 分钟、每月维护少于 15 分钟。
    decisionImpact: 如果维护太重，产品就必须自动生成模板或减少监控变量，进而限制覆盖广度和 ACV。
  - assumption: $100k-$150k 的首个小组合同，能够从既有研究、监控或 AI 工作流预算中签下来。
    basis: research.yaml
    validationTest: 在 8-10 个目标账户里摸清当前支出和预算归属，并要求至少拿到 2 个不低于目标首年价格的付费试点。
    decisionImpact: 如果没有可重分配的预算，就必须下调定价，或把销售对象从单小组切口改成更宽的全公司工作流。
  - assumption: 至少一半成功的首个小组部署，会在 12 个月内扩到第二个小组或高级模块。
    basis: idea.yaml
    validationTest: 跟踪前 3-4 个付费客户的续约和扩张意向，要求第二小组或模块转化率达到 50% 以上。
    decisionImpact: 如果扩张起不来，公司就会停留在小众的只做多工具层，届时必须压缩 burn，或重想市场。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 对 8 个目标工业或消费行业小组做异常量基线研究，输入是人工扫盘日志和晨会笔记。
    hypothesis: 目标小组在两次财报之间确实会遇到足够多的论点漂移，值得单独做一条异常队列。
    successMetric: 8 个小组里至少有 5 个确认，每周会稳定出现足以支撑付费试点叙事的异常量或人工分拣负担。
    owner: 创始人 / GTM 负责人
  - horizon: 0-90 天
    experiment: 用一个共创客户的历史笔记和获批导出，为 20 个标的冲一次检查点模板。
    hypothesis: 检查点配置可以控制在边界内，不会把资深分析师时间吃空。
    successMetric: 每个标的的中位配置时间低于 60 分钟，并且分析师在一轮复核后接受模板结构。
    owner: 创始人 / 行业负责人
  - horizon: 3-6 个月
    experiment: 在首个共创客户处，用获批导出和授权数据流做一个授权安全的 人工陪跑式 MVP。
    hypothesis: 在深度档案连接器获批之前，只靠导出接入也能产出召回率可用的带引文提醒。
    successMetric: 所有提醒都带引文，并且试点能抓到范围内至少 80% 经分析师复核后认定与论点相关的事件。
    owner: 创始工程师
  - horizon: 3-6 个月
    experiment: 直接向研究主管和 CIO 销售单小组部署，验证定价与预算归属。
    hypothesis: 首个合同可以从既有研究或 AI 工作流预算里，以 $100k-$150k 的价位签下来。
    successMetric: 至少签下 2 个不低于目标首年合同金额的付费单小组部署。
    owner: 创始人 / GTM 负责人
  - horizon: 6-12 个月
    experiment: 打开分析师反馈采集，跨一个财报周期复盘提醒质量。
    hypothesis: 反馈闭环能把噪音压到足够低，让晨会队列替代掉一部分人工扫盘。
    successMetric: 提醒精度高于 60%，漏报率低于 10%，并且日常使用贯穿完整个财报周期。
    owner: 解决方案工程师 / 研究运营负责人
  - horizon: 12-18 个月
    experiment: 在首批付费客户内部推进第二个小组或嵌入式 API 扩张。
    hypothesis: 只要第一个小组建立起信任，向更多覆盖标的或更多交付界面扩张就会很快发生。
    successMetric: 前 4 个付费小组里，至少 50% 通过第二个小组或模块扩张，以更高 ACV 完成续约。
    owner: 创始人 / GTM 负责人
operations:
  - 用客户批准的导出、授权供应商数据流和逐行引文溯源做授权安全的接入起点。
  - 每周和行业负责人一起复盘提醒质量，让每一次忽略、升级和论点修订都喂回精度模型。
  - 优先通过安全晨报、API 输出或现有研究工作区交付，而不是第一天就硬推一个全新 UI。
  - 先用解决方案驱动的接入方式做出可复用的工业和消费检查点库，再向新小组扩张。
  - 围绕连接器、留存控制和治理审查，与数据供应商和研究技术集成商建立伙伴动作。
team:
  - role: 创始工程师
    startTiming: 第 0 月
    rationale: 检查点图谱、检索层和带引文提醒引擎构成 MVP 核心，在任何共创客户试点开始前都必须先搭起来。
  - role: 创始人 / 行业负责人
    startTiming: 第 0 月
    rationale: 必须有一位在买方研究或研究平台侧有公信力的创始人，才能拿到内部档案访问权、定义检查点模板，并缩短信任门槛。
  - role: 解决方案工程师 / 研究运营负责人
    startTiming: 第 2-4 月
    rationale: 接入质量决定检查点配置 最终会成为护城河还是服务包袱，因此首个试点一启动，就需要专门的运营型技术负责人。
  - role: 创始 GTM
    startTiming: 第 6 月
    rationale: SAM 高度集中且依赖关系销售，因此应该等到 MVP 和买方叙事足够扎实，能推进付费试点动作之后，再引入专职销售。
  - role: 第二位工程师
    startTiming: 第 9-12 月
    rationale: 一旦首个小组证明了提醒质量，更深的笔记库连接器、治理控制和嵌入式交付就会需要额外的产品产能。
milestones:
  - horizon: 0-12 个月
    items:
      - 签下 2-3 个共创客户，并在一个工业或消费行业小组上通过获批导出接入正式上线。
      - 验证 $100k-$150k 的首个小组合同，并识别出研究管理层内部可复制的买方画像。
      - 在一个完整财报周期内，把分析师升级的论点变化提醒精度做到高于 60%，漏报率低于 10%。
      - 把每个小组的接入周期控制在 4 周以内、每个标的低于 2 个分析师工时。
  - horizon: 12-24 个月
    items:
      - 在 2-4 家机构里转化出 3-5 个按年签约的小组，并至少落地 2 次第二小组扩张。
      - 上线更深的笔记库和工作区连接器，以及治理、留存和复核历史控制。
      - 推出可复用的工业和消费检查点模板，把新小组 配置时间至少再砍掉 30%。
  - horizon: 24-36 个月
    items:
      - 实现研究中的第 3 年 SOM：约 20 个在运转的小组，分布在约 10-12 家机构，混合年价值约 ~$200k。
      - 在不丢掉只做多聚焦的前提下，证明一条进入信用、宏观或多资产工作流的相邻扩张路径。
      - 把提醒质量基准和行业模板打包成高级模块，抬升 ACV，并增强对打包式竞争的防守力。
risks:
  - risk: 如果系统漏掉关键论点失效，或让晨会队列充满噪音，分析师和 CIO 都不会信任它。
    likelihood: High
    impact: High
    mitigation: 先从一个小组起步，要求输出带引文并经人工复核，在任何大规模 铺开 前把精度与漏报评估埋好。
  - risk: 档案授权、数据权限和留痕审查，可能把试点拖到迟迟起不来，从而压住早期收入。
    likelihood: High
    impact: High
    mitigation: 先用获批导出、受限来源范围、显式访问控制和面向留存的审计日志起步，再去申请深度私有数据连接器。
  - risk: 检查点维护可能变成一个隐形服务包袱，资深分析师不愿意接。
    likelihood: Medium
    impact: High
    mitigation: 先用行业模板、解决方案式接入 和每个标的变量数的严格上限，把维护成本摸清前控制住范围。
  - risk: AlphaSense、FactSet、LinqAlpha 或内部研究技术团队，可能比预期更快补上基础论点监控能力。
    likelihood: Medium
    impact: High
    mitigation: 把差异化放在显式检查点管理、工作流嵌入，以及“到底是什么改写了投资判断”的反馈数据集上，而不是去拼通用 agent 质量。
  - risk: 首批买方群体高度集中，如果企业销售周期太慢、扩张又弱，公司可能小到撑不起 venture 回报。
    likelihood: Medium
    impact: High
    mitigation: 先按 pre-seed 计划把 burn 压住，尽早证明第二小组扩张，只有在只做多留存数据真实成立后，才积极加码跨资产增长。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月做出单小组、基于获批导出的 MVP，拿下 2-3 个付费共创客户，在一个财报周期内证明提醒精度和低摩擦接入，并在进入 seed 轮之前展示第二小组扩张，为更深连接器和跨资产增长做准备。
