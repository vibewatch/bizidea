problem: >-
  Active long-only managers still rely on vendor alerts, analyst inboxes, and
  manual morning sweeps to detect whether anything has changed a position's core
  thesis between earnings. As coverage universes expand and markets react
  across regions and asset classes, teams either miss relevant signals or burn
  senior analyst time reviewing noise. The costly failure mode is not a lack of
  information; it is failing to map new information back to the exact
  assumptions inside each fund's underwriting before a PM is blindsided.
targetUser:
  primary: "Sector heads and senior analysts at U.S. active long-only equity managers with 10-40 analysts and broad global coverage responsibilities"
  secondary: "Research platform and data operations leads responsible for research systems, alerts, and internal AI pilots"
  buyer: "Head of Research or CIO"
startupThesis:
  nonObviousInsight: >-
    The next buy-side agent winner will not be the firm with the smartest
    generic market chatbot; it will be the one that converts a manager's
    archived models, notes, and IC memos into machine-readable thesis
    checkpoints, then only escalates evidence that changes underwriting.
  beachhead: >-
    U.S. active long-only equity managers with $20B-$200B AUM, 10-40 sector
    analysts, and 50-150 covered global industrial and consumer names where
    morning meetings still depend on Bloomberg alerts, AlphaSense searches, and
    manual analyst sweeps between earnings
  wedge: >-
    A coverage-drift monitor that ingests approved research archives and
    watchlists, turns each covered name into explicit thesis checkpoints, and
    sends cited exception alerts when new evidence contradicts or strengthens
    the fund's view
  whyNowCatalyst: >-
    LinqAlpha's funding and reported adoption show asset managers are finally
    buying firm-specific agents trained on their own research, making
    thesis-monitoring software a near-term budget item instead of an internal
    tooling experiment.
  ventureScalePath: >-
    Start with long-only equity coverage teams, then expand the same thesis
    graph and exception-routing engine into credit, macro, multi-asset CIO
    workflows, sell-side research, and eventually the operating layer for
    institutional market agents.
solution: >-
  Coverage Drift Monitor connects to a manager's approved internal research
  stores, model notes, watchlists, and licensed market-data exports to build a
  live assumption graph for each covered company. Analysts define the few
  variables that actually move the thesis such as order growth, margin signals,
  tariff exposure, channel inventory, credit stress, or management credibility,
  and the system launches bounded agents that watch for cited evidence against
  those checkpoints. Instead of dumping headlines into another chat feed, it
  produces morning exception queues, PM-ready summaries, and an audit trail
  showing which source changed which assumption. Over time, analyst dismissals,
  escalations, and thesis revisions train the system to suppress noise and
  surface only variant-relevant signals.
goToMarketSeed:
  firstCustomer: "$20B-$100B U.S. active long-only managers with 15-30 analysts, industrial and consumer sector pods, Bloomberg and AlphaSense already deployed, and a daily CIO morning meeting"
  buyingTrigger: "A volatile quarter with tariff, supply-chain, or demand shocks that forces sector teams to re-underwrite dozens of names between earnings without adding headcount"
  currentAlternative: "Bloomberg and AlphaSense alerts, junior analyst news sweeps, Excel or OneNote watchlists, and ad hoc internal AI prompts"
  switchingReason: "The product routes only thesis-relevant cited exceptions, so analysts spend less time triaging noise and PMs get faster, more consistent updates tied to the fund's own framework"
  pricingHypothesis: "Annual subscription priced per coverage pod plus per covered name, with initial $100k-$300k deployments for one sector team"
