differentiator: >-
  Most market-data and alerting tools start from the world's data and ask
  analysts to filter it manually. Coverage Drift Monitor starts from the fund's
  proprietary thesis and only asks the world whether that thesis has changed.
  That inversion creates a compounding moat in assumption graphs, analyst
  feedback, and cross-name causal templates that generic research copilots and
  raw alert vendors do not own.
