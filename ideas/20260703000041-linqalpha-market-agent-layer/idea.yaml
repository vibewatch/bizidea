topRisks:
  - name: "Alert trust gap"
    description: "If the system misses a real thesis break or produces too many noisy exceptions, analysts will revert to manual sweeps."
    mitigation: "Start with one sector pod, require explicit assumption mapping, keep humans in the loop, and learn from every analyst dismissal or escalation before expanding coverage."
  - name: "Data entitlement friction"
    description: "Internal research archives and licensed market data often have messy permissions that can slow onboarding or limit what agents may monitor."
    mitigation: "Begin with customer-owned notes, approved exports, and line-level citation provenance, then add deeper vendor and knowledge-system integrations after legal review."
  - name: "Incumbent and internal-build pressure"
    description: "Bloomberg, AlphaSense, or sophisticated research-tech teams may add basic alerting features that make the category look easy to replicate."
    mitigation: "Own the fund-specific assumption graph, morning-meeting workflow, and feedback moat around what actually changed underwriting rather than competing as another generic alert feed."
