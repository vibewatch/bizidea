scenarios:
  downside:
    description: 档案审查拖得更久，首个小组定价落在 BP 区间低端，而人工维护检查点又推迟了第二小组扩张。
    y3RevenueK: 2350
    y3EbitdaK: -340
    cashLowPointK: 210
    keyAssumptionChanges:
      - Q4Y3 期末只有约 15 个付费小组，而不是 20 个。
      - 小组混合价值退出时更接近 ~$180K ARR，而不是约 $200K。
      - 由于接入仍偏服务化，毛利率卡在 60% 出头。
  base:
    description: 公司把创始人主导拿下的共创客户转成可复制的付费小组，再在早期账户内向内扩张，同时用模板把毛利率拉向 BP 目标。
    y3RevenueK: 3017.2
    y3EbitdaK: 30.4
    cashLowPointK: 536
    keyAssumptionChanges:
      - M12 达到 3 个付费小组，Q4Y2 达到 9 个，Q4Y3 达到 20 个。
      - 第 3 年退出时，小组混合价值达到研究中的 ~$200K 年度水平。
      - 随着接入越来越模板化，Q4Y3 毛利率达到 BP 目标 72%。
  upside:
    description: 标杆客户缩短销售周期，治理模块更早挂上去，可复用的检查点库也比计划更快压低实施成本。
    y3RevenueK: 3520
    y3EbitdaK: 290
    cashLowPointK: 650
    keyAssumptionChanges:
      - Q4Y3 约能做到 23 个付费小组，而不是 20 个。
      - 由于治理和连接器更早挂上，退出时小组混合价值可接近 ~$215K ARR。
      - 可复用模板显著降低服务负担，毛利率向 75% 靠拢。
sensitivity:
  - variable: ARPU
    downsideCase: 首个小组定价停留在约 $140K ARR，模块附加偏弱，使混合小组价值比计划低约 10%。
    baseCase: 退出时小组混合价值接近研究中的 ~$200K 年度水平，高级治理和连接器附加主要出现在后续 cohort。
    upsideCase: 第二小组扩张叠加治理模块附加，到 Q4Y3 可把成熟小组价值推向 ~$220K ARR。
    y3RevenueImpactK: -301.7
    cashImpactK: -225
  - variable: CAC
    downsideCase: 买方教育和合规审查把混合 CAC 推高到每个新增付费小组约 $90K。
    baseCase: 创始人主导销售加上高度集中的账户列表，把混合 CAC 控在约 $72.5K。
    upsideCase: 标杆客户和集成商转介绍把混合 CAC 拉到 60 多万区间。
    y3RevenueImpactK: -120
    cashImpactK: -350
  - variable: churn
    downsideCase: 如果提醒精度不达标，或维护检查点太累，月度小组流失率会升到 2.5%。
    baseCase: 一旦小组嵌进晨会工作流，月度流失率稳定在约 1.8%。
    upsideCase: 随着治理历史和分析师反馈不断加深切换成本，月度流失率可降到约 1.2%。
    y3RevenueImpactK: -180
    cashImpactK: -160
  - variable: 销售周期
    downsideCase: 由于档案和授权审查拖延，试点转正式合同的周期会从约 1 个季度拉长到约 2 个季度。
    baseCase: 在跑完一个财报周期并找到愿意出预算的研究负责人后，付费试点大约 90 天可以转正式合同。
    upsideCase: 可引用的精度指标和获批导出方法论 会把转化周期压到更接近 60 天。
    y3RevenueImpactK: -420
    cashImpactK: -310
  - variable: 毛利率
    downsideCase: 如果接入和检查点维护依然半人工，毛利率会卡在 60% 出头。
    baseCase: 随着模板复用和更紧的授权安全交付落地，毛利率退出时达到 BP 目标 72%。
    upsideCase: 如果模板和治理模块比预期更快标准化，毛利率可到约 75%。
    y3RevenueImpactK: 0
    cashImpactK: -210
  - variable: 招聘节奏
    downsideCase: 在第二小组扩张还没跑出可复制证据前，就提前招入额外的解决方案或 GTM 人员。
    baseCase: 招聘节奏继续按 BP 设定，围绕试点、连接器和治理里程碑逐步推进。
    upsideCase: 由于模板降低了实施负担，Y3 末的一位规模化招聘可以后移，也不伤 bookings。
    y3RevenueImpactK: 80
    cashImpactK: -180
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      TargetPods[Target sector pods] --> PaidPilots[Paid pilot pods]
      PaidPilots --> ProductionPods[Production and expanded pods]
      ProductionPods --> ARPU[Pod ARR plus modules]
      ARPU --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: 收入引擎
    finding: 基本情景的收入来自付费小组数从 Y1 末的 3 个扩大到 Q4Y3 的 20 个，同时单小组混合价值逐步抬升到研究里的 ~$200K 年度水平。
  - checkName: 必须做对的事
    finding: 公司必须在约 1 个季度内把付费试点转正，并把接入周期压到 4 周以内，否则这个窄小组切口无法滚成第二小组扩张。
  - checkName: 模型会在哪些情况下失效
    finding: 如果销售周期拉长到约 2 个季度，或毛利率卡在 60% 出头，下行情景下现金低点会被压到约 $0.2M，seed 轮证明尚未稳固前就接近见底。
  - checkName: 下一轮融资证明
    finding: seed 叙事应当是：在约 3 家机构里拿下 5 个付费小组，把提醒精度做到 >60%，证明一条可信的第二小组扩张路径，并让研究负责人愿意为年度生产用例持续买单。
sanityChecks:
  ruleOf40: Y3 增长 188.6% + EBITDA 利润率 1.0% = 189.6%
  burnMultiple: Y2 burn multiple 约为 0.7x：约 $0.87M EBITDA burn 对应约 $1.22M 净新增 ARR。
  revenuePerFte: Y3 每名 FTE 约 $302K，期末 10 名 FTE（SaaS 基准约 $200-400K）
  flags:
    - 第 3 年情景默认公司打满研究里的 20 个小组 SOM，因此在买方池高度集中的前提下，执行强度必须很高。
    - customersEop 统计的是付费小组，而不是机构数量；这更贴近定价现实，但会让表面客户数看起来高于独立机构数。
    - 毛利率只有在检查点模板和获批导出接入真正可复用后，才能爬到 72% 目标；否则服务拖累会继续压缩 EBITDA。
    - 模型到 Y3 也只是接近盈亏平衡，因此若要在只做多滩头市场之外继续做跨资产扩张，大概率仍需 seed 轮。
    - 模型把现金近似成 EBITDA；若出现递延回款、预付试点或合规驱动的 capex，真实现金曲线会有所偏移。
