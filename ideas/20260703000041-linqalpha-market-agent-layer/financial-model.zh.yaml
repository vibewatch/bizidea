slug: coverage-drift-monitor
date: '2026-07-03'
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: 模型起始月
    value: 2026-08
    unit: YYYY-MM
    source: '[BP date 2026-07-03] 模型从商业计划定稿后的第一个完整月份开始。'
  - id: A2
    name: 期初现金 / pre-seed 融资
    value: $2.4M
    unit: USD
    source: >-
      [BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] 基本情景按 18 个月验证计划外加约
      6 个月缓冲来定融资规模。
  - id: A3
    name: 付费客户单位
    value: 一个活跃的付费覆盖小组，而不是整个机构
    unit: definition
    source: '[BP gtm.pricing + BP businessModel.unitOfValue + Research market.som] 定价、SOM 和扩张都以小组为单位表达。'
  - id: A4
    name: 起始付费小组（M1）
    value: '0'
    unit: count
    source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，必须先签下付费共创客户。'
  - id: A5
    name: 首个小组年价值
    value: $125K-$150K ARR
    unit: USD/pod/year
    source: >-
      [BP gtm.pricing $100k-$150k for the first pod + BP investorMemo.firstCustomer.initialContract]
      一旦付费试点转正，模型就按首个小组区间的中高位起步。
  - id: A6
    name: 成熟小组年价值
    value: ~$200K ARR by Q4Y3
    unit: USD/pod/year
    source: >-
      [Research market.som blended ~$200k annual value + BP gtm.pricing $200k-$300k with modules] 退出时的 ARPU 达到研究中的 SOM
      水平，但不假设打到定价上限。
  - id: A7
    name: 收入确认规则
    value: 收入等于期末付费小组数乘以该期每个小组的混合已实现收入。
    unit: formula
    source: '[A3 + A5 + A6] 早期用较低的付费试点/首个小组经济性，后期再反映模块附加和第二小组成熟度。'
  - id: A8
    name: 小组爬坡
    value: M12 达 3 个付费小组，Q4Y2 达 9 个，Q4Y3 达 20 个
    unit: customersEop
    source: >-
      [BP milestones 0-12 / 12-24 / 24-36 + Research market.som 20 live pods by year 3] 基本情景对应先证明 2-3 个共创客户，再通过扩张和新增机构
      放大。
  - id: A9
    name: 毛利率爬坡
    value: Y1 为 45%-58%，Y2 为 60%-67%，Y3 为 69%-72%
    unit: gross margin percent
    source: >-
      [BP businessModel.targetGrossMarginPct 72 + BP operations + Research reportMemo.sensitivityCases]
      早期交付服务属性更重，模板和治理工具把接入流程标准化后，毛利率再逐步抬升。
  - id: A10
    name: 招聘时间线
    value: 创始人和创始工程师在 M1；首位解决方案人员在 M4；首位 GTM 在 M7；第二位工程师在 M10；第三位工程师在 M16；运营在 M22；第二位解决方案人员在 M28；第四位工程师在 M29；第二位 GTM 在 M34。
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 在付费试点证据和后续扩张成立之前，招聘始终保持克制。'
  - id: A11
    name: 创始人完全成本薪酬
    value: $156K
    unit: USD/year
    source: '[BP team founder / domain lead + startup-finance heuristic] 创始人现金薪酬保持精简，并计入薪税与福利。'
  - id: A12
    name: 工程完全成本薪酬
    value: $204K
    unit: USD/year
    source: >-
      [BP team founding eng and later connector/governance roadmap + startup-finance heuristic] 工程薪酬反映 pre-seed
      阶段的数据与工作流资深人才现金水平。
  - id: A13
    name: 解决方案 / 研究运营完全成本薪酬
    value: $156K
    unit: USD/year
    source: >-
      [BP team solutions engineer / research ops lead + BP operations + startup-finance heuristic] 接入
      和提醒质量复盘需要一位技术型、面向客户的负责人。
  - id: A14
    name: 销售 / GTM 完全成本薪酬
    value: $180K
    unit: USD/year
    source: '[BP team founding GTM + BP gtm.channels + startup-finance heuristic] 这里面已经包含绩效薪酬和面向集中机构客户外拓所需差旅。'
  - id: A15
    name: G&A / 运营完全成本薪酬
    value: $120K
    unit: USD/year
    source: '[BP operations + startup-finance heuristic] 覆盖财务、供应商和合规运营，不假设搭建完整后台。'
  - id: A16
    name: 工资在 P&L 中的分摊
    value: >-
      创始人 40% 计入 S&M / 40% 计入 R&D / 20% 计入 G&A；工程 100% 计入 R&D；解决方案 50% 计入 S&M / 50% 计入 R&D；GTM 100% 计入 S&M；运营 100% 计入
      G&A
    unit: allocation
    source: '[BP team role rationales + BP operations] 模型按每个角色实际承担的市场、产品和行政工作来映射工资。'
  - id: A17
    name: 非工资 Opex 爬坡
    value: 早期 Y1 每月 S&M/R&D/G&A 非工资支出从 $4K/$10K/$6K 起步，到 Q4Y3 升至 $22K/$20K/$11.5K。
    unit: USD/month
    source: '[BP operations + startup-finance heuristic] 覆盖云与数据成本、差旅、法务、保险和合规支持，不假设庞大的 获客引擎。'
  - id: A18
    name: 现金转换规则
    value: 现金变动等于 EBITDA
    unit: formula
    source: '[startup-finance heuristic] 在这个 pre-seed 规模下，税、capex、融资费用和营运资本时差都假设影响不大。'
  - id: A19
    name: 稳态月度小组流失率
    value: 1.8%
    unit: percent/month
    source: >-
      [startup-finance heuristic for workflow SaaS + BP gtm.funnelTargets + BP mustBeTrue expansion if trusted]
      一旦嵌入晨会，小组粘性理应较高，但早期信任风险仍值得保留不低的流失假设。
  - id: A20
    name: 基准销售周期
    value: ~90 days from paid-pilot start to annual production conversion
    unit: days
    source: '[BP experimentRoadmap 3-6 months + BP milestones 0-12 months] 基本情景假设，一个财报周期的证据就足够把首笔预算转成正式合同。'
  - id: A21
    name: CAC 计算规则
    value: 36 个月销售与市场支出 ÷ 20 个净新增付费小组
    unit: formula
    source: '[model calc + BP gtm.funnelTargets + Research reportMemo.distributionChannels] 这个指标同时混合了首个小组获客和在集中机构账户内摩擦更低的扩张小组。'
  - id: A22
    name: 下一轮融资所需里程碑
    value: Q2Y2 达到 5 个付费小组、提醒精度高于 60%、接入 少于 4 周，并证明至少一条第二小组扩张路径。
    unit: milestone
    source: >-
      [BP fundingAsk.useOfFundsSummary + BP milestones 0-12 and 12-24 months + BP strategyMap.killCriteria] 这轮 pre-seed
      的目标是让公司跑出可复制证据，而不是覆盖全部市场。
  - id: A23
    name: 季度薪酬滚动规则
    value: Y2-Y3 的工资行按季度内真实月度入职节奏计算，而不是只看季度末快照。
    unit: convention
    source: '[Headcount column convention + A10] 即便 Y2 和 Y3 的 headcount 列只展示年末快照，这样也能保证工资费用内部一致。'
  - id: A24
    name: 资金用途结构
    value: 45% 工程 / 25% GTM / 10% G&A / 20% 六个月缓冲
    unit: allocation
    source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 预算仍由工程主导，同时明确留出现金缓冲，应对企业销售拖延和合规审查延长。'
