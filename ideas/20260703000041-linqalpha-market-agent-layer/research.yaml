  validationPlan:
  - priority: high
    question: How many thesis-relevant exceptions per week does a target sector pod actually face between earnings?
    evidenceToGather: Run a four-week pilot on one industrials or consumer pod, compare manual sweeps with agent-detected exceptions, and log both false positives and misses.
  - priority: high
    question: 'Which budget owner will sponsor the first deployment: Head of Research, CIO, research platform lead, or innovation office?'
    evidenceToGather: Map existing spend across market-intelligence, expert-network, research-ops, and AI experimentation tools in 8-10 target accounts.
  - priority: medium
    question: Can analysts maintain explicit checkpoint templates without making onboarding feel heavier than the status quo?
    evidenceToGather: Prototype name-level checkpoint templates for 20 covered companies and measure time-to-onboard and maintenance burden after one earnings cycle.
  - priority: medium
    question: How much of the target archive can be ingested directly versus only through approved exports and entitlement-safe connectors?
    evidenceToGather: Security review of customer note stores, transcript vendors, and approved export formats plus sample connector scoping with research-tech leads.
