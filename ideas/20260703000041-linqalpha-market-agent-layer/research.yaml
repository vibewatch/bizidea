openQuestions:
- What share of target U.S. long-only managers will permit direct ingestion of archived notes and internal memos versus only entitlement-safe exports?
- Will the first budget come from research, research technology, or a broader AI / innovation line item when the product augments rather than replaces data terminals?
- How many maintained checkpoints per covered name can a sector pod support before onboarding becomes heavier than the manual workflow it is replacing?
- What false-negative rate is acceptable before a CIO will trust a morning exception queue as a production decision input?
