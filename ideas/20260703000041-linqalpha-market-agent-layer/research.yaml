  sensitivityCases:
  - case: Broad research platforms become thesis-aware faster than expected
    impact: If AlphaSense-, FactSet-, or LinqAlpha-class products ship stronger internal-memory and always-on exception workflows, the startup must differentiate on explicit checkpoint modeling and adoption velocity rather than generic agent quality.
