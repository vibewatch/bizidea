differentiator: >-
  大多数市场数据和提醒工具都从“世界上有哪些数据”出发，再让分析师自己过滤。Coverage Drift Monitor
  反过来：先从基金自己的专有投资论点出发，再去问世界——这个论点到底变没变。这个倒置会在假设图谱、分析师反馈和跨标的因果模板上滚出复利式护城河，而这些都是通用研究助手和原始提醒供应商拿不到的数据资产。
