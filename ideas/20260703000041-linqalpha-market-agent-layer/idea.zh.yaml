  painIntensity:
    score: 4
    rationale: 漏掉会打破投资论点的信号，或被噪音淹没，都会直接伤害组合决策；但这个痛点更多由工作流压力驱动，而不是由公开事故触发。
  wedgeClarity:
    score: 5
    rationale: “一个只做多覆盖小组在两次财报之间做论点监控”是极其清晰的首个应用场景，买方、触发因素和 ROI 叙事都看得见。
  defensibility:
    score: 4
    rationale: 假设图谱、分析师反馈闭环和机构专属路由逻辑，能够滚出通用提醒工具没有的工作流数据护城河。
  ventureScale:
    score: 4
    rationale: 滩头市场本身不大，但同一层论点监控基础设施可以向多资产类别扩散，最终成为机构市场代理的基础设施。
topRisks:
  - name: 提醒信任缺口
    description: 如果系统漏掉真正的论点失效，或吐出太多嘈杂异常，分析师会马上退回人工扫盘。
    mitigation: 先从一个行业小组起步，要求显式假设映射，把人始终留在环路里，并在扩大覆盖前用每一次分析师忽略或升级动作反哺模型。
  - name: 数据授权摩擦
    description: 内部研究档案和授权市场数据往往权限混乱，可能拖慢接入，甚至限制代理能监控的范围。
    mitigation: 先从客户自有笔记、获批导出和逐行引文溯源做起，等法务审查通过后，再接更深的数据供应商和知识系统集成。
  - name: 巨头与内部自研压力
    description: Bloomberg、AlphaSense 或成熟的研究技术团队，都可能很快补上基础提醒能力，让这个品类看上去不难复制。
    mitigation: 把基金专属假设图谱、晨会工作流和“到底是什么改写了投资判断”的反馈闭环握在自己手里，而不是去做另一个通用提醒流。
