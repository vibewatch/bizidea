    - 跨获批数据源的代理编排与引文层
    - 来自分析师忽略、升级和修订动作的反馈数据
  keyActivities:
    - 标准化内部研究与授权数据输入
    - 把公司级假设映射成可持续监控的检查点
    - 持续提高提醒精度并打通工作流集成
  keyPartners:
    - 研究数据和会议纪要供应商
    - 买方工作流顾问与研究技术集成商
    - 组合管理与知识管理系统合作伙伴
  costStructure:
    - 连接器、检索和提醒质量基础设施的工程投入
    - 负责接入和论点映射的解决方案工程团队
    - 面向高集中机构账户的企业销售
jobsToBeDone:
  - job: 当一个行业小组需要在晨会前判断新信息是否改变了任何核心假设时，帮分析师先看到带引文的异常，这样他们能第一时间告诉 PM 真正重要的变化。
    currentAlternative: 在 Bloomberg、AlphaSense、邮件和初级分析师笔记之间人工来回扫盘
    successMetric: 从外部事件发生到 PM 可直接使用、且带引文的受影响标的更新所需时间
  - job: 当资深分析师在财报后或宏观冲击后修正投资论点时，帮研究平台把新的假设结构化下来，让之后的持续监控始终对齐基金真实的投资判断。
    currentAlternative: 依赖分析师个人记忆、分散的笔记和零散的供应商提醒
    successMetric: 拥有持续维护的论点检查点、且提醒噪音较低的覆盖标的占比
ideaScorecard:
