problem: >-
  主动型只做多管理人如今仍然靠供应商提醒、分析师收件箱和每天早晨的人工扫盘，去判断两次财报之间某个持仓的核心投资论点有没有变化。覆盖宇宙越来越大，市场反应也跨地区、跨资产类别联动，结果不是漏掉真正重要的信号，就是让资深分析师把时间烧在噪音上。最贵的失败并不是信息不够，而是
  PM 被打个措手不及之前，团队没能把新信息准确映射回基金自己那套投资判断假设。
targetUser:
  primary: 美国主动型只做多股票管理人中的行业负责人和资深分析师，团队规模 10-40 人，承担广泛的全球覆盖职责
  secondary: 负责研究系统、提醒机制和内部 AI 试点的研究平台主管与数据运营负责人
  buyer: 研究主管或 CIO
startupThesis:
  nonObviousInsight: 下一个赢在买方侧的代理，不会是最聪明的通用市场聊天助手，而会是最先把资管机构沉淀下来的模型、笔记和 IC 备忘录转成机器可读论点检查点的那家公司；它只在证据真正改写投资判断时才升级提醒。
  beachhead: >-
    美国主动型只做多股票管理人，AUM 在 $20B-$200B 之间，拥有 10-40 名行业分析师，覆盖 50-150 个全球工业和消费标的，晨会仍然依赖 Bloomberg 提醒、AlphaSense
    搜索和两次财报之间的人工扫盘。
  wedge: 一个覆盖漂移监控器，吃入获批研究档案和观察名单，把每个覆盖标的拆成明确的论点检查点；一旦新证据推翻或强化基金原有判断，就发出带引文的异常提醒。
  whyNowCatalyst: LinqAlpha 的融资和披露的采用情况说明，资管机构终于开始为基于自身研究训练的专属代理买单。论点监控软件因此从内部工具实验，变成近两年的明确预算项。
  ventureScalePath: 先吃下只做多股票覆盖团队，再把同一套论点图谱和异常路由引擎扩到信用、宏观、多资产 CIO 工作流、卖方研究，最终成为机构市场代理的运行层。
solution: >-
  Coverage Drift Monitor
  接入管理人获批的内部研究库、模型笔记、观察名单和授权市场数据导出，为每个覆盖公司搭起一张实时假设图谱。分析师先定义真正会推动论点变化的少数变量，比如订单增长、利润率信号、关税敞口、渠道库存、信用压力或管理层可信度，系统再启动边界明确的代理，持续盯住这些检查点对应的带引文证据。它不会再往另一个聊天窗口里倾倒标题，而是产出晨会异常队列、可直接给
  PM 使用的摘要，以及一条可审计的证据链，清楚标出是哪条来源改写了哪一项假设。随着分析师的忽略、升级和修订动作不断累积，系统会逐步压掉噪音，只把真正偏离原有观点的信号顶出来。
goToMarketSeed:
  firstCustomer: AUM 在 $20B-$100B 的美国主动型只做多管理人，拥有 15-30 名分析师、工业和消费行业小组，已部署 Bloomberg 与 AlphaSense，并且每天都有 CIO 晨会。
  buyingTrigger: 某个高波动季度里，关税、供应链或需求冲击迫使行业团队在两次财报之间重写几十个标的的投资判断，但又不可能靠加人解决。
  currentAlternative: Bloomberg 和 AlphaSense 提醒、初级分析师新闻扫盘、Excel 或 OneNote 观察名单，以及临时拼出来的内部 AI 提示词。
  switchingReason: 产品只把和投资论点直接相关、且带引文的异常路由出来，分析师花在噪音分拣上的时间更少，PM 拿到的更新也更快、更一致，并且始终对齐基金自己的判断框架。
  pricingHypothesis: 按覆盖小组收年费，再叠加按覆盖标的数量计费；首个行业小组部署定价预计在 $100k-$300k。
