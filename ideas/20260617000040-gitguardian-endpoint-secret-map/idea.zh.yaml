    - 云控制平面和告警基础设施
    - 跨凭据系统的集成维护
    - 企业销售和客户成功
jobsToBeDone:
  - job: >-
      当 AI 编码工具和内部 MCP 服务器在托管笔记本上铺开时，帮助平台安全团队在不破坏开发者工作流的前提下，发现并清除实时凭据，从而安全地批准工具推广。
    currentAlternative: >-
      手工 grep 脚本、点解决方案密钥扫描器、Vault 或 1Password 策略，以及事后轮换。
    successMetric: >-
      从暴露密钥检测到轮换的中位时间低于 30 分钟，且存有长期本地凭据的端点占比持续下降。
  - job: >-
      当开发者笔记本在日志、缓存或 shell 历史中存储云或 GitHub 令牌时，帮助端点团队隔离并清理机器，在攻击者复用密钥之前收缩爆炸半径。
    currentAlternative: >-
      EDR 调查加工单驱动的重装系统和凭据重置。
    successMetric: >-
      在无需重装系统的情况下自动修复的实时暴露比例，以及每起事件中位爆炸半径的缩减量。
