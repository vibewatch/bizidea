      专有泄漏模式遥测、端点溯源数据和工作流修复集成具有积累效应，但现有厂商可能会捆绑相邻功能。
  ventureScale:
    score: 4
    rationale: >-
      开发者端点是强健的初始滩头市场，可扩展至更广泛的人类与代理统一访问管控平面，但初始市场仍受安全预算约束。
topRisks:
  - name: 现有厂商捆绑
    description: 一旦该品类价值被证明，GitGuardian、1Password、Vault 或 EDR 厂商可能会延伸至端点修复。
    mitigation: 聚焦自动化工作流修复和横跨端点、IAM 及开发者工具栈的短时效凭据代理，而非单纯的检测能力。
  - name: 开发者摩擦
    description: 激进的轮换或清理可能破坏本地工作流，如果产品噪音过多会引发用户强烈反弹。
    mitigation: 从监控模式起步，内置一键回滚和例外路径，并优先锁定拥有托管 Mac 机队和平台团队、能够标准化工作流的共创客户。
  - name: 证据集中
    description: 来源数据仍集中在公司主导的发布材料中，市场规模和紧迫性在早期采用者之外可能被高估。
    mitigation: 在 AI 工具推广阶段赢得早期共创客户，并在首次部署的 30 天内证明可量化的密钥暴露减少和修复时间缩短。
