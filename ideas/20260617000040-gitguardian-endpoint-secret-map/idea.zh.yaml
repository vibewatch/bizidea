problem: >-
  企业将 Cursor、Copilot、Claude Code、内部 MCP 服务器和云 CLI 的铺开速度，已经超过安全体系的消化能力。这些工具把长期有效的凭据喷洒到开发者笔记本的
  shell 历史、IDE 缓存、本地日志和配置文件里，而仓库扫描器、IAM 和 EDR 在这里既找不到明确的责任人，也给不出修复路径。安全团队能事后发现部分泄露，
  但他们仍缺乏一种快速机制——把每个泄漏的密钥对应到工作流、安全地轮换它，同时不影响开发者继续交付。
targetUser:
  primary: >-
    管理 macOS 机队并部署了内部 MCP 服务器的美国金融科技基础设施厂商中，负责平台安全的工程师和开发者平台负责人。
  secondary: >-
    负责工程师笔记本 Jamf 或 Intune 策略、并被要求审批 AI 编码工具的端点工程团队。
  buyer: 平台安全负责人或 CISO
startupThesis:
  nonObviousInsight: >-
    AI 开发安全的真正瓶颈已不再是代码仓库或云控制平面——而是那台没人管的本地工作站。代理、shell、MCP 服务器和 IDE 就在这里把可复用的凭据实例化。
    胜出的不会是又一个扫描器，而是一套修复系统：把发现的密钥泄漏转化为短时效本地访问模式，并固化工作流。
  beachhead: >-
    拥有 800–2,000 名开发者、托管 macOS 机队、全员推广 Cursor 或 Claude Code，以及 20 个以上连接 AWS 和 Kubernetes 沙箱的内部 MCP 服务器的美国金融科技基础设施厂商平台安全团队。
  wedge: >-
    通过 MDM 部署的端点 Agent 加云控制平面：盘点 AI 工具和 MCP 服务器，把每个暴露的密钥追溯到产生它的进程和目录，自动轮换实时令牌、清除本地残留，
    并用本地代理签发的短时效任务级凭据替换原有的工作流。
  whyNowCatalyst: >-
    GitGuardian 的发布和早期访问指标表明，AI 辅助的笔记本上已存有足够多的实时密钥，且位置可预测——一个专门的端点修复品类已有条件立足。
  ventureScalePath: >-
    从开发者端点出发，逐步延伸至承包商笔记本、本地数据科学工作站、构建代理，最终搭建统一的密钥溯源与即时访问（JIT）平台，覆盖人类和 AI 工作者。
solution: >-
  Endpoint Secret Autofix 通过 Jamf 或 Intune 部署到工程师笔记本，持续盘点 AI 助手、MCP 服务器、shell、CLI 缓存和本地配置文件，构建一张溯源图——
  回答凭据落在了哪里、是哪个进程创建的、是否仍然有效，以及能访问哪些系统。发现高风险密钥后，产品可通过 AWS、GitHub、Kubernetes、Vault 或 1Password
  集成吊销或轮换凭据，清除本地残留，并把工作流切换到本地代理——按需签发短时效、任务级访问凭证。安全团队在批准新的 AI 工具之前，能够看到全机队的策略视图
  和爆炸半径分析；开发者则得到一次性修复路径，而不是一个残缺的环境和一个待办工单。
goToMarketSeed:
  firstCustomer: >-
    拥有 800–1,500 名工程师、Jamf 托管 Mac 机队、正式推广 Cursor、并有 AWS 和 Kubernetes 操作的内部 MCP 服务器的美国金融科技基础设施公司平台安全团队。
  buyingTrigger: >-
    全员审批 Cursor 或 Claude Code，或红队测试、审计发现云或 GitHub 令牌存留在本地 AI 日志、shell 历史或 MCP 配置中。
  currentAlternative: >-
    Vault 或 1Password 加手工 grep 脚本、代码仓库密钥扫描器、通用 EDR 告警，以及工单驱动的凭据轮换。
  switchingReason: >-
    现有工具要么只管签发凭据，要么只探测通用端点行为——没有哪款能把本地密钥泄漏关联到具体 AI 工作流、轮换令牌，并在一步之内修复开发者路径。
  pricingHypothesis: >-
    按受保护开发者端点收费，起步约每工程师每月 $30，自动轮换连接器和合规报告模块单独加价。
whyNow:
  - point: >-
      AI 编码助手和 MCP 服务器正在创造一类新的本地凭据暴露——完全在代码仓库扫描器的视野之外。
    signalRefs:
      - AI 工具成了密钥泄漏池
    sourceRefs: [1, 4]
  - point: >-
      开发者笔记本上的密钥密度已经足够高，足以形成一条清晰的安全预算项和 ROI 故事。
    signalRefs:
      - 每台笔记本密钥密度已很高
    sourceRefs: [1]
  - point: >-
      安全团队可以通过现有 MDM 工具快速覆盖工作站，不需要耗时数季度的 Agent 部署项目。
    signalRefs:
      - 通过现有 MDM 部署几乎零运营负担
    sourceRefs: [2]
  - point: >-
      买家如今把端点密钥蔓延视为 EDR 与身份管理之间的独立管控空白，这为新的数据库系统打开了空间。
    signalRefs:
      - 端点安全存在明显的管控空白
    sourceRefs: [3, 4]
differentiator: >-
  EDR 厂商能看见可疑进程，但不懂凭据语义，也不知道轮换后怎么修复开发者工作流。密钥扫描器找字符串，身份代理签发短时效访问，
  但两个产品家族都不会把本地 AI 工具泄漏映射到爆炸半径和修复方案。这家公司把端点溯源、自动轮换和工作流重构合为一体，
  做的是修复问题的系统，而不是又一个告警源。
