    - 18
    - 19
    - 20
  - friction: 端点扫描引发隐私和开发者信任担忧
    severity: medium
    affectedBuyer: 端点工程负责人
    mitigation: 扫描在本地进行，只传输元数据而非明文，并在机队策略中明确扫描范围和计划。
