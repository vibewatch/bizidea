  adoptionFrictionMatrix:
  - friction: 自动轮换可能破坏本地开发者工作流
    severity: high
    affectedBuyer: 平台安全负责人
    mitigation: 从监控模式起步，使用安全的连接器许可名单，并内置回滚感知的工作流修复路径。
