scenarios:
  downside:
    description: Pilot conversion stays approve-first, production expansions land later, and average covered endpoints remain
      below the 1,000-endpoint year-3 path.
    y3RevenueK: 2215.5
    y3EbitdaK: -899.4
    cashLowPointK: -253.3
    keyAssumptionChanges:
    - Year-3 active paying accounts end at 8 instead of 10.
    - Realized annual revenue per mature account tops out near $342K instead of $366K.
    - Gross margin rises only to about 72% because remediation and support stay more manual.
  base:
    description: The company wins 3 paid pilots in year 1, converts enough of them to reach 6 active paying accounts by Q4Y2,
      and expands to 10 accounts with premium connectors by Q4Y3.
    y3RevenueK: 3009.0
    y3EbitdaK: -224.6
    cashLowPointK: 809.8
    keyAssumptionChanges:
    - Active paying accounts rise from 3 at Y1 end to 6 at Q4Y2 and 10 at Q4Y3.
    - Realized annual revenue per mature production account reaches about $366K by Y3 through 800-1,000 endpoints plus connector
      attach.
    - Gross margin reaches the 75% business-model target once deployment playbooks and connectors standardize.
  upside:
    description: Referenceable fintech pilots and partner referrals pull forward production wins, so more accounts expand
      faster and the software mix improves earlier.
    y3RevenueK: 3847.0
    y3EbitdaK: 440.8
    cashLowPointK: 1469.0
    keyAssumptionChanges:
    - Year-3 active paying accounts end at 12 instead of 10.
    - Realized annual revenue per mature account reaches roughly $384K as premium connectors and broader endpoint coverage
      attach faster.
    - Gross margin reaches about 76% as onboarding and remediation become more standardized.
