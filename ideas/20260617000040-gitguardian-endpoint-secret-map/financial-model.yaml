slug: endpoint-secret-autofix
date: "2026-06-17"
currency: USD
modelStartMonth: "2026-07"
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-17] model starts in the month after the dated business plan.'
- id: A2
  name: Opening cash at M1
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $3-4M + model cash trough] base case uses the low end of the stated pre-seed
    range because early pilot revenue and a lean hiring plan still preserve more than six months of cash beyond the Q4Y2 milestone.'
- id: A3
  name: Starting active paying accounts
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] the company starts pre-revenue and must first launch paid pilots.'
- id: A4
  name: Active paying account definition
  value: A customer in a paid pilot or annual production rollout
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop tracks any account that is already paying for pilot
    or production scope.'
- id: A5
  name: Paid pilot realized revenue
  value: $25K/month for about 3 months
  unit: USD/account/month
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research willingnessToPay] midpoint pilot economics
    imply roughly $75K recognized across a 90-day 300-500 endpoint pilot.'
- id: A6
  name: Initial production account value
  value: $330K ARR (~$27.5K/month)
  unit: USD/account/year
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract] sits inside the stated $180K-$360K annual range
    while assuming first production deployments cover most of an 800-1,000 endpoint Mac fleet.'
- id: A7
  name: Year-3 mature production account value
  value: $366K ARR (~$30.5K/month)
  unit: USD/account/year
  source: '[BP market.som + BP businessModel.expansionLevers + Research market.som] ten year-3 accounts at about this value
    reproduce the researched ~$3.6M SOM path while allowing modest premium connector revenue.'
- id: A8
  name: Year-1 account ramp
  value: M6 1, M8 2, M11 3 active paying accounts
  unit: customersEop
  source: '[BP milestones 0–12 months + BP experimentRoadmap] consistent with 2-3 paid pilots and at least 2 pilot-to-production
    conversions by year end.'
- id: A9
  name: Year-2 and year-3 account ramp
  value: M15 4, M18 5, M23 6, M25 7, M29 8, M32 9, M35 10
  unit: customersEop
  source: '[BP milestones 12–24 months and 24–36 months + Research market.som] base case reaches 6 active paying accounts
    by Q4Y2 and 10 by Q4Y3 without assuming broad-market adoption.'
- id: A10
  name: Revenue recognition method
  value: Active paying accounts × blended realized monthly revenue per account
  unit: formula
  source: '[BP businessModel.revenueStreams + BP gtm.pricing] used so reported revenue reconciles directly to customer counts
    and the pricing ladder.'
- id: A11
  name: Gross margin ramp
  value: 55-60% in Y1, 68-73% in Y2, 74-75% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 75 + BP operatingAssumptions] early pilots carry deployment and remediation
    drag before software delivery becomes repeatable.'
- id: A12
  name: Steady-state CAC
  value: $188K
  unit: USD/account
  source: '[BP gtm.funnelTargets + model calc] calculated from Y2-Y3 sales and marketing spend of about $1.32M divided by
    7 net new active paying accounts after Y1.'
- id: A13
  name: Steady-state monthly logo churn
  value: 1.2%
  unit: percent per month
  source: '[startup-finance heuristic for narrow enterprise security SaaS] base case assumes annual contracts and high workflow
    stickiness once remediation is deployed.'
- id: A14
  name: Founder / GTM loaded compensation
  value: $180K
  unit: USD/year
  source: '[BP team CEO / GTM founder] lean founder cash compensation plus payroll taxes and benefits.'
- id: A15
  name: Engineering loaded compensation
  value: $210K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] reflects senior endpoint and control-plane software talent.'
- id: A16
  name: Security / integrations loaded compensation
  value: $205K
  unit: USD/year
  source: '[BP team Security and endpoint engineer + Integrations engineer] blends detector, remediation, and connector specialist
    pay.'
- id: A17
  name: Solutions / success loaded compensation
  value: $175K
  unit: USD/year
  source: '[BP team Solutions engineer] assumes deployment and policy-tuning ownership without a large services bench.'
- id: A18
  name: Sales / partnerships loaded compensation
  value: $220K
  unit: USD/year
  source: '[BP team Enterprise account executive + BP gtm.channels] one enterprise seller with travel and variable comp included.'
- id: A19
  name: G&A / compliance loaded compensation
  value: $145K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] covers lean finance, vendor management, and audit or compliance support.'
- id: A20
  name: Hiring timeline
  value: M1 founder and 2 technical; M4 integrations; M6 solutions; M10 enterprise AE; M15 second engineer; M20 G&A or compliance;
    M28 third technical; M31 second solutions
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale] keeps connector coverage and rollout safety ahead of sales
    scaling.'
- id: A21
  name: Payroll allocation to P&L lines
  value: Founder 70% S&M and 30% G&A; solutions 50% S&M and 50% R&D; engineering and security or integrations 100% R&D; sales
    100% S&M; G&A 100% G&A
  unit: allocation
  source: '[BP team role rationales] maps payroll into the functional lines used in the operating model.'
- id: A22
  name: Non-payroll opex ramp
  value: S&M $6K to $20K per month, R&D $12K to $22K per month, G&A $10K to $18K per month across the 3 years
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] supports cloud infrastructure, security reviews, travel, legal, and
    insurance without assuming paid demand generation.'
- id: A23
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] capex, debt service, taxes, and working-capital swings are assumed immaterial at pre-seed
    scale.'
- id: A24
  name: Funding ask sizing rule
  value: $3.0M pre-seed
  unit: USD
  source: '[BP fundingAsk round pre-seed + BP milestones + model cash trough] the raise is sized to hit the Q4Y2 proof point
    and still leave a meaningful cash buffer while the company approaches Q4Y3 breakeven.'
- id: A25
  name: Pilot-to-production sales cycle
  value: About 90 days
  unit: days
  source: '[BP gtm.pricing 60-90 day pilot + BP gtm.funnelTargets] used in scenario and sensitivity analysis for revenue timing.'
