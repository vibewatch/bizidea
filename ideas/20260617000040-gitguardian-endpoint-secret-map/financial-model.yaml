modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts[Named accounts] --> Pilots[Paid pilots]
      Pilots --> Production[Production accounts]
      Production --> Endpoints[Protected endpoints]
      Endpoints --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing from 3 active paying accounts at Y1 end to 6 at Q4Y2 and 10 at Q4Y3 while
    lifting mature account ARR from roughly $330K to roughly $366K through broader endpoint coverage and connector attach.
- checkName: Must go right
  finding: Buyers must allow approve-first remediation for AWS or GitHub and the first pilots must convert quickly enough
    that one founder-led seller plus one AE can keep the logo ramp on schedule.
- checkName: Model breaks if
  finding: If pilots stay stuck in monitor-only mode or covered endpoint counts land well below 800 per customer, the downside
    case pushes cash below zero before the company reaches the next round.
- checkName: Next-round proof
  finding: Reaching 5-7 production customers with sub-30-minute remediation and at least 2 live connectors per account by
    Q4Y2 is the milestone that should justify the seed raise.
sanityChecks:
  ruleOf40: Y3 growth 88.3% + EBITDA margin -7.5% = 80.8%.
  burnMultiple: Y2 burn multiple is about 0.7x based on $0.9M of burn to add roughly $1.2M of exit ARR.
  revenuePerFte: $300.9K Y3 using 10 Q4Y3 FTE (benchmark roughly $200–400K SaaS).
  flags:
  - The base case still assumes the company can reach 6 active paying accounts by Q4Y2 with only one quota-carrying seller,
    so founder-led pipeline quality is a major hidden dependency.
  - Gross margin improvement from pilot-heavy 60%-ish levels to 75% depends on remediation connectors and deployment playbooks
    becoming standardized rather than services-led.
  - Pricing is anchored to adjacent endpoint and secrets budgets plus modeled SOM math, not independent production win data,
    so real willingness to pay must be proven in the first 2 conversions.
  - The thesis-critical risk remains remediation approval; if buyers only buy detection and audit reporting, both ARPU and
    payback would compress materially versus this model.
