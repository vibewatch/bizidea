scenarios:
  downside:
    description: Pilot 转化维持审批优先模式，生产扩展落地较晚，平均受保护端点数保持在第三年 1,000 端点路径以下。
    y3RevenueK: 2215.5
    y3EbitdaK: -899.4
    cashLowPointK: -253.3
    keyAssumptionChanges:
    - 第三年活跃付费账户期末为 8 个，而非 10 个。
    - 成熟账户的年度实现收入上限约 $342K，而非 $366K。
    - 毛利率仅提升至约 72%，因为修复和支持仍偏向人工操作。
  base:
    description: 公司在第一年赢得 3 个付费 Pilot，转化足够多的账户在 Q4Y2 达到 6 个活跃付费账户，并在 Q4Y3 通过高级连接器扩展至 10 个账户。
    y3RevenueK: 3009.0
    y3EbitdaK: -224.6
    cashLowPointK: 809.8
    keyAssumptionChanges:
    - 活跃付费账户从 Y1 末的 3 个增长至 Q4Y2 的 6 个和 Q4Y3 的 10 个。
    - 成熟生产账户的年度实现收入通过 800–1,000 端点加连接器附加，在 Y3 达到约 $366K。
    - 毛利率随着部署手册和连接器标准化达到 75% 的业务模型目标。
  upside:
    description: 可引用的金融科技 Pilot 和合作伙伴转介拉动生产赢单提前，更多账户更快扩展，软件收入结构更早改善。
    y3RevenueK: 3847.0
    y3EbitdaK: 440.8
    cashLowPointK: 1469.0
    keyAssumptionChanges:
    - 第三年活跃付费账户期末为 12 个，而非 10 个。
    - 成熟账户的年度实现收入随高级连接器和更广端点覆盖的更快附加达到约 $384K。
    - 毛利率随着入职和修复流程更加标准化达到约 76%。
