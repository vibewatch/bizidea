slug: endpoint-secret-autofix
date: "2026-06-17"
currency: USD
modelStartMonth: "2026-07"
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-17] 模型从业务计划日期的次月启动。'
- id: A2
  name: M1 期初现金
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $3–4M + 模型现金低谷] 基准情景取已陈述 pre-seed 区间的低端，因为早期 Pilot 收入和精简的招聘计划仍可在 Q4Y2 里程碑之后保留超过六个月的现金缓冲。'
- id: A3
  name: 期初活跃付费账户数
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] 公司从零收入起步，必须先启动付费 Pilot。'
- id: A4
  name: 活跃付费账户定义
  value: 处于付费 Pilot 或年度生产推广中的客户
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 追踪任何已为 Pilot 或生产范围付费的账户。'
- id: A5
  name: 付费 Pilot 实现收入
  value: $25K/月，约 3 个月
  unit: USD/account/month
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research willingnessToPay] Pilot 中位经济学意味着 90 天 300–500 端点 Pilot 确认收入约 $75K。'
- id: A6
  name: 初始生产账户价值
  value: $330K ARR（约 $27.5K/月）
  unit: USD/account/year
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract] 位于已陈述 $180K–$360K 年度区间内，假设首批生产部署覆盖约 800–1,000 端点 Mac 机队的大部分。'
- id: A7
  name: 第三年成熟生产账户价值
  value: $366K ARR（约 $30.5K/月）
  unit: USD/account/year
  source: '[BP market.som + BP businessModel.expansionLevers + Research market.som] 第三年约 10 个账户按此价值可复现研究中约 $3.6M SOM 路径，同时预留适度的高级连接器收入。'
- id: A8
  name: 第一年账户增长节奏
  value: M6 1 个、M8 2 个、M11 3 个活跃付费账户
  unit: customersEop
  source: '[BP milestones 0–12 months + BP experimentRoadmap] 与 2–3 个付费 Pilot 及年底至少 2 次 Pilot 转生产的节奏一致。'
- id: A9
  name: 第二年和第三年账户增长节奏
  value: M15 4、M18 5、M23 6、M25 7、M29 8、M32 9、M35 10
  unit: customersEop
  source: '[BP milestones 12–24 months 和 24–36 months + Research market.som] 基准情景在不假设大范围市场采用的情况下，Q4Y2 达到 6 个活跃付费账户，Q4Y3 达到 10 个。'
- id: A10
  name: 收入确认方法
  value: 活跃付费账户数 × 每账户加权平均月收入
  unit: formula
  source: '[BP businessModel.revenueStreams + BP gtm.pricing] 保证报告收入能直接与客户数和定价阶梯对账。'
- id: A11
  name: 毛利率爬坡
  value: Y1 55–60%，Y2 68–73%，Y3 74–75%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 75 + BP operatingAssumptions] 早期 Pilot 在软件交付可复制之前会拖累部署和修复成本。'
- id: A12
  name: 稳态 CAC
  value: $188K
  unit: USD/account
  source: '[BP gtm.funnelTargets + model calc] 由 Y2–Y3 销售与市场投入约 $1.32M 除以 Y1 之后净新增 7 个活跃付费账户计算得出。'
- id: A13
  name: 稳态月度 Logo 流失率
  value: 1.2%
  unit: percent per month
  source: '[startup-finance 窄企业安全 SaaS 经验值] 基准情景假设年度合同和修复上线后的高工作流黏性。'
- id: A14
  name: 创始人 / GTM 含税薪酬
  value: $180K
  unit: USD/year
  source: '[BP team CEO / GTM founder] 精简的创始人现金薪酬加薪酬税和福利。'
- id: A15
  name: 工程师含税薪酬
  value: $210K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance 经验值] 反映资深端点和控制平面软件人才的薪酬水平。'
- id: A16
  name: 安全 / 集成工程师含税薪酬
  value: $205K
  unit: USD/year
  source: '[BP team Security and endpoint engineer + Integrations engineer] 融合了检测器、修复和连接器专家薪酬。'
- id: A17
  name: 解决方案 / 成功含税薪酬
  value: $175K
  unit: USD/year
  source: '[BP team Solutions engineer] 承担部署和策略调优，无需大型服务团队。'
- id: A18
  name: 销售 / 合作伙伴含税薪酬
  value: $220K
  unit: USD/year
  source: '[BP team Enterprise account executive + BP gtm.channels] 含差旅和浮动薪酬的一名企业销售。'
- id: A19
  name: 管理与合规含税薪酬
  value: $145K
  unit: USD/year
  source: '[BP operations + startup-finance 经验值] 覆盖精简的财务、供应商管理和审计或合规支持。'
- id: A20
  name: 招聘时间线
  value: M1 创始人和 2 名技术；M4 集成；M6 解决方案；M10 企业 AE；M15 第二名工程师；M20 管理或合规；M28 第三名技术；M31 第二名解决方案
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale] 在扩大销售规模之前保持连接器覆盖度和推广安全性领先。'
- id: A21
  name: 薪酬 P&L 分摊
  value: 创始人 70% 销售市场、30% 管理；解决方案 50% 销售市场、50% 研发；工程和安全/集成 100% 研发；销售 100% 销售市场；管理 100% 管理
  unit: allocation
  source: '[BP team role rationales] 将薪酬映射到运营模型使用的职能线。'
- id: A22
  name: 非薪酬运营支出爬坡
  value: 销售市场每月 $6K 至 $20K，研发每月 $12K 至 $22K，管理每月 $10K 至 $18K，横跨 3 年
  unit: USD/month
  source: '[BP operations + startup-finance 经验值] 支持云基础设施、安全审查、差旅、法务和保险，不假设付费获客。'
- id: A23
  name: 现金换算惯例
  value: 现金变动等于 EBITDA
  unit: formula
  source: '[startup-finance 经验值] pre-seed 规模下资本性支出、债务偿还、税款和营运资金波动视为可忽略。'
- id: A24
  name: 融资规模规则
  value: $3.0M pre-seed
  unit: USD
  source: '[BP fundingAsk round pre-seed + BP milestones + 模型现金低谷] 融资规模旨在覆盖到 Q4Y2 验证节点，并在公司接近 Q4Y3 盈亏平衡时仍保留可观的现金缓冲。'
- id: A25
  name: Pilot 转生产销售周期
  value: 约 90 天
  unit: days
  source: '[BP gtm.pricing 60–90 天 Pilot + BP gtm.funnelTargets] 用于情景和敏感性分析中的收入时间估算。'
