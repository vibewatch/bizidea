modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Accounts[Named accounts] --> Pilots[Paid pilots]
      Pilots --> Production[Production accounts]
      Production --> Endpoints[Protected endpoints]
      Endpoints --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自活跃付费账户从 Y1 末 3 个增长到 Q4Y2 6 个、再到 Q4Y3 10 个，同时通过更广的端点覆盖和连接器附加将成熟账户 ARR 从约 $330K 提升至约 $366K。
- checkName: 必须做对的事
  finding: 买家必须允许 AWS 或 GitHub 的审批优先修复，且首批 Pilot 必须足够快速转化，使一名创始人主导销售加一名 AE 能维持 Logo 增长节奏。
- checkName: 模型崩溃条件
  finding: 如果 Pilot 停留在仅监控模式，或每个客户的受保护端点数远低于 800，悲观情景会在公司进入下一轮之前把现金推至负数。
- checkName: 下轮融资验证点
  finding: 在 Q4Y2 达到 5–7 个生产客户，修复时间低于 30 分钟且每账户至少 2 个实时连接器，是应支撑种子轮融资的里程碑。
sanityChecks:
  ruleOf40: Y3 增速 88.3% + EBITDA 利润率 -7.5% = 80.8%。
  burnMultiple: Y2 消耗倍数约 0.7x，基于约 $0.9M 消耗新增约 $1.2M 期末 ARR。
  revenuePerFte: Y3 每全职 $300.9K，使用 10 名 Q4Y3 全职（基准约 $200–400K SaaS）。
  flags:
  - 基准情景仍假设公司能以唯一一名背配额销售在 Q4Y2 达到 6 个活跃付费账户，因此创始人主导的管道质量是一个重大隐性依赖。
  - 毛利率从 Pilot 阶段的约 60% 提升至 75% 取决于修复连接器和部署手册的标准化，而非服务主导模式。
  - 定价锚定于相邻端点和密钥预算加模型化 SOM 测算，而非独立生产赢单数据，因此真实付费意愿必须在前 2 次转化中得到验证。
  - 论点关键风险仍是修复审批；如果买家只购买检测和审计报告，ARPU 和回收周期相对本模型都会大幅压缩。
