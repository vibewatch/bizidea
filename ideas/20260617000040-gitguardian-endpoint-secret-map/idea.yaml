problem: >-
  Enterprises are rolling out Cursor, Copilot, Claude Code, internal MCP servers, and cloud CLIs faster than their
  security stack can adapt. Those tools spray long-lived credentials into shell history, IDE caches, local logs, and
  config files on developer laptops, where repo scanners, IAM, and EDR do not give a clean owner or remediation path.
  Security teams can detect some leaks after the fact, but they still lack a fast way to map each spilled secret to a
  workflow, rotate it safely, and keep developers productive.
targetUser:
  primary: >-
    Platform security engineers and developer-platform leaders at U.S. fintech infrastructure vendors with managed
    macOS fleets and internal MCP servers.
  secondary: >-
    Endpoint engineering teams that own Jamf or Intune policy for engineering laptops and are asked to approve AI
    coding tools.
  buyer: Head of Platform Security or CISO
startupThesis:
  nonObviousInsight: >-
    The real AI-dev security bottleneck is no longer the repo or the cloud control plane; it is the unmanaged local
    workstation where agents, shells, MCP servers, and IDEs materialize reusable credentials. The winner will not be
    another scanner but a remediation system that converts discovered secret spills into short-lived local access
    patterns and durable workflow fixes.
  beachhead: >-
    Platform security teams at U.S. fintech infrastructure vendors with 800-2,000 developers, managed macOS fleets,
    org-wide Cursor or Claude Code rollout, and 20+ internal MCP servers that reach AWS and Kubernetes sandboxes.
  wedge: >-
    An MDM-deployed endpoint agent plus cloud control plane that inventories AI tools and MCP servers, maps every
    exposed secret to the process and directory that produced it, auto-rotates live tokens, purges local artifacts,
    and replaces the broken workflow with a brokered short-lived credential shim.
  whyNowCatalyst: >-
    GitGuardian's launch and early-access metrics show that AI-assisted laptops now hold enough live secrets, in
    predictable local locations, for a dedicated endpoint remediation category to exist.
  ventureScalePath: >-
    Start with developer endpoints, then expand into contractor laptops, local data-science workstations, build
    agents, and eventually a unified secret-lineage and just-in-time access fabric across human and AI workers.
solution: >-
  Endpoint Secret Autofix deploys through Jamf or Intune onto engineering laptops and continuously inventories AI
  assistants, MCP servers, shells, CLI caches, and local config files. It builds a lineage graph that answers where a
  credential landed, which process created it, whether it is still live, and what systems it can reach. When it finds
  a risky secret, the product can revoke or rotate the credential through AWS, GitHub, Kubernetes, Vault, or 1Password
  integrations, purge the local artifacts, and swap the workflow to a localhost broker that mints short-lived
  task-scoped access on demand. Security teams get fleetwide policy and blast radius views before approving new AI
  tools, while developers get a one-time repair path instead of a broken environment and a ticket queue.
goToMarketSeed:
  firstCustomer: >-
    The platform-security team at a U.S. fintech infrastructure company with 800-1,500 engineers, Jamf-managed Mac
    fleets, a formal Cursor rollout, and internal MCP servers for AWS and Kubernetes operations.
  buyingTrigger: >-
    An org-wide approval request for Cursor or Claude Code, or a red-team or audit finding that cloud or GitHub tokens
    are sitting in local AI logs, shell history, or MCP configs.
  currentAlternative: >-
    Vault or 1Password plus manual grep scripts, repo secret scanners, generic EDR alerts, and ticket-driven
    credential rotation.
  switchingReason: >-
    Current tools either issue credentials or detect generic endpoint activity; they do not tie local secret spills to
    the exact AI workflow, rotate the token, and repair the developer path in one step.
  pricingHypothesis: >-
    Per protected developer endpoint, starting around $30 per engineer per month, with premium pricing for automated
    rotation connectors and compliance reporting.
