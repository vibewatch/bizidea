topRisks:
  - name: Incumbent bundling
    description: GitGuardian, 1Password, Vault, or EDR vendors could extend into endpoint remediation once the category proves valuable.
    mitigation: Focus on automated workflow repair and short-lived credential shims that sit across endpoint, IAM, and developer-tool stacks rather than pure detection.
  - name: Developer friction
    description: Aggressive rotation or cleanup can break local workflows and create user backlash if the product is noisy.
    mitigation: Start in monitor mode, ship one-click rollback and exception paths, and target design partners with managed Mac fleets and platform teams that can standardize workflows.
  - name: Evidence concentration
    description: The source data is still concentrated in company-led launch materials, so market size and urgency may be overstated outside early adopters.
    mitigation: Win early design partners during AI tool rollouts and prove measurable reductions in exposed secrets and remediation time within the first 30 days.
