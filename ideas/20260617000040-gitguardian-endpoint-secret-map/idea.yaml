jobsToBeDone:
  - job: >-
      When AI coding tools and internal MCP servers spread across managed laptops, help platform security teams find
      and remove live credentials without breaking developer workflows, so they can approve rollout safely.
    currentAlternative: >-
      Manual grep scripts, point secret scanners, Vault or 1Password policy, and post-incident rotation.
    successMetric: >-
      Median time from exposed secret detection to rotation under 30 minutes and a falling share of endpoints with
      long-lived local credentials.
  - job: >-
      When a developer laptop stores cloud or GitHub tokens in logs, caches, or shell history, help endpoint teams
      quarantine and clean the machine, so they can contain blast radius before an attacker reuses the secret.
    currentAlternative: >-
      EDR investigation plus ticket-driven reimaging and credential resets.
    successMetric: >-
      Percent of live exposures auto-remediated without reimaging and median blast-radius reduction per incident.
