  adoptionFrictionMatrix:
  - friction: Automatic rotation can break local developer workflows
    severity: high
    affectedBuyer: Platform security lead
    mitigation: Start with monitor mode, safe connector allowlists, and rollback-aware workflow repair paths.
    sourceRefs:
