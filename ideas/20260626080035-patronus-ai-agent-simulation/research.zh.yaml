  fiveForces:
    supplierPower:
      score: 3
      rationale: 公司确实依赖 ERP、工作流和关账平台的数据界面，但同样的生态也欢迎能加快安全自治上线的专业叠层。
      sourceRefs:
        - 39
        - 47
        - 49
        - 55
        - 66
    buyerPower:
      score: 4
      rationale: Controller 可以把在位关账厂商、内部 QA 和横向 eval 工具摆在一起比较，所以他们一定会要求非常清楚的证明：认证到底有没有把发布风险或审计摩擦压下去。
      sourceRefs:
        - 50
        - 59
        - 62
        - 127
    threatOfEntrants:
      score: 3
      rationale: 开放的评测理念和安全 AI 指引让入场门槛没那么高，但要把财务专用工作流图谱、证据映射和审计公信力做厚，仍然需要时间。
      sourceRefs:
        - 12
        - 13
        - 91
        - 97
    threatOfSubstitutes:
      score: 4
      rationale: 替代品并不少：在位财务 AI、人工 UAT 加人工审批，以及通用评测工具都足以拖慢 adoption，尤其当创业公司叙事不够聚焦时。
      sourceRefs:
        - 51
        - 54
        - 59
        - 62
    competitiveRivalry:
      score: 4
      rationale: 这个赛道已经挤进了动作很快的智能体评测厂商和位置很好的财务在位企业，大家都在往控制、可观测和工作流自动化上收敛。
      sourceRefs:
        - 4
        - 7
        - 12
        - 51
        - 62
  pestle:
    - factor: 政治
      impact: neutral
      point: AI 治理要求正变得越来越明确，这会拉动需求，但也会抬高文档留存和监督成本。
      sourceRefs:
        - 98
        - 109
    - factor: 经济
      impact: positive
      point: 财务团队正在被要求用更少的人做更多事，把人力腾到更高价值的分析上，所以“可控自治”已经是现实预算话题。
      sourceRefs:
        - 37
        - 114
        - 138
    - factor: 社会
      impact: negative
      point: 如果结果不能解释、不能追溯、不能复核，Controller 和 CFO 不会信任自主财务动作。
      sourceRefs:
        - 54
        - 129
    - factor: 技术
      impact: positive
      point: 智能体构建框架、ERP API 和关账工作流产品都已就位，所以一层专门的认证软件在技术上已经能做出来。
      sourceRefs:
        - 36
        - 37
        - 62
    - factor: 法律
      impact: negative
      point: 财务报告工作流天生背着证据和内控要求，所以一旦动作要交给智能体，证明与补救的标准只会更高。
      sourceRefs:
        - 100
        - 101
        - 108
        - 98
  adoptionFrictionMatrix:
    - friction: 跨实体、跨异常类型去建模 ERP 与关账系统的真实保真度，本身就很难
      severity: high
      affectedBuyer: 财务系统负责人
      mitigation: 先锁定一套 ERP + 关账栈，并把历史异常先吃进去，再逐步扩覆盖面。
      sourceRefs:
        - 39
        - 49
        - 62
    - friction: 只要下游影响不可逆，Controller 就会很抗拒把动作直接交给自主智能体
      severity: high
      affectedBuyer: Controller 或 CAO
      mitigation: 先用影子模式、明确的重要性阈值和人工审批检查点起步，之后再慢慢放开生产写路径。
      sourceRefs:
        - 51
        - 54
        - 129
    - friction: 光看模拟运行，买家很难直觉判断审计证据到底够不够
      severity: high
      affectedBuyer: 内审负责人
      mitigation: 把每条测试、每个阈值和每份决策产物都映射到 ICFR 控制目标上，并自动保留复核证据。
      sourceRefs:
        - 100
        - 101
        - 108
    - friction: 采购一定会追问：为什么现有的关账软件还不够？
      severity: medium
      affectedBuyer: 财务转型负责人
      mitigation: 把产品定位成横跨 ERP、关账软件和智能体构建方的中立放行闸门，而不是另一套关账套件。
      sourceRefs:
        - 50
        - 51
        - 59
        - 62
market:
  tam:
    value: $0.4B
