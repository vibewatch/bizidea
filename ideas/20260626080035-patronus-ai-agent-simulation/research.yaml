  adoptionFrictionMatrix:
  - friction: ERP and close-system fidelity is hard to model across entities and exception types
    severity: high
    affectedBuyer: Finance systems leader
    mitigation: Start with one ERP-plus-close stack and import historical exceptions before broadening coverage.
    sourceRefs:
    - 39
    - 49
    - 62
  - friction: Controllers are reluctant to trust autonomous actions with irreversible downstream effects
    severity: high
    affectedBuyer: Controller or CAO
    mitigation: Lead with shadow mode, explicit materiality thresholds, and human approval checkpoints before enabling production
      write paths.
    sourceRefs:
    - 51
    - 54
    - 129
  - friction: Audit-evidence sufficiency is not obvious for simulated runs
    severity: high
    affectedBuyer: Internal audit lead
    mitigation: Map every test, threshold, and decision artifact to ICFR control objectives and retain review evidence automatically.
    sourceRefs:
    - 100
    - 101
    - 108
  - friction: Procurement will ask why incumbent close software is not enough
    severity: medium
    affectedBuyer: Finance transformation executive
    mitigation: Position the product as a vendor-neutral release gate across ERP, close, and agent builders rather than as
      another close suite.
    sourceRefs:
    - 50
    - 51
    - 59
    - 62
