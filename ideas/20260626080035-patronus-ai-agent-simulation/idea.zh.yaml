problem: 财务团队正被推着把 AI 智能体放进 ERP 和关账流程里，去清异常、起草分录、审批例行操作。真正的故障点不是通用模型误差，而是各家公司自己的审批链、政策阈值和脏乱的边角交易；这些东西，无论窄 benchmark 还是厂商 sandbox，都抓不住。等智能体开始在长达数小时的关账流程里无人值守地跑，人工 QA 也会迅速失灵，最后财务控制负责人只能在推进缓慢的试点和不够安全的生产权限之间二选一。
targetUser:
  primary: 多实体架构的软件、金融科技和平台型公司里的公司财务控制负责人（Corporate Controller）与财务系统负责人；这些团队正在把自主关账或异常处理智能体往生产里推。
  secondary: 必须在财务智能体上生产前签字放行的内审团队和 AI 平台团队。
  buyer: 公司财务控制负责人（Corporate Controller）或财务系统副总裁
startupThesis:
  nonObviousInsight: 缺的不是又一个通用智能体 benchmark，而是公司专属的财务工作流孪生体：它能回放历史异常、改造出新的边角案例，并在政策、审批矩阵或 ERP 配置一变时，立刻重新给智能体做认证。
  beachhead: 美国上市或 pre-IPO 的软件与金融科技公司里的财务控制团队和财务系统团队；这些公司通常有 5–20 个法人实体，用 NetSuite 或 SAP，已经在试点让 AI 智能体处理 AP 匹配异常、起草低风险计提分录，或审批常规支出。
  wedge: 先做一个私有的月末关账与财务异常工作流仿真孪生体，映射审批链、过账规则、交易状态和角色权限；在智能体通过回放测试与对抗测试之前，直接挡住生产写权限。
  whyNowCatalyst: Patronus 的融资、客户进展和金融垂直聚焦说明，企业已经从“觉得智能体评测很酷”走到“愿意为仿真基础设施掏预算”这一步，因为 benchmark 战绩和人工 QA 都扛不住真实工作流的复杂度。
  ventureScalePath: 先从关账与异常处理认证切进去，再把同一套工作流孪生引擎扩到资金、采购、收入运营、内审等高权限智能体工作流，最后变成企业每次发布前都要经过的自治认证控制面。
solution: 产品接入 ERP、关账和工单系统，生成一套脱敏后的数字孪生：里面有交易对象、审批路径、角色权限和历史异常队列。它先回放真实季度末案例，再制造阈值边缘、缺失审批之类的对抗性变体，最后给智能体打分：是否守住政策、是否完成任务、是否把影响范围控制住。每次版本发布都会产出一份财务级认证报告，给财务控制负责人和内审在开生产写权限前签字。随着时间推移，这个平台会变成持续复认证层：只要系统配置或政策逻辑一变，它就只重跑受影响的场景。
goToMarketSeed:
  firstCustomer: 一家美国上市或 pre-IPO 的软件公司，拥有 8–15 个法人实体，使用 NetSuite 和 BlackLine，且正在试点让 AI 智能体在季度末前处理 AP 匹配异常并起草低风险分录。
  buyingTrigger: 触发点是财务智能体从只读助手变成拥有过账、审批或对账权限的执行者，尤其是季度末前或外部审计窗口前。
  currentAlternative: ERP sandbox、基于表格的 UAT 脚本、人工 QA，以及在高度人工盯防下的小范围内部红队演练。
  switchingReason: 有了工作流孪生体，团队可以在不碰真实总账的前提下，先把生产级异常和审批边角案例演练一遍，同时产出能说服财务负责人、审计方和安全审核人的证据。
  pricingHypothesis: 按接入的财务系统数和已认证的自主工作流数收年费；关账窗口前后大规模跑仿真，再按用量收超额费用。
whyNow:
  - point: 智能体仿真已经从研究工具跨进了有预算的企业控制品类——买家现在愿意给可靠性基础设施单列预算。
    signalRefs:
      - 仿真已经成了有预算的控制层
    sourceRefs:
      - 1
  - point: 财务智能体不能再靠 benchmark 成绩过放行，因为最危险的抄近路只会出现在真实异常链和政策边角里。
    signalRefs:
      - 基准测试兜不住真实工作流的边角案例
    sourceRefs:
      - 2
  - point: 财务已经是数字世界测试最早落地的场景之一，所以一套财务专用的认证切口，能先吃到明确且已有预算主人的需求。
    signalRefs:
      - 财务已经是最早落地的场景之一
    sourceRefs:
      - 2
  - point: 一旦智能体要穿过长达数小时的关账和对账循环，人工 QA 就会失灵，这会把自动化放行认证的需求立刻推到台前。
    signalRefs:
      - 长时运行的智能体一来，人工 QA 就失灵
    sourceRefs:
      - 4
  - point: Waymo 式仿真纪律正在进入企业 AI，这让“在 ERP 巨头自己把跨系统认证做扎实之前，先长出一家定义品类的工作流孪生公司”这件事变得可信。
    signalRefs:
      - 世界模型方法正在进入企业 AI
    sourceRefs:
      - 3
differentiator: 这不是通用 benchmark 套件，也不是静态 ERP 沙箱。真正的护城河，是一套持续同步、公司专属的财务孪生体：它抓住多系统里的交易历史、审批逻辑和权限边界，再把这些状态变成可执行测试和审计证据。工作流保真度、能感知变更的复认证、以及 Controller 能直接拿去放行的证明，这三件事叠在一起，比再做一个评测看板更难被点状智能体厂商复制。
