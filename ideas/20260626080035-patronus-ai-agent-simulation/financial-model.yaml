modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      ICP[Target controllers] --> Pilots[Paid pilots]
      GTMSpend[CAC spend] --> Pilots
      Pilots --> Customers[Production customers]
      Customers --> Expansion[Second workflow expansion]
      Customers --> Revenue[Subscription revenue]
      Expansion --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[Ending cash]
      Churn[Churn and trust] --> Customers
modelSanity:
  - checkName: "Revenue engine"
    finding: "The base case grows from 2 annual production customers at the end of Y1 to 25 by Q4Y3 at roughly $115K blended ACV, with expansion rather than seat count doing most of the monetization work."
  - checkName: "Must go right"
    finding: "Paid pilots need to convert inside one close cycle and at least some accounts must add a second certified workflow so ARPU rises without a large field-services team."
  - checkName: "Model breaks if"
    finding: "If deployment stays services-heavy while production conversion slips two quarters, the downside case drives cash close to zero before the next financing milestone is proven."
  - checkName: "Next-round proof"
    finding: "A seed-ready story appears once the company reaches 8-12 annual customers, proves 3 second-workflow expansions, and shows one second system bundle can deploy in under six weeks."
sanityChecks:
  ruleOf40: "Y3 growth 173% + EBITDA margin -18% = 156%."
  burnMultiple: "Y2 burn multiple 1.5x based on $1.0M burn over $0.7M net new revenue; Y3 burn multiple 0.3x as the model approaches break-even."
  revenuePerFte: "$204K Y3 using Q4Y3 headcount of 10 FTE (benchmark roughly $200K-$400K for B2B SaaS)."
  flags:
    - "The model uses a $115K blended ACV, which sits above the broader research SOM average and therefore depends on staying concentrated in urgent, higher-complexity ICP accounts and landing some second-workflow expansion."
    - "Solutions / controls headcount stays flat at 2 FTE through Y3, so the gross-margin and runway story only works if NetSuite + BlackLine onboarding truly becomes repeatable and partners absorb more deployment work."
    - "The company stays cash-positive on a $2.8M raise without counting paid-pilot or implementation-fee revenue, but the downside case shows that a two-quarter slip in conversion would nearly exhaust the buffer."
