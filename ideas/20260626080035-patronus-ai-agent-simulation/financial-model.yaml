scenarios:
  downside:
    description: "Pilot conversion slips by roughly two quarters, expansion lands later, and onboarding remains more services-heavy than planned."
    y3RevenueK: 1443.8
    y3EbitdaK: -850.1
    cashLowPointK: 14.1
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches 18 instead of 25."
      - "Blended annual ARPU falls to $105K because fewer accounts add a second workflow."
      - "Gross margin stays at 65% because deployment and evidence work remain labor-intensive."
      - "Monthly churn rises to 2.4% as some pilots fail to become durable annual controls."
  base:
    description: "Production conversions improve steadily, partner-assisted onboarding starts to work, and the model still excludes pilot and implementation revenue from the core P&L."
    y3RevenueK: 2041.3
    y3EbitdaK: -359.7
    cashLowPointK: 684.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches 25 with a $115K blended ACV."
      - "Gross margin holds at the 70% business-plan target."
      - "Headcount stays lean at 10 FTE by Q4Y3 because partner-led deployments absorb more services work."
  upside:
    description: "More pilots convert on the first budget cycle, second-workflow expansion attaches earlier, and the team delays one noncritical hire because the product packages faster."
    y3RevenueK: 2645.9
    y3EbitdaK: 193.8
    cashLowPointK: 1260.9
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches 28 instead of 25."
      - "Blended annual ARPU rises to $125K through earlier second-workflow and premium evidence attach."
      - "Gross margin improves to 72% as connectors and evidence templates standardize."
      - "One planned late-stage engineering hire is delayed because onboarding becomes more repeatable."
