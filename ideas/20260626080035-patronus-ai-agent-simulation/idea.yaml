jobsToBeDone:
- job: When quarter-end approaches and we want an AI agent to clear routine AP exceptions, help our controllership team prove the agent will follow policy, so we can grant limited autonomy without risking misposts or audit findings.
  currentAlternative: Manual UAT in ERP sandboxes plus finance-manager review of a small sample of cases.
  successMetric: Percentage of simulated exception cases passed before release and reduction in finance-agent escalations during close.
- job: When ERP roles, approval thresholds, or posting rules change, help our finance systems team recertify affected agents quickly, so we can keep automation live without reopening control gaps.
  currentAlternative: Spreadsheet change-control checklists and ad hoc reruns of a few historical scenarios.
  successMetric: Time from configuration change to recertified release approval.
