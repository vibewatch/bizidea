topRisks:
- name: Twin fidelity risk
  description: If the finance twin misses critical approval or policy edge cases, customers will not trust certification results.
  mitigation: Start with a narrow set of systems and workflows, ingest historical exception logs and audit evidence, and make human sign-off part of early certification loops.
- name: Incumbent platform response
  description: ERP vendors, close platforms, or agent-eval incumbents could add basic simulation and squeeze the wedge.
  mitigation: Own the cross-system workflow graph, release evidence layer, and vendor-neutral recertification workflow that spans ERP, close, and agent stacks.
- name: ROI may look like insurance
  description: Controllers may struggle to justify spend before they experience a visible finance-agent failure or audit scare.
  mitigation: Sell around concrete release moments, tie value to faster approval and lower manual QA effort, and package audit-ready evidence as a direct budget unlock.
