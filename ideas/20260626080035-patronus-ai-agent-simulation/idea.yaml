problem: Finance teams are being pushed to let AI agents clear exceptions, draft journals, and approve routine actions inside ERP and close workflows. The failure modes are not generic model errors; they live in company-specific approval chains, policy thresholds, and messy edge-case transactions that narrow benchmarks and vendor sandboxes do not capture. Manual QA also collapses once agents run unattended across hours-long close processes, leaving controllers to choose between slow pilots and unsafe production access.
targetUser:
  primary: Corporate controllers and finance systems leaders at multi-entity software, fintech, and marketplace companies rolling out autonomous close or exception-handling agents.
  secondary: Internal audit and AI platform teams that must sign off on finance-agent controls before production rollout.
  buyer: Corporate Controller or VP of Finance Systems
startupThesis:
  nonObviousInsight: The missing layer is not another generic agent benchmark. It is a company-specific finance workflow twin that can replay historical exceptions, mutate edge cases, and recertify an agent every time policies, approval matrices, or ERP configurations change.
  beachhead: Controllers and finance systems teams at U.S.-listed software and fintech companies with 5-20 legal entities, NetSuite or SAP, and pilots that let AI agents clear AP matching exceptions, draft accrual journals, or approve routine spend.
  wedge: A private simulation twin for month-end close and finance-exception workflows that mirrors approval chains, posting rules, transaction states, and role permissions, then blocks production write access until an agent passes replay and adversarial tests.
  whyNowCatalyst: Patronus's funding, customer traction, and finance-vertical focus show that enterprises have moved from admiring agent evals to buying simulation infrastructure because benchmark wins and manual QA fail under real workflow complexity.
  ventureScalePath: Start with close and exception certification, then expand the same workflow-twin engine into treasury, procurement, revenue operations, internal audit, and other high-privilege agent workflows, becoming the control plane that certifies enterprise autonomy before every release.
solution: The product connects to ERP, close, and ticketing systems to build a scrubbed digital twin of transaction objects, approval paths, role permissions, and historical exception queues. It replays real quarter-end cases, generates adversarial mutations such as threshold edge cases or missing approvals, and scores whether an agent stayed within policy, completed the task, and contained blast radius. Each release gets a finance-grade certification report that controllers and internal audit can approve before production write access is turned on. Over time, the platform becomes a continuous recertification layer that reruns only the impacted scenarios whenever system configuration or policy logic changes.
goToMarketSeed:
  firstCustomer: A U.S.-listed or pre-IPO software company with 8-15 legal entities, NetSuite, BlackLine, and an active pilot to let an AI agent clear AP matching exceptions and draft low-risk journals before quarter-end.
  buyingTrigger: The trigger is the moment a finance agent moves from read-only assistance to posting, approval, or reconciliation authority, especially before quarter-end or an external audit window.
  currentAlternative: ERP sandboxes, spreadsheet-based UAT scripts, manual QA, and limited internal red-teaming before a tightly supervised rollout.
  switchingReason: A workflow twin can rehearse production-like exceptions and approval edge cases without touching the real ledger, while producing evidence that satisfies controllers, auditors, and security reviewers.
  pricingHypothesis: Annual subscription priced by connected finance systems and number of certified autonomous workflows, with usage-based overages for simulation runs around close windows.
