scenarios:
  downside:
    description: "试点转化大致慢了两个季度，扩张来得更晚，部署也比计划更偏服务化。"
    y3RevenueK: 1443.8
    y3EbitdaK: -850.1
    cashLowPointK: 14.1
    keyAssumptionChanges:
      - Q4Y3 的 customersEop 只能到 18，而不是 25。
      - 混合年 ARPU 降到 $105K，因为加第二条工作流的账户更少。
      - 毛利率只能停在 65%，因为部署和证据工作仍然偏人力密集。
      - 月流失率升到 2.4%，因为部分试点没能转成长期年度控制合同。
  base:
    description: "生产转化稳步改善，伙伴辅助部署开始生效，而模型仍然不把试点和实施收入计入核心 P&L。"
    y3RevenueK: 2041.3
    y3EbitdaK: -359.7
    cashLowPointK: 684.0
    keyAssumptionChanges:
      - Q4Y3 的 customersEop 达到 25，混合 ACV 为 $115K。
      - 毛利率守住商业计划目标的 70%。
      - 到 Q4Y3 团队仍只扩到 10 FTE，因为伙伴主导部署吸收了更多服务工作。
  upside:
    description: "更多试点在第一个预算周期内就转化，第二工作流扩张更早挂上，而且产品打包更快，所以团队把一个非关键岗位往后延。"
    y3RevenueK: 2645.9
    y3EbitdaK: 193.8
    cashLowPointK: 1260.9
    keyAssumptionChanges:
      - Q4Y3 的 customersEop 达到 28，而不是 25。
      - 混合年 ARPU 升到 $125K，因为第二工作流和高级证据模块挂得更早。
      - 随着连接器和证据模板标准化，毛利率提升到 72%。
      - 由于导入流程更可复制，原计划后期补的一位工程岗位被延后了。
sensitivity:
  - variable: "ARPU"
    downsideCase: "$105K 混合年 ACV"
    baseCase: "$115K 混合年 ACV"
    upsideCase: "$125K 混合年 ACV"
    y3RevenueImpactK: -177.5
    cashImpactK: -124.3
  - variable: "CAC"
    downsideCase: "$50K 全口径 CAC"
    baseCase: "$40K 全口径 CAC"
    upsideCase: "$32K 全口径 CAC"
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: "流失率"
    downsideCase: "2.4% 月流失率"
    baseCase: "1.8% 月流失率"
    upsideCase: "1.2% 月流失率"
    y3RevenueImpactK: -140.0
    cashImpactK: -100.0
  - variable: "销售周期"
    downsideCase: "从付费试点启动到年度生产需要 8–9 个月"
    baseCase: "5–6 个月"
    upsideCase: "4–5 个月"
    y3RevenueImpactK: -300.0
    cashImpactK: -220.0
  - variable: "毛利率"
    downsideCase: "65% 毛利率"
    baseCase: "70% 毛利率"
    upsideCase: "72% 毛利率"
    y3RevenueImpactK: 0.0
    cashImpactK: -102.1
  - variable: "招聘节奏"
    downsideCase: "把 1 位工程师和 1 位 GTM 招聘提前到 Y2"
    baseCase: "到 Q4Y3 以精简节奏爬坡到 10 FTE"
    upsideCase: "把 1 个非关键岗位延后到 seed 证明点之后再招"
    y3RevenueImpactK: -40.0
    cashImpactK: -180.0
