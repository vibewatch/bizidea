  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      ICP[Target controllers] --> Pilots[Paid pilots]
      GTMSpend[CAC spend] --> Pilots
      Pilots --> Customers[Production customers]
      Customers --> Expansion[Second workflow expansion]
      Customers --> Revenue[Subscription revenue]
      Expansion --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[Ending cash]
      Churn[Churn and trust] --> Customers
modelSanity:
  - checkName: "收入引擎"
    finding: "基准情形下，年度生产客户数会从 Y1 末的 2 家爬到 Q4Y3 的 25 家，混合 ACV 约 $115K；真正拉动变现的主要是工作流扩张，而不是席位数。"
  - checkName: "必须跑顺的事"
    finding: "付费试点必须在一个关账周期内转化，而且至少有一部分账户要加第二条已认证工作流，这样 ARPU 才抬得起来，且不用养一大支现场服务团队。"
  - checkName: "模型会在哪儿断"
    finding: "如果部署一直偏服务化，同时生产转化再慢两个季度，下行情形会在证明下轮融资节点前，把现金几乎烧到见底。"
  - checkName: "下一轮证明点"
    finding: "一旦公司拿到 8–12 个年度客户、做出 3 个第二工作流扩张，并证明第 2 套系统组合也能在 6 周内落地，seed-ready 的故事就站住了。"
sanityChecks:
  ruleOf40: "Y3 增长 173% + EBITDA 利润率 -18% = 156%。"
  burnMultiple: "Y2 的 burn multiple 为 1.5x：约 $1.0M 现金消耗 / $0.7M 净新增收入；Y3 则降到 0.3x，因为模型开始逼近盈亏平衡。"
  revenuePerFte: "按 Q4Y3 的 10 FTE 计算，Y3 每 FTE 收入约 $204K（B2B SaaS 常见区间约 $200K-$400K）。"
  flags:
    - 模型采用 $115K 的混合 ACV，高于更宽口径研究 SOM 的平均值，因此前提是公司必须持续聚焦在紧迫度更高、复杂度更大的 ICP 账户上，并真正拿到一部分第二工作流扩张。
    - 解决方案 / 内控团队到 Y3 仍只维持 2 FTE，所以毛利率和跑道能否成立，取决于 NetSuite + BlackLine 导入是否真的能标准化，以及伙伴是否能接走更多部署工作。
    - 在不计付费试点和实施费收入的前提下，公司用 $2.8M 也还能维持现金为正；但下行情形说明，一旦转化慢两个季度，缓冲基本就会被烧穿。
