competitors:
- name: Portkey
  stage: scale-up
  wedge: AI-native gateway plus observability, model catalog, budgets, guardrails, and enterprise VPC deployment.
  pricing: Production starts at $49/month; enterprise is custom priced.
  strength: Deep AI-native feature surface and credible enterprise packaging around governance, observability, and rollout workflows.
  weaknessVsUs: Optimizes and governs traffic but does not position around exploit-path detection, forced patch orchestration, or automated post-compromise credential quarantine.
  sourceRefs:
  - 41
  - 42
  - 44
  - 48
  - 55
- name: Kong AI Gateway
  stage: incumbent
  wedge: Extends a proven API gateway with AI plugins for proxying, prompt guard, semantic cache, token-aware rate limiting, and enterprise deployment options.
  pricing: Advanced AI capabilities are tied to enterprise or plugin tiers; Konnect and enterprise pricing are metered or custom.
  strength: Massive installed base, strong plugin ecosystem, and operational credibility with large platform teams.
  weaknessVsUs: Broad API-governance positioning makes it less likely to own incident-specific patch and credential-containment workflows for self-hosted AI gateways.
  sourceRefs:
  - 56
  - 59
  - 60
  - 62
  - 66
- name: Gravitee
  stage: incumbent
  wedge: API-management platform layering AI prompt guard, token tracking, OAuth or MCP security, and gateway policy controls onto enterprise API infrastructure.
  pricing: Enterprise pricing across Gold, Platinum, and Diamond tiers.
  strength: Strong policy and access-management story for organizations already standardizing on broader API governance.
  weaknessVsUs: Requires buyers to adapt a general API platform to an AI-gateway incident workflow; not centered on rapid version-aware remediation and upstream-key containment.
  sourceRefs:
  - 71
  - 72
  - 74
  - 76
- name: Envoy AI Gateway
  stage: open-source project
  wedge: CNCF-oriented, Kubernetes-native AI gateway with a two-tier architecture and extensible traffic or security primitives.
  pricing: Open source and self-managed.
  strength: Appeals to infrastructure teams that want open, Kubernetes-native building blocks and already operate Envoy-style control planes.
  weaknessVsUs: Open-source infrastructure still leaves patch workflows, key rotation, and evidence collection to the customer or surrounding tooling.
  sourceRefs:
  - 79
  - 78
  - 81
regulatoryTechnicalConstraints:
- point: Credential rotation must be staged to avoid outages; cloud providers explicitly document dual-key or managed-rotation workflows, so any quarantine product must integrate rather than simply revoke.
