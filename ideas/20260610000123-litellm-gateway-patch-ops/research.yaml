openQuestions:
- How large is the live installed base of self-hosted LiteLLM among 100-800 engineer B2B software companies versus managed or alternative gateways?
- Will buyers accept a specialist incident-ops product in addition to Portkey, Kong, or Gravitee, or will they insist on features inside existing gateway platforms?
- How often do platform teams rotate upstream model-provider keys today, and how much downtime risk do they associate with that workflow?
- Can LiteLLM upstream or adjacent gateway vendors close the remediation gap quickly enough to compress the independent wedge in the next 12 months?
