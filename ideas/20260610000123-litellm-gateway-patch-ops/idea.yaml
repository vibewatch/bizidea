topRisks:
  - name: Narrow initial market
    description: The first wedge may look too LiteLLM-specific if self-hosted AI gateways remain concentrated in early adopters.
    mitigation: Expand quickly into adjacent AI proxies and sell the platform as the control plane for all model-routing infrastructure.
  - name: Fast incumbent response
    description: Cloud security or container-security vendors could add basic AI gateway detections once the category becomes visible.
    mitigation: Differentiate on safe patch orchestration, credential rotation, and incident-response workflows rather than detection alone.
  - name: False-positive operational risk
    description: Automated quarantine or upgrade workflows could disrupt production AI traffic if they misclassify an exposure.
    mitigation: Ship canary rollout, approval gates, and rollback-by-default controls before enabling fully automated containment.
