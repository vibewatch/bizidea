jobsToBeDone:
  - job: >-
      When a critical AI gateway advisory lands, help the platform security team patch exposed deployments and rotate model
      credentials fast, so they can contain blast radius without breaking production AI traffic.
    currentAlternative: Manual upgrade runbooks and one-off secret rotation scripts.
    successMetric: Time to full remediation and credential rotation after an advisory.
  - job: >-
      When leadership asks whether AI gateways are safe to keep in production, help infrastructure owners prove posture and
      policy status, so they can keep shipping AI features with less incident risk.
    currentAlternative: Container scanners plus manual spreadsheet audits.
    successMetric: Percentage of gateway instances with verified patch and policy compliance.
