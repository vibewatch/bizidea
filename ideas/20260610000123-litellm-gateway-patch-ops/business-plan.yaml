slug: gateway-patch-quarantine-plane
date: '2026-06-10'
executiveSummary: >-
  This company should start as an incident-operations control plane for
  self-hosted AI gateways, not as another general AI gateway or CNAPP product.
  The first customer is a Series B to public B2B software company with
  100-800 engineers, Kubernetes-based LiteLLM in production, multiple upstream
  model-provider keys, and a platform-security lead who currently patches and
  rotates credentials manually. The buying trigger is a KEV alert, vendor
  advisory, or internal red-team finding that turns gateway hardening into an
  executive-visible remediation deadline. Research supports a focused but not
  massive market with an estimated $0.6B TAM, $160.0M beachhead SAM, and $11.9M
  year-3 SOM if the company expands beyond LiteLLM while keeping the incident
  workflow narrow. The MVP should prove three things quickly: it can inventory
  exposed gateways, stage safe patch cutovers, and rotate compromised provider
  credentials without breaking production AI traffic. The deliberate tradeoff is
  to own exploit-path detection plus remediation execution for gateway clusters
  instead of competing with Portkey, Kong, Gravitee, or LiteLLM on broad routing
  and governance features. The biggest disconfirming risks are that the live
  installed base of self-hosted LiteLLM in the beachhead is smaller than
  modeled, or that existing gateway vendors add good-enough remediation features
  before this startup builds cross-gateway depth. Research leaves that installed
  base as an explicit gap, so the company should be funded as a focused
  pre-seed only if the first design-partner audits confirm enough target
  deployments and paid incident-response demand.
problem:
  - Self-hosted AI gateways centralize model credentials, routing, and logs, so a single exploited gateway can expose provider keys and adjacent AI systems rather than just one application.
  - Current response is manual Kubernetes patching plus ad hoc secret rotation across KMS, Vault, and environment variables, which is slow, error-prone, and likely to cause traffic disruption during an incident.
solution:
  - Continuously inventory LiteLLM and adjacent gateway deployments, versions, exposed endpoints, RBAC posture, and upstream provider credentials across Kubernetes environments.
  - Orchestrate canary patch rollouts, endpoint quarantine, and staged provider-key rotation with rollback and evidence capture so security teams can contain a gateway incident without taking AI traffic offline.
whyWeWin:
  - The wedge is narrower than generic gateway governance and maps directly to the incident workflow buyers must execute when an exploited advisory lands.
  - Existing gateways, API-management vendors, and secret managers cover routing, policy, or storage, but none appear to own version-aware remediation plus upstream-key containment across self-hosted gateway fleets.
  - Repeated remediation runs can compound into a proprietary exposure graph and cutover dataset that make future upgrades faster and safer than manual scripts or shallow scanner alerts.
strategicChoices:
  beachhead: >-
    Series B to public B2B software companies with 100-800 engineers that run
    self-hosted LiteLLM on Kubernetes as the shared gateway for internal
    copilots or customer-facing AI features.
  wedgeRationale: >-
    LiteLLM incident response is a faster proof point than broad AI-governance
    software because the trigger is acute, the remediation path is concrete, and
    buyers can measure time to patch, time to rotate keys, and traffic
    continuity within one pilot.
  sequencingRationale: >-
    Start with inventory, exploit-path detection, approval-gated canary patching,
    and staged credential rotation because buyers will not trust automatic
    quarantine until the system first proves accurate asset mapping and
    low-downtime cutovers. After the company converts incident-led pilots, it
    should add heterogeneous gateway coverage, compliance evidence, and partner
    distribution before building broader governance or policy modules.
  notYet:
    - Building a full AI gateway to compete on routing, observability, or guardrails
    - Serving managed-gateway-only customers that do not control self-hosted clusters
    - Expanding into broad CNAPP, SIEM, or generic API-security posture before gateway remediation is repeatable
    - Fully automated quarantine without human approval gates in the first release
market:
  tam: "$0.6B estimated TAM based on about 14.2k target-like organizations, roughly 2.5 protected gateway clusters per organization, and about $18k annual spend per protected cluster."
  sam: "$160.0M estimated SAM based on the beachhead segment, direct-sales reachable geographies, and roughly 2.2 protected clusters per target organization."
  som: "$11.9M modeled year-3 SOM based on roughly 300 beachhead customers at about 2.2 protected clusters each and about $18k annual spend per cluster."
  segments:
    - Primary segment: B2B software companies with self-hosted LiteLLM on Kubernetes and multiple production AI applications
    - Secondary segment: regulated enterprises running heterogeneous AI gateways or inference proxies after the LiteLLM wedge is proven
  buyingProcess: >-
    The operational champion is usually the platform-security lead or AI
    platform engineer, while the economic buyer is typically the Head of
    Platform Security or VP Infrastructure. Deals should start as a paid
    incident-readiness or live-remediation pilot after an advisory, red-team
    finding, or procurement review exposes that gateway patching and key
    rotation are still manual.
product:
  mvp: >-
    The MVP should cover Kubernetes and LiteLLM discovery, version and endpoint
    exposure mapping, admin-surface checks, approval-gated canary upgrades, and
    staged upstream-key rotation with rollback. It should launch in monitor and
    assisted-remediation mode first, with evidence export for what changed, what
    keys rotated, and whether traffic stayed healthy.
  sixMonth: >-
    Ship paid pilots for LiteLLM on Kubernetes with cluster inventory,
    exploit-path checks for the known LiteLLM and Starlette chain, canary patch
    orchestration, and evidence-backed credential-rotation runbooks that deploy
    in under two weeks.
  twelveMonth: >-
    Add cross-gateway coverage for the top adjacent proxy stack seen in pilots,
    policy templates for admin-surface hardening, partner integrations for Vault
    and major cloud secret stores, and production dashboards showing patch and
    containment SLA by cluster.
  twentyFourMonth: >-
    Expand into heterogeneous AI gateway fleets, stronger compliance evidence,
    traffic-forensics exports, and multi-team policy controls once the company
    proves that incident-led pilots convert and expand inside existing customers.
  keyBets:
    - LiteLLM plus Kubernetes covers enough urgent early demand to win the first 3-5 paid pilots before broad gateway support is required.
    - Buyers will trust approval-gated canary remediation before they trust full automation, and that trust step is enough to win budget.
    - Provider-key rotation and traffic cutover are the features that move the product from scanner to budget-worthy control plane.
    - Cross-gateway expansion will matter before LiteLLM upstream or adjacent vendors close the remediation gap.
gtm:
  wedge: >-
    Sell a paid gateway incident-readiness or remediation pilot for one
    customer environment, then convert to an annual subscription once the
    customer relies on the platform for patch orchestration, credential
    containment, and evidence capture across production clusters.
  channels:
    - Founder-led outbound to platform-security and infrastructure leaders immediately after gateway advisories, KEV additions, or red-team findings
    - Design-partner pilots with AI platform teams already running LiteLLM on Kubernetes
    - Kubernetes security, secret-management, and incident-response partners that already support AI infrastructure hardening
  funnelTargets: "Lead→qualified pilot 20-30%, qualified pilot→paid pilot 50%+, paid pilot→production 50%+, and pilot kickoff→annual contract under 120 days."
  pricing: >-
    Annual subscription priced by protected gateway cluster and active
    provider-credential set, with a minimum platform fee and premium tiers for
    incident-response automation and evidence exports. The working anchor is
    roughly $18k annual spend per protected cluster, which implies initial
    production contracts around $40k-$100k ARR for customers covering 2-5
    clusters, with a paid pilot credited toward the annual subscription.
businessModel:
  revenueStreams:
    - Annual subscription for protected gateway-cluster coverage
    - Premium automation tier for staged credential rotation, quarantine, and evidence exports
    - Professional services for initial hardening, migration, and tabletop incident exercises
  unitOfValue: Protected gateway cluster with covered provider-credential set
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one cluster or environment into all production and staging gateway clusters inside the same customer
    - Add heterogeneous gateway and inference-proxy coverage after LiteLLM proof
    - Upsell compliance evidence, forensics exports, and partner-integrated incident drills to higher-regulation customers
strategyMap:
  northStarMetric: Percentage of in-scope gateway clusters remediated within 24 hours of a critical advisory without customer-visible AI traffic outage
  inputMetrics:
    - Number of discovered gateway clusters and exposed admin or test surfaces per active customer
    - Median time from advisory detection to completed patch rollout
    - Percentage of suspected-compromise events with completed provider-key rotation
    - Rollback rate on canary patch executions
    - Paid pilot to annual production conversion rate
  moatsToBuild:
    - Exposure graph linking gateway versions, routes, roles, clusters, and upstream provider keys
    - Remediation telemetry showing safe cutover patterns, rollback rates, and rotation runbooks across real customer fleets
    - Incident evidence corpus mapping every advisory, patch, quarantine action, and key rotation to audit-ready records
  killCriteria:
    - Fewer than 10 of the first 40 target accounts confirm self-hosted LiteLLM or equivalent production gateway deployments
    - Fewer than 3 paid pilots after 30 qualified beachhead conversations
    - Median remediation time improvement below 50% versus the customer's prior manual process across the first 5 pilots
    - Pilot-to-production conversion below 50% after the first 6 paid pilots
  mermaid: |
    flowchart LR
      Wedge[LiteLLM incident-response wedge] --> MVP[Inventory patch and rotate MVP]
      MVP --> Proof[Faster remediation with safe cutovers]
      Proof --> Expansion[Cross-gateway control plane]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong incident trigger and workflow clarity, but conviction stays limited until the team proves enough self-hosted gateway density and paid demand beyond a one-off vulnerability cycle.
    whyBelieve: Active exploitation, clear remediation steps, and existing adjacent gateway budgets create a plausible opening for a narrow incident-ops control plane.
    whyDoubt: The beachhead may be smaller than modeled and adjacent vendors or LiteLLM upstream can likely add partial remediation features quickly.
    nextDiligence: Verify 3-5 paid pilots with measurable remediation-time reduction and at least one heterogeneous-gateway expansion request before a partner meeting.
  firstCustomer:
    title: Platform security lead operating production LiteLLM
    profile: A 200- to 1,000-person SaaS company running LiteLLM on Kubernetes as the shared gateway for several internal or customer-facing AI workflows with multiple provider keys per environment.
    trigger: A KEV alert, urgent vendor advisory, or red-team finding shows the gateway can expose provider credentials or allow remote code execution.
    buyer: Head of Platform Security or VP Infrastructure
    initialContract: "$15k-$30k paid pilot over 60-90 days for 1-2 gateway clusters, converting to roughly $40k-$100k annual subscription for 2-5 protected clusters plus incident-response automation."
  mustBeTrue:
    - At least 25% of qualified beachhead accounts must already run self-hosted LiteLLM or an equivalent production gateway.
    - Paid pilots must cut patch-plus-key-rotation time by at least 50% versus the customer's manual process.
    - At least half of paid pilots must convert because safe cutover and credential containment are valued beyond what existing gateway tools already provide.
    - Protected-cluster pricing around the researched spend anchor must fit within platform-security or infrastructure budgets without heavy ongoing services work.
    - Cross-gateway coverage must become a customer pull within the first year before LiteLLM upstream or incumbents erase the LiteLLM-only wedge.
  diligenceQuestions:
    - How many target companies in the beachhead actually operate self-hosted LiteLLM or adjacent gateways in production today?
    - Which buyer signs the first contract, and does the spend come from incident response, platform security, or infrastructure budget?
    - In live pilots, what remediation steps remain manual even after existing gateway, KMS, and secret-manager tooling is in place?
    - How much downtime risk do buyers associate with provider-key rotation and traffic cutover today?
    - Which incumbent loses first in a win against Portkey, Kong, Gravitee, or LiteLLM enterprise?
operatingAssumptions:
  - assumption: LiteLLM on Kubernetes is common enough in the beachhead to support the first 3-5 paid pilots.
    basis: research.yaml
    validationTest: Audit 40 target accounts and confirm at least 10 have self-hosted LiteLLM or an equivalent production gateway plus multiple provider keys.
    decisionImpact: If false, the company must expand product scope to heterogeneous gateways immediately or abandon the LiteLLM-first wedge.
  - assumption: Approval-gated canary remediation is an acceptable first step before full automation.
    basis: research.yaml
    validationTest: Run 10 buyer design reviews and require at least 7 to accept monitor or approval-gated rollout as the initial deployment mode.
    decisionImpact: If false, the MVP needs stronger manual workflow support and services-heavy delivery, raising implementation cost and slowing sales.
  - assumption: Provider-key rotation and quarantine materially increase willingness to pay versus exposure detection alone.
    basis: idea.yaml
    validationTest: In the first 6 pilot evaluations, compare close rates for detection-only workflow versus patch-plus-rotation workflow and require rotation to appear in at least 4 signed scopes.
    decisionImpact: If false, the company should narrow toward posture and evidence software rather than building a heavier control plane.
  - assumption: Founder-led outbound tied to advisories can source the first customers before a formal sales hire.
    basis: operator judgment
    validationTest: Build a 30-account target list and secure at least 3 paid pilots or signed pilot LOIs within 9 months from founder-led motion alone.
    decisionImpact: If false, the company should revisit ICP precision and channel strategy before adding GTM burn.
  - assumption: Cross-gateway expansion will be required within 12 months to preserve the wedge against LiteLLM upstream and adjacent vendors.
    basis: research.yaml
    validationTest: Track feature requests and competitive losses across the first 10 qualified opportunities and require heterogeneous coverage to appear in at least 5.
    decisionImpact: If false, the company can stay narrower longer and invest more in LiteLLM workflow depth before broadening the roadmap.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Beachhead installed-base discovery
    hypothesis: Enough target SaaS companies already run self-hosted LiteLLM or equivalent gateways in production to support a focused pre-seed company.
    successMetric: 40 target-account audits completed with at least 10 confirmed production gateway deployments and 5 follow-up pilot discussions.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Concierge remediation tabletop
    hypothesis: Buyers will pay for a product that maps exploit exposure, patch steps, and provider-key rotation in one incident workflow.
    successMetric: 3 design partners complete a manual tabletop and at least 2 agree to paid pilot scoping.
    owner: Security product founder
  - horizon: 0–90 days
    experiment: Assisted canary rollout prototype
    hypothesis: Approval-gated canary patching can cut remediation time without triggering unacceptable rollback or outage risk.
    successMetric: 2 pilot environments complete upgrade rehearsals with zero customer-visible outage and documented rollback path.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Paid LiteLLM pilot packaging
    hypothesis: Cluster-based pricing with pilot credit converts better than pure services packaging.
    successMetric: Close 3 paid pilots using the standard package and keep median time from scoping to kickoff under 30 days.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Secret-manager integration test
    hypothesis: Native integration with Vault and major cloud secret stores increases pilot-to-production conversion because it lowers key-rotation risk.
    successMetric: 3 production customers complete staged provider-key rotation through supported integrations.
    owner: Security engineer
  - horizon: 12–18 months
    experiment: Cross-gateway expansion trial
    hypothesis: Supporting one adjacent gateway or inference proxy materially expands pipeline without diluting the incident-ops positioning.
    successMetric: 25% of qualified pipeline references the new connector and at least 1 existing customer expands beyond LiteLLM.
    owner: Product lead
operations:
  - Maintain a daily advisory-to-remediation knowledge base for LiteLLM and adjacent gateway stacks, including tested upgrade and rollback playbooks.
  - Run a least-privilege integration model across Kubernetes, secret stores, and telemetry sinks so the product does not become another privileged blind spot.
  - Standardize pilot onboarding around cluster discovery, approval gates, rollback tests, and evidence export before enabling live remediation.
  - Use secret-management, observability, and incident-response partners as workflow integrations rather than replacing those systems.
team:
  - role: Security product founder
    startTiming: Month 0
    rationale: Own design-partner sales, incident-driven messaging, product scope, and pricing while the wedge is still being validated.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build cluster discovery, exploit-path checks, canary patch orchestration, and the first evidence pipeline fast enough to support pilots.
  - role: Security engineer
    startTiming: Month 2
    rationale: Own secret-store integrations, key-rotation workflows, and the trust-critical rollback and approval controls needed for production use.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Turn remediation tabletops into repeatable deployments and reduce integration friction across Kubernetes and customer secret stacks.
  - role: Product lead
    startTiming: Month 9
    rationale: Prioritize cross-gateway expansion, evidence features, and onboarding templates after the first pilots reveal repeatable workflow requirements.
milestones:
  - horizon: 0–12 months
    items:
      - Close 3-5 paid pilots in the LiteLLM-on-Kubernetes beachhead.
      - Prove at least 50% remediation-time reduction versus manual patch and key-rotation workflows in the first pilot cohort.
      - Convert at least 2 pilots to annual subscriptions with approval-gated canary rollout and staged credential rotation in production.
      - Standardize integrations for at least one major cloud secret store and Vault.
  - horizon: 12–24 months
    items:
      - Expand from LiteLLM into at least one adjacent gateway or inference-proxy stack requested by customers.
      - Launch audit-ready evidence exports and containment SLA dashboards for security-review use cases.
      - Establish partner-sourced pipeline through Kubernetes security, secret-management, and incident-response firms.
  - horizon: 24–36 months
    items:
      - Become the default remediation control plane across heterogeneous AI gateway fleets for the beachhead customer base.
      - Add multi-team policy controls, traffic-forensics exports, and higher-ACV compliance packaging.
      - Reach evidence-based readiness for a seed-to-series-a expansion into broader AI infrastructure control-plane workflows.
risks:
  - risk: The installed base of self-hosted LiteLLM in the beachhead is smaller than the modeled SAM implies.
    likelihood: Medium
    impact: High
    mitigation: Validate deployment prevalence early and prioritize the next most common adjacent gateway connector before scaling sales hiring.
  - risk: LiteLLM upstream or adjacent gateway vendors add enough remediation workflow to erase the standalone wedge.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on cross-gateway coverage, staged key rotation, rollback telemetry, and incident evidence rather than simple version detection.
  - risk: Automated patching or quarantine causes downtime and destroys buyer trust.
    likelihood: Medium
    impact: High
    mitigation: Launch with approval gates, canary rollout, instant rollback, and evidence-backed rehearsals before offering broader automation.
  - risk: Buyers treat the product as one-off incident services rather than recurring software.
    likelihood: Medium
    impact: Medium
    mitigation: Package every pilot around recurring posture inventory, SLA dashboards, and ongoing remediation readiness instead of custom response work only.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to validate the LiteLLM beachhead, ship the assisted
    remediation MVP, integrate major secret stores, win the first paid pilots,
    and prove a repeatable incident-led sales motion before broader gateway
    expansion.
