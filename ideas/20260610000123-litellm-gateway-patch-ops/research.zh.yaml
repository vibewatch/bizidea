    - 48
    - 64
    - 37
  - friction: 看不清哪些集群、密钥、团队和路由真正处在管理范围内
    severity: 高
    affectedBuyer: AI 平台工程师
    mitigation: 先围绕 LiteLLM 实体、Prometheus 指标和集群密钥仓库做资产盘点与暴露映射，再谈强制修复。
    sourceRefs:
    - 20
    - 24
    - 94
  - friction: KMS 或 Vault、Kubernetes、网关日志和 SIEM 之间工具太散
    severity: 中
    affectedBuyer: SRE / 平台运维
    mitigation: 把自己定位成编排层，接在现有密钥仓库和遥测出口之上，而不是要求客户整个平台重做。
    sourceRefs:
    - 17
    - 100
    - 103
    - 23
  - friction: 现有网关厂商已经覆盖了“够用”的治理能力
    severity: 中
    affectedBuyer: 平台安全负责人
    mitigation: 用利用路径检测、分阶段补丁执行和上游密钥隔离证明价值，这些事情今天的通用网关还没有自动做。
    sourceRefs:
    - 56
    - 41
    - 68
market:
  tam:
    value: $0.6B
    rationale: 自下而上的估算：7.1M 云原生开发者，按每家目标软件组织约 250 名开发者折算，再乘上 76% 的 AI 工具使用/计划使用比例，以及 66% 的 Kubernetes AI 推理采用比例，得到约 14.2k 家目标组织；再假设每家有 2.5 个受保护网关集群、每个集群年花费约 $18k，得到大约 $0.64B。交叉校验看，这个数字仍明显低于 2026 年更宽泛的 API 管理市场。
    isEstimate: true
    sourceRefs:
    - 113
    - 111
    - 112
    - 115
    - 42
    - 16
  sam:
    value: $160.0M
    rationale: 把滩头约束加进去——Series B 到上市的 B2B 软件公司、自托管网关偏好，以及直销可触达地区——大致相当于取 TAM 的 25%；再按每家 2.2 个集群、每个受保护集群约 $18k 的花费锚点，得到 SAM。
    isEstimate: true
    sourceRefs:
    - 112
    - 42
    - 16
  som:
    value: $11.9M
    rationale: 第 3 年可触达份额假设通过事件驱动销售和伙伴渠道拿下约 300 家滩头组织，每家保护约 2.2 个网关集群，每个集群年花费约 $18k；对应滩头 SAM 的约 7.4%，只要利用驱动的紧迫感持续，虽激进但仍有可能。
    isEstimate: true
    sourceRefs:
    - 1
    - 42
    - 56
    - 112
bottomUpSizingDrivers:
- driver: 云原生开发者基数
  value: 全球约 710 万名开发者
  source: '[113]'
- driver: AI 采用与 AI-on-Kubernetes 过滤
  value: 76% 正在使用或计划使用 AI 工具；66% 的托管 GenAI 模型组织，会把 Kubernetes 用于部分推理工作负载
  source: '[111],[112]'
- driver: 每家目标组织的受保护网关集群数
  value: 每家约 2.2-2.5 个集群
  source: 计算
- driver: 每个受保护集群的年花费
  value: $18k 估算值
  source: '[42],[66],[76],[16] + 计算'
categoryDynamics:
  growthRate: 21.7% CAGR（用更广的 API 管理市场做交叉校验）
  growthRateSourceRefs:
  - 115
  tailwinds:
  - point: 活跃利用已把 AI 网关加固从积压工作推成近期修复任务。
    sourceRefs:
    - 1
    - 4
  - point: Kubernetes 正在成为生产级 AI 工作负载的默认运行环境，使网关运营从定制化基础设施问题，变成可重复的平台问题。
    sourceRefs:
    - 112
    - 113
  - point: 竞争对手已经证明，企业愿意把 AI 路由、日志和策略控制集中在网关这一层。
    sourceRefs:
    - 41
    - 56
    - 82
  headwinds:
  - point: 托管式替代品会吃掉一部分问题空间，减少那些会长期自托管 LiteLLM 并购买专用工具的团队数量。
    sourceRefs:
    - 82
    - 107
  - point: 宽平台型网关厂商扩到相邻安全能力的速度，可能快过一家创业公司做出通用平台宽度的速度。
    sourceRefs:
    - 56
    - 68
  - point: 一旦补丁自动化引发停机，就会被买家直接否掉，尤其是在 prompt 日志敏感、生产路由共享的环境里。
    sourceRefs:
    - 48
    - 84
competitors:
- name: Portkey
  stage: 成长期
  wedge: AI-native 网关，外加可观测性、模型目录、预算、防护规则和企业级 VPC 部署。
  pricing: 生产环境从 $49/month 起；企业版定制报价。
  strength: AI-native 功能面很深，企业版在治理、可观测性和发布工作流上的打包也够成熟。
  weaknessVsUs: 它在优化和治理流量，但并没有把自己定位成利用路径检测、强制补丁编排，或失陷后的自动凭证隔离平台。
  sourceRefs:
  - 41
  - 42
  - 44
  - 48
  - 55
- name: Kong AI Gateway
  stage: 在位企业
  wedge: 在成熟 API 网关之上叠加 AI 插件，提供代理、prompt guard、语义缓存、按 token 感知的限流，以及企业级部署选项。
  pricing: 高级 AI 能力绑定在企业版或插件档位；Konnect 和企业版按量计费或定制报价。
  strength: 安装基数大、插件生态强，而且在大型平台团队里有足够的运维可信度。
  weaknessVsUs: 它的定位更偏大而全 API 治理，因此不太可能真正接住自托管 AI 网关的事件补丁与凭证隔离工作流。
  sourceRefs:
  - 56
  - 59
  - 60
  - 62
  - 66
- name: Gravitee
  stage: 在位企业
  wedge: 在企业 API 基础设施上叠加 AI prompt guard、token 跟踪、OAuth 或 MCP 安全，以及网关策略控制的 API 管理平台。
  pricing: Gold、Platinum 和 Diamond 等企业套餐定价。
  strength: 对于已经在统一更广 API 治理的组织，它在策略与访问管理上的叙事很强。
  weaknessVsUs: 买家需要把一个通用 API 平台改造成 AI 网关事件工作流；它的中心并不是快速、具版本意识的修复和上游密钥隔离。
  sourceRefs:
  - 71
  - 72
  - 74
  - 76
- name: Envoy AI Gateway
  stage: 开源项目
  wedge: 面向 CNCF、Kubernetes 原生的 AI 网关，采用双层架构，并提供可扩展的流量与安全原语。
  pricing: 开源、自管。
  strength: 很适合想要开放、Kubernetes 原生积木、并已在运行 Envoy 式控制平面的基础设施团队。
  weaknessVsUs: 开源基础设施仍把补丁工作流、密钥轮换和证据采集留给客户自己或周边工具。
  sourceRefs:
  - 79
  - 78
  - 81
regulatoryTechnicalConstraints:
- point: 密钥轮换必须分阶段完成，避免服务中断；云厂商都明确推荐双密钥或托管轮换工作流，因此任何隔离产品都该接入，而不是一刀切直接撤销。
  sourceRefs:
  - 97
  - 100
  - 98
- point: 如果访问权限没有严格收紧、密钥也不是短生命周期，Kubernetes secrets 和 RBAC 默认做法仍可能让凭证暴露过宽。
  sourceRefs:
  - 94
  - 95
  - 96
- point: prompt、响应和审计日志的处理会带来合规义务，所以修复工具必须支持脱敏、保留策略控制和可导出的证据。
  sourceRefs:
  - 23
  - 84
  - 19
validationSignals:
- point: NVD 和独立研究者都已确认，LiteLLM 漏洞是一条真实的远程代码执行路径，而且会带来凭证失窃风险。
  sourceRefs:
  - 5
  - 6
  - 4
- point: LiteLLM 自己已经把企业版访问控制、审计日志、secret-manager writeback 和多区域控制平面拿出来卖，这说明成熟用户确实需要围绕网关的运营控制。
  sourceRefs:
  - 16
  - 18
  - 19
- point: Portkey、Kong、Gravitee、Envoy 和 Cloudflare 都在持续投入 AI 网关功能，这本身就在验证“网关是类目级控制点”。
  sourceRefs:
  - 41
  - 56
  - 68
  - 81
  - 82
- point: CNCF 数据显示，Kubernetes 已经成为生产级 AI 工作负载的中心平台，这会继续放大组织对网关加固的可重复运维需求。
  sourceRefs:
  - 112
openQuestions:
- 在 100-800 人的 B2B 软件公司里，自托管 LiteLLM 的真实安装基数，相比托管式或其他网关到底有多大？
- 买家会接受在 Portkey、Kong 或 Gravitee 之外再买一层专用事件运营产品吗，还是只愿意把功能并进现有网关平台？
- 平台团队今天多久轮换一次上游模型供应商密钥？他们又把多少停机风险归因到这个流程？
- LiteLLM 上游或相邻网关厂商，能否在未来 12 个月里足够快地补上修复缺口，从而压缩独立切口？
