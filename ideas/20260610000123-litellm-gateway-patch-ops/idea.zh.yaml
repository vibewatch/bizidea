topRisks:
- name: 初始市场过窄
  description: 如果自托管 AI 网关仍主要集中在早期采用者手里，第一阶段切口可能显得过于 LiteLLM 专用。
  mitigation: 尽快扩到相邻的 AI 代理，并把平台卖成覆盖全部模型路由基础设施的控制平面。
- name: 现有厂商反应太快
  description: 一旦这个品类变得显眼，云安全或容器安全厂商可能很快补上基础 AI 网关检测能力。
  mitigation: 差异化重点放在安全补丁编排、凭证轮换和事件响应工作流，而不是单纯检测。
- name: 误报带来运维风险
  description: 如果自动隔离或升级把暴露面判断错了，生产级 AI 流量就可能被打断。
  mitigation: 在开启全自动隔离前，先把灰度发布、审批闸门和默认可回滚控制做扎实。
