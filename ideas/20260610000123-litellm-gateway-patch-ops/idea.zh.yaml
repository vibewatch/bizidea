jobsToBeDone:
- job: 当关键的 AI 网关通告落地时，帮平台安全团队尽快给暴露部署打补丁并轮换模型凭证，让他们在不中断生产 AI 流量的前提下把爆炸半径收住。
  currentAlternative: 手工升级操作手册加一次性的密钥轮换脚本。
  successMetric: 通告发出后，到完成全面修复和凭证轮换所需的时间。
- job: 当管理层追问 AI 网关还能不能继续跑在生产环境里时，帮基础设施负责人拿出姿态与策略状态的证据，让团队能带着更低的事故风险继续上线 AI 功能。
  currentAlternative: 容器扫描器加手工表格审计。
  successMetric: 已验证补丁与策略合规的网关实例占比。
