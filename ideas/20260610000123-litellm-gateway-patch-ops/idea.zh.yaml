problem: 团队正快速把自托管 AI 网关标准化，用它统一模型路由、凭证和用量控制，但补丁和加固还按边角项目在做。一旦这一层出现可被利用的漏洞链，后果不只是宕机——供应商密钥会丢、提示词会泄露、攻击还会横向打进周边基础设施。安全团队需要一套办法，既能找出暴露网关、快速推送安全修复，也能在不中断生产流量的前提下完成凭证隔离。
targetUser:
  primary: 负责生产级内部 Copilot 或面向客户 AI 功能、并运行自托管 LiteLLM 网关的平台安全团队与 AI 平台工程师。
  secondary: 负责基于 Kubernetes 的模型路由基础设施值班的 SRE 负责人。
  buyer: B2B 软件公司的平台安全负责人或基础设施副总裁。
startupThesis:
  nonObviousInsight: AI 网关已经悄悄从开发中间件变成了高权限控制平面。真正的变化在于：活跃利用和 KEV 列表把预算化的事件响应需求推到了眼前，而这一层基础设施至今缺少专门做补丁、暴露面和凭证隔离的工具。
  beachhead: 员工 100-800 人、从 Series B 到上市的 B2B 软件公司；它们在 Kubernetes 上运行自托管 LiteLLM，给 OpenAI、Anthropic 和 Azure 的模型流量做统一代理，服务于客服助手或内部 Copilot。
  wedge: 一个 AI 网关补丁与隔离产品：盘点已部署的 AI 网关，识别暴露的测试端点和 host-header 配置错误，安全分批升级，并在怀疑失陷后自动轮换供应商凭证。
  whyNowCatalyst: LiteLLM 与 Starlette 组成的利用链，把 AI 网关加固从积压工作推成了近期安全采购：攻击已经在发生，爆炸半径是凭证失窃，而修复路径也很明确。
  ventureScalePath: 先从 LiteLLM 事件响应切进去，再扩成更广的 AI 网关与推理代理控制平面：版本策略、密钥隔离、出口治理、流量取证，以及覆盖企业全部模型路由面的合规证据。
solution: 产品以控制平面的形态部署，持续盘点各个集群和环境里的 AI 网关实例、版本、暴露端点，以及上游模型凭证。它会标出容易被利用的配置，针对已知的 LiteLLM 与 Starlette 利用链跑预置修复预案，并通过灰度升级把补丁分批推下去，让平台团队修补时不至于打断路由行为。一旦怀疑已经失陷，系统会自动轮换凭证、隔离端点，并把流量切到干净的网关部署。时间一长，它就会成为生产级 AI 基础设施里关于网关姿态、补丁状态和事件证据的系统记录。
goToMarketSeed:
  firstCustomer: 首个客户会是 200-1000 人的 SaaS 公司里的平台安全负责人：公司已经把 LiteLLM 当成多个生产级 AI 功能的中心网关来跑，而且每个环境都存着多套供应商密钥。
  buyingTrigger: KEV 告警、紧急厂商通告，或内部红队发现——只要它证明 AI 网关可能泄露供应商凭证或允许远程代码执行，采购就会被点燃。
  currentAlternative: 手工改 Kubernetes，再配合云 KMS、Vault 或环境变量里的临时密钥轮换；通常还得靠表格、Slack 和 shell 脚本串起来。
  switchingReason: 这个切口能赢手工响应，因为它把修复时间从几天压到几小时，同时保住流量连续性，并把团队往往要到事后复盘才想起的凭证隔离动作自动做掉。
  pricingHypothesis: 按受保护的网关集群数和活跃的供应商凭证集收平台年费，事件响应自动化单独卖高级档。
