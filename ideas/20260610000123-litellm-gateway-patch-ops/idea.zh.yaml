    keyPoints:
    - CISA 已把 CVE-2026-42271 加入 KEV 目录，说明这不再是理论风险，而是已经出现活跃利用。
    - 这个漏洞让攻击者能通过 LiteLLM 的 MCP 测试端点执行命令，并窃取供应商凭证或其他密钥。
    - 攻击者还可以把这个漏洞和 Starlette 的 BadHost 绕过串起来，直接拿掉认证要求。
  - id: 2
    title: 'Active Exploitation Alert: CVE-2026-42271 and CVE-2026-48710—Unauthenticated RCE in LiteLLM AI Gateway via Starlette Host Header Bypass – Rescana'
    url: https://rescana.com/post/active-exploitation-alert-cve-2026-42271-and-cve-2026-48710-unauthenticated-rce-in-litellm-ai-gateway-via-starlette-host
    publisher: Rescana
    publishedDate: 2026-06-09
    company: LiteLLM
    eventType: incident
    fetchVerified: true
    keyPoints:
    - 通告称，LiteLLM 1.74.2 到 1.83.6 的脆弱版本，一旦和 Starlette 的 CVE-2026-48710 串联，就会被打成无需认证的 RCE。
    - 报告特别点出，横向移动、凭证失窃，以及下游 AI 基础设施被攻陷，都是大概率后果。
    - 建议修复路径很明确：LiteLLM 升到 1.83.7，Starlette 升到 1.0.1 或更高。
  - id: 3
    title: LiteLLM And Starlette Bugs Combine For Critical RCE Risk - Open Source For You
    url: https://opensourceforu.com/2026/06/litellm-and-starlette-bugs-combine-for-critical-rce-risk
    publisher: Open Source For You
    publishedDate: 2026-06-09
    company: LiteLLM
    eventType: incident
    fetchVerified: true
    keyPoints:
    - Horizon3.ai 证明，LiteLLM 的命令注入可以和 Starlette 的 host-header 绕过串起来，形成零凭证 RCE。
    - BerriAI 已通过把受影响端点限制给 PROXY_ADMIN 用户来修补这个问题。
    - 报道也再次强调，AI 网关把 API keys 和流量路由集中到一起，会显著放大事故爆炸半径。
