scenarios:
  downside:
    description: LiteLLM 安装基数验证更慢，买家要求更重服务的发布支持，而在位企业重叠拖慢了转化。
    y3RevenueK: 1512.0
    y3EbitdaK: -1215.6
    cashLowPointK: -473.6
    keyAssumptionChanges:
    - 混合 ACV 从 $66K 降到 $54K。
    - 毛利率从 70% 降到 65%。
    - 销售周期从约 5 个月拉长到 7 个月。
    - Q4Y3 客户数从 60 降到 40。
  base:
    description: 基准情景把事件驱动的 LiteLLM 切口转成 Q4Y2 的 23 个客户、Q4Y3 的 60 个客户，同时守住 BP 里 70% 的目标毛利率。
    y3RevenueK: 2631.75
    y3EbitdaK: -441.79
    cashLowPointK: 581.06
    keyAssumptionChanges:
    - 混合生产 ACV 维持在 $66K。
    - 毛利率维持在 BP 的 70% 目标。
    - 销售周期稳定在约 5 个月，由创始人主导、围绕通告触发的 GTM 来支撑。
    - Q4Y3 客户数达到 60，仍明显低于 research 里约 300 家客户的 SOM。
  upside:
    description: 试点转化更快地滚起来，客户更早购买自动化档，而跨网关需求同时拉动客户增长和定价。
    y3RevenueK: 3798.0
    y3EbitdaK: 384.6
    cashLowPointK: 1466.1
    keyAssumptionChanges:
    - 混合 ACV 从 $66K 提升到 $72K。
    - 毛利率从 70% 提升到 73%。
    - 销售周期从约 5 个月压缩到 4 个月。
    - Q4Y3 客户数达到 75。
sensitivity:
- variable: ARPU
  downsideCase: 买家从更小范围起步，并推迟购买自动化高级档，ACV 降到 $54K
  baseCase: $66K 混合 ACV
  upsideCase: 高级档采用更快，ACV 提升到 $72K
  y3RevenueImpactK: -478.5
  cashImpactK: -335.0
- variable: CAC
  downsideCase: 如果创始人主导外呼占比一直过高、伙伴杠杆又没起来，CAC 会升到 $55K
  baseCase: $42K 全负担 CAC
  upsideCase: 伙伴来源 pipeline 更强，CAC 降到 $35K
  y3RevenueImpactK: 0.0
  cashImpactK: -250.0
- variable: 流失率
  downsideCase: 如果在位企业对轻度使用客户来说已经“够用”，月度流失率会上升到 2.5%
  baseCase: 1.8% 月度流失率
  upsideCase: 如果修复数据和证据导出变得有黏性，月度流失率降到 1.2%
  y3RevenueImpactK: -260.0
  cashImpactK: -180.0
- variable: 销售周期
  downsideCase: 如果安全评审和部署演练拖慢节奏，销售周期会拉长到 7 个月
  baseCase: 约 5 个月
  upsideCase: 试点打包可复制后，销售周期压到 4 个月
  y3RevenueImpactK: -720.0
  cashImpactK: -540.0
- variable: 毛利率
  downsideCase: 如果部署长期偏服务化、云开销也居高不下，毛利率会降到 65%
  baseCase: 70% 目标毛利率
  upsideCase: 随着集成更加标准化，毛利率提升到 73%
  y3RevenueImpactK: 0.0
  cashImpactK: -174.0
- variable: 招聘节奏
  downsideCase: 把一个工程岗和一个 GTM 岗都提前两个季度招聘
  baseCase: 按 BP 的顺序，在证明节点出现后再招聘
  upsideCase: 把一个非核心岗位延后到看到伙伴渠道拉动后再招
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
modelDiagram:
  title: 单位经济流程
  mermaid: "flowchart LR\n  Advisories[Advisories and red-team triggers] --> Pilots[Paid incident-response pilots]\n  Pilots --> Customers[Annual subscription customers]\n  Customers --> Revenue[Cluster + automation revenue]\n  Revenue --> GrossProfit[Gross profit at 70%]\n  GrossProfit --> Cash[Cash after payroll and opex]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下的收入引擎，是客户数从 Y1 末的 5 个长到 Q4Y3 的 60 个，配合 $66K 的混合 ACV，把受保护集群和自动化打包卖出去。
- checkName: 必须跑通的条件
  finding: 这个模型要求事件驱动销售把销售周期压在约 5 个月，这样第一批试点才能在公司扩大 GTM 团队前完成转化。
- checkName: 模型失效点
  finding: 下行情景已经说明，如果 LiteLLM 需求比预期更薄、部署又重到把毛利率压向 65%，现金就会转负。
- checkName: 下一轮融资门槛
  finding: 只有当公司拿到 12-15 个生产客户、交付一个相邻网关连接器，并能拿出“修复时间至少下降 50%”的可引用证据时，下一轮融资才站得住。
sanityChecks:
  ruleOf40: Y3 增长 212.7% + EBITDA 利润率 -16.8% = 195.9%。
  burnMultiple: Y2 的 burn multiple 约为 0.8x，对应约 $1.19M 的净新增 ARR；Y3 改善到约 0.2x，对应约 $2.44M 的净新增 ARR。
  revenuePerFte: 按年化收入和 11 名年末 FTE 计算，Y3 的 revenue per FTE 为 $239K（SaaS 基准约 $200-400K）。
  flags:
  - 即便 research 已把安装基数验证列为最大开放问题，模型仍假设自托管 LiteLLM 的密度足以在 Q4Y3 支撑 60 个客户。
  - 基准情景下期末现金只剩约 $0.6M，所以管理层应在 Y3 就启动下一轮融资，而不是等到接近盈亏平衡。
  - 如果现有网关厂商在跨网关扩张落地前就把“够用”的修复工作流做出来，ACV 和转化率假设大概率会向下行情景漂移。
