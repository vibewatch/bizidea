slug: gateway-patch-quarantine-plane
date: '2026-06-10'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: 从 2026-06-10 的 business-plan 日期之后的第一个完整月份开始建模。
- id: A2
  name: pre-seed 到账后的起始现金
  value: $3.0M
  unit: usdM
  source: '[BP fundingAsk] BP 的融资需求是 $2-4M 的 pre-seed、对应 18 个月跑道；基准模型取中位数 $3.0M，用来支撑 MVP、早期 GTM 和 6 个月缓冲。'
- id: A3
  name: 起始付费客户数（M1）
  value: '0'
  unit: customers
  source: '[BP executiveSummary; BP milestones] 公司从零收入起步，先验证共创客户，再进入年度订阅。'
- id: A4
  name: 混合生产 ACV
  value: 每个客户每年约 $66.0K ARR
  unit: usdK_per_customer_year
  source: '[BP gtm.pricing; BP businessModel.revenueStreams; research.market.bottomUpSizingDrivers] BP 的定价锚点约为每个受保护集群 $18K，再叠加自动化和证据导出，因此基准情景按每个生产客户约 3 个受保护集群加一个温和高级档来估算。'
- id: A5
  name: 净客户爬坡
  value: M1-M12 期末客户数：0、0、0、1、1、2、2、3、3、3、4、5；Q1Y2-Q4Y3 期末客户数：8、12、17、23、30、39、49、60
  unit: customers
  source: '[BP milestones; BP investorMemo.mustBeTrue; research.market.som] 这条爬坡曲线会在 Y1 交付 3-5 个付费试点、至少 2 个正式转化；到 Q4Y3 达到 60 个客户，仍明显低于 research 里约 300 家可触达客户的 SOM。'
- id: A6
  name: 目标毛利率
  value: 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 模型把 COGS 固定为收入的 30%，对齐 BP 的目标毛利率。'
- id: A7
  name: 月度客户流失率
  value: 1.8%
  unit: percent
  source: 早期但有黏性的安全基础设施产品，可参考的创业财务启发式；切换摩擦不低，但 BP risks 和 research.sensitivityCases 也提示了在位企业重叠和切口风险。
- id: A8
  name: 全负担 CAC
  value: 每个生产客户约 $42.0K
  unit: usdK_per_customer
  source: '[BP gtm.funnelTargets; BP strategicChoices.wedgeRationale] 事件驱动的创始人销售比通用企业外呼更容易加速成交，但每个客户仍要经过安全评审、试点证明和集成工作，所以 CAC 仍会高于早期 ACV。'
- id: A9
  name: 全负担薪酬带宽
  value: 创始人 $160K；工程 $170K；解决方案工程 $145K；产品 $155K；GTM $150K；行政/财务 $100K
  unit: usdK_per_fte_year
  source: 美国 pre-seed 安全基础设施团队的创业薪酬启发式，锚定 [BP team] 以及 BP 里“先做产品深度、再扩 GTM”的排兵顺序。
- id: A10
  name: 人员快照爬坡
  value: 按 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3 计：创始人 1/1/1/1/1/1；工程 1/2/2/2/3/4；解决方案工程 0/0/1/1/1/2；产品 0/0/0/1/1/1；GTM 0/0/0/0/1/2；行政/财务 0/0/0/0/1/1
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale] 模型按 BP 的顺序走：先创始人和核心工程，再补部署支持，然后是产品，等试点转化后再加 GTM 和轻量运营。'
- id: A11
  name: Y1 非薪酬运营预算
  value: 销售与市场每月 $8-14K；研发基础设施每月 $18-24K；行政/财务每月 $10-14K
  unit: usdK_per_month
  source: 安全控制平面创业公司的财务启发式：在规模化前，也要为云测试环境、事件响应差旅、共创客户接入、法务审查和核心软件工具留预算。
- id: A12
  name: Y2-Y3 非薪酬运营预算
  value: 各季度非薪酬 opex：Q1Y2 $110K、Q2Y2 $125K、Q3Y2 $140K、Q4Y2 $157K、Q1Y3 $175K、Q2Y3 $189K、Q3Y3 $203K、Q4Y3 $217K
  unit: usdK_per_quarter
  source: '[BP experimentRoadmap; BP operations] 随着公司补上密钥仓库集成、证据导出、伙伴差旅和客户环境，支出会逐季抬升，但仍要保持 pre-seed 控制平面业务应有的克制。'
- id: A13
  name: 薪酬平滑规则
  value: 季度薪酬费用会在各个 headcount 快照之间平滑爬升，而不是只在年末跳变。
  unit: method
  source: '[financial-modeler instructions] 薪酬费用按最近一次 headcount 快照外推，并把季度中途招聘做平滑处理，让 P&L 里的 payroll 与团队计划保持一致。'
- id: A14
  name: 基准销售周期
  value: 从试点启动到年订阅约 5 个月
  unit: months
  source: '[BP gtm.funnelTargets; BP investorMemo.firstCustomer.initialContract] BP 说从试点启动到年合同应控制在 120 天内，所以模型按端到端约 5 个月来算，其中包含资格判断和安全评审。'
- id: A15
  name: 收入确认口径
  value: 确认收入 = 每月或每季度平均活跃客户数 × 混合 ARPU；客户爬坡已净额扣除 churn。
  unit: method
  source: SaaS 按期确认收入的创业财务启发式；每个月或季度的确认收入，等于平均活跃客户数乘混合 ARPU，客户爬坡已净额扣除 churn。
- id: A16
  name: 下行情景变量
  value: $54K ACV、65% 毛利率、7 个月销售周期，Q4Y3 达到 40 个客户
  unit: scenario_inputs
  source: '[BP risks; research.sensitivityCases] 下行情景反映的是 LiteLLM 安装基数验证更慢、在位企业重叠更强，以及发布期间服务工作更重。'
- id: A17
  name: 上行情景变量
  value: $72K ACV、73% 毛利率、4 个月销售周期，Q4Y3 达到 75 个客户
  unit: scenario_inputs
  source: '[BP product.twentyFourMonth; BP milestones] 上行情景假设试点转化更强、跨网关需求更早出现，而且高级自动化档位卖得更快。'
- id: A18
  name: 现金转换简化假设
  value: 期末现金按 EBITDA 滚动，不单列债务、税或 capex。
  unit: method
  source: 轻资产软件公司的创业财务启发式：不单列债务、税或 capex，期末现金直接由 EBITDA 滚动得到。
