slug: gateway-patch-quarantine-plane
date: '2026-06-10'
executiveSummary: 这家公司起步时该做的是自托管 AI 网关的事件运营控制平面，而不是再造一个通用 AI 网关或 CNAPP 产品。首个客户应该是员工 100-800 人、从 Series B 到上市的 B2B 软件公司：它在生产环境里跑基于 Kubernetes 的 LiteLLM，手里有多套上游模型供应商密钥，而且平台安全负责人现在还靠手工打补丁、手工轮换凭证。采购触发点会是 KEV 告警、厂商通告，或内部红队发现——它把网关加固变成高管能看到的整改期限。研究支持这是个聚焦但不算巨大的市场：若公司能在保持事件工作流聚焦的同时扩出 LiteLLM，TAM 约 $0.6B，滩头 SAM 为 $160.0M，第 3 年 SOM 为 $11.9M。MVP 要尽快证明三件事：它能盘点暴露的网关、能安全切换补丁、也能在不打断生产 AI 流量的前提下轮换已经泄露的供应商凭证。这里的刻意取舍是，只吃网关集群的利用路径检测和修复执行，不和 Portkey、Kong、Gravitee 或 LiteLLM 去拼大而全的路由与治理功能。最大的反证风险有两个：一是滩头市场里真正跑自托管 LiteLLM 的安装基数比模型假设更小；二是在这家创业公司把跨网关能力做深之前，现有网关厂商已经把“够用”的修复能力补上。研究把安装基数明确列成缺口，所以只有当第一批共创客户的审计能证实目标部署足够多、而且存在付费事件响应需求时，这家公司才值得按聚焦型 pre-seed 来投。
problem:
- 自托管 AI 网关把模型凭证、路由和日志集中到一层，所以一台网关被打穿，暴露的不只是一个应用，而是供应商密钥和相邻的 AI 系统。
- 现在的响应还是手工改 Kubernetes，再在 KMS、Vault 和环境变量之间临时轮换密钥；又慢、又容易出错，事故里还很容易把流量切挂。
solution:
- 持续盘点 Kubernetes 环境里的 LiteLLM 及相邻网关部署、版本、暴露端点、RBAC 姿态和上游供应商凭证。
- 用可回滚和证据留存的方式编排灰度补丁发布、端点隔离以及分阶段的供应商密钥轮换，让安全团队在不断掉 AI 流量的前提下把网关事故收住。
whyWeWin:
- 这个切口比通用网关治理更窄，却正好卡在买家遇到被利用通告后必须执行的事件工作流上。
- 现有网关、API 管理厂商和密钥管理工具分别覆盖路由、策略或存储，但看起来还没有谁真正接住自托管网关集群上的版本感知修复和上游密钥隔离。
- 修复动作一旦反复跑起来，就能沉淀成专有的暴露图谱和切换数据集，让后续升级比手工脚本或浅层扫描告警更快、更稳。
strategicChoices:
  beachhead: 员工 100-800 人、从 Series B 到上市的 B2B 软件公司；它们在 Kubernetes 上运行自托管 LiteLLM，把它作为内部 Copilot 或面向客户 AI 功能的共享网关。
  wedgeRationale: 和做宽泛的 AI 治理软件相比，LiteLLM 事件响应更容易尽快跑出证明，因为触发点足够尖锐、修复路径足够具体，买家也能在一次试点里直接量出打补丁时间、轮换密钥时间和流量连续性。
  sequencingRationale: 第一阶段先做资产盘点、利用路径检测、带审批闸门的灰度补丁，以及分阶段凭证轮换；因为在系统先证明资产映射准确、切换低停机之前，买家不会信任自动隔离。等公司把事件驱动的试点转成正式客户后，再补异构网关覆盖、合规证据和伙伴分销，最后才去做更宽的治理或策略模块。
  notYet:
  - 现在不要去做完整 AI 网关，和别人拼路由、可观测性或防护规则
  - 现在不要服务只用托管式网关、却不掌控自托管集群的客户
  - 在网关修复还没形成可重复打法前，不要过早扩到宽泛的 CNAPP、SIEM 或通用 API 安全姿态
  - 首个版本不要做无人审批的全自动隔离
market:
  tam: 估算 TAM 为 $0.6B：约 14.2k 家目标画像组织，每家大约 2.5 个受保护网关集群，每个受保护集群年花费约 $18k。
  sam: 估算 SAM 为 $160.0M：基于滩头客群、直销可触达地区，以及每家目标组织大约 2.2 个受保护集群。
  som: 建模得到第 3 年 SOM 为 $11.9M：约 300 家滩头客户，每家大约 2.2 个受保护集群，每个集群年花费约 $18k。
  segments:
  - 核心客群：在 Kubernetes 上自托管 LiteLLM、且已有多个生产级 AI 应用的 B2B 软件公司
  - 次级客群：在 LiteLLM 切口跑通后，运行异构 AI 网关或推理代理的受监管企业
  buyingProcess: 业务上的推动者通常是平台安全负责人或 AI 平台工程师，真正掏钱的通常是平台安全负责人或基础设施副总裁。成交应从一次付费的事件准备度或在线修复试点开始：当通告、红队发现或采购审查暴露出网关补丁和密钥轮换仍靠手工时，预算就会打开。
product:
  mvp: MVP 应覆盖 Kubernetes 与 LiteLLM 发现、版本和端点暴露映射、管理员面检查、带审批闸门的灰度升级，以及带回滚能力的分阶段上游密钥轮换。首发先跑监控和辅助修复模式，并导出证据，说明改了什么、轮换了哪些密钥、流量是否保持健康。
  sixMonth: 在 6 个月内，为跑在 Kubernetes 上的 LiteLLM 交付付费试点：提供集群盘点、针对已知 LiteLLM 与 Starlette 利用链的检查、灰度补丁编排，以及两周内可部署的、带证据留存的凭证轮换操作手册。
  twelveMonth: 在 12 个月内，补上试点里最常见的相邻代理栈的跨网关覆盖，提供管理员面加固策略模板、Vault 和主流云密钥仓库的伙伴集成，以及按集群展示补丁与隔离 SLA 的生产看板。
  twentyFourMonth: 在 24 个月内，扩到异构 AI 网关集群、更强的合规证据、流量取证导出，以及多团队策略控制——前提是公司已经证明事件驱动的试点能在现有客户里转化并扩张。
  keyBets:
  - LiteLLM 加 Kubernetes 足以覆盖早期的紧急需求，在必须做宽网关支持之前拿下前 3-5 个付费试点。
  - 买家会先信任带审批闸门的灰度修复，再信任完全自动化；而这一步信任爬坡已经足以拿到预算。
  - 供应商密钥轮换和流量切换，才是把产品从扫描器抬升为“值得列预算”的控制平面的关键功能。
  - 在 LiteLLM 上游或相邻厂商补上修复缺口之前，跨网关扩张就会先变成硬需求。
gtm:
  wedge: 先卖一个面向单一客户环境的付费网关事件准备度或修复试点；等客户开始依赖平台在生产集群里编排补丁、隔离凭证和沉淀证据后，再转成年度订阅。
  channels:
  - 在网关通告、KEV 收录或红队发现出现后，创始人立刻面向平台安全和基础设施负责人做外呼
  - 和已经在 Kubernetes 上跑 LiteLLM 的 AI 平台团队共创试点
  - 已经在支持 AI 基础设施加固的 Kubernetes 安全、密钥管理和事件响应合作伙伴
  funnelTargets: 线索→合格试点 20-30%，合格试点→付费试点 50%+，付费试点→生产部署 50%+，试点启动→年合同小于 120 天。
  pricing: 按受保护网关集群和活跃供应商凭证集收年费，设置最低平台费，事件响应自动化和证据导出卖高级档。当前工作锚点约为每个受保护集群年花费 $18k，这意味着覆盖 2-5 个集群的客户，初始生产合同大约是 $40k-$100k ARR；付费试点可冲抵后续年费。
businessModel:
  revenueStreams:
  - 受保护网关集群覆盖的年度订阅
  - 分阶段凭证轮换、隔离和证据导出的高级自动化档
  - 初始加固、迁移和桌面演练的专业服务
  unitOfValue: 受保护的网关集群（附带覆盖的供应商凭证集）
  targetGrossMarginPct: 70
  expansionLevers:
  - 从一个集群或环境扩到同一客户的全部生产和预发布网关集群
  - 在 LiteLLM 跑通后补上异构网关和推理代理覆盖
  - 向高监管客户加售合规证据、取证导出和伙伴集成的事件演练
strategyMap:
  northStarMetric: 关键通告发出后 24 小时内完成修复、且没有客户可感知 AI 流量中断的网关集群占比。
  inputMetrics:
  - 每个活跃客户已发现的网关集群数，以及暴露的管理员面或测试面数量
  - 从检测到通告到完成补丁发布的中位时间
  - 疑似失陷事件中完成供应商密钥轮换的占比
  - 灰度补丁执行的回滚率
  - 付费试点转年度生产合同的转化率
  moatsToBuild:
  - 把网关版本、路由、角色、集群和上游供应商密钥连起来的暴露图谱
  - 展示安全切换模式、回滚率和凭证轮换操作手册的修复遥测，覆盖真实客户集群
  - 把每次通告、补丁、隔离动作和密钥轮换都映射到审计就绪记录的事件证据语料库
  killCriteria:
  - 前 40 个目标账户里，确认存在自托管 LiteLLM 或同类生产网关部署的少于 10 个
  - 做完 30 次合格的滩头对话后，付费试点仍少于 3 个
  - 前 5 个试点里，修复时间相对客户原有手工流程的中位改善低于 50%
  - 前 6 个付费试点后，试点→生产的转化率仍低于 50%
  mermaid: "flowchart LR\n  Wedge[LiteLLM incident-response wedge] --> MVP[Inventory patch and rotate MVP]\n  MVP --> Proof[Faster remediation with safe cutovers]\n  Proof --> Expansion[Cross-gateway control plane]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 事件触发强、工作流也清楚，但在团队证明自托管网关密度足够高、且付费需求不止于一次性漏洞周期之前，判断仍应保持克制。
    whyBelieve: 活跃利用、清晰的修复步骤，以及现成的相邻网关预算，共同撑起了一个聚焦型事件运营控制平面的可行窗口。
    whyDoubt: 滩头市场可能比模型假设更小，而相邻厂商或 LiteLLM 上游也很可能迅速补上部分修复能力。
    nextDiligence: 在进入合伙人会议前，先验证 3-5 个付费试点、看到可量化的修复时间下降，并拿到至少一个跨异构网关扩张请求。
  firstCustomer:
    title: 负责生产级 LiteLLM 的平台安全负责人
    profile: 一家 200-1000 人的 SaaS 公司，在 Kubernetes 上运行 LiteLLM，作为多个内部或面向客户 AI 工作流的共享网关，而且每个环境里都有多套供应商密钥。
    trigger: KEV 告警、紧急厂商通告或红队发现，证明网关会泄露供应商凭证或允许远程代码执行。
    buyer: 平台安全负责人或基础设施副总裁
    initialContract: 先做一个 $15k-$30k、周期 60-90 天、覆盖 1-2 个网关集群的付费试点；随后转成约 $40k-$100k 的年度订阅，覆盖 2-5 个受保护集群，并叠加事件响应自动化。
  mustBeTrue:
  - 至少 25% 的合格滩头账户已经在跑自托管 LiteLLM 或等价的生产网关。
  - 付费试点必须把“补丁 + 密钥轮换”的时间，相比客户手工流程至少砍掉 50%。
  - 至少一半的付费试点必须转化，因为安全切换和凭证隔离带来的价值，超出了现有网关工具已经提供的东西。
  - 围绕受保护集群的定价，按研究得出的花费锚点看，必须能塞进平台安全或基础设施预算，而不需要长期大量服务。
  - 在第 1 年内，跨网关覆盖必须变成客户主动需求；否则 LiteLLM 上游或现有厂商会抹平 LiteLLM-only 的切口。
  diligenceQuestions:
  - 滩头市场里，今天到底有多少目标公司在生产环境运行自托管 LiteLLM 或相邻网关？
  - 第一份合同究竟由谁签，预算是从事件响应、平台安全还是基础设施池子里出？
  - 在真实试点里，即便客户已经有现成的网关、KMS 和密钥管理工具，哪些修复步骤仍然要靠手工？
  - 买家今天到底把多少停机风险归因到供应商密钥轮换和流量切换？
  - 如果在与 Portkey、Kong、Gravitee 或 LiteLLM enterprise 的竞争里赢下来，先被替代的是哪一家？
operatingAssumptions:
- assumption: LiteLLM 在 Kubernetes 上的部署，在滩头市场里足够常见，能撑起前 3-5 个付费试点。
  basis: research.yaml
  validationTest: 审计 40 个目标账户，确认至少 10 个已经部署自托管 LiteLLM 或等价的生产网关，并持有多套供应商密钥。
  decisionImpact: 如果不成立，公司就得立刻把产品范围扩到异构网关，或者放弃 LiteLLM-first 的切口。
- assumption: 带审批闸门的灰度修复，可以作为全自动化之前的可接受第一步。
  basis: research.yaml
  validationTest: 做 10 场买家设计评审，至少 7 场接受“监控模式或带审批发布”作为初始部署方式。
  decisionImpact: 如果不成立，MVP 就得加强人工工作流支持并走更重服务的交付方式，实施成本会上去，销售也会变慢。
- assumption: 和单纯的暴露检测相比，供应商密钥轮换与隔离会显著抬升付费意愿。
  basis: idea.yaml
  validationTest: 在前 6 次试点评估里，对比“仅检测工作流”和“补丁 + 轮换工作流”的成交率，并要求至少 4 份已签范围把轮换写进去。
  decisionImpact: 如果不成立，公司应收窄到姿态与证据软件，而不是继续做更重的控制平面。
- assumption: 围绕通告的创始人主导外呼，能在正式销售招聘前拿下第一批客户。
  basis: 经营判断
  validationTest: 列出 30 个目标账户，靠创始人主导动作在 9 个月内拿到至少 3 个付费试点或已签的试点 LOI。
  decisionImpact: 如果不成立，公司就该先重看 ICP 精度和渠道策略，再决定是否增加 GTM burn。
- assumption: 为了守住切口，对 LiteLLM 上游和相邻厂商的竞争，12 个月内就需要跨网关扩张。
  basis: research.yaml
  validationTest: 跟踪前 10 个合格机会里的功能需求和竞品败因，要求至少 5 个机会明确提出异构覆盖。
  decisionImpact: 如果不成立，公司就能更久地保持聚焦，把更多资源先砸到 LiteLLM 工作流深度上。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 滩头安装基数摸底
  hypothesis: 足够多的目标 SaaS 公司已经在生产环境运行自托管 LiteLLM 或等价网关，足以支撑一家聚焦型 pre-seed 公司。
  successMetric: 完成 40 个目标账户审计，确认至少 10 个生产网关部署，并推进 5 场后续试点讨论。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 礼宾式修复桌面演练
  hypothesis: 买家愿意为一款把利用暴露、补丁步骤和供应商密钥轮换放进同一事件工作流的产品买单。
  successMetric: 3 个共创客户完成手工桌面演练，且至少 2 个同意进入付费试点定义。
  owner: 安全产品创始人
- horizon: 0–90 天
  experiment: 辅助式灰度发布原型
  hypothesis: 带审批闸门的灰度补丁能缩短修复时间，同时不会带来不可接受的回滚或停机风险。
  successMetric: 2 个试点环境完成升级演练，零客户可感知停机，并且都有书面回滚路径。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 付费 LiteLLM 试点打包
  hypothesis: 按集群定价、且试点费用可抵年费的方案，会比纯服务打包更容易转化。
  successMetric: 用标准方案拿下 3 个付费试点，并把从范围到启动的中位时间控制在 30 天以内。
  owner: 创始人/CEO
- horizon: 6–12 个月
  experiment: 密钥管理器集成测试
  hypothesis: 原生对接 Vault 和主流云密钥仓库能提升试点→生产转化，因为它降低了密钥轮换风险。
  successMetric: 3 个生产客户通过已支持的集成完成分阶段供应商密钥轮换。
  owner: 安全工程师
- horizon: 12–18 个月
  experiment: 跨网关扩张试点
  hypothesis: 支持一个相邻网关或推理代理，能显著扩大 pipeline，同时不稀释事件运营定位。
  successMetric: 25% 的合格 pipeline 提到新连接器，且至少 1 个现有客户从 LiteLLM 扩展出去。
  owner: 产品负责人
operations:
- 为 LiteLLM 及相邻网关技术栈维护一套每日更新的“通告到修复”知识库，里面包含已验证的升级与回滚预案。
- 在 Kubernetes、密钥仓库和遥测出口之间，坚持最小权限集成模型，别让产品自己变成新的高权限盲点。
- 在开启在线修复前，把试点接入标准化到集群发现、审批闸门、回滚测试和证据导出。
- 把密钥管理、可观测性和事件响应伙伴当作工作流集成对象，而不是替代它们。
team:
- role: 安全产品创始人
  startTiming: 第 0 个月
  rationale: 在切口还没被验证完之前，亲自抓共创客户销售、事件驱动叙事、产品范围和定价。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 尽快把集群发现、利用路径检查、灰度补丁编排和第一版证据管道做出来，支撑试点。
- role: 安全工程师
  startTiming: 第 2 个月
  rationale: 拿下密钥仓库集成、密钥轮换工作流，以及生产可用所必需的回滚和审批控制。
- role: 解决方案工程师
  startTiming: 第 6 个月
  rationale: 把修复桌面演练变成可重复部署，并降低 Kubernetes 和客户密钥栈的集成摩擦。
- role: 产品负责人
  startTiming: 第 9 个月
  rationale: 在第一批试点暴露出重复需求后，优先排跨网关扩张、证据功能和接入模板。
milestones:
- horizon: 0–12 个月
  items:
  - 在 LiteLLM-on-Kubernetes 的滩头市场拿下 3-5 个付费试点。
  - 在第一批试点中，证明修复时间相比手工补丁和密钥轮换工作流至少下降 50%。
  - 至少把 2 个试点转成年订阅，并在生产环境跑通带审批闸门的灰度发布和分阶段凭证轮换。
  - 把至少一个主流云密钥仓库和 Vault 的集成做成标准件。
- horizon: 12–24 个月
  items:
  - 从 LiteLLM 扩到至少一个由客户提出需求的相邻网关或推理代理栈。
  - 上线面向安全审查场景的审计就绪证据导出和隔离 SLA 看板。
  - 通过 Kubernetes 安全、密钥管理和事件响应伙伴，建立伙伴来源 pipeline。
- horizon: 24–36 个月
  items:
  - 在滩头客户群里，成为异构 AI 网关集群的默认修复控制平面。
  - 补上多团队策略控制、流量取证导出和更高 ACV 的合规打包。
  - 拿到从 seed 到 series-a，扩展到更广 AI 基础设施控制平面工作流所需的证据。
risks:
- risk: 滩头市场里自托管 LiteLLM 的安装基数，可能低于建模隐含的 SAM。
  likelihood: Medium
  impact: High
  mitigation: 尽早验证部署普及度，并在扩大销售招聘前优先做出下一个最常见的相邻网关连接器。
- risk: LiteLLM 上游或相邻网关厂商，可能很快补上足以抹平独立切口的修复工作流。
  likelihood: Medium
  impact: High
  mitigation: 差异化重点放在跨网关覆盖、分阶段密钥轮换、回滚遥测和事件证据，而不是简单的版本检测。
- risk: 自动补丁或隔离如果导致停机，会直接摧毁买家信任。
  likelihood: Medium
  impact: High
  mitigation: 先用审批闸门、灰度发布、即时回滚和带证据的演练，再逐步开放更广的自动化。
- risk: 买家可能把产品当成一次性事件服务，而不是持续性软件。
  likelihood: Medium
  impact: Medium
  mitigation: 每个试点都围绕持续姿态盘点、SLA 看板和长期修复准备度来打包，而不是只卖定制响应。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要撑 18 个月：验证 LiteLLM 滩头市场、做出辅助修复 MVP、打通主流密钥仓库、拿下第一批付费试点，并在更宽的网关扩张前证明事件驱动销售可以重复。
