scenarios:
  downside:
    description: "LiteLLM installed-base validation takes longer, buyers demand more services-heavy rollout support, and incumbent overlap slows conversions."
    y3RevenueK: 1512.0
    y3EbitdaK: -1215.6
    cashLowPointK: -473.6
    keyAssumptionChanges:
    - "Blended ACV falls from $66K to $54K."
    - "Gross margin falls from 70% to 65%."
    - "Sales cycle stretches from about 5 months to 7 months."
    - "Q4Y3 customers reach 40 instead of 60."
  base:
    description: "The base case converts the incident-led LiteLLM wedge into 23 customers by Q4Y2 and 60 by Q4Y3 while holding to the BP's 70% gross-margin target."
    y3RevenueK: 2631.75
    y3EbitdaK: -441.79
    cashLowPointK: 581.06
    keyAssumptionChanges:
    - "Blended production ACV stays at $66K."
    - "Gross margin stays at the BP target of 70%."
    - "Sales cycle holds near 5 months with founder-led advisory-triggered GTM."
    - "Q4Y3 customer count reaches 60, still well below the research SOM of roughly 300 customers."
  upside:
    description: "Pilot conversion compounds faster, customers buy the automation tier earlier, and cross-gateway pull expands both logo growth and pricing."
    y3RevenueK: 3798.0
    y3EbitdaK: 384.6
    cashLowPointK: 1466.1
    keyAssumptionChanges:
    - "Blended ACV rises from $66K to $72K."
    - "Gross margin improves from 70% to 73%."
    - "Sales cycle compresses from about 5 months to 4 months."
    - "Q4Y3 customers reach 75."
sensitivity:
- variable: "ARPU"
  downsideCase: "$54K ACV as buyers start smaller and delay automation tier upsell"
  baseCase: "$66K blended ACV"
  upsideCase: "$72K ACV with faster premium-tier adoption"
  y3RevenueImpactK: -478.5
  cashImpactK: -335.0
- variable: "CAC"
  downsideCase: "$55K CAC if founder-led outbound stays dominant and partner leverage slips"
  baseCase: "$42K fully loaded CAC"
  upsideCase: "$35K CAC with stronger partner-sourced pipeline"
  y3RevenueImpactK: 0.0
  cashImpactK: -250.0
- variable: "churn"
  downsideCase: "2.5% monthly churn if incumbents become good enough for lighter-use customers"
  baseCase: "1.8% monthly churn"
  upsideCase: "1.2% monthly churn if remediation data and evidence exports become sticky"
  y3RevenueImpactK: -260.0
  cashImpactK: -180.0
- variable: "sales cycle"
  downsideCase: "7 months because security review and deployment rehearsal drag"
  baseCase: "About 5 months"
  upsideCase: "4 months with repeatable pilot packaging"
  y3RevenueImpactK: -720.0
  cashImpactK: -540.0
- variable: "gross margin"
  downsideCase: "65% as deployments stay services-heavy and cloud overhead stays elevated"
  baseCase: "70% target gross margin"
  upsideCase: "73% with more repeatable integrations"
  y3RevenueImpactK: 0.0
  cashImpactK: -174.0
- variable: "hiring pace"
  downsideCase: "Pull one engineering and one GTM hire forward by two quarters"
  baseCase: "Follow the BP sequencing and hire only after proof points"
  upsideCase: "Delay one non-core hire until partner channel pull is visible"
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Advisories[Advisories and red-team triggers] --> Pilots[Paid incident-response pilots]
      Pilots --> Customers[Annual subscription customers]
      Customers --> Revenue[Cluster + automation revenue]
      Revenue --> GrossProfit[Gross profit at 70%]
      GrossProfit --> Cash[Cash after payroll and opex]
modelSanity:
- checkName: "Revenue engine"
  finding: "Base-case revenue is driven by growing from 5 customers at Y1 exit to 60 by Q4Y3 at a $66K blended ACV that bundles protected clusters with automation."
- checkName: "Must go right"
  finding: "The model requires the incident-led motion to keep the sales cycle near five months so the first pilots convert before the company commits to a larger GTM buildout."
- checkName: "Model breaks if"
  finding: "The downside case shows cash turning negative if LiteLLM demand is thinner than expected and deployments become services-heavy enough to push gross margin toward 65%."
- checkName: "Next-round proof"
  finding: "The next financing is justified once the company shows 12-15 production logos, one adjacent-gateway connector, and referenceable evidence that remediation time falls by at least 50%."
sanityChecks:
  ruleOf40: "Y3 growth 212.7% + EBITDA margin -16.8% = 195.9%."
  burnMultiple: "Y2 burn multiple is about 0.8x on roughly $1.19M of net new ARR; Y3 improves to about 0.2x on roughly $2.44M of net new ARR."
  revenuePerFte: "$239K Y3 using annual revenue and 11 year-end FTE (benchmark $200-400K SaaS)."
  flags:
  - "The model still assumes enough self-hosted LiteLLM density to support 60 customers by Q4Y3 even though research leaves installed-base verification as the biggest open question."
  - "Ending cash falls to about $0.6M in the base case, so management should start the next fundraise during Y3 rather than waiting for breakeven."
  - "If existing gateway vendors ship good-enough remediation workflow before cross-gateway expansion is live, both ACV and conversion assumptions likely drift toward the downside case."
