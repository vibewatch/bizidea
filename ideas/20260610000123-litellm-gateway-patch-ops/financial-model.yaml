slug: "gateway-patch-quarantine-plane"
date: "2026-06-10"
currency: USD
modelStartMonth: "2026-07"
assumptions:
- id: A1
  name: "Model start month"
  value: "2026-07"
  unit: month
  source: "Starts the first full month after the 2026-06-10 business-plan date."
- id: A2
  name: "Starting cash after pre-seed close"
  value: "$3.0M"
  unit: usdM
  source: "[BP fundingAsk] The BP targets a $2-4M pre-seed for 18 months of runway; the base model uses $3.0M as the midpoint needed to fund the MVP, early GTM, and a six-month buffer."
- id: A3
  name: "Starting paying customers (M1)"
  value: "0"
  unit: customers
  source: "[BP executiveSummary; BP milestones] The company starts pre-revenue and must first validate design partners before annual subscriptions begin."
- id: A4
  name: "Blended production ACV"
  value: "$66.0K ARR per customer"
  unit: usdK_per_customer_year
  source: "[BP gtm.pricing; BP businessModel.revenueStreams; research.market.bottomUpSizingDrivers] The BP anchors pricing at roughly $18K per protected cluster plus premium automation and evidence export, so the base case uses about three protected clusters plus a modest premium tier per production customer."
- id: A5
  name: "Net customer ramp"
  value: "M1-M12 EOP customers: 0,0,0,1,1,2,2,3,3,3,4,5; Q1Y2-Q4Y3 EOP customers: 8,12,17,23,30,39,49,60"
  unit: customers
  source: "[BP milestones; BP investorMemo.mustBeTrue; research.market.som] The ramp delivers 3-5 paid pilots and at least 2 conversions in Y1, then scales to 60 customers by Q4Y3, still far below the research SOM of roughly 300 reachable customers."
- id: A6
  name: "Target gross margin"
  value: "70%"
  unit: percent
  source: "[BP businessModel.targetGrossMarginPct] The model holds COGS at 30% of revenue to match the BP gross-margin target."
- id: A7
  name: "Monthly logo churn"
  value: "1.8%"
  unit: percent
  source: "Startup-finance heuristic for an early but sticky security infrastructure product with meaningful switching friction, partially offset by incumbent overlap and wedge risk flagged in BP risks and research.sensitivityCases."
- id: A8
  name: "Fully loaded CAC"
  value: "$42.0K per production customer"
  unit: usdK_per_customer
  source: "[BP gtm.funnelTargets; BP strategicChoices.wedgeRationale] Incident-driven founder sales can close faster than generic enterprise outbound, but each customer still requires security review, pilot proof, and integration work, so CAC remains high relative to early ACV."
- id: A9
  name: "Loaded salary bands"
  value: "Founder $160K; engineering $170K; solutions engineering $145K; product $155K; GTM $150K; G&A $100K"
  unit: usdK_per_fte_year
  source: "Startup-finance heuristic for U.S.-based pre-seed security infrastructure hiring, anchored to [BP team] and the BP sequence that prioritizes product depth before full GTM scale."
- id: A10
  name: "Headcount snapshot ramp"
  value: "Founder 1/1/1/1/1/1; engineering 1/2/2/2/3/4; solutions engineering 0/0/1/1/1/2; product 0/0/0/1/1/1; GTM 0/0/0/0/1/2; G&A 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3"
  unit: fte
  source: "[BP team; BP strategicChoices.sequencingRationale] The model follows the BP order: founder plus core engineering first, then deployment support, then product, then GTM and lightweight operations once pilots convert."
- id: A11
  name: "Y1 non-salary operating budgets"
  value: "Sales and marketing $8-14K monthly; research and development infrastructure $18-24K monthly; G&A $10-14K monthly"
  unit: usdK_per_month
  source: "Startup-finance heuristic for a security control-plane startup that must fund cloud test environments, incident-response travel, design-partner onboarding, legal review, and core software tooling before scale."
- id: A12
  name: "Y2-Y3 non-salary operating budgets"
  value: "Non-salary opex by quarter: Q1Y2 $110K, Q2Y2 $125K, Q3Y2 $140K, Q4Y2 $157K, Q1Y3 $175K, Q2Y3 $189K, Q3Y3 $203K, Q4Y3 $217K"
  unit: usdK_per_quarter
  source: "[BP experimentRoadmap; BP operations] Spending rises as the company adds secret-store integrations, evidence exports, partner travel, and customer environments, but stays lean enough for a pre-seed control-plane business."
- id: A13
  name: "Payroll smoothing rule"
  value: "Quarterly salary expense ramps between snapshot headcount points instead of stepping only at year-end."
  unit: method
  source: "[financial-modeler instructions] Salary expense uses the most recent snapshot and smooth mid-quarter hiring so P&L payroll stays consistent with the team plan."
- id: A14
  name: "Base sales cycle"
  value: "About 5 months from pilot kickoff to annual subscription"
  unit: months
  source: "[BP gtm.funnelTargets; BP investorMemo.firstCustomer.initialContract] The BP says pilot kickoff to annual contract should stay under 120 days, so the model uses a roughly five-month end-to-end cycle including qualification and security review."
- id: A15
  name: "Revenue recognition convention"
  value: "Recognized revenue equals average active customers in each month or quarter times blended ARPU; the customer ramp is net of churn."
  unit: method
  source: "Startup-finance heuristic for ratable SaaS revenue recognition; this lets revenue reconcile to customer counts and ARPU without assuming every new logo arrives on day one."
- id: A16
  name: "Downside scenario deltas"
  value: "$54K ACV, 65% gross margin, 7-month sales cycle, and 40 customers by Q4Y3"
  unit: scenario_inputs
  source: "[BP risks; research.sensitivityCases] The downside reflects slower LiteLLM installed-base validation, more incumbent overlap, and heavier services work during rollout."
- id: A17
  name: "Upside scenario deltas"
  value: "$72K ACV, 73% gross margin, 4-month sales cycle, and 75 customers by Q4Y3"
  unit: scenario_inputs
  source: "[BP product.twentyFourMonth; BP milestones] The upside assumes strong pilot conversion, faster cross-gateway pull, and premium automation upsell."
- id: A18
  name: "Cash conversion simplification"
  value: "Ending cash rolls from EBITDA with no debt, taxes, or capex line items."
  unit: method
  source: "Startup-finance heuristic for an asset-light software company where working-capital swings are small relative to operating burn."
