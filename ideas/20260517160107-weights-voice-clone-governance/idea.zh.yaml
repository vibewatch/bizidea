topRisks:
  - name: 厂商功能蚕食风险
    description: "OpenAI 或其他声音厂商可能新增足够的原生授权管控，使第三方治理层显得可有可无。"
    mitigation: "保持厂商中立、跨多个生成平台集成，并拥有任何单一厂商无法代表所有客户资产的合同政策图谱和撤销工作流。"
  - name: 合同条款模糊
    description: "许多现有人才协议可能未明确界定合成声音权利，即便软件可用，也会延迟部署。"
    mitigation: "优先服务已在签署新本地化或克隆协议的客户，提供可配置的策略模板供法律顾问审阅，并将产品定位为执行基础设施而非法律建议。"
  - name: 工作流接受阻力
    description: "若审批拖慢重复性宣传片和广告点的制作，音频团队可能绕过管控。"
    mitigation: "首个产品围绕低摩擦的预批模板、重复活动一键续约设计，仅对高风险声音或超范围使用设置硬阻断。"
