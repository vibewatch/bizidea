jobsToBeDone:
  - job: "用授权合成声音本地化主持人口播广告时，帮助我们的音频运营团队自动执行经批准的渠道、脚本和时间窗限制，让我们能更快发布，同时不违反人才协议。"
    currentAlternative: "人工合同审核加基于电子表格的审批追踪"
    successMetric: "附带完整、审计就绪的授权和溯源包的合成音频导出占比"
  - job: "当创作者修改条款或撤销声音克隆授权时，帮助我们的权利团队找出并阻止所有与该声音相关的未来渲染，避免下架混乱和品牌损失。"
    currentAlternative: "跨厂商的电子邮件链、手工资产搜索和临时下架请求"
    successMetric: "在所有生成工作流中撤销一个声音并识别受影响输出所需的时间"
