openQuestions:
- How often do podcast and audiobook buyers actually need cross-vendor governance versus a single-vendor workflow in the first 12 months?
- 'Which metadata schema will buyers accept as the default provenance manifest for synthetic audio exports: C2PA, vendor watermarks, or a hybrid?'
- What percentage of existing talent contracts can be translated into machine-readable policy without human legal review?
- Is the first durable expansion path after podcasts more likely to be digital advertising, audiobook production, or enterprise voice agents?
