  validationPlan:
  - priority: high
    question: Will audio-ops teams accept a hard policy gate in the render path if it adds seconds of latency?
    evidenceToGather: Pilot data from one podcast network or audiobook studio measuring turnaround time before and after approval enforcement.
  - priority: high
    question: How many customers already manage more than ten licensed voice prints across more than one TTS vendor?
    evidenceToGather: Customer interviews with podcast networks, dubbing agencies, and enterprise creators using both platform and agency workflows.
  - priority: medium
    question: Which contract clauses are most reusable for machine-readable policy templates?
    evidenceToGather: Annotated voice/talent agreements from podcast, advertising, and localization use cases.
  - priority: medium
    question: Can provenance manifests map cleanly to C2PA, watermarking, or classifier outputs without extra production burden?
    evidenceToGather: Prototype integrations with one TTS vendor, one detection vendor, and one MAM/DAM destination.
