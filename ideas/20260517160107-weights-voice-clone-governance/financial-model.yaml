    upsideCase: "Delay one non-critical support hire until programs exceed 30"
    y3RevenueImpactK: -60.0
    cashImpactK: -185.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> PaidPrograms
      PaidPrograms --> ProgramAndUsageRevenue
      ProgramAndUsageRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from growing from 4 paid programs at M12 to 35 by Q4Y3, with most of the lift coming from multi-program expansion inside a small number of production logos."
  - checkName: Must go right
    finding: "Pilot-to-annual conversion has to stay tight enough for the team to add about 3 paid programs per quarter in Y2 before the larger Y3 expansion wave."
  - checkName: Model breaks if
    finding: "If the company exits Y3 closer to 26 programs and gross margin stalls near 67%, downside cash falls to about $30K before the next round case is fully proven."
  - checkName: Next-round proof
    finding: "A seed round is justified if the company exits Y2 with 16 paid programs, 2 live TTS integrations, and clear evidence that pilot logos expand into annual multi-program contracts."
sanityChecks:
  ruleOf40: "Y3 growth 146.3% + EBITDA margin -21.0% = 125.3%"
  burnMultiple: "Y2 burn multiple 0.99x on about $720K net new ARR, improving to 0.27x in Y3 on about $1.14M net new ARR."
  revenuePerFte: "$211K Y3 on 7 exit FTE (benchmark $200-400K SaaS)"
  flags:
    - "The model depends on 15-20 production logos expanding into multiple governed programs by Y3; if most logos stay single-program, revenue undershoots meaningfully."
    - "Gross margin does not fully reach the BP target until Y3 because the first two years still absorb integration and exception-handling overhead."
    - "Cash reaches its low point at Q4Y3, so fundraising should start well before breakeven rather than waiting for the balance to tighten."
    - "The market is real but modest, so the Y3 plan must earn adjacent audiobook and branded-audio expansion rather than assume broad media adoption."
