differentiator: >-
  Voice vendors will add basic safety settings, but they remain incentivized to
  maximize generation usage inside their own stack, not to become the neutral
  system of record for contract scope and downstream approvals. This product
  wins by owning the policy graph around the voice asset itself: who granted
  consent, what was allowed, when it expires, and which rendered files remain in
  bounds. That vendor-neutral audit layer compounds over time because every new
  voice, contract amendment, and export history entry increases switching costs
  and improves policy templates for adjacent audio workflows.
