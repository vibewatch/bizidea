topRisks:
  - name: Vendor feature absorption
    description: "OpenAI or other voice vendors could add enough native consent controls to make a third-party governance layer feel optional."
    mitigation: "Stay vendor-neutral, integrate across multiple generation stacks, and own the contract-policy graph plus revocation workflows that no single vendor can become for all customer assets."
  - name: Contract ambiguity
    description: "Many existing talent agreements may not clearly define synthetic-voice rights, which can delay deployment even if the software works."
    mitigation: "Start with customers already signing new localization or cloning deals, provide configurable policy templates with counsel review, and sell the product as enforcement infrastructure rather than legal advice."
  - name: Workflow adoption friction
    description: "Audio teams may bypass controls if approvals slow down production on recurring promos and ad spots."
    mitigation: "Design the first product around low-friction preapproved templates, one-click renewals for repeat campaigns, and hard blockers only on high-risk voices or out-of-scope usage."
