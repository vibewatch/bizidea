modelSanity:
  - checkName: 收入引擎
    finding: "基准情景收入来源于从 M12 的 4 个付费项目增长至 Q4Y3 的 35 个，增长主要来自少数生产客户内部的多项目扩展。"
  - checkName: 必须做对的事
    finding: "试点到年度转化必须足够紧密，让团队在 Y3 大规模扩张前，在 Y2 每季度净新增约 3 个付费项目。"
  - checkName: 模型崩溃条件
    finding: "若公司带着约 26 个项目退出 Y3 且毛利率停滞在 67% 附近，下行情景现金将在下一轮融资证明前跌至约 $30K。"
  - checkName: 下一轮融资证明条件
    finding: "若公司带着 16 个付费项目、2 个在线 TTS 集成和试点客户转化为年度多项目合同的清晰证据退出 Y2，则种子轮融资成立。"
sanityChecks:
  ruleOf40: "Y3 增长率 146.3% + EBITDA 利润率 -21.0% = 125.3%"
  burnMultiple: "Y2 净新增 ARR 约 $720K，消耗倍数 0.99x；Y3 净新增 ARR 约 $1.14M，消耗倍数改善至 0.27x。"
  revenuePerFte: "Y3 出口 7 名 FTE，人均收入 $211K（SaaS 基准 $200–$400K）"
  flags:
    - "模型依赖 15–20 个生产客户在 Y3 前扩展为多个受治理项目；若大多数客户停留在单项目，收入将明显低于预期。"
    - "由于前两年仍在消化集成和例外处理开销，毛利率要到 Y3 才完全达到 BP 目标。"
    - "现金低点出现在 Q4Y3，因此融资启动应远早于盈亏平衡，而非等到账户余额趋紧。"
    - "市场真实但规模有限，Y3 计划必须赢得相邻有声书和品牌音频扩张，而非假设广泛的媒体行业采用。"
