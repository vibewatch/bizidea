scenarios:
  downside:
    description: "试点转化放缓，客户激活的项目数减少，大量例外审批使业务比计划更依赖服务。"
    y3RevenueK: 999.0
    y3EbitdaK: -684.71
    cashLowPointK: 29.9
    keyAssumptionChanges:
      - "Q4Y3 付费项目数达到 26 而非 35。"
      - "随着账户延迟多项目扩展，每项目混合年收入降至约 $54K。"
      - "由于策略例外和人工审核仍较多，毛利率最高约 67%。"
  base:
    description: "公司将发布驱动的试点转化为可复制的多项目动作，Y2 末达到 16 个付费项目，Y3 末达到 35 个付费项目，分布在约 15–20 个生产客户中。"
    y3RevenueK: 1477.5
    y3EbitdaK: -310.95
    cashLowPointK: 532.43
    keyAssumptionChanges:
      - "与 A1–A23 一致，M12 达到 4 个付费项目，Q4Y2 达到 16 个，Q4Y3 达到 35 个。"
      - "使用 $60K 混合年均每活跃付费项目收入，以及 A6 下的中点时序。"
      - "毛利率从 Y1 的 58–62% 随模板和集成标准化逐步提升至 Y3 的约 70%。"
  upside:
    description: "渠道推荐和强有力的撤销证明 ROI 加速转化，客户在不大幅增加支持压力的情况下更快追加第二个项目。"
    y3RevenueK: 1889.25
    y3EbitdaK: 21.56
    cashLowPointK: 841.43
    keyAssumptionChanges:
      - "Q4Y3 付费项目数达到 41 而非 35。"
      - "随着更多账户追加高级审计和导出量使用，每项目混合年收入升至约 $66K。"
      - "由于第二波集成持续产品化，毛利率达到约 73%。"
