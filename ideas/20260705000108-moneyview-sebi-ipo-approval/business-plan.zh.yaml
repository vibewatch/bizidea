slug: loan-book-router
date: "2026-07-05"
executiveSummary: >-
  Loan Book Router 应该被打造成一道财务与风控管控层，服务那些已经能数字化审批贷款、
  但仍靠 Excel 表格决定每笔已批准贷款该记在自营 NBFC 账簿还是 DLG 担保合作方额度上的印度个人贷款金融科技公司。
  Moneyview 的 IPO 申报文件和年报把这个痛点摆得很清楚：新募资金分别拨给了 DLG 放款和 Whizdm Finance 的资本金，
  而 RBI 规则又限制了 DLG 的担保覆盖比例，把承保责任牢牢留在受监管主体身上。因此，第一个可信客户画像是：
  C 轮以上、拥有自营 NBFC、2-5 个活跃合作方项目、每周放款委员会仍在人工核对额度余量再批准每日放款节奏的机构。
  MVP 应保持只读：摄取已批准贷款群组、合作方规则、DLG 使用率和自营账簿约束，然后推荐最优记账路径，
  产出审计级的决策日志，而不是试图替换 LOS。这样的节奏契合真实的购买触发点——IPO 准备、新开 DLG 额度，
  或董事会要求增长放款但不愿承担隐性资本风险——也契合创始人主导、直接面向已经在为相邻信贷基础设施买单的
  CFO/CRO 买家的销售打法。看好它的核心理由是：相邻供应商卖的是贷款发起、服务或信贷项目管线，而这个切口拿下的
  是更窄但更迫切的决策——放款前的跨账簿路由。存疑的核心理由是：调研无法验证目标放贷机构实际同时管理多少条
  资金渠道，也无法确认它们会不会在要求更深自动化之前先为企业级软件预算买单。由于测算出的第三年 SOM 在首个
  滩头市场里只有约 190 万美元，公司必须把个人贷款路由当作一个验证切口，靠它赢得进入联合贷款、仓库信贷额度、
  资产证券化就绪和投资人报告等领域的资格。
problem:
  - "已具规模的印度个人贷款金融科技公司，财务团队仍在用 Excel 模型、MIS 导出数据和财务电话会议，把已批准贷款分配到自营 NBFC 账簿和 DLG 担保合作方额度之间，这拖慢了放款速度，也让真实的额度余量变得模糊。"
  - "RBI 对 DLG 的约束、无抵押信贷更高的资本敏感度，以及 IPO 或审计审查，都让一次糟糕的分配决策代价高昂——可能突破担保上限、困住已批准的放款量，或给承销商和审计师留下站不住脚的证据。"
solution:
  - "在审批和放款之间部署一个只读资金路由器，摄取已批准的贷款群组、合作方项目规则、DLG 使用率、额度成本、账龄损失曲线和自营 NBFC 的资本约束，据此推荐每笔贷款该记在哪里。"
  - "把每个路由决策变成一条与政策挂钩的审计日志，配上异常处理、余量预测和董事会级报告，让财务与风控团队无需替换 LOS 或总账系统，就能为分配决策自证清白。"
whyWeWin:
  - "现有的 LOS 和数字信贷平台负责报告或发放贷款，但它们公开的定位并不聚焦于 DLG 消耗预测、自营与合作方之间的路由决策，或放款那一刻的财务级决策日志。"
  - "一旦这家初创公司先落地，护城河会靠合作方专属连接器、可复用的政策模板，以及一份任何单一放贷机构都无法独自积累的跨账簿数据集（涵盖使用率、覆核、损失和审计问询）持续加深。"
strategicChoices:
  beachhead: "拥有自营 NBFC 子公司、2-5 条活跃 DLG 或合作方信贷线、年度无抵押放款超过 50 亿卢比、且董事会正推动每日账簿分配专业化的印度个人贷款金融科技公司。"
  wedgeRationale: >-
    这比瞄准所有数字信贷机构或所有信贷产品都更适合作为第一市场，因为这个分配决策本就存在、每天重复发生，
    而且由一个感受着增长压力和监管审查双重夹击的小型高管群体拥有。一个财务主导的工作流就能快速拿出证据：
    更快的余量决策、更少的人工覆核，以及更干净的审计证据——完全不需要客户拆掉核心信贷系统。
  sequencingRationale: >-
    先从单一无抵押个人贷款产品、影子模式推荐和每周董事会材料输出做起，在开启回写或自动路由之前，
    因为集成风险和信任才是采用的主要门槛。GTM 保持创始人主导，围绕 IPO 筹备或新额度上线，直接面向 CFO/CRO
    买家，招聘则优先补齐规则、数据核对和实施能力，而不是急着扩张销售团队。与审计、债务顾问和信贷科技供应商
    的合作，要等到第一个生产环境验证点跑通之后再展开——那时产品能拿出政策准确度和部署速度的实证，而不只是承诺。
  notYet:
    - "信贷承保或获客优化"
    - "全面替代 LOS 或端到端服务工作流"
    - "在无抵押个人贷款验证之前拓展信用卡、商户贷款或中小企业贷款"
    - "没有人工审批阈值的全自动记账回写"
market:
  tam: "1950 万美元预估 TAM，测算依据是约 65 家有路由复杂度的印度数字个人贷款机构，每家年软件支出约 2500 万卢比。"
  sam: "540 万美元预估滩头 SAM，测算依据是约 18 家拥有自营 NBFC 加多条合作方项目的规模化放贷机构。"
  som: "190 万美元预估第三年 SOM，测算依据是 7 个生产环境客户，平均 ARR 约 2200 万卢比。"
  segments:
    - "主力：拥有自营 NBFC 且有多条 DLG 或合作方信贷线的印度个人贷款金融科技公司"
    - "次级：个人贷款切口验证后，管理多个资金账簿的印度联合贷款、信用卡和商户贷款平台"
  buyingProcess: >-
    日常的推动者是信贷财务负责人、资金管理主管或风控运营负责人，但经济决策者通常是 CFO 或 CRO，
    因为这个痛点横跨资本使用效率、风控治理和审计就绪三个维度。第一份合同最有可能由 IPO 筹备、新开的
    DLG 或仓库信贷额度，或董事会要求提升放款量但不失控的指令触发，并且应该先在单一产品上以影子模式试点，
    再转为年度运营订阅。
product:
  mvp: >-
    MVP 应摄取单一放贷机构已批准的无抵押个人贷款群组、合作方额度规则、DLG 使用率和自营 NBFC 资本约束，
    然后为一个放款委员会生成每日影子模式路由建议、异常队列和可追溯的审计日志。它应保持只读，
    需要人工审批，且不回写 LOS 或总账系统。
  sixMonth: "在 2-3 个共创客户处为单一贷款产品部署影子模式路由，支持每客户最多五个资金账簿，并交付每日余量视图加每周审计与董事会材料。"
  twelveMonth: "为最常见的 LOS、合作方 MIS 和财务数据源加装稳固连接器，并加入覆核工作流、假设情景模拟和面向生产环境决策的合作方级收益/损失校准。"
  twentyFourMonth: "在政策信任建立后，把业务从个人贷款路由扩展到联合贷款、仓库信贷额度分配、资产证券化就绪报告，以及针对低风险群体的条件式自动路由。"
  keyBets:
    - "财务团队会先买一个只读推荐层，然后才会批准一个能把记账结果写回生产系统的系统。"
    - "一个产品加 2-5 条资金渠道，足以在一个季度内证明可衡量的使用率和治理提升。"
    - "DLG 和自营账簿的分配逻辑可以产品化为可配置策略，而不是为每个客户定制代码。"
    - "要把狭窄的 540 万美元 SAM 变成一家风险投资级规模的公司，必须扩展到相邻资金渠道。"
gtm:
  wedge: "在 IPO 筹备期、新开 DLG 额度上线或董事会主导的资本效率行动中，为单一高交易量无抵押个人贷款项目销售影子模式贷款账簿路由器，用每日路由指引和审计证据取代每周 Excel 核对。"
  channels:
    - "创始人主导，直接向 C 轮以上个人贷款金融科技公司的 CFO、CRO 和信贷财务负责人销售"
    - "通过已经在资本募集或治理项目中的金融科技投资人、债务顾问、IPO 就绪顾问和审计事务所进行热介绍"
    - "后期与已拥有系统接入权但没有路由策略的 LOS、LMS 和信贷转型供应商联合销售"
  funnelTargets: "目标客户到合格线索发现转化率 25%-35%，合格线索发现到付费影子试点转化率 20%-30%，试点到年度生产环境转化率 50%以上，生产环境客户在 12 个月内扩展第二个资金账簿或产品的比例 60%以上。"
  pricing: "先做一个 8-12 周的付费影子模式实施，覆盖一个贷款产品和 2-3 条资金渠道，随后年度软件订阅按活跃资金账簿收取平台费，再加上按引擎处理放款量计的基点使用费。这样的定价逻辑贴合买家预算——价值体现在更高的额度利用率、更少的人工核对和更快的审计响应上，而不是按坐席数计费。"
businessModel:
  revenueStreams:
    - "面向路由策略、余量监控和审计日志的年度平台订阅"
    - "首个产品、合作方额度和财务连接器的实施与数据映射费"
    - "与托管放款量或活跃资金项目数量挂钩的使用费"
    - "面向假设情景模拟、投资人报告和更多信贷产品的扩展模块"
  unitOfValue: "经引擎路由或监控的活跃资金账簿与年度放款量"
  targetGrossMarginPct: 72
  expansionLevers:
    - "在同一放贷机构内增加更多合作方额度、自营主体和贷款产品"
    - "路由数据获得信任后，向上销售董事会报告、资产证券化就绪和情景规划"
    - "从 DLG 和自营路由扩展到联合贷款、仓库信贷额度和催收反馈优化"
    - "借助审计、债务顾问和信贷科技合作方，获取多客户部署模式的线索"
strategyMap:
  northStarMetric: "经引擎路由、且零 DLG 或资本政策违规的月度已批准贷款放款量"
  inputMetrics:
    - "运行每周或每日人工分配委员会的合格 ICP 账户数"
    - "从项目启动到首个影子模式路由建议的天数"
    - "被实时政策规则和合作方余量数据覆盖的已批准贷款量占比"
    - "付费影子试点转化为年度生产环境的比例"
    - "每个生产环境客户平均扩展的资金账簿或产品数量"
  moatsToBuild:
    - "面向 DLG 上限、自营账簿约束、合作方余量规则和覆核治理的可复用策略库"
    - "横跨 LOS、MIS 和财务总账的合作方专属连接器与对账逻辑"
    - "把路由选择与使用率、损失、覆核和审计材料周期时间相关联的跨放贷机构基准数据集"
  killCriteria:
    - "首批 15 个合格 ICP 访谈中，确认存在跨多条资金渠道、每周或每日循环分配工作的机构少于 6 家。"
    - "首批 4 个付费影子试点中，6 个月内转化为年度生产环境的比例少于 2 个。"
    - "前 3 个部署项目中，从启动到首个可用路由建议的中位时间超过 45 天，原因是数据核对过于混乱。"
    - "买家在完全回写自动化实现之前拒绝付费，这将迫使产品做比种子期计划支持范围更深的核心系统集成。"
  mermaid: |
    flowchart LR
      Wedge[IPO-prep and new DLG line wedge] --> MVP[Read-only capital router]
      MVP --> Proof[Daily routing proof and audit packs]
      Proof --> Expansion[Co-lending and securitization control plane]
investorMemo:
  verdict:
    call: "观望"
    conviction: "工作流切口扎实，买家痛点可信，但在部署速度、ACV 和相邻市场扩展得到验证之前，信心仍然有限。"
    whyBelieve: "调研和创意假设都指向一个真实存在的董事会级工作流——把已批准贷款分配到自营和 DLG 账簿之间——而现有信贷套件和内部 Excel 表格都没有干净地拿下它。"
    whyDoubt: "初始 SAM 规模小且集中，调研尚未能证明有多少放贷机构对这个痛点感受强烈到愿意按企业软件价格付费。"
    nextDiligence: "拿下两个由 CFO 或 CRO 赞助的付费影子试点，并证明其中一个能转化为年度合同，同时减少人工分配工作、提升审计就绪度。"
  firstCustomer:
    title: "C 轮以上印度个人贷款金融科技公司的 CFO 或 CRO"
    profile: "一家印度放贷机构，拥有自营 NBFC、2-5 条活跃合作方额度、年度无抵押放款超过 50 亿卢比，每周放款委员会仍在用 Excel 核对合作方余量。"
    trigger: "IPO 筹备、新开的 DLG 或仓库信贷额度上线，或董事会要求在不隐藏资本风险漂移的前提下提升放款量。"
    buyer: "CFO 或首席风险官"
    initialContract: "40-75 万卢比（40-75 lakh）的付费影子模式试点，覆盖一个产品和 2-3 条资金渠道；一旦每日路由建议和一份审计就绪的董事会材料上线，可折抵一份 1.5-2.5 千万卢比的年度合同外加使用费。"
  mustBeTrue:
    - "至少三分之一的合格滩头放贷机构，已经在通过 Excel 驱动的分配委员会管理多个合作方或自营账簿。"
    - "在客户被要求生产环境回写之前，只读试点必须展示出可衡量的余量、速度或审计收益。"
    - "一个产品加多条资金渠道上线后，目标客户的混合年度合同价值必须能落在约 1.5-2.5 千万卢比区间。"
    - "跨 DLG 和自营账簿的路由规则必须足够可配置，能在客户之间复用，而不是每次重新编码。"
    - "在初始个人贷款滩头市场饱和之前，产品必须扩展到相邻的资金渠道工作流。"
  diligenceQuestions:
    - "目标放贷机构每月实际管理多少组并行的 DLG 集合、合作方额度和覆核决策？"
    - "第一笔预算由谁签字：CFO、CRO、信贷财务负责人，还是联合委员会？"
    - "在一条每日路由建议被信任之前，需要哪些源系统和多大的数据延迟？"
    - "买家会接受按资金账簿加已路由放款量计费，还是更愿意签一份固定的治理软件合同？"
    - "联合贷款、仓库信贷额度还是资产证券化就绪——哪个相邻工作流在首次路由部署后拉力最强？"
operatingAssumptions:
  - assumption: "已具规模的个人贷款金融科技公司通常在自营 NBFC 账簿之外，还同时管理 2-5 条活跃的合作方或 DLG 额度。"
    basis: idea.yaml
    validationTest: "审阅 5-7 家目标放贷机构真实的资金管理跟踪表或 MIS 导出数据，确认至少 4 家管理着多个并行、且有循环分配决策的资金账簿。"
    decisionImpact: "如果不成立，可触达的客户池和切口紧迫性都会比模型假设的更小，公司必须进一步收窄 ICP，或改为定价更轻的分析产品。"
  - assumption: "CFO 或 CRO 买家会在全自动化功能上线前，先签下一份付费影子模式试点。"
    basis: research.yaml
    validationTest: "针对 4 个与 IPO 筹备或新额度上线挂钩的试点提案推进，确认至少 2 个买家批准了一份带明确成功标准的付费只读范围。"
    decisionImpact: "如果不成立，路线图必须提前投入回写、管控和安全方面的工作，这会推高烧钱速度并延后营收。"
  - assumption: "产品能在 45 天内，仅靠导出数据和只读集成实现首个价值。"
    basis: research.yaml
    validationTest: "测量前 3 个部署项目从启动到首个建议之间的时间。"
    decisionImpact: "如果不成立，实施会变得过于依赖人力服务，压低目标毛利率并拖累创始人主导的 GTM。"
  - assumption: "一旦引擎覆盖了一个产品和多条资金渠道，1.5-2.5 千万卢比外加轻量使用费的年度定价是可接受的。"
    basis: research.yaml
    validationTest: "预算访谈加 2 份付费试点转化报价，确认至少一位客户接受了模型区间内的定价。"
    decisionImpact: "如果不成立，TAM、SAM、SOM 和融资计划都需要向下重设。"
  - assumption: "向联合贷款、仓库信贷额度和资产证券化报告的相邻扩展足够真实，值得在初始滩头市场之外获得风险投资支持。"
    basis: idea.yaml
    validationTest: "在 10 通客户与投资人尽调电话中，至少 5 通把某个相邻工作流列为个人贷款路由之后的下一个已获资助的方向。"
    decisionImpact: "如果不成立，投资人应把这门生意看作一家规模较小的垂直软件公司，并保持更紧的烧钱纪律。"
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "访谈目标放贷机构的 15 位 CFO、CRO 和信贷财务负责人。"
    hypothesis: "相当一部分机构已经在跨多个资金账簿运行每周或每日的分配委员会，并把这个工作流视为董事会级的风控问题。"
    successMetric: "至少 8 次访谈证实了周期性的 Excel 驱动分配工作，且至少 5 次分享了当前工作流的样例字段或流程步骤。"
    owner: "创始人/CEO"
  - horizon: "0–90 天"
    experiment: "利用共创客户导出的审批、合作方 MIS 和财务数据，运行 2 次贴身式影子模式分析。"
    hypothesis: "在更深入的系统集成之前，仅凭现有导出数据就能生成只读的路由建议。"
    successMetric: "两个共创客户收到可用的每日路由输出，且至少一个暴露出被现有流程遗漏的余量或覆核问题。"
    owner: "创始工程师"
  - horizon: "90–180 天"
    experiment: "拿下 2 个与 IPO 筹备、新开 DLG 额度或新仓库信贷设施挂钩的付费影子试点。"
    hypothesis: "这些触发事件足够有力，能在 CFO 或 CRO 的赞助下把线索发现转化为付费试点。"
    successMetric: "签下两份有具名高管赞助人、且已约定转化为年度生产环境标准的付费试点。"
    owner: "创始人/CEO"
  - horizon: "90–180 天"
    experiment: "用 4 份生产环境转化报价测试定价与采购流程。"
    hypothesis: "试点证明了管控和使用率价值之后，买家会接受平台费加已路由量定价的模式。"
    successMetric: "至少 2 位买家接受模型区间内的定价，或还价幅度在同一数量级内。"
    owner: "创始人/CEO"
  - horizon: "180–360 天"
    experiment: "在前 3 个生产环境客户中，把连接器和异常处理工作流做成标准产品。"
    hypothesis: "公司能把上线流程标准化到 45 天或更短即可实现首个价值，而不至于沦为一家服务型公司。"
    successMetric: "从启动到首个路由建议的中位时间在 45 天以内，第 4 周后需要人工修正的数据比例低于 20%。"
    owner: "解决方案与实施工程师"
  - horizon: "180–540 天"
    experiment: "与一位现有客户试点一个相邻模块，例如联合贷款或仓库信贷额度情景规划。"
    hypothesis: "同一套数据模型和策略引擎，能支撑一个在 DLG 和自营路由之外的付费第二工作流。"
    successMetric: "一位生产环境客户签下相邻工作流的扩展付费合同或意向书。"
    owner: "信贷财务与风控产品负责人"
operations:
  - "在路由结果发布前，每天对合作方 MIS、LOS 和自营 NBFC 财务数据流进行核对与异常监控。"
  - "为每条政策规则、每次覆核和每个董事会批准的例外情况做版本管理，让审计师能把一次记账决策追溯回源数据和审批背景。"
  - "在扩大范围之前，先围绕一个产品、一种委员会节奏和一小组资金账簿打包上线流程。"
  - "只有在第一个生产环境工作流可作为案例参考之后，才与审计、债务顾问和信贷科技合作方展开协调。"
team:
  - role: "创始人/CEO"
    startTiming: "第 0 个月"
    rationale: "主导创始人销售、共创客户筛选和定价，因为最大的风险在于这个工作流能否从 CFO 或 CRO 买家那里争取到独立预算。"
  - role: "创始工程师"
    startTiming: "第 0 个月"
    rationale: "构建路由引擎、审计日志和首个数据摄取层，这决定了拿到首个建议的时间。"
  - role: "信贷财务与风控产品负责人"
    startTiming: "第 1-3 个月"
    rationale: "把 DLG 政策、自营账簿约束和覆核治理，翻译成可配置的产品规则，而不是为客户定制的逻辑。"
  - role: "解决方案与实施工程师"
    startTiming: "第 4-6 个月"
    rationale: "缩短首批客户群组的数据映射、连接器搭建和部署时间。"
  - role: "GTM 与合作伙伴负责人"
    startTiming: "第 9-12 个月"
    rationale: "只有在第一个生产环境验证点出现之后，才扩大来自债务顾问、审计师和信贷科技合作方的引荐规模。"
milestones:
  - horizon: "0–12 个月"
    items:
      - "与 15 家目标放贷机构一起验证购买触发点、工作流节奏和数据需求。"
      - "签下 3 个付费影子试点，并把至少 2 个转化为年度生产环境。"
      - "交付一个可作案例参考的每日路由工作流，覆盖一个自营 NBFC 加多条合作方额度。"
      - "在前 3 个客户中证明 45 天或更短的首个价值部署周期。"
  - horizon: "12–24 个月"
    items:
      - "在滩头市场拿下 5-7 个生产环境客户，并让至少 2 个客户扩展到更多资金账簿或产品。"
      - "把常见连接器、覆核治理和董事会或尽调报告做成标准模块。"
      - "开通一条审计或债务顾问引荐渠道，以及一种信贷科技联合销售模式。"
      - "试点一个相邻工作流，例如联合贷款或仓库信贷额度分配。"
  - horizon: "24–36 个月"
    items:
      - "如果 ACV 假设成立，达成测算出的第三年 SOM 目标——约 7 个生产环境客户和约 190 万美元 ARR。"
      - "在个人贷款之外，拓展至少一个相邻资金渠道工作流并实现付费采用。"
      - "为余量利用率、覆核频率和审计材料周期时间建立基准数据集。"
      - "判断市场扩展的力度是否足以支撑从种子轮走向 A 轮，还是应该继续做一家专注的垂直平台公司。"
risks:
  - risk: "有真实每日路由痛点的目标放贷机构数量，可能比模型假设的更少。"
    likelihood: High
    impact: High
    mitigation: "尽快用真实的资金管理跟踪表验证这个工作流，保持滩头市场狭窄，并在扩大烧钱规模前测试相邻资金渠道场景。"
  - risk: "LOS、合作方 MIS 和自营 NBFC 总账之间的数据核对，可能让部署变慢且高度依赖人力。"
    likelihood: Medium
    impact: High
    mitigation: "先在一个产品上以只读模式起步，激进地把首批连接器标准化，并在扩大销售团队前先招聘实施人才。"
  - risk: "大型放贷机构可能扩展内部 BI，或要求现有信贷科技供应商复制基础的路由逻辑。"
    likelihood: Medium
    impact: Medium
    mitigation: "靠可复用的策略模型、审计级决策日志和跨放贷机构基准做出差异化，同时与核心系统供应商集成而非试图取代它们。"
  - risk: "RBI 或市场惯例的变化，可能削弱 DLG 作为切入工作流的重要性。"
    likelihood: Medium
    impact: High
    mitigation: "保持策略层可配置，并迅速扩展到自营账簿、联合贷款和仓库信贷额度分配，避免业务被钉死在单一规则集上。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "18 个月用于组建一支小型创始团队、上线只读路由器、完成 3 个付费影子试点、转化至少 2 个生产环境客户、把首批连接器标准化，并验证相邻资金渠道工作流能否把市场拓展到初始个人贷款切口之外。"
