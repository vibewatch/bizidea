differentiator: >-
  Generic LOS software, BI dashboards, and treasury tools report what already happened; they do not decide where a loan
  should be booked before disbursal under India-specific DLG and captive-book constraints. This startup owns that
  decision layer, with program-rule engines, headroom forecasting, and audit evidence built in from day one. Over time,
  defensibility comes from partner-specific connectors, routing benchmarks, and the historical dataset on yield, losses,
  and guarantee burn across multiple funding books.
