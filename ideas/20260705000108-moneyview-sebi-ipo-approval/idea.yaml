problem: >-
  Mature Indian digital lenders no longer fund every approved loan from one place. They have to decide, often daily,
  whether a borrower should be booked on the captive NBFC balance sheet or through a DLG-backed partner program while
  staying inside guarantee caps, capital limits, and partner-specific rules. Most teams still do this with spreadsheets,
  lender MIS exports, and finance calls, which means disbursal slows down just as public-market scrutiny and growth
  capital arrive. One bad allocation week can strand approval volume, leak margin, or create ugly audit gaps.
targetUser:
  primary: "Chief Risk Officer or Head of Lending Finance at an Indian personal-loan fintech running both a captive NBFC and DLG-backed partner programs"
  secondary: "Treasury or lending-operations lead responsible for disbursal pacing across partner NBFCs"
  buyer: "CFO or Chief Risk Officer"
startupThesis:
  nonObviousInsight: >-
    The next bottleneck for scaled Indian digital lenders is not finding borrowers or approving them; it is deciding
    where each approved loan should live. DLG has turned fast-growth apps into hybrid treasury desks, and once public
    capital enters the picture that allocation decision becomes a board-level control problem.
  beachhead: >-
    Indian personal-loan fintechs with a captive NBFC arm, 2 to 5 DLG partner programs, and 500 crore-plus annual
    unsecured disbursals that need daily loan-book allocation and guarantee headroom control.
  wedge: >-
    A capital-allocation router that forecasts DLG guarantee burn, partner-facility headroom, and on-book capital usage,
    then recommends or automates where each approved loan should be booked.
  whyNowCatalyst: "Moneyview's IPO approval and explicit plan to fund both DLG disbursals and its NBFC arm show that book-allocation discipline is becoming a board- and market-level requirement."
  ventureScalePath: >-
    Start with daily booking decisions for unsecured personal loans, then expand into pricing, co-lending, warehouse
    lines, securitization readiness, collections feedback loops, and investor reporting across every funding line a
    digital lender uses.
solution: >-
  The product sits between approval and disbursal and ingests approved-loan cohorts, program rules, DLG utilization,
  facility costs, vintage loss curves, and captive-NBFC capital constraints. It then recommends or automates which book
  each approved loan should hit, flags when a guarantee pool or partner line is about to run out of headroom, and shows
  the yield and capital trade-off of each routing choice. Every decision is written into an audit log that finance,
  risk, auditors, and IPO bankers can trace back to the exact policy and data used. The first deployment is a read-only
  recommendation layer on top of the lender's LOS, partner MIS, and general-ledger systems, not a core replacement.
goToMarketSeed:
  firstCustomer: >-
    A Series C+ Indian personal-loan fintech with an RBI-regulated NBFC subsidiary, 2 to 5 DLG partner NBFC programs,
    and weekly disbursal committees still reconciling headroom in Excel.
  buyingTrigger: "An IPO prep cycle, a new DLG or warehouse line, or a board push to raise disbursals without raising hidden capital risk."
  currentAlternative: "Spreadsheets plus lender-partner MIS exports, internal BI dashboards, and manual treasury calls."
  switchingReason: >-
    The router turns a slow weekly finance exercise into daily booking guidance, helping teams use every funding line
    more fully without overrunning guarantees or replacing their existing LOS.
  pricingHypothesis: "Annual platform fee plus basis-point pricing on disbursal volume managed through the allocation engine."
