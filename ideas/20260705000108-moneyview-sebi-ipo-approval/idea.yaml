topRisks:
  - name: "DLG rule volatility"
    description: "If RBI guidance or market practice changes DLG economics quickly, the entry workflow could shift under the product."
    mitigation: "Model DLG as one configurable policy module and expand the same router into captive-book, co-lending, and warehouse-line allocation."
  - name: "Integration drag"
    description: "Messy LOS, partner MIS, and finance data could make deployments too slow to prove ROI."
    mitigation: "Launch in read-only recommendation mode on one product and one partner line before turning on automation or general-ledger writeback."
  - name: "Internal-build pressure"
    description: "Large lenders may try to recreate the product with internal data teams and dashboards."
    mitigation: "Win on faster connector coverage, audit-grade decision logs, and routing benchmarks that get stronger as customer count grows."
