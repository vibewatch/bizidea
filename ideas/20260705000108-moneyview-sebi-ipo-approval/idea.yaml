jobsToBeDone:
  - job: >-
      When approved-loan volume starts outrunning one funding line, help our finance and risk team place each loan on
      the right book, so we can keep disbursing without breaching DLG or capital limits.
    currentAlternative: "Spreadsheet models plus ad hoc treasury calls"
    successMetric: "Disbursal volume achieved without headroom breaches or manual rework"
  - job: >-
      When auditors, debt investors, or IPO bankers ask why loans were booked a certain way, help our team produce a
      traceable decision history, so we can close diligence without weeks of manual reconciliation.
    currentAlternative: "Manual data pulls from partner MIS, finance models, and core-lending systems"
    successMetric: "Hours to assemble a board pack or diligence response"
