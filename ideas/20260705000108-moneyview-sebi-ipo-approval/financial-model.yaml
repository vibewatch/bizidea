scenarios:
  downside:
    description: Buyers stay closer to pilot-heavy pricing, one Y2 production conversion slips, and manual reconciliation keeps gross margin stuck in the high 60s.
    y3RevenueK: 855.0
    y3EbitdaK: -772.1
    cashLowPointK: -179.7
    keyAssumptionChanges:
    - Blended annual revenue per active logo falls to $180K, close to the low end of the BP annual pricing band after longer pilot periods.
    - Only one new logo is added in Y2, so the company enters Y3 with 4 production logos and exits with 6.
    - Gross margin only reaches about 68% in Y3 because data cleanup and exception handling stay services-heavy.
  base:
    description: Base case holds pricing near the lower-middle of the validated band, lands five production logos by the end of Y2, and reaches seven logos with improving connector reuse by Y3.
    y3RevenueK: 1265.0
    y3EbitdaK: -445.6
    cashLowPointK: 382.0
    keyAssumptionChanges:
    - Blended annual revenue per active logo stays at $220K, roughly ₹1.8 crore, which is inside the BP pricing band but below the research SOM case.
    - Customer adds follow [0,1,0,1] in both Y2 and Y3, ending with 7 paying logos by Q4Y3.
    - Gross margin improves from roughly 55-60% in Y1 to about 72% steady-state as connectors and audit workflows standardize.
  upside:
    description: Reference accounts and partner referrals convert pilots faster, letting the team price closer to the research SOM case and land one extra Y3 logo.
    y3RevenueK: 1593.9
    y3EbitdaK: -182.5
    cashLowPointK: 756.3
    keyAssumptionChanges:
    - Blended annual revenue per active logo rises to $250K as customers adopt more funding books and usage fees earlier.
    - Y3 adds three new logos instead of two, ending at 8 paying logos by Q4Y3.
    - Gross margin reaches about 74% by Q4Y3 because connector reuse reduces manual routing support faster than planned.
sensitivity:
- variable: ARPU
  downsideCase: $180K blended annual revenue per active logo.
  baseCase: $220K blended annual revenue per active logo.
  upsideCase: $250K blended annual revenue per active logo.
  y3RevenueImpactK: -230.0
  cashImpactK: -291.9
- variable: CAC
  downsideCase: $180K CAC if founder-led selling, travel, and buyer education stay expensive.
  baseCase: $145.2K CAC from modeled sales and marketing spend.
  upsideCase: $120K CAC with stronger referrals from debt advisors, auditors, and lending-stack partners.
  y3RevenueImpactK: 0.0
  cashImpactK: -175.0
- variable: churn
  downsideCase: 4% monthly churn equivalent, roughly one of the first five logos failing to renew in Y3.
  baseCase: 2% monthly churn used only for LTV; the operating model carries no explicit churn.
  upsideCase: 1% monthly churn once routing is embedded in finance and audit workflows.
  y3RevenueImpactK: -220.0
  cashImpactK: -180.0
- variable: sales cycle
  downsideCase: Pilots and annual conversions slip roughly one quarter later than planned.
  baseCase: Founder-led enterprise sale with first paid pilot by M4 and two more by M12.
  upsideCase: Warm referrals pull pilots and annual conversions roughly one quarter earlier.
  y3RevenueImpactK: -55.0
  cashImpactK: -108.3
- variable: gross margin
  downsideCase: Steady-state gross margin stalls near 68% because routing recommendations stay services-heavy.
  baseCase: Steady-state gross margin reaches about 72% by Q4Y3.
  upsideCase: Steady-state gross margin reaches about 74% with cleaner connectors and fewer manual exceptions.
  y3RevenueImpactK: 0.0
  cashImpactK: -49.0
- variable: hiring pace
  downsideCase: Second engineer, second solutions hire, and growth hires are pulled forward before pricing proof is locked.
  baseCase: Hire plan stays milestone-gated, with only one new engineer added in mid-Y3.
  upsideCase: Connector reuse lets the team delay some growth hiring until after seed fundraising starts.
  y3RevenueImpactK: 0.0
  cashImpactK: -135.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetLenders --> PaidPilots
      PaidPilots --> ProductionLogos
      ProductionLogos --> PlatformAndUsageRevenue
      PlatformAndUsageRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: Revenue engine
  finding: The base case reaches $1.265M of Y3 revenue by ending with 7 paying lender logos at a $220K blended annual revenue level, which sits inside the BP pricing band but below the research SOM case.
- checkName: Must go right
  finding: The team has to keep first-value deployment under 45 days so one founder-led sale and one solutions pod can convert paid pilots into five production logos by the end of Y2.
- checkName: Model breaks if
  finding: If pricing slips toward $180K and only six logos are live by Q4Y3, the downside case turns cash negative before the company earns seed-round leverage.
- checkName: Next-round proof
  finding: A credible seed raise requires seven paying logos, roughly 72% steady-state gross margin, and at least one paid adjacent workflow that expands the market beyond personal-loan routing.
sanityChecks:
  ruleOf40: Y3 growth 53.3% + EBITDA margin -35.2% = 18.1%.
  burnMultiple: Y2 burn multiple about 1.3x on $440K of net new ARR, improving to about 1.0x in Y3.
  revenuePerFte: Approximately $158.1K Y3 on 8 exit FTE (benchmark $200–400K vertical SaaS).
  flags:
  - The base case underwrites pricing near the lower-middle of the BP range, so the model is highly sensitive to whether buyers really convert from pilot budgets to ₹1.5 crore+ annual contracts.
  - Revenue per exit FTE is still below a healthy vertical-SaaS benchmark because deployment, exception handling, and audit support remain labor-intensive through Y3.
  - The operating model carries no explicit logo churn in the first 36 months; if one of the first five production customers fails to renew, cash compression will be sharper than the base case shows.
  - The researched beachhead SAM is only about $5.4M, so the company must prove adjacent workflows such as co-lending or warehouse-line allocation before adding a larger GTM team.
