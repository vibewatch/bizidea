slug: loan-book-router
date: '2026-07-05'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: month
  source: '[BP date 2026-07-05] the operating model starts in the first full month after the business plan date.'
- id: A2
  name: Opening cash and pre-seed ask
  value: '2000'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] base case uses the low end of the stated range because the plan stays India-first and founder-led through Y2.'
- id: A3
  name: Starting paying logos (M1)
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] the first year objective is to sign paid shadow pilots and convert the first production customers, not to inherit an installed base.'
- id: A4
  name: Customer definition
  value: One paying lender logo covering one unsecured personal-loan workflow, whether in pilot conversion or annual production.
  unit: definition
  source: '[BP investorMemo firstCustomer + BP gtm pricing] the buying motion is a logo-level enterprise sale into one lender finance and risk team.'
- id: A5
  name: Blended annual revenue per active logo
  value: '220.0'
  unit: USDK
  source: '[BP operatingAssumptions annual pricing of ₹1.5-2.5 crore + Research market.som] $220K is about ₹1.8 crore at the lower-middle of the validated annual contract band, leaving upside to the research SOM case.'
- id: A6
  name: Year 1 new paying logos by month
  value: '[0, 0, 0, 1, 0, 0, 0, 1, 0, 0, 0, 1]'
  unit: count
  source: '[BP milestones 0–12 months + BP experimentRoadmap] the model lands three paid logos in Y1, consistent with signing three paid shadow pilots and converting two of them toward production.'
- id: A7
  name: Year 2 new paying logos by quarter
  value: '[0, 1, 0, 1]'
  unit: count
  source: '[BP milestones 12–24 months] the team exits Y2 with 5 paying logos, the low end of the stated 5-7 production logo milestone range.'
- id: A8
  name: Year 3 new paying logos by quarter
  value: '[0, 1, 0, 1]'
  unit: count
  source: '[BP milestones 24–36 months + Research market.som] the model reaches 7 paying logos by Q4Y3, matching the researched logo-count SOM path while using a more conservative ACV than the full SOM case.'
- id: A9
  name: Revenue recognition convention
  value: New logos contribute 50% of period ARPU in the landing month or quarter.
  unit: formula
  source: Startup-finance heuristic for enterprise software go-lives; revenue is modeled off average active logos so P&L revenue reconciles to customer count and ARPU.
- id: A10
  name: Logo churn treatment
  value: No explicit churn in the 36-month base case; 2.0% monthly churn is used only for LTV and sensitivity work.
  unit: policy
  source: '[BP investorMemo nextDiligence + Research openQuestions] early contracts should be sticky once embedded, but long-run retention is still uncertain enough to keep a non-zero churn assumption in unit economics.'
- id: A11
  name: COGS ramp
  value: 45% in Y1H1; 40% in Y1H2; 34/33/32/31% across Y2; 30/29/28/28% across Y3.
  unit: percent of revenue
  source: '[BP businessModel targetGrossMarginPct 72 + BP operations + operatingAssumption first value under 45 days] early shadow-mode support is services-heavy, but connector reuse and standard audit packs move the model toward the low-70s gross margin target by Y3.'
- id: A12
  name: Founder / CEO loaded cash compensation
  value: '120.0'
  unit: USDK annual per FTE
  source: Startup-finance heuristic for a venture-backed fintech founder taking a below-market but still cash-paying salary while carrying founder-led enterprise sales.
- id: A13
  name: Engineering loaded cash compensation
  value: '105.0'
  unit: USDK annual per FTE
  source: Startup-finance heuristic for senior India-based product and data integration engineering talent with payroll load.
- id: A14
  name: Product / risk loaded cash compensation
  value: '126.0'
  unit: USDK annual per FTE
  source: Startup-finance heuristic for a lending finance and risk product lead with domain depth in DLG, NBFC capital, and override governance.
- id: A15
  name: Solutions / implementation loaded cash compensation
  value: '84.0'
  unit: USDK annual per FTE
  source: Startup-finance heuristic for implementation talent handling MIS mapping, connector rollout, and audit-pack setup across lender logos.
- id: A16
  name: Sales / GTM loaded cash compensation
  value: '120.0'
  unit: USDK annual per FTE
  source: Startup-finance heuristic for one enterprise fintech seller with travel and partner-development load embedded in compensation.
- id: A17
  name: Hiring timeline
  value: Founder and one engineer at start; product-risk lead in M2; first solutions hire in M5; first GTM hire in M10; second engineer in M17; second solutions hire in M19; third engineer in M29.
  unit: timeline
  source: '[BP team + BP strategicChoices sequencingRationale] rules, reconciliation, and implementation capacity are hired before any scaled sales expansion.'
- id: A18
  name: Payroll allocation into P&L lines
  value: Founder 60% S&M / 15% R&D / 25% G&A; engineering 100% R&D; product-risk 15% S&M / 60% R&D / 25% G&A; solutions 20% S&M / 25% R&D / 55% G&A; sales 100% S&M.
  unit: allocation
  source: '[BP team rationales + BP operations] the split mirrors who owns selling, policy productization, deployment, and compliance support in the operating plan.'
- id: A19
  name: Non-payroll operating budget ramp
  value: Monthly non-payroll budget is 6/9/10K for S&M/R&D/G&A in Y1H1, 9/10/11K in Y1H2, then rises to 15/15/16K by Y3H2.
  unit: USDK per month
  source: Startup-finance heuristic anchored to cloud infrastructure, audit-grade logging, security reviews, legal and RBI-compliance work, travel, and partner integrations required by the BP.
- id: A20
  name: Blended CAC
  value: '145.2'
  unit: USDK per landed logo
  source: Calculated from modeled sales and marketing spend of $1016.2K over 7 landed logos by Q4Y3; conservative because it includes founder-led selling and early education costs.
- id: A21
  name: Funding sizing rule
  value: Low-end pre-seed round sized to reach Y3 proof plus buffer.
  unit: policy
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP milestones 24–36 months] the model uses a $2.0M ask to stay at the bottom of the stated range while funding the 7-logo wedge proof and an adjacent workflow pilot.'
