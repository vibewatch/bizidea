openQuestions:
- How many concurrent DLG sets and partner lines does a typical Series C+ digital personal-loan fintech actively manage in a normal month?
- Which committee actually owns the final booking override today—CFO, CRO, treasury, or lending operations?
- How much historical program-level data is usually available to forecast DLG burn with confidence before the first implementation?
- Will buyers pay mainly as fixed governance software, or will they insist on basis-point pricing tied to disbursal volume routed through the engine?
