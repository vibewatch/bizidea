  adoptionFrictionMatrix:
  - friction: Partner MIS and captive-NBFC ledger data do not reconcile cleanly enough for daily routing decisions.
    severity: high
    affectedBuyer: Head of Lending Finance
    mitigation: Launch in read-only shadow mode with daily exception reports before automating any booking action.
    sourceRefs:
    - 7
    - 56
    - 68
  - friction: Policy ownership spans CFO, CRO, and lending operations, so no single team wants to “own” bad routing outcomes.
    severity: high
    affectedBuyer: CFO / CRO
    mitigation: Tie the router to explicit board-approved policy, override logging, and escalation thresholds.
    sourceRefs:
    - 21
    - 23
    - 2
  - friction: Newer DLG programs may not have enough historical data to support aggressive burn forecasting.
    severity: medium
    affectedBuyer: Chief Risk Officer
    mitigation: Use conservative confidence bands, cohort-level controls, and manual approval for thin-data segments.
    sourceRefs:
    - 22
    - 34
  - friction: Teams worry that shifting mix away from one partner line could damage lender relationships or surprise governance committees.
    severity: medium
    affectedBuyer: CEO / CFO
    mitigation: Expose partner-specific constraints and what-if simulations so route changes are transparent before execution.
    sourceRefs:
    - 7
    - 64
    - 55
market:
  tam:
    value: $19.5M
    rationale: 'Bottom-up estimate: model ~65 relevant Indian digital personal-loan lenders with enough program complexity to care about booking optimization, then assume ₹2.5 crore annual software spend for a finance-grade routing layer. 65 × ₹2.5 crore = ₹162.5 crore, or about $19.5M at ₹83/$. Cross-check: public market-scale data and enterprise lending-stack deployments support this order of magnitude.'
    isEstimate: true
    sourceRefs:
    - 33
    - 34
    - 56
    - 65
    - 67
  sam:
    value: $5.4M
    rationale: 'Beachhead estimate: narrow the modeled universe to ~18 scaled consumer lenders with captive NBFC or multi-line partner complexity, then assume ~₹2.5 crore ARR each. 18 × ₹2.5 crore = ₹45 crore, or about $5.4M.'
    isEstimate: true
    sourceRefs:
    - 34
    - 6
    - 43
    - 46
    - 49
    - 51
  som:
    value: $1.9M
    rationale: Reachable year-3 case assumes 7 logos in the beachhead at ~₹2.2 crore average ARR after shadow-mode land and multi-line expansion. 7 × ₹2.2 crore = ₹15.4 crore, or about $1.9M.
    isEstimate: true
    sourceRefs:
    - 2
    - 56
    - 65
