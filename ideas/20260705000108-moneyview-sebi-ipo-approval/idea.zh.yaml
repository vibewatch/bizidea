problem: >-
  成熟的印度数字信贷机构，早已不再靠单一渠道给每笔已批准贷款放款。它们几乎每天都要决定：一个借款人该记在自营 NBFC 资产负债表上，
  还是走 DLG 担保的合作方项目——同时还得守住担保上限、资本限额和各合作方的专属规则。多数团队仍然靠 Excel 表格、放贷机构 MIS 导出数据
  和财务电话会议来做这件事，结果就是公开市场审查和增长资本一到，放款速度反而慢了下来。一周分配失误，就可能困住已批准的放款量、
  吃掉利润，或者留下难看的审计漏洞。
targetUser:
  primary: "印度个人贷款金融科技公司的首席风险官或信贷财务负责人，同时运营自营 NBFC 和 DLG 担保的合作方项目"
  secondary: "负责跨合作 NBFC 掌控放款节奏的资金管理或信贷运营负责人"
  buyer: "CFO 或首席风险官"
startupThesis:
  nonObviousInsight: >-
    对已具规模的印度数字信贷机构来说，下一个瓶颈不是找到借款人或批准贷款，而是决定每笔已批准贷款该落在哪里。DLG 让高速增长的
    信贷 App 变成了混合型资金管理台，公开资本一旦进场，这个分配决策就升级为董事会级别的风控问题。
  beachhead: >-
    拥有自营 NBFC、2 至 5 个 DLG 合作方项目、年度无抵押放款超过 50 亿卢比、且需要每日贷款账簿分配与担保余量管控的印度个人贷款
    金融科技公司。
  wedge: >-
    一个资本分配路由器：预测 DLG 担保消耗、合作方额度余量和自有账簿的资本占用，然后推荐或自动决定每笔已批准贷款该记在哪个账簿上。
  whyNowCatalyst: "Moneyview 的 IPO 获批，以及同时为 DLG 放款和自有 NBFC 注资的明确计划，说明账簿分配纪律正在变成董事会和资本市场层面的硬性要求。"
  ventureScalePath: >-
    先从无抵押个人贷款的每日记账决策切入，再扩展到定价、联合贷款、仓库信贷额度、资产证券化就绪、催收反馈闭环，以及覆盖数字信贷
    机构所用每条资金渠道的投资人报告。
solution: >-
  该产品嵌在审批和放款之间，摄取已批准贷款群组、项目规则、DLG 使用率、额度成本、账龄损失曲线和自营 NBFC 的资本约束，然后
  推荐或自动决定每笔已批准贷款该落到哪个账簿，在担保池或合作方额度即将耗尽时发出预警，并展示每种分配方案的收益与资本权衡。
  每个决策都写入审计日志，财务、风控、审计师和 IPO 承销商都能据此追溯到具体使用的政策和数据。首个部署版本是叠加在
  放贷机构 LOS、合作方 MIS 和总账系统之上的只读推荐层，而不是核心系统的替代品。
goToMarketSeed:
  firstCustomer: >-
    一家 C 轮以上的印度个人贷款金融科技公司，旗下有受 RBI 监管的 NBFC 子公司、2 至 5 个 DLG 合作方 NBFC 项目，
    每周放款委员会仍在用 Excel 核对额度余量。
  buyingTrigger: "IPO 筹备周期、新开的 DLG 或仓库信贷额度，或董事会推动放款增长但不愿承担隐性资本风险的压力。"
  currentAlternative: "Excel 表格加放贷机构—合作方 MIS 导出数据、内部 BI 看板，以及人工资金管理电话会议。"
  switchingReason: >-
    这款路由器把一项缓慢的每周财务作业，变成了每日的记账指引，帮团队把每条资金渠道用得更满，同时不超出担保限额，
    也不用替换现有 LOS。
  pricingHypothesis: "年度平台费加上按分配引擎处理放款量计的基点定价。"
