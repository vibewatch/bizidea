jobsToBeDone:
  - job: >-
      当已批准贷款量开始超出单一资金渠道的承载力，帮我们的财务和风控团队把每笔贷款放到正确的账簿上，让我们能继续放款，
      而不会突破 DLG 或资本限额。
    currentAlternative: "Excel 表格模型加临时的资金管理电话会议"
    successMetric: "在不突破额度余量、不需人工返工的前提下达成的放款量"
  - job: >-
      当审计师、债务投资人或 IPO 承销商追问贷款为何这样入账时，帮我们的团队拿出一份可追溯的决策记录，让我们不用花几周
      手工核对就能完成尽调。
    currentAlternative: "从合作方 MIS、财务模型和核心信贷系统手工拉取数据"
    successMetric: "整理一份董事会材料或尽调回复所需的小时数"
