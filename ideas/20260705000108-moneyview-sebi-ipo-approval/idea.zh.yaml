differentiator: >-
  通用的 LOS 软件、BI 看板和资金管理工具，报告的都是已经发生的事，它们不会在放款前，按印度特有的 DLG 和自营账簿约束，决定一笔
  贷款该记在哪里。这家初创公司从第一天起就拿下这个决策层，内置项目规则引擎、余量预测和审计证据。随着时间推移，护城河来自
  合作方专属连接器、路由基准，以及跨多个资金账簿沉淀下来的收益、损失和担保消耗历史数据。
