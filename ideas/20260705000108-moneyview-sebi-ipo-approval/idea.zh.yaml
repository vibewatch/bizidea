topRisks:
  - name: "DLG 规则波动"
    description: "如果 RBI 指引或市场惯例快速改变 DLG 的经济模型，产品赖以切入的工作流可能随之改变。"
    mitigation: "把 DLG 建模为一个可配置的政策模块，并把同一路由器扩展到自营账簿、联合贷款和仓库信贷额度分配。"
  - name: "集成拖累"
    description: "LOS、合作方 MIS 和财务数据的混乱状态，可能让部署慢到无法证明投资回报。"
    mitigation: "先在一个产品和一条合作方额度上以只读推荐模式上线，再开启自动化或总账回写。"
  - name: "内部自建压力"
    description: "大型放贷机构可能试图用内部数据团队和看板重建这套产品。"
    mitigation: "靠更快的连接器覆盖、审计级决策日志和随客户数增长而增强的路由基准取胜。"
