slug: loan-book-router
date: '2026-07-05'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: 月
  source: '[BP date 2026-07-05] 经营模型从商业计划日期之后的第一个完整月份开始运行。'
- id: A2
  name: 期初现金与 Pre-seed 融资额
  value: '2000'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 基准情形采用区间下限，因为计划在第二年之前始终保持印度优先、创始人主导的打法。'
- id: A3
  name: M1 起始付费客户数（logo）
  value: '0'
  unit: 数量
  source: '[BP milestones 0–12 months] 第一年目标是签下付费影子试点、转化首批生产环境客户，而不是继承现成的客户基础。'
- id: A4
  name: 客户定义
  value: 一个付费放贷机构客户（logo），覆盖一个无抵押个人贷款工作流，无论处于试点转化阶段还是年度生产环境阶段。
  unit: 定义
  source: '[BP investorMemo firstCustomer + BP gtm pricing] 购买动机是面向单个放贷机构财务与风控团队的企业级、按客户（logo）计的销售。'
- id: A5
  name: 每个活跃客户的混合年收入
  value: '220.0'
  unit: USDK
  source: '[BP operatingAssumptions annual pricing of ₹1.5-2.5 crore + Research market.som] 22 万美元约合 1.8 千万卢比，处于已验证年度合同区间的中下段，为调研 SOM 情形留出上行空间。'
- id: A6
  name: 第一年每月新增付费客户数
  value: '[0, 0, 0, 1, 0, 0, 0, 1, 0, 0, 0, 1]'
  unit: 数量
  source: '[BP milestones 0–12 months + BP experimentRoadmap] 模型在第一年落地三个付费客户，与签下三个付费影子试点、并把其中两个转化为生产环境的计划一致。'
- id: A7
  name: 第二年每季度新增付费客户数
  value: '[0, 1, 0, 1]'
  unit: 数量
  source: '[BP milestones 12–24 months] 团队在第二年末达到 5 个付费客户，是既定 5-7 个生产环境客户里程碑区间的下限。'
- id: A8
  name: 第三年每季度新增付费客户数
  value: '[0, 1, 0, 1]'
  unit: 数量
  source: '[BP milestones 24–36 months + Research market.som] 模型到第三年第四季度达到 7 个付费客户，与调研测算的客户数 SOM 路径一致，但采用了比完整 SOM 情形更保守的 ACV。'
- id: A9
  name: 营收确认惯例
  value: 新客户在落地的当月或当季度贡献 50% 的期间 ARPU。
  unit: 公式
  source: 面向企业软件上线的创业财务经验法则；营收按平均活跃客户数建模，使损益表营收能与客户数和 ARPU 对应。
- id: A10
  name: 客户流失处理方式
  value: 36 个月基准情形中不设明确流失率；2.0% 的月流失率仅用于 LTV 和敏感性分析。
  unit: 政策
  source: '[BP investorMemo nextDiligence + Research openQuestions] 早期合同一旦嵌入使用流程应该有较高粘性，但长期留存仍存在足够的不确定性，因此单位经济模型中保留了非零流失假设。'
- id: A11
  name: COGS（销货成本）爬坡
  value: 第一年上半年 45%；第一年下半年 40%；第二年各季度 34%/33%/32%/31%；第三年各季度 30%/29%/28%/28%。
  unit: 占营收百分比
  source: '[BP businessModel targetGrossMarginPct 72 + BP operations + operatingAssumption first value under 45 days] 早期影子模式支持高度依赖人力服务，但连接器复用和标准化审计材料会让模型在第三年逐步逼近 70% 出头的毛利率目标。'
- id: A12
  name: 创始人/CEO 含税现金薪酬
  value: '120.0'
  unit: 千美元/年/FTE
  source: 面向拿到风险投资的金融科技创始人的创业财务经验法则：薪酬低于市场水平但仍以现金支付，同时承担创始人主导的企业销售工作。
- id: A13
  name: 工程团队含税现金薪酬
  value: '105.0'
  unit: 千美元/年/FTE
  source: 面向印度资深产品与数据集成工程人才的创业财务经验法则，已计入薪资相关负担成本。
- id: A14
  name: 产品/风控含税现金薪酬
  value: '126.0'
  unit: 千美元/年/FTE
  source: 面向在 DLG、NBFC 资本和覆核治理方面有深厚经验的信贷财务与风控产品负责人的创业财务经验法则。
- id: A15
  name: 解决方案/实施含税现金薪酬
  value: '84.0'
  unit: 千美元/年/FTE
  source: 面向负责跨客户 MIS 映射、连接器上线和审计材料搭建的实施人才的创业财务经验法则。
- id: A16
  name: 销售/GTM 含税现金薪酬
  value: '120.0'
  unit: 千美元/年/FTE
  source: 面向一名企业级金融科技销售人员的创业财务经验法则，薪酬中已包含差旅和合作方拓展成本。
- id: A17
  name: 招聘时间线
  value: 创始人和一名工程师从第 0 个月起步；产品风控负责人在第 2 个月加入；首位解决方案人员在第 5 个月加入；首位 GTM 人员在第 10 个月加入；第二名工程师在第 17 个月加入；第二名解决方案人员在第 19 个月加入；第三名工程师在第 29 个月加入。
  unit: 时间线
  source: '[BP team + BP strategicChoices sequencingRationale] 在扩大销售规模之前，先招聘规则、核对和实施方面的能力。'
- id: A18
  name: 薪资在损益表科目间的分配
  value: 创始人：60% 计入销售与市场（S&M）/ 15% 计入研发（R&D）/ 25% 计入行政管理（G&A）；工程团队：100% 计入研发；产品风控：15% 计入销售与市场 / 60% 计入研发 / 25% 计入行政管理；解决方案：20% 计入销售与市场 / 25% 计入研发 / 55% 计入行政管理；销售：100% 计入销售与市场。
  unit: 分配比例
  source: '[BP team rationales + BP operations] 该分配比例对应运营计划中谁负责销售、策略产品化、部署和合规支持。'
- id: A19
  name: 非薪资运营预算爬坡
  value: 第一年上半年月度非薪资预算为销售与市场/研发/行政管理各 6/9/10 千美元，下半年升至 9/10/11 千美元，到第三年下半年升至 15/15/16 千美元。
  unit: 千美元/月
  source: 创业财务经验法则，锚定商业计划所需的云基础设施、审计级日志、安全评审、法务与 RBI 合规工作、差旅以及合作方集成成本。
- id: A20
  name: 混合 CAC（获客成本）
  value: '145.2'
  unit: 千美元/每个落地客户
  source: 根据建模的销售与市场支出 101.62 万美元，除以第三年第四季度前落地的 7 个客户计算得出；由于包含了创始人主导销售和早期客户教育成本，该数字偏保守。
- id: A21
  name: 融资规模设定规则
  value: 按第三年验证目标加缓冲空间，设定 Pre-seed 轮融资规模，取区间下限。
  unit: 政策
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP milestones 24–36 months] 模型采用 200 万美元的融资额，保持在既定区间下限，同时资助 7 个客户的切口验证和一个相邻工作流试点。'
