scenarios:
  downside:
    description: 买家的定价停留在更偏向试点重的水平，第二年有一个生产环境转化延后，人工核对让毛利率被卡在 60% 出头。
    y3RevenueK: 855.0
    y3EbitdaK: -772.1
    cashLowPointK: -179.7
    keyAssumptionChanges:
    - 每个活跃客户的混合年收入降至 18 万美元，接近商业计划年度定价区间的下限，原因是试点周期拉长。
    - 第二年只新增一个客户，公司在第三年初仅有 4 个生产环境客户，年末为 6 个。
    - 由于数据清理和异常处理仍高度依赖人力服务，第三年毛利率只能达到约 68%。
  base:
    description: 基准情形定价保持在已验证区间的中下段，第二年末落地 5 个生产环境客户，随着连接器复用改善，第三年达到 7 个客户。
    y3RevenueK: 1265.0
    y3EbitdaK: -445.6
    cashLowPointK: 382.0
    keyAssumptionChanges:
    - 每个活跃客户的混合年收入维持在 22 万美元左右，约合 1.8 千万卢比，处于商业计划定价区间内，但低于调研 SOM 情形。
    - 第二年和第三年的新增客户都按 [0,1,0,1] 的节奏推进，到第三年第四季度末共有 7 个付费客户。
    - 随着连接器和审计工作流走向标准化，毛利率从第一年的约 55%-60% 提升到稳态的约 72%。
  upside:
    description: 案例客户和合作方引荐让试点转化更快，团队得以把定价拉近调研 SOM 情形，并在第三年多拿下一个客户。
    y3RevenueK: 1593.9
    y3EbitdaK: -182.5
    cashLowPointK: 756.3
    keyAssumptionChanges:
    - 随着客户更早采用更多资金账簿和使用费模式，每个活跃客户的混合年收入升至 25 万美元。
    - 第三年新增三个客户而非两个，到第三年第四季度末共有 8 个付费客户。
    - 由于连接器复用比计划更快地减少了人工路由支持，第三年第四季度毛利率达到约 74%。
sensitivity:
- variable: ARPU
  downsideCase: 每个活跃客户的混合年收入为 18 万美元。
  baseCase: 每个活跃客户的混合年收入为 22 万美元。
  upsideCase: 每个活跃客户的混合年收入为 25 万美元。
  y3RevenueImpactK: -230.0
  cashImpactK: -291.9
- variable: CAC
  downsideCase: 如果创始人主导销售、差旅和买家教育成本居高不下，CAC 为 18 万美元。
  baseCase: 根据建模的销售与市场支出计算，CAC 为 14.52 万美元。
  upsideCase: 若来自债务顾问、审计师和信贷科技合作方的引荐更强，CAC 可降至 12 万美元。
  y3RevenueImpactK: 0.0
  cashImpactK: -175.0
- variable: churn
  downsideCase: 相当于 4% 的月流失率，大致相当于前五个客户中有一个在第三年未能续约。
  baseCase: 2% 的月流失率仅用于 LTV 计算；经营模型本身不设明确流失率。
  upsideCase: 一旦路由能力嵌入财务和审计工作流，月流失率可降至 1%。
  y3RevenueImpactK: -220.0
  cashImpactK: -180.0
- variable: sales cycle
  downsideCase: 试点和年度转化比计划延后约一个季度。
  baseCase: 创始人主导的企业级销售，首个付费试点在第 4 个月落地，另外两个在第 12 个月前落地。
  upsideCase: 热情引荐让试点和年度转化提前约一个季度。
  y3RevenueImpactK: -55.0
  cashImpactK: -108.3
- variable: gross margin
  downsideCase: 由于路由建议仍高度依赖人力服务，稳态毛利率停滞在约 68%。
  baseCase: 稳态毛利率到第三年第四季度达到约 72%。
  upsideCase: 借助更干净的连接器和更少的人工异常处理，稳态毛利率达到约 74%。
  y3RevenueImpactK: 0.0
  cashImpactK: -49.0
- variable: hiring pace
  downsideCase: 在定价得到验证之前，就提前招入第二名工程师、第二名解决方案人员和增长岗位。
  baseCase: 招聘计划严格按里程碑推进，第三年中期仅新增一名工程师。
  upsideCase: 连接器复用让团队能把部分增长岗位的招聘延后到种子轮融资启动之后。
  y3RevenueImpactK: 0.0
  cashImpactK: -135.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetLenders --> PaidPilots
      PaidPilots --> ProductionLogos
      ProductionLogos --> PlatformAndUsageRevenue
      PlatformAndUsageRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: 营收引擎
  finding: 基准情形以 7 个付费放贷机构客户、每客户约 22 万美元的混合年收入，到第三年末达到 126.5 万美元营收——这处于商业计划定价区间内，但低于调研 SOM 情形。
- checkName: 必须成立的前提
  finding: 团队必须把首次价值部署周期控制在 45 天以内，才能让一名创始人主导的销售加一个解决方案小组，在第二年末把付费试点转化为五个生产环境客户。
- checkName: 模型的破发点
  finding: 如果定价滑向 18 万美元，且到第三年第四季度只有六个客户在线，下行情形会在公司赢得种子轮谈判筹码之前就转为现金为负。
- checkName: 支撑下一轮融资的证据
  finding: 一次可信的种子轮融资需要 7 个付费客户、约 72% 的稳态毛利率，以及至少一个已付费采用、能把市场拓展到个人贷款路由之外的相邻工作流。
sanityChecks:
  ruleOf40: 第三年增速 53.3% + EBITDA 利润率 -35.2% = 18.1%。
  burnMultiple: 第二年烧钱倍数约为 1.3 倍（对应 44 万美元净新增 ARR），第三年改善至约 1.0 倍。
  revenuePerFte: 第三年约为每 FTE 15.81 万美元，按 8 个期末 FTE 计算（对标基准为垂直 SaaS 的 20-40 万美元）。
  flags:
  - 基准情形按商业计划区间中下段设定定价，因此模型对买家能否真正从试点预算转化为 1.5 千万卢比以上的年度合同高度敏感。
  - 由于部署、异常处理和审计支持在第三年前仍高度依赖人力，每期末 FTE 的营收仍低于健康的垂直 SaaS 基准。
  - 经营模型在前 36 个月内不设明确的客户流失；如果前五个生产环境客户中有一个未能续约，现金压缩程度会比基准情形展示的更剧烈。
  - 调研测算的滩头 SAM 仅约 540 万美元，因此公司必须在扩充更大规模的 GTM 团队之前，证明联合贷款或仓库信贷额度分配等相邻工作流是可行的。
