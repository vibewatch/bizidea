slug: loan-book-router
date: "2026-07-05"
executiveSummary: >-
  Loan Book Router should be built as a finance-and-risk control layer for Indian
  personal-loan fintechs that already approve loans digitally but still decide
  in spreadsheets whether each approved cohort should sit on the captive NBFC
  book or a DLG-backed partner line. Moneyview's IPO filing and annual report
  make the pain concrete: fresh capital is being allocated separately to DLG
  disbursals and to Whizdm Finance, while RBI rules cap DLG cover and keep
  underwriting responsibility with the regulated entity. The first credible
  customer is therefore a Series C+ lender with a captive NBFC, 2-5 active
  partner programs, and a weekly disbursal committee that still reconciles
  headroom manually before approving daily pacing. The MVP should stay read-only:
  ingest approved-loan cohorts, partner rules, DLG utilization, and captive-book
  constraints, then recommend the best booking path and produce an audit-grade
  decision log rather than trying to replace the LOS. That sequencing matches
  the real buying trigger—IPO readiness, a new DLG line, or board pressure to
  grow disbursals without hidden capital risk—and it matches a founder-led sales
  motion into CFO/CRO buyers who already pay for adjacent lending
  infrastructure. The main reason to believe is that adjacent vendors sell
  origination, servicing, or credit-program plumbing, while this wedge owns the
  narrower but urgent decision of cross-book routing before disbursal. The main
  reason to doubt is that the research could not verify how many concurrent
  lines target lenders actually manage or whether they will pay enterprise
  software budgets before demanding deeper automation. Because the researched
  year-3 SOM is only about $1.9M on the initial beachhead, the company must
  treat personal-loan routing as a proof wedge and earn the right to expand
  into co-lending, warehouse lines, securitization readiness, and investor
  reporting.
problem:
  - "Lending finance teams at scaled Indian personal-loan fintechs still split approved loans across captive NBFC books and DLG-backed partner lines with spreadsheet models, MIS exports, and finance calls, which slows disbursal and obscures true headroom."
  - "RBI DLG constraints, higher unsecured-credit capital sensitivity, and IPO or audit scrutiny make a bad routing decision costly because it can breach guarantee caps, strand approval volume, or create weak evidence for bankers and auditors."
solution:
  - "Deploy a read-only capital router between approval and disbursal that ingests approved cohorts, partner program rules, DLG utilization, facility costs, vintage loss curves, and captive-NBFC capital constraints to recommend where each loan should sit."
  - "Turn each routing decision into a policy-linked audit log with exception handling, headroom forecasts, and board-ready reporting so finance and risk teams can defend allocation choices without replacing their LOS or GL."
whyWeWin:
  - "Incumbent LOS and digital-lending platforms report or originate loans, but their public positioning does not center on DLG burn forecasting, captive-versus-partner routing, or finance-grade decision logs at booking time."
  - "If the startup lands early, it compounds defensibility through partner-specific connectors, reusable policy templates, and a cross-book dataset on utilization, overrides, losses, and audit questions that any single lender lacks."
strategicChoices:
  beachhead: "Indian personal-loan fintechs with captive NBFC subsidiaries, 2-5 active DLG or partner lending lines, 500 crore+ annual unsecured disbursals, and a board-level push to professionalize daily book allocation."
  wedgeRationale: >-
    This is a better first market than all digital lenders or all credit
    products because the routing decision already exists, repeats daily, and is
    owned by a small executive group that feels both growth pressure and
    regulatory scrutiny. One finance-led workflow can show proof quickly: faster
    headroom decisions, fewer manual overrides, and cleaner audit evidence
    without asking the customer to rip out core lending systems.
  sequencingRationale: >-
    Start with one unsecured personal-loan product, shadow-mode
    recommendations, and weekly board-pack outputs before any write-back or
    auto-routing because integration risk and trust are the main adoption
    barriers. GTM stays founder-led into CFO/CRO buyers around IPO prep or new
    facility launches, while hiring prioritizes rules, data reconciliation, and
    implementation talent before a scaled sales team. Partnerships with audit,
    debt-advisory, and lending-stack vendors come after the first production
    proof point, when the product can demonstrate policy accuracy and
    deployment speed rather than just promise it.
  notYet:
    - "Credit underwriting or borrower acquisition optimization"
    - "Broad LOS replacement or end-to-end servicing workflows"
    - "Cards, merchant lending, or SME lending before unsecured personal-loan proof"
    - "Fully autonomous booking write-back without human approval thresholds"
market:
  tam: "$19.5M estimated TAM based on roughly 65 Indian digital personal-loan lenders with routing complexity and about ₹2.5 crore annual software spend."
  sam: "$5.4M estimated beachhead SAM based on about 18 scaled lenders with captive NBFC plus multi-line partner programs."
  som: "$1.9M estimated year-3 SOM based on 7 production logos at roughly ₹2.2 crore blended ARR."
  segments:
    - "Primary: Indian personal-loan fintechs with captive NBFC arms and multiple DLG or partner lending lines"
    - "Secondary: Indian co-lending, cards, and merchant-lending platforms that manage several funding books after the personal-loan wedge proves out"
  buyingProcess: >-
    The day-to-day champion is the Head of Lending Finance, treasury lead, or
    risk-operations leader, but the economic buyer is usually the CFO or CRO
    because the pain spans capital usage, governance, and audit readiness. The
    first contract is most likely triggered by IPO prep, a new DLG or warehouse
    facility, or a board mandate to increase disbursals without losing control,
    and it should start as a shadow-mode pilot on one product before converting
    to an annual operating subscription.
product:
  mvp: >-
    The MVP should ingest one lender's approved unsecured personal-loan cohorts,
    partner-line rules, DLG utilization, and captive-NBFC capital constraints,
    then generate daily shadow-mode routing recommendations, exception queues,
    and a traceable audit log for one disbursal committee. It should remain
    read-only, with manual approval and no LOS or GL write-back.
  sixMonth: "Deploy shadow-mode routing at 2-3 design partners for one loan product, support up to five funding books per customer, and ship daily headroom views plus weekly audit and board packs."
  twelveMonth: "Add hardened connectors for the most common LOS, partner MIS, and finance-data sources, plus override workflows, what-if simulations, and partner-level yield or loss calibration for production decisions."
  twentyFourMonth: "Expand from personal-loan routing into co-lending, warehouse-line allocation, securitization-readiness reporting, and conditional auto-routing for low-risk segments once policy trust is established."
  keyBets:
    - "Finance teams will buy a read-only recommendation layer before they approve a system that writes bookings back into production."
    - "One product and 2-5 funding lines are enough to prove measurable utilization and governance gains within one quarter."
    - "DLG and captive-book allocation logic can be productized as configurable policy rather than bespoke customer code."
    - "Expansion into adjacent funding lines is necessary to turn a narrow $5.4M SAM into a venture-scale company."
gtm:
  wedge: "Sell a shadow-mode loan-book router for one high-volume unsecured personal-loan program during IPO prep, a new DLG line launch, or a board-led capital-efficiency push, replacing weekly Excel reconciliation with daily routing guidance and audit evidence."
  channels:
    - "Founder-led direct sales to CFOs, CROs, and Heads of Lending Finance at Series C+ personal-loan fintechs"
    - "Warm introductions through fintech investors, debt advisors, IPO-readiness consultants, and audit firms already inside capital-raise or governance projects"
    - "Later co-sell with LOS, LMS, and lending-transformation vendors that already own system access but not routing policy"
  funnelTargets: "Target account→qualified discovery 25-35%, qualified discovery→paid shadow pilot 20-30%, pilot→annual production 50%+, production logo→second funding book or product expansion 60%+ within 12 months."
  pricing: "Start with a paid 8-12 week shadow-mode implementation for one loan product and 2-3 funding lines, then annual software priced as a platform fee by active funding books plus a basis-point usage fee on disbursal volume managed through the engine. This fits the buyer's budget logic because value shows up as higher facility utilization, lower manual reconciliation, and faster audit response, not seat count."
businessModel:
  revenueStreams:
    - "Annual platform subscription for routing policy, headroom monitoring, and audit logs"
    - "Implementation and data-mapping fees for the first product, partner lines, and finance connectors"
    - "Usage fees tied to managed disbursal volume or number of active funding books"
    - "Expansion modules for what-if simulations, investor reporting, and additional lending products"
  unitOfValue: "Active funding books and annual disbursal volume routed or monitored through the engine"
  targetGrossMarginPct: 72
  expansionLevers:
    - "Add more partner lines, captive entities, and loan products within the same lender"
    - "Upsell board reporting, securitization readiness, and scenario planning once routing data is trusted"
    - "Expand from DLG and captive routing into co-lending, warehouse lines, and collections-feedback optimization"
    - "Use audit, debt-advisory, and lending-stack partners to source multi-logo deployment patterns"
strategyMap:
  northStarMetric: "Monthly approved-loan disbursal volume routed through the engine with zero DLG or capital-policy breaches"
  inputMetrics:
    - "Qualified ICP accounts running weekly or daily manual allocation committees"
    - "Days from kickoff to first shadow-mode routing recommendation"
    - "Percentage of approved-loan volume covered by live policy rules and partner headroom data"
    - "Paid shadow pilot to annual production conversion rate"
    - "Average number of funding books or products expanded per production customer"
  moatsToBuild:
    - "Reusable policy library for DLG caps, captive-book constraints, partner headroom rules, and override governance"
    - "Partner-specific connectors and reconciliation logic spanning LOS, MIS, and finance ledgers"
    - "Cross-lender benchmark dataset linking route choice to utilization, losses, overrides, and audit-pack cycle time"
  killCriteria:
    - "Fewer than 6 of the first 15 qualified ICP interviews confirm recurring weekly or daily allocation work across multiple funding lines."
    - "Fewer than 2 of the first 4 paid shadow pilots convert to annual production within 6 months."
    - "Median time from kickoff to first usable routing recommendation exceeds 45 days across the first 3 deployments because data reconciliation is too messy."
    - "Buyers refuse to pay before full write-back automation, which would force deeper core-system integration than the pre-seed plan can support."
  mermaid: |
    flowchart LR
      Wedge[IPO-prep and new DLG line wedge] --> MVP[Read-only capital router]
      MVP --> Proof[Daily routing proof and audit packs]
      Proof --> Expansion[Co-lending and securitization control plane]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Strong workflow wedge and credible buyer pain, but conviction stays limited until deployment speed, ACV, and adjacent market expansion are proven."
    whyBelieve: "Research and the idea thesis both point to a real board-level workflow—placing approved loans across captive and DLG books—that current lending suites and internal spreadsheets do not own cleanly."
    whyDoubt: "The initial SAM is small and concentrated, and the research could not yet prove how many lenders feel this pain daily enough to pay enterprise software pricing."
    nextDiligence: "Win two paid shadow pilots with CFO or CRO sponsors and prove one converts to an annual contract while cutting manual allocation work and improving audit readiness."
  firstCustomer:
    title: "CFO or CRO at a Series C+ Indian personal-loan fintech"
    profile: "An Indian lender with a captive NBFC, 2-5 active partner lines, 500 crore+ annual unsecured disbursals, and a weekly disbursal committee still reconciling partner headroom in Excel."
    trigger: "IPO preparation, launch of a new DLG or warehouse line, or a board request to increase disbursals without hidden capital-risk drift."
    buyer: "CFO or Chief Risk Officer"
    initialContract: "₹40-75 lakh paid shadow-mode pilot for one product and 2-3 funding lines, credited toward a ₹1.5-2.5 crore annual contract plus usage once daily routing recommendations and one audit-ready board pack are live."
  mustBeTrue:
    - "At least one-third of qualified beachhead lenders must already manage multiple partner or captive books through spreadsheet-driven allocation committees."
    - "A read-only pilot must show measurable headroom, speed, or audit benefits before customers require production write-back."
    - "Target customers must support blended annual contract value in roughly the ₹1.5-2.5 crore range once one product and multiple funding lines are live."
    - "Routing rules across DLG and captive books must be configurable enough to reuse across customers rather than re-coded each time."
    - "The product must expand into adjacent funding-line workflows before the initial personal-loan beachhead saturates."
  diligenceQuestions:
    - "How many concurrent DLG sets, partner lines, and override decisions does a target lender actually manage each month?"
    - "Who signs the first budget: CFO, CRO, Head of Lending Finance, or a joint committee?"
    - "What source systems and data latency are required before one daily routing recommendation is trusted?"
    - "Will buyers accept pricing anchored to funding books plus routed volume, or do they prefer a fixed governance-software contract?"
    - "Which adjacent workflow—co-lending, warehouse lines, or securitization readiness—has the fastest pull after the first routing deployment?"
operatingAssumptions:
  - assumption: "Scaled personal-loan fintechs commonly manage 2-5 active partner or DLG lines alongside a captive NBFC book."
    basis: idea.yaml
    validationTest: "Review live treasury trackers or MIS exports from 5-7 target lenders and confirm at least 4 manage multiple concurrent funding books with recurring allocation decisions."
    decisionImpact: "If false, the reachable logo pool and wedge urgency are smaller than modeled, so the company must narrow ICP further or reprice as a lighter analytics product."
  - assumption: "CFO or CRO buyers will sign a paid shadow-mode pilot before full automation is available."
    basis: research.yaml
    validationTest: "Run 4 pilot proposals tied to IPO prep or new facility launches and confirm at least 2 buyers approve a paid read-only scope with named success criteria."
    decisionImpact: "If false, the roadmap must pull forward write-back, controls, and security work, increasing burn and delaying revenue."
  - assumption: "The product can reach first value from exports and read-only integrations in under 45 days."
    basis: research.yaml
    validationTest: "Measure kickoff-to-first-recommendation time across the first 3 deployments."
    decisionImpact: "If false, implementation becomes too services-heavy for target gross margins and founder-led GTM."
  - assumption: "Annual pricing of ₹1.5-2.5 crore plus light usage is acceptable once the engine covers one product and multiple lines."
    basis: research.yaml
    validationTest: "Budget interviews and 2 paid pilot conversion offers confirm at least one customer accepts pricing within the modeled band."
    decisionImpact: "If false, TAM, SAM, SOM, and the funding plan need to be reset downward."
  - assumption: "Adjacent expansion into co-lending, warehouse lines, and securitization reporting is real enough to justify venture backing beyond the initial beachhead."
    basis: idea.yaml
    validationTest: "In 10 customer and investor diligence calls, at least 5 rank one adjacent workflow as a funded next step after personal-loan routing."
    decisionImpact: "If false, investors should treat the business as a smaller vertical software company and keep burn discipline tighter."
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Interview 15 CFO, CRO, and Head of Lending Finance buyers at target lenders."
    hypothesis: "A meaningful subset already runs weekly or daily allocation committees across multiple funding books and sees the workflow as a board-level control problem."
    successMetric: "At least 8 interviews confirm recurring spreadsheet-based allocation work, and at least 5 share sample fields or process steps from the current workflow."
    owner: "Founder/CEO"
  - horizon: "0–90 days"
    experiment: "Run 2 concierge shadow-mode analyses using exported approval, partner MIS, and finance data from design partners."
    hypothesis: "Read-only routing recommendations can be generated from existing exports before deeper system integration."
    successMetric: "Two design partners receive usable daily routing outputs, and at least one exposes a headroom or override issue missed by the current process."
    owner: "Founding eng"
  - horizon: "90–180 days"
    experiment: "Close 2 paid shadow pilots tied to IPO prep, a new DLG line, or a new warehouse facility."
    hypothesis: "These trigger events are strong enough to convert discovery into paid pilots with CFO or CRO sponsorship."
    successMetric: "Two signed paid pilots with named executive sponsors and agreed conversion criteria to annual production."
    owner: "Founder/CEO"
  - horizon: "90–180 days"
    experiment: "Test pricing and procurement with 4 production-conversion offers."
    hypothesis: "Buyers will accept a platform fee plus routed-volume pricing once the pilot proves control and utilization value."
    successMetric: "At least 2 buyers accept pricing in the modeled band or counter within the same order of magnitude."
    owner: "Founder/CEO"
  - horizon: "180–360 days"
    experiment: "Productize connectors and exception workflows across the first 3 live accounts."
    hypothesis: "The company can standardize onboarding enough to deliver first value in 45 days or less without becoming a services business."
    successMetric: "Median time from kickoff to first routing recommendation is 45 days or less, with fewer than 20% manual data corrections after week 4."
    owner: "Solutions and implementation engineer"
  - horizon: "180–540 days"
    experiment: "Pilot one adjacent module such as co-lending or warehouse-line scenario planning with an existing customer."
    hypothesis: "The same data model and policy engine can support a paid second workflow beyond DLG and captive routing."
    successMetric: "One production customer signs an expansion fee or LOI for the adjacent workflow."
    owner: "Lending finance and risk product lead"
operations:
  - "Run daily data reconciliation and exception monitoring across partner MIS, LOS, and captive-NBFC finance feeds before routing outputs are released."
  - "Version every policy rule, override, and board-approved exception so auditors can trace a booking decision to source data and approval context."
  - "Package onboarding around one product, one committee cadence, and a small set of funding books before expanding scope."
  - "Coordinate with audit, debt-advisory, and lending-stack partners only after the first production workflow is referenceable."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, design-partner selection, and pricing because the main risk is whether this workflow earns a standalone budget from CFO or CRO buyers."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the routing engine, audit log, and first ingestion layer that determine time to first recommendation."
  - role: "Lending finance and risk product lead"
    startTiming: "Month 1-3"
    rationale: "Translate DLG policy, captive-book constraints, and override governance into configurable product rules instead of bespoke customer logic."
  - role: "Solutions and implementation engineer"
    startTiming: "Month 4-6"
    rationale: "Shorten data mapping, connector setup, and deployment time across the first customer cohort."
  - role: "GTM and partnerships lead"
    startTiming: "Month 9-12"
    rationale: "Scale referrals from debt advisors, auditors, and lending-stack partners only after the first production proof point exists."
milestones:
  - horizon: "0–12 months"
    items:
      - "Validate the buying trigger, workflow cadence, and data requirements with 15 target lenders."
      - "Sign 3 paid shadow pilots and convert at least 2 to annual production."
      - "Deliver one referenceable daily routing workflow covering a captive NBFC plus multiple partner lines."
      - "Prove first-value deployment in 45 days or less across the first 3 accounts."
  - horizon: "12–24 months"
    items:
      - "Reach 5-7 production logos in the beachhead and expand at least 2 customers to additional funding books or products."
      - "Ship common connectors, override governance, and board or diligence reporting as standard modules."
      - "Launch one audit or debt-advisory referral channel and one lending-stack co-sell motion."
      - "Pilot one adjacent workflow such as co-lending or warehouse-line allocation."
  - horizon: "24–36 months"
    items:
      - "Reach the researched year-3 SOM target of about 7 production logos and roughly $1.9M ARR if ACV assumptions hold."
      - "Expand beyond personal loans into at least one adjacent funding-line workflow with paid adoption."
      - "Build benchmark datasets for headroom utilization, override frequency, and audit-pack cycle time."
      - "Decide whether market expansion is strong enough to support a seed-to-series path or whether the company should stay a focused vertical platform."
risks:
  - risk: "The number of target lenders with real daily routing pain may be smaller than modeled."
    likelihood: High
    impact: High
    mitigation: "Validate the workflow quickly with real treasury trackers, keep the beachhead narrow, and test adjacent funding-line use cases before scaling burn."
  - risk: "Data reconciliation across LOS, partner MIS, and captive-NBFC ledgers could make deployment slow and services-heavy."
    likelihood: Medium
    impact: High
    mitigation: "Start in read-only mode on one product, standardize the first connectors aggressively, and hire implementation talent before scaling sales."
  - risk: "Large lenders may extend internal BI or ask incumbent lending-stack vendors to replicate basic routing logic."
    likelihood: Medium
    impact: Medium
    mitigation: "Differentiate on reusable policy models, audit-grade decision logs, and multi-lender benchmarks, while integrating with core-stack vendors instead of trying to replace them."
  - risk: "RBI or market practice changes could reduce the importance of DLG as the entry workflow."
    likelihood: Medium
    impact: High
    mitigation: "Keep the policy layer configurable and expand quickly into captive-book, co-lending, and warehouse-line allocation so the business is not pinned to one rule set."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "18 months to fund a small founding team, ship the read-only router, complete 3 paid shadow pilots, convert at least 2 production customers, standardize the first connectors, and validate whether adjacent funding-line workflows can expand the market beyond the initial personal-loan wedge."
