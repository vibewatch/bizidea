jobsToBeDone:
  - job: When paid acquisition is outperforming plan, help a virtual-clinic CFO fund the next growth tranche without dilution, so they can scale revenue before the next board financing.
    currentAlternative: Venture equity or slowing spend to available cash
    successMetric: Additional approved marketing budget with sub-12-month payback
  - job: When a capital partner wants exposure to cash-pay healthcare growth, help an investment team underwrite prescription cohorts and monitor risk, so they can deploy non-dilutive capital safely.
    currentAlternative: Generic revenue-based financing diligence or passing on the sector
    successMetric: Loss rate and repayment speed by funded cohort
