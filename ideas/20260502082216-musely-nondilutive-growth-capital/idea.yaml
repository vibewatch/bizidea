topRisks:
  - name: Regulatory shock
    description: Changes to compounded-telehealth rules could suddenly reduce demand or impair repayment across funded clinics.
    mitigation: Start with diversified exposure across dermatology, hair, and menopause operators and embed compliance gating into underwriting.
  - name: Channel volatility
    description: A Meta or Google algorithm change can quickly break cohort payback assumptions.
    mitigation: Monitor cohorts daily, cap exposure by channel, and release capital in tranches tied to performance.
  - name: Adverse selection
    description: The clinics most eager for non-dilutive capital may be the ones with weakening retention or poor data quality.
    mitigation: Require direct system integrations, begin with small pilot limits, and price only on verified collections and refill behavior.
