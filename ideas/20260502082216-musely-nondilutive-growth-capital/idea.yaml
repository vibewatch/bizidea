problem: Cash-pay virtual clinics with strong unit economics still fund growth with founder dilution, blunt revenue-based financing, or self-imposed marketing caps. Traditional lenders do not understand prescription refill persistence, channel-level CAC, or compliance risk, so good operators get the same terms as weak ones. That leaves profitable care businesses undercapitalized exactly when paid acquisition is working.
targetUser:
  primary: CFOs and VPs of Growth at U.S. cash-pay virtual clinics selling compounded dermatology, hair-loss, or menopause subscriptions.
  secondary: Heads of finance at compounding-pharmacy-backed digital health brands expanding paid acquisition.
  buyer: CFO or CEO
startupThesis:
  nonObviousInsight: The breakthrough is not more telehealth demand but that repeat prescription cohorts plus ad-attribution data now make customer acquisition in cash-pay care financeable as an asset class. Musely's CVF deal suggests large pools of capital want this exposure, but most clinics lack the data plumbing and monitoring needed to qualify.
  beachhead: U.S. virtual dermatology and menopause clinics with $10M-$100M annualized revenue that spend heavily on Meta and Google to acquire patients into recurring compounded-treatment programs.
  wedge: An underwriting and monitoring layer that connects ad platforms, clinic operations, pharmacy fill data, and collections to issue capped revenue-share acquisition lines.
  whyNowCatalyst: Musely's non-dilutive CVF financing proves that scaled consumer-health acquisition is now credible collateral for institutional capital.
  ventureScalePath: Start as the capital OS for cash-pay telehealth brands, then expand into a network for pharmacy benchmarking, category-specific underwriting, embedded purchasing finance, and secondary capital markets for care cohorts.
solution: Telehealth Cohort Capital plugs into a clinic's ad accounts, patient acquisition funnel, prescribing workflow, pharmacy fulfillment, and repayment data to score each growth cohort before funding it. The first product is a non-dilutive acquisition line that advances budget for specific campaigns and gets repaid through a capped share of collected cohort revenue. The software continuously monitors refill persistence, refund rates, and compliance signals, then automatically adjusts draw limits as performance changes. That gives capital partners a live underwriting dashboard and gives clinics faster, cheaper funding than equity or generic revenue-based financing. Over time, the company becomes the system of record for how cash-pay care cohorts are priced.
goToMarketSeed:
  firstCustomer: A U.S. virtual dermatology brand with 50,000 or more active patients, $20M-$80M annualized revenue, and heavy paid acquisition into compounded melasma or hair-loss subscriptions.
  buyingTrigger: The clinic finds a paid channel or new care category with attractive payback but wants to scale it without raising an equity round.
  currentAlternative: Venture equity, generic revenue-based financing, or throttling ad spend to match internal cash flow.
  switchingReason: The wedge wins because it underwrites on refill cohorts and prescription collections instead of broad revenue history, so strong operators can unlock larger limits with less dilution and tighter feedback loops.
  pricingHypothesis: 2% to 4% platform fee on committed capital plus a capped revenue share until 1.2x to 1.5x repayment.
