    isEstimate: true
    sourceRefs:
    - 3
    - 9
    - 11
    - 14
  som:
    value: $12.0M
    rationale: 第 3 年可达的已融资体量，假设届时有 4-6 家真实诊所客户，每家在保守 draw 限额和试点爬坡下，平均每年使用约 $2M-$3M 的额度。
    isEstimate: true
    sourceRefs:
    - 1
    - 17
    - 20
bottomUpSizingDrivers:
- driver: 总可触达单位数
  value: 约 30 家美国现金支付、可持续复购的皮肤/毛发/更年期虚拟诊所（估算）
  source: calc from [1], [3], [9], [11], [14]
- driver: 目标诊所平均年收入
  value: 估算为 $65M
  source: benchmark versus scaled public comparator economics [2][3]
- driver: 付费获客强度
  value: 基准情景为收入的 30%
  source: Hims & Hers 2025 marketing expense / revenue from SEC facts [2]
- driver: 第 3 年可达诊所数
  value: 4-6 家活跃已融资诊所
  source: est.; pilot-based GTM and conservative capital partner ramp [1][17][20]
categoryDynamics:
  growthRate: 17.9% CAGR（作为 2025-2030 年 teledermatology 市场的交叉验证）
  growthRateSourceRefs:
  - 4
  tailwinds:
  - point: 机构资本正在验证非稀释医疗增长融资，Musely 的 CVF 额度和 General Catalyst 更广义的医疗资本战略就是明证。
    sourceRefs:
    - 1
    - 24
    - 25
  - point: '虚拟护理已经进入主流：Rock Health 表示，2023 年有 76% 的受访者曾使用过虚拟护理。'
    sourceRefs:
    - 6
  - point: 女性健康的需求和资本流仍然可观；Rock Health 表示，women+ health 创业公司在 2020-2024 年间融资 $4.1B。
    sourceRefs:
    - 7
  headwinds:
  - point: 与处方相关产品的广告和定向限制，会让获客更不稳定、合规压力更大。
    sourceRefs:
    - 21
    - 22
  - point: 连上市远程医疗公司自己，也把个性化产品和监管解释变化列为风险。
    sourceRefs:
    - 3
  - point: 仍有一部分消费者更偏好线下诊疗，这会限制某些品类的天花板。
    sourceRefs:
    - 6
competitors:
- name: General Catalyst Customer Value Fund / 定制化机构资本
  stage: incumbent
  wedge: 面向头部品牌的大额、定制化非稀释融资额度。
  pricing: 定制交易条款；Musely 这笔额度被描述为非稀释，并与客户获取挂钩。
  strength: 资产负债表规模大，且愿意设计复杂定制结构。
  weaknessVsUs: 不是面向中型诊所的产品化承保与监控层。
  sourceRefs:
  - 1
  - 24
- name: Capchase
  stage: scale-up
  wedge: 带系统集成和灵活提用机制的 CAC / SaaS 融资。
  pricing: 公开网站未披露，属定制报价。
  strength: 融资工作流强，且 GTM 导向明确。
  weaknessVsUs: 公开材料看不出其围绕处方续方或合规做过医疗专用承保。
  sourceRefs:
  - 17
- name: Wayflyer
  stage: scale-up
  wedge: 面向品牌、Amazon 卖家和批发商的快速电商融资。
  pricing: 融资范围 $5K-$20M。
  strength: 审批速度快，且在消费品牌里分发能力强。
  weaknessVsUs: 风险模型服务的是商家/电商，不是远程医疗处方和回款。
  sourceRefs:
  - 18
- name: Clearco
  stage: scale-up
  wedge: 通过 rolling、fixed、cash-advance 和 invoice 产品提供灵活电商融资。
  pricing: 定制；官网强调结构灵活且提前还款无罚金。
  strength: SMB 品牌认知高，历史投放规模大。
  weaknessVsUs: 即便在健康与 wellness 垂直页，其公开承保逻辑仍是电商，不是护理 cohort 风险。
  sourceRefs:
  - 19
- name: Pipe
  stage: scale-up
  wedge: 基于数据驱动准入和多次提用机制的嵌入式资本基础设施。
  pricing: 由平台/合作方主导，经济条款定制。
  strength: 资本产品基础设施强，且擅长交易数据承保。
  weaknessVsUs: 其平台模式并非专为诊所运营者、续方行为或远程医疗合规而设计。
  sourceRefs:
  - 20
regulatoryTechnicalConstraints:
- point: 围绕个性化产品、复方配制和远程医疗销售/营销的规则或执法变化，可能突然损伤诊所需求或还款表现。
  sourceRefs:
  - 3
- point: Google 把在线药房和远程医疗提供方视作受监管的处方药服务广告主，因此需要额外合规，并限制可投放词汇。
  sourceRefs:
  - 21
- point: 敏感类别的个性化广告受到定向限制，会直接削弱健康产品的付费获客效率。
  sourceRefs:
  - 22
- point: FTC 要求健康主张必须有足够且可靠的证据支持，这会限制已融资活动可使用的创意与话术。
  sourceRefs:
  - 23
- point: 承保必须拿到广告、临床、履约和回款系统的可靠集成；如果遥测不干净，风险模型就站不住。
  sourceRefs:
  - 3
  - 17
  - 20
validationSignals:
- point: Musely 从 GC 的 Customer Value Fund 获得了超过 $360M 的非稀释资本，用来为客户获取融资。
  sourceRefs:
  - 1
- point: Hims & Hers 在 2025 年实现收入 $2.35B、营销支出 $919.3M，年末约有 2.511M 订阅用户，说明规模化的现金支付远程医疗经济性真实存在。
  sourceRefs:
  - 2
  - 3
- point: Rock Health 表示，美国数字健康融资在 2025 年达到 $14.2B，同比 2024 年增长 35%。
  sourceRefs:
  - 5
- point: Evernow 表示其已服务 160,000+ 女性，并同时提供会员制和按次收费的更年期护理。
  sourceRefs:
  - 9
  - 10
- point: Midi 把更年期护理打成保险覆盖服务，并向雇主宣讲更年期症状管理不足带来的 $24.8B 可量化负担。
  sourceRefs:
  - 11
  - 12
  - 13
- point: 通用融资提供方已经在公开市场上销售 CAC 融资、电商增长融资和多次提用资本产品，说明更广泛的非稀释增长融资需求已经被验证。
  sourceRefs:
  - 17
  - 18
  - 19
  - 20
openQuestions:
- 有多少家 $10M-$100M 收入带的美国皮肤/毛发/更年期诊所，愿意为承保开放广告、开方、药房和回款数据的只读访问？
- 扣除退款和合规事件影响后，按适应症、渠道和药房伙伴拆分的已融资 cohort，还款与违约行为究竟如何？
- 早期资本合作方更偏好表内产品、白标承保 OS，还是由创业公司承担 first-loss 的联合承保模式？
- 相比标准品牌药或仿制药处方，滩头市场对个性化或复方治疗的品类监管冲击暴露有多大？
