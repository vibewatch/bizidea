      rationale: 替代方案很多：风险投资股权、内部现金流、定制化机构额度以及通用收入融资，都在满足同一种预算需求。
      sourceRefs:
      - 1
      - 17
      - 18
      - 19
      - 20
      - 24
    competitiveRivalry:
      score: 4
      rationale: 竞争程度不可忽视，因为已有多种非稀释性资本产品在争夺高增长企业，即便其中还没有真正针对处方队列授信做优化的产品。
      sourceRefs:
      - 17
      - 18
      - 19
      - 20
  pestle:
  - factor: 政治
    impact: 中性
    point: 医疗监管和数字药房审查提高了尽调负担，但也能劝退不够严肃的进入者。
    sourceRefs:
    - 3
    - 23
  - factor: 经济
    impact: 正面
    point: 美国数字健康融资在 2025 年回升至 $14.2B，加上非稀释性资本需求上升，共同支持了这一类别的形成。
    sourceRefs:
    - 1
    - 5
  - factor: 社会
    impact: 正面
    point: 虚拟医疗的使用已趋于主流，而面向女性的数字健康采用度仍在持续加深。
    sourceRefs:
    - 6
    - 7
    - 12
  - factor: 技术
    impact: 正面
    point: 数据丰富的授信、系统集成和多次提款资本产品，使实时队列监控比早期 RBF 周期更可行。
    sourceRefs:
    - 3
    - 17
    - 20
  - factor: 法律
    impact: 负面
    point: 健康宣称必须有充分依据，而与处方相关方案的广告和个性化投放也受到限制。
    sourceRefs:
    - 21
    - 22
    - 23
  adoptionFrictionMatrix:
  - friction: 将广告、处方、履约和回款系统直接打通
    severity: 高
    affectedBuyer: CFO / 增长负责人
    mitigation: 从一套诊所系统栈开始，并要求在授信前完成只读集成。
    sourceRefs:
    - 3
    - 17
    - 20
  - friction: 针对个性化或处方相关获客活动的合规审查
    severity: 高
    affectedBuyer: CEO / 合规负责人
    mitigation: 嵌入活动级政策检查，并按适应症/渠道设置保守提款上限。
