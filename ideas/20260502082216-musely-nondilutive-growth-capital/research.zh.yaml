      - 18
      - 19
      - 20
  pestle:
  - factor: 政治
    impact: neutral
    point: 医疗监管和数字药房审查提高了尽调门槛，但也会把不够认真的新进入者挡在门外。
    sourceRefs:
    - 3
    - 23
  - factor: 经济
    impact: positive
    point: 美国数字健康融资在 2025 年回升到 $14.2B，再加上非稀释资本需求抬头，都有利于这个品类成形。
