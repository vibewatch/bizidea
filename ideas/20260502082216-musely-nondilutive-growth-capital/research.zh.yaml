    - 22
    - 23
  adoptionFrictionMatrix:
  - friction: 需要把广告、开方、履约和回款数据直接接进来
    severity: high
    affectedBuyer: CFO / 增长负责人
    mitigation: 先从一套诊所系统栈起步，并在承保前强制要求只读集成。
    sourceRefs:
    - 3
    - 17
    - 20
  - friction: 个性化或处方相关获客活动需要更严格的合规审查
    severity: high
    affectedBuyer: CEO / 合规负责人
    mitigation: 把活动级政策校验嵌进流程，并按适应症/渠道设置保守的 draw 上限。
    sourceRefs:
    - 21
    - 22
    - 23
  - friction: 第一年缺少足够多的参考客户
    severity: medium
    affectedBuyer: 资本合作方
    mitigation: 先与 1-2 家规模化诊所跑试点，并尽快发布损失/还款曲线。
    sourceRefs:
    - 1
    - 5
  - friction: 现有的股权和通用融资替代方案已经很多
    severity: medium
    affectedBuyer: CFO
    mitigation: 把价格锚定在已验证的 cohort 表现和更快的 redraw 上，而不是只比拼名义额度大小。
    sourceRefs:
    - 17
    - 18
    - 19
    - 20
market:
  tam:
    value: $0.6B
    rationale: '自下而上的年度可融资获客体量：30 家目标美国诊所 × 平均收入 $65M × 30% 付费获客强度 = 约 $585M，向上取整到 $0.6B；30% 低于 Hims & Hers 在 2025 年的营销/收入比，也与 Musely 用大额额度专门做获客的事实一致。'
    isEstimate: true
    sourceRefs:
    - 1
    - 2
    - 3
