slug: telehealth-cohort-capital
date: '2026-05-02'
executiveSummary: >-
  Telehealth Cohort Capital is a non-dilutive growth-finance platform for U.S. cash-pay virtual clinics that acquire patients online into recurring prescription programs. The beachhead is virtual dermatology, hair-loss, and menopause clinics with $10M-$100M in annualized revenue, meaningful Meta/Google spend, and refill behavior that can be observed at the cohort level. The product combines read-only data integrations, cohort underwriting, and capped revenue-share facilities so a clinic CFO can scale a working channel without raising equity or flattening spend to internal cash flow. Research supports the customer pain and timing: Musely's $360M Customer Value Fund facility shows institutional appetite for financing virtual-clinic acquisition, while Hims-scale marketing spend and subscriber data show that large recurring cash-pay cohorts exist. The company's advantage is not cheaper money alone but better underwriting on prescription persistence, collections, refunds, and compliance-adjusted channel performance. The first proof point is a pilot with one scaled clinic and one capital partner that demonstrates verified cohort telemetry can support faster redraws and acceptable loss behavior. The biggest disconfirming risk is that target clinics will not share direct access to ad, prescribing, pharmacy, and collections systems, in which case the product collapses into generic revenue-based financing. Market size estimates are based on research assumptions rather than audited industry counts, so the company should treat TAM, SAM, and SOM as testable planning ranges, not facts.
problem:
  - Cash-pay virtual clinics with strong payback still choose between founder dilution, generic revenue-based financing priced on trailing revenue, or throttling acquisition to internal cash flow.
  - Traditional lenders and generic financiers do not underwrite refill persistence, pharmacy fulfillment, refunds, or telehealth compliance risk, so strong operators are priced like weak ones.
solution:
  - Offer a cohort-specific acquisition line that plugs into ad accounts, prescribing workflow, pharmacy fulfillment, and collections data, then advances capital against verified recurring-care cohorts.
  - Monitor refill persistence, collected revenue, refund rates, and policy/compliance signals continuously so draw limits and pricing can be adjusted before losses compound.
whyWeWin:
  - The wedge underwrites the repayment engine itself—prescription cohorts and collected revenue—rather than broad historical revenue, which should produce better selection and pricing for the best operators.
  - Proprietary cross-clinic benchmarks on channel CAC, refill persistence, and compliance-adjusted repayment can compound into a dataset generic RBF players do not have.
strategicChoices:
  beachhead: U.S. cash-pay virtual dermatology, hair-loss, and menopause clinics with $10M-$100M annualized revenue, recurring prescription programs, and heavy paid acquisition into cash-collected cohorts.
  wedgeRationale: This slice is narrow enough to produce comparable cohort data quickly, has visible patient cash-pay pricing, and already shows institutional demand for acquisition finance; a broader telehealth entry would add insurance complexity and weaker repayment telemetry.
  sequencingRationale: Start with manual underwriting plus read-only integrations for one clinic system stack, prove loss and redraw behavior on a small pilot facility, then add automation, benchmarks, and additional capital partners only after the core risk model is trusted.
  notYet:
    - Insurance receivables financing for mixed-payor clinics.
    - Broader specialties such as weight loss, primary care, or employer-sponsored virtual care.
    - International expansion or a balance-sheet-heavy lending model.
market:
  tam: $0.6B estimated annual financeable acquisition volume across roughly 30 U.S. recurring cash-pay virtual clinics in derm, hair, and menopause care.
  sam: $0.2B estimated annual volume in the initial beachhead of roughly 12-15 data-ready clinics in derm, hair, and menopause care.
  som: $12.0M estimated year-3 funded volume from 4-6 live clinic customers using roughly $2M-$3M each in annual facility utilization.
  segments:
    - Primary segment is CFOs and CEOs at U.S. cash-pay virtual clinics with recurring prescription revenue and meaningful paid acquisition.
    - Secondary segment is specialty capital providers seeking healthcare exposure without building telehealth-specific underwriting operations.
  buyingProcess: The sale begins when a CFO or VP of Growth sees a paid channel or new care category with attractive payback but lacks balance-sheet capacity to scale it. A credible deal requires diligence across historical cohorts, read-only system access, compliance review, and alignment with the clinic CEO/CFO plus an external capital partner.
product:
  mvp: >-
    The MVP is a manual-underwriting platform with read-only integrations to Meta/Google, one clinic operations stack, pharmacy fill data, and collections data, plus a cohort dashboard and capped revenue-share contract workflow. It should support pilot facility sizing, daily monitoring, and redraw decisions, not full self-serve onboarding.
  sixMonth: Sign 2 design-partner clinics, complete one production-grade data pipeline, backtest 12+ months of cohort curves by indication and channel, and close the first pilot facility with conservative tranche-based draw controls.
  twelveMonth: Launch live monitoring for 3-4 funded cohorts, automate exception alerts for CAC, refunds, and refill decay, and produce the first benchmark report that helps a second capital partner underwrite the asset class.
  twentyFourMonth: Expand beyond the first clinic stack and first specialty mix, introduce faster redraws and partner reporting APIs, and become the default underwriting layer for multiple non-dilutive capital providers in cash-pay specialty telehealth.
  keyBets:
    - Read-only integrations can be implemented fast enough to keep underwriting cycle time below 30 days.
    - Cohort-level collections and refill curves remain more predictive of repayment than trailing-revenue lender inputs.
    - Capital partners will accept a software-plus-co-underwriting model before the company has multi-year loss history.
gtm:
  wedge: "Founder-led outbound to scaled cash-pay clinic CFOs with a specific offer: replace generic RBF or delayed equity with a pilot acquisition line for one channel-category cohort, priced on verified cohort performance and converted to a larger multi-draw facility after two on-plan repayment cycles."
  channels:
    - Founder/CFO outbound into scaled virtual clinics.
    - Referral partnerships with pharmacy, payments, and analytics providers that can verify fill and collections data.
    - Capital-partner co-selling once the first pilot loss curves and redraw metrics exist.
  funnelTargets: "Target 20-30% of targeted accounts to enter diligence, 40-50% of diligence accounts to grant data-room access, 50%+ of pilots to convert to production facilities, and 70%+ of production customers to take a redraw within 6 months."
  pricing: 2%-4% platform fee on committed capital plus a capped revenue share until 1.2x-1.5x repayment, because the product is replacing dilution and generic RBF while charging on the financed acquisition asset rather than software seats.
businessModel:
  revenueStreams:
    - Platform fees on committed pilot and production facilities.
    - Revenue-share spread or underwriting economics on funded cohorts.
    - Monitoring and reporting fees from capital partners using the underwriting layer.
  unitOfValue: Dollars of financed acquisition cohorts under active monitoring.
  targetGrossMarginPct: 70
  expansionLevers:
    - Increase facility utilization and redraw frequency within each clinic after early cohorts perform.
    - Add adjacent cash-pay specialties only after benchmark depth exists in the beachhead.
    - License monitoring and benchmark data to additional capital partners without owning all deployed capital.
strategyMap:
  northStarMetric: Annualized performing funded volume tied to verified collected cohort revenue.
  inputMetrics:
    - Number of clinics granting direct data access.
    - Median days from first meeting to funded pilot.
    - Cohort payback period by channel and indication.
    - Pilot-to-production conversion rate.
    - Loss rate and refund-adjusted repayment speed on funded cohorts.
  moatsToBuild:
    - Cross-clinic benchmark dataset on refill persistence, refunds, and channel-level repayment.
    - Compliance-adjusted underwriting rules linked to therapy type and acquisition channel.
    - Embedded distribution through pharmacy, analytics, and capital-provider partners.
  killCriteria:
    - Fewer than 3 of the first 15 target clinics grant usable read-only system access.
    - Pilot cohorts show payback beyond 12 months or repayment below 1.1x on target pricing.
    - No capital partner commits a pilot facility after two completed backtests and one live clinic integration.
  mermaid: |
    flowchart LR
      Wedge[Derm or menopause clinic CFO with a working paid channel] --> MVP[Read-only integrations plus manual cohort underwriting]
      MVP --> Proof[First pilot facility with verified redraw and loss data]
      Proof --> Expansion[More clinic stacks, more capital partners, broader specialty coverage]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong wedge and real market signal, but conviction stays limited until the company proves privileged data access and one functioning capital partnership.
    whyBelieve: Musely's facility and generic growth-finance incumbents show that acquisition finance demand exists, while this startup targets an underwriting gap those players do not publicly solve.
    whyDoubt: The business fails if mid-market clinics will not expose enough operational and financial telemetry to support differentiated underwriting under regulatory volatility.
    nextDiligence: Secure two clinic data-room pilots and one signed pilot capital partner term sheet, then measure whether backtested cohort curves support the proposed pricing.
  firstCustomer:
    title: CFO of a U.S. virtual dermatology or menopause clinic scaling paid acquisition into recurring compounded-care subscriptions.
    profile: A $20M-$80M annualized-revenue clinic with 50,000+ active patients, heavy Meta/Google spend, and enough refill history to compare cohorts by indication and channel.
    trigger: A paid channel or new care category is showing attractive payback, but the company wants to scale now without raising equity or starving other operating budgets.
    buyer: CFO or CEO
    initialContract: $250k-$1M pilot facility for one channel-category cohort with tranche-based draws and 90-day monitoring, converting to a $2M-$5M multi-draw annual line after two on-plan cohort cycles.
  mustBeTrue:
    - At least 5 of the first 10 serious target clinics will grant read-only access to ad, prescribing, pharmacy, and collections systems during diligence.
    - Historical cohort data from at least 3 clinics will show refill and collection behavior predictive enough to price a 1.2x-1.5x capped repayment product.
    - One external capital partner will fund a pilot facility without requiring the startup to carry the full balance sheet.
    - Clinics will prefer cohort-priced acquisition capital over generic RBF or delayed equity at the proposed fee and repayment structure.
    - Compliance or ad-policy changes will be manageable through repricing and tranche controls rather than causing broad facility freezes.
  diligenceQuestions:
    - Which clinic systems and pharmacy partners are present in the first two pilots, and how long does each integration take?
    - What do 12-month cohort curves show for CAC, refill decay, refunds, and collected revenue by indication and channel?
    - "Who absorbs first-loss risk in the pilot structure: the startup, the capital partner, or the clinic through pricing and holdbacks?"
    - How concentrated is early repayment exposure in therapies or marketing claims facing compounding or telehealth scrutiny?
    - What advantage will stop Capchase, Pipe, or a bespoke fund from copying the workflow once the asset class is legible?
  riskHeatmap:
    - risk: Regulatory or enforcement changes around compounding, personalization, or telehealth marketing reduce cohort demand or repayment.
      likelihood: High
      impact: High
      leadingIndicator: One or more pilot clinics show rising refund rates, discontinued campaigns, or legal review delays tied to therapy-specific marketing or fulfillment changes.
      mitigation: Start with diversified exposure across derm, hair, and menopause categories, embed compliance gating into underwriting, and cap exposure by therapy and channel.
    - risk: Paid-channel volatility breaks CAC and payback assumptions faster than facilities can be repriced.
      likelihood: High
      impact: High
      leadingIndicator: CAC rises or conversion drops outside agreed guardrails for two consecutive weekly cohort reviews.
      mitigation: Release capital in tranches, monitor cohorts daily, and freeze or reduce draws when payback moves outside approved bands.
    - risk: Adverse selection leads the earliest clinics seeking capital to have poor retention or unreliable telemetry.
      likelihood: Medium
      impact: High
      leadingIndicator: Diligence pipelines show incomplete system access, inconsistent collections data, or large gaps between booked revenue and collected cash.
      mitigation: Require direct read-only integrations, start with small pilot limits, and price only on verified collections and refill behavior.
    - risk: Capital partners delay commitment because early loss history is too thin.
      likelihood: Medium
      impact: High
      leadingIndicator: Multiple capital partners request additional backtests or first-loss protection after reviewing the same pilot package.
      mitigation: Start with a small pilot facility, publish benchmark and repayment curves quickly, and structure co-underwriting rather than a pure software sale.
operatingAssumptions:
  - assumption: Mid-market clinics in the beachhead will share direct read-only access to ad, prescribing, pharmacy, and collections systems if the financing offer is concrete enough.
    basis: research.yaml
    validationTest: Obtain 5 signed design-partner LOIs and complete at least 2 live data-room integrations within the first 90 days.
    decisionImpact: If false, narrow the wedge to a single clinic stack or abandon differentiated underwriting in favor of a software-only monitoring product.
  - assumption: Refill persistence and collected revenue curves are predictive enough to support the proposed 1.2x-1.5x capped repayment structure.
    basis: idea.yaml
    validationTest: Backtest 12+ months of cohorts across at least 3 clinics and confirm target cohorts repay inside 12 months with acceptable refund-adjusted variance.
    decisionImpact: If false, tighten eligibility, raise pricing, or stop offering capital and sell only analytics.
  - assumption: An external capital partner will fund a pilot facility before the startup builds its own balance sheet.
    basis: research.yaml
    validationTest: Secure one signed pilot warehouse, forward-flow, or co-underwriting term sheet tied to verified clinic telemetry.
    decisionImpact: If false, the company must either raise significantly more capital, reduce scope to software, or delay launch.
  - assumption: The first clinic integration can be implemented with a small engineering team in fewer than 30 days.
    basis: operator judgment
    validationTest: Deliver one production-grade integration covering ads, fills, and collections within 30 days of signed data access.
    decisionImpact: If false, services burden rises and the company should reduce product scope or focus on a narrower system stack.
  - assumption: Founder-led outbound plus partner referrals are sufficient to generate the first 10 qualified clinic conversations.
    basis: idea.yaml
    validationTest: Run a 30-account outbound campaign and track whether at least 6 accounts enter diligence within one quarter.
    decisionImpact: If false, the company needs a different distribution wedge or a more expensive enterprise sales build earlier than planned.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Secure design-partner commitments from target clinics.
    hypothesis: CFOs at scaled cash-pay virtual clinics will engage if offered a pilot facility tied to one working channel-category cohort.
    successMetric: 5 signed LOIs and 2 clinics granting live data-room access.
    owner: Founding CEO / GTM
  - horizon: 0-90 days
    experiment: Build the first read-only underwriting pipeline.
    hypothesis: One clinic stack can be integrated across ads, pharmacy fills, and collections without custom-heavy engineering.
    successMetric: First integrated cohort dashboard live within 30 days of access.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Backtest repayment curves across at least 3 clinics.
    hypothesis: Refund-adjusted refill persistence predicts repayment better than trailing revenue for the target therapies.
    successMetric: At least 70% of target cohorts meet modeled repayment thresholds at proposed pricing.
    owner: Underwriting lead
  - horizon: 90-180 days
    experiment: Convert one capital partner into a pilot facility.
    hypothesis: A specialist capital provider will commit if shown verified cohort telemetry and conservative tranche controls.
    successMetric: One signed pilot facility or forward-flow term sheet.
    owner: Founding CEO / capital partnerships
  - horizon: 6-12 months
    experiment: Run the first live pilot and measure redraw behavior.
    hypothesis: Clinics that meet early repayment targets will request additional funded cohorts within one quarter.
    successMetric: 1 live pilot, 50%+ pilot-to-production conversion, and at least 1 redraw.
    owner: Capital operations lead
  - horizon: 12-18 months
    experiment: Publish a benchmark package for a second capital partner and second clinic stack.
    hypothesis: Benchmark data and early loss curves will shorten diligence for the next partner and reduce integration friction.
    successMetric: 1 additional capital partner in diligence and 1 additional clinic stack live.
    owner: Product + partnerships
operations:
  - Read-only data access agreements and weekly data-quality checks across ads, prescribing, fills, refunds, and collections.
  - Credit committee cadence for approving pilots, tranche releases, freezes, and redraws.
  - Compliance review workflow tied to therapy type, ad creative constraints, and pharmacy partner changes.
  - Monthly portfolio reviews with clinics and capital partners using the same repayment and loss dashboard.
  - Standardized partner reporting for funded volume, payback, refunds, and exposure by indication and channel.
team:
  - role: Founding CEO / credit lead
    startTiming: Month 0
    rationale: The company must win credibility with both clinic CFOs and capital partners, so the founding leader needs to own underwriting design and the first funder relationships.
  - role: Founding eng
    startTiming: Month 0
    rationale: The wedge depends on stitching together ad, clinic, pharmacy, and collections telemetry into a usable cohort model from day one.
  - role: Data integrations engineer
    startTiming: Month 2
    rationale: Integration speed is a core bottleneck and must be productized early rather than handled as perpetual founder services work.
  - role: Capital operations and compliance lead
    startTiming: Month 4
    rationale: Live facilities require disciplined tranche management, partner reporting, and therapy-specific compliance monitoring.
  - role: GTM / underwriting associate
    startTiming: Month 6
    rationale: Once pilots are live, the company needs structured outbound, diligence support, and faster backtesting without pulling founders off execution.
milestones:
  - horizon: 0-12 months
    items:
      - "Month 3: sign 5 design-partner LOIs and complete 2 live data-room integrations."
      - "Month 6: backtest 12+ months of cohort data across 3 clinics and finalize pilot underwriting policy."
      - "Month 9: close the first pilot capital facility and fund the first tranche."
      - "Month 12: convert at least 1 pilot to a production multi-draw line and publish first benchmark report."
  - horizon: 12-24 months
    items:
      - "Expand to 4-6 active clinic customers and a second clinic system stack."
      - "Add a second capital partner using shared benchmark and loss reporting."
      - "Automate redraw approvals, alerting, and partner reporting for standard cohort types."
  - horizon: 24-36 months
    items:
      - "Reach $12M in annualized performing funded volume if early loss and redraw data hold."
      - "Add adjacent cash-pay specialties only after beachhead benchmark density is established."
      - "Decide whether to remain asset-light or add selective balance-sheet exposure based on partner economics."
risks:
  - risk: Regulatory shocks in compounded or personalized telehealth reduce demand or impair repayment.
    likelihood: High
    impact: High
    mitigation: Diversify early exposure by specialty and therapy, build compliance gating into underwriting, and keep facilities tranche-based.
  - risk: Meta or Google changes acquisition economics for funded cohorts.
    likelihood: High
    impact: High
    mitigation: Monitor cohort metrics daily, cap channel exposure, and freeze or reprice facilities when CAC or conversion moves outside approved bands.
  - risk: Early customers are the weakest operators rather than the best operators.
    likelihood: Medium
    impact: High
    mitigation: Require verified collections data, start with small facilities, and reject clinics with incomplete telemetry or weak retention.
  - risk: Capital supply is slower to assemble than clinic demand.
    likelihood: Medium
    impact: High
    mitigation: Structure early deals with co-underwriting partners, focus on one pilot first, and avoid a balance-sheet-heavy model before proof exists.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of product build, data integrations, underwriting/compliance hiring, and partner development to prove two clinic pilots, one production facility, and a repeatable capital-partner underwriting package.
