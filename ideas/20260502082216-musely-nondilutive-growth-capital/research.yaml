  validationPlan:
  - priority: high
    question: Will 5-10 target clinics share direct access to ad, prescribing, pharmacy, and collections systems for underwriting?
    evidenceToGather: LOIs plus live data-room pilots showing cohort-level CAC, refill, chargeback, and collection fields.
  - priority: high
    question: Do capital partners trust clinic-level cohort telemetry enough to commit a pilot warehouse or first-loss structure?
    evidenceToGather: Capital-partner IC memos, underwriting feedback, and a term sheet for a small pilot facility.
  - priority: medium
    question: How volatile is payback by indication and channel after platform-policy changes?
    evidenceToGather: 12+ months of historical cohort curves segmented by Meta, Google, affiliate, and organic acquisition for at least three clinics.
  - priority: medium
    question: How much of target-clinic revenue comes from products exposed to heightened personalized/compounding risk?
    evidenceToGather: Revenue mix by SKU / therapy type plus counsel review of marketing and fulfillment dependencies.
