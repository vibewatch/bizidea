  sensitivityCases:
  - case: 'Bull: breakout-clinic cohort spend expands quickly'
    impact: If more clinics resemble Musely’s appetite for non-dilutive acquisition capital and Hims-level marketing intensity, annual financeable volume is materially larger than the base-case TAM.
    sourceRefs:
