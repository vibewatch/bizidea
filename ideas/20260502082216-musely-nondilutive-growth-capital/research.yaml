openQuestions:
- How many U.S. derm/hair/menopause clinics in the $10M-$100M revenue band will actually share read-only access to ad, prescribing, pharmacy, and collections data for underwriting?
- What repayment and default behavior do funded cohorts show by indication, channel, and pharmacy partner after adjusting for refunds and compliance events?
- Will early capital partners prefer a balance-sheet product, a white-labeled underwriting OS, or a co-underwriting model with the startup taking first-loss exposure?
- How exposed is the beachhead to category-specific regulatory shocks around personalized or compounded treatments versus standard branded/generic prescriptions?
