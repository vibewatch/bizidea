market:
  tam:
    value: $0.6B
    rationale: 'Bottom-up annual financeable acquisition volume: 30 target U.S. clinics × $65M average revenue × 30% paid-acquisition intensity = ~$585M, rounded to $0.6B; 30% is below Hims & Hers'' 2025 marketing/revenue ratio and consistent with Musely using a large facility specifically for acquisition.'
    isEstimate: true
    sourceRefs:
    - 1
    - 2
    - 3
  sam:
    value: $0.2B
    rationale: 'Initial beachhead constrained to ~12-15 derm/hair/menopause clinics willing to share data and fit the $10M-$100M revenue band: midpoint 13.5 clinics × $55M × 25% acquisition intensity ≈ $186M, rounded to $0.2B.'
    isEstimate: true
    sourceRefs:
    - 3
    - 9
    - 11
    - 14
  som:
    value: $12.0M
    rationale: Year-3 reachable funded volume assuming 4-6 live clinic customers and ~$2M-$3M average annual facility utilization per customer after conservative draw limits and pilot ramp.
    isEstimate: true
    sourceRefs:
    - 1
    - 17
    - 20
