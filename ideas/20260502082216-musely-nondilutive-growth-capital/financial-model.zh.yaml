scenarios:
  downside:
    description: 数据室访问和再次提款采用均延后一个季度，导致公司活跃诊所更少、单诊所收入更低。
    y3RevenueK: 1287.0
    y3EbitdaK: -889.0
    cashLowPointK: -351.0
    keyAssumptionChanges:
    - Q4Y2 结束时活跃诊所为 4 家，而非 5 家。
    - 由于资金合作方限制提款规模，Y3 每家诊所收入较基准低 15%。
    - 随着合规和服务负担上升，毛利率降至 68%。
  base:
    description: 到 Q4Y2 有 5 家活跃诊所上线，到 Q4Y3 达到 6 家；随着试点转为以再次提款为主的正式额度，单诊所收入持续上升。
    y3RevenueK: 1716.0
    y3EbitdaK: -551.6
    cashLowPointK: 105.8
    keyAssumptionChanges:
    - 与主模型一致。
    - 假设为轻资产经济模型，不计入表内资金损失。
    - 假设 Y1 有一家外部资金合作方入场，Y2 再新增一家。
  upside:
    description: 第二家资金合作方更早到位，且再次提款利用率爬坡更快，从而多推动一家诊所上线并提升单诊所收入。
    y3RevenueK: 2145.0
    y3EbitdaK: -243.0
    cashLowPointK: 324.0
    keyAssumptionChanges:
    - Q4Y3 结束时活跃诊所为 7 家，而非 6 家。
    - 由于再次提款节奏更快，Y3 每家诊所收入较基准高 10%。
    - 随着监控和报告规模化顺畅展开，毛利率提升至 75%。
sensitivity:
