scenarios:
  downside:
    description: 数据室访问和 redraw 采用都晚一个季度，导致活跃诊所更少、单家诊所收入更低。
    y3RevenueK: 1287.0
    y3EbitdaK: -889.0
    cashLowPointK: -351.0
    keyAssumptionChanges:
      - Q4Y2 期末只有 4 家活跃诊所，而不是 5 家。
      - 由于资本合作方压低 draw 规模，Y3 单家诊所收入比基准低 15%。
      - 随着合规和服务负担上升，毛利率降到 68%。
  base:
    description: Q4Y2 达到 5 家活跃诊所，Q4Y3 达到 6 家；随着试点转成 redraw 更频繁的正式额度，单家诊所收入持续提升。
    y3RevenueK: 1716.0
    y3EbitdaK: -551.6
    cashLowPointK: 105.8
    keyAssumptionChanges:
      - 与主模型一致。
      - 假设公司保持轻资产经济性，不承担表内放贷损失。
      - 假设 Y1 就有 1 家外部资本合作方进入市场，Y2 再增加第 2 家。
  upside:
    description: 第 2 家资本合作方更早进场，redraw 使用率爬升更快，因此能多上线 1 家诊所，并抬高单家诊所收入。
    y3RevenueK: 2145.0
    y3EbitdaK: -243.0
    cashLowPointK: 324.0
    keyAssumptionChanges:
      - Q4Y3 期末有 7 家活跃诊所，而不是 6 家。
      - 由于 redraw 节奏更快，Y3 单家诊所收入比基准高 10%。
      - 随着监控和报告顺利标准化，毛利率提升到 75%。
sensitivity:
  - variable: ARPU
    downsideCase: Y3 单家诊所收入比计划低 15%
    baseCase: Y3 Q1-Q4 单家诊所季度 ARPU 为 $72K/$78K/$78K/$83K
    upsideCase: Y3 单家诊所收入比计划高 10%
    y3RevenueImpactK: -257.0
    cashImpactK: -185.0
  - variable: CAC
    downsideCase: CAC 上升 25%，且到 Q4Y3 少签 1 家诊所
    baseCase: 基于 Y2 销售与市场投入测得 CAC 为 $77.2K
    upsideCase: 由于伙伴转介绍和更聚焦的 ICP，CAC 下降 20%
    y3RevenueImpactK: -156.0
    cashImpactK: -240.0
  - variable: churn
    downsideCase: 由于 redraw 经济性不佳，月度 logo 流失升到 4%
    baseCase: 月度 logo 流失率为 3%
    upsideCase: 月度 logo 流失改善到 2%
    y3RevenueImpactK: -90.0
    cashImpactK: -70.0
  - variable: sales cycle
    downsideCase: 诊所尽调和资本合作方签字整体晚了一个季度
    baseCase: 第一条试点额度在 M9 关闭，Y2 按 2/3/4/5 家诊所的计划爬坡
    upsideCase: 有 1 个正式转化提前一个季度落地
    y3RevenueImpactK: -325.0
    cashImpactK: -330.0
  - variable: gross margin
    downsideCase: 因合规和服务工作更重，毛利率降到 68%
    baseCase: 毛利率 72%
    upsideCase: 随着监控标准化，毛利率升到 75%
    y3RevenueImpactK: 0.0
    cashImpactK: -69.0
  - variable: hiring pace
    downsideCase: 工程和 GTM 招聘比计划提早两个季度
    baseCase: 试点后的新增招聘从 Q2Y2、Q4Y2 和 Q2Y3 开始
    upsideCase: 在不拖慢里程碑的前提下，将 1 个招聘延后到 Q4Y2 之后
    y3RevenueImpactK: -80.0
    cashImpactK: -220.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      TargetAccounts --> Diligence
      Diligence --> ActiveClinics
      ActiveClinics --> FundedVolume
      FundedVolume --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景收入来自一条清晰路径：Y1 先拿下 1 家试点诊所，Q4Y2 扩到 5 家活跃额度，Q4Y3 扩到 6 家，同时单家诊所收入随 redraw 使用率提升而上升。
  - checkName: 必须跑对的环节
    finding: 公司必须按时拿到数据室访问和资本合作方批准，因为销售周期敏感性显示，只要整体晚一个季度，现金就会额外减少约 $330K。
  - checkName: 模型会在哪坏掉
    finding: 如果数据就绪诊所的转化慢下来，同时毛利率因额外服务负担压到 68%，下行情景会直接打到现金为负。
  - checkName: 下一轮融资前的证明点
    finding: 种子轮前最关键的证明，是在第 24 个月前做到至少 5 家活跃诊所、第 2 家资本合作方，以及自动化 redraw 报告。
sanityChecks:
  ruleOf40: "Y3 增长 109.3% + EBITDA 利润率 -32.1% = 77.2%"
  burnMultiple: "Y3 为 0.62x（相对 Y2 新增收入 $896.0K，只消耗了 -$551.6K EBITDA 亏损）。"
  revenuePerFte: "按 Q4 的 8 名 FTE 计算，Y3 人均收入为 $214.5K（对比 SaaS 基准 $200-400K）。"
  flags:
    - 基准情景假设公司保持轻资产，不包含信用损失、准备金要求，或未来资金上表后可能承担的仓储利息。
    - 收入集中度很高，因为 Y2 的全部收入只来自 5 家诊所，Y3 的全部收入只来自 6 家诊所。
    - 外部资本合作方时点和诊所数据共享仍是待验证假设；只要整体晚一个季度，模型就会明显更接近现金吃紧。
