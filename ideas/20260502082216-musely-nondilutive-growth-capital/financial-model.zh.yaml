  downsideCase: Y3 每家诊所收入较计划低 15%
  baseCase: Y3 的 Q1-Q4 每家诊所 ARPU 分别为每季度 $72K/$78K/$78K/$83K
  upsideCase: Y3 每家诊所收入较计划高 10%
  y3RevenueImpactK: -257.0
  cashImpactK: -185.0
- variable: CAC
  downsideCase: CAC 上升 25%，且到 Q4Y3 少签下一家诊所
  baseCase: 按 Y2 每新增一家诊所对应的销售与营销支出计算，CAC 为 $77.2K
  upsideCase: 受合作伙伴转介和更聚焦 ICP 的影响，CAC 下降 20%
  y3RevenueImpactK: -156.0
  cashImpactK: -240.0
- variable: churn
  downsideCase: 由于再次提款经济性较差，月度客户流失率升至 4%
  baseCase: 月度客户流失率为 3%
  upsideCase: 月度客户流失率改善至 2%
  y3RevenueImpactK: -90.0
  cashImpactK: -70.0
- variable: 销售周期
  downsideCase: 诊所尽调与资金合作方审批均延后一个季度
  baseCase: 首个试点在 M9 完成，Y2 按计划完成 2/3/4/5 家诊所的爬坡
  upsideCase: 有一个正式转化提前一个季度达成
  y3RevenueImpactK: -325.0
  cashImpactK: -330.0
- variable: 毛利率
  downsideCase: 由于更重的合规与服务工作，毛利率降至 68%
  baseCase: 毛利率为 72%
  upsideCase: 随着监控标准化，毛利率提升至 75%
  y3RevenueImpactK: 0.0
  cashImpactK: -69.0
- variable: 招聘节奏
  downsideCase: 工程与 GTM 招聘较计划提前两个季度
  baseCase: 试点后的招聘分别在 Q2Y2、Q4Y2 和 Q2Y3 开始
  upsideCase: 有一个招聘延后到 Q4Y2 之后，但不影响里程碑推进
  y3RevenueImpactK: -80.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  TargetAccounts[目标客户账户] --> Diligence[尽调]\n  Diligence --> ActiveClinics[活跃诊所]\n  ActiveClinics --> FundedVolume[已融资规模]\n  FundedVolume --> Revenue[收入]\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下，收入来自于从 Y1 的一家试点诊所增长到 Q4Y2 的五家活跃机构、Q4Y3 的六家，同时单诊所收入会随着再次提款利用率提升而上升。
- checkName: 必须成立的前提
  finding: 公司必须按时拿到数据室访问权限并获得资金合作方批准，因为销售周期敏感性显示，只要成交延后一个季度，现金就会大约少 $330K。
- checkName: 模型失效条件
  finding: 如果数据就绪诊所的转化放缓，且因额外服务负担使毛利率压缩至 68%，下行情形下现金将转为负值。
- checkName: 下一轮融资证明点
  finding: 达到 seed 阶段的证明点，是在第 24 个月前至少拥有五家活跃诊所、第二家资金合作方，以及自动化的再次提款报告。
sanityChecks:
  ruleOf40: Y3 增长率 109.3% + EBITDA 利润率 -32.1% = 77.2%
  burnMultiple: Y3 为 0.62x（相较 Y2 新增收入 $896.0K，对应 EBITDA 亏损消耗为 -$551.6K）。
  revenuePerFte: $214.5K Y3 using 8 Q4 FTE (benchmark $200-400K SaaS).
  flags:
  - 基准情形假设为轻资产经济模型，若公司未来将资金放入表内，则未计入信用损失、准备金要求或仓储利息。
  - 收入集中度较高，因为 Y2 的全部收入由五家诊所贡献，Y3 的全部收入由六家诊所贡献。
  - 外部资金合作方时点与诊所数据共享仍属验证前假设，因此只要延后一个季度，模型就会显著更接近现金吃紧。
