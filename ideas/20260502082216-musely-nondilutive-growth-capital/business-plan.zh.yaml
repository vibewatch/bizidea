slug: telehealth-cohort-capital
date: '2026-05-02'
executiveSummary: >-
  Telehealth Cohort Capital 是一个面向美国现金支付型虚拟诊所的非稀释增长融资平台，服务对象是那些在线获客并导入持续处方项目的诊所。滩头市场集中在虚拟皮肤科、脱发和更年期诊所：这类机构年化收入在 $10M-$100M，Meta/Google 投放可观，而且续方行为能在 cohort 维度被观察。产品把只读数据集成、cohort 承保和设有上限的收入分成额度绑在一起，让诊所 CFO 可以把一个已跑通的渠道继续放大，而不必增发股权，也不用把投放硬压回内部现金流。研究支持这个痛点和时点：Musely 的 $360M Customer Value Fund 额度证明，机构资本愿意为虚拟诊所获客融资；而 Hims 级别的营销投入和订阅用户数据，也说明大规模、持续性的现金支付 cohort 确实存在。公司的优势不只是钱更便宜，而是能基于处方留存、回款、退款以及经合规调整后的渠道表现，做出更好的承保。第一个关键证明点，是和一家规模化诊所加一家资本合作方跑出试点，证明经过核验的 cohort 遥测能支持更快 redraw 和可接受的损失表现。最大的反证风险在于，目标诊所可能不愿开放广告、开方、药房和回款系统的直接访问；一旦如此，产品就会坍缩成另一个通用收入型融资工具。市场规模估算基于研究假设，而不是审计过的行业总量，因此 TAM、SAM 和 SOM 都更适合被当成待验证的规划区间，而不是既成事实。
problem:
  - 现金支付型虚拟诊所即便回本表现很强，增长资金仍只能在创始人稀释、按历史收入定价的通用收入型融资，或把获客压回内部现金流之间做选择。
  - 传统放贷方和通用融资方不会承保续方留存、药房履约、退款或远程医疗合规风险，因此强运营者往往被按弱运营者的价格来对待。
solution:
  - 提供一条针对特定 cohort 的获客额度，接入广告账户、开方流程、药房履约和回款数据，再围绕已验证的持续护理 cohort 预支资本。
  - 持续监控续方留存、已收回收入、退款率和政策/合规信号，让额度和定价能在损失滚大之前就被调整。
whyWeWin:
  - 这个切口承保的是实际负责还款的引擎——处方 cohort 和已收回收入——而不是宽泛的历史收入，因此理论上能为最优质的运营者带来更好的筛选和定价。
  - 横跨多家诊所的渠道 CAC、续方留存和经合规调整后的还款基准数据，会不断累积成通用 RBF 玩家拿不到的数据资产。
strategicChoices:
  beachhead: 年化收入 $10M-$100M、拥有持续处方项目并且把大量付费投放导向现金回款 cohort 的美国现金支付型虚拟皮肤科、脱发和更年期诊所。
  wedgeRationale: 这个切片足够窄，能更快沉淀可比较的 cohort 数据；患者自费价格也更透明，而且机构对获客融资的需求已经被验证。若一开始就做更宽泛的远程医疗，会把保险复杂度和更弱的回款遥测一并带进来。
  sequencingRationale: 先用人工承保加只读集成跑通一个诊所系统栈，在一个小型试点额度上证明损失和 redraw 行为，再在核心风险模型被信任后补自动化、基准数据和额外资本合作方。
  notYet:
    - 面向混合支付诊所的保险应收账款融资。
    - 体重管理、初级保健或雇主付费虚拟护理等更宽的专科。
    - 国际扩张，或重资产放贷模式。
market:
  tam: 约 $0.6B 的年度可融资获客体量，覆盖约 30 家美国现金支付、可持续复购的皮肤、毛发和更年期虚拟诊所。
  sam: 约 $0.2B 的年度体量，聚焦最初滩头市场里约 12-15 家愿意共享数据、且集中在皮肤、毛发和更年期护理的诊所。
  som: 第 3 年约 $12.0M 的可达已融资体量，假设 4-6 家在营诊所客户、每家年化额度使用约 $2M-$3M。
  segments:
    - 核心客群是拥有持续处方收入、且付费获客占比较高的美国现金支付型虚拟诊所 CFO 和 CEO。
    - 次级客群是想配置医疗敞口、但不想自建远程医疗承保运营的专业资本提供方。
  buyingProcess: 当 CFO 或增长副总裁发现某个付费渠道或新护理品类回本不错，但资产负债表无力继续放大时，销售就会启动。一笔可信的交易需要穿过历史 cohort 尽调、只读系统接入、合规审查，以及诊所 CEO/CFO 与外部资本合作方的一致认可。
product:
  mvp: >-
    MVP 是一个人工承保平台：它接入 Meta/Google、一个诊所运营系统栈、药房履约数据和回款数据，提供 cohort 看板与封顶收入分成合同流程。第一阶段的目标是支持试点额度定价、日常监控和 redraw 决策，而不是做成完整的自助 onboarding 产品。
  sixMonth: 签下 2 家共创客户，完成 1 条生产级数据管道，回测至少 12 个月、按适应症和渠道切分的 cohort 曲线，并用保守的分批提用控制关掉第一条试点额度。
  twelveMonth: 为 3-4 个已融资 cohort 上线实时监控，自动告警 CAC、退款和续方衰减异常，并产出第一份基准报告，帮助第 2 家资本合作方承保这个资产类别。
  twentyFourMonth: 走出第一套诊所系统栈和第一组专科组合，推出更快的 redraw 和合作方报表 API，成为现金支付专科远程医疗里多家非稀释资本提供方默认采用的承保层。
  keyBets:
    - 只读集成能足够快落地，把承保周期压到 30 天以内。
    - cohort 维度的回款和续方曲线，会比历史收入类放贷输入更能预测还款表现。
    - 在公司还没有多年损失历史前，资本合作方也愿意接受“软件 + 联合承保”模式。
gtm:
  wedge: "由创始人主导，直接外呼规模化现金支付诊所 CFO，并给出一个非常具体的承诺：用一条针对单一渠道-品类 cohort 的试点获客额度，替代通用 RBF 或延后的股权融资；定价基于已验证的 cohort 表现，在 2 次按计划回款后，再升级成更大的多次提用额度。"
  channels:
    - 由创始人或 CFO 直接切入规模化虚拟诊所。
    - 与药房、支付和分析提供方建立转介绍合作，由它们来核验配药和回款数据。
    - 当第一批试点损失曲线和 redraw 指标跑出来后，再与资本合作方联合销售。
  funnelTargets: "目标是让 20%-30% 的目标账户进入尽调，40%-50% 的尽调账户开放数据室，50%+ 的试点转成正式额度，70%+ 的正式客户在 6 个月内发生 redraw。"
  pricing: 2%-4% 的承诺资本平台费，加上封顶收入分成直到还款达到 1.2x-1.5x；因为产品替代的是稀释和通用 RBF，收费基础也应该是被融资的获客资产，而不是软件席位。
businessModel:
  revenueStreams:
    - 试点和正式额度的承诺资本平台费。
    - 已融资 cohort 上的收入分成价差或承保收益。
    - 资本合作方使用承保层时支付的监控和报告费用。
  unitOfValue: 处于实时监控中的已融资获客 cohort 金额。
  targetGrossMarginPct: 70
  expansionLevers:
    - 在早期 cohort 表现达标后，提升单家诊所的额度使用率和 redraw 频次。
    - 只有当滩头市场的数据基准足够深后，才扩展到邻近的现金支付专科。
    - 在不自持全部资本的前提下，把监控和基准数据授权给更多资本合作方。
strategyMap:
  northStarMetric: 与已验证 cohort 回款挂钩的年化在营融资体量。
  inputMetrics:
    - 愿意开放直接数据访问的诊所数量。
    - 从首次会议到试点放款的中位天数。
    - 按渠道和适应症拆分的 cohort 回本周期。
    - 试点转正式的转化率。
    - 已融资 cohort 的损失率，以及经退款调整后的还款速度。
  moatsToBuild:
    - 跨诊所的续方留存、退款和渠道级还款基准数据集。
    - 与疗法类型和获客渠道挂钩的合规调整承保规则。
    - 通过药房、分析和资本提供方伙伴嵌入式分发。
  killCriteria:
    - 前 15 家目标诊所里，拿不到 3 家可用的只读系统访问。
    - 试点 cohort 的回本超过 12 个月，或在目标定价下还款低于 1.1x。
    - 完成 2 次回测和 1 次真实集成后，仍没有资本合作方愿意承诺试点额度。
  mermaid: |
    flowchart LR
      Wedge[Derm or menopause clinic CFO with a working paid channel] --> MVP[Read-only integrations plus manual cohort underwriting]
      MVP --> Proof[First pilot facility with verified redraw and loss data]
      Proof --> Expansion[More clinic stacks, more capital partners, broader specialty coverage]
investorMemo:
  verdict:
    call: Watch
    conviction: 切口很锋利，市场信号也真实，但在公司证明自己能拿到特权数据访问和一条可运转的资本合作关系之前，判断仍只能维持克制。
    whyBelieve: Musely 的融资额度和通用增长融资玩家都说明，市场确实需要获客融资；而这家创业公司瞄准的是这些玩家并未公开解决的承保缺口。
    whyDoubt: 如果中型诊所不愿开放足够多的运营和财务遥测数据，公司就无法做出差异化承保；再叠加监管波动，模型会很快失去意义。
    nextDiligence: 先拿下 2 个诊所数据室试点和 1 份已签署的试点资本合作条款，再看回测出来的 cohort 曲线是否足以支撑拟议定价。
  firstCustomer:
    title: 正在把付费获客放大到持续复方护理订阅上的美国虚拟皮肤科或更年期诊所 CFO。
    profile: 年化收入 $20M-$80M、活跃患者在 50,000+、大量投放 Meta/Google，并且有足够多续方历史、能按适应症和渠道对比 cohort 的诊所。
    trigger: 某个付费渠道或新护理品类的回本表现很好，但公司想立刻放大，而不是靠新一轮股权融资或压缩其他预算来凑钱。
    buyer: CFO 或 CEO
    initialContract: 针对单一渠道-品类 cohort 提供 $250k-$1M 的试点额度，按 tranche 分批释放并监控 90 天；若连续 2 个 cohort 周期都按计划推进，再转成 $2M-$5M 的年度多次提用额度。
  mustBeTrue:
    - 前 10 家认真接触的目标诊所里，至少有 5 家愿意在尽调阶段开放广告、开方、药房和回款系统的只读访问。
    - 至少 3 家诊所的历史 cohort 数据，能证明续方和回款行为足够可预测，从而支撑 1.2x-1.5x 的封顶还款产品定价。
    - 至少 1 家外部资本合作方愿意为试点额度出资，而不是要求创业公司自己扛整张资产负债表。
    - 在拟议的费用和还款结构下，诊所会更愿意选择按 cohort 定价的获客资本，而不是通用 RBF 或延后的股权融资。
    - 合规或广告政策变化可以通过重新定价和 tranche 控制来管理，而不会让大面积额度冻结。
  diligenceQuestions:
    - 前两个试点里分别用了哪些诊所系统和药房伙伴，每个集成要花多久？
    - 拉 12 个月 cohort 曲线看，按适应症和渠道拆开后的 CAC、续方衰减、退款和回款分别长什么样？
    - 谁来吸收试点结构里的 first-loss 风险：创业公司、资本合作方，还是通过价格和 holdback 让诊所承担？
    - 早期还款敞口有多集中在那些正面临复方或远程医疗审查的疗法和营销主张上？
    - 一旦这个资产类别变得清晰，Capchase、Pipe 或某家定制基金凭什么不能直接把工作流抄走？
  riskHeatmap:
    - risk: 围绕复方、个性化治疗或远程医疗营销的监管与执法变化，会削弱 cohort 需求或还款表现。
      likelihood: High
      impact: High
      leadingIndicator: 一个或多个试点诊所出现退款率上升、投放中止，或因某类疗法相关的营销/履约变化而带来更长法务审查周期。
      mitigation: 早期就把敞口分散到皮肤、毛发和更年期品类，把合规门槛写进承保规则，并按疗法和渠道设置暴露上限。
    - risk: 付费渠道波动，让 CAC 和回本假设在额度重定价之前就先失真。
      likelihood: High
      impact: High
      leadingIndicator: 连续两周 cohort 复盘都显示 CAC 上升或转化下降，超出预设警戒线。
      mitigation: 采用分批放款、按天监控 cohort，并在回本掉出批准区间时冻结或下调可提额度。
    - risk: 逆向选择导致最先来要钱的诊所，恰好是留存差或遥测最不可靠的那批。
      likelihood: Medium
      impact: High
      leadingIndicator: 尽调过程反复出现系统访问不完整、回款数据前后矛盾，或已入账收入与已收现之间存在明显缺口。
      mitigation: 强制直连只读集成，从很小的试点额度起步，并且只对已验证的回款和续方行为定价。
    - risk: 资本合作方因为早期损失历史太薄，不愿及时给出承诺。
      likelihood: Medium
      impact: High
      leadingIndicator: 多家资本合作方看过同一套试点材料后，都要求更多回测或额外 first-loss 保护。
      mitigation: 先从一个小试点额度做起，尽快发布基准和回款曲线，并优先采用联合承保，而不是纯软件销售。
operatingAssumptions:
  - assumption: 只要融资提案足够具体，滩头市场里的中型诊所就愿意开放广告、开方、药房和回款系统的直接只读访问。
    basis: research.yaml
    validationTest: 在前 90 天拿下 5 份已签署的共创客户 LOI，并完成至少 2 个真实的数据室接入。
    decisionImpact: 如果不成立，要么把切口缩窄到单一诊所系统栈，要么放弃差异化承保，改成纯监控软件产品。
  - assumption: 续方留存和回款曲线，足够支撑拟议中的 1.2x-1.5x 封顶还款结构。
    basis: idea.yaml
    validationTest: 回测至少 3 家诊所、12+ 个月的 cohort，并确认目标 cohort 能在 12 个月内按目标波动范围完成偿付。
    decisionImpact: 如果不成立，就要收紧准入、提高定价，或者停止提供资本，只卖分析能力。
  - assumption: 在公司自建资产负债表之前，外部资本合作方就会为试点额度出资。
    basis: research.yaml
    validationTest: 拿到 1 份与已验证诊所遥测挂钩的试点仓储、forward-flow 或联合承保条款清单。
    decisionImpact: 如果不成立，公司就必须多融很多钱、收缩成软件业务，或者推迟上线。
  - assumption: 第一套诊所集成可以由一个小型工程团队在 30 天内完成。
    basis: operator judgment
    validationTest: 在签署数据访问后的 30 天内，交付一套覆盖广告、履约和回款的生产级集成。
    decisionImpact: 如果不成立，服务负担会急剧上升，公司应收缩产品范围，或只专注更窄的系统栈。
  - assumption: 创始人主导外呼加伙伴转介绍，足以拿到前 10 场合格的诊所对话。
    basis: idea.yaml
    validationTest: 跑一个 30 账户的外呼活动，并看一个季度内是否至少有 6 个账户进入尽调。
    decisionImpact: 如果不成立，公司就需要更换分发切口，或比计划更早投入昂贵的企业销售体系。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 拿下目标诊所的共创客户承诺。
    hypothesis: 如果给出与单一渠道-品类 cohort 挂钩的试点额度，规模化现金支付虚拟诊所的 CFO 会愿意聊下去。
    successMetric: 5 份已签 LOI，且有 2 家诊所开放真实数据室访问。
    owner: 创始 CEO / GTM
  - horizon: 0-90 天
    experiment: 搭出第一条只读承保数据管道。
    hypothesis: 一套诊所系统栈可以在不过度定制工程的情况下，把广告、药房履约和回款接起来。
    successMetric: 在拿到访问权限 30 天内上线第一版 cohort 看板。
    owner: 创始工程负责人
  - horizon: 90-180 天
    experiment: 回测至少 3 家诊所的还款曲线。
    hypothesis: 在目标疗法上，经退款调整后的续方留存，比历史收入更能预测偿还表现。
    successMetric: 至少 70% 的目标 cohort 在拟议定价下达到模型回款阈值。
    owner: 承保负责人
  - horizon: 90-180 天
    experiment: 把 1 家资本合作方转成试点额度。
    hypothesis: 只要看到经验证的 cohort 遥测和保守的 tranche 控制，专业资本提供方就愿意出手。
    successMetric: 1 份已签试点额度或 forward-flow 条款清单。
    owner: 创始 CEO / 资本合作
  - horizon: 6-12 个月
    experiment: 跑出第一批真实试点并观察 redraw 行为。
    hypothesis: 只要早期还款表现达标，诊所在一个季度内就会申请新的已融资 cohort。
    successMetric: 1 个真实试点、50%+ 的试点转正式率，以及至少 1 次 redraw。
    owner: 资本运营负责人
  - horizon: 12-18 个月
    experiment: 为第 2 家资本合作方和第 2 套诊所系统发布一套基准材料。
    hypothesis: 基准数据加早期损失曲线，会缩短下一家合作方的尽调周期，并降低集成摩擦。
    successMetric: 1 家额外资本合作方进入尽调，且 1 套额外诊所系统栈上线。
    owner: 产品 + 合作伙伴负责人
operations:
  - 覆盖广告、开方、履约、退款和回款的只读数据访问协议，以及每周数据质量检查。
  - 批准试点、tranche 释放、冻结和 redraw 的信审委员会节奏。
  - 与疗法类型、广告素材限制和药房伙伴变化挂钩的合规审查流程。
  - 与诊所和资本合作方共用同一套还款/损失看板的月度组合复盘。
  - 按适应症和渠道输出已融资体量、回本、退款和暴露分布的标准化合作方报告。
team:
  - role: 创始 CEO / 信贷负责人
    startTiming: Month 0
    rationale: 公司必须同时赢得诊所 CFO 和资本合作方的信任，因此创始人需要亲自抓承保设计和首批资金方关系。
  - role: 创始工程负责人
    startTiming: Month 0
    rationale: 这个切口从第一天起就依赖把广告、诊所、药房和回款遥测拼成可用的 cohort 模型。
  - role: 数据集成工程师
    startTiming: Month 2
    rationale: 集成速度是核心瓶颈，必须尽早产品化，而不是永远靠创始人做定制服务。
  - role: 资本运营与合规负责人
    startTiming: Month 4
    rationale: 一旦额度真实运行，就需要严密的 tranche 管理、合作方报告和针对疗法的合规监控。
  - role: GTM / 承保专员
    startTiming: Month 6
    rationale: 试点上线后，公司需要更结构化的外呼、尽调支持和更快的回测速度，不能一直把创始人从执行里拽走。
milestones:
  - horizon: 0-12 个月
    items:
      - "Month 3：签下 5 份共创客户 LOI，并完成 2 个真实数据室接入。"
      - "Month 6：完成 3 家诊所、12+ 个月 cohort 数据回测，并敲定试点承保政策。"
      - "Month 9：关掉第一条试点资本额度，并放出第一笔 tranche。"
      - "Month 12：至少把 1 个试点转成正式的多次提用额度，并发布第一份基准报告。"
  - horizon: 12-24 个月
    items:
      - "扩展到 4-6 家活跃诊所客户，并接入第 2 套诊所系统栈。"
      - "新增第 2 家资本合作方，并共享基准和损失报告。"
      - "为标准 cohort 类型自动化 redraw 审批、告警和合作方报告。"
  - horizon: 24-36 个月
    items:
      - "如果早期损失和 redraw 数据成立，把年化在营融资体量做到 $12M。"
      - "只有在滩头市场基准密度建立后，才扩展到邻近的现金支付专科。"
      - "基于合作方经济性，决定继续轻资产，还是加入选择性的表内资本敞口。"
risks:
  - risk: 复方或个性化远程医疗上的监管冲击，削弱需求或伤害还款表现。
    likelihood: High
    impact: High
    mitigation: 早期按专科和疗法分散敞口，把合规门槛嵌进承保流程，并坚持按 tranche 放款。
  - risk: Meta 或 Google 改变已融资 cohort 的获客经济。
    likelihood: High
    impact: High
    mitigation: 每天盯 cohort 指标，限制渠道暴露，并在 CAC 或转化掉出批准区间时冻结或重定价额度。
  - risk: 最早来的客户其实是最弱的运营者，而不是最强的运营者。
    likelihood: Medium
    impact: High
    mitigation: 强制核验回款数据，从小额度起步，并拒绝那些遥测不完整或留存薄弱的诊所。
  - risk: 资本供给的组装速度，慢于诊所需求的出现速度。
    likelihood: Medium
    impact: High
    mitigation: 早期以联合承保结构为主，先把 1 个试点跑通，并在证明点出来前避免走重资产模式。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月资金完成产品开发、数据集成、承保/合规招聘和伙伴拓展，证明 2 个诊所试点、1 条正式额度，以及一套可重复销售给资本合作方的承保材料。
