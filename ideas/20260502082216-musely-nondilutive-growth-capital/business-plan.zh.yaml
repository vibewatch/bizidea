slug: telehealth-cohort-capital
date: '2026-05-02'
executiveSummary: Telehealth Cohort Capital 是一个面向美国自费型虚拟诊所的非稀释性增长融资平台，服务对象是通过线上渠道获取患者、并将其导入重复处方项目的机构。滩头市场是年化收入 $10M-$100M、在 Meta/Google 上有显著投放、且续方行为可按队列观测的虚拟皮肤科、脱发和更年期诊所。产品将只读数据集成、队列授信以及封顶收入分成额度结合起来，使诊所 CFO 能在不融资股权、也不把投放压平到内部现金流水平的情况下，放大一个已被验证有效的渠道。研究验证了客户痛点与时机：Musely 的 $360M Customer Value Fund 额度说明机构资本对虚拟诊所获客融资有真实兴趣，而 Hims 级别的营销支出和订阅用户数据则说明，大规模、重复性的自费医疗队列确实存在。公司的优势不只是资金更便宜，而是能基于处方持续性、回款、退款和经合规调整的渠道表现做出更优授信。第一个证明点应是与一家规模化诊所和一家资金合作方完成试点，证明经验证的队列遥测数据可以支持更快的再次提款与可接受的损失表现。最大的反证风险在于目标诊所不愿共享广告、处方、药房和回款系统的直接访问权限；若如此，产品就会退化成另一种通用收入融资工具。市场规模估算基于研究假设而非审计过的行业口径，因此公司应将 TAM、SAM 和 SOM 视为可验证的规划区间，而不是既成事实。
problem:
- 回本表现强劲的自费型虚拟诊所，依然只能在创始人稀释、按历史收入定价的通用收入融资，或把获客节奏压到内部现金流所能承受的水平之间做选择。
- 传统放贷方和通用融资方不会把续方持续性、药房履约、退款或远程医疗合规风险纳入授信，因此优质经营者会被按弱经营者的价格对待。
solution:
- 提供一条面向特定队列的获客额度，接入广告账户、处方流程、药房履约和回款数据，再基于经验证的重复护理队列垫付资金。
- 持续监控续方持续性、已收款收入、退款率以及政策/合规信号，从而在损失累积之前调整提款上限和定价。
whyWeWin:
- 这个切入口直接对还款引擎本身——处方队列和已收款收入——进行授信，而不是看宽泛的历史收入，因此应能为优质经营者带来更好的筛选和定价。
- 围绕渠道 CAC、续方持续性和经合规调整的回款所形成的跨诊所基准数据，会沉淀为通用 RBF 玩家无法拥有的数据资产。
strategicChoices:
  beachhead: 美国年化收入 $10M-$100M、拥有重复处方项目，并通过重度付费投放获取可现金回收队列的自费型虚拟皮肤科、脱发和更年期诊所。
  wedgeRationale: 这一切片足够聚焦，能较快形成可比的队列数据，患者自费价格也足够清晰，且已显现机构对获客融资的需求；如果一开始就做更广泛的远程医疗，则会引入保险复杂性，并削弱还款遥测能力。
  sequencingRationale: 先从人工授信加上一套诊所系统栈的只读集成开始，在小额试点额度上验证损失和再次提款行为，待核心风险模型获得信任后，再增加自动化、基准数据和更多资金合作方。
  notYet:
  - 面向混合支付方诊所的保险应收款融资。
  - 减重、初级诊疗或雇主赞助虚拟医疗等更广泛专科。
  - 国际扩张，或重资产负债表的放贷模式。
market:
  tam: 在大约 30 家美国重复性自费型虚拟皮肤科、脱发和更年期诊所中，可融资的年度获客规模预计约为 $0.6B。
  sam: 在最初滩头市场中，大约 12-15 家数据就绪的皮肤科、脱发和更年期诊所对应的年度规模预计约为 $0.2B。
  som: 预计到第 3 年，4-6 家在营诊所客户、每家年度额度使用约为 $2M-$3M，将带来 $12.0M 的已融资规模。
  segments:
  - 核心客群是美国自费型虚拟诊所中的 CFO 和 CEO，这些机构拥有重复处方收入并有可观的付费获客支出。
  - 次级客群是希望布局医疗赛道、但不想自建远程医疗专用授信能力的专业资本提供方。
  buyingProcess: 销售启动于 CFO 或增长副总裁发现某个付费渠道或新护理品类回本很有吸引力，但资产负债表容量不足以放大投入。一个可信的交易需要对历史队列进行尽调、获得只读系统访问、完成合规审查，并让诊所 CEO/CFO 与外部资金合作方达成一致。
product:
  mvp: MVP 是一个人工授信平台，具备对 Meta/Google、某一诊所运营系统栈、药房履约数据和回款数据的只读集成，并包含队列仪表盘和封顶收入分成合同流程。它应支持试点额度定量、日常监控和再次提款决策，而不是完整的自助式入驻。
  sixMonth: 签下 2 家设计合作诊所，完成一条生产级数据管道，按适应症与渠道回测 12 个月以上的队列曲线，并在保守的分批提款控制下完成首个试点额度。
  twelveMonth: 为 3-4 个已融资队列上线实时监控，自动触发 CAC、退款和续方衰减的异常预警，并产出首份基准报告，帮助第二家资金合作方为这一资产类别做授信。
  twentyFourMonth: 超越首个诊所系统栈与首批专科组合，推出更快的再次提款与合作方报告 API，并成为多家自费专科远程医疗非稀释性资本提供方的默认授信层。
  keyBets:
  - 只读集成可以足够快地完成，从而把授信周期控制在 30 天以内。
  - 队列级回款和续方曲线，相比传统放贷方使用的历史收入输入，仍然更能预测回款表现。
  - 在公司尚未积累多年损失历史之前，资金合作方也愿意接受“软件 + 共同授信”模式。
gtm:
  wedge: 由创始人主导，向规模化自费型诊所 CFO 外联，提供明确方案：用单一渠道-品类队列的试点获客额度，替代通用 RBF 或推迟股权融资；该额度按经验证的队列表现定价，并在两轮按计划回收后升级为更大的多次提款额度。
  channels:
  - 创始人/CFO 向规模化虚拟诊所外联。
  - 与能够验证履约和回款数据的药房、支付和分析提供方建立转介合作。
  - 在首个试点的损失曲线和再次提款指标形成后，与资金合作方联合销售。
  funnelTargets: 目标是让 20-30% 的目标账户进入尽调，40-50% 的尽调账户开放数据室访问，50% 以上的试点转化为正式额度，70% 以上的正式客户在 6 个月内发生再次提款。
  pricing: 对已承诺资本收取 2%-4% 的平台费，并叠加封顶收入分成，直至回收达到 1.2x-1.5x；因为该产品替代的是股权稀释和通用 RBF，收费依据应是被融资的获客资产，而不是软件席位数。
businessModel:
  revenueStreams:
  - 针对试点和正式额度已承诺资金收取的平台费。
  - 来自已融资队列的收入分成利差或授信收益。
  - 向使用该授信层的资金合作方收取的监控与报告费用。
  unitOfValue: 处于主动监控下的已融资获客队列金额。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在早期队列表现验证后，提高每家诊所的额度利用率和再次提款频次。
  - 只有在滩头市场形成足够基准深度后，才拓展到相邻的自费专科。
  - 在不持有全部已部署资本的前提下，将监控和基准数据授权给更多资金合作方。
strategyMap:
  northStarMetric: 与经验证的队列已收款收入挂钩的年化在管已融资规模。
  inputMetrics:
  - 开放直接数据访问的诊所数量。
  - 从首次会面到试点放款的中位天数。
  - 按渠道和适应症划分的队列回本周期。
  - 试点转正式转化率。
  - 已融资队列的损失率及经退款调整后的回收速度。
  moatsToBuild:
  - 围绕续方持续性、退款和渠道级回款的跨诊所基准数据集。
  - 与疗法类型和获客渠道挂钩的经合规调整的授信规则。
  - 通过药房、分析和资本提供方伙伴形成嵌入式分发。
  killCriteria:
  - 前 15 家目标诊所中，若少于 3 家提供可用的只读系统访问权限。
  - 试点队列的回本周期若超过 12 个月，或在目标定价下回收低于 1.1x。
  - 在完成两次回测和一家诊所实时集成后，仍没有资金合作方承诺试点额度。
  mermaid: "flowchart LR\n  Wedge[已有有效付费渠道的皮肤科或更年期诊所 CFO] --> MVP[只读集成 + 人工队列授信]\n  MVP --> Proof[首个试点额度，具备已验证的再次提款和损失数据]\n  Proof --> Expansion[更多诊所系统栈、更多资金合作方、更广专科覆盖]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 切入口明确，市场信号真实，但在公司证明自己能获得特权数据访问，并建立至少一个可运转的资金合作关系之前，信心仍应保持克制。
    whyBelieve: Musely 的额度交易以及通用增长融资 incumbents 表明，获客融资需求确实存在；而这家创业公司瞄准的是这些玩家尚未公开解决的授信缺口。
    whyDoubt: 如果中型诊所不愿开放足够的运营和财务遥测数据，以支撑在监管波动下的差异化授信，这个业务就难以成立。
    nextDiligence: 先拿下两家诊所的数据室试点和一份已签署的试点资金合作方 term sheet，再验证回测队列曲线是否支撑所提定价。
  firstCustomer:
    title: 一家美国虚拟皮肤科或更年期诊所的 CFO，正把付费获客放大到重复性的复方护理订阅上。
    profile: 一家年化收入 $20M-$80M 的诊所，拥有 50,000+ 活跃患者，在 Meta/Google 上高额投放，并积累了足够的续方历史，可按适应症和渠道比较队列。
    trigger: 某个付费渠道或新护理品类已显示出很好的回本表现，但公司希望立刻放大规模，同时避免股权融资或挤压其他运营预算。
    buyer: CFO 或 CEO
    initialContract: 针对单一渠道-品类队列提供 $250k-$1M 的试点额度，采用分批提款和 90 天监控；在两个队列周期按计划执行后，升级为 $2M-$5M 的年度多次提款额度。
  mustBeTrue:
  - 前 10 家严肃目标诊所中，至少 5 家会在尽调期间开放广告、处方、药房与回款系统的只读访问权限。
  - 至少 3 家诊所的历史队列数据将显示出足够可预测的续方与回款行为，从而支持对 1.2x-1.5x 封顶回收产品定价。
  - 会有一家外部资金合作方在不要求创业公司承担完整资产负债表的情况下，为试点额度提供资金。
  - 在所提费用和回收结构下，诊所会更偏好按队列定价的获客资本，而不是通用 RBF 或延后的股权融资。
  - 合规或广告政策变化可以通过重新定价和分批控制来管理，而不至于导致大面积冻结额度。
  diligenceQuestions:
  - 前两个试点中涉及哪些诊所系统和药房合作方？每个集成需要多久？
  - 12 个月队列曲线在不同适应症和渠道下，对 CAC、续方衰减、退款与已收款收入显示了什么？
  - 试点结构中的首损风险由谁承担：创业公司、资金合作方，还是通过定价和留置机制由诊所承担？
  - 早期回收敞口有多大程度集中在正面临复方或远程医疗审查的疗法或营销主张上？
  - 一旦这一资产类别变得清晰，什么优势能阻止 Capchase、Pipe 或定制基金复制这套流程？
  riskHeatmap:
  - risk: 围绕复方、个性化或远程医疗营销的监管或执法变化，会削弱队列需求或回收表现。
    likelihood: 高
    impact: 高
    leadingIndicator: 一个或多个试点诊所出现退款率上升、投放中断，或因特定疗法营销/履约变化导致法务审查延迟。
    mitigation: 从皮肤、头发和更年期品类的分散化敞口开始，把合规门槛嵌入授信，并按疗法与渠道限制敞口。
  - risk: 付费渠道波动打破 CAC 和回本假设的速度，快于额度重新定价的速度。
    likelihood: 高
    impact: 高
    leadingIndicator: 连续两次每周队列复盘中，CAC 上升或转化率跌破约定护栏。
    mitigation: 分批释放资本，按日监控队列，并在回本表现偏离批准区间时冻结或减少提款。
  - risk: 逆向选择使最早寻求资本的诊所恰好拥有较差的留存或不可靠的遥测数据。
    likelihood: 中
    impact: 高
    leadingIndicator: 尽调流程显示系统访问不完整、回款数据不一致，或入账收入与实收现金之间存在较大差距。
    mitigation: 要求直接只读集成，从较小的试点额度开始，并且只依据经验证的回款与续方行为定价。
  - risk: 资金合作方因早期损失历史过薄而延迟承诺。
    likelihood: 中
    impact: 高
    leadingIndicator: 多家资金合作方在审阅同一试点方案后，要求增加回测或首损保护。
    mitigation: 从小额试点额度开始，尽快发布基准和回收曲线，并采用共同授信结构，而不是单纯卖软件。
operatingAssumptions:
- assumption: 如果融资方案足够具体，滩头市场中的中型诊所会愿意共享广告、处方、药房和回款系统的直接只读访问权限。
  basis: research.yaml
  validationTest: 在前 90 天内拿到 5 份已签署的设计合作 LOI，并完成至少 2 个实时数据室集成。
  decisionImpact: 如果不成立，就将切入口收窄到单一诊所系统栈，或放弃差异化授信，转为纯软件监控产品。
- assumption: 续方持续性和已收款收入曲线具有足够预测力，可支撑所提的 1.2x-1.5x 封顶回收结构。
  basis: idea.yaml
  validationTest: 在至少 3 家诊所上回测 12 个月以上的队列，并确认目标队列能在 12 个月内回收，且经退款调整后的波动可接受。
  decisionImpact: 如果不成立，就收紧准入、提高定价，或停止提供资本，仅出售分析能力。
- assumption: 在创业公司建立自有资产负债表之前，会有外部资金合作方为试点额度提供资金。
  basis: research.yaml
  validationTest: 拿下一份与经验证诊所遥测数据挂钩的试点仓储、forward-flow 或共同授信 term sheet。
  decisionImpact: 如果不成立，公司就必须大幅增加融资、将范围收缩为软件，或推迟上线。
- assumption: 首个诊所集成可由一支小型工程团队在 30 天内完成。
  basis: 运营判断
  validationTest: 在签署数据访问后 30 天内，交付一条覆盖广告、履约和回款的生产级集成。
  decisionImpact: 如果不成立，服务负担会显著上升，公司应缩小产品范围或聚焦更窄的系统栈。
- assumption: 创始人主导外联加合作伙伴转介，足以带来前 10 个合格诊所商机。
  basis: idea.yaml
  validationTest: 执行一个覆盖 30 个账户的外联活动，并跟踪是否至少有 6 个账户在一个季度内进入尽调。
  decisionImpact: 如果不成立，公司就需要不同的分发切口，或比计划更早搭建更昂贵的企业销售团队。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 拿下目标诊所的设计合作承诺。
  hypothesis: 如果提供与一个有效渠道-品类队列挂钩的试点额度，规模化自费型虚拟诊所的 CFO 会愿意参与。
  successMetric: 5 份已签署 LOI，且有 2 家诊所开放实时数据室访问。
  owner: 创始 CEO / GTM
- horizon: 0-90 天
  experiment: 构建第一条只读授信管线。
  hypothesis: 无需重度定制工程，就能把一个诊所系统栈与广告、药房履约和回款打通。
  successMetric: 在获得访问权限后的 30 天内，上线第一版集成队列仪表盘。
  owner: 创始工程负责人
- horizon: 90-180 天
  experiment: 在至少 3 家诊所上回测回收曲线。
  hypothesis: 对目标疗法而言，经退款调整的续方持续性比历史收入更能预测回收。
  successMetric: 在所提定价下，至少 70% 的目标队列满足模型设定的回收阈值。
  owner: 授信负责人
- horizon: 90-180 天
  experiment: 推动一家资金合作方落地试点额度。
  hypothesis: 如果看到经验证的队列遥测和保守的分批控制，专业资本提供方会愿意承诺。
  successMetric: 一份已签署的试点额度或 forward-flow term sheet。
  owner: 创始 CEO / 资本合作
- horizon: 6-12 个月
  experiment: 运行首个实时试点，并衡量再次提款行为。
  hypothesis: 达到早期回收目标的诊所，会在一个季度内申请更多已融资队列。
  successMetric: 1 个实时试点、50%+ 的试点转正式转化，以及至少 1 次再次提款。
  owner: 资本运营负责人
- horizon: 12-18 个月
  experiment: 为第二家资金合作方和第二套诊所系统栈发布一套基准资料包。
  hypothesis: 基准数据和早期损失曲线将缩短下一家合作方的尽调周期，并降低集成摩擦。
  successMetric: 新增 1 家进入尽调的资金合作方，以及 1 套上线的额外诊所系统栈。
  owner: 产品 + 合作伙伴
operations:
- 围绕广告、处方、履约、退款和回款，签署只读数据访问协议并进行每周数据质量检查。
- 建立审批试点、分批释放、冻结和再次提款的授信委员会节奏。
- 建立与疗法类型、广告创意限制和药房合作方变化挂钩的合规审查流程。
- 使用统一的回收与损失仪表盘，与诊所和资金合作方进行月度组合复盘。
- 就已融资规模、回本、退款以及按适应症和渠道划分的敞口，提供标准化合作方报告。
team:
- role: 创始 CEO / 授信负责人
  startTiming: 第 0 月
  rationale: 公司必须同时赢得诊所 CFO 和资金合作方的信任，因此创始人必须亲自负责授信设计和首批资方关系。
- role: 创始工程负责人
  startTiming: 第 0 月
  rationale: 这个切入口从第一天起就依赖于把广告、诊所、药房和回款遥测拼接成可用的队列模型。
- role: 数据集成工程师
  startTiming: 第 2 月
  rationale: 集成速度是核心瓶颈，必须尽早产品化，而不能长期依赖创始人式服务交付。
- role: 资本运营与合规负责人
  startTiming: 第 4 月
  rationale: 实盘额度要求严格的分批管理、合作方报告以及与疗法相关的合规监控。
- role: GTM / 授信专员
  startTiming: 第 6 月
  rationale: 试点上线后，公司需要结构化外联、尽调支持和更快的回测能力，同时避免创始人被执行事务牵走。
milestones:
- horizon: 0-12 个月
  items:
  - 第 3 个月：签下 5 份设计合作 LOI，并完成 2 个实时数据室集成。
  - 第 6 个月：在 3 家诊所上回测 12 个月以上的队列数据，并最终确定试点授信政策。
  - 第 9 个月：完成首个试点资本额度并发放第一笔分批资金。
  - 第 12 个月：至少将 1 个试点转为正式多次提款额度，并发布首份基准报告。
- horizon: 12-24 个月
  items:
  - 扩展到 4-6 家活跃诊所客户，并接入第二套诊所系统栈。
  - 基于共享的基准与损失报告，引入第二家资金合作方。
  - 对标准化队列类型实现再次提款审批、预警和合作方报告自动化。
- horizon: 24-36 个月
  items:
  - 如果早期损失和再次提款数据成立，实现 $12M 的年化在管已融资规模。
  - 只有在滩头市场形成足够基准密度后，才扩展到相邻自费专科。
  - 根据合作方经济性，决定继续保持轻资产，还是增加有选择性的表内敞口。
risks:
- risk: 复方或个性化远程医疗领域的监管冲击会削弱需求或损害回收表现。
  likelihood: 高
  impact: 高
  mitigation: 按专科和疗法分散早期敞口，把合规门槛嵌入授信，并保持额度以分批形式发放。
- risk: Meta 或 Google 的变化会改变已融资队列的获客经济性。
  likelihood: 高
  impact: 高
  mitigation: 按日监控队列指标、限制渠道敞口，并在 CAC 或转化偏离批准区间时冻结或重新定价额度。
- risk: 早期客户可能是最弱的经营者，而不是最强的经营者。
  likelihood: 中
  impact: 高
  mitigation: 要求经验证的回款数据，从小额度开始，并拒绝遥测不完整或留存较弱的诊所。
- risk: 资本供给的组装速度慢于诊所需求。
  likelihood: 中
  impact: 高
  mitigation: 早期交易采用共同授信合作方结构，先聚焦一个试点，并在得到验证前避免重资产负债表模式。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 为 18 个月的产品开发、数据集成、授信/合规招聘和合作方拓展提供资金，以验证两个诊所试点、一个正式额度，以及一套可复制的资金合作方授信方案。
