jobsToBeDone:
- job: 当付费获客表现超出计划时，帮助虚拟诊所 CFO 在不稀释股权的情况下为下一阶段增长筹资，从而在下一次董事会融资前放大收入。
  currentAlternative: 风险投资股权，或将支出放缓到现有现金可承受水平
  successMetric: 获得额外批准的营销预算，且回本周期低于 12 个月
- job: 当资金合作方希望布局自费医疗增长时，帮助投资团队对处方队列进行授信并监控风险，从而安全部署非稀释性资本。
  currentAlternative: 通用收入融资尽调，或直接放弃该赛道
  successMetric: 按已融资队列衡量的损失率与回收速度
ideaScorecard:
  signalStrength:
    score: 4
