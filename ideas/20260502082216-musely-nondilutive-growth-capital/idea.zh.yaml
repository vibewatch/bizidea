problem: 现金支付型虚拟诊所即便单位经济模型很强，增长资金也常常只能在创始人稀释、粗糙收入型融资和主动压低营销投放之间选择。传统放贷方不理解处方续方留存、渠道级 CAC 或合规风险，于是强运营者和弱运营者拿到的条款差异不大。结果是，明明付费获客已经跑通的护理业务，反而在最该加速时缺少资本。
targetUser:
  primary: 面向美国现金支付型虚拟诊所的 CFO 和增长副总裁，这些诊所销售复方皮肤科、脱发或更年期订阅服务。
  secondary: 正在扩大付费获客的、由复方药房支持的数字健康品牌财务负责人。
  buyer: CFO 或 CEO
startupThesis:
  nonObviousInsight: 真正的突破不是远程医疗需求继续上升，而是重复处方 cohort 加上广告归因数据，已经让现金支付护理的获客可以被当作可融资资产。Musely 的 CVF 交易说明大资金池想要这类敞口，但多数诊所还缺少拿到资格所需的数据管道和实时监控。
  beachhead: 年化收入 $10M-$100M 的美国虚拟皮肤科和更年期诊所，它们在 Meta 和 Google 上高强度投放，把患者导入可持续复购的复方治疗项目。
  wedge: 一层承保与监控基础设施，把广告平台、诊所运营、药房配药和回款数据连接起来，发放封顶收入分成式获客额度。
  whyNowCatalyst: Musely 的非稀释 CVF 融资证明，规模化消费医疗获客已经可以成为机构资本认可的抵押基础。
  ventureScalePath: 先做现金支付远程医疗品牌的资本操作系统，再扩展到药房基准数据网络、品类化承保、嵌入式采购融资，以及护理 cohort 的二级资本市场网络。
solution: Telehealth Cohort Capital 接入诊所广告账户、患者获客漏斗、开方流程、药房履约和还款数据，在出资前为每个增长 cohort 评分。第一款产品是一条非稀释获客额度，为特定投放活动预支预算，再从该 cohort 已回收收入中按比例收回，并在达到封顶倍数后停止。软件持续监控续方留存、退款率和合规信号，并随着表现变化自动调整可提额度。资本合作方获得实时承保看板，诊所则获得比股权或通用收入型融资更快、更便宜的资金。长期看，公司会成为现金支付护理 cohort 定价的系统记录层。
goToMarketSeed:
  firstCustomer: 一家美国虚拟皮肤科品牌，拥有 50,000 名以上活跃患者、$20M-$80M 年化收入，并把大量付费流量导向复方黄褐斑或脱发订阅服务。
  buyingTrigger: 诊所找到了回本表现不错的付费渠道或新护理品类，但不想靠新一轮股权融资去放大。
  currentAlternative: 风险投资股权、通用收入型融资，或者把广告投放压到内部现金流能承受的水平。
  switchingReason: 这个切口能赢，是因为它承保续方 cohort 和处方回款，而不是宽泛历史收入；因此强运营者能在更少稀释、更短反馈闭环下拿到更高额度。
  pricingHypothesis: 承诺资本收取 2%-4% 平台费，再叠加封顶收入分成，直到还款达到 1.2x-1.5x。
whyNow:
  - point: 大型机构资本已经通过 Customer Value Fund 这类结构进入这个细分领域，而不是继续等企业去做股权融资。
    signalRefs: [CVF 式获客融资已经成立]
    sourceRefs: [1, 2]
  - point: 现金支付的复方护理品类会形成可建模的复购行为，因此可以按 cohort 来看，而不是被当成一次性电商收入。
    signalRefs: [续方驱动的复方护理具备承保基础]
    sourceRefs: [1, 2]
  - point: 资金用途被明确写成客户获取，这让这个切口天然具备清晰的买方、预算和 ROI 闭环。
    signalRefs: [增长资金明确流向获客投放]
    sourceRefs: [2]
  - point: 收入分成融资正在成为这个细分市场更受欢迎的结构，因此专门做承保和监控的一层产品还有明显空间。
    signalRefs: [收入分成正在替代传统风险债]
    sourceRefs: [1]
differentiator: 通用收入型融资提供方看历史收入和银行流水；这个产品看真正负责偿还预付款的引擎，也就是处方获客 cohort、续方留存和品类特定合规数据。这样既能让强运营者获得更合理价格，也能沉淀出一个随更多诊所和资本方加入而增值的专有数据集。
