problem: 即便单位经济性很强，自费型虚拟诊所仍常通过创始人稀释、粗放的收入融资，或自我限制营销预算来支持增长。传统放贷方并不理解处方续方持续性、渠道级 CAC 或合规风险，因此优质经营者与弱经营者往往拿到相同条款。结果是，恰恰在付费获客有效时，盈利中的医疗业务反而资本不足。
targetUser:
  primary: 美国提供复方皮肤科、脱发或更年期订阅服务的自费型虚拟诊所中的 CFO 与增长副总裁。
  secondary: 正在扩大付费获客、由复方药房支持的数字健康品牌财务负责人。
  buyer: CFO 或 CEO
startupThesis:
  nonObviousInsight: 真正的突破并不在于远程医疗需求更多了，而在于重复处方队列与广告归因数据的结合，使自费医疗中的客户获取首次具备了可融资的资产属性。Musely 的 CVF 交易表明大体量资本希望获得这类敞口，但多数诊所仍缺乏达标所需的数据基础设施与监控能力。
  beachhead: 美国年化收入在 $10M-$100M 之间、依赖 Meta 和 Google 大量投放，将患者导入复购型复方治疗项目的虚拟皮肤科与更年期诊所。
  wedge: 一个连接广告平台、诊所运营、药房履约数据与回款数据的授信与监控层，用于发放设有上限的收入分成式获客额度。
  whyNowCatalyst: Musely 的非稀释性 CVF 融资证明，规模化消费医疗的获客如今已能成为机构资本认可的抵押基础。
  ventureScalePath: 先成为自费远程医疗品牌的资本操作系统，再扩展为涵盖药房基准、品类化授信、嵌入式采购融资以及医疗队列二级资本市场的网络。
solution: Telehealth Cohort Capital 会接入诊所的广告账户、患者获客漏斗、处方流程、药房履约与还款数据，在放款前为每个增长队列评分。首个产品是一条非稀释性的获客额度，为特定投放活动预付预算，并通过队列已收款收入的一定比例、在封顶条件下回收。软件会持续监控续方持续性、退款率与合规信号，并随表现变化自动调整提款上限。这让资金合作方拥有实时授信仪表盘，也让诊所获得比股权或通用收入融资更快、更便宜的资金。长期来看，公司将成为自费医疗队列定价的系统记录层。
goToMarketSeed:
  firstCustomer: 一家美国虚拟皮肤科品牌，拥有 50,000 以上活跃患者、$20M-$80M 年化收入，并大量投放以获取复方黄褐斑或脱发订阅用户。
  buyingTrigger: 诊所发现某个付费渠道或新护理品类的回本表现很好，但希望在不进行股权融资的前提下放大投入。
  currentAlternative: 风险投资股权、通用收入融资，或将广告支出压到与内部现金流匹配。
  switchingReason: 这个切入口之所以能胜出，是因为它依据续方队列和处方回款，而不是宽泛的历史收入来授信，因此优质经营者能以更少稀释获得更高额度，并形成更紧密的反馈闭环。
  pricingHypothesis: 对已承诺资本收取 2% 到 4% 的平台费，外加收入分成，直至回收达到 1.2x 到 1.5x。
