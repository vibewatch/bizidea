  painIntensity:
    score: 4
    rationale: 强势的虚拟诊所经常面临股权稀释与增长支出受限之间的痛苦权衡。
  wedgeClarity:
    score: 5
    rationale: 为复购型复方护理队列的客户获取提供资金，是一个狭窄但可立即验证的切入点。
  defensibility:
    score: 4
    rationale: 横跨广告、处方、履约与回款的专有授信数据，将会不断积累，带来更优定价与筛选能力。
  ventureScale:
    score: 4
    rationale: 尽管滩头市场较窄，但该模式可扩展到更多自费专科，并进一步发展成更广泛的医疗资本网络。
topRisks:
- name: 监管冲击
  description: 复方远程医疗规则变化可能突然压缩需求，或削弱已融资诊所的还款能力。
  mitigation: 从皮肤科、脱发和更年期机构的分散化敞口开始，并将合规门槛嵌入授信流程。
- name: 渠道波动
  description: Meta 或 Google 的算法变化可能迅速打破对队列回本周期的假设。
  mitigation: 按日监控队列、按渠道限制敞口，并根据表现分批释放资金。
- name: 逆向选择
  description: 最急于获得非稀释性资本的诊所，可能恰恰是留存走弱或数据质量较差的那一批。
  mitigation: 要求直接系统集成，从小额试点额度开始，并仅依据经验证的回款与续方行为定价。
