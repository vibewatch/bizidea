differentiator: 通用收入融资提供方主要看历史收入和银行流水。本产品则直接对偿还垫款的真实引擎进行授信，也就是处方获客队列、续方持续性和品类特定的合规数据。这会为优质经营者带来更优定价，并沉淀一套随着更多诊所和资本提供方加入网络而愈发增值的专有数据集。
