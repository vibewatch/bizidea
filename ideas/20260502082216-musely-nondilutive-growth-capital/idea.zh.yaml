jobsToBeDone:
  - job: 当付费获客表现超过计划时，帮助虚拟诊所 CFO 在不稀释股权的前提下拿到下一段增长资金，从而在下一轮董事会融资前先把收入做上去。
    currentAlternative: 风险投资股权，或把投放放缓到现有现金能承受的水平
    successMetric: 获批的新增营销预算，且回本周期低于 12 个月
  - job: 当资本合作方想配置现金支付医疗增长敞口时，帮助投资团队承保处方 cohort 并监控风险，从而更安全地部署非稀释资本。
    currentAlternative: 做通用收入型融资尽调，或者直接放弃这个行业
    successMetric: 按已融资 cohort 统计的损失率与回款速度
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Musely 这轮融资直接证明，大规模非稀释资本正在进入这个具体流程。
  painIntensity:
    score: 4
    rationale: 强势虚拟诊所经常要在股权稀释和压缩增长投放之间做很痛的取舍。
  wedgeClarity:
    score: 5
    rationale: 围绕可复购的复方护理 cohort 去给客户获取融资，是一个边界很窄、且能立刻验证的切入点。
  defensibility:
    score: 4
    rationale: 横跨广告、开方、履约和回款的专有承保数据会不断复利，带来更好的定价和筛选能力。
  ventureScale:
    score: 4
    rationale: 滩头市场虽窄，但这个模型可以扩展到更多现金支付专科，并最终变成更广的医疗资本网络。
topRisks:
  - name: 监管冲击
    description: 一旦复方远程医疗规则发生变化，已融资诊所的需求和偿付能力都可能突然受损。
    mitigation: 早期先把敞口分散在皮肤、毛发和更年期运营者之间，并把合规门槛嵌进承保流程。
  - name: 渠道波动
    description: Meta 或 Google 的算法变化，可能迅速打穿 cohort 回本假设。
    mitigation: 按天监控 cohort、按渠道设置敞口上限，并把放款拆成与表现挂钩的分批释放。
  - name: 逆向选择
    description: 最急着要非稀释资本的诊所，可能正是留存走弱或数据质量最差的那批。
    mitigation: 强制直连系统集成，从很小的试点额度起步，并且只基于已验证的回款和续方行为定价。
