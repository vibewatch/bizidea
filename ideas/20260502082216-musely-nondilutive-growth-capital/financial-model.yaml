scenarios:
  downside:
    description: Data-room access and redraw adoption slip by one quarter, leaving the company with fewer active clinics and lower revenue per clinic.
    y3RevenueK: 1287.0
    y3EbitdaK: -889.0
    cashLowPointK: -351.0
    keyAssumptionChanges:
      - Q4Y2 exits at 4 active clinics instead of 5.
      - Y3 revenue per clinic is 15% below base because capital partners cap draw size.
      - Gross margin falls to 68% as compliance and servicing burden rises.
  base:
    description: Five active clinics are live by Q4Y2 and six by Q4Y3, with revenue per clinic rising as pilots convert to redraw-heavy production lines.
    y3RevenueK: 1716.0
    y3EbitdaK: -551.6
    cashLowPointK: 105.8
    keyAssumptionChanges:
      - Matches the main model.
      - Assumes asset-light economics with no balance-sheet funding losses.
      - Assumes one external capital partner is in market by Y1 and a second by Y2.
  upside:
    description: A second capital partner arrives earlier and redraw utilization ramps faster, pushing one extra clinic live and lifting revenue per clinic.
    y3RevenueK: 2145.0
    y3EbitdaK: -243.0
    cashLowPointK: 324.0
    keyAssumptionChanges:
      - Q4Y3 exits at 7 active clinics instead of 6.
      - Y3 revenue per clinic is 10% above base from faster redraw cadence.
      - Gross margin reaches 75% as monitoring and reporting scale cleanly.
sensitivity:
  - variable: ARPU
    downsideCase: Y3 revenue per clinic 15% below plan
    baseCase: Q1-Q4 Y3 ARPU per clinic of $72K/$78K/$78K/$83K per quarter
    upsideCase: Y3 revenue per clinic 10% above plan
    y3RevenueImpactK: -257.0
    cashImpactK: -185.0
  - variable: CAC
    downsideCase: CAC rises 25% and one fewer clinic is closed by Q4Y3
    baseCase: CAC of $77.2K using Y2 sales and marketing spend per new clinic
    upsideCase: CAC falls 20% from partner referrals and tighter ICP focus
    y3RevenueImpactK: -156.0
    cashImpactK: -240.0
  - variable: churn
    downsideCase: Monthly logo churn reaches 4% from poor redraw economics
    baseCase: Monthly logo churn of 3%
    upsideCase: Monthly logo churn improves to 2%
    y3RevenueImpactK: -90.0
    cashImpactK: -70.0
  - variable: sales cycle
    downsideCase: Clinic diligence and capital partner sign-off slip by one quarter
    baseCase: First pilot closes in M9 and Y2 follows the planned 2/3/4/5 clinic ramp
    upsideCase: One production conversion lands a quarter early
    y3RevenueImpactK: -325.0
    cashImpactK: -330.0
  - variable: gross margin
    downsideCase: Gross margin falls to 68% from heavier compliance and servicing work
    baseCase: Gross margin of 72%
    upsideCase: Gross margin improves to 75% with standardized monitoring
    y3RevenueImpactK: 0.0
    cashImpactK: -69.0
  - variable: hiring pace
    downsideCase: Engineering and GTM hires happen two quarters earlier than planned
    baseCase: Post-pilot hires start in Q2Y2, Q4Y2, and Q2Y3
    upsideCase: One hire is delayed until after Q4Y2 without slowing milestones
    y3RevenueImpactK: -80.0
    cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> Diligence
      Diligence --> ActiveClinics
      ActiveClinics --> FundedVolume
      FundedVolume --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from growing from one pilot clinic in Y1 to five active facilities by Q4Y2 and six by Q4Y3 while revenue per clinic rises with redraw utilization.
  - checkName: Must go right
    finding: The company must win data-room access and capital-partner approval on time because the sales-cycle sensitivity shows roughly a $330K cash hit if closings slip by one quarter.
  - checkName: Model breaks if
    finding: The downside case goes cash-negative if data-ready clinic conversion slows and gross margin compresses to 68% from extra servicing burden.
  - checkName: Next-round proof
    finding: The seed-ready proof point is reaching at least five active clinics plus a second capital partner and automated redraw reporting by month 24.
sanityChecks:
  ruleOf40: "Y3 growth 109.3% + EBITDA margin -32.1% = 77.2%"
  burnMultiple: "0.62x in Y3 (-$551.6K EBITDA burn on $896.0K net new revenue versus Y2)."
  revenuePerFte: "$214.5K Y3 using 8 Q4 FTE (benchmark $200-400K SaaS)."
  flags:
    - Base case assumes asset-light economics and excludes credit losses, reserve requirements, or warehouse interest if the company later puts capital on balance sheet.
    - Revenue concentration is high because five clinics drive all Y2 revenue and six clinics drive all Y3 revenue.
    - External capital-partner timing and clinic data-sharing are still pre-validation assumptions, so a one-quarter slip pushes the model materially closer to a cash crunch.
