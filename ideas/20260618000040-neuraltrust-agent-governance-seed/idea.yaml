problem: >-
  Support and account-operations teams are starting to let AI agents read shared
  mailboxes, pull customer context from CRM and ticketing systems, and draft or
  trigger next actions before security teams can prove what those agents are
  allowed to do. Once an agent can touch email, attachments, Salesforce, and
  Zendesk in one workflow, a single bad action can leak internal data, send the
  wrong message, or mutate a live customer record with no clear approval trail.
  Existing IAM, DLP, and observability tools govern users, apps, or model
  outputs separately, so enterprises still lack a purpose-built release gate for
  autonomous customer-facing agents.
targetUser:
  primary: "VP of Customer Operations Technology or Director of AI Platform Security at a 1,000-8,000 employee fintech, insurer, or outsourced-support operator deploying email-connected support agents into Salesforce and Zendesk."
  secondary: "Head of Support Systems or CX automation lead responsible for shared mailboxes, ticketing workflows, and QA."
  buyer: "CISO or CIO."
startupThesis:
  nonObviousInsight: >-
    The first durable control point in agent governance is not generic model
    observability or broad identity plumbing. It is the message-to-action
    boundary where an agent moves from reading a customer thread to sending an
    email, updating a ticket, or touching account data; that boundary is where
    enterprises feel immediate leakage and brand risk.
  beachhead: >-
    1,000-8,000 employee fintechs, insurers, and outsourced-support operators
    launching Outlook- or Gmail-connected support agents that read shared
    inboxes, fetch account context from Salesforce or Zendesk, and propose or
    execute service actions.
  wedge: >-
    A shared-inbox agent governor that runs new support agents in shadow mode,
    compiles approved mailbox, attachment, CRM-field, and outbound-action
    policies, and blocks unapproved sends or record updates before production
    rollout.
  whyNowCatalyst: >-
    NeuralTrust's financing, plus the explicit warning that email-connected
    agents can leak internal data as enterprises move autonomous agents into
    production, makes communication-linked agent release control newly urgent.
  ventureScalePath: >-
    Start with shared-inbox and support workflows, then expand into sales,
    collections, procurement, HR, and third-party service agents until the
    product becomes the operational control plane for every communication- and
    action-taking enterprise agent.
solution: >-
  The product connects to Microsoft 365 or Google Workspace, Salesforce,
  Zendesk, and common agent builders to create a live registry of every
  customer-operations agent, its owner, reachable data, and allowed actions.
  Before a new agent goes live, the platform shadow-runs it on historical or
  live-supervised threads, showing which mailboxes, attachments, records, and
  outbound actions it would touch. Security and operations leaders approve an
  action envelope that specifies what the agent may read, when it may draft
  versus send, which fields it may update, and when a human escalation is
  mandatory. Once live, the governor enforces those policies, records every
  blocked or approved action, and gives teams a one-click kill switch if a
  workflow drifts or a risky pattern appears.
goToMarketSeed:
  firstCustomer: >-
    A 2,500-person B2B fintech with a centralized support-operations team
    piloting an Outlook-based escalation agent that reads shared mailboxes,
    checks account status in Salesforce, and updates Zendesk before a human
    reply is sent.
  buyingTrigger: >-
    A production-readiness review for moving a support agent from draft-only
    assistance to action-taking workflows across email, CRM, and ticketing.
  currentAlternative: >-
    Read-only copilots, manual QA queues, native mailbox rules, shared service
    accounts, and custom middleware around CRM or ticketing systems.
  switchingReason: >-
    The first customer switches because the governor lets them prove exactly
    what a support agent can read and do, keep the agent in shadow mode until
    safe, and launch faster than building custom guardrails around every
    mailbox and system connector.
  pricingHypothesis: >-
    Annual platform subscription priced by governed shared mailboxes and active
    action-taking agent workflows, with premium modules for runtime evidence
    retention and incident response.
