topRisks:
  - name: "Platform encroachment"
    description: "Microsoft, Salesforce, Zendesk, or major agent builders could add native approval and policy features for support agents."
    mitigation: "Win first on cross-system shadow testing, evidence, and policy enforcement across mailbox plus CRM plus ticketing stacks that no single platform owns."
  - name: "Premature market timing"
    description: "If prospects are still using draft-only copilots, they may not feel enough pain to buy a dedicated control plane yet."
    mitigation: "Sell only into teams crossing the line into action-taking workflows, where production reviews and incident fears already create an executive deadline."
  - name: "Integration drag"
    description: "Customers may hesitate if the first deployment requires too much setup across mailbox, CRM, and ticketing systems."
    mitigation: "Start with a packaged Outlook-plus-Salesforce-plus-Zendesk launch path and use shadow mode to prove value before deeper rollout work."
