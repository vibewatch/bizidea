slug: shared-inbox-agent-governor
date: "2026-06-18"
executiveSummary: >-
  Shared-inbox agent governor is a control plane for enterprises moving support
  agents from draft-only assistance to action-taking workflows across email,
  CRM, and ticketing systems. The beachhead is regulated, support-heavy
  mid-market enterprises in fintech, insurance, and outsourced support where a
  single bad email send, attachment pull, or record update can create immediate
  customer and compliance risk. The first product is not a broad AI governance
  suite; it is a release gate that shadow-tests one support workflow, compiles
  an approval envelope for allowed reads and actions, and enforces those bounds
  once the agent goes live. That wedge matches the researched buying trigger:
  production-readiness review when a team wants to let an agent send, update,
  or escalate instead of only drafting. The company should sell initially
  through direct design-partner deals and implementation partners already
  deploying Microsoft 365, Salesforce, and Zendesk in support environments.
  This plan assumes buyers will pay for a neutral cross-system control layer
  because native controls do not yet provide shadow testing, approval logic,
  and evidence across mailbox plus CRM plus ticketing workflows; that
  assumption must be validated quickly. The largest strategic risk is that
  customers remain in assistive mode longer than expected or accept native
  platform controls as sufficient. Research supports category urgency and a
  plausible early market, but it does not provide named production customers or
  standalone pricing benchmarks for this exact product, so early proof must
  focus on paid pilots, deployment speed, and pilot-to-production conversion.
problem:
  - Enterprises can let support agents read shared inboxes, pull CRM context, and update tickets before they can prove exactly what those agents are allowed to read, send, or change.
  - Existing IAM, DLP, and observability tools govern users, apps, and model output separately, leaving no purpose-built release gate at the message-to-action boundary in customer support workflows.
solution:
  - Provide a live registry of support agents, owners, reachable systems, and allowed actions across Microsoft 365 or Google Workspace, Salesforce, and Zendesk.
  - Shadow-run new agents on historical or supervised live threads, generate an approval envelope for mailbox, attachment, CRM-field, and outbound actions, then enforce those policies with audit evidence and a kill switch.
whyWeWin:
  - We start at the narrowest point of highest buyer anxiety: outbound email sends and customer-record mutations in support workflows, where budget and executive attention appear before broad governance projects are funded.
  - Cross-system shadow-test data, blocked-versus-approved action history, and reusable policy templates for support workflows can become a workflow-specific moat that native single-platform controls do not easily replicate.
strategicChoices:
  beachhead: Regulated 1,000-8,000 employee enterprises running Outlook- or Gmail-connected support agents that read shared mailboxes, fetch account context from Salesforce, and update Zendesk before human review is removed.
  wedgeRationale: This entry point has a concrete launch trigger, clear economic buyer, and immediate downside if controls fail; it reaches production proof faster than selling a horizontal AI governance suite across every agent type.
  sequencingRationale: Product starts with shadow mode and approval envelopes because buyers must trust evidence before they enable inline enforcement; GTM starts with one workflow and partner-led deployments because integration speed matters more than broad feature count; hiring starts with integration and solutions depth before scaling sales.
  notYet:
    - Sales-assistant, procurement, HR, and collections agents that use different buying motions and policy patterns.
    - Full enterprise AI inventory or compliance suites that compete head-on with broader governance platforms.
    - Custom policy coverage for low-risk draft-only copilots where urgency and budget are weaker.
market:
  tam: >-
    Estimated $0.7B TAM based on roughly 15,000 plausible global beachhead
    enterprises and about $45k initial annual governance ACV.
  sam: >-
    Estimated $180M SAM based on roughly 4,000 near-term US, UK, and EU
    enterprises likely to deploy action-taking support agents.
  som: >-
    Estimated $3.0M year-3 SOM based on 60 early logos at about $50k blended
    ACV after landing one governed workflow and expanding inside accounts.
  segments:
    - Regulated fintech and insurance support organizations moving from draft-only to action-taking service agents.
    - Outsourced-support operators and enterprise CX systems teams managing many shared-mailbox workflows.
  buyingProcess: >-
    The process likely starts with a support or CX automation team requesting
    approval to move one workflow into action-taking mode, then escalates to a
    joint review by security, IT, and operations. The deal closes when the CISO
    or CIO can justify production release, auditability, and rollback without
    waiting for internal middleware to be built.
product:
  mvp: >-
    MVP covers Outlook first, then Salesforce and Zendesk for one support
    workflow: agent discovery, permission mapping, shadow replay on historical
    threads, approval envelopes, blocked-action logging, and an operator kill
    switch. It deliberately excludes broad model observability, non-support
    workflows, and deep compliance workflow modules.
  sixMonth: Ship packaged Outlook plus Salesforce plus Zendesk deployment, reusable policy templates for support escalations, and evidence exports into customer SIEM or governance systems.
  twelveMonth: Add Gmail and Google Workspace support, production-grade inline enforcement, approval workflows by agent owner and system, and analytics showing approval-cycle time, blocked actions, and incident reviews.
  twentyFourMonth: Expand from support into adjacent communication-linked workflows such as claims, collections, and account operations while keeping the same message-to-action control architecture.
  keyBets:
    - Buyers value faster safe launch and clearer action evidence more than a broader AI governance dashboard.
    - One packaged connector path can get first value inside four to six weeks and beat custom middleware.
    - Policy templates learned from shadow runs will improve conversion from pilot to production and create defensibility.
gtm:
  wedge: Sell a paid launch-readiness package for one action-taking support workflow, beginning in shadow mode and converting to production enforcement after approval.
  channels:
    - Founder-led direct sales into CISO, CIO, VP Customer Operations Technology, and CX systems leaders at regulated support-heavy enterprises.
    - Microsoft 365, Salesforce, and Zendesk implementation partners that already own agent rollout and identity setup work.
    - Security and AI-governance consultancies that need an execution-control layer beneath broader advisory projects.
  funnelTargets: "Lead→qualified pilot 20-30%, qualified pilot→paid pilot 50%+, paid pilot→production 60%+, first workflow→second workflow expansion within 9 months in 40%+ of production accounts."
  pricing: >-
    Annual subscription priced by governed shared mailboxes and active
    action-taking workflows, with a paid pilot that converts into a $45k-$90k
    production ACV once the first workflow moves live; this fits the buyer's
    production-readiness budget better than per-seat pricing.
businessModel:
  revenueStreams:
    - Annual platform subscription for governed mailboxes and action-taking workflows.
    - Premium evidence retention, incident review, and audit export modules.
    - Partner-assisted deployment and policy-template onboarding packages.
  unitOfValue: Governed action-taking workflow, measured by active shared mailboxes and approved agent action surfaces.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more mailboxes, brands, and support queues within the same account.
    - Expand from shadow-only approval to inline enforcement and evidence-retention modules.
    - Extend the same control model into adjacent service and operations workflows once the first support workflow is live.
strategyMap:
  northStarMetric: Number of production action-taking workflows governed with approved policies and human override in place.
  inputMetrics:
    - Time from workflow request to policy approval.
    - Shadow-run to paid pilot conversion rate.
    - Paid pilot to production conversion rate.
    - Number of blocked risky actions per live workflow with acceptable false-positive rate.
    - Net expansion from second governed workflow in existing accounts.
  moatsToBuild:
    - Policy-template library for mailbox, attachment, CRM-field, and ticket-update permissions by workflow.
    - Cross-system action graph connecting mailbox scopes, CRM permissions, and runtime actions.
    - Evidence history linking shadow-run findings to live blocked or approved actions and incident outcomes.
  killCriteria:
    - If fewer than 3 of the first 10 design partners are actively moving from draft-only to action-taking support workflows within 9 months, the timing thesis is wrong.
    - If fewer than 2 customers convert from paid pilot to production at "$30k+" annualized value by month 12, the product is not valuable enough versus native controls.
    - If first deployment cannot reliably reach first value in under 6 weeks, integration drag will block efficient GTM.
  mermaid: |
    flowchart LR
      Wedge[Shared inbox launch gate] --> MVP[Shadow mode plus approval envelopes]
      MVP --> Proof[Paid pilots convert to production evidence]
      Proof --> Expansion[More workflows and adjacent ops use cases]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Strong problem signal and coherent wedge, but conviction depends on near-term customer movement into action-taking workflows and willingness to buy a neutral overlay.
    whyBelieve: The company targets a specific launch gate where support teams, security leaders, and platform admins already feel urgency as agents move from drafting to sending and updating records.
    whyDoubt: Native controls from Microsoft, Salesforce, and Zendesk may close enough of the gap that buyers defer a standalone product unless deployment speed and cross-system evidence are clearly superior.
    nextDiligence: Validate with 8-10 design-partner prospects whether one workflow can become a paid pilot and then production within one budget cycle using the packaged connector path.
  firstCustomer:
    title: VP Customer Operations Technology at a regulated mid-market fintech
    profile: A 2,500-person B2B fintech using Outlook, Salesforce, and Zendesk, with a centralized support-operations team trying to automate escalations without exposing customer data or mutating records incorrectly.
    trigger: Security and operations must approve moving an inbox-connected agent from draft-only replies to actions that can send messages, fetch attachments, or update customer records.
    buyer: CISO or CIO
    initialContract: >-
      $15k-$30k paid pilot for one workflow converting to a $45k-$90k annual
      subscription when the workflow reaches production, then expanding by
      additional workflow or mailbox packs.
  mustBeTrue:
    - At least one regulated support segment is moving from draft-only to action-taking agents quickly enough to create a launch-gate budget now.
    - Buyers view cross-system shadow testing and approval envelopes as materially better than native platform controls or manual QA queues.
    - A packaged Outlook or Gmail plus Salesforce plus Zendesk deployment can reach first value in four to six weeks without heavy custom services.
    - Pilot evidence and blocked-action logs improve trust enough that more than half of paid pilots convert to production.
    - The startup can expand from one workflow to multiple governed workflows before incumbents neutralize the wedge.
  diligenceQuestions:
    - Which vertical has the shortest path from draft-only to action-taking support workflows: fintech, insurance, or BPO?
    - What exact objections do CISOs raise when comparing this overlay to Microsoft, Salesforce, or Zendesk native controls?
    - How many risky actions does shadow mode catch that a prospect's current QA or native controls miss?
    - Can partners repeatedly deploy the first connector bundle in under six weeks with limited founder involvement?
    - What production ACV will buyers accept for one workflow before expansion modules are sold?
operatingAssumptions:
  - assumption: Buyers will fund a dedicated release-control layer before they experience a public customer incident.
    basis: research.yaml
    validationTest: Win at least 4 paid pilots from prospects that have not yet had a major visible incident but are at a production-readiness gate.
    decisionImpact: If false, reposition toward incident-response overlays or wait for a later market timing window.
  - assumption: Cross-system support workflow evidence is valuable enough that customers will not rely only on native vendor controls.
    basis: research.yaml
    validationTest: In discovery and pilots, confirm at least 70% of qualified prospects cite mailbox-plus-CRM-plus-ticketing gaps that native controls do not cover.
    decisionImpact: If false, narrow into partner tooling or abandon the standalone control-plane thesis.
  - assumption: The first packaged connector path can be implemented with minimal custom engineering.
    basis: operator judgment
    validationTest: Complete 3 design-partner deployments with the same core integration playbook and less than 2 engineer-weeks of custom work each.
    decisionImpact: If false, gross margin and sales efficiency break, so product scope must narrow further or services must become a deliberate revenue line.
  - assumption: Policy-template reuse across regulated support teams will materially shorten approval cycles over time.
    basis: idea.yaml
    validationTest: Show that median approval setup time for the fifth pilot is at least 30% lower than for the first due to reusable templates.
    decisionImpact: If false, the moat weakens and the company may need to differentiate on analytics or incident response instead.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview and qualify 25 target accounts already piloting support agents across Outlook or Gmail plus Salesforce or Zendesk.
    hypothesis: At least 10 qualified prospects are actively planning action-taking workflows within the next 12 months.
    successMetric: 10+ qualified prospects with named workflow, launch date, and executive reviewer.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build a clickable approval-envelope prototype and run workflow reviews with 6 design-partner prospects.
    hypothesis: Buyers prefer workflow-specific shadow approval screens over generic governance dashboards.
    successMetric: 4+ prospects agree to a technical pilot or paid discovery after seeing the prototype.
    owner: Founder product
  - horizon: 0–90 days
    experiment: Implement the first Outlook plus Salesforce plus Zendesk shadow-run connector bundle.
    hypothesis: First value can be shown on historical support threads in under 4 weeks.
    successMetric: One design partner sees shadow-run evidence and blocked-action examples within 30 days of kickoff.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Convert 3 design partners into paid pilots with explicit production go-live criteria.
    hypothesis: Prospects will pay for launch-readiness and evidence before full inline enforcement is available.
    successMetric: 3 paid pilots signed at "$15k+" each with agreed success criteria.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Launch inline enforcement and kill switch for the first production workflow.
    hypothesis: Shadow-mode evidence is sufficient to earn production trust in at least half of paid pilots.
    successMetric: 2+ paid pilots convert to production with live policy enforcement.
    owner: Engineering lead
  - horizon: 6–12 months
    experiment: Recruit 3 implementation partners and measure time-to-value across partner-led deployments.
    hypothesis: Partners can reduce deployment friction and widen pipeline without excessive custom work.
    successMetric: 3 signed partners and 2 partner-sourced pilots with deployment under 6 weeks.
    owner: Head of partnerships
operations:
  - Maintain a repeatable workflow-onboarding playbook covering mailbox scopes, CRM fields, ticket actions, escalation thresholds, and rollback owners.
  - Export approval logs, blocked actions, and incident evidence into customer SIEM or governance systems rather than building a full control tower on day one.
  - Build formal partnerships with Microsoft 365, Salesforce, and Zendesk implementers that already manage identity, connector, and support-workflow rollout.
  - Run every production account with named customer-side security owner, operations owner, and emergency kill-switch contact.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the first connector bundle, policy engine, and shadow-run infrastructure needed for credible pilots.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales, design-partner recruitment, and packaging because the first deals require problem education and rapid iteration.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Reduce deployment friction, codify onboarding playbooks, and protect engineering bandwidth as pilots start.
  - role: Security / policy product lead
    startTiming: Month 6
    rationale: Turn pilot learnings into reusable approval templates, evidence exports, and enforcement logic that customers trust.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Convert implementation partners into a scalable channel once the packaged deployment path works.
milestones:
  - horizon: 0–12 months
    items:
      - Package Outlook plus Salesforce plus Zendesk shadow-mode deployment.
      - Sign 6-8 design partners and convert at least 3 into paid pilots.
      - Put 2 customers into production with approval envelopes, blocked-action logging, and kill switch enabled.
      - Prove first deployment can reach evidence review in 30 days and production go-live in under 90 days.
  - horizon: 12–24 months
    items:
      - Add Gmail and Google Workspace support plus stronger evidence retention and audit exports.
      - Grow to 15-20 production customers and achieve repeatable second-workflow expansion inside early logos.
      - Establish partner-sourced pipeline as a meaningful share of new pilots.
      - Publish benchmark policy templates for regulated support workflows.
  - horizon: 24–36 months
    items:
      - Expand into adjacent communication-linked workflows such as claims, collections, and account operations.
      - Build multi-workflow governance analytics across existing accounts without becoming a generic compliance suite.
      - Reach category credibility as the default release-control layer for customer-facing action-taking agents.
risks:
  - risk: Native controls from Microsoft, Salesforce, or Zendesk close enough of the workflow-governance gap to compress standalone demand.
    likelihood: High
    impact: High
    mitigation: Differentiate on cross-system shadow testing, evidence portability, and fastest time-to-safe-launch across mixed stacks.
  - risk: Target customers stay in draft-only or assistive mode longer than expected, delaying launch-gate urgency.
    likelihood: Medium
    impact: High
    mitigation: Sell only into teams with explicit production-readiness deadlines and measure movement into action-taking workflows before scaling sales spend.
  - risk: Deployment complexity turns the company into a services-heavy integrator.
    likelihood: Medium
    impact: High
    mitigation: Constrain the first product to one packaged connector bundle, hire solutions talent early, and reject custom edge cases that break repeatability.
  - risk: Broad AI governance suites or agent-security startups out-market the company with a horizontal platform narrative.
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Keep positioning on one workflow, one trigger, and one measurable
      outcome: faster safe launch of support agents.
  - risk: False positives or overly rigid policies reduce trust from operations teams and slow rollout.
    likelihood: Medium
    impact: Medium
    mitigation: Start in shadow mode, require human escalation thresholds, and track false-positive rates before enabling strict inline blocking.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the core connector and policy-engine build, 6-8 design partners, 3 paid pilots, first production deployments, and the early solutions and partnership hires needed to prove repeatable go-to-market.
