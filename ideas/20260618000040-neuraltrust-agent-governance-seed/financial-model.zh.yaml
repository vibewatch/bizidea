scenarios:
  downside:
    description: 销售周期拉长，伙伴转介绍起量更晚，生产 ARPU 也更接近规划区间的下半段。
    y3RevenueK: 1940.0
    y3EbitdaK: -310.0
    cashLowPointK: 280.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 约为 28，而不是 40。
    - 混合生产 ARPU 比基准低约 10%。
    - 付费试点转正式生产的转化率，从 BP 目标的 60%+ 下滑到 40% 中段。
  base:
    description: 连接器打包路径跑通，伙伴导入试点在第 2 年开始显著起作用，账户扩张也逐步走向 BP ACV 区间的高位。
    y3RevenueK: 2835.0
    y3EbitdaK: 91.6
    cashLowPointK: 771.0
    keyAssumptionChanges:
    - M12 达到 4 个付费账户，Q4Y2 达到 17 个，Q4Y3 达到 40 个。
    - 混合实现 ARPU 从 Y1 后段约 $78K ARR，提升到 Q4Y3 约 $90K ARR。
    - 随着部署变得可重复，Y3 毛利率抬到 70% 中段。
  upside:
    description: 伙伴渠道更早拐点向上，更多账户成功扩到第二条工作流，毛利率改善也快于计划。
    y3RevenueK: 3520.0
    y3EbitdaK: 420.0
    cashLowPointK: 860.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 达到约 48，而不是 40。
    - 超过一半的生产账户会在 9 个月内扩到第二条工作流。
    - 随着定制部署工作更快下降，毛利率升到 70% 高段。
sensitivity:
- variable: ARPU
  downsideCase: 生产定价和扩张效果比计划低约 10%。
  baseCase: 单个付费账户的期末混合 ARPU 达到约 $90K ARR。
  upsideCase: 第二条工作流和证据模块把期末 ARPU 拉到比计划高约 10%。
  y3RevenueImpactK: -283.5
  cashImpactK: -210.0
- variable: CAC
  downsideCase: 伙伴导入线索表现不佳，CAC 抬到接近 $60K。
  baseCase: 在创始人主导和伙伴导入共同分担下，CAC 维持在约 $37.7K。
  upsideCase: 更多管道由实施伙伴贡献，CAC 降到接近 $30K。
  y3RevenueImpactK: -120.0
  cashImpactK: -330.0
- variable: 流失率
  downsideCase: 如果原生控制进步更快，月流失率会升到 3.0%。
  baseCase: 正式生产开始后，月流失率维持在 2.0%。
  upsideCase: 如果受治理工作流成为黏性控制点，月流失率可保持在约 1.2%。
  y3RevenueImpactK: -190.0
  cashImpactK: -170.0
- variable: 销售周期
  downsideCase: 试点转正式生产的周期拉长到约 150 天。
  baseCase: 试点转正式生产周期维持在约 90 天。
  upsideCase: 审批流程顺了后，周期有机会压到接近 60 天。
  y3RevenueImpactK: -360.0
  cashImpactK: -260.0
- variable: 毛利率
  downsideCase: 如果集成继续偏重服务，毛利率会卡在约 68%。
  baseCase: Y3 毛利率达到约 74%。
  upsideCase: 随着策略模板和伙伴安装流程标准化，毛利率升到约 78%。
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: 招聘节奏
  downsideCase: 在需求还没验证前，两名扩张岗位就被提前两个季度招进来。
  baseCase: 招聘按商业计划里“先集成、后扩张”的顺序推进。
  upsideCase: 最后两名招聘推迟到 Q3Y3 之后，也不会伤到交付。
  y3RevenueImpactK: 70.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: "flowchart LR\n  PartnerAndDirectPipeline[伙伴 + 直销管道] --> PaidPilots[付费试点]\n  PaidPilots --> ProductionCustomers[正式生产客户]\n  ProductionCustomers --> Expansion[工作流与证据模块扩张]\n  Expansion --> Revenue[订阅收入]\n  Revenue --> GrossProfit[毛利]\n  GrossProfit --> Cash[现金与跑道]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准收入来自付费账户数增长：Y1 末为 4 个，Q4Y3 为 40 个；同时单账户混合实现 ARR 逐步抬到所述生产 ACV 区间的上沿。
- checkName: 必须跑通的事
  finding: 打包好的 Outlook + Salesforce + Zendesk 部署路径，必须足够可重复，才能让一支以解决方案为主的团队在不压垮毛利率的情况下，于 Q4Y2 支撑 17 个付费账户。
- checkName: 模型会在哪儿断
  finding: 如果试点转正式生产跌到 40% 中段，或者销售周期拖向 150 天，悲观情景下现金会在出现 seed-ready 验证前烧到低于 $300K。
- checkName: 下一轮融资证明点
  finding: 下一轮融资故事是：到 Q4Y2 做到 15–20 个正式生产客户；到 Q2Y3 做到约 29 个付费账户，伙伴导入管道成立，季度 burn 接近走平。
sanityChecks:
  ruleOf40: Y3 增速 184.4% + EBITDA 利润率 3.2% = 187.6%
  burnMultiple: Y2 burn multiple 约为 0.7x：约 $0.8M 的 EBITDA burn，对应约 $1.2M 的净新增 ARR；H2Y3 转为现金净流入。
  revenuePerFte: Y3 末 10 名 FTE 对应 $284K 人均收入（SaaS 基准为 $200-400K）。
  flags:
  - customersEop 同时包含付费试点和正式生产订阅，因此在 Y2 后段以前，真正的生产 logo 数会低于表面客户数。
  - 按单账户计算的混合收入路径在 Y3 触达了所述 $45K-$90K ACV 区间的高位，因此扩张模块和第二条工作流必须真正挂上去。
  - 模型假设 EBITDA 是现金的良好代理；递延收入时点、实施预付款或 capex 都可能让真实现金轨迹略微前后偏移。
