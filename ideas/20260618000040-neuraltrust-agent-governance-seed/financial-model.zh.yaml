slug: shared-inbox-agent-governor
date: '2026-06-18'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-18] 运营模型从带日期的商业计划之后第一个完整月份开始。'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: $2.4M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP milestones + model cash trough] 基准情景采用偏下中位数的 pre-seed 融资规模，既能撑到 Q2Y3 的验证节点，也还能留出超过 6 个月的缓冲。'
- id: A3
  name: 起始付费活跃账户数
  value: '0'
  unit: 数量
  source: '[BP milestones 0-12 months + BP experimentRoadmap] 公司从零收入起步，必须先把共创客户转成付费试点。'
- id: A4
  name: 付费活跃账户定义
  value: 单条受治理工作流上的付费试点，或正式生产订阅账户
  unit: 定义
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 包含所有已经为试点或生产范围付费的账户。'
- id: A5
  name: 付费试点经济模型
  value: 约 3 个月合计 $22.5K（约每月 $7.5K）
  unit: USD/account
  source: '[BP investorMemo.firstCustomer.initialContract $15k-$30k paid pilot + BP experimentRoadmap 3 paid pilots at $15k+] 前几单付费部署按试点合同中位数取值。'
- id: A6
  name: 单账户生产收入爬坡
  value: Y1 后段约 $78K ARR，Y2 约 $80K-$88K ARR，Y3 约 $88K-$90K ARR
  unit: USD/account/year
  source: '[BP gtm.pricing $45k-$90k production ACV + BP businessModel.expansionLevers + Research market.som] 随着证据模块和第二条工作流挂上去，模型会落在所述 ACV 区间的上半段。'
- id: A7
  name: 客户爬坡
  value: M12 达到 4 个付费账户，Q4Y2 达到 17 个，Q4Y3 达到 40 个
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets + Research bottomUpSizingDrivers] 基准情景与商业计划里“第 2 年做到 15-20 个正式生产客户”的节奏一致，到第 3 年仍低于研究里 60 个 logo 的 SOM 路径。'
- id: A8
  name: 收入确认口径
  value: 期末付费活跃账户数 × 当期每个付费账户的混合实现月收入
  unit: 公式
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] 这样收入能直接追溯到客户数和打包假设。'
- id: A9
  name: 毛利率爬坡
  value: Y1 为 55%-62%，Y2 为 66%-72%，Y3 为 73%-76%
  unit: 毛利率
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions + Research regulatoryTechnicalConstraints] 早期部署会被连接器和支持拖累；等打包路径可重复后，毛利率才会抬起来。'
- id: A10
  name: 招聘时间线
  value: M1 创始人 / CEO 和创始工程师；M4 解决方案工程师；M7 安全 / 策略负责人；M10 渠道负责人；M16 第二名工程师；M19 第二名 GTM；M22 G&A；M28 第三名工程师；M31 第二名解决方案岗位
  unit: 时间线
  source: '[BP team + BP strategicChoices.sequencingRationale] 先重集成，等部署可重复后再补渠道能力。'
- id: A11
  name: 创始人总包薪酬
  value: $150K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic] 创始人现金薪酬保持精简，并计入薪资税和福利。'
- id: A12
  name: 工程岗位总包薪酬
  value: $190K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] 需要资深集成与控制平面工程人才，但 pre-seed 阶段的现金薪酬仍低于上市公司水平。'
- id: A13
  name: 解决方案岗位总包薪酬
  value: $150K
  unit: USD/year
  source: '[BP team Solutions engineer + startup-finance heuristic] 反映其要承担部署 ownership，但团队不会养大规模服务台。'
- id: A14
  name: 安全 / 策略岗位总包薪酬
  value: $180K
  unit: USD/year
  source: '[BP team Security / policy product lead + startup-finance heuristic] 假设招一名资深产品安全负责人，专门盯审批模板和执行逻辑。'
- id: A15
  name: 销售 / 渠道岗位总包薪酬
  value: $175K
  unit: USD/year
  source: '[BP team Partnerships lead + BP gtm.channels + startup-finance heuristic] 包含差旅和早期企业销售、渠道销售所需的浮动薪酬。'
- id: A16
  name: G&A 总包薪酬
  value: $120K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] 覆盖精简财务、供应商管理和基础合规支持。'
- id: A17
  name: 薪酬在 P&L 的分摊
  value: 创始人 70% 计入 S&M、30% 计入 G&A；解决方案岗位 50% 计入 S&M、50% 计入 R&D；工程和安全岗位 100% 计入 R&D；渠道岗位 100% 计入 S&M；G&A 岗位 100% 计入 G&A
  unit: 分摊
  source: '[BP team role rationales + BP operations] 把薪酬映射到运营模型使用的功能费用行。'
- id: A18
  name: 非薪酬 opex 爬坡
  value: 月度非薪酬支出从 Y1 早期 S&M/R&D/G&A 的 $6K/$5K/$5K，升到 Q4Y3 的 $18K/$14K/$11K
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] 覆盖云基础设施、差旅、法务、保险和伙伴支持，不假设大规模付费获客。'
- id: A19
  name: 现金转换口径
  value: 现金变动 = EBITDA
  unit: 公式
  source: '[startup-finance heuristic] 在 pre-seed 规模下，capex、税、债务服务和营运资金时点差被视为影响不大。'
- id: A20
  name: 稳态月度 logo 流失率
  value: 2.0%
  unit: 每月百分比
  source: '[startup-finance heuristic for early enterprise workflow SaaS] 年度合同和工作流粘性支持低流失，但模型仍比成熟安全 SaaS 更保守。'
- id: A21
  name: CAC 口径
  value: Y2-Y3 的销售与市场费用 ÷ 36 个净新增付费账户
  unit: 公式
  source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] 反映扩张阶段创始人主导与伙伴导入共同分担获客。'
- id: A22
  name: 下一轮融资的验证节点
  value: Q2Y3 左右做到约 29 个付费账户，伙伴导入管道跑通，季度 burn 接近归零
  unit: 里程碑
  source: '[BP milestones 12-24 months + BP fundingAsk runwayMonths 18 + model cash curve] 这轮 pre-seed 的规模，目标是撑到 seed-ready 的验证点，同时还能保留至少 6 个月缓冲。'
