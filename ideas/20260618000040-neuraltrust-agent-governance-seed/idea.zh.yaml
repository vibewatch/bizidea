topRisks:
- name: 平台下场挤压
  description: Microsoft、Salesforce、Zendesk 或大型智能体构建平台，可能直接为客服智能体补上原生审批和策略能力。
  mitigation: 先在跨系统影子测试、证据沉淀，以及“邮箱 + CRM + 工单”混合栈上的策略执行上赢下来——这些不是任何单一平台能独占的。
- name: 市场时机偏早
  description: 如果潜在客户还停留在只起草的 Copilot 阶段，他们未必痛到愿意现在就买一层独立控制平面。
  mitigation: 只卖给已经跨到动作型工作流的团队；在那里，生产评审和事件担忧本身就会形成管理层期限。
- name: 集成阻力
  description: 如果首个部署要在邮箱、CRM 和工单系统上做太多准备，客户就会犹豫。
  mitigation: 先把 Outlook + Salesforce + Zendesk 打成标准化落地路径，再靠影子模式先证明价值，之后再做更深的扩展。
