jobsToBeDone:
- job: 当我们想让客服智能体不再只起草回复，而是直接推动动作时，帮安全和 CX 运营团队证明它到底能读什么、能做什么，这样我们就能放心批准上线，又不暴露客户或内部数据。
  currentAlternative: 只读 Copilot，加上人工 QA 和自定义连接器规则。
  successMetric: 批准一个动作型客服智能体上线的时间，从数月压缩到两周以内。
- job: 当连接邮件或 CRM 的智能体行为异常时，帮我们及时停掉高风险动作、还原发生了什么，把泄露扼杀在演变成客户事故之前。
  currentAlternative: 邮箱日志、CRM 审计轨迹，以及靠人工拼起来的临时事件复盘。
  successMetric: 识别并停掉高风险客服智能体工作流的平均时间，降到 15 分钟以内。
