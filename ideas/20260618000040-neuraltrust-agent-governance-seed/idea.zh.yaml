problem: 客服与客户运营团队开始让 AI 智能体读取共享邮箱、从 CRM 和工单系统里拉客户上下文、再起草甚至触发下一步动作，但安全团队还没法证明这些智能体到底被允许读什么、做什么。一个智能体一旦能在同一条工作流里碰邮件、附件、Salesforce 和 Zendesk，一次错误动作就可能泄露内部数据、发错消息，或者直接改坏线上客户记录，而且没有清晰的审批链。现有 IAM、DLP 和可观测性工具分别管人、应用或模型输出，企业因此依然缺少一层专门面向自治式客户前台智能体的发布闸门。
targetUser:
  primary: 员工规模在 1,000–8,000 人之间的金融科技、保险公司或外包客服运营商里，负责把连接邮件的客服智能体部署进 Salesforce 和 Zendesk 的客户运营技术副总裁，或 AI 平台安全总监。
  secondary: 负责共享邮箱、工单工作流和 QA 的支持系统负责人或 CX 自动化负责人。
  buyer: CISO 或 CIO。
startupThesis:
  nonObviousInsight: 智能体治理里第一个真正站得住的控制点，不是通用的模型可观测性，也不是大而全的身份底座，而是“消息变动作”这一道边界：智能体从读客户线程，跨到发邮件、更新工单、触碰账户数据的那一刻，企业才会立刻感到数据泄露和品牌风险。
  beachhead: 首批切入对象是员工规模 1,000–8,000 人的金融科技、保险和外包客服运营商：它们正上线连接 Outlook 或 Gmail 的客服智能体，让智能体读取共享邮箱、从 Salesforce 或 Zendesk 拉账户上下文，并提出或直接执行服务动作。
  wedge: 产品切口是一套共享邮箱智能体治理器：新客服智能体先在影子模式下运行，再把已批准的邮箱、附件、CRM 字段和外发动作策略编译出来，并在正式上线前拦住未经批准的发送或记录更新。
  whyNowCatalyst: NeuralTrust 的融资，再加上“接入邮件的智能体可能泄露内部数据”这一明确警告，随着企业把自治式智能体推向生产，沟通链路上的发布控制突然变得很急。
  ventureScalePath: 先从共享邮箱和客服工作流切入，再往销售、催收、采购、HR 以及第三方服务智能体扩，把产品做成所有“会沟通、会动手”的企业智能体的运营控制平面。
solution: 产品连接 Microsoft 365 或 Google Workspace、Salesforce、Zendesk 以及常见智能体构建器，建立一份实时名册：每个客户运营智能体是谁的、能触达哪些数据、又被允许做哪些动作。新智能体上线前，平台会在历史线程或人工监督的实时线程上先跑影子模式，展示它将触碰哪些邮箱、附件、记录和外发动作。安全与运营负责人再批准一套动作边界：哪些内容能读、什么时候只能起草不能发送、哪些字段能改、什么时候必须升级给人工。正式上线后，治理器会按这些策略执行，记录每一次被拦下或被批准的动作；一旦工作流漂移或冒出高风险模式，团队还能一键拉闸。
goToMarketSeed:
  firstCustomer: 一个 2,500 人规模的 B2B 金融科技公司，客服运营团队集中管理，正在试点一个基于 Outlook 的升级处理智能体：它读取共享邮箱、查询 Salesforce 里的账户状态，并在人工回信前更新 Zendesk。
  buyingTrigger: 团队准备把客服智能体从“只起草”推进到能在邮件、CRM 和工单系统里直接执行动作时，会触发一轮生产就绪评审。
  currentAlternative: 只读 Copilot、人工 QA 队列、邮箱原生规则、共享服务账号，以及围绕 CRM 或工单系统自己搭的中间件。
  switchingReason: 首个客户会切换，是因为这套治理器能让他们清楚证明客服智能体究竟能读什么、做什么；在确认安全前先把智能体留在影子模式；而且比给每个邮箱和系统连接器单独造护栏上线更快。
  pricingHypothesis: 按受治理的共享邮箱数量和活跃的动作型智能体工作流数量收取年度平台订阅费；运行时证据留存和事件响应模块单独加价。
