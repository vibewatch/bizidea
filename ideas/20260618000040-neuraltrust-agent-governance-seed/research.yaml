  validationPlan:
  - priority: high
    question: How many regulated support teams are actively moving from draft-only to action-taking email or CRM agents in the next 12 months?
    evidenceToGather: Design-partner pipeline interviews, implementation-partner backlog data, and deployment timetables from Microsoft/Salesforce/Zendesk consultancies.
  - priority: high
    question: Will buyers pay for a dedicated control layer instead of relying on native platform controls?
    evidenceToGather: Comparative pilots against Agentforce/Zendesk native controls plus security-buyer interviews on budget ownership and acceptable ACV.
  - priority: medium
    question: Which policy templates repeat most across fintech, insurance, and BPO workflows?
    evidenceToGather: Shadow-run results from 8-10 design partners across Outlook/Gmail plus Salesforce/Zendesk deployments.
