  sensitivityCases:
  - case: Platform-native controls improve faster than expected
    impact: If Microsoft, Salesforce, or Zendesk bundle shadow-mode approvals and outbound-action policy deeply into their own stacks, the startup must win on neutrality across systems and on evidence portability.
