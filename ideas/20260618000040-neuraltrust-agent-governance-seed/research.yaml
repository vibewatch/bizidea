  sourceRefs:
  - 7
  - 20
- point: Prompt injection, jailbreaks, and tool abuse remain live attack classes for agentic systems, especially when tools or documents can steer downstream actions.
  sourceRefs:
  - 22
  - 23
  - 24
  - 53
  - 54
- point: Customers will increasingly expect evidence of risk management, documentation, human oversight, and data-governance controls when autonomous agents touch sensitive workflows.
  sourceRefs:
  - 15
