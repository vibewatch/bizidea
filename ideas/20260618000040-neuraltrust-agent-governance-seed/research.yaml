competitors:
- name: NeuralTrust
  stage: seed
  wedge: AI gateway plus runtime inspection, posture mapping, and red-team tooling for model and agent traffic.
  pricing: Custom / enterprise
  strength: Purpose-built AI and agent security stack spanning gateway, runtime verdicts, posture, and testing.
  weaknessVsUs: Broad horizontal AI-security scope rather than a workflow-specific support-agent release gate around mailbox, CRM, and ticket actions.
  sourceRefs:
  - 1
  - 25
- name: Zenity
  stage: scale-up
  wedge: Cross-platform AI observability, AI security posture management, and runtime detection/response for agents.
  pricing: Custom / enterprise
  strength: Strong inventory, ownership, permission, and runtime-behavior story across many agent platforms.
  weaknessVsUs: Security-operations orientation is broader than a product explicitly tuned for support workflow shadow mode and approval envelopes.
  sourceRefs:
  - 26
- name: Noma Security
  stage: scale-up
  wedge: AI supply-chain approval, identity controls, action policies, and continuous testing for AI applications and agents.
  pricing: Custom / enterprise
  strength: Explicit focus on authorized models, tools, MCP servers, and autonomous-behavior boundaries.
  weaknessVsUs: Program-wide AI security posture is compelling, but the message is wider than customer-support message-to-action control.
  sourceRefs:
  - 27
- name: ServiceNow AI Control Tower
  stage: incumbent
  wedge: Enterprise AI control tower for discovery, observability, governance, security, and ROI across systems.
  pricing: Custom / enterprise
  strength: Broad cross-system visibility, risk frameworks, and real-time shutdown capabilities.
  weaknessVsUs: Heavyweight horizontal control tower rather than a fast, workflow-specific launch product for Outlook/Gmail plus Salesforce/Zendesk support agents.
  sourceRefs:
  - 14
- name: OneTrust AI Governance
  stage: incumbent
  wedge: Risk, compliance, inventory, and documentation platform for the AI lifecycle.
  pricing: Custom / enterprise
  strength: Strong governance-process and audit posture for organizations standardizing AI approvals.
  weaknessVsUs: Not purpose-built for inline simulation and enforcement of customer-support actions at runtime.
  sourceRefs:
  - 30
regulatoryTechnicalConstraints:
