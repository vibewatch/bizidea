scenarios:
  downside:
    description: Sales cycles stretch, partner referrals ramp later, and production ARPU stays closer to the bottom half of the planned range.
    y3RevenueK: 1940.0
    y3EbitdaK: -310.0
    cashLowPointK: 280.0
    keyAssumptionChanges:
    - Q4Y3 customersEop lands near 28 instead of 40.
    - Blended production ARPU stays about 10 percent below base.
    - Paid-pilot to production conversion slips from the BP target 60 percent+ toward the mid-40s.
  base:
    description: Connector packaging works, partner-sourced pilots begin to matter in year 2, and accounts expand toward the high end of the BP ACV range.
    y3RevenueK: 2835.0
    y3EbitdaK: 91.6
    cashLowPointK: 771.0
    keyAssumptionChanges:
    - 4 paying accounts by M12, 17 by Q4Y2, and 40 by Q4Y3.
    - Blended realized ARPU rises from about $78K ARR late in Y1 to about $90K ARR by Q4Y3.
    - Gross margin reaches the mid-70s by Y3 as deployments become repeatable.
  upside:
    description: Partner channels inflect earlier, second-workflow expansion lands in more accounts, and margin improves faster than planned.
    y3RevenueK: 3520.0
    y3EbitdaK: 420.0
    cashLowPointK: 860.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches about 48 instead of 40.
    - More than half of production accounts expand to a second workflow within 9 months.
    - Gross margin reaches the high-70s as custom deployment work falls faster.
sensitivity:
  - variable: ARPU
    downsideCase: Production pricing and expansion settle about 10 percent below plan.
    baseCase: Exit blended ARPU reaches about $90K ARR per paying account.
    upsideCase: Second-workflow and evidence modules lift exit ARPU about 10 percent above plan.
    y3RevenueImpactK: -283.5
    cashImpactK: -210.0
  - variable: CAC
    downsideCase: Partner-sourced leads underperform and CAC rises toward $60K.
    baseCase: CAC stays near $37.7K as founder-led and partner-led motions share load.
    upsideCase: Implementation partners source more of the pipeline and CAC falls toward $30K.
    y3RevenueImpactK: -120.0
    cashImpactK: -330.0
  - variable: churn
    downsideCase: Monthly churn rises to 3.0 percent as native controls improve faster.
    baseCase: Monthly churn holds at 2.0 percent once production starts.
    upsideCase: Monthly churn stays near 1.2 percent because governed workflows become sticky control points.
    y3RevenueImpactK: -190.0
    cashImpactK: -170.0
  - variable: sales cycle
    downsideCase: Pilot-to-production cycle stretches to about 150 days.
    baseCase: Pilot-to-production cycle stays near 90 days.
    upsideCase: Approvals compress the cycle toward 60 days.
    y3RevenueImpactK: -360.0
    cashImpactK: -260.0
  - variable: gross margin
    downsideCase: Gross margin stalls around 68 percent because integrations stay services-heavy.
    baseCase: Gross margin reaches about 74 percent in Y3.
    upsideCase: Gross margin reaches about 78 percent as policy templates and partner installs standardize.
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: hiring pace
    downsideCase: Two scale hires are pulled forward by two quarters before demand is proven.
    baseCase: Hiring follows the integration-first sequencing in the business plan.
    upsideCase: The last two hires wait until after Q3Y3 proof without hurting delivery.
    y3RevenueImpactK: 70.0
    cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      PartnerAndDirectPipeline[Partner + direct pipeline] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionCustomers[Production customers]
      ProductionCustomers --> Expansion[Workflow and evidence expansion]
      Expansion --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base revenue comes from growing paying accounts from 4 at Y1 exit to 40 by Q4Y3 while blended realized ARR per account rises toward the top of the stated production ACV range.
  - checkName: Must go right
    finding: The packaged Outlook-plus-Salesforce-plus-Zendesk deployment must stay repeatable enough that one solutions-heavy team can support 17 paying accounts by Q4Y2 without crushing gross margin.
  - checkName: Model breaks if
    finding: If pilot-to-production conversion drops into the mid-40s or sales cycles drift toward 150 days, the downside case burns toward a sub-$300K cash floor before seed-ready proof appears.
  - checkName: Next-round proof
    finding: The next financing story is 15-20 production customers by Q4Y2 and roughly 29 paying accounts by Q2Y3 with partner-sourced pipeline and near-flat quarterly burn.
sanityChecks:
  ruleOf40: Y3 growth 184.4% + EBITDA margin 3.2% = 187.6%
  burnMultiple: Y2 burn multiple is about 0.7x using roughly $0.8M of EBITDA burn against about $1.2M of net new ARR; H2Y3 turns cash generative.
  revenuePerFte: $284K Y3 on 10 ending FTE (benchmark $200-400K SaaS)
  flags:
  - customersEop combines paid pilots and production subscriptions, so true production-logo count is lower than the headline customer count until late Y2.
  - The blended per-account revenue path reaches the high end of the stated $45K-$90K ACV range by Y3, so expansion modules and second-workflow attach must materialize.
  - The model assumes EBITDA is a good proxy for cash; deferred revenue timing, implementation prepayments, or capex could move actual cash modestly earlier or later.
