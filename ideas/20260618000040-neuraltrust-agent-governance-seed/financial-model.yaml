slug: shared-inbox-agent-governor
date: "2026-06-18"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: YYYY-MM
    source: '[BP date 2026-06-18] the operating model starts in the first full month after the dated business plan.'
  - id: A2
    name: Opening cash / pre-seed raise
    value: $2.4M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP milestones + model cash trough] base case uses a lower-midpoint pre-seed raise that reaches the Q2Y3 proof point with more than six months of buffer.'
  - id: A3
    name: Starting active paying accounts
    value: '0'
    unit: count
    source: '[BP milestones 0-12 months + BP experimentRoadmap] the company begins pre-revenue and must first convert design partners into paid pilots.'
  - id: A4
    name: Active paying account definition
    value: A paid pilot or production subscription account for one governed workflow
    unit: definition
    source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop includes any account already paying for pilot or production scope.'
  - id: A5
    name: Paid pilot economics
    value: $22.5K over about 3 months (~$7.5K per month)
    unit: USD/account
    source: '[BP investorMemo.firstCustomer.initialContract $15k-$30k paid pilot + BP experimentRoadmap 3 paid pilots at $15k+] midpoint pilot value is used for the first paid deployments.'
  - id: A6
    name: Production revenue per paying account ramp
    value: Late Y1 about $78K ARR, Y2 about $80K-$88K ARR, Y3 about $88K-$90K ARR
    unit: USD/account/year
    source: '[BP gtm.pricing $45k-$90k production ACV + BP businessModel.expansionLevers + Research market.som] the model lands near the upper half of the stated ACV range as evidence and second-workflow modules attach.'
  - id: A7
    name: Customer ramp
    value: 4 paying accounts by M12, 17 by Q4Y2, 40 by Q4Y3
    unit: customersEop
    source: '[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets + Research bottomUpSizingDrivers] base case matches 15-20 production customers by year 2 and stays below the researched 60-logo SOM path by year 3.'
  - id: A8
    name: Revenue recognition convention
    value: Period-end active paying accounts multiplied by the blended realized monthly revenue per paying account for that period
    unit: formula
    source: '[BP gtm.pricing + BP businessModel.unitOfValue] this keeps revenue directly traceable to customer count and packaging assumptions.'
  - id: A9
    name: Gross margin ramp
    value: 55%-62% in Y1, 66%-72% in Y2, 73%-76% in Y3
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions + Research regulatoryTechnicalConstraints] early deployments carry connector and support drag before the packaged path becomes repeatable.'
  - id: A10
    name: Hiring timeline
    value: M1 founder CEO and founding engineer; M4 solutions engineer; M7 security/policy lead; M10 partnerships lead; M16 second engineer; M19 second GTM hire; M22 G&A; M28 third engineer; M31 second solutions hire
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale] hiring stays integration-heavy first, then adds channel capacity once repeatable deployments exist.'
  - id: A11
    name: Founder loaded compensation
    value: $150K
    unit: USD/year
    source: '[BP team Founder CEO + startup-finance heuristic] lean founder cash pay plus payroll taxes and benefits.'
  - id: A12
    name: Engineering loaded compensation
    value: $190K
    unit: USD/year
    source: '[BP team Founding eng + startup-finance heuristic] senior integration and control-plane engineering talent is required, but the pre-seed plan stays below public-company cash levels.'
  - id: A13
    name: Solutions loaded compensation
    value: $150K
    unit: USD/year
    source: '[BP team Solutions engineer + startup-finance heuristic] reflects deployment ownership without a large services bench.'
  - id: A14
    name: Security / policy loaded compensation
    value: $180K
    unit: USD/year
    source: '[BP team Security / policy product lead + startup-finance heuristic] assumes a senior product-security hire focused on approval templates and enforcement logic.'
  - id: A15
    name: Sales / partnerships loaded compensation
    value: $175K
    unit: USD/year
    source: '[BP team Partnerships lead + BP gtm.channels + startup-finance heuristic] includes travel and variable compensation for early enterprise and channel selling.'
  - id: A16
    name: G&A loaded compensation
    value: $120K
    unit: USD/year
    source: '[BP operations + startup-finance heuristic] covers lean finance, vendor management, and basic compliance support.'
  - id: A17
    name: Payroll allocation to P&L lines
    value: Founder 70% S&M and 30% G&A; solutions 50% S&M and 50% R&D; engineering and security 100% R&D; partnerships 100% S&M; G&A 100% G&A
    unit: allocation
    source: '[BP team role rationales + BP operations] maps payroll into the functional lines used in the operating model.'
  - id: A18
    name: Non-payroll opex ramp
    value: Monthly non-payroll spend rises from S&M/R&D/G&A of $6K/$5K/$5K in early Y1 to $18K/$14K/$11K by Q4Y3
    unit: USD/month
    source: '[BP operations + startup-finance heuristic] covers cloud infrastructure, travel, legal, insurance, and partner support without assuming large paid-demand programs.'
  - id: A19
    name: Cash conversion convention
    value: Cash movement equals EBITDA
    unit: formula
    source: '[startup-finance heuristic] capex, taxes, debt service, and working-capital timing are assumed immaterial at pre-seed scale.'
  - id: A20
    name: Steady-state monthly logo churn
    value: 2.0%
    unit: percent per month
    source: '[startup-finance heuristic for early enterprise workflow SaaS] annual contracts and workflow stickiness support low churn, but the model remains conservative versus mature security SaaS.'
  - id: A21
    name: CAC convention
    value: Y2-Y3 sales and marketing spend divided by 36 net new paying accounts
    unit: formula
    source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] captures founder-led plus partner-led customer acquisition in the scale-up period.'
  - id: A22
    name: Next-round milestone for funding sizing
    value: About 29 paying accounts by Q2Y3 with partner-sourced pipeline working and quarterly burn near zero
    unit: milestone
    source: '[BP milestones 12-24 months + BP fundingAsk runwayMonths 18 + model cash curve] the pre-seed raise is sized to reach a seed-ready proof point and still preserve at least six months of buffer.'
