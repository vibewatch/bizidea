    sourceRefs:
    - 3
    - 5
    - 7
  adoptionFrictionMatrix:
  - friction: 批次溯源和 QMS 集成很杂乱
    severity: high
    affectedBuyer: QA 系统负责人
    mitigation: 从一个产线族和轻量 ERP/QMS 连接器起步，再要求更深的 MES 改造。
    sourceRefs:
    - 16
    - 17
    - 27
    - 35
  - friction: 团队可能不信任自动化的隔离范围
    severity: high
    affectedBuyer: 工厂 QA 经理
    mitigation: 先主打影子模式建议、人工审批，以及和图像、批次数据关联的明确理由。
    sourceRefs:
    - 3
    - 5
    - 22
  - friction: 采购阶段出现“已有套件”异议
    severity: medium
    affectedBuyer: 质量副总裁
    mitigation: 把自己定位成反哺 SafetyChain、MasterControl 或 Trustwell 的实时层，而不是要替代它们。
    sourceRefs:
    - 27
    - 29
    - 35
  - friction: 告警触发之后，跨部门跟进容易停滞
    severity: medium
    affectedBuyer: 工厂运营负责人
    mitigation: 在同一份案件记录里，把基于角色的任务分派给 QA、维护、卫生和供应商质量团队。
    sourceRefs:
    - 27
    - 35
    - 38
    - 39
