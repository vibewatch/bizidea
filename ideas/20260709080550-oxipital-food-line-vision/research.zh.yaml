  searchedQueries:
  - 查找关于食品制造业采用 AI 视觉和异物检测的权威信源，尤其关注用工短缺、产能瓶颈、食品安全，以及 Oxipital AI 等公司的多产线部署案例。
  - 查找关于美国食品制造工厂产品隔离、CAPA 工作流、召回、审计证据和质量管理痛点的权威信源，尤其是冷冻或预制食品领域。
  - 查找与美国食品制造业中由 AI 视觉触发的产品隔离相关的权威监管和标准信源，包括 FDA 预防性控制、FSMA 溯源、CAPA、产品隔离和审计记录要求。
  - 查找食品产线检测工作流软件的权威竞品和替代方案信源，包括 AI 视觉厂商、检测数据管理系统、食品安全 QMS/CAPA 平台，以及相关定价或产品页面。
  - 查找美国冷冻食品制造业和预制食品制造业工厂数量或公司数量的官方或权威信源，包括 Census County Business Patterns 或行业协会数据。
  - 查找关于美国食品饮料制造业用工短缺和自动化投资的权威信源，优先选用 PMMI、FMI、德勤、麦肯锡或行业协会的资料。
  - 查找关于美国食品召回或异物污染召回频率与成本的权威信源，包括 FDA、USDA FSIS 或可信的分析报告。
  - 查找 Mettler Toledo ProdX、Eagle Product Inspection、TOMRA 食品异物检测、Oxipital AI V-CORTX，以及 SafetyChain 或 ETQ 食品质量 CAPA 平台的官方产品页面。
  - 查找关于 SQF、BRCGS 或 GFSI 对食品制造业纠正措施、产品隔离/放行、溯源和审计就绪记录要求的权威信源。
  - 查找 2024-2026 年 FDA 或 USDA FSIS 发布的、涉及冷冻餐食、披萨、鸡肉或预制食品中异物或塑料/金属污染的官方召回通知。
  - 查找 FDA 或 USDA FSIS 关于产品处置、扣留不合格食品，或污染事件后食品质量记录的官方指引或页面。
  - 查找关于食品制造商需要在 FSMA 204 要求下于 24 小时内提供产品溯源、追溯批次代码和电子记录的权威信源。
