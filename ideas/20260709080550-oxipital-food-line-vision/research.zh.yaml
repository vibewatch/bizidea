    - 32
    - 33
  - point: 带时间戳的证据能说明哪些操作最快解决了事故，这能不断积累成多工厂 QA 团队更好的应对剧本。
    sourceRefs:
    - 22
    - 27
    - 31
    - 35
  geographicConsiderations:
  - point: 美国是合适的滩头市场，因为它既有庞大的食品制造业基础，又有 FDA 和零售商驱动的具体文档压力。
    sourceRefs:
    - 12
    - 13
    - 14
    - 16
  - point: 预制食品很有吸引力，因为 PMMI 把它列为高增长的设备板块，而且这个品类常常运行复杂、高产量、多原料的产线，过度隔离的代价很高。
    sourceRefs:
    - 7
    - 8
  - point: 向美国以外扩展，能借助 GFSI 基准方案和 BRCGS 式的审计预期——它们已经为 CAPA 和溯源建立了通用语言。
    sourceRefs:
    - 23
    - 24
    - 25
  sensitivityCases:
  - case: 视觉厂商打包更多工作流
    impact: 如果检测厂商从触发拒收，延伸到隔离范围划定、证据留存和 CAPA 工作流，创业公司就必须靠厂商中立性和跨系统数据可携性取胜。
    sourceRefs:
    - 1
    - 2
    - 32
  - case: 单产线调优负担居高不下
    impact: 如果模型跨产线的可迁移性比预期更差，部署周期就会拉长，创业公司需要先用影子模式加人工审批过渡，才能承诺较窄的隔离范围。
    sourceRefs:
    - 3
    - 5
  - case: 买家更偏好现有质量套件里的一个模块
    impact: 如果客户坚持这项能力必须内嵌在现有的 QMS 或溯源合同里，创业公司可能需要把自己定位成反哺这些套件的响应层，而不是去替代它们。
    sourceRefs:
    - 27
    - 29
    - 35
  validationPlan:
  - priority: high
    question: 目标工厂在部署后 30 天内，能多稳定地提供批次溯源、卫生窗口和班次上下文数据？
    evidenceToGather: 和 8-10 家冷冻及预制食品工厂做集成摸底，并从 ERP、产线和 QMS 系统获取样本导出数据。
  - priority: high
    question: 买家更想先要自动化的隔离范围建议，还是只想要更快的证据整理和任务分派？
    evidenceToGather: 与共创客户访谈，对比影子模式建议和纯文档工作流的效果。
  - priority: medium
    question: 哪条渠道成交最快：检测厂商引荐、QMS/溯源伙伴，还是直接面向企业 QA 的外呼？
    evidenceToGather: 来自三种伙伴动线的管道转化数据，以及至少 20 场买家对话。
