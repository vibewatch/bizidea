modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Target QA accounts] --> PaidPilots[Paid pilot plants]
      Channels[Vendor and integrator referrals] --> PaidPilots
      PaidPilots --> ProductionPlants[Annual subscription plants]
      ProductionPlants --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[Ending cash]
      Churn[Churn and failed expansions] --> ProductionPlants
modelSanity:
- checkName: Revenue engine
  finding: The base case is driven by expanding from 3 subscribed plants at Y1 end to 45 by Q4Y3 at about $72K ACV, with most Y3 growth coming from second- and third-plant rollouts inside existing logos.
- checkName: Must go right
  finding: Pilots have to convert fast enough that partner referrals start compounding in Y2, because the sales-cycle sensitivity removes about $420K of Y3 revenue if conversion timing slips.
- checkName: Model breaks if
  finding: If gross margin stays near 66% and the business exits Y3 closer to the mid-30s in plants, downside cash compresses toward the floor despite the pre-seed raise.
- checkName: Next-round proof
  finding: The next financing is justified once the company reaches at least 12-15 subscribed plants, 5-7 production logos, repeatable second-plant expansion, and channel-sourced pipeline near 25%.
sanityChecks:
  ruleOf40: Y3 growth 251% + EBITDA margin -10% = 241%.
  burnMultiple: Y2 burn multiple 1.5x based on $0.84M burn over $0.55M net new revenue; Y3 burn multiple 0.1x as multi-plant expansion outpaces the remaining burn.
  revenuePerFte: $219K Y3 using Q4Y3 headcount of 10 FTE (benchmark roughly $200K-$400K for scaled B2B SaaS).
  flags:
  - The base case assumes the company reaches 45 subscribed plants by Q4Y3, so most of the scale-up must come from multi-plant expansion inside a relatively small logo set rather than net-new logos alone.
  - Gross margin is held at the 70% business-plan target even though early connectors and implementation work may behave more like services until deployments standardize.
  - The core P&L excludes paid pilot and onboarding revenue for conservatism, which makes funding needs clearer but also means timely pilot conversion is essential to justify the spend.
  - One sales / partnerships hire and two implementation FTE by Q4Y3 is lean for 45 plants; if customers demand deeper integrations, the company may need to hire earlier than modeled.
