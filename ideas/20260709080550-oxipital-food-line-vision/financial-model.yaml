scenarios:
  downside:
    description: Pilot-to-production conversion slips one to two quarters and multi-plant expansions arrive later, keeping the business more services-heavy.
    y3RevenueK: 1640.0
    y3EbitdaK: -610.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - Q4Y3 reaches 34 subscribed plants instead of 45.
    - Gross margin stays at 66% because connector and support work remains labor-intensive.
    - Monthly churn rises to 2.4% and partner referrals do not matter until late Y3.
  base:
    description: Pilot conversions and multi-plant rollouts arrive roughly on plan, while the core P&L still excludes pilot and onboarding revenue.
    y3RevenueK: 2190.0
    y3EbitdaK: -221.1
    cashLowPointK: 716.2
    keyAssumptionChanges:
    - Q4Y3 reaches 45 subscribed plants at $72K blended annual value per plant.
    - Gross margin holds at the 70% business-plan target.
    - Headcount stays lean at 10 FTE by Q4Y3 while partner-sourced pipeline reaches about 25% in Y2-Y3.
  upside:
    description: One early network contract and stronger vendor referrals pull second- and third-plant expansions forward without changing the ICP.
    y3RevenueK: 2580.0
    y3EbitdaK: 120.0
    cashLowPointK: 790.0
    keyAssumptionChanges:
    - Q4Y3 reaches 50 subscribed plants as two network deals expand faster than planned.
    - Gross margin improves to 72% once standard connectors and benchmark workflows reduce deployment labor.
    - Sales cycle compresses toward 4-5 months from pilot kickoff to annual production.
