scenarios:
  downside:
    description: 试点转生产环境的转化推迟一到两个季度，多工厂扩展也来得更晚，让业务更偏服务型。
    y3RevenueK: 1640.0
    y3EbitdaK: -610.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - Q4Y3 达到 34 家订阅工厂，而不是 45 家。
    - 由于连接器和支持工作仍高度依赖人力，毛利率停在 66%。
    - 月流失率升到 2.4%，伙伴引荐直到第 3 年末才开始起作用。
  base:
    description: 试点转化和多工厂铺开大致按计划进行，核心利润表仍不计入试点和上线收入。
    y3RevenueK: 2190.0
    y3EbitdaK: -221.1
    cashLowPointK: 716.2
    keyAssumptionChanges:
    - Q4Y3 达到 45 家订阅工厂，每家工厂混合年度价值 $72K。
    - 毛利率保持在商业计划目标的 70%。
    - 到 Q4Y3 人员编制保持精简、为 10 名 FTE，同时第 2-3 年伙伴来源管道达到约 25%。
  upside:
    description: 一份早期网络级合同和更强的厂商引荐，在不改变 ICP 的前提下，把第二家和第三家工厂的扩展提前拉动。
    y3RevenueK: 2580.0
    y3EbitdaK: 120.0
    cashLowPointK: 790.0
    keyAssumptionChanges:
    - 由于两笔网络级合同扩展得比计划更快，Q4Y3 达到 50 家订阅工厂。
    - 一旦标准连接器和基准工作流降低部署人力，毛利率提升到 72%。
    - 从试点启动到年度生产合同的销售周期压缩到 4-5 个月。
