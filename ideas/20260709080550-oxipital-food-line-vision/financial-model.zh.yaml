modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Target QA accounts] --> PaidPilots[Paid pilot plants]
      Channels[Vendor and integrator referrals] --> PaidPilots
      PaidPilots --> ProductionPlants[Annual subscription plants]
      ProductionPlants --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[Ending cash]
      Churn[Churn and failed expansions] --> ProductionPlants
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的驱动力是从第 1 年末的 3 家订阅工厂扩展到 Q4Y3 的 45 家，每家工厂 ACV 约 $72K，第 3 年的大部分增长来自既有客户内部的第二、第三家工厂铺开。
- checkName: 必须跑对的环节
  finding: 试点必须足够快地转化，才能让伙伴引荐在第 2 年开始产生复利效应，因为销售周期敏感性显示，一旦转化时点滑坡，第 3 年收入会损失约 $420K。
- checkName: 模型会在什么情况下失效
  finding: 如果毛利率停在 66% 附近，且公司第 3 年末工厂数只到 30 多家的中段，即便完成 Pre-seed 融资，下行情景的现金也会被压向底线。
- checkName: 下一轮证明点
  finding: 一旦公司达到至少 12-15 家订阅工厂、5-7 个生产环境客户、可复制的第二家工厂扩展，且渠道来源管道接近 25%，下一轮融资就有依据。
sanityChecks:
  ruleOf40: 第 3 年增长 251% + EBITDA 利润率 -10% = 241%。
  burnMultiple: 第 2 年 burn multiple 为 1.5 倍，基于 $0.84M 的烧钱对应 $0.55M 的净新增收入；第 3 年 burn multiple 为 0.1 倍，因为多工厂扩展跑赢了剩余的烧钱。
  revenuePerFte: 按 Q4Y3 期末 10 名 FTE 计算，第 3 年人均产出为 $219K（对标 SaaS 基准约 $200K-$400K）。
  flags:
  - 基准情景假设公司到 Q4Y3 达到 45 家订阅工厂，因此大部分规模扩张必须来自相对较小的一批客户内部的多工厂扩展，而不是单靠净新增客户。
  - 毛利率维持在商业计划目标的 70%，即便早期连接器和实施工作在部署标准化之前，可能更像服务型业务。
  - 核心利润表出于保守考虑，不计入付费试点和上线收入，这让融资需求更清晰，但也意味着试点能否及时转化至关重要。
  - 到 Q4Y3 只有一名销售/合作伙伴岗位和两名实施 FTE，相对 45 家工厂而言编制偏紧；如果客户要求更深的集成，公司可能需要比模型假设更早招人。
