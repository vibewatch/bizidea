  cashImpactK: -290.0
- variable: gross margin
  downsideCase: 毛利率 66%
  baseCase: 毛利率 70%
  upsideCase: 毛利率 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -125.0
- variable: hiring pace
  downsideCase: 在第 2 年提前多招一名工程师和一名实施人员
  baseCase: 精简爬坡，到 Q4Y3 达到 10 名 FTE
  upsideCase: 把一个非关键岗位的招聘推迟到第一份网络级合同签下之后
  y3RevenueImpactK: -50.0
