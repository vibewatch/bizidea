  searchedQueries:
  - Find authoritative sources on AI vision and foreign-object detection adoption in food manufacturing, especially labor shortages, throughput bottlenecks, food safety, and multi-line deployments such as Oxipital AI.
  - Find authoritative sources on product holds, CAPA workflows, recalls, audit evidence, and quality-management pain points in U.S. food manufacturing plants, especially frozen or prepared foods.
  - Find authoritative regulatory and standards sources relevant to AI-vision-triggered product holds in U.S. food manufacturing, including FDA preventive controls, FSMA traceability, CAPA, product-hold, and audit-record requirements.
  - Find authoritative competitor and substitute sources for food-line inspection workflow software, including AI vision vendors, inspection data-management systems, food-safety QMS/CAPA platforms, and related pricing or product pages.
  - Find official or authoritative sources for U.S. frozen food manufacturing and prepared food manufacturing establishment counts or company counts, including Census County Business Patterns or industry association data.
  - Find authoritative sources on labor shortages and automation investment in U.S. food and beverage manufacturing, preferably PMMI, FMI, Deloitte, McKinsey, or trade associations.
  - Find authoritative sources on food recalls or foreign-object contamination recall frequency and cost in the U.S., including FDA, USDA FSIS, or reputable analyses.
  - Find official product pages for Mettler Toledo ProdX, Eagle Product Inspection, TOMRA food foreign object detection, Oxipital AI V-CORTX, and SafetyChain or ETQ food quality CAPA platforms.
  - Find authoritative sources on SQF, BRCGS, or GFSI requirements for corrective actions, product hold/release, traceability, and audit-ready records in food manufacturing.
  - Find official FDA or USDA FSIS recall notices from 2024-2026 involving foreign material or plastic/metal contamination in frozen meals, pizzas, chicken, or prepared foods.
  - Find official FDA or USDA FSIS guidance or pages on product disposition, holding adulterated food, or food quality records after a contamination event.
  - Find authoritative sources on food manufacturers needing product genealogy, traceability lot codes, and electronic records within 24 hours under FSMA 204.
