differentiator: >-
  Vision vendors are optimized to detect defects or foreign objects, while
  generic QMS tools are optimized to store CAPAs after the fact; neither owns
  the minutes between the alert and the hold-or-release decision. Reject-to-Recovery
  OS is purpose-built for that gap, normalizing mixed vision feeds and plant
  context into one containment workflow. Its moat compounds as it learns which
  alert patterns justify narrow holds, which investigations close fastest, and
  which upstream causes recur across plants, suppliers, and SKUs.
