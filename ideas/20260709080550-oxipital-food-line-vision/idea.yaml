      When a foreign-object reject fires on a live ready-meal or cooked-protein
      line, help our QA lead determine the smallest safe hold and the right
      investigation path, so we can protect customers without parking an entire
      shift's output.
    currentAlternative: "Spreadsheet hold logs, ERP codes, supervisor huddles, and manual review of camera clips."
    successMetric: "Minutes from reject event to containment decision and disposition."
  - job: >-
      When a retailer or foodservice audit asks why a lot was held, released, or
      scrapped, help our corporate quality team assemble video, genealogy, and
      corrective-action evidence, so we can close CAPAs faster and keep the
      account.
    currentAlternative: "Email chains, shared drives, QMS attachments, and manual CAPA writeups compiled after the fact."
