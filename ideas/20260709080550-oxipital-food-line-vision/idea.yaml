topRisks:
  - name: "Integration stalls pilots"
    description: "If the product needs deep MES, ERP, or controller work before first value, conservative plants may default to spreadsheets and vendor dashboards."
    mitigation: "Start with vision-event feeds plus CSV or API connectors for hold and CAPA workflows, then deepen genealogy and QMS integrations after the first hold-reduction win."
  - name: "ROI looks too incident-driven"
    description: "Plants may resist buying if they think serious contamination events are too infrequent or if line teams do not trust automated containment guidance."
    mitigation: "Sell on over-hold reduction, investigation hours saved, faster disposition time, and avoided line slowdowns before promising recall prevention."
  - name: "Incumbents bundle the workflow"
    description: "Vision vendors or enterprise QMS providers could add basic case management and reduce willingness to buy a standalone layer."
    mitigation: "Win on vendor neutrality, cross-plant benchmarking, and containment logic that spans mixed vision stacks, supplier data, and CAPA outcomes that no single incumbent sees."
