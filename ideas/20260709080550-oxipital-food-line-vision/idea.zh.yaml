jobsToBeDone:
- job: 当一条运行中的即食餐或熟制蛋白产线触发异物拒收，帮我们的 QA 负责人判断最小的安全隔离范围和正确的调查路径，让我们既能保护消费者，又不用把整个班次的产出都压住。
  currentAlternative: Excel 隔离记录、ERP 代码、班组长碰头会，以及对摄像头片段的人工复核。
  successMetric: 从拒收事件到隔离决策与处置的耗时分钟数。
- job: 当零售商或餐饮渠道审计要求解释某批次为何被隔离、放行或报废，帮我们的企业质量团队把视频、溯源记录和整改证据整理齐全，让我们能更快结案 CAPA，保住这个客户。
  currentAlternative: 邮件往来、共享盘、QMS 附件，以及事后手工整理的 CAPA 报告。
  successMetric: 结案一个 CAPA 并产出完整审计就绪证据所需的天数。
