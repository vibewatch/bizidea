differentiator: 视觉厂商的优化目标是发现缺陷或异物，通用 QMS 工具的优化目标是事后存档 CAPA；两者都没有拿下告警和隔离/放行决策之间的那几分钟。Reject-to-Recovery OS 就是为这段空白而生的，把混杂的视觉信号源和工厂上下文，统一成一套隔离工作流。它的护城河会随着经验积累越挖越深：哪些告警模式能撑起较窄的隔离范围、哪些调查结案最快、哪些上游根因会在不同工厂、供应商和 SKU 之间反复出现。
