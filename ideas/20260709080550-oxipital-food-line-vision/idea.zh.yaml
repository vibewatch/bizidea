problem: 当 AI 视觉系统开始在一条运行中的食品产线上标记异物或缺陷事件，真正难的已经不是识别问题，而是判断该扣留多少产品、该谁去调查、要凑齐什么证据才能安全放行。大多数冷冻和预制食品工厂，眼下仍靠 Excel 表格、邮件、ERP 隔离代码和 QA、维护、卫生、运营各团队的经验来协调这套响应流程。结果就是隔离范围过大、CAPA 结案缓慢、产能被拖累，工厂开始怀疑新上的检测系统到底能不能尽快收回投资。
targetUser:
  primary: 美国冷冻或预制食品制造商的质量保证或食品安全总监，正把 AI 异物检测从一条熟制蛋白或即食餐产线推广到多家工厂。
  secondary: 负责调查落实和降低重复性缺陷的工厂运营卓越或供应商质量负责人。
  buyer: 质量副总裁、COO 或运营高级副总裁。
startupThesis:
  nonObviousInsight: AI 视觉在食品工厂普及之后，检测本身会变成一个可以直接采购的组件。稀缺的那一层转移到了运营响应上：划出最小的安全隔离范围、把动作分派给正确的跨部门团队、把原始告警流转成审计就绪的证据和上游修复方案。真正值钱的公司不是又一个视觉模型厂商，而是拒收事件发生后头 30 分钟里发生的一切的操作系统。
  beachhead: 面向运营 3-10 家工厂的美国冷冻和预制食品制造商，提供产品隔离控制和 CAPA 工作流——这些工厂至少有一条熟制蛋白或即食餐产线部署了在线 AI 异物检测，并且经常面临零售商或餐饮渠道的审计压力。
  wedge: 一个拒收到恢复指挥中心：接入 AI 视觉事件、产线上下文、批次溯源和人工操作记录，为单一产线族推荐隔离边界、分派调查、自动生成 CAPA 材料包。
  whyNowCatalyst: Oxipital 的融资、120 套异物检测系统的部署规模，以及声称的 2026 年增长，都说明食品制造商正把视觉检测从单点方案变成多产线项目，这让响应工作流的技术欠债变得显眼又紧迫。
  ventureScalePath: 从冷冻餐食和熟制蛋白切入，再把同一套拒收事件、隔离和 CAPA 运营层，扩展到禽肉、烘焙、乳制品、果蔬、宠物食品，最终延伸到其他因机器检测而催生高风险响应工作流的受监管制造行业。
solution: Reject-to-Recovery OS 架在现有视觉系统之上，只要异物或缺陷事件触发策略阈值就自动开案。它会把视频片段、产线、SKU、班次、卫生窗口和批次上下文都拉进同一个工作区，然后推荐大概率最小的隔离边界，而不是一刀切地全面隔离。工作流会把并行任务分派给 QA、维护、卫生和供应商质量负责人，证据到位的同时同步搭建 CAPA 材料包。随着时间推移，产品会按产线、原料、供应商批次和设备状态给重复事件聚类，让工厂能修上游根因，而不只是拒收更多产品。最终结果是：在已部署的 AI 检测和更安全、更快的产线决策之间，架起一座可衡量的桥梁。
goToMarketSeed:
  firstCustomer: 一家 500-2000 名员工、运营 3-8 家工厂的美国冷冻预制食品制造商，最近刚在一条高产量熟制蛋白或即食餐产线上线 AI 异物检测，并计划在 12 个月内把这套工作流推广到另外 5-20 条产线。
  buyingTrigger: 把 AI 异物检测从一条试点产线扩展到更多产线或工厂，或者进入一轮零售商/餐饮渠道审计周期，暴露出人工隔离和 CAPA 流程太慢。
  currentAlternative: QA 用的 Excel 表格、ERP 隔离代码、邮件往来、通用 QMS/CAPA 模块，以及工厂团队对视觉片段的人工复核。
  switchingReason: 第一个客户会转向这套方案，是因为它划出的隔离范围更小、调查周期更短、审计证据攒得比通用 QMS 软件或自建流程更快——既守住了安全，又不用冻结整个班次的产出。
  pricingHypothesis: 按工厂收取年度订阅费，按监控产线数量和活跃调查量分档定价，另外收取视觉、ERP 和 QMS 连接器的上线实施费。
