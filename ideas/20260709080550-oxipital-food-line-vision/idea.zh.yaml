topRisks:
- name: 集成拖住试点
  description: 如果产品在产生第一份价值之前就需要深度的 MES、ERP 或控制器改造，保守的工厂很可能继续用 Excel 表格和厂商仪表盘对付。
  mitigation: 先靠视觉事件信号流加 CSV 或 API 连接器跑通隔离和 CAPA 工作流，等拿下第一次隔离缩减的战果之后，再深化溯源和 QMS 集成。
- name: 投资回报看起来太依赖事故
  description: 如果工厂觉得严重污染事件太少见，或者产线团队不信任自动化的隔离建议，他们就可能抵触采购。
  mitigation: 先靠降低过度隔离、节省调查工时、缩短处置时间、避免产线降速来卖，别急着承诺能防召回。
- name: 现有厂商把工作流打包进来
  description: 视觉厂商或企业级 QMS 供应商可能会加一套基础的案件管理功能，削弱客户单独采购这层产品的意愿。
  mitigation: 靠厂商中立性取胜，靠跨工厂基准对比取胜，靠横跨混合视觉技术栈、供应商数据和 CAPA 结果的隔离逻辑取胜——这些是任何一家现有厂商都看不全的。
