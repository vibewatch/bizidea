slug: sportsbook-deposit-approval-engine
date: '2026-06-16'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-07
    unit: month
    source: '[BP date] 支出与销售在业务计划标注日期后的次月启动。'
  - id: A2
    name: 种子前融资到账后初始现金
    value: '2400000'
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 基准情景采用 $2.4M 融资额（接近低端），因为计划专注于六家客户。'
  - id: A3
    name: 付费客户签约节奏
    value: M5, M9, M12, M16, M22, M29
    unit: month
    source: '[BP milestones; BP gtm.funnelTargets] 三家体育博彩共创合作客户在第一年落地，第四、五家体育博彩在第二年签约，一家相邻受监管金融科技客户在第三年签约。'
  - id: A4
    name: 每位新客户的影子模式实施费
    value: '50000'
    unit: USD
    source: '[BP investorMemo.firstCustomer] 初始付费试点为 $75K–$150K；模型将 $50K 计为一次性实施和入驻收入。'
  - id: A5
    name: 影子模式经常性费用
    value: '12000'
    unit: USD/month/logo
    source: '[BP investorMemo.firstCustomer] 剩余试点经济模型以约 $12K 月度经常性费用建模，覆盖 60–90 天付费影子模式期间。'
  - id: A6
    name: 初始正式生产合同
    value: '35000'
    unit: USD/month/logo
    source: '[BP investorMemo.firstCustomer] 年度软件加使用费 $300K–$600K，对应保守的 $420K 年化起始合同。'
  - id: A7
    name: 第二条轨道或品牌扩展后合同
    value: '75000'
    unit: USD/month/logo
    source: '[BP gtm.funnelTargets production→second rail or brand expansion 60%+ within 12 months] 基准情景假设首次扩展在有生产证明后将落地收入大致翻倍。'
  - id: A8
    name: 成熟多轨道合同
    value: '110000'
    unit: USD/month/logo
    source: '[Research market.som $8.4M on 6 logos] 成熟客户上限约为 $1.32M 年化，略低于研究所得 $1.4M 平均客户合同值，以保持基准情景保守。'
  - id: A9
    name: 按客户年龄的收入成熟时间表
    value: "第 1–4 个月为试点；第 5–12 个月为落地；第 13–20 个月为扩展；第 21 个月起为成熟"
    unit: stage timing
    source: '[BP product twelveMonth; BP milestones 12-24 months; BP milestones 24-36 months] 影子模式先于正式控制，随后跟进多轨道和多品牌扩展。'
  - id: A10
    name: 规模化后目标毛利率
    value: '70'
    unit: pct
    source: '[BP businessModel.targetGrossMarginPct] 业务计划的明确毛利率目标。'
  - id: A11
    name: 固定平台与合规 COGS 底线
    value: '15000'
    unit: USD/month
    source: '[Heuristic] 审计日志、数据连接器、托管案例管理和支付合规工具在规模化之前形成显著的固定 COGS 基础。'
  - id: A12
    name: 经常性收入的可变 COGS
    value: '30'
    unit: pct
    source: '[BP businessModel targetGrossMarginPct; Heuristic] 经常性毛利率维持在 70% 附近，意味着数据、托管和支持的可变交付成本约为 30%。'
  - id: A13
    name: 实施交付成本
    value: '45'
    unit: pct of implementation revenue
    source: '[Heuristic] 早期体育博彩集成解决方案较重，专业服务毛利率低于成熟 SaaS 毛利率。'
  - id: A14
    name: 创始人之外的招聘节奏
    value: "解决方案工程师 M3；支付/风控负责人 M6；客户主管/合作 M12；工程师 M15；第二位解决方案工程师 M18；第二位客户主管 M21；工程师加运营 M24；工程师加第二位风控负责人 M30；第二位运营 M33"
    unit: timing
    source: '[BP team; BP strategicChoices.sequencingRationale] 计划中命名招聘优先执行，之后仅增加支持两条轨道正式控制和一个相邻金融科技业务所需的最少人员。'
  - id: A15
    name: 按职能的年化现金薪酬
    value: "创始人/CEO $120K；工程 $210K；解决方案工程 $170K；支付/风控 $190K；销售/合作 $180K；管理/运营 $140K"
    unit: USD/year
    source: '[Heuristic] 美国早期金融科技/软件薪资区间含薪资税和福利负担，创始人现金薪酬低于市场，专业岗位薪酬与市场持平。'
  - id: A16
    name: 职能薪资分摊
    value: "创始人 70% S&M / 30% G&A；工程 100% R&D；解决方案工程 70% R&D / 30% G&A；支付/风控 60% R&D / 40% G&A；销售 100% S&M；运营 100% G&A"
    unit: allocation
    source: '[BP team rationales] 分摊遵循创始人主导销售、集成重型交付和担保银行/合规工作流所有权。'
  - id: A17
    name: 非薪资运营支出计划
    value: "S&M $10K→$18K→$22K→$25K monthly; R&D $8K→$10K→$12K monthly; G&A $14K→$18K→$22K monthly"
    unit: USD/month
    source: '[Heuristic] 差旅、数据工具、安全、法务、保险和合规支出随试点转为正式受监管工作流而逐步增加。'
  - id: A18
    name: 稳态客户获取成本
    value: '220000'
    unit: USD per new production logo
    source: '[BP gtm.channels; BP gtm.funnelTargets] 创始人时间、一位客户主管和合作伙伴转介绍的集中企业销售，建模约为首年 ACV 的一半——对受监管工作流软件而言较为保守。'
  - id: A19
    name: 单位经济模型中使用的月度流失率
    value: '1.5'
    unit: pct
    source: '[Heuristic] 集中企业客户续约率应较高，但切入点仍年轻，采购风险高于成熟垂直 SaaS。'
  - id: A20
    name: 种子前轮融资里程碑
    value: "5 家体育博彩生产客户、担保银行批准的跨两条轨道正式控制，以及 1 家相邻受监管金融科技客户签约，同时保留约 6 个月现金储备"
    unit: milestone
    source: '[BP milestones 12-24 months; BP milestones 24-36 months; BP fundingAsk runwayMonths] 下一轮应等待体育博彩切入既能转化又能扩展的证明。'
  - id: A21
    name: 现金转换政策
    value: EBITDA 近似现金流动
    unit: policy
    source: '[Heuristic] 本软件优先的种子前期业务不建模债务、资本支出、税负或重大营运资金波动。'
  - id: A22
    name: 第 36 个月前的基准留存
    value: 模型结束前无客户流失
    unit: customer assumption
    source: '[BP gtm.funnelTargets; BP strategicChoices] 基准情景假设前六家参考客户在各自初始扩展周期内均留存；流失仅出现在下行情景和单位经济敏感性分析中。'
