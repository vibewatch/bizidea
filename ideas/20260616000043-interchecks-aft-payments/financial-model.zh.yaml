scenarios:
  downside:
    description: 担保银行审查拖慢正式审批，第六家客户始终未能签约，现有客户扩展速度也低于计划。
    y3RevenueK: 3445.0
    y3EbitdaK: -671.5
    cashLowPointK: -485.0
    keyAssumptionChanges:
      - 客户签约推迟至 M6、M11、M15、M20 和 M27，第四年第四季度仅有五家客户。
      - 落地、扩展和成熟月度收入分别从 $35K / $75K / $110K 降至 $30K / $60K / $90K。
      - 固定合规和连接器成本不变而交易量增速放缓，经常性毛利率下滑。
  base:
    description: 三家第一年试点客户转化为第二年五家体育博彩生产客户基础，第三年一家相邻金融科技客户落地，前四家客户扩展至多轨道合同。
    y3RevenueK: 5145.0
    y3EbitdaK: 658.0
    cashLowPointK: 922.8
    keyAssumptionChanges:
      - "六家付费客户按 A3 节奏签约：M5、M9、M12、M16、M22 和 M29。"
      - 每家客户收入遵循 A9 成熟曲线，从试点到落地、扩展再到成熟合同层级递进。
      - 招聘遵循 A14，第四年第四季度仅有 13 名全职员工，EBITDA 在第四、五家体育博彩客户扩展后才转正。
  upside:
    description: 处理商转介绍缩短销售周期，早期客户扩展更快，相邻金融科技业务提前一个季度落地。
    y3RevenueK: 6242.0
    y3EbitdaK: 1551.6
    cashLowPointK: 1273.1
    keyAssumptionChanges:
      - 客户签约提前至 M5、M8、M11、M15、M20 和 M26。
      - 扩展和成熟月度合同分别提升至 $85K 和 $125K，因第二条轨道和第二品牌使用量更快挂载。
      - 可复用连接器和更干净的数据集使经常性 COGS 小幅改善，毛利率稳步提升。
sensitivity:
  - variable: ARPU
    downsideCase: 买家将范围限定在单条轨道，落地/扩展/成熟月度收入降至 $30K / $65K / $95K。
    baseCase: 落地/扩展/成熟月度收入维持 $35K / $75K / $110K。
    upsideCase: 跨品牌采用速度加快，落地/扩展/成熟月度收入提升至 $38K / $82K / $120K。
    y3RevenueImpactK: -685.0
    cashImpactK: -672.0
  - variable: CAC
    downsideCase: 更长的采购周期和更多差旅将实际 CAC 推高至 $300K 以上，后两家客户签约推迟。
    baseCase: 创始人主导销售结合处理商和银行直付转介绍，CAC 维持在约 $220K。
    upsideCase: 温热的合作伙伴引荐将 CAC 压至 $180K 以下，两笔交易提前一个季度完成。
    y3RevenueImpactK: -416.0
    cashImpactK: -550.0
  - variable: churn
    downsideCase: 一家成熟体育博彩客户在第三年因正式证明令关键利益相关方失望而流失或降档。
    baseCase: 六家客户均在第 36 个月前留存，续约和扩展参考案例仍在积累中。
    upsideCase: 零流失加上第六家客户提前启动，小幅提升第三年营收和融资就绪度。
    y3RevenueImpactK: -660.0
    cashImpactK: -462.0
  - variable: sales cycle
    downsideCase: 安全、合规和担保银行审查在每个客户签约上增加约一个季度。
    baseCase: 前六家客户按 A3 节奏签约，试点在同一运营商预算周期内转为正式合同。
    upsideCase: 可信转介绍将平均周期缩短一到两个月。
    y3RevenueImpactK: -504.0
    cashImpactK: -644.0
  - variable: gross margin
    downsideCase: 连接器支持和人工审查使经常性 COGS 维持在约 35%，实施交付成本约 50%。
    baseCase: 经常性 COGS 维持 30%，实施交付成本 45%，与 70% 目标毛利率一致。
    upsideCase: 可复用连接器和更干净的数据集将经常性 COGS 改善至约 27%，实施交付成本降至 40%。
    y3RevenueImpactK: 0.0
    cashImpactK: -488.7
  - variable: hiring pace
    downsideCase: 销售、工程和运营人员在重复性充分验证前提前一个季度入职。
    baseCase: 招聘遵循 A14，仅在第四家体育博彩客户正式上线或明显扩展后才达到 13 名全职员工。
    upsideCase: 后期招聘推迟至现金流更强时，现金改善而六家客户计划不变。
    y3RevenueImpactK: 0.0
    cashImpactK: -392.5
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Founder outbound and processor referrals] --> Pilots[Paid shadow-mode pilots]
      Pilots --> Production[Production logos]
      Production --> Expansion[Second rail or brand expansion]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash]
modelSanity:
  - checkName: 营收引擎
    finding: 基准情景营收的驱动力与其说是客户数量，不如说是前四家体育博彩客户在第三年从 $35K 落地合同升级为 $75K–$110K 多轨道扩展合同。
  - checkName: 必须做到
    finding: 前三个付费试点必须转化，且至少前两家正式客户必须在 12 个月内完成扩展，否则模型将同时错过第二年里程碑和基准情景所示的现金效率路径。
  - checkName: 模型崩坏条件
    finding: 销售周期滑期一个季度或一家成熟客户流失，分别可移除约 $500K–$660K 的第三年营收，并吞掉 $460K–$640K 的期末现金——这正是下行情景现金转负的原因。
  - checkName: 下一轮融资证明
    finding: 一旦五家体育博彩生产客户、两条轨道正式审批证明和一家相邻金融科技客户到位，下一轮融资即告合理——因为这验证了切入点在研究所得 $8.4M SOM 目标之前的可转化性和可扩展性。
sanityChecks:
  ruleOf40: "第三年营收增长 149%（(5145.0-2070.0)/2070.0）加 EBITDA 利润率 12.8%（658.0/5145.0）= 161.4%；方向上强劲，但受小基数企业级增速放大。"
  burnMultiple: "第三年 EBITDA 已转正，烧钱倍数不再是核心指标；在最后烧钱年（第二年），$553.3K 烧钱额除以 M12 至 M24 新增的退出 ARR 约 $2556.0K，等于 0.22x。"
  revenuePerFte: "第三年每名第四年第四季度全职员工营收 $395.8K（13 名全职员工；垂直 SaaS 基准约 $200K–$400K）。"
  flags:
    - "六家客户仍使基准情景高度集中：失去一家成熟体育博彩账户将移除逾 15% 的退出 ARR。"
    - 基准情景退出 ARR 在 M36 时达到约 $6.6M，仍低于研究所得 $8.4M 第三年 SOM，模型需要另一轮扩展步骤或该时间范围后的第七家客户。
    - 担保银行或处理商阻力仍是唯一的门控风险；若正式影响力在前五家客户之后才落地，下行情景显示当前种子前融资额不足。
    - 第三年盈利取决于早期客户内部扩展，而非仅靠新增预订；若第二条轨道或第二品牌采用停滞，效率指标将迅速逆转。
