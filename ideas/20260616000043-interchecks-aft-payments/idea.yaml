topRisks:
  - name: Processor bundling
    description: "AFT processors or PSPs may add lightweight routing and analytics, compressing the perceived need for a separate layer."
    mitigation: "Stay processor-agnostic, optimize across multiple rails, and win on cross-provider conversion and loss insights that no single processor can see."
  - name: Customer concentration
    description: "The initial sportsbook market is finite and seasonal, which could limit early logo count if expansion is slow."
    mitigation: "Use sportsbooks as the proving ground, then sell the same approval engine to neobanks, wallets, and brokerages with similar funding workflows."
  - name: ROI attribution gaps
    description: "Many operators do not have clean baselines for false declines versus fraud loss, making the buying case harder to quantify."
    mitigation: "Launch in shadow mode with historical replay, holdout tests, and operator-specific benchmarks tied to funded-account conversion and net loss."
