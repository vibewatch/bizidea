jobsToBeDone:
  - job: >-
      When a new or returning player tries to fund an account right before a high-intent betting moment, help our
      payments team approve the right deposits instantly, so we can capture handle without opening new fraud holes.
    currentAlternative: "Processor rules plus fraud-vendor scores and manual escalations"
    successMetric: "Funded-player conversion rate and fraud loss per deposit attempt"
  - job: >-
      When risk leadership or a sponsor-bank partner asks why a deposit was allowed or blocked, help our team show the
      exact rule and evidence trail, so we can tune policies without slowing growth.
    currentAlternative: "Exports from processor dashboards plus ad hoc analyst investigation across multiple tools"
    successMetric: "False-decline rate and time to review or explain a disputed funding decision"
