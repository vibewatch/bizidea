problem: >-
  Multi-state sportsbooks live or die on whether a newly approved player can fund an account immediately before the
  moment of intent passes. But deposit acceptance still spans processor rules, pay-by-bank fallbacks, card
  fingerprints, velocity checks, and manual risk policies, so teams either reject good deposits or invite
  duplicate-card abuse and suspicious activity. That fragmentation turns a revenue-critical conversion step into a
  constant tradeoff between growth and loss control.
targetUser:
  primary: "VP Payments, Director of Payments, or fraud leader at a multi-state online sportsbook adding debit-based instant deposits"
  secondary: "Payments and risk leaders at neobanks or wallet fintechs adding instant account funding"
  buyer: "VP Payments, Chief Risk Officer, or GM of Payments at a regulated consumer-fintech operator"
startupThesis:
  nonObviousInsight: >-
    The hard problem is no longer whether instant funding exists; it is deciding which funding attempt deserves
    instant approval, through which rail, and under what controls. As AFT vendors embed baseline checks, the durable
    wedge moves up to a funding-session decision layer that optimizes conversion and loss across rails instead of
    just exposing one more payment method.
  beachhead: >-
    U.S. licensed online sportsbooks operating in 5+ states, already offering ACH or pay-by-bank deposits, and
    adding debit-based instant funding for first-time deposits and game-day reloads before the 2026 NFL season
  wedge: >-
    A funding-session approval engine that sits above AFT processors, pay-by-bank providers, and existing fraud
    tools to decide whether to approve, route, step up, or block each deposit attempt in milliseconds
  whyNowCatalyst: >-
    Interchecks' AFT launch, its explicit sportsbook buyer narrative, and its built-in controls for duplicate-card
    and velocity risk show that instant deposits have become a real-time decisioning problem, not just a payments
    integration project.
  ventureScalePath: >-
    Start with sportsbook deposits, then extend the same control plane into neobanks, digital wallets, brokerages,
    gaming payouts, and any regulated consumer-fintech flow where instant account funding and payout decisions share
    the same risk-routing logic.
solution: >-
  The product plugs into AFT processors, pay-by-bank providers, KYC vendors, and internal risk systems to make one
  decision per funding session. It ingests account-verification results, card fingerprints, player history,
  velocity, suspicious-activity signals, and rail availability, then decides whether to approve AFT instantly, route
  to a fallback rail, request another credential, or hold the attempt for review. Teams get a policy console that
  simulates conversion-versus-loss tradeoffs by state, event window, cohort, or processor. Every decision ships with
  an audit trail that risk teams and sponsor-bank partners can review without pulling exports from multiple systems.
  Once embedded on deposits, the same engine can expand into instant payouts and the broader money-movement
  lifecycle.
goToMarketSeed:
  firstCustomer: >-
    A multi-state U.S. sportsbook with 10+ state licenses, a live pay-by-bank option, and a 2026 roadmap to launch
    debit-based instant funding ahead of NFL-season acquisition spend
  buyingTrigger: >-
    Turning on AFT, launching in a new state, or seeing deposit-failure and fraud pressure rise before a major
    sports-calendar event
  currentAlternative: "Processor-native rules, separate fraud and KYC tools, manual analyst review, and one-off pay-by-bank fallback flows"
  switchingReason: >-
    The control plane lifts funded-player conversion without replacing the processor, while making duplicate-card,
    velocity, and suspicious-activity policies tunable in one place instead of spread across disconnected systems.
  pricingHypothesis: "Annual platform fee plus basis points on successfully funded deposits or monthly pricing by active funded account"
