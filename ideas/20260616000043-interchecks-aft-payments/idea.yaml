differentiator: >-
  Processors and AFT vendors move money and expose baseline controls, but they are rewarded for rail coverage, not
  for maximizing funded-account conversion at a regulated operator. This startup wins by becoming the funding
  decision system that learns which user, card, and session patterns deserve instant funding now, a fallback rail,
  or a hard block. Its moat comes from cross-rail approval data, operator-specific policy graphs, and loss-outcome
  feedback that sit above any one network or processor.
