  adoptionFrictionMatrix:
    - friction: 担保银行和处理商对第三方决策层的批准
      severity: high
      affectedBuyer: 支付副总裁/首席风险官
      mitigation: 在触碰正式审批之前，以全日志记录、确定性策略和明确升级路径的影子模式起步。
      sourceRefs:
        - 10
        - 11
        - 12
        - 18
    - friction: 误拒与欺诈损失基准数据稀缺
      severity: high
      affectedBuyer: 支付副总裁
      mitigation: 在承诺完全自动化之前使用历史回放、决策报告和对照测试。
      sourceRefs:
        - 19
        - 24
        - 28
    - friction: 跨轨道集成和路由复杂度
      severity: medium
      affectedBuyer: 支付工程团队
      mitigation: 先接入一家 AFT 处理商加一条银行备用轨道，并在更广泛扩展前标准化事件 schema。
      sourceRefs:
        - 6
        - 8
        - 10
        - 16
        - 18
    - friction: 存款限额或脆弱性标记触发的合规用户摩擦
      severity: high
      affectedBuyer: 风控/合规负责人
      mitigation: 尽量支持动态升级核查和可清晰解释的策略，而非一刀切的挂起。
      sourceRefs:
        - 29
        - 30
        - 31
