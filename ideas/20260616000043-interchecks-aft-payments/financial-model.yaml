date: '2026-06-16'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: month
    source: '[BP date] Spend and selling start the month after the dated business plan.'
  - id: A2
    name: Starting cash after pre-seed close
    value: '2400000'
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M] Base case uses a $2.4M raise, near the low end, because the plan stays concentrated on six logos.'
  - id: A3
    name: Paying-logo signing cadence
    value: M5, M9, M12, M16, M22, M29
    unit: month
    source: '[BP milestones; BP gtm.funnelTargets] Three sportsbook design-partner pilots land in Y1, a fourth and fifth sportsbook logo land during Y2, and one adjacent regulated-fintech logo lands in Y3.'
  - id: A4
    name: Shadow-mode implementation fee per new logo
    value: '50000'
    unit: USD
    source: '[BP investorMemo.firstCustomer] Initial paid pilot is $75K-$150K; $50K is modeled as one-time implementation and onboarding revenue.'
  - id: A5
    name: Shadow-mode recurring fee
    value: '12000'
    unit: USD/month/logo
    source: '[BP investorMemo.firstCustomer] Remaining pilot economics are modeled as roughly $12K monthly recurring during the paid 60-90 day shadow-mode period.'
  - id: A6
    name: Initial live production contract
    value: '35000'
    unit: USD/month/logo
    source: '[BP investorMemo.firstCustomer] $300K-$600K annual software plus usage implies a conservative $420K annualized starting contract.'
  - id: A7
    name: Expanded live contract after second rail or brand
    value: '75000'
    unit: USD/month/logo
    source: '[BP gtm.funnelTargets production→second rail or brand expansion 60%+ within 12 months] Base case assumes the first expansion roughly doubles land revenue once live proof exists.'
  - id: A8
    name: Mature multi-rail contract
    value: '110000'
    unit: USD/month/logo
    source: '[Research market.som $8.4M on 6 logos] Mature logos are capped at about $1.32M annualized, slightly below the researched $1.4M logo average to keep the base case conservative.'
  - id: A9
    name: Revenue maturity schedule by logo age
    value: Months 1-4 pilot; months 5-12 land; months 13-20 expanded; months 21+ mature
    unit: stage timing
    source: '[BP product twelveMonth; BP milestones 12-24 months; BP milestones 24-36 months] Shadow mode precedes live control, then multi-rail and multi-brand expansion follows.'
  - id: A10
    name: Target gross margin at scale
    value: '70'
    unit: pct
    source: '[BP businessModel.targetGrossMarginPct] Explicit gross-margin target from the business plan.'
  - id: A11
    name: Fixed platform and compliance COGS floor
    value: '15000'
    unit: USD/month
    source: '[Heuristic] Audit logging, data connectors, hosted case management, and payments-compliance tooling create a meaningful fixed COGS base before scale.'
  - id: A12
    name: Variable COGS on recurring revenue
    value: '30'
    unit: pct
    source: '[BP businessModel targetGrossMarginPct; Heuristic] Keeping recurring gross margin near 70% implies ~30% variable delivery cost across data, hosting, and support.'
  - id: A13
    name: Implementation delivery cost
    value: '45'
    unit: pct of implementation revenue
    source: '[Heuristic] Early sportsbook integrations are solutions-heavy, so professional-services gross margin is modeled below mature SaaS gross margin.'
  - id: A14
    name: Hiring cadence beyond founders
    value: Solutions engineer M3; payments/risk lead M6; AE/partnerships M12; engineer M15; second solutions engineer M18; second AE M21; engineer plus ops M24; engineer plus second risk lead M30; second ops hire M33
    unit: timing
    source: '[BP team; BP strategicChoices.sequencingRationale] Named hires from the plan happen first, then only the minimal additional staff needed to support two-rail live control and one adjacent-fintech motion are added.'
  - id: A15
    name: Loaded annual cash compensation by role
    value: Founder/CEO $120K; Engineering $210K; Solutions Engineering $170K; Payments/Risk $190K; Sales/Partnerships $180K; G&A/Ops $140K
    unit: USD/year
    source: '[Heuristic] Early-stage U.S. fintech/software salary bands with payroll tax and benefits burden, using below-market founder cash pay and market-rate specialist hires.'
  - id: A16
    name: Functional payroll allocation
    value: Founder 70% S&M / 30% G&A; Engineering 100% R&D; Solutions Engineering 70% R&D / 30% G&A; Payments/Risk 60% R&D / 40% G&A; Sales 100% S&M; Ops 100% G&A
    unit: allocation
    source: '[BP team rationales] Allocation follows founder-led selling, integration-heavy delivery, and sponsor-bank/compliance workflow ownership.'
  - id: A17
    name: Non-payroll operating spend schedule
    value: S&M $10K→$18K→$22K→$25K monthly; R&D $8K→$10K→$12K monthly; G&A $14K→$18K→$22K monthly
    unit: USD/month
    source: '[Heuristic] Travel, data tooling, security, legal, insurance, and compliance spend step up as pilots turn into live regulated workflows.'
  - id: A18
    name: Steady-state CAC
    value: '220000'
    unit: USD per new production logo
    source: '[BP gtm.channels; BP gtm.funnelTargets] Concentrated enterprise sales with founder time, one AE, and partner referrals is modeled at roughly half of first-year ACV, which is conservative for regulated workflow software.'
  - id: A19
    name: Monthly churn used for unit economics
    value: '1.5'
    unit: pct
    source: '[Heuristic] Concentrated enterprise logos should renew, but the wedge is still young and procurement risk remains higher than mature vertical SaaS.'
  - id: A20
    name: Funding milestone for the pre-seed
    value: 5 sportsbook production logos, sponsor-bank-approved live control across two rails, and 1 adjacent regulated-fintech logo under contract with 6 months of cash buffer remaining
    unit: milestone
    source: '[BP milestones 12-24 months; BP milestones 24-36 months; BP fundingAsk runwayMonths] The next round should wait for proof that the sportsbook wedge both converts and expands.'
  - id: A21
    name: Cash conversion policy
    value: EBITDA approximates cash movement
    unit: policy
    source: '[Heuristic] No debt, capex, taxes, or material working-capital swings are modeled for this software-first pre-seed business.'
  - id: A22
    name: Base-case retention through M36
    value: No logo churn before model end
    unit: customer assumption
    source: '[BP gtm.funnelTargets; BP strategicChoices] Base case assumes the first six reference accounts are retained through their initial expansion cycles; churn only appears in downside and unit-economics sensitivity.'
