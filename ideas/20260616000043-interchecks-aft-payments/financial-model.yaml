scenarios:
  downside:
    description: Sponsor-bank review slows live approvals, the sixth logo never lands, and existing logos expand more slowly than planned.
    y3RevenueK: 3445.0
    y3EbitdaK: -671.5
    cashLowPointK: -485.0
    keyAssumptionChanges:
      - Logo signings slip to M6, M11, M15, M20, and M27, leaving only five logos by Q4Y3.
      - Land, expanded, and mature monthly revenue step down from $35K / $75K / $110K to $30K / $60K / $90K.
      - Recurring gross margin softens because fixed compliance and connector costs stay in place while volume ramps more slowly.
  base:
    description: Three Y1 pilots convert into a five-logo sportsbook base by Y2, then one adjacent fintech logo lands in Y3 and the first four logos expand into multi-rail contracts.
    y3RevenueK: 5145.0
    y3EbitdaK: 658.0
    cashLowPointK: 922.8
    keyAssumptionChanges:
      - 'Six paying logos arrive on the A3 cadence: M5, M9, M12, M16, M22, and M29.'
      - Revenue per logo follows the A9 maturity curve from pilot to land to expanded to mature contract levels.
      - Hiring follows A14 with only 13 FTEs by Q4Y3, so EBITDA turns positive only after the fourth and fifth sportsbook logos expand.
  upside:
    description: Processor referrals shorten the sales cycle, earlier logos expand faster, and the adjacent-fintech motion lands one quarter sooner.
    y3RevenueK: 6242.0
    y3EbitdaK: 1551.6
    cashLowPointK: 1273.1
    keyAssumptionChanges:
      - Logo signings pull forward to M5, M8, M11, M15, M20, and M26.
      - Expanded and mature monthly contract levels rise to $85K and $125K as second-rail and second-brand usage attaches faster.
      - Recurring gross margin improves modestly as the same team supports more volume through reusable connectors and audit templates.
sensitivity:
  - variable: ARPU
    downsideCase: Land / expanded / mature revenue settles at $30K / $65K / $95K per month because buyers cap scope to one rail.
    baseCase: Land / expanded / mature revenue stays at $35K / $75K / $110K per month.
    upsideCase: Land / expanded / mature revenue improves to $38K / $82K / $120K per month through faster cross-brand adoption.
    y3RevenueImpactK: -685.0
    cashImpactK: -672.0
  - variable: CAC
    downsideCase: Longer procurement and more travel push effective CAC above $300K and delay the last two logo wins.
    baseCase: CAC holds near $220K as founder-led selling combines with processor and pay-by-bank referrals.
    upsideCase: Warm partner intros pull CAC below $180K and move two deals forward by one quarter.
    y3RevenueImpactK: -416.0
    cashImpactK: -550.0
  - variable: churn
    downsideCase: One mature sportsbook logo churns or downsells in Y3 after live proof disappoints a key stakeholder.
    baseCase: All six logos are retained through M36 while renewal and expansion references are still forming.
    upsideCase: No churn plus an earlier sixth-logo start marginally lifts Y3 revenue and seed readiness.
    y3RevenueImpactK: -660.0
    cashImpactK: -462.0
  - variable: sales cycle
    downsideCase: Security, compliance, and sponsor-bank review add roughly one quarter to each logo close.
    baseCase: The first six logos close on the A3 cadence with pilots turning into live contracts in the same operator budget cycle.
    upsideCase: Trusted referrals pull the average cycle forward by one to two months.
    y3RevenueImpactK: -504.0
    cashImpactK: -644.0
  - variable: gross margin
    downsideCase: Connector support and manual reviews keep recurring COGS near 35% and implementation delivery cost near 50%.
    baseCase: Recurring COGS stay at 30% and implementation delivery at 45%, consistent with the 70% target gross margin.
    upsideCase: Reusable connectors and cleaner datasets improve recurring COGS to about 27% and implementation delivery to 40%.
    y3RevenueImpactK: 0.0
    cashImpactK: -488.7
  - variable: hiring pace
    downsideCase: Sales, engineering, and ops hires are pulled forward one quarter before repeatability is fully proven.
    baseCase: Hiring follows A14 and reaches 13 FTE only after the fourth sportsbook logo is live or clearly expanding.
    upsideCase: Late-stage hires slip until cash flow is stronger, improving cash without changing the six-logo plan.
    y3RevenueImpactK: 0.0
    cashImpactK: -392.5
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Founder outbound and processor referrals] --> Pilots[Paid shadow-mode pilots]
      Pilots --> Production[Production logos]
      Production --> Expansion[Second rail or brand expansion]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven less by raw logo count than by four early sportsbook logos graduating from $35K land contracts into $75K-$110K multi-rail expansion contracts by Y3.
  - checkName: Must go right
    finding: The first three paid pilots must convert and at least the first two live logos must expand within 12 months, or the model misses both the Y2 milestone and the cash-efficient path shown in the base scenario.
  - checkName: Model breaks if
    finding: A one-quarter sales-cycle slip or one mature-logo churn event removes roughly $500K-$660K of Y3 revenue and can erase $460K-$640K of ending cash, which is why the downside case turns cash-negative.
  - checkName: Next-round proof
    finding: The next financing is justified once five sportsbook production logos, two-rail live approval proof, and one adjacent-fintech account are in hand, because that validates the wedge before the company tries to close the gap to the researched $8.4M SOM.
sanityChecks:
  ruleOf40: Y3 revenue growth 149% ((5145.0-2070.0)/2070.0) + EBITDA margin 12.8% (658.0/5145.0) = 161.4%; directionally strong, but inflated by small-base enterprise ramps.
  burnMultiple: Y3 EBITDA is positive, so burn multiple stops being the key metric; in the last burn year, Y2 burn of $553.3K divided by exit-ARR added from M12 to M24 of about $2556.0K equals 0.22x.
  revenuePerFte: $395.8K Y3 revenue per Q4Y3 FTE (13 FTEs; benchmark roughly $200-400K vertical SaaS).
  flags:
    - 'Six logos still make the base case highly concentrated: losing one mature sportsbook account would remove well over 15% of exit ARR.'
    - Base-case exit ARR reaches about $6.6M by M36, still below the researched $8.4M year-3 SOM, so the model requires another expansion step or a seventh logo after this horizon.
    - Sponsor-bank or processor resistance remains the single gating risk; if live influence slips beyond the first five logos, the downside case shows the current pre-seed ask is not enough.
    - Y3 profitability depends on expansion inside early logos, not just new bookings; if second-rail or second-brand adoption stalls, the efficiency metrics reverse quickly.

