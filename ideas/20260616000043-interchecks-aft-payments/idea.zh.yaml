jobsToBeDone:
  - job: >-
      当新老玩家在高意图投注时刻前尝试充值时，帮助我们的支付团队即时批准正确的存款，从而在不开新欺诈口子的情况下锁住投注额。
    currentAlternative: "处理商规则加欺诈供应商评分与人工升级"
    successMetric: "已充值玩家转化率与每次存款尝试的欺诈损失"
  - job: >-
      当风险管理层或担保银行合作方询问某笔存款为何被放行或拦截时，帮助我们的团队展示精确的规则与证据追踪，从而在不拖累增长的前提下调优策略。
    currentAlternative: "从处理商仪表板导出数据，并跨多工具开展分析师临时调查"
    successMetric: "误拒率与审查或解释一次有争议的资金决策所需时间"
