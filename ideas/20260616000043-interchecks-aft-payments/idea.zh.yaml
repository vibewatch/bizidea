  - point: "Mastercard 和 Visa Direct 的网络支持增加了运营商可用的实时资金划转路径数量，进而提升了凌驾于任何单一处理商之上的独立控制层的价值。"
    signalRefs: ["主要网络为更广泛实时资金划转背书"]
    sourceRefs: [2, 3]
  - point: "一家已处理逾 $50B 资金、保持盈利并仍完成 $50M C 轮融资的基础设施供应商，表明该赛道已足够成熟，可承载相邻工作流软件。"
    signalRefs: ["赛道规模验证已充分成立"]
    sourceRefs: [1]
differentiator: >-
  处理商和 AFT 服务商负责搬运资金并暴露基础管控，但它们的激励来自自身轨道的交易量，而非最大化受监管运营商的已充值账户转化。初创公司的制胜点在于成为那个能学习——哪位用户、哪张卡、哪个会话模式现在值得即时充值，哪个走备用轨道，哪个直接拦截——的资金决策系统。护城河来自跨轨道审批数据、运营商专属策略图谱，以及凌驾于任何单一网络或处理商之上的损失结果反馈。
