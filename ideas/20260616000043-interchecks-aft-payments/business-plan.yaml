slug: sportsbook-deposit-approval-engine
date: "2026-06-16"
executiveSummary: >-
  Sportsbook Deposit Approval Engine should start as a provider-neutral
  funding-session control plane for U.S. multi-state sportsbooks that are adding
  debit AFT on top of existing ACH or pay-by-bank deposits before the 2026 NFL
  season. The first buyer is a VP or GM of Payments working with the fraud lead
  because failed first deposits and manual reviews directly depress
  funded-player conversion during event windows while duplicate-card and
  suspicious-activity risk still sits with the operator. The initial product
  should not try to replace processors; it should replay 90 days of deposit
  attempts in shadow mode, recommend approve, route, step-up, or block
  decisions, and generate audit-ready evidence by state, cohort, and rail. If
  shadow mode proves lift, the company can move into limited live control for
  one AFT processor and one bank-funding fallback rail, which is a lower-friction
  sequence than selling a full payment-stack replacement. Go-to-market is
  coherent because the trigger is a new AFT rollout, state launch, or pre-event
  deposit-failure spike, distribution starts with direct founder-led sales into
  roughly twenty beachhead operators plus processor referrals, and pricing
  combines paid implementation with annual software and usage tied to funding
  sessions under policy coverage. Competition is real across Interchecks,
  Trustly, Nuvei, Paysafe, and Sardine, but those vendors either own a rail or
  sell horizontal risk rather than neutral cross-rail conversion optimization.
  The researched market is not huge—about $32.0M SAM and $8.4M year-3 SOM for
  the beachhead—so the company only works as a venture case if sportsbook proof
  expands into adjacent regulated-fintech funding flows. The main evidence gap
  is public proof that a third-party engine can both influence AFT decisions and
  lift funded-player conversion without sponsor-bank resistance, so the first 90
  days must validate data access, audit requirements, and measurable ROI.
problem:
  - "High-intent deposit sessions are split across AFT processors, pay-by-bank providers, fraud tools, and manual rules, so good players fail funding at the moment sportsbooks most need them to convert."
  - "Risk teams cannot tune duplicate-card, velocity, and suspicious-activity policies fast enough by state, event window, or player cohort, which forces a tradeoff between funded-player growth and fraud loss."
  - "When sponsor banks, compliance teams, or regulators ask why a deposit was approved or blocked, operators must reconstruct the answer from multiple dashboards instead of one auditable decision trail."
solution:
  - "Start with a shadow-mode engine that ingests AFT, pay-by-bank, KYC, fraud, and internal history signals for one deposit funnel and recommends approve, route, step-up, or block decisions in milliseconds."
  - "Give payments and risk teams a policy console to simulate funded-player conversion versus loss by state, event window, processor, and cohort before rules go live."
  - "Convert proven policies into limited live control with case management and immutable audit logs so the same system explains every decision to sponsor-bank and compliance stakeholders."
whyWeWin:
  - "The wedge sits above processors and rails, so the product can optimize across AFT, ACH or pay-by-bank, and manual-review paths instead of being biased toward one provider's volume."
  - "Each deployment compounds a cross-rail dataset of approvals, declines, returns, duplicate-card hits, and fraud outcomes that no single processor sees inside one operator."
  - "The first buying trigger is immediate and measurable—AFT rollout or NFL-season deposit pressure—so proof can be judged on funded-player conversion, false declines, manual-review share, and loss rate rather than vague platform adoption."
strategicChoices:
  beachhead: "U.S.-licensed online sportsbooks operating in 5+ states, already running ACH or pay-by-bank deposits, and adding debit AFT for first deposits and reloads before the 2026 NFL season."
  wedgeRationale: >-
    Sportsbooks give the fastest proof because the deposit funnel is
    revenue-critical, seasonal, and concentrated among about twenty operators
    with named payments buyers. Starting with neobanks or generic fintech would
    broaden the theoretical market but slow integration, blur success metrics,
    and increase regulatory permutations before the product proves neutral lift.
  sequencingRationale: >-
    The company should sequence shadow-mode replay before live control because
    sponsor-bank approval and ROI proof are the gating risks, not model
    sophistication. Founder-led sales and solutions engineering come before
    scaled GTM; processor and pay-by-bank partnerships come before adjacent-market
    expansion; and payouts or international rails wait until one deposit
    workflow converts reliably.
  notYet:
    - "Instant payouts or withdrawal orchestration"
    - "Neobank and wallet funding flows before sportsbook proof"
    - "Replacing the processor or becoming the merchant of record"
    - "International expansion or Europe-specific affordability workflows"
market:
  tam: "$150.0M estimated TAM from about 75 regulated high-frequency funding platforms at roughly $2.0M blended annual spend for deposit-decision infrastructure."
  sam: "$32.0M estimated SAM from about 20 multi-state U.S. sportsbook and iGaming operators at roughly $1.6M blended annual spend."
  som: "$8.4M year-3 SOM assuming 5 sportsbook logos plus 1 adjacent regulated-fintech logo at about $1.4M average annual contract after shadow-mode proof and live rollout."
  segments:
    - "Multi-state U.S. sportsbooks and iGaming operators adding debit AFT to deposit flows"
    - "Regulated neobanks and wallet fintechs adding instant account funding after sportsbook proof"
  buyingProcess: >-
    The sale usually starts when a VP or GM of Payments is turning on debit AFT,
    launching a new state, or entering a major sports calendar window and sees
    deposit friction or fraud pressure rise. Payments typically champions, but
    CRO or fraud leadership, compliance, and sometimes sponsor-bank reviewers
    must approve because the workflow changes regulated deposit decisions.
product:
  mvp: >-
    An MVP should replay 90 days of deposit attempts for one sportsbook,
    normalize AFT, pay-by-bank, and fraud signals into one funding-session
    record, and recommend approve, route, step-up, or block decisions with
    replay analytics and audit trails. It should stay read-only at first and
    avoid direct money movement or processor replacement.
  sixMonth: >-
    Ship one production-ready shadow-mode deployment with historical replay,
    state and event-window policy tuning, duplicate-card and velocity rules, and
    case-management exports for payments and risk teams.
  twelveMonth: >-
    Add limited live control for one AFT processor plus one bank-funding
    fallback rail, with configurable step-up actions, sponsor-bank-ready
    decision evidence, and holdout testing against existing rules.
  twentyFourMonth: >-
    Expand to multi-brand and multi-state optimization, reusable connectors
    across leading processors and pay-by-bank vendors, benchmark reporting on
    false declines and return loss, and only then extend the same control plane
    into instant payouts or adjacent regulated-fintech funding flows.
  keyBets:
    - "A third-party decision layer can influence or at least shadow AFT approval workflows without processor or sponsor-bank resistance."
    - "Operators will share enough historical deposit and loss data to prove value within one NFL-season buying cycle."
    - "A paid shadow-mode pilot can convert into live policy control before incumbent processors bundle comparable analytics."
    - "Cross-rail policy graphs and audit trails are valuable enough to sustain enterprise ACV in a concentrated market."
gtm:
  wedge: "Sell a paid shadow-mode deposit diagnostic to 5+ state sportsbooks adding debit AFT before NFL season, then convert to live decisioning only if replay shows higher funded-player conversion at flat or lower net loss."
  channels:
    - "Founder-led outbound to VP Payments, GM Payments, and fraud leaders at multi-state sportsbook operators"
    - "Co-sell and referral relationships with AFT processors and pay-by-bank vendors that need operator-specific approval optimization"
    - "Introductions from sponsor-bank, compliance, and gaming-platform partners when cashier changes are under review"
    - "Investor and operator-network introductions into the concentrated target account list"
  funnelTargets: "Target account→qualified discovery 30-40%, qualified discovery→shadow-mode pilot 40-60%, pilot→annual production contract 50%+, production→second rail or brand expansion 60%+ within 12 months."
  pricing: >-
    Charge a paid 60-90 day shadow-mode implementation, then annual SaaS by
    brand or deposit funnel plus usage-based fees on funding sessions under live
    policy coverage. This matches buyer ROI because conversion lift, lower
    manual-review load, and tighter loss control all occur inside deposit volume
    rather than seat count.
businessModel:
  revenueStreams:
    - "Annual platform subscription by brand or operator"
    - "Paid implementation and integration fees"
    - "Usage-based fees on funding sessions under live policy coverage"
    - "Premium benchmark, experimentation, and audit modules"
  unitOfValue: "Funding session under decision coverage"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more states, brands, and event windows inside the same sportsbook"
    - "Expand from shadow mode to live decisioning across more rails and processors"
    - "Extend from deposits into instant payouts once the same customer trusts the policy layer"
    - "Sell the proven control plane to neobanks, wallets, and brokerages with similar instant-funding workflows"
strategyMap:
  northStarMetric: "Monthly deposit sessions converted to funded accounts within customer loss thresholds"
  inputMetrics:
    - "Funded-player conversion lift versus baseline"
    - "False-decline rate by state, rail, and cohort"
    - "Fraud or return loss per 1,000 deposit attempts"
    - "Share of deposit attempts routed to manual review"
    - "Pilot-to-production conversion rate"
  moatsToBuild:
    - "Cross-rail dataset linking approvals, declines, returns, duplicate-card hits, and downstream fraud outcomes"
    - "Operator-specific policy graphs tuned by state, event window, cohort, and sponsor-bank constraints"
    - "Reusable audit packages and integration connectors that shorten deployment across processors and pay-by-bank vendors"
  killCriteria:
    - "Fewer than 4 of the first 12 target operators agree to share 90 days of deposit-attempt data for shadow-mode replay."
    - "The first 3 pilots fail to show at least 2 percentage points of funded-player conversion lift or an equivalent manual-review reduction without higher fraud or return loss."
    - "More than half of qualified prospects decide processor-native or horizontal risk tooling is sufficient and refuse a paid pilot."
    - "Sponsor-bank or processor reviews block live influence on approval or routing in 2 consecutive pilot accounts."
  mermaid: |
    flowchart LR
      Wedge[Sportsbook deposit wedge] --> MVP[Shadow mode MVP]
      MVP --> Proof[Conversion and loss proof]
      Proof --> Expansion[Cross rail expansion]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Sharp beachhead and real pain, but conviction remains limited until one operator proves paid lift and sponsor-bank acceptance."
    whyBelieve: "Deposit approval is already becoming a named, budget-worthy workflow as AFT, pay-by-bank, and fraud controls converge inside the sportsbook cashier."
    whyDoubt: "The market is concentrated and incumbents can bundle adjacent capabilities, so a standalone layer must prove neutral cross-rail lift quickly."
    nextDiligence: "Secure one design partner willing to run a 90-day replay and pre-negotiate the path from shadow mode to live approval control."
  firstCustomer:
    title: "VP Payments at a 5+ state online sportsbook"
    profile: "Operator with 10+ licenses or comparable multi-brand scale, live ACH or pay-by-bank deposits, and a 2026 roadmap to add debit AFT before NFL-season acquisition spend."
    trigger: "Turning on debit AFT, entering a new state, or seeing first-deposit failures and fraud alerts spike before a major sports event."
    buyer: "VP Payments or GM Payments working with the fraud lead"
    initialContract: "$75k-$150k paid shadow-mode pilot for one brand and one processor over 60-90 days, credited into roughly $300k-$600k annual software plus usage once live decisioning begins."
  mustBeTrue:
    - "At least five of the first ten target operators must confirm that deposit approval is a top-three cashier pain with budget attached."
    - "At least three design partners must provide rail, fraud, and outcome data detailed enough to replay 90 days of funding sessions."
    - "Shadow-mode pilots must show at least a 2-point funded-player conversion lift or at least a 25% manual-review reduction without higher loss."
    - "Processors and sponsor banks must permit a third-party layer to recommend or enforce approval and routing logic in production."
    - "At least half of paid pilots must convert to annual contracts before incumbents bundle equivalent cross-rail decisioning."
  diligenceQuestions:
    - "Which title owns budget when the KPI is funded-player conversion but the downside is sponsor-bank and fraud risk?"
    - "How many deposit attempts per day and per event window does the target operator process by rail, and how does that change the ROI ceiling?"
    - "What data fields and approval hooks will Interchecks, Trustly, or the incumbent processor expose to a third-party control plane?"
    - "How does the operator currently measure false declines, duplicate-card abuse, and manual-review latency at the funding-session level?"
    - "What minimum lift would justify replacing processor-native rules before the next NFL season?"
operatingAssumptions:
  - assumption: "Processors and sponsor banks will allow shadow mode and eventually limited live control without requiring the startup to become the money-movement system of record."
    basis: research.yaml
    validationTest: "Complete architecture and compliance review with two processors and one sponsor-bank stakeholder, and obtain written confirmation that shadow mode plus rule recommendations are allowed before a live pilot."
    decisionImpact: "If false, sell only analytics and benchmarking or embed through a processor partner instead of building a standalone control plane."
  - assumption: "Target operators can export 90 days of deposit attempts with enough rail, issuer, fraud, and funding-outcome detail to support replay."
    basis: research.yaml
    validationTest: "Obtain sample datasets from three prospects and confirm that more than 85% of attempts include rail, issuer response, fraud outcome, and final funding result fields."
    decisionImpact: "If false, narrow the ICP to data-mature operators or build only lightweight policy overlays on existing dashboards."
  - assumption: "A paid shadow-mode pilot is acceptable during AFT rollout or pre-season planning."
    basis: idea.yaml
    validationTest: "Present pilot scope and pricing to eight qualified prospects and secure at least three letters of intent or paid pilots."
    decisionImpact: "If false, shift to a free diagnostic plus higher implementation fees or a channel-led land motion."
  - assumption: "The ROI is large enough to support roughly $300k-$600k annual contracts before multi-state expansion."
    basis: research.yaml
    validationTest: "From the first pilot, quantify conversion lift, manual-review savings, and loss impact, and require a modeled payback period under 12 months in customer business cases."
    decisionImpact: "If false, reduce price, add support or compliance modules, or treat the company as a narrower workflow tool."
  - assumption: "The sportsbook wedge transfers to adjacent regulated-fintech funding flows after initial proof."
    basis: research.yaml
    validationTest: "Run two design-partner interviews and one historical replay with a neobank or wallet by month 12."
    decisionImpact: "If false, keep hiring and fundraising sized for a concentrated sportsbook market rather than a broader fintech platform."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Interview 12 payments and fraud leaders at multi-state sportsbooks planning debit AFT or state expansion."
    hypothesis: "Deposit approval is a top-three cashier pain with a named budget owner before the next NFL season."
    successMetric: "At least 7 of 12 target accounts cite first-deposit conversion or review latency as an urgent buying trigger."
    owner: "Founder / CEO"
  - horizon: "0-90 days"
    experiment: "Collect 90 days of deposit-attempt, fraud, and funding-outcome data from three design partners and map it into one canonical funding-session model."
    hypothesis: "The product can build a usable replay dataset without requiring the customer to replace its processor or fraud stack."
    successMetric: "At least 85% of attempts join into a funding-session record with fewer than 10% unmatched critical fields."
    owner: "Founding eng"
  - horizon: "0-90 days"
    experiment: "Run processor and sponsor-bank design reviews using sample audit logs and live-control guardrails."
    hypothesis: "A third-party decision layer is acceptable if it starts read-only and keeps immutable decision evidence."
    successMetric: "Two processors and one sponsor-bank stakeholder approve the shadow-mode design and one live-pilot path."
    owner: "Payments/risk lead"
  - horizon: "90-180 days"
    experiment: "Deploy one paid shadow-mode pilot focused on first deposits and event-window reloads."
    hypothesis: "Replay-based policy tuning can lift funded-player conversion or materially reduce manual review at flat or lower net loss."
    successMetric: "Pilot shows at least 2 percentage points of funded-player conversion lift or 25% lower manual-review share without higher fraud or return loss."
    owner: "Founder / CEO"
  - horizon: "90-180 days"
    experiment: "Test pilot packaging of paid implementation plus annual platform and usage fees against pure basis-point pricing."
    hypothesis: "Buyers prefer a software contract with explicit implementation because it fits payments-operations budgeting better than pure revenue share."
    successMetric: "At least 4 of 6 qualified prospects select the proposed implementation-plus-platform package."
    owner: "Founder / CEO"
  - horizon: "180-365 days"
    experiment: "Launch limited live control with one AFT processor and one bank-funding fallback rail in the first production account."
    hypothesis: "Live routing and step-up rules can run in production without breaking sponsor-bank or compliance requirements."
    successMetric: "One production account goes live and pilot-to-production conversion stays above 50% across the first two pilots."
    owner: "Founding eng"
operations:
  - "Maintain immutable funding-session decision logs, rule versions, and analyst actions for every shadow and live policy outcome."
  - "Operate a state- and rail-specific policy library covering AFT data requirements, Nacha account-validation rules, event-window limits, and sponsor-bank exceptions."
  - "Monitor processor, pay-by-bank, and fraud-data connectors for schema drift so replay and live rules do not silently degrade."
  - "Keep a human-in-the-loop review queue for edge cases and periodic rule calibration before widening live automation."
team:
  - role: "Founder / CEO"
    startTiming: "Month 0"
    rationale: "Founder-led selling and partnership work are required because budget ownership, processor cooperation, and sponsor-bank acceptance are still being discovered."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "The company needs immediate ownership of the event model, replay engine, policy graph, and audit-log architecture."
  - role: "Solutions engineer"
    startTiming: "Month 3"
    rationale: "Early pilots are integration-heavy and need dedicated support for customer data mapping, connector setup, and deployment hygiene."
  - role: "Payments/risk lead"
    startTiming: "Month 6"
    rationale: "A domain expert is needed to translate sponsor-bank constraints, fraud operations, and event-window policy tuning into reusable product rules."
  - role: "Account executive / partnerships"
    startTiming: "Month 12"
    rationale: "Add a dedicated seller only after the company proves a repeatable pilot-to-production motion and partner-assisted access to target accounts."
milestones:
  - horizon: "0-12 months"
    items:
      - "Close three sportsbook design partners planning debit AFT or major cashier changes."
      - "Ship MVP with historical replay, policy simulator, and immutable audit trail for one deposit funnel."
      - "Convert at least one paid pilot into an annual production contract."
      - "Sign two processor or pay-by-bank referral and integration partners."
  - horizon: "12-24 months"
    items:
      - "Reach four to five production sportsbook logos across multiple states or brands."
      - "Support limited live approval or routing control across at least two rail combinations."
      - "Prove expansion inside existing customers through additional brands, states, or event-window policies."
      - "Launch benchmark reporting and reusable sponsor-bank audit templates."
  - horizon: "24-36 months"
    items:
      - "Reach six production logos consistent with the researched year-3 SOM, including one adjacent regulated-fintech account."
      - "Extend the control plane from deposits into instant payouts only in customers that already trust live deposit decisioning."
      - "Publish cross-customer benchmarks on false declines, return loss, and manual-review load."
      - "Decide whether to scale broader funding-session decisioning based on adjacent-market win rate and expansion economics."
risks:
  - risk: "Processors or PSPs may bundle enough native routing and analytics to collapse the standalone wedge."
    likelihood: Medium
    impact: High
    mitigation: "Stay provider-neutral, prove lift across multiple external stacks, and win on cross-rail benchmarking and auditability that a single processor cannot provide."
  - risk: "Sponsor banks or processors may block third-party influence over approval or routing decisions."
    likelihood: High
    impact: High
    mitigation: "Start in shadow mode, package immutable audit evidence from day one, and design the first live deployment as a tightly scoped control layer over existing processors."
  - risk: "Operators may lack clean baselines for false declines, duplicate-card abuse, and manual-review latency, making ROI hard to quantify."
    likelihood: Medium
    impact: High
    mitigation: "Use historical replay, holdout tests, and pre-agreed pilot metrics tied to funded-player conversion, manual-review share, and loss outcomes."
  - risk: "The sportsbook market is concentrated and seasonal, which can slow logo growth if expansion beyond the beachhead lags."
    likelihood: Medium
    impact: Medium
    mitigation: "Target a small number of high-value accounts first, drive multi-brand and multi-state expansion per logo, and validate one adjacent fintech use case by month 12."
  - risk: "Debit AFT adoption may move slower than expected, reducing the urgency of a new control plane."
    likelihood: Medium
    impact: Medium
    mitigation: "Support pay-by-bank and ACH fallback flows from day one so the product still improves approval decisions even if debit AFT mix ramps slowly."
fundingAsk:
  round: "pre-seed"
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months of founder-led sales, core engineering, solutions and
    payments-risk hiring, shadow-mode product build, first processor and
    pay-by-bank integrations, sponsor-bank and compliance work, and two to three
    pilots through initial production conversion.
