  validationPlan:
    - priority: high
      question: How much funded-player conversion lift is available in one operator’s current first-deposit funnel?
      evidenceToGather: Ninety days of deposit attempts by rail, issuer response, manual-review outcome, and successful funding result, replayed in shadow mode.
    - priority: high
      question: Can a third-party engine influence AFT approval or routing without sponsor-bank pushback?
      evidenceToGather: Processor, sponsor-bank, and compliance review requirements plus sample audit-trail artifacts for one AFT rollout.
    - priority: medium
      question: What share of current losses comes from false declines versus preventable fraud or returns?
      evidenceToGather: Holdout tests and labeled disputes/returns tied to deposit cohorts, cards, and event windows.
    - priority: medium
      question: Does the same control-plane pain exist in adjacent neobank or wallet funding flows?
      evidenceToGather: Two design-partner interviews and one historical replay from a regulated fintech using ACH or instant funding.
