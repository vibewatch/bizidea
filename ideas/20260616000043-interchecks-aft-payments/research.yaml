  sensitivityCases:
    - case: Debit AFT adoption is slower than expected
      impact: Value shifts toward approval analytics on pay-by-bank and ACH fallback flows, which lowers routing complexity but narrows the “why now” wedge versus current alternatives.
      sourceRefs:
        - 13
        - 20
        - 24
    - case: Bundled PSPs or processors improve native decisioning
      impact: Standalone budget compresses unless the startup proves neutral lift across multiple external providers and shows experimentation capabilities the bundle cannot.
      sourceRefs:
