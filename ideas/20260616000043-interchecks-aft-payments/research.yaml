competitors:
  - name: Interchecks
    stage: scale-up
    wedge: Single API for pay-by-bank and debit AFT with built-in account verification, duplicate-card detection, velocity limits, and suspicious-activity monitoring.
    pricing: Custom enterprise quote; no public rate card.
    strength: Owns the funding rail integration layer and has processed more than $50B while operating profitably.
    weaknessVsUs: Processor economics still bias it toward its own stack, not a neutral optimization layer across external providers and internal risk tools.
    sourceRefs:
      - 16
      - 17
      - 18
  - name: Trustly
    stage: incumbent
    wedge: Pay by Bank with guaranteed payments, identity verification, direct bank connectivity, and gaming distribution.
    pricing: Custom enterprise quote; no public rate card.
    strength: Strong bank-based approval and cost story with broad bank coverage and recognizable gaming partners.
    weaknessVsUs: Primarily optimizes bank funding rather than millisecond routing and step-up logic across debit AFT, ACH, and other rails.
    sourceRefs:
      - 20
      - 21
  - name: Nuvei
    stage: incumbent
    wedge: End-to-end payment platform with broad payment-method coverage and customizable merchant integrations.
    pricing: Custom enterprise quote; no public rate card.
    strength: Broad method coverage and merchant tooling make it a default PSP consideration for gaming operators.
    weaknessVsUs: A broad PSP is less naturally positioned to be an independent control layer across providers the operator does not want to consolidate.
    sourceRefs:
      - 22
  - name: Paysafe
    stage: incumbent
    wedge: One-stop iGaming payments across cards, wallets, eCash, APMs, and owned products such as Skrill and PaysafeCard.
    pricing: Custom enterprise quote; no public rate card.
    strength: Deep gaming distribution and strong payment-method breadth, including owned user bases.
    weaknessVsUs: Focuses on method breadth and wallet economics more than operator-owned funding-session approval logic above third-party processors.
    sourceRefs:
      - 23
  - name: Sardine
    stage: scale-up
    wedge: Unified fraud, AML, transaction monitoring, bank verification, and sponsor-banking controls across ACH, RTP, FedNow, and card flows.
    pricing: Custom enterprise quote; no public rate card.
    strength: Closest long-run substitute on cross-rail risk controls and compliance automation.
    weaknessVsUs: Still a horizontal risk platform that would need sportsbook-specific routing, event-window tuning, and cashier KPIs to own the beachhead.
    sourceRefs:
      - 27
regulatoryTechnicalConstraints:
  - point: Visa Direct AFT flows require network-specific onboarding and data elements such as acquiring BIN and business application identifiers, so card-rail decisioning is not plug-and-play.
    sourceRefs:
      - 10
  - point: Nacha does not view WEB-debit fraud controls without account validation as sufficient, so ACH fallback logic must include validation rather than only score-based fraud filtering.
    sourceRefs:
      - 13
  - point: FinCEN has treated online real-time deposit, settlement, and payment intermediaries as money transmitters in relevant fact patterns, which matters if the product expands beyond pure decisioning.
    sourceRefs:
      - 12
  - point: State product requirements such as deposit limits or licensing reviews can change cashier behavior and deployment timing market by market.
    sourceRefs:
      - 14
      - 29
      - 30
validationSignals:
  - point: Interchecks raised $50M while launching AFT specifically for sportsbooks, fintechs, and financial institutions, validating buyer attention in this workflow.
    sourceRefs:
      - 16
      - 17
  - point: A Betting Hero survey found payment friction is common and sticky enough to cause churn, making conversion-oriented tooling budget-worthy.
    sourceRefs:
      - 19
  - point: Trustly argues it can outperform cards on approval rate and cost while embedding identity checks, proving operators will rework cashier flows for better economics.
    sourceRefs:
      - 20
      - 21
  - point: Gamers treat instant good-funds access as a priority, yet PYMNTS/Ingo found only 49% are offered the instant winnings options they want.
    sourceRefs:
      - 33
openQuestions:
  - What percentage of 2026 U.S. sportsbook deposits will actually route over debit AFT versus pay-by-bank, cards, and ACH fallbacks?
  - How cleanly do major operators measure false declines, duplicate-card abuse, and manual-review latency at the funding-session level today?
  - Which sponsor banks and processors will allow a third-party control plane to influence approval or routing decisions without re-papering the full money-movement stack?
  - Can one design partner prove a net funded-player lift big enough to overcome incumbent bundling in a single NFL-season buying cycle?
