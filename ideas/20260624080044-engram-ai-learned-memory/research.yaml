openQuestions:
- How many Am Law and equivalent international firms will move from retrieval-only assistants to persistent memory or MCP-style access in the next 12–18 months?
- Will buyers pay for a standalone corpus-quality layer, or expect the capability to be bundled inside Harvey, iManage, or NetDocuments?
- Can contradiction detection on privileged matter corpora reach low enough false-positive rates to be trusted by KM teams without heavy manual tuning?
- 'Which initial connector bundle creates the fastest path to value: iManage and NetDocuments, or Microsoft 365 and Confluence?'
