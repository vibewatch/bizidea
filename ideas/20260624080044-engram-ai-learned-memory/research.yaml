  - priority: high
    question: Will buyers fund a standalone corpus-quality layer, or insist it be bundled inside assistant or DMS contracts?
    evidenceToGather: Procurement interviews and price-sensitivity testing with firms already budgeting for legal AI.
  - priority: medium
    question: 'Which first connector bundle shortens time-to-value most: iManage, NetDocuments, or Microsoft/Confluence?'
    evidenceToGather: Pilot scoping, repository coverage analysis, and remediation workflow tests across 5–10 design partners.
