    - 26
  - point: Microsoft 365, Confluence, and Notion admins can be technical champions because repository configuration and retention policy changes live with them.
    sourceRefs:
    - 42
    - 40
    - 38
  partnershipEcosystem:
  - point: Document-system partners matter most because the product has to inherit permissions and matter or workspace structure rather than create a parallel data model.
    sourceRefs:
    - 26
    - 23
    - 42
  - point: Memory and assistant partners matter because corpus hygiene is most valuable right before content is reused by persistent memory or document-grounded copilots.
    sourceRefs:
    - 1
