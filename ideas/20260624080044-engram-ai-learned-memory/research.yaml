    - 40
    - 38
  dataMoats:
  - point: A proprietary library of confirmed stale-authority, contradiction, and false-positive outcomes from legal knowledge owners can improve ranking and reviewer triage over time.
    sourceRefs:
    - 11
    - 14
    - 15
  - point: Cross-repository assertion graphs tied to permissions, matter context, and archival state are harder for any single repository vendor to recreate neutrally.
    sourceRefs:
