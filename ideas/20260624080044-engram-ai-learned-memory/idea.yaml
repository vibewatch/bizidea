topRisks:
  - name: Market timing gap
    description: >-
      Engram and organizational memory layers may take 18-to-24 months to reach broad
      enterprise adoption, leaving insufficient near-term buyer urgency for a knowledge
      quality prep layer before enterprises commit to memory systems
    mitigation: >-
      Sell knowledge quality first as a standalone AI readiness audit service to law
      firms already deploying Harvey RAG, converting to subscription SaaS once they
      commit to memory-layer deployments
  - name: Build-versus-buy commoditization
    description: >-
      Engram and other memory providers may bundle basic stale-content detection as a
      native pre-processing feature within 12-to-18 months, eliminating the standalone
      wedge before the company achieves defensible scale
    mitigation: >-
      Invest immediately in deep legal-domain contradiction reasoning that is expensive
      for horizontal platforms to replicate and expand to additional regulated verticals
      before competitors integrate baseline detection
  - name: Legal data access friction
    description: >-
      Law firms are extremely cautious about third-party tools accessing client matter
      documents; security review cycles and data residency requirements may extend
      sales cycles well beyond twelve months
    mitigation: >-
      Offer BYOC and on-premise deployment from day one; acquire SOC 2 Type II and
      ISO 27001 certifications before approaching AmLaw 100 targets; lead with
      read-only access patterns and no document storage to minimize security review scope
