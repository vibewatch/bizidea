jobsToBeDone:
  - job: >-
      部署组织 AI 记忆层时，帮助法务运营负责人验证知识语料库中的每份文档都是最新且
      无矛盾的，从而无需担忧永久嵌入错误而激活 AI
    currentAlternative: 律师助理手工审核和 IT 主导的定期 Confluence 审计，无系统性矛盾检测
    successMetric: >-
      部署后 AI 零次引用已废弃文档；超过 90% 的被标记矛盾在记忆训练完成前得到解决
  - job: >-
      当 AI 助手给客户提供了错误的法律回答时，帮助知识管理团队将其追溯到具体的过时
      源文档，从而更新语料库并防止复发，无需触发全面手工重审
    currentAlternative: 无系统性根因追溯；律师助理在各孤立文档存储中手工排查
    successMetric: >-
      定位 AI 错误回答根因的平均时间从数天缩短至两小时以内，并附带完整的来源溯源链

