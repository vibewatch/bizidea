  - name: 市场时机窗口
    description: >-
      Engram 和组织记忆层可能需要 18 至 24 个月才能实现广泛企业采用，在企业真正承诺
      部署记忆系统之前，知识质量预备层的短期买家紧迫感不足
    mitigation: >-
      先将知识质量作为独立的 AI 就绪度审计服务销售给已部署 Harvey RAG 的律所，等客户
      承诺部署记忆层后再转为订阅制 SaaS
  - name: 自建 vs. 采购的商品化压力
    description: >-
      Engram 和其他记忆提供商可能在 12 至 18 个月内将基础过时内容检测作为原生预处理
      功能捆绑推出，在公司实现可防御规模前消除独立切口
    mitigation: >-
      立即投资深度法律领域矛盾推理——这对水平平台来说成本高昂，难以复制——并在竞争
      对手集成基础检测之前向更多受监管垂直行业扩张
  - name: 法律数据访问阻力
    description: >-
      律所对第三方工具访问客户事务文档极为谨慎；安全审查周期和数据驻留要求可能将
      销售周期延长至远超十二个月
    mitigation: >-
      从第一天起提供 BYOC 和本地部署；在接触 AmLaw 100 目标客户前取得 SOC 2 Type II
      和 ISO 27001 认证；以只读访问模式为先导，不存储文档，将安全审查范围降至最低
