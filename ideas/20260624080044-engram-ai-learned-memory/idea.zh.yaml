startupThesis:
  nonObviousInsight: >-
    组织 AI 记忆系统会继承企业知识库里原有的一切垃圾——与 RAG 瞬时检索过时内容不同，
    持久学习记忆层会将错误永久编码。抢先采用组织记忆的竞赛，制造了一类新型基础设施
    风险：语料质量——不是在检索时，而是在训练时。大多数知识质量厂商聚焦于结构化数据，
    对非结构化知识文档或跨文档的断言级矛盾检测毫无产品布局。
  beachhead: >-
    AmLaw 200 律所的法务运营团队——他们正在部署 Harvey 或将律所知识库接入组织 AI
    记忆，引用一条已被取代的判例先例或相互矛盾的客户事务政策，会直接产生职业责任
  wedge: >-
    针对法律知识语料的自动化过时内容与矛盾检测——监控 iManage、SharePoint 和
    Confluence 文档存储，标记相互冲突的断言和日期已过期的政策，并在指定知识责任人
    解决问题之前阻止被标记内容进入 AI 记忆训练管道
  whyNowCatalyst: >-
    Engram 融资 $98M 的隐身亮相证明企业愿意为组织 AI 记忆基础设施买单，使上游知识
    语料质量差距成为下一个亟待解决的关键层——Harvey 作为 Engram 点名合作伙伴的身份，
    更确认法律 AI 是首个迈入组织记忆生产应用的行业
  ventureScalePath: >-
    在 AmLaw 200 律所赢得法务运营客户后，向同样对知识时效性高度敏感的合规密集型行业
    扩张——制药、金融、政府；打造权威的知识质量标准，让每家 AI 记忆提供商将其作为
    训练前过滤器集成，成为非结构化组织知识领域的 dbt 等价物，覆盖整个企业 AI 记忆
    市场

solution: >-
  一个企业 SaaS 平台，持续监控包括 Confluence、SharePoint、iManage 和 Notion 在内的
  知识库，在内容进入 AI 记忆系统前检测三类质量问题。第一，过时内容——其陈述已被同一
  语料库中更新的权威来源取代。第二，矛盾——断言在覆盖同一主题或政策领域的文档之间
  直接冲突。第三，知识空白——高频员工 AI 查询在语料库中找不到能够良好回答它们的文档。
  检测到的问题通过 Slack 或邮件路由给指定知识责任人，附带具体的解决指引和废弃工作流，
  并可选择阻止被标记内容进入记忆层直到问题解决。平台以主流企业知识系统的只读连接器
  形式交付，并通过通用记忆提供商 API 与 Engram、向量数据库管道和微调工作流集成。

