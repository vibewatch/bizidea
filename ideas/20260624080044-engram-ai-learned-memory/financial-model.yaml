scenarios:
  downside:
    description: >-
      Security review stretches and pilot conversion underperforms, so the business exits Y3 with
      fewer production firms and less expansion revenue.
    y3RevenueK: 2300
    y3EbitdaK: -470
    cashLowPointK: 310
    keyAssumptionChanges:
      - Paid pilot to annual conversion falls to about 45% instead of 55%.
      - Average security-and-procurement cycle extends from roughly 90 days to roughly 150 days.
      - >-
        Production ACV settles near $120K and second-repository expansion lands in only about 25% of
        annual accounts.
  base:
    description: >-
      Five Y1 paying logos become 12 paying logos by Q4Y2 and 30 by Q4Y3, with base-case
      monetization driven by audits converting into annual monitoring.
    y3RevenueK: 3200
    y3EbitdaK: -52.3
    cashLowPointK: 873.2
    keyAssumptionChanges:
      - >-
        Paid pilot to annual conversion holds at about 55% and second-repository expansion reaches
        about 40% within 12 months.
      - Q4Y2 reaches 12 paying logos, of which about 8 are already in annual production.
      - >-
        Production ACV stays anchored near $135K while audit revenue supports early customer-year
        monetization.
  upside:
    description: >-
      One partner channel works early and expansion attaches faster, lifting both customer count and
      monetization without a large step-up in headcount.
    y3RevenueK: 4020
    y3EbitdaK: 360
    cashLowPointK: 930
    keyAssumptionChanges:
      - >-
        Paid pilot to annual conversion rises to about 65% and procurement stays inside one quarter
        for the best-fit accounts.
      - Roughly half of production firms add a second repository inside 12 months.
      - Q4Y3 ends near 34 paying logos with production ACV closer to $150K.
sensitivity:
  - variable: ARPU
    downsideCase: Production ACV settles near $120K with slower add-on uptake.
    baseCase: Production ACV stays anchored near $135K blended annual value.
    upsideCase: Production ACV expands toward $150K as second-repository coverage becomes standard.
    y3RevenueImpactK: -360
    cashImpactK: -250
  - variable: CAC
    downsideCase: CAC rises toward $60K because outbound converts worse and partner intros arrive later.
    baseCase: CAC is about $48.4K using Y2-Y3 sales and marketing spend per 25 new paying logos.
    upsideCase: CAC falls toward $40K once partner-sourced opportunities become dependable.
    y3RevenueImpactK: -90
    cashImpactK: -160
  - variable: churn
    downsideCase: Monthly logo churn reaches 2.5% as incumbent bundles narrow the wedge.
    baseCase: Monthly logo churn stays near 1.5%.
    upsideCase: Monthly logo churn improves toward 1.0% once the reviewer workflow becomes embedded.
    y3RevenueImpactK: -180
    cashImpactK: -140
  - variable: sales cycle
    downsideCase: Security and procurement extend the cycle to roughly 7 months.
    baseCase: Event-driven deals close in roughly 4-5 months.
    upsideCase: Rollout-led deals close inside one quarter when a partner is already in the account.
    y3RevenueImpactK: -300
    cashImpactK: -220
  - variable: gross margin
    downsideCase: Gross margin stalls near 62% because deployment support stays services-heavy.
    baseCase: Gross margin holds near the 70% target in BP businessModel.
    upsideCase: Gross margin improves toward 75% once connector and reviewer workflows are more repeatable.
    y3RevenueImpactK: 0
    cashImpactK: -260
  - variable: hiring pace
    downsideCase: Two planned Y3 hires land a quarter early before revenue is there to support them.
    baseCase: The base hire plan follows the M1/M3/M6/M9 then Q1Y2/Q2Y2/Q3Y2/Q1Y3/Q2Y3/Q3Y3/Q4Y3 sequence.
    upsideCase: Later hires are gated behind conversion milestones and slide out if the pipeline softens.
    y3RevenueImpactK: -60
    cashImpactK: -280
  - variable: pilot conversion
    downsideCase: Only about 45% of paid pilots convert into annual monitoring.
    baseCase: About 55% of paid pilots convert, consistent with the BP target of 50%+.
    upsideCase: About 65% of paid pilots convert once security playbooks are proven.
    y3RevenueImpactK: -260
    cashImpactK: -210
modelDiagram:
  title: legal corpus hygiene revenue loop
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidAudits
      PaidAudits --> AnnualCustomers
      AnnualCustomers --> SecondRepositoryExpansion
      AnnualCustomers --> Revenue
      SecondRepositoryExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: >-
      Base-case revenue comes from turning 5 Y1 paying logos into 12 by Q4Y2 and 30 by Q4Y3 while
      layering annual monitoring onto paid audits and second-repository expansion.
  - checkName: Must go right
    finding: >-
      Pilot-to-annual conversion must stay above roughly 50% and security review must stay near one
      quarter or the Y2 production proof point slips.
  - checkName: Model breaks if
    finding: >-
      If legal procurement stretches toward seven months or gross margin slips into the low 60s from
      services-heavy deployments, the downside case consumes most of the cash buffer.
  - checkName: Next-round proof
    finding: >-
      The seed story is strongest once the company exits Y2 with 8-10 production firms, visible
      second-repository expansion, and a partner-assisted pipeline into Q2Y3.
sanityChecks:
  ruleOf40: >-
    Y3 growth 150.0% + EBITDA margin -1.6% = 148.4% (directionally strong but inflated by a small
    base).
  burnMultiple: >-
    Y2 burn multiple is about 0.7x using $649.6K of EBITDA burn against roughly $945K of end-of-year
    net new ARR; Y3 exits near zero.
  revenuePerFte: $267K Y3 using Q4Y3 headcount of 12 FTE (benchmark roughly $200–400K vertical SaaS).
  flags:
    - >-
      The base case assumes 12 paying logos by Q4Y2 even though only about 8 are modeled as fully
      annual production, so a slower pilot-to-production handoff would push revenue right.
    - >-
      Gross margin is held at the 70% target throughout; if security and deployment work stay more
      services-heavy, the funding need moves above the $2.2M base ask.
    - >-
      The model relies on paid audits and second-repository expansion for part of Y2-Y3 revenue, so
      weaker land-and-expand performance would reduce monetization even if logo count lands.
    - >-
      A 12-FTE Q4Y3 team is intentionally lean for a legal-enterprise motion, leaving limited room
      for multiple highly bespoke integrations at once.
