slug: legal-ai-corpus-hygiene
date: '2026-06-24'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: YYYY-MM
    source: '[BP date 2026-06-24] the model starts in the first full month after the dated business plan.'
  - id: A2
    name: Opening cash / pre-seed ask
    value: $2.2M
    unit: USD
    source: >-
      [BP fundingAsk targetFundingRangeUsd $2-4M + model cash curve] the base case uses a
      low-midpoint pre-seed raise that still preserves a six-month buffer into Q2Y3.
  - id: A3
    name: Starting paying customers
    value: '0'
    unit: count
    source: >-
      [BP milestones 0-12 months + BP experimentRoadmap] the company starts pre-revenue and must
      convert design partners into paid work first.
  - id: A4
    name: Customer definition
    value: >-
      One active paying law-firm or legal-AI account, whether still in a paid baseline audit / pilot
      or already on annual monitoring.
    unit: definition
    source: >-
      [BP gtm.wedge + BP businessModel.unitOfValue + BP investorMemo.firstCustomer.initialContract]
      the land motion is one firm-level deployment tied to a repository pair and later expanded.
  - id: A5
    name: Paid baseline audit pricing
    value: >-
      $45K over roughly 90 days (~$15K recognized per month before crediting into annual
      monitoring).
    unit: USD/account
    source: >-
      [BP investorMemo.firstCustomer.initialContract $30k-$60k baseline audit] the model uses the
      midpoint to avoid overstating early services revenue.
  - id: A6
    name: Production pricing anchor
    value: $135K annual monitoring ARR per production logo.
    unit: USD/customer/year
    source: >-
      [BP market.som + Research market.som + BP operatingAssumptions annual pricing of roughly
      $100k-$180k] the base case uses the researched blended ACV for one-to-two covered
      repositories.
  - id: A7
    name: Year-3 customer target
    value: 30 paying logos by Q4Y3.
    unit: customersEop
    source: >-
      [BP market.som + BP milestones 24-36 months] the plan explicitly models 25-30 customers and
      about $4M SOM by year three.
  - id: A8
    name: Customer ramp
    value: >-
      5 paying logos by M12, 12 by Q4Y2, and 30 by Q4Y3, with roughly 8 of the Q4Y2 logos already on
      annual production and the balance still in late-stage pilot.
    unit: customersEop
    source: >-
      [BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets] the ramp follows the
      stated design-partner goal first, then scales only after pilot conversion proof exists.
  - id: A9
    name: Blended recognized revenue per paying logo ramp
    value: >-
      Roughly $12K per active logo-month in Y1 and about $13K-$14K through Y2-Y3 as paid audits,
      annual monitoring, and second-repository expansion stack together.
    unit: USD/customer/month
    source: >-
      [BP gtm.pricing + BP businessModel.revenueStreams + BP
      investorMemo.firstCustomer.initialContract] recognized revenue runs above pure subscription
      MRR because the first sale includes baseline audit work and later repository expansion.
  - id: A10
    name: Gross margin anchor
    value: 70%
    unit: gross margin percent
    source: >-
      [BP businessModel.targetGrossMarginPct 70] the model holds the plan target rather than
      assuming immediate software-like 80%+ margins.
  - id: A11
    name: Pilot conversion and expansion
    value: >-
      55% paid pilot to annual conversion and 40% production to second-repository expansion within
      12 months.
    unit: conversion rates
    source: >-
      [BP gtm.funnelTargets paid pilot→annual production 50%+ and production→second covered
      repository 40%+ within 12 months] the base case stays close to the explicit funnel targets.
  - id: A12
    name: Hiring timeline
    value: >-
      M1 founder and founding engineer; M3 applied AI; M6 solutions; M9 security/platform; Q1Y2
      first GTM; Q2Y2 second engineer; Q3Y2 second solutions hire; Q1Y3 ops; Q2Y3 second GTM; Q3Y3
      second applied AI; Q4Y3 third engineer.
    unit: timeline
    source: >-
      [BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays
      connector- and deployment-heavy until annual conversion becomes repeatable.
  - id: A13
    name: Founder cash compensation
    value: $120K
    unit: USD/FTE/year
    source: >-
      Startup-finance heuristic for a lean pre-seed founder salary, consistent with BP team showing
      founder-led selling and partner work from day one.
  - id: A14
    name: Engineering cash compensation
    value: $180K
    unit: USD/FTE/year
    source: >-
      Startup-finance heuristic for U.S. enterprise software engineers building read-only
      connectors, workflow orchestration, and permissions inheritance described in BP product and
      team sections.
  - id: A15
    name: Applied AI cash compensation
    value: $210K
    unit: USD/FTE/year
    source: >-
      Startup-finance heuristic for applied-AI talent tasked with stale-authority ranking and
      contradiction precision risk called out in BP team and risks.
  - id: A16
    name: Solutions / customer success cash compensation
    value: $150K
    unit: USD/FTE/year
    source: >-
      Startup-finance heuristic for deployment-heavy solutions talent, consistent with BP team
      assigning this role to workflow mapping, repository setup, and rollout support.
  - id: A17
    name: Security / platform cash compensation
    value: $180K
    unit: USD/FTE/year
    source: >-
      Startup-finance heuristic for BYOC hardening and security-review support, which BP identifies
      as a gating factor once multiple sensitive pilots run in parallel.
  - id: A18
    name: Sales / GTM cash compensation
    value: $160K
    unit: USD/FTE/year
    source: >-
      [BP gtm.channels + BP team rationale for founder-led selling] startup-finance heuristic
      includes base pay, variable compensation, travel, and partner development for enterprise legal
      sales.
  - id: A19
    name: Ops / G&A cash compensation
    value: $120K
    unit: USD/FTE/year
    source: >-
      Startup-finance heuristic for lean finance, legal ops, insurance, and vendor management
      support once paying-logo count reaches the high single digits.
  - id: A20
    name: Payroll allocation to P&L lines
    value: >-
      Founder 60% S&M and 40% G&A; solutions 60% S&M and 40% R&D; engineering, applied AI, and
      security 100% R&D; GTM 100% S&M; ops 100% G&A.
    unit: allocation
    source: >-
      [BP team rationales + BP operations] the split follows who owns selling, deployment,
      productization, and back-office support in the plan.
  - id: A21
    name: Non-payroll operating budget ramp
    value: >-
      Monthly non-payroll spend starts around S&M/R&D/G&A of $2K/$6K/$3K and exits Y3 near
      $20K/$24K/$12K.
    unit: USD/month
    source: >-
      [BP operations + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] this covers
      cloud, legal, compliance tooling, travel, insurance, and partner support without assuming a
      broad paid-demand engine.
  - id: A22
    name: Cash conversion convention
    value: Cash movement equals EBITDA.
    unit: formula
    source: >-
      Startup-finance heuristic for an asset-light software company where capex, taxes, debt
      service, and working-capital timing are not modeled separately at pre-seed scale.
  - id: A23
    name: Steady-state churn for unit economics
    value: 1.5% monthly logo churn.
    unit: percent per month
    source: >-
      [BP risks + Research sensitivityCases and openQuestions] contracts should be sticky once the
      workflow is embedded, but bundling and trust risk justify a conservative early-stage churn
      assumption.
  - id: A24
    name: CAC convention
    value: $48.4K using Y2-Y3 sales and marketing spend divided by 25 new paying logos.
    unit: USD/customer
    source: >-
      [Model calc + BP gtm.funnelTargets + BP channels] founder-led outbound, paid pilots, and
      partner introductions dominate acquisition cost until the channel motion proves out.
  - id: A25
    name: Funding milestone for next round sizing
    value: >-
      Reach 8-10 production firms, prove at least two second-repository expansions, and enter a seed
      raise with roughly six months of cash still available through Q2Y3.
    unit: milestone
    source: >-
      [BP milestones 12-24 months + stage rule requiring a 6-month buffer + model cash curve] the
      pre-seed is sized to reach repeatable production proof instead of only funding pilots.
