scenarios:
  downside:
    description: >-
      安全审查延长、试点转化不达预期，公司在 Y3 末以较少生产律所和较低扩张收入退出。
    y3RevenueK: 2300
    y3EbitdaK: -470
    cashLowPointK: 310
    keyAssumptionChanges:
      - 付费试点转年度转化率降至约 45%，而非 55%。
      - 平均安全与采购周期从约 90 天延长至约 150 天。
      - >-
        生产 ACV 稳定在约 $120K，第二知识库扩张仅在约 25% 的年度账户中落地。
  base:
    description: >-
      Y1 的 5 个付费客户增长至 Q4Y2 的 12 个，再增至 Q4Y3 的 30 个，基础情景货币化
      由审计转年度监测驱动。
    y3RevenueK: 3200
    y3EbitdaK: -52.3
    cashLowPointK: 873.2
    keyAssumptionChanges:
      - >-
        付费试点转年度转化率保持在约 55%，第二知识库扩张在 12 个月内达到约 40%。
      - Q4Y2 达到 12 个付费客户，其中约 8 个已进入年度生产。
      - >-
        生产 ACV 稳定在约 $135K，审计收入支撑早期客户年度货币化。
  upside:
    description: >-
      一条合作伙伴渠道提前生效，扩张更快落地，在不大幅增加人员的情况下同时提升客户
      数量和货币化水平。
    y3RevenueK: 4020
    y3EbitdaK: 360
    cashLowPointK: 930
    keyAssumptionChanges:
      - >-
        付费试点转年度转化率升至约 65%，最契合的账户采购在一个季度内完成。
      - 约半数生产律所在 12 个月内新增第二个知识库。
      - Q4Y3 末约 34 个付费客户，生产 ACV 接近 $150K。
sensitivity:
  - variable: ARPU
    downsideCase: 生产 ACV 因附加采用放缓稳定在约 $120K。
    baseCase: 生产 ACV 稳定在约 $135K 混合年度价值锚点。
    upsideCase: 随着第二知识库覆盖成为标配，生产 ACV 向 $150K 扩展。
    y3RevenueImpactK: -360
    cashImpactK: -250
  - variable: CAC
    downsideCase: 因外向转化变差、合作伙伴引荐姗姗来迟，CAC 升至约 $60K。
    baseCase: CAC 约 $48.4K，用 Y2 至 Y3 销售与营销支出除以 25 个新付费客户计算。
    upsideCase: 一旦合作伙伴来源机会稳定可靠，CAC 降至约 $40K。
    y3RevenueImpactK: -90
    cashImpactK: -160
  - variable: churn
    downsideCase: 随着现有厂商捆绑压缩切口，月度客户流失率升至 2.5%。
    baseCase: 月度客户流失率维持在约 1.5%。
    upsideCase: 一旦审核工作流嵌入，月度客户流失率改善至约 1.0%。
    y3RevenueImpactK: -180
    cashImpactK: -140
  - variable: sales cycle
    downsideCase: 安全和采购将周期延长至约 7 个月。
    baseCase: 事件驱动交易在约 4 至 5 个月内完成。
    upsideCase: 合作伙伴已在账户内时，推出驱动交易在一个季度内完成。
    y3RevenueImpactK: -300
    cashImpactK: -220
  - variable: gross margin
    downsideCase: 因部署支持保持服务密集型，毛利率停滞在约 62%。
    baseCase: 毛利率维持在 BP businessModel 中 70% 的目标附近。
    upsideCase: 连接器和审核工作流更具可重复性后，毛利率改善至约 75%。
    y3RevenueImpactK: 0
    cashImpactK: -260
  - variable: hiring pace
    downsideCase: 两名计划中的 Y3 招聘提前一个季度到岗，彼时收入尚不足以支撑。
    baseCase: 基础招聘计划遵循 M1/M3/M6/M9，然后 Q1Y2/Q2Y2/Q3Y2/Q1Y3/Q2Y3/Q3Y3/Q4Y3 序列。
    upsideCase: 后续招聘以转化里程碑为门控，若管道软化则顺延。
    y3RevenueImpactK: -60
    cashImpactK: -280
  - variable: pilot conversion
    downsideCase: 付费试点中仅约 45% 转为年度监测。
    baseCase: 约 55% 的付费试点转化，与 BP 目标 50%+ 一致。
    upsideCase: 安全手册验证后，约 65% 的付费试点转化。
    y3RevenueImpactK: -260
    cashImpactK: -210
modelDiagram:
  title: 法律语料治理收入循环
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidAudits
      PaidAudits --> AnnualCustomers
      AnnualCustomers --> SecondRepositoryExpansion
      AnnualCustomers --> Revenue
      SecondRepositoryExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: >-
      基础情景收入来自将 Y1 的 5 个付费客户增长至 Q4Y2 的 12 个、Q4Y3 的 30 个，
      同时将年度监测叠加在付费审计和第二知识库扩张之上。
  - checkName: 必须做对的事
    finding: >-
      试点转年度转化率必须保持在约 50% 以上，安全审查必须控制在约一个季度内，否则
      Y2 生产验证节点将延迟。
  - checkName: 模型崩溃条件
    finding: >-
      若法律采购拖至七个月，或服务密集型部署将毛利率拖至 60 年代低位，下行情景将消耗
      大部分现金缓冲。
  - checkName: 下轮融资证明
    finding: >-
      种子轮故事最有说服力的时机——公司 Y2 末以 8 至 10 家生产律所、可见的第二知识库
      扩张，以及进入 Q2Y3 的合作伙伴辅助管道退出 Y2。
sanityChecks:
  ruleOf40: >-
    Y3 增长 150.0% + EBITDA 利润率 -1.6% = 148.4%（方向性强劲，但受小基数放大）。
  burnMultiple: >-
    Y2 燃烧倍数约 0.7x，用 $649.6K EBITDA 亏损对应约 $945K 年末净新增 ARR 计算；
    Y3 接近零。
  revenuePerFte: Y3 每 FTE 营收 $267K，基于 Q4Y3 12 名员工（垂直 SaaS 基准约 $200 至 $400K）。
  flags:
    - >-
      基础情景假设 Q4Y2 达到 12 个付费客户，但其中仅约 8 个建模为完全年度生产，试点
      转生产的移交若放缓，将使收入向右推迟。
    - >-
      毛利率全程保持在 70% 目标；若安全和部署工作保持服务密集型，融资需求将超过
      $2.2M 基础融资额。
    - >-
      模型依赖付费审计和第二知识库扩张支撑 Y2 至 Y3 的部分收入，因此即使客户数
      达标，地扩表现若偏弱，货币化也会受损。
    - >-
      Q4Y3 的 12 人团队对法律企业动作而言刻意保持精简，同时并行多个高度定制化集成
      的空间有限。
