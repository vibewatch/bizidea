slug: legal-ai-corpus-hygiene
date: '2026-06-24'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-07
    unit: YYYY-MM
    source: '[BP date 2026-06-24] 模型从商业计划日期后的第一个完整月份开始。'
  - id: A2
    name: 期初现金 / pre-seed 融资额
    value: $2.2M
    unit: USD
    source: >-
      [BP fundingAsk targetFundingRangeUsd $2-4M + model cash curve] 基础情景采用低中位
      pre-seed 融资额，同时为第 2 年第 2 季度保留六个月缓冲。
  - id: A3
    name: 起始付费客户数
    value: '0'
    unit: count
    source: >-
      [BP milestones 0-12 months + BP experimentRoadmap] 公司从零收入起步，必须先将共创
      客户转化为付费项目。
  - id: A4
    name: 客户定义
    value: >-
      一个活跃付费的律所或法律 AI 账户，无论仍处于付费基线审计/试点阶段，还是已进入
      年度监测。
    unit: definition
    source: >-
      [BP gtm.wedge + BP businessModel.unitOfValue + BP
      investorMemo.firstCustomer.initialContract] 获客动作是绑定一个知识库对的律所级部署，
      后续再扩展。
  - id: A5
    name: 付费基线审计定价
    value: >-
      $45K，约 90 天（在计入年度监测前，每月确认约 $15K）。
    unit: USD/account
    source: >-
      [BP investorMemo.firstCustomer.initialContract $30k-$60k baseline audit] 模型采用
      中间值，避免高估早期服务收入。
  - id: A6
    name: 生产定价锚点
    value: $135K 每生产客户年度监测 ARR。
    unit: USD/customer/year
    source: >-
      [BP market.som + Research market.som + BP operatingAssumptions annual pricing of
      roughly $100k-$180k] 基础情景采用覆盖一至两个知识库的研究混合 ACV。
  - id: A7
    name: 第 3 年客户目标
    value: Q4Y3 末达到 30 个付费客户。
    unit: customersEop
    source: >-
      [BP market.som + BP milestones 24-36 months] 计划明确建模第 3 年达到 25 至 30 个
      客户和约 $4M SOM。
  - id: A8
    name: 客户爬坡曲线
    value: >-
      M12 末 5 个付费客户，Q4Y2 末 12 个，Q4Y3 末 30 个；Q4Y2 的约 8 个客户已进入年度
      生产，其余仍在试点后期。
    unit: customersEop
    source: >-
      [BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets] 爬坡先按照既
      定的共创客户目标推进，只有在试点转化验证之后才加速。
  - id: A9
    name: 每付费客户混合确认收入爬坡
    value: >-
      Y1 每活跃客户月约 $12K，随着付费审计、年度监测和第二知识库扩张叠加，Y2 至 Y3
      约 $13K 至 $14K。
    unit: USD/customer/month
    source: >-
      [BP gtm.pricing + BP businessModel.revenueStreams + BP
      investorMemo.firstCustomer.initialContract] 确认收入高于纯订阅 MRR，因为首单包含
      基线审计工作，后续还有知识库扩张。
  - id: A10
    name: 毛利率锚点
    value: 70%
    unit: gross margin percent
    source: >-
      [BP businessModel.targetGrossMarginPct 70] 模型保持计划目标，而非假设立即达到
      软件级 80%+ 毛利率。
  - id: A11
    name: 试点转化与扩张率
    value: >-
      付费试点转年度转化率 55%，生产客户在 12 个月内扩展至第二知识库的比例 40%。
    unit: conversion rates
    source: >-
      [BP gtm.funnelTargets paid pilot→annual production 50%+ and production→second
      covered repository 40%+ within 12 months] 基础情景贴近明确的漏斗目标。
  - id: A12
    name: 招聘时间线
    value: >-
      M1 创始人和初创工程师；M3 应用 AI；M6 解决方案；M9 安全/平台；Q1Y2 首位 GTM；
      Q2Y2 第二工程师；Q3Y2 第二解决方案；Q1Y3 运营；Q2Y3 第二 GTM；Q3Y3 第二应用
      AI；Q4Y3 第三工程师。
    unit: timeline
    source: >-
      [BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic]
      在年度转化可重复之前，招聘保持连接器和部署优先。
  - id: A13
    name: 创始人现金薪酬
    value: $120K
    unit: USD/FTE/year
    source: >-
      精益 pre-seed 创始人薪资的创业财务经验值，与 BP team 中创始人从第一天起主导销售
      和合作伙伴工作的设定一致。
  - id: A14
    name: 工程师现金薪酬
    value: $180K
    unit: USD/FTE/year
    source: >-
      构建 BP product 和 team 部分所述只读连接器、工作流编排和权限继承的美国企业软件
      工程师的创业财务经验值。
  - id: A15
    name: 应用 AI 工程师现金薪酬
    value: $210K
    unit: USD/FTE/year
    source: >-
      负责 BP team 和 risks 中指出的过时权威排序和矛盾精度风险的应用 AI 人才的创业
      财务经验值。
  - id: A16
    name: 解决方案/客户成功现金薪酬
    value: $150K
    unit: USD/FTE/year
    source: >-
      部署密集型解决方案人才的创业财务经验值，与 BP team 中该角色负责工作流梳理、
      知识库设置和推出支持的设定一致。
  - id: A17
    name: 安全/平台工程师现金薪酬
    value: $180K
    unit: USD/FTE/year
    source: >-
      BYOC 加固和安全审查支持的创业财务经验值——BP 指出一旦多个敏感试点并行，这将成
      为门控因素。
  - id: A18
    name: 销售/GTM 现金薪酬
    value: $160K
    unit: USD/FTE/year
    source: >-
      [BP gtm.channels + BP team rationale for founder-led selling] 创业财务经验值，
      包含企业法律销售的底薪、浮动薪酬、差旅和合作伙伴开发费用。
  - id: A19
    name: 运营/G&A 现金薪酬
    value: $120K
    unit: USD/FTE/year
    source: >-
      一旦付费客户数达到较高个位数，精益财务、法务运营、保险和供应商管理支持的创业
      财务经验值。
  - id: A20
    name: 薪酬分配至 P&L 科目
    value: >-
      创始人 60% S&M、40% G&A；解决方案 60% S&M、40% R&D；工程、应用 AI 和安全
      100% R&D；GTM 100% S&M；运营 100% G&A。
    unit: allocation
    source: >-
      [BP team rationales + BP operations] 分配遵循计划中销售、部署、产品化和后台支持
      的责任归属。
  - id: A21
    name: 非薪酬运营预算爬坡
    value: >-
      月度非薪酬支出从 S&M/R&D/G&A 约 $2K/$6K/$3K 起步，Y3 末退出时接近
      $20K/$24K/$12K。
    unit: USD/month
    source: >-
      [BP operations + BP fundingAsk.useOfFundsSummary + startup-finance heuristic]
      涵盖云服务、法务、合规工具、差旅、保险和合作伙伴支持，不假设广泛的付费需求
      引擎。
  - id: A22
    name: 现金换算约定
    value: 现金变动等于 EBITDA。
    unit: formula
    source: >-
      轻资产软件公司的创业财务经验值，在 pre-seed 阶段不单独对资本支出、税负、债务
      服务和营运资金时序建模。
  - id: A23
    name: 稳态客户流失率（用于单位经济模型）
    value: 月度客户流失率 1.5%。
    unit: percent per month
    source: >-
      [BP risks + Research sensitivityCases and openQuestions] 一旦工作流嵌入，合同应具
      有黏性，但捆绑和信任风险支持保守的早期阶段流失假设。
  - id: A24
    name: CAC 约定
    value: $48.4K，用 Y2 至 Y3 销售与营销支出除以 25 个新付费客户计算。
    unit: USD/customer
    source: >-
      [Model calc + BP gtm.funnelTargets + BP channels] 创始人主导外向开拓、付费试点和
      合作伙伴引荐在渠道动作验证之前主导获客成本。
  - id: A25
    name: 下轮融资里程碑
    value: >-
      达到 8 至 10 家生产律所，验证至少两次第二知识库扩张，并以 Q2Y3 仍剩约六个月现金
      进入种子轮融资。
    unit: milestone
    source: >-
      [BP milestones 12-24 months + stage rule requiring a 6-month buffer + model cash
      curve] pre-seed 规模设计为达到可重复生产验证，而非仅资助试点。
