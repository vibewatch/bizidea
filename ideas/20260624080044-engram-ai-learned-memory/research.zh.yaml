  wedge: 系统记录 DMS，加上用于法律知识搜索和上下文智能的 Ask iManage 和 Insight+。
  pricing: Custom / enterprise
  strength: 拥有权限、文档工作流和受信任的法律 IT 关系。
  weaknessVsUs: 仍以 DMS 为中心，未明确定位为跨混合知识库的中立矛盾解决层。
  sourceRefs:
  - 22
  - 23
- name: NetDocuments
  stage: incumbent
  wedge: 法律上下文图谱、ndConnect 或 MCP 集成，以及锚定在 DMS 中的 ndMAX AI 能力。
  pricing: Custom / enterprise
  strength: 强治理姿态，以及在系统记录内不断完善的法律 AI 互操作性故事。
  weaknessVsUs: 更专注于安全访问和平台扩展，而非主动对外部知识库进行过时权威和矛盾修复。
  sourceRefs:
  - 25
  - 26
  - 28
  - 29
- name: Glean
  stage: scale-up
  wedge: 跨众多 SaaS 系统的权限感知企业搜索、助手和 Agent。
  pricing: Custom / enterprise
  strength: 广泛的跨应用知识图谱，以及在企业 AI 检索领域的强劲势头。
  weaknessVsUs: 水平定位，不针对法律先例取代、信息隔离墙或知识责任人修复做优化。
  sourceRefs:
  - 30
  - 31
  - 34
- name: Patronus AI
  stage: seed
  wedge: 面向企业 AI 部署的 LLM 评估、基准测试和安全工具。
  pricing: Customizable / enterprise
  strength: 在规模化评估模型行为和企业 AI 质量方面有清晰的专业积累。
  weaknessVsUs: 更专注于输出和基准，而非在源语料成为持久记忆之前清理它。
  sourceRefs:
  - 35
  - 36
regulatoryTechnicalConstraints:
- point: 特权、保密和企业隐私规则要求产品继承现有权限，避免对事务文档进行不受控复制。
  sourceRefs:
  - 4
  - 42
  - 26
- point: 留存和存档规则意味着系统必须理解内容何时被取代、归档或处于留置状态，而非简单地浮现最新文本。
  sourceRefs:
  - 41
  - 46
- point: 托管记忆和 RAG 栈提高了源质量出错的代价，因为错误内容变得更易、更廉价地被复用。
  sourceRefs:
  - 2
  - 49
  - 51
  - 63
- point: 法律幻觉风险仍是人工监督问题，因此自动标记需要可审计的审核工作流，而非静默拦截。
  sourceRefs:
  - 11
  - 14
  - 15
validationSignals:
- point: Engram 以 Harvey、Microsoft 和 Notion 为点名合作伙伴或客户亮相，证明记忆层基础设施是真实存在的，而非停留在理论层面。
  sourceRefs:
  - 1
  - 2
- point: Harvey 的规模和记忆路线图表明，法律 AI 已成为大型律所内部的平台预算。
  sourceRefs:
  - 3
  - 5
- point: NetDocuments 和 iManage 正在将 DMS 重新定位为 AI 上下文和治理基础设施，验证了知识库质量管控正在成为战略要素。
  sourceRefs:
  - 25
  - 26
  - 23
- point: 调研和平台数据显示，大型律所已在为法律 AI 编制预算并落地实施，缩短了相邻管控层采购的路径。
  sourceRefs:
  - 6
  - 8
  - 64
openQuestions:
- 未来 12 至 18 个月内，有多少 AmLaw 律所及同等规模的国际律所会从仅检索的助手迁移至持久记忆或 MCP 式访问？
- 买方会为独立的语料质量层买单，还是预期该功能捆绑在 Harvey、iManage 或 NetDocuments 内？
- 对特权事务语料的矛盾检测能否将误报率降低到知识管理团队无需大量手工调整就能信任的水平？
- "哪款初始连接器组合最能缩短价值实现时间：iManage 与 NetDocuments，还是 Microsoft 365 与 Confluence？"
