problem: 轨道算力创业公司正发现，GPU 还不是最先卡住商业化的约束；真正卡住的是发射窗口、任务良率，以及上面级改造成算力节点的假设。财务和销售团队还在用电子表格推这些项目，于是既报不出可靠的 SLA，也排不好预付款结构，更没法向贷款方和锚定客户证明：一个已预订的发射，能在可预期的日期变成可用算力。只要火箭延期，或任务被迫降额，收入预测和下一轮融资都会一起失真。
targetUser:
  primary: 正在预订首批 3–10 次发射的轨道算力创业公司 CFO、COO 或商业负责人
  secondary: 评估原生轨道算力项目的基础设施投资人和发射融资团队
  buyer: 轨道算力开发商的 CFO 或 COO
startupThesis:
  nonObviousInsight: 真正稀缺的资产不是轨道 GPU 硬件，而是能拿去融资的“发射转化算力产能”。一旦每个上面级都变成 1 MW 数据中心，真正的控制点就不在硬件本身，而在承保层：它把火箭清单、轨道假设和失效情景，翻成能卖出去的合同与能融资的收入。
  beachhead: 给美国和欧洲轨道算力创业公司用的产能承保与合同打包工作流——把首批已预订的发射清单，转成预付算力合同和面向贷款方的材料。
  wedge: 围绕发射背书的产能承保工作台，按单次任务建模可用算力、延期情景、降额、SLA 分层和融资分配瀑布。
  whyNowCatalyst: Cowboy Space 融资 $275M、上面级 1 MW 设计，以及与 NVIDIA 的合作都说明：轨道算力正从科幻概念变成被资本化的正式项目，能拿去融资的商业打包因此一下子变得很急。
  ventureScalePath: 先从轨道算力运营商切入，再把同一条承保轨道延伸到发射服务商、保险方、贷款方，以及地球观测星座、在轨制造和能源基础设施等相邻的原生轨道资产。
solution: 产品吃进发射清单、火箭参数、轨道剖面、载荷架构和降额假设，先拉出逐任务的可用产能曲线；再把这条曲线翻成面向客户的合同包，里面包含预留算力块、延期条款、性能区间和预付款排期。融资模块会生成给投资人和保险方看的数据室，把发射延期、任务失败和产能损失对应的下行情景一并打包进去。时间一长，这个平台会变成运营商、资金提供方和锚定客户共同对账的底账系统，大家都在这里谈：由发射背书的算力，到底该怎么定价、怎么卖。
goToMarketSeed:
  firstCustomer: 美国轨道算力创业公司：刚完成 Series B，手里有 1–3 个发射预订名额，还得赶在下一轮融资或大客户销售前，把产能先卖给一个政府锚定客户或前沿 AI 客户。
  buyingTrigger: 融资刚结束，或刚拿下发射预订后，公司必须在下一轮融资或企业销售周期到来前，拿出董事会能看、客户也肯签的收入模型和 SLA。
  currentAlternative: Excel 模型，再外包给航天顾问，加上临时拼出来的法务和财务工作流。
  switchingReason: 它把发射物理、算力降额和商业条款收进同一个可复用模型里，把原本要手工折腾几周的定价和合同打包，压缩成客户或贷款方真能签字的版本。
  pricingHypothesis: $120k-$300k 年平台费，外加实施费，以及已签预付产能金额的 0.25%-0.75% 抽成。
