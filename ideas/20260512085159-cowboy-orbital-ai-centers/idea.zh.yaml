jobsToBeDone:
- job: 在准备第一单由发射背书的算力销售时，帮财务团队把产能定价并划出 SLA 区间，好让他们在轨道部署前就把预付合同签下来。
  currentAlternative: 电子表格建模，再外接航天和法务顾问。
  successMetric: 每个发射项目拿下的预付产能合同金额。
- job: 在举债或引入战略资本时，帮管理层把发射清单翻成下行情景和基准情景的收入瀑布，好让融资更快落地。
  currentAlternative: 定制化投行材料，加上手工拼起来的尽调备忘录。
  successMetric: 从尽调启动到融资获批的时间。
