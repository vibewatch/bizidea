topRisks:
- name: 市场时点
  description: 轨道算力部署的商业化进度，可能比预期更慢，短期内愿意买软件的客户太少。
  mitigation: 先盯住已经在融资或预售产能的运营商团队，再把同一套产品延伸给投资人、保险方和相邻的原生轨道资产类别。
- name: 基准数据稀缺
  description: 历史上的轨道算力任务太少，第一天就想把承保完全自动化并不现实。
  mitigation: 先用专家参与式实施起步，再和发射服务商、保险方以及早期运营商做结构化数据合作。
- name: 客户集中
  description: 早期需求可能被少数几家资金充足的创业公司吃掉，收入会很不平滑。
  mitigation: 别只卖给运营商，要把每次任务周边的整笔交易都吃进去，同时服务资金提供方、发射伙伴和锚定客户。
