  - id: A11
    name: Loaded GTM compensation
    value: '210'
    unit: USDK per FTE per year
    source: '[BP team calls for founding GTM and founder-led enterprise sales; startup-finance heuristic for senior infra GTM comp]'
  - id: A12
    name: Loaded underwriting compensation
    value: '220'
    unit: USDK per FTE per year
    source: '[BP team calls for aerospace underwriting lead; startup-finance heuristic for specialized domain hire]'
  - id: A13
    name: Loaded G&A or customer success compensation
    value: '150'
    unit: USDK per FTE per year
    source: '[Startup-finance heuristic for lean ops/customer success support in an early enterprise software company]'
  - id: A14
    name: Headcount ramp
    value: '2, 3, 4, 4, 6, 7 FTE across q1y1 to q4y3'
    unit: FTE
    source: '[BP team start timings plus sequencing rationale; hiring is gated to keep pace with a small concentrated market]'
  - id: A15
    name: Non-payroll operating spend
    value: '$9K-$17K per month in Y1, then $53K-$75K per quarter in Y2-Y3'
    unit: USDK
    source: '[BP operations, regulatory complexity, counsel coordination, travel, software, and compliance-heavy workflow heuristic]'
  - id: A16
    name: Customer acquisition cost
    value: '95'
    unit: USDK per customer
    source: '[Startup-finance heuristic: founder-led enterprise sales in a tiny niche market runs about 25%-35% of first-year ACV]'
  - id: A17
    name: Monthly churn
    value: '1.5'
    unit: percent
    source: '[Startup-finance heuristic for high-value annual enterprise workflows with moderate concentration risk]'
  - id: A18
    name: Cash conversion assumption
    value: 'EBITDA approximates cash movement'
    unit: policy
    source: '[Startup-finance heuristic: no debt, capex, taxes, or working-capital swing modeled for an early software business]'
  - id: A19
    name: Funding ask sizing
    value: '2.0'
    unit: USDM
    source: '[Modeled burn through the next financing proof point in Q4Y2 plus 6 months of buffer, rounded to the low end of BP targetFundingRangeUsd]'
