scenarios:
  downside:
    description: Operator pilots slip two quarters and counterparties delay paid expansion, so the company exits Y3 with only 4 recurring logos and weaker margins.
    y3RevenueK: 1320.0
    y3EbitdaK: -780.0
    cashLowPointK: -280.0
    keyAssumptionChanges:
      - First paid pilot shifts from M5 to M7.
      - Second paid pilot shifts from M10 to M12.
      - Y3 blended annual ARPU falls from $330K to $300K.
      - Steady-state gross margin tops out at 65%.
  base:
    description: Two pilots land in Y1, expansion follows the business-plan milestone path, and the company reaches 6 recurring logos by Q2Y3 with near-target gross margin.
    y3RevenueK: 1856.3
    y3EbitdaK: -336.0
    cashLowPointK: 423.8
    keyAssumptionChanges:
      - First paid pilot closes in M5 and second in M10.
      - 5 recurring logos are active by Q4Y2.
      - Blended annual ARPU holds at $330K.
      - Gross margin rises from implementation-heavy Y1 levels to 70%-71% in Y3.
  upside:
    description: Pilots close one quarter earlier, counterparties convert faster, and the company reaches 7 recurring logos with modest pricing upside.
    y3RevenueK: 2360.0
    y3EbitdaK: 40.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - First paid pilot closes in M4 and second in M8.
      - A seventh logo is added by Q4Y3.
      - Blended annual ARPU increases to $350K.
      - Gross margin reaches 73% as implementations standardize faster.
sensitivity:
  - variable: ARPU
    downsideCase: $300K blended annual revenue per logo
    baseCase: $330K blended annual revenue per logo
    upsideCase: $350K blended annual revenue per logo
    y3RevenueImpactK: -168.8
    cashImpactK: -220.0
  - variable: CAC
    downsideCase: $120K CAC because each sale needs heavier founder and counsel time
    baseCase: $95K CAC
    upsideCase: $75K CAC via partner referrals
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: churn
    downsideCase: 2.5% monthly churn as pilots fail to convert to standing workflows
    baseCase: 1.5% monthly churn
    upsideCase: 1.0% monthly churn
    y3RevenueImpactK: -180.0
    cashImpactK: -210.0
  - variable: sales cycle
    downsideCase: 9-month operator close cycle
    baseCase: 6-month operator close cycle
    upsideCase: 4-month operator close cycle
    y3RevenueImpactK: -280.0
    cashImpactK: -320.0
  - variable: gross margin
    downsideCase: 65% steady-state gross margin because bespoke modeling persists
    baseCase: 70% steady-state gross margin
    upsideCase: 73% steady-state gross margin
    y3RevenueImpactK: 0.0
    cashImpactK: -93.0
  - variable: hiring pace
    downsideCase: Team hires to plan even if revenue slips
    baseCase: Hires stay stage-gated to pilot conversion and counterparty pull-through
    upsideCase: One Y3 hire is delayed until expansion revenue is locked
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> RecurringLogos
      RecurringLogos --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by 2 paid pilots in Y1 converting into 6 recurring operator and counterparty logos at about $330K blended annual revenue each by Y3.
  - checkName: Must go right
    finding: The company must win counterparty expansion inside the first operator accounts by Y2 because the visible operator-only market is too concentrated to support the hiring plan alone.
  - checkName: Model breaks if
    finding: If launch-linked sales cycles stretch to 9 months or gross margin stalls near 65%, the downside case turns cash negative before the next raise.
  - checkName: Next-round proof
    finding: A credible seed story is 5 recurring logos by Q4Y2 and proof that at least one lender, insurer, or counsel workflow pays on the same underwriting rail.
sanityChecks:
  ruleOf40: 'Y3 growth 66.7% + EBITDA margin -18.1% = 48.6%'
  burnMultiple: 'Y2 burn multiple about 0.7x and Y3 about 0.5x as net burn falls faster than revenue growth slows.'
  revenuePerFte: '$265K Y3 (7 FTE versus roughly $200K-$400K for vertical SaaS or software-enabled services)'
  flags:
    - The buyer universe is small enough that losing or delaying one logo materially changes the financing plan.
    - Y1 gross margin is well below the 70% target because early deployments remain expert-guided and implementation-heavy.
    - Base case assumes counterparties become paying users within 6-12 months of the operator deployment; if they only consume exports for free, Y3 revenue is overstated.
