slug: orbital-capacity-revenue-os
date: '2026-05-12'
executiveSummary: >-
  Orbital-capacity-revenue OS sells a narrow but urgent workflow: turning reserved launches into bankable, customer-ready
  compute capacity. The first customer is a recently funded U.S. orbital-compute operator with 1-3 reserved launches and
  pressure to pre-sell capacity to an anchor government or frontier-AI buyer before the next financing event. The product
  starts as a shared underwriting workspace that links manifest data, derating assumptions, SLA bands, prepayment terms,
  and downside cases in one auditable model. Research supports the timing signal: launch scarcity, tightening debris and
  liability requirements, and fresh financings at Cowboy and Starcloud all make board-grade commercial packaging newly
  urgent. The beachhead is intentionally narrow because the visible buyer universe is concentrated; the initial SAM is only
  about $6.0M across roughly 24 U.S. and European accounts, with a reachable year-3 SOM of about $2.0M if the company wins
  a handful of operator and counterparty logos. That makes this more attractive as a control-point strategy than as a pure
  near-term market-size story. The core operating risk is that operators may delay pre-selling capacity until they have more
  on-orbit proof, which would push the company toward lender, insurer, and launch-partner workflows sooner. Public evidence
  on actual software trust in insurance or lending diligence remains thin, so the first 12 months must prove not just
  product usage but signed commercial decisions influenced by the platform.
problem:
  - Operators still manage launch-to-revenue assumptions in spreadsheets and services workflows, so they cannot quote reliable compute SLAs, delay clauses, or prepayment schedules from first launch manifests.
  - A single launch delay, mission derate, or compliance assumption change can break revenue forecasts, lender decks, and anchor-customer negotiations at the same time.
solution:
  - A launch-backed underwriting workspace ingests manifests, vehicle parameters, orbital profiles, payload architecture, and derating assumptions to produce mission-by-mission usable capacity curves.
  - The same model generates counterparty-ready outputs: SLA bands, reserved-capacity contract packages, downside cases for lenders and insurers, and an auditable assumption trail for finance and legal teams.
whyWeWin:
  - The wedge is narrower than mission-ops or engineering tools: it owns the commercial underwriting layer that adjacent platforms do not currently productize.
  - If the company closes early transactions, it compounds proprietary data on delays, derates, clause outcomes, and realized contract performance across multiple counterparties.
strategicChoices:
  beachhead: U.S.-led orbital-compute and sovereign-storage operators preparing their first 1-3 revenue-bearing launches and needing to pre-sell or finance capacity before deployment.
  wedgeRationale: This beachhead has the clearest buying trigger because fundraising, launch reservations, and anchor-customer diligence happen before recurring mission operations are mature, so a commercial underwriting tool can displace spreadsheets faster than a broader space-software suite can displace incumbent ops tools.
  sequencingRationale: The company should first prove one shared launch-to-revenue model for operator finance teams, then add lender and insurer outputs off the same data model, and only later expand into broader mission analytics or adjacent orbit-native asset classes once there is real benchmark data and reference transactions.
  notYet:
    - Full mission-operations telemetry, autonomy, or constellation-management software
    - General-purpose CPQ for terrestrial cloud or satellite software markets
    - Expansion into Earth observation, in-space manufacturing, or power infrastructure before the launch-to-compute workflow is repeatable
market:
  tam: $14.0M estimated TAM from roughly 55 visible global first-wave operator, capital, insurance, and launch-counterparty accounts at about $255k blended annual workflow budget.
  sam: $6.0M estimated SAM from roughly 24 U.S. and European beachhead accounts closest to funded orbital compute, sovereign storage, and launch-finance workflows.
  som: $2.0M estimated year-3 SOM assuming 4 operator logos plus 2 partner or capital accounts at roughly $280k-$340k blended ACV including services.
  segments:
    - Orbital-compute and sovereign-storage operators commercializing first launches
    - Lenders, insurers, and launch-finance counterparties underwriting the same missions
  buyingProcess: The sale starts with a founder- or CFO-level trigger right after financing or a launch reservation, then expands into COO, legal, and commercial review because the same assumptions must survive customer, lender, and insurer diligence. Deals likely begin as high-touch implementations tied to one launch campaign and convert to annual workflow subscriptions if the model becomes the standing system of record.
product:
  mvp: The MVP is a mission-by-mission underwriting workspace for one operator and one launch campaign, with manifest ingestion, usable-capacity scenarios, SLA band generation, prepayment logic, and exportable lender or insurer downside cases. It should optimize for auditability and cross-functional traceability, not automation breadth.
  sixMonth: Ship a production pilot that supports one operator's real launch campaign with scenario versioning, clause templates for delay and derate cases, and role-specific outputs for finance, legal, and sales.
  twelveMonth: Add reusable data-room workflows for lenders and insurers, benchmark scenario libraries from early launch campaigns, and partner integrations for launch-provider and counsel inputs.
  twentyFourMonth: Expand the same underwriting rail into a multi-counterparty network product with cross-account benchmarking, renewal workflows, and adjacent support for sovereign storage and other orbit-native infrastructure deals.
  keyBets:
    - Buyers will pay before recurring launch volume exists because the cost of a bad model is higher than the software price.
    - One shared commercial model can coordinate finance, legal, sales, and mission teams better than stitched spreadsheets and services.
    - Early transaction data will become defensible faster than adjacent mission-ops vendors can productize neutral underwriting.
gtm:
  wedge: Sell the first deployment as a launch-campaign underwriting system for a newly funded operator that needs a board-ready model and anchor-customer contract package within one financing cycle.
  channels:
    - Founder-led direct sales to recently funded orbital-compute and sovereign-storage operators
    - Referrals from aerospace counsel, insurers, and project-finance advisors already reviewing launch assumptions
    - Co-selling with launch and mission-software partners that can open operator accounts while the startup keeps the commercial-finance wedge
  funnelTargets: lead→qualified design partner 25%+, qualified design partner→paid pilot 50%+, pilot→annual platform conversion 60%+, first pilot→counterparty expansion within 6 months on 50%+ of accounts
  pricing: "$120k-$300k annual platform fee plus implementation and 0.25%-0.75% of signed prepaid capacity value; this matches the research view that buyers already absorb meaningful legal, insurance, and bespoke modeling costs around the same launch campaign."
businessModel:
  revenueStreams:
    - Annual workflow subscription for launch-to-revenue underwriting
    - Implementation fees for model setup, data ingestion, and clause configuration
    - Transaction-linked fees on prepaid or financed capacity contracts
  unitOfValue: Dollar value of launch-backed compute capacity modeled, contracted, or financed through the platform.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add lender and insurer seats around the same mission package
    - Sell benchmark datasets and clause libraries built from completed campaigns
    - Extend the underwriting rail into sovereign storage and other orbit-native infrastructure transactions
strategyMap:
  northStarMetric: Annualized dollar value of launch-backed capacity underwritten through the platform.
  inputMetrics:
    - Number of active launch campaigns modeled
    - Time from manifest intake to lender-ready downside package
    - Prepaid capacity dollars influenced per customer
    - Pilot-to-annual conversion rate
    - Counterparty expansion rate per operator account
  moatsToBuild:
    - Proprietary dataset of manifest changes, launch delays, derates, and realized commercial outcomes
    - Reusable clause library linking technical assumptions to liability, debris, and disposal obligations
    - Multi-party workflow embedded across operator, lender, insurer, and counsel review loops
  killCriteria:
    - Fewer than 2 paid pilots or no signed launch-campaign deployment within 12 months
    - Fewer than 50% of pilot users converting to annual contracts after one launch cycle
    - No lender, insurer, or counsel partner willing to use exported downside packages in live diligence by month 15
    - Buyer discovery showing most first-wave operators will not pre-sell or finance capacity before on-orbit proof
  mermaid: |
    flowchart LR
      Wedge[Launch campaign underwriting wedge] --> MVP[Shared manifest to revenue model]
      MVP --> Proof[Signed pilots and lender or insurer use in live diligence]
      Proof --> Expansion[Counterparty seats and adjacent orbit-native infrastructure workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: Promising control-point thesis in a real pain pocket, but the buyer universe and timing evidence are still too thin for high-conviction underwriting.
    whyBelieve: Launch scarcity, new orbital-data-center financings, and compliance complexity create a concrete commercial workflow that adjacent tools do not yet own.
    whyDoubt: The visible SAM is small and concentrated, and it is still unproven that operators, lenders, or insurers will trust software-generated assumptions before more on-orbit proof exists.
    nextDiligence: Verify that at least two newly funded operators and one insurer or lender will use the same platform-generated package in a live launch-campaign diligence process.
  firstCustomer:
    title: CFO or COO at a newly funded U.S. orbital-compute operator
    profile: Series A or B space-infrastructure company with 1-3 reserved launches, an anchor customer pursuit in flight, and no internal system of record for launch-backed revenue packaging.
    trigger: A financing close or launch-reservation agreement creates immediate pressure to show board-ready revenue scenarios and customer-ready SLA bands before the next commercial milestone.
    buyer: CFO or COO
    initialContract: "$150k-$250k paid pilot and implementation tied to one launch campaign, converting to $180k-$300k annual subscription plus transaction fee once the workflow becomes the standing underwriting system."
  mustBeTrue:
    - At least 5-10 beachhead accounts actively manage first-launch commercial packaging in the next 24 months.
    - CFO or COO buyers will replace spreadsheet and consultant workflows with a paid shared system before repeated launch cadence exists.
    - Lenders, insurers, or counsel will accept platform-generated downside cases as inputs to live diligence.
    - Early customers will let the company retain anonymized benchmark data on delays, derates, and contract outcomes.
    - Adjacent mission-ops and engineering vendors will not move fast enough to bundle neutral underwriting into their existing stacks.
  diligenceQuestions:
    - Which first-wave operators are actually pre-selling or financing capacity before on-orbit proof?
    - Who owns the launch-to-revenue model today inside target accounts, and how often does it break?
    - What evidence would make an insurer or lender trust platform outputs instead of bespoke services only?
    - How much custom aerospace modeling is required per deployment before margins collapse?
    - If the operator field consolidates to a few winners, can the company still become a neutral market rail?
operatingAssumptions:
  - assumption: The first repeatable buyer is a CFO or COO at an operator with 1-3 reserved launches rather than a mission-ops team.
    basis: idea.yaml
    validationTest: Close 10 discovery calls and confirm that finance or commercial leadership owns budget and urgency in at least 7 cases.
    decisionImpact: If false, reposition product and sales motion toward ops-led tooling or insurer and lender workflows first.
  - assumption: Buyers will support enterprise ACVs because the platform replaces a mix of spreadsheets, counsel coordination, insurance review, and custom modeling around one launch campaign.
    basis: research.yaml
    validationTest: Win 2 paid pilots at $150k+ total contract value each without discounting below implementation-cost recovery.
    decisionImpact: If false, reduce product scope, remove transaction-linked pricing at first, and target a smaller services-assisted offering.
  - assumption: Counterparties beyond the operator will engage on the same data model, creating account expansion rather than single-seat operator software only.
    basis: research.yaml
    validationTest: On each pilot, secure at least one active lender, insurer, launch-partner, or counsel participant reviewing exported outputs in the workflow.
    decisionImpact: If false, the company remains a narrow operator tool with weaker moat and lower long-term ACV potential.
  - assumption: Sparse benchmark data can be offset initially by expert-guided implementations and scenario libraries.
    basis: operator judgment
    validationTest: Deliver first two pilots with less than 6 weeks of custom modeling effort each while maintaining customer acceptance of the resulting scenarios.
    decisionImpact: If false, hiring and gross-margin assumptions break and the company behaves more like a consultancy than a software business.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Run structured discovery with 10 CFO, COO, and head-of-commercial prospects across orbital compute and sovereign storage.
    hypothesis: The urgent pain is board- and counterparty-ready commercial packaging, not generic mission analytics.
    successMetric: At least 7 of 10 prospects rank launch-to-revenue underwriting as a top-3 near-term workflow and identify an active launch campaign.
    owner: CEO
  - horizon: 0–90 days
    experiment: Build a manual prototype for one sample mission package covering manifest, derates, SLA bands, and downside waterfall outputs.
    hypothesis: A shared model and export set can replace spreadsheet-plus-consultant workflows for first-launch diligence.
    successMetric: Two design partners agree the package is credible enough to use in live customer, board, or financing review.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Convert one design partner into a paid pilot tied to a real launch-reservation or financing event.
    hypothesis: Buyers will pay before launch if the product reduces diligence time and contract rework.
    successMetric: One paid contract above $150k signed and deployed against a live launch campaign.
    owner: CEO
  - horizon: 90–180 days
    experiment: Run mock diligence reviews with one insurer, one lender, and one aerospace counsel partner using pilot outputs.
    hypothesis: Counterparties will trust structured downside cases if assumptions are traceable and clause logic is explicit.
    successMetric: At least 2 counterparties agree to use or adapt the outputs in live diligence.
    owner: Aerospace underwriting lead
  - horizon: 180–365 days
    experiment: Productize scenario templates for delay, failure, derate, and debris-disposal obligations across the first two pilots.
    hypothesis: Repeatability can reduce deployment time enough to preserve software-like margins.
    successMetric: Second and third deployments launch in under 4 weeks each with less than 20% bespoke field creation.
    owner: Product lead
  - horizon: 180–365 days
    experiment: Expand one operator account to include a lender, insurer, or launch-partner seat on the same mission package.
    hypothesis: Multi-party usage is the fastest path to higher ACV and data moat formation.
    successMetric: At least one pilot expands to a second paying counterparty within 6 months.
    owner: Founding GTM
operations:
  - Maintain an auditable assumption registry linking technical inputs to commercial clauses and diligence outputs.
  - Use high-touch implementation with version-controlled scenario reviews until benchmark data supports more automation.
  - Build referral loops with aerospace counsel, insurers, and launch-partner business-development teams.
  - Track post-launch actuals and contract outcomes to feed the benchmarking dataset from day one.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Own the underwriting engine, scenario versioning, and data model that connects manifest inputs to contract outputs.
  - role: Founding GTM
    startTiming: Month 0
    rationale: Run founder-led selling into a tiny account universe where timing around financings and launch reservations matters more than top-of-funnel volume.
  - role: Aerospace underwriting lead
    startTiming: Month 3
    rationale: Translate launch, derate, and failure assumptions into credible scenarios that counterparties will trust.
  - role: Product and compliance engineer
    startTiming: Month 6
    rationale: Encode audit trails, clause templates, and regulatory mappings without turning the company into a manual services shop.
milestones:
  - horizon: 0–12 months
    items:
      - "Sign 2 paid operator pilots tied to live launch campaigns."
      - "Win first lender, insurer, or counsel workflow attached to an operator account."
      - "Reduce deployment time from manual prototype to under 4 weeks for the second repeatable implementation."
  - horizon: 12–24 months
    items:
      - "Reach 4 operator logos and 2 counterparty logos using the platform in recurring annual workflows."
      - "Launch benchmark datasets and reusable clause libraries from completed or active campaigns."
      - "Prove counterparty expansion raises ACV above standalone operator deployments."
  - horizon: 24–36 months
    items:
      - "Become the default commercial underwriting layer for a meaningful share of first-wave orbital compute and sovereign-storage launches."
      - "Expand into adjacent orbit-native infrastructure transactions only after the launch-to-compute workflow is repeatable."
      - "Demonstrate that realized delay and derate data materially improves win rate or diligence speed for later customers."
risks:
  - risk: The operator market may mature slower than expected, leaving too few near-term software buyers.
    likelihood: High
    impact: High
    mitigation: Prioritize accounts immediately after financing or launch reservations and expand the same workflow to lenders, insurers, and launch partners around each mission.
  - risk: Sparse historical benchmark data may force too much custom modeling in the first year.
    likelihood: High
    impact: High
    mitigation: Start with expert-guided pilots, tightly scoped scenario libraries, and explicit deployment-time targets that trigger a narrower product scope if missed.
  - risk: Adjacent mission-ops or engineering vendors may bundle enough commercial workflow to block a standalone entrant.
    likelihood: Medium
    impact: Medium
    mitigation: Stay focused on neutral counterparty underwriting and collect cross-party commercial outcome data those vendors do not naturally capture.
  - risk: Regulatory and liability complexity may lengthen close cycles and require heavier legal review than expected.
    likelihood: Medium
    impact: High
    mitigation: Build clause templates and audit trails alongside counsel and insurers so compliance obligations are encoded early instead of handled ad hoc per deal.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to close 2-3 paid pilots, hire the founding engineering and underwriting team, build the core manifest-to-revenue product, and prove at least one multi-counterparty deployment that validates software trust beyond the operator.
