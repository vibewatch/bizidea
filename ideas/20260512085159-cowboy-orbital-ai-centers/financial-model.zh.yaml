  downsideCase: 单个客户的混合年收入为 $300K
  baseCase: 单个客户的混合年收入为 $330K
  upsideCase: 单个客户的混合年收入为 $350K
  y3RevenueImpactK: -168.8
  cashImpactK: -220.0
- variable: CAC
  downsideCase: CAC 为 $120K，因为每单都更吃创始人和律师时间
  baseCase: CAC 为 $95K
  upsideCase: 通过伙伴转介绍把 CAC 降到 $75K
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
- variable: 流失率
  downsideCase: 月流失率 2.5%，因为试点没能转成常驻工作流
  baseCase: 月流失率 1.5%
  upsideCase: 月流失率 1.0%
  y3RevenueImpactK: -180.0
  cashImpactK: -210.0
- variable: 销售周期
  downsideCase: 运营商成交周期 9 个月
  baseCase: 运营商成交周期 6 个月
  upsideCase: 运营商成交周期 4 个月
  y3RevenueImpactK: -280.0
  cashImpactK: -320.0
- variable: 毛利率
  downsideCase: 稳态毛利率 65%，因为定制建模迟迟下不来
  baseCase: 稳态毛利率 70%
  upsideCase: 稳态毛利率 73%
  y3RevenueImpactK: 0.0
  cashImpactK: -93.0
- variable: 招聘节奏
  downsideCase: 即便收入失速，团队仍按计划招聘
  baseCase: 招聘节奏继续跟着试点转化和交易对手拉动来卡
  upsideCase: Y3 有 1 个招聘延后到扩张收入锁定后再启动
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> RecurringLogos
      RecurringLogos --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基础情景下，收入由 Y1 的 2 个付费试点驱动，并在 Y3 前转成 6 家经常性的运营商/交易对手客户，每家客户的混合年收入约 $330K。
- checkName: 必须成立的事
  finding: 公司必须在 Y2 就把交易对手扩张做进首批运营商账户，因为单看公开可见的运营商市场，根本撑不起当前招聘计划。
- checkName: 模型会在何处断裂
  finding: 如果围绕发射的销售周期拖到 9 个月，或毛利率卡在 65% 附近，下行情景会在下一轮融资前把现金打到负数。
- checkName: 下一轮融资证明点
  finding: 一个可信的 seed 故事，应该是到 Q4Y2 做到 5 家经常性客户，并证明至少有 1 个贷款方、保险方或法律顾问工作流愿意沿同一条承保轨道付费。
sanityChecks:
  ruleOf40: Y3 growth 66.7% + EBITDA margin -18.1% = 48.6%
  burnMultiple: Y2 的 burn multiple 约为 0.7x，Y3 约为 0.5x，因为净烧钱下降速度快于收入增速放缓。
  revenuePerFte: $265K Y3（7 FTE，对比垂直 SaaS 或软件服务型公司的约 $200K-$400K）
  flags:
  - 买方池太小，少掉或延后一家客户，融资计划都会被明显改写。
  - Y1 毛利率明显低于 70% 目标，因为早期部署仍是专家参与、实施占比高。
  - 基础情景假设：运营商部署后的 6-12 个月内，交易对手会转成付费用户；如果他们只免费拿导出结果，Y3 收入就被高估了。
