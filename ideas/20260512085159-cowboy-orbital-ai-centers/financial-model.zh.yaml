slug: orbital-capacity-revenue-os
date: '2026-05-12'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP 日期 2026-05-12；模型从次月启动]'
- id: A2
  name: 期初现金
  value: '2000'
  unit: USDK
  source: '[BP fundingAsk 为 $2-4M、跑道 18 个月；基础模型取低端值，假设一开始完成 $2.0M pre-seed]'
- id: A3
  name: 单个活跃客户的混合年收入
  value: '330'
  unit: USDK
  source: '[BP 定价 $120k-$300k，加实施费和 0.25%-0.75% 交易费；research 的 SOM 假设为 $280k-$340k 混合 ACV]'
- id: A4
  name: 首个付费试点时点
  value: M5
  unit: month
  source: '[BP experimentRoadmap 中，90-180 天把 1 个共创客户转成付费试点]'
- id: A5
  name: 第二个付费试点时点
  value: M10
  unit: month
  source: '[BP milestones 0-12 个月：签下 2 个付费运营商试点]'
- id: A6
  name: 客户扩张节奏
  value: Q1Y2 3 个客户，Q4Y2 5 个，Q2Y3 6 个
  unit: count
  source: '[BP milestones 12-24 个月：4 家运营商客户 + 2 家交易对手客户；基础情景按第 3 年做到 6 家经常性客户]'
- id: A7
  name: 收入确认方法
  value: 收入 = 期间内活跃客户平均数 x A3 年 ARPU，再按月或季度折算
  unit: formula
  source: '[创业财务经验规则：客户若在期中签下，首期只贡献半个期间的收入]'
- id: A8
  name: Y1 毛利率爬坡
  value: 55%-65%
  unit: percent
  source: '[BP 目标毛利率 70%，且 operatingAssumptions 说明早期部署仍以专家参与式实施为主]'
- id: A9
  name: 稳态毛利率
  value: 70%-71%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 为 70]'
- id: A10
  name: 工程团队总包薪酬
  value: '190'
  unit: USDK per FTE per year
  source: '[BP team 需要创始工程师和产品/合规工程师；按资深技术人才含福利与税费的创业公司经验值估算]'
- id: A11
  name: GTM 团队总包薪酬
  value: '210'
  unit: USDK per FTE per year
  source: '[BP team 需要创始 GTM，且销售由创始人主导；按基础设施领域资深 GTM 的创业公司经验值估算]'
- id: A12
  name: 承保岗位总包薪酬
  value: '220'
  unit: USDK per FTE per year
  source: '[BP team 需要航天承保负责人；按高度专业化岗位的创业公司经验值估算]'
- id: A13
  name: G&A / 客户成功总包薪酬
  value: '150'
  unit: USDK per FTE per year
  source: '[早期企业软件公司里，精简运营/客户成功支持岗位的创业公司经验值]'
- id: A14
  name: 招聘爬坡
  value: 2, 3, 4, 4, 6, 7 FTE across q1y1 to q4y3
  unit: FTE
  source: '[BP team 的入场时点与先后顺序；招聘按小而集中的市场节奏卡着走]'
- id: A15
  name: 非薪资运营支出
  value: $9K-$17K per month in Y1, then $53K-$75K per quarter in Y2-Y3
  unit: USDK
  source: '[依据运营、监管复杂度、律师协调、差旅、软件和高合规工作流的经验估算]'
- id: A16
  name: 客户获取成本
  value: '95'
  unit: USDK per customer
  source: '[创业财务经验规则：极小众市场里的创始人主导企业销售，CAC 约为首年 ACV 的 25%-35%]'
- id: A17
  name: 月流失率
  value: '1.5'
  unit: percent
  source: '[针对高客单价、按年签约且客户集中度中等的企业工作流，采用创业财务经验值]'
- id: A18
  name: 现金转化假设
  value: EBITDA 近似代表现金变动
  unit: policy
  source: '[创业财务经验规则：不建模债务、CAPEX、税务或营运资金波动时，EBITDA 近似代表现金变动]'
- id: A19
  name: 融资需求规模
  value: '2.0'
  unit: USDM
  source: '[按模型中的烧钱节奏推到 Q4Y2 的下一轮融资证明点，再加 6 个月 buffer，四舍五入到 BP targetFundingRangeUsd 的低端]'
