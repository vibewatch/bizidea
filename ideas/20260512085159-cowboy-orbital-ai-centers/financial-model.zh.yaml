scenarios:
  downside:
    description: 运营商试点晚了两个季度，交易对手付费扩张也往后拖，因此公司到 Y3 结束时只有 4 家经常性客户，毛利也更弱。
    y3RevenueK: 1320.0
    y3EbitdaK: -780.0
    cashLowPointK: -280.0
    keyAssumptionChanges:
    - 首个付费试点从 M5 推迟到 M7。
    - 第二个付费试点从 M10 推迟到 M12。
    - Y3 混合年 ARPU 从 $330K 降到 $300K。
    - 稳态毛利率最高只到 65%。
  base:
    description: Y1 落下两个试点，后续扩张按 business-plan 里程碑推进，公司在 Q2Y3 做到 6 家经常性客户，并接近目标毛利率。
    y3RevenueK: 1856.3
    y3EbitdaK: -336.0
    cashLowPointK: 423.8
    keyAssumptionChanges:
    - 首个付费试点在 M5 签下，第二个在 M10。
    - 到 Q4Y2 有 5 家经常性客户处于活跃状态。
    - 混合年 ARPU 稳定在 $330K。
    - 毛利率从实施占比较高的 Y1，爬升到 Y3 的 70%-71%。
  upside:
    description: 试点提前一个季度签下，交易对手转化更快，公司做到 7 家经常性客户，定价还有小幅上行。
    y3RevenueK: 2360.0
    y3EbitdaK: 40.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - 首个付费试点在 M4 签下，第二个在 M8。
    - 到 Q4Y3 再新增第 7 家客户。
    - 混合年 ARPU 提升到 $350K。
    - 随着实施更快标准化，毛利率升到 73%。
sensitivity:
