differentiator: >-
  This is not mission-ops software for satellite teams or generic CPQ for cloud vendors. It is built for a new asset class
  where every rocket manifest is simultaneously a hardware deployment plan, a financing instrument, and a compute product.
  The defensible data advantage comes from accumulating real launch-delay, derating, and contract-performance data across
  orbit-native infrastructure deals that incumbent cloud software and aerospace CAD tools do not capture.
