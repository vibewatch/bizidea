problem: >-
  Orbital-compute startups are learning that GPUs are not their first commercial constraint; launch slots, mission yield,
  and upper-stage conversion assumptions are. Finance and sales teams still model these programs in spreadsheets, so they
  cannot quote reliable SLAs, structure prepayments, or prove to lenders and anchor customers that a reserved launch turns
  into usable compute on a predictable date. One delayed vehicle or derated mission can break both the revenue forecast and
  the next financing round.
targetUser:
  primary: CFO, COO, or Head of Commercial at an orbital-compute startup booking its first 3-10 launches
  secondary: Infrastructure investors and launch-finance teams evaluating orbit-native compute programs
  buyer: CFO or COO at an orbital-compute developer
startupThesis:
  nonObviousInsight: >-
    The scarce asset is not orbital GPU hardware; it is bankable launch-converted compute capacity. Once each upper stage
    becomes a 1-megawatt data center, the winning control point is the underwriting layer that translates rocket manifests,
    orbital assumptions, and failure modes into sellable contracts and financeable revenue.
  beachhead: >-
    Capacity underwriting and contract-packaging workflow for US and European orbital-compute startups converting their
    first reserved launch manifests into prepaid compute contracts and lender decks
  wedge: >-
    Launch-backed capacity underwriting workspace that models mission-by-mission usable compute, delay scenarios, derates,
    SLA tiers, and financing waterfalls
  whyNowCatalyst: >-
    Cowboy Space's $275 million raise, 1-megawatt upper-stage design, and NVIDIA collaboration show orbital compute is
    moving from sci-fi concept to capitalized program, making bankable commercial packaging newly urgent.
  ventureScalePath: >-
    Start with orbital-compute operators, then expand the same underwriting rail to launch providers, insurers, lenders,
    and adjacent orbit-native assets such as Earth-observation constellations, in-space manufacturing, and power
    infrastructure.
solution: >-
  The product ingests launch manifests, vehicle specs, orbital profile, payload architecture, and derating assumptions to
  produce a mission-by-mission usable-capacity curve. It converts that curve into customer-facing contract packages with
  reserved compute blocks, delay clauses, performance bands, and prepayment schedules. A financing module creates investor
  and insurer data rooms with downside cases tied to launch delay, mission failure, and capacity loss. Over time, the
  platform becomes the shared system of record for operators, capital providers, and anchor customers negotiating how
  launch-backed compute should be priced and sold.
goToMarketSeed:
  firstCustomer: >-
    US-based orbital-compute startup with a fresh Series B, 1-3 launch reservations, and pressure to pre-sell capacity to
    one anchor government or frontier-AI customer
  buyingTrigger: >-
    After fundraising or a launch-reservation deal, the company needs a board-grade revenue model and customer-ready SLA
    before the next financing or enterprise sales cycle
  currentAlternative: Excel models plus aerospace consultants and ad hoc legal-finance workstreams
  switchingReason: >-
    It links launch physics, compute derates, and commercial terms in one repeatable model, replacing weeks of custom
    spreadsheet work with pricing and contract packages a customer or lender can actually sign.
  pricingHypothesis: "$120k-$300k annual platform fee plus implementation and 0.25%-0.75% of signed prepaid capacity value"
