topRisks:
  - name: Market timing
    description: Orbital-compute deployments may commercialize slower than expected, leaving too few near-term software buyers.
    mitigation: Start with operator teams already fundraising or pre-selling capacity, then extend the same product to investors, insurers, and adjacent orbit-native asset classes.
  - name: Sparse benchmarking data
    description: There are too few historical orbital-compute missions to fully automate underwriting on day one.
    mitigation: Launch with expert-guided implementations and structured data partnerships with launch providers, insurers, and early operators.
  - name: Customer concentration
    description: A small number of well-funded startups could dominate early demand and create lumpy revenue.
    mitigation: Sell into the broader transaction around each mission by serving capital providers, launch partners, and anchor customers in addition to operators.
