openQuestions:
- How many first-wave operators will actually pre-sell capacity before launch versus wait for an on-orbit proof point?
- Which insurers, lenders, or anchor customers will trust software-generated downside cases enough to shorten diligence?
- Can a neutral underwriting rail accumulate benchmark data fast enough before the operator set consolidates?
- If heavy-lift normalization slips beyond 2028-2029, does the category stay big enough to support a standalone vendor?
