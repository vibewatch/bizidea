  validationPlan:
  - priority: high
    question: Will CFO/COO buyers pay for a standalone underwriting rail before they have recurring launch volume?
    evidenceToGather: Interview 5-10 recently funded orbital-compute or sovereign-storage operators and map who owns the launch-to-revenue model today.
  - priority: high
    question: Which counterparties will trust software-generated assumptions in a lender or insurance review?
    evidenceToGather: Run mock diligence reviews with one insurer, one lender, and one space-law advisor using a sample mission package.
  - priority: medium
    question: Can the product ingest enough mission and derating detail without deep custom services each time?
    evidenceToGather: Prototype data import with one operator using a real manifest, a real payload architecture, and two downside scenarios.
