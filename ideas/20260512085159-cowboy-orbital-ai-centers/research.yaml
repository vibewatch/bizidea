reportMemo:
  executiveTakeaways:
  - The strongest initial wedge is not running compute in orbit; it is making launch-backed capacity legible to customers, lenders, and insurers.
  - Near-term demand appears real but highly concentrated in a first wave of operators, so account selection matters more than broad-market GTM.
  - Adjacent incumbents already sell mission, engineering, or platform software, but none appears optimized for neutral commercial underwriting across counterparties.
  - Market timing is the biggest risk because launch cadence, hardware derates, and regulatory assumptions can still move faster than software sales cycles.
  marketDefinition: Software and data services that translate launch manifests, orbital design, derating assumptions, and compliance requirements into sellable compute-capacity contracts and financeable diligence packages for orbit-native infrastructure.
  customerAndBuyer: Primary buyer is the CFO/COO or head of commercial at an orbital-compute or sovereign-storage operator preparing its first revenue-bearing launches; adjacent economic buyers include launch-finance teams, insurers, and lenders that must underwrite the same mission assumptions.
  buyingTriggers:
  - point: After fundraising or first launch reservations, management needs a board-, lender-, and customer-ready capacity model before pre-selling compute blocks.
    sourceRefs:
    - 1
    - 3
    - 10
    - 11
  - point: When a prototype becomes an operational node, operators need sovereignty, latency, and downlink-reduction claims turned into concrete SLAs and performance bands.
    sourceRefs:
    - 4
    - 5
    - 6
    - 8
  - point: Launch licensing, financial-responsibility, and debris-disposal obligations force mission assumptions to become auditable commercial representations instead of spreadsheet folklore.
    sourceRefs:
    - 18
    - 19
    - 30
    - 31
  willingnessToPay:
    summary: This is not discretionary analytics spend. Buyers are already absorbing legal, insurance, mission-software, and bespoke modeling costs around the same launch campaign, so a product that shortens diligence or protects a reserved launch window should support enterprise ACVs; proof still requires direct discovery with 5-10 CFO/COO teams.
    sourceRefs:
    - 5
    - 16
    - 17
    - 20
    - 21
    - 22
    - 23
  competitiveLandscape: The market is adjacent rather than direct. Mission-ops suites, digital-engineering platforms, and vertically integrated orbital-cloud operators can absorb pieces of the workflow, but none of the fetched offerings is purpose-built to serve as a neutral launch-to-revenue underwriting rail shared across operator, lender, insurer, and anchor-customer negotiations.
  incumbentThesis:
  - incumbentClass: Cloud platforms
    point: Terrestrial cloud vendors can supply ground compute and tooling, but they do not convert launch manifests and orbital failure modes into orbital-capacity SLAs or lender packages.
    sourceRefs:
    - 4
    - 5
    - 9
  - incumbentClass: Mission ops suites
    point: Mission-operations vendors already manage telemetry, planning, and autonomy, but their products stop short of commercial underwriting and counterparty-facing contract logic.
    sourceRefs:
    - 20
    - 21
    - 22
    - 24
  - incumbentClass: Digital engineering tools
    point: Engineering-traceability tools can host requirements and calculations, but they are engineering-first systems rather than commercial systems of record.
    sourceRefs:
    - 23
  - incumbentClass: Vertical ODC operators
    point: Integrated orbital-data-center operators can internalize their own underwriting stack, but they are not neutral market rails for other operators or capital providers.
    sourceRefs:
    - 5
    - 8
    - 10
    - 11
  regulatoryLandscape: Commercial packaging will have to mirror launch authorization, debris-disposal, and financial-responsibility assumptions closely enough that counsel, insurers, and customers can see where technical, legal, and commercial commitments diverge.
  technologyLandscape: Near-term product design should assume heterogeneous launch vehicles, sparse benchmark data, and moving hardware assumptions. The software value is in decision traceability and scenario packaging, not pretending the underlying physics have stabilized.
  distributionChannels:
  - point: Founder-led sales into newly funded operators immediately after a financing event or launch reservation is the clearest first wedge.
    sourceRefs:
    - 1
    - 3
    - 10
    - 11
  - point: Co-selling through launch and mission-software partners can open the operations team while preserving a commercial/finance-specific wedge.
    sourceRefs:
    - 20
    - 21
    - 22
    - 24
    - 25
  - point: Insurance brokers, aerospace counsel, and financing advisors are natural referral channels because they already review liability, debris, and financial-responsibility assumptions.
    sourceRefs:
    - 16
