  sensitivityCases:
  - case: Starship and heavy-lift normalization slip right
    impact: The product still has value, but near-term ROI shifts from large-scale revenue optimization to tranche planning, scenario management, and customer expectation-setting for smaller launches.
    sourceRefs:
