competitors:
- name: Axiom Space ODC stack
  stage: 在位企业
  wedge: 垂直一体化的轨道云平台，绑着真实节点、主权叙事和国家安全场景。
  pricing: 定制 / 未公开
  strength: 平台动作已经落地，生态合作也足够可信。
  weaknessVsUs: 这是运营商自有栈，不是给多家运营商和资金提供方共用的中立承保轨道。
  sourceRefs:
  - 4
  - 5
  - 6
- name: Rocket Lab InterMission / MAX Constellation
  stage: 成长期
  wedge: 任务运营、遥测、自主运行和星座管理软件。
  pricing: 定制 / 未公开
  strength: 有飞行履历，也能深度接入高要求太空项目。
  weaknessVsUs: 它擅长运营航天器，不擅长把由发射背书的收入、SLA 和贷款方可接受的下行情景打包出来。
  sourceRefs:
  - 20
  - 24
- name: Slingshot Aerospace
  stage: 成长期
  wedge: 太空运营情报、感知融合与决策支持。
  pricing: 定制 / 未公开
  strength: 在商业和国防运营商里，运营情报与自主运行定位都很强。
  weaknessVsUs: 它关注的是如何运营任务环境，而不是如何把其中的算力产能卖成可融资资产。
  sourceRefs:
  - 21
- name: Terma PLAN
  stage: 在位企业
  wedge: 面向多编队的飞行任务规划与排班优化。
  pricing: 定制 / 未公开
  strength: 能处理任务级别的复杂资源分配和运营规划。
  weaknessVsUs: 它停在计划和排班层，不会把这些假设继续翻成商业合同和融资材料。
  sourceRefs:
  - 22
- name: Valispace
  stage: 成长期
  wedge: 工程需求、计算和验证可追溯平台。
  pricing: 定制 / 未公开
  strength: 很适合结构化工程数据和跨团队追溯。
  weaknessVsUs: 这首先是工程系统，天然不解决面向客户的定价、延期条款或贷款方承保。
  sourceRefs:
  - 23
regulatoryTechnicalConstraints:
- point: FAA 的发射与再入授权要和财务责任义务一起看，所以商业打包里必须把事故和延期情景的假设做成可追溯版本。
  sourceRefs:
  - 17
  - 30
- point: 碎片与处置规则正在收紧，FCC 指引和 5 年离轨规则都会抬高把任务结束假设写进任务经济模型的必要性。
  sourceRefs:
  - 18
  - 19
  - 31
- point: 热排放、辐射缓释和光链路性能，依旧决定一套已发射平台到底能卖出多少算力。
  sourceRefs:
  - 7
  - 9
  - 12
  - 13
validationSignals:
- point: Cowboy 的 $275M 融资和它对“发射稀缺”的明确表述，说明投资人已经把“发射转化后的算力产能”看成真实约束。
  sourceRefs:
  - 1
  - 2
  - 3
- point: Starcloud 从演示发射很快走到独角兽融资，说明即便还没全规模部署，资本也愿意为轨道算力赢家下注。
  sourceRefs:
  - 10
  - 11
- point: Axiom 和 ISS 的试点说明，客户和合作方今天就愿意为实用型在轨处理演示付钱，而不是只等未来的超级星座。
  sourceRefs:
  - 5
  - 6
- point: Lonestar 已经在接受主权离地存储的容量预订，这意味着客户会在规模成熟前就先锁定轨道产能。
  sourceRefs:
  - 8
- point: 面向任务的软件已经在同一批运营商里被产品化并卖出去，这说明围绕太空运营的企业软件预算确实存在。
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
openQuestions:
- 第一波运营商里，究竟有多少家会在发射前预售产能，而不是等在轨验证后再卖？
- 哪些保险方、贷款方或锚定客户，会相信软件生成的下行情景，信到愿意缩短尽调？
- 在运营商阵营收缩前，一条中立承保轨道能不能足够快地攒起基准数据？
- 如果重型发射常态化要拖到 2028-2029 之后，这个赛道还够不够大，能撑起一家独立厂商？
