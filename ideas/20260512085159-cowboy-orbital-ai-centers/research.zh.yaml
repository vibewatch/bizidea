      - 21
      - 22
      - 23
  pestle:
  - factor: 政治
    impact: negative
    point: 国家安全需求正在吸走本就稀缺的重型发射产能，商业项目排期可能因此被挤压。
    sourceRefs:
    - 14
    - 15
  - factor: 经济
    impact: positive
    point: 太空经济商业化正在扩大围绕发射、软件和原生轨道基础设施的民间支出底盘。
    sourceRefs:
    - 26
    - 27
    - 29
  - factor: 社会
    impact: positive
    point: 数据主权和韧性叙事，正在逐步变成离地基础设施对客户的价值主张之一。
    sourceRefs:
    - 4
    - 8
  - factor: 技术
    impact: positive
    point: Axiom、ISS、NVIDIA 和 Starcloud 的进展说明，支撑这一赛道的技术栈正在从概念走向验证样机。
    sourceRefs:
    - 5
    - 6
    - 9
    - 10
  - factor: 法律
    impact: negative
    point: 碎片、处置和财务责任要求既抬高了可追溯假设的价值，也让商业打包变慢。
    sourceRefs:
    - 18
    - 19
    - 30
    - 31
  - factor: 环境
    impact: neutral
    point: 轨道数据中心可以借“缓解地面电力和水资源约束”的叙事加分，但碎片外部性依然是真摩擦。
    sourceRefs:
    - 12
    - 18
    - 31
  adoptionFrictionMatrix:
  - friction: 发射转算力的基准数据太少
    severity: 高
    affectedBuyer: CFO / 保险方
    mitigation: 先做专家参与式实施，再把每次已完成的发射项目沉淀成情景库。
    sourceRefs:
    - 1
    - 7
    - 16
    - 17
  - friction: 任务运营、财务、法务和销售跨部门共管
    severity: 高
    affectedBuyer: COO
    mitigation: 把产品定位成共享底账系统，而不是又一个运营仪表盘，并为不同角色产出各自需要的结果。
    sourceRefs:
    - 5
    - 20
    - 21
    - 22
  - friction: 第一波买方池又小又是事件驱动
    severity: 高
    affectedBuyer: CEO / CFO
    mitigation: 别只卖给运营商，要围绕同一笔交易，顺手卖给贷款方、保险方和发射伙伴。
    sourceRefs:
    - 5
    - 8
    - 10
    - 11
    - 16
  - friction: 发射、碎片和责任审查的监管要求并不统一
    severity: 中
    affectedBuyer: 总法律顾问 / COO
    mitigation: 按任务类型把 FAA 和 FCC 义务映射进条款模板和审计链里。
    sourceRefs:
    - 18
    - 19
    - 30
    - 31
