slug: orbital-capacity-revenue-os
date: '2026-05-12'
executiveSummary: 轨道产能收入 OS 卖的是一条很窄、但很急的工作流：把已预订的发射翻成能融资、也能拿给客户签字的算力产能。第一位客户会是一家刚融到资的美国轨道算力运营商，手里有 1–3 个已预订发射，还得赶在下一次融资节点前，把产能先卖给一个政府锚定买家或前沿 AI 客户。产品起步不是大而全平台，而是一个共享承保工作台，把清单数据、降额假设、SLA 区间、预付款条款和下行情景装进同一个可审计模型里。研究对时点的支持很强：发射稀缺、碎片和责任监管收紧，以及 Cowboy 和 Starcloud 的新融资，都在把“董事会级商业打包”这件事突然变得紧迫。滩头市场故意收得很窄，因为可见买方本来就集中；初始 SAM 也只有大约 $6.0M，对应约 24 个美国和欧洲账户。若第 3 年能拿下少数几家运营商和交易对手账户，可触达 SOM 约为 $2.0M。所以这更像一个“控制点”故事，不是短期市场规模故事。核心经营风险在于：运营商可能会等到有更多在轨验证后，才愿意预售产能；那样一来，公司就得更早转向贷款方、保险方和发射伙伴工作流。公开证据里，真正证明保险或贷款尽调会信任软件输出的材料仍然不厚，所以前 12 个月要验证的不只是“有人用”，而是平台能推动真实签约和真实商业决策。
problem:
- 运营商还在用电子表格和服务团队管理“发射到收入”的假设，所以他们没法从第一批发射清单里直接报出可靠的算力 SLA、延期条款或预付款排期。
- 只要一次发射延期、任务降额，或合规假设改动，收入预测、贷款材料和锚定客户谈判就会一起被打乱。
solution:
- 一个由发射背书的承保工作台，吃进发射清单、火箭参数、轨道剖面、载荷架构和降额假设，拉出逐任务的可用产能曲线。
- 同一套模型还能直接产出对手方可用的结果：SLA 区间、预留产能合同包、给贷款方和保险方的下行情景，以及财务与法务团队能追责的假设链。
whyWeWin:
- 这条切口比任务运营工具或工程工具都更窄：它盯的是相邻平台现在还没产品化的商业承保层。
- 只要早期交易跑起来，公司就会滚出一套专有数据，覆盖延期、降额、条款结果和真实履约表现，而且横跨多类交易对手。
strategicChoices:
  beachhead: 以美国为主的轨道算力和主权存储运营商——正准备做第一批 1–3 次带收入属性的发射，并且必须在部署前预售或融资产能。
  wedgeRationale: 这块滩头市场的购买触发最清晰：融资、发射预订和锚定客户尽调都发生在重复性任务运营成熟之前，所以一款商业承保工具比一整套更宽的航天软件，更容易先把电子表格替掉。
  sequencingRationale: 公司应该先证明：一套共享的“发射到收入”模型，能给运营商财务团队真正用起来；然后再沿着同一数据模型，加上贷款方和保险方输出；等到真的有基准数据和参考交易之后，再往更广的任务分析或相邻原生轨道资产类别扩。
  notYet:
  - 完整的任务遥测、自主运行或星座管理软件
  - 服务地面云或卫星软件市场的通用 CPQ
  - 在“发射到算力”工作流还没跑顺前，就扩到地球观测、在轨制造或能源基础设施
market:
  tam: 估算 TAM 为 $14.0M：来自约 55 个全球可见的第一波运营商、资本方、保险方和发射交易对手账户，每个账户约 $255k 的混合年度工作流预算。
  sam: 估算 SAM 为 $6.0M：来自约 24 个美国和欧洲滩头账户，它们最接近已融资轨道算力、主权存储和发射融资工作流。
  som: 估算第 3 年 SOM 为 $2.0M：假设拿下 4 家运营商客户，再加 2 个伙伴或资本账户，混合 ACV 约 $280k-$340k，并含服务收入。
  segments:
  - 正在把首批发射商业化的轨道算力与主权存储运营商
  - 为同一批任务做承保的贷款方、保险方和发射融资交易对手
  buyingProcess: 销售通常从融资后或拿到发射名额后的创始人/CFO 级触发开始，然后扩展到 COO、法务和商业团队，因为同一套假设必须经得住客户、贷款方和保险方的尽调。交易大概率先以一场发射项目为单位，高触达实施落地；如果这套模型最后变成常驻底账系统，再转成年费订阅。
product:
  mvp: MVP 是围绕 1 家运营商、1 个发射项目展开的逐任务承保工作台，包含清单导入、可用产能情景、SLA 区间生成、预付款逻辑，以及可导出的贷款方/保险方下行情景。第一优先级不是自动化得多广，而是能审计、能跨部门追溯。
  sixMonth: 做出一个生产级试点，支撑一家运营商的真实发射项目：带情景版本管理、延期与降额条款模板，以及面向财务、法务和销售的分角色输出。
  twelveMonth: 给贷款方和保险方补上可复用的数据室工作流，把早期发射项目沉淀成基准情景库，再接入发射服务商和法律顾问输入。
  twentyFourMonth: 沿着同一条承保轨道扩成多方网络产品，加入跨账户基准、续约工作流，以及面向主权存储和其他原生轨道基础设施交易的相邻支持。
  keyBets:
  - 即便重复发射频次还没起来，买方也愿意付费，因为模型做错的代价比软件费高得多。
  - 一套共享商业模型，比一堆拼起来的表格和服务，更能把财务、法务、销售和任务团队对齐。
  - 早期交易数据形成壁垒的速度，会快过相邻任务运营厂商把中立承保做成产品的速度。
gtm:
  wedge: 第一单就当成“发射项目承保系统”来卖：卖给一家刚融到资、必须在一个融资周期内交出董事会级模型和锚定客户合同包的新运营商。
  channels:
  - 创始人主导直销，打最近融到资的轨道算力和主权存储运营商
  - 来自航天律师、保险方和项目融资顾问的转介绍——这些人本来就在审发射假设
  - 与发射和任务软件伙伴联卖，由他们打开运营商账户，公司自己守住商业财务切口
  funnelTargets: 线索→合格共创客户 25%+；合格共创客户→付费试点 50%+；试点→年度平台转化 60%+；首个试点完成后，50%+ 账户能在 6 个月内扩到第二个交易对手。
  pricing: $120k-$300k 年平台费，外加实施费，以及已签预付产能金额的 0.25%-0.75% 抽成；这和研究判断一致：买方本来就在同一轮发射项目里承担不低的法务、保险和定制建模成本。
businessModel:
  revenueStreams:
  - 面向“发射到收入”承保工作流的年度订阅
  - 模型搭建、数据导入和条款配置的实施费
  - 预付或融资产能合同的交易挂钩抽成
  unitOfValue: 通过平台完成建模、签约或融资的“由发射背书的算力产能金额”。
  targetGrossMarginPct: 70
  expansionLevers:
  - 围绕同一份任务包，加卖贷款方和保险方席位
  - 销售从已完成项目沉淀出来的基准数据集和条款库
  - 把承保轨道延伸到主权存储和其他原生轨道基础设施交易
strategyMap:
  northStarMetric: 通过平台承保的“由发射背书的产能”年化金额。
  inputMetrics:
  - 正在建模的活跃发射项目数
  - 从接收清单到产出贷款方可用下行包所需时间
  - 单个客户被平台影响到的预付产能金额
  - 试点转年度合同的转化率
  - 每个运营商账户的交易对手扩张率
  moatsToBuild:
  - 围绕清单变更、发射延期、降额和真实商业结果的专有数据集
  - 把技术假设和责任、碎片、处置义务绑在一起的可复用条款库
  - 嵌进运营商、贷款方、保险方和法律顾问评审闭环的多方工作流
  killCriteria:
  - 12 个月内拿不到 2 个以上付费试点，或没有任何已签的发射项目部署
  - 一个发射周期后，试点用户转成年合同的比例低于 50%
  - 到第 15 个月，仍没有任何贷款方、保险方或法律顾问伙伴愿意在真实尽调里使用导出的下行情景包
  - 买方访谈显示，大多数第一波运营商在获得在轨验证前都不会预售或融资产能
  mermaid: |
    flowchart LR
      Wedge[Launch campaign underwriting wedge] --> MVP[Shared manifest to revenue model]
      MVP --> Proof[Signed pilots and lender or insurer use in live diligence]
      Proof --> Expansion[Counterparty seats and adjacent orbit-native infrastructure workflows]
investorMemo:
  verdict:
    call: 观察
    conviction: 这是一个切进真实痛点的控制点命题，但买方池和时点证据都还太薄，不足以高确信度下判断。
    whyBelieve: 发射稀缺、轨道数据中心新融资和合规复杂度一起造出了一条很具体的商业工作流，而相邻工具还没人真正占住。
    whyDoubt: 可见 SAM 小且集中，而且运营商、贷款方或保险方会不会在更多在轨验证出现前就信任软件生成的假设，仍没被证明。
    nextDiligence: 先验证：至少两家新近融资的运营商，外加一家保险方或贷款方，愿不愿在真实发射尽调里使用同一份平台生成的材料。
  firstCustomer:
    title: 刚融到资的美国轨道算力运营商 CFO 或 COO
    profile: Series A 或 B 的太空基础设施公司，手握 1–3 个已预订发射，正在追一个锚定客户，但内部还没有“由发射背书的收入打包”底账系统。
    trigger: 融资完成或发射预订协议落地后，公司会立刻承受压力：必须在下一次商业里程碑前，拿出董事会能看、客户也能签的收入情景和 SLA 区间。
    buyer: CFO 或 COO
    initialContract: 围绕 1 个发射项目的付费试点 + 实施，合同额约 $150k-$250k；等这套流程变成常驻承保系统后，转成 $180k-$300k 年订阅，再加交易抽成。
  mustBeTrue:
  - 未来 24 个月里，至少有 5–10 个滩头账户会积极管理“首发射商业打包”。
  - 在重复发射节奏还没建立前，CFO 或 COO 买方就愿意把电子表格和顾问流程换成付费共享系统。
  - 贷款方、保险方或法律顾问会把平台生成的下行情景，接受为真实尽调输入。
  - 早期客户愿意让公司保留匿名化的延期、降额和合同结果基准数据。
  - 相邻任务运营和工程厂商来不及把中立承保捆进现有产品栈。
  diligenceQuestions:
  - 第一波运营商里，真正会在拿到在轨验证前就预售或融资产能的有谁？
  - 目标账户里，今天到底是谁在维护“发射到收入”模型？这套东西多常出错？
  - 要让保险方或贷款方相信平台输出，而不是只信定制服务，还缺什么证据？
  - 每次部署到底需要多少定制航天建模，才会把毛利打穿？
  - 如果运营商阵营最后只剩几个赢家，公司还能不能成为中立市场轨道？
operatingAssumptions:
- assumption: 第一类可复用买方会是手握 1–3 个发射名额的运营商 CFO 或 COO，而不是任务运营团队。
  basis: idea.yaml
  validationTest: 完成 10 通 discovery call，确认至少 7 个案例里，预算和紧迫性都掌握在财务或商业负责人手里。
  decisionImpact: 如果不成立，就把产品定位和销售动作改到运营主导工具，或先转向保险方/贷款方工作流。
- assumption: 买方愿意接受企业级 ACV，因为平台替掉的是同一轮发射项目中的表格、律师协调、保险审查和定制建模。
  basis: research.yaml
  validationTest: 拿下 2 个付费试点，每个合同总额都在 $150k 以上，且不靠降价到低于实施成本回收。
  decisionImpact: 如果不成立，就收窄产品范围，先拿掉交易抽成定价，转成更小、更服务化的方案。
- assumption: 运营商之外的交易对手会在同一套数据模型上协作，从而带来账户扩张，而不只是单座位运营商软件。
  basis: research.yaml
  validationTest: 在每个试点里，至少拉进 1 个贷款方、保险方、发射伙伴或法律顾问参与评审导出结果。
  decisionImpact: 如果不成立，公司就会退化成一个很窄的运营商工具，护城河和长期 ACV 上限都会变弱。
- assumption: 早期可以先靠专家参与式实施和情景库，去弥补基准数据稀缺。
  basis: 运营判断
  validationTest: 把前两个试点都控制在 6 周以内完成定制建模，同时客户仍接受产出的情景。
  decisionImpact: 如果不成立，招聘和毛利假设都会断裂，公司会更像咨询业务而不是软件公司。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 对 10 位轨道算力和主权存储方向的 CFO、COO 与商业负责人做结构化访谈。
  hypothesis: 真正着火的痛点不是通用任务分析，而是能拿给董事会和交易对手直接用的商业打包。
  successMetric: 10 位受访者里，至少 7 位把“发射到收入承保”列进短期前三工作流，并且手头有活跃发射项目。
  owner: CEO
- horizon: 0–90 天
  experiment: 给一个样本任务包做手工原型，覆盖清单、降额、SLA 区间和下行瀑布输出。
  hypothesis: 一套共享模型和导出包，能替掉首发射尽调里的“表格 + 顾问”工作流。
  successMetric: 两个共创客户都认可这份材料，认为它已经足够可信，能放进真实客户、董事会或融资评审里。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 把一个共创客户转成与真实发射预订或融资事件绑定的付费试点。
  hypothesis: 只要产品能缩短尽调时间、减少合同返工，买方愿意在发射前先付费。
  successMetric: 签下并部署 1 份超过 $150k 的付费合同，绑定真实发射项目。
  owner: CEO
- horizon: 90–180 天
  experiment: 拿试点产出，和 1 家保险方、1 家贷款方、1 家航天法律顾问做模拟尽调。
  hypothesis: 只要假设可追溯、条款逻辑明确，交易对手就会信任结构化下行情景。
  successMetric: 至少 2 个交易对手同意在真实尽调中直接使用或改造这些输出。
  owner: 航天承保负责人
- horizon: 180–365 天
  experiment: 把前两个试点里的延期、失败、降额和碎片处置义务沉淀成产品化情景模板。
  hypothesis: 只要可复用程度上来，部署时间就能压到足以保住软件型毛利。
  successMetric: 第二和第三次部署都能在 4 周内完成，且新增定制字段占比低于 20%。
  owner: 产品负责人
- horizon: 180–365 天
  experiment: 把 1 个运营商账户扩到同一份任务包上的贷款方、保险方或发射伙伴席位。
  hypothesis: 多方协作是最快拉高 ACV、也最快形成数据护城河的路径。
  successMetric: 至少 1 个试点能在 6 个月内扩出第二个付费交易对手。
  owner: 创始 GTM
operations:
- 维护一套可审计的假设登记表，把技术输入一路连到商业条款和尽调输出。
- 在基准数据积累到足够自动化之前，坚持高触达实施和带版本控制的情景复盘。
- 和航天律师、保险方及发射伙伴 BD 团队建立稳定的转介绍闭环。
- 从第一天起就追踪发射后的真实结果和合同结果，把它们喂回基准数据集。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责承保引擎、情景版本管理，以及把清单输入连到合同输出的数据模型。
- role: 创始 GTM
  startTiming: 第 0 个月
  rationale: 在一个极小的账户池里，围绕融资和发射预订时点做创始人主导销售；这比拼上游漏斗量更重要。
- role: 航天承保负责人
  startTiming: 第 3 个月
  rationale: 把发射、降额和失败假设翻成交易对手愿意信的情景。
- role: 产品与合规工程师
  startTiming: 第 6 个月
  rationale: 把审计链、条款模板和监管映射固化进产品里，同时避免公司滑向纯人工服务。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2 个与真实发射项目绑定的付费运营商试点。
  - 拿下首个挂在运营商账户上的贷款方、保险方或法律顾问工作流。
  - 把部署时间从手工原型压到第二次可复用实施少于 4 周。
- horizon: 12–24 个月
  items:
  - 做到 4 家运营商客户和 2 家交易对手客户，在平台上跑经常性的年度工作流。
  - 基于已完成或进行中的项目，发布基准数据集和可复用条款库。
  - 证明交易对手扩张能把 ACV 拉到高于单纯运营商部署。
- horizon: 24–36 个月
  items:
  - 在第一波轨道算力和主权存储发射里，成为有意义份额的默认商业承保层。
  - 只有在“发射到算力”工作流真正可复用之后，才扩到相邻的原生轨道基础设施交易。
  - 证明真实延期和降额数据，能实质提升后续客户的赢单率或尽调速度。
risks:
- risk: 运营商市场成熟得可能比预期慢，短期愿意买软件的客户会太少。
  likelihood: High
  impact: High
  mitigation: 优先在融资完成或发射预订刚落地时切账户，再把同一套工作流扩给每次任务周边的贷款方、保险方和发射伙伴。
- risk: 历史基准数据太稀，第一年可能被迫做太多定制建模。
  likelihood: High
  impact: High
  mitigation: 先用专家参与式试点起步，严格限定情景库范围，并给部署时间设硬指标；一旦达不到，就收窄产品范围。
- risk: 相邻任务运营或工程厂商可能会捆进足够多的商业工作流，堵住独立切口。
  likelihood: Medium
  impact: Medium
  mitigation: 死守中立、多方承保这一层，并持续收集这些厂商天然拿不到的跨方商业结果数据。
- risk: 监管和责任复杂度可能把成交周期拉长，法务审查也可能比预期更重。
  likelihood: Medium
  impact: High
  mitigation: 和律师、保险方一起把条款模板和审计链提前做进产品，而不是每单都临时处理。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要撑 18 个月：拿下 2–3 个付费试点，补齐创始工程与承保团队，做出核心的“清单到收入”产品，并证明至少 1 个多方部署，让软件信任从运营商内部走向交易对手。
