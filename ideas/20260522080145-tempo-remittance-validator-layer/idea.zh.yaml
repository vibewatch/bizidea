problem: 正在试稳定币出资结算的汇款公司，今天仍靠出款网络后台、资金表格，以及链上划转和链下交付伙伴之间的人肉确认来跑走廊运营。一旦 MoneyGram 这类锚定伙伴成了验证方对手方，任何一次漏确认、归集延迟或资金不匹配，都可能把客户出款卡住，或者逼团队临时预注资。难点早就不是接一条稳定币通道，而是在资金往下游放出去前，先证明每一笔结算事件都符合资格、已经到资、拿到确认，并且对过账。
targetUser:
  primary: 正在把稳定币出资走廊接入现金领取或银行入账网络的跨境出款公司里的汇款运营与资金负责人
  secondary: 负责结算例外和走廊盈利能力的支付产品经理与 controller
  buyer: COO、Head of Treasury 或 VP Payments
startupThesis:
  nonObviousInsight: 稳定币汇款的采用，真正卡住的会是验证方保障，而不是钱包接入。一旦全球出款网络成了具名验证方伙伴，真正缺的那层软件，就是把链上结算、合作方确认、资金归集和出款放行串成一条可审计运营流程的控制层。
  beachhead: 年处理量在 $100M-$1B 的中型汇款服务商：它们正把稳定币出资走廊接到 MoneyGram 这类全球现金兑付或银行入账伙伴上，但结算例外仍靠表格和服务商后台处理
  wedge: 一套验证方运营控制塔：把每个汇款批次的稳定币入金、合作方确认、资金归集和出款放行规则对到一起，再把例外送进一条可审计的案件队列
  whyNowCatalyst: Tempo 把 MoneyGram 定为锚定汇款验证方，还把合作延伸到实时稳定币结算流，这让那些正从试点转向生产走廊的汇款公司，突然急需一层验证方级别的运营软件。
  ventureScalePath: 先从稳定币出资汇款批次的结算保障切入，再往走廊盈利分析、多伙伴路由、合规证据扩，最后做成覆盖跨境出款、商户代发和资金网络的更广义结算操作系统。
solution: 做一套控制塔，卡在稳定币钱包、出款网络伙伴、资金账户和内部汇款账本之间。产品先核对每个汇款批次是否满足走廊规则、验证方伙伴是否确认到账、资金归集和出款放行阈值是否对得上，然后才让资金放出去。它会把资金不足批次、确认延迟、结算窗口断裂和账本对不上等问题打进异常队列，并附上运营和财务都能共用的案件备注。系统还会给 controller 生成对账产物，让稳定币出资走廊在关账时不用再靠截图和表格拼接。时间久了，公司会变成多家出款伙伴和多条资金通道上的汇款结算质量记录系统。
goToMarketSeed:
  firstCustomer: 一家做拉美或非洲走廊的区域型汇款公司：它已经把稳定币出资批次接进类似 MoneyGram 的伙伴网络，日常结算团队不到 20 人，例外升级仍靠表格和 Slack
  buyingTrigger: 新走廊上线、开启稳定币出资后结算例外激增，或管理层要求在不牺牲出款可靠性的前提下压降临时预注资
  currentAlternative: 在现有汇款栈之上，再叠一层由出款伙伴后台、结算跟踪表、内部脚本、钱包导出和临时财务复核拼起来的手工流程
  switchingReason: 现有通道服务商会搬钱，但不会给汇款团队一层跨对手方共享的控制层，去统一管理批次资格、验证方确认、资金归集协同，以及随时能审计的例外处理。
  pricingHypothesis: 按活跃走廊数和每月已结算汇款量收 SaaS 订阅费，另加账本和出款伙伴集成的实施费
