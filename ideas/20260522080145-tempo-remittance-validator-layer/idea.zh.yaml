jobsToBeDone:
- job: 当我们上线一条稳定币出资的出款走廊时，帮汇款运营团队在放行前把每个批次核清楚，这样既能提速，又不至于把出款做挂。
  currentAlternative: 表格批次跟踪器，加上钱包和出款伙伴后台里的手工核对
  successMetric: 与结算相关的出款失败更少、批次放行更快
- job: 当财务做日结或月结复核时，帮 controller 把验证方确认过的结算对到汇款账本分录上，这样他们不用四处追手工证据也能签字。
  currentAlternative: 钱包导出、截图、Slack 线程和表格对账
  successMetric: 花在汇款结算对账上的工时，以及尚未解决的例外数量
