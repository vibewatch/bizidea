topRisks:
- name: 早期买方紧迫感不够
  description: 有些汇款公司也许会继续忍手工结算，直到稳定币出资走廊的量真正做起来。
  mitigation: 卡在走廊上线时点切入，并在首次部署里量化少掉的出款失败和预注资节省。
- name: 伙伴集成阻力
  description: 出款网络和结算服务商未必愿意放出干净的确认数据，这会让自动化很难做深。
  mitigation: 先从客户已经在用的系统里接数，支持 human-in-the-loop 的确认采集，只在数据可靠的地方再往深自动化。
- name: 通道服务商把功能吃掉
  description: 等汇款量起来后，基础设施厂商可能会补上基础对账和告警能力。
  mitigation: 把差异化压在跨对手方工作流、案件管理和走廊级放行控制上——这些不是单一服务商能端到端拥有的。
