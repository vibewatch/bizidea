competitors:
- name: BVNK
  stage: 成长阶段
  wedge: 面向 PSP、neobank 和平台做稳定币收付与出款，法币兑换直接内置在流程里。
  pricing: 定制化 / 已抓取文档里没有公开标价。
  strength: 端到端收付流程强，客户不必自己直接持有 crypto。
  weaknessVsUs: 它更像以服务商为中心的支付流程，不是一层跨多家出款伙伴和放行规则的中立异常控制层。
  sourceRefs:
  - 12
  - 13
  - 14
- name: Bridge / Stripe
  stage: 成长阶段
  wedge: 通过 Stripe 和 Visa 集成，把稳定币编排、卡发行和网络分发绑在一起。
  pricing: 企业 onboarding / private preview 式打包，抓取页面里没有公开价目。
  strength: 分发优势明显，API 面也很强，能把稳定币余额一路接到消费和卡支付场景。
  weaknessVsUs: 保留下来的证据重点都在发卡和换汇，不在汇款批次保障，也不在财务主导的异常解决。
  sourceRefs:
  - 7
  - 8
  - 9
- name: Conduit
  stage: 成长阶段
  wedge: 一套 API 管法币和稳定币账户、出款与资金运营，并配 no-code 后台。
  pricing: 按量 / 报价制；抓取站点明确写了会按量做分层定价。
  strength: 多通道 USD 编排能力强，对资金团队的定位也很清楚。
  weaknessVsUs: 它依旧更偏搬钱和 onboarding 对手方，而不是裁决验证方绑定的出款例外。
  sourceRefs:
  - 15
  - 16
- name: Fireblocks
  stage: 既有厂商
  wedge: 企业级钱包安全、审批和区块链交易自动化。
  pricing: 定制化 / 已抓取文档里没有公开标价。
  strength: 在机构链上运营里，安全和自动化可信度都很强。
  weaknessVsUs: 客户仍然得自己在上层补汇款专用控制逻辑和财务工作流。
  sourceRefs:
  - 17
- name: Nium
  stage: 既有厂商
  wedge: 全球法币出款基础设施，强调即时走廊、收款人校验和对账。
  pricing: 企业销售报价。
  strength: 走廊覆盖广，出款可靠性故事也扎实。
  weaknessVsUs: 它既不是稳定币原生，也不是围绕验证方确认或出款放行闸门来定位的。
  sourceRefs:
  - 23
regulatoryTechnicalConstraints:
- point: 任何碰到可兑换虚拟货币资金流转的工作流，在美国都可能触发 money-services-business 义务及相关 AML 控制。
  sourceRefs:
  - 18
- point: 英国的汇款和稳定币流程，需要适应 FCA 注册要求，以及正在成形的法币支持型稳定币监管边界。
  sourceRefs:
  - 19
  - 20
- point: MiCA 为欧盟内相关 crypto-asset 参与方加上了授权、监督和代币专项技术标准。
  sourceRefs:
  - 21
  - 22
- point: 服务商 onboarding 往往要求大量公司、银行、税务和 AML 文件，客户在真正开跑前就得先把这些材料交齐。
  sourceRefs:
  - 16
validationSignals:
- point: MoneyGram 明确把和 Tempo 的合作指向了实时结算流、资金管理和全球网络中的支付运营。
  sourceRefs:
  - 1
- point: Circle 已把汇款、薪资和内部资金运营列成自己支付网络的核心 use case，而不是边缘实验。
  sourceRefs:
  - 3
  - 4
- point: Visa 的稳定币结算试点跑到 $7B 年化 run rate，说明机构级稳定币结算正在变得有体量。
  sourceRefs:
  - 10
- point: 独立研究在样本里已经观察到，美国汇款用户有 26% 采用稳定币。
  sourceRefs:
  - 28
openQuestions:
- 到底有多少中型汇款运营方，已经能导出机器可读的合作方确认，而不是继续靠邮件、后台和截图？
- 新上线的稳定币出资走廊，在不同走廊和出款伙伴上，结算例外率到底是多少？
- 出款网络会不会放出足够多的确认数据，让自动化跑通；还是说 human-in-the-loop 的证据采集会长期成为必选项？
- 在通道服务商补上基础对账和告警之前，汇款公司的 COO 会不会先买一层独立控制层？
