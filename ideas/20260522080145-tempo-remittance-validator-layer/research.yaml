competitors:
- name: BVNK
  stage: scale-up
  wedge: Stablecoin pay-ins and payouts for PSPs, neobanks, and platforms, with fiat conversion handled inside the workflow.
  pricing: Custom / not publicly listed on the fetched docs.
  strength: Strong end-to-end payout and pay-in flows that reduce the need for customers to hold crypto directly.
  weaknessVsUs: Provider-centric payments workflow rather than a neutral exception layer spanning multiple payout partners and release rules.
  sourceRefs:
  - 12
  - 13
  - 14
- name: Bridge / Stripe
  stage: scale-up
  wedge: Stablecoin orchestration plus card issuing and network distribution through Stripe and Visa integrations.
  pricing: Enterprise onboarding / private-preview style packaging with no public fee card on the fetched pages.
  strength: Distribution advantage and strong API surface for moving from stablecoin balances into spend and card use cases.
  weaknessVsUs: The retained evidence focuses on issuance and conversion, not remittance batch assurance or finance-owned exception resolution.
  sourceRefs:
  - 7
  - 8
  - 9
- name: Conduit
  stage: scale-up
  wedge: One API for fiat and stablecoin accounts, payouts, and treasury operations with a no-code dashboard.
  pricing: Volume-based / quote-led; the fetched site explicitly says competitive tiered pricing based on volume.
  strength: Multi-rail USD orchestration and clear treasury-friendly positioning.
  weaknessVsUs: Still oriented around moving money and onboarding counterparties rather than adjudicating validator-linked payout exceptions.
  sourceRefs:
  - 15
  - 16
- name: Fireblocks
  stage: incumbent
  wedge: Enterprise wallet security, approvals, and transaction automation for blockchain operations.
  pricing: Custom / not publicly listed on the fetched docs.
  strength: Deep security and automation credibility for institutions operating onchain.
  weaknessVsUs: Customers must still build the remittance-specific control logic and finance workflows on top.
  sourceRefs:
  - 17
- name: Nium
  stage: incumbent
  wedge: Global fiat payout infrastructure with instant corridors, beneficiary verification, and reconciliation.
  pricing: Custom enterprise pricing via sales engagement.
  strength: Wide corridor reach and a strong reliability story for payout operations.
  weaknessVsUs: Not stablecoin-native and not positioned around validator acknowledgements or payout-release gating.
  sourceRefs:
  - 23
