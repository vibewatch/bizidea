modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified remittance and treasury leads] --> Pilots[Paid single-corridor pilots]
      Pilots --> Customers[Production logos]
      Customers --> Revenue[Subscription and implementation revenue]
      Customers --> Expansion[Second-corridor expansion]
      Expansion --> Revenue
      Revenue --> GrossProfit[70 percent gross profit]
      GrossProfit --> Cash[Runway and next-round proof]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from growing from 3 paying logos in Y1 to 12 by Q4Y3 while blended realized revenue per logo rises from $85K to $215K as pilots convert and some customers add a second corridor.
  - checkName: Must go right
    finding: The model needs pilot-to-production conversion to stay near the plan's 60%+ target and partner referrals to support the two-logo step-up in Q2Y3 without pulling hiring forward.
  - checkName: Model breaks if
    finding: If customers stay single-corridor and deployments remain services-heavy, the downside case cuts Y3 revenue to about $1.7M and pushes the cash low point toward roughly $0.8M.
  - checkName: Next-round proof
    finding: The next financing story is 5-7 production logos with at least half expanding to a second corridor and Q4Y3 EBITDA around breakeven on a still-lean team.
sanityChecks:
  ruleOf40: Y3 growth 150.8% + EBITDA margin -9.1% = 141.7%
  burnMultiple: Y2 burn multiple is about 0.9x using $0.62M EBITDA burn over roughly $0.66M net new ARR; the model approaches quarterly breakeven by Q4Y3.
  revenuePerFte: $229.9K Y3 with 9 FTE at Q4Y3 (benchmark $200-400K SaaS)
  flags:
    - The base case depends on referral and implementation partners helping create a two-logo step-up in Q2Y3; if that assist does not materialize, logo growth slows quickly.
    - Gross margin is held at the plan's 70% target even though early deployments are integration-heavy, so prolonged manual evidence capture would compress payback and runway.
    - Cash is modeled from EBITDA with minimal working-capital adjustment, which likely understates timing noise from annual prepayments, implementation billing, or regulatory reserve requirements.
