date: '2026-05-22'
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: Model start and round timing
    value: "2026-06"
    unit: YYYY-MM
    source: "[BP date; BP fundingAsk] Model starts the month after the plan date and assumes the pre-seed closes before M1 so cash can roll forward cleanly."
  - id: A2
    name: Opening cash
    value: "2400"
    unit: USDK
    source: "[BP fundingAsk.targetFundingRangeUsd] Uses a $2.4M pre-seed, inside the stated $2-4M range, sized to reach the modeled milestone while keeping more than six months of cash at the low point."
  - id: A3
    name: Revenue recognition cadence
    value: "New wins contribute half-period revenue in the month or quarter they land"
    unit: policy
    source: "[Startup-finance heuristic] Early enterprise infrastructure deals rarely start on day one, so new customers are recognized at half-period contribution in the landing period."
  - id: A4
    name: Y1 blended realized ARPU
    value: "85"
    unit: USDK annual per customer
    source: "[BP investorMemo.firstCustomer.initialContract] Blends paid pilot economics with partial-year annual contracts, staying below the stated $120K-180K production software range because Y1 is still pilot-heavy."
  - id: A5
    name: Y2 blended realized ARPU
    value: "165"
    unit: USDK annual per customer
    source: "[BP investorMemo.firstCustomer.initialContract; BP milestones] Assumes most live logos convert into the stated $120K-180K annual contract band and some begin paying corridor-expansion fees."
  - id: A6
    name: Y3 blended realized ARPU
    value: "215"
    unit: USDK annual per customer
    source: "[BP market.som; Research market.som; BP businessModel.revenueStreams] Slightly above the $200K SOM anchor because the model includes second-corridor expansion fees and implementation revenue on new logos, while year-end run-rate still stays in the neighborhood of the researched SOM framing."
  - id: A7
    name: Steady-state recurring ACV for unit economics
    value: "200"
    unit: USDK annual per customer
    source: "[BP market.som; Research market.som] Uses the researched Year-3 SOM framing of roughly 12 logos at about $200K each for recurring unit-economics math."
  - id: A8
    name: Net customer ramp
    value: "3 EOY1 / 7 EOY2 / 12 EOY3"
    unit: customers
    source: "[BP milestones; BP experimentRoadmap; Research bottomUpSizingDrivers] Matches the plan to land three design partners in Y1, reach five to seven production logos in Y2, and end Y3 around 12 logos; the ramp is net of modest churn."
  - id: A9
    name: Target gross margin
    value: "70"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] Used directly as the modeled steady-state gross margin target."
  - id: A10
    name: Monthly churn
    value: "1.5"
    unit: percent
    source: "[Startup-finance heuristic] Early enterprise workflow software with annual contracts but still-proving stickiness commonly underwrites roughly 1-2% monthly logo churn."
  - id: A11
    name: Fully loaded CAC
    value: "90"
    unit: USDK per new customer
    source: "[BP gtm.funnelTargets; Research reportMemo.distributionChannels] Founder-led outbound plus partner and implementation referrals supports a high-five-figure to low-six-figure CAC assumption."
  - id: A12
    name: Funnel and sales cycle
    value: "20-30% qualified-design-partner rate, 50%+ design-partner-to-paid-pilot, 60%+ pilot-to-production, and roughly 4-6 months from first meeting to production"
    unit: funnel
    source: "[BP gtm.funnelTargets; BP experimentRoadmap] Uses the explicit business-plan conversion goals and the 90-180 day pilot-to-production sequencing."
  - id: A13
    name: Loaded salary bands
    value: "Founder 120 / Engineering 170 / Solutions 145 / Payments Ops 150 / Sales 165 / G&A 115"
    unit: USDK annual per FTE
    source: "[Startup-finance heuristic] Lean distributed fintech-infrastructure startup pay bands including payroll tax and benefits load."
  - id: A14
    name: Hiring ramp
    value: "2 FTE in Q1Y1, 5 in Q4Y1, 7 in Q4Y2, 9 in Q4Y3"
    unit: FTE
    source: "[BP team; BP strategicChoices.sequencingRationale] Starts with the five explicit roles in the plan, adds the second engineer and second seller only after initial proof, and delays dedicated G&A until Y3."
  - id: A15
    name: Non-payroll operating spend
    value: "Y1 monthly 8-16, Y2 quarterly 54-72, Y3 quarterly 72-90"
    unit: USDK
    source: "[BP operations; BP risks; Startup-finance heuristic] Covers cloud, security, compliance, travel, legal, and onboarding costs while keeping the company intentionally lean."
  - id: A16
    name: Cash conversion assumption
    value: "EBITDA approximates operating cash flow"
    unit: policy
    source: "[Startup-finance heuristic] Assumes minimal capex, debt, and working-capital distortion for an asset-light B2B workflow software company."
  - id: A17
    name: Financing objective
    value: "Reach 5-7 production logos, prove second-corridor expansion in at least half of live accounts, and keep a six-month cash buffer before the next round"
    unit: milestone
    source: "[BP fundingAsk; BP milestones] Sizes the pre-seed to hit the stated Y2 proof points rather than to maximize headcount."
