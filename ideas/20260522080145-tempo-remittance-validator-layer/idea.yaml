jobsToBeDone:
  - job: When we launch a stablecoin-funded payout corridor, help our remittance ops team verify each batch before release, so we can move faster without causing payout failures.
    currentAlternative: Spreadsheet batch trackers plus manual checks across wallets and payout-partner dashboards
    successMetric: Fewer settlement-related payout failures and faster batch release time
  - job: When finance reviews the day or month close, help controllers reconcile validator-confirmed settlement against remittance ledger entries, so they can sign off without manual evidence chasing.
    currentAlternative: Wallet exports, screenshots, Slack threads, and spreadsheet reconciliations
    successMetric: Hours spent on remittance settlement reconciliation and number of unresolved exceptions
