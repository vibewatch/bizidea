topRisks:
  - name: Low initial buyer urgency
    description: Some remittance firms may tolerate manual settlement handling until stablecoin-funded corridor volume becomes material.
    mitigation: Sell into corridor-launch moments and quantify avoided payout failures and prefunding savings during the first deployment.
  - name: Partner integration resistance
    description: Payout networks and settlement providers may not expose clean confirmation data, making automation difficult.
    mitigation: Start with ingest from the systems customers already use, support human-in-the-loop confirmation capture, and automate deeper only where data is reliable.
  - name: Feature absorption by rail providers
    description: Infrastructure vendors could add basic reconciliation and alerting once remittance volume scales.
    mitigation: Differentiate on cross-counterparty workflow, case management, and corridor-specific release controls that single providers do not own end to end.
