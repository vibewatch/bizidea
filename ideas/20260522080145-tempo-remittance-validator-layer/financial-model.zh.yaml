scenarios:
  downside:
    description: 试点转正更慢、部署更偏服务化，公司会落在计划中的走廊扩张曲线下方。
    y3RevenueK: 1730.0
    y3EbitdaK: -500.0
    cashLowPointK: 770.0
    keyAssumptionChanges:
    - Y3 末客户数从 12 降到 10，因为试点到生产的转化更接近 40-50%，而不是计划里的 60%+。
    - 随着更多 logo 只停在单走廊、扩展费也更晚进来，Y3 混合实现 ARPU 会从 $215K 降到约 $195K。
    - 如果人工证据采集和集成工作长期偏服务化，毛利率会从 70% 滑到 67%。
  base:
    description: 创始人主导销售加上伙伴转介绍，能稳定把 design partner 推到生产，而团队规模又不会明显跑在收入前面。
    y3RevenueK: 2069.4
    y3EbitdaK: -187.7
    cashLowPointK: 1063.3
    keyAssumptionChanges:
    - 客户数会从 Y1 末的 3 家，长到 Y2 末 7 家、Y3 末 12 家，其中 Q2Y3 依赖伙伴助推拿到一个“两 logo”季度。
    - 随着付费试点转成年合同，部分账户再加第二条走廊，单 logo 的混合实现收入会从 Y1 的 $85K 升到 Y3 的 $215K。
    - 团队到 Q4Y3 才扩到 9 FTE，而且专门的 G&A 只在 Y3、生产证明已经看清后才补。
  upside:
    description: 伙伴转介绍更快、数据接入更顺，logo 增长和多走廊扩展都会加速，而团队仍保持精简。
    y3RevenueK: 2385.0
    y3EbitdaK: 120.0
    cashLowPointK: 1220.0
    keyAssumptionChanges:
    - Y3 末客户数从 12 升到 13，因为实施伙伴和通道服务商在年初更早带来了高温线索。
    - 随着更多账户更早开出第二条走廊，Y3 混合实现 ARPU 会从 $215K 提到约 $225K。
    - 毛利率从 70% 提到 72%，而第一位 G&A 招聘被推迟到模型期之后。
