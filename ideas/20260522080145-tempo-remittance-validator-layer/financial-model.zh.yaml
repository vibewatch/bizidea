  upsideCase: 模板和连接器复用更多时，毛利率 72%
  y3RevenueImpactK: 0.0
  cashImpactK: 62.1
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads[合格的汇款与资金线索] --> Pilots[付费单走廊试点]\n  Pilots --> Customers[生产 logo]\n  Customers --> Revenue[订阅与实施收入]\n  Customers --> Expansion[第二走廊扩展]\n  Expansion --> Revenue\n  Revenue --> GrossProfit[70 percent gross profit]\n  GrossProfit --> Cash[跑道与下一轮证明]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入，来自付费 logo 从 Y1 的 3 家长到 Q4Y3 的 12 家；与此同时，单 logo 的混合实现收入会随着试点转正和部分客户加第二走廊，从 $85K 升到 $215K。
- checkName: 必须跑顺的环节
  finding: 模型要求试点到生产的转化率维持在计划里的 60%+ 附近，同时也要有伙伴转介绍撑住 Q2Y3 的“两 logo”跃升，否则就不能在不前置招聘的情况下达标。
- checkName: 模型会在什么情况下失真
  finding: 如果客户长期只跑单走廊、部署又迟迟降不下服务化比重，下行情景会把 Y3 收入砍到约 $1.7M，并把现金低点压向约 $0.8M。
- checkName: 下一轮证明点
  finding: 下一轮融资要讲的故事，是做到 5-7 个生产 logo、至少一半扩到第二条走廊，并在仍然精简的团队下把 Q4Y3 EBITDA 拉到接近盈亏平衡。
sanityChecks:
  ruleOf40: Y3 增速 150.8% + EBITDA 利润率 -9.1% = 141.7%
  burnMultiple: Y2 burn multiple 约为 0.9x：对应 $0.62M 的 EBITDA 消耗和约 $0.66M 的净新增 ARR；模型在 Q4Y3 接近季度盈亏平衡。
  revenuePerFte: Q4Y3 为 9 FTE 时，Y3 revenue per FTE 约 $229.9K（SaaS 基准区间 $200-400K）
  flags:
  - 基准情景依赖转介绍和实施伙伴在 Q2Y3 帮公司完成一次“两 logo”跃升；如果这股助推没有兑现，logo 增长会很快放缓。
  - 模型把毛利率钉在计划里的 70%，但早期部署本来就偏集成密集；如果人工证据采集拉长，回本和跑道都会被压缩。
  - 现金直接从 EBITDA 滚出来，几乎没调营运资本；这大概率低估了年付预收、实施开票或监管准备金带来的时点噪音。
