slug: remittance-validator-control-tower
date: '2026-05-22'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份与融资时点
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date; BP fundingAsk] 模型从商业计划日期后的次月起跑，并假设 pre-seed 在 M1 前完成，好让现金滚动更干净。'
- id: A2
  name: 期初现金
  value: '2400'
  unit: USDK
  source: '[BP fundingAsk.targetFundingRangeUsd] 采用 $2.4M pre-seed，落在计划写明的 $2-4M 区间内，既够打到模型里的里程碑，也能在低点保持超过 6 个月现金。'
- id: A3
  name: 收入确认节奏
  value: 新签客户在落单当月或当季按半周期确认收入
  unit: policy
  source: '[Startup-finance heuristic] 早期企业基础设施合同很少从签约第一天就满额起算，所以新客户在签下当期按半周期贡献确认。'
- id: A4
  name: Y1 混合实现 ARPU
  value: '85'
  unit: USDK annual per customer
  source: '[BP investorMemo.firstCustomer.initialContract] 把付费试点和不足一年的年合同收入混在一起后，仍低于写明的 $120K-180K 生产软件价格带，因为 Y1 仍以试点为主。'
- id: A5
  name: Y2 混合实现 ARPU
  value: '165'
  unit: USDK annual per customer
  source: '[BP investorMemo.firstCustomer.initialContract; BP milestones] 假设大多数已上线 logo 会转进 $120K-180K 的年合同区间，部分客户开始为第二条走廊扩张付费。'
- id: A6
  name: Y3 混合实现 ARPU
  value: '215'
  unit: USDK annual per customer
  source: '[BP market.som; Research market.som; BP businessModel.revenueStreams] 略高于 $200K 的 SOM 锚点，因为模型把第二走廊扩展费和新 logo 的实施收入也算进去了，同时年末 run-rate 仍贴着研究里的 SOM 口径。'
- id: A7
  name: 单位经济模型里的稳定态 ACV
  value: '200'
  unit: USDK annual per customer
  source: '[BP market.som; Research market.som] 直接采用研究里对 Y3 SOM 的口径：大约 12 个 logo、每家约 $200K，用来做经常性单位经济模型测算。'
- id: A8
  name: 净客户爬坡
  value: 3 EOY1 / 7 EOY2 / 12 EOY3
  unit: customers
  source: '[BP milestones; BP experimentRoadmap; Research bottomUpSizingDrivers] 对齐计划：Y1 拿下 3 家 design partner，Y2 做到 5-7 个生产 logo，Y3 末约 12 个；这个爬坡已经扣掉了温和流失。'
- id: A9
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 直接采用计划里写明的稳定态毛利率目标。'
- id: A10
  name: 月流失率
  value: '1.5'
  unit: percent
  source: '[Startup-finance heuristic] 对年合同为主、但粘性还在被验证的早期企业工作流软件，通常会按每月约 1-2% 的 logo 流失率来承保。'
- id: A11
  name: 完全加载 CAC
  value: '90'
  unit: USDK per new customer
  source: '[BP gtm.funnelTargets; Research reportMemo.distributionChannels] 创始人主导外呼，加上伙伴和实施转介绍，支撑了一个高五位数到低六位数的 CAC 假设。'
- id: A12
  name: 漏斗与销售周期
  value: 合格 design partner 比例 20-30%，design partner 到付费试点 50%+，试点到生产 60%+，从首次会面到生产约 4-6 个月
  unit: funnel
  source: '[BP gtm.funnelTargets; BP experimentRoadmap] 直接采用商业计划里写明的转化目标，以及 90-180 天的试点到生产节奏。'
- id: A13
  name: 全包薪酬带
  value: Founder 120 / Engineering 170 / Solutions 145 / Payments Ops 150 / Sales 165 / G&A 115
  unit: USDK annual per FTE
  source: '[Startup-finance heuristic] 对分布式 fintech 基础设施创业公司给出的精简薪酬带，已经含工资税和福利负担。'
- id: A14
  name: 招聘节奏
  value: Q1Y1 2 FTE，Q4Y1 5，Q4Y2 7，Q4Y3 9
  unit: FTE
  source: '[BP team; BP strategicChoices.sequencingRationale] 先从计划里明确写出的 5 个角色起步，等初步验证跑通后再补第二个工程师和第二个销售，专门的 G&A 则推迟到 Y3。'
- id: A15
  name: 非薪酬经营开支
  value: Y1 每月 8-16，Y2 每季度 54-72，Y3 每季度 72-90
  unit: USDK
  source: '[BP operations; BP risks; Startup-finance heuristic] 覆盖云成本、安全、合规、差旅、法务和 onboarding 成本，同时保持公司刻意精简。'
- id: A16
  name: 现金转换假设
  value: EBITDA 近似经营现金流
  unit: policy
  source: '[Startup-finance heuristic] 假设这是一家轻资产 B2B 工作流软件公司，资本开支、债务和营运资本扭曲都很有限。'
- id: A17
  name: 融资目标
  value: 做到 5-7 个生产 logo，至少半数真实账户扩到第二条走廊，并在下一轮前保住 6 个月现金缓冲
  unit: milestone
  source: '[BP fundingAsk; BP milestones] 这轮 pre-seed 的规模，是按打到计划里的 Y2 证明点来配的，而不是为了尽量多招人。'
