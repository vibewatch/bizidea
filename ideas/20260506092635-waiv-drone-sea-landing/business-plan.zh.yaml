slug: sea-state-drone-assurance
date: '2026-05-06'
executiveSummary: >-
  这家公司应该先做北海海上风电船载无人机的任务保障层，而不是再造一家无人机 OEM、降落坪厂商或托管式巡检服务商。研究触发点可信：海上自主放飞与回收正变得可行，Vattenfall 和 ESVAGT 等运营方也已证明海上无人机使用和能量化的巡检提效。因此首款产品应该利用船体运动、海况、甲板状态和飞行器遥测，在人工监督下给出放飞/禁飞判断，并为运营方、保险方和监管方产出审计轨迹。滩头市场必须故意收窄，因为这个市场集成负担重、审批高度定制、买方又十分集中；只有先证明一套可重复使用的海上风电部署模型，后续更广的海事扩张才成立。GTM 应采用创始人主导、先试点后扩张的打法，优先拿下那些已经在推船载巡检项目或新降落平台的运营方，定价则绑定活跃船舶和付费试点，再转成年度软件合同。第一阶段最强的证明点，是客户在没有回收事故的前提下提升获批架次率，并把至少一个两船试点转成正式生产。最大的反证风险是：回收不确定性在任务取消中的占比并不足以支撑独立软件预算，或者买家只愿意把这项能力和硬件或服务打包购买。研究仍未明确预算归属和可接受的误判阈值，因此前 90 天应聚焦验证预算权限、遥测要求以及保险方或船级社的接受度。
problem:
  - 海上风电运营方已经能在海上使用无人机，但从移动船舶常态化放飞与回收，仍然依赖人工在海况、甲板运动、电池余量和甲板就绪状态之间做即时判断。
  - 一旦回收风险说不清，运营方就会退回保守的禁飞决策、绳索作业、额外船时或托管服务，海上无人机项目的 ROI 也会被迅速吃掉。
solution:
  - 打造一套海事任务保障 OS，把船舶遥测、天气与海浪数据、起降坪状态和飞行器遥测融合成由人工监督的起飞、继续、备降或回收建议。
  - 每次架次都附带可复核的审计轨迹，让船队运营方能把 SOP 标准化到多艘船上，并支撑保险方、船级社与监管审查。
whyWeWin:
  - 这个切口比通用无人机运营软件更窄，因为它拿下的是移动甲板回收决策，而海事专属逻辑和信任恰恰在这里最关键。
  - 护城河会通过与海况、船型、甲板几何和任务结果绑定的专有回收结果数据不断加深，而且能跨多个硬件与无人机厂商累积。
strategicChoices:
  beachhead: 北海海上风电运维承包商与服务船运营方，拥有 5-20 艘具备无人机能力的船舶，正试图在恶劣海况下把船载风机巡检标准化。
  wedgeRationale: 这类买家已经切身感到痛点，能够用减少绳索作业和船时的成本节省来证明价值，也能先在少数船舶上更快跑出证据，相比更广的海事市场重复性更强、采购更简单。
  sequencingRationale: 先用最小遥测包上线建议模式的任务放行与审计轨迹，拿下与真实巡检项目绑定的付费试点；只有在决策逻辑被生产环境信任之后，再加深集成和伙伴分发。
  notYet:
    - 在一个海上风电部署模型还没证明试点到生产可重复转化前，就向油气船队大规模扩张
    - 在没有人工审批环节的前提下，直接提供全自动放行权限
    - 提供完整托管式巡检服务，把公司做成服务运营方而不是系统记录层
    - 在英国和欧盟审批路径及参考客户尚未建立前，就过早进入美国市场
market:
  tam: 基于研究估算，全球约 1,200 艘相关移动甲板船舶 × 每艘活跃船舶约 $75k ACV，对应约 $90M 的年度全球市场。
  sam: 基于研究估算，北海和欧洲海上风电约 240 艘服务与支持船舶构成滩头市场，对应约 $18M 年度市场。
  som: 基于研究估算，第 3 年可触达收入约为 $2.2M，对应约 28 艘活跃船舶、约 $80k 的混合 ACV，以及试点增购和集成收入。
  segments:
    - 英国和欧盟海域的海上风电运维承包商与服务船运营方
    - 在滩头阵地证明后进入的相邻海上能源与海事巡检运营方
  buyingProcess: >-
    当运营方启动新的船载无人机项目、部署移动甲板降落硬件，或被要求用标准化船队工作流替代绳索作业巡检时，这笔采购就会启动。最可能的买方是海上运营负责人、船队总监或 UAV 项目负责人；无人机运营经理、船长以及安全或合规负责人则会深度参与评估。
product:
  mvp: >-
    先为一个船型交付建议模式系统，接入 IMU 或船体运动数据、海况和天气数据源、甲板状态信号，以及飞行器电池与自动驾驶遥测，输出放飞/禁飞评分、回收指引和架次后记录。MVP 必须支持人工手动放行、保守阈值以及可导出的审计日志，而不是闭环自治。
  sixMonth: 在两艘船试点中证明系统价值，具备可配置阈值、基础运营仪表盘、事故复盘能力，以及面向安全负责人可导出的证据包。
  twelveMonth: 为一个海上风电客户加入船型画像、降落平台与无人机 OEM 连接器、面向保险方或船级社的报告模板，以及多船视图。
  twentyFourMonth: 在保持跨硬件中立编排层定位的同时，扩展到跨船队基准对比、相邻海上能源部署以及伙伴分发的集成。
  keyBets:
    - 回收不确定性在禁飞决策里占比足够高，值得单独购买软件。
    - 买家会先相信具备审计性的建议，再逐步相信全自动放行权限。
    - 以船体运动、甲板状态和飞行器状态为核心的最小遥测包，就足以在首个部署中形成可用建议。
gtm:
  wedge: 先围绕 1-2 艘船上的真实海上风电巡检工作流卖付费试点，按减少船时和提高获批架次率定价；一旦客户在重复架次中持续使用，再转成按活跃船舶计费的年度软件合同。
  channels:
    - 由创始人直接向海上运营负责人和 UAV 项目负责人销售
    - 与需要中立全船队决策层的降落平台和无人机 OEM 合作
    - 借助船级社、保险方与船舶集成伙伴建立信任和转介绍
  funnelTargets: 以每半年 12-15 个目标账户起步，30-40% 进入合格试点讨论，20-25% 转成付费试点，50% 以上完成试点转生产，并通过增加船舶和按量收费实现 120% 以上净收入留存。
  pricing: 按活跃船舶收年度 SaaS 费用，外加一次性甲板传感器或集成包，以及按保障架次计费；这种定价既贴合买家触发点，也与船队铺开节奏一致，并能覆盖早期集成负担。
businessModel:
  revenueStreams:
    - 按活跃船舶收取年度订阅费
    - 一次性甲板传感器套件或集成设置费
    - 按保障架次计费
    - 面向保险方、船级社或大型客户的高级报告与合规包
  unitOfValue: 开展海事无人机保障作业的活跃船舶
  targetGrossMarginPct: 70
  expansionLevers:
    - 在首个船队里增加更多船舶
    - 从建议模式扩展到高级审计与保险报告
    - 在海上风电跑通后，增加相邻海上能源、港口和海事巡检船队
    - 成为多个无人机与降落硬件厂商之间的数据与编排层
strategyMap:
  northStarMetric: 从试点转成持续生产使用后，仍完成续约的活跃船舶数量
  inputMetrics:
    - 相对人工基线流程的获批架次率
    - 试点转生产转换率
    - 从项目启动到首次真实架次的中位天数
    - 获安全相关方接受完整审计记录的架次占比
    - 在真实生产中被使用的硬件与遥测集成数量
  moatsToBuild:
    - 把海况、船体运动、甲板条件与架次结果连接起来的海事回收风险数据集
    - 能提高建议质量与导入速度的船型和甲板画像库
    - 被保险方、船级顾问和运营方安全团队接受的审计与复核证据
  killCriteria:
    - 前 10 个合格海上风电账户里，愿意按目标价格带支付试点费用的不足 2 个
    - 在前 3 个设计合作伙伴中，回收相关不确定性占任务取消原因的比例低于 20%
    - 12 个月后试点转生产率仍低于 40%，且主要原因是买家只接受与硬件或服务打包的能力
  mermaid: |
    flowchart LR
      Wedge[北海海上风电试点，覆盖 1-2 艘船] --> MVP[建议模式任务保障 OS]
      MVP --> Proof[更高的获批架次率与可审计证据]
      Proof --> Expansion[更多船舶、伙伴渠道与相邻海事细分]
investorMemo:
  verdict:
    call: 观察
    conviction: 运营痛点与时机都可信，但滩头市场偏窄，而且独立软件的付费意愿仍未被证明。
    whyBelieve: 研究说明海上运营方已经在使用无人机，海上自主回收正逐步成真，而且跨船队任务放行决策还没有中立的系统记录层。
    whyDoubt: 如果买家只信任打包硬件或托管服务，或者监管审查让每次部署都高度定制，公司就可能卡在重集成的利基市场里。
    nextDiligence: 拿下 2 个付费设计合作伙伴，它们都应有真实的船载巡检项目，并验证回收不确定性是否是任务取消或延误的前三大原因之一。
  firstCustomer:
    title: 北海海上风电运维承包商的海上运营负责人
    profile: 公司拥有 5-20 艘服务或作业船，已间歇性用无人机做巡检，同时面临以可重复的船载架次替代重人力流程的压力。
    trigger: 新的降落平台部署，或在海上巡检项目中被要求削减绳索作业人力和船时。
    buyer: 海上运营负责人或 UAV 项目总监
    initialContract: $40k-90k 的付费试点，覆盖 1-2 艘船和一个巡检工作流；生产签收后转成每艘活跃船舶约 $75k-100k 的年度合同，外加设置费和按量费用。
  mustBeTrue:
    - 至少有一家海上风电运营方会在能力被硬件厂商打包前，先为独立任务保障软件付费。
    - 回收不确定性足够频繁地成为禁飞决策根因，能通过更好的架次放行带来能量化 ROI。
    - 具备人工监督的建议型产品，能满足安全、保险方和船级社的早期信任门槛，而无需完全自治。
    - 首次部署可以依赖最小遥测包运行，而不需要为每个账户都做定制船舶工程。
    - 海上风电参考客户能为相邻海事细分打开足够相似的工作流，从而支撑扩张。
  diligenceQuestions:
    - 海上任务取消中，有多少比例是由放飞或回收不确定性造成，而不是空域或人员约束？
    - 第一笔部署预算究竟归属于海上运营、数字化、安全，还是无人机项目本身？
    - 第一版安全且站得住脚的建议引擎，必须接入哪些遥测数据？
    - 试点想进入正式 SOP，究竟需要多深的保险方或船级社参与？
    - 降落平台厂商会拥抱中立软件层，还是会试图把整个工作流吸进自家堆栈？
  riskHeatmap:
    - risk: 降落硬件部署与船载无人机采用速度低于预期
      likelihood: Medium
      impact: High
      leadingIndicator: 前 12 个月里，拥有真实船载无人机项目或已获预算降落平台部署的合格账户少于 3 个。
      mitigation: 聚焦已经在试点船载巡检的运营方，并与早期降落平台厂商深度合作。
    - risk: 买家更偏好打包硬件或托管服务，而不是独立软件
      likelihood: High
      impact: High
      leadingIndicator: 大多数认真推进的试点只有在重服务或伙伴硬件打包时才能成交，而且无法转成年度软件。
      mitigation: 用清晰的试点到生产转换路径来定价，并证明跨厂商审计价值不属于硬件厂商。
    - risk: 监管、保险方或船级社接受度拖慢正式部署
      likelihood: Medium
      impact: High
      leadingIndicator: 试点在技术上完成，但 6 个月后仍无法被纳入正式 SOP。
      mitigation: 保留人工审批环节，产出可复核证据包，并让保障相关方参与设计合作伙伴评审。
    - risk: 遥测集成与海上部署比计划更定制化
      likelihood: Medium
      impact: Medium
      leadingIndicator: 前 2 个客户从启动到首次真实架次超过 120 天，主要因为定制集成拖慢进度。
      mitigation: 围绕最小初始集成包做标准化，并避免过早支持超出范围的船型。
    - risk: 滩头市场本身太小，若无相邻市场扩张便无法支撑风险投资回报
      likelihood: Medium
      impact: High
      leadingIndicator: 第一批客户虽然续约，但到第 18 个月仍没能为相邻海上能源或海事巡检船队打开可信入口。
      mitigation: 把海上风电当成证明切口，并把后续招聘与相邻细分共享同一买点和遥测栈的证据绑定。
operatingAssumptions:
  - assumption: 海上风电运营方会从既有巡检、运营或无人机项目预算中拨出 $40k-90k，购买付费试点。
    basis: research.yaml
    validationTest: 从拥有真实船载巡检项目的账户中，以目标价格拿下 2 个付费试点，并记录预算归属与审批路径。
    decisionImpact: 如果不成立，定价、销售路径和融资计划就必须转向伙伴打包或更偏服务化的模式。
  - assumption: 由船体运动、甲板状态、天气或海浪数据以及飞行器状态组成的最小遥测包，足以支撑 MVP 建议引擎。
    basis: research.yaml
    validationTest: 与 3 家运营方和 2 家硬件伙伴完成设计评审，然后在不额外做定制传感器工程的前提下，为一个船型演示实时建议。
    decisionImpact: 如果不成立，导入成本会显著上升，公司应收窄到单一硬件栈或更少的船型。
  - assumption: 具备人工监督的审计轨迹，能跨过安全经理、保险方和船级社相关方的早期信任门槛。
    basis: idea.yaml
    validationTest: 把试点架次完成后的证据包提交给 3 位安全或保障相关方，确认其足以支撑正式生产评审。
    decisionImpact: 如果不成立，路线图必须优先建设更深的保障工作流，并放慢销售扩张节奏。
  - assumption: 与美国海上风电或更广的海事安保市场相比，北海海上风电是跑出可重复证明的最快路径。
    basis: research.yaml
    validationTest: 对比英国和欧盟与美国的 10 个目标账户，评估真实项目成熟度、审批时间长度以及可接入无人机船舶的获取难度。
    decisionImpact: 如果不成立，在扩张团队前就应调整地域聚焦与伙伴策略。
  - assumption: 跨厂商中立性足够重要，降落平台或无人机 OEM 会选择合作，而不是完全吞掉整个工作流。
    basis: 运营判断
    validationTest: 在不限制多厂商部署的前提下，拿到至少 2 个硬件或无人机厂商的集成或转介绍协议。
    decisionImpact: 如果不成立，公司可能需要对齐某个主导硬件生态，或重新审视独立平台护城河假设。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 10 位海上风电无人机运营负责人，并从至少 3 个项目中收集 3 个月任务日志或禁飞原因。
    hypothesis: 回收不确定性是目标工作流里任务取消或延误的前三大原因之一。
    successMetric: 在被引用的禁飞原因中，回收或降落不确定性占比至少 20%，且 10 次访谈中有 8 次认为问题紧迫。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 围绕各自一个真实巡检工作流，卖出 2 个付费设计合作伙伴试点。
    hypothesis: 只要试点保持建议模式并聚焦审计，买家会在完整保险方或船级社流程结束前就承诺预算。
    successMetric: 在 $40k-90k 价格带签下 2 个试点，且都有明确的高管负责人和生产转化标准。
    owner: 创始人/CEO
  - horizon: 3–6 个月
    experiment: 用标准遥测包在一个船型上部署 MVP，并测量相对客户原有手动流程的获批架次率。
    hypothesis: 建议型推荐与审计记录能在不增加回收事故的前提下，提高获批架次率。
    successMetric: 试点运营中，获批架次率相对基线至少提升 15%，且零回收事故。
    owner: 创始工程师
  - horizon: 3–6 个月
    experiment: 与安全经理、保险方代表或船级顾问一起复核试点证据包。
    hypothesis: 可审计的架次记录，能显著缩小相较单纯飞手判断的信任缺口。
    successMetric: 至少 3 位内外部保障相关方确认，该证据包只需小改就能用于正式生产评审。
    owner: 产品负责人
  - horizon: 6–12 个月
    experiment: 上线 2 个硬件或无人机 OEM 集成，并测试来自伙伴的商机线索。
    hypothesis: 伙伴渠道能降低集成摩擦，并带来比冷启动外呼更容易成交的试点机会。
    successMetric: 签下 2 个集成，并从伙伴处获得至少 3 个合格试点引荐，其中 1 个完成成交。
    owner: 合作负责人
  - horizon: 12–18 个月
    experiment: 将首个客户从试点船舶扩展到船队铺开，并测试 1 个相邻海上能源或海事巡检账户。
    hypothesis: 同一套任务保障工作流会先在单一船队内部扩张，再以有限产品改动迁移到相邻海事细分。
    successMetric: 首个客户扩展到至少 4 艘正式生产船舶，并以同一核心遥测与审计工作流拿下 1 个相邻细分试点。
    owner: 创始人/CEO
operations:
  - 标准化海上部署手册，覆盖遥测接入、阈值校准、架次复盘和事故升级流程
  - 以人工覆盖、架次后复盘和版本化阈值变更为核心的保守模型治理流程
  - 把降落硬件、船舶遥测、天气数据和飞行器遥测接口作为核心产品资产维护的集成库
  - 为运营方 SOP、保险方与船级社审查打包架次证据的保障工作流
  - 面向降落平台厂商、船舶集成商和海上无人机运营方的参考伙伴计划
team:
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 负责构建首个真实试点所需的遥测接入、决策引擎和审计日志基础设施。
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 必须亲自跑企业销售、收集任务数据，并把滩头市场定义得足够窄，才能指导后续招聘。
  - role: 产品负责人
    startTiming: 第 3 个月
    rationale: 把试点工作流与安全反馈沉淀为可重复的产品与证据模型。
  - role: 现场集成工程师
    startTiming: 第 4 个月
    rationale: 海上部署与遥测集成是正面的采用阻塞点，不能长期靠创始人临时处理。
  - role: 合作负责人
    startTiming: 第 9 个月
    rationale: 只有在至少一个试点证明价值后，公司才适合签非排他硬件与渠道伙伴。
milestones:
  - horizon: 0–12 个月
    items:
      - 在北海海上风电签下 2 个付费设计合作伙伴，并在至少 2 艘船上部署建议模式试点。
      - 在试点运营中，相对基线实现至少 15% 的获批架次率提升，同时零回收事故。
      - 产出被客户安全相关方接受用于生产评审的证据包，并获得至少 1 位保险方或船级社相关审阅者认可。
  - horizon: 12–24 个月
    items:
      - 将至少 1 个试点转成覆盖 4 艘以上船舶的正式生产合同，按年度按船收费。
      - 在导入流程标准化到 90 天以内的同时，达到 3-5 个正式生产客户或等价的 12 艘活跃船舶。
      - 建立 2 个非排他硬件或无人机 OEM 伙伴关系，并带来合格商机线索。
  - horizon: 24–36 个月
    items:
      - 通过约 28 艘活跃船舶或等价的正式生产合同收入，达到模型中的 $2.2M SOM。
      - 只有在同一决策引擎与审计工作流能以有限定制迁移时，才进入至少 1 个相邻海事细分。
      - 根据分发效率和护城河数据，决定继续保持中立任务保障层，还是更紧密地绑定某个伙伴生态。
risks:
  - risk: 降落硬件采用和海上无人机部署仍慢于计划假设
    likelihood: Medium
    impact: High
    mitigation: 聚焦已经在运营或试点船载无人机工作流的账户，并按付费试点需求来控制招聘节奏。
  - risk: 买家更偏好打包硬件或托管服务，而不是独立保障软件
    likelihood: High
    impact: High
    mitigation: 证明跨厂商审计价值，以面向生产转化的方式给试点定价，并借助伙伴分发但不放弃系统记录层所有权。
  - risk: 监管、保险方和船级社要求拖慢正式部署
    likelihood: Medium
    impact: High
    mitigation: 早期把产品保持在建议模式和人工监督状态，让保障相关方参与试点设计，并交付可复核证据而非黑箱自治。
  - risk: 集成工作在不同船型和遥测栈之间始终过于定制化
    likelihood: Medium
    impact: Medium
    mitigation: 把第一年限制在少数船型和受支持硬件集成内，并提供标准部署套件。
  - risk: 海上风电滩头市场无法足够快地打开相邻市场
    likelihood: Medium
    impact: High
    mitigation: 把相邻扩张当成带闸门的假设，在招聘前先证明买家、遥测和审批工作流确实共享。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月资金应足以覆盖创始产品与现场团队、2-3 个海上风电试点、核心遥测与审计基础设施，以及在更广海事扩张前证明试点到生产转化所需的证据。
