slug: sea-state-drone-assurance
date: '2026-05-06'
executiveSummary: 这家公司应首先切入北海海上风电作业中船载无人机的任务保障层，而不是再做一家无人机 OEM、降落平台供应商或托管式检查服务商。研究触发因素具备可信度：海上自主起降与回收正变得可行，而 Vattenfall 和 ESVAGT 等运营方已经展示出海上无人机使用案例以及可量化的检查时间节省。因此，首个产品应基于船体运动、海况、甲板状态和飞行器遥测，在人工监督下给出起飞/禁飞决策，并生成可供运营、保险和监管使用的审计轨迹。由于该市场集成负担重、审批高度定制化、买方集中，因此切入市场必须刻意保持狭窄；只有在一个可重复的海上风电部署模型被验证后，更广泛的海事扩张才成立。市场进入应由创始人主导，并以试点优先展开。
problem:
- 海上风电运营方已可在海上使用无人机，但从移动船舶上进行常态化起降与回收，仍依赖人工对海况、甲板运动、电池余量和甲板准备情况的判断。
- 当回收风险不明确时，运营方会退回到保守的禁飞决策、绳索作业、额外船时或托管服务，从而侵蚀海上无人机项目的投资回报。
solution:
- 打造一套海事任务保障操作系统，将船舶遥测、天气和浪况数据、降落平台状态以及飞行器遥测融合为人工监督下的起飞、继续执行、改降或回收建议。
- 为每次架次配套可审阅的审计轨迹，使舰队运营方能够跨船舶标准化 SOP，并支持保险方、船级机构和监管审查。
whyWeWin:
- 这一切入口比通用无人机运营软件更聚焦，因为它掌握的是移动甲板回收决策——这是最依赖海事情境逻辑和信任的环节。
- 防御力将通过专有的回收结果数据不断积累，这些数据与海况、船型、甲板几何以及跨多种硬件和无人机供应商的任务结果相绑定。
strategicChoices:
  beachhead: 在北海运营 5-20 艘具备无人机作业能力船舶、并试图在恶劣海况下将船载风机检查标准化的海上风电运维承包商和服务船运营商。
  wedgeRationale: 这类买方已经切身感受到痛点，能够从减少绳索作业和船时中看到明显成本抵扣，并且比更广泛的海事市场更快地产出验证结果。
  sequencingRationale: Start with advisory-mode mission release and audit trail on a minimal telemetry bundle, win a paid pilot tied to a live inspection program, then add deeper integrations and partner distribution only after the decision logic is trusted in production.
  notYet:
  - Oil and gas fleetwide expansion before one offshore wind deployment model shows repeatable pilot-to-production conversion
  - Fully autonomous release authority without a human approval step
  - Full managed inspection services that would turn the company into a services operator rather than the system of record
  - U.S. market entry before UK and EU approval paths and reference accounts are established
market:
  tam: 基于研究估算：约 1,200 艘相关移动甲板船舶 × 每艘活跃船舶约 $75k ACV，对应约 $90M 的全球年市场。
  sam: 基于研究估算：约 240 艘北海及欧洲海上风电服务与支援船舶，对应约 $18M 的年切入市场。
  som: 基于研究估算：在试点增购和集成收入后，以约 28 艘活跃船舶和约 $80k 的综合 ACV 计算，第 3 年可触达收入约为 $2.2M。
  segments:
  - Offshore wind O&M contractors and service-vessel operators in UK and EU waters
  - Adjacent offshore energy and maritime inspection operators after beachhead proof
  buyingProcess: The motion starts when an operator launches a new vessel-based drone program, adopts moving-deck landing hardware, or is tasked with replacing rope-access inspections with a standardized fleet workflow. The likely buyer is the head of offshore operations, fleet director, or UAV program owner, with drone operations managers, vessel masters, and safety or compliance leads shaping evaluation.
product:
  mvp: 为单一船型交付一套建议模式系统，接入 IMU 或船体运动数据、海况和天气数据流、甲板状态信号，以及飞行器电池与自动驾驶遥测，生成起飞/禁飞评分、回收指引和架次后记录。MVP 应支持人工放行、保守阈值和可导出的审计日志，而不是闭环自治。
  sixMonth: Prove a two-vessel pilot with configurable thresholds, basic operator dashboards, incident review, and exportable evidence packs for safety managers.
  twelveMonth: Add vessel-class profiles, landing-platform and drone OEM connectors, insurer or class-facing reporting templates, and multi-vessel fleet views for one offshore wind customer.
  twentyFourMonth: Expand into cross-fleet benchmarking, adjacent offshore-energy deployments, and partner-distributed integrations while remaining the neutral orchestration layer across hardware vendors.
  keyBets:
  - Recovery uncertainty is a large enough share of no-go decisions to justify dedicated software spend.
  - Buyers will trust advisory recommendations with auditability before they trust full automated release authority.
  - A minimal telemetry bundle around vessel motion, deck status, and aircraft state is sufficient to create usable recommendations in the first deployment.
gtm:
  wedge: Sell a paid pilot for one live offshore wind inspection workflow on 1-2 vessels, priced around avoided vessel-hours and higher approved-sortie rate, then convert to annual per-vessel software once the customer uses the system across repeated sorties.
  channels:
  - Founder-led direct sales to offshore operations leaders and UAV program owners
  - Landing-platform and drone OEM partnerships that need a neutral fleetwide decision layer
  - Trust-building referrals through class, insurer, and vessel-integration partners
  funnelTargets: 12-15 target accounts per half year -> 30-40% qualified pilot discussions -> 20-25% paid pilots -> 50%+ pilot-to-production conversion -> 120%+ net revenue retention through additional vessels and usage fees
  pricing: 按活跃船舶计费的年度 SaaS，加一次性甲板传感器或集成套件费用，以及按保障架次计费的使用费。
businessModel:
  revenueStreams:
  - Annual subscription per active vessel
  - One-time deck sensor kit or integration setup fee
  - Usage-based assured-sortie fees
  - Premium reporting or compliance packages for insurers, class, or enterprise customers
  unitOfValue: Active vessel running assured maritime drone operations
  targetGrossMarginPct: 70
  expansionLevers:
  - Add more vessels within the first fleet
  - Expand from advisory mode into premium audit and insurer reporting
  - Add adjacent offshore-energy, port, and maritime-inspection fleets after offshore wind proof
  - Become the data and orchestration layer across multiple drone and landing-hardware vendors
strategyMap:
  northStarMetric: 从试点转为持续生产使用后完成续约的活跃船舶数量
  inputMetrics:
  - Approved sortie rate versus baseline manual process
  - Pilot-to-production conversion rate
  - Median days from kickoff to first live sortie
  - Percentage of sorties with complete audit records accepted by safety stakeholders
  - Number of hardware and telemetry integrations used in live production
  moatsToBuild:
  - Maritime recovery-risk dataset linking sea state, vessel motion, deck conditions, and sortie outcomes
  - Vessel-class and deck-profile library that improves recommendation quality and onboarding speed
  - Audit and review evidence accepted by insurers, class advisors, and operator safety teams
  killCriteria:
  - Fewer than 2 of the first 10 qualified offshore wind accounts will pay for a pilot in the proposed pricing band
  - Recovery-related uncertainty appears in less than 20% of mission cancellations across the first 3 design partners
  - Pilot-to-production conversion stays below 40% after 12 months because buyers only want the capability bundled with hardware or services
  mermaid: "flowchart LR\n  Wedge[北海海上风电 1-2 艘船试点] --> MVP[建议模式任务保障操作系统]\n  MVP --> Proof[更高获批架次率与可审计证据]\n  Proof --> Expansion[更多船舶、合作渠道与相邻海事细分市场]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 运营痛点和时机都具备可信度，但切入市场较窄，独立软件的付费意愿仍未被验证。
    whyBelieve: Research shows offshore operators already use drones, autonomous at-sea recovery is becoming real, and no neutral system of record yet owns the mission-release decision across fleets.
    whyDoubt: If buyers only trust bundled hardware or managed services, or if regulatory review keeps every deployment bespoke, the company may stall as an integration-heavy niche.
    nextDiligence: Secure two paid design partners with live vessel-based inspection programs and verify that recovery uncertainty is a top-three cause of mission cancellations or delays.
  firstCustomer:
    title: 北海风电运维承包商的海上运营负责人
    profile: Company runs 5-20 service or operation vessels, already uses drones intermittently for inspections, and is under pressure to replace technician-heavy workflows with repeatable vessel-launched sorties.
    trigger: New landing-platform rollout or a mandate to cut rope-access labor and vessel-hours in an offshore inspection program.
    buyer: Head of offshore operations or UAV program director
    initialContract: $40k-90k paid pilot covering 1-2 vessels and one inspection workflow, converting to roughly $75k-100k annual per active vessel plus setup and usage fees after production sign-off.
  mustBeTrue:
  - At least one offshore wind operator will pay for standalone mission-assurance software before it is bundled by a hardware vendor.
  - Recovery uncertainty is a frequent enough root cause of no-go decisions to deliver measurable ROI from better sortie approval.
  - A human-supervised advisory product can satisfy safety, insurer, and class expectations without requiring full autonomy.
  - The first deployment can run on a minimal telemetry bundle without custom vessel engineering on every account.
  - Offshore wind reference accounts will open adjacent maritime segments with similar enough workflows to support expansion.
  diligenceQuestions:
  - What percentage of canceled offshore sorties is caused by launch or recovery uncertainty rather than airspace or staffing constraints?
  - Who owns budget for the first deployment: offshore operations, digitalization, safety, or the drone program itself?
  - Which telemetry feeds are mandatory for the first safe and trusted recommendation engine?
  - How much insurer or class involvement is required before a pilot can become production SOP?
  - Will landing-platform vendors embrace a neutral software layer or try to absorb the workflow into their own stack?
  riskHeatmap:
  - risk: Landing-hardware rollout and vessel-based drone adoption progress slower than expected
    likelihood: Medium
    impact: High
    leadingIndicator: Fewer than 3 qualified accounts have live vessel-based drone programs or funded landing-platform rollouts in the first 12 months.
    mitigation: Focus on operators already piloting vessel-launched inspections and partner tightly with early landing-platform vendors.
  - risk: Buyers prefer bundled hardware or managed services over standalone software
    likelihood: High
    impact: High
    leadingIndicator: Most serious pilots only close when bundled with heavy services or partner hardware and fail to convert to annual software.
    mitigation: Price the pilot with a clear production conversion path and prove cross-vendor audit value that hardware vendors do not own.
  - risk: Regulatory, insurer, or class acceptance slows production rollout
    likelihood: Medium
    impact: High
    leadingIndicator: Pilots complete technically but remain stuck without approval for production SOP inclusion after 6 months.
    mitigation: Keep human approval in the loop, generate reviewable evidence packs, and involve assurance stakeholders in design-partner reviews.
  - risk: Telemetry integration and offshore deployment are more bespoke than planned
    likelihood: Medium
    impact: Medium
    leadingIndicator: Time from kickoff to first live sortie exceeds 120 days on the first 2 customers due to custom integrations.
    mitigation: Standardize around a minimal initial integration bundle and avoid taking on unsupported vessel classes too early.
  - risk: The beachhead market is too small to support venture returns without adjacency expansion
    likelihood: Medium
    impact: High
    leadingIndicator: First customers renew but do not create credible entry points into adjacent offshore-energy or maritime-inspection fleets by month 18.
    mitigation: Treat offshore wind as a proof wedge and gate later hiring on evidence that adjacent segments share the same buying trigger and telemetry stack.
operatingAssumptions:
- assumption: Offshore wind operators will fund a $40k-90k paid pilot from existing inspection, operations, or drone-program budgets.
  basis: research.yaml
  validationTest: Win 2 paid pilots at the target price from accounts with active vessel-based inspection programs and document budget owner and approval path.
  decisionImpact: If false, pricing, sales motion, and funding plan must shift toward partner-led bundles or a services-heavy model.
- assumption: A minimal telemetry bundle of vessel motion, deck status, weather or wave feed, and aircraft state is sufficient for an MVP recommendation engine.
  basis: research.yaml
  validationTest: Run design reviews with 3 operators and 2 hardware partners, then demonstrate live recommendations on one vessel class without custom sensor work beyond the standard kit.
  decisionImpact: If false, onboarding cost rises materially and the company should narrow to a single hardware stack or fewer vessel classes.
- assumption: Human-supervised audit trails can clear early trust hurdles with safety managers, insurers, and class stakeholders.
  basis: idea.yaml
  validationTest: Present completed evidence packs from pilot sorties to 3 safety or assurance stakeholders and confirm they are sufficient for production review.
  decisionImpact: If false, roadmap must prioritize deeper assurance workflows and slower regulatory engagement before scaling sales.
- assumption: North Sea offshore wind is the fastest path to repeatable proof compared with U.S. offshore wind or broader maritime security markets.
  basis: research.yaml
  validationTest: Compare 10 target accounts across UK and EU versus U.S. prospects on live-program maturity, approval cycle length, and access to drone-capable vessels.
  decisionImpact: If false, geographic focus and partner strategy should shift before expanding the team.
- assumption: Cross-vendor neutrality will matter enough that landing-platform or drone OEMs partner rather than fully subsume the workflow.
  basis: operator judgment
  validationTest: Secure at least 2 integration or referral agreements with hardware or drone vendors without exclusivity that blocks multi-vendor deployment.
  decisionImpact: If false, the company may need to align to one dominant hardware ecosystem or reconsider its independent-platform moat thesis.
experimentRoadmap:
- horizon: 0–90 days
  experiment: Interview 10 offshore wind drone operations leaders and collect 3 months of mission logs or no-go reasons from at least 3 programs.
  hypothesis: Recovery uncertainty is a top-three cause of mission cancellation or delay in the target workflow.
  successMetric: Recovery or landing uncertainty appears in at least 20% of cited no-go decisions and 8 of 10 interviews rate the problem as urgent.
  owner: Founder CEO
- horizon: 0–90 days
  experiment: Sell 2 paid design-partner pilots tied to one live inspection workflow each.
  hypothesis: Buyers will commit budget before a full insurer or class process is completed if the pilot stays advisory and audit-focused.
  successMetric: Two signed pilots in the $40k-90k range with named executive sponsor and defined production conversion criteria.
  owner: Founder CEO
- horizon: 3–6 months
  experiment: Deploy MVP on one vessel class with the standard telemetry bundle and measure approved-sortie rate against the customer's prior manual process.
  hypothesis: Advisory recommendations and audit records can improve approved-sortie rate without increasing recovery incidents.
  successMetric: Approved sortie rate improves by at least 15% versus baseline with zero recovery incidents in pilot operations.
  owner: Founding eng
- horizon: 3–6 months
  experiment: Review pilot evidence packs with safety managers, insurer representatives, or class advisors.
  hypothesis: Audit-ready sortie records materially reduce the trust gap versus manual pilot judgment alone.
  successMetric: At least 3 external or internal assurance stakeholders confirm the evidence pack is sufficient for production review with only minor changes.
  owner: Product lead
- horizon: 6–12 months
  experiment: Launch 2 hardware or drone-OEM integrations and test partner-sourced pipeline.
  hypothesis: Partner channels can reduce integration friction and produce higher-converting pilot opportunities than cold outbound alone.
  successMetric: Two signed integrations and at least 3 qualified pilot introductions from partners, with one pilot closing.
  owner: Partnerships lead
- horizon: 12–18 months
  experiment: Expand the first customer from pilot vessels to fleet rollout and test one adjacent offshore-energy or maritime-inspection account.
  hypothesis: The same mission-assurance workflow will expand inside a fleet first, then transfer to an adjacent maritime segment with limited product change.
  successMetric: First customer grows to at least 4 production vessels and one adjacent-segment pilot closes using the same core telemetry and audit workflow.
  owner: Founder CEO
operations:
- Standardized offshore deployment playbook covering telemetry ingest, threshold calibration, sortie review, and incident escalation
- Conservative model-governance process with human override, post-sortie review, and versioned threshold changes
- Integration library for landing hardware, vessel telemetry, weather feeds, and aircraft telemetry managed as core product assets
- Assurance workflow for packaging sortie evidence for operator SOP, insurer, and class review
- Reference-partner program with landing-platform vendors, vessel integrators, and offshore drone operators
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: Builds the telemetry ingestion, decision engine, and audit-log infrastructure needed for the first live pilot.
- role: 创始人兼 CEO
  startTiming: Month 0
  rationale: Must run founder-led enterprise sales, gather mission data, and shape the narrow beachhead before scaling hiring.
- role: 产品负责人
  startTiming: Month 3
  rationale: Converts pilot workflows and safety feedback into a repeatable product and evidence model.
- role: 现场集成工程师
  startTiming: Month 4
  rationale: Offshore deployment and telemetry integration are frontline adoption blockers and cannot remain ad hoc founder work.
- role: 合作负责人
  startTiming: Month 9
  rationale: Only justified after at least one pilot proves value and the company is ready to sign non-exclusive hardware and channel partners.
milestones:
- horizon: 0–12 months
  items:
  - Sign 2 paid design partners in North Sea offshore wind and deploy advisory-mode pilots on at least 2 vessels.
  - Demonstrate at least 15% higher approved-sortie rate versus baseline with zero recovery incidents in pilot operations.
  - Produce evidence packs accepted for production review by customer safety stakeholders and at least one insurer or class-facing reviewer.
- horizon: 12–24 months
  items:
  - Convert at least 1 pilot into fleet production across 4 or more vessels on annual per-vessel contracts.
  - Reach 3-5 production customers or equivalent 12 active vessels while standardizing onboarding below 90 days.
  - Establish 2 non-exclusive hardware or drone-OEM partnerships that generate qualified pipeline.
- horizon: 24–36 months
  items:
  - Reach the modeled $2.2M SOM through roughly 28 active vessels or equivalent contracted production revenue.
  - Expand into at least 1 adjacent maritime segment only if the same decision engine and audit workflow transfer with limited customization.
  - Decide whether to remain a neutral mission-assurance layer or align more tightly with a partner ecosystem based on distribution and moat data.
risks:
- risk: Landing-hardware adoption and offshore drone rollout remain slower than the plan assumes
  likelihood: Medium
  impact: High
  mitigation: Focus on accounts already operating or piloting vessel-based drone workflows and pace hiring to paid pilot demand.
- risk: Buyers prefer bundled hardware or managed services instead of standalone assurance software
  likelihood: High
  impact: High
  mitigation: Prove cross-vendor audit value, price pilots around production conversion, and use partners for distribution without giving up system-of-record ownership.
- risk: Regulatory, insurer, and class requirements delay production deployment
  likelihood: Medium
  impact: High
  mitigation: Keep the product advisory and human-supervised early, involve assurance stakeholders in pilot design, and ship reviewable evidence rather than black-box autonomy.
- risk: Integration work stays too custom across vessel classes and telemetry stacks
  likelihood: Medium
  impact: Medium
  mitigation: Limit the first year to a narrow set of vessel classes and supported hardware integrations with a standard deployment kit.
- risk: The offshore wind beachhead does not open adjacent markets fast enough
  likelihood: Medium
  impact: High
  mitigation: Treat adjacency as a gated hypothesis and require evidence of shared buyers, telemetry, and approval workflow before expansion hiring.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月资金应足以支持创始产品与现场团队、2-3 个海上风电试点、核心遥测与审计基础设施，以及在更广泛海事扩张前证明试点到生产转化所需的证据建设。
