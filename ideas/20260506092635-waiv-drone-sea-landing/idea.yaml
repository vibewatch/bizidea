topRisks:
  - name: "Category matures slower than expected"
    description: "If maritime landing hardware deployment takes years, software demand could lag behind the thesis."
    mitigation: "Sell first into operators already piloting vessel-based drone programs and partner tightly with landing-platform vendors on early deployments."
  - name: "Too much workflow locked inside OEM stacks"
    description: "Drone or landing-platform vendors may bundle basic operations software and squeeze the independent layer."
    mitigation: "Focus on cross-vendor mission assurance, insurer-grade records, and vessel-system integrations that OEM tools are poorly positioned to own."
  - name: "Safety incident could stall adoption"
    description: "A visible failed recovery at sea could make buyers revert to conservative manual processes."
    mitigation: "Start with advisory mode, build conservative thresholds, and publish incident-review tooling that improves trust after every mission."
