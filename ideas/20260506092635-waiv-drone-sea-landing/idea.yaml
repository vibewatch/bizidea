problem: "Maritime operators can already imagine high-value drone use cases, but they still cannot run them routinely from moving vessels because safe launch and recovery decisions break down in rough conditions. Even if landing hardware exists, every mission still needs someone to judge sea state, vessel motion, battery reserve, and deck readiness with incomplete information. That keeps inspections, urgent spare-part runs, and incident response stuck with manual SOPs, conservative no-go calls, or expensive helicopters and crew dispatch."
targetUser:
  primary: "Drone operations managers at offshore wind and offshore energy service contractors running UAV missions from service vessels."
  secondary: "Vessel masters and marine superintendents responsible for approving launch and recovery windows."
  buyer: "Head of offshore operations or director of UAV programs at the vessel operator or O&M contractor."
startupThesis:
  nonObviousInsight: "Once at-sea autonomous landing becomes technically possible, the next bottleneck is not better drones but software-defined mission release: deciding which vessel, deck, weather window, and recovery envelope are safe enough to fly and producing evidence that operators and insurers trust."
  beachhead: "Offshore wind O&M contractors operating service operation vessels in rough-water regions and trying to replace boat- or technician-led turbine inspection runs with routine vessel-launched drones."
  wedge: "A mission assurance platform that fuses vessel-motion telemetry, sea-state forecasts, pad status, and drone battery constraints into a go/no-go decision, live recovery guidance, and post-mission audit trail for each sortie."
  whyNowCatalyst: "WaiV's funding and claims of automatic takeoff and landing in high sea states make maritime drone recovery newly feasible, which shifts buyer urgency to the operational software layer needed to deploy it safely at fleet scale."
  ventureScalePath: "Winning offshore wind creates the system of record for maritime drone operations, which can expand into oil and gas, coast guard, port security, aquaculture, and eventually any moving-platform autonomy workflow that needs mission release and recovery assurance."
solution: "Build a maritime drone mission assurance OS sold with a lightweight retrofit sensor kit for any drone-ready deck. Before launch, the system ingests weather, wave, vessel-motion, deck, and aircraft telemetry to score mission safety and recommend whether to fly, delay, reroute, or divert to another vessel. During flight, it updates the recovery envelope in real time and coordinates fallback procedures when sea state or deck conditions shift. After landing, it automatically creates the operational record operators need for internal SOPs, customer reporting, and insurer or regulator review. The first product is not another drone or landing pad; it is the control layer that turns new landing hardware into a repeatable maritime workflow."
goToMarketSeed:
  firstCustomer: "North Sea offshore wind O&M contractors with 5-20 service vessels that already use drones intermittently for blade or topside inspections but cannot standardize vessel-based operations in rough weather."
  buyingTrigger: "A mandate to cut technician dispatches or vessel-hours after adopting a drone-ready landing platform or launching a new offshore inspection program."
  currentAlternative: "Manual flight-release checklists, pilot judgment, generic weather tools, and conservative fallback to crew boats, rope access, or helicopters."
  switchingReason: "The platform gives operators a defensible go/no-go decision and mission record that increases sortie success without asking them to trust ad hoc pilot calls on a moving deck."
  pricingHypothesis: "Annual SaaS per active vessel plus a one-time deck sensor kit and usage-based fees for completed assured sorties."
