market:
  tam:
    value: $90.0M
    rationale: '自下而上的估算：全球约 1,200 艘与海上风电、海上能源、公共安全及海事巡检相关的移动甲板船舶 × 每艘活跃船舶约 $75k 的年度任务保障合同 = 约 $90M。交叉验证：欧洲已经在使用约 80 艘专用海上风电船舶，而且随着装机容量从 36.6 GW 增至 2030 年的 84 GW，还必须继续追加船舶投资。'
    isEstimate: true
    sourceRefs:
    - 7
    - 24
    - 22
  sam:
    value: $18.0M
    rationale: '加入滩头约束后：北海和更广欧洲地区约 240 艘海上风电服务、调试和人员转运船舶最可能率先采用 × 约 $75k ACV = 约 $18M。'
    isEstimate: true
    sourceRefs:
    - 7
    - 5
    - 6
    - 22
  som:
    value: $2.2M
    rationale: 第 3 年可触达份额假设约为 28 艘活跃船舶，混合 ACV 约 $80k，包含试点增购和集成服务。
