  wedge: 面向企业巡检工作流的横向远程无人机运营与机库基础设施。
  pricing: 以硬件为主 / 通过经销或报价销售。
  strength: 规模大、分发强，远程运维工具成熟。
  weaknessVsUs: 更适合广义远程运营，而不是在恶劣海况下做移动甲板海事回收决策。
  sourceRefs:
  - 27
  - 16
regulatoryTechnicalConstraints:
- point: BVLOS 无人机作业需要正式审批，而不是普通商业无人机运营即可开展。
  sourceRefs:
  - 15
  - 19
  - 20
- point: Remote ID、豁免和空域管理要求，会在受监管空域里增加额外运营依赖。
  sourceRefs:
  - 18
  - 17
  - 16
- point: 海事部署还必须满足船舶安全、船级社和保险方的预期。
  sourceRefs:
  - 13
  - 14
  - 8
  - 11
- point: 要支持海上回收决策，系统必须以足够低的延迟把船体运动、甲板状态和飞行器遥测集成起来。
  sourceRefs:
  - 2
  - 27
  - 12
- point: 连接性和人工覆盖设计仍然重要，因为今天的无人机辅助检验仍保留一定人工干预。
  sourceRefs:
  - 10
  - 9
validationSignals:
- point: WaiV 刚完成种子轮融资，用于商业化海上自主无人机降落。
  sourceRefs:
  - 1
  - 2
- point: Vattenfall 公开表示，无人机已用于叶片巡检，并正在测试海上备件配送。
  sourceRefs:
  - 5
- point: ESVAGT 已经在海上风电里执行船载无人机巡检，并量化出相较绳索作业的显著时间节省。
  sourceRefs:
  - 6
- point: WindEurope 表示，为支撑海上风电扩张，欧洲必须继续投资船舶和港口。
  sourceRefs:
  - 7
- point: Edda Wind 和美国 CTV 订单公告都说明，服务船队正随着海上风电活动继续扩张。
  sourceRefs:
  - 28
  - 29
- point: ABS、DNV 和 Lloyd's Register 都已发布无人机或远程检验指导文件。
  sourceRefs:
  - 13
  - 9
  - 11
openQuestions:
- 海上无人机任务的禁飞决策中，究竟有多少比例是由降落或回收不确定性驱动，而不是空域、人力或客户排期？
- 买家能否被说服去采购纯软件保障层，还是产品必须与降落硬件或托管服务打包出售？
- 在首个部署中，哪些遥测集成是真正的准入门槛？
- 在买家信任自动回收包线建议之前，究竟需要多深的保险方或船级社参与？
