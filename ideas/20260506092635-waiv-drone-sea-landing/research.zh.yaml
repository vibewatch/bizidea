  validationPlan:
  - priority: high
    question: How often do offshore drone missions fail or get canceled because of recovery uncertainty versus airspace or labor constraints?
    evidenceToGather: Mission logs, no-go reasons, and incident reviews from 3-5 offshore wind drone programs.
  - priority: high
    question: Which telemetry sources are non-negotiable for buyer trust?
    evidenceToGather: Technical integration interviews with vessel operators, landing-pad vendors, and chief drone pilots.
  - priority: medium
    question: Will operators buy standalone assurance software, or must the product be bundled with hardware or services?
    evidenceToGather: Commercial interviews with buyers plus channel discussions with hardware and service partners.
  - priority: medium
    question: What review-rate and false-negative threshold would insurers or class societies tolerate?
    evidenceToGather: Workshops with insurers, class advisors, and safety managers using historical mission scenarios.
  - priority: low
    question: Which adjacent vertical expands first after offshore wind?
    evidenceToGather: Problem interviews and pilot economics across at least two adjacent segments.
