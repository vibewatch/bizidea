openQuestions:
- 海上无人机禁飞决策中，究竟有多大比例真正由降落/回收不确定性驱动，而非空域、人力或客户排期造成？
- 买方能否被说服采用纯软件保障层，还是产品必须与降落硬件或托管服务一起交付？
- 首次部署中，哪些遥测集成是真正的基本门槛？
- 在买方信任自动化回收包线建议之前，需要保险方或船级机构介入到什么程度？
