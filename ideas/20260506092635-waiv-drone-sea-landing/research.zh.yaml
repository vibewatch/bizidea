competitors:
- name: WaiV Robotics
  stage: 种子轮
  wedge: Autonomous takeoff and landing infrastructure for VTOL drones on moving vessels in high sea states.
  pricing: Custom / not publicly listed.
  strength: Owns the physical recovery problem and has fresh capital plus category attention.
  weaknessVsUs: Hardware-led wedge does not automatically become the cross-fleet mission-release and orchestration layer.
  sourceRefs:
  - 1
  - 2
  - 3
- name: Aerones
  stage: 规模化阶段
  wedge: Robotic and drone-enabled wind turbine inspection and maintenance, including offshore applications.
  pricing: Project-based / custom enterprise engagement.
  strength: Deep offshore wind workflow credibility and inspection data depth.
  weaknessVsUs: Service-led positioning makes it less likely to become the neutral system of record for multi-vendor maritime drone operations.
  sourceRefs:
  - 25
  - 26
- name: ESVAGT + AtSite
  stage: 成熟服务提供商
  wedge: Vessel-based offshore wind drone inspection delivered as a managed service from SOVs.
  pricing: Service-contract based.
  strength: Operational credibility with live offshore wind assets and vessels.
  weaknessVsUs: Optimized for delivering inspections, not for selling reusable mission-assurance software across fleets and partners.
  sourceRefs:
  - 6
- name: DJI Enterprise / Dock 2
  stage: 成熟平台
  wedge: Horizontal remote-drone operations and dock infrastructure for enterprise inspection workflows.
  pricing: Hardware-led / reseller- or quote-based.
  strength: Scale, distribution, and mature remote-operations tooling.
  weaknessVsUs: Built for broad remote operations rather than moving-deck maritime recovery decisions under rough-sea conditions.
  sourceRefs:
  - 27
  - 16
