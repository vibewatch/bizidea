reportMemo:
  executiveTakeaways:
  - 海上自主放飞与回收正在变成现实，因此瓶颈正从飞行器本身转向任务保障和回收治理 [1,2,3]。
  - 运营方的需求已经存在：Vattenfall 已经在海上使用巡检无人机，ESVAGT 也量化了相较绳索作业的显著时间节省 [5,6]。
  - 最初市场可信但狭窄：海上风电船舶和港口投资在上升，但滩头阵地仍然高度依赖集成、且运营场景集中 [7,22,28,29]。
  - 竞争格局分散在降落硬件、服务、船级保障以及横向自主平台之间，给中立的编排层留出了空间 [1,25,27]。
  - 监管是真实门槛：FAA、CAA、EASA 和船级指导文件都会把产品推向可审计、人工监督的安全论证，而不是全黑箱自治 [15,17,19,20,13]。
  - 风险投资级上行取决于在第一个用例跑通后能否跨出海上风电；仅靠滩头市场，更像是一家强利基型工业软件公司，而不是广义横向类别 [7,24]。
  marketDefinition: >-
    这个市场是面向海上工业作业中船载无人机的任务保障软件：决定某次架次是否应该放飞、继续、备降并安全回收到移动甲板，同时产出可审计的运行记录。滩头市场是北海以及英国、欧盟等恶劣海域中的海上风电运维；相邻市场包括海上能源、海事巡检、海岸警卫队、港口安保和水产养殖。它不包括飞行器本身、降落硬件、通用机队管理软件，也不包括纯托管式巡检服务。
  customerAndBuyer: >-
    日常用户是无人机运营经理、船长以及海事平台主管，他们要判断一项任务能否从移动甲板安全放飞并完成回收。经济买方最可能是海上运营负责人、船队总监，或海上风电运维承包商、服务船运营方内部的 UAV 项目负责人。预算大概率落在海上运维效率、船队数字化或无人机项目扩张中，因为痛点最终体现在巡检取消、绳索作业人力、船时损失和风险管理上。
  buyingTriggers:
  - point: 一个新的海上无人机或降落平台部署，需要在多艘船上把放飞/禁飞判断标准化。
    sourceRefs:
    - 1
    - 2
    - 16
  - point: 运营方被要求用更快的船载无人机工作流，替代绳索作业或重人力巡检。
    sourceRefs:
    - 5
    - 6
    - 10
  - point: 运营方需要比飞手临场判断更严格地记录 BVLOS 与回收决策。
    sourceRefs:
    - 17
    - 19
    - 20
  willingnessToPay:
    summary: >-
      只要产品被包装成减少船时、降低绳索作业人力并增加完成架次，它的付费意愿就最可信。ESVAGT 表示，一次无人机巡检每台风机约需 25 分钟，而绳索作业需要半天到一天；Vattenfall 也把无人机与更低运营成本联系起来；Lloyd's Register 则把无人机辅助巡检描述为减少中断与风险的方式。
    sourceRefs:
    - 5
    - 6
    - 10
    - 26
  competitiveLandscape: >-
    WaiV 是最接近的相邻赋能者，因为它解决的是移动船舶上的自主回收。Aerones 从服务侧看是更强的海上风电替代方案，ESVAGT 及类似运营方可以把巡检包装成托管服务，DJI 则代表横向自主化技术堆栈。缺口在于一层中立的海事任务保障软件，能跨船舶、降落硬件和无人机 OEM 运行。
  incumbentThesis:
  - incumbentClass: 降落硬件厂商
    point: 降落硬件本身不会自动成为全船队任务放行和保险级审计轨迹的系统记录层。
    sourceRefs:
    - 1
    - 2
  - incumbentClass: 横向无人机平台
    point: 通用机库和远程运维平台并不是为恶劣海况下的移动甲板回收逻辑而优化的。
    sourceRefs:
    - 27
    - 16
    - 20
  - incumbentClass: 托管式海上巡检服务商
    point: 服务商可以卖结果，但这并不意味着它们会成为买家整支船队上的中立软件层。
    sourceRefs:
    - 25
    - 26
    - 6
  - incumbentClass: 船级社与保障机构
    point: 船级机构塑造信任和标准，但通常不会交付面向运营方工作流的软件产品。
    sourceRefs:
    - 13
    - 8
    - 11
  - incumbentClass: 人工 SOP 与内部工具
    point: 人工清单仍是默认方案，但随着正式授权和审计要求提升，可重复的软件层价值也会更高。
    sourceRefs:
    - 5
    - 17
    - 19
  regulatoryLandscape: >-
    FAA 的指导把高阶无人机作业推向豁免、Remote ID 和更正式的高风险审批。英国 CAA 明确 BVLOS 飞行需要 Operational Authorisation，而 EASA 则以 open、specific、certified 三类框架来约束欧洲运营。海事侧，Vattenfall 指出自主船舶还必须满足 IMO 义务，ABS、DNV 和 Lloyd's Register 等船级机构也都已经发布了无人机和远程检验指导文件。
  technologyLandscape: >-
    使能技术堆栈如今已足够可信。WaiV 证明移动船舶上的自动放飞与回收正在落地，Vattenfall 证明带 AI 的无人机已经在做海上巡检和备件配送实验，DNV 与 Lloyd's Register 说明无人机正在进入主流保障工作流，DJI 则展示了远程运维基础设施的成熟度。真正的缺口是海事专用的决策支持层。
  distributionChannels:
  - point: 从一个边界清晰的试点切入，目标是已在尝试船载无人机巡检的海上风电运维承包商或服务船运营方。
    sourceRefs:
    - 5
    - 6
  - point: 与降落平台和移动甲板硬件厂商合作，它们需要一层软件来在全船队范围内标准化运行决策。
    sourceRefs:
    - 1
    - 2
  - point: 把船级社、保险方和船舶集成伙伴当作信任加速器。
    sourceRefs:
    - 13
    - 9
    - 11
  partnershipEcosystem:
  - point: 降落平台厂商是天然的渠道与集成伙伴。
    sourceRefs:
    - 1
    - 2
  - point: 船级社和保障机构可以作为设计合作伙伴，共同定义什么样的运行证据可被接受。
    sourceRefs:
    - 13
    - 8
    - 10
  - point: 一旦某种运行模型被证明成立，服务船运营方可以按船队逐步分发这款产品。
    sourceRefs:
    - 6
    - 7
    - 28
  dataMoats:
  - point: 将回收结果与海况、甲板运动和船型上下文绑定，能够沉淀成专有的海事架次风险数据集。
    sourceRefs:
    - 1
    - 5
    - 6
  - point: 把任务放行决策与真实巡检结果关联起来的审计日志，能在保险方和船级伙伴面前形成可防御数据资产。
    sourceRefs:
    - 10
    - 13
    - 9
  geographicConsiderations:
  - point: 北海及更广的英国、欧盟海上风电走廊是正确滩头，因为海上风电密度高，而且 CAA/EASA 的路径已经存在。
    sourceRefs:
    - 7
    - 19
    - 20
    - 5
  - point: 美国也有吸引力，但大概率更慢，因为 FAA 审批和 BOEM 推动的海上风电建设周期更长。
    sourceRefs:
    - 15
    - 17
    - 24
  sensitivityCases:
  - case: 降落硬件部署速度低于预期
    impact: 软件需求会在更长时间里停留在建议模式和重服务状态。
    sourceRefs:
    - 1
    - 2
  - case: 可触达船舶数量小于模型假设
    impact: 由于产品按活跃船舶出售，滩头市场的 SAM 会被迅速压缩。
    sourceRefs:
    - 7
    - 22
    - 28
  - case: 监管审批仍然高度定制且进展缓慢
    impact: 漫长的 BVLOS 和 specific-category 审批时间会拉长试点，并拖延第 3 年 SOM。
    sourceRefs:
    - 17
    - 19
    - 20
  validationPlan:
  - priority: high
    question: 在海上无人机任务失败或取消中，回收不确定性相对空域或人力约束究竟占多大比例？
    evidenceToGather: 从 3-5 个海上风电无人机项目收集任务日志、禁飞原因和事故复盘。
  - priority: high
    question: 买家要建立信任，哪些遥测数据源是绝对不能缺的？
    evidenceToGather: 与船舶运营方、降落平台厂商和首席飞手进行技术集成访谈。
  - priority: medium
    question: 运营方会单独购买保障软件，还是产品必须和硬件或服务打包？
    evidenceToGather: 与买家做商业访谈，并与硬件和服务伙伴讨论渠道形态。
  - priority: medium
    question: 保险方或船级社能容忍的复核率与漏报阈值是多少？
    evidenceToGather: 与保险方、船级顾问和安全经理基于历史任务场景开研讨会。
  - priority: low
    question: 在海上风电之后，哪个相邻垂直会最先扩张？
    evidenceToGather: 在至少 2 个相邻细分里做问题访谈和试点经济性评估。
