scenarios:
  downside:
    description: 硬件部署推进和试点转化均出现延迟，因此船舶增长更慢，混合 ARPU 也落在定价区间低位。
    y3RevenueK: 1360.0
    y3EbitdaK: -722.1
    cashLowPointK: 93.7
    keyAssumptionChanges:
    - 每艘活跃船舶的混合 ARPU 从 $90K 降到 $85K。
    - 由于伙伴渠道带来的部署更少，Y3 期末活跃船舶从 28 艘降到 22 艘。
    - 招聘大体仍按计划推进，因此较低收入并未被成本节省充分抵消。
  base:
    description: 第 1 年的 2 个付费试点转成可复制的船队扩张和伙伴转介绍，到 Q4Y3 达到 28 艘活跃船舶。
    y3RevenueK: 1747.9
    y3EbitdaK: -479.2
    cashLowPointK: 461.2
    keyAssumptionChanges:
    - 每艘活跃船舶的混合 ARPU 维持在 $90K。
    - 客户爬坡达到 Y1 期末 3 艘、Y2 期末 12 艘、Y3 期末 28 艘。
    - 在最初的现场与合作团队就位后，只再增加 3 个精简扩张岗位。
  upside:
    description: 试点证明更早出现，伙伴渠道加快部署，且按量和设置收入把混合 ARPU 抬到中位数以上。
    y3RevenueK: 2311.8
    y3EbitdaK: -125.0
    cashLowPointK: 952.9
    keyAssumptionChanges:
    - 每艘活跃船舶的混合 ARPU 从 $90K 提升到 $95K。
    - 受更快的伙伴辅助铺开推动，Y3 期末活跃船舶从 28 艘增至 32 艘。
    - 只要客户导入维持在 90 天以内，同样的精简招聘计划就足以支撑上行情景。
sensitivity:
- variable: ARPU
  downsideCase: 每艘活跃船舶的混合年 ARPU 为 $80K
  baseCase: 每艘活跃船舶的混合年 ARPU 为 $90K
  upsideCase: 每艘活跃船舶的混合年 ARPU 为 $100K
  y3RevenueImpactK: -194.2
  cashImpactK: -136.0
- variable: CAC
  downsideCase: 由于试点需要更多直销投入，每艘活跃船舶 CAC 升至 $45K
  baseCase: 每艘活跃船舶 CAC 为 $30.9K
  upsideCase: 在更强伙伴获客下，每艘活跃船舶 CAC 降至 $25K
  y3RevenueImpactK: -120.0
  cashImpactK: -352.5
- variable: churn
  downsideCase: 若试点到生产匹配度偏弱，月度流失率升至 2.5%
  baseCase: 月度流失率为 1.5%
  upsideCase: 若船队扩张与留存更强，月度流失率降至 1.0%
  y3RevenueImpactK: -160.0
  cashImpactK: -120.0
- variable: 销售周期
  downsideCase: 因安全与保险审查拖慢，销售周期拉长到 9 个月
  baseCase: 销售周期为 6 个月
  upsideCase: 在设计合作伙伴紧迫性更强时，销售周期缩短到 4 个月
  y3RevenueImpactK: -387.9
  cashImpactK: -367.5
- variable: 毛利率
  downsideCase: 若海上支持与遥测成本仍过于定制，毛利率降至 65%
  baseCase: 毛利率为 70%
  upsideCase: 若集成标准化更充分，毛利率升至 75%
  y3RevenueImpactK: 0.0
  cashImpactK: -87.4
- variable: 招聘节奏
  downsideCase: 在可复制性尚未证明前提前招入 1 个额外岗位
  baseCase: 团队在 Y3 保持精简，达到 8 FTE
  upsideCase: 1 个扩张岗位延后到 4 艘以上船舶铺开上线后再补
  y3RevenueImpactK: 90.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      TargetAccounts[目标账户] --> PaidPilots[付费试点]
      Partners[伙伴渠道] --> PaidPilots
      PaidPilots --> ActiveVessels[活跃船舶]
      ActiveVessels --> Revenue[收入]
      Revenue --> GrossProfit[毛利]
      GrossProfit --> Cash[现金]
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入由活跃船舶扩张驱动：Y1 期末 3 艘，Y3 期末 28 艘，混合 ARPU 约为 $90K。
- checkName: 必须成立的条件
  finding: 至少 1 个 Y1 试点必须在 Y2 转成覆盖 4 艘以上船舶的正式铺开，12 艘活跃船舶的跳升才成立。
- checkName: 模型失效条件
  finding: 如果销售周期拖向 9 个月，或买家要求与服务打包，验证规模化之前的下行情景现金就会逼近 0。
- checkName: 下一轮融资证明点
  finding: 当公司证明拥有 3-5 个正式生产客户、12 艘活跃船舶、低于 90 天的客户导入，以及伙伴来源部署时，下一轮融资就有了充分依据。
sanityChecks:
  ruleOf40: Y3 增长率 166.2% 加 EBITDA 利润率 -27.4%，得到 138.8%。
  burnMultiple: Y2 的烧钱倍数为 1.1x，对应年末 ARR 扩张；Y3 改善到 0.3x。
  revenuePerFte: Y3 平均每位 FTE 收入为 $218.5K（SaaS 基准约 $200-400K；工业现场软件通常更靠近区间低位）。
  flags:
  - 基础情景把活跃船舶视为客户单位；如果买家坚持船队级或服务化定价，CAC 和毛利都会比模型显示更差。
  - 模型按当期回款处理，但海上企业合同通常会在开票后 30-90 天才回款。
  - 滩头市场仍然狭窄，因此风险投资级上行依然依赖在参考部署后跨出北海海上风电。
  - 基础情景下 Y3 EBITDA 仍为负，因此下一轮更需要证明可复制性，而不是证明盈利能力。
