slug: sea-state-drone-assurance
date: '2026-05-06'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[business-plan.yaml date] 取 2026-05-06 计划日期后的首个完整运营月份。'
- id: A2
  name: pre-seed 轮期初现金
  value: '2600'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] 按已给出的 $2-4M 区间偏下中部建模，并按 Y2 里程碑外加 6 个月缓冲来测算。'
- id: A3
  name: 收入计量单位
  value: 产生收入的活跃船舶
  unit: definition
  source: '[business-plan.yaml businessModel.unitOfValue] 模型按活跃船舶而非企业账号计价和计客户。'
- id: A4
  name: 每艘活跃船舶的混合年 ARPU
  value: '90'
  unit: USDK/year
  source: '[business-plan.yaml investorMemo.firstCustomer + gtm.pricing] 基于每艘船舶 $75k-100k 的年度软件费，再叠加适度的设置费和按量增量收入。'
- id: A5
  name: 首个付费试点月份
  value: '4'
  unit: month
  source: '[business-plan.yaml experimentRoadmap 0-90 days] 基础情景假设首个付费试点在第 4 个月签下，此前完成最初需求发现与设置。'
- id: A6
  name: 活跃船舶爬坡
  value: Y1 期末 3 艘，Y2 期末 12 艘，Y3 期末 28 艘
  unit: customers
  source: '[business-plan.yaml milestones; market.som; experimentRoadmap] 与第 1 年 2 个付费试点、第 12-24 个月 12 艘活跃船舶，以及研究中约 28 艘的 SOM 保持一致。'
- id: A7
  name: 毛利率目标
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] 在确认收入上按 30% COGS 建模。'
- id: A8
  name: 创始人/CEO 全负担年现金成本
  value: '144'
  unit: USDK/year
  source: '创业财务经验值：pre-seed 工业 SaaS 创始人按 $120K 薪资加 20% 税费与福利估算。'
- id: A9
  name: 创始工程师全负担年现金成本
  value: '192'
  unit: USDK/year
  source: '创业财务经验值：资深遥测/产品工程按 $160K 薪资加 20% 税费与福利估算。'
- id: A10
  name: 产品负责人全负担年现金成本
  value: '168'
  unit: USDK/year
  source: '创业财务经验值：按 $140K 薪资加 20% 税费与福利估算。'
- id: A11
  name: 现场集成工程师全负担年现金成本
  value: '156'
  unit: USDK/year
  source: '创业财务经验值：面向海上部署支持的岗位按 $130K 薪资加 20% 税费与福利估算。'
- id: A12
  name: 合作负责人全负担年现金成本
  value: '150'
  unit: USDK/year
  source: '[business-plan.yaml team] 在首个试点验证后入场的早期伙伴拓展岗位，按创业财务经验值估算。'
- id: A13
  name: 第二名软件工程师全负担年现金成本
  value: '192'
  unit: USDK/year
  source: '创业财务经验值：与创始工程师相同，用于可复用的遥测和产品研发。'
- id: A14
  name: 客户经理全负担年现金成本
  value: '156'
  unit: USDK/year
  source: 工业软件销售动作中首位企业销售岗位的创业财务经验值。
- id: A15
  name: 客户成功 / 运营全负担年现金成本
  value: '132'
  unit: USDK/year
  source: '创业财务经验值：按 $110K 薪资加 20% 税费与福利估算，用于客户导入和客户运营。'
- id: A16
  name: 研发非薪酬支出
  value: Y1 为 7，Y2 为 8，Y3 为 9，另加每艘活跃船舶每月 0.2
  unit: USDK/month
  source: 用于云、遥测基础设施、工具链和海上测试成本的创业财务经验值。
- id: A17
  name: 销售与市场非薪酬支出
  value: Y1 为 4，Y2 为 5，Y3 为 6，另加每艘活跃船舶每月 0.1 以及收入的 3%
  unit: USDK/month
  source: 用于差旅、演示、会议、伙伴赋能和轻量佣金的创业财务经验值。
- id: A18
  name: G&A 非薪酬支出
  value: Y1 为 5，Y2 为 6，Y3 为 7，另加每艘活跃船舶每月 0.1
  unit: USDK/month
  source: 用于法务、保险、审计和海上运营后台需求的创业财务经验值。
- id: A19
  name: 招聘时点
  value: 产品负责人在 M3，现场集成工程师在 M4，合作负责人在 M9，软件工程师在 M13，客户经理在 M19，客户成功 / 运营在 M25
  unit: plan
  source: '[business-plan.yaml team] 前 5 个岗位跟随计划，其后新增岗位是支撑 12 艘以上活跃船舶所需的精简扩编。'
- id: A20
  name: 用于单位经济模型的月度流失率
  value: '1.5'
  unit: percent
  source: 面向买方集中的早期企业级工业软件、且实施工作量较高的创业财务经验值。
- id: A21
  name: 每艘活跃船舶的混合 CAC
  value: '30.9'
  unit: USDK/customer
  source: 由模型第 2-3 年销售与市场支出 $771.4K 除以 25 艘净新增活跃船舶计算得出。
- id: A22
  name: 现金转化时点
  value: EBITDA 近似经营现金流
  unit: policy
  source: '创业财务经验值：现阶段不显著建模债务、CapEx 或营运资金波动；但海上企业合同回款可能滞后，需特别标注。'
- id: A23
  name: 融资里程碑
  value: 3-5 个正式生产客户 / 12 艘活跃船舶，1 个覆盖 4 艘以上船舶的船队铺开，2 个伙伴集成，以及客户导入低于 90 天
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months] 用于界定本轮融资规模和下一轮证明点。'
