scenarios:
  downside:
    description: 硬件 rollout 和试点转化延迟，因此船舶增长更慢，综合 ARPU 落在定价区间低端附近。
    y3RevenueK: 1360.0
    y3EbitdaK: -722.1
    cashLowPointK: 93.7
    keyAssumptionChanges:
    - Blended ARPU falls from $90K to $85K per active vessel.
    - Y3 exit active vessels fall from 28 to 22 because partner channels produce fewer deployments.
    - Hiring stays mostly on plan, so lower revenue is not fully offset by cost savings.
  base:
    description: Y1 的两个付费试点转化为可重复的舰队扩张和合作伙伴转介绍，到 Q4Y3 达到 28 艘活跃船舶。
    y3RevenueK: 1747.9
    y3EbitdaK: -479.2
    cashLowPointK: 461.2
    keyAssumptionChanges:
    - Blended ARPU holds at $90K per active vessel.
    - Customer ramp reaches 3 vessels at Y1 exit, 12 at Y2 exit, and 28 at Y3 exit.
    - Lean hiring adds only three scale hires after the initial field and partnerships team is in place.
  upside:
    description: 试点验证更早完成，合作伙伴渠道加快部署速度，使用/部署收入将综合 ARPU 推高到中位数以上。
    y3RevenueK: 2311.8
    y3EbitdaK: -125.0
    cashLowPointK: 952.9
    keyAssumptionChanges:
    - Blended ARPU rises from $90K to $95K per active vessel.
    - Y3 exit active vessels rise from 28 to 32 on faster partner-assisted rollout.
    - The same lean hiring plan supports the upside because onboarding stays below 90 days.
sensitivity:
- variable: ARPU
  downsideCase: $80K blended annual ARPU per active vessel
  baseCase: $90K blended annual ARPU per active vessel
  upsideCase: $100K blended annual ARPU per active vessel
  y3RevenueImpactK: -194.2
  cashImpactK: -136.0
- variable: CAC
  downsideCase: $45K CAC per active vessel because pilots require more direct selling
  baseCase: $30.9K CAC per active vessel
  upsideCase: $25K CAC per active vessel on stronger partner sourcing
  y3RevenueImpactK: -120.0
  cashImpactK: -352.5
- variable: churn
  downsideCase: 2.5% monthly churn from weak pilot-to-production fit
  baseCase: 1.5% monthly churn
  upsideCase: 1.0% monthly churn with strong fleet expansion and retention
  y3RevenueImpactK: -160.0
  cashImpactK: -120.0
- variable: sales cycle
  downsideCase: 9 months because safety and insurer review drags
  baseCase: 6 months
  upsideCase: 4 months with stronger design-partner urgency
  y3RevenueImpactK: -387.9
  cashImpactK: -367.5
- variable: gross margin
  downsideCase: 65% because offshore support and telemetry costs stay bespoke
  baseCase: 70%
  upsideCase: 75% with standardized integrations
  y3RevenueImpactK: 0.0
  cashImpactK: -87.4
- variable: hiring pace
  downsideCase: One extra hire is pulled forward before repeatability is proven
  baseCase: Lean team reaches 8 FTE in Y3
  upsideCase: One scale hire is delayed until after a 4+ vessel rollout is live
  y3RevenueImpactK: 90.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  TargetAccounts[目标客户] --> PaidPilots[付费试点]\n  Partners[合作伙伴] --> PaidPilots\n  PaidPilots --> ActiveVessels[活跃船舶]\n  ActiveVessels --> Revenue[收入]\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: Base-case revenue is driven by active-vessel expansion from 3 at Y1 exit to 28 at Y3 exit at roughly $90K blended ARPU.
- checkName: 必须成立的前提
  finding: At least one Y1 pilot must convert into a 4+ vessel production rollout by Y2 for the jump to 12 active vessels to work.
- checkName: 模型失效条件
  finding: If the sales cycle stretches toward 9 months or buyers demand bundled services, downside cash falls close to zero before scale is proven.
- checkName: 下一轮融资验证点
  finding: The next financing is justified once the company shows 3-5 production customers, 12 active vessels, sub-90-day onboarding, and partner-sourced deployments.
sanityChecks:
  ruleOf40: Y3 growth 166.2% + EBITDA margin -27.4% = 138.8%.
  burnMultiple: Y2 burn multiple 1.1x on end-of-year ARR expansion, improving to 0.3x in Y3.
  revenuePerFte: $218.5K Y3 revenue per average FTE (benchmark $200-400K for SaaS; industrial field software often sits near the low end).
  flags:
  - The base case uses active vessels as the customer unit; if buyers insist on fleet-level or services-led pricing, CAC and margin will look worse than shown.
  - Cash collections are modeled in-period even though offshore enterprise contracts can pay 30-90 days after invoice.
  - The beachhead remains narrow, so venture-scale upside still depends on expansion beyond North Sea offshore wind after reference deployments.
  - Y3 EBITDA is still negative in the base case, so the next round likely requires proof of repeatability more than proof of profitability.
