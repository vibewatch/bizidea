slug: sea-state-drone-assurance
date: '2026-05-06'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[business-plan.yaml date] first full operating month after the 2026-05-06 plan date.'
- id: A2
  name: Pre-seed 轮期初现金
  value: '2600'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] modeled near the lower-middle of the stated $2-4M range and sized to the Y2 milestone plus a 6-month buffer.'
- id: A3
  name: 收入单位
  value: Active revenue-generating vessel
  unit: definition
  source: '[business-plan.yaml businessModel.unitOfValue] pricing and customer counts are modeled per active vessel rather than per corporate logo.'
- id: A4
  name: 每艘活跃船舶的综合年度 ARPU
  value: '90'
  unit: USDK/year
  source: '[business-plan.yaml investorMemo.firstCustomer + gtm.pricing] based on $75k-100k annual per-vessel software plus modest setup/usage uplift.'
- id: A5
  name: 首个付费试点月份
  value: '4'
  unit: month
  source: '[business-plan.yaml experimentRoadmap 0-90 days] base case assumes the first paid pilot closes in month 4 after initial discovery and setup.'
- id: A6
  name: 活跃船舶爬坡
  value: 3 vessels at Y1 exit, 12 at Y2 exit, 28 at Y3 exit
  unit: customers
  source: '[business-plan.yaml milestones; market.som; experimentRoadmap] aligns to 2 paid pilots in year 1, 12 active vessels by 12-24 months, and the research SOM of ~28 vessels by year 3.'
- id: A7
  name: 毛利率目标
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] used as 30% COGS on recognized revenue.'
- id: A8
  name: 创始人兼 CEO 全负荷年度现金成本
  value: '144'
  unit: USDK/year
  source: 'startup-finance heuristic: $120K salary plus 20% payroll tax and benefits for a pre-seed industrial SaaS founder.'
- id: A9
  name: 创始工程师全负荷年度现金成本
  value: '192'
  unit: USDK/year
  source: 'startup-finance heuristic: $160K salary plus 20% payroll tax and benefits for senior telemetry/product engineering.'
- id: A10
  name: 产品负责人全负荷年度现金成本
  value: '168'
  unit: USDK/year
  source: 'startup-finance heuristic: $140K salary plus 20% payroll tax and benefits.'
- id: A11
  name: 现场集成工程师全负荷年度现金成本
  value: '156'
  unit: USDK/year
  source: 'startup-finance heuristic: $130K salary plus 20% payroll tax and benefits for offshore deployment support.'
- id: A12
  name: 合作负责人全负荷年度现金成本
  value: '150'
  unit: USDK/year
  source: '[business-plan.yaml team] startup-finance heuristic for an early partner-development hire after first pilot proof.'
- id: A13
  name: 第二名软件工程师全负荷年度现金成本
  value: '192'
  unit: USDK/year
  source: 'startup-finance heuristic: same fully loaded cost as the founding engineer for repeatable telemetry and product work.'
- id: A14
  name: 客户经理全负荷年度现金成本
  value: '156'
  unit: USDK/year
  source: startup-finance heuristic for a first enterprise seller in an industrial software motion.
- id: A15
  name: 客户成功 / 运营全负荷年度现金成本
  value: '132'
  unit: USDK/year
  source: 'startup-finance heuristic: $110K salary plus 20% payroll tax and benefits for onboarding and customer operations.'
- id: A16
  name: 研发非薪酬支出
  value: 7 in Y1, 8 in Y2, 9 in Y3 plus 0.2 per active vessel monthly
  unit: USDK/month
  source: startup-finance heuristic for cloud, telemetry infrastructure, tooling, and offshore test costs.
- id: A17
  name: 销售与市场非薪酬支出
  value: 4 in Y1, 5 in Y2, 6 in Y3 plus 0.1 per active vessel monthly and 3% of revenue
  unit: USDK/month
  source: startup-finance heuristic for travel, demos, conferences, partner enablement, and light commissions.
- id: A18
  name: 管理与行政非薪酬支出
  value: 5 in Y1, 6 in Y2, 7 in Y3 plus 0.1 per active vessel monthly
  unit: USDK/month
  source: startup-finance heuristic for legal, insurance, audit, and back-office needs in offshore operations.
- id: A19
  name: 招聘时点
  value: Product in M3, field integration in M4, partnerships in M9, software engineer in M13, AE in M19, customer success/ops in M25
  unit: plan
  source: '[business-plan.yaml team] first five hires follow the plan; later hires are lean startup-finance additions required to support 12+ active vessels.'
- id: A20
  name: 单位经济模型的月流失率
  value: '1.5'
  unit: percent
  source: startup-finance heuristic for early enterprise industrial software with concentrated buyers and high implementation effort.
- id: A21
  name: 每艘活跃船舶的综合 CAC
  value: '30.9'
  unit: USDK/customer
  source: calculated from model Y2-Y3 sales and marketing spend of $771.4K divided by 25 net new active vessels.
- id: A22
  name: 现金转化时点
  value: EBITDA approximates operating cash flow
  unit: policy
  source: 'startup-finance heuristic: no debt, capex, or working-capital swings are modeled materially at this stage; flagged because offshore enterprise collections can lag.'
- id: A23
  name: 融资里程碑
  value: 3-5 production customers / 12 active vessels, one 4+ vessel fleet rollout, 2 partner integrations, onboarding below 90 days
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months] used to size the current round and next-round proof point.'
