  milestone: 达到 12 艘活跃船舶、覆盖 3-5 个正式生产客户，把 1 个试点转成 4 艘以上船舶的正式铺开，并证明 2 个伙伴来源部署能在 90 天内完成客户导入。
  useOfFunds:
