jobsToBeDone:
  - job: 当海上巡检窗口中的海况发生变化时，帮助无人机运营经理判断一项船载任务能否安全放飞并完成回收，从而避免无效调度和失败降落。
    currentAlternative: 人工 SOP 加飞手经验
    successMetric: 在零回收事故前提下的获批架次率
