problem: >-
  海事运营方已经能想象很多高价值的无人机场景，但他们仍然无法在移动船舶上把这类任务常态化跑起来，因为一到恶劣海况，安全的放飞与回收决策就会失灵。即便降落硬件已经存在，每次任务仍要有人在信息不完整的情况下判断海况、船体运动、电池余量和甲板就绪状态。这让巡检、紧急备件运送和事故响应继续卡在人工 SOP、过度保守的禁飞判断，或昂贵的直升机与船员调度上。
targetUser:
  primary: 在海上风电与海上能源服务承包商中，负责从服务船执行 UAV 任务的无人机运营经理。
  secondary: 负责批准放飞与回收窗口的船长和海事平台主管。
  buyer: 船舶运营方或运维承包商内部的海上运营负责人，或 UAV 项目总监。
startupThesis:
  nonObviousInsight: 一旦海上自主降落在技术上变得可行，下一个瓶颈就不再是更好的无人机，而是软件定义的任务放行：判断哪艘船、哪块甲板、哪个天气窗口和哪条回收包线足够安全可以起飞，并产出运营方和保险方都信任的证据。
  beachhead: 在北海等恶劣海域运营服务作业船的海上风电运维承包商——他们正试图用常态化的船载无人机，替代依赖船只或技师的风机巡检。
  wedge: 一个任务保障平台，把船体运动遥测、海况预报、起降坪状态和无人机电池约束融合成每次架次的放行/禁飞决策、实时回收指引和任务后审计记录。
  whyNowCatalyst: WaiV 的融资，以及其在高海况下实现自动起降的说法，让海上无人机回收第一次变得真正可行；买家的紧迫点因此转移到如何用运营软件把它安全地部署到整个船队。
  ventureScalePath: 先在海上风电拿下海事无人机运营的系统记录位，再向油气、海岸警卫队、港口安保、水产养殖，最终扩展到一切需要任务放行与回收保障的移动平台自主作业。
solution: >-
  打造一套海事无人机任务保障 OS，并配一套可轻量改装到任意已具备无人机能力甲板上的传感器组件。放飞前，系统接入天气、波浪、船体运动、甲板和飞行器遥测，为任务安全性打分，并建议起飞、延后、改线或切换到另一艘船。飞行中，它会实时更新回收包线，并在海况或甲板条件变化时协调后备流程。落地后，系统会自动生成运营方为内部 SOP、客户汇报以及保险方或监管方审查所需的作业记录。第一款产品不是另一架无人机，也不是另一块降落坪，而是把新降落硬件变成可重复海事工作流的控制层。
goToMarketSeed:
  firstCustomer: 北海海上风电运维承包商，拥有 5-20 艘服务作业船，已间歇性使用无人机做叶片或顶部结构巡检，但无法在恶劣天气中把船载作业标准化。
  buyingTrigger: 在采用无人机降落平台之后，或启动新的海上巡检项目后，被要求削减技师出勤或船时。
  currentAlternative: 人工飞行放行清单、飞手经验、通用天气工具，以及保守地退回到作业船、绳索作业或直升机。
  switchingReason: 平台能给出站得住脚的放飞/禁飞判断和任务记录，让运营方不必把移动甲板上的关键决策继续押在临场经验上。
  pricingHypothesis: 按活跃船舶收取年度 SaaS 费用，外加一次性甲板传感器套件，以及按完成的保障架次计费。
whyNow:
  - point: 已有获资助的创业公司验证，海事 UAV 降落基础设施正在从概念变成现实，因此相邻的软件层可以直接叠加在新部署的硬件之上，而不用继续等核心技术成熟。
    signalRefs: [资本正在验证海事无人机基础设施层]
    sourceRefs: [1]
  - point: 高海况下的自动 VTOL 起降意味着，运营方终于可以围绕常态化船载无人机任务来排班，而新的卡点就变成任务放行与回收保障。
    signalRefs: [自主回收跨过技术门槛]
    sourceRefs: [2]
  - point: 媒体反复点名恶劣海况降落是最顽固的运营缺口，这让能降低禁飞不确定性和失败回收风险的产品变得更紧迫。
    signalRefs: [降落仍是最顽固的卡点]
    sourceRefs: [3]
  - point: 首个平台通常会带来跨船舶、跨合作方的碎片化部署，因此市场会需要一层中立软件，把全船队的决策和记录标准化。
    signalRefs: [首个平台时刻催生集成需求]
    sourceRefs: [2]
differentiator: >-
  大多数无人机软件做到飞行规划或陆地机队管理就停了。本公司要拿下更难的海事决策层：动态回收包线、按船型定义的甲板就绪判断，以及移动平台上的可审计任务放行。这会通过海况、船型、甲板几何和回收结果等专有运营数据形成护城河，也让公司成为多个无人机 OEM 和降落坪厂商之间的编排层，而不是被锁死在单一机型里。
