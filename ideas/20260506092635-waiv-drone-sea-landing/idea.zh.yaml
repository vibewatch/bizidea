topRisks:
  - name: 品类成熟速度低于预期
    description: 如果海事降落硬件还要多年才会铺开，软件需求就可能落后于这套判断。
    mitigation: 优先卖给已经在试点船载无人机项目的运营方，并在早期部署中与降落平台厂商深度绑定。
  - name: 过多工作流被锁进 OEM 堆栈
    description: 无人机或降落平台厂商可能把基础运营软件一起打包，挤压独立软件层的空间。
    mitigation: 聚焦跨厂商任务保障、保险级记录，以及 OEM 工具不擅长掌握的船载系统集成。
  - name: 一场安全事故就可能拖慢采用
    description: 一次高可见度的海上回收失败，可能让买家重新退回保守的人工流程。
    mitigation: 先从建议模式起步，设定保守阈值，并提供每次任务后都能提升信任的事故复盘工具。
