problem: >-
  Regional cancer networks want to expand advanced radiotherapy access, but conventional builds demand huge capital,
  new space, and years of confidence that enough patients will arrive. Compact upright systems reduce the hardware
  footprint, yet the launch still fails if the center cannot forecast eligible volume, win payer approval, and convert
  community referrals into filled treatment slots. Today that work is spread across spreadsheets, referral coordinators,
  medical physicists, and revenue-cycle teams, so expensive rooms go live with avoidable utilization risk.
targetUser:
  primary: >-
    VP of radiation oncology operations at a regional cancer network launching its first compact upright radiotherapy
    room
  secondary: >-
    Chief medical physicist or oncology service-line analyst responsible for commissioning and throughput
  buyer: >-
    SVP of oncology or cancer-network CFO sponsoring radiation service-line expansion
startupThesis:
  nonObviousInsight: >-
    Once advanced radiotherapy no longer needs a 29,000-square-foot mega-project, the bottleneck shifts from
    construction to demand certainty: the winner is the software layer that proves which patients to route, authorize,
    and schedule so a smaller room becomes financially predictable.
  beachhead: >-
    U.S. regional cancer networks with 2-8 hospital campuses, one underused radiation vault or ambulatory shell, and
    an approved plan to launch a first compact upright radiotherapy room within 18 months
  wedge: >-
    A deployment-to-utilization control plane that mines historical cases and referral flows to forecast treatable
    volume, generates payer-ready authorization packets by indication, and turns go-live slot inventory into a managed
    patient pipeline
  whyNowCatalyst: >-
    Leo's signed contract base and dramatic footprint reduction mean upright radiotherapy is moving from rare flagship
    buildouts to a broader rollout, which forces cancer networks to solve launch economics and referral operations now.
  ventureScalePath: >-
    Start with upright radiotherapy launches, then expand into compact proton, MR-linac, and other high-capex oncology
    modalities where health systems need volume forecasting, authorization orchestration, and cross-site utilization
    optimization.
solution: >-
  The startup sells a utilization and access OS built specifically for compact radiotherapy launches. Before purchase or
  retrofit approval, it connects to EHR, tumor-board, referral, and claims data to estimate eligible case volume,
  payer mix, and contribution margin by indication and geography. During commissioning, it produces insurer-specific
  medical-necessity packets, tracks missing records, and routes likely candidates from affiliated oncologists into
  consult slots. After go-live, it monitors denial reasons, referral leakage, schedule fill, and no-show risk so the
  new room reaches target throughput without overstaffing. Over time, the company becomes the operating layer between
  novel radiation hardware vendors, provider networks, and payers.
goToMarketSeed:
  firstCustomer: >-
    A U.S. cancer network with 3-6 campuses, one retrofit-ready radiation vault, and more than 20 community-oncology
    referral partners preparing its first upright radiotherapy suite
  buyingTrigger: >-
    Board approval for a compact radiotherapy purchase or the room-retrofit kickoff that starts payer contracting and
    referral-ramp planning
  currentAlternative: >-
    Spreadsheet-based service-line planning plus manual prior authorization, referral coordination, and OEM
    professional services
  switchingReason: >-
    The first customer switches because this wedge turns a hardware bet into a measurable launch plan with patient-volume
    forecasts, indication-specific auth support, and daily utilization visibility that generic PMO tools cannot provide.
  pricingHypothesis: >-
    Annual SaaS priced per launched treatment room with a one-time implementation fee for historical-case ingestion and
    payer configuration
