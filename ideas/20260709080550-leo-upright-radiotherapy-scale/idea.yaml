differentiator: >-
  OEM deployment teams optimize a single hardware sale, while this company optimizes ongoing room utilization across
  referrals, authorizations, and multi-site scheduling. Generic hospital BI tools can report volume after the fact, but
  they do not encode radiation-oncology eligibility rules, payer packet assembly, or launch-specific slot economics.
  That creates a compounding data moat around which indications, payers, and referral partners actually make compact
  radiotherapy programs succeed.
