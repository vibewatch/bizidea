topRisks:
  - name: Slow adoption pace
    description: If upright radiotherapy deployments slip or contracts convert slowly, the initial installed base may grow more slowly than the company plans.
    mitigation: Build the first product so it also supports compact proton, MR-linac, and other oncology-room launches that share the same utilization and authorization problem.
  - name: OEM channel squeeze
    description: Hardware vendors may try to bundle basic deployment dashboards and limit access to customer relationships.
    mitigation: Own the cross-site payer, referral, and utilization workflows that span multiple vendors and sit outside the OEM's natural product boundary.
  - name: Clinical-trust gap
    description: Radiation-oncology teams may resist software recommendations if patient-eligibility logic feels opaque or overly automated.
    mitigation: Start with transparent rules, clinician-in-the-loop review, and launch-specific ROI dashboards that prove the system's predictions against live outcomes.
