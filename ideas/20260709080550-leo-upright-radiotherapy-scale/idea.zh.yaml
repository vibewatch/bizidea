problem: 区域癌症网络都想扩大先进放疗的可及性，但传统方案要砸下巨额资本、腾出新空间，还得提前几年赌会有足够患者进来。小型直立式系统把硬件占地压下来了，可如果中心算不准合格患者量、拿不下支付方授权、也接不住社区转诊，项目一样会在上线时掉链子。现在这套活分散在电子表格、转诊协调员、医学物理师和收入周期团队手里，所以昂贵治疗室一投运，就背着本可避免的利用率风险。
targetUser:
  primary: 正在为首个小型直立式放疗治疗室做上线准备的区域癌症网络放疗运营副总裁
  secondary: 负责调试投运和吞吐的首席医学物理师或肿瘤服务线分析师
  buyer: 主导放疗服务线扩张的肿瘤业务高级副总裁或癌症网络 CFO
startupThesis:
  nonObviousInsight: 当先进放疗不再需要 29,000 平方英尺的巨型工程，瓶颈就从土建转到了需求确定性：真正能赢的，是那层软件——它能证明该把哪些患者导入、完成授权并排进日程，让更小的治疗室也能跑出可预测的财务回报。
  beachhead: 美国区域癌症网络：拥有 2-8 个医院院区、一个利用不足的放疗机房或可改造门诊空间，并已批准在 18 个月内上线首个小型直立式放疗治疗室。
  wedge: 一套从部署到利用率爬坡的控制台：挖掘历史病例和转诊流，预测可治疗量；按适应症生成可直接送审的支付方授权材料包；再把投运后的时段库存变成一条可管理的患者管线。
  whyNowCatalyst: Leo 已签合同的体量，加上占地的大幅压缩，说明直立式放疗正从少数旗舰项目走向更广泛铺开。癌症网络现在就得把上线经济性和转诊运营跑通。
  ventureScalePath: 先从直立式放疗上线切入，再扩到小型质子、MR-linac 等高 capex 肿瘤治疗模态——这些场景都需要预测量、编排授权和跨院区优化利用率。
solution: 这家公司卖的是一套专为小型放疗项目上线设计的利用率与准入 OS。设备采购或改造审批前，它接入 EHR、肿瘤委员会、转诊和理赔数据，按适应症与地理区域估算可纳入病例量、支付方结构和贡献利润。调试投运阶段，它生成按保险方拆分的医疗必要性材料包，追踪缺失病历，并把院内关联肿瘤医生转来的高概率患者导进咨询时段。投运后，它继续盯拒批原因、转诊流失、排班填充和爽约风险，让新治疗室在不超配人手的前提下爬到目标吞吐。时间一长，公司就会变成新型放疗硬件厂商、医疗网络和支付方之间的运营层。
goToMarketSeed:
  firstCustomer: 一家美国癌症网络：有 3-6 个院区、一个可改造的放疗机房、20 多个社区肿瘤转诊伙伴，正为首个直立式放疗治疗室做准备。
  buyingTrigger: 董事会批准购买小型放疗设备，或机房改造正式启动——这时支付方签约和转诊爬坡规划也会一并开始。
  currentAlternative: 靠电子表格做服务线规划，再叠加手工预授权、转诊协调和 OEM 专业服务。
  switchingReason: 首个客户愿意切换，是因为这个切口把一场硬件下注变成了可衡量的上线计划：有患者量预测、按适应症拆分的授权支持，以及通用 PMO 工具给不了的日常利用率可视化。
  pricingHypothesis: 按已上线治疗室数量收费的年度 SaaS，再加一次性历史病例导入和支付方配置实施费。
