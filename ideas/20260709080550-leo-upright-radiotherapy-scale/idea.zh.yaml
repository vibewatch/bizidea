jobsToBeDone:
- job: 当癌症网络在为首个小型直立式放疗治疗室争取资本批准时，帮放疗服务线负责人证明需求和利润空间，让他们不必过度建设也能拿下审批。
  currentAlternative: 咨询研究和电子表格版财务测算。
  successMetric: 董事会审批周期，以及首年治疗患者预测准确率。
- job: 当治疗室接近投运时，帮转诊团队和收入周期团队把合格病例转成已授权的治疗启动，让项目一开出就能跑到目标利用率。
  currentAlternative: 手工病历复核、传真转诊和支付方门户。
  successMetric: 前 90 天的已授权治疗启动数，以及按适应症拆分的拒批率。
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 品类信号很强：同一条来源里同时出现大额融资、占地大幅压缩和 57 份已签合同；弱点是证据只来自当天的一篇报道。
  painIntensity:
    score: 5
    rationale: 如果一间先进放疗治疗室上线时拿不到足够多已授权患者，癌症网络可能会把几百万美元配错地方，所以这个运营痛点既尖锐又昂贵。
  wedgeClarity:
    score: 4
    rationale: 起手工作流很具体：预测合格需求、生成可直接送审的材料包，并把一间新治疗室的上线时段填起来。
  defensibility:
    score: 4
    rationale: 围绕适应症结构、支付方摩擦和转诊转化的跨上线数据，会慢慢长成通用医院分析工具和单一 OEM 工具都没有的护城河。
  ventureScale:
    score: 5
    rationale: 这个切口先从直立式放疗起步，但凡需要上线经济学、授权和多院区利用率优化的高 capex 肿瘤模态，都能往里扩。
topRisks:
- name: 采用节奏偏慢
  description: 如果直立式放疗部署推迟，或合同转成实际项目的速度偏慢，初始装机基数的增长就可能低于公司预期。
  mitigation: 第一版产品就要同时支持小型质子、MR-linac 和其他有同类利用率与授权难题的肿瘤治疗室上线。
- name: OEM 渠道挤压
  description: 硬件厂商可能会把基础部署看板打包进去，并限制客户关系入口。
  mitigation: 要抢在 OEM 的天然边界之外，占住跨院区、跨支付方、跨转诊的利用率工作流。
- name: 临床信任缺口
  description: 如果患者 适用性 逻辑太黑箱，或自动化味道太重，放疗团队可能会抗拒软件给出的建议。
  mitigation: 先用透明规则、医生在环复核，以及上线期 ROI 看板，把系统预测和真实结果一一对上。
