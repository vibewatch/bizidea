differentiator: OEM 部署团队优化的是单笔硬件销售，这家公司优化的是跨转诊、授权和多院区排班的持续利用率。通用医院 BI 工具只能事后报量，却不会把放疗适用性规则、支付方材料包组装和上线期时段经济性编码进去。久而久之，哪些适应症、支付方和转诊伙伴真能把小型放疗项目跑成，就会沉淀成一条越来越深的数据护城河。
