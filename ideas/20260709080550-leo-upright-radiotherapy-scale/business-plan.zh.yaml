slug: upright-radiotherapy-utilization-os
date: '2026-07-09'
executiveSummary: 这家公司最该先做成一套厂商中立的上线与利用率控制台，卖给美国区域癌症网络里那些正要开出首个小型直立式放疗治疗室的团队。最理想的首个客户，是一个有 3-6 个院区、一个可改造机房、20 多个社区肿瘤转诊伙伴，且已获董事会批准在 18 个月内投运的网络。眼下最痛的不是治疗计划或 EMR 替换，而是得先证明会有足够多可报销患者进来、把支付方材料包准备齐，并在新治疗室看起来还没跑满之前把早期时段填起来。切口必须收窄：先盯一间治疗室的回溯式合格患者量预测、按适应症拆分的授权材料包组装、转诊到初诊的导流，以及投运后前 90 天的爬坡看板。这个范围和采购触发点是对得上的：资本项目或机房改造一启动，预算就会出现，赞助人也必须在调试投运结束前把人手、支付方准备度和转诊爬坡假设锁住。最强优势，是一套厂商中立的数据集——它能告诉你，跨院区、跨模态时，哪些适应症、支付方、转诊伙伴和上线手册，真的能把患者转成已授权的治疗启动。最大的证伪风险则是，可见的直立式装机基数太小、太偏学术，逼着公司比计划更早证明：同一套工作流也能在小型质子和 MR-linac 上跑通。研究里的市场规模还是模型值，而且 Leo 披露的 57 份合同里，美国区域网络究竟占多少也不清楚，所以前 12 个月必须先验证预算归属、预测准确率和试点转生产转化，再谈更大融资故事。
problem:
- 小型直立式放疗减轻了建设负担，但如果癌症网络拿不出证据证明首个治疗室能装满足够已授权患者，资本还是可能投错地方。
- 历史病例复盘、预授权、转诊协调、QA 交接和投运后时段管理，现在仍散落在电子表格、OEM 服务、支付方门户和彼此割裂的医院系统里，既拖慢上线，也把本可避免的利用率流失藏了起来。
solution:
- 先上一个以读为主的上线 OS，挖历史病例、转诊流和支付方结构，在治疗室投运前按适应症算出合格患者量和贡献。
- 再把预测转成日常动作：组装可直接送审的支付方授权材料包、把社区转诊里的高概率患者导进来，并在投运后持续追踪前 90 天的时段填充、拒批和流失。
whyWeWin:
- 公司卡住的是上线前的决策窗口：只要少出现一间没装满的治疗室，服务线 ROI 就会明显改观，而现有 OIS、EHR 和 OEM 工具恰好在这个环节最不专业。
- 每做一次部署，都会继续沉淀跨院区数据：哪些适应症符合条件、哪些支付方最卡、哪些转诊能转化、哪套爬坡基准最有效——这些数据今天既不在单一医疗系统手里，也不在 OEM 或通用 BI 里。
strategicChoices:
  beachhead: 美国区域癌症网络：有 2-8 个院区、一个可改造机房或门诊空间，并计划在 18 个月内投运首个小型直立式放疗治疗室。
  wedgeRationale: 这是最快能出证明点的切口，因为采购触发、单治疗室预算和成功指标，会在同一个时点同时出现——为一间新治疗室拿资本批准并启动上线准备。要是上来就卖更宽的肿瘤工作流平台，集成会更长、ROI 归因会更弱，公司还没搞清楚预测、授权和转诊爬坡逻辑到底是不是差异化。
  sequencingRationale: 产品一开始就该盯住回溯预测、支付方材料包组装、转诊导流和上线看板，因为这是把一笔硬件采购变成可预测治疗室的最小工作流集合。GTM 也该继续由创始人主导、合作伙伴辅助，先等 2-3 家美国灯塔机构跑出付费试点；再往上加投运后的拒批基准、相邻的小型质子模板，以及专职销售。要是在实施能力和临床公信力还没立住之前就先招销售，只会跑在狭窄装机基数前面。
  notYet:
  - 替换肿瘤信息系统、治疗计划系统或企业级 EHR
  - 在没有人工复核的情况下，自动给出患者级临床建议或报销决策
  - 在美国上线手册和支付方材料包库可复用之前，就直接向欧洲和澳大利亚扩张
  - 脱离先进放疗上线场景、去做通用预授权软件
market:
  tam: $68.6M 的模型化 TAM，基于全球约 196 个独立先进放疗项目、每个项目 2 间可切入的上线治疗室，以及每间每年约 $175k 的估算工作流预算。
  sam: $15.8M 的美国滩头 SAM，基于约 60 家有望最先上首间治疗室的 NCI 指定癌症中心或同类区域系统、每个目标项目 1.5 间合格治疗室估算。
  som: 第 3 年 SOM 为 $2.1M，前提是拿下约 8-10 家灯塔机构里的 12 间已投运治疗室，每间年花费约 $175k。
  segments:
  - 新开首个小型直立式放疗治疗室的美国区域癌症网络
  - 在直立式验证之后，作为下一相邻细分切入的小型质子和 MR-linac 上线项目
  buyingProcess: 一旦董事会批准、改造启动或调试投运规划暴露出合格患者量和支付方准备度的不确定性，内部推动者往往就是放疗运营 VP 或首席医学物理师。经济拍板大概率在肿瘤服务线 SVP 或 CFO 手里，交易最好先从一间治疗室的付费投运前试点开始；等治疗室上线和前 90 天爬坡跑顺，再转成按治疗室计费的年度合同。
product:
  mvp: MVP 是一套只读的一间治疗室上线控制台：吃进历史病例、转诊和授权数据，按适应症和支付方估算合格患者量，生成按保险方拆分的材料包清单，并跟踪投运前与前 90 天的爬坡指标。它应与 EHR、OIS、TPS 和 OEM 工具共存，而不是替代它们；所有临床或报销判断都先停留在“给建议、由人复核”的模式。
  sixMonth: 完成 2 个付费美国试点：交付回溯需求模型、从手工走向辅助式的支付方材料包工作流、社区转诊导流名单，以及围绕一间治疗室上线的每周爬坡看板。
  twelveMonth: 至少把 2 个试点转成生产合同，补上主流 EHR、OIS 和转诊数据源的可复用只读连接器，并发布围绕首间治疗室爬坡管理的拒批原因基准和排班填充分析。
  twentyFourMonth: 把同一套工作流扩到小型质子和 MR-linac 上线，增加跨院区基准报告，并在不替代治疗系统的前提下，支持客户现有系统里的多治疗室组合规划。
  keyBets:
  - 在现有厂商或 OEM 还给不出足够的上线前需求确定性之前，买方就会为一层中立的单治疗室工作流付费。
  - 历史病例和转诊数据足够可得，可以在不做多季度集成项目的前提下，较准地预测合格患者量。
  - 授权材料包组装和拒批反馈，能带来可衡量的首年治疗室利用率提升，而不只是行政便利。
  - 在初始滩头市场饱和前，直立式切口就能扩到相邻的高 capex 放疗模态。
gtm:
  wedge: 卖一间新治疗室的付费上线准备与爬坡控制试点，而不是更宽的肿瘤分析平台或通用预授权产品。
  channels:
  - 由创始人主导，直销区域癌症网络里的肿瘤服务线负责人、放疗运营负责人和首席医学物理师
  - 围绕治疗室上线里程碑，由 OEM、改造伙伴和小型质子生态转介
  - 首个客户自有爬坡案例出来后，进入放疗运营者社区和灯塔站点口碑网络
  funnelTargets: 线索→合格试点 15-25%，合格试点→付费试点 20-30%，付费试点→年度生产合同 50%+，首间治疗室客户→18 个月内扩到第二间治疗室或相邻模态 30%+。
  pricing: 先卖一间治疗室的付费投运前试点和实施包，再转成按已上线治疗室收费的年度订阅，外加一次性数据映射和支付方配置费用。这个定价贴合买方的经济逻辑，因为赞助人花钱买的是降低治疗室 ROI 风险、加快授权启动、达成吞吐目标，而不是买几个用户席位。
businessModel:
  revenueStreams:
  - 按治疗室收取上线规划与爬坡管理的年度软件订阅费
  - 一次性实施、数据映射和支付方配置费用
  - 高级跨院区基准与相邻模态上线模块
  unitOfValue: 从投运前预测一路管到首年爬坡的一间已上线治疗室
  targetGrossMarginPct: 70
  expansionLevers:
  - 首个项目证明 ROI 后，在同一癌症网络里继续加房间
  - 把同一套工作流扩到小型质子、MR-linac 和其他先进放疗上线
  - 跨院区数据积累到一定程度后，单卖基准和拒批绩效分析
  - 一旦“中立”这个心智站稳，再和 OEM、改造伙伴做共销或转售
strategyMap:
  northStarMetric: 投运后 180 天内，模型化首年治疗室产能里有多少比例转成了已授权治疗启动
  inputMetrics:
  - 回溯式合格患者量预测误差（对比实际治疗患者）
  - 按适应症和支付方拆分的授权周转天数中位数
  - 目标社区肿瘤伙伴的转诊→初诊转化率
  - 前 90 天治疗启动数 vs 上线计划目标
  - 付费试点→年度生产合同转化率
  moatsToBuild:
  - 一套跨院区数据集，告诉你哪些适应症、支付方政策和转诊伙伴真的能转成已授权治疗启动
  - 横跨 EHR、OIS、TPS、OEM 和收入周期栈的可复用集成与上线手册库
  - 围绕直立式、小型质子和相邻模态首间治疗室爬坡表现的中立基准数据
  killCriteria:
  - 前 9 个月里，拿不到 3 家美国共创客户：它们都得在 18 个月内有明确上线时间，并愿意共享历史病例和转诊数据。
  - 回溯试点既无法把前 90 天合格启动量预测到 ±20% 以内，也无法把授权周转中位数相对基线至少压低 20%。
  - 由于买方把预算并进 OEM 服务或现有厂商系统，导致付费试点里不到一半能转成年付按治疗室合同。
  mermaid: |
    flowchart LR
      Wedge[单治疗室上线切口] --> MVP[预测 + 授权 MVP]
      MVP --> Proof[预测准确率与爬坡验证]
      Proof --> Expansion[多治疗室和相邻模态扩张]
investorMemo:
  verdict:
    call: Watch
    conviction: 痛点强、切口也够克制，但在一家美国区域网络真正证明预算归属之前，且在品类能跳出很小的初始装机基数之前，判断还不能再往上提。
    whyBelieve: 小型直立式放疗把瓶颈从土建推到了上线编排，因而造出了一个可衡量的运营问题；只要治疗室还没完全跑顺，一层中立工作流就有机会切进去。
    whyDoubt: 短期市场还是模型值，体量也不大；在买方愿意为一个新独立品类付费之前，他们完全可能先退回 OEM 服务、现有系统或内部团队。
    nextDiligence: 先拿下一家美国灯塔项目，让客户自己给出预测准确率、授权周转和前 90 天治疗启动的基线；同时再证明同一套工作流至少适用于一种相邻模态。
  firstCustomer:
    title: 正在上线首个小型直立式治疗室的区域癌症网络放疗运营副总裁
    profile: 管理一个 3-6 院区网络，有一个可改造机房、20 多个社区肿瘤转诊伙伴，并跑着 Epic + OIS 栈；但上线准备至今仍靠电子表格、支付方门户和手工协调。
    trigger: 董事会批准或改造启动后，团队就得在 调试投运 结束前证明可报销患者量、备齐按适应症拆分的支付方材料，并把早期时段填上。
    buyer: 肿瘤服务线 SVP
    initialContract: 一间治疗室的付费投运前试点，价格约 $50K-$100K；等上线、授权和爬坡工作流持续跑在生产环境里后，再转成每间已上线治疗室约 $175K-$250K 的 ARR，外加实施费。
  mustBeTrue:
  - 至少得有几家美国区域癌症网络，会在首间治疗室上线前 18 个月内，为一层中立工作流付费。
  - 历史病例、转诊和支付方数据必须足够支撑高精度预测，才能实打实影响人手配置和 capex 决策。
  - 授权与转诊编排必须把启动时间或拒批表现改善到足以支撑每间治疗室的软件预算，且接近模型里的支出水平。
  - 买方必须更偏好厂商中立的上线控制，而不是继续等 OEM 看板或现有 EHR / OIS 扩展。
  - 这套工作流必须能迁移到小型质子或 MR-linac；否则滩头市场会小到撑不起风险投资回报。
  diligenceQuestions:
  - Leo 披露的 57 份合同里，到底有多少是 18 个月内上线的美国区域网络项目，而不是学术旗舰站？
  - 在一个典型客户里，创业公司实际上能拿到哪些投运前数据：历史病例、转诊日志、支付方结果和排班数据分别可得多少？
  - 上线准备软件的预算，现实中到底归谁管——肿瘤运营、收入周期、资本项目办公室，还是 CFO？
  - 什么 KPI 足够硬，才能把 OEM 服务或内部电子表格挤掉——预测准确率、授权周转、拒批下降，还是治疗室填满率？
  - 要把产品从直立式扩到小型质子或 MR-linac，究竟还得再补多少功能？
operatingAssumptions:
- assumption: 足够多的美国区域癌症网络会在 18 个月内迎来首间治疗室上线，因此在直立式市场成熟前，能支撑 2-3 个付费试点。
  basis: research.yaml
  validationTest: 先列出 15 家最可能的目标系统，争取在 9 个月内拿到至少 3 份签字版共创客户或试点 LOI，且写明治疗室上线日期。
  decisionImpact: 如果不成立，公司就得把相邻模态扩张提前到第一年，并下调对纯直立式滩头市场的信心。
- assumption: 买方会用服务线预算或资本上线预算来支付这套软件，而不是继续等 OEM 或 EHR 扩展。
  basis: research.yaml
  validationTest: 在 10 次合格买方访谈里，至少让 4 家确认付费试点预算、2 家接受接近模型值的“按治疗室年度定价”框架。
  decisionImpact: 如果不成立，产品可能得转向伙伴代销、重服务动作，或收窄成纯分析姿态。
- assumption: 历史病例、转诊和授权数据足够容易接入，可以在不做全量写回集成的前提下交付有用预测。
  basis: idea.yaml
  validationTest: 在 6 周内各完成 2 个回溯试点，并用只读数据流或结构化导出做出预测基线和拒批基线。
  decisionImpact: 如果不成立，路线图就该从“上线前需求确定性”收窄到投运后的授权与爬坡分析。
- assumption: 按适应症拆分的支付方材料包组装和拒批反馈，能实质压低可避免的上线延误。
  basis: research.yaml
  validationTest: 在首个在跑试点里，把目标适应症的授权周转中位数相对基线至少压低 20%，或把可避免拒批率至少压低 15%。
  decisionImpact: 如果不成立，定价和定位就得更重押需求预测与排班填充分析，而不是报销工作流。
- assumption: 同一套 系统 只需补少量工作流内容，就能支持小型质子或 MR-linac 上线。
  basis: 运营判断
  validationTest: 到第 12 个月前，完成 3 次相邻模态工作流访谈，并做出 1 个回溯原型，证明预测、授权和爬坡跟踪的数据模型大体通用。
  decisionImpact: 如果不成立，风险投资逻辑和融资计划都得按一个明显更小的品类重算。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈美国滩头市场里的 15 位放疗运营负责人、首席医学物理师、收入周期经理，以及 OEM / 改造伙伴。
  hypothesis: 当董事会批准或改造启动，暴露出可报销量和支付方准备度的不确定性时，买方触发点会高度一致。
  successMetric: 至少 10 次访谈确认存在共同触发点，且有 5 家买方愿意分享现状工作流或样例数据导出。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 用候选网络的历史病例、转诊和支付方数据，跑 2 次 陪跑式回溯上线准备评估。
  hypothesis: 即便流程半手工，也能把合格患者量、支付方摩擦和早期时段填充风险量化到足以支撑付费试点。
  successMetric: 两次评估都能产出预测基线和拒批发现，且至少 1 次转成付费试点提案。
  owner: 产品与实施负责人
- horizon: 90–180 天
  experiment: 交付首个面向一间治疗室的只读 MVP，包含历史病例导入、授权材料包清单、转诊导流和每周爬坡看板。
  hypothesis: 只要工作流聚焦在一间治疗室，就能在不替换 OIS、EHR 或 OEM 项目工具的前提下把试点跑起来。
  successMetric: 首个付费试点在启动后 8 周内上线，并且能在不显著打断现有流程的情况下，每周产出预测、授权和时段填充指标。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 和至少 3 家合格买方、1 家 OEM 或改造转介伙伴一起测试付费试点包装与按治疗室年度定价。
  hypothesis: 只要通向治疗室级 ROI 的转化路径足够清楚，买方会更愿意接受一个定义清晰的投运前试点，而不是无边界咨询。
  successMetric: 至少签下 2 个付费试点，并让 1 套年度定价框架在 KPI 达标前提下得到原则性接受。
  owner: 创始人/CEO
- horizon: 180–360 天
  experiment: 在在跑试点里加上拒批原因反馈闭环，并把授权周转与治疗启动时点和基线做对比。
  hypothesis: 报销工作流的改善幅度足够大，能把产品和通用项目管理或 BI 工具拉开。
  successMetric: 至少 1 家客户在目标适应症上实现：授权周期中位数提速 20%，或可避免拒批率下降 15%。
  owner: 临床报销负责人
- horizon: 180–540 天
  experiment: 把同一套工作流映射到 1 个小型质子或 MR-linac 上线项目，以及 1 个 OEM / 改造伙伴共销动作上。
  hypothesis: 相邻模态在上线经济学和工作流痛点上有足够重合，公司可以在直立式市场饱和前先扩出去。
  successMetric: 至少 1 个相邻模态试点机会进入后期管线，且 1 个伙伴来源机会进入已签评估范围。
  owner: 战略合作负责人
operations:
- 产品会处理 PHI，但不该充当主记录系统，所以要坚持只读集成、BAA、基于角色的权限控制和可审计工作流日志。
- 支付方材料模板和拒批分类体系必须持续由临床医生和收入周期团队复核，让产品始终停留在“支持工作流”而不是“自动做报销决策”的边界内。
- 每间已投运治疗室都要跑每周一次的上线运营节奏：盯转诊量、授权状态、调试投运准备度和时段填充。
- 先把单治疗室 上手手册标准化，再去碰多治疗室 铺开 或国际扩张。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 在品类还没定型时，必须亲自抓创始人主导销售、共创客户招募、OEM 与改造伙伴关系，以及资本项目 ROI 叙事。
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责搭只读数据模型、支付方材料包工作流、审计日志，以及真正决定上线时长的集成层。
- role: 产品与实施负责人
  startTiming: Month 1
  rationale: 把运营、医学物理和收入周期里的上线流程编码成产品，并把每个试点做成可复用的 上手手册。
- role: 临床报销负责人
  startTiming: Month 3
  rationale: 维护按适应症拆分的支付方内容、校验拒批逻辑，并把产品守在低监管风险的工作流姿态里。
- role: 解决方案工程师
  startTiming: Month 6
  rationale: 等首批试点暴露出重复模式后，把常见的 EHR、OIS、转诊和 理赔数据集成产品化，从而缩短部署周期。
- role: 战略合作负责人
  startTiming: Month 9
  rationale: 等试点初步跑出证明后再补进来，把 OEM、改造伙伴和相邻模态分发正式做起来，避免过早招一支大销售团队。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2-3 个付费美国上线准备试点，并写明治疗室投运日期
  - 证明一间治疗室的回溯预测基线，以及首个在跑授权与转诊看板
  - 至少把 2 个试点转成按治疗室计费的年度生产合同，或相邻模态等价合同
  - 发布 1 份客户自有案例，证明预测更准、授权更快，或前 90 天治疗室填充更强
- horizon: 12–24 个月
  items:
  - 从只做直立式试点，扩到至少 1 个小型质子或 MR-linac 上线工作流
  - 面向生产客户发布跨院区的拒批、转诊和爬坡基准报告
  - 在现有癌症网络客户里拿下第一个多治疗室或多院区扩张
  - 建立 1 条可重复的 OEM、改造伙伴或生态伙伴转介动作
- horizon: 24–36 个月
  items:
  - 沿着模型路径做到约 12 间已投运治疗室；若做不到，就按真实上线节奏和转化数据重写 判断
  - 证明相邻模态收入能把滩头市场明显做大，而不只依赖直立式需求
  - 如果现有厂商把执行差距补上，就决定是继续深挖厂商中立的上线工作流所有权，还是转成基准与分析层
risks:
- risk: 直立式治疗室部署可能推迟、集中在学术旗舰站，或不足以形成可重复的美国区域网络管线。
  likelihood: High
  impact: High
  mitigation: 到第 12 个月前就把相邻的小型质子和 MR-linac 上线机会一并筛进来，且不要做只适配 Leo 特定流程的产品功能。
- risk: OEM 服务、Epic 或现有 OIS 厂商，可能会给出“够用”的上线工具，让独立产品难以自证价值。
  likelihood: High
  impact: High
  mitigation: 差异化必须放在厂商中立、跨院区基准、支付方材料深度和转诊爬坡分析上，而不是只做项目跟踪或排班。
- risk: 历史病例、转诊和授权数据在真实医院环境里可能太碎，导致部署速度上不去。
  likelihood: Medium
  impact: High
  mitigation: 先从只读抽取入手，把必需数据模型收窄到上线关键字段，并为早期试点保留结构化手工上传兜底。
- risk: 如果逻辑太黑箱，或看起来像临床决策支持，临床团队可能不信 适用性 或利用率建议。
  likelihood: Medium
  impact: High
  mitigation: 让临床医生始终在环，按适应症展示规则和证据，并把早期自动化限制在文档与工作流路由层。
- risk: 在公司跳出初始切口之前，每间治疗室的软件预算和漫长的企业销售周期，可能撑不起风险投资级别的单位经济。
  likelihood: Medium
  impact: High
  mitigation: 先用短周期付费试点、把定价绑到治疗室 ROI 上，并要求在扩大 人手规模 或融资前先验证相邻模态。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 做出只读上线控制 MVP，完成 2-3 个付费美国试点，把支付方内容和集成底座补扎实，验证一条相邻模态扩张路径，并沉淀足够多由客户持有的治疗室经济性证据，为下一轮 seed 融资铺路。
