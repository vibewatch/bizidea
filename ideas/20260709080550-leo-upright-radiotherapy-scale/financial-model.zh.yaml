slug: upright-radiotherapy-utilization-os
date: '2026-07-09'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 每间治疗室的付费投运前试点费
  value: '75'
  unit: USD 千（一次性）
  source: '[BP investorMemo.firstCustomer.initialContract: "$50K-$100K paid pre-go-live pilot for one room"；按中位数建模]'
- id: A2
  name: 每间已上线治疗室的年度生产 ARR
  value: '175'
  unit: USD 千 / 间 / 年
  source: '[BP investorMemo.firstCustomer.initialContract 区间 $175K-$250K；与 research.yaml market.som 中较保守的 "$175k annual budget per room" 对齐]'
- id: A3
  name: 每间新治疗室的一次性实施 / 数据映射费（Y1 后）
  value: '25'
  unit: USD 千（一次性）
  source: '[BP businessModel.revenueStreams: "One-time implementation, data-mapping, and payer-configuration fees"；按 Y1 试点费约 1/3 估算，因为 BP twelveMonth 计划假设 onboarding 会更可复制]'
- id: A4
  name: 目标稳态毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct: 70]'
- id: A5
  name: Y1 / Y2 / Y3 年末在约治疗室数
  value: 3 / 7 / 12
  unit: 治疗室数量
  source: '[Y3=12 对应 research.yaml market.som: "12 live rooms across roughly 8-10 lighthouse systems"；Y1/Y2 根据 BP milestones 插值得到（Y1 2-3 个付费试点，Y2 扩到多房间 / 相邻模态）]'
- id: A6
  name: 创始团队起始招聘月份
  value: 创始人/CEO M1、创始工程师 M1、产品/实施负责人 M2、临床报销负责人 M4、解决方案工程师 M7、战略合作负责人 M10
  unit: 模型月份
  source: '[BP team[]: startTiming Month 0/0/1/3/6/9，再整体 +1 以匹配从 1 开始计的模型月份]'
- id: A7
  name: 各岗位全包年薪（含工资税 / 福利）
  value: CEO $175K、工程 $220K、产品/实施负责人 $200K、临床报销负责人 $230K、解决方案工程师 $190K、合作负责人 $190K OTE
  unit: USD / FTE / 年
  source: '[创业财务经验值：早期 health-tech 团队的全包薪酬区间；临床报销负责人因专业性更强而溢价]'
- id: A8
  name: 创始人主导销售到首个付费试点签约的周期
  value: '4'
  unit: 自启动起的月数
  source: '[BP gtm.channels: founder-led direct sales；BP sequencingRationale: GTM 在 2-3 家灯塔机构跑出付费试点前都保持创始人主导——这里按企业级医疗系统 4 个月销售周期建模]'
- id: A9
  name: 试点交付 / 项目周期
  value: '2'
  unit: 月
  source: '[BP experimentRoadmap 90-180 days: "First paid pilot launches within 8 weeks of kickoff"]'
- id: A10
  name: Y1 试点转生产的数量
  value: 前 3 个试点里有 2 个在 Y1 内转成年度生产合同；第 3 个在 Y2 Q1 转化
  unit: 数量
  source: '[BP milestones 0-12 months: "Convert at least 2 pilots into annual per-room production contracts"]'
- id: A11
  name: 每间新治疗室的 CAC
  value: '125'
  unit: USD 千 / 新客户
  source: '[按模型里的 Y2 销售与市场开支 ÷ 新签治疗室数推导，反映 BP buyingProcess 所说的长医疗系统销售周期]'
- id: A12
  name: 月度总收入流失率（生产后）
  value: '1.5'
  unit: 每月百分比（平均客户生命周期约 5.6 年）
  source: '[创业财务经验值：嵌入式、按治疗室计费的 enterprise health-tech 基础设施通常更粘；但 BP / research 里还没有在跑生产客户能验证它]'
- id: A13
  name: pre-seed 融资额与声明跑道
  value: 融资 $2.0M / 18 个月跑道
  unit: USD 百万 / 月
  source: '[BP fundingAsk: round pre-seed, targetFundingRangeUsd "$2-4M", runwayMonths 18；按更精简 burn 曲线取区间下沿]'
- id: A14
  name: 期初现金
  value: '2000'
  unit: USD 千，等于模型起点一次性到账的全部融资
  source: '[标准建模约定：pre-seed 资金在 T0 到账]'
- id: A15
  name: COGS 构成
  value: 交付人力（产品/实施负责人、临床报销负责人、解决方案工程师部分工时）+ 托管 / 基础设施
  unit: n/a
  source: '[运营判断，且与 BP product.mvp 的只读架构和 BP operations 里提到的审计日志、BAA 约束一致]'
- id: A16
  name: 非人力 SG&A 开支（法务、保险、合规 / HIPAA-BAA 准备、工具）
  value: 7-13，到 Y3 升至 20-24
  unit: USD 千 / 月
  source: '[根据 BP operations 推导：既然要维持只读集成、BAA、基于角色的权限和审计日志，合规开支就会随客户数上升]'
- id: A17
  name: 下行 / 上行转化率区间
  value: 试点转生产：下行 33%（3 个里 1 个）vs 上行 100%（3 个里 3 个）
  unit: percent
  source: '[BP strategyMap.killCriteria: "Fewer than half of paid pilots convert to annual per-room contracts" 给出了下行边界]'
- id: A18
  name: 市场规模基础（TAM / SAM / SOM）来自模型，不是观察值
  value: TAM $68.6M / SAM $15.8M / SOM $2.1M，且都标记为 isEstimate:true
  unit: USD
  source: '[research.yaml market.tam / sam / som 的 rationale——三个数字都明确写着它们是 modeled estimates]'
