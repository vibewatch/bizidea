fundingAsk:
  round: pre-seed
  amountM: 2.0
  runwayMonths: 18
  milestone: 先把前 3 个付费试点里的至少 2 个转成按治疗室计费的年度生产合同，再签下第 3-4 个付费试点，验证 1 个相邻模态（小型质子或 MR-linac）工作流原型，并发布 1 个客户自有爬坡案例——也就是 BP 里 12-24 个月那组里程碑——同时还得在那个节点之后再留出 6 个月现金缓冲。
  useOfFunds:
  - bucket: Engineering
    amountUsd: 500000
    percentage: 25
  - bucket: GTM
    amountUsd: 800000
    percentage: 40
  - bucket: G&A
    amountUsd: 200000
    percentage: 10
  - bucket: Buffer (6 mo)
    amountUsd: 500000
    percentage: 25
scenarios:
  downside:
    description: 如果试点转生产跌到 BP 自己的 止损边界——前 3 个里只有 1 个转化，也就是不到一半——买方就可能把预算收回到 OEM 服务或现有 EHR / OIS 扩展上，而相邻模态原型也会拖过 Y3。这样到 Y3 时，治疗室数只能到约 8 间而不是 12 间，收入按比例缩水；但 人手规模 又不会像收入那样同步收缩，结果就是 Y3 结束前现金转负，必须在跑到模型里的 12-24 个月里程碑前先接一笔过桥融资或降价轮。
    y3RevenueK: 1150.0
    y3EbitdaK: -750.0
    cashLowPointK: -350.0
    keyAssumptionChanges:
    - 试点转生产从基准的 67% 掉到 33%（3 个里 1 个），对应 BP killCriteria 的下限
    - 相邻模态验证从 Y2 拖到 Y3 以后，SOM 路径跟着后移
    - 到 Q4Y3 时治疗室数只到约 8 间，而不是 12 间
  base:
    description: 基准情形下，前 3 个付费试点里有 2 个在 Y1 转成年付生产合同，第 3 个在 Y2Q1 转化；公司在整个 Y2 基本保持每季新增约 1 间治疗室，再叠加相邻模态和多房间扩张的加速，到 Q4Y3 做到 12 间已投运治疗室，与 research.yaml 里模型化的 Y3 SOM 一致。毛利率则会从试点密集、偏薄甚至为负的 Y1 月份，逐步爬向 70% 的目标值。
    y3RevenueK: 1721.9
    y3EbitdaK: -343.6
    cashLowPointK: 190.2
    keyAssumptionChanges:
    - 与本模型主表和单位经济模型完全一致
  upside:
    description: 上行情形里，前 3 个试点全部转成生产，相邻模态原型（小型质子 / MR-linac）到 Y2 年中就能转成付费试点，再加上 OEM / 改造伙伴转介缩短销售周期，Q4Y3 的治疗室数可推到约 16 间。此时 混合 ARPU 会更靠近 BP 合同区间 $175K-$250K 的上沿，因为相邻模态能带来溢价定价。经营杠杆也会在 Q4Y3 把 EBITDA 轻微拉正。
    y3RevenueK: 2950.0
    y3EbitdaK: 210.0
    cashLowPointK: 850.0
    keyAssumptionChanges:
    - 试点转生产升到 100%（3 个里 3 个），且 1 个相邻模态试点在 Y2 转化
    - 混合 ARPU 向 $225K / room 靠拢，反映相邻模态溢价
    - 到 Q4Y3 时治疗室数达到约 16 间，而不是 12 间
sensitivity:
- variable: 每间治疗室 ARPU
  downsideCase: $150K / room（价格受压，没有相邻模态溢价）
  baseCase: $175K / room（research.yaml 里模型化的工作流预算 / room）
  upsideCase: $225K / room（BP 合同区间上沿，含模态溢价）
  y3RevenueImpactK: -246.0
  cashImpactK: -172.0
- variable: 试点转生产率
  downsideCase: 33%（前 3 个里转 1 个），对应 BP killCriteria 下限
  baseCase: 67%（前 3 个里 2 个在 Y1 转化，第 3 个在 Y2Q1 转化）
  upsideCase: 100%（3 个全转，且第二间治疗室扩张更快）
  y3RevenueImpactK: -560.0
  cashImpactK: -540.0
- variable: 到首个付费试点的销售周期
  downsideCase: 9 个月（资本委员会买方更谨慎）
  baseCase: 4 个月（按 BP gtm.channels 的创始人主导打法）
  upsideCase: 3 个月（OEM / 改造伙伴带来的熟人转介）
  y3RevenueImpactK: -180.0
  cashImpactK: -220.0
- variable: 毛利率爬坡轨迹
  downsideCase: 卡在约 50%（交付效率低、材料包仍大量手工组装）
  baseCase: 随着手册标准化，逐步爬向 70% 目标
  upsideCase: 做到约 78%（支付方材料包组装自动化）
  y3RevenueImpactK: 0.0
  cashImpactK: -310.0
- variable: 月度流失率（生产后）
  downsideCase: 3.0% / 月（年化约 30%，买方按 BP 风险假设退回 OEM 服务）
  baseCase: 1.5% / 月（年化约 17%，按嵌入式按治疗室基础设施经验值）
  upsideCase: 0.75% / 月（年化约 9%，一旦接好系统，切换成本很高）
  y3RevenueImpactK: -180.0
  cashImpactK: -150.0
- variable: 招聘节奏
  downsideCase: 解决方案工程师和合作负责人都晚招 2 个季度
  baseCase: 按 BP team[] 的 startTiming 招人（M1 / M1 / M2 / M4 / M7 / M10）
  upsideCase: 比计划提前 1 个季度招人，去吃快于模型的需求
  y3RevenueImpactK: -150.0
  cashImpactK: 50.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Target[目标：3-6 院区网络，1 个可改造机房] --> Pilot[付费投运前试点：$75K]
      Pilot --> Convert{能转生产吗？}
      Convert -->|~67% Y1| Production[年度每间治疗室 ARR：$175K]
      Convert -->|~33%| Churned[未转化：只停留在试点]
      Production --> Rooms[已投运治疗室：Y1 3 间到 Y3 12 间]
      Rooms --> Revenue[确认收入]
      Revenue --> GrossProfit[毛利，目标约 70%]
      GrossProfit --> Cash[经营现金余额]
      Cash --> NextRound[在 12-24 个月里程碑上接 seed]
modelSanity:
- checkName: 收入引擎
  finding: 收入引擎靠的是：把 $75K 的付费投运前试点，转成每间治疗室每年 $175K 的生产合同；治疗室数则从 Y1 年末 3 间，爬到 research.yaml 模型化 Y3 SOM 对应的 12 间。
- checkName: 必须成立的事
  finding: 前 3 个付费试点里，至少 2 个必须在 Y1 内转成年度生产合同——这是 BP 自己写下的里程碑——否则治疗室爬坡、毛利率轨迹和现金跑道都保不住基准路径。
- checkName: 模型失灵条件
  finding: 如果试点转生产掉到 BP killCriteria 设定的“低于一半”，下行情形显示 Y3 收入会下滑约 33%，且 Y3 结束前现金转负，被迫接一笔过桥融资。
- checkName: 下一轮证明点
  finding: 到第 18-24 个月前，拿下 2+ 个生产合同、验证 1 个相邻模态（小型质子或 MR-linac）原型，并发布 1 个客户自有爬坡案例，才足以支撑在这笔 $2.0M pre-seed 之上继续融一轮 seed。
sanityChecks:
  ruleOf40: Y3 收入增速 76.6% + Y3 EBITDA 利润率 -20.0% = Rule of 40 分数约 56.6，主要靠增长而不是盈利拉动。
  burnMultiple: Y2 burn multiple 约 1.07x，Y3 改善到约 0.39x（Bessemer 经验：低于 1x 说明增长更省钱），反映出随着治疗室数增长快于 人手规模，经营杠杆开始出现。
  revenuePerFte: $233K 的 Y3 退出 ARR run-rate / FTE（12 间治疗室 x $175K / 9 FTE），落在 $200K-$400K SaaS 基准区间内，但考虑到临床 / 实施人手占比更高，仍偏区间下沿。
  flags:
  - research.yaml 里的 TAM / SAM / SOM 都明确标成 modeled estimates（isEstimate:true），所以本模型瞄准的整个 Y3 收入上限——12 间治疗室、$2.1M SOM——天然继承了这层不确定性，而不是观察值。
  - Y1 前 9 个月里有 5 个月毛利为负，因为试点阶段的交付人力压过了偏薄的试点收入；70% 毛利率只是稳态假设，还没在真实生产治疗室里被证明。
  - CAC（$125K / room）和生产后月度流失（1.5%）都还是经验值，BP / research 里没有任何实证基础，因为公司连 1 个付费试点都还没签下来——前 2-3 个试点转化后就该用真实数据替换。
  - 模型假设除了这笔 $2.0M pre-seed 之外没有新增融资；到 Q3Y3-Q4Y3 时现金只剩约 1 个月缓冲，这意味着 seed 轮必须在大约第 30 个月前后就落地，而不能拖到 36 个月。
  - 收入集中度风险很高：只要前 2-3 个锚点治疗室里掉 1 个，Y1-Y2 增长轨迹都会被明显改写，这也呼应了 BP 自己的判断——按治疗室预算和漫长企业销售周期，未必天然撑得起风险投资级别经济性。
  - Y2 / Y3 的 人手规模和间接费用 只是按 Y1 末与 Y3 末快照线性插值得到，并不是一份细颗粒度招聘计划，所以现实里的季度 opex 跳变大概率会比模型更颠。
