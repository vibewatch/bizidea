reportMemo:
  executiveTakeaways:
  - 'The exact beachhead is real but narrow: Leo has turned upright radiotherapy into a live procurement category, yet the visible rollout universe is still measured in dozens to low hundreds of advanced sites, so the venture case depends on expanding from upright launches into adjacent high-capex radiotherapy programs once the workflow is proven [1][2][15][16][17].'
  - The bottleneck shifts from civil construction to launch orchestration when compact fixed-beam systems fit inside existing vaults; payer authorization, referral conversion, and commissioning throughput become the real determinants of room ROI [1][3][7][8][22][25][36].
  - Hospitals already suffer staffing shortages, prior-authorization delays, and fragmented QA workflows, which makes the pain economically real for a product that removes manual coordination rather than adding another dashboard [20][21][23][25][26][36][38][39].
  - Incumbents own planning, treatment records, and enterprise data, but none of them specializes in first-room launch economics across referrals, authorizations, and modality-specific readiness [27][28][29][30][36][38].
  - Regulatory risk is manageable while the product remains workflow and evidence infrastructure; it rises materially if the system starts making patient-specific clinical or coverage decisions without clinician review [5][22][32][33][34].
  marketDefinition: 'Workflow software that de-risks first-room launch economics for compact advanced radiotherapy: forecast eligible patients, build payer-ready authorization packets, and manage slot fill for new upright or fixed-beam treatment rooms [1][3][7][10][22][25].'
  customerAndBuyer: Primary users are radiation-oncology operations leaders, chief medical physicists, and referral/revenue-cycle managers because they own commissioning, readiness, and daily slot utilization; the economic buyer is usually the oncology service-line SVP or CFO because staffing gaps, prior-authorization delays, and underfilled rooms directly change launch ROI [20][21][25][26][36][38][39].
  buyingTriggers:
  - point: Board approval or retrofit kickoff for a compact upright or fixed-beam room turns demand forecasting and payer workflow into immediate operational work.
    sourceRefs:
    - 1
    - 3
    - 7
    - 8
  - point: A center’s proton referrals hit payer delays or inconsistent coverage, making authorization operations a visible bottleneck before go-live.
    sourceRefs:
    - 22
    - 23
    - 25
    - 26
  - point: Physics and operations teams realize commissioning, peer review, and QA handoffs will otherwise run across spreadsheets and siloed systems.
    sourceRefs:
    - 20
    - 36
    - 38
    - 39
    - 40
    - 48
    - 53
  willingnessToPay:
    summary: Budget plausibly comes from launch-readiness, service-line operations, and avoided-denial spend rather than net-new IT. Buyers already absorb staffing shortages, manual prior authorization, and commissioning/QA overhead, so a tool that shortens time-to-utilization can fund itself out of existing room-launch budgets.
    sourceRefs:
    - 20
    - 21
    - 22
    - 25
    - 26
    - 36
    - 38
  competitiveLandscape: 'Competition is fragmented rather than direct: OIS/TPS vendors dominate treatment records and scheduling, Epic-class systems hold enterprise workflow and referral data, OEMs help the first install go live, and in-house physicists plus PMOs bridge the gaps. The white space is a neutral control plane for pre-launch demand certainty and post-launch ramp execution [27][28][29][30][36][38][39].'
  incumbentThesis:
  - incumbentClass: Treatment planning and oncology information systems
    point: Varian, Elekta, and RaySearch own core treatment workflows, but they do not win by default because pre-launch demand certainty, payer packet assembly, and referral-ramp execution sit outside their center-of-gravity.
    sourceRefs:
    - 27
    - 28
    - 29
  - incumbentClass: Enterprise EHR workflow
    point: Epic controls the broadest patient and referral data plane, yet it is not built around modality-specific commissioning, upright eligibility logic, or room-level launch economics.
    sourceRefs:
    - 30
    - 22
    - 32
  - incumbentClass: OEM deployment services
    point: Leo- and Mevion-led deployment work can help a single room go live, but OEM services are vendor-specific and do not naturally become a cross-network benchmark or payer-operations dataset.
    sourceRefs:
    - 3
    - 7
    - 8
  - incumbentClass: In-house physics and PMO stack
    point: Spreadsheets, binders, and ad hoc QA routines are flexible for first sites, but they scale poorly when peer review, authorization, and throughput need an auditable multi-site playbook.
    sourceRefs:
    - 36
    - 38
    - 39
    - 40
    - 48
    - 53
  regulatoryLandscape: The lowest-risk product posture is workflow, documentation, and interoperability. HIPAA/GDPR still apply because the product will process referral, imaging, and claims-linked PHI, and CMS’s e-PA rule raises the bar for standardized payer-provider data exchange. If the software starts recommending patient-specific clinical actions or autonomously making coverage decisions, SaMD/MDR questions become materially harder [5][22][32][33][34].
  technologyLandscape: 'Upright RT is technically credible now, not merely conceptual: fixed-beam proton configurations, upright CT/CBCT, and chair-based positioning systems exist, but sites still need reproducible immobilization, image guidance, and TPS/OIS integration to make daily workflow reliable [7][8][10][11][13][38][39][40][67][84][87].'
