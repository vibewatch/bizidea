  validationPlan:
  - priority: high
    question: How many of Leo’s visible contracts are U.S. regional-network launches versus academic showcase sites?
    evidenceToGather: Interview operations leaders at 8-10 named or inferred launch sites and map live room timing, payer mix, and data-system readiness.
  - priority: high
    question: Which authorization and referral steps most often delay proton or advanced-radiotherapy starts today?
    evidenceToGather: Collect pre-go-live workflow maps, denial reasons, and turnaround times from at least three proton centers and one new-modality launch.
  - priority: medium
