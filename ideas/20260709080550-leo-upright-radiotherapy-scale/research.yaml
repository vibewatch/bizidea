market:
  tam:
    value: $68.6M
    rationale: 'Modeled as ~196 unique advanced-radiotherapy programs globally: 133 particle-therapy facilities in operation plus 34 under construction [15][16], then adding Leo’s 57-contract upright pipeline [2] while assuming ~50% overlap between that pipeline and existing particle centers; multiplied by 2 eligible launch rooms/program and a conservative $175k estimated annual workflow budget/room = ~$68.6M.'
    isEstimate: true
    sourceRefs:
    - 2
    - 15
    - 16
  sam:
    value: $15.8M
    rationale: U.S. beachhead modeled as 60 of the 74 NCI-designated cancer centers or comparable regional systems with plausible first-room timing, multiplied by 1.5 eligible launch rooms and a $175k estimated annual workflow budget/room.
    isEstimate: true
    sourceRefs:
    - 17
  som:
    value: $2.1M
    rationale: Year-3 reachable share modeled as 12 live rooms across roughly 8-10 lighthouse systems at $175k annual budget per room, reflecting long procurement cycles and hands-on implementation needs.
    isEstimate: true
    sourceRefs:
    - 1
    - 20
    - 25
    - 38
