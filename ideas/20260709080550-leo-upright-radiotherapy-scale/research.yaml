openQuestions:
- How many of Leo’s 57 disclosed contracts are live or near-live U.S. regional-network rooms rather than academic flagship sites?
- Will payers treat upright delivery as ordinary proton/radiotherapy coverage, or will they ask for incremental evidence and documentation?
- How much of the required historical-case and referral data is practically accessible before a room launches, especially across multi-campus networks?
- Can a neutral software layer coexist with OEM deployment services, or will vendors try to bundle a “good enough” launch dashboard into the device sale?
