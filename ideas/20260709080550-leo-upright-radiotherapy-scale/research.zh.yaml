reportMemo:
  executiveTakeaways:
  - 滩头市场是真实的，但很窄：Leo 已把直立式放疗推成一个活跃采购品类，可见的铺开范围仍只在几十到一两百个先进站点之间，所以风险投资逻辑得建立在——工作流一旦跑通，就从直立式上线扩到相邻高 capex 放疗项目 [1][2][15][16][17]。
  - 当小型固定束系统能塞进现有机房，瓶颈就从土建转到上线编排；支付方授权、转诊转化和 调试投运吞吐，才是真正决定治疗室 ROI 的变量 [1][3][7][8][22][25][36]。
  - 医院本来就在被人手短缺、预授权拖延和碎片化 QA 工作流拖累，所以只要产品能拿掉手工协调，而不是再加一个看板，痛点就是真金白银的 [20][21][23][25][26][36][38][39]。
  - 现有厂商占着计划、治疗记录和企业数据，但没有谁专门盯首间治疗室的上线经济学——尤其是转诊、授权和模态准备度这几块 [27][28][29][30][36][38]。
  - 只要产品还停留在工作流和证据基础设施层，监管风险可控；一旦系统开始在没有临床医生复核的情况下给患者级临床或报销决策，风险就会明显抬升 [5][22][32][33][34]。
  marketDefinition: 本报告把市场定义为：一套给小型先进放疗首间治疗室降上线经济学风险的软件工作流——它负责预测合格患者、组装可直接送审的支付方授权材料包，并管理新的直立式或固定束治疗室的排班填充 [1][3][7][10][22][25]。
  customerAndBuyer: 核心用户是放疗运营负责人、首席医学物理师，以及转诊 / 收入周期经理，因为 调试投运、准备度和每日时段利用率都在他们手里；经济采购方通常是肿瘤服务线 SVP 或 CFO，因为人手缺口、预授权延误和治疗室装不满，都会直接改写上线 ROI [20][21][25][26][36][38][39]。
  buyingTriggers:
  - point: 一旦董事会批准，或小型直立式 / 固定束治疗室的改造启动，需求预测和支付方工作流就立刻变成现实运营任务。
    sourceRefs:
    - 1
    - 3
    - 7
    - 8
  - point: 某个中心的质子治疗转诊开始卡在支付方延误或报销范围不一致上，授权运营就会在投运前先暴露成瓶颈。
    sourceRefs:
    - 22
    - 23
    - 25
    - 26
  - point: 医学物理和运营团队意识到，如果不提前处理，调试投运、同行评审和 QA 交接只能继续在电子表格和孤岛系统里打转。
    sourceRefs:
    - 20
    - 36
    - 38
    - 39
    - 40
    - 48
    - 53
  willingnessToPay:
    summary: 预算很可能来自上线准备、服务线运营和避免拒赔的支出，而不是全新 IT 预算。买方本来就在吃人手短缺、手工预授权和 调试投运 / QA 开销的亏，所以只要工具能把“跑到利用率”这件事提速，就有机会直接从现有治疗室上线预算里把自己养出来。
    sourceRefs:
    - 20
    - 21
    - 22
    - 25
    - 26
    - 36
    - 38
  competitiveLandscape: 竞争不是正面对打，而是四分五裂：OIS / TPS 厂商管着治疗记录和排班，Epic 这类系统握着企业工作流和转诊数据，OEM 帮首台设备上线，院内物理团队和 PMO 再把缝补起来。真正的空白，是一套围绕上线前需求确定性和上线后爬坡执行的中立控制台 [27][28][29][30][36][38][39]。
  incumbentThesis:
  - incumbentClass: 治疗计划与肿瘤信息系统
    point: Varian、Elekta 和 RaySearch 占着核心治疗工作流，但它们不会天然赢下这一层，因为上线前的需求确定性、支付方材料包组装和转诊爬坡执行都不在它们的重心里。
    sourceRefs:
    - 27
    - 28
    - 29
  - incumbentClass: 企业级 EHR 工作流
    point: Epic 掌着最宽的患者与转诊数据平面，但它不是围绕模态专用的 调试投运、直立式适用性逻辑或单治疗室上线经济学来设计的。
    sourceRefs:
    - 30
    - 22
    - 32
  - incumbentClass: OEM 部署服务
    point: Leo 和 Mevion 主导的部署工作能帮一间治疗室上线，但 OEM 服务天生绑定单一设备，也很难自然长成跨网络基准或支付方运营数据集。
    sourceRefs:
    - 3
    - 7
    - 8
  - incumbentClass: 院内物理团队与 PMO 体系
    point: 电子表格、纸质活页夹和临时 QA 例程在首个站点上够灵活，但一旦 peer review、授权和吞吐需要一套可审计的多院区手册，它就撑不住了。
    sourceRefs:
    - 36
    - 38
    - 39
    - 40
    - 48
    - 53
  regulatoryLandscape: 风险最低的产品姿态，是做工作流、文档和互操作层。由于产品会处理转诊、影像和理赔关联的 PHI，HIPAA / GDPR 仍然适用；而 CMS 的 e-PA 规则也抬高了支付方与医疗服务提供方之间标准化数据交换的门槛。要是软件开始给患者级临床动作建议，或自动做报销判断，SaMD / MDR 问题就会难很多 [5][22][32][33][34]。
  technologyLandscape: 直立式 RT 现在在技术上已经站住，不再只是概念：固定束质子配置、直立式 CT / CBCT 和椅式定位系统都已存在；但站点仍要把固定化、影像引导以及 TPS / OIS 集成跑稳，日常工作流才能可靠 [7][8][10][11][13][38][39][40][67][84][87]。
  distributionChannels:
  - point: 和直立式 / 小型 OEM 及改造伙伴一起共销。它们本来就会制造上线里程碑，也需要客户治疗室尽快爬到吞吐。
    sourceRefs:
    - 3
    - 7
  - point: 直接卖进 PTCOG、NCI 相关癌症中心等放疗运营者社区，早期采用者本来就会在这里比较工作流。
    sourceRefs:
    - 15
    - 16
    - 17
  - point: 靠更快的授权周转和更少拒批，拿下与支付方相关的试点。
    sourceRefs:
    - 22
    - 23
    - 25
    - 26
  partnershipEcosystem:
  - point: OEM 和安装伙伴重要，因为设备配置、机房时间表和影像引导栈都从这里起头。
    sourceRefs:
    - 3
    - 7
    - 8
  - point: OIS、TPS 和 EHR 厂商都是必接的集成伙伴，即便它们也构成竞争威胁。
    sourceRefs:
    - 27
    - 28
    - 29
    - 30
  - point: 支付方和质子政策团体也重要，因为预授权规则和医疗必要性模板直接决定开治时间。
    sourceRefs:
    - 22
    - 23
    - 25
    - 26
  dataMoats:
  - point: 跨院区数据能告诉你：哪些适应症、哪类支付方、哪些转诊伙伴最能转成已授权治疗启动，这会沉淀成差异化的报销打法。
    sourceRefs:
    - 22
    - 23
    - 25
    - 26
  - point: 围绕直立式项目的摆位可重复性、患者舒适度和解剖变化基准，会逐步长成一套独有的直立式运营数据集。
    sourceRefs:
    - 10
    - 11
    - 63
    - 65
    - 67
    - 80
  - point: 跨 TPS / OIS / EHR 与设备栈的集成遥测，会积出通用 PMO 工具没有的切换成本。
    sourceRefs:
    - 27
    - 28
    - 29
    - 30
    - 40
  geographicConsiderations:
  - point: 美国是最可信的首个滩头市场：Marie 已获 FDA 批准，Stanford 已完成患者治疗，CMS 正推动 e-PA 现代化，NCI 指定癌症中心又聚集了最愿意创新的买方。
    sourceRefs:
    - 3
    - 4
    - 5
    - 17
    - 22
  - point: 欧洲和澳大利亚是第二波强地理市场，因为直立式研究基础和粒子治疗建设管线在这些地方最清晰。
    sourceRefs:
    - 10
    - 16
    - 19
  - point: 长期看，靠提升可及性来切入的低资源市场很有战略吸引力；但第一批软件销售大概率还是会落在那些既能接数据、又付得起运营软件的钱的头部中心。
    sourceRefs:
    - 14
    - 15
    - 20
  sensitivityCases:
  - case: Leo 合同转化慢于预期
    impact: 由于可见的直立式项目池仍然很小，短期 SAM 会收缩；公司得更早卖进相邻的质子或 MR-linac 上线。
    sourceRefs:
    - 1
    - 2
    - 15
    - 16
  - case: 在 CMS API 推动下，预授权摩擦缓解得比预期更快
    impact: 报销模块的差异化会被削弱，价值就得更多转到需求预测、转诊导流和爬坡分析上。
    sourceRefs:
    - 22
    - 23
    - 26
  - case: OEM 打包基础上线看板
    impact: 创业公司必须把差异化放在多厂商中立、支付方内容和跨院区基准上，而不是简单项目跟踪。
    sourceRefs:
    - 3
    - 7
    - 27
    - 28
    - 29
  validationPlan:
  - priority: high
    question: Leo 可见合同里，到底有多少是美国区域网络上线项目，而不是展示型学术站？
    evidenceToGather: 访问 8-10 家已点名或可推断的上线站点运营负责人，画清楚已投运治疗室时间表、支付方结构和数据系统准备度。
  - priority: high
    question: 今天最常拖慢质子或先进放疗启动的授权与转诊环节到底是哪几步？
    evidenceToGather: 从至少 3 家质子中心和 1 个新模态上线项目那里收集投运前流程图、拒批原因和周转时间。
  - priority: medium
    question: 买方会为一层中立软件付费，还是更想让 OEM / EHR 团队把现有工具往前补？
    evidenceToGather: 围绕上线准备支出，和肿瘤 CFO、放疗运营负责人以及 OEM 渠道伙伴做预算归属访谈。
