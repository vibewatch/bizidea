competitors:
- name: Varian ARIA CORE
  stage: incumbent
  wedge: 嵌在 Varian 治疗栈里的 record-and-verify 加排班系统。
  pricing: 未公开定价。
  strength: 装机基数深，且是放疗工作流里的主记录系统。
  weaknessVsUs: 它是为治疗中运营而建，不是为选房间之前的需求确定性或支付方材料编排而生。
  sourceRefs:
  - 28
- name: Elekta ONE
  stage: incumbent
  wedge: Elekta 体系内的云端肿瘤照护工作流与互操作平台。
  pricing: 未公开定价。
  strength: 在既有 Elekta 账户里，工作流覆盖面和互操作叙事都很强。
  weaknessVsUs: 平台很宽，但重心不在单治疗室上线经济学或社区转诊爬坡。
  sourceRefs:
  - 29
- name: RayCare
  stage: scale-up
  wedge: 与 RayStation 及设备编排紧密联动的现代肿瘤信息系统。
  pricing: 未公开定价。
  strength: 从端到端临床工作流自动化切得很深，且天然贴近计划系统。
  weaknessVsUs: 它围绕的是治疗中的临床工作流，不是利用率形成前的支付方、预测和转诊工作流。
  sourceRefs:
  - 27
- name: Epic oncology workflow
  stage: incumbent
  wedge: 覆盖肿瘤服务线的企业级 EHR、转诊与专科工作流基础设施。
  pricing: 企业级合同定价。
  strength: 掌握企业级患者数据、转诊入口，以及大量预授权上下文。
  weaknessVsUs: 缺少模态专用的直立式治疗室 调试投运 与爬坡逻辑。
  sourceRefs:
  - 30
