openQuestions:
- Leo 披露的 57 份合同里，到底有多少是已投运或接近投运的美国区域网络治疗室，而不是学术旗舰站？
- 支付方会把直立式给药当作普通质子 / 放疗报销来处理，还是会额外索要证据和文档？
- 在治疗室上线前，真正需要的历史病例和转诊数据到底有多少拿得到，尤其是多院区网络场景？
- 一层中立软件能否和 OEM 部署服务共存，还是厂商会试图在卖设备时顺手打包一个“够用”的上线看板？
