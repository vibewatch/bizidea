  tam:
    value: $68.6M
    rationale: 模型化 TAM 为约 $68.6M：全球约 196 个独立先进放疗项目，其中已运营粒子治疗中心 133 家、在建 34 家 [15][16]，再加上 Leo 的 57 份直立式合同管线 [2]，并假设这条管线与现有粒子中心约有 50% 重合；再乘以每个项目 2 间可切入的上线治疗室，以及每间每年约 $175k 的保守工作流预算。
    isEstimate: true
    sourceRefs:
    - 2
    - 15
    - 16
  sam:
    value: $15.8M
    rationale: 美国滩头 SAM 为模型化的 $15.8M：从 74 家 NCI 指定癌症中心里，挑出约 60 家最有希望迎来首间治疗室上线的中心或同类区域系统，再乘以每个目标项目 1.5 间合格治疗室和每间 $175k 的估算年度工作流预算。
    isEstimate: true
    sourceRefs:
    - 17
  som:
    value: $2.1M
    rationale: 第 3 年可触达份额为模型化的 $2.1M：约 8-10 家灯塔机构里的 12 间已投运治疗室，每间年预算 $175k；这个数字已经反映了长采购周期和高接触实施需求。
    isEstimate: true
    sourceRefs:
    - 1
    - 20
    - 25
    - 38
