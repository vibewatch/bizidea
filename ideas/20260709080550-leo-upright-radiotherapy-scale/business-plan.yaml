slug: upright-radiotherapy-utilization-os
date: '2026-07-09'
executiveSummary: >-
  This company should start as a vendor-neutral launch and utilization control plane for U.S. regional cancer networks opening
  their first compact upright radiotherapy room. The best first customer is a 3-6 campus network with one retrofit-ready vault,
  more than 20 community oncology referral partners, and a board-approved go-live inside 18 months. The immediate pain is not
  treatment planning or EMR replacement; it is proving enough reimbursable patients will arrive, packaging payer documentation,
  and filling early treatment slots before a newly built room looks underutilized. The wedge should stay narrow around
  retrospective eligible-volume forecasting, indication-specific authorization packet assembly, referral-to-consult routing, and
  first-90-day ramp dashboards for one room. That scope matches the buying trigger because budget appears when the capital project
  or retrofit starts and the sponsor must lock staffing, payer-readiness, and referral-ramp assumptions before commissioning
  ends. The strongest advantage is a neutral dataset on which indications, payers, referral partners, and launch playbooks
  actually convert into authorized treatment starts across sites and modalities. The biggest disconfirming risk is that the
  visible upright installed base stays too small or too academic, forcing the company to prove the same workflow works for
  compact proton and MR-linac launches sooner than planned. Researched market sizing is modeled and currently modest, and the
  U.S. regional-network share inside Leo’s disclosed 57 contracts is still unclear, so the first 12 months must validate budget
  ownership, forecast accuracy, and pilot-to-production conversion before a larger financing case exists.
problem:
  - Compact upright radiotherapy lowers construction burden, but cancer networks still risk misallocating capital if they cannot prove enough authorized patients will fill the first room.
  - Historical case review, prior authorization, referral coordination, QA handoffs, and go-live slot management still sit across spreadsheets, OEM services, payer portals, and siloed hospital systems, which slows launch and hides avoidable utilization leakage.
solution:
  - Deploy a read-first launch OS that mines historical cases, referral flows, and payer mix to forecast eligible volume and contribution by indication before the room opens.
  - Turn that forecast into daily operations by assembling payer-ready authorization packets, routing likely candidates from community referrers, and tracking first-90-day slot fill, denials, and leakage after go-live.
whyWeWin:
  - The company owns the pre-launch decision window where one avoided underfilled room changes service-line ROI materially and where incumbent OIS, EHR, and OEM tools are least specialized.
  - Each deployment compounds cross-site data on indication eligibility, payer friction, referral conversion, and ramp benchmarks that a single health system, OEM, or generic BI layer does not centralize today.
strategicChoices:
  beachhead: U.S. regional cancer networks with 2-8 campuses, one retrofit-ready vault or ambulatory shell, and a first compact upright radiotherapy room scheduled to go live within 18 months.
  wedgeRationale: >-
    This is the fastest proof point because the buying trigger, room-level budget, and success metrics all appear at one
    moment—capital approval and launch preparation for a single new room. Selling a broader oncology workflow platform would
    force longer integrations and weaker ROI attribution before the company knows whether forecast, authorization, and
    referral-ramp logic are truly differentiated.
  sequencingRationale: >-
    Product should start with retrospective forecasting, payer packet assembly, referral routing, and launch dashboards because
    those are the minimum workflows that convert a hardware purchase into a financially predictable room. GTM should stay
    founder-led and partner-assisted until 2-3 U.S. lighthouse systems prove paid pilots, after which the company can add
    post-go-live denial benchmarks, adjacent compact-proton templates, and a dedicated seller; hiring sales ahead of
    implementation and clinical credibility would outrun the narrow installed base.
  notYet:
    - Replacing the oncology information system, treatment planning system, or enterprise EHR
    - Automated patient-specific clinical recommendations or coverage decisions without human review
    - Europe and Australia direct expansion before the U.S. launch playbook and payer packet library are repeatable
    - General prior-authorization software outside advanced-radiotherapy launch workflows
market:
  tam: "$68.6M modeled TAM based on roughly 196 unique advanced-radiotherapy programs globally, 2 eligible launch rooms per program, and an estimated $175k annual workflow budget per room."
  sam: "$15.8M modeled U.S. beachhead SAM based on about 60 plausible NCI-designated or comparable cancer systems and 1.5 eligible rooms per target program."
  som: "$2.1M modeled year-3 SOM based on 12 live rooms across roughly 8-10 lighthouse systems at about $175k annual spend per room."
  segments:
    - U.S. regional cancer networks launching a first compact upright radiotherapy room
    - Compact proton and MR-linac launch programs as the next adjacent segment after upright proof
  buyingProcess: >-
    The champion is usually the VP of radiation oncology operations or chief medical physicist once board approval, retrofit
    kickoff, or commissioning planning exposes uncertainty around eligible volume and payer readiness. Economic sign-off likely
    sits with the oncology service-line SVP or CFO, and deals should start as a paid pre-go-live pilot that converts to an
    annual per-room contract once the room launch and first-90-day ramp are on track.
product:
  mvp: >-
    MVP is a read-only launch-control plane for one room that ingests historical case, referral, and authorization data,
    estimates eligible patient volume by indication and payer, produces insurer-specific packet checklists, and tracks
    pre-go-live and first-90-day ramp metrics. It should coexist with EHR, OIS, TPS, and OEM tools rather than replace them,
    and keep all clinical or coverage judgments in human-reviewed recommendation mode.
  sixMonth: >-
    Complete 2 paid U.S. pilots with retrospective demand models, manual-to-assisted payer packet workflows, community-referral
    routing lists, and weekly ramp dashboards tied to one room launch.
  twelveMonth: >-
    Convert at least 2 pilots to production, add repeatable read-only connectors into the dominant EHR, OIS, and referral data
    sources, and release denial-reason benchmarks plus schedule-fill analytics for first-room ramp management.
  twentyFourMonth: >-
    Expand the same workflow into compact proton and MR-linac launches, add cross-site benchmark reporting, and support
    multi-room portfolio planning inside existing customer systems without becoming a treatment-system replacement.
  keyBets:
    - Buyers will pay for a neutral per-room workflow layer before incumbents or OEMs offer enough pre-launch demand certainty.
    - Historical case and referral data are accessible enough to predict eligible volume accurately without a multi-quarter integration project.
    - Authorization packet assembly and denial feedback can create measurable first-year room-utilization lift, not just administrative convenience.
    - The upright wedge can expand into adjacent high-capex radiotherapy modalities before the initial beachhead saturates.
gtm:
  wedge: Sell a paid launch-readiness and ramp-control pilot for one new room rather than a broad oncology analytics platform or generic prior-authorization product.
  channels:
    - Founder-led direct sales to oncology service-line leaders, radiation operations leaders, and chief medical physicists at regional cancer networks
    - OEM, retrofit-partner, and compact-proton ecosystem referrals tied to room launch milestones
    - Radiation-oncology operator communities and lighthouse-site references after the first customer-owned ramp case study
  funnelTargets: "Lead→qualified pilot 15-25%, qualified pilot→paid pilot 20-30%, paid pilot→annual production 50%+, first-room customers→second-room or adjacent-modality expansion within 18 months in 30%+ of converted accounts."
  pricing: >-
    Start with a paid pre-go-live pilot and implementation package for one room, then convert to an annual subscription priced
    per launched treatment room plus one-time data-mapping and payer-configuration fees. This matches buyer economics because
    the sponsor is paying to de-risk room ROI, accelerate authorized starts, and reach throughput targets, not to license user
    seats.
businessModel:
  revenueStreams:
    - Annual per-room software subscription for launch planning and ramp management
    - One-time implementation, data-mapping, and payer-configuration fees
    - Premium cross-site benchmark and adjacent-modality launch modules
  unitOfValue: One launched treatment room managed from pre-go-live forecast through first-year ramp
  targetGrossMarginPct: 70
  expansionLevers:
    - Add rooms within the same cancer network after the first launch proves ROI
    - Extend the same workflow into compact proton, MR-linac, and other advanced-radiotherapy launches
    - Sell benchmark and denial-performance analytics once enough cross-site data accumulates
    - Build co-sell or reseller motions with OEM and retrofit partners once neutrality is trusted
strategyMap:
  northStarMetric: Percent of modeled first-year room capacity converted into authorized treatment starts within 180 days of go-live
  inputMetrics:
    - Retrospective eligible-volume forecast error versus actual treated patients
    - Median authorization turnaround days by indication and payer
    - Referral-to-consult conversion rate from targeted community oncology partners
    - First-90-day treatment starts versus launch-plan target
    - Paid pilot to annual production conversion rate
  moatsToBuild:
    - Cross-site dataset on which indications, payer policies, and referral partners actually convert into authorized treatment starts
    - Reusable integration and launch-playbook library across EHR, OIS, TPS, OEM, and revenue-cycle stacks
    - Neutral benchmark data on first-room ramp performance across upright, compact proton, and adjacent modalities
  killCriteria:
    - Fewer than 3 U.S. design partners with live launch timing inside 18 months agree to share historical case and referral data within the first 9 months.
    - Retrospective pilots cannot predict first-90-day eligible start volume within ±20% or reduce median authorization turnaround by at least 20% versus baseline.
    - Fewer than half of paid pilots convert to annual per-room contracts because buyers collapse the spend into OEM services or incumbent systems.
  mermaid: |
    flowchart LR
      Wedge[Single-room launch wedge] --> MVP[Forecast plus authorization MVP]
      MVP --> Proof[Forecast accuracy and ramp proof]
      Proof --> Expansion[Multi-room and adjacent-modality expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: High pain and a disciplined wedge are real, but conviction stays limited until one U.S. regional network proves budget ownership and the category expands beyond a very small initial installed base.
    whyBelieve: Compact upright radiotherapy shifts the bottleneck from construction to launch orchestration, creating a measurable operating problem that a neutral workflow layer can attack before the room is fully live.
    whyDoubt: The near-term market is modeled and modest, and buyers may default to OEM services, incumbent systems, or internal teams before funding a new standalone category.
    nextDiligence: Secure one U.S. lighthouse launch with customer-owned baselines on forecast accuracy, authorization turnaround, and first-90-day treatment starts, plus evidence that the same workflow applies to at least one adjacent modality.
  firstCustomer:
    title: VP of radiation oncology operations at a regional cancer network launching its first compact upright room
    profile: Runs a 3-6 campus network with one retrofit-ready vault, more than 20 community oncology referral partners, and an Epic plus OIS stack that still manages launch readiness through spreadsheets, payer portals, and manual coordination.
    trigger: Board approval or retrofit kickoff forces the team to prove reimbursable patient volume, build indication-specific payer documentation, and fill early slots before commissioning ends.
    buyer: SVP of oncology service line
    initialContract: "$50K-$100K paid pre-go-live pilot for one room, converting to roughly $175K-$250K ARR per launched room plus implementation once the launch, authorization, and ramp workflows stay in production."
  mustBeTrue:
    - At least a few U.S. regional networks with first-room launch timelines inside 18 months will buy a neutral workflow layer before go-live.
    - Historical case, referral, and payer data must support forecast accuracy tight enough to influence staffing and capex decisions.
    - Authorization and referral orchestration must improve time-to-start or denial performance enough to justify per-room software spend near the modeled workflow budget.
    - Buyers must prefer vendor-neutral launch control over waiting for OEM dashboards or incumbent EHR and OIS extensions.
    - The workflow must transfer into compact proton or MR-linac launches, or the beachhead will remain too small for venture-scale returns.
  diligenceQuestions:
    - How many of Leo's disclosed 57 contracts are U.S. regional-network launches with go-live inside 18 months rather than academic flagships?
    - Which pre-go-live data sets can the startup actually access across historical cases, referral logs, payer outcomes, and scheduling in a typical customer?
    - Who owns launch-readiness software budget in practice across oncology operations, revenue cycle, the capital project office, and the CFO?
    - What measurable KPI is strong enough to displace OEM services or internal spreadsheets across forecast accuracy, authorization turnaround, denial reduction, and room-fill rate?
    - How much additional product work is required to support compact proton or MR-linac launches beyond the upright use case?
operatingAssumptions:
  - assumption: Enough U.S. regional cancer networks will have first-room launch timing inside 18 months to support 2-3 paid pilots before the upright market matures.
    basis: research.yaml
    validationTest: Build a target list of 15 likely systems and secure at least 3 signed design-partner or pilot LOIs with named room-launch dates inside 9 months.
    decisionImpact: If false, the company must move adjacent-modality expansion into year one and reduce confidence in a pure upright beachhead.
  - assumption: Buyers will fund launch-readiness software from service-line or capital-launch budgets rather than waiting for OEM or EHR extensions.
    basis: research.yaml
    validationTest: In 10 qualified buyer conversations, get at least 4 to confirm paid pilot budget and 2 to accept a per-room annual pricing framework near the modeled spend.
    decisionImpact: If false, the product may need a partner-led resale model, a services-heavy motion, or a narrower analytics-only posture.
  - assumption: Historical case, referral, and authorization data can be ingested quickly enough to deliver useful forecasts without full write-back integration.
    basis: idea.yaml
    validationTest: Complete 2 retrospective pilots within 6 weeks each and produce forecast plus denial baselines from read-only feeds or structured exports.
    decisionImpact: If false, the roadmap should narrow to post-go-live authorization and ramp analytics instead of pre-launch demand certainty.
  - assumption: Indication-specific payer packet assembly and denial feedback can reduce avoidable launch delays materially.
    basis: research.yaml
    validationTest: In the first live pilot, reduce median authorization turnaround by at least 20% or avoidable denial rate by at least 15% in targeted indications versus baseline.
    decisionImpact: If false, pricing and positioning must lean more heavily on demand forecasting and schedule-fill analytics than reimbursement workflow.
  - assumption: The same operating system can support compact proton or MR-linac launches with modest additional workflow content.
    basis: operator judgment
    validationTest: By month 12, complete 3 adjacent-modality workflow interviews and 1 retrospective prototype showing shared data model coverage for forecast, authorization, and ramp tracking.
    decisionImpact: If false, the venture case and fundraising plan must reset around a materially smaller category.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 radiation operations leaders, chief medical physicists, revenue-cycle managers, and OEM or retrofit partners in the U.S. beachhead.
    hypothesis: The same buying trigger appears when board approval or retrofit kickoff exposes uncertainty around reimbursable volume and payer readiness.
    successMetric: At least 10 interviews confirm a shared trigger and 5 buyers share current-state launch workflows or sample data extracts.
    owner: CEO founder
  - horizon: 0–90 days
    experiment: Run 2 concierge retrospective launch-readiness assessments using historical case, referral, and payer data from candidate networks.
    hypothesis: Even a semi-manual workflow can quantify eligible volume, payer friction, and early slot-fill risk well enough to justify a paid pilot.
    successMetric: Two assessments produce baseline forecast and denial findings, and at least 1 converts to a paid pilot proposal.
    owner: Product and implementation lead
  - horizon: 90–180 days
    experiment: Ship the first read-only MVP for one room with historical-case ingestion, authorization packet checklists, referral routing, and weekly ramp dashboards.
    hypothesis: A useful pilot can go live without replacing the OIS, EHR, or OEM project tools if the workflow stays focused on one room.
    successMetric: First paid pilot launches within 8 weeks of kickoff and reports weekly forecast, authorization, and slot-fill metrics without major workflow disruption.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Test paid pilot packaging and annual per-room pricing with at least 3 qualified buyers and 1 OEM or retrofit referral partner.
    hypothesis: Buyers will accept a defined pre-go-live pilot more readily than open-ended consulting if the conversion path to room-level ROI is explicit.
    successMetric: At least 2 paid pilots signed and 1 annual pricing framework accepted in principle pending KPI attainment.
    owner: CEO founder
  - horizon: 180–360 days
    experiment: Add denial-reason feedback loops and compare authorization turnaround plus treatment-start timing against baseline in live pilots.
    hypothesis: Reimbursement workflow improvement is material enough to separate the product from generic project management or BI tools.
    successMetric: At least 1 customer shows a 20% faster median authorization cycle or a 15% lower avoidable denial rate in targeted indications.
    owner: Clinical reimbursement lead
  - horizon: 180–540 days
    experiment: Map the same workflow into one compact-proton or MR-linac launch and one OEM or retrofit co-sell motion.
    hypothesis: Adjacent modalities share enough launch economics and workflow pain to support expansion before the upright market saturates.
    successMetric: One adjacent-modality pilot opportunity enters late-stage pipeline and one partner-sourced opportunity reaches signed evaluation scope.
    owner: Strategic partnerships lead
operations:
  - Maintain read-only integrations, BAAs, role-based access, and audited workflow logs because the product handles PHI but should avoid acting as a system of record.
  - Keep payer packet templates and denial taxonomies under clinician and revenue-cycle review so the product stays in workflow-support territory rather than autonomous coverage decisioning.
  - Run a weekly launch operating cadence across referral volume, authorization status, commissioning readiness, and slot fill for each live room.
  - Standardize one-room onboarding playbooks before attempting multi-room rollouts or international expansions.
team:
  - role: CEO founder
    startTiming: Month 0
    rationale: Owns founder-led sales, design-partner recruitment, OEM and retrofit relationships, and capital-project ROI storytelling while the category is still being defined.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the read-only data model, payer packet workflows, audit logging, and the integrations that determine time-to-live.
  - role: Product and implementation lead
    startTiming: Month 1
    rationale: Encodes launch workflows across operations, physics, and revenue cycle and turns each pilot into a repeatable onboarding playbook.
  - role: Clinical reimbursement lead
    startTiming: Month 3
    rationale: Maintains indication-specific payer content, validates denial-reason logic, and keeps the product inside a low-regulatory workflow posture.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Shortens deployment time by productizing common EHR, OIS, referral, and claims integrations once the first pilots expose recurring patterns.
  - role: Strategic partnerships lead
    startTiming: Month 9
    rationale: Added only after initial pilot proof to formalize OEM, retrofit, and adjacent-modality distribution without hiring a broad sales team too early.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2-3 paid U.S. launch-readiness pilots with named room go-live dates
      - Prove retrospective forecast baselines and first live authorization plus referral dashboards for one room
      - Convert at least 2 pilots into annual per-room production contracts or adjacent-modality equivalents
      - Publish one customer-owned case study showing forecast accuracy, faster authorization, or stronger first-90-day room-fill performance
  - horizon: 12–24 months
    items:
      - Expand from upright-only pilots into at least one compact-proton or MR-linac launch workflow
      - Release cross-site denial, referral, and ramp benchmark reporting across production customers
      - Win the first multi-room or multi-site expansion inside an existing cancer-network customer
      - Establish one repeatable OEM, retrofit, or ecosystem partner referral motion
  - horizon: 24–36 months
    items:
      - Reach the modeled path of roughly 12 live rooms or revise the thesis based on actual launch cadence and conversion data
      - Demonstrate that adjacent-modality revenue materially enlarges the beachhead beyond upright-only demand
      - Decide whether to deepen vendor-neutral launch workflow ownership or reposition as a benchmark and analytics layer if incumbents close the execution gap
risks:
  - risk: Upright room deployments may slip, concentrate in academic flagships, or fail to create enough U.S. regional-network launches for a repeatable pipeline.
    likelihood: High
    impact: High
    mitigation: Qualify adjacent compact-proton and MR-linac launches by month 12 and do not build product features that only fit Leo-specific workflows.
  - risk: OEM services, Epic, or incumbent OIS vendors may offer enough launch tooling to make a standalone product hard to justify.
    likelihood: High
    impact: High
    mitigation: Differentiate on vendor neutrality, cross-site benchmarks, payer packet depth, and referral-ramp analytics rather than project tracking or scheduling alone.
  - risk: Historical case, referral, and authorization data may be too fragmented to deploy quickly in real hospital environments.
    likelihood: Medium
    impact: High
    mitigation: Start with read-only extracts, narrow the required data model to launch-critical fields, and keep a structured manual-upload fallback for early pilots.
  - risk: Clinical teams may distrust eligibility or utilization recommendations if the logic is opaque or appears to cross into clinical decision support.
    likelihood: Medium
    impact: High
    mitigation: Keep humans in the loop, expose rules and evidence by indication, and limit early automation to documentation and workflow routing.
  - risk: Per-room software budgets and long enterprise sales cycles may not support venture-scale economics before the company expands beyond the initial wedge.
    likelihood: Medium
    impact: High
    mitigation: Use short paid pilots, tie pricing to room-level ROI, and require adjacent-modality validation before scaling headcount or raising a larger round.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: Build the read-only launch-control MVP, complete 2-3 paid U.S. pilots, harden payer-content and integration foundations, validate one adjacent-modality expansion path, and reach enough customer-owned proof on room economics to justify a seed round.
