scenarios:
  downside:
    description: >-
      Pilot-to-production conversion falls to the BP's own kill-criterion boundary (1 of first 3 pilots converts,
      i.e., under half) because buyers collapse spend into OEM services or incumbent EHR/OIS extensions, and the
      adjacent-modality prototype slips past Y3. Room count reaches only ~8 by Y3 instead of 12, revenue scales down
      proportionally, and headcount does not shrink as fast as revenue, so cash goes negative before Y3 end and a
      bridge or down-round is required before the modeled 12-24 month milestone is reached.
    y3RevenueK: 1150.0
    y3EbitdaK: -750.0
    cashLowPointK: -350.0
    keyAssumptionChanges:
      - "Pilot-to-production conversion drops to 33% (1 of 3) vs. 67% base, per BP killCriteria threshold"
      - "Adjacent-modality validation slips from Y2 into Y3+, delaying the SOM path"
      - "Room count reaches ~8 by Q4Y3 instead of 12"
  base:
    description: >-
      2 of the first 3 paid pilots convert to annual production contracts in Y1, a 3rd converts in Y2Q1, and the
      company adds ~1 new room per quarter through Y2 plus an accelerated push (adjacent-modality plus multi-room
      expansion) to reach 12 live rooms by Q4Y3, matching research.yaml's modeled Y3 SOM. Gross margin ramps from
      thin/negative in the pilot-heavy Y1 months toward the 70% target as delivery efficiency improves.
    y3RevenueK: 1721.9
    y3EbitdaK: -343.6
    cashLowPointK: 190.2
    keyAssumptionChanges:
      - "Matches the main totals/unitEconomics in this model"
  upside:
    description: >-
      All 3 of the first pilots convert to production, the adjacent-modality prototype (compact proton/MR-linac)
      converts into paid pilots by mid-Y2, and OEM/retrofit-partner referrals shorten the sales cycle, pushing room
      count to ~16 by Q4Y3 at a blended ARPU nearer the top of the BP's $175K-$250K range (reflecting adjacent-
      modality premium pricing). Operating leverage turns EBITDA modestly positive by Q4Y3.
    y3RevenueK: 2950.0
    y3EbitdaK: 210.0
    cashLowPointK: 850.0
    keyAssumptionChanges:
      - "Pilot-to-production conversion reaches 100% (3 of 3) plus 1 adjacent-modality pilot converts in Y2"
      - "Blended ARPU rises toward $225K/room reflecting adjacent-modality pricing premium"
      - "Room count reaches ~16 by Q4Y3 instead of 12"
