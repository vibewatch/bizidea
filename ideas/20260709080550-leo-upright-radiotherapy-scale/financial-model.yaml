modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Target[Target: 3-6 campus network, 1 retrofit-ready vault] --> Pilot[Paid pre-go-live pilot: $75K]
      Pilot --> Convert{Converts to production?}
      Convert -->|~67% Y1| Production[Annual per-room ARR: $175K]
      Convert -->|~33%| Churned[No conversion: pilot-only]
      Production --> Rooms[Live rooms: 3 Y1 to 12 Y3]
      Rooms --> Revenue[Recognized revenue]
      Revenue --> GrossProfit[Gross profit at ~70% target margin]
      GrossProfit --> Cash[Operating cash balance]
      Cash --> NextRound[Seed round at 12-24mo milestone]
modelSanity:
  - checkName: Revenue engine
    finding: Revenue is driven by converting $75K paid pre-go-live pilots into $175K/year per-room production contracts, scaling from 3 rooms at Y1 end to the research.yaml-modeled Y3 SOM of 12 rooms.
  - checkName: Must go right
    finding: At least 2 of the first 3 paid pilots must convert to annual production contracts within Y1 (the BP's own milestone) to keep the room ramp, gross margin trajectory, and cash runway on the base-case path.
  - checkName: Model breaks if
    finding: If pilot-to-production conversion falls to the BP's killCriteria boundary of under half, the downside scenario shows Y3 revenue falling ~33% and cash turning negative before Y3 end, forcing a bridge round.
  - checkName: Next-round proof
    finding: Closing 2+ production contracts, validating one adjacent-modality (compact proton or MR-linac) prototype, and publishing a customer-owned ramp case study by month 18-24 is the proof set that justifies raising a seed round on top of this $2.0M pre-seed.
sanityChecks:
  ruleOf40: "Y3 revenue growth 76.6% + Y3 EBITDA margin -20.0% = Rule-of-40 score ~56.6, driven mostly by growth rather than profitability"
  burnMultiple: "Y2 burn multiple ~1.07x improving to ~0.39x by Y3 (Bessemer heuristic: under 1x = capital-efficient growth), reflecting operating leverage as rooms scale faster than headcount"
  revenuePerFte: "$233K Y3 exit ARR run-rate per FTE (12 rooms x $175K / 9 FTE), within the $200K-$400K SaaS benchmark range but at the low end given the specialized clinical/implementation headcount mix"
  flags:
    - "TAM/SAM/SOM in research.yaml are explicitly labeled modeled estimates (isEstimate:true), so the entire Y3 revenue ceiling this model targets (12 rooms, $2.1M SOM) inherits that uncertainty rather than being empirically observed."
    - "Gross margin is negative in 5 of the first 9 Y1 months because pilot-phase delivery labor outweighs thin pilot-fee revenue; the 70% target margin is a steady-state assumption that has not yet been proven in a live production room."
    - "CAC ($125K/room) and post-production monthly churn (1.5%) are heuristic estimates with no BP/research-sourced empirical basis, since the company has not yet closed a single paid pilot -- both should be replaced with actuals after the first 2-3 pilot conversions."
    - "The model assumes no additional financing beyond the $2.0M pre-seed; cash falls to a ~1-month buffer by Q3Y3-Q4Y3, meaning a seed round must close by roughly month 30 (well before the 36-month mark) or the company must slow hiring."
    - "Revenue concentration risk is high: losing even 1 of the first 2-3 converted anchor rooms would materially change the Y1-Y2 growth trajectory, echoing the BP's own risk that per-room budgets and long enterprise sales cycles may not support venture-scale economics."
    - "Y2/Y3 headcount and overhead figures are interpolated linearly between Y1-end and Y3-end snapshots rather than driven by a granular hiring plan, so quarter-to-quarter opex step-changes in reality may be lumpier than shown here."
