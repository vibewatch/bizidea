problem: 生物实验室可以买到移液机器人、培养箱和酶标仪，但最折腾的活仍然是把科学家写的 SOP 翻成各家设备能跑的脚本，以及在 run 跑到一半失败时把它救回来。对小型 CRO 和转化核心实验室来说，少数几名自动化工程师卡住了每一条新 assay、每一次站点迁移和每一轮排障。每次 run 失败，烧掉的不只是样本和技师时间，还有客户信心；因为今天的工具大多按厂商割裂，跨设备诊断也很弱。
targetUser:
  primary: 合成生物学 CRO 和转化核心实验室里的实验室自动化工程师、assay 开发负责人
  secondary: 负责写实验方案的台式实验科学家，但要靠自动化工程师把这些方案真正跑在一组混合仪器上
  buyer: 实验室自动化负责人、平台运营 VP，或核心设施主任
startupThesis:
  nonObviousInsight: 真正稀缺的已经不是写出一份像样的生物学实验方案，而是把它编译成真实异构仪器所需的设备图、耗材假设和恢复逻辑。2026 年 7 月这次发布之所以关键，是因为它把端到端执行、接近人工的基准成绩和失败后再生成放到了一起——这说明这层翻译层正从研究 demo 走向可部署基础设施。
  beachhead: 50–300 人的合成生物学 CRO 和转化核心实验室，跑的是 qPCR、ELISA、细胞活性这类定制工作流；实验室里混用移液机器人、培养箱和酶标仪，但自动化工程师只有 2–5 个
  wedge: 吃进一份 SOP，把它映射到现有设备和耗材上，先模拟最可能出错的环节，再生成各家厂商可执行的 run 计划；一旦 run 偏了，还能给出人工可复核的恢复步骤
  whyNowCatalyst: 2026 年 7 月这次经核验的发布，第一次把带湿实验反馈和失败再生成的闭环 protocol-to-device 栈摆到台面上，让厂商中立的执行编译器开始可信。
  ventureScalePath: 先拿下一类重复性高的 assay，再往上长成 CRO、biotech 平台团队，乃至更后期受监管工艺开发实验室的自动化 R&D 控制平面；增长抓手是实验方案版本管理、设备适配器、run 遥测、库存钩子、合规轨迹和多站点迁移。
solution: 产品先做成压在实验室现有硬件之上的实验方案编译器。科学家上传 SOP 或结构化实验方案后，系统先拆成试剂、时间、耗材和测量步骤，再按已安装设备及其约束逐一映射。执行前，它会先把缺液、耗材不兼容、时序不安全和仪器资源冲突等高概率失败点跑一遍模拟，把问题抛给人工审核。执行中，系统持续吃设备日志和 assay 输出，发现偏差后给出已批准的恢复或重跑指令，不再逼工程师从零排查。每一次被验证过的 run，都会沉淀成下一次 assay 迁移、客户项目和站点 rollout 可复用的执行 IP。
goToMarketSeed:
  firstCustomer: 75–200 人的合成生物学 CRO 里负责实验室自动化的人，卖的是定制 assay 开发项目，手上有 3–10 个机器人 workcell；每次科学家实验方案要翻译或重跑，团队都要丢掉好几天。
  buyingTrigger: 来了新客户 assay、新的机器人 workcell，或第二个实验室站点，团队必须赶在 deadline 前把同一套实验方案在不同设备上复现出来。
  currentAlternative: 自动化工程师用各家厂商脚本工具、电子表格和临时排障来手工翻译实验方案。
  switchingReason: 编译器能把上线准备从几天压到几小时，少走失败 run 的排障弯路，还能把跨项目执行经验沉淀下来，而不是埋在某个工程师的私有脚本里。
  pricingHypothesis: 按机器人 workcell 收年费，每个验证过的实验方案家族再收一次 onboarding 费用。
