topRisks:
- name: 设备集成摊子越铺越大
  description: 在产品市场契合被证明之前，支持异构实验室硬件就可能先把团队拖进无底洞。
  mitigation: 先围住一类 assay，再围住共创客户实验室里最常见的 workcell 组合，只做一组很窄的适配器。
- name: 验证与信任门槛
  description: 如果拿不出已编译 run 既安全又可复现的证据，实验室不会轻易让软件影响湿实验执行。
  mitigation: 先把人放在环里，用模拟检查、run diff 和可审计审批打底，再一点点放大自动化权限。
- name: 独立证据太薄
  description: 当前市场信号几乎全压在 1 则已核验公告上，真实买方紧迫度和采用速度都可能被高估。
  mitigation: 优先去找已经在为这类痛点配人头的客户，用付费试点硬测 setup 时间和失败 run 指标；如果预算权不强，就尽快砍掉这条切口。
