differentiator: 这不是又一个泛化的 AI scientist，也不是单一厂商的 lab OS。切口是厂商中立的执行编译器，加上一层失败回放/恢复层，压在实验室现有设备之上，在信任最关键的地方保留人工审批。护城河会随着设备适配器、实验方案归一化能力，以及一套越来越厚的已验证恢复路径库一起变深——这些东西，竞争对手靠静态 SOP 很难倒推出来。
