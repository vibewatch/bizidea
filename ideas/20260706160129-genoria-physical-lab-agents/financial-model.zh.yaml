slug: wet-lab-execution-compiler
date: '2026-07-06'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 融资交割前模型先开跑
  value: 起始现金在 M1 的 pre-seed 交割前按 $0 处理
  unit: 假设
  source: 采用创业财务启发式，好让这轮融资规模把现金桥接关系直接算清楚。
- id: A2
  name: pre-seed 金额与到账时间
  value: $2.0M 在 M1 交割
  unit: 美元
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M]，再叠加模型对 18 个月验证节点 burn 和 6 个月缓冲的测算。'
- id: A3
  name: 第 1 年共创客户数
  value: 到 M10 拿下 3 个付费共创客户，到 M12 累计 3 个客户 logo
  unit: 客户数
  source: '[BP milestones 0-12 months sign 2-3 paid design partners]。'
- id: A4
  name: 第 1 年后的客户爬坡
  value: Q1Y2 4、Q2Y2 5、Q3Y2 6、Q4Y2 8、Q1Y3 10、Q2Y3 12、Q3Y3 13、Q4Y3 15
  unit: 期末客户数
  source: '[BP milestones 12-24 months reach 5-8 paying customers] 和 [BP market/research SOM 15 customers in year 3]。'
- id: A5
  name: 每个活跃客户月度付费试点收入
  value: '12.5'
  unit: 千美元 / 客户 / 月
  source: '[BP investorMemo.initialContract $50k-$100k including onboarding] 的中位数，按约 6 个月摊开。'
- id: A6
  name: Y2 转化客户收入爬坡
  value: 按季度分别为 16.0、18.0、20.0、22.0
  unit: 千美元 / 客户 / 月
  source: '[BP milestones 12-24 months $180k-$300k annual production contracts]，并朝区间中部逐步爬升。'
- id: A7
  name: Y3 成熟客户收入爬坡
  value: 按季度分别为 23.0、25.0、26.0、27.5
  unit: 千美元 / 客户 / 月
  source: '[Research market.som 15 customers × 6 workcells × $55k]，对应到 Q4Y3，成熟客户 ARR 大约是 $330k。'
- id: A8
  name: 毛利率爬坡
  value: Y1 有收入月份 45%-60%，Y2 为 62%-71%，Y3 为 71%-73%
  unit: 百分比
  source: '[BP businessModel targetGrossMarginPct 72]，同时按 [BP risks device-integration sprawl and services-heavy onboarding] 做了下调。'
- id: A9
  name: 创始人全成本薪酬
  value: '144'
  unit: 千美元 / 年 / 人
  source: 采用创业财务启发式：pre-seed 阶段创始人现金薪酬低于市场价，但计入完整用工负担。
- id: A10
  name: 平台工程师全成本薪酬
  value: '210'
  unit: 千美元 / 年 / 人
  source: 采用创业财务启发式：按资深软件人才薪酬加用工负担估算。
- id: A11
  name: 专业运营岗位全成本薪酬
  value: '180'
  unit: 千美元 / 年 / 人
  source: 采用创业财务启发式：适用于自动化集成、GTM 和质量 / 合规岗位。
- id: A12
  name: G&A / 运营支持全成本薪酬
  value: '120'
  unit: 千美元 / 年 / 人
  source: 采用创业财务启发式：对应早期运营支持岗位薪酬加用工负担。
- id: A13
  name: 第 1 年招聘时间点
  value: 集成岗位 M4，GTM M7，质量 / 合规 M10
  unit: 月份
  source: '[BP team startTiming]。'
- id: A14
  name: 第 2、3 年招聘时间点
  value: 平台工程 M13 和 M16，集成 M18 和 M34，G&A M27，GTM M28，产品 / 合规 M30，平台工程 M31
  unit: 月份
  source: '[BP strategicChoices sequencingRationale]，再叠加一个保守爬坡，让团队既能支撑 8 家客户，也能撑到 15 家客户，而不假设服务团队无限膨胀。'
- id: A15
  name: 非薪酬 R&D 成本爬坡
  value: 8 到 20
  unit: 千美元 / 月
  source: 采用创业财务启发式，锚定 [BP operations] 里的模拟、设备日志接入和 QA 基础设施。
- id: A16
  name: 非薪酬 S&M 成本爬坡
  value: 1 到 14
  unit: 千美元 / 月
  source: 采用创业财务启发式，锚定 [BP gtm] 里的创始人主导企业销售差旅、试点管理和伙伴拓展。
- id: A17
  name: 非薪酬 G&A 成本爬坡
  value: 5 到 15
  unit: 千美元 / 月
  source: 采用创业财务启发式，锚定法务、保险、合规管理和一般办公支出。
- id: A18
  name: 单位经济里的量产 ARPU
  value: '275'
  unit: 千美元 / 客户 / 年
  source: '[Research bottomUpSizingDrivers $55k per workcell] × 5 个 workcell，落在 [BP investorMemo production contract $180k-$300k] 区间之内。'
- id: A19
  name: 基准情景下每个转化量产客户的 CAC
  value: '110'
  unit: 千美元
  source: '[BP gtm funnelTargets]，再叠加模型里创始人主导销售和重试点企业销售动作下的 S&M 开支。'
- id: A20
  name: 基准月流失率
  value: '1.5'
  unit: 百分比
  source: 采用创业财务启发式：这是粘性较强的工作流软件，但产品还早、跨站点验证也尚未完全成熟。
- id: A21
  name: 平均客户生命周期
  value: '66.7'
  unit: 个月
  source: 由 A20 推导，公式是 1 / 月流失率。
- id: A22
  name: 融资储备原则
  value: 把 burn 控到 $2.0M 融资额之内，让公司既能跑到 18 个月验证节点，又能再多扛 6 个月，并在模型最低点仍保留约 $450K 运营储备
  unit: 原则
  source: '[BP fundingAsk runwayMonths 18]，以及阶段要求里额外留出 6 个月缓冲。'
- id: A23
  name: 现金转换简化假设
  value: EBITDA 近似现金变动
  unit: 假设
  source: 采用创业财务启发式：现阶段 capex 很少，年度预付大致能对冲营运资金时点差。
