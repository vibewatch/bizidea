fundingAsk:
  round: pre-seed
  amountM: 2.0
  runwayMonths: 24
  milestone: 先跑到 18 个月验证节点——拿下 2–3 份已转化的量产合同，并把 setup 时间与恢复 ROI 测出来；再用额外 6 个月缓冲把公司带到 Q4Y2，做到约 8 家付费实验室，并让验证工作流模块正式上线。
  useOfFunds:
  - bucket: 工程
    amountUsd: 950000
    percentage: 47.5
  - bucket: GTM
    amountUsd: 350000
    percentage: 17.5
  - bucket: G&A
    amountUsd: 150000
    percentage: 7.5
  - bucket: 缓冲（6 个月）
    amountUsd: 550000
    percentage: 27.5
scenarios:
  downside:
    description: 试点转量产晚一个季度，多站点扩容更迟落地，毛利率也卡在计划线下方。
    y3RevenueK: 2520.0
    y3EbitdaK: -430.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
    - Q4Y2 客户数只有 6 家，而不是 8 家。
    - Y3 成熟客户的月收入上限只有 $24K，而不是 $27.5K。
    - 由于 onboarding 仍偏服务化，Y3 退出时毛利率只有 68%，而不是 73%。
  base:
    description: 3 个共创客户顺利转化，公司在 Y2 末做到 8 家付费实验室，成熟客户也逐步逼近研究里 6 个 workcell 的配置。
    y3RevenueK: 3576.0
    y3EbitdaK: 152.0
    cashLowPointK: 447.1
    keyAssumptionChanges:
    - 客户爬坡按 A3 和 A4 执行。
    - 毛利率按 A8 爬坡，并在 Y3 达到 72% 目标。
    - 招聘按 A13 和 A14 走，不额外堆一大排服务台。
  upside:
    description: 适配器复用提速，高级合规模块更早挂上，多站点 rollout 也把销售周期压短。
    y3RevenueK: 4550.0
    y3EbitdaK: 720.0
    cashLowPointK: 680.0
    keyAssumptionChanges:
    - Q4Y2 客户数达到 9 家，Q4Y3 达到 17 家。
    - 受更早的多站点扩容带动，Y3 成熟客户的月收入提升到 $30K。
    - 可复用模板更快压低交付工作量，退出时毛利率达到 74%。
sensitivity:
- variable: ARPU
  downsideCase: 新量产客户更接近只覆盖 4 个 workcell，成熟后 ARR 大约停在 $220K。
  baseCase: 转化客户起步约 $275K ARR，成熟后逐步逼近 $330K ARR。
  upsideCase: 5 个 workcell 的合同转化更快，成熟客户也更早拿到第二站点定价。
  y3RevenueImpactK: -525.0
  cashImpactK: -375.0
- variable: CAC
  downsideCase: CAC 升到 $140K，因为伙伴转介绍不及预期，创始人主导外联也放大得更慢。
  baseCase: 按 BP 漏斗目标和集中滩头打法，CAC 约 $110K。
  upsideCase: 共创客户口碑和 OEM 转介绍拉低获客成本，CAC 压到 $90K。
  y3RevenueImpactK: -150.0
  cashImpactK: -240.0
- variable: 流失率
  downsideCase: 如果工作流始终偏窄、第二站点扩容也没打穿，月流失率会上到 2.0%。
  baseCase: 这是一款粘性不错但仍处早期的产品，月流失率按 1.5% 估。
  upsideCase: 一旦验证工作流和恢复历史嵌进日常操作，月流失率有机会降到 1.0%。
  y3RevenueImpactK: -220.0
  cashImpactK: -165.0
- variable: 销售周期
  downsideCase: 从付费试点到量产要拖 9 个月，因为验证和采购流程太慢。
  baseCase: 一类 assay family 跑通后，试点转量产大约要 6 个月。
  upsideCase: 首个模板跑通后，适配器复用和客户背书把周期压到 4 个月。
  y3RevenueImpactK: -430.0
  cashImpactK: -300.0
- variable: 毛利率
  downsideCase: Y3 毛利率只有 68%，因为每次 rollout 仍需要明显的定制交付。
  baseCase: Y3 毛利率 72%，与 BP 目标一致。
  upsideCase: 如果模板复用和合规工具更快替代人工，Y3 毛利率可到 74%。
  y3RevenueImpactK: 0.0
  cashImpactK: -145.0
- variable: 招聘节奏
  downsideCase: Y3 有 2 个岗位被提前招聘，但 onboarding 还没真正变得可重复。
  baseCase: 招聘严格按里程碑推进，到 Q4Y3 才到 13 名 FTE。
  upsideCase: 1 个后台岗位往后推，短期溢出工作交给外包。
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Accounts["Target accounts"] --> Pilots["Paid pilots"]
      Pilots --> Contracts["Production customers"]
      Contracts --> Workcells["Covered workcells"]
      Workcells --> Subscription["Subscription revenue"]
      Pilots --> Onboarding["Pilot and onboarding fees"]
      Onboarding --> Revenue["Total revenue"]
      Subscription --> Revenue
      Revenue --> GrossProfit["Gross profit"]
      GrossProfit --> Cash["Ending cash"]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下，3 个付费共创客户会转成持续付费客户，公司在 Y2 末做到 8 家付费实验室，再在 Q4Y3 前把客户基数扩到 15 家，从而把 Y3 收入推到 $3.6M。
- checkName: 必须跑顺的环节
  finding: 只有适配器复用足够成立，onboarding 才能保持产品化，毛利率也才能从试点期一路抬到 Y3 的低 70% 区间。
- checkName: 模型会在哪崩
  finding: 如果试点转量产晚一个季度，且毛利率始终上不去 68%，下行情景会在下一轮融资前把现金烧穿。
- checkName: 下一轮融资 proof
  finding: 下一次融资要讲的故事，是第 18 个月前拿下 2–3 份已转化量产合同并测出 ROI，到 Q4Y2 左右把付费实验室数做到约 8 家。
sanityChecks:
  ruleOf40: Y3 增长 197% + EBITDA 利润率 4% ≈ 201%，但这个结果被仍然很小的 Y2 收入基数放大了。
  burnMultiple: Y2 burn multiple 约 0.5x，对应大约 $1.7M 的净新增 ARR；到 Y3 下半年，模型开始转成现金自给。
  revenuePerFte: 按平均 FTE 算，Y3 人效约 $328K；若按 Q4Y3 的 13 名退出时 headcount 算，约 $275K，对照垂直 SaaS 粗略 $200-400K 基准，仍在可接受区间。
  flags:
  - 模型相当依赖 Y1 的 3 个共创客户按时转化；哪怕少转成 1 个，Q4Y2 的验证节点都会明显后移。
  - 只有到 Y2 后段适配器复用被证明成立，毛利率才能真正碰到 BP 目标；否则交付看起来更像集成服务，而不是软件。
  - Q4Y3 的退出 ARR 已接近研究里的 $5.0M SOM，但 Y3 确认收入更低，因为新增客户是在全年里逐步落进来的。
  - Rule of 40 看起来异常漂亮，本质上是因为公司还站在很小的收入基数上；续约质量和 onboarding 复用比 headline ratio 更重要。
  - 现金滚动用 EBITDA 近似现金；如果采购延迟更长，或应收波动更大，模型里的现金底部会被进一步压缩。
