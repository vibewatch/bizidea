openQuestions:
- 目标滩头实验室里，从 SOP 交接到首个验证通过自动化 run 的真实中位时间到底是多少？
- 失败 run 里，究竟有多大比例能追溯到设备集成和执行逻辑，而不是 assay 科学本身？
- 要覆盖大多数 qPCR、ELISA 和细胞自动化工作，首批必须支持哪些仪器家族？
- 早期买方会从自动化预算、信息化预算，还是更广义的平台运营预算里为这款产品买单？
