    - 12
    - 13
    - 16
    - 34
  - friction: 让科学家相信 AI 生成的执行修改和恢复建议
    severity: 高
    affectedBuyer: assay 开发负责人
    mitigation: 始终把人放在审批环里，执行前先做模拟，并把每一次生成改动都用底层 SOP 和设备计划的 diff 形式展示出来。
    sourceRefs:
    - 1
    - 2
    - 30
  - friction: 在转化或验证环境里满足审计要求
