  pestle:
  - factor: 政治
    impact: positive
    point: NSF 和 NIST 等公共项目正在明确把自治、可编程实验室当成正经基础设施方向来背书。
    sourceRefs:
    - 3
    - 4
  - factor: 经济
    impact: positive
    point: 相邻实验室自动化软件预算正在增长，这让新类别更容易从现有支出里切钱，而不是去创造一条全新预算线。
    sourceRefs:
    - 6
    - 7
  - factor: 社会
    impact: negative
    point: 自动化采用仍会卡在技能缺口、既有工作习惯，以及“有些步骤手做更快”的组织阻力上。
