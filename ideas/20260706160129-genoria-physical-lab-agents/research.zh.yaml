competitors:
- name: Biosero
  stage: 现有厂商
  wedge: 跨设备实验室编排、调度和集成 workcell 工作流管理。
  pricing: 定制化企业软件与服务
  strength: 设备集成很深，产品线也是围绕复杂实验室环境原生搭出来的。
  weaknessVsUs: 它更擅长编排和调度，不擅长吃进杂乱 SOP，再跨 mixed fleet 生成可供人审核的恢复逻辑。
  sourceRefs:
  - 16
  - 17
- name: Synthace
  stage: 成长型公司
  wedge: 更适合生物学家的数字实验设计，加上面向多变量实验的自动化指令。
  pricing: 定制化企业定价
  strength: 在 DOE / HDE 风格的实验定义和自动化感知式实验设计上抽象做得很强。
  weaknessVsUs: 它更像从结构化实验搭建出发，而不是从原始 SOP 到设备编译和失败后恢复出发。
  sourceRefs:
  - 18
  - 37
- name: Benchling Automation
  stage: 现有厂商
  wedge: 硬件中立的仪器连接、工作流自动化和科研记录集成。
  pricing: 联系销售 / 企业订阅
  strength: 信息化 footprint 很强，生态也在变厚，正在把仪器和科研记录之间的闭环补起来。
  weaknessVsUs: 它更偏记录中心，而不是执行中心；并不天然是做设备图编译和失败恢复的最佳系统。
  sourceRefs:
  - 19
  - 20
  - 21
  - 36
- name: Emerald Cloud Lab
  stage: 成长型公司
  wedge: 把高度自动化的远程云实验室作为内部自动化编队的替代方案。
  pricing: 按创业公司、企业或学术层级定制套餐
  strength: 它证明了远程自动化执行确有需求，而且把整套基础设施一起打包。
  weaknessVsUs: 它卖的是供应商自营实验室，不是压在客户既有仪器上的中立编译器。
  sourceRefs:
  - 25
  - 26
- name: Opentrons
  stage: 成长型公司
  wedge: 低门槛自动化硬件，加上 Python 和低代码实验方案工具。
  pricing: 公开的硬件主导定价 + 软件生态加售
  strength: 开发者友好的 API 和易用的实验方案编写工具，显著降低了标准工作流自动化门槛。
  weaknessVsUs: 一旦实验室能统一到 Opentrons 硬件，它会很好用；但要做高端 mixed-vendor 编队上的中立抽象层，它就弱得多。
  sourceRefs:
  - 22
  - 23
  - 24
regulatoryTechnicalConstraints:
- point: 只要执行软件碰到转化或验证工作流，就必须支持审计轨迹、受控变更和可长期留存的电子记录。
  sourceRefs:
  - 30
  - 31
  - 32
  - 33
- point: 开放标准会有帮助，但真实部署仍然需要为异构仪器、调度器和数据输出做适配器工作。
  sourceRefs:
  - 12
  - 22
  - 34
  - 35
- point: Assay 自动化不只是移液；真实工作流要把处理器、培养箱、洗板机、酶标仪和分析系统串起来。
  sourceRefs:
  - 14
  - 15
  - 27
  - 29
- point: 即便闭环生成能力更强了，人工审批仍然是恢复逻辑和重跑决策里的现实控制点。
  sourceRefs:
  - 1
  - 17
  - 21
