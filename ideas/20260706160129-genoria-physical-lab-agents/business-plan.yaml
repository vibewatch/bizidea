slug: wet-lab-execution-compiler
date: "2026-07-06"
executiveSummary: >-
  Mixed-fleet biology labs already own liquid handlers, incubators, and plate
  readers, but translating scientist-authored SOPs into device-ready runs and
  recovering failed assays still depends on a few automation engineers. We
  start with 50-300 person synthetic biology CROs and translational core labs
  because new customer assays, new workcells, and second-site transfers force
  the same protocol across heterogeneous instruments under deadline. The
  product is a vendor-neutral execution compiler that ingests an SOP, maps it
  to supported devices and labware, simulates likely failure points, and
  outputs a human-reviewable run plan plus approved recovery steps rather than
  replacing the lab's installed orchestration stack. The first proof point is
  narrow and falsifiable: cut time from SOP handoff to first validated
  automated run on one repetitive assay family, then reduce failed-run recovery
  time on that same workflow. Research-sized demand is meaningful but not
  infinite: TAM is estimated at $412.5M, beachhead SAM at $148.5M, and the
  year-3 SOM at roughly $5.0M under a high-touch design-partner motion. The
  company wins only if device adapters, validated protocol mappings, and
  approved recovery histories compound into execution IP that vendor-native
  tools and internal scripts cannot reproduce across mixed fleets. The biggest
  disconfirming risk is not model novelty but whether the pain is frequent and
  budget-owning enough to support software rather than custom integration
  services. Research did not independently confirm customer adoption,
  production error rates, or broad instrument coverage beyond one credible
  launch, so this plan deliberately keeps scope narrow, human-in-the-loop, and
  pre-seed sized.
problem:
  - Labs with mixed robotic workcells still spend days translating each new qPCR, ELISA, or cell-viability SOP into vendor-specific scripts, making 2-5 automation engineers the bottleneck for assay launch, transfer, and troubleshooting.
  - When a run fails, device logs, labware assumptions, and recovery logic are fragmented across tools and individual engineers, causing reruns, sample loss, and weak auditability in translational workflows.
solution:
  - Compile a scientist-authored SOP into a supported device graph, labware plan, and execution sequence for one assay family, with simulation checks for timing, consumables, volume, and instrument contention before the run starts.
  - Ingest device logs and assay outputs during execution to surface deviations, propose human-reviewable recovery paths, and store a versioned execution record that can be reused for future assay transfer and site rollout.
whyWeWin:
  - The category gap is specific: incumbent orchestration tools control devices, and informatics platforms manage records, but no named competitor clearly owns vendor-neutral SOP-to-device compilation plus runtime recovery across mixed fleets.
  - Every validated compile adds protocol-to-device mappings, constraint data, and approved recovery histories that become harder for OEM software or internal scripts to replicate across heterogeneous workcells.
  - The beachhead pain is tied to hard delivery deadlines and scarce labor, so a narrow workflow product can prove ROI faster than a broad "AI scientist" platform.
strategicChoices:
  beachhead: >-
    Custom qPCR, ELISA, and cell-viability workflows at 50-300 person
    synthetic biology CROs and translational core labs running 3-10 robotic
    workcells across mixed liquid-handler, incubator, washer, and plate-reader
    fleets with only 2-5 automation engineers.
  wedgeRationale: >-
    This entry point creates faster proof than a general lab-automation
    platform because the assay families are repetitive, the workcells are
    already installed, the buying trigger is concrete, and setup/recovery time
    can be measured inside one pilot without asking the customer to change
    hardware or standardize on one vendor stack.
  sequencingRationale: >-
    Product starts with compile-and-simulate for one supported assay family,
    then adds log-driven recovery on the same workflow, then adds auditability,
    second-site transfer, and broader adapter coverage. GTM stays founder-led
    until 2-3 paid design partners define the initial device set and pricing
    basis, and partnerships with integrators or OEMs come after adapter reuse
    is proven so the company does not become a bespoke services layer.
  notYet:
    - Broad support for every assay type and OEM device family; the first 24 months stay concentrated on repetitive plate-based workflows and a narrow adapter set.
    - Fully autonomous recovery or unsupervised run changes; human approval remains in the loop until trust and validation data are established.
    - Regulated manufacturing, CLIA-diagnostic production, or a full rip-and-replace lab OS; the first product is a translation and recovery layer on top of existing systems.
market:
  tam: "$412.5M (research estimate: ~1,500 automation-capable biology labs globally × ~5 robotic workcells × ~$55k annual software value per workcell)"
  sam: "$148.5M (research estimate: ~600 synthetic biology CRO, biofoundry, and translational core-lab sites in North America and Europe with recurring mixed-fleet assay pain)"
  som: "$5.0M (research year-3 case: 15 customers × ~6 covered workcells × roughly $55k annual value per workcell under a high-touch design-partner motion)"
  segments:
    - Synthetic biology CROs with mixed robotic workcells delivering custom assay-development programs
    - Translational core labs and biofoundry-style operators standardizing repetitive qPCR, ELISA, and cell-based workflows
  buyingProcess: >-
    A lab automation engineer or assay-development lead champions the product
    when a new assay, new workcell, or second site creates setup or rerun
    pressure. The Head of Lab Automation, VP Platform Operations, or
    core-facility director signs once a paid pilot shows shorter setup time,
    acceptable auditability, and no requirement to replace installed hardware
    or existing record systems.
product:
  mvp: >-
    Support one repetitive assay family on a narrow set of common mixed-fleet
    workcell templates: ingest the SOP, map it to supported devices and
    labware, simulate failure points, and generate a human-reviewable execution
    plan plus recovery playbook. No autonomous run changes, no broad OEM
    coverage, and no attempt to replace the customer's scheduler, ELN, or
    orchestration stack.
  sixMonth: >-
    Prove compile-and-simulate value with 2-3 design partners, add device-log
    ingestion and run diffing on the supported workflow, and ship versioned
    approvals so teams can compare compiled plans against the source SOP before
    execution.
  twelveMonth: >-
    Expand from one to two adjacent assay families, add approved recovery
    replay, second-workcell and second-site transfer workflows, and basic
    audit-ready execution records for translational environments.
  twentyFourMonth: >-
    Broaden adapter coverage across the most common target workcells, launch a
    premium validated-workflow and compliance module, and add multi-site
    analytics so customers can standardize protocol transfer across programs
    instead of treating each deployment as a fresh integration project.
  keyBets:
    - A narrow adapter set can cover enough early assay volume to keep onboarding product-like rather than services-heavy.
    - Human-reviewed compiled plans deliver measurable setup-time savings before buyers are ready for true closed-loop autonomy.
    - Device logs and assay outputs contain enough repeatable signal to build a reusable recovery library for the first assay family.
    - Workcell-based pricing plus protocol onboarding fits an existing automation budget line better than a broad enterprise-platform sale.
gtm:
  wedge: >-
    Land as the protocol compiler for one repetitive assay family in mixed-fleet
    CRO and core-lab environments where a new customer assay, new workcell, or
    second site forces engineers to reproduce the same workflow under deadline.
  channels:
    - Founder-led direct sales to heads of lab automation, assay-development leads, and core-facility directors
    - Automation integrator and OEM referral/co-sell partners already implementing heterogeneous workcells
    - Design-partner pilots with biofoundries and translational core facilities that already run repetitive automation-heavy workflows
  funnelTargets: "target account→qualified pilot 25-35%; qualified pilot→paid pilot 50%+; paid pilot→annual production contract 50%+ once one protocol family is validated on supported workcells"
  pricing: >-
    Annual subscription per robotic workcell plus one-time onboarding per
    validated protocol family, with later premium modules for validated
    workflow controls and multi-site analytics. This aligns the sale to an
    budget buyers already understand, lets the first customer start with one
    workcell and one workflow, and creates an expansion path tied directly to
    more workcells, more assay families, and second-site rollout.
businessModel:
  revenueStreams:
    - Annual software subscription per robotic workcell running supported protocol families
    - One-time onboarding and validation fees for each new protocol family or device-template rollout
    - Premium validated-workflow, multi-site analytics, and compliance modules
  unitOfValue: Per robotic workcell running supported protocol families
  targetGrossMarginPct: 72
  expansionLevers:
    - Add additional workcells within the same lab once the first workflow is validated
    - Add new protocol families and recovery libraries on top of the same adapter base
    - Expand from one site to second-site transfer and standardized rollout
    - Upsell validated-workflow and analytics modules once execution records become operationally trusted
strategyMap:
  northStarMetric: Median time from SOP handoff to first validated automated run for supported assay families
  inputMetrics:
    - Number of supported workcells live per paying customer
    - Median automation-engineer hours required to compile and validate a new supported protocol
    - Percentage of run deviations resolved with approved recovery playbooks instead of manual rescripting
    - Paid pilot to annual production conversion rate
  moatsToBuild:
    - Protocol-to-device constraint graph across mixed-fleet qPCR, ELISA, and cell-viability workflows
    - Library of approved recovery paths linked to device logs, assay outcomes, and escalation thresholds
    - Versioned execution and approval history that makes site transfer and validated change control easier than internal scripting
  killCriteria:
    - Fewer than 2 of the first 6 target accounts sign paid pilots within 6 months of discovery.
    - The MVP fails to cut median SOP-handoff-to-first-validated-run time by at least 30% on one supported assay family.
    - More than half of pilot deployment work requires bespoke adapter engineering outside the planned narrow device set.
  mermaid: |
    flowchart LR
      Wedge[Mixed-fleet assay beachhead] --> MVP[Protocol compiler MVP]
      MVP --> Proof[Setup-time and recovery proof]
      Proof --> Expansion[Recovery library, compliance, multi-site rollout]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Promising wedge with real pain and a plausible data moat, but conviction depends on proving recurring budget authority and adapter reuse in the first 2-3 pilots."
    whyBelieve: "Research shows a real mixed-fleet translation bottleneck, a fragmented competitor set, and a credible July 2026 signal that protocol-to-device execution with feedback is becoming productizable."
    whyDoubt: "Independent customer adoption, production error rates, and required device coverage are still unproven, so the company could degrade into custom integration services or be subsumed by adjacent orchestration vendors."
    nextDiligence: "Get design-partner data on setup time, rerun root causes, fleet overlap, and budget owner before underwriting the GTM and margin assumptions."
  firstCustomer:
    title: Head of Lab Automation at a synthetic biology CRO
    profile: 75-200 person CRO running 3-10 robotic workcells across mixed liquid-handler, incubator, and plate-reader systems for custom assay-development projects.
    trigger: A new customer assay, new workcell, or second site requires the same qPCR, ELISA, or cell-viability protocol to run across different devices under delivery deadline.
    buyer: Head of Lab Automation
    initialContract: "Paid pilot on 1-2 workcells and one protocol family at $50k-$100k including onboarding, converting to a $180k-$300k annual contract once 3-5 workcells and approved recovery workflows are live."
  mustBeTrue:
    - Target beachhead labs spend 40+ automation-engineer hours to move a supported assay from SOP handoff to first validated automated run.
    - At least 25% of major reruns or launch delays in the beachhead stem from execution and integration issues the product can address rather than assay science alone.
    - One narrow adapter set covers 60%+ of relevant qPCR, ELISA, and cell-viability volume at the first design partners without hardware replacement.
    - The economic buyer will fund a workcell-based software line item after a paid pilot instead of treating the problem as project-based services.
    - At least half of paid pilots convert to annual production contracts within 6 months because setup-time and recovery metrics improve enough to justify rollout.
  diligenceQuestions:
    - What baseline SOP-to-first-run setup times and rerun rates did named target labs share, and how were they measured?
    - Which instrument families dominate the first 10 target accounts, and how much adapter overlap is actually reusable across them?
    - Who signs the first contract and from which budget line is the spend reallocated?
    - How much of recovery guidance can be standardized from telemetry versus encoded manually by services staff?
    - What prevents Benchling, Biosero, or OEM workflow software from adding enough compiler and recovery capability to erase the wedge?
operatingAssumptions:
  - assumption: Early target labs lose enough automation-engineer time on repetitive plate-based assays to justify dedicated software rather than more scripting.
    basis: research.yaml
    validationTest: Collect time logs, version history, and pilot baselines from 5-8 target labs for one qPCR, ELISA, or cell-viability workflow and measure median SOP-handoff-to-first-run time.
    decisionImpact: If setup effort is low or too infrequent, narrow further to the highest-friction assay subtype or abandon the wedge.
  - assumption: A narrow adapter set around common liquid handler, incubator, washer, and reader combinations covers most initial design-partner demand.
    basis: research.yaml
    validationTest: Gather fleet inventories from the first 5-8 prospects and calculate what share of target workflow volume fits the initial supported device templates.
    decisionImpact: If adapter overlap is weak, the beachhead must narrow to a more standardized customer slice or pricing must absorb a heavier services burden.
  - assumption: Workcell-based subscription pricing plus protocol onboarding matches how buyers already budget for automation improvements.
    basis: idea.yaml
    validationTest: Present alternative pricing proposals during discovery and track which model buyers accept in paid pilot statements of work.
    decisionImpact: If buyers resist workcell pricing, shift packaging toward protocol-family or site-based contracts before scaling sales.
  - assumption: Human-reviewable compiled plans and recovery suggestions are acceptable in translational settings before full autonomy is trusted.
    basis: research.yaml
    validationTest: Run a design-partner review with assay leads and quality stakeholders to approve simulated run plans and recovery diffs before live execution.
    decisionImpact: If review friction remains high, position the product as compile-and-simulate QA only and delay the recovery module.
  - assumption: Device logs and assay outputs expose enough repeatable patterns to build a reusable recovery library for the first assay family.
    basis: operator judgment
    validationTest: Label 20-30 run deviations across pilots and measure whether recovery recommendations can be reused across more than one incident or customer.
    decisionImpact: If recovery data is too sparse or idiosyncratic, the moat shifts toward protocol validation and site-transfer tooling instead of runtime recovery.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Baseline setup-time study across 5-8 target CROs and translational core labs for one repetitive assay family.
    hypothesis: Target labs spend enough engineering time on SOP translation to make a dedicated compiler economically relevant.
    successMetric: At least 5 of 8 target accounts show 40+ automation-engineer hours from SOP handoff to first validated automated run on a supported workflow.
    owner: Founder / lab automation lead
  - horizon: 0-90 days
    experiment: Fleet-inventory and adapter-overlap analysis across the first 10 target accounts.
    hypothesis: A narrow initial device template set covers the majority of relevant assay volume.
    successMetric: Initial supported workcell templates map to 60%+ of relevant workflow volume across the first 10 evaluated accounts.
    owner: Founding engineer
  - horizon: 0-90 days
    experiment: Pricing and budget-owner discovery with heads of automation, platform operations leaders, and core-facility directors.
    hypothesis: Buyers will fund a workcell-based subscription plus protocol onboarding from existing automation budgets.
    successMetric: One consistent buyer role and acceptable pricing model identified in at least 4 of 6 serious prospects.
    owner: Founder / GTM
  - horizon: 3-6 months
    experiment: Deploy the compile-and-simulate MVP for one qPCR or ELISA workflow at 1-2 design partners.
    hypothesis: Human-reviewed compiled plans can reduce time to first validated automated run without deep rip-and-replace integration.
    successMetric: 30%+ reduction in median SOP-handoff-to-first-validated-run time versus each lab's pre-pilot baseline.
    owner: Founding engineer
  - horizon: 6-12 months
    experiment: Add log-driven recovery suggestions and replay for the same supported workflow at the first design partners.
    hypothesis: Execution and integration failures are common enough that a recovery layer materially reduces rerun effort.
    successMetric: 20%+ reduction in failed-run recovery time or a measurable reduction in avoidable reruns on the piloted workflow.
    owner: Automation integration engineer
  - horizon: 12-18 months
    experiment: Expand one successful pilot to a second workcell or second site and convert it to an annual production contract.
    hypothesis: Once one workflow is validated, expansion within the same customer is easier than new-logo acquisition and supports the workcell pricing model.
    successMetric: Two annual production contracts signed and one second-workcell or second-site rollout completed in under 30 days of onboarding effort.
    owner: Founder / GTM
operations:
  - High-touch onboarding that maps SOPs, labware assumptions, and device capabilities into supported workcell templates before any live run.
  - Simulation, diff review, and approval logging before compiled plans are executed on instruments.
  - Integrations that write into existing record, scheduling, and device-log systems so deployment is additive rather than rip-and-replace.
  - Quarterly design-partner reviews that capture setup time, rerun root causes, and reusable recovery patterns for productization.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: The protocol compiler, device graph, and simulation engine are the technical core and must exist before any design-partner pilot can start.
  - role: Founder / lab automation domain lead
    startTiming: Month 0
    rationale: The company needs operator credibility with heads of lab automation and assay leads to win early design partners and define the supported workflow correctly.
  - role: Automation integration engineer
    startTiming: Month 3-4
    rationale: Adapter implementation and device-log ingestion should follow only after the first design partners confirm which workcell combinations matter most.
  - role: Design-partner GTM lead
    startTiming: Month 6
    rationale: Once the MVP is demoable, the company needs focused outreach and pilot management across a concentrated but relationship-driven buyer set.
  - role: Quality / compliance product lead
    startTiming: Month 9-12
    rationale: Translational labs will require stronger approval, change-control, and auditability features before broad rollout beyond early pilots.
milestones:
  - horizon: "0-12 months"
    items:
      - Sign 2-3 paid design partners in the CRO and translational core-lab beachhead.
      - Support one assay family across 2-3 common mixed-fleet workcell templates.
      - Demonstrate 30%+ reduction in SOP-handoff-to-first-validated-run time and 20%+ faster failed-run recovery on at least one pilot workflow.
      - Confirm the first budget owner, accepted pricing model, and audit-ready approval flow with target customers.
  - horizon: "12-24 months"
    items:
      - Convert 2-3 design partners into $180k-$300k annual production contracts.
      - Expand from one to two supported assay families and launch second-workcell or second-site transfer workflows.
      - Ship the premium validated-workflow and compliance module for customers with tighter audit requirements.
      - Reach 5-8 paying customers while keeping onboarding centered on reusable adapter templates rather than bespoke projects.
  - horizon: "24-36 months"
    items:
      - Reach the researched year-3 SOM target of roughly $5.0M across about 15 customers and ~90 covered workcells.
      - Broaden adapter coverage and multi-site analytics without losing the human-reviewable recovery advantage.
      - Decide, based on retention and deployment economics, whether to expand next into biotech platform teams or more tightly regulated process-development labs.
risks:
  - risk: Device-integration sprawl could turn every deployment into a custom engineering project before product-market fit is proven.
    likelihood: High
    impact: High
    mitigation: Start with one assay family and a narrow device template set defined by design-partner fleet overlap, and refuse unsupported integrations that do not strengthen the reusable adapter base.
  - risk: Buyers may trust compile-and-simulate assistance but reject software-generated recovery guidance in live wet-lab workflows.
    likelihood: High
    impact: High
    mitigation: Keep recovery human-approved, show diffs against the underlying SOP and device plan, and earn trust first on simulation and setup-time savings before expanding autonomy.
  - risk: The pain may be real but episodic, causing buyers to treat the product as consulting help instead of an ongoing software budget.
    likelihood: Medium
    impact: High
    mitigation: Run paid pilots against hard baseline metrics, tie pricing to workcells and recurring workflows, and kill the wedge early if conversion to annual contracts is weak.
  - risk: Adjacent vendors or OEM ecosystems could absorb enough of the workflow to narrow the startup's differentiation.
    likelihood: Medium
    impact: Medium
    mitigation: Win on cross-OEM protocol portability, approved recovery histories, and execution records that integrate with record systems rather than competing as a generic orchestration suite.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "18 months to build the narrow assay-family compiler, support the first 2-3 reusable workcell templates, land 2-3 paid design partners, prove setup-time and failed-run ROI, and determine whether the business scales as software rather than custom integration services."
