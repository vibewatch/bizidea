  validationPlan:
  - priority: high
    question: How many engineer-hours does a target lab spend from SOP handoff to first validated automated run for qPCR, ELISA, and cell-based assays?
    evidenceToGather: Time logs, protocol version history, and pilot timelines from 5-8 target labs across one assay family.
  - priority: high
    question: What percentage of failed runs are caused by integration or execution issues versus underlying assay science?
    evidenceToGather: Rerun logs, instrument alarms, and postmortem tags from design partners over one quarter.
  - priority: medium
    question: Will buyers prefer workcell-based pricing, protocol-family pricing, or sitewide platform contracts?
    evidenceToGather: Budget-owner interviews paired with current spend on middleware, informatics, and validation services.
  - priority: medium
    question: Which instrument families must be supported first to cover the majority of repetitive assay volume?
    evidenceToGather: Fleet inventories and assay mix from synthetic biology CROs, core labs, and one biofoundry-style operator.
