  - friction: Convincing scientists to trust AI-generated execution edits and recovery suggestions
    severity: high
    affectedBuyer: Assay-development lead
    mitigation: Keep humans in the approval loop, simulate runs before execution, and show every generated change as a diff against the underlying SOP and device plan.
