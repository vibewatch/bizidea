  adoptionFrictionMatrix:
  - friction: Mapping heterogeneous instruments and legacy workflows into one neutral execution layer
    severity: high
    affectedBuyer: Head of Lab Automation
    mitigation: Start with one assay family and a narrow adapter set around the most common liquid handler, incubator, washer, and reader combinations in design-partner labs.
