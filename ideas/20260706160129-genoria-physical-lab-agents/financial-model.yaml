slug: wet-lab-execution-compiler
date: "2026-07-06"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: Model opens before financing closes
    value: "Starting cash is modeled at $0 before the pre-seed closes in M1"
    unit: assumption
    source: "Startup-finance heuristic used so the round size drives the cash bridge explicitly"
  - id: A2
    name: Pre-seed amount and timing
    value: "$2.0M closes in M1"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M] plus modeled burn through the 18-month proof point and a 6-month buffer"
  - id: A3
    name: Year-1 design-partner count
    value: "3 paid design partners by M10 and 3 customer logos by M12"
    unit: customers
    source: "[BP milestones 0-12 months sign 2-3 paid design partners]"
  - id: A4
    name: Customer ramp after Year 1
    value: "Q1Y2 4, Q2Y2 5, Q3Y2 6, Q4Y2 8, Q1Y3 10, Q2Y3 12, Q3Y3 13, Q4Y3 15"
    unit: customersEop
    source: "[BP milestones 12-24 months reach 5-8 paying customers] and [BP market/research SOM 15 customers in year 3]"
  - id: A5
    name: Paid pilot revenue per active customer-month
    value: "12.5"
    unit: USDK per month per customer
    source: "[BP investorMemo.initialContract $50k-$100k including onboarding], midpoint spread across roughly six months"
  - id: A6
    name: Y2 converted-customer revenue ramp
    value: "16.0, 18.0, 20.0, 22.0 by quarter"
    unit: USDK per month per active customer
    source: "[BP milestones 12-24 months $180k-$300k annual production contracts], phased toward the middle of the band"
  - id: A7
    name: Y3 mature-customer revenue ramp
    value: "23.0, 25.0, 26.0, 27.5 by quarter"
    unit: USDK per month per active customer
    source: "[Research market.som 15 customers × 6 workcells × $55k] which implies about $330k ARR per mature customer by Q4Y3"
  - id: A8
    name: Gross-margin ramp
    value: "Y1 active months 45%-60%, Y2 62%-71%, Y3 71%-73%"
    unit: percent
    source: "[BP businessModel targetGrossMarginPct 72] moderated by [BP risks device-integration sprawl and services-heavy onboarding]"
  - id: A9
    name: Fully loaded founder compensation
    value: "144"
    unit: USDK per year per founder
    source: "Startup-finance heuristic for below-market pre-seed founder cash comp plus payroll load"
  - id: A10
    name: Fully loaded platform engineer compensation
    value: "210"
    unit: USDK per year per FTE
    source: "Startup-finance heuristic for senior software talent plus payroll load"
  - id: A11
    name: Fully loaded specialized operator compensation
    value: "180"
    unit: USDK per year per FTE
    source: "Startup-finance heuristic for automation integration, GTM, and quality/compliance hires"
  - id: A12
    name: Fully loaded G&A or ops compensation
    value: "120"
    unit: USDK per year per FTE
    source: "Startup-finance heuristic for early-stage operations support plus payroll load"
  - id: A13
    name: Year-1 hiring timing
    value: "Integration M4, GTM M7, quality/compliance M10"
    unit: month
    source: "[BP team startTiming]"
  - id: A14
    name: Year-2 and Year-3 hiring timing
    value: "Platform eng M13 and M16, integration M18 and M34, G&A M27, GTM M28, product/compliance M30, platform eng M31"
    unit: month
    source: "[BP strategicChoices sequencingRationale] plus a conservative ramp that supports 8 then 15 customers without assuming a services team explosion"
  - id: A15
    name: Non-payroll R&D overhead ramp
    value: "8 to 20"
    unit: USDK per month
    source: "Startup-finance heuristic anchored to simulation, device-log ingestion, and QA infrastructure in [BP operations]"
  - id: A16
    name: Non-payroll S&M overhead ramp
    value: "1 to 14"
    unit: USDK per month
    source: "Startup-finance heuristic anchored to founder-led enterprise travel, pilot management, and partner outreach in [BP gtm]"
  - id: A17
    name: Non-payroll G&A overhead ramp
    value: "5 to 15"
    unit: USDK per month
    source: "Startup-finance heuristic anchored to legal, insurance, compliance admin, and general office costs"
  - id: A18
    name: Unit-economics production ARPU
    value: "275"
    unit: USDK per year per converted customer
    source: "[Research bottomUpSizingDrivers $55k per workcell] × 5 workcells, which stays inside the [BP investorMemo production contract $180k-$300k] band"
  - id: A19
    name: Base-case CAC per converted production customer
    value: "110"
    unit: USDK
    source: "[BP gtm funnelTargets] combined with the model's founder-led S&M spend and pilot-heavy enterprise sales motion"
  - id: A20
    name: Base-case monthly churn
    value: "1.5"
    unit: percent
    source: "Startup-finance heuristic for sticky workflow software that is still early and not yet fully validated across sites"
  - id: A21
    name: Average customer life
    value: "66.7"
    unit: months
    source: "Derived from A20 using 1 / monthly churn"
  - id: A22
    name: Funding reserve policy
    value: "Round burn to a $2.0M ask so the company reaches the 18-month proof point, carries six more months, and still keeps roughly $450K of operating reserve at the modeled low point"
    unit: policy
    source: "[BP fundingAsk runwayMonths 18] and the stage instruction to include a 6-month buffer"
  - id: A23
    name: Cash conversion simplification
    value: "EBITDA approximates cash movement"
    unit: assumption
    source: "Startup-finance heuristic because capex is minimal and annual prepay roughly offsets working-capital timing at this stage"
