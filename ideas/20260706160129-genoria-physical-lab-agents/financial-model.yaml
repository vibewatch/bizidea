  amountM: 2.0
  runwayMonths: 24
  milestone: >-
    Reach the 18-month proof point of 2-3 converted production contracts with
    measured setup-time and recovery ROI, while the 6-month buffer carries the
    company to roughly 8 paying labs and a live validated-workflow module by
    Q4Y2.
  useOfFunds:
    - bucket: Engineering
      amountUsd: 950000
      percentage: 47.5
    - bucket: GTM
      amountUsd: 350000
      percentage: 17.5
    - bucket: "G&A"
      amountUsd: 150000
      percentage: 7.5
    - bucket: "Buffer (6 mo)"
      amountUsd: 550000
      percentage: 27.5
scenarios:
  downside:
    description: "Pilot-to-production conversion slips one quarter, multi-site expansion lands later, and gross margin stalls below the plan."
    y3RevenueK: 2520.0
    y3EbitdaK: -430.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
      - "Q4Y2 customer count lands at 6 instead of 8."
      - "Y3 mature revenue per customer-month tops out at $24K instead of $27.5K."
      - "Y3 gross margin exits at 68% instead of 73% because onboarding stays services-heavy."
  base:
    description: "Three design partners convert, the company exits Y2 with 8 paying labs, and mature customers expand toward the researched 6-workcell footprint."
    y3RevenueK: 3576.0
    y3EbitdaK: 152.0
    cashLowPointK: 447.1
    keyAssumptionChanges:
      - "Customer ramp follows A3 and A4."
      - "Gross margin follows A8 and reaches the 72% target by Y3."
      - "Hiring follows A13 and A14 without adding a large services bench."
  upside:
    description: "Adapter reuse improves quickly, premium compliance features attach earlier, and multi-site rollouts compress the sales cycle."
    y3RevenueK: 4550.0
    y3EbitdaK: 720.0
    cashLowPointK: 680.0
    keyAssumptionChanges:
      - "Q4Y2 customer count reaches 9 and Q4Y3 reaches 17."
      - "Y3 mature revenue per customer-month reaches $30K through earlier multi-site expansion."
      - "Gross margin exits at 74% because reusable templates cut delivery effort faster."
sensitivity:
  - variable: ARPU
    downsideCase: "New production customers stay closer to four covered workcells and mature at roughly $220K ARR."
    baseCase: "Converted customers start near $275K ARR and mature toward $330K ARR."
    upsideCase: "Five-workcell contracts convert faster and mature customers reach second-site pricing sooner."
    y3RevenueImpactK: -525.0
    cashImpactK: -375.0
  - variable: CAC
    downsideCase: "$140K CAC because partner referrals underperform and founder-led outreach scales slowly."
    baseCase: "$110K CAC under the BP funnel targets and concentrated beachhead motion."
    upsideCase: "$90K CAC because design-partner references and OEM referrals lower acquisition cost."
    y3RevenueImpactK: -150.0
    cashImpactK: -240.0
  - variable: churn
    downsideCase: "2.0% monthly churn if the workflow remains narrow and second-site expansion misses."
    baseCase: "1.5% monthly churn on a sticky but still early product."
    upsideCase: "1.0% monthly churn once validated workflows and recovery history become embedded."
    y3RevenueImpactK: -220.0
    cashImpactK: -165.0
  - variable: sales cycle
    downsideCase: "Nine months from paid pilot to production because validation and procurement drag."
    baseCase: "About six months from pilot to production once one assay family is proven."
    upsideCase: "Four months after the first template because adapter reuse and references improve trust."
    y3RevenueImpactK: -430.0
    cashImpactK: -300.0
  - variable: gross margin
    downsideCase: "68% Y3 gross margin because each rollout still needs meaningful custom delivery."
    baseCase: "72% Y3 gross margin in line with the BP target."
    upsideCase: "74% Y3 gross margin if template reuse and compliance tooling reduce manual work faster."
    y3RevenueImpactK: 0.0
    cashImpactK: -145.0
  - variable: hiring pace
    downsideCase: "Two Y3 hires are pulled forward before onboarding becomes repeatable."
    baseCase: "Hiring follows milestone-gated additions and reaches 13 FTE only at Q4Y3."
    upsideCase: "One back-office hire shifts later and short-term overflow is handled by contractors."
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts["Target accounts"] --> Pilots["Paid pilots"]
      Pilots --> Contracts["Production customers"]
      Contracts --> Workcells["Covered workcells"]
      Workcells --> Subscription["Subscription revenue"]
      Pilots --> Onboarding["Pilot and onboarding fees"]
      Onboarding --> Revenue["Total revenue"]
      Subscription --> Revenue
      Revenue --> GrossProfit["Gross profit"]
      GrossProfit --> Cash["Ending cash"]
modelSanity:
  - checkName: Revenue engine
    finding: "The base case reaches $3.6M of Y3 revenue by turning three paid design partners into recurring customers, exiting Y2 with 8 paying labs, and expanding the base toward 15 labs by Q4Y3."
  - checkName: Must go right
    finding: "Adapter reuse has to keep onboarding product-like enough for gross margin to climb from the pilot phase into the low-70s by Y3."
  - checkName: Model breaks if
    finding: "If pilot-to-production conversion slips a quarter and gross margin stalls below 68%, the downside case runs through cash before the next round."
  - checkName: Next-round proof
    finding: "The next financing story is 2-3 converted production contracts with measured ROI by month 18 and roughly 8 paying labs by Q4Y2."
sanityChecks:
  ruleOf40: "Y3 growth 197% plus EBITDA margin 4% equals about 201%, although the result is inflated by a still-small Y2 revenue base."
  burnMultiple: "Y2 burn multiple is about 0.5x on roughly $1.7M of net new ARR, then the model turns cash-generative in H2 Y3."
  revenuePerFte: "$328K Y3 per average FTE, or about $275K on the Q4Y3 exit headcount of 13 FTE, against a rough $200-400K vertical SaaS benchmark."
  flags:
    - "The model leans heavily on three Y1 design partners converting on schedule, so one missed conversion would delay the Q4Y2 proof point materially."
    - "Gross margin only reaches the BP target if adapter reuse is real by late Y2; otherwise delivery looks more like integration services than software."
    - "Q4Y3 exit ARR is near the researched $5.0M SOM, but recognized Y3 revenue is lower because the customer adds happen throughout the year."
    - "Rule-of-40 optics look unusually strong because the business is coming off a small base; renewal quality and onboarding reuse matter more than the headline ratio."
    - "Cash roll-forward uses EBITDA as a proxy for cash, so procurement delays or larger receivables swings could compress the modeled cash floor."
