differentiator: >-
  This is not another general "AI scientist" and not a single-vendor lab OS. The wedge is a vendor-neutral execution compiler plus failure-replay layer that works on top of a lab's existing fleet while keeping humans in the approval loop where trust matters. The moat compounds from device adapters, protocol normalization, and a growing corpus of validated recovery paths that competitors cannot easily reconstruct from static SOPs alone.
