topRisks:
  - name: Device-integration sprawl
    description: Supporting heterogeneous lab hardware could overwhelm the team before product-market fit is proven.
    mitigation: Start with one assay family and a narrow adapter set around the most common workcell combinations in design-partner labs.
  - name: Validation and trust barrier
    description: Labs may hesitate to let software influence wet-lab execution without proof that compiled runs are safe and reproducible.
    mitigation: Launch with human-in-the-loop review, simulation checks, run diffing, and auditable approvals before expanding autonomy.
  - name: Thin independent evidence
    description: The current market signal rests on a single verified announcement, so real buyer urgency or adoption could be overstated.
    mitigation: Target customers already staffing around the pain, run paid pilots against setup-time and failed-run metrics, and kill the wedge quickly if budget authority is weak.
