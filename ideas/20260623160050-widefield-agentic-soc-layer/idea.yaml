topRisks:
  - name: "Suite bundling risk"
    description: "Cisco, Splunk, or other large security vendors could bundle basic provenance and approval features into their own agentic SOC stacks."
    mitigation: "Win on cross-tool portability, deeper rollback orchestration, and independent trust evidence that mixed-stack buyers cannot get from a single suite."
  - name: "Design-partner immaturity"
    description: "Many SOC teams are still early in autonomous-response adoption, which can slow initial pipeline and make ROI harder to quantify."
    mitigation: "Start with customers already piloting limited identity-containment automation and sell the product as the safety layer that unlocks production rollout."
  - name: "Integration and liability complexity"
    description: "Touching response actions across identity, endpoint, and ticketing systems creates technical integration drag and perceived liability if rollback fails."
    mitigation: "Launch read-mostly with policy simulation and provenance capture first, then add narrowly scoped rollback for a few high-value actions with human approval defaults."
