  - job: >-
      When our SOC wants to let AI responders disable an account or isolate a
      device, help the security automation leader prove the action is within
      policy and easy to reverse, so they can automate containment without
      creating a bigger outage.
    currentAlternative: "Manual approvals in SOAR plus after-the-fact log reconstruction."
    successMetric: "Percentage of high-risk actions automated with no rollback-causing incidents."
  - job: >-
      When an after-hours identity alert triggers a response playbook, help the
      incident responder reconstruct exactly which human, machine, and AI actors
      touched the workflow, so they can explain or unwind the decision before
      business impact spreads.
    currentAlternative: "Splunk searches, identity logs, ticket comments, and ad hoc screenshots across consoles."
