problem: >-
  Security teams piloting agentic SOC workflows can generate alerts, draft
  investigations, and even trigger response actions faster than humans can
  review them, but they still lack a system of record for what an AI responder
  actually saw, which identities it used, and what downstream actions it set in
  motion. That means an authorized identity-disable, token revocation, or
  host-isolation step can be operationally unsafe even when the credentials were
  valid. Today's SIEM, SOAR, and identity tools store fragments of that story in
  separate logs, leaving analysts to reconstruct action provenance after the
  fact when trust has already broken.
targetUser:
  primary: >-
    Security automation leaders and SOC platform managers at enterprises running
    Splunk-based detection and response stacks while piloting AI-assisted or
    autonomous identity-containment workflows.
  secondary: >-
    Identity security engineers and incident responders who must approve,
    explain, or roll back machine-speed response actions.
  buyer: "Director of Security Automation, Head of Security Operations, or CISO."
startupThesis:
  nonObviousInsight: >-
    The next control point in the agentic SOC is not a better copilot or another
    identity graph; it is a session-memory layer that packages every human,
    machine, and AI action into an AI-readable provenance object before and
    after remediation. As response workflows become more autonomous, the scarce
    capability is not generating actions but proving an authorized action is safe
    to take and easy to reverse.
  beachhead: >-
    U.S. fintech and B2B SaaS enterprises with 2,000-10,000 employees, Splunk
    Cloud or Splunk Enterprise Security, an identity provider plus EDR stack,
    and a 5-15 person security-automation team piloting autonomous response for
    identity compromise, suspicious privilege escalation, or risky SaaS admin
    actions.
  wedge: >-
    A session-memory control plane that captures delegated identity context,
    tool-chain evidence, and proposed action blast radius for high-risk
    containment workflows, then records a replayable provenance trail and
    one-click rollback for every approved AI response.
  whyNowCatalyst: >-
    Cisco's decision to pull WideField into Splunk around identity and session
    telemetry shows that agentic SOC buyers now urgently need a control layer
    for safe machine-speed actions, not just better alert correlation.
  ventureScalePath: >-
    Start with identity-containment workflows inside Splunk-centered SOCs, then
    expand into cross-tool action policy simulation, runtime guardrails for
    broader security automations, audit evidence for regulators and insurers,
    and ultimately the trust ledger that governs every AI-driven operation
    across security and IT.
solution: >-
  The product sits between the customer's SIEM, SOAR, identity provider, EDR,
  and ticketing systems and creates a canonical session object every time a
  human analyst, scripted playbook, or AI responder touches a sensitive
  workflow. Before a response action executes, it simulates the identity scope,
  target assets, likely blast radius, and required approvals, then blocks or
  routes actions that fall outside policy. After execution, it stores a
  replayable provenance bundle with the triggering evidence, tool calls,
  delegated credentials, downstream changes, and rollback steps so analysts can
  audit or unwind the action in minutes. The first release focuses on identity
  disable, token revocation, session termination, and endpoint isolation flows
  where the cost of an unsafe but authorized action is immediate and measurable.
goToMarketSeed:
  firstCustomer: >-
    Director of Security Automation at a 3,000-employee fintech or B2B SaaS
    company using Splunk Cloud, a modern identity provider, and EDR, with a
    small team that still manually approves identity-disable and device-isolate
    playbooks during after-hours incidents.
  buyingTrigger: >-
    Launching autonomous-response pilots in Splunk or SOAR, a post-incident
    review where a valid playbook caused operational damage, or a cyber-insurer
    or board mandate to prove who authorized machine-speed containment actions.
  currentAlternative: >-
    Manual analyst approvals, fragmented SIEM and identity logs, generic SOAR
    playbooks, and PAM or session-recording tools that were built for humans
    rather than cross-tool AI responders.
  switchingReason: >-
    The wedge lets teams keep their existing SIEM and response stack while
    adding a purpose-built provenance and rollback layer for the handful of
    actions they are most afraid to automate, which gets autonomous response
    into production without asking buyers to trust a black box.
  pricingHypothesis: >-
    Annual subscription priced by protected response workflow family and monthly
    governed action volume, with premium modules for policy simulation, audit
    exports, and cross-environment rollback.
