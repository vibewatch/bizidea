  validationPlan:
  - priority: high
    question: Will buyers permit write-path governance on one or two response actions before they trust full autonomous response?
    evidenceToGather: Run five design-partner pilots on account-disable, token-revoke, session-kill, and device-isolate workflows with human approval left in place.
  - priority: high
    question: 'Which workflow family creates the clearest economic win: identity containment or endpoint isolation?'
    evidenceToGather: Benchmark manual approval time, evidence-assembly time, and rollback time on historical incidents across both classes.
  - priority: medium
    question: Does budget live with SecOps, identity engineering, or risk/compliance?
    evidenceToGather: Tag 15 to 20 discovery calls by budget owner, incumbent stack, and whether the trigger was post-incident pain, automation rollout, or audit pressure.
