scenarios:
  downside:
    description: "套件重叠拖慢试点转化，买家将产品保持在仅读模式的时间比预期更长。"
    y3RevenueK: 1760.0
    y3EbitdaK: -1110.0
    cashLowPointK: -360.0
    keyAssumptionChanges:
    - "套件捆绑压力加剧，正式生产 ACV 滑落至 $110k。"
    - "第3年净新增客户 10 家而非 15 家。"
    - "销售周期从 4 个月延长至 6 个月，试点转正式生产转化率跌破 45%。"
  base:
    description: "第1年四个付费试点转化，到 Q4Y3 建立可重复的 25 家生产客户基础。"
    y3RevenueK: 2196.4
    y3EbitdaK: -795.6
    cashLowPointK: 55.3
    keyAssumptionChanges:
    - "付费试点按 M5/M7/M8/M10 时间表落地，约 4 个月内转化。"
    - "正式生产 ACV 维持在约 $120k，基础情景不假设扩展收入。"
    - "团队从 2 人扩展到 11 人，仅在合作伙伴管道和生产部署验证后才推进。"
  upside:
    description: "合作伙伴引导的试点转化更快，更大比例的客户提前采用完整生产套餐。"
    y3RevenueK: 2820.0
    y3EbitdaK: -350.0
    cashLowPointK: 300.0
    keyAssumptionChanges:
    - "策略模拟和审计模块更早附加，正式生产 ACV 扩展至 $125k。"
    - "同等核心团队规模下，第3年新增客户 18 家（直至年末才扩招）。"
    - "试点转正式生产转化率超过 60%，合作伙伴转介将销售周期缩短至 3 个月。"
