slug: soc-session-memory-plane
date: '2026-06-23'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 期初现金
  value: '2800'
  unit: USDk
  source: '[FM ask model] Pre-seed 融资额等于模型期初现金。'
- id: A2
  name: 付费试点费用
  value: '45'
  unit: USDk per pilot
  source: '[BP investorMemo.initialContract] $30k–$60k 付费试点区间的中点。'
- id: A3
  name: 试点周期
  value: '4'
  unit: months
  source: '[BP milestones + heuristic] 6–8 周部署加采购/衡量期，合计约 4 个月的付费试点。'
- id: A4
  name: 正式生产 ACV
  value: '120'
  unit: USDk per year
  source: '[BP executiveSummary; BP businessModel; Research market SOM] 基础年度订阅与约 $120k ACV 一致。'
- id: A5
  name: 毛利率
  value: '72'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 核心连接器复用后，在 70% 目标之上略微调高建模。'
- id: A6
  name: 月度客户流失率
  value: '1.0'
  unit: percent
  source: '[Heuristic: 早期企业级安全 SaaS] 针对信任密集型新品类的保守留存假设。'
- id: A7
  name: 混合 CAC
  value: '70'
  unit: USDk per production customer
  source: '[Heuristic: 创始人主导的企业安全 GTM] 假设外呼加合作伙伴辅助试点，面向 $120k ACV 客户。'
- id: A8
  name: 创始人/CEO 全成本薪酬
  value: '180'
  unit: USDk per year
  source: '[Heuristic: pre-seed 创始人市场现金薪酬] 因本轮为 pre-seed，保持精简。'
- id: A9
  name: 联创平台工程师全成本薪酬
  value: '190'
  unit: USDk per year
  source: '[Heuristic: 美国初创公司安全工程师薪酬] 完全加载的现金成本。'
- id: A10
  name: 应用 AI 工程师全成本薪酬
  value: '220'
  unit: USDk per year
  source: '[Heuristic: 美国初创公司应用 AI 薪酬] 相对普通后端招聘反映稀缺性溢价。'
- id: A11
  name: 安全集成工程师全成本薪酬
  value: '190'
  unit: USDk per year
  source: '[Heuristic: 美国初创公司集成/安全工程师薪酬] 回滚和连接器可靠性所需。'
- id: A12
  name: 方案/客户成功工程师全成本薪酬
  value: '160'
  unit: USDk per year
  source: '[Heuristic: 企业安全方案工程师薪酬] 支持部署和 ROI 验证。'
- id: A13
  name: GTM 销售全成本薪酬
  value: '190'
  unit: USDk per year
  source: '[Heuristic: 首位企业安全销售现金加浮动薪酬] 精简首招假设。'
- id: A14
  name: 运营与财务全成本薪酬
  value: '130'
  unit: USDk per year
  source: '[Heuristic: 初创公司财务/运营经理薪酬] 仅在付费试点模式可重复后才引入。'
- id: A15
  name: 研发非薪酬支出
  value: 7 / 9 / 10
  unit: USDk per month in Y1 / Y2 / Y3
  source: '[Heuristic: 精简基础设施与工具] 覆盖云开发/测试、安全工具和外包溢出。'
- id: A16
  name: 销售与市场非薪酬支出
  value: 3-6 / 10 / 15
  unit: USDk per month in late Y1 / Y2 / Y3
  source: '[Heuristic: 创始人主导的企业 GTM] 在重复性验证前，差旅、活动、合作伙伴拓展和内容保持精简。'
- id: A17
  name: G&A 非薪酬支出
  value: 5 / 7 / 9
  unit: USDk per month in Y1 / Y2 / Y3
  source: '[Heuristic: 安全初创公司管理费用] 保险、法务、财务和合规成本随试点转入生产而上升。'
- id: A18
  name: 第1年付费试点启动数
  value: '4'
  unit: logos
  source: '[BP milestones 0–12 months] 使用 3–5 个付费共创客户目标，建模四个已签约试点。'
- id: A19
  name: 第1年转正式生产数
  value: '3'
  unit: logos
  source: '[BP milestones 0–12 months] 前四个试点中，三个在年底前转为年度订阅。'
- id: A20
  name: 第2年净新增客户数
  value: '6'
  unit: logos
  source: '[BP milestones 12–24 months] 支撑在更广泛工作流扩展前达到 10 家已安装客户。'
- id: A21
  name: 第3年净新增客户数
  value: '15'
  unit: logos
  source: '[Research market.som + BP milestones 24–36 months] 在 Q4Y3 达到 25 家付费客户，与 $3.0M 第三年 SOM 逻辑吻合。'
- id: A22
  name: 初始团队入职时间
  value: founder and founding eng at M1; AI at M4; security integrations at M7; solutions at M10; first GTM at M12
  unit: hiring schedule
  source: '[BP team] 将声明的入职时间直接转化为模型。'
- id: A23
  name: 后续团队入职时间
  value: platform eng at M15; second AI at M18; second GTM at M19; ops at M21; second solutions hire at M28
  unit: hiring schedule
  source: '[Heuristic anchored to BP sequencingRationale] 在生产转化和合作伙伴管道存在之前，招聘刻意保持精简。'
- id: A24
  name: 现金流简化假设
  value: EBITDA approximates operating cash flow
  unit: policy
  source: '[Heuristic: pre-seed SaaS model] 假设资本支出、债务和营运资金波动相对薪酬消耗不重要。'
- id: A25
  name: 融资里程碑
  value: 10 paying logos with 6 production conversions and one rollback-enabled workflow family by month 18
  unit: milestone
  source: '[BP milestones + FM framing] 用于以 6 个月缓冲期规模化本轮融资。'
