modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 营收引擎
  finding: "基础情景的营收由付费客户从 Y1 末 4 家增长至 Q4Y3 的 25 家驱动，而非超出约 $120k 正式生产 ACV 的激进客单价扩张。"
- checkName: 必须做对的事
  finding: "模型要求付费试点约在四个月内转为年度生产，以使混合 CAC 维持在约 $70k 并保持 11 人团队计划的可持续性。"
- checkName: 模型崩塌条件
  finding: "若销售周期滑落至六个月，或以 Splunk 为核心的买家始终将产品保持在纯咨询模式，现金将在下一个融资窗口前转负。"
- checkName: 下轮融资验证
  finding: "可信的种子轮叙事是：第 18 个月时达到 10 家付费客户、6 个生产转化、一个已启用回滚的工作流系列，并有合作伙伴引入管道佐证。"
sanityChecks:
  ruleOf40: Y3 growth 154% + EBITDA margin -36% = 117%
  burnMultiple: Y2 1.7x, improving to Y3 0.4x on exit ARR growth from $495.6K to $3090.0K.
  revenuePerFte: $199.7K Y3 per end-of-year FTE (benchmark $200–400K enterprise SaaS)
  flags:
  - "基础情景以约 $55K 现金结束第3年，若转化延迟一个季度，很可能被迫提前完成种子轮融资。"
  - "第3年末每 FTE 营收约 $200K，尚可接受，但仍处于强劲企业 SaaS 效率基准的低端。"
  - "模型假设人工审批的试点足以在更广泛的写入路径信任建立之前赢得预算。"
  - "Splunk/Cisco、Palo Alto 和 CrowdStrike 的在位套件捆绑压力，可能在回滚深度形成差异化之前压低 $120K ACV。"
