topRisks:
  - name: "套件捆绑风险"
    description: "Cisco、Splunk 或其他大型安全厂商可能将基础溯源和审批功能捆绑进自家自主 SOC 套件。"
    mitigation: "靠跨工具可移植性、更深的回滚编排，以及混合技术栈买家无法从单一套件获得的独立信任证据来守住差异化。"
  - name: "共创客户成熟度不足"
    description: "许多 SOC 团队在自主响应采用上仍处于早期阶段，这会拖慢初期管道并让 ROI 难以量化。"
    mitigation: "从已在试点有限身份遏制自动化的客户起步，把产品定位为解锁生产上线的安全层来销售。"
  - name: "集成与责任复杂性"
    description: "跨身份、端点和工单系统触碰响应动作，会带来技术集成阻力，以及一旦回滚失败的感知责任风险。"
    mitigation: "先以仅读模式上线策略模拟和溯源捕获，再为少数高价值动作添加范围严格、默认需人工审批的回滚能力。"
