problem: >-
  正在上线 Agentic SOC 工作流的安全团队，生成告警、起草调查、触发响应动作的速度已超出人工审核极限，却仍缺少一套记录体系，说明 AI 响应器究竟看到了什么、调用了哪个身份凭证、触发了哪些下游动作。这意味着一次账号禁用、令牌吊销或主机隔离，即使凭证完全合法，在操作层面也可能酿成事故。现有的 SIEM、SOAR 和身份工具把这段过程碎片化地分散在各自日志里，逼得分析师在信任已经崩塌之后再去拼凑操作溯源。
targetUser:
  primary: >-
    在基于 Splunk 的检测与响应平台上运行、同时试点 AI 辅助或自主身份遏制工作流的企业安全自动化负责人和 SOC 平台经理。
  secondary: >-
    必须审批、解释或回滚机器速度响应动作的身份安全工程师和事件响应人员。
  buyer: "安全自动化总监、安全运营负责人，或 CISO。"
startupThesis:
  nonObviousInsight: >-
    自主 SOC 的下一个控制点，既不是更好的 Copilot，也不是另一张身份图谱——而是一个会话内存层，它在修复前后把每一次人类、机器、AI 动作打包成 AI 可读的溯源对象。响应工作流越来越自主，真正稀缺的能力不是生成动作，而是证明一个授权动作安全可执行、并且容易撤销。
  beachhead: >-
    员工规模 2,000–10,000 人、使用 Splunk Cloud 或 Splunk Enterprise Security、配有身份提供商加 EDR 组合、拥有 5–15 人安全自动化团队、正在为身份入侵遏制、可疑权限提升或高风险 SaaS 管理员操作试点自主响应的美国金融科技和 B2B SaaS 企业。
  wedge: >-
    一个会话内存控制面：捕获高风险遏制工作流中的委派身份上下文、工具链证据和拟议动作影响范围，记录可回放的溯源轨迹，并为每一次经批准的 AI 响应提供一键回滚。
  whyNowCatalyst: >-
    Cisco 决定把 WideField 整合进 Splunk，围绕身份与会话遥测展开——这说明自主 SOC 的买家现在迫切需要一个确保机器速度操作安全的控制层，而不只是更好的告警关联。
  ventureScalePath: >-
    从 Splunk 为核心的 SOC 内身份遏制工作流起步，逐步扩展到跨工具动作策略模拟、更广泛安全自动化的运行时护栏、面向监管机构和保险公司的审计证据，最终成为管理安全与 IT 领域所有 AI 驱动操作的信任账本。
solution: >-
  产品位于客户的 SIEM、SOAR、身份提供商、EDR 和工单系统之间，每当人类分析师、脚本剧本或 AI 响应器触碰敏感工作流时，就创建一个规范化的会话对象。响应动作执行前，系统模拟身份范围、目标资产、可能的影响范围和所需审批，阻止或路由超出策略的动作。执行后，系统存储一个可回放的溯源包，包含触发证据、工具调用、委派凭证、下游变更和回滚步骤，让分析师能在几分钟内完成审计或撤销。首个版本聚焦于账号禁用、令牌吊销、会话终止和端点隔离流程——这些场景中，一次不安全但合法的动作造成的代价即时可见且可量化。
goToMarketSeed:
  firstCustomer: >-
    一家员工规模约 3,000 人的金融科技或 B2B SaaS 公司的安全自动化总监：使用 Splunk Cloud、现代身份提供商和 EDR，团队规模小，在非工作时间事件中仍需手动审批账号禁用和设备隔离剧本。
  buyingTrigger: >-
    在 Splunk 或 SOAR 中启动自主响应试点、一次事后复盘发现合法剧本造成了运营损失，或网络保险公司及董事会要求证明谁授权了机器速度遏制动作。
  currentAlternative: >-
    人工分析师审批、碎片化的 SIEM 和身份日志、通用 SOAR 剧本，以及为人类而非跨工具 AI 响应器设计的 PAM 或会话录制工具。
  switchingReason: >-
    切入点让团队保留现有 SIEM 和响应技术栈，同时为最不敢自动化的少数动作增加一个专用溯源与回滚层——不要求买家信任黑盒，就能把自主响应推入生产。
  pricingHypothesis: >-
    按受保护的响应工作流系列和每月受管动作量计费的年度订阅，并为策略模拟、审计导出和跨环境回滚提供高级模块。
