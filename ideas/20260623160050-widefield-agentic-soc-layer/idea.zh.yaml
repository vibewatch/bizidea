jobsToBeDone:
  - job: >-
      当 SOC 想让 AI 响应器禁用账号或隔离设备时，帮安全自动化负责人证明该动作在策略范围内且易于撤销——这样他们就能自动化遏制，而不会引发更大的故障。
    currentAlternative: "SOAR 中的人工审批，加上事后重建的日志拼凑。"
    successMetric: "高风险动作中，自动化且未引发需回滚事件的比例。"
  - job: >-
      当非工作时间的身份告警触发响应剧本时，帮事件响应人员精确还原哪些人类、机器和 AI 行为者参与了工作流——这样他们就能在业务影响蔓延之前解释或撤销决策。
    currentAlternative: "跨控制台的 Splunk 搜索、身份日志、工单评论和临时截图。"
    successMetric: "生成动作溯源报告的分钟数，以及完成回滚的时间。"
