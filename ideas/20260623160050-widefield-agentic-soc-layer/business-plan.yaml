slug: soc-session-memory-plane
date: '2026-06-23'
executiveSummary: >-
  Soc Session Memory Plane is a vendor-neutral control layer for Splunk-centered
  security teams that want to automate a few dangerous response actions without
  trusting a black box. The first user is the security automation lead or SOC
  platform manager at a U.S. fintech or B2B SaaS company with 2,000-10,000
  employees, a 5-15 person automation team, and active pilots around AI-assisted
  or autonomous response. The immediate pain is not alert triage; it is proving
  what an AI responder saw, which delegated identity it used, whether the action
  was inside policy, and how to unwind it if the action causes damage. The
  initial wedge is a read-mostly session-memory and blast-radius layer for
  account disable, token revoke, session kill, and endpoint isolate workflows,
  with human approval left in place. This beachhead is narrow because it matches
  a live buying trigger, fits inside existing Splunk and SOAR stacks, and
  produces measurable proof in approval time, evidence assembly time, and
  rollback time. Research supports demand, adjacent budget, and a plausible
  $120k initial ACV band, but public evidence on real buyer conversion rates,
  willingness to place a startup on the write path, and cross-vendor rollback
  coverage is still incomplete. The company should therefore sequence from
  provenance capture and policy simulation into deterministic rollback only after
  pilots show customers will trust the system on one workflow family. The
  biggest disconfirming risk is that suite-native tooling becomes good enough
  before the startup proves that an independent cross-tool provenance object is
  materially better.
problem:
  - Security teams can draft or trigger identity-containment actions faster than humans can review them, but they still cannot prove which evidence, delegated identity, and downstream effects produced each machine-speed action.
  - SIEM, SOAR, identity, and EDR tools log fragments of the workflow, so post-incident reconstruction and rollback are slow exactly when an authorized action has already caused business damage.
solution:
  - Create a canonical session-memory object for every high-risk response workflow that links evidence, delegated identity, action intent, approvals, downstream changes, and rollback steps in one AI-readable record.
  - Simulate blast radius before execution, enforce policy and approval gates on the write path, and store replayable provenance bundles so responders can explain or reverse actions in minutes instead of reconstructing logs by hand.
whyWeWin:
  - The product lands on the few workflows buyers are afraid to automate, which is easier to fund than a broader new SIEM, copilot, or identity graph pitch.
  - Defensibility compounds from cross-tool provenance bundles, approval outcomes, and rollback history that mixed-stack buyers cannot get from any single incumbent suite.
strategicChoices:
  beachhead: U.S. fintech and B2B SaaS enterprises with Splunk Cloud or Splunk Enterprise Security, a modern identity provider plus EDR, and active pilots for AI-assisted identity-containment workflows.
  wedgeRationale: Identity disable, token revoke, session terminate, and device isolate actions have immediate outage risk, concentrated ownership in security automation teams, and a clear reason to buy a safety layer before broader autonomous response.
  sequencingRationale: Start read-mostly with provenance capture, approval routing, and blast-radius simulation because those steps create trust and ROI without forcing buyers to grant broad write privileges; add deterministic rollback and more workflow families only after pilots prove customer willingness to put the startup on the control path.
  notYet:
    - Full autonomous remediation without human approval by default
    - Broad non-Splunk SIEM-first accounts before the Splunk-centered wedge is repeatable
    - General AI agent governance outside security operations
    - Compliance-only log archiving without pre-execution control value
market:
  tam: $630.0M estimated TAM based on roughly 15,000 Splunk customers, a 35% security-mature cohort estimate, and about $120k annual value per account
  sam: $81.9M estimated SAM for U.S. fintech and B2B SaaS Splunk-centered accounts matching the initial beachhead filter
  som: $3.0M estimated year-three SOM based on 25 paying logos at roughly $120k annual ACV
  segments:
    - Security automation leaders and SOC platform managers at Splunk-centered fintech and B2B SaaS enterprises
    - Identity security engineers and incident responders who approve, explain, and unwind sensitive automated actions
  buyingProcess: The likely champion is the director of security automation or SOC platform lead, but economic approval sits with the Head of Security Operations or CISO because the product touches sensitive response actions and audit posture. A credible first sale is a paid pilot on one workflow family that preserves human approval, then converts to an annual subscription once the buyer sees faster approvals, cleaner evidence, and acceptable security controls.
product:
  mvp: >-
    MVP is a read-mostly governance layer for account disable, token revoke,
    session kill, and endpoint isolate workflows inside Splunk-centered SecOps
    stacks. It must ingest identity, SOAR, EDR, and ticketing events, simulate
    blast radius before execution, capture approvals, and generate a replayable
    provenance bundle with rollback instructions while leaving human approval on
    by default.
  sixMonth: Ship production connectors for Splunk, one major identity provider, one major EDR, and ticketing; add policy templates, approval routing, and audit exports for 3-5 paid design partners.
  twelveMonth: Add deterministic rollback for the narrowest supported actions, benchmark safe-autonomy thresholds by workflow family, and expand from identity containment into endpoint isolation where downstream APIs are reliable.
  twentyFourMonth: Become the cross-tool trust ledger for high-risk security automations, with policy simulation, rollback coverage, and audit evidence spanning multiple workflow families and mixed enterprise stacks.
  keyBets:
    - Buyers will fund a safety layer for write-path automation before they fund another AI triage tool.
    - Provenance capture plus blast-radius simulation will earn trust faster than starting with autonomous action execution.
    - A four-workflow beachhead is narrow enough to deploy quickly but broad enough to support six-figure annual subscriptions.
gtm:
  wedge: Sell a paid pilot that governs one identity-containment workflow family inside the existing Splunk and SOAR stack, then convert to annual production after proving lower approval latency, faster evidence assembly, and acceptable rollback confidence.
  channels:
    - Founder-led outbound to security automation leaders, heads of SOC, and CISOs at Splunk-centered fintech and B2B SaaS accounts
    - Design-partner and implementation referrals through Splunk or Cisco ecosystem consultants, MSSPs, and SecOps service partners
    - Post-incident or renewal-driven referrals from cyber-insurance, incident-response, and audit-compliance partners
  funnelTargets: "lead→qualified pilot 15-25%, qualified pilot→paid pilot 35-50%, paid pilot→annual production 50%+, production→second workflow family within 12 months 30%+"
  pricing: Annual subscription priced by governed response workflow family with usage tiers for monthly governed actions, because buyers feel pain at the workflow level and can justify budget against avoided analyst time, outage risk, and audit effort; charge separately for policy simulation, audit exports, and cross-environment rollback once the base wedge is trusted.
businessModel:
  revenueStreams:
    - Annual platform subscription for governed response workflow families
    - Usage-based fees for governed or replayed response actions above the base tier
    - Premium modules for policy simulation, audit exports, and cross-environment rollback
    - One-time implementation and workflow-template setup fees
  unitOfValue: Governed high-risk response workflow family
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more workflow families within the same customer after the first identity-containment pilot converts
    - Expand from Splunk-centered deployments into broader mixed-stack SecOps environments
    - Sell audit evidence, insurer-facing reporting, and deeper rollback orchestration on top of the same provenance ledger
strategyMap:
  northStarMetric: Percent of covered high-risk response actions executed with a complete provenance bundle and no rollback-causing incident
  inputMetrics:
    - Time from alert to approved action on covered workflows
    - Minutes to assemble an action provenance report after an incident
    - Pilot to annual production conversion rate
    - Percent of targeted actions with deterministic blast-radius simulation before execution
    - Percent of production actions with successful rollback path coverage
  moatsToBuild:
    - Cross-tool provenance corpus linking evidence, delegated identity, approvals, downstream changes, and rollback outcomes by workflow family
    - Workflow-specific risk models trained on approval overrides, simulated blast radius, and actual rollback results
    - Trusted implementation templates for Splunk-centered mixed stacks that reduce deployment time and security review friction
  killCriteria:
    - Fewer than 3 paid design partners within 9 months
    - Paid pilot to annual production conversion below 40% after the first 6 pilots
    - Median initial deployment taking more than 8 weeks across the first 5 pilots
    - Fewer than 70% of targeted actions gaining trustworthy pre-execution blast-radius simulation in production pilots
  mermaid: |
    flowchart LR
      Wedge[Identity-containment wedge] --> MVP[Session-memory MVP]
      MVP --> Proof[Trust and rollback proof points]
      Proof --> Expansion[Broader SecOps control plane]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong pain and wedge clarity, but conviction stays limited until buyers prove they will fund an independent write-path safety layer instead of waiting for suite-native features.
    whyBelieve: Cisco's WideField move, crowded agentic SOC rollout, and clear buyer fear around unsafe authorized actions all support a real control-plane need.
    whyDoubt: Incumbents already own the surrounding workflow and the startup still has to prove cross-tool provenance and rollback are important enough to overcome bundle pressure and trust friction.
    nextDiligence: Secure 3-5 paid pilots in the stated beachhead and measure whether human-governed identity-containment workflows convert into annual six-figure subscriptions.
  firstCustomer:
    title: Director of Security Automation at a Splunk-centered fintech or B2B SaaS company
    profile: A 2,000-10,000 employee U.S. enterprise with Splunk, a modern identity provider, EDR, and a small automation team that still manually approves risky after-hours containment actions.
    trigger: The team is moving from AI-assisted triage into write-path automation, or a recent near-miss exposed that valid playbooks can still cause outages and are hard to explain afterward.
    buyer: Head of Security Operations or CISO
    initialContract: $30k-$60k paid pilot on one workflow family, converting to roughly $90k-$150k annual subscription as governed actions and supported workflows expand.
  mustBeTrue:
    - Buyers confirm that identity-containment safety is urgent enough to fund before broader autonomous SOC tooling is fully mature.
    - The first production deployment can go live in 6-8 weeks without unacceptable integration or security-review drag.
    - Human-approved provenance bundles materially reduce approval time and post-incident reconstruction time on real workflows.
    - Customers will allow the product onto the write path for at least one high-risk action family after a read-mostly pilot.
    - Cross-tool neutrality and rollback depth remain materially better than suite-native alternatives in customer evaluations.
  diligenceQuestions:
    - Which exact incidents or near-misses made the buyer worry about authorized but unsafe automated actions?
    - In the first budget cycle, does spend come from SecOps automation, identity security, or compliance and audit budgets?
    - Which first workflow family has cleaner rollback semantics and clearer ROI in practice: identity containment or endpoint isolation?
    - What must the startup prove for a CISO to let it sit on the write path rather than remain advisory only?
    - How often do target accounts already get "good enough" provenance and approval controls from Splunk, Palo Alto, CrowdStrike, or Microsoft?
operatingAssumptions:
  - assumption: The first repeatable buyer is a Splunk-centered security automation leader, with the Head of Security Operations or CISO approving budget.
    basis: idea.yaml
    validationTest: Close at least 5 discovery processes and 2 paid pilots where this same buyer path owns the budget and deployment decision.
    decisionImpact: If false, the GTM motion, sales cycle, and proof-of-value narrative must shift toward identity engineering or compliance buyers.
  - assumption: Buyers will adopt provenance capture and blast-radius simulation before they accept startup-managed rollback on the write path.
    basis: research.yaml
    validationTest: In the first 5 pilots, confirm at least 4 accept read-mostly governance scope and at least 2 expand into controlled rollback evaluation.
    decisionImpact: If false, the product either stalls as advisory-only software or must take on higher implementation and liability risk earlier.
  - assumption: A four-workflow initial scope is enough to support roughly $120k annual ACV once a pilot converts.
    basis: research.yaml
    validationTest: Test pilot-to-annual proposals with at least 3 customers and confirm at least 2 accept pricing in the target band without demanding broad workflow coverage first.
    decisionImpact: If false, the company must either lower pricing, expand scope faster, or rely on services-heavy deployment that weakens venture economics.
  - assumption: Splunk, identity, EDR, and ticketing telemetry already provide enough data to build trustworthy provenance bundles without replacing incumbent systems.
    basis: research.yaml
    validationTest: In the first 3 pilots, verify that at least 80% of the fields required for action replay and audit evidence can be populated from existing source systems.
    decisionImpact: If false, implementation complexity rises and the product risks becoming another data-platform project instead of a focused control layer.
  - assumption: Cross-tool neutrality will matter enough that buyers prefer an independent layer over waiting for suite bundles.
    basis: operator judgment
    validationTest: In 10 competitive discovery calls, record whether mixed-stack buyers rank vendor neutrality and rollback depth above bundle convenience in at least half of cases.
    decisionImpact: If false, the startup should narrow into a partner-dependent feature layer or reconsider the standalone category thesis.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 20 security automation leaders and SOC platform managers in the stated beachhead about account-disable, token-revoke, session-kill, and device-isolate workflows.
    hypothesis: Identity-containment workflows create a sharper buying trigger than broader autonomous SOC or compliance-only positioning.
    successMetric: At least 10 buyers describe a recent workflow where approval, evidence assembly, or rollback pain blocked fuller automation, and 5 agree to workflow mapping.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build manual or semi-automated provenance bundles for 2 historical incidents using customer-exported Splunk, identity, EDR, and ticketing logs.
    hypothesis: Buyers will pay for provenance reconstruction before full automation if the output is specific enough to support a live control decision.
    successMetric: 2 target accounts agree to paid pilot scopes after reviewing sample provenance bundles.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Launch 3 paid pilots that keep human approval on but insert policy simulation and provenance capture on one workflow family.
    hypothesis: Read-mostly governance converts faster than a write-path-first pitch while still proving category value.
    successMetric: 3 paid pilots launched, at least 2 completed inside 8 weeks, and at least 1 converted to annual production.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: "Benchmark two workflow families: identity containment versus endpoint isolation."
    hypothesis: Identity containment has higher urgency, but endpoint isolation may offer cleaner rollback semantics and therefore faster production trust.
    successMetric: One workflow family shows at least 30% better deployment speed or trust metrics and becomes the default sales package.
    owner: Founding eng
  - horizon: 180–365 days
    experiment: Add deterministic rollback to the narrowest supported action set for converted pilot customers.
    hypothesis: Production customers will expand spend only after rollback coverage is proven on real incidents rather than in simulation alone.
    successMetric: At least 2 production customers enable rollback for one action family and report successful reversal paths on 90%+ of covered test cases.
    owner: Security integrations engineer
  - horizon: 180–365 days
    experiment: Sign 3 referral or implementation relationships in the Splunk, MSSP, cyber-insurance, or incident-response ecosystem.
    hypothesis: Trusted partners shorten security-review cycles and improve top-of-funnel quality faster than cold outbound alone.
    successMetric: 3 partner agreements and 2 qualified paid-pilot introductions sourced through partners.
    owner: Founder CEO
operations:
  - Least-privilege connector architecture across Splunk, identity, EDR, and ticketing systems with customer-controlled credentials and audit logging
  - Policy-template library for account disable, token revoke, session termination, and endpoint isolation workflows
  - Weekly pilot review covering approval latency, provenance completeness, blast-radius accuracy, and rollback readiness
  - Security review package for procurement, data retention, incident response, and write-path governance controls
  - Partner operating model for MSSPs, incident-response firms, and Splunk ecosystem implementers
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Own the session-memory data model, core connectors, and first governed workflow family before the company broadens product scope.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Category creation, design-partner sales, and trust-heavy enterprise buying all require founder-led GTM at the start.
  - role: Applied AI engineer
    startTiming: Month 3
    rationale: Blast-radius simulation, provenance extraction quality, and action-risk modeling are the central technical differentiation risks.
  - role: Security integrations engineer
    startTiming: Month 6
    rationale: Deterministic rollback and mixed-stack write-path reliability require deeper API, policy, and security engineering than the MVP.
  - role: Solutions engineer
    startTiming: Month 9
    rationale: Early enterprise deployments need workflow mapping, integration setup, and measurement of pilot ROI to keep implementation time inside target bounds.
  - role: First GTM hire
    startTiming: Month 12
    rationale: Add a quota-carrying seller only after the first buyer profile, pricing, and pilot package are repeatable.
milestones:
  - horizon: 0–12 months
    items:
      - Win 3-5 paid design partners in the Splunk-centered fintech and B2B SaaS beachhead
      - Deliver first production pilot inside 8 weeks for at least 2 customers
      - Convert at least 2 paid pilots into annual subscriptions
      - Prove measurable reduction in approval time and action reconstruction time on one workflow family
  - horizon: 12–24 months
    items:
      - Expand production customers from provenance capture into deterministic rollback on the narrowest supported actions
      - Add a second workflow family only after the first shows repeatable deployment and conversion
      - Establish partner-sourced pipeline through Splunk ecosystem, MSSP, and incident-response relationships
      - Build benchmark data on approval overrides, blast-radius accuracy, and rollback outcomes across the installed base
  - horizon: 24–36 months
    items:
      - Reach multi-workflow adoption across identity containment and endpoint isolation in production accounts
      - Prove the product can operate as a mixed-stack trust ledger rather than a one-workflow pilot tool
      - Expand into broader SecOps action-governance use cases only after cross-tool neutrality and deployment speed remain differentiated
      - Show that insurer-facing reporting and audit evidence create meaningful expansion revenue
risks:
  - risk: Suite-native action governance becomes good enough before the startup proves clear cross-tool differentiation.
    likelihood: High
    impact: High
    mitigation: Focus on mixed-stack provenance, deeper rollback orchestration, and faster deployment on one workflow family rather than generic agentic SOC features.
  - risk: Buyers keep the product in advisory mode and never allow it onto the write path.
    likelihood: High
    impact: High
    mitigation: Start with human approval, quantify time and trust gains, and introduce rollback only where customers see clear safety improvement.
  - risk: Connector coverage or downstream API limits make rollback unreliable across real customer stacks.
    likelihood: Medium
    impact: High
    mitigation: Support only the narrowest actions with deterministic reversal first and refuse broad promises until test coverage is real.
  - risk: Security review and procurement cycles take too long for a pre-seed company to maintain momentum.
    likelihood: Medium
    impact: High
    mitigation: Package least-privilege architecture, audit logging, retention controls, and partner references early to shorten diligence.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway funds core connector and risk-model engineering, 3-5 design-partner deployments, founder-led enterprise GTM, and proof that one governed workflow family converts from paid pilot to repeatable annual subscription before broader SecOps expansion.
