modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by growing from 4 paying logos at Y1 exit to 25 at Q4Y3, not by aggressive ARPU expansion beyond the stated $120k production ACV.
- checkName: Must go right
  finding: The model needs paid pilots to convert into annual production in about four months so blended CAC stays near $70k and the 11-FTE plan remains supportable.
- checkName: Model breaks if
  finding: If sales cycles slip to six months or Splunk-centered buyers keep the product advisory-only, cash goes negative before the next financing window.
- checkName: Next-round proof
  finding: A credible seed narrative is 10 paying logos, 6 production conversions, and one rollback-enabled workflow family by month 18 with partner-sourced pipeline evidence behind it.
sanityChecks:
  ruleOf40: Y3 growth 154% + EBITDA margin -36% = 117%
  burnMultiple: Y2 1.7x, improving to Y3 0.4x on exit ARR growth from $495.6K to $3090.0K.
  revenuePerFte: $199.7K Y3 per end-of-year FTE (benchmark $200–400K enterprise SaaS)
  flags:
  - Base case exits Y3 with only about $55K of cash, so a one-quarter conversion delay would likely force an earlier seed raise.
  - Revenue per end-of-year FTE reaches about $200K in Y3, which is acceptable but still at the low end of strong enterprise-SaaS efficiency.
  - The model assumes human-approved pilots are enough to win budget before broader write-path trust is proven.
  - Incumbent bundle pressure from Splunk/Cisco, Palo Alto, and CrowdStrike could compress the $120K ACV before rollback depth is differentiated.
