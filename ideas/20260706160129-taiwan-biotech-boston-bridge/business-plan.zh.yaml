slug: biotech-partner-readiness-os
date: '2026-07-06'
executiveSummary: Biotech Partner Readiness OS 最该从台湾生物医药公司进入 Boston 的单次推进项目起步。现在卡住的不是约会，而是怎么把会后对话推进成结构化尽调和已签下一步动作。首个客户是 15–40 人、手里只有一个核心资产、拿着 8–20 场 Boston 跟进会、却没有全职美国 BD 负责人的生物科技公司。MVP 要做的是把该资产的科学、IP、监管和临床状态一次打包，再按药企 BD 团队、技术转移办公室、医院或高校合作方输出定制材料，配套尽调追踪器和安全导出层。GTM、定价和上线都要围绕推进项目：创始人主导销售，先围着一个活跃资产做付费试点或上线服务，再按活跃资产和市场进入项目收年费。研究给出的市场不大但真实——当前台湾 × Boston 切口下，TAM 约 $8.4M，初始 SAM 约 $3.5M，第 3 年 SOM 约 $1.2M——所以能不能做成 风投级规模，取决于先证明它能重复，再迅速扩到其他 APAC 及 Europe-to-U.S. 走廊。公司一开始不该做会议 平台、通用 CRM 替代品或全包顾问公司；那样切口会糊，也会把更强的现有厂商全都招进来。最硬的反证风险是，这个工作流始终是低频、重服务的，创始人宁愿继续用 VDR + CRM + 顾问组合，也不愿换一套新系统记录层。研究里的另一个空白是预算归属——到底是创始人 / BD 预算，还是 cohort 资助方 补贴先付钱——所以前 90 天必须先把发票和转化数据跑出来，再决定是否扩招。
problem:
- 台湾生物医药公司能通过代表团和孵化器项目拿到 Boston 会面，但每个美国对手方要的科学摘要、IP 背景、监管状态、临床计划和合作诉求都不一样，创始人只好在 演示文稿、共享盘和邮件线程里一遍遍重搭故事。
- 授权交易的经济结构更后置，机构尽调标准也更高，所以哪怕前面的介绍会很强，只要会后跟进慢、证据缺口补不上，谈判筹码就会被迅速吃掉。
solution:
- 把单个资产的科学、IP、监管和临床材料吃进来一次，再按药企 BD、技术转移和医院/临床合作工作流生成不同的材料包，并为每条路径标出证据缺口。
- 用安全权限、文档请求、负责人、状态追踪和可导出的材料包或 VDR 输出，把会后尽调跑起来；创业公司可以继续向前推进，不必逼外部对手方改用新工具。
whyWeWin:
- 会议平台、VDR、CRM、交易数据库和顾问服务各自解决一小段流程，但研究没有找到任何一家现有厂商，能从首份材料包一路吃到已签下一步动作，真正占住跨境资产就绪。
- 产品可以先叠加在现有 VDR 和 CRM 习惯之上落地，比起要求时间紧的生物医药团队和美国对手方整套迁移，采用阻力小得多。
- 重复推进项目会沉淀一套专有数据集，把资产画像、证据缺口、对手方类别和转化结果连起来，这是通用工作流工具很难复制的。
strategicChoices:
  beachhead: 10–50 人的台湾生物医药创业公司，手里有一个核心治疗、诊断或医疗器械资产，通过代表团或孵化器主导的美国扩张项目进入 Boston，但没有完整的美国 BD 团队。
  wedgeRationale: 这条切口比更宽的全球合作软件更容易先验证，因为 cohort 项目已经把可出海团队聚在真实推进项目周围，材料搭建的触发点立刻出现，而且不同机构类型会在很短时间窗里同时涌来。若一上来就卖给整个 APAC 生物医药或更泛的合作工作流，你得先证明陌生的获客动作、补齐更宽的模板覆盖，还要正面撞上更强的相邻厂商。
  sequencingRationale: 先把单个活跃资产的 资产录入、Boston 材料模板、安全导出和尽调追踪跑通，再谈深度集成、cohort 管理端视图或多走廊扩张。GTM 和招聘也照同样顺序来：先靠创始人亲自卖和一套强执行的上线动作，等试点证明响应速度或转化率有实打实提升，再放大渠道。
  notYet:
  - 全球化的合作发现平台或会议排期网络
  - 完整替换 VDR，或强迫外部对手方必须进共享工作区
  - 面向大型药企或成熟生物科技团队的多资产全组合工作流
  - 在一个可复用的第二走廊假设被验证前，先往台湾与 Boston 之外扩张
market:
  tam: $8.4M 的台湾单市场 TAM 估算——基于 84 个已上市的 Act 资格产品，以及每个活跃资产每年约 $100k 的推进工作流预算
  sam: $3.5M 的初始 SAM 估算——按 2025 年 BIO Boston 台湾馆可见的约 35 家公司、每个面向 Boston 的推进项目约 $100k 计算
  som: $1.2M 的第 3 年 SOM 估算——假设台湾及周边 APAC 的 Boston 进入项目里，有 12 个可触达客户，每个客户约 $100k 年化价值
  segments:
  - 手里有一个核心治疗、诊断或医疗器械资产、却没有深度美国 BD 团队、正进入 Boston 的台湾生物医药创业公司
  - 反复组织 APAC 生物科技团队进入美国枢纽的出口加速器、孵化器和政府支持 cohort 项目
  buyingProcess: 日常使用者兼首个签字人，通常是 CEO 或 BD 负责人。只要代表团、BIO 行程或孵化器项目一下子拉来 8–20 场对材料要求不同的跟进对话，采购就会被触发。第二条路径是加速器或出口项目按 cohort 打包采购，但研究还没验证这笔预算是否比创始人直接付款更快落单。
product:
  mvp: 一套安全的单资产工作区：记录科学、IP、监管和临床状态，然后生成三类适配 Boston 的材料包——面向药企 BD/授权、技术转移/联合研究、医院/临床合作方——并配上按负责人分配的尽调请求追踪，以及可导出的 PDF 或 VDR 链接。第一版不要求外部对手方登录。
  sixMonth: 在 2–3 个真实的台湾到 Boston 推进项目里跑通可复用模板库、安全权限、审计日志、基础合作方匹配规则，以及材料生成和尽调响应的周期报告。
  twelveMonth: 补上 VDR 和 CRM 集成、sponsor / cohort 管理端视图、基准面板，并把模板扩到治疗、诊断和医疗器械更多子类，让上线周期维持在几天而不是几周。
  twentyFourMonth: 把同一套工作流扩到 Korea、Singapore、Japan 或 Europe-to-U.S. 合作走廊，并上线组合层面的多资产管理，以及基于累计推进结果训练出来的更强匹配打分。
  keyBets:
  - 单资产上线足够标准化，不会把毛利拖成顾问式服务水平。
  - 对外只导出材料包和 VDR 链接，第一年就足够让合作方配合。
  - 单个活跃推进项目能在一个季度内展示可测量的响应速度或转化改善。
  - 核心工作流在相邻的 入美 生物医药走廊里能以有限改造重复使用。
gtm:
  wedge: 先卖一层合作就绪工具给一场正在推进的 Boston 项目：把一个资产打包一次，生成按合作方定制的材料包，再把会后尽调时钟一直跑到签下第一步动作。
  channels:
  - 通过 Startup Island、BIO Boston、MassBio 及类似的台湾到美国 cohort 项目做创始人主导销售
  - 由生物医药律所、BD 顾问和转化顾问转介绍——这些人本来就在帮客户推进尽调
  - 与管理重复出海代表团的加速器、孵化器和出口机构合作，走 sponsor 或 cohort 打包采购
  funnelTargets: 项目导入线索→合格试点 25–35%；合格试点→年约 50%+；首个正式客户→12 个月内扩到第二个资产或 sponsor 级 rollout 30%+
  pricing: 先围绕一个活跃资产和一场 Boston 推进项目收付费上线费或试点费，再转成按活跃资产和目标市场推进项目收费的年订阅；cohort 管理端视图或高级匹配打分另加价。这样既贴合当下真实但低频的预算科目——VDR、CRM 和顾问费本来就存在——又避免过早陷入按 seat 收费的 SaaS 逻辑。
businessModel:
  revenueStreams:
  - 按活跃资产和目标市场推进项目收年订阅费
  - 资产标准化、模板搭建和安全权限设置的一次性上线费
  - 合作方匹配打分、基准分析和 cohort 管理后台的高级模块费
  unitOfValue: 在管的活跃资产与目标市场推进项目
  targetGrossMarginPct: 70
  expansionLevers:
  - 在老客户内部增加更多资产或更多美国进入项目
  - 卖给管理多家创业公司的加速器或出口项目，做 cohort 级许可证
  - 用同一套模板栈扩到相邻的 APAC 或 Europe-to-U.S. 走廊
  - 等转化数据集成熟后，再加卖基准分析和匹配打分模块
strategyMap:
  northStarMetric: 60 天内，目标对手方会面推进到正式尽调或签下下一步协议的占比
  inputMetrics:
  - 至少生成过一份定制合作方材料包的活跃资产推进项目数
  - 完成一项合作方尽调请求的中位时间
  - 使用可复用模板而不是定制重做的推进项目占比
  - 试点转年约的比例
  - 能稳定带来合格机会的 cohort 或转介绍伙伴数量
  moatsToBuild:
  - 把资产类型、材料包结构、证据缺口、对手方类别和结果连起来的转化数据集
  - 覆盖授权、临床和研究工作流的可复用模板库
  - 关于哪些问题最容易卡住交易、团队又是如何补上的权限与响应遥测数据
  killCriteria:
  - 前 10 次 ICP 访谈里，少于 5 家确认在单个 60 天推进项目里会出现至少 5 种定制材料包或 15 条以上尽调请求
  - 前 5 个付费试点里，少于 2 个能在 6 个月内转成年约
  - 试点无法把客户的尽调响应中位时间较原手工流程至少砍掉 20%
  - 到第 18 个月仍验证不出一条可复用的第二走廊，公司继续被困在台湾 × Boston 的小众市场里
  mermaid: |
    flowchart LR
      Wedge[Taiwan-to-Boston asset campaign] --> MVP[Asset intake plus packet generator]
      MVP --> Proof[Faster diligence and signed next steps]
      Proof --> Expansion[More corridors and multi-asset platform]
investorMemo:
  verdict:
    call: 继续观察
    conviction: 工作流切口很抓人，但按今天的信息，台湾 × Boston 市场太小，预算归属也太不确定，还不足以下肯定判断。
    whyBelieve: 研究清楚指出，会议生成工具和已签下一步动作之间存在真实空白；而且在早期生物医药软件切口里，首个客户、触发条件和具体工作流少见地足够清晰。
    whyDoubt: 按当前假设，初始 SAM 只有约 $3.5M，直接付费意愿仍未被验证；更大的风险是创始人继续买顾问、继续拼现有工具，而不是转向软件。
    nextDiligence: 先拿到推进日志、发票数据和两次真实试点，证明材料包量级、预算归属和可测量的周期缩短，再谈扩张。
  firstCustomer:
    title: 一家 20–30 人台湾生物医药公司的 BD 负责人，手里有一个核心资产
    profile: 公司已经拿到 Boston 代表团或孵化器路径，正与药企、医院和研究机构展开 8–20 场跟进对话，但没有全职美国 BD 团队。
    trigger: 一次美国 市场进入 项目或 BIO 式行程带来多条真实跟进，创始人才发现每个对手方要的尽调包和响应节奏都不一样。
    buyer: CEO 或 BD 负责人
    initialContract: 围绕一场正在推进的 Boston 项目，先签 $25k–$50k 的试点与上线服务；等响应速度和跟进效果跑出来后，再转成单个活跃资产 $75k–$125k 的年订阅。
  mustBeTrue:
  - 受访 ICP 至少有一半表示，一场 Boston 推进项目在 60 天内会冒出 5 种以上定制材料包和 15 条以上尽调请求。
  - 前 5 个付费客户里，至少 3 个能用 CEO 或 BD 预算，或 sponsor 补贴直接买单，而不是被企业 IT 采购拖死。
  - 试点客户至少看到 20% 的尽调响应提速，或在单次推进项目里明显提高正式尽调 / 已签下一步的转化。
  - 前 5 个试点里，要求对手方必须进入新共享工作区的案例不超过 1 个；大多数场景只靠导出材料包和 VDR 链接就够。
  - 到第 18 个月，至少有一条第二走廊能用大致相同的上线与模板模型，产出 2 个合格试点。
  diligenceQuestions:
  - 一场真实的 60 天台湾到 Boston 资产推进项目，到底会冒出多少定制材料包和文档请求？
  - 首笔预算实际由谁签：CEO / BD 负责人、项目 sponsor，还是顾问代管支出？
  - 在创始人愿意上传未公开科学和 IP 之前，系统最少得具备哪些权限与审计能力？
  - Boston 的对手方接受导出材料包和 VDR 链接，还是一定要共享工作区？
  - 哪条第二走廊在操作上最接近台湾 × Boston，而且大到足以在小众市场饱和前撑起扩张？
operatingAssumptions:
- assumption: 一场进入 Boston 的单资产推进项目，本身就会产生足够多的材料包和请求量，足以支撑软件购买。
  basis: research.yaml
  validationTest: 从 8–10 位近期参加台湾到 Boston 或 BIO 项目的团队那里，收集导出的邮件线程、VDR 请求日志和顾问清单，统计材料包变体、请求量和响应时间。
  decisionImpact: 如果不成立，产品就该收窄成 sponsor 级 cohort 工具，或继续停留在服务辅助型交付，而不是独立软件平台。
- assumption: 第一笔预算能在推进项目启动时，从 CEO / BD 运营预算或 sponsor 补贴里批出来。
  basis: research.yaml
  validationTest: 访谈 10 位创始人和 3 位项目经理，复盘赢单/丢单，并核对 VDR、顾问和 CRM 的真实发票，找出第一预算所有者。
  decisionImpact: 如果不成立，定价和销售就必须转向 sponsor 打包采购，或做一个审批路径更短、金额更小的试点产品。
- assumption: 对美国对手方来说，导出材料包和 VDR 链接已经够用，第一年不需要强推共享工作区。
  basis: research.yaml
  validationTest: 与 3–5 个 Boston 对手方测试材料交付和会后协作，覆盖药企 BD、医院研究和技术转移团队。
  decisionImpact: 如果不成立，路线图就得提前把外部协作者体验、安全审查和支持成本拉到前面。
- assumption: 单资产上线能靠可复用模板完成，而不是退回到定制顾问式交付。
  basis: 运营判断
  validationTest: 给前 3 次部署计时，量化资产 结构化模板、材料逻辑和尽调流程里，有多少比例可以不做定制开发直接复用。
  decisionImpact: 如果不成立，当前融资计划下的毛利和部署速度都会被打穿，公司要么得多融钱，要么按技术路线进一步收窄范围。
- assumption: 同一套核心工作流能在 18 个月内复制到第二条 入美 生物医药走廊。
  basis: research.yaml
  validationTest: 与 Korea、Singapore、Japan 或 Europe 的走廊运营方做发现式访谈，并争取 2 个付费试点，且大部分沿用同一套模板栈。
  decisionImpact: 如果不成立，投资人就该把它当成更窄、但能高效生存的小众工作流公司，而不是 venture-scale 平台。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 从 8–10 个近期参加台湾到 Boston 或 BIO 的团队手里，收集真实推进日志和工作流证据。
  hypothesis: 单个资产推进项目会稳定产生足够多的材料包变体和请求量，值得单独买软件。
  successMetric: 10 个推进项目里，至少 5 个在 60 天内出现 5 种以上材料包变体、15 条以上尽调请求，或清楚暴露响应瓶颈。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 摸清创始人、BD 负责人和 cohort 项目经理之间的预算归属。
  hypothesis: 第一单可以用现有创始人预算或 sponsor 支出买掉，不必新开一笔企业软件预算。
  successMetric: 10 次访谈里，至少 6 次收敛到同一个可复用的预算所有者，并能支持试点采购路径。
  owner: 创始人 / CEO
- horizon: 90–180 天
  experiment: 围绕真实的 Boston 项目做 2 个 深度陪跑式试点：一个资产、三类材料包、一条共享尽调追踪器。
  hypothesis: 在没有深度集成、也不要求外部对手方登录的前提下，MVP 仍能减少材料重做和响应时间。
  successMetric: 两个试点都能启动，且至少一个相较客户原来的手工流程，把尽调响应中位时间压低 20% 以上。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 与 3–5 个 Boston 对手方测试只导出材料的协作方式，覆盖药企 BD、技术转移和医院研究团队。
  hypothesis: 对手方愿意直接接收导出的材料包、摘要和 VDR 链接，而不要求进入新的共享工作区。
  successMetric: 5 个对手方里至少 4 个能在不要求登录协作的前提下完成试点流程。
  owner: 生物医药实施负责人
- horizon: 180–360 天
  experiment: 把首批试点转成年订阅，或签下一份 sponsor 级 cohort 套餐。
  hypothesis: 只要工作流改善被测量出来，单个活跃资产和推进项目就足以支撑经常性软件支出。
  successMetric: 首批付费试点里，至少 2 个能在启动后 6 个月内转成年约，或拿下一份 cohort 套餐。
  owner: 创始人 / CEO
- horizon: 180–540 天
  experiment: 在一条第二走廊里复制同样的上线与模板模型。
  hypothesis: 台湾 × Boston 的工作流只需有限产品改造，就能迁移到另一条 入美 生物医药走廊。
  successMetric: 在第二走廊拿到 2 个合格试点，而且 Boston 这边的模板复用率至少 70%。
  owner: 渠道合作负责人
operations:
- 维护一个带细粒度权限、活动日志和可导出材料能力的资产就绪工作区，让机密科学与 IP 比邮件线程更安全。
- 先围绕一套资产 结构化模板 和三类对手方模板做标准化上线，再谈技术路线或地理扩张。
- 在真实推进项目里，和创始人、顾问与律师一起做每周尽调复盘，让产品占住下一步推进速度，而不是被当成被动存储。
- 第一年优先向外接入现有 VDR、CRM 和 交易情报 工具，而不是逼客户整体迁移。
- 先用创始人直签的试点证明工作流和经济性，再补 sponsor 端报表。
team:
- role: 创始人 / CEO
  startTiming: 第 0 个月
  rationale: 先亲自抓销售、sponsor 关系、定价和早期产品发现，因为核心风险是这条工作流到底能不能拿到独立预算。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 把安全资产 结构模板、材料生成器、权限模型和尽调追踪器做出来，让这条切口真正能产品化。
- role: 生物医药实施负责人
  startTiming: 第 3 个月
  rationale: 把客户的科学、IP 和监管材料翻进可复用模板里，防止上线过程塌成开放式顾问项目。
- role: 渠道合作负责人
  startTiming: 第 9 个月
  rationale: 等 2–3 个试点证明工作流结果可量化后，再把加速器、出口项目和转介绍伙伴放大成分发渠道。
milestones:
- horizon: 0–12 个月
  items:
  - 用 8–10 个推进项目级别的发现研究，验证材料包量级、预算归属和对手方偏好的交付格式
  - 在 2–3 个真实的台湾到 Boston 推进项目里，把带安全导出、权限和尽调追踪的 MVP 跑起来
  - 至少把 2 个付费试点转成年约，或拿下一份 sponsor 级 cohort 套餐
  - 在台湾与 Boston 两地建立 2 个可复用的转介绍或渠道伙伴
  - 明确决定主要销售动作究竟押创始人直签，还是 sponsor 打包采购
- horizon: 12–24 个月
  items:
  - 在台湾及周边 APAC 的 Boston 进入项目里，做到 6–8 个正式上线客户
  - 上线 cohort 管理后台、VDR / CRM 集成和可复用的基准报表
  - 在第二条走廊验证至少 2 个付费试点，而且大部分沿用同一套上线模板
  - 沉淀内部基准逻辑，把证据缺口、对手方类型和推进结果连起来
- horizon: 24–36 个月
  items:
  - 做到第 3 年 SOM 假设：约 12 个正式上线客户，或等价的 sponsor 管理项目
  - 把产品扩到第二条 APAC 或 Europe-to-U.S. 走廊，并支持组合层面的多资产工作流
  - 证明至少有一条扩张路径能实质性超过最初的台湾 × Boston 小众市场
  - 决定公司该按 venture 式扩张继续做，还是转成更窄但现金效率高的工作流业务
risks:
- risk: 台湾到 Boston 的滩头市场太小，在证明第二走廊前撑不起有意义的 ARR。
  likelihood: High
  impact: High
  mitigation: 前 12–18 个月优先验证 sponsor 分发和一条相邻走廊，不要对着初始小市场过度扩招。
- risk: 科学上线和材料定制最终表现得更像顾问服务，而不是可复用软件。
  likelihood: Medium
  impact: High
  mitigation: 在复用指标跑出来前，把范围死死锁在一个资产、三类对手方模板和固定上线交付物上。
- risk: 创始人拒绝把机密的科学、IP 和监管材料上传到第三方系统。
  likelihood: Medium
  impact: High
  mitigation: 先把细粒度权限、审计日志、导出控制和“比邮件更安全”的定位做足，并避免过早要求外部对手方登录。
- risk: 在疲弱的生物医药融资环境里，预算归属始终不清，直接软件采购变慢。
  likelihood: Medium
  impact: High
  mitigation: 前 90 天就把创始人直付、sponsor 补贴和伙伴协助采购三条路径一起测试，然后只保留成交最快的销售动作。
- risk: 真正的瓶颈是资产质量或合作方匹配，而不是工作流编排，因此产品无法实质性改善结果。
  likelihood: Medium
  impact: High
  mitigation: 试点只跑在真实推进项目上，先建立可测的基线；如果响应时间或下一步转化没有快速改善，就直接砍掉假设。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 一笔 18 个月的 pre-seed 资金将覆盖创始产品与实施团队、2–3 个付费推进项目试点、安全权限与审计能力、向外连接 VDR / CRM 的集成，以及在更广走廊扩张前，硬性验证“创始人直签”还是“sponsor 出资”才是可规模化分发路径。
