  fiveForces:
    supplierPower:
      score: 3
      rationale: 创业公司依赖机构渠道拥有者和相邻系统——VDR、CRM、合作方数据库以及高校/医院流程——因此接入权重要，但没有任何单一供应方能完全掐住这条切口。
      sourceRefs:
      - 14
      - 15
      - 16
      - 25
      - 29
      - 35
    buyerPower:
      score: 4
      rationale: 买家池集中，而且在低频推进项目里，他们完全可以把新工具和顾问、CRM、VDR，甚至创始人亲自硬扛做横向比较。
      sourceRefs:
      - 4
      - 5
      - 21
      - 23
      - 36
    threatOfEntrants:
      score: 3
      rationale: AI 摘要和工作流软件都很普及，但生物医药专用模板、信任和转化数据仍让这门生意不止是做个原型那么简单。
      sourceRefs:
      - 25
      - 27
      - 29
      - 40
    threatOfSubstitutes:
      score: 5
      rationale: 通用数据室、关系型 CRM、会议平台和顾问主导流程，对很多团队来说已经把大部分事情做到了“够用”。
      sourceRefs:
      - 17
      - 25
      - 26
      - 34
      - 35
      - 37
    competitiveRivalry:
      score: 4
      rationale: 虽然还没有现有厂商明确占住跨境资产就绪，但竞争依然激烈，因为相邻厂商和顾问都盯着同一笔合作预算。
      sourceRefs:
      - 29
      - 31
      - 34
      - 35
      - 36
      - 37
  pestle:
  - factor: political
    impact: positive
    point: 台湾和 Massachusetts 继续把生命科学支持与跨境创业项目制度化，让这套工作流更清晰，也更容易拿到 sponsor 预算。
    sourceRefs:
    - 1
    - 3
    - 10
  - factor: economic
    impact: negative
    point: 融资依然偏紧，合作经济更后置，所以买家即便痛感上升，也会更谨慎。
    sourceRefs:
    - 7
    - 21
    - 23
  - factor: social
    impact: positive
    point: 生物医药合作天生靠 网络 驱动，BIO、MassBio 和 LabCentral 这类生态会反复制造出让准备度工具扩散的时点。
    sourceRefs:
    - 11
    - 13
    - 17
  - factor: technological
    impact: positive
    point: VDR、CRM、合作数据库和安全协作工具都够成熟，新编排层可以直接搭在这些成熟积木上。
    sourceRefs:
    - 25
    - 29
    - 31
    - 35
    - 36
  - factor: legal
    impact: negative
    point: IND、Q-Sub、授权、赞助研究 和 GCP 要求都摆在那里；材料包粗糙、审计链薄弱，代价会很高。
    sourceRefs:
    - 14
    - 15
    - 16
    - 38
    - 39
    - 40
  - factor: environmental
    impact: neutral
    point: Massachusetts 的实验室和 GMP 基础设施很充足，但物理空间并不是推动这条软件切口购买的直接原因。
    sourceRefs:
    - 7
    - 9
  adoptionFrictionMatrix:
  - friction: 创始人可能不愿把未公开的科学、IP 和监管材料上传到第三方系统。
    severity: high
    affectedBuyer: CEO 或 BD 负责人
    mitigation: 用按合作方区分的权限、可导出的材料视图和活动日志起步；先叠加在现有 VDR 之上，不要一上来就逼客户整体迁移。
    sourceRefs:
    - 16
    - 25
    - 26
    - 36
  - friction: 把一个资产同时改写给授权、临床和研究类对手方，既耗人也很容易做过头。
    severity: high
    affectedBuyer: BD 负责人
    mitigation: 先只服务一个资产，以及三类 Boston 模板——药企 BD、技术转移和医院合作方——跑通后再扩。
    sourceRefs:
    - 1
    - 14
    - 15
    - 27
    - 29
  - friction: 这个问题很容易被客户理解成一单服务项目，而不是产品采购。
    severity: medium
    affectedBuyer: CEO
    mitigation: 围绕真实推进项目打包，明确材料包数量和周期目标，让这笔钱更像工作流加速器，而不是开放式顾问费。
    sourceRefs:
    - 13
    - 17
    - 28
    - 36
  - friction: 美国对手方可能更愿意收邮件附件和 VDR 链接，而不是进新的共享工作区。
    severity: medium
    affectedBuyer: BD 负责人
    mitigation: 直接生成可导出的 PDF、尽调摘要和 VDR 链接，让合作方不用改自己的工具也能参与。
    sourceRefs:
    - 25
    - 26
    - 34
    - 37
