reportMemo:
  executiveTakeaways:
  - 真正的产品缺口在会议之后到签下下一步之前：现有工具要么帮你约会，要么帮你存文件，却不能把一个海外资产变成面向不同合作方的尽调工作流。
  - Boston 仍是最合适的首个美国落点。即便融资周期承压，这里依然集中了生物医药基础设施、合作方密度和机构协作界面。
  - 台湾到 Boston 这条切口真实存在，但也很窄；它足以撑起第一版产品，却不足以单独撑起风投级规模，必须扩到更多 APAC 和 Europe-to-U.S. 合作走廊。
  - 买家痛感在上升，因为交易经济更后置、尽调标准更高；会后执行一旦拉胯，价值就会被吃掉。
  - 现有厂商占着相邻层——会议平台、VDR、CRM、交易数据库和顾问服务——但抓取到的产品里，没有谁真正把跨境资产就绪从头到尾吃透。
  marketDefinition: 围绕单个生物医药资产的推进型软件：把它改写成面向不同合作方的授权、临床和研究尽调包，并持续跟进到签下明确下一步。
  customerAndBuyer: 日常用户是 CEO 或 BD 负责人：手里只有一个资产，第一次做美国合作推进项目，美国本地 BD 团队又不够深。经济买家通常也是 CEO 或 BD 负责人，因为这笔钱同时牵动融资、合作、法务和监管；律师、顾问和孵化器项目经理很重要，但很难天然成为默认系统记录层。
  buyingTriggers:
  - point: 一趟 Startup Island、BIO 或 MassBio 风格的行程，会一下子拉出很多跟进对话；每一场都要不同的合作故事、对手方材料包和尽调路径。
    sourceRefs:
    - 1
    - 2
    - 13
    - 17
  - point: 预付款下滑、更多交易价值后移到 milestone 后，创业公司要在把谈判筹码交出去前先把证据包扎紧。
    sourceRefs:
    - 21
    - 23
    - 27
    - 28
  - point: 机构合作方和授权办公室都要结构化协议和证据，通用 CRM 备注加临时文件夹已经不够用。
    sourceRefs:
    - 14
    - 15
    - 16
    - 38
    - 39
  willingnessToPay:
    summary: 预算相邻性是可信的，因为今天的替代栈里本来就有付费 VDR、五位数的 交易情报 预算和 CRM 档位；真正缺的是把它们串起来的编排层。问题在于支出低频，所以产品更可能先以单次推进项目加速器的方式落地，而不是一上来就做大平台改造。
    sourceRefs:
    - 25
    - 33
    - 34
    - 36
  competitiveLandscape: 竞争格局不是没人做，而是碎片化。会议撮合平台、VDR、关系型 CRM、交易情报工具和顾问服务，各自解决一段流程。真正的空白，是那一层跨境资产就绪系统：科学资料打包一次，按 Boston 不同对手方改写，并把会后尽调一直推下去。
  incumbentThesis:
  - incumbentClass: 合作网络与活动平台
    point: BIO Partnering、Inpart Connect 和 Biotechgate 擅长发现和排会，但不会在会后变成分角色材料包、证据缺口或多方尽调的系统记录层。
    sourceRefs:
    - 17
    - 30
    - 37
  - incumbentClass: 虚拟数据室
    point: ShareVault 和 Ansarada 能把文档、权限和活动追踪管得很稳，但到不了合作方匹配打分，也没有跨机构工作流逻辑。
    sourceRefs:
    - 25
    - 26
    - 36
  - incumbentClass: 关系型 CRM
    point: Affinity 擅长抓互动、交易流 和 关系网络情报，但它的核心对象是关系图谱，而不是带监管和临床就绪状态的生物医药资产。
    sourceRefs:
    - 34
    - 35
  - incumbentClass: 交易情报数据库
    point: DealForma 一类工具能帮团队对比条款、研究合作方，却不会整理第一方科学材料、IP、监管资料或实时跟进任务。
    sourceRefs:
    - 31
    - 32
    - 33
  - incumbentClass: 精品顾问与咨询机构
    point: 顾问能补知识缺口、也能帮做搜索，但抓取到的材料显示，这类服务依然重人力、低频且不可复用，还称不上基础设施。
    sourceRefs:
    - 27
    - 28
  regulatoryLandscape: 产品应该贴着受监管流程跑，而不是假装替代它们。药物资产要有 IND 级证据，器械团队常靠 Q-Sub 和 early feasibility 的反馈回路推进，医院和大学则通过正式的授权与 赞助研究 流程管理产业合作。因此，权限、审计能力和可导出的材料包，比自治式 AI 行为重要得多。
  technologyLandscape: 底层积木其实都在：合作数据库、VDR、关系型 CRM 和安全协作产品。缺的不是基础技术，而是那套 结构化模板：把科学、IP、临床状态和合作诉求映射成可复用、可按对手方改写、且不会在第一次出差后就失效的工作区。
  distributionChannels:
  - point: 最上游分发应该从台湾到美国的 cohort 项目切入，例如 Startup Island 和 BIO Boston 馆，因为这些通道已经把可出海的生物医药团队围在真实推进项目周围。
    sourceRefs:
    - 1
    - 2
    - 3
  - point: MassBio Pharma Days、BIO Partnering 和 LabCentral 这类创始人生态，是很自然的美国侧渠道，因为它们本来就在聚合产品要服务的 BD 和机构界面。
    sourceRefs:
    - 11
    - 13
    - 17
  - point: 技术转移办公室、医院产业关系团队和专业 BD 顾问的转介绍应该很重要，因为产品同时碰到授权、赞助研究 和尽调运营。
    sourceRefs:
    - 14
    - 15
    - 16
    - 28
  partnershipEcosystem:
  - point: 台湾政府支持的创业和生物医药项目是很有价值的上游伙伴，因为它们可以把软件打包进出海 cohort 的准备环节，而不是让创始人冷启动买单。
    sourceRefs:
    - 1
    - 2
    - 3
    - 4
  - point: LabCentral、MIT、Harvard、Mass General 和 MassBio 这样的 Boston 机构，构成了产品必须映射和模板化的下游生态。
    sourceRefs:
    - 11
    - 12
    - 13
    - 14
    - 15
    - 16
  - point: 如果产品能把材料包、活动数据和合作方背景导出进相邻系统，VDR、CRM 和 交易情报 厂商反而可能成为集成伙伴，而不只是正面竞争对手。
    sourceRefs:
    - 25
    - 29
    - 31
    - 35
    - 36
  dataMoats:
  - point: 最强的潜在护城河，是把资产类型、证据缺口、对手方类别和下一步结果连起来的转化数据集，而且它来自一轮轮反复出现的 Boston 进入项目。
    sourceRefs:
    - 1
    - 13
    - 17
    - 29
  - point: 尽调工作流里的权限、活动和响应数据，会教会系统：哪些文档缺口或合作方问题最容易把项目卡死。
    sourceRefs:
    - 25
    - 26
    - 36
  - point: 把外部 deal comp 和内部推进结果拼在一起，目标选择和合作诉求模板就能做得比通用 CRM 或 VDR 更准。
    sourceRefs:
    - 31
    - 32
    - 33
  geographicConsiderations:
  - point: 台湾本身有真实体量，也有官方政策支持，但眼下真正可触达的创始人 cohort，仍只是更大生物医药底盘里的狭窄一段。
    sourceRefs:
    - 4
    - 5
    - 6
  - point: Boston 仍是最合适的第一个美国节点：尽管行业周期下行，Massachusetts 依然聚集了密集的 生物医药 就业、管线、实验室、孵化器和合作活动。
    sourceRefs:
    - 7
    - 8
    - 9
    - 10
    - 11
  - point: 这条走廊适合作为验证场，但公司必须尽快把打法泛化到更多 APAC、最终再扩到 Europe-to-U.S. 生物医药进入动作，才能摆脱小众引力。
    sourceRefs:
    - 1
    - 2
    - 3
    - 7
  sensitivityCases:
  - case: 真正每年面向 Boston 的 cohort，实际规模比 BIO 展馆代理值小得多。
    impact: 如果台湾里真正会买工作流软件的 Boston 客户只占很小一部分，Boston 单点 SAM 会很快被压缩，扩张时点就会变得极其关键。
    sourceRefs:
    - 2
    - 4
    - 5
  - case: 买家继续用 VDR + CRM + 顾问打包方案。
    impact: 如果创始人把问题理解成一单服务项目，而不是系统记录层，软件就只能先作为推进项目叠加层落地，先证明尽调提速，再谈替换任何旧工具。
    sourceRefs:
    - 25
    - 28
    - 34
    - 36
  - case: 生物医药融资继续偏紧，BD 支出更像可选项。
    impact: 如果融资低迷拖得更久、交易条款更苛刻，哪怕痛感继续上升，新工具采用也会变慢，产品就更可能走 sponsor 出资或加速器打包分发。
    sourceRefs:
    - 7
    - 21
    - 23
  - case: 亚洲对外授权需求继续向 China 这类更大市场倾斜。
    impact: 如果美国药企 BD 团队越来越从更大的亚洲生态里找资产，只守台湾定位就会失去紧迫性，除非产品尽快放大地理范围。
    sourceRefs:
    - 19
    - 22
  validationPlan:
  - priority: high
    question: 一场台湾到 Boston 的单资产推进项目，在 60 天内到底会生成多少种按合作方定制的材料包和文档请求？
    evidenceToGather: 从 8–10 位近期参加代表团或 BIO 的团队手里拿到导出的邮件线程、VDR 请求日志和顾问清单。
  - priority: high
    question: 第一笔预算到底从哪里出：CEO / BD 运营预算、顾问费用，还是 cohort sponsor 补贴？
    evidenceToGather: 访谈 10 位创始人，复盘赢单/丢单，再核对他们当前的 VDR、顾问和 CRM 发票。
  - priority: medium
    question: 美国对手方愿不愿意进共享的 准备度 工作区，还是只接受导出的材料包和数据室链接？
    evidenceToGather: 拿 3–5 个 Boston 对手方做试点，覆盖药企 BD、医院研究和技术转移团队。
  - priority: medium
    question: 这套工作流在 Korea、Singapore、Japan 或 Europe-to-U.S. 项目里，究竟有多少部分能原样复用？
    evidenceToGather: 与其他 入美 走廊运营方和外国生物医药代表团做发现式访谈。
