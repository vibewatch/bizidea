categoryDynamics:
  growthRate: 2024 年全球授权交易量同比 +2.1%（692 笔 vs 678 笔）；2025 年授权交易总额约 $230B，创历史新高。
  growthRateSourceRefs:
  - 19
  - 32
  tailwinds:
  - point: 台湾到美国的出海项目正在从临时出差，变成按 cohort 组织的市场进入动作。
    sourceRefs:
    - 1
    - 2
    - 3
  - point: 全球授权交易量和总价值都维持高位，对小型生物医药公司来说，对外合作仍是耐用的战略路径。
    sourceRefs:
    - 19
    - 20
    - 22
    - 32
  - point: Boston 依然提供足够密的基础设施和重复互动场景，适合做首个美国推进项目。
    sourceRefs:
    - 7
    - 8
    - 10
    - 11
    - 13
  headwinds:
  - point: 预付款在总交易价值中的占比下降，对手方因此能在签约前要求更多尽调。
    sourceRefs:
    - 21
  - point: 早期生物医药公司的融资和决策周期依然艰难，软件采购会被拖慢。
    sourceRefs:
    - 23
    - 24
  - point: 滩头市场很窄，替代栈又强，很多创始人可能继续手工把多种工具拼在一起。
    sourceRefs:
    - 25
    - 28
    - 34
    - 37
competitors:
- name: Inpart
  stage: scale-up
  wedge: 覆盖发现、评估和 联盟管理工作流的生命科学合作平台。
  pricing: 定制定价；未公开标价。
  strength: 生命科学专用合作流程，客户基础广，药企 端信誉成熟。
  weaknessVsUs: 更偏广义 R&D 合作，不是把一个海外资产改写成首个美国进入动作里按对手方定制的准备材料。
  sourceRefs:
  - 29
  - 30
- name: ShareVault
  stage: incumbent
  wedge: 面向融资和生物医药合作尽调的生命科学 VDR。
  pricing: 定制定价；未公布公开价。
  strength: 细粒度权限、页级活动监控和对审计友好的文档分享。
  weaknessVsUs: 止步于安全文档控制，不会给合作方匹配打分，也不编排跨对手方的下一步。
  sourceRefs:
  - 25
  - 26
- name: Affinity
  stage: incumbent
  wedge: 面向 交易流 和 关系网络可见性 的关系 情报型 CRM。
  pricing: Essential、Scale 和 Enterprise 三档定制定价。
  strength: 自动抓取互动记录，团队内 关系网络可见性 很强。
  weaknessVsUs: 核心对象是通用关系和管线，不是带科学、监管和临床就绪状态的生物医药资产。
  sourceRefs:
  - 34
  - 35
- name: DealForma
  stage: scale-up
  wedge: 生物医药交易情报与可比交易数据库。
  pricing: 定制订阅；公开对比页显示相邻工具预算大约在 $18k-$40k。
  strength: 有整理好的可比交易、合作方画像和条款基准，适合 BD 团队。
  weaknessVsUs: 不管理第一方科学材料、IP、监管材料包，也不跟 实时 尽调任务流。
  sourceRefs:
  - 31
  - 32
  - 33
- name: Biotechgate Digital Partnering
  stage: scale-up
  wedge: 面向创业公司、找授权方和会议配对的生物医药专用会面平台。
  pricing: 基础档含 5 场免费会议；高级权限可解锁更高会面量。
  strength: 生物医药原生的发现与排会体验，对创业公司友好。
  weaknessVsUs: 工作流基本在会前和会中结束，不占住会后尽调执行。
  sourceRefs:
  - 17
  - 37
regulatoryTechnicalConstraints:
- point: 药物项目在把研究性产品送进美国临床研究前，必须先准备到 IND 级别的证据包。
  sourceRefs:
  - 38
  - 40
- point: 医疗器械团队常在正式研究或申报前先走 Q-Sub 和 early feasibility 互动，所以材料质量必须经得起反复的 FDA 反馈。
  sourceRefs:
  - 39
- point: 大学和医院体系都用正式的授权或 赞助研究 结构来管理产业合作，互动非常谨慎。
  sourceRefs:
  - 14
  - 15
  - 16
- point: 对机密合作材料来说，分阶段权限、活动日志和可控的文档访问已经是入场券。
  sourceRefs:
  - 25
  - 26
  - 36
validationSignals:
- point: 2026 年 7 月的 Startup Island Taiwan 代表团明确通过一对一会面，在 Boston 推进授权、临床开发、联合研究和市场准入。
  sourceRefs:
  - 1
- point: 台湾在 BIO Boston 2025 带去 35 家公司，而 BIO 2024 一共撮合了 61,508 场商务配对会议。
  sourceRefs:
  - 2
- point: LabCentral 的 resident 和 alumni 生态持续产出公司、融资、岗位和临床试验，说明 Boston 的创业公司密度会持续存在。
  sourceRefs:
  - 11
  - 12
- point: 生命科学里，专用合作软件已经是真实预算科目：BIO Partnering 已运营 25 年以上，Inpart 也声称服务 500+ 客户。
  sourceRefs:
  - 17
  - 29
openQuestions:
- 台湾创始人里，究竟有多少人会直接付费，而不是依赖项目 sponsor、顾问或律所来承担这套工作流？
- 在创始人愿意上传未公开的科学、IP 和临床材料前，系统最少需要哪些安全分享和审计能力？
- Boston 的对手方到底更想要实时共享工作区，还是导出的材料包和标准 VDR 链接？
- 产品在不丢掉具体性的前提下，能多快从台湾扩到其他 入美 生物医药走廊？
