openQuestions:
- How many Taiwan founders will pay directly versus relying on program sponsors, consultants, or law firms to fund the workflow?
- What minimum secure-sharing and audit features are required before founders will upload unpublished science, IP, and clinical materials?
- How often do Boston counterparties want a live shared workspace versus exported packets and standard VDR links?
- How quickly can the product generalize beyond Taiwan to other inbound biotech corridors without losing specificity?
