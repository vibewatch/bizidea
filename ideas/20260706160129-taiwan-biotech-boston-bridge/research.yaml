  adoptionFrictionMatrix:
  - friction: Founders may hesitate to upload unpublished science, IP, and regulatory materials into a third-party system.
    severity: high
    affectedBuyer: CEO or Head of BD
    mitigation: Use partner-specific permissions, exported packet views, and activity logs; start as an overlay to existing VDRs instead of forcing full migration.
    sourceRefs:
    - 16
    - 25
    - 26
    - 36
  - friction: Normalizing one asset across licensing, clinical, and research counterparties is labor-intensive and easy to overbuild.
    severity: high
    affectedBuyer: Head of BD
    mitigation: Start with one asset and a narrow set of Boston counterparty templates—pharma BD, tech transfer, and hospital collaborator—before expanding.
    sourceRefs:
    - 1
    - 14
    - 15
    - 27
    - 29
  - friction: The problem can get framed as a services engagement instead of a product purchase.
    severity: medium
    affectedBuyer: CEO
    mitigation: Package around live campaigns with explicit packet counts and cycle-time goals so the spend feels like workflow acceleration, not open-ended consulting.
    sourceRefs:
    - 13
    - 17
    - 28
    - 36
  - friction: U.S. counterparties may prefer email attachments and VDR links over a new shared workspace.
    severity: medium
    affectedBuyer: Head of BD
    mitigation: Generate exportable PDFs, diligence summaries, and VDR links so partners do not need to change their own tooling to participate.
    sourceRefs:
    - 25
    - 26
    - 34
