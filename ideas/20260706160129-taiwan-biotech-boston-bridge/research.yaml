competitors:
- name: Inpart
  stage: scale-up
  wedge: Life-science partnering platform spanning discovery, evaluation, and alliance workflows.
  pricing: Custom pricing; not publicly posted.
  strength: Life-science-specific partnering workflow with a broad client base and established pharma credibility.
  weaknessVsUs: Centered on broad R&D partnering, not turning one foreign asset into counterparty-specific readiness packets for a first U.S. entry motion.
  sourceRefs:
  - 29
  - 30
- name: ShareVault
  stage: incumbent
  wedge: Life-sciences virtual data room for fundraising and biopharma partnering diligence.
  pricing: Custom pricing; public list pricing not posted.
  strength: Granular permissions, page-level activity monitoring, and audit-friendly document sharing.
  weaknessVsUs: Stops at secure document control; it does not score partner fit or orchestrate cross-counterparty next steps.
  sourceRefs:
  - 25
  - 26
- name: Affinity
  stage: incumbent
  wedge: Relationship-intelligence CRM for deal flow and network visibility.
  pricing: Custom pricing across Essential, Scale, and Enterprise tiers.
  strength: Automatic activity capture and strong network visibility across teams.
  weaknessVsUs: Generic relationship and pipeline object, not a biotech asset with science, regulatory, and clinical readiness state.
  sourceRefs:
  - 34
  - 35
- name: DealForma
  stage: scale-up
  wedge: Biopharma deal-intelligence and comparable-transactions database.
  pricing: Custom subscription; public comparison pages anchor adjacent budget around roughly $18k-$40k for comparable tools.
  strength: Curated comps, partner profiles, and deal benchmarking for BD teams.
  weaknessVsUs: Does not manage first-party science, IP, regulatory packets, or live diligence task flow.
  sourceRefs:
  - 31
  - 32
  - 33
- name: Biotechgate Digital Partnering
  stage: scale-up
  wedge: Biotech-specific meeting platform for startups, license-seekers, and conference partnering.
  pricing: Basic tier includes 5 free meetings; premium access unlocks more volume.
  strength: Biotech-native discovery and meeting scheduling with startup-friendly access.
  weaknessVsUs: Workflow ends around the meeting rather than owning post-meeting diligence execution.
  sourceRefs:
  - 17
  - 37
