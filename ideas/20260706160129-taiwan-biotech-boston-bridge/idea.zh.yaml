problem: 台湾生物医药创始人去 Boston 不难约到会，但很难把会面转成合作。每个美国对手方要的东西都不一样：科学摘要、IP 背景、监管状态、临床计划、合作诉求，组合各不相同。创始人、加速器、顾问和律师只好围着幻灯片、共享盘和邮件线程，一次次重做材料，对应每一场授权、临床或联合研究沟通。行程结束后，后续跟进又裂成几十条尽调请求，却没有一套系统把资产证据、伙伴匹配度和下一步动作串起来。结果就是会很多，签得慢；没有美国本地 BD 和临床合作团队的小公司尤其吃亏。
targetUser:
  primary: 10–50 人的台湾生物医药创业公司 CEO 或 BD 负责人，正把首个治疗、诊断或医疗器械资产带进美国授权或临床合作谈判。
  secondary: 为亚洲生物科技创业公司批量跟进合作方的出口加速器或孵化器项目经理。
  buyer: CEO 或 BD 负责人
startupThesis:
  nonObviousInsight: 真正变得值钱的公司，不会是另一家生物医药 BD 顾问或资产撮合公司，而是把一个海外生物医药资产打磨成“美国合作方可读对象”的那套系统：授权团队、临床合作方和研究机构都能直接评估，不用每次都逼创始人重讲一遍。随着 Startup Island TAIWAN 这样的机构把出海项目做成标准化计划，瓶颈已经从“约到会”转向“交易准备和会后推进”。
  beachhead: 10–50 人的台湾生物医药创业公司，手里有一个核心治疗、诊断或医疗器械资产，通过代表团或孵化器主导的美国扩张项目进入 Boston，但没有完整的美国 BD 团队。
  wedge: 一套生物医药合作工作台：吃进单个资产的科学、IP、监管和临床材料，再按目标机构或合作方生成分角色的授权/临床合作材料包、匹配分数和尽调追踪器。
  whyNowCatalyst: Startup Island TAIWAN 的 Boston 计划说明，台湾已有多家生物医药公司正通过同一批美国节点，同时推进授权、临床开发、联合研究和市场准入，合作就绪因此从“最好有”变成了迫切且能单列预算的工作流。
  ventureScalePath: 先从台湾到 Boston 的项目起步，再扩到进入美国的 APAC 和欧洲生物医药公司，最后长成跨境生物医药资产合作、试验站点组建和机构到创业公司交易执行的系统记录层。
solution: 产品卖的是一套跨境生物医药交易系统。客户把核心资产的作用机制、临床前/临床证据、IP 状态、生产约束和想要的合作类型上传一次，平台就把它翻成面向药企 BD 团队、医院、孵化器和高校实验室的定制材料包。系统会判断哪些对手方更适合做授权、联合研究或临床开发，并标出最可能卡住每条路径的证据缺口。会后，它继续跑尽调清单、文档请求和里程碑追踪，把创始人、顾问、律师和美国合作方都拉进同一节奏，让团队知道哪些对话真的在往前走。第一版产品不是通用 CRM，也不是通用数据室；它是把海外资产翻译给美国对手方看的生物医药专用中间层。时间一长，公司会沉淀一套专有转化数据：什么样的资产画像、证据包和机构类型，最容易把介绍会变成已签合作。
goToMarketSeed:
  firstCustomer: 15–40 人的台湾生物医药创业公司，手里有一个核心资产，刚通过代表团或孵化器项目拿到 8–20 场 Boston 会后跟进会议，但没有全职美国 BD 负责人。
  buyingTrigger: 公司拿到美国市场进入项目或 Boston 行程后，发现每个目标合作方要的尽调包、合作诉求和跟进节奏都不一样。
  currentAlternative: 靠 Google Drive 或 Notion 数据室、通用 CRM、精品生物医药 BD 顾问，以及与律师、孵化器经理的邮件协同硬拼。
  switchingReason: 这套平台只需把资产打包一次，就能把会面变成结构化尽调管线，并明确指出每条授权或临床合作路径究竟卡在哪些证据缺口上。
  pricingHypothesis: 按活跃资产和目标市场推进项目收年订阅费，另收资产结构化模板搭建和专家尽调模板的上线费。
