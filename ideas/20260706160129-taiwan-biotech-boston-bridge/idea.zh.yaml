topRisks:
- name: 初始市场过窄
  description: 只做台湾到 Boston 的代表团工作流，起步阶段可能撑不起足够强的独立 ARR。
  mitigation: 先覆盖台湾和更广的 APAC 项目，再用同一套核心产品扩到欧洲生物医药公司进入美国以及药企合作项目。
- name: 服务拖拽
  description: 客户可能更想买定制化 BD 顾问，而不是为低频合作工作流买软件。
  mitigation: 把一套可复用的资产就绪与尽调流程做成产品，把介绍会交给顾问，软件则按活跃推进项目定价，牢牢挂在真实交易上。
- name: 信任与保密
  description: 创始人可能不愿把未公开的科学、IP 和监管材料上传到第三方平台。
  mitigation: 提供细粒度权限、私有工作区、审计日志和由客户控制的文档分享，让产品比邮件和临时共享盘更安全。
