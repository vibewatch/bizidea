jobsToBeDone:
- job: 当创业公司拿到 Boston 机构和合作方会面时，帮 CEO 或 BD 负责人把一个资产打包成适配每个对手方的尽调材料和下一步动作，好把介绍会推进成已签的授权、临床或研究跟进。
  currentAlternative: 临时拼的幻灯片、共享盘和顾问主导的后续跟进
  successMetric: 60 天内，进入正式尽调或签下下一步协议的会议占比
- job: 当多个美国对手方问的问题部分重叠却又不完全一样时，帮创业公司把证据、文档请求和负责人对齐，不用每次都重搭一遍故事，也能更快回应。
  currentAlternative: 通用 CRM，加上邮件和由律所维护的文档清单
  successMetric: 关闭一项合作方尽调请求的中位时间，以及每个推进项目里重复重建文档的次数
