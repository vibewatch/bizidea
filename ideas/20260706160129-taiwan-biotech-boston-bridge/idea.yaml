topRisks:
  - name: Niche initial market
    description: Taiwan-to-Boston delegation workflows alone may be too narrow to support strong standalone ARR at the start.
    mitigation: Start with Taiwanese and broader APAC programs, then expand into European biotech-to-U.S. market-entry and pharma-partnering campaigns using the same core product.
  - name: Services gravity
    description: Customers may expect bespoke BD consulting instead of buying software for an episodic partnership workflow.
    mitigation: Productize one repeatable asset-readiness and diligence workflow, partner with consultants for introductions, and price on active campaigns so software attaches to live deals.
  - name: Trust and confidentiality
    description: Founders may hesitate to upload unpublished scientific, IP, and regulatory materials into a third-party platform.
    mitigation: Offer granular permissions, private workspaces, audit logs, and customer-controlled document sharing so the product feels safer than email and ad hoc drives.
