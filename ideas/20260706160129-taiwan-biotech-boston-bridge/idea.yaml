jobsToBeDone:
  - job: >-
      When a startup wins meetings with Boston institutions and partners, help
      the CEO or BD lead package one asset into the right diligence materials
      and next steps for each counterparty, so they can convert introductions
      into signed licensing, clinical, or research follow-ups.
    currentAlternative: ad hoc slide decks, shared drives, and consultant-led follow-up
    successMetric: percentage of meetings that move to formal diligence or signed next-step agreements within 60 days
  - job: >-
      When several U.S. counterparties ask overlapping but different questions,
      help the startup keep evidence, document requests, and owners aligned, so
      they can respond faster without rebuilding the story each time.
    currentAlternative: generic CRM plus email and law-firm-managed document lists
    successMetric: median time to close a partner diligence request and number of duplicate document rebuilds per campaign
