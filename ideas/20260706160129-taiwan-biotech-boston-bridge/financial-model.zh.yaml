modelDiagram:
  title: 单位经济循环
  mermaid: |
    flowchart LR
      WarmLeads --> PaidPilots
      PaidPilots --> AnnualContracts
      AnnualContracts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准收入引擎来自两笔早期试点转年约，此后每个季度大致净增 1 个付费资产推进项目，到 Y3 末的 ARR 达到研究锚定的约 $1.2M SOM run-rate。
- checkName: 必须成立的条件
  finding: 这笔融资只有在上线足够模板化、公司能把全职编制压在 5 FTE 直到 Y3、同时毛利率往 70% 爬时才成立。
- checkName: 模型失效条件
  finding: 下行情景和敏感性表都显示，只要销售周期拉长或上线重新变重服务，Y3 末现金就会被压向约 $0.2M，而 seed 级证明还没完全攒够。
- checkName: 下一轮证明
  finding: 到第 24 个月做到 8 个正式客户并拿下 2 个付费第二走廊试点，就是支撑 seed 轮扩走廊的证据包。
sanityChecks:
  ruleOf40: Y3 增速 95.2% + EBITDA 利润率 -34.7% = 60.4%
  burnMultiple: 随着年末 ARR 从 $0.81M 升到 $1.25M，burn multiple 从 Y2 的 1.3x 改善到 Y3 的 0.8x。
  revenuePerFte: $205.5K 的 Y3 人均收入（对标垂直 SaaS 常见区间 $200-400K）
  flags:
  - 基准情景默认公司能在第 24 个月碰到 BP 里客户里程碑的上沿，但投资备忘录本身仍判断台湾 × Boston 切口偏窄。
  - A23 是真实风险：如果一名实施负责人在外包辅助下仍扛不住 12 个活跃推进项目，毛利率和现金都会很快恶化。
  - 研究没有解决预算归属不确定性；如果创始人直接预算比基准销售周期更难签，产品最后可能还是得靠 sponsor 出资动作落地。
