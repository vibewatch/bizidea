scenarios:
  downside:
    description: 试点转年约变慢、第二走廊扩张更晚、上线流程比计划更依赖人工。
    y3RevenueK: 853.1
    y3EbitdaK: -513.5
    cashLowPointK: 178.7
    keyAssumptionChanges:
    - 试点转年约更接近 40%，而不是 BP 目标的 50%+。
    - 第二走廊晚两个季度起量，所以 Y2 年末只有 7 个而不是 8 个活跃项目。
    - 由于模板复用弱于 A23 假设，毛利率停在 60% 多中段。
  base:
    description: 两笔早期付费试点转成年约，渠道伙伴在 Y2 带来一条第二走廊动作，公司到 Y3 末做到 12 个活跃推进项目，接近 SOM 的 run-rate。
    y3RevenueK: 1027.6
    y3EbitdaK: -356.9
    cashLowPointK: 381.7
    keyAssumptionChanges:
    - 试点转年约稳定在 BP 目标的 50%+ 附近。
    - 第二走廊从 Q3Y2 开始贡献需求，但不增加全职编制。
    - 随着模板复用改善，毛利率到 Y3 爬到商业计划书目标的 70%。
  upside:
    description: sponsor 渠道转化更快，Y2 后段多拿到一条 cohort 式动作，且无需增员就有一部分高级模块把 ARPU 往上抬。
    y3RevenueK: 1183.1
    y3EbitdaK: -245.0
    cashLowPointK: 554.0
    keyAssumptionChanges:
    - 试点转年约接近 60%，温热渠道的线索量也强于基准。
    - 到 Y2 末会多出一条 cohort 式动作。
    - 在团队仍维持 5 FTE 的前提下，毛利率会提前一个季度越过 70%。
sensitivity:
- variable: ARPU
