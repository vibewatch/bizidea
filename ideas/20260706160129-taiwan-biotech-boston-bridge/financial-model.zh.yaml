slug: biotech-partner-readiness-os
date: '2026-07-06'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: 月
  source: '[BP date 2026-07-06] 融资需求和实验路线图都从当月立刻启动，所以模型也从同月开始。'
- id: A2
  name: pre-seed 融资带来的期初现金
  value: '2000'
  unit: USD K
  source: '[BP fundingAsk.targetFundingRangeUsd $2-3M + runwayMonths 18] 模型取区间下限，因为计划明确要求不要在窄滩头市场上过度扩招，同时仍保留 6 个月缓冲。'
- id: A3
  name: 客户单位定义
  value: 活跃付费的资产推进项目
  unit: 单位
  source: '[BP businessModel.unitOfValue 在管的活跃资产与目标市场推进项目]。'
- id: A4
  name: 首笔付费试点与上线价值
  value: '40'
  unit: USD K / 每个资产推进项目
  source: '[BP investorMemo.firstCustomer.initialContract $25k-$50k 试点]；模型取中位数。'
- id: A5
  name: 稳态年订阅价值
  value: '100'
  unit: USD K / 资产推进项目-年
  source: '[BP investorMemo.firstCustomer.initialContract $75k-$125k 年订阅]；[Research market.som 12 customers at roughly $100k annual value]；模型取中位数。'
- id: A6
  name: 第 1 年月末付费客户数
  value: 0,0,0,1,1,2,2,2,2,2,3,3
  unit: 客户
  source: '[BP experimentRoadmap 90–180 天内做 2 个 深度陪跑式 试点，180–360 天内完成 2 次试点转年约]；第一年按创始人主导销售保守爬坡。'
- id: A7
  name: 第 2 年季度末付费客户数
  value: 4,5,7,8
  unit: 客户
  source: '[BP milestones 12–24 个月 里要求做到 6–8 个正式客户，并验证第二走廊的 2 个试点]；模型只在年末碰到区间上沿。'
- id: A8
  name: 第 3 年季度末付费客户数
  value: 9,10,11,12
  unit: 客户
  source: '[BP milestones 到 24–36 个月做到约 12 个正式客户]；[Research market.som 第 3 年可触达 12 个客户]。'
- id: A9
  name: 第 1 年混合月度 ARPU 轨迹
  value: M1-M12 = 0,0,0,18.0,15.0,14.0,11.0,10.0,9.0,8.5,11.0,8.7
  unit: USD K / 平均活跃客户月
  source: '[A4-A5]；前几个月以试点为主，随后收入逐步切向年订阅，并在新项目启动时带一点上线收入。'
- id: A10
  name: 第 2 年混合月度 ARPU 轨迹
  value: Q1-Q4 = 7.8,8.0,8.2,8.4
  unit: USD K / 平均活跃客户月
  source: '[A5]；[BP businessModel.revenueStreams 年订阅 + 上线费 + 高级模块]；ARPU 温和抬升，来自更多年约和少量上线费。'
- id: A11
  name: 第 3 年混合月度 ARPU 轨迹
  value: Q1-Q4 = 8.4,8.5,8.6,8.7
  unit: USD K / 平均活跃客户月
  source: '[A5]；[Research market.som roughly $100k annual value]；年末 run-rate 仍贴着 SOM 假设，不预设高价跳升。'
- id: A12
  name: 毛利率爬坡
  value: Y1 40-64%；Y2 64-68%；Y3 69-70%
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct 70]；[BP operatingAssumptions 可复用模板上线]；模板跑通前，早期试点天然更重服务。'
- id: A13
  name: 创始人含税现金薪酬
  value: '150'
  unit: USD K / 年
  source: '[BP team 创始人 / CEO 从 第 0 个月 开始]；pre-seed 阶段创始人以低于市场价的现金薪酬入模。'
- id: A14
  name: 工程师含税现金薪酬
  value: '180'
  unit: USD K / 工程师-年
  source: '[BP team 创始工程师 + 安全、材料生成和集成范围]；按精简早期技术团队的创业财务经验估算。'
- id: A15
  name: 生物医药实施负责人含税现金薪酬
  value: '130'
  unit: USD K / 实施-年
  source: '[BP team 生物医药实施负责人从 第 3 个月 开始]；按具备领域知识的实施角色估算。'
- id: A16
  name: 渠道合作 / GTM 负责人含税现金薪酬
  value: '140'
  unit: USD K / 渠道合作-年
  source: '[BP team 渠道合作负责人从 第 9 个月 开始]；按偏渠道型 BD 角色的创业财务经验估算。'
- id: A17
  name: 招聘顺序
  value: M0 创始人 / CEO 与 Eng1；M3 实施负责人；M9 渠道合作；M15 Eng2；Y3 证明点前不再增加全职编制
  unit: 招聘
  source: '[BP team.startTiming 第 0 / 第 3 / 第 9 个月]；[BP risk 滩头市场过小，缓解措施是不提前扩招]。'
- id: A18
  name: 非薪酬运营开支
  value: Y1 月度 16-22；Y2 季度 57-66；Y3 季度 69-78
  unit: USD K
  source: '[BP fundingAsk.useOfFundsSummary 安全权限、审计能力、VDR/CRM 集成、试点和渠道建设]；按创业财务经验覆盖工具、差旅、法务、保险和合规。'
- id: A19
  name: 按职能划分的 Opex 结构
  value: S&M 占比从约 20% 升到 Q4Y3 的约 35%；R&D 从约 55% 降到约 38%；G&A 基本维持在约 25-27%
  unit: 占 Opex 百分比
  source: '[BP strategicChoices 先产品化一条走廊，再在试点证明后放大渠道]。'
- id: A20
  name: 混合 CAC
  value: '65'
  unit: USD K / 每个正式客户
  source: 模型由 Y1-Y2 销售与营销支出约 $468K 除以到第 24 个月约 7 个转成正式客户的资产推进项目得出，符合创始人主导、渠道辅助的高客单价企业销售特征。
- id: A21
  name: 月度流失率
  value: '3.0'
  unit: 百分比
  source: 按高 ACV、与推进项目绑定的 B2B 合同做创业财务假设：一部分客户在一个资产周期后流失，另一部分会扩到第二个项目。
- id: A22
  name: 基准销售周期
  value: '4'
  unit: 从温热线索到付费试点的月数
  source: '[BP gtm.channels 加速器、出口项目和转介绍渠道]；[BP experimentRoadmap 在 90–180 天内启动试点]；模型假设主要靠温热引荐，而不是冷启动外呼。'
- id: A23
  name: 交付杠杆
  value: 1 名实施负责人加外部承包支持，到 Y3 最多可扛 12 个活跃推进项目
  unit: 服务能力
  source: '[BP operatingAssumptions 单资产上线能用可复用模板完成]；这是 Y3 只维持 5 名全职员工的关键效率假设。'
- id: A24
  name: 融资里程碑与安全垫
  value: 到第 24 个月做到 8 个正式客户、2 个付费第二走廊试点，并保留 6 个月现金缓冲
  unit: 里程碑
  source: '[BP milestones 12–24 个月]；[BP fundingAsk runwayMonths 18]；模型延长到 24 个月，避免公司刚跑到证明点就被迫立刻再融资。'
