modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      WarmLeads --> PaidPilots
      PaidPilots --> AnnualContracts
      AnnualContracts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base revenue comes from converting two early pilots, then adding roughly one net new paying asset-campaign per quarter until year-end Y3 ARR reaches the research-backed ~$1.2M SOM run-rate."
  - checkName: Must go right
    finding: "The funding ask only works if onboarding stays template-driven enough that the company can hold full-time headcount at 5 FTE through Y3 while gross margin rises toward 70%."
  - checkName: Model breaks if
    finding: "The downside and sensitivity tables show sales-cycle slippage or services-heavy onboarding pulling cash toward roughly $0.2M by Y3 end before seed-level proof is fully banked."
  - checkName: Next-round proof
    finding: "Reaching 8 production customers plus 2 paid second-corridor pilots by month 24 is the evidence package that justifies a seed round for corridor expansion."
sanityChecks:
  ruleOf40: "Y3 growth 95.2% + EBITDA margin -34.7% = 60.4%"
  burnMultiple: "Improves from 1.3x in Y2 to 0.8x in Y3 as year-end ARR rises from $0.81M to $1.25M."
  revenuePerFte: "$205.5K Y3 (benchmark $200-400K vertical SaaS)"
  flags:
    - "The base case depends on reaching the top end of the BP month-24 customer milestone even though the investor memo still calls the Taiwan-to-Boston wedge narrow."
    - "A23 is a real risk: if one implementation lead cannot support 12 active campaigns with reusable templates and contractor help, both gross margin and cash deteriorate quickly."
    - "Research leaves budget-owner uncertainty unresolved, so a sponsor-funded motion may still be required if direct founder budgets close more slowly than the base sales-cycle assumption."
