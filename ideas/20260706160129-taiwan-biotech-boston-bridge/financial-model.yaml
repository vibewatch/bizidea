slug: biotech-partner-readiness-os
date: "2026-07-06"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-07"
    unit: month
    source: "[BP date 2026-07-06]; model starts in the same month because the funding ask and experiment roadmap begin immediately."
  - id: A2
    name: Opening cash from pre-seed raise
    value: "2000"
    unit: USD K
    source: "[BP fundingAsk.targetFundingRangeUsd $2-3M and runwayMonths 18]; model uses the low end because the plan explicitly warns against over-hiring a narrow beachhead and still adds a 6-month buffer."
  - id: A3
    name: Customer unit definition
    value: "active paying asset-campaign"
    unit: unit
    source: "[BP businessModel.unitOfValue active asset and target-market campaign under management]."
  - id: A4
    name: Initial paid pilot and onboarding value
    value: "40"
    unit: USD K per asset-campaign
    source: "[BP investorMemo.firstCustomer.initialContract $25k-$50k pilot]; model uses the midpoint."
  - id: A5
    name: Steady-state annual subscription value
    value: "100"
    unit: USD K per asset-campaign-year
    source: "[BP investorMemo.firstCustomer.initialContract $75k-$125k annual subscription]; [Research market.som 12 customers at roughly $100k annual value]; model uses the midpoint."
  - id: A6
    name: Y1 end-of-month paying customers
    value: "0,0,0,1,1,2,2,2,2,2,3,3"
    unit: customers
    source: "[BP experimentRoadmap 2 concierge pilots in 90-180 days and 2 pilot-to-annual conversions in 180-360 days]; founder-led ramp stays conservative in the first year."
  - id: A7
    name: Y2 quarter-end paying customers
    value: "4,5,7,8"
    unit: customers
    source: "[BP milestones 6-8 production customers by months 12-24 and 2 paid pilots in a second corridor]; model reaches the top of that range only at year-end."
  - id: A8
    name: Y3 quarter-end paying customers
    value: "9,10,11,12"
    unit: customers
    source: "[BP milestones reach roughly 12 production customers by months 24-36]; [Research market.som 12 reachable customers at year 3]."
  - id: A9
    name: Y1 blended monthly ARPU schedule
    value: "M1-M12 = 0,0,0,18.0,15.0,14.0,11.0,10.0,9.0,8.5,11.0,8.7"
    unit: USD K per average active customer-month
    source: "[A4-A5]; early months are pilot-heavy, then revenue mixes toward annual subscriptions with a small onboarding bump when a new campaign starts."
  - id: A10
    name: Y2 blended monthly ARPU schedule
    value: "Q1-Q4 = 7.8,8.0,8.2,8.4"
    unit: USD K per average active customer-month
    source: "[A5]; [BP businessModel.revenueStreams annual subscription + onboarding + premium modules]; modest ARPU lift comes from more annual contracts and light onboarding fees."
  - id: A11
    name: Y3 blended monthly ARPU schedule
    value: "Q1-Q4 = 8.4,8.5,8.6,8.7"
    unit: USD K per average active customer-month
    source: "[A5]; [Research market.som roughly $100k annual value]; end-of-year run-rate stays near the SOM case rather than assuming a premium-price breakout."
  - id: A12
    name: Gross margin ramp
    value: "Y1 40-64%; Y2 64-68%; Y3 69-70%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 70]; [BP operatingAssumptions reusable onboarding]; startup-finance heuristic that pilots are more services-heavy before templates are proven."
  - id: A13
    name: Founder loaded cash compensation
    value: "150"
    unit: USD K per year
    source: "[BP team Founder/CEO start Month 0]; startup-finance heuristic for a below-market pre-seed founder salary."
  - id: A14
    name: Engineering loaded cash compensation
    value: "180"
    unit: USD K per engineer-year
    source: "[BP team founding eng plus security, packet-generation, and integration scope]; startup-finance heuristic for a lean early technical hire."
  - id: A15
    name: Biotech implementation loaded cash compensation
    value: "130"
    unit: USD K per implementation-year
    source: "[BP team biotech implementation lead start Month 3]; startup-finance heuristic for a domain implementation operator."
  - id: A16
    name: Partnerships and GTM loaded cash compensation
    value: "140"
    unit: USD K per partnerships-year
    source: "[BP team partnerships lead start Month 9]; startup-finance heuristic for a channel-first BD hire."
  - id: A17
    name: Hiring sequence
    value: "M0 Founder/CEO and Eng1; M3 Implementation; M9 Partnerships; M15 Eng2; no further full-time hires before Y3 proof point"
    unit: hires
    source: "[BP team.startTiming Month 0 / Month 3 / Month 9]; [BP risk beachhead too small, mitigation avoid over-hiring until expansion is proven]."
  - id: A18
    name: Non-salary operating spend
    value: "Y1 monthly 16-22; Y2 quarterly 57-66; Y3 quarterly 69-78"
    unit: USD K
    source: "[BP fundingAsk.useOfFundsSummary secure permissions, audit features, VDR/CRM integrations, pilots, and channel development]; startup-finance heuristic for tooling, travel, legal, insurance, and compliance."
  - id: A19
    name: Opex mix by function
    value: "S&M share rises from ~20% pre-revenue to ~35% by Q4Y3; R&D falls from ~55% to ~38%; G&A stays ~25-27%"
    unit: percent of opex
    source: "[BP strategicChoices productize one corridor first, then scale channels only after pilots prove outcomes]."
  - id: A20
    name: Blended CAC
    value: "65"
    unit: USD K per production customer
    source: "Model-derived from Y1-Y2 sales and marketing spend of about $468K over roughly 7 converted production asset-campaigns by month 24, consistent with founder-led and partner-channel enterprise sales."
  - id: A21
    name: Monthly churn
    value: "3.0"
    unit: percent
    source: "Startup-finance heuristic for high-ACV, campaign-linked B2B contracts where some customers roll off after one asset cycle but a portion expand to a second campaign."
  - id: A22
    name: Base sales cycle
    value: "4"
    unit: months from warm program lead to paid pilot
    source: "[BP gtm.channels accelerator, export-program, and referral channels]; [BP experimentRoadmap launches pilots within 90-180 days]; model assumes warm-intro selling rather than cold outbound."
  - id: A23
    name: Delivery leverage
    value: "1 implementation lead plus contractors supports up to 12 active campaigns by Y3"
    unit: service capacity
    source: "[BP operatingAssumptions one-asset onboarding can be completed with reusable templates instead of bespoke consulting]; this is the key efficiency assumption behind holding headcount at 5 FTE through Y3."
  - id: A24
    name: Funding milestone and buffer
    value: "8 production customers and 2 paid second-corridor pilots by month 24, plus a 6-month cash buffer"
    unit: milestone
    source: "[BP milestones 12-24 months]; [BP fundingAsk runwayMonths 18]; model extends to 24 months so the company is not forced to raise immediately after the proof point."
