scenarios:
  downside:
    description: "Pilot conversion slips, second-corridor expansion arrives later, and onboarding remains more manual than planned."
    y3RevenueK: 853.1
    y3EbitdaK: -513.5
    cashLowPointK: 178.7
    keyAssumptionChanges:
      - "Pilot-to-annual conversion lands closer to 40% than the BP target of 50%+."
      - "The second corridor contributes two quarters later, so Y2 exits at 7 rather than 8 active campaigns."
      - "Gross margin stalls in the mid-60s because onboarding reuse is weaker than A23 assumes."
  base:
    description: "Two early paid pilots convert, channel partners add one second-corridor motion in Y2, and the company exits Y3 at 12 active campaigns near the SOM run-rate."
    y3RevenueK: 1027.6
    y3EbitdaK: -356.9
    cashLowPointK: 381.7
    keyAssumptionChanges:
      - "Pilot-to-annual conversion stays around the BP target of 50%+."
      - "Second-corridor demand starts contributing in Q3Y2 without adding full-time headcount."
      - "Gross margin reaches the 70% business-model target by Y3 as template reuse improves."
  upside:
    description: "Sponsor channels convert faster, one extra cohort-style motion lands by late Y2, and modest premium-module adoption lifts ARPU without adding FTE."
    y3RevenueK: 1183.1
    y3EbitdaK: -245.0
    cashLowPointK: 554.0
    keyAssumptionChanges:
      - "Pilot-to-annual conversion reaches roughly 60% and warm-channel volume is stronger than base."
      - "ARPU trends toward the top of the BP annual range through benchmark reporting and sponsor views."
      - "Gross margin crosses 70% one quarter earlier while the team still holds at 5 FTE."
