problem: >-
  Accounts payable and payroll teams still execute some of the company's
  highest-risk decisions from shared inboxes, where a single convincing email
  can trigger a bank-detail change, urgent wire, or payroll reroute. AI-crafted
  phishing has removed the old spelling and tone tells, so secure email
  gateways may let messages through while manual callback checklists slow the
  business and are skipped under pressure. The result is a dangerous gap
  between email detection tools and the operational moment when money or access
  actually moves.
targetUser:
  primary: Accounts payable leaders and corporate security teams at mid-market enterprises that process vendor and payroll change requests through Microsoft 365 or Google Workspace shared inboxes.
  secondary: Treasury operations managers and procurement administrators who approve payment-detail changes.
  buyer: Controller with CISO co-sponsorship at a 500-3,000 employee enterprise.
startupThesis:
  nonObviousInsight: >-
    The next defensible email-security wedge is not trying to classify every
    message better than Microsoft or Proofpoint; it is remembering the real
    business relationship behind a high-risk request and blocking action when
    the sender, workflow, or requested outcome deviates from that trusted graph.
  beachhead: >-
    Multi-entity software, healthcare-services, and business-services companies
    with 500-3,000 employees, Microsoft 365 or Google Workspace, centralized AP
    shared inboxes, and frequent vendor bank-change or urgent payment requests
    handled by lean finance teams.
  wedge: >-
    A relationship-aware inbox control layer for AP and payroll shared inboxes
    that verifies whether the sender, request pattern, approval path, and bank
    details match prior legitimate business behavior before staff can action the
    email.
  whyNowCatalyst: >-
    Ocean's launch shows that AI-native phishing defense has become a real
    enterprise category precisely because attackers now personalize at scale and
    buyers increasingly value autonomous investigation grounded in business
    context.
  ventureScalePath: >-
    Start with vendor-payment and payroll-change workflows, then expand the same
    trust graph into executive assistant inboxes, procurement, HR, IT helpdesk,
    and eventually a full email action-control plane across every high-risk
    business process triggered by email.
solution: >-
  The product sits inside Microsoft 365 or Google Workspace shared inboxes used
  by AP and payroll, where it builds a living graph of approved vendors,
  historical request patterns, normal approvers, known bank accounts, and
  trusted communication paths. When an email asks for a bank-detail update,
  urgent payment, or payroll reroute, it does not just score the message for
  phishing; it checks whether the business relationship behind the request looks
  legitimate and freezes action if key context is novel or mismatched. The user
  gets an investigation summary, specific anomaly reasons, and a guided
  out-of-band verification workflow such as verified callback or ERP cross-check
  before funds can move. Security teams gain a post-delivery response layer for
  the scams that bypass filters, while finance teams keep working inside the
  inbox tools they already use.
goToMarketSeed:
  firstCustomer: >-
    Controller at a 700-2,000 employee multi-subsidiary software or
    professional-services company that processes more than 150 monthly vendor
    payment or bank-change requests through a Microsoft 365 shared AP inbox and
    has already had at least one executive-impersonation or vendor-spoofing
    near miss.
  buyingTrigger: >-
    A near-miss payment fraud incident, cyber-insurance renewal, or external
    audit finding that exposes weak verification controls around emailed bank
    changes and urgent payment requests.
  currentAlternative: >-
    Secure email gateways, manual callback checklists, ERP approval workflows,
    and employee judgment inside shared inboxes.
  switchingReason: >-
    This wedge catches the expensive cases that slip past gateway filters by
    combining business-relationship memory with action gating at the exact
    moment finance staff would otherwise update bank details or release funds.
  pricingHypothesis: >-
    Annual subscription priced by protected high-risk shared inboxes and volume
    of verified payment or payroll change workflows, with premium modules for
    ERP integrations and audit evidence.
