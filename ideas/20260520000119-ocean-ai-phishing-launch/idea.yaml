jobsToBeDone:
  - job: >-
      When a vendor emails a new bank account or urgent payment request, help
      an AP manager verify whether the request matches the real supplier
      relationship, so they can release funds without exposing the company to
      spoofed-payment fraud.
    currentAlternative: Manual callback checklists plus gateway warnings and ERP approvals
    successMetric: Fraud losses prevented and median time to verify high-risk payment changes
  - job: >-
      When payroll or finance receives an urgent executive request by email,
      help the approver determine whether the sender and context are legitimate,
      so they can avoid acting on impersonation attempts during time-sensitive
      deadlines.
    currentAlternative: Employee judgment plus ad hoc secondary approvals
    successMetric: False-negative rate on executive-impersonation requests and time to verified decision
ideaScorecard:
  signalStrength:
    score: 5
    rationale: Same-day coverage includes a credible independent report plus concrete deployment claims that validate both urgency and existing spend.
  painIntensity:
    score: 5
    rationale: A single successful payment or payroll phishing event creates direct financial loss, audit exposure, and executive escalation.
  wedgeClarity:
    score: 5
