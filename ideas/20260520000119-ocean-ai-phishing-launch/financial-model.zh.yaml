scenarios:
  downside:
    description: 销售周期更长、试点转化更弱，公司始终没能跑到可规模化的伙伴分发。
    y3RevenueK: 1553.8
    y3EbitdaK: -1185.0
    cashLowPointK: -476.3
    keyAssumptionChanges:
    - ARPU 因折价压力从 $40.8K 起步下滑
    - Y3 期末客户数只有 72 个，而不是 96 个
    - 随着实施工作变重，毛利率下滑到 67%
  base:
    description: 创始人主导销售逐步变成精简、由伙伴辅助的动作，同时毛利率守住 business plan 目标。
    y3RevenueK: 2272.5
    y3EbitdaK: -635.0
    cashLowPointK: 93.6
    keyAssumptionChanges:
    - ACV 稳定在 $45K
    - 到 Q4Y3 客户数达到 96 个
    - 依靠伙伴主导的集成，毛利率维持在 70%
  upside:
    description: 伙伴贡献来得更早、模块附加更强，在不大幅加人的情况下把增长前拉。
    y3RevenueK: 2784.0
    y3EbitdaK: -247.6
    cashLowPointK: 339.5
    keyAssumptionChanges:
    - 模块组合更丰富，ARPU 升到 $48K
    - Y3 期末客户数达到 110 个
    - 随着部署标准化，毛利率改善到 72%
