- id: A6
  name: 第 2 年各季度末付费客户数
  value: Q1 6 / Q2 9 / Q3 12 / Q4 15
  unit: customers
  source: '[BP milestones：12-24 个月达到 10-15 个生产客户]'
- id: A7
  name: 第 3 年各季度末付费客户数
  value: Q1 26 / Q2 42 / Q3 66 / Q4 96
  unit: customers
  source: '[BP 24-36 个月里程碑约为 120 个客户；基准情景低于计划，以保持保守并反映伙伴带动爬坡]'
- id: A8
  name: 团队编制爬坡
  value: 3 / 4 / 5 / 6 / 8 / 9 FTE at q1y1 / q2y1 / q3y1 / q4y1 / q4y2 / q4y3
  unit: fte
  source: '[BP team 入场时间，加上创业公司财务经验法则：在转化跑通前延后非关键招聘]'
- id: A9
  name: 按岗位计算的全年总薪酬
  value: Founder 216, Eng 204, ProductSecurity 192, Solutions 168, Sales 180, G&A 144
  unit: usdK
  source: '[美国中型 B2B 安全创业公司全包现金薪酬的 startup-finance 经验法则]'
- id: A10
  name: 非薪酬运营支出爬坡
  value: S&M 4-24, R&D 6-16, G&A 8-18
  unit: usdK per month
  source: '[依赖伙伴而非重服务交付的精简 pre-seed 软件公司的 startup-finance 经验法则]'
- id: A11
  name: 销售效率 / CAC
  value: '18'
  unit: usdK per customer
  source: '[BP funnel 目标为初步沟通到试点 20-30%、试点到生产 50%+；结合创始人主导安全销售经验法则]'
- id: A12
  name: 月度客户流失率
  value: '1.0'
  unit: percent
  source: '[早期中型 B2B 安全 / 控制软件的 startup-finance 经验法则]'
- id: A13
  name: 营运资本处理方式
  value: EBITDA approximates cash movement
  unit: policy
  source: '[pre-seed 软件公司经验法则；在规划模型里，递延收入、capex 和税项被视为影响不大]'
