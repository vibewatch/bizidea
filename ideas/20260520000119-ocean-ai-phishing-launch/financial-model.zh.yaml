modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  TargetAccounts --> QualifiedPilots\n  QualifiedPilots --> PayingCustomers\n  PayingCustomers --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自付费客户从 15 个增长到 96 个、且混合 ACV 为 $45K；它并不是靠夸大的服务收入或一次性费用撑起来的。
- checkName: 必须跑对的事
  finding: 试点到生产的转化率，必须守住或高于商业计划里 50% 的目标，Y2 到 Y3 的客户数爬坡才会真的发生。
- checkName: 模型会失效，如果
  finding: 如果销售周期被拉长到 120 天，或毛利率掉向 65%，模型会在跑到 Q4Y3 盈亏平衡前先把现金打穿。
- checkName: 下一轮融资证明点
  finding: 一个可信的 seed 故事，来自 15+ 个生产客户、两条活跃伙伴、30 天内完成部署，以及朝月度 EBITDA 盈亏平衡持续逼近。
sanityChecks:
  ruleOf40: Y3 增长 427% + EBITDA 利润率 -27.9% = 399.1%；方向上很强，但也被较小的 Y2 基数放大了。
  burnMultiple: Y3 现金消耗倍数为 0.3x（$1.84M 净新增收入对应 -$635K EBITDA）；Y2 仍然低效，达到 4.3x，因为公司还在验证切口。
  revenuePerFte: 按 Q4 的 9 个 FTE 计算，Y3 每个 FTE 对应 $253K 收入（SaaS 基准为 $200-400K）。
  flags:
  - 基准情景在 Y3 末只有 96 个客户，低于商业计划里约 120 个客户的 SOM 情景。
  - Y3 过半的净新增都集中在下半年，因此任何转化滑坡都会很快挤压现金。
  - 70% 的毛利目标默认银行账户核验和 ERP 证据集成主要由伙伴交付，而不是内部重服务团队承担。
  - 公司要到 Q4Y3 才摸到月度 EBITDA 盈亏平衡，因此在激进扩张前仍需要克制招聘，也大概率还要再融一轮 seed。
