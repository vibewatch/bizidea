  marketMapDiagram:
    title: BEC control map
    mermaid: |-
      quadrantChart
        title BEC control map
        x-axis Broad detection --> Workflow-specialized
        y-axis Passive detection --> Action-gating
        Abnormal: [0.35, 0.62]
