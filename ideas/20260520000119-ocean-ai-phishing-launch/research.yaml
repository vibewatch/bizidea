  fiveForces:
    supplierPower:
      score: 2
      rationale: Core dependencies are mailbox APIs, delegated-access models, and cloud identity plumbing from Microsoft and Google, but buyers can still build on those platforms without a single exclusive supplier.
      sourceRefs:
      - 20
      - 23
      - 24
    buyerPower:
      score: 4
      rationale: Controllers and CISOs can choose among broad email-security tools, payment-validation tools, manual callbacks, and AP automation vendors, which keeps switching leverage high until a startup proves workflow-specific ROI.
      sourceRefs:
      - 37
      - 45
      - 55
      - 61
    threatOfEntrants:
      score: 3
      rationale: API-native integration lowers technical barriers, but building high-trust relationship graphs and finance-grade false-positive performance is materially harder than launching another email dashboard.
      sourceRefs:
      - 25
      - 33
      - 41
    threatOfSubstitutes:
      score: 4
      rationale: Manual call-backs, ERP approvals, email-security suites, and payment-validation tools already cover parts of the job, so the startup must prove that stitching those together still leaves an expensive gap.
      sourceRefs:
      - 20
      - 55
      - 61
    competitiveRivalry:
      score: 5
      rationale: The category is crowded with well-funded email-security incumbents plus adjacent finance-fraud vendors, all of whom can claim some version of BEC protection.
