      - 45
      - 48
      - 55
  pestle:
  - factor: political
    impact: neutral
    point: NIST-style cybersecurity governance keeps pressure on enterprises to document and improve control outcomes, which favors evidence-producing security workflows.
    sourceRefs:
    - 13
  - factor: economic
    impact: positive
    point: BEC remains a multibillion-dollar loss category, supporting ROI arguments for targeted control spend even in tighter budgets.
    sourceRefs:
    - 5
    - 6
  - factor: social
    impact: negative
    point: Employees still admit risky behavior and remain a weak link, so human judgment alone is not a reliable payment-fraud control.
    sourceRefs:
    - 11
  - factor: technological
    impact: positive
    point: AI makes spear phishing cheaper and more personalized, increasing the value of relationship-aware defenses that go beyond keyword or reputation matching.
    sourceRefs:
    - 3
    - 12
    - 43
  - factor: legal
    impact: negative
    point: SOX and audit requirements raise the bar for evidence, traceability, and control design in payment and vendor-master workflows.
    sourceRefs:
    - 60
  adoptionFrictionMatrix:
  - friction: Added latency on urgent payment requests
    severity: high
    affectedBuyer: Controller and AP lead
    mitigation: Start with only bank-change, payroll reroute, and urgent-wire scenarios; leave low-risk inbox flow untouched.
    sourceRefs:
    - 20
    - 56
  - friction: Mailbox delegation and permission complexity
    severity: medium
    affectedBuyer: Microsoft 365 or Google Workspace administrator
    mitigation: Provide opinionated setup guides, automated permission checks, and connector health monitoring.
    sourceRefs:
    - 20
    - 21
    - 24
  - friction: Trust in AI verdicts during audits
    severity: high
    affectedBuyer: Controller and internal audit
    mitigation: Attach explainable evidence, approval logs, and verification artifacts to every blocked or released request.
