scenarios:
  downside:
    description: "Longer sales cycles and weaker pilot conversion keep the company below scaled partner distribution."
    y3RevenueK: 1553.8
    y3EbitdaK: -1185.0
    cashLowPointK: -476.3
    keyAssumptionChanges:
      - "ARPU falls to $40.8K from discounting pressure"
      - "Y3 exits at 72 customers instead of 96"
      - "Gross margin slips to 67% as implementation effort rises"
  base:
    description: "Founder-led sales converts into a lean partner-assisted motion while gross margin stays at the business-plan target."
    y3RevenueK: 2272.5
    y3EbitdaK: -635.0
    cashLowPointK: 93.6
    keyAssumptionChanges:
      - "ACV stays at $45K"
      - "Customer count reaches 96 by Q4Y3"
      - "Gross margin holds at 70% with partner-led integrations"
  upside:
    description: "Faster partner contribution and stronger module attach pull growth forward without a large headcount increase."
    y3RevenueK: 2784.0
    y3EbitdaK: -247.6
    cashLowPointK: 339.5
    keyAssumptionChanges:
      - "ARPU rises to $48K on richer module mix"
      - "Y3 exits at 110 customers"
      - "Gross margin improves to 72% as deployment standardizes"
