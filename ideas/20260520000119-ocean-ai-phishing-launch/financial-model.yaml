    name: Initial pre-seed cash at model start
    value: '3400'
    unit: usdK
    source: "[BP fundingAsk $2-4M range; modeled at $3.4M to fund lean 3-year plan plus buffer]"
  - id: A2
    name: Blended annual ACV per paying customer
    value: '45'
    unit: usdK
    source: "[BP gtm.pricing $30k-$60k ACV; modest module and second-inbox attach in base case]"
  - id: A3
    name: Monthly ARPU
    value: '3.75'
    unit: usdK
    source: "[A2 / 12 months]"
  - id: A4
    name: Target gross margin
    value: '70'
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A5
    name: Year-1 paying customers by month 12
    value: '4'
    unit: customers
    source: "[BP milestones: 3 paid pilots and at least 2 production contracts in 0-12 months; modeled with 4 paying logos by M12]"
  - id: A6
    name: Year-2 paying customers by quarter end
    value: "Q1 6 / Q2 9 / Q3 12 / Q4 15"
    unit: customers
    source: "[BP milestones: reach 10-15 production customers in 12-24 months]"
  - id: A7
    name: Year-3 paying customers by quarter end
    value: "Q1 26 / Q2 42 / Q3 66 / Q4 96"
    unit: customers
    source: "[BP 24-36 month milestone of roughly 120 customers; base case set below plan to stay conservative and reflect partner-led ramp heuristic]"
  - id: A8
    name: Headcount ramp
    value: "3 / 4 / 5 / 6 / 8 / 9 FTE at q1y1 / q2y1 / q3y1 / q4y1 / q4y2 / q4y3"
    unit: fte
    source: "[BP team start timings plus startup-finance heuristic to delay non-essential hires until conversion proves out]"
  - id: A9
    name: Loaded annual compensation by role
    value: "Founder 216, Eng 204, ProductSecurity 192, Solutions 168, Sales 180, G&A 144"
    unit: usdK
    source: "[startup-finance heuristic for U.S. mid-market B2B security startup fully loaded cash comp]"
  - id: A10
    name: Non-payroll operating spend ramp
    value: "S&M 4-24, R&D 6-16, G&A 8-18"
    unit: usdK per month
    source: "[startup-finance heuristic for lean pre-seed software company using partners instead of services-heavy delivery]"
  - id: A11
    name: Sales efficiency / CAC
    value: '18'
    unit: usdK per customer
    source: "[BP funnel targets 20-30% discovery-to-pilot and 50%+ pilot-to-production; founder-led security-sales heuristic]"
  - id: A12
    name: Monthly logo churn
    value: '1.0'
    unit: percent
    source: "[startup-finance heuristic for early mid-market B2B security/control software]"
  - id: A13
    name: Working-capital treatment
    value: EBITDA approximates cash movement
    unit: policy
    source: "[pre-seed software heuristic; deferred revenue, capex, and taxes assumed immaterial to planning model]"
