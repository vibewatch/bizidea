modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> QualifiedPilots
      QualifiedPilots --> PayingCustomers
      PayingCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by growing from 15 to 96 paying customers at a $45K blended ACV, not by assuming outsized services or one-time fees."
  - checkName: Must go right
    finding: "Pilot-to-production conversion needs to stay at or above the business-plan 50% target so the Y2-to-Y3 logo ramp actually materializes."
  - checkName: Model breaks if
    finding: "If sales cycles stretch to 120 days or gross margin drops toward 65%, cash turns negative before the model reaches Q4Y3 breakeven."
  - checkName: Next-round proof
    finding: "A credible seed story comes from 15+ production customers, two active partners, sub-30-day deployment, and visible progress toward monthly EBITDA breakeven."
sanityChecks:
  ruleOf40: "Y3 growth 427% + EBITDA margin -27.9% = 399.1%; directionally strong but inflated by the small Y2 base."
  burnMultiple: "Y3 burn multiple 0.3x (-$635K EBITDA on $1.84M net-new revenue); Y2 remains inefficient at 4.3x while the company is still proving the wedge."
  revenuePerFte: "$253K Y3 using 9 Q4 FTE (benchmark $200-400K SaaS)."
  flags:
    - "Base case exits Y3 at 96 customers, below the business-plan SOM case of roughly 120 logos."
    - "More than half of Y3 net adds arrive in the back half of the year, so any conversion slip compresses cash quickly."
    - "The 70% gross-margin target assumes bank-validation and ERP evidence integrations stay partner-led rather than services-heavy."
    - "The company reaches monthly EBITDA breakeven only in Q4Y3, so it still needs disciplined hiring and likely a seed round before aggressive expansion."
