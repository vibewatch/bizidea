slug: shared-inbox-trust-graph
date: '2026-05-20'
executiveSummary: 这家公司一开始应该做成面向 AP 共享收件箱的关系感知型动作控制层，而不是再做一套宽泛的邮件安全套件。第一个客户，是一家总部在美国、700–2,000 人、多实体结构的软件、专业服务或医疗服务公司；它通过 Microsoft 365 共享收件箱，每月处理 150+ 次供应商银行账户变更或紧急付款请求。购买触发点通常是最近一次供应商仿冒险情、网络保险续保，或审计发现，暴露出邮件付款变更控制太弱。研究支撑了一个聚焦但可信的滩头市场：若公司能拿下约 120 个客户、ACV 约 $30k，第 3 年可对应 $467.3M TAM、$183.8M SAM，以及模型化的 $3.6M SOM。产品应先部署进一个共享收件箱，从供应商、审批人和银行信息历史里搭起信任图谱，只在请求是新的或对不上时要求留痕的带外核验。这里的刻意取舍是：先比网关厂商或 AP 套件更早卡住资金流出的那个瞬间，即便这意味着先不做广泛的员工邮箱保护，也不碰完整 AP 自动化。最大的反证风险有两个：一是财务控制负责人不愿接受额外的流程摩擦，二是现有厂商靠捆绑的邮件安全和付款核验能力已经解决了足够多的问题。输入里还没有钉死两个关键参数——目标收件箱每月真实请求量，以及市场能容忍的误报阈值——所以计划必须尽早验证。
problem:
- AP 和薪资团队至今还在共享收件箱里做高风险决定，一封足够逼真的邮件就可能触发银行账户变更、紧急电汇或薪资改道。
- 安全邮件网关和 AP 系统各自覆盖了流程的一段，但都不真正掌握财务员工决定一条邮件请求能不能执行的那个瞬间。
- 人工回拨清单如果不能在截止压力下被稳定触发、并被保留下来作为审计证据，最后往往只剩控制表演。
solution:
- 在 Microsoft 365 或 Google Workspace 共享收件箱里插入一层控制，建立由已批准供应商、历史审批人、已知银行账户和常见请求模式组成的信任图谱。
- 当一封邮件要求更新银行信息、发起紧急付款或改道薪资时，只要发件人、流程或请求结果是新的，就先卡住动作，再引导用户做已验证回拨或 ERP 交叉核验，然后才放行。
- 给出可解释的异常原因和可审计的核验记录，让财务控制负责人、CISO 和审计方都能复盘为什么这条请求被拦下或被放过。
whyWeWin:
- 这个切口比宽泛的邮件安全更窄，却正对最贵的欺诈时刻；这里买方痛感最强、预算最急、ROI 也最好量化。
- 一张绑定供应商历史、审批行为和处置结果的跨请求信任图谱，比再做一个钓鱼分类器更难复制，因为它会随着每一次高风险工作流审查持续变强。
- 产品补的是现有网关和 AP 工具之间的空档，而不是要把它们整套换掉，所以部署摩擦更低，也符合财务控制负责人现在的采购习惯。
strategicChoices:
  beachhead: 美国中型软件、专业服务和医疗服务公司：500–2,499 名员工、使用 Microsoft 365 AP 共享收件箱、财务团队精简、而且经常收到供应商银行账户变更或紧急付款请求。
  wedgeRationale: AP 共享收件箱比通用邮件防护更容易先拿到证明：只要拦住一次银行账户变更欺诈或紧急电汇欺诈，就足以证明价值；买方和流程都非常明确，产品也能围绕少数请求类型直接量化欺诈风险下降和核验延迟。
  sequencingRationale: 先从 Microsoft 365，以及 AP 里的银行账户变更和紧急电汇流程下手，因为第一个客户画像和购买触发点在这里最清楚。只有当公司证明了低误报、快部署，以及由财务控制负责人主导的可复制购买路径之后，再补 Google Workspace、薪资场景、更广的渠道合作，以及相邻收件箱。
  notYet:
  - 广泛的员工邮箱保护，或完整替代安全邮件网关
  - 完整 AP 自动化、发票处理，或成为 ERP 级 system of record
  - 国际银行账户核验覆盖，以及跨境支付工作流
  - 在 AP 这套证明没有跑顺之前，不扩到高管助理、采购、HR 和 IT 帮助台收件箱
market:
  tam: $467.3M 的估算 TAM：基于美国 15,575 家 500–2,499 人企业，按一个到两个受保护财务收件箱、约 $30k 年合同额估算。
  sam: $183.8M 的估算 SAM：基于 6,127 家位于信息、专业服务、医疗或社会援助行业、且工作流适配滩头市场的美国 500–2,499 人企业，按约 $30k ACV 估算。
  som: $3.6M 的第 3 年模型化 SOM：约 120 个客户，约占 SAM 客户数的 2.0%，按约 $30k ACV 计算。
  segments:
  - 主要细分：美国 500–2,499 人、集中式 AP 共享收件箱、且经常处理供应商变更请求的企业里，由财务控制负责人主导的财务团队
  - 次级细分：一旦 AP 工作流被验证，同一批客户里的薪资团队和资金运营团队
  buyingProcess: 日常内部推动人往往是 AP 负责人或财务控制负责人，而 CISO 或安全总监会联合赞助部署，因为问题同时横跨反欺诈和邮件安全。销售应从一次付费试点开始，先盯住一个高风险共享收件箱，在险情、审计问题或保险公司复核后切入；等买方看到高风险请求被放行的数量下降、同时又没有带来不可接受的延迟，再转成年合同。
product:
  mvp: MVP 应先连到一个 Microsoft 365 的 AP 共享收件箱，吃进供应商与审批人历史，只覆盖三类请求：供应商银行账户变更、紧急电汇和薪资改道。它必须给出异常原因，支持已验证回拨或 ERP 交叉核验流程，并为每一次拦截或放行存下一条可导出的审计轨迹。
  sixMonth: 6 个月内，要把 Microsoft 365 部署跑进 30 天以内，交付供应商主数据导入和审批历史基线能力，并在第一个 AP 收件箱里跑出带误报复盘流程的可解释动作控制。
  twelveMonth: 12 个月内，补上 Google Workspace 支持、薪资改道场景、可配置策略阈值，以及一个银行账户核验伙伴或 ERP 证据路径，在不把产品做成重服务项目的前提下提高决策信心。
  twentyFourMonth: 24 个月内，扩到采购和与资金运营相邻的收件箱，把基于已核验结果的跨客户信任图谱学习做出来，成为高风险、由邮件触发的财务工作流标准动作闸门，而不是单一收件箱控制工具。
  keyBets:
  - 只要产品只碰最危险的请求、正常收件箱流程不动，买方就愿意接受动作控制。
  - 先覆盖 Microsoft 365，再补一个 ERP 或供应商主数据集成，就足够拿下前三个生产客户。
  - 在早期交易里，审计级证据和可解释异常原因，比完全自治的 AI 判决更重要。
  - AP 银行账户变更和紧急电汇工作流，会先跑出可复制的切口，再往薪资和其他收件箱扩。
gtm:
  wedge: 先卖一个 AP 共享收件箱的付费试点：在邮件送达之后、但资金或供应商数据被改动之前，拦住供应商银行账户变更和紧急付款欺诈；等财务和安全团队开始把核验记录纳入日常控制流程，再转成年合同。
  channels:
  - 由创始人直接卖给目标中型企业里的财务控制负责人、AP 负责人和 CISO
  - Microsoft 365 与 Google Workspace 生态伙伴，帮助更快完成邮箱权限设置和部署
  - 反欺诈顾问、网络保险经纪人和审计就绪顾问；在险情或复核后，他们往往最先发现付款变更控制薄弱
  funnelTargets: 从初步沟通到合格试点转化率 20–30%，从试点到生产转化率 50%+，从试点启动到年合同签署控制在 90 天以内。
  pricing: 定价按受保护的高风险收件箱数量，以及每月已核验的付款或薪资变更工作流量收取，因为买方预算锚定的是高风险操作时刻，而不是泛化员工席位。初始假设是先卖 $15k–$30k 的付费试点，再转成一个到两个收件箱、约 $30k–$60k 的年 ACV；后续通过新增工作流、集成和审计模块扩张。
businessModel:
  revenueStreams:
  - 面向财务收件箱动作控制平台的年费订阅
  - ERP 证据同步、银行账户核验和审计报表的高级模块
  - 来自更多受保护收件箱和相邻高风险工作流的扩张收入
  unitOfValue: 受保护的高风险共享收件箱，以及每月已核验的财务变更工作流
  targetGrossMarginPct: 70
  expansionLevers:
  - AP 跑通后，再加薪资、采购和资金运营相邻收件箱
  - 提高 ERP 同步、银行账户核验和审计证据模块的附加率
  - 从一个共享收件箱扩到同一客户内部的多子公司、多实体控制部署
strategyMap:
  northStarMetric: 被覆盖的高风险财务请求里，在低延迟、零欺诈损失前提下完成留痕核验的占比。
  inputMetrics:
  - 付费试点到生产的转化率
  - 覆盖请求做出已核验决定的中位时长
  - 被拦住的请求里，后来被证实为真实异常的占比
  - 合法请求里，被不必要升级到人工处理的占比
  - 第一个共享收件箱和基线信任图谱的部署时长
  - 每个生产客户受保护的高风险工作流数量
  moatsToBuild:
  - 把发件人、供应商、审批人、银行信息和核验结果串起来的跨请求信任图谱
  - 一套审计级证据账本，让每一次拦截与放行都能向财务控制负责人、审计师和保险方解释清楚
  - 与 Microsoft 365、Google Workspace、ERP 系统和银行账户核验伙伴的深度共存式集成
  - 一套宽泛邮件工具天然拿不到的、财务场景异常处置标注数据集
  killCriteria:
  - 围绕 AP 共享收件箱欺诈控制做了 40 次目标客户对话后，付费试点仍少于 3 个
  - 前 6 个试点结束后，试点到生产的转化率低于 50%
  - 试点调优 60 天后，被覆盖的合法请求里仍有超过 10% 被不必要地拦下
  - 生产环境里，被覆盖请求新增的核验时间中位数始终高于 15 分钟
  mermaid: "flowchart LR\n  Wedge[AP shared inbox wedge] --> MVP[Trust graph and action gating MVP]\n  MVP --> Proof[Blocked fraud and audit evidence]\n  Proof --> Expansion[More inboxes integrations and workflows]\n"
investorMemo:
  verdict:
    call: 见面 / 继续尽调
    conviction: 痛点很强，切口也够克制；但这单能不能成立，取决于它能否在拥挤赛道里证明低误报，以及由财务控制负责人主导的购买路径可复制。
    whyBelieve: 这套计划瞄准的是一个高损失、非常具体的工作流，同时具备清晰的首个客户、预算触发点、可量化的证明指标，以及能自我增强的数据回路。
    whyDoubt: 如果产品拿不出明显更强的工作流控制力和更低摩擦，宽泛邮件安全厂商和付款核验厂商会迅速压缩它独立存在的窗口。
    nextDiligence: 先验证 3 个付费试点：看财务控制负责人是否愿意为单一收件箱部署买单，也看他们能否接受防欺诈所需的拦截率。
  firstCustomer:
    title: 拥有共享 AP 收件箱的多实体中型公司财务控制负责人
    profile: 一家美国软件或专业服务公司，700–2,000 名员工，使用 Microsoft 365，通过一个集中式 AP 邮箱每月处理 150+ 次供应商或紧急付款请求。
    trigger: 最近一次供应商仿冒险情、网络保险续保或审计发现，让基于邮件的付款变更控制在当下变成了有预算的问题。
    buyer: 财务控制负责人，CISO 联合赞助
    initialContract: 先卖一个 AP 收件箱的 $15k–$30k 付费试点，再转成一个到两个受保护收件箱、约 $30k–$60k 的年 ACV，附带审计证据和核心集成。
  mustBeTrue:
  - 至少一半合格目标客户，在险情、保险复核或审计触发后，会把 AP 共享收件箱欺诈控制当成有预算的问题。
  - 以 Microsoft 365 为先的部署，必须在不依赖重服务的前提下，30 天内产出有用的信任图谱决策。
  - 只要不必要拦截率控制在被覆盖合法请求的大约 10% 以下，财务控制负责人就愿意接受这套带闸门的工作流。
  - 客户在要求更广泛的邮件安全平台替代之前，一个 AP 收件箱切口必须先跑出至少 $30k 年 ACV。
  - 宽泛邮件安全和付款核验现有厂商在真实对比评估里，必须仍然给不出足够强的财务场景动作控制。
  diligenceQuestions:
  - 目标 AP 收件箱里，每月真实会打进来多少高风险的银行账户变更、紧急电汇和薪资改道请求？
  - 真实交易里，谁会在险情或审计发现后最先拍板：财务控制负责人、资金负责人，还是 CISO？
  - 财务团队在绕过产品之前，能接受多高的误报率和多长的额外审批延迟？
  - 首个生产部署里，最关键的集成到底是哪一个：ERP 供应商主数据、银行账户核验，还是基于身份/HRIS 的审批人映射？
  - 在并排评估里，Abnormal、Material、Ocean 和 Trustpair 在财务工作流上各自还卡在哪？
operatingAssumptions:
- assumption: 如果它补的是现有邮件安全，而不是替换它，财务控制负责人就愿意买一层窄切口的动作控制。
  basis: research.yaml
  validationTest: 做 12 场买方访谈和 3 场试点设计会，比较市场对窄切口 AP 控制层与更宽泛邮件安全采购的偏好。
  decisionImpact: 如果这个判断不成立，公司就得转去更大的安全预算池，或者接受更长、更卷的替换型销售周期。
- assumption: 先覆盖 Microsoft 365，再拿到供应商主数据上下文，就足够拿下前三个付费试点。
  basis: idea.yaml
  validationTest: 跟踪前 20 个合格机会的技术栈适配，确认至少有 3 个潜在客户无需 Google Workspace 或深度资金系统集成就能启动。
  decisionImpact: 如果不成立，路线图和招聘都得更早转向更多连接器和实施支持。
- assumption: 只要产品能降低欺诈风险并给出审计证据，买方在付费试点后就愿意支付 $30k–$60k 年 ACV。
  basis: research.yaml
  validationTest: 在至少 10 场预算负责人对话里测试三种打包结构，并拿下 2 个签字试点，让转化预期以书面形式落在目标区间。
  decisionImpact: 如果不成立，公司就得缩小初始范围、下调 ACV 预期，或者更早转向伙伴分发。
- assumption: 早期客户给出的已核验处置结果，最终会沉淀成一套差异化的财务反欺诈数据集。
  basis: research.yaml
  validationTest: 在早期试点里累计抓到至少 300 条经人工复核的高风险请求，并衡量这些结果能否实质改善后续客户组的模型或规则质量。
  decisionImpact: 如果不成立，长期差异化就会从数据护城河滑向服务或渠道优势，风险投资上行空间会变弱。
- assumption: 在招聘成规模企业销售团队之前，创始人主导直销就能拿下前 5 个付费试点。
  basis: operator judgment
  validationTest: 拉出一份 40 家目标账户名单，并要求在第 12 个月前拿到至少 5 个付费试点或签字版试点意向书。
  decisionImpact: 如果不成立，公司应在扩编前重看切口清晰度、分发伙伴和现金消耗。
experimentRoadmap:
- horizon: 0–90 天
  experiment: ICP 与工作流量发现
  hypothesis: 目标账户会反馈足够高的 AP 收件箱高风险请求量，而且至少存在一个近期触发事件，足以支撑付费试点。
  successMetric: 完成 15 场初步访谈，其中至少 10 家符合目标画像，且 6 家确认存在明确购买触发点。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 礼宾式异常复盘基准测试
  hypothesis: 把信任图谱检查套在历史银行账户变更和紧急电汇请求上，能比团队单靠人工清单更少漏掉真正可疑的案例。
  successMetric: 2 个共创客户各自复盘至少 25 条历史请求，并确认最高风险案例里确实存在清晰的异常信号。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: Microsoft 365 试点部署
  hypothesis: 一个共享收件箱可以在 30 天内完成部署和调优，权限设置可用，审计证据也能稳定留存。
  successMetric: 启动 3 个付费试点，且首个受保护收件箱上线的中位时长低于 30 天。
  owner: 产品安全负责人
- horizon: 90–180 天
  experiment: 定价与预算负责人测试
  hypothesis: 按收件箱加工作流定价，比按席位定价转化更好，因为财务控制负责人想的是高风险请求和控制范围。
  successMetric: 偏好的套餐在 10 场定价对话里至少赢下 6 场，并出现在 2 份签字试点范围里。
  owner: 创始人 / CEO
- horizon: 6–12 个月
  experiment: ERP 与银行账户核验集成验证
  hypothesis: 补上一条 ERP 证据路径和一个银行账户核验伙伴，会显著提高试点到生产的转化率。
  successMetric: 至少 2 个试点在生产复盘里用到这套集成流程，并转成年度合同。
  owner: 产品安全负责人
- horizon: 12–18 个月
  experiment: 薪资与 Google Workspace 扩展测试
  hypothesis: 同一套控制模型可以扩到薪资改道和 Google Workspace 账户，而且不会带来不可接受的误报或部署拖累。
  successMetric: 3 个现有客户新增第二条工作流或第二个平台，同时把生产拦截率和延迟维持在目标带宽内。
  owner: 创始工程师
operations:
- 维护一套最小权限部署手册，覆盖共享邮箱权限、连接器健康检查和基线信任图谱创建。
- 把每一次拦截、放行、回拨和 ERP 交叉核验都存进可审计证据日志，方便财务控制负责人和审计方导出。
- 试点期间每周复盘误报和绕过行为，在扩请求类型或客户范围前先把问题压住。
- 把邮箱配置、ERP 上下文和银行账户核验交给生态伙伴，而不是自己堆一支重服务实施团队。
team:
- role: 创始人 / CEO
  startTiming: 第 0 个月
  rationale: 在财务控制负责人主导的销售动作可复制之前，亲自抓共创客户销售、买方发现、定价和伙伴拓展。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭出首个 AP 收件箱验证所需的信任图谱、异常引擎和工作流控制。
- role: 产品安全负责人
  startTiming: 第 2 个月
  rationale: 负责 Microsoft 365 部署、策略调优、审计证据设计和集成优先级，避免试点沦为定制项目。
- role: 解决方案工程师
  startTiming: 第 4 个月
  rationale: 缩短试点搭建时间，接住 ERP 和银行账户核验流程，并把早期部署沉淀成标准化实施手册。
- role: GTM 负责人
  startTiming: 第 9 个月
  rationale: 只有当试点转化、定价和首批伙伴辅助成交都证明销售动作可复制之后，再补 pipeline 容量。
milestones:
- horizon: 0–12 个月
  items:
  - 在 Microsoft 365 AP 共享收件箱里跑出 3 个付费试点。
  - 至少把 2 个试点转成年度生产合同。
  - 在表现最好的试点客户组里，把被覆盖合法请求的不必要拦截率压到 10% 以下。
  - 把 ERP 证据导入和审计日志导出做成首个工作流的标准能力。
- horizon: 12–24 个月
  items:
  - 拿下 10–15 个生产客户，使用 AP 银行账户变更和紧急电汇控制。
  - 在真实账户里加上 Google Workspace 支持和薪资改道覆盖。
  - 建立 2 条活跃伙伴渠道，覆盖邮箱配置、审计咨询或银行账户核验。
  - 在不依赖重服务定制的前提下，把部署时长压进 30 天以内。
- horizon: 24–36 个月
  items:
  - 按模型化 SOM 所需的混合 ACV，拿下约 120 个客户。
  - 在现有账户里扩到采购、资金运营和更多高风险收件箱。
  - 沉淀一套跨客户处置数据集，持续提高策略准确率和客户留存。
  - 在最佳垂直行业里跑出多实体扩张，而不是泛化去打大盘 SMB。
risks:
- risk: 在公司证明出独特工作流优势之前，现有厂商的捆绑销售会压缩独立品类空间。
  likelihood: High
  impact: High
  mitigation: 靠财务场景动作控制、审计证据和关系记忆取胜——这些正是网关厂商和 AP 套件没法顺手拼好的地方。
- risk: 如果拦截率或延迟太高，财务团队会在紧急时段绕过产品。
  likelihood: Medium
  impact: High
  mitigation: 把切口限定在最危险的请求类型，持续埋点绕过行为，并在扩张前严格守住延迟和误报阈值。
- risk: 早期训练数据太少，会拖累新账户上的异常判断质量。
  likelihood: Medium
  impact: Medium
  mitigation: 第一天先靠发件人历史、银行信息和审批路径的确定性检查起盘，再从已核验结果里学习，而不是一上来就押黑盒 AI。
- risk: 买方归属可能在财务控制负责人、资金团队和安全团队之间拉扯，拖慢成交。
  likelihood: Medium
  impact: Medium
  mitigation: 把试点打包成一个收件箱、一个触发事件、一套证据故事，让财务控制负责人能在 CISO 赞助下直接拥有这笔预算。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 资金将用来支撑一支 5 人团队，把以 Microsoft 365 为先的产品做出来，拿下共创客户，补齐核心 ERP 与银行账户核验集成，证明 AP 收件箱部署可以低摩擦跑通，并在扩大销售编制前拿下首批生产客户。
