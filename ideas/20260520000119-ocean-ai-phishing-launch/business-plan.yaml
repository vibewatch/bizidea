slug: shared-inbox-trust-graph
date: '2026-05-20'
executiveSummary: >-
  This company should start as a relationship-aware action-control layer for AP
  shared inboxes, not as another broad email-security suite. The first customer
  is a U.S.-based 700-2,000 employee multi-entity software, professional
  services, or healthcare-services company that processes more than 150 monthly
  vendor bank-change or urgent payment requests through a Microsoft 365 shared
  inbox. The buying trigger is usually a recent vendor-spoofing near miss,
  cyber-insurance renewal, or audit finding that exposes weak controls around
  emailed payment changes. Research supports a focused but credible beachhead
  with an estimated $467.3M TAM, $183.8M SAM, and a modeled $3.6M year-3 SOM if
  the company can reach about 120 customers at roughly $30k ACV. The product
  should deploy into one shared inbox first, build a trust graph from vendor,
  approver, and bank-detail history, and require documented out-of-band
  verification only for novel or mismatched requests. The deliberate tradeoff is
  to win the moment before money moves faster than gateway vendors or AP suites,
  even if that means deferring broad employee inbox protection and full AP
  automation. The biggest disconfirming risks are that controllers will not
  tolerate the added workflow friction or that incumbents already solve enough
  of the problem through bundled email-security and payment-validation features.
  Exact acceptable false-positive thresholds and real-world monthly request
  volume per target inbox are not pinned down in the inputs, so the plan must
  validate those assumptions early.
problem:
  - AP and payroll teams still make high-risk decisions from shared inboxes where one convincing email can trigger a bank-detail change, urgent wire, or payroll reroute.
  - Secure email gateways and AP systems cover parts of the flow, but neither owns the exact moment when finance staff decide whether an emailed request is safe to execute.
  - Manual callback checklists create control theater unless they are triggered consistently under deadline pressure and preserved as audit evidence.
solution:
  - Insert a control layer into Microsoft 365 or Google Workspace shared inboxes that builds a trust graph of approved vendors, historic approvers, known bank accounts, and normal request patterns.
  - When a message requests a bank-detail update, urgent payment, or payroll reroute, gate the action only if the sender, workflow, or requested outcome is novel, then guide the user through verified callback or ERP cross-check before release.
  - Produce explainable anomaly reasons and an auditable verification record so controllers, CISOs, and auditors can review why a request was held or cleared.
whyWeWin:
  - The wedge is narrower than broad email security and maps directly to the expensive fraud moment where buyer pain, budget urgency, and measurable ROI are clearest.
  - A verified cross-request trust graph tied to vendor history, approver behavior, and resolution outcomes is harder to copy than another phishing classifier because it improves with each reviewed high-risk workflow.
  - The product complements existing gateways and AP tools instead of trying to replace them, which lowers deployment friction and fits how controllers already buy controls.
strategicChoices:
  beachhead: >-
    U.S. mid-market software, professional-services, and healthcare-services
    companies with 500-2,499 employees, Microsoft 365 shared AP inboxes, lean
    finance teams, and recurring vendor bank-change or urgent payment requests.
  wedgeRationale: >-
    AP shared inboxes create faster proof than general email protection because
    one prevented bank-change or urgent-wire fraud can justify spend, the buyer
    and workflow are explicit, and the product can measure fraud-risk reduction
    and verification latency on a narrow set of request types.
  sequencingRationale: >-
    Start with Microsoft 365 and AP bank-change plus urgent-wire workflows
    because that is where the first customer and buying trigger are clearest.
    Only after the company proves low false positives, fast deployment, and
    repeatable controller-led buying should it add Google Workspace, payroll,
    broader channel partnerships, and adjacent inboxes.
  notYet:
    - Broad employee inbox protection or full secure email gateway replacement
    - Full AP automation, invoice processing, or ERP system-of-record ownership
    - International bank-validation coverage and cross-border payment workflows
    - Executive assistant, procurement, HR, and IT helpdesk inbox expansion before AP proof is repeatable
market:
  tam: "$467.3M estimated TAM based on 15,575 U.S. firms with 500-2,499 employees at about $30k annual contract value for one-to-two protected finance inboxes."
  sam: "$183.8M estimated SAM based on 6,127 U.S. firms in information, professional services, and healthcare or social assistance with the beachhead workflow fit at about $30k ACV."
  som: "$3.6M modeled year-3 SOM based on roughly 120 customers, or about 2.0% of SAM logos, at about $30k ACV."
  segments:
    - "Primary segment: controller-led finance teams at 500-2,499 employee U.S. firms with centralized AP shared inboxes and frequent vendor-change requests"
    - "Secondary segment: payroll and treasury operations teams in the same accounts once the AP workflow is proven"
  buyingProcess: >-
    The day-to-day champion is usually the AP leader or controller, while the
    CISO or security director co-sponsors the deployment because the problem is
    both fraud control and email security. The sale should begin as a paid pilot
    on one high-risk shared inbox after a near miss, audit issue, or insurer
    review, then convert when the buyer sees fewer risky requests released
    without adding unacceptable delay.
product:
  mvp: >-
    The MVP should connect to a Microsoft 365 shared AP inbox, ingest vendor and
    approver history, and gate only three request classes: vendor bank-detail
    changes, urgent wires, and payroll reroutes. It must show anomaly reasons,
    support verified callback or ERP cross-check workflows, and store an
    exportable audit trail for every hold or release.
  sixMonth: >-
    Prove Microsoft 365 deployment in under 30 days, ship vendor-master import
    plus approval-history baselining, and show explainable action gating on the
    first AP inbox with false-positive review workflows.
  twelveMonth: >-
    Add Google Workspace support, payroll-reroute coverage, configurable policy
    thresholds, and a bank-account validation partner or ERP evidence path that
    improves decision confidence without turning the product into a services
    project.
  twentyFourMonth: >-
    Expand into procurement and treasury-adjacent inboxes, ship cross-customer
    trust-graph learning on verified outcomes, and become the standard action
    gate for high-risk email-triggered finance workflows rather than a single
    inbox control.
  keyBets:
    - Buyers will accept action gating if the product touches only the highest-risk requests and keeps normal inbox flow untouched.
    - Microsoft 365-first coverage plus one ERP or vendor-master integration is enough to land the first three production customers.
    - Audit-grade evidence and explainable anomaly reasons matter more in early deals than fully autonomous AI verdicts.
    - AP bank-change and urgent-wire workflows create a repeatable entry point before payroll and other inboxes are added.
gtm:
  wedge: >-
    Sell a paid pilot on one AP shared inbox that catches vendor bank-change and
    urgent-payment fraud after email delivery but before money or vendor data is
    changed, then convert to an annual contract once finance and security teams
    use the verification record in their normal control process.
  channels:
    - Direct founder-led sales to controllers, AP leaders, and CISOs at target mid-market accounts
    - Microsoft 365 and Google Workspace ecosystem partners that can accelerate mailbox permission setup and deployment
    - Fraud advisors, cyber-insurance brokers, and audit-readiness consultants who surface weak payment-change controls after a near miss or review
  funnelTargets: "Discovery call to qualified pilot 20-30%, pilot to production 50%+, and time from pilot kickoff to annual contract under 90 days."
  pricing: >-
    Annual subscription priced by protected high-risk inboxes and monthly volume
    of verified payment or payroll change workflows, because buyers budget around
    risky operational moments rather than generic employee seats. Initial
    assumption is a $15k-$30k paid pilot that converts to roughly $30k-$60k
    annual ACV for one-to-two inboxes, with expansion from added workflows,
    integrations, and audit modules.
businessModel:
  revenueStreams:
    - Annual subscription for the finance inbox action-control platform
    - Premium modules for ERP evidence sync, bank-account validation, and audit reporting
    - Expansion revenue from additional protected inboxes and adjacent high-risk workflows
  unitOfValue: Protected high-risk shared inboxes and monthly verified finance-change workflows
  targetGrossMarginPct: 70
  expansionLevers:
    - Add payroll, procurement, and treasury-adjacent inboxes after AP proof
    - Increase attach rate for ERP sync, bank-validation, and audit-evidence modules
    - Expand from one shared inbox to multi-subsidiary and multi-entity control deployments inside the same customer
strategyMap:
  northStarMetric: Percentage of covered high-risk finance requests resolved with documented verification, low delay, and zero fraud loss.
  inputMetrics:
    - Paid pilot to production conversion rate
    - Median time to verified decision on covered requests
    - Percentage of held requests later confirmed as true anomalies
    - Percentage of legitimate requests that require unnecessary manual escalation
    - Time to deploy the first shared inbox and baseline trust graph
    - Number of protected high-risk workflows per production customer
  moatsToBuild:
    - Cross-request trust graph linking senders, vendors, approvers, bank details, and verification outcomes
    - Audit-grade evidence ledger that makes every hold and release explainable to controllers, auditors, and insurers
    - Deep coexistence integrations with Microsoft 365, Google Workspace, ERP systems, and bank-validation partners
    - A labeled dataset of finance-specific anomaly resolutions that broad email tools do not naturally own
  killCriteria:
    - Fewer than 3 paid pilots after 40 target-account conversations focused on AP shared inbox fraud controls
    - Pilot to production conversion below 50% after the first 6 pilots
    - More than 10% of covered legitimate requests are unnecessarily held after 60 days of pilot tuning
    - Median added verification time on covered requests stays above 15 minutes in production use
  mermaid: |
    flowchart LR
      Wedge[AP shared inbox wedge] --> MVP[Trust graph and action gating MVP]
      MVP --> Proof[Blocked fraud and audit evidence]
      Proof --> Expansion[More inboxes integrations and workflows]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong pain and a disciplined wedge, but conviction depends on proving low false positives and repeatable controller-led buying in a crowded category.
    whyBelieve: The plan attacks a specific high-loss workflow with a coherent first customer, budget trigger, measurable proof point, and defensible data loop.
    whyDoubt: Broad email-security vendors and payment-validation vendors can compress the standalone window if the product does not show clearly better workflow-specific control and low friction.
    nextDiligence: Validate three paid pilots that show controllers will fund one-inbox deployments and tolerate the hold rate required to prevent fraud.
  firstCustomer:
    title: Controller at a multi-entity mid-market company with a shared AP inbox
    profile: A 700-2,000 employee U.S. software or professional-services company using Microsoft 365, processing more than 150 monthly vendor or urgent-payment requests through one centralized AP mailbox.
    trigger: A recent vendor-spoofing near miss, cyber-insurance renewal, or audit finding makes email-based payment-change controls a budgeted problem now.
    buyer: Controller with CISO co-sponsorship
    initialContract: "$15k-$30k paid pilot on one AP inbox, converting to roughly $30k-$60k annual ACV for one-to-two protected inboxes plus audit evidence and core integrations."
  mustBeTrue:
    - At least half of qualified target accounts must treat AP shared-inbox fraud control as a funded problem after a near miss, insurer review, or audit trigger.
    - A Microsoft 365-first deployment must deliver useful trust-graph decisions in under 30 days without heavy services work.
    - Controllers must tolerate a gated workflow if unnecessary holds stay below about 10% of covered legitimate requests.
    - One AP inbox wedge must convert to at least $30k annual ACV before customers demand a broader email-security platform replacement.
    - Broad email-security and payment-validation incumbents must fail to offer enough finance-specific action gating in live evaluations.
  diligenceQuestions:
    - How many high-risk bank-change, urgent-wire, and payroll-reroute requests hit a target AP inbox each month in practice?
    - Which buyer signs first in real deals after a near miss or audit finding: controller, treasury lead, or CISO?
    - What false-positive rate and added approval latency will finance teams accept before they bypass the product?
    - Which integration matters most in the first production deployment: ERP vendor master, bank-account validation, or identity-based approver mapping?
    - In side-by-side evaluations, where do Abnormal, Material, Ocean, and Trustpair still fail the finance workflow?
operatingAssumptions:
  - assumption: Controllers will buy a narrow action-gating layer if it complements existing email security instead of replacing it.
    basis: research.yaml
    validationTest: Run 12 buyer interviews and 3 pilot design sessions that compare appetite for a narrow AP control layer versus a broader email-security purchase.
    decisionImpact: If false, the company must reposition toward broader security budgets or accept longer, more competitive replacement cycles.
  - assumption: Microsoft 365-first deployment plus vendor-master context is enough to reach the first three paid pilots.
    basis: idea.yaml
    validationTest: Track stack fit across the first 20 qualified opportunities and confirm at least 3 prospects can start without Google Workspace or deep treasury integrations.
    decisionImpact: If false, roadmap and hiring must shift earlier toward additional connectors and implementation support.
  - assumption: Buyers will pay $30k-$60k annual ACV after a paid pilot if the product reduces fraud risk and produces audit evidence.
    basis: research.yaml
    validationTest: Test three package structures in at least 10 budget-owner conversations and secure 2 signed pilots with written conversion expectations in the target range.
    decisionImpact: If false, the company must lower initial scope, lower ACV expectations, or move toward partner-led distribution.
  - assumption: Verified resolution outcomes from early customers will create a differentiated finance-fraud dataset.
    basis: research.yaml
    validationTest: Capture at least 300 reviewed high-risk requests across early pilots and measure whether model or rules quality improves on later cohorts.
    decisionImpact: If false, long-term differentiation shifts away from data moat toward services or channel advantage, weakening venture upside.
  - assumption: Founder-led direct sales can produce the first 5 paid pilots before a scaled enterprise sales team is hired.
    basis: operator judgment
    validationTest: Build a 40-account target list and require at least 5 paid pilots or signed pilot LOIs by month 12.
    decisionImpact: If false, the company should revisit wedge clarity, distribution partners, and burn before adding headcount.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: ICP and workflow-volume discovery
    hypothesis: Target accounts will report enough high-risk AP inbox volume and at least one recent trigger event to justify a paid pilot.
    successMetric: 15 discovery interviews completed with at least 10 matching the target profile and 6 confirming an active buying trigger.
    owner: Founder CEO
  - horizon: "0–90 days"
    experiment: Concierge anomaly-review benchmark
    hypothesis: Trust-graph checks on historical bank-change and urgent-wire requests can identify suspicious cases with meaningfully fewer misses than the team's manual checklist alone.
    successMetric: 2 design partners review at least 25 historical requests each and confirm clear anomaly signal on the highest-risk cases.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Microsoft 365 pilot deployment
    hypothesis: One shared inbox can be deployed and tuned in under 30 days with usable permission setup and auditable evidence capture.
    successMetric: 3 paid pilots launched with median time to first protected inbox under 30 days.
    owner: Product security lead
  - horizon: "90–180 days"
    experiment: Pricing and budget-owner test
    hypothesis: Inbox-plus-workflow pricing converts better than seat pricing because controllers think in terms of risky requests and control scope.
    successMetric: Preferred package wins in at least 6 of 10 pricing conversations and appears in 2 signed pilot scopes.
    owner: Founder CEO
  - horizon: "6–12 months"
    experiment: ERP and bank-validation integration proof
    hypothesis: Adding one ERP evidence path and one bank-validation partner materially improves pilot-to-production conversion.
    successMetric: At least 2 pilots use the integration workflow in production review and convert to annual contracts.
    owner: Product security lead
  - horizon: "12–18 months"
    experiment: Payroll and Google Workspace expansion test
    hypothesis: The same control model extends into payroll reroutes and Google Workspace accounts without unacceptable false positives or deployment drag.
    successMetric: 3 existing customers add a second workflow or platform and maintain production hold rates and latency within target bands.
    owner: Founding eng
operations:
  - Maintain a least-privilege deployment playbook for shared-mailbox permissions, connector health checks, and baseline trust-graph creation.
  - Store every hold, release, callback, and ERP cross-check in an audit-ready evidence log that controllers and auditors can export.
  - Review false positives and bypass behavior weekly during pilots before expanding request classes or customer scope.
  - Use ecosystem partners for mailbox setup, ERP context, and bank-account verification instead of building a services-heavy implementation team.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own design-partner sales, buyer discovery, pricing, and partner development until the controller-led motion is repeatable.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the trust graph, anomaly engine, and workflow controls needed for the first AP inbox proof point.
  - role: Product security lead
    startTiming: Month 2
    rationale: Own Microsoft 365 deployment, policy tuning, audit evidence design, and integration priorities so pilots do not become custom projects.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Shorten pilot setup, manage ERP and bank-validation workflows, and turn early deployments into a standard implementation playbook.
  - role: GTM lead
    startTiming: Month 9
    rationale: Add pipeline capacity only after pilot conversion, pricing, and the first partner-assisted deals show a repeatable sales motion.
milestones:
  - horizon: "0–12 months"
    items:
      - Launch 3 paid pilots on Microsoft 365 AP shared inboxes.
      - Convert at least 2 pilots into annual production contracts.
      - Keep unnecessary holds below 10% of covered legitimate requests in the best-performing pilot cohort.
      - Standardize ERP evidence import and audit-log export for the initial workflow.
  - horizon: "12–24 months"
    items:
      - Reach 10-15 production customers using AP bank-change and urgent-wire controls.
      - Add Google Workspace support and payroll-reroute coverage in live accounts.
      - Establish 2 active partner channels for mailbox setup, audit advisory, or bank validation.
      - Demonstrate deployment in under 30 days without services-heavy customization.
  - horizon: "24–36 months"
    items:
      - Reach roughly 120 customers at blended ACV consistent with the modeled SOM.
      - Expand into procurement, treasury, and additional high-risk inboxes inside existing accounts.
      - Build a cross-customer resolution dataset that improves policy accuracy and customer retention.
      - Show multi-entity expansion inside the best-fit verticals rather than broad SMB penetration.
risks:
  - risk: Incumbent bundling compresses the standalone category before the startup proves a distinct workflow advantage.
    likelihood: High
    impact: High
    mitigation: Win on finance-specific action gating, audit evidence, and relationship memory that gateway vendors and AP suites do not combine well.
  - risk: Finance teams bypass the product during urgent periods if hold rates or latency are too high.
    likelihood: Medium
    impact: High
    mitigation: Limit the wedge to the highest-risk request types, instrument bypass behavior, and enforce explicit latency and false-positive thresholds before expansion.
  - risk: Sparse early training data weakens anomaly quality on new accounts.
    likelihood: Medium
    impact: Medium
    mitigation: Start with deterministic checks around sender history, bank details, and approval paths, then learn from verified outcomes instead of depending on black-box AI from day one.
  - risk: Buyer ownership remains split across controller, treasury, and security teams, slowing deals.
    likelihood: Medium
    impact: Medium
    mitigation: Package the pilot around one inbox, one trigger event, and one evidence story that a controller can own with CISO sponsorship.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund a five-person team to ship the Microsoft 365-first product, land design
    partners, add core ERP and bank-validation integrations, prove low-friction
    AP inbox deployments, and convert the first production customers before
    scaling sales headcount.
