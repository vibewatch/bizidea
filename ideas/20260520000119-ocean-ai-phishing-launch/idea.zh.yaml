problem: 应付账款和薪资团队，至今还在共享收件箱里做公司里最危险的一类决定：一封足够像样的邮件，就可能触发银行账户变更、紧急电汇，或薪资改道。AI 生成的钓鱼邮件已经抹掉了过去那些拼写和语气上的破绽，于是安全邮件网关可能放行，人工回拨清单又会拖慢业务，并在高压时刻被跳过。结果就是，邮件检测工具和真正动钱、开权限的那个操作瞬间之间，出现了一个危险断层。
targetUser:
  primary: 主要用户是中型企业里的应付账款负责人和企业安全团队；这些公司通过 Microsoft 365 或 Google Workspace 共享收件箱处理供应商与薪资变更请求。
  secondary: 次级用户是负责审批付款信息变更的资金运营经理和采购管理员。
  buyer: 典型买方是 500–3,000 人企业里的财务控制负责人，由 CISO 联合赞助。
startupThesis:
  nonObviousInsight: 下一代真正有防守力的邮件安全切口，不是比 Microsoft 或 Proofpoint 更会给每封邮件分类，而是在高风险请求背后记住真实的业务关系；一旦发件人、流程或请求结果偏离这张可信图谱，就直接卡住动作。
  beachhead: 首个滩头市场，是 500–3,000 人规模、采用 Microsoft 365 或 Google Workspace、集中式 AP 共享收件箱、又常常处理供应商银行账户变更或紧急付款请求的多实体软件公司、医疗服务公司和商业服务公司；这些团队通常财务人手都很精简。
  wedge: 切口是一个面向 AP 和薪资共享收件箱的关系感知型控制层：在员工执行邮件前，先核验发件人、请求模式、审批路径和银行信息，是否与过去真实、合法的业务行为一致。
  whyNowCatalyst: Ocean 的发布说明，AI 原生钓鱼防御已经成了一个真实存在的企业品类，原因正是攻击者如今能大规模做个性化，而买方也越来越看重建立在业务上下文上的自主调查。
  ventureScalePath: 先从供应商付款和薪资变更流程切入，再把同一套信任图谱扩到高管助理收件箱、采购、HR、IT 帮助台，最终变成覆盖所有由邮件触发的高风险业务流程的完整邮件动作控制平面。
solution: 产品部署在 AP 和薪资团队使用的 Microsoft 365 或 Google Workspace 共享收件箱里，持续建立一张活的图谱：包括已批准供应商、历史请求模式、常见审批人、已知银行账户，以及可信沟通路径。当邮件要求更新银行信息、发起紧急付款或改道薪资时，系统不会只给这封邮件打一个钓鱼分数；它会先判断请求背后的业务关系到底像不像真的，只要关键上下文是新的或对不上，就先冻结动作。用户会看到调查摘要、具体异常原因，以及带引导的带外核验流程，例如已验证回拨或 ERP 交叉核对，资金没法在核验前流出。安全团队因此多了一层交付后的响应能力，专门处理那些绕过过滤器的诈骗；财务团队则继续在自己已经习惯的收件箱工具里工作。
goToMarketSeed:
  firstCustomer: 第一个客户，应该是 700–2,000 人规模、拥有多家子公司的软件或专业服务公司里的财务控制负责人；这类公司通过 Microsoft 365 的 AP 共享收件箱，每月处理 150+ 次供应商付款或银行账户变更请求，而且至少已经撞见过一次高管冒充或供应商仿冒的险情。
  buyingTrigger: 触发购买的通常是一次差点出事的付款欺诈事件、网络保险续保，或外部审计发现：公司围绕邮件里的银行账户变更和紧急付款请求，核验控制太弱。
  currentAlternative: 现有替代方案包括安全邮件网关、人工回拨清单、ERP 审批流，以及共享收件箱里靠员工自己判断。
  switchingReason: 这个切口抓住的是最贵、也最容易漏过去的那类案例：它把业务关系记忆和动作闸门叠在一起，正卡在财务员工原本要更新银行信息或放款的那一刻。
  pricingHypothesis: 定价假设是按受保护的高风险共享收件箱数量，以及已核验的付款或薪资变更流程量收取年费；ERP 集成和审计证据模块另行溢价。
