differentiator: 大多数邮件安全产品都在网关层优化检测，而 AP 自动化工具默认收件箱本身已经可信。这个公司赢的正是两层之间的空档：它理解一条请求背后的真实供应商关系和财务流程，只要上下文和过往现实对不上，就直接卡住动作。时间一长，护城河会变成一张专有图谱——里面是被验证过的业务关系、异常模式和处置结果，绑定的是最贵的欺诈时刻，而不是泛化的垃圾邮件标签。
