topRisks:
- name: 现有厂商捆绑销售
  description: 网关厂商或 ERP 套件可能补上一些轻量级工作流检查，再借分发能力拖慢市场采用。
  mitigation: 把重心放在交付后的动作控制、已核验关系记忆，以及网关和 ERP 都不擅长掌握的跨收件箱工作流覆盖上。
- name: 财务流程摩擦
  description: 如果核验步骤把延迟拉得太高，AP 团队在季末或紧急付款窗口可能会绕过产品。
  mitigation: 先只覆盖最危险的请求类型，正常流程不碰，并用极小的额外审批时间证明欺诈损失确实下降。
- name: 早期训练数据稀疏
  description: 新客户一开始未必有足够多带标签的欺诈历史，模型很难在第一天就把关系和异常判断准。
  mitigation: 先用确定性的供应商、银行账户和审批路径检查给模型打底，再随着核验结果和分析师反馈逐步学习。
