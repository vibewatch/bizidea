jobsToBeDone:
- job: 当供应商发来新的银行账户或紧急付款请求时，帮 AP 经理核验这项请求是否符合真实的供应商关系，让他们既能放款，也不把公司暴露在仿冒付款欺诈里。
  currentAlternative: 人工回拨清单，加上网关告警和 ERP 审批
  successMetric: 避免的欺诈损失，以及高风险付款变更的核验中位时长
- job: 当薪资或财务团队收到一封号称来自高管的紧急邮件时，帮审批人判断发件人和上下文到底真不真，好让他们在时间很紧的节点也不至于执行冒充请求。
  currentAlternative: 靠员工主观判断，再配合临时性的二次审批
  successMetric: 高管冒充请求上的漏判率，以及做出已核验决定所需时间
