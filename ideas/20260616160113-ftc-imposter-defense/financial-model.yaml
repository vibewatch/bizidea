scenarios:
  downside:
    description: Slower adoption and lower PMPM realization delay the ramp to 15 live institutions by Q4Y3.
    y3RevenueK: 2139.4
    y3EbitdaK: -589.4
    cashLowPointK: 204.3
    keyAssumptionChanges:
    - PMPM pricing realization falls from $0.20 to $0.18 as pilots stay narrower and discounting rises.
    - Customer ramp ends Y3 at 15 live institutions instead of 18 because partner sourcing slips.
    - The core hiring plan stays mostly intact, so lower revenue is only partly offset by cost restraint.
  base:
    description: Two paid pilots convert into a repeatable credit-union workflow and partner-assisted expansion reaches 18 live institutions by Q4Y3.
    y3RevenueK: 2856.1
    y3EbitdaK: -107.1
    cashLowPointK: 732.4
    keyAssumptionChanges:
    - PMPM pricing holds at $0.20 on the average 88.7k-member institution, yielding $212.9K annual ARPU.
    - Customer ramp reaches 2 live institutions at Y1 exit, 8 at Y2 exit, and 18 at Y3 exit.
    - Hiring stays lean until after the first production conversions and the first channel agreement are in hand.
  upside:
    description: Faster channel validation and broader monitored-member rollouts push the company to 20 live institutions and stronger PMPM realization by Q4Y3.
    y3RevenueK: 3610.1
    y3EbitdaK: 403.4
    cashLowPointK: 1207.7
    keyAssumptionChanges:
    - PMPM realization rises from $0.20 to $0.22 as customers enable both wire and ACH coverage on more members.
    - Customer ramp reaches 20 live institutions by Q4Y3 on faster CUSO and platform referrals.
    - The same lean hiring plan supports the upside because deployment patterns standardize quickly.
