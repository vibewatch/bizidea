modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> LiveInstitutions
      LiveInstitutions --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by growing from 2 to 18 live institutions at roughly $212.9K annual ARPU per average credit-union logo.
- checkName: Must go right
  finding: The company must convert both Y1 pilots into production and land at least one partner channel so Y2 can reach 8 live institutions without a bloated GTM team.
- checkName: Model breaks if
  finding: If the sales cycle slips toward 9 months or PMPM realization falls toward $0.18, cash falls close to $200K before the next round is justified.
- checkName: Next-round proof
  finding: The next financing is supported once 8 live institutions, two pilot-to-production conversions, and the first channel-led deployments are live with examiner-ready reporting.
sanityChecks:
  ruleOf40: Y3 growth 198.1% + EBITDA margin -3.7% = 194.4%.
  burnMultiple: Y2 burn multiple 0.7x on ARR expansion, improving to 0.1x in Y3.
  revenuePerFte: $300.6K Y3 revenue per average FTE (benchmark $200-400K SaaS).
  flags:
  - The model assumes the average live institution quickly enables most monitored members; narrower pilot scopes would reduce realized ARPU materially.
  - Cash collections are modeled in-period even though regulated institutions can pay 30-90 days after invoice and procurement delays would hurt runway.
  - Y3 EBITDA is still slightly negative in the base case, so the next round depends more on repeatable distribution proof than on profitability.
  - The initial credit-union beachhead is only a $73.6M SAM, so venture-scale upside still depends on community-bank, adjacent-workflow, or platform-license expansion after Y3.
