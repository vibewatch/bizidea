assumptions:
- id: A1
  name: Model start month
  value: "2026-07"
  unit: YYYY-MM
  source: >-
    [business-plan.yaml date] first full month after the 2026-06-16 plan date.
- id: A2
  name: Opening cash from pre-seed round
  value: "2600"
  unit: USDK
  source: >-
    [business-plan.yaml fundingAsk.targetFundingRangeUsd] sized near the lower-middle of the stated $2-4M range to reach the Y2 milestone plus a 6-month buffer.
- id: A3
  name: Average members per beachhead institution
  value: "88.7"
  unit: K members
  source: >-
    [research.yaml bottomUpSizingDrivers] average member count for the $500M-$5B credit-union beachhead.
- id: A4
  name: Base PMPM subscription price
  value: "0.20"
  unit: USD/member/month
  source: >-
    [business-plan.yaml gtm.pricing] base case uses the midpoint of the stated $0.10-$0.30 PMPM range.
- id: A5
  name: Blended annual ARPU per live institution
  value: "212.9"
  unit: USDK/year
  source: >-
    calc from A3 × A4 × 12; this matches a full wire-and-ACH monitored-member rollout at the average beachhead credit union.
- id: A6
  name: Customer ramp
  value: "2 at Y1 exit, 8 at Y2 exit, 18 at Y3 exit"
  unit: institutions
  source: >-
    [business-plan.yaml milestones; research.yaml market.som] matches 2 paid pilots in year 1, 6-8 live institutions by 24 months, and the research SOM of 18 logos by year 3.
- id: A7
  name: Gross margin target
  value: "70"
  unit: percent
  source: >-
    [business-plan.yaml businessModel.targetGrossMarginPct] modeled as 30% COGS on revenue.
- id: A8
  name: Founder/CEO loaded annual cash cost
  value: "144"
  unit: USDK/year
  source: >-
    startup-finance heuristic: $120K cash salary plus 20% payroll tax and benefits for a pre-seed fintech founder running founder-led sales.
- id: A9
  name: Founding eng loaded annual cash cost
  value: "198"
  unit: USDK/year
  source: >-
    startup-finance heuristic: $165K salary plus 20% load for a senior fintech product engineer.
- id: A10
  name: Fraud ops / compliance lead loaded annual cash cost
  value: "162"
  unit: USDK/year
  source: >-
    [business-plan.yaml team] startup-finance heuristic for an early fraud/compliance workflow lead.
- id: A11
  name: Data / ML engineer loaded annual cash cost
  value: "204"
  unit: USDK/year
  source: >-
    [business-plan.yaml team] startup-finance heuristic for an early detection and data-platform hire.
- id: A12
  name: Partnerships and implementation lead loaded annual cash cost
  value: "156"
  unit: USDK/year
  source: >-
    [business-plan.yaml team] startup-finance heuristic for the month-9 channel and onboarding hire.
- id: A13
  name: First scale hires and timing
  value: "Account executive in M15, integration engineer in M18, customer success / implementation in M20"
  unit: plan
  source: >-
    [business-plan.yaml sequencingRationale + milestones] added only after the first pilots exist and repeatable deployment becomes the bottleneck.
- id: A14
  name: First scale-hire loaded annual cash costs
  value: "AE 168, integration engineer 186, customer success 138"
  unit: USDK/year
  source: >-
    startup-finance heuristic for lean enterprise-fintech scaling hires.
- id: A15
  name: Late Y3 hires and timing
  value: "Second AE in M28, product / risk analyst in M31, operations associate in M34"
  unit: plan
  source: >-
    startup-finance heuristic aligned to the 15+ live-institution milestone and first partner-led expansion.
- id: A16
  name: Late Y3 loaded annual cash costs
  value: "Second AE 162, product / risk analyst 150, operations associate 120"
  unit: USDK/year
  source: >-
    startup-finance heuristic for modest post-product-market-fit scaling.
- id: A17
  name: Non-payroll operating spend
  value: "S&M 6/9/12 plus 0.25/0.30/0.35 per customer monthly; R&D 8/10/12 plus 0.20/0.20/0.25; G&A 7/8/10 plus 0.10/0.10/0.12"
  unit: USDK/month
  source: >-
    startup-finance heuristic for travel, compliance tooling, cloud, legal, audit, and customer support infrastructure.
- id: A18
  name: Monthly logo churn for unit economics
  value: "1.5"
  unit: percent
  source: >-
    startup-finance heuristic for early enterprise fintech with sticky regulated workflows once deployed.
- id: A19
  name: Blended CAC per live institution
  value: "96.8"
  unit: USDK/customer
  source: >-
    calc from modeled Y2-Y3 sales and marketing spend of $1.5495M divided by 16 net new institutions.
- id: A20
  name: Cash-conversion timing
  value: "EBITDA approximates operating cash flow"
  unit: policy
  source: >-
    startup-finance heuristic: no material debt, capex, or working-capital swings are modeled at this stage.
- id: A21
  name: Funding milestone
  value: "8 live institutions, 2 pilot-to-production conversions, 1 CUSO or platform distribution agreement, and examiner-ready reporting in production"
  unit: milestone
  source: >-
    [business-plan.yaml milestones 12-24 months] used to size the current round and the next financing proof point.
