jobsToBeDone:
  - job: >-
      When a member initiates a wire under social-engineering pressure,
      help the fraud team pause the transfer and verify intent, so they
      can prevent losses before the money leaves the institution.
    currentAlternative: Post-transfer manual review and member education materials
    successMetric: Reduction in same-session wire losses attributed to bank impersonation
  - job: >-
      When preparing for an NCUA safety and soundness examination, help
      compliance officers document APP fraud controls, so they can
      demonstrate a reasonable supervisory framework to examiners.
    currentAlternative: Spreadsheet incident logs and generic BSA/AML audit tools
    successMetric: No examination finding related to APP fraud control deficiencies
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      FTC's $3.5B loss figure is authoritative and covers the exact
      impersonation pattern, landing alongside active enforcement actions
      that create an unmistakable timestamped market signal.
  painIntensity:
    score: 5
    rationale: >-
      Credit unions face simultaneous regulatory pressure and direct member
      loss events; a single wire loss triggers examination findings,
      reputational damage, and potential restitution obligations.
  wedgeClarity:
    score: 5
    rationale: >-
      The safe-account transfer signature is narrow, automatable, and
      unaddressed by any incumbent credit union fraud module, making the
      entry wedge unusually crisp and testable.
  defensibility:
    score: 3
    rationale: >-
      Early labeled APP fraud dataset per institution provides a data moat,
      but large fintech vendors such as Fiserv and Jack Henry could bundle a
      competing feature once the market validates at scale.
  ventureScale:
    score: 4
    rationale: >-
      More than 5,000 US credit unions and 4,500 community banks represent
      a large addressable base; expansion to core processor licensing and
      government-impersonation flows adds significant enterprise upside.
topRisks:
  - name: Core processor gatekeeping
    description: >-
      Symitar, Corelation, and other core processors may refuse or delay
      API access, blocking the integration point where interception must
      occur in the payment flow.
    mitigation: >-
      Start with credit unions running digital banking platforms such as
      Alkami and Q2 that expose webhooks independently of the core
      processor, and use CUSO relationships to negotiate preferred-vendor
      status before requesting direct core integration.
  - name: False-positive member friction
    description: >-
      Pausing legitimate transfers will generate member complaints and
      potential churn if the model's false-positive rate is too high at
      launch.
    mitigation: >-
      Launch with a conservative precision threshold that interrupts only
      high-confidence safe-account signatures, publish a contractual FPR
      SLA, and tune aggressively during the first ninety days on live data.
  - name: Regulatory liability ambiguity
    description: >-
      Regulation E and NACHA rules create uncertainty about whether a
      credit union that deploys this tool bears additional liability when
      it has behavioral signals but fails to intercept a fraud event.
    mitigation: >-
      Engage NAFCU's compliance team during the pilot phase to draft a
      member disclosure and liability framework, and position the product
      as a reasonable-control defense rather than an absolute fraud
      guarantee.
