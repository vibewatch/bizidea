problem: >-
  Authorized push payment (APP) fraud is the fastest-growing fraud
  category for US credit unions: the victim is socially engineered to
  initiate the wire themselves, so traditional fraud detection built for
  unauthorized account takeover never triggers. Bank impersonators alone
  drove nearly $1 billion in consumer losses in 2025, yet most credit
  unions rely on post-transfer detection and passive member education. The
  FTC has begun enforcement actions under its Impersonation Rule, raising
  examination risk for any institution that cannot demonstrate active
  behavioral controls at the payment rail.
targetUser:
  primary: "Fraud and compliance officers at US credit unions with $500M–$5B in assets"
  secondary: "Risk officers at community banks subject to FTC Impersonation Rule scrutiny"
  buyer: "VP of Risk or Chief Compliance Officer at a credit union"
startupThesis:
  nonObviousInsight: >-
    Banks have spent a decade hardening account-takeover defenses, but the
    FTC data reveal that the dominant 2025 fraud vector is authorized
    transfer—the customer sends the money willingly under social-engineering
    pressure. Existing fraud stacks are blind to this because they detect
    anomalous authentication, not anomalous authorization context. The
    safe-account transfer signature is narrow and automatable: novel
    external payee, same-session inbound call from a spoofed institution
    number, senior member profile, and urgency signals—a combination no
    incumbent has wired together for credit unions.
  beachhead: >-
    Fraud officers at US credit unions with $500M–$5B in assets that
    process wire and ACH transfers in-house and have received NCUA
    inquiries or member complaints about bank-impersonation wire losses
    in the past twelve months.
  wedge: >-
    A pre-transfer friction layer that intercepts outbound wire and ACH
    transfers matching the safe-account behavioral signature and pauses
    the transaction for in-app member verification plus optional
    credit-union verified-number callback.
  whyNowCatalyst: >-
    The FTC's 2025 Imposter Scam Report quantified a $3.5B loss pool and
    announced twelve enforcement actions in a single release, giving credit
    union compliance officers a documented liability event and a regulator
    expectation of active controls before their next examination.
  ventureScalePath: >-
    Land credit union networks via CUSO distribution, then expand to ACH
    and check APP fraud patterns, broaden to community banks, add a
    consumer identity-verification module for government-impersonation
    flows, and ultimately license behavioral model APIs to core processors
    such as Fiserv and Jack Henry.
solution: >-
  A SaaS API that embeds into a credit union's existing core processor and
  digital banking platform via webhook or SDK to evaluate every outbound
  wire and ACH transfer in real time against a behavioral APP fraud model.
  When a transfer matches the safe-account signature—novel external payee,
  senior member profile, same-session call event, and elevated urgency
  metadata—the platform pauses the transfer, surfaces an in-app
  verification prompt, and optionally triggers an automated callback from
  the credit union's verified number. All events are logged for BSA/AML
  audit trails and NCUA examination readiness. Integration requires no
  core replacement because the API sits between the digital banking layer
  and the payment rail, activating via standard webhooks already exposed
  by platforms such as Alkami and Q2.
goToMarketSeed:
  firstCustomer: >-
    A $1B–$3B US credit union whose fraud officer has received a member
    complaint about a bank-impersonation wire loss in the past six months
    and is preparing for an NCUA safety and soundness examination.
  buyingTrigger: >-
    A high-profile member wire loss attributed to bank impersonation,
    combined with an upcoming NCUA examination where the examiner is
    expected to ask about APP fraud controls.
  currentAlternative: >-
    Manual post-transfer review, passive member education campaigns, and
    generic fraud-detection modules bundled with core processors that do
    not model authorized-transfer behavioral context.
  switchingReason: >-
    The wedge prevents losses before they occur and generates NCUA-ready
    audit logs, whereas the current alternative detects fraud only after
    the money has left and creates no defensible examination record.
  pricingHypothesis: >-
    Per-member-per-month SaaS fee of $0.10–$0.30 PMPM plus a one-time
    integration fee, priced so that preventing a single $50K wire loss
    recoups twelve months of subscription for a 30,000-member institution.
