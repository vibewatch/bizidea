  validationPlan:
  - priority: high
    question: 中型市场信用合作社能否批准为此切入点支付中低六位数的年费？
    evidenceToGather: 与12至15位买家进行访谈，并结合3份与近期冒充事件挂钩的匿名损失审查报告。
  - priority: high
    question: 在658家目标机构中，真正在数字银行或相邻工作流程内控制出站电汇与ACH决策的比例有多大？
    evidenceToGather: 针对至少25家目标信用合作社，开展Q2、Alkami及核心系统覆盖的集成映射。
  - priority: medium
    question: 会员与网点员工在政治层面能够容忍的误报率和回拨验证服务水平协议（SLA）是多少？
    evidenceToGather: 针对高置信度"新收款方+紧迫感"群组开展有限试点，并记录回拨验证结果。
  - priority: medium
    question: 平台方是否倾向于合作、转售，还是自行构建？
    evidenceToGather: 与平台和API生态系统负责人进行商务拓展对话，并审查应用市场准入要求。
