jobsToBeDone:
  - job: >-
      当会员在社会工程压力下发起电汇时，协助欺诈团队暂停转账并核实意向，
      以便在资金离开机构前防止损失。
    currentAlternative: 转账后人工审核与会员教育材料
    successMetric: 同会话内归因于银行冒充的电汇损失减少
  - job: >-
      在为NCUA安全稳健检查做准备时，协助合规官员记录APP欺诈控制措施，
      以便向检查官证明合理的监督框架。
    currentAlternative: 电子表格事件日志和通用BSA/AML审计工具
    successMetric: 无因APP欺诈控制缺陷产生的检查发现
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      FTC的35亿美元损失数据具有权威性，覆盖了确切的冒充模式，并与活跃的执法行动
      同步发布，形成了清晰无误的时间戳市场信号。
  painIntensity:
    score: 5
    rationale: >-
      信用合作社同时面临监管压力和直接会员损失事件；单笔电汇损失即可触发检查发现、
      声誉损伤和潜在赔偿义务。
  wedgeClarity:
    score: 5
    rationale: >-
      安全账户转账特征窄而可自动化，且未被任何现有信用合作社欺诈模块覆盖，
      使得市场切入口异常清晰且可验证。
  defensibility:
    score: 3
    rationale: >-
      各机构的早期已标注APP欺诈数据集构成了数据护城河，但Fiserv和Jack Henry等
      大型金融科技厂商一旦市场规模验证，可能会捆绑竞争性功能。
  ventureScale:
    score: 4
    rationale: >-
      逾5000家美国信用合作社和4500家社区银行构成了庞大的可寻址基础；向核心处理器
      授权和政府冒充欺诈流程扩展，增添了显著的企业级上行空间。
topRisks:
  - name: 核心处理器访问管控
    description: >-
      Symitar、Corelation及其他核心处理器可能拒绝或延迟API访问，阻断支付流中
      必须发生拦截的集成点。
    mitigation: >-
      优先从运行Alkami和Q2等数字银行平台的信用合作社起步，这些平台独立于核心处理器
      开放webhook；并通过CUSO关系争取首选供应商地位，再申请直接核心集成。
  - name: 误报导致的会员摩擦
    description: >-
      如果模型在上线时误报率过高，暂停合法转账将引发会员投诉及潜在流失。
    mitigation: >-
      以保守的精准度阈值启动，仅拦截高置信度的安全账户特征，公布合同级FPR SLA，
      并在投入使用的前九十天内基于实时数据积极调优。
  - name: 监管责任模糊性
    description: >-
      E条例和NACHA规则对信用合作社在部署该工具后、已有行为信号却未能拦截欺诈事件
      时是否承担额外责任存在不确定性。
    mitigation: >-
      在试点阶段与NAFCU合规团队合作，起草会员披露与责任框架，并将产品定位为
      合理控制防御措施，而非绝对欺诈保证。
