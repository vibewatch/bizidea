problem: >-
  授权推送支付（APP）欺诈是美国信用合作社增速最快的欺诈类别：受害者在社会工程手段下
  主动发起转账，因此针对未经授权账户盗用所构建的传统欺诈检测从不触发。仅银行冒充者
  在2025年就造成消费者近10亿美元的损失，但大多数信用合作社仍依赖转账后检测和被动
  会员教育。FTC已依据其《冒充规则》启动执法行动，对无法证明在支付通道具备主动行为
  控制措施的机构提高了检查风险。
targetUser:
  primary: "资产规模5亿至50亿美元的美国信用合作社的欺诈与合规官员"
  secondary: "受FTC《冒充规则》审查的社区银行风险官员"
  buyer: "信用合作社的风险副总裁或首席合规官"
startupThesis:
  nonObviousInsight: >-
    银行花了十年时间强化账户盗用防御，但FTC数据揭示2025年的主要欺诈向量是授权转账——
    客户在社会工程压力下主动汇款。现有欺诈体系对此视而不见，因为它们检测的是异常认证，
    而非异常授权背景。安全账户转账特征窄而可自动化：新外部收款方、同会话内来自伪造机构
    号码的来电、高龄会员档案以及紧迫性信号——这一组合没有任何现有厂商为信用合作社整合。
  beachhead: >-
    资产规模5亿至50亿美元、在内部处理电汇和ACH转账、且在过去十二个月内收到
    NCUA问询或会员投诉（涉及银行冒充电汇损失）的美国信用合作社欺诈官员。
  wedge: >-
    一个转账前摩擦层，拦截符合安全账户行为特征的对外电汇和ACH转账，暂停交易
    进行应用内会员核实，并可选触发信用合作社核实号码的自动回拨。
  whyNowCatalyst: >-
    FTC的2025年冒充诈骗报告量化了35亿美元的损失池，并在单份发布中宣布十二项
    执法行动，为信用合作社合规官员提供了有记录的负债事件，以及监管机构在下次
    检查前对主动控制措施的明确预期。
  ventureScalePath: >-
    通过CUSO分销渠道深入信用合作社网络，随后扩展至ACH和支票APP欺诈模式，
    向社区银行延伸，增加面向政府冒充欺诈流程的消费者身份核实模块，最终将行为
    模型API授权给Fiserv和Jack Henry等核心处理器。
solution: >-
  一款SaaS API，通过webhook或SDK嵌入信用合作社现有核心处理器和数字银行平台，
  对每笔对外电汇和ACH转账进行实时的行为APP欺诈模型评估。当转账与安全账户特征
  匹配——新外部收款方、高龄会员档案、同会话来电事件及较高的紧迫性元数据——
  平台将暂停转账，显示应用内核实提示，并可选触发信用合作社核实号码的自动回拨。
  所有事件均记录入BSA/AML审计日志并做好NCUA检查准备。集成无需替换核心系统，
  因为API位于数字银行层与支付通道之间，通过Alkami和Q2等平台已开放的标准
  webhook激活。
goToMarketSeed:
  firstCustomer: >-
    一家资产规模10亿至30亿美元的美国信用合作社，其欺诈官员在过去六个月内收到
    会员关于银行冒充电汇损失的投诉，并正在为NCUA安全稳健检查做准备。
  buyingTrigger: >-
    一起会员电汇重大损失事件（归因于银行冒充），叠加即将进行的NCUA检查——
    预计检查官将就APP欺诈控制措施提问。
  currentAlternative: >-
    人工转账后审核、被动会员教育活动，以及核心处理器捆绑的通用欺诈检测模块，
    这些模块不对授权转账的行为背景建模。
  switchingReason: >-
    该切入点在损失发生前即予以防范，并生成NCUA就绪的审计日志；而现有替代方案
    仅能在资金离账后检测欺诈，且不产生可供检查的防御记录。
  pricingHypothesis: >-
    每会员每月SaaS费用0.10至0.30美元（PMPM），加一次性集成费；定价标准为：
    拦截单笔5万美元电汇损失所获收益，足以覆盖一家3万会员机构十二个月的订阅费用。
