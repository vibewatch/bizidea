      向有记录的主动控制措施转变，对无法证明具备行为防御能力的机构提高了检查风险。
    signalRefs: ["FTC《冒充规则》执法力度持续升级"]
    sourceRefs: [1]
  - point: >-
      安全账户转账模式是FTC数据中价值最高、最易自动化的欺诈特征，但尚无信用合作社
      核心处理器针对其推出专用拦截层，市场完全向专注的创业公司开放。
    signalRefs: ["安全账户转账是价值最高的攻击向量"]
    sourceRefs: [2]
  - point: >-
      冒充攻击现已通过短信、电话、电子邮件、社交媒体和搜索等渠道发起，使渠道专属
      来电拦截工具趋于过时，催生了在支付通道而非通信渠道部署防御层的需求。
    signalRefs: ["跨渠道冒充攻击超越单渠道防御手段"]
    sourceRefs: [2]
differentiator: >-
  与专为拦截未授权账户盗用而构建的传统欺诈检测工具不同，本平台专为授权推送支付
  欺诈而设计——在会员操作意图发生的瞬间、资金移动之前进行拦截。行为模型针对安全
  账户转账特征进行精准标定：新收款方加通话事件共现加紧迫性信号，这一组合没有任何
  现有厂商为信用合作社落地实施。NCUA检查就绪的审计日志以及零核心替换的API集成，
  进一步降低了相对于遗留核心处理器捆绑欺诈模块的切换成本。
conceptDiagram:
  title: APP欺诈拦截流程
  mermaid: |
    flowchart LR
      Member[信用合作社会员] --> Wire[向新收款方发起\n对外电汇]
      Wire --> Engine[行为APP\n欺诈引擎]
      Engine -->|安全账户匹配| Pause[转账暂停\n显示核实提示]
      Engine -->|不匹配| Clear[转账正常放行]
      Pause --> Callback[自动拨打\n信用社核实电话]
      Callback -->|确认为欺诈| Block[转账拦截\n生成BSA/AML日志]
      Callback -->|会员确认意向| Release[转账放行]
