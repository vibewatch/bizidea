slug: bank-imposter-intercept
date: '2026-06-16'
executiveSummary: >-
  Bank Imposter Intercept should start as a pre-transfer APP fraud interception layer for U.S. credit unions that are already seeing
  member complaints or examination pressure around safe-account scams. The researched pain is real and timely: FTC data says consumers
  reported nearly $1 billion of 2025 losses to bank impersonators, while Federal Reserve survey data says wire and ACH
  account-holder scams are rising across financial institutions. The narrow wedge is not generic scam detection; it is a high-confidence
  pause, in-app verification, and verified-number callback flow on outbound wire and ACH transfers that match a safe-account behavioral
  signature. The first buyer is a VP of Risk or Chief Compliance Officer at a $500M-$5B credit union who needs to show active controls
  after a recent loss event, complaint pattern, or upcoming NCUA review. Product and GTM sequencing should stay disciplined: win first
  on Q2- or Alkami-like extensible digital-banking surfaces, prove low-friction loss prevention and audit logs, then expand through
  CUSO distribution and only later broaden into community banks, adjacent APP workflows, or OEM licensing. Research supports a real but
  not massive beachhead, with an estimated $73.6M SAM and about $2.9M year-3 SOM for the initial credit-union slice, so the venture
  case depends on disciplined expansion rather than the beachhead alone. The biggest disconfirming risks are workflow access, false
  positives that create member friction, and the possibility that broad fraud vendors or platforms package a similar playbook once the
  category is proven. Direct evidence on budget tolerance, deployment access across the full 658-institution beachhead, and partner
  willingness to resell is still incomplete, so those points should be treated as operating assumptions to validate quickly.
problem:
  - "Credit unions lose money and member trust on authorized wire and ACH transfers because customers send funds willingly under bank-impersonation pressure, which bypasses account-takeover-focused fraud systems."
  - "Risk and compliance teams can document incidents after the fact, but most lack a real-time control that pauses high-risk safe-account transfers and produces examiner-ready evidence of intervention."
solution:
  - "Deploy a real-time decision layer between digital banking and the payment rail that scores outbound wire and ACH transfers for safe-account APP fraud using novel-payee, urgency, member-profile, and context signals."
  - "When risk is high, pause the transfer, trigger in-app verification plus an optional callback from the credit union's verified number, and log the full case for complaint handling, BSA/AML review, and exam readiness."
whyWeWin:
  - "The company starts with a narrow workflow where buyer pain, trigger, and proof are all measurable, instead of competing as a generic fraud platform."
  - "A proprietary dataset of paused transfers, callback outcomes, scam narratives, and audit evidence can compound into a workflow and data moat that manual teams, awareness campaigns, and broad suites do not naturally build."
strategicChoices:
  beachhead: "U.S. credit unions with $500M-$5B in assets that run outbound wires and ACH through extensible digital-banking workflows and have recent member complaints, losses, or exam scrutiny tied to impersonation scams."
  wedgeRationale: >-
    This entry point creates faster proof than selling broad scam prevention to all depositories because the customer set is small
    enough to target directly, the pain is acute after a loss or complaint event, and one prevented transfer can pay for the product.
    A narrow safe-account interception flow also reduces false-positive risk compared with applying friction to every payment.
  sequencingRationale: >-
    The product should first ship high-confidence pause, callback, and evidence-capture workflows on accessible Q2- or
    Alkami-like surfaces because deployment access and trust are the gating factors, not raw model novelty. GTM should begin with
    founder-led sales into live loss or exam triggers, add repeatable onboarding and compliance packaging, then layer on CUSO and
    platform partnerships before expanding to community banks, adjacent scam patterns, or core-processor OEM deals.
  notYet:
    - "A consumer-facing scam-protection app sold directly to members"
    - "Broad omnichannel communications monitoring across phone, email, text, and social before payment-rail proof exists"
    - "A full enterprise fraud suite for large banks in the first 12 months"
    - "Community-bank expansion before the credit-union pause-and-callback workflow is repeatable"
market:
  tam: "$222.4M estimated TAM based on 123.5M members at federally insured credit unions above $500M in assets at a modeled $0.15 PMPM."
  sam: "$73.6M estimated SAM for the $500M-$5B beachhead after applying a 70% fit factor for institutions with in-scope workflows and APP pain."
  som: "$2.9M estimated year-3 SOM based on 18 beachhead institutions at roughly 88.7k members each and $1.80 member-year pricing."
  segments:
    - "Primary: U.S. credit unions with $500M-$5B in assets and in-house fraud/compliance ownership of outbound wires and ACH"
    - "Secondary: Community banks and platform partners after the credit-union workflow is proven"
  buyingProcess: >-
    The process usually starts after a member loss, complaint pattern, or exam-preparation cycle makes APP fraud visible to the
    board, CEO, or risk committee. The champion is typically a fraud director or compliance leader, while the economic buyer is the
    VP of Risk or Chief Compliance Officer and digital-banking operations must sign off on workflow changes before a pilot goes live.
product:
  mvp: >-
    MVP is a narrow wire-and-ACH interception layer for high-confidence safe-account patterns: score outbound transfers, pause risky
    cases, trigger in-app verification and verified-number callback, and create an auditable case log. It should exclude broad
    omnichannel monitoring, community-bank variants, and low-confidence rule expansion until the first customers prove acceptable
    friction and measurable saves.
  sixMonth: "Launch 2 paid design-partner pilots on accessible digital-banking surfaces with wire and ACH scoring, pause-and-callback workflow, and examiner-ready case logs."
  twelveMonth: "Convert at least 2 pilots to annual contracts, benchmark false-positive and save rates, and add reusable integrations, dashboards, and complaint-handling workflows for the dominant beachhead stack."
  twentyFourMonth: "Expand to 10-15 production credit unions, add adjacent APP patterns such as check or government-impersonation-linked workflows, and secure the first platform, CUSO, or OEM-style distribution deal."
  keyBets:
    - "A narrow safe-account signature can deliver enough precision to justify pre-transfer friction."
    - "Digital-banking integration surfaces are open enough to support repeatable deployment without core replacement."
    - "Audit-ready evidence and complaint-handling workflows matter enough to buyers to convert a loss-prevention tool into recurring budget."
    - "Credit-union-specific workflow depth can beat broader vendors before platforms package a comparable playbook."
gtm:
  wedge: "Sell a paid pilot that stops high-confidence safe-account wire and ACH scams for a credit union immediately after a loss event or before an NCUA review, then convert that pilot into an annual monitored-control contract."
  channels:
    - "Founder-led direct outbound to fraud, risk, and compliance leaders at target credit unions"
    - "CUSO and credit-union association relationships for referrals and scaled trust"
    - "Platform and API-ecosystem partnerships with digital-banking and core-adjacent providers such as Q2, Alkami, and Fiserv"
  funnelTargets: "Lead→qualified pilot 15-25%, qualified pilot→paid pilot 30-40%, paid pilot→production 50%+, and production→second-workflow or second-logo referral expansion 30%+ within 12 months."
  pricing: "Charge a $0.10-$0.30 PMPM subscription plus a one-time integration fee, because pricing by protected member base matches how credit unions budget recurring controls and lets one prevented $50K loss justify a year of spend for a mid-sized institution."
businessModel:
  revenueStreams:
    - "Recurring PMPM SaaS subscription for monitored members and active decisioning workflows"
    - "One-time implementation and integration fees"
    - "Future platform or OEM licensing for behavioral decisioning APIs and adjacent APP modules"
  unitOfValue: "Protected member account with outbound wire and ACH monitoring enabled"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Expand from one institution's wire workflow into ACH, check, and additional scam typologies"
    - "Land one credit union and expand through peer references, CUSOs, and league relationships"
    - "Package the decisioning API and audit layer for platform or core-processor distribution"
    - "Broaden from credit unions into community banks after repeatable deployment proof"
strategyMap:
  northStarMetric: "Confirmed APP scam dollars prevented per live institution at an acceptable member-friction rate"
  inputMetrics:
    - "Paid pilots signed"
    - "High-risk transfer pause rate"
    - "Pilot false-positive rate on paused transfers"
    - "Confirmed scam saves per institution"
    - "Pilot-to-production conversion rate"
    - "Time to first prevented-loss or exam-readiness proof point"
  moatsToBuild:
    - "Dataset linking paused transfers, callback outcomes, member narratives, and confirmed scam disposition"
    - "Reusable credit-union workflow templates for hold, verification, complaint handling, and examiner reporting"
    - "Partner and integration position inside digital-banking money-movement surfaces"
  killCriteria:
    - "Fewer than 2 paid pilots signed after 9 months of focused selling into the beachhead"
    - "False-positive pauses stay above 1% of monitored outbound transfers in early pilots or pilot customers refuse production because member friction is too high"
    - "Fewer than half of paid pilots convert to annual production even after at least one documented prevented-loss or exam-readiness outcome"
  mermaid: |
    flowchart LR
      Wedge[Credit-union safe-account wedge] --> MVP[Pause and callback MVP]
      MVP --> Proof[Prevented-loss and audit proof]
      Proof --> Expansion[ACH, new scam types, and partner distribution]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Moderate conviction: the pain and wedge are real, but the investment case depends on proving low-friction deployment and distribution beyond a modest initial beachhead."
    whyBelieve: "The company targets a quantified loss category with a concrete first buyer, a narrow workflow that can show ROI on one saved transfer, and visible whitespace between education campaigns and generic fraud suites."
    whyDoubt: "Platform dependence, ambiguous buyer urgency outside recent loss events, and credible adjacent competitors could cap growth before a durable moat forms."
    nextDiligence: "The next proof point is 2 paid pilots on live wire or ACH workflows that demonstrate acceptable false positives, at least one documented save or exam-readiness win, and a credible conversion path to annual contracts."
  firstCustomer:
    title: "VP of Risk or Chief Compliance Officer at a $1B-$3B U.S. credit union"
    profile: "Runs fraud and compliance for a credit union with in-house wire and ACH operations, an older member base or complaint exposure, and a digital-banking stack that allows workflow intervention near money movement."
    trigger: "A recent bank-impersonation member loss or a cluster of safe-account complaints ahead of an NCUA examination or board review."
    buyer: "VP of Risk or Chief Compliance Officer"
    initialContract: "$25K-$75K paid pilot plus integration, converting to roughly low- to mid-six-figure annual spend on PMPM pricing if the pilot shows prevented losses and acceptable member friction."
  mustBeTrue:
    - "At least a meaningful minority of target credit unions can deploy the pause-and-callback workflow without waiting for a core replacement or bespoke multi-quarter integration."
    - "High-confidence safe-account detection can keep false-positive pauses low enough that branch, member-support, and executive stakeholders accept production rollout."
    - "A recent loss event, complaint pattern, or exam cycle is strong enough to unlock low- to mid-six-figure annual budget for a standalone control."
    - "The first 10 customers generate proprietary case and outcome data that improves decisioning faster than platform or fraud-suite competitors can copy the playbook."
    - "CUSO, platform, or peer-reference channels can expand distribution before the 658-institution beachhead is exhausted by founder-led selling alone."
  diligenceQuestions:
    - "What percentage of the 658 beachhead credit unions actually control outbound wire and ACH decisioning on surfaces the startup can access?"
    - "What false-positive threshold is politically tolerable for members, branches, and executives on paused urgent transfers?"
    - "How often does a recent impersonation loss or complaint event translate into approved software budget rather than more training or manual callbacks?"
    - "Why will buyers adopt this workflow instead of waiting for BioCatch, ThreatMark, Featurespace, Q2, or Alkami to package a similar control?"
    - "What evidence will an examiner or board actually value most: documented saves, case logs, complaint handling, or broader fraud-program reporting?"
operatingAssumptions:
  - assumption: "Mid-market credit unions with recent impersonation losses will fund a standalone APP control at low- to mid-six-figure annual spend."
    basis: research.yaml
    validationTest: "Run 12-15 buyer interviews and close at least 2 paid pilots where buyers explicitly accept the PMPM-to-annual pricing path."
    decisionImpact: "If false, the company must shift toward channel resale, managed service packaging, or a lower-ACV wedge."
  - assumption: "A large enough share of the beachhead runs on Q2-, Alkami-, or similar workflows that permit repeatable intervention near money movement."
    basis: research.yaml
    validationTest: "Map integration ownership for 25 target institutions and confirm that at least 60% fit one of the first 3 supported deployment patterns."
    decisionImpact: "If false, narrow the ICP to one platform ecosystem or pursue OEM distribution earlier."
  - assumption: "High-confidence rules plus callback workflow can hold false-positive pauses to a level customers will tolerate."
    basis: idea.yaml
    validationTest: "Pilot on historical and live high-risk cohorts and show paused-transfer false positives below the threshold agreed in pilot success criteria."
    decisionImpact: "If false, keep the product in assisted-review mode, narrow scope further, or abandon the pre-transfer wedge."
  - assumption: "CUSOs, associations, and platform ecosystems will prefer to partner or refer before they build the workflow themselves."
    basis: operator judgment
    validationTest: "Secure 5 partnership meetings and at least 1 signed referral, marketplace, or co-sell agreement within the first 12 months."
    decisionImpact: "If false, growth remains founder-led longer and the company should reduce headcount plans and reset the expansion timeline."
  - assumption: "Audit-ready logs and complaint-handling workflows materially improve win rate versus selling only a fraud score."
    basis: research.yaml
    validationTest: "In win-loss reviews across the first 6 opportunities, confirm that compliance and exam-readiness features are cited in at least half of positive buying decisions."
    decisionImpact: "If false, simplify the roadmap toward pure loss-prevention workflow and deprioritize heavier compliance packaging."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Loss-triggered buyer discovery"
    hypothesis: "Recent impersonation losses or complaint clusters create enough urgency to move buyers from interest to paid pilot."
    successMetric: "12 qualified buyer meetings, 4 pilot proposals, and 2 paid pilots in the target asset band."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Integration-footprint mapping"
    hypothesis: "A small set of digital-banking and money-movement surfaces covers a majority of the reachable beachhead."
    successMetric: "Platform maps for 25 target institutions show at least 60% fit one of the first 3 supported deployment patterns."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "High-confidence pause pilot"
    hypothesis: "A narrow safe-account ruleset can prevent losses without creating unacceptable friction."
    successMetric: "First live pilot reaches the agreed false-positive threshold and documents at least 1 prevented-loss or high-confidence intercepted scam case."
    owner: "Fraud ops lead"
  - horizon: "90-180 days"
    experiment: "Exam-readiness packaging test"
    hypothesis: "Compliance buyers value case logs, callback evidence, and complaint-handling reports enough to support production conversion."
    successMetric: "At least 1 pilot buyer cites examiner or board-readiness artifacts as a reason to move toward annual rollout."
    owner: "Founder/CEO"
  - horizon: "180-360 days"
    experiment: "CUSO and platform channel validation"
    hypothesis: "Partner channels can produce qualified opportunities faster than pure founder-led outbound once the first pilot proof exists."
    successMetric: "2 active referral or co-sell partners and at least 3 partner-sourced qualified opportunities."
    owner: "Partnerships lead"
  - horizon: "180-540 days"
    experiment: "Adjacent-workflow expansion"
    hypothesis: "Existing customers will buy adjacent APP workflows after the initial wire-and-ACH use case proves itself."
    successMetric: "2 production customers adopt a second workflow or second scam pattern module within 6 months of go-live."
    owner: "Product lead"
operations:
  - "Run weekly case reviews with each pilot institution covering paused transfers, callback outcomes, complaint escalations, and tuning decisions."
  - "Maintain integrations with digital-banking, money-movement, and case-management systems as core product infrastructure rather than bespoke services work."
  - "Ship standard examiner-ready reporting, callback scripts, and member-support playbooks so compliance teams can operationalize the control quickly."
  - "Use partner qualification criteria that prioritize workflow access and distribution leverage over broad logo count."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Owns founder-led sales, risk-buyer discovery, pilot packaging, and early partner development while the category is still being defined."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Builds the scoring, pause, callback orchestration, and first reusable integrations that determine deployment speed."
  - role: "Fraud ops / compliance lead"
    startTiming: "Month 2"
    rationale: "Designs case workflows, examiner reporting, callback process, and pilot success criteria with customer risk teams."
  - role: "Data / ML engineer"
    startTiming: "Month 4"
    rationale: "Improves detection precision, labels pilot outcomes, and turns early case data into a repeatable model asset."
  - role: "Partnerships and implementation lead"
    startTiming: "Month 9"
    rationale: "Owns CUSO, platform, and marketplace motion plus standardized onboarding once the first production pattern is proven."
milestones:
  - horizon: "0-12 months"
    items:
      - "Close 2 paid pilots at $1B-$3B credit unions with recent impersonation-loss or exam-readiness triggers."
      - "Deploy the first repeatable wire-and-ACH pause-and-callback workflow on one accessible digital-banking stack."
      - "Document at least 1 prevented-loss or equivalent high-confidence interception case and 1 exam-readiness artifact that matters to a buyer."
  - horizon: "12-24 months"
    items:
      - "Convert at least 2 pilots to annual production contracts and reach 6-8 live institutions."
      - "Add the dominant beachhead integration patterns, complaint-handling dashboards, and benchmark reporting."
      - "Secure at least 1 CUSO, marketplace, or co-sell distribution agreement."
  - horizon: "24-36 months"
    items:
      - "Reach 15+ live institutions across credit unions and initial community-bank or partner-led expansion."
      - "Launch adjacent APP modules or decisioning APIs that increase ACV beyond the initial wire-and-ACH wedge."
      - "Demonstrate that partner channels and product expansion can grow beyond the initial credit-union beachhead economics."
risks:
  - risk: "Platform and workflow access is narrower than public API materials imply, delaying deployment or forcing custom integrations."
    likelihood: High
    impact: High
    mitigation: "Start on the most extensible digital-banking surfaces, standardize only a few supported deployment patterns, and pursue channel agreements before broad ICP expansion."
  - risk: "False-positive pauses create member friction and internal political backlash before enough prevented-loss proof accumulates."
    likelihood: Medium
    impact: High
    mitigation: "Launch with conservative thresholds, human review, and explicit pilot success criteria for pause rate, callback SLA, and complaint handling."
  - risk: "Broad fraud vendors or platform incumbents package a similar safe-account control once the use case proves demand."
    likelihood: Medium
    impact: High
    mitigation: "Differentiate on credit-union-specific workflows, faster deployment, proprietary case data, and partner position rather than on generic scoring alone."
  - risk: "Buyer urgency remains episodic because some institutions respond to impersonation losses with education or manual processes instead of software budget."
    likelihood: Medium
    impact: Medium
    mitigation: "Target institutions with recent losses, complaint patterns, or exam cycles first and prove ROI on prevented losses plus compliance outcomes before broadening outbound."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of runway to build the first repeatable integrations and fraud workflow, close and support 2-4 paid pilots, convert early production customers, and validate partner-led distribution before larger expansion hiring."
