modelDiagram:
  title: 单位经济学流程
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> LiveInstitutions
      LiveInstitutions --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 营收引擎
  finding: 基础情景营收由在线机构从2家增长至18家驱动，平均信用合作社客户年度ARPU约为21.29万美元。
- checkName: 必须正确的假设
  finding: 公司必须将Y1的两个试点均转化为生产环境，并签署至少一个合作伙伴渠道，才能在不扩充GTM团队的情况下在Y2达到8家在线机构。
- checkName: 模型失效条件
  finding: 若销售周期延长至接近9个月，或PMPM实现率下降至接近0.18美元，则在下一轮融资条件成立之前，现金余额将跌近20万美元。
- checkName: 下一轮融资验证
  finding: 一旦8家在线机构、两次试点转生产环境及首批渠道主导部署均上线且具备监管就绪报告，下一轮融资即具备支撑条件。
sanityChecks:
  ruleOf40: Y3增长率198.1% + EBITDA利润率-3.7% = 194.4%。
  burnMultiple: Y2 ARR扩张的烧钱倍数为0.7倍，Y3改善至0.1倍。
  revenuePerFte: Y3平均每名全职员工营收30.06万美元（SaaS行业基准20-40万美元）。
  flags:
  - 模型假设平均在线机构快速启用大多数受监控会员；更窄的试点范围将实质性降低实现的ARPU。
  - 现金收款按期内建模，尽管受监管机构可能在发票后30-90天付款，采购延迟将损害资金跑道。
  - 基础情景下Y3 EBITDA仍略为负值，因此下一轮融资更多取决于可复制的分发验证而非盈利能力。
  - 初始信用合作社滩头阵地的SAM仅为7360万美元，因此风险投资规模的上行空间仍取决于Y3后的社区银行、相邻工作流或平台授权扩展。
