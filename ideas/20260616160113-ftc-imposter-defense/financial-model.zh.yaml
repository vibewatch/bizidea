scenarios:
  downside:
    description: 采用放缓与PMPM实现率下降导致第三年Q4达到15家在线机构的节奏延迟。
    y3RevenueK: 2139.4
    y3EbitdaK: -589.4
    cashLowPointK: 204.3
    keyAssumptionChanges:
    - PMPM定价实现率从0.20美元降至0.18美元，因试点范围维持较窄且折扣增加。
    - 由于合作伙伴获客进展滞后，客户增长在Y3末仅达15家在线机构而非18家。
    - 核心招聘计划基本维持不变，因此收入下降仅部分被成本控制抵消。
  base:
    description: 两个付费试点转化为可复制的信用合作社工作流，合作伙伴辅助扩展在第三年Q4达到18家在线机构。
    y3RevenueK: 2856.1
    y3EbitdaK: -107.1
    cashLowPointK: 732.4
    keyAssumptionChanges:
    - PMPM定价在平均8.87万会员机构上维持0.20美元，年度ARPU为21.29万美元。
    - 客户增长节奏：Y1末2家、Y2末8家、Y3末18家在线机构。
    - 在首批生产转化及首个渠道协议落地之前，招聘保持精简。
  upside:
    description: 更快的渠道验证与更广泛的受监控会员铺开推动公司在第三年Q4达到20家在线机构及更强的PMPM实现率。
    y3RevenueK: 3610.1
    y3EbitdaK: 403.4
    cashLowPointK: 1207.7
    keyAssumptionChanges:
    - 随着客户对更多会员开启电汇与ACH覆盖，PMPM实现率从0.20美元升至0.22美元。
    - 借助更快的CUSO和平台转介绍，客户增长在第三年Q4达到20家在线机构。
    - 由于部署模式快速标准化，相同的精简招聘计划即可支撑上行情景。
