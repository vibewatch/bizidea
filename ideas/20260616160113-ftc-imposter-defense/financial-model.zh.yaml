slug: bank-imposter-intercept
date: '2026-06-16'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: "2026-07"
  unit: YYYY-MM
  source: >-
    [business-plan.yaml date] 2026-06-16计划日期后的第一个完整月份。
- id: A2
  name: 天使轮融资期初现金
  value: "2600"
  unit: USDK
  source: >-
    [business-plan.yaml fundingAsk.targetFundingRangeUsd] 按声明的200万至400万美元区间的中低档定规模，以支撑Y2里程碑加6个月缓冲期。
- id: A3
  name: 每家滩头机构平均会员数
  value: "88.7"
  unit: K members
  source: >-
    [research.yaml bottomUpSizingDrivers] 5亿至50亿美元信用合作社滩头阵地的平均会员数。
- id: A4
  name: 基础PMPM订阅单价
  value: "0.20"
  unit: USD/member/month
  source: >-
    [business-plan.yaml gtm.pricing] 基础情景采用声明的0.10至0.30美元PMPM区间的中点值。
- id: A5
  name: 每家在线机构综合年度ARPU
  value: "212.9"
  unit: USDK/year
  source: >-
    由A3 × A4 × 12计算得出；对应平均滩头信用合作社完整电汇与ACH受监控会员的全量铺开。
- id: A6
  name: 客户增长节奏
  value: "Y1末2家，Y2末8家，Y3末18家"
  unit: institutions
  source: >-
    [business-plan.yaml milestones; research.yaml market.som] 对应第一年2个付费试点、24个月内6-8家在线机构，以及研究报告中第三年18个客户的SOM目标。
- id: A7
  name: 目标毛利率
  value: "70"
  unit: percent
  source: >-
    [business-plan.yaml businessModel.targetGrossMarginPct] 按营收的30%建模为销货成本。
- id: A8
  name: 创始人/首席执行官综合年度现金成本
  value: "144"
  unit: USDK/year
  source: >-
    初创财务经验法则：12万美元现金薪资加20%薪酬税及福利，适用于主导创始人销售的天使轮金融科技创始人。
- id: A9
  name: 联合创始工程师综合年度现金成本
  value: "198"
  unit: USDK/year
  source: >-
    初创财务经验法则：16.5万美元薪资加20%附加成本，适用于资深金融科技产品工程师。
- id: A10
  name: 欺诈运营/合规负责人综合年度现金成本
  value: "162"
  unit: USDK/year
  source: >-
    [business-plan.yaml team] 初创财务经验法则，适用于早期欺诈/合规工作流负责人。
- id: A11
  name: 数据/机器学习工程师综合年度现金成本
  value: "204"
  unit: USDK/year
  source: >-
    [business-plan.yaml team] 初创财务经验法则，适用于早期检测与数据平台岗位招聘。
- id: A12
  name: 合作伙伴与落地负责人综合年度现金成本
  value: "156"
  unit: USDK/year
  source: >-
    [business-plan.yaml team] 初创财务经验法则，适用于第9个月的渠道与客户导入岗位招聘。
- id: A13
  name: 首批规模化招聘计划与时间安排
  value: "客户主管（M15）、集成工程师（M18）、客户成功/实施（M20）"
  unit: plan
  source: >-
    [business-plan.yaml sequencingRationale + milestones] 仅在首批试点存在且可复制部署成为瓶颈后才加入。
- id: A14
  name: 首批规模化招聘综合年度现金成本
  value: "客户主管 168，集成工程师 186，客户成功 138"
  unit: USDK/year
  source: >-
    初创财务经验法则，适用于精益型企业金融科技规模化招聘。
- id: A15
  name: Y3后期招聘计划与时间安排
  value: "第二客户主管（M28）、产品/风险分析师（M31）、运营专员（M34）"
  unit: plan
  source: >-
    初创财务经验法则，与15家以上在线机构里程碑及首次合作伙伴主导的扩张相对应。
- id: A16
  name: Y3后期招聘综合年度现金成本
  value: "第二客户主管 162，产品/风险分析师 150，运营专员 120"
  unit: USDK/year
  source: >-
    初创财务经验法则，适用于产品市场契合后的适度规模化扩展。
- id: A17
  name: 非薪酬运营支出
  value: "销售与营销 6/9/12加每客户每月0.25/0.30/0.35；研发 8/10/12加0.20/0.20/0.25；行政管理 7/8/10加0.10/0.10/0.12"
  unit: USDK/month
  source: >-
    初创财务经验法则，涵盖差旅、合规工具、云服务、法律、审计及客户支持基础设施。
- id: A18
  name: 单位经济学月度客户流失率
  value: "1.5"
  unit: percent
  source: >-
    初创财务经验法则，适用于部署后具有高黏性监管工作流的早期企业级金融科技。
- id: A19
  name: 每家在线机构综合客户获取成本
  value: "96.8"
  unit: USDK/customer
  source: >-
    由Y2-Y3销售与营销支出模型值154.95万美元除以16家净新增机构计算得出。
- id: A20
  name: 现金转换时机
  value: "EBITDA近似等于经营现金流"
  unit: policy
  source: >-
    初创财务经验法则：本阶段不对重大债务、资本支出或营运资本波动进行建模。
- id: A21
  name: 融资里程碑
  value: "8家在线机构、2次试点转生产环境转化、1个CUSO或平台分发协议，以及生产环境中的监管就绪报告"
  unit: milestone
  source: >-
    [business-plan.yaml milestones 12-24 months] 用于确定本轮融资规模及下一轮融资验证节点。
