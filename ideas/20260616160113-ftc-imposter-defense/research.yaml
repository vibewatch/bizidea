openQuestions:
- What share of the 658 target credit unions actually controls outbound wire and ACH decisioning inside digital banking rather than in a core or processor queue?
- What false-positive rate and callback SLA will VPs of risk accept before member friction becomes politically costly?
- Will Q2, Alkami, or other platform owners prefer to partner, resell, or build similar controls once demand is proven?
- How many institutions in the asset-band beachhead have recent impersonation-loss history strong enough to justify a low- to mid-six-figure annual budget?
