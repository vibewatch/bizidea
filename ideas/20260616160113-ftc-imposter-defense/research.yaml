  validationPlan:
  - priority: high
    question: Can a mid-market credit union approve low- to mid-six-figure annual spend for this wedge?
    evidenceToGather: Twelve to fifteen buyer interviews and three anonymized loss reviews tied to recent impersonation incidents.
  - priority: high
    question: What share of the 658 target institutions truly controls outbound wire and ACH decisioning inside digital banking or an adjacent workflow?
    evidenceToGather: Integration mapping across Q2, Alkami, and core footprints for at least 25 target credit unions.
  - priority: medium
    question: What false-positive rate and callback SLA is politically tolerable with members and branch staff?
    evidenceToGather: A limited pilot on high-confidence novel-payee plus urgency cohorts with measured callback outcomes.
  - priority: medium
    question: Will platforms prefer partnership or build?
    evidenceToGather: Business-development conversations with platform and API ecosystem owners plus marketplace requirement reviews.
