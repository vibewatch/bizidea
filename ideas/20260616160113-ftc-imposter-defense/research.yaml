competitors:
- name: BioCatch
  stage: scale-up
  wedge: Behavioral scam detection for banks, including impersonation and social-engineering attacks.
  pricing: Custom enterprise quote
  strength: Strong behavioral signal set and explicit scam-detection positioning.
  weaknessVsUs: Broad-bank platform approach still needs credit-union-specific pause/callback workflow and exam packaging.
  sourceRefs:
  - 28
  - 29
- name: ThreatMark
  stage: scale-up
  wedge: AI-powered omnichannel scam detection that can analyze screenshots and deceptive content inside banking apps.
  pricing: Priced based on the size of the user base
  strength: Strong cross-channel scam identification and member-facing UX.
  weaknessVsUs: More evidence-submission and content-analysis oriented than always-on rail interception for outbound wires and ACH.
  sourceRefs:
  - 30
  - 31
- name: Featurespace
  stage: scale-up
  wedge: Payment-fraud analytics with APP-fraud relevance and enterprise bank focus.
  pricing: Custom enterprise quote
  strength: Strong payment-fraud brand and adjacency to APP detection.
  weaknessVsUs: Public positioning is broader payment fraud rather than a packaged credit-union safe-account intercept workflow.
  sourceRefs:
  - 32
- name: Alkami
  stage: incumbent
  wedge: Digital banking platform with APIs and SDKs for extending workflows.
  pricing: Custom platform pricing
  strength: Owns integration surface at many retail financial institutions.
  weaknessVsUs: Extensibility is not the same as an out-of-the-box scam-specific decision engine and case workflow.
  sourceRefs:
  - 35
  - 36
  - 37
- name: Q2
  stage: incumbent
  wedge: Digital banking platform with innovation studio and money-movement modules.
  pricing: Custom platform pricing
  strength: Deep placement in community and regional FI digital workflows.
  weaknessVsUs: Public materials emphasize platform openness and instant payments, not a dedicated safe-account APP interception product for credit unions.
  sourceRefs:
  - 33
  - 34
