  round: "seed"
  amountM: 3.0
  runwayMonths: 18
  milestone: "做到 8 家付费客户，证明至少 2 个可作参考的年度转化，并建起一套可复制的、合作伙伴协助的修复工作流，同时保留六个月现金缓冲。"
