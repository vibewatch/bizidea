modelSanity:
  - checkName: "收入引擎"
    finding: "基准情景收入来自 Q4Y3 的 12 家付费客户，每家从约 $105K 试点进入约 $390K 生产 ARR，再在同一客户内加上扩张模块。"
  - checkName: "必须做对"
    finding: "公司必须把部署做得足够产品主导，才能让毛利率从第 1 年末以试点为主的 50% 出头，爬到第 3 年末的约 70%。"
  - checkName: "模型崩在哪"
    finding: "若销售周期滑向 9-10 个月、成熟 ACV 停在约 $480K，下行现金会在业务达到规模化软件经济之前跌破 $0.2M。"
  - checkName: "下一轮证明"
    finding: "当 Q4Y2 显示 8 家付费客户、2 个可作参考的年度转化，以及支撑第 3 年增长、又不带服务重烧钱特征的合作伙伴管线时，下一轮融资就说得通了。"
sanityChecks:
  ruleOf40: "第 3 年增长 85.7% + EBITDA 利润率 0.4% = 86.2%"
  burnMultiple: "第 2 年烧钱倍数 0.3x（-$0.64M EBITDA 对 $2.10M 净新增收入）。"
  revenuePerFte: "第 3 年每位年末 FTE $363K（基准约为企业 SaaS 的 $200-400K）"
  flags:
    - "模型依赖成熟客户扩张到基础订阅之上，进入高级模块或第二个受治理组合。"
    - "对创始人主导的企业销售动作来说，Q4Y2 做到 8 家付费客户很激进，留给采购拖延的余地有限。"
    - "第 3 年 EBITDA 只在盈亏平衡附近，所以任何持续的服务重上手，都可能逼公司比基准情景更早再融一轮。"
