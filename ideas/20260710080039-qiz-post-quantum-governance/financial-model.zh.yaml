slug: "crypto-debt-command-center"
date: "2026-07-10"
currency: "USD"
modelStartMonth: "2026-08"
assumptions:
  - id: "A1"
    name: "模型起始月份"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-10] 模型从带日期的商业计划之后的第一个完整运营月开始。"
  - id: "A2"
    name: "期初现金 / 种子轮融资"
    value: "$3.0M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $3–5M + model cash curve] 基准情景采用所述种子轮区间的下限，因为招聘按里程碑放开，且公司在第 3 年逼近 EBITDA 盈亏平衡。"
  - id: "A3"
    name: "起始付费客户数"
    value: "0"
    unit: "count"
    source: "[BP executiveSummary + BP milestones 0–12 months] 公司从零收入起步，必须先拿下付费试点。"
  - id: "A4"
    name: "客户定义"
    value: "处于试点或年度生产部署中、活跃付费的一个企业客户"
    unit: "definition"
    source: "[BP gtm.pricing + BP market.som] customersEop 统计付费客户数，而客户内部扩张会随时间抬高 ARPU。"
  - id: "A5"
    name: "付费试点经济"
    value: "约 3 个月 $105K（约 $35K/月）"
    unit: "USD/logo"
    source: "[BP gtm.pricing $75k-$150k for 8-12 weeks] 模型采用接近中点的试点套餐。"
  - id: "A6"
    name: "初始生产合同"
    value: "$390K ARR（约 $32.5K/月）"
    unit: "USD/logo/year"
    source: "[BP gtm.pricing $250k-$500k annual subscription + Research market.sam roughly $500K first-program ACV] 基准情景在证明和模块累积之前，落在研究 ACV 锚点之下。"
  - id: "A7"
    name: "扩张后的成熟合同"
    value: "$510K ARR（约 $42.5K/月）"
    unit: "USD/logo/year"
    source: "[BP gtm.pricing + BP businessModel expansion levers + Research market.som roughly $400K blended ACV] 成熟客户通过第二个组合和高级模块扩张到基础订阅之上，而整体第 3 年混合仍贴近研究锚点。"
  - id: "A8"
    name: "客户启动排期"
    value: "M6, M9, M11, M13, M15, M18, M20, M22, M26, M29, M32, M35"
    unit: "month index"
    source: "[BP product sixMonth/twelveMonth + BP milestones + Research market.som 12 reachable logos] 基准情景在 M12 达到 3 家付费客户，Q4Y2 达到 8 家，Q4Y3 达到 12 家。"
  - id: "A9"
    name: "毛利率爬坡"
    value: "早期试点 48%，第 1 年末 55%，第 2 年 58-68%，第 3 年 69-71%"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices sequencingRationale + BP risks on services-heavy onboarding] 随着连接器和修复打法减少定制交付工作，毛利率逐步改善。"
  - id: "A10"
    name: "企业销售周期锚点"
    value: "6-9 个月，试点转年度的转化率达到或高于 BP 的 50% 下限"
    unit: "months / conversion"
    source: "[BP market.buyingProcess + BP gtm.funnelTargets] 客户启动排期假设的是有完成态势评估、且承受董事会压力的被触发客户。"
  - id: "A11"
    name: "招聘时间线"
    value: "M1 创始人与创始工程师；M4 平台与解决方案；M7 产品/安全 PM；M13 销售；M16 第二位平台；M18 第二位解决方案；M20 第二位工程师；M24 运营；M27 第三位工程师；M30 第二位销售；M32 第四位工程师"
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 招聘保持在收入证明和合作伙伴动作证明之后。"
  - id: "A12"
    name: "创始人全成本薪酬"
    value: "$180.0K"
    unit: "USD/year"
    source: "[BP team Founder/CEO + startup-finance heuristic] 精简的创始人现金薪酬，已含税费和福利。"
  - id: "A13"
    name: "工程全成本薪酬"
    value: "$210.0K per FTE"
    unit: "USD/year"
    source: "[BP team Founding eng + startup-finance heuristic] 反映资深图谱、工作流和基础设施工程人才。"
  - id: "A14"
    name: "平台/集成全成本薪酬"
    value: "$195.0K per FTE"
    unit: "USD/year"
    source: "[BP team Platform/integration engineer + startup-finance heuristic] 该岗位必须负责 F5、NGINX、CLM、CMDB 和工单连接器。"
  - id: "A15"
    name: "解决方案/客户成功全成本薪酬"
    value: "$175.0K per FTE"
    unit: "USD/year"
    source: "[BP team Solutions engineer + startup-finance heuristic] 企业试点需要有人负责技术部署，但不必按合作伙伴级咨询费率计。"
  - id: "A16"
    name: "产品/安全 PM 全成本薪酬"
    value: "$190.0K"
    unit: "USD/year"
    source: "[BP team Product/security PM + startup-finance heuristic] 该岗位把合规工作流设计与路线图负责合二为一。"
  - id: "A17"
    name: "销售全成本薪酬"
    value: "$230.0K per FTE"
    unit: "USD/year"
    source: "[BP team Enterprise seller + startup-finance heuristic] 含长周期企业销售的浮动薪酬和差旅。"
  - id: "A18"
    name: "G&A/运营全成本薪酬"
    value: "$140.0K"
    unit: "USD/year"
    source: "[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 支撑财务、法务、厂商和合规运营，但不搭建完整的后台。"
  - id: "A19"
    name: "薪资在损益科目间的分摊"
    value: "创始人 45% S&M / 20% R&D / 35% G&A；工程 100% R&D；平台 15% S&M / 85% R&D；解决方案 45% S&M / 55% R&D；PM 80% R&D / 20% G&A；销售 100% S&M；运营 100% G&A"
    unit: "allocation"
    source: "[BP team rationales + BP operations] 这把薪资映射进各职能科目，不掩盖偏解决方案的部署工作。"
  - id: "A20"
    name: "非薪资销售与营销间接费"
    value: "每月 $10K-$42K"
    unit: "USD/month"
    source: "[BP gtm.channels + BP investorMemo.diligenceQuestions + startup-finance heuristic] 覆盖差旅、活动、合作伙伴赋能和安全采购支持。"
  - id: "A21"
    name: "非薪资研发间接费"
    value: "每月 $12K-$26K"
    unit: "USD/month"
    source: "[BP operations + startup-finance heuristic] 覆盖云、图谱基础设施、开发工具和测试环境。"
  - id: "A22"
    name: "非薪资 G&A 间接费"
    value: "每月 $10K-$18K"
    unit: "USD/month"
    source: "[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 覆盖法务、保险、审计准备和企业合规成本。"
  - id: "A23"
    name: "现金转换约定"
    value: "EBITDA 近似现金变动"
    unit: "formula"
    source: "[startup-finance heuristic] 模型假设种子阶段的债务偿付、资本开支、税费和营运资金时点都不重大。"
  - id: "A24"
    name: "月流失率"
    value: "1.5"
    unit: "percent/month"
    source: "[startup-finance heuristic for sticky enterprise infrastructure software] 成功嵌入工作流后流失应当很慢，但模型不假设零流失。"
  - id: "A25"
    name: "CAC 约定"
    value: "每个付费客户 $141.1K"
    unit: "USD/logo"
    source: "[model calc using Y1-Y2 sales and marketing spend divided by 8 active logos at Q4Y2 + BP gtm.funnelTargets] 这反映的是首个证明批次，而不是长期规模化效率。"
  - id: "A26"
    name: "单位经济 ARPU 锚点"
    value: "每年 $400.0K"
    unit: "USD/logo/year"
    source: "[Research market.som 12 reachable logos at about $400K blended ACV] 单位经济部分采用研究混合值，而非成熟客户的最高价位。"
  - id: "A27"
    name: "融资规模测算的下一轮里程碑"
    value: "8 家付费客户、2 个可作参考的年度转化、合作伙伴带来的管线，以及接近 70% 的毛利率"
    unit: "milestone"
    source: "[BP milestones 12–24 months + BP fundingAsk.useOfFundsSummary] 这是种子轮必须带缓冲资助的证明包。"
  - id: "A28"
    name: "季度薪资约定"
    value: "第 2-3 年的薪资行采用每个季度内的实际月度招聘，而非仅用季末快照"
    unit: "convention"
    source: "[Headcount column convention + BP team.startTiming] 这让薪资行与建模的招聘爬坡保持一致。"
