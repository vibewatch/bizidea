scenarios:
  downside:
    description: "企业采购拖延，成熟 ACV 落得更低，交付仍偏服务重，于是公司更晚才达到第 3 年规模，且软件经济更弱。"
    y3RevenueK: 3890.0
    y3EbitdaK: -678.0
    cashLowPointK: 197.7
    keyAssumptionChanges:
      - "M11 之后的客户启动大约整体后移一个季度，于是第 3 年更多留在试点或早期生产的组合里。"
      - "初始生产 ARR 落得更接近 $360K，成熟扩张更接近 $480K。"
      - "毛利率因集成和例外工作流仍偏定制而收在约 68%。"
  base:
    description: "基准情景沿 BP 路径：M12 有 3 家付费客户，Q4Y2 有 8 家，Q4Y3 有 12 家，而毛利率要到第 3 年末才达到 BP 目标。"
    y3RevenueK: 4722.5
    y3EbitdaK: 21.1
    cashLowPointK: 1292.8
    keyAssumptionChanges:
      - "客户启动落在 M6、M9、M11、M13、M15、M18、M20、M22、M26、M29、M32 和 M35。"
      - "新客户以约 $105K 的试点起步，转成约 $390K ARR 的生产合同，再随扩张模块成熟到约 $510K ARR。"
      - "随着连接器和修复打法减少定制交付工作，毛利率从早期试点的 48% 改善到 Q4Y3 的 71%。"
  upside:
    description: "合作伙伴转介和更早的参考案例把客户启动往前拉，支撑更硬的定价，让公司在第 3 年内就达到稳稳为正的 EBITDA。"
    y3RevenueK: 5333.7
    y3EbitdaK: 540.4
    cashLowPointK: 1808.1
    keyAssumptionChanges:
