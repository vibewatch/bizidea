competitors:
  - name: QIZ Security
    stage: seed
    wedge: 面向混合企业环境的密码态势与 PQC 管理，配基于 API 的发现和优先级排序。
    pricing: 定制 / 企业级
    strength: 与问题陈述最贴近的直接对手，围绕混合发现、优先级排序和跨团队协作有明确定位。
    weaknessVsUs: 更自然地被框定成一个态势管理平台；初创公司可以更窄、更有主见，专攻服务责任人分派、变更窗口和例外证据。
    sourceRefs:
      - 87
      - 88
      - 89
  - name: Keyfactor
    stage: scale-up
    wedge: 覆盖发现、签发、生命周期自动化和量子安全密码的信任控制层，横跨企业信任基础设施。
    pricing: 定制 / 企业级
    strength: 装机基础大、信任基础设施叙事强，背靠大额资本和宽泛的机器身份布局。
    weaknessVsUs: 平台范围太宽，让它在单个组合的修复批次、被卡依赖和可直接上董事会的闭环包上不够有主见。
    sourceRefs:
      - 1
      - 2
      - 3
  - name: SandboxAQ
    stage: scale-up
    wedge: 密码风险 AI 平台，能发现资产、映射影响范围，并以机器速度推动密码暴露的修复。
    pricing: 定制 / 企业级
    strength: 密码分析和风险映射的故事很强，尤其擅长隐藏资产和影响范围分析。
    weaknessVsUs: 更接近暴露分析，而不是应用 PMO 式的排序、例外处理和跨职能执行。
    sourceRefs:
      - 12
  - name: AppViewX
    stage: scale-up
    wedge: 证书生命周期和 PQC 就绪平台，为密码敏捷性、记分卡和 47 天证书运营做了明确打包。
    pricing: 定制 / 企业级
    strength: CLM 根基深、PQC 信息明确，围绕证书寿命缩短有可信的自动化故事。
    weaknessVsUs: 仍以 CLM 和 PKI 管理为中心，而不是跨混合栈的业务服务级修复责任归属和排序。
    sourceRefs:
      - 9
      - 10
  - name: CyberArk / Venafi
    stage: incumbent
    wedge: 覆盖密钥、证书、工作负载身份和零接触 PKI 的机器身份安全。
    pricing: 定制 / 企业级
    strength: 现有厂商体量巨大，机器身份原语覆盖宽，有并购支撑的规模和买家熟悉度。
    weaknessVsUs: 买家心智仍是平台级的身份管控，而不是针对一份密码待办、配责任人专属修复包和变更窗口的修复操作系统。
    sourceRefs:
      - 4
      - 5
      - 34
