  fiveForces:
    supplierPower:
      score: 3
      rationale: 产品依赖 PKI、CLM、云和运行时栈的 API 与遥测，但没有单一供应商掌控整条修复工作流。
      sourceRefs:
        - 8
        - 100
        - 101
        - 103
        - 106
    buyerPower:
      score: 4
      rationale: 大型企业买家高度集中，在加一个控制层之前，能横向比较现有套件、内部 PMO 和咨询主导的替代方案。
      sourceRefs:
        - 4
        - 9
        - 87
        - 90
    threatOfEntrants:
      score: 3
      rationale: 云和运行时原语让做原型变得可行，但跨网关、应用和审计工作流的可信编排，在运营上仍然很难复刻。
      sourceRefs:
        - 100
        - 101
        - 102
        - 104
        - 105
    threatOfSubstitutes:
      score: 4
      rationale: 替代品包括 CLM 套件、密码态势工具、咨询公司和内部待办系统，一旦差异化模糊，它们都足够可信，能拖慢一笔新采购。
      sourceRefs:
        - 12
        - 87
        - 34
        - 90
    competitiveRivalry:
      score: 5
      rationale: 竞争激烈，因为资金充裕的现有厂商和新 PQC 厂商，已经从相邻位置在营销发现、生命周期自动化和密码态势。
      sourceRefs:
        - 1
        - 5
        - 12
        - 88
  pestle:
    - factor: 政治
      impact: positive
      point: 政府如今发布明确的迁移时间线和清点强制要求，把抽象的量子风险变成一个可执行的企业项目。
      sourceRefs:
        - 13
        - 15
        - 16
        - 99
        - 98
    - factor: 经济
      impact: positive
      point: 融资、并购和相邻市场预测都表明，信任基础设施和量子就绪预算是真实存在且在增长的。
      sourceRefs:
        - 1
        - 5
        - 88
        - 108
    - factor: 社会
      impact: negative
      point: 证书宕机和治理不善的密码切换，很快会在董事会、客户和运营团队眼里变成信任失灵。
      sourceRefs:
        - 34
        - 91
    - factor: 技术
      impact: positive
      point: 云 KMS、混合 TLS、CA 服务和运行时级 TLS 控制，让一个专门的修复工作流在今天技术上就可行。
      sourceRefs:
        - 100
        - 101
        - 102
        - 103
        - 104
        - 105
        - 106
    - factor: 法律
      impact: negative
      point: 一旦组织承诺了一份迁移计划，它们也就背上了围绕清点完整性、优先级排序、厂商就绪和例外的证明负担。
      sourceRefs:
        - 15
        - 95
        - 99
  adoptionFrictionMatrix:
    - friction: 混合应用和共享网关上的责任归属数据不完整
      severity: high
      affectedBuyer: 密码现代化负责人
      mitigation: 先用被动发现加第一批次的轻量责任人确认起步，再用修复历史改进后续分派。
      sourceRefs:
        - 90
        - 34
        - 15
    - friction: 遗留栈异构性拉长实施时间
      severity: high
      affectedBuyer: 平台负责人
      mitigation: 在拓宽连接器广度之前，先按网关、语言和库家族打包有主见的上线模板。
      sourceRefs:
        - 103
        - 104
        - 105
        - 106
    - friction: 现有厂商触发“这我们已经有了”的反对
      severity: high
      affectedBuyer: CISO
      mitigation: 展示责任到人的修复批次、例外包和变更窗口预测，而不是把原始清单再卖一遍。
      sourceRefs:
        - 2
        - 4
        - 9
        - 87
    - friction: PQC 仍显得比发布或可用性工作更遥远
      severity: medium
      affectedBuyer: 高管发起人
      mitigation: 把销售锚定在今天的弱加密待办、闭环速度和季度报告上，把 PQC 当成推力。
      sourceRefs:
        - 88
        - 91
        - 95
