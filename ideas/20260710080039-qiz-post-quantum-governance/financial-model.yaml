scenarios:
  downside:
    description: "Enterprise procurement slips, mature ACV lands lower, and delivery stays more services-heavy, so the company reaches Y3 scale later and with weaker software economics."
    y3RevenueK: 3890.0
    y3EbitdaK: -678.0
    cashLowPointK: 197.7
    keyAssumptionChanges:
      - "Customer starts after M11 drift roughly one quarter later, so more of Y3 remains in pilot or early-production mix."
      - "Initial production ARR lands closer to $360K and mature expansion closer to $480K."
      - "Gross margin exits near 68% because integrations and exception workflows remain more bespoke."
  base:
    description: "Base case follows the BP path of three paying logos by M12, eight by Q4Y2, and twelve by Q4Y3 while gross margin only reaches the BP target in late Y3."
    y3RevenueK: 4722.5
    y3EbitdaK: 21.1
    cashLowPointK: 1292.8
    keyAssumptionChanges:
      - "Customer starts land in M6, M9, M11, M13, M15, M18, M20, M22, M26, M29, M32, and M35."
      - "New logos begin as roughly $105K pilots, convert into roughly $390K ARR production contracts, and mature toward roughly $510K ARR with expansion modules."
      - "Gross margin improves from 48% in early pilots to 71% by Q4Y3 as connectors and remediation playbooks reduce bespoke delivery work."
  upside:
    description: "Partner referrals and earlier reference wins pull starts forward, support firmer pricing, and let the company reach solidly positive EBITDA inside Y3."
    y3RevenueK: 5333.7
    y3EbitdaK: 540.4
    cashLowPointK: 1808.1
    keyAssumptionChanges:
      - "Customer starts pull forward to M6, M8, M10, M12, M14, M16, M18, M21, M24, M27, M30, and M33."
      - "Pilot pricing reaches about $110K and mature logos expand toward about $540K ARR through premium modules and second-portfolio expansion."
      - "Gross margin exits around 72% as connector reuse and templates shorten time-to-value faster than planned."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Production ARR lands at $360K and mature expansion at $480K."
    baseCase: "Production ARR $390K and mature expansion $510K."
    upsideCase: "Production ARR $420K and mature expansion $540K."
    y3RevenueImpactK: -420.0
    cashImpactK: -470.0
  - variable: "CAC"
    downsideCase: "CAC rises to about $180K because partner referrals do not materialize."
    baseCase: "CAC holds near $141K per logo."
    upsideCase: "CAC falls toward $120K once reference logos and partners warm the pipeline."
    y3RevenueImpactK: -120.0
    cashImpactK: -310.0
  - variable: "churn"
    downsideCase: "Monthly churn drifts to 2.5% as pilots do not expand cleanly."
    baseCase: "Monthly churn remains 1.5%."
    upsideCase: "Monthly churn improves to 1.0% with deeper workflow embed."
    y3RevenueImpactK: -240.0
    cashImpactK: -220.0
  - variable: "sales cycle"
    downsideCase: "Median cycle extends toward 9-10 months."
    baseCase: "Triggered sales cycles stay in the 6-9 month range."
    upsideCase: "Reference wins compress new cycles toward 5-6 months."
    y3RevenueImpactK: -580.0
    cashImpactK: -690.0
  - variable: "gross margin"
    downsideCase: "Exit gross margin reaches only 68%."
    baseCase: "Gross margin exits at 71% with a long-run 70% unit-economics target."
    upsideCase: "Exit gross margin reaches 73%."
    y3RevenueImpactK: 0.0
    cashImpactK: -360.0
  - variable: "hiring pace"
    downsideCase: "A second seller and later engineering hires are pulled forward before partner proof."
    baseCase: "Hiring stays milestone-gated until logo and margin proof appear."
    upsideCase: "One late-stage hire is deferred until after the tenth paying logo."
    y3RevenueImpactK: -80.0
    cashImpactK: -250.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Leads[Triggered assessed accounts] --> Pilots[Paid pilots]
      Pilots --> Production[Annual production contracts]
      Production --> Expansion[Second portfolio or premium modules]
      Expansion --> Revenue[Recognized revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
    
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue comes from 12 paying logos by Q4Y3, with each moving from roughly $105K pilots into roughly $390K production ARR and then expansion modules inside the same account."
  - checkName: "Must go right"
    finding: "The company has to keep deployments product-led enough for gross margin to climb from pilot-heavy mid-50s in late Y1 to about 70% by late Y3."
  - checkName: "Model breaks if"
    finding: "If sales cycles slip toward 9-10 months and mature ACV stalls near $480K, downside cash falls below $0.2M before the business reaches scaled software economics."
  - checkName: "Next-round proof"
    finding: "The next financing is justified when Q4Y2 shows 8 paying logos, 2 referenceable annual conversions, and partner-sourced pipeline that supports Y3 growth without a services-heavy burn profile."
sanityChecks:
  ruleOf40: "Y3 growth 85.7% + EBITDA margin 0.4% = 86.2%"
  burnMultiple: "Y2 burn multiple 0.3x (-$0.64M EBITDA on $2.10M net new revenue)."
  revenuePerFte: "Y3 $363K per year-end FTE (benchmark roughly $200-400K enterprise SaaS)"
  flags:
    - "The model depends on mature logos expanding above the base subscription into premium modules or a second governed portfolio."
    - "Reaching 8 paying logos by Q4Y2 is aggressive for a founder-led enterprise motion and leaves limited room for procurement slip."
    - "Y3 EBITDA is only around breakeven, so any sustained services-heavy onboarding would likely force another raise sooner than the base case suggests."
