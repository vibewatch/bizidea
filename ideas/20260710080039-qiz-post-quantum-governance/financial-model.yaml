date: "2026-07-10"
currency: "USD"
modelStartMonth: "2026-08"
assumptions:
  - id: "A1"
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-10] the model begins in the first full month after the dated business plan."
  - id: "A2"
    name: "Opening cash / seed raise"
    value: "$3.0M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $3–5M + model cash curve] the base case uses the low end of the stated seed range because hiring is milestone-gated and the company nears EBITDA breakeven in Y3."
  - id: "A3"
    name: "Starting paying logos"
    value: "0"
    unit: "count"
    source: "[BP executiveSummary + BP milestones 0–12 months] the company starts pre-revenue and must first land paid pilots."
  - id: "A4"
    name: "Customer definition"
    value: "One active paying enterprise logo in a pilot or annual production deployment"
    unit: "definition"
    source: "[BP gtm.pricing + BP market.som] customersEop counts paying logos, while within-logo expansion raises ARPU over time."
  - id: "A5"
    name: "Paid pilot economics"
    value: "$105K over roughly 3 months (~$35K/mo)"
    unit: "USD/logo"
    source: "[BP gtm.pricing $75k-$150k for 8-12 weeks] the model uses a near-midpoint pilot package."
  - id: "A6"
    name: "Initial production contract"
    value: "$390K ARR (~$32.5K/mo)"
    unit: "USD/logo/year"
    source: "[BP gtm.pricing $250k-$500k annual subscription + Research market.sam roughly $500K first-program ACV] the base case lands below the research ACV anchor until proof and modules accumulate."
  - id: "A7"
    name: "Expanded mature contract"
    value: "$510K ARR (~$42.5K/mo)"
    unit: "USD/logo/year"
    source: "[BP gtm.pricing + BP businessModel expansion levers + Research market.som roughly $400K blended ACV] mature logos expand above the base subscription through a second portfolio and premium modules, while the overall Y3 blend stays near the research anchor."
  - id: "A8"
    name: "Customer start schedule"
    value: "M6, M9, M11, M13, M15, M18, M20, M22, M26, M29, M32, M35"
    unit: "month index"
    source: "[BP product sixMonth/twelveMonth + BP milestones + Research market.som 12 reachable logos] the base case reaches 3 paying logos by M12, 8 by Q4Y2, and 12 by Q4Y3."
  - id: "A9"
    name: "Gross margin ramp"
    value: "48% early pilots, 55% late Y1, 58-68% through Y2, and 69-71% through Y3"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices sequencingRationale + BP risks on services-heavy onboarding] margin improves as connectors and remediation playbooks reduce bespoke delivery work."
  - id: "A10"
    name: "Enterprise sales-cycle anchor"
    value: "6-9 months with pilot-to-annual conversion at or above the BP 50% floor"
    unit: "months / conversion"
    source: "[BP market.buyingProcess + BP gtm.funnelTargets] the logo-start schedule assumes triggered accounts with completed posture assessments and board pressure."
  - id: "A11"
    name: "Hiring timeline"
    value: "M1 founder and founding eng; M4 platform and solutions; M7 product/security PM; M13 seller; M16 platform 2; M18 solutions 2; M20 eng 2; M24 ops; M27 eng 3; M30 seller 2; M32 eng 4"
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays behind revenue proof and partner-motion proof."
  - id: "A12"
    name: "Founder loaded compensation"
    value: "$180.0K"
    unit: "USD/year"
    source: "[BP team Founder/CEO + startup-finance heuristic] lean founder cash compensation with taxes and benefits included."
  - id: "A13"
    name: "Engineering loaded compensation"
    value: "$210.0K per FTE"
    unit: "USD/year"
    source: "[BP team Founding eng + startup-finance heuristic] reflects senior graph, workflow, and infrastructure engineering talent."
  - id: "A14"
    name: "Platform / integrations loaded compensation"
    value: "$195.0K per FTE"
    unit: "USD/year"
    source: "[BP team Platform/integration engineer + startup-finance heuristic] the role must own F5, NGINX, CLM, CMDB, and ticketing connectors."
  - id: "A15"
    name: "Solutions / customer success loaded compensation"
    value: "$175.0K per FTE"
    unit: "USD/year"
    source: "[BP team Solutions engineer + startup-finance heuristic] enterprise pilots need technical deployment ownership without assuming partner-level consulting rates."
  - id: "A16"
    name: "Product / security PM loaded compensation"
    value: "$190.0K"
    unit: "USD/year"
    source: "[BP team Product/security PM + startup-finance heuristic] the role combines compliance workflow design with roadmap ownership."
  - id: "A17"
    name: "Sales loaded compensation"
    value: "$230.0K per FTE"
    unit: "USD/year"
    source: "[BP team Enterprise seller + startup-finance heuristic] includes variable compensation and travel for long-cycle enterprise sales."
  - id: "A18"
    name: "G&A / ops loaded compensation"
    value: "$140.0K"
    unit: "USD/year"
    source: "[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] supports finance, legal, vendor, and compliance operations without building a full back office."
  - id: "A19"
    name: "Payroll allocation to P&L lines"
    value: "Founder 45% S&M / 20% R&D / 35% G&A; engineering 100% R&D; platform 15% S&M / 85% R&D; solutions 45% S&M / 55% R&D; PM 80% R&D / 20% G&A; sales 100% S&M; ops 100% G&A"
    unit: "allocation"
    source: "[BP team rationales + BP operations] this maps salary into the functional lines without hiding solutions-heavy deployment work."
  - id: "A20"
    name: "Non-payroll sales and marketing overhead"
    value: "$10K-$42K per month"
    unit: "USD/month"
    source: "[BP gtm.channels + BP investorMemo.diligenceQuestions + startup-finance heuristic] covers travel, events, partner enablement, and security-procurement support."
  - id: "A21"
    name: "Non-payroll R&D overhead"
    value: "$12K-$26K per month"
    unit: "USD/month"
    source: "[BP operations + startup-finance heuristic] covers cloud, graph infrastructure, development tooling, and test environments."
  - id: "A22"
    name: "Non-payroll G&A overhead"
    value: "$10K-$18K per month"
    unit: "USD/month"
    source: "[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] covers legal, insurance, audit prep, and enterprise compliance costs."
  - id: "A23"
    name: "Cash conversion convention"
    value: "EBITDA approximates cash movement"
    unit: "formula"
    source: "[startup-finance heuristic] the model assumes immaterial debt service, capex, taxes, and working-capital timing at seed scale."
  - id: "A24"
    name: "Monthly churn"
    value: "1.5"
    unit: "percent/month"
    source: "[startup-finance heuristic for sticky enterprise infrastructure software] a successful workflow embed should churn slowly, but the model does not assume zero churn."
  - id: "A25"
    name: "CAC convention"
    value: "$141.1K per paying logo"
    unit: "USD/logo"
    source: "[model calc using Y1-Y2 sales and marketing spend divided by 8 active logos at Q4Y2 + BP gtm.funnelTargets] this reflects the first proof cohort rather than long-run scale efficiency."
  - id: "A26"
    name: "Unit-economics ARPU anchor"
    value: "$400.0K annual"
    unit: "USD/logo/year"
    source: "[Research market.som 12 reachable logos at about $400K blended ACV] the unit-economics section uses the research blend rather than the highest mature-logo price point."
  - id: "A27"
    name: "Next-round milestone for funding sizing"
    value: "8 paying logos, 2 referenceable annual conversions, partner-sourced pipeline, and gross margin near 70%"
    unit: "milestone"
    source: "[BP milestones 12–24 months + BP fundingAsk.useOfFundsSummary] this is the proof package the seed round must finance with buffer."
  - id: "A28"
    name: "Quarterly salary convention"
    value: "Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only quarter-end snapshots"
    unit: "convention"
    source: "[Headcount column convention + BP team.startTiming] this keeps the salary line consistent with the modeled hiring ramp."
