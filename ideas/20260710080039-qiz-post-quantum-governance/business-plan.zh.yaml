operations:
  - "在发现项、服务、责任人、网关、证书、厂商和工单之间维护一套归一化的数据模型，让试点能在几周内、而不是几个季度内上手。"
  - "运营一套面向 F5、NGINX、Java、.NET、ServiceNow 或 Jira，以及一家主流 CLM 或发现平台的参考集成栈。"
  - "跑一套可复制的修复业务评审，配记分卡、例外和阻塞项模板，让客户能拿去和审计委员会及变更委员会复用。"
  - "把首批次的数据清洗和责任人确认做得足够轻量，够解决方案工程处理即可，别办成一个咨询业务。"
team:
  - role: "创始人/CEO"
    startTiming: "Month 0"
    rationale: "创始人主导销售和合作伙伴拓展必须早早上手，因为买家层级高、触发点看情境，切口又必须对着现有厂商精准定位。"
  - role: "创始工程师"
    startTiming: "Month 0"
    rationale: "第一道技术护城河，是那张在异构系统间连起发现项、责任人、依赖和变更窗口的图谱。"
  - role: "平台/集成工程师"
    startTiming: "Month 3"
    rationale: "跨网关、CLM、CMDB 和工单的连接器深度，决定价值兑现时间，也决定部署能否保持产品主导。"
  - role: "解决方案工程师"
    startTiming: "Month 3"
    rationale: "企业试点需要有人能接入数据源、验证责任人映射，并采集可衡量的工作流前后指标。"
  - role: "产品/安全 PM"
    startTiming: "Month 6"
    rationale: "路线图必须把修复包、例外工作流和监管报告模式，固化成可复制的产品模板。"
  - role: "企业销售"
    startTiming: "Month 12"
    rationale: "只在至少一个试点转化之后再招专职销售，让销售动作建在被验证过的 ICP 和打包上，而不是昂贵的试错上。"
milestones:
  - horizon: "0–12 个月"
    items:
      - "在工业制造领域拿下 2-3 个已完成密码态势评估的共创客户。"
      - "为一个受治理组合交付 MVP 的数据吸收、责任人确认、修复批次规划和季度记分卡工作流。"
      - "证明首批次确认后责任人分派准确度至少 85%，且人工报告工作量有可衡量的下降。"
      - "把至少 1 个试点转成年度订阅，并沉淀一个可作参考的运营前后对比案例。"
  - horizon: "12–24 个月"
    items:
      - "把首批客户从一个组合扩展到更多网关、业务单元或厂商环境。"
      - "交付按栈定制的打法、厂商修复跟踪和变更窗口预测。"
      - "与至少一家发现或 CLM 厂商、一家咨询伙伴建起可重复的转介动作。"
      - "在保持部署产品主导、而非服务主导的前提下，做到 8-12 个付费客户。"
  - horizon: "24–36 个月"
    items:
      - "从 TLS 和加密待办延伸到机器身份、发布门禁和更大范围的密码敏捷性治理工作流。"
      - "成为跨多业务单元企业客户的密码例外与董事会报告的系统记录源。"
      - "用修复遥测按栈、厂商和团队做闭环率基准，支撑更高价值的企业档位。"
risks:
  - risk: "QIZ 或大型 CLM、机器身份现有厂商打包进足够的修复工作流，抹平差异化。"
    likelihood: "Medium"
    impact: "High"
    mitigation: "赢在更快的组合上手、中立的集成、责任人专属修复包，以及现有厂商今天还没干净打包的审计证据上。"
  - risk: "责任归属数据陈旧或不全，自动分派就准不到软件优先部署要求的程度。"
    likelihood: "High"
    impact: "High"
    mitigation: "把 CMDB 数据与代码仓库、证书、网关和工单信号混合，在第一批次要求轻量人工确认，并用试点历史改进后续映射。"
  - risk: "买家把需求框定为临时咨询或合规 PMO 工作，而不是一个经常性的软件品类。"
    likelihood: "Medium"
    impact: "High"
    mitigation: "对着有期限的季度记分卡来卖，衡量报告人力下降和闭环速度，并用付费试点证明可复制的软件成果。"
  - risk: "F5、NGINX、Java、.NET 和厂商设备之间的遗留异构性，把上手变成一个定制集成项目。"
    likelihood: "High"
    impact: "Medium"
    mitigation: "把第一个切口限定在常见技术栈，交付有主见的打法，并在拓宽连接器广度之前先招解决方案和集成人才。"
fundingAsk:
  round: "seed"
  targetFundingRangeUsd: "$3–5M"
  runwayMonths: 18
  useOfFundsSummary: "用 18 个月资金搭建修复图谱和工作流产品，完成 2-3 个付费共创客户部署，招齐初始的工程、解决方案和产品团队，并在扩张出工业滩头市场之前，证明一个被触发的组合能转化成可复制的 25 万-50 万美元年度合同。"
