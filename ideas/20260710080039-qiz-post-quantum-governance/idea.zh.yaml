topRisks:
  - name: "现有厂商吞并"
    description: "大型 PKI、暴露面管理或 GRC 厂商可能把基础的修复项目视图打包进现有套件。"
    mitigation: "赢在跨工具排序、责任人识别和证据自动化上——这些能力横跨发现、工单和合规系统之间，而不在任何一家现有厂商的孤岛里。"
  - name: "责任人数据漂移"
    description: "CMDB 和应用责任归属数据往往陈旧，会削弱自动分派这个第一承诺。"
    mitigation: "把 CMDB 记录与代码仓库、工单、网关和审批遥测结合起来，并在第一个修复批次上要求轻量的人工确认，以提升映射准确度。"
  - name: "预算归属模糊"
    description: "有些买家可能把问题框定为临时的项目管理工作，转而默认找咨询公司，而不是买新平台。"
    mitigation: "瞄准明确的董事会、审计或量子就绪期限来卖，并打包一个 60 天的首组合部署，配上可衡量的闭环与报告成果。"
