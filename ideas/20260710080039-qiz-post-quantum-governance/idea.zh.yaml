jobsToBeDone:
  - job: >-
      当审计委员会要一份量子就绪计划时，帮我们的密码项目办公室在混合应用之间分派并排序修复，
      让他们既能降低暴露面，又不必冻结发布。
    currentAlternative: "表格式 PMO、ServiceNow 工单和人工追责任人。"
    successMetric: "关键发现项中分派到具名责任人、并在承诺季度内闭环的比例。"
  - job: >-
      当共享网关或厂商设备带着弱加密时，帮我们的应用安全和平台团队证明哪些服务受影响、还剩哪些
      例外，让他们赶在审计或宕机风险叠加之前完成修复。
    currentAlternative: "扁平的扫描器报告加上临时的工程评审。"
    successMetric: "为每个关键发现项产出责任人、业务影响和例外证据所需的时间。"
