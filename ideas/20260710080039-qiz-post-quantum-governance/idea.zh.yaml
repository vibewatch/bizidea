differentiator: >-
  现有 PKI 套件负责发现资产或自动签发，GRC 系统则在别人已经把技术债翻译成业务活儿之后，才去
  追踪例外。这家公司攥住的是发现和修复之间的那次交接：把每处密码缺口绑定到服务负责人、变更
  窗口、修复包和证据链上。这就攒下一份可防御的数据集——依赖模式、按技术栈的修复时延、厂商
  响应速度以及经过验证的修复打法，都是邻近工具天然收集不到的。
