problem: >-
  大型混合企业现在能发现过时协议、弱加密套件和加密缺口，却仍然没法把这些结果，变成一份横跨
  数百个应用和团队、责任到人的修复计划。安全负责人清楚哪些业务服务暴露在外，但合规团队、
  应用负责人和平台团队仍在靠表格、工单和例外备忘录来回拉扯，才能定下先修什么、何时才有安全的
  变更窗口。于是后量子项目就卡在发现和切换之间那段最混乱的中间地带，让已知的密码债务一压
  就是好几个季度。
targetUser:
  primary: "《财富》500 强工业制造商的密码现代化总监或副 CISO——公司在本地、云和私有数据中心里，跑着 200 多个面向客户、供应商和现场服务的应用。"
  secondary: "应用安全 PMO 负责人或平台负责人，负责在共享网关和内部服务上做 TLS、加密套件和协议的修复。"
  buyer: "CISO 或 CIO。"
startupThesis:
  nonObviousInsight: >-
    眼下的预算不是为一套完美的未来后量子技术栈准备的，而是为那个项目层准备的——它能把发现的
    密码债务，翻译成一份在应用负责人、合规和基础设施团队之间责任到人、有序推进的活。企业已经
    有了扫描器和 PKI 工具，却仍然缺一套修复操作系统，来回答每处修复归谁负责、会打破什么、
    以及进展如何向管理层证明。
  beachhead: >-
    《财富》500 强工业制造商——在本地/云/混合环境里跑着 200 多个外部合作伙伴、现场服务和客户
    应用，先从共享网关、Java/.NET 服务和厂商设备上的 TLS 与加密套件修复切入。
  wedge: >-
    一套密码修复操作系统：吸收发现工具的排查结果，把每处弱协议或加密缺口映射到对应的业务服务
    和责任人，按变更窗口给修复排序，并自动生成审计与例外证据。
  whyNowCatalyst: >-
    QIZ 的融资以及把量子安全迁移明确定位成一项紧迫、长周期的修复项目，都说明发现环节已经成熟，
    如今卡住整件事的是执行层。
  ventureScalePath: >-
    先做一个混合应用组合的指挥中心，再扩展到全企业范围的密码策略、厂商修复、机器身份生命周期、
    发布门禁，以及每次算法或证书变更的董事会报告。
solution: >-
  产品接入密码发现工具、负载均衡器、API 网关、代码仓库、证书颁发机构、CMDB、ServiceNow 或
  Jira 以及合规系统，构建一张实时图谱，覆盖每处发现项、业务服务、责任人和依赖关系。它不做一张
  扁平的资产清单，而是按业务影响、共享基础设施和已批准的变更窗口，把过时协议、弱加密套件和
  加密缺口归入一个个修复批次。每位应用负责人拿到一份有主见的修复包，里面写清受影响的端点、
  可能涉及的库或配置、回滚说明，以及申请例外或证明已闭环所需的证据。安全负责人拿到一张可直接
  上董事会的视图，看到组合暴露面、进展、被卡住的依赖和预测完成日期，而不再是每周的表格汇总。
  随着时间推移，平台会学到哪些技术栈、厂商和团队修得最快，把这些工作流数据变成更优的排序、
  基准对比，最终走向自动化的策略执行。
goToMarketSeed:
  firstCustomer: >-
    一家刚做完密码态势评估的美国上市工业制造商，在其 F5、Nginx、Java 和 VPN 环境里查出弱加密
    套件，并向审计委员会承诺提交一份季度修复记分卡。
  buyingTrigger: >-
    一次评估暴露出数百个过时协议、责任人不明和共享基础设施依赖之后，董事会或审计委员会要求提交
    一份量子就绪计划。
  currentAlternative: >-
    扫描器导出结果、Excel 或 ServiceNow 待办队列、CMDB 打标、咨询公司主导的项目表格，以及通用的
    PKI 或 GRC 看板。
  switchingReason: >-
    首个客户之所以切换，是因为产品把一份吓人却静态的清单，变成了责任到人、懂排序、贴合真实变更
    窗口并自动产出证据的修复项目。
  pricingHypothesis: >-
    按受治理的应用或业务服务数量收年费，高级档另加自动责任人映射、厂商修复跟踪和董事会报告。
