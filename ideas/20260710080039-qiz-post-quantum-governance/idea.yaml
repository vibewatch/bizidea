jobsToBeDone:
  - job: >-
      When our audit committee asks for a quantum-readiness plan, help our
      cryptography program office assign and sequence fixes across hybrid
      applications, so they can reduce exposure without freezing releases.
    currentAlternative: "Spreadsheet PMO, ServiceNow tickets, and manual owner-chasing."
    successMetric: "Percentage of critical findings assigned to named owners and closed by the committed quarter."
  - job: >-
      When shared gateways or vendor appliances carry weak ciphers, help our
      application-security and platform teams prove which services are affected
      and what exceptions remain, so they can remediate before audit or outage
      risk compounds.
    currentAlternative: "Flat scanner reports plus ad hoc engineering review."
    successMetric: "Time to produce owner, business impact, and exception evidence for every critical finding."
