topRisks:
  - name: "Incumbent absorption"
    description: "Large PKI, exposure-management, or GRC vendors could bundle basic remediation-program views into existing suites."
    mitigation: "Win on cross-tool sequencing, owner resolution, and evidence automation that sit between discovery, ticketing, and compliance systems rather than inside any one incumbent silo."
  - name: "Owner-data drift"
    description: "CMDB and application ownership data are often stale, which can undermine the first promise of automatic assignment."
    mitigation: "Combine CMDB records with repo, ticket, gateway, and approval telemetry, then require lightweight human confirmation on the first remediation wave to improve mapping accuracy."
  - name: "Budget ambiguity"
    description: "Some buyers may frame the problem as temporary program management work and default to consultants instead of a new platform."
    mitigation: "Sell into explicit board, audit, or quantum-readiness deadlines and package a 60-day first-portfolio deployment with measurable closure and reporting outcomes."
