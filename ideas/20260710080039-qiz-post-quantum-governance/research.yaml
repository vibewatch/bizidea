openQuestions:
  - How many Fortune 500 industrial manufacturers have already completed a cryptographic posture assessment and now owe a board-level remediation scorecard?
  - Which discovery or CLM vendors most often sit upstream of a remediation-OS purchase, and can the startup ride those channels instead of fighting them?
  - Can owner mapping across gateway, certificate, CMDB, and repo data reach usable accuracy without expensive professional services on the first deployment?
  - Will buyers fund the category as software priced by governed applications or treat it as a temporary consulting program attached to larger CLM suites?
