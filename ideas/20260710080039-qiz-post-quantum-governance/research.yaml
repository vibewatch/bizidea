competitors:
  - name: QIZ Security
    stage: seed
    wedge: Cryptographic posture and PQC management across hybrid enterprise environments with API-based discovery and prioritization.
    pricing: Custom / enterprise
    strength: Closest direct fit to the problem statement, with explicit positioning around hybrid discovery, prioritization, and cross-team collaboration.
    weaknessVsUs: More naturally framed as a posture-management platform; the startup can be narrower and more opinionated on service-owner assignment, change windows, and exception evidence.
    sourceRefs:
      - 87
      - 88
      - 89
  - name: Keyfactor
    stage: scale-up
    wedge: Trust control plane spanning discovery, issuance, lifecycle automation, and quantum-safe cryptography across enterprise trust infrastructure.
    pricing: Custom / enterprise
    strength: Large installed base and strong trust-infrastructure narrative, backed by major capital and a broad machine-identity footprint.
    weaknessVsUs: Broad platform scope makes it less opinionated around one portfolio’s remediation waves, blocked dependencies, and board-ready closure packets.
    sourceRefs:
      - 1
      - 2
      - 3
  - name: SandboxAQ
    stage: scale-up
    wedge: Cryptographic risk AI platform that discovers assets, maps blast radius, and pushes machine-speed remediation for cryptographic exposure.
    pricing: Custom / enterprise
    strength: Strong cryptographic analytics and risk-mapping story, especially for hidden assets and blast-radius analysis.
    weaknessVsUs: Closer to exposure analysis than to application-PMO style sequencing, exception handling, and cross-functional execution.
    sourceRefs:
      - 12
  - name: AppViewX
    stage: scale-up
    wedge: Certificate lifecycle and PQC readiness platform with explicit packaging for crypto-agility, scorecards, and 47-day certificate operations.
    pricing: Custom / enterprise
    strength: Strong CLM roots, explicit PQC messaging, and credible automation story around shrinking certificate lifetimes.
    weaknessVsUs: Still centered on CLM and PKI administration rather than business-service-level remediation ownership and sequencing across mixed stacks.
    sourceRefs:
      - 9
      - 10
  - name: CyberArk / Venafi
    stage: incumbent
    wedge: Machine identity security spanning secrets, certificates, workload identities, and zero-touch PKI.
    pricing: Custom / enterprise
    strength: Massive incumbent footprint and broad coverage across machine identity primitives, acquisition-backed scale, and buyer familiarity.
    weaknessVsUs: Buyer mental model is still platform-wide identity control, not a remediation OS for one crypto backlog with owner-specific fix packets and change windows.
    sourceRefs:
      - 4
      - 5
      - 34
