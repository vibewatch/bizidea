        - 87
    - case: Buyers keep treating PQC as a consulting workstream
      impact: If enterprise teams continue to see the problem as episodic audit prep rather than a recurring program, the startup should anchor on closure velocity and evidence automation, not pure quantum education.
      sourceRefs:
        - 90
