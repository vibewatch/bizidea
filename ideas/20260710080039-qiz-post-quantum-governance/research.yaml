  sensitivityCases:
    - case: Incumbents add lightweight remediation sequencing
      impact: If QIZ, Keyfactor, or AppViewX add stronger owner mapping and exception workflows, the startup must win on faster portfolio onboarding and better change-window intelligence.
      sourceRefs:
        - 2
