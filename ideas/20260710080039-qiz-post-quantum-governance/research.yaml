  validationPlan:
    - priority: high
      question: Will industrial manufacturers fund a dedicated remediation OS instead of extending scanners, CLM suites, and consulting PMOs?
      evidenceToGather: Run design-partner interviews with deputy CISOs, application-security PMOs, and PKI leads at 8-10 large manufacturers that have just completed a crypto posture assessment.
    - priority: high
      question: How accurately can the product infer service ownership and blast radius from CMDB, gateway, repo, and certificate data before human review becomes unavoidable?
      evidenceToGather: Pilot one portfolio across F5/NGINX, Java/.NET services, repos, and ticketing systems and measure first-wave owner-assignment accuracy and time-to-closure.
    - priority: medium
      question: How much time and audit effort can automated exception packets and quarterly scorecards remove from the customer workflow?
      evidenceToGather: Benchmark manual status reporting and exception preparation time before and after a 60-day proof-of-value with one board-facing program owner.
