        - 95
        - 99
    - case: Legacy heterogeneity slows implementation
      impact: If stack-specific TLS, cipher, and certificate settings vary more than expected, the startup will need opinionated rollout templates by gateway and language family to preserve time-to-value.
      sourceRefs:
