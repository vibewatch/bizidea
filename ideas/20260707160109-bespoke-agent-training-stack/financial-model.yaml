modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      AuditLogs[Override and appeal audit logs] --> RewardLabels[Reward-labeled training data]
      RewardLabels --> Customers[Active paid payer logos]
      Customers --> Revenue[Case-volume fee plus savings-share revenue]
      Revenue --> GrossProfit[Gross profit after single-tenant and support COGS]
      GrossProfit --> Cash[Cash to fund integrations, compliance, and GTM]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue comes from growing from 3 active paid logos at Y1 exit to 12 active paid logos at roughly $252K blended ARPU, which gets the business to about $3.0M exit ARR by Q4Y3."
  - checkName: "Must go right"
    finding: "The first seven logos must clear compliance quickly enough that the same prior-auth plus claims playbook repeats without forcing a much larger services team before Q4Y2."
  - checkName: "Model breaks if"
    finding: "If sales cycle stretches toward 9 months or blended ARPU slips toward $225K, the downside case turns cash negative before Y3 finishes and the seed no longer reaches the next proof point."
  - checkName: "Next-round proof"
    finding: "The next financing story is exiting Y2 with 7 active paid logos, 2 converted annual contracts, a live second case family, and one partner-sourced pipeline that can support the jump to 12 logos."
sanityChecks:
  ruleOf40: "Y3 growth 105% + EBITDA margin -11% = 94%."
  burnMultiple: "Y2 burn multiple is roughly 0.7x on about $1.0M of net new ARR, improving to about 0.2x in Y3 as expansion revenue absorbs most of the hiring ramp."
  revenuePerFte: "$273K Y3 on 9 ending FTE (benchmark roughly $200-400K SaaS)."
  flags:
    - "The base case still ends Y3 with only about $0.24M of cash, so slipping the Q4Y2 milestone would likely force a bridge or a smaller hiring plan."
    - "The $252K blended ARPU assumption requires savings-share and second-case-family expansion to attach; if customers stay near flat $150K base contracts, the beachhead ARR proof moves out materially."
