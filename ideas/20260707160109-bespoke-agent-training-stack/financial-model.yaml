slug: "audit-trail-reward-flywheel"
date: "2026-07-07"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: "A1"
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[business-plan.yaml date] first full operating month after the 2026-07-07 plan date."
  - id: "A2"
    name: "Opening cash after seed close"
    value: "2200"
    unit: "USDK"
    source: "[business-plan.yaml fundingAsk.targetFundingRangeUsd; fundingAsk.useOfFundsSummary] uses a $2.2M seed at the low end of the stated $2-4M range because the model stays under 7 FTE through Q4Y2 and adds 6 months of buffer to the plan's 18 months of execution."
  - id: "A3"
    name: "Revenue unit"
    value: "Active paid payer logo"
    unit: "definition"
    source: "[business-plan.yaml investorMemo.firstCustomer.initialContract] one paid pilot or annual production logo is the customer count used in the model."
  - id: "A4"
    name: "Blended annual ARPU per active paid logo"
    value: "252.0"
    unit: "USDK/logo-year"
    source: "[business-plan.yaml investorMemo.firstCustomer.initialContract; milestones 24-36 months; research.yaml market.som] a 90-day pilot annualizes to about $63K and 12 active logos at roughly $252K blended ARPU gets the business to about $3.0M exit ARR once savings-share and second-case-family expansion attach."
  - id: "A5"
    name: "Y1 month-end customer path"
    value: "0, 0, 0, 0, 0, 1, 1, 1, 2, 2, 2, 3"
    unit: "active paid logos"
    source: "[business-plan.yaml milestones 0-12 months; operatingAssumptions] aligns to 2-3 paid design partners in year 1 after a roughly 90-day compliance and pilot setup cycle."
  - id: "A6"
    name: "Y2 quarter-end customer path"
    value: "Q1Y2 3; Q2Y2 4; Q3Y2 5; Q4Y2 7"
    unit: "active paid logos"
    source: "[business-plan.yaml product.twelveMonth; milestones 12-24 months; experimentRoadmap] assumes the first two pilots convert and one partner-sourced channel starts contributing by late Y2."
  - id: "A7"
    name: "Y3 quarter-end customer path"
    value: "Q1Y3 8; Q2Y3 9; Q3Y3 10; Q4Y3 12"
    unit: "active paid logos"
    source: "[business-plan.yaml milestones 24-36 months; research.yaml market.som] keeps the base case inside the stated 8-12 paying-logo goal while exiting near the researched ~$3.0M beachhead ARR ceiling."
  - id: "A8"
    name: "Gross margin ramp"
    value: "45% during first paid pilots, 50-55% late Y1, 58-65% through Y2, and 67-70% through Y3"
    unit: "gross margin percent"
    source: "[business-plan.yaml businessModel.targetGrossMarginPct; operations; strategicChoices.sequencingRationale] single-tenant deployment and bespoke connectors depress early margins, then improve as the compliance playbook and core-admin integrations are reused."
  - id: "A9"
    name: "Monthly churn for unit economics"
    value: "1.8"
    unit: "percent"
    source: "[startup-finance heuristic] regulated workflow infrastructure should be sticky after go-live, but concentrated-logo risk keeps churn above mature public-SaaS levels."
  - id: "A10"
    name: "CEO / GTM lead loaded cash compensation"
    value: "156"
    unit: "USDK/year"
    source: "[business-plan.yaml team CEO / GTM lead] startup-finance heuristic for a below-market founder salary plus payroll tax and benefits."
  - id: "A11"
    name: "Founding ML/RL engineer loaded cash compensation"
    value: "210"
    unit: "USDK/year"
    source: "[business-plan.yaml team Founding ML/RL engineer] startup-finance heuristic for a scarce senior ML founder package in healthcare AI."
  - id: "A12"
    name: "Data engineer loaded cash compensation"
    value: "180"
    unit: "USDK/year"
    source: "[business-plan.yaml team Data engineer] startup-finance heuristic for a core-admin integration engineer."
  - id: "A13"
    name: "Compliance / security lead loaded cash compensation"
    value: "168"
    unit: "USDK/year FTE-equivalent"
    source: "[business-plan.yaml team Compliance / security lead (fractional)] startup-finance heuristic for a healthcare security lead, modeled at 0.5 FTE until scale warrants a full-time owner."
  - id: "A14"
    name: "Forward-deployed engineer / customer success loaded cash compensation"
    value: "150"
    unit: "USDK/year"
    source: "[business-plan.yaml team Forward-deployed engineer / customer success] startup-finance heuristic for a customer-facing implementation engineer."
  - id: "A15"
    name: "Account executive / BD loaded cash compensation"
    value: "180"
    unit: "USDK/year"
    source: "[startup-finance heuristic] first dedicated seller is added only after founder-led pilots show repeatability."
  - id: "A16"
    name: "Solutions / implementation engineer loaded cash compensation"
    value: "165"
    unit: "USDK/year"
    source: "[startup-finance heuristic] added when the team supports a second case family and a higher pilot count."
  - id: "A17"
    name: "Customer success / partnership manager loaded cash compensation"
    value: "145"
    unit: "USDK/year"
    source: "[startup-finance heuristic] added once partner-sourced pipeline and multi-logo renewals need dedicated ownership."
  - id: "A18"
    name: "Senior data / platform engineer loaded cash compensation"
    value: "190"
    unit: "USDK/year"
    source: "[startup-finance heuristic] supports connector reuse, data governance, and adjacent-vertical scoping after the payer wedge is proven."
  - id: "A19"
    name: "Hiring cadence"
    value: "CEO and founding ML engineer in M1; data engineer M3; compliance lead at 0.5 FTE in M4; forward-deployed engineer M7; account executive M16; solutions engineer M19; customer success / partnership manager M26; compliance lead to 1.0 FTE in M28; senior data / platform engineer M31"
    unit: "timing"
    source: "[business-plan.yaml team; strategicChoices.sequencingRationale; fundingAsk.useOfFundsSummary] keeps the team lean until compliance clearance, pilot conversion, and connector reuse are proven."
  - id: "A20"
    name: "Functional payroll allocation"
    value: "CEO 70% S&M and 30% G&A; founding ML and data engineers 100% R&D; compliance 100% G&A; forward-deployed engineer 40% S&M and 60% R&D; account executive 100% S&M; solutions engineer 50% S&M and 50% R&D; customer success / partnership manager 60% S&M and 40% G&A; senior data / platform engineer 100% R&D"
    unit: "allocation policy"
    source: "[business-plan.yaml team rationales; operations] payroll follows who sells the wedge, who builds reusable integrations, and who carries compliance overhead."
  - id: "A21"
    name: "Non-payroll operating spend"
    value: "Y1 monthly S&M/R&D/G&A = 8K/12K/15K; Y2 = 10K/14K/16K; Y3 = 12K/16K/18K"
    unit: "USDK/month"
    source: "[startup-finance heuristic] covers HIPAA-capable cloud, SOC 2 work, travel to payer buyers, insurance, and legal."
  - id: "A22"
    name: "Cash conversion policy"
    value: "EBITDA approximates operating cash movement"
    unit: "policy"
    source: "[startup-finance heuristic] no debt, capex, taxes, or material working-capital swings are modeled at this stage."
  - id: "A23"
    name: "Sales-cycle conversion benchmark"
    value: "~90 days to clear compliance and launch a paid pilot; 50%+ pilot-to-annual conversion within 12 months"
    unit: "timing"
    source: "[business-plan.yaml operatingAssumptions; gtm.funnelTargets; investorMemo.firstCustomer.initialContract] anchors the timing of the customer ramp."
  - id: "A24"
    name: "Blended CAC per new paid logo"
    value: "124.5"
    unit: "USDK/new paid logo"
    source: "Calculated from modeled Y2-Y3 sales and marketing spend of 1120.9K divided by 9 net new paid logos."
  - id: "A25"
    name: "Funding milestone"
    value: "Reach 7 active paid logos, 2 converted annual contracts, second case family live, one core-admin partner channel, and preserve roughly 6 months of cash buffer"
    unit: "milestone"
    source: "[business-plan.yaml milestones 12-24 months; fundingAsk.runwayMonths; useOfFundsSummary] used to size the current seed."
  - id: "A26"
    name: "Seed use-of-funds mix"
    value: "45% Engineering, 25% GTM, 15% G&A, 15% buffer"
    unit: "allocation"
    source: "[business-plan.yaml fundingAsk.useOfFundsSummary; modeled burn mix through Q4Y2] keeps the majority of capital on productization and compliance-heavy delivery while preserving a real buffer."
