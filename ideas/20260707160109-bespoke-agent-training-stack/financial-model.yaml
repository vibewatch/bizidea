scenarios:
  downside:
    description: "Compliance review stretches, expansion attach rates lag, and the company exits Y3 with only 10 active paid logos at lower blended ARPU and margin."
    y3RevenueK: 1743.8
    y3EbitdaK: -827.6
    cashLowPointK: -567.7
    keyAssumptionChanges:
      - "Blended annual ARPU falls to about $225K because savings-share and second-case-family expansion attach slowly."
      - "Customer path slips to 5 active paid logos by Q4Y2 and 10 by Q4Y3 as compliance and partner-sourced pipeline take longer to clear."
      - "Gross margin tops out near 66% because deployment remains more services-heavy than planned."
  base:
    description: "Founder-led enterprise sales, reusable compliance playbooks, and second-case-family expansion get the company to 12 active paid logos and roughly $3.0M exit ARR by Q4Y3."
    y3RevenueK: 2457.0
    y3EbitdaK: -280.7
    cashLowPointK: 234.9
    keyAssumptionChanges:
      - "Blended annual ARPU holds at about $252K, which is consistent with the paid-pilot entry point and a richer annual contract once savings-share attaches."
      - "Customer count reaches 7 by Q4Y2 and 12 by Q4Y3, matching the operating milestones and ending near the researched $3.0M beachhead ARR ceiling."
      - "Gross margin rises to 70% by Q4Y3 as connector reuse and a standardized compliance motion replace bespoke onboarding."
  upside:
    description: "A partner-led channel turns on early, second-case-family expansion sells faster, and the business reaches 14 active paid logos with positive Y3 EBITDA."
    y3RevenueK: 3037.5
    y3EbitdaK: 200.3
    cashLowPointK: 691.5
    keyAssumptionChanges:
      - "Blended annual ARPU rises to about $270K as savings-share and second-case-family modules attach earlier in the logo lifecycle."
      - "Customer path reaches 8 active paid logos by Q4Y2 and 14 by Q4Y3 because one core-admin partner becomes a repeatable channel."
      - "Gross margin reaches about 72% by late Y3 as implementation becomes more productized and fewer deployments need bespoke data work."
