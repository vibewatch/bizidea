problem: 区域性健康险公司和理赔管理机构正在试点内部智能体，处理事前授权、理赔核定这类冗长、多步骤的案件工作，但这些智能体的自主处理率总卡在很低的水平——因为没有快速的办法，把生产环境里真实的错误变成训练信号。合规要求这些公司把每一次案件决策、人工改判和申诉结果都记进审计轨迹，但这份审计轨迹却闲置在那里，没有真正驱动智能体的强化学习闭环。与此同时，像 Bespoke Labs 这样资金充裕的基础设施厂商，正在为基础模型实验室打造合成训练环境，而不是为企业自己那套特有的理赔平台、工单和审核惯例服务。没有办法把这个闭环补上，AI 平台团队就只能困在手工重新调 prompt、手工给审核批次打标签的状态里，跟不上前沿模型任务时长可靠性提升的速度。
targetUser:
  primary: 区域性健康险公司或第三方理赔管理机构里，正在试点内部事前授权或理赔核定智能体的 AI/自动化负责人，或理赔运营 VP。
  secondary: 掌管案件决策审计轨迹、并且必须批准该数据用于模型训练的合规和审计官员。
  buyer: 掌握智能体试点预算、并对提升智能体自主处理率负责的 AI/自动化 VP 或首席理赔官。
startupThesis:
  nonObviousInsight: Bespoke Labs 正在合成制造的那种长周期工作流数据——案卷版本的代码库、工单、日志、邮件和审核人 Slack 讨论——其实早就以丰富标注的形式，存在于每一家受监管企业强制要求的合规审计轨迹里，只是没人把这份已经收集好、已经合规的数据，变成企业自有智能体的自动化强化学习奖励管道。
  beachhead: 滩头市场是美国的区域性健康险公司和第三方理赔管理机构，员工规模 200 到 2000 人，已经在 Guidewire、Duck Creek 或自研理赔系统等自有案件管理平台上，跑着事前授权或理赔核定智能体试点，但端到端自主处理率还卡在很低的比例，这些公司的 AI 平台和理赔运营负责人就是目标客户。
  wedge: 切口是一条从合规日志到奖励信号的管道：摄取保险公司现有的案件决策审计轨迹——审核人改判、升级备注、申诉结果——自动转成带标签的强化学习奖励信号，针对性地在保险公司当前做错的那些案件上，重新训练它自己的内部智能体。
  whyNowCatalyst: Bespoke Labs 刚完成 $40M 融资，明确押注训练环境数据、而非更多智能体前端，才是长周期智能体可靠性的瓶颈，并援引 METR 的数据说明智能体任务时长能力大约每七个月翻一倍。企业现在就需要办法在自己的工作流上证明可靠性，而不是等通用行业基准慢慢追上来。
  ventureScalePath: 先从健康险理赔和事前授权切入，再把同一条审计日志转奖励的管道，延伸到银行贷款服务与争议处理、财产险理赔、政府福利核定这些同样受监管、审计繁重的长周期工作流，最终建成一个跨行业的奖励数据平台，让任何跑内部长周期智能体的企业都能接入。
solution: 我们构建的是一条数据管道加奖励模型服务，直接对接保险公司的案件管理和审计日志系统，把每一次案件决策、人工改判和申诉结果都抽取成带标签的训练样本。这条管道会自动把这些标签转成强化学习奖励信号，兼容保险公司现有的内部智能体——不管它基于哪个主流基础模型——把生产环境里的错误和下一轮训练连接起来。一层校准机制会在噪声大或一致性低的人工改判进入奖励管道之前把它们标记出来；合规优先的部署模式——本地部署或单租户 VPC，签署 BAA——确保受保护的案件数据永远不会离开客户的环境。平台团队能拿到一个仪表盘，实时展示自主处理率的提升情况，并直接关联到智能体目前还在出错的具体案件类型，这样他们就能向合规部门和高管展示一条经得起审视的可靠性曲线，而不是一个黑箱基准分数。
goToMarketSeed:
  firstCustomer: 首批客户是一家员工规模 200 到 2000 人、年保费 $500M-$5B 的区域性健康险公司里的 AI/自动化平台负责人，该公司的事前授权智能体试点端到端自主处理率被卡在 30% 以下。
  buyingTrigger: 试点智能体的自主处理率停滞不前，而合规团队手上早已积压了几个月的改判和申诉审计数据，却没人拿去重新训练它。
  currentAlternative: 现有替代方案是内部 AI 团队手工重新调 prompt、定期手工打标审核批次，或者一个反映不出保险公司自己理赔平台特点的通用第三方智能体基准和评测服务。
  switchingReason: 这条管道用的是保险公司本来就在收集、内部使用也早已合规的数据，所以它能比手工打标或从 Bespoke 这类面向实验室的厂商那里买通用合成环境产品，更快、更省地补上可靠性闭环。
  pricingHypothesis: 按经过奖励管道处理的案件量收取平台费，再加上与端到端智能体自主处理率实测提升挂钩的节省分成。
