    running an in-house prior-authorization or claims-adjudication agent pilot.
  secondary: >-
    Compliance and audit officers who own the case-decision audit trail and must approve any reuse of that data for
    model training.
  buyer: >-
    VP of AI/Automation or Chief Claims Officer who owns the agent pilot budget and is accountable for expanding agent
    autonomy.
startupThesis:
  nonObviousInsight: >-
    The exact long-horizon workflow data Bespoke Labs is manufacturing synthetically -- case-file equivalents of
    codebases, tickets, logs, email, and reviewer Slack threads -- already exists, richly labeled, inside every
    regulated enterprise's mandatory compliance audit trail, but no one is turning that already-collected,
    already-compliant data into an automatic RL reward pipeline for the enterprise's own agent.
  beachhead: >-
    AI platform and claims-operations leaders at regional U.S. health insurers and third-party claims administrators
    with 200-2,000 employees running a live prior-authorization or claims-adjudication agent pilot on their own
    case-management platform, such as Guidewire, Duck Creek, or a custom claims system, that is capped at a small
    share of end-to-end autonomy.
  wedge: >-
    A compliance-log-to-reward pipeline that ingests an insurer's existing case-decision audit trail -- reviewer
    overrides, escalation notes, appeal outcomes -- and automatically converts it into labeled RL reward signal that
    retrains the insurer's own in-house agent on the exact cases it currently gets wrong.
  whyNowCatalyst: >-
    Bespoke Labs just raised $40M explicitly betting that training-environment data, not more agent front-ends, is
    the bottleneck to reliable long-horizon agents, and cited METR data showing agent task-length capability doubling
    roughly every seven months, so enterprises need a way to prove reliability on their own workflows now rather than
    wait for generic industry benchmarks to catch up.
  ventureScalePath: >-
    Start with health-insurance claims and prior-authorization, then extend the same audit-log-to-reward pipeline to
    other regulated, audit-heavy long-horizon workflows such as bank loan servicing and dispute resolution, P&C
    claims, and government benefits adjudication, building a cross-industry reward-data platform that any enterprise
    running in-house long-horizon agents can plug into.
solution: >-
  We build a data pipeline and reward-model service that connects directly to an insurer's case-management and
  audit-log systems, extracting every case decision, human override, and appeal outcome as a labeled training
  example. The pipeline automatically converts these labels into RL reward signals compatible with the insurer's
  existing in-house agent, built on any major foundation model, closing the loop between production mistakes and the
  next training run. A calibration layer flags noisy or low-agreement human overrides before they enter the reward
  pipeline, and a compliance-first deployment model -- on-prem or single-tenant VPC, with a signed BAA -- ensures no
  protected case data ever leaves the customer's environment. Platform teams get a dashboard showing autonomy-rate
  improvement over time, tied directly to the specific case types the agent still fails on, so they can show
  compliance and executives a defensible reliability curve instead of a black-box benchmark score.
goToMarketSeed:
  firstCustomer: >-
    AI/automation platform lead at a regional health insurer with 200-2,000 employees and $500M-$5B in annual
    premiums that has a live prior-authorization agent pilot capped below 30% end-to-end autonomy.
  buyingTrigger: >-
    The pilot agent's autonomy rate plateaus while the compliance team is already sitting on months of
    override-and-appeal audit data that no one is using to retrain it.
  currentAlternative: >-
    Manual re-prompting and periodic hand-labeled review batches performed by the internal AI team, or a generic
    third-party agent benchmark and evaluation service that does not reflect the insurer's own claims platform.
  switchingReason: >-
    The pipeline uses data the insurer already collects and is already compliant to use internally, so it closes the
    reliability loop faster and cheaper than hand-labeling or buying a generic synthetic-environment product from a
    lab-facing vendor like Bespoke.
  pricingHypothesis: >-
    Platform fee based on case volume processed through the reward pipeline, plus a percentage-of-savings component
    tied to the measured increase in end-to-end agent autonomy rate.
