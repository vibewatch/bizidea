    rationale: >-
      The same pipeline generalizes across regulated, audit-heavy long-horizon workflows in banking, P&C insurance,
      and government benefits, giving a credible path to a large cross-industry platform.
topRisks:
  - name: Regulated-data access risk
    description: >-
      Pulling compliance audit logs that contain PII or PHI into an RL pipeline could violate HIPAA or other
      data-residency and privacy rules if handled incorrectly.
    mitigation: >-
      Deploy inside the customer's VPC or on-premises, run automated PII and PHI redaction before any data enters the
      reward pipeline, and obtain a signed BAA and compliance sign-off before processing begins.
  - name: Noisy reward-signal risk
    description: >-
      Human override annotations in audit logs may be inconsistent or effectively rubber-stamped, producing a low-
      quality reward signal that trains the agent on the wrong lessons.
    mitigation: >-
      Start with a small hand-audited calibration set to validate reward-model quality, add reviewer-agreement
      scoring, and gate automated reward usage on passing that calibration check before scaling.
  - name: Incumbent-bundling risk
    description: >-
      Bespoke Labs, Patronus, and other well-funded RL-environment vendors could add a bring-your-own-log feature to
      their existing lab-facing platforms and out-execute a startup narrowly focused on this flywheel.
    mitigation: >-
      Move quickly to sign 2-3 design-partner insurers with proprietary claims-system integrations and
      data-processing agreements that create switching costs, and stay focused on regulated-industry compliance
      requirements, such as BAAs and on-prem deployment, that generic lab-facing vendors are slow to build.
