scenarios:
  downside:
    description: 合规审查拖得更久，扩展附着率跟不上，公司到 Y3 末只拿下 10 个活跃付费账号，混合 ARPU 和毛利率也更低。
    y3RevenueK: 1743.8
    y3EbitdaK: -827.6
    cashLowPointK: -567.7
    keyAssumptionChanges:
    - 混合年度 ARPU 跌到约 $225K，因为节省分成和第二案件族群扩展附着得很慢。
    - 客户数路径放缓，到 Q4Y2 只有 5 个活跃付费账号，到 Q4Y3 也只有 10 个，因为合规和合作伙伴渠道的销售管道需要更长时间才能跑通。
    - 毛利率封顶在约 66%，因为部署仍然比计划更偏服务化。
  base:
    description: 创始人主导的企业销售、可复用的合规手册，加上第二案件族群扩展，让公司到 Q4Y3 拿下 12 个活跃付费账号，退出期 ARR 约 $3.0M。
    y3RevenueK: 2457.0
    y3EbitdaK: -280.7
    cashLowPointK: 234.9
    keyAssumptionChanges:
    - 混合年度 ARPU 保持在约 $252K，这与付费试点的入门定价、以及节省分成附着后更丰厚的年度合同价值相符。
    - 客户数到 Q4Y2 达到 7 个、到 Q4Y3 达到 12 个，与运营里程碑一致，退出时接近研究测算的 $3.0M 滩头市场 ARR 上限。
    - 随着连接器复用和标准化合规打法取代定制化上线流程，毛利率到 Q4Y3 升至 70%。
  upside:
    description: 合作伙伴主导的渠道提前打通，第二案件族群扩展卖得更快，公司拿下 14 个活跃付费账号，Y3 EBITDA 转正。
    y3RevenueK: 3037.5
    y3EbitdaK: 200.3
    cashLowPointK: 691.5
    keyAssumptionChanges:
    - 混合年度 ARPU 升至约 $270K，因为节省分成和第二案件族群模块在账号生命周期更早阶段就已附着。
    - 客户数路径到 Q4Y2 达到 8 个活跃付费账号、到 Q4Y3 达到 14 个，因为一家核心业务系统合作伙伴变成了可复制的渠道。
    - 到 Y3 末毛利率达到约 72%，因为实施变得更产品化，需要定制数据工作的部署也更少。
