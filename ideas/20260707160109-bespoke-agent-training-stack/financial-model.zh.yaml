slug: audit-trail-reward-flywheel
date: '2026-07-07'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[business-plan.yaml date] 计划日期 2026-07-07 之后的首个完整运营月份。'
- id: A2
  name: 种子轮到账后的期初现金
  value: '2200'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd；fundingAsk.useOfFundsSummary] 按 $2-4M 区间的低端取 $2.2M 种子轮金额，因为模型到 Q4Y2 前一直保持在 7 个 FTE 以下，且在计划书 18 个月的执行期之外再留 6 个月缓冲。'
- id: A3
  name: 收入单位
  value: 活跃付费支付方账号
  unit: definition
  source: '[business-plan.yaml investorMemo.firstCustomer.initialContract] 模型里的客户数，统计的是一个付费试点或年度生产合同账号。'
- id: A4
  name: 每个付费账号的混合年度 ARPU
  value: '252.0'
  unit: USDK/logo-year
  source: '[business-plan.yaml investorMemo.firstCustomer.initialContract；milestones 24-36 months；research.yaml market.som] 90 天试点年化约 $63K，12 个活跃账号在约 $252K 混合 ARPU 下，随着节省分成和第二案件族群扩展附着，能把生意做到约 $3.0M 退出期 ARR。'
- id: A5
  name: Y1 月末客户数路径
  value: 0, 0, 0, 0, 0, 1, 1, 1, 2, 2, 2, 3
  unit: active paid logos
  source: '[business-plan.yaml milestones 0-12 months；operatingAssumptions] 对应约 90 天合规与试点搭建周期后，第一年拿下 2-3 个付费共创客户。'
- id: A6
  name: Y2 季末客户数路径
  value: Q1Y2 3; Q2Y2 4; Q3Y2 5; Q4Y2 7
  unit: active paid logos
  source: '[business-plan.yaml product.twelveMonth；milestones 12-24 months；experimentRoadmap] 假设前两个试点转化成功，且到 Y2 末有一个合作伙伴渠道开始贡献客源。'
- id: A7
  name: Y3 季末客户数路径
  value: Q1Y3 8; Q2Y3 9; Q3Y3 10; Q4Y3 12
  unit: active paid logos
  source: '[business-plan.yaml milestones 24-36 months；research.yaml market.som] 让基准情景保持在既定的 8-12 个付费账号目标之内，退出时接近研究测算的约 $3.0M 滩头市场 ARR 上限。'
- id: A8
  name: 毛利率爬坡
  value: 首批付费试点期间 45%，Y1 末段 50-55%，Y2 期间 58-65%，Y3 期间 67-70%
  unit: gross margin percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct；operations；strategicChoices.sequencingRationale] 单租户部署和定制连接器压低了早期毛利率，随着合规手册和核心业务系统集成被复用，毛利率逐步提升。'
- id: A9
  name: 用于单位经济模型的月流失率
  value: '1.8'
  unit: percent
  source: '[创业公司财务经验法则] 受监管工作流基础设施一旦上线应该有较强黏性，但账号集中度风险，让流失率高于成熟公开市场 SaaS 的水平。'
- id: A10
  name: CEO/GTM 负责人的全成本现金薪酬
  value: '156'
  unit: USDK/year
  source: '[business-plan.yaml team CEO / GTM lead] 创业公司财务经验法则：低于市场水平的创始人薪资，加上工资税和福利。'
- id: A11
  name: 创始机器学习/强化学习工程师的全成本现金薪酬
  value: '210'
  unit: USDK/year
  source: '[business-plan.yaml team Founding ML/RL engineer] 创业公司财务经验法则：医疗 AI 领域稀缺的资深机器学习创始工程师薪酬包。'
- id: A12
  name: 数据工程师的全成本现金薪酬
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml team Data engineer] 创业公司财务经验法则：核心业务系统集成工程师薪酬。'
- id: A13
  name: 合规/安全负责人的全成本现金薪酬
  value: '168'
  unit: USDK/year FTE-equivalent
  source: '[business-plan.yaml team Compliance / security lead (fractional)] 创业公司财务经验法则：医疗健康安全负责人薪酬，按 0.5 FTE 建模，直到规模足以支撑全职岗位。'
- id: A14
  name: 前线部署工程师/客户成功的全成本现金薪酬
  value: '150'
  unit: USDK/year
  source: '[business-plan.yaml team Forward-deployed engineer / customer success] 创业公司财务经验法则：面向客户的实施工程师薪酬。'
- id: A15
  name: 客户经理/BD 的全成本现金薪酬
  value: '180'
  unit: USDK/year
  source: '[创业公司财务经验法则] 只有创始人主导的试点证明了可复制性之后，才会招募第一位专职销售。'
- id: A16
  name: 解决方案/实施工程师的全成本现金薪酬
  value: '165'
  unit: USDK/year
  source: '[创业公司财务经验法则] 当团队需要支持第二个案件族群和更多试点数量时才加入。'
- id: A17
  name: 客户成功/合作伙伴经理的全成本现金薪酬
  value: '145'
  unit: USDK/year
  source: '[创业公司财务经验法则] 一旦合作伙伴带来的销售管道和多账号续约需要专人负责，就加入这一岗位。'
- id: A18
  name: 高级数据/平台工程师的全成本现金薪酬
  value: '190'
  unit: USDK/year
  source: '[创业公司财务经验法则] 支付方切口验证成功后，支撑连接器复用、数据治理和相邻垂直领域的拓展评估。'
- id: A19
  name: 招聘节奏
  value: CEO 和创始机器学习工程师于 M1 到位；数据工程师 M3；合规负责人 M4 按 0.5 FTE 到位；前线部署工程师 M7；客户经理 M16；解决方案工程师 M19；客户成功/合作伙伴经理 M26；合规负责人 M28 升为 1.0 FTE；高级数据/平台工程师 M31
  unit: timing
  source: '[business-plan.yaml team；strategicChoices.sequencingRationale；fundingAsk.useOfFundsSummary] 在合规过关、试点转化和连接器复用得到验证之前，团队保持精简。'
- id: A20
  name: 职能薪酬分摊
  value: CEO 70% 计入 S&M、30% 计入 G&A；创始机器学习工程师和数据工程师 100% 计入 R&D；合规负责人 100% 计入 G&A；前线部署工程师 40% 计入 S&M、60% 计入 R&D；客户经理 100% 计入 S&M；解决方案工程师 50% 计入 S&M、50% 计入 R&D；客户成功/合作伙伴经理 60% 计入 S&M、40% 计入 G&A；高级数据/平台工程师 100% 计入 R&D
  unit: allocation policy
  source: '[business-plan.yaml team rationales；operations] 薪酬分摊，按谁在卖切口、谁在搭可复用集成、谁扛合规负担来划分。'
- id: A21
  name: 非薪酬运营支出
  value: Y1 月度 S&M/R&D/G&A 为 8K/12K/15K；Y2 为 10K/14K/16K；Y3 为 12K/16K/18K
  unit: USDK/month
  source: '[创业公司财务经验法则] 覆盖具备 HIPAA 能力的云服务、SOC 2 相关工作、拜访支付方买家的差旅、保险和法务开支。'
- id: A22
  name: 现金转化政策
  value: EBITDA 近似等同于经营性现金变动
  unit: policy
  source: '[创业公司财务经验法则] 现阶段不建模债务、资本支出、税务或重大营运资金波动。'
- id: A23
  name: 销售周期转化基准
  value: 约 90 天完成合规审查并启动付费试点；12 个月内试点转年度合同的转化率 50% 以上
  unit: timing
  source: '[business-plan.yaml operatingAssumptions；gtm.funnelTargets；investorMemo.firstCustomer.initialContract] 用来锚定客户爬坡的时间节奏。'
- id: A24
  name: 每个新增付费账号的混合 CAC
  value: '124.5'
  unit: USDK/new paid logo
  source: 按模型测算的 Y2-Y3 销售与市场支出 1120.9K 除以 9 个净新增付费账号计算得出。
- id: A25
  name: 融资里程碑
  value: 拿下 7 个活跃付费账号、2 份转为年度合同的客户、跑通第二个案件族群、打通一条核心业务系统合作伙伴渠道，并保留约 6 个月现金缓冲
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months；fundingAsk.runwayMonths；useOfFundsSummary] 用于确定本轮种子轮的规模。'
- id: A26
  name: 种子轮资金用途分配
  value: 45% 工程，25% GTM，15% G&A，15% 缓冲
  unit: allocation
  source: '[business-plan.yaml fundingAsk.useOfFundsSummary；模型测算到 Q4Y2 的烧钱结构] 把大部分资金留在产品化和高合规成本的交付上，同时保留真实缓冲。'
