modelDiagram:
  title: 单位经济流程
  mermaid: "flowchart LR\n  AuditLogs[Override and appeal audit logs] --> RewardLabels[Reward-labeled training data]\n  RewardLabels --> Customers[Active paid payer logos]\n  Customers --> Revenue[Case-volume fee plus savings-share revenue]\n  Revenue --> GrossProfit[Gross profit after single-tenant and support COGS]\n  GrossProfit --> Cash[Cash to fund integrations, compliance, and GTM]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入，来自付费账号从 Y1 末的 3 个增长到 Q4Y3 的 12 个，混合 ARPU 约 $252K，让公司到 Q4Y3 达到约 $3.0M 的退出期 ARR。
- checkName: 必须成立的前提
  finding: 前七个账号必须足够快地通过合规审查，让同一套事前授权加理赔核定的打法能够复制，而不用在 Q4Y2 之前被迫组建大得多的服务团队。
- checkName: 模型失效的条件
  finding: 如果销售周期拉长到接近 9 个月，或者混合 ARPU 跌向 $225K，下行情景会在 Y3 结束之前就转为现金为负，种子轮也就撑不到下一个验证点。
- checkName: 下一轮融资的验证点
  finding: 下一轮融资的故事，是在 Y2 末拿下 7 个活跃付费账号、2 份转为年度合同的客户、一个跑通的第二案件族群，以及一条能支撑扩展到 12 个账号的合作伙伴销售管道。
sanityChecks:
  ruleOf40: Y3 增长率 105%，加 EBITDA 利润率 -11%，合计 94%。
  burnMultiple: Y2 烧钱倍数约为 0.7x，对应约 $1.0M 的净新增 ARR；随着扩展收入吸收大部分招聘增量，Y3 改善到约 0.2x。
  revenuePerFte: Y3 人均收入 $273K，按 9 名期末 FTE 计算（SaaS 基准区间约为 $200-400K）。
  flags:
  - 基准情景到 Y3 末现金只剩约 $0.24M，一旦 Q4Y2 里程碑延后，很可能就要靠过桥融资或缩减招聘计划。
  - $252K 混合 ARPU 假设需要节省分成和第二案件族群扩展成功附着；如果客户停留在接近持平的 $150K 基础合同，滩头市场 ARR 的验证进度会明显推迟。
  - 只有核心业务系统连接器和合规手册能在各账号间复用，毛利率才能达到 70% 的目标；定制化的本地部署工作会让 EBITDA 长期承压。
