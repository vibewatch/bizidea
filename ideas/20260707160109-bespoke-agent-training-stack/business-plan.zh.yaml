slug: audit-trail-reward-flywheel
date: '2026-07-07'
executiveSummary: 美国区域性健康险公司和第三方理赔管理机构，正在运行内部事前授权和理赔智能体，但端到端自主处理率始终卡在 30% 以下，与此同时，合规要求留存的几个月改判、暂挂和申诉数据却闲置未用，没有拿去重新训练这些智能体。我们构建的是一条合规优先的管道，摄取保险公司现有的案件管理和审计日志系统，把每一次改判和申诉结果都转成经过校准的强化学习奖励信号，针对性地在智能体仍然做错的案件上重新训练它。切口刻意收得很窄：一个案件族群（事前授权）、一种部署模式（单租户或本地部署，签署 BAA）、一个证明点（在真实共创客户的历史案件上拿出可衡量的自主处理率提升），做实之后再扩展到理赔核定或相邻的受监管垂直领域。Bespoke Labs 的 $40M 融资和 METR 的任务时长倍增曲线，印证了训练环境数据、而非更多智能体前端，才是当下的瓶颈；CMS-0057-F 也正按固定的监管时钟，逼支付方把事前授权流程变得电子化、可审计。经过调研的市场是真实的，但也是有边界的：TAM 估算约 $180M，SAM 约 $45M（覆盖近期 AI 活跃的区域性保险计划和 TPA），第三年可信的 SOM 约为 $3M ARR，来自 20 家共创客户——所以这首先是一门滩头市场生意，只有切口被验证之后，才谈得上跨行业平台。基础研究里，竞争烈度和替代品风险都被打了高分：横向评测厂商（Bespoke、Patronus、Braintrust）和支付方工作流现有厂商（HealthEdge、Optum、核心业务系统平台）中的任何一个，都可能在我们抢先做好合规速度和支付方原生数据接入之前，把这块预算吃掉。下面的计划先把一次窄口径的试点动作、一套校准方法论、一套合规运营手册排好顺序，再谈任何扩张，并把定价、首个客户和渠道当成一个整体的市场进入系统来处理，而不是分开的几件事。
problem:
- 区域性保险公司的内部事前授权和理赔智能体，自主处理率卡在很低的比例，因为没有快速办法把生产环境里真实的错误变成训练信号，这逼得 AI 平台团队只能困在缓慢的手工重新调 prompt 和定期手工打标审核批次里。
- 合规本来就要求保险公司把每一次案件改判、升级和申诉结果都记进审计轨迹，但这份审计轨迹却闲置在那里，没有真正补上智能体强化学习周期的闭环；与此同时，Bespoke Labs 这类资金充裕的厂商，做的是给基础模型实验室用的合成训练环境，而不是服务企业自己那套特有的理赔平台。
solution:
- 一条数据管道加奖励模型服务，直接对接保险公司的案件管理和审计日志系统，把每一次案件决策、人工改判和申诉结果都抽取成带标签的训练样本，再把这些标签转成兼容保险公司现有内部智能体的强化学习奖励信号。
- 一层校准机制给审核人一致性打分，在噪声大或低置信度的改判进入奖励管道之前把它们标记出来；合规优先的部署模式（本地部署或单租户 VPC，签署 BAA）确保受保护的案件数据永远不离开客户的环境，配一个仪表盘把自主处理率提升和智能体仍在出错的具体案件类型关联起来。
whyWeWin:
- 我们用的数据本来就因为法律原因被收集、也早已获批用于内部用途，这让我们能比任何要求把生产数据挪作新用途的厂商（包括 Bespoke Labs 和 Patronus）更快通过合规审查。
- 因为奖励管道就是在客户自己的理赔平台、审核惯例和申诉模式上训练的，它带来的可靠性提升，是通用行业基准或合成环境都复制不出来的；根据研究，HealthEdge、Optum 这类现有厂商都绑定在自己的技术栈里，做不出一个中立的、跨模型的奖励层。
strategicChoices:
  beachhead: 美国区域性健康险公司和第三方理赔管理机构的 AI 平台和理赔运营负责人，员工规模 200 到 2000 人，年保费 $500M-$5B，正在某个核心业务系统平台（QNXT、Facets、HealthRules 或自研系统）上跑事前授权智能体试点，端到端自主处理率被卡在 30% 以下。
  wedgeRationale: 事前授权是结构化审计轨迹最丰富（改判、暂挂、申诉代码）、监管时钟最紧迫（CMS-0057-F）的单一案件族群，所以它能比理赔核定或任何跨行业工作流更快拿出可衡量的自主处理率证明点，而且不需要我们搭建合成环境，也不用在推倒重来的采购中对抗核心业务系统现有厂商。
  sequencingRationale: 我们先做通一个案件族群、一个核心业务系统集成、一个共创客户的合规审查，然后才加第二个案件类型、第二个平台集成或第二个行业垂直领域，因为研究显示两个最难的摩擦点（PHI 治理和噪声审核人标签）必须先窄口径、可重复地解决掉，任何扩张说法才能让谨慎的合规买家信服。
  notYet:
  - 银行贷款服务、财产险理赔和政府福利核定这些垂直领域，虽然共享同一套审计日志转奖励的架构，但要等健康支付方这个滩头市场，在至少两个共创客户身上跑出可重复的、经过校准关卡的自主处理率提升之后，才会启动。
  - 一个通用的、不挑模型的奖励数据平台定位（正面硬刚 Bespoke 或 Patronus）暂缓推出；在生产环境中证明合规速度和数据接入优势之前，我们保持窄口径、只做支付方原生这条路。
market:
  tam: "$180M（估算：约 1,200 家美国支付方/TPA，具备事前授权或理赔复杂度，乘以约 $150k 基础年度 ACV，依据 research.yaml）"
  sam: "$45M（估算：约 300 家近期就会用得上、已在使用管理或理赔环节优先采用 AI 的区域性保险计划/TPA，乘以约 $150k ACV，依据 research.yaml）"
  som: "$3.0M（估算：到第 3 年拿下 20 家共创客户/早期生产客户，乘以约 $150k 混合 ACV，依据 research.yaml）"
  segments:
  - 跑内部长周期理赔智能体的区域性健康险公司和第三方理赔管理机构
  - 银行贷款服务、财产险和政府福利机构（暂缓的扩展方向，不是第一年的重点）
  buyingProcess: AI/自动化 VP 或首席理赔官掌握试点预算和自主处理率扩展的问责，但合规和审计官员必须先在签署的 BAA 下批准审计日志重用于训练，试点才能处理真实案件数据，所以销售周期要同时穿过技术/经济买家和合规关卡这两道门。
product:
  mvp: 一条覆盖单一案件族群（事前授权）的审计日志转奖励管道，与一个共创客户的核心业务系统平台集成，从改判/申诉事件生成经过校准的奖励标签，重新训练该客户现有的智能体，并展示自主处理率仪表盘，部署方式为单租户或本地部署，签署 BAA。
  sixMonth: 为现有共创客户加入审核人一致性校准打分和第二个案件族群（理赔核定）；完成离线重放研究，证明奖励增强再训练优于纯 prompt 调优；启动 SOC 2 Type I 认证。
  twelveMonth: 把前 2 个共创客户从付费试点转为按案件量加节省分成的年度合同；支持第二个核心业务系统平台集成；拿到 SOC 2 Type II；建立一个核心业务系统生态合作伙伴关系（Guidewire、Duck Creek，或 QNXT/Cognizant 系统集成商）作为引荐渠道。
  twentyFourMonth: 在健康支付方滩头市场的两个案件族群上，拿到 8 到 12 家付费客户；用同一套管道架构，为一个相邻受监管垂直领域（银行贷款服务或财产险理赔）验证一次范围界定试点，同时不从支付方滩头市场抽调核心工程资源。
  keyBets:
  - 在真实审计日志数据上做奖励增强再训练，会在至少一个高量案件族群上以可衡量的幅度超过纯 prompt 调优或纯规则调优——这是整个定价和防御性论点的根基。
  - 只要数据永远不离开客户的环境，合规团队会在一个销售周期内批准租户内、受 BAA 约束的审计日志重用，而不是把它当成一个陌生、审批缓慢的新用例。
  - 一条窄口径、支付方原生、合规优先的管道，会比横向评测厂商或核心业务系统现有厂商更快签下并留住共创客户——它们要临时加装一个同等的自带日志功能没那么快。
gtm:
  wedge: 一条从合规日志到奖励信号的管道，摄取保险公司现有的案件决策审计轨迹（审核人改判、升级备注、申诉结果），自动转成带标签的强化学习奖励信号，针对性地在保险公司当前做错的那些案件上，重新训练它自己的内部智能体。
  channels:
  - 直接向区域性健康险公司和 TPA 的 AI/自动化和理赔运营负责人做企业销售
  - 合规与审计会议合作，在合规官这道关卡上建立信誉
  - 靠 Guidewire、Duck Creek 和 QNXT/Cognizant 系统集成商等核心业务系统生态合作伙伴引荐——它们本来就掌控着数据接入和生产部署
  funnelTargets: 线索到合格试点转化率 20%-35%，试点启动 12 个月内转为付费年度合同的比例 50% 以上
  pricing: 按案件量计费的平台费（与处理案件量挂钩的可预测基础收入），加上与端到端智能体自主处理率实测提升挂钩的节省分成，让定价直接锚定 research.yaml 里 CAQH 记录的每笔交易 $9.64 人工转电子化节省基准，而不是一个泛泛的按坐席或用量收费的模式。
businessModel:
  revenueStreams:
  - 按案件量计费的平台费
  - 与自主处理率提升挂钩的节省分成
  - 针对额外案件类型和核心业务系统集成的扩展费用
  unitOfValue: 一份经过校准、带奖励标签、走完管道处理流程的案件决策，及其带来的自主处理率提升
  targetGrossMarginPct: 70
  expansionLevers:
  - 在现有客户内，把事前授权之外的更多案件类型（理赔核定、申诉）纳入
  - 增加更多核心业务系统平台集成（QNXT、Facets、HealthRules、Guidewire、Duck Creek）
  - 健康支付方切口验证成功后，扩展到相邻的受监管、审计繁重垂直领域
strategyMap:
  northStarMetric: 每位客户每季度交付的端到端案件自主处理率净新增百分点
  inputMetrics:
  - 生产环境中在跑的共创客户数量
  - 每位客户经奖励管道处理的案件量
  - 每个案件族群的审核人一致性校准分数
  - 从案件失败到智能体策略更新完成的再训练周期时长
  moatsToBuild:
  - 每位客户随时间积累的专有长期改判、暂挂和申诉奖励数据集
  - 通用厂商很难快速搭建的合规级单租户部署和 BAA 运营手册
  - 覆盖 QNXT、Facets、HealthRules、Guidewire 和 Duck Creek 的核心业务系统集成库
  killCriteria:
  - 如果在 6 个月内、跨 2 个共创客户的离线重放中，奖励增强再训练未能在自主处理率上比纯 prompt 调优高出至少 5 个百分点，就放弃独立奖励管道这条论点。
  - 如果连续两次销售尝试中，5 个目标共创客户里有不到 2 个能在 90 天试点周期内通过合规/BAA 审查，就暂停新客户获取，重建合规就绪动作。
  - 如果核心业务系统现有厂商（HealthEdge、Optum）或横向评测厂商（Bespoke、Patronus）在我们签下 3 个共创客户之前，就推出了同等的自带日志奖励功能，就要重新评估独立生存能力。
  mermaid: "flowchart LR\n  Wedge[Prior-auth audit-log wedge] --> MVP[Single-case-family reward pipeline]\n  MVP --> Proof[Design-partner autonomy-rate lift]\n  Proof --> Expansion[Second case family + core-admin integration]\n  Expansion --> Platform[Cross-vertical reward-data platform]"
investorMemo:
  verdict:
    call: 值得会面/进一步调查
    conviction: 中等信念——痛点、买家和为什么是现在都有扎实证据支撑，但研究得出的 SOM 偏小（第 3 年约 $3M），竞争烈度和替代品风险两项都打了高分，所以近期论点靠的是证明合规速度和数据接入优势，而不是单纯的市场体量。
    whyBelieve: 四篇经过核实的信源证实了一笔 $40M 的融资，押注训练环境数据是智能体的瓶颈；研究还独立显示，84% 的受访保险公司已经在用 AI/ML，且治理原则已经到位，说明这不是一个冷启动的市场。
    whyDoubt: SOM 偏窄（滩头市场第 3 年约 $3M ARR），替代品威胁在研究的五力模型里得分最高，而 HealthEdge、Optum、Bespoke、Patronus 这些现有厂商，都可能在这家公司做到规模稳固之前，各自加上一个同等的自带日志功能。
    nextDiligence: 与一个共创客户一起跑离线重放实验（500 到 2000 个历史事前授权案件，对比奖励增强调优和纯 prompt 调优），在投入资金前先证明核心的自主处理率提升论点。
  firstCustomer:
    title: 区域性健康险公司或 TPA 的 AI/自动化平台负责人
    profile: 一家员工规模 200 到 2000 人、年保费 $500M-$5B 的区域性健康险公司或第三方理赔管理机构，正在某个核心业务系统平台（QNXT、Facets、HealthRules 或自研系统）上跑内部事前授权智能体试点，端到端自主处理率被卡在 30% 以下。
    trigger: 试点智能体的自主处理率停滞不前，而合规部门手上早已积压了几个月未用的改判和申诉审计数据；CMS-0057-F 又要求事前授权裁定更快、更可审计，进一步加重了这个压力。
    buyer: AI/自动化 VP 或首席理赔官
    initialContract: 在一个案件族群上开展 90 天付费试点（大约 $50k-$150k），一旦自主处理率提升通过校准和合规关卡，就转为按案件量加节省分成的年度合同，ACV $150k 以上。
  mustBeTrue:
  - 目标支付方系统（QNXT、Facets、HealthRules 或自研系统）在至少一个高量案件族群上，把改判、暂挂和申诉结果存成结构化事件，而不只是自由文本或 PDF。
  - 2 个以上共创客户的合规和安全团队，能在大约 90 天的销售周期内，批准在受 BAA 约束和去标识化控制下、租户内重用审计日志用于再训练。
  - 在历史案件的离线重放中，基于真实审计日志的奖励增强再训练，能以统计上站得住脚的幅度（目标 5 个百分点以上）提升端到端案件自主处理率，超过纯 prompt 调优。
  - 至少一个共创客户在 12 个月内，从试点转为 ACV 约 $150k 以上的付费年度合同，且不需要推倒重来它们的核心业务系统。
  - 核心业务系统现有厂商（HealthEdge、Optum）和横向评测厂商（Bespoke、Patronus），在公司开始销售的头 18 个月内，不会在自己的平台里推出同等的审计日志转奖励功能。
  diligenceQuestions:
  - 在目标支付方系统里，改判、暂挂和申诉事件究竟有多大比例已经是结构化的，而不是埋在自由文本里？如果不是，文档抽取层会给成本和时间线增加多少？
  - 拿下支付方合规和 BAA 审查的真实转化周期和成本是多少，是否符合这份计划里假设的 90 天试点？
  - 预算到底落在理赔运营、使用管理、数字化转型，还是中央 AI 平台团队手里？这会怎样改变交易规模或销售周期长度？
  - 在种子轮之前，有哪些离线重放证据存在或可以收集，证明审计日志驱动的奖励调优在真实案件族群上优于纯 prompt 调优？
  - 如果 Bespoke、Patronus 或某个核心业务系统现有厂商加上自带日志功能，这个切口的防御力还剩多少？在那种情况下，具体哪种转换成本或数据护城河还能存活？
  - 按研究得出的滩头市场第 3 年约 $3M SOM 计算，通向风投级论点所依赖的更大跨行业 TAM，有什么可信的路径和时间表？
operatingAssumptions:
- assumption: 目标支付方核心业务系统，会把审核人改判、暂挂原因和申诉结果，存成至少一个案件族群可结构化提取的事件。
  basis: research.yaml
  validationTest: 从一套 QNXT 或 HealthRules 实例中导出样本，展示某一案件族群的事件类型、时间戳、审核人和结果状态。
  decisionImpact: 如果数据大多是非结构化的（自由文本或 PDF），MVP 就必须先加一层文档抽取，才能让任何奖励管道跑起来，这会推迟试点时间线，需要更多前期数据工程投入。
- assumption: 合规和安全团队会在一个销售周期内（大约 90 天），批准租户内、受 BAA 约束的审计日志重用于再训练。
  basis: research.yaml
  validationTest: 与 2 个共创客户开展安全和隐私审查，跟踪实际的 BAA 签署耗时，对照 90 天的假设。
  decisionImpact: 如果合规审查耗时明显更长，试点转合同的周期就会拉长，市场进入策略必须在任何管道部署之前，加一项专门的售前合规就绪服务。
- assumption: 在至少一个案件族群上，基于真实审计日志的奖励增强再训练，会比纯 prompt 调优或纯规则调优产生可衡量的自主处理率提升。
  basis: idea.yaml
  validationTest: 对一个案件族群做离线重放实验，在 500 到 2000 个历史案件上，对比基线 prompt 与奖励增强再训练。
  decisionImpact: 如果提升幅度不明显、站不住脚，节省分成定价就会崩塌，商业模式必须改为纯平台固定费用。
- assumption: 这个品类的预算落在单一可识别的买家手里（AI/自动化平台负责人或理赔运营 VP），而不是分散在理赔运营、使用管理和数字化转型之间。
  basis: research.yaml
  validationTest: 对已经在评估事前授权自动化或理赔 AI 的区域性保险计划和 TPA，做十次结构化买家访谈。
  decisionImpact: 如果预算分散在多个利益相关方之间，销售周期就会拉长，市场进入策略必须建立多方参与的销售动作，而不是单线程的企业销售。
- assumption: 核心业务系统和横向评测现有厂商（HealthEdge、Optum、Bespoke、Patronus），不会在 18 个月内快到能封死这个切口的速度，推出同等的自带日志奖励功能。
  basis: 创始团队判断
  validationTest: 每季度跟踪现有厂商的产品公告，监测在任何现有厂商推出同等功能之前，2 到 3 个已签约共创客户能否形成持久的转换成本。
  decisionImpact: 如果现有厂商率先推出，公司就必须转向更窄口径的防御性论点（更快的合规认证、相邻垂直领域扩展），或加速合作或并购方面的谈判。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 从一个共创客户的 QNXT 或 HealthRules 实例中，为一个案件族群导出并审计改判、暂挂和申诉事件样本。
  hypothesis: 改判、暂挂和申诉结果，在至少一个高量案件族群上，是以结构化、可提取的事件存在，而不只是自由文本。
  successMetric: 70% 以上的抽样案件决策，带有可用于奖励打标的结构化、带时间戳的改判/申诉事件数据。
  owner: 创始工程师/数据工程
- horizon: 0–90 天
  experiment: 在模板 BAA 和单租户部署架构下，与 2 个目标共创客户开展合规和安全审查。
  hypothesis: 只要数据永远不离开客户环境，合规团队会在 90 天周期内批准租户内审计日志重用于再训练。
  successMetric: 90 天内签下 2 份 BAA 或获得合规审批。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 在一个共创客户的 500 到 2000 个历史事前授权案件上，做奖励增强再训练与纯 prompt 调优的离线重放对比。
  hypothesis: 奖励增强再训练能让端到端案件自主处理率比纯 prompt 调优高出 5 个百分点以上。
  successMetric: 在留出的案件集上，取得统计显著的 5 个百分点以上自主处理率提升。
  owner: 创始机器学习工程师
- horizon: 90–180 天
  experiment: 对已经在评估事前授权自动化或理赔 AI 的区域性健康险计划和 TPA，做十次结构化买家访谈。
  hypothesis: 这个品类的预算和采购决定权，稳定地落在单一 AI/自动化平台负责人或理赔运营 VP 手里。
  successMetric: 10 次访谈中有 6 次确认了单一可识别的经济买家和预算条线。
  owner: 创始人/市场进入负责人
- horizon: 180–365 天
  experiment: 把前 2 个共创客户从付费试点，转为按案件量加节省分成的年度合同。
  hypothesis: 实测的自主处理率提升和干净的合规部署，能撑起 $150k 以上 ACV 的续约。
  successMetric: 2 个试点里有 2 个转为达到或超过目标 ACV 的付费年度合同。
  owner: 创始人/CEO
- horizon: 180–365 天
  experiment: 与一家核心业务系统生态伙伴（Guidewire、Duck Creek，或 QNXT/Cognizant 系统集成商）建立引荐合作关系。
  hypothesis: 合作伙伴引荐的线索，转化为合格试点的比例明显高于冷启动外呼。
  successMetric: 到第 12 个月，合作伙伴渠道贡献合格试点管线的 25% 以上。
  owner: 创始人/BD 负责人
- horizon: 365–540 天
  experiment: 每季度评审 HealthEdge、Optum、Bespoke 和 Patronus 的产品公告，跟踪自带日志或支付方原生奖励功能的动向。
  hypothesis: 在公司正式发布后的 18 个月内，没有现有厂商推出同等的、支付方原生、合规优先的奖励管道。
  successMetric: 到第 18 个月，连续几个季度的扫描都确认零个直接竞争的现有厂商功能上线。
  owner: 创始人/CEO
operations:
- 合规级数据管道，带自动化 PII/PHI 脱敏，在任何奖励打标开始之前，就按客户单租户或本地部署。
- 带审核人一致性打分关卡的奖励模型校准方法论，挡住低置信度标签进入训练。
- SOC 2 Type I/II 认证路线图，加上每位客户签署的 BAA，作为一项常设的合规运营职能来运行。
- 为每个新的共创客户试点配备专属的 90 天实施团队。
- 核心业务系统生态合作关系（Guidewire、Duck Creek、QNXT/Cognizant 系统集成商），用于数据接入，也作为引荐分发渠道。
team:
- role: 创始 CEO/市场进入负责人（支付方领域专家）
  startTiming: 第 0 个月
  rationale: 需要在理赔运营和合规买家中拥有深厚的信誉，还要熟悉 CMS-0057 监管细节，才能完成 90 天合规审查，拿下第一批共创客户试点。
- role: 创始机器学习/强化学习工程师
  startTiming: 第 0 个月
  rationale: 负责奖励模型校准方法论和离线重放实验，在任何定价模式能被信任之前，先证明核心的自主处理率提升切口论点。
- role: 数据工程师（核心业务系统集成）
  startTiming: 第 2–3 个月
  rationale: 为每个理赔平台（QNXT、Facets、HealthRules）构建并维护审计日志抽取连接器，这是研究中识别出摩擦最大的集成环节。
- role: 合规/安全负责人（兼职）
  startTiming: 第 3–4 个月
  rationale: 负责 BAA 模板、PHI 脱敏验证，以及在 90 天试点周期内通过支付方合规审查所需的 SOC 2 路线图。
- role: 前线部署工程师/客户成功
  startTiming: 第 6–9 个月
  rationale: 一旦试点数量超出创始人自己的带宽，就为每个新共创客户运行专属的 90 天实施团队。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2 到 3 家共创客户保险公司或 TPA 的付费试点，覆盖一个核心业务系统平台和事前授权案件族群。
  - 完成离线重放研究，证明自主处理率比纯 prompt 调优提升 5 个百分点以上。
  - 拿到 2 份签署的 BAA 或合规审批。
  - 上线 v1 版审计日志转奖励管道，配一个校准仪表盘。
- horizon: 12–24 个月
  items:
  - 把前 2 个试点转为 ACV $150k 以上的按案件量加节省分成年度合同。
  - 为现有共创客户扩展到第二个案件族群（理赔核定）。
  - 拿到 SOC 2 Type II。
  - 建立一个核心业务系统生态合作关系作为引荐渠道。
- horizon: 24–36 个月
  items:
  - 在健康支付方滩头市场的两个案件族群上，拿到 8 到 12 家付费客户。
  - 用同一套管道架构，为一个相邻受监管垂直领域（银行贷款服务或财产险理赔）验证一次范围界定试点。
  - 跨过研究得出的健康支付方滩头市场 $3M ARR SOM 目标。
risks:
- risk: 受监管数据访问风险——把带 PHI 的合规审计日志拉进强化学习管道，一旦处理不当，可能违反 HIPAA 或数据驻留规则。
  likelihood: Medium
  impact: High
  mitigation: 部署在客户自己的 VPC 或本地环境内，数据进入奖励管道之前先做自动化 PII/PHI 脱敏，处理开始前先拿到已签署的 BAA 和合规审批。
- risk: 奖励信号噪声风险——人工改判标注可能前后不一致，或者只是走个过场，产生低质量的奖励信号，让智能体学到错误的教训。
  likelihood: Medium
  impact: Medium
  mitigation: 先用一个小规模、人工审核过的校准集验证奖励模型质量，加入审核人一致性打分，在通过校准检验之前，先卡住自动化奖励的规模化使用。
- risk: 现有厂商捆绑风险——HealthEdge、Optum、Bespoke 或 Patronus 可能在自己现有的平台上加一个自带日志功能，凭执行力压过一家专注窄口径的创业公司。
  likelihood: Medium
  impact: High
  mitigation: 尽快签下 2 到 3 家共创客户保险公司，靠专有理赔系统集成和数据处理协议构筑转换成本，并持续聚焦通用厂商很慢才能补上的合规要求（BAA、本地部署）。
- risk: 监管审查风险——针对 AI 辅助事前授权拒绝的监管或诉讼趋严，可能迫使初期用例收窄或拖慢部署。
  likelihood: Medium
  impact: Medium
  mitigation: 在涉及拒绝的相关决策上，让智能体保持人类在环审核的姿态，把产品定位成提升可审计性和可解释性，而不是把拒赔完全自动化。
- risk: 替代风险——手工重新调 prompt、现有厂商的事前授权自动化，以及通用评测栈，都可能吃掉这块预算的一部分；研究给替代品威胁在五力模型中打了最高分。
  likelihood: High
  impact: Medium
  mitigation: 在前 2 个共创客户身上，证明相对纯 prompt 调优、可衡量、量化的自主处理率提升，让 ROI 论证扎实，而不是靠假设。
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 18 个月的现金跑道，将支撑一个 5 人的创始团队（CEO/市场进入、机器学习/强化学习工程师、数据工程师、兼职合规负责人、前线部署工程师），完成离线重放验证研究、SOC 2 Type I/II 认证，以及签下并转化 2 到 3 家共创客户为事前授权案件族群付费年度合同所需的单租户/VPC 部署基础设施。
