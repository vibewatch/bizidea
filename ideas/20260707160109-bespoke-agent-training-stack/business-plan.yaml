slug: audit-trail-reward-flywheel
date: '2026-07-07'
executiveSummary: >-
  Regional U.S. health insurers and third-party claims administrators are running in-house prior-authorization and
  claims agents that plateau below 30% end-to-end autonomy, while months of compliance-mandated override, pend, and
  appeal data sit unused instead of retraining those agents. We build a compliance-first pipeline that ingests an
  insurer's existing case-management and audit-log systems and converts every override and appeal outcome into
  calibrated RL reward signal that retrains the insurer's own agent on the exact cases it still gets wrong. The
  wedge is narrow and deliberate: one case family (prior authorization), one deployment model (single-tenant or
  on-prem with a signed BAA), and one proof point (a measurable autonomy-rate lift on a real design partner's
  historical cases) before expanding to claims adjudication or adjacent regulated verticals. Bespoke Labs' $40M raise
  and the METR task-doubling curve validate that training-environment data, not more agent front-ends, is the
  current bottleneck, and CMS-0057-F is forcing payers to make prior-authorization workflows electronic and
  auditable on a fixed regulatory clock. The researched market is real but bounded: TAM is estimated at roughly
  $180M, SAM at roughly $45M across near-term AI-active regional plans and TPAs, and a credible SOM of about $3M ARR
  by year three from 20 design-partner logos, so this is a beachhead business first and a cross-industry platform
  only if the wedge proves out. Competitive rivalry and substitute risk are both scored high in the underlying
  research: horizontal eval vendors (Bespoke, Patronus, Braintrust) and payer-workflow incumbents (HealthEdge, Optum,
  core-admin platforms) could each absorb this budget line if we do not move first on compliance speed and
  payer-native data access. The plan below sequences one narrow pilot motion, one calibration methodology, and one
  compliance operating playbook before any expansion claim, and treats pricing, first customer, and channel as a
  single go-to-market system rather than separate exercises.
problem:
  - >-
    In-house prior-authorization and claims agents at regional insurers plateau at a small fraction of full
    autonomy because there is no fast way to turn real production mistakes into training signal, forcing AI
    platform teams into slow manual re-prompting and periodic hand-labeled review batches.
  - >-
    Compliance already forces insurers to log every case override, escalation, and appeal outcome in an audit
    trail, yet that audit trail sits idle instead of closing the loop on the agent's reinforcement-learning cycle,
    while well-funded vendors like Bespoke Labs build synthetic training environments for foundation-model labs
    rather than for the enterprise's own idiosyncratic claims platform.
solution:
  - >-
    A data pipeline and reward-model service connects directly to an insurer's case-management and audit-log
    systems, extracting every case decision, human override, and appeal outcome as a labeled training example, then
    converts those labels into RL reward signals compatible with the insurer's existing in-house agent.
  - >-
    A calibration layer scores reviewer agreement and flags noisy or low-confidence overrides before they enter the
    reward pipeline, and a compliance-first deployment model (on-prem or single-tenant VPC, signed BAA) ensures no
    protected case data ever leaves the customer's environment, with a dashboard tying autonomy-rate improvement to
    the specific case types the agent still fails on.
whyWeWin:
  - >-
    Our data source is already collected for legal reasons and already approved for internal use, which clears
    compliance review faster than any vendor asking to ingest raw production data for a new purpose, including
    Bespoke Labs and Patronus.
  - >-
    Because the reward pipeline trains on the customer's exact claims platform, reviewer conventions, and appeal
    patterns, it produces reliability gains a generic industry benchmark or synthetic environment cannot replicate,
    and per research, incumbents like HealthEdge and Optum are tied to their own stacks rather than shipping a
    neutral, cross-model reward layer.
strategicChoices:
  beachhead: >-
    AI platform and claims-operations leaders at regional U.S. health insurers and third-party claims administrators
    with 200-2,000 employees and $500M-$5B in annual premiums, running a live prior-authorization agent pilot on a
    core-admin platform (QNXT, Facets, HealthRules, or a custom claims system) capped below 30% end-to-end autonomy.
  wedgeRationale: >-
    Prior authorization is the single case family with the richest structured audit trail (override, pend, appeal
    codes) and the most acute regulatory clock (CMS-0057-F), so it produces a measurable autonomy-rate proof point
    faster than claims adjudication or any cross-industry workflow, without requiring us to build a synthetic
    environment or win a rip-and-replace procurement against core-admin incumbents.
  sequencingRationale: >-
    We sequence one case family, one core-admin integration, and one design partner's compliance review before
    adding a second case type, a second platform integration, or a second industry vertical, because the research
    shows the two hardest frictions (PHI governance and noisy reviewer labels) must be solved narrowly and
    repeatably before any expansion claim is credible to a compliance-cautious buyer.
  notYet:
    - >-
      Banking loan-servicing, P&C claims, and government benefits adjudication verticals, despite sharing the same
      audit-log-to-reward architecture, are deferred until the health-payer beachhead produces a repeatable,
      calibration-gated autonomy-rate lift on at least two design partners.
    - >-
      A generalized, model-agnostic reward-data platform pitch (competing head-on with Bespoke or Patronus) is
      deferred; we stay narrowly payer-native until compliance-speed and data-access advantages are proven in
      production.
market:
  tam: "$180M (estimate: ~1,200 U.S. payer/TPA logos with prior-authorization or claims complexity x ~$150k base annual ACV, per research.yaml)"
  sam: "$45M (estimate: ~300 near-term regional plans/TPAs already prioritizing AI in utilization management or claims x ~$150k ACV, per research.yaml)"
  som: "$3.0M (estimate: 20 design-partner/early-production logos by year 3 x ~$150k blended ACV, per research.yaml)"
  segments:
    - Regional health insurers and third-party claims administrators running in-house long-horizon claims agents
    - Bank loan-servicing, P&C insurance, and government benefits agencies (deferred expansion, not year-one focus)
  buyingProcess: >-
    The VP of AI/Automation or Chief Claims Officer owns the pilot budget and autonomy-expansion accountability, but
    compliance and audit officers must approve audit-log reuse for training under a signed BAA before any pilot can
    process real case data, so the sales cycle runs through both a technical/economic buyer and a compliance gate.
product:
  mvp: >-
    A single-case-family (prior authorization) audit-log-to-reward pipeline integrated with one design partner's
    core-admin platform, producing calibrated reward labels from override/appeal events, retraining the partner's
    existing agent, and surfacing an autonomy-rate dashboard, deployed single-tenant or on-prem under a signed BAA.
  sixMonth: >-
    Add reviewer-agreement calibration scoring and a second case family (claims adjudication) for existing design
    partners; complete the offline replay study proving reward-augmented retraining beats prompt-only tuning; begin
    SOC 2 Type I certification.
  twelveMonth: >-
    Convert first 2 design partners from paid pilot to annual case-volume + percentage-of-savings contracts;
    support a second core-admin platform integration; achieve SOC 2 Type II; establish one core-admin ecosystem
    partnership (Guidewire, Duck Creek, or a QNXT/Cognizant systems integrator) as a warm-intro channel.
  twentyFourMonth: >-
    Reach 8-12 paying logos across the health-payer beachhead on two case families; validate a scoping pilot for one
    adjacent regulated vertical (bank loan servicing or P&C claims) using the same pipeline architecture, without
    diverting core engineering from the payer beachhead.
  keyBets:
    - >-
      Reward-augmented retraining on real audit-log data will outperform prompt-only or rules-only tuning by a
      measurable margin on at least one high-volume case family, which is the entire pricing and defensibility
      thesis.
    - >-
      Compliance teams will approve in-tenant, BAA-governed audit-log reuse within a single sales cycle if data
      never leaves the customer's environment, rather than treating it as a novel, slow-to-approve use case.
    - >-
      A narrow, payer-native compliance-first pipeline will close and retain design partners faster than horizontal
      eval vendors or core-admin incumbents can bolt on an equivalent bring-your-own-log feature.
gtm:
  wedge: >-
    A compliance-log-to-reward pipeline that ingests an insurer's existing case-decision audit trail (reviewer
    overrides, escalation notes, appeal outcomes) and automatically converts it into labeled RL reward signal that
    retrains the insurer's own in-house agent on the exact cases it currently gets wrong.
  channels:
    - Direct enterprise sales to AI/automation and claims-operations leaders at regional health insurers and TPAs
    - Compliance and audit conference partnerships to build credibility with the compliance-officer gatekeeper
    - >-
      Warm intros via core-admin ecosystem partners such as Guidewire, Duck Creek, and QNXT/Cognizant systems
      integrators, who already control data access and production deployment
  funnelTargets: "lead to qualified pilot 20-35%, pilot to paid annual contract 50%+ within 12 months of pilot start"
  pricing: >-
    Case-volume-based platform fee (predictable base revenue tied to processed case volume) plus a
    percentage-of-savings component tied to the measured increase in end-to-end agent autonomy rate, so pricing is
    directly anchored to the CAQH-documented $9.64-per-transaction manual-to-electronic savings benchmark from
    research.yaml rather than a generic seat or usage fee.
businessModel:
  revenueStreams:
    - Case-volume-based platform fee
    - Percentage-of-savings tied to autonomy-rate improvement
    - Expansion fees for additional case types and core-admin integrations
  unitOfValue: A calibrated, reward-labeled case decision processed through the pipeline and its resulting autonomy-rate lift
  targetGrossMarginPct: 70
  expansionLevers:
    - Additional case types beyond prior authorization (claims adjudication, appeals) within existing accounts
    - Additional core-admin platform integrations (QNXT, Facets, HealthRules, Guidewire, Duck Creek)
    - Expansion into adjacent regulated, audit-heavy verticals once the health-payer wedge is proven
strategyMap:
  northStarMetric: Net new percentage points of end-to-end case autonomy delivered per customer per quarter
  inputMetrics:
    - Number of design partners live in production
    - Case volume processed through the reward pipeline per customer
    - Reviewer-agreement calibration score per case family
    - Time-to-retrain cycle from case failure to updated agent policy
  moatsToBuild:
    - Proprietary longitudinal override, pend, and appeal reward datasets accumulated per customer over time
    - A compliance-grade single-tenant deployment and BAA operations playbook that generic vendors are slow to build
    - A core-admin integration library spanning QNXT, Facets, HealthRules, Guidewire, and Duck Creek
  killCriteria:
    - >-
      If reward-augmented retraining fails to beat prompt-only tuning by at least 5 percentage points of autonomy
      rate in offline replay across 2 design partners within 6 months, kill the standalone reward-pipeline thesis.
    - >-
      If fewer than 2 of 5 targeted design partners clear compliance/BAA review within a 90-day pilot cycle across
      two consecutive sales attempts, pause new-logo acquisition and rebuild the compliance-readiness motion.
    - >-
      If a core-admin incumbent (HealthEdge, Optum) or horizontal eval vendor (Bespoke, Patronus) ships a
      comparable bring-your-own-log reward feature before we sign 3 design partners, reassess standalone viability.
  mermaid: |
    flowchart LR
      Wedge[Prior-auth audit-log wedge] --> MVP[Single-case-family reward pipeline]
      MVP --> Proof[Design-partner autonomy-rate lift]
      Proof --> Expansion[Second case family + core-admin integration]
      Expansion --> Platform[Cross-vertical reward-data platform]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: >-
      Moderate conviction — the pain, buyer, and why-now are well evidenced, but the researched SOM is small (~$3M
      by year 3) and both competitive rivalry and substitute risk score high, so the near-term thesis rests on
      proving compliance speed and data-access advantage, not sheer market size.
    whyBelieve: >-
      Four verified sources confirm a $40M raise betting on training-environment data as the agent bottleneck, and
      research independently shows 84% of surveyed insurers already use AI/ML with governance principles in place,
      meaning the category is not a cold-start sale.
    whyDoubt: >-
      The SOM is narrow (~$3M ARR by year 3 on the beachhead), threat of substitutes scores highest of all five
      forces in the research, and incumbents (HealthEdge, Optum, Bespoke, Patronus) could each add a comparable
      bring-your-own-log feature before this company reaches durable scale.
    nextDiligence: >-
      Run the offline replay experiment (500-2,000 historical prior-authorization cases, reward-augmented vs
      prompt-only tuning) with one design partner to prove the core autonomy-lift claim before committing capital.
  firstCustomer:
    title: AI/Automation Platform Lead at a regional health insurer or TPA
    profile: >-
      A 200-2,000 employee regional health insurer or third-party claims administrator with $500M-$5B in annual
      premiums, running a live in-house prior-authorization agent pilot on a core-admin platform (QNXT, Facets,
      HealthRules, or custom) that is capped below 30% end-to-end autonomy.
    trigger: >-
      The pilot agent's autonomy rate plateaus while compliance already holds months of unused override-and-appeal
      audit data, compounded by CMS-0057-F pressure to make prior-authorization determinations faster and auditable.
    buyer: VP of AI/Automation or Chief Claims Officer
    initialContract: >-
      A 90-day paid pilot (roughly $50k-$150k) on one case family, converting to an annual case-volume plus
      percentage-of-savings contract at $150k+ ACV once the autonomy-rate lift clears calibration and compliance
      gates.
  mustBeTrue:
    - >-
      Target payer systems (QNXT, Facets, HealthRules, or custom) store override, pend, and appeal outcomes as
      structured events, not only free text or PDFs, for at least one high-volume case family.
    - >-
      Compliance and security teams at 2+ design partners approve in-tenant audit-log reuse for retraining under a
      signed BAA and de-identification controls within a roughly 90-day sales cycle.
    - >-
      Reward-augmented retraining on real audit-log data lifts end-to-end case autonomy by a statistically
      defensible margin (target 5+ points) over prompt-only tuning in an offline replay on historical cases.
    - >-
      At least one design partner converts from pilot to a paying annual contract at or above roughly $150k ACV
      within 12 months, without requiring a rip-and-replace of their core-admin system.
    - >-
      Core-admin incumbents (HealthEdge, Optum) and horizontal eval vendors (Bespoke, Patronus) do not ship an
      equivalent audit-log-to-reward feature inside their own platforms within the company's first 18 selling months.
  diligenceQuestions:
    - >-
      How often, across target payer systems, are override, pend, and appeal events already structured versus
      buried in free text, and what does a document-extraction layer add to cost and timeline if they are not?
    - >-
      What is the real conversion timeline and cost of clearing a payer's compliance and BAA review, and does it
      match the 90-day pilot assumption used in this plan?
    - >-
      Where does budget actually sit — claims operations, utilization management, digital transformation, or a
      central AI platform team — and how does that change deal size or sales-cycle length?
    - >-
      What offline-replay evidence exists, or can be gathered pre-seed, that audit-log reward tuning outperforms
      prompt-only tuning on a real case family?
    - >-
      How defensible is the wedge if Bespoke, Patronus, or a core-admin incumbent adds a bring-your-own-log
      feature — what specific switching cost or data moat survives that scenario?
    - >-
      Given a researched SOM of roughly $3M by year 3 in the health-payer beachhead, what is the credible path and
      timeline to the larger cross-industry TAM the venture-scale thesis depends on?
operatingAssumptions:
  - assumption: >-
      Target payer core-admin systems store reviewer overrides, pend reasons, and appeal outcomes as structured,
      extractable events for at least one case family.
    basis: research.yaml
    validationTest: >-
      Export samples from one QNXT or HealthRules instance showing event types, timestamps, reviewers, and outcome
      states for one case family.
    decisionImpact: >-
      If mostly unstructured (free text or PDF), the MVP must add a document-extraction layer before any reward
      pipeline works, pushing back the pilot timeline and requiring more upfront data-engineering investment.
  - assumption: >-
      Compliance and security teams will approve in-tenant, BAA-governed reuse of audit-log data for retraining
      within a single sales cycle (roughly 90 days).
    basis: research.yaml
    validationTest: >-
      Run security and privacy review with 2 design partners and track actual time-to-signed-BAA against the
      90-day assumption.
    decisionImpact: >-
      If compliance review takes materially longer, the pilot-to-contract cycle lengthens and go-to-market must add
      a dedicated pre-sales compliance-readiness offering ahead of any pipeline deployment.
  - assumption: >-
      Reward-augmented retraining on real audit-log data produces a measurable autonomy-rate lift over prompt-only
      or rules-only tuning on at least one case family.
    basis: idea.yaml
    validationTest: >-
      Offline replay experiment on 500-2,000 historical cases comparing baseline prompts versus reward-augmented
      retraining for one case family.
    decisionImpact: >-
      If the lift is not clearly measurable and defensible, percentage-of-savings pricing collapses and the
      business model must shift to a flat platform fee only.
  - assumption: >-
      Budget for this category sits with a single identifiable buyer (AI/automation platform lead or VP claims
      operations) rather than being split across claims ops, utilization management, and digital transformation.
    basis: research.yaml
    validationTest: >-
      Ten structured buyer interviews across regional plans and TPAs already evaluating prior-authorization
      automation or claims AI.
    decisionImpact: >-
      If budget is fragmented across stakeholders, sales cycle lengthens and go-to-market must build a
      multi-stakeholder selling motion rather than a single-threaded enterprise sale.
  - assumption: >-
      Core-admin and horizontal eval incumbents (HealthEdge, Optum, Bespoke, Patronus) will not ship an equivalent
      bring-your-own-log reward feature fast enough to foreclose the wedge within 18 months.
    basis: operator judgment
    validationTest: >-
      Track incumbent product announcements quarterly and monitor whether 2-3 signed design partners create
      durable switching costs before any incumbent ships a comparable feature.
    decisionImpact: >-
      If an incumbent ships this first, the company must pivot to a narrower defensibility claim (faster
      compliance certification, adjacent-vertical expansion) or accelerate partnership or M&A conversations.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: >-
      Export and audit a sample of override, pend, and appeal events from one design partner's QNXT or HealthRules
      instance for one case family.
    hypothesis: >-
      Override, pend, and appeal outcomes exist as structured, extractable events, not only free text, for at
      least one high-volume case family.
    successMetric: >-
      70%+ of sampled case decisions have structured, timestamped override/appeal event data usable for reward
      labeling.
    owner: Founding engineer / data engineering
  - horizon: 0-90 days
    experiment: >-
      Run compliance and security review with 2 target design partners under a template BAA and single-tenant
      deployment architecture.
    hypothesis: >-
      Compliance teams will approve in-tenant audit-log reuse for retraining within a 90-day cycle if data never
      leaves the customer's environment.
    successMetric: 2 signed BAAs or compliance sign-offs within 90 days.
    owner: Founder/CEO
  - horizon: 90-180 days
    experiment: >-
      Offline replay comparing reward-augmented retraining against prompt-only tuning on 500-2,000 historical
      prior-authorization cases from one design partner.
    hypothesis: >-
      Reward-augmented retraining lifts end-to-end case autonomy by more than 5 percentage points over
      prompt-only tuning.
    successMetric: Statistically significant autonomy-rate lift of 5+ points on a held-out case set.
    owner: Founding ML engineer
  - horizon: 90-180 days
    experiment: >-
      Ten structured buyer interviews across regional health plans and TPAs already evaluating prior-authorization
      automation or claims AI.
    hypothesis: >-
      Budget and buying authority for this category consistently sit with a single AI/automation platform lead or
      VP of claims operations.
    successMetric: 6 of 10 interviews confirm a single identifiable economic buyer and budget line.
    owner: Founder / GTM lead
  - horizon: 180-365 days
    experiment: Convert the first 2 design partners from paid pilot to an annual case-volume plus percentage-of-savings contract.
    hypothesis: >-
      Measured autonomy-rate lift and compliance-clean deployment justify a $150k+ ACV contract renewal.
    successMetric: 2 of 2 pilots convert to paid annual contracts at or above the target ACV.
    owner: Founder/CEO
  - horizon: 180-365 days
    experiment: >-
      Establish a warm-intro partnership with one core-admin ecosystem player (Guidewire, Duck Creek, or a
      QNXT/Cognizant systems integrator).
    hypothesis: Partner-sourced leads convert to qualified pilots at a materially higher rate than cold outbound.
    successMetric: Partner channel sources 25%+ of qualified pilot pipeline by month 12.
    owner: Founder / BD lead
  - horizon: 365-540 days
    experiment: >-
      Quarterly competitive-tracking review of HealthEdge, Optum, Bespoke, and Patronus product announcements for
      bring-your-own-log or payer-native reward features.
    hypothesis: >-
      No incumbent ships a comparable payer-native, compliance-first reward pipeline within 18 months of this
      company's GA launch.
    successMetric: Zero directly competing incumbent feature launches confirmed across quarterly scans through month 18.
    owner: Founder/CEO
operations:
  - >-
    Compliance-grade data pipeline with automated PII/PHI redaction, deployed single-tenant or on-prem per customer
    before any reward labeling begins.
  - >-
    Reward-model calibration methodology with a reviewer-agreement scoring gate that blocks low-confidence labels
    from entering training.
  - SOC 2 Type I/II certification roadmap plus a signed BAA per customer, run as a standing compliance operating function.
  - Dedicated 90-day implementation team assigned to each new design-partner pilot.
  - >-
    Core-admin ecosystem partnerships (Guidewire, Duck Creek, QNXT/Cognizant systems integrators) for data access
    and as a warm-intro distribution channel.
team:
  - role: Founding CEO / GTM lead (payer domain expert)
    startTiming: Month 0
    rationale: >-
      Needs deep credibility with claims-operations and compliance buyers plus CMS-0057 regulatory fluency to close
      90-day compliance reviews and the first design-partner pilots.
  - role: Founding ML/RL engineer
    startTiming: Month 0
    rationale: >-
      Owns the reward-model calibration methodology and the offline replay experiments that prove the core
      autonomy-lift wedge claim before any pricing model can be trusted.
  - role: Data engineer (core-admin integrations)
    startTiming: Months 2-3
    rationale: >-
      Builds and maintains audit-log extraction connectors per claims platform (QNXT, Facets, HealthRules), the
      highest-friction integration point identified in research.
  - role: Compliance / security lead (fractional)
    startTiming: Months 3-4
    rationale: >-
      Owns BAA templates, PHI redaction validation, and the SOC 2 roadmap required to clear payer compliance
      review within the 90-day pilot cycle.
  - role: Forward-deployed engineer / customer success
    startTiming: Months 6-9
    rationale: >-
      Runs the dedicated 90-day implementation team for each new design partner once pilot count exceeds the
      founders' own bandwidth.
milestones:
  - horizon: 0-12 months
    items:
      - >-
        Sign 2-3 design-partner insurers or TPAs on paid pilots covering one core-admin platform and the
        prior-authorization case family.
      - Complete the offline replay study proving 5+ points of autonomy-rate lift over prompt-only tuning.
      - Achieve 2 signed BAAs or compliance sign-offs.
      - Ship v1 audit-log-to-reward pipeline with a calibration dashboard.
  - horizon: 12-24 months
    items:
      - Convert the first 2 pilots to annual case-volume plus percentage-of-savings contracts at $150k+ ACV.
      - Expand to a second case family (claims adjudication) for existing design partners.
      - Achieve SOC 2 Type II.
      - Establish one core-admin ecosystem partnership as a warm-intro channel.
  - horizon: 24-36 months
    items:
      - Reach 8-12 paying logos across the health-payer beachhead on two case families.
      - >-
        Validate a scoping pilot for one adjacent regulated vertical (bank loan servicing or P&C claims) using the
        same pipeline architecture.
      - Cross the researched $3.0M ARR SOM target for the health-payer beachhead.
risks:
  - risk: >-
      Regulated-data access risk — pulling PHI-bearing compliance audit logs into an RL pipeline could violate
      HIPAA or data-residency rules if handled incorrectly.
    likelihood: Medium
    impact: High
    mitigation: >-
      Deploy inside the customer's VPC or on-premises, run automated PII/PHI redaction before data enters the
      reward pipeline, and obtain a signed BAA and compliance sign-off before processing begins.
  - risk: >-
      Noisy reward-signal risk — human override annotations may be inconsistent or effectively rubber-stamped,
      producing a low-quality reward signal that trains the agent on the wrong lessons.
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Start with a small hand-audited calibration set to validate reward-model quality, add reviewer-agreement
      scoring, and gate automated reward usage on passing that calibration check before scaling.
  - risk: >-
      Incumbent-bundling risk — HealthEdge, Optum, Bespoke, or Patronus could add a bring-your-own-log feature to
      their existing platforms and out-execute a narrowly focused startup.
    likelihood: Medium
    impact: High
    mitigation: >-
      Move quickly to sign 2-3 design-partner insurers with proprietary claims-system integrations and
      data-processing agreements that create switching costs, and stay focused on compliance requirements (BAAs,
      on-prem deployment) that generic vendors are slow to build.
  - risk: >-
      Regulatory-scrutiny risk — intensifying oversight or lawsuits around AI-assisted prior-authorization denials
      could force narrower initial use cases or slow deployment.
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Keep the agent in a human-in-the-loop review posture for denial-adjacent decisions, and position the product
      as improving auditability and explainability rather than automating denials outright.
  - risk: >-
      Substitution risk — manual re-prompting, incumbent prior-auth automation, and generic eval stacks can each
      absorb some of this budget line, and research scores threat of substitutes as the highest of the five forces.
    likelihood: High
    impact: Medium
    mitigation: >-
      Prove a measurable, quantified autonomy-rate lift versus prompt-only tuning within the first 2 design
      partners so the ROI case is concrete rather than assumed.
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway funds a 5-person founding team (CEO/GTM, ML/RL engineer, data engineer, fractional
    compliance lead, forward-deployed engineer), the offline replay validation study, SOC 2 Type I/II
    certification, and single-tenant/VPC deployment infrastructure needed to sign and convert 2-3 design partners
    into paying annual contracts on the prior-authorization case family.
