  pestle:
  - factor: 政治
    impact: positive
    point: CMS 和 ONC 的政策正推动行业转向更电子化、可衡量的事前授权流程，这让审计就绪的自动化更加紧迫。
    sourceRefs:
    - 29
    - 30
    - 37
  - factor: 经济
    impact: positive
    point: 行政成本节省的空间足够大，哪怕是一个针对事前授权的窄口径改进闭环，也能撑起真实的软件预算。
    sourceRefs:
    - 8
    - 9
    - 14
  - factor: 社会
    impact: negative
    point: 事前授权一旦出问题，公众叙事讲的是患者受害和延误，而不是后台效率问题，所以买家的风险容忍度很低。
    sourceRefs:
    - 19
    - 23
    - 118
  - factor: 技术
    impact: positive
    point: 智能体评测、奖励模型工具和云端部署管控都已经足够成熟，真正的挑战是领域集成，而不是基础的机器学习能力。
    sourceRefs:
    - 57
    - 59
    - 60
    - 63
    - 66
    - 68
  - factor: 法律
    impact: negative
    point: PHI 处理、AI 监管和证据留存方面的要求，提高了隐私管控和可辩护人工监督的门槛。
    sourceRefs:
    - 12
    - 42
    - 45
    - 46
    - 56
    - 106
  adoptionFrictionMatrix:
  - friction: PHI 治理与部署审查
    severity: 高
    affectedBuyer: 合规或安全官
    mitigation: 在启动任何再训练闭环之前，先采用单租户或 VPC 部署、签署 BAA，并明确落实数据最小化或去标识化管控。
    sourceRefs:
    - 42
    - 45
    - 46
    - 56
  - friction: 审核人改判和申诉标签存在噪声
    severity: 高
    affectedBuyer: AI 平台负责人
    mitigation: 先跑一个校准阶段，给审核人一致性打分，给申诉结果加更高权重，并挡住低置信度标签进入奖励训练。
    sourceRefs:
    - 19
    - 57
    - 59
    - 111
  - friction: 与核心业务系统和 UM 工作流的集成
    severity: 高
    affectedBuyer: 理赔运营 IT 负责人
    mitigation: 先从一个核心业务系统平台、一个案件族群做起，让事件抽取、路由和结果关联都保持窄口径、可衡量。
    sourceRefs:
    - 71
    - 76
    - 78
    - 109
  - friction: 采购过程中现有厂商的阻力
    severity: 中
    affectedBuyer: CIO 或首席理赔官
    mitigation: 把自己定位成叠加在 Optum、Google 或核心业务系统之下的奖励数据层，而不是推倒重来的自动化套件。
    sourceRefs:
    - 79
    - 82
    - 105
    - 109
    - 111
