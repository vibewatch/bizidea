  pestle:
  - factor: political
    impact: positive
    point: CMS and ONC policy is pushing the industry toward more electronic, measurable prior-authorization workflows, which increases urgency for audit-ready automation.
    sourceRefs:
    - 29
    - 30
    - 37
  - factor: economic
    impact: positive
    point: Administrative-cost savings are large enough that even a narrow prior-authorization improvement loop can support real software budget.
    sourceRefs:
    - 8
    - 9
    - 14
  - factor: social
    impact: negative
    point: When prior authorization fails, the public narrative is patient harm and delay rather than back-office efficiency, so buyer risk tolerance is low.
    sourceRefs:
    - 19
    - 23
    - 118
  - factor: technological
    impact: positive
    point: Agent evals, reward-model tooling, and cloud deployment controls are mature enough that the main challenge is domain integration rather than foundational ML capability.
    sourceRefs:
    - 57
    - 59
    - 60
    - 63
    - 66
    - 68
  - factor: legal
    impact: negative
    point: PHI handling, AI oversight, and evidence-retention expectations raise the bar for privacy controls and defensible human oversight.
    sourceRefs:
    - 12
    - 42
    - 45
    - 46
    - 56
    - 106
  adoptionFrictionMatrix:
  - friction: PHI governance and deployment review
    severity: high
    affectedBuyer: Compliance or security officer
    mitigation: Start with single-tenant or VPC deployment, BAAs, and explicit data-minimization or de-identification controls before any retraining loop is turned on.
    sourceRefs:
    - 42
    - 45
    - 46
    - 56
  - friction: Noisy reviewer overrides and appeal labels
    severity: high
    affectedBuyer: AI platform lead
    mitigation: Run a calibration phase that scores reviewer agreement, weights appeal outcomes more heavily, and blocks low-confidence labels from entering reward training.
    sourceRefs:
    - 19
    - 57
    - 59
    - 111
  - friction: Integration into core-admin and UM workflows
    severity: high
    affectedBuyer: Claims-operations IT owner
    mitigation: Start with one core-admin platform and one case family so event extraction, routing, and outcome joining are narrow and measurable.
    sourceRefs:
    - 71
    - 76
    - 78
    - 109
  - friction: Incumbent-vendor objection during procurement
    severity: medium
    affectedBuyer: CIO or chief claims officer
    mitigation: Position as a reward-data layer that sits beneath Optum, Google, or core-admin workflows rather than as a rip-and-replace automation suite.
    sourceRefs:
    - 79
    - 82
    - 105
    - 109
    - 111
