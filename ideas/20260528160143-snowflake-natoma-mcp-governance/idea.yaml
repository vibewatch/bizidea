topRisks:
  - name: "Platform bundling"
    description: "Snowflake, Databricks, or major security vendors could bundle enough governance features to compress the independent wedge."
    mitigation: "Start in multi-system environments those platforms do not own, and win on cross-vendor simulation, approvals, and audit coverage instead of single-stack enforcement."
  - name: "Integration drag"
    description: "Customers may have messy permissions, custom schemas, and legacy systems that make accurate reachability modeling hard."
    mitigation: "Begin with the five to seven systems that appear most often in regulated agent pilots and use a phased rollout that proves value before covering every edge case."
  - name: "Budget ambiguity"
    description: "Some enterprises may treat agent governance as part of a broader AI program and delay buying a standalone product."
    mitigation: "Sell against blocked production launches and audit readiness, with pricing tied to specific agent workflows that are already waiting on approval."
