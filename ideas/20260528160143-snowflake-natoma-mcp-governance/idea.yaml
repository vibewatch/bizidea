jobsToBeDone:
  - job: "When our internal service or analyst agent is ready for production, help our governance team prove exactly what customer and operational data it can reach, so they can approve launch without blind risk."
    currentAlternative: "Spreadsheet reviews plus native permissions in each data system."
    successMetric: "Production approval time for a new internal agent falls from months to less than two weeks."
  - job: "When schemas, connectors, or roles change after launch, help our AI platform team detect when an agent's actual data reach exceeds what was approved, so they can stop drift before an audit or incident."
    currentAlternative: "Periodic manual reviews and reactive log analysis."
    successMetric: "Policy drift is detected within one day and remediated before sensitive fields are exposed."
