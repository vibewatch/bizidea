    - 61
    - 74
  - factor: economic
    impact: positive
    point: 大型企业普遍承受用 AI 提升生产率的压力，这会提高他们为“能帮部署解堵的控制层”买单的意愿。
    sourceRefs:
    - 83
    - 85
  - factor: social
    impact: positive
    point: 业务用户越来越习惯用自然语言直接操作企业系统，因此安全地上线内部智能体的需求会继续上升。
    sourceRefs:
    - 5
    - 45
    - 68
  - factor: technological
    impact: positive
    point: MCP、带身份感知的授权模型和 managed identities，让中立智能体控制平面在技术上比一年前更可行。
    sourceRefs:
    - 2
