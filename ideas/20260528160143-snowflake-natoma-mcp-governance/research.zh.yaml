competitors:
- name: Snowflake + Natoma
  stage: incumbent
  wedge: 与 Snowflake Intelligence、Cortex Agents 和已验证 MCP servers 深度绑定的原生 MCP 治理与身份层。
  pricing: 企业版 / 与更广的 Snowflake 平台打包
  strength: 在既有 Snowflake 账户里分发力强，且收购后“治理”叙事足够可信。
  weaknessVsUs: 对同时跑多云、并在 SaaS 系统里做非 Snowflake 审批工作流的客户来说，它并不是默认的中立答案。
  sourceRefs:
  - 10
  - 11
  - 12
  - 14
- name: Databricks Unity AI Gateway + Unity Catalog
  stage: incumbent
  wedge: 把智能体、模型和数据治理收进 Databricks 平台内部。
  pricing: 企业版 / 平台定价
  strength: 对以 Databricks 为中心的数据环境来说，原生治理很深，涵盖 ABAC、lineage 和 logging。
  weaknessVsUs: 控制平面仍锚定 Databricks，本身也不以跨 SaaS 的上线前审批包为核心设计。
  sourceRefs:
  - 17
  - 19
  - 20
  - 22
- name: Prompt Security MCP Gateway
  stage: scale-up
  wedge: 面向 agentic AI 的安全与治理层，强调 MCP 检查与风险评分。
  pricing: 企业定制定价
  strength: 安全定位清楚，对 shadow AI 和运行时控制也有明确的 MCP 叙事。
  weaknessVsUs: 更偏检查与执行，而不是围绕具体智能体做波及范围模拟和审批工作流。
  sourceRefs:
  - 43
  - 44
- name: Zenity
  stage: scale-up
  wedge: 跨平台的 AI 智能体 inventory、姿态管理与运行时防护。
  pricing: 企业定制定价
  strength: 围绕智能体行为、授权缺口和企业 AI 安全运营的故事很强。
  weaknessVsUs: 不够聚焦于受治理数据系统里的字段级、上线前可达性证明。
  sourceRefs:
  - 38
  - 39
  - 40
- name: Auth0 Fine-Grained Authorization / OpenFGA
  stage: incumbent
  wedge: 面向 AI 应用、MCP servers 和 RAG 系统的可复用关系型授权底座。
  pricing: 起步有免费与低价层；企业版另算
  strength: 授权抽象成熟，开发者容易理解，也容易往上扩。
  weaknessVsUs: 连接器发现、模拟和可交审计的审批层，仍要客户自己搭。
  sourceRefs:
  - 27
  - 28
  - 29
regulatoryTechnicalConstraints:
- point: 在协议层，MCP 的授权并非强制，因此企业仍需要额外补上身份、策略和可审计性控制。
  sourceRefs:
  - 2
  - 4
- point: 在真实的智能体工作流里，prompt injection 和间接指令攻击依旧切实可行，这会显著抬高买家对自治访问的信任门槛。
  sourceRefs:
  - 65
  - 70
  - 71
- point: 受监管部署需要的是文档化监督、隐私评审和明确问责，而不是不透明的自治访问。
  sourceRefs:
  - 57
  - 61
  - 74
  - 75
- point: 一旦智能体开始跨云平台与 SaaS 系统行动，非人身份蔓延和 secrets 管理就会变成一等工程风险。
  sourceRefs:
  - 37
  - 51
  - 52
validationSignals:
- point: Snowflake 选择收购而不是慢慢自建，本身就是企业 MCP 治理具备独立战略价值的强信号。
  sourceRefs:
  - 11
  - 12
- point: 资深 IT 负责人已经把 GenAI 摆上优先级，但仍把安全和信任视作主要阻塞点，这与拟议切口高度一致。
  sourceRefs:
  - 83
- point: 银行监管者和央行研究者已经把 AI 治理当成运营和系统性议题，而不是未来才会发生的问题。
  sourceRefs:
  - 76
  - 77
- point: 商业市场模型预计 AI 治理支出将快速增长，哪怕 agentic AI 还没完全进入主流。
  sourceRefs:
  - 81
  - 82
- point: CISA、NIST 和 OWASP 都开始发布面向 agentic AI 或 GenAI 的控制框架，这让独立预算科目更容易成立。
  sourceRefs:
  - 57
  - 61
  - 65
openQuestions:
- 大型买家最终会偏好中立审批平面，还是只要平台原生打包能覆盖 70–80% 的工作流就接受？
- 在滩头行业里，究竟是哪五个连接器造成了大多数内部智能体上线阻塞？
- 真实的根因更常是权限边界不清，还是数据质量、目录覆盖、PII 标签等相邻问题？
- 在必须补运行时强制控制之前，只读模拟器本身能否先交出足够价值？
