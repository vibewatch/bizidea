    - 51
  - factor: legal
    impact: negative
    point: 隐私、问责和高风险 AI 义务抬高了证明门槛——任何给智能体开放广泛数据访问的系统，都要拿出更扎实的证据。
    sourceRefs:
    - 61
    - 74
    - 75
  adoptionFrictionMatrix:
  - friction: 跨系统权限建模很脏，而且高度因客户而异
    severity: high
    affectedBuyer: 数据平台与治理负责人
    mitigation: 先从最常见的五个连接器和只读策略图谱开始，不要一上来就承诺覆盖整个资产栈。
    sourceRefs:
    - 16
    - 22
    - 45
  - friction: 非人身份和 secrets 蔓延会明显放大实施风险
    severity: high
    affectedBuyer: 安全架构师
    mitigation: 尽量依赖 managed identities、workload identities 和 just-in-time access 模式。
    sourceRefs:
    - 37
    - 51
    - 52
  - friction: prompt injection 和工具滥用让治理团队对自治能力天然更谨慎
    severity: high
    affectedBuyer: CISO 与 AI 风险委员会
    mitigation: 把上线前模拟、显式高风险动作审批和运行时漂移告警打包来看。
    sourceRefs:
    - 57
    - 65
    - 70
    - 71
  - friction: 平台打包会让独立采购显得重复
    severity: medium
    affectedBuyer: Chief Data Officer
    mitigation: 主打平台默认不覆盖的中立多云能力，以及 SaaS 系统审批工作流。
    sourceRefs:
    - 11
