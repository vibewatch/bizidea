problem: 企业希望内部 AI 智能体能从数仓和业务应用里拉数，回答客服、运营和财务问题，但一旦几十个 MCP 连接器接上去，谁也没法在事前证明这些智能体到底能读到什么。现有的数据仓权限、SaaS 角色和数据目录标签都分散在各系统里管理，数据治理团队最后只能拿电子表格审智能体权限，生产上线也一再被卡。结果就是明显的瓶颈：高价值智能体试点长期困在 sandbox，因为安全团队既没法模拟数据波及范围，也拿不出覆盖所有连接数据源、能给审计看的审批材料。
targetUser:
  primary: 在数仓与 SaaS 数据之间部署内部 AI 分析或客服智能体的数据治理团队与平台团队。
  secondary: 负责企业 AI 平台访问策略的安全架构师。
  buyer: Chief Data Officer、VP of Data Platform 或 CISO。
startupThesis:
  nonObviousInsight: 缺的不是又一个 agent runtime，而是一层跨系统的策略模拟与审批引擎：在连接器打开之前，先证明这个智能体可能读到什么。企业从一个精心整理的数仓走向几十个 MCP 连接系统后，真正稀缺的能力不再是事后记日志，而是工作流级的数据可达性证明。
  beachhead: 正在试点内部分析或客服智能体的财富 2000 强金融服务和医疗企业；这些智能体必须同时读取 Snowflake 或 Databricks，以及 Salesforce、ServiceNow、SharePoint。
  wedge: 一套 MCP 策略模拟器：在智能体上线前，把字段级权限、权限范围和审计要求编译成面向具体智能体的访问边界。
  whyNowCatalyst: Snowflake 收购 Natoma，证明智能体数据治理已经是董事会级基础设施采购；而这个 cluster 又反复强调集中式控制、审计日志和数十个待治理数据源，直接把上线前访问模拟推成了刚需。
  ventureScalePath: 先从内部、只读、重查询的智能体审批与模拟切进去，再逐步扩到运行时强制控制、脱敏、持续认证和第三方智能体接入，最后把自己做成所有企业智能体访问受治理数据时都要经过的控制平面。
solution: 产品夹在企业 agent runtime 和 MCP 连接器之间，把现有 IAM、数仓权限、数据目录元数据和 SaaS 角色拉进同一张策略图谱。团队每次准备上线一个智能体时，系统会按真实工作流模拟它在 Snowflake、Databricks、Salesforce、ServiceNow、SharePoint 等系统里究竟能碰到哪些表、字段、文件和记录；随后自动生成一套给治理团队用的审批包，里面包含最小权限建议、必须加的脱敏规则，以及一份可审计、还能反推回 runtime 的策略包。智能体上线后，同一套控制平面还会持续比对“实际触达范围”和“获批边界”是否一致；连接器、schema 或角色一变，就立刻提示漂移。有了这层切口，企业才有办法把有价值的内部智能体推上生产，而不是在看不见的数据外泄风险前一直不敢放行。
goToMarketSeed:
  firstCustomer: 一家财富 2000 强保险公司或银行：既有中央数据治理办公室，也有内部 AI 平台团队，并且已经在理赔、核保或客服智能体上做 live pilot；这些智能体需要访问 Snowflake 外加至少 3 个业务系统。
  buyingTrigger: 在生产就绪评审里，安全或数据治理团队因为无法给广泛连接器访问开绿灯，直接卡住内部智能体上线。
  currentAlternative: 手工策略评审、原生数仓权限、基于电子表格的审批流程，以及针对单个连接器临时包的一层 wrapper。
  switchingReason: 首批客户会切换，是因为这套产品能在不用花几个月手工定制策略的情况下，拿出跨多个系统的最小权限数据触达证明，而且材料足以给审计看。
  pricingHypothesis: 平台按受治理数据系统数和已认证智能体工作流收年费；运行时强制控制模块再额外加价。
