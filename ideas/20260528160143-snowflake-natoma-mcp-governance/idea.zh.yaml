topRisks:
- name: 平台打包
  description: Snowflake、Databricks 或大型安全厂商，可能把足够多的治理能力直接打包进去，把独立切口压窄。
  mitigation: 先从这些平台管不到的跨系统环境下手，靠跨厂商模拟、审批和审计覆盖取胜，而不是拼单一技术栈里的强制控制。
- name: 集成拖累
  description: 客户的权限、schema 和遗留系统可能很乱，让可达性建模难以做准。
  mitigation: 先覆盖受监管智能体试点里最常见的 5–7 套系统，用分阶段 rollout 先证明价值，再去补边角案例。
- name: 预算归属不清
  description: 部分企业可能把智能体治理算进更大的 AI 项目里，从而推迟购买独立产品。
  mitigation: 围绕“生产上线被卡”和“审计就绪”来卖，定价绑定那些已经在等审批的具体智能体工作流。
