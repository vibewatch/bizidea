jobsToBeDone:
- job: 当我们的内部客服或分析智能体准备上生产时，帮治理团队精确证明它到底能碰到哪些客户和运营数据，这样他们就能在不盲目冒险的前提下批准上线。
  currentAlternative: 电子表格评审，加上各数据系统里的原生权限。
  successMetric: 一个新内部智能体的生产审批周期，从数月压到两周以内。
- job: 当 schema、连接器或角色在上线后发生变化时，帮 AI 平台团队发现智能体的实际数据触达是否超出原先审批范围，让他们在审计或事故发生前先把漂移拦住。
  currentAlternative: 定期人工复查，再配合事后日志分析补救。
  successMetric: 策略漂移能在一天内被发现，并在敏感字段暴露前完成修复。
