  - 12
- point: Senior IT leaders already prioritize GenAI but still cite security and trust as major blockers, which aligns directly with the proposed wedge.
  sourceRefs:
  - 83
- point: Banking regulators and central-bank researchers are treating AI governance as an operational and systemic issue, not a future concern.
  sourceRefs:
  - 76
  - 77
- point: Commercial market models project rapid growth in AI governance spend, even before agentic AI becomes mainstream.
  sourceRefs:
  - 81
  - 82
- point: CISA, NIST, and OWASP now all publish agentic- or GenAI-specific control frameworks, which makes a dedicated budget line easier to justify.
  sourceRefs:
  - 57
  - 61
  - 65
openQuestions:
- Will large buyers prefer a neutral approval plane or accept platform-native bundles if those bundles cover 70-80% of their workflows?
- Which five connectors create the majority of blocked internal-agent launches in the beachhead verticals?
- How often is the real blocker missing entitlement clarity versus adjacent issues such as data quality, catalog coverage, or PII tagging?
- Can the simulator deliver enough value in a read-only deployment to win before runtime enforcement is required?
