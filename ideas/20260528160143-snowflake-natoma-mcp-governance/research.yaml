  sensitivityCases:
  - case: Snowflake or Databricks bundle enough governance into their core platforms
    impact: The independent wedge narrows unless the startup proves superior multi-system coverage, faster implementation, and stronger approval workflows outside one data stack.
    sourceRefs:
    - 11
    - 17
    - 19
  - case: Security teams insist on runtime enforcement before trusting pre-launch simulation
    impact: The product may need to ship drift detection or gateway enforcement earlier than planned to win initial deals.
    sourceRefs:
