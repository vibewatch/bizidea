    - 24
    - 46
  validationPlan:
  - priority: high
    question: How many blocked internal-agent launches in target accounts are caused specifically by uncertainty about cross-system data reach?
    evidenceToGather: Security review tickets, redacted approval spreadsheets, and launch-readiness meeting notes from 8-10 design partners.
  - priority: high
    question: Which five connectors cover the majority of real approval pain in regulated design partners?
    evidenceToGather: Connector inventories, access-review backlogs, and architecture diagrams from banks, insurers, and health systems.
  - priority: medium
    question: Will buyers pay for a read-only simulator before they buy runtime enforcement?
    evidenceToGather: Pilot proposals with separate line items for simulation, approval workflow, and runtime drift modules.
  - priority: low
    question: Can a neutral approval plane pass procurement faster than platform-native add-ons?
    evidenceToGather: Procurement timelines, security questionnaires, and loss reviews versus Snowflake- or Databricks-centric alternatives.
