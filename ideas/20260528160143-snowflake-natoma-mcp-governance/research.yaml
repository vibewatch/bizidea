competitors:
- name: Snowflake + Natoma
  stage: incumbent
  wedge: Native MCP governance and identity layer tied to Snowflake Intelligence, Cortex Agents, and verified MCP servers.
  pricing: Enterprise / bundled with broader Snowflake platform
  strength: Strong distribution into existing Snowflake accounts plus a credible governance narrative after the acquisition.
  weaknessVsUs: Not the default neutral answer for customers running multi-cloud and non-Snowflake approval workflows across SaaS systems.
  sourceRefs:
  - 10
  - 11
  - 12
  - 14
- name: Databricks Unity AI Gateway + Unity Catalog
  stage: incumbent
  wedge: Combines agent, model, and data governance inside the Databricks platform.
  pricing: Enterprise / platform pricing
  strength: Deep native governance for Databricks-centered estates, including ABAC, lineage, and logging.
  weaknessVsUs: Still anchored to Databricks as the control plane and less purpose-built around cross-SaaS pre-launch approval packets.
  sourceRefs:
  - 17
  - 19
  - 20
  - 22
- name: Prompt Security MCP Gateway
  stage: scale-up
  wedge: Security and governance layer for agentic AI with dedicated MCP inspection and risk scoring.
  pricing: Custom enterprise pricing
  strength: Clear security posture and explicit MCP messaging across shadow AI and runtime controls.
  weaknessVsUs: Leans toward inspection and enforcement rather than agent-specific blast-radius simulation and approval workflow design.
  sourceRefs:
  - 43
  - 44
- name: Zenity
  stage: scale-up
  wedge: Cross-platform inventory, posture management, and runtime protection for AI agents.
  pricing: Custom enterprise pricing
  strength: Strong story around agent behavior, authorization gaps, and enterprise AI security operations.
  weaknessVsUs: Less centered on pre-deployment field-level reachability proof for governed data systems.
  sourceRefs:
  - 38
  - 39
  - 40
- name: Auth0 Fine-Grained Authorization / OpenFGA
  stage: incumbent
  wedge: Reusable relationship-based authorization substrate for AI apps, MCP servers, and RAG systems.
  pricing: Starts with free and low-end tiers; enterprise pricing on top
  strength: Mature authorization abstraction that developers already understand and can extend.
  weaknessVsUs: Requires customers to build the discovery, simulation, and auditor-ready approval layer themselves.
  sourceRefs:
  - 27
  - 28
  - 29
regulatoryTechnicalConstraints:
- point: MCP authorization is optional at the protocol layer, so enterprises still need compensating controls for identity, policy, and auditability.
  sourceRefs:
  - 2
  - 4
- point: Prompt injection and indirect instruction attacks remain practical in realistic agent workflows, which raises the bar for trust in autonomous access.
  sourceRefs:
  - 65
  - 70
  - 71
- point: Regulated deployments need documented oversight, privacy review, and clear accountability rather than opaque autonomous access.
  sourceRefs:
  - 57
  - 61
  - 74
  - 75
- point: Non-human identity sprawl and secret handling become first-order engineering risks once agents span cloud platforms and SaaS systems.
  sourceRefs:
  - 37
  - 51
  - 52
