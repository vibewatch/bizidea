slug: agent-data-scope-simulator
date: "2026-05-28"
executiveSummary: >-
  Agent Data Scope Simulator should start as a neutral approval plane for
  Fortune 2000 financial-services and healthcare enterprises that are trying to
  move internal analyst or support agents from pilot to production across
  Snowflake or Databricks plus major SaaS systems. The first product should not
  begin as another agent runtime, generic AI security dashboard, or broad data
  governance suite; it should prove exactly what a named agent workflow could
  read before broad MCP connector access is approved. This beachhead is
  attractive because the user, buyer, trigger, pricing basis, and distribution
  channel line up around a blocked production-readiness review owned by data
  governance, platform, and security teams. Research-backed sizing supports an
  estimated $650.0M TAM, $156.0M SAM, and $12.0M year-3 SOM if the company
  stays focused on regulated multi-system deployments before expanding into
  broader enforcement and third-party agent onboarding. The core product should
  ingest native permissions and metadata from the first five common systems,
  simulate field- and record-level reach, and generate an approval packet with
  least-privilege recommendations and auditable evidence. The company can win if
  it becomes the neutral system of record for approved agent access envelopes
  that cloud data platforms, authorization fabrics, and runtime-security vendors
  do not naturally own across one workflow. The biggest disconfirming risks are
  platform bundling, deployment drag caused by messy entitlements, and the
  possibility that buyers demand runtime enforcement earlier than a read-only
  simulator can support. Two important evidence gaps remain in the inputs:
  independent proof of paid deployment depth outside Snowflake's ecosystem and
  direct pricing evidence for non-Snowflake buyers. The first 12 months
  therefore need to prove that regulated design partners will pay for approval
  and simulation first, that the first five connectors cover most blocked
  launches, and that pilots convert into production contracts without becoming
  consulting projects.
problem:
  - "Governance and platform teams cannot prove what an internal AI agent could read across Snowflake or Databricks plus SaaS systems before production, so launches stall in spreadsheet-based reviews."
  - "Existing IAM, warehouse permissions, and runtime-security tools each cover part of the control stack, but none gives one auditable cross-system approval motion for least-privilege access and post-launch drift."
solution:
  - "Build a read-first policy graph that ingests native permissions, catalog metadata, and SaaS scopes from Snowflake, Databricks, Salesforce, ServiceNow, and SharePoint, then simulates the exact data envelope a named agent workflow could reach."
  - "Generate an approval packet with least-privilege recommendations, redaction requirements, and auditor-ready evidence before launch, then add drift detection that flags when live reach diverges from the approved envelope."
whyWeWin:
  - "The company sells launch-unblocking proof across multiple systems, not another single-stack governance add-on or runtime-only security layer."
  - "Regulated enterprises already have risk committees, audit expectations, and blocked internal-agent programs, which makes approval workflow a near-term purchase rather than speculative future tooling."
  - "Approved-versus-rejected access envelopes, normalized entitlement graphs, and drift histories can compound into a proprietary control dataset that is expensive for incumbents to recreate across customer estates."
strategicChoices:
  beachhead: >-
    Fortune 2000 banks, insurers, and health systems running internal analyst,
    service, or operations-agent pilots that need read access to Snowflake or
    Databricks plus at least three major SaaS systems.
  wedgeRationale: >-
    This wedge creates faster proof than selling broad enterprise AI governance
    because regulated accounts already have governance committees, named
    production blockers, and clear downside from uncontrolled data reach. A
    narrow internal read-heavy workflow also avoids the trust gap and liability
    of autonomous write actions in the first deployment.
  sequencingRationale: >-
    Start with read-only simulation and approval packets on the five most common
    systems because that is the shortest path to paid pilots and procurement
    clearance. Add drift detection once approved envelopes exist, then layer in
    runtime enforcement and third-party agent onboarding only after the company
    proves that simulation alone can win budget and that integration effort is
    productizable.
  notYet:
    - "Customer-facing or external agents"
    - "Autonomous write actions into operational systems"
    - "Long-tail connector coverage beyond the first five common systems"
    - "SMB and single-stack Snowflake-only accounts"
market:
  tam: "$650.0M estimated TAM based on roughly 5,000 large global enterprises likely to operate multi-system internal agents and about $130k annual control-plane spend."
  sam: "$156.0M estimated SAM based on roughly 1,200 regulated North America and UK/EU enterprises that fit the Snowflake-or-Databricks-plus-SaaS beachhead."
  som: "$12.0M modeled year-3 SOM based on about 40 production accounts at roughly $300k blended ACV after expansion into drift and additional workflows."
  segments:
    - "Primary: data-governance and enterprise AI platform teams at regulated Fortune 2000 enterprises launching internal read-heavy agents across warehouse and SaaS data"
    - "Secondary: security architects and CISO teams responsible for AI approval, auditability, and least-privilege controls in the same accounts"
  buyingProcess: >-
    The operational champion is usually the head of data governance or AI
    platform, while the economic buyer is typically the Chief Data Officer, VP
    of Data Platform, or CISO because the decision spans deployment velocity and
    audit risk. The most credible motion is a paid pilot tied to one blocked
    production-readiness review, with conversion once the customer sees faster
    approval and no uncontrolled data reach.
product:
  mvp: >-
    The MVP should support Snowflake or Databricks plus Salesforce, ServiceNow,
    and SharePoint, ingest native entitlements and metadata, model one named
    agent workflow, and emit an approval packet showing reachable tables,
    fields, files, records, and recommended policy changes. It should launch
    read-only first, preserve full audit logs, and avoid promising runtime
    enforcement in the initial deployment.
  sixMonth: >-
    Ship 2-3 paid design-partner pilots with the first five connectors, policy
    graph ingestion, workflow simulation, approval packets, and baseline drift
    alerts for one internal agent workflow per customer.
  twelveMonth: >-
    Convert at least 2 pilots into annual production deployments, add reusable
    policy templates for BFSI and healthcare reviews, shorten implementation to
    under 30 days, and package a security-review kit that makes neutral
    multi-system deployment easier to approve.
  twentyFourMonth: >-
    Expand from approval and simulation into a broader enterprise agent control
    plane with drift monitoring, runtime evidence hooks, additional connector
    coverage, and support for more workflows and business units inside existing
    accounts.
  keyBets:
    - "Buyers will pay for pre-deployment simulation and approval workflow before they demand full runtime enforcement."
    - "The first five connectors cover the majority of blocked launches in the beachhead."
    - "Security reviewers will accept read-only policy simulation as a lower-friction first deployment than a new gateway or runtime."
    - "A first workflow can land near six-figure ARR and expand toward $300k as additional systems, workflows, and drift modules are added."
gtm:
  wedge: >-
    Sell a paid pilot that unblocks one internal analyst, service, or
    operations-agent launch by showing exactly what the agent can read across
    Snowflake or Databricks plus major SaaS systems, then use the approval
    packet as the conversion asset into a production contract.
  channels:
    - "Founder-led direct sales into data-governance, AI-platform, and security leaders at regulated enterprises with active blocked launches"
    - "Design-partner pilots sourced through governance consultancies, identity partners, and enterprise AI implementation firms already inside approval workflows"
    - "Co-sell and referral partnerships with authorization, data-governance, and SIEM vendors once the first neutral approval use cases are referenceable"
  funnelTargets: "Target account→qualified discovery 15-25%, qualified discovery→paid pilot 20-30%, pilot→production 50%+, and production→second workflow or module expansion 40%+ within 12 months."
  pricing: >-
    Start with a 10-12 week paid pilot priced around $40k-$75k for one governed
    workflow, then convert to an annual platform subscription starting near
    $120k-$180k for the first production workflow, priced by governed data
    systems and certified agent workflows rather than seats. This matches the
    buyer's logic because the customer is paying to clear production approval
    and reduce audit exposure, with expansion toward roughly $250k-$300k as
    more systems, workflows, and drift capabilities are added.
businessModel:
  revenueStreams:
    - "Annual subscription for the policy graph, workflow simulation, approval packet generation, and governance administration layer"
    - "Usage-based or tiered fees tied to governed data systems and certified agent workflows"
    - "Premium modules for drift detection, runtime evidence, redaction policy, and advanced audit exports"
    - "Limited professional services for initial entitlement mapping and deployment setup"
  unitOfValue: "Certified agent workflows and governed data systems under active approval management"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more internal agent workflows and business units inside the same regulated customer"
    - "Expand from approval simulation into drift, runtime evidence, and redaction modules"
    - "Increase wallet share through deeper integrations with identity, catalog, SIEM, and governance systems"
strategyMap:
  northStarMetric: "Monthly production agent workflows operating within an approved access envelope"
  inputMetrics:
    - "Paid pilot to production conversion rate"
    - "Median time from launch review kickoff to approval decision"
    - "Percentage of covered workflows with complete cross-system reach maps"
    - "Number of governed systems connected per production customer"
    - "Rate of drift events detected before audit or incident escalation"
    - "Expansion from first workflow into additional workflows within 12 months"
  moatsToBuild:
    - "Cross-system policy graph normalized across warehouse, identity, and SaaS permissions"
    - "Dataset of approved, rejected, and remediated agent access envelopes by workflow and vertical"
    - "Reusable audit artifacts and review templates embedded in regulated customer governance processes"
    - "Drift intelligence linking approved scope to actual runtime behavior over time"
  killCriteria:
    - "Fewer than 3 paid pilots after 25 qualified beachhead account conversations"
    - "Pilot to production conversion below 50% across the first 6 pilots"
    - "More than 60% of qualified prospects insist on bundled platform governance instead of a neutral approval plane"
    - "The first five supported connectors fail to cover at least 70% of blocked-launch use cases in design partners"
  mermaid: |
    flowchart LR
      Wedge[Regulated internal-agent approval wedge] --> MVP[Cross-system simulation MVP]
      MVP --> Proof[Approved launches with auditable least-privilege evidence]
      Proof --> Expansion[Drift detection and broader control plane]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Strong pain, a coherent regulated-enterprise wedge, and credible category timing, but conviction depends on proving neutral approval can win budget before platform bundles catch up."
    whyBelieve: "Snowflake's Natoma acquisition validates the control problem while leaving a clear multi-system whitespace for a startup that unblocks real launches rather than selling generic AI safety."
    whyDoubt: "The market is still early, direct pricing evidence is thin, and the product can lose its simplicity if customers need entitlement cleanup or runtime enforcement before they will buy."
    nextDiligence: "Verify with 3-5 paid pilots that regulated buyers will fund read-only simulation first and convert to annual contracts without requiring services-heavy integration work."
  firstCustomer:
    title: "Head of data governance or AI platform at a Fortune 2000 bank or insurer"
    profile: "A regulated enterprise with a central governance office, one internal analyst or service-agent pilot, Snowflake or Databricks as the warehouse layer, and at least three connected SaaS systems under review."
    trigger: "A production-readiness review blocks broad connector access because no team can prove the agent's least-privilege data reach across systems."
    buyer: "Chief Data Officer, VP of Data Platform, or CISO"
    initialContract: "A $40k-$75k paid pilot for one governed workflow, converting to roughly $120k-$180k annual ARR for the first production deployment with expansion toward $250k+ as more workflows and drift modules are added."
  mustBeTrue:
    - "At least half of qualified beachhead accounts must agree that pre-deployment cross-system proof is the primary blocker to production rather than a secondary concern."
    - "The first five supported connectors must cover the majority of real blocked-launch use cases in early design partners."
    - "A read-only simulator and approval packet must clear security review fast enough to close paid pilots without owning the runtime path."
    - "The first production workflow must support six-figure ARR with onboarding that stays inside a 30-day deployment window for most early customers."
    - "Neutral multi-system positioning must beat platform-native or manual alternatives often enough to maintain at least 50% pilot-to-production conversion."
  diligenceQuestions:
    - "Which exact artifact unlocks the buying decision today: the blast-radius simulation, the approval packet, the audit trail, or drift monitoring?"
    - "How often is the real blocker unclear entitlements versus adjacent problems such as poor metadata, missing tags, or prompt-injection concerns?"
    - "Will buyers sign for simulation-only scope, or do most serious opportunities immediately require runtime enforcement and incident-response hooks?"
    - "Which connector combinations appear most often in blocked launches, and how much value is lost if one major system is missing?"
    - "Who owns the first budget in practice: CDO, platform engineering, security, or a broader AI program office?"
operatingAssumptions:
  - assumption: "Regulated enterprises will buy pre-deployment simulation and approval workflow before they require full runtime enforcement."
    basis: research.yaml
    validationTest: "Win at least 3 paid pilots where initial scope is read-only simulation plus approval packets and no runtime block path is required in the signed pilot plan."
    decisionImpact: "If false, the roadmap must pull forward enforcement capabilities, increasing product scope, implementation complexity, and capital needs."
  - assumption: "Snowflake, Databricks, Salesforce, ServiceNow, and SharePoint cover the majority of blocked-launch use cases in the beachhead."
    basis: idea.yaml
    validationTest: "Collect connector inventories from the first 8 design-partner prospects and confirm at least 70% of named launch blockers are covered by the first five integrations."
    decisionImpact: "If false, the wedge broadens too early and the company should narrow ICP further or delay broad GTM hiring."
  - assumption: "A neutral approval plane is easier for buyers to adopt than a new gateway or platform migration."
    basis: research.yaml
    validationTest: "In the first 10 qualified opportunities, confirm at least 6 buyers prefer a read-only overlay deployment over replacing an existing stack."
    decisionImpact: "If false, the company should reposition as an embedded module or change the entry point to a platform-native strategy."
  - assumption: "Founders can close the first 3-5 pilots through direct sales before a full enterprise sales team is needed."
    basis: operator judgment
    validationTest: "Build a 30-account target list and secure at least 3 paid pilots or signed pilot LOIs within 9 months through founder-led outreach."
    decisionImpact: "If false, the ICP, trigger framing, or partner mix is wrong and burn should stay low until the motion is corrected."
  - assumption: "Approved-versus-rejected access envelopes and drift events will become a defensible product moat across customers."
    basis: research.yaml
    validationTest: "Capture at least 100 governed workflow reviews across pilots and show that later recommendations reduce reviewer overrides or approval time."
    decisionImpact: "If false, differentiation shifts toward integrations and services, weakening long-term margin and venture scale."
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Interview 12-15 data-governance, AI-platform, and security leaders about one recently blocked internal-agent launch."
    hypothesis: "The first budget opens when a named production review is stalled by uncertainty about cross-system data reach."
    successMetric: "At least 10 interviews produce a recent blocked-launch example and at least 6 match the target warehouse-plus-SaaS stack."
    owner: "Founder CEO"
  - horizon: "0–90 days"
    experiment: "Run a concierge simulation on one historical workflow for two design partners using exported permissions and sample metadata."
    hypothesis: "A simulated blast-radius report will reveal enough hidden reach or policy gaps to justify a paid pilot."
    successMetric: "At least 2 target accounts say the report would have changed a real launch decision and at least 1 signs a pilot or LOI."
    owner: "Founding eng"
  - horizon: "0–90 days"
    experiment: "Test three pilot packages that separate simulation, approval workflow, and drift monitoring."
    hypothesis: "Buyers will prefer an approval-led package over a generic AI security or observability package."
    successMetric: "The approval-led package wins in at least 5 of 8 pricing conversations and appears in 2 signed pilot scopes."
    owner: "Founder CEO"
  - horizon: "90–180 days"
    experiment: "Deploy the first five connectors and approval packet workflow in 2-3 paid pilots."
    hypothesis: "The startup can reach usable simulation accuracy and procurement acceptance without custom connector work for every customer."
    successMetric: "At least 2 pilots complete simulation and governance review inside 30 days from technical kickoff."
    owner: "Product and eng lead"
  - horizon: "90–180 days"
    experiment: "Package a security-review kit with architecture, audit outputs, least-privilege controls, and managed-identity guidance."
    hypothesis: "A standardized review kit materially shortens procurement and security clearance for neutral approval software."
    successMetric: "At least 3 prospects complete security review without requiring a fully bespoke control narrative."
    owner: "Product security lead"
  - horizon: "6–12 months"
    experiment: "Roll out drift detection against approved envelopes for the first production customers."
    hypothesis: "Post-launch drift evidence increases conversion and expansion more than additional simulation features alone."
    successMetric: "At least 2 production customers enable drift monitoring and record actionable detections without material false-positive escalation for 90 days."
    owner: "Product lead"
  - horizon: "12–18 months"
    experiment: "Pilot one partner-led motion with an identity, governance, or enterprise AI implementation firm."
    hypothesis: "Trusted partners can source qualified blocked-launch opportunities at conversion rates comparable to founder-led deals."
    successMetric: "At least 25% of qualified pipeline comes from 2 active partners and partner-sourced pilots convert no worse than direct pilots."
    owner: "GTM lead"
operations:
  - "Maintain a versioned connector and policy-template library for the first warehouse and SaaS systems seen in pilots."
  - "Produce immutable approval records linking simulation inputs, reviewer decisions, remediation steps, and approved envelopes for audit use."
  - "Standardize deployment around managed identities, least-privilege access, and read-only ingestion before expanding to deeper controls."
  - "Run post-pilot reviews that compare baseline approval time, coverage gaps, reviewer overrides, and drift events before widening scope."
team:
  - role: "Founder CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, ICP discovery, pricing, and navigation of the cross-functional buying process in the first regulated accounts."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the policy graph, workflow simulator, and first connector set required to prove product truth in paid pilots."
  - role: "Product security lead"
    startTiming: "Month 2"
    rationale: "Turn regulatory and security requirements into a repeatable approval architecture and a procurement-ready review kit."
  - role: "Integration engineer"
    startTiming: "Month 3"
    rationale: "Productize the first five connectors and reduce deployment variance so the business does not become a custom-services shop."
  - role: "Product lead"
    startTiming: "Month 6"
    rationale: "Translate pilot learnings into roadmap discipline across simulation, drift, vertical templates, and packaging."
  - role: "GTM lead"
    startTiming: "Month 9"
    rationale: "Scale pipeline only after paid pilots, pricing, and deployment timelines show repeatable conversion."
milestones:
  - horizon: "0–12 months"
    items:
      - "Sign 3-5 paid pilots in regulated Snowflake-or-Databricks-plus-SaaS accounts."
      - "Ship the first five connectors and complete simulation plus approval review in under 30 days for at least 2 customers."
      - "Convert at least 2 pilots into annual production contracts."
      - "Package a reusable security-review kit and BFSI or healthcare approval templates."
  - horizon: "12–24 months"
    items:
      - "Reach 10-15 production customers governing one or more internal agent workflows."
      - "Launch drift detection and runtime evidence hooks tied to approved envelopes."
      - "Establish 2 partner channels that can source qualified pilots."
      - "Expand within existing customers into additional workflows or business units."
  - horizon: "24–36 months"
    items:
      - "Reach roughly 40 production accounts or equivalent ARR consistent with the modeled SOM."
      - "Support a broader control-plane position across more connectors and at least two regulated vertical templates."
      - "Decide whether to deepen into enforcement and certification or remain the neutral approval layer based on retention and win rates."
risks:
  - risk: "Snowflake, Databricks, or adjacent security vendors bundle enough governance to make independent approval spend look redundant."
    likelihood: High
    impact: High
    mitigation: "Win on neutral multi-system coverage, workflow-specific approval evidence, and faster deployment outside any single platform estate."
  - risk: "Customer entitlements, metadata, and connector hygiene are too messy to model accurately without heavy services work."
    likelihood: High
    impact: High
    mitigation: "Restrict the first product to the most common systems, require minimum data-readiness inputs, and refuse accounts that need large remediation before proof."
  - risk: "Buyers insist on runtime enforcement or incident controls before they trust simulation-only deployments."
    likelihood: Medium
    impact: High
    mitigation: "Sequence drift detection and runtime evidence hooks early, and position the first pilot as the lowest-friction path toward broader controls."
  - risk: "Budget ownership remains ambiguous across governance, platform, and security teams, stretching enterprise sales cycles."
    likelihood: Medium
    impact: Medium
    mitigation: "Qualify only opportunities tied to a named blocked launch and force pilot sponsorship from one budget-bearing executive before technical scoping."
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3–5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to build the policy graph, ship the first five connectors,
    complete 3-5 paid pilots, convert early regulated customers into annual
    contracts, add drift detection and a procurement-ready security-review kit,
    and prove that a neutral approval plane can win budget before scaling GTM.
