  downsideCase: 3.0% 月度 logo 流失
  baseCase: 2.0% 月度 logo 流失
  upsideCase: 1.5% 月度 logo 流失
  y3RevenueImpactK: -240.0
  cashImpactK: -210.0
- variable: 毛利率
  downsideCase: Y3 毛利率 66%
  baseCase: Y3 毛利率 70%
  upsideCase: Y3 毛利率 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -231.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      QualifiedPipeline --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入来自：客户数从 Q4Y2 的 13 个增至 Q4Y3 的 40 个，同时确认 ACV 从约 $150K 升到 $220K，因为账户持续加购漂移模块和更多受治理工作流。
- checkName: 必须跑对的环节
  finding: 公司必须把 pilot→production 转化率守在计划附近，并把至少一条合作伙伴渠道真正变成 Y3 的有效 pipeline，而不是继续只靠创始人打单。
- checkName: 模型会失灵的情况
  finding: 如果买家把模拟器视为重咨询部署，或在采购前就坚持要运行时强制控制，现金会向 downside 情景靠拢，这轮种子资金也撑不到 breakeven。
- checkName: 下一轮融资证明点
  finding: 到 Q4Y2 拿下 10–13 个生产客户、把实施周期压到 30 天以内，并让漂移监控真正跑起来，这是最有希望支撑下一轮融资的里程碑。
sanityChecks:
  ruleOf40: Y3 增长 217.6% + EBITDA 利润率 9.5% = 227.1%（由于 Y2 收入基数仍小，数值被明显放大）。
  burnMultiple: 按约 $1.5M 烧钱换来约 $1.5M 新增收入测算，Y2 burn multiple 约为 1.0x；模型在 Q3Y3 转入 EBITDA 为正。
  revenuePerFte: 按 Q4Y3 的 14 个 FTE 计算，Y3 每 FTE 收入约 $412.9K（SaaS 参考区间约 $200–400K）。
  flags:
  - 模型仍依赖客户数从 Q4Y2 的 13 个跳到 Q4Y3 的 40 个，因此合作伙伴渠道执行和 referenceability 是最大预测风险。
  - 源材料里，Snowflake 相邻账户之外的定价证据依旧偏薄，因此 Y3 约 $220K 的已确认退出 ACV 还要靠首批生产续约去验证。
  - Y3 每 FTE 收入已经冲到 SaaS 基准的高位，如果部署速度或扩单稍有失手，盈利时间点就会被明显后移。
