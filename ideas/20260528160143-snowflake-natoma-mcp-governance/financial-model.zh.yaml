slug: agent-data-scope-simulator
date: '2026-05-28'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型在种子轮交割后启动
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date + BP fundingAsk] 模型从计划日期后的次月开始，确保种子轮资金先到账，再开始经营性支出。'
- id: A2
  name: 期初现金
  value: '3800.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $3–5M] 基础情景采用 $3.8M 的种子轮规模，接近区间中点，足以跑到 Q4Y2 里程碑，并在进入 Y3 时仍保留 6 个月缓冲。'
- id: A3
  name: 起始客户数（M1）
  value: '0'
  unit: count
  source: '[BP product.mvp + BP milestones 0–12 months] 公司从零收入起步，必须先把模拟器和第一批连接器交付出来，付费工作流才会开始。'
- id: A4
  name: 付费 pilot 价格
  value: '55.0'
  unit: USDK per 10-12 week pilot
  source: '[BP gtm.pricing $40k-$75k pilot + BP investorMemo.firstCustomer.initialContract] 基础情景采用所述 pilot 价格区间中点。'
- id: A5
  name: 首个生产 ACV
  value: '150.0'
  unit: annualK per customer
  source: '[BP gtm.pricing $120k-$180k annual platform subscription] 基础情景采用首个生产订阅价格区间中点。'
- id: A6
  name: Y3 实际退出 ACV
  value: '220.0'
  unit: annualK per customer
  source: '[BP gtm.pricing expansion toward $250k-$300k + BP market.som] 到 Y3 末确认收入对应的 ACV 仍低于完全扩容目标，因为许多新 logo 还没把更多工作流和漂移模块加满。'
- id: A7
  name: Y1 付费客户爬坡
  value: M5 1, M7 2, M9 3, M11 4, M12 5 paying logos
  unit: customersEop
  source: '[BP milestones 0–12 months] 对应首年签下 3–5 个付费 pilot，并在第一年末至少把 2 个 pilot 转成生产。'
- id: A8
  name: Y2 客户爬坡
  value: Q1Y2 7, Q2Y2 9, Q3Y2 11, Q4Y2 13 customers
  unit: customersEop
  source: '[BP milestones 12–24 months] 与第 24 个月拿到 10–15 个生产客户的计划一致，同时保持可信的企业销售节奏。'
- id: A9
  name: Y3 客户爬坡
  value: Q1Y3 18, Q2Y3 24, Q3Y3 32, Q4Y3 40 customers
  unit: customersEop
  source: '[BP milestones 24–36 months + Research market.som 40 accounts] 基础情景下，只有在 partner channel 开始贡献后，公司才在第 3 年跑到模型中的账户数。'
- id: A10
  name: 已确认价格阶梯
  value: 'Y1 monthly realized revenue per paying logo: M5-M7 $18.3K, M8-M9 $17.0K, M10-M11 $16.0K, M12 $17.0K; Y2 quarterly $42K/$44K/$46K/$48K; Y3 quarterly $46K/$48K/$50K/$55K'
  unit: revenueK per customer per month or quarter
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] 采用混合实现价格阶梯，让收入能和付费 logo 直接对账，同时反映 pilot、首个生产订阅和后续扩模块的组合。'
- id: A11
  name: 毛利率轨迹
  value: Y1 52%; Y2 quarters 58%, 60%, 62%, 64%; Y3 quarters 65%, 67%, 68%, 70%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations] 早期部署受 onboarding 和权限映射拖累，随着连接器复用和审批模板产品化，逐步逼近 70% 目标。'
- id: A12
  name: 用于单位经济的月度 logo 流失率
  value: '2.0'
  unit: percent
  source: '[Startup-finance heuristic] 受监管企业工作流软件在年度合同下可以维持较低流失，但产品在设计伙伴之外仍然很早期。'
- id: A13
  name: 稳态 CAC
  value: '90.0'
  unit: USDK per customer
  source: '[BP gtm.channels + BP funnelTargets + Startup-finance heuristic] 创始人主导的企业销售叠加较长的安全评审周期，使获客成本偏高，但对受监管账户仍属合理。'
- id: A14
  name: 含税薪酬带宽
  value: Founder 180; Founding and later engineers 210; Product security 220; Integration/product/deployment 180-190; GTM lead 230; AE 220; Customer success 170; Partner manager 205; Finance/Ops 145; Solutions engineer 200
  unit: annualK per FTE
  source: '[BP team + Startup-finance heuristic] 采用精简但具竞争力的美国企业软件现金薪酬水平，已包含工资税和福利。'
- id: A15
  name: 招聘节奏
  value: Product security M2; integration engineer M3; product lead M6; GTM lead M9; customer success M13; AE M16; engineer 2 M18; deployment engineer M21; finance/ops M27; engineer 3 M31; partner manager M33; solutions engineer M35
  unit: timing
  source: '[BP team + BP strategicChoices.sequencingRationale + BP milestones] 公司先靠精简团队把早期证明做出来，等生产牵引出现后再增加售后和合作伙伴能力。'
- id: A16
  name: 团队规模终点
  value: 6 FTE by Q4Y1, 10 FTE by Q4Y2, and 14 FTE by Q4Y3
  unit: FTE
  source: '[BP team + BP milestones] 在明确创始团队基础上，延展出适度的 pilot 后扩张；对受监管企业 GTM 动作来说，这仍是一支偏小团队。'
- id: A17
  name: 非工资运营支出阶梯
  value: S&M extra spend steps from $8K monthly pre-GTM to $12K after GTM, $26K after the first AE, and $32K after partner scale; R&D tooling and cloud spend steps from $20K to $25K after product lead, $35K after deployment scale, and $42K after the third engineer; G&A overhead steps from $12K to $14K after product lead, $22K after finance hire, and $25K late in Y3
  unit: monthly USDK
  source: '[BP operations + BP experimentRoadmap + Startup-finance heuristic] 企业安全评审、连接器托管和采购支持，即使在精简 startup 模式下也会形成真实的非工资成本。'
- id: A18
  name: 经营费用口径
  value: Department lines include payroll plus non-payroll functional spend; salaryK is disclosed as a reconciliation memo and is not additive on top of opex
  unit: policy
  source: '[BP operations + Startup-finance heuristic] 各部门费用线已同时包含工资和非工资支出；salaryK 只是对账 memo，不应再叠加到 opex 之上。'
- id: A19
  name: 融资规模规则
  value: Raise enough to reach Q4Y2 milestones and preserve at least six months of buffer into Y3
  unit: policy
  source: '[BP fundingAsk runwayMonths 18 + model requirement] 轮次规模按“里程碑 + 缓冲”来定，不是只按勉强活过 18 个月的最低现金需求来算。'
- id: A20
  name: 现金流简化假设
  value: Ending cash equals opening cash plus cumulative EBITDA
  unit: formula
  source: '[Startup-finance heuristic] 假设前三年是一家轻资产软件公司，基本没有 capex、债务或营运资本扰动，因此期末现金 = 期初现金 + 累计 EBITDA。'
