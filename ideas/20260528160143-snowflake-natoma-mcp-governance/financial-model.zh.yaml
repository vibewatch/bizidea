scenarios:
  downside:
    description: 平台打包更快、pilot 转生产更慢，公司在 Y3 前都会落在规模更小、服务占比更重的客户结构里。
    y3RevenueK: 3598.0
    y3EbitdaK: -488.0
    cashLowPointK: -350.0
    keyAssumptionChanges:
    - Y3 末客户数约 28 个，而不是 40 个。
    - 由于更少账户购买漂移和第二工作流模块，退出时确认 ACV 更接近 $200K。
    - 权限清理和部署工作长期依赖人工，毛利率最多只能到 66%。
  base:
    description: 创始人主导的 pilot 按计划转化，首条合作伙伴渠道在 Y3 开始贡献，客户也会从一条受治理工作流扩到更广的审批覆盖。
    y3RevenueK: 5780.0
    y3EbitdaK: 550.6
    cashLowPointK: 773.6
    keyAssumptionChanges:
    - Q4Y2 拿到 13 个生产客户，Q4Y3 达到 40 个。
    - 确认 ACV 从约 $150K 的首个生产部署，扩到 Q4Y3 约 $220K。
    - 毛利率直到 Q4Y3 才升到 business plan 设定的 70% 目标。
  upside:
    description: 五连接器切口比预期更广，合作伙伴转介绍开始加速，且更多账户在首个续约周期内就加购漂移模块。
    y3RevenueK: 7024.0
    y3EbitdaK: 1264.0
    cashLowPointK: 925.0
    keyAssumptionChanges:
    - Q4Y3 客户数约 46 个。
    - 随着更多客户更早购买额外工作流和漂移监控，退出时确认 ACV 升向 $235K。
    - 连接器复用和模板化更快压低部署成本，毛利率提升到 72%。
