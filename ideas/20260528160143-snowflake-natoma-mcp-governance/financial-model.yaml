modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      QualifiedPipeline --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by growing from 13 customers at Q4Y2 to 40 at Q4Y3 while recognized ACV rises from roughly $150K to $220K as accounts add drift and more governed workflows.
- checkName: Must go right
  finding: The company must keep pilot-to-production conversion near the plan and turn at least one partner channel into real Y3 pipeline rather than relying only on founders.
- checkName: Model breaks if
  finding: If buyers treat the simulator as consulting-heavy deployment work or insist on runtime enforcement before purchase, cash falls toward the downside case and the seed round stops short of breakeven.
- checkName: Next-round proof
  finding: Reaching 10-13 production customers with sub-30-day implementations and active drift monitoring by Q4Y2 is the milestone that should justify the next financing.
sanityChecks:
  ruleOf40: Y3 growth 217.6% + EBITDA margin 9.5% = 227.1% (inflated by the still-small Y2 revenue base).
  burnMultiple: Y2 burn multiple is about 1.0x based on $1.5M of burn to add $1.5M of revenue; the model crosses into positive EBITDA in Q3Y3.
  revenuePerFte: $412.9K Y3 using 14 Q4Y3 FTE (benchmark roughly $200–400K SaaS).
  flags:
  - The model still depends on jumping from 13 customers at Q4Y2 to 40 at Q4Y3, so partner-channel execution and referenceability are the largest forecast risks.
  - Pricing evidence outside Snowflake-adjacent accounts is still thin in the source material, so the $220K realized Y3 exit ACV needs validation in the first production renewals.
  - Revenue per FTE reaches the high end of SaaS benchmarks by Y3, which means any miss on deployment speed or expansion will push profitability out materially.
