slug: agent-data-scope-simulator
date: '2026-05-28'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start after seed close
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date + BP fundingAsk] Model starts the month after the dated plan so the seed cash is available before operating spend begins.'
- id: A2
  name: Opening cash
  value: '3800.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $3–5M] Base case uses a $3.8M seed, near the midpoint of the stated range, to reach the Q4Y2 milestone and still keep a six-month buffer into Y3.'
- id: A3
  name: Starting customers (M1)
  value: '0'
  unit: count
  source: '[BP product.mvp + BP milestones 0–12 months] The company starts pre-revenue and must first ship the simulator plus first connectors before any paid workflow begins.'
- id: A4
  name: Paid pilot price
  value: '55.0'
  unit: USDK per 10-12 week pilot
  source: '[BP gtm.pricing $40k-$75k pilot + BP investorMemo.firstCustomer.initialContract] Base case uses the midpoint of the stated pilot range.'
- id: A5
  name: Initial production ACV
  value: '150.0'
  unit: annualK per customer
  source: '[BP gtm.pricing $120k-$180k annual platform subscription] Base case uses the midpoint of the first-production pricing range.'
- id: A6
  name: Y3 realized exit ACV
  value: '220.0'
  unit: annualK per customer
  source: '[BP gtm.pricing expansion toward $250k-$300k + BP market.som] Recognized revenue exits Y3 below the full expansion target because many newly landed logos have not yet added all workflows and drift modules.'
- id: A7
  name: Y1 paying-customer ramp
  value: M5 1, M7 2, M9 3, M11 4, M12 5 paying logos
  unit: customersEop
  source: '[BP milestones 0–12 months] Matches the goal of signing 3-5 paid pilots in year one while converting at least 2 pilots into production by the end of the first year.'
- id: A8
  name: Y2 customer ramp
  value: Q1Y2 7, Q2Y2 9, Q3Y2 11, Q4Y2 13 customers
  unit: customersEop
  source: '[BP milestones 12–24 months] Fits the plan to reach 10-15 production customers by month 24 while keeping a believable enterprise-sales pace.'
- id: A9
  name: Y3 customer ramp
  value: Q1Y3 18, Q2Y3 24, Q3Y3 32, Q4Y3 40 customers
  unit: customersEop
  source: '[BP milestones 24–36 months + Research market.som 40 accounts] Base case reaches the modeled year-3 account count only after partner channels start contributing.'
- id: A10
  name: Recognized price ladder
  value: 'Y1 monthly realized revenue per paying logo: M5-M7 $18.3K, M8-M9 $17.0K, M10-M11 $16.0K, M12 $17.0K; Y2 quarterly $42K/$44K/$46K/$48K; Y3 quarterly $46K/$48K/$50K/$55K'
  unit: revenueK per customer per month or quarter
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] Uses a blended realized-price ladder so revenue reconciles directly to paying logos while reflecting the mix of pilots, first production subscriptions, and later expansion modules.'
- id: A11
  name: Gross margin trajectory
  value: Y1 52%; Y2 quarters 58%, 60%, 62%, 64%; Y3 quarters 65%, 67%, 68%, 70%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations] Early deployments carry onboarding and entitlement-mapping drag, then approach the 70% target as connector reuse and approval templates productize.'
- id: A12
  name: Monthly logo churn for unit economics
  value: '2.0'
  unit: percent
  source: '[Startup-finance heuristic] Regulated enterprise workflow software can support low churn on annual contracts, but the product is still early and unproven outside initial design partners.'
- id: A13
  name: Steady-state CAC
  value: '90.0'
  unit: USDK per customer
  source: '[BP gtm.channels + BP funnelTargets + Startup-finance heuristic] Founder-led enterprise sales plus long security review cycles justify a high but still plausible acquisition cost for regulated accounts.'
- id: A14
  name: Loaded salary bands
  value: Founder 180; Founding and later engineers 210; Product security 220; Integration/product/deployment 180-190; GTM lead 230; AE 220; Customer success 170; Partner manager 205; Finance/Ops 145; Solutions engineer 200
  unit: annualK per FTE
  source: '[BP team + Startup-finance heuristic] Uses lean but competitive U.S. enterprise-software cash compensation with payroll taxes and benefits included.'
- id: A15
  name: Hiring schedule
  value: Product security M2; integration engineer M3; product lead M6; GTM lead M9; customer success M13; AE M16; engineer 2 M18; deployment engineer M21; finance/ops M27; engineer 3 M31; partner manager M33; solutions engineer M35
  unit: timing
  source: '[BP team + BP strategicChoices.sequencingRationale + BP milestones] Keeps the company lean through initial proof, then adds post-sales and partner capacity only after early production traction appears.'
- id: A16
  name: Headcount endpoint
  value: 6 FTE by Q4Y1, 10 FTE by Q4Y2, and 14 FTE by Q4Y3
  unit: FTE
  source: '[BP team + BP milestones] Extends the explicit founding team into a moderate post-pilot scale-up that is still small for a regulated enterprise go-to-market motion.'
- id: A17
  name: Non-payroll operating spend ladder
  value: S&M extra spend steps from $8K monthly pre-GTM to $12K after GTM, $26K after the first AE, and $32K after partner scale; R&D tooling and cloud spend steps from $20K to $25K after product lead, $35K after deployment scale, and $42K after the third engineer; G&A overhead steps from $12K to $14K after product lead, $22K after finance hire, and $25K late in Y3
  unit: monthly USDK
  source: '[BP operations + BP experimentRoadmap + Startup-finance heuristic] Enterprise security review, connector hosting, and procurement support create real non-payroll costs even in a lean startup model.'
- id: A18
  name: Operating expense policy
  value: Department lines include payroll plus non-payroll functional spend; salaryK is disclosed as a reconciliation memo and is not additive on top of opex
  unit: policy
  source: '[BP operations + Startup-finance heuristic] This keeps EBITDA tied to total functional spend while still showing payroll consistency against headcount.'
- id: A19
  name: Funding sizing rule
  value: Raise enough to reach Q4Y2 milestones and preserve at least six months of buffer into Y3
  unit: policy
  source: '[BP fundingAsk runwayMonths 18 + model requirement] The round is sized to the milestone-plus-buffer rule, not just the minimum cash needed to survive 18 months.'
- id: A20
  name: Cash flow simplification
  value: Ending cash equals opening cash plus cumulative EBITDA
  unit: formula
  source: '[Startup-finance heuristic] Assumes an asset-light software company with minimal capex, debt, or working-capital distortion in the first three years.'
