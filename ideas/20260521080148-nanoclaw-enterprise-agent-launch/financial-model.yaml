modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified legal-ops targets] --> Pilots[Paid pilots]
      Pilots --> Production[Production workflows]
      Production --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash]
      Production --> Proof[Approval traces and security proof]
      Proof --> Expansion[More workflows and partner referrals]
      Expansion --> Revenue
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from 5 paying accounts by Y1, 15 production customers by Q4Y2, and partner-assisted expansion to 110 customers at $42K blended ARPU by Q4Y3."
  - checkName: Must go right
    finding: "Security review, playbook ingestion, and pilot conversion have to stay tight enough that two GTM heads and two partner channels can keep the sales cycle near 9 months."
  - checkName: Model breaks if
    finding: "If buyers stop at draft assistance or procurement drags beyond one quarter, the downside case turns cash slightly negative before the Y3 scale ramp arrives."
  - checkName: Next-round proof
    finding: "The next raise is justified once the company shows 15 production customers, governed write-backs, a second CLM path, and partner-sourced pilots that convert alongside direct deals."
sanityChecks:
  ruleOf40: "Y3 growth 518.8% + EBITDA margin 0.6% = 519.4%, inflated by the very small Y2 revenue base."
  burnMultiple: "Y1 burn multiple is 4.2x on $210K exit ARR; Y2 improves to 2.7x on $420K net new ARR; Y3 turns EBITDA positive in Q3."
  revenuePerFte: "$289K Y3 using 9 year-end FTE (benchmark $200-400K SaaS)"
  flags:
    - "The base case still needs 95 net new customers after Y1, so partner-sourced pipeline and shorter security review cycles are the core execution risk."
    - "Y2 burn stays high because product security, legal-playbook setup, and pilot implementation costs arrive before scale revenue catches up."
    - "Cash bottoms at $477K in Q2Y3, so a modest slip in pilot-to-production conversion would force either a leaner hiring plan or an earlier fundraise."
