assumptions:
  - id: A1
    name: Model start month
    value: "2026-06"
    unit: month
    source: "[BP date 2026-05-21] model starts the month after the business plan date."
  - id: A2
    name: Opening cash from pre-seed round
    value: "2.8"
    unit: USD M
    source: "[BP fundingAsk.targetFundingRangeUsd $2-4M] model uses a $2.8M raise to fund the Q4Y2 seed-readiness milestone plus a 6-month buffer."
  - id: A3
    name: Starting paying customers
    value: "0"
    unit: count
    source: "[BP milestones 0-12 months] the company starts before any paid pilot is live."
  - id: A4
    name: Revenue recognition convention
    value: "Average active customers = (BoP + EoP) / 2"
    unit: formula
    source: "Startup-finance heuristic for enterprise SaaS pilots that activate mid-period on average."
  - id: A5
    name: Year 1 customer ramp
    value: "[0,0,0,1,1,2,2,3,3,4,4,5]"
    unit: customers EoP by month
    source: "[BP milestones 0-12 months][BP gtm.funnelTargets] maps to 3-5 paid pilots and at least 2 production conversions by the end of Year 1."
  - id: A6
    name: Year 2 customer ramp
    value: "[7,10,13,15]"
    unit: customers EoP by quarter
    source: "[BP milestones 12-24 months] exits Year 2 at 15 production customers, the top end of the stated 10-15 customer goal."
  - id: A7
    name: Year 3 customer ramp
    value: "[40,60,85,110]"
    unit: customers EoP by quarter
    source: "[BP milestones 24-36 months][research market.som] reaches 110 customers by Q4Y3, slightly below the 120-customer SOM count and consistent with partner-assisted scale."
  - id: A8
    name: Blended annual ARPU per active customer
    value: "42.0"
    unit: USD K annual
    source: "[BP gtm.pricing][BP businessModel.expansionLevers][research market.som] uses the midpoint of the $30K-$50K first-workflow range plus modest multi-workflow expansion, still below an aggressive enterprise expansion case."
  - id: A9
    name: Gross-margin ramp
    value: "55% M1-M6; 60% M7-M12; 65% Y2; 70% Y3"
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70] early pilots carry heavier implementation and support load before the model reaches the plan's target margin."
  - id: A10
    name: Monthly logo churn for unit economics
    value: "1.8"
    unit: percent
    source: "Startup-finance heuristic for early vertical enterprise SaaS with annual contracts but still-unproven expansion behavior."
  - id: A11
    name: Founder/CEO loaded salary
    value: "150.0"
    unit: USD K annual per FTE
    source: "Startup-finance heuristic for below-market founder cash compensation at pre-seed."
  - id: A12
    name: Engineering loaded salary
    value: "190.0"
    unit: USD K annual per FTE
    source: "[BP team Founding eng] plus startup-finance heuristic for senior enterprise AI and integrations talent."
  - id: A13
    name: Product security loaded salary
    value: "180.0"
    unit: USD K annual per FTE
    source: "[BP team Product security lead] plus startup-finance heuristic for security and platform engineering cash comp."
  - id: A14
    name: Legal ops workflow loaded salary
    value: "145.0"
    unit: USD K annual per FTE
    source: "[BP team Legal ops workflow lead] plus startup-finance heuristic for domain specialist compensation with payroll load."
  - id: A15
    name: Sales/GTM loaded salary
    value: "200.0"
    unit: USD K annual per FTE
    source: "[BP team GTM lead] plus startup-finance heuristic for enterprise seller cash plus variable compensation."
  - id: A16
    name: Customer success / implementation loaded salary
    value: "130.0"
    unit: USD K annual per FTE
    source: "Startup-finance heuristic for post-pilot onboarding and production-support coverage."
  - id: A17
    name: Non-payroll opex ramp
    value: "S&M $4K/mo M1-M6, $6K/mo M7-M12, $8K/mo H1Y2, $10K/mo H2Y2, $12K/mo Y3; R&D $5K, $6K, $7K, $8K, $10K; G&A $5K, $6K, $6K, $7K, $9K"
    unit: USD K per month
    source: "[BP operations][BP experimentRoadmap][startup-finance heuristic] covers cloud tooling, security review artifacts, travel, legal, and deployment support."
  - id: A18
    name: Hire timing
    value: "Founder M1; Eng1 M1; Product security M2; Legal ops M4; GTM lead M9; Eng2 M10; Customer success M22; Sales2 M22; Eng3 M34"
    unit: schedule
    source: "[BP team][BP strategicChoices.sequencingRationale] hiring is gated to pilot proof, security-review readiness, and repeatable conversion rather than vanity growth."
  - id: A19
    name: CAC calculation basis
    value: "11.9"
    unit: USD K per customer
    source: "Derived from modeled sales and marketing spend plus 50% of legal-ops payroll and 50% of customer-success payroll divided by 110 net new customers; security review and onboarding work are treated as partially acquisition-related."
  - id: A20
    name: Funding ask sizing rule
    value: "Reach 15 production customers, governed write-backs, a second CLM path, and partner-sourced pipeline by Q4Y2 plus 6 months of buffer"
    unit: policy
    source: "Developer instruction plus [BP milestones 12-24 months][BP fundingAsk.useOfFundsSummary]."
  - id: A21
    name: Cash flow simplification
    value: "Cash movement equals EBITDA"
    unit: method
    source: "Startup-finance heuristic: capex, debt service, taxes, and working-capital swings are assumed immaterial at this stage."
