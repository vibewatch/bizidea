"differentiator": "大多数法律 AI 厂商做到起草和检索就停了，因为它们没法在客户的核心记录系统里安全执行动作。横向的 agent-security 厂商关注的是给技术团队加通用护栏，而不是处理合同备选规则、审批矩阵和法务对外修改这类工作流语义。这个项目的赢法，是把安全运行时控制和法务运营专属动作策略绑在一起，让客户同时拿到通过安全审查所需的控制能力，以及从试点走到生产所需的工作流 ROI。"
