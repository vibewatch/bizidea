"problem": "法务团队想让 AI 帮忙做红线修改、给出备选条款、推动审批流转，但通用 copilot 没法安全登录 CLM、CRM、邮箱和文件系统，也不该拿着企业的实时凭证到处操作。合同助手一旦能碰客户条款或直接发出修改，安全和 IT 就会卡住上线——没有受控运行时、没有受限密钥访问、也没有敏感动作的审批轨迹。结果就是，人手本就紧张的法务运营团队只能在手工处理和高风险试点之间硬扛，而合同量还在继续往上走。"
"targetUser":
  "primary": "在不扩编的前提下，要扛住合同量增长的 B2B SaaS 公司法务运营负责人。"
  "secondary": "依赖更快红线修改来推动成交的营收运营经理。"
  "buyer": "总法律顾问或法务运营副总裁。"
"startupThesis":
  "nonObviousInsight": "企业法务智能体真正的解锁点，不只是文本生成更强，而是动作执行足够安全。只要沙箱、临时凭证注入和人工审批都到位，合同工作就不再只是聊天问题，而会变成可以自动化的系统 of record 工作流。"
  "beachhead": "滩头市场是 Series B 到上市阶段的 B2B SaaS 公司：每月要通过 Ironclad、DocuSign CLM、Salesforce 和 Slack 处理 50-300 份 MSA 与订单表单红线修改，法务运营团队少于 10 人。"
  "wedge": "切口是一款沙箱化的合同运营智能体：调用已批准的条款手册，起草红线修改，提出备选条款，用临时凭证更新 CLM 和 CRM 记录，并且任何对外改动都必须先走明确审批。"
  "whyNowCatalyst": "这一簇信号显示，安全沙箱、凭证网关和审批原生的智能体运行时，正好在助手开始切入合同和客户工作流的当口，从开源试验走向商用产品。"
  "ventureScalePath": "先从法务运营的合同执行切入，再把同一套审批原生运行时扩展到采购、供应商安全审查、deal desk 运营等高风险后台流程——这些地方员工都想要自动化，但又承受不起失控的智能体动作。"
"solution": "产品接入客户的 CLM、CRM、共享盘和消息系统，把每一项合同任务都放进隔离运行时里，并按需注入凭证。公司的条款库、备选规则、审批矩阵和历史谈判立场，会被整理成智能体必须遵守的动作策略；只有满足这些策略，智能体才可以改记录或起草红线修改。法务团队只看高风险差异，低风险的元数据更新、流转步骤和草稿准备则自动完成，并留下完整审计轨迹。因为每个动作都有范围限制、有日志、也能感知审批，这家公司有机会拿下那些通用聊天式 copilot 和横向 LLM 封装工具过不了企业安全审查的单子。"
"goToMarketSeed":
  "firstCustomer": "首个客户应是 500-3,000 人的美国 B2B 软件公司，向中型和大型企业卖年框合同，使用 Ironclad 或 DocuSign CLM 加 Salesforce，并且一个季度里积压着大量 MSA 红线修改，法务运营团队不超过 5 人。"
  "buyingTrigger": "大销售季度前夕合同量突然上来，但 IT 明确拒绝让通用 AI 工具在没有受控运行时和审批控制的情况下碰 CLM 和 CRM 数据。"
  "currentAlternative": "手工做红线修改，加上 CLM 模板、通用起草 copilot，以及把溢出的工作丢给外部律所。"
  "switchingReason": "这个切口自动化的是红线修改周边的运营步骤，同时又能满足安全审查，而通用助手连系统访问权都拿不到。"
  "pricingHypothesis": "按年收平台订阅费，再按活跃合同工作流和已批准的对外动作按量收费。"
