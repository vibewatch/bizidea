topRisks:
  - name: "CLM vendor bundling"
    description: "Incumbent CLM platforms could add basic agent workflows and reduce urgency for a standalone product."
    mitigation: "Own the secure runtime, cross-system automation, and approval telemetry across CLM, CRM, drives, and messaging rather than only the drafting surface."
  - name: "Workflow variance"
    description: "Contract playbooks vary by company, which could make onboarding too services-heavy."
    mitigation: "Start with repeatable MSA and order-form workflows for SaaS companies and productize policy templates from design-partner implementations."
  - name: "Security proof burden"
    description: "Legal buyers may want the product, but IT and security can still stall deployment if controls are not provable."
    mitigation: "Lead with sandbox evidence, scoped credentials, and approval logs that map directly to enterprise security review checklists."
