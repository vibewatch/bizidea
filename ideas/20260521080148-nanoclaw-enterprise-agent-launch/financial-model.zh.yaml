"assumptions":
- "id": "A1"
  "name": "模型起始月份"
  "value": "2026-06"
  "unit": "月"
  "source": "[BP date 2026-05-21] 模型从商业计划日期后的下一个月开始。"
- "id": "A2"
  "name": "pre-seed 轮融资带来的期初现金"
  "value": "2.8"
  "unit": "USD M"
  "source": "[BP fundingAsk.targetFundingRangeUsd $2-4M] 模型采用 $2.8M 融资额，用来覆盖到 Q4Y2 的 seed-ready 里程碑，并额外留出 6 个月缓冲。"
- "id": "A3"
  "name": "起始付费客户数"
  "value": "0"
  "unit": "数量"
  "source": "[BP milestones 0-12 months] 公司起步时尚无任何付费试点上线。"
- "id": "A4"
  "name": "收入确认口径"
  "value": "Average active customers = (BoP + EoP) / 2"
  "unit": "公式"
  "source": "创业财务常用假设：企业 SaaS 试点平均在周期中段激活。"
- "id": "A5"
  "name": "第 1 年客户爬坡"
  "value": "[0,0,0,1,1,2,2,3,3,4,4,5]"
  "unit": "按月月末客户数"
  "source": "[BP milestones 0-12 months][BP gtm.funnelTargets] 对应第 1 年底 3-5 个付费试点，以及至少 2 个转成生产。"
- "id": "A6"
  "name": "第 2 年客户爬坡"
  "value": "[7,10,13,15]"
  "unit": "按季度季末客户数"
  "source": "[BP milestones 12-24 months] 第 2 年末做到 15 家生产客户，取的是“10-15 家客户”目标的上沿。"
- "id": "A7"
  "name": "第 3 年客户爬坡"
  "value": "[40,60,85,110]"
  "unit": "按季度季末客户数"
  "source": "[BP milestones 24-36 months][research market.som] 在 Q4Y3 做到 110 家客户，略低于 120 家客户的 SOM 假设，与合作伙伴辅助扩张相符。"
- "id": "A8"
  "name": "每个活跃客户的混合年 ARPU"
  "value": "42.0"
  "unit": "年度 USD K"
  "source": "[BP gtm.pricing][BP businessModel.expansionLevers][research market.som] 采用首个工作流 $30K-$50K 区间的中位数，并叠加温和的多工作流扩展，仍低于激进的企业扩张情景。"
- "id": "A9"
  "name": "毛利率爬坡"
  "value": "55% M1-M6; 60% M7-M12; 65% Y2; 70% Y3"
  "unit": "毛利率百分比"
  "source": "[BP businessModel.targetGrossMarginPct 70] 在模型跑到计划毛利率前，早期试点会承担更重的实施和支持负担。"
- "id": "A10"
  "name": "单位经济模型中的月度 logo 流失率"
  "value": "1.8"
  "unit": "百分比"
  "source": "创业财务常用假设：适用于年付合同、但扩张能力尚未验证的早期垂直企业 SaaS。"
- "id": "A11"
  "name": "创始人/CEO 全成本薪酬"
  "value": "150.0"
  "unit": "每名 FTE 的年度 USD K"
  "source": "创业财务常用假设：pre-seed 阶段创始人现金薪酬通常低于市场价。"
- "id": "A12"
  "name": "工程岗位全成本薪酬"
  "value": "190.0"
  "unit": "每名 FTE 的年度 USD K"
  "source": "[BP team Founding eng] 再叠加面向资深企业 AI 与集成人才的创业财务常用薪酬假设。"
- "id": "A13"
  "name": "产品安全岗位全成本薪酬"
  "value": "180.0"
  "unit": "每名 FTE 的年度 USD K"
  "source": "[BP team Product security lead] 再叠加安全与平台工程岗位的创业财务常用现金薪酬假设。"
- "id": "A14"
  "name": "法务运营工作流岗位全成本薪酬"
  "value": "145.0"
  "unit": "每名 FTE 的年度 USD K"
  "source": "[BP team Legal ops workflow lead] 再叠加领域专家含 payroll load 的创业财务常用薪酬假设。"
- "id": "A15"
  "name": "销售/GTM 岗位全成本薪酬"
  "value": "200.0"
  "unit": "每名 FTE 的年度 USD K"
  "source": "[BP team GTM lead] 再叠加企业销售岗位的创业财务常用固定 + 浮动薪酬假设。"
- "id": "A16"
  "name": "客户成功/实施岗位全成本薪酬"
  "value": "130.0"
  "unit": "每名 FTE 的年度 USD K"
  "source": "创业财务常用假设：覆盖试点后 onboarding 与生产支持。"
- "id": "A17"
  "name": "非薪酬运营费用爬坡"
  "value": "S&M $4K/mo M1-M6, $6K/mo M7-M12, $8K/mo H1Y2, $10K/mo H2Y2, $12K/mo Y3; R&D $5K, $6K, $7K, $8K, $10K; G&A $5K, $6K, $6K, $7K, $9K"
  "unit": "每月 USD K"
  "source": "[BP operations][BP experimentRoadmap][startup-finance heuristic] 覆盖云工具、安全审查材料、差旅、法务和部署支持等支出。"
- "id": "A18"
  "name": "招聘时间表"
  "value": "创始人 M1；工程 1 M1；产品安全 M2；法务运营 M4；GTM 负责人 M9；工程 2 M10；客户成功 M22；销售 2 M22；工程 3 M34"
  "unit": "时间表"
  "source": "[BP team][BP strategicChoices.sequencingRationale] 招聘节奏由试点验证、安全审查就绪和可复制转化来驱动，而不是为了做漂亮的增长数字。"
- "id": "A19"
  "name": "CAC 计算口径"
  "value": "11.9"
  "unit": "每客户 USD K"
  "source": "由模型中的销售与市场费用，加上 50% 的法务运营薪酬和 50% 的客户成功薪酬，再除以 110 个净新增客户得出；安全审查与 onboarding 被视为部分获客相关成本。"
- "id": "A20"
  "name": "融资需求测算规则"
  "value": "在 Q4Y2 前做到 15 家生产客户、受控回写、第二条 CLM 路径和伙伴来源管道，并额外留 6 个月缓冲"
  "unit": "规则"
  "source": "开发者指令 + [BP milestones 12-24 months][BP fundingAsk.useOfFundsSummary]。"
- "id": "A21"
  "name": "现金流简化假设"
  "value": "现金变动等于 EBITDA"
  "unit": "方法"
  "source": "创业财务常用假设：在这个阶段，资本开支、债务服务、税和营运资本波动都可视为不重要。"
