    "y3EbitdaK": -711.45
    "cashLowPointK": -14.69
    "keyAssumptionChanges":
    - "因为更少试点能按时通过安全审查，第 2 年末客户数从 15 家降到 12 家。"
    - "第 3 年各季度末客户路径降到 25、40、60、85。"
    - "由于买家推迟第二工作流扩展，混合年 ARPU 被压到 $36K。"
  "base":
    "description": "创始人主导的试点在 Q4Y2 前转成 15 家生产客户，之后靠合作伙伴辅助扩张，在 Q4Y3 做到 110 家客户、混合 ARPU 为 $42K。"
    "y3RevenueK": 2598.75
    "y3EbitdaK": 14.62
    "cashLowPointK": 477.43
    "keyAssumptionChanges":
    - "第 2 年各季度末客户数按 7、10、13、15 走，对应 3-5 个付费试点大致按计划转化。"
    - "第 3 年各季度末客户数升到 40、60、85、110，靠创始人销售加 2 条合作渠道推动。"
    - "混合年 ARPU 维持在 $42K，因为部分客户会加购更多工作流或更高动作量。"
  "upside":
    "description": "更扎实的安全审查套件和更早的模块扩张，同时抬高转化率和 ACV，让公司更顺利地走向 seed-ready 效率。"
    "y3RevenueK": 3138.75
    "y3EbitdaK": 392.62
    "cashLowPointK": 650.86
    "keyAssumptionChanges":
    - "由于安全批准和生产 rollout 更快，第 2 年末客户数从 15 家提高到 18 家。"
    - "第 3 年各季度末客户数改善到 45、70、95、120。"
    - "随着回写、审计和相邻工作流模块更早挂载，混合年 ARPU 提升到 $45K。"
