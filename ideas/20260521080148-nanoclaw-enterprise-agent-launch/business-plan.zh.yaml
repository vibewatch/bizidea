- "role": "创始人/CEO"
  "startTiming": "第 0 个月"
  "rationale": "在打法还没形成可复制模板前，负责买家发现、创始人主导销售、定价，以及早期法务和安全叙事。"
- "role": "创始工程师"
  "startTiming": "第 0 个月"
  "rationale": "搭建沙箱执行层、条款策略引擎，以及证明试点价值所需的第一批 CLM 和 CRM 集成。"
- "role": "产品安全负责人"
  "startTiming": "第 2 个月"
  "rationale": "把控制要求落成部署套件、审计模型和审批架构，确保能过企业审查。"
- "role": "法务运营工作流负责人"
  "startTiming": "第 4 个月"
  "rationale": "把可重复的 playbook 编进产品，压低 onboarding 差异，并让产品始终贴着真实合同运营。"
- "role": "GTM 负责人"
  "startTiming": "第 9 个月"
  "rationale": "只有在付费试点、onboarding 和定价都证明可复制转化后，才加 pipeline 能力。"
"milestones":
- "horizon": "0–12 个月"
  "items":
  - "在标准化 SaaS 合同滩头市场签下 3-5 个付费试点。"
  - "在覆盖到的 MSA 与订单表单流程里证明周转提速超过 40%。"
  - "至少把 2 个试点转成年付生产合同。"
  - "把 playbook 导入和安全审查产品化，把部署时间压到两周以内。"
- "horizon": "12–24 个月"
  "items":
  - "达到 10-15 家生产客户，且每家至少跑通一条标准化合同工作流。"
  - "上线受控的低风险回写和第二条 CLM 集成路径。"
  - "建立 2 条能够带来合格试点的合作渠道。"
  - "在现有客户内部，从法务运营扩到一个相邻的高审批流程。"
- "horizon": "24–36 个月"
  "items":
  - "做到约 120 家客户，或达到与模型 SOM 一致的 ARR 水平。"
  - "证明公司能从最初的 MSA 与订单表单切口扩到多工作流。"
  - "根据留存和胜率，决定继续深耕法务运营平台，还是扩成跨职能的审批原生工作流公司。"
"risks":
- "risk": "CLM 套件打包进足够多的可感知审批 AI 工作流，让独立产品难以成立。"
  "likelihood": "High"
  "impact": "High"
  "mitigation": "靠跨系统安全动作执行、在狭窄切口上更快落地，以及现有套件说不清楚的审批遥测来赢。"
- "risk": "客户 playbook 差异太大，导致 onboarding 变成重咨询。"
  "likelihood": "Medium"
  "impact": "High"
  "mitigation": "首个产品只做标准化 SaaS 合同，先把共创客户沉淀成策略模板，拒绝会破坏可复制模型的定制工作流。"
- "risk": "法务团队接受草稿辅助，但拒绝给生产系统回写权限。"
  "likelihood": "Medium"
  "impact": "High"
  "mitigation": "路线图先从草稿准备做起，只有在试点里证明审批和审计控制有效后，才放开低风险回写。"
- "risk": "安全审查和合规证明拖过一个销售季度。"
  "likelihood": "High"
  "impact": "Medium"
  "mitigation": "尽早打包标准化的安全审查套件，并与可信的实施或安全顾问合作，缩短采购摩擦。"
"fundingAsk":
  "round": "pre-seed"
  "targetFundingRangeUsd": "$2-4M"
  "runwayMonths": 18
  "useOfFundsSummary": "融资覆盖 18 个月：搭出核心运行时、策略引擎和首批集成，完成 3-5 个付费试点，证明试点到生产的转化，再在扩 GTM 人数前，先建立一套可复制、能过安全审查的部署动作。"
