"investorMemo":
  "verdict":
    "call": "观察"
    "conviction": "客户痛点很强、切口也清楚，但在试点证明买家愿意相信受控回写，而不是默认回到 CLM 打包功能之前，判断还不能拉得更高。"
    "whyBelieve": "公司瞄准的是一个直接连着营收的法务瓶颈，买方明确、购买触发点清楚，而且安全姿态确实是通用 copilot 给不了的。"
    "whyDoubt": "滩头市场规模中等，且同时拥挤着 CLM 现有厂商和法律 AI 玩家；如果实施继续重服务，或者信任始终停留在起草辅助，独立窗口就可能迅速收窄。"
    "nextDiligence": "下一步要核实，至少 3 个标准化 SaaS 合同场景的付费试点，是否能在证明周转更快且策略违规为 0 后，转成年付生产合同。"
  "firstCustomer":
    "title": "成长型 B2B SaaS 公司的法务运营负责人"
    "profile": "一家 500-3,000 人的软件公司，使用 Ironclad 或 DocuSign CLM、Salesforce、Slack，法务运营团队不超过 5 人，并持续处理 MSA 和订单表单红线修改。"
    "trigger": "季度末合同量上来时，IT 又明确不允许通用 AI 工具在没有受控运行时和审批控制的前提下碰 CLM 和 CRM。"
    "buyer": "总法律顾问或法务运营副总裁"
    "initialContract": "围绕一条标准化合同工作流做 $15k-$25k 的付费试点，随后转成首个生产部署约 $30k-$50k 的年度 ARR。"
  "mustBeTrue":
  - "目标买家必须把被拖延的标准化红线修改视为一个值得掏预算解决的运营问题，而不是靠增员和外部律所硬吞下去。"
  - "至少一半的合格试点，在看完控制模型后，愿意给受控的 CLM 或 CRM 回写开绿灯。"
  - "对多数早期客户而言，条款手册导入和审批矩阵配置必须能在两周内完成。"
  - "首个生产工作流至少要撑起 $30k ARR，而且不能依赖大量定制服务。"
  - "在真实评估里，客户必须有足够高的概率更偏好法务运营专用控制平面，而不是 CLM 打包的 AI 功能，管道转化才能成立。"
  "diligenceQuestions":
  - "第一个真正能解锁预算的工作流步骤，到底是红线起草、审批流转、元数据同步，还是可审计性？"
  - "在 SOC 2 和正式渗透测试证据都还没齐之前，会有多少早期买家允许受控回写？"
  - "目标客户的红线修改量里，标准化 SaaS 合同和第三方定制采购合同各占多少？"
  - "哪家 CLM 厂商最愿意共存、也最不容易把这个切口直接打包掉？"
  - "买方 ROI 里，更快周转、减少外部律所支出和 AI 部署安全放行，分别贡献多大？"
