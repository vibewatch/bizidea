      sourceRefs: [7, 38]
    - friction: "Security and AI governance review"
      severity: high
      affectedBuyer: "IT security and compliance"
      mitigation: "Ship explicit human approvals, override controls, and logging mapped to AI governance frameworks."
      sourceRefs: [10, 12, 13, 14]
    - friction: "Workflow variance across playbooks"
      severity: medium
      affectedBuyer: "Legal ops"
      mitigation: "Start with repeatable MSA and order-form motions and configurable fallback policies."
