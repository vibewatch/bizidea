topRisks:
- name: 报销碎片化
  description: 临时 PNS 的覆盖范围、编码把握和文档标准会因支付方与地区而异，这会拖慢诊所采用。
  mitigation: 先从报销已经比较成熟的诊所和支付方组合切入，再把跑通的授权材料包和覆盖打法沉淀进产品。
- name: 现有厂商渠道挤压
  description: Medtronic、Boston Scientific 或它们的一线团队，可能会把轻量工作流支持打包进去，守住器械关系。
  mitigation: 坚持厂商中立，用跨多种器械方案的转化率和结局证明自己更强，让产品成为独立诊所的控制层，而不是某一家厂商的附属插件。
- name: 患者筛选偏弱
  description: 如果诊所把不合适的患者也纳入，结局就会变得很嘈杂，软件反而会替疗法设计问题背锅。
  mitigation: 把严格的候选分诊流程做进产品，按适应证和转诊来源做结局基准，并优先服务那些本来就有纪律化介入疼痛项目的客户。
