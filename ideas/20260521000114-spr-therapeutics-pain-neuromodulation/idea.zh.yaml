differentiator: 这不是另一家神经调控器械公司，也不是一个通用远程监测 App。真正可防守的切口，是拿下临时 PNS 疗程在授权、照护协调、患者随访和疗后结局上的运营台账。如果公司能成为独立疼痛诊所上线和对标临时 PNS 的最简单方式，它就能积累器械厂商和通用 EHR 天然拿不到的多诊所结局数据和工作流锁定。
