problem: 独立介入疼痛诊所现在已经有了临时外周神经刺激的临床证据、报销顺风和战略背书，但多数诊所仍把这项疗法当成临时拼出来的边缘流程来跑。候选患者识别、保守治疗记录、保险福利核验、排期、60 天随访和结局采集，分散在 EHR 模板、器械代表支持和护士电话里。流程一碎，项目上线就慢，合格患者还没治疗就先流失，诊所也很难在把患者升级到永久植入前证明 ROI。
targetUser:
  primary: 正在上线临时外周神经刺激项目的美国独立介入疼痛诊所运营负责人和护士协调员
  secondary: 希望在永久植入前先提供一步非阿片方案的介入疼痛医生
  buyer: 独立介入疼痛集团的医疗总监或 COO
startupThesis:
  nonObviousInsight: 临时 PNS 采用的瓶颈，已经不是疗法到底有没有效；Medtronic 的收购、50,000 例植入和报销扩张都说明它有效。真正缺的是一层门诊项目基础设施：帮诊所挑对患者、拿下审批、管完整个 60 天疗程，并沉淀出经得起审计的结局数据，为更早介入提供理由。
  beachhead: 美国独立介入疼痛集团，规模 3–15 名医生，已经具备脊髓刺激能力，并计划为保守治疗失败但尚未适合植入的慢性疼痛患者增加临时 PNS。
  wedge: 一个临时 PNS 疗程管理平台，把候选分诊、预授权材料、手术排期、60 天依从性回访，以及面向支付方和转诊方的结局文档放进同一条工作流里。
  whyNowCatalyst: Medtronic 收购 SPR，再加上报销扩张和更早介入需求的明确信号，说明诊所现在既有战略背书，也有市场压力，必须尽快把临时 PNS 跑起来。
  ventureScalePath: 先从临时 PNS 项目运营切入，就能占住一个数据密集的非阿片疼痛控制点，再向转诊管理、远程监测、对照结局基准、支付方签约，以及相邻的骨骼肌肉或神经调控疗程工作流扩张。
solution: 这个产品给疼痛诊所提供一层专门服务临时 PNS 的运营系统，不再把疗法硬塞进通用的手术排期和病历模板里。它会从转诊和就诊数据里识别更可能合适的患者，自动拼出证明保守治疗失败所需的材料包，并在置入导线前持续跟踪保险福利和授权状态。疗程开始后，系统会用患者回访、症状跟踪、升级规则和关键节点提醒，把整个 60 天疗程跑完。疗程结束时，它能生成医生易读的总结，以及支付方和转诊方可直接使用的结局报告，帮助诊所判断谁该进入下一步干预、哪些转诊来源送来的患者更匹配。
goToMarketSeed:
  firstCustomer: 一个已有脊髓刺激业务、希望在不额外养一整支新团队的情况下上线临时 PNS 的 5–10 个点位独立介入疼痛集团
  buyingTrigger: 诊所在对报销更有信心、收到器械厂商推动，或感受到必须先给出非阿片选项再谈永久植入的压力后，决定新增临时 PNS。
  currentAlternative: EHR 模板、器械代表协调、人工保险福利核验，以及零散的护士电话随访
  switchingReason: 这个平台能缩短首例上线时间，减少患者在 60 天疗程中的流失，并产出通用 EHR 工作流和厂商代表都拿不出的结局证据。
  pricingHypothesis: 订阅费加按活跃疗程计费，随每月管理的临时 PNS 病例数变化。
