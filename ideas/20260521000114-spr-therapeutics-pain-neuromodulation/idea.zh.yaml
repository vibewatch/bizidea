jobsToBeDone:
- job: 当我决定给更早期的慢性疼痛患者提供临时 PNS 时，帮我的诊所把项目稳稳上线并跑起来，这样我们就能在不陷入运营混乱的情况下治疗更多合格患者。
  currentAlternative: 用 EHR、器械代表和护士电话名单把流程硬拼起来
  successMetric: 从决定上线到完成首例临时 PNS 病例的天数
- job: 当患者开始一个 60 天的临时 PNS 疗程时，帮我的团队跟踪依从性、症状和关键节点，这样我们才能证明疗效，并决定下一步最合适的干预。
  currentAlternative: 人工电话随访和零散的病历记录
  successMetric: 完成疗程且具备可用结局文档的病例占比
