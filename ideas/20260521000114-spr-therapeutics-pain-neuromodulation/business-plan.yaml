slug: temporary-pns-clinic-os
date: 2026-05-21
executiveSummary: >-
  This company should be built as a temporary peripheral nerve stimulation
  operating system for independent U.S. interventional pain groups that want to
  add a non-opioid step before permanent implants without adding a full new
  program team. The first customer is a 5-10 site pain group with existing
  spinal cord stimulation capability where a medical director or COO has
  decided to launch temporary PNS after reimbursement confidence, OEM outreach,
  or competitive pressure makes delay costly. The immediate pain is not whether
  the therapy works; it is the manual episode work across candidate triage,
  benefits verification, prior authorization, scheduling, 60-day follow-up, and
  outcomes reporting. The initial product should stay narrow to that workflow:
  candidate selection, payer packet assembly, coordinator worklists, patient
  check-ins, and end-of-episode documentation for temporary PNS only. This
  beachhead is faster to prove than a broader pain-clinic OS because time to
  first case, completed episodes, and documented outcomes can all move inside a
  single 60-day cycle. Go-to-market and pricing should stay coupled to the same
  motion: a paid pilot for one group, then an annual contract plus per-episode
  fees once the clinic sees faster approvals, less patient drop-off, and
  cleaner evidence for payers and referrers. The strongest long-term advantage
  is a vendor-neutral dataset of payer workflows, patient-selection patterns,
  and episode outcomes that OEMs and generic EHR modules do not naturally own.
  The main gaps are direct evidence on current clinic leakage and staff time,
  plus how durable reimbursement tailwinds remain after the current CMS policy
  window, so the first 18 months should buy proof on those points rather than
  broad product expansion.
problem:
  - Independent pain clinics that want to add temporary PNS still run candidate identification, conservative-care documentation, benefits checks, prior authorization, scheduling, and 60-day follow-up across EHR templates, device reps, and nurse phone calls.
  - That fragmentation delays launch, causes patient leakage between consult and lead placement, and leaves clinics without auditable outcomes documentation when deciding whether to escalate care or justify reimbursement.
solution:
  - Provide a vendor-neutral workflow layer for temporary PNS that centralizes candidate triage, payer-packet assembly, authorization status, procedure scheduling, and staff task management.
  - Run the 60-day episode with patient check-ins, milestone reminders, symptom capture, and escalation rules so clinics complete more episodes with usable documentation.
  - Generate physician-, payer-, and referrer-ready end-of-episode summaries that support next-step decisions and create reusable outcomes benchmarks across clinics.
whyWeWin:
  - The product is specialized around temporary PNS episode operations rather than generic pain-clinic software or a single OEM's reimbursement program.
  - The buying trigger is concrete because budget appears when a clinic decides to launch temporary PNS and needs time-to-first-case proof quickly.
  - Vendor neutrality matters because clinics do not want their operating layer tied to one manufacturer if they need multi-vendor leverage or benchmarking credibility.
  - If the company captures denial patterns, staffing workflows, and outcomes by indication across fragmented pain groups, it can build a defensible workflow and benchmarking moat.
strategicChoices:
  beachhead: Independent U.S. interventional pain groups with 3-15 physicians, existing neuromodulation capability, and an active plan to launch temporary PNS for chronic pain patients who have failed conservative care but are not yet implant candidates.
  wedgeRationale: This segment already understands neuromodulation economics, feels the administrative burden immediately, and can measure ROI in weeks through faster launch, fewer dropped cases, and better end-of-episode documentation. That is faster to prove than selling to hospital systems or all pain practices because the buyer, workflow, and reimbursement problem are more concentrated.
  sequencingRationale: >-
    Start with a high-touch workflow product that works without deep write-back,
    prove conversion and documentation gains in one 60-day episode, then
    productize payer packet templates, site rollouts, and benchmarking. Hiring
    should follow that sequence: engineering and reimbursement operations first,
    broader GTM only after paid pilots produce a repeatable ROI story and
    partner motion.
  notYet:
    - Full permanent implant workflow management
    - Hospital-system deployments with enterprise procurement and custom integration requirements
    - Broad chronic pain care management outside temporary PNS episodes
    - Payer contracting or risk-sharing products before cross-clinic outcomes data is credible
market:
  tam: "$47.3M estimated beachhead TAM from roughly 315 target-fit U.S. pain groups at about $150k blended annual ACV."
  sam: "$18.0M estimated three-year launch-ready SAM from about 120 target-fit groups already positioned to add temporary PNS."
  som: "$2.7M reachable year-3 SOM from about 18 customer groups at roughly $150k annual ACV."
  segments:
    - Independent and PE-backed interventional pain groups launching temporary PNS programs
    - Larger pain MSOs that standardize neuromodulation workflows across multiple sites after beachhead proof
  buyingProcess: >-
    The champion is usually the operations lead, reimbursement manager, or nurse
    coordinator once launch planning exposes how much work sits outside the EHR.
    The medical director or COO signs when a pilot shows shorter time to first
    case, cleaner authorization workflow, and credible outcomes reporting
    without forcing a rip-and-replace stack change.
product:
  mvp: >-
    MVP is a concierge-assisted temporary PNS episode workflow for one pain
    group that supports candidate triage, authorization packet assembly, status
    tracking, scheduling coordination, patient check-ins, and exportable
    physician and payer summaries. Human reimbursement and clinical-ops review
    remains in the loop for packet quality, escalation, and end-of-episode
    reporting.
  sixMonth: Ship two live pilots with candidate intake, payer-ready packet templates, coordinator task queues, patient check-ins, and exportable outcomes summaries that work without deep EHR write-back.
  twelveMonth: Add reusable payer rules libraries, denial-reason analytics, multi-site dashboards, referral-source reporting, and the first repeatable integrations for the top early clinic stack patterns.
  twentyFourMonth: Expand into a broader pain-program intelligence layer with cross-clinic benchmarking, adjacent neuromodulation workflow modules, and payer- or manufacturer-facing analytics sold only after the temporary PNS wedge is repeatable.
  keyBets:
    - Clinics will pay for workflow and documentation improvement before they demand full interoperability.
    - Better patient selection and milestone adherence can improve both operational throughput and outcomes-document completeness.
    - A vendor-neutral layer can coexist with OEM reimbursement support and still own the clinic's operating system of record.
    - The first few payer-packet and denial patterns will be similar enough to productize into reusable workflow templates.
gtm:
  wedge: Sell a paid launch-and-first-episodes workflow for temporary PNS that helps a pain group go live faster, lose fewer qualified patients, and leave each episode with payer-ready evidence rather than scattered notes.
  channels:
    - Founder-led direct sales to medical directors, COOs, and operations leaders at independent and PE-backed pain groups
    - Referrals from neuromodulation KOLs, pain-society training networks, and clinical education programs
    - Manufacturer-adjacent introductions through reimbursement teams and field launch support where vendor neutrality is preserved
  funnelTargets: "Lead→qualified pilot 15-25%, qualified pilot→paid pilot 35-50%, paid pilot→production 60%+, first group→additional site rollout 50%+ within 9 months."
  pricing: >-
    Start with a paid implementation pilot for one group, then convert to an
    annual subscription plus per-active-episode fees indexed to temporary PNS
    volume. This matches how buyers budget the problem today: recurring staff
    burden plus each additional episode that creates authorization, follow-up,
    and outcomes work.
businessModel:
  revenueStreams:
    - Annual software subscription for temporary PNS workflow management
    - One-time implementation and workflow-mapping fees
    - Per-active-episode usage fees tied to managed temporary PNS cases
    - Premium benchmarking and outcomes analytics for multi-site groups after initial proof
  unitOfValue: Active pain-clinic group and temporary PNS episode managed through the workflow
  targetGrossMarginPct: 72
  expansionLevers:
    - Roll out from one initial site cluster to every site in the same pain group
    - Add benchmarking and denial-intelligence modules on top of the core workflow product
    - Expand from temporary PNS into adjacent neuromodulation and non-opioid intervention workflows after wedge proof
strategyMap:
  northStarMetric: Completed temporary PNS episodes with on-time milestones and payer-ready outcomes documentation per live clinic group
  inputMetrics:
    - Days from launch decision to first completed temporary PNS case
    - Authorization approval rate and median approval cycle time
    - Consult-to-lead-placement conversion rate
    - Percentage of active episodes completed with usable end-of-treatment outcomes documentation
    - Pilot-to-production conversion rate
    - Site expansion rate within won groups
  moatsToBuild:
    - Reusable library of payer packets, appeals, and denial-resolution workflows for temporary PNS
    - Cross-clinic dataset linking indication, referral source, patient-selection traits, and episode completion outcomes
    - Implementation playbooks that let new pain groups launch faster without depending on OEM reps or custom services
  killCriteria:
    - Fewer than 3 paid pilots close from the first 15 qualified beachhead groups within 12 months
    - Pilot-to-production conversion stays below 50% after the first 4 paid pilots
    - Median authorization cycle time or consult-to-procedure conversion improves by less than 20% in the first 5 live deployments
    - Fewer than 80% of active episodes finish with usable outcomes documentation after the workflow has been live for 90 days
  mermaid: |
    flowchart LR
      Wedge[Temporary PNS clinic wedge] --> MVP[Episode workflow MVP]
      MVP --> Proof[Faster first cases and cleaner outcomes]
      Proof --> Expansion[Multi-clinic pain pathway data layer]
investorMemo:
  verdict:
    call: Watch
    conviction: Clear buyer pain and a coherent wedge, but standalone budget pull and reimbursement durability still need live proof.
    whyBelieve: The company targets a specific launch-and-episode workflow that clinics already handle manually and that OEMs and generic systems only partially cover.
    whyDoubt: The market is narrow, substitutes are credible, and clinics may accept rep-led support or manual coordination unless pilots show measurable throughput and documentation gains.
    nextDiligence: The next proof point is 3 paid pilots that show shorter authorization cycles, lower patient leakage, and at least 2 conversions to annual production contracts.
  firstCustomer:
    title: Medical director or COO at a 5-10 site independent interventional pain group
    profile: A U.S. pain group with existing neuromodulation capability, coordinator staff under strain, and a concrete plan to launch temporary PNS for earlier-stage chronic pain patients.
    trigger: The group commits to adding temporary PNS after reimbursement confidence, OEM outreach, or competitive pressure exposes the need to operationalize the program quickly.
    buyer: Medical director or COO
    initialContract: $40k-$75k paid pilot for one group over 90-120 days, converting to roughly $120k-$180k ARR plus per-active-episode fees once first cases and reporting workflows are live.
  mustBeTrue:
    - At least 3 of the first 10 serious target groups will pay for a pilot instead of asking the startup to work through OEM support or free implementation help.
    - The first 5 live deployments improve authorization cycle time or consult-to-procedure conversion by at least 20% versus baseline.
    - At least 80% of active episodes on the platform finish with usable outcomes documentation that the clinic will show to payers or referrers.
    - At least 2 early customers convert from paid pilot to annual production contracts at ACVs consistent with the modeled market.
    - At least 30% of early customers expand to additional sites or adjacent neuromodulation workflows within 12 months of first go-live.
  diligenceQuestions:
    - How much staff time and patient leakage exist today between consult, authorization, lead placement, and final outcomes reporting?
    - Will clinics buy this as a standalone workflow product or insist it be bundled through OEM or RCM partners?
    - Which payer mixes and geographies should the company target first to avoid reimbursement-edge cases dominating the roadmap?
    - Can v1 prove ROI without deep EHR write-back, or will integration scope delay deployment and compress margins?
    - How quickly will OEMs respond with bundled lightweight workflow tooling if this wedge starts working?
operatingAssumptions:
  - assumption: Pain groups will accept annual software pricing near the modeled ACV if the product reduces coordinator labor and speeds launch.
    basis: research.yaml
    validationTest: Close 3 paid pilots and secure at least 2 signed pilot-to-annual conversion paths in the $120k-$180k ARR range.
    decisionImpact: If false, pricing must shift toward a lower-ACV software product, heavier services revenue, or channel-led distribution.
  - assumption: The first version can show buyer-visible ROI with exports and light integrations rather than full EHR write-back.
    basis: research.yaml
    validationTest: Deliver the first 2 pilots with no critical workflow blocked by missing write-back and confirm buyers will renew based on KPI improvement alone.
    decisionImpact: If false, the roadmap becomes integration-heavy, implementation margins fall, and the company likely needs more capital before scaling GTM.
  - assumption: OEM reimbursement teams and clinic staff will tolerate a vendor-neutral operating layer rather than locking the workflow inside rep-led tools.
    basis: research.yaml
    validationTest: Run 10 interviews with former or current neuromodulation reps and secure 2 pilot situations where OEM support coexists with the platform.
    decisionImpact: If false, the company must rely more heavily on direct sales and emphasize independence from OEM support as the core reason to buy.
  - assumption: Better candidate selection and milestone tracking can materially improve episode completion quality, not just administrative throughput.
    basis: idea.yaml
    validationTest: In the first 50 managed episodes, compare completion and usable-documentation rates for platform-managed cases versus each clinic's historical baseline.
    decisionImpact: If false, the product should narrow its value proposition to reimbursement and workflow efficiency rather than outcomes-driven expansion.
  - assumption: The beachhead can expand into adjacent pain workflows once the company owns enough benchmark data and implementation trust.
    basis: operator judgment
    validationTest: After 3 reference accounts go live, test whether at least 2 request or pay for adjacent neuromodulation workflow modules within 12 months.
    decisionImpact: If false, the company remains a narrower temporary PNS workflow business and should underwrite capital needs accordingly.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 operations leaders, coordinators, and medical directors at target pain groups and map the current temporary PNS workflow from consult to end-of-episode summary.
    hypothesis: The same launch decision creates measurable pain in authorization, staffing, and outcomes reporting across most target groups.
    successMetric: At least 10 of 15 interviews confirm a common workflow map and share baseline KPIs or anecdotal leakage points.
    owner: CEO
  - horizon: 0–90 days
    experiment: Run time-and-motion and funnel audits with 3 design-partner clinics.
    hypothesis: Staff time and patient leakage are large enough to justify pilot pricing before long-term outcomes data is available.
    successMetric: Each clinic surfaces at least one quantified bottleneck in authorization cycle time, coordinator hours, or consult-to-procedure conversion that supports an ROI case.
    owner: Clinical operations lead
  - horizon: 90–180 days
    experiment: Launch 2 paid pilots using light integration, exportable reporting, and weekly workflow reviews.
    hypothesis: Buyers will pay before deep interoperability is complete if the product improves launch speed and episode documentation quickly.
    successMetric: 2 paid pilots signed at or above $40k each and both groups go live without bespoke product work dominating the roadmap.
    owner: CEO
  - horizon: 90–180 days
    experiment: Test 2 distribution paths in parallel through direct founder-led selling and manufacturer-adjacent referrals.
    hypothesis: The company can acquire qualified pilots faster when channel trust complements direct sales, even if final buying remains clinic-led.
    successMetric: One channel produces at least 3 qualified opportunities or 1 paid pilot within 6 months without forcing exclusivity.
    owner: GTM lead
  - horizon: 180–360 days
    experiment: Measure pilot deltas in authorization time, consult-to-procedure conversion, completed episodes, and documented outcomes quality.
    hypothesis: Operational proof from the first live deployments is strong enough to support annual conversions and multi-site expansion.
    successMetric: At least 2 pilots beat baseline on 2 or more core KPIs and convert to production contracts or formal rollout plans.
    owner: Product lead
  - horizon: 180–360 days
    experiment: Productize the first payer-packet library and denial analytics across the top payer scenarios seen in live pilots.
    hypothesis: A reusable reimbursement workflow asset will shorten subsequent deployments and improve win rates.
    successMetric: Second-wave implementations launch at least 30% faster than the first pilot and reuse standardized packet templates in most cases.
    owner: Founding eng
operations:
  - Maintain a payer-rules library, packet templates, and denial-reason taxonomy as core product assets rather than ad hoc customer-success work.
  - Run weekly clinic scorecards covering authorization status, procedure scheduling, active-episode adherence, and end-of-treatment documentation quality.
  - Keep implementation scoped to one defined temporary PNS workflow until KPI proof exists; avoid custom permanent-implant or broad RCM projects in year one.
  - Build partner playbooks for OEM-adjacent introductions and pain-society education without giving any single manufacturer control of the operating layer.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Owns the workflow engine, integration layer, and reporting infrastructure required for the initial product.
  - role: Clinical operations and product lead
    startTiming: Month 0
    rationale: Converts pain-clinic and reimbursement complexity into a repeatable episode workflow and pilot implementation plan.
  - role: Reimbursement program manager
    startTiming: Month 3
    rationale: Builds the payer-packet library, denial playbooks, and staff training needed for measurable authorization wins.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Shortens deployment time by turning clinic-specific stack quirks into reusable integration patterns.
  - role: GTM lead
    startTiming: Month 9
    rationale: Added only after the first pilots generate referenceable ROI and a repeatable founder-assisted sales motion.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 paid pilots with beachhead pain groups
      - Launch 2 pilots live and document baseline versus post-go-live KPI deltas
      - Convert at least 2 pilot groups into annual contracts
      - Ship reusable payer-packet templates and coordinator worklists for the first common payer scenarios
  - horizon: 12–24 months
    items:
      - Reach 8-10 customer groups and prove at least one multi-site rollout within an account
      - Add denial analytics, referral-source reporting, and the first benchmarking views
      - Establish one durable referral channel through KOLs, training ecosystems, or manufacturer-adjacent partners
      - Narrow the first adjacent workflow expansion based on customer pull rather than broad platform ambition
  - horizon: 24–36 months
    items:
      - Reach the modeled 18 customer-group SOM or show equivalent pipeline traction toward it
      - Launch an adjacent neuromodulation or non-opioid intervention module using the same buyer and implementation motion
      - Turn cross-clinic outcomes and workflow data into a benchmark product customers will pay for separately
risks:
  - risk: Reimbursement support for temporary PNS proves narrower or less durable than clinics expect.
    likelihood: Medium
    impact: High
    mitigation: Start in payer mixes and sites of service with strongest current reimbursement confidence and sell ROI on staffing and conversion gains, not revenue lift alone.
  - risk: OEMs bundle lightweight workflow support tightly enough that clinics do not budget for standalone software.
    likelihood: Medium
    impact: High
    mitigation: Stay vendor-neutral, show multi-vendor benchmarking value, and win on clinic-owned operations rather than manufacturer alignment.
  - risk: Noisy patient selection weakens outcomes and makes the platform look like an administrative tool rather than a care-improvement layer.
    likelihood: Medium
    impact: High
    mitigation: Build strict candidate criteria, baseline assessments, and referral-source benchmarking into the first workflow rather than treating them as later analytics.
  - risk: Integration and implementation complexity slow pilots enough to erode margins and referenceability.
    likelihood: Medium
    impact: Medium
    mitigation: Keep v1 export-first, constrain the supported stack, and hire solutions capability only after repeated workflow patterns emerge.
  - risk: The market remains too narrow to support venture-scale growth if adjacent expansion does not materialize.
    likelihood: Medium
    impact: High
    mitigation: Use the first 12-18 months to test multi-site expansion, adjacent workflow pull, and willingness to pay for benchmarking before scaling burn.
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway buys 3-5 paid pilots, a repeatable temporary PNS workflow product with payer-packet and reporting assets, the first two integration patterns, and enough KPI proof to justify multi-site expansion and the next financing.
