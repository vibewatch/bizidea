slug: temporary-pns-clinic-os
date: 2026-05-21
executiveSummary: 这家公司应该被做成一套面向美国独立介入疼痛集团的临时外周神经刺激 运营系统，服务对象是那些想在永久植入前先加上一档非阿片方案、但又不想再养一整支新项目团队的机构。第一个客户应该是一家有 5–10 个点位、已具备脊髓刺激能力的疼痛集团；当医疗总监或 COO 因为报销把握、OEM 推动或竞争压力而决定上线临时 PNS 时，延迟就开始变贵。眼下真正疼的，不是疗法有没有效，而是候选分诊、保险福利核验、预授权、排期、60 天随访和结局报告这一整段人工工作。第一版产品就该死守这条窄工作流：候选筛选、支付方材料组装、协调员任务清单、患者回访，以及只服务临时 PNS 的疗程结束文档。这个滩头市场比更宽泛的疼痛诊所 OS 更容易证明，因为首例上线时间、完成疗程数和已记录结局，都能在一个 60 天周期里看到变化。GTM 和定价也要跟这条路径绑在一起：先为一个集团做付费试点，等诊所看到审批更快、患者流失更少、给支付方和转诊方的证据更干净，再转成年合同加按疗程收费。长期最强的优势，是 OEM 和通用 EHR 模块天然拿不到的厂商中立数据集——它能沉淀支付方流程、患者筛选模式和疗程结局。当前最大缺口，是对诊所现有流失率和团队耗时的直接证据，以及在当前 CMS 政策窗口之后报销顺风能持续多久。所以前 18 个月买的应该是这些问题的实证，而不是过早铺大产品线。
problem:
- 想上线临时 PNS 的独立疼痛诊所，仍然要把候选患者识别、保守治疗文档、保险福利核验、预授权、排期和 60 天随访拆散在 EHR 模板、器械代表和护士电话里完成。
- 流程一碎，项目上线就慢，患者会在初诊到导线置入之间不断流失；更糟的是，诊所在决定是否升级治疗或证明报销合理性时，手里还没有经得起审计的结局材料。
solution:
- 提供一层厂商中立的临时 PNS 工作流系统，把候选分诊、支付方材料组装、授权状态、手术排期和团队任务管理集中起来。
- 用患者回访、节点提醒、症状采集和升级规则，把整个 60 天疗程跑完，让诊所完成更多病例，并留下可用文档。
- 输出医生、支付方和转诊方都能直接使用的疗程总结，既支持下一步治疗决策，也能在多家诊所之间沉淀可复用的结局基准。
whyWeWin:
- 产品围绕的是临时 PNS 疗程运营，而不是通用疼痛诊所软件，也不是某一家 OEM 的报销项目。
- 购买触发点很具体：一旦诊所决定上线临时 PNS，就会马上需要更快拿到首例上线证明。
- 厂商中立很重要，因为诊所不愿把自己的运营层绑死在某一家器械厂商身上，尤其当它们需要多厂商议价能力或基准公信力时。
- 如果公司能抓住拒赔模式、人员工作流和按适应证划分的结局数据，它就能建起一条可防守的工作流与基准护城河。
strategicChoices:
  beachhead: 美国独立介入疼痛集团，规模 3–15 名医生，已有神经调控能力，并且正计划为保守治疗失败但尚未到植入阶段的慢性疼痛患者上线临时 PNS。
  wedgeRationale: 这类客户已经懂神经调控的经济账，也会第一时间感受到行政负担；而且它们能在几周内用更快上线、更少掉单和更好的疗程结束文档来衡量 ROI。相比卖给医院系统或所有疼痛机构，这个切口更容易证明，因为买方、工作流和报销问题都更集中。
  sequencingRationale: 先做一个高触达、无需深度回写的工作流产品，在一个 60 天疗程里证明转化和文档改善，再把支付方材料模板、点位 扩点 和基准能力产品化。招聘也要跟这个节奏走：先补工程和报销运营，等付费试点跑出可复制的 ROI 故事和伙伴路径后，再扩大 GTM。
  notYet:
  - 永久植入工作流的全流程管理
  - 需要企业级采购和深度定制集成的医院系统部署
  - 临时 PNS 疗程之外的广义慢性疼痛管理
  - 在跨诊所结局数据站稳前就去做支付方签约或风险共担产品
market:
  tam: $47.3M：估算的滩头 TAM，来自约 315 家目标画像匹配的美国疼痛集团，每家混合年 ACV 约 $150k。
  sam: $18.0M：估算的三年可上线 SAM，来自约 120 家已经具备上线临时 PNS 条件的目标集团。
  som: $2.7M：第 3 年可触达的 SOM，约 18 个客户集团，每家年 ACV 约 $150k。
  segments:
  - 正在上线临时 PNS 项目的独立与 PE 支持介入疼痛集团
  - 在滩头市场验证后，把神经调控工作流标准化到多点位的大型疼痛 MSO
  buyingProcess: 当上线筹备暴露出有多少工作落在 EHR 之外时，内部推动人 往往会是运营负责人、报销经理或护士协调员。只要试点能证明首例上线更快、授权流程更干净、结局报告更可信，而且不用大改现有系统，最后拍板的人通常就是医疗总监或 COO。
product:
  mvp: MVP 是一套由 人工陪跑式服务支持的临时 PNS 疗程工作流，先服务一个疼痛集团，覆盖候选分诊、授权材料组装、状态跟踪、排期协调、患者回访，以及可导出的医生和支付方摘要。人工报销和临床运营审核仍保留在环里，负责把控材料质量、升级处理和疗程结束报告。
  sixMonth: 上线 2 个真实试点，交付候选 intake、支付方材料模板、协调员任务队列、患者回访，以及无需深度 EHR 回写也能用的结局摘要导出。
  twelveMonth: 补上可复用的支付方规则库、拒赔原因分析、多点位仪表盘、转诊来源报告，以及针对早期主流诊所技术栈的首批可复用集成。
  twentyFourMonth: 扩成更广的疼痛项目 智能层，提供跨诊所基准、相邻神经调控工作流模块，以及只在临时 PNS 切口被证明可复制后再出售给支付方或器械厂商的分析能力。
  keyBets:
  - 诊所在要求全量互操作前，就愿意先为工作流和文档改善付费。
  - 更好的患者筛选和节点依从管理，既能提高运营吞吐，也能提高结局文档完整度。
  - 一层厂商中立系统能与 OEM 报销支持共存，同时成为诊所真正的运营台账。
  - 前几批支付方材料和拒赔模式的相似度足够高，可以沉淀成可复用模板。
gtm:
  wedge: 先卖一套“上线并跑通首批疗程”的临时 PNS 工作流，帮疼痛集团更快开跑、少掉合格患者，并在每个疗程结束时留下支付方可直接使用的证据，而不是零散病历。
  channels:
  - 创始人主导直销，面向独立与 PE 支持疼痛集团的医疗总监、COO 和运营负责人
  - 来自神经调控 KOL、疼痛学会培训网络和临床教育项目的转介
  - 通过报销团队和一线启动支持获得厂商侧引荐，但前提是保持厂商中立
  funnelTargets: 线索→合格试点 15-25%；合格试点→付费试点 35-50%；付费试点→正式生产 60%+；首个集团→追加点位 扩点 在 9 个月内达到 50%+。
  pricing: 先做一个面向单集团的付费上线试点，再转成年订阅加按活跃疗程收费，随临时 PNS 量变化。这和买方今天的预算逻辑一致：一部分是持续的人力负担，另一部分来自每新增一个疗程就多出来的授权、随访和结局工作。
businessModel:
  revenueStreams:
  - 临时 PNS 工作流管理的年度软件订阅
  - 一次性实施与工作流梳理费用
  - 按管理中的临时 PNS 病例收取的活跃疗程使用费
  - 在初步验证后，面向多点位集团出售高阶基准与结局分析
  unitOfValue: 通过工作流管理的活跃疼痛诊所集团与临时 PNS 疗程
  targetGrossMarginPct: 72
  expansionLevers:
  - 从初始点位簇 扩点 到同一疼痛集团的所有点位
  - 在核心工作流之上叠加基准和拒赔 intelligence 模块
  - 在切口验证后，从临时 PNS 扩到相邻神经调控与非阿片干预工作流
strategyMap:
  northStarMetric: 每个已上线诊所集团中，按时完成关键节点并形成支付方可用结局文档的临时 PNS 疗程数
  inputMetrics:
  - 从决定上线到完成首例临时 PNS 病例的天数
  - 授权通过率与授权周期中位数
  - 从初诊到导线置入的转化率
  - 活跃疗程中完成并留有可用疗程结束结局文档的占比
  - 试点转正式生产的转化率
  - 赢下集团内部点位扩张率
  moatsToBuild:
  - 面向临时 PNS 的支付方材料、申诉与拒赔处理工作流可复用库
  - 串联适应证、转诊来源、患者筛选特征与疗程完成结局的跨诊所数据集
  - 让新疼痛集团更快上线、而不再依赖 OEM 代表或定制服务的实施 操作手册
  killCriteria:
  - 前 12 个月里，从首批 15 个合格滩头客户中拿到的付费试点少于 3 个
  - 前 4 个付费试点后，试点转正式生产的转化率仍低于 50%
  - 前 5 个真实部署里，授权周期中位数或初诊到手术转化率改善不足 20%
  - 工作流上线 90 天后，活跃疗程里能留出可用结局文档的比例低于 80%
  mermaid: |-
    flowchart LR
      Wedge[临时 PNS 诊所切口] --> MVP[疗程工作流 MVP]
      MVP --> Proof[更快的首例上线和更干净的结局]
      Proof --> Expansion[多诊所疼痛路径数据层]
investorMemo:
  verdict:
    call: 观察
    conviction: 买方痛点明确、切口也顺，但独立预算拉力和报销顺风是否持久，仍需要真实项目验证。
    whyBelieve: 公司盯住的是一条很具体的上线与疗程工作流，而这部分工作今天诊所本来就靠人工处理，OEM 和通用系统都只覆盖了一部分。
    whyDoubt: 市场偏窄、替代方案可信；除非试点能拿出吞吐和文档的实测改善，否则诊所很可能继续接受代表主导支持或人工协调。
    nextDiligence: 下一步最关键的验证，是拿下 3 个付费试点，证明授权周期更短、患者流失更低，并至少有 2 家转成年正式合同。
  firstCustomer:
    title: 一家拥有 5–10 个点位的独立介入疼痛集团中的医疗总监或 COO
    profile: 一家美国疼痛集团，已有神经调控能力，协调员人手紧张，并且明确计划为更早期慢性疼痛患者上线临时 PNS。
    trigger: 当集团因报销把握、OEM 推动或竞争压力而决定增加临时 PNS 时，就会暴露出必须尽快把项目跑起来的需求。
    buyer: 医疗总监或 COO
    initialContract: 先做一个面向单集团、为期 90–120 天的 $40k-$75k 付费试点；等首批病例和报告流程跑起来后，再转为约 $120k-$180k ARR 加按活跃疗程收费。
  mustBeTrue:
  - 首批 10 个认真接触的目标集团里，至少有 3 家愿意为试点付费，而不是要求创业公司依赖 OEM 支持或免费实施。
  - 前 5 个真实部署里，授权周期或初诊到手术转化率至少较基线改善 20%。
  - 平台上的活跃疗程至少有 80% 能产出诊所愿意展示给支付方或转诊方的可用结局文档。
  - 至少有 2 家早期客户从付费试点转成年正式合同，ACV 与模型假设一致。
  - 至少 30% 的早期客户会在首次上线后 12 个月内扩到更多点位或相邻神经调控工作流。
  diligenceQuestions:
  - 今天从初诊、授权、导线置入到最终结局报告之间，究竟消耗了多少团队时间，又漏掉了多少患者？
  - 诊所会不会把它当成独立工作流产品来买，还是坚持要通过 OEM 或 RCM 伙伴打包？
  - 公司应该先打哪些支付方组合和地区，才能避免 路线图 一开始就被报销边角案例带偏？
  - v1 在没有深度 EHR 回写的情况下能不能证明 ROI，还是集成范围会拖慢部署、压缩毛利？
  - 如果这个切口真的跑通，OEM 会多快推出打包的轻量工作流工具反击？
operatingAssumptions:
- assumption: 疼痛集团会接受接近模型 ACV 的年度软件定价，只要产品能减少协调员工作量并加快上线。
  basis: research.yaml
  validationTest: 拿下 3 个付费试点，并至少确认 2 条从试点转年合同、ARR 在 $120k-$180k 区间的签约路径。
  decisionImpact: 如果不成立，定价就得转向更低 ACV 的软件、更重服务收入，或更依赖渠道分发。
- assumption: 第一版产品只靠导出和轻集成，而不是全量 EHR 回写，也能让买方看见 ROI。
  basis: research.yaml
  validationTest: 交付前 2 个试点，确认没有关键工作流被“缺少回写”卡住，并让买方仅凭 KPI 改善也愿意续约。
  decisionImpact: 如果不成立，路线图会迅速变成集成导向，实施毛利下滑，公司在扩大 GTM 前就需要更多资金。
- assumption: OEM 报销团队和诊所员工会容忍一层厂商中立的运营系统，而不是把流程彻底锁死在代表工具里。
  basis: research.yaml
  validationTest: 采访 10 位现任或前任神经调控代表，并拿到 2 个能与 OEM 支持共存的试点场景。
  decisionImpact: 如果不成立，公司就必须更依赖直销，并把“摆脱 OEM 锁定”作为核心购买理由。
- assumption: 更好的候选筛选和节点跟踪，能实质提升疗程完成质量，而不只是提升行政吞吐。
  basis: idea.yaml
  validationTest: 在前 50 个管理中的疗程里，对比平台管理病例与各诊所历史基线的完成率和可用文档率。
  decisionImpact: 如果不成立，产品就该把价值主张收窄到报销与工作流效率，而不是继续讲结局驱动扩张。
- assumption: 只要拿到足够的基准数据和实施信任，滩头市场就能扩进相邻疼痛工作流。
  basis: operator judgment
  validationTest: 在 3 个标杆客户上线后，测试至少 2 家是否会在 12 个月内主动提出或付费购买相邻神经调控工作流模块。
  decisionImpact: 如果不成立，公司就仍是一个更窄的临时 PNS 工作流生意，融资需求也应按更窄模型来算。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 采访 15 位目标疼痛集团的运营负责人、协调员和医疗总监，把当前临时 PNS 流程从初诊一路画到疗程结束摘要。
  hypothesis: 同一类上线决策，会在大多数目标集团里同时制造授权、人手和结局报告的可观痛点。
  successMetric: 15 次访谈里至少有 10 次确认出一张共通工作流图，并愿意分享基线 KPI 或具体流失点。
  owner: CEO
- horizon: 0–90 天
  experiment: 与 3 家共创诊所一起做时间动作研究和漏斗审计。
  hypothesis: 团队耗时和患者流失已经大到足以在长期结局数据出来前就支撑试点定价。
  successMetric: 每家诊所都能暴露出至少一个可量化瓶颈：授权周期、协调员工时，或初诊到手术转化率。
  owner: 临床运营负责人
- horizon: 90–180 天
  experiment: 用轻集成、可导出报告和每周工作流复盘，跑通 2 个付费试点。
  hypothesis: 即使深度互操作还没补齐，只要产品能迅速提升上线速度和疗程文档质量，买方也会先付费。
  successMetric: 签下 2 个单价不低于 $40k 的付费试点，而且两家都能在不让定制开发主导路线图的前提下上线。
  owner: CEO
- horizon: 90–180 天
  experiment: 并行测试两条分发路径：创始人直销，以及厂商侧引荐。
  hypothesis: 当渠道信任与直销配合时，公司能更快拿到合格试点，即便最终拍板仍由诊所完成。
  successMetric: 某一条渠道在 6 个月内至少贡献 3 个合格机会或 1 个付费试点，且不要求排他。
  owner: GTM 负责人
- horizon: 180–360 天
  experiment: 衡量试点在授权时间、初诊到手术转化、完成疗程数和结局文档质量上的变化。
  hypothesis: 首批真实部署的运营证据足够强，可以支撑年合同转化和多点位扩张。
  successMetric: 至少 2 个试点在 2 项以上核心 KPI 上优于基线，并转成正式合同或明确 扩点 计划。
  owner: 产品负责人
- horizon: 180–360 天
  experiment: 把首批支付方材料库和拒赔分析沉淀到真实试点里最常见的支付方场景。
  hypothesis: 一套可复用的报销工作流资产，会缩短后续部署时间并提升胜率。
  successMetric: 第二批实施的上线速度至少比第一个试点快 30%，且多数场景直接复用标准材料模板。
  owner: 创始工程师
operations:
- 把支付方规则库、材料模板和拒赔原因 taxonomy 当作核心产品资产维护，而不是零散客户成功工作。
- 每周跑诊所 scorecard，覆盖授权状态、手术排期、活跃疗程依从性和疗程结束文档质量。
- 在 KPI 还没证明前，把实施严格限定在一条定义清晰的临时 PNS 工作流里；避免第一年去接永久植入或广义 RCM 定制项目。
- 为 OEM 侧引荐和疼痛学会教育建立 partner 操作手册，但不能让任何单一厂商控制运营层。
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责初始产品所需的工作流引擎、集成层和报告基础设施。
- role: 临床运营/产品负责人
  startTiming: Month 0
  rationale: 把疼痛诊所和报销复杂度翻译成可复用的疗程工作流和试点实施方案。
- role: 报销项目经理
  startTiming: Month 3
  rationale: 搭建支付方材料库、拒赔打法和团队培训体系，拿到可量化的授权改善。
- role: 解决方案工程师
  startTiming: Month 6
  rationale: 把诊所特有的技术栈差异沉淀成可复用集成模式，缩短部署时间。
- role: GTM 负责人
  startTiming: Month 9
  rationale: 等首批试点跑出可引用 ROI 后，把创始人主导销售变成更可复制的销售动作。
milestones:
- horizon: 0–12 个月
  items:
  - 与滩头疼痛集团签下 3 个付费试点
  - 让 2 个试点真实上线，并记录上线前后 KPI 变化
  - 至少把 2 个试点集团转成年合同
  - 针对首批常见支付方场景，交付可复用的材料模板和协调员工作清单
- horizon: 12–24 个月
  items:
  - 做到 8-10 个客户集团，并在至少一个账户内证明多点位 扩点
  - 补上拒赔分析、转诊来源报告和首批基准视图
  - 通过 KOL、培训体系或厂商侧伙伴建立至少一条耐久转介渠道
  - 根据客户真实拉力，收窄第一条相邻工作流扩张方向，而不是过早做大平台
- horizon: 24–36 个月
  items:
  - 达到模型里的 18 个客户集团 SOM，或至少拿出等价的 pipeline 牵引
  - 沿用同一买方和实施动作，上线一个相邻神经调控或非阿片干预模块
  - 把跨诊所结局和工作流数据做成客户愿意额外付费的 基准产品
risks:
- risk: 临时 PNS 的报销支持比诊所预期更窄，或持续性更弱。
  likelihood: Medium
  impact: High
  mitigation: 先从当前报销最有把握的支付方组合和服务场景切入，把 ROI 讲成“人力和转化改善”，而不是单纯收入提升。
- risk: OEM 把轻量工作流支持绑得足够紧，导致诊所不愿单独给软件列预算。
  likelihood: Medium
  impact: High
  mitigation: 坚持厂商中立，拿出多厂商 benchmark 价值，并在“诊所自己掌握运营”上取胜，而不是贴着某家厂商站队。
- risk: 患者筛选噪声太大，削弱结局，让平台看起来更像行政工具而不是照护改善层。
  likelihood: Medium
  impact: High
  mitigation: 把严格候选标准、基线评估和转诊来源 benchmark 直接做进第一版工作流，而不是留到后面当分析功能。
- risk: 集成和实施复杂度拖慢试点，侵蚀毛利和可引用性。
  likelihood: Medium
  impact: Medium
  mitigation: v1 先走导出优先，收窄支持的技术栈，等重复工作流模式浮现后再加解决方案能力。
- risk: 如果相邻扩张跑不出来，市场可能窄到撑不起风险投资规模。
  likelihood: Medium
  impact: High
  mitigation: 前 12–18 个月先验证多点位扩张、相邻工作流需求和 benchmark 付费意愿，再决定是否放大 burn。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月跑道将换来 3-5 个付费试点、一套可复制的临时 PNS 工作流产品（含支付方材料与报告资产）、前两种集成模式，以及足以支撑多点位扩张和下一轮融资的 KPI 证明。
