slug: temporary-pns-clinic-os
date: '2026-05-21'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-21] 模型从计划后的次月开始，这样融资资金能在招聘提速前到账。'
- id: A2
  name: 期初现金 / seed 轮融资
  value: '2600.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 基准情形采用 $2.6M 的 seed，落在区间偏低到中段。'
- id: A3
  name: 模型中的客户单位
  value: 活跃付费的疼痛诊所集团
  unit: definition
  source: '[BP businessModel unitOfValue active pain-clinic group; BP investorMemo firstCustomer] customersEop 跟踪的是付费客户集团，不是单个疗程。'
- id: A4
  name: 起始客户数（M1）
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] 公司从零收入起步，完成首批上线设计后才签付费试点。'
- id: A5
  name: Y1 每月新增客户
  value: '[0, 0, 0, 1, 0, 1, 0, 0, 1, 0, 0, 0]'
  unit: count
  source: '[BP milestones 0-12 months] 节奏设置为第 1 年做到 3 个付费试点。'
- id: A6
  name: Y2 每季度净增客户
  value: '[2, 1, 2, 2]'
  unit: count
  source: '[BP milestones 12-24 months] 支撑客户数从第 1 年的 3 个增长到 Y2 Q4 的 10 个，落在计划里的 8-10 个目标范围内。'
- id: A7
  name: Y3 每季度净增客户
  value: '[2, 2, 2, 2]'
  unit: count
  source: '[BP milestones 24-36 months; Research bottomUpSizingDrivers reachable year-3 customers 18 groups] 基准情形到 Y3 Q4 达到模型里的 18 个客户 SOM。'
- id: A8
  name: 每个活跃客户集团的混合年收入
  value: Y1 125.0; Y2 150.0; Y3 160.0
  unit: USDK per customer per year
  source: '[BP investorMemo initialContract $40k-$75k paid pilot converting to roughly $120k-$180k ARR plus usage; Research bottomUpSizingDrivers annual contract value $150k] 随着试点转正式合同并叠加分析模块，混合 ARPU 逐步抬升。'
- id: A9
  name: 收入确认方法
  value: 期内平均活跃客户数 × 阶段 ARPU
  unit: formula
  source: 创业公司财务常用假设：新签疼痛诊所集团往往在月中或季中上线，所以确认收入采用期初与期末活跃客户平均值乘以阶段 ARPU。
- id: A10
  name: 毛利率爬坡
  value: M4-M6 52%; M7-M9 57%; M10-M12 60%; Q1-Q4Y2 64/66/68/69%; Q1-Q4Y3 70/71/72/72%
  unit: gross margin percent
  source: '[BP businessModel targetGrossMarginPct 72; BP strategicChoices sequencingRationale] 毛利率保守爬坡，因为报销运营和实施在模板与集成标准化前，仍需要较多人力辅助。'
- id: A11
  name: 全包薪资带宽
  value: Founder 160; founding engineer 175; clinical ops/product 155; reimbursement manager 145; solutions engineer 150; GTM lead 165; customer success 125; second engineer 165; account executive 155; benchmarking analyst 135
  unit: annual USDK per FTE
  source: '[BP team roles and timing] 叠加美国精益医疗 SaaS 创业公司的常见现金薪酬假设，包含 payroll taxes 和福利。'
- id: A12
  name: 招聘节奏
  value: Founding engineer M1; clinical ops/product lead M1; reimbursement manager M4; solutions engineer M7; GTM lead M10; customer success M16; second engineer M20; account executive M25; benchmarking analyst M30
  unit: timing
  source: '[BP team startTiming + strategicChoices sequencingRationale] 后续招聘按保守延伸处理，只在试点转正式、点位 扩点 开始后才触发。'
- id: A13
  name: 薪资分摊规则
  value: Founder 50% S&M / 50% G&A; clinical ops 35% S&M / 55% R&D / 10% G&A; reimbursement 35% S&M / 60% R&D / 5% G&A; solutions 45% S&M / 55% R&D; GTM lead 90% S&M / 10% G&A; customer success 70% S&M / 20% R&D / 10% G&A; engineers 100% R&D; AE 95% S&M / 5% G&A; benchmarking analyst 20% S&M / 80% R&D
  unit: policy
  source: '[BP operations, product roadmap, and GTM motion] 反映了实施型 上线辅导、创始人主导销售，以及报销工作流产品化的现实。'
- id: A14
  name: 非薪资运营费用爬坡
  value: S&M other 5 monthly in M1-M6, 6 in M7-M9, 10 in M10-M12, 12 in Y2, 14 in Y3; R&D other 8 monthly in M1-M3, 10 in M4-M6, 12 in M7-M12, 13 in Y2, 15 in Y3; G&A other 7 monthly in M1-M6, 8 in M7-M12, 9 in Y2, 10 in Y3
  unit: USDK per month
  source: '[BP operations and risks; Research reportMemo validationPlan] 覆盖云资源、合规、差旅、法务、保险和试点支持。'
- id: A15
  name: 用于单位经济模型的稳态月度流失率
  value: '1.5'
  unit: percent
  source: 创业公司财务常用假设，并参考 [BP gtm pilot-to-production 60%+ and multi-site 扩点 50%+]：年合同留存理应不错，但报销不确定性与 OEM 替代风险仍会带来部分 客户流失。
- id: A16
  name: 每个客户集团的混合 CAC
  value: '95.34'
  unit: USDK
  source: 由模型计算得出：Y2-Y3 销售与市场费用为 $1430.16K，除以 15 个新增客户集团，得到 $95.34K；与创始人主导的高 ACV 医疗企业销售相符。
- id: A17
  name: 融资规模规则
  value: 做到 12-24 个月里程碑，并保留约 6 个月缓冲
  unit: policy
  source: 遵循开发者规则，并参考 [BP fundingAsk runwayMonths 18]：基准情形的融资规模既要跨过最低计划跑道，也要买到下一轮融资所需证明。
- id: A18
  name: 现金流简化假设
  value: 期末现金 = 期初现金 + 累计 EBITDA
  unit: formula
  source: 创业公司财务常用简化：轻资产软件模型在前 3 年基本不受 capex、债务和营运资金扰动影响，因此期末现金≈期初现金+累计 EBITDA。
