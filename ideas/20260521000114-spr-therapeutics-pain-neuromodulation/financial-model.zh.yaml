modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      QualifiedGroups[合格疼痛集团] --> PaidPilots[付费试点]
      PaidPilots --> ProductionGroups[正式客户集团]
      ProductionGroups --> ManagedEpisodes[已管理的临时 PNS 疗程]
      ManagedEpisodes --> Revenue[订阅与疗程收入]
      Revenue --> GrossProfit[扣除实施与支持 COGS 后的毛利润]
      GrossProfit --> Cash[现金跑道]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入引擎，是把 Y1 的 3 个付费试点转成 Y2 Q4 的 10 个客户集团、Y3 Q4 的 18 个客户集团，对应每年 $150K-$160K 的混合客户价值。
- checkName: 必须跑对的事
  finding: 至少要有 2 个早期试点转成年合同，并拿出 1 个多点位 扩点 证明，否则模型里的 CAC 回收期和转介动作都站不住。
- checkName: 模型失效条件
  finding: 如果销售周期滑一个季度，再叠加报销信心下行，悲观情形下 Y3 收入会掉到 $1.71M，并在下一轮融资前现金跌破零。
- checkName: 下一轮证明
  finding: 等公司在 Y2 Q4 做到 8-10 个集团、证明一条耐久渠道，并展示出通往 18 个集团 SOM 的可信路径和 benchmark 增购时，下一轮融资故事最强。
sanityChecks:
  ruleOf40: Y3 growth 134.25% + EBITDA margin -15.32% = 118.93%
  burnMultiple: 0.27x in Y3 ($343.07K net burn on $1283.75K net new revenue).
  revenuePerFte: $224.0K Y3 using Q4Y3 headcount of 10 FTE (inside the low end of a $200K-$400K vertical SaaS benchmark).
  flags:
  - 模型假设诊所仍会为独立工作流软件列预算，而不是默认依赖 OEM 的报销支持；business plan 已明确指出，这一点仍需真实验证。
  - 毛利率直到 Y3 下半年才达到 72% 目标；如果集成或报销运营持续高度定制化，seed 轮规模就必须更大。
  - 收入仍集中在少数客户集团上，所以只要一个多点位 扩点 延迟，一个季度就可能少掉约 $40K-$80K 收入，并压缩现金缓冲。
