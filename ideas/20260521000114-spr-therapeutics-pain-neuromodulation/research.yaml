categoryDynamics:
  growthRate: "25%+ 2026 revenue growth guidance for Nalu as a category proxy, not a pure market CAGR"
  growthRateSourceRefs: [22]
  tailwinds:
    - point: Large incumbents are acquiring into PNS and explicitly citing reimbursement expansion and earlier intervention.
      sourceRefs: [1, 5, 22]
    - point: Clinical evidence is broadening from shoulder pain into low back, postoperative, and post-amputation use cases.
      sourceRefs: [8, 9, 36, 40]
    - point: Fragmented clinic groups and ongoing consolidation create demand for standard operating systems rather than one-off manual playbooks.
      sourceRefs: [28, 29]
  headwinds:
    - point: Prior authorization and documentation burdens remain severe enough to slow launches and consume staff capacity.
      sourceRefs: [13, 14, 15]
    - point: Coverage and escalation logic still anchor to formal trial success, functional improvement, and payer-specific evidence standards.
      sourceRefs: [6, 16, 17]
competitors:
  - name: Medtronic / SPR SPRINT
    stage: incumbent
    wedge: Temporary 60-day PNS for earlier, non-permanent intervention in chronic pain.
    pricing: Public device pricing is not disclosed; clinics lean on reimbursement support and Medicare-qualified device coding rather than transparent list prices.
    strength: Strongest category validation, broad clinical narrative, 50,000 implants, and parent-company distribution scale.
    weaknessVsUs: Device- and manufacturer-centric rather than a neutral clinic workflow and benchmarking layer.
    sourceRefs: [1, 3, 19]
  - name: Boston Scientific / Nalu
    stage: incumbent
    wedge: Battery-free micro-IPG peripheral neurostimulation inside a scaled neuromodulation portfolio.
    pricing: Public pricing not disclosed; positioned as implantable device therapy rather than software.
    strength: Deep commercial reach, active M&A, and a differentiated small-form-factor implant architecture.
    weaknessVsUs: More focused on permanent device therapy than on 60-day temporary episode orchestration for independent clinics.
    sourceRefs: [18, 22, 26]
  - name: Bioventus StimRouter
    stage: incumbent
    wedge: Chronic peripheral nerve pain treatment with established procedure and reimbursement guidance.
    pricing: Procedure-driven reimbursement model with published coding support; public product list pricing is not disclosed.
    strength: Longstanding market presence and practical coding materials for physicians and facilities.
    weaknessVsUs: Permanent-PNS workflow orientation and single-device framing leave a gap for broader temporary-program operations.
    sourceRefs: [18, 25]
  - name: Mainstay ReActiv8
    stage: scale-up
    wedge: Restorative neurostimulation for mechanical chronic low back pain tied to multifidus dysfunction.
    pricing: Public device pricing is not disclosed; reimbursement playbooks target authorization and appeals.
    strength: Narrow, FDA-approved indication with clear clinical story and payer-support tooling.
    weaknessVsUs: Indication-specific and implant-centric, not a general temporary-PNS operations platform.
    sourceRefs: [21, 23]
  - name: Curonix Freedom PNS
    stage: scale-up
    wedge: Targeted chronic-pain stimulation for identified nerves below the neck with a trial-to-implant workflow.
    pricing: Public pricing not disclosed; therapy is sold as device treatment rather than workflow software.
    strength: Broad peripheral pain applicability and straightforward trial messaging.
    weaknessVsUs: Still centered on device adoption and candidacy, not longitudinal outcomes operations across clinics.
    sourceRefs: [18, 27]
regulatoryTechnicalConstraints:
  - point: Qualified temporary separate payment support is specific to CMS outpatient settings and a defined policy window, so commercialization cannot assume universal payer parity.
    sourceRefs: [5, 6]
  - point: Medicare still distinguishes diagnostic trial use and implanted-device coverage under separate nerve-stimulator determinations.
    sourceRefs: [6, 7]
  - point: Permanent neuromodulation escalation requires documented successful trial results, functional improvement, and strong record quality.
    sourceRefs: [16, 17]
  - point: Clinical success is sensitive to patient-selection quality, especially where psychological distress or opioid dependence are present.
    sourceRefs: [35, 38]
validationSignals:
  - point: Medtronic's $650M purchase of SPR is hard evidence that temporary PNS is strategically important to a top neuromodulation incumbent.
    sourceRefs: [1, 2]
  - point: CMS explicitly lists SPRINT under the non-opioid treatments payment framework with HCPCS C9807.
    sourceRefs: [5, 6]
  - point: The buyer base is real and fragmented, with more than 900 active pain management physician group practices in the U.S.
    sourceRefs: [28, 29]
  - point: Published evidence now supports both durable benefit in shoulder pain and cost-savings logic for 60-day-first PNS pathways.
    sourceRefs: [9, 36]
openQuestions:
  - What fraction of the >900 U.S. pain management groups already have the staffing and SCS capability needed to add temporary PNS quickly?
  - How much leakage actually occurs between consult, prior authorization, lead placement, and end-of-treatment documentation in independent pain groups?
  - Will OEMs expose enough workflow and outcomes data for a neutral software layer, or will reps keep the category operationally closed?
  - How durable is payer enthusiasm for temporary PNS once the current CMS payment window ends and commercial plans revisit coverage criteria?
