      score: 4
      rationale: The category already has multiple device incumbents, active M&A, and adjacent neuromodulation vendors that could extend into software support if the wedge proves attractive.
      sourceRefs: [18, 21, 22, 26, 27]
  pestle:
    - factor: political
      impact: positive
      point: CMS policy is explicitly encouraging qualified non-opioid pain alternatives in outpatient settings.
      sourceRefs: [5]
    - factor: economic
      impact: positive
      point: The pain clinic market remains fragmented and actively consolidated, which creates a real need for standardization software at the group level.
      sourceRefs: [28, 29]
    - factor: social
      impact: positive
      point: Chronic pain prevalence remains very large and non-opioid demand is rising, which supports earlier interventional options.
      sourceRefs: [1, 10, 11]
    - factor: technological
      impact: positive
      point: Clinical evidence and FDA-cleared device options have matured enough that software can focus on workflow and outcomes rather than inventing new stimulation hardware.
      sourceRefs: [8, 19, 34]
    - factor: legal
      impact: negative
      point: Coverage rules, medical-necessity documentation, and prior-authorization timelines still create meaningful adoption friction.
      sourceRefs: [6, 13, 15, 16]
  adoptionFrictionMatrix:
    - friction: Heavy prior-authorization and appeal work before the first case
      severity: high
      affectedBuyer: Operations lead / reimbursement specialist
      mitigation: Start with payer-ready packet templates, status tracking, and denial-reason analytics.
      sourceRefs: [13, 14, 15]
    - friction: Noisy patient selection can undermine outcomes
      severity: high
      affectedBuyer: Medical director
      mitigation: Build stricter indication filters, baseline assessments, and outcomes benchmarking by referral source.
      sourceRefs: [35, 38]
    - friction: Clinics already rely on rep-led support from OEMs
      severity: medium
      affectedBuyer: Physician champion
      mitigation: Position as a vendor-neutral layer that improves all device programs rather than replacing rep relationships.
      sourceRefs: [3, 18, 22]
    - friction: Staff training and process standardization across sites
      severity: medium
      affectedBuyer: COO / clinical operations
      mitigation: Ship role-based playbooks, coordinator checklists, and implementation tied to neuromodulation training norms.
      sourceRefs: [30, 31]
market:
  tam:
    value: "$47.3M"
    rationale: >-
      Bottom-up beachhead TAM assumes more than 900 active U.S. pain management
      physician group practices, with 35% fitting the initial target profile of
      independent or lightly scaled interventional groups with neuromodulation
      ambitions (315 groups) and a blended annual ACV of $150k per group for
      workflow software plus modest per-episode usage.
    isEstimate: true
    sourceRefs: [28, 29]
  sam:
    value: "$18.0M"
    rationale: >-
      SAM assumes roughly 40% of the modeled beachhead is launch-ready over the
      next three years because reimbursement tailwinds and category validation
      are strongest in groups already pursuing procedure growth; 120 groups x
      $150k ACV.
    isEstimate: true
    sourceRefs: [1, 5, 28, 29]
  som:
    value: "$2.7M"
    rationale: >-
      A credible year-3 SOM is 18 customer groups at roughly $150k annual ACV,
      which fits a founder-led enterprise sales motion in a narrow, high-touch
      pain-clinic niche.
    isEstimate: true
    sourceRefs: [3, 29]
