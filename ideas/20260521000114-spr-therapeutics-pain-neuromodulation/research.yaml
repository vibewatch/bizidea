reportMemo:
  executiveTakeaways:
    - Temporary PNS is now strategically validated, but clinic execution remains the bottleneck rather than therapy legitimacy.
    - The best wedge is a vendor-neutral operating layer for authorizations, 60-day follow-up, and outcomes proof before permanent implants.
    - Incumbent competition is real but still device-centric; that leaves room for software that helps independent pain groups run multi-vendor programs.
    - The near-term market is not huge, but it is focused, fragmented, and operationally painful enough to support a high-ACV workflow product.
  marketDefinition: >-
    Workflow software for independent U.S. interventional pain groups that
    launch and manage temporary peripheral nerve stimulation episodes, from
    candidate triage and authorization through 60-day follow-up and outcomes
    reporting. The category excludes device manufacturing, generic EHR modules,
    and permanent neuromodulation hardware itself.
  customerAndBuyer: >-
    Initial users are nurse coordinators, prior-authorization staff, and
    operations managers inside independent or PE-backed interventional pain
    groups. The economic buyer is typically the medical director, practice COO,
    or group administrator who owns procedure growth, staffing efficiency, and
    payer-facing documentation risk.
  buyingTriggers:
    - point: Strategic validation from Medtronic's SPR deal and CMS payment support makes temporary PNS feel like a category clinics should operationalize now rather than watch from the sidelines.
      sourceRefs: [1, 5]
    - point: Prior authorization, benefits verification, and appeal work are already consuming meaningful staff time across physician practices, which makes a narrower, pain-program workflow problem easier to budget against.
      sourceRefs: [3, 13, 14, 15]
    - point: Clinics need a disciplined step-up workflow because permanent neuromodulation pathways still require documented trial success, functional improvement, and clean records.
      sourceRefs: [16, 17, 34]
  willingnessToPay:
    summary: >-
      There is believable budget because temporary PNS already triggers manual
      authorization, payer communication, and follow-up work that clinics either
      absorb with staff time or push to manufacturer support. A product that
      shortens approval time, reduces drop-off, and produces payer-ready
      outcomes documentation can sell as labor avoidance plus procedure-growth
      enablement rather than as a speculative digital add-on.
    sourceRefs: [3, 13, 14, 15]
  competitiveLandscape: >-
    The competitive field is crowded with device vendors, not workflow-native
    software. SPR/Medtronic owns the temporary category narrative, Boston
    Scientific/Nalu and Bioventus address broader or permanent PNS use cases,
    and Mainstay/Curonix validate adjacent neuromodulation spend. The default
    substitute inside the clinic is still a messy mix of EHR templates, rep
    coordination, prior-auth specialists, and manual check-ins.
  incumbentThesis:
    - incumbentClass: Device OEMs
      point: OEMs are strong at therapy education and reimbursement support, but they optimize for selling their own device rather than acting as a neutral operating system across referral, authorization, and multi-vendor outcomes benchmarking.
      sourceRefs: [1, 3, 18, 22]
    - incumbentClass: Generic EHR and RCM tools
      point: Generic records and revenue-cycle systems can store data, but they do not solve pain-program-specific triage, episode milestone management, or payer-packet assembly by default.
      sourceRefs: [13, 15, 29]
    - incumbentClass: Permanent neuromodulation incumbents
      point: The implant pathway is well developed, but its documentation and trial logic are built around permanent stimulation rather than a reversible 60-day episode that needs frequent staff touchpoints and proof before escalation.
      sourceRefs: [16, 17, 21, 34]
    - incumbentClass: Large pain MSOs
      point: Consolidators bring scale and purchasing leverage, but fragmentation and PE roll-up activity imply many groups still need standardization tools rather than already having best-in-class workflow infrastructure.
      sourceRefs: [28, 29]
  regulatoryLandscape: >-
    The U.S. is attractive because CMS now supports temporary separate payment
    for qualifying non-opioid pain devices in HOPD and ASC settings, but
    commercialization still has to navigate Medicare coverage rules, MAC and
    payer variability, and documentation-heavy authorization workflows.
  technologyLandscape: >-
    Device technology is mature enough that the defensible software layer is not
    signal generation but orchestration: selecting the right patient, managing a
    time-boxed 60-day episode, capturing outcomes, and handing a clean record
    into the existing neuromodulation stack.
  distributionChannels:
    - point: Direct sales into independent and PE-backed pain groups that already run interventional procedure lines and want to standardize growth initiatives.
      sourceRefs: [28, 29]
    - point: Manufacturer-adjacent channels through field reimbursement teams, neuromodulation KOLs, and program-launch education efforts.
      sourceRefs: [1, 22, 30]
    - point: Pain-society and neuromodulation training ecosystems where clinics look for implementation standards and staff competency support.
      sourceRefs: [30, 31, 33]
  partnershipEcosystem:
    - point: OEM reimbursement teams are useful upstream partners because they already touch benefits checks and appeals, but they do not own neutral cross-clinic workflow software.
      sourceRefs: [3, 23, 25]
    - point: ASPN, INS, and broader neuromodulation education networks matter because adoption depends on clinical champions and standard operating procedures.
      sourceRefs: [8, 30, 31]
    - point: Payer and ePA interoperability partners become more valuable as CMS pushes API-based prior-authorization processes and faster decision timelines.
      sourceRefs: [15, 33]
  dataMoats:
    - point: Cross-clinic data on which indications, nerves, and patient profiles complete a 60-day course successfully can compound into better triage and staffing rules.
      sourceRefs: [9, 35, 36]
    - point: A reusable library of payer-ready packets, appeal patterns, and denial-resolution workflows can improve conversion over time in a way generic software does not.
      sourceRefs: [3, 13, 15]
    - point: Benchmarking productivity and outcomes across fragmented pain groups can become strategically valuable as the market consolidates.
      sourceRefs: [28, 29]
  geographicConsiderations:
    - point: The U.S. is the cleanest beachhead because Medicare policy, NOPAIN-related payment support, and outpatient ASC economics make temporary PNS operationally legible.
      sourceRefs: [5, 6, 15]
    - point: Go-to-market should start in payer mixes and regions where clinics already have reimbursement confidence rather than trying to normalize every commercial plan at once.
      sourceRefs: [3, 15]
  sensitivityCases:
    - case: Temporary separate payment proves short-lived or narrower than clinics expect
      impact: If reimbursement confidence weakens after the 2025-2027 policy window or remains site-of-service constrained, sales cycles lengthen and ROI arguments must rely more on staffing efficiency than on revenue lift.
      sourceRefs: [5, 6]
    - case: OEMs bundle lighter workflow tooling with device launches
      impact: If major manufacturers expand from reimbursement support into basic episode software, a startup must differentiate on vendor neutrality, benchmarking depth, and cross-payer workflow intelligence.
      sourceRefs: [1, 22, 23]
    - case: Patient selection remains noisy
      impact: If clinics enroll poor-fit patients, outcomes variance will weaken the pitch and force the product to prove that it improves selection quality, not just administrative throughput.
      sourceRefs: [35, 38, 39]
  validationPlan:
    - priority: high
      question: What percentage of temporary-PNS candidates currently leak between consult, authorization approval, lead placement, and end-of-treatment outcomes capture?
      evidenceToGather: Funnel data from 3-5 target pain groups, segmented by payer and indication.
    - priority: high
      question: How much staff time is actually spent on benefits checks, authorization resubmissions, and 60-day check-ins for each case?
      evidenceToGather: Time-and-motion logs from nurse coordinators and reimbursement specialists.
    - priority: medium
      question: Will OEM field teams cooperate with a vendor-neutral platform or try to keep clinics inside rep-led workflows?
      evidenceToGather: Interviews with former neuromodulation reps and pilot integration discussions with two manufacturers.
    - priority: medium
      question: Can the startup show materially better outcomes reporting without deep EHR integration in version one?
      evidenceToGather: Pilot with lightweight intake plus exportable physician and payer summaries.
