modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      QualifiedGroups[Qualified pain groups] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionGroups[Production customer groups]
      ProductionGroups --> ManagedEpisodes[Managed temporary PNS episodes]
      ManagedEpisodes --> Revenue[Subscription and episode revenue]
      Revenue --> GrossProfit[Gross profit after implementation and support COGS]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from turning 3 Y1 paid pilots into 10 customer groups by Q4Y2 and 18 by Q4Y3 at a blended $150K-$160K annual customer value.
- checkName: Must go right
  finding: At least 2 early pilots need to convert into annual contracts and create one multi-site rollout proof point, or the modeled CAC payback and referral motion will not hold.
- checkName: Model breaks if
  finding: A one-quarter sales-cycle slip plus lower reimbursement confidence pushes the downside case toward $1.71M of Y3 revenue and sends cash below zero before the next round.
- checkName: Next-round proof
  finding: The next financing case is strongest once the company reaches 8-10 groups by Q4Y2, proves one durable channel, and shows a credible path to the 18-group SOM with benchmark upsell.
sanityChecks:
  ruleOf40: Y3 growth 134.25% + EBITDA margin -15.32% = 118.93%
  burnMultiple: 0.27x in Y3 ($343.07K net burn on $1283.75K net new revenue).
  revenuePerFte: $224.0K Y3 using Q4Y3 headcount of 10 FTE (inside the low end of a $200K-$400K vertical SaaS benchmark).
  flags:
  - The model assumes clinics will still budget standalone workflow software instead of defaulting to OEM reimbursement support, which the BP explicitly says still needs live proof.
  - Gross margin only reaches the 72% target in H2Y3; if integrations or reimbursement ops stay bespoke, the seed round would need to be larger.
  - Revenue remains concentrated in a small number of customer groups, so one delayed multi-site rollout can move a quarter by roughly $40K-$80K and pressure the cash buffer.
