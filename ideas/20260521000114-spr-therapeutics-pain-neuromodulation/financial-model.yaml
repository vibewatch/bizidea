scenarios:
  downside:
    description: Pilot conversions slip, OEM-adjacent referrals stay weak, and reimbursement work remains more manual than planned.
    y3RevenueK: 1710.0
    y3EbitdaK: -705.0
    cashLowPointK: -215.0
    keyAssumptionChanges:
    - Y3 customer groups end at 14 instead of 18 because one quarter of sales-cycle slippage slows new wins.
    - Blended annual customer ARPU holds at $145K instead of stepping to $160K as fewer accounts buy analytics and multi-site rollout.
    - Gross margin exits Y3 at 68% instead of 72% because reimbursement ops and implementation stay people-heavy.
  base:
    description: Three paid pilots in Y1 convert into a repeatable temporary-PNS workflow motion that reaches 10 groups by Q4Y2 and 18 by Q4Y3.
    y3RevenueK: 2240.0
    y3EbitdaK: -343.07
    cashLowPointK: 481.92
    keyAssumptionChanges:
    - Y2 exits at 10 customer groups and Y3 exits at 18, matching the business-plan milestone and research SOM.
    - Blended annual ARPU rises from $125K in pilot-heavy Y1 to $150K in Y2 and $160K in Y3 as production contracts and analytics attach.
    - Gross margin reaches the 72% target only by H2Y3 while headcount stays capped at 10 FTE.
  upside:
    description: Two early reference accounts expand faster, referrals start working by mid-Y2, and benchmarking upsell lands without accelerating hiring.
    y3RevenueK: 2625.0
    y3EbitdaK: 120.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - Y3 customer groups end at 20 instead of 18 because one extra multi-site rollout closes in each half of Y3.
    - Blended annual customer ARPU reaches $170K as benchmarking and referral-source analytics attach earlier.
    - Gross margin reaches 74% by Q4Y3 because packet libraries and implementation patterns standardize faster.
