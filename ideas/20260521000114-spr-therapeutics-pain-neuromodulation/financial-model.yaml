assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-21] model starts the month after the plan so round cash is available before hiring ramps.'
- id: A2
  name: Opening cash / seed round
  value: '2600.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] base case uses a $2.6M seed at the low-middle of the stated range.'
- id: A3
  name: Customer unit in the model
  value: active paying pain-clinic group
  unit: definition
  source: '[BP businessModel unitOfValue active pain-clinic group; BP investorMemo firstCustomer] customersEop tracks paying customer groups rather than individual episodes.'
- id: A4
  name: Starting customers (M1)
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] company starts pre-revenue and signs paid pilots after the first launch-design work.'
- id: A5
  name: Y1 new customers by month
  value: '[0, 0, 0, 1, 0, 1, 0, 0, 1, 0, 0, 0]'
  unit: count
  source: '[BP milestones 0-12 months] paced to reach 3 paid pilots in year 1.'
- id: A6
  name: Y2 net new customers by quarter
  value: '[2, 1, 2, 2]'
  unit: count
  source: '[BP milestones 12-24 months] supports growth from 3 year-1 customers to 10 customer groups by Q4Y2, inside the stated 8-10 target.'
- id: A7
  name: Y3 net new customers by quarter
  value: '[2, 2, 2, 2]'
  unit: count
  source: '[BP milestones 24-36 months; Research bottomUpSizingDrivers reachable year-3 customers 18 groups] base case reaches the modeled 18-customer SOM by Q4Y3.'
- id: A8
  name: Blended annual revenue per active customer group
  value: Y1 125.0; Y2 150.0; Y3 160.0
  unit: USDK per customer per year
  source: '[BP investorMemo initialContract $40k-$75k paid pilot converting to roughly $120k-$180k ARR plus usage; Research bottomUpSizingDrivers annual contract value $150k] blend steps up as pilots convert and analytics attach.'
- id: A9
  name: Revenue recognition method
  value: average active customers in period multiplied by stage ARPU
  unit: formula
  source: 'Startup-finance heuristic: new clinic groups usually go live partway through a month or quarter, so recognized revenue uses ((BoP customers + EoP customers) / 2) x annualized ARPU.'
- id: A10
  name: Gross margin ramp
  value: M4-M6 52%; M7-M9 57%; M10-M12 60%; Q1-Q4Y2 64/66/68/69%; Q1-Q4Y3 70/71/72/72%
  unit: gross margin percent
  source: '[BP businessModel targetGrossMarginPct 72; BP strategicChoices sequencingRationale] margin ramps conservatively because reimbursement ops and implementation stay human-assisted until templates and integrations standardize.'
- id: A11
  name: Loaded salary bands
  value: Founder 160; founding engineer 175; clinical ops/product 155; reimbursement manager 145; solutions engineer 150; GTM lead 165; customer success 125; second engineer 165; account executive 155; benchmarking analyst 135
  unit: annual USDK per FTE
  source: '[BP team roles and timing] plus startup-finance heuristic for lean U.S. healthcare SaaS cash compensation including payroll taxes and benefits.'
- id: A12
  name: Hiring schedule
  value: Founding engineer M1; clinical ops/product lead M1; reimbursement manager M4; solutions engineer M7; GTM lead M10; customer success M16; second engineer M20; account executive M25; benchmarking analyst M30
  unit: timing
  source: '[BP team startTiming + strategicChoices sequencingRationale] later hires are conservative extensions needed only after pilots convert and site rollouts begin.'
- id: A13
  name: Payroll allocation policy
  value: Founder 50% S&M / 50% G&A; clinical ops 35% S&M / 55% R&D / 10% G&A; reimbursement 35% S&M / 60% R&D / 5% G&A; solutions 45% S&M / 55% R&D; GTM lead 90% S&M / 10% G&A; customer success 70% S&M / 20% R&D / 10% G&A; engineers 100% R&D; AE 95% S&M / 5% G&A; benchmarking analyst 20% S&M / 80% R&D
  unit: policy
  source: '[BP operations, product roadmap, and GTM motion] reflects implementation-heavy onboarding, founder-led selling, and productization of reimbursement workflows.'
- id: A14
  name: Non-payroll operating expense ramp
  value: S&M other 5 monthly in M1-M6, 6 in M7-M9, 10 in M10-M12, 12 in Y2, 14 in Y3; R&D other 8 monthly in M1-M3, 10 in M4-M6, 12 in M7-M12, 13 in Y2, 15 in Y3; G&A other 7 monthly in M1-M6, 8 in M7-M12, 9 in Y2, 10 in Y3
  unit: USDK per month
  source: '[BP operations and risks; Research reportMemo validationPlan] covers cloud, compliance, travel, legal, insurance, and pilot support.'
- id: A15
  name: Steady-state monthly churn for unit economics
  value: '1.5'
  unit: percent
  source: Startup-finance heuristic anchored to [BP gtm pilot-to-production 60%+ and multi-site rollout 50%+] because annual contracts should retain well, but reimbursement and OEM-substitute risk still create some logo churn.
- id: A16
  name: Blended CAC per customer group
  value: '95.34'
  unit: USDK
  source: Calculated from modeled Y2-Y3 sales and marketing spend of $1430.16K divided by 15 new customer groups; consistent with founder-led, high-ACV healthcare enterprise sales.
- id: A17
  name: Funding sizing rule
  value: reach the 12-24 month milestone and keep about 6 months of buffer
  unit: policy
  source: Developer instruction plus [BP fundingAsk runwayMonths 18] base case sizes the round to get beyond the minimum plan runway and into next-round proof.
- id: A18
  name: Cash flow simplification
  value: ending cash equals opening cash plus cumulative EBITDA
  unit: formula
  source: 'Startup-finance heuristic: asset-light software model assumes minimal capex, debt, and working-capital distortion during the first 3 years.'
