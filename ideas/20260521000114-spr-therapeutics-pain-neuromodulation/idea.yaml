problem: >-
  Independent interventional pain clinics now have evidence, reimbursement momentum, and strategic validation for temporary
  peripheral nerve stimulation, but most still run the therapy as an improvised side workflow. Candidate identification,
  conservative-therapy documentation, benefits verification, lead scheduling, 60-day follow-up, and outcomes capture are
  spread across EHR templates, device-rep support, and nurse phone calls. That fragmentation slows launches, drops eligible
  patients before treatment, and makes it hard for clinics to prove ROI before escalating someone to a permanent implant.
targetUser:
  primary: Operations leads and nurse coordinators at independent U.S. interventional pain clinics launching temporary peripheral nerve stimulation programs
  secondary: Interventional pain physicians who want to offer a non-opioid step before permanent implants
  buyer: Medical director or COO of an independent interventional pain group
startupThesis:
  nonObviousInsight: >-
    The bottleneck in temporary PNS adoption is no longer whether the therapy works; Medtronic's acquisition, 50,000 implants,
    and reimbursement momentum say it does. The missing layer is outpatient program infrastructure that helps clinics select the
    right patient, get the case approved, manage the 60-day episode, and leave behind auditable outcomes data that justify
    earlier intervention.
  beachhead: >-
    Independent U.S. interventional pain groups with 3-15 physicians, existing spinal cord stimulation capability, and a goal
    of adding temporary PNS for chronic pain patients who are failing conservative treatment but are not yet implant candidates
  wedge: >-
    A temporary-PNS episode management platform that handles candidate triage, prior-authorization packets, procedure
    scheduling, 60-day adherence check-ins, and payer- and referrer-ready outcomes documentation in one workflow
  whyNowCatalyst: >-
    Medtronic's purchase of SPR, paired with explicit signals around reimbursement expansion and earlier-intervention demand,
    shows clinics now have both strategic cover and market pressure to operationalize temporary PNS quickly.
  ventureScalePath: >-
    Starting with temporary PNS program operations creates a data-rich control point for non-opioid pain care that can expand
    into referral management, remote monitoring, comparative outcomes benchmarking, payer contracting, and adjacent MSK or
    neuromodulation episode workflows.
solution: >-
  The product gives a pain clinic a dedicated operating layer for temporary PNS instead of forcing the therapy through generic
  procedure scheduling and note templates. It identifies likely candidates from referral and visit data, assembles the
  documentation package needed to show failed conservative care, and tracks benefits and authorization status before a lead is
  placed. Once therapy begins, it runs the 60-day episode with patient check-ins, symptom tracking, escalation rules, and
  milestone reminders for staff. At the end of the episode, it produces physician-friendly summaries plus payer- and
  referrer-ready outcomes reports that help the clinic decide who should graduate to additional interventions and which
  referral sources are sending the best-fit patients.
goToMarketSeed:
  firstCustomer: >-
    A 5-10 site independent interventional pain group already offering spinal cord stimulation that wants to launch temporary
    PNS without hiring a full new program team
  buyingTrigger: >-
    A decision to add temporary PNS after new reimbursement confidence, device-manufacturer outreach, or pressure to offer a
    non-opioid option before permanent implants
  currentAlternative: EHR templates, device-rep coordination, manual benefits verification, and ad hoc nurse phone follow-up
  switchingReason: >-
    The platform shortens time to first case, reduces dropped patients during the 60-day episode, and creates outcomes evidence
    that generic EHR workflows and manufacturer reps do not own
  pricingHypothesis: Subscription plus per-active-episode pricing, indexed to the number of temporary PNS cases managed each month
