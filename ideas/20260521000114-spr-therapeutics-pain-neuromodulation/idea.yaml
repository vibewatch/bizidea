topRisks:
  - name: Reimbursement fragmentation
    description: Coverage, coding confidence, and documentation standards for temporary PNS can vary by payer and geography, which can slow clinic adoption.
    mitigation: Start with clinics and payer mixes where reimbursement is already established, then codify winning authorization packets and coverage playbooks into the product.
  - name: Incumbent channel squeeze
    description: Medtronic, Boston Scientific, or their field teams could bundle lightweight workflow support to protect the device relationship.
    mitigation: Stay vendor-neutral, prove better conversion and outcomes across multiple device options, and make the product the independent clinic's control layer rather than a single-manufacturer add-on.
  - name: Weak patient selection
    description: If clinics enroll poor-fit patients, outcomes will look noisy and the software may be blamed for a therapy-design problem.
    mitigation: Build strict candidate-triage workflows, benchmark outcomes by indication and referral source, and focus initial customers that already have disciplined interventional pain programs.
