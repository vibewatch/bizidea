differentiator: >-
  This is not another neuromodulation device company and not a generic remote-monitoring app. The defensible wedge is owning
  the operational system of record for temporary PNS episodes across authorization, care coordination, patient follow-up, and
  post-therapy outcomes. If the company becomes the easiest way for independent pain clinics to launch and benchmark temporary
  PNS, it can build the multi-clinic outcomes dataset and workflow lock-in that device manufacturers and generic EHRs lack.
