  coverageGap: 本次共收集 44 个已验证抓取、去重后的页面。这个细分市场横跨临时 PNS 的临床证据、支付方政策和器械厂商材料；更多线索大多被 Cloudflare、付费墙、低质量重复转载或重复厂商页面挡住。若强行凑到 100 个来源，只会加入价值更低、重合更高的材料。
