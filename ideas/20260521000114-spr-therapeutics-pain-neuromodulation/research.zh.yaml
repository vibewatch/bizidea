reportMemo:
  executiveTakeaways:
  - 临时 PNS 已经获得战略验证，但真正卡住诊所的不是疗法合法性，而是执行。
  - 最好的切口是一层厂商中立的运营系统，专门解决授权、60 天随访和永久植入前的结局证明。
  - 现有竞争确实存在，但仍以器械为中心；这给了软件公司空间，去帮独立疼痛集团跑多厂商项目。
  - 短期市场不算大，但足够聚焦、足够碎片，也足够痛，能撑起一个高 ACV 的工作流产品。
  marketDefinition: 面向美国独立介入疼痛集团的工作流软件，覆盖临时外周神经刺激疗程从候选分诊、授权，到 60 天随访和结局报告的全流程。这个品类不包括器械制造、通用 EHR 模块，也不包括永久性神经调控硬件本身。
  customerAndBuyer: 早期用户是独立或 PE 支持的介入疼痛集团里的护士协调员、预授权人员和运营经理。经济买方通常是掌握手术增长、人员效率和支付方文档风险的医疗总监、诊所 COO 或集团管理员。
  buyingTriggers:
  - point: Medtronic 收购 SPR，再加上 CMS 的支付支持，让临时 PNS 不再像一个该先观望的品类，而是诊所现在就该正式跑起来的业务。
    sourceRefs:
    - 1
    - 5
  - point: 预授权、保险福利核验和申诉，本来就已经在大量医生集团里吞掉可观的人力，因此一个更窄、更疼的疼痛项目工作流问题，更容易被列进预算。
    sourceRefs:
    - 3
    - 13
    - 14
    - 15
  - point: 诊所需要一条更有纪律的阶梯式工作流，因为永久神经调控路径依然要求有据可查的试验成功、功能改善和干净记录。
    sourceRefs:
    - 16
    - 17
    - 34
  willingnessToPay:
    summary: 这里确实有预算空间，因为临时 PNS 本身就会触发大量人工授权、支付方沟通和随访工作。诊所要么自己吞掉这些人力，要么外包给器械厂商支持。一个能缩短审批时间、减少流失、并拿出支付方可用结局材料的产品，卖点就不是“数字化附加功能”，而是直接省人、省时间、还能拉动手术增长。
    sourceRefs:
    - 3
    - 13
    - 14
    - 15
  competitiveLandscape: 竞争格局里挤满的是器械厂商，而不是原生工作流软件。SPR/Medtronic 拿下了临时品类的话语权，Boston Scientific/Nalu 和 Bioventus 覆盖更广或更偏永久 PNS，Mainstay/Curonix 则验证了相邻神经调控支出的存在。诊所里的默认替代方案，仍是一团混乱：EHR 模板、代表协调、预授权专员和人工回访拼在一起。
  incumbentThesis:
  - incumbentClass: 器械 OEM
    point: OEM 擅长做疗法教育和报销支持，但它们优化的是自家器械销量，而不是一套横跨转诊、授权和多厂商结局基准的中立操作系统。
    sourceRefs:
    - 1
    - 3
    - 18
    - 22
  - incumbentClass: 通用 EHR 和 RCM 工具
    point: 通用病历和收入周期系统能存数据，却不会默认替你解决疼痛项目特有的候选分诊、疗程节点管理和支付方材料组装。
    sourceRefs:
    - 13
    - 15
    - 29
  - incumbentClass: 永久神经调控现有厂商
    point: 永久植入路径已经很成熟，但它围绕的是永久刺激的文档与试验逻辑，不适合一段可逆的 60 天疗程——这类疗程需要更密集的团队触点和升级前证明。
    sourceRefs:
    - 16
    - 17
    - 21
    - 34
  - incumbentClass: 大型疼痛 MSO
    point: 整合型平台有规模和采购优势，但市场碎片化和 PE roll-up 活跃，反而说明许多集团更需要标准化工具，而不是已经拥有顶级工作流基础设施。
    sourceRefs:
    - 28
    - 29
  regulatoryLandscape: 美国市场之所以值得先做，是因为 CMS 现在已经在 HOPD 和 ASC 场景下支持符合条件的非阿片疼痛设备单独支付；但商业化仍要面对 Medicare 覆盖规则、MAC 与商业支付方差异，以及以文档为中心的重授权流程。
  technologyLandscape: 器械技术已经成熟到，真正有防守力的软件层不在于“产生刺激信号”，而在于编排整个过程：挑对患者、管好一个有明确期限的 60 天疗程、抓住结局，并把干净记录顺滑送进既有神经调控体系。
  distributionChannels:
  - point: 直接卖给已经在跑介入手术线、并想把增长项目标准化的独立或 PE 支持疼痛集团。
    sourceRefs:
    - 28
    - 29
  - point: 借厂商报销团队、神经调控 KOL 和项目上线教育渠道做厂商侧引荐。
    sourceRefs:
    - 1
    - 22
    - 30
  - point: 切入疼痛学会和神经调控培训体系，因为诊所在这里寻找实施标准和团队能力建设。
    sourceRefs:
    - 30
    - 31
    - 33
  partnershipEcosystem:
  - point: OEM 报销团队是有价值的上游伙伴，因为它们本来就会碰到福利核验和申诉，但并不掌握中立的跨诊所工作流软件。
    sourceRefs:
    - 3
    - 23
    - 25
  - point: ASPN、INS 以及更广的神经调控教育网络很关键，因为采用速度取决于临床 champion 和标准作业流程。
    sourceRefs:
    - 8
    - 30
    - 31
  - point: 随着 CMS 推动基于 API 的预授权流程和更快的决策时限，支付方与 ePA 互操作伙伴的价值会继续上升。
    sourceRefs:
    - 15
    - 33
  dataMoats:
  - point: 跨诊所沉淀哪些适应证、哪些神经位点、哪些患者画像能顺利完成 60 天疗程的数据，久而久之会变成更好的分诊与排班规则。
    sourceRefs:
    - 9
    - 35
    - 36
  - point: 一套可复用的支付方材料包、申诉模式和拒赔处理工作流，会随着时间提高转化，而通用软件做不到这一点。
    sourceRefs:
    - 3
    - 13
    - 15
  - point: 在碎片化疼痛集团之间做生产率和结局基准，随着市场整合推进，会越来越有战略价值。
    sourceRefs:
    - 28
    - 29
  geographicConsiderations:
  - point: 美国是最干净的滩头市场，因为 Medicare 政策、NOPAIN 相关支付支持和门诊 ASC 经济性，让临时 PNS 的运营逻辑更清楚。
    sourceRefs:
    - 5
    - 6
    - 15
  - point: GTM 应从诊所已经对报销有信心的支付方组合和地区起步，而不是一开始就试图把所有商业保险方案都标准化。
    sourceRefs:
    - 3
    - 15
  sensitivityCases:
  - case: 临时单独支付支持比诊所预期更短暂或范围更窄
    impact: 如果报销信心在 2025–2027 政策窗口后走弱，或始终受制于服务场景，销售周期就会拉长，ROI 论证也必须更多依赖人员效率，而不是收入提升。
    sourceRefs:
    - 5
    - 6
  - case: OEM 在器械上线时打包更轻量的工作流工具
    impact: 如果大厂从报销支持进一步扩到基础疗程软件，创业公司就必须靠厂商中立、基准深度和跨支付方流程 intelligence 拉开差距。
    sourceRefs:
    - 1
    - 22
    - 23
  - case: 患者筛选持续噪声很大
    impact: 如果诊所把不匹配的患者也收进来，结局波动就会削弱销售说辞，产品必须证明自己不只是提升行政吞吐，而是真的提高了筛选质量。
    sourceRefs:
    - 35
    - 38
    - 39
  validationPlan:
  - priority: high
    question: 现在临时 PNS 候选患者在初诊、授权获批、导线置入和疗程结束结局采集之间，究竟会漏掉多少？
    evidenceToGather: 拿 3–5 家目标疼痛集团的漏斗数据，按支付方和适应证切分。
  - priority: high
    question: 每个病例在保险核验、授权重提和 60 天回访上，到底要耗掉多少团队时间？
    evidenceToGather: 从护士协调员和报销专员那里拿时间动作日志。
  - priority: medium
    question: OEM 一线团队会配合一个厂商中立的平台，还是更想把诊所留在代表主导的流程里？
    evidenceToGather: 采访前神经调控代表，并与两家厂商做试点集成讨论。
  - priority: medium
    question: 在第一版没有深度 EHR 集成的情况下，创业公司能不能明显提升结局报告质量？
    evidenceToGather: 用轻量 intake 加可导出的医生/支付方摘要做试点。
