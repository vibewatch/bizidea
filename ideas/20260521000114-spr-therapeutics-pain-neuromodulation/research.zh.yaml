  adoptionFrictionMatrix:
  - friction: 首例上线前就得承担沉重的预授权与申诉工作
    severity: high
    affectedBuyer: 运营负责人 / 报销专员
    mitigation: 先上支付方材料模板、状态跟踪和拒赔原因分析。
    sourceRefs:
    - 13
    - 14
    - 15
  - friction: 患者筛选噪声大，会直接拖累结局
    severity: high
    affectedBuyer: 医疗总监
    mitigation: 把更严格的适应证筛选、基线评估和按转诊来源做的结局基准做进系统。
