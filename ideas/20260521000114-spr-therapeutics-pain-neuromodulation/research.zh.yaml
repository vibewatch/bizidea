competitors:
- name: Medtronic / SPR SPRINT
  stage: incumbent
  wedge: 用于更早、非永久介入慢性疼痛的 60 天临时 PNS。
  pricing: 公开层面没有披露器械定价；诊所更多依赖报销支持和 Medicare 合格设备编码，而不是透明目录价。
  strength: 品类验证最强，临床叙事完整，已有 50,000 例植入，背后还有母公司的渠道规模。
  weaknessVsUs: 它以器械和厂商为中心，而不是一个中立的诊所工作流与基准层。
  sourceRefs:
  - 1
  - 3
  - 19
- name: Boston Scientific / Nalu
  stage: incumbent
  wedge: 在成熟神经调控产品组合中的无电池 micro-IPG 外周神经刺激。
  pricing: 未披露公开定价；定位是植入式器械疗法，不是软件。
  strength: 商业化触达深、并购活跃，小型植入架构也有差异化。
  weaknessVsUs: 重点更偏永久器械治疗，而不是帮独立诊所编排 60 天临时疗程。
  sourceRefs:
  - 18
  - 22
  - 26
- name: Bioventus StimRouter
  stage: incumbent
  wedge: 面向慢性外周神经疼痛治疗，已有较成熟的流程和报销指引。
  pricing: 以手术报销驱动，公开了编码支持，但没有披露产品目录价。
  strength: 市场在位时间长，也给医生和机构提供了实用编码材料。
  weaknessVsUs: 它更偏永久 PNS 工作流和单一器械叙事，给更广的临时项目运营留出了空档。
  sourceRefs:
  - 18
  - 25
- name: Mainstay ReActiv8
  stage: scale-up
  wedge: 针对与 multifidus 功能障碍相关的机械性慢性下背痛的恢复性神经刺激。
  pricing: 未披露公开器械价格；报销打法主要围绕授权和申诉。
  strength: 适应证窄但清晰，FDA 已批准，临床故事和支付方支持工具都完整。
  weaknessVsUs: 它按单一适应证和植入器械来卖，不是通用的临时 PNS 运营平台。
  sourceRefs:
  - 21
  - 23
- name: Curonix Freedom PNS
  stage: scale-up
  wedge: 针对颈部以下已识别神经的慢性疼痛刺激，采用试用到植入的流程。
  pricing: 没有公开定价；疗法按器械治疗来卖，不是工作流软件。
  strength: 适用的外周疼痛场景广，试用叙事也直接。
  weaknessVsUs: 核心仍是器械采用和候选资格，而不是跨诊所的长期结局运营。
  sourceRefs:
  - 18
  - 27
regulatoryTechnicalConstraints:
- point: 符合条件的临时单独支付支持只适用于 CMS 门诊场景和特定政策窗口，商业化不能假设所有支付方都等价跟进。
  sourceRefs:
  - 5
  - 6
- point: Medicare 仍把诊断性试用和植入式器械覆盖放在不同的神经刺激判定框架下。
  sourceRefs:
  - 6
  - 7
- point: 往永久神经调控升级时，仍需要有记录可查的试验成功、功能改善和高质量病历。
  sourceRefs:
  - 16
  - 17
- point: 临床成效对患者筛选质量高度敏感，尤其是在存在心理压力或阿片依赖时。
  sourceRefs:
  - 35
  - 38
validationSignals:
- point: Medtronic 以 $650M 收购 SPR，是临时 PNS 对头部神经调控现有厂商具备战略重要性的硬证据。
  sourceRefs:
  - 1
  - 2
- point: CMS 明确把 SPRINT 列入非阿片疼痛治疗支付框架，HCPCS 代码为 C9807。
  sourceRefs:
  - 5
  - 6
- point: 买方基础真实且碎片化——美国活跃疼痛管理医生集团超过 900 家。
  sourceRefs:
  - 28
  - 29
- point: 公开证据如今既支持肩痛场景下的持久获益，也支撑“先做 60 天疗程”的成本节约逻辑。
  sourceRefs:
  - 9
  - 36
openQuestions:
- 在超过 900 家美国疼痛管理集团里，究竟有多少已经具备足够人员和 SCS 能力，可以快速加上临时 PNS？
- 独立疼痛集团在初诊、预授权、导线置入和疗程结束文档之间，真实流失到底有多大？
- OEM 会不会开放足够的工作流和结局数据给一个中立软件层，还是会继续把品类运营牢牢锁在代表体系里？
- 一旦当前 CMS 支付窗口结束、商业保险重新审视覆盖标准，支付方对临时 PNS 的热情还能维持多久？
