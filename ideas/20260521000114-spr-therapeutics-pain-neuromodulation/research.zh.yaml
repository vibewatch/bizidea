market:
  tam:
    value: $47.3M
    rationale: 自下而上的滩头 TAM 假设，美国活跃疼痛管理医生集团超过 900 家，其中 35% 符合初始目标画像——独立或轻度规模化、且有神经调控扩张诉求的介入集团（约 315 家）；每家年均 ACV 约 $150k，包含工作流软件和适度按疗程收费。
    isEstimate: true
    sourceRefs:
    - 28
    - 29
  sam:
    value: $18.0M
    rationale: SAM 假设，未来三年里滩头市场约 40% 已具备上线条件，因为报销顺风和品类验证对那些已经在追求手术增长的集团最强；即 120 家 × $150k ACV。
    isEstimate: true
    sourceRefs:
    - 1
    - 5
    - 28
    - 29
  som:
    value: $2.7M
    rationale: 可信的第 3 年 SOM 是 18 个客户集团、每年约 $150k ACV，这与一个创始人主导的高触达企业销售模型相匹配，也符合这个窄而专的疼痛诊所市场。
    isEstimate: true
    sourceRefs:
    - 3
    - 29
