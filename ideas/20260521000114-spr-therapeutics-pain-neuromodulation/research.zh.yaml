  - factor: economic
    impact: positive
    point: 疼痛诊所市场依然高度碎片化，同时持续整合，所以集团层面的标准化软件需求真实存在。
    sourceRefs:
    - 28
    - 29
  - factor: social
    impact: positive
    point: 慢性疼痛患病规模依然很大，而对非阿片方案的需求持续上升，支撑更早期的介入选择。
    sourceRefs:
    - 1
