slug: drone-fleet-migration-os
date: '2026-05-04'
executiveSummary: >-
  DJI restrictions in both China and the U.S. are turning fleet choice into a
  procurement and continuity issue for U.S. utility drone programs already
  standardized on DJI. The first customer is the UAS program manager at a
  mid-size electric utility that must refresh or justify a DJI fleet after a
  board, cyber, insurer, or procurement review. The product wedge is a
  software-plus-integration layer that ingests DJI logs, route templates,
  maintenance records, and pilot qualifications, then outputs approved-fleet
  equivalents plus a provenance packet for sign-off. This is a better first
  wedge than a general drone-ops suite because utilities already have recurring
  inspection routes, multi-stakeholder approvals, and enough pilots and records
  that manual migration becomes expensive. The research supports willingness to
  pay indirectly: replacement aircraft cost 2-5x more than DJI and utilities
  already spend on fleet and compliance software, so compressing revalidation
  and procurement time is budget-relevant. The utility beachhead is real but
  modest, with researched estimates of $20.4M SAM and $3.6M year-3 reachable
  SOM, so the company must prove that the same control layer expands into other
  sovereign and critical-infrastructure fleets. The largest disconfirming risk
  is that OEM APIs and exported data are too inconsistent to automate enough of
  the workflow, turning the business into low-margin services. Research does
  not yet quantify how many utilities are under active approved-equipment review
  today, so the first 90 days must test trigger frequency, budget ownership,
  and translation accuracy before scaling headcount.
problem:
  - Utility drone teams adopted DJI for economics and reliability, but new sales
    restrictions and security reviews make that installed base a liability.
  - Replacing DJI is not a simple aircraft purchase because recurring routes,
    SOPs, maintenance logs, pilot records, waivers, and procurement evidence
    all have to move together.
  - Approved alternatives cost materially more and may still carry China-linked
    component exposure, so buyers need a defensible migration and sourcing case
    before budget is released.
solution:
  - A migration workspace that ingests DJI and adjacent ops-system artifacts,
    maps them to approved-fleet equivalents, and highlights what still needs
    manual validation.
  - A procurement packet generator that assembles component-origin attestations,
    policy mappings, and unresolved exceptions so security and sourcing teams can
    approve staged fleet replacement faster.
  - Mission-level fleet economics that show where premium compliant aircraft are
    required and where lower-cost approved options are sufficient.
whyWeWin:
  - The company sits above OEMs and ops tools as a neutral control layer, which
    matches the buyer need for multi-stakeholder sign-off better than a single
    hardware vendor pitch.
  - Each migration creates proprietary route-portability, provenance, and
    replacement-performance data that improves future recommendations and raises
    switching costs.
  - The beachhead workflow is narrow enough to productize quickly because
    utilities already run recurring transmission and substation inspections with
    formal compliance records.
strategicChoices:
  beachhead: Mid-size U.S. electric utilities with 20-200 pilots and recurring
    transmission, substation, and storm-response routes that are under active
    pressure to move off DJI.
  wedgeRationale: >-
    Utilities provide the fastest path to proof because they already have large
    recurring drone programs, expensive downtime, and multi-party approval
    workflows. A narrower migration-and-provenance wedge is easier to validate
    than a broader drone operating system because the buying trigger is a fleet
    replacement event, not a general productivity upgrade.
  sequencingRationale: >-
    The company should first build artifact ingestion, route and record
    translation, and procurement packet generation, then sell service-assisted
    pilots into utilities with active reviews. Only after repeatable pilots
    should it add deeper OEM integrations, reseller partnerships, and expansion
    into adjacent critical-infrastructure segments.
  notYet:
    - Public safety and defense programs that require different procurement and
      certification cycles
    - Owning or reselling hardware inventory
    - General inspection analytics and imagery workflow software
    - Dock automation and autonomous mission execution products
market:
  tam: "$54.0M estimated U.S. utility-adjacent TAM based on roughly 2,830
    public-power and cooperative entities, 12% with meaningful migration need,
    2.65 active sites per program, and about $60k annual platform-equivalent
    spend per site."
  sam: "$20.4M estimated beachhead SAM for about 120 mid-size U.S. electric
    utilities with recurring transmission and substation routes at roughly 2.5
    sites each."
  som: "$3.6M estimated year-3 reachable SOM based on 18 high-urgency utility
    programs at about $200k blended annualized revenue per account."
  segments:
    - Mid-size U.S. electric utilities with established drone inspection teams
    - Adjacent critical-infrastructure operators under approved-equipment or
      foreign-technology review
  buyingProcess: >-
    The user champion is the UAS program manager or flight-operations lead, but
    the economic buyer is typically transmission operations, asset management,
    or security leadership. Budget is usually released only after procurement
    and cyber-risk teams review provenance, approved-aircraft posture, and the
    operational impact of the migration plan.
product:
  mvp: >-
    v1 should support DJI artifact ingest from utility teams and common adjacent
    systems, translate the first high-value set of flight logs, route templates,
    maintenance records, and pilot qualifications, and generate a procurement
    packet with explicit gaps. The MVP is successful if it cuts time to first
    approved non-DJI mission rather than achieving perfect one-click portability.
  sixMonth: >-
    Deliver service-assisted pilots for one to two utilities, support two
    approved OEM targets, and ship reusable approval templates for provenance,
    waivers, and operating-procedure changes.
  twelveMonth: >-
    Productize repeatable artifact mapping, add self-serve status tracking for
    unresolved migration gaps, integrate four OEM or distributor data sources,
    and convert early pilots into annual production deployments.
  twentyFourMonth: >-
    Expand from one-time migration into an ongoing compliant fleet system of
    record with annual attestation, supplier-change monitoring, and cross-site
    benchmarking across utilities and the first adjacent infrastructure segment.
  keyBets:
    - Utility teams can reliably export enough DJI and adjacent ops data to
      automate at least the first 60-80% of migration paperwork.
    - Procurement teams value a standardized provenance packet enough to fund a
      dedicated migration layer.
    - Multi-OEM route and record translation can be standardized across a small
      set of approved vendors before custom work overwhelms margin.
    - The company can turn early services-heavy pilots into a software-led
      renewal and expansion motion within 12 months.
gtm:
  wedge: >-
    Sell a paid DJI-to-approved-fleet migration pilot to utilities that are
    already facing a review, refresh, or spare-parts decision. The pilot starts
    with direct founder-led outreach to UAS managers and transmission leaders,
    uses OEM or reseller partners for warm introductions where possible, and
    converts into a site-based annual subscription once the first routes and
    procurement packet are approved.
  channels:
    - Founder-led direct sales into utility UAS and transmission operations teams
    - OEM, reseller, and distributor referrals tied to approved replacement fleets
    - Security, compliance, and utility-system-integration partners
  funnelTargets: "Target account to active discovery 25%+, discovery to paid pilot 20%+, pilot to annual production 60%+, production account to second-site expansion within 6 months 50%+"
  pricing: >-
    Charge a one-time migration implementation fee plus an annual subscription
    per active site, with add-on compliance attestation modules. Site-based
    pricing matches how utilities phase deployments and keeps the first contract
    aligned to a real replacement event instead of a speculative enterprise-wide
    software rollout.
businessModel:
  revenueStreams:
    - Migration implementation fees
    - Annual software subscription per active site
    - Compliance attestation and supplier-risk modules
    - Expansion services for new OEM integrations or additional utility sites
  unitOfValue: Active inspection site migrated and managed through the platform
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more sites within the same utility program after the first approved rollout
    - Add annual provenance refresh and supplier-change monitoring
    - Support additional aircraft classes and OEMs inside the same account
    - Reuse the control layer in telecom, oil and gas, public power, and allied sovereign fleets
strategyMap:
  northStarMetric: Approved non-DJI inspection sites running recurring missions through the platform
  inputMetrics:
    - Qualified utility accounts with an active DJI replacement trigger
    - Percentage of required migration artifacts auto-translated per pilot
    - Median days from data ingest to procurement packet delivery
    - Pilot to production conversion rate
    - Unresolved provenance exceptions per site at go-live
  moatsToBuild:
    - Normalized corpus of DJI artifacts mapped to approved-fleet equivalents
    - Utility-specific replacement benchmark data by route type and aircraft class
    - Procurement packet templates and supplier-attestation library
    - OEM and distributor integration layer that improves with each deployment
  killCriteria:
    - Fewer than 3 of the first 15 target utility accounts report an active budgeted migration within 12 months
    - Median paid pilot still requires more than 50% of artifacts to be handled manually after the second OEM integration
    - Fewer than 2 of the first 4 paid pilots convert to annual production within 6 months of delivery
    - No adjacent critical-infrastructure segment shows comparable buying triggers by month 18
  mermaid: |
    flowchart LR
      Wedge[Utility DJI migration wedge] --> MVP[Artifact ingest and provenance packet MVP]
      MVP --> Proof[Paid pilots and faster procurement approval]
      Proof --> Expansion[Multi OEM compliant fleet system of record]
investorMemo:
  verdict:
    call: Watch
    conviction: Compelling trigger and clear wedge, but conviction stays limited until portability and budget ownership are proven in paid pilots.
    whyBelieve: The company targets a real replacement event where manual migration, procurement delay, and expensive non-DJI hardware make time savings economically meaningful.
    whyDoubt: The utility beachhead is modest and the product may collapse into low-margin services if OEM data portability is weaker than expected.
    nextDiligence: Confirm three paid utility pilots that each involve real procurement review and measurable reduction in approval time.
  firstCustomer:
    title: Regional U.S. electric utility UAS program under DJI replacement pressure
    profile: Mid-size utility with recurring transmission and substation inspection routes, an existing DJI fleet, and multiple sites that cannot pause operations during fleet changeover.
    trigger: A board, cyber, insurer, or procurement review freezes new DJI purchases or forces an approved-equipment refresh during the next budget cycle.
    buyer: Director of UAS Programs, VP Transmission Operations, or asset-security lead
    initialContract: "$40k-80k paid migration pilot for one site and one replacement OEM, converting to roughly $120k-250k annual subscription and attestation spend as 2-4 sites move into production."
  mustBeTrue:
    - At least 30% of contacted target utilities must report an active DJI replacement review or budgeted refresh in the next 12 months.
    - The product must auto-translate enough logs, routes, and records to eliminate at least 30% of manual migration effort in the first two pilots.
    - Procurement teams must accept the provenance packet as part of actual approval workflows rather than treating it as supplemental documentation.
    - At least two approved OEM stacks must expose enough data and APIs to support repeatable route and record mapping.
    - The company must show credible demand for the same control layer outside utilities before the utility beachhead saturates.
  diligenceQuestions:
    - How often are utilities facing mandatory approved-equipment reviews versus optional long-term refresh planning?
    - Which exact data artifacts can customers export today from DJI, AirData, Aloft, and in-house systems without custom engineering?
    - Who signs the first contract when the pain spans UAS operations, procurement, and cyber-risk?
    - How much of the workflow can be standardized across Skydio, Wingtra, Freefly, and FLIR before services dominate?
    - What evidence shows adjacent verticals will buy the same product with similar urgency?
  riskHeatmap:
    - risk: OEM integration gaps make migration too manual
      likelihood: High
      impact: High
      leadingIndicator: First two pilots require custom handling for most route, maintenance, or checklist artifacts and no repeatable mapping library emerges.
      mitigation: Start with the most common export artifacts, limit initial OEM coverage, and price early engagements as service-assisted pilots.
    - risk: Policy urgency is too uneven to create a repeatable sales trigger
      likelihood: Medium
      impact: High
      leadingIndicator: Fewer than 3 of the first 15 target accounts have a budgeted replacement timeline or active review.
      mitigation: Target utilities already in review, and position the product around procurement speed and fleet economics, not just ban headlines.
    - risk: Approved hardware and component provenance remain supply constrained
      likelihood: Medium
      impact: Medium
      leadingIndicator: Pilots stall because customers cannot source replacement aircraft or cannot clear provenance exceptions for target components.
      mitigation: Stay hardware-agnostic, phase by route criticality, and partner with distributors that can provide attestations.
    - risk: Utility beachhead proves too small without adjacent expansion
      likelihood: Medium
      impact: High
      leadingIndicator: Renewals are healthy but no adjacent critical-infrastructure segment shows comparable trigger frequency by month 18.
      mitigation: Design the product around portable procurement and migration workflows, then test telecom, oil and gas, and public-sector adjacency early.
operatingAssumptions:
  - assumption: Utility customers can export enough DJI and adjacent system data to automate the first meaningful portion of migration work.
    basis: research.yaml
    validationTest: Run five customer screen-share export audits and confirm at least 70% of needed artifacts are available in machine-readable form.
    decisionImpact: If false, narrow the product to manual high-value packet generation or stop pursuing a software-first model.
  - assumption: The first contract can be owned by the UAS program leader with procurement and cyber-risk as co-approvers rather than separate buyers.
    basis: idea.yaml
    validationTest: Map decision roles across ten target accounts and confirm the same champion can sponsor both the pilot and production rollout.
    decisionImpact: If false, redesign the product and messaging around procurement-led compliance software rather than operations-led migration.
  - assumption: Site-based pricing plus a migration fee fits how utilities budget replacement programs.
    basis: idea.yaml
    validationTest: Test two pricing packages in discovery and close at least one paid pilot without requiring enterprise-wide pricing from day one.
    decisionImpact: If false, move to account-level subscription or OEM-channel resale rather than direct site pricing.
  - assumption: OEM and distributor partnerships will improve data access and reduce proof burden after the first pilots.
    basis: research.yaml
    validationTest: Secure two signed partner workflows that provide technical documentation, referral access, or provenance attestations within 9 months.
    decisionImpact: If false, expect slower sales cycles and budget additional solutions-engineering headcount.
  - assumption: The same control layer can expand into other sovereign and critical-infrastructure drone fleets after utilities.
    basis: operator judgment
    validationTest: Complete 15 adjacency interviews and secure at least two paid design partnerships outside utilities by month 18.
    decisionImpact: If false, treat the company as a niche utility software business and constrain funding and hiring accordingly.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Export audit with target utility teams
    hypothesis: Existing DJI, AirData, and Aloft exports contain enough structured data to automate the first migration workflow.
    successMetric: Five export audits completed and at least three show machine-readable access to logs, route templates, and maintenance records.
    owner: Founding eng
  - horizon: 0-90 days
    experiment: Buyer-map interviews across operations, procurement, and cyber-risk
    hypothesis: One operations leader can champion the deal if the product also serves procurement evidence needs.
    successMetric: Ten interviews completed and a consistent economic buyer pattern emerges in at least six accounts.
    owner: CEO
  - horizon: 90-180 days
    experiment: First paid migration pilot for one utility and one OEM pair
    hypothesis: A service-assisted MVP can reduce time to first approved non-DJI mission enough to justify pilot spend.
    successMetric: One paid pilot signed and first approved route delivered within 8 weeks of data access.
    owner: CEO
  - horizon: 90-180 days
    experiment: Provenance packet acceptance test with procurement reviewers
    hypothesis: Procurement teams will use a standardized component-origin and policy-mapping packet in real approval workflows.
    successMetric: Two procurement teams review the packet and at least one uses it in a live approval process.
    owner: Compliance and product lead
  - horizon: 6-12 months
    experiment: OEM and distributor partner program
    hypothesis: Replacement OEMs and resellers will refer customers if the product accelerates their conversion wins.
    successMetric: Two referral or integration agreements signed and at least three qualified opportunities sourced from partners.
    owner: Account executive and partnerships
  - horizon: 12-18 months
    experiment: Adjacent vertical expansion test
    hypothesis: Telecom, oil and gas, or public power buyers share the same migration and provenance pain pattern.
    successMetric: Two paid discovery or pilot engagements closed outside investor-owned utilities.
    owner: CEO
operations:
  - Standard customer onboarding checklist for flight logs, route templates, maintenance records, pilot qualifications, and policy documents
  - OEM integration test harness covering Skydio, Wingtra, Freefly, and FLIR artifact mapping
  - Provenance evidence workflow with distributors or resellers that can provide component-origin attestations
  - Reusable approval templates for Remote ID, LAANC, waiver, and operating-procedure changes during migration
team:
  - role: CEO
    startTiming: Month 0
    rationale: Own founder-led utility sales, buyer mapping, and OEM or reseller partnership development.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the ingest pipeline, mapping engine, and repeatable pilot tooling from the first customer workflows.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Run service-assisted migrations, capture edge cases, and convert custom work into product requirements.
  - role: Compliance and product lead
    startTiming: Month 6
    rationale: Own provenance packet templates, approval workflows, and the product roadmap across operations and procurement users.
  - role: Account executive and partnerships
    startTiming: Month 9
    rationale: Turn founder-led pilots into a repeatable pipeline and manage reseller and OEM referral channels.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 3 paid utility migration pilots with active approved-equipment or refresh triggers
      - Support at least 2 replacement OEM workflows with repeatable artifact mapping
      - Convert 2 pilots to annual production deployments across multiple sites
      - Ship v1 procurement packet and provenance exception tracking
  - horizon: 12-24 months
    items:
      - Reach 10 production utility sites with measurable reduction in migration approval time
      - Expand integration coverage to 4 OEM or distributor data sources
      - Launch annual attestation and supplier-change monitoring modules
      - Validate one adjacent critical-infrastructure segment with paid demand
  - horizon: 24-36 months
    items:
      - Reach 25 or more production sites across utilities and the first adjacent segment
      - Build a defensible benchmark dataset for replacement performance by route type and aircraft class
      - Prove a partner-assisted distribution motion that contributes at least one-third of qualified pipeline
risks:
  - risk: OEM APIs and data formats are too inconsistent to support software-led migration
    likelihood: High
    impact: High
    mitigation: Constrain initial OEM scope, lead with service-assisted pilots, and only automate artifacts that recur across accounts.
  - risk: Utilities delay migration because grandfathered DJI fleets remain usable longer than expected
    likelihood: Medium
    impact: High
    mitigation: Focus on accounts with active reviews and sell procurement acceleration, provenance, and fleet economics rather than forced replacement alone.
  - risk: Approved replacement hardware remains scarce or still fails provenance checks
    likelihood: Medium
    impact: Medium
    mitigation: Stay multi-OEM, sequence migrations by mission criticality, and rely on distributor attestation workflows.
  - risk: The utility beachhead does not expand into a larger multi-vertical business
    likelihood: Medium
    impact: High
    mitigation: Test adjacent segments early and avoid hiring ahead of evidence that the control layer generalizes.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 months to prove three paid utility pilots, two production conversions, a repeatable site-based migration product, four OEM or distributor integrations, and evidence that the same control layer expands beyond utilities.
