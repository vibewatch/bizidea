problem: >-
  公用事业无人机项目之所以采用 DJI，是因为它在日常巡检情境里同时给出了可靠飞行器、出色相机和可接受的经济性。如今，出于安全考量的限制与中国政策变化，正把这种标准化反过来变成负担，而运营方偏偏又最需要飞行作业连续性。更换整支机队之所以痛苦，是因为获批替代方案更贵，关键部件依旧能追溯回中国，同时每一次迁移都逼着团队重做任务、培训、维护记录和采购证实。
targetUser:
  primary: 在美国电力公用事业公司负责输电线路、变电站和风暴灾损巡检无人机项目的 UAS 项目经理
  secondary: 负责批准设备切换的采购、网络风险与维护负责人
  buyer: UAS 项目总监、输电运营副总裁或资产安全负责人
startupThesis:
  nonObviousInsight: 替换 DJI 真正难的地方，不是选哪一款新机型，而是要把任务连续性和部件溯源证实到够让安全和采购团队签字放行。
  beachhead: 面向拥有 20-200 名飞手、且长期执行输电巡检航线的美国中型电力公用事业公司，交付从 DJI 迁往获批机队的迁移方案
  wedge: 一层软件加集成能力，把飞行计划、检查清单、维护日志和飞手资质记录迁到获批无人机上，同时生成供采购审批使用的溯源与政策材料包
  whyNowCatalyst: DJI 正同时受到中国与美国限制，而替代品仍贵出 2-5 倍且依赖中国供应链，迫使运营方现在就得为替换方案做论证并推动落地。
  ventureScalePath: 先从公用事业机队迁移切入，再扩展成主权小型 UAS 采购、任务可移植性和合规部件采购的记录系统，覆盖公用事业、公共安全、电信、油气和盟友防务项目。
solution: >-
  这款产品会接入 DJI
  的飞行历史、航线模板、维护日志和飞手记录，再把它们映射成获批机队可用的等价物，让团队不用从零重建操作流程。系统还会生成采购材料包，包含部件来源证实、安全政策映射，以及任何尚未解决的供应商暴露缺口清单。它还会按任务级别测算经济性，让运营方看清哪些情境必须上高价机型，哪些情境用更低成本的合规平台就够了。随着时间推移，公司会变成多个无人机
  OEM 之上的迁移与合规层，而不是再去做一家新的硬件厂商。
goToMarketSeed:
  firstCustomer: 已用 DJI 做线路巡检、如今又面临董事会、监管机构、保险方或安全审查的美国区域性电力公用事业公司
  buyingTrigger: 新的获批设备政策、安全审查、即将到期的 DJI 采购合同，或一次迫使机队更新的风暴后预算周期
  currentAlternative: 用电子表格手工迁移、购买 OEM 专业服务、内部自研，或者拖延替换、尽量继续维持旧的 DJI 机队
  switchingReason: 这个切口能把数月的重新证实工作压缩下来，保住飞手流程，并给采购团队一份站得住脚的溯源材料包，而不是把他们扔进一场高成本、从零开始的替换工程
  pricingHypothesis: 按活跃机队站点收取平台费，另加迁移项目费和年度合规证实模块费
whyNow:
  - point: 出于安全驱动的禁令，正把原本抽象的地缘政治担忧变成眼前就要执行的机队替换项目。
    signalRefs:
      - 双向政策冲击
    sourceRefs:
      - 1
      - 2
  - point: 对 DJI 新产品的限制，让已全面采用其机型的团队面临备件与采购连续性风险。
    signalRefs:
      - 类别龙头新增销售受阻
    sourceRefs:
      - 2
  - point: 仅仅改买西方品牌，并不能消除供应链审查，由于关键部件依旧来自中国。
    signalRefs:
      - 替代硬件仍依赖中国供应链
    sourceRefs:
      - 3
  - point: 硬件贵出 2-5 倍，让能给迁移降风险、又能控制机队投入的软件更容易被证实值这个钱。
    signalRefs:
      - 获批替代方案价格显著更高
    sourceRefs:
      - 3
differentiator: >-
  这不是又一个无人机 OEM 故事。公司切入的是现场运营、采购和安全政策之间最脏最麻烦的中间地带：翻译任务、打包溯源证据，并比较跨平台机队经济性。随着迁移案例积累，它会沉淀出独特数据，知道哪些获批硬件真的能替代特定的
  DJI 流程，从而沉淀出一层对合规机队替换极具防守力的控制层。
