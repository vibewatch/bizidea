problem: 公用事业无人机项目采用 DJI，是因为它在日常巡检中提供了可靠的飞行器、强大的相机能力和可控的经济性。如今，出于安全考虑的限制与中国政策变化，正把这种标准化变成负担，而运营方此时恰恰需要维持飞行运营的连续性。机队替换之所以痛苦，是因为获批替代方案更贵，关键部件仍可追溯到中国，而且每一次迁移都迫使团队重做任务、培训、维护记录和采购佐证。
targetUser:
  primary: 在美国电力公用事业企业中负责输电线路、变电站和风暴损伤巡检无人机项目的 UAS 项目经理。
  secondary: 负责获批设备切换的采购、网络风险和维护负责人。
  buyer: UAS 项目总监、输电运营副总裁或资产安全负责人。
startupThesis:
  nonObviousInsight: 替换 DJI 最难的部分不是挑选新机型，而是要充分证明任务连续性和部件溯源，让安全与采购团队能够签字放行。
  beachhead: 面向拥有 20-200 名飞手、且存在重复性输电巡检航线的美国中型电力公用事业企业，提供从 DJI 向获批机队迁移的方案。
  wedge: 一个软件加集成层，把飞行计划、检查清单、维护日志和飞手资质记录迁移到获批无人机上，同时生成供采购审批使用的溯源与政策资料包。
  whyNowCatalyst: DJI 同时受到中美限制挤压，而替代方案仍然贵 2-5x 且依赖中国，这迫使运营方现在就必须论证并执行替换。
  ventureScalePath: 先从公用事业机队迁移切入，随后成为覆盖公用事业、公共安全、电信、油气和盟友防务项目的主记录系统，管理主权小型 UAS 采购、任务可移植性与合规部件采购。
solution: 该产品接入 DJI 的飞行历史、航线模板、维护日志和飞手记录，然后将其映射为获批机队的对应内容，使团队无需从零重建操作流程。它会生成采购资料包，包含部件来源证明、安全政策映射，以及针对任何未解决供应商暴露的缺口清单。系统还会建模任务层面的经济性，让运营方看清哪些场景需要高端飞行器，哪些场景可由低成本合规平台满足。随着时间推移，公司将成为位于多个无人机 OEM 之上的迁移与合规层，而不是又一家硬件供应商。
goToMarketSeed:
  firstCustomer: 已经使用 DJI 执行线路巡检、如今又面临董事会、监管方、保险方或安全团队对外国制造运营技术审查的美国区域性电力公用事业企业。
  buyingTrigger: 新的获批设备政策、安全审查、即将到期的 DJI 采购合同，或风暴后的预算周期迫使机队更新。
  currentAlternative: 使用电子表格手工迁移、依赖 OEM 专业服务、内部自建工具，或在维持旧版 DJI 机队运行的同时延后替换。
  switchingReason: 这一切入点可减少数月的重新验证工作，保留飞手工作流，并为采购提供可辩护的溯源资料包，而不是代价高昂的推倒重来式替换。
  pricingHypothesis: 按每个活跃飞行器站点收取平台费，外加付费迁移项目和年度合规证明模块。
whyNow:
- point: 由安全驱动的禁令，正把原本理论上的地缘政治担忧变成迫在眉睫的机队替换项目。
