jobsToBeDone:
  - job: 当安全审查冻结新的 DJI 采购时，帮公用事业 UAS 经理把重复巡检任务迁到获批机队上，这样他们就能在不重写每一份 SOP 的情况下继续飞行作业。
    currentAlternative: 电子表格、OEM 服务和人工重新培训飞手
    successMetric: 第一条获批非 DJI 任务上线所需时间，以及完成迁移的历史航线占比
  - job: 当采购团队要求交付部件来源和政策证实时，帮网络风险与采购团队生成一份可审计的审批材料包，这样他们就能更快释放预算。
    currentAlternative: 与分销商来回发邮件，加上一堆 PDF 规格书
    successMetric: 采购审批所需天数，以及未解决的供应链例外数量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 多个已证实来源同时指向同一类别龙头遭遇政策冲击、供应链依赖和价格压力。
  painIntensity:
    score: 4
    rationale: 如果不能平滑替换 DJI，被迫停摆的巡检项目会同时遭遇运营中断、采购摩擦和真实的预算后果。
  wedgeClarity:
    score: 5
    rationale: 面向公用事业巡检团队的 DJI 到获批机队迁移，是一个狭窄、具体且买方和切换事件都很明确的流程。
  defensibility:
    score: 4
    rationale: 跨平台任务翻译数据、溯源记录和迁移基准会随着每次部署不断累积，OEM 很难快速复制。
  ventureScale:
    score: 4
    rationale: 这套控制层能从公用事业扩展到公共安全、电信、能源以及盟友主权无人机采购。
topRisks:
  - name: OEM 集成缺口
    description: 如果获批无人机厂商只开放有限 API 或格式不兼容，迁移自动化就会卡住，业务也会偏向重服务模式。
    mitigation: 先从最有价值的导出格式和日志格式做起，打包专家主导的迁移服务，并优先与希望加速替换成交的 OEM 合作。
  - name: 政策紧迫度不均
    description: 如果限制仍零散、或旧机队还能继续用更久，一些运营方可能会继续拖延替换。
    mitigation: 优先瞄准正在接受安全审查的客户，把卖点放在采购提速、溯源和机队成本优化，而不是只靠禁令新闻带动成交。
  - name: 合规硬件供应短缺
    description: 客户可能很想切换，不过依旧很难大规模买到获批机体、电池或电机。
    mitigation: 保持硬件中立，接入多 OEM 供货数据，并按航线关键程度分阶段迁移，而不是承诺立刻完成整队替换。
