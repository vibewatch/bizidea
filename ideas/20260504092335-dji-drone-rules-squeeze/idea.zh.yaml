jobsToBeDone:
- job: 当安全审查冻结新的 DJI 采购时，帮助公用事业 UAS 经理把重复性巡检任务迁移到获批机队，从而在不重写每一份 SOP 的情况下继续飞行。
  currentAlternative: 电子表格、OEM 服务以及人工飞手再培训
  successMetric: 首个获批非 DJI 任务上线时间，以及旧航线迁移比例
- job: 当采购部门要求提供部件来源与政策证据时，帮助网络风险和采购团队生成可审计的审批资料包，从而更快释放预算。
  currentAlternative: 与分销商的邮件往来以及 PDF 规格书
  successMetric: 获得采购批准所需天数，以及未解决的供应链例外数量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 多条已验证来源显示，同一类别龙头正同时面临政策冲击、供应链依赖和价格压力。
  painIntensity:
    score: 4
    rationale: 如果无法顺利替换 DJI，停摆的巡检项目将面临运营中断、采购摩擦以及真实的预算后果。
  wedgeClarity:
    score: 5
    rationale: 针对公用事业巡检团队的 DJI 向获批机队迁移，是一个狭窄而具体的工作流，拥有明确的买方与切换触发事件。
  defensibility:
    score: 4
    rationale: 跨平台任务转换数据、溯源记录和迁移基准会随着每次部署不断积累，OEM 很难快速复制。
  ventureScale:
    score: 4
    rationale: 同一控制层可从公用事业扩展到公共安全、电信、能源以及盟友主权无人机采购。
topRisks:
- name: OEM 集成缺口
  description: 如果获批无人机厂商开放的 API 有限或格式不兼容，迁移自动化可能停滞，并演变为重服务型工作。
  mitigation: 从价值最高的导出与日志格式切入，打包专家主导的迁移服务，并与希望加速替换成交的 OEM 合作。
- name: 政策紧迫性不均
  description: 如果限制措施仍然碎片化，或既有机队可使用时间长于预期，一些运营方可能会推迟替换。
  mitigation: 聚焦正在接受安全审查的目标客户，并主打采购提速、溯源能力与机队成本优化，而不是只依赖禁令新闻。
- name: 合规硬件短缺
  description: 客户可能想切换，但仍难以大规模采购到获批飞行器、电池或电机。
  mitigation: 保持硬件中立，集成多 OEM 的可供货数据，并帮助客户按航线关键性分阶段迁移，而不是承诺立刻完成全面替换。
