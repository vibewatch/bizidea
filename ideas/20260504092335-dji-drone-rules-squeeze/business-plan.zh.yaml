slug: drone-fleet-migration-os
date: '2026-05-04'
executiveSummary: >-
  中国与美国同时收紧对 DJI 的限制，正把机队选择问题变成美国公用事业无人机项目里的采购与连续性问题，尤其是那些已经全面采用 DJI 的团队。第一位客户会是美国一家中型电力公用事业公司的 UAS 项目经理：在董事会、网络安全、保险方或采购审查之后，他必须为 DJI 机队做更新或重新论证。产品切口是一层软件加集成能力，接入 DJI 日志、航线模板、维护记录和飞手资质，再输出可用于获批机队的等价资产，以及供签字审批的溯源材料包。相比做一套通用无人机运营系统，这是更好的第一刀，因为公用事业客户已经拥有高频巡检航线、多方参与的审批流程，以及足够多的飞手和记录，人工迁移会迅速变得昂贵。研究对付费意愿的支持主要是间接的：替代机型成本比 DJI 高 2-5 倍，而公用事业客户本来就在为机队和合规软件花钱，所以压缩重新验证和采购时间，本身就与预算强相关。公用事业这个滩头市场是真实存在的，但规模不大，研究给出的估算是 SAM 为 $20.4M、第 3 年可触达 SOM 为 $3.6M，因此公司必须证明同一层控制层还能扩展到其他主权与关键基础设施机队。最大的反证风险在于 OEM API 和导出数据过于不一致，无法把足够多流程做成自动化，最后把业务拖成低毛利服务。研究目前也还没有量化，今天到底有多少家公用事业公司正处于活跃的获批设备审查之中，因此前 90 天必须优先验证触发频率、预算归属和翻译准确性，再考虑加人扩张。
problem:
  - 公用事业无人机团队当初选择 DJI，是因为它兼顾了经济性和可靠性；但新的销售限制与安全审查，正在把这套已安装基础反过来变成负担。
  - 替换 DJI 不是一次简单买飞机的动作，因为重复航线、SOP、维护日志、飞手记录、豁免文件和采购证明都得一起迁过去。
  - 获批替代方案价格明显更高，而且依然可能带着与中国相关的部件暴露，因此在预算获批之前，买方必须先拿出一套站得住脚的迁移与采购论证。
solution:
  - 一个迁移工作台，接入 DJI 及相邻运营系统中的各类资产，把它们映射到获批机队的等价物，并明确标出仍需人工验证的部分。
  - 一个采购材料包生成器，汇总部件来源证明、政策映射和未解决例外，让安全与采购团队更快批准分阶段替换。
  - 任务级机队经济性分析，帮助团队判断哪些场景必须上高价合规机型，哪些场景用更低成本的获批方案即可。
whyWeWin:
  - 公司站在 OEM 和运营工具之上，作为一层中立控制层存在；相比单一硬件厂商的说法，这更符合买方需要多方共同签字的现实。
  - 每做完一次迁移，都会沉淀专有的航线可移植性、溯源和替代性能数据，后续推荐会更准，切换成本也会更高。
  - 滩头工作流足够窄，能较快产品化，因为公用事业团队本来就以正式合规记录运行高频输电和变电站巡检。
strategicChoices:
  beachhead: 正在积极承受脱离 DJI 压力的美国中型电力公用事业公司，拥有 20-200 名飞手，以及输电、变电站和风暴响应的重复航线。
  wedgeRationale: >-
    公用事业客户最容易先打出证明，因为他们本来就有规模较大的重复无人机项目、昂贵的停摆成本，以及多方参与的审批工作流。相比做一套更宽泛的无人机操作系统，先做更窄的迁移加溯源切口更容易验证，因为购买触发点是一次机队替换事件，而不是泛化的效率升级。
  sequencingRationale: >-
    公司应先把资产接入、航线与记录翻译、采购材料包生成做好，再通过服务辅助型试点卖进那些正处于审查中的公用事业客户。只有当试点开始稳定复现后，才值得进一步加深 OEM 集成、建立分销合作，并向相邻关键基础设施行业扩张。
  notYet:
    - 需要完全不同采购与认证周期的公共安全和防务项目
    - 自己持有或转售硬件库存
    - 通用巡检分析与影像工作流软件
    - 机库自动化与自主任务执行产品
market:
  tam: "$54.0M 的美国公用事业相邻 TAM 估算，基于约 2,830 家公共电力与合作社实体，其中 12% 具备明确迁移需求、每个项目约 2.65 个活跃站点、每站点每年约 $60k 的平台等价支出。"
  sam: "$20.4M 的滩头 SAM 估算，面向约 120 家美国中型电力公用事业公司，它们运行重复的输电和变电站航线，平均约 2.5 个站点。"
  som: "$3.6M 的第 3 年可触达 SOM 估算，基于 18 个高紧迫度公用事业项目、每个账户约 $200k 的混合年化收入。"
  segments:
    - 已建立无人机巡检团队的美国中型电力公用事业公司
    - 面临获批设备或外国技术审查的相邻关键基础设施运营方
  buyingProcess: >-
    业务倡导者通常是 UAS 项目经理或飞行运营负责人，但真正的经济买方一般是输电运营、资产管理或安全负责人。预算通常只有在采购与网络风险团队审完溯源、获批机型状态和迁移计划对运营的影响之后，才会被放出来。
product:
  mvp: >-
    v1 应支持从公用事业团队和常见相邻系统中接入 DJI 资产，翻译第一批最高价值的飞行日志、航线模板、维护记录和飞手资质，并生成一份明确列出缺口的采购材料包。只要它能缩短第一条获批非 DJI 任务上线时间，而不是做到完美的一键可移植，就算 MVP 成功。
  sixMonth: >-
    为 1-2 家公用事业客户交付服务辅助型试点，支持 2 个获批 OEM 目标，并交付可复用的溯源、豁免和操作流程变更审批模板。
  twelveMonth: >-
    把可复用的资产映射流程产品化，增加未解决迁移缺口的自助状态追踪，接入 4 个 OEM 或分销商数据源，并把早期试点转成年度生产部署。
  twentyFourMonth: >-
    从一次性迁移扩展为持续运行的合规机队记录系统，提供年度证明、供应商变更监控，以及跨站点对标能力，覆盖公用事业和第一个相邻基础设施行业。
  keyBets:
    - 公用事业团队能够稳定导出足够多的 DJI 与相邻运营数据，至少让前 60-80% 的迁移文书实现自动化。
    - 采购团队会认为标准化溯源材料包足够有价值，愿意为专门的迁移层买单。
    - 在定制工作吞掉毛利之前，多 OEM 的航线与记录翻译可以先在少数获批厂商上做成标准化能力。
    - 公司能在 12 个月内，把早期偏重服务的试点转成以软件续费和扩张为主的增长模式。
gtm:
  wedge: >-
    向那些已经面临审查、更新或备件决策的公用事业客户，销售一个付费的 DJI 到获批机队迁移试点。试点从创始人主导的外呼开始，直接切入 UAS 经理和输电负责人；能借 OEM 或分销伙伴拿到暖介绍时就优先借力；一旦第一批航线和采购材料包获批，再转成按站点计费的年度订阅。
  channels:
    - 创始人主导，直销进入公用事业 UAS 团队和输电运营团队
    - 围绕获批替代机队展开的 OEM、经销商和分销商转介绍
    - 安全、合规和公用事业系统集成合作伙伴
  funnelTargets: 目标账户到进入有效发现阶段 25%+，发现到付费试点 20%+，试点到年度生产 60%+，生产账户在 6 个月内扩展到第二站点 50%+
  pricing: >-
    收取一次性迁移实施费，加上按活跃站点计费的年度订阅，以及可选的合规证明模块。按站点定价更贴近公用事业客户分阶段部署的方式，也让第一份合同绑定到真实的替换事件，而不是一场假设性的全企业软件上线。
businessModel:
  revenueStreams:
    - 迁移实施费
    - 按活跃站点收取年度软件订阅费
    - 合规证明与供应商风险模块
    - 面向新 OEM 集成或新增公用事业站点的扩展服务
  unitOfValue: 通过平台完成迁移并持续管理的活跃巡检站点
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一家公用事业项目里，首个站点获批上线后继续扩更多站点
    - 增加年度溯源刷新与供应商变更监控
    - 在同一账户内支持更多机型类别与 OEM
    - 把控制层复用到电信、油气、公共电力和盟友主权机队
strategyMap:
  northStarMetric: 通过平台运行重复任务的获批非 DJI 巡检站点数
  inputMetrics:
    - 存在明确 DJI 替换触发因素的合格公用事业目标账户数
    - 每个试点中所需迁移资产实现自动翻译的比例
    - 从数据接入到采购材料包交付的中位天数
    - 试点转生产的转化率
    - 上线时每站点仍未解决的溯源例外数量
  moatsToBuild:
    - 映射到获批机队等价物的 DJI 标准化资产语料库
    - 按航线类型与机型类别沉淀的公用事业替代基准数据
    - 采购材料包模板与供应商证明资料库
    - 每次部署都会变强的 OEM 与分销商集成层
  killCriteria:
    - 在前 15 个目标公用事业账户中，不足 3 家在 12 个月内表示存在已预算的活跃迁移需求
    - 做完第二个 OEM 集成后，中位付费试点仍有超过 50% 的资产要靠人工处理
    - 交付后 6 个月内，前 4 个付费试点中不足 2 个转成年度生产
    - 到第 18 个月时，没有任何相邻关键基础设施行业显示出可比的购买触发频率
  mermaid: |
    flowchart LR
      Wedge[公用事业 DJI 迁移切口] --> MVP[资产接入与溯源材料包 MVP]
      MVP --> Proof[付费试点与更快采购审批]
      Proof --> Expansion[多 OEM 合规机队记录系统]
investorMemo:
  verdict:
    call: 观察
    conviction: 触发因素有力、切口清晰，但在付费试点里证明可移植性和预算归属之前，判断仍应保持克制。
    whyBelieve: 公司瞄准的是一个真实替换事件，在这里人工迁移、采购拖延和高价非 DJI 硬件让节省时间具有明确经济价值。
    whyDoubt: 公用事业滩头市场本身不大；如果 OEM 数据可移植性比预期更差，产品很可能塌成低毛利服务业务。
    nextDiligence: 确认 3 个付费公用事业试点，每个都伴随真实采购审查，并能实质性缩短审批时间。
  firstCustomer:
    title: 处在 DJI 替换压力下的美国区域性电力公用事业 UAS 项目
    profile: 一家中型公用事业公司，运行重复的输电和变电站巡检航线，拥有现成的 DJI 机队，且多个站点不能在换队过程中停运。
    trigger: 董事会、网络安全、保险方或采购审查冻结新的 DJI 采购，或在下一个预算周期强制执行获批设备更新。
    buyer: UAS 项目总监、输电运营副总裁或资产安全负责人
    initialContract: "$40k-80k 的付费迁移试点，覆盖 1 个站点和 1 个替代 OEM；当 2-4 个站点进入生产后，可转成约 $120k-250k 的年度订阅与证明支出。"
  mustBeTrue:
    - 在接触的目标公用事业客户中，至少 30% 必须表示未来 12 个月内存在活跃的 DJI 替换审查或已预算的更新计划。
    - 产品必须在前两个试点里自动翻译足够多的日志、航线和记录，至少消除 30% 的人工迁移工作量。
    - 采购团队必须接受这份溯源材料包，并把它纳入真实审批流程，而不是把它当成可有可无的补充文件。
    - 至少两套获批 OEM 栈必须开放出足够的数据与 API，支持可复用的航线和记录映射。
    - 在公用事业市场吃满之前，公司必须证明相同控制层在其他行业也存在可信需求。
  diligenceQuestions:
    - 公用事业客户面对强制性获批设备审查的频率到底有多高，而不是只是做长期更新规划？
    - 客户今天究竟能从 DJI、AirData、Aloft 和内部系统里导出哪些具体数据资产，而无需定制工程？
    - 当痛点横跨 UAS 运营、采购与网络风险时，第一张合同到底由谁来签？
    - 在服务工作占据主导之前，Skydio、Wingtra、Freefly 和 FLIR 之间到底有多少流程可以标准化？
    - 有什么证据表明，相邻垂直行业会以类似紧迫度购买同一套产品？
  riskHeatmap:
    - risk: OEM 集成缺口让迁移过于依赖人工
      likelihood: High
      impact: High
      leadingIndicator: 前两个试点里，大多数航线、维护或检查清单资产都要定制处理，且没有形成可复用的映射库。
      mitigation: 从最常见的导出资产切起，限制初始 OEM 覆盖范围，并把早期项目定价为服务辅助型试点。
    - risk: 政策紧迫度不够均匀，难以形成可重复的销售触发
      likelihood: Medium
      impact: High
      leadingIndicator: 前 15 个目标账户里，不足 3 家拥有已预算的替换时间表或活跃审查。
      mitigation: 只打那些已经进入审查的公用事业客户，并把产品定位在采购提速和机队经济性，而不是只蹭禁令标题。
    - risk: 获批硬件与部件溯源依旧受供应约束
      likelihood: Medium
      impact: Medium
      leadingIndicator: 试点推进受阻，因为客户买不到替代机体，或无法为目标部件清掉溯源例外。
      mitigation: 保持硬件中立，按航线关键程度分阶段迁移，并与能提供证明的分销商合作。
    - risk: 如果没有相邻行业扩张，公用事业滩头市场会显得过小
      likelihood: Medium
      impact: High
      leadingIndicator: 续约情况不错，但到第 18 个月仍没有任何相邻关键基础设施行业表现出相近的触发频率。
      mitigation: 一开始就把产品按可迁移的采购与迁移工作流来设计，并尽早验证电信、油气和公共部门邻近市场。
operatingAssumptions:
  - assumption: 公用事业客户能够导出足够多的 DJI 与相邻系统数据，完成迁移工作的第一批高价值自动化。
    basis: research.yaml
    validationTest: 对 5 家客户做屏幕共享导出审计，确认至少 70% 的所需资产能以机器可读形式拿到。
    decisionImpact: 如果不成立，就把产品缩窄成高价值但偏人工的材料包生成工具，或停止押注软件优先模式。
  - assumption: 第一份合同可以由 UAS 项目负责人牵头，采购与网络风险作为共同审批方，而不需要完全不同的独立买方。
    basis: idea.yaml
    validationTest: 画出 10 家目标账户的决策角色图，确认同一位业务倡导者既能推动试点，也能推动生产上线。
    decisionImpact: 如果不成立，就把产品与信息传达重构成采购主导的合规软件，而不是运营主导的迁移工具。
  - assumption: 按站点定价加迁移费，符合公用事业客户为替换项目编预算的方式。
    basis: idea.yaml
    validationTest: 在销售发现阶段测试两套价格包，并至少拿下 1 个付费试点，而不需要一上来就给全企业定价。
    decisionImpact: 如果不成立，就转向按账户订阅或 OEM 渠道转售，而不是直接按站点收费。
  - assumption: 在首批试点之后，OEM 与分销商合作会改善数据访问，并降低证明负担。
    basis: research.yaml
    validationTest: 在 9 个月内签下 2 个合作工作流，能够提供技术文档、转介绍渠道或溯源证明。
    decisionImpact: 如果不成立，就要预期更长的销售周期，并为解决方案工程额外加预算。
  - assumption: 在公用事业之后，同一层控制层还能扩展到其他主权与关键基础设施无人机机队。
    basis: operator judgment
    validationTest: 到第 18 个月前完成 15 次相邻行业访谈，并拿下至少 2 个来自公用事业之外的付费设计合作。
    decisionImpact: 如果不成立，就把公司视为利基型公用事业软件业务，并相应收紧融资与招聘节奏。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 与目标公用事业团队一起做导出审计
    hypothesis: 现有 DJI、AirData 和 Aloft 导出文件包含足够结构化的数据，能支撑第一条迁移工作流自动化。
    successMetric: 完成 5 次导出审计，其中至少 3 次能以机器可读方式拿到日志、航线模板和维护记录。
    owner: 创始工程师
  - horizon: 0-90 天
    experiment: 横跨运营、采购和网络风险的买方地图访谈
    hypothesis: 只要产品同时满足采购证明需求，一位运营负责人就可以推动整笔交易。
    successMetric: 完成 10 次访谈，并在至少 6 家账户中看见一致的经济买方模式。
    owner: CEO
  - horizon: 90-180 天
    experiment: 面向 1 家公用事业客户与 1 个 OEM 组合的首个付费迁移试点
    hypothesis: 服务辅助型 MVP 能足够缩短第一条获批非 DJI 任务的上线时间，从而证明试点值得付费。
    successMetric: 签下 1 个付费试点，并在拿到数据后的 8 周内交付第一条获批航线。
    owner: CEO
  - horizon: 90-180 天
    experiment: 与采购审核方一起测试溯源材料包接受度
    hypothesis: 采购团队会在真实审批流程中使用标准化的部件来源与政策映射材料包。
    successMetric: 2 个采购团队审阅材料包，且至少有 1 个团队把它用于真实审批流程。
    owner: 合规与产品负责人
  - horizon: 6-12 个月
    experiment: OEM 与分销商合作计划
    hypothesis: 如果产品能加速替换成交，替代 OEM 与经销商会愿意转介绍客户。
    successMetric: 签下 2 份转介绍或集成协议，并从合作伙伴处带来至少 3 个合格机会。
    owner: 客户经理与合作负责人
  - horizon: 12-18 个月
    experiment: 相邻垂直行业扩张测试
    hypothesis: 电信、油气或公共电力买方也存在同样的迁移与溯源痛点模式。
    successMetric: 在投资者拥有的公用事业客户之外，至少拿下 2 个付费发现或试点项目。
    owner: CEO
operations:
  - 面向飞行日志、航线模板、维护记录、飞手资质和政策文件的标准客户导入清单
  - 覆盖 Skydio、Wingtra、Freefly 和 FLIR 资产映射的 OEM 集成测试框架
  - 联合分销商或经销商提供部件来源证明的溯源证据工作流
  - 面向 Remote ID、LAANC、豁免和迁移期间操作流程变更的可复用审批模板
team:
  - role: 首席执行官（CEO）
    startTiming: Month 0
    rationale: 负责创始人主导的公用事业销售、买方地图梳理，以及 OEM 或经销合作拓展。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 从第一批客户工作流出发，搭建接入管线、映射引擎和可复用的试点工具。
  - role: 解决方案工程师
    startTiming: Month 3
    rationale: 运行服务辅助型迁移项目，收集边角案例，并把定制工作转成产品需求。
  - role: 合规与产品负责人
    startTiming: Month 6
    rationale: 负责溯源材料包模板、审批工作流，以及面向运营与采购用户的产品路线图。
  - role: 客户经理与合作负责人
    startTiming: Month 9
    rationale: 把创始人主导的试点转成可复制销售管线，并管理经销商与 OEM 转介绍渠道。
milestones:
  - horizon: 0-12 个月
    items:
      - 签下 3 个付费公用事业迁移试点，这些客户都处在活跃的获批设备审查或更新触发中
      - 至少支持 2 个替代 OEM 工作流，并形成可复用的资产映射
      - 让 2 个试点转成覆盖多个站点的年度生产部署
      - 交付 v1 采购材料包与溯源例外追踪能力
  - horizon: 12-24 个月
    items:
      - 达到 10 个生产级公用事业站点，并能量化缩短迁移审批时间
      - 把集成覆盖扩展到 4 个 OEM 或分销商数据源
      - 上线年度证明与供应商变更监控模块
      - 在 1 个相邻关键基础设施行业验证出付费需求
  - horizon: 24-36 个月
    items:
      - 在公用事业和第一个相邻行业累计达到 25 个或以上生产站点
      - 建立一套按航线类型和机型类别划分的替代性能基准数据集，形成防守力
      - 证明合作伙伴辅助分销能够贡献至少三分之一的合格销售管线
risks:
  - risk: OEM API 与数据格式过于不一致，无法支撑软件主导的迁移
    likelihood: High
    impact: High
    mitigation: 收紧初始 OEM 范围，先用服务辅助型试点推进，并且只自动化那些跨账户反复出现的资产。
  - risk: 由于旧的 DJI 机队还能继续飞，公用事业客户比预期更晚迁移
    likelihood: Medium
    impact: High
    mitigation: 只聚焦正在审查中的账户，并把卖点放在采购提速、溯源和机队经济性，而不是被迫替换本身。
  - risk: 获批替代硬件依旧稀缺，或仍然过不了溯源审查
    likelihood: Medium
    impact: Medium
    mitigation: 保持多 OEM 策略，按任务关键程度安排迁移顺序，并依靠分销商证明工作流推进。
  - risk: 公用事业滩头市场无法扩展成更大的多垂直业务
    likelihood: Medium
    impact: High
    mitigation: 尽早测试相邻行业，并在没有证据证明控制层可泛化之前，不要提前扩招。
fundingAsk:
  stage: 种子前轮
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月时间证明 3 个付费公用事业试点、2 个生产转化、一个可复用的按站点计费迁移产品、4 个 OEM 或分销商集成，以及同一层控制层能扩展出公用事业之外的证据。
