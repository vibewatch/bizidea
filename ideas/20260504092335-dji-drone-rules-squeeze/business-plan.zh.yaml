slug: drone-fleet-migration-os
date: '2026-05-04'
executiveSummary: 中美两地对 DJI 的限制，正把机队选择问题变成已标准化采用 DJI 的美国公用事业无人机项目的采购与连续性问题。首个客户是美国中型电力公用事业企业中的 UAS 项目经理，他们在董事会、网络安全、保险或采购审查后，必须更新或为现有 DJI 机队辩护。产品切入点是一个软件加集成层，接入 DJI 日志、航线模板、维护记录和飞手资质，然后输出获批机队的对应内容以及供签字审批使用的溯源资料包。相比通用无人机运营套件，这是更好的首个切口，因为公用事业企业已经拥有重复性巡检航线、多方审批流程以及足够多的飞手和记录，使手工迁移变得昂贵。研究对支付意愿提供了间接支持：替代机型比 DJI 贵 2-5x，而公用事业企业本就为机队和合规软件付费，因此压缩重新验证和采购时间具有明确预算价值。公用事业这一滩头市场真实存在，但规模不大，研究估算其 SAM 为 $20.4M、3 年内可触达的 SOM 为 $3.6M，因此公司必须证明同一控制层能够扩展到其他主权与关键基础设施机队。最大的反证风险在于，OEM API 和导出数据可能过于不一致，无法充分自动化工作流，从而把业务拖成低毛利服务。研究目前尚未量化今天究竟有多少公用事业企业正处于获批设备审查中，因此前 90 天必须先验证触发频率、预算归属和转换准确性，再扩大团队。
problem:
- 公用事业无人机团队采用 DJI，主要因为其经济性与可靠性，但新的销售限制和安全审查正使这套存量基础变成负担。
- 替换 DJI 不是一次简单的飞行器采购，因为重复性航线、SOP、维护日志、飞手记录、豁免文件和采购证据都必须一起迁移。
- 获批替代方案明显更贵，而且仍可能带有与中国相关的部件暴露，因此买方在释放预算前需要一套可辩护的迁移与采购论证。
solution:
- 一个迁移工作台，可接入 DJI 及相邻运营系统的工件，将其映射为获批机队的对应内容，并标出仍需人工验证的部分。
- 一个采购资料包生成器，可汇总部件来源证明、政策映射和未解决例外，帮助安全与采购团队更快批准分阶段机队替换。
- 任务层面的机队经济性分析，可显示哪些场景必须使用高端合规飞行器，哪些场景使用低成本获批方案即可。
whyWeWin:
- 公司位于 OEM 和运营工具之上，充当中立控制层，这比单一硬件厂商的推介更符合买方对多方签字审批的需求。
- 每一次迁移都会产生专有的航线可移植性、溯源和替代性能数据，从而提升未来推荐效果并提高切换成本。
- 这一滩头工作流足够狭窄，因而可以快速产品化，因为公用事业企业已经在执行重复性的输电和变电站巡检，并保有正式合规记录。
strategicChoices:
  beachhead: 拥有 20-200 名飞手、并存在重复性输电、变电站与风暴响应航线、且正承受积极脱离 DJI 压力的美国中型电力公用事业企业。
  wedgeRationale: 公用事业企业提供了最快的验证路径，因为它们已经拥有大型重复性无人机项目、高昂的停机成本以及多方审批工作流。相比更宽泛的无人机操作系统，更聚焦的迁移与溯源切口更易验证，因为购买触发点是机队替换事件，而不是一般性的生产力升级。
  sequencingRationale: 公司应先构建工件接入、航线与记录转换以及采购资料包生成能力，然后向正在接受审查的公用事业企业销售服务辅助型试点。只有在试点具备可复制性之后，才应增加更深的 OEM 集成、经销商合作以及向相邻关键基础设施细分市场扩张。
  notYet:
  - 需要不同采购与认证周期的公共安全和防务项目
  - 自持或转售硬件库存
  - 通用巡检分析与影像工作流软件
  - 机库自动化与自主任务执行产品
market:
  tam: 估算的美国公用事业相关 TAM 为 $54.0M，基于约 2,830 家公有电力与合作社实体，其中 12% 具有明显迁移需求、每个项目 2.65 个活跃站点，以及每站点约 $60k 的年度平台等效支出。
  sam: 估算的滩头 SAM 为 $20.4M，对应约 120 家美国中型电力公用事业企业，每家拥有重复性输电与变电站航线，平均约 2.5 个站点。
  som: 估算的第 3 年可触达 SOM 为 $3.6M，基于 18 个高紧迫度公用事业项目、每个客户约 $200k 的混合年化收入。
  segments:
  - 已建立无人机巡检团队的美国中型电力公用事业企业
  - 正在接受获批设备或外国技术审查的相邻关键基础设施运营方
  buyingProcess: 用户侧的倡导者是 UAS 项目经理或飞行运营负责人，但经济买方通常是输电运营、资产管理或安全负责人。预算通常只有在采购和网络风险团队审查了溯源信息、获批飞行器情况以及迁移方案的运营影响之后才会释放。
product:
  mvp: v1 应支持从公用事业团队和常见相邻系统接入 DJI 工件，转换首批高价值的飞行日志、航线模板、维护记录和飞手资质，并生成明确列出缺口的采购资料包。只要它能缩短首个获批非 DJI 任务的上线时间，而不是实现完美的一键迁移，MVP 就算成功。
  sixMonth: 为 1-2 家公用事业企业交付服务辅助型试点，支持 2 个获批 OEM 目标，并推出可复用的溯源、豁免和操作流程变更审批模板。
  twelveMonth: 将可复用的工件映射产品化，增加针对未解决迁移缺口的自助状态跟踪，接入 4 个 OEM 或分销商数据源，并把早期试点转化为年度生产部署。
  twentyFourMonth: 从一次性迁移扩展为持续运行的合规机队主记录系统，提供年度证明、供应商变更监测，以及跨公用事业站点和首个相邻基础设施细分领域的基准比较。
  keyBets:
  - 公用事业团队能够可靠导出足够多的 DJI 与相邻运营数据，以自动化至少前 60-80% 的迁移文书工作。
  - 采购团队足够重视标准化溯源资料包，愿意为专门的迁移层买单。
  - 在定制化工作吞噬毛利之前，多 OEM 航线与记录转换可以先在一小组获批厂商之间实现标准化。
  - 公司能够在 12 个月内把早期重服务型试点转化为软件主导的续费与扩张路径。
gtm:
  wedge: 向已经面临审查、更新或备件决策的公用事业企业销售付费的 DJI 向获批机队迁移试点。试点从创始人直接触达 UAS 经理和输电负责人开始，在可能时借助 OEM 或经销商合作伙伴进行暖启动引荐；一旦首批航线和采购资料包获得批准，就转化为按站点计费的年度订阅。
  channels:
  - 创始人主导、直接销售给公用事业 UAS 团队和输电运营团队
  - 与获批替代机队相关的 OEM、经销商和分销商转介绍
  - 安全、合规和公用事业系统集成合作伙伴
  funnelTargets: Target account to active discovery 25%+, discovery to paid pilot 20%+, pilot to annual production 60%+, production account to second-site expansion within 6 months 50%+
  pricing: 收取一次性迁移实施费，加上按活跃站点计费的年度订阅，并提供附加的合规证明模块。按站点定价符合公用事业企业分阶段部署的方式，也让首份合同与真实的替换事件保持一致，而不是变成一次带有投机性的全企业软件铺开。
businessModel:
  revenueStreams:
  - 迁移实施费
  - 按活跃站点计费的年度软件订阅
  - 合规证明与供应商风险模块
  - 面向新增 OEM 集成或新增公用事业站点的扩展服务
  unitOfValue: 通过平台完成迁移并进行管理的活跃巡检站点
  targetGrossMarginPct: 70
  expansionLevers:
  - 在首个获批上线后，于同一公用事业项目内增加更多站点
  - 增加年度溯源刷新与供应商变更监测
  - 在同一客户内支持更多飞行器类别和 OEM
  - 在电信、油气、公有电力和盟友主权机队中复用同一控制层
strategyMap:
  northStarMetric: 通过平台运行重复性任务的获批非 DJI 巡检站点
  inputMetrics:
  - 存在明确 DJI 替换触发因素的合格公用事业客户
  - 每个试点中所需迁移工件的自动转换比例
  - 从数据接入到交付采购资料包的中位天数
  - 试点转生产的转化率
  - 上线时每站点未解决的溯源例外数量
  moatsToBuild:
  - 映射至获批机队对应内容的标准化 DJI 工件语料库
  - 按航线类型和飞行器类别划分的公用事业专属替换基准数据
  - 采购资料包模板与供应商证明资料库
  - 随每次部署不断增强的 OEM 与分销商集成层
  killCriteria:
  - 前 15 个目标公用事业客户中，少于 3 个表示会在 12 个月内进行已预算的迁移
  - 在完成第 2 个 OEM 集成后，付费试点的中位数项目仍需要对超过 50% 的工件进行人工处理
  - 前 4 个付费试点中，少于 2 个能在交付后 6 个月内转化为年度生产部署
  - 到第 18 个月时，没有任何相邻关键基础设施细分市场表现出可比的购买触发因素
  mermaid: |
    flowchart LR
      Wedge[公用事业 DJI 迁移切口] --> MVP[工件接入与溯源资料包 MVP]
      MVP --> Proof[付费试点与更快采购审批]
      Proof --> Expansion[多 OEM 合规机队主记录系统]
investorMemo:
  verdict:
    call: Watch
    conviction: 触发因素强、切口清晰，但在付费试点证明可移植性和预算归属之前，判断仍应保持谨慎。
    whyBelieve: 公司瞄准的是一个真实的替换事件，在这里，手工迁移、采购延迟以及昂贵的非 DJI 硬件，使节省时间具有明确经济价值。
    whyDoubt: 公用事业滩头市场规模有限；如果 OEM 数据可移植性弱于预期，产品可能退化为低毛利服务。
    nextDiligence: 确认 3 个付费公用事业试点，且每个都涉及真实的采购审查，并能测量审批时间的缩短。
  firstCustomer:
    title: 承受 DJI 替换压力的美国区域性电力公用事业 UAS 项目
    profile: 一家中型公用事业企业，拥有重复性的输电与变电站巡检航线、现有 DJI 机队，以及多个在机队切换期间不能暂停运营的站点。
    trigger: 董事会、网络安全、保险或采购审查冻结了新的 DJI 采购，或在下一个预算周期内强制进行获批设备更新。
    buyer: UAS 项目总监、输电运营副总裁或资产安全负责人。
    initialContract: 针对 1 个站点和 1 个替代 OEM 的 $40k-80k 付费迁移试点；随着 2-4 个站点进入生产阶段，可转化为约 $120k-250k 的年度订阅与证明支出。
  mustBeTrue:
  - 被接触的目标公用事业客户中，至少 30% 必须表示将在未来 12 个月内进行 DJI 替换审查或已有预算中的更新计划。
  - 产品必须自动转换足够多的日志、航线和记录，以便在前 2 个试点中消除至少 30% 的手工迁移工作量。
  - 采购团队必须将溯源资料包视为真实审批工作流的一部分，而不是附属文档。
  - 至少 2 套获批 OEM 技术栈必须开放足够的数据和 API，以支持可复用的航线与记录映射。
  - 在公用事业滩头市场饱和之前，公司必须证明相同控制层在公用事业之外也存在可信需求。
  diligenceQuestions:
  - 公用事业企业面对强制性的获批设备审查有多频繁？相较之下，可选的长期更新规划又占多大比例？
  - 客户今天究竟能从 DJI、AirData、Aloft 和内部系统中导出哪些具体数据工件，而无需定制工程支持？
  - 当痛点横跨 UAS 运营、采购和网络风险时，第一份合同究竟由谁签署？
  - 在服务工作占主导之前，Skydio、Wingtra、Freefly 和 FLIR 之间究竟有多少工作流能够被标准化？
  - 有哪些证据表明，相邻垂直行业会以类似的紧迫性购买同样的产品？
  riskHeatmap:
  - risk: OEM 集成缺口使迁移过于依赖人工
    likelihood: High
    impact: High
    leadingIndicator: 前 2 个试点中的大多数航线、维护或检查清单工件都需要定制处理，且没有形成可复用的映射库。
    mitigation: 从最常见的导出工件切入，限制初始 OEM 覆盖范围，并将早期项目按服务辅助型试点定价。
  - risk: 政策紧迫性过于不均，难以形成可复制的销售触发因素
    likelihood: Medium
    impact: High
    leadingIndicator: 前 15 个目标客户中，少于 3 个拥有已预算的替换时间表或正在进行的审查。
    mitigation: 聚焦已在审查中的公用事业客户，并将产品定位为提升采购速度和优化机队经济性，而不只是借势禁令新闻。
  - risk: 获批硬件与部件溯源仍受供给约束
    likelihood: Medium
    impact: Medium
    leadingIndicator: 由于客户无法采购到替代飞行器，或无法解决目标部件的溯源例外，试点被迫停滞。
    mitigation: 保持硬件中立，按航线关键性分阶段推进，并与能提供证明文件的分销商合作。
  - risk: 若无相邻市场扩张，公用事业滩头市场会显得过小
    likelihood: Medium
    impact: High
    leadingIndicator: 续费情况健康，但到第 18 个月时，没有相邻关键基础设施细分市场表现出可比的触发频率。
    mitigation: 围绕可移植的采购与迁移工作流来设计产品，并尽早测试电信、油气和公共部门的相邻机会。
operatingAssumptions:
- assumption: 公用事业客户能够导出足够多的 DJI 与相邻系统数据，以自动化迁移工作中首个有意义的部分。
  basis: research.yaml
  validationTest: 开展 5 次客户共享屏幕导出审计，并确认至少 70% 的所需工件可获得机器可读格式。
  decisionImpact: 如果不成立，就把产品收窄为人工完成的高价值资料包生成，或停止推进软件优先模式。
- assumption: 第一份合同可以由 UAS 项目负责人主导，采购与网络风险作为共同审批方，而不是独立买方。
  basis: idea.yaml
  validationTest: 在 10 个目标客户中梳理决策角色，并确认同一个倡导者能够同时推动试点与生产部署。
  decisionImpact: 如果不成立，就把产品与叙事重构为采购主导的合规软件，而不是运营主导的迁移工具。
- assumption: 按站点定价加迁移费用，符合公用事业企业为替换项目编制预算的方式。
  basis: idea.yaml
  validationTest: 在商机探索阶段测试 2 套定价方案，并在不要求一开始就采用全企业定价的前提下拿下至少 1 个付费试点。
  decisionImpact: 如果不成立，就转向按账户订阅或通过 OEM 渠道转售，而不是直接按站点定价。
- assumption: 在首批试点之后，OEM 与分销商合作将改善数据访问并降低举证负担。
  basis: research.yaml
  validationTest: 在 9 个月内拿下 2 个已签署的合作流程，可提供技术文档、转介绍渠道或溯源证明。
  decisionImpact: 如果不成立，就应预期销售周期更长，并为额外的解决方案工程师编制预算。
- assumption: 同一控制层在公用事业之后，还可以扩展到其他主权与关键基础设施无人机机队。
  basis: operator judgment
  validationTest: 在第 18 个月前完成 15 次相邻市场访谈，并拿下至少 2 个公用事业之外的付费设计合作。
  decisionImpact: 如果不成立，就应把公司视为一个利基型公用事业软件业务，并相应收紧融资与招聘。
experimentRoadmap:
- horizon: 0-90 days
  experiment: 与目标公用事业团队开展导出审计
  hypothesis: 现有的 DJI、AirData 和 Aloft 导出数据包含足够多的结构化信息，可自动化首个迁移工作流。
  successMetric: 完成 5 次导出审计，其中至少 3 次证明可机器读取日志、航线模板和维护记录。
  owner: 创始工程师
- horizon: 0-90 days
  experiment: 围绕运营、采购和网络风险开展买方地图访谈
  hypothesis: 如果产品也能满足采购证据需求，那么一位运营负责人就可以成为交易倡导者。
  successMetric: 完成 10 次访谈，并在至少 6 个客户中识别出一致的经济买方模式。
  owner: CEO
- horizon: 90-180 days
  experiment: 为 1 家公用事业企业与 1 组 OEM 组合开展首个付费迁移试点
  hypothesis: 服务辅助型 MVP 能够显著缩短首个获批非 DJI 任务的上线时间，从而足以支撑试点投入。
  successMetric: 签下 1 个付费试点，并在获得数据访问后的 8 周内交付首条获批航线。
  owner: CEO
- horizon: 90-180 days
  experiment: 与采购审核方开展溯源资料包接受度测试
  hypothesis: 采购团队会在真实审批工作流中使用标准化的部件来源与政策映射资料包。
  successMetric: 2 个采购团队审阅该资料包，且至少 1 个在真实审批流程中使用它。
  owner: 合规与产品负责人
- horizon: 6-12 months
  experiment: OEM 与分销商合作伙伴计划
  hypothesis: 如果产品能加快其转化成交，替代型 OEM 和经销商就会转介绍客户。
  successMetric: 签署 2 份转介绍或集成协议，并从合作伙伴处获得至少 3 个合格商机。
  owner: 客户经理与合作伙伴负责人
- horizon: 12-18 months
  experiment: 相邻垂直行业扩张测试
  hypothesis: 电信、油气或公有电力买方具有相同的迁移与溯源痛点模式。
  successMetric: 在投资者所有制公用事业企业之外拿下 2 个付费探索或试点项目。
  owner: CEO
operations:
- 面向飞行日志、航线模板、维护记录、飞手资质和政策文档的标准客户导入清单
- 覆盖 Skydio、Wingtra、Freefly 和 FLIR 工件映射的 OEM 集成测试框架
- 与可提供部件来源证明的分销商或经销商协同的溯源证据工作流
- 用于迁移期间 Remote ID、LAANC、豁免及操作流程变更的可复用审批模板
team:
- role: CEO
  startTiming: Month 0
  rationale: 负责创始人主导的公用事业销售、买方关系梳理，以及 OEM 或经销商合作拓展。
- role: 创始工程师
  startTiming: Month 0
  rationale: 基于首批客户工作流构建接入流水线、映射引擎和可复用的试点工具。
- role: 解决方案工程师
  startTiming: Month 3
  rationale: 执行服务辅助型迁移，捕捉边缘案例，并把定制工作转化为产品需求。
- role: 合规与产品负责人
  startTiming: Month 6
  rationale: 负责溯源资料包模板、审批工作流，以及面向运营与采购用户的产品路线图。
- role: 客户经理与合作伙伴负责人
  startTiming: Month 9
  rationale: 把创始人主导的试点转化为可复制的销售管道，并管理经销商与 OEM 的转介绍渠道。
milestones:
- horizon: 0-12 months
  items:
  - 签下 3 个具有明确获批设备或更新触发因素的付费公用事业迁移试点
  - 支持至少 2 个替代 OEM 工作流，并具备可复用的工件映射能力
  - 将 2 个试点转化为跨多个站点的年度生产部署
  - 上线 v1 采购资料包与溯源例外跟踪功能
- horizon: 12-24 months
  items:
  - 达到 10 个生产级公用事业站点，并实现可量化的迁移审批时间缩短
  - 将集成覆盖扩展到 4 个 OEM 或分销商数据源
  - 推出年度证明与供应商变更监测模块
  - 验证 1 个存在付费需求的相邻关键基础设施细分市场
- horizon: 24-36 months
  items:
  - 在公用事业和首个相邻细分市场中达到 25 个或更多生产级站点
  - 按航线类型与飞行器类别建立可防守的替换性能基准数据集
  - 验证一种合作伙伴辅助分销模式，使其贡献至少三分之一的合格销售管道
risks:
- risk: OEM API 与数据格式过于不一致，难以支撑软件主导的迁移
  likelihood: High
  impact: High
  mitigation: 收窄初始 OEM 范围，以服务辅助型试点打头阵，并仅自动化跨客户重复出现的工件。
- risk: 由于既有 DJI 机队可用时间长于预期，公用事业企业延后迁移
  likelihood: Medium
  impact: High
  mitigation: 聚焦正在接受审查的客户，并主打采购加速、溯源能力和机队经济性，而不只是被动替换。
- risk: 获批替代硬件仍然稀缺，或仍无法通过溯源检查
  likelihood: Medium
  impact: Medium
  mitigation: 坚持多 OEM 策略，按任务关键性安排迁移顺序，并依赖分销商证明工作流。
- risk: 公用事业滩头市场未能扩展为更大的多垂直业务
  likelihood: Medium
  impact: High
  mitigation: 尽早测试相邻细分市场，并避免在尚无证据证明控制层可泛化前提前招聘。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月证明：3 个付费公用事业试点、2 个生产转化、一个可复用的按站点迁移产品、4 个 OEM 或分销商集成，以及同一控制层可扩展到公用事业之外的证据。
