scenarios:
  downside:
    description: "Policy urgency stays uneven, sales cycles extend by one quarter, and OEM data gaps keep the business more services-heavy."
    y3RevenueK: 2520.0
    y3EbitdaK: -640.0
    cashLowPointK: 340.0
    keyAssumptionChanges:
      - "New account adds slip by roughly one quarter."
      - "Production ARPU lands about 10% below base."
      - "Y3 gross margin only reaches about 65%."
  base:
    description: "Three paid pilots in year 1 compound into 18 paying accounts by year 3, with margin improving as repeatable OEM mappings replace custom work."
    y3RevenueK: 3602.5
    y3EbitdaK: 310.8
    cashLowPointK: 1280.3
    keyAssumptionChanges:
      - "Pilot fee remains $50K and production revenue ramps from about $198K to $246K per account."
      - "Gross margin improves from 60% in Y1 to 71% in Y3."
      - "Hiring stays signal-led, reaching 11 FTE by Q4Y3."
  upside:
    description: "Replacement urgency accelerates, partner referrals contribute earlier, and second-site expansions happen faster inside each utility account."
    y3RevenueK: 4530.0
    y3EbitdaK: 780.0
    cashLowPointK: 1520.0
    keyAssumptionChanges:
      - "Partner-sourced pipeline lifts paid account count above base by 3-4 logos."
      - "More accounts reach the $246K mature revenue level sooner."
      - "Gross margin crosses 73% by Y3 as repeatable integrations improve."
sensitivity:
  - variable: ARPU
    downsideCase: "Production account revenue 10% below base because buyers cap first-year scope at fewer sites."
    baseCase: "Recurring revenue starts near $198K and matures toward $246K per account."
    upsideCase: "Accounts expand faster into 3-4 sites and land near the top of the BP contract range."
    y3RevenueImpactK: -360.3
    cashImpactK: -255.0
  - variable: CAC
    downsideCase: "CAC rises to $75K as founder-led outbound underperforms and partner referrals arrive late."
    baseCase: "Blended CAC stays near $55K with founder-led selling plus targeted referrals."
    upsideCase: "CAC falls to $40K once reseller and OEM introductions contribute meaningfully."
    y3RevenueImpactK: -180.0
    cashImpactK: -360.0
  - variable: churn
    downsideCase: "Monthly churn reaches 3% because early deployments do not expand beyond the initial workflow."
    baseCase: "Monthly churn is modeled at 2% until renewal data exists."
    upsideCase: "Monthly churn settles near 1% once the product becomes a system of record."
    y3RevenueImpactK: -290.0
    cashImpactK: -220.0
  - variable: sales cycle
    downsideCase: "Average cycle stretches from 6 to 9 months because procurement and cyber review stay separate."
    baseCase: "Average first sale closes in about 6 months."
    upsideCase: "Cycle compresses to 4-5 months for triggered replacement accounts introduced by partners."
    y3RevenueImpactK: -540.0
    cashImpactK: -390.0
  - variable: gross margin
    downsideCase: "Margin stalls at 65% in Y3 because route and record translation remain custom."
    baseCase: "Margin ramps to roughly 70% steady-state and 71% in Y3."
    upsideCase: "Margin reaches 73%+ as reusable mappings and templates dominate delivery."
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
  - variable: hiring pace
    downsideCase: "Two hires are pulled forward before pilot proof, increasing burn without faster revenue."
    baseCase: "Hiring remains tied to paid pilots, production conversions, and partner evidence."
    upsideCase: "One GTM hire shifts later until Q2Y2 traction is visible."
    y3RevenueImpactK: 0.0
    cashImpactK: -420.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Target utility accounts] --> Discovery[Qualified discovery]
      Discovery --> Pilots[Paid pilots]
      Pilots --> Production[Production accounts]
      Production --> Expansion[Second-site expansion]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case Y3 revenue comes from 18 paying accounts compounding from $50K pilots into roughly $198K-$246K production accounts, not from broad SMB volume."
  - checkName: Must go right
    finding: "OEM and adjacent-system data has to normalize enough for gross margin to move from 60% in Y1 to about 70% steady state."
  - checkName: Model breaks if
    finding: "If sales cycles stretch by a quarter and ARPU lands 10% low, downside Y3 revenue falls to about $2.5M and cash cushion compresses toward $340K."
  - checkName: Next-round proof
    finding: "The next financing is justified by reaching 10 production utility sites, four integrations, and one adjacent paid design partner inside the pre-seed runway."
sanityChecks:
  ruleOf40: "Y3 growth 112.6% + EBITDA margin 8.6% = 121.2%"
  burnMultiple: "Y2 net burn $482K / net new revenue $1.35M = 0.4x, though implementation-heavy revenue likely flatters this versus pure SaaS."
  revenuePerFte: "$327K Y3 on 11 Q4 FTE (benchmark $200-400K SaaS)"
  flags:
    - "The model assumes the $2.3M pre-seed closes at the start month; without it the company runs out of cash before enough pilots convert."
    - "Y3 revenue already leans on most of the researched utility SOM, so non-utility adjacency should be viewed as upside to the next round, not hidden base-case revenue."
    - "Gross margin improvement is the key model risk because the research repeatedly warns that weak OEM/API portability could turn this into a lower-margin services business."
    - "CAC and churn remain heuristic because the company has not yet observed a full renewal cohort or scaled partner-led acquisition channel."
