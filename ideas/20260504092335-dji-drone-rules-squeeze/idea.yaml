differentiator: >-
  This is not another drone OEM pitch. The company owns the ugly middle between
  field operations, procurement, and security policy by translating missions,
  packaging provenance evidence, and benchmarking cross-platform fleet economics.
  As migrations accumulate, it builds unique data on what approved hardware can
  actually replace specific DJI workflows, creating a defensible control layer
  for compliant fleet swaps.
