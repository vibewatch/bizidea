jobsToBeDone:
  - job: When a security review freezes new DJI purchases, help a utility UAS manager migrate recurring inspection missions to an approved fleet, so they can keep flights running without rewriting every SOP.
    currentAlternative: Spreadsheets, OEM services, and manual pilot retraining
    successMetric: Time to first approved non-DJI mission and percentage of legacy routes ported
  - job: When procurement asks for component origin and policy evidence, help cyber-risk and sourcing teams generate an auditable approval packet, so they can release budget faster.
    currentAlternative: Email chains with distributors and PDF spec sheets
    successMetric: Days to procurement approval and number of unresolved supply-chain exceptions
