problem: >-
  Utility drone programs adopted DJI because it delivered reliable aircraft,
  strong cameras, and manageable economics for routine inspections. Now
  security-led restrictions and Chinese policy changes are turning that
  standardization into a liability just as operators need continuity in flight
  ops. Replacing fleets is painful because approved alternatives cost more,
  critical components still trace back to China, and every migration forces
  teams to rework missions, training, maintenance records, and procurement
  evidence.
targetUser:
  primary: UAS program managers at U.S. electric utilities running drones for transmission, substation, and storm-damage inspections
  secondary: Procurement, cyber-risk, and maintenance leaders responsible for approved-equipment transitions
  buyer: Director of UAS Programs, VP Transmission Operations, or asset-security lead
startupThesis:
  nonObviousInsight: The hard part of replacing DJI is not picking a new airframe; it is proving mission continuity and component provenance well enough for security and procurement teams to sign off.
  beachhead: DJI-to-approved-fleet migration for mid-size U.S. electric utilities with 20-200 pilots and recurring transmission inspection routes
  wedge: Software-plus-integration layer that ports flight plans, checklists, maintenance logs, and pilot qualification records onto approved drones while generating provenance and policy packets for procurement approval
  whyNowCatalyst: DJI is being squeezed by both Chinese and U.S. restrictions while replacements remain 2-5x more expensive and China-dependent, forcing operators to justify and execute swaps now.
  ventureScalePath: Start with utility fleet migration, then become the system of record for sovereign small-UAS procurement, mission portability, and compliant component sourcing across utilities, public safety, telecom, oil and gas, and allied defense programs.
solution: >-
  The product ingests DJI flight histories, route templates, maintenance logs,
  and pilot records, then maps them into approved-fleet equivalents so teams do
  not restart operating procedures from scratch. It generates a procurement
  packet with component-origin attestations, security-policy mappings, and a
  documented gap list for any unresolved supplier exposure. The system also
  models mission-level economics so operators can see where they need premium
  aircraft versus where lower-cost compliant platforms work. Over time, the
  company becomes the migration and compliance layer sitting above multiple
  drone OEMs instead of competing as yet another hardware vendor.
goToMarketSeed:
  firstCustomer: Regional U.S. electric utilities that already use DJI for line inspections and now face a board, regulator, insurer, or security review on foreign-made operational tech
  buyingTrigger: A new approved-equipment policy, security review, expiring DJI procurement contract, or post-storm budget cycle that forces fleet refresh
  currentAlternative: Manual migration in spreadsheets, OEM professional services, internal builds, and delaying replacement while keeping legacy DJI fleets alive
  switchingReason: The wedge cuts months of revalidation work, preserves pilot workflows, and gives procurement a defensible provenance packet instead of a costly blank-sheet replacement
  pricingHypothesis: Platform fee per active aircraft site plus paid migration projects and annual compliance attestation modules
