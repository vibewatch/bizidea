topRisks:
  - name: OEM integration gaps
    description: If approved drone vendors expose limited APIs or incompatible formats, migration automation could stall and turn into services-heavy work.
    mitigation: Start with the highest-value export and log formats, package expert-led migration services, and partner with OEMs that want accelerated replacement wins.
  - name: Uneven policy urgency
    description: Some operators may delay replacement if restrictions stay fragmented or grandfathered fleets remain usable for longer than expected.
    mitigation: Target accounts with active security reviews and sell procurement-speed, provenance, and fleet-cost optimization rather than relying only on ban headlines.
  - name: Compliant hardware shortages
    description: Customers may want to switch but still struggle to source approved aircraft, batteries, or motors at scale.
    mitigation: Stay hardware-agnostic, integrate multi-OEM availability data, and help customers phase migrations by route criticality instead of promising instant full replacement.
