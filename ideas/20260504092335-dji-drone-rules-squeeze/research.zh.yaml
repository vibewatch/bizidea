  weaknessVsUs: 更聚焦持续飞行治理，而不是机队替换与溯源翻译。
  sourceRefs:
  - 23
  - 24
  - 40
- name: AirData
  stage: 成长期
  wedge: 机队分析、日志、维护与合规报表平台。
  pricing: 从公开计划价格起步，再向企业版扩展
  strength: 记录能力深，且已服务大规模机队，包括公用事业相邻场景。
  weaknessVsUs: 更偏分析，不会默认解决采购材料打包或跨 OEM 航线翻译。
  sourceRefs:
  - 21
  - 22
  - 39
- name: FlyFreely
  stage: 成长期
  wedge: 企业级无人机治理、承包商管理与 LAANC 工作流平台。
  pricing: 公开付费套餐 + 企业升级
  strength: 项目治理工具较全，且已有电力行业参考案例。
  weaknessVsUs: 治理广度有价值，但关于 legacy DJI 任务与记录技术迁移的证据相对更薄。
  sourceRefs:
  - 25
  - 26
  - 34
regulatoryTechnicalConstraints:
- point: Remote ID 适用于注册无人机作业，为任何新机队选择都加上一层基础合规要求。
  sourceRefs:
  - 4
- point: Part 107 豁免和超人群飞行规则意味着，一些任务不能直接照搬，必须先核查机型与任务本身是否符合资格。
  sourceRefs:
  - 5
  - 6
- point: 受控空域准入取决于 LAANC 和获批 UAS 服务提供方，因此迁移中还会多出一层系统依赖。
  sourceRefs:
  - 7
- point: 对获批机型和溯源的期待，正越来越多地受到 Blue UAS 及相邻采购安全框架塑造。
  sourceRefs:
  - 8
  - 28
- point: 数据可移植性是可行但不完美的：现有工具能导入 DJI 日志，但这不保证不同 OEM 之间能完整保留航线、载荷或维护记录的一致性。
  sourceRefs:
  - 21
  - 24
  - 39
- point: 开源任务工具确实存在，这会降低技术团队的切换门槛，但同时提高支持、集成和审计负担。
  sourceRefs:
  - 31
  - 32
  - 33
validationSignals:
- point: UPI 和 TNW 都把 DJI 面临的政策冲击描述为真实事件，而不是泛泛的反华情绪炒作。
  sourceRefs:
  - 1
  - 2
  - 3
- point: Dominion Energy 在 BVLOS 豁免下使用 Skydio 做电力设施巡检，说明公用事业客户已经在更复杂的监管框架中运行。
  sourceRefs:
  - 16
- point: AirData 提到 PG&E 和超过 120 名飞手的机队，说明与公用事业相邻的大型无人机项目已经大到需要专门运营软件。
  sourceRefs:
  - 21
- point: Skydio 宣布投资 $3.5B 扩建美国制造能力，强化了本土无人机供应叙事的势能。
  sourceRefs:
  - 18
- point: Wingtra 直接以 NDAA 和 DIU 审批姿态进行营销，说明替换需求已经同时围绕合规和性能展开销售。
  sourceRefs:
  - 28
- point: FlyFreely 公开展示电力行业案例，说明专门的治理软件已经在公用事业相邻场景里找到需求。
  sourceRefs:
  - 34
openQuestions:
- 今天到底有多少家美国中型公用事业公司正处在活跃的获批设备或外国技术审查中，而不是只是关注政策风险？
- 哪些 OEM 开放了足够多的 API 与数据结构，能把航线、检查清单和维护记录翻译到可接受精度？
- 买方会更偏好独立的迁移层，还是期待产品把服务和分销关系一起打包，才能顺利批预算？
- 在收集到分销商证明之后，“获批”替代机队里仍然有多少中国来源部件暴露无法消除？
