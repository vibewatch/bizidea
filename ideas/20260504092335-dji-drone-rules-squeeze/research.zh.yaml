  - 24
  - 40
- name: AirData
  stage: scale-up
  wedge: 机队分析、日志、维护与合规报告。
  pricing: 从公开套餐定价起步，再向企业版扩展
  strength: 记录管理能力深厚，并已在包括公用事业类项目在内的大型机队中得到验证。
  weaknessVsUs: 分析优先的定位并不能天然解决采购资料打包或跨 OEM 航线转换问题。
  sourceRefs:
  - 21
  - 22
  - 39
- name: FlyFreely
  stage: scale-up
  wedge: 企业级无人机治理、承包商管理和 LAANC 工作流。
  pricing: 公开付费层级，向企业版升级销售
  strength: 项目治理工具能力与电力行业案例背书。
  weaknessVsUs: 治理覆盖面虽有价值，但在遗留 DJI 任务与记录的技术迁移方面，证据基础较薄。
  sourceRefs:
  - 25
  - 26
  - 34
regulatoryTechnicalConstraints:
- point: Remote ID 适用于已注册无人机运营，并为任何新的机队选择增加了基础合规要求。
  sourceRefs:
  - 4
- point: Part 107 豁免和在人群上空飞行规则意味着，一些任务不能在不检查飞行器和运营特定资格的情况下直接迁移。
  sourceRefs:
  - 5
  - 6
- point: 受控空域访问依赖 LAANC 和获批 UAS 服务供应商，这在迁移期间又增加了一层系统依赖。
  sourceRefs:
  - 7
- point: 获批飞行器和溯源要求正越来越受到 Blue UAS 及相关采购安全框架的影响。
  sourceRefs:
  - 8
  - 28
- point: 数据可移植性是可行的，但并不完美：现有工具能够导入 DJI 日志，但这并不保证在不同 OEM 之间实现完整的航线、载荷或维护一致性。
  sourceRefs:
  - 21
  - 24
  - 39
- point: 开源任务工具确实存在，它降低了技术团队的切换成本，但增加了支持、集成和审计负担。
  sourceRefs:
  - 31
  - 32
  - 33
validationSignals:
- point: UPI 和 TNW 都描述了围绕 DJI 的真实政策冲击，而不仅仅是猜测性的反华言论。
  sourceRefs:
  - 1
  - 2
  - 3
- point: Dominion Energy 被引用为在 BVLOS 豁免下使用 Skydio 进行电力设施巡检，这表明公用事业企业已经在更高级的监管框架下运营。
  sourceRefs:
  - 16
- point: AirData 提到 PG&E 及超过 120 名飞手的机队，这证明企业级、公用事业相关的无人机项目规模已经足够大，需要专门的运营软件。
  sourceRefs:
  - 21
- point: Skydio 宣布在美国投入 $3.5B 制造承诺，进一步强化了本土无人机供应的叙事动能。
  sourceRefs:
  - 18
- point: Wingtra 直接宣传其 NDAA 和 DIU 审批资质，这表明替换需求已经同时围绕合规性和性能进行销售。
  sourceRefs:
  - 28
- point: FlyFreely 公开引用电力行业案例，这表明专门的治理软件已经找到了类似公用事业的需求。
  sourceRefs:
  - 34
openQuestions:
- 今天究竟有多少美国中型公用事业企业正处于主动的获批设备或外国技术审查之中，而不只是被动关注政策风险？
- 哪些 OEM 开放了足够多的 API 和数据结构，能够以可接受的准确度自动化航线、检查清单和维护记录的转换？
- 买方会偏好独立的迁移层，还是会期待产品捆绑服务与分销商关系，以便拿到预算批准？
- 在收集分销商证明后，“获批”替代机队中究竟还剩下多少未解决的中国来源部件暴露？
