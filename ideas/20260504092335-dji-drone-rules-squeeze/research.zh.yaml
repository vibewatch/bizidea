  pestle:
  - factor: political
    impact: positive
    point: 围绕中国无人机供应商的地缘政治与采购审查，为获批机队迁移创造了强制性驱动力。
    sourceRefs:
    - 1
    - 2
    - 8
  - factor: economic
    impact: negative
    point: 替代硬件仍明显更贵，因此买方可能会分阶段迁移，或延迟全面替换。
    sourceRefs:
    - 3
  - factor: social
    impact: positive
    point: 公用事业企业越来越把无人机巡检视为提升员工安全的手段，这有助于在机队切换期间维持项目运行。
    sourceRefs:
    - 15
    - 17
  - factor: technological
    impact: positive
    point: 自主飞行、机库运营和云端机队软件，使重复性巡检工作流在原则上变得更结构化，也因此更具可移植性。
    sourceRefs:
    - 13
    - 15
    - 23
  - factor: legal
    impact: negative
    point: Remote ID、豁免、LAANC 以及在人群上空飞行规则，都会给任何机队切换增加文档与审批摩擦。
    sourceRefs:
    - 4
    - 5
    - 6
    - 7
