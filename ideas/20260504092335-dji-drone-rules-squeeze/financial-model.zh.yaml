scenarios:
  downside:
    description: 政策紧迫性仍不均衡，销售周期延长 1 个季度，且 OEM 数据缺口使业务更偏向服务型。
    y3RevenueK: 2520.0
    y3EbitdaK: -640.0
    cashLowPointK: 340.0
    keyAssumptionChanges:
    - 新增客户大致延后 1 个季度。
    - 生产阶段 ARPU 比基准低约 10%。
    - Y3 毛利率仅达到约 65%。
  base:
    description: 第 1 年的 3 个付费试点，逐步滚动成第 3 年的 18 个付费客户；随着可复用的 OEM 映射取代定制工作，毛利率同步改善。
    y3RevenueK: 3602.5
    y3EbitdaK: 310.8
    cashLowPointK: 1280.3
    keyAssumptionChanges:
    - 试点费用保持在 $50K，生产收入则从每客户约 $198K 提升到 $246K。
    - 毛利率从 Y1 的 60% 提升到 Y3 的 71%。
    - 招聘仍以业务信号为导向，到 Q4Y3 达到 11 名 FTE。
  upside:
    description: 替换紧迫性加速上升，合作伙伴转介绍更早贡献业绩，且每个公用事业客户内部的第二站点扩张更快发生。
    y3RevenueK: 4530.0
    y3EbitdaK: 780.0
    cashLowPointK: 1520.0
    keyAssumptionChanges:
    - 合作伙伴带来的销售管道使付费客户数比基准多出 3-4 个 logo。
    - 更多客户更早达到 $246K 的成熟收入水平。
    - 随着可复用集成能力改善，Y3 毛利率超过 73%。
sensitivity:
- variable: ARPU
  downsideCase: 由于买方将首年范围限制在更少站点，生产客户收入比基准低 10%。
  baseCase: 经常性收入从约 $198K 起步，并逐步成熟到每客户 $246K。
  upsideCase: 客户更快扩展到 3-4 个站点，并接近 BP 合同区间上限。
  y3RevenueImpactK: -360.3
  cashImpactK: -255.0
- variable: CAC
  downsideCase: 由于创始人主导的外呼表现不佳且合作伙伴转介绍来得较晚，CAC 上升到 $75K。
  baseCase: 在创始人主导销售加定向转介绍的情况下，混合 CAC 保持在 $55K 左右。
  upsideCase: 一旦经销商和 OEM 引荐开始产生实质贡献，CAC 下降到 $40K。
  y3RevenueImpactK: -180.0
  cashImpactK: -360.0
- variable: churn
  downsideCase: 由于早期部署未能扩展到初始工作流之外，月流失率升至 3%。
  baseCase: 在尚无续费数据之前，模型按 2% 的月流失率处理。
  upsideCase: 一旦产品成为主记录系统，月流失率会稳定在接近 1%。
  y3RevenueImpactK: -290.0
  cashImpactK: -220.0
- variable: 销售周期
  downsideCase: 由于采购与网络审查仍然分离，平均周期从 6 个月拉长到 9 个月。
  baseCase: 平均首单约在 6 个月内成交。
  upsideCase: 对于由合作伙伴引入、已被触发替换需求的客户，周期压缩到 4-5 个月。
  y3RevenueImpactK: -540.0
  cashImpactK: -390.0
- variable: 毛利率
  downsideCase: 由于航线与记录转换仍需定制，Y3 毛利率停留在 65%。
  baseCase: 毛利率爬升至约 70% 的稳态水平，并在 Y3 达到 71%。
  upsideCase: 当可复用映射与模板成为交付主体后，毛利率达到 73%+。
  y3RevenueImpactK: 0.0
  cashImpactK: -220.0
- variable: 招聘节奏
  downsideCase: 在试点验证前提前招聘 2 人，导致烧钱增加却未带来更快收入。
  baseCase: 招聘仍与付费试点、生产转化和合作伙伴证据挂钩。
  upsideCase: 1 个 GTM 岗位推迟到 Q2Y2 看到牵引力后再招聘。
  y3RevenueImpactK: 0.0
  cashImpactK: -420.0
modelDiagram:
  title: 单元经济流转
  mermaid: |
    flowchart LR
      Leads[目标公用事业客户] --> Discovery[合格商机探索]
      Discovery --> Pilots[付费试点]
      Pilots --> Production[生产客户]
      Production --> Expansion[第二站点扩张]
      Expansion --> Revenue[收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金跑道]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下的 Y3 收入来自 18 个付费客户，它们从 $50K 的试点逐步转化为约 $198K-$246K 的生产客户，而不是依赖广泛 SMB 量。
- checkName: 必须做对的事
  finding: OEM 与相邻系统的数据必须足够标准化，才能让毛利率从 Y1 的 60% 提升到约 70% 的稳态。
- checkName: 模型失效条件
  finding: 如果销售周期拉长 1 个季度且 ARPU 低 10%，下行情景的 Y3 收入会降至约 $2.5M，现金缓冲也会压缩到约 $340K。
- checkName: 下一轮融资证明
  finding: 下一轮融资的正当性来自于：在 pre-seed 跑道内达到 10 个生产级公用事业站点、4 个集成，以及 1 个相邻领域付费设计伙伴。
sanityChecks:
  ruleOf40: Y3 growth 112.6% + EBITDA margin 8.6% = 121.2%
  burnMultiple: Y2 净烧钱 $482K / 净新增收入 $1.35M = 0.4x，不过实施收入占比较高，可能使这一指标相对纯 SaaS 更好看。
  revenuePerFte: Y3 每名员工对应收入 $327K，对应 Q4 的 11 名 FTE（基准为 $200-400K SaaS）。
  flags:
  - 模型假设 $2.3M 的 pre-seed 融资在起始月份完成；没有这笔钱，公司会在足够多试点转化之前耗尽现金。
  - Y3 收入已经覆盖了研究所得公用事业 SOM 的大部分，因此非公用事业相邻市场应被视为下一轮融资的上行空间，而不是隐藏的基准收入。
  - 毛利率改善是模型的关键风险，因为研究反复警告，OEM/API 可移植性偏弱可能把业务拖成低毛利服务。
  - CAC 与流失率仍属于启发式估计，因为公司尚未观察到完整续费批次，也尚未跑通规模化的合作伙伴获客渠道。
