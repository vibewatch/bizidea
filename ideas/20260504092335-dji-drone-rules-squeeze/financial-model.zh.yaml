slug: drone-fleet-migration-os
date: '2026-05-04'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 交割后的起始现金
  value: '2450'
  unit: USDK
  source: '[BP fundingAsk 区间 $2-4M] + [创业财务启发式：假设创始人现金 $150K，且模型起始时完成 $2.3M pre-seed 融资]'
- id: A2
  name: 交割时创始人资本
  value: '150'
  unit: USDK
  source: '[创业财务启发式：机构轮之前由创始人提供的营收前启动资金]'
- id: A3
  name: 模型起始时的 pre-seed 融资
  value: '2300'
  unit: USDK
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M]，基准情景采用区间偏下中位的融资额'
- id: A4
  name: 起始付费客户数（M1）
  value: '0'
  unit: accounts
  source: '[BP sixMonth 和 experimentRoadmap 表明试点在初步探索后启动，而非模型起始时启动]'
- id: A5
  name: 每个新客户的付费试点 / 实施费用
  value: '50'
  unit: USDK per account
  source: '[BP firstCustomer.initialContract $40K-80K 付费迁移试点]，模型按接近中位数的 $50K 计算'
- id: A6
  name: 转入生产前的试点周期
  value: '2'
  unit: months
  source: '[BP experimentRoadmap 成功指标：在获得数据访问后的 8 周内交付首条获批航线]'
- id: A7
  name: 每个转化客户的生产期经常性收入
  value: '198'
  unit: USDK per year
  source: '[Research market.som 每个客户约 $200K 的混合年化收入] + [BP firstCustomer.initialContract $120K-250K 年度订阅与证明支出]'
- id: A8
  name: 第二站点扩张后的单客户成熟收入
  value: '246'
  unit: USDK per year
  source: '[BP funnelTargets：生产客户在 6 个月内扩展到第二站点的比例为 50%+] + [BP firstCustomer.initialContract 上限 $250K]'
- id: A9
  name: 年末付费客户数
  value: 3 / 11 / 18
  unit: accounts in Y1 / Y2 / Y3
  source: '[BP 里程碑：3 个付费试点、2 个生产转化、25+ 个生产站点] + [Research SOM：到第 3 年有 18 个高紧迫度项目]'
- id: A10
  name: 每个生产客户的平均成熟站点数
  value: 约 3
  unit: sites per account
  source: '[BP firstCustomer.initialContract：生产阶段有 2-4 个站点]，模型对成熟客户群按 3 个站点/客户计算'
- id: A11
  name: 目标稳态毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A12
  name: 模型中的毛利率爬坡
  value: 60 / 67 / 71
  unit: percent in Y1 / Y2 / Y3
  source: '[BP 目标 GM 70%] + [Research 敏感性情景：OEM/API 可移植性弱会使业务早期偏向服务]'
- id: A13
  name: 单元经济模型中的月流失率
  value: '2.0'
  unit: percent
  source: '[创业财务启发式：在看到续费数据前，采用保守的早期企业客户流失率占位值]'
- id: A14
  name: 每个付费客户的混合 CAC
  value: '55'
  unit: USDK
  source: '[BP 创始人主导的公用事业销售 + 合作伙伴转介绍] + [适用于狭窄企业合规工作流销售的创业财务启发式]'
- id: A15
  name: 典型初始销售周期
  value: '6'
  unit: months
  source: '[BP 多方参与的公用事业采购流程与采购审查路径] + [企业销售启发式]'
- id: A16
  name: 人员规模快照
  value: 2 / 3 / 4 / 5 / 8 / 11
  unit: FTE at Q1Y1 / Q2Y1 / Q3Y1 / Q4Y1 / Q4Y2 / Q4Y3
  source: '[BP team startTiming]，仅在试点转化后保守增员'
- id: A17
  name: 全成本年薪区间
  value: $144K CEO; $192K 创始工程师; $156K 解决方案工程师; $180K 合规与产品负责人; $168K AE; $180K 后续工程师; $132K 客户成功; $120K G&A 经理
  unit: USDK annualized
  source: '[创业财务启发式：美国早期创业公司现金薪酬，叠加 20% 薪资税/福利负担]'
- id: A18
  name: 非薪酬运营费用爬坡
  value: R&D $8K-$18K/mo; S&M $5K-$18K/mo; G&A $6K-$12K/mo
  unit: USDK per month
  source: '[锚定服务企业现场运营买方的精益 pre-seed 软件公司的创业财务启发式]'
- id: A19
  name: 融资缓冲
  value: '6'
  unit: months
  source: '[agent contract：融资需求应包含 6 个月缓冲]'
- id: A20
  name: 下一轮融资证明点
  value: 10 个生产级公用事业站点、4 个 OEM 或分销商集成，以及 1 个相邻领域付费设计伙伴
  unit: milestone
  source: '[BP 12-24 个月里程碑] + [BP fundingAsk.useOfFundsSummary]'
- id: A21
  name: 资金用途分配
  value: 40 / 27 / 10 / 23
  unit: percent for Engineering / GTM / G&A / Buffer
  source: '[人员计划] + [创业财务启发式：以薪酬为主的 pre-seed 支出，并设有明确储备]'
