scenarios:
  downside:
    description: 政策紧迫度仍不均、销售周期再拉长一个季度，而 OEM 数据缺口让业务继续偏向重服务。
    y3RevenueK: 2520
    y3EbitdaK: -640
    cashLowPointK: 340
    keyAssumptionChanges:
      - 新增账户获取整体推迟约一个季度。
      - 生产期 ARPU 比基准低约 10%。
      - Y3 毛利率只能爬到约 65%。
  base:
    description: 第 1 年的 3 个付费试点，滚动沉淀成第 3 年的 18 个付费账户；随着可复用 OEM 映射替代定制工作，毛利率持续改进。
    y3RevenueK: 3602.5
    y3EbitdaK: 310.8
    cashLowPointK: 1280.3
    keyAssumptionChanges:
      - 试点费维持 $50K，生产期收入从每账户约 $198K 爬升到 $246K。
      - 毛利率从 Y1 的 60% 改进到 Y3 的 71%。
      - 招聘保持信号驱动，到 Q4Y3 达到 11 名 FTE。
  upside:
    description: 替换紧迫度加速，合作伙伴转介绍更早发力，同时每个公用事业账户内部的第二站点扩张来得更快。
    y3RevenueK: 4530
    y3EbitdaK: 780
    cashLowPointK: 1520
    keyAssumptionChanges:
      - 合作伙伴带来的管线让付费账户数比基准多出 3-4 个 logo。
      - 更多账户更早达到 $246K 的成熟收入水平。
      - 随着可复用集成增强交付效率，Y3 毛利率突破 73%。
sensitivity:
  - variable: ARPU
    downsideCase: 由于买方把首年范围压缩到更少站点，生产账户收入比基准低 10%。
    baseCase: 经常性收入从约 $198K 启动，并逐步成熟到每账户约 $246K。
    upsideCase: 账户更快扩展到 3-4 个站点，接近 BP 合同区间上沿。
    y3RevenueImpactK: -360.3
    cashImpactK: -255
  - variable: CAC
    downsideCase: 如果创始人外呼效果不佳、合作转介绍来得更晚，CAC 会升到 $75K。
    baseCase: 在创始人直销加定向转介绍的组合下，混合 CAC 维持在约 $55K。
    upsideCase: 一旦经销商和 OEM 介绍开始贡献，CAC 可降到 $40K。
    y3RevenueImpactK: -180
    cashImpactK: -360
  - variable: churn
    downsideCase: 如果前期部署始终扩不出初始流程，月流失率会升到 3%。
    baseCase: 在拿到真实续约数据前，模型暂按 2% 月流失率估算。
    upsideCase: 一旦产品坐稳记录系统位置，月流失率可降到 1% 左右。
    y3RevenueImpactK: -290
    cashImpactK: -220
  - variable: sales cycle
    downsideCase: 由于采购与网络审查始终分离，平均销售周期从 6 个月拉长到 9 个月。
    baseCase: 平均首单在约 6 个月内成交。
    upsideCase: 对于由合作伙伴介绍、且已有明确替换触发的账户，销售周期可压到 4-5 个月。
    y3RevenueImpactK: -540
    cashImpactK: -390
  - variable: gross margin
    downsideCase: 如果航线与记录翻译一直偏定制，Y3 毛利率会卡在 65%。
    baseCase: 毛利率爬升到约 70% 稳态，并在 Y3 达到 71%。
    upsideCase: 若可复用映射与模板成为交付主力，毛利率可在 Y3 突破 73%。
    y3RevenueImpactK: 0
    cashImpactK: -220
  - variable: hiring pace
    downsideCase: 在试点证据不足前提前招了两个人，只会抬高现金消耗而不会带来更快收入。
    baseCase: 招聘节奏与付费试点、生产转化和合作信号挂钩。
    upsideCase: 若到 Q2Y2 再看见清晰 traction，可把一个 GTM 招聘延后。
    y3RevenueImpactK: 0
    cashImpactK: -420
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads[目标公用事业账户] --> Discovery[合格发现]
      Discovery --> Pilots[付费试点]
      Pilots --> Production[生产账户]
      Production --> Expansion[第二站点扩张]
      Expansion --> Revenue[收入]
      Revenue --> GrossProfit[毛利]
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景下的 Y3 收入来自 18 个付费账户从 $50K 试点逐步滚成约 $198K-$246K 的生产账户，而不是靠大规模 SMB 数量堆出来。
  - checkName: 必须跑通的关键点
    finding: OEM 与相邻系统数据必须够可标准化，才能让毛利率从 Y1 的 60% 抬升到约 70% 的稳态水平。
  - checkName: 模型失效条件
    finding: 如果销售周期拉长一个季度、且 ARPU 比预期低 10%，悲观情景下 Y3 收入会掉到约 $2.5M，现金缓冲会压缩到约 $340K。
  - checkName: 下一轮融资证实
    finding: 只有在 pre-seed 跑道内做到 10 个生产级公用事业站点、4 个集成和 1 个相邻行业付费设计合作，下一轮融资理由才够充分。
sanityChecks:
  ruleOf40: Y3 增长 112.6% + EBITDA 利润率 8.6% = 121.2%
  burnMultiple: Y2 净消耗 $482K / 净新增收入 $1.35M = 0.4x，不过实施收入占比较高，会让这个数看起来比纯 SaaS 更漂亮。
  revenuePerFte: $327K Y3 / 11 名 Q4 FTE（SaaS 对标区间约 $200-400K）
  flags:
    - 模型假设 $2.3M 的 pre-seed 在起始月份到账；如果拿不到这笔钱，公司会在够多试点转生产前先耗尽现金。
    - Y3 收入已吃掉了研究中大部分公用事业 SOM，因此非公用事业扩张应被视为下一轮融资的上行，而不是偷偷塞进基准情景的隐藏收入。
    - 毛利率改进是模型里的关键风险，由于研究反复提示：如果 OEM/API 可移植性不够，业务会滑向更低毛利的服务模式。
    - CAC 与 churn 目前仍属启发式估算，由于公司还没有跑过完整续约 cohort，也没有建立起规模化合作获客渠道。
