assumptions:
  - id: A1
    name: 融资完成后之期初现金
    value: "2450"
    unit: USDK
    source: >-
      [BP fundingAsk range $2-4M] + [startup-finance heuristic: 假设模型起始时创始人现金投入 $150K，并完成一笔 $2.3M 的 pre-seed
      融资]
  - id: A2
    name: 融资完成时的创始人资本
    value: "150"
    unit: USDK
    source: "[startup-finance heuristic: 机构募资前由创始人投入的前期启动资金]"
  - id: A3
    name: 模型起始时的 pre-seed 融资额
    value: "2300"
    unit: USDK
    source: "[BP fundingAsk.targetFundingRangeUsd $2-4M]，基准情景取区间偏下中位的一档"
  - id: A4
    name: 期初付费客户数（M1）
    value: "0"
    unit: accounts
    source: "[BP sixMonth 和 experimentRoadmap 暗示试点会在初期发现阶段之后才启动，而不是模型起始即成交]"
  - id: A5
    name: 每个新账户的付费试点 / 实施费
    value: "50"
    unit: USDK per account
    source: "[BP firstCustomer.initialContract $40K-80K paid migration pilot]，模型取接近中位的 $50K"
  - id: A6
    name: 试点转生产前的周期
    value: "2"
    unit: months
    source: "[BP experimentRoadmap success metric: 获得数据后 8 周内交付第一条获批航线]"
  - id: A7
    name: 每个完成转化账户的生产期经常性收入
    value: "198"
    unit: USDK per year
    source: >-
      [Research market.som 约 $200K 的单账户混合年化收入] + [BP firstCustomer.initialContract $120K-250K annual
      subscription and attestation]
  - id: A8
    name: 第二站点扩张后的成熟账户收入
    value: "246"
    unit: USDK per year
    source: >-
      [BP funnelTargets production account to second-site expansion within 6 months 50%+] + [BP
      firstCustomer.initialContract 上限约 $250K]
  - id: A9
    name: 年末付费账户数
    value: 3 / 11 / 18
    unit: accounts in Y1 / Y2 / Y3
    source: >-
      [BP milestones 3 paid pilots, 2 production conversions, 25+ production sites] + [Research SOM 18
      high-urgency programs by year 3]
  - id: A10
    name: 每个成熟生产账户的平均站点数
    value: about 3
    unit: sites per account
    source: "[BP firstCustomer.initialContract 2-4 sites in production]，模型按 3 个站点 / 账户估算"
  - id: A11
    name: 目标稳态毛利率
    value: "70"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A12
    name: 模拟毛利率爬坡
    value: 60 / 67 / 71
    unit: percent in Y1 / Y2 / Y3
    source: "[BP target GM 70%] + [Research sensitivity case: OEM/API 可移植性偏弱会让前期业务更偏服务型]"
  - id: A13
    name: 用于单位经济的月度流失率
    value: "2.0"
    unit: percent
    source: "[startup-finance heuristic: 在观察到真实续约前，先采用保守的前期企业客户流失占位值]"
  - id: A14
    name: 每个付费账户的混合 CAC
    value: "55"
    unit: USDK
    source: >-
      [BP founder-led utility sales + partner referrals] + [startup-finance heuristic for narrow enterprise
      compliance workflow sales]
  - id: A15
    name: 典型首单销售周期
    value: "6"
    unit: months
    source: "[BP 多方参与的公用事业采购与审查流程] + [enterprise sales heuristic]"
  - id: A16
    name: 人员规模快照
    value: 2 / 3 / 4 / 5 / 8 / 11
    unit: FTE at Q1Y1 / Q2Y1 / Q3Y1 / Q4Y1 / Q4Y2 / Q4Y3
    source: "[BP team startTiming]，并假设只有在试点开始转生产后才保守加人"
  - id: A17
    name: 全口径成本年薪区间
    value: >-
      $144K CEO; $192K founding eng; $156K solutions eng; $180K compliance-product; $168K AE; $180K later
      engineer; $132K customer success; $120K G&A manager
    unit: USDK annualized
    source: "[startup-finance heuristic: 美国前期创业公司现金薪酬，并包含 20% 的税费与福利负担]"
  - id: A18
    name: 非薪酬运营费用爬坡
    value: R&D $8K-$18K/mo; S&M $5K-$18K/mo; G&A $6K-$12K/mo
    unit: USDK per month
    source: "[startup-finance heuristic，锚定一家具备企业级现场运营客户的精益 pre-seed 软件公司]"
  - id: A19
    name: 融资缓冲期
    value: "6"
    unit: months
    source: "[agent contract: 融资需求中应包含 6 个月缓冲]"
  - id: A20
    name: 下一轮融资证实点
    value: 10 production utility sites, 4 OEM or distributor integrations, and 1 adjacent paid design partner
    unit: milestone
    source: "[BP milestones 12-24 months] + [BP fundingAsk.useOfFundsSummary]"
  - id: A21
    name: 资金用途分配
