  adoptionFrictionMatrix:
  - friction: DJI data export and route portability are inconsistent across tools and operators
    severity: high
    affectedBuyer: UAS program manager
    mitigation: Start with the highest-volume export artifacts and partner with tools that already import DJI logs.
