openQuestions:
- How many mid-size U.S. utilities are under active approved-equipment or foreign-technology review today rather than merely monitoring policy risk?
- Which OEMs expose enough APIs and data structures to automate route, checklist, and maintenance-record translation with acceptable accuracy?
- Will buyers prefer a standalone migration layer or expect the product to bundle services and distributor relationships to secure budget approval?
- How much unresolved China-origin component exposure remains across “approved” replacement fleets after distributor attestations are collected?
