slug: multi-entity-cash-router
date: '2026-05-09'
executiveSummary: >-
  Multi-entity Cash Router sells a cash-aware payment routing layer to PE-backed U.S. home-services rollups managing 5-25 legal entities and weekly vendor runs across decentralized bank accounts. The urgent pain is not invoice capture; it is deciding which approved bills to pay, delay, split, or fund via intercompany sweep when consolidated cash and entity cash diverge. Research supports this wedge because finance automation budgets are expanding beyond cards into AP, treasury, and cash forecasting, while PE-backed trade rollups continue consolidating and standardizing back-office workflows. The first sale should target CFOs during acquisition integration, covenant pressure, or seasonal cash squeezes, when manual spreadsheet prioritization becomes board-visible and budget is easier to unlock. The initial product should stay advisory and approval-gated, proving reduced revolver usage, fewer late-vendor incidents, and faster weekly pay cycles before automating sweeps and payment execution. Go-to-market should combine founder-led outbound with PE operating partner referrals and ERP and treasury implementation partners, because trust and integration shape the sale as much as product features. The strongest strategic risk is that buyers may prefer bundled suite extensions from Ramp, BILL, Kyriba, or HighRadius unless the startup proves materially better entity-level liquidity decisions and faster rollup deployment. The biggest open gap is whether CFOs will buy a standalone decision layer at $75k-plus ACV before broader AP or treasury replacement, so early pilots must test willingness to pay and system coverage, not just product usage.
problem:
  - Approved bills still require manual weekly triage because entity cash, covenant headroom, and vendor criticality sit across spreadsheets, bank portals, and AP systems rather than one decision surface.
  - In PE-backed rollups, one entity often borrows or pays vendors late while another holds idle cash, creating avoidable revolver usage, late-payment risk, and noisy intercompany transfers.
solution:
  - Connect approved-bill data, bank balances, and treasury policy into one queue that recommends pay now, delay, split, or fund with an intercompany sweep before cash moves.
  - Start in advisory mode with explanation-rich approvals and audit trails, then add automated sweeps and payment execution only after controllers trust the recommendation logic.
whyWeWin:
  - The product owns the narrow bill-level decision point between AP approval and treasury execution, where broad spend suites and treasury platforms are least specialized today.
  - Home-services rollups create repeated acquisition-integration and seasonal-liquidity events, giving the company a trigger-rich beachhead instead of a generic CFO modernization pitch.
  - A proprietary graph of vendor tolerance, entity liquidity, and payment outcomes compounds with every weekly run and is hard for horizontal suites to collect at the same granularity.
strategicChoices:
  beachhead: PE-backed U.S. HVAC, plumbing, and roofing rollups with 10-20 entities running weekly vendor-payment cycles above roughly $2M.
  wedgeRationale: This wedge has a visible buyer, acute liquidity pain, and a recurring weekly workflow, so the team can prove value faster than by selling broad AP or treasury replacement into all mid-market companies.
  sequencingRationale: The company should first win read-only data access and advisory approvals, then automate sweeps for trusted accounts, then expand into forecasting and adjacent service verticals; that order matches buyer risk tolerance, shortens implementation, and delays expensive bank-rail complexity until the ROI case is proven.
  notYet:
    - Full ERP replacement or invoice-capture workflow.
    - Cross-border payments and non-U.S. treasury support.
    - Generic horizontal sales into all multi-entity mid-market sectors before home-services proof exists.
market:
  tam: Approximately $675M estimated TAM, based on about 9,000 U.S. multi-entity lower-midmarket operators at roughly $75k blended ARR.
  sam: Approximately $26.3M estimated SAM, based on about 350 PE-backed U.S. home-services rollups that fit the initial profile.
  som: Approximately $5.4M estimated year-3 SOM, based on about 60 customers at roughly $90k ARR after expansion modules.
  segments:
    - PE-backed U.S. home-services rollups with 5-25 legal entities.
    - Other sponsor-backed multi-entity field-services operators with similar weekly payment complexity.
  buyingProcess: >-
    The controller or treasury manager usually feels the pain first, but the CFO sponsors the purchase when acquisition integration, covenant pressure, or seasonal cash stress makes payment timing a board-level issue. Buyers will expect a pilot tied to live payment runs, security and approval-control review, and proof that the product fits existing ERP and bank workflows without a rip-and-replace.
product:
  mvp: >-
    MVP is a read-only payment recommendation workspace for the top ERP and bank combinations in the beachhead, with approved-bill ingestion, entity cash visibility, rule-based pay-delay-split-sweep recommendations, manual approval, and audit logs. It should not execute payments autonomously in v1.
  sixMonth: Launch advisory-mode pilots with weekly payment queues, covenant and vendor-criticality rules, approval logs, and read-only connectors for the most common ERP and bank combinations seen in design partners.
  twelveMonth: Add production-grade workflows for intercompany sweep recommendations, exception handling, role-based controls, and benchmark reporting on avoided late payments, payment-cycle speed, and liquidity outcomes.
  twentyFourMonth: Expand into cash forecasting, automated payment execution for trusted customers, and portfolio-level analytics that let PE-backed operators standardize treasury policy across multiple platform companies.
  keyBets:
    - Two ERP-bank connector pairs can cover a majority of early home-services opportunities.
    - Advisory recommendations with human approval will generate ROI before buyers demand embedded execution rails.
    - Vendor-criticality and covenant rules can be standardized enough to productize without turning every deployment into consulting.
    - Cross-entity payment outcome data will improve recommendation quality faster than incumbents can copy the niche workflow.
gtm:
  wedge: Sell a cash-aware weekly vendor-run workflow to CFOs who already have AP approvals in place but still manage payment timing and intercompany sweeps manually.
  channels:
    - Founder-led outbound to CFOs, controllers, and treasury managers at sponsor-backed home-services rollups.
    - PE operating partner and rollup advisor referrals tied to acquisition integration and reporting standardization.
    - ERP, treasury, and banking implementation partners already involved in integration projects.
  funnelTargets: Lead to qualified pilot 20-30%, qualified pilot to paid pilot 50%+, paid pilot to annual production 60%+, first-land ACV $60k-90k with expansion above $90k after sweep and control modules.
  pricing: Annual subscription priced by number of legal entities and managed payment-volume band, with a paid pilot or implementation fee up front and premium pricing for sweep automation and covenant monitoring; this matches the buyer's budget logic and the researched mid-five-figure to low-six-figure willingness-to-pay range.
businessModel:
  revenueStreams:
    - Annual platform subscription.
    - Paid implementation and policy-mapping fees.
    - Usage-based fees on managed payment volume or automated sweep activity.
  unitOfValue: Legal entity under managed payment routing, adjusted by payment-volume tier.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add automated sweeps and payment execution after advisory proof.
    - Expand from one platform company to sister portfolio companies through PE relationships.
    - Sell forecasting, covenant monitoring, and portfolio analytics as additional modules.
strategyMap:
  northStarMetric: Weekly approved payment volume routed through production entities with accepted recommendations.
  inputMetrics:
    - Number of design partners sharing payment-run exports and bank-balance data.
    - Median days from kickoff to first live payment recommendation.
    - Recommendation acceptance rate on weekly vendor runs.
    - Pilot-to-production conversion rate.
    - Net revenue retention from module and entity expansion.
  moatsToBuild:
    - Vendor-tolerance and payment-outcome graph across entities and categories.
    - Fast deployment playbooks for the common ERP-bank stacks in sponsor-backed rollups.
    - Audit-ready policy engine for ACH, approval, and covenant constraints.
  killCriteria:
    - Fewer than 3 paid production customers after 12 months of selling into the beachhead.
    - Less than 20% of approved bills in pilots require reprioritization from default AP timing.
    - Buyers refuse standalone contracts above $60k ARR even after measurable pilot ROI.
    - No connector set covers at least half of qualified opportunities by the ninth customer conversation cohort.
  mermaid: |
    flowchart LR
      Wedge[Home-services payment triage] --> MVP[Advisory routing workspace]
      MVP --> Proof[Lower revolver use and fewer late payments]
      Proof --> Expansion[Sweeps, forecasting, portfolio rollout]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: High pain and clear buying triggers, but conviction depends on proving standalone budget and repeatable integration scope in the first wedge.
    whyBelieve: The company targets a recurring, board-visible workflow where manual decisions still dominate despite strong category spend on AP and treasury software.
    whyDoubt: Broad finance suites and treasury incumbents can bundle adjacent functionality, and the first SAM is real but not huge if the company cannot expand beyond home services.
    nextDiligence: Validate three paid pilots that share real payment-run data, convert to production, and show measurable liquidity or payment-timing improvement within one quarter.
  firstCustomer:
    title: CFO of a PE-backed home-services rollup
    profile: A U.S. HVAC, plumbing, or roofing platform with 10-20 entities, decentralized bank accounts, weekly vendor runs above roughly $2M, and recent acquisition integration pressure.
    trigger: A new acquisition wave, tighter revolver terms, or seasonal cash squeeze that makes spreadsheet-led payment timing visibly risky.
    buyer: CFO
    initialContract: $25k-40k paid pilot over 8-12 weeks converting to a $60k-90k annual contract once the company proves recommendation accuracy, approval fit, and a measurable liquidity outcome.
  mustBeTrue:
    - At least one-third of target rollups materially reprioritize approved bills every week because entity cash differs from consolidated cash.
    - CFOs will sign a standalone contract before replacing AP or treasury systems if the product reduces liquidity stress without changing core workflows.
    - Two or three ERP-bank connector combinations cover most of the first ten qualified opportunities.
    - Advisory-mode recommendations can reduce late-payment incidents, revolver draw, or payment-cycle labor within 90 days of go-live.
    - Incumbent suites are too horizontal or too heavy to neutralize a PE-rollup-specific wedge before the startup reaches meaningful reference density.
  diligenceQuestions:
    - How often do home-services rollups delay, split, or manually sequence approved bills because of entity-level cash constraints?
    - What pilot ROI metric actually unlocks CFO budget: lower revolver use, fewer late payments, faster close, or integration speed after acquisitions?
    - Which ERP and bank combinations dominate the first twenty target accounts?
    - Will buyers require embedded payment execution from day one, or is advisory mode sufficient for the first contract?
    - How fast could Ramp, BILL, Kyriba, or HighRadius ship a credible version of this workflow into the same accounts?
  riskHeatmap:
    - risk: Integration sprawl slows deployment and margin.
      likelihood: High
      impact: High
      leadingIndicator: More than half of qualified prospects require bespoke ERP or bank work outside the first connector roadmap.
      mitigation: Start with read-only integrations and sell only into accounts that match the first connector playbook until coverage is proven.
    - risk: Buyers do not trust software recommendations that delay or split vendor payments.
      likelihood: Medium
      impact: High
      leadingIndicator: Recommendation acceptance stays below 50% in pilots even when the product surfaces supporting cash and policy evidence.
      mitigation: Keep humans in the loop, expose rule explanations, and prove ROI in advisory mode before introducing automation.
    - risk: Incumbents bundle enough functionality to erase differentiation.
      likelihood: Medium
      impact: High
      leadingIndicator: Qualified prospects consistently choose suite expansions over pilots because the feature gap appears narrow.
      mitigation: Focus on PE-specific rollout speed, cross-entity policy logic, and outcome data the suites do not collect well.
    - risk: Standalone budget is weaker than usage interest.
      likelihood: Medium
      impact: High
      leadingIndicator: Design partners share data and use the workflow but refuse paid pilots or sub-$60k production pricing.
      mitigation: Tie pricing to measurable liquidity outcomes, use paid pilots early, and secure PE partner referrals that frame the tool as operating infrastructure.
operatingAssumptions:
  - assumption: The first beachhead has enough repeated payment pain to support a focused company before broader vertical expansion.
    basis: research.yaml
    validationTest: Confirm at least 10 qualified rollups in the first 6 months with active acquisition, cash-pressure, or control-review triggers and comparable weekly payment complexity.
    decisionImpact: If false, broaden sooner into adjacent sponsor-backed service verticals instead of concentrating only on home services.
  - assumption: A standalone advisory layer can win budget without forcing ERP or treasury replacement.
    basis: idea.yaml
    validationTest: Convert at least 3 design partners using existing AP or treasury tools into paid pilots at the target pricing range.
    decisionImpact: If false, reposition as a partner-embedded module or narrow the offer to analytics and benchmarking rather than workflow control.
  - assumption: The top ERP-bank combinations in the wedge are concentrated enough for a productized integration roadmap.
    basis: research.yaml
    validationTest: Collect system inventories from the first 15 prospects and verify that the top 3 combinations represent more than 60% of qualified demand.
    decisionImpact: If false, hiring and roadmap shift toward services-heavy implementation, lowering margin targets and slowing sales.
  - assumption: Human-approved routing recommendations produce measurable liquidity gains before automation is introduced.
    basis: operator judgment
    validationTest: In pilots, show a quantifiable reduction in late-payment exceptions, weekly cash-call hours, or avoidable borrowing within 90 days.
    decisionImpact: If false, the product must move upmarket toward broader treasury analytics or downmarket toward lower-price workflow tooling.
  - assumption: PE operating partners can accelerate trust and multi-logo expansion once the first platform company succeeds.
    basis: research.yaml
    validationTest: Secure at least 2 referral or co-selling motions from PE operating teams or rollup advisors within the first year.
    decisionImpact: If false, customer acquisition will rely more on direct outbound and require a larger sales budget than planned.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Collect weekly payment-run exports, bank balances, and exception logs from 5 design partners.
    hypothesis: Controllers are making recurring manual pay-delay-split decisions that current AP tools do not encode.
    successMetric: At least 3 partners show more than 20% of weekly payment decisions require cross-entity reprioritization.
    owner: Founder/CEO
  - horizon: 0-90 days
    experiment: Run pricing and packaging interviews tied to a paid pilot offer.
    hypothesis: CFOs will fund a standalone layer if the contract is framed around implementation speed and liquidity outcomes, not software replacement.
    successMetric: At least 3 target buyers accept a paid pilot proposal in the $25k-40k range.
    owner: Founder/CEO
  - horizon: 90-180 days
    experiment: Launch advisory-mode MVP with two ERP-bank connector pairs and approval audit logs.
    hypothesis: Read-only deployment can reach live weekly payment runs fast enough to support founder-led sales.
    successMetric: Median time from kickoff to first live recommendation stays under 30 days for pilot customers.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Measure recommendation acceptance and operational ROI in live pilots.
    hypothesis: Human-in-the-loop recommendations will be accepted often enough to justify production rollout.
    successMetric: Recommendation acceptance exceeds 60% and each pilot documents at least one measurable liquidity or late-payment improvement.
    owner: Product and implementation lead
  - horizon: 6-12 months
    experiment: Test PE operating partner and integration-partner referral motions.
    hypothesis: Channel-adjacent referrals convert faster than pure cold outbound because they reduce trust friction.
    successMetric: At least 25% of qualified pipeline comes from partner introductions and converts at a higher rate than outbound.
    owner: Founder/CEO
  - horizon: 6-12 months
    experiment: Introduce sweep recommendations and role-based controls for production customers.
    hypothesis: Customers that trust advisory routing will pay more for adjacent automation before demanding full payment execution.
    successMetric: At least 2 production accounts buy an expansion module that lifts ACV above $90k.
    owner: Founding eng
operations:
  - Standardize onboarding around ERP bill export, bank-balance ingestion, vendor-criticality tagging, and approval-policy mapping.
  - Maintain a controlled library of covenant templates, ACH-control checks, and exception-review workflows rather than custom logic per customer.
  - Use weekly customer review sessions during rollout to compare recommendations with actual payment decisions and close logic gaps quickly.
  - Build integration and implementation partnerships that can shorten deployment without turning the company into a services business.
  - Track every recommendation outcome to improve models, customer ROI reporting, and portfolio expansion cases.
team:
  - role: Founder/CEO
    startTiming: Month 0
    rationale: Own founder-led sales, design-partner discovery, pricing, and PE relationship development until the buying motion is repeatable.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the first recommendation engine, connectors, and approval workflow with enough velocity to adapt to live pilot data.
  - role: Product and implementation lead
    startTiming: Month 2
    rationale: Convert customer-specific finance rules into repeatable onboarding and keep deployments from becoming bespoke consulting.
  - role: Integrations engineer
    startTiming: Month 4
    rationale: Expand the connector roadmap and reduce deployment time once the first ERP-bank patterns are clear.
  - role: Enterprise account executive
    startTiming: Month 9
    rationale: Add quota-carrying sales capacity only after pilot conversion playbooks, pricing, and ROI evidence are repeatable.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 5 design partners in the home-services wedge and convert at least 3 into paid pilots.
      - Ship advisory-mode product with approved-bill ingestion, read-only bank visibility, explanation-rich routing logic, and audit logs.
      - Prove production value in at least 2 customers with measurable improvement in liquidity management or vendor-payment execution.
      - Narrow the roadmap to the ERP-bank combinations that cover a majority of qualified demand.
  - horizon: 12-24 months
    items:
      - Reach 10-15 production customers and establish reference accounts in HVAC, plumbing, and roofing rollups.
      - Launch sweep recommendations, expanded controls, and benchmark reporting that raise ACV above the base routing product.
      - Win at least 1 PE operating-partner or portfolio-wide expansion motion.
      - Begin selling into one adjacent sponsor-backed field-services vertical using the same core playbook.
  - horizon: 24-36 months
    items:
      - Build toward the researched year-3 SOM by approaching 60 customers only if deployment stays productized and reference-led.
      - Add forecasting and selected payment execution workflows for trusted customers without compromising approval controls.
      - Establish a repeatable portfolio expansion motion where one successful platform company opens multiple sister-company opportunities.
risks:
  - risk: Integration sprawl makes onboarding slow and services-heavy.
    likelihood: High
    impact: High
    mitigation: Restrict early sales to common ERP-bank environments, keep v1 read-only, and productize implementation templates before broadening coverage.
  - risk: Controllers and CFOs do not trust the recommendation logic enough to change payment behavior.
    likelihood: Medium
    impact: High
    mitigation: Start with approval-gated recommendations, show evidence behind each action, and measure ROI before selling automation.
  - risk: Broad suites or treasury incumbents bundle a good-enough version of the workflow.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on rollup-specific policy logic, faster deployment, and outcome data tied to cross-entity payment decisions.
  - risk: The standalone contract thesis fails even if users like the workflow.
    likelihood: Medium
    impact: High
    mitigation: Use paid pilots early, test value-based packaging, and keep the option to embed through partners if direct software budget is weak.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to build the advisory routing MVP, land and convert design partners, harden the first connector and control stack, and prove that one narrow home-services wedge can expand through modules and PE-driven referrals.
