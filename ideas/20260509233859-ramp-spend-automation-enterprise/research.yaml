openQuestions:
- How many sponsor-backed home-services rollups with 10-20 entities are actively in-market for treasury or AP modernization in the next 12 months?
- What share of weekly payment decisions in the target ICP are driven by covenant headroom versus pure cash-balance visibility?
- Will buyers accept a standalone decision layer, or will they demand bundled execution rails from day one?
- Which vendor categories in home services are least tolerant of delayed payment and therefore most important to model early?
