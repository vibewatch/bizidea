  validationPlan:
  - priority: high
    question: How often does the target customer postpone or split approved bills because entity cash is tighter than consolidated cash?
    evidenceToGather: Eight weeks of payment-run exports, bank balances by entity, and manual prioritization spreadsheets from 5-10 design partners.
  - priority: high
    question: Will CFOs pay for a focused payment-router layer before replacing broader AP or treasury tooling?
    evidenceToGather: Current vendor maps, pilot pricing reactions, and security-review timelines from rollups using Ramp, BILL, Kyriba, HighRadius, or Trovata.
  - priority: medium
    question: Which covenants, sweep rules, and vendor-criticality policies explain most payment decisions?
    evidenceToGather: Credit agreements, treasury policies, and exception logs from early design partners.
  - priority: medium
    question: Which ERP-bank combinations cover 80% of the initial home-services wedge?
    evidenceToGather: System inventories, bank lists, and sample entity structures from sponsor-backed operators.
