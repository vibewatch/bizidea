  validationPlan:
  - priority: high
    question: 目标客户多频繁地因主体现金比合并现金更紧张而推迟或拆分已审批账单？
    evidenceToGather: 来自 5–10 位共创客户的 8 周付款运行导出、主体级银行余额和手动优先级排序电子表格。
  - priority: high
    question: CFO 是否会在替换更广泛 AP 或资金工具之前，为聚焦型付款路由层付费？
    evidenceToGather: 来自使用 Ramp、BILL、Kyriba、HighRadius 或 Trovata 的平台公司的现有供应商地图、试点定价反馈和安全审查时间表。
  - priority: medium
    question: 哪些契约、划转规则和供应商重要性政策解释了大多数付款决策？
    evidenceToGather: 来自早期共创客户的信贷协议、资金政策和异常处理日志。
  - priority: medium
    question: 哪些 ERP-银行组合覆盖了初始家庭服务切入点 80% 的机会？
    evidenceToGather: 来自 PE 支持运营商的系统清单、银行名单和样本主体架构。
