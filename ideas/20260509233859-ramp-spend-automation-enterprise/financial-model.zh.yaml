scenarios:
  downside:
    description: "付费试点转化更慢，合伙人引荐表现不及预期，扩展在目标 ACV 以下停滞。"
    y3RevenueK: 2311.4
    y3EbitdaK: -1152.8
    cashLowPointK: -199.7
    keyAssumptionChanges:
      - "Y3 混合 ARPU 上限约 7.8 万美元 ARR，而非 9 万美元。"
      - "客户数爬坡至约 51 个而非 60 个。"
      - "COGS 维持在约 30%，因为集成和管控仍为服务密集型。"
  base:
    description: "连接器范围保持足够窄以支持产品化入驻，引荐补充外呼，ACV 扩展至研究支持的第三年目标。"
    y3RevenueK: 2977.5
    y3EbitdaK: -542.6
    cashLowPointK: 398.4
    keyAssumptionChanges:
      - "客户从 Y1 的 5 个增至 Y2 的 15 个，Y3 达 60 个。"
      - "随着划转和管控模块附加，混合 ARPU 达到 9 万美元 ARR。"
      - "毛利率从 Y1 的 67–69% 提升至 Y3 的 73%。"
  upside:
    description: "PE 引荐和投资组合扩展提前生效，使公司以略好的定价和利润率增加更多客户。"
    y3RevenueK: 3507.2
    y3EbitdaK: -62.6
    cashLowPointK: 629.9
    keyAssumptionChanges:
      - "Y3 退出时客户数约达 69 个。"
      - "混合 ARPU 随模块附加率提升，朝 9.6 万美元 ARR 迈进。"
      - "Y3 毛利率约达 75%，因入驻更趋标准化。"
sensitivity:
  - variable: ARPU
    downsideCase: "扩展 ARR 7.8 万美元"
    baseCase: "扩展 ARR 9 万美元"
    upsideCase: "扩展 ARR 9.6 万美元"
    y3RevenueImpactK: -397.0
    cashImpactK: -385.2
  - variable: CAC
