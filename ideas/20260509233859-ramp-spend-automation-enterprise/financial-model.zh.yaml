  - variable: gross margin
    downsideCase: "Y3 毛利率 70%"
    baseCase: "Y3 毛利率 73%"
    upsideCase: "Y3 毛利率 75%"
    y3RevenueImpactK: 0.0
    cashImpactK: -117.9
  - variable: hiring pace
    downsideCase: "将 Y3 成长期招聘提前 2 个月"
    baseCase: "当前计划"
    upsideCase: "延迟成长期招聘 1 个季度，直至转化得到验证"
    y3RevenueImpactK: 0.0
    cashImpactK: -61.7
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景收入由客户从 5 个增至 60 个、以及 ARPU 随模块附加从约 7.2 万美元扩展至 9 万美元 ARR 共同驱动。
  - checkName: 必须成立的假设
    finding: 入驻必须围绕窄口连接器组合保持产品化，使 12 名 FTE 能支撑 60 个客户，同时毛利率爬升至 73%。
  - checkName: 模型崩溃条件
    finding: 最大现金风险是 6 个月销售周期或独立定价偏弱——任一情景都会将悲观情景推入现金余额归零。
  - checkName: 下一轮融资证明
    finding: 下一轮融资在公司以 15 个生产客户和超过 100 万美元 ARR 运行率退出 Y2、并拿出一个可信的 PE 主导扩展动作后才具备合理性。
sanityChecks:
  ruleOf40: "Y3 增长率 264% + EBITDA 利润率 -18% = 246%。"
  burnMultiple: "Burn multiple 从 Y2 的约 1.9x 改善至 Y3 的约 0.3x，因为增量毛利润开始为增长提供资金。"
  revenuePerFte: "Y3 平均每 FTE 创收 25.3 万美元（SaaS 基准约 20 万–40 万美元）。"
  flags:
    - "基准情景仍假设前几对 ERP-银行连接器组合覆盖大多数切入点机会；若集成蔓延持续，毛利率和入驻速度均将落后计划。"
    - "公司在三年窗口内无法实现年度 EBITDA 转正，因此应在 Q3Y3 现金低点前完成新一轮融资。"
    - "Y3 达到 60 个客户依赖 PE 引荐和投资组合扩展在广泛可复制的营销引擎建立之前提前奏效。"
