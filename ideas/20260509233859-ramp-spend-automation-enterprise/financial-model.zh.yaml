    baseCase: "混合 CAC 3.8 万美元"
    upsideCase: "PE 和合伙人引荐增多时 CAC 3.2 万美元"
    y3RevenueImpactK: 0.0
    cashImpactK: -290.5
  - variable: churn
    downsideCase: "月度 2.5%"
    baseCase: "月度 1.5%"
