slug: multi-entity-cash-router
date: '2026-05-09'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: 模型启动时的期初现金
    value: "3300.0"
    unit: usdK
    source: "[BP fundingAsk] Pre-seed 目标融资 200–400 万美元，为期 18 个月；模型采用 330 万美元的关账金额，以覆盖下一阶段里程碑并预留 6 个月缓冲。"
  - id: A2
    name: 模型起始付费客户数（第 1 个月）
    value: "0"
    unit: count
    source: "[BP milestones 0-12 months] 收入在共创客户转化后才开始产生，因此模型从零付费客户起步。"
  - id: A3
    name: 客户增长节奏
    value: "5 / 15 / 60"
    unit: customers at M12 / M24 / M36
    source: "[BP milestones; BP market.som; research.market.som] Y1 达到 5 个付费客户，Y2 达到 10–15 个生产客户，Y3 接近 60 个客户。"
  - id: A4
    name: 新客户当月收入确认比例
    value: "60%"
    unit: first-month revenue realization
    source: "[Heuristic: enterprise software billing/go-live] 新客户在关账当月贡献约 60% 的完整月收入，因为试点和生产上线不会在第 1 天即开始。"
  - id: A5
    name: 混合月度 ARPU 爬坡
    value: "6.0K in M1-M6; 6.5K in M7-M15; 7.0K in M16-M18; 7.25K in M19-M21; 7.5K in M22-M36"
    unit: usdK per customer per month
    source: "[BP gtm.funnelTargets; BP firstCustomer.initialContract; research.willingnessToPay] 合同从接近 6 万–7.8 万美元 ARR 起步，到 Y3 扩展至研究支持的约 9 万美元 ARR。"
  - id: A6
    name: 毛利率爬坡
    value: "67% in M1-M6; 69% in M7-M12; 71% in Y2; 73% in Y3"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] 基准情景从低于 70% 目标起步（集成仍为手动阶段），随着入驻和管控产品化而温和提升。"
  - id: A7
    name: 创始人到手现金薪酬（含税负）
    value: "144.0"
    unit: usdK annual
    source: "[Heuristic: seed-stage U.S. startup salary + 20% payroll/benefits load] 创始人低于市场现金薪酬，但仍保持薪资发放。"
  - id: A8
    name: 工程师到手现金薪酬（含税负）
    value: "195.0"
    unit: usdK annual per FTE
    source: "[Heuristic: enterprise SaaS engineering salary + 20% load] 覆盖初创及后续产品/集成工程师招聘。"
  - id: A9
    name: 产品与实施负责人到手现金薪酬（含税负）
    value: "175.0"
    unit: usdK annual per FTE
    source: "[Heuristic: product/implementation lead salary + 20% load] 锚定于商业计划中第 2 个月新增的角色。"
  - id: A10
    name: 销售到手现金薪酬（含税负）
    value: "175.0"
    unit: usdK annual per FTE
    source: "[Heuristic: seed-stage enterprise AE cash + commissions + 20% load] 适配仅在试点转化后才增加配额产能的创始人主导销售模式。"
  - id: A11
    name: 客户成功到手现金薪酬（含税负）
    value: "135.0"
    unit: usdK annual per FTE
    source: "[Heuristic: implementation / customer success salary + 20% load] 支持入驻和扩展，同时不让公司变成服务型企业。"
  - id: A12
    name: 财务与运营到手现金薪酬（含税负）
    value: "145.0"
    unit: usdK annual per FTE
    source: "[Heuristic: finance-ops manager salary + 20% load] 在客户数量和审计/合规需求增加后引入。"
  - id: A13
    name: 招聘时序
    value: "M1 founder and first engineer; M2 product/implementation; M4 integrations engineer; M9 AE; M13 CS; M16 engineer; M19 AE and finance/ops; M22 CS; M25 engineer; M28 AE"
    unit: month schedule
    source: "[BP team] 前五名招聘严格按商业计划执行；后续招聘是支持 Y2–Y3 客户增长所需的保守延伸。"
  - id: A14
    name: 销售与市场非薪酬支出
    value: "7K in M1-M8; 13K in M9-M12; 16K in M13-M18; 22K in M19-M24; 28K in M25-M30; 32K in M31-M36"
    unit: usdK per month
    source: "[Heuristic: enterprise outbound travel, events, and partner-marketing spend] 先以创始人主导外呼为主，随着销售产能扩大再增加合伙人/引荐支持。"
  - id: A15
    name: 研发非薪酬支出
    value: "9K in M1-M6; 11K in M7-M12; 13K in Y2; 17K in Y3"
    unit: usdK per month
    source: "[Heuristic: cloud, data, security, and developer tooling for enterprise fintech software] 随连接器、审计和托管负荷的增加而相应提升。"
  - id: A16
    name: 一般及行政非薪酬支出
    value: "7K in Y1; 9K in M13-M18; 11K in M19-M24; 13K in Y3"
    unit: usdK per month
    source: "[Heuristic: legal, insurance, audit, and back-office overhead] 随企业客户增加和付款管控要求提升而增长。"
  - id: A17
    name: 混合 CAC
    value: "38.0"
    unit: usdK per new customer
    source: "[BP gtm.channels; BP operatingAssumptions on PE referrals; Heuristic: founder-led enterprise sales with partial partner sourcing] 假设引荐抵消了部分本来较重的直销成本。"
  - id: A18
    name: 月度流失率
    value: "1.5%"
    unit: percent
    source: "[Heuristic: early enterprise workflow software] 流失率高于成熟企业软件规范，因为信任和集成风险尚在验证阶段。"
  - id: A19
    name: 平均客户生命周期
    value: "66.7"
    unit: months
    source: "[Derived from A18] 平均生命周期 = 1 / 月度流失率。"
  - id: A20
    name: 生产转化销售周期
    value: "4"
    unit: months
    source: "[BP buyingProcess; BP firstCustomer.initialContract] 企业审查加上 8–12 周付费试点，意味着约 4 个月的试点到生产周期。"
