topRisks:
  - name: Integration sprawl
    description: Rollups often inherit mixed ERPs, bank portals, and entity structures that can slow deployment and data normalization.
    mitigation: Start with read-only balance ingestion and payment recommendations for the most common ERP-bank combinations before expanding into deeper automation.
  - name: Trust in payment recommendations
    description: CFOs may hesitate to let software delay vendor bills or suggest sweeps without understanding the exact reasoning.
    mitigation: Keep every recommendation approval-gated, show balance and policy evidence for each action, and prove ROI first on advisory mode before execution.
  - name: Suite incumbents move downmarket
    description: Spend-management or treasury vendors could bundle simpler payment-priority features once the opportunity becomes obvious.
    mitigation: Focus on multi-entity operating playbooks, PE-specific rollout speed, and cross-system cash routing depth that broader suites rarely optimize for.
