differentiator: >-
  Spend-management suites usually start with cards and approvals, while treasury systems start with reporting and bank
  connectivity. This product owns the missing bill-level decision layer where payment timing, entity liquidity, and
  vendor criticality intersect. The defensible asset is a growing payment-priority graph across vendors, entities, and
  cash outcomes that becomes more valuable with every weekly payment cycle.
