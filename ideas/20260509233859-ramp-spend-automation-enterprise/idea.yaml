jobsToBeDone:
  - job: When weekly vendor runs exceed the cash available in each entity, help the controller choose which bills to pay, delay, or sweep, so they can protect liquidity without missing critical obligations.
    currentAlternative: Manual spreadsheet prioritization plus phone calls between AP, branch leaders, and treasury
    successMetric: Lower revolver draw, fewer late payments, and fewer hours spent on weekly cash meetings
  - job: When a rollup closes a new acquisition, help the CFO centralize cash and payment policy fast, so the new entity can join the operating cadence without breaking vendor relationships.
    currentAlternative: Temporary shared-service staff, manual bank-portal controls, and ad hoc intercompany transfers
    successMetric: Time to bring acquired entities onto a single payment-approval and cash-visibility process
