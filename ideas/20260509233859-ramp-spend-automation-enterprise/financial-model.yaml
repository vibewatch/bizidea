scenarios:
  downside:
    description: "Paid pilots convert more slowly, partner referrals underperform, and expansion stalls below the target ACV."
    y3RevenueK: 2311.4
    y3EbitdaK: -1152.8
    cashLowPointK: -199.7
    keyAssumptionChanges:
      - "Y3 blended ARPU caps near $78K ARR instead of $90K."
      - "Logo ramp finishes around 51 customers instead of 60."
      - "COGS stays near 30% because integrations and controls remain services-heavy."
  base:
    description: "Connector scope stays narrow enough for productized onboarding, referrals supplement outbound, and ACV expands toward the researched year-3 target."
    y3RevenueK: 2977.5
    y3EbitdaK: -542.6
    cashLowPointK: 398.4
    keyAssumptionChanges:
      - "Customers scale from 5 in Y1 to 15 in Y2 and 60 by Y3."
      - "Blended ARPU reaches $90K ARR as sweep and control modules attach."
      - "Gross margin improves from 67-69% in Y1 to 73% in Y3."
  upside:
    description: "PE referrals and portfolio expansion work early, letting the company add more logos at slightly better pricing and margin."
    y3RevenueK: 3507.2
    y3EbitdaK: -62.6
    cashLowPointK: 629.9
    keyAssumptionChanges:
      - "Logo ramp reaches roughly 69 customers by Y3 exit."
      - "Blended ARPU rises toward $96K ARR with stronger module attach."
      - "Y3 gross margin reaches about 75% as onboarding becomes more repeatable."
