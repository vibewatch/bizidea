modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by a ramp from 5 to 60 logos plus ARPU expansion from roughly $72K to $90K ARR as modules attach.
  - checkName: Must go right
    finding: Onboarding must stay productized around a narrow connector set so 12 FTE can support 60 customers while gross margin climbs to 73%.
  - checkName: Model breaks if
    finding: The biggest cash risk is a slower 6-month sales cycle or weaker standalone pricing, either of which pushes the downside case below zero cash.
  - checkName: Next-round proof
    finding: The next raise is justified once the company exits Y2 with 15 production customers, more than $1M ARR run-rate, and one credible PE-led expansion motion.
sanityChecks:
  ruleOf40: "Y3 growth 264% + EBITDA margin -18% = 246%."
  burnMultiple: "Burn multiple improves from about 1.9x in Y2 to about 0.3x in Y3 as incremental gross profit starts funding growth."
  revenuePerFte: "$253K Y3 revenue per average FTE (benchmark roughly $200K-$400K for SaaS)."
  flags:
    - "Base case still assumes the first few ERP-bank connector combinations cover most of the wedge; if integration sprawl persists, margin and onboarding speed both miss plan."
    - "The company does not prove positive annual EBITDA inside the 3-year window, so it should plan a financing process before the Q3Y3 cash low point."
    - "Reaching 60 customers by Y3 relies on PE referrals and portfolio expansion working before a broad repeatable marketing engine exists."
    - "Standalone willingness to pay above $75K ACV is not yet proven, and that pricing risk is the clearest path into the downside case."
