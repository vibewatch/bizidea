slug: multi-entity-cash-router
date: '2026-05-09'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: Opening cash at model start
    value: "3300.0"
    unit: usdK
    source: "[BP fundingAsk] Pre-seed target is $2-4M for 18 months; model uses a $3.3M close to fund the next milestone plus a 6-month buffer."
  - id: A2
    name: Starting paying customers (M1)
    value: "0"
    unit: count
    source: "[BP milestones 0-12 months] Revenue starts after design-partner conversion, so the model begins with no paying logos."
  - id: A3
    name: Customer ramp
    value: "5 / 15 / 60"
    unit: customers at M12 / M24 / M36
    source: "[BP milestones; BP market.som; research.market.som] Y1 reaches 5 paying logos, Y2 reaches 10-15 production customers, and Y3 approaches 60 logos."
  - id: A4
    name: New-customer revenue recognition timing
    value: "60%"
    unit: first-month revenue realization
    source: "[Heuristic: enterprise software billing/go-live] New logos contribute roughly 60% of a full month in the closing month because pilots and production go-lives do not start on day 1."
  - id: A5
    name: Blended monthly ARPU ramp
    value: "6.0K in M1-M6; 6.5K in M7-M15; 7.0K in M16-M18; 7.25K in M19-M21; 7.5K in M22-M36"
    unit: usdK per customer per month
    source: "[BP gtm.funnelTargets; BP firstCustomer.initialContract; research.willingnessToPay] Contracts start near $60k-78k ARR and expand toward the researched ~$90k ARR by Y3."
  - id: A6
    name: Gross margin ramp
    value: "67% in M1-M6; 69% in M7-M12; 71% in Y2; 73% in Y3"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] Base case starts below the 70% target while integrations are still manual, then improves modestly as onboarding and controls productize."
  - id: A7
    name: Founder loaded cash compensation
    value: "144.0"
    unit: usdK annual
    source: "[Heuristic: seed-stage U.S. startup salary + 20% payroll/benefits load] Founder stays below market cash comp while still drawing salary."
  - id: A8
    name: Engineering loaded cash compensation
    value: "195.0"
    unit: usdK annual per FTE
    source: "[Heuristic: enterprise SaaS engineering salary + 20% load] Covers founding and later product/integration engineering hires."
  - id: A9
    name: Product and implementation loaded cash compensation
    value: "175.0"
    unit: usdK annual per FTE
    source: "[Heuristic: product/implementation lead salary + 20% load] Anchored to the BP role added in Month 2."
  - id: A10
    name: Sales loaded cash compensation
    value: "175.0"
    unit: usdK annual per FTE
    source: "[Heuristic: seed-stage enterprise AE cash + commissions + 20% load] Fits a founder-led motion that adds quota capacity only after pilots convert."
  - id: A11
    name: Customer success loaded cash compensation
    value: "135.0"
    unit: usdK annual per FTE
    source: "[Heuristic: implementation / customer success salary + 20% load] Supports onboarding and expansion without turning the company into a services business."
  - id: A12
    name: Finance and ops loaded cash compensation
    value: "145.0"
    unit: usdK annual per FTE
    source: "[Heuristic: finance-ops manager salary + 20% load] Added once customer count and audit/compliance needs increase."
  - id: A13
    name: Hire timing
    value: "M1 founder and first engineer; M2 product/implementation; M4 integrations engineer; M9 AE; M13 CS; M16 engineer; M19 AE and finance/ops; M22 CS; M25 engineer; M28 AE"
    unit: month schedule
    source: "[BP team] First five hires follow the business plan exactly; later hires are a conservative extension needed to support the Y2-Y3 customer ramp."
  - id: A14
    name: Sales and marketing non-payroll
    value: "7K in M1-M8; 13K in M9-M12; 16K in M13-M18; 22K in M19-M24; 28K in M25-M30; 32K in M31-M36"
    unit: usdK per month
    source: "[Heuristic: enterprise outbound travel, events, and partner-marketing spend] Reflects founder-led outbound first, then partner/referral support as sales capacity expands."
  - id: A15
    name: R&D non-payroll
    value: "9K in M1-M6; 11K in M7-M12; 13K in Y2; 17K in Y3"
    unit: usdK per month
    source: "[Heuristic: cloud, data, security, and developer tooling for enterprise fintech software] Tracks increasing connector, audit, and hosting load."
  - id: A16
    name: G&A non-payroll
    value: "7K in Y1; 9K in M13-M18; 11K in M19-M24; 13K in Y3"
    unit: usdK per month
    source: "[Heuristic: legal, insurance, audit, and back-office overhead] Rises as the company adds enterprise customers and payment-control requirements."
  - id: A17
    name: Blended CAC
    value: "38.0"
    unit: usdK per new customer
    source: "[BP gtm.channels; BP operatingAssumptions on PE referrals; Heuristic: founder-led enterprise sales with partial partner sourcing] Assumes referrals offset part of otherwise heavy direct-sales cost."
  - id: A18
    name: Monthly churn
    value: "1.5%"
    unit: percent
    source: "[Heuristic: early enterprise workflow software] Churn is set above mature enterprise-software norms because trust and integration risk are still being proven."
  - id: A19
    name: Average customer life
    value: "66.7"
    unit: months
    source: "[Derived from A18] Average life is 1 / monthly churn."
  - id: A20
    name: Sales cycle for production conversion
    value: "4"
    unit: months
    source: "[BP buyingProcess; BP firstCustomer.initialContract] Enterprise review plus an 8-12 week paid pilot implies a roughly 4-month pilot-to-production cycle."
