problem: >-
  PE 支持的多主体运营商在 AP 系统中审批供应商账单时，缺乏各主体现金状况、债务契约或哪些付款可以安全延后的实时视图。资金团队随后需要在银行门户和电子表格之间手动管理付款时序、主体间转账和闲置现金，导致一家子公司现金充裕，另一家却需动用循环贷款或拖欠供应商。AP 自动化减少了点击次数，但很少能将每张已审批账单转化为正确的流动性决策。
targetUser:
  primary: PE 支持的美国家庭服务平台公司（含 5–25 个法律主体）的财务总监或财务副总裁
  secondary: 跨多个银行账户执行每周付款周期的资金经理或 AP 主任
  buyer: CFO
startupThesis:
  nonObviousInsight: >-
    财务自动化的下一个控制点不是发卡或发票录入，而是账单审批与资金划转之间的那一刻——支出政策、供应商重要性与资金余量在此交汇。Ramp 向账单支付和资金管理的扩张，表明买家现在希望用一个操作层同时决定"这笔付款是否被批准"和"资金何时实际划出"。
  beachhead: 拥有 5–25 个法律主体、每周定期向供应商付款的 PE 支持美国家庭服务平台公司
  wedge: 一个具备现金感知能力的付款路由器，在执行前根据到期日、供应商重要性、主体流动性和契约余量对每张已审批账单进行评分
  whyNowCatalyst: Ramp 从企业卡扩展至账单支付、审批和资金管理，使财务团队迫切需要用软件化的流动性管理取代电子表格主导的付款时序安排——后者正是支出管控的真正缺口。
  ventureScalePath: >-
    从付款优先级排序起步，逐步扩展至现金预测、自动划转、供应商融资决策、采购合规管控，最终构建面向多主体中型企业的完整资金运营系统。
solution: >-
  产品连接 ERP 和 AP 系统、银行余额、支付通道及信贷额度规则，为每个主体生成实时付款队列。资金划出前，系统根据到期日、供应商重要性、营运资金目标和现金集中机会，建议立即支付、延后、拆分或通过主体间划转来完成该笔账单。财务负责人可在单一工作台审批队列，每条建议附有清晰说明和可追溯至源余额与政策的审计轨迹。随着时间推移，系统学习供应商容忍度、季节性现金规律和付款结果，逐步成为连接 AP 工作流与资金执行的决策引擎。
goToMarketSeed:
  firstCustomer: PE 支持的美国暖通空调、管道或屋顶平台公司，拥有 10–20 个主体、分散的银行账户，每周供应商支付超 200 万美元
  buyingTrigger: 新一轮并购扩张、信贷额度收紧或季节性现金紧张迫使 CFO 集中管理付款时序和流动性可见性
  currentAlternative: ERP AP 模块加电子表格、银行门户、资金工作站及每周手动现金沟通
  switchingReason: 在无需替换 ERP 的前提下改善流动性和按时付款，而现有 AP 和资金工具将账单级优先级排序留给人工处理
  pricingHypothesis: 按主体数量和管理付款量计价的年度平台费，附加自动划转和契约监控高级模块
