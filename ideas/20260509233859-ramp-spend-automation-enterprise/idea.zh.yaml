jobsToBeDone:
  - job: 当每周供应商付款金额超过各主体可用现金时，帮助财务总监决定哪些账单应立即支付、延后或通过划转解决，以在不错过关键义务的前提下保护流动性。
    currentAlternative: 手工电子表格优先级排序，加上 AP、分支负责人和资金团队之间的电话沟通
    successMetric: 循环贷款使用减少、逾期付款减少、每周现金例会耗时降低
  - job: 当平台公司完成新并购时，帮助 CFO 快速集中管理现金和付款政策，使新主体能够加入运营节奏而不损害供应商关系。
    currentAlternative: 临时共享服务人员、手动银行门户管控和临时主体间转账
    successMetric: 将被并购主体纳入统一付款审批和现金可见性流程所需的时间
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 一个经核实的信源通过后期融资、十亿级年化收入规模和卡片以外的工作流扩展，传递出强烈的赛道信号。
  painIntensity:
    score: 5
    rationale: 供应商付款时序失当直接引发流动性压力、循环贷款成本上升和多主体运营商的运营中断。
  wedgeClarity:
    score: 5
    rationale: 平台公司的账单级付款优先级排序是一个有明确买家、触发事件和现有手工替代方案的窄口工作流。
  defensibility:
    score: 4
    rationale: 护城河来自跨主体付款数据、政策调优和工作流嵌入深度——这是通用 AP 或资金产品自然积累不到的。
  ventureScale:
    score: 4
    rationale: 滩头市场定位精准，但可扩展为覆盖中型平台公司的更广泛资金和财务自动化平台。
topRisks:
  - name: 集成蔓延
    description: 平台公司往往继承了混杂的 ERP、银行门户和主体架构，可能拖慢部署和数据标准化进程。
    mitigation: 先从最常见 ERP-银行组合的只读余额获取和付款建议起步，再扩展至更深度的自动化。
  - name: 对付款建议的信任度
    description: CFO 可能不愿让软件延后供应商账单或建议划转，除非清楚了解确切的推理依据。
    mitigation: 每条建议均保持审批门控，展示每项操作背后的余额和政策依据，先在顾问模式下验证 ROI，再开放执行权限。
  - name: 套件厂商下沉市场
    description: 支出管理或资金厂商一旦发现机会，可能将较简单的付款优先级功能捆绑进来。
    mitigation: 聚焦多主体运营剧本、针对 PE 的快速部署能力，以及广泛套件难以优化的跨系统现金路由深度。
