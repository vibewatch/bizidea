topRisks:
- name: 集成蔓延
  description: 分销商环境常常混杂老旧 ERP 实例、共享盘和客户专属门户，标准化成本很高。
  mitigation: 先从一小批常见系统和人工证据复核做起，优先把出现频率最高的集成产品化。
- name: 财务团队的信任门槛
  description: 如果代理看起来会在没有可靠证据和审批的情况下联系客户或关闭争议，财务总监可能会排斥。
  mitigation: 所有面向客户的动作都保留审批门槛；每条建议都展示完整来源引用；先用分析师人效证明 ROI，再谈自治。
- name: 在位厂商扩张
  description: 一旦品类被验证有价值，ERP 厂商或 AR 自动化套件可能补上争议工作流。
  mitigation: 在跨系统证据拼装和垂直争议打法上赢下来——这是在位厂商在碎片化客户渠道里最难补齐的能力。
