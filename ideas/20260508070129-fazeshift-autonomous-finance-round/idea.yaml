differentiator: >-
  Most AR automation products stop at invoice delivery, cash application, or reminder cadences. This wedge starts
  where the pain is worst: disputed cash that requires assembling evidence from multiple systems and customer channels
  before a collector can act. The defensible asset is a dispute-resolution graph linking remittance language, proof
  documents, customer behaviors, and successful recovery playbooks across distributor sub-verticals. Human-in-the-loop
  approval also makes the product deployable before finance teams are ready for full autonomous action.
