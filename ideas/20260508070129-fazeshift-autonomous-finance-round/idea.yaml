topRisks:
  - name: Integration sprawl
    description: Distributor environments often mix legacy ERP instances, shared drives, and customer-specific portals that are expensive to normalize.
    mitigation: Start with a small set of common systems and human-in-the-loop evidence review, then productize the highest-frequency integrations first.
  - name: Trust threshold in finance
    description: Controllers may resist any agent that appears to contact customers or close disputes without reliable evidence and approvals.
    mitigation: Keep customer-facing actions approval-gated, expose full source citations for every recommendation, and sell initial ROI on analyst productivity before autonomy.
  - name: Incumbent expansion
    description: ERP vendors or AR automation suites could add dispute workflows once the category proves valuable.
    mitigation: Win on cross-system evidence assembly and vertical dispute playbooks that incumbents struggle to build across fragmented customer channels.
