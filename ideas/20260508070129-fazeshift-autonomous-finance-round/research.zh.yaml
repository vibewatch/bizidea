  - case: 若平均合同价更接近 $30k，而不是 $50k
    impact: 建模 TAM 会从约 $463M 降到 $278M；如果产品使用范围扩不快，这个切口会对服务更敏感。
    sourceRefs:
    - 16
    - 17
  - case: 若现有套件打包进更强的门户索赔抓取和扣款工作流
    impact: 独立产品定价会被压缩，差异化必须转向分销商专属打法、部署速度和追收结果数据。
