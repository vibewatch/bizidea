  validationPlan:
  - priority: high
    question: 在首批 20 个目标客户中，被争议发票金额里有多大比例卡在短付和扣款队列，而不是普通催收？
    evidenceToGather: 从 5-10 家分销商共创客户获取账户级账龄导出、扣款原因码报表和催收工作量日志。
  - priority: high
    question: 在刷新更宽的 AR 套件之前，CFO 会不会先买一层聚焦的争议追收系统？
    evidenceToGather: 访谈预算负责人，梳理当前供应商合同，并比较试点定价与不做或扩容现有模块的反应。
  - priority: medium
    question: 哪些客户门户、ERP 和证明文件类型，占到了 80% 的证据搜集工作？
    evidenceToGather: 从早期潜在客户获取系统清单、索赔样本包和催收录屏。
  - priority: medium
    question: 产品价值最先体现为追回现金、解决更快，还是人力节省？
    evidenceToGather: 在试点前后对追收率、解决天数、催收触点和老旧扣款余额做 KPI 对比。
