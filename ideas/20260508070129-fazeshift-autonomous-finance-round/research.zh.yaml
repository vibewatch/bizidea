  sensitivityCases:
  - case: 若 939 家滩头机构中，只有 25% 具备高扣款复杂度
    impact: 在同样 $50k 建模 ACV 下，SAM 会从约 $18.8M 降到约 $11.7M，意味着必须更早向相邻垂直行业扩张。
