slug: "short-pay-recovery-agent"
date: "2026-05-08"
executiveSummary: >-
  Short-pay recovery agent targets the part of accounts receivable that generic dunning tools and broad AR suites still leave manual: disputed cash at U.S. industrial and janitorial distributors. The first product is a human-in-the-loop dispute-resolution layer that classifies short-pays, pulls proof-of-delivery and pricing evidence, and drafts the next collector action across ERP, email, shared drives, and customer portals. The initial customer is a 200-1,000 employee distributor with shared-services AR, national-account deductions, and a CFO mandate to cut DSO after a PE acquisition, ERP consolidation, or working-capital review. This beachhead is narrow by design because the pain is acute, the workflow is evidence-heavy, and incumbents usually package deductions inside broader order-to-cash transformations that are slower to buy and deploy. Go-to-market should start with founder-led outbound to CFOs, controllers, and AR leaders, supported by NetSuite and Sage Intacct implementation partners that already see fragmented dispute workflows during finance-system projects. Pricing should be a mid-five-figure annual subscription tied to active disputed invoices or collector workflows, with premium expansion into portal automation and multi-entity deployments after ROI is proven. The main risks are integration sprawl, trust in customer-facing automation, and the possibility that buyers prefer incumbent suite expansion to a focused wedge. The largest evidence gaps are direct pilot data on how much disputed cash sits in short-pay queues, whether CFOs will fund a focused recovery layer before a suite refresh, and whether early ROI lands first in recovered cash, cycle time, or labor savings.
problem:
  - "Industrial distributors lose cash to short-pays, deductions, and customer disputes that sit outside clean ERP workflows, increasing DSO and write-offs."
  - "AR teams spend hours gathering proofs, contract terms, remittance details, and portal screenshots across email, shared drives, and customer systems before they can even take the next action."
solution:
  - "A dispute-recovery agent ingests remittances and customer emails, classifies dispute reason codes, and assembles an audit-ready evidence packet for each invoice."
  - "The workflow keeps customer-facing actions approval-gated on day one, so finance teams get productivity and recovery gains before trusting full autonomy."
whyWeWin:
  - "The wedge starts where incumbent breadth is weakest: cross-system evidence assembly for deduction-heavy short-pays rather than generic reminder automation or full-suite replacement."
  - "Each deployment builds a proprietary dispute-resolution graph linking remittance language, proof quality, portal steps, and successful recovery playbooks across distributor sub-verticals."
strategicChoices:
  beachhead: "U.S. industrial and janitorial/facility-supply distributors with 100-999 employees, shared-services AR, and national-account short-pay or deduction volume."
  wedgeRationale: "This workflow has immediate cash impact, lives outside clean ERP processes, and can be sold on recovered dollars and faster resolution without asking the buyer to replace an AR suite."
  sequencingRationale: "Start with human-approved evidence gathering and next-best-action recommendations on the highest-volume dispute types, then add portal automation, broader ERP coverage, and adjacent O2C workflows only after proving recovery ROI and integration repeatability."
  notYet:
    - "Generic collections or invoice reminder automation"
    - "Cash application as a standalone first product"
    - "Full ERP replacement or enterprise-wide order-to-cash transformation"
    - "International expansion before U.S. portal and workflow coverage is repeatable"
market:
  tam: "$463.1M estimated U.S. wholesale trade TAM based on 9,261 establishments with 100-999 employees and a modeled $50k ACV."
  sam: "$18.8M estimated SAM based on 939 relevant industrial and jan-san wholesaler establishments, 40% deduction-heavy fit, and a modeled $50k ACV."
  som: "$1.0M estimated year-3 SOM based on roughly 20 logos at $50k ARR through direct sales and ERP/accounting referrals."
  segments:
    - "Primary: PE-backed U.S. industrial distributors with national-account deductions"
    - "Secondary: Janitorial and facility-supply distributors with shared-services AR"
  buyingProcess: "The user is usually the controller or AR manager, but budget approval sits with the CFO or VP Finance. The process is triggered by a working-capital mandate, ERP change, or staffing constraint and is gated by security review, ERP integration confidence, and approval controls over customer communications."
product:
  mvp: "Connect to one ERP, shared inboxes, shared drives, and a narrow set of customer portals to classify short-pays, retrieve backup documents, and produce collector-ready recovery packets with source citations. The MVP should optimize for the top dispute types in one distributor segment, not full autonomous resolution."
  sixMonth: "Production pilot release with approval-gated customer replies, reason-code classification, audit logs, and connectors for the first two ERP environments seen most often in design partners."
  twelveMonth: "Broaden coverage to the portal and proof-document types that represent the majority of collector investigation time, add playbooks by customer and reason code, and ship ROI dashboards around recovered cash and days-to-resolution."
  twentyFourMonth: "Expand from dispute recovery into adjacent order-to-cash actions such as cash-application handoff, root-cause analytics, and multi-entity workflow orchestration once the evidence graph is defensible."
  keyBets:
    - "A small set of ERP, email, and portal integrations covers enough of the evidence hunt to create repeatable ROI in the first 10 logos."
    - "Controllers will trust approval-gated recommendations before they trust autonomous external communications."
    - "Recovered cash and resolution speed will justify mid-five-figure ACVs even in a narrow beachhead."
gtm:
  wedge: "Sell a dispute-recovery layer that clears aged deductions faster, rather than a broad AR transformation, to CFOs and controllers at distributors already under DSO pressure."
  channels:
    - "Founder-led outbound to CFOs, controllers, and AR leaders at target distributors"
    - "Referrals from NetSuite and Sage Intacct implementation partners"
    - "Finance transformation and O2C consulting firms that encounter deduction backlogs"
  funnelTargets: "Target account→discovery 15-20%, discovery→qualified pilot 25-35%, pilot→production 60%+, production→module expansion 40%+ within 12 months."
  pricing: "Annual subscription priced by active disputed invoice volume or named collector workflows, targeting roughly $40k-$60k production ARR after a paid pilot; this matches a CFO ROI sale tied to recovered cash and labor savings rather than seat-only SaaS pricing."
businessModel:
  revenueStreams:
    - "Annual SaaS subscription for dispute recovery workflows"
    - "Paid implementation and integration onboarding"
    - "Usage-based upsell for portal automation and additional legal entities"
  unitOfValue: "Active disputed invoices or collector workflows under management"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Additional entities or branches within the same distributor"
    - "Portal automation modules for customer-specific claim submission"
    - "Adjacent order-to-cash workflows such as cash-application handoff and root-cause analytics"
strategyMap:
  northStarMetric: "Recovered disputed invoice dollars per customer per quarter"
  inputMetrics:
    - "Percent of short-pays auto-classified with acceptable confidence"
    - "Median days-to-resolution for disputed invoices"
    - "Collector hours saved per 100 disputed invoices"
    - "Pilot-to-production conversion rate"
  moatsToBuild:
    - "Distributor-specific evidence graph spanning remittances, proofs, portals, and outcomes"
    - "Recovery playbooks by reason code, customer, and document pattern"
    - "Partner-led integration distribution inside finance-system projects"
  killCriteria:
    - "If fewer than 3 of the first 10 design-partner accounts show at least 15% of AR dollars trapped in short-pay or deduction queues, narrow the thesis or stop."
    - "If paid pilots fail to convert above 40% because buyers prefer incumbent suite modules, reposition as services-enabled software or abandon the wedge."
    - "If the first 3 connectors do not cover at least 60% of collector investigation volume, tighten the ICP before building broader automation."
  mermaid: |
    flowchart LR
      Wedge[Distributor short-pay recovery wedge] --> MVP[Evidence graph MVP]
      MVP --> Proof[Recovered cash and faster resolution proof]
      Proof --> Expansion[Portal automation and adjacent O2C expansion]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Clear pain and a credible wedge, but no direct customer proof yet on budget urgency, integration repeatability, or expansion beyond a narrow beachhead."
    whyBelieve: "Evidence shows funded category momentum, real distributor deduction pain, and incumbents that are broader than the proposed insertion point."
    whyDoubt: "The initial SAM is modest and the company has not yet proven that CFOs will buy a focused recovery layer before expanding an incumbent suite."
    nextDiligence: "Secure 5-10 distributor design-partner datasets and verify that the product can cut days-to-resolution or unlock recovered cash quickly enough to support $40k-$60k production ACVs."
  firstCustomer:
    title: "Controller or AR manager at a PE-backed industrial distributor"
    profile: "A U.S. distributor with 200-1,000 employees, shared-services AR, multiple branches, and thousands of monthly short-pay line items from national accounts."
    trigger: "A working-capital review, ERP consolidation, or new CFO mandate exposes aged deductions and manual evidence hunts."
    buyer: "CFO or VP Finance"
    initialContract: "Paid 8-12 week pilot at roughly $15k-$25k, creditable toward a $40k-$60k annual production contract if disputed-invoice resolution time drops by at least 25% or recovered cash rises measurably."
  mustBeTrue:
    - "At least 40% of target-beachhead prospects have deduction-heavy workflows severe enough to justify a new software budget."
    - "The first 2-3 system connectors cover a majority of evidence retrieval work in the initial ICP."
    - "CFOs will fund a focused dispute-recovery layer before a broader AR-suite refresh when ROI is framed around recovered cash."
    - "Approval-gated AI recommendations earn user trust fast enough to drive pilot-to-production conversion above 60%."
    - "The company can expand from dispute recovery into broader order-to-cash workflows before incumbents neutralize the wedge."
  diligenceQuestions:
    - "What percent of disputed dollars in target accounts sits in short-pay and deduction queues versus ordinary overdue collections?"
    - "Which ERP, portal, and proof-document combinations account for 80% of collector investigation time?"
    - "What budget line pays for this product today: AR automation, finance transformation, or working-capital improvement?"
    - "Why would a controller buy this layer instead of activating more deduction features from HighRadius, Esker, Versapay, or Sidetrade?"
    - "What measurable pilot outcome most reliably converts to production: recovered cash, resolution speed, or labor savings?"
  riskHeatmap:
    - risk: "Integration sprawl across ERPs, inboxes, shared drives, and customer portals"
      likelihood: "High"
      impact: "High"
      leadingIndicator: "Early prospects require more than 3 bespoke connectors each or implementation exceeds 60 days before first value."
      mitigation: "Constrain the ICP to the most common ERP and portal combinations, and ship approval-gated workflows before attempting broad automation."
    - risk: "Finance teams do not trust agent outputs or customer-facing actions"
      likelihood: "Medium"
      impact: "High"
      leadingIndicator: "Collectors routinely override recommendations or buyers refuse shared-inbox access during pilots."
      mitigation: "Expose source citations, keep all external actions approval-gated, and sell analyst productivity before autonomy."
    - risk: "Incumbent suites bundle stronger deduction workflows and compress pricing"
      likelihood: "Medium"
      impact: "High"
      leadingIndicator: "More than half of qualified prospects default to incumbent expansion instead of a pilot."
      mitigation: "Differentiate on faster deployment, distributor-specific playbooks, and recovery outcome benchmarks rather than feature parity."
    - risk: "Beachhead is too narrow to support venture-scale growth without rapid expansion"
      likelihood: "Medium"
      impact: "Medium"
      leadingIndicator: "Win rates are healthy but expansion revenue per logo stays below 20% after 12 months."
      mitigation: "Plan adjacent expansion into portal automation, multi-entity workflows, and cash-application handoff as soon as the core wedge is repeatable."
operatingAssumptions:
  - assumption: "The most painful first customers are PE-backed industrial and jan-san distributors with national-account deductions."
    basis: "idea.yaml"
    validationTest: "Interview at least 20 target accounts and confirm that aged deductions and short-pays are repeatedly cited as a top-two AR bottleneck."
    decisionImpact: "If false, the ICP must broaden to other wholesale sub-verticals earlier and GTM messaging shifts away from national-account deduction pain."
  - assumption: "A focused dispute-recovery layer can command roughly $40k-$60k annual production ACV after a paid pilot."
    basis: "research.yaml"
    validationTest: "Collect pricing reactions from at least 10 qualified buyers and convert at least 3 pilots at or above the target ACV band."
    decisionImpact: "If false, the company needs higher-volume usage pricing, more services attachment, or a broader product scope to support venture returns."
  - assumption: "The first 2-3 ERP and portal integration patterns cover enough workflow volume to make implementation repeatable."
    basis: "operator judgment"
    validationTest: "Map system inventories from the first 10 prospects and verify that the chosen connector set covers at least 60% of disputed-invoice investigation volume."
    decisionImpact: "If false, the company must narrow the ICP further or invest earlier in implementation-heavy services."
  - assumption: "Recovered cash and faster dispute resolution matter more to buyers than labor savings alone."
    basis: "research.yaml"
    validationTest: "Measure pilot ROI across recovered dollars, days-to-resolution, and collector touches, then test which metric drives budget approval in executive readouts."
    decisionImpact: "If false, pricing and sales collateral must shift toward headcount avoidance or shared-services efficiency."
  - assumption: "Approval-gated workflows are sufficient to clear trust and security objections in the first year."
    basis: "idea.yaml"
    validationTest: "Track pilot progression through security review and measure whether shared-inbox and ERP access are granted without requiring full manual operation."
    decisionImpact: "If false, product scope must add stronger controls, narrower data access, or a more services-led delivery model."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Run 20 ICP interviews with controllers, AR managers, and CFOs in industrial and jan-san distribution."
    hypothesis: "Short-pays and deduction evidence hunts are a top budget-worthy pain triggered by DSO pressure, ERP change, or staffing shortages."
    successMetric: "At least 12 interviews confirm the pain as top-two in AR operations and at least 8 share sample dispute workflows or artifacts."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Collect anonymized aging reports, reason-code exports, and collector workflow logs from 5 design partners."
    hypothesis: "A measurable share of disputed cash is concentrated in a small set of repeatable short-pay reasons and document hunts."
    successMetric: "At least 3 accounts show enough concentration to support an MVP covering the top dispute types and document sources."
    owner: "Founder/CEO"
  - horizon: "90-180 days"
    experiment: "Pilot the approval-gated evidence packet workflow in 2-3 design partners."
    hypothesis: "The product can reduce disputed-invoice resolution time by at least 25% without autonomous external communication."
    successMetric: "At least 2 pilots hit the cycle-time target and produce a CFO-readable ROI case study."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Test pricing and packaging with paid pilots tied to disputed invoice volume."
    hypothesis: "Buyers prefer a clear platform fee plus success criteria over pure seat pricing or pure contingency recovery fees."
    successMetric: "At least 2 paid pilots close within the planned $15k-$25k pilot range and convert cleanly to production pricing discussions."
    owner: "Founder/CEO"
  - horizon: "180-360 days"
    experiment: "Launch referral motions with 3 NetSuite or Sage Intacct implementation partners."
    hypothesis: "Finance-system partners can surface deals when ERP projects reveal fragmented dispute evidence."
    successMetric: "At least 5 qualified introductions and 1 closed paid pilot sourced by partners."
    owner: "Implementation lead"
  - horizon: "180-360 days"
    experiment: "Add the first portal-automation module for the most common customer claim workflow."
    hypothesis: "Portal automation is the highest-value expansion feature after evidence assembly."
    successMetric: "At least 2 production customers adopt the module and show additional time savings or recovery lift."
    owner: "Founding eng"
operations:
  - "Run a weekly dispute-pattern review across product, implementation, and sales so connector priorities follow real deduction volume."
  - "Build audit logs, source citations, role-based permissions, and approval controls before enabling any external communication automation."
  - "Use design-partner screen recordings and claim packets as the core artifact for workflow design, QA, and onboarding."
  - "Maintain a partner enablement playbook for NetSuite and Sage Intacct implementers with clear referral triggers and implementation boundaries."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, design-partner discovery, and ROI storytelling with CFO buyers because GTM learning is still the bottleneck."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the evidence-graph core, workflow engine, and initial ERP/email/document integrations needed for paid pilots."
  - role: "Implementation lead"
    startTiming: "Month 3-6"
    rationale: "Shorten time-to-value, productize repeated integration patterns, and turn bespoke onboarding lessons into repeatable deployment playbooks."
  - role: "Workflow/ML engineer"
    startTiming: "Month 6-9"
    rationale: "Improve reason-code classification, document retrieval quality, and recommendation accuracy once real dispute data arrives."
  - role: "Account executive or founder-led sales support"
    startTiming: "Month 9-12"
    rationale: "Only add dedicated selling capacity after a repeatable paid-pilot motion and referenceable ROI story exist."
milestones:
  - horizon: "0-12 months"
    items:
      - "Complete 20 ICP interviews and secure 5-10 design partners with sample dispute artifacts."
      - "Ship MVP covering the top dispute reasons and evidence sources in the initial distributor segment."
      - "Convert at least 2 paid pilots and 1 production customer with measurable cycle-time or recovery improvement."
      - "Establish 2-3 finance-system referral partners and a security-control baseline acceptable to CFO buyers."
  - horizon: "12-24 months"
    items:
      - "Reach 10-15 production logos in the beachhead with repeatable deployment under 45 days."
      - "Launch portal automation and multi-entity workflow features that expand ACV inside existing accounts."
      - "Publish benchmark data on days-to-resolution and recovery rates by dispute pattern to strengthen the data moat."
  - horizon: "24-36 months"
    items:
      - "Expand beyond the initial beachhead into adjacent wholesale verticals using the same evidence-graph core."
      - "Add adjacent order-to-cash products such as cash-application handoff and root-cause analytics."
      - "Demonstrate that expansion revenue is material enough to support a broader autonomous finance platform story."
risks:
  - risk: "Integration scope is too custom for a software-margin business."
    likelihood: "High"
    impact: "High"
    mitigation: "Constrain the first ICP to repeatable ERP and portal patterns, and charge onboarding while productizing the common paths."
  - risk: "Buyers prefer incumbent AR suites or internal teams over a focused new layer."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Lead with a faster-to-value wedge tied to recovered cash, and prove deployment speed and vertical specificity that incumbents do not match."
  - risk: "Trust and security reviews delay adoption beyond acceptable sales cycles."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Design for approval-gated actions, auditability, and finance-grade access controls from the first release."
  - risk: "The narrow beachhead does not expand fast enough into a larger order-to-cash platform."
    likelihood: "Medium"
    impact: "Medium"
    mitigation: "Measure expansion pull early and invest in adjacent workflows only after the core wedge shows repeatable ROI and retention."
fundingAsk:
  stage: "pre-seed"
  targetFundingRangeUsd: "$2-3M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of runway to validate the ICP, build the core evidence-graph product, win the first paid pilots and production logos, establish finance-grade controls, and prove whether dispute recovery expands into a broader order-to-cash platform."
