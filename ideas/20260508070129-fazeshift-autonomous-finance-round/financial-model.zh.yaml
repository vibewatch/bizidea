scenarios:
  downside:
    description: ACV 接近 48K，且转介绍渠道转化变慢，导致公司在 Y3 结束时只有 16 个 logo。
    y3RevenueK: 556.0
    y3EbitdaK: -858.8
    cashLowPointK: 70.8
    keyAssumptionChanges:
    - 正式客户 ACV 从 54K 降到 48K。
    - 由于试点转化更慢，Y3 期末客户数从 20 个降到 16 个。
    - 伙伴转介绍比计划晚 1 年才开始贡献。
  base:
    description: 创始人主导的试点稳定转正，伙伴转介绍在 Y2 开始起效，公司在 Y3 结束时达到 20 个正式 logo。
    y3RevenueK: 796.5
    y3EbitdaK: -690.4
    cashLowPointK: 317.2
    keyAssumptionChanges:
    - 正式客户 ACV 保持在 54K。
    - 客户数在 M24 增长到 10 个 logo，在 M36 增长到 20 个。
    - 招聘按 A15 推进，不额外增加管理层。
  upside:
    description: ACV 提升到 60K，转介绍加上相邻批发行业扩张，把公司在 Y3 结束时拉到 26 个 logo。
    y3RevenueK: 1230.0
    y3EbitdaK: -387.0
    cashLowPointK: 778.5
    keyAssumptionChanges:
    - 随着门户自动化更早落地，正式客户 ACV 从 54K 提升到 60K。
    - 由于转介绍转化更快，Y3 期末客户数从 20 个增加到 26 个。
    - 最后一年切入相邻批发行业，但不需要增加大规模人手。
sensitivity:
- variable: ARPU
  downsideCase: 由于买方把产品视作狭窄工作流工具，ACV 稳在 45K。
  baseCase: ACV 保持 54K，处于 BP 定价带内。
  upsideCase: 当门户自动化和多实体范围挂上去后，ACV 达到 60K。
  y3RevenueImpactK: -132.8
  cashImpactK: -92.9
- variable: CAC
  downsideCase: CAC 升到 35K，每位销售在同样花费下签下的合格试点更少。
  baseCase: CAC 为 27K，由创始人亲自打单并有转介绍帮助。
  upsideCase: 随着 ERP 伙伴提供更温热的线索，CAC 降到 22K。
  y3RevenueImpactK: -81.0
  cashImpactK: -159.0
- variable: 流失率
  downsideCase: 由于集成依旧脆弱、信任建立更慢，月流失率升到 2.5%。
  baseCase: 月流失率按模型保持 1.5%。
  upsideCase: 当 ROI 看板和打法嵌入流程后，月流失率降到 1.0%。
  y3RevenueImpactK: -63.0
  cashImpactK: -108.0
- variable: 销售周期
  downsideCase: 由于安全和 ERP 评审拉长，从发现需求到正式发布延长到 6 个月。
  baseCase: 从发现需求到正式发布大约需要 4-5 个月，其中含付费试点。
  upsideCase: 转介绍会预先建立信任，把路径缩短到 3-4 个月。
  y3RevenueImpactK: -94.5
  cashImpactK: -141.0
- variable: 毛利率
  downsideCase: 由于模型推理和支持成本偏高，毛利率只有 65%。
  baseCase: 毛利率维持在 BP 目标的 70%。
  upsideCase: 随着工作流和证据检索更可复制，毛利率提升到 75%。
  y3RevenueImpactK: 0.0
  cashImpactK: -39.8
- variable: 招聘节奏
  downsideCase: 在可复制性尚未证明前，就把 AE2 和第二名工程师提前一个季度招进来。
  baseCase: 招聘按 A15 执行，在试点转正前始终落后于需求。
  upsideCase: 在转介绍能扛起线索的情况下，非关键岗位延后一个季度招聘且不影响收入。
  y3RevenueImpactK: 0.0
  cashImpactK: -108.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Leads[线索] --> Pilots[试点]\n  Pilots --> ProductionCustomers[正式客户]\n  ProductionCustomers --> Revenue[收入]\n  Revenue --> GrossProfit[毛利]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下，创始人主导的试点转成 20 个、ACV 为 54K 的正式 logo，并在 Y2 借助转介绍提速，从而做到 Y3 收入 796.5K。
- checkName: 必须成立的前提
  finding: 前 2-3 种 ERP 和门户集成模式必须够可复制，才能在不增加服务型团队的前提下，于第 24 个月做到 10 个 logo。
- checkName: 模型失效条件
  finding: 模型对 ACV 和销售周期拖延最敏感，任一项恶化都可能吃掉约 100K 的 Y3 收入，并威胁现金缓冲。
- checkName: 下一轮融资证明
  finding: 当 30 个月跑道接近里程碑时，公司需要用 10 个正式 logo、低于 45 天的部署周期和早期扩张挂载，来证明已具备 seed 准备度。
sanityChecks:
  ruleOf40: Y3 增长率 164.2% + EBITDA 利润率 -86.7% = 77.5%。
  burnMultiple: Y3 净烧钱 690.4K / 新增 ARR 540.0K = 1.28x。
  revenuePerFte: 按期末 7 名 FTE 计算，Y3 人均收入为 113.8K（SaaS 基准 200-400K）。
  flags:
  - 由于模型在规模化前就保留了具备集成能力的团队，人均收入仍低于成熟 SaaS 基准。
  - 基准情景没有计入付费试点和实施收入，因此早期营收相对 BP 的收入流更保守。
  - 公司在 Y3 仍为 EBITDA 负值，因此必须在模型里的年末现金余额 317.2K 变薄之前完成下一轮融资。
  - 滩头 SAM 不大，所以要跑出风险投资级结果，Y3 到 Y4 必须向相邻批发垂直行业扩张。
