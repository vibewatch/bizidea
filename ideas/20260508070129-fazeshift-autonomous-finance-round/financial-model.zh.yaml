slug: short-pay-recovery-agent
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP fundingAsk] 假设 pre-seed 在计划日期后约 60 天完成。'
- id: A2
  name: pre-seed 完成后的起始现金
  value: '2.5'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2-3M] 基准情景取中点。'
- id: A3
  name: 正式客户 ACV
  value: '54.0'
  unit: USDK per customer per year
  source: '[BP gtm.pricing $40k-$60k] 基准情景取区间偏上中位。'
- id: A4
  name: 基准情景中试点与服务收入的处理
  value: 不计入
  unit: policy
  source: '[BP businessModel revenueStreams] 为保持基准情景只反映经常性收入，付费试点和实施费不计入 P&L 收入。'
- id: A5
  name: 毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel targetGrossMarginPct]'
- id: A6
  name: 月度流失率
  value: '1.5'
  unit: percent
  source: '[Startup-finance heuristic: early enterprise SaaS with 工作流 lock-in and approval-gated finance processes] 适用于具备流程锁定和审批门槛的早期企业级 SaaS。'
- id: A7
  name: 第 12 个月期末正式客户数
  value: '2'
  unit: count
  source: '[BP milestones 0-12 months] 基于 2 个付费试点、至少 1 个正式客户的保守递进。'
- id: A8
  name: 第 24 个月期末正式客户数
  value: '10'
  unit: count
  source: '[BP milestones 12-24 months] 取 10-15 个 logo 目标区间的下限。'
- id: A9
  name: 第 36 个月期末正式客户数
  value: '20'
  unit: count
  source: '[BP market.som; Research market.som] 以第 3 年约 20 个 logo 的 SOM 假设为锚。'
- id: A10
  name: 创始人/CEO 全成本现金薪酬
  value: '132.0'
  unit: USDK per year
  source: '[BP team Founder/CEO] 创业财务经验值：低于市场价的创始人薪资，加上薪税负担。'
- id: A11
  name: 创始工程师 全成本现金薪酬
  value: '168.0'
  unit: USDK per year
  source: '[BP team Founding eng] 创业财务经验值：pre-seed 阶段高级工程师薪酬，加上薪税负担。'
- id: A12
  name: 实施负责人 全成本现金薪酬
  value: '126.0'
  unit: USDK per year
  source: '[BP team Implementation lead] 创业财务经验值：实施专家薪酬，加上薪税负担。'
- id: A13
  name: 工作流/ML 工程师 全成本现金薪酬
  value: '180.0'
  unit: USDK per year
  source: '[BP team Workflow/ML engineer] 创业财务经验值：应用 ML 工程师薪酬，加上薪税负担。'
- id: A14
  name: AE 全成本现金薪酬
  value: '150.0'
  unit: USDK per year
  source: '[BP team Account executive] 创业财务经验值：1 名企业销售 AE 薪酬，加上薪税负担。'
- id: A15
  name: 招聘时点
  value: M1 创始人+工程师；M4 实施；M7 工作流/ML；M10 AE1；M19 AE2；M31 工程师 2
  unit: timing
  source: '[BP team startTiming] 在 Y3 额外增加 1 名工程师，以支持 24-36 个月路线图中的扩张功能。'
- id: A16
  name: 非薪酬研发工具与软件
  value: 每月基线 2K；M7 后 +1K；M31 后 +1K
  unit: USDK per month
  source: '[Startup-finance heuristic: lean pre-seed AI/SaaS tooling budget, with variable model infra carried in COGS] 精简的 pre-seed AI / SaaS 工具预算，模型基础设施的可成为本计入 COGS。'
- id: A17
  name: 非薪酬销售与市场费用
  value: AE 入职前每月 5K；1 名 AE 时 8K；2 名 AE 时 12K
  unit: USDK per month
  source: '[BP gtm founder-led outbound and partner referrals] 创业财务经验值：覆盖差旅、内容和线索工具。'
- id: A18
  name: 非薪酬 G&A 费用
  value: Y1 每月 4K；Y2 5K；Y3 6K
  unit: USDK per month
  source: '[Startup-finance heuristic: lean admin, legal, insurance, and finance stack]'
- id: A19
  name: 每个正式客户 logo 的 CAC
  value: '27.0'
  unit: USDK per customer
  source: '[BP gtm channels + funnelTargets] 创业财务经验值：创始人主导的企业销售，并有转介绍辅助。'
- id: A20
  name: 资金缓冲
  value: '450.0'
  unit: USDK
  source: '[Modeling instruction + startup-finance heuristic] 约等于里程碑后 6 个月、每月约 75K 的烧钱水平。'
- id: A21
  name: 创始人薪酬归属
  value: 100% 计入销售与市场
  unit: allocation
  source: '[BP team Founder/CEO rationale] 前两年的核心 GTM 动作是创始人亲自打单。'
- id: A22
  name: 实施薪酬归属
  value: 50% 研发 / 50% G&A
  unit: allocation
  source: '[BP team Implementation lead rationale] 这个岗位既要把重复连接器产品化，也要支撑部署。'
- id: A23
  name: 现金转换假设
  value: EBITDA 近似现金变动
  unit: policy
  source: '[Startup-finance heuristic] 该 pre-seed 软件公司未建模债务、资本开支或显著营运资金波动。'
