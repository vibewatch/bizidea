  pricing: Enterprise demo-led; no public pricing on fetched pages.
  strength: Very broad module depth and mature enterprise ERP integration surface.
  weaknessVsUs: Heavyweight breadth can slow deployment and dilute focus for mid-market distributors needing one painful exception lane solved first.
