  validationPlan:
  - priority: high
    question: What percentage of disputed invoice dollars in the first 20 target accounts sit in short-pay and deduction queues rather than normal collections?
    evidenceToGather: Account-level aging exports, deduction reason-code reports, and collector workload logs from 5-10 distributor design partners.
  - priority: high
    question: Will CFOs buy a focused dispute-recovery layer before a broader AR suite refresh?
    evidenceToGather: Budget owner interviews, current-vendor contract maps, and pilot pricing reactions versus doing nothing or expanding incumbent modules.
  - priority: medium
    question: Which customer portals, ERPs, and proof-document types account for 80% of the evidence hunt?
    evidenceToGather: System inventories, sample claim packets, and collector screen recordings from early prospects.
  - priority: medium
    question: Does the product’s value show up first as recovered cash, reduced resolution time, or labor savings?
    evidenceToGather: Pre/post pilot KPIs on recovery rate, days-to-resolution, collector touches, and aged-deduction balances.
