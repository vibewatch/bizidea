scenarios:
  downside:
    description: ACV lands near 48K and referral-channel conversion slips, leaving the company at 16 logos by Y3 exit.
    y3RevenueK: 556.0
    y3EbitdaK: -858.8
    cashLowPointK: 70.8
    keyAssumptionChanges:
    - Production ACV drops from 54K to 48K.
    - End-of-Y3 customer count falls from 20 to 16 because pilots convert more slowly.
    - Partner referrals contribute one year later than planned.
  base:
    description: Founder-led pilots convert steadily, partner referrals help in Y2, and the company reaches 20 production logos by Y3 exit.
    y3RevenueK: 796.5
    y3EbitdaK: -690.4
    cashLowPointK: 317.2
    keyAssumptionChanges:
    - Production ACV holds at 54K.
    - Customers ramp to 10 logos by M24 and 20 by M36.
    - Hiring follows the plan in A15 with no extra management layer added.
  upside:
    description: ACV reaches 60K and referrals plus adjacent wholesale expansion pull the company to 26 logos by Y3 exit.
    y3RevenueK: 1230.0
    y3EbitdaK: -387.0
    cashLowPointK: 778.5
    keyAssumptionChanges:
    - Production ACV expands from 54K to 60K as portal automation is adopted earlier.
    - End-of-Y3 customer count increases from 20 to 26 through faster referral conversion.
    - The beachhead opens into adjacent wholesalers in the final year without adding major headcount.
sensitivity:
- variable: ARPU
  downsideCase: ACV settles at 45K because buyers frame the product as a narrow workflow tool.
  baseCase: ACV stays at 54K, within the BP pricing band.
  upsideCase: ACV reaches 60K once portal automation and multi-entity scope attach.
  y3RevenueImpactK: -132.8
  cashImpactK: -92.9
- variable: CAC
  downsideCase: CAC rises to 35K and each rep closes fewer qualified pilots from the same spend base.
  baseCase: CAC is 27K with founder-led selling plus referral help.
  upsideCase: CAC drops to 22K as ERP partners supply warmer pipeline.
  y3RevenueImpactK: -81.0
  cashImpactK: -159.0
- variable: churn
  downsideCase: Monthly churn rises to 2.5% because integrations stay brittle and trust is slower to earn.
  baseCase: Monthly churn is 1.5% as modeled.
  upsideCase: Monthly churn drops to 1.0% once ROI dashboards and playbooks are embedded.
  y3RevenueImpactK: -63.0
  cashImpactK: -108.0
- variable: sales cycle
  downsideCase: Discovery to production stretches to 6 months because security and ERP review take longer.
  baseCase: Discovery to production runs about 4-5 months including a paid pilot.
  upsideCase: Referrals shorten the path to 3-4 months by pre-clearing buyer trust.
  y3RevenueImpactK: -94.5
  cashImpactK: -141.0
- variable: gross margin
  downsideCase: Gross margin is 65% because model inference and support costs stay high.
  baseCase: Gross margin stays at the BP target of 70%.
  upsideCase: Gross margin reaches 75% after workflows and evidence retrieval become more repeatable.
  y3RevenueImpactK: 0.0
  cashImpactK: -39.8
- variable: hiring pace
  downsideCase: AE2 and the second engineer are pulled forward by one quarter before repeatability is proven.
  baseCase: Hiring follows A15 and stays behind demand until pilots convert.
  upsideCase: Noncritical hires slip one quarter later with no revenue penalty because referrals carry pipeline.
  y3RevenueImpactK: 0.0
  cashImpactK: -108.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> Pilots
      Pilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: The base case reaches 796.5K of Y3 revenue by turning founder-led pilots into 20 production logos at 54K ACV with referrals accelerating in Y2.
- checkName: Must go right
  finding: The first 2-3 ERP and portal integration patterns must stay repeatable enough to hit 10 logos by month 24 without adding a services-heavy team.
- checkName: Model breaks if
  finding: Sensitivity is highest to ACV and sales-cycle slippage, and either one can erase roughly 100K of Y3 revenue and put the cash buffer at risk.
- checkName: Next-round proof
  finding: Seed readiness comes from showing 10 production logos, sub-45-day deployment, and early expansion attach by the time the 30-month runway reaches its milestone.
sanityChecks:
  ruleOf40: Y3 growth 164.2% + EBITDA margin -86.7% = 77.5%.
  burnMultiple: Y3 net burn 690.4K / net new ARR 540.0K = 1.28x.
  revenuePerFte: 113.8K Y3 using 7 ending FTE (benchmark 200-400K SaaS).
  flags:
  - Revenue per FTE remains below mature SaaS benchmarks because the model keeps an integration-capable team ahead of scale.
  - Base case excludes paid pilot and implementation revenue, so early topline is conservative relative to the BP revenue streams.
  - The company is still EBITDA negative in Y3, so the next round needs to be raised before the modeled 317.2K year-end cash balance gets thin.
  - The beachhead SAM is modest, so Y3-to-Y4 expansion into adjacent wholesale verticals is necessary for venture-scale outcomes.
