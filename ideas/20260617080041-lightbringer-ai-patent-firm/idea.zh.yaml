topRisks:
  - name: "法律标准持续演变"
    description: "USPTO 发明人认定指引和上诉判例仍在形成中；产品所针对的文件记录标准可能随时调整，需要持续更新产品。"
    mitigation: "聘请一位专注于 CAFC 的专利律师担任监管情报顾问，并将贡献图谱建立在持久性原则之上——捕获人类创造性决策——而非易变的具体表单要求。"
  - name: "专利律师的采用阻力"
    description: "外部专利律师可能抵制一款部分自动化其发明人认定审查工作的工具——面对非自己监督下产生的证据，他们可能放慢企业销售进程。"
    mitigation: "优先向 CTO 销售，将其定位为工程治理产品，并将专利法律顾问定位为溯源包的专家审核者，而非被替代的角色。"
  - name: "初始滩头市场较窄"
    description: "第一个可触达的细分市场——AI 密集型、持有活跃专利组合的深度科技初创公司——足够窄，以至于在生物科技和半导体扩张准备就绪前，早期管线可能就已枯竭。"
    mitigation: "与服务深度科技客户的 IP 律所并行开展探索——这些律所汇聚了数十家被投公司的需求，能将管线加速拓展至直销初创公司路径之外。"
