problem: >-
  深度科技公司在国防、量子计算和清洁技术领域，越来越多地将 AI 仿真、AI 辅助设计和生成式工具嵌入研发流程。申请专利时，他们必须证明每位具名发明人均作出了真实的人类创造性贡献——这一标准正受到专利局和上诉法院的严格审查。目前没有任何系统能在发明过程中监控 AI 工具的使用并留下人类贡献与 AI 贡献的审计级记录；团队只能依赖事后拼凑的电子邮件声明，这类声明根本经不起专利有效性挑战。一项专利被宣告无效，就可能摧毁初创公司的护城河，也可能断送一轮融资或并购进程。
targetUser:
  primary: "A 轮至 C 轮量子计算、国防硬件或先进材料深度科技初创公司的 CTO 或工程副总裁"
  secondary: "为深度科技客户提供发明人文件记录咨询的专利法律顾问"
  buyer: "掌控 IP 运营预算的 CTO 或总法律顾问"
startupThesis:
  nonObviousInsight: >-
    大多数人把 AI 视为辅助专利申请的工具。真正被忽视的威胁恰恰相反：研发中使用的 AI 工具会悄然腐蚀专利有效性——因为没有审计追踪，就无法证明人类的发明权。Lightbringer 300% 的增速表明专利软件市场已经成熟；而上游发明人认定缺口，正是每一款专利审查工具刻意绕开的问题。
  beachhead: "A 轮至 B 轮量子计算和国防硬件深度科技初创公司——每天使用 AI 仿真工具、持有五项或以上活跃专利申请"
  wedge: "集成于研发环境的 AI 工具使用自动监控——实时捕获人类贡献证据，并生成符合 USPTO 要求的发明人认证包"
  whyNowCatalyst: >-
    Lightbringer $10M A 轮融资和 300% 的增速，恰好在 AI 工具涌入同一批公司赖以构建竞争性 IP 的研发工作流时，验证了深度科技专利软件市场的真实需求。
  ventureScalePath: >-
    从量子计算和国防深度科技的 AI 发明人追踪起步，然后扩展到生物科技（AI 辅助药物发现）和半导体设计——同样的发明权合规缺口在这些领域以更大的专利组合规模存在。在溯源图谱之上叠加许可管线智能，最终成为 AI 时代研发的 IP 运营平台。
solution: >-
  IDE 和实验室工具插件监控哪些 AI 系统接触了研发过程中的哪些设计产出物，在创建时为每项 AI 生成的建议或输出打上标记。当发明人披露被触发时，平台生成结构化的发明人认定包——呈现区分发明与 AI 基础的人类决策、修改和创造性跨越——可供专利法律顾问审阅。该平台与 Lightbringer、现有专利审查工具及 USPTO EFS-Web 集成，确保溯源记录随申请流转。实时贡献看板让 CTO 在尽职调查请求到来前就能预见整个专利组合的发明人认定风险。
goToMarketSeed:
  firstCustomer: >-
    一家 B 轮量子计算初创公司，持有 10–30 件待审专利申请，每天使用 AI 仿真工具，且投资人律师已要求在 C 轮交割前完成发明人文件记录核查。
  buyingTrigger: >-
    投资人尽职调查请求标记出初创公司研发环境中未记录的 AI 工具使用情况，或 USPTO 审查意见就待审申请提出发明人认定疑问。
  currentAlternative: >-
    由外部专利律师审阅的人工发明人声明邮件，通常耗时两到四周，且不留下任何持久的审计追踪。
  switchingReason: >-
    自动溯源捕获只需数分钟而非数周，成本仅为律师小时费的零头，并产生同期证据——而非诉讼对手可以质疑的自我声明。
  pricingHypothesis: >-
    SaaS 订阅按每项活跃专利申请每年定价（例如 $500–$1,200 per application），让成本与产生合规义务的 IP 组合规模直接挂钩。
whyNow:
  - point: "Lightbringer 300% 的年增长率和 $10M A 轮融资证明深度科技创始人正在为专利运营软件主动买单，验证了上游溯源工具的市场基础。"
    signalRefs: ["深度科技专利需求已获风险资本验证"]
    sourceRefs: [1]
  - point: "Lightbringer 点名的客户——国防无人机、量子传感、基础设施——正是 AI 仿真和生成式设计普及最快的行业，未记录的 AI 贡献已构成迫在眉睫的专利无效风险。"
    signalRefs: ["Lightbringer 服务的正是 AI 工具普及最快的行业"]
    sourceRefs: [2]
  - point: "市场正在向全生命周期专利掌控迈进，但没有任何在位企业或新兴工具能填补专利审查软件遗留下来的申请前发明人文件记录缺口。"
    signalRefs: ["市场正走向全生命周期专利掌控"]
    sourceRefs: [2]
  - point: "深度科技初创公司已深受 Lightbringer 所针对的两个月申请滞后之苦；发明人文件记录又在此基础上再增数周瓶颈——两者叠加，让任何能同时消除这两道障碍的工具都具有紧迫价值。"
    signalRefs: ["两个月申请滞后带来优先权丧失风险"]
    sourceRefs: [2]
differentiator: >-
  现有的所有专利工具——包括 Lightbringer——都从人类发明人提交披露表格时才开始介入。这款产品从研发环境中第一个 AI 工具被打开的那一刻就开始捕获贡献证据，早于任何律师介入之前。由此产生的溯源图谱是一条连续、防篡改的记录，而非事后追溯的声明——在诉讼或 USPTO 审查中结构性上更具可辩护性。与量子计算和国防研发中使用的特定 AI 工具的深度集成，构建出专利审查工具无法复制的转换成本。
conceptDiagram:
  title: AI 发明溯源栈——核心流程
  mermaid: |
    flowchart LR
      RD[研发工程师] --> Monitor[溯源监控器]
      Monitor --> ContribGraph[贡献图谱]
      ContribGraph --> Package[发明人认定包]
      Package --> Counsel[专利法律顾问]
      Counsel --> Filing[专利申请]
      ContribGraph --> Dashboard[CTO 看板]
