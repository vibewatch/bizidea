  - "incumbentClass": "专利情报平台"
    "point": "PatSnap 和 Questel 类平台在检索、专利地形图和分析方面实力强劲，但这种强项并不能自动转化为可采信的发明权溯源记录或律师就绪的认证包。"
    "sourceRefs":
