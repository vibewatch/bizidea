  "wedge": "面向初创公司专利创建和管理的 AI 原生专利服务与平台。"
  "pricing": "以服务主导和固定费用定位；获取的页面上未公开详细软件定价。"
  "strength": "强劲的初创公司定位、清晰的 AI 原生叙事，以及报告的 200 家以上客户牵引力。"
  "weaknessVsUs": "从披露和专利工作流开始介入，而非从研发工具内部的持续 AI 对人类溯源捕获开始。"
  "sourceRefs":
  - 24
  - 39
  - 44
  - 46
  - 50
- "name": "Anaqua"
  "stage": "incumbent"
  "wedge": "面向企业和律所的企业 IP 管理、档期管理和服务。"
  "pricing": "报价主导的企业软件和服务。"
  "strength": "深厚的运营广度、服务、入职和律所工作流覆盖。"
  "weaknessVsUs": "记录系统的强项不能自动解决 AI 被使用时上游发明权证据的问题。"
  "sourceRefs":
  - 51
  - 56
- "name": "Questel"
  "stage": "incumbent"
  "wedge": "全球 IP 管理、检索和专利服务平台。"
  "pricing": "报价主导的平台和服务模式。"
  "strength": "检索、管理、续期和服务方面的广泛全球覆盖。"
  "weaknessVsUs": "广泛套件定位留下了空间，供一款插入申请流程而非替换整个技术栈的窄溯源产品占位。"
  "sourceRefs":
  - 64
  - 66
- "name": "PatSnap"
  "stage": "scale-up"
  "wedge": "AI 驱动的专利情报和研发洞察平台。"
  "pricing": "企业报价模式；公开页面强调用例而非标价。"
  "strength": "强劲的检索、地形图和 AI/研发分析叙事。"
  "weaknessVsUs": "在检索和解读现有技术或技术趋势方面出色，但在监管链式发明权认证方面定位薄弱。"
  "sourceRefs":
  - 86
  - 96
- "name": "Alt Legal"
  "stage": "scale-up"
  "wedge": "现代云档期管理和律所工作流自动化。"
  "pricing": "演示主导的工作流产品，具有产品化功能包装。"
  "strength": "清晰的律所 UX 和档期管理自动化专注。"
  "weaknessVsUs": "针对记录存在后的截止日期和事务管理优化，而非证明谁构思了 AI 辅助发明。"
  "sourceRefs":
  - 81
  - 103
"regulatoryTechnicalConstraints":
- "point": "只有自然人能成为发明人；产品必须帮助证明人类构思，而非暗示 AI 系统是发明人或共同发明人。"
  "sourceRefs":
  - 1
  - 5
  - 12
