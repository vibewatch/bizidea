    - 103
    - 110
  "competitiveLandscape": "竞争格局分为五类：AI 原生专利服务平台、企业 IP 管理套件、全球 IP 工作流与服务平台、以档期管理为核心的律所工具，以及专利情报/检索供应商。没有任何一家明显掌控研发工作流内部的持续 AI 对人类溯源捕获；大多数工具从发明披露、档期管理、检索或审查程序才开始介入。"
  "incumbentThesis":
  - "incumbentClass": "专利管理套件"
    "point": "Lightbringer、Anaqua 和 Questel 已掌控下游的发明披露、组合管理和专利审查邻近工作流——初创公司不能靠成为另一套记录系统来取胜，而要靠在这些系统启动之前创建证据来取胜。"
    "sourceRefs":
