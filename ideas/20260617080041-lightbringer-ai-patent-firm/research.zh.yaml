  - "incumbentClass": "人工律师与电子表格"
    "point": "默认替代方案仍是律师主导的声明、电子表格和披露表格。这条路径之所以根深蒂固，是因为它熟悉——但它缓慢、昂贵，且在产生同期证据方面极为薄弱。"
    "sourceRefs":
