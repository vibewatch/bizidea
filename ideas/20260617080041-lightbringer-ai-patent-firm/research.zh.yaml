"reportMemo":
  "executiveTakeaways":
  - "近期切口确实存在：专利团队越来越接受研发中使用 AI，但法律标准仍将发明权锚定在人类构思上——这制造了新的证据缺口，而非新的申请捷径。"
  - "这是一个合规工作流的销售，不是通用 AI 副驾驶的销售。买家更在意可审计性、律师认可度和安全部署，而非模型新颖性。"
  - "在位企业掌控下游专利管理，而非上游发明溯源——这为一款在发明披露表格产生之前就开始工作的窄而紧迫的产品留下了空间。"
  - "滩头市场有吸引力但规模有限；可信的第三年结果是个位数百万美元 ARR——除非公司从初创专利团队扩展到律所、生物科技、半导体和企业研发实验室。"
  - "GTM 打法应搭乘现有信任网络：深度科技律师、AI 原生专利公司，以及在融资和并购中已对 IP 质量进行尽职调查的投资人。"
  "marketDefinition": "在研发过程中创建人类与 AI 贡献审计级记录、并将该记录转化为供法律顾问使用的申请就绪发明人认定支持的软件。它位于专利管理、档期管理和审查程序系统的上游——那些工具从披露或申请开始，而这款产品从 AI 被用于塑造底层发明时就开始工作。"
  "customerAndBuyer": "主要用户是在日常设计或仿真工作中使用 AI 的专利活跃深度科技初创公司的 CTO、工程负责人和专利运营负责人。经济决策者通常是 CTO 或总法律顾问，外部专利律师则是关键的技术验证方——因为律师必须愿意依赖生成的溯源包。"
  "buyingTriggers":
  - "point": "融资、并购或投资人尽职调查迫使公司证明专利质量，暴露出当前发明人声明是事后追溯且脆弱的。"
    "sourceRefs":
    - 24
    - 35
    - 36
  - "point": "活跃申请或发明人认定审查需要证明只有自然人构思了所主张的发明，且任何错误能在演变为诉讼问题前得到纠正。"
    "sourceRefs":
