  "willingnessToPay":
    "summary": "当工具能替代外部律师协调并降低生存性 IP 风险时，付费意愿就会存在。Tech Funding News 报道 Lightbringer 以将申请周期从约两个月缩短至数天、成本约降至一半为卖点；Baker Botts 和 McDermott 则显示发明人认定错误会损害专利价值。SimpleIP 和 Triangle IP 都在引导买家摆脱电子表格和不透明行政成本，暗示减少法律和运营拖累的软件预算已经存在。"
    "sourceRefs":
    - 25
    - 35
    - 36
