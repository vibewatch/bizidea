topRisks:
  - name: Evolving legal standard
    description: USPTO inventorship guidance and appellate case law are still forming; the documentation standard the product targets may shift, requiring constant product updates.
    mitigation: Retain a CAFC-specialized patent attorney as a regulatory intelligence advisor and build the contribution graph around durable principles—capturing human creative decisions—rather than specific form requirements that change.
  - name: Patent counsel adoption friction
    description: Outside patent counsel may resist a tool that partially automates their inventorship review work, producing evidence they did not supervise and slowing enterprise sales.
    mitigation: Sell to CTOs first as an engineering governance product and position patent counsel as the expert reviewer of provenance packages, not as a role being replaced.
  - name: Narrow initial beachhead
    description: The first addressable segment—AI-heavy deep-tech startups with active patent portfolios—is narrow enough that early pipeline could dry up before the biotech and semiconductor expansion is ready.
    mitigation: Run parallel discovery with IP law firms serving deep-tech clients, who aggregate demand across dozens of portfolio companies and can accelerate pipeline beyond the direct startup path.
