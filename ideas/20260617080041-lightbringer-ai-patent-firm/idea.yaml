problem: >-
  Deep-tech companies in defence, quantum, and clean tech increasingly rely on AI simulation, AI-assisted
  design, and generative tools throughout their R&D workflows. When they file patents they must certify
  that every named inventor made a genuine human creative contribution—a standard now under active scrutiny
  by patent offices and appellate courts. Today no system monitors AI tool usage during invention and produces
  an audit-grade record of human versus AI contribution; teams rely on after-the-fact email declarations
  that would not survive a validity challenge. A single invalidated patent can eliminate a startup's
  competitive moat and destroy a fundraising or M&A process.
targetUser:
  primary: CTO or VP of Engineering at a Series A–C deep-tech startup in quantum computing, defense hardware, or advanced materials
  secondary: Patent counsel advising deep-tech clients on inventorship documentation
  buyer: CTO or General Counsel controlling the IP operations budget
startupThesis:
  nonObviousInsight: >-
    Most people see AI as a tool that helps with patent filing. The non-obvious threat is the inverse:
    AI tools used during R&D silently corrode patent validity by making it impossible to prove human
    inventorship without an audit trail that no one currently builds. Lightbringer's 300% growth signals
    the patent software market is ready; the upstream inventorship gap is the problem every prosecution
    tool deliberately skips.
  beachhead: Series A–B deep-tech startups in quantum computing and defense hardware that use AI simulation tools daily and have five or more active patent applications
  wedge: Automated AI-tool usage monitoring integrated into the R&D environment that captures human contribution evidence in real time and generates USPTO-ready inventorship attestation packages
  whyNowCatalyst: >-
    Lightbringer's $10M Series A and 300% growth validates the deep-tech patent software market just
    as AI tools flood the exact R&D workflows those same companies depend on for competitive IP.
  ventureScalePath: >-
    Start with AI inventorship tracking for quantum and defense deep-tech, then expand into biotech
    (AI-assisted drug discovery) and semiconductor design where the same inventorship compliance gap
    exists at much larger portfolio scale. Layer licensing pipeline intelligence on top of the
    provenance graph to become the IP operations platform for AI-era R&D.
solution: >-
  An IDE- and lab-tool plugin monitors which AI systems touched which design artifacts during R&D,
  tagging each AI-generated suggestion or output at creation time. When an inventor disclosure is
  triggered, the platform generates a structured inventorship package—showing the human decisions,
  modifications, and creative leaps that distinguish the invention from the AI substrate—ready for
  review by patent counsel. The platform integrates with Lightbringer, established prosecution tools,
  and USPTO EFS-Web so the provenance record travels with the application. A real-time contribution
  dashboard lets CTOs see inventorship risk across their entire patent portfolio before a due diligence
  request lands.
goToMarketSeed:
  firstCustomer: >-
    A Series B quantum computing startup with 10–30 pending patent applications that uses AI simulation
    tools daily and has been asked by investor counsel to clear inventorship documentation before a
    Series C close.
  buyingTrigger: >-
    An investor due diligence request flagging undocumented AI tool usage in the startup's R&D
    environment, or a USPTO office action raising inventorship questions on a pending application.
  currentAlternative: >-
    Manual inventor declaration emails reviewed by outside patent counsel, typically taking two to four
    weeks and producing no durable audit trail.
  switchingReason: >-
    Automated provenance capture takes minutes instead of weeks, costs a fraction of attorney hourly
    time, and produces contemporaneous evidence rather than self-certifying declarations that a
    litigation adversary could challenge.
  pricingHypothesis: >-
    SaaS subscription priced per active patent application per year (e.g., $500–$1,200 per application),
    aligning cost directly with the IP portfolio size that creates the compliance obligation.
