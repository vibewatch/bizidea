slug: ai-invention-provenance-stack
date: '2026-06-17'
executiveSummary: >-
  This company sells compliance-grade invention provenance software to patent-active deep-tech startups that use AI inside R&D and cannot afford an inventorship challenge during fundraising, M&A, or prosecution. The initial customer is a Series A-B quantum or defense hardware startup with 5+ active patent applications, daily use of simulation or generative tools, and an imminent financing or filing event that forces IP diligence. The product wedge is not patent drafting or portfolio management; it is continuous capture of AI-versus-human contribution evidence before the invention disclosure form exists. That wedge fits the research: patent offices still require human inventors, Lightbringer has validated demand for patent-ops software, and current substitutes remain manual declarations, spreadsheets, and outside-counsel coordination. The first proof point is counsel acceptance of a machine-generated provenance package on a live filing or diligence review, because distribution, pricing, and retention all depend on that trust threshold. Go-to-market should therefore start with direct founder sales into acute diligence moments and referral distribution through deep-tech patent counsel and AI-native patent firms, not broad top-of-funnel SaaS marketing. Market size appears real but specialized, with research estimating roughly $77.9M TAM, $23.4M SAM, and a credible year-three SOM near $3.0M, so expansion into biotech, semiconductors, and enterprise R&D labs is necessary for venture scale. A key evidence gap remains how often investors or acquirers already request AI-contribution documentation, so the early company must test demand intensity before scaling headcount or building broad integrations.
problem:
  - Deep-tech teams increasingly use AI in simulation, design, and analysis, but patent law still requires proof of human conception and current workflows do not capture that evidence contemporaneously.
  - Manual inventor declarations assembled by engineers and outside counsel are slow, expensive, and weak in diligence or litigation because they reconstruct inventorship after the fact.
solution:
  - Instrument the R&D workflow to record which AI systems touched which artifacts, which humans accepted or modified outputs, and which decisions support claimed invention.
  - Generate editable counsel-ready inventorship packages and portfolio risk dashboards that plug into existing disclosure and prosecution systems instead of replacing them.
whyWeWin:
  - Incumbents own downstream filing, docketing, and portfolio workflow; this product starts upstream at the moment AI enters R&D, where no visible category leader has a strong position.
  - If counsel accepts the provenance package format, the company compounds a proprietary corpus of reviewed evidence chains, correction patterns, and secure deployments that generic patent tools lack.
strategicChoices:
  beachhead: Series A-B U.S. quantum computing and defense hardware startups with 5-30 active patent applications, daily AI-assisted simulation or design work, and an upcoming financing or filing event.
  wedgeRationale: The beachhead is narrow enough that the pain is existential and time-bound, because these teams depend on patents for financing while already using AI in the exact workflows that create inventorship ambiguity.
  sequencingRationale: Start with notebook, simulation, and design-tool evidence capture for one live application, win counsel acceptance, then expand into portfolio dashboards, downstream integrations, and secure deployment because GTM, retention, and product credibility all depend on proving one package works end to end.
  notYet:
    - Biotech discovery workflows until the core evidence model is accepted by counsel in the first beachhead.
    - Broad law-firm practice management features that would turn the company into another docketing or portfolio system.
    - Non-U.S. filing workflows beyond exportable evidence support until the USPTO-centered package is validated.
market:
  tam: "$77.9M estimated TAM based on 57,669 deep-tech startups, a 15% patent-intensive share, about 10 active applications per account, and roughly $900 annual spend per application."
  sam: "$23.4M estimated SAM focused on North America and Europe AI-heavy deep-tech teams with denser patent activity."
  som: "$3.0M estimated year-three SOM based on about 150 customers, roughly 20 active applications per customer, and around $1,000 annual spend per application."
  segments:
    - Series A-C deep-tech startups in quantum, defense hardware, and advanced materials with active patent portfolios
    - Patent counsel and AI-native patent firms serving those startups
  buyingProcess: >-
    Buying starts when a CTO, GC, or patent lead faces a financing diligence request, priority-date crunch, or inventorship review and needs evidence fast. Economic approval usually sits with the CTO or General Counsel, but outside patent counsel must validate the package before the deal expands beyond a pilot.
product:
  mvp: >-
    The MVP monitors a narrow set of high-value R&D surfaces, likely notebooks plus one simulation or design environment, records AI and human contribution events, and produces an editable USPTO-oriented inventorship package for one application. It must include evidence review, export, and access controls strong enough for counsel and defense-adjacent customers to test it on live matters.
  sixMonth: Land 3-5 design-partner pilots, support one live counsel-reviewed filing or diligence event per account, and ship integrations into one disclosure system plus one downstream prosecution handoff.
  twelveMonth: Add portfolio-level risk dashboards, package templates for multiple claim types, private-cloud deployment, and the top three workflow integrations across the first 20 target accounts.
  twentyFourMonth: Expand from startup accounts into repeatable law-firm and enterprise R&D deployments, add Europe-ready evidence support, and open adjacent verticals such as semiconductors or biotech only after the first beachhead converts consistently.
  keyBets:
    - Counsel will trust an editable provenance package if the raw evidence chain is inspectable.
    - The first 20 accounts cluster around a small number of notebook, simulation, and design tools, keeping integration scope manageable.
    - Security and deployment requirements can be met with private-cloud controls before full on-prem or air-gapped builds are necessary.
gtm:
  wedge: Sell a live inventorship-risk pilot tied to one imminent filing or diligence event, then convert to annual per-application coverage once counsel signs off on the first package.
  channels:
    - Direct founder-led sales to CTOs and GCs during financing, M&A, and filing crunches
    - Referral partnerships with deep-tech patent counsel and AI-native patent firms
    - Portfolio-governance introductions through deep-tech VCs and accelerators
  funnelTargets: "Lead→qualified pilot 20-30%, qualified pilot→live package 60%+, live package→annual production 50%+, production expansion to additional applications within 6 months 70%+"
  pricing: Annual SaaS priced per active patent application, with an initial paid pilot for 5-15 applications and conversion to broader annual coverage because value scales with the portfolio under inventorship risk and maps directly to the current legal spend being displaced.
businessModel:
  revenueStreams:
    - Annual subscription priced per active patent application under provenance coverage
    - Implementation or secure deployment fees for private-cloud and defense-adjacent accounts
    - Law-firm or portfolio-review licenses for counsel managing multiple startup clients
  unitOfValue: Active patent applications covered by a counsel-accepted provenance package
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one pilot application to the full active portfolio inside the same account
    - Add law-firm multi-client review workflows after startup-side package acceptance is proven
    - Enter adjacent verticals with similar AI-assisted inventorship risk, starting with semiconductors and biotech
strategyMap:
  northStarMetric: Active patent applications covered by counsel-accepted provenance packages
  inputMetrics:
    - Number of live filings or diligence events processed per quarter
    - Counsel package acceptance rate without major manual rework
    - Median days from pilot kickoff to first package delivered
    - Pilot-to-annual conversion rate
    - Number of supported high-value R&D tools covering 80% of target-account workflows
  moatsToBuild:
    - Counsel-reviewed provenance graph and attestation template corpus
    - Deep integrations into notebook, simulation, and design environments used by the beachhead
    - Secure deployment and evidence-governance playbooks for defense-adjacent accounts
  killCriteria:
    - Fewer than 3 of the first 10 pilots reach counsel acceptance on a live matter
    - Median deployment time stays above 45 days after the first five pilots
    - Pilot buyers refuse to convert to annual per-application pricing at 50%+ after first package delivery
  mermaid: |
    flowchart LR
      Wedge[Financing or filing trigger] --> MVP[Single-application provenance MVP]
      MVP --> Proof[Counsel-accepted package on live matter]
      Proof --> Expansion[Portfolio coverage plus law-firm referrals]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong wedge clarity and real pain, but conviction is capped by small initial market and unproven counsel acceptance.
    whyBelieve: The company targets a newly urgent compliance gap created by AI-heavy R&D and validated by both patent-law guidance and active spend on patent-ops software.
    whyDoubt: The beachhead is narrow, adjacent incumbents already own trust and budget, and there is not yet evidence that investors or counsel will standardize around this package format.
    nextDiligence: Verify that at least several deep-tech law firms will use an editable provenance package on live filings and that pilots convert to annual coverage.
  firstCustomer:
    title: Series B quantum computing startup preparing for a financing diligence process
    profile: A U.S.-based deep-tech company with 10-30 pending or active patent applications, daily use of AI simulation tools, outside patent counsel, and high dependence on IP quality for the next round.
    trigger: Investor or acquirer counsel asks for support on AI-assisted inventorship, or a pending filing must be cleared before a priority date passes.
    buyer: CTO or General Counsel
    initialContract: Paid pilot covering 5-15 active applications, converting to annual per-application coverage across the portfolio once outside counsel accepts the first package and the next filing cycle uses the workflow.
  mustBeTrue:
    - At least half of qualified pilots convert to annual coverage after the first live package is delivered.
    - Outside patent counsel accepts the package format with limited manual rewrite on real matters.
    - The first 20 target accounts concentrate workflow usage in a small enough tool set to support with fewer than five core integrations.
    - Buyers continue to pay per-application pricing because it is cheaper than repeated manual counsel coordination.
    - Adjacent incumbents do not ship equivalent upstream provenance capture before the startup earns trusted distribution through counsel and partners.
  diligenceQuestions:
    - How often do recent deep-tech financing or M&A diligence checklists ask about AI-assisted inventorship evidence?
    - Which exact tools create the evidentiary surface in the beachhead: notebooks, CAD, simulation, EDA, or lab systems?
    - What level of editability and review control do outside counsel require before relying on a machine-generated package?
    - Is private cloud sufficient for defense-adjacent buyers, or do the earliest deals require on-prem or air-gapped deployment?
    - Can a counsel or AI-native patent-firm channel produce lower CAC than founder-led direct sales after the first pilots?
operatingAssumptions:
  - assumption: A financing or filing trigger creates enough urgency that CTOs or GCs will buy a paid pilot before a broader legal standard fully settles.
    basis: research.yaml
    validationTest: Close five paid pilots tied to live filings, diligence reviews, or office-action responses within the first two quarters.
    decisionImpact: If false, reposition the product around cycle-time and cost reduction rather than existential inventorship risk.
  - assumption: Outside counsel will accept a software-generated provenance package if they can inspect and edit the evidentiary chain.
    basis: research.yaml
    validationTest: Run pilots with at least three law firms and measure acceptance rate, required edits, and willingness to reuse the format.
    decisionImpact: If false, the product must become a counsel-operated workflow tool rather than a startup self-serve compliance layer.
  - assumption: The first target accounts share a narrow enough technical stack that the MVP can win with limited integrations.
    basis: operator judgment
    validationTest: Map the R&D tools used by the first 20 accounts and confirm that three integrations cover at least 80% of monitored invention workflows.
    decisionImpact: If false, narrow the vertical further or shift toward API ingestion and services-led onboarding.
  - assumption: Private-cloud security controls satisfy the first defense-adjacent buyers without immediate air-gapped deployment.
    basis: research.yaml
    validationTest: Put private-cloud deployment through security review in two defense-adjacent pilots and log blocked requirements.
    decisionImpact: If false, delay defense-heavy GTM and prioritize commercial quantum or advanced-materials accounts first.
  - assumption: Per-application pricing remains legible and attractive relative to manual counsel coordination costs.
    basis: idea.yaml
    validationTest: Test pricing on ten pilot proposals and track discount pressure, expansion behavior, and objections by portfolio size.
    decisionImpact: If false, move to platform-plus-usage pricing or sell through law firms with bundled review economics.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview ten deep-tech CTOs, GCs, and patent leads on recent AI-assisted filing and diligence events.
    hypothesis: The buying trigger is a live financing or filing event, not general curiosity about AI governance.
    successMetric: At least six interviews describe a concrete recent event that would justify a paid pilot.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run package-format workshops with three outside patent firms serving quantum or defense startups.
    hypothesis: Counsel will accept an editable provenance package if it shows raw evidence, human decisions, and claim linkage.
    successMetric: Two firms agree to use the format on a live or shadow matter with only minor template changes.
    owner: Founder CEO plus IP advisor
  - horizon: 0–90 days
    experiment: Scope the first 20 target accounts' tool stacks and pick the initial monitoring surfaces.
    hypothesis: Notebook plus one simulation or design environment covers the majority of first-use cases.
    successMetric: Three integrations cover at least 80% of the first 20 accounts' critical invention workflows.
    owner: Founding eng
  - horizon: 0–90 days
    experiment: Build MVP provenance capture and export for one live application workflow.
    hypothesis: A minimally integrated product can deliver a first package within 14 days of pilot kickoff.
    successMetric: First live package delivered in 14 days or less for two pilot accounts.
    owner: Founding eng
  - horizon: 0–90 days
    experiment: Test paid pilot offers through direct outreach and counsel referrals.
    hypothesis: Referral-led pilots convert faster and at higher price than cold direct outreach.
    successMetric: Pilot close rate from referred opportunities is at least 2x direct outreach close rate.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Security review a private-cloud deployment pattern with one defense-adjacent prospect.
    hypothesis: Private cloud plus evidence access controls clears initial security objections without air-gapped deployment.
    successMetric: Prospect security team approves pilot scope without requiring full on-prem deployment.
    owner: Founding eng
operations:
  - Maintain a chain-of-custody evidence store with role-based access, immutable logs, and retention policies aligned to patent timelines.
  - Run a counsel-review workflow so every early package is checked against the current inventorship guidance before broad reuse.
  - Maintain integration connectors into disclosure, prosecution, and document-management systems already used by target accounts.
  - Establish a secure deployment playbook for private-cloud defense-adjacent pilots before pursuing larger regulated accounts.
  - Operate a referral pipeline with deep-tech patent counsel and AI-native patent firms, including revenue-share or co-sell terms where appropriate.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Must sell into urgency-driven CTO and counsel workflows, shape the package format, and recruit design partners before the product broadens.
  - role: Founding eng
    startTiming: Month 0
    rationale: Needed to build the provenance capture layer, evidence graph, and first export workflow across a narrow set of R&D tools.
  - role: IP product counsel or advisor
    startTiming: Month 1
    rationale: Required to keep outputs aligned with evolving inventorship doctrine and make outside counsel comfortable using the package.
  - role: Security and platform engineer
    startTiming: Month 6
    rationale: Added once pilots convert and defense-adjacent deployment, access control, and auditability become gating requirements.
  - role: Partnerships or account executive
    startTiming: Month 9
    rationale: Hired only after the founder proves a repeatable motion through counsel and AI-native patent-firm channels.
milestones:
  - horizon: 0–12 months
    items:
      - "Close 3-5 paid design-partner pilots in quantum or defense hardware."
      - "Deliver at least five live provenance packages reviewed by outside counsel."
      - "Ship notebook plus one simulation or design integration and one downstream disclosure or prosecution handoff."
      - "Convert at least two pilots to annual per-application subscriptions."
  - horizon: 12–24 months
    items:
      - "Reach repeatable portfolio expansion within startup accounts rather than one-off application pilots."
      - "Launch private-cloud deployment and standardized counsel review templates."
      - "Add law-firm multi-client workflow and secure 2-3 referral partners generating qualified pipeline."
      - "Test one adjacent vertical such as semiconductors or biotech only after the core beachhead converts."
  - horizon: 24–36 months
    items:
      - "Reach the researched SOM trajectory of roughly $3.0M ARR if conversion and expansion assumptions hold."
      - "Support U.S.-first evidence workflows at portfolio scale and pilot Europe-oriented package support."
      - "Decide whether to remain a provenance layer or expand into broader IP operations based on channel economics and incumbent response."
risks:
  - risk: Legal guidance on AI-assisted inventorship evolves in ways that reduce documentation urgency or change required evidence.
    likelihood: Medium
    impact: High
    mitigation: Keep an IP advisor close, design around durable proof of human conception, and test whether cycle-time savings alone can support demand.
  - risk: Outside counsel rejects or heavily rewrites the package, preventing trust-based distribution.
    likelihood: High
    impact: High
    mitigation: Co-design the format with early firms, expose the raw evidence chain, and require live-matter validation before scaling sales.
  - risk: Integration sprawl across notebooks, simulation, CAD, and lab systems makes onboarding too slow.
    likelihood: Medium
    impact: High
    mitigation: Narrow the beachhead to a concentrated workflow stack and delay lower-frequency integrations until repeatability is proven.
  - risk: Defense-adjacent buyers require on-prem or air-gapped deployment earlier than planned.
    likelihood: Medium
    impact: Medium
    mitigation: Start with commercial deep-tech accounts and treat defense as a follow-on segment until secure deployment economics are clear.
  - risk: Incumbent patent-workflow vendors add upstream provenance features once the category becomes visible.
    likelihood: Medium
    impact: Medium
    mitigation: Build trust through counsel-reviewed evidence quality, live package acceptance data, and deep workflow integrations before broader vendors react.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of product build, counsel validation, secure deployment, and founder-led GTM to prove live package acceptance, pilot conversion, and a repeatable referral channel before scaling headcount.
