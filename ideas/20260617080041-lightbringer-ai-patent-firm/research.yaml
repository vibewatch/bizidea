"reportMemo":
  "executiveTakeaways":
  - "The near-term wedge is real: patent teams increasingly accept AI inside R&D, but the legal standard still anchors inventorship in human conception, creating a new evidence gap rather than a new filing shortcut."
  - "This is a compliance workflow sale, not a generic AI copilot sale. Buyers care about auditability, counsel acceptance, and secure deployment more than model novelty."
  - "Incumbents own downstream patent administration, not upstream invention provenance. That leaves room for a narrow but urgent product that starts before the invention disclosure form exists."
  - "The beachhead is attractive but not huge; a credible year-three outcome is a low-single-digit-million ARR business unless the company expands from startup patent teams into law firms, biotech, semis, and enterprise R&D labs."
  - "Go-to-market should ride existing trust networks: deep-tech counsel, AI-native patent firms, and investors who already diligence IP quality in financing and M&A."
  "marketDefinition": "Software that creates an audit-grade record of human versus AI contribution during R&D and turns that record into filing-ready inventorship support for counsel. It sits upstream of patent management, docketing, and prosecution systems: those tools begin at disclosure or filing, while this product begins when AI is used to shape the underlying invention."
  "customerAndBuyer": "Primary users are CTOs, engineering leads, and patent operations owners at patent-active deep-tech startups using AI in daily design or simulation work. The economic buyer is usually the CTO or General Counsel, with outside patent counsel as a powerful technical validator because counsel must be willing to rely on the generated provenance package."
  "buyingTriggers":
  - "point": "Financing, M&A, or investor diligence forces the company to defend patent quality and exposes that current inventor declarations are retrospective and fragile."
    "sourceRefs":
    - 24
    - 35
    - 36
  - "point": "A live filing or inventorship review requires evidence that only natural persons conceived the claimed invention and that any error can be corrected before it becomes a litigation problem."
    "sourceRefs":
    - 1
    - 20
    - 21
    - 22
    - 29
  - "point": "Defense-adjacent or controlled-technology programs require stronger audit trails and secure handling of technical data, making ad hoc email workflows harder to defend."
    "sourceRefs":
    - 17
    - 18
    - 19
  "willingnessToPay":
    "summary": "Willingness to pay exists when the tool replaces outside-counsel coordination and lowers existential IP risk. Tech Funding News says Lightbringer sells on cutting filing cycles from about two months to days at roughly half the cost, while Baker Botts and McDermott show that inventorship mistakes can undermine patent value. SimpleIP and Triangle IP both market buyers away from spreadsheets and opaque admin cost, implying that budget already exists for software that reduces legal and operational drag."
    "sourceRefs":
    - 25
    - 35
    - 36
    - 50
    - 103
    - 110
  "competitiveLandscape": "Competition clusters into five camps: AI-native patent service platforms, enterprise IP management suites, global IP workflow and services platforms, docketing-first law-firm tools, and patent-intelligence/search vendors. None of them visibly owns continuous AI-to-human provenance capture inside the R&D workflow; most begin at invention disclosure, docketing, search, or prosecution."
  "incumbentThesis":
  - "incumbentClass": "Patent management suites"
    "point": "Lightbringer, Anaqua, and Questel already own downstream invention disclosure, portfolio, and prosecution-adjacent workflow, so a startup does not win by being another system of record; it wins by creating evidence before those systems begin."
    "sourceRefs":
    - 39
    - 44
    - 51
    - 64
    - 66
  - "incumbentClass": "Law-firm workflow tools"
    "point": "Docketing and matter-management tools serve counsel operations well, but they are optimized for deadlines and records after a matter exists, not for reconstructing AI-assisted conception inside engineering workflows."
    "sourceRefs":
    - 56
    - 81
    - 103
  - "incumbentClass": "Patent intelligence platforms"
    "point": "PatSnap- and Questel-style platforms are strong at search, landscapes, and analytics, but that strength does not automatically translate into admissible inventorship provenance or counsel-ready attestation packages."
    "sourceRefs":
    - 64
    - 86
    - 96
  - "incumbentClass": "Manual counsel and spreadsheets"
    "point": "The default substitute remains attorney-led declarations, spreadsheets, and disclosure forms. That path is entrenched because it is familiar, but it is slow, expensive, and weak at producing contemporaneous evidence."
    "sourceRefs":
    - 35
    - 36
    - 110
    - 112
  "regulatoryLandscape": "The core legal pattern is unusually clear: U.S. and European authorities both continue to require a natural-person inventor even when AI was heavily used in the inventive process. The open issue is not whether AI can be named as inventor — it cannot — but how much documentation buyers will need to prove human conception when AI systems are embedded in day-to-day R&D. That makes provenance capture a product requirement, not a nice-to-have. For defense-adjacent customers, cybersecurity and controlled-data handling add another gating layer."
  "technologyLandscape": "The technology stack is feasible now because AI usage is increasingly visible in digital tools and invention workflows are already software-mediated. The hard problem is not storing more files; it is instrumenting the right events across prompts, model outputs, notebooks, CAD or simulation artifacts, and human decisions, then packaging that evidence in a way outside counsel will trust."
