modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Triggers[Financing or filing triggers] --> Pilots[Paid pilot accounts]
      Pilots --> Conversions[Annual covered accounts]
      Conversions --> Revenue[Per-account revenue]
      Revenue --> GrossProfit[Gross profit after delivery cost]
      GrossProfit --> Cash[Cash available for hiring and runway]
modelSanity:
- checkName: Revenue engine
  finding: The base case grows from 6 active paying accounts at Y1 exit to 150 by Q4Y3, with roughly $21K of recognized annual revenue per account and most acceleration coming from counsel referrals in Y2-Y3.
- checkName: Must go right
  finding: Pilot-to-annual conversion and counsel acceptance must clear the BP threshold of 50%+ or the customer ramp never reaches the $3.15M exit ARR implied by the base case.
- checkName: Model breaks if
  finding: A one-quarter sales-cycle slip plus ARPU compression toward $19K pulls downside cash toward roughly $120K and would force an earlier seed raise.
- checkName: Next-round proof
  finding: The seed story is credible once the company reaches 25 active paying accounts, has repeatable counsel acceptance, and shows private-cloud delivery without blowing up margin.
sanityChecks:
  ruleOf40: Y3 growth 274% + EBITDA margin -20% = 254%
  burnMultiple: Y3 burn multiple 0.2x = $0.40M burn / $2.10M net new ARR from Q4Y2 to Q4Y3
  revenuePerFte: $205K Y3 on $2.05M revenue / 10 ending FTE (benchmark $200–400K SaaS)
  flags:
  - The base case requires referrals and founder sales to carry net account growth from 50 at Q4Y2 to 150 at Q4Y3, so channel proof cannot stay anecdotal.
  - Y3 recognized revenue is only $2.05M, so the financing story still depends more on exit ARR and channel efficiency than on current profitability.
  - Gross margin only reaches the BP target in Y3, leaving little room for major private-cloud or counsel-review overruns before the next round.
