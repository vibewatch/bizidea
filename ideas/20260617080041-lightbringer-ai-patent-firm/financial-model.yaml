scenarios:
  downside:
    description: Counsel approvals take longer, referrals slip by about one quarter, and blended annual account value settles near $19K with a more services-heavy 66% gross margin.
    y3RevenueK: 1550.0
    y3EbitdaK: -780.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
    - Blended annual revenue per active account drops from $21K to $19K
    - Customer ramp ends Y3 closer to 110 accounts than 150
    - Gross margin caps at 66% because counsel review and deployment support stay heavy
  base:
    description: Founder-led urgency sales and counsel referrals compound into 150 active paying accounts by Q4Y3 and about $3.15M of exit ARR while EBITDA turns directionally toward breakeven.
    y3RevenueK: 2051.0
    y3EbitdaK: -403.9
    cashLowPointK: 561.7
    keyAssumptionChanges:
    - Blended annual revenue per active account holds at $21K
    - Customer ramp reaches 150 accounts by Q4Y3
    - Gross margin reaches the 70% BP target by Y3
  upside:
    description: Referral partners activate sooner, secure deployment friction stays low, and the company reaches 170 accounts at about $22K annual value with 72% gross margin.
    y3RevenueK: 2520.0
    y3EbitdaK: -90.0
    cashLowPointK: 700.0
    keyAssumptionChanges:
    - Blended annual revenue per active account rises from $21K to $22K
    - Customer ramp reaches roughly 170 accounts by Q4Y3
    - Gross margin improves to 72% as implementation becomes more standardized
