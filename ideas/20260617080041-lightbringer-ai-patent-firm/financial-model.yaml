slug: ai-invention-provenance-stack
date: '2026-06-17'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: '[BP date 2026-06-17] The model starts in the first full month after the business-plan date.'
- id: A2
  name: Customer unit in model
  value: Active paying account under pilot or annual provenance coverage
  unit: definition
  source: '[BP gtm.wedge; BP investorMemo.firstCustomer.initialContract] The model tracks any account already paying for a live pilot or annual coverage because the BP starts monetization before full portfolio rollout.'
- id: A3
  name: Starting cash after pre-seed close
  value: '3000.0'
  unit: usdK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M; BP fundingAsk.runwayMonths 18] The base case uses a midpoint $3.0M pre-seed that is still inside the stated range while preserving a cash cushion through the Y2 proof milestone and into Y3.'
- id: A4
  name: Covered applications per mature annual account
  value: '20'
  unit: applications_per_account
  source: '[BP market.som; research.market.som] The year-three SOM math assumes about 20 active applications per customer.'
- id: A5
  name: Annual price per covered application
  value: $1.0K
  unit: usdK_per_application_year
  source: '[BP market.som; research.bottomUpSizingDrivers annual software spend per application $900-$1,000] The model uses the top end of the researched range because the BP targets acute compliance-grade workflows.'
- id: A6
  name: Blended recognized annual revenue per active paying account
  value: $21.0K
  unit: usdK_per_customer_year
  source: '[A4; A5; BP businessModel.revenueStreams] Mature SaaS value is $20K per account and the model adds modest pilot/setup revenue so recognized revenue averages about $21K per active paying account.'
- id: A7
  name: Year 1 customer ramp
  value: M1-M12 customersEop = 0,0,1,1,1,2,2,3,3,4,5,6
  unit: count
  source: '[BP milestones 0-12 months; BP gtm.funnelTargets] This follows the plan to close 3-5 paid pilots in year one and convert the earliest accounts into ongoing coverage without assuming a broad top-of-funnel engine.'
- id: A8
  name: Year 2 customer ramp
  value: Q1Y2 14, Q2Y2 25, Q3Y2 38, Q4Y2 50 customersEop
  unit: count
  source: '[BP milestones 12-24 months; BP gtm.channels] The model assumes counsel referrals and founder-led selling become repeatable during Y2, but growth remains bounded to a 50-account proof point by year-end.'
- id: A9
  name: Year 3 customer ramp
  value: Q1Y3 72, Q2Y3 96, Q3Y3 123, Q4Y3 150 customersEop
  unit: count
  source: '[BP market.som; research.market.som] The base case reaches the researched year-three SOM trajectory of about 150 customers and roughly $3.15M exit ARR.'
- id: A10
  name: Gross margin ramp
  value: Y1 45%-60%, Y2 62%-68%, Y3 69%-70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70; BP operations secure deployment and counsel review overhead] Early pilots carry heavier support cost before the software mix reaches the BP long-run target.'
- id: A11
  name: Monthly logo churn
  value: '2.0'
  unit: percent
  source: 'Startup-finance heuristic for early compliance SaaS sold into venture-backed startups: contracts should be sticky once adopted, but company failure and process change still justify non-zero churn.'
- id: A12
  name: Fully loaded CAC
  value: $9.0K
  unit: usdK_per_customer
  source: '[BP gtm.channels founder-led sales plus counsel referrals; research.reportMemo.distributionChannels] The model assumes referrals keep CAC below classic enterprise SaaS, but still above self-serve software because each deal is diligence-led and trust-heavy.'
- id: A13
  name: Loaded salary bands
  value: Founder/CEO $140K; engineering $180K; IP product/counsel $120K; security/platform $170K; sales/partnerships $150K; customer success/ops $120K; G&A $110K
  unit: usdK_per_fte_year
  source: Startup-finance heuristic for a U.S. pre-seed enterprise software team mapped directly to the roles listed in [BP team].
- id: A14
  name: Hiring sequence
  value: M1 founder+1 eng+1 counsel; M6 +1 security/platform; M9 +1 sales; M10 +1 eng; M15 +1 sales; M18 +1 customer success; M27 +1 eng; M33 +1 G&A
  unit: schedule
  source: '[BP team.startTiming; BP strategicChoices.sequencingRationale] The model keeps hiring milestone-gated until counsel acceptance, private-cloud readiness, and referral repeatability are proven.'
- id: A15
  name: Non-payroll operating budget
  value: Y1 $20K-$34K per month; Y2 $70K-$93K per quarter; Y3 $100K-$120K per quarter
  unit: usdK
  source: Startup-finance heuristic for cloud tooling, security/compliance, travel, legal, insurance, and partner enablement in a narrow founder-led GTM motion.
- id: A16
  name: Quarterly payroll smoothing method
  value: Quarterly salary expense follows the monthly hiring ramp rather than stepping only at snapshot quarters
  unit: method
  source: '[Financial Modeler contract; BP team] Salary lines are smoothed between the required headcount snapshots so P&L payroll remains consistent with the actual hire dates.'
- id: A17
  name: Downside scenario deltas
  value: ARPU $19K, gross margin 66%, one-quarter referral delay, and 110 customers by Q4Y3
  unit: scenario_inputs
  source: '[BP risks; research.reportMemo.sensitivityCases] The downside reflects slower counsel acceptance, more services-heavy delivery, and delayed channel repetition.'
- id: A18
  name: Upside scenario deltas
  value: ARPU $22K, gross margin 72%, referrals mature two quarters earlier, and 170 customers by Q4Y3
  unit: scenario_inputs
  source: '[BP businessModel.expansionLevers; BP milestones 24-36 months] The upside assumes the law-firm channel and private-cloud readiness both work sooner than planned.'
- id: A19
  name: Cash conversion simplification
  value: EBITDA approximates cash movement
  unit: method
  source: Startup-finance heuristic for an asset-light software company with no debt, tax, or capex schedule modeled separately at this stage.
