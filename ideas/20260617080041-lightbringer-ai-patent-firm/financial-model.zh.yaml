  downsideCase: "$19K 年度账户价值"
  baseCase: "$21K 年度账户价值"
  upsideCase: "$22K 年度账户价值"
  y3RevenueImpactK: -195.0
  cashImpactK: -137.0
- variable: CAC
  downsideCase: "$12K 完全加载 CAC"
  baseCase: "$9K 完全加载 CAC"
  upsideCase: "$7K 完全加载 CAC"
  y3RevenueImpactK: 0.0
  cashImpactK: -250.0
