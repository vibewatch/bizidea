  downsideCase: "月流失率 3.0%"
  baseCase: "月流失率 2.0%"
  upsideCase: "月流失率 1.5%"
  y3RevenueImpactK: -220.0
  cashImpactK: -165.0
- variable: "销售周期"
  downsideCase: "转介和尽职调查周期推迟约 3 个月"
  baseCase: "紧迫事件销售在建模季度内完成转化"
  upsideCase: "可信转介合作伙伴将周期缩短约 1 个月"
  y3RevenueImpactK: -310.0
  cashImpactK: -230.0
- variable: "毛利率"
  downsideCase: "66% 稳态毛利率"
  baseCase: "70% 稳态毛利率"
  upsideCase: "72% 稳态毛利率"
  y3RevenueImpactK: 0.0
  cashImpactK: -82.0
- variable: "招聘节奏"
  downsideCase: "将非关键招聘提前两个季度"
  baseCase: "保持招聘以里程碑为门控"
  upsideCase: "推迟一名非关键招聘直至转介可复制"
  y3RevenueImpactK: 85.0
  cashImpactK: -180.0
modelDiagram:
  title: "单位经济模型流程"
  mermaid: |
    flowchart LR
      Triggers[融资或申请触发器] --> Pilots[付费试点账户]
      Pilots --> Conversions[年度覆盖账户]
      Conversions --> Revenue[每账户收入]
      Revenue --> GrossProfit[交付成本后的毛利润]
      GrossProfit --> Cash[可用于招聘和资金跑道的现金]
modelSanity:
- checkName: "收入引擎"
  finding: "基础情景从第 1 年末 6 个活跃付费账户增长到 Q4Y3 的 150 个，每账户确认年收入约 $21K，大部分加速来自第 2–3 年的律师转介。"
- checkName: "必须成立的假设"
  finding: "试点转年度覆盖率和律师认可必须达到商业计划 50%+ 的门槛，否则客户增长节奏永远无法达到基础情景隐含的 $3.15M 退出 ARR。"
- checkName: "模型崩溃的条件"
  finding: "销售周期推迟一个季度叠加 ARPU 压缩至 $19K，会将悲观情景现金推向约 $120K，迫使更早启动 Seed 轮融资。"
- checkName: "下轮融资证明"
  finding: "一旦公司达到 25 个活跃付费账户、可复制的律师认可度，并展示无损毛利率的私有云交付，Seed 轮融资故事就具有可信度。"
sanityChecks:
  ruleOf40: Y3 growth 274% + EBITDA margin -20% = 254%
  burnMultiple: Y3 burn multiple 0.2x = $0.40M burn / $2.10M net new ARR from Q4Y2 to Q4Y3
  revenuePerFte: $205K Y3 on $2.05M revenue / 10 ending FTE (benchmark $200–400K SaaS)
  flags:
  - "基础情景要求转介渠道和创始人销售共同驱动净账户从 Q4Y2 的 50 个增至 Q4Y3 的 150 个，因此渠道证明不能停留在个案层面。"
  - "第 3 年确认收入仅 $2.05M，融资故事仍主要依赖退出 ARR 和渠道效率，而非当期盈利能力。"
  - "毛利率仅在第 3 年才达到商业计划目标，在下一轮融资前几乎没有空间容忍私有云或律师审查的重大超支。"
