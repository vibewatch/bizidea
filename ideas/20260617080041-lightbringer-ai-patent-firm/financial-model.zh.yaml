scenarios:
  downside:
    description: "律师审批更耗时，转介渠道推迟约一个季度，混合年度账户价值稳定在 $19K 附近，毛利率因服务占比偏重而停留在 66%。"
    y3RevenueK: 1550.0
    y3EbitdaK: -780.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
    - "每个活跃账户的混合年收入从 $21K 降至 $19K"
    - "客户增长在第 3 年末接近 110 个账户而非 150 个"
    - "毛利率上限为 66%，因为律师审查和部署支持持续占用较多资源"
  base:
    description: "创始人主导的紧迫性销售和律师转介累积到 Q4Y3 达到 150 个活跃付费账户、约 $3.15M 退出 ARR，EBITDA 方向性走向盈亏平衡。"
    y3RevenueK: 2051.0
    y3EbitdaK: -403.9
    cashLowPointK: 561.7
    keyAssumptionChanges:
    - "每个活跃账户的混合年收入维持在 $21K"
    - "客户增长在 Q4Y3 达到 150 个账户"
    - "毛利率在第 3 年达到商业计划 70% 的目标"
  upside:
    description: "转介合作伙伴提前激活，安全部署阻力保持低位，公司以约 $22K 年度价值、72% 毛利率达到 170 个账户。"
    y3RevenueK: 2520.0
    y3EbitdaK: -90.0
    cashLowPointK: 700.0
    keyAssumptionChanges:
    - "每个活跃账户的混合年收入从 $21K 上升至 $22K"
    - "客户增长在 Q4Y3 达到约 170 个账户"
    - "随着实施标准化程度提升，毛利率改善至 72%"
