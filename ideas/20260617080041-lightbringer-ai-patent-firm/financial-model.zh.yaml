slug: ai-invention-provenance-stack
date: '2026-06-17'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: "模型起始月份"
  value: 2026-07
  unit: month
  source: '[BP date 2026-06-17] 模型从商业计划日期后的第一个完整月份开始。'
- id: A2
  name: "模型中的客户计量单位"
  value: "处于试点或年度溯源覆盖下的活跃付费账户"
  unit: definition
  source: '[BP gtm.wedge; BP investorMemo.firstCustomer.initialContract] 模型追踪所有已为活跃试点或年度覆盖付费的账户，因为商业计划在全组合推广之前就开始变现。'
- id: A3
  name: "天使轮前融资完成后的起始现金"
  value: '3000.0'
  unit: usdK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M; BP fundingAsk.runwayMonths 18] 基础情景使用 $3.0M 中点天使轮前融资，仍在规定范围内，同时在第 2 年证明里程碑和进入第 3 年之前保留现金缓冲。'
- id: A4
  name: "成熟年度账户的覆盖申请数量"
  value: '20'
  unit: applications_per_account
  source: '[BP market.som; research.market.som] 第三年 SOM 测算假设每个客户约 20 项活跃申请。'
- id: A5
  name: "每项覆盖申请的年费"
  value: $1.0K
  unit: usdK_per_application_year
  source: '[BP market.som; research.bottomUpSizingDrivers annual software spend per application $900-$1,000] 模型使用研究范围上限，因为商业计划针对的是高合规级工作流。'
- id: A6
  name: "每个活跃付费账户的混合确认年收入"
  value: $21.0K
  unit: usdK_per_customer_year
  source: '[A4; A5; BP businessModel.revenueStreams] 成熟 SaaS 价值为每账户 $20K，模型加入少量试点/设置收入，因此每个活跃付费账户确认收入平均约 $21K。'
- id: A7
  name: "第 1 年客户增长节奏"
  value: M1-M12 customersEop = 0,0,1,1,1,2,2,3,3,4,5,6
  unit: count
  source: '[BP milestones 0-12 months; BP gtm.funnelTargets] 遵循计划在第 1 年完成 3–5 个付费试点、并将最早账户转化为持续覆盖，不假设存在宽泛的漏斗顶部引擎。'
- id: A8
  name: "第 2 年客户增长节奏"
  value: Q1Y2 14, Q2Y2 25, Q3Y2 38, Q4Y2 50 customersEop
  unit: count
  source: '[BP milestones 12-24 months; BP gtm.channels] 模型假设律师转介和创始人主导销售在第 2 年变得可复制，但增长仍以年末 50 个账户为证明点加以约束。'
- id: A9
  name: "第 3 年客户增长节奏"
  value: Q1Y3 72, Q2Y3 96, Q3Y3 123, Q4Y3 150 customersEop
  unit: count
  source: '[BP market.som; research.market.som] 基础情景在第三年达到研究中约 150 个客户、约 $3.15M 退出 ARR 的 SOM 轨迹。'
- id: A10
  name: "毛利率爬坡"
  value: Y1 45%-60%, Y2 62%-68%, Y3 69%-70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70; BP operations secure deployment and counsel review overhead] 早期试点在软件占比达到商业计划长期目标之前承担更重的支持成本。'
- id: A11
  name: "月度客户流失率"
  value: '2.0'
  unit: percent
  source: '面向风险投资支持初创公司销售的早期合规 SaaS 的初创财务经验法则：合同一旦被采用就应具有黏性，但公司失败和流程变更仍需设置非零流失率。'
- id: A12
  name: "完全加载客户获取成本"
  value: $9.0K
  unit: usdK_per_customer
  source: '[BP gtm.channels founder-led sales plus counsel referrals; research.reportMemo.distributionChannels] 模型假设转介使 CAC 低于传统企业 SaaS，但仍高于自助式软件——因为每笔交易都以尽职调查为驱动且信任门槛高。'
- id: A13
  name: "综合薪资带"
  value: "创始人/CEO $140K；工程 $180K；IP 产品/法律顾问 $120K；安全/平台 $170K；销售/合作 $150K；客户成功/运营 $120K；行政管理 $110K"
  unit: usdK_per_fte_year
  source: "美国天使轮前企业软件团队的初创财务经验法则，直接对应 [BP team] 中列出的角色。"
- id: A14
  name: "招聘时序"
  value: M1 founder+1 eng+1 counsel; M6 +1 security/platform; M9 +1 sales; M10 +1 eng; M15 +1 sales; M18 +1 customer success; M27 +1 eng; M33 +1 G&A
  unit: schedule
  source: '[BP team.startTiming; BP strategicChoices.sequencingRationale] 模型在律师认可、私有云就绪和转介可复制性得到证明之前保持招聘以里程碑为门控。'
- id: A15
  name: "非薪资运营预算"
  value: Y1 $20K-$34K per month; Y2 $70K-$93K per quarter; Y3 $100K-$120K per quarter
  unit: usdK
  source: "创始人主导窄 GTM 打法中云工具、安全/合规、差旅、法务、保险和合作伙伴支持的初创财务经验法则。"
- id: A16
  name: "季度薪资平滑方法"
  value: "季度薪资费用遵循月度招聘节奏，而非仅在快照季度跳升"
  unit: method
  source: '[Financial Modeler contract; BP team] 薪资行在所需人数快照之间平滑，使损益表中的薪资与实际招聘日期保持一致。'
- id: A17
  name: "悲观情景参数变化"
  value: ARPU $19K, gross margin 66%, one-quarter referral delay, and 110 customers by Q4Y3
  unit: scenario_inputs
  source: '[BP risks; research.reportMemo.sensitivityCases] 悲观情景反映律师认可更慢、服务交付占比更重以及渠道复制延迟。'
- id: A18
  name: "乐观情景参数变化"
  value: ARPU $22K, gross margin 72%, referrals mature two quarters earlier, and 170 customers by Q4Y3
  unit: scenario_inputs
  source: '[BP businessModel.expansionLevers; BP milestones 24-36 months] 乐观情景假设律所渠道和私有云就绪均比计划提前落地。'
- id: A19
  name: "现金转化简化方法"
  value: "EBITDA 近似为现金流动"
  unit: method
  source: "轻资产软件公司的初创财务经验法则，此阶段不单独建模债务、税务或资本支出。"
