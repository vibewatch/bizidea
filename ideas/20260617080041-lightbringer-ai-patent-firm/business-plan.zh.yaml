slug: ai-invention-provenance-stack
date: '2026-06-17'
executiveSummary: >-
  这家公司向专利活跃的深度科技初创公司销售合规级发明溯源软件——这些公司在研发中使用 AI，一旦在融资、并购或专利审查中遭遇发明人认定挑战，代价将无法承受。初始客户是拥有 5 件以上活跃专利申请、每天使用仿真或生成式工具、且面临迫在眉睫融资或申请事件的 A 轮至 B 轮量子计算或国防硬件初创公司。产品切口不是专利起草或组合管理——而是在发明披露表格产生之前持续捕获 AI 与人类贡献证据。这一切口契合研究结论：专利局仍要求人类发明人，Lightbringer 已验证专利运营软件的需求，而现有替代方案仍停留在人工声明、电子表格和外部律师协调。第一个证明点是律师对机器生成溯源包的接受——在真实申请或尽职调查审查中——因为分销、定价和留存都取决于这一信任门槛。GTM 打法因此应从创始人直销切入高度紧迫的尽职调查时刻，通过深度科技专利律师和 AI 原生专利公司进行转介分销，而非宽泛的漏斗顶部 SaaS 营销。市场规模真实但专业化——研究估算 TAM 约 $77.9M、SAM 约 $23.4M、可信的第三年 SOM 约 $3.0M——因此扩展到生物科技、半导体和企业研发实验室是实现风险投资规模的必经之路。关键证据缺口仍在于：投资人或收购方已多频繁地要求 AI 贡献文件记录，因此早期团队必须在扩大人员或构建广泛集成前先测试需求强度。
problem:
  - "深度科技团队越来越多地在仿真、设计和分析中使用 AI，但专利法仍要求证明人类构思，而当前工作流无法同期捕获这一证据。"
  - "由工程师和外部律师拼凑的人工发明人声明在尽职调查或诉讼中既缓慢、昂贵，又因事后重建发明权而脆弱不堪。"
solution:
  - "为研发工作流埋点，记录哪些 AI 系统接触了哪些产出物、哪些人类接受或修改了输出，以及哪些决策支持了所主张的发明。"
  - "生成可编辑的律师就绪发明人认定包和组合风险看板，插入现有披露和专利审查系统，而非替换它们。"
whyWeWin:
  - "在位企业掌控下游申请、档期管理和组合工作流；这款产品从 AI 进入研发的那一刻起就在上游发力——在这一领域没有明显的品类领导者占据强势地位。"
  - "一旦律师接受溯源包格式，公司就能积累一份专有的已审阅证据链、更正模式和安全部署语料库——这是通用专利工具所不具备的。"
strategicChoices:
  beachhead: "美国 A 轮至 B 轮量子计算和国防硬件初创公司，持有 5–30 件活跃专利申请、每天从事 AI 辅助仿真或设计工作，且有即将到来的融资或申请事件。"
  wedgeRationale: "滩头足够窄，痛点是生存性且有时限的——这些团队依靠专利融资，同时又在恰好制造发明权模糊性的工作流中使用 AI。"
  sequencingRationale: "从笔记本、仿真和设计工具的证据捕获起步，专注于一项活跃申请，赢得律师认可，再扩展到组合看板、下游集成和安全部署——因为 GTM、留存和产品可信度都取决于先证明一个完整包能端到端跑通。"
  notYet:
    - "在核心证据模型获得第一个滩头市场律师认可前，不进入生物科技发现工作流。"
    - "不构建会把公司变成另一套档期或组合系统的宽泛律所实务管理功能。"
    - "在以 USPTO 为中心的包得到验证前，不支持可导出证据之外的非美国申请工作流。"
market:
  tam: "$77.9M 估算 TAM——基于 57,669 家深度科技初创公司、15% 的专利密集份额、每账户约 10 项活跃申请、每项申请年软件支出约 $900。"
  sam: "$23.4M 估算 SAM——聚焦北美和欧洲 AI 密集型深度科技团队，申请密度更高。"
  som: "$3.0M 估算第三年 SOM——基于约 150 个客户、每客户约 20 项活跃申请、每项申请年软件支出约 $1,000。"
  segments:
    - "A 轮至 C 轮量子计算、国防硬件和先进材料深度科技初创公司，持有活跃专利组合"
    - "服务这些初创公司的专利律师和 AI 原生专利公司"
  buyingProcess: >-
    采购始于 CTO、总法律顾问或专利负责人面临融资尽职调查请求、优先权日压力或发明人认定审查并急需证据之时。经济审批通常由 CTO 或总法律顾问掌握，但外部专利律师必须验证溯源包，整个交易才能超越试点范围扩展。
product:
  mvp: >-
    MVP 监控一组窄而高价值的研发界面——可能是笔记本加一个仿真或设计环境——记录 AI 和人类贡献事件，并为一项申请生成可编辑的、面向 USPTO 的发明人认定包。它必须包含证据审查、导出和访问控制，强到足以让律师和国防相关客户在真实事务上测试。
  sixMonth: "完成 3–5 个共创客户试点，每个账户支持一次律师审阅的真实申请或尽职调查事件，并完成进入一个披露系统和一个下游审查交接的集成。"
  twelveMonth: "增加组合级风险看板、多种权利要求类型的认证包模板、私有云部署，以及覆盖前 20 个目标账户的前三大工作流集成。"
  twentyFourMonth: "从初创公司账户扩展到可复制的律所和企业研发部署，添加欧洲就绪的证据支持，仅在第一个滩头市场稳定转化后才开辟半导体或生物科技等邻近垂直领域。"
  keyBets:
    - "如果原始证据链可供检查，律师会信任可编辑的溯源包。"
    - "前 20 个账户的工作流集中在少量笔记本、仿真和设计工具上，使集成范围保持可控。"
    - "在完整本地或气隙构建必要之前，私有云控制能满足安全和部署要求。"
gtm:
  wedge: "以与一次即将到来的申请或尽职调查事件挂钩的发明权风险试点切入，待律师认可第一个包后再转化为按申请计费的年度覆盖。"
  channels:
    - "在融资、并购和申请紧迫期向 CTO 和总法律顾问的创始人主导直销"
    - "与深度科技专利律师和 AI 原生专利公司建立转介合作"
    - "通过深度科技 VC 和加速器的组合治理引荐"
  funnelTargets: "线索→合格试点 20–30%，合格试点→活跃包 60%+，活跃包→年度正式覆盖 50%+，正式覆盖后 6 个月内扩展到更多申请 70%+"
  pricing: "按活跃专利申请年度 SaaS 定价，以 5–15 项申请的付费试点开始，转化为更广泛的年度覆盖——因为价值随处于发明权风险下的组合规模增长，直接对应被替代的当前法律支出。"
businessModel:
  revenueStreams:
    - "按溯源覆盖下的活跃专利申请计费的年度订阅"
    - "私有云和国防相关账户的实施或安全部署费"
    - "管理多个初创公司客户的律所或组合审查许可"
  unitOfValue: "由律师认可的溯源包覆盖的活跃专利申请"
  targetGrossMarginPct: 70
  expansionLevers:
    - "从同一账户内的一个试点申请扩展到完整的活跃组合"
    - "在初创公司端包接受得到证明后，增加律所多客户审查工作流"
    - "从半导体和生物科技起步，进入具有类似 AI 辅助发明权风险的邻近垂直领域"
strategyMap:
  northStarMetric: "由律师认可的溯源包覆盖的活跃专利申请"
  inputMetrics:
    - "每季度处理的真实申请或尽职调查事件数量"
    - "无需大量人工返工的律师包接受率"
    - "从试点启动到交付第一个包的中位天数"
    - "试点转年度覆盖率"
    - "覆盖 80% 目标账户工作流的高价值研发工具支持数量"
  moatsToBuild:
    - "律师审阅的溯源图谱和认证模板语料库"
    - "深度集成进滩头市场使用的笔记本、仿真和设计环境"
    - "国防相关账户的安全部署和证据治理手册"
  killCriteria:
    - "前 10 个试点中少于 3 个在真实事务上获得律师认可"
    - "前五个试点之后，中位部署时间仍超过 45 天"
    - "第一个包交付后，超过 50% 的试点买家拒绝转换为按申请年度定价"
  mermaid: |
    flowchart LR
      Wedge[融资或申请触发器] --> MVP[单申请溯源 MVP]
      MVP --> Proof[律师在真实事务中认可的包]
      Proof --> Expansion[组合覆盖加律所转介]
investorMemo:
  verdict:
    call: "持续关注"
    conviction: "切口清晰、痛点真实，但初始市场偏小且律师认可尚未证明，限制了当前信心。"
    whyBelieve: "公司针对的是 AI 密集型研发催生的全新合规缺口，同时获得专利法指引和专利运营软件实际支出的双重验证。"
    whyDoubt: "滩头市场较窄，邻近在位企业已掌控信任和预算，且尚无证据表明投资人或律师会围绕这种包格式形成标准化。"
    nextDiligence: "验证至少有几家深度科技律所愿意在真实申请中使用可编辑溯源包，以及试点能否转化为年度覆盖。"
  firstCustomer:
    title: "正在为融资尽职调查准备的 B 轮量子计算初创公司"
    profile: "一家美国深度科技公司，持有 10–30 件待审或活跃专利申请，每天使用 AI 仿真工具，拥有外部专利律师，下一轮融资高度依赖 IP 质量。"
    trigger: "投资人或收购方律师要求对 AI 辅助发明权提供支持，或待审申请必须在优先权日到期前清关。"
    buyer: "CTO 或总法律顾问"
    initialContract: "覆盖 5–15 件活跃申请的付费试点，一旦外部律师接受第一个包且下一个申请周期使用该工作流，即转化为整个组合的按申请年度覆盖。"
  mustBeTrue:
    - "至少一半合格试点在第一个活跃包交付后转化为年度覆盖。"
    - "外部专利律师在真实事务上以有限的人工返工接受包格式。"
    - "前 20 个目标账户的工作流使用集中在足够小的工具集中，以不超过五个核心集成提供支持。"
    - "买家持续按申请定价付费——因为这比反复的人工律师协调更便宜。"
    - "邻近在位企业在初创公司通过律师和合作伙伴建立可信分销前，不推出同等的上游溯源捕获功能。"
  diligenceQuestions:
    - "近期深度科技融资或并购尽职调查清单多频繁地要求 AI 辅助发明权证据？"
    - "滩头市场中哪些具体工具构成了证据界面：笔记本、CAD、仿真、EDA 还是实验室系统？"
    - "外部律师在依赖机器生成的包之前，需要什么程度的可编辑性和审查控制？"
    - "私有云对国防相关买家是否足够，还是最早的交易就需要本地或气隙部署？"
    - "在前几个试点之后，律师或 AI 原生专利公司渠道能否比创始人主导直销产生更低的 CAC？"
operatingAssumptions:
  - assumption: "融资或申请触发器创造了足够的紧迫性，使 CTO 或总法律顾问愿意在更广泛的法律标准完全确立之前购买付费试点。"
    basis: research.yaml
    validationTest: "在前两个季度内完成五个与真实申请、尽职调查审查或审查意见回复挂钩的付费试点。"
    decisionImpact: "若假设不成立，则将产品重新定位为围绕周期时间和成本降低，而非存在性发明权风险。"
  - assumption: "如果外部律师能够检查和编辑证据链，他们会接受软件生成的溯源包。"
    basis: research.yaml
    validationTest: "与至少三家律所进行试点，衡量接受率、所需编辑和重复使用格式的意愿。"
    decisionImpact: "若假设不成立，产品必须成为律师操作的工作流工具，而非初创公司自助式合规层。"
  - assumption: "第一批目标账户共享足够窄的技术栈，MVP 能以有限集成取胜。"
    basis: operator judgment
    validationTest: "绘制前 20 个账户使用的研发工具，确认三个集成覆盖至少 80% 的监控发明工作流。"
    decisionImpact: "若假设不成立，进一步收窄垂直领域，或转向 API 摄入和服务主导的入职模式。"
  - assumption: "私有云安全控制在无需立即气隙部署的情况下满足第一批国防相关买家的要求。"
    basis: research.yaml
    validationTest: "在两个国防相关试点中进行私有云部署安全审查，记录被阻断的要求。"
    decisionImpact: "若假设不成立，推迟国防重型 GTM，优先开拓商业量子计算或先进材料账户。"
  - assumption: "按申请定价相对于人工律师协调成本保持清晰且有吸引力。"
    basis: idea.yaml
    validationTest: "在十份试点提案中测试定价，追踪折扣压力、扩展行为和按组合规模分类的异议。"
    decisionImpact: "若假设不成立，转向平台加用量定价，或通过捆绑审查经济模式向律所销售。"
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "访谈十位深度科技 CTO、总法律顾问和专利负责人，了解近期 AI 辅助申请和尽职调查事件。"
    hypothesis: "购买触发器是真实的融资或申请事件，而非对 AI 治理的笼统好奇。"
    successMetric: "至少六次访谈描述了能够证明付费试点合理性的具体近期事件。"
    owner: "创始人/CEO"
  - horizon: "0–90 天"
    experiment: "与服务量子计算或国防初创公司的三家外部专利律所开展包格式研讨会。"
    hypothesis: "如果包能展示原始证据、人类决策和权利要求关联，律师会接受可编辑溯源包。"
    successMetric: "两家律所同意在真实或影子事务上使用该格式，仅需少量模板调整。"
    owner: "创始人/CEO 加 IP 顾问"
  - horizon: "0–90 天"
    experiment: "梳理前 20 个目标账户的工具栈，确定初始监控界面。"
    hypothesis: "笔记本加一个仿真或设计环境能覆盖多数第一批使用案例。"
    successMetric: "三个集成覆盖前 20 个账户至少 80% 的关键发明工作流。"
    owner: "创始工程师"
  - horizon: "0–90 天"
    experiment: "为一个真实申请工作流构建 MVP 溯源捕获和导出。"
    hypothesis: "最小集成的产品能在试点启动后 14 天内交付第一个包。"
    successMetric: "两个试点账户均在 14 天内交付第一个活跃包。"
    owner: "创始工程师"
  - horizon: "0–90 天"
    experiment: "通过直接外联和律师转介测试付费试点报价。"
    hypothesis: "转介主导的试点比冷启动直销更快转化且价格更高。"
    successMetric: "转介来源的试点成交率至少是直销成交率的 2 倍。"
    owner: "创始人/CEO"
  - horizon: "0–90 天"
    experiment: "与一家国防相关潜在客户进行私有云部署模式的安全审查。"
    hypothesis: "私有云加证据访问控制能清除初始安全异议，无需气隙部署。"
    successMetric: "潜在客户安全团队批准试点范围，无需完整本地部署。"
    owner: "创始工程师"
operations:
  - "维护具有基于角色的访问控制、不可变日志和与专利时限对齐的保留策略的证据托管存储。"
  - "运行律师审查工作流，确保每个早期包在广泛复用前对照当前发明权指引进行核查。"
  - "维护进入目标账户已使用的披露、专利审查和文档管理系统的集成连接器。"
  - "在追求更大受监管账户之前，为私有云国防相关试点建立安全部署手册。"
  - "与深度科技专利律师和 AI 原生专利公司维护转介管线，包括适当的收益分享或联合销售条款。"
team:
  - role: "创始人/CEO"
    startTiming: "第 0 个月"
    rationale: "必须向紧迫性驱动的 CTO 和律师工作流销售，塑造包格式，并在产品扩展前招募共创客户。"
  - role: "创始工程师"
    startTiming: "第 0 个月"
    rationale: "需要构建溯源捕获层、证据图谱和第一个跨窄研发工具集的导出工作流。"
  - role: "IP 产品法律顾问"
    startTiming: "第 1 个月"
    rationale: "必须使输出与不断演进的发明权理论保持一致，让外部律师对使用该包感到放心。"
  - role: "安全与平台工程师"
    startTiming: "第 6 个月"
    rationale: "在试点转化且国防相关部署、访问控制和可审计性成为关键门槛要求后加入。"
  - role: "合作伙伴或客户主管"
    startTiming: "第 9 个月"
    rationale: "仅在创始人通过律师和 AI 原生专利公司渠道证明可复制打法后招募。"
milestones:
  - horizon: "0–12 个月"
    items:
      - "在量子计算或国防硬件领域完成 3–5 个付费共创客户试点。"
      - "交付至少五份经外部律师审阅的活跃溯源包。"
      - "完成笔记本加一个仿真或设计集成，以及一个下游披露或专利审查交接。"
      - "将至少两个试点转化为按申请年度订阅。"
  - horizon: "12–24 个月"
    items:
      - "在初创公司账户内实现可复制的组合扩展，而非一次性的单申请试点。"
      - "推出私有云部署和标准化律师审查模板。"
      - "增加律所多客户工作流，并确保 2–3 个转介合作伙伴产生合格管线。"
      - "仅在核心滩头稳定转化后，测试半导体或生物科技等一个邻近垂直领域。"
  - horizon: "24–36 个月"
    items:
      - "如果转化和扩展假设成立，达到研究中 SOM 轨迹的约 $3.0M ARR。"
      - "在组合规模上支持以美国为主的证据工作流，并试点欧洲导向的包支持。"
      - "根据渠道经济和在位企业反应，决定是保持溯源层还是扩展为更广泛的 IP 运营平台。"
risks:
  - risk: "AI 辅助发明权的法律指引以降低文件记录紧迫性或改变所需证据的方式演进。"
    likelihood: Medium
    impact: High
    mitigation: "保持 IP 顾问的密切介入，围绕持久性的人类构思证明进行设计，并测试仅靠周期时间节省能否支撑需求。"
  - risk: "外部律师拒绝或大幅改写包，阻碍基于信任的分销。"
    likelihood: High
    impact: High
    mitigation: "与早期律所共同设计格式，暴露原始证据链，并在扩大销售前要求真实事务验证。"
  - risk: "跨笔记本、仿真、CAD 和实验室系统的集成蔓延使入职速度过慢。"
    likelihood: Medium
    impact: High
    mitigation: "将滩头收窄到集中的工作流技术栈，在可复制性得到证明前推迟低频集成。"
  - risk: "国防相关买家比计划更早要求本地或气隙部署。"
    likelihood: Medium
    impact: Medium
    mitigation: "从商业深度科技账户起步，在安全部署经济学明确之前将国防作为后续细分市场。"
  - risk: "在位专利工作流供应商在品类变得可见后增加上游溯源功能。"
    likelihood: Medium
    impact: Medium
    mitigation: "在更广泛的供应商做出反应前，通过律师审阅的证据质量、活跃包接受数据和深度工作流集成建立信任。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: "资助 18 个月的产品构建、律师验证、安全部署和创始人主导 GTM，以证明活跃包接受度、试点转化率和可复制转介渠道，然后再扩大人员规模。"
