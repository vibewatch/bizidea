scenarios:
  downside:
    description: "付费试点转化更慢、实际 ACV 偏低、回放经济性更弱，共同延迟规模化。"
    y3RevenueK: 2640.0
    y3EbitdaK: -831.9
    cashLowPointK: -365.6
    keyAssumptionChanges:
      - "ARPU 降至 $12 万，买家将产品视为更窄的质检工作流。"
      - "Q4Y2 期末客户数仅达 10 家，Q4Y3 仅达 34 家。"
      - "若回放成本和服务工作持续偏高，毛利率压缩至 67%。"
  base:
    description: "创始人主导的试点按计划转化，合作伙伴渠道在 Y3 开始贡献，定价接近目标区间低中位值。"
    y3RevenueK: 3597.0
    y3EbitdaK: -83.0
    cashLowPointK: 397.5
    keyAssumptionChanges:
      - "混合 ARPU 维持 $13.2 万，毛利率 70%。"
      - "客户数从 Y1 末 5 家扩展至 Q4Y2 的 12 家和 Q4Y3 的 40 家。"
      - "招聘严格按里程碑触发，Q4Y3 团队规模达 13 人。"
  upside:
    description: "漂移监控和合作伙伴驱动的迁移质检更早附加，提升价格实现率和客户增速。"
    y3RevenueK: 4277.5
    y3EbitdaK: 479.0
    cashLowPointK: 699.2
    keyAssumptionChanges:
      - "ARPU 升至 $14.5 万，更多账户附加漂移监控或第二个遥测域。"
      - "Q4Y2 期末客户数达 13 家，Q4Y3 达 45 家。"
      - "随着回放工作流标准化，毛利率提升至 72%。"
sensitivity:
  - variable: "ARPU"
    downsideCase: "混合年度 ARPU 降至 $12 万。"
    baseCase: "混合年度 ARPU 维持 $13.2 万。"
    upsideCase: "扩展表现更强，混合年度 ARPU 升至 $14.5 万。"
    y3RevenueImpactK: -327.0
    cashImpactK: -312.5
  - variable: "CAC"
    downsideCase: "合作伙伴来源机会表现不及预期，混合 CAC 升至约 $5 万。"
    baseCase: "创始人主导加合作伙伴辅助销售，混合 CAC 维持约 $4.6 万。"
    upsideCase: "参考账户预热销售管道，混合 CAC 降至约 $4.4 万。"
    y3RevenueImpactK: 0.0
    cashImpactK: -161.1
  - variable: "churn"
    downsideCase: "月度流失率升至约 3%，Y3 期末客户数降至约 36 家。"
    baseCase: "月度流失率维持 2.2%。"
    upsideCase: "月度流失率改善至约 1.5%，Y3 期末客户数超过 40 家。"
    y3RevenueImpactK: -264.0
    cashImpactK: -184.8
  - variable: "sales cycle"
    downsideCase: "试点到生产周期延迟约一个季度，Y3 末仅 34 家客户。"
    baseCase: "付费试点按 A5/A6 时间表转化。"
    upsideCase: "安全审查压缩，合作伙伴渠道将客户进度提前约一个季度。"
    y3RevenueImpactK: -693.0
    cashImpactK: -577.6
  - variable: "gross margin"
    downsideCase: "回放成本和部署工作量持续偏高，毛利率降至 67%。"
    baseCase: "毛利率维持 70%。"
