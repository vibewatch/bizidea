modelSanity:
  - checkName: "收入引擎"
    finding: "基准情形通过将活跃付费客户从 Y1 末 5 家增至 Q4Y3 的 40 家、混合 ACV $13.2 万，实现 Y3 收入 $3.6M。"
  - checkName: "必须做对的事"
    finding: "试点到生产转化和合作伙伴辅助来源必须在客户数从 12 家跳升至 Y3 的 40 家时，将 CAC 维持在约 $4.6 万。"
  - checkName: "模型崩溃条件"
    finding: "若销售周期延迟一个季度或 ARPU 降至约 $12 万，下行情景会在 Y3 结束前现金转负。"
  - checkName: "下轮融资证明"
    finding: "可信的 seed 轮情景需要 3–5 个付费试点、2 个生产转化、21 天内评分卡，以及第 24 个月达到 8–12 家生产客户的清晰路径。"
sanityChecks:
  ruleOf40: "Y3 增长率 235% + EBITDA 利润率 -2% = 233%"
  burnMultiple: "Y2 消耗倍数约 1.0x（净新 ARR 约 $0.9M），Y3 随消耗降至约 $8.3 万，接近 0.0x。"
  revenuePerFte: "Y3 Q4Y3 13 人团队人均收入 $27.7 万（企业 SaaS 基准约 $20 万–$40 万）"
  flags:
    - "基准情形仍需客户数在 Q4Y2 的 12 家到 Q4Y3 的 40 家之间大幅跳升，合作伙伴渠道必须产生真实管道而非仅停留于联合销售叙事。"
    - "建模 CAC 约 $4.6 万对企业安全软件而言已属高效，依赖创始人主导销售、付费试点和合作伙伴转介保持异常专注。"
    - "Y3 EBITDA 仅约盈亏平衡，若价格适度承压或招聘比计划提前，很可能在触达完整 SOM 前需要 seed 轮延续或更小规模的跟进融资。"
    - "回放成本、标注质量，或 Panther 原生/Lakewatch 捆绑可能比基准情形更快压缩利润率和销售紧迫感。"
