slug: lakehouse-detection-release-gate
date: "2026-06-17"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-07"
    unit: "month"
    source: "[BP date 2026-06-17] 模型从计划日期后一个月开始。"
  - id: A2
    name: "Pre-seed 轮融资开盘现金"
    value: "2.4"
    unit: "USDM"
    source: "[BP fundingAsk round pre-seed, targetFundingRangeUsd $2–4M, runwayMonths 18] 基准情形在既定范围内以 $2.4M 融资，用于资助前 12 个月的关键验证节点，并预留 6 个月缓冲。"
  - id: A3
    name: "每家活跃付费客户的混合年度 ARPU"
    value: "132.0"
    unit: "USDK per customer-year"
    source: "[BP gtm.pricing $12 万–$16 万 ACV；Research market.som 40 家客户约 $12.5 万混合 ACV；BP experimentRoadmap 漂移监控扩展] 基准情形接近区间低中位值，并假设部分 Y3 账户附加漂移监控或第二个遥测域。"
  - id: A4
    name: "毛利率"
    value: "70.0"
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct 70] 基准情形维持在计划目标。"
  - id: A5
    name: "第 1 年客户落地节奏"
    value: "M1–M12 期末客户数 = 0,0,0,1,1,2,2,3,3,4,4,5"
    unit: "count"
    source: "[BP experimentRoadmap 90–180 天付费试点；BP milestones 0–12 个月] 第 4 个月首家付费客户到账，年末达到 5 家活跃付费账户，与 3–5 个付费试点和至少 2 个生产转化一致。"
  - id: A6
    name: "第 2、3 年客户里程碑"
    value: "Q1Y2 6；Q2Y2 8；Q3Y2 10；Q4Y2 12；Q1Y3 19；Q2Y3 28；Q3Y3 36；Q4Y3 40"
    unit: "count"
    source: "[BP milestones 12–24 个月达到 8–12 家生产客户；BP milestones 24–36 个月达到约 40 家客户；Research market.som 40 家客户] 模型假设合作伙伴渠道在 Y3 开始贡献实质管道。"
  - id: A7
    name: "月度客户流失率"
    value: "2.2"
    unit: "percent"
    source: "[早期企业安全工作流软件的初创财务经验值] 切口一旦嵌入应具备粘性，但公司尚处于品类定义前阶段。"
  - id: A8
    name: "各职位含税全包薪酬"
    value: "创始人/CEO 150；联合创始工程师 190；检测工程负责人 175；安全数据平台工程师 185；驻场安全工程师 160；GTM 负责人 180；平台工程师 II 185；客户经理 180；客户成功工程师 155；财务与运营经理 125；客户经理 II 180；平台工程师 III 185；产品经理 165"
    unit: "USDK per year"
    source: "[BP team 职位及 sequencingRationale；北美精简企业安全 SaaS 团队含工资税和福利的初创财务经验值。]"
  - id: A9
    name: "招聘时间表"
    value: "M1 创始人/CEO、联合创始工程师、检测工程负责人；M4 安全数据平台工程师；M7 驻场安全工程师；M12 GTM 负责人；M15 平台工程师 II；M18 客户经理；M21 客户成功工程师；M24 财务与运营经理；M28 客户经理 II；M30 平台工程师 III；M33 产品经理"
    unit: "timing"
    source: "[BP team.startTiming 直至 Y1；BP strategicChoices.sequencingRationale；Y2–Y3 扩张招聘的初创财务经验值] 商务和运营职位仅在试点和首批生产转化后才加入。"
  - id: A10
    name: "非薪酬运营支出爬坡"
    value: "月度非薪酬销售与市场推广/研发/一般及行政 = Y1 早期 3/6/4，Y1 末 6/9/5.5，Y2 末 14.5/13.5/7.5，Y3 末 29/19.5/13.5"
    unit: "USDK per month"
    source: "[初创财务经验值，锚定在云工具、合作伙伴差旅、安全/合规和法务支出，符合 BP 部署模型。]"
  - id: A11
    name: "收入确认政策"
    value: "收入 = 期间平均活跃付费客户数 × A3；月度期间使用 A3/12，季度期间使用 A3/4"
    unit: "policy"
    source: "[BP businessModel.unitOfValue 和 BP gtm.pricing] 将收入直接与客户数量和混合 ACV 挂钩。"
  - id: A12
    name: "现金转化政策"
    value: "EBITDA 近似现金变动"
    unit: "policy"
    source: "[初创财务经验值] 本阶段不建模债务、资本性支出、税款或重大营运资金波动。"
  - id: A13
    name: "GTM 职能分配用于 CAC 和资金用途"
    value: "创始人/CEO 70% 销售与市场/30% 一般及行政；驻场工程师 40% 销售与市场/60% 研发；GTM 负责人和客户经理 100% 销售与市场；客户成功工程师 40% 销售与市场/60% 一般及行政；工程和产品职位 100% 研发；财务与运营 100% 一般及行政"
    unit: "allocation"
    source: "[BP team 职位理由] 用于推导混合 CAC 和资金用途分类。"
  - id: A14
    name: "混合 CAC"
    value: "46.0"
    unit: "USDK per net new customer"
    source: "[由建模的 Y2–Y3 GTM 支出和 35 名净新客户推导] 假设创始人主导加合作伙伴辅助销售在首批共创客户转化后保持高效。"
  - id: A15
    name: "融资里程碑"
    value: "第 12 个月前，公司应有 3–5 个付费试点、至少 2 个以目标 ACV 完成的生产转化、首张评分卡中位时间低于 21 天，以及至少一条可复制的合作伙伴驱动进入迁移或上线账户的路径"
    unit: "milestone"
    source: "[BP milestones, BP experimentRoadmap, BP fundingAsk.useOfFundsSummary] 本轮融资规模恰好覆盖达到此证明节点加六个月缓冲。"
