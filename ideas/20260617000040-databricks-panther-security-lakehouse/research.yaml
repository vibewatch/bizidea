  adoptionFrictionMatrix:
  - friction: Ground-truth scarcity for alert outcomes
    severity: high
    affectedBuyer: Detection engineering manager
    mitigation: Start with high-volume identity and cloud detections where analyst dispositions exist, then expand once scoring proves trustworthy.
    sourceRefs:
    - 12
    - 19
    - 24
  - friction: Replay cost and latency on large historical telemetry
    severity: high
    affectedBuyer: Security data platform lead
    mitigation: Use capped or sampled replays, warehouse-side pushdown, and explicit cost scorecards tied to billing data.
    sourceRefs:
