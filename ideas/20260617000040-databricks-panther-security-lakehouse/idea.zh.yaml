differentiator: >-
  通用 CI 工具可以对 YAML 做 lint 或跑单元测试，
  但无法模拟安全内容的分析师队列影响、遥测覆盖率或湖仓查询开销。
  SIEM 厂商或许会推出基础暂存功能，但他们的动机是将更多活动拉入自己的运行时，
  而非在迁移和混合技术栈中提供中立基准。
  真正可防御的资产是一个检测回放语料库——记录真实检测、事件结果和成本曲线，
  让每次发布都能更准确地预测一条规则是否应该上线。
