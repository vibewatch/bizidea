problem: >-
  进入 Databricks 和 Panther 的检测工程团队终于能摄入更丰富的遥测数据、以代码形式交付检测规则，
  但每条新规则或工作流仍可能让分析师淹没在噪音里、遗漏真实攻击路径、或让数据仓库的算力账单暴涨。
  AI 辅助规则编写让小团队能生产比手工验证更多的内容，反而让情况更糟。
  目前大多数团队仍依赖临时 notebook、暂存查询和分析师直觉，导致生产变更缓慢落地，
  新安全数据湖仓的信任度迅速流失。
targetUser:
  primary: >-
    在以 Panther 或 Databricks 为云 SOC 遥测平台的云原生软件和金融科技公司中，
    负责检测工程的经理以及安全数据平台负责人。
  secondary: >-
    在规则发布后接手嘈杂或脆弱检测的 SOC 经理和事件响应人员。
  buyer: "安全工程总监、检测工程负责人或 CISO。"
startupThesis:
  nonObviousInsight: >-
    安全数据湖仓栈的第一个独立赢家，不会是另一个 SIEM 或自主分析师；
    而是那个能在检测规则或工作流上线前证明其效果的发布控制层。
    随着湖仓存储成本下降、AI 让规则编写趋于充裕，
    真正稀缺的能力是"发布前确信"，而非规则创作本身。
  beachhead: >-
    员工规模 500–5,000 人、以 Panther 或 Databricks 为新兴安全数据湖仓、
    使用 AWS + Okta + CrowdStrike 遥测数据、拥有 2–8 人检测工程团队并每周发布检测即代码变更的
    C 轮至上市阶段云原生软件和数字金融科技公司。
  wedge: >-
    一个检测发布关卡：将候选 Panther 检测规则和响应工作流在历史遥测数据上回放，
    对分析师负载、覆盖漏洞和湖仓算力成本评分，然后拦截不安全的发布。
  whyNowCatalyst: >-
    Databricks 收购 Panther，将检测即代码和智能体 SOC 工作流升级为平台优先级，
    恰逢 AI 驱动的攻击速度和 AI 辅助规则编写让人工验证变得太慢。
  ventureScalePath: >-
    从 Panther 和 Databricks 检测的上线前测试起步，
    逐步扩展至跨 SIEM 迁移质检、运行时漂移检测、自动化响应策略模拟，
    最终成为企业安全内容性能的系统性记录平台。
solution: >-
  产品接入客户的 Panther 代码仓、Databricks 数据湖和告警历史。
  每项候选检测或工作流变更都在最近 90–180 天的标准化遥测数据上回放，
  并与已知事件、分析师处置记录和基线队列量进行基准对比。
  输出一张发布评分卡，显示预期精准度、新实体覆盖率、重复告警碰撞、
  仓库算力影响以及推荐的灰度上线规范。
  对于 AI 编写的检测规则，产品在合并前强制要求结构化理由和证据链接，
  再监控生产漂移，当告警量超过模拟包络时自动回滚。
  初始部署聚焦身份、云权限和 SaaS 管理员检测——这些场景变更频繁，
  且可直接衡量新安全数据湖仓是否真的优于传统 SIEM。
goToMarketSeed:
  firstCustomer: >-
    使用 Panther on Databricks、员工 700–2,000 人的云原生金融科技公司检测工程负责人，
    遥测数据涵盖 AWS、Okta、CrowdStrike 和 GitHub，
    团队 3–5 人并维护每周检测发布节奏。
  buyingTrigger: >-
    Splunk 续约、Databricks 或 Panther 迁移项目，
    或事后复盘被迫证明新检测规则和工作流不会增加队列噪音、不会造成盲区。
  currentAlternative: >-
    基于 Git 的检测仓库、在 Panther 或 notebook 中手工回测、
    供应商专业服务，以及生产上线后的分析师反馈。
  switchingReason: >-
    产品让团队能更快交付更多检测内容，同时提供可量化的精准度、覆盖率和成本护栏，
    无需替换 Panther，也不必等一次故障才知道规则出了问题。
  pricingHypothesis: >-
    按接入遥测域和每月检测/工作流发布量定价的年度订阅，
    加上事件回放数据集和运行时漂移监控的高级模块。
