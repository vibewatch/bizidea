topRisks:
  - name: "平台捆绑"
    description: "Databricks 或其他 SIEM 厂商可能捆绑足够多的暂存和测试功能，挤压独立切口空间。"
    mitigation: "靠跨平台回放、迁移基准测试和更深入的性能分析取胜——这些是厂商在混合技术栈中无法中立提供的能力。"
  - name: "标注数据匮乏"
    description: "许多安全团队缺乏对哪些告警真正有价值的清晰标注，可能导致自动评分充满噪音。"
    mitigation: "从高频身份和云检测入手，以分析师处置记录和事件复盘作为标注来源，并为共创客户提供基准配置的驻场服务。"
  - name: "算力与集成阻力"
    description: "在大规模遥测集上做历史回放可能既昂贵又缓慢，如果产品一上来就需要太多连接器。"
    mitigation: "采用仓库侧下推执行、早期迭代的采样回放，以及围绕 Panther、Databricks、AWS、Okta 和 CrowdStrike 的精简初始连接器集。"
