jobsToBeDone:
  - job: >-
      当我们的检测工程师提出新的云或身份规则时，帮他们证明该规则能发现更多真实威胁、
      且不会让分析师队列量翻倍，让他们能更快合并并信任新的安全数据湖仓。
    currentAlternative: "在 notebook 中手工回测，加上上线后分析师的抱怨反馈。"
    successMetric: "从规则草稿到生产上线的时间，以及上线第一周的误报率。"
  - job: >-
      当我们将检测规则从 Splunk 或 Sentinel 迁移至 Panther on Databricks 时，
      帮安全平台团队在切换前比较覆盖率和算力成本，让他们能在不留盲区的情况下下线传统 SIEM。
    currentAlternative: "供应商专业服务、电子表格迁移计划和有限的暂存测试。"
    successMetric: "通过回放阈值的迁移检测比例，以及传统 SIEM 支出的削减幅度。"
