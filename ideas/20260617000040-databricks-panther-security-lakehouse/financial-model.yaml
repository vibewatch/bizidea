scenarios:
  downside:
    description: "Slower paid-pilot conversion, lower realized ACV, and weaker replay economics delay scale."
    y3RevenueK: 2640.0
    y3EbitdaK: -831.9
    cashLowPointK: -365.6
    keyAssumptionChanges:
      - "ARPU slips to $120K as buyers treat the product as a narrower QA workflow."
      - "Quarter-end customers reach only 10 by Q4Y2 and 34 by Q4Y3."
      - "Gross margin compresses to 67% if replay cost and services work stay elevated."
  base:
    description: "Founder-led pilots convert on plan, partner channels start to contribute in Y3, and pricing stays near the low-midpoint of the target range."
    y3RevenueK: 3597.0
    y3EbitdaK: -83.0
    cashLowPointK: 397.5
    keyAssumptionChanges:
      - "Blended ARPU holds at $132K with 70% gross margin."
      - "Customers scale from 5 at Y1 exit to 12 at Q4Y2 and 40 at Q4Y3."
      - "Hiring stays milestone-gated so the team reaches 13 FTE by Q4Y3."
  upside:
    description: "Drift monitoring and partner-led migration QA attach earlier, lifting price realization and logo growth."
    y3RevenueK: 4277.5
    y3EbitdaK: 479.0
    cashLowPointK: 699.2
    keyAssumptionChanges:
      - "ARPU rises to $145K as more accounts add drift monitoring or a second telemetry domain."
      - "Quarter-end customers reach 13 by Q4Y2 and 45 by Q4Y3."
      - "Gross margin improves to 72% as replay workflows standardize."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Blended annual ARPU falls to $120K."
    baseCase: "Blended annual ARPU stays at $132K."
    upsideCase: "Blended annual ARPU reaches $145K with stronger expansion."
    y3RevenueImpactK: -327.0
    cashImpactK: -312.5
  - variable: "CAC"
    downsideCase: "Blended CAC rises to about $50K because partner-sourced opportunities underperform."
    baseCase: "Blended CAC stays near $46K with founder-led and partner-assisted selling."
    upsideCase: "Blended CAC falls to about $44K once reference accounts warm the pipeline."
    y3RevenueImpactK: 0.0
    cashImpactK: -161.1
  - variable: "churn"
    downsideCase: "Monthly churn rises toward 3% and reduces Y3 quarter-end customers to roughly 36."
    baseCase: "Monthly churn stays at 2.2%."
    upsideCase: "Monthly churn improves toward 1.5% and allows Y3 quarter-end customers to exceed 40."
    y3RevenueImpactK: -264.0
    cashImpactK: -184.8
  - variable: "sales cycle"
    downsideCase: "Pilot-to-production slips by roughly one quarter and Y3 ends at only 34 customers."
    baseCase: "Paid pilots convert on the A5/A6 schedule."
    upsideCase: "Security review compresses and partner channels bring customers forward by about one quarter."
    y3RevenueImpactK: -693.0
    cashImpactK: -577.6
  - variable: "gross margin"
    downsideCase: "Gross margin falls to 67% because replay cost and deployment work stay heavier."
    baseCase: "Gross margin stays at 70%."
    upsideCase: "Gross margin improves to 72% with more standardized replay operations."
    y3RevenueImpactK: 0.0
    cashImpactK: -147.0
  - variable: "hiring pace"
    downsideCase: "The Y2-Y3 expansion plan is pulled forward by one quarter before demand warrants it."
    baseCase: "Hiring follows A9."
    upsideCase: "One late-stage commercial or product hire can slip until after 20 production customers."
    y3RevenueImpactK: 0.0
    cashImpactK: -425.4
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "The base case reaches $3.6M of Y3 revenue by moving from 5 active paying logos at Y1 exit to 40 at Q4Y3 on a $132K blended ACV."
  - checkName: "Must go right"
    finding: "Pilot-to-production conversion and partner-assisted sourcing must keep CAC near $46K while the logo count jumps from 12 to 40 in Y3."
  - checkName: "Model breaks if"
    finding: "If sales cycles slip one quarter or ARPU falls toward $120K, the downside case turns cash negative before Y3 ends."
  - checkName: "Next-round proof"
    finding: "A credible seed case is 3-5 paid pilots, 2 production conversions, sub-21-day scorecards, and a visible path to 8-12 production customers by month 24."
sanityChecks:
  ruleOf40: "Y3 growth 235% + EBITDA margin -2% = 233%"
  burnMultiple: "Y2 burn multiple is about 1.0x on roughly $0.9M of net new ARR and improves to near 0.0x in Y3 as burn falls to ~$83K."
  revenuePerFte: "$277K Y3 on 13 Q4Y3 FTE (benchmark roughly $200K-$400K enterprise SaaS)"
  flags:
    - "The base case still requires customer count to jump from 12 at Q4Y2 to 40 at Q4Y3, so partner channels must become real pipeline rather than just co-selling narratives."
    - "Modeled CAC of about $46K is efficient for enterprise security software and depends on founder-led selling, paid pilots, and partner referrals staying unusually focused."
    - "Y3 EBITDA is only roughly breakeven, so modest price pressure or faster-than-planned hiring would likely force a seed extension or a smaller follow-on before the full SOM is reached."
    - "Replay cost, label quality, or native Panther or Lakewatch bundling could compress margin and sales urgency faster than the base case assumes."
