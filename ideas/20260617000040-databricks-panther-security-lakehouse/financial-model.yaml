slug: lakehouse-detection-release-gate
date: "2026-06-17"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-07"
    unit: "month"
    source: "[BP date 2026-06-17] The model starts in the month after the plan date."
  - id: A2
    name: "Opening cash from pre-seed round"
    value: "2.4"
    unit: "USDM"
    source: "[BP fundingAsk round pre-seed, targetFundingRangeUsd $2-4M, runwayMonths 18] Base case uses a $2.4M raise inside the stated range to fund the first 12-month proof point plus a 6-month buffer."
  - id: A3
    name: "Blended annual ARPU per active paying logo"
    value: "132.0"
    unit: "USDK per customer-year"
    source: "[BP gtm.pricing $120k-$160k ACV; Research market.som 40 customers at ~$125k blended ACV; BP experimentRoadmap drift monitoring expansion] Base case stays near the low-midpoint and assumes some Y3 accounts attach drift monitoring or a second telemetry domain."
  - id: A4
    name: "Gross margin"
    value: "70.0"
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct 70] Held at the plan target in the base case."
  - id: A5
    name: "Year 1 customer landing pattern"
    value: "M1-M12 EOP customers = 0,0,0,1,1,2,2,3,3,4,4,5"
    unit: "count"
    source: "[BP experimentRoadmap 90-180 day paid pilots; BP milestones 0-12 months] The first paid logo arrives in M4 and the year ends with 5 active paying accounts, consistent with 3-5 paid pilots and at least 2 production conversions."
  - id: A6
    name: "Year 2 and Year 3 customer milestones"
    value: "Q1Y2 6; Q2Y2 8; Q3Y2 10; Q4Y2 12; Q1Y3 19; Q2Y3 28; Q3Y3 36; Q4Y3 40"
    unit: "count"
    source: "[BP milestones 12-24 months reach 8-12 production customers; BP milestones 24-36 months reach roughly 40 customers; Research market.som 40 customers] The model assumes partner channels start to contribute meaningfully in Y3."
  - id: A7
    name: "Monthly customer churn"
    value: "2.2"
    unit: "percent"
    source: "[Startup-finance heuristic for early enterprise security workflow software] The wedge should be sticky once embedded, but the company is still pre-category-definition."
  - id: A8
    name: "Loaded cash compensation by role"
    value: "Founder CEO 150; Founding engineer 190; Detection engineering lead 175; Security data platform engineer 185; Forward deployed security engineer 160; GTM lead 180; Platform engineer II 185; Account executive 180; Customer success engineer 155; Finance & ops manager 125; Account executive II 180; Platform engineer III 185; Product manager 165"
    unit: "USDK per year"
    source: "[BP team roles and sequencingRationale; startup-finance heuristic for a lean North American enterprise security SaaS team including payroll tax and benefits.]"
  - id: A9
    name: "Hiring schedule"
    value: "M1 founder CEO, founding engineer, detection engineering lead; M4 security data platform engineer; M7 forward deployed security engineer; M12 GTM lead; M15 platform engineer II; M18 account executive; M21 customer success engineer; M24 finance & ops manager; M28 account executive II; M30 platform engineer III; M33 product manager"
    unit: "timing"
    source: "[BP team.startTiming through Y1; BP strategicChoices.sequencingRationale; startup-finance heuristic for Y2-Y3 expansion hires] Later commercial and ops roles are added only after pilots and first production conversions."
  - id: A10
    name: "Non-payroll opex ramp"
    value: "Monthly non-payroll S&M / R&D / G&A = 3/6/4 in early Y1, 6/9/5.5 by late Y1, 14.5/13.5/7.5 by late Y2, and 29/19.5/13.5 by late Y3"
    unit: "USDK per month"
    source: "[Startup-finance heuristic anchored to cloud tooling, partner travel, security/compliance, and legal spend for the BP deployment model.]"
  - id: A11
    name: "Revenue recognition policy"
    value: "Revenue equals average active paying logos in the period multiplied by A3; monthly periods use A3/12 and quarterly periods use A3/4"
    unit: "policy"
    source: "[BP businessModel.unitOfValue and BP gtm.pricing] Keeps revenue tied directly to customer count and blended ACV."
  - id: A12
    name: "Cash conversion policy"
    value: "EBITDA approximates cash movement"
    unit: "policy"
    source: "[Startup-finance heuristic] No debt, capex, taxes, or material working-capital swings are modeled at this stage."
  - id: A13
    name: "Functional GTM allocation for CAC and use of funds"
    value: "CEO 70% S&M / 30% G&A; forward deployed engineer 40% S&M / 60% R&D; GTM lead and AEs 100% S&M; customer success engineer 40% S&M / 60% G&A; engineering and product roles 100% R&D; finance & ops 100% G&A"
    unit: "allocation"
    source: "[BP team rationales] Used to derive blended CAC and use-of-funds buckets."
  - id: A14
    name: "Blended CAC"
    value: "46.0"
    unit: "USDK per net new customer"
    source: "[Derived from modeled Y2-Y3 GTM spend and 35 net new customers] Assumes founder-led plus partner-assisted selling remains efficient once the first design partners convert."
  - id: A15
    name: "Funding milestone"
    value: "By month 12 the company should have 3-5 paid pilots, 2 production conversions at target ACV, median first scorecards under 21 days, and at least one repeatable partner path into migration or rollout accounts"
    unit: "milestone"
    source: "[BP milestones, BP experimentRoadmap, BP fundingAsk.useOfFundsSummary] The round is sized to reach this proof point plus six months of buffer."
