  validationPlan:
  - priority: high
    question: "共创客户是否愿意为拦截不安全 Panther 或 Databricks 晋升的合并前关卡付费？"
    evidenceToGather: "在一个检测系列上运行 5–8 个付费试点，比较发布关卡前后的误报率、审查时间和回滚发生率。"
  - priority: high
    question: "产品是否能实质缩短 Splunk 到 Panther 或 SIEM 替换的质检时间？"
    evidenceToGather: "在真实替换项目中收集规则验证工时、切换信心和缺陷逃逸率的并排迁移数据。"
  - priority: medium
    question: "哪个遥测域能最快交付 ROI 和最干净的标注：身份、云权限还是 SaaS 管理员？"
    evidenceToGather: "在至少 3 家共创客户中收集回放结果和分析师处置记录，按检测系列比较价值实现时间。"
