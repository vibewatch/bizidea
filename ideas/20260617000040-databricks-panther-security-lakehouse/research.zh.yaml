regulatoryTechnicalConstraints:
- point: "Panther Data Replay 限制为最近 15 天、24 小时前的数据、上限 20GB，且必须在 1 小时内完成；还封锁了富化和网络调用。"
  sourceRefs:
  - 12
- point: "AWS Security Lake 自定义来源必须符合 OCSF、Parquet、分区和对象大小要求，因此回放标准化并非免费。"
  sourceRefs:
  - 33
  - 34
- point: "Databricks 警告导出的审计日志可能暴露敏感数据，因此部署设计应最大限度减少在受治理平台外的数据移动。"
  sourceRefs:
  - 6
- point: "未经谨慎迁移，Panther 不支持对检测内容同时进行控制台管理和 CI/CD 管理，因此产品必须适配现有代码仓治理。"
  sourceRefs:
  - 14
validationSignals:
- point: "Databricks 表示已有 2 万家机构使用其平台，并将 Lakewatch 定位为开放、低 TCO 的 SIEM 替代方案，形成了庞大的相邻装机基础。"
  sourceRefs:
  - 1
  - 3
- point: "Panther 宣传在 Databricks 安全湖仓架构上实现事件响应速度提升 80% 以上和大幅成本节省，表明买家已在为可量化的运营改善付费。"
  sourceRefs:
  - 9
- point: "误报、未处理告警和分析师职业倦怠仍未解决，团队仍在积极采购更好的调优和分诊工作流。"
  sourceRefs:
  - 16
  - 17
  - 18
- point: "多家厂商现在明确销售检测即代码、调优和检测工程自动化，验证了该工作流本身已有预算和负责人。"
  sourceRefs:
  - 19
  - 20
  - 22
  - 25
