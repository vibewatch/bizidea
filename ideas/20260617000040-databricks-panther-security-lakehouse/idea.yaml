differentiator: >-
  Generic CI tools can lint YAML or run unit tests, but they cannot simulate
  analyst queue impact, telemetry coverage, or lakehouse query spend for
  security content. SIEM vendors may ship basic staging features, yet they are
  incentivized to drive volume inside one platform rather than provide neutral
  benchmarks across migrations and mixed stacks. The defensible asset is a
  replay corpus of real detections, incident outcomes, and cost curves that
  turns every release into a better prediction of whether a rule should ship.
