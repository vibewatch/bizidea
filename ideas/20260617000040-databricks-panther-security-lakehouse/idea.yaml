jobsToBeDone:
  - job: >-
      When our detection engineers propose a new cloud or identity rule, help
      them prove it will catch more real threats without doubling analyst queue
      volume, so they can merge faster and trust the new security lakehouse.
    currentAlternative: "Manual backtests in notebooks plus post-release analyst complaints."
    successMetric: "Time from rule draft to production and false-positive rate on the first week of rollout."
  - job: >-
      When we migrate detections from Splunk or Sentinel into Panther on
      Databricks, help the security platform team compare coverage and compute
      cost before cutover, so they can retire the legacy SIEM without blind
      spots.
    currentAlternative: "Vendor professional services, spreadsheet migration plans, and limited staging tests."
    successMetric: "Percentage of migrated detections passing replay thresholds and reduction in legacy SIEM spend."
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      A same-day acquisition plus official, Reuters-backed, and trade coverage
      make the shift real, though the signal is still dominated by a large
      incumbent narrative.
  painIntensity:
    score: 4
    rationale: >-
      Bad detection releases create missed attacks, analyst burnout, and runaway
      compute bills, making this a material operational pain for modern SOCs.
  wedgeClarity:
    score: 5
    rationale: >-
      Release gating for detection-as-code on Panther and Databricks is a narrow
      and immediately understandable first product.
  defensibility:
    score: 4
    rationale: >-
      Replay datasets, incident-outcome benchmarks, and workflow embedding can
      compound into durable product advantage, though platforms may copy the
      basics.
  ventureScale:
    score: 5
    rationale: >-
      If the company becomes the release system of record for detections and
      workflows, it can expand into migration, policy simulation, runtime
      control, and broader security operations infrastructure.
topRisks:
  - name: "Platform bundling"
    description: "Databricks or other SIEM vendors could bundle enough staging and testing to squeeze an independent wedge."
    mitigation: "Win on cross-platform replay, migration benchmarking, and deeper performance analytics that vendors do not provide neutrally across mixed stacks."
  - name: "Ground-truth scarcity"
    description: "Many security teams lack clean labels on which alerts were truly useful, which can make automated scoring noisy."
    mitigation: "Start with high-volume identity and cloud detections, use analyst dispositions plus incident retrospectives as labels, and offer a concierge benchmark setup for design partners."
  - name: "Compute and integration drag"
    description: "Historical replay over large telemetry sets can become expensive and slow if the product needs too many connectors on day one."
    mitigation: "Use warehouse-side pushdown, sampled replay for early iterations, and a narrow initial connector set around Panther, Databricks, AWS, Okta, and CrowdStrike."
