differentiator: >-
  Horizontal synthetic-panel vendors like Talp sell a general-purpose simulation engine that must stay broad to
  serve many verticals. This product instead calibrates its behavioral panel directly on a subscription brand's own
  billing, plan-mix, and churn history, and closes the loop by scoring its own predictions against real post-launch
  outcomes for that specific brand. That brand-specific accuracy record, compounding with every test run, is the
  moat a horizontal tool cannot easily replicate without the same depth of subscription-commerce billing data.
conceptDiagram:
  title: Pre-launch synthetic shopper simulation loop
  mermaid: |
    flowchart LR
      Brand[Growth lead at DTC subscription brand] --> Trigger[Pricing or checkout change proposal]
      Trigger --> Calibrate[Calibrate synthetic panel on brand cohort data]
      Calibrate --> Simulate[Simulate hundreds of shopper sessions]
      Simulate --> Predict[Predicted conversion, abandonment, churn risk]
      Predict --> Decision[Ship or revise before launch]
      Decision --> Launch[Live launch]
      Launch --> Validate[Compare real outcomes to prediction]
      Validate --> Calibrate
