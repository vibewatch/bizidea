jobsToBeDone:
  - job: >-
      When planning a price increase for a subscription product, help the growth lead predict conversion and churn
      impact, so they can ship the change with confidence instead of guessing.
    currentAlternative: Stated-preference survey or agency concept test
    successMetric: Predicted vs. actual conversion and 90-day churn delta within an agreed accuracy band
  - job: >-
      When redesigning a checkout flow, help the growth lead identify likely abandonment points before launch, so
      they can fix friction without burning live traffic on a failed test.
    currentAlternative: Manual moderated user-testing sessions
    successMetric: Reduction in real cart abandonment rate after shipping the simulated-and-revised flow
