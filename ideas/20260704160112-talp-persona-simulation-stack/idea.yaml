  signalStrength:
    score: 4
    rationale: >-
      Three independent same-day sources corroborate a $20M pre-seed for behavior-calibrated synthetic personas,
      backed by a16z Scout Fund, though all three summaries trace to one funding event rather than independent
      market signals.
  painIntensity:
    score: 3
    rationale: >-
      Wasted ad spend and churn from bad pricing/checkout launches are real and costly for subscription brands, but
      the triage cluster itself scored painIntensity only 3, reflecting that this is an optimization pain rather
      than an existential one for most targets.
  wedgeClarity:
    score: 4
    rationale: >-
      Narrowing to Shopify-based subscription DTC brands calibrated on their own cohort data gives a specific,
      testable first product surface rather than Talp's horizontal "any campaign" positioning.
  defensibility:
    score: 3
    rationale: >-
      The brand-specific calibration and outcome-validation loop is a real moat, but a well-funded horizontal
      competitor like Talp could build the same vertical calibration once it targets subscription commerce.
  ventureScale:
    score: 3
    rationale: >-
      The beachhead is a real but bounded market (subscription DTC on Shopify); venture scale depends on
      successfully expanding the calibration engine to adjacent verticals, which is plausible but unproven.
topRisks:
  - name: Horizontal incumbent encroachment
    description: >-
      Talp or a similarly funded horizontal synthetic-panel vendor could add subscription-commerce cohort
      calibration and undercut this vertical wedge with a broader existing customer base and larger R&D budget.
    mitigation: >-
      Move fast to build proprietary calibration data from real Shopify billing and churn integrations, and lock in
      design partners with annual contracts before a horizontal player prioritizes this vertical.
  - name: Prediction accuracy and trust risk
    description: >-
      If simulated predictions diverge meaningfully from real post-launch conversion and churn outcomes, brands
      will lose trust in the tool after one bad call, especially since pricing decisions have high visible stakes.
    mitigation: >-
      Ship the closed-loop validation feature from day one, publish brand-specific accuracy track records
      transparently, and cap early recommendations to lower-stakes tests (checkout copy, tier framing) before
      scaling to full price changes.
  - name: Small-brand sales cycle and ROI proof risk
    description: >-
      Growth leads at $5M-$50M ARR brands are skeptical of unproven research tools and have limited budget
      authority, making the sales cycle slow without a clear, provable payback.
    mitigation: >-
      Launch with a low-cost single-test pilot tied to one specific upcoming pricing or checkout decision, and use
      the resulting predicted-vs-actual comparison as the core case-study asset for the next sale.
