      sourceRefs:
      - 16
      - 17
      - 20
      - 22
      - 24
  pestle:
  - factor: 经济
    impact: positive
    point: 获客成本走高，经常性收入的价值也水涨船高，让品牌更愿意在上线前就守住转化率和留存。
    sourceRefs:
    - 3
    - 4
  - factor: 社会
    impact: positive
    point: "本可避免的购物挫败感依然常见：额外费用、信任问题和冗长的结账流程，仍然是弃单的主要推手。"
    sourceRefs:
    - 5
  - factor: 技术
    impact: positive
    point: 公开的评测框架和贴近真实的网页任务研究，降低了搭建模拟和上线后度量的开发风险。
    sourceRefs:
    - 34
    - 35
    - 36
    - 37
  - factor: 法律
    impact: negative
    point: 订阅退订、用户画像和欺骗性设计相关的规则，加大了产品和话术上的限制。
    sourceRefs:
    - 28
    - 29
    - 30
    - 31
    - 33
  - factor: 政治
    impact: neutral
    point: 监管机构和标准组织正在积极发布 AI 治理指南，这抬高了企业审查的成本。
    sourceRefs:
    - 32
    - 33
  adoptionFrictionMatrix:
  - friction: 品牌还没见过“预测 vs 实际”准确率之前，很难信任合成预测
    severity: high
    affectedBuyer: 增长副总裁或留存负责人
    mitigation: 先从回测和赌注较低的结账或退订流程改动做起，再发布品牌专属的记分卡。
    sourceRefs:
    - 34
    - 35
    - 36
  - friction: 历史群组数据散落在 Shopify、计费、客服和分析工具里
    severity: high
    affectedBuyer: 增长负责人加技术相关方
    mitigation: 把最初的集成范围限定在 Shopify 加一个计费系统，并明确列出数据要求。
    sourceRefs:
    - 1
    - 2
    - 11
    - 12
  - friction: 订单量低让试点很难快速验证
    severity: medium
    affectedBuyer: 增长负责人
    mitigation: 围绕影响到每个买家的重大决策去卖，而不是卖微测试，并把模拟和上线后监控结合起来。
    sourceRefs:
    - 6
    - 8
  - friction: 合规团队可能会担心用户画像、退订暗黑模式和可解释性
    severity: medium
    affectedBuyer: 法务或数据保护相关方
    mitigation: 让建议保持可审计，要求人工审批，并把诊断和带操纵性质的干预手段分开。
    sourceRefs:
    - 29
    - 30
    - 31
    - 32
    - 33
