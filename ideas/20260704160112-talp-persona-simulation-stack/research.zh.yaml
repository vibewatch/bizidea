validationSignals:
- point: "投资人的胃口是真实的：2026 年 7 月有多篇报道描述 Talp 围绕 AI 客户画像，以 $20M 估值完成种子前融资。"
  sourceRefs:
  - 18
  - 19
- point: Recharge 表示，订阅用户下单次数几乎是一次性购物者的 3 倍，订阅结账量增长了 16%，这说明守住上线决策会不断累积成可观的 LTV。
  sourceRefs:
  - 3
- point: Just Ingredients 报告称，改动订阅体验之后，退订流程挽留率提升了 323%，经常性订阅收入增长了 28%，说明留存体验背后的经济赌注有多大。
  sourceRefs:
  - 15
- point: "相邻的 AI 研究平台也在扩张：Listen Labs 卖的是 AI 主持的访谈、超过 3000 万人的受访者网络，以及隔夜出报告的速度。"
  sourceRefs:
  - 24
openQuestions:
- 对于定价和结账改动，最少需要哪些客户数据字段，才能让预测准确率明显超过通用画像？
- 产品能有多快，用两三次真实上线证明 90 天流失预测的准确性，而不必对每个客户都等满一个季度？
- Shopify 和计费平台伙伴，会不会在不把这个产品视为渠道冲突的前提下，允许校准所需的数据访问深度？
- 买家更偏好按决策购买、年度平台订阅，还是绑定即将到来的调价日程的混合模式？
