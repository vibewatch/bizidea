fundingAsk:
  round: pre-seed
  amountM: 3.0
  runwayMonths: 18
  milestone: "在 3 个共创客户身上完成 ≥10 次历史回测，签下 4-6 个付费试点，把 ≥2 个试点转成年度订阅，上线 Shopify 加一个计费连接器，拿下一个伙伴渠道，并在进入“12-24 个月做到 15-25 个年度客户”的里程碑窗口时，保留 ≥6 个月的缓冲（对应 BP milestones 0-12mo 和 12-24mo）。"
  useOfFunds:
  - bucket: 工程
    amountUsd: 1350000
    percentage: 45
  - bucket: GTM
    amountUsd: 900000
    percentage: 30
  - bucket: "行政"
    amountUsd: 300000
    percentage: 10
  - bucket: "缓冲（6 个月）"
    amountUsd: 450000
    percentage: 15
scenarios:
  downside:
    description: "试点转年度订阅的转化率贴着 BP kill-criteria 的下限（40%）走，而不是 funnelTargets 的中位值；月流失率升到 4%；更繁重的人工审核把毛利率压缩到 65%；第三年客户基础比基准情形大致砍半。"
    y3RevenueK: 520.0
    y3EbitdaK: -1562.0
    cashLowPointK: -1850.0
    keyAssumptionChanges:
    - 第三年末年度客户约 60 个，而非 120 个（A9 减半）
    - 月流失率 4%，而非 2.5%（A15）
    - 毛利率 65%，而非 72%（A5）
  base:
    description: "对应主模型：第一年试点按 BP 声明的最低值转化（5 个里的 2 个），第二年做到 20 个年度客户（BP 15-25 区间的中位值），第三年通过 Shopify 生态加伙伴渠道扩展到 120 个客户，与研究测算的 SOM 数学一致。"
    y3RevenueK: 1035.0
    y3EbitdaK: -1404.8
    cashLowPointK: -641.11
    keyAssumptionChanges:
    - 按 totals.y3 和 y2y3Quarterly 中的建模结果
  upside:
    description: "伙伴渠道表现超预期（对应 BP gtm.channels 的联合销售假设），试点转年度订阅的转化率保持在 BP funnelTargets 区间的上限附近（70%+），ARPU 通过超额/高级用量扩大，算力效率把毛利率推高到 76%。"
    y3RevenueK: 1550.0
    y3EbitdaK: -1022.0
    cashLowPointK: -150.0
    keyAssumptionChanges:
    - 第三年末年度客户约 160 个，而非 120 个（A9 上调）
    - 综合 ARPU 约 $14K/年，而非 $12K（通过超额收入使 A2 上调）
    - 毛利率 76%，而非 72%（A5）
sensitivity:
- variable: ARPU
  downsideCase: "$9K/年年度合同（买家把价格谈到低于 BP 的 $18-36K 年化区间，逼近试点转化下限）"
  baseCase: "$12K/年年度合同，依据 SOM 测算（A2）"
  upsideCase: "$15K/年年度合同，靠超额和高级用量拉动"
  y3RevenueImpactK: 370.0
  cashImpactK: 265.0
- variable: CAC
  downsideCase: "$14K 综合 CAC（创始人主导外呼仍是主渠道，没有伙伴杠杆）"
  baseCase: "$9.4K 综合 CAC（A20）"
  upsideCase: "$6K 综合 CAC（按 BP gtm.channels，伙伴渠道带来的商机拉低单个合格商机成本）"
  y3RevenueImpactK: 300.0
  cashImpactK: 220.0
- variable: 流失率
  downsideCase: "月流失率 4%（平均生命周期 25 个月）"
  baseCase: "月流失率 2.5%，行业经验值（A15）"
  upsideCase: "月流失率 1.5%（平均生命周期 67 个月），准确率记分卡逐步建立信任后达成"
  y3RevenueImpactK: 250.0
  cashImpactK: 180.0
- variable: "销售周期 / 试点转年度订阅转化率"
  downsideCase: "40% 的试点转年度订阅转化率，即 BP kill-criteria 下限"
  baseCase: "约 55% 转化率，落在 BP funnelTargets 中试点转订阅 50%+ 的区间内"
  upsideCase: "70%+ 转化率，BP funnelTargets 区间上限"
  y3RevenueImpactK: 500.0
  cashImpactK: 380.0
- variable: 毛利率
  downsideCase: "毛利率 60%（更多人工审核合规工作和高算力回测）"
  baseCase: "毛利率 72%，依据 BP businessModel.targetGrossMarginPct（A5）"
  upsideCase: "毛利率 78%，随回测算力和模板规模化提升"
  y3RevenueImpactK: 0.0
  cashImpactK: 186.0
- variable: 招聘节奏
  downsideCase: "团队把第三年第四季度的人员编制提前到第二年第四季度（提前 6 个月），推高烧钱速度却没有匹配的营收"
  baseCase: "人员规模按人员编制表爬坡（三年内从 3 人到 14 名 FTE）"
  upsideCase: "招聘比计划晚 4 个月，以放慢实施和伙伴入驻为代价换来更长的现金跑道"
  y3RevenueImpactK: -50.0
  cashImpactK: 400.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Outbound[Founder-led outbound + Shopify ecosystem] --> Pilot[Paid pilot $6K-$12K]
      Pilot --> Backtest[Backtest + pre-launch simulation]
      Backtest --> Scorecard[Predicted-vs-actual scorecard]
      Scorecard --> Convert[Convert to annual subscription $12K/yr]
      Convert --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit at 72% margin]
      GrossProfit --> Cash[Cash runway]
      Partner[Partner channel: subscription platforms + agencies] --> Pilot
modelSanity:
- checkName: 营收引擎
  finding: "基准情形的营收，靠把少量付费试点转成 $12K/年的年度订阅来驱动，再通过 Shopify 生态和伙伴渠道商机，从第二年的 20 个客户扩展到第三年约 120 个客户，与研究测算的 SOM 数学一致。"
- checkName: 必须做对的事
  finding: "回测准确率和“预测 vs 实际”记分卡必须迈过商业计划自己定的门槛（10 次回测里 6 次转化率方向正确、7 次流失方向正确），试点才能按 funnelTargets 区间甚至更高的比例转成年度订阅，而不是掉到 40% 的 kill-criteria 下限。"
- checkName: 模型失效的条件
  finding: "如果伙伴渠道表现不及预期，第三年从 20 个客户跳到 120 个客户的曲线就会塌向下行情形（约 60 个客户，现金最低点接近 -$1.85M）；由于基准情形本身就在第三年第二季度转为现金为负，A 轮必须在那之前很早就完成交割。"
- checkName: 下一轮融资的证明点
  finding: "下一轮融资能否成立，取决于“12-24 个月做到 15-25 个按季度重复使用的年度客户，并有至少一个活跃伙伴渠道”这个里程碑，而模型显示到那个时点（第二年末），账上只剩大约 6-9 个月的现金缓冲。"
sanityChecks:
  ruleOf40: "第三年增长率约 505%（营收从 $171K 到 $1,035K）加上 EBITDA 利润率 -135.7% = 约 369%；鉴于第一、二年营收基数太小，这个阶段谈方向性意义不大，下面单独标记出来，而不是当作一个真实的效率信号。"
  burnMultiple: "第三年烧钱倍数约 1.17 倍（净烧钱 $1,404.8K / 净新增 ARR $1,200K，来自 100 个新客户、每个 $12K）；早期 SaaS 的基准是 <1 倍为优秀，1-1.5 倍为良好。"
  revenuePerFte: "第三年人均营收 $73.9K（$1,035K / 14 名 FTE），对比成熟 SaaS 的基准 $200-400K；这反映的是尚未规模化、试点密集的打法，本身不算一个危险信号。"
  flags:
  - 在只靠一轮种子前融资、没有建模过渡性融资的情况下，现金从第三年第二季度（约第 29 个月）起转为负值；A 轮必须在那之前完成交割，否则招聘或开支就得放缓——这与 fundingAsk.runwayMonths 的 18 个月加上逐渐收窄的缓冲是一致的。
  - Rule-of-40 和烧钱倍数的读数，被第一、二年过小的营收基数扭曲了，只有等 ARR 超过大约 $1-2M，这些基准才有意义。
  - 人均营收在整个第三年之前，都远低于成熟 SaaS $200-400K 的基准，反映的是商业计划里描述的那种试点密集、近似服务型的打法；必须靠自助式入驻和伙伴杠杆改善这一点，否则单位经济模型撑不起规模化。
  - 第三年客户从 20 涨到 120、一年翻六倍的爬坡曲线相当激进，而且完全押注在一个还没验证过的伙伴渠道上；research.yaml 和 business-plan.yaml 里都还没有公开证据表明伙伴渠道能撑起这个量级，所以下行情形（约 60 个客户）应该被当作同样可能发生。
  - research.yaml 里没有针对这个产品品类的流失率基准；2.5%/月这个数字（A15）是一个行业经验值，不是经过验证的数字，一旦第一批年度续约发生，就该换成真实的群组数据。
  - 第一年试点转年度订阅的转化率，是按商业计划声明的最低值建模的（5 个试点里的 2 个）；如果实际转化率贴着 40% 的 kill-criteria 下限走，而不是更高的 funnelTargets 区间，第二、三年的客户数和营收就应该向下行情形打折扣。
