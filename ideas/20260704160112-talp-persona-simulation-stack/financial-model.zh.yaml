slug: talp-persona-simulation-stack
date: "2026-07-04"
currency: USD
modelStartMonth: "2026-07"
assumptions:
- id: A1
  name: 起始客户数（M1）
  value: "0"
  unit: count
  source: "[BP executiveSummary / milestones：预上线阶段，尚无年度客户]"
- id: A2
  name: 年度订阅 ARPU
  value: "12000"
  unit: USD/year
  source: "[research.yaml market.som.rationale：“到第三年约 120 个品牌，年均花费约 $12,000”]"
- id: A3
  name: 平均一次性试点费用
  value: "9000"
  unit: USD/pilot
  source: "[BP investorMemo.firstCustomer.initialContract：“$6,000-$12,000 试点”，取中位值]"
- id: A4
  name: 第二、三年新客户的按决策实施/试点费
  value: "3000"
  unit: USD/new customer
  source: "[BP gtm.pricing：“按决策收费的套餐定价约 $3,000-$5,000”，因第二、三年试点借助模板更快，取低值]"
- id: A5
  name: 目标毛利率
  value: "72"
  unit: percent
  source: "[BP businessModel.targetGrossMarginPct：72]"
- id: A6
  name: 第一年签下的付费试点数
  value: "5"
  unit: count
  source: "[BP milestones 0-12mo：“围绕已排定的调价、档位或结账上线，签下 4-6 个付费试点”，取中位值]"
- id: A7
  name: 第一年试点转年度订阅数
  value: "2"
  unit: count
  source: "[BP milestones 0-12mo：“把至少两个试点转成按季度使用的年度订阅”]"
- id: A8
  name: 第二年末年度客户数
  value: "20"
  unit: count
  source: "[BP milestones 12-24mo：“做到 15-25 个按季度重复使用模拟的年度客户”，取中位值]"
- id: A9
  name: 第三年末年度客户数
  value: "120"
  unit: count
  source: "[BP milestones 24-36mo：“做到约 120 个订阅品牌或代理商托管的客户部署，与研究测算的 SOM 情形一致”]"
- id: A10
  name: 创始团队招募时间线
  value: "3 位创始人于第 0 个月到位；Shopify 集成工程师第 4 个月到位；解决方案工程师/客户成功第 6 个月到位"
  unit: count/timing
  source: "[BP team[]：创始产品-GTM、创始工程师、应用机器学习/评测的 startTiming 为第 0 个月，Shopify 集成工程师为第 4 个月，解决方案工程师为第 6 个月]"
- id: A11
  name: 全负载年化薪资区间
  value: "CEO/创始人 $150K；工程师 $160K；应用机器学习 $170K；集成工程师 $150K；解决方案工程师/客户成功 $120K；销售/客户经理 $130K；行政/运营 $110K"
  unit: USD/FTE/year
  source: "经验估算：种子期常见的全负载薪酬区间（基本工资 + 薪资税 + 福利负担），参考种子期薪酬基准报告（如 AngelList/Carta 的种子期薪酬报告）；business-plan.yaml 和 research.yaml 中都没有公司专属的薪资数据"
- id: A12
  name: 第一年非人力运营支出
  value: "研发工具 $2.0K/月；销售与市场 $3.0K/月；行政 $3.5K/月"
  unit: USD thousands/month
  source: "经验估算：3-5 人团队典型的种子前 SaaS 非人力运营支出（云服务/开发工具、创始人外呼差旅、法务/会计/保险）；输入材料中没有细项"
- id: A13
  name: 第二、三年非人力运营支出
  value: "第二年 $45K/季度；第三年 $75K/季度"
  unit: USD thousands/quarter
  source: "经验估算：非人力运营支出随人员规模和 BP gtm.channels 中的伙伴/营销活动（生态市场、伙伴联合销售）同步扩张；输入材料中没有细项"
- id: A14
  name: COGS 占营收比例
  value: "28"
  unit: percent
  source: "由 A5 推导（100% - 72% 目标毛利率）"
- id: A15
  name: 月度客户流失率
  value: "2.5"
  unit: percent/month
  source: "经验估算：早期 B2B SaaS、ACV 低于 $50K 合同的客户流失率基准（常见区间为 2-3%/月）；research.yaml 中没有该产品品类的厂商专属流失数据"
- id: A16
  name: EBITDA 近似净现金消耗
  value: "true"
  unit: boolean
  source: "经验估算：早期建模的标准简化处理，因输入材料未披露重大资本开支或营运资金波动"
- id: A17
  name: 融资金额
  value: "3.0"
  unit: USD millions
  source: "[BP fundingAsk.targetFundingRangeUsd：“$2-4M”，取中位值]"
- id: A18
  name: 融资现金跑道
  value: "18"
  unit: months
  source: "[BP fundingAsk.runwayMonths：18]；建模现金显示，在第 18 个月之后、进入第二年 12-24 个月里程碑窗口前，还有额外缓冲，之后才需要 A 轮"
- id: A19
  name: 收入确认方法
  value: "试点/实施费用于交付当月确认；年度订阅按月摊销确认（年度合同金额 / 12）"
  unit: method
  source: "经验估算：针对 [BP businessModel.revenueStreams] 中描述的“一次性+订阅”混合定价，采用标准的 SaaS/服务收入确认方法"
- id: A20
  name: CAC 计算依据
  value: "第三年综合销售与市场支出（GTM/客户成功/销售岗位的人力成本占比，加上非人力销售市场运营支出）除以第三年净新增年度客户数（100）"
  unit: method
  source: "由人员岗位构成（A11）和 A9 推导；标准自下而上 CAC 计算法"
- id: A21
  name: 在 BP 明确列出的五个岗位之外新增的销售/客户经理与行政/运营岗位
  value: "销售/客户经理从第一年第四季度起；行政/运营从第二年第四季度起"
  unit: count/timing
  source: "运营判断：BP 中第二年做到 15-25 个年度客户的里程碑（A8），需要专职的定额销售和财务/运营能力，而 [BP team[]] 里没有明确列出这些岗位；参照粗略经验法则——每 $1-1.5M 目标新增 ARR 配 1 名客户经理，每 10-15 名 FTE 配 1 名运营/财务人员——来估算规模"
