    upsideCase: "70%+ conversion, top of the BP funnelTargets range"
    y3RevenueImpactK: 500.0
    cashImpactK: 380.0
  - variable: gross margin
    downsideCase: "60% gross margin (more human-reviewed compliance work and compute-heavy backtests)"
    baseCase: "72% gross margin, per BP businessModel.targetGrossMarginPct (A5)"
    upsideCase: "78% gross margin as backtesting compute and templates scale"
    y3RevenueImpactK: 0.0
    cashImpactK: 186.0
  - variable: hiring pace
    downsideCase: "Team front-loads Q4Y3 headcount into Q4Y2 (6 months early), raising burn without matching revenue"
    baseCase: "Headcount ramps per the headcount table (3 to 14 FTE over 3 years)"
    upsideCase: "Hiring stretches 4 months later than planned, extending runway at the cost of slower implementation and partner onboarding"
    y3RevenueImpactK: -50.0
    cashImpactK: 400.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Outbound[Founder-led outbound + Shopify ecosystem] --> Pilot[Paid pilot $6K-$12K]
      Pilot --> Backtest[Backtest + pre-launch simulation]
      Backtest --> Scorecard[Predicted-vs-actual scorecard]
      Scorecard --> Convert[Convert to annual subscription $12K/yr]
      Convert --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit at 72% margin]
      GrossProfit --> Cash[Cash runway]
      Partner[Partner channel: subscription platforms + agencies] --> Pilot
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by converting a small number of paid pilots into $12K/year annual subscriptions, then scaling from 20 customers in Y2 to roughly 120 customers in Y3 via the Shopify ecosystem and partner-sourced pipeline, consistent with the research SOM math."
  - checkName: Must go right
    finding: "Backtest accuracy and predicted-vs-actual scorecards must clear the business plan's own bar (correct conversion direction on 6 of 10 backtests, churn direction on 7 of 10) so pilots convert to annual subscriptions at or above the funnelTargets range rather than the 40% kill-criteria floor."
  - checkName: Model breaks if
    finding: "If the partner channel underperforms, the Y3 jump from 20 to 120 customers collapses toward the downside scenario (~60 customers and a cash low point near -$1.85M), and since the base case already turns cash-negative in Q2Y3, a Series A must close well before then."
  - checkName: Next-round proof
    finding: "The next financing hinges on the 12-24 month milestone of 15-25 annual customers with repeat quarterly usage and at least one active partner channel, which is the point in the model (end of Y2) where only about 6-9 months of cash buffer remains."
sanityChecks:
  ruleOf40: "Y3 growth ~505% (revenue $171K to $1,035K) plus EBITDA margin -135.7% = ~369%; directionally meaningless this early given the tiny Y1/Y2 revenue base, flagged below rather than treated as a real efficiency signal."
  burnMultiple: "Y3 burn multiple ~1.17x (net burn $1,404.8K / net new ARR $1,200K from 100 net new customers at $12K each); benchmark <1x excellent, 1-1.5x good for early-stage SaaS."
  revenuePerFte: "$73.9K Y3 revenue per FTE ($1,035K / 14 FTE) vs. benchmark $200-400K for mature SaaS; reflects a pre-scale, pilot-heavy motion rather than a red flag on its own."
  flags:
    - "Cash turns negative starting Q2Y3 (~month 29) under a single pre-seed raise with no interim financing modeled; a Series A must close before then or hiring/spend must slow, consistent with fundingAsk.runwayMonths of 18 plus a shrinking buffer."
    - "Rule-of-40 and burn-multiple readings are distorted by the tiny Y1-Y2 revenue base and are not meaningful benchmarks until ARR exceeds roughly $1-2M."
    - "Revenue per FTE stays well below the $200-400K mature-SaaS benchmark through Y3, reflecting the pilot-heavy, services-adjacent motion described in the business plan; this must improve via self-serve onboarding and partner leverage or unit economics will not scale."
    - "The Y3 customer ramp (20 to 120, a 6x increase in one year) is aggressive and rests entirely on an unproven partner channel; research.yaml and business-plan.yaml contain no public evidence yet that a partner channel can deliver that volume, so the downside scenario (~60 customers) should be treated as equally plausible."
    - "No churn benchmark specific to this product category exists in research.yaml; the 2.5%/month figure (A15) is an industry heuristic, not a validated number, and should be replaced with real cohort data as soon as the first annual renewals occur."
    - "Y1 pilot-to-annual conversion is modeled at the business plan's stated minimum (2 of 5 pilots); if actual conversion tracks the 40% kill-criteria floor rather than the higher funnelTargets range, Y2 and Y3 customer counts and revenue should be haircut toward the downside scenario."
