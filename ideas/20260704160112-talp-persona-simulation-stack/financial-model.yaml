    value: "2"
    unit: count
    source: "[BP milestones 0-12mo: 'Convert at least two pilots into annual subscriptions with quarterly usage']"
  - id: A8
    name: Y2 exit annual customers
    value: "20"
    unit: count
    source: "[BP milestones 12-24mo: 'Reach 15-25 annual customers with repeat quarterly simulation usage', midpoint used]"
  - id: A9
    name: Y3 exit annual customers
    value: "120"
    unit: count
    source: "[BP milestones 24-36mo: 'Reach roughly 120 subscribed brands or agency-managed client deployments, consistent with the researched SOM case']"
  - id: A10
    name: Founding team hiring timing
    value: "3 founders at Month 0; Shopify integrations engineer Month 4; solutions engineer/CS Month 6"
    unit: count/timing
    source: "[BP team[]: startTiming Month 0 / Month 4 / Month 6 for founding product-GTM, founding eng, applied ML/evals, Shopify integrations engineer, solutions engineer]"
  - id: A11
    name: Fully-loaded annualized salary bands
    value: "CEO/founder $150K; Eng $160K; Applied ML $170K; Integrations Eng $150K; Solutions Eng/CS $120K; Sales/AE $130K; G&A/Ops $110K"
    unit: USD/FTE/year
    source: "Heuristic: seed-stage fully-loaded compensation bands (base + payroll tax + benefits load) commonly cited in seed-stage compensation benchmarks (e.g. AngelList/Carta seed comp reports); no company-specific salary data exists in business-plan.yaml or research.yaml"
  - id: A12
    name: Y1 non-payroll opex
    value: "R&D tools $2.0K/mo; S&M $3.0K/mo; G&A $3.5K/mo"
    unit: USD thousands/month
    source: "Heuristic: typical pre-seed SaaS non-payroll opex (cloud/dev tooling, founder-led outbound travel, legal/accounting/insurance) for a 3-5 person team; not itemized in inputs"
  - id: A13
    name: Y2/Y3 non-payroll opex
    value: "$45K/quarter in Y2; $75K/quarter in Y3"
    unit: USD thousands/quarter
    source: "Heuristic: non-payroll opex scales with headcount and partner/marketing activity per BP gtm.channels (ecosystem marketplace, partner co-sell); not itemized in inputs"
  - id: A14
    name: COGS percent of revenue
    value: "28"
    unit: percent
    source: "Derived from A5 (100% - 72% target gross margin)"
  - id: A15
    name: Monthly logo churn
    value: "2.5"
    unit: percent/month
    source: "Heuristic: early-stage B2B SaaS logo-churn benchmark for sub-$50K ACV contracts (commonly cited 2-3%/month range); research.yaml contains no vendor-specific churn data for this product category"
  - id: A16
    name: EBITDA approximates net cash burn
    value: "true"
    unit: boolean
    source: "Heuristic: standard early-stage modeling simplification given no material capex or working-capital swings disclosed in inputs"
  - id: A17
    name: Funding ask amount
    value: "3.0"
    unit: USD millions
    source: "[BP fundingAsk.targetFundingRangeUsd: '$2-4M', midpoint used]"
  - id: A18
    name: Funding runway
    value: "18"
    unit: months
    source: "[BP fundingAsk.runwayMonths: 18]; modeled cash shows an additional buffer beyond month 18 into the Y2 12-24mo milestone window before a Series A is required"
  - id: A19
    name: Revenue recognition method
    value: "Pilot/onboarding fees recognized in the month of delivery; annual subscriptions recognized ratably (annual contract value / 12 per month)"
    unit: method
    source: "Heuristic: standard SaaS/services revenue recognition for hybrid one-time + subscription pricing described in [BP businessModel.revenueStreams]"
  - id: A20
    name: CAC calculation basis
    value: "Y3 blended sales & marketing spend (payroll fraction attributable to GTM/CS/Sales roles plus non-payroll S&M opex) divided by net new annual customers added in Y3 (100)"
    unit: method
    source: "Derived from headcount role split (A11) and A9; standard bottoms-up CAC calculation"
  - id: A21
    name: Sales/AE and G&A/Ops roles added beyond BP's five named roles
    value: "Sales/AE from Q4Y1; G&A/Ops from Q4Y2"
    unit: count/timing
    source: "Operator judgment: BP milestone of 15-25 annual customers by Y2 (A8) requires dedicated quota-carrying sales and finance/ops capacity not explicitly named in [BP team[]]; sized against a rough heuristic of ~1 AE per $1-1.5M targeted new ARR and 1 ops/finance hire per ~10-15 FTE"
