scenarios:
  downside:
    description: "Pilot-to-annual conversion tracks the BP kill-criteria floor (40%) instead of the funnelTargets midpoint, monthly churn rises to 4%, and heavier manual review compresses gross margin to 65%, roughly halving the Y3 customer base versus base case."
    y3RevenueK: 520.0
    y3EbitdaK: -1562.0
    cashLowPointK: -1850.0
    keyAssumptionChanges:
      - "Y3 exit annual customers ~60 instead of 120 (A9 halved)"
      - "Monthly churn 4% instead of 2.5% (A15)"
      - "Gross margin 65% instead of 72% (A5)"
  base:
    description: "Reflects the primary model: Y1 pilots convert at the BP's stated minimum (2 of 5), Y2 reaches 20 annual customers (midpoint of BP's 15-25 range), and Y3 scales to 120 customers via Shopify ecosystem plus partner channel, consistent with the research SOM math."
    y3RevenueK: 1035.0
    y3EbitdaK: -1404.8
    cashLowPointK: -641.11
    keyAssumptionChanges:
      - "As modeled in totals.y3 and y2y3Quarterly"
  upside:
    description: "Partner channel outperforms (per BP gtm.channels co-sell hypothesis), pilot-to-annual conversion holds near the top of the BP funnelTargets range (70%+), ARPU expands via overage/premium usage, and compute efficiencies push gross margin to 76%."
    y3RevenueK: 1550.0
    y3EbitdaK: -1022.0
    cashLowPointK: -150.0
    keyAssumptionChanges:
      - "Y3 exit annual customers ~160 instead of 120 (A9 raised)"
      - "Blended ARPU ~$14K/year instead of $12K (A2 raised via overage revenue)"
      - "Gross margin 76% instead of 72% (A5)"
