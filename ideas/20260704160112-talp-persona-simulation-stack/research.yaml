  adoptionFrictionMatrix:
  - friction: Trust in synthetic predictions before a brand has seen predicted-vs-actual accuracy
    severity: high
    affectedBuyer: VP Growth or Head of Retention
    mitigation: Start with backtests and lower-stakes checkout or cancel-flow changes, then publish brand-specific scorecards.
    sourceRefs:
