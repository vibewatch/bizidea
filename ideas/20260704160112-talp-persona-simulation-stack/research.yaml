competitors:
- name: Talp
  stage: seed
  wedge: Horizontal shopper-persona simulation for products, ads, pricing, and storefront tests
  pricing: Custom / demo-led
  strength: Closest direct story on simulating storefront and checkout behavior before spend.
  weaknessVsUs: Horizontal engine with no visible subscription-specific churn calibration or Shopify billing closed loop.
  sourceRefs:
  - 16
  - 17
  - 18
  - 19
- name: Aaru
  stage: scale-up
  wedge: Multi-agent population simulation for enterprise prediction and market research
  pricing: Custom quote
  strength: Enterprise credibility and Accenture distribution signal.
  weaknessVsUs: Broad prediction platform, not built around subscription ops, cancel flows, or 90-day churn.
  sourceRefs:
  - 22
  - 23
- name: Synthetic Users
  stage: seed
  wedge: Low-cost AI interviews and synthetic research participants
  pricing: $2-$60 per interview
  strength: Public price transparency and explicit science positioning lower buyer adoption friction.
  weaknessVsUs: Interview-centric and not tied to live storefront instrumentation or subscription cohort data.
  sourceRefs:
  - 20
  - 21
- name: UserTesting
  stage: incumbent
  wedge: Human-feedback platform for concepts, designs, and experiences
  pricing: Custom enterprise plans
  strength: Trusted brand and broad method coverage with real humans.
  weaknessVsUs: Slower, more expensive, and not predictive of downstream subscription churn on a brand’s own cohort.
  sourceRefs:
  - 25
- name: Intelligems
  stage: scale-up
  wedge: Live Shopify price, offer, and checkout experimentation
  pricing: $59-$749 per month plus custom options
  strength: Native Shopify workflow and direct price-testing credibility.
  weaknessVsUs: Requires real traffic and exposes brands to revenue or churn downside while they learn.
  sourceRefs:
  - 8
  - 9
  - 10
