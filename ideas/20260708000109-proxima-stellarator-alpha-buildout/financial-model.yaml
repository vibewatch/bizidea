slug: "fusion-magnet-traceability-os"
date: "2026-07-08"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-08] the model begins with the first full operating month after the dated business plan."
  - id: A2
    name: "Opening cash / pre-seed raise"
    value: "$1.5M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP strategicChoices.sequencingRationale + model cash curve] the base case uses a leaner pre-seed because paid pilots start in year 1 and scale hiring waits until proof; if conversions slip, the capital need moves back toward the BP range."
  - id: A3
    name: "Starting paying developer programs"
    value: "0"
    unit: count
    source: "[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first win lighthouse pilots."
  - id: A4
    name: "Customer definition"
    value: "customersEop counts paying developer programs; supplier-cohort and premium-module revenue is expansion inside those program accounts."
    unit: definition
    source: "[BP businessModel.unitOfValue + BP investorMemo.firstCustomer.initialContract] the economic buyer is the developer program, while supplier cohorts attach after the first workflow proves out."
  - id: A5
    name: "Paid pilot pricing"
    value: "$200K over about 4 months (~$50K/mo)"
    unit: USD/program
    source: "[BP investorMemo.firstCustomer.initialContract $150k-$250k pilot + BP experimentRoadmap 3-6 months] the model uses the midpoint pilot value over a four-month proof window."
  - id: A6
    name: "Core annual developer-program contract"
    value: "$750K ARR (~$62.5K/mo)"
    unit: USD/program/year
    source: "[BP investorMemo.firstCustomer.initialContract $600k-$900k annual developer-program contract] the base case lands at the midpoint of the stated annual contract range."
  - id: A7
    name: "Premium evidence / benchmark module"
    value: "$150K ARR (~$12.5K/mo)"
    unit: USD/program/year
    source: "[BP businessModel.revenueStreams premium acceptance-benchmark modules + BP milestones 12-24 and 24-36 months] mature accounts add a premium evidence layer once dashboards and templates are trusted in real reviews."
  - id: A8
    name: "Supplier cohort pricing"
    value: "$150K ARR per cohort (~$12.5K/mo)"
    unit: USD/cohort/year
    source: "[Research market.som $3.6M = 3 developer programs at $0.9M + 6 supplier cohorts at $0.15M] the SOM logic implies an early lighthouse supplier cohort value of about $150K annually."
  - id: A9
    name: "Mature account annualized revenue"
    value: "~$1.2M per mature developer account"
    unit: USD/program/year
    source: "[A6 + A7 + A8 + Research market.som] a mature program in the base case carries a $750K core contract, one $150K premium module, and two $150K supplier cohorts."
  - id: A10
    name: "Customer ramp"
    value: "2 paying developer programs by M12, 3 by Q3Y2, and 3 through Q4Y3"
    unit: customersEop
    source: "[BP milestones 0-12 months and 12-24 months + BP experimentRoadmap 12-18 months] the model reaches the planned 2-3 converted programs without assuming a fourth logo before seed proof."
  - id: A11
    name: "Revenue recognition convention"
    value: "Period revenue equals active program count multiplied by realized program value for that stage: pilot, core contract, premium module attach, and supplier-cohort attach."
    unit: formula
    source: "[BP gtm.pricing + BP businessModel.revenueStreams + Research market.som] this keeps revenue directly traceable to paying programs and their attached expansion modules."
  - id: A12
    name: "Gross margin ramp"
    value: "48%-55% in Y1, 58%-67% in Y2, and 71%-73% in Y3"
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 72 + BP operations high-touch onboarding + Research sensitivityCases integration drag] early implementations are services-heavy before templates and imports standardize."
  - id: A13
    name: "Hiring timeline"
    value: "M1 founder and founding engineer; M4 implementation / solutions; M8 first GTM lead; M13 second engineer; M18 ops; M20 third engineer; M34 second solutions hire."
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays lean until lighthouse proof exists, then adds product and delivery capacity before a seed round."
  - id: A14
    name: "Founder loaded compensation"
    value: "$160K"
    unit: USD/year
    source: "[BP team founder / fusion manufacturing lead + startup-finance heuristic] cash compensation stays lean but includes payroll taxes and benefits."
  - id: A15
    name: "Engineering loaded compensation"
    value: "$195K"
    unit: USD/year
    source: "[BP team founding engineer + startup-finance heuristic] the product requires senior integration-heavy engineering talent across PLM, QMS, and lab data."
  - id: A16
    name: "Implementation / solutions loaded compensation"
    value: "$165K"
    unit: USD/year
    source: "[BP team implementation / solutions engineer + BP operations] delivery talent must handle customer mapping and reusable template design, but the model avoids building a large services bench."
  - id: A17
    name: "GTM loaded compensation"
    value: "$185K"
    unit: USD/year
    source: "[BP team first GTM lead + BP gtm.channels + startup-finance heuristic] concentrated enterprise outreach needs travel and variable comp, but not a broad field-sales team."
  - id: A18
    name: "G&A / ops loaded compensation"
    value: "$125K"
    unit: USD/year
    source: "[BP operations + startup-finance heuristic] this covers finance, vendor management, and basic operating cadence."
  - id: A19
    name: "Payroll allocation to P&L lines"
    value: "Founder 45% S&M / 35% R&D / 20% G&A; engineering 100% R&D; solutions 60% S&M / 40% R&D; GTM 100% S&M; ops 100% G&A."
    unit: allocation
    source: "[BP team role rationales + BP operations] the founder and solutions work are split because selling and onboarding are still tightly coupled in the base case."
  - id: A20
    name: "Non-payroll opex ramp"
    value: "Monthly non-payroll spend rises from roughly S&M/R&D/G&A of $7K/$12K/$6K in early Y1 to about $25K/$24K/$13K by Q4Y3."
    unit: USD/month
    source: "[BP operations + startup-finance heuristic] the model covers cloud infrastructure, travel to Europe and U.S. accounts, legal, insurance, bookkeeping, and integration tooling without assuming a large paid-demand engine."
  - id: A21
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA"
    unit: formula
    source: "[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at this stage, but the risk is called out in sanity flags."
  - id: A22
    name: "Steady-state monthly churn"
    value: "1.5%"
    unit: percent per month
    source: "[startup-finance heuristic for early enterprise workflow SaaS + BP gtm.funnelTargets high switching cost] once release-gate workflows are embedded, churn should be low, but the model stays conservative versus multi-year industrial programs."
  - id: A23
    name: "Base sales cycle"
    value: "About 4 months from paid pilot start to annual conversion"
    unit: months
    source: "[BP experimentRoadmap 3-6 months + BP milestones 0-12 months] the product must prove ROI inside one procurement phase to convert on plan."
  - id: A24
    name: "CAC convention"
    value: "Total 36-month sales and marketing spend divided by 3 paying developer programs"
    unit: formula
    source: "[model calc using base-case S&M spend + BP gtm founder-led account-based motion] CAC is measured at the developer-program logo level because supplier cohorts are sold as expansions inside those logos."
  - id: A25
    name: "Next-round milestone for funding sizing"
    value: "By Q4Y2 the company should have 3 paying programs, 5 supplier cohorts, and one accepted live acceptance-pack review."
    unit: milestone
    source: "[BP milestones 12-24 months + BP experimentRoadmap 6-12 and 12-18 months] the pre-seed is sized to reach repeatable buyer, implementation, and review-workflow proof before a seed round."
  - id: A26
    name: "Quarterly salary-roll convention"
    value: "Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only quarter-end snapshots."
    unit: convention
    source: "[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent with the hiring ramp even though the public headcount table only shows year-end snapshots for Y2 and Y3."
