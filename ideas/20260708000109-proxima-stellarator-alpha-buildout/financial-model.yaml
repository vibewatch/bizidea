scenarios:
  downside:
    description: "One program converts late, supplier attach tops out below plan, and onboarding remains more bespoke than expected."
    y3RevenueK: 2700.0
    y3EbitdaK: -60.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
      - "The third developer program converts about two quarters later than the base case."
      - "Mature account value stalls near $1.0M because the second supplier cohort or premium module does not fully attach."
      - "Gross margin exits near 67% because evidence mapping and supplier workflows stay services-heavy."
  base:
    description: "Two lighthouse pilots convert on plan, the third program lands by Q3Y2, and mature accounts reach about $1.2M annualized with supplier cohorts and premium evidence workflows attached."
    y3RevenueK: 3600.0
    y3EbitdaK: 629.4
    cashLowPointK: 732.3
    keyAssumptionChanges:
      - "2 paying developer programs by M12 and 3 by Q3Y2."
      - "Each mature program reaches roughly $1.2M annualized through the core contract, one premium module, and two supplier cohorts."
      - "Gross margin reaches the BP target band at about 72% in Y3 as templates and imports become reusable."
  upside:
    description: "The third program converts one quarter earlier, benchmark modules attach across all mature accounts, and supplier expansion broadens faster inside lighthouse programs."
    y3RevenueK: 4200.0
    y3EbitdaK: 1030.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
      - "The third developer program converts roughly one quarter earlier than the base case."
      - "Mature account value rises above $1.3M as benchmark modules and extra assembly scope attach sooner."
      - "Gross margin reaches about 75% because onboarding patterns and supplier evidence workflows standardize faster."
sensitivity:
  - variable: ARPU
    downsideCase: "Mature program value settles closer to $1.05M because premium modules or the second supplier cohort attach weakly."
    baseCase: "Mature program value reaches about $1.20M with the planned module and cohort mix."
    upsideCase: "Mature program value reaches about $1.30M as benchmark templates and wider assembly scope attach."
    y3RevenueImpactK: -450.0
    cashImpactK: -320.0
  - variable: CAC
    downsideCase: "Founder-led travel and bespoke proofs push CAC toward roughly $650K per developer logo."
    baseCase: "CAC stays near $539K because the company sells only a few concentrated logos and expands inside them."
    upsideCase: "Reference-driven selling and supplier introductions pull CAC toward roughly $450K."
    y3RevenueImpactK: -90.0
    cashImpactK: -220.0
  - variable: sales cycle
    downsideCase: "Pilot-to-annual conversion stretches by about two quarters."
    baseCase: "Paid pilots convert in about four months and the third program lands by Q3Y2."
    upsideCase: "A real release-gate deadline compresses conversion toward one quarter."
    y3RevenueImpactK: -650.0
    cashImpactK: -360.0
  - variable: "gross margin"
    downsideCase: "Gross margin stalls near 67% because data mapping and supplier onboarding remain bespoke."
    baseCase: "Gross margin reaches about 72% in Y3 after templates and imports standardize."
    upsideCase: "Gross margin reaches about 75% if evidence workflows become repeatable faster than planned."
    y3RevenueImpactK: 0.0
    cashImpactK: -260.0
  - variable: "demonstrator timelines"
    downsideCase: "One or two funded magnet buildouts slip their procurement milestones by multiple quarters."
    baseCase: "The funded Europe-first programs stay on their current buildout cadence."
    upsideCase: "Named demonstrator schedules hold and a U.S. design-partner motion starts earlier."
    y3RevenueImpactK: -720.0
    cashImpactK: -310.0
  - variable: "hiring pace"
    downsideCase: "A second solutions hire and broader scale-up are pulled forward before repeatable proof exists."
    baseCase: "Only one late-Y3 solutions hire is added and the founder stays GTM-heavy through seed proof."
    upsideCase: "Scale hiring waits until after the seed without slowing lighthouse expansion."
    y3RevenueImpactK: 60.0
    cashImpactK: -190.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetPrograms[Target demonstrator programs] --> PaidPilots[Paid lighthouse pilots]
      PaidPilots --> AnnualContracts[Annual developer contracts]
      AnnualContracts --> SupplierCohorts[Supplier cohort attach]
      SupplierCohorts --> PremiumModules[Premium evidence modules]
      PremiumModules --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base revenue is driven by converting 3 developer programs and attaching supplier cohorts plus premium evidence modules until mature account value reaches about $1.2M and the researched $3.6M Y3 SOM."
  - checkName: "Must go right"
    finding: "The first two pilots must convert inside about four months and supplier cohorts must activate with them, or the sales-cycle and ARPU sensitivities erase most of Y3 EBITDA."
  - checkName: "Model breaks if"
    finding: "If demonstrator timelines slip or onboarding stays bespoke enough to cap gross margin near 67%, the downside case pushes cash toward low hundreds before seed proof."
  - checkName: "Next-round proof"
    finding: "A seed case is earned once 3 paying programs, 5-6 supplier cohorts, and one accepted live acceptance-pack review show the wedge can repeat beyond a single lighthouse."
sanityChecks:
  ruleOf40: "Y3 growth 41.9% + EBITDA margin 17.5% = 59.4%"
  burnMultiple: "Y2 burn multiple is about 0.1x using roughly $0.07M of EBITDA burn against about $1.35M of exit-ARR expansion from Y1 exit to Y2 exit; the metric is flattered by a few large contracts."
  revenuePerFte: "$450K Y3 on 8 ending FTE (benchmark $200-400K SaaS)"
  flags:
    - "The model reaches the researched Y3 SOM with only 3 paying developer programs, so one delayed program materially changes revenue and cash."
    - "The $1.5M ask sits below the BP's $2-4M headline range only because pilots are assumed to be paid by M6 and scale hiring stays delayed; if conversion slips, funding need moves back toward the original range."
    - "Gross margin reaches about 72% only if supplier evidence collection and data mapping standardize; prolonged bespoke integrations would push results toward the downside case."
    - "customersEop counts paying developer programs, while supplier-cohort and premium-module revenue is treated as expansion inside those accounts, so the headline customer count understates paid workflow units."
    - "Cash is modeled as EBITDA and does not capture enterprise collection timing, deferred revenue, or connector capex that could move real cash earlier or later."
