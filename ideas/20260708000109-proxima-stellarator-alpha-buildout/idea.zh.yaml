problem: 进入示范装置建造阶段的聚变项目，卡住它们的已经不只是等离子体理论，而是超导磁体、电缆、低温接口和测试证据能不能扛住首台套工业化。随着物理、机械和制造团队不断迭代，磁体规格一直在变；但供应商准入、不符合项跟踪和验收证据仍散落在 PLM 导出、表格、实验室文件和邮件里。哪怕一条电缆批次问题没记清，或一个几何改动到得太晚，都可能让绕制、总装和现场安装多返工几个月。项目团队最后只能临时拼一套脆弱的建造档案，向董事会、战略投资人和潜在电站合作方解释进度与性能风险。
targetUser:
  primary: 欧洲聚变开发商里负责首个 HTS 仿星器示范装置的磁体系统负责人，或制造工程总监
  secondary: 负责协调外部线圈、电缆、低温容器和集成供应商的供应商质量、项目控制和低温测试负责人
  buyer: COO、制造副总裁或工程高级副总裁
startupThesis:
  nonObviousInsight: 未来十年聚变最稀缺的资产，不是再多一套等离子体仿真，而是制造证明。一旦资金被明确拨给 Alpha、磁体产线、选址和运营，谁掌握超导组件的谱系和验收证据，谁就成了融资栈的一部分——因为它决定首台套硬件看起来能不能被资方接受。
  beachhead: 首批使用外部超导带材、线圈绕制、低温容器和失超测试系统供应商的欧洲聚变开发商，它们正在建设自己的首个 HTS 仿星器示范装置
  wedge: 一套磁体追溯与验收 OS，把每个关键超导组件的规格基线、供应商准入、不符合项、测试结果和放行关口串起来
  whyNowCatalyst: Proxima 这轮 €411 million 融资明确投向 Alpha、高温超导电缆和磁体生产，以及运营招聘；与此同时，Google 和 RWE 又把商业电力利益相关方带进项目，制造证明现在就成了急事。
  ventureScalePath: 先从欧洲示范装置的聚变磁体建造档案切入，再扩到托卡马克、超导电网设备、加速器、MRI 磁体等各类首台套高场硬件的全流程控制。
solution: 这家公司叠在 PLM、QMS、实验室数据和供应商门户之上，为每一批电缆、每一只线圈、每一个支撑结构和每一次低温测试拉出一条数字主线，并把它们挂到具体磁体组件上。它会跟踪物理、机械和制造团队之间的规格版本变化，发现供应商按错基线生产时直接报警，并在硬件出货前强制把不符合项按流程关掉。项目负责人看到的是就绪度仪表盘：每个长周期部件的供应商准入状态、测试覆盖、进度风险和缺失证据一目了然。等公用事业公司、战略投资人、保险方或董事会来问 Alpha 级硬件到底能不能上时，产品直接生成验收包和异常日志，而不是再去邮件和 SharePoint 里翻。时间一长，它会沉淀成一套运营数据，告诉你哪些供应商、设计和工艺窗口，真的能产出能过资方审核的聚变硬件。
goToMarketSeed:
  firstCustomer: 首批客户会是欧洲某家聚变公司的磁体系统负责人：该公司已拿到董事会批准的示范装置选址、至少有 4 家外部长周期磁体供应商，并会在未来 12 个月内下出第一批 HTS 电缆采购单。
  buyingTrigger: 项目为首个示范装置批准 HTS 电缆、绕制或低温采购后，管理层意识到：只要供应商或测试数据晚出一次错，建造就可能被拖慢几个季度。
  currentAlternative: 通用 PLM 和 QMS 软件、基于表格的供应商跟踪器、SharePoint 文档室，以及航天或核工业 QA 顾问
  switchingReason: 这款产品补上了高速迭代的磁体设计变更，和董事会、投资人、电站合作方在放款与安装窗口前必须看到的验收证据之间，那层跨公司但一直缺失的系统。
  pricingHypothesis: 按活跃示范项目收年度平台费，另加供应商协作席位，以及磁体 BOM 导入、工作流模板和数据集成的付费实施。
