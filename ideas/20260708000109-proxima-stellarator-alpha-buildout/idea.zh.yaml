topRisks:
- name: 赛道时点风险
  description: 聚变示范项目的时间线可能后移，拖慢部署，也压缩短期软件预算。
  mitigation: 先盯资本最充足的欧洲项目及其磁体供应商，按当前长周期采购中能避免的返工来定价，再逐步扩到相邻超导硬件市场。
- name: 工作流替换阻力
  description: 工程团队可能继续守着 PLM、QMS 和电子表格，因为再加一个系统，体感上往往比继续忍受现状还慢。
  mitigation: 先以叠加层切入，吃进现有工具；只拿下一个工作流：HTS 磁体组件的供应商准入 + 验收包生成。
- name: 客户集中度
  description: 早期收入可能被少数聚变开发商吃掉；只要一个大项目取消或内部自建，定价权就会被削弱。
  mitigation: 同时卖给开发商和关键供应商，并把数据结构设计成托卡马克、加速器、MRI 和电网超导项目都能快速复用。
