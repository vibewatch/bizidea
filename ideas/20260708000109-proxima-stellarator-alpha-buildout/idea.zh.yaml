jobsToBeDone:
- job: 当聚变项目启动长周期磁体采购时，帮磁体系统负责人筛选供应商、锁定正确规格基线、尽早抓出偏差，让示范装置不掉进度。
  currentAlternative: PLM 导出复核、电子表格、供应商电话，以及手工拼装的 QA 活页夹
  successMetric: 供应商准入周期，以及按最新版获批基线制造的关键零件占比
- job: 当董事会、投资人、保险方或电站合作方的评审临近时，帮项目控制团队为每个关键组件拿出可信的验收包，别让缺失证据拖慢放款和安装窗口。
  currentAlternative: SharePoint 文件夹、PDF 活页夹，以及工程和测试团队之间手工汇总证据
  successMetric: 拼出一份验收包所需天数，以及放行评审中晚发现不符合项的次数
