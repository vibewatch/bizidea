differentiator: 通用 PLM 和 MES 工具能管图纸和车间步骤，但它们管不住首台套超导组件真正关键的那一层：供应商准入、聚变专用测试证据，以及决定资本是否放行的关口。核工业 QA 系统偏文档堆砌，工程协作工具又太松，压不住一个 €1 billion 级项目可能被拖期的硬件风险。这家公司胜在把每个关键磁体都变成一份能过资方审核的数字建造档案，并持续学到：哪些供应商、偏差类型和工艺窗口，真的能预测示范装置按时交付。
