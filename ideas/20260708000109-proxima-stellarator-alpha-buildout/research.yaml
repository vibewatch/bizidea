competitors:
- name: Siemens Teamcenter
  stage: incumbent
  wedge: Enterprise PLM with supplier management and quality/compliance workflows.
  pricing: Plans and pricing / contact sales; enterprise quote.
  strength: Deep digital-thread coverage across supplier collaboration, product history, deviations, and quality processes.
  weaknessVsUs: Heavy horizontal platform that is not packaged around fusion magnet genealogy, acceptance packs, or cross-company release gates.
  sourceRefs:
  - 106
  - 107
- name: Dassault ENOVIA
  stage: incumbent
  wedge: Cloud-native PLM collaboration on the 3DEXPERIENCE platform.
  pricing: Contact an ENOVIA expert / custom enterprise quote.
  strength: Strong single-source-of-truth collaboration for complex product development.
  weaknessVsUs: Broad PLM platform rather than a fast-start system for supplier qualification and FOAK magnet evidence.
  sourceRefs:
  - 109
- name: Arena by PTC
  stage: incumbent
  wedge: Cloud PLM/QMS with supplier collaboration for product companies.
  pricing: Contact us / custom quote.
  strength: Faster cloud deployment and supplier collaboration than heavyweight PLM stacks.
  weaknessVsUs: Less purpose-built for cryogenic test evidence, nonconformance governance, and bankability workflows across fusion consortia.
  sourceRefs:
  - 111
- name: MasterControl
  stage: incumbent
  wedge: Regulated quality management with document, change, and event control.
  pricing: Custom packaging from startup to enterprise.
  strength: Strong compliance posture and traceable quality/change workflows.
  weaknessVsUs: Quality-first system does not own the engineering-to-supplier digital thread for each superconducting assembly.
  sourceRefs:
  - 112
  - 115
regulatoryTechnicalConstraints:
- point: U.S. fusion oversight now depends on NRC authority over byproduct material produced by fusion machines, so evidence systems must support traceable material and safety compliance across jurisdictions.
  sourceRefs:
  - 119
- point: ITER-style procurements require accepted quality plans, approved special processes, and verifiable records before manufacturing starts.
  sourceRefs:
  - 129
- point: Magnet systems remain a major cost and reliability driver; the National Academies notes they can account for roughly one-third of core machine cost and require high reliability and maintainability.
  sourceRefs:
  - 93
validationSignals:
- point: Proxima raised €411 million specifically to build Alpha, expand HTS cable and magnet production, and hire across engineering, manufacturing, and operations.
  sourceRefs:
  - 1
- point: Alpha Alliance is coordinating manufacturing, system integration, and supply-chain capacity across more than 30 companies for one named demonstrator.
  sourceRefs:
  - 2
- point: CFS publicly qualifies suppliers on financial health, quality systems, technical capability, and compliance, which validates the workflow problem.
  sourceRefs:
  - 15
- point: Tokamak launched TE Magnetics and raised $125 million to commercialize both fusion and HTS magnet technology.
  sourceRefs:
  - 38
  - 39
- point: Type One has both a formal plant design review and a stellarator-specific HTS magnet test campaign underway, showing the problem is no longer theoretical.
  sourceRefs:
  - 54
  - 57
openQuestions:
- How much current pain comes from design-baseline drift versus missing test evidence versus slow supplier onboarding in one live magnet program?
- 'Which executive budget owner signs first: magnet systems, supplier quality, manufacturing systems, or program controls?'
- How many external suppliers and long-lead assemblies does a lighthouse fusion program actually manage in a single build phase?
- Will critical suppliers accept collaborative evidence workflows, or will they insist on email and file-based handoffs?
