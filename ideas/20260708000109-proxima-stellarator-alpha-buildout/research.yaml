  searchedQueries:
  - Identify authoritative primary and independent sources that describe Proxima Fusion's Alpha demonstrator, HTS cable and magnet production plans, timeline, site, and strategic investors.
  - Identify authoritative recent sources on the commercial fusion industry that provide company counts, funding totals, demonstration timelines, or manufacturing scale-up context.
  - Identify authoritative sources on high-temperature superconductor magnet manufacturing and supply-chain constraints relevant to fusion companies.
  - Identify authoritative sources on quality assurance, supplier qualification, configuration management, traceability, or digital-thread requirements in complex nuclear, fusion, accelerator, or cryogenic hardware programs.
  - Identify public evidence of customer pain and buying triggers for fusion manufacturing traceability, such as job postings, supplier requirements, procurement pages, or operational updates from Proxima Fusion, Commonwealth Fusion Systems, Tokamak Energy, Type One Energy, or similar companies.
  - Identify primary product and documentation pages for incumbent competitors in PLM, QMS, and manufacturing traceability that could substitute for a fusion magnet traceability OS.
  - Find authoritative U.S. government and NRC pages on commercial fusion energy regulation, fusion development programs, or quality expectations for fusion pilot plants.
  - Find authoritative UK government or UKAEA pages on fusion regulation, LIBRTI, Fusion Futures, or supply-chain and industrialization support for commercial fusion.
  - Find authoritative IAEA, ITER, DOE, or CERN pages on quality assurance, traceability, supplier qualification, or management systems for complex nuclear or fusion hardware projects.
  - Find primary Siemens Teamcenter product pages for PLM, supplier collaboration, or quality management that are publicly accessible.
  - Find primary Aras and Arena product pages that describe digital thread, PLM, QMS, or supplier collaboration and are publicly accessible.
