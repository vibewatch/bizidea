  adoptionFrictionMatrix:
  - friction: Integrating into existing PLM, QMS, and simulation stacks
    severity: high
    affectedBuyer: VP Manufacturing or engineering-systems owner
    mitigation: Land as an overlay with prebuilt connectors and import-based workflows instead of replacing Teamcenter, Arena, lab systems, or digital-twin tools.
    sourceRefs:
    - 24
    - 42
    - 106
    - 111
  - friction: Getting specialized suppliers to participate in structured evidence workflows
    severity: high
    affectedBuyer: Supplier-quality lead
    mitigation: Offer lightweight vendor workspaces, evidence request templates, and API or file-drop options instead of forcing full PLM seats.
    sourceRefs:
    - 13
    - 15
    - 86
    - 106
  - friction: Resolving budget-owner ambiguity across engineering, quality, and program controls
    severity: medium
    affectedBuyer: COO or SVP Engineering
    mitigation: 'Sell one measurable workflow first: supplier qualification plus acceptance-pack cycle-time reduction.'
    sourceRefs:
    - 13
    - 15
    - 112
  - friction: Winning references in a small initial account universe
    severity: high
    affectedBuyer: Founder and first-customer sponsor
    mitigation: Target one Europe-first lighthouse program plus two to three critical suppliers and then package adjacent high-field use cases quickly.
    sourceRefs:
    - 1
    - 38
    - 54
    - 123
