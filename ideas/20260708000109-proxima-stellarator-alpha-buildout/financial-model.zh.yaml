scenarios:
  downside:
    description: 一个项目转化延后，供应商挂接低于计划，而且上线过程比预期更定制。
    y3RevenueK: 2700.0
    y3EbitdaK: -60.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
    - 第 3 个开发商项目大约比基准情景晚两个季度转化。
    - 成熟账户价值会卡在约 $1.0M，因为第 2 个供应商协作组或高级模块没有完全挂上去。
    - 毛利率期末只能到约 67%，因为证据映射和供应商工作流仍然偏服务化。
  base:
    description: 两个灯塔试点按计划转化，第 3 个项目在 Q3Y2 落地；成熟账户在挂上供应商协作组和高级证据工作流后，年化价值达到约 $1.2M。
    y3RevenueK: 3600.0
    y3EbitdaK: 629.4
    cashLowPointK: 732.3
    keyAssumptionChanges:
    - M12 前做到 2 个付费开发项目，Q3Y2 前做到 3 个。
    - 每个成熟项目通过核心合同、1 个高级模块和 2 个供应商协作组，做到约 $1.2M 年化价值。
    - 随着模板和导入可复用，Y3 毛利率升到 BP 目标区间，约 72%。
  upside:
    description: 第 3 个项目提前一个季度转化，基准模块在所有成熟账户上都挂上，供应商扩张也在灯塔项目内部更快铺开。
    y3RevenueK: 4200.0
    y3EbitdaK: 1030.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
    - 第 3 个开发商项目大约比基准情景早一个季度转化。
    - 随着基准模块和额外组件范围更早挂上，成熟账户价值升到 $1.3M 以上。
    - 因为上线模式和供应商证据工作流更快标准化，毛利率可到约 75%。
sensitivity:
- variable: ARPU
  downsideCase: 成熟项目价值更可能落在 $1.05M 左右，因为高级模块或第 2 个供应商协作组挂接偏弱。
  baseCase: 按计划的模块和协作组组合下，成熟项目价值约为 $1.20M。
  upsideCase: 随着 基准模板和更广的组件范围挂上，成熟项目价值可到约 $1.30M。
  y3RevenueImpactK: -450.0
  cashImpactK: -320.0
- variable: CAC
  downsideCase: 创始人主导的差旅和定制化验证，会把 CAC 推到每个开发商 客户 约 $650K。
  baseCase: 由于公司只卖少数高度集中的 客户，并在内部扩张，CAC 维持在约 $539K。
  upsideCase: 口碑驱动销售和供应商引荐，会把 CAC 拉向约 $450K。
  y3RevenueImpactK: -90.0
  cashImpactK: -220.0
- variable: 销售周期
  downsideCase: 从试点到年费合同的转化会拉长约两个季度。
  baseCase: 付费试点大约 4 个月转化，第 3 个项目在 Q3Y2 落地。
  upsideCase: 一旦出现真实放行 deadline，转化周期会被压向一个季度。
  y3RevenueImpactK: -650.0
  cashImpactK: -360.0
- variable: 毛利率
  downsideCase: 毛利率会卡在约 67%，因为数据映射和供应商上线仍然偏定制。
  baseCase: 模板和导入标准化后，Y3 毛利率约为 72%。
  upsideCase: 如果证据工作流比计划更快变成可复用流程，毛利率可到约 75%。
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
- variable: 示范项目时间线
  downsideCase: 一个或两个已获资的磁体建造项目，采购里程碑会被拖后多个季度。
  baseCase: 已获资的欧洲优先项目会按当前建造节奏推进。
  upsideCase: 具名示范项目的时间表守住，而且美国共创客户动作更早启动。
  y3RevenueImpactK: -720.0
  cashImpactK: -310.0
- variable: 招聘节奏
  downsideCase: 在可复用证明还没出来前，就提前补第二名解决方案招聘并扩大团队。
  baseCase: 只在 Y3 末期补 1 名解决方案招聘，创始人在 seed 证明前仍以 GTM 为主。
  upsideCase: 规模化招聘等到 seed 之后再开，也不会拖慢灯塔扩张。
  y3RevenueImpactK: 60.0
  cashImpactK: -190.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      TargetPrograms[Target demonstrator programs] --> PaidPilots[Paid lighthouse pilots]
      PaidPilots --> AnnualContracts[Annual developer contracts]
      AnnualContracts --> SupplierCohorts[Supplier cohort attach]
      SupplierCohorts --> PremiumModules[Premium evidence modules]
      PremiumModules --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准收入由 3 个开发商项目转化而来，并持续挂上供应商协作组和高级证据模块，直到成熟账户价值达到约 $1.2M，以及研究给出的 Y3 SOM $3.6M。
- checkName: 必须跑对的事
  finding: 前 2 个试点必须在约 4 个月内转化，同时供应商协作组也要一起激活；否则销售周期和 ARPU 敏感性会吃掉大部分 Y3 EBITDA。
- checkName: 模型失效条件
  finding: 如果示范项目时间线后移，或上线过程长期定制化，导致毛利率被卡在约 67%，下行情景就会在 seed 证明前把现金压到只剩几十万级。
- checkName: 下一轮融资证明
  finding: 只有做到 3 个付费项目、5-6 个供应商协作组，以及 1 次被接受的现场验收包评审，才能说明这个切口能复制，而不只是单一灯塔案例。
sanityChecks:
  ruleOf40: Y3 增长 41.9% + EBITDA 利润率 17.5% = 59.4%
  burnMultiple: Y2 的 burn multiple 约为 0.1x：用约 $0.07M 的 EBITDA burn，对应 Y1 期末到 Y2 期末约 $1.35M 的 exit-ARR 扩张；这个指标被少数几笔大合同美化了。
  revenuePerFte: $450K Y3 / 8 名期末 FTE（SaaS 基准 $200-400K）
  flags:
  - 模型只靠 3 个付费开发项目就做到研究给出的 Y3 SOM，所以只要其中 1 个项目延后，收入和现金都会明显改写。
  - 这次 $1.5M 融资低于 BP 标题上的 $2-4M，只是因为模型假设 M6 就能拿到付费试点，且规模化招聘继续延后；如果转化滑坡，资金需求就会回到原来的区间。
  - 毛利率能到约 72%，前提是供应商证据采集和数据映射都能标准化；如果定制化集成拖得太久，结果就会掉到下行情景。
  - customersEop 统计的是付费开发项目数，而供应商协作组和高级模块收入都算作这些账户内的扩张，所以表面客户数会低估真实付费工作流单元。
  - 现金按 EBITDA 建模，没有显式捕捉企业回款节奏、递延收入或连接器 capex，这些因素都可能让真实现金更早或更晚发生偏移。
