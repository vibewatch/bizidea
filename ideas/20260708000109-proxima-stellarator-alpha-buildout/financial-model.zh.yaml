slug: fusion-magnet-traceability-os
date: '2026-07-08'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-08] 模型从这份带日期业务计划后的第一个完整运营月开始。'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: $1.5M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP strategicChoices.sequencingRationale + model cash curve] 基准情景采用更精简的 pre-seed，因为付费试点会在第 1 年启动，规模化招聘也会等验证跑通后再上；如果转化延后，资金需求就会回到 BP 的区间。'
- id: A3
  name: 期初付费开发项目数
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司起步时还没有收入，必须先拿下灯塔试点。'
- id: A4
  name: 客户定义
  value: customersEop 统计的是付费开发项目数；供应商协作组和高级模块收入算作这些项目账户内的扩张收入。
  unit: definition
  source: '[BP businessModel.unitOfValue + BP investorMemo.firstCustomer.initialContract] 真正的经济买家是开发商项目；供应商协作组要等第一条工作流跑通后才会挂上去。'
- id: A5
  name: 付费试点定价
  value: 约 4 个月共 $200K（约 $50K/mo）
  unit: USD/program
  source: '[BP investorMemo.firstCustomer.initialContract $150k-$250k pilot + BP experimentRoadmap 3-6 months] 模型取试点金额区间的中位数，按 4 个月验证窗口展开。'
- id: A6
  name: 核心年度开发商项目合同
  value: $750K ARR（约 $62.5K/mo）
  unit: USD/program/year
  source: '[BP investorMemo.firstCustomer.initialContract $600k-$900k annual developer-program contract] 基准情景取年度合同区间的中位数。'
- id: A7
  name: 高级证据 / 基准模块
  value: $150K ARR（约 $12.5K/mo）
  unit: USD/program/year
  source: '[BP businessModel.revenueStreams premium acceptance-benchmark modules + BP milestones 12-24 and 24-36 months] 一旦仪表盘和模板在真实评审里被信任，成熟账户就会加上高级证据层。'
- id: A8
  name: 供应商协作组定价
  value: 每个协作组 $150K ARR（约 $12.5K/mo）
  unit: USD/cohort/year
  source: '[Research market.som $3.6M = 3 developer programs at $0.9M + 6 supplier cohorts at $0.15M] SOM 的逻辑倒推出：早期灯塔供应商协作组的年度价值约为 $150K。'
- id: A9
  name: 成熟账户年化收入
  value: 每个成熟开发商账户约 $1.2M
  unit: USD/program/year
  source: '[A6 + A7 + A8 + Research market.som] 基准情景里，一个成熟项目包含 $750K 的核心合同、1 个 $150K 的高级模块，以及 2 个 $150K 的供应商协作组。'
- id: A10
  name: 客户爬坡
  value: M12 前做到 2 个付费开发项目，Q3Y2 前做到 3 个，并在 Q4Y3 前维持 3 个
  unit: customersEop
  source: '[BP milestones 0-12 months and 12-24 months + BP experimentRoadmap 12-18 months] 模型做到计划里的 2-3 个转化项目，但不假设在 seed 证明前再多出第 4 个 客户。'
- id: A11
  name: 收入确认口径
  value: 当期收入 = 活跃项目数 × 该阶段已实现的项目价值：试点、核心合同、高级模块挂接、供应商协作组挂接。
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams + Research market.som] 这样收入可以直接回溯到付费项目，以及挂在这些项目上的扩张模块。'
- id: A12
  name: 毛利率爬坡
  value: Y1 为 48%-55%，Y2 为 58%-67%，Y3 为 71%-73%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 72 + BP operations high-touch onboarding + Research sensitivityCases integration drag] 早期实施偏服务化，得等模板和导入标准化后，毛利率才会往上走。'
- id: A13
  name: 招聘时间表
  value: M1 创始人和创始工程师；M4 实施 / 解决方案；M8 首位 GTM 负责人；M13 第二位工程师；M18 运营；M20 第三位工程师；M34 第二位解决方案招聘。
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 在灯塔证明出来前，招聘保持精简；之后再补产品和交付能力，为下一轮 seed 做准备。'
- id: A14
  name: 创始人综合薪酬
  value: $160K
  unit: USD/year
  source: '[BP team founder / fusion manufacturing lead + startup-finance heuristic] 现金薪酬保持克制，但包含工资税和福利。'
- id: A15
  name: 工程团队综合薪酬
  value: $195K
  unit: USD/year
  source: '[BP team founding engineer + startup-finance heuristic] 产品需要资深、集成密集型的工程能力，要跨 PLM、QMS 和实验室数据工作。'
- id: A16
  name: 实施 / 解决方案综合薪酬
  value: $165K
  unit: USD/year
  source: '[BP team implementation / solutions engineer + BP operations] 交付人才既要做客户映射，也要把经验抽成可复用模板；但模型里不会先养一大支服务团队。'
- id: A17
  name: GTM 综合薪酬
  value: $185K
  unit: USD/year
  source: '[BP team first GTM lead + BP gtm.channels + startup-finance heuristic] 高集中度的企业销售需要差旅和浮动激励，但还不需要一整支外勤销售团队。'
- id: A18
  name: G&A / 运营综合薪酬
  value: $125K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] 这部分覆盖财务、供应商管理和基础运营节奏。'
- id: A19
  name: 工资分摊到 P&L 科目
  value: 创始人 45% 计入 S&M / 35% 计入 R&D / 20% 计入 G&A；工程 100% 计入 R&D；解决方案 60% 计入 S&M / 40% 计入 R&D；GTM 100% 计入 S&M；运营 100% 计入 G&A。
  unit: allocation
  source: '[BP team role rationales + BP operations] 创始人和解决方案岗位要拆分，是因为基准情景里销售和上线仍然紧紧绑在一起。'
- id: A20
  name: 非工资 Opex 爬坡
  value: 月度非工资支出从 Y1 早期 S&M/R&D/G&A 约 $7K/$12K/$6K，爬升到 Q4Y3 的约 $25K/$24K/$13K。
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] 模型覆盖云基础设施、欧洲和美国账户差旅、法务、保险、代账，以及集成工具，但不假设一台很大的付费获客机器。'
- id: A21
  name: 现金转换口径
  value: 现金变动等于 EBITDA
  unit: formula
  source: '[startup-finance heuristic] 在这个阶段，capex、税、融资费用和营运资金时点被视为不重大，但相关风险会在 sanity flags 里单独提示。'
- id: A22
  name: 稳态月流失率
  value: 1.5%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP gtm.funnelTargets high switching cost] 一旦放行工作流嵌进去，流失率理应很低；但模型仍按比多年期工业项目更保守的口径来算。'
- id: A23
  name: 基础销售周期
  value: 从付费试点启动到转成年费合同，约 4 个月
  unit: months
  source: '[BP experimentRoadmap 3-6 months + BP milestones 0-12 months] 产品必须在一个采购阶段内把 ROI 跑出来，才可能按计划转化。'
- id: A24
  name: CAC 口径
  value: 36 个月总销售与市场费用 ÷ 3 个付费开发项目
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm founder-led account-based motion] CAC 以开发商项目 客户 为单位衡量，因为供应商协作组是作为这些 客户 内部的扩张卖出的。'
- id: A25
  name: 下一轮融资的里程碑口径
  value: 到 Q4Y2，公司应做到 3 个付费项目、5 个供应商协作组，以及 1 次被接受的现场验收包评审。
  unit: milestone
  source: '[BP milestones 12-24 months + BP experimentRoadmap 6-12 and 12-18 months] pre-seed 的融资规模，就是为了在 seed 前把可复用的买家、实施和评审工作流证明跑出来。'
- id: A26
  name: 季度薪酬滚动口径
  value: Y2-Y3 的薪酬行按各季度内的实际月度招聘计，而不是只看季末快照。
  unit: convention
  source: '[Headcount column convention + BP team startTiming] 这样薪酬费用才能和招聘爬坡保持一致，即便公开 headcount 表在 Y2 和 Y3 只展示年末快照。'
