topRisks:
  - name: "Category timing risk"
    description: "Fusion demonstrator schedules can slip, delaying deployments and shrinking near-term software budgets."
    mitigation: "Start with the best-capitalized European programs and their magnet suppliers, price against avoided rework on active long-lead procurements, and expand into adjacent superconducting hardware markets."
  - name: "Workflow replacement resistance"
    description: "Engineering teams may stick with PLM, QMS, and spreadsheets because adding another system feels slower than living with the current mess."
    mitigation: "Land as an overlay that ingests existing tools and wins one workflow first: supplier qualification plus acceptance-pack generation for HTS magnet assemblies."
  - name: "Customer concentration"
    description: "A small number of fusion developers could dominate early revenue and weaken pricing power if one major program cancels or builds internally."
    mitigation: "Sell to both developers and critical suppliers, and design the schema so tokamak, accelerator, MRI, and grid-superconductor programs can reuse it quickly."
