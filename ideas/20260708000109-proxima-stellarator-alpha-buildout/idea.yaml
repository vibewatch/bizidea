problem: >-
  Fusion programs entering demonstrator buildout are no longer blocked by plasma theory alone; they are blocked by whether superconducting magnets, cables, cryogenic interfaces, and test evidence survive first-of-a-kind industrialization. Magnet specs evolve as physics, mechanical, and manufacturing teams learn, but supplier qualification, nonconformance tracking, and acceptance evidence still live across PLM exports, spreadsheets, lab files, and email. A single undocumented cable-lot issue or late geometry change can force months of rework across winding, assembly, and site installation. Project teams then scramble to explain schedule and performance risk to boards, strategic investors, and prospective plant partners with brittle manually assembled build books.
targetUser:
  primary: >-
    Head of magnet systems or director of manufacturing engineering at a European fusion developer building its first HTS stellarator demonstrator
  secondary: >-
    Supplier-quality, program-controls, and cryogenic test leads coordinating external coil, cable, cryostat, and integration vendors
  buyer: "COO, VP Manufacturing, or SVP Engineering"
startupThesis:
  nonObviousInsight: >-
    The scarce asset in fusion’s next decade is not another plasma simulation; it is manufacturing proof. Once capital is earmarked for Alpha, magnet lines, sites, and operations, the company that owns superconducting assembly genealogy and acceptance evidence becomes part of the financing stack because it determines whether first-of-a-kind hardware looks bankable.
  beachhead: >-
    European fusion developers building their first HTS stellarator demonstrator with external suppliers across superconducting tape, coil winding, cryostats, and quench-test systems
  wedge: >-
    A magnet traceability and acceptance OS that links spec baselines, supplier qualification, nonconformances, test results, and release gates for each critical superconducting assembly
  whyNowCatalyst: >-
    Proxima’s €411 million round specifically earmarks Alpha, high-temperature-superconductor cable and magnet production, and operations hiring, while Google and RWE bring commercial power stakeholders into the build, making manufacturing proof urgent now.
  ventureScalePath: >-
    Start with fusion magnet build books for European demonstrators, then expand into full first-of-a-kind hardware control across tokamaks, superconducting grid equipment, accelerators, MRI magnets, and other regulated high-field systems.
solution: >-
  The startup sits on top of PLM, QMS, lab data, and supplier portals to create a digital thread for every cable lot, coil, support structure, and cryogenic test tied to a magnet assembly. It tracks spec revisions across physics, mechanical, and manufacturing teams, flags when a supplier is building against the wrong baseline, and forces structured disposition of nonconformances before hardware ships. Program leaders get readiness dashboards showing supplier qualification status, test coverage, schedule risk, and missing evidence for each long-lead component. When utilities, strategic investors, insurers, or boards ask whether Alpha-class hardware is truly ready, the product auto-generates acceptance packs and exception logs instead of a scramble through email and SharePoint. Over time it becomes the operating dataset for which suppliers, designs, and process windows actually produce bankable fusion hardware.
goToMarketSeed:
  firstCustomer: >-
