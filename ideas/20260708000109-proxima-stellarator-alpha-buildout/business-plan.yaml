slug: "fusion-magnet-traceability-os"
date: "2026-07-08"
executiveSummary: >-
  Fusion programs entering demonstrator buildout are now judged on whether HTS
  magnets and supporting evidence clear dated release gates, not just on plasma
  science. We start with European magnet-intensive demonstrator programs because
  Proxima, Tokamak, Renaissance, and UK-backed commercialization activity create
  a concentrated cluster of buyers, suppliers, and public-program infrastructure.
  The product is an overlay on PLM, QMS, lab data, and supplier portals that
  tracks baseline revisions, lot genealogy, nonconformances, and acceptance
  evidence for each critical superconducting assembly. This wedge is narrower
  than a general manufacturing OS, but it is exactly where existing Teamcenter,
  ENOVIA, Arena, and MasterControl deployments stop short of a board-ready
  build book. Research estimates a $64.8M TAM, $18.0M SAM, and $3.6M year-3
  SOM, which makes the fusion beachhead commercially attractive only if it
  expands into adjacent high-field hardware after lighthouse wins. The first
  proof point is not broad ARR; it is whether one funded program and its first
  supplier cohort can reduce acceptance-pack cycle time and catch release-blocking
  evidence gaps before hardware ships. The biggest disconfirming risk is that
  buyers treat this as services or configuration work inside existing PLM/QMS
  stacks rather than as a new system of record with budget authority. Research
  still leaves one critical gap: the first signing budget owner and acceptable
  initial ACV need direct validation with target accounts before the company
  commits to a heavier integration roadmap or a seed-sized team.
problem:
  - "Heads of magnet systems and supplier-quality leads manage HTS tape, coil, cryogenic, and test evidence across PLM exports, spreadsheets, SharePoint, and email, so no one system proves a critical assembly is being built against the current approved baseline."
  - "When a design review, partner diligence event, or board update arrives, teams manually compile acceptance packs and often discover late nonconformances or missing genealogy only after schedule risk is already material."
solution:
  - "Overlay existing PLM, QMS, lab, and supplier systems to assign every cable lot, coil, deviation, and cryogenic test to the live spec baseline and block release until required evidence is closed."
  - "Provide supplier workspaces, readiness dashboards, and auto-generated acceptance packs so program leaders can qualify vendors, close exceptions, and explain build readiness to investors, utilities, insurers, and plant partners without replacing core engineering tools."
whyWeWin:
  - "We target the cross-company magnet acceptance layer that horizontal PLM/QMS tools leave fragmented: supplier qualification, lot genealogy, nonconformance closure, and release-gate evidence for first-of-a-kind HTS assemblies."
  - "The defensible asset is a cross-program dataset on supplier performance, deviation patterns, and lot-to-test outcomes across repeated HTS build programs and supplier nodes, which in-house stacks and generic platforms do not aggregate."
strategicChoices:
  beachhead: >-
    European fusion developers entering first long-lead HTS magnet procurement
    for a demonstrator, starting with one magnet work package and its 2-4
    highest-risk external suppliers.
  wedgeRationale: >-
    This slice has dated capital milestones, a small known buyer universe, and
    measurable failure modes such as wrong-baseline builds, open deviations, and
    missing acceptance evidence, so one pilot can prove value inside one
    procurement phase. A broader plant-wide MES or PLM replacement pitch would
    require much deeper integration before any falsifiable proof appears.
  sequencingRationale: >-
    Start as an overlay for supplier qualification and acceptance packs before
    adding full program controls or regulator modules because research flags
    integration drag and supplier participation as the main adoption risks.
    Sales should stay founder-led into one lighthouse developer and its first
    supplier cohort; only after proving ROI should the company add dedicated
    implementation and GTM hires, then expand into the U.S. and adjacent
    high-field hardware.
  notYet:
    - "Full plant-wide MES, ERP, or PLM replacement across every fusion subsystem"
    - "Regulator, insurer, or board workflow suites beyond the acceptance-pack wedge"
    - "U.S. fusion and non-fusion superconducting markets before the Europe-first lighthouse motion is repeatable"
market:
  tam: "$64.8M (research estimate: 53 fusion developers at ~$0.9M annual program value plus 57 supplier nodes at ~$0.3M collaboration value)"
  sam: "$18.0M (research estimate: 12 Europe and U.S. magnet-intensive demonstrator programs plus 24 critical supplier nodes currently moving into HTS buildout)"
  som: "$3.6M (research estimate: year-3 reach of 3 developer programs at ~$0.9M plus 6 supplier cohorts at ~$0.15M through a Europe-first lighthouse motion)"
  segments:
    - "European fusion developers entering HTS demonstrator buildout"
    - "HTS tape, coil-winding, cryogenic, and integration suppliers attached to those programs"
  buyingProcess: >-
    The champion is usually the Head of Magnet Systems, supplier-quality lead,
    or manufacturing engineering lead, but the deal closes only when the COO,
    VP Manufacturing, or SVP Engineering sees long-lead procurement or a formal
    design-review milestone turning missing evidence into a board-level schedule
    risk. Because the product touches existing PLM/QMS workflows, engineering
    systems and program-controls stakeholders still have to approve the pilot.
product:
  mvp: >-
    An overlay for one magnet work package that ingests BOM and revision
    exports, supplier qualification status, nonconformances, and test files,
    then produces a live release-gate view and acceptance pack for each
    critical assembly. No PLM rip-and-replace, no full plant scheduling, and
    no regulator-specific module in v1.
  sixMonth: >-
    Add supplier workspaces, missing-evidence alerts, and import connectors for
    one PLM/QMS/lab stack so a lighthouse program can run supplier qualification
    and acceptance-pack assembly through the product end to end.
  twelveMonth: >-
    Expand from one work package to program-level dashboards across multiple
    assemblies, benchmark recurring deviation classes, and ship audit-ready
    templates informed by the first developer and supplier cohorts.
  twentyFourMonth: >-
    Expand into U.S. fusion accounts and pilot one adjacent high-field hardware
    segment such as accelerator or MRI superconducting assemblies only if the
    fusion data model proves reusable.
  keyBets:
    - "A lightweight overlay with imports or APIs is enough to win pilots without forcing a multi-year PLM replacement."
    - "Suppliers will submit evidence through lightweight workspaces or file-drop workflows, allowing the company to capture cross-company data rather than just internal records."
    - "Reducing acceptance-pack assembly time and release-blocking evidence gaps is valuable enough to support premium developer-program pricing before adjacent market expansion."
gtm:
  wedge: >-
    Land on one funded demonstrator as the system for supplier qualification
    plus acceptance-pack assembly on the first HTS magnet work package, then
    expand to additional assemblies and attached supplier cohorts once the team
    trusts the release-gate view.
  channels:
    - "Founder-led account-based sales to heads of magnet systems, COOs, and manufacturing leaders at Europe-first fusion programs"
    - "Co-selling through HTS tape, coil-winding, cryogenic, and systems-integration partners already embedded in lighthouse programs"
    - "European fusion cluster, LIBRTI, UK commercialization, and ITER/F4E-style quality ecosystems where target buyers and suppliers already coordinate"
  funnelTargets: "target account→qualified discovery 50%+, discovery→paid lighthouse pilot 25-35%, pilot→annual developer contract 60%+, developer account→attached supplier cohort 50%+"
  pricing: >-
    Annual platform fee per active demonstrator program, priced by number of
    critical assemblies and connected supplier cohorts, plus paid onboarding
    for BOM, revision, and test-system mapping and optional supplier
    collaboration modules. The pricing basis is schedule protection rather than
    seats: on a multi-hundred-million build, avoiding one late magnet evidence
    failure is worth materially more than generic workflow software.
businessModel:
  revenueStreams:
    - "Annual platform fee for each active developer program"
    - "Paid onboarding and integration for PLM, QMS, and lab-data mapping"
    - "Supplier collaboration cohorts and premium acceptance-benchmark modules"
  unitOfValue: "Per active demonstrator program and connected supplier cohort under release-gate management"
  targetGrossMarginPct: 72
  expansionLevers:
    - "Expand from one magnet work package to all critical assemblies inside the same program"
    - "Attach supplier collaboration cohorts and premium benchmark or evidence modules"
    - "Reuse the data model in U.S. fusion and adjacent high-field hardware markets after lighthouse proof"
strategyMap:
  northStarMetric: "Percentage of critical magnet assemblies that hit planned release gates with complete acceptance evidence"
  inputMetrics:
    - "Supplier qualification cycle time for critical vendors"
    - "Percentage of parts and tests mapped to the latest approved baseline"
    - "Median days to assemble an acceptance pack for a release or partner review"
    - "Open critical nonconformances per active assembly at planned ship date"
    - "Number of connected supplier cohorts actively submitting evidence through the platform"
  moatsToBuild:
    - "Cross-program benchmark dataset on supplier delivery, deviation closure, and acceptance outcomes"
    - "Lot-to-test genealogy across HTS materials, magnet designs, and cryogenic results"
    - "Template library for fusion-specific release gates, acceptance packs, and regulator or partner evidence expectations"
  killCriteria:
    - "Fewer than 2 of the first 8 target programs agree to a paid lighthouse pilot within 9 months"
    - "Pilot programs cannot show at least 4 critical external suppliers and recurring baseline or evidence pain, undermining the wedge frequency assumption"
    - "The first pilot fails to cut acceptance-pack or release-prep cycle time by at least 25% versus the manual baseline"
  mermaid: |
    flowchart LR
      Wedge[European HTS demonstrator magnet workflow] --> MVP[Overlay for supplier qualification and acceptance packs]
      MVP --> Proof[Faster release gates and fewer missing evidence gaps]
      Proof --> Expansion[Supplier cohorts, U.S. programs, adjacent high-field sectors]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Compelling pain and timing at a few well-funded programs, but too early to underwrite until buyer ownership, supplier adoption, and adjacent-market portability are proven."
    whyBelieve: "Public evidence from Proxima, CFS, Tokamak, Type One, and FIA all point to the same shift: HTS magnet industrialization is now funded, scheduled, and supplier-dependent, which makes the wedge real."
    whyDoubt: "Fusion alone supports only an ~$18M SAM and the research still does not identify the first signing budget owner or prove that suppliers will adopt a new collaboration surface."
    nextDiligence: "Secure one anonymized workflow export from a lighthouse program showing supplier count, revision churn, nonconformance volume, and current acceptance-pack cycle time, then convert it into a paid pilot."
  firstCustomer:
    title: "Head of Magnet Systems at a European HTS demonstrator program"
    profile: "A fusion developer with a named demonstrator site, four or more external magnet-system suppliers, and first long-lead HTS purchase orders active within 12 months."
    trigger: "Long-lead HTS cable or winding procurement starts and a formal design review or partner diligence date makes missing acceptance evidence a schedule-critical risk."
    buyer: "COO, VP Manufacturing, or SVP Engineering"
    initialContract: "Paid lighthouse pilot for one magnet work package and 2-3 suppliers at $150k-$250k, converting to a $600k-$900k annual developer-program contract plus supplier cohorts once release-gate and acceptance-pack workflows are live."
  mustBeTrue:
    - "Lighthouse programs manage at least 4 critical external suppliers and enough design or evidence churn to make manual build books fail repeatedly."
    - "The COO, VP Manufacturing, or SVP Engineering will fund the product from active program or manufacturing-systems budget before full plant commissioning."
    - "Critical suppliers will participate in lightweight evidence workflows without requiring the startup to sell every supplier a full PLM seat."
    - "A pilot can reduce acceptance-pack or release-prep cycle time by 25%+ or surface missing evidence early enough to avert a meaningful schedule slip."
    - "The same data model can win at least one adjacent high-field hardware segment after fusion, because fusion-only market size is not sufficient for a large software outcome."
  diligenceQuestions:
    - "Which exact budget owner signed the last supplier-quality or PLM-adjacent software purchase at the target account?"
    - "How many suppliers, baseline revisions, nonconformances, and acceptance packs does one active magnet work package generate per quarter?"
    - "What is the current manual cycle time to assemble a board- or partner-ready acceptance pack, and who feels the pain first when it slips?"
    - "Can the product land as an overlay on Teamcenter, Arena, QMS, and lab systems in weeks rather than months?"
    - "What prevents Teamcenter, Arena, MasterControl, or the internal digital-twin team from covering enough of this workflow in-house?"
operatingAssumptions:
  - assumption: "The first budget owner is the COO, VP Manufacturing, or SVP Engineering rather than a lower-level engineering-systems team."
    basis: research.yaml
    validationTest: "Run 10 discovery calls and get 3 written pilot scopes that name the signing executive and budget source."
    decisionImpact: "If ownership sits lower or fragments across functions, pricing and packaging must shrink into a departmental tool or partner-led sale."
  - assumption: "Active demonstrator programs have enough external supplier complexity — at least 4 critical suppliers and repeated baseline changes — to justify a dedicated release-gate system."
    basis: research.yaml
    validationTest: "Collect one anonymized supplier and revision map from each of 3 target programs and count supplier nodes, change orders, and acceptance packages per quarter."
    decisionImpact: "If complexity is lower, the company should target supplier-side QA workflows or adjacent sectors with denser supplier networks."
  - assumption: "Suppliers will adopt lightweight workspaces or file-drop submissions for evidence instead of insisting on email-only handoffs."
    basis: research.yaml
    validationTest: "Pilot evidence collection with at least 2 suppliers in one lighthouse program and measure the share of requested documents and tests submitted through the platform."
    decisionImpact: "If suppliers resist, expansion revenue and data-moat potential fall, and the product must support export-first workflows with lower pricing."
  - assumption: "Overlay integrations with existing PLM, QMS, and lab systems can be implemented fast enough to show value inside one procurement phase."
    basis: operator judgment
    validationTest: "Time-box the first import connector build to 6 weeks and verify the MVP can ingest BOM, revision, and test records without customer-specific code sprawl."
    decisionImpact: "If integrations turn into long bespoke projects, gross margin and fundraising needs worsen and the beachhead must narrow further."
  - assumption: "Acceptance-pack cycle time and avoided late evidence failures are economically important enough to support a $600k-$900k annual developer-program contract."
    basis: idea.yaml
    validationTest: "Benchmark current cycle time and late-discovery incidents at the first 2 pilots, then quantify whether the workflow improvement maps to avoided schedule or rework cost."
    decisionImpact: "If ROI is weak, pricing must move down materially or the product must broaden into more of the manufacturing control stack."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Run structured discovery with 10 Europe-first developer accounts and 6 supplier interviews to map budget owner, supplier count, revision volume, and acceptance-pack cycle time."
    hypothesis: "The best target accounts already have enough supplier and evidence complexity to justify a dedicated magnet traceability layer."
    successMetric: "At least 5 target accounts confirm 4+ critical suppliers, recurring baseline churn, and a painful manual acceptance-pack workflow."
    owner: "Founder / domain lead"
  - horizon: "0-90 days"
    experiment: "Build a prototype importer using one anonymized BOM, revision, nonconformance, and test dataset and generate a release-gate view for one assembly."
    hypothesis: "A thin overlay can expose missing evidence and wrong-baseline risk without a full PLM replacement."
    successMetric: "Working pilot demo in 6 weeks that maps one assembly from supplier qualification through acceptance-pack output."
    owner: "Founding engineer"
  - horizon: "3-6 months"
    experiment: "Launch a paid lighthouse pilot on one magnet work package with 2-3 suppliers."
    hypothesis: "Structured supplier qualification and acceptance-pack workflows reduce release-prep cycle time enough to justify paid expansion."
    successMetric: "25%+ reduction in acceptance-pack or release-prep cycle time versus the customer's manual baseline."
    owner: "Founder / implementation lead"
  - horizon: "3-6 months"
    experiment: "Run a supplier adoption test using lightweight workspaces and file-drop evidence requests."
    hypothesis: "Critical suppliers will participate in structured evidence workflows if the burden is lower than a full enterprise-tool rollout."
    successMetric: "Pilot suppliers submit 70%+ of requested documents and test evidence through the platform."
    owner: "Implementation lead"
  - horizon: "6-12 months"
    experiment: "Complete one board, partner, or quality-review walkthrough using a platform-generated acceptance pack."
    hypothesis: "Decision-makers will trust the product's evidence format enough to use it in a real release-gate or diligence process."
    successMetric: "One live review accepted without rebuilding the full binder manually, and pack assembly time falls below 2 days."
    owner: "Founder / domain lead"
  - horizon: "12-18 months"
    experiment: "Convert 2 developer programs and 3-4 supplier cohorts into annual contracts and test one adjacent high-field design-partner opportunity."
    hypothesis: "The wedge expands inside lighthouse accounts and shows enough portability to justify a seed round."
    successMetric: "2 signed annual developer contracts, 3+ paid supplier cohorts, and 1 adjacent-sector pilot LOI."
    owner: "Founder / first GTM hire"
operations:
  - "High-touch onboarding to map BOMs, revision states, test evidence, and release gates from the customer's existing PLM, QMS, and lab stack."
  - "Weekly magnet-readiness reviews with the customer champion to clear missing evidence and open critical nonconformances before shipment."
  - "Supplier evidence-collection playbooks with file-drop and API options so vendors can participate without buying heavyweight enterprise seats."
  - "Partnership motion with HTS material, winding, cryogenic, and integration firms plus PLM or QMS integrators to shorten implementation and add credibility."
team:
  - role: "Founder / fusion manufacturing lead"
    startTiming: "Month 0"
    rationale: "The first sale depends on credibility with heads of magnet systems and the ability to model supplier qualification and acceptance workflows correctly."
  - role: "Founding engineer"
    startTiming: "Month 0"
    rationale: "The core product is a data and integration layer across PLM, QMS, lab files, and supplier evidence, and it must work before any lighthouse pilot can start."
  - role: "Implementation / solutions engineer"
    startTiming: "Month 3-6"
    rationale: "Pilots will fail without fast customer-specific mapping of BOMs, baselines, and evidence requests into reusable templates."
  - role: "First GTM lead"
    startTiming: "Month 6-9"
    rationale: "Once the lighthouse workflow is proven, the company needs dedicated account coverage across a small but global buyer universe and must convert supplier cohorts alongside developer accounts."
milestones:
  - horizon: "0-12 months"
    items:
      - "Sign 1-2 lighthouse developer pilots and onboard 2-3 supplier cohorts onto one magnet work package."
      - "Prove 25%+ faster acceptance-pack or release-prep cycle time and surface at least one material missing-evidence gap before ship date."
      - "Identify the repeatable signing executive, budget source, and integration pattern across 10 target-account conversations."
      - "Ship reusable templates for supplier qualification, nonconformance closure, and release-gate evidence."
  - horizon: "12-24 months"
    items:
      - "Convert 2-3 developer programs into annual contracts and attach 4-6 supplier cohorts."
      - "Expand from single work-package control to program-level dashboards across multiple assemblies."
      - "Launch benchmark modules on supplier performance and deviation closure using cross-program data."
      - "Open the first U.S. fusion account or equivalent partner-led expansion motion once the Europe playbook is repeatable."
  - horizon: "24-36 months"
    items:
      - "Reach the researched $3.6M year-3 SOM across 3 developer programs and 6 supplier cohorts."
      - "Pilot one adjacent high-field segment such as accelerators or MRI superconducting assemblies and validate comparable workflow fit."
      - "Package regulator, insurer, and board evidence templates as a premium module informed by lighthouse accounts."
      - "Demonstrate that at least one adjacent market can expand the company beyond the fusion-only SAM."
risks:
  - risk: "Fusion demonstrator timelines may slip, delaying software budgets and compressing the near-term logo count."
    likelihood: High
    impact: High
    mitigation: "Start with the best-capitalized Europe-first programs, sell supplier cohorts in parallel, and make adjacent high-field expansion a preplanned fallback rather than a late reaction."
  - risk: "Customers may decide Teamcenter, Arena, or existing QMS workflows already solve enough of the problem, pushing the startup into services-heavy customization."
    likelihood: Medium
    impact: High
    mitigation: "Land one measurable workflow first — supplier qualification plus acceptance-pack assembly — with prebuilt import connectors and clear before-versus-after cycle-time proof."
  - risk: "Critical suppliers may resist structured evidence submission, reducing data quality and weakening the cross-company moat."
    likelihood: Medium
    impact: High
    mitigation: "Offer lightweight file-drop and API workflows, start with suppliers already under procurement pressure, and make evidence completeness visible in the customer's release-gate process."
  - risk: "The buyer pool is small and concentrated, giving lighthouse accounts high bargaining power and long enterprise cycles."
    likelihood: High
    impact: Medium
    mitigation: "Run disciplined account-based outreach across both developers and suppliers, avoid overbuilding before paid pilots, and prove adjacent-sector portability early."
  - risk: "Incumbents or in-house digital-thread teams may replicate basic dashboards once the category becomes visible."
    likelihood: Medium
    impact: Medium
    mitigation: "Differentiate on cross-program supplier benchmarks, lot-to-test genealogy, and packaged acceptance templates that are difficult to recreate from a single in-house stack."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "18 months to ship the overlay MVP, land 1-2 lighthouse developer pilots plus supplier cohorts, prove the signing buyer and ROI on acceptance-pack cycle time, and decide whether the business expands into U.S. fusion and adjacent high-field hardware before a seed round."
