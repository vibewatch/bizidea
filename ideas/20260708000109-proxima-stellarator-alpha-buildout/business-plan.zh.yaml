slug: fusion-magnet-traceability-os
date: '2026-07-08'
executiveSummary: 进入示范装置建造阶段的聚变项目，如今评判标准不再只是等离子体科学，而是 HTS 磁体和配套证据能不能按时穿过既定放行关口。我们先从欧洲、磁体密集型的示范项目下手，因为 Proxima、Tokamak、Renaissance，以及英国支持的商业化项目，已经把买家、供应商和公共项目基础设施聚成一个高密度簇。产品叠在 PLM、QMS、实验室数据和供应商门户之上，跟踪每个关键超导组件的基线版本、批次谱系、不符合项和验收证据。这个切口比通用制造 OS 窄得多，但也正是 Teamcenter、ENOVIA、Arena 和 MasterControl 现有部署都还没做到董事会可用建造档案的地方。研究给出的 TAM 是 $64.8M，SAM 是 $18.0M，第 3 年 SOM 是 $3.6M；所以聚变这个滩头市场只有在拿下灯塔客户后，能继续扩到相邻高场硬件，商业上才真正成立。第一性验证点不是宽泛的 ARR，而是一个有预算的项目和它的首个供应商协作组，能不能把验收包周期压下来，并在硬件出货前抓出卡住放行的证据缺口。最大的证伪风险在于：买家把它当成现有 PLM/QMS 里的服务或配置工作，而不是一个拥有预算权的新记录系统。研究还留着一个关键空白——第一个签字预算拍板人 是谁、可接受的初始 ACV 到底多少——在公司承诺更重的集成路线图或 seed 级团队之前，必须先跟目标客户直接验证。
problem:
- 磁体系统负责人和供应商质量负责人要在 PLM 导出、表格、SharePoint 和邮件之间来回拉扯 HTS 带材、线圈、低温部件和测试证据，所以没有任何一个系统能证明某个关键组件正按当前获批基线制造。
- 一到设计评审、合作方尽调或董事会更新，团队就得手工拼验收包，而很多晚发现的不符合项或谱系缺口，往往要等进度风险已经很大时才暴露。
solution:
- 叠在现有 PLM、QMS、实验室和供应商系统之上，把每一批电缆、每一只线圈、每一条偏差和每一次低温测试都挂到实时规格基线上；该关的证据没关完，就不允许放行。
- 提供供应商工作空间、就绪度仪表盘和自动生成的验收包，让项目负责人在不替换核心工程工具的前提下，也能筛选供应商、关掉异常，并向投资人、公用事业公司、保险方和电站伙伴解释建造就绪度。
whyWeWin:
- 我们盯的就是横向 PLM/QMS 工具一直没串起来的跨公司磁体验收层：供应商准入、批次谱系、不符合项闭环，以及首台套 HTS 组件的放行证据。
- 真正有防守力的资产，是跨项目沉淀下来的数据集：供应商表现、偏差模式，以及批次到测试结果的映射。内部自建栈和通用平台都攒不出这种数据。
strategicChoices:
  beachhead: 进入示范装置首轮长周期 HTS 磁体采购的欧洲聚变开发商；先从一个磁体 工作包 和其中 2–4 家风险最高的外部供应商切入。
  wedgeRationale: 这块切片既有明确的资本里程碑，买家范围也小而清晰，还能量化失败模式——按错基线生产、偏差没关、验收证据缺失。这样一个试点就能在单个采购阶段里把价值跑出来。反过来，如果一上来就讲全厂 MES 或 PLM 替换，要先做得很深的集成，任何可证伪的结果都会来得太晚。
  sequencingRationale: 先做供应商准入和验收包的叠加层，再加完整项目控制或监管模块。研究已经指出，最大的采用风险就是集成拖慢和供应商不配合。销售也该先由创始人亲自下场，只盯一个灯塔开发商和它的第一批供应商协作组；等 ROI 跑通，再补专门的实施和 GTM 团队，随后才扩到美国和相邻高场硬件。
  notYet:
  - 不做覆盖所有聚变子系统的全厂 MES、ERP 或 PLM 替换
  - 不做超出验收包切口的监管方、保险方或董事会工作流套件
  - 在欧洲灯塔打法可复制之前，不碰美国聚变和非聚变超导市场
market:
  tam: $64.8M（研究估算：53 家聚变开发商 × 每年约 $0.9M 的项目价值 + 57 个供应商节点 × 每年约 $0.3M 的协作价值）
  sam: $18.0M（研究估算：欧洲和美国有 12 个磁体密集型示范项目正在进入 HTS 建造阶段，另有 24 个关键供应商节点）
  som: $3.6M（研究估算：第 3 年通过欧洲优先的灯塔打法，拿下 3 个开发商项目，每个约 $0.9M，再加 6 个供应商协作组，每个约 $0.15M）
  segments:
  - 进入 HTS 示范装置建造阶段的欧洲聚变开发商
  - 服务这些项目的 HTS 带材、线圈绕制、低温和集成供应商
  buyingProcess: 日常 牵头人 往往是磁体系统负责人、供应商质量负责人或制造工程负责人；但只有当 COO、制造副总裁或工程高级副总裁意识到，长周期采购或正式设计评审会把缺失证据抬成董事会级的进度风险时，交易才会真正拍板。因为产品会碰到现有 PLM/QMS 工作流，工程系统和项目控制相关方仍然要一起批准试点。
product:
  mvp: 先做一个覆盖单个磁体 工作包 的叠加层：吃进 BOM 和版本导出、供应商准入状态、不符合项和测试文件，然后为每个关键组件生成实时放行视图和验收包。v1 不做 PLM 替换，不碰全厂排程，也不上监管专用模块。
  sixMonth: 给一个 PLM/QMS/实验室栈加上供应商工作空间、缺失证据预警和导入连接器，让灯塔项目能把供应商准入和验收包组装完整跑在产品里。
  twelveMonth: 从单个 工作包 扩到跨多个组件的项目级仪表盘，给重复出现的偏差类型做基准，并把首批开发商和供应商协作组跑出来的经验封装成可审计模板。
  twentyFourMonth: 只有当聚变数据模型被证明可复用时，才扩到美国聚变客户，并试点一个相邻高场硬件细分，例如加速器或 MRI 超导组件。
  keyBets:
  - 只靠轻量叠加层 + 导入或 API，就足以拿下试点，不必强推多年期 PLM 替换。
  - 供应商愿意通过轻量工作空间或文件投递流程提交证据，这样公司拿到的是跨公司数据，而不只是客户内部记录。
  - 把验收包组装时间和卡放行的证据缺口压下来，这个价值足以在进入相邻市场前，就支撑高价的开发商项目定价。
gtm:
  wedge: 先在一个已经获资的示范项目里，拿下首个 HTS 磁体 工作包 的“供应商准入 + 验收包组装”系统地位；等团队信任这套放行视图后，再扩到更多组件和挂靠的供应商协作组。
  channels:
  - 创始人主导的 ABM 销售，直接触达欧洲优先聚变项目里的磁体系统负责人、COO 和制造负责人
  - 借已经嵌入灯塔项目的 HTS 带材、线圈绕制、低温和系统集成伙伴联合销售
  - 欧洲聚变集群、LIBRTI、英国聚变商业化项目，以及 ITER/F4E 风格的质量生态——目标买家和供应商本来就在这些地方协同
  funnelTargets: 目标账户→合格发现 50%+；发现→付费灯塔试点 25-35%；试点→年度开发商合同 60%+；开发商账户→挂接供应商协作组 50%+
  pricing: 每个活跃示范项目收年度平台费，按关键组件数量和接入的供应商协作组定价；另收 BOM、版本和测试系统映射的付费实施费，以及可选的供应商协作模块。定价锚点不是席位，而是进度保护：在一个数亿美元的建造项目里，少掉一次磁体证据失误，值的钱远高于通用工作流软件。
businessModel:
  revenueStreams:
  - 每个活跃开发商项目的年度平台费
  - PLM、QMS 和实验室数据映射的付费上线与集成
  - 供应商协作组与高级验收基准模块
  unitOfValue: 按放行关口管理的每个活跃示范项目及其接入的供应商协作组
  targetGrossMarginPct: 72
  expansionLevers:
  - 从一个磁体 工作包 扩到同一项目内所有关键组件
  - 继续挂接供应商协作组，以及高级基准 / 验收证据模块
  - 在灯塔客户跑通后，把数据模型复用到美国聚变和相邻高场硬件市场
strategyMap:
  northStarMetric: 按计划穿过放行关口且验收证据完整的关键磁体组件占比
  inputMetrics:
  - 关键供应商的准入周期
  - 映射到最新版获批基线的零件和测试占比
  - 为放行或合作方评审拼出一份验收包的中位天数
  - 计划出货时，每个活跃组件仍未关闭的关键不符合项数量
  - 在平台上活跃提交证据的接入供应商协作组数量
  moatsToBuild:
  - 跨项目的供应商交付、偏差闭环和验收结果基准数据集
  - 贯穿 HTS 材料、磁体设计和低温结果的批次到测试谱系
  - 围绕聚变专用放行关口、验收包，以及监管方 / 合作方证据预期的模板库
  killCriteria:
  - 前 8 个目标项目里，不到 2 个愿意在 9 个月内签付费灯塔试点
  - 试点项目拿不出至少 4 家关键外部供应商，也没有反复出现的基线或证据痛点，说明切口频次假设不成立
  - 首个试点没能把验收包或放行准备周期相对手工基线压缩至少 25%
  mermaid: |
    flowchart LR
      Wedge[European HTS demonstrator magnet workflow] --> MVP[Overlay for supplier qualification and acceptance packs]
      MVP --> Proof[Faster release gates and fewer missing evidence gaps]
      Proof --> Expansion[Supplier cohorts, U.S. programs, adjacent high-field sectors]
investorMemo:
  verdict:
    call: 观察
    conviction: 少数资金充足的项目上，痛点和时点都很有吸引力；但在买方 拍板人、供应商采纳，以及向相邻市场迁移的能力被证实前，还太早，没法下判断。
    whyBelieve: 来自 Proxima、CFS、Tokamak、Type One 和 FIA 的公开证据都在指向同一件事：HTS 磁体产业化已经有钱、有时间表，也越来越依赖供应商，这让切口不是幻觉。
    whyDoubt: 聚变单独撑起来的也只有约 $18M SAM，而研究仍没确认第一个签字预算 拍板人 是谁，也没证明供应商愿意上一个新的协作界面。
    nextDiligence: 先从一个灯塔项目拿到匿名工作流导出，里面要有供应商数量、版本变更频率、不符合项规模和当前验收包周期，再把它转成付费试点。
  firstCustomer:
    title: 欧洲 HTS 示范项目的磁体系统负责人
    profile: 一家聚变开发商，已有明确示范装置选址、至少 4 家外部磁体系统供应商，并会在 12 个月内启动第一批长周期 HTS 采购单。
    trigger: 长周期 HTS 电缆或绕制采购启动，而且正式设计评审或合作方尽调日期已经确定，缺失验收证据随时会变成卡进度的风险。
    buyer: COO、制造副总裁或工程高级副总裁
    initialContract: 围绕一个磁体 工作包 和 2-3 家供应商做付费灯塔试点，价格 $150k-$250k；等放行和验收包工作流跑起来后，再转成 $600k-$900k 的年度开发商合同，并叠加供应商协作组。
  mustBeTrue:
  - 灯塔项目至少要管理 4 家关键外部供应商，而且设计或证据变化频率高到足以让手工建造档案反复失效。
  - COO、制造副总裁或工程高级副总裁愿意在整厂投运前，直接用活跃项目或制造系统预算为这款产品买单。
  - 关键供应商愿意参与轻量证据工作流，而不是逼着创业公司给每个供应商都卖一个完整 PLM 席位。
  - 一个试点要么能把验收包 / 放行准备周期压缩 25%+，要么能足够早地暴露缺失证据，避免一次真正有分量的进度滑坡。
  - 同一套数据模型在聚变之后，至少还能拿下一个相邻高场硬件细分；否则只靠聚变市场，不足以撑起大的软件结果。
  diligenceQuestions:
  - 目标账户最近一次签掉的供应商质量软件或 PLM 邻近软件，究竟是哪位预算 拍板人 批的？
  - 一个正在运行的磁体 工作包 每个季度会产生多少供应商、多少基线版本、多少不符合项和多少验收包？
  - 现在手工拼出一份董事会或合作方可用的验收包要多久？一旦拖延，最先感到痛的人是谁？
  - 产品能不能在几周内，以叠加层方式接进 Teamcenter、Arena、QMS 和实验室系统，而不是拖成几个月？
  - 究竟是什么在阻止 Teamcenter、Arena、MasterControl 或内部 digital-twin 团队把这部分工作流自己做掉？
operatingAssumptions:
- assumption: 第一个预算 拍板人 会是 COO、制造副总裁或工程高级副总裁，而不是更低层的工程系统团队。
  basis: research.yaml
  validationTest: 做 10 通发现访谈，拿到 3 份写明签字高管和预算来源的试点范围。
  decisionImpact: 如果 拍板人 落在更低层，或分散在多个职能里，定价和包装就得收缩成部门工具或渠道型销售。
- assumption: 活跃的示范项目有足够高的外部供应商复杂度——至少 4 家关键供应商，且基线变更反复出现——足以支撑一套专门的放行系统。
  basis: research.yaml
  validationTest: 从 3 个目标项目各拿一份匿名供应商与版本图，统计每季度的供应商节点、变更单和验收包数量。
  decisionImpact: 如果复杂度不够，公司就该转去做供应商侧 QA 工作流，或切到供应商网络更密的相邻行业。
- assumption: 供应商愿意用轻量工作空间或文件投递方式提交证据，而不是坚持只靠邮件交接。
  basis: research.yaml
  validationTest: 在一个灯塔项目里拿至少 2 家供应商试跑证据采集，衡量通过平台提交的文档和测试占比。
  decisionImpact: 如果供应商抵触，扩张收入和数据护城河都会变弱，产品也得支持以导出为先、价格更低的工作流。
- assumption: 和现有 PLM、QMS、实验室系统的叠加式集成，能快到在一个采购阶段内就把价值跑出来。
  basis: 经营判断
  validationTest: 把首个导入连接器开发压到 6 周内，验证 MVP 能吃进 BOM、版本和测试记录，而且不会长出客户专属代码蔓延。
  decisionImpact: 如果集成拖成长周期定制项目，毛利率和融资需求都会恶化，滩头市场还得再收窄。
- assumption: 验收包周期和避免晚发现证据缺口的价值，足以支撑每年 $600k-$900k 的开发商项目合同。
  basis: idea.yaml
  validationTest: 在前 2 个试点里 对比 当前周期和晚发现事件，再量化工作流改善能否映射到避免进度损失或返工成本。
  decisionImpact: 如果 ROI 很弱，定价就得明显下调，或者产品必须往更完整的制造控制栈扩。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 和 10 个欧洲优先开发商账户、6 位供应商做结构化发现访谈，摸清预算 拍板人、供应商数量、版本变更量和验收包周期。
  hypothesis: 最好的目标账户已经有足够高的供应商与证据复杂度，值得上一层专门的磁体追溯系统。
  successMetric: 至少 5 个目标账户确认：有 4 家以上关键供应商、基线反复变动，而且手工验收包工作流很痛。
  owner: 创始人 / 领域负责人
- horizon: 0-90 天
  experiment: 用一份匿名 BOM、版本、不符合项和测试数据集做原型导入器，为一个组件生成放行视图。
  hypothesis: 只靠一层轻量叠加层，不替换完整 PLM，也能把缺失证据和错基线风险挑出来。
  successMetric: 6 周内跑出可演示的试点版本，能把一个组件从供应商准入一路映射到验收包输出。
  owner: 创始工程师
- horizon: 3-6 个月
  experiment: 围绕一个磁体 工作包 和 2-3 家供应商，启动付费灯塔试点。
  hypothesis: 结构化的供应商准入和验收包工作流，能把放行准备周期压到足以支撑付费扩张。
  successMetric: 相对客户手工基线，验收包或放行准备周期缩短 25%+。
  owner: 创始人 / 实施负责人
- horizon: 3-6 个月
  experiment: 用轻量工作空间和文件投递证据请求，跑一轮供应商采纳测试。
  hypothesis: 只要负担低于全套企业工具 上线，关键供应商就愿意配合结构化证据工作流。
  successMetric: 试点供应商通过平台提交 70%+ 的请求文档和测试证据。
  owner: 实施负责人
- horizon: 6-12 个月
  experiment: 用平台生成的验收包，完整走通一次董事会、合作方或质量评审。
  hypothesis: 决策者会足够信任产品输出的证据格式，愿意把它直接用于真实放行或尽调流程。
  successMetric: 至少有 1 次真实评审在不手工重建整套活页夹的情况下被接受，且组包时间降到 2 天以内。
  owner: 创始人 / 领域负责人
- horizon: 12-18 个月
  experiment: 把 2 个开发商项目和 3-4 个供应商协作组转成年费合同，再试 1 个相邻高场领域的共创客户机会。
  hypothesis: 切口能在灯塔账户里继续向内扩，并表现出足够强的可迁移性，支撑一轮 seed。
  successMetric: 拿到 2 份年度开发商合同、3 个以上付费供应商协作组，以及 1 份相邻行业试点 LOI。
  owner: 创始人 / 首位 GTM 招聘
operations:
- 围绕客户现有 PLM、QMS 和实验室栈，做高触达上线，把 BOM、版本状态、测试证据和放行关口映射清楚。
- 每周和客户 牵头人 做一次磁体就绪度复盘，在出货前把缺失证据和关键不符合项清掉。
- 提供供应商证据采集 操作手册，配上文件投递和 API 选项，让供应商不用买重型企业席位也能参与。
- 联合 HTS 材料、绕制、低温和集成公司，以及 PLM / QMS 集成商推进合作，缩短实施周期并补足可信度。
team:
- role: 创始人 / 聚变制造负责人
  startTiming: 第 0 个月
  rationale: 第一笔销售能不能成，取决于能否在磁体系统负责人面前建立可信度，并把供应商准入和验收工作流建对。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 核心产品就是跨 PLM、QMS、实验室文件和供应商证据的数据 / 集成层；没有它，任何灯塔试点都跑不起来。
- role: 实施 / 解决方案工程师
  startTiming: 第 3-6 个月
  rationale: 如果不能快速把客户的 BOM、基线和证据请求映射成可复用模板，试点一定会失败。
- role: 首位 GTM 负责人
  startTiming: 第 6-9 个月
  rationale: 一旦灯塔工作流跑通，公司就需要专人覆盖这个虽小但全球化的买家池，并把供应商协作组与开发商账户一起转化。
milestones:
- horizon: 0-12 个月
  items:
  - 签下 1-2 个灯塔开发商试点，并把 2-3 个供应商协作组接入同一个磁体 工作包。
  - 把验收包或放行准备周期压快 25%+，并在出货日前至少抓出 1 个有分量的缺失证据缺口。
  - 在 10 次目标账户交流里，找出可复用的签字高管、预算来源和集成模式。
  - 交付可复用模板，覆盖供应商准入、不符合项闭环和放行证据。
- horizon: 12-24 个月
  items:
  - 把 2-3 个开发商项目转成年费合同，并挂上 4-6 个供应商协作组。
  - 从单个 工作包 控制扩到跨多个组件的项目级仪表盘。
  - 用跨项目数据推出供应商表现和偏差闭环的 基准 模块。
  - 在欧洲打法可复制后，打开第一个美国聚变账户或同等的伙伴驱动扩张动作。
- horizon: 24-36 个月
  items:
  - 在 3 个开发商项目和 6 个供应商协作组上，做到研究给出的第 3 年 $3.6M SOM。
  - 试点 1 个相邻高场细分，例如加速器或 MRI 超导组件，并验证工作流匹配度可复制。
  - 把监管方、保险方和董事会证据模板打成高级模块，由灯塔账户经验反哺。
  - 证明至少有 1 个相邻市场能把公司从“只做聚变的 SAM”继续往外推。
risks:
- risk: 聚变示范项目时间线可能后移，拖慢软件预算，也压缩短期 客户数。
  likelihood: High
  impact: High
  mitigation: 先盯资本最充足的欧洲优先项目，同时并行卖供应商协作组；相邻高场扩张也要预先设计成后手，而不是临时起意。
- risk: 客户可能认为 Teamcenter、Arena 或现有 QMS 工作流已经解决了足够多的问题，结果把创业公司逼成偏服务化的定制团队。
  likelihood: Medium
  impact: High
  mitigation: 先只拿一个可量化的工作流——供应商准入 + 验收包组装——配上预建导入连接器和明确的前后周期对比证据。
- risk: 关键供应商可能抵触结构化证据提交，导致数据质量下滑，也削弱跨公司的护城河。
  likelihood: Medium
  impact: High
  mitigation: 提供轻量文件投递和 API 工作流，先从采购压力已经很大的供应商切入，并把证据完整度直接挂进客户的放行流程里。
- risk: 买家池子小而集中，灯塔账户议价权高，企业销售周期也会被拉长。
  likelihood: High
  impact: Medium
  mitigation: 对开发商和供应商同时做纪律化的 ABM 触达，在付费试点前别过度建设，并尽早证明对相邻行业的可迁移性。
- risk: 现有厂商或客户内部的 数字主线 团队，一旦看见这个品类，很可能复刻基础仪表盘。
  likelihood: Medium
  impact: Medium
  mitigation: 把差异化压在跨项目供应商 基准、批次到测试谱系，以及一套客户内部单栈很难重建的验收模板上。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月交付叠加式 MVP，拿下 1-2 个灯塔开发商试点及其供应商协作组，证明签字买家与验收包周期 ROI，再决定公司是否在 seed 前扩到美国聚变和相邻高场硬件。
