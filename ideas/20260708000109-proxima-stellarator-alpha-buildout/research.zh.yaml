  searchedQueries:
  - 识别权威的一手来源和独立来源，说明 Proxima Fusion 的 Alpha 示范装置、HTS 电缆和磁体生产计划、时间线、选址以及战略投资人。
  - 识别近期、权威的商业聚变行业来源，提供公司数量、融资总额、示范时间线或制造扩产背景。
  - 识别与聚变公司相关、关于高温超导磁体制造和供应链约束的权威来源。
  - 识别复杂核能、聚变、加速器或低温硬件项目中，关于质量保证、供应商准入、配置管理、可追溯性或数字主线要求的权威来源。
  - 识别客户痛点和购买触发因素的公开证据，例如 Proxima Fusion、Commonwealth Fusion Systems、Tokamak Energy、Type One Energy 等公司的招聘信息、供应商要求、采购页面或运营更新。
  - 识别 PLM、QMS 和制造可追溯性现有竞争对手的一手产品与文档页面，它们可能替代聚变磁体追溯 OS。
  - 查找美国政府和 NRC 关于商业聚变能源监管、聚变开发项目或聚变试验电站质量预期的权威页面。
  - 查找英国政府或 UKAEA 关于聚变监管、LIBRTI、Fusion Futures，或支持商业聚变的供应链与产业化的权威页面。
  - 查找 IAEA、ITER、DOE 或 CERN 关于复杂核能或聚变硬件项目的质量保证、可追溯性、供应商准入或管理系统的权威页面。
  - 查找公开可访问的 Siemens Teamcenter 一手产品页面，涵盖 PLM、供应商协作或质量管理。
  - 查找公开可访问的 Aras 和 Arena 一手产品页面，说明 数字主线、PLM、QMS 或供应商协作。
