bottomUpSizingDrivers:
- driver: 商业聚变开发商账户
  value: FIA 2025 报告覆盖的 53 家聚变公司
  source: '[87]'
- driver: 供应商侧可触达节点
  value: FIA《Supply Chain 2025》调查中的 57 家供应商
  source: '[86]'
- driver: 项目 ACV 假设
  value: 每个活跃开发商项目每年 $0.9M（估算，含平台费与摊销后的实施费）
  source: 估算，参照 [106][112][115]
- driver: 供应商协作 ACV 假设
  value: 每个关键供应商协作组每年 $0.3M（估算）
  source: 估算，参照 [106][111]
categoryDynamics:
  growthRate: 2025 年聚变供应链支出预计同比增长 25%
  growthRateSourceRefs:
  - 86
  tailwinds:
  - point: 聚变融资和公司数量还在上升，工业执行相关的企业软件预算因此更站得住。
    sourceRefs:
    - 85
    - 87
  - point: 明确选址、购电协议和正式电站设计，正在把聚变从开放式科研推成有排期的资本项目。
    sourceRefs:
    - 31
    - 54
    - 72
  - point: HTS 磁体能力正在被产品化为独立商业品类，需要可追溯建造证据的团队也因此变多。
    sourceRefs:
    - 38
    - 94
  headwinds:
  - point: 精密工程和 HTS 供应约束依然很重，受访聚变公司里有 63% 担心未来供应商可得性。
    sourceRefs:
    - 86
  - point: 滩头市场仍集中在少数项目里，销售周期难免定制化，时间线风险也会持续偏高。
    sourceRefs:
    - 66
    - 85
    - 123
competitors:
- name: Siemens Teamcenter
  stage: 现有厂商
  wedge: 具备供应商管理和质量/合规工作流的企业级 PLM。
  pricing: 方案与价格 / 联系销售；企业级报价。
  strength: 在供应商协作、产品历史、偏差和质量流程上，digital thread 覆盖非常深。
  weaknessVsUs: 这是个沉重的横向平台，并没有按聚变磁体谱系、验收包或跨公司放行关口来封装。
  sourceRefs:
  - 106
  - 107
- name: Dassault ENOVIA
  stage: 现有厂商
  wedge: 3DEXPERIENCE 平台上的云原生 PLM 协作。
  pricing: 联系 ENOVIA 专家 / 企业级定制报价。
  strength: 很适合复杂产品开发中的单一事实源协作。
  weaknessVsUs: 它是广谱 PLM 平台，不是一个能快速上线的供应商准入和 FOAK 磁体证据系统。
  sourceRefs:
  - 109
- name: Arena by PTC
  stage: 现有厂商
  wedge: 面向产品公司的云 PLM/QMS + 供应商协作。
  pricing: 联系我们 / 定制报价。
  strength: 云端部署和供应商协作速度都快过重型 PLM 栈。
  weaknessVsUs: 它并不是为低温测试证据、不符合项治理和聚变 联合体 的可融资工作流量身定做。
  sourceRefs:
  - 111
- name: MasterControl
  stage: 现有厂商
  wedge: 以文档、变更和事件控制为核心的受监管质量管理。
  pricing: 从 startup 到 enterprise 的定制打包。
  strength: 合规姿态强，质量/变更工作流可追溯。
  weaknessVsUs: 这是一套质量优先系统，管不到每个超导组件从工程到供应商的 digital thread。
  sourceRefs:
  - 112
  - 115
regulatoryTechnicalConstraints:
- point: 美国的聚变监管现在取决于 NRC 对聚变装置产生副产物材料的管辖，因此证据系统必须能跨司法辖区支撑可追溯的材料与安全合规。
  sourceRefs:
  - 119
- point: ITER 风格的采购在制造开工前，就要求获批的质量计划、批准通过的特殊工艺和可验证记录。
  sourceRefs:
  - 129
- point: 磁体系统依然是成本和可靠性的主要驱动项；美国国家科学院指出，它们大约能占核心整机成本的三分之一，而且对可靠性和可维护性要求都很高。
  sourceRefs:
  - 93
validationSignals:
- point: Proxima 专门融资 €411 million，用来建设 Alpha、扩 HTS 电缆和磁体生产，并在工程、制造和运营上扩招。
  sourceRefs:
  - 1
- point: Alpha Alliance 正在围绕一个具名示范装置，协调 30 多家公司共同推进制造、系统集成和供应链能力。
  sourceRefs:
  - 2
- point: CFS 公开按财务健康、质量体系、技术能力和合规性筛选供应商，这直接验证了工作流问题存在。
  sourceRefs:
  - 15
- point: Tokamak 推出 TE Magnetics，并融资 $125 million，同时商业化聚变和 HTS 磁体技术。
  sourceRefs:
  - 38
  - 39
- point: Type One 一边完成正式电站设计评审，一边推进面向仿星器的 HTS 磁体测试，这说明问题早已不是纸面命题。
  sourceRefs:
  - 54
  - 57
openQuestions:
- 一个真实运行中的磁体项目里，当前痛点到底更多来自设计基线漂移、测试证据缺失，还是供应商上线太慢？
- 第一个签字预算 预算拍板人 到底是谁：磁体系统、供应商质量、制造系统，还是项目控制？
- 一个灯塔聚变项目在单个建造阶段里，实际要管多少外部供应商和长周期组件？
- 关键供应商会接受协作式证据工作流，还是仍坚持邮件和文件交接？
