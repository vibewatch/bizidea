    severity: high
    affectedBuyer: 制造副总裁或工程系统负责人
    mitigation: 以叠加层方式落地，优先提供预建连接器和基于导入的工作流，而不是替换 Teamcenter、Arena、实验室系统或 digital-twin 工具。
    sourceRefs:
    - 24
    - 42
    - 106
    - 111
  - friction: 让专业供应商参与结构化证据工作流
    severity: high
    affectedBuyer: 供应商质量负责人
    mitigation: 提供轻量 供应商 工作空间、证据请求模板，以及 API 或文件投递选项，而不是强推完整 PLM 席位。
    sourceRefs:
    - 13
