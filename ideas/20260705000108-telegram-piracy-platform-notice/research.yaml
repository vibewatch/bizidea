  sensitivityCases:
  - case: The July 2026 Telegram order remains unusually specific and does not generalize to other India-facing platforms quickly.
    impact: Near-term urgency would stay concentrated in a handful of logos, making the initial market more consulting-like than SaaS-like until another large platform is tested.
    sourceRefs:
    - 1
    - 2
    - 29
  - case: Platforms buy narrower takedown or moderation tools instead of a full operating system.
    impact: The startup may need to land first as workflow glue on top of existing vendors rather than as an all-in-one control plane.
    sourceRefs:
    - 14
    - 17
    - 22
  - case: Hashing, graphing, or sanctions create false-positive or privacy backlash.
    impact: Adoption slows unless the product proves confidence bands, human review, and appeals while staying focused on public-surface evidence.
    sourceRefs:
    - 4
    - 13
    - 23
  validationPlan:
  - priority: high
    question: How many piracy complaints, re-uploads, and repeat-offender escalations does a target platform handle each week on public surfaces?
    evidenceToGather: Ten to twelve discovery calls plus exports from current email inboxes, abuse queues, and moderator spreadsheets at design-partner accounts.
  - priority: high
    question: 'Who signs the first budget approval: trust and safety, legal, or partner management?'
    evidenceToGather: Budget maps from 5-8 target accounts plus one paid diagnostic with a GC or VP Trust & Safety.
  - priority: medium
    question: How much enforcement value is available on public channels, groups, bots, and forwards before private-surface blind spots dominate?
    evidenceToGather: Surface-by-surface incident logs and product architecture walkthroughs from two messaging/community platforms.
  - priority: medium
    question: What false-positive thresholds and appeal flows will buyers accept for severe sanctions such as admin removal or channel disablement?
    evidenceToGather: Pilot policy workshops using sample hashes, edge-case fan uploads, and sanction ladders with rights-holder and platform reviewers.
