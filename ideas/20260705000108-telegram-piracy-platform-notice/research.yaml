  adoptionFrictionMatrix:
  - friction: Private or encrypted surfaces are partly out of scope for public copyright complaint workflows.
    severity: high
    affectedBuyer: Head of Trust & Safety / General Counsel
    mitigation: Start with public channels, bots, groups, upload/forwarding surfaces, and user-report queues rather than promising full visibility into private conversations.
