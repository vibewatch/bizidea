slug: piracy-due-diligence-os
date: "2026-07-05"
executiveSummary: >-
  印度在2026年7月对Telegram发出的整改通知，实实在在地证明了中介一侧的反盗版尽职调查正在变成一项软件预算，而不只是一项审核杂务。第一个客户
  画像是印度消费应用里的信任与安全副总裁或法务总监——平台拥有5万个以上公开群组或频道、原生媒体转发功能、持续收到影视或体育版权投诉，人手又
  少到没法靠人工跑版权运营。产品应该先做成公开场景上的工作流与证据层：投诉受理、感知哈希或合作方匹配数据接入、跨频道/机器人/管理员/账号的
  惯犯图谱、处罚手册，以及行动报告导出。这个切口比做一个大而全的反盗版平台更容易验证，因为买家是被监管或版权方触发才来的，能在一次试点里就
  量出响应时长、重复上传率和申诉结果。研究测算出一个约$10.0M的印度滩头市场,以及一个约$120.0M的全球平台级更大总量市场——但只有走出一个国家、
  一种版权工作流之后，这门生意才真正具备投资价值。竞争的突破口不在于纯粹的匹配技术——现有厂商早就在向版权方卖检测、向平台卖通用审核——而在于
  把投诉、惯犯、处罚和审计证据串成一套受治理的系统记录。最大的证伪风险是客户集中度、误判导致的过度屏蔽，以及公开场景数据本身可能不足以证明
  有意义的执法价值,除非也能触及私域分享。预算归属方是谁、生产级定价能接受到什么程度、Telegram这份整改令能在多大范围内扩散到其他印度平台，
  这些都还需要直接验证，所以头12个月应该优先做共创客户转化，而不是激进扩招。
problem:
  - 目标平台目前还是靠邮箱收件箱、审核队列和一次性封禁来对付盗版,同样的内容和管理员卷土重来的速度比团队反应速度还快。
  - 监管机构和版权方现在要求平台证明自己在频道、群组、机器人和账号层面都有惯犯管控、投诉处理和行动报告能力,而大多数中型应用现有工具根本产不出这些东西。
solution:
  - 把投诉受理、公开场景内容匹配和实体识别整合到一起,让信任团队能把受版权保护的上传内容、重复上传、频道、机器人、管理员和账号串成同一起惯犯案件。
  - 基于策略执行处罚、配合人工复核，并为法务、版权方和监管方导出经得起审计的行动报告、SLA历史和证据包。
whyWeWin:
  - 公司瞄准的是版权方反盗版厂商和通用信任与安全平台之间那道中介工作流缺口。
  - 一张跨客户的惯犯图谱、投诉结果和处罚阶梯数据，能沉淀成专有的执法情报资产。
  - 产品可以叠加在客户已有的匹配工具和人工队列之上落地，这在一个买家需要快速见效的市场里至关重要。
strategicChoices:
  beachhead: 面向印度市场、拥有5万个以上公开群组或频道、原生支持视频或文件转发、每周至少三起影视或体育版权升级投诉、专职信任与安全人员不足15人的消费应用
  wedgeRationale: >-
    这一细分客户群有明确的监管触发点、可量化的投诉量，以及精简的内部团队，因此一次6到12周的试点就能证明行动报告更快、公开场景重复上传更少。
    如果第一步就做版权方下架服务、私域监控或大而全的信任与安全套件，只会拉大范围、削弱验证闭环。
  sequencingRationale: >-
    第一阶段应该叠加在现有的公开场景日志和任何可用的指纹识别工具之上，先证明投诉工作流、实体关联和证据生成的价值，再扩展到更深的原生集成或
    更广的垂直领域。在2到3个付费试点转化之前，招聘要一直偏工程和实施方向；伙伴关系工作要先于大规模销售团队组建，因为当下的不确定性在于买家
    是否会采用，而不在于匹配原语本身是否存在。
  notYet:
    - 版权方一侧的公开网络下架服务
    - 私聊或加密消息扫描
    - 全能型信任与安全审核平台
    - 版权工作流之外的AI媒体溯源与授权合规
market:
  tam: "预估$120.0M的总量市场：全球约400家在即时通讯/社区、UGC视频、直播、创作者和文件分享场景中的平台，乘以约$30万的混合年度合同金额。"
  sam: "预估$10.0M的可服务市场：约40家符合滩头市场画像、与印度相关或以印度为优先市场的平台，乘以约$25万的年度合同金额。"
  som: "预估第三年可获得的$1.8M市场份额：7家生产级客户，乘以约$26万的混合ARR。"
  segments:
    - 面向印度市场、拥有公开场景的社区、社交、粉丝和媒体分享类应用
    - 承载已授权媒体讨论、与本行业风险类似的相邻创作者、论坛、直播和云存储平台
  buyingProcess: >-
    版权方升级投诉、部委整改通知，或计划上线公开转发/频道功能，都应该触发一次付费诊断或一场6到12周的公开场景试点。信任与安全副总裁/负责人
    或法务总监大概率是预算归属方，产品、安全和运营团队则会在生产上线前评审数据访问权限、处罚策略和申诉机制。
product:
  mvp: >-
    MVP应该覆盖单一公开场景，接入投诉工单、公开内容元数据、上传或转发事件，以及管理员/账号标识。它需要能自行计算或导入感知匹配结果、聚合关联
    惯犯，在人工审批下推荐处罚，并自动生成行动报告和可供申诉的审计轨迹。
  sixMonth: >-
    为2到3个共创客户上线投诉门户、案件队列、公开场景连接器、基础哈希匹配接入、惯犯图谱、处罚阶梯，以及行动报告导出功能。
  twelveMonth: >-
    新增角色分级审批、申诉工作流、与检测/审核工具的合作方集成、面向版权方和法务的报告模板，并把前3到5个客户转化为年度生产合同。
  twentyFourMonth: >-
    从印度影视和OTT投诉扩展到体育及相邻创作者平台的版权工作流，同时在现有客户内部新增跨客户情报能力和多场景部署。
  keyBets:
    - 在私域盲区成为主导因素之前，公开场景数据足以证明有意义的重复侵权下降。
    - 买家会更愿意选择叠加在现有匹配和审核工具之上的方案，而不是推倒重来的整套管控体系。
    - 有人工复核的处罚阶梯能把严重误判和申诉率压到足够低，支撑起生产环境的采用。
    - 监管取证证据包的价值足够支撑六位数的年度合同。
gtm:
  wedge: 面向受投诉或上线压力驱动的印度消费应用的6到12周公开场景反盗版尽调试点
  channels:
    - 创始人亲自向印度消费平台的信任与安全、诚信和法务负责人做外呼销售
    - 来自OTT安全团队、网络法律师事务所、反盗版律师和数字政策顾问的转介
    - 与指纹识别、审核和信任与安全厂商的联合销售与集成合作
  funnelTargets: "目标是25%以上的目标客户进入接洽阶段、30%以上的接洽转化为付费诊断或试点、50%以上的试点转化为年度生产合同，并在每个试点第二个月达到90%以上的投诉SLA达标率。"
  pricing: >-
    先从付费诊断或实施项目切入，再转化为按受保护月活用户数、监测公开频道数和筛查版权上传量计价的年度订阅，附带高级报告模块。这样的定价
    锚定在公开场景风险上，也贴合现有的信任与安全、法务和合作方合规预算，而不是按坐席数收费。
businessModel:
  revenueStreams:
    - 付费诊断与实施费
    - 面向生产部署的年度SaaS订阅
    - 高级惯犯情报与证据报告模块
    - 新增场景或投诉量带来的扩容费用
  unitOfValue: 一次覆盖特定公开场景和投诉工作流的生产级平台部署
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一客户内新增更多公开场景、地区或内容品类
    - 追加销售版权方门户、申诉工作流和高级证据导出
    - 把合作方集成转化为转介和实施渠道
    - 把同一套投诉、图谱和报告核心复用到相邻平台品类
strategyMap:
  northStarMetric: 受保护公开场景上按SLA解决、且七天内未再出现同一受保护内容重复上传的投诉数量
  inputMetrics:
    - 从收到投诉到首次执法动作的时长
    - 受监测场景上每部受保护作品的重复上传率
    - 严重处罚的申诉与撤销率
    - 试点转生产的转化率
    - 每次部署中每周活跃的调查员或信任运营用户数
  moatsToBuild:
    - 一张跨客户、覆盖频道、机器人、管理员、账号和指纹的惯犯图谱
    - 一份关联投诉类型、处罚和申诉、重复侵权结果的历史数据集
    - 面向监管机构、法务和版权方、按印度场景打磨的证据模板与工作流基准
    - 让客户能保留现有匹配和审核工具的部署手册
  killCriteria:
    - 首批12个合格目标客户里，愿意做付费诊断或试点的不到3家。
    - 试点未能在90天内让受保护作品的重复上传减少至少25%。
    - 策略调优后，严重处罚的申诉或撤销率仍高于10%。
    - 买家持续拒绝接受高于$15万的年度生产定价。
  mermaid: |
    flowchart LR
      Wedge[印度公开场景合规试点] --> MVP[投诉队列加惯犯图谱加证据导出]
      MVP --> Proof[重复上传更少 报告更快 处罚更稳妥]
      Proof --> Expansion[更多场景 更多地区 相邻版权工作流]
investorMemo:
  verdict:
    call: 观察
    conviction: 真实的监管切口和站得住脚的工作流缺口都在，但客户集中度和未经验证的扩张路径，让这件事在试点转化之前还够不上合伙人会议级别的信心。
    whyBelieve: "公司卖的是一套可衡量的操作系统，对应一项刚刚被明确要求的买家义务：公开场景上的平台级反盗版尽职调查。"
    whyDoubt: 如果只有一小撮与印度相关的平台感受到这种紧迫性，而现有厂商又顺手打包了相邻功能，这个滩头市场可能太窄、也太像咨询业务。
    nextDiligence: 确认2到3个付费共创客户、预算归属方，以及能证明行动报告更快、重复上传率下降、且申诉率可接受的试点证据。
  firstCustomer:
    title: 印度社区或媒体分享类应用中的信任与安全副总裁或法务总监
    profile: 拥有5万个以上公开群组或频道、原生支持视频或文件转发、信任与安全人员不足15人、且持续收到影视或体育版权投诉的平台。
    trigger: 一份部委通知、一次版权方升级投诉，或一次公开转发/频道功能上线，迫使公司对反盗版管控做一次法务复查。
    buyer: 信任与安全副总裁或法务总监
    initialContract: 先做一次6到12周、金额在$2.5万到$6万之间的付费试点，等平台证明投诉处理更快、重复上传更少、报告足够满足监管要求后，转化为约$18万到$30万的年度SaaS订阅加实施费。
  mustBeTrue:
    - 除了最大的几家现有厂商之外，至少有10家与印度相关的平台，其公开场景盗版投诉量足以撑起一份六位数的工作流合同。
    - 信任与安全副总裁或法务总监能在一个季度内，从现有的合规、信任与安全或合作方保护预算里拿到钱。
    - 一次公开场景试点能在90天内把受保护作品的重复上传减少25%以上。
    - 有人工复核的处罚能把严重误判申诉率控制在升级动作的10%以下。
    - 同一套投诉、图谱和证据工作流能扩展到相邻市场，而不需要重建核心产品。
  diligenceQuestions:
    - 除Telegram之外，究竟有多少与印度相关的平台真正达到5万个以上公开场景、每周3起以上投诉的门槛？
    - "谁先签字批预算：信任与安全副总裁、法务总监，还是与OTT关系挂钩的合作方管理负责人？"
    - 平台要开放哪些数据访问权限才能做惯犯图谱分析，安全评审要花多长时间？
    - 买家在采用之前，能接受什么样的误判率、申诉和反通知阈值？
    - "哪条扩张路径最能复用核心产品：体育、创作者社区，还是非印度的公开频道类应用？"
operatingAssumptions:
  - assumption: 除了最大的现有厂商之外，还有足够多与印度相关的滩头市场客户，能支撑起可复制的前十个客户漏斗。
    basis: research.yaml
    validationTest: 建立一份20个客户的目标名单并完成10次接洽电话；至少5家客户需确认每周有3起以上公开场景盗版升级投诉，且愿意评估软件方案。
    decisionImpact: 如果不成立，公司应该收窄到一个更小的、以服务为支撑的细分市场，或将其视为不具备风险投资规模的市场。
  - assumption: 合格买家在试点成功后，愿意接受约$18万到$30万的年度生产定价。
    basis: operator judgment
    validationTest: 在一个范围明确的试点方案之后，向至少5位合格买家展示生产定价；需有2位以上认为这一定价在当前信任与安全或法务预算范围内。
    decisionImpact: 如果不成立，公司必须降低ACV预期、精简产品范围，或改为合作方主导的打包方案。
  - assumption: 公开场景日志和元数据足以识别出买家关心的大多数惯犯案件。
    basis: research.yaml
    validationTest: 在2个试点中验证，公开场景数据本身能识别出客户已知惯犯案件中的至少70%。
    decisionImpact: 如果不成立，产品应该重新定位为报告与工作流基础设施，而不是一套完整的执法操作系统。
  - assumption: 有人工复核的处罚阶梯能把严重处罚的申诉和撤销率控制在生产可接受的阈值以下。
    basis: idea.yaml
    validationTest: 对至少100个升级的试点案例做策略复核，把严重处罚的申诉或撤销率控制在10%以下。
    decisionImpact: 如果不成立，就把自动化限制在投诉分流和证据生成上，而不涉及处罚编排。
  - assumption: 同一套工作流能从印度影视和OTT投诉扩展到相邻版权工作流，而不需要对产品做大规模重写。
    basis: idea.yaml
    validationTest: 访谈10家体育、创作者社区或非印度公开频道类的相邻平台，用同一套演示方案拿下2次跟进方案评审。
    decisionImpact: 如果不成立，就把招聘和融资节奏保持保守，因为公司仍然是一门窄单一市场的生意。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 为印度滩头市场建立并验证一份排序过的目标客户名单。
    hypothesis: 有足够多持续遭遇盗版升级投诉、痛点强烈的客户，能支撑创始人亲自外呼。
    successMetric: 识别出20个目标客户，经接洽后有5个被判定为活跃评估目标。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 在第一个共创客户处，对历史投诉和审核工作流做一次付费诊断。
    hypothesis: 人工投诉处理足够慢、足够零散，一次公开场景试点就能展示出明显改善。
    successMetric: 完成基线指标采集，并签下一份公开场景上的6到12周试点。
    owner: 产品与实施负责人
  - horizon: 0–90 天
    experiment: 在历史公开场景案例上测试惯犯图谱。
    hypothesis: 把频道、机器人、管理员、账号和匹配到的上传内容关联起来，能发现人工审核会遗漏的执法模式。
    successMetric: 在至少50个历史案例中，关联实体数增加20%，或调查时长缩短30%。
    owner: 创始工程负责人
  - horizon: 0–90 天
    experiment: 与平台和版权方审核人员一起验证处罚阶梯和申诉工作流。
    hypothesis: 有人工复核的处罚能减少重复侵权，同时不产生无法接受的误伤风险。
    successMetric: 在试点或模拟复核案例中，严重处罚的申诉或撤销率保持在10%以下。
    owner: 信任与策略负责人
  - horizon: 3–9 个月
    experiment: 集成一家检测原语合作方和一套现有的审核或工作流系统。
    hypothesis: 创业公司可以拥有投诉流程和证据能力，而不必自己重新构建每一个匹配原语。
    successMetric: 首个生产部署在启动后6周内，基于合作方底层技术顺利上线。
    owner: 合作与实施负责人
  - horizon: 6–12 个月
    experiment: 测试试点转生产的转化率和可参考性。
    hypothesis: 一旦平台证明SLA达标率更高、重复上传率更低，买家就会转化。
    successMetric: 前4个试点中有50%以上转化为年度合同，且有2位客户同意作为参考案例。
    owner: 创始人/CEO
operations:
  - 为每一起案件维护一个统一的投诉队列，包含SLA计时、证据附件和策略版本记录。
  - 统一频道、群组、机器人、管理员、账号和受保护内容指纹的实体标识。
  - 每周与客户的信任与法务团队一起复核误判、申诉和处罚校准情况。
  - 为法务、版权方和监管机构打包导出材料，包括行动报告和惯犯历史记录。
  - 管理与检测厂商、审核平台和网络法律师事务所的技术与转介合作关系。
team:
  - role: 创始人/CEO
    startTiming: 第0个月
    rationale: 在一个集中的市场里，亲自主导创始人销售、共创客户招募，并与信任、法务和版权方建立关系。
  - role: 创始工程负责人
    startTiming: 第0个月
    rationale: 构建投诉工作流、公开场景连接器、证据引擎和首批客户部署。
  - role: 产品与实施负责人
    startTiming: 第1个月
    rationale: 把客户各自不同的审核和法务工作流，转化为可复制的实施流程，并守住试点的范围边界。
  - role: 图谱与检测工程师
    startTiming: 第3个月
    rationale: 在试点数据开始进来后，提升实体识别、哈希接入和惯犯分析能力。
  - role: 信任与策略负责人
    startTiming: 第4个月
    rationale: 负责处罚阶梯、申诉和报告模板，这些决定买家是否信任生产环境中的系统。
  - role: 合作与客户负责人
    startTiming: 第9个月
    rationale: 只有在2到3个试点证明部署可复制、预算路径也走得通之后，才新增专职的合作与营收产能。
milestones:
  - horizon: 0–12 个月
    items:
      - 在印度滩头市场签下3个共创客户。
      - 在每个客户的一个公开场景上启动付费试点，使用投诉队列、惯犯图谱和行动报告导出功能。
      - 在试点客户中证明重复上传减少25%以上，或行动报告准备提速50%。
      - 把3到5个平台转化为年度生产合同，并拿下2个参考客户。
      - 与一家检测或审核厂商完成1次合作方协助部署。
  - horizon: 12–24 个月
    items:
      - 达到5到7个生产级客户，并为印度社区和媒体应用建立标准部署手册。
      - 新增版权方门户、申诉工作流和跨客户惯犯情报能力。
      - 在现有客户内扩展到更多公开场景或内容品类，例如体育。
      - 验证1个具有相似工作流经济性的非印度或非影视相邻细分市场。
  - horizon: 24–36 个月
    items:
      - 达到研究测算的第三年目标：约7个生产级客户，潜在ARR约$1.8M。
      - 用同一套投诉、图谱和证据核心，以最小的产品重写代价启动第二个细分市场。
      - 为更多司法辖区和合作渠道建立可复用的合规证据模板。
      - 基于可复制的多客户扩张、而不是一次性的监管紧迫感，决定是否扩充销售团队。
risks:
  - risk: 2026年7月的Telegram整改令没能足够快地扩散到少数几家与印度相关的平台之外。
    likelihood: High
    impact: High
    mitigation: 优先向已经持续面临版权投诉的客户销售，尽快拿下付费诊断，并在扩招之前先验证相邻细分市场。
  - risk: 误判或过度屏蔽损害社区信任，拖慢生产上线进度。
    likelihood: Medium
    impact: High
    mitigation: 在扩大自动化范围之前，先用置信度分级、严重动作人工审批、反通知工作流，并把范围限定在公开场景。
  - risk: 公开场景数据遗漏太多流失渠道，无法体现清晰的执法投资回报。
    likelihood: Medium
    impact: High
    mitigation: 在每个试点里先给已知案例定基线，优先证明惯犯下降和证据质量的价值，如果执法效果提升有限就转向工作流和报告定位。
  - risk: 匹配、审核或平台领域的现有厂商打包足够多的相邻功能，压缩定价空间。
    likelihood: Medium
    impact: High
    mitigation: 牢牢占住惯犯图谱、投诉SLA和监管取证证据这一层，同时与现有检测底层厂商做集成。
  - risk: 预算和采购分散在法务、信任和合作方团队之间，拉长销售周期。
    likelihood: High
    impact: Medium
    mitigation: 找一位高管发起人推动付费诊断，尽早摸清采购决策圈，并让试点成功指标对法务和运营双方都清晰可见。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-4M"
  runwayMonths: 18
  useOfFundsSummary: 为18个月的产品搭建、共创客户导入、策略与申诉工作流、合作方集成，以及创始人主导销售提供资金，目标是拿下3到5个生产级客户、
    拿下参考客户，并在最初的印度影视和OTT切口之外验证一条扩张路径。
