    rationale: 预计约40个与印度相关或以印度为优先市场、符合滩头市场画像的平台，乘以约25万美元的年度合同金额；这一测算锚定在明确的中介审查压力，以及印度国内庞大的OTT和数字媒体使用规模之上。
    isEstimate: true
    sourceRefs:
    - 1
    - 7
    - 8
  som:
    value: $1.8M
    rationale: 第三年可达成的情形是7个客户、试点转化后约26万美元的混合ARR，前提是创始人主导销售，切入痛点最强的印度优先平台及相邻的OTT/社区类应用。
    isEstimate: true
    sourceRefs:
    - 1
    - 8
    - 14
    - 17
