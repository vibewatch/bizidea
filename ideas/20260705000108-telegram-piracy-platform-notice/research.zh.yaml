  value: $250k-$300k
  source: calc
categoryDynamics:
  growthRate: 印度媒体与娱乐行业到2028年复合年增长率超过7%，2025年OTT受众同比增长10%
  growthRateSourceRefs:
  - 6
  - 7
  tailwinds:
  - point: 2025年印度数字媒体市场规模突破1万亿卢比，这让版权流失和平台问责变成了看得见的经济问题。
    sourceRefs:
    - 6
  - point: 印度已经拥有6.012亿OTT用户和1.482亿付费订阅，所以哪怕是一个很窄的平台合规切口，也身处一个巨大的视频生态之中。
    sourceRefs:
    - 7
  - point: 关于印度在线视频经济的研究显示，有效的反盗版措施到2029年最多能把45%的盗版用户转化为合法服务用户。
    sourceRefs:
    - 9
  - point: 成熟平台已经在用自动匹配和防重复上传技术，这验证了一点：只要经济账和风险讲清楚，买家就会把版权管控落到实处。
    sourceRefs:
    - 11
    - 12
    - 13
  headwinds:
  - point: Telegram的公开投诉模式仍然把私聊和私密群组排除在外，这让执法可见度在某些场景上存在结构性缺口。
    sourceRefs:
    - 4
  - point: 大型平台和通用信任与安全厂商已经提供了部分替代方案，比如防重复复制、惯犯政策和审核工作流。
    sourceRefs:
    - 11
    - 12
    - 13
    - 14
  - point: 买家群体足够集中，一些目标客户可能会选择自建，或者只采购范围更窄的外包下架工具。
    sourceRefs:
    - 12
    - 14
    - 17
competitors:
- name: Vobile / Pex
  stage: 现有厂商
  wedge: 面向版权方和社交平台的RightsID、归因、匹配、变现和AI歌曲检测。
  pricing: 企业级/定制
  strength: 深厚的匹配技术栈，加上与版权方和平台之间已经建立的关系。
  weaknessVsUs: 更偏版权方和变现导向，而不是面向监管、服务于聊天和社区类应用的中介尽职调查操作系统。
  sourceRefs:
  - 15
  - 16
  - 24
- name: Red Points
  stage: 成长期厂商
  wedge: AI驱动的反盗版下架服务，覆盖网页、电商平台、社交平台和新片窗口期。
  pricing: 企业级/定制
  strength: 为需要大规模外部执法的版权方提供强大的跨场景下架工作流。
  weaknessVsUs: 更擅长对外执法，而不是充当平台内部记录投诉SLA和惯犯团伙的系统。
  sourceRefs:
  - 17
  - 30
- name: Irdeto
  stage: 现有厂商
  wedge: 面向高端视频、体育、广播和流媒体服务商的反盗版与取证水印。
  pricing: 企业级/定制
  strength: 在体育直播和水印技术上经验深厚。
  weaknessVsUs: 针对内容提供商和广播商做了优化，不是面向正接受中介尽职调查审查的公开频道类消费应用。
  sourceRefs:
  - 18
- name: Checkstep
  stage: 成长期厂商
  wedge: 面向在线平台的AI内容审核与合规工作流。
  pricing: 企业级/定制
  strength: 面向平台信任与安全团队的工作流与合规导向。
  weaknessVsUs: 不是为版权指纹识别、版权方对接或重复上传图谱构建而专门打造的。
  sourceRefs:
  - 14
- name: Audible Magic
  stage: 现有厂商
  wedge: 面向UGC平台的音视频版权合规与识别。
  pricing: 企业级/定制
  strength: 直接瞄准UGC平台的合规需求和匹配准确率。
  weaknessVsUs: 更像是一个检测原语，而不是一整套带处罚、图谱和报告工作流的尽职调查操作系统。
  sourceRefs:
  - 21
regulatoryTechnicalConstraints:
- point: Telegram表示自己只处理针对公开机器人、频道、贴纸包、群组等公开平台内容的版权投诉；私聊不在处理范围内。
  sourceRefs:
  - 4
- point: 2026年7月的这道通知加上中介规则框架，把尽职调查、投诉处理和惯犯应对，变成了平台必须满足的、可审计的流程要求。
  sourceRefs:
  - 1
  - 3
  - 29
- point: 成熟平台的管控手段正越来越多地把自动匹配、防重复复制和惯犯处置结合在一起，这也推高了买家对准确率和申诉处理的期望。
  sourceRefs:
  - 11
  - 12
  - 13
- point: 印度的动态禁令实践意味着客户还需要能导出、提供给律师、版权方、ISP和法院的证据，而不只是内部审核员的日志记录。
  sourceRefs:
  - 27
  - 28
validationSignals:
- point: 印度当局要求Telegram在15天内提交行动报告，并明确将纯被动式下架定性为尽职调查不足。
  sourceRefs:
  - 1
  - 2
- point: EY-IAMAI的报告显示，印度盗版经济规模在2023年达到2240亿卢比，51%的消费者接触盗版内容。
  sourceRefs:
  - 8
- point: IP House表示，有效的反盗版措施到2029年最多能把45%的盗版用户转化为合法服务用户，并能带动约15.8万个新增就业岗位。
  sourceRefs:
  - 9
- point: Telegram表示自己每天封禁数万个群组和频道，并下架数百万条违规内容，这印证了这个问题在平台层面已经是运营级规模。
  sourceRefs:
  - 5
- point: YouTube和TikTok都支持防重复复制或惯犯执法机制，这说明只要工具足够成熟，买家已经能接受平台侧的版权管控。
  sourceRefs:
  - 11
  - 12
  - 13
openQuestions:
- 部委发出的原始通知或标准化的行动报告模板，会不会最终公开？还是说买家大多只能靠非正式的法律顾问渠道和执法压力来了解情况？
- 除了Telegram之外，究竟有多少专注印度市场的平台，同时具备公开频道、文件/视频转发和反复出现的版权方升级事件，达到值得采购企业软件的门槛？
- 在误屏蔽开始伤害社区留存或合作伙伴关系之前，买家能容忍多高的误判率、需要什么样的申诉设计？
- 在私密或加密分享变成主要盗版流失渠道之前，创业公司能在公开平台场景上捕获多少价值？
