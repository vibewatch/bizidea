  adoptionFrictionMatrix:
  - friction: 私密或加密场景部分不在公开版权投诉工作流的覆盖范围内。
    severity: 高
    affectedBuyer: 信任与安全负责人/法务总监
    mitigation: 先聚焦公开频道、机器人、群组、上传/转发场景和用户举报队列，而不是承诺能完全看清私聊内容。
    sourceRefs:
    - 4
  - friction: 误判或合理使用判定不到位，会损害创作者和社区的信任。
    severity: 高
    affectedBuyer: 信任与安全负责人
    mitigation: 采用置信度分级，对严重处罚要求人工审批，并配套与政策版本挂钩的申诉/反通知工作流。
    sourceRefs:
    - 13
    - 21
    - 23
  - friction: 买家可能已经有审核工具，不想再多一个互不相通的独立看板。
    severity: 中
    affectedBuyer: 平台诚信/运营负责人
    mitigation: 把产品定位成版权专项的操作层，接入现有的审核、举报和证据系统，而不是取而代之。
    sourceRefs:
    - 5
    - 11
    - 14
  - friction: 如果监管压力看起来只是针对Telegram个案、而非普遍性威胁，采购流程可能会停滞。
    severity: 高
    affectedBuyer: 法务总监
    mitigation: 先从已经面临投诉压力的共创客户切入，再把量化的人力成本节省和响应时效提升，跟法律风险降低打包一起讲。
    sourceRefs:
    - 1
    - 8
    - 9
