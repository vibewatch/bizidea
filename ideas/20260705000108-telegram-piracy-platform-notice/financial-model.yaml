modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Named accounts + regulatory trigger] --> Pilot[Paid diagnostic / 6-12wk pilot]
      Pilot --> Production[Annual production logo]
      Production --> Revenue[Subscription + expansion revenue]
      Revenue --> GrossProfit[Gross profit at 70% margin]
      GrossProfit --> Cash[Cash runway to Series A]
modelSanity:
  - checkName: Revenue engine
    finding: Revenue is driven by converting India-focused design partners into $240k-$260k annual production contracts, growing from 3 logos in Y1 to 7 logos by Y3 in line with the research.yaml SOM.
  - checkName: Must go right
    finding: Pilot-to-production conversion must hold near the BP's 50%+ funnel target and blended ACV must stay near $240k-$260k, or the modeled CAC ($131k) and 8.7-month payback both deteriorate.
  - checkName: Model breaks if
    finding: If annual logo churn rises materially above the modeled 13% or conversion slips a quarter or two (the downside scenario), modeled cash goes negative (~-$300k) before Y3 close, forcing a bridge round ahead of the planned Series A.
  - checkName: Next-round proof
    finding: Reaching 5-7 production logos with repeatable conversion and 2 reference customers (the Y2 milestone) is the proof point the funding ask targets for the Series A.
sanityChecks:
  ruleOf40: "Y3 exit-ARR growth ~62% (from $1.125M to $1.82M) + EBITDA margin -68% (-$1.15M / $1.69M revenue) = -6pp, well below the 40% bar, expected pre-Series-A for a still-burning compliance workflow that has not yet proven logo repeatability"
  burnMultiple: "Y3 burn multiple ~1.66x ($1.15M net burn / ~$0.70M net new ARR), inside the 1x-2x 'good' range on Bessemer's burn-multiple benchmark"
  revenuePerFte: "~$188k Y3 recognized revenue per FTE (9 FTE; ~$202k on an exit-ARR basis), below the $200k-$400k SaaS benchmark, reflecting a solutions/onboarding-heavy compliance workflow rather than a pure self-serve product"
  flags:
    - "LTV/CAC of 8.9x rests on a 76.9-month (~6.4yr) assumed customer life; BP's own risk list flags logo concentration, so a churn increase toward 25% (downside case) would cut LTV/CAC to roughly 3x"
    - "Revenue assumes only 3 design partners convert to production in Y1 on the BP's stated 6-12 week pilot cadence; a one-quarter slip in conversion timing compresses both Y1 revenue and the Y2 starting ARR base"
    - "The $3.5M raise is modeled to leave only ~$195k cash at Y3 close in the base case against an 18-month minimum runway commitment, so the Series A must close well before Y3 end; the downside scenario shows cash turning negative, requiring a bridge"
    - "Non-payroll opex ($20k-$45k/month) and the 55/30/15 R&D/S&M/G&A split are operator-judgment heuristics, not sourced from BP or research.yaml, and could understate compliance/legal costs for a regulated, cross-border product"
    - "Public-surface-only enforcement scope (per BP notYet list) means revenue growth could stall if buyers require private-chat coverage that this model does not yet price or build for"
