scenarios:
  downside:
    description: >-
      Telegram-order urgency fails to generalize quickly: only 2 design
      partners convert to production in Y1, blended ACV settles near the
      BP's pricing floor, and churn rises toward the higher end of
      early-stage vertical-SaaS norms. Fixed payroll costs from the
      already-hired team keep burning against much thinner revenue.
    y3RevenueK: 650.0
    y3EbitdaK: -1550.0
    cashLowPointK: -300.0
    keyAssumptionChanges:
      - "Only 4-5 production logos by Y3 vs 7 in the base case"
      - "Blended ACV falls to $180k, the low end of BP's stated $180k-$300k range"
      - "Annual logo churn rises to roughly 25% (vs 13% base), per BP's own logo-concentration risk"
      - "Pilot-to-production conversion misses the BP's 50%+ funnel target, delaying signings by a quarter each"
  base:
    description: >-
      3 design partners convert to production in Y1 on the BP's 6-12 week
      pilot cadence, growing to 5 logos by Y2 and 7 logos by Y3 at a
      blended ACV of $250k-$260k, consistent with BP milestones and the
      research.yaml SOM case.
    y3RevenueK: 1690.0
    y3EbitdaK: -1151.49
    cashLowPointK: 194.92
    keyAssumptionChanges:
      - "Matches assumptions A1-A7 and A16 as modeled"
  upside:
    description: >-
      Regulatory pressure generalizes faster than the base case: partner
      co-sell motions and reference customers accelerate conversion, more
      India-linked and adjacent platforms sign, and blended ACV holds near
      the top of BP's pricing range.
    y3RevenueK: 2600.0
    y3EbitdaK: -450.0
    cashLowPointK: 850.0
    keyAssumptionChanges:
      - "10 production logos by Y3 vs 7 in the base case"
      - "Blended ACV rises to $300k, the top of BP's stated $180k-$300k range"
      - "Annual logo churn falls to roughly 8% given strong regulatory stickiness"
      - "Partner-assisted deployments (BP's 3-9 month experiment) cut sales cycle by one quarter"
