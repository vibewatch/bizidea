scenarios:
  downside:
    description: >-
      Telegram整改令的紧迫感未能快速扩散：Y1只有2个共创客户转化为生产合同，混合ACV落到接近BP定价下限的水平，客户流失率也涨向早期垂直SaaS常规区间的
      高端。已经招进来的团队固定薪酬支出，会压在薄得多的收入之上持续燃烧现金。
    y3RevenueK: 650.0
    y3EbitdaK: -1550.0
    cashLowPointK: -300.0
    keyAssumptionChanges:
      - "Y3只有4-5个生产级客户，而不是基准情形的7个"
      - "混合ACV跌到$18万，即BP所述$18万-$30万区间的下限"
      - "年度客户流失率涨到约25%（基准情形为13%），呼应BP自身的客户集中度风险"
      - "试点转生产转化率未达BP 50%以上的漏斗目标，每笔签约延后一个季度"
  base:
    description: >-
      3个共创客户在Y1按BP的6-12周试点节奏转化为生产合同，Y2增长到5个客户，Y3增长到7个客户，混合ACV为$25万-$26万，与BP里程碑和
      research.yaml的SOM测算一致。
    y3RevenueK: 1690.0
    y3EbitdaK: -1151.49
    cashLowPointK: 194.92
    keyAssumptionChanges:
      - "与建模所用的假设A1-A7和A16一致"
  upside:
    description: >-
      监管压力的扩散速度快于基准情形：合作方联合销售和参考客户加速了转化，更多与印度相关及相邻平台签约，混合ACV维持在接近BP定价区间上限的水平。
    y3RevenueK: 2600.0
    y3EbitdaK: -450.0
    cashLowPointK: 850.0
    keyAssumptionChanges:
      - "Y3达到10个生产级客户，而不是基准情形的7个"
      - "混合ACV升到$30万，即BP所述$18万-$30万区间的上限"
      - "得益于强监管粘性，年度客户流失率降到约8%"
      - "合作方协助部署（BP的3-9个月实验项）把销售周期缩短一个季度"
sensitivity:
  - variable: ARPU
    downsideCase: "$18万混合ACV（BP定价下限）"
    baseCase: "$26万混合ACV（research SOM）"
    upsideCase: "$30万混合ACV（BP定价上限）"
    y3RevenueImpactK: 700.0
    cashImpactK: 700.0
  - variable: CAC
    downsideCase: "$18万CAC（销售周期更长，创始人差旅更多）"
    baseCase: "$13.1万CAC（基于建模的Y1销售与市场支出推算）"
    upsideCase: "$9.5万CAC（合作方联合销售降低获客成本）"
    y3RevenueImpactK: 0.0
    cashImpactK: 300.0
  - variable: churn
    downsideCase: "年度客户流失率25%"
    baseCase: "年度客户流失率13%（经验法则，A16）"
    upsideCase: "年度客户流失率8%"
    y3RevenueImpactK: 260.0
    cashImpactK: 180.0
  - variable: sales cycle
    downsideCase: "试点转生产转化率30%（低于BP 50%以上的目标）"
    baseCase: "试点转生产转化率50%（BP gtm.funnelTargets）"
    upsideCase: "试点转生产转化率65%"
    y3RevenueImpactK: 300.0
    cashImpactK: 150.0
  - variable: gross margin
    downsideCase: "60%（人工复核和支持负担更重）"
    baseCase: "70%（BP businessModel.targetGrossMarginPct）"
    upsideCase: "75%（匹配/数据接入自动化程度更高）"
    y3RevenueImpactK: 0.0
    cashImpactK: 170.0
  - variable: hiring pace
    downsideCase: "在收入得到验证前先招进2名FTE，固定成本增加$30万/年"
    baseCase: "按人员编制计划，Q4Y3达到9名FTE"
    upsideCase: "更精简的招聘节省约$20万/年，保住现金跑道"
    y3RevenueImpactK: 0.0
    cashImpactK: 250.0
modelDiagram:
  title: 单位经济流程
  mermaid: |
    flowchart LR
      Leads[目标客户加监管触发点] --> Pilot[付费诊断/6-12周试点]
      Pilot --> Production[年度生产级客户]
      Production --> Revenue[订阅加增购收入]
      Revenue --> GrossProfit[70%毛利率下的毛利]
      GrossProfit --> Cash[通往A轮的现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: 收入靠把与印度相关的共创客户转化为$24万-$26万的年度生产合同来驱动，客户数从Y1的3个增长到Y3的7个，与research.yaml的SOM测算一致。
  - checkName: 必须做对的事
    finding: 试点转生产转化率必须保持在BP 50%以上的漏斗目标附近，混合ACV也必须维持在$24万-$26万左右，否则建模出的CAC（$13.1万）和8.7个月回本周期都会恶化。
  - checkName: 模型失效的条件
    finding: 如果年度客户流失率明显高于建模的13%，或转化延迟一到两个季度（下行情形），建模现金会在Y3收官前转负（约-$30万），迫使公司在计划中的A轮之前先做一轮过桥融资。
  - checkName: 下一轮融资的证明点
    finding: 达到5-7个生产级客户、具备可复制的转化率，并拿下2个参考客户（Y2里程碑），是这笔融资要瞄准的、支撑A轮的证明点。
sanityChecks:
  ruleOf40: "Y3期末ARR增速约62%（从$112.5万到$182万）+ EBITDA利润率-68%（-$115万 / $169万收入）= -6个百分点，远低于40%的门槛；对于一家仍在燃烧现金、且尚未证明客户可复制性的合规工作流公司来说，这在A轮前是预期之内的。"
  burnMultiple: "Y3燃烧倍数约1.66倍（$115万净燃烧 / 约$70万净新增ARR），落在Bessemer燃烧倍数基准的1-2倍'良好'区间内。"
