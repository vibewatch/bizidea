slug: piracy-due-diligence-os
date: "2026-07-05"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: Y1期末生产级客户数
    value: "3"
    unit: count
    source: "[BP milestones 0-12mo：'把3-5个平台转化为年度生产合同'；鉴于BP自身对执行风险的判断，采用低端值]"
  - id: A2
    name: Y2期末生产级客户数
    value: "5"
    unit: count
    source: "[BP milestones 12-24mo：'达到5-7个生产级客户'；采用低端值作为保守增长情形]"
  - id: A3
    name: Y3期末生产级客户数
    value: "7"
    unit: count
    source: "[research.yaml market.som：'第三年可达成7个客户 x 约$260k混合ARR']"
  - id: A4
    name: 每个共创客户的试点/付费诊断费用
    value: "40"
    unit: USD thousands
    source: "[BP investorMemo.firstCustomer.initialContract：'6-12周付费试点，金额在$25k-$60k区间'；采用中位值]"
  - id: A5
    name: Y1生产级年度合同金额（ACV）
    value: "240"
    unit: USD thousands
    source: "[BP investorMemo.firstCustomer.initialContract：'约$180k-$300k年度SaaS加实施费'；采用中位值]"
  - id: A6
    name: Y2混合年度合同金额
    value: "250"
    unit: USD thousands
    source: "[BP fundingAsk/定价区间$180k-$300k，随客户数增长向research SOM的混合ACV靠拢]"
  - id: A7
    name: Y3混合年度合同金额
    value: "260"
    unit: USD thousands
    source: "[research.yaml market.som rationale：'7个客户 x 约$260k混合ARR']"
  - id: A8
    name: 目标毛利率
    value: "70"
    unit: percent
    source: "[business-plan.yaml businessModel.targetGrossMarginPct]"
  - id: A9
    name: Pre-seed融资金额
    value: "3.5"
    unit: USD millions
    source: "[BP fundingAsk.targetFundingRangeUsd：'$3-4M'；采用中位值]"
  - id: A10
    name: 最低承诺现金跑道
    value: "18"
    unit: months
    source: "[BP fundingAsk.runwayMonths]"
  - id: A11
    name: 创始人CEO基本薪酬
    value: "150"
    unit: USD thousands / year
    source: "[创业财务经验法则：pre-seed阶段创始人薪酬通常控制在$120k-$180k以内以节省现金跑道；运营判断，BP/research均无薪酬数据]"
  - id: A12
    name: 专项工程岗位基本薪酬区间（创始工程师、图谱与检测工程师、第二工程师）
    value: "180-190"
    unit: USD thousands / year
    source: "[创业财务经验法则：面向实体识别与检测这类专项岗位的资深/创始工程师市场行情；运营判断，BP/research均无薪酬数据]"
  - id: A13
    name: 全负担人力成本系数
    value: "1.3"
    unit: multiple of base salary
    source: "[创业财务经验法则：薪资税、福利和雇主管理成本通常让基本薪酬再增加1.25-1.35倍，参考Kruze Consulting一类pre-seed薪酬指引]"
  - id: A14
    name: 非人力运营开支（工具、法务/合规、数据基础设施、差旅）
    value: "20 逐步提升至 45"
    unit: USD thousands / month
    source: "[创业财务经验法则：一家3-9人、处理受监管数据的B2B SaaS创业公司，非人力月度消耗通常在$20k-$45k；运营判断，BP/research均无成本数据]"
  - id: A15
    name: Y1运营开支职能分配（研发/销售市场/行政）
    value: "55 / 30 / 15"
    unit: percent of total opex
    source: "[创业财务经验法则：典型种子期垂直SaaS成本分配，与BP sequencingRationale一致：'在2到3个付费试点转化之前，招聘保持工程和实施重心']"
  - id: A16
    name: 月度客户流失率
    value: "1.3"
    unit: percent (~13% annualized)
    source: "[创业财务经验法则：垂直/合规类SaaS客户流失基准（参考SaaS Capital流失率研究），鉴于监管粘性设定低于普通SMB SaaS流失率，但考虑到BP自身'客户集中度'风险提示，不低于10%]"
  - id: A17
    name: Y1混合客户获取成本（CAC）
    value: "131.24"
    unit: USD thousands / logo
    source: "[推导：Y1建模销售与市场支出$393.72k / Y1新签3个客户（A1）]"
  - id: A18
    name: 人员编制计划（岗位与启动时间）
    value: "Y1末6个岗位，Y2末+2个，Y3末+1个"
    unit: count
    source: "[BP team[]中6个Y1岗位的startTiming；Y2/Y3的客户成功、第二工程师和销售/商务拓展负责人属于运营判断的扩招岗位，规模对应BP里程碑中5-7个、随后7个生产级客户的目标]"
  - id: A19
    name: 现金流近似方法
    value: "EBITDA近似等于月度现金流"
    unit: method note
    source: "[运营判断简化：适用于资本支出和营运资金波动都很小的早期软件/服务公司]"
  - id: A20
    name: Pre-seed融资到账时间
    value: "模型起始（第0个月）即完成交割，早于M1"
    unit: timing note
    source: "[运营判断；BP fundingAsk描述的18个月现金跑道目标，只有在招聘和试点爬坡开始前资金已经到账才说得通]"
  - id: A21
    name: 试点费用收入确认方式
    value: "按3个月的试点交付周期平均确认"
    unit: method note
    source: "[运营判断，与BP gtm.wedge一致：'6-12周试点'；为保守确认收入，采用该区间的低端值3个月]"
