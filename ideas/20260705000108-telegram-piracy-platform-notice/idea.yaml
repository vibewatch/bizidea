problem: >-
  Consumer platforms with public channels, bots, and file sharing are usually built to maximize forwarding and creator
  reach, not copyright enforcement. When pirated films or episodes spread, trust teams rely on email notices, manual
  moderator queues, and one-off channel bans while the same admins and bots re-upload the file minutes later. India's
  notice to Telegram shows that this reactive workflow may no longer satisfy intermediary due-diligence obligations.
  Mid-market apps now need system-level anti-piracy controls they can defend to regulators, studios, and OTT partners
  without hiring a large rights-operations team.
targetUser:
  primary: "Heads of trust and safety, platform integrity, and legal compliance at India-focused consumer apps with public channels or group file sharing."
  secondary: "Policy, content-operations, and partner-management leaders handling rights-holder and law-enforcement escalations."
  buyer: "VP Trust and Safety or General Counsel"
startupThesis:
  nonObviousInsight: >-
    Studios already buy vendors to search the open web and send takedowns. The newly scarce budget item is on the
    intermediary side: once regulators say reactive removals are insufficient and demand repeat-offender controls plus
    grievance workflows, the winning product is a platform ops layer that turns scattered piracy incidents into one
    governed enforcement system and auditable action report.
  beachhead: >-
    India-focused consumer apps with 50,000-plus public groups or channels, native video or file forwarding, at least
    three inbound film or sports-rights escalations per week, and fewer than 15 dedicated trust-and-safety staff
  wedge: >-
    A piracy due-diligence OS that fingerprints uploads and forwards, links related channels, bots, admins, and
    accounts into repeat-offender rings, routes complaints into one queue, applies graduated sanctions, and
    auto-generates 15-day compliance evidence
  whyNowCatalyst: >-
    India's July 4 notice gave Telegram 15 days to show platform-level anti-piracy action and explicitly said reactive
    takedowns may fail IT Act due-diligence expectations.
  ventureScalePath: >-
    Start with Indian consumer platforms under copyright scrutiny, then expand the same rights workflow,
    repeat-offender graph, and evidence tooling into global creator communities, cloud storage, forums, live-streaming,
    and eventually AI-generated media provenance and licensing compliance.
solution: >-
  The product integrates into upload, forwarding, public-channel, and bot workflows. It computes perceptual hashes and
  link fingerprints for video and audio files, matches re-uploads even after light edits, and clusters related admins,
  channels, and bots into a repeat-offender graph. Rights holders, OTT partners, and law-enforcement contacts get a
  structured grievance portal with SLA tracking, while trust teams receive sanction playbooks that escalate from
  throttling to channel disablement and admin removal. Every action is logged against policy versions, complaint
  sources, and affected entities, so legal teams can produce an Action Taken Report instead of assembling screenshots
  by hand. Over time, the network learns which fingerprints, admins, and distribution patterns recur across customers,
  improving early detection before a title goes viral.
goToMarketSeed:
  firstCustomer: >-
    VP Trust and Safety or General Counsel at an India-focused video, fandom, or social app with 50,000-plus public
    groups or channels, native file forwarding, fewer than 15 trust-and-safety staff, and recurring piracy complaints
    from film studios or sports-rights owners
  buyingTrigger: >-
    A spike in rights-holder notices, a legal review triggered by the Telegram order, or a planned launch of public
    channels, bots, or media forwarding that raises intermediary-liability concerns
  currentAlternative: >-
    DMCA-style email inboxes, manual moderator queues, blunt keyword or hash blocks, and ad hoc spreadsheets tracking
    repeat offenders
  switchingReason: >-
    The wedge beats manual operations by cutting re-upload whack-a-mole, linking repeat offenders across surfaces, and
    generating regulator-ready evidence far faster than an internal build.
  pricingHypothesis: >-
    Annual SaaS fee based on protected monthly active users, public channels monitored, and copyrighted uploads
    screened, plus setup fees for complaint portal and reporting modules
