      The beachhead is India-centric, but the same intermediary copyright stack can expand across global UGC, creator,
      storage, live-streaming, and AI-media platforms.
topRisks:
  - name: "Buyer concentration"
    description: "The most obvious targets are a small set of Indian consumer platforms, and the largest ones may prefer in-house builds."
    mitigation: "Start with mid-market apps and OTT-adjacent platforms that lack internal rights ops, then expand to other geographies and adjacent community surfaces."
  - name: "False-positive overblocking"
    description: "Aggressive matching or network sanctions could catch legitimate fan use, commentary, or licensed creator uploads and damage community trust."
    mitigation: "Use confidence bands, human approval for severe sanctions, and counter-notice workflows before permanent admin or channel removal."
  - name: "Vendor displacement"
    description: "Fingerprinting, moderation, or cloud-storage incumbents could add lighter piracy modules once the budget becomes visible."
    mitigation: "Own the workflow they lack—repeat-offender entity resolution, complaint SLAs, and action-report evidence—and integrate with incumbent detection vendors rather than compete head-on."
