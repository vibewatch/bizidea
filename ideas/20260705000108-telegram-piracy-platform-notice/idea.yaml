jobsToBeDone:
  - job: >-
      When a rights holder or regulator questions our piracy controls, help our trust and legal team prove system-level
      due diligence, so we can keep channels live and avoid emergency feature shutdowns
    currentAlternative: "Manual evidence gathering from email, dashboards, and moderator notes"
    successMetric: "Days to deliver an Action Taken Report and number of unresolved complaints older than SLA"
  - job: >-
      When pirated video or audio reappears after a takedown, help our platform integrity team find linked admins, bots,
      and channels, so we can stop repeat distribution without overblocking legitimate communities
    currentAlternative: "One-off channel bans and keyword filters"
    successMetric: "Repeat re-upload rate per protected title and moderator hours per complaint"
