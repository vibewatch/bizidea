slug: piracy-due-diligence-os
date: "2026-07-05"
executiveSummary: >-
  India's July 2026 notice to Telegram is concrete evidence that
  intermediary-side anti-piracy due diligence is becoming a software budget,
  not just a moderation chore. The first customer is a VP Trust and Safety or
  General Counsel at an India-focused consumer app with 50,000-plus public
  groups or channels, native media forwarding, recurring film or sports-rights
  complaints, and too little staff to run rights operations manually. The
  product should start as a workflow and evidence layer on public surfaces:
  complaint intake, perceptual-hash or partner-match ingestion,
  repeat-offender graphing across channels, bots, admins, and accounts,
  sanction playbooks, and Action Taken Report exports. That wedge is faster to
  prove than a broad anti-piracy platform because buyers are reacting to a
  regulator or rights-holder trigger and can measure response time, repeat
  re-upload rate, and appeal outcomes inside one pilot. The researched market
  suggests an estimated $10.0M India beachhead and an estimated $120.0M
  broader global platform TAM, which is investable only if the company expands
  beyond one country and one copyright workflow after early proof. The
  competitive opening is not pure matching—incumbents already sell detection
  to rightsholders and generic moderation to platforms—but the governed system
  of record that ties complaints, repeat offenders, sanctions, and audit
  evidence together. The biggest disconfirming risks are logo concentration,
  false-positive overblocking, and the possibility that public-surface data
  alone is insufficient to show meaningful enforcement value without touching
  private sharing. Budget ownership, acceptable production pricing, and the
  degree to which the Telegram order generalizes beyond a handful of Indian
  platforms still need direct validation, so the first 12 months should
  prioritize design-partner conversion over aggressive headcount expansion.
problem:
  - Target platforms still manage piracy with email inboxes, moderator queues, and one-off bans, so the same content and admins reappear faster than the team can respond.
  - Regulators and rights holders now expect proof of repeat-offender controls, grievance handling, and action reporting across public channels, groups, bots, and accounts, which most mid-market apps cannot produce from current tools.
solution:
  - Unify complaint intake, public-surface matching, and entity resolution so trust teams can connect copyrighted uploads, re-uploads, channels, bots, admins, and accounts into one repeat-offender case.
  - Apply policy-based sanctions with human review and export audit-ready Action Taken Reports, SLA histories, and evidence packs for legal, rights-holder, and regulatory stakeholders.
whyWeWin:
  - The company targets the intermediary workflow gap between rightsholder anti-piracy vendors and generic trust-and-safety platforms.
  - A cross-customer graph of repeat offenders, complaint outcomes, and sanction ladders can compound into proprietary enforcement intelligence.
  - The product can land on top of existing matching tools and manual queues, which is critical in a market where buyers need proof fast.
strategicChoices:
  beachhead: India-focused consumer apps with 50,000-plus public groups or channels, native video or file forwarding, at least three film or sports-rights escalations per week, and fewer than 15 dedicated trust-and-safety staff
  wedgeRationale: >-
    This slice has an explicit regulatory trigger, measurable complaint volume,
    and lean internal teams, so a 6-12 week pilot can prove faster Action
    Taken Reports and fewer repeat re-uploads on one public surface.
    Launching first into rightsholder takedown services, private-surface
    monitoring, or a broad trust-and-safety suite would increase scope and
    weaken the proof loop.
  sequencingRationale: >-
    Phase one should overlay existing public-surface logs and any available
    fingerprinting tools to prove complaint workflow, entity linking, and
    evidence generation before the company expands into deeper native
    integrations or broader verticals. Hiring stays engineering- and
    solutions-heavy until 2-3 paid pilots convert, and partnership work comes
    before a large sales team because the current uncertainty is buyer
    adoption, not the existence of matching primitives.
  notYet:
    - Rightsholder-side web takedown services
    - Private chat or encrypted message scanning
    - Full-spectrum trust-and-safety moderation platform
    - AI media provenance and licensing compliance outside the copyright workflow
market:
  tam: "Estimated $120.0M TAM: ~400 global platforms across messaging/community, UGC video, live streaming, creator, and file-sharing surfaces x roughly $300k blended annual ACV."
  sam: "Estimated $10.0M SAM: ~40 India-linked or India-prioritized platforms matching the beachhead profile x roughly $250k annual ACV."
  som: "Estimated $1.8M SOM by year three: 7 production logos x roughly $260k blended ARR."
  segments:
    - India-focused community, social, fandom, and media-sharing apps with public surfaces
    - Adjacent creator, forum, live-streaming, and cloud-storage platforms with similar copyright exposure
  buyingProcess: >-
    A rights-holder escalation, ministry notice, or launch of public
    forwarding/channel features should trigger a paid diagnostic or a 6-12
    week pilot on one public surface. The VP or Head of Trust and Safety or
    the General Counsel is the likely budget owner, while product, security,
    and operations review data access, sanction policy, and appeal controls
    before production rollout.
product:
  mvp: >-
    The MVP should cover one public surface and ingest complaint tickets,
    public content metadata, upload or forward events, and admin/account
    identifiers. It should either compute or import perceptual matches,
    cluster linked offenders, recommend sanctions with human approval, and
    auto-generate an Action Taken Report plus an appeal-ready audit trail.
  sixMonth: >-
    Ship complaint portal, case queue, public-surface connectors, basic
    hash-match ingestion, repeat-offender graph, sanction ladder, and Action
    Taken Report export for 2-3 design partners.
  twelveMonth: >-
    Add role-based approvals, appeal workflow, partner integrations with
    detection and moderation tools, rights-holder and counsel reporting
    templates, and convert the first 3-5 logos to annual production.
  twentyFourMonth: >-
    Extend from India film and OTT complaints into sports and adjacent
    creator-platform rights workflows, while adding cross-customer
    intelligence and multi-surface deployments within existing accounts.
  keyBets:
    - Public-surface data is sufficient to show meaningful repeat-infringement reduction before private-sharing blind spots dominate.
    - Buyers will prefer an overlay on existing matching and moderation tools over a rip-and-replace control stack.
    - Human-reviewed sanction ladders can keep severe false positives and appeals low enough for production adoption.
    - Regulator-ready evidence packs are valuable enough to support six-figure annual contracts.
gtm:
  wedge: 6-12 week public-surface piracy due-diligence pilot for India-focused consumer apps under complaint or launch pressure
  channels:
    - Founder-led outbound to trust-and-safety, integrity, and legal leaders at India-focused consumer platforms
    - Referrals from OTT security teams, cyber-law firms, anti-piracy counsel, and digital policy advisors
    - Co-sell and integration motions with fingerprinting, moderation, and trust-and-safety vendors
  funnelTargets: "Target 25%+ of named accounts to discovery, 30%+ of discoveries to a paid diagnostic or pilot, 50%+ of pilots to annual production, and 90%+ complaint-SLA compliance by month two of each pilot."
  pricing: >-
    Start with a paid diagnostic or setup project, then convert to an annual
    subscription priced by protected monthly active users, public channels
    monitored, and copyrighted uploads screened, with premium reporting
    modules on top. This aligns pricing with public-surface risk and with
    existing trust-and-safety, legal, and partner-compliance budgets rather
    than with seat count.
businessModel:
  revenueStreams:
    - Paid diagnostic and implementation fees
    - Annual SaaS subscription for production deployments
    - Premium repeat-offender intelligence and evidence-reporting modules
    - Expansion fees for additional surfaces or complaint volume
  unitOfValue: One production platform deployment protecting a defined public surface and complaint workflow
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more public surfaces, regions, or content categories within the same customer
    - Upsell rights-holder portals, appeals workflow, and advanced evidence exports
    - Convert partner integrations into referral and implementation channels
    - Reuse the same complaint, graph, and reporting core in adjacent platform categories
strategyMap:
  northStarMetric: Complaints resolved within SLA on protected public surfaces without a repeat upload of the same protected content within seven days
  inputMetrics:
    - Time from complaint receipt to first enforcement action
    - Repeat re-upload rate per protected title on the monitored surface
    - Severe-sanction appeal and reversal rate
    - Pilot-to-production conversion rate
    - Weekly active investigators or trust-ops users per deployment
  moatsToBuild:
    - Cross-customer repeat-offender graph spanning channels, bots, admins, accounts, and fingerprints
    - Historical dataset linking complaint types, sanctions, appeals, and repeat-infringement outcomes
    - India-tuned evidence templates and workflow benchmarks for regulators, counsel, and rights holders
    - Deployment playbooks that let customers keep existing matching and moderation tools
  killCriteria:
    - Fewer than 3 of the first 12 qualified target accounts agree to a paid diagnostic or pilot.
    - Pilots fail to reduce repeat re-uploads on protected titles by at least 25% within 90 days.
    - Severe-sanction appeal or reversal rate stays above 10% after policy tuning.
    - Buyers consistently reject annual production pricing above $150k.
  mermaid: |
    flowchart LR
      Wedge[India public-surface compliance pilot] --> MVP[Complaint queue plus repeat-offender graph plus evidence export]
      MVP --> Proof[Lower re-uploads faster reports safer sanctions]
      Proof --> Expansion[More surfaces more geographies adjacent rights workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: Real regulatory wedge and a credible workflow gap, but logo concentration and unproven expansion keep this below partner-meeting conviction until pilots convert.
    whyBelieve: "The company sells a measurable operating system for a newly explicit buyer obligation: platform-level anti-piracy due diligence on public surfaces."
    whyDoubt: The beachhead may be too narrow or too consulting-like if only a handful of India-linked platforms feel this urgency and incumbents bundle adjacent features.
    nextDiligence: Confirm 2-3 paid design partners, budget ownership, and pilot evidence showing faster Action Taken Reports plus lower repeat re-upload rates without unacceptable appeals.
  firstCustomer:
    title: VP Trust and Safety or General Counsel at an India-focused community or media-sharing app
    profile: A platform with 50,000-plus public groups or channels, native video or file forwarding, fewer than 15 trust-and-safety staff, and recurring film or sports-rights complaints.
    trigger: A ministry notice, rights-holder escalation, or launch of public forwarding or channel features that forces a legal review of anti-piracy controls.
    buyer: VP Trust and Safety or General Counsel
    initialContract: Paid 6-12 week pilot in the $25k-$60k range, converting to roughly $180k-$300k annual SaaS plus setup once the platform proves faster complaint handling, fewer repeat re-uploads, and regulator-ready reporting.
  mustBeTrue:
    - At least 10 India-linked platforms outside the largest incumbents handle enough public-surface piracy complaints to justify a six-figure workflow contract.
    - A VP Trust and Safety or General Counsel can buy from an existing compliance, trust-and-safety, or partner-protection budget within one quarter.
    - One pilot on public surfaces can cut repeat re-uploads on protected titles by 25% or more within 90 days.
    - Human-reviewed sanctions can keep severe false-positive appeals below 10% of escalated actions.
    - The same complaint, graph, and evidence workflow can expand into adjacent markets without rebuilding the core product.
  diligenceQuestions:
    - How many non-Telegram India-linked platforms actually meet the 50,000-plus public-surface and 3-plus weekly complaint threshold?
    - "Which budget owner signs first: VP Trust and Safety, General Counsel, or a partner-management leader tied to OTT relationships?"
    - What data access must a platform grant for repeat-offender graphing, and how long does security review take?
    - What false-positive, appeal, and counter-notice thresholds will buyers accept before adoption stalls?
    - "Which expansion path reuses the core product most cleanly: sports, creator communities, or non-India public-channel apps?"
operatingAssumptions:
  - assumption: Enough India-linked beachhead accounts exist beyond the largest incumbents to support a repeatable first ten-customer pipeline.
    basis: research.yaml
    validationTest: Build a 20-account target list and complete 10 discovery calls; at least 5 accounts must confirm 3 or more public-surface piracy escalations per week and willingness to evaluate software.
    decisionImpact: If false, the company should narrow to a smaller services-backed niche or treat the market as non-venture scale.
  - assumption: Qualified buyers will accept roughly $180k-$300k annual production pricing after a successful pilot.
    basis: operator judgment
    validationTest: Present production pricing to at least 5 qualified buyers after a scoped pilot plan; 2 or more must treat it as inside current trust-and-safety or legal spend.
    decisionImpact: If false, the company must lower ACV expectations, simplify product scope, or shift to a partner-led package.
  - assumption: Public-surface logs and metadata are enough to identify most repeat-offender cases that matter to buyers.
    basis: research.yaml
    validationTest: In 2 pilots, verify that public-surface data alone identifies at least 70% of repeat-offender cases the customer already knows about.
    decisionImpact: If false, the product should be repositioned as reporting and workflow infrastructure rather than a full enforcement operating system.
  - assumption: Human-reviewed sanction ladders can keep severe-action appeals and reversals below a production-safe threshold.
    basis: idea.yaml
    validationTest: Run policy review on at least 100 escalated pilot cases and keep severe-action appeal or reversal rate below 10%.
    decisionImpact: If false, limit automation to complaint routing and evidence generation instead of sanction orchestration.
  - assumption: The same workflow can expand from India film and OTT complaints into adjacent rights workflows without major product rewrite.
    basis: idea.yaml
    validationTest: Interview 10 adjacent platforms in sports, creator communities, or non-India public-channel apps and secure 2 follow-up solution reviews using the same demo.
    decisionImpact: If false, keep hiring and funding conservative because the company remains a narrow single-market business.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Build and validate a ranked target-account list for the India beachhead.
    hypothesis: There are enough high-pain accounts with recurring piracy escalations to support focused founder-led outbound.
    successMetric: 20 named accounts identified and 5 qualified as active evaluation targets after discovery.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run a paid diagnostic on historical complaints and moderator workflow at the first design partner.
    hypothesis: Manual complaint handling is slow and fragmented enough that one public-surface pilot will show measurable improvement.
    successMetric: Baseline metrics captured and a signed 6-12 week pilot on one public surface.
    owner: Product and solutions lead
  - horizon: 0–90 days
    experiment: Test the repeat-offender graph on historical public-surface cases.
    hypothesis: Linking channels, bots, admins, accounts, and matched uploads will uncover enforcement patterns that manual review misses.
    successMetric: 20% more linked entities or 30% faster investigation time across at least 50 historical cases.
    owner: Founding eng
  - horizon: 0–90 days
    experiment: Validate sanction ladder and appeals workflow with platform and rights-holder reviewers.
    hypothesis: Human-reviewed sanctions can reduce repeat infringement without creating unacceptable overblocking risk.
    successMetric: Severe-action appeal or reversal rate stays below 10% in pilot or simulated review cases.
    owner: Trust and policy lead
  - horizon: 3–9 months
    experiment: Integrate one detection-primitives partner and one existing moderation or workflow stack.
    hypothesis: The startup can own complaint flow and evidence without building every matching primitive itself.
    successMetric: First production deployment goes live with partner substrate in under 6 weeks from kickoff.
    owner: Partnerships and solutions lead
  - horizon: 6–12 months
    experiment: Test pilot-to-production conversion and referenceability.
    hypothesis: Buyers will convert when the platform proves better SLA compliance and lower repeat re-upload rates.
    successMetric: 50% or more of the first 4 pilots convert to annual contracts and 2 customers agree to act as references.
    owner: Founder CEO
operations:
  - Maintain one complaint queue with SLA timers, evidence attachments, and policy-version logging for every case.
  - Normalize entity identifiers across channels, groups, bots, admins, accounts, and protected content fingerprints.
  - Run weekly false-positive, appeal, and sanction-calibration reviews with customer trust and legal teams.
  - Package exports for counsel, rights holders, and regulators, including Action Taken Reports and repeat-offender histories.
  - Manage technical and referral partnerships with detection vendors, moderation platforms, and cyber-law firms.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales, design-partner recruitment, and relationship building with trust, legal, and rights-holder stakeholders in a concentrated market.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the complaint workflow, public-surface connectors, evidence engine, and first customer deployments.
  - role: Product and solutions lead
    startTiming: Month 1
    rationale: Translate customer-specific moderation and legal workflows into repeatable onboarding and keep pilots tightly scoped.
  - role: Graph and detection engineer
    startTiming: Month 3
    rationale: Improve entity resolution, hash ingestion, and repeat-offender analytics once pilot data starts arriving.
  - role: Trust and policy lead
    startTiming: Month 4
    rationale: Own sanction ladders, appeals, and report templates that determine whether buyers trust the system in production.
  - role: Partnerships and account lead
    startTiming: Month 9
    rationale: Only add dedicated partner and revenue capacity after 2-3 pilots prove a repeatable deployment and budget path.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 design partners in the India beachhead.
      - Launch paid pilots on one public surface each using complaint queue, repeat-offender graph, and Action Taken Report export.
      - Prove 25% or better repeat re-upload reduction or 50% faster Action Taken Report preparation on pilot accounts.
      - Convert 3-5 platforms to annual production contracts and secure 2 reference customers.
      - Complete 1 partner-assisted deployment with a detection or moderation vendor.
  - horizon: 12–24 months
    items:
      - Reach 5-7 production logos and standard deployment playbooks for India-focused community and media apps.
      - Add rights-holder portal, appeals workflow, and cross-customer repeat-offender intelligence.
      - Expand within existing customers to additional public surfaces or content categories such as sports.
      - Validate 1 adjacent non-India or non-film segment with similar workflow economics.
  - horizon: 24–36 months
    items:
      - Reach the researched year-three case of about 7 production logos and roughly $1.8M ARR potential.
      - Launch a second segment using the same complaint, graph, and evidence core with minimal product rewrite.
      - Build reusable compliance evidence templates for additional jurisdictions and partner channels.
      - Decide whether to scale sales headcount based on repeatable multi-logo expansion rather than one-off regulatory urgency.
risks:
  - risk: The July 2026 Telegram order does not generalize fast enough beyond a few India-linked platforms.
    likelihood: High
    impact: High
    mitigation: Focus initial selling on logos already facing recurring rights complaints, secure paid diagnostics quickly, and validate adjacent segments before scaling headcount.
  - risk: False positives or overblocking harm community trust and slow production rollout.
    likelihood: Medium
    impact: High
    mitigation: Use confidence bands, human approval for severe actions, counter-notice workflows, and public-surface-only scope before widening automation.
  - risk: Public-surface data misses too much leakage to show clear enforcement ROI.
    likelihood: Medium
    impact: High
    mitigation: Baseline known cases in each pilot, prove value on repeat-offender reduction and evidence quality first, and reposition toward workflow and reporting if enforcement lift is weak.
  - risk: Matching, moderation, or platform incumbents bundle enough adjacent functionality to compress pricing.
    likelihood: Medium
    impact: High
    mitigation: Own the repeat-offender graph, complaint SLAs, and regulator-ready evidence layer while integrating with incumbent detection substrates.
  - risk: Budget and procurement are fragmented across legal, trust, and partner teams, extending sales cycles.
    likelihood: High
    impact: Medium
    mitigation: Sell a paid diagnostic with an executive sponsor, map the buying center early, and make pilot success metrics legible to both legal and operations stakeholders.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-4M"
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of product build, design-partner onboarding, policy and appeals workflow, partner integrations, and founder-led sales to reach 3-5 production logos, secure reference accounts, and validate one expansion path beyond the initial India film and OTT wedge.
