jobsToBeDone:
  - job: >-
      当版权方或监管机构质疑我们的盗版管控时，帮我们的信任与法务团队证明系统层面的尽职调查，这样才能保住频道正常运转，避免被迫紧急下线功能
    currentAlternative: "从邮件、仪表盘和审核笔记里手工收集证据"
    successMetric: "交付行动报告所需天数，以及超过SLA仍未解决的投诉数量"
  - job: >-
      当盗版音视频在下架后又卷土重来时，帮我们的平台诚信团队找出关联的管理员、机器人和频道，这样才能阻止重复传播，同时不误伤正常社区
    currentAlternative: "一次性频道封禁和关键词过滤"
    successMetric: "每部受保护作品的重复上传率，以及每起投诉耗费的审核工时"
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      五篇经核实的7月4日报道、一份明确的15天整改令，以及关于平台问责的明确措辞，即便当下的采购窗口只在印度打开，这仍然是一个强信号。
  painIntensity:
    score: 5
    rationale: >-
      一旦被动下架被定性为尽职调查不足，盗版就会持续带来版权方压力、审核负担和实实在在的法律风险。
  wedgeClarity:
    score: 5
    rationale: >-
      面向公开频道和文件分享类应用的惯犯图谱，加上投诉与行动报告工作流，是一个范围窄、可验证、且由监管触发的切入产品。
  defensibility:
    score: 4
    rationale: >-
      处罚结果、指纹复用数据和深度的投诉工作流集成能逐步垒成护城河，不过部分检测能力可能被更大的厂商复制。
  ventureScale:
    score: 4
    rationale: >-
      滩头市场以印度为中心，但同一套中介版权技术栈可以扩展到全球的UGC、创作者、存储、直播和AI媒体平台。
topRisks:
  - name: "买家集中度风险"
    description: "最明显的目标客户只是一小撮印度消费平台，而其中最大的几家可能更倾向于自建。"
    mitigation: "先从缺乏内部版权运营能力的中型应用和OTT相邻平台切入，再扩展到其他地区和相邻社区场景。"
  - name: "误判导致的过度屏蔽"
    description: "过于激进的匹配或联动处罚，可能误伤正当的粉丝二创、评论或已获授权的创作者上传内容，损害社区信任。"
    mitigation: "采用置信度分级、严重处罚要经人工审批，并在永久移除管理员或封禁频道之前设置反通知流程。"
  - name: "被厂商替代的风险"
    description: "一旦预算浮出水面，指纹识别、审核或云存储领域的现有厂商可能会顺手加一个轻量版盗版模块。"
    mitigation: "抓住他们缺的那部分工作流——惯犯实体识别、投诉SLA和行动报告证据——并与现有检测厂商做集成，而不是正面硬刚。"
