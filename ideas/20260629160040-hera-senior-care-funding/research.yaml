competitors:
- name: Wellthy
  stage: scale-up
  wedge: Health-plan and employer care concierge with proprietary care network and member-support team.
  pricing: Custom enterprise pricing; not public.
  strength: Strong care-network depth, health-plan positioning, and ROI narrative.
  weaknessVsUs: More services-led and member-facing than a neutral operating system sold to third-party coordination teams.
  sourceRefs:
  - 21
  - 22
- name: Homethrive
  stage: scale-up
  wedge: Digital-plus-human caregiving support for health plans and employers.
  pricing: Custom enterprise pricing; not public.
  strength: Broad caregiving surface area and payer language around care gaps and avoidable hospitalizations.
  weaknessVsUs: Positioning centers on family support and outcomes, not the internal fulfillment workflow of a care-ops team.
  sourceRefs:
  - 23
- name: DUOS
  stage: scale-up
  wedge: Member activation and navigation platform for Medicare Advantage plans and aging-related benefits.
  pricing: Custom enterprise pricing; not public.
  strength: Clear MA activation wedge and cross-geography navigation language.
  weaknessVsUs: Closer to front-end activation and navigation than end-to-end provider-matching and case-fulfillment workflow.
  sourceRefs:
  - 24
  - 76
- name: Papa
  stage: scale-up
  wedge: In-home companion care and social-care platform sold to MA, Medicaid, and special-needs plans.
  pricing: Custom enterprise pricing; not public.
  strength: Strong payer distribution, in-home signal collection, and reporting back to client plans.
  weaknessVsUs: Optimized around Papa-delivered labor and member interactions, not neutral multi-vendor fulfillment for operator teams.
  sourceRefs:
  - 25
  - 26
- name: Cariloop
  stage: scale-up
  wedge: Employer-first caregiver platform combining coaching, backup care, and vetted provider access.
  pricing: Custom enterprise pricing; not public.
  strength: Concrete provider-network and coaching wedge with outcome-oriented case studies.
  weaknessVsUs: More employer-benefit oriented than payer-backed eldercare benefit-fulfillment software for multistate operators.
  sourceRefs:
  - 27
  - 28
