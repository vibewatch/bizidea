openQuestions:
- How many payer-backed eldercare coordination operators currently manage more than 1,000 active families and two-plus state launches per year?
- 'Which service categories consume the most coordinator time: benefits verification, home care sourcing, transportation, placement, or family follow-through?'
- How much provider-performance and task-completion data can buyers contractually retain and reuse across payer relationships?
- Will plans buy neutral workflow software directly, or require it to arrive through delegated-service vendors and integration partners?
