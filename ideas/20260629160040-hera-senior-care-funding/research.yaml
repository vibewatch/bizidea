  adoptionFrictionMatrix:
  - friction: Benefit-rule and eligibility ingestion
    severity: high
    affectedBuyer: Care-operations and implementation leaders
    mitigation: Start with a constrained payer/state template library and use FHIR-based eligibility checks where plans expose APIs.
    sourceRefs:
