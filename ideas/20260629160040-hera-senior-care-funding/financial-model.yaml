scenarios:
  downside:
    description: Budget ownership stays indirect and template reuse slips, so the company finishes Y3 at 12 active paid deployments with lower blended value and materially more manual implementation work.
    y3RevenueK: 2180.0
    y3EbitdaK: -482.9
    cashLowPointK: 56.2
    keyAssumptionChanges:
    - Y1 exits with 2 paid deployments, Y2 with 6, and Y3 with 12 instead of 15.
    - Blended annual ARPU falls from $260K to $240K as more revenue stays in narrower pilot or single-state scope.
    - Gross margin settles at 66% because reusable state and payer templates do not cut launch effort fast enough.
  base:
    description: Founder-led selling plus one partnerships hire converts the first operator pilots into repeatable multi-state deployments and grows the business to 15 active paid deployments by Y3 exit.
    y3RevenueK: 3109.3
    y3EbitdaK: 138.6
    cashLowPointK: 875.2
    keyAssumptionChanges:
    - Deployment counts follow A6, A7, and A8, reaching 8 paid deployments by Y2 exit and 15 by Y3 exit.
    - Blended annual ARPU stays at $260K while gross margin holds at 69%, slightly below the business-plan target until template reuse matures.
    - The team reaches 9 end-of-Y3 FTE, adding product, CS, compliance, and workflow hires only after early pilots prove repeatability.
  upside:
    description: Reference deployments and partner referrals pull conversions forward enough to reach 20 active paid deployments by Y3 exit at slightly higher value and cleaner implementation economics.
    y3RevenueK: 4503.4
    y3EbitdaK: 1065.8
    cashLowPointK: 1387.3
    keyAssumptionChanges:
    - Y1 exits with 4 paid deployments, Y2 with 12, and Y3 with 20 as partner-sourced expansion arrives earlier than planned.
    - Blended annual ARPU rises from $260K to $280K as benchmark reporting and multi-state scope attach faster.
    - Gross margin improves from 69% to 71% because the launch-template library sharply reduces manual data cleanup.
sensitivity:
- variable: ARPU
  downsideCase: Blended annual ARPU settles at $240K because buyers keep more scope inside paid pilots and narrower first-state launches.
  baseCase: Modeled ARPU stays at $260K per active paid deployment.
  upsideCase: ARPU reaches $280K as benchmark reporting and multi-state expansions attach earlier.
  y3RevenueImpactK: -239.3
  cashImpactK: -244.7
- variable: CAC
  downsideCase: Effective CAC rises toward roughly $110K as travel, security review, and founder hand-holding keep S&M intensity closer to 5.5% of revenue.
  baseCase: Modeled CAC stays near $88.5K per new paid deployment.
  upsideCase: CAC falls toward roughly $75K once reference accounts and partner channels create warmer introductions.
  y3RevenueImpactK: 0.0
  cashImpactK: -45.6
- variable: churn
  downsideCase: Renewal and expansion behavior looks like the company exits Y3 two paid deployments lower because the workflow stays less embedded.
  baseCase: The base path assumes sticky annual renewals and uses 1.6% monthly churn only for unit-economics math.
  upsideCase: Retention behaves like the company exits Y3 two deployments higher because service-start improvements create stronger renewal proof.
  y3RevenueImpactK: -357.6
  cashImpactK: -268.3
- variable: sales cycle
  downsideCase: Each new deployment lands about a quarter later because procurement, BAA review, and data audit steps stretch the pilot-to-production path.
  baseCase: The base case assumes paid pilots close in 8-12 weeks and convert promptly when launch pain is acute.
  upsideCase: Reference deployments compress the cycle by about a quarter and pull partner-sourced expansions forward.
  y3RevenueImpactK: -216.7
  cashImpactK: -244.2
- variable: gross margin
  downsideCase: Gross margin stays near 67% because provider-data cleanup and launch support remain more manual.
  baseCase: Gross margin reaches 69%, still slightly below the 70% business-plan target.
  upsideCase: Gross margin reaches 71% as reusable benefit-rule and launch templates reduce custom work.
  y3RevenueImpactK: 0.0
  cashImpactK: -98.9
- variable: hiring pace
  downsideCase: Product, CS, and workflow hires must be pulled forward 3-6 months because launches stay bespoke for longer.
  baseCase: The team follows the staged hiring plan and only adds support roles after pilots prove template reuse.
  upsideCase: One later-stage hire can slip a quarter because launch playbooks stay templated enough to avoid extra overhead.
  y3RevenueImpactK: 0.0
  cashImpactK: -201.4
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Pipeline[Founder and partner pipeline] --> PaidDeployments[Paid pilots and launch deployments]
      PaidDeployments --> AnnualContracts[Annual production subscriptions]
      AnnualContracts --> Revenue[Revenue per active paid deployment]
      Revenue --> GrossProfit[Gross profit after delivery and hosting]
      GrossProfit --> Cash[Cash that funds template reuse and expansion]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue grows by expanding active paid deployments from 3 at Y1 exit to 15 at Y3 exit at about $260K of blended annual value each.
- checkName: Must go right
  finding: The first operator pilots must turn into reusable state and payer templates so second deployments land faster and keep gross margin near 69%.
- checkName: Model breaks if
  finding: If pilot conversion, data-retention rights, or template reuse slip toward the downside case, cash compresses toward roughly $56K before Y3 ends.
- checkName: Next-round proof
  finding: A credible seed story appears once the business reaches 8 paid deployments, benchmark reporting across early accounts, and one plan-side design partner with visible cash buffer left.
sanityChecks:
  ruleOf40: Y3 growth 112.6% + EBITDA margin 4.5% = 117.1% (strong directionally, though helped by a small Y2 base).
  burnMultiple: About 0.4x in Y2 on roughly $1300.0K of net new ARR, then EBITDA turns positive in Y3 while adding about $1820.0K of net new ARR.
  revenuePerFte: $346K Y3 revenue per end-of-year FTE (inside the rough $200K-$400K early enterprise SaaS benchmark).
  flags:
  - The base case counts paid deployments rather than pure logos, so Y2-Y3 growth depends on early accounts expanding into additional states or payer lines rather than staying single-scope.
  - The researched beachhead is only about 100 buyer accounts, so missing the operator wedge or the plan-direct expansion path would cap the market faster than the topline alone suggests.
  - Gross margin only holds if the company actually achieves the business-plan milestone of cutting second-deployment effort by more than 50%; otherwise implementation headcount pulls forward.
  - The downside scenario ends near the cash floor, so any slip in pilot conversion, procurement timing, or data-retention permissions likely forces an earlier raise.
