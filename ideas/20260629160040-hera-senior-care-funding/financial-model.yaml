slug: eldercare-benefit-fulfillment-os
date: '2026-06-29'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[business-plan.yaml date] first full operating month after the 2026-06-29 plan date.'
- id: A2
  name: Opening cash after pre-seed close
  value: '2000'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd; startup-finance heuristic] modeled at the bottom of the stated $2-4M range because the base case stays under 8 FTE through Y2 exit and reaches positive EBITDA in Y3.'
- id: A3
  name: Revenue unit
  value: Active paid deployment (pilot or production state/payer-line launch)
  unit: definition
  source: '[business-plan.yaml gtm.pricing; businessModel.revenueStreams] each paid pilot or annual production deployment is separately budgeted and billed, so deployment is the cleanest counted customer unit.'
- id: A4
  name: Blended annual ARPU per active paid deployment
  value: '260'
  unit: USDK/deployment-year
  source: '[business-plan.yaml investorMemo.firstCustomer.initialContract; businessModel.revenueStreams; research.yaml market.sam] set inside the $180K-$300K annual production range and still below the roughly $500K value envelope implied by 2,500 families times the researched $200 family-year software value.'
- id: A5
  name: Revenue recognition timing
  value: Midpoint customer count within each month or quarter
  unit: policy
  source: '[startup-finance heuristic] new paid deployments are assumed to land halfway through the period on average.'
- id: A6
  name: Y1 month-end deployment path
  value: 0,0,0,1,1,1,2,2,2,3,3,3
  unit: active paid deployments
  source: '[business-plan.yaml milestones 0-12 months; gtm.funnelTargets] matches 3 paid pilots signed in the first year with at least 2 converting or still paid by year end.'
- id: A7
  name: Y2 quarter-end deployments
  value: Q1Y2 4; Q2Y2 5; Q3Y2 7; Q4Y2 8
  unit: active paid deployments
  source: '[business-plan.yaml milestones 12-24 months; strategicChoices.sequencingRationale] reflects 2 expansions inside early customers, 2-3 new operator deployments, and 1 plan/delegated-services design partner by Y2 exit.'
- id: A8
  name: Y3 quarter-end deployments
  value: Q1Y3 10; Q2Y3 12; Q3Y3 13; Q4Y3 15
  unit: active paid deployments
  source: '[business-plan.yaml milestones 24-36 months; research.yaml market.som] 15 paid deployments correspond to roughly 10-12 logos plus multi-state expansions, staying inside the researched 20-account SOM ceiling.'
- id: A9
  name: Modeled gross margin
  value: '69'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct; operatingAssumptions template reuse] modeled 1 point below the 70% target until second-deployment effort is proven to compress materially.'
- id: A10
  name: Monthly churn for unit economics
  value: '1.6'
  unit: percent
  source: '[startup-finance heuristic] enterprise workflow software with annual contracts should be sticky, but procurement and budget ownership are still unproven enough to avoid assuming sub-1% churn.'
- id: A11
  name: Founder/CEO loaded cash compensation
  value: '150'
  unit: USDK/year
  source: '[business-plan.yaml team Founder/CEO; startup-finance heuristic] below-market founder cash comp plus payroll taxes and benefits for an enterprise-healthcare pre-seed company.'
- id: A12
  name: Founding eng loaded cash compensation
  value: '190'
  unit: USDK/year
  source: '[business-plan.yaml team Founding eng; startup-finance heuristic] senior full-stack / integration builder for the initial rules engine, reporting layer, and secure integrations.'
- id: A13
  name: Care ops implementation lead loaded cash compensation
  value: '145'
  unit: USDK/year
  source: '[business-plan.yaml team Care ops implementation lead; startup-finance heuristic] domain-heavy operations hire who helps turn workflows into reusable launch templates.'
- id: A14
  name: Data and network operations lead loaded cash compensation
  value: '150'
  unit: USDK/year
  source: '[business-plan.yaml team Data and network operations lead; startup-finance heuristic] provider-data QA and closed-loop outcome owner needed before benchmark reporting compounds.'
- id: A15
  name: Partnerships lead loaded cash compensation
  value: '170'
  unit: USDK/year
  source: '[business-plan.yaml team Partnerships lead; startup-finance heuristic] early partner / channel seller added only after the first operator deployment is referenceable.'
- id: A16
  name: Product engineer loaded cash compensation
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml product twelveMonth; startup-finance heuristic] additional workflow and analytics capacity needed once the company has 2+ production customers and is productizing template reuse.'
- id: A17
  name: Customer success / implementation manager loaded cash compensation
  value: '135'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months; startup-finance heuristic] post-sale owner for multi-state expansions and renewals once deployments rise above the founder-led phase.'
- id: A18
  name: Ops / compliance manager loaded cash compensation
  value: '120'
  unit: USDK/year
  source: '[business-plan.yaml operations; research.yaml regulatoryTechnicalConstraints; startup-finance heuristic] BAA, auditability, and contract-administration hire added before direct plan expansion.'
- id: A19
  name: Workflow engineer loaded cash compensation
  value: '175'
  unit: USDK/year
  source: '[business-plan.yaml product twentyFourMonth; startup-finance heuristic] extra engineering depth for direct-plan and adjacent-workflow expansion after the operator wedge is proven.'
- id: A20
  name: Hiring cadence
  value: Founder/CEO and founding eng M1; care ops implementation lead M3; data and network operations lead M5; partnerships lead M10; product engineer M15; customer success / implementation manager M20; ops / compliance manager M24; workflow engineer M31
  unit: timing
  source: '[business-plan.yaml team; milestones; strategicChoices.sequencingRationale; startup-finance heuristic] product, CS, and compliance hires land only after early pilot proof and before plan-direct expansion.'
- id: A21
  name: Functional payroll allocation
  value: Founder/CEO 60% S&M / 40% G&A; founding eng 100% R&D; care ops implementation lead 40% R&D / 60% G&A; data and network operations lead 70% R&D / 30% G&A; partnerships lead 100% S&M; product engineer 100% R&D; customer success / implementation manager 25% S&M / 75% G&A; ops / compliance manager 100% G&A; workflow engineer 100% R&D
  unit: allocation
  source: '[business-plan.yaml team rationales; operations] allocation follows who sells the wedge, who templates launches, who owns post-sale delivery, and who carries compliance overhead.'
- id: A22
  name: Non-payroll operating spend
  value: Y1 S&M 9K + 4.0% of revenue monthly, R&D 5K + 0.50K per average deployment monthly, G&A 6K + 0.25K per average deployment monthly; Y2 S&M 11K + 4.5% of revenue, R&D 7K + 0.65K per average deployment, G&A 8K + 0.35K per average deployment; Y3 S&M 13K + 4.5% of revenue, R&D 8K + 0.80K per average deployment, G&A 9K + 0.45K per average deployment.
  unit: USDK/month
  source: '[startup-finance heuristic] covers founder travel, partner enablement, cloud/tooling, provider-data QA, legal, accounting, insurance, and BAA/compliance overhead for a healthcare-enterprise workflow motion.'
- id: A23
  name: Cash conversion policy
  value: EBITDA approximates operating cash movement
  unit: policy
  source: '[startup-finance heuristic] no debt, taxes, capex, or working-capital timing benefits are modeled at this stage.'
- id: A24
  name: Blended CAC per new paid deployment
  value: '88.5'
  unit: USDK/new paid deployment
  source: Calculated from modeled Y2-Y3 sales and marketing spend of 1061.6K divided by 12 net new paid deployments.
- id: A25
  name: Funding milestone
  value: 8 active paid deployments, benchmark reporting live, second-deployment effort cut by more than 50%, and 1 plan-side design partner
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] used to size the pre-seed round plus a 6-month buffer.'
- id: A26
  name: Buffer policy
  value: 6 months of post-milestone cash reserve
  unit: policy
  source: '[startup-finance heuristic; financial-modeler instruction] buffer is sized for procurement, compliance, or implementation slippage before the next round.'
