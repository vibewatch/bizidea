    - 提升匹配质量和服务启动时效
    - 建设保险方报告和 ROI 分析能力
  keyPartners:
    - 保险公司及委托照护合作伙伴
    - 居家照护、交通出行和老年居住网络
    - 电子病历和照护管理集成服务商
  costStructure:
    - 产品与工作流工程
    - 网络数据运营与质控
    - 客户成功与实施
    - 安全合规
jobsToBeDone:
  - job: >-
      当我们在新州上线老年照护协调服务时，帮助护理运营团队快速建立本地服务提供方覆盖和可复制工作流，让团队能在不按家庭增速同比扩招协调员的前提下消化增长。
    currentAlternative: 通用 CRM 模板、表格和手工服务提供方调研
    successMetric: 从州级上线到第一个已完结家庭案例的天数，以及每位护理顾问服务的活跃家庭数
  - job: >-
      当一个高需求家庭在健康事件后需要居家支持时，帮助护理顾问核验保障覆盖、分配后续步骤、对接合适的本地服务，让顾问能更快结案，并向保险方提供清晰的审计记录。
    currentAlternative: 电话、共享收件箱，以及散落在案例管理工具中的备注
    successMetric: 从接入到首次预约服务的时长，以及在 SLA 内完成的任务比例
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      该集群汇聚了真实融资、具名扩张州、用户量和留存率，但由于所有证据均来自单一融资报道，置信度有上限。
  painIntensity:
    score: 5
    rationale: >-
      产品处于保险方承诺、家庭压力与碎片化本地供给的交汇点，任何流程失误都同时造成情感痛苦和经济损失。
  wedgeClarity:
    score: 5
    rationale: >-
      切入产品具体明确：面向多州老年照护协调运营商的福利履约与服务提供方路由工作流。
  defensibility:
    score: 4
    rationale: >-
      各州专属的保障逻辑、服务提供方转化数据，以及嵌入式运营工作流，一旦平台在多个市场管理真实家庭案例，将形成可观的护城河。
  ventureScale:
    score: 4
    rationale: >-
      滩头市场较窄，但同一运营层可扩展至保险公司自有照护管理、家庭医疗转介、老年居住安置和 Medicaid LTSS 工作流。
topRisks:
  - name: 服务利润率陷阱
    description: >-
      客户可能认为老年照护协调天生定制化，持续增加人手而不愿把工作标准化到软件中。
    mitigation: >-
      优先向已感受到护理顾问产能压力的运营商销售，按已服务活跃家庭数定价，先证明服务启动时效和案例负荷改善，再尝试扩大工作流覆盖面。
  - name: 保险方 ROI 不明确
    description: >-
      保险公司可能认可方向，但若医疗支出下降或留存收益尚不可见，则对扩大预算持观望态度。
    mitigation: >-
      首单销售锚定运营商的生产效率、SLA 合规和家庭留存指标，待工作流嵌入后再叠加保险方结果报告。
  - name: 本地供应数据碎片化
    description: >-
      服务提供方的可用性、服务质量和保障细节因州而异，可能削弱推荐质量并拖慢实施进度。
    mitigation: >-
      从少数高量服务品类和上线州切入，再从真实转介结果中构建闭环服务提供方评分，而非依赖静态名录。
