problem: >-
  保险方资助的老年照护协调表面上是个案管理服务，真正的难点在于把家庭的混乱局面转化为已完成的本地服务。护理顾问必须核验保障覆盖、收集家庭情况、对接服务提供方、协调家庭成员分工，并在不同州记录服务结果——而大多数团队仍靠通用 CRM、表格和电话运转。一旦服务商从服务数百个家庭扩张至全国布局，每一个手工交接环节都会演变成利润损失、质量参差和审计风险。
targetUser:
  primary: >-
    保险方资助型老年照护协调公司的护理运营 VP，负责在多个州服务老年人及家庭照护者
  secondary: >-
    将老年照护协调作为会员权益提供的区域保险公司的照护管理 VP 或委托服务负责人
  buyer: 多州老年照护协调服务商的 COO 或护理运营 VP
startupThesis:
  nonObviousInsight: >-
    老年照护领域的稀缺资产不是又一个面向护理员的 App，也不是更大的呼叫中心。当保险方开始为协调服务买单、家庭以高留存率持续参与之后，真正的瓶颈就落在了保险方、护理顾问、家庭与碎片化本地服务供给之间的履约层。胜出者将掌握运营数据——哪些干预能让家庭最快用上服务、哪些本地服务提供方真正能促成服务落地。
  beachhead: >-
    保险方资助的老年照护协调服务商，拥有 25–100 名护理顾问、1,000–5,000 个活跃家庭，并计划在 12 个月内从现有 3–8 个州扩入两个及以上新州
  wedge: >-
    福利履约工作流——核验保障覆盖、对接本地服务提供方、分配家庭和护理顾问任务，并为每个协调案例生成保险方可用的案例摘要
  whyNowCatalyst: >-
    Hera 同时具备逾千个服务家庭、95% 留存率和年底覆盖 25 个以上州的目标，表明老年照护协调正从精品服务跃升为多州保险方履约品类，而专用软件尚属空白。
  ventureScalePath: >-
    从老年照护协调服务商起步，逐步扩展至区域保险公司、以老年人为主的全科医疗机构、家庭医疗转介网络、老年居住安置运营商，以及 Medicaid LTSS 项目，成为非临床家庭照护履约的操作系统。
solution: >-
  产品为老年照护协调团队提供统一工作台，涵盖接入评估、保障核验、服务匹配、任务分配和保险方报告。家庭接入流程采集家庭状况，规则层再按需求类型、紧迫程度、计划保障范围和所在州路由案例。护理顾问从队列中工作，系统推荐本地居家照护、交通出行、老年居住和护理员支持方案，同时在统一时间轴上追踪每个转介和家庭任务。管理者可看到哪些服务提供方真正促成服务、哪些州人手不足、哪些案例在服务启动前陷入停滞。最终构建一套可复制的照护运营引擎，让每位顾问服务更多家庭，不再把工作埋进电话和表格。
goToMarketSeed:
  firstCustomer: >-
    保险方资助的老年照护协调服务商 COO，旗下约 1,500 个活跃家庭、40–80 名护理顾问，下一计划年已排队两个新州上线
  buyingTrigger: >-
    新保险公司合同或新州上线，迫使运营团队在不等比例增加护理顾问的前提下建立本地服务提供方覆盖、福利规则和质控体系
  currentAlternative: >-
    通用照护管理 CRM、表格、共享服务提供方名录，以及通过呼叫中心备注和 Slack 管理的电话式协调
  switchingReason: >-
    这一切口能压缩每位协调员服务单个家庭的时间，同时给保险方合作伙伴提供清晰的案例时间轴、服务提供方转化数据，以及已承诺服务在各州真实落地的证明。
  pricingHypothesis: >-
    企业 SaaS 按每月活跃家庭数计费、设年度最低消费，并为每个新州上线或新保险业务线收取实施费
