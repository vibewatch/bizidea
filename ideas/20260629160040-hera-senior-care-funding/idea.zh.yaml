businessModelCanvas:
  customerSegments:
    - 保险方资助的老年照护协调服务商
    - 提供老年照护协调权益的区域保险公司
    - 居家照护、老年居住及委托照护管理运营商
  valuePropositions:
    - 每位护理顾问服务更多家庭，同时不牺牲质量
    - 标准化保障核验、服务提供方匹配和家庭跟进流程
    - 为保险方合作伙伴提供可审计的案例时间轴和服务提供方绩效数据
  channels:
    - 直接触达老年照护协调服务商的 COO 和护理运营负责人
    - 与正在试点老年照护协调权益的保险公司建立共创客户关系
    - 通过居家照护和老年居住网络合作伙伴进行集成与转介
  customerRelationships:
    - 与护理运营团队共同完成工作流实施
    - 州级上线手册及季度运营复盘
    - 从单一需求品类扩展至更广泛的家庭照护工作流
  revenueStreams:
    - 按活跃家庭数收取 SaaS 订阅费
    - 设定席位最低消费的企业平台合同
