differentiator: >-
  通用照护管理 CRM 在工作发生后记录备注，消费端护理员 App 帮单个家庭保持有序。这个切口坐落在保险方、护理顾问、家庭与本地服务提供方网络之间的履约层，因此能积累难以复制的数据——各州的保障规则、服务提供方转化率、服务启动时效和案例结果。随着更多家庭和保险方合作伙伴接入，这张运营图谱将持续增值，使平台成为分发与质控层，而非又一个前端 App。
