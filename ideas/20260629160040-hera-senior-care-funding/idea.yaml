problem: >-
  Insurance-backed eldercare coordination sounds like a case-management service,
  but the hard part is turning family chaos into completed local services. Care
  guides must verify coverage, collect household context, source providers,
  chase siblings, and document outcomes across different states while most teams
  still live in generic CRMs, spreadsheets, and phone calls. Once a vendor goes
  from hundreds of families to national expansion, every manual handoff turns
  into margin loss, inconsistent quality, and audit pain for payer partners.
targetUser:
  primary: >-
    VP Care Operations at a payer-backed senior-care coordination company
    serving older adults and family caregivers across multiple states
  secondary: >-
    VP Care Management or head of delegated services at a regional insurer that
    offers eldercare coordination as a member benefit
  buyer: COO or VP Care Operations at a multi-state eldercare coordination vendor
startupThesis:
  nonObviousInsight: >-
    The scarce asset in eldercare is not another caregiver-facing app or a
    larger call center. Once payers start underwriting coordination and
    families stick around at high retention, the real bottleneck becomes the
    fulfillment layer between insurer, care guide, household, and fragmented
    local service supply. The winner will own the operating data that proves
    which interventions get families to service fastest and which local
    providers actually convert.
  beachhead: >-
    Payer-backed senior-care coordination vendors with 25-100 care guides,
    1,000-5,000 active families, and planned expansion from 3-8 states into
    two or more new states within 12 months
  wedge: >-
    Benefit-fulfillment workflow that verifies coverage, maps local providers,
    assigns family and care-guide tasks, and emits payer-ready case summaries
    for every coordination episode
  whyNowCatalyst: >-
    Hera's combination of 1,000-plus families, 95% retention, and a target of
    25-plus states by year-end shows eldercare coordination is moving from
    boutique service into a multi-state payer fulfillment category that lacks
    purpose-built software.
  ventureScalePath: >-
    Start with eldercare coordination vendors, then expand into regional
    insurers, senior-focused primary care groups, home health referral
    networks, senior living placement operators, and Medicaid LTSS programs as
    the operating system for non-clinical household-care fulfillment.
solution: >-
  The product gives eldercare coordination teams a single workspace for intake,
  coverage verification, provider matching, task assignment, and payer
  reporting. A family intake flow captures the household situation, then a
  rules layer routes the case by need type, urgency, plan coverage, and state.
  Care guides work from a queue that recommends local home care,
  transportation, senior living, and caregiver-support options while tracking
  every referral and family task in one timeline. Managers see which providers
  convert, which states are understaffed, and which cases stall before service
  starts. The result is a repeatable care-ops engine that lets one guide serve
  more families without hiding work inside phone calls and spreadsheets.
goToMarketSeed:
  firstCustomer: >-
    COO at a payer-backed eldercare coordination vendor with roughly 1,500
    active families, 40-80 care guides, and two new state launches queued for
    the next plan year
  buyingTrigger: >-
    A new insurer contract or state launch that forces the operations team to
    stand up local provider coverage, benefit rules, and QA without adding
    proportional care-guide headcount
  currentAlternative: >-
    Generic care-management CRM, spreadsheets, shared provider directories, and
    phone-based coordination managed through call-center notes and Slack
  switchingReason: >-
    This wedge cuts coordinator time per family while giving payer partners a
    clean case timeline, provider-conversion data, and proof that promised
    services were actually fulfilled across states.
  pricingHypothesis: >-
    Enterprise SaaS priced per active family per month with annual minimums,
    plus implementation fees for each new state launch or insurer line of
    business
