topRisks:
  - name: Services Margin Trap
    description: >-
      Customers may believe eldercare coordination is inherently bespoke and
      keep adding humans instead of standardizing work in software.
    mitigation: >-
      Sell first to operators already feeling care-guide productivity pressure,
      price on active families served, and prove time-to-service and case-load
      gains before trying to expand the workflow surface area.
  - name: Payer ROI Ambiguity
    description: >-
      Insurers may like the concept but hesitate to expand budgets if reduced
      medical spend or retention gains are not yet visible.
    mitigation: >-
      Anchor the first sale in operator productivity, SLA compliance, and
      family retention metrics, then layer in payer-outcome reporting once the
      workflow is embedded.
  - name: Fragmented Local Supply Data
    description: >-
      Provider availability, service quality, and coverage details vary by
      state, which can weaken recommendations and slow implementations.
    mitigation: >-
      Start with a few high-volume service categories and launch states, then
      build closed-loop provider scoring from real referral outcomes rather than
      relying on static directories.
