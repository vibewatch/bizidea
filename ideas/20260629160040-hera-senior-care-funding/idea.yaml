jobsToBeDone:
  - job: >-
      When we launch eldercare coordination in a new state, help our care ops
      team stand up local provider coverage and repeatable workflows, so they
      can absorb growth without hiring coordinators as fast as families arrive.
    currentAlternative: Generic CRM templates, spreadsheets, and manual provider research
    successMetric: Days from state launch to first completed family case and active families per care guide
  - job: >-
      When a high-needs family needs home support after a health event, help
      our care guides verify coverage, assign next steps, and source the right
      local services, so they can close the case faster and give the payer a
      clean audit trail.
    currentAlternative: Phone calls, shared inboxes, and notes scattered across case-management tools
    successMetric: Time from intake to first booked service and percentage of tasks completed within SLA
