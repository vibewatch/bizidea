differentiator: >-
  Generic care-management CRMs capture notes after work happens, while consumer
  caregiver apps help one family stay organized. This wedge sits in the
  fulfillment layer between payer, care guide, family, and local provider
  network, so it accumulates hard-to-copy data on coverage rules, provider
  conversion, time-to-service, and case outcomes by state. That operating graph
  becomes more valuable as more families and payer partners run through it,
  making the platform a distribution and quality-control layer rather than
  another front-end app.
