slug: eldercare-benefit-fulfillment-os
date: '2026-06-29'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[business-plan.yaml date] 计划日期 2026-06-29 后第一个完整运营月。'
- id: A2
  name: 天使轮完成后的期初现金
  value: '2000'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd; startup-finance heuristic] 按声明的 $2–4M 区间下限建模，因为基础情景在第 2 年末前团队规模不超过 8 人，并在第 3 年实现正 EBITDA。'
- id: A3
  name: 收入单元
  value: 活跃付费部署（试点或生产州/保险业务线上线）
  unit: definition
  source: '[business-plan.yaml gtm.pricing; businessModel.revenueStreams] 每个付费试点或年度生产部署单独定价计费，因此部署是最干净的计量客户单元。'
- id: A4
  name: 每个活跃付费部署的混合年度 ARPU
  value: '260'
  unit: USDK/deployment-year
  source: '[business-plan.yaml investorMemo.firstCustomer.initialContract; businessModel.revenueStreams; research.yaml market.sam] 设定在 $18 万–$30 万年度生产区间内，低于 2,500 个家庭乘以研究测算的 $200 家庭年软件价值所隐含的约 $50 万上限。'
- id: A5
  name: 收入确认时机
  value: 每月或每季度内新客户数量的中间值
  unit: policy
  source: '[startup-finance heuristic] 平均而言，新付费部署假设在周期中途落地。'
- id: A6
  name: 第 1 年月末部署路径
  value: 0,0,0,1,1,1,2,2,2,3,3,3
  unit: active paid deployments
  source: '[business-plan.yaml milestones 0-12 months; gtm.funnelTargets] 对应第一年签订 3 个付费试点、年底至少 2 个完成转化或仍处于付费状态。'
- id: A7
  name: 第 2 年季末部署数
  value: Q1Y2 4; Q2Y2 5; Q3Y2 7; Q4Y2 8
  unit: active paid deployments
  source: '[business-plan.yaml milestones 12-24 months; strategicChoices.sequencingRationale] 反映早期客户内 2 次扩展、2–3 个新运营商部署，以及第 2 年末 1 个保险方/委托服务共创客户。'
- id: A8
  name: 第 3 年季末部署数
  value: Q1Y3 10; Q2Y3 12; Q3Y3 13; Q4Y3 15
  unit: active paid deployments
  source: '[business-plan.yaml milestones 24-36 months; research.yaml market.som] 15 个付费部署对应约 10–12 个客户加多州扩展，维持在研究测算的 20 个账户 SOM 上限内。'
- id: A9
  name: 建模毛利率
  value: '69'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct; operatingAssumptions template reuse] 在第二次部署效率压缩得到验证之前，比 70% 目标低 1 个百分点。'
- id: A10
  name: 单位经济模型月度流失率
  value: '1.6'
  unit: percent
  source: '[startup-finance heuristic] 企业工作流软件配合年度合同应具有较强粘性，但预算归属尚未经过验证，因此避免假设低于 1% 的流失率。'
- id: A11
  name: 创始人/CEO 含税现金薪酬
  value: '150'
  unit: USDK/year
  source: '[business-plan.yaml team Founder/CEO; startup-finance heuristic] 企业医疗健康天使轮公司创始人市场以下现金薪酬，含工资税和福利。'
- id: A12
  name: 初创工程师含税现金薪酬
  value: '190'
  unit: USDK/year
  source: '[business-plan.yaml team Founding eng; startup-finance heuristic] 负责初始规则引擎、报告层和安全集成的高级全栈/集成工程师。'
- id: A13
  name: 护理运营实施负责人含税现金薪酬
  value: '145'
  unit: USDK/year
  source: '[business-plan.yaml team Care ops implementation lead; startup-finance heuristic] 将工作流转化为可部署上线模板的领域型运营招聘。'
- id: A14
  name: 数据与网络运营负责人含税现金薪酬
  value: '150'
  unit: USDK/year
  source: '[business-plan.yaml team Data and network operations lead; startup-finance heuristic] 负责服务提供方数据质控和闭环结果采集的岗位，基准报告复利积累前必须到位。'
- id: A15
  name: 合作伙伴负责人含税现金薪酬
  value: '170'
  unit: USDK/year
  source: '[business-plan.yaml team Partnerships lead; startup-finance heuristic] 仅在第一个运营商部署可作参考后才加入的早期合作伙伴/渠道销售岗位。'
- id: A16
  name: 产品工程师含税现金薪酬
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml product twelveMonth; startup-finance heuristic] 公司拥有 2 个以上生产客户并开始推进模板复用产品化后所需的额外工作流和分析能力。'
- id: A17
  name: 客户成功/实施经理含税现金薪酬
  value: '135'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months; startup-finance heuristic] 部署数量超出创始人主导阶段后，负责多州扩展和续约的售后负责人。'
- id: A18
  name: 运营/合规经理含税现金薪酬
  value: '120'
  unit: USDK/year
  source: '[business-plan.yaml operations; research.yaml regulatoryTechnicalConstraints; startup-finance heuristic] 保险方直销扩张前加入，负责 BAA、可审计性和合同管理。'
- id: A19
  name: 工作流工程师含税现金薪酬
  value: '175'
  unit: USDK/year
  source: '[business-plan.yaml product twentyFourMonth; startup-finance heuristic] 运营商切口验证后，支撑保险方直销和相邻工作流扩张的额外工程深度。'
- id: A20
  name: 招募节奏
  value: "创始人/CEO 和初创工程师第 1 个月；护理运营实施负责人第 3 个月；数据与网络运营负责人第 5 个月；合作伙伴负责人第 10 个月；产品工程师第 15 个月；客户成功/实施经理第 20 个月；运营/合规经理第 24 个月；工作流工程师第 31 个月"
  unit: timing
  source: '[business-plan.yaml team; milestones; strategicChoices.sequencingRationale; startup-finance heuristic] 产品、客户成功和合规岗位仅在早期试点验证后、保险方直销扩张前加入。'
- id: A21
  name: 职能薪酬分配
  value: "创始人/CEO 60% S&M / 40% G&A；初创工程师 100% R&D；护理运营实施负责人 40% R&D / 60% G&A；数据与网络运营负责人 70% R&D / 30% G&A；合作伙伴负责人 100% S&M；产品工程师 100% R&D；客户成功/实施经理 25% S&M / 75% G&A；运营/合规经理 100% G&A；工作流工程师 100% R&D"
  unit: allocation
  source: '[business-plan.yaml team rationales; operations] 分配遵循谁负责切口销售、谁负责模板上线、谁负责售后交付、谁承担合规开销的逻辑。'
- id: A22
  name: 非薪酬运营支出
  value: "第 1 年 S&M 每月 9K + 收入的 4.0%，R&D 每月 5K + 每平均部署 0.50K，G&A 每月 6K + 每平均部署 0.25K；第 2 年 S&M 每月 11K + 收入的 4.5%，R&D 每月 7K + 每平均部署 0.65K，G&A 每月 8K + 每平均部署 0.35K；第 3 年 S&M 每月 13K + 收入的 4.5%，R&D 每月 8K + 每平均部署 0.80K，G&A 每月 9K + 每平均部署 0.45K。"
  unit: USDK/month
  source: '[startup-finance heuristic] 涵盖创始人差旅、合作伙伴赋能、云/工具、服务提供方数据质控、法务、财务、保险，以及医疗企业工作流销售所需的 BAA/合规开销。'
- id: A23
  name: 现金转化政策
  value: EBITDA 近似于运营现金流动
  unit: policy
  source: '[startup-finance heuristic] 本阶段不建模债务、税项、资本支出或营运资金时间效益。'
- id: A24
  name: 每个新付费部署的混合 CAC
  value: '88.5'
  unit: USDK/new paid deployment
  source: 由第 2–3 年建模销售与营销支出 106.16 万美元除以 12 个净新增付费部署计算得出。
- id: A25
  name: 融资里程碑
  value: 8 个活跃付费部署、基准报告上线、第二次部署工作量较第一次压缩逾 50%，以及 1 个保险方侧共创客户
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] 用于测算天使轮规模加 6 个月缓冲。'
- id: A26
  name: 缓冲政策
  value: 里程碑后 6 个月的现金储备
  unit: policy
  source: '[startup-finance heuristic; financial-modeler instruction] 缓冲用于应对采购、合规或实施延误，直至下一轮融资。'
