scenarios:
  downside:
    description: 预算归属仍间接、模板复用延误，公司第 3 年结束时仅达到 12 个活跃付费部署，混合价值偏低且手工实施工作量明显偏多。
    y3RevenueK: 2180.0
    y3EbitdaK: -482.9
    cashLowPointK: 56.2
    keyAssumptionChanges:
    - 第 1 年末 2 个付费部署，第 2 年末 6 个，第 3 年末 12 个（而非 15 个）。
    - 混合年度 ARPU 从 $26 万降至 $24 万，因为更多收入停留在较窄的试点或单州范围内。
    - 毛利率稳定在 66%，因为可复用州和保险方模板未能足够快速压缩上线工作量。
  base:
    description: 创始人主导销售加上一位合作伙伴招募，将前几个运营商试点转化为可复制的多州部署，第 3 年末达到 15 个活跃付费部署。
    y3RevenueK: 3109.3
    y3EbitdaK: 138.6
    cashLowPointK: 875.2
    keyAssumptionChanges:
    - 部署数量按 A6、A7、A8 路径推进，第 2 年末 8 个付费部署，第 3 年末 15 个。
    - 混合年度 ARPU 维持 $26 万，毛利率保持 69%——略低于业务计划目标，直至模板复用成熟。
    - 团队第 3 年末达到 9 名员工，仅在早期试点证明可复制性后才加入产品、客户成功、合规和工作流岗位。
  upside:
    description: 参考部署和合作伙伴转介将转化提前，第 3 年末达到 20 个活跃付费部署，价值略高且实施经济性更优。
    y3RevenueK: 4503.4
    y3EbitdaK: 1065.8
    cashLowPointK: 1387.3
    keyAssumptionChanges:
    - 第 1 年末 4 个付费部署，第 2 年末 12 个，第 3 年末 20 个——合作伙伴带来的扩张早于计划到来。
    - 混合年度 ARPU 从 $26 万升至 $28 万，因为基准报告和多州范围附加更快。
    - 毛利率从 69% 提升至 71%，因为上线模板库大幅减少人工数据清洗。
sensitivity:
- variable: ARPU
  downsideCase: 混合年度 ARPU 稳定在 $24 万，因为买家将更多范围保留在付费试点或较窄的首州之内。
  baseCase: 建模 ARPU 维持在每个活跃付费部署 $26 万。
  upsideCase: 基准报告和多州扩展提前附加，ARPU 达到 $28 万。
  y3RevenueImpactK: -239.3
  cashImpactK: -244.7
- variable: CAC
  downsideCase: 差旅、安全审查和创始人陪跑使 S&M 强度更接近收入的 5.5%，有效 CAC 升至约 $11 万。
  baseCase: 建模 CAC 维持在每个新付费部署约 $8.85 万。
  upsideCase: 参考账户和合作伙伴渠道带来更热的引荐，CAC 降至约 $7.5 万。
  y3RevenueImpactK: 0.0
  cashImpactK: -45.6
- variable: 流失率
  downsideCase: 工作流嵌入度较低，第 3 年末相当于少了 2 个付费部署。
  baseCase: 基础路径假设年度合同粘性强，1.6% 月度流失率仅用于单位经济模型计算。
  upsideCase: 服务启动改善创造更强的续约证据，第 3 年末相当于多了 2 个部署。
  y3RevenueImpactK: -357.6
  cashImpactK: -268.3
- variable: 销售周期
  downsideCase: 采购、BAA 审查和数据审计拉长试点转生产路径，每个新部署晚约一个季度落地。
  baseCase: 基础情景假设付费试点在 8–12 周内成交，上线痛点紧迫时迅速转化。
  upsideCase: 参考部署压缩周期约一个季度，合作伙伴带来的扩张提前到来。
  y3RevenueImpactK: -216.7
  cashImpactK: -244.2
- variable: 毛利率
  downsideCase: 服务提供方数据清洗和上线支持仍偏手工，毛利率维持在约 67%。
  baseCase: 毛利率达到 69%，仍略低于业务计划 70% 的目标。
  upsideCase: 可复用的福利规则和上线模板大幅减少定制工作，毛利率达到 71%。
  y3RevenueImpactK: 0.0
  cashImpactK: -98.9
- variable: 招募节奏
  downsideCase: 上线仍长期定制化，产品、客户成功和工作流岗位需提前 3–6 个月到位。
  baseCase: 团队按分阶段招募计划推进，模板复用验证后才增加支持岗位。
  upsideCase: 上线手册保持模板化程度足够高，一名后期招募可推迟一个季度。
  y3RevenueImpactK: 0.0
  cashImpactK: -201.4
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Pipeline[Founder and partner pipeline] --> PaidDeployments[Paid pilots and launch deployments]
      PaidDeployments --> AnnualContracts[Annual production subscriptions]
      AnnualContracts --> Revenue[Revenue per active paid deployment]
      Revenue --> GrossProfit[Gross profit after delivery and hosting]
      GrossProfit --> Cash[Cash that funds template reuse and expansion]
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入依靠活跃付费部署从第 1 年末 3 个扩展至第 3 年末 15 个，每个约产生 $26 万混合年价值。
- checkName: 必须做对的事
  finding: 前几个运营商试点必须转化为可复用的州和保险方模板，才能让第二次部署更快落地并将毛利率维持在 69% 附近。
- checkName: 模型崩溃条件
  finding: 若试点转化率、数据留存权或模板复用向悲观情景滑落，第 3 年结束前现金将压缩至约 5.62 万美元。
- checkName: 下一轮融资证明
  finding: 业务达到 8 个付费部署、跨早期账户的基准报告上线，以及 1 个保险方侧共创客户且仍有可见现金缓冲时，种子轮故事具备说服力。
sanityChecks:
  ruleOf40: 第 3 年增速 112.6% + EBITDA 利润率 4.5% = 117.1%（方向上强劲，但受第 2 年小基数影响）。
  burnMultiple: 第 2 年净新增 ARR 约 130 万美元时消耗倍数约 0.4 倍，第 3 年净新增 ARR 约 182 万美元时 EBITDA 转正。
  revenuePerFte: 第 3 年末每名员工收入 $34.6 万（处于早期企业 SaaS 约 $20 万–$40 万基准区间内）。
  flags:
  - 基础情景按付费部署计数而非纯客户数，第 2–3 年增长依赖早期账户扩展至更多州或保险业务线，而非保持单一范围。
  - 研究显示滩头市场仅约 100 个买家账户，若运营商切口或保险方直销扩张路径落空，市场天花板将比营收数字单独显示的更快触达。
  - 毛利率能否维持取决于公司是否真正实现业务计划里第二次部署工作量压缩逾 50% 的里程碑；否则实施人员招募将提前。
  - 悲观情景结束时现金接近底部，试点转化、采购时机或数据留存授权的任何一处滑落都可能迫使更早融资。
