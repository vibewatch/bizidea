    "value": "$73M"
    "rationale": "自下而上测算：从 Mygate（4.0M）和 NoBrokerHood（4.8M）合计的 8.8M 管理型家庭出发，扣除估计 30% 的重叠，得到约 6.2M 独立家庭；再筛选出 25% 适合预备人力池经济性的高密度封闭式社区（约 1.55M 户），并假设每户综合年收入约 ₹4,000。结果约为 ₹6.2B，即大约 $73M。"
    "isEstimate": true
    "sourceRefs":
    - 2
    - 4
  "sam":
    "value": "$5.1M"
    "rationale": "把古尔冈 / 高端 NCR 所占份额按 7% 作用于 1.55M 户的可服务家庭代理值。这个比例参考了古尔冈在 2024 年上半年占 NCR 新盘 59%、销售 51% 的表现，对应约 108k 户家庭。按每户每年 ₹4,000 计算，SAM 约为 ₹434M，即约 $5.1M。"
    "isEstimate": true
    "sourceRefs":
