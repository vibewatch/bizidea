- "name": "Snabbit"
  "stage": "scale-up"
  "wedge": "依靠高密度、女性为主的受管理劳动力和全栈运营，提供即时家务服务。"
  "pricing": "₹169-₹499，最长 240 分钟；平均客单价约 ₹250-₹270。"
  "strength": "供需扩张速度最明显，投资人支持强，且对微市场密度的运营关注度很高。"
  "weaknessVsUs": "它仍然是以家庭为单位逐户获客，无法解决社区级待命规划或共享通行工作流。"
  "sourceRefs":
