  "regulatoryLandscape": "监管尚未成为主要增长解锁点，但它确实是现实约束。印度的家政劳动依然高度碎片化且只被部分正规化。核验要求、劳动者保护预期和数据处理义务提升的速度，快于法律统一的速度。这天然偏向那些从第一天起就按合规级运营者标准行事的创业公司。"
  "technologyLandscape": "这个赛道正在借鉴即时零售的运营模型：高密度微市场、快速调度、重复使用，以及全栈式工人管理。技术优势较少来自 AI 撮合，更多来自工作流基础设施——门岗审批、人员预测、审计日志、培训记录，以及可靠的 ETA 执行。"
