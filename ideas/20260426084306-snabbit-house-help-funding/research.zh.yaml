- "name": "Urban Company InstaHelp"
  "stage": "incumbent"
  "wedge": "从全栈到家服务平台延伸出的即时家政能力。"
  "pricing": "公开试点价格为 ₹49/hour 起，定位 10-15 分钟上门。"
  "strength": "拥有庞大的现有客户基础、多城市运营能力、服务者培训基础设施，以及可以为即时业务继续投入的核心业务利润。"
  "weaknessVsUs": "它优化的是 B2C 需求捕获，而不是楼宇级预备产能或 RWA 工作流；即时业务仍然投入重、且声誉风险较高。"
  "sourceRefs":
