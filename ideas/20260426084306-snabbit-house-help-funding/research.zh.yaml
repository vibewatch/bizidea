"reportMemo":
  "executiveTakeaways":
  - "证据支持确实存在痛点，但可投资的切口比头条中的家政大市场窄得多：重点是高密度高端社区的服务连续性，而不是再做一个泛化的保姆应用。"
  - "真正的瓶颈是供给可靠性与信任。客户需求已经存在；在冲击发生时失效的是受训劳动力密度、通行审批与事件处理。"
  - "Urban Company、Snabbit 和 Pronto 正在验证消费者需求，但它们优化的是家庭获客和微市场密度，而不是楼宇级预备 SLA。"
  - "古尔冈是可信的海滩头市场，因为高端公寓供给密集、社区软件已广泛采用，而且 NCR 已是即时家政的核心需求集群。"
  - "这个市场仍处于早期且运营难度高：线上渗透率仍然很低，头部玩家依赖补贴，工人招募速度仍落后于需求增长。"
  - "任何赢家都必须在很大程度上像一家安全/合规基础设施公司，而不只是劳动力调度平台：核验、数据治理、通行日志与安全升级是核心能力，不是附属能力。"
  "marketDefinition": "ReserveGrid 位于即时家政平台与封闭式社区运营软件的交叉地带。这个市场被定义为：面向已经运行正式通行、收费和住户工作流的高密度公寓社区，提供楼宇级连续性与备援劳动力。经济买方是社区运营方或 RWA 领导层；最终使用者则是设施办公室与住户。本备忘录有意排除独栋住宅、泛化的美业/维修市场，以及传统的全职住家保姆中介。"
  "customerAndBuyer": "最佳的初始客户，是那些负责古尔冈 500+ 已入住单元封闭式社区内部服务连续性的物业或社区运营方。使用者通常是设施办公室、安保前台或住户支持团队，因为一旦家政人员未到岗，首先承压的就是他们。买方关心的是住户满意度、门岗风险和运营一致性，而不只是劳动力套利。预算很可能来自社区运营、安全或住户体验支出，但委员会审批、供应商尽调以及数据/隐私顾虑会带来真实的采购摩擦。"
  "buyingTriggers":
  - "point": "季节性或选举驱动的家政缺勤，使住户完全失去可靠的兜底方案。"
    "sourceRefs":
