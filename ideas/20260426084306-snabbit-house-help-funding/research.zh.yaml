- "name": "Broomees"
  "stage": "scale-up"
  "wedge": "提供经核验的家政服务与中介，覆盖月薪型和按需型两种模式。"
  "pricing": "BroomIT 按需家政为 ₹179/hour；更广泛的月薪范围约为 ₹4,000-₹25,000，视岗位与城市而定。"
  "strength": "提供替换保障，对全职 / 周期性家庭用工的覆盖更深。"
  "weaknessVsUs": "更像中介而非软件原生平台；在实时密度规划、社区集成和楼宇内共享服务经济性方面更弱。"
  "sourceRefs":
  - 25
  - 26
