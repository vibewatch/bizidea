  - point: 社区运营软件已经服务数百万家庭，说明公寓社区本身是可触达、也愿意买软件的一类客户。
    sourceRefs:
      - 2
      - 4
  - point: 公开报道越来越把安全流程和核验视为决定性的运营问题，而不是边缘顾虑。
    sourceRefs:
      - 20
      - 23
      - 31
  - point: 以 Gurugram 为核心的高端住宅密度仍在 NCR 持续提升，这提高了待命劳动力在狭小地理范围内被充分利用的概率。
    sourceRefs:
      - 8
openQuestions:
  - RWA 会把后备劳动力视为共享楼宇服务，还是仍把它看成应该由住户各自解决的问题？
  - 在 7-10 am 和 6-9 pm 高峰里，真实可维持的填充率和响应时长 SLA 能做到多少，而不压垮利润？
  - 社区 ERP 厂商会合作、无视这个品类，还是决定把 domestic-staff 模块直接延展到托管供给？
  - 要运营楼宇级连续性服务，到底需要多少住户数据才够，而又不会触发隐私阻力？
