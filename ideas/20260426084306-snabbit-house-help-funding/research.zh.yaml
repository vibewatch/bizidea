competitors:
  - name: Urban Company InstaHelp
    stage: incumbent
    wedge: 全栈到家服务平台，正在往即时保洁 / 家务延伸。
    pricing: 公开试过 ₹49/hour 的引流价，并主打 10-15 分钟到场。
    strength: 装机用户基数大、多城运营成熟、合作伙伴培训体系完善，同时核心业务已盈利，能持续给即时业务输血。
    weaknessVsUs: 它优化的是 C 端获客，不是楼栋级备用产能或 RWA 流程；同时即时垂直仍在重投入期，也更容易被舆论盯上。
    sourceRefs:
      - 14
      - 15
      - 16
      - 17
      - 35
      - 36
  - name: Snabbit
    stage: scale-up
    wedge: 通过一支高密度、女性为主的自营劳动力队伍，交付即时家务服务。
    pricing: 240 分钟以内收费 ₹169-₹499；平均客单价约 ₹250-₹270。
    strength: 供需爬坡最快、融资最强，也最专注微市场密度和运营执行。
    weaknessVsUs: 它还是以家庭为单位一户一户获客，没有解决社区层面的待命规划和共享门禁流程。
    sourceRefs:
      - 9
      - 12
      - 18
      - 23
      - 24
  - name: Pronto
    stage: scale-up
    wedge: 起家于 Gurugram 的 10 分钟家政平台，依靠高复购和本地高密服务点运转。
    pricing: App 内价格透明；公开传播更强调“无隐藏费用”，而不是固定张贴价。
    strength: NCR 集中度高、150+ 微市场、高复购，且最成熟的 Gurugram 片区已出现正向贡献毛利迹象。
    weaknessVsUs: 需求仍跑在招募前面，模式也依旧是以家庭为中心，而不是把连续性卖给社区运营方。
    sourceRefs:
      - 10
      - 11
      - 13
      - 19
  - name: Broomees
    stage: scale-up
    wedge: 经过核验的家政和家政派遣服务，既做按月工资，也做按需用工。
    pricing: BroomIT 按需帮工报价 ₹179/hour；更广泛的月薪区间约为 ₹4,000-₹25,000，取决于岗位和地点。
    strength: 有替换确保，更适合全职或高频的家庭用工需求。
    weaknessVsUs: 更像中介，不够软件原生；在实时密度规划、社区集成和塔楼内共享服务的经济性上更弱。
    sourceRefs:
      - 25
      - 26
regulatoryTechnicalConstraints:
  - point: 在 Delhi / Haryana，家政核验已是显性的流程要求，一旦出事，这件事只会更重要。
    sourceRefs:
      - 30
      - 31
  - point: 家政用工仍只是部分被正规化；劳动法覆盖在纸面上存在，不过完整的家政工政策还没真正落地。
    sourceRefs:
      - 28
      - 29
  - point: 封闭社区 App 会收集敏感的行动轨迹和身份数据，因此任何楼栋级产品都天然背着隐私和数据最小化责任。
    sourceRefs:
      - 6
      - 32
  - point: 楼栋进场流程和安检会直接影响工人准点率，这会进一步打击 SLA 可靠性。
    sourceRefs:
      - 20
      - 31
  - point: 备用劳动力网络必须接上现有的工作人员出勤、访客审批和事件日志流程，否则只会变成又一层运营负担。
    sourceRefs:
      - 5
      - 32
