  "competitiveLandscape": "竞争来自四个方向：面向消费者的即时家政应用、传统中介、非正式保姆网络，以及社区管理软件。拟议中的创业公司最强的位置，恰恰是在这些类别的交叉处，而目前没有任何一类能完整解决问题：在封闭式社区内，以预审核通行和事件可追溯为前提，保障后备家政补位。"
