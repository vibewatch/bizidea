    "summary": "家庭已经在为紧急备援劳动力付费：Urban Company 公开试点过 ₹49/hour，India Today 记录了约两小时、低于 ₹200 的使用场景，Snabbit 公开披露过 ₹169-₹499 套餐，Broomees 也以 ₹179/hour 提供按需家政。社区本身也已经在采购 ERP / 安防工具并处理高频物业费用，因此共享式连续性收费具有可行性——但价格敏感性同样真实，所以产品必须节省时间和投诉成本，而不能只是增加便利性。"
