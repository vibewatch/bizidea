- "name": "Pronto"
  "stage": "scale-up"
  "wedge": "起源于古尔冈的 10 分钟家政平台，具有高复购和高密度本地服务站。"
  "pricing": "应用内透明定价；公开表述强调无隐藏费用，而不是固定张贴价格。"
  "strength": "NCR 集中度高，覆盖 150+ 微市场，复购行为强，在最成熟的古尔冈区域已有早期正向贡献利润证据。"
  "weaknessVsUs": "需求仍快于招募，而且模式仍是家庭导向，而不是向社区运营方售卖连续性。"
  "sourceRefs":
