openQuestions:
  - RWA 会把备用劳动力视为楼栋共享服务，还是仍把它当成住户各自解决的事情？
  - 在 7-10 am 和 6-9 pm 的高峰里，究竟能守住什么补位率和响应 SLA，同时不把毛利打穿？
  - 社区 ERP 厂商会合作、无视，还是干脆把家政模块继续往供给侧延伸？
  - 要让楼栋级连续性层跑起来，真实需要多少住户数据，才不会引发隐私反弹？
