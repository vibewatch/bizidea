slug: backup-house-help-grid
date: 2026-04-26
executiveSummary: >-
  ReserveGrid 瞄准的是印度快速增长家政赛道里一个很具体的失灵场景：固定保姆消失时，高端公寓社区没有可信的楼宇级兜底方案。Snabbit、Pronto 和 Urban Company 同月的报道说明，消费端需求真实存在，但在迁徙冲击下供给会塌缩，而且由于工人要进入私人住宅，安全预期也在提高。计划是先从 Gurugram 拥有 500+ 已入住单元的封闭式社区切入，向物业运营方出售后备劳动力 SLA，而不是再做一个家庭市场。MVP 是一个社区运营产品，把预审核后备工人池、楼宇专属出入流程、数字化签到签退和事件处理整合起来。GTM 从掌握多栋塔楼的区域物业经理开始，因为一份合同就能解锁高密度需求，也比一次卖一个 RWA 更容易缩短采购周期。根据研究，第一阶段切口对应的狭义市场并不大——TAM 约 $73M，SAM 约 $5.1M，第三年 SOM 约 $0.9M——所以创业回报成立的前提，是证明其后续能扩展到相邻的托管住宅劳动力品类和溢出基础设施。当前最大的反证风险有两个：社区是否愿意用共享预算为连续性买单，以及后备排班能否在早晚高峰维持 >90% 的填充率而不压垮利润。在付费的 Gurugram 试点验证这些问题之前，预算归属和合作伙伴意愿都只能算假设，不能当成事实。
problem:
  - 高端公寓社区在固定保姆、厨师或保育员爽约时，要承接住户投诉和安全风险，但现有兜底方案分散在 WhatsApp 群、本地中介和消费端应用之间。
  - 同一时间窗口的报道也显示，即时家政应用在迁徙冲击下同样会失灵，因此真正的痛点是“连续性”和“可信出入”，而不是“发现服务”。
  - RWA 和物业经理早已运行正式的访客与员工流程，却没有任何可审计的系统来做后备劳动力规划、填充率可视化或事件响应。
solution:
  - 向公寓社区出售楼宇级后备家政网络，提供预审核的后备工人、楼宇专属出入规则，以及覆盖缺勤高峰的调度能力。
  - 给设施团队一个统一操作台，用来处理需求录入、ETA 跟踪、数字化签到签退、事件日志，以及按塔楼和时段输出 SLA 报告。
  - 让住户通过楼宇入口发起需求，而不是通过独立消费端应用下单，这样需求会在高密度塔楼内聚合，待命产能才更容易规划。
whyWeWin:
  - 这个切口把需求聚合在社区层，只有在这一层，密度才让后备劳动力具备经济性，安全控制也本来就重要。
  - "消费端应用优化的是家庭获客；社区 ERP 优化的是出入和收费；ReserveGrid 则卡在两者之间，给出一个今天谁都没真正承诺的价值：在封闭式社区里保证后备填充。"
  - Gurugram 是一个高度集中的起步区域，因为那里的高端住宅供给、社区软件渗透和 NCR 家政需求都已经够密。
  - 如果试点跑通，公司就能不断积累关于缺勤模式、高峰时段、填充率和门岗摩擦的专有数据，逐步提升排班精度。
strategicChoices:
  beachhead: 先做 Gurugram 拥有 500+ 已入住单元的高端封闭式社区，并优先通过已经管理多栋塔楼的物业管理公司销售。
  wedgeRationale: >-
    这个切入点比泛化的家庭应用更快拿到验证，因为一个买家就能带来重复需求、统一运营流程，以及足以测试待命劳动力利用率的密度。它也让预算拥有者、投诉拥有者和安全拥有者出现在同一条销售链路里。
  sequencingRationale: >-
    先用高人工介入的产品和狭窄的服务范围，证明买家愿意付费、高峰填充率可靠，以及门岗运营安全可控。只有等这些指标稳定后，公司才该加深 ERP 集成、自动化住户预约，并扩张劳动力品类或地理范围。
  notYet:
    - 面向单个家庭、且不在签约社区内的独立直面消费者应用
    - 在后备清洁和基础杂务尚未跑出可复制利润前，就扩展到厨师、保育、陪护或住家安置
    - 在 Gurugram 两条走廊还没跑出稳定的试点转正式合同之前，就做多城市扩张
market:
  tam: 印度大型托管社区的狭义 TAM 估算为 $73M
  sam: Gurugram 与高端 NCR 滩头市场的估算 SAM 为 $5.1M
  som: 第三年 SOM 为 $0.9M，假设约 25 个社区、每个社区约 800 个已入住单元
  segments:
    - 在 Gurugram 运营高端封闭式公寓社区的物业管理公司
    - Gurugram 及周边 NCR 集群中，拥有 500+ 已入住单元的大型独立 RWA
  buyingProcess: >-
    最可能的内部 champion 是负责住户升级投诉和供应商协调的区域运营负责人或社区总经理。采购随后会进入 RWA 委员会或运营商审批，尽调重点会落在安全、数据处理、工人核验，以及付费试点能否在一次缺勤周期内证明更快的填充率和更少的投诉。
product:
  mvp: >-
    由 concierge 驱动的社区连续性产品，第一阶段只覆盖后备清洁与基础家务。范围包括后备工人名册管理、楼宇专属出入审批、需求录入、调度、实时 ETA、数字化签到签退，以及附带每周 SLA 报告的事件记录。
  sixMonth: >-
    增加塔楼级需求预测、工人培训与核验记录、住户偏好档案、固定预留时段规划，以及与某个社区 ERP 或门岗管理系统的一项轻量集成或 CSV 同步。
  twelveMonth: >-
    在签约社区内上线住户自助预约、多塔楼运营方仪表盘、自动化投诉与填充率报表，以及面向早晚高峰的排队逻辑。
  twentyFourMonth: >-
    从后备清洁扩展到相邻的托管住宅劳动力品类，如厨师、保育员和陪护，并测试与更大消费平台之间类似 API 的溢出供给合作。
  keyBets:
    - 楼宇级需求在走廊、塔楼和时段维度上足够可预测，可以支撑一套预留劳动力池。
    - 如果几周内能明显减少投诉并降低门岗摩擦，设施办公室就愿意接受新的工作流。
    - 在不做深度 ERP 集成的前提下，人工运营也足以先把商业模型证明出来。
    - 身份核验、日志和事件响应等信任功能，足够强到可以从共享社区运营预算中拿到钱。
gtm:
  wedge: >-
    向一家区域物业运营商出售一个覆盖 Gurugram 3-5 栋相邻高端塔楼、为期 6 到 12 周的付费连续性试点；然后用填充率、投诉下降和可审计性的数据，把它转成年度多社区合同。
  channels:
    - 直接外呼区域物业管理公司与社区总经理
    - 来自早期旗舰社区的 RWA 转介绍
    - 与社区 ERP 和门岗管理厂商的集成及转介合作
    - 来自可信本地招聘方和培训伙伴的工人推荐闭环
  funnelTargets: 目标账户到合格初访 30%+、初访到付费试点 25%+、试点到年度合同 60%+、首个运营商在 6 个月内扩展到 2+ 额外塔楼 40%+
  pricing: >-
    按已入住单元收取月费并设置社区起订额，再按完成的后备班次和可选的高级报表或合规模块收费。这样既匹配社区的经常性预算，也让高峰使用量按实际履约需求计费。
businessModel:
  revenueStreams:
    - 与连续性覆盖下的已入住单元挂钩的社区订阅费
    - 按完成的后备班次收取使用费
    - 面向大型运营商的高级合规、审计与事件报表模块
  unitOfValue: 被连续性合同覆盖的已入住单元，另以完成的后备班次作为使用计量单位
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一运营商组合内扩展到多栋塔楼
    - 在后备劳动力经济性被证明后，增加更多劳动力品类
    - 向企业运营商销售更高价值的合规与报表功能
    - 面向消费平台以及 co-living 或 senior-living 运营方的溢出供给合作
strategyMap:
  northStarMetric: 签约社区内按 SLA 完成的每周后备请求数
  inputMetrics:
    - 付费试点赢单率
    - 高峰时段填充率
    - 门岗进场中位耗时
    - 工人 30 天留存
    - 试点转年度合同转化率
    - 每个社区的投诉下降幅度
  moatsToBuild:
    - 专有的塔楼级缺勤与填充率数据集
    - 嵌入社区运营流程中的出入、核验和事件工作流
    - 在少数紧密 Gurugram 走廊内形成的工人供给密度与培训口碑
    - 能把一份合同扩展成多栋塔楼的多社区运营商关系
  killCriteria:
    - 前 20 个合格运营商账户中，拿不到至少 3 个付费试点
    - 在试点中，连续 8 周无法把高峰填充率稳定在 90%
    - 完整试点周期后，投诉量或问题解决时长没有可量化改善
    - 即使提供保底待命时段，工人 30 天留存仍低于 60%
  mermaid: |
    flowchart LR
      Wedge[向管理多栋塔楼的 Gurugram 运营商出售连续性试点] --> MVP[后备工人池 + 调度 + 门岗工作流 MVP]
      MVP --> Proof[证明填充率、投诉下降与安全运营]
      Proof --> Expansion[扩展到更多塔楼、更多品类和溢出合作]
investorMemo:
  verdict:
    call: 值得见面 / 继续尽调
    conviction: 在买方预算归属和后备利润率数据通过付费试点证明之前，只能保持低到中等信心。
    whyBelieve: 真实存在的痛点、可见的品类需求，以及清晰的楼宇级切口，给出了一个 incumbents 目前并未直接优化的早期验证路径。
    whyDoubt: 初始切口很窄，而最难的两个问题——共享预算是否愿意付费，以及高峰时段单位经济是否成立——现在都还只是猜想。
    nextDiligence: 拿下 3 个付费 Gurugram 试点，来自同一个多塔楼运营商，并证明连续 8 周 >90% 填充率且投诉可量化下降。
  firstCustomer:
    title: 面向 Gurugram 高端社区的区域物业运营负责人
    profile: 负责 15-30 栋高端塔楼的住户体验、保安和供应商流程，而 domestic-help 缺勤会在这些楼里反复引发升级投诉。
    trigger: 季节性工人外流、选举期缺勤，或有关保姆爽约的未解决住户投诉突然明显上升。
    buyer: 区域运营负责人
    initialContract: 针对一个 500-800 单元社区，签 6-12 周付费试点，金额约 ₹3-6 lakh；若 SLA 与安全指标达标，则转为每年约 ₹15-30 lakh 的正式合同。
  mustBeTrue:
    - 管理多栋塔楼的物业运营商必须把后备家政劳动力视作值得集中出资解决的共享运营问题。
    - 至少一个 Gurugram 微市场必须能用预审核后备工人，在 8 个试点周内维持 >90% 的高峰填充率。
    - 付费试点必须足够降低投诉量或投诉处理时长，运营商才会续成年度合同。
    - 工人招募和保底待命时段必须能带来稳定留存，而不是以高额补贴换来低效空转。
    - 社区 ERP 与门岗流程必须足够可集成，才能确保 ReserveGrid 不会引入不可接受的额外摩擦。
  diligenceQuestions:
    - "今天当住户因保姆缺勤而投诉时，预算到底归谁管：RWA、物业经理，还是根本没人管？"
    - 在 7-10 am 和 6-9 pm 两个高峰时段，能做到怎样的填充率和响应 SLA，而不会变成负贡献利润？
    - 物业经理会先买单，还是大多数目标社区里最终仍由 RWA 委员会拍板？
    - 要在封闭式社区内安全运营这项服务，究竟需要多少住户和工人数据？
    - 如果试点开始起量，Mygate、NoBrokerHood 或大型消费端应用会多快复制或封堵这套工作流？
  riskHeatmap:
    - risk: 某条走廊在高峰窗口内后备工人供给失灵
      likelihood: High
      impact: High
      leadingIndicator: 试点周里高峰填充率持续低于 90%，或工人爽约率超过 10%
      mitigation: 只在相邻高密度塔楼启动，给后备工人保底收入，并在前两个高峰窗口故意超配，直到需求模式稳定。
    - risk: 买方碎片化拖慢销售和续约
      likelihood: Medium
      impact: High
      leadingIndicator: 从试点提案到签约启动超过 60 天，或试点卡在委员会审批上迟迟不动
      mitigation: 先卖给有授权的组合型运营商，并用与投诉和 SLA 结果挂钩的短期付费试点推进。
    - risk: 安全、骚扰或隐私事件打击信任
      likelihood: Medium
      impact: High
      leadingIndicator: 任一试点都需要反复人工处理身份、门岗出入或投诉升级的例外情况
      mitigation: 把核验、审计日志、紧急升级、保险和严格的数据最小化作为第一天就执行的运营标准。
    - risk: 待命排班导致单位经济失真
      likelihood: High
      impact: High
      leadingIndicator: 后备工人利用率低于计划，或前三个社区之后单班次毛利仍为负
      mitigation: 对社区设置固定起订额，聚焦相邻塔楼，并在密度足够前限制服务范围。
    - risk: incumbents 或渠道伙伴复制这套工作流
      likelihood: Medium
      impact: Medium
      leadingIndicator: 社区 ERP 厂商或消费端应用开始向同一批账户推销楼宇级后备覆盖
      mitigation: 尽早拿下运营商关系，能集成时就集成，并在塔楼层面建立差异化的绩效数据和运营手册。
operatingAssumptions:
  - assumption: 物业管理公司比独立 RWA 更快批准试点，而且一段关系就能解锁多栋塔楼。
    basis: idea.yaml
    validationTest: 访谈 10 家 Gurugram 运营方，并从可控制多于一栋塔楼的经理手中拿到至少 3 个试点承诺。
    decisionImpact: 如果不成立，销售模型就会转向更慢的直接 RWA 销售，前 18 个月的社区目标也应下调。
  - assumption: Gurugram 高端社区已经积累了足够多、足够反复的缺勤痛点，因此愿意支付持续性的连续性费用。
    basis: research.yaml
    validationTest: 从 5 个目标社区收集基线投诉日志和付费意愿反馈；至少 3 个社区需要明确指出一个现有运营或住户体验预算科目。
    decisionImpact: 如果不成立，产品就必须转向住户付费或伙伴主导模式，这会削弱楼宇级切口。
  - assumption: 后备劳动力可以通过保底待命时段而不是纯按单激励被招到并留住。
    basis: operator judgment
    validationTest: 跑一批 30 名工人的招募 cohort，并跟踪 Gurugram 两条试点走廊内的 30 天留存、接单率和实际利用率。
    decisionImpact: 如果不成立，贡献利润会恶化，公司可能需要缩短服务时窗或换一套劳动力模型。
  - assumption: 轻量集成或手工流程就足以支撑第一批试点；不需要深度 API 接入也能证明价值。
    basis: research.yaml
    validationTest: 用手工或 CSV 方式同步门岗与员工数据，启动一个试点，并测量每单请求的门岗延迟和运营耗时。
    decisionImpact: 如果不成立，在收入被证明前，工程范围和伙伴依赖都会显著增加。
  - assumption: 在加入保育或陪护等更高信任品类前，后备清洁与杂务覆盖是最合适的第一服务。
    basis: idea.yaml
    validationTest: 先比较仅清洁试点中的需求量、履约成功率和事件复杂度，再测试一个相邻品类。
    decisionImpact: 如果不成立，路线图应转向续约率和利润率最强的品类，而不是过早扩张。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 进行 15-20 次结构化买家访谈，并与管理多栋塔楼的 Gurugram 运营商签下 3 份付费试点 LOI。
    hypothesis: 投诉归属和问题紧迫度足以让运营商为一个短期连续性试点买单。
    successMetric: 3 份已签署的付费试点 LOI，且至少 8 位买家确认当前预算拥有者或审批路径。
    owner: CEO
  - horizon: 0–90 天
    experiment: 在 Gurugram 一条走廊招募首批 20-30 名后备工人，并测试培训、核验和待命时段到岗情况。
    hypothesis: 保底待命时段模型，可以在不依赖消费平台级补贴的前提下吸引稳定供给。
    successMetric: 首批 cohort 达到 70%+ offer acceptance、80%+ 培训完成率，以及 60%+ 的 30 天留存。
    owner: 城市运营负责人
  - horizon: 3–6 个月
    experiment: 用人工调度和设施办公室录单，在 3-5 栋相邻塔楼之间启动 concierge 试点。
    hypothesis: 在住户自助化功能上线前，也能先把运营价值证明出来。
    successMetric: ">90% fill rate during committed windows, median gate-entry time under 5 minutes, and at least 20% complaint reduction versus baseline."
    owner: CEO
  - horizon: 3–6 个月
    experiment: 与某个社区 ERP 或门岗管理工具测试一项轻量集成或工作流同步。
    hypothesis: 现有社区软件可以明显降低门岗摩擦，让服务更像原生能力。
    successMetric: 手工出入例外减少 50%+，且每个完成请求带来的额外运营负担低于 10 分钟。
    owner: Founding eng
  - horizon: 6–12 个月
    experiment: 在两组试点中测试订阅起订额和使用费定价。
    hypothesis: 固定费加使用费的混合模式，比纯使用计费更能带来续约和毛利。
    successMetric: 试点转年度合同高于 60%，且续约合同上的社区级毛利率朝目标值靠拢。
    owner: CEO
  - horizon: 9–15 个月
    experiment: 把一个成功运营商从 1 个社区扩到 4+ 个社区，并只在最强走廊增加一个相邻劳动力品类。
    hypothesis: 同一组买家关系和同一套操作系统，可以在不重置 CAC 的情况下扩张。
    successMetric: 现有运营商带来的扩展收入超过同 cohort 新 logo 收入，且相邻品类的事件率不高于清洁基线。
    owner: 企业销售负责人
operations:
  - 背景核验、警方核查支持和工人身份审计轨迹，必须成为标准 onboarding 流程。
  - 培训手册应覆盖清洁 SOP、住户礼仪、安全升级和楼宇出入合规。
  - 事件响应需要有成文升级路径、随叫随到的主管，以及 24 小时内完成事后复盘。
  - 需求预测和调度应按走廊逐条管理，而不是全城撒网，以保护填充率可靠性。
  - 在大规模推进社区 rollout 前，就应选定保险与工人支持伙伴。
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 因为预算归属尚未被证明，必须亲自负责买家发现、试点销售、运营商关系和早期服务设计。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 需要在试点前不过度建设的前提下，先做出调度、SLA 报表、工人档案和轻量集成能力。
  - role: 城市运营负责人
    startTiming: Month 1
    rationale: 供给招募、培训、排班和事件管理，正是这个切口的运营核心。
  - role: 企业销售负责人
    startTiming: Month 3
    rationale: 一旦首个试点动作跑通，就需要专门的销售把运营商转成合同，并从一栋扩到多栋。
  - role: 培训与合规经理
    startTiming: Month 4
    rationale: 在扩展相邻品类或新增走廊前，核验、SOP 执行和安全质量必须先能放大。
milestones:
  - horizon: 0–12 个月
    items:
      - 在 Gurugram 由运营商控制的社区拿下 3 个付费试点
      - 至少完整经历一个缺勤周期后，在签约窗口内维持 >90% 填充率
      - 至少把 2 个试点转成年合同
      - 上线一项真实可用的工作流集成，或与某个社区 ERP / 门岗系统建立稳定的手工同步
      - 在 Gurugram 两条走廊内达到 5-8 个签约社区
  - horizon: 12–24 个月
    items:
      - 扩展到 12-15 个签约社区，并至少拥有 2 个管理多栋塔楼的运营商账户
      - 在签约社区内加入住户自助预约
      - 证明走廊级劳动力规划能够持续改善毛利率
      - 只在最强走廊上线一个相邻劳动力品类
  - horizon: 24–36 个月
    items:
      - 达到与第三年 SOM 情景一致的约 25 个签约社区
      - 把运营商仪表盘和事件日志产品化为高级报表模块
      - 基于留存和利用率数据，决定是进入第二个 NCR 集群，还是继续加深 Gurugram 密度
      - 与至少一个更大平台或托管居住运营方测试溢出供给合作
risks:
  - risk: 后备工人供给过薄，无法兑现早晚时段的 SLA 承诺。
    likelihood: High
    impact: High
    mitigation: 聚焦走廊，给保底待命收入，并在利用率和留存稳定前推迟扩张。
  - risk: 采购权分散在 RWA、委员会和物业经理之间。
    likelihood: Medium
    impact: High
    mitigation: 先做运营商可控的组合，并用不需要先走全年审批的短期付费试点切入。
  - risk: 安全、骚扰或隐私失误带来不成比例的声誉损害。
    likelihood: Medium
    impact: High
    mitigation: 把核验、数据最小化、事件日志、保险和升级协议做成默认工作流。
  - risk: 在社区密度较低时，固定费加使用费的定价模型无法覆盖待命劳动力成本。
    likelihood: High
    impact: High
    mitigation: 设定社区起订额，只做高密度相邻塔楼，并在后备经济性被证明前限制品类。
  - risk: ReserveGrid 还没锁定分发，incumbent 应用或社区 ERP 就延伸进同一工作流。
    likelihood: Medium
    impact: Medium
    mitigation: 尽早拿下运营商关系，在适合时优先集成而不是硬碰硬，并积累难以快速复制的数据和流程深度。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月证明 Gurugram 滩头市场：建立走廊级后备劳动力网络、跑出 8-10 个在线社区、完成试点转年约、搭出合规级运营能力，并拿到支撑下一轮 seed 的首批扩展数据。
