slug: backup-house-help-grid
date: 2026-04-26
executiveSummary: ReserveGrid 要解决的是印度快速增长的即时家政赛道里一个很具体的失灵场景：固定阿姨一缺席，高端公寓社区就没有可信的楼栋级兜底。Snabbit、Pronto 和 Urban Company 同月的报道说明，C 端需求是真的，但一遇到劳动力迁移冲击，供给就会塌，而且因为服务发生在私人住宅里，安全门槛也只会更高。公司计划从 Gurugram 入住户数 500+ 的封闭式社区起步，卖给物业运营方的是备用劳动力 SLA，不是另一个家庭撮合市场。MVP 是一套社区运营产品：已预审的备用人手池、楼栋专属门禁流程、数字化签到签退以及事件处理，全都放进一个后台。GTM 从手握多栋楼盘的区域物业经理切入，因为一纸合同就能撬动高密度需求，采购也比一栋楼一栋楼去卖 RWA 更短。研究测出的首个切口市场不大——TAM 约 $73M、SAM 约 $5.1M、第 3 年 SOM 约 $0.9M——所以这是不是 VC 案子，取决于它能否证明自己可以扩到相邻的受管理住宅劳动力品类和平台溢出基础设施。最能证伪这个故事的两点也很清楚：社区会不会用共用预算为“连续性”买单；早晚高峰的备用排班能否在不打穿毛利的前提下守住 >90% 的补位率。在 Gurugram 付费试点把这两件事跑通之前，预算归属和合作方意愿都只能当假设，不能当事实。
problem:
- 固定阿姨、厨师或保姆一旦爽约，高端公寓社区就得吞下住户投诉和安全风险，但现有兜底方案仍零散地散在 WhatsApp 群、本地中介和消费者 App 里。
- 同一时间窗口的报道显示，即时家政 App 在劳动力迁移冲击下也会失灵，所以真正的痛点不是“发现服务”，而是“服务不断档”和“可信通行”。
- RWA 和物业经理早就把访客和工作人员流程做成正式制度了，但在备用用工规划、补位率可视化和事件响应上，依然没有一套经得起审计的系统。
solution:
- 向公寓社区出售楼栋级备用家政网格：一边配好已预审的备用工人，一边接上楼栋专属门禁规则，并在缺勤高峰时负责派单补位。
- 给物业团队一个统一后台，把需求受理、ETA 跟踪、数字化签到签退、事件日志，以及按楼栋和时间窗拆分的 SLA 报表全收进去。
- 把住户需求收回到楼栋体系里，而不是放在独立消费者 App 上，让高密度塔楼内部先形成需求池，待命产能才有规划空间。
whyWeWin:
- 这个切口把需求聚在社区层：只有密度起来，备用人手才跑得动经济账，而安全控制也恰好在这一层最重要。
- “消费者 App 优化的是逐户获客；社区 ERP 优化的是门禁和收费；ReserveGrid 夹在中间，补的是两边今天都没承诺的一件事：在封闭社区里保证有人兜底补位。”
- Gurugram 是天然的集中启动区：高端住宅供给、社区软件普及度和 NCR 的家政需求，本来就都堆在这里。
- 只要试点跑通，公司就能持续沉淀缺勤模式、高峰窗口、补位率和门禁摩擦等专有数据，后面的排班准确率会越滚越强。
strategicChoices:
  beachhead: Gurugram 入住户数 500+ 的高端封闭式社区，先通过已经控制多栋楼盘的物业管理公司销售。
  wedgeRationale: 这条切入路径比做泛家庭 App 更快出证明，因为一个买方就能打开重复需求、共用运营流程，以及足够高的密度去验证待命人手利用率。更关键的是，预算归属方、投诉归属方和安全负责人会在同一条销售链路里对齐。
  sequencingRationale: 先做高触达、服务范围收得很窄的产品，把三件事先证出来：买方愿不愿意付费、高峰时段补位率稳不稳、门禁操作够不够安全。等这些指标稳定后，再去加深 ERP 集成、自动化住户预约，并扩品类或扩区域。
  notYet:
  - 不做面向合同外单个家庭的独立 C 端 App
  - 在备用保洁和基础家务还没跑出可复制毛利前，不扩到厨师、保姆、养老护理或住家服务
  - 在 Gurugram 两个片区还没跑出稳定的试点转生产和工人利用率前，不做多城市扩张
market:
  tam: 印度大型受管理社区的窄口 TAM 约 $73M
  sam: Gurugram 与高端 NCR 滩头市场的 SAM 约 $5.1M
  som: 第 3 年 SOM 约 $0.9M，假设约 25 个社区、每个社区约 800 个已入住单元
  segments:
  - 在 Gurugram 运营高端封闭式公寓社区的物业管理公司
  - Gurugram 及周边 NCR 集群里，入住户数 500+ 的大型独立 RWA
  buyingProcess: 最可能的内部牵头人，是负责住户升级投诉和供应商协同的区域运营负责人或社区总经理。采购接着会走 RWA 委员会或运营方审批，尽调重点会落在安全、数据处理、工人核验，以及付费试点能不能在一个缺勤周期内把补位率做快、把投诉压下来。
product:
  mvp: 高触达、由运营带着跑的社区连续性产品，首阶段只做备用保洁和基础家务。范围包括备用工人名册管理、楼栋专属门禁审批、需求受理、派单、实时 ETA、数字化签到签退，以及带周度 SLA 报告的事件记录。
  sixMonth: 补上楼栋级需求预测、工人培训与核验档案、住户偏好画像、周期性备勤窗口规划，以及与一个社区 ERP 或门禁系统的轻量集成 / CSV 同步。
  twelveMonth: 在签约社区里上线住户自助预约、多楼栋运营方看板、自动化投诉与补位率报表，以及面向早晚高峰需求的排队逻辑。
  twentyFourMonth: 从备用保洁扩到相邻的受管理住宅劳动力品类，比如厨师、保姆和养老护理员，并测试与更大 C 端平台的 API 式溢出供给合作。
  keyBets:
  - 按片区、楼栋和时间窗看，楼栋级需求的可预测性足够高，能撑起一支备用人手池。
  - 只要几周内能明显减轻投诉和门禁摩擦，物业办公室就愿意换工作流。
  - 在还不需要深度 ERP 集成前，靠人工运营也足以把商业价值先证明出来。
  - 核验、日志和事件响应这些信任功能，强到足以让社区愿意从共用运营预算里掏钱。
gtm:
  wedge: 先卖给一个区域物业运营方一单 6-12 周、覆盖附近 3-5 栋 Gurugram 高端楼盘的连续性付费试点；随后拿补位率、投诉下降和可审计性做证据，把它转成年化的多社区合同。
  channels:
  - 直接外呼区域物业管理公司和社区总经理
  - 早期标杆社区带来的 RWA 转介绍
  - 与社区 ERP、门禁管理厂商做集成和转介绍合作
  - 来自可信本地招募方和培训伙伴的工人转介绍闭环
  funnelTargets: 目标账户到有效需求确认 30%+，需求确认到付费试点 25%+，试点到年约 60%+，首个运营方在 6 个月内扩到 2+ 额外楼栋 40%+
  pricing: 按入住户数收月费，并设置社区最低保底；再按每次实际完成的备用班次收费，另外加可选的高级报表或合规模块。这样既能贴合社区的经常性预算，又能把高峰用量和实际履约需求挂钩定价。
businessModel:
  revenueStreams:
  - 与连续性覆盖挂钩、按入住户数收取的社区订阅费
  - 按实际完成的备用班次计费
  - 面向大型运营方的高级合规、审计与事件报表模块
  unitOfValue: 被连续性合同覆盖的入住户数；实际完成的备用班次则是用量计费单位
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一运营方组合内，把一栋楼扩成多栋楼
  - 在备用用工单位经济模型跑通后，继续加相邻劳动力品类
  - 为企业级运营方销售更高价值的合规与报表功能
  - 与消费者平台、共居或养老社区运营方做溢出供给合作
strategyMap:
  northStarMetric: 签约社区里，每周在 SLA 内完成的备用请求数
  inputMetrics:
  - 付费试点中标率
  - 高峰时段补位率
  - 门禁进场中位时间
  - 工人 30 天留存率
  - 试点转年约转化率
  - 单社区投诉下降幅度
  moatsToBuild:
  - 楼栋级缺勤与补位率专有数据集
  - 嵌进社区运营里的门禁、核验和事件流程
  - 在少数 Gurugram 高密片区里形成工人供给密度与培训口碑
  - 把一份合同扩成多栋楼的多社区运营方关系
  killCriteria:
  - 前 20 个合格运营方账户里，拿不到 3 个付费试点
  - 试点里连续 8 周都守不住 90% 的高峰时段补位率
  - 完整跑完一个试点周期后，看不到可量化的投诉下降或响应时间改善
  - 即便给了保底备勤窗口，工人 30 天留存仍低于 60%
  mermaid: |
    flowchart LR
      Wedge[Sell continuity pilots to multi-tower Gurugram operators] --> MVP[Reserve bench + dispatch + gate workflow MVP]
      MVP --> Proof[Prove fill rate, complaint reduction, and safe operations]
      Proof --> Expansion[Expand to more towers, more categories, and overflow partnerships]
investorMemo:
  verdict:
    call: 值得见 / 继续调查
    conviction: 在付费试点证明预算归属和备用人手毛利前，信心只到低-中。
    whyBelieve: 痛点真实、类目需求可见、楼栋级切口清晰，足以走出一条现有玩家并未直接优化的早期验证路径。
    whyDoubt: 初始切口很窄，而最难的两件事——社区共用预算是否愿意付费、早晚高峰单位经济模型是否成立——现在都还只是假设。
    nextDiligence: 拿下 3 个 Gurugram 付费试点，由同一多楼栋运营方签约，并连续 8 周证明 >90% 的补位率和可量化的投诉下降。
  firstCustomer:
    title: 负责 Gurugram 高端社区的区域物业运营负责人
    profile: 管理 15-30 栋高端楼盘的住户体验、安保和供应商流程，家政缺勤会反复引发升级投诉。
    trigger: 季节性工人外流、选举期缺勤，或关于固定阿姨爽约却迟迟无法解决的住户投诉突然抬头。
    buyer: 区域运营负责人
    initialContract: 先签一单 6-12 周、覆盖一个 500-800 户社区的付费试点，价格约 ₹3-6 lakh；如果 SLA 和安全指标达标，再转成年约，合同规模约 ₹15-30 lakh。
  mustBeTrue:
  - 多楼栋物业运营方必须把备用家政当成值得集中预算解决的共享运营问题。
  - Gurugram 至少有一个微市场，能靠预审备用工人把高峰时段补位率连续 8 个试点周守在 >90%。
  - 付费试点必须把投诉量或投诉解决时长降到足以让运营方续签年约。
  - 工人招募和保底备勤窗口必须带来稳定留存，而不是靠高补贴堆出大量闲置时间。
  - 社区 ERP 和门禁流程要足够可接入，不能让 ReserveGrid 反而增加不可接受的运营摩擦。
  diligenceQuestions:
  - 住户投诉固定阿姨缺勤时，今天到底是谁出预算：RWA、物业经理，还是根本没人出？
  - 在 7-10 am 和 6-9 pm 的高峰时段，不打成负贡献毛利的前提下，究竟能做到什么补位率和响应 SLA？
  - 是物业经理会先买单，还是大多数目标社区最终仍由 RWA 委员会拍板？
  - 在封闭社区里安全地跑这项服务，真实需要收集多少住户和工人数据？
  - 如果试点起势，Mygate、NoBrokerHood 或大型消费者 App 会多快抄走流程，或卡死渠道？
  riskHeatmap:
  - risk: 片区里的备用工人供给太薄，守不住高峰时段承诺。
    likelihood: High
    impact: High
    leadingIndicator: 高峰时段补位率长期低于 90%，或试点周里工人爽约率超过 10%
    mitigation: 只在相邻高密楼栋启动，给备用工人保底收入，并在前两个高峰窗口先超配人手，直到需求模式稳定。
  - risk: 买方碎片化，拖慢销售和续约。
    likelihood: Medium
    impact: High
    leadingIndicator: 从试点提案到签约启动超过 60 天，或试点卡在委员会审批上走不动
    mitigation: 先卖给有授权的资产组合运营方，并把短期付费试点绑在清晰的投诉和 SLA 结果上。
  - risk: 安全、骚扰或隐私事件损伤信任。
    likelihood: Medium
    impact: High
    leadingIndicator: 任何试点都反复出现身份、门禁或投诉升级的人工例外处理
    mitigation: 把核验、审计日志、一键报警升级、保险和严格的数据最小化，设成第一天就默认开启的操作标准。
  - risk: 待命排班把单位经济模型打穿。
    likelihood: High
    impact: High
    leadingIndicator: 备用工人利用率长期低于计划，或前 3 个社区过后单班次毛利仍为负
    mitigation: 设定固定社区最低保底，只做相邻楼栋，并在密度上来前限制服务范围。
  - risk: 现有 App 或渠道伙伴在 ReserveGrid 建立分发锁定前，就把同一流程做出来。
    likelihood: Medium
    impact: Medium
    leadingIndicator: 社区 ERP 厂商或消费者 App 开始向同一批账户推销楼栋级备用覆盖
    mitigation: 尽早拿下运营方关系，能集成就集成，同时把楼栋级数据和流程深度做成难以快速复制的壁垒。
operatingAssumptions:
- assumption: 物业管理公司比独立 RWA 批试点更快，而且一段关系就能打开多栋楼。
  basis: idea.yaml
  validationTest: 访谈 10 位 Gurugram 运营方，并从能控制多栋楼的经理手里拿到至少 3 个试点承诺。
  decisionImpact: 如果不成立，销售模型就会转向更慢的直销 RWA，前 18 个月的社区目标也该往下修。
- assumption: Gurugram 的高端社区已经有足够多反复发生的缺勤痛点，值得支付持续性的连续性费用。
  basis: research.yaml
  validationTest: 拿 5 个目标社区的基线投诉日志和付费意愿反馈；至少有 3 个社区能指出现有的运营或住户体验预算项。
  decisionImpact: 如果不成立，产品就得改成住户付费或渠道主导，这会削弱楼栋级切口。
- assumption: 与纯按单激励相比，给保底备勤窗口更能招到并留住备用工人。
  basis: 运营判断
  validationTest: 跑一批 30 名工人的招募试验，追踪两条试点片区里的 30 天留存、接单率和实际利用率。
  decisionImpact: 如果不成立，贡献毛利会恶化，公司可能得收窄服务时间窗，甚至更换劳动力模型。
- assumption: 首批试点只靠轻量集成或人工流程就够证明价值，还不需要深度 API。
  basis: research.yaml
  validationTest: 用人工或 CSV 同步方式上线一个试点，同时测门禁延迟和单次请求消耗的运营工时。
  decisionImpact: 如果不成立，在营收被证明前，工程范围和对合作伙伴的依赖都会明显上升。
- assumption: 在扩到保姆或养老护理这类高信任品类前，先做备用保洁和家务是最对的起步服务。
  basis: idea.yaml
  validationTest: 先比较只做保洁试点下的请求量、履约成功率和事件复杂度，再测试一个相邻品类。
  decisionImpact: 如果不成立，路线图就该转向续约和毛利最强的那个品类，而不是过早做大而全。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 做 15-20 场结构化买方访谈，并从 Gurugram 多楼栋运营方手里拿下 3 份付费试点 LOI。
  hypothesis: 投诉归属和紧迫度足够强，运营方会愿意为一段短期连续性试点买单。
  successMetric: 拿到 3 份已签字的付费试点 LOI，且至少 8 位买方能确认当前预算归属方或审批路径。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 在 Gurugram 一个片区招募首批 20-30 名备用工人，测试培训、核验和备勤出勤情况。
  hypothesis: 保底备勤窗口模式能吸引到可靠供给，而不用打到消费者平台级别的补贴。
  successMetric: 首批试点组里，录用邀约接受率 70%+、培训完成率 80%+、30 天留存 60%+。
  owner: 城市运营负责人
- horizon: 3–6 个月
  experiment: 在 3-5 栋相邻楼盘间上线一轮高触达试点，用人工派单和物业办公室受理需求。
  hypothesis: 在还没做住户自助自动化前，运营价值就已经足够清楚。
  successMetric: '>90% 的承诺窗口补位率、门禁进场中位时间低于 5 分钟，且投诉量较基线下降至少 20%。'
  owner: 创始人 / CEO
- horizon: 3–6 个月
  experiment: 测试一套与社区 ERP 或门禁工具的轻量集成 / 工作流同步。
  hypothesis: 现有社区软件足以明显降低门禁摩擦，让服务看起来像系统原生能力。
  successMetric: 人工门禁例外处理减少 50%+，且每次成功履约新增的运营开销低于 10 分钟。
  owner: 创始工程师
- horizon: 6–12 个月
  experiment: 在两组试点组上测试订阅保底与用量费的组合定价。
  hypothesis: 固定费 + 用量费的混合模型，比纯用量计费更能守住续约和毛利。
  successMetric: 试点转年约转化率高于 60%，且续签合同的社区级毛利率开始逼近目标。
  owner: 创始人 / CEO
- horizon: 9–15 个月
  experiment: 把一个跑通的运营方从 1 个社区扩到 4+ 个社区，并且只在最强片区加 1 个相邻劳动力品类。
  hypothesis: 同一段买方关系和同一套操作系统，可以在不重置 CAC 的前提下扩张。
  successMetric: 现有运营方带来的扩张收入超过同期新客户收入，且相邻品类的事件率不高于保洁基线。
  owner: 企业销售负责人
operations:
- 背景核验、协助做警方核验，以及工人身份证明审计链路，必须成为标准上岗流程。
- 培训手册要覆盖保洁 SOP、住户礼仪、安全升级和楼栋进场合规。
- 事件响应必须有成文升级路径、值班主管，以及 24 小时内完成的事后复盘。
- 需求预测和派单要按片区跑，不能全城一锅端，否则补位率很难稳住。
- 在大规模铺开社区前，就先把保险和工人支持伙伴敲定。
team:
- role: 创始人 / CEO
  startTiming: 第 0 个月
  rationale: 预算归属还没被验证，所以买方发现、试点销售、运营方关系和早期服务设计都必须由创始人亲自抓。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 要在不因试点而过度开发的前提下，搭出派单、SLA 报表、工人档案和轻量集成。
- role: 城市运营负责人
  startTiming: 第 1 个月
  rationale: 招供给、做培训、排班次和管事件，是这个切口最核心的运营重活。
- role: 企业销售负责人
  startTiming: 第 3 个月
  rationale: 一旦首个试点动作跑顺，就需要专门的销售把运营方转成合同，并把一栋楼扩成多栋楼。
- role: 培训与合规经理
  startTiming: 第 4 个月
  rationale: 在加相邻品类或继续铺片区前，必须先把核验、SOP 执行和安全质量做到可复制。
milestones:
- horizon: 0–12 个月
  items:
  - 拿下 3 个由 Gurugram 运营方控制社区的付费试点
  - 在承诺窗口内，至少完整跑过 1 个缺勤周期且补位率守住 >90%
  - 至少把 2 个试点转成年约
  - 上线 1 个社区 ERP / 门禁系统的真实集成或可靠的人工同步流程
  - 在 Gurugram 两个片区做到 5-8 个签约社区
- horizon: 12–24 个月
  items:
  - 扩到 12-15 个签约社区，且至少拿下 2 个多楼栋运营方账户
  - 在签约社区内部上线住户自助预约
  - 证明片区级劳动力规划能够稳定带来毛利改善
  - 只在最强片区上线 1 个相邻劳动力品类
- horizon: 24–36 个月
  items:
  - 做到约 25 个签约社区，与第 3 年 SOM 情形相符
  - 把运营方看板和事件日志产品化成高级报表模块
  - 根据留存和利用率数据，决定是进入第二个 NCR 集群，还是继续加深 Gurugram 密度
  - 与至少 1 个更大平台或受管理居住运营方测试溢出供给合作
risks:
- risk: 备用工人供给太薄，守不住早晚高峰的 SLA 承诺。
  likelihood: High
  impact: High
  mitigation: 继续按片区聚焦，给保底备勤收入，并在利用率和留存稳定前不扩张。
- risk: 采购权分散在 RWA、委员会和物业经理之间。
  likelihood: Medium
  impact: High
  mitigation: 先从运营方直接控制的资产组合切入，用短期付费试点绕开完整年约审批周期。
- risk: 安全、骚扰或隐私失误会带来放大的声誉伤害。
  likelihood: Medium
  impact: High
  mitigation: 把核验、数据最小化、事件日志、保险和升级协议都做成默认工作流。
- risk: 固定费 + 用量费的定价，在低社区密度下 cover 不住待命人手成本。
  likelihood: High
  impact: High
  mitigation: 设置社区最低保底，只从相邻高密楼栋起步，并在备用经济模型被证明前限制品类。
- risk: 在 ReserveGrid 建立分发锁定前，现有 App 或社区 ERP 就把同一套流程做出来。
  likelihood: Medium
  impact: Medium
  mitigation: 尽早拿下运营方关系，能集成就别硬碰硬，同时把数据和流程深度做成难以快速复制的壁垒。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 融资目标是支撑 18 个月：把 Gurugram 滩头市场做实，搭起片区级备用劳动力网络，跑出 8-10 个真实运营社区、试点转年约、合规级运营体系，以及足以支撑更大一轮 seed 融资的首批扩张数据。
