  "regulatoryLandscape": "Regulation is not yet the main growth unlock, but it is a real constraint. Domestic work in India remains fragmented and only partially formalized. Verification requirements, worker protection expectations, and data-handling obligations are rising faster than the law is becoming uniform. That favors startups that behave like compliance-grade operators from day one."
  "technologyLandscape": "The category is borrowing the quick-commerce operating model: dense micromarkets, rapid dispatch, repeat use, and full-stack worker management. The technological edge is less about AI matching and more about workflow plumbing — gate approvals, staffing forecasts, audit logs, training records, and reliable ETA execution."
