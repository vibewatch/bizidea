"reportMemo":
  "executiveTakeaways":
  - "The evidence supports a real pain point, but the investable wedge is much narrower than the headline home-services market: continuity for dense premium communities, not another generic maid app."
  - "Supply reliability and trust are the real bottlenecks. Customer demand already exists; what breaks during shocks is trained labor density, access approval, and incident handling."
  - "Urban Company, Snabbit, and Pronto are validating consumer demand, but they are optimizing household acquisition and micromarket density rather than building-level reserve SLAs."
  - "Gurugram is a credible beachhead because premium apartment supply is dense, community software is already entrenched, and NCR is a core demand cluster for instant house help."
  - "The market remains early and operationally hard: online penetration is still tiny, the leading players are subsidy-heavy, and worker onboarding lags demand growth."
  - "Any winning product must look as much like security/compliance infrastructure as labor dispatch: verification, data governance, access logs, and safety escalation are central, not ancillary."
  "marketDefinition": "ReserveGrid sits at the intersection of instant domestic-help platforms and gated-community operations software. The market is defined as building-level continuity and backup labor for dense apartment communities that already run formal access, billing, and resident workflows. The economic buyer is the community operator or RWA leadership, while the end user is the facility office plus residents. This memo intentionally excludes standalone homes, broad beauty/repair marketplaces, and traditional full-time live-in maid placement."
  "customerAndBuyer": "The best initial customer is a property or community operator responsible for service continuity inside 500+ occupied-unit gated complexes in Gurugram. The user is typically the facility office, security desk, or resident-support team that absorbs complaints when maids do not show up. The buyer is motivated by resident satisfaction, gate-control risk, and operational consistency rather than by pure labor arbitrage. Budget likely sits inside society operations, security, or resident-experience spending, but committee approvals, vendor diligence, and data/privacy concerns create real procurement friction."
  "buyingTriggers":
  - "point": "Seasonal or election-driven maid absenteeism that leaves residents without any reliable fallback."
    "sourceRefs":
    - 22
    - 20
  - "point": "Repeated resident complaints from working households when morning and evening help slots disappear on short notice."
    "sourceRefs":
    - 22
    - 21
  - "point": "A safety incident, verification lapse, or gate-access breakdown that exposes the weakness of ad hoc WhatsApp and agency-based coordination."
    "sourceRefs":
    - 6
    - 30
    - 31
  "willingnessToPay":
    "summary": "Households already pay for urgent backup labor: Urban Company publicly piloted at ₹49/hour, India Today documented sub-₹200 use cases for roughly two hours, Snabbit has publicly disclosed ₹169-₹499 packages, and Broomees sells on-demand help at ₹179/hour. Communities also already buy ERP/security tooling and process large recurring dues, making a shared continuity fee plausible — but price sensitivity is clearly real, so the offer must save time and complaints, not just add convenience."
    "sourceRefs":
    - 35
    - 21
    - 12
    - 26
    - 2
    - 3
  "competitiveLandscape": "Competition comes from four directions: consumer instant-help apps, traditional agencies, informal maid networks, and community-management software. The proposed startup is strongest where these categories intersect but none fully solve the problem: guaranteed backup fill within a gated community with pre-cleared access and incident traceability."
  "incumbentThesis":
  - "incumbentClass": "Consumer marketplaces"
    "point": "Urban Company, Snabbit, and Pronto win household demand, but they do not own the building-level SLA, reserve bench, or resident-governance workflow that matters when multiple apartments fail at once."
    "sourceRefs":
    - 9
    - 10
    - 11
    - 14
  - "incumbentClass": "Society ERPs and gate apps"
    "point": "Mygate and NoBrokerHood already own visitor, billing, and staff-entry workflows, but they do not guarantee labor supply; that makes them better channels or integration surfaces than default winners."
    "sourceRefs":
