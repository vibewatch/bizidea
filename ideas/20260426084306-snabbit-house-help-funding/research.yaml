"market":
  "tam":
    "value": "$73M"
    "rationale": "Bottom-up: start with 8.8M gross managed homes/families across Mygate (4.0M) and NoBrokerHood (4.8M), remove an estimated 30% overlap to ~6.2M unique homes, filter 25% for large gated communities where a reserve bench is economically plausible (= ~1.55M homes), then apply an estimated blended annual revenue of ₹4,000 per home. Result ≈ ₹6.2B, or roughly $73M."
    "isEstimate": true
    "sourceRefs":
