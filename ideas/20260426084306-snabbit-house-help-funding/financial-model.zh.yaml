scenarios:
  downside:
    description: 运营方审批更慢、走廊密度更弱，导致公司到 Q4Y3 只能做到 18 个社区。
    y3RevenueK: 590.0
    y3EbitdaK: -420.0
    cashLowPointK: -1450.0
    keyAssumptionChanges:
    - 销售周期延长约 2 个月，且试点转年度合同的转化率低于 BP 目标。
    - 随着用量费和高级模块滞后，每个社区的年综合收入降至约 $38K。
    - 由于预备劳动力利用率改善更慢，Y3 末报告口径毛利率仅约 60%。
  base:
    description: 古尔冈切口按计划推进，Y3 末达到 26 个社区，报告口径利润率持续改善但仍低于目标。
    y3RevenueK: 845.4
    y3EbitdaK: -199.1
    cashLowPointK: -1046.8
    keyAssumptionChanges:
    - 社区爬坡遵循里程碑路径：Y1 为 6 个、Y2 为 15 个、Y3 为 26 个。
    - 每个社区的年综合收入维持在约 $42K。
    - 报告口径毛利率从试点期的利用不足逐步改善，向 70% 稳态目标靠拢。
  upside:
    description: 多楼扩张更快、预备工池利用率更高，推动业务在 Q4Y3 接近盈亏平衡。
    y3RevenueK: 1080.0
    y3EbitdaK: -40.0
    cashLowPointK: -860.0
    keyAssumptionChanges:
    - 两家运营方客户扩张更快，Y3 末约达到 30 个社区。
    - 随着用量和报表模块附加率提升，每个社区的年综合收入升至约 $45K。
    - 随着走廊密度更快改善，Y3 末报告口径毛利率升至约 69%。
sensitivity:
- variable: ARPU
  downsideCase: 每个社区的年综合收入降至 $38K。
  baseCase: 每个社区的年综合收入为 $42K。
  upsideCase: 每个社区的年综合收入升至 $46K。
  y3RevenueImpactK: -80.0
  cashImpactK: -110.0
- variable: CAC
  downsideCase: 由于企业尽调拉长，CAC 升至 $24K。
  baseCase: CAC 为 $18K。
  upsideCase: 在运营方转介绍和 ERP 合作推动下，CAC 降至 $14K。
  y3RevenueImpactK: 0.0
  cashImpactK: -140.0
- variable: churn
  downsideCase: 试点转合同后，月流失率升至 3.0%。
  baseCase: 月流失率为 2.0%。
  upsideCase: 月流失率改善至 1.5%。
  y3RevenueImpactK: -90.0
  cashImpactK: -130.0
- variable: sales cycle
  downsideCase: 试点转年度合同周期拉长至约 6 个月。
  baseCase: 试点转年度合同周期约为 4 个月。
  upsideCase: 强有力证明将周期缩短至约 3 个月。
  y3RevenueImpactK: -120.0
  cashImpactK: -170.0
- variable: gross margin
  downsideCase: Y3 末报告口径毛利率为 64%。
  baseCase: 在 70% 稳态目标下，Y3 末报告口径毛利率处于 60% 中段。
  upsideCase: Y3 末报告口径毛利率为 69%。
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
- variable: hiring pace
  downsideCase: 运营和 GTM 招聘比收入提前 2 个季度进行。
  baseCase: 招聘节奏跟随本模型中的社区爬坡。
  upsideCase: 在不影响 SLA 的前提下，招聘比计划晚 1 个季度。
  y3RevenueImpactK: -20.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  Leads[潜在线索] --> Pilots[试点]\n  Pilots --> AnnualContracts[年度合同]\n  AnnualContracts --> Communities[社区]\n  Communities --> SubscriptionRevenue[订阅收入]\n  Communities --> ShiftUsage[班次使用]\n  ShiftUsage --> UsageRevenue[用量收入]\n  SubscriptionRevenue --> Revenue[总收入]\n  UsageRevenue --> Revenue\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入来自签约社区数从 Y1 的 6 个扩大到 Q4Y3 的 26 个，每个社区年收入约 $42K。
- checkName: 必须成立的条件
  finding: 模型要求试点转年度合同和 >90% 满足率能够维持，因为这两个杠杆同时驱动社区增长和毛利率改善。
- checkName: 模型失效条件
  finding: 最大的现金风险是销售周期放缓叠加毛利率低于 64%，这会把下行情景的现金低点推到约 -$1.45M。
- checkName: 下一轮证明
  finding: 当公司证明拥有 12-15 个社区、两家多楼运营方客户，以及古尔冈切口上的走廊级利润率改善后，下一轮融资才更有说服力。
sanityChecks:
  ruleOf40: Y3 增长 99% + EBITDA 利润率 -24% = 75%
  burnMultiple: 从 Y2 的 1.1x 改善到 Y3 的 0.5x（净烧钱 / 净新增收入）。
  revenuePerFte: $44K Y3，对应年末 19 名 FTE（远低于 SaaS 常见的 $200-400K 基准，因为该模型包含本地运营和合规人力）。
  flags:
  - 若没有融资在位，基础情景到 M3 现金就会为负，因此必须在试点全面展开前完成融资。
  - Y3 报告口径毛利率仅到 66%，说明预备工池利用率仍需继续改善才能达到 70% 目标。
  - 每名 FTE 收入较低，因为这是一个运营较重的连续性服务，而非纯软件模式。
  - 在至少两家多楼运营方账户真正上线并续约之前，客户集中度仍然显著。
