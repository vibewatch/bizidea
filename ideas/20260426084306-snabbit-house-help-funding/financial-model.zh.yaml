scenarios:
  downside:
    description: 运营方审批更慢、片区密度更弱，到 Q4Y3 公司只能做到 18 个社区。
    y3RevenueK: 590.0
    y3EbitdaK: -420.0
    cashLowPointK: -1450.0
    keyAssumptionChanges:
    - 销售周期再拉长约 2 个月，试点转年约的转化率低于 BP 目标。
    - 由于用量费和高级模块挂载不足，每社区混合年收入降到约 $38K。
    - 备用人手利用率爬坡更慢，导致第 3 年退出时的报告毛利率仅约 60%。
  base:
    description: Gurugram 切口按计划跑通，到第 3 年末落在 26 个社区，报告毛利率持续改善但仍低于目标。
    y3RevenueK: 845.4
    y3EbitdaK: -199.1
    cashLowPointK: -1046.8
    keyAssumptionChanges:
    - 社区爬坡按里程碑路径推进：第 1 年 6 个，第 2 年 15 个，第 3 年 26 个。
    - 每社区混合年收入稳定在约 $42K。
    - 报告毛利率从试点期的低利用率逐步爬向 70% 的稳态目标。
  upside:
    description: 多楼栋扩张更快、备用人手池利用率更高，业务到 Q4Y3 已逼近盈亏平衡。
    y3RevenueK: 1080.0
    y3EbitdaK: -40.0
    cashLowPointK: -860.0
    keyAssumptionChanges:
    - 两家运营方客户扩张速度更快，到第 3 年末约做到 30 个社区。
    - 随着使用率和报表模块挂载变好，每社区混合年收入升到约 $45K。
    - 片区密度爬得更快，第 3 年退出时的报告毛利率接近 69%。
sensitivity:
- variable: ARPU
  downsideCase: 每社区混合年收入下滑到 $38K。
  baseCase: 每社区混合年收入为 $42K。
  upsideCase: 每社区混合年收入提升到 $46K。
  y3RevenueImpactK: -80.0
  cashImpactK: -110.0
- variable: CAC
  downsideCase: 企业尽调更长，CAC 升到 $24K。
  baseCase: CAC 为 $18K。
  upsideCase: 依靠运营方转介绍和 ERP 合作，CAC 降到 $14K。
  y3RevenueImpactK: 0.0
  cashImpactK: -140.0
- variable: 流失率
  downsideCase: 试点转正式合同后，月度流失率升到 3.0%。
  baseCase: 月度流失率为 2.0%。
  upsideCase: 月度流失率改善到 1.5%。
  y3RevenueImpactK: -90.0
  cashImpactK: -130.0
- variable: 销售周期
  downsideCase: 试点转年约周期拉长到约 6 个月。
  baseCase: 试点转年约周期约 4 个月。
  upsideCase: 强验证结果把周期缩短到约 3 个月。
  y3RevenueImpactK: -120.0
  cashImpactK: -170.0
- variable: 毛利率
  downsideCase: 第 3 年退出时的报告毛利率只有 64%。
  baseCase: 在 70% 稳态目标下，第 3 年退出时的报告毛利率落在 60% 中段。
  upsideCase: 第 3 年退出时的报告毛利率达到 69%。
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
- variable: 招聘节奏
  downsideCase: 运营和 GTM 招聘比营收提前 2 个季度发生。
  baseCase: 招聘节奏跟随本模型里的社区爬坡。
  upsideCase: 招聘比计划晚 1 个季度也不影响 SLA。
  y3RevenueImpactK: -20.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> AnnualContracts
      AnnualContracts --> Communities
      Communities --> SubscriptionRevenue
      Communities --> ShiftUsage
      ShiftUsage --> UsageRevenue
      SubscriptionRevenue --> Revenue
      UsageRevenue --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 营收引擎
  finding: 基础情形的营收，来自签约社区从第 1 年的 6 个扩到 Q4Y3 的 26 个，同时每社区年收入约 $42K。
- checkName: 必须跑通的环节
  finding: 模型成立的前提，是试点能顺利转成年约、承诺窗口内的补位率能守住 >90%，因为这两个杠杆同时决定社区数增长和毛利率改善。
- checkName: 模型崩溃条件
  finding: 最大的现金风险，是销售周期变慢叠加毛利率掉到 64% 以下；一旦如此，下行情形的现金低点会打到约 -$1.45M。
- checkName: 下一轮融资依据
  finding: 只要公司在 Gurugram 切口上做出 12-15 个社区、2 个多楼栋运营方，以及片区级毛利改善，下一轮融资就有了依据。
sanityChecks:
  ruleOf40: 第 3 年增长 99% + EBITDA 利润率 -24% = 75%
  burnMultiple: 从第 2 年的 1.1x 改善到第 3 年的 0.5x（净烧钱 / 净新增营收）。
  revenuePerFte: 第 3 年末 19 名 FTE 对应的人均营收为 $44K（远低于 SaaS 常见的 $200-400K 基准，因为模型里背着本地运营和合规人力）。
  flags:
  - 如果融资不落地，基础情形在 M3 就会掉到零以下，所以必须在试点全面启动前把钱融到手。
  - 第 3 年的报告毛利率只到 66%，说明备用人手池利用率还得继续抬，才能摸到 70% 目标。
  - 由于这是连续性服务、重运营，不是纯软件模型，所以人均营收偏低。
  - 在至少两家多楼栋运营方账户真正上线并进入续约前，客户集中度都还很高。
