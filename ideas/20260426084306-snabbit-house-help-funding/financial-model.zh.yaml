  amountM: 2.2
  runwayMonths: 24
  milestone: 达到 12-15 个签约社区、2 个多塔楼运营商账户、签约窗口内 >90% fill rates，以及一次相邻品类测试，并在走廊层面看到毛利率改善。
  useOfFunds:
    - bucket: 工程
      amountUsd: 550000
      percentage: 25
    - bucket: GTM
      amountUsd: 500000
      percentage: 23
    - bucket: "G&A"
      amountUsd: 700000
      percentage: 32
    - bucket: "缓冲（6 个月）"
      amountUsd: 450000
      percentage: 20
scenarios:
  downside:
    description: 运营商审批更慢、走廊密度更弱，导致公司到 Q4Y3 只能做到 18 个社区。
    y3RevenueK: 590.0
    y3EbitdaK: -420.0
    cashLowPointK: -1450.0
    keyAssumptionChanges:
      - 销售周期再延长约 2 个月，且试点转年约的转化率低于 BP 目标。
      - 由于使用费和高级模块挂载率不及预期，每社区年混合收入降到约 $38K。
      - 因后备劳动力利用率改善更慢，已报告毛利率到 Y3 末只能接近 60%。
  base:
    description: Gurugram 切口按计划跑通，Y3 末达到 26 个社区，已报告毛利率持续改善，但仍低于目标值。
    y3RevenueK: 845.4
    y3EbitdaK: -199.1
    cashLowPointK: -1046.8
    keyAssumptionChanges:
      - 社区爬坡符合里程碑路径：Y1 达到 6 个、Y2 达到 15 个、Y3 达到 26 个。
      - 每社区年混合收入稳定在约 $42K。
      - 已报告毛利率会从试点期的利用率不足，逐步向 70% 的稳态目标靠拢。
  upside:
    description: 多塔楼扩张更快、后备工人池利用率更好，业务到 Q4Y3 接近盈亏平衡。
    y3RevenueK: 1080.0
    y3EbitdaK: -40.0
    cashLowPointK: -860.0
    keyAssumptionChanges:
      - 两个运营商客户扩张更快，Y3 末约达到 30 个社区。
      - 因为使用费和报表模块附着更好，每社区年混合收入上升到约 $45K。
      - 随着走廊密度更快改善，已报告毛利率到 Y3 末接近 69%。
sensitivity:
  - variable: ARPU
    downsideCase: 每社区年混合收入下滑到 $38K。
    baseCase: 每社区年混合收入为 $42K。
    upsideCase: 每社区年混合收入上升到 $46K。
    y3RevenueImpactK: -80.0
    cashImpactK: -110.0
  - variable: CAC
    downsideCase: 因企业尽调拉长，CAC 升至 $24K。
    baseCase: CAC 为 $18K。
    upsideCase: 借助运营商转介绍和 ERP 合作，CAC 降至 $14K。
    y3RevenueImpactK: 0.0
    cashImpactK: -140.0
  - variable: churn
    downsideCase: 试点转正后，月流失率升至 3.0%。
    baseCase: 月流失率为 2.0%。
    upsideCase: 月流失率改善到 1.5%。
    y3RevenueImpactK: -90.0
    cashImpactK: -130.0
  - variable: sales cycle
    downsideCase: 试点转年约周期拉长到约 6 个月。
    baseCase: 试点转年约周期约为 4 个月。
    upsideCase: 更强的验证把周期缩短到约 3 个月。
    y3RevenueImpactK: -120.0
    cashImpactK: -170.0
  - variable: gross margin
    downsideCase: 已报告毛利率到 Y3 末仅有 64%。
    baseCase: 在稳态目标 70% 的前提下，已报告毛利率到 Y3 末处于 60% 中段。
    upsideCase: 已报告毛利率到 Y3 末达到 69%。
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: hiring pace
    downsideCase: 运营和 GTM 招聘比收入提前 2 个季度发生。
    baseCase: 招聘节奏与本模型中的社区爬坡同步。
    upsideCase: 在不影响 SLA 的前提下，招聘可比计划滞后 1 个季度。
    y3RevenueImpactK: -20.0
    cashImpactK: -180.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> AnnualContracts
      AnnualContracts --> Communities
      Communities --> SubscriptionRevenue
      Communities --> ShiftUsage
      ShiftUsage --> UsageRevenue
      SubscriptionRevenue --> Revenue
      UsageRevenue --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基础情景收入来自签约社区数量从 Y1 的 6 个扩展到 Q4Y3 的 26 个，每个社区年收入约 $42K。
  - checkName: 必须跑对的环节
    finding: 模型依赖试点转年约和 >90% 填充率同时成立，因为这两个变量同时驱动社区增长和毛利改善。
  - checkName: 模型会在哪种情况下失真
    finding: 最大现金风险是销售周期变慢且毛利率低于 64%，这会把 downside 情景的现金低点拉到约 -$1.45M。
  - checkName: 下一轮融资证明点
    finding: 一旦公司证明 12-15 个社区、两个多塔楼运营商，以及 Gurugram 切口上的走廊级毛利改善，下一轮融资就站得住。
sanityChecks:
  ruleOf40: "Y3 growth 99% + EBITDA margin -24% = 75%"
  burnMultiple: "从 Y2 的 1.1x 改善到 Y3 的 0.5x（净烧钱 / 净新增收入）。"
  revenuePerFte: "Y3 年末 19 名 FTE 对应 $44K / FTE（远低于 $200-400K 的 SaaS 基准，因为模型带着本地运营和合规团队）。"
  flags:
    - 如果融资没有及时关闭，base case 会在 M3 就转成负现金，因此必须在试点全面展开前完成融资。
    - 已报告毛利率到 Y3 只有 66%，说明后备工人池利用率仍需继续改善，才能达到 70% 目标。
    - 由于这是重运营的连续性服务而非纯软件模型，Revenue per FTE 偏低。
    - 在至少两个多塔楼运营商账户真正上线并续约前，客户集中度仍然不低。
