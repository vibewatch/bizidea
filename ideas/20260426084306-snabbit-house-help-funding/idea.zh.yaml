jobsToBeDone:
- job: 当常驻保姆突然缺勤时，帮助社区运营经理快速获得可信替补覆盖，从而控制住户投诉和安全事件。
  currentAlternative: 通过保安、WhatsApp 群和本地中介手工协调
  successMetric: 在承诺 SLA 内完成紧急后备请求的比例
- job: 当住宅项目组合跨多个微市场扩张时，帮助物业管理公司标准化后备用工与安全流程，从而无需自建劳动力运营团队也能提供高端居住体验。
  currentAlternative: 碎片化的本地供应商和临时内部运营人手
  successMetric: 投诉量下降幅度及每次完成后备班次的成本下降
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 多个高信誉来源在同一个月独立确认了融资热度、供给失灵、安全问题和市场正规化。
  painIntensity:
    score: 5
    rationale: 这一问题即时且反复出现，因为每当常驻帮手消失，家庭和社区都会切身感受到痛点。
  wedgeClarity:
    score: 5
    rationale: 切入点对应的是明确买方、明确密度门槛和狭窄的连续性工作流，而不是泛化的家政服务应用。
  defensibility:
    score: 4
    rationale: 楼宇级合同、预备供给密度、通行集成和运营数据会形成切换成本，但执行质量仍极其关键。
  ventureScale:
    score: 4
    rationale: 初始市场较聚焦，但同一套操作系统可以扩展到相邻住宅劳动力品类及平台溢出基础设施。
topRisks:
- name: 供给流动性
  description: 如果公司无法在每个微市场招募到足够多受训的机动工，后备覆盖就会失效。
  mitigation: 只在单一城市的高密度社区起步，并为工人的预备时段提供保底收入。
- name: 买方碎片化
  description: RWA 和物业经理的采购流程可能缓慢、混乱，而且对是否能统一推动共享服务拥有不同权限。
  mitigation: 优先通过物业管理公司销售，因为一个区域运营方可凭一份合同解锁多栋楼。
- name: 安全事件下行风险
  description: 在一个本就受关注的品类里，工人不当行为或住户骚扰事件会迅速损害信任。
  mitigation: 从第一天起就把强制身份核验、紧急升级、签到日志、保险和快速事件复盘做进核心服务。
