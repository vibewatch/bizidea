signals:
  - title: "Capital keeps flowing into instant house help"
    summary: "Snabbit and Pronto both hit the market for fresh money in late April, showing the category still attracts investor conviction despite burn and operational complexity."
    sourceRefs:
      - 1
      - 2
  - title: "Supply is the binding constraint"
    summary: "Same-window reporting shows booking slots disappearing whenever migrant workers leave, which means trained labor density matters more than app demand alone."
    sourceRefs:
      - 3
      - 4
      - 5
  - title: "Safety has become a core product requirement"
    summary: "Coverage now centers on harassment, SOS workflows, AI monitoring, and worker protections because the service happens inside private homes."
    sourceRefs:
      - 6
      - 7
      - 8
  - title: "The market is being formalized"
    summary: "Companies are using training, background checks, shift systems, insurance, and bank-linked payouts to turn informal domestic labor into managed supply."
    sourceRefs:
      - 7
      - 8
      - 9
      - 10
      - 11
  - title: "Micro-market density is the operating model"
    summary: "The winners are building dense neighborhood coverage and chasing repeat bookings rather than broad coverage, which pushes the business toward logistics-heavy operations."
    sourceRefs:
      - 1
      - 2
      - 8
      - 9
      - 10
      - 11
  - title: "Customers are treating apps as a backup to unreliable maid supply"
    summary: "The April shortage stories show people using apps only when regular help disappears, which exposes a recurring pain point around availability and last-minute substitution."
    sourceRefs:
      - 3
      - 4
      - 5
      - 7
  - title: "The category is already multi-player and likely to consolidate"
    summary: "Snabbit, Pronto, and Urban Company are all scaling, spending, and hiring into the same demand pool, which raises the chance that density and execution decide the winners."
    sourceRefs:
      - 1
      - 2
      - 6
      - 8
      - 9
