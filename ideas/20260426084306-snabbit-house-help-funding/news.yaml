sources:
  - id: 1
    title: "India's Snabbit seeks fresh funding at a $400M valuation, sources say"
    url: https://techcrunch.com/2026/04/25/indias-snabbit-seeks-fresh-funding-at-a-400m-valuation-sources-say/
    publisher: TechCrunch
    publishedDate: 2026-04-25
    author: Jagmeet Singh
    fetchVerified: true
    keyPoints:
      - Snabbit is close to raising fresh funding at about a $400 million valuation.
      - TechCrunch says the round could be about $50 million to $55 million or more.
      - Susquehanna Venture Capital is expected to lead, with several existing investors also participating.
      - The story frames instant house-help as a fast-growing category in India.
  - id: 2
    title: "Lachy Groom to back India startup Pronto at a $200M valuation, sources say"
    url: https://techcrunch.com/2026/04/24/lachy-groom-to-back-pronto-as-indias-house-help-startup-scales-fast-sources-say/
    publisher: TechCrunch
    publishedDate: 2026-04-24
    author: null
    fetchVerified: true
    keyPoints:
      - Pronto is finalizing a fresh funding round led by Lachy Groom.
      - The round is expected to bring in about $20 million and value the company around $200 million.
      - Pronto said it handled roughly 24,000 to 25,000 daily orders and completed about 500,000 in the prior month.
      - The piece shows the category attracting capital and scaling quickly.
  - id: 3
    title: "No slots, no 10-minute house help: As maids head to Bengal, apps struggle"
    url: https://www.indiatoday.in/lifestyle/society/story/delhi-ncr-house-help-apps-bengal-election-rush-booking-crunch-2900506-2026-04-23
    publisher: India Today
    publishedDate: 2026-04-23
    author: Medha Chawla
    fetchVerified: true
    keyPoints:
      - Bengali migrant house help leaving for the polls has tightened booking supply across Delhi-NCR.
      - Users reported no available slots on Snabbit, Pronto, and Urban Company.
      - The article says demand surged sharply and app-based help was no longer instant during the crunch.
      - It shows a concrete, time-bound customer pain point: lack of service availability.
  - id: 4
    title: "One vote in Bengal and Delhi NCR is back to Covid chore days"
    url: https://www.indiatoday.in/lifestyle/society/story/one-vote-in-bengal-and-delhi-ncr-is-back-to-covid-chore-days-2900803-2026-04-24
    publisher: India Today
    publishedDate: 2026-04-24
    author: Tiasa Bhowal
    fetchVerified: true
    keyPoints:
      - Households in Delhi-NCR, Mumbai, and Bengaluru were scrambling as domestic workers went home to vote.
      - Morning and evening slots on quick house-help apps were nearly impossible to get.
      - Users described app-based help as a fallback that still requires planning ahead.
      - The story highlights the fragility of supply in peak periods.
  - id: 5
    title: "Thousands of migrant workers rush home to vote, leaving metro cities short of house help"
    url: https://www.indiatoday.in/india/story/west-bengali-migrant-workers-delhi-mumbai-bengaluru-house-help-nanny-leave-jobs-to-vote-fear-losing-citizenship-sir-2896547-2026-04-16
    publisher: India Today
    publishedDate: 2026-04-16
    author: Sushim Mukul
    fetchVerified: true
    keyPoints:
      - Migrant domestic workers from West Bengal were leaving metro jobs to vote.
      - The exodus affected house help, nannies, cooks, and other blue-collar work across major cities.
      - The article says app-based household services also felt the shortage.
      - It shows how migration shocks can abruptly constrain supply.
  - id: 6
    title: "Snabbit, Pronto, Urban Company spark customer, worker frenzy with $1 househelp"
    url: https://www.vccircle.com/snabbitpronto-urban-company-spark-customer-worker-frenzy-with-1-househelp
    publisher: VCCircle
    publishedDate: 2026-04-14
    author: null
    fetchVerified: true
    keyPoints:
      - Reuters-reported coverage says India’s home-help apps are drawing workers and customers at about $1 an hour.
      - The story emphasizes safety risks because workers enter private homes.
      - It says the companies are burning capital and offering discounts to build demand.
      - It highlights strong consumer pull but unresolved unit economics and safety concerns.
  - id: 7
    title: "You can hire house help in 15 minutes in India. But is the system fair?"
    url: https://www.bbc.com/news/articles/c98megy6r1mo
    publisher: BBC News
    publishedDate: 2026-04-05
    author: Nikita Yadav
    fetchVerified: true
    keyPoints:
      - The piece frames instant house help as a growing but contested market in India.
      - It describes income gains for workers alongside pressure from ratings, penalties, and tight deadlines.
      - It notes that companies say they are formalising domestic work with training and digital payments.
      - It shows that safety, trust, and worker protections remain central issues.
  - id: 8
    title: "Quick service platform Snabbit appoints Abhinav Ankur as chief business officer"
    url: https://economictimes.indiatimes.com/tech/startups/quick-service-platform-snabbit-appoints-abhinav-ankur-as-chief-business-officer/articleshow/130309113.cms
    publisher: Economic Times
    publishedDate: 2026-04-16
    author: null
    fetchVerified: true
    keyPoints:
      - Snabbit hired ex-Oyo executive Abhinav Ankur as chief business officer.
      - The company said it scaled from 10,000 to over 40,000 jobs daily in six months.
      - It crossed 1 million cumulative jobs in March.
      - The article also says Snabbit is raising $50 million to $60 million.
  - id: 9
    title: "Who is Anjali Sardana? Founder of $100M startup Pronto after US graduation"
    url: https://www.indiatoday.in/jobs/story/who-is-anjali-sardana-founder-of-100m-startup-pronto-after-us-graduation-educ-2891246-2026-04-03
    publisher: India Today
    publishedDate: 2026-04-03
    author: Roshni
    fetchVerified: true
    keyPoints:
      - Pronto reached a $100 million valuation within a year of launch.
      - The company expanded from one Gurugram hub to multiple cities and tens of thousands of daily bookings.
      - It raised $25 million in March 2026 in a round led by Epiq Capital.
      - The profile shows how fast founders and investors are formalizing the market.
