scenarios:
  downside:
    description: Slower operator approvals and weaker corridor density hold the company to 18 communities by Q4Y3.
    y3RevenueK: 590.0
    y3EbitdaK: -420.0
    cashLowPointK: -1450.0
    keyAssumptionChanges:
      - Sales cycle extends by roughly 2 months and pilot-to-annual conversion falls below the BP target.
      - Blended annual revenue per community drops to about $38K as usage fees and premium modules lag.
      - Reported gross margin exits Y3 near 60% because reserve labor utilization improves more slowly.
  base:
    description: Gurugram wedge works as planned, ending Y3 at 26 communities with improving but still sub-target reported margins.
    y3RevenueK: 845.4
    y3EbitdaK: -199.1
    cashLowPointK: -1046.8
    keyAssumptionChanges:
      - Community ramp follows the milestone path from 6 in Y1 to 15 in Y2 and 26 in Y3.
      - Blended annual revenue per community holds at about $42K.
      - Reported gross margin improves from pilot underutilization toward a 70% steady-state target.
  upside:
    description: Faster multi-tower expansions and better reserve-bench utilization push the business close to breakeven by Q4Y3.
    y3RevenueK: 1080.0
    y3EbitdaK: -40.0
    cashLowPointK: -860.0
    keyAssumptionChanges:
      - Two operator wins expand faster, ending Y3 at about 30 communities.
      - Blended annual revenue per community rises to about $45K with better usage and reporting-module attach.
      - Reported gross margin exits Y3 near 69% as corridor density improves faster.
sensitivity:
  - variable: ARPU
    downsideCase: Blended annual revenue per community slips to $38K.
    baseCase: Blended annual revenue per community is $42K.
    upsideCase: Blended annual revenue per community rises to $46K.
    y3RevenueImpactK: -80.0
    cashImpactK: -110.0
  - variable: CAC
    downsideCase: CAC rises to $24K because enterprise diligence takes longer.
    baseCase: CAC is $18K.
    upsideCase: CAC falls to $14K with operator referrals and ERP partnerships.
    y3RevenueImpactK: 0.0
    cashImpactK: -140.0
  - variable: churn
    downsideCase: Monthly churn rises to 3.0% after pilots convert.
    baseCase: Monthly churn is 2.0%.
    upsideCase: Monthly churn improves to 1.5%.
    y3RevenueImpactK: -90.0
    cashImpactK: -130.0
  - variable: sales cycle
    downsideCase: Pilot-to-annual cycle stretches to about 6 months.
    baseCase: Pilot-to-annual cycle is about 4 months.
    upsideCase: Strong proof shortens cycle to about 3 months.
    y3RevenueImpactK: -120.0
    cashImpactK: -170.0
  - variable: gross margin
    downsideCase: Reported margin exits Y3 at 64%.
    baseCase: Reported margin exits Y3 in the mid-60s on a 70% steady-state target.
    upsideCase: Reported margin exits Y3 at 69%.
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: hiring pace
    downsideCase: Ops and GTM hires are pulled forward 2 quarters ahead of revenue.
    baseCase: Hiring follows the community ramp in this model.
    upsideCase: Hiring stays one quarter behind plan without missing SLAs.
    y3RevenueImpactK: -20.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> AnnualContracts
      AnnualContracts --> Communities
      Communities --> SubscriptionRevenue
      Communities --> ShiftUsage
      ShiftUsage --> UsageRevenue
      SubscriptionRevenue --> Revenue
      UsageRevenue --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from scaling contracted communities from 6 in Y1 to 26 by Q4Y3 at about $42K annual revenue per community.
  - checkName: Must go right
    finding: The model needs pilot-to-annual conversion and >90% fill rates to hold, because those two levers drive both community growth and gross-margin improvement.
  - checkName: Model breaks if
    finding: The biggest cash risk is a slower sales cycle plus sub-64% gross margin, which drives the downside cash low point to roughly -$1.45M.
  - checkName: Next-round proof
    finding: The next round is justified once the company shows 12-15 communities, two multi-tower operators, and corridor-level margin improvement on the Gurugram wedge.
sanityChecks:
  ruleOf40: "Y3 growth 99% + EBITDA margin -24% = 75%"
  burnMultiple: "Improves from 1.1x in Y2 to 0.5x in Y3 (net burn divided by net new revenue)."
  revenuePerFte: "$44K Y3 on 19 year-end FTE (well below $200-400K SaaS benchmarks because the model carries local ops and compliance labor)."
  flags:
    - Base case runs below zero cash by M3 if no financing closes, so the raise must happen before pilots are fully underway.
    - Reported gross margin reaches only 66% in Y3, so reserve-bench utilization still needs to improve to meet the 70% target.
    - Revenue per FTE is low because this is an ops-heavy continuity service, not a pure software model.
    - Customer concentration remains meaningful until at least two multi-tower operator accounts are live and renewing.
