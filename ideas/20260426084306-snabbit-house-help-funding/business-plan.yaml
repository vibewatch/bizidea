slug: backup-house-help-grid
date: 2026-04-26
executiveSummary: >-
  ReserveGrid targets a specific failure mode in India's fast-growing house-help category: when regular maids disappear, premium apartment communities have no trusted building-level fallback. Same-month reporting on Snabbit, Pronto, and Urban Company shows consumer demand is real, but supply collapses during migration shocks and safety expectations rise because workers enter private homes. The plan is to start in 500+ occupied-unit gated communities in Gurugram and sell property operators a backup labor SLA, not another household marketplace. The MVP is a community ops product that combines a pre-cleared reserve bench, building-specific access workflows, digital check-in and check-out, and incident handling. Go-to-market starts with regional property managers that control multiple towers, because one contract can unlock dense demand and shorten procurement versus selling one RWA at a time. The narrow market sizing from research is modest for the first wedge — about $73M TAM, $5.1M SAM, and $0.9M year-3 SOM — so the venture case depends on proving expansion into adjacent managed residential labor categories and overflow infrastructure. The biggest disconfirming risks are whether communities will fund continuity from shared budgets and whether reserve staffing can hold >90% fill rates at morning and evening peaks without breaking margins. Until those are validated in paid Gurugram pilots, budget ownership and partner willingness should be treated as assumptions rather than facts.
problem:
  - Premium apartment communities absorb resident complaints and security risk when regular maids, cooks, or nannies no-show, but current fallback options are fragmented across WhatsApp groups, local agencies, and consumer apps.
  - Same-window reporting shows instant house-help apps also fail under migration shocks, so the pain is continuity and trusted access, not service discovery.
  - RWAs and property managers already run formal visitor and staff workflows, yet they lack any auditable system for reserve labor planning, fill-rate visibility, or incident response.
solution:
  - Sell apartment communities a building-level backup house-help grid with pre-cleared reserve workers, building-specific access rules, and dispatch coverage for absenteeism peaks.
  - Give facility teams one operating console for request intake, ETA tracking, digital check-in and check-out, incident logs, and SLA reporting by tower and time window.
  - Route resident demand through the building rather than a standalone consumer app so demand pools inside dense towers and standby capacity can be planned.
whyWeWin:
  - The wedge aggregates demand at the community layer, where density makes reserve labor economically plausible and where safety controls already matter.
  - "Consumer apps optimize household acquisition; society ERPs optimize access and billing; ReserveGrid sits between them with the specific promise neither owns today: guaranteed backup fill inside a gated community."
  - Gurugram offers a concentrated launch zone because premium residential supply, community software adoption, and NCR house-help demand are already dense there.
  - If pilots work, the company compounds proprietary data on absenteeism patterns, peak windows, fill rates, and gate friction that improves staffing accuracy over time.
strategicChoices:
  beachhead: Premium gated communities in Gurugram with 500+ occupied units, sold first through property management firms that already control multiple towers.
  wedgeRationale: >-
    This entry point creates faster proof than a broad household app because one buyer unlocks repeated demand, a shared operations workflow, and enough density to test standby labor utilization. It also aligns the budget owner, complaint owner, and security owner in the same sales motion.
  sequencingRationale: >-
    Start with a concierge-heavy product and a narrow service scope so the company can first prove buyer willingness to pay, peak fill-rate reliability, and safe gate operations. Only after those metrics stabilize should the company deepen ERP integrations, automate resident booking, and expand labor categories or geography.
  notYet:
    - Standalone direct-to-consumer app for individual households outside contracted communities
    - Expansion into cooks, nannies, eldercare, or live-in placement before backup cleaning and chores hit repeatable margins
    - Multi-city rollout before two Gurugram corridors show repeatable pilot-to-production conversion and worker utilization
market:
  tam: $73M estimated narrow TAM for large managed communities in India
  sam: $5.1M estimated Gurugram and premium NCR beachhead SAM
  som: $0.9M year-3 SOM assuming roughly 25 communities at about 800 occupied units each
  segments:
    - Property management firms operating premium gated apartment communities in Gurugram
    - Large independent RWAs for 500+ occupied-unit communities in Gurugram and nearby NCR clusters
  buyingProcess: >-
    The likely champion is the regional operations head or community general manager who owns resident escalations and vendor coordination. Purchase then runs through RWA committee or operator approval, with diligence centered on safety, data handling, worker verification, and whether a paid pilot can prove faster fill rates and fewer complaints within one absenteeism cycle.
product:
  mvp: >-
    Concierge-led community continuity product for backup cleaning and basic household chores only. Scope includes reserve worker roster management, building-specific access approval, request intake, dispatch, live ETA, digital check-in and check-out, and incident logging with weekly SLA reports.
  sixMonth: >-
    Add tower-level demand forecasting, worker training and verification records, resident preference profiles, recurring reserve-window planning, and one lightweight integration or CSV sync with a society ERP or gate-management system.
  twelveMonth: >-
    Launch resident self-serve booking within contracted communities, multi-tower operator dashboards, automated complaint and fill-rate reporting, and queueing logic for morning and evening peak demand.
  twentyFourMonth: >-
    Expand from backup cleaning into adjacent managed residential labor categories such as cooks, nannies, and eldercare aides, and test API-style overflow supply partnerships with larger consumer platforms.
  keyBets:
    - Building-level demand is predictable enough by corridor, tower, and time window to support a reserved labor bench.
    - Facility offices will accept a workflow change if it reduces complaint load and gate friction within weeks.
    - Manual operations can prove the business before deep ERP integrations are required.
    - Trust features such as verification, logs, and incident response are strong enough to justify budget from shared community operations.
gtm:
  wedge: >-
    Sell a paid 6- to 12-week continuity pilot to one regional property operator covering 3-5 nearby premium Gurugram towers, then convert to annual multi-community contracts using proof of fill rate, complaint reduction, and auditability.
  channels:
    - Direct outbound to regional property management firms and community general managers
    - RWA referrals from early flagship communities
    - Integration and referral partnerships with community ERP and gate-management vendors
    - Worker referral loops from trusted local recruiters and training partners
  funnelTargets: target account to qualified discovery 30%+, discovery to paid pilot 25%+, pilot to annual contract 60%+, first operator to 2+ additional towers within 6 months 40%+
  pricing: >-
    Monthly fee per occupied unit with a community minimum, plus a per completed backup shift and optional premium reporting or compliance module. This matches recurring society budgets while keeping peak usage priced to actual fulfillment demand.
businessModel:
  revenueStreams:
    - Community subscription tied to occupied units under continuity coverage
    - Usage-based fee for completed backup shifts
    - Premium compliance, audit, and incident-reporting modules for larger operators
  unitOfValue: Occupied unit covered by a continuity contract, with completed backup shift as the usage meter
  targetGrossMarginPct: 70
  expansionLevers:
    - Multi-tower rollouts within the same operator portfolio
    - Additional labor categories once reserve labor economics are proven
    - Higher-value compliance and reporting features for enterprise operators
    - Overflow supply partnerships for consumer platforms and co-living or senior-living operators
strategyMap:
  northStarMetric: Weekly backup requests fulfilled within SLA across contracted communities
  inputMetrics:
    - Paid pilot win rate
    - Peak-hour fill rate
    - Median gate-entry time
    - Worker 30-day retention
    - Pilot-to-annual conversion rate
    - Complaint reduction per community
  moatsToBuild:
    - Proprietary tower-level absenteeism and fill-rate dataset
    - Embedded access, verification, and incident workflows inside community operations
    - Worker supply density and training reputation in a few tight Gurugram corridors
    - Multi-community operator relationships that expand one contract into many towers
  killCriteria:
    - Fewer than 3 paid pilots from the first 20 qualified operator accounts
    - Inability to sustain 90% peak-hour fill rate in pilots for 8 consecutive weeks
    - No measurable complaint reduction or time-to-resolution improvement after a full pilot cycle
    - Worker retention below 60% at 30 days even with guaranteed reserve windows
  mermaid: |
    flowchart LR
      Wedge[Sell continuity pilots to multi-tower Gurugram operators] --> MVP[Reserve bench + dispatch + gate workflow MVP]
      MVP --> Proof[Prove fill rate, complaint reduction, and safe operations]
      Proof --> Expansion[Expand to more towers, more categories, and overflow partnerships]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Low-to-medium conviction until buyer budget ownership and reserve-margin data are proven in paid pilots.
    whyBelieve: A real pain point, visible category demand, and a clear building-level wedge create a plausible path to early proof that incumbents are not directly optimizing for.
    whyDoubt: The initial wedge is narrow and the two hardest questions — shared-budget willingness to pay and peak-hour unit economics — are still assumptions.
    nextDiligence: Secure 3 paid Gurugram pilots with one multi-tower operator and show 8 weeks of >90% fill rate plus measurable complaint reduction.
  firstCustomer:
    title: Regional property operations head for premium Gurugram communities
    profile: Manages resident experience, guards, and vendor workflows across 15-30 premium towers where domestic-help absenteeism creates repeated escalations.
    trigger: Seasonal worker exodus, election-period absenteeism, or a visible spike in unresolved resident complaints about maid no-shows.
    buyer: Regional head of operations
    initialContract: 6- to 12-week paid pilot for one 500-800-unit community at roughly ₹3-6 lakh, converting to an annual contract of about ₹15-30 lakh if SLA and safety targets are met.
  mustBeTrue:
    - Multi-tower property operators must treat backup domestic labor as a shared operational problem worth funding centrally.
    - One Gurugram micro-market must sustain >90% peak-hour fill rate with pre-cleared reserve workers for at least 8 pilot weeks.
    - Paid pilots must reduce complaint volume or complaint-resolution time enough for operators to renew on annual contracts.
    - Worker recruiting and guaranteed reserve windows must produce stable retention without subsidy-heavy idle time.
    - Society ERP and gate workflows must be integrable enough that ReserveGrid does not add unacceptable operational friction.
  diligenceQuestions:
    - "Who owns the budget today when residents complain about maid absenteeism: RWA, property manager, or nobody?"
    - What fill-rate and response-time SLA can be achieved at 7-10 am and 6-9 pm without negative contribution margins?
    - Will property managers buy first, or do RWA committees still control final approval in most target communities?
    - How much resident and worker data is actually required to operate the service safely inside gated communities?
    - How quickly would Mygate, NoBrokerHood, or large consumer apps copy or channel-block the workflow if pilots gain traction?
  riskHeatmap:
    - risk: Supply liquidity fails in a corridor during peak windows
      likelihood: High
      impact: High
      leadingIndicator: Peak-hour fill rate stays below 90% or worker no-show rate exceeds 10% in pilot weeks
      mitigation: Launch only in dense adjacent towers, guarantee minimum reserve earnings, and overstaff the first two peak windows until demand patterns stabilize.
    - risk: Buyer fragmentation slows sales and renewal
      likelihood: Medium
      impact: High
      leadingIndicator: More than 60 days from pilot proposal to signed start or pilots stall waiting for committee approvals
      mitigation: Sell first through portfolio operators with delegated authority and use short paid pilots tied to clear complaint and SLA outcomes.
    - risk: Safety, harassment, or privacy incident damages trust
      likelihood: Medium
      impact: High
      leadingIndicator: Any pilot requires repeated manual exception handling for identity, gate access, or complaint escalation
      mitigation: Make verification, audit logs, panic escalation, insurance, and strict data minimization part of the day-one operating standard.
    - risk: Unit economics break under standby staffing
      likelihood: High
      impact: High
      leadingIndicator: Reserve worker utilization remains below plan or per-shift gross margin stays negative after the first 3 communities
      mitigation: Price a fixed community minimum, focus on adjacent towers, and limit service scope until enough density exists to smooth peaks.
    - risk: Incumbents or channel partners replicate the workflow
      likelihood: Medium
      impact: Medium
      leadingIndicator: Society ERP vendors or consumer apps start pitching building-level reserve coverage into the same accounts
      mitigation: Win operator relationships early, integrate where possible, and build differentiated performance data and playbooks at the tower level.
operatingAssumptions:
  - assumption: Property management firms can approve pilots faster than independent RWAs and can unlock multiple towers from one relationship.
    basis: idea.yaml
    validationTest: Interview 10 Gurugram operators and secure at least 3 pilot commitments from managers who control more than one tower.
    decisionImpact: If false, the sales model shifts to slower direct RWA selling and the first 18-month community target should be reduced.
  - assumption: Premium Gurugram communities already generate enough repeated absenteeism pain to justify a recurring continuity fee.
    basis: research.yaml
    validationTest: Collect baseline complaint logs and willingness-to-pay feedback from 5 target communities; require at least 3 to name an existing ops or resident-experience budget line.
    decisionImpact: If false, the product must become resident-paid or partner-led, which weakens the building-level wedge.
  - assumption: Reserve labor supply can be recruited and retained with guaranteed reserve windows rather than pure per-task incentives.
    basis: operator judgment
    validationTest: Run a 30-worker recruiting cohort and track 30-day retention, acceptance rate, and realized utilization across two pilot corridors.
    decisionImpact: If false, contribution margins worsen and the company may need a narrower time-window service or a different labor model.
  - assumption: A lightweight integration or manual workflow is sufficient for the first pilots; deep API access is not required to prove value.
    basis: research.yaml
    validationTest: Launch one pilot using manual or CSV-based gate and staff sync while measuring gate delays and ops hours per request.
    decisionImpact: If false, engineering scope and partnership dependence increase materially before revenue proof.
  - assumption: Backup cleaning and chore coverage is the right first service before adding higher-trust categories like nannies or eldercare.
    basis: idea.yaml
    validationTest: Compare request volume, fulfillment success, and incident complexity across cleaning-only pilots before testing one adjacent category.
    decisionImpact: If false, the roadmap should shift to the category with the strongest renewal and margin profile rather than broadening too early.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Run 15-20 structured buyer interviews and close 3 paid pilot LOIs with multi-tower Gurugram operators.
    hypothesis: Complaint ownership and urgency are strong enough that operators will pay for a short continuity pilot.
    successMetric: 3 signed paid pilot LOIs and at least 8 buyers confirming a current budget owner or approval path.
    owner: CEO
  - horizon: 0–90 days
    experiment: Recruit an initial reserve bench of 20-30 workers in one Gurugram corridor and test training, verification, and reserve-window attendance.
    hypothesis: A guaranteed reserve-window model can attract reliable supply without consumer-platform-level subsidies.
    successMetric: 70%+ offer acceptance, 80%+ training completion, and 60%+ 30-day retention in the first cohort.
    owner: City ops lead
  - horizon: 3–6 months
    experiment: Launch a concierge pilot across 3-5 neighboring towers with manual dispatch and facility-office request intake.
    hypothesis: Operational value can be proven before resident self-serve automation is built.
    successMetric: ">90% fill rate during committed windows, median gate-entry time under 5 minutes, and at least 20% complaint reduction versus baseline."
    owner: CEO
  - horizon: 3–6 months
    experiment: Test one lightweight integration or workflow sync with a society ERP or gate-management tool.
    hypothesis: Existing community software can reduce gate friction enough to make the service feel native.
    successMetric: 50%+ reduction in manual access exceptions and less than 10 minutes of additional ops overhead per fulfilled request.
    owner: Founding eng
  - horizon: 6–12 months
    experiment: Price-test subscription minimums and usage fees across two pilot cohorts.
    hypothesis: A blended fixed-plus-usage model produces better renewals and gross margins than purely usage-based pricing.
    successMetric: Pilot-to-annual conversion above 60% and community-level gross margin trending toward target on renewed contracts.
    owner: CEO
  - horizon: 9–15 months
    experiment: Expand one successful operator from 1 community to 4+ communities and add one adjacent labor category in only the strongest corridor.
    hypothesis: The same buyer relationship and operating system can expand without resetting CAC.
    successMetric: Expansion revenue from existing operators exceeds new-logo revenue in the cohort and adjacent-category incidents stay at or below cleaning baseline.
    owner: Enterprise sales lead
operations:
  - Background verification, police-check support, and worker ID audit trail must be a standard onboarding workflow.
  - Training playbooks should cover cleaning SOPs, resident etiquette, safety escalation, and building-entry compliance.
  - Incident response needs a documented escalation path, supervisor on call, and post-incident review within 24 hours.
  - Demand forecasting and dispatch should be run corridor by corridor, not citywide, to protect fill-rate reliability.
  - Insurance and worker support partners should be selected before broad community rollout.
team:
  - role: Founder/CEO
    startTiming: Month 0
    rationale: Must personally own buyer discovery, pilot sales, operator relationships, and early service design because budget ownership is still unproven.
  - role: Founding eng
    startTiming: Month 0
    rationale: Needed to build dispatch, SLA reporting, worker records, and lightweight integrations without overbuilding before pilots.
  - role: City ops lead
    startTiming: Month 1
    rationale: Supply recruiting, training, shift planning, and incident management are the operational core of the wedge.
  - role: Enterprise sales lead
    startTiming: Month 3
    rationale: Once the first pilot motion works, a dedicated seller is needed to convert operators and expand from one tower to many.
  - role: Training and compliance manager
    startTiming: Month 4
    rationale: Verification, SOP adherence, and safety quality must scale before adjacent categories or additional corridors are added.
milestones:
  - horizon: 0–12 months
    items:
      - Close 3 paid pilots with Gurugram operator-controlled communities
      - Sustain >90% fill rate in contracted windows for at least one full absenteeism cycle
      - Convert at least 2 pilots into annual contracts
      - Launch one live workflow integration or reliable manual sync with a society ERP or gate system
      - Reach 5-8 contracted communities in two Gurugram corridors
  - horizon: 12–24 months
    items:
      - Expand to 12-15 contracted communities with at least 2 multi-tower operator accounts
      - Add resident self-serve booking inside contracted communities
      - Prove corridor-level workforce planning with repeatable gross margin improvement
      - Launch one adjacent labor category in the strongest corridor only
  - horizon: 24–36 months
    items:
      - Reach roughly 25 contracted communities consistent with the year-3 SOM case
      - Convert operator dashboards and incident logs into a premium reporting module
      - Decide whether to enter a second NCR cluster or deepen Gurugram density based on retention and utilization data
      - Test overflow supply partnerships with at least one larger platform or managed-living operator
risks:
  - risk: Reserve worker supply is too thin to maintain morning and evening SLA commitments.
    likelihood: High
    impact: High
    mitigation: Stay corridor-focused, guarantee minimum reserve earnings, and delay expansion until utilization and retention stabilize.
  - risk: Procurement authority is fragmented across RWAs, committees, and property managers.
    likelihood: Medium
    impact: High
    mitigation: Lead with operator-controlled portfolios and short paid pilots that do not require a full annual approval cycle upfront.
  - risk: Safety, harassment, or privacy failures create outsized reputational damage.
    likelihood: Medium
    impact: High
    mitigation: Build verification, data minimization, incident logging, insurance, and escalation protocols into the default workflow.
  - risk: The fixed-plus-usage pricing model does not cover standby labor costs at low community density.
    likelihood: High
    impact: High
    mitigation: Require community minimums, start only in dense adjacent towers, and limit categories until reserve economics are proven.
  - risk: Incumbent apps or society ERPs extend into the same workflow before ReserveGrid has distribution lock-in.
    likelihood: Medium
    impact: Medium
    mitigation: Win operator relationships early, integrate rather than compete where useful, and build data and workflow depth that is hard to replicate quickly.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to prove the Gurugram beachhead with a corridor-level reserve workforce, 8-10 live communities, pilot-to-annual conversion, compliance-grade operations, and the first expansion data needed to justify a larger seed round.
