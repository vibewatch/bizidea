slug: code-agent-failover-compiler
date: "2026-06-14"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-07"
    unit: month
    source: "[BP date] Base case assumes the pre-seed closes and modeled spend starts the month after the plan date."
  - id: A2
    name: Starting cash after pre-seed close
    value: "2.2"
    unit: USDM
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M] Base case uses a $2.2M close, enough to reach the Y2 milestone plus six months of buffer without assuming a top-of-range round."
  - id: A3
    name: Blended annual revenue per active customer
    value: "170.0"
    unit: USDK per customer-year
    source: "[BP market.som ~$150k ACV; BP investorMemo.firstCustomer.initialContract $100k-$200k annual; BP businessModel premium drill retainers] Base case assumes modest expansion above the market-sizing anchor via private deployment, quarterly drills, and 2-5 covered workflows."
  - id: A4
    name: Gross margin
    value: "70"
    unit: percent
    source: "[BP businessModel targetGrossMarginPct] COGS therefore model at 30% of revenue for inference, support, and deployment labor."
  - id: A5
    name: Monthly churn
    value: "1.4"
    unit: percent
    source: "[BP operations quarterly drill cadence; Startup-finance heuristic: early enterprise infrastructure with sticky annual renewals but some vendor-consolidation risk.]"
  - id: A6
    name: First paid logos timing
    value: "M6 first paid drill; M8 second; M10 third; two convert to annual coverage by M12"
    unit: timing
    source: "[BP milestones 0-12 months; BP investorMemo.firstCustomer.initialContract] Anchors Y1 to 3 paid logos and at least 2 annual conversions."
  - id: A7
    name: Y1 customer landing pattern
    value: "Month-end customers 0, 0, 0, 0, 0, 1, 1, 2, 2, 3, 3, 3"
    unit: count
    source: "[BP milestones 0-12 months] Conservative interpretation of 3-5 paid pilots and 2 annual conversions in the first year."
  - id: A8
    name: Y2 quarter-end customers
    value: "Q1Y2 5; Q2Y2 8; Q3Y2 12; Q4Y2 15"
    unit: count
    source: "[BP milestones 12-24 months] Uses the top end of the stated 10-15 production-customer goal by month 24 because GTM hiring starts only after repeatability evidence."
  - id: A9
    name: Y3 quarter-end customers
    value: "Q1Y3 20; Q2Y3 30; Q3Y3 44; Q4Y3 60"
    unit: count
    source: "[BP milestones 24-36 months] Base case uses fewer than 100-120 logos but higher ACV, consistent with the BP's 'or equivalent ARR concentration' wording."
  - id: A10
    name: Founder CEO loaded cash compensation
    value: "108.0"
    unit: USDK per year
    source: "[BP team Founder CEO; Startup-finance heuristic: below-market founder salary at pre-seed stage.]"
  - id: A11
    name: Founding engineer loaded cash compensation
    value: "180.0"
    unit: USDK per year
    source: "[BP team Founding eng; Startup-finance heuristic: senior founding engineer cash compensation plus payroll burden.]"
  - id: A12
    name: Applied AI engineer loaded cash compensation
    value: "210.0"
    unit: USDK per year
    source: "[BP team Applied AI engineer; Startup-finance heuristic: scarce applied-AI enterprise hire with payroll burden.]"
  - id: A13
    name: Solutions engineer loaded cash compensation
    value: "150.0"
    unit: USDK per year
    source: "[BP team Solutions engineer; Startup-finance heuristic: enterprise onboarding and integration hire.]"
  - id: A14
    name: Security and platform engineer loaded cash compensation
    value: "180.0"
    unit: USDK per year
    source: "[BP team Security and platform engineer; Startup-finance heuristic: private deployment and control-surface engineer.]"
  - id: A15
    name: GTM lead loaded cash compensation
    value: "180.0"
    unit: USDK per year
    source: "[BP team GTM lead; Startup-finance heuristic: first enterprise seller/operator once repeatability is proven.]"
  - id: A16
    name: First account executive loaded cash compensation
    value: "150.0"
    unit: USDK per year
    source: "[BP gtm channels; Startup-finance heuristic: partner-assisted enterprise AE added after the first repeatable motion emerges.]"
  - id: A17
    name: Second platform engineer loaded cash compensation
    value: "180.0"
    unit: USDK per year
    source: "[BP product twelveMonth and twentyFourMonth; Startup-finance heuristic: additional platform capacity for private deployment and second-template support.]"
  - id: A18
    name: Customer success and partner manager loaded cash compensation
    value: "132.0"
    unit: USDK per year
    source: "[BP operations and partner motion; Startup-finance heuristic: early customer-success and channel-operations hire.]"
  - id: A19
    name: Second account executive loaded cash compensation
    value: "150.0"
    unit: USDK per year
    source: "[BP milestones 24-36 months; Startup-finance heuristic: second quota carrier only after Y2 proof.]"
  - id: A20
    name: Second solutions engineer loaded cash compensation
    value: "150.0"
    unit: USDK per year
    source: "[BP operations quarterly cadence; Startup-finance heuristic: added onboarding capacity as the customer base broadens.]"
  - id: A21
    name: Second applied AI engineer loaded cash compensation
    value: "190.0"
    unit: USDK per year
    source: "[BP product twentyFourMonth; Startup-finance heuristic: slightly lower cash comp than the first applied-AI hire once the wedge is de-risked.]"
  - id: A22
    name: Compliance and ops lead loaded cash compensation
    value: "120.0"
    unit: USDK per year
    source: "[Research regulatoryLandscape; Startup-finance heuristic: lean ops and compliance role added late as regulated buyers scale.]"
  - id: A23
    name: Hiring cadence
    value: "Founder and founding engineer in M1; applied AI in M2; solutions in M4; security/platform in M6; GTM in M12; AE in M18; platform II in M19; customer success in M21; AE II in M25; solutions II in M28; applied AI II in M31; compliance/ops in M34"
    unit: timing
    source: "[BP team startTiming; BP strategicChoices.sequencingRationale] Added scale hires only after the initial wedge proves deployability and conversion."
  - id: A24
    name: Functional payroll allocation
    value: "Founder 70% S&M and 30% G&A; founding, applied AI, and platform engineers 100% R&D; solutions engineers 70% R&D and 30% G&A; GTM and AEs 100% S&M; customer success 60% S&M and 40% G&A; compliance/ops 100% G&A"
    unit: allocation
    source: "[BP team rationales] Allocation follows sales ownership, product buildout, onboarding, and enterprise control obligations."
  - id: A25
    name: Non-payroll operating spend
    value: "S&M tools and travel 4K monthly pre-GTM, 9K with GTM lead, 15K after first AE, and 22K after second AE; R&D tools and cloud 6K early, 8K with solutions buildout, 12K with private deployment, 14K after second platform buildout, and 18K after the second applied-AI hire; G&A 5K in Y1, 7K in Y2, 9K in early Y3, and 12K after compliance scale-up"
    unit: USDK per month
    source: "[Startup-finance heuristic: lean enterprise software operating plan covering cloud spend, travel, security reviews, and legal/compliance.]"
  - id: A26
    name: Revenue recognition policy
    value: "Revenue equals average active customers in the period times blended annual ARPU divided by 12; new logos contribute half-month revenue in the landing month and linear quarter contribution thereafter"
    unit: policy
    source: "[Modeling convention anchored to BP pilot-to-annual conversion path] Keeps recognized revenue consistent with customer counts and contract timing."
  - id: A27
    name: Cash conversion policy
    value: "EBITDA approximates cash movement; no debt, capex, taxes, or material working-capital swings are modeled"
    unit: policy
    source: "[Startup-finance heuristic: pre-seed software business with simple cash conversion.]"
  - id: A28
    name: Steady-state CAC
    value: "50.0"
    unit: USDK per new production customer
    source: "[BP gtm funnelTargets; Startup-finance heuristic: founder-led and partner-assisted enterprise selling with 120-day pilot-to-production motion.]"
  - id: A29
    name: Funding milestone
    value: "Reach 15 production customers, private deployment, a second migration template, and 2 active partner channels, then hold 6 months of buffer"
    unit: milestone
    source: "[BP milestones 12-24 months; BP fundingAsk runwayMonths] Used to size the pre-seed ask."
