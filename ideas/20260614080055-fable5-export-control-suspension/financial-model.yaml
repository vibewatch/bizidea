scenarios:
  downside:
    description: "Security review and procurement stay slower than planned, so the company exits Y3 with 38 customers at a $155K blended customer-year value and onboarding remains too manual to hit target margin."
    y3RevenueK: 3603.8
    y3EbitdaK: -16.0
    cashLowPointK: 189.3
    keyAssumptionChanges:
      - "Y1 ends with 2 active logos and Y2 exits with 12 customers instead of 15."
      - "Y3 quarter-end customers fall from 20, 30, 44, 60 to 16, 22, 30, 38."
      - "Blended annual revenue per active customer falls from $170K to $155K and gross margin slips from 70% to 67%."
  base:
    description: "The company exits Y2 with 15 production customers, then scales to 60 paying logos and broader workflow coverage at a $170K blended customer-year value."
    y3RevenueK: 5588.8
    y3EbitdaK: 1481.5
    cashLowPointK: 760.2
    keyAssumptionChanges:
      - "Customer counts follow A7, A8, and A9."
      - "Blended annual revenue per active customer stays at $170K as private deployment, quarterly drills, and second-template coverage attach."
      - "Gross margin stays at the 70% BP target while hiring follows A23."
  upside:
    description: "Second-template coverage and partner channels click early, pushing the company to 68 customers by Y3 exit at a $175K blended customer-year value with slightly better delivery leverage."
    y3RevenueK: 6693.8
    y3EbitdaK: 2389.0
    cashLowPointK: 1046.5
    keyAssumptionChanges:
      - "Y1 exits with 4 active logos and Y2 quarter-end customers rise to 6, 10, 14, and 18."
      - "Y3 quarter-end customers rise to 24, 36, 50, and 68."
      - "Blended annual revenue per active customer rises from $170K to $175K and gross margin improves from 70% to 72%."
sensitivity:
  - variable: ARPU
    downsideCase: "Blended customer-year value settles at $155K because buyers keep coverage narrow and resist premium drill attachments."
    baseCase: "Blended customer-year value stays at $170K as modeled."
    upsideCase: "Blended customer-year value reaches $175K once private deployment, audit exports, and wider workflow coverage attach."
    y3RevenueImpactK: -493.1
    cashImpactK: -446.3
  - variable: CAC
    downsideCase: "CAC rises to $65K because outbound replaces partner-sourced demand and more enterprise security cycles slip."
    baseCase: "CAC stays at $50K with founder-led selling plus partner-assisted introductions."
    upsideCase: "CAC falls to $40K once gateway and migration partners deliver warmer opportunities."
    y3RevenueImpactK: -425.0
    cashImpactK: -702.1
  - variable: churn
    downsideCase: "Monthly churn rises to 2.0%, reducing Y3 end-state customers to the mid-50s even if top-of-funnel stays healthy."
    baseCase: "Monthly churn stays at 1.4% as modeled."
    upsideCase: "Monthly churn falls to 1.0% once quarterly drills and audit history become embedded in customer operating policy."
    y3RevenueImpactK: -573.8
    cashImpactK: -446.2
  - variable: sales cycle
    downsideCase: "Pilot-to-production stretches to roughly 6-7 months because private deployment and procurement reviews stay bespoke."
    baseCase: "Pilot-to-production runs about 4 months, consistent with the BP's 120-day decision target."
    upsideCase: "Trusted partners and repeatable runbooks compress the cycle toward 3 months."
    y3RevenueImpactK: -1232.5
    cashImpactK: -1076.0
  - variable: gross margin
    downsideCase: "Gross margin holds at 67% because onboarding and support stay more services-heavy than planned."
    baseCase: "Gross margin stays at the BP target of 70%."
    upsideCase: "Gross margin reaches 72% as deployment templates and tooling reduce manual work."
    y3RevenueImpactK: 0.0
    cashImpactK: -216.7
  - variable: hiring pace
    downsideCase: "Second-wave GTM and delivery hires are pulled forward by two quarters before repeatability is proven."
    baseCase: "Hiring follows A23 and stays lean until customer proof is visible."
    upsideCase: "Noncritical hires are deferred until after the next financing because partners absorb more onboarding load."
    y3RevenueImpactK: 0.0
    cashImpactK: -360.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      OutboundAndPartners --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> CoveredWorkflows
      CoveredWorkflows --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by scaling from 15 production customers at the end of Y2 to 60 by the end of Y3 while expanding each account toward a $170K blended customer-year value."
  - checkName: Must go right
    finding: "Deployment time has to stay near the BP's sub-two-week target so partner referrals and two quota carriers can support the Y3 logo ramp without pushing CAC above the base case."
  - checkName: Model breaks if
    finding: "If sales cycles stretch and ACV slips toward the downside case, cash low point compresses toward about $189K and Y3 EBITDA drops back toward breakeven."
  - checkName: Next-round proof
    finding: "The next financing is justified once the company reaches 15 production customers, shows 2 active partner channels, and proves that private deployment plus quarterly drills can expand ACV without a services-heavy headcount jump."
sanityChecks:
  ruleOf40: "Y3 growth 286.7% + EBITDA margin 26.5% = 313.2% (directionally strong but inflated by the still-small Y2 base)."
  burnMultiple: "About 0.3x in Y2 on net new ARR; Y3 is cash-generative, so burn multiple stops being the binding constraint."
