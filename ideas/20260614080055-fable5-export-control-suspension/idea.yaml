jobsToBeDone:
  - job: When a flagship coding model is suspended mid-migration, help the developer-platform team cut over safely, so thousands of queued code changes do not stall.
    currentAlternative: Emergency manual prompt rewrites inside internal tooling and LLM gateways
    successMetric: Hours to restore migration throughput and percentage of tasks passing fallback evals
  - job: When legal or leadership asks for proof the company is not dependent on one model vendor, help the developer-platform team rehearse a backup plan, so the next export or policy shock does not freeze engineering programs.
