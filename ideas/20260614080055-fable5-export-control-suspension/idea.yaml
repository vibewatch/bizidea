topRisks:
  - name: False-equivalence risk
    description: A fallback model may pass replay tests yet still fail on edge-case code patterns during a live migration.
    mitigation: Start with narrow migration templates, keep human approval on cutovers, and expand coverage only where replay plus diff review show strong equivalence.
  - name: Bundling pressure
    description: Gateway vendors or model providers could add basic failover features and make the category look commoditized.
    mitigation: Own the migration-specific replay corpus, workflow portability logic, and incident drill playbooks that horizontal routing products do not prioritize.
  - name: Pre-incident budget skepticism
    description: Some buyers may treat continuity as optional until a public suspension or outage hits their own program.
    mitigation: Sell into already-funded modernization initiatives and anchor ROI to avoided migration delays, legal requirements, and quarterly failover drills.
