slug: code-agent-failover-compiler
date: "2026-06-14"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-07"
    unit: month
    source: "[BP date] 基础情形假设 pre-seed 已完成交割，建模支出从计划日期次月开始。"
  - id: A2
    name: pre-seed 交割后的起始现金
    value: "2.2"
    unit: USDM
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M] 基础情形使用 $2.2M 交割额，足以在不假设顶线融资的前提下到达第 2 年里程碑加六个月缓冲。"
  - id: A3
    name: 每活跃客户年混合营收
    value: "170.0"
    unit: USDK per customer-year
    source: "[BP market.som ~$150k ACV; BP investorMemo.firstCustomer.initialContract $100k-$200k annual; BP businessModel premium drill retainers] 基础情形假设通过私有部署、季度演练和 2 到 5 个覆盖工作流，在市场规模锚点基础上实现适度扩展。"
  - id: A4
    name: 毛利率
    value: "70"
    unit: percent
    source: "[BP businessModel targetGrossMarginPct] 因此 COGS 按营收的 30% 建模，覆盖推理、支持和部署人工成本。"
  - id: A5
    name: 月度流失率
    value: "1.4"
    unit: percent
    source: "[BP operations quarterly drill cadence; Startup-finance heuristic: 具有粘性年度续约但存在一定供应商整合风险的早期企业基础设施。]"
  - id: A6
    name: 首批付费客户时机
    value: "M6 首个付费演练；M8 第二个；M10 第三个；两个在 M12 前转化为年度覆盖"
    unit: timing
    source: "[BP milestones 0-12 months; BP investorMemo.firstCustomer.initialContract] 将第 1 年锚定为 3 个付费客户，其中至少 2 个完成年度转化。"
  - id: A7
    name: 第 1 年客户着陆模式
    value: "月末客户数 0, 0, 0, 0, 0, 1, 1, 2, 2, 3, 3, 3"
    unit: count
    source: "[BP milestones 0-12 months] 对第一年 3 到 5 个付费试点、2 个年度转化的保守解读。"
  - id: A8
    name: 第 2 年季末客户数
    value: "Q1Y2 5；Q2Y2 8；Q3Y2 12；Q4Y2 15"
    unit: count
    source: "[BP milestones 12-24 months] 使用 24 个月目标 10 到 15 个生产客户的高端值，因为 GTM 招聘仅在可重复性证据出现后才启动。"
  - id: A9
    name: 第 3 年季末客户数
    value: "Q1Y3 20；Q2Y3 30；Q3Y3 44；Q4Y3 60"
    unit: count
    source: "[BP milestones 24-36 months] 基础情形使用少于 100 到 120 个客户但更高的 ACV，与商业计划书「或等效 ARR 集中度」的表述一致。"
  - id: A10
    name: 创始人/CEO 含附加费现金薪酬
    value: "108.0"
    unit: USDK per year
    source: "[BP team Founder CEO; Startup-finance heuristic: pre-seed 阶段低于市场水平的创始人薪资。]"
  - id: A11
    name: 联合创始工程师含附加费现金薪酬
    value: "180.0"
    unit: USDK per year
    source: "[BP team Founding eng; Startup-finance heuristic: 资深联合创始工程师现金薪酬加薪资附加费。]"
  - id: A12
    name: 应用 AI 工程师含附加费现金薪酬
    value: "210.0"
    unit: USDK per year
    source: "[BP team Applied AI engineer; Startup-finance heuristic: 稀缺的应用 AI 企业招聘加薪资附加费。]"
  - id: A13
    name: 解决方案工程师含附加费现金薪酬
    value: "150.0"
    unit: USDK per year
    source: "[BP team Solutions engineer; Startup-finance heuristic: 企业入驻和集成招聘。]"
  - id: A14
    name: 安全与平台工程师含附加费现金薪酬
    value: "180.0"
    unit: USDK per year
    source: "[BP team Security and platform engineer; Startup-finance heuristic: 私有部署和管控界面工程师。]"
  - id: A15
    name: GTM 负责人含附加费现金薪酬
    value: "180.0"
    unit: USDK per year
    source: "[BP team GTM lead; Startup-finance heuristic: 可重复性得到证明后的首位企业销售/运营人员。]"
  - id: A16
    name: 首位客户主管含附加费现金薪酬
    value: "150.0"
    unit: USDK per year
    source: "[BP gtm channels; Startup-finance heuristic: 在首个可重复动作出现后增加的合作伙伴辅助企业 AE。]"
  - id: A17
    name: 第二平台工程师含附加费现金薪酬
    value: "180.0"
    unit: USDK per year
    source: "[BP product twelveMonth and twentyFourMonth; Startup-finance heuristic: 支持私有部署和第二模板的额外平台算力。]"
  - id: A18
    name: 客户成功与渠道经理含附加费现金薪酬
    value: "132.0"
    unit: USDK per year
    source: "[BP operations and partner motion; Startup-finance heuristic: 早期客户成功和渠道运营招聘。]"
  - id: A19
    name: 第二客户主管含附加费现金薪酬
    value: "150.0"
    unit: USDK per year
    source: "[BP milestones 24-36 months; Startup-finance heuristic: 仅在第 2 年证据出现后才增加的第二配额承载者。]"
  - id: A20
    name: 第二解决方案工程师含附加费现金薪酬
    value: "150.0"
    unit: USDK per year
    source: "[BP operations quarterly cadence; Startup-finance heuristic: 随客户群扩大而增加的入驻能力。]"
  - id: A21
    name: 第二应用 AI 工程师含附加费现金薪酬
    value: "190.0"
    unit: USDK per year
    source: "[BP product twentyFourMonth; Startup-finance heuristic: 切口去风险后略低于第一位应用 AI 工程师的现金薪酬。]"
  - id: A22
    name: 合规与运营负责人含附加费现金薪酬
    value: "120.0"
    unit: USDK per year
    source: "[Research regulatoryLandscape; Startup-finance heuristic: 受监管买家规模化后期增加的精简合规与运营岗位。]"
  - id: A23
    name: 招聘节奏
    value: "创始人和联合创始工程师 M1；应用 AI 工程师 M2；解决方案工程师 M4；安全/平台工程师 M6；GTM 负责人 M12；AE M18；平台工程师 II M19；客户成功 M21；AE II M25；解决方案工程师 II M28；应用 AI 工程师 II M31；合规/运营 M34"
    unit: timing
    source: "[BP team startTiming; BP strategicChoices.sequencingRationale] 仅在初始切口证明可部署性和转化率后才增加规模化招聘。"
  - id: A24
    name: 职能薪资分配
    value: "创始人 70% S&M 和 30% G&A；联合创始、应用 AI 和平台工程师 100% R&D；解决方案工程师 70% R&D 和 30% G&A；GTM 和 AE 100% S&M；客户成功 60% S&M 和 40% G&A；合规/运营 100% G&A"
    unit: allocation
    source: "[BP team rationales] 分配遵循销售职责、产品构建、入驻和企业管控义务。"
  - id: A25
    name: 非薪资运营支出
    value: "S&M 工具及差旅：GTM 前每月 $4K，上线 GTM 负责人后 $9K，首位 AE 后 $15K，第二位 AE 后 $22K；R&D 工具及云：早期 $6K，解决方案构建后 $8K，私有部署后 $12K，第二平台构建后 $14K，第二应用 AI 工程师后 $18K；G&A：第 1 年 $5K，第 2 年 $7K，第 3 年早期 $9K，合规规模化后 $12K"
    unit: USDK per month
    source: "[Startup-finance heuristic: 精简企业软件运营计划，涵盖云支出、差旅、安全审查和法律/合规。]"
  - id: A26
    name: 营收确认策略
    value: "营收 = 期内平均活跃客户数 × 混合年度 ARPU ÷ 12；新签客户在着陆月贡献半月营收，此后按季度线性贡献"
    unit: policy
    source: "[Modeling convention anchored to BP pilot-to-annual conversion path] 保持确认营收与客户数和合同时机一致。"
  - id: A27
    name: 现金转换策略
    value: "EBITDA 近似现金流动；不建模债务、资本支出、税收或重大营运资金波动"
    unit: policy
    source: "[Startup-finance heuristic: pre-seed 软件业务的简单现金转换。]"
  - id: A28
    name: 稳态 CAC
    value: "50.0"
    unit: USDK per new production customer
    source: "[BP gtm funnelTargets; Startup-finance heuristic: 创始人主导加合作伙伴辅助的企业销售，120 天试点到生产的动作。]"
  - id: A29
    name: 融资里程碑
    value: "达到 15 个生产客户、私有部署、第二种迁移模板和 2 个活跃合作伙伴渠道，并保留 6 个月缓冲"
    unit: milestone
    source: "[BP milestones 12-24 months; BP fundingAsk runwayMonths] 用于确定 pre-seed 融资规模。"
