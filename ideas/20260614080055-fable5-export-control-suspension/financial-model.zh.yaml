modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      OutboundAndPartners --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> CoveredWorkflows
      CoveredWorkflows --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 营收引擎
    finding: "基础情形营收由第 2 年末 15 个生产客户扩展至第 3 年末 60 个，同时每账户向 $170K 混合客户年值扩展来驱动。"
  - checkName: 必须跑通的关键项
    finding: "部署时间必须保持在商业计划书两周以下目标附近，这样合作伙伴推荐和两名配额承载者才能支撑第 3 年客户增长，而不把 CAC 推过基础情形。"
  - checkName: 模型崩溃条件
    finding: "若销售周期拉长且 ACV 滑向悲观情形，现金低点将压缩至约 $189K，第 3 年 EBITDA 将跌回接近盈亏平衡。"
  - checkName: 下轮融资证明
    finding: "一旦公司达到 15 个生产客户、展示 2 个活跃合作伙伴渠道，并证明私有部署加季度演练能在无需重服务人员跳的前提下扩大 ACV，下轮融资即具备充分依据。"
sanityChecks:
  ruleOf40: "第 3 年增长 286.7% + EBITDA 利润率 26.5% = 313.2%（方向性强劲，但因第 2 年基数仍小而有所虚高）。"
  burnMultiple: "第 2 年净新 ARR 上的消耗倍数约 0.3 倍；第 3 年已正向现金流，消耗倍数不再是约束条件。"
  revenuePerFte: "第 3 年年末每全职员工营收 $430K（成熟 SaaS 约 $200K–$400K）。"
  flags:
    - "模型需要合作伙伴推荐加两名配额承载销售在第 3 年净增 45 个客户；仅靠创始人主导的外向式销售无法支撑基础情形的增长节奏。"
    - "$170K 混合客户年值假设私有部署、季度演练和工作流扩展按期附加；仅凭循环订阅 ARR 实际低于此值。"
    - "每全职员工营收略高于成熟 SaaS 基准——对高 ACV 基础设施软件可接受，但对入驻效率低下几乎没有容错空间。"
    - "Rule-of-40 看起来异常强劲是因为第 2 年营收仍小；尽职调查应更聚焦于部署时间、试点到生产转化率和毛利率。"
