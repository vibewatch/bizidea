slug: code-agent-failover-compiler
date: "2026-06-14"
executiveSummary: >-
  Code Agent Failover Compiler 应该从大型代码迁移项目的连续性层起步，而非定位为通用 LLM 网关、评估套件或编码助手。第一个客户是一家拥有美国、欧盟和印度工程团队、规模在 2,000 到 8,000 名员工之间的 SaaS 或金融科技公司——内部已有编码智能体技术栈，并计划在两个季度内启动触及 100 万行以上代码的 Java 或 TypeScript 现代化项目。触发购买的是最近一次模型中断或出口管制冲击，或是领导层无法承受中途暂停的大型迁移项目正式启动。初始产品应从代码仓库、CI 和网关日志中捕获真实迁移追踪记录，在经批准的备用模型上回放，并在事故发生前导出切换操作手册和审计包。这一切口之所以有吸引力，在于通用网关已能重路由流量，但研究发现的缺口是证明备用模型能通过同一工作流、工具和审查门控。研究支持的聚焦市场约为 $1.1B TAM、$270.0M SAM 和第 3 年 $18.0M SOM，预算锚定于现有的编码助手和控制平面支出。公司应刻意只做一种迁移类型和一种路由栈，因为等效性误判和集成蔓延是最快毁掉可信度的两条路。最大的反向风险是买家推迟支出、等到痛苦事故砸到自己头上，或网关和超大规模云厂商将路由产品向上延伸的速度快到让独立连续性层显得多余。现有研究尚未提供直接的客户访谈或真实模型切换事件的返工测量，因此前 6 个月必须验证部署速度、试点付费意愿和演练到生产的转化率。
problem:
  - 多季度代码迁移现在依赖单一前沿编码模型，一旦暂停或废弃，可能中断发布计划，迫使平台、法务和工程团队进行手动提示词改写。
  - 现有网关和备用功能能重路由请求，但无法证明备用模型是否仍能通过同一仓库专用的提示词、工具调用、编译门控、测试和审查规则。
solution:
  - 从智能体追踪记录、代码仓库、CI 和网关日志中捕获真实代码迁移工作流，在实际切换需要前持续在经批准的备用模型上回放有代表性的任务。
  - 对输出等效性打分，标记提示词或工具不兼容性，并生成经人工审核的切换操作手册和审计证据——让团队无需从头重开迁移剧本就能切换模型。
whyWeWin:
  - 产品卖的是工作流级连续性证明，而非通用模型路由——正好切中研究发现的事件和竞争格局中那个具体缺口。
  - 每次部署都积累一份绑定真实迁移任务的已接受 diff、模型兼容性失败和切换结果数据集——这是供应商和网关跨竞争生态都不可能汇聚的。
  - 第一个 ICP 已有编码助手、治理和现代化项目的预算，销售可以挂靠现有预算行，而非创造全新的实验预算。
strategicChoices:
  beachhead: >-
    2,000 到 8,000 名员工规模的 SaaS 和金融科技公司的开发者平台团队，正通过一个内部编码智能体栈和一个 AI 网关，在美国、欧盟和印度工程中心运行具名的 Java 或 TypeScript 现代化项目。
  wedgeRationale: >-
    这一切片比更宽泛的"AI 弹性"定位产生证明的速度更快——中断成本与在线迁移时间线挂钩，工作流负责人可识别，编译和测试门控提供了备用模型成功的客观定义。
  sequencingRationale: >-
    从一种迁移类型、一个路由层和一次付费故障转移演练起步，这样公司能在添加更多语言、更多智能体框架、渠道合作伙伴或相邻 AI 工作流前，先证明等效性、安全性和部署速度。
  notYet:
    - 非工程工作流的通用 AI 事故响应
    - 迁移连续性范围之外的广泛代码审查或测试生成自动化
    - 完整网关替换或超大规模云专用路由基础设施
    - 非切换就绪性验证所必需的跨供应商优化功能
market:
  tam: "基于全球约 7,500 家可合理承担约 $150k 年度连续性支出的 SaaS 和金融科技企业估算，TAM 约为 $1.1B。"
  sam: "基于约 1,800 家拥有多地区现代化和弹性敏感工程项目的美国、欧盟和印度目标企业估算，SAM 约为 $270.0M。"
  som: "基于通过直销加网关与迁移合作伙伴渠道约 120 个客户、每客户约 $150k ACV 建模，第 3 年 SOM 约为 $18.0M。"
  segments:
    - "主要细分：在运用编码智能体的多地区 SaaS 和金融科技公司中，负责 100 万行以上迁移项目的开发者平台和工程效能负责人"
    - "次要细分：同一账户内的 AI 平台负责人和迁移项目负责人，在扩大智能体自主权前需要经过测试的备用模型覆盖"
  buyingProcess: >-
    日常推动者通常是开发者平台负责人或 AI 平台负责人，但预算掌控者一般是工程 VP，同时需要安全、采购以及有时是风险或法务的意见。最可信的首笔销售是在一个已有资金的迁移项目上的付费试点，一旦买家看到成功演练、可接受的部署工作量以及通向年度连续性覆盖的清晰路径，就转化为正式合同。
product:
  mvp: >-
    MVP 应覆盖一种迁移类型、一个智能体栈和一个网关，摄入 50 到 100 个有代表性任务的提示词、工具调用、代码仓库上下文和 CI 结果。必须在一个经批准的备用模型上回放这些任务，按照编译和测试门控打通过/失败分，浮出整改步骤，并导出附人工签字的切换操作手册。
  sixMonth: >-
    上线一个源代码管理系统、一条 CI 路径和一个路由层的连接器；完成 2 到 3 个共创客户试点；并证明第一个回放基线加故障转移演练能在两周内在目标技术栈上跑通。
  twelveMonth: >-
    新增私有部署、策略管控、漂移预警，以及对第二种迁移模板或语言路径的支持；再打包季度演练工作流和审计导出，缩短受监管买家的采购周期。
  twentyFourMonth: >-
    从迁移连续性扩展至更广泛的工程智能体弹性（如测试自动化和代码审查工作流），同时保持连续性图谱、演练引擎和审计层作为系统记录。
  keyBets:
    - 当连续性保证附在在线现代化预算而非作为抽象平台保险出售时，买家愿意为事故前工作流保证付费。
    - 编译、测试和审查结果能给买家足够的备用模型等效性信心，批准生产切换演练。
    - 一种迁移模板和一个路由栈足够窄，能在服务蔓延主导动作前实现可产品化的入驻。
    - 网关、评估和云路由在位企业在工作流可移植性上仍不完整，留有专业产品的空间。
gtm:
  wedge: >-
    为一个活跃的现代化项目销售付费故障转移演练——在备用模型上影子测试 50 到 100 个真实迁移任务，将结果转化为切换决策，而非仅仅是一张仪表盘。
  channels:
    - 创始人主导向具名 SaaS 和金融科技现代化项目的工程 VP、开发者平台负责人和 AI 平台负责人进行外向式销售
    - 与已在路由或追踪数据路径上的 AI 网关和评估供应商联合销售或集成驱动的推荐
    - 通过运行底层转型项目的云迁移咨询公司和系统集成商引入
  funnelTargets: "目标账户→合格试点 15–25%，合格试点→付费试点 40–50%，付费试点→年度生产 50% 以上，以及首次付费演练→生产决策在 120 天内完成。"
  pricing: >-
    将产品定价为基于受管理仓库和活跃影子测试工作流的年度连续性订阅——买家保护的是具名迁移项目而非购买席位。从付费演练或试点起步，一旦 2 到 5 个关键工作流纳入覆盖、季度演练成为运营策略的一部分，就转化为六位数年度合同。
businessModel:
  revenueStreams:
    - 覆盖迁移工作流和受管理代码仓库的年度平台订阅
    - 第一个迁移项目的一次性入驻和工作流映射费
    - 季度故障转移演练、实时事故支持和审计导出的高级服务包
  unitOfValue: 处于连续性覆盖下的影子测试迁移工作流
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一客户内添加更多代码仓库、迁移项目和业务单元
    - 从一种迁移类型扩展至共享同一切换逻辑的相邻工程智能体工作流
    - 通过私有部署、合规报告以及更深度的网关或 CI 集成扩大钱包份额
strategyMap:
  northStarMetric: 覆盖的迁移工作流中，能切换至经批准备用模型且在一个工作日内仍通过编译、测试和策略门控的比例
  inputMetrics:
    - 从客户启动到首个回放基线的时间
    - 无需手动返工即可通过备用模型评估的有代表性任务占比
    - 付费试点到年度生产的转化率
    - 每客户覆盖的工作流数量
    - 完成一次故障转移演练并导出切换操作手册的中位时间
  moatsToBuild:
    - 跨真实迁移任务积累的已接受 diff、失败案例和整改模式的仓库感知语料库
    - 跨编码模型和网关的提示词、工具调用、拒绝和上下文窗口行为的兼容性地图
    - 成为客户在 AI 运营弹性上机构记忆的审计和演练历史
    - 降低受监管工程环境中安全和采购摩擦的部署剧本
  killCriteria:
    - 30 个合格目标账户对话后，付费试点少于 3 个
    - 演练完成后 6 个月内，付费试点转化为年度合同的比例低于 50%
    - 前 5 个试点的首次部署中位时间持续超过 15 个工作日
    - 有限范围整改后，备用模型在有代表性任务集上的通过率仍未达到 80%
  mermaid: |
    flowchart LR
      Wedge[迁移连续性切口] --> MVP[仓库感知故障转移编译器 MVP]
      MVP --> Proof[影子测试演练与切换证明]
      Proof --> Expansion[更多工程工作流与连续性覆盖]
investorMemo:
  verdict:
    call: "值得深入/进一步调查"
    conviction: 引人信服的时机论据和清晰的滩头市场值得合伙人会面，但在一个真实迁移试点证明买家愿意在重大事故砸到自己头上之前付费前，确信度仅为中等。
    whyBelieve: 公司瞄准一个紧迫、新近可见的失败模式，具备具体买家、现有预算锚点，以及当前网关和评估工具未能完全解决的差异化产品切口。
    whyDoubt: 预算紧迫性、部署速度和对捆绑的防御性仍是假设，任何一个假设失效都可能让产品沦为服务层或短暂的功能缺口。
    nextDiligence: 确认 3 到 5 个目标账户愿意为绑定在线迁移的付费故障转移演练出资，且至少一次演练能转化为年度平台部署。
  firstCustomer:
    title: 多地区 SaaS 或金融科技公司的开发者平台负责人
    profile: 一家拥有美国、欧盟和印度工程团队、规模在 2,000 到 8,000 名员工之间的公司，后端一个网关运行内部编码智能体栈，并计划推进触及 100 万行以上代码的 Java 或 TypeScript 迁移。
    trigger: 管理层启动或已推进大型迁移，然后一次模型中断、废弃通知或弹性审查暴露出备用路径从未端到端测试过。
    buyer: 工程 VP
    initialContract: "为一个迁移项目支付 $25k–$50k 的付费故障转移演练，一旦 2 到 5 个工作流纳入连续性覆盖且季度演练已排期，转化为约 $100k–$200k 的年度 ARR。"
  mustBeTrue:
    - 至少一半的合格目标账户必须确认，一个在线迁移或弹性审查已足以支撑付费连续性试点。
    - 对大多数目标技术栈，首个回放基线必须在 10 个工作日内部署完毕。
    - 经有限提示词和工具整改后，经批准的备用模型必须通过至少 80% 的有代表性迁移任务。
    - 至少 50% 的付费演练必须转化为年度合同，因为买家需要的是持续覆盖，而非一次性评估。
    - 网关、超大规模云和编码平台在位企业必须在大多数后期商机中仅凭原生路由或备用功能无法赢单。
  diligenceQuestions:
    - 目标团队在迁移中途切换编码模型时，实际需要多少提示词、工具 schema 和审查门控的返工？
    - "实际上谁掌控第一笔预算：工程 VP、开发者平台负责人，还是弹性或风险担保人？"
    - 有多少目标账户已通过网关集中编码智能体流量，从而能提供两周试点所需的遥测数据？
    - 第一批受监管的 SaaS 或金融科技买家必须具备什么安全和部署模式？
    - 网关和超大规模云供应商从请求路由扩展至工作流级回放和切换保证的速度有多快？
operatingAssumptions:
  - assumption: 当销售与已有资金的现代化项目挂钩而非纯粹依靠自由支配的创新预算时，买家会在遭遇严重中断前为连续性付费。
    basis: research.yaml
    validationTest: 至少完成 3 个付费试点，预算来源是活跃迁移或平台预算行而非自由支配实验支出。
    decisionImpact: 若假设失效，公司应收窄至事故后响应服务，或延迟直销规模化，直到出现更强触发信号。
  - assumption: 一个网关、一条 CI 路径和一个智能体栈足以在两周内完成首个回放基线。
    basis: operator judgment
    validationTest: 测量前 5 个试点从启动到首次完成演练的时间，要求至少 4 个在 10 个工作日内完成。
    decisionImpact: 若假设失效，入驻将变为重服务，路线图必须进一步收窄才能推进招聘。
  - assumption: 编译、测试和审查门控通过率是被信任的真实备用就绪度代理指标。
    basis: idea.yaml
    validationTest: 在试点复盘中，要求迁移负责人接受回放评分卡作为授权至少一次受控切换演练的充分依据。
    decisionImpact: 若假设失效，产品需要更深度的人工 QA 工作流和更慢的扩展节奏，压低利润率和销售速度。
  - assumption: 创始人主导销售能在雇用专职企业销售前赢得前 3 到 5 个付费试点。
    basis: operator judgment
    validationTest: 建立 30 个目标账户清单，在 9 个月内至少签下 3 个付费试点或已签署的试点意向书。
    decisionImpact: 若假设失效，ICP、信息或渠道策略不够锋利，不足以支撑在商业人员上的资金消耗。
  - assumption: 网关和评估供应商在前 18 个月内更倾向于合作或共存，而非立即以同等工作流产品填补缺口。
    basis: research.yaml
    validationTest: 签下 2 个集成或推荐合作关系，并监控后期商机中至少一半客户仍将这些工具视为互补而非替代。
    decisionImpact: 若假设失效，公司应转向嵌入式分发，或在迁移专用审计深度上更进一步细分。
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: 与开发者平台负责人的 ICP 和触发访谈
    hypothesis: 运行具名迁移项目的多地区 SaaS 和金融科技平台团队会将连续性描述为即时预算问题，而非假设性平台顾虑。
    successMetric: 完成 20 个合格访谈，其中至少 10 个与目标技术栈匹配，8 个确认在未来 12 个月内有活跃迁移或弹性触发。
    owner: 创始人/CEO
  - horizon: "0–90 天"
    experiment: 历史迁移任务的手动回放和差异分析
    hypothesis: 一批有代表性的 50 个历史任务能在任何生产切换尝试前暴露大多数提示词、工具和测试不兼容性。
    successMetric: 2 个共创客户提供历史任务追踪记录，且至少 70% 的阻塞性不兼容在实际演练规划前被识别出来。
    owner: 联合创始工程师
  - horizon: "90–180 天"
    experiment: 两周部署试点
    hypothesis: 一个代码仓库、一个网关和一条 CI 路径足以启动可信的故障转移演练，无需定制平台重建。
    successMetric: 3 个付费试点在 10 个工作日内完成首个回放基线，并生成被客户负责人接受的切换操作手册。
    owner: 解决方案工程师
  - horizon: "90–180 天"
    experiment: 定价打包测试
    hypothesis: 基于工作流的定价比基于席位的定价转化率更高，因为买家保护的是迁移吞吐量而非个人开发者用量。
    successMetric: 偏好套餐在至少 8 次定价对话中的 5 次胜出，并出现在 2 份已签署的试点范围中。
    owner: 创始人/CEO
  - horizon: "6–12 个月"
    experiment: 季度故障转移演练计划
    hypothesis: 完成一次成功演练的客户会安排定期演练，并从试点预算迁移到年度运营预算。
    successMetric: 至少 2 个客户在 6 个月内完成第二次演练，并续约为年度合同。
    owner: 产品负责人
  - horizon: "12–18 个月"
    experiment: 通过网关和迁移系统集成商的合作伙伴来源管道
    hypothesis: 现有路由和现代化合作伙伴能在不增加部署复杂度的情况下引入合格商机。
    successMetric: 25% 的合格管道来自 2 个活跃合作伙伴，且合作伙伴来源的试点转化率不低于直销。
    owner: GTM 负责人
operations:
  - 按模型和迁移模板维护提示词、工具 schema、拒绝行为和上下文限制的版本化兼容性库。
  - 围绕最小权限连接器、私有执行选项和可整洁映射至客户弹性审查的审计导出来打包部署。
  - 对每个生产客户运行季度运营节拍：回放刷新、故障转移演练、演练后整改和高管汇报。
  - 与网关、CI 和迁移服务提供商标准化合作伙伴交接，确保试点不演变为定制化事故响应项目。
team:
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 主导品类定位、创始人亲自打单、合作伙伴开发，以及赢得首批企业试点所需的弹性叙事。
  - role: 联合创始工程师
    startTiming: 第 0 个月
    rationale: 在商业规模化前构建回放引擎、代码仓库和 CI 连接器，以及首个切换操作手册工作流。
  - role: 应用 AI 工程师
    startTiming: 第 2 个月
    rationale: 改进任务等效性评分、提示词适配逻辑和评估质量——这些是核心技术可信度风险所在。
  - role: 解决方案工程师
    startTiming: 第 4 个月
    rationale: 缩短试点部署时间，映射客户工作流，防止早期集成演变为定制咨询。
  - role: 安全与平台工程师
    startTiming: 第 6 个月
    rationale: 私有部署、审计导出和企业级管控界面在受监管买家越过探索阶段后成为门控因素。
  - role: GTM 负责人
    startTiming: 第 12 个月
    rationale: 仅在试点打包、部署时间和转化率指标显示出可重复动作后才增加带配额的销售能力。
milestones:
  - horizon: "0–12 个月"
    items:
      - 在 SaaS 和金融科技迁移连续性滩头市场签下 3 到 5 个付费试点。
      - 大多数试点的首个回放基线在 10 个工作日内完成。
      - 将至少 2 个试点转化为年度连续性合同。
      - 产品化一种迁移模板、一条网关集成路径和一份审计就绪的切换包。
  - horizon: "12–24 个月"
    items:
      - 达到 10 到 15 个生产客户，每个账户覆盖多个代码仓库或工作流。
      - 上线私有部署、季度演练自动化和第二种迁移模板或语言路径。
      - 通过网关、评估供应商或迁移咨询公司建立 2 个活跃合作伙伴渠道。
      - 在现有客户内将迁移连续性扩展至一个相邻的工程智能体工作流。
  - horizon: "24–36 个月"
    items:
      - 通过约 100 到 120 个客户或等效 ARR 集中度接近建模的第 3 年 SOM。
      - 证明连续性覆盖能在不显著增加部署时间的前提下超越第一个迁移切口向外扩展。
      - 根据留存率和赢单率决定是否继续专注于工程工作流，或扩展为更广泛的 AI 连续性控制平面。
      - 建立一个在竞争评估中已足够重要的切换结果可防守数据集。
risks:
  - risk: 备用模型在回放中可能表现等效，却在实际迁移中因边缘代码模式而失效。
    likelihood: High
    impact: High
    mitigation: 从窄迁移模板起步，切换需人工审批，只在回放、差异对比审查和生产演练始终一致的范围内扩大覆盖。
  - risk: 网关、超大规模云或编码平台供应商可能捆绑足够多的连续性功能，压缩独立切口。
    likelihood: High
    impact: High
    mitigation: 在更广泛的捆绑赶上来之前，凭借仓库感知的工作流等效性、迁移专用审计深度和更快的单一窄切口部署来赢单。
  - risk: 买家可能推迟支出，直到公开事故或内部中断让风险无法否认。
    likelihood: Medium
    impact: High
    mitigation: 把试点附在已有资金的现代化项目上，以避免迁移延误、审查消耗和演练就绪度来量化 ROI，而非抽象保险。
  - risk: 早期部署可能需要太多集成和解决方案工作，导致规模化效率低下。
    likelihood: Medium
    impact: High
    mitigation: 拒绝边缘技术栈，先在一个网关和一条 CI 路径上标准化，用解决方案工程师在增加销售人员前把反复出现的试点步骤转化为产品。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    融资 18 个月，用于构建回放与切换引擎、强化私有部署和审计管控、完成 3 到 5 个付费试点、证明至少 50% 的试点转生产转化率，并在扩大企业销售规模前建立首批合作伙伴辅助分发渠道。
