  - point: >-
      金融科技买家必须对关键 ICT 和第三方弹性进行映射，而非依赖临时应急文档。
    sourceRefs:
      - 43
      - 45
      - 46
      - 51
  - point: >-
      模型可移植性不只是端点切换问题——拒绝语义、分词器偏移和上下文处理差异因供应商和模型代际而异。
    sourceRefs:
      - 4
