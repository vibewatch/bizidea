openQuestions:
  - 目标团队在迁移中途切换模型时，实际需要多少提示词、工具 schema 或审查门控的改写？
  - 目标买家中有多少已通过网关而非直接调用供应商 SDK 来集中管理编码智能体流量？
  - 如果以运营弹性而非开发者工具的方式定位，受监管的 SaaS 和金融科技买家是否会在事故前付费？
  - 超大规模云厂商将模型路由从端点选择扩展至工作流级回放和切换保证的速度有多快？
