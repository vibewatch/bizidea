competitors:
  - name: GitHub Copilot Enterprise
    stage: incumbent
    wedge: 内置 AI 编码平台，具备自主工作流、池化用量管控和自动代码审查。
    pricing: $39/用户/月，另加基于用量的 AI 积分
    strength: 深度分布于工程组织内部，并对 GitHub 原生编码工作流拥有第一方管控能力。
    weaknessVsUs: 以平台为中心而非供应商中立；不能证明跨供应商的切换就绪性，无法覆盖外部编码智能体和迁移脚本。
    sourceRefs:
      - 10
      - 11
      - 13
      - 14
  - name: Portkey
    stage: scale-up
    wedge: 具备路由、备用、负载均衡、可观测性和治理的多供应商 AI 网关。
    pricing: 免费层；生产版 $49/月；企业版定制报价
    strength: 跨多个模型供应商的路由、日志、预算和防护栏控制平面功能强大。
    weaknessVsUs: 路由请求但不回放真实迁移任务，也不生成审计就绪的切换操作手册。
    sourceRefs:
      - 29
      - 30
  - name: LiteLLM
    stage: scale-up
    wedge: 支持 100 多个供应商备用的开源 LLM 网关和路由器。
    pricing: 开源版免费；企业版按需报价
    strength: 灵活、对开发者友好的自托管抽象层，适合需要直接管控的平台团队。
    weaknessVsUs: 基础设施管道，而非工作流可移植性、已接受差异历史或连续性演练。
    sourceRefs:
      - 32
      - 33
  - name: Cloudflare AI Gateway
    stage: incumbent
    wedge: 边缘原生网关，具备动态路由、缓存、分析、重试和备用管控。
    pricing: 免费起步；更广平台及企业版定价另议
    strength: 现有的网络安全覆盖面和针对高吞吐 AI 流量成熟的运营管控能力。
    weaknessVsUs: 聚焦请求路由和可观测性，不涉及代码智能体专用的提示词/工具适配或仓库感知回放。
    sourceRefs:
      - 26
      - 27
  - name: Braintrust
    stage: scale-up
    wedge: 具备追踪、实验、数据集和回归测试的 AI 可观测性与评估平台。
    pricing: 入门版免费；专业版 $249/月；企业版定制报价
    strength: 评估工作流和编码智能体监控能力强，帮助团队对比模型行为。
    weaknessVsUs: 衡量 AI 质量，但不担任网关、供应商中断和迁移切换之间的连续性编译器。
    sourceRefs:
      - 36
      - 37
      - 39
regulatoryTechnicalConstraints:
