  buyingTrigger: 模型暂停事件、法律要求多供应商应急方案，或启动不容许中途停工的大型迁移项目
  currentAlternative: 在 LLM 网关之上自研，配合手动提示词改写、回放脚本和紧急事故战时会议
  switchingReason: >-
    该产品在实际迁移任务上证明备用模型的可行性，并自动生成切换操作手册；通用网关仅负责流量重路由，团队仍需自行排查智能体行为失效问题
  pricingHypothesis: 按受管理仓库和月度影子测试工作流计费的年度平台费，叠加故障转移演练和实时事故支持的高级服务包
