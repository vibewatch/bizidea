problem: >-
  大型工程组织开始将一款旗舰编码模型用于触及数百万行代码的迁移、重构和发布工作。一旦该模型一夜下线，提示词、工具调用和评估假设往往在备用路径上全面失效，被迫在平台、法务和工程团队之间发起应急战时会议。现有网关能重新路由请求，却无法证明备用模型能安全完成同一代码工作流。真正痛苦的缺口在于工作流可移植性和提前演练，而非简单的 API 切换。
targetUser:
  primary: 全球 SaaS 和金融科技公司的开发者平台负责人及工程效能负责人
  secondary: 负责内部编码智能体工具的资深工程师和 AI 平台负责人
  buyer: 工程 VP 或开发者平台负责人
startupThesis:
  nonObviousInsight: >-
    稀缺资产已不再是最优编码模型的访问权，而是一个持续经过测试的可移植层——当政府或供应商一夜之间下线旗舰模型时，它能让特定于模型的智能体工作流继续运行。
  beachhead: >-
    在美国、欧盟和印度拥有工程团队、规模在 1,000 到 10,000 名员工之间的 SaaS 和金融科技公司，正在用前沿编码智能体推进 Java、TypeScript 或 Python 现代化项目的开发者平台团队
  wedge: >-
    一款代码智能体故障转移编译器——在真实迁移任务上回放并测试经批准的备用模型，标记提示词和工具的不兼容性，在中断发生前生成切换操作手册
  whyNowCatalyst: >-
    Fable 5 从隆重发布到全球暂停仅历时数日，证明 AI 驱动的代码现代化项目在下一轮特定于模型的迁移启动前，就需要备好容灾基础设施。
  ventureScalePath: >-
    从代码库现代化和框架迁移切入（中断成本显而易见），再扩展至测试自动化、支持智能体和后台工作流，最终成为跨模型供应商和管辖区任何关键 AI 工作流的连续性操作系统。
solution: >-
  构建一个连续性层，接入编码智能体平台、代码仓库历史、CI 流水线和网关日志，捕获每个迁移工作流背后真实的提示词、工具和验收标准。产品持续将这些任务回放至经批准的备用模型，打分输出等效性，并标出需要在切换前调整的提示词、工具 schema 或上下文窗口。当供应商被暂停或某区域失去访问权限时，团队启动引导式切换——替换模型、更新路由策略，并导出审计包，说明哪些内容发生了变化、哪些工作流仍保持绿灯。随着时间推移，该平台将成为 AI 工程体系的活版容灾手册，而非一份静态应急文档。
goToMarketSeed:
