topRisks:
  - name: 等效性误判风险
    description: 备用模型可能通过回放测试，却在实际迁移中因边缘代码模式而失效。
    mitigation: 从窄迁移模板起步，人工审批切换动作，只在回放加差异对比审查均显示强等效性的范围内扩大覆盖。
  - name: 捆绑打包压力
    description: 网关供应商或模型供应商可能加入基础故障转移功能，让这一品类看起来已商品化。
    mitigation: 深耕迁移专用回放语料库、工作流可移植性逻辑和事故演练剧本——这些是横向路由产品不会优先解决的。
  - name: 事故前预算顾虑
    description: 部分买家可能将连续性视为可选项，直到公开暂停事件或中断波及自己的项目时才行动。
    mitigation: 锚定已有预算的现代化项目来推进销售，将 ROI 与避免迁移延误、法律要求和季度故障转移演练挂钩。
