competitors:
- name: GitHub Copilot Enterprise
  stage: incumbent
  wedge: Installed AI coding platform with agentic workflows, pooled usage controls, and automated code review.
  pricing: $39/user/month plus usage-based AI credits
  strength: Deep distribution inside engineering organizations and first-party control over GitHub-native coding workflows.
  weaknessVsUs: Platform-centric rather than vendor-neutral; it does not prove cross-provider cutover readiness for external coding agents and migration scripts.
  sourceRefs:
  - 10
  - 11
  - 13
  - 14
- name: Portkey
  stage: scale-up
  wedge: Multi-provider AI gateway with routing, fallbacks, load balancing, observability, and governance.
  pricing: Free tier; Production $49/month; Enterprise custom
  strength: Strong control-plane feature set for routing, logs, budgets, and guardrails across many model providers.
  weaknessVsUs: Routes requests but does not replay real migration tasks or generate audit-ready cutover runbooks.
  sourceRefs:
  - 29
  - 30
- name: LiteLLM
  stage: scale-up
  wedge: Open-source LLM gateway and router with fallbacks across 100+ providers.
  pricing: Open source $0; Enterprise pricing on request
  strength: Flexible, developer-friendly self-hosted abstraction layer for platform teams that want direct control.
  weaknessVsUs: Infrastructure plumbing rather than workflow portability, accepted-diff history, or continuity drills.
  sourceRefs:
  - 32
  - 33
- name: Cloudflare AI Gateway
  stage: incumbent
  wedge: Edge-native gateway with dynamic routing, caching, analytics, retries, and fallback controls.
  pricing: Start building for free; broader platform and enterprise pricing
  strength: Existing network-security footprint and mature operational controls for high-throughput AI traffic.
  weaknessVsUs: Focused on request routing and observability, not code-agent-specific prompt/tool adaptation or repo-aware replay.
  sourceRefs:
  - 26
  - 27
- name: Braintrust
  stage: scale-up
  wedge: AI observability and eval platform for tracing, experiments, datasets, and regression testing.
  pricing: Starter free; Pro $249/month; Enterprise custom
  strength: Strong evaluation workflow and coding-agent instrumentation that help teams compare model behavior.
  weaknessVsUs: Measures AI quality but does not act as the continuity compiler between gateways, provider outages, and migration cutovers.
  sourceRefs:
  - 36
  - 37
  - 39
