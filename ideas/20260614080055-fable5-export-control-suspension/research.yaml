    - 39
  - point: >-
      Cloud and modernization partners matter because AWS and Azure are already teaching buyers to think about model routing, availability, and policy-controlled inference.
    sourceRefs:
    - 40
    - 41
  dataMoats:
  - point: >-
      A replay corpus of real migration tasks, accepted diffs, and fallback outcomes becomes more useful as coding-model churn rises.
    sourceRefs:
