jobsToBeDone:
  - job: When AI-assisted checkout and refund flows increase cross-border transaction volume, help controllers produce entity-ready close packs, so they can close faster without adding analysts.
    currentAlternative: Manual spreadsheet reconciliation across PSP exports, ERP imports, and tax workpapers.
    successMetric: Days to close and number of manual journal corrections per month.
  - job: When a merchant launches a new country entity or wallet flow, help finance systems leads prove FX and tax treatment for every order path, so they can keep automation on through audit season.
    currentAlternative: Internal build scripts plus ad hoc reviewer checklists.
    successMetric: Percentage of transactions with complete evidence and exception review time per entity.
ideaScorecard:
  signalStrength:
    score: 4
    rationale: The round, product launches, and measurable checkout lift create a credible signal that AI-native finance and agentic commerce are moving from concept to deployment.
  painIntensity:
    score: 4
    rationale: Close pain is operational rather than existential, but it becomes acute once cross-border refunds and multi-entity wallet flows start outrunning finance review capacity.
  wedgeClarity:
    score: 5
    rationale: A read-only shadow ledger and exception pack for Airwallex-to-ERP reconciliation is a narrow, buyer-legible first product.
  defensibility:
    score: 4
    rationale: Reusable exception memory across wallet events, entities, and local tax treatments becomes proprietary workflow data that is hard to replicate quickly.
  ventureScale:
    score: 4
    rationale: The beachhead can expand from ecommerce close into broader autonomous-finance controls, treasury, reporting, and audit infrastructure across digital merchants and platforms.
topRisks:
  - name: Platform bundling
    description: Airwallex or a major ERP vendor could ship basic reconciliation and evidence features once customer demand is obvious.
    mitigation: Win on cross-system exception memory, multi-ERP support, and faster deployment across entities instead of trying to replace the core platform.
  - name: Integration data gaps
    description: Merchant data across checkout, refunds, wallets, and tax systems may be inconsistent enough to make automation brittle.
    mitigation: Start with a constrained integration surface of Airwallex, Shopify, and NetSuite or Xero, keep humans in the loop, and build a narrow exception taxonomy before expanding.
  - name: Adoption timing
    description: Some merchants may delay AI shopping assistants even if Airwallex ships the tooling, slowing the obvious wedge.
    mitigation: Sell first on existing wallet, FX, and refund close pain for cross-border merchants, with agentic-commerce workflows as the accelerant rather than the sole dependency.
