differentiator: >-
  Generic reconciliation tools start from bank statements or ERP journals after the fact; Agent Wallet Closebook starts at the wallet event and preserves the commerce intent that created it. That makes it useful for AI-assisted checkout flows where the real risk is not missing data alone, but losing the decision trail around entity routing, FX treatment, and refunds. The defensible asset is an exception memory graph across Airwallex events, merchant entities, and local close rules that gets sharper with every reviewed edge case.
