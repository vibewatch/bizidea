problem: >-
  Controllers at cross-border digital merchants are about to let AI-assisted checkout and wallet flows create orders, refunds, and payouts faster than their finance teams can reconcile them. Each transaction can cross entity, currency, VAT or GST, and refund-policy boundaries, so incomplete evidence chains turn month-end close into a fire drill and make auditors nervous. Today's PSP exports, ERP journal uploads, and tax spreadsheets were built for human checkout funnels, not autonomous or semi-autonomous agents acting inside wallet flows.
targetUser:
  primary: Controller or finance systems lead at a Singapore- or Hong Kong-headquartered cross-border digital merchant running Airwallex with NetSuite or Xero across multiple selling entities.
  secondary: Head of payments operations or revenue operations at the same merchant.
  buyer: CFO or controller who owns close quality, audit readiness, and finance-ops headcount.
startupThesis:
  nonObviousInsight: The new gap is not another AP bot or bookkeeping copilot; it is the missing evidence and policy layer between agent-originated commerce actions and the general ledger. As finance and checkout collapse into one AI-native workflow, the bottleneck shifts to proving which entity, FX rate, tax treatment, and refund rule each wallet action should map to.
  beachhead: Singapore- and Hong Kong-headquartered Shopify Plus merchants in beauty, wellness, and accessories with 3-12 selling entities, Airwallex for collections and payouts, and NetSuite or Xero for month-end close.
  wedge: Shadow ledger and exception workbench that captures every Airwallex wallet event, ties it to order and refund intent, and auto-builds entity-ready journal and tax-evidence packs.
  whyNowCatalyst: Airwallex just put fresh capital behind T:0 and Airi, making AI-native close and agentic wallet flows real enough that merchants will adopt them before their control stack catches up.
  ventureScalePath: Start with wallet-to-ledger close for cross-border merchants, then expand into refund policy controls, entity routing, treasury forecasting, revenue recognition, and insurer or auditor-facing evidence APIs for the broader autonomous-finance stack.
solution: >-
  Agent Wallet Closebook plugs into Airwallex, Shopify, ERP, and tax systems to build an event-level graph from order intent to wallet movement to journal entry. It starts in read-only shadow mode, flags missing entity mapping, FX mismatches, VAT or GST evidence gaps, and refund reversals, then proposes the exact journal package finance should post. Over time, the product learns exception patterns by entity and market, turning recurring close work into policy rules instead of analyst busywork. The first release is deliberately narrow: close packs for collections, payouts, and refunds tied to AI-assisted checkout flows, with human approval before anything hits the ledger.
goToMarketSeed:
  firstCustomer: Controller at a Singapore-based beauty or supplement Shopify Plus merchant doing $20M-$100M GMV across Singapore, Australia, the UK, and the EU, already using Airwallex and struggling to reconcile cross-border refunds and FX settlements into NetSuite.
  buyingTrigger: Launch of AI shopping assistants, expansion into an additional market entity, or a quarter-end audit cycle that exposes refund and FX reconciliation gaps.
  currentAlternative: PSP exports, ERP CSV uploads, tax spreadsheets, and finance-ops analysts manually stitching checkout, payout, and refund evidence.
  switchingReason: The first customer switches because the product surfaces close-ready exceptions and journal packs without replacing Airwallex, Shopify, or ERP, cutting review time while preserving audit evidence.
  pricingHypothesis: $2,000-$5,000 per entity per month plus usage-based pricing above a monthly order and refund volume threshold.
