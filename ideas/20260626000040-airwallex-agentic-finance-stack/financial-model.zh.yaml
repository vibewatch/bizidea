slug: agent-wallet-closebook
date: '2026-06-26'
currency: USD
modelStartMonth: '2026-07'

assumptions:
  - id: A1
    name: 模型起点种子资本
    value: "3000"
    unit: K USD
    source: "[BP fundingAsk：目标 $2–4M 种子轮；模型取中值 $3M]"
  - id: A2
    name: 入场 ARPU（每商户，第 5–6 月，1 个主体）
    value: "2500"
    unit: USD/month
    source: "[BP 定价每主体每月 $2,000–$5,000；入场价按单主体试点计]"
  - id: A3
    name: 成熟 ARPU（每商户，2 个主体，第 7 月起）
    value: "5000"
    unit: USD/month
    source: "[BP 里程碑：第 9 月 5 家商户 MRR $25K，即 5×$5K；M5/M6 客户在首轮月结后从 1 扩至 2 个主体]"
  - id: A4
    name: 第 2 年平均 ARPU
    value: "5200"
    unit: USD/month
    source: "[BP：第 18 月 20 家商户 MRR $100K = 平均 $5K；早期客群扩至 3 个主体后略微上调至 $5.2K；与 BP 落地扩展模型一致]"
  - id: A5
    name: 第 3 年平均 ARPU
    value: "5500"
    unit: USD/month
    source: "[BP SOM：60 个客户 × 每年 $30K 入场价；第 36 月 ARR 目标 $3M，55 家商户对应 $5.5K/月；按 BP sequencingRationale 从 2 扩至 2–3 个主体]"
  - id: A6
    name: 目标毛利率
    value: "75"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct = 75；operatingAssumptions：异常分类体系和集成层一次构建，前 10 次部署后单主体边际支持成本递减]"
  - id: A7
    name: COGS 基础设施固定成本（每月）
    value: "3000"
    unit: USD/month
    source: "[启发式：云计算 $1.5K + Airwallex/Shopify API 费用 $1K + 运营工具 $0.5K，适用于 3 个集成的早期 SaaS；与 75% 毛利率目标一致]"
  - id: A8
    name: COGS 单付费客户变动成本（每月）
    value: "500"
    unit: USD/customer/month
    source: "[启发式：约为入场 ARPU $2.5K 的 10%，覆盖支持人工、集成维护、每主体 API 调用开销；与 75% 毛利率目标一致]"
  - id: A9
    name: 月流失率
    value: "2.0"
    unit: percent/month
    source: "[启发式：B2B SaaS 会计工作流工具月流失率 1.5–2.5%；财务主管工作流切换成本高；对应平均客户生命周期约 50 个月]"
  - id: A10
    name: 合伙人主导模型综合 CAC
    value: "15000"
    unit: USD
    source: "[启发式：CEO 50% 时间 × $130K 年薪 / 12 个月 × 每客户 2 个月 = $10.8K + 合作伙伴激励 $2K–$4K；按 BP GTM 共创客户引荐后走渠道转介]"
  - id: A11
    name: 试点转付费转化率
    value: "60"
    unit: percent
    source: "[BP funnelTargets：试点转生产 50% 以上；模型取 60%（5 名共创客户中 3 人在第 7 月前转化），与 BP 里程碑一致]"
  - id: A12
    name: 创始人 CEO 年薪
    value: "130000"
    unit: USD/year
    source: "[启发式：新加坡种子轮 CEO；折合新加坡市场区间 SGD 170K–200K 的美元等值；按 BP 25% 资金用于创始人薪酬的保守分配]"
  - id: A13
    name: 创始人 CTO 年薪
    value: "120000"
    unit: USD/year
    source: "[启发式：新加坡/香港金融科技集成背景种子轮 CTO；折合 SGD 155K–180K 市场区间的美元等值]"
  - id: A14
    name: 高级财务领域工程师年薪
    value: "110000"
    unit: USD/year
    source: "[启发式：新加坡 NetSuite/Xero 集成专家；折合 SGD 140K–160K 的美元等值；按 BP team.startTiming 于第 3 月入职]"
  - id: A15
    name: 客户成功/实施负责人年薪
    value: "90000"
    unit: USD/year
    source: "[启发式：新加坡 SaaS 客户成功负责人；折合 SGD 115K–130K 的美元等值；按 BP team.startTiming 于第 6 月入职]"
  - id: A16
    name: 第 2 年新增员工平均年薪
    value: "118000"
    unit: USD/year
    source: "[启发式：集成工程师 $120K、销售/BD $100K、客户成功 $90K；第 2 年第 2–4 季度新增岗位综合加权 $118K]"
  - id: A17
    name: 第 1 年非薪酬固定开销
    value: "6000"
    unit: USD/month
    source: "[启发式：SaaS 开发工具 $1.5K + 市场/合作伙伴活动 $2K + 法务/会计 $2K + 其他 $0.5K；2–4 人 B2B SaaS 早期团队基线]"
  - id: A18
    name: 第 2 年非薪酬固定开销年化水平
    value: "18000-35000"
    unit: USD/quarter
    source: "[启发式：SOC2 Type I 审计准备一次性费用 $15K–$20K（第 2 年第 3/4 季度）；A 轮法务 $10K–$20K；合作伙伴活动和会议逐季增长 $6K–$10K；BP 运营：SOC2 Type I 于第 6 月启动]"
  - id: A19
    name: 第 3 年非薪酬固定开销
    value: "75000"
    unit: USD/quarter
    source: "[启发式：12 人规模增长后 SaaS；会议/活动 $15K + 工具/基础设施 $15K + 法务/合规 $20K + 管理综合 $25K（每季度）]"
  - id: A20
    name: A 轮不计入现金滚动预测
    value: "true"
    unit: boolean
    source: "[BP 里程碑：A 轮目标在 MRR $100K 的第 22 月；模型仅展示有机种子轨迹；现金始终不低于 $265 万，证明种子资金充足；A 轮将加速本预测之外的增长]"

