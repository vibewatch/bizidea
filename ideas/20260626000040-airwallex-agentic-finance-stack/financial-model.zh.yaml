scenarios:
  downside:
    description: "5 名试点中仅 2 人在第 7 月前转化，渠道激活延迟 3–4 个月，第 3 年末退出时 32 家商户 ARPU $5K"
    y3RevenueK: 1620.0
    y3EbitdaK: -180.0
    cashLowPointK: 2300.0
    keyAssumptionChanges:
      - "试点转付费转化率降至 40%（第 7 月前 5 人中 2 人，基准为 3 人）"
      - "渠道激活延迟 3–4 个月，第 2 年盈亏平衡推迟至第 2 年第 4 季度"
      - "第 3 年客户数 32 对比基准 55；ARPU $5K 不变"
  base:
    description: "5 名试点中 3 人在第 7 月前转化，第 18 月 20 家商户实现 MRR $100K，第 3 年末 55 家商户 ARPU $5.5K，ARR 年化 $3.6M"
    y3RevenueK: 2938.0
    y3EbitdaK: 667.6
    cashLowPointK: 2655.6
    keyAssumptionChanges:
      - "所有假设按模型保持不变"
  upside:
    description: "5 名试点中 4 人在第 7 月前转化，第 2 年第 2 季度主体扩展至平均 3 个后 ARPU 升至 $7.5K，第 3 年末 70 家商户"
    y3RevenueK: 3600.0
    y3EbitdaK: 900.0
    cashLowPointK: 2655.6
    keyAssumptionChanges:
      - "试点转付费转化率升至 80%（第 7 月前 5 人中 4 人）"
      - "第 2 年第 2 季度 ARPU 增至 $7.5K/月（3 个主体每个 $2.5K）"
      - "第 3 年客户数 70 对比基准 55"

sensitivity:
  - variable: ARPU
    downsideCase: "第 3 年 $4.5K/月（商户停留在 1–2 个主体，不扩展至第 3 个）"
    baseCase: "第 3 年 $5.5K/月（按 BP sequencingRationale 落地扩展平均 2–3 个主体）"
    upsideCase: "第 3 年 $6.5K/月（平均 3 个主体加上按 BP businessModel 的超量使用费）"
    y3RevenueImpactK: -550.0
    cashImpactK: -413.0
  - variable: 流失率
    downsideCase: "月流失率 3%（财务主管抵触多年承诺，更多电子表格替代）"
    baseCase: "月流失率 2%（会计工作流粘性强，切换成本高）"
    upsideCase: "月流失率 1%（SOC2 认证和异常记忆深度锁定财务主管）"
    y3RevenueImpactK: -440.0
    cashImpactK: -330.0
  - variable: 销售周期
    downsideCase: "销售周期 +2 个月（财务主管需要更多月结周期才能签字）"
    baseCase: "按 BP buyingProcess 4–8 周试点；第 7 月前 3 人付费"
    upsideCase: "销售周期 -1 个月（Airwallex T:0 推出紧迫性加速财务主管决策）"
    y3RevenueImpactK: -350.0
    cashImpactK: -350.0
  - variable: 毛利率
    downsideCase: "毛利率 70%（每主体集成维护和高触达入驻成本高于预期）"
    baseCase: "毛利率 75%，按 BP operatingAssumptions"
    upsideCase: "毛利率 80%（30 家商户后基础设施规模效益；边际成本趋近于零）"
    y3RevenueImpactK: 0.0
    cashImpactK: -147.0
  - variable: 招聘节奏
    downsideCase: "第 2 年第 2 季度额外招聘 2 人以应对渠道放缓（需提前组建直销团队）"
    baseCase: "渠道主导增长使第 1 年团队维持 4 人至第 2 年第 1 季度；第 2 年扩至 8 人"
    upsideCase: "渠道自助降低客户成功需求；第 3 年团队维持在 10 人"
    y3RevenueImpactK: 0.0
    cashImpactK: -240.0
  - variable: CAC
    downsideCase: "若第 1–2 年直接外向销售取代合作伙伴渠道，CAC $30K（创始人销售时间翻倍）"
    baseCase: "按 BP gtm.channels 通过合作伙伴引荐，CAC $15K"
    upsideCase: "若 Airwallex 生态系统合作伙伴规模化带来入站温线索，CAC $8K"
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0

modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads["Partner and Outbound Leads"] --> Pilots["Design-Partner Pilots M3-M5"]
      Pilots -->|60pct pilot-to-paid| Merchants["Paying Merchants"]
      Merchants -->|ARPU 2.5K entry| MRR["Monthly Recurring Revenue"]
      Merchants -->|land and expand| EntityExpansion["Entity Expansion 1 to 3"]
      EntityExpansion -->|ARPU grows to 5.5K| MRR
      MRR -->|75pct gross margin| GrossProfit["Gross Profit"]
      GrossProfit -->|minus opex| EBITDA["EBITDA"]
      EBITDA --> Cash["Cash Position"]
      ExceptionMemory["Exception Memory Graph"] -.->|reduces churn to 2pct| Merchants

modelSanity:
  - checkName: 收入引擎
    finding: "按主体 SaaS 从每主体 $2,500 起通过落地扩展增长至 $5,500/月，产生全部收入，以 fundingAsk 和基准情景中第 9 月 MRR $25K、第 18 月 MRR $100K 及第 36 月 ARR 年化 $3.6M 为锚点。"
  - checkName: 必须走对的事
    finding: "5 名共创客户中至少 3 人必须在第 7 月前以每月 $5K 转为付费，才能验证付费意愿并在第 2 年渠道运营扩至 8 人之前开始构建异常记忆图。"
  - checkName: 模型破局条件
    finding: "若 Airwallex 在 12 个月内推出原生多 ERP 凭证与证据包功能，30 家商户完成审核周期之前切口就会消失——与试点转化敏感性行显示第 3 年营收 -$50 万、悲观情景现金低点 $230 万一致。"
  - checkName: 下轮融资验证
    finding: "第 18 月 20 家生产商户 MRR $100K 且异常自动建议接受率 60%，支撑按 fundingAsk.milestone 启动 A 轮，并验证支撑三个情景的 CAC $15K 和毛利率 75% 假设。"

sanityChecks:
