  memoSourcesUsed: 40
  reputablePublisherCount: 26
  searchedQueries:
    - 查找关于 Airwallex 2026 年 6 月 H 轮融资、T:0 自主财务产品、Airi 智能代理商务产品、客户数量、处理量及全球牌照的主要权威近期来源，优先 Airwallex 主页、Reuters、TechCrunch 及知名金融科技行业媒体。
    - 查找关于跨境电商商户使用 PSP、Shopify、NetSuite 或 Xero 时在对账、多主体月结、FX 结算、退款和会计痛点方面的主要权威来源，优先官方文档、会计师事务所和财务运营来源。
    - 查找与跨境商户钱包对账和支付对账相关的竞争对手——Adyen、BlackLine、FloQast、Numeric 和 Airwallex——的官方产品、文档、定价及独立分析来源。
    - 查找与总部位于新加坡或香港、向澳大利亚、英国和欧盟销售的数字商户相关的官方监管和税务来源，特别是 VAT/GST、记录保存、跨境数字服务、电商进口及 FX 会计。
    - 查找关于 Shopify Plus 商户数量、跨境电商增长、跨境支付增长及与多主体电商财务运营相关的市场规模的知名当前来源。
    - 查找客户验证证据，如案例研究、社区讨论、实施指南、合作伙伴页面、类 RFP 材料或招聘帖，显示支付对账、退款、多货币会计和电商财务运营的真实痛点。
    - 查找与多主体电商财务运营相关的官方 Shopify 文档页面：Markets、多货币、关税和进口税、退款、支付、税务报告和业务主体，仅返回 Shopify 文档直链。
    - 查找与银行对账、多货币会计、财务报告、电商集成和多主体月结相关的官方 Xero 和 NetSuite 文档或产品页面，仅返回 Xero 或 NetSuite 直链。
    - 查找与结算报告、退款、支付中的 FX、打款、关联账户、支付 webhook 及 Shopify 集成相关的官方 Airwallex 文档页面，仅返回 Airwallex 直链。
    - 查找与对账、月结自动化、结算报告、账户对账及定价相关的官方 Adyen、BlackLine、FloQast 和 Numeric 产品或文档页面，仅返回厂商直链。
    - 查找包含 2025 年 GMV、营收和国际指标的 Shopify 官方 2025 年年报或投资者关系页面，仅返回 Shopify 或 SEC 直链。
    - 查找含跨境电商市场增长或国际商务趋势、与跨境数字商户相关的官方 Global-e 或 Worldpay 报告页面，仅返回公司或投资者直链。
    - 查找按地区统计 Shopify Plus 商户数量的官方或知名页面直链，特别是 Store Leads 或 BuiltWith 类型的当前数据，仅返回直链。
    - 查找关于支付对账痛点、多货币退款或电商财务运营负担的知名案例研究或调研直链，仅返回直链。
    - 查找可公开抓取的 Shopify.com 或 shopify.dev 页面，讨论 Shopify Markets、多货币销售、关税、税务、退款或国际扩张，避免无法访问的 help.shopify.com 页面。
    - 查找 Xero.com 上关于多货币会计、销售税、财务报告或电商技巧的可公开访问页面（无需登录）。
    - 查找英国政府或欧盟官方关于 VAT 记录保存、境外卖家、OSS/IOSS 及数字服务 VAT 的可公开访问页面（无需登录）。
