competitors:
  - name: Airwallex
    stage: scale-up
    wedge: 基于自有跨境轨道的全球账户、支付、FX、资金管理、嵌入式金融和 AI 智能代理。
    pricing: 按使用量计费的支付和 FX；企业版定制报价。
    strength: 直接掌控钱包、结算、本地货币结账及面向商户的集成。
    weaknessVsUs: 其动力是深化 Airwallex 平台，而非在 Shopify、ERP 和税务工作流之间充当中立证明层。
    sourceRefs:
      - 1
      - 2
      - 3
      - 10
  - name: Adyen
    stage: incumbent
    wedge: 面向全球商户的统一支付处理、收单、打款和对账。
    pricing: Interchange++ / 企业版定制。
    strength: 深厚的企业收单版图，配备集中报告和对账能力。
    weaknessVsUs: 以 Adyen 自身为记录系统时最强；对于需要跨外部工具获取主体特定税务证据的 Airwallex 主导商户而言，适配性较弱。
    sourceRefs:
      - 28
      - 29
      - 30
  - name: BlackLine
    stage: incumbent
    wedge: 面向 CFO 办公室的记录到报告、财务月结、公司间和智能代理财务管控层。
    pricing: 定制 / 企业报价。
    strength: 强大的财务主管信任度、审计态势和企业月结深度。
    weaknessVsUs: 从交易落账后的财务系统出发，而非从事件层面的钱包和商务意图出发。
    sourceRefs:
      - 31
      - 32
      - 33
      - 34
  - name: FloQast
    stage: scale-up
    wedge: 面向会计师友好工作流的月结管理和自动化对账。
    pricing: 定制 / 中端企业报价。
    strength: 部署快速，财务主管对反复月结工作的易用性强。
    weaknessVsUs: 通用月结自动化，而非植根于结账和结算数据的跨境 PSP、主体和税务证据。
    sourceRefs:
      - 35
      - 36
      - 37
  - name: Numeric
    stage: scale-up
    wedge: 面向云端财务团队的现代 AI 原生对账和月结技术栈。
    pricing: 定制 / 销售主导。
    strength: 现代数据仓库和 ERP 集成模型，对账聚焦突出。
    weaknessVsUs: 更靠近总账和工作底稿对账，而非多市场商务的 PSP 到钱包到主体证明。
    sourceRefs:
      - 38
      - 39
      - 40
regulatoryTechnicalConstraints:
  - point: 英国境外卖家 VAT 加欧盟 OSS 和 IOSS 规则要求交易级证据，而非月末估算。
    sourceRefs:
      - 18
      - 19
      - 20
      - 21
  - point: Shopify Business Entities 可按法律主体拆分活动，但该拆分不会自动出现在会计输出或打款中。
    sourceRefs:
      - 22
  - point: 退款、FX、费用舍入和结算时序可以合理地改变结账到收款之间的金额，因此匹配逻辑必须同时保留原始值和已结算值。
    sourceRefs:
