      - 2
  - point: Store Leads 统计 49,673 家独立 Shopify Plus 商户，显示有意义的美容和服装集中度，验证了商务原生装机基础。
    sourceRefs:
      - 12
  - point: Ripple 调研 350 余位 CFO、财务管理人员和支付运营人员，发现对账复杂性跻身五大痛点。
    sourceRefs:
      - 24
