scenarios:
  downside:
    description: "Only 2 of 5 pilots convert by M7, channel activation delayed 3-4 months, Y3 exits at 32 merchants at $5K ARPU"
    y3RevenueK: 1620.0
    y3EbitdaK: -180.0
    cashLowPointK: 2300.0
    keyAssumptionChanges:
      - "Pilot-to-paid conversion drops to 40% (2 of 5 by M7 vs 3 in base)"
      - "Channel activation delayed 3-4 months, pushing Y2 breakeven to Q4Y2"
      - "Y3 customer count 32 vs 55 base; ARPU $5K unchanged"
  base:
    description: "3 of 5 pilots convert by M7, $100K MRR hit at M18 with 20 merchants, Y3 exits at 55 merchants at $5.5K ARPU, $3.6M ARR run rate"
    y3RevenueK: 2938.0
    y3EbitdaK: 667.6
    cashLowPointK: 2655.6
    keyAssumptionChanges:
      - "All assumptions held as modeled"
  upside:
    description: "4 of 5 pilots convert by M7, entity expansion to 3 avg by Q2Y2 lifts ARPU to $7.5K, Y3 exits at 70 merchants"
    y3RevenueK: 3600.0
    y3EbitdaK: 900.0
    cashLowPointK: 2655.6
    keyAssumptionChanges:
      - "Pilot-to-paid conversion rises to 80% (4 of 5 by M7)"
      - "ARPU grows to $7.5K/month by Q2Y2 (3 entities at $2.5K each)"
      - "Y3 customer count 70 vs 55 base"

sensitivity:
  - variable: ARPU
    downsideCase: "$4.5K/month in Y3 (merchants stay on 1-2 entities, no 3rd entity expansion)"
    baseCase: "$5.5K/month in Y3 (2-3 entities avg via land-and-expand per BP sequencingRationale)"
    upsideCase: "$6.5K/month in Y3 (3 entities avg plus usage overage fees per BP businessModel)"
    y3RevenueImpactK: -550.0
    cashImpactK: -413.0
  - variable: churn
    downsideCase: "3% monthly (controllers resist multi-year commit, more spreadsheet substitution)"
    baseCase: "2% monthly (sticky accounting workflow, high switching cost)"
    upsideCase: "1% monthly (SOC2 certification and exception-memory depth lock in controllers)"
    y3RevenueImpactK: -440.0
    cashImpactK: -330.0
  - variable: sales cycle
    downsideCase: "Sales cycle +2 months (controllers require additional close cycles before sign-off)"
    baseCase: "4-8 week pilot per BP buyingProcess; 3 paid by M7"
    upsideCase: "Sales cycle -1 month (Airwallex T:0 rollout urgency accelerates controller decisions)"
    y3RevenueImpactK: -350.0
    cashImpactK: -350.0
  - variable: gross margin
    downsideCase: "70% GM (higher-than-expected integration maintenance and white-glove onboarding cost per entity)"
    baseCase: "75% GM per BP operatingAssumptions"
    upsideCase: "80% GM (infrastructure economies of scale after 30 merchants; marginal cost near zero)"
    y3RevenueImpactK: 0.0
    cashImpactK: -147.0
  - variable: hiring pace
    downsideCase: "+2 FTE hired in Q2Y2 to respond to slower channel (direct sales team needed earlier)"
    baseCase: "Channel-led growth keeps Y1 team at 4 FTE through Q1Y2; Y2 grows to 8 FTE"
    upsideCase: "Channel self-serve reduces CS headcount need; Y3 headcount stays at 10 FTE"
    y3RevenueImpactK: 0.0
    cashImpactK: -240.0
  - variable: CAC
    downsideCase: "$30K CAC if direct outbound replaces partner channel in Y1-Y2 (founder sales time doubles)"
    baseCase: "$15K CAC via partner-led introductions per BP gtm.channels"
    upsideCase: "$8K CAC if Airwallex ecosystem partners drive inbound warm leads at scale"
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0

modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads["Partner and Outbound Leads"] --> Pilots["Design-Partner Pilots M3-M5"]
      Pilots -->|60pct pilot-to-paid| Merchants["Paying Merchants"]
      Merchants -->|ARPU 2.5K entry| MRR["Monthly Recurring Revenue"]
      Merchants -->|land and expand| EntityExpansion["Entity Expansion 1 to 3"]
      EntityExpansion -->|ARPU grows to 5.5K| MRR
      MRR -->|75pct gross margin| GrossProfit["Gross Profit"]
      GrossProfit -->|minus opex| EBITDA["EBITDA"]
      EBITDA --> Cash["Cash Position"]
      ExceptionMemory["Exception Memory Graph"] -.->|reduces churn to 2pct| Merchants

modelSanity:
  - checkName: Revenue engine
    finding: "Per-entity SaaS at $2,500/entity growing to $5,500/month via land-and-expand produces all revenue, anchored by the $25K MRR M9 and $100K MRR M18 milestones in fundingAsk and the base scenario $3.6M ARR run rate at M36."
  - checkName: Must go right
    finding: "Three of five design-partner pilots must convert to paid at $5K/month by M7 to validate willingness-to-pay and begin building the exception-memory graph before Y2 channel opex scales to 8 FTE."
  - checkName: Model breaks if
    finding: "Airwallex ships native multi-ERP journal-and-evidence-pack features within 12 months, eliminating the wedge before 30 merchants have reviewed cycles, consistent with the pilot-conversion sensitivity row showing -$500K Y3 revenue and the downside scenario cashLowPointK of $2,300K."
  - checkName: Next-round proof
    finding: "$100K MRR from 20 production merchants at M18 with 60% exception auto-suggestion acceptance justifies the Series A per fundingAsk.milestone and confirms the $15K CAC and 75% gross margin assumptions that underpin all three scenarios."

sanityChecks:
  ruleOf40: "Y3 revenue growth 151% (Y3 $2,938K / Y2 $1,169K) + Y3 EBITDA margin 22.7% ($667.6K / $2,938K) = 173.7% (well above Rule-of-40 threshold)"
  burnMultiple: "Y1 burn multiple 0.7x ($330.9K net cash burned / $480K ARR added; 8 merchants x $5K/month x 12); Y2 burn multiple 0 (net cash-positive); seed is highly efficient"
  revenuePerFte: "Y3 $294K per FTE avg (10 avg FTE growing 8 to 12; SaaS benchmark $200-400K; within range)"
  flags:
    - "Beachhead addressable pool (SG/HK Shopify Plus merchants running Airwallex with NetSuite/Xero across 3+ entities) is unvalidated; if the 200-merchant design-partner pool assumption is wrong the $100K MRR M18 milestone slips"
    - "M7 revenue triples month-over-month ($5K to $15K) because the model assumes existing M5/M6 customers simultaneously expand from 1 to 2 entities after their first close cycle; real expansion may lag 1-2 months, delaying the $25K MRR milestone from M9 to M11"
    - "Y2 breakeven in Q2Y2 assumes partner channel delivers 2-4 qualified leads per month without a dedicated sales FTE; if direct outbound is needed, opex rises ~$100K/year and breakeven shifts to Q3/Q4 Y2 per hiring-pace sensitivity"
    - "Airwallex API bundling risk is rated High/High in BP risk register; a native close-control feature within 12 months collapses the wedge to the downside scenario ($1.62M Y3 revenue, -$180K EBITDA, $2.3M cash low)"
