    name: Seed capital raised at model start
    value: "3000"
    unit: K USD
    source: "[BP fundingAsk: target $2-4M seed round; model uses $3M midpoint]"
  - id: A2
    name: Entry ARPU per merchant (1 entity, M5-M6)
    value: "2500"
    unit: USD/month
    source: "[BP pricing $2,000-$5,000 per entity per month; entry price at single-entity pilot]"
  - id: A3
    name: Mature ARPU per merchant (2 entities, M7 onward)
    value: "5000"
    unit: USD/month
    source: "[BP milestones $25K MRR at 5 merchants by M9 implies 5x$5K; existing M5/M6 customers expand from 1 to 2 entities after first close cycle]"
  - id: A4
    name: Average ARPU Year 2
    value: "5200"
    unit: USD/month
    source: "[BP $100K MRR at 20 merchants M18 = $5K avg; slight uplift to $5.2K as early cohort expands to 3 entities; land-and-expand model per BP]"
  - id: A5
    name: Average ARPU Year 3
    value: "5500"
    unit: USD/month
    source: "[BP SOM 60 logos x $30K/year entry; $3M ARR target at M36 with 55 merchants implies $5.5K/month; entity expansion from 2 to 2-3 per BP sequencingRationale]"
  - id: A6
    name: Target gross margin
    value: "75"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct = 75; operatingAssumptions: exception taxonomy and integration layer built once, marginal support cost per entity declining after first 10 deployments]"
  - id: A7
    name: COGS base infrastructure per month
    value: "3000"
    unit: USD/month
    source: "[heuristic: cloud compute $1.5K + Airwallex/Shopify API costs $1K + ops tooling $0.5K for early-stage SaaS with 3 integrations; consistent with 75% GM target at scale]"
  - id: A8
    name: COGS variable per paying customer
    value: "500"
    unit: USD/customer/month
    source: "[heuristic: ~10% of entry ARPU $2.5K covering support labor, integration maintenance, API call overhead per entity; consistent with 75% GM target]"
  - id: A9
    name: Monthly churn rate
    value: "2.0"
    unit: percent/month
    source: "[heuristic: B2B SaaS accounting workflow tools 1.5-2.5% monthly; controller workflow switching cost is high; implies 50-month average lifetime]"
  - id: A10
    name: CAC blended partner-led model
    value: "15000"
    unit: USD
    source: "[heuristic: CEO 50% time x $130K salary / 12 months x 2 months per customer = $10.8K + partner incentive $2K-$4K; design-partner intro then channel referral per BP gtm]"
  - id: A11
    name: Pilot-to-paid conversion rate
    value: "60"
    unit: percent
    source: "[BP funnelTargets: pilot to production 50%-plus; model uses 60% (3 of 5 design partners convert by M7) per BP milestones]"
  - id: A12
    name: Founding CEO annual salary
    value: "130000"
    unit: USD/year
    source: "[heuristic: seed-stage CEO in Singapore; USD equivalent of SG market range SGD 170K-200K; conservative seed allocation per BP 25% of funds to founder salaries]"
  - id: A13
    name: Founding CTO annual salary
    value: "120000"
    unit: USD/year
    source: "[heuristic: seed-stage CTO with fintech integrations background in SG/HK; USD equivalent of SGD 155K-180K market range]"
  - id: A14
    name: Senior Finance Domain Engineer annual salary
    value: "110000"
    unit: USD/year
    source: "[heuristic: NetSuite/Xero integration specialist in SG; USD equivalent of SGD 140K-160K; hired at M3 per BP team.startTiming]"
  - id: A15
    name: CS/Implementation Lead annual salary
    value: "90000"
    unit: USD/year
    source: "[heuristic: SaaS CS lead in SG; USD equivalent of SGD 115K-130K; hired at M6 per BP team.startTiming]"
  - id: A16
    name: Y2 additional hire average salary
    value: "118000"
    unit: USD/year
    source: "[heuristic: integration engineers $120K, Sales/BD $100K, CS $90K; blended $118K for Q2-Q4 Y2 additions]"
  - id: A17
    name: Non-salary overhead Year 1
    value: "6000"
    unit: USD/month
    source: "[heuristic: SaaS dev tools $1.5K + marketing/partner events $2K + legal/accounting $2K + misc $0.5K; early-stage B2B SaaS baseline for 2-4 FTE team]"
  - id: A18
    name: Non-salary overhead Year 2 run-rate
    value: "18000-35000"
    unit: USD/quarter
    source: "[heuristic: SOC2 Type I audit prep $15K-$20K one-time Q3/Q4Y2; Series A legal $10K-$20K; partner events and conferences growing $6K-$10K/quarter; BP operations: SOC2 Type I initiated at M6]"
  - id: A19
    name: Non-salary overhead Year 3
    value: "75000"
    unit: USD/quarter
    source: "[heuristic: post-growth 12-FTE SaaS; conferences/events $15K + tools/infrastructure $15K + legal/compliance $20K + G&A misc $25K per quarter]"
  - id: A20
    name: Series A not injected into cash roll-forward
    value: "true"
    unit: boolean
    source: "[BP milestones: Series A targeted at M22 on $100K MRR; model shows organic seed trajectory only; cash never drops below $2.65M confirming seed sufficiency; Series A accelerates growth beyond these projections]"

