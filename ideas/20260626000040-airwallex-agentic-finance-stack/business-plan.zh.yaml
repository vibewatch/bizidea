slug: agent-wallet-closebook
date: '2026-06-26'
executiveSummary: >-
  Agent Wallet Closebook 瞄准总部位于新加坡或香港的 Shopify Plus 商户财务主管——这些商户正准备采用
  Airwallex 的 AI 原生 T:0 自主财务和 Airi 智能代理商务产品，而其对账体系尚无法处理智能代理发起的
  跨多个法律主体的订单、退款和 FX 结算。公司构建一个只读影子账本，实时摄取每笔 Airwallex 钱包
  事件，将其与订单和退款意图挂钩，在内容发布至 NetSuite 或 Xero 之前为人工审核生成主体就绪的凭证
  包和 VAT/GST 证据包。Airwallex 以 110 亿美元估值完成 3.2 亿美元 H 轮融资——叠加 T:0 和 Airi
  发布——证实自主财务工具正从概念走向落地，而智能代理速度的商务与财务主管速度的月结之间的缺口
  正是公司的创业洞见。滩头市场是约 6,660 万美元 SAM（在约 7.153 亿美元 TAM 中），从 49,673 家
  Shopify Plus 商户筛选跨境、多主体及兼容财务技术栈复杂度得出。财务运营人员在调研中持续将对账复杂性
  列为最大运营痛点，成熟月结套件已在同一财务主管群体中验证了预算意愿。可防御资产是一个异常记忆
  图——涵盖 FX 漂移规律、主体路由决策、退款冲正和税务证据缺口——每轮经审核的月结周期都让它更
  难复制。公司不替换 Airwallex、Shopify、NetSuite 或 BlackLine，而是成为支付轨道商和财务主管套件
  都缺乏动力去构建的中立跨系统证明层。种子资金用于交付 MVP、完成五次共创客户试点，以及建立
  Airwallex 生态系统渠道关系，在 A 轮论点成形前验证可达客户转化。

problem:
  - 跨境 Shopify Plus 商户的财务主管面临一个不断扩大的对账缺口——AI 辅助结账（Airi）和自主财务
    （T:0）正跨主体、FX、VAT/GST 和退款政策边界加速创建交易，速度超出财务团队的审核能力。
  - PSP 导出、ERP CSV 上传和税务电子表格是为人工节奏的结账漏斗设计的，不适用于智能代理商务在多个
    法律主体中同时产生的钱包事件量。
  - 每笔 Airwallex 钱包事件都可能带有主体路由错误、FX 汇率漂移、结算时序差异或退款冲正——任何一
    项都会把月结变成手工救火，产生未解决的未匹配项。
  - 英国和欧盟境外卖家 VAT 规则、OSS、IOSS 及本地进口关税方案要求交易级证据，而当前 PSP 到 ERP
    的工作流并不会结构性地保留这些证据。
  - 随着主体数量增加，手工对账无法扩展；Ripple 调研 350 余位 CFO 和财务管理人员发现对账复杂性
    跻身五大运营痛点，案例研究至今仍描述跨部门和跨 PSP 100% 手工的工作量。

solution:
  - 一个只读影子账本——实时摄取 Airwallex 结算报告、付款活动导出、退款、FX 费用和 webhook，通过
    Shopify 集成将每笔事件映射至创建它的订单意图和主体上下文。
  - 一个异常工作台——在月结前标记 FX 结算漂移、缺失的主体路由、VAT/GST 证据缺口和退款冲正，并推荐
    财务应该过账的精确凭证分录——同时保留原始金额、已付金额和已结算金额，并附明确的差额说明。
  - 主体就绪的凭证包和税务证据包——经人工审批后直接导出至 NetSuite 或 Xero，提供附有可解释规则追踪
    的可导出审计线索。
  - 一个学习型异常记忆层——将按主体、市场和异常类型反复出现的规律转化为策略规则，随着关系图积累经
    审核的边缘案例，逐步减少每轮月结周期的分析师返工。

whyWeWin:
  - 从总账之前的钱包事件起点出发，保留每笔智能代理发起交易背后的商务意图——这是 BlackLine、
    FloQast 和 Numeric 事后从工作底稿或银行对账单输入中无法完成的重建工作。
  - Airwallex 原生集成直接读取结算、FX、退款和 webhook 接口，而非依赖银行对账单导入，相对于从
    现金到账出发的通用连接器具备结构性的准确度优势。
  - 跨 NetSuite 和 Xero 的多 ERP 中立性——叠加跨系统证据打包——构建了一个可防御的位置；Airwallex
    本身以平台深度为目标，没有动力成为跨外部 ERP 的中立经纪人，因此在结构上不太可能复制这一点。
  - 跨 Airwallex 事件、商户主体和本地结账规则的异常记忆图随每个经审核的边缘案例而增厚，形成单栈
    厂商无法从中立立场构建的跨国基准数据集。
  - 只读影子模式加强制人工审批，消除了采用的核心障碍（财务主管对 AI 生成凭证的信任问题），与 CFO
    表示在授权自动过账之前评估自主财务工作流的方式一致。

strategicChoices:
  beachhead: >-
    总部位于新加坡或香港的 Shopify Plus 美容、健康和保健品商户，拥有 3–12 个销售主体，以
    Airwallex 收款和打款、以 NetSuite 或 Xero 月结，向澳大利亚、英国和欧盟销售。
  wedgeRationale: >-
    这个细分的异常密度最高（多主体 FX 加英国/欧盟 VAT 加退款冲正）、现有技术栈最兼容（Airwallex
    加 Shopify 加 NetSuite/Xero）、渠道最可触达（Airwallex 实施商加 Xero 电商会计师）。更宽的
    滩头——任何跨境商户或任何 PSP——会分散验证点并推迟第一个可参考的结账审计。美容和健康品类在
    Shopify Plus 装机量中占比突出（据 Store Leads 占 12.2%），在中小到中市场细分中跨境退款和
    关税复杂度密度最高。
  sequencingRationale: >-
    影子账本和异常工作台优先交付，因为它们不需要商户改变任何工作流，能即时产生月结时长缩短的证据，
    并构建让后续自动化可信的异常记忆。GTM 以 Airwallex 生态系统实施商为先，因为他们已在 Airi 和
    T:0 推出时进驻，可将产品作为互补管控层引荐。定价按主体在首个主体验证后逐步扩展，形成自然的落地
    扩展动作，无需重新谈判买家关系。招聘优先安排一名集成工程师和一名财务领域专家，早于销售人员，
    因为产品必须在外向销售扩展之前通过前五次客户月结审核。
  notYet:
    - 无需人工审批的全自动应付账款和总账回写（需要在多个月结周期的审核模式验证中赢得信任）
    - 在 Airwallex 集成足够可防御、异常记忆建立之前扩展至 Adyen 或 Stripe 等非 Airwallex PSP
    - 资金预测和收入确认模块，计划在 18–24 个月时间窗口推出
    - 在 NetSuite 和 Xero 生产覆盖被证实之前，为使用内部 SAP 或 Oracle ERP 的企业商户服务
    - 在财务主管验证证据包格式覆盖至少 10 次线上商户月结周期之前，构建面向审计师的证据 API

market:
  tam: "约 $715M：49,673 家 Shopify Plus 商户 × 建模 30% 跨境多主体适配率 × 估算年均品类花费 $48K（Store Leads 装机量；建模）"
  sam: "约 $66.6M：49,673 家商户筛选美容/健身（12.2%）加建模配饰/服装（5%）× 26% 兼容财务技术栈适配率 × 估算年均初始花费 $30K（Store Leads 加建模）"
  som: "约 $1.8M：第 3 年可触达 60 个客户 × 估算年均花费 $30K，通过 Airwallex/Xero 邻域渠道和审计触发外向销售（基于渠道容量建模）"
  segments:
    - 总部位于新加坡或香港、在美容、健康和保健品领域拥有 3–12 个销售主体、使用 Airwallex 和
      NetSuite/Xero 的 Shopify Plus 商户
    - 采用 AI 辅助结账和 Airwallex 多主体打款至更多亚太到欧美走廊的跨境 Shopify Plus 服装配饰商户
  buyingProcess: >-
    CFO 或财务主管批准预算；财务系统负责人或财务主管在一个主体上进行 4–8 周试点、评估影子账本价值
    后再扩展至更多主体。购买触发条件为新市场主体上线、季末月结暴露未解决异常，或采用 Airi 或 T:0
    钱包流程。

product:
  mvp: >-
    只读影子账本——摄取 Airwallex 结算报告、付款活动导出、退款、FX 费用和 webhook；通过 Shopify
    集成将每笔事件映射至订单和主体上下文；呈现标记 FX 漂移、主体路由缺口和退款冲正的优先级异常
    工作台；并为每个主体导出一个供 NetSuite 或 Xero 人工审核的结账就绪凭证包。
  sixMonth: >-
    异常工作台 v2，附自动建议凭证分录和英国 VAT、澳大利亚 GST、欧盟 OSS 税务证据包；3–5 种主体
    配置的主体映射模板；通过共创客户反馈循环生成跨 FX、主体路由和退款类别的首个异常分类体系库。
  twelveMonth: >-
    将反复出现的异常模式转化为自动标记决策的策略规则引擎；显示月结天数、未匹配项数量和证据包
    完成率的多主体仪表盘；NetSuite 和 Xero 双向导出，附完整审计线索和 SOC 2 Type I 覆盖。
  twentyFourMonth: >-
    退款政策管控和主体路由规则引擎；资金现金流可见性层；面向审计师和保险公司的跨境合规审查
    证据 API；扩展至非美容商户细分和第二个 PSP 集成（Adyen 或 Stripe）。
  keyBets:
    - Airwallex webhook 和结算报告 API 稳定且足够丰富，无需专有数据协议即可重建订单到钱包事件链
    - 财务主管会在全自动过账功能存在之前为审核模式异常包付费，使影子账本切口成为可融资且可部署的
      首款产品
    - 基于 20–30 家线上商户训练的异常记忆产生的自动建议，被财务主管接受的比率足以实质性减少月结
      周期的分析师工时
    - Airwallex 实施商渠道能在 T:0 和 Airi 推出期间引荐产品，创始团队的增量销售投入极少

gtm:
  wedge: >-
    借助 Airwallex T:0 和 Airi 采用推出，以中立结账证明层的身份进入——财务团队在信任智能代理发起
    的凭证分录之前需要它，由已在平台部署中进驻的 Airwallex 实施合作伙伴和 Xero 电商会计师引荐。
  channels:
    - 在 T:0 和 Airi 部署期间引荐的 Airwallex 生态系统实施合作伙伴
    - 服务跨境 Shopify Plus 商户的 Xero 电商会计专家和 A2X 邻域记账公司
    - 创始人主导，直接向新加坡/香港 Shopify Plus 品牌的财务主管和财务系统负责人进行外向拓展，
      触发条件为新主体上线或审计周期异常
    - 已为多市场品牌理清主体拆分和 PSP 到账簿映射的电商财务咨询公司
  funnelTargets: "线索 → 合格试点 25–35%（财务主管确认有效的 Airwallex 加多主体对账痛点）；试点 → 生产 50% 以上（证据包在首个主体上可量化地缩短月结时长）"
  pricing: "每主体每月 SaaS 订阅 $2,000–$5,000，超出月度订单和退款量阈值后收取按使用量计费的超量费；按主体定价与商户成本结构吻合，随主体增加自然形成落地扩展动作，并将成本与所降低的月结复杂度对齐"

businessModel:
  revenueStreams:
    - 按主体月度 SaaS 订阅（每主体每月 $2,000–$5,000）
    - 每主体月度订单和退款量超额的按使用量计费超量费
    - 入驻和首个主体实施费（一次性；非经常性收入项目）
  unitOfValue: 每家商户每月活跃对账主体数
  targetGrossMarginPct: 75
  expansionLevers:
    - 商户随新增销售地域扩展主体
    - 模块扩展至退款政策管控、资金可见性和收入确认
    - 面向审计师和保险公司的证据 API 作为独立 B2B2B 收入线
    - 第二个 PSP 集成（Adyen 或 Stripe），将可寻址商户扩展至 Airwallex 生态系统之外

strategyMap:
  northStarMetric: 线上商户每月活跃对账主体总数（月结覆盖深度和 ARR 扩展的代理指标）
  inputMetrics:
    - 每个月结周期摄取并匹配至订单上下文的 Airwallex 商户事件数
    - 财务主管的异常自动建议接受率（第 12 月目标 >60%）
    - 相对共创客户商户基线的月结天数改善
    - 试点转生产转化率（目标 50% 以上）
    - 每家现有商户每季度新增主体扩展数
  moatsToBuild:
    - 将 Airwallex 事件映射至主体路由再到凭证决策的异常记忆图，随每个经审核的月结周期累积增厚
    - 按市场的 FX 漂移、退款冲正和 VAT/关税证据缺口跨国异常库——通用月结工具无法从中立立场观测
    - 与 Airwallex 实施商和 Xero 电商会计师的合作伙伴分销关系，竞争对手若无生态系统准入则难以
      快速复制
  killCriteria:
    - Airwallex 在 12 个月内推出原生凭证和证据包功能，覆盖 Shopify Plus 商户 70% 以上的异常案例
    - 5 名共创客户试点中少于 3 人在 9 个月内转为付费生产
    - 试点商户在 2 个完整月结周期后报告无可量化的月结时长改善
    - 第 9 月生产使用后，财务主管自动建议接受率持续低于 30%
  mermaid: |
    flowchart LR
      Wedge[Airwallex T0 and Airi adoption] --> MVP[Shadow ledger and exception workbench]
      MVP --> Pilots[5 design-partner close cycles]
      Pilots --> Proof[Close-time reduction and audit-ready evidence packs]
      Proof --> Expand[Per-entity land and expand within existing merchants]
      Expand --> Moat[Exception memory graph and partner-distribution lock-in]
      Moat --> Growth[Series A and second PSP and module expansion]

investorMemo:
  verdict:
    call: "进一步调查 / 值得会面"
    conviction: >-
      切口可信，买方可识别，且存在 Airwallex 本身没有动力中立填补的结构性缺口；但滩头较窄，
      18 个月内平台捆绑风险真实存在。
    whyBelieve: >-
      Airwallex 3.2 亿美元 H 轮叠加 T:0 和 Airi 发布，制造了商户以智能代理速度采用商务的确切
      时机——而控制体系尚未跟上——只读异常工作台是财务主管无需替换决策即可评估的低摩擦首款产品。
    whyDoubt: >-
      Airwallex 已掌控本产品所依赖的结算、FX、退款和 webhook 接口，T:0 上的原生结账管控功能
      可能在创业公司在足够多商户中建立持久异常记忆之前就消除切口。
    nextDiligence: >-
      确认 5–10 位同时使用 Airwallex 和 NetSuite/Xero 的新加坡/香港 Shopify Plus 财务主管有
      活跃的手工对账痛点，并愿意在种子轮关闭前承诺参与付费或信用补偿的共创客户试点。
  firstCustomer:
    title: 总部位于新加坡的 Shopify Plus 直营美容或保健品品牌财务主管
    profile: >-
      GMV 3,000 万至 1.3 亿新加坡元的 Shopify Plus 品牌，跨新加坡、澳大利亚、英国和欧盟拥有
      3–8 个法律主体，以 Airwallex 收款和打款，以 NetSuite 或 Xero 月结。
    trigger: >-
      季末审计周期暴露未解决的 FX 结算漂移和跨境退款冲正，或品牌上线 Airwallex Airi 或拓展
      至新市场主体。
    buyer: 负责月结质量、审计准备和财务运营人力预算的 CFO 或财务主管
    initialContract: >-
      每月 $6,000–$15,000（3–5 个主体每主体 $2,000–$3,000），从单主体 60 天付费试点开始；
      在可量化的月结时长改善和异常包接受度验证后，转为多主体年度订阅。
  mustBeTrue:
    - 至少 200 家总部位于新加坡或香港的 Shopify Plus 商户同时在 3 个以上法律主体上运营 Airwallex
      加 Xero 或 NetSuite，形成足以在第 3 年达到 60 个生产客户的共创客户池。
    - 这些商户的财务主管因多主体 FX、退款冲正和 VAT/GST 证据缺口而遭遇反复出现的对账异常，且
      现有工具无法在月结前解决。
    - Airwallex 实施商和 Xero 电商会计师渠道能在第 1 年无专职销售人员的情况下引入合格财务主管。
    - 财务主管会在自动过账功能存在之前，基于只读异常工作台批准每月 $6,000–$15,000 的试点预算。
    - Airwallex 的产品重力指向平台深度，意味着它不会在创业公司需要的 18 个月窗口内构建中立的多
      ERP 证据层，从而让创业公司建立足够的异常记忆深度和合作伙伴关系。
  diligenceQuestions:
    - 有多少新加坡/香港 Shopify Plus 商户已在 3 个以上主体上同时运营 Airwallex 与 Xero 或
      NetSuite，Airwallex 实施合作伙伴能否确认 10–15 个合格客户的温线索管道？
    - Airwallex T:0 的内部原生对账和凭证包功能路线图是什么，在哪个商户层级或主体复杂度之上不再
      是明确优先项？
    - FX 结算漂移、退款冲正、主体路由和 VAT/GST 证据缺口这四类异常中，哪类对月结周期痛苦最大，
      MVP 需要解决全部四类才能将试点转为付费吗？
    - 目标商户的财务主管是否评估过 FloQast、Numeric 或 BlackLine，如果没有，原因是什么——价格
      点、品类无关性还是手工容忍度？
    - 若月结时长每月每主体减少 2–3 天，每年 $10 万 SaaS 支出的实际回收期是多少，目标财务主管
      目前如何量化每次月结周期的分析师工时成本？
    - Xero 电商会计师社区是否已向 Shopify Plus 客户推荐补充对账工具，收益分成是否足以激活
      转介行为？

operatingAssumptions:
  - assumption: >-
      Airwallex 实施商和 Xero 电商会计师渠道能在第 1 年无专职销售人员的情况下获取合格的共创
      客户引荐。
    basis: idea.yaml
    validationTest: >-
      首次合作伙伴外向拓展 60 天内确保 3 个合作伙伴引荐的新加坡/香港 Shopify Plus 财务主管热线
      索；若数量不足，直接外向销售取代渠道，第 1 年试点目标从 5 个修订为 3 个。
    decisionImpact: >-
      若渠道引荐慢于预期，GTM 转向创始人主导直接外向销售，第 1 年试点目标从 5 个降至 3 个，
      资金消耗假设需要重新评估。
  - assumption: >-
      财务主管会在自动过账功能存在之前，基于只读异常工作台批准每月 $6,000–$15,000 的付费试点
      预算。
    basis: research.yaml
    validationTest: >-
      MVP 发布 6 个月内完成 3 个付费试点；若试点仅以零成本（免费或信用返还）转化，须在进一步
      部署种子资金前重新评估定价模型。
    decisionImpact: >-
      若拟定价格下的付费意愿未能实现，单位经济模型恶化，公司在 A 轮之前可能需要更低的入场价
      或以服务为主的模型来达到验证。
  - assumption: >-
      Airwallex 不会在 18 个月内推出覆盖创业公司目标异常案例 70% 以上的原生多 ERP 凭证和证据包
      功能。
    basis: research.yaml
    validationTest: >-
      每季度追踪 Airwallex T:0 产品更新日志和合作伙伴公告；若竞争性原生功能在 6 个月内宣布，则
      在 Airwallex 实现大规模部署之前加强多 ERP 中立性和更深异常分类体系。
    decisionImpact: >-
      若 Airwallex 捆绑核心切口，创业公司必须提前加速跨 PSP 覆盖（新增 Adyen 或 Stripe）并
      提前深化异常记忆分类体系，需要更早的工程投入和修订后的招聘顺序。
  - assumption: >-
      Airwallex 结算报告、付款活动导出、退款、FX 和 webhook API 足够丰富，无需专有数据协议
      即可重建订单到钱包事件链。
    basis: research.yaml
    validationTest: >-
      首次 API 访问后 30 天内完成一家商户 3 个月历史结算数据的技术 POC 重建；若关键事件字段
      缺失或受速率限制，在推进 MVP 前与 Airwallex 协商数据合作协议。
    decisionImpact: >-
      若 API 覆盖不足，MVP 范围收窄至仅摄取导出文件，降低实时异常检测能力，相对在位企业降低
      产品可防御性。
  - assumption: >-
      75% 以上毛利率可以实现，因为异常分类体系和集成层一次构建、跨商户复用，前 10 次生产部署
      后单主体边际支持成本递减。
    basis: 运营判断
    validationTest: >-
      追踪前 10 个生产账户每主体每月的托管、集成维护和支持成本；若成本超过每主体每月 $750，
      须在 A 轮之前重新定价或调整架构。
    decisionImpact: >-
      若毛利率实质性低于 70%，单位经济模型不支持种子到 A 轮的风险投资路径，需要更高毛利率的
      产品层级或缩减范围的 MVP。

experimentRoadmap:
  - horizon: 0–30 天
    experiment: API 完整性概念验证
    hypothesis: >-
      Airwallex 结算、导出、退款、FX 和 webhook API 足够重建一家线上商户 3 个月的事件链，无需
      专有数据协议。
    successMetric: >-
      90% 以上 Airwallex 钱包事件在重建中匹配至对应 Shopify 订单；无需平台合作才能解决的关键
      缺失字段。
    owner: 创始人/CTO
  - horizon: 0–60 天
    experiment: 共创客户发现访谈
    hypothesis: >-
      10–15 位使用 Airwallex 和 NetSuite/Xero 的新加坡/香港 Shopify Plus 财务主管会将 FX、
      主体和退款对账列为前三大运营痛点。
    successMetric: >-
      15 次访谈中 8 次以上确认有活跃痛点；3 次以上表达愿意参与付费或信用补偿的共创客户试点。
    owner: 创始人/CEO
  - horizon: 30–90 天
    experiment: 单主体影子账本 MVP 试点
    hypothesis: >-
      一个呈现 FX 漂移、主体路由缺口和退款冲正的只读异常工作台，相对当前手工流程将财务主管异常
      审核时间减少 30% 以上。
    successMetric: >-
      财务主管在一个完整月结周期后确认异常审核时间减少 30% 以上；异常工作台呈现出财务主管手工
      识别问题的 80% 以上。
    owner: 创始人/CTO 和首位共创伙伴
  - horizon: 60–120 天
    experiment: 合作伙伴渠道激活
    hypothesis: >-
      2–3 家 Airwallex 实施合作伙伴和 1–2 位 Xero 电商会计师，将为推荐或收益分成安排引荐合格
      财务主管。
    successMetric: >-
      首次正式合作伙伴对话后 90 天内获得 3 个以上合格财务主管的温线索引荐。
    owner: 创始人/CEO
  - horizon: 3–6 个月
    experiment: 付费试点转化
    hypothesis: >-
      完成只读试点并看到月结时长缩短的财务主管，会在无需自动过账功能的情况下授权付费生产合同。
    successMetric: >-
      5 名试点商户中 3 名以上在首个完整月结周期后 60 天内转为付费生产合同。
    owner: 创始人/CEO
  - horizon: 6–9 个月
    experiment: 异常记忆质量测试
    hypothesis: >-
      在 5 家商户 20 次以上经审核月结周期后，异常记忆图产生的自动建议被财务主管接受的比率达
      50% 以上。
    successMetric: >-
      20 次经审核月结周期后活跃商户自动建议接受率 50% 以上；财务主管报告每个异常审核时间相对
      第 3 月基线减少 20% 以上。
    owner: 创始人/CTO
  - horizon: 9–12 个月
    experiment: 主体扩展落地扩展动作
    hypothesis: >-
      在首个主体上线的商户，若月结时长缩短和异常包质量持续有据可查，12 个月内将扩展至 2–4 个
      额外主体。
    successMetric: >-
      60% 以上生产商户在上线后 12 个月内扩展至 2 个以上主体；每家商户平均 ARR 从 $72K 向
      $120K 以上增长。
    owner: 客户成功负责人

operations:
  - Airwallex webhook 和结算报告 API 集成管道（事件摄取、归一化和主体映射，支持幂等性和重放）
  - Shopify 订单和退款数据连接器（GraphQL Admin API；Shopify Business Entities 主体拆分逻辑）
  - NetSuite 和 Xero 凭证分录导出连接器，附人工审批工作流和仅追加审计线索
  - 异常分类体系和规则引擎（FX 漂移、主体路由、VAT/GST 证据、退款冲正标记）
  - 审计级不可变事件账本，保留原始金额、已付金额和已结算金额，附明确差额说明
  - Airwallex 实施商和 Xero 电商会计师合作伙伴入驻包（收益分成条款和高触达首主体部署手册）
  - SOC 2 Type I 审计于第 6 月启动，作为企业层级商户 CFO 采购审批的前提条件

team:
  - role: 创始人/CEO（跨境电商财务或金融科技 GTM 背景）
    startTiming: Month 0
    rationale: >-
      财务主管关系可信度和渠道销售执行是第 1 年的首要瓶颈；具备领域可信度的创始人可加速共创
      客户信任建立，以及与 Airwallex 实施商和 Xero 会计师的合作伙伴引荐。
  - role: 创始人/CTO（金融科技集成、事件流与 SaaS 基础设施）
    startTiming: Month 0
    rationale: >-
      MVP 依赖可靠的 Airwallex API 集成、事件关系图构建和审计级数据持久化；这必须是创始人级
      承诺，而非承包商，因为产品信任建立在集成正确性上。
  - role: 高级财务领域工程师（NetSuite 与 Xero 集成及凭证逻辑）
    startTiming: Month 3
    rationale: >-
      凭证分录正确性和 ERP 导出保真度是产品的核心信任主张；在第五次客户月结审核之前，需要一位
      同时理解会计规则和 API 集成的专家。
  - role: 客户成功与实施负责人
    startTiming: Month 6
    rationale: >-
      第 1 年首主体高触达入驻和异常分类体系调优工作密集；在第三个生产客户之后，专职客户成功
      人员可防止实施工作占用创始人时间。

milestones:
  - horizon: 0–12 个月
    items:
      - 第 1 月前完成 API 概念验证并为一家商户重建 3 个月事件链
      - 第 3 月前与新加坡/香港 Shopify Plus 财务主管签署 5 份共创客户协议
      - 第 3 月前交付单主体影子账本 MVP 和异常工作台
      - 第 6 月前跨共创客户完成 5 次线上月结周期并记录异常分类体系
      - 第 7 月前将 5 名试点中至少 3 人转为付费生产合同
      - 第 9 月前确保 2 家活跃 Airwallex 实施商和 1 家 Xero 会计师渠道关系
      - 第 10 月前实现 MRR $25K（约 5 家生产商户各 1–2 个主体）
  - horizon: 12–24 个月
    items:
      - 第 18 月前实现 MRR $100K（约 20 家生产商户各 2–4 个主体）
      - 第 15 月前交付异常策略规则引擎和多主体月结仪表盘
      - 第 15 月前在活跃商户中验证自动建议接受率 60% 以上
      - 第 18 月前扩展至欧盟 OSS 税务证据配置和第二个主体地理模板
      - 第 20 月前启动 SOC 2 Type II 审计
      - 第 22 月在 MRR $100K 以上、20 家以上生产商户和有记录的异常记忆基准上完成 A 轮
  - horizon: 24–36 个月
    items:
      - 第 30 月前实现 MRR $250K（约 50 家商户）
      - 第 28 月前作为独立 B2B2B 收入线推出面向审计师和保险公司的证据 API
      - 第 30 月前新增第二个 PSP 集成（Adyen 或 Stripe），触达 Airwallex 生态系统之外的商户
      - 第 32 月前扩展至退款政策管控和资金现金流可见性模块
      - 第 36 月实现 ARR 年化 $3M

risks:
  - risk: >-
      Airwallex 在 T:0 上推出原生凭证和证据包功能，覆盖 Shopify Plus 商户的核心异常案例
    likelihood: High
    impact: High
    mitigation: >-
      在 Airwallex 实现大规模部署之前以跨 PSP 中立性、多 ERP 覆盖和异常记忆深度取胜；若
      Airwallex 在 6 个月内宣布竞争性功能，提前推进 Adyen 集成和更深异常分类体系。
  - risk: >-
      财务主管延长手工对账容忍度超出预期，付费转化推迟至 9 个月以上
    likelihood: Medium
    impact: High
    mitigation: >-
      先以现有钱包、FX 和退款月结痛点销售，而非依赖智能代理商务；将试点从第 1 天设为付费，
      并在未交付异常减少时提供信用返还，以早期判断真实付费意愿。
  - risk: >-
      Shopify、Airwallex 和 ERP 之间的商户数据不一致导致事件链重建脆弱，降低异常检测准确度
    likelihood: Medium
    impact: Medium
    mitigation: >-
      从受限的三系统集成面起步；构建明确的主体映射模板，在首次自动月结周期前要求人工签字确认
      主数据设置；在数据质量确认前保持异常分类体系收窄。
  - risk: >-
      对 Airwallex 的 API 依赖造成单点故障风险——若 Airwallex 调整定价、访问条款或数据可用性
    likelihood: Low
    impact: High
    mitigation: >-
      从第 6 月起将事件摄取层设计为 PSP 无关；与 Airwallex 协商优选合作伙伴数据协议，并在
      第 18 月前新增 Adyen 或 Stripe 作为第二数据来源。
  - risk: >-
      滩头内的 Shopify Plus 商户采用托管市场或自有商户记录模型，降低产品所针对的主体和税务
      复杂度
    likelihood: Low
    impact: Medium
    mitigation: >-
      每季度监测托管市场采用情况；若滩头复杂度向上迁移，提前聚焦于拥有 8–12 个主体的更大商户，
      因为托管市场对其而言不是可行的简化路径。

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 20
  useOfFundsSummary: >-
    20 个月现金跑道，用于交付影子账本 MVP、完成 5 次共创客户试点、将 3 次以上转为付费生产、
    第 10 月实现 MRR $25K，并以 MRR $100K 轨道和 A 轮就绪的异常记忆基准退出种子阶段：约 50%
    工程研发（创始人/CTO 加高级财务领域工程师）、25% 创始人薪酬、15% 基础设施和集成成本、10%
    GTM 和合作伙伴关系拓展。
