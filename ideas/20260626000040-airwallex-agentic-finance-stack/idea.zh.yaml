problem: >-
  跨境数字商户的财务主管即将面临这一局面：AI 辅助结账和钱包流程以超出财务团队对账能力的速度创建订单、退款和打款。每笔交易都可能跨越主体、币种、VAT 或 GST、退款政策等边界，链条不完整就会让月结变成救火演习，让审计员坐立不安。现有的 PSP（支付服务商）导出、ERP 凭证上传和税务电子表格，都是为人工操作的结账漏斗设计的，根本不适用于在钱包流程内自主或半自主行动的智能代理。
targetUser:
  primary: 总部位于新加坡或香港、跨多个销售主体运营 Airwallex 并以 NetSuite 或 Xero 月结的跨境数字商户财务主管或财务系统负责人。
  secondary: 同一商户的支付运营负责人或营收运营负责人。
  buyer: 负责月结质量、审计准备和财务运营人力配置的 CFO 或财务主管。
startupThesis:
  nonObviousInsight: 新的缺口不是另一个应付账款机器人或记账副驾驶，而是智能代理发起的商务动作与总账之间缺失的证据与策略层。随着财务和结账合并为一个 AI 原生工作流，瓶颈转移到了证明每个钱包动作对应哪个主体、FX 汇率、税务处理和退款规则。
  beachhead: 总部位于新加坡或香港的 Shopify Plus 美容、健康和配饰商户，拥有 3–12 个销售主体，以 Airwallex 收款和打款，以 NetSuite 或 Xero 月结。
  wedge: 影子账本与异常工作台——捕捉每一笔 Airwallex 钱包事件，与订单和退款意图挂钩，自动生成主体就绪的凭证包和税务证据包。
  whyNowCatalyst: Airwallex 刚刚为 T:0 和 Airi 注入新资本，使 AI 原生月结和智能代理钱包流程真实到商户会在控制体系跟上之前就先行采用。
  ventureScalePath: 从跨境商户的钱包对账本起步，再扩展至退款政策管控、主体路由、资金预测、收入确认，以及面向保险公司或审计师的证据 API——构建更广泛的自主财务技术栈。
solution: >-
  Agent Wallet Closebook 接入 Airwallex、Shopify、ERP 和税务系统，构建从订单意图到钱包流转再到会计凭证的事件级关系图。产品以只读影子模式启动，标记缺失的主体映射、FX 差异、VAT 或 GST 证据缺口及退款冲正，随后为财务推荐精准的凭证包。随着时间推移，产品按主体和市场学习异常模式，将反复出现的月结工作转化为策略规则，而非分析师的机械劳动。首版功能刻意收窄：仅覆盖与 AI 辅助结账流程相关的收款、打款和退款结账包，且所有内容进入总账前须经人工审批。
goToMarketSeed:
  firstCustomer: 总部位于新加坡的美容或保健品 Shopify Plus 商户财务主管，GMV 在 2,000 万至 1 亿美元之间，业务覆盖新加坡、澳大利亚、英国和欧盟，已在使用 Airwallex，在将跨境退款和 FX 结算对接至 NetSuite 方面面临困难。
  buyingTrigger: 推出 AI 购物助手、拓展至新市场主体，或季末审计周期暴露退款和 FX 对账缺口。
  currentAlternative: PSP 导出、ERP CSV 上传、税务电子表格，以及财务运营分析师手工拼接结账、打款和退款证据。
  switchingReason: 首批客户切换的理由是——产品在不替换 Airwallex、Shopify 或 ERP 的前提下即可呈现结账就绪的异常项和凭证包，缩短审核时间的同时保留审计证据。
  pricingHypothesis: 每主体每月 2,000–5,000 美元，超出月度订单和退款量阈值后按使用量计费。
