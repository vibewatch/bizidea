topRisks:
  - name: 平台捆绑
    description: 一旦客户需求显现，Airwallex 或主要 ERP 厂商可能推出基础对账和证据功能。
    mitigation: 以跨系统异常记忆、多 ERP 支持和更快的跨主体部署取胜，而非试图替代核心平台。
  - name: 集成数据缺口
    description: 跨结账、退款、钱包和税务系统的商户数据可能不够一致，导致自动化脆弱。
    mitigation: 从 Airwallex、Shopify 和 NetSuite 或 Xero 的受限集成面起步，保留人工介入，并在扩展前构建窄口异常分类体系。
  - name: 采用时机
    description: 即便 Airwallex 交付了工具，部分商户也可能延迟引入 AI 购物助手，从而放慢明显切口的推进。
    mitigation: 先以跨境商户现有的钱包、FX 和退款月结痛点为销售切入点，将智能代理商务工作流作为加速剂而非唯一依赖。
