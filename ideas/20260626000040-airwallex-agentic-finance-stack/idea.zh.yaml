jobsToBeDone:
  - job: 当 AI 辅助结账和退款流程增加跨境交易量时，帮助财务主管生成主体就绪的结账包，从而在不增加分析师的情况下更快完成月结。
    currentAlternative: 跨 PSP 导出、ERP 导入和税务工作底稿的手工电子表格对账。
    successMetric: 月结天数和每月手工凭证更正数量。
  - job: 当商户推出新的国家主体或钱包流程时，帮助财务系统负责人证明每条订单路径的 FX 和税务处理，从而在审计季维持自动化运行。
    currentAlternative: 内部构建脚本加临时审核清单。
    successMetric: 证据完整的交易占比和每主体异常审核时间。
