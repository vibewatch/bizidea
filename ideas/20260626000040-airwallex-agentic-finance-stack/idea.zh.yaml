    signalRefs:
      - 牌照扩张拓宽部署版图
    sourceRefs: [1, 2]
differentiator: >-
  通用对账工具从银行对账单或 ERP 凭证事后出发；Agent Wallet Closebook 从钱包事件起点出发，保留创造该事件的商务意图。这使其对 AI 辅助结账流程尤为有用——真正的风险不只是数据缺失，而是失去主体路由、FX 处理和退款的决策链。可防御资产是跨越 Airwallex 事件、商户主体和本地结账规则的异常记忆图，每一个经审核的边缘案例都让它变得更锋利。
