slug: agent-wallet-closebook
date: '2026-06-26'
executiveSummary: >-
  Agent Wallet Closebook targets controllers at Singapore- and Hong Kong-headquartered Shopify Plus
  merchants who are about to adopt Airwallex's AI-native T:0 autonomous-finance and Airi
  agentic-commerce products before their reconciliation stack can handle agent-originated orders,
  refunds, and FX settlements across multiple legal entities. The company builds a read-only shadow
  ledger that ingests every Airwallex wallet event, links it to order and refund intent, and
  produces entity-ready journal packages and VAT/GST evidence packs for human review before anything
  posts to NetSuite or Xero. Airwallex's $320M Series H at an $11B valuation—paired with T:0 and
  Airi launches—confirms that autonomous-finance tooling is moving from concept to deployment, and
  the gap between agent-speed commerce and controller-speed close is the founding insight. The
  beachhead market is a ~$66.6M SAM within a ~$715M TAM, sized from 49,673 Shopify Plus merchants
  filtered for cross-border, multi-entity, and compatible finance-stack complexity. Surveyed finance
  operators consistently rank reconciliation complexity among their top operational pain points, and
  established close suites already demonstrate budget appetite in the same controller audience. The
  defensible asset is an exception memory graph—FX drift patterns, entity routing decisions, refund
  reversals, and tax-evidence gaps—that compounds across every reviewed close cycle and becomes
  difficult for single-stack vendors to replicate neutrally. The company is not replacing Airwallex,
  Shopify, NetSuite, or BlackLine; it becomes the neutral cross-system proof layer that rail owners
  and controller suites both lack the incentive to build. Seed capital funds MVP delivery, five
  design-partner pilots, and the Airwallex-ecosystem channel relationships needed to validate
  reachable logo conversion before a Series A thesis is formed.

problem:
  - Controllers at cross-border Shopify Plus merchants face a reconciliation gap that widens as
    AI-assisted checkout (Airi) and autonomous finance (T:0) accelerate transaction creation across
    entity, FX, VAT/GST, and refund-policy boundaries faster than finance teams can review.
  - PSP exports, ERP CSV uploads, and tax spreadsheets were designed for human-paced checkout
    funnels, not for wallet-event volumes that agent-led commerce generates across multiple legal
    entities simultaneously.
  - Each Airwallex wallet event can carry mismatched entity routing, FX rate drift, settlement
    timing differences, or a refund reversal—any one of which turns month-end close into a manual
    fire drill and creates unresolved unmatched items.
  - UK and EU overseas-seller VAT rules, OSS, IOSS, and local import-duty schemes require
    transaction-level evidence that current PSP-to-ERP workflows do not preserve structurally.
  - Manual reconciliation does not scale as entity count rises; Ripple surveyed 350+ CFOs and
    treasury managers and found reconciliation complexity among the top five operational pain points,
    and case studies still describe 100% manual workloads across divisions and PSPs.

solution:
  - A read-only shadow ledger that ingests Airwallex settlement reports, payment-activity exports,
    refunds, FX fees, and webhooks in real time and maps each event to the order intent and entity
    context that created it via Shopify integration.
  - An exception workbench that flags FX settlement drift, missing entity routing, VAT/GST evidence
    gaps, and refund reversals before close, and proposes the exact journal entry finance should
    post—preserving original, paid, and settled amounts with explicit delta explanations.
  - Entity-ready journal packages and tax-evidence packs that export directly into NetSuite or Xero
    with human approval, providing an exportable audit trail with explainable rule traces.
  - A learning exception-memory layer that converts recurring patterns—by entity, market, and
    exception type—into policy rules, reducing analyst rework each close cycle as the graph
    accumulates reviewed edge cases.

whyWeWin:
  - Starts at the wallet event before the GL, preserving the commerce intent behind each
    agent-originated transaction—a reconstruction that BlackLine, FloQast, and Numeric cannot
    perform after the fact from workpaper or bank-statement inputs.
  - Airwallex-native integration reads settlement, FX, refund, and webhook surfaces directly rather
    than relying on bank-statement imports, giving a structural accuracy advantage over generic close
    connectors that start from cash-in-bank.
  - Multi-ERP neutrality across NetSuite and Xero, combined with cross-system evidence packaging,
    creates a defensible position that Airwallex itself—whose incentive is platform depth, not
    neutral brokering across external ERPs—is structurally unlikely to replicate.
  - Exception memory graph across Airwallex events, merchant entities, and local close rules
    compounds with every reviewed edge case, creating a cross-country benchmark dataset that
    single-stack vendors cannot build from a neutral vantage point.
  - Read-only shadow mode with mandatory human approval removes the chief adoption blocker
    (controller trust in AI-generated journals) and aligns with how CFOs say they will evaluate
    autonomous finance workflows before authorizing auto-posting.

strategicChoices:
  beachhead: >-
    Singapore- and Hong Kong-headquartered Shopify Plus merchants in beauty, wellness, and
    supplements with 3–12 selling entities, running Airwallex for collections and payouts and
    NetSuite or Xero for month-end close, selling into Australia, the UK, and the EU.
  wedgeRationale: >-
    This slice has the highest combination of exception density (multi-entity FX plus UK/EU VAT
    plus refund reversals), compatible existing stack (Airwallex plus Shopify plus NetSuite/Xero),
    and reachable channel (Airwallex implementers plus Xero ecommerce accountants). A broader
    beachhead—any cross-border merchant or any PSP—would diffuse proof points and delay the first
    referenceable close audit. The beauty and wellness category has outsized Shopify Plus
    representation (12.2% of the installed base per Store Leads) and the highest cross-border
    refund and duty-complexity density among SMB-to-mid-market segments.
  sequencingRationale: >-
    Shadow ledger and exception workbench ship first because they require zero changes to merchant
    workflows, generate immediate evidence of close-time reduction, and build the exception memory
    that makes later automation trustworthy. GTM leads with Airwallex ecosystem implementers because
    they are already in scope during Airi and T:0 rollouts and can introduce the product as a
    complementary control layer. Pricing expands per-entity after proof on the first entity,
    creating a natural land-and-expand motion without renegotiating buyer relationships. Hiring
    prioritizes one integration engineer and one finance-domain expert before a sales hire because
    the product must survive the first five customer close reviews before outbound can scale.
  notYet:
    - Full AP automation and GL write-back without human approval (requires trust earned through
      reviewer-mode proof across multiple close cycles)
    - Expanding to non-Airwallex PSPs such as Adyen or Stripe before the Airwallex integration
      is deeply defensible and exception memory is established
    - Treasury forecasting and revenue recognition modules planned for the 18–24 month horizon
    - Serving enterprise merchants with internal SAP or Oracle ERP before NetSuite and Xero
      coverage is proven in production
    - Building an auditor-facing evidence API before controllers validate the evidence-pack format
      across at least 10 live merchant close cycles

market:
  tam: "~$715M: 49,673 distinct Shopify Plus merchants × modeled 30% cross-border multi-entity fit × estimated $48k annual category spend (Store Leads installed-base; modeled)"
  sam: "~$66.6M: 49,673 merchants filtered to beauty/fitness (12.2%) plus modeled accessories/apparel (5%) × 26% compatible finance-stack fit × estimated $30k initial annual spend (Store Leads plus modeled)"
  som: "~$1.8M: 60 reachable logos by Year 3 × estimated $30k annual spend, sold through Airwallex/Xero adjacent channels and audit-triggered outbound (modeled from channel capacity)"
  segments:
    - Singapore- and Hong Kong-headquartered Shopify Plus merchants in beauty, wellness, and
      supplements with 3–12 selling entities using Airwallex and NetSuite/Xero
    - Cross-border Shopify Plus merchants in apparel and accessories adopting AI-assisted checkout
      and Airwallex multi-entity payouts into additional APAC-to-West corridors
  buyingProcess: >-
    CFO or controller approves the budget; finance systems lead or controller evaluates the shadow
    ledger proof of value over a 4–8 week pilot on one entity before expanding to additional
    entities. Budget trigger is a new market entity launch, a quarter-end close that surfaces
    unresolved exceptions, or adoption of Airi or T:0 wallet flows.

product:
  mvp: >-
    Read-only shadow ledger that ingests Airwallex settlement reports, payment-activity exports,
    refunds, FX fees, and webhooks; maps each event to order and entity context via Shopify
    integration; surfaces a prioritized exception workbench flagging FX drift, entity routing gaps,
    and refund reversals; and exports one close-ready journal package per entity for human review
    in NetSuite or Xero.
  sixMonth: >-
    Exception workbench v2 with auto-suggested journal entries and tax-evidence packs for UK VAT,
    AU GST, and EU OSS; entity-mapping templates for 3–5 entity configurations; design-partner
    feedback loop producing a first exception-taxonomy library across FX, entity routing, and
    refund families.
  twelveMonth: >-
    Policy-rule engine that converts recurring exception patterns into auto-flagged decisions;
    multi-entity dashboard showing days-to-close, unmatched-item count, and evidence-pack
    completion rate; NetSuite and Xero two-way export with full audit trail and SOC 2 Type I
    coverage.
  twentyFourMonth: >-
    Refund policy controls and entity-routing rules engine; treasury cash-flow visibility layer;
    auditor- and insurer-facing evidence API for cross-border compliance review; expansion to
    non-beauty merchant segments and a second PSP integration (Adyen or Stripe).
  keyBets:
    - Airwallex webhook and settlement-report APIs are stable and sufficient to reconstruct
      order-to-wallet event chains without requiring a proprietary data agreement
    - Controllers will pay for reviewer-mode exception packs before they trust full auto-posting,
      making the shadow-ledger wedge a fundable and deployable first product
    - Exception memory trained on 20–30 live merchants produces auto-suggestions that controllers
      accept at a rate meaningful enough to reduce close-cycle analyst hours materially
    - The Airwallex implementer channel can introduce the product during T:0 and Airi rollouts
      with minimal incremental sales effort from the founding team

gtm:
  wedge: >-
    Ride Airwallex T:0 and Airi adoption rollouts by positioning as the neutral close-proof layer
    that finance teams need before trusting agent-originated journal entries—introduced by Airwallex
    implementation partners and Xero ecommerce accountants already in scope during platform
    deployments.
  channels:
    - Airwallex ecosystem implementation partners introduced during T:0 and Airi deployments
    - Xero ecommerce accounting specialists and A2X-adjacent bookkeeping firms serving cross-border
      Shopify Plus merchants
    - Founder-led direct outbound to controllers and finance systems leads at Singapore/HK Shopify
      Plus brands triggered by new entity launches or audit-cycle exceptions
    - Ecommerce finance consultancies that already untangle entity splits and PSP-to-books mapping
      for multi-market brands
  funnelTargets: "Lead → qualified pilot 25–35% (controller confirms active Airwallex + multi-entity reconciliation pain); pilot → production 50%+ (evidence pack reduces measurable close-time on first entity)"
  pricing: "$2,000–$5,000 per entity per month SaaS subscription plus usage-based overage fees above a monthly order-and-refund volume threshold; per-entity pricing mirrors merchant cost structure, creates land-and-expand as entities are added, and aligns cost with the close complexity reduced"

businessModel:
  revenueStreams:
    - Per-entity monthly SaaS subscription ($2,000–$5,000 per entity per month)
    - Usage-based overage fees for order and refund volume above a monthly threshold per entity
    - Onboarding and first-entity implementation fee (one-time; not a recurring revenue line)
  unitOfValue: Number of active entities reconciled per merchant per month
  targetGrossMarginPct: 75
  expansionLevers:
    - Entity expansion within each merchant as they add new selling geographies
    - Module expansion into refund policy controls, treasury visibility, and revenue recognition
    - Auditor- and insurer-facing evidence API as a separate B2B2B revenue line
    - Second PSP integration (Adyen or Stripe) expanding addressable merchants beyond the Airwallex
      ecosystem

strategyMap:
  northStarMetric: Active entities reconciled per month across live merchants (proxy for close-coverage depth and ARR expansion)
  inputMetrics:
    - Airwallex merchant events ingested and matched to order context per close cycle
    - Exception auto-suggestion acceptance rate by controllers (target >60% by Month 12)
    - Days-to-close improvement versus baseline across design-partner merchants
    - Pilot-to-production conversion rate (target 50% or above)
    - New entity expansions per existing merchant per quarter
  moatsToBuild:
    - Exception memory graph mapping Airwallex event to entity routing to journal decision,
      compounding across every reviewed close cycle
    - Cross-country exception library for FX drift, refund reversals, and VAT/duty evidence gaps
      by market that generic close tools cannot observe neutrally
    - Partner-distribution relationships with Airwallex implementers and Xero ecommerce
      accountants that competitors cannot easily replicate without ecosystem access
  killCriteria:
    - Airwallex ships a native journal- and evidence-pack feature within 12 months that covers
      70% or more of exception cases for Shopify Plus merchants
    - Fewer than 3 of 5 design-partner pilots convert to paid production within 9 months
    - Pilot merchants report no measurable close-time reduction after 2 full close cycles
    - Controller auto-suggestion acceptance rate stays below 30% after Month 9 of production use
  mermaid: |
    flowchart LR
      Wedge[Airwallex T0 and Airi adoption] --> MVP[Shadow ledger and exception workbench]
      MVP --> Pilots[5 design-partner close cycles]
      Pilots --> Proof[Close-time reduction and audit-ready evidence packs]
      Proof --> Expand[Per-entity land and expand within existing merchants]
      Expand --> Moat[Exception memory graph and partner-distribution lock-in]
      Moat --> Growth[Series A and second PSP and module expansion]

investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: >-
      Credible wedge with an identifiable buyer and a structural gap Airwallex itself has no
      incentive to fill neutrally, but the beachhead is narrow and platform-bundling risk is real
      within 18 months.
    whyBelieve: >-
      Airwallex's $320M Series H paired with T:0 and Airi launches creates the exact moment when
      merchants adopt agent-speed commerce before their control stack catches up, and a read-only
      exception workbench is a low-friction first product that controllers will evaluate without a
      rip-and-replace decision.
    whyDoubt: >-
      Airwallex already controls the settlement, FX, refund, and webhook surfaces this product
      depends on, so a native close-control feature on T:0 could eliminate the wedge before the
      startup builds durable exception memory across enough merchants.
    nextDiligence: >-
      Confirm that 5–10 Singapore/HK Shopify Plus controllers with Airwallex and NetSuite/Xero
      have active manual reconciliation pain and will commit to a paid or credit-compensated
      design-partner pilot before the seed round closes.
  firstCustomer:
    title: Controller at a Singapore-based DTC beauty or supplement brand on Shopify Plus
    profile: >-
      SGD 30M–130M GMV Shopify Plus brand with 3–8 legal entities across Singapore, Australia,
      the UK, and the EU, using Airwallex for collections and payouts and NetSuite or Xero for
      month-end close.
    trigger: >-
      Quarter-end audit cycle exposes unresolved FX settlement drift and cross-border refund
      reversals, or the brand launches Airwallex Airi or expands into a new market entity.
    buyer: CFO or controller who owns close quality, audit readiness, and finance-ops headcount budget
    initialContract: >-
      $6,000–$15,000 per month (3–5 entities at $2,000–$3,000 per entity) starting from a
      one-entity 60-day paid pilot; conversion to multi-entity annual subscription on demonstrated
      close-time reduction and exception-pack acceptance.
  mustBeTrue:
    - At least 200 Singapore- and Hong Kong-headquartered Shopify Plus merchants run Airwallex
      alongside Xero or NetSuite across 3 or more legal entities, creating a design-partner pool
      sufficient to reach 60 production logos by Year 3.
    - Controllers at these merchants experience recurring reconciliation exceptions caused by
      multi-entity FX, refund reversals, and VAT/GST evidence gaps that no existing tool resolves
      before month-end close.
    - The Airwallex implementer and Xero ecommerce-accountant channel can introduce the product to
      qualified controllers without a dedicated enterprise sales team in Year 1.
    - Controllers will authorize a $6,000–$15,000 per month pilot budget on the strength of a
      read-only evidence pack that demonstrably cuts exception-review time before auto-posting is
      available.
    - Airwallex's product gravity toward platform depth means it will not build a neutral multi-ERP
      evidence layer within the 18-month window the startup needs to establish exception-memory
      depth and partner relationships.
  diligenceQuestions:
    - How many Singapore/HK Shopify Plus merchants already run Airwallex with Xero or NetSuite
      across 3 or more entities, and can Airwallex implementation partners confirm a warm pipeline
      of 10–15 qualified logos?
    - What is Airwallex's internal roadmap for native reconciliation and journal-pack features on
      T:0, and at what merchant tier or entity complexity does it stop being a stated priority?
    - Which exception type—FX settlement drift, refund reversals, entity routing, or VAT/GST
      evidence gaps—drives the most close-cycle pain, and does the MVP need to solve all four to
      convert a pilot to paid?
    - Have controllers at target merchants evaluated FloQast, Numeric, or BlackLine, and if not,
      what explains the gap—price point, category irrelevance, or manual tolerance?
    - What is the realistic payback period for a $100k per year SaaS spend if close time drops by
      2–3 days per month per entity, and how do target controllers currently quantify analyst-hour
      cost per close cycle?
    - Does the Xero ecommerce-accountant community already recommend supplementary reconciliation
      tools to Shopify Plus clients, and would revenue share be sufficient to activate referral
      behavior?

operatingAssumptions:
  - assumption: >-
      The Airwallex implementer and Xero ecommerce-accountant channel can source qualified
      design-partner introductions in Year 1 without a dedicated sales hire.
    basis: idea.yaml
    validationTest: >-
      Secure 3 partner-introduced warm introductions to Singapore/HK Shopify Plus controllers
      within 60 days of first partner outreach; if fewer materialize, direct outbound replaces
      channel in Year 1 and the 5-pilot target is revised to 3.
    decisionImpact: >-
      If channel introductions are slower than expected, GTM shifts to founder-led direct outbound,
      Year 1 pilot target drops from 5 to 3, and runway burn assumptions require reassessment.
  - assumption: >-
      Controllers will approve a $6,000–$15,000 per month paid pilot budget based on a read-only
      exception workbench before auto-posting capability exists.
    basis: research.yaml
    validationTest: >-
      Close 3 paid pilots within 6 months of MVP launch; if pilots only convert at zero cost (free
      or credit-back), pricing model must be reconsidered before seed capital is deployed further.
    decisionImpact: >-
      If willingness to pay at the proposed price does not materialize, unit economics deteriorate
      and the business may need a lower entry price or a services-led model to reach proof before
      Series A.
  - assumption: >-
      Airwallex will not ship a native multi-ERP journal- and evidence-pack feature within 18
      months that covers 70% or more of the exception cases the startup targets.
    basis: research.yaml
    validationTest: >-
      Track Airwallex T:0 product changelog and partner announcements quarterly; if a competitive
      native feature is announced within 6 months, shift emphasis to multi-ERP neutrality and
      deeper exception taxonomy before Airwallex reaches wide deployment.
    decisionImpact: >-
      If Airwallex bundles the core wedge, the startup must accelerate cross-PSP coverage (adding
      Adyen or Stripe) and deepen exception-memory taxonomy ahead of plan, requiring earlier
      engineering investment and revised hiring sequence.
  - assumption: >-
      The Airwallex settlement-report, payment-activity-export, refund, FX, and webhook APIs are
      sufficiently rich to reconstruct order-to-wallet event chains without a proprietary data
      agreement.
    basis: research.yaml
    validationTest: >-
      Complete a technical proof-of-concept replay of 3 months of historical settlement data for
      one merchant within 30 days of first API access; if critical event fields are missing or
      rate-limited, negotiate a data-partnership with Airwallex before proceeding to MVP.
    decisionImpact: >-
      If API coverage is insufficient, MVP scope narrows to export-file ingestion only, reducing
      real-time exception detection and lowering product defensibility relative to incumbents.
  - assumption: >-
      A gross margin of 75% or above is achievable because the exception-taxonomy and integration
      layer is built once and reused across merchants, with marginal support cost per entity
      declining after the first 10 production deployments.
    basis: operator judgment
    validationTest: >-
      Track hosting, integration maintenance, and support cost per entity per month across the
      first 10 production accounts; if cost exceeds $750 per entity per month, repricing or
      architecture changes are required before the Series A.
    decisionImpact: >-
      If gross margins are materially below 70%, the unit economics do not support a
      seed-to-Series-A venture path and a higher-margin product tier or reduced-scope MVP is
      needed.

experimentRoadmap:
  - horizon: 0–30 days
    experiment: API completeness proof-of-concept
    hypothesis: >-
      Airwallex settlement, export, refund, FX, and webhook APIs are sufficient to reconstruct a
      3-month event chain for one live merchant without a proprietary data agreement.
    successMetric: >-
      90% or more of Airwallex wallet events matched to corresponding Shopify order within the
      replay; no critical missing fields requiring a platform partnership to resolve.
    owner: Founding CTO
  - horizon: 0–60 days
    experiment: Design-partner discovery interviews
    hypothesis: >-
      10–15 Singapore/HK Shopify Plus controllers with Airwallex and NetSuite/Xero will identify
      FX, entity, and refund reconciliation as a top-3 operational pain point.
    successMetric: >-
      8 or more of 15 interviews confirm active pain; 3 or more express willingness to join a paid
      or credit-compensated design-partner pilot.
    owner: Founding CEO
  - horizon: 30–90 days
    experiment: Shadow-ledger MVP pilot on one entity
    hypothesis: >-
      A read-only exception workbench that surfaces FX drift, entity routing gaps, and refund
      reversals will reduce controller exception-review time by 30% or more versus the current
      manual process.
    successMetric: >-
      Controller confirms 30% or more reduction in exception review time after one full close
      cycle; exception workbench surfaces 80% or more of the issues the controller identified
      manually.
    owner: Founding CTO and first design partner
  - horizon: 60–120 days
    experiment: Partner channel activation
    hypothesis: >-
      2–3 Airwallex implementation partners and 1–2 Xero ecommerce accountants will introduce
      qualified controller prospects in exchange for a referral or revenue-share arrangement.
    successMetric: >-
      3 or more warm partner introductions to qualified controllers within 90 days of the first
      formal partner conversation.
    owner: Founding CEO
  - horizon: 3–6 months
    experiment: Paid pilot conversion
    hypothesis: >-
      Controllers who complete a read-only pilot and see close-time reduction will authorize a
      paid production contract without requiring auto-posting capability.
    successMetric: >-
      3 or more of 5 pilot merchants convert to a paid production contract within 60 days of
      completing their first full close cycle.
    owner: Founding CEO
  - horizon: 6–9 months
    experiment: Exception-memory quality test
    hypothesis: >-
      After 20 or more reviewed close cycles across 5 merchants, the exception-memory graph
      produces auto-suggestions that controllers accept at a rate of 50% or above.
    successMetric: >-
      Auto-suggestion acceptance rate of 50% or above across active merchants after 20 reviewed
      close cycles; controller-reported review time per exception drops 20% or more versus the
      Month 3 baseline.
    owner: Founding CTO
  - horizon: 9–12 months
    experiment: Entity-expansion land-and-expand motion
    hypothesis: >-
      Merchants who go live on one entity will expand to 2–4 additional entities within 12 months
      if close-time reduction and exception-pack quality are demonstrated consistently.
    successMetric: >-
      60% or more of production merchants expand to 2 or more entities within 12 months of go-live;
      average ARR per merchant grows from $72k toward $120k or above.
    owner: Customer success lead

operations:
  - Airwallex webhook and settlement-report API integration pipeline (event ingestion,
    normalization, and entity mapping with idempotency and replay support)
  - Shopify order and refund data connector (GraphQL Admin API; entity-split logic for Shopify
    Business Entities)
  - NetSuite and Xero journal-entry export connectors with human-approval workflow and
    append-only audit trail
  - Exception taxonomy and rules engine (FX drift, entity routing, VAT/GST evidence,
    refund-reversal flagging)
  - Audit-grade immutable event ledger preserving original, paid, and settled amounts with
    explicit delta explanations
  - Partner onboarding kits for Airwallex implementers and Xero ecommerce accountants
    (revenue-share terms and white-glove first-entity deployment playbook)
  - SOC 2 Type I audit initiated at Month 6 as a prerequisite for CFO procurement approval at
    enterprise-tier merchants

team:
  - role: Founding CEO (cross-border ecommerce finance or fintech GTM background)
    startTiming: Month 0
    rationale: >-
      Controller relationship credibility and channel sales execution are the primary Year 1
      bottlenecks; a domain-credible founder accelerates design-partner trust and partner
      introductions with Airwallex implementers and Xero accountants.
  - role: Founding CTO (fintech integrations, event-streaming, and SaaS infrastructure)
    startTiming: Month 0
    rationale: >-
      The MVP depends on reliable Airwallex API integration, event-graph construction, and
      audit-grade data persistence; this must be a founder-level commitment, not a contractor,
      because product trust is built on integration correctness.
  - role: Senior Finance Domain Engineer (NetSuite and Xero integration and journal logic)
    startTiming: Month 3
    rationale: >-
      Journal-entry correctness and ERP export fidelity are the product's core trust claims; a
      specialist who understands both accounting rules and API integration is required before the
      fifth customer close review.
  - role: Customer Success and Implementation Lead
    startTiming: Month 6
    rationale: >-
      White-glove first-entity onboarding and exception-taxonomy tuning are high-touch in Year 1;
      a dedicated CS hire prevents founder time from being consumed by implementation work after
      the third production customer.

milestones:
  - horizon: 0–12 months
    items:
      - Complete API proof-of-concept and reconstruct 3-month event chain for one merchant by
        Month 1
      - Sign 5 design-partner agreements with Singapore/HK Shopify Plus controllers by Month 3
      - Ship shadow-ledger MVP with exception workbench on one entity by Month 3
      - Complete 5 live close cycles across design partners and document exception taxonomy by
        Month 6
      - Convert 3 or more of 5 pilots to paid production contracts by Month 7
      - Secure 2 active Airwallex implementer and 1 Xero accountant channel relationships by
        Month 9
      - Reach $25k MRR (approximately 5 production merchants across 1–2 entities each) by Month 10
  - horizon: 12–24 months
    items:
      - Reach $100k MRR (approximately 20 production merchants across 2–4 entities each) by
        Month 18
      - Ship exception policy-rule engine and multi-entity close dashboard by Month 15
      - Demonstrate 60% or above auto-suggestion acceptance rate across active merchants by Month 15
      - Expand to EU OSS tax-evidence configuration and a second entity-geography template by
        Month 18
      - Initiate SOC 2 Type II audit by Month 20
      - Raise Series A on $100k or above MRR, 20 or more production merchants, and a documented
        exception-memory benchmark by Month 22
  - horizon: 24–36 months
    items:
      - Reach $250k MRR (approximately 50 merchants) by Month 30
      - Launch auditor- and insurer-facing evidence API as a separate B2B2B revenue line by
        Month 28
      - Add a second PSP integration (Adyen or Stripe) to reach merchants outside the Airwallex
        ecosystem by Month 30
      - Expand into refund policy controls and treasury cash-flow visibility module by Month 32
      - Achieve $3M ARR run rate by Month 36

risks:
  - risk: Airwallex ships native journal and evidence-pack features on T:0 that cover the core
      exception cases for Shopify Plus merchants
    likelihood: High
    impact: High
    mitigation: >-
      Win on cross-PSP neutrality, multi-ERP coverage, and exception-memory depth before Airwallex
      reaches wide deployment; prioritize Adyen integration and deeper exception taxonomy earlier
      if Airwallex announces competitive features within 6 months.
  - risk: Controllers extend manual reconciliation tolerance longer than expected, delaying paid
      conversion beyond 9 months
    likelihood: Medium
    impact: High
    mitigation: >-
      Sell first on existing wallet, FX, and refund close pain rather than agentic-commerce
      dependency; structure pilots as paid from Day 1 with credit-back on non-delivery of
      exception reduction to surface genuine willingness to pay early.
  - risk: Merchant data inconsistency across Shopify, Airwallex, and ERP makes event-chain
      reconstruction brittle and reduces exception-detection accuracy
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Start with a constrained 3-system integration surface; build explicit entity-mapping
      templates and require human sign-off on master-data setup before the first automated close
      cycle; keep exception taxonomy narrow until data quality is confirmed.
  - risk: API dependency on Airwallex creates single-point-of-failure risk if Airwallex changes
      pricing, access terms, or data availability
    likelihood: Low
    impact: High
