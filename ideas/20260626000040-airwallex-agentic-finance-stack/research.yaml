openQuestions:
  - How many Singapore- and Hong Kong-headquartered Shopify Plus merchants already use both Airwallex and Xero or NetSuite across multiple legal entities?
  - How quickly will Airwallex productize native journal and evidence-pack features on top of its existing reporting, refund, and webhook surfaces?
  - 'Which budget owner buys first in practice: the controller, the payments operations lead, or the broader finance systems owner?'
  - How much tax and duty complexity is still merchant-owned once a merchant adopts managed-market or merchant-of-record models versus running the stack directly?
