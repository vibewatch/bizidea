  searchedQueries:
    - Find primary and reputable recent sources about Airwallex's June 2026 Series H funding, T:0 autonomous finance product, Airi agentic commerce product, customer counts, processing volume, and global licenses. Prioritize Airwallex primary pages, Reuters, TechCrunch, and reputable fintech trade press.
    - Find primary and reputable sources about reconciliation, multi-entity close, FX settlement, refunds, and accounting pain for cross-border ecommerce merchants using PSPs, Shopify, NetSuite, or Xero. Prioritize official docs, accounting firms, and finance operations sources.
    - 'Find official product, documentation, pricing, and independent analysis sources for competitors relevant to wallet-to-ledger close and payment reconciliation for cross-border merchants: Adyen, BlackLine, FloQast, Numeric, and Airwallex.'
    - Find official regulatory and tax sources relevant to a Singapore- or Hong Kong-headquartered digital merchant selling into Australia, the UK, and the EU, especially VAT/GST, recordkeeping, cross-border digital services, ecommerce imports, and FX accounting.
    - Find reputable current sources on Shopify Plus merchant counts, cross-border ecommerce growth, cross-border payments growth, and market size pages relevant to multi-entity ecommerce finance operations.
    - Find customer-validation evidence such as case studies, community discussions, implementation guides, partner pages, RFP-like materials, or job posts that show real pain around payment reconciliation, refunds, multi-currency accounting, and ecommerce finance operations.
    - 'Find official Shopify documentation pages relevant to multi-entity ecommerce finance operations: Markets, multi-currency, duties and import tax, refunds, payments, tax reporting, and business entities. Return direct Shopify docs URLs only.'
    - Find official Xero and NetSuite documentation or product pages relevant to bank reconciliation, multicurrency accounting, financial reporting, ecommerce integrations, and multi-entity closes. Return direct Xero or NetSuite URLs only.
    - Find official Airwallex docs pages relevant to settlement reports, refunds, FX in payments, payouts, connected accounts, payment webhooks, and Shopify integration. Return direct Airwallex URLs only.
    - Find official Adyen, BlackLine, FloQast, and Numeric product or documentation pages relevant to reconciliation, close automation, settlement reporting, account reconciliations, and pricing. Return direct vendor URLs only.
    - Find the official Shopify 2025 annual report or investor relations page with 2025 GMV, revenue, and international metrics. Return direct Shopify or SEC URLs only.
    - Find official Global-e or Worldpay report pages with cross-border ecommerce market growth or international commerce trends relevant to cross-border digital merchants. Return direct company or investor URLs only.
    - Find direct URLs for official or reputable pages with Shopify Plus merchant counts by geography, especially Store Leads or BuiltWith style current pages. Return direct URLs only.
    - Find direct URLs for reputable case studies or surveys about payment reconciliation pain, multi-currency refunds, or finance operations burden in ecommerce. Return direct URLs only.
    - Find direct Shopify.com or shopify.dev pages that are publicly fetchable and discuss Shopify Markets, multi-currency selling, duties, taxes, refunds, or international expansion. Avoid help.shopify.com pages if blocked.
    - Find direct publicly accessible Xero.com pages on multicurrency accounting, sales tax, financial reporting, or ecommerce tips that are fetchable without login.
    - Find direct publicly accessible UK government or EU official pages on VAT recordkeeping, overseas sellers, OSS/IOSS, and digital services VAT that are fetchable without login.
