slug: hot-zone-robot-ops
date: '2026-06-04'
executiveSummary: >-
  Hot Zone Robot Ops sells a supervised operations and evidence layer for refinery emergency-response teams that already use or are procuring ground robots. The immediate buyer pain is not robot locomotion; it is coordinating mixed robots during gas leaks, post-fire sweeps, and confined-space alarms while preserving human signoff and restart documentation. The first beachhead is North American refineries with 2-10 robots and acute pressure to reduce manual hot-zone entry. The product starts as a drill and post-incident clearance system because safety qualification and insurer trust are the main adoption bottlenecks, and the available research does not yet prove buyers will accept a new live command-path product on day one. TAM, SAM, and SOM are modest but venture-plausible only if the company becomes the workflow system of record in refineries and then expands into gas processing, LNG, and adjacent critical infrastructure. The strongest competitive position is vendor-neutral clearance workflow depth: OEM software is tied to one fleet, while industrial data platforms do not own re-entry approval logic. The largest disconfirming risk is that most early robot programs remain single-vendor and bundled, which would compress standalone software ACV and force distribution through OEMs or integrators. Another open gap is the lack of direct customer evidence on multi-vendor prevalence and budget ownership, so the first 90 days must test bundling, workflow priority, and willingness to pay before scaling headcount. Given the strong pain signal but unresolved packaging risk, this is a diligence-worthy industrial software opportunity rather than a high-conviction underwriting case today.
problem:
  - Refinery safety and operations teams still stitch together manual entry, OEM consoles, contractor inspections, and spreadsheet logs when deciding whether crews can re-enter a hazardous area.
  - Existing tools do not combine mixed-robot tasking, human approval gates, and auditable clearance evidence into one workflow that operations, safety, and insurers can trust.
solution:
  - Provide a vendor-neutral command and evidence layer that coordinates the top refinery robot platforms through supervised mission playbooks for gas-leak perimeter sweeps, post-fire clearance, confined-space scouting, and valve-isolation verification.
  - Convert robot telemetry, operator interventions, and site observations into a shared timeline, clearance packet, and after-action replay that fit existing refinery safety authority instead of replacing it.
whyWeWin:
  - The company is targeting the workflow incumbents skip: cross-fleet supervised clearance before human re-entry, where regulatory documentation and restart speed matter more than robot novelty.
  - If it wins early sites, it can compound proprietary playbooks, integration templates, and clearance outcome benchmarks faster than OEMs or generic industrial data vendors.
strategicChoices:
  beachhead: Gulf Coast and other North American refineries already piloting or operating 2-10 ground robots for post-fire, gas-leak, or confined-space verification.
  wedgeRationale: This beachhead has the clearest buying trigger, the highest cost of unsafe manual entry, and explicit compliance pressure around acceptable entry conditions, so one accepted clearance packet is more valuable than a broad inspection dashboard.
  sequencingRationale: Start with evidence-first drill and post-incident workflows, then add live supervised mission routing only after one site accepts the platform inside formal re-entry procedures; this reduces safety-qualification risk, keeps integrations narrow, and gives partners a concrete deployment path.
  notYet:
    - LNG terminals outside North America until refinery playbooks and channel partners are proven.
    - Full autonomous incident command without human checkpoints.
    - Building proprietary hazardous-area robot hardware or sensor payloads.
market:
  tam: $60M annual North American refinery software TAM based on 150 refineries at roughly $400k per site.
  sam: $18M annual SAM based on about 45 large or high-consequence refinery sites likely to adopt robot-first clearance workflows first.
  som: $2.4M year-3 SOM based on eight beachhead sites at roughly $300k ACV through direct sales and integrator channels.
  segments:
    - North American refineries with emergency-response teams and existing hazardous-area robot programs.
    - Gas-processing plants and LNG operators that can reuse the same robot-first clearance workflow after refinery proof.
  buyingProcess: >-
    The motion is consultative and compliance-shaped: the emergency response director or operations-integrity lead sponsors a paid design partner, the refinery manager or VP Operations Integrity approves budget, and safety and IT/OT stakeholders sign off on workflow fit before production rollout. Initial trust is won through drills and post-incident evidence review, not a cold replacement of existing command systems.
product:
  mvp: >-
    Ship an evidence-first operating layer for one refinery site with adapters for the two or three most common robot platforms, mission playbooks for gas-leak perimeter sweeps and confined-space scouting, operator override logging, and a clearance packet export. The MVP should work in drills and post-incident review before it is asked to own live mission routing.
  sixMonth: Support the first live design-partner site with clearance packets, after-action replay, drill analytics, and integrations into one existing industrial data or digital-twin system.
  twelveMonth: Add supervised live mission routing, approval gates, and reusable templates for post-fire clearance and valve-isolation verification across three paying refinery sites.
  twentyFourMonth: Expand into gas-processing and LNG-adjacent accounts with multi-site benchmarking, insurer-ready reporting, and a library of validated hazardous-workflow playbooks.
  keyBets:
    - Two to three robot adapters cover most early refinery pilots.
    - Safety teams will accept software-generated evidence packets before they accept software-driven command decisions.
    - Drill and readiness workflows create recurring usage between rare major incidents.
    - Channel partners will resell a neutral workflow layer if it improves hardware stickiness.
gtm:
  wedge: Sell a paid design-partner deployment for quarterly drills and one high-consequence clearance workflow, then convert that site into an annual license once the evidence packet is accepted for formal re-entry review.
  channels:
    - Founder-led direct sales into refinery emergency-response and operations-integrity teams.
    - OEM and integrator partnerships with robot vendors already landing hardware inside refinery inspection programs.
    - Referrals from insurer-adjacent safety advisors and emergency-response training providers.
  funnelTargets: target account→qualified design partner 15-25%, design partner→paid pilot 60%+, pilot→annual site license 50%+, site 1→second site or business-unit expansion 30%+ within 12 months
  pricing: Annual per-site software license plus usage fees for live incidents and quarterly drills, priced against avoided manual entries, faster time to first remote assessment, and faster restart decisions rather than generic seat counts.
businessModel:
  revenueStreams:
    - Annual per-site software subscription for supervised robot-ops and clearance evidence.
    - Usage fees for live incidents, drills, and after-action review events.
    - Premium modules for insurer reporting, multi-site benchmarking, and additional workflow templates.
  unitOfValue: Protected facility running robot-first hazardous-entry workflows.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more covered units and workflows within the same refinery network.
    - Extend from refinery incidents into routine hazardous-entry checks and quarterly drill programs.
    - Expand into gas-processing plants, LNG facilities, and adjacent critical-infrastructure sites after refinery proof.
strategyMap:
  northStarMetric: Number of robot-first drills or incidents completed with a clearance packet accepted for human re-entry review.
  inputMetrics:
    - Time from incident declaration to first remote assessment.
    - Number of accepted clearance packets per site per quarter.
    - Reduction in exposed-person entries for scoped workflows.
    - Pilot-to-production conversion rate.
    - Share of missions run across more than one robot or payload type.
  moatsToBuild:
    - Cross-vendor adapters tied to refinery-specific mission playbooks.
    - Structured archive of clearance packets mapped to confined-space, PSM, and RMP workflows.
    - Benchmark dataset linking robot observations, operator overrides, and time-to-clear outcomes.
  killCriteria:
    - Fewer than two paid refinery design partners signed within 12 months.
    - No pilot customer accepts the clearance packet in a formal drill or post-incident review within nine months.
    - More than 70% of target accounts insist the product be bundled free with one OEM and reject standalone budget ownership.
  mermaid: |
    flowchart LR
      Wedge[Refinery drill and clearance wedge] --> MVP[Evidence-first multi-robot MVP]
      MVP --> Proof[Accepted clearance packets and faster remote assessment]
      Proof --> Expansion[Multi-site refinery expansion then gas-processing entry]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong safety pain and a credible workflow wedge, but conviction is capped until budget ownership and bundling risk are tested with real refinery buyers.
    whyBelieve: The product sits inside a mandatory re-entry and documentation workflow where buyers already spend to reduce worker exposure and downtime.
    whyDoubt: The company may discover that OEM software and integrators capture most of the budget before a standalone clearance OS can take hold.
    nextDiligence: Secure two paid refinery design partners and prove one accepted clearance packet in a live drill before increasing go-to-market spend.
  firstCustomer:
    title: Gulf Coast refinery emergency-response program with existing inspection robots
    profile: Large refinery with quarterly drills, hazardous-area inspection routines, and at least one robot program that already generates fragmented evidence across consoles and manual logs.
    trigger: A fire, gas leak, near miss, insurer recommendation, or safety mandate forces the site to formalize robot-first response playbooks before crews re-enter.
    buyer: Emergency Response Director or VP Operations Integrity
    initialContract: $75k-$150k paid pilot tied to one workflow and one site, converting to a $250k-$400k annual site license once the platform is accepted as the clearance evidence system of record.
  mustBeTrue:
    - At least three of the first five target refineries report real pain from mixed-vendor or mixed-payload robot workflows that OEM tools do not solve.
    - A refinery buyer will approve a standalone or clearly itemized software budget of at least $200k ACV after a successful pilot.
    - Safety teams will accept the platform's clearance packet in a formal drill or post-incident review without requiring a contractor to recreate the documentation manually.
    - Supporting the first two or three robot platforms covers more than 70% of near-term target deployments.
    - Drill, readiness, and routine hazardous-entry usage are frequent enough to prove ROI inside 12 months even if major incidents are rare.
  diligenceQuestions:
    - Who owns the budget line for this workflow today: refinery operations, emergency response, reliability, or the robot OEM bundle?
    - How many current target accounts already run more than one robot, payload, or console in the same hazardous workflow?
    - Which first workflow converts fastest to paid production: gas-leak perimeter sweep, post-fire clearance, confined-space scouting, or valve-isolation verification?
    - What evidence format would a refinery manager or insurer accept as part of re-entry approval today?
    - Which OEMs or integrators are willing to resell a neutral workflow layer instead of blocking it?
operatingAssumptions:
  - assumption: Early refinery buyers will fund a standalone or itemized software layer instead of demanding it be bundled into robot hardware.
    basis: research.yaml
    validationTest: Close at least five buyer and partner interviews plus two written pilot proposals that preserve a visible software line item.
    decisionImpact: If false, the company must pivot to OEM-led distribution, lower ASP expectations, and prioritize partner economics over direct sales.
  - assumption: The top two or three robot platforms and payload combinations cover most beachhead deployments.
    basis: operator judgment
    validationTest: Build a target-account platform census across the first 15 prospects and confirm at least 70% fit inside the first adapter roadmap.
    decisionImpact: If false, integration scope expands too fast and the wedge must narrow to a single OEM or single workflow.
  - assumption: An evidence-first product can enter refinery operations faster than a command-and-control replacement.
    basis: research.yaml
    validationTest: Run one paid drill pilot that uses the startup for clearance documentation while leaving existing command authority intact.
    decisionImpact: If false, the company may need a services-heavy deployment model or a different buyer persona.
  - assumption: Drill and readiness workflows create enough recurring usage to justify six-figure ACV despite irregular major incidents.
    basis: research.yaml
    validationTest: Measure quarterly drill frequency, hazardous-entry checks, and after-action review demand across three design partners.
    decisionImpact: If false, pricing must shift toward lower base subscription, higher services mix, or adjacent routine inspection workflows.
  - assumption: Refinery proof will translate into adjacent gas-processing demand without a full product rewrite.
    basis: idea.yaml
    validationTest: Validate one gas-processing design-partner opportunity against the refinery MVP and identify any missing compliance or hardware requirements.
    decisionImpact: If false, expansion slows and the company must build a deeper refinery-only business before widening the market.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Interview 15 refinery operators, robot owners, and integrators on workflow priority and budget ownership.
    hypothesis: Multi-robot coordination and auditable clearance evidence are funded problems, not just desirable features.
    successMetric: Ten interviews confirm a live pain point and two prospects agree to scope a paid pilot.
    owner: Founder CEO
  - horizon: 0-90 days
    experiment: Map the robot, payload, and console stack across the first 15 target accounts.
    hypothesis: Two or three adapters cover the majority of early refinery opportunities.
    successMetric: More than 70% of target deployments fit the first adapter roadmap.
    owner: Founding eng
  - horizon: 0-90 days
    experiment: Prototype a clearance packet and after-action replay using sample drill data from one refinery advisor or partner.
    hypothesis: Evidence format is the fastest trust wedge into formal refinery workflows.
    successMetric: One target buyer says the output is close enough to use in an internal drill or insurer review.
    owner: Product lead
  - horizon: 90-180 days
    experiment: Run one paid drill pilot on a single refinery workflow with human signoff preserved.
    hypothesis: Buyers will pay for drill and readiness value before approving live incident routing.
    successMetric: Pilot is paid and results in one accepted clearance packet plus a conversion discussion for annual production use.
    owner: Field deployment lead
  - horizon: 90-180 days
    experiment: Sign one OEM or integrator partnership with a defined resale or referral motion.
    hypothesis: Hardware partners see value in a neutral evidence layer that makes robot deployments stick.
    successMetric: One signed commercial agreement and one sourced opportunity from the partner channel.
    owner: Founder CEO
  - horizon: 6-12 months
    experiment: Add supervised live mission routing for one validated workflow at the first production site.
    hypothesis: Once the evidence layer is trusted, the same buyer will expand into higher-value command features.
    successMetric: One site turns on live supervised routing and renews or expands above pilot scope.
    owner: Founding eng
operations:
  - Maintain a library of refinery-specific playbooks for gas-leak, confined-space, post-fire, and valve-isolation workflows.
  - Support IECEx or equivalent certified robot integrations rather than owning hazardous-area hardware certification.
  - Export evidence into the customer's existing industrial data or digital-twin stack where possible.
  - Run quarterly drill reviews that tune playbooks and measure time-to-clear, manual-entry reduction, and packet acceptance.
  - Provide field reliability support for robot telemetry, operator override logging, and audit-trail integrity during every pilot.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the first robot adapters, mission-state model, and evidence pipeline.
  - role: Founder GTM
    startTiming: Month 0
    rationale: Owns refinery design-partner sales, procurement navigation, and partner development.
  - role: Field deployment lead
    startTiming: Month 3
    rationale: Runs onsite pilots, integrates customer workflows, and shortens time from pilot signature to accepted drill output.
  - role: Product and safety workflow lead
    startTiming: Month 6
    rationale: Encodes playbooks, approval gates, and clearance packet requirements that match refinery operating reality.
  - role: Enterprise account executive
    startTiming: Month 9
    rationale: Converts lighthouse pilots into multi-site contracts once the sales motion is repeatable.
milestones:
  - horizon: 0-12 months
    items:
      - Sign two paid refinery design partners.
      - Ship adapters for the first two or three robot platforms used in beachhead accounts.
      - Produce at least one clearance packet accepted in a formal drill or post-incident review.
      - Convert the first pilot into an annual site license.
  - horizon: 12-24 months
    items:
      - Reach three to five paying refinery sites on a common product baseline.
      - Launch supervised live mission routing for at least two validated workflows.
      - Add one insurer-ready reporting module and one industrial-data integration template.
      - Win the first gas-processing or LNG-adjacent pilot using the refinery product core.
  - horizon: 24-36 months
    items:
      - Reach eight or more production sites consistent with the researched year-3 SOM.
      - Launch multi-site benchmarking on time-to-clear, operator overrides, and exposed-person entries avoided.
      - Establish at least two repeatable channel relationships with OEMs or integrators.
      - Prove expansion revenue from adjacent hazardous infrastructure beyond the initial refinery wedge.
risks:
  - risk: Safety teams may require long qualification cycles before the software is allowed into formal emergency procedures.
    likelihood: High
    impact: High
    mitigation: Enter through drills, after-action review, and evidence packets before asking to control live mission routing.
  - risk: OEMs and integrators may bundle orchestration features tightly enough that buyers resist a standalone software layer.
    likelihood: Medium
    impact: High
    mitigation: Position around vendor neutrality, accepted clearance evidence, and cross-site benchmarking that hardware bundles do not provide.
  - risk: Hardware and payload fragmentation could make integrations too expensive for an early team.
    likelihood: High
    impact: Medium
    mitigation: Limit the first release to the platforms covering most beachhead demand and decline custom adapters outside the wedge.
  - risk: Major incidents are infrequent, making ROI look episodic.
    likelihood: Medium
    impact: Medium
    mitigation: Price around drills, readiness reviews, and routine hazardous-entry workflows so usage recurs between incidents.
  - risk: Expansion into adjacent energy segments may require more workflow variation than the refinery MVP supports.
    likelihood: Medium
    impact: Medium
    mitigation: Validate one gas-processing account against the refinery roadmap before broad market expansion.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of product build, refinery integrations, paid design-partner pilots, and the first field deployment and GTM hires needed to prove accepted clearance packets and repeatable site conversion.
