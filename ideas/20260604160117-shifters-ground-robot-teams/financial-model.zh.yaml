slug: hot-zone-robot-ops
date: '2026-06-04'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: 月
  source: '[BP date 2026-06-04] 对应 business-plan 日期后的首个完整经营月份。'
- id: A2
  name: pre-seed 完成后的期初现金
  value: '2400'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M and runwayMonths 18] 基准情景用 $2.4M pre-seed，目标是在留出缓冲的前提下跑到首个多站点验证点。'
- id: A3
  name: 建模里的客户定义
  value: 一个付费的炼油厂或相邻危险站点，已进入付费共创或正式生产部署
  unit: 定义
  source: '[BP businessModel.unitOfValue protected facility] 和 [BP investorMemo.firstCustomer] 都说明：站点才是承载收入的客户单元。'
- id: A4
  name: Y1 单个付费站点的综合年收入
  value: '150'
  unit: USDK
  source: '[BP investorMemo.firstCustomer.initialContract $75k-$150k paid pilot] 基准情景取试点区间上沿，因为早期账户会包含部署支持和演练配置。'
- id: A5
  name: Y2 生产站点年收入
  value: '300'
  unit: USDK
  source: '[BP market.som eight beachhead sites at roughly $300k ACV] 与 [BP investorMemo.firstCustomer $250k-$400k annual site license] 一起锚定首个完整生产年度。'
- id: A6
  name: Y3 单站点综合年收入
  value: '360'
  unit: USDK
  source: '[research.bottomUpSizingDrivers implied annual software budget per site $300k-$450k] 和 [BP businessModel.expansionLevers usage fees plus premium modules] 一起支撑 Y3 $360K 的综合 ACV。'
- id: A7
  name: Y1 客户节奏
  value: M4 首个付费共创客户；M9 第二个付费共创客户；Y1 结束时共 2 个付费站点
  unit: 时间线
  source: '[BP milestones 0-12 months sign two paid refinery design partners and convert the first pilot]，同时参考 [BP market.buyingProcess] 所体现的慢企业销售周期。'
- id: A8
  name: Y2 客户爬坡
  value: Q1Y2 3；Q2Y2 4；Q3Y2 4；Q4Y2 5
  unit: 期末站点数
  source: '[BP milestones 12-24 months reach three to five paying refinery sites]，基准情景按 Y2 末达到 5 个生产站点。'
- id: A9
  name: Y3 客户爬坡
  value: Q1Y3 6；Q2Y3 7；Q3Y3 7；Q4Y3 8
  unit: 期末站点数
  source: '[BP market.som $2.4M year-3 SOM based on eight beachhead sites] 和 [BP milestones 24-36 months reach eight or more production sites]。'
- id: A10
  name: 毛利率爬坡
  value: Y1 55%-60%；Y2 64%-70%；Y3 70%-72%
  unit: 毛利率百分比
  source: '[BP businessModel.targetGrossMarginPct 70]，再叠加工业 SaaS 在早期试点偏重实施、后期逐步标准化的 startup-finance 经验。'
- id: A11
  name: 稳定期月流失率
  value: '0.8'
  unit: 百分比
  source: '[startup-finance heuristic: sticky industrial workflow software]，同时考虑 [BP risks] 里提到的打包、长销售周期和买方数量有限。'
- id: A12
  name: 每新增生产站点的完全摊薄 CAC
  value: '180'
  unit: USDK
  source: '[BP gtm channels, funnelTargets, and buyingProcess]，再叠加美国工业企业销售里常见的差旅、采购协同和方案设计成本。'
- id: A13
  name: 各岗位全包年薪区间
  value: 创始工程师 190；创始人 GTM 180；现场部署 165；产品与安全流程负责人 170；企业 AE 180；第二名工程师 190；第二名现场部署负责人 165；伙伴销售 170
  unit: USDK / FTE
  source: '[BP team] 定义了职能与时间点；薪酬则采用美国工业软件团队的精简全包现金假设。'
- id: A14
  name: 招聘顺序
  value: Month 0 创始工程师与创始人 GTM；Month 3 现场部署负责人；Month 6 产品与安全流程负责人；Month 9 企业 AE；Month 13 第二名工程师；Month 18 第二名现场部署负责人；Month 27 伙伴销售
  unit: 时间
  source: '[BP team startTiming] 给出前五个岗位，[BP strategicChoices.sequencingRationale plus milestones] 则支持在试点被验证前延后更广的 GTM 招聘。'
- id: A15
  name: 非薪酬运营支出爬坡
  value: Y1 月度 S&M $10K-$14K、R&D/cloud $12K-$16K、G&A $8K-$11K；Y2 季度非薪酬 opex $129K-$156K；Y3 季度非薪酬 opex $165K-$192K
  unit: USDK
  source: '[BP gtm, product, operations, and risks]，再叠加炼油厂差旅、云处理、法务、保险和 OT 安全开销的经验假设。'
- id: A16
  name: 收入确认公式
  value: 期末付费站点数 × 当年 ARPU ÷ 12（用于月度）或 ÷ 4（用于季度）
  unit: 公式
  source: '[derived from A4-A9]，确保每一行收入都能直接与客户数和 ARPU 对上。'
- id: A17
  name: 薪酬汇总公式
  value: 月度在岗 FTE × 全包年薪 ÷ 12；季度薪酬等于三个月薪酬之和
  unit: 公式
  source: '[derived from A13-A14]，确保薪酬费用能与人员计划逐项勾稽。'
- id: A18
  name: 现金流简化假设
  value: EBITDA 近似等于经营性现金流
  unit: 政策
  source: '[startup-finance heuristic: planning model]，假设无债务、无税、无 capex，也不存在超出经营损益表范围的重大营运资金波动。'
- id: A19
  name: 下行情景变量
  value: Y2 生产 ARPU 降到 $275K、Y3 ARPU 降到 $300K、爬坡放慢到 Q4Y3 仅 6 个站点、毛利率最高到 70%
  unit: 情景输入
  source: '[BP risks] 和 [research.reportMemo.sensitivityCases] 都指向 OEM 打包、单厂商机队和实时工作流软件接受度偏慢的风险。'
- id: A20
  name: 上行情景变量
  value: Y2 生产 ARPU 升到 $320K、Y3 ARPU 升到 $400K、Q4Y3 达到 9 个站点、毛利率提升到 74%
  unit: 情景输入
  source: '[BP businessModel.expansionLevers] 和 [research.reportMemo.partnershipEcosystem] 都说明：如果渠道伙伴加速部署、且高级报告模块更早落地，上行空间是存在的。'
