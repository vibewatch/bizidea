  y3RevenueImpactK: 60.0
  cashImpactK: -160.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      Prospects[潜在线索] --> PaidDesignPartners[付费共创客户]
      PaidDesignPartners --> ProductionSites[生产站点]
      ProductionSites --> SubscriptionRevenue[订阅收入]
      ProductionSites --> UsageFees[使用费]
      SubscriptionRevenue --> GrossProfit[毛利润]
      UsageFees --> GrossProfit
      GrossProfit --> OperatingCash[经营现金]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自：2 个付费共创客户转成 Q4Y2 前的 5 个生产站点，并在 Q4Y3 前做到 8 个站点，Y3 综合 ACV 为 $360K。
- checkName: 必须做对的事
  finding: 公司必须证明放行包能被正式接受，并在 OEM 打包压缩 ACV 之前守住独立软件这一预算科目。
- checkName: 模型会失效的情况
  finding: 如果销售周期拉长到 12 个月、且 Y3 ACV 往 $300K 掉，下行情景会在下一轮融资前把现金打到负数。
- checkName: 下一轮的证明点
  finding: 一个可信的 seed 故事，是在 Q4Y2 前做到 5 个生产站点、1 个来自伙伴渠道的部署，并证明演练能转成年付许可。
sanityChecks:
  ruleOf40: Y3 增长 110.0% + EBITDA 利润率 -11.8% = 98.2%
  burnMultiple: Y2 burn multiple 为 0.8x（$927K 净烧钱 / $1.20M 净新增 ARR），到 Y3 改善到 0.2x（$298K / $1.38M）。
  revenuePerFte: $315K（按 Q4Y3 的 8 FTE 计算，对照工业 SaaS 的 $200-400K 基准）。
  flags:
  - 模型到 Y3 末仍略微 EBITDA 为负，因此大概率要在实现自给自足前再融一轮 seed。
  - ACV 的成立，取决于买方是否愿意保留独立软件预算，而不是强行打包进 OEM 或集成商方案。
  - 市场本身偏窄：即便基准情景，Q4Y3 也只是做到研究测算的 8 个炼油厂滩头站点。
  - 流失率仍是经验假设，不是观测结果，因为基准情景的在运站点太少，尚不足以建立留存历史。
