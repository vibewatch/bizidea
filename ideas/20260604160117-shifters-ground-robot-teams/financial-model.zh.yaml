scenarios:
  downside:
    description: OEM 打包持续存在，共创客户转化更慢，公司到 Y3 末只做到 6 个站点，且生产 ACV 更低。
    y3RevenueK: 1500.0
    y3EbitdaK: -1055.42
    cashLowPointK: -865.69
    keyAssumptionChanges:
    - Y2 生产 ARPU 降到 $275K，Y3 ARPU 降到 $300K。
    - 客户爬坡放慢到 Q4Y2 仅 4 个站点、Q4Y3 仅 6 个站点。
    - 毛利率最高只到 70%，因为部署工作仍然偏重服务。
  base:
    description: 2 个付费共创客户在 Q4Y2 前转成 5 个炼油厂生产站点，公司在 Q4Y3 前达到研究测算的 8 个滩头站点。
    y3RevenueK: 2520.0
    y3EbitdaK: -298.37
    cashLowPointK: 181.98
    keyAssumptionChanges:
    - Y2 生产 ARPU 为 $300K，Y3 综合 ARPU 为 $360K。
    - 客户爬坡在 Q4Y2 达到 5 个站点、Q4Y3 达到 8 个站点。
    - 毛利率从 Y1 的 55%-60% 提升到 Y3 的 70%-72%。
  upside:
    description: 渠道伙伴帮助更快拿站点，高级报告模块更早落地，公司到 Y3 末做到 9 个站点，且综合 ACV 更高。
    y3RevenueK: 3200.0
    y3EbitdaK: 250.33
    cashLowPointK: 827.45
    keyAssumptionChanges:
    - Y2 生产 ARPU 升到 $320K，Y3 综合 ARPU 升到 $400K。
    - 客户爬坡在 Q4Y2 达到 6 个站点、Q4Y3 达到 9 个站点。
    - 一旦部署标准化、伙伴渠道提高效率，毛利率可提升到 74%。
