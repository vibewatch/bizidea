  stage: 成长期
  wedge: 面向油气和化工的 Ex 级四足巡检机器人与自主巡检软件。
  pricing: 企业定制定价，无公开价格。
  strength: 危险区域硬件能力极强，拿到 Zone 1 认证，并且有扎实的油气客户案例。
  weaknessVsUs: 它是硬件优先定位，因此仍给独立的跨机队编排与证据层留下空间。
  sourceRefs:
  - 30
  - 31
  - 32
- name: Gecko Robotics
  stage: 成长期
  wedge: 服务关键基础设施的机器人平台，以及用于可靠性和资本规划的 Cantilever 资产智能平台。
  pricing: 企业定制定价，无公开价格。
  strength: 在炼油厂和其他关键基础设施里企业信誉很强，数据平台叙事也有说服力。
  weaknessVsUs: 它更偏资产状态智能，而不是多机器人事故指挥和人员回场门控。
  sourceRefs:
  - 34
  - 35
- name: Field AI
  stage: 成长期
  wedge: 面向工业和能源巡检、可跨多种机器人形态运行的通用机器人“大脑”。
  pricing: 企业定制定价，无公开价格。
  strength: 它在恶劣工业环境和危险巡检场景里有更通用的自主栈。
  weaknessVsUs: 它更像自主基础设施，不像原生贴着炼油厂流程的运营系统，对合规证据的强调也更弱。
  sourceRefs:
  - 37
regulatoryTechnicalConstraints:
- point: 受许可受限空间规则要求站点证明入场条件可接受、值守角色明确，并完成正式入场授权。
  sourceRefs:
  - 9
- point: 工艺安全管理规则要求预防灾难性泄漏，并围绕危险化学品保留成文操作程序。
  sourceRefs:
  - 11
- point: EPA 的 RMP 义务要求覆盖设施提交事故历史、最坏情形泄漏分析和应急响应规划。
  sourceRefs:
  - 14
- point: 机器人一旦进入爆炸性环境，就必须满足 IECEx 或同等级危险区域认证要求。
  sourceRefs:
  - 15
  - 30
validationSignals:
- point: Shifters 的种子轮明确要投入受监督自主地面机器人系统，以及危险环境里的“单人协调多任务”能力。
  sourceRefs:
  - 1
  - 2
- point: bp 公开表示，与其把人派到危险环境附近，不如先派一台传感能力完备的机器人进去。
  sourceRefs:
  - 27
- point: Woodside 已经在 Pluto LNG 使用 Spot 做危险巡检和法规要求的目视检查。
  sourceRefs:
  - 28
- point: ANYbotics 已经证明，在油气和燃气处理设施里，对具备危险区域认证的机器人巡检存在真实需求。
  sourceRefs:
  - 30
  - 31
- point: Caltrans 证明，即便先不算减少伤害或停机风险，仅受限空间机器人本身就能立刻省钱。
  sourceRefs:
  - 33
openQuestions:
- 早期炼油厂机器人项目里，多厂商部署占比到底有多高？这一结构切换的速度会有多快？
- 炼油厂买方会愿意为独立的“放行 OS”单独立预算，还是只有在 OEM 或集成商转售时才会接受？
- 哪个首个流程最容易先跑出 ROI：火灾后巡查、燃气泄漏周界巡查、受限空间侦察，还是阀门隔离核验？
- 在安全团队的政策和保险要求之下，自主能力最多能放到什么程度，才不会在每次回场决策前都被迫加一道人工检查点？
