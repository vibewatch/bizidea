  adoptionFrictionMatrix:
  - friction: 正式事故场景启用前的安全资质认定
    severity: high
    affectedBuyer: 炼油厂厂长或应急响应总监
    mitigation: 先把产品定位成证据与演练平台，等站点验证完成后，再扩到真实受监督任务。
