competitors:
  - name: Korial
    stage: scale-up
    wedge: Hardware-agnostic AI platform for autonomous industrial operations across robots, drones, and sensors.
    pricing: Custom enterprise quote; no public pricing.
    strength: Closest vendor-neutral software position with live oil and gas references and explicit autonomy narrative.
    weaknessVsUs: Broader industrial-autonomy scope makes it less focused on refinery re-entry approvals and auditable clearance packets.
    sourceRefs: [22, 23]
  - name: Boston Dynamics Orbit
    stage: incumbent
    wedge: Fleet orchestration and site intelligence for Boston Dynamics robots used in industrial inspection.
    pricing: Subscription software; no public pricing disclosed.
    strength: Strong brand, proven inspection deployments, and tight integration with Spot missions and sensing.
    weaknessVsUs: Vendor-locked to Boston Dynamics hardware and optimized for fleet operations rather than mixed-vendor clearance workflow.
    sourceRefs: [25, 27, 28]
  - name: ANYbotics
    stage: scale-up
    wedge: Ex-rated legged inspection robots and autonomous inspection software for oil, gas, and chemicals.
    pricing: Custom enterprise quote; no public pricing.
    strength: Best-in-class hazardous-area hardware with Zone 1 certification and strong oil-and-gas references.
    weaknessVsUs: Hardware-first positioning leaves room for a separate cross-fleet orchestration and evidence layer.
    sourceRefs: [30, 31, 32]
  - name: Gecko Robotics
    stage: scale-up
    wedge: Critical-infrastructure robotics and Cantilever asset-intelligence platform for reliability and capital planning.
    pricing: Custom enterprise quote; no public pricing.
    strength: Strong enterprise credibility in refineries and other critical infrastructure with a compelling data platform story.
    weaknessVsUs: Focuses more on asset condition intelligence than on multi-robot incident command and crew re-entry gating.
    sourceRefs: [34, 35]
  - name: Field AI
    stage: scale-up
    wedge: General-purpose robot brain for industrial and energy inspection across multiple robot embodiments.
    pricing: Custom enterprise quote; no public pricing.
    strength: Broad autonomy stack for harsh industrial environments and hazardous inspection use cases.
    weaknessVsUs: More autonomy infrastructure than workflow-native refinery operations system, with less emphasis on compliance evidence.
    sourceRefs: [37]
regulatoryTechnicalConstraints:
  - point: Permit-required confined-space rules require acceptable entry conditions, attendant roles, and formal entry authorization.
    sourceRefs: [9]
  - point: Process safety management rules require prevention of catastrophic releases and documented operating procedures around hazardous chemicals.
    sourceRefs: [11]
  - point: EPA RMP obligations require accident history, worst-case release analysis, and emergency-response planning for covered facilities.
    sourceRefs: [14]
  - point: Robots entering explosive atmospheres must meet IECEx or equivalent hazardous-area certification requirements.
    sourceRefs: [15, 30]
validationSignals:
  - point: Shifters' seed round explicitly funds supervised autonomous ground robotic systems and one-operator mission coordination for dangerous environments.
    sourceRefs: [1, 2]
  - point: bp publicly says it would rather send a properly instrumented robot into hazardous environments than place people nearby.
    sourceRefs: [27]
  - point: Woodside already uses Spot at Pluto LNG for hazardous inspections and regulatory visual inspection work.
    sourceRefs: [28]
  - point: ANYbotics shows certified hazardous-area robotic inspection demand in oil and gas and gas-processing facilities.
    sourceRefs: [30, 31]
  - point: Caltrans demonstrates that confined-space robot use can save money immediately even before counting avoided injury or shutdown risk.
    sourceRefs: [33]
openQuestions:
  - What percentage of early refinery robot programs are already multi-vendor versus single-OEM, and how fast will that shift?
  - Do refinery buyers want a standalone clearance OS budget, or will they only approve it if an OEM or integrator resells it?
  - Which initial workflow creates the fastest ROI: post-fire sweep, gas-leak perimeter, confined-space scouting, or valve-isolation verification?
  - How much autonomy can safety teams accept before policy or insurer requirements force a human checkpoint for every re-entry decision?
