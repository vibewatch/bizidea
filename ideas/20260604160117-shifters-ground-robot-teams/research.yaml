  pestle:
    - factor: political
      impact: positive
      point: Critical-infrastructure framing helps because energy assets are explicitly designated as nationally important and mostly privately owned.
      sourceRefs: [39]
    - factor: economic
      impact: positive
      point: Buyers already spend to reduce downtime and hazardous exposure, so a workflow layer can ride existing inspection and reliability budgets.
      sourceRefs: [27, 28, 33]
    - factor: social
      impact: positive
      point: Removing people from confined spaces and toxic-release zones aligns directly with worker-safety priorities.
      sourceRefs: [8, 16, 27]
    - factor: technological
      impact: positive
      point: Ex-rated robots, fleet orchestration, and industrial AI platforms are now mature enough to support operational deployments rather than demos.
      sourceRefs: [23, 25, 30, 41]
    - factor: legal
      impact: positive
      point: OSHA and EPA rules increase the value of documented acceptable entry conditions, operating procedures, and emergency-response evidence.
      sourceRefs: [9, 11, 14]
    - factor: environmental
      impact: positive
      point: Gas-leak detection and remote inspection reduce both worker exposure and the chance that small equipment issues become larger releases.
      sourceRefs: [14, 32]
  adoptionFrictionMatrix:
    - friction: Safety qualification before live incident use
      severity: high
      affectedBuyer: Refinery manager or emergency response director
      mitigation: Start as an evidence and drill platform, then expand into live supervised missions after site validation.
      sourceRefs: [9, 11, 16]
    - friction: Hardware and console fragmentation
      severity: high
      affectedBuyer: Robot program owner
      mitigation: Support the two or three most common fielded platforms first and prove value on mission handoff and auditability.
      sourceRefs: [22, 25, 30]
    - friction: Ex-zone certification and payload constraints
      severity: high
      affectedBuyer: Operations integrity lead
      mitigation: Partner with IECEx or ATEX-certified robot vendors instead of trying to solve hazardous-area hardware in-house.
      sourceRefs: [15, 30]
    - friction: OT and data-system integration
      severity: medium
      affectedBuyer: Digital operations or IT/OT lead
      mitigation: Integrate through existing asset and digital-twin platforms before attempting deep system replacement.
      sourceRefs: [25, 35, 38]
