slug: hot-zone-robot-ops
date: '2026-06-04'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: '[BP date 2026-06-04] first full operating month after the business-plan date.'
- id: A2
  name: Opening cash after pre-seed close
  value: '2400'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M and runwayMonths 18] base case uses a $2.4M pre-seed to reach the first multi-site proof point with buffer.'
- id: A3
  name: Modeled customer definition
  value: one paying refinery or adjacent hazardous site with an active design-partner or production deployment
  unit: definition
  source: '[BP businessModel.unitOfValue protected facility] and [BP investorMemo.firstCustomer] imply the site is the revenue-bearing customer unit.'
- id: A4
  name: Y1 blended annual revenue per paying site
  value: '150'
  unit: USDK
  source: '[BP investorMemo.firstCustomer.initialContract $75k-$150k paid pilot] base case uses the top of pilot range because early accounts include deployment support and drill configuration.'
- id: A5
  name: Y2 annual revenue per production site
  value: '300'
  unit: USDK
  source: '[BP market.som eight beachhead sites at roughly $300k ACV] and [BP investorMemo.firstCustomer $250k-$400k annual site license] anchor the first full-production year.'
- id: A6
  name: Y3 blended annual revenue per site
  value: '360'
  unit: USDK
  source: '[research.bottomUpSizingDrivers implied annual software budget per site $300k-$450k] and [BP businessModel.expansionLevers usage fees plus premium modules] support a $360K blended ACV in Y3.'
- id: A7
  name: Y1 customer schedule
  value: M4 first paid design partner; M9 second paid design partner; exit Y1 at 2 paying sites
  unit: timeline
  source: '[BP milestones 0-12 months sign two paid refinery design partners and convert the first pilot] with a slow enterprise sales cycle from [BP market.buyingProcess].'
- id: A8
  name: Y2 customer ramp
  value: Q1Y2 3; Q2Y2 4; Q3Y2 4; Q4Y2 5
  unit: sites EOP
  source: '[BP milestones 12-24 months reach three to five paying refinery sites] base case exits Y2 at 5 production sites.'
- id: A9
  name: Y3 customer ramp
  value: Q1Y3 6; Q2Y3 7; Q3Y3 7; Q4Y3 8
  unit: sites EOP
  source: '[BP market.som $2.4M year-3 SOM based on eight beachhead sites] and [BP milestones 24-36 months reach eight or more production sites].'
- id: A10
  name: Gross margin ramp
  value: Y1 55%-60%; Y2 64%-70%; Y3 70%-72%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70] plus startup-finance heuristic for an implementation-heavy industrial SaaS product that standardizes after early pilots.'
- id: A11
  name: Steady-state monthly churn
  value: '0.8'
  unit: percent
  source: '[startup-finance heuristic: sticky industrial workflow software] moderated by [BP risks] on bundling, long sales cycles, and limited buyer count.'
- id: A12
  name: Fully loaded CAC per new production site
  value: '180'
  unit: USDK
  source: '[BP gtm channels, funnelTargets, and buyingProcess] plus startup-finance heuristic for founder-led industrial enterprise sales with travel, procurement work, and solution design.'
- id: A13
  name: Loaded annual salary bands by role
  value: Founding eng 190; founder GTM 180; field deployment 165; product and safety workflow lead 170; enterprise AE 180; second engineer 190; second field deployment lead 165; partnerships seller 170
  unit: USDK per FTE
  source: '[BP team] defines functions and timing; startup-finance heuristic sets lean fully loaded cash compensation for a U.S.-based industrial software team.'
- id: A14
  name: Hiring sequence
  value: Month 0 founding eng and founder GTM; Month 3 field deployment lead; Month 6 product and safety workflow lead; Month 9 enterprise AE; Month 13 second engineer; Month 18 second field deployment lead; Month 27 partnerships seller
  unit: timing
  source: '[BP team startTiming] gives the first five hires and [BP strategicChoices.sequencingRationale plus milestones] justify delaying broader GTM until pilot proof exists.'
- id: A15
  name: Non-payroll operating spend ramp
  value: Y1 monthly S&M $10K-$14K, R&D/cloud $12K-$16K, G&A $8K-$11K; Y2 quarterly non-payroll opex $129K-$156K; Y3 quarterly non-payroll opex $165K-$192K
  unit: USDK
  source: '[BP gtm, product, operations, and risks] plus startup-finance heuristic for refinery travel, cloud processing, legal, insurance, and OT-security overhead.'
- id: A16
  name: Revenue recognition formula
  value: period-end paying sites multiplied by year-specific annual ARPU and divided by 12 for monthly rows or 4 for quarterly rows
  unit: formula
  source: '[derived from A4-A9] so every revenue row reconciles directly to customer count and ARPU.'
- id: A17
  name: Payroll roll-up formula
  value: monthly active FTE multiplied by loaded annual salary divided by 12; quarterly salary is the sum of the three monthly payroll amounts
  unit: formula
  source: '[derived from A13-A14] so salary expense reconciles to the headcount plan.'
- id: A18
  name: Cash flow simplification
  value: EBITDA approximates operating cash flow
  unit: policy
  source: '[startup-finance heuristic: planning model] assumes no debt, taxes, capex, or material working-capital swing beyond the operating P&L.'
- id: A19
  name: Downside scenario deltas
  value: Y2 production ARPU $275K, Y3 ARPU $300K, slower ramp to 6 sites by Q4Y3, and gross margin topping out at 70%
  unit: scenario inputs
  source: '[BP risks] and [research.reportMemo.sensitivityCases] point to OEM bundling, single-vendor fleets, and slower acceptance of live workflow software.'
- id: A20
  name: Upside scenario deltas
  value: Y2 production ARPU $320K, Y3 ARPU $400K, faster ramp to 9 sites by Q4Y3, and gross margin reaching 74%
  unit: scenario inputs
  source: '[BP businessModel.expansionLevers] and [research.reportMemo.partnershipEcosystem] imply upside if channel partners accelerate deployment and premium reporting lands early.'
