modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Prospects --> PaidDesignPartners
      PaidDesignPartners --> ProductionSites
      ProductionSites --> SubscriptionRevenue
      ProductionSites --> UsageFees
      SubscriptionRevenue --> GrossProfit
      UsageFees --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from converting two paid design partners into 5 production sites by Q4Y2 and reaching 8 sites at a $360K blended ACV by Q4Y3.
- checkName: Must go right
  finding: The company must prove accepted clearance packets and preserve a standalone software line item before OEM bundling compresses ACV.
- checkName: Model breaks if
  finding: If sales cycles stretch to 12 months and Y3 ACV falls toward $300K, the downside case turns cash negative before the next raise.
- checkName: Next-round proof
  finding: A credible seed story is exiting Q4Y2 with 5 production sites, one partner-sourced deployment, and evidence that drills convert into annual licenses.
sanityChecks:
  ruleOf40: Y3 growth 110.0% + EBITDA margin -11.8% = 98.2%
  burnMultiple: Y2 burn multiple 0.8x ($927K net burn / $1.20M net new ARR), improving to 0.2x in Y3 ($298K / $1.38M).
  revenuePerFte: $315K Y3 using Q4Y3 8 FTE (benchmark $200-400K industrial SaaS).
  flags:
  - The model still exits Y3 slightly EBITDA-negative, so a seed round likely happens before self-funding.
  - ACV depends on buyers preserving a standalone software budget instead of forcing OEM or integrator bundling.
  - 'The market is niche: even the base case only reaches the researched 8-site refinery beachhead by Q4Y3.'
  - Churn is heuristic rather than observed because the base case has too few live sites to establish retention history.
