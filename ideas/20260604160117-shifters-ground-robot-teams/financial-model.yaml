scenarios:
  downside:
    description: OEM bundling persists, design partners convert more slowly, and the company exits Y3 with 6 sites at lower production ACV.
    y3RevenueK: 1500.0
    y3EbitdaK: -1055.42
    cashLowPointK: -865.69
    keyAssumptionChanges:
    - Y2 production ARPU falls to $275K and Y3 ARPU to $300K.
    - Customer ramp slows to 4 sites by Q4Y2 and 6 by Q4Y3.
    - Gross margin tops out at 70% because deployment work stays services-heavy.
  base:
    description: Two paid design partners convert into a 5-site refinery base by Q4Y2 and the company reaches the researched 8-site beachhead by Q4Y3.
    y3RevenueK: 2520.0
    y3EbitdaK: -298.37
    cashLowPointK: 181.98
    keyAssumptionChanges:
    - Y2 production ARPU is $300K and Y3 blended ARPU is $360K.
    - Customer ramp reaches 5 sites by Q4Y2 and 8 by Q4Y3.
    - Gross margin improves from 55%-60% in Y1 to 70%-72% in Y3.
  upside:
    description: Channel partners help close sites faster, premium reporting lands early, and the company exits Y3 with 9 sites at higher blended ACV.
    y3RevenueK: 3200.0
    y3EbitdaK: 250.33
    cashLowPointK: 827.45
    keyAssumptionChanges:
    - Y2 production ARPU rises to $320K and Y3 blended ARPU to $400K.
    - Customer ramp reaches 6 sites by Q4Y2 and 9 by Q4Y3.
    - Gross margin reaches 74% once deployments standardize and partner channels improve efficiency.
