problem: 关键基础设施运营方如今越来越能买到地面机器人，但一旦遇到泄漏、火灾善后或受限空间报警，炼油厂或燃气处理厂的应急负责人依旧很难安全地指挥一场多机器人任务。难点不在把一台机器人开进去，而在于怎么给不同平台分工、怎么让人工主管始终控盘，以及怎么产出一份能让运营、安全和保险方都认可的放行记录。所以团队最后还是会退回到人工进入、单一厂商遥操作，或者高度依赖承包商的流程——这会拖慢复产，也让人比应有的更靠近热区。
targetUser:
  primary: 北美炼油厂和燃气处理厂里，已经在用或正在采购危险事件巡检地面机器人的应急响应与运营完整性负责人。
  secondary: 支持炼油厂和燃气厂机器人部署的工业机器人集成商，以及危险响应服务商。
  buyer: 运营完整性副总裁、应急响应总监或炼油厂厂长。
startupThesis:
  nonObviousInsight: 新的瓶颈已经不是机器人硬件够不够强，而是受监督的团队编排与证据层：它要让一个人能在真实工业事故里安全指挥多台机器人，还能证明现场已经具备人员重新进入的条件。
  beachhead: 北美炼油厂的应急响应项目：在火灾后检查、燃气泄漏排查或受限空间核验场景里，已经部署 2-10 台、且可能来自一个或多个厂商的地面机器人。
  wedge: 在人员回场前，先用一层受监督的任务手册与放行证据系统，去跑热区周界巡查、气体读数路线和阀门隔离核验。
  whyNowCatalyst: Shifters 的融资以及它对受监督自主、危险任务和制造就绪度的强调，都说明机器人供给已经到了；真正卡现场落地的，转而变成部署流程软件这一层。
  ventureScalePath: 先从炼油厂事故进场与复产流程切入，再把同一套操作系统扩到 LNG 终端、化工厂、变电站、地下公用设施、国防基地和市政拆弹队，成为危险地面机器人作业的操作系统。
solution: 产品是一层厂商中立的指挥与证据系统，跑在现有 UGV、履带机器人和各类传感载荷之上。它给人工主管预置好事故后周界巡查、气体读数采集、受限空间侦察，以及阀门或断路器核验等任务手册，并用“自主边界”定义每台机器人在无需再次批准时能做什么。机器人执行任务时，系统会把任务分配、实时观察、人工干预和现场状态变化统一记进一条共享时间线，供安全和运营团队实时查看。等事故趋稳后，平台再把这些机器人数据整理成可审计的放行包和事后回放，供炼油厂用于复产审批、保险复核和后续演练设计。时间一长，平台就会沉淀成“什么机器人流程在什么现场条件下最有效”的事实底座，同时压低暴露风险和停机时长。
goToMarketSeed:
  firstCustomer: 墨西哥湾沿岸的一家炼油厂应急响应项目：它已经拥有或在试点巡检履带机器人 / UGV，而且在维修人员重新进入工艺单元前，必须先把事故后的放行记录补齐。
  buyingTrigger: 火灾、燃气泄漏、险情未遂、保险方建议或集团安全要求，迫使现场降低人工暴露，并把“机器人先行”的响应手册正式定下来。
  currentAlternative: 人工危化进入，加上单一厂商遥操作、承包商主导巡检、无线电协同，以及纸面或表格化的事故日志。
  switchingReason: 首个客户之所以会切换，是因为这层切口能缩短首次远程评估所需时间，还能把原本割裂的机器人视频、人工笔记和厂商专用控制台，收拢成一份让安全、运营和保险方共用的可审计放行包。
  pricingHypothesis: 按受保护设施收取年度站点许可费，再叠加真实事故和季度演练的使用费；定价锚点不是座席数，而是少停机多少小时、少让多少人暴露进场。
