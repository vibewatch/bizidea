jobsToBeDone:
- job: 一旦火灾、燃气泄漏或受限空间报警让装置停摆，帮我们的炼油厂响应团队先把机器人送进去，这样我们就能在不让人员暴露的前提下，划定哪些区域可以重新进入。
  currentAlternative: 人工危化进入、承包商主导检查，以及靠无线电驱动的遥操作。
  successMetric: 从事故宣告到远程放行决策获批的时间。
- job: 做季度演练或接受保险审查时，帮我们的运营完整性团队证明“机器人优先”流程已经能跑通，好让项目继续获批，并扩到更多装置。
  currentAlternative: 纸面 SOP、零散的演练视频，以及临时拼出来的表格证据。
  successMetric: 每站点演练准备时长下降，以及获批的“机器人优先”流程数量上升。
