topRisks:
- name: 安全资质认证慢
  description: 炼油厂可能需要很长的验证周期，才会把新的机器人作业层纳入正式应急流程。
  mitigation: 先从演练、事后复盘和面向保险方的证据流程切入，贴着现有 SOP 跑，再逐步接管实时指挥路径。
- name: 硬件碎片化
  description: 地面机器人、载荷和操作控制台差异很大，会把厂商中立编排的交付成本抬高。
  mitigation: 首个切口只支持炼油厂巡检里最常见的履带机器人和 UGV 组合，并围绕这些流程做适配器模板。
- name: 事故发生频率不规则
  description: 如果站点只拿极少数紧急事件来算 ROI，就可能很难为软件支出立项。
  mitigation: 把定价锚在演练、就绪度审计和日常危险进入检查上，让产品在重大事故之间也能持续创造价值。
