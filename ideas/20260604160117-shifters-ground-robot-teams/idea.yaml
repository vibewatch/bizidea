topRisks:
  - name: "Slow safety qualification"
    description: "Refineries may require long validation cycles before a new robot-operations layer is trusted inside emergency procedures."
    mitigation: "Start with drills, after-action review, and insurer-facing evidence workflows that fit existing SOPs before taking over live command paths."
  - name: "Hardware fragmentation"
    description: "Ground robots, payloads, and operator consoles vary widely, which can make vendor-neutral orchestration expensive to deliver."
    mitigation: "Constrain the first wedge to the top crawler and UGV setups used in refinery inspection and build adapter templates around those workflows."
  - name: "Irregular incident frequency"
    description: "Some sites may struggle to justify software spend if they evaluate ROI only on rare emergency events."
    mitigation: "Price around drills, readiness audits, and routine hazardous-entry checks so the product creates recurring value between major incidents."
