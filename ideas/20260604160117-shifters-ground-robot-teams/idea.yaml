problem: >-
  Critical-infrastructure operators increasingly have access to ground robots, but a refinery or gas-plant response lead still cannot safely run a multi-robot mission during a leak, fire aftermath, or confined-space alarm. The hard part is not driving one robot; it is assigning tasks across mixed platforms, keeping a human supervisor in control, and producing a clearance record that operations, safety, and insurers trust. Teams therefore fall back to manual entry, single-vendor teleoperation, or contractor-heavy workflows that delay restart and keep people closer to hot zones than they should be.
targetUser:
  primary: >-
    Emergency-response and operations-integrity leaders at North American refineries and gas-processing plants using or procuring ground inspection robots for hazardous incidents.
  secondary: >-
    Industrial robotics integrators and hazard-response service firms supporting refinery and gas-plant robot deployments.
  buyer: "VP Operations Integrity, Emergency Response Director, or Refinery Manager."
startupThesis:
  nonObviousInsight: >-
    The new bottleneck is not better robot hardware. It is the supervised team-orchestration and evidence layer that lets one human safely direct multiple robots inside a live industrial incident and prove the site is ready for human re-entry.
  beachhead: >-
    North American refinery emergency-response programs running post-fire, gas-leak, or confined-space verification workflows with 2-10 ground robots from one or more vendors.
  wedge: >-
    A supervised mission-playbook and clearance-evidence layer for hot-zone perimeter sweeps, gas-reading routes, and valve-isolation verification before crews re-enter.
  whyNowCatalyst: >-
    Shifters' financing and emphasis on supervised autonomy, hazardous missions, and manufacturing readiness suggest robot supply is arriving now, making deployment workflow software the gating layer for real field use.
  ventureScalePath: >-
    Start with refinery incident-entry and restart workflows, then expand into LNG terminals, chemical plants, substations, underground utilities, defense bases, and municipal bomb squads as the operating system for dangerous-ground robot operations.
solution: >-
  The product is a vendor-neutral command and evidence layer that sits above existing UGVs, crawlers, and sensor payloads. It gives a human supervisor prebuilt mission playbooks for post-incident perimeter sweeps, gas-reading collection, confined-space scouting, and valve or breaker verification, with autonomy envelopes that define what each robot may do without another approval. As robots run, the system records task assignments, live observations, operator interventions, and site-state changes into one shared timeline that safety and operations teams can review in real time. When the incident stabilizes, it turns the robot data into an auditable clearance packet and after-action replay that a refinery can use for restart approval, insurer reviews, and future drill design. Over time, the platform becomes the source of truth for which robot workflow worked at which site condition, shrinking both exposure risk and downtime.
goToMarketSeed:
  firstCustomer: >-
    A Gulf Coast refinery emergency-response program that already owns or pilots inspection crawlers or UGVs and must document post-incident clearance before maintenance crews can re-enter a process unit.
  buyingTrigger: >-
    A fire, gas leak, near miss, insurer recommendation, or corporate safety mandate that forces the site to reduce human exposure and formalize robot-first response playbooks.
  currentAlternative: "Manual hazmat entry combined with single-vendor teleoperation, contractor-led inspections, radio coordination, and paper or spreadsheet incident logs."
  switchingReason: >-
    The first customer switches because this wedge shortens time to first remote assessment and gives safety, operations, and insurers one auditable clearance packet instead of fragmented robot video, manual notes, and vendor-specific consoles.
  pricingHypothesis: "Annual site license per protected facility plus usage fees for live incidents and quarterly drills, priced against avoided shutdown hours and reduced exposed-person entries."
