differentiator: >-
  Incumbent robot OEMs sell chassis, autonomy modules, or single-vendor teleoperation consoles, but they do not become the cross-fleet system of record for clearance decisions at hazardous industrial sites. Generic field-service and incident-management tools also miss the core workflow because they do not model autonomy envelopes, operator overrides, or robot-generated evidence tied to human re-entry gates. This startup wins by owning the supervised mission playbooks, the evidence format a site uses to reopen safely, and the dataset of robot interventions and outcomes across dangerous-ground workflows.
