slug: hot-zone-robot-ops
date: '2026-06-04'
executiveSummary: Hot Zone Robot Ops 卖的是一层受监督运营与证据系统，目标客户是已经在使用或正在采购地面机器人的炼油厂应急响应团队。眼下最痛的，不是机器人能不能移动，而是在燃气泄漏、火灾后巡查和受限空间报警时，怎么协调混编机器人、保住人工签核，并把复产文档补齐。首个滩头市场是北美那些已经部署 2-10 台机器人、又急着减少人工进入热区的炼油厂。产品之所以先从演练和事故后放行系统做起，是因为真正拖慢采用的，是安全资质认定和保险方信任；现有研究还不足以证明，买方会在第一天就接受一套新的实时指挥路径。TAM、SAM 和 SOM 不算大，但如果公司能先成为炼油厂里的工作流记录系统，再扩到燃气处理、LNG 和相邻关键基础设施，仍有长成 venture 级公司的可能。最强的竞争站位，是厂商中立的放行流程深度：OEM 软件绑在单一机队上，而工业数据平台又不掌管回场审批逻辑。最大的反证风险在于，早期机器人项目如果大多仍是单一厂商并且被打包出售，独立软件 ACV 就会被压扁，公司也会被迫经由 OEM 或集成商分销。另一个明显空缺，是还没有直接客户证据证明多厂商占比和预算归属，所以前 90 天必须先验证打包风险、流程优先级和付费意愿，再谈扩团队。综合来看，痛点信号很强，但产品打包风险未解；它更像一个值得深挖的工业软件机会，而不是今天就能高确信下注的标的。
problem:
- 炼油厂安全与运营团队在决定人员能否重新进入危险区域时，仍要把人工进入、OEM 控制台、承包商巡检和表格日志硬拼到一起。
- 现有工具没法把混编机器人任务分配、人工审批关口和可审计放行证据收进同一套流程，因此运营、安全和保险方都难以真正信任。
solution:
- 提供一层厂商中立的指挥与证据系统，围绕燃气泄漏周界巡查、火灾后放行、受限空间侦察和阀门隔离核验等场景，用受监督任务手册把主流炼油厂机器人平台串起来。
- 把机器人遥测、操作员干预和现场观察整理成共享时间线、放行包和事后回放，贴合炼油厂既有安全权威，而不是取而代之。
whyWeWin:
- 公司盯住的是现有厂商普遍跳过的流程：在人员重新进入前，先完成跨机队、受监督的放行流程；在这里，监管文档和复产速度比机器人新奇程度更重要。
- 如果它能拿下首批站点，就能比 OEM 或通用工业数据厂商更快滚起专有手册、集成模板和放行结果基准。
strategicChoices:
  beachhead: 墨西哥湾沿岸及其他北美炼油厂：这些站点已经在试点或运行 2-10 台地面机器人，用于火灾后、燃气泄漏或受限空间核验。
  wedgeRationale: 这个滩头市场的购买触发最明确，人工危险进入的代价也最高，而且围绕“可接受入场条件”本身就有明确合规压力，所以一份被接受的放行包，价值远高于一块宽泛的巡检仪表盘。
  sequencingRationale: 先从“证据优先”的演练和事故后流程切入，等至少有一个站点把平台纳入正式回场流程后，再补上实时受监督任务路由。这样既能降低安全资质风险，也能把集成范围控制住，还能给合作伙伴一条更具体的部署路径。
  notYet:
  - 在炼油厂手册和渠道伙伴跑通前，不急着做北美以外的 LNG 终端。
  - 不做完全没有人工检查点的全自主事故指挥。
  - 不自研危险区域机器人硬件或传感载荷。
market:
  tam: 北美炼油厂软件 TAM 约 $60M / 年，按 150 家炼油厂、每站点约 $400k 测算。
  sam: SAM 约 $18M / 年，按约 45 个最可能率先采用“机器人优先”放行流程的大型或高后果炼油站点测算。
  som: 第 3 年 SOM 约 $2.4M，按 8 个滩头站点、每站点约 $300k ACV，通过直销和集成商渠道测算。
  segments:
  - 拥有应急响应团队且已部署危险区域机器人的北美炼油厂。
  - 在炼油厂验证后，可以直接复用同一套“机器人优先”放行流程的燃气处理厂和 LNG 运营方。
  buyingProcess: 销售动作会是咨询式、也会被合规塑形：应急响应总监或运营完整性负责人先发起付费共创客户，炼油厂厂长或运营完整性副总裁批预算，安全和 IT / OT 相关方再对流程适配性给出签字。最初的信任不是靠一上来替换现有指挥系统，而是靠演练和事故后证据复盘赢来的。
product:
  mvp: 先给单个炼油厂站点交付一层“证据优先”的操作系统：适配最常见的两到三个机器人平台，提供燃气泄漏周界巡查和受限空间侦察任务手册，记录操作员覆盖，并导出放行包。MVP 先在演练和事故后复盘里跑通，再去争夺实时任务路由。
  sixMonth: 在首个实时共创站点交付放行包、事后回放、演练分析，以及接入一个现有工业数据或数字孪生系统。
  twelveMonth: 在 3 个付费炼油站点上，补齐受监督实时任务路由、审批关口，以及可复用的火灾后放行与阀门隔离核验模板。
  twentyFourMonth: 扩到燃气处理与相邻 LNG 账户，提供多站点对标、面向保险方的报告，以及经过验证的危险流程手册库。
  keyBets:
  - 两到三个机器人适配器就能覆盖大多数早期炼油厂试点。
  - 安全团队会先接受软件生成的证据包，再接受软件驱动的指挥决策。
  - 演练与就绪度流程能在重大事故稀少时，仍创造持续使用频次。
  - 如果中立工作流层能提升硬件留存，渠道伙伴就愿意转售它。
gtm:
  wedge: 先卖一个付费共创部署，用于季度演练和一个高后果放行流程；等放行包被正式回场审核接受后，再把该站点转成年度许可。
  channels:
  - 创始人主导直销，直接打炼油厂应急响应与运营完整性团队。
  - 与已经把硬件落进炼油厂巡检项目里的机器人厂商和集成商合作。
  - 来自保险相邻安全顾问和应急响应培训机构的转介绍。
  funnelTargets: 目标账户→合格共创客户 15-25%，共创客户→付费试点 60%+，试点→年度站点许可 50%+，站点 1→第二站点或业务单元扩张在 12 个月内达到 30%+。
  pricing: 按站点收取年度软件许可费，再叠加真实事故和季度演练的使用费；定价不是对着通用座席数，而是对着少掉多少人工进入、首次远程评估更快多少、以及复产决策提速多少。
businessModel:
  revenueStreams:
  - 受监督机器人作业与放行证据的年度站点软件订阅。
  - 真实事故、演练和事后复盘事件的使用费。
  - 保险报告、多站点对标和额外流程模板的高级模块。
  unitOfValue: 运行“机器人优先”危险进入流程的受保护设施。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一炼油网络内覆盖更多装置和流程。
  - 从炼油厂事故流程扩到日常危险进入检查和季度演练项目。
  - 在炼油厂验证后，扩到燃气处理厂、LNG 设施和相邻关键基础设施站点。
strategyMap:
  northStarMetric: 完成并产出可用于人员回场审核的放行包的“机器人优先”演练或事故次数。
  inputMetrics:
  - 从事故宣告到首次远程评估的时间。
  - 每站点每季度被接受的放行包数量。
  - 在目标流程里，暴露人员进入次数的下降幅度。
  - 试点转生产的转化率。
  - 跨越一种以上机器人或载荷类型执行的任务占比。
  moatsToBuild:
  - 绑着炼油厂专属任务手册的跨厂商适配器。
  - 映射到受限空间、PSM 和 RMP 流程的结构化放行包档案。
  - 把机器人观察、操作员覆盖与放行速度结果连起来的基准数据集。
  killCriteria:
  - 12 个月内签不下 2 个付费炼油厂共创客户。
  - 9 个月内没有任何试点客户在正式演练或事故后复盘里接受放行包。
  - 超过 70% 的目标账户坚持要求产品免费打包进某个 OEM 方案里，拒绝为独立软件单列预算。
  mermaid: |-
    flowchart LR
      Wedge[炼油厂演练与放行切口] --> MVP[证据优先的多机器人 MVP]
      MVP --> Proof[放行包被接受，远程评估更快]
      Proof --> Expansion[先做炼油厂多站点扩张，再进入燃气处理]
investorMemo:
  verdict:
    call: Watch
    conviction: 安全痛点很强，工作流切口也站得住，但在真实炼油厂买方把预算归属和打包风险验证清楚之前，确信度仍然封顶。
    whyBelieve: 产品落在一条强制性的回场与文档工作流里，买方本来就愿意花钱去减少人员暴露和停机。
    whyDoubt: 公司可能会发现，大部分预算在独立放行 OS 成形之前，就已经被 OEM 软件和集成商吃掉了。
    nextDiligence: 先拿下 2 个付费炼油厂共创客户，并在真实演练里证明至少 1 份被接受的放行包，再扩大 GTM 投入。
  firstCustomer:
    title: 已部署巡检机器人的墨西哥湾沿岸炼油厂应急响应项目
    profile: 大型炼油厂，按季度演练，存在危险区域巡检流程，而且至少已有一个机器人项目在不同控制台和人工日志之间产生割裂证据。
    trigger: 火灾、燃气泄漏、险情未遂、保险建议或安全要求，迫使站点在人员回场前把“机器人优先”响应手册正式化。
    buyer: 应急响应总监或运营完整性副总裁
    initialContract: 先签一个 $75k-$150k 的付费试点，锁定一个流程和一个站点；等平台被接受为放行证据记录系统后，再转成 $250k-$400k 的年度站点许可。
  mustBeTrue:
  - 前 5 家目标炼油厂里，至少有 3 家明确反馈：混厂商或混载荷的机器人流程已经很痛，而 OEM 工具解决不了。
  - 试点成功后，炼油厂买方愿意为独立或清晰列项的软件预算批出至少 $200k ACV。
  - 安全团队能在正式演练或事故后复盘里接受平台生成的放行包，而不要求承包商重新手工制作文档。
  - 支持前两到三个机器人平台，就能覆盖超过 70% 的近期目标部署。
  - 即便重大事故少，演练、就绪度和日常危险进入的使用频率也足以在 12 个月内证明 ROI。
  diligenceQuestions:
  - 今天这条工作流的预算线到底归谁：炼油运营、应急响应、可靠性团队，还是机器人 OEM 打包方案？
  - 当前目标账户里，有多少已经在同一危险流程里同时运行多种机器人、载荷或控制台？
  - 哪个首个流程最容易转成付费生产：燃气泄漏周界巡查、火灾后放行、受限空间侦察，还是阀门隔离核验？
  - 今天炼油厂厂长或保险方会接受什么格式的证据，作为回场审批的一部分？
  - 哪些 OEM 或集成商愿意转售一层中立工作流，而不是直接把它挡在门外？
operatingAssumptions:
- assumption: 早期炼油厂买方会愿意为独立或单列的软件层买单，而不是强行把它打包进机器人硬件里。
  basis: research.yaml
  validationTest: 至少完成 5 次买方 / 伙伴访谈，并拿到 2 份保留清晰软件行项目的书面试点提案。
  decisionImpact: 如果不成立，公司就得转向 OEM 主导分销、下调 ASP 预期，并优先优化伙伴经济模型而非直销。
- assumption: 头部两到三个机器人平台及载荷组合，能够覆盖大多数滩头部署。
  basis: operator judgment
  validationTest: 对前 15 个潜在线索做平台普查，确认至少 70% 落在首版适配路线图内。
  decisionImpact: 如果不成立，集成范围会膨胀过快，切口必须收窄到单一 OEM 或单一流程。
- assumption: 与其替换指挥控制系统，一款“证据优先”产品更容易先打进炼油厂运营。
  basis: research.yaml
  validationTest: 在保留现有指挥权不变的前提下，跑一个付费演练试点，用创业公司的系统承接放行文档。
  decisionImpact: 如果不成立，公司可能需要更偏服务的交付模型，或换一类买方角色。
- assumption: 即便重大事故不规则，演练与就绪度流程也能创造足够高的经常性使用频次，支撑六位数 ACV。
  basis: research.yaml
  validationTest: 在 3 个共创客户里衡量季度演练频次、危险进入检查频次和事后复盘需求。
  decisionImpact: 如果不成立，定价就得转向更低基础订阅、更高服务占比，或扩到相邻的日常巡检流程。
- assumption: 炼油厂场景一旦跑通，不需要重写产品，就能顺势扩到相邻燃气处理需求。
  basis: idea.yaml
  validationTest: 拿 1 个燃气处理共创机会去对照炼油厂 MVP，找出是否缺少合规或硬件要求。
  decisionImpact: 如果不成立，扩张会放慢，公司必须先把炼油厂单一市场做得更深再外延。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 位炼油厂运营方、机器人负责人和集成商，确认流程优先级与预算归属。
  hypothesis: 多机器人协同和可审计放行证据，是有预算的问题，而不只是“最好有”的功能。
  successMetric: 10 次访谈确认存在真实痛点，且 2 个潜在客户愿意进入付费试点范围界定。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 梳理前 15 个目标账户的机器人、载荷和控制台栈。
  hypothesis: 两到三个适配器就能覆盖大部分早期炼油厂机会。
  successMetric: 超过 70% 的目标部署落入首版适配路线图。
  owner: 创始工程师
- horizon: 0–90 天
  experiment: 用一家炼油厂顾问或合作伙伴的样例演练数据，做出放行包和事后回放原型。
  hypothesis: 证据格式是打进炼油厂正式流程最快的信任切口。
  successMetric: 至少有 1 位目标买方认为这份输出已经接近可用于内部演练或保险审核。
  owner: 产品负责人
- horizon: 90–180 天
  experiment: 在保留人工签核的前提下，围绕一个炼油厂流程跑 1 个付费演练试点。
  hypothesis: 在批准实时事故路由之前，买方会先为演练和就绪度价值付费。
  successMetric: 试点拿到付费，并产出 1 份被接受的放行包，同时进入年度生产使用的转化讨论。
  owner: 现场部署负责人
- horizon: 90–180 天
  experiment: 签下 1 个带清晰转售或转介绍动作的 OEM / 集成商伙伴。
  hypothesis: 硬件伙伴会认可一层中立证据层的价值，因为它能让机器人部署更容易留在客户流程里。
  successMetric: 签下 1 份商业协议，并从伙伴渠道拿到 1 个来源机会。
  owner: 创始人/CEO
- horizon: 6–12 个月
  experiment: 在首个生产站点，为 1 条已验证流程补上受监督实时任务路由。
  hypothesis: 一旦证据层被信任，同一买方就会继续买更高价值的指挥能力。
  successMetric: 至少 1 个站点开启实时受监督路由，并完成续费或超出试点范围的扩容。
  owner: 创始工程师
operations:
- 维护一套炼油厂专用任务手册库，覆盖燃气泄漏、受限空间、火灾后和阀门隔离流程。
- 优先支持 IECEx 或同等级认证的机器人集成，而不是自己承担危险区域硬件认证。
- 在可能情况下，把证据输出进客户现有的工业数据或数字孪生栈。
- 按季度做演练复盘，持续调手册，并衡量放行时间、人工进入下降和放行包接受率。
- 在每一次试点中，持续提供机器人遥测、操作员覆盖记录和审计链完整性的现场可靠性支持。
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责首批机器人适配器、任务状态模型和证据管线。
- role: 创始人/GTM
  startTiming: Month 0
  rationale: 负责炼油厂共创客户销售、采购推进和伙伴拓展。
- role: 现场部署负责人
  startTiming: Month 3
  rationale: 负责现场试点、客户流程集成，以及把“签试点”到“演练产出被接受”的周期压短。
- role: 产品与安全流程负责人
  startTiming: Month 6
  rationale: 负责把炼油厂真实运营中的任务手册、审批关口和放行包要求编码进系统。
- role: 企业客户经理
  startTiming: Month 9
  rationale: 在销售动作可复制后，把灯塔试点转成多站点合同。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2 个付费炼油厂共创客户。
  - 交付滩头账户使用的前两到三个机器人平台适配器。
  - 至少产出 1 份在正式演练或事故后复盘中被接受的放行包。
  - 把首个试点转成年度站点许可。
- horizon: 12–24 个月
  items:
  - 在统一产品基线上做到 3–5 个付费炼油站点。
  - 为至少 2 条已验证流程上线受监督实时任务路由。
  - 新增 1 个面向保险方的报告模块和 1 个工业数据集成模板。
  - 用炼油厂产品内核拿下首个燃气处理或相邻 LNG 试点。
- horizon: 24–36 个月
  items:
  - 做到 8 个或更多生产站点，与研究测算的第 3 年 SOM 对齐。
  - 上线多站点对标，覆盖放行时间、操作员覆盖和减少的暴露人员进入。
  - 与 OEM 或集成商建立至少 2 条可重复的渠道关系。
  - 证明在炼油切口之外，相邻危险基础设施场景也能带来扩张收入。
risks:
- risk: 安全团队可能要求很长的认证周期，才允许软件进入正式应急流程。
  likelihood: High
  impact: High
  mitigation: 先从演练、事后复盘和放行包切入，再去争实时任务路由控制权。
- risk: OEM 和集成商可能把编排功能打得足够紧，导致买方不愿为独立软件层付费。
  likelihood: Medium
  impact: High
  mitigation: 把定位放在厂商中立、被接受的放行证据和跨站点对标上——这些不是硬件打包能给的。
- risk: 硬件和载荷碎片化，可能让早期团队的集成成本过高。
  likelihood: High
  impact: Medium
  mitigation: 首发版只支持覆盖大多数滩头需求的平台，超出切口的定制适配直接不接。
- risk: 重大事故并不高频，容易让 ROI 看上去像“偶发收益”。
  likelihood: Medium
  impact: Medium
  mitigation: 围绕演练、就绪度复盘和日常危险进入流程定价，让价值在事故间隙也持续发生。
- risk: 扩到相邻能源细分时，所需流程变化可能比炼油厂 MVP 所支持的更大。
  likelihood: Medium
  impact: Medium
  mitigation: 在大规模扩市场前，先拿 1 个燃气处理账户去验证炼油厂路线图的适配度。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用这笔钱覆盖 18 个月的产品研发、炼油厂集成、付费共创客户试点，以及首批现场部署和 GTM 招聘，目标是证明：放行包能被接受，站点转化也能跑成可复制流程。
