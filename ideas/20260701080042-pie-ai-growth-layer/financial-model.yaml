modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      AgencySpend --> PaidPilot
      PaidPilot --> ProductionGroups
      ProductionGroups --> ActiveRooftops
      ActiveRooftops --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
      ProductionGroups --> BenchmarkData
      BenchmarkData --> PartnerChannel
      PartnerChannel --> ProductionGroups
modelSanity:
- checkName: Revenue engine
  finding: The base case grows from 2 to 50 paying groups while lifting each group to a blended $84K annual ARPU through usage and analytics on top of the $500-per-rooftop base subscription.
- checkName: Must go right
  finding: Deployments have to stay near the 45-day milestone so partner referrals can start scaling after month 24 without turning implementation into a services bottleneck.
- checkName: Model breaks if
  finding: If partner-channel proof slips by roughly two quarters or sales cycles stretch to about six months, the downside case takes cash below zero before year 3 finishes.
- checkName: Next-round proof
  finding: A seed round is justified once the company shows 12-18 paying groups, repeatable 45-day deployments, and one live partner-led distribution motion by month 24.
sanityChecks:
  ruleOf40: Y3 growth 267.6% + EBITDA margin -9.8% = 257.7% (helped by a small Y2 base).
  burnMultiple: Y2 burn multiple 1.5x improving to Y3 0.1x as revenue growth starts to absorb fixed payroll.
  revenuePerFte: $204.0K Y3 revenue per Q4Y3 FTE (benchmark $200-400K SaaS).
  flags:
  - Y1 gross margin is still pilot-heavy and only becomes software-like in Y2-Y3 as implementation labor is spread across more live groups.
  - The model assumes partner-led distribution starts helping after month 24; if that proof slips, sensitivity shows roughly a $420K Y3 revenue hit and a cash squeeze.
  - Revenue is still concentrated in about 50 multi-location groups by Q4Y3, so a handful of delayed rollouts or churned logos would move EBITDA materially.
  - The year-3 Rule of 40 reads strong mainly because Y2 revenue is a small base, not because the company is already fully mature on profitability.
