slug: auto-repair-answer-graph
date: '2026-07-01'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[business-plan.yaml date] the plan is dated 2026-07-01, so the model starts in the same full operating month.'
- id: A2
  name: Opening cash after pre-seed close
  value: '2500'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] base case underwrites a $2.5M close inside the stated $2-4M range.'
- id: A3
  name: Revenue unit
  value: Active paying repair group
  unit: definition
  source: '[business-plan.yaml market.som; businessModel.unitOfValue] milestones are group-based, while SOM assumes about 50 groups and 600 rooftops by month 36.'
- id: A4
  name: Average paid rooftops per group
  value: '12'
  unit: locations/group
  source: '[business-plan.yaml market.som; milestones 24-36 months] the plan defines month-36 scale as roughly 600 rooftops across about 50 groups.'
- id: A5
  name: Blended annual revenue per active paying group
  value: '84'
  unit: USDK/group-year
  source: '[business-plan.yaml gtm.pricing; businessModel.revenueStreams; research.yaml market.som] starts from 12 rooftops × $500 per rooftop-month ($72K base) plus modest setup, usage, and analytics mix.'
- id: A6
  name: Recognized monthly revenue per active paying group
  value: '7.0'
  unit: USDK/group-month
  source: '[Derived from A5] $84K annual blended ARPU equals $7.0K of recognized monthly revenue per active paying group.'
- id: A7
  name: Y1 month-end paying-group path
  value: 'M1-M5: 0; M6-M8: 1; M9-M12: 2'
  unit: groups
  source: '[business-plan.yaml milestones 0-12 months] first paid pilot launches by month 6 and at least 2 groups convert to annual contracts by month 12.'
- id: A8
  name: Y2 quarter-end paying-group path
  value: Q1Y2 5; Q2Y2 9; Q3Y2 13; Q4Y2 18
  unit: groups
  source: '[business-plan.yaml milestones 12-24 months] reaches the stated 8-12 production groups by month 18 and carries a partner-ready proof set by month 24.'
- id: A9
  name: Y3 quarter-end paying-group path
  value: Q1Y3 26; Q2Y3 34; Q3Y3 42; Q4Y3 50
  unit: groups
  source: '[business-plan.yaml milestones 24-36 months; market.som] matches the month-30 goal of 25-35 groups and the month-36 SOM case of about 50 groups / 600 rooftops.'
- id: A10
  name: Revenue recognition timing
  value: Midpoint customer count within each month or quarter
  unit: policy
  source: '[startup-finance heuristic] new paying groups are assumed to land evenly through each period rather than all on day one.'
- id: A11
  name: Underwritten long-term gross margin
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] unit economics are underwritten to the stated 70% software-like target.'
- id: A12
  name: Variable service-delivery cost
  value: '22'
  unit: percent of revenue
  source: '[startup-finance heuristic anchored to business-plan.yaml operations] covers call-routing, listings, monitoring, hosting, and QA vendors tied to live accounts.'
- id: A13
  name: Implementation payroll allocation
  value: 35% COGS / 30% S&M / 35% G&A once revenue is live
  unit: allocation
  source: '[business-plan.yaml team Implementation and customer success lead; operations] early implementation labor both delivers the service and supports renewals/reporting.'
- id: A14
  name: Monthly churn
  value: '2.0'
  unit: percent
  source: '[startup-finance heuristic] multi-location operators should be fairly sticky after go-live, but budget-replacement and attribution trust still create early logo risk.'
- id: A15
  name: CEO / automotive GTM loaded compensation
  value: '160'
  unit: USDK/year
  source: '[business-plan.yaml team Founding CEO] below-market founder cash compensation plus payroll burden.'
- id: A16
  name: Engineering loaded compensation
  value: '190'
  unit: USDK/year/FTE
  source: '[business-plan.yaml team Founding eng; Integrations and data engineer] startup-finance heuristic for product plus data-integration hires.'
- id: A17
  name: Implementation / CS loaded compensation
  value: '145'
  unit: USDK/year/FTE
  source: '[business-plan.yaml team Implementation and customer success lead] startup-finance heuristic for deployment-heavy early customer success talent.'
- id: A18
  name: Product / analytics loaded compensation
  value: '150'
  unit: USDK/year/FTE
  source: '[business-plan.yaml team Product manager / analyst] startup-finance heuristic for product analytics leadership in a vertical SaaS wedge.'
- id: A19
  name: Partnerships loaded compensation
  value: '165'
  unit: USDK/year/FTE
  source: '[business-plan.yaml team Partnerships lead] startup-finance heuristic for channel development with travel and co-sell overhead.'
- id: A20
  name: Sales loaded compensation
  value: '180'
  unit: USDK/year/FTE
  source: '[business-plan.yaml strategicChoices.sequencingRationale; milestones 12-24 months] first quota-carrying hires arrive only after direct pilots show repeatable ROI.'
- id: A21
  name: G&A / ops loaded compensation
  value: '130'
  unit: USDK/year/FTE
  source: '[startup-finance heuristic anchored to business-plan.yaml operations] lean finance and operations support is added only once the team reaches double-digit FTE.'
- id: A22
  name: Hiring cadence
  value: M1 CEO and founding eng; M2 second engineer; M4 implementation / CS; M6 product / analytics; M9 partnerships; M15 third engineer; M18 first sales hire; M20 ops; M22 second implementation hire; M27 second sales hire; M30 fourth engineer; M33 second partnerships hire; M34 third implementation hire.
  unit: timing
  source: '[business-plan.yaml team; strategicChoices.sequencingRationale; milestones] follows the explicit first-year plan and only adds GTM capacity once deployments and ROI proof exist.'
- id: A23
  name: Functional payroll allocation
  value: CEO 70% S&M / 30% G&A; engineering 100% R&D; implementation 35% COGS / 30% S&M / 35% G&A; product 100% R&D; partnerships 75% S&M / 25% G&A; sales 100% S&M; ops 100% G&A.
  unit: allocation
  source: '[business-plan.yaml team rationales; operations] maps each role to the work it directly performs in the go-to-market and delivery motion.'
- id: A24
  name: Non-payroll operating spend policy
  value: Y1 S&M = $5K/month + 5% of revenue, R&D = $6K/month, G&A = $7K/month; Y2 S&M = $7K/month + 6% of revenue, R&D = $7K/month, G&A = $8K/month; Y3 S&M = $9K/month + 7% of revenue, R&D = $8K/month, G&A = $9K/month.
  unit: USDK/month
  source: '[startup-finance heuristic anchored to business-plan.yaml operations, risks, and fundingAsk.useOfFundsSummary] covers cloud, travel, legal, QA, and partner enablement overhead.'
- id: A25
  name: Cash conversion policy
  value: EBITDA approximates operating cash movement
  unit: policy
  source: '[startup-finance heuristic] the model excludes debt, capex, taxes, and material working-capital swings at this stage.'
- id: A26
  name: Funding runway target
  value: '24'
  unit: months
  source: '[business-plan.yaml fundingAsk.runwayMonths] the plan asks for 18 months of execution, and this stage adds the required 6-month buffer.'
- id: A27
  name: Next-round milestone
  value: Reach 12-18 paying groups, standardize 45-day deployments, and sign one partner-led distribution proof by month 24.
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] this is the proof package sized into the round.'
- id: A28
  name: Blended CAC
  value: '28'
  unit: USDK/new paying group
  source: '[business-plan.yaml gtm.channels; gtm.funnelTargets; market.buyingProcess] founder-led enterprise selling with some partner referrals keeps CAC below one-third of annual ARPU in the base case.'
