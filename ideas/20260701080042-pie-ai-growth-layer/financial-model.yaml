scenarios:
  downside:
    description: Partner contribution slips by roughly two quarters, blended ARPU falls back toward base subscription only, and group growth ends the year below the 50-group SOM case.
    y3RevenueK: 2125.0
    y3EbitdaK: -770.0
    cashLowPointK: -340.0
    keyAssumptionChanges:
    - Y3 exits at 38 paying groups instead of 50.
    - Blended annual ARPU falls to about $78K per group because usage and analytics upsell underperforms.
    - Partner-led pipeline does not contribute meaningful volume until late Y3.
  base:
    description: Founder-led pilots convert on time, one partner proof starts helping after month 24, and the company reaches the researched 50-group / 600-rooftop SOM case by Q4Y3.
    y3RevenueK: 2856.0
    y3EbitdaK: -281.3
    cashLowPointK: 197.5
    keyAssumptionChanges:
    - Blended annual ARPU holds at about $84K per paying group.
    - Partner-led distribution begins to contribute after month 24.
    - Hiring remains milestone-gated rather than front-loaded.
  upside:
    description: 45-day deployments become repeatable sooner, partner referrals start in Y2, and more groups expand to the full rooftop footprint by year 3.
    y3RevenueK: 3454.0
    y3EbitdaK: 250.0
    cashLowPointK: 380.0
    keyAssumptionChanges:
    - Y3 exits at 60 paying groups instead of 50.
    - Blended annual ARPU rises to about $88K per group as usage and analytics attach rates improve.
    - Partner-sourced pipeline begins contributing during Y2 rather than only after month 24.
