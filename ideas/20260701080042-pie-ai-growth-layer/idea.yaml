topRisks:
  - name: "Platform dependency"
    description: "ChatGPT, Google Maps, or other answer surfaces could change how they ingest local merchant data, reducing short-term visibility gains."
    mitigation: "Publish merchant truth to owned pages and major directories, track attribution across multiple surfaces, and prove ROI on calls or bookings rather than any single ranking metric."
  - name: "Operational data quality"
    description: "Shop-management data on services, schedules, and location facts may be incomplete or inconsistent enough to weaken recommendation accuracy early."
    mitigation: "Start with read-only connectors for one service line, require human approval for sensitive facts, and build data-quality scoring before broad automation."
  - name: "Channel capture by incumbents"
    description: "Vertical software vendors or agencies may bundle lighter AI-discovery features once the category proves valuable."
    mitigation: "Launch in one high-value vertical, win on cross-surface measurement and conversion data, and offer partner or white-label distribution instead of fighting every channel head-on."
