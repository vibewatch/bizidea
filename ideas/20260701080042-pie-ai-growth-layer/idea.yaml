differentiator: >-
  Agencies and listing tools optimize static profiles, reviews, and keywords.
  They do not own the operational truth that actually determines whether an AI
  assistant should recommend one repair shop for brakes or ADAS work over
  another. This company sits between shop-management software and discovery
  surfaces, building a proprietary dataset on which live service facts, answer
  patterns, and call-intake flows convert into booked jobs by market and
  location.
