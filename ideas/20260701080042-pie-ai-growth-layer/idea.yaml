problem: >-
  Multi-location auto repair groups still buy local demand through agencies,
  manual Google and Yelp updates, and overworked front-desk staff, even as
  consumers start asking ChatGPT-style assistants where to get brakes, tires,
  or ADAS work done nearby. The facts that actually matter for these choices —
  certifications, warranty terms, financing, service mix, neighborhood
  coverage, and near-term availability — live inside shop-management systems
  and phone logs, not in marketing tools. As a result, shops pay for
  visibility but still show stale or generic answers across AI and directory
  surfaces, then lose high-intent calls to missed routing or weak intake.
targetUser:
  primary: "Owner-operators and growth leaders at 3-20 location independent auto repair groups using Tekmetric and competing for brake, tire, and ADAS jobs."
  secondary: "Store managers and front-desk teams responsible for call handling, scheduling, and local-profile upkeep."
  buyer: "CEO or VP Operations at the shop group."
startupThesis:
  nonObviousInsight: >-
    Local AI discovery will not be won by generic SEO content. As assistants
    start recommending businesses directly, the decisive input becomes fresh
    operational truth — what a shop actually services, how fast it can take
    work, what certifications and warranties it offers, and how reliably it
    answers the phone. That data already exists inside vertical shop software,
    which means the next acquisition winner looks more like an embedded data
    layer than another marketing agency.
  beachhead: >-
    U.S. independent auto repair groups with 3-20 locations, Tekmetric as the
    shop-management system, and recurring spend on agencies to fill brake,
    tire, and ADAS calibration bays from local inbound demand
  wedge: >-
    An answer-graph layer that syncs live service, certification, financing,
    warranty, and scheduling data from each shop into AI-readable location
    pages, directory updates, and attributed call or booking flows
  whyNowCatalyst: >-
    Pie's funding, 2,000-customer stealth traction, AI-search positioning, and
    Tekmetric-centered distribution show that Main Street merchants are already
    reallocating spend toward AI recommendation visibility and measurable
    demand capture.
  ventureScalePath: >-
    Start with auto repair, then expand the same merchant-truth and conversion
    layer into beauty, fitness, pet care, and other appointment-heavy local
    verticals through their software partners, ultimately becoming the
    machine-readable growth infrastructure for Main Street commerce.
solution: >-
  The product connects to Tekmetric, call-tracking, scheduling, reviews, and
  website content to build a live answer graph for every location: which jobs
  the shop actually performs, which technicians and certifications it has,
  what warranties or financing it offers, and how quickly it can book
  high-margin services. It automatically publishes structured location pages
  and local-data feeds, then tests how AI assistants and map surfaces describe
  the business, flagging stale or hallucinated claims before they cost a
  booking. When an inquiry comes in, the system attributes whether it
  originated from AI search, maps, or a directory and routes the caller into a
  guided intake and scheduling flow for the right service line. Operators can
  compare booked-job yield by answer content, location, and service category
  instead of guessing which agency work actually matters. The first ROI is
  fuller bays and lower cost per booked brake, tire, or ADAS job, not vanity
  traffic metrics.
goToMarketSeed:
  firstCustomer: >-
