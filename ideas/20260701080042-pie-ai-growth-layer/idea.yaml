    trying to fill brake, tire, or ADAS capacity through inbound local calls
  buyingTrigger: >-
    Renewal of a $2,500 to $5,000 per month agency contract, opening a new
    store, or a push to fill underutilized high-margin bays before a seasonal
    slowdown
  currentAlternative: >-
    Local SEO agencies, Google Business Profile and Yelp management tools,
    manual website updates, and human receptionists or generic call-center
    software
  switchingReason: >-
    The wedge connects live shop-management data to discovery and booking, so
    the first customer gets more qualified calls and fewer stale answers
    without replacing its operating system or paying another opaque retainer
  pricingHypothesis: >-
    Monthly subscription per location plus usage-based fees for attributed
    calls or booked jobs, with premium pricing for multi-location analytics
    and partner integrations
