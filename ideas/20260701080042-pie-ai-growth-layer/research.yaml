    - 27
    - 40
  geographicConsiderations:
  - point: The U.S. is the clearest first market because the aftermarket is large and growing, Google Business Profile is central to local discovery, and the Tekmetric or agency ecosystem is U.S.-centric.
    sourceRefs:
    - 29
    - 33
    - 34
  - point: Multi-location groups benefit disproportionately because they need local variation with centralized brand control across every market.
    sourceRefs:
    - 6
    - 14
    - 37
  sensitivityCases:
  - case: AI discovery remains secondary to Google Maps and classic search.
    impact: The product still works as a structured local-presence and attribution layer, but growth relies more on Google and Maps lift than on entirely new AI channels.
    sourceRefs:
    - 26
    - 27
    - 29
    - 30
  - case: Tekmetric data access is thinner or dirtier than expected.
    impact: Onboarding becomes services-heavy, rollout slows, and the moat shifts from software leverage to data-cleanup execution.
    sourceRefs:
    - 6
    - 8
    - 9
    - 10
  - case: Incumbents bundle AI visibility into existing suites.
    impact: Differentiation must move to service-line truth, multi-location governance, and booked-job measurement rather than generic listings management.
    sourceRefs:
    - 11
    - 18
    - 21
    - 24
  validationPlan:
  - priority: high
    question: What share of inbound bookings at a 5-15 location Tekmetric group already originates from AI assistants versus Google Maps, organic search, and existing directories?
    evidenceToGather: Call recordings, booking logs, Search Console or analytics, Google Business Profile insights, and prompt-monitoring by location and service line.
  - priority: high
    question: Which fields inside Tekmetric can be synced cleanly enough to publish trustworthy service, warranty, financing, and availability facts?
    evidenceToGather: API or object inventory, sample exports, and a per-location data-quality audit on one pilot group.
  - priority: medium
    question: How much current agency and front-desk spend can be displaced within one contract-renewal cycle?
    evidenceToGather: Invoices, staffing time studies, missed-call rates, and booked-job yield by channel before and after a pilot.
  - priority: medium
    question: Do operators trust software-generated attribution enough to reduce or cancel incumbent vendors?
    evidenceToGather: Pilot scorecards, buyer interviews, and before/after service-line revenue deltas across several locations.
