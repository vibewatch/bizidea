    - 21
  - friction: Front-desk workflow change and staff trust in automation
    severity: medium
    affectedBuyer: Service advisors and front desk
    mitigation: Use AI to guide and score intake before fully automating answers or bookings.
    sourceRefs:
    - 5
    - 12
    - 15
  - friction: Platform policy volatility across Google and review surfaces
    severity: medium
    affectedBuyer: Marketing lead
    mitigation: Publish to owned pages plus major listings, preserve human approval for sensitive claims, and audit profiles regularly.
    sourceRefs:
    - 26
