    - 12
    - 15
    - 21
  dataMoats:
  - point: A cross-location answer graph that links services, schedules, financing, warranties, and reviews to actual recommendation outcomes compounds faster than any one shop or agency can replicate.
    sourceRefs:
    - 4
    - 6
    - 7
    - 30
    - 31
  - point: Service-line call transcripts and lead-viability scoring create proprietary conversion data that generic listings tools do not see.
    sourceRefs:
