openQuestions:
- Which Tekmetric objects and permissions are actually available in production for service catalogs, technician certifications, financing flags, warranties, and schedule availability?
- What percentage of booked brake, tire, and ADAS work at a target group currently originates from AI assistants versus Google Maps, organic search, and existing directories?
- How much improvement in booked-job attribution must a pilot show before an operator will cancel or materially shrink an agency retainer?
- Which TCPA, texting-consent, and call-recording obligations become the gating factor for multi-state AI receptionist rollouts?
