competitors:
- name: Pie
  stage: scale-up
  wedge: AI Search + Growth + AI Front Desk for local-service SMBs, distributed through vertical software partners.
  pricing: Custom / demo-led; no stable public package pricing observed.
  strength: Most explicit AI-search narrative in the set, plus traction and partner validation around calls, bookings, and sales lift.
  weaknessVsUs: Broad SMB platform rather than a repair-specific answer graph built around live Tekmetric truth and service-line attribution.
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
  - 5
- name: KUKUI
  stage: incumbent
  wedge: Auto-repair-specific websites, CRM, reviews, AI call insights, and scheduler tools.
  pricing: Website / CRM / Pro / Pro Plus / Enterprise plans, quote-led.
  strength: Deep automotive focus, Tekmetric integration, and explicit positioning around reviews, AI visibility, and multi-location growth.
  weaknessVsUs: Suite remains marketing-centric; it is not framed as a neutral answer graph and attribution layer across AI surfaces.
  sourceRefs:
  - 11
  - 12
  - 13
  - 14
- name: Podium
  stage: scale-up
  wedge: AI lead generation, AI employee, reviews, and appointment response across local businesses and automotive.
  pricing: Demo-led for automotive; no stable public per-location auto package visible in this run.
  strength: Large installed base and strong proof that faster response and AI-assisted appointment handling move outcomes.
  weaknessVsUs: Horizontal response platform with strong dealership examples, but weaker ownership of repair-specific operational truth.
  sourceRefs:
  - 15
  - 16
  - 17
- name: Yext
  stage: incumbent
  wedge: Knowledge graph, listings, pages, reviews, and Scout AI-search visibility monitoring for multi-location brands.
  pricing: Package-based enterprise comparison; pricing is mostly custom rather than public list price.
  strength: Closest analog to an answer-graph platform and already shipping AI-search visibility workflows.
  weaknessVsUs: Heavier enterprise and horizontal motion, with less direct connection to shop-management data and booked repair outcomes.
  sourceRefs:
  - 18
  - 19
  - 20
  - 40
- name: Broadly
  stage: scale-up
  wedge: SMB-local growth stack spanning reviews, conversations AI, web chat, local SEO, and automotive-service templates.
  pricing: Public pricing page anchors the platform at roughly $26/day.
  strength: Clear SMB value proposition, automotive-service positioning, and Tekmetric partnership.
  weaknessVsUs: General local-growth toolkit rather than a repair-specific truth layer tied to service-line discovery and job conversion.
  sourceRefs:
  - 21
  - 22
  - 23
