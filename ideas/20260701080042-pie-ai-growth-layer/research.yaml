  adoptionFrictionMatrix:
  - friction: Inconsistent location-level data across service menus, warranties, financing, and schedules
    severity: high
    affectedBuyer: VP Operations
    mitigation: Start with one service line and read-only sync, then add data-quality scoring before auto-publication.
