market:
  tam:
    value: $90.0M
    rationale: 15,000 Tekmetric-served shops proxy [3] × estimated $500 per location per month ($6,000 per year), priced below Broadly’s roughly $26/day full-stack benchmark [21] = about $90.0M.
    isEstimate: true
    sourceRefs:
    - 3
    - 21
  sam:
    value: $31.5M
    rationale: 'Apply a 35% beachhead filter for 3-20 location groups using Tekmetric, informed by Tekmetric’s multi-location focus and KUKUI’s multi-location benchmark dataset [6][14]: 5,250 locations × $6,000 per year = about $31.5M.'
    isEstimate: true
    sourceRefs:
    - 6
    - 14
    - 21
  som:
    value: $3.6M
    rationale: Year-3 reach of 600 rooftops (roughly 50 groups averaging 12 locations) via partner-led and agency-replacement pilots [6][10][21][37] × $6,000 per year = about $3.6M.
    isEstimate: true
    sourceRefs:
    - 6
    - 10
    - 21
    - 37
