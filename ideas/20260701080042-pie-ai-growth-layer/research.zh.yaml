  pestle:
  - factor: economic
    impact: positive
    point: 底层服务需求庞大且仍在增长，美国轻型车后市场预计 2025 年达到 4,350 亿美元，更广义的汽车养护行业 2025 年增速预计为 5.1%。
    sourceRefs:
    - 33
    - 34
