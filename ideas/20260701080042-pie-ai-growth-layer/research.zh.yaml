    sourceRefs:
    - 4
    - 18
    - 26
    - 30
  - factor: legal
    impact: negative
    point: 点评造假、误导性商户信息和违反政策的行为，现在都面临更明确的 Google 和 FTC 执法风险。
    sourceRefs:
    - 29
    - 32
  - factor: political
    impact: negative
    point: 贸易和关税的不确定性仍然会体现在后市场预测里，即便整体需求依然健康，也可能收紧中小企业的预算。
    sourceRefs:
    - 34
  adoptionFrictionMatrix:
  - friction: 服务项目、质保、分期和排期在各门店之间的数据不一致
    severity: high
    affectedBuyer: 运营副总裁
    mitigation: 先从一条服务线和只读同步做起，在自动发布之前先加上数据质量评分。
    sourceRefs:
    - 6
    - 7
    - 14
    - 30
    - 31
  - friction: 习惯了不透明代理报表的运营者对归因结果心存怀疑
    severity: high
    affectedBuyer: CEO 或业主运营者
    mitigation: 在试点看板里把 AI 可见度和来电、已预约和已完成的维修工单直接绑定。
    sourceRefs:
    - 4
    - 12
    - 21
  - friction: 前台工作流变动，以及员工对自动化的信任问题
    severity: medium
    affectedBuyer: 服务顾问与前台
    mitigation: 先用 AI 引导和评分接待过程，再考虑把答案或预约完全自动化。
    sourceRefs:
    - 5
    - 12
    - 15
  - friction: Google 和点评渠道的平台政策变动
    severity: medium
    affectedBuyer: 营销负责人
    mitigation: 同时发布到自有页面和主要目录，敏感信息保留人工审核，并定期审计商户资料。
    sourceRefs:
    - 26
    - 29
    - 32
