competitors:
- name: Pie
  stage: 扩张期
  wedge: 面向本地服务中小企业的 AI Search + Growth + AI Front Desk，通过垂直软件合作伙伴分发。
  pricing: 定制定价 / 需预约演示；未观察到稳定的公开套餐价格。
  strength: 在这一组竞品里 AI 搜索叙事最明确，还有围绕电话量、预约量和销售增长的业务牵引与合作伙伴背书。
  weaknessVsUs: 是一个宽泛的中小企业平台，而不是围绕 Tekmetric 实时真相和服务线归因打造的汽修专属问答图谱。
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
  - 5
- name: KUKUI
  stage: 现有厂商
  wedge: 汽修专属的网站、CRM、点评、AI 通话洞察和排期工具。
  pricing: 网站 / CRM / Pro / Pro Plus / Enterprise 套餐，需询价。
  strength: 深耕汽修行业，和 Tekmetric 打通集成，在点评、AI 可见度和多门店增长上定位明确。
  weaknessVsUs: 套件本质上仍以营销为中心，没有被定位成一层跨 AI 渠道的中立问答图谱与归因层。
  sourceRefs:
  - 11
  - 12
  - 13
  - 14
- name: Podium
  stage: 扩张期
  wedge: 面向本地商户和汽修行业的 AI 线索生成、AI 员工、点评和预约响应。
  pricing: 汽修方向需预约演示；本轮调研未看到稳定的公开按门店套餐价格。
  strength: 装机基础庞大，而且有力证明了更快响应和 AI 辅助预约处理确实能带来结果。
  weaknessVsUs: 是一个横向响应平台，经销商案例很强，但对汽修专属运营真相的掌控偏弱。
  sourceRefs:
  - 15
  - 16
  - 17
- name: Yext
  stage: 现有厂商
  wedge: 面向多门店品牌的知识图谱、目录、页面、点评，以及 Scout AI 搜索可见度监控。
  pricing: 按套餐做企业对比报价；价格大多是定制的，没有公开价目表。
  strength: 是最接近问答图谱平台的产品，而且已经在交付 AI 搜索可见度工作流。
  weaknessVsUs: 企业级和横向打法更重，和门店管理数据、维修预约结果的直接关联更弱。
  sourceRefs:
  - 18
  - 19
  - 20
  - 40
- name: Broadly
  stage: 扩张期
  wedge: 面向中小企业本地增长的技术栈，覆盖点评、对话式 AI、网页聊天、本地 SEO 和汽修服务模板。
  pricing: 公开定价页把平台价格锚定在约每天 26 美元。
  strength: 面向中小企业的价值主张清晰，汽修服务定位明确，还和 Tekmetric 建立了合作关系。
  weaknessVsUs: 是一套通用本地增长工具箱，而不是绑定服务线发现和工单转化的汽修专属真相层。
  sourceRefs:
  - 21
  - 22
  - 23
regulatoryTechnicalConstraints:
- point: Google 要求每个商户资料准确反映真实运营情况，不鼓励重复或误导性资料。
  sourceRefs:
  - 29
- point: 服务项目、营业时间和商户信息一旦以结构化数据发布，就必须持续保持规范和更新。
  sourceRefs:
  - 30
  - 31
- point: ADAS 标定相关的说法和路由涉及安全敏感问题，因为标定正在变成现代维修工作里的主流环节。
  sourceRefs:
  - 35
  - 36
validationSignals:
- point: Pie 称隐身期已经积累数千名中小企业客户，带来超过 10 万通电话，客户通常能录得 15% 到 20% 的同比销售增长。
  sourceRefs:
  - 1
  - 2
  - 3
- point: AI 本地发现已经可以被测量：BrightLocal 说 45% 的消费者会向 AI 询问商户推荐，Yext 说过去一个月里 47% 的美国成年人用过 AI 做本地搜索。
  sourceRefs:
  - 27
  - 40
- point: 独立门店已经把线上搜索当成核心预算科目，受访运营者里有 94% 在使用某种形式的线上搜索营销。
  sourceRefs:
  - 39
- point: KUKUI 的多门店分析认为，把沟通、营销归因和留存系统集中管理，和更快的增长速度相关。
  sourceRefs:
  - 14
openQuestions:
- 在生产环境里，Tekmetric 到底有哪些对象和权限，能实际支撑服务目录、技师认证、分期标记、质保和排期可用性？
- 目标连锁已预约的刹车、轮胎和 ADAS 工作里，目前有多少比例真正来自 AI 助手，而不是 Google Maps、自然搜索和现有目录？
- 试点在预约归因上必须证明多大的改善，运营者才会取消或大幅削减代理机构合同？
- 哪些 TCPA、短信授权和通话录音方面的义务，会成为多州部署 AI 前台的关键门槛？
