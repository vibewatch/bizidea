scenarios:
  downside:
    description: 合作伙伴贡献推迟约两个季度，综合 ARPU 回落到只剩基础订阅的水平，连锁数增长在年末低于 50 家连锁的 SOM 情景。
    y3RevenueK: 2125.0
    y3EbitdaK: -770.0
    cashLowPointK: -340.0
    keyAssumptionChanges:
    - 第 3 年年末付费连锁数为 38 家，而不是 50 家。
    - 综合年 ARPU 降到约每连锁 $78K，因为用量和分析模块的追加销售表现不及预期。
    - 合作伙伴渠道要到第 3 年后期才贡献有意义的规模。
  base:
    description: 创始人主导的试点按时转化，一个合作伙伴验证在第 24 个月后开始起作用，公司在第 3 年第 4 季度做到研究测算的 50 家连锁 / 600 家门店 SOM 情景。
    y3RevenueK: 2856.0
    y3EbitdaK: -281.3
    cashLowPointK: 197.5
    keyAssumptionChanges:
    - 综合年 ARPU 维持在每个付费连锁约 $84K。
    - 合作伙伴分发在第 24 个月后开始贡献。
    - 招聘按里程碑推进，而不是提前压满。
  upside:
    description: 45 天部署更早变得可复用，合作伙伴转介绍从第 2 年就开始起效，到第 3 年有更多连锁扩展到全部门店覆盖。
    y3RevenueK: 3454.0
    y3EbitdaK: 250.0
    cashLowPointK: 380.0
    keyAssumptionChanges:
    - 第 3 年年末付费连锁数为 60 家，而不是 50 家。
    - 综合年 ARPU 升到约每连锁 $88K，因为用量和分析模块的挂载率提升。
    - 合作伙伴来源的管道从第 2 年就开始贡献，而不用等到第 24 个月之后。
sensitivity:
- variable: ARPU
  downsideCase: 每个付费连锁年 ARPU $78K
