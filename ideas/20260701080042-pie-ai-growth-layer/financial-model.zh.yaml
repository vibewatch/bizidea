slug: auto-repair-answer-graph
date: '2026-07-01'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[business-plan.yaml date] 计划日期为 2026-07-01，模型从同一个完整运营月开始。'
- id: A2
  name: pre-seed 交割后期初现金
  value: '2500'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] 基准情景按 $2-4M 区间内的 $2.5M 交割额建模。'
- id: A3
  name: 收入计量单位
  value: 已付费的活跃汽修连锁客户
  unit: definition
  source: '[business-plan.yaml market.som; businessModel.unitOfValue] 里程碑按连锁数计，SOM 假设第 36 个月约 50 家连锁、600 家门店。'
- id: A4
  name: 每个连锁的平均付费门店数
  value: '12'
  unit: locations/group
  source: '[business-plan.yaml market.som; milestones 24-36 months] 计划把第 36 个月的规模定义为约 50 家连锁、共 600 家门店。'
- id: A5
  name: 每个已付费活跃连锁的综合年收入
  value: '84'
  unit: USDK/group-year
  source: '[business-plan.yaml gtm.pricing; businessModel.revenueStreams; research.yaml market.som] 起点是 12 家门店 × 每门店每月 $500（$72K 基础），再加上少量开通、用量和分析费用。'
- id: A6
  name: 每个已付费活跃连锁的月度确认收入
  value: '7.0'
  unit: USDK/group-month
  source: '[由 A5 推导] $84K 的综合年 ARPU，相当于每个已付费活跃连锁每月确认 $7.0K 收入。'
- id: A7
  name: 第 1 年月末付费连锁数路径
  value: 'M1-M5: 0; M6-M8: 1; M9-M12: 2'
  unit: groups
  source: '[business-plan.yaml milestones 0-12 months] 第 6 个月上线首个付费试点，第 12 个月至少 2 家连锁转为年度合同。'
- id: A8
  name: 第 2 年季末付费连锁数路径
  value: Q1Y2 5; Q2Y2 9; Q3Y2 13; Q4Y2 18
  unit: groups
  source: '[business-plan.yaml milestones 12-24 months] 第 18 个月达到计划所述的 8-12 家生产连锁，第 24 个月备好合作伙伴分发的验证材料。'
- id: A9
  name: 第 3 年季末付费连锁数路径
  value: Q1Y3 26; Q2Y3 34; Q3Y3 42; Q4Y3 50
  unit: groups
  source: '[business-plan.yaml milestones 24-36 months; market.som] 对应第 30 个月 25-35 家连锁的目标，以及第 36 个月约 50 家连锁 / 600 家门店的 SOM 情景。'
- id: A10
  name: 收入确认时点
  value: 按每个月或每个季度区间内的客户数中点确认
  unit: policy
  source: '[startup-finance heuristic] 假设新增付费连锁在每个区间内均匀落地，而不是第一天就全部到位。'
- id: A11
  name: 长期毛利率测算目标
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] 单位经济模型按计划所述 70% 的软件式目标建模。'
- id: A12
  name: 可变服务交付成本
  value: '22'
  unit: percent of revenue
  source: '[startup-finance heuristic，锚定 business-plan.yaml operations] 覆盖与已上线客户绑定的来电路由、目录、监控、托管和质检供应商费用。'
- id: A13
  name: 实施人力薪酬分摊
  value: 35% COGS / 30% S&M / 35% G&A once revenue is live
  unit: allocation
  source: '[business-plan.yaml team Implementation and customer success lead; operations] 早期实施人力既交付服务，也支持续约和报表工作。'
- id: A14
  name: 月流失率
  value: '2.0'
  unit: percent
  source: '[startup-finance heuristic] 多门店运营者上线后黏性应该较强，但预算替换和归因信任仍会带来早期流失风险。'
- id: A15
  name: CEO / 汽修 GTM 全额现金薪酬
  value: '160'
  unit: USDK/year
  source: '[business-plan.yaml team Founding CEO] 按低于市场价的创始人薪资，加上薪资负担建模。'
- id: A16
  name: 工程岗位全额现金薪酬
  value: '190'
  unit: USDK/year/FTE
  source: '[business-plan.yaml team Founding eng; Integrations and data engineer] 按产品加数据集成岗位的经验估算建模。'
- id: A17
  name: 实施 / 客户成功岗位全额现金薪酬
  value: '145'
  unit: USDK/year/FTE
  source: '[business-plan.yaml team Implementation and customer success lead] 按部署导向的早期客户成功岗位经验估算建模。'
- id: A18
  name: 产品 / 分析岗位全额现金薪酬
  value: '150'
  unit: USDK/year/FTE
  source: '[business-plan.yaml team Product manager / analyst] 按垂直 SaaS 切口里产品分析负责人的经验估算建模。'
- id: A19
  name: 合作岗位全额现金薪酬
  value: '165'
  unit: USDK/year/FTE
  source: '[business-plan.yaml team Partnerships lead] 按包含差旅和联合销售开销的渠道拓展岗位经验估算建模。'
- id: A20
  name: 销售岗位全额现金薪酬
  value: '180'
  unit: USDK/year/FTE
  source: '[business-plan.yaml strategicChoices.sequencingRationale; milestones 12-24 months] 第一位有配额压力的销售，要等直销试点证明可复用 ROI 之后才入场。'
- id: A21
  name: G&A / 运营岗位全额现金薪酬
  value: '130'
  unit: USDK/year/FTE
  source: '[startup-finance heuristic，锚定 business-plan.yaml operations] 只有团队规模达到两位数 FTE 后，才补上精简的财务和运营支持岗位。'
- id: A22
  name: 招聘节奏
  value: M1 招 CEO 和创始工程师；M2 招第二位工程师；M4 招实施 / 客户成功；M6 招产品 / 分析；M9 招合作；M15 招第三位工程师；M18 招第一位销售；M20 招运营；M22 招第二位实施岗位；M27 招第二位销售；M30 招第四位工程师；M33 招第二位合作岗位；M34 招第三位实施岗位。
  unit: timing
  source: '[business-plan.yaml team; strategicChoices.sequencingRationale; milestones] 遵循明确的第一年计划，只有在部署和 ROI 得到验证后才增加 GTM 人力。'
- id: A23
  name: 薪酬职能分摊
  value: CEO 70% S&M / 30% G&A；工程 100% R&D；实施 35% COGS / 30% S&M / 35% G&A；产品 100% R&D；合作 75% S&M / 25% G&A；销售 100% S&M；运营 100% G&A。
  unit: allocation
  source: '[business-plan.yaml team rationales; operations] 把每个岗位对应到它在市场拓展和交付环节里实际承担的工作。'
- id: A24
  name: 非薪酬运营支出政策
  value: 第 1 年 S&M = 每月 $5K + 收入的 5%，R&D = 每月 $6K，G&A = 每月 $7K；第 2 年 S&M = 每月 $7K + 收入的 6%，R&D = 每月 $7K，G&A = 每月 $8K；第 3 年 S&M = 每月 $9K + 收入的 7%，R&D = 每月 $8K，G&A = 每月 $9K。
  unit: USDK/month
  source: '[startup-finance heuristic，锚定 business-plan.yaml operations、risks 与 fundingAsk.useOfFundsSummary] 覆盖云服务、差旅、法务、质检和合作伙伴赋能开销。'
- id: A25
  name: 现金转换口径
  value: EBITDA 近似等于经营现金变动
  unit: policy
  source: '[startup-finance heuristic] 当前阶段模型不考虑债务、资本支出、税项或明显的营运资本波动。'
- id: A26
  name: 融资跑道目标
  value: '24'
  unit: months
  source: '[business-plan.yaml fundingAsk.runwayMonths] 计划要求 18 个月的执行期，这一阶段再加上所需的 6 个月缓冲。'
- id: A27
  name: 下一轮融资里程碑
  value: 到第 24 个月做到 12-18 家付费连锁，把部署标准化到 45 天，并签下一份合作伙伴分发验证。
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] 这是本轮融资规模对应的验证包。'
- id: A28
  name: 综合 CAC
  value: '28'
  unit: USDK/new paying group
  source: '[business-plan.yaml gtm.channels; gtm.funnelTargets; market.buyingProcess] 创始人主导的企业销售加上部分合作伙伴转介绍，让基准情景下 CAC 保持在年度 ARPU 三分之一以下。'
