modelSanity:
- checkName: 收入引擎
  finding: 基准情景下，付费连锁数从 2 家增长到 50 家，同时靠在每门店 $500 基础订阅之上叠加用量和分析费用，把每个连锁的综合年 ARPU 拉到 $84K。
- checkName: 必须跑通的事
  finding: 部署必须稳定在 45 天左右，这样合作伙伴转介绍才能在第 24 个月后开始放量，同时不让实施变成服务瓶颈。
- checkName: 模型失效条件
  finding: 如果合作伙伴渠道的验证推迟约两个季度，或者销售周期拉长到约六个月，下行情景里现金会在第 3 年结束前转负。
- checkName: 下一轮融资证明
  finding: 一旦公司在第 24 个月前做到 12–18 家付费连锁、可复用的 45 天部署，并跑通一个正在运行的合作伙伴分发动作，seed 轮的故事就站得住。
sanityChecks:
  ruleOf40: 第 3 年增长 267.6% + EBITDA 利润率 -9.8% = 257.7%（得益于较小的第 2 年基数）。
  burnMultiple: 第 2 年 burn multiple 1.5x，到第 3 年改善至 0.1x，因为收入增长开始消化固定薪酬支出。
  revenuePerFte: 按第 3 年第 4 季度 FTE 计算的人均收入为 $204.0K（SaaS 基准区间 $200-400K）。
  flags:
  - 第 1 年毛利率仍然偏试点、偏重人力，要到第 2-3 年随着实施人力摊薄到更多已上线连锁上，才会变得像软件公司。
  - 模型假设合作伙伴分发在第 24 个月后开始起效；如果这个验证推迟，敏感性分析显示第 3 年收入会受到约 $420K 的冲击，现金也会吃紧。
  - 到第 3 年第 4 季度，收入仍集中在约 50 家多门店连锁身上，只要有几家上线延迟或流失，EBITDA 就会明显波动。
  - 第 3 年的 Rule of 40 数字看着很强，主要是因为第 2 年收入基数小，而不是公司在盈利能力上已经完全成熟。
