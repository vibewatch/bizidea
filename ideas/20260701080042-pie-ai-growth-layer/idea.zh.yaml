problem: 多门店汽修连锁至今还在靠代理机构、手动更新 Google 和 Yelp、外加连轴转的前台去买本地需求——即便消费者已经开始问 ChatGPT 式的助手，附近哪里能修刹车、换轮胎、做 ADAS 标定。真正决定这些选择的事实——认证资质、质保条款、分期方案、服务范围、覆盖社区和近期可预约时段——都躺在门店管理系统和电话记录里，不在营销工具里。结果是：门店花钱买曝光，AI 和目录页面上给出的答案却还是过时或笼统，高意向来电又因为路由出错或接待不到位而白白流失。
targetUser:
  primary: 使用 Tekmetric、拥有 3–20 家门店、在刹车、轮胎和 ADAS 业务上正面竞争的独立汽修连锁的业主运营者和增长负责人。
  secondary: 负责接听电话、排期和维护本地商户资料的门店经理与前台团队。
  buyer: 连锁集团的 CEO 或运营副总裁。
startupThesis:
  nonObviousInsight: 本地 AI 发现这场仗，靠泛泛的 SEO 内容赢不了。一旦助手开始直接推荐商户，起决定作用的就变成了新鲜的运营真相——门店到底能修什么、多快能接单、有什么认证和质保、接电话靠不靠谱。这些数据早就躺在垂直门店软件里——下一个赢家更像一层嵌入式数据层，而不是又一家营销代理。
  beachhead: 美国拥有 3–20 家门店、用 Tekmetric 做门店管理系统、并持续给代理机构花钱以填满刹车、轮胎和 ADAS 标定工位的独立汽修连锁
  wedge: 一层问答图谱：把每家门店的实时服务、认证、分期、质保和排期数据，同步进 AI 可读的门店页面、目录更新，以及可归因的来电与预约流程
  whyNowCatalyst: Pie 的融资、隐身期 2,000 名客户的牵引、AI 搜索定位，以及围绕 Tekmetric 的分发渠道，都说明社区商户已经在把预算挪向 AI 推荐可见度和可衡量的需求捕获。
  ventureScalePath: 从汽修切入，再把同一层商户真相与转化能力，通过软件合作伙伴延展到美容、健身、宠物护理等预约密集的本地行业，最终成为社区商业机器可读的增长基础设施。
solution: 产品接入 Tekmetric、通话追踪、排期、点评和网站内容，给每家门店建一张实时问答图谱：门店到底能做哪些活、有哪些技师和认证、提供什么质保或分期方案、高毛利服务能多快约上。它会自动发布结构化的门店页面和本地数据源，再去检验 AI 助手和地图端到底是怎么描述这家门店的，在过时或臆造的说法造成流单之前先标出来。有来电或咨询进来时，系统会归因它到底是从 AI 搜索、地图还是目录来的，再把来电者导向对应服务线的引导式接待和排期流程。运营者可以按答案内容、门店和服务品类对比预约转化率，不用再猜代理机构那些工作到底哪些真起作用。第一波 ROI 是工位排满、单个刹车、轮胎或 ADAS 预约的获客成本下降，而不是好看却没用的流量数字。
goToMarketSeed:
  firstCustomer: 一家位于阳光地带、拥有 5–15 家门店、使用 Tekmetric 的汽修连锁，每家门店每月在代理机构和前台人力上花费 5,000 美元以上，正试图靠本地来电填满刹车、轮胎或 ADAS 产能
  buyingTrigger: 每月 2,500 到 5,000 美元的代理合同到期续约、新店开业，或是想在旺季转淡之前先把闲置的高毛利工位填满
  currentAlternative: 本地 SEO 代理机构、Google Business Profile 和 Yelp 管理工具、手动更新的网站，以及人工前台或通用呼叫中心软件
  switchingReason: 这个切口把实时门店管理数据直接连到发现和预约环节，第一个客户不用换掉自己的运营系统，也不用再付一份看不透的月费，就能拿到更多合格来电、更少过时答案
  pricingHypothesis: 按门店收月度订阅费，再加上按归因来电或预约工单计费的用量费用，多门店分析和合作伙伴集成走高级定价
