topRisks:
- name: 平台依赖
  description: ChatGPT、Google Maps 或其他答案渠道随时可能改变摄取本地商户数据的方式，短期内的可见度收益就会被削弱。
  mitigation: 把商户真相同时发布到自有页面和主要目录上，跨多个渠道追踪归因，用来电和预约量而不是单一排名指标证明 ROI。
- name: 运营数据质量
  description: 门店管理系统里关于服务、排期和门店信息的数据，早期可能不够完整或不够一致，削弱推荐的准确度。
  mitigation: 先给一条服务线接只读连接器，敏感信息要求人工审核，在大范围自动化之前先建好数据质量评分机制。
- name: 渠道被现有厂商截胡
  description: 一旦这个品类被证明有价值，垂直软件厂商或代理机构可能会把轻量版 AI 发现功能直接打包进自己的产品。
  mitigation: 先在一个高价值垂直行业落地，靠跨渠道的测量和转化数据取胜，用合作或白标分发的方式，而不是和每条渠道正面硬刚。
