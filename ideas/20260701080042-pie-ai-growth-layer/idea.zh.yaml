differentiator: 代理机构和目录工具优化的是静态资料、点评和关键词。它们并不掌握真正决定 AI 助手该把刹车或 ADAS 业务推荐给哪家门店的运营真相。这家公司卡位在门店管理软件和发现渠道之间，构建一套自有数据集——按市场和门店追踪哪些实时服务事实、哪种答案模式、哪类来电接待流程真能转化成预约工单。
