jobsToBeDone:
- job: 当一家汽修连锁的刹车、轮胎或 ADAS 工位有空档时，帮它的增长团队把每家门店准确的服务事实推给 AI 助手和地图端，这样才能靠更高意向的本地需求把工位填满。
  currentAlternative: 由代理机构和前台人工维护的网站与目录更新
  successMetric: 目标服务在每家门店的合格来电或预约量，以及单个预约工单的获客成本
- job: 当消费者通过 AI 搜索或目录找到门店并来电时，帮前台准确记录工单细节、快速安排预约，避免因为漏接电话或转错门店而丢单。
  currentAlternative: 人工前台、漏接短信回复工具和通用呼叫中心话术
  successMetric: 来电转预约的转化率和漏接放弃率
