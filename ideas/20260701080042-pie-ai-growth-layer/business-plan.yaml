slug: auto-repair-answer-graph
date: '2026-07-01'
executiveSummary: >-
  Multi-location independent auto repair groups already spend $2,500 to $5,000
  per month on agencies and additional front-desk labor, but the facts that now
  shape AI, map, and directory recommendations still sit inside Tekmetric,
  scheduling, and phone workflows rather than marketing tools. This company
  sells an answer-graph and conversion layer to U.S. Tekmetric-based repair
  groups with 3-20 locations that need to fill brake, tire, and ADAS capacity
  with attributable local demand. The first sale targets a 5-15 location group
  during an agency renewal, new-store opening, or seasonal utilization gap,
  when replacing opaque spend is easier than creating a new budget line. The MVP
  is intentionally narrow: sync one service line's live service, certification,
  warranty, financing, and scheduling truth into machine-readable location
  pages, listings updates, and attributed call-routing workflows. That wedge is
  faster to prove than a broad marketing suite because booked-job lift,
  missed-call reduction, and cost per booked job can be measured within one
  pilot cycle. Competition is real from Pie, KUKUI, Yext, Broadly, Podium, and
  agencies, but most alternatives own either marketing surfaces or response
  tooling rather than repair-specific operational truth plus closed-loop
  booked-job measurement. The core moat is a dataset linking location-specific
  service facts, answer quality, and intake performance to booked brake, tire,
  and ADAS jobs across rooftops. Two gaps still matter: research does not yet
  quantify what share of current demand truly originates from AI assistants
  versus Google and Maps, and live Tekmetric data quality must be proven on
  pilot accounts before the business deserves software-like margins or a broader
  cross-vertical expansion story.
problem:
  - >-
    Multi-location repair groups pay agencies and manual listing-management
    staff to drive local demand, but service mix, technician certifications,
    warranties, financing, and near-term availability are scattered across shop
    systems and phone workflows, so AI assistants and directories often surface
    stale or generic answers.
  - >-
    Front-desk teams still miss, misroute, or underspecify high-intent brake,
    tire, and ADAS calls, which leaves high-margin bays underfilled and makes it
    hard for operators to connect spend on visibility to actual booked jobs.
  - >-
    Existing substitutes—agencies, KUKUI, Yext, Broadly, Podium, and manual
    Google Business Profile updates—optimize pieces of discovery or response,
    but not the end-to-end loop from live operational truth to booked-job
    attribution.
solution:
  - >-
    A read-only Tekmetric, scheduling, and telephony connector builds a
    per-location answer graph for one target service line, normalizing service
    facts, certifications, financing, warranties, and availability before
    publication.
  - >-
    The platform publishes AI-readable location pages and listings updates,
    monitors how AI, Maps, and directory surfaces describe each shop, and keeps
    sensitive claims behind human approval and audit logs.
  - >-
    Guided intake, call attribution, and location routing tie each inquiry to a
    service line and surface, so operators can measure qualified calls,
    call-to-booking conversion, and cost per booked job by location.
whyWeWin:
  - >-
    The company starts from repair-shop operational truth inside Tekmetric
    rather than from generic SEO content, which is the missing data layer most
    marketing tools and agencies do not own.
  - >-
    A service-line-first pilot around brake, tire, or ADAS capacity lets the
    company sell on filled bays, missed-call recovery, and booked-job yield
    instead of abstract traffic or rank reports.
  - >-
    Each deployment compounds a proprietary dataset linking answer content,
    local market context, and intake quality to booked-job outcomes across
    locations and service lines.
  - >-
    The product can coexist with website, listings, review, and telephony
    vendors, making partner distribution plausible instead of forcing a full
    rip-and-replace motion on day one.
strategicChoices:
  beachhead: >-
    U.S. independent auto repair groups with 5-15 locations on Tekmetric,
    existing agency spend, and underutilized brake, tire, or ADAS capacity that
    they are trying to fill through local inbound demand.
  wedgeRationale: >-
    This entry point is narrow enough to ship one repeatable data model and one
    measurable pilot, but painful enough to unlock budget quickly because the
    buyer already spends on agencies, listings, and front-desk labor. Starting
    with all service lines, single-location shops, or multiple verticals would
    dilute proof, complicate integrations, and hide whether the answer-graph
    thesis actually improves booked-job economics.
  sequencingRationale: >-
    Build read-only data sync, answer quality monitoring, and booked-job
    attribution before deeper front-desk automation, because the first customer
    must trust the facts and the ROI readout before it will hand over more of
    the intake workflow. Hire product, integrations, and implementation talent
    ahead of quota-carrying sales, because the first 3-5 groups need fast data
    audits and repeatable deployments more than a large pipeline. Add partner
    distribution only after the company can prove that one service-line template
    deploys in 45 days or less and produces measurable lift against agency
    baselines.
  notYet:
    - Beauty, fitness, or pet-care expansion before at least 10 auto-repair production groups are live.
    - Full AI receptionist replacement or outbound ad-buying suite before answer accuracy and attribution are trusted.
    - Single-location owner-operator shops with subscale ACV and bespoke onboarding needs.
    - Autonomous publishing of safety-sensitive or warranty-sensitive claims without human approval.
market:
  tam: "$90.0M beachhead TAM based on roughly 15,000 Tekmetric-served shops at an estimated $500 per location per month."
  sam: "$31.5M beachhead SAM based on an estimated 5,250 locations in 3-20 location groups using Tekmetric."
  som: "$3.6M year-3 SOM based on about 600 rooftops, or roughly 50 groups averaging 12 locations, at about $6,000 annual base spend per location."
  segments:
    - U.S. independent auto repair groups with 3-20 locations on Tekmetric and recurring spend on agencies or fragmented local-growth tools.
    - Regional repair networks and consolidators that want central control over location truth, call conversion, and service-line demand across rooftops.
  buyingProcess: >-
    The sale typically starts with a CEO or VP Operations when an agency
    contract is up for renewal, a new store opens, or one service line has
    visible unused capacity. Marketing, front-desk, and shop-operations leads
    validate workflow fit, then the buyer approves a 90-day paid pilot once
    data-access scope and success metrics are defined.
product:
  mvp: >-
    A one-service-line answer graph for 5-15 location Tekmetric groups that
    ingests live service, certification, warranty, financing, and scheduling
    data, publishes machine-readable location truth, and attributes inbound
    calls or bookings to AI, Maps, and directory surfaces. The MVP is explicitly
    read-only and human-approved for sensitive facts; it is not a full agency
    replacement or autonomous front desk.
  sixMonth: >-
    Ship the first repeatable Tekmetric and telephony connectors, complete data
    audits for 3 design partners, and run one paid pilot around brake, tire, or
    ADAS demand with per-location answer accuracy, missed-call, and booked-job
    baselines.
  twelveMonth: >-
    Standardize a 45-day deployment playbook, add second and third service-line
    templates, and convert the first 2-3 groups to production with
    multi-location dashboards for qualified calls, call-to-booking conversion,
    and agency displacement.
  twentyFourMonth: >-
    Expand across most target service lines in auto repair, launch partner-ready
    APIs or white-label reporting for at least one repair-software or
    local-marketing partner, and test one adjacent local-service vertical only
    after the auto-repair rollout is repeatable.
  keyBets:
    - Tekmetric and adjacent systems expose enough clean fields to publish trustworthy service-line facts with limited manual cleanup.
    - Buyers will trust booked-job attribution enough to cancel, shrink, or renegotiate existing agency spend.
    - One service-line template can be reused across repair groups without more than modest custom implementation work.
    - Multi-location operators will pay first for central control and measurement, then expand to more service lines and locations.
    - Partner channels will cooperate if the company owns the truth and attribution layer rather than tries to displace every incumbent tool.
gtm:
  wedge: >-
    Sell a 90-day paid pilot to a 5-15 location Tekmetric repair group around
    one underfilled high-margin service line: sync live location truth, publish
    it into owned and directory surfaces, instrument call intake, and convert to
    an annual multi-location contract if qualified demand and booked-job yield
    improve.
  channels:
    - Founder-led direct sales to CEOs, owner-operators, and VP Operations leaders at regional repair groups.
    - Referrals and co-sell motions through Tekmetric-adjacent software, website, listings, and telephony partners.
    - Targeted outreach timed to agency renewals, new-store launches, and service-line capacity gaps.
  funnelTargets: "Target group→qualified discovery 20-30%; qualified discovery→paid pilot 20-30%; pilot→production 50%+; production group→second service line or full-network rollout 60%+ within 12 months."
  pricing: >-
    Base pricing should be a per-location monthly subscription anchored near the
    researched $500 per location per month, plus setup and usage-based fees for
    attributed calls or booked jobs and premium multi-location analytics. This
    keeps the product below typical agency spend while tying value to the same
    budget line the buyer is already trying to rationalize.
businessModel:
  revenueStreams:
    - Per-location subscription for the answer graph, publishing, and attribution workflow.
    - One-time onboarding and data-normalization fees for new multi-location groups.
    - Usage-based fees for attributed calls, booked jobs, or guided intake volume.
    - Premium analytics and partner or white-label reporting for larger groups and channel partners.
  unitOfValue: Active location running the answer-graph and booked-job attribution workflow.
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one service line to multiple service lines within the same group.
    - Roll from pilot locations into full-network deployments across all rooftops.
    - Upsell benchmark analytics, call-intake scoring, and partner reporting once the core attribution layer is trusted.
    - Reuse the model in one adjacent local-service vertical after auto-repair proof is established.
strategyMap:
  northStarMetric: Booked high-margin service jobs attributed to the platform per active location per month.
  inputMetrics:
    - Percentage of active locations with clean synced service-line data and approved published facts.
    - Answer accuracy rate for target services across AI, Maps, and directory surfaces.
    - Qualified inbound calls or bookings for target service lines per location.
    - Call-to-booking conversion rate for attributed inquiries.
    - Missed-call or wrong-location handoff rate on pilot service lines.
    - Pilot-to-production conversion rate.
    - Production groups expanding to a second service line or full-network rollout.
  moatsToBuild:
    - Repair-specific answer graph linking services, certifications, warranties, financing, and availability to each location.
    - Cross-surface attribution dataset connecting answer quality and intake performance to booked-job outcomes by service line.
    - Benchmark data across multi-location repair groups that shows what service facts and routing patterns outperform by market.
  killCriteria:
    - Fewer than 3 paid multi-location pilots by month 12 after at least 30 qualified target-account conversations.
    - The first 2 pilots fail to improve either qualified service-line calls or bookings by at least 15% or reduce missed-call rate by at least 20% within 90 days.
    - More than half of the first 5 deployments require manual data cleanup or custom implementation that pushes time to launch above 45 days.
  mermaid: |
    flowchart LR
      Wedge[Brake tire or ADAS pilot for Tekmetric groups] --> MVP[Read-only answer graph plus call attribution]
      MVP --> Proof[Booked-job lift and missed-call reduction]
      Proof --> Expansion[Full-network rollout then partner-led vertical expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: >-
      Strong buyer pain and budget replacement dynamics, but conviction stays
      limited until the team proves clean data access, repeatable deployment,
      and a bigger upside than the auto-repair beachhead alone.
    whyBelieve: >-
      Operators already spend thousands per month on opaque local-growth tools,
      and a repair-specific truth plus attribution layer addresses a concrete
      gap that current agencies and horizontal platforms do not close.
    whyDoubt: >-
      The measured beachhead market is small and crowded, and the business could
      collapse into services if AI-originated demand or Tekmetric data quality
      is weaker than the thesis assumes.
    nextDiligence: >-
      Validate two paid pilots with baseline-versus-pilot booked-job metrics and
      one verified Tekmetric data audit that shows a 45-day or faster
      deployment path.
  firstCustomer:
    title: VP Operations at a 5-15 location Tekmetric auto repair group.
    profile: >-
      A Sun Belt or similar U.S. regional repair group with recurring agency
      spend, centralized oversight of local marketing and phone performance, and
      unused brake, tire, or ADAS capacity at several locations.
    trigger: >-
      An agency renewal, new-store launch, or visible seasonal slowdown makes
      the buyer re-examine how much spend actually turns into booked high-margin
      work.
    buyer: CEO or VP Operations
    initialContract: >-
      A 90-day paid pilot worth roughly $15k-$35k for 5-15 locations and one
      target service line, converting to about $30k-$90k base annual ACV plus
      usage and analytics fees once the group rolls out across all target
      locations.
  mustBeTrue:
    - At least 50 U.S. Tekmetric-linked repair groups fit the 5-15 location beachhead and will buy a $30k-$90k annual workflow if ROI is credible.
    - A one-service-line pilot can lift qualified calls or booked jobs by at least 15% or cut missed-call rates by at least 20% within 90 days.
    - Tekmetric, scheduling, and telephony data can populate trustworthy location facts with limited manual cleanup and under 45-day deployment.
    - Buyers will reduce agency or front-desk spend based on the platform's attribution readout rather than treat it as another dashboard.
    - Incumbents and software partners will not neutralize the wedge before the company builds a repair-specific data and distribution moat.
  diligenceQuestions:
    - Which Tekmetric objects and permissions are clean enough to support service catalogs, certifications, warranties, financing, and availability by location?
    - What share of booked brake, tire, and ADAS work at target groups currently originates from AI assistants versus Google Maps, organic search, and directories?
    - What KPI threshold actually causes a CEO or VP Operations buyer to cancel or shrink an agency contract at the proposed price?
    - Can one service-line deployment template handle store variation without turning implementation into custom services?
    - Will Tekmetric and adjacent partners distribute this layer, tolerate it, or move it onto their own roadmap?
operatingAssumptions:
  - assumption: Tekmetric and adjacent systems expose enough clean, location-level data to power a read-only answer graph for one service line.
    basis: research.yaml
    validationTest: Complete 3 pilot data audits and map the required fields for services, certifications, warranties, financing, and scheduling with less than 20% manual cleanup per location.
    decisionImpact: If false, narrow the wedge to fewer facts or a smaller system stack, which slows deployment and weakens gross-margin potential.
  - assumption: Buyers will fund the product from existing agency, listings, or front-desk budgets rather than wait for a new AI line item.
    basis: idea.yaml
    validationTest: Close 2 paid pilots without a CFO-created net-new budget line and document the displaced vendor or spend category in each deal.
    decisionImpact: If false, initial pricing must fall or the sales motion must shift toward larger transformation budgets, lengthening time to close.
  - assumption: One service-line pilot can produce enough booked-job or missed-call improvement to support production conversion.
    basis: research.yaml
    validationTest: Measure baseline versus pilot on qualified calls, call-to-booking conversion, missed-call rate, and booked jobs across the first 2 paid groups.
    decisionImpact: If false, the company becomes an analytics tool instead of a budget-replacement system, reducing expansion and funding efficiency.
  - assumption: Buyers will trust cross-surface attribution even if AI assistants remain a minority share of demand in the first year.
    basis: operator judgment
    validationTest: In 10 buyer interviews and 2 pilots, confirm that a Google or Maps plus AI visibility dashboard still drives action on spend reallocation and rollout decisions.
    decisionImpact: If false, the product must reposition around broader local-presence management or wait for stronger AI-driven demand, weakening wedge urgency.
  - assumption: At least one repair-software, website, or telephony partner will co-sell once the company shows repeatable ROI.
    basis: research.yaml
    validationTest: Sign 1 integration or referral agreement that produces 2 qualified opportunities or one live channel-sourced pilot by month 18.
    decisionImpact: If false, the company remains founder-led direct sales only, limiting the path beyond the small beachhead.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Secure design partners around agency-renewal and capacity-gap moments.
    hypothesis: Multi-location repair groups will engage a paid pilot when the offer is framed as replacing opaque local-growth spend on one service line.
    successMetric: 12 qualified buyer conversations, 3 signed LOIs, and 1 paid pilot statement of work.
    owner: Founding CEO / GTM
  - horizon: 0-90 days
    experiment: Run pilot data audits on Tekmetric and telephony inputs.
    hypothesis: The required location, service, and intake fields are available and clean enough to support a read-only answer graph without bespoke data engineering.
    successMetric: 2 pilot accounts pass the field-mapping audit with less than 20% manual cleanup per location.
    owner: Founding eng + integrations lead
  - horizon: 90-180 days
    experiment: Launch the first one-service-line production-like pilot.
    hypothesis: A repeatable deployment can go live in 45 days or less across 5-15 locations.
    successMetric: First paid pilot live in 45 days or less with published facts, answer monitoring, and call attribution turned on.
    owner: Implementation lead
  - horizon: 90-180 days
    experiment: Prove booked-job lift and missed-call reduction.
    hypothesis: Better location truth plus guided intake increases qualified demand and reduces lost calls on the target service line.
    successMetric: At least 15% lift in qualified calls or booked jobs, or at least 20% reduction in missed-call rate versus baseline within 90 days.
    owner: Customer success / operations
  - horizon: 6-12 months
    experiment: Standardize a multi-service-line rollout package.
    hypothesis: After the first two deployments, the same playbook can support second and third service lines with limited incremental setup.
    successMetric: 2 production groups expand to a second service line and average deployment time stays at 45 days or less.
    owner: Product + implementation
  - horizon: 12-18 months
    experiment: Win the first partner-sourced deployment.
    hypothesis: A repair-software, website, or telephony partner will co-sell once ROI is measured in booked jobs rather than traffic.
    successMetric: 1 signed partner agreement and 1 live pilot or 2 qualified opportunities sourced through the partner.
    owner: Partnerships lead
operations:
  - Data-quality audits and human approval workflows before publishing service, warranty, financing, or certification claims.
  - Cross-surface answer monitoring for AI assistants, Maps, owned pages, and directories on the target service lines.
  - Call recording, attribution, and guided intake playbooks that route brake, tire, and ADAS inquiries to the correct location.
  - Monthly buyer reviews on qualified calls, call-to-booking conversion, missed-call rate, cost per booked job, and agency displacement.
  - Partner management across Tekmetric-adjacent software, telephony providers, and local-marketing vendors.
team:
  - role: Founding CEO / automotive GTM
    startTiming: Month 0
    rationale: The first sale depends on agency-replacement positioning, buyer mapping across CEO and operations stakeholders, and hands-on pilot selling.
  - role: Founding eng
    startTiming: Month 0
    rationale: The product only works if the company can build the answer graph, publishing layer, and attribution logic immediately on top of Tekmetric-adjacent data.
  - role: Integrations and data engineer
    startTiming: Month 2
    rationale: Clean field mapping and fast repeatable connectors are the main risks between a software business and a services-heavy deployment motion.
  - role: Implementation and customer success lead
    startTiming: Month 4
    rationale: Pilot-to-production conversion will depend on fast launches, clear KPI baselines, and weekly coordination with front-desk and operations teams.
  - role: Product manager / analyst
    startTiming: Month 6
    rationale: The company needs tight measurement on answer accuracy, booked-job lift, and service-line benchmarks to refine the wedge and prove pricing.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Channel leverage should start only after direct pilots produce ROI evidence that software, website, and telephony partners can resell.
milestones:
  - horizon: 0-12 months
    items:
      - "Month 3: sign 3 design-partner repair groups and complete 2 Tekmetric data audits."
      - "Month 6: launch the first paid brake, tire, or ADAS pilot with answer accuracy and call attribution baselines."
      - "Month 9: show at least 15% lift in qualified demand or at least 20% lower missed-call rates on the pilot service line."
      - "Month 12: convert at least 2 groups to annual contracts and standardize deployment in 45 days or less."
  - horizon: 12-24 months
    items:
      - "Month 18: support 8-12 production groups and publish the first benchmark dataset on service-line answer quality and booked-job yield."
      - "Month 18: add second and third service-line templates plus premium multi-location analytics."
      - "Month 24: sign 1 partner-led distribution or white-label agreement with a repair-software, website, or telephony vendor."
      - "Month 24: expand within at least 4 accounts from one service line to most target locations or service lines."
  - horizon: 24-36 months
    items:
      - "Month 30: reach 25-35 production groups and source at least 25% of new pipeline from non-founder channels."
      - "Month 36: manage roughly 600 active rooftops or an equivalent partner-managed footprint, matching the researched SOM case."
      - "Month 36: prove one adjacent-vertical pilot through a software partner without slowing auto-repair expansion."
risks:
  - risk: Tekmetric or adjacent data access is thinner or dirtier than expected, slowing onboarding and reducing answer accuracy.
    likelihood: High
    impact: High
    mitigation: Start with read-only sync for one service line, run paid data audits before full rollout, and require human approval for sensitive facts until data quality is proven.
  - risk: Buyers do not see enough attributable demand lift to cut agency or front-desk spend.
    likelihood: High
    impact: High
    mitigation: Sell on one underfilled service line, baseline existing performance, and hold pilots to booked-job and missed-call metrics rather than abstract visibility claims.
  - risk: Incumbents or software partners bundle similar AI visibility features into tools shops already use.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on repair-specific truth, cross-surface attribution, and booked-job benchmarks while making partnership easier than direct displacement.
  - risk: Implementation becomes services-heavy and pushes time to launch or gross margin outside a software profile.
    likelihood: Medium
    impact: High
    mitigation: Productize connectors and approval workflows early, keep the first template narrow, and avoid single-location or highly bespoke accounts.
  - risk: Inaccurate published claims or review automation create Google, FTC, or customer-trust issues.
    likelihood: Medium
    impact: Medium
    mitigation: Maintain audit logs, human approval for claims, conservative review practices, and regular profile QA across owned and third-party surfaces.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway buys repeatable Tekmetric and telephony connectors, 3-5 paid multi-location pilots, the first implementation and customer-success hires, location-truth QA and attribution tooling, and one partner-led distribution proof.
