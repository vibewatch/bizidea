slug: autonomy-mission-assurance
date: '2026-04-30'
executiveSummary: >-
  Autonomy Mission Assurance sells into Army-adjacent defense robotics teams that are about to run a field exercise, OTA milestone, or customer demo and cannot afford a mixed-fleet autonomy failure on scarce range time. The product is a vendor-neutral assurance layer that sits on top of existing simulators and telemetry, stress-tests degraded comms and GPS loss, and produces a reusable readiness packet for internal review boards and government customers. This wedge matches the researched buying trigger: a VP of Autonomy, program manager, or T&E lead with budget tied to an imminent event rather than a speculative platform evaluation. The beachhead is intentionally narrow - 50-500 person UGV/UAS OEMs and prime programs with Army-facing milestones - because that workflow has short proof cycles, visible ROI, and less direct platform conflict than selling the autonomy brain itself. Research-sized market estimates are modest as a standalone app category ($45.0M SAM and $9.0M year-3 SOM), so the venture case depends on expanding from pre-event assurance into runtime policy enforcement, telemetry benchmarking, and certification workflows after early deployments. Pricing and delivery are therefore designed as paid field-event pilots that convert into annual per-program subscriptions, aligning first revenue with the customer's real budget line and preserving gross-margin potential above 70% after integration templates mature. The main disconfirming risks are that buyers treat evidence generation as an internal responsibility, that secure deployments and integrations take too long, or that incumbents such as Applied Intuition, Shield AI, and Anduril bundle enough adjacent capability to block the wedge. Public pricing benchmarks are limited in the inputs, so ACV, conversion rates, and funding needs remain operating assumptions to validate in the first 6 months.
problem:
  - Mixed UGV/UAS programs still prove readiness with ad hoc simulation, limited range time, and manually assembled review decks, so failures surface too late and burn schedule.
  - Soldier-supervised fleet autonomy introduces degraded-comms, GPS-loss, handoff, and override edge cases that are harder to test than single-vehicle autonomy.
  - Program teams need evidence that survives internal and customer review, but current artifacts are rebuilt from scratch for each milestone.
solution:
  - Ingest mission plans, vehicle profiles, autonomy outputs, telemetry, and communications assumptions before a field event and run repeatable scenario sweeps against degraded operating conditions.
  - Generate a readiness score, recommended guardrails, telemetry replay, and an exportable evidence packet that can be reused across reviews, demos, and milestone gates.
  - Reconcile live exercise telemetry back into the scenario library so each deployment improves cross-platform failure benchmarks and future mission templates.
whyWeWin:
  - The product is sold as a vendor-neutral approval layer, which is easier for OEMs and program offices to trust than relying on a direct platform competitor's autonomy stack.
  - The first wedge is tied to a budgeted event with visible ROI - avoiding failed range days and compressing milestone prep - rather than a long-horizon platform replacement.
  - Proprietary failure cases, operator-override benchmarks, and evidence templates can compound across programs faster than generic simulators or in-house scripts.
strategicChoices:
  beachhead: Army-adjacent autonomy test directors, chief engineers, and program managers at 50-500 person UGV/UAS OEMs and prime-led mixed-fleet programs preparing a field exercise, OTA milestone, or customer demo within 90-120 days.
  wedgeRationale: This entry point has the clearest buying trigger, the shortest proof loop, and a deliverable the customer can judge immediately - whether the software catches mission-killing issues and produces a reviewable packet before scarce range time is consumed. Broader autonomy-platform or government-wide sales would require replacing core control software or waiting through slower procurement cycles.
  sequencingRationale: >-
    Start as an evidence layer on top of existing simulation and telemetry workflows so the company can land
    without displacing incumbent autonomy stacks, then add after-action reconciliation, repeatable benchmark
    dashboards, and finally runtime policy enforcement once it has proprietary mission data and customer trust.
    Hiring follows the same sequence: build product and domain credibility first, then add forward deployment and
    repeatable sales only after pilots convert.
  notYet:
    - Selling a full autonomy brain, C2 system, or hardware platform.
    - Going directly after programs of record before proving value with OEM and prime program budgets.
    - Expanding into non-defense robotics or generic commercial autonomy validation.
    - Building runtime autonomy control before the pre-deployment evidence workflow is repeatable.
market:
  tam: Estimated TAM $0.3B based on roughly 150 U.S. and allied unmanned-autonomy programs or accounts at about $2.0M annual assurance spend.
  sam: Estimated SAM $45.0M based on roughly 60 U.S. Army-adjacent OEM, prime, and T&E accounts at about $0.75M annual beachhead spend.
  som: Estimated year-3 SOM $9.0M based on 15 landed accounts at about $0.6M blended ACV after pilot conversion.
  segments:
    - Primary segment is Army-adjacent defense robotics OEMs shipping autonomous UGVs or ISR drones into pilots, OTAs, and field exercises.
    - Secondary segment is defense primes and government T&E organizations coordinating mixed unmanned fleets and milestone reviews.
  buyingProcess: Founder-led sales should start with the autonomy test director or chief engineer 60-120 days before a field event, then move to the VP of Autonomy or program manager once the team sees a draft evidence packet tied to a live milestone. Deals should be framed as schedule-risk reduction from a paid pilot, with annual conversion only after the packet is reused in a second event or review cycle.
product:
  mvp: MVP covers mission-plan ingest, scenario sweeps for lost-link, GPS-denied, handoff-failure, and override-latency cases, plus a readiness report and evidence export for one UGV/UAS mixed-fleet workflow. It should integrate with one open-source autonomy stack and one existing simulation or telemetry workflow rather than trying to replace either.
  sixMonth: Support one paid pilot workflow with after-action telemetry reconciliation, one open-source connector, one commercial simulator or telemetry export, and an air-gapped on-prem deployment option.
  twelveMonth: Add repeatable approval templates, multi-program dashboards, benchmark comparisons across missions, and support for a second vehicle family or autonomy stack.
  twentyFourMonth: Expand into runtime policy checks, supplier certification workflows, and a readiness system of record that spans multiple programs and allied deployments.
  keyBets:
    - Buyers will pay for evidence packaging and mission rehearsal without requiring the startup to replace their simulator or autonomy stack.
    - Sanitized or unclassified telemetry is sufficient to prove ROI before the company gains access to more sensitive mission data.
    - The same core failure library can serve both smaller OEMs on open-source stacks and larger programs using commercial simulation tooling.
    - Pre-event assurance data can later support higher-value modules such as runtime policy enforcement and certification.
gtm:
  wedge: Sell a paid pre-field-event assurance pilot to Army-facing UGV/UAS programs that have a live exercise or milestone inside one quarter, then convert to an annual per-program subscription once the evidence packet is reused and telemetry reconciliation proves recurring value.
  channels:
    - Direct founder and defense-domain expert sales into autonomy leads, T&E leads, and program managers.
    - Integration-led partnerships with simulation, digital-engineering, and telemetry vendors already inside test workflows.
    - Program-adjacent entry through Army rapid-acquisition and drone-marketplace channels after the first evidence template is accepted by customers.
  funnelTargets: "10-15 target accounts per quarter, discovery-to-qualified-pilot 25-35%, qualified-pilot-to-paid-pilot 40%+, paid-pilot-to-annual-production 50%+, and production-to-second-program expansion 30%+ within 12 months."
  pricing: Paid pilot priced at $150k-$300k for one field-event cycle, converting to a $600k-$1.2M annual per-program subscription with additional onboarding fees for new vehicle types or secure deployment environments. This matches the researched program-budget buying motion better than seat-based pricing.
businessModel:
  revenueStreams:
    - Paid pilots tied to field exercises, demos, and OTA milestones.
    - Annual software subscriptions priced per autonomy program.
    - Onboarding and integration fees for new vehicle types, telemetry sources, and secure environments.
    - Usage-based fees for high-volume mission rehearsal packages once a program is in production.
  unitOfValue: One assured autonomy program or field-event cycle.
  targetGrossMarginPct: 72
  expansionLevers:
    - Add more programs, vehicle families, and mission templates within each OEM or prime account.
    - Upsell telemetry benchmarking, approval-workflow management, and after-action analytics after initial pilot success.
    - Expand into runtime policy enforcement and supplier certification once the company owns a meaningful failure corpus.
strategyMap:
  northStarMetric: Number of production programs that use the platform across two or more consecutive milestone cycles.
  inputMetrics:
    - Days from kickoff to first usable evidence packet.
    - Paid-pilot to annual-conversion rate.
    - Number of mission scenarios run per active program.
    - Evidence-packet reuse rate across milestones.
    - Time to onboard a new autonomy stack or vehicle type.
  moatsToBuild:
    - Cross-platform corpus of degraded-comms, EW, GPS-loss, and override failure modes.
    - Reusable Army-style evidence templates and approval logic.
    - Benchmark dataset for operator supervision and mixed-fleet readiness across programs.
  killCriteria:
    - Fewer than 2 paid pilots after 12 months of focused Army-adjacent selling.
    - Pilot-to-production conversion below 30% after the first 4 paid pilots.
    - Average integration time stays above 6 engineer-weeks per account after the third deployment.
    - Customers will not allow the evidence packet to be used in any internal review or customer-facing milestone.
  mermaid: |
    flowchart LR
      Wedge[Army field-event assurance pilot] --> MVP[Mission rehearsal plus evidence packet]
      MVP --> Proof[Paid pilots catch issues before range day]
      Proof --> Expansion[Annual per-program subscriptions]
      Expansion --> Moat[Telemetry benchmarks and certification workflows]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Strong wedge into an urgent defense workflow, but only if early customers treat the evidence layer as a repeatable product rather than bespoke services.
    whyBelieve: The plan targets a budgeted milestone-risk problem with clear buyer urgency, credible incumbents to displace at the workflow layer, and a plausible data moat from cross-program failure evidence.
    whyDoubt: The standalone beachhead is not large enough on its own, and security or integration friction could trap the company in slow, services-heavy deployments.
    nextDiligence: Validate with 10-15 Army-adjacent T&E and autonomy leaders that they will fund a paid pilot before classified-data access and will reuse a third-party evidence packet in a real milestone.
  firstCustomer:
    title: Director of Test and Evaluation at an Army-facing robotics OEM
    profile: A 50-500 employee UGV or ISR-drone company running one to three Army pilots with mixed internal simulation, open-source tooling, and live range rehearsals.
    trigger: A field exercise, OTA milestone, or customer demo inside the next 90-120 days where one operator must supervise multiple autonomous assets under degraded comms.
    buyer: VP of Autonomy or robotic systems program manager
    initialContract: $150k-$300k paid pilot for one exercise, converting to a $600k-$1.2M annual per-program subscription if reused across two milestones.
  mustBeTrue:
    - At least 5 of the first 10 target T&E or autonomy leaders confirm that failed range days or delayed approval packets are a current budgeted problem.
    - At least 3 design partners agree to paid pilots before the company has access to classified mission data.
    - One evidence packet format is accepted in an internal review or customer-facing milestone at two separate accounts.
    - Pilot-to-production conversion reaches at least 50% when the packet is reused in a second event.
    - A single open-source path plus one commercial simulator or telemetry connector covers more than 60% of the first-year pipeline.
  diligenceQuestions:
    - Which exact artifact unlocks milestone progress today - readiness score, safety case, telemetry replay, or after-action packet?
    - How many pre-field-event budgets can actually be spent within one quarter without a full government procurement cycle?
    - Will customers buy a vendor-neutral assurance layer if Applied, Shield, or Anduril offer adjacent features in the same deal?
    - What minimum telemetry and mission data are required to prove value before secure or classified deployment is available?
    - Can onboarding be standardized enough to keep gross margin above 70%, or does each program become a custom integration?
  riskHeatmap:
    - risk: Procurement and budget timing slip beyond the pre-event selling window.
      likelihood: Medium
      impact: High
      leadingIndicator: Discovery calls show interest but fewer than 25% of qualified accounts can fund a pilot inside one quarter.
      mitigation: Sell first to venture-backed OEMs and prime-led pilots with discretionary program budgets tied to near-term field events.
    - risk: Secure deployment and data-rights requirements delay time to value.
      likelihood: High
      impact: High
      leadingIndicator: More than half of serious opportunities require classified or CUI data access before approving a pilot.
      mitigation: Lead with sanitized telemetry, on-prem deployment, and an air-gapped product path from the first release.
    - risk: Internal tools or incumbent simulators are good enough for the first workflow.
      likelihood: Medium
      impact: High
      leadingIndicator: Prospects compare the product mainly against existing scripts or simulator reporting and refuse to pay for evidence packaging.
      mitigation: Prove faster packet generation, mixed-fleet readiness scoring, and cross-program benchmark value that generic simulation output does not provide.
    - risk: The company becomes a services-heavy integrator instead of a software vendor.
      likelihood: Medium
      impact: High
      leadingIndicator: Average deployment effort stays above 6 engineer-weeks and every deal requires custom evidence formats.
      mitigation: Standardize the first two connectors, narrow the beachhead, and refuse bespoke feature work that does not improve the repeatable packet template.
    - risk: The category caps out as pre-event analytics and never expands.
      likelihood: Medium
      impact: Medium
      leadingIndicator: Customers use the tool only once per event and show no pull for telemetry benchmarking, workflow management, or runtime controls.
      mitigation: Instrument expansion demand early and prioritize roadmap items that increase recurring usage between field events.
operatingAssumptions:
  - assumption: Army-adjacent OEMs and prime programs can fund a paid pilot from program budgets in 90-120 days when tied to an imminent field event.
    basis: research.yaml
    validationTest: Close 2 paid pilots from near-term milestone opportunities without waiting for a full government vehicle or multi-quarter procurement.
    decisionImpact: If false, shift toward larger prime partners with existing contract vehicles or reconsider the beachhead.
  - assumption: Sanitized or unclassified telemetry is enough to demonstrate pre-event ROI in the first deployments.
    basis: research.yaml
    validationTest: Run one pilot using redacted telemetry and confirm the customer still accepts at least one material readiness finding and the resulting packet.
    decisionImpact: If false, the company must invest earlier in secure environments, longer sales cycles, and a larger funding need.
  - assumption: A narrow connector strategy can onboard most early prospects without replacing their simulation stack.
    basis: operator judgment
    validationTest: Support one open-source autonomy workflow and one commercial simulator or telemetry export with onboarding under 20 engineer-days per account.
    decisionImpact: If false, target gross margin and sales velocity break, forcing a services model or a narrower ICP.
  - assumption: Customers will pay $150k-$300k for a pilot because avoiding one failed exercise is worth more than the pilot price.
    basis: idea.yaml
    validationTest: Secure signed pricing from at least 2 design partners at or above the proposed pilot band.
    decisionImpact: If false, the company needs lower-cost self-serve packaging, different pricing, or a different buyer.
  - assumption: The beachhead can expand into telemetry benchmarking, certification, and runtime policy enforcement to support venture-scale returns.
    basis: idea.yaml
    validationTest: In the first 6 production deployments, at least 3 customers request one of those expansion modules before renewal.
    decisionImpact: If false, investors should underwrite the company as a niche workflow business rather than a broad autonomy-assurance platform.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Interview 12-15 autonomy test directors, chief engineers, and program managers and collect their current milestone packet artifacts.
    hypothesis: The first buyer will pay to compress packet creation and reduce range-day failure risk, not just to run more simulations.
    successMetric: At least 8 interviews rank evidence generation or review delay as a top-3 pain and 3 accounts volunteer a current artifact for redlining.
    owner: CEO
  - horizon: 0-90 days
    experiment: Prototype a readiness packet from one sample mission plan and one telemetry log using manual analyst support behind the product.
    hypothesis: Customers will judge value by whether the output is decision-ready for a real review board, even before full automation.
    successMetric: 3 design partners agree the packet is materially better than their current slideware and commit to a paid pilot timeline.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Build connectors for one PX4 or ROS-style workflow and one commercial simulator or telemetry export already present in the pipeline.
    hypothesis: Covering those two paths will unlock most first-year opportunities without custom platform replacement work.
    successMetric: More than 60% of qualified opportunities fit one of the two connector paths and onboarding stays under 20 engineer-days.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Run the first paid pilot against a live field exercise and compare pre-event findings with post-event outcomes.
    hypothesis: The product can catch at least one material issue before range day and create a packet that is reused after the event.
    successMetric: Customer confirms at least one avoided failure or schedule save and requests a production proposal within 30 days.
    owner: Defense T&E lead
  - horizon: 180-360 days
    experiment: Deliver an air-gapped on-prem deployment and security review for a second paying account.
    hypothesis: Secure deployment can be standardized enough to avoid becoming a bespoke integration project.
    successMetric: Second secure deployment completes in 4 weeks or less and uses the same release process as the first account.
    owner: Security or platform engineer
  - horizon: 180-540 days
    experiment: Convert the first cohort of pilots into annual subscriptions and test expansion demand for benchmarking or approval-workflow modules.
    hypothesis: Customers will renew because the tool is reused across milestones, not because of one-off services support.
    successMetric: At least 2 annual production contracts signed and at least 1 customer requests an expansion module before renewal.
    owner: CEO
operations:
  - Standardize an on-prem and air-gapped deployment pattern with reproducible container releases and audit logs from the start.
  - Maintain a versioned library of mission templates, failure scenarios, and evidence-packet schemas tied to customer-approved workflows.
  - Build lightweight connectors into telemetry stores, simulators, and open-source autonomy stacks instead of replacing customer infrastructure.
  - Use forward-deployed implementation playbooks so postmortems, feature requests, and benchmark data flow back into the core product each quarter.
team:
  - role: CEO or founder
    startTiming: Month 0
    rationale: Own founder-led sales, design-partner recruitment, and partnerships with simulation and telemetry vendors.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the assurance engine, first connectors, and evidence-packet generation workflow.
  - role: Defense autonomy or T&E lead
    startTiming: Month 1
    rationale: Translate Army-adjacent milestone workflows into credible packet templates and run pilot delivery with customers.
  - role: Forward deployed engineer
    startTiming: Month 4
    rationale: Shorten pilot onboarding, manage integrations, and prevent customer-specific work from derailing product velocity.
  - role: Security or platform engineer
    startTiming: Month 6
    rationale: Productize on-prem, air-gapped, and audit-log requirements needed for broader defense adoption.
  - role: Account executive or BD lead
    startTiming: Month 9
    rationale: Add repeatable pipeline generation only after the first paid-pilot playbook and reference account exist.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 3 design partners and close at least 2 paid pilots tied to live field events.
      - Ship mission-plan ingest, core degraded-ops scenario library, evidence-packet export, and after-action telemetry reconciliation.
      - Support one open-source connector, one commercial simulation or telemetry connector, and one air-gapped deployment.
      - Convert at least 1 pilot into an annual subscription and document a repeatable ROI case based on avoided failures or faster sign-off.
  - horizon: 12-24 months
    items:
      - Reach 5-7 production programs across OEM and prime accounts.
      - Launch benchmark dashboards, reusable approval workflows, and support for a second vehicle family or autonomy stack.
      - Keep target gross margin above 70% by reducing deployment effort and reusing evidence templates.
      - Establish at least 1 channel partnership that brings the product into an existing simulation or telemetry workflow.
  - horizon: 24-36 months
    items:
      - Land 12-15 accounts and approach the researched $9.0M year-3 SOM.
      - Release runtime policy checks or certification workflows that create recurring usage between field events.
      - Expand to at least 1 allied program through existing U.S. customer or partner relationships.
      - Demonstrate benchmark data and approval logic as the primary moat, not bespoke services labor.
risks:
  - risk: Defense procurement and program-budget timing may be too slow for a startup burn profile.
    likelihood: Medium
    impact: High
    mitigation: Start with venture-backed OEMs and prime-led pilots where field-event budgets and decision makers are easier to access.
  - risk: Secure deployment, data rights, and classified workflow needs may raise implementation cost beyond the planned model.
    likelihood: High
    impact: High
    mitigation: Prove ROI first on sanitized telemetry and standardize on-prem and air-gapped deployment before broad expansion.
  - risk: Incumbent simulation or autonomy vendors may bundle enough adjacent assurance capability to block adoption.
    likelihood: Medium
    impact: High
    mitigation: Stay vendor-neutral, own the reviewable evidence artifact, and focus on mixed-fleet approval workflows that incumbents do not standardize well.
  - risk: Customers may prefer internal scripts and services over a productized evidence layer.
    likelihood: Medium
    impact: High
    mitigation: Narrow the ICP, show time-to-packet and range-day savings, and refuse custom work that does not improve the shared template library.
  - risk: The product may not expand beyond a niche pre-event tool.
    likelihood: Medium
    impact: Medium
    mitigation: Track pull for benchmarking, workflow management, and runtime modules early and adjust company ambition if that pull does not emerge.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway should fund the core product team, air-gapped deployment capability, 3-4 design-partner or pilot deployments, and enough customer proof to convert at least 2 programs into annual subscriptions.
