scenarios:
  downside:
    description: 国防预算节奏再慢两个季度，会拖长试点成交并压低生产转化。
    y3RevenueK: 5400.0
    y3EbitdaK: -450.0
    cashLowPointK: -150.0
    keyAssumptionChanges:
      - 销售周期从 4 个月延长到 6 个月
      - 试点到生产转化率从 50% 降到 35%
      - 稳态 ACV 从 $600K 降到 $500K
  base:
    description: 创始人主导的试点按计划转化，毛利率在 Y3 达到目标，公司在 Y3 末以 15 个活跃项目 / $9.0M ARR 收尾。
    y3RevenueK: 7500.0
    y3EbitdaK: 900.0
    cashLowPointK: 1226.0
    keyAssumptionChanges:
      - 销售周期保持 4 个月
      - 试点到生产转化率保持在 50%
      - 稳态 ACV 保持在 $600K
  upside:
    description: 试点周期更短、扩张更强，使客户数和 ACV 同时抬升，而 headcount 并未明显增加。
    y3RevenueK: 9300.0
    y3EbitdaK: 1800.0
    cashLowPointK: 1350.0
    keyAssumptionChanges:
      - 销售周期从 4 个月压缩到 3 个月
      - 试点到生产转化率从 50% 升到 60%
      - 稳态 ACV 从 $600K 升到 $650K
