slug: autonomy-mission-assurance
date: '2026-04-30'
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: month
  source: '[BP date 2026-04-30] 模型从计划日期后的下一个月开始。'
- id: A2
  name: 融资前起始现金
  value: '200'
  unit: USD K
  source: 创业公司财务启发式假设，创始人或天使资金覆盖公司设立与 pre-close 成本。
- id: A3
  name: Pre-seed 在 M1 完成
  value: '3200'
  unit: USD K
  source: '[BP fundingAsk] 阶段为 pre-seed，目标区间为 $2-4M，runway 目标为 18 个月；基准情景采用 $3.2M，略高于中位数，以覆盖气隙产品化与试点。'
- id: A4
  name: 每季度触达的目标账户数
  value: '12'
  unit: accounts per quarter
  source: '[BP gtm.funnelTargets] 每季度 10-15 个目标账户的中位数。'
- id: A5
  name: 销售周期
  value: '4'
  unit: months
  source: '[BP operatingAssumptions + market.buyingProcess] 将 90-120 day 的预算到试点路径按中位值建模。'
- id: A6
  name: 合格机会到付费试点转化率
  value: '45'
  unit: percent
  source: '[BP gtm.funnelTargets] qualified-pilot-to-paid-pilot 为 40%+；基准情景使用 45%。'
- id: A7
  name: 付费试点到年度生产转化率
  value: '50'
  unit: percent
  source: '[BP gtm.funnelTargets] paid-pilot-to-annual-production 为 50%+；基准情景使用 50%。'
- id: A8
  name: 每个付费项目的稳态 ACV
  value: '600'
  unit: USD K per year
  source: '[BP gtm.pricing, investorMemo.firstCustomer, market.som] 采用 $600k-$1.2M 年订阅区间的下限，并与 15 个账户约等于 $9.0M 退出 ARR 保持一致。'
- id: A9
  name: 收入确认简化假设
  value: '50'
  unit: USD K per active paying program per month
  source: '[Derived from A8] 采用保守的线性确认；基准情景收入不计入导入费与用量费，以避免重复计算。'
- id: A10
  name: Y1 活跃付费项目爬坡
  value: 0,0,0,1,1,1,1,2,2,3,3,4
  unit: customers EOP by month
  source: '[BP milestones 0-12 months] 对应到 M12 完成 2 个付费试点、1 个转化，以及 4 个活跃付费项目。'
- id: A11
  name: Y2 与 Y3 期末客户数
  value: 10 in Q4Y2; 15 in Q4Y3
  unit: customers EOP
  source: '[BP milestones] 12-24 个月达到 5-7 个生产项目，24-36 个月达到 12-15 个账户；基准情景在 Y2 末为 10 个，在 Y3 末为 15 个。'
- id: A12
  name: 毛利率爬坡
  value: 55% Y1; 68% Y2; 72% Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 72] 早期试点因交付更偏服务化而低于目标；成熟毛利率在 Y3 达到目标。'
- id: A13
  name: 招聘计划依据
  value: 创始人 M0；创始工程师 M0；领域负责人 M1；FDE M4；安全/平台 M6；AE M9；后续招聘与里程碑扩张同步
  unit: timing
  source: '[BP team] 依据明确的角色起始时点，并辅以创业公司财务启发式，对 Y2-Y3 的后续招聘进行建模，以支撑 10 个再到 15 个项目。'
- id: A14
  name: 创始人全额成本
  value: '240'
  unit: USD K annual
  source: 创业公司财务启发式（高合规 B2B 国防软件），包含创始人现金薪酬与薪资税费/福利负担。
- id: A15
  name: 工程或安全岗位全额成本
  value: '220'
  unit: USD K annual per FTE
  source: 面向美国国防相关企业软件的高级软件/安全人才创业公司财务启发式。
- id: A16
  name: 领域测试与评估岗位全额成本
  value: '210'
  unit: USD K annual per FTE
  source: 具备现场可信度的国防自主系统/测试与评估专家创业公司财务启发式。
- id: A17
  name: 前线交付工程师全额成本
  value: '190'
  unit: USD K annual per FTE
  source: 偏实施型国防软件工程角色的创业公司财务启发式。
- id: A18
  name: 销售或商务拓展岗位全额成本
  value: '230'
  unit: USD K annual per FTE
  source: 含底薪、佣金与福利的企业级国防销售创业公司财务启发式。
- id: A19
  name: G&A 或运营岗位全额成本
  value: '180'
  unit: USD K annual per FTE
  source: 风险投资支持初创公司的财务/运营支持岗位创业公司财务启发式。
- id: A20
  name: 非薪酬开销
  value: 在薪酬之外，还需承担显著的云成本、差旅、法务、保险和安全合规支出。
  unit: qualitative
  source: '[BP operations, risks, fundingAsk] 气隙部署、审计日志和现场交付支持，使非薪酬 opex 明显高于通用 SaaS 初创公司。'
- id: A21
  name: 稳态 CAC
  value: '250'
  unit: USD K per new production customer
  source: 以创始人主导的高 ACV 企业销售为锚的创业公司财务启发式，同时考虑小而精准的 funnel 和国防差旅成本。
- id: A22
  name: 稳态月流失率
  value: '1.5'
  unit: percent
  source: 创业公司财务启发式，假设粘性较高的项目软件 logo churn 较低，但考虑到预算集中与合同波动而适度上调。
- id: A23
  name: 下一轮融资里程碑
  value: 到 Y2 末达到 10 个活跃项目、可重复的气隙部署，以及至少 2 个年度化标杆账户
  unit: milestone
  source: '[BP milestones + fundingAsk] 这是用于确定融资规模与 runway 的证明包。'
