slug: autonomy-mission-assurance
date: '2026-04-30'
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型启动月份
  value: 2026-05
  unit: 月份
  source: '[BP date 2026-04-30] 模型从计划日期后的下一个月份开始。'
- id: A2
  name: 融资前起始现金
  value: '200'
  unit: USD K
  source: 创业财务启发式：假设创始人和天使资金先覆盖公司设立与 pre-seed 交割前成本。
- id: A3
  name: pre-seed 在 M1 完成
  value: '3200'
  unit: USD K
  source: '[BP fundingAsk] 阶段为 pre-seed，目标区间 $2-4M、跑道目标 18 个月；基础情景取 $3.2M，略高于中位数，用来覆盖隔离网络产品化与试点交付。'
- id: A4
  name: 每季度触达目标账户数
  value: '12'
  unit: 每季度账户数
  source: '[BP gtm.funnelTargets] 取每季度 10-15 个目标账户的中位数。'
- id: A5
  name: 销售周期
  value: '4'
  unit: 月
  source: '[BP operatingAssumptions + market.buyingProcess] 以 90-120 天的预算到试点周期中位数建模。'
- id: A6
  name: 合格机会转付费试点
  value: '45'
  unit: 百分比
  source: '[BP gtm.funnelTargets] 合格试点到付费试点为 40%+；基础情景取 45%。'
- id: A7
  name: 付费试点转年费生产
  value: '50'
  unit: 百分比
  source: '[BP gtm.funnelTargets] 付费试点转年费生产为 50%+；基础情景取 50%。'
- id: A8
  name: 稳态单项目 ACV
  value: '600'
  unit: 每年 USD K
  source: '[BP gtm.pricing, investorMemo.firstCustomer, market.som] 取年费区间 $600k-$1.2M 的底部，并与 15 个账户对应约 $9.0M 退出 ARR 保持一致。'
- id: A9
  name: 收入确认简化
  value: '50'
  unit: 每个活跃付费项目每月 USD K
  source: '[Derived from A8] 采用保守的按月摊销确认；基础情景不计导入费或按使用量收费，避免重复计算。'
- id: A10
  name: Y1 活跃付费项目爬坡
  value: 0,0,0,1,1,1,1,2,2,3,3,4
  unit: 每月期末客户数
  source: '[BP milestones 0-12 months] 这一爬坡能支持 2 单付费试点、1 次转化，以及到 M12 时 4 个活跃付费项目。'
- id: A11
  name: Y2 与 Y3 期末客户数
  value: 10 in Q4Y2; 15 in Q4Y3
  unit: 期末客户数
  source: '[BP milestones] 12-24 个月达到 5-7 个生产项目，24-36 个月达到 12-15 个账户；基础情景设为 Y2 末 10 个、Y3 末 15 个。'
- id: A12
  name: 毛利率爬坡
  value: 55% Y1; 68% Y2; 72% Y3
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct 72] 早期试点交付更像重服务，所以 Y1 低于目标；到 Y3 才爬到目标水平。'
- id: A13
  name: 招聘计划依据
  value: Founder M0; founding eng M0; domain lead M1; FDE M4; security/platform M6; AE M9; later hires in line with milestone expansion
  unit: 时间安排
  source: '[BP team] 以前述明确招聘时间为基准，再叠加创业财务启发式，为 Y2-Y3 的扩张补足后续岗位。'
- id: A14
  name: 创始人完全成本薪酬
  value: '240'
  unit: USD K annual
  source: 创业财务启发式：高合规 B2B 国防软件场景下，创始人现金薪酬加税费与福利负担。
- id: A15
  name: 工程或安全岗位完全成本薪酬
  value: '220'
  unit: 每名全职员工每年 USD K
  source: 面向美国防务相关企业软件的高级工程 / 安全人才创业财务启发式。
- id: A16
  name: 领域测试与评估岗位完全成本薪酬
  value: '210'
  unit: 每名全职员工每年 USD K
  source: 具备外场可信度的国防自主 / 测试与评估专家创业财务启发式。
- id: A17
  name: 前线交付工程师完全成本薪酬
  value: '190'
  unit: 每名全职员工每年 USD K
  source: 偏实施交付的国防软件工程岗位创业财务启发式。
- id: A18
  name: 销售或 BD 岗位完全成本薪酬
  value: '230'
  unit: 每名全职员工每年 USD K
  source: 企业级国防销售岗位的创业财务启发式，已含底薪、提成和福利。
- id: A19
  name: G&A / 运营岗位完全成本薪酬
  value: '180'
  unit: USD K annual per FTE
  source: 风投支持创业公司中的财务 / 运营支持岗位创业财务启发式。
- id: A20
  name: 非人力开支
  value: 在薪酬之外，还要叠加较重的云、差旅、法务、保险和安全合规支出
  unit: 定性
  source: '[BP operations, risks, fundingAsk] 隔离网络部署、审计日志和外场支持，让非人力 opex 明显高于一般 SaaS 创业公司。'
- id: A21
  name: 稳态 CAC
  value: '250'
  unit: 每个新签年度正式客户的 USD K
  source: 创业财务启发式：高 ACV、由创始人主导、漏斗不宽但很聚焦的国防企业销售，还要叠加坡差旅成本。
- id: A22
  name: 稳态月流失率
  value: '1.5'
  unit: 百分比
  source: 创业财务启发式：项目软件的 logo churn 理应偏低，但考虑预算集中和合同波动，上调到 1.5%。
- id: A23
  name: 下一轮融资里程碑
  value: 到 Y2 末拿下 10 个活跃项目、形成可复制的隔离网络部署，并拥有至少 2 个年费参考账户
  unit: 里程碑
  source: '[BP milestones + fundingAsk] 这就是下一轮融资要讲的证明包。'
