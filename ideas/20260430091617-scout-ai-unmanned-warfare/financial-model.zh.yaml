scenarios:
  downside:
    description: 如果国防预算节奏连续两个季度放慢，试点签约被拖长，生产转化也会随之下滑。
    y3RevenueK: 5400.0
    y3EbitdaK: -450.0
    cashLowPointK: -150.0
    keyAssumptionChanges:
    - 销售周期从 4 个月拉长到 6 个月
    - 试点转生产从 50% 降到 35%
    - 稳态 ACV 从 $600K 降到 $500K
  base:
    description: 创始人主导的试点按计划转化，毛利率到 Y3 达标，公司在 Y3 末做到 15 个活跃项目 / $9.0M ARR。
    y3RevenueK: 7500.0
    y3EbitdaK: 900.0
    cashLowPointK: 1226.0
    keyAssumptionChanges:
    - 销售周期维持 4 个月
    - 试点转生产维持 50%
    - 稳态 ACV 维持 $600K
  upside:
    description: 如果试点周期更短、扩张更顺，公司可以在不显著增加人数的情况下，同时把客户数和 ACV 一起抬上去。
    y3RevenueK: 9300.0
    y3EbitdaK: 1800.0
    cashLowPointK: 1350.0
    keyAssumptionChanges:
    - 销售周期从 4 个月压缩到 3 个月
    - 试点转生产从 50% 升到 60%
    - 稳态 ACV 从 $600K 升到 $650K
