modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景以 15 个活跃项目和 $9.0M ARR 结束 Y3，驱动因素是 $600K ACV 和约 50% 的试点到生产转化率。
- checkName: 必须顺利实现的条件
  finding: 接入过程必须足够模板化，才能在项目数增长快于服务人力投入的同时，将毛利率维持在约 72%。
- checkName: 模型失效条件
  finding: 如果销售周期拉长到 6 个月，或 ACV 降至 $500K，则 downside 情景会在 Y3 盈利前需要 bridge financing。
- checkName: 下一轮融资证明
  finding: 到 Y2 末达到 10 个活跃项目、一个气隙标杆部署和可重复 ROI，即可支撑一轮可信的后续融资。
sanityChecks:
  ruleOf40: Y3 growth 89.9% + EBITDA margin 12.0% = 101.9%
  burnMultiple: Y2 burn multiple 0.22x (-$0.8M EBITDA on $3.6M net new ARR from $2.4M to $6.0M exit ARR).
  revenuePerFte: $469K Y3 ($7.5M / 16 end-of-year FTE; heuristic vertical SaaS benchmark ~$200-400K, lifted here by high ACV).
  flags:
  - 公开定价可比样本较少，因此 ACV 和 CAC 依据业务计划并结合明确标注的创业公司财务启发式进行锚定，而不是基于已披露合同。
  - 收入按每个活跃项目 $600K 的线性方式建模，且未计入导入费或用量上行，因此实际 bookings 可能比这份 P&L 更加波动。
  - 毛利率假设依赖净化遥测、可复用连接器和有限定制工作；若进入密级或高度定制部署，模型可能滑向服务型业务。
  - 客户基础高度集中，因此任何一个陆军相关项目延迟，都可能对季度收入与现金产生实质影响。