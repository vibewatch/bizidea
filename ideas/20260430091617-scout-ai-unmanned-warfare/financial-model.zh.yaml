scenarios:
  downside:
    description: 国防预算节奏连续两个季度放缓，拉长试点成交周期并降低生产转化率。
    y3RevenueK: 5400.0
    y3EbitdaK: -450.0
    cashLowPointK: -150.0
    keyAssumptionChanges:
    - 销售周期从 4 个月延长到 6 个月
    - 试点到生产转化率从 50% 降至 35%
    - 稳态 ACV 从 $600K 降至 $500K
  base:
    description: 创始人主导的试点按计划转化，毛利率在 Y3 达到目标，公司以 15 个活跃项目 / $9.0M ARR 结束 Y3。
    y3RevenueK: 7500.0
    y3EbitdaK: 900.0
    cashLowPointK: 1226.0
    keyAssumptionChanges:
    - 销售周期维持在 4 个月
    - 试点到生产转化率保持 50%
    - 稳态 ACV 保持 $600K
  upside:
    description: 更短的试点周期与更强的扩张效果在不显著增加 headcount 的前提下，同时抬升客户数与 ACV。
    y3RevenueK: 9300.0
    y3EbitdaK: 1800.0
    cashLowPointK: 1350.0
    keyAssumptionChanges:
    - 销售周期从 4 个月压缩到 3 个月
    - 试点到生产转化率从 50% 提升到 60%
    - 稳态 ACV 从 $600K 提升到 $650K
