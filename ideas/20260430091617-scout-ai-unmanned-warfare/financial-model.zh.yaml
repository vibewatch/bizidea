modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基础情景在 Y3 末以 15 个活跃项目和 $9.0M ARR 收尾，驱动因素是 $600K ACV 与大约 50% 的试点转生产转化率。
  - checkName: 必须做对的地方
    finding: Onboarding 必须足够模板化，才能在新增项目速度快于服务人力扩张的同时，把毛利率稳在约 72%。
  - checkName: 模型会在哪些情况下失灵
    finding: 如果销售周期拉长到 6 个月，或 ACV 掉到 $500K， downside 情景会在 Y3 盈亏平衡前需要过桥融资。
  - checkName: 下一轮融资证明
    finding: 到 Y2 末做到 10 个活跃项目、一个 air-gapped 参考部署，以及可重复 ROI，就能形成一套可信的下一轮融资证明。
sanityChecks:
  ruleOf40: Y3 growth 89.9% + EBITDA margin 12.0% = 101.9%
  burnMultiple: Y2 burn multiple 0.22x (-$0.8M EBITDA on $3.6M net new ARR from $2.4M to $6.0M exit ARR).
  revenuePerFte: $469K Y3 ($7.5M / 16 end-of-year FTE; heuristic vertical SaaS benchmark ~$200-400K, lifted here by high ACV).
  flags:
    - 公开价格对比样本稀少，因此 ACV 和 CAC 主要锚定业务计划，并辅以清晰标注的创业财务启发式，而不是已披露合同。
    - 收入按每个活跃项目每年 $600K 等额摊销建模，未计入导入或使用费上行，因此实际 bookings 可能比这份 P&L 更波动。
    - 毛利率假设建立在脱敏遥测、可复用连接器和有限定制工作的前提上；若需要 classified 或高度定制部署，模型会更像服务生意。
    - 客户基础高度集中，因此只要一个贴近陆军的项目延期，就足以明显影响季度收入和现金。