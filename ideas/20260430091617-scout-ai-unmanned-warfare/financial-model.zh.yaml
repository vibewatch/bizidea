slug: autonomy-mission-assurance
date: '2026-04-30'
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-05
    unit: month
    source: '[BP date 2026-04-30] 模型从计划日期后的次月开始。'
  - id: A2
    name: 融资前起始现金
    value: '200'
    unit: USD K
    source: 创业财务启发式：假设创始人/天使资金覆盖公司设立与 pre-seed 交割前成本。
  - id: A3
    name: Pre-seed 在 M1 完成
    value: '3200'
    unit: USD K
    source: '[BP fundingAsk] 阶段为 pre-seed，目标区间为 $2-4M，目标跑道 18 个月；基础情景采用 $3.2M，略高于中点，用于支撑 air-gapped 产品化与试点。'
  - id: A4
    name: 每季度目标覆盖账户数
    value: '12'
    unit: accounts per quarter
    source: '[BP gtm.funnelTargets] 每季度 10-15 个目标账户的中位值。'
  - id: A5
    name: 销售周期
    value: '4'
    unit: months
    source: '[BP operatingAssumptions + market.buyingProcess] 按 90-120 天预算到试点的路径取中位数。'
  - id: A6
    name: 合格机会到付费试点转化率
    value: '45'
    unit: percent
    source: '[BP gtm.funnelTargets] 合格试点到付费试点 40%+；基础情景取 45%。'
  - id: A7
    name: 付费试点到年度生产转化率
    value: '50'
    unit: percent
    source: '[BP gtm.funnelTargets] 付费试点到年度生产 50%+；基础情景取 50%。'
  - id: A8
    name: 稳态下每个付费项目的 ACV
    value: '600'
    unit: USD K per year
    source: '[BP gtm.pricing, investorMemo.firstCustomer, market.som] 取 $600k-$1.2M 年度订阅区间下沿，并与 15 个账户约 $9.0M 退出 ARR 保持一致。'
  - id: A9
    name: 收入确认简化假设
    value: '50'
    unit: USD K per active paying program per month
    source: '[Derived from A8] 采用保守的按月摊销确认；导入费和使用费未计入基础情景收入，避免重复计算。'
  - id: A10
    name: Y1 活跃付费项目爬坡
    value: 0,0,0,1,1,1,1,2,2,3,3,4
    unit: customers EOP by month
    source: '[BP milestones 0-12 months] 对应 2 个付费试点、1 个转化，以及到 M12 时 4 个活跃付费项目。'
  - id: A11
    name: Y2 和 Y3 期末客户数
    value: 10 in Q4Y2; 15 in Q4Y3
    unit: customers EOP
    source: '[BP milestones] 12-24 个月达到 5-7 个生产项目，24-36 个月达到 12-15 个账户；基础情景按 Y2 末 10 个、Y3 末 15 个建模。'
  - id: A12
    name: 毛利率爬坡
    value: 55% Y1; 68% Y2; 72% Y3
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 72] 早期试点交付更偏服务化，因此毛利低于目标；成熟后在 Y3 达到目标。'
  - id: A13
    name: 招聘计划依据
    value: 创始人 M0；创始工程师 M0；领域负责人 M1；FDE M4；安全/平台工程师 M6；AE M9；后续招聘与里程碑扩张同步
    unit: timing
    source: '[BP team] 基于明确的角色起始时间，并结合创业财务启发式，在 Y2-Y3 增加后续岗位以支持 10 个再到 15 个项目。'
  - id: A14
    name: 创始人总包薪酬
    value: '240'
    unit: USD K annual
    source: 创业财务启发式（高合规 B2B 国防软件）：创始人现金薪酬加上工资税与福利负担。
  - id: A15
    name: 工程或安全岗位总包薪酬
    value: '220'
    unit: USD K annual per FTE
    source: 面向美国国防相邻企业软件场景的资深软件/安全人才创业财务启发式。
  - id: A16
    name: 领域测试与评估岗位总包薪酬
    value: '210'
    unit: USD K annual per FTE
    source: 面向具备国防自主/测试评估可信度专家的创业财务启发式。
  - id: A17
    name: 前线部署工程师总包薪酬
    value: '190'
    unit: USD K annual per FTE
    source: 面向以实施为主的国防软件工程角色的创业财务启发式。
  - id: A18
    name: 销售或商务岗位总包薪酬
    value: '230'
    unit: USD K annual per FTE
    source: 包含底薪、提成和福利的企业级国防销售创业财务启发式。
  - id: A19
    name: G&A 或运营岗位总包薪酬
    value: '180'
    unit: USD K annual per FTE
    source: 风投支持创业公司的财务/运营支持岗位创业财务启发式。
  - id: A20
    name: 非薪酬类开销
    value: 在薪酬之外还需承担显著的云成本、差旅、法务、保险和安全合规开支
    unit: qualitative
    source: '[BP operations, risks, fundingAsk] air-gapped 部署、审计日志和野外交付支持让非薪酬 opex 明显高于通用 SaaS 创业公司。'
  - id: A21
    name: 稳态 CAC
    value: '250'
    unit: USD K per new production customer
    source: 以创始人主导的高 ACV 企业销售创业财务启发式为基础，并结合收敛但高度定向的漏斗与国防差旅成本。
  - id: A22
    name: 稳态月流失率
    value: '1.5'
    unit: percent
    source: 创业财务启发式：对黏性较高的项目软件按较低流失建模，但考虑预算集中和合同波动后适度上调。
  - id: A23
    name: 下一轮融资里程碑
    value: 到 Y2 结束时达到 10 个活跃项目、可重复的 air-gapped 部署，以及至少 2 个年度化参考账户
    unit: milestone
    source: '[BP milestones + fundingAsk] 这是为下一轮融资定价与跑道规划所需要的证明包。'
