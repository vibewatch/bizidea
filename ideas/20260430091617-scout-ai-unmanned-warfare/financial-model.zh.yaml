modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Leads[线索] --> PaidPilots[付费试点]
      PaidPilots --> ProductionPrograms[生产项目]
      ProductionPrograms --> Revenue[收入]
      Revenue --> GrossProfit[毛利]
      GrossProfit --> Cash[现金]
modelSanity:
- checkName: 收入引擎
  finding: 基础情景在 Y3 末做到 15 个活跃项目与 $9.0M ARR，驱动因素是 $600K ACV 和约 50% 的试点转生产。
- checkName: 必须做对的事
  finding: 接入流程必须足够模板化，才能在项目数持续增长时把毛利守在约 72%，而不被服务人力拖垮。
- checkName: 模型何时会断
  finding: 只要销售周期拖到 6 个月，或 ACV 掉到 $500K， downside 情景就在 Y3 盈利前需要过桥融资。
- checkName: 下一轮证明
  finding: 到 Y2 末拿下 10 个活跃项目、一套隔离网络参考部署和可重复 ROI，就是下一轮融资最关键的证明包。
sanityChecks:
  ruleOf40: Y3 growth 89.9% + EBITDA margin 12.0% = 101.9%
  burnMultiple: Y2 burn multiple 0.22x (-$0.8M EBITDA on $3.6M net new ARR from $2.4M to $6.0M exit ARR).
  revenuePerFte: Y3 为每名员工 $469K（$7.5M / 年末 16 名 FTE；对照垂直 SaaS 常见的 ~$200-400K 基准，这里偏高，主要因为 ACV 高）。
  flags:
  - 公开价格对标很少，所以 ACV 与 CAC 主要锚定商业计划，并辅以明确标注的创业财务启发式，而不是披露合同。
  - 收入按每个活跃项目 $600K 年费、按月摊销确认，未计导入费或按使用量收费的上行，因此实际 bookings 可能比这份 P&L 更跳。
  - 毛利率假设建立在净化遥测、可复用连接器和有限定制之上；如果大量部署必须上密级或重度定制，模型会更像服务公司。
  - 客户基数高度集中，所以只要一个贴着陆军跑的项目延后，就足以明显拉动季度收入和现金。
