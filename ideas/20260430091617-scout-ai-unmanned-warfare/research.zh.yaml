categoryDynamics:
  growthRate: 采用节奏更像台阶式跃迁，而不是一个干净的已发布 CAGR；项目推进速度正受到无人机紧迫性、任务自主项目和快速采购变化的共同拉动。
  growthRateSourceRefs:
  - 1
  - 15
  - 16
  - 24
  tailwinds:
  - point: 大额新的自主系统融资轮次和任务自主合同胜利，验证了无人作战软件周边的预算牵引力。
    sourceRefs:
    - 1
    - 7
    - 10
  - point: 陆军和盟友部队正在更积极推动无人机采购、快速测试和已部署自主系统，这提高了演训失败的成本。
    sourceRefs:
    - 15
    - 16
    - 18
    - 24
  - point: 开源与仿真工具链让场景生成更容易，也让保障层更容易嵌入现有工作流。
    sourceRefs:
    - 25
    - 26
    - 27
  headwinds:
  - point: 买方群体高度集中，因此漫长采购周期或单个项目取消都可能显著放缓增长。
    sourceRefs:
    - 15
    - 16
  - point: 自主系统栈供应商可以捆绑相邻保障功能，尤其是在客户接受单一供应商锁定时。
    sourceRefs:
    - 6
    - 9
    - 25
  - point: 实地测试仍依赖通信基础设施和空域约束，而这些并非软件单独可以控制。
    sourceRefs:
    - 23
    - 28
competitors:
- name: Applied Intuition Defense
  stage: scale-up
  wedge: 面向国防项目的数字工程、仿真和自主系统工具。
  pricing: 定制企业 / 政府报价
  strength: 与陆军车辆项目契合度高，并明确围绕军用自主系统测试与评估进行定位。
  weaknessVsUs: 更偏向广义平台，较少把可复用审批材料包和混编编队就绪度证据作为独立工作流来聚焦。
  sourceRefs:
  - 3
  - 4
  - 5
- name: Shield AI
  stage: scale-up
  wedge: 与实战 UAS 平台打包销售的自主系统大脑与任务自主软件。
  pricing: 合同 / 按项目定价
  strength: 已有真实任务自主部署、可见的国防合同，以及在对抗环境中的可信度。
  weaknessVsUs: 对 OEM 来说往往是直接平台竞争对手；买方可能不愿让其审批逻辑和遥测语料依赖于竞争性自主系统供应商。
  sourceRefs:
  - 6
  - 7
  - 8
- name: Anduril Mission Autonomy
  stage: incumbent
  wedge: 覆盖无人资产的系统级任务自主与 C2。
  pricing: 合同 / 按项目定价
  strength: 分发能力强、任务自主品牌明确，且在无人海上与空中项目中持续扩张。
  weaknessVsUs: 栈高度一体化；第三方 OEM 和项目办公室可能更想要独立证据，而不是由 Anduril 持有的审批层。
  sourceRefs:
  - 9
  - 10
  - 11
- name: ReSim
  stage: scale-up
  wedge: 仿真与自主系统验证基础设施。
  pricing: 定制企业报价
  strength: 为仿真和验证工作流量身打造的工具。
  weaknessVsUs: 其商业自主系统出身和通用验证姿态，为一个绑定陆军里程碑和退化运行场景的国防专用证据产物留下了空间。
  sourceRefs:
  - 25
- name: NVIDIA Isaac Sim / open-source stack
  stage: incumbent
  wedge: 通用机器人仿真与开源自主系统构件。
  pricing: 平台授权或自主管理的开源方案
  strength: 工程团队极为熟悉，增量采用成本低。
  weaknessVsUs: 这是横向工具，不会原生解决采购证据、军事实践映射或混编编队审批工作流。
  sourceRefs:
  - 26
  - 27
regulatoryTechnicalConstraints:
- point: AI 治理与保障要求正在上升；买方越来越需要成文的风险管理和测试流程，而不仅是演示。
  sourceRefs:
  - 19
  - 20
  - 22
- point: 通信退化、EW 韧性和 GPS 拒止运行是核心任务约束，任何保障工作流都必须显式建模。
  sourceRefs:
  - 13
  - 14
  - 23
- point: 国内空域和无人运行规则仍会影响真实测试的地点和方式。
  sourceRefs:
  - 28
- point: 安全、数据权和气隙部署会抬高实施成本，并拖慢价值实现时间。
  sourceRefs:
  - 3
  - 23
  - 25
- point: 异构编队需要连接多个自主系统栈、车载总线、遥测存储和仿真器。
  sourceRefs:
  - 4
  - 9
  - 25
  - 26
validationSignals:
- point: Scout AI 围绕面向士兵的自主系统软件完成了 $100M Series A 融资。
  sourceRefs:
  - 1
  - 2
- point: Shield AI 正竞争最高 $800M 的 ISR 服务合同，并持续赢得任务自主项目。
  sourceRefs:
  - 7
  - 8
- point: Anduril 正把任务自主扩展到自主水面舰艇和协同作战飞机。
  sourceRefs:
  - 10
  - 11
- point: 陆军 ATEC 和陆军无人机市场动作表明，测试与采购流程的变化已经开始。
  sourceRefs:
  - 15
  - 16
  - 17
- point: 近期由 Starlink 故障引发的无人机测试中断，凸显真实世界自主系统试验的脆弱性，也说明部署前场景预演为何重要。
  sourceRefs:
  - 23
openQuestions:
- 买方会足够信任一份供应商中立的保障材料包，使其成为里程碑签字流程的一部分吗，还是仍会要求内部制作的文档？
- 第一条更容易卖出的集成路径究竟是哪条，是叠加在 Applied/ReSim 风格栈之上，还是叠加在较小 OEM 使用的开源 PX4/ROS 工作流之上？
- 在获得密级任务数据之前，多少非密级遥测就足以证明 ROI？
- 公司能否成为自主系统就绪度的权威记录系统，还是这一品类最终只会停留在部署前分析工具？
