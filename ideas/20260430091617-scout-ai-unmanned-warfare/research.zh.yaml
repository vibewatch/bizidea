categoryDynamics:
  growthRate: 这不是一个能找到干净公开 CAGR 的市场，而更像阶跃式采用；项目节奏正被无人机紧迫性、任务自主项目和快速采购变化共同拉动。
  growthRateSourceRefs:
    - 1
    - 15
    - 16
    - 24
  tailwinds:
    - point: 新的大额自主融资和任务自主中标，证明无人作战软件正被预算强力牵引。
      sourceRefs:
        - 1
        - 7
        - 10
    - point: 陆军和盟军正在更快推进无人机采购、快速测试和实装自主，这会显著抬高一次失败演训的代价。
      sourceRefs:
        - 15
        - 16
        - 18
        - 24
    - point: 开源和仿真工具链让场景生成更容易，这有利于保障层接进现有工作流。
      sourceRefs:
        - 25
        - 26
        - 27
  headwinds:
    - point: 买方 universe 高度集中，因此只要采购周期拉长，或一个项目被取消，增长就会明显放缓。
      sourceRefs:
        - 15
        - 16
    - point: 自主堆栈厂商可以把相邻保障功能打包销售，尤其是在客户接受单一供应商锁定时。
      sourceRefs:
        - 6
        - 9
        - 25
    - point: 野外测试仍依赖通信基础设施和空域约束，而这些不是软件单独能控制的。
      sourceRefs:
        - 23
        - 28
competitors:
  - name: Applied Intuition Defense
    stage: 扩张期
    wedge: 面向国防项目的数字工程、仿真和自主工具。
    pricing: 定制企业 / 政府报价
    strength: 与陆军车辆项目匹配度高，并且在自主军事测试评估上有清晰定位。
    weaknessVsUs: 平台导向更强；相比之下，对“可复用审批材料”和“混编编队准备度证据”这一独立工作流的聚焦没那么明确。
    sourceRefs:
      - 3
      - 4
      - 5
  - name: Shield AI
    stage: 扩张期
    wedge: 将自主“大脑”和任务自主软件与实际 UAS 平台打包交付。
    pricing: 合同 / 按项目定价
    strength: 已有真实任务自主部署、公开国防合同，以及在对抗环境中的可信度。
    weaknessVsUs: 对 OEM 来说常常是直接平台竞争对手；买方未必愿意让审批逻辑和遥测语料依赖竞争性自主厂商。
    sourceRefs:
      - 6
      - 7
      - 8
  - name: Anduril Mission Autonomy
    stage: 成熟厂商
    wedge: 横跨多种无人资产的系统级任务自主与 C2。
    pricing: 合同 / 按项目定价
    strength: 分发能力强、任务自主品牌明确，且在无人海上和空中项目上持续扩张。
    weaknessVsUs: 堆栈高度一体化；第三方 OEM 和项目办公室可能更想要独立证据，而不是由 Anduril 持有的审批层。
    sourceRefs:
      - 9
      - 10
      - 11
  - name: ReSim
    stage: 扩张期
    wedge: 仿真与自主验证基础设施。
    pricing: 定制企业报价
    strength: 为仿真与验证工作流而生的专用工具链。
    weaknessVsUs: 它起家于商业自主，验证姿态也更通用，因此在面向陆军里程碑和退化工况场景的国防专用证据产物上仍留有空档。
    sourceRefs:
      - 25
  - name: NVIDIA Isaac Sim / open-source stack
    stage: 成熟厂商
    wedge: 通用机器人仿真，加上开源自主构建模块。
    pricing: 平台授权或自托管开源
    strength: 工程团队熟悉度极高，边际采用成本也低。
    weaknessVsUs: 工具链是横向的，原生并不解决采购证据、军事 doctrine 映射或混编编队审批工作流。
    sourceRefs:
      - 26
      - 27
regulatoryTechnicalConstraints:
  - point: AI 治理和保障要求正在上升；买方越来越需要成体系的风险管理和测试流程文档，而不只是演示。
    sourceRefs:
      - 19
      - 20
      - 22
  - point: 退化通信、EW 韧性和 GPS denied 运行是核心任务约束，任何保障工作流都必须显式建模。
    sourceRefs:
      - 13
      - 14
      - 23
  - point: 国内空域和无人机运行规则依旧会影响实地测试在哪里、以何种方式开展。
    sourceRefs:
      - 28
  - point: 安全、数据权属和 air-gapped 部署会抬高实施成本并拉长见效时间。
    sourceRefs:
      - 3
      - 23
      - 25
  - point: 异构编队要求产品接入多个自主堆栈、车辆总线、遥测存储和仿真器。
    sourceRefs:
      - 4
      - 9
      - 25
      - 26
