  - point: 陆军 ATEC 与无人机 marketplace 的动作说明，测试和采购流程变革已经开始。
    sourceRefs:
      - 15
      - 16
      - 17
  - point: 最近一次因 Starlink 故障导致的无人机测试中断，暴露了真实世界自主试验有多脆弱，也说明事件前场景演练的价值。
    sourceRefs:
      - 23
openQuestions:
  - 买方会不会足够信任一份中立于平台的保障包，把它纳入里程碑签字流程，还是仍然要求内部生成文档？
  - 哪条首个集成路径更容易卖出去：叠在 Applied/ReSim 这类堆栈之上，还是叠在小型 OEM 的开源 PX4/ROS 工作流之上？
  - 在拿不到 classified 任务数据前，多少非密级遥测就足够先证明 ROI？
  - 创业公司能否成为自主准备度的系统记录层，还是这个品类最终只会停留在事件前分析工具？
