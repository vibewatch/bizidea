  adoptionFrictionMatrix:
  - friction: 涉及密级、CUI 或隔离网络任务数据时，云端部署很难一步到位。
    severity: high
    affectedBuyer: 国防 OEM 测试评估负责人和项目经理
    mitigation: 先上本地或断网部署，并用净化遥测先把价值证明出来。
    sourceRefs:
    - 3
    - 23
    - 28
  - friction: 现有仿真器已经占住了一部分工作流。
    severity: medium
    affectedBuyer: 自主工程团队负责人
    mitigation: 把自己定位成证据层，接到既有仿真和遥测工具上，而不是去做替换。
    sourceRefs:
    - 4
    - 25
    - 26
  - friction: 早期试点里，项目团队可能更愿意继续用内部脚本。
    severity: medium
    affectedBuyer: 规模更小的机器人 OEM 团队
    mitigation: 用更快出包和更高跨项目复用率，证明自己比开源栈或临时内部工具更值钱。
    sourceRefs:
    - 27
    - 28
  - friction: 基础设施中断或通信退化，会在最后一刻把测试假设打穿。
    severity: high
    affectedBuyer: 面临近期演示压力的项目经理
    mitigation: 把通信依赖显式建模，在靶场日前先产出退化工况下的证据包。
    sourceRefs:
    - 13
    - 23
