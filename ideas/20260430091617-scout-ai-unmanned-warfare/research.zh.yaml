  growthRateSourceRefs:
  - 1
  - 15
  - 16
  - 24
  tailwinds:
  - point: 新一轮大额自主融资和任务自主合同胜利，正在证明无人作战软件背后的预算牵引。
    sourceRefs:
    - 1
    - 7
    - 10
  - point: 陆军和盟友部队都在加速无人机采购、快速测试和实装自主系统，失败演训的代价因此越来越高。
    sourceRefs:
    - 15
    - 16
    - 18
    - 24
  - point: 开源与仿真工具链让场景生成更容易，也让保障层更容易嵌进现有工作流。
    sourceRefs:
    - 25
    - 26
    - 27
  headwinds:
  - point: 采购方极度集中，只要采购周期拉长或一个大项目取消，增长就会明显变慢。
    sourceRefs:
    - 15
    - 16
  - point: 自主控制栈厂商可能会把相邻保障模块直接打包，前提是客户能接受单一厂商锁定。
    sourceRefs:
    - 6
    - 9
    - 25
  - point: 真实外场测试仍受通信基础设施与空域约束影响，软件本身无法独自解决这一切。
    sourceRefs:
    - 23
    - 28
competitors:
- name: Applied Intuition Defense
  stage: scale-up
  wedge: 面向国防项目的数字工程、仿真与自主工具。
  pricing: 定制企业 / 政府报价
  strength: 和陆军车辆项目的贴合度很高，也明确围绕军用自主测试与评估做定位。
  weaknessVsUs: 更偏宽平台；对“可复用审批材料包”和“混编编队就绪证据”这一独立工作流的聚焦不够尖。
  sourceRefs:
  - 3
  - 4
  - 5
- name: Shield AI
  stage: scale-up
  wedge: autonomy brain 与 mission-autonomy 软件，通常与自家的 UAS 平台一起打包。
  pricing: 按合同 / 项目报价
  strength: 已有真实 mission-autonomy 部署、可见国防合同，以及复杂环境作战的可信度。
  weaknessVsUs: 它往往本身就是 OEM 的直接平台对手；采购方未必愿意把审批逻辑和遥测语料压在竞争对手身上。
  sourceRefs:
  - 6
  - 7
  - 8
- name: Anduril Mission Autonomy
  stage: incumbent
  wedge: 横跨无人平台的系统级 mission autonomy 与 C2。
  pricing: 按合同 / 项目报价
  strength: 分发能力深、mission-autonomy 叙事强，且在无人海事与航空项目里持续扩张。
  weaknessVsUs: 栈太一体化；第三方 OEM 和项目办公室更可能想要一层独立证据，而不是 Anduril 自己掌控的审批层。
  sourceRefs:
  - 9
  - 10
  - 11
- name: ReSim
  stage: scale-up
  wedge: 仿真与自主验证基础设施。
  pricing: 定制企业报价
  strength: 为仿真和验证工作流而生。
  weaknessVsUs: 它起家于更泛化的商业自主验证，对贴着陆军里程碑和退化作战场景的国防证据产物仍有空档。
  sourceRefs:
  - 25
- name: NVIDIA Isaac Sim / open-source stack
  stage: incumbent
  wedge: 通用机器人仿真，加上一套开源自主构件。
  pricing: 平台授权或自管开源
  strength: 工程团队熟悉度极高，边际采用成本也低。
  weaknessVsUs: 这类工具链是横向能力，并不会原生解决采购证据、军方 doctrine 映射或混编编队审批工作流。
  sourceRefs:
  - 26
  - 27
regulatoryTechnicalConstraints:
- point: AI 治理与保障要求正在抬高；采购方越来越需要成文的风险管理和测试流程，而不只是演示视频。
  sourceRefs:
  - 19
  - 20
  - 22
- point: 通信退化、EW 韧性和 GPS 拒止，是核心任务约束；任何保障工作流都必须把这些条件显式建模。
  sourceRefs:
  - 13
  - 14
  - 23
- point: 国内空域和无人机运行规则，仍会影响真实测试在哪里跑、怎么跑。
  sourceRefs:
  - 28
- point: 安全、数据权利和隔离网络部署，会抬高实施成本，也会拉长起效时间。
  sourceRefs:
  - 3
  - 23
  - 25
- point: 异构编队意味着产品必须接多条 autonomy stack、车辆总线、遥测存储和仿真器。
  sourceRefs:
  - 4
  - 9
  - 25
  - 26
validationSignals:
- point: Scout AI 围绕面向士兵的自主软件拿到了一笔 $100M Series A。
  sourceRefs:
  - 1
  - 2
- point: Shield AI 正在争夺最高 $800M 的 ISR 服务合同，并持续拿下 mission-autonomy 项目。
  sourceRefs:
  - 7
  - 8
- point: Anduril 正把 mission-autonomy 扩到自主水面舰艇和协同作战飞机。
  sourceRefs:
  - 10
  - 11
- point: 陆军 ATEC 与无人机采购平台动作，说明测试和采购流程的变化已经开始。
  sourceRefs:
  - 15
  - 16
  - 17
- point: 最近 Starlink 故障打断无人机测试，反过来证明真实世界自主试验有多脆，外场前预演为何重要。
  sourceRefs:
  - 23
openQuestions:
- 采购方会不会足够信任一份中立保障材料包，愿意把它纳入里程碑签字；还是最终仍要求内部自制文档？
- 第一条更容易卖出去的接入路径，到底是叠在 Applied/ReSim 一类商业栈之上，还是叠在小 OEM 的 PX4/ROS 开源工作流之上？
- 在拿到密级任务数据前，到底需要多少非密级遥测，才足以证明 ROI？
- 公司能不能长成自主就绪的系统记录层，还是最终只会停在外场前分析工具？
