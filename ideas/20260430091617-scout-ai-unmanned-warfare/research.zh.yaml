  fiveForces:
    supplierPower:
      score: 3
      rationale: 遥测、仿真连接器和安全部署能力都较为专业，但初创公司可以拼接多个供应商与开源栈，而不必依赖某个垄断性供应方。
      sourceRefs:
      - 25
      - 26
      - 27
    buyerPower:
      score: 4
      rationale: 滩头市场的大买方数量相对有限，每个买方都拥有明显的采购议价能力，也可以选择延后购买或将这项工作并入现有自主系统预算。
      sourceRefs:
      - 15
      - 16
      - 18
    threatOfEntrants:
      score: 3
      rationale: 仿真供应商、主承包商和国防软件团队都能向保障领域延伸，但跨项目失效数据和审批模板会随着时间形成累积优势。
      sourceRefs:
      - 3
      - 6
      - 25
    threatOfSubstitutes:
      score: 4
      rationale: 对于早期采用者来说，内部脚本、开源自主系统栈和现有仿真报告仍是可信替代方案。
      sourceRefs:
      - 25
      - 27
    competitiveRivalry:
      score: 4
      rationale: 邻近竞争非常激烈，因为 Applied、Shield、Anduril、ReSim 和 NVIDIA 都触达相邻工作流，即使没有一家完全匹配。
      sourceRefs:
      - 3
      - 6
      - 9
      - 25
      - 26
  pestle:
  - factor: political
    impact: positive
    point: 陆军和 DoD 围绕无人机与快速采购的紧迫性，提升了自主系统相邻工具的可见度。
    sourceRefs:
    - 16
    - 17
    - 18
  - factor: economic
    impact: neutral
    point: 预算是存在的，但集中在少数项目中，并可能随着采购优先级变化而转移。
    sourceRefs:
    - 1
    - 7
    - 24
  - factor: social
    impact: positive
    point: 随着一名人员被要求监督更多自主资产，操作员负担正在明显上升。
    sourceRefs:
    - 2
    - 8
    - 14
  - factor: technological
    impact: positive
    point: DARPA、主承包商和开源生态都在加速推进任务自主、仿真和人机协同。
    sourceRefs:
    - 12
    - 13
    - 14
    - 25
    - 27
  - factor: legal
    impact: negative
    point: AI 风险与自主系统治理要求正在变得更严格，这会提升需求，但也会拉长证据与集成工作量。
    sourceRefs:
    - 19
    - 20
    - 22
  - factor: environmental
    impact: neutral
    point: 天气、地形、通信丢失和 GPS 退化都是运营约束，使实地验证成本高昂，无法被纯数字化取代。
    sourceRefs:
    - 12
    - 15
    - 23
  adoptionFrictionMatrix:
  - friction: 密级、CUI 或气隙任务数据限制了云端部署的便利性。
    severity: high
    affectedBuyer: 国防 OEM 的测试与评估负责人和项目经理
    mitigation: 先以本地或断网部署切入，并先在净化遥测上证明价值。
    sourceRefs:
    - 3
    - 23
    - 28
  - friction: 现有仿真器已经掌握了部分工作流。
    severity: medium
    affectedBuyer: 自主系统工程团队
    mitigation: 将产品定位为接入现有仿真与遥测工具的证据层，而不是替换它们。
    sourceRefs:
    - 4
    - 25
    - 26
  - friction: 项目团队在早期试点中可能更偏好内部脚本。
    severity: medium
    affectedBuyer: 较小型机器人 OEM
    mitigation: 证明相较于开源或临时内部工具，产品在生成材料包速度和跨项目复用方面更优。
    sourceRefs:
    - 27
    - 28
  - friction: 基础设施中断或通信退化可能在后期推翻测试假设。
    severity: high
    affectedBuyer: 面临近期演示的项目经理
    mitigation: 显式建模通信依赖，并在靶场日前生成退化运行证据。
    sourceRefs:
    - 13
    - 23
