slug: autonomy-mission-assurance
date: '2026-04-30'
executiveSummary: >-
  Autonomy Mission Assurance 面向贴近陆军的国防机器人团队销售；这些团队即将开展野外演训、OTA 里程碑或客户演示，根本承受不起在稀缺靶场时间里让混编自主编队出故障。产品是一层中立于平台的保障层，叠加在现有仿真器和遥测之上，专门压力测试退化通信与 GPS 丢失，并输出一份可复用的准备度材料，交给内部评审委员会和政府客户。这一切口与研究里识别出的购买触发点吻合：真正会掏预算的人，是把预算押在一场临近事件上的自主副总裁、项目经理或测试与评估负责人，而不是在做泛平台评估。滩头市场被刻意收窄到 50-500 人规模、面向陆军里程碑的 UGV/UAS OEM 与主承包项目，因为这条工作流验证周期短、ROI 明显，也比直接卖自主“大脑”更少和平台正面冲突。按研究估算，这个品类如果只做成一个独立应用，市场规模并不算大（SAM 为 $45.0M，3 年 SOM 为 $9.0M），所以真正的风投故事取决于产品能否在早期部署后，从事件前保障扩展到运行时策略执行、遥测基准和认证工作流。相应地，定价和交付方式被设计成围绕野外事件的付费试点，再转成按项目收取的年度订阅，既对齐客户真实的预算科目，也为 70% 以上的长期毛利留下空间。最主要的反证风险在于：买方可能把证据生成视为内部职责，安全部署和集成可能拖得太久，或者 Applied Intuition、Shield AI、Anduril 这类现有厂商把足够多的相邻能力打包进去，直接堵住切口。输入资料里公开价格基准有限，因此 ACV、转化率和融资需求目前仍是要在前 6 个月内验证的经营假设。
problem:
  - 混编 UGV/UAS 项目今天仍靠临时拼出的仿真、有限靶场时间和人工整理的评审材料来证明准备度，因此问题暴露得太晚，还会拖累排期。
  - 由士兵监督的编队自主控制，会带来退化通信、GPS 丢失、交接失败和人工接管等边缘场景，测试难度明显高于单车自主。
  - 项目团队需要能穿透内部与客户评审的证据，但现在的材料每个里程碑都得从头重做。
solution:
  - 在野外事件发生前，接入任务计划、车辆画像、自主输出、遥测和通信假设，并围绕退化工况持续跑可重复的场景演练。
  - 生成准备度评分、推荐护栏、遥测回放和一份可导出的证据包，可在评审、演示和里程碑闸口之间反复复用。
  - 把实地演训的遥测再回灌到场景库里，让每次部署都能优化跨平台失效基准和未来任务模板。
whyWeWin:
  - 产品被卖成一层中立于平台的审批层；对 OEM 和项目办公室来说，这比依赖直接平台竞争对手的自主堆栈更容易建立信任。
  - 第一切口绑定的是有预算的具体事件和清晰 ROI——避免失败的靶场日、压缩里程碑准备时间——而不是遥遥无期的平台替换项目。
  - 专有失效案例、操作员接管基准和证据模板可以在多个项目间持续复利，速度会比通用仿真器或内部脚本更快。
strategicChoices:
  beachhead: 面向陆军项目的自主测试负责人、总工程师和项目经理；这些人位于 50-500 人规模的 UGV/UAS OEM 或主承包牵头的混编编队项目中，并将在 90-120 天内迎来野外演训、OTA 里程碑或客户演示。
  wedgeRationale: 这个切入口的购买触发最清楚，验证闭环最短，客户也能立刻判断交付物是否有价值——软件能不能在稀缺靶场时间被消耗前揪出会毁掉任务的问题，并产出一份可评审的材料。相比之下，更宽的自主平台或政府级销售，要么得替换核心控制软件，要么得等更慢的采购周期。
  sequencingRationale: >-
    先作为一层证据层叠加在现有仿真和遥测工作流之上，这样公司无需替换现有自主堆栈也能落地；随后再加入事后对账、可重复的基准仪表盘，最后等到拿到专有任务数据和客户信任后，再切入运行时策略执行。招聘节奏也遵循同样顺序：先把产品和领域可信度做出来，等试点转化后，再增加前线交付和可复制销售。
  notYet:
    - 不卖完整的自主“大脑”、C2 系统或硬件平台。
    - 在还没用 OEM 和主承包项目预算证明价值前，不直接冲正式编制项目。
    - 不扩展到非国防机器人或通用商业自主验证市场。
    - 在部署前证据工作流尚未跑顺前，不先做运行时自主控制。
market:
  tam: 估算 TAM 为 $0.3B，基于大约 150 个美国及盟友的无人自主项目或账户，每个账户每年约有 $2.0M 的保障支出。
  sam: 估算 SAM 为 $45.0M，基于大约 60 个贴近美国陆军的 OEM、主承包商和测试与评估账户，每个滩头账户每年约有 $0.75M 支出，聚焦事件前保障而不是完整平台自主。
  som: 估算第 3 年 SOM 为 $9.0M，基于完成试点转化后拿下 15 个账户、每个账户约 $0.6M 的混合 ACV。
  segments:
    - 核心细分市场是把自主 UGV 或 ISR 无人机交付到试点、OTA 和野外演训中的陆军相关国防机器人 OEM。
    - 次级市场是协同混编无人编队和里程碑评审的国防主承包商与政府测试评估机构。
  buyingProcess: 创始人主导销售应从野外事件前 60-120 天切入自主测试负责人或总工程师；等团队看到一份绑定真实里程碑的证据包草稿后，再推进到自主副总裁或项目经理。交易应先被包装成以付费试点方式降低排期风险，等材料在第二次事件或评审中被复用后，再转成年订阅。
product:
  mvp: MVP 覆盖任务计划导入、失链、GPS denied、交接失败和接管延迟等场景演练，再配上一份准备度报告和证据导出，先服务一个 UGV/UAS 混编工作流。它应先接入一条开源自主堆栈和一条现有仿真或遥测工作流，而不是试图替换任意一边。
  sixMonth: 支持一条付费试点工作流，补上事后遥测对账、一个开源连接器、一个商用仿真器或遥测导出，以及 air-gapped 本地部署选项。
  twelveMonth: 增加可复用审批模板、跨项目仪表盘、任务间基准比较，以及对第二类车辆家族或自主堆栈的支持。
  twentyFourMonth: 扩展到运行时策略检查、供应商认证工作流，以及横跨多个项目和盟友部署的准备度系统记录层。
  keyBets:
    - 买方愿意为证据打包和任务演练付费，而不要求创业公司替换现有仿真器或自主堆栈。
    - 脱敏或非密级遥测足以在公司接触更敏感任务数据前先证明 ROI。
    - 同一套核心失效库既能服务采用开源堆栈的小型 OEM，也能服务使用商用仿真工具的大项目。
    - 事件前保障数据日后能支撑更高价值的模块，例如运行时策略执行和认证。
gtm:
  wedge: 先向面向陆军的 UGV/UAS 项目卖一笔围绕野外事件前保障的付费试点；只要他们在一个季度内就有真实演训或里程碑，再在证据包被复用、遥测对账证明持续价值后，转成按项目计费的年度订阅。
  channels:
    - 由创始人和国防领域专家直接销售给自主负责人、测试与评估负责人和项目经理。
    - 与已嵌入测试工作流的仿真、数字工程和遥测厂商做集成式合作。
    - 在第一版证据模板被客户接受后，再通过陆军快速采购与无人机 marketplace 渠道切入贴近项目的机会。
  funnelTargets: 目标是每季度覆盖 10-15 个账户，discovery 到合格试点 25-35%，合格试点到付费试点 40%+，付费试点到年度生产环境 50%+，生产环境到账户内第二个项目扩张在 12 个月内达到 30%+。
  pricing: 付费试点定价为 $150k-$300k，对应一个野外事件周期；随后转成每个项目每年 $600k-$1.2M 的订阅，新增车辆类型或安全部署环境再收额外导入费。这比按席位定价更贴合研究里识别出的项目预算购买路径。
businessModel:
  revenueStreams:
    - 绑定野外演训、演示和 OTA 里程碑的付费试点。
    - 按自主项目计费的年度软件订阅。
    - 新车辆类型、遥测来源和安全环境的导入与集成费用。
    - 当项目进入生产后，按高频任务演练包收取使用费。
  unitOfValue: 一个已保障的自主项目或一次野外事件周期。
  targetGrossMarginPct: 72
  expansionLevers:
    - 在每个 OEM 或主承包账户内增加更多项目、车辆家族和任务模板。
    - 在首个试点成功后，向上销售遥测基准、审批工作流管理和事后分析。
    - 当公司拥有足够大的失效语料后，进一步扩展到运行时策略执行和供应商认证。
strategyMap:
  northStarMetric: 在两个或以上连续里程碑周期中使用该平台的生产级项目数量。
  inputMetrics:
    - 从 kickoff 到拿到第一份可用证据包的天数。
    - 付费试点转年度合同的比率。
    - 每个活跃项目运行的任务场景数量。
    - 证据包在里程碑之间的复用率。
    - 导入一类新自主堆栈或车辆类型所需时间。
  moatsToBuild:
    - 跨平台的退化通信、EW、GPS 丢失和接管失效模式语料库。
    - 可复用的陆军式证据模板和审批逻辑。
    - 横跨多个项目的操作员监督与混编编队准备度基准数据集。
  killCriteria:
    - 聚焦陆军相关销售 12 个月后，付费试点仍少于 2 个。
    - 前 4 个付费试点之后，试点转生产的转化率低于 30%。
    - 第 3 次部署后，单个账户平均集成时间仍高于 6 个工程师周。
    - 客户不允许在任何内部评审或面向客户的里程碑中使用该证据包。
  mermaid: |
    flowchart LR
      Wedge[陆军野外事件保障试点] --> MVP[任务演练加证据包]
      MVP --> Proof[付费试点在靶场日前抓出问题]
      Proof --> Expansion[按项目收取的年度订阅]
      Expansion --> Moat[遥测基准与认证工作流]
investorMemo:
  verdict:
    call: 建议会面 / 继续深挖
    conviction: 这是一个切入紧迫国防工作流的强切口，但前提是早期客户把这层证据层当成可重复产品，而不是一次次定制服务。
    whyBelieve: 方案瞄准的是一个有预算、紧迫且买方清晰的里程碑风险问题；要替代的对手在工作流层面也真实存在，而且跨项目失效证据沉淀出数据护城河的逻辑说得通。
    whyDoubt: 这个独立滩头市场单独看并不够大，且安全和集成摩擦可能把公司困在慢而重的服务型部署里。
    nextDiligence: 与 10-15 位贴近陆军的测试评估和自主负责人核实：他们是否愿意在拿到 classified 数据前就先为付费试点买单，以及是否会在真实里程碑中复用第三方证据包。
  firstCustomer:
    title: 一家面向陆军的机器人 OEM 的测试与评估总监
    profile: 一家有 50-500 名员工的 UGV 或 ISR 无人机公司，正在推进 1-3 个陆军试点项目，内部既有混杂的仿真环境，也有开源工具和实地靶场演练。
    trigger: 未来 90-120 天内有一场野外演训、OTA 里程碑或客户演示，而且需要一名操作员在退化通信条件下监督多台自主资产。
    buyer: 自主业务副总裁或机器人系统项目经理
    initialContract: 先签一笔 $150k-$300k 的单次演训试点；如果材料能在两个里程碑中复用，再转成每年 $600k-$1.2M 的按项目订阅。
  mustBeTrue:
    - 前 10 个目标测试评估或自主负责人里，至少有 5 人确认“失败的靶场日”或“延误的审批材料”是眼下已有预算的痛点。
    - 至少有 3 个 design partner 愿意在公司尚未接触 classified 任务数据前，就先签付费试点。
    - 同一种证据包格式，能在 2 个不同账户里都被用于内部评审或面向客户的里程碑。
    - 当证据包在第二次事件中被复用时，试点转生产转化率至少达到 50%。
    - 一条开源路径加一条商用仿真器或遥测连接器，能覆盖首年管线中超过 60% 的机会。
  diligenceQuestions:
    - 今天真正能推进里程碑的材料到底是哪一种——准备度评分、安全论证、遥测回放，还是事后证据包？
    - 有多少事件前预算能在一个季度内花出去，而不必走完整的政府采购周期？
    - 如果 Applied、Shield 或 Anduril 在同一笔交易里提供相邻能力，客户还会不会买一层中立于平台的保障层？
    - 在安全或 classified 部署尚未就位前，最少需要什么级别的遥测和任务数据才能证明价值？
    - Onboarding 能不能标准化到足以把毛利率维持在 70% 以上，还是每个项目最后都会变成一套定制集成？
  riskHeatmap:
    - risk: 采购和预算时间点滑出事件前销售窗口。
      likelihood: Medium
      impact: High
      leadingIndicator: Discovery call 看起来都很感兴趣，但合格账户里能在一个季度内拿出试点预算的不到 25%。
      mitigation: 先卖给有风险投资支持的 OEM 和主承包试点项目，他们手里有能快速决策的项目预算，而且都绑着临近的野外事件。
    - risk: 安全部署和数据权属要求拖慢价值兑现。
      likelihood: High
      impact: High
      leadingIndicator: 超过一半的严肃机会都要求先拿到 classified 或 CUI 数据访问权限，才愿意批准试点。
      mitigation: 从第一版起就先用脱敏遥测、本地部署和 air-gapped 产品路径打头阵。
    - risk: 内部工具或现有仿真器对第一工作流来说已经“够用了”。
      likelihood: Medium
      impact: High
      leadingIndicator: 潜在客户主要把产品拿来和现有脚本或仿真报告比较，并拒绝为证据打包付费。
      mitigation: 证明产品能更快生成材料、给出混编编队准备度评分，并产出通用仿真输出无法提供的跨项目基准价值。
    - risk: 公司最终变成重服务集成商，而不是软件公司。
      likelihood: Medium
      impact: High
      leadingIndicator: 平均部署工作量始终高于 6 个工程师周，而且每笔交易都要求定制证据格式。
      mitigation: 标准化前两个连接器，收窄滩头市场，并拒绝那些不能提升可复用材料模板的定制需求。
    - risk: 这个品类最终只停留在事件前分析，扩张不上去。
      likelihood: Medium
      impact: Medium
      leadingIndicator: 客户只在每次事件前用一次工具，对遥测基准、工作流管理或运行时控制没有任何后续拉力。
      mitigation: 尽早埋点扩张需求，并优先做能提升事件间持续使用频率的路线图模块。
operatingAssumptions:
  - assumption: 贴近陆军的 OEM 和主承包项目，能在 90-120 天内从项目预算中拿出钱来支持一次付费试点，前提是它绑定着临近的野外事件。
    basis: research.yaml
    validationTest: 在不等待完整政府采购载体或跨季度审批的情况下，从短期里程碑机会中拿下 2 个付费试点。
    decisionImpact: 如果这个假设不成立，就应转向已有合同载体的大型主承包伙伴，或重新考虑滩头市场。
  - assumption: 脱敏或非密级遥测足以在首批部署里证明事件前 ROI。
    basis: research.yaml
    validationTest: 用删减后的遥测跑一个试点，并确认客户依然认可至少一条重要准备度发现以及相应证据包。
    decisionImpact: 如果这个假设不成立，公司就必须更早投入安全环境建设、接受更长销售周期，并准备更大的融资需求。
  - assumption: 一套收窄的连接器策略能在不替换客户仿真堆栈的前提下，完成大多数早期潜在客户的接入。
    basis: operator judgment
    validationTest: 支持一条开源自主工作流和一条商用仿真器或遥测导出，并把单个账户 onboarding 压到 20 个工程日以内。
    decisionImpact: 如果这个假设不成立，目标毛利率和销售速度都会失真，逼着公司走向服务模式或更窄的 ICP。
  - assumption: 客户愿意支付 $150k-$300k 试点费用，因为避免一次失败的野外演训，价值本身就高于试点价格。
    basis: idea.yaml
    validationTest: 至少从 2 个 design partner 手里拿到不低于该价格带的签约报价。
    decisionImpact: 如果这个假设不成立，公司就需要更低成本的封装方式、不同定价，或干脆换买方。
  - assumption: 这个滩头市场能进一步扩展到遥测基准、认证和运行时策略执行，从而支撑风投级回报。
    basis: idea.yaml
    validationTest: 在前 6 个生产部署中，至少有 3 个客户在续约前主动提出其中一个扩展模块。
    decisionImpact: 如果这个假设不成立，投资人应把公司视为一个利基工作流生意，而不是宽平台级的自主保障公司。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 访谈 12-15 位自主测试负责人、总工程师和项目经理，并收集他们当前的里程碑材料样本。
    hypothesis: 第一买方愿意付钱，是因为它能压缩材料制作时间、降低靶场失败风险，而不是单纯为了多跑几次仿真。
    successMetric: 至少 8 位受访者把证据生成或评审延误排进前 3 大痛点，而且有 3 个账户愿意提供现有材料供我们 redline。
    owner: CEO
  - horizon: 0-90 天
    experiment: 用一份样例任务计划和一份遥测日志，在产品背后辅以人工分析支持，原型化出一份准备度材料。
    hypothesis: 即使自动化尚未完整，客户判断价值时看的仍是这份输出能否直接进入真实评审决策。
    successMetric: 3 个 design partner 认可这份材料明显优于他们今天的 slideware，并承诺进入付费试点时间表。
    owner: 创始工程师
  - horizon: 90-180 天
    experiment: 为管线里已经存在的一条 PX4 或 ROS 风格工作流，以及一条商用仿真器或遥测导出路径，做出连接器。
    hypothesis: 覆盖这两条路径，就足以打开首年大多数机会，而无需做定制平台替换。
    successMetric: 超过 60% 的合格机会能落进这两条连接路径之一，且 onboarding 保持在 20 个工程日以内。
    owner: 创始工程师
  - horizon: 90-180 天
    experiment: 围绕一场真实野外演训跑下第一个付费试点，并把事件前发现和事件后结果逐项对比。
    hypothesis: 产品能在靶场日前抓出至少一个关键问题，并产出一份在事件后仍被复用的材料。
    successMetric: 客户确认至少避免了一次故障或节省了排期，并在 30 天内要求生产环境方案。
    owner: 国防测试与评估负责人
  - horizon: 180-360 天
    experiment: 为第二个付费账户交付一套 air-gapped 本地部署和安全评审。
    hypothesis: 安全部署可以被标准化，而不会把公司拖成一个定制集成项目。
    successMetric: 第二次安全部署在 4 周内完成，并沿用与第一个账户相同的发布流程。
    owner: 安全或平台工程师
  - horizon: 180-540 天
    experiment: 把首批试点转成年度订阅，并测试客户对基准或审批工作流模块的扩张需求。
    hypothesis: 客户愿意续约，是因为工具会在多个里程碑间被重复使用，而不是因为一次性服务支持。
    successMetric: 至少签下 2 份年度生产合同，且至少有 1 个客户在续约前主动提出扩展模块需求。
    owner: CEO
operations:
  - 从第一天起就把本地与 air-gapped 部署模式标准化，确保容器发布可重复，审计日志完整。
  - 维护一套版本化的任务模板、失效场景和证据包 schema，并与客户已批准的工作流绑定。
  - 通过轻量连接器接入遥测存储、仿真器和开源自主堆栈，而不是替换客户现有基础设施。
  - 用前线交付 playbook 把复盘、功能请求和基准数据按季度回流到核心产品。
team:
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 负责创始人主导销售、design partner 招募，以及与仿真和遥测厂商建立合作关系。
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 搭建保障引擎、第一批连接器和证据包生成工作流。
  - role: 国防自主 / 测试与评估负责人
    startTiming: 第 1 个月
    rationale: 把贴近陆军的里程碑工作流转成可信的材料模板，并和客户一起跑试点交付。
  - role: 前线部署工程师
    startTiming: 第 4 个月
    rationale: 缩短试点 onboarding、管理集成工作，并防止客户定制需求拖慢产品节奏。
  - role: 安全或平台工程师
    startTiming: 第 6 个月
    rationale: 把本地、air-gapped 和审计日志要求产品化，为更广泛的国防采用铺路。
  - role: 客户经理 / 商务负责人
    startTiming: 第 9 个月
    rationale: 等首套付费试点打法和参考客户跑通后，再引入可重复的管线生成。
milestones:
  - horizon: 0-12 个月
    items:
      - 签下 3 个 design partner，并拿下至少 2 个绑定真实野外事件的付费试点。
      - 交付任务计划导入、核心退化工况场景库、证据包导出和事后遥测对账。
      - 支持一条开源连接器、一条商用仿真或遥测连接器，以及一套 air-gapped 部署。
      - 至少把 1 个试点转成年度订阅，并形成一个基于“避免故障”或“更快签字”的可复用 ROI 案例。
  - horizon: 12-24 个月
    items:
      - 在 OEM 和主承包账户中跑出 5-7 个生产级项目。
      - 上线基准仪表盘、可复用审批工作流，以及对第二类车辆家族或自主堆栈的支持。
      - 通过减少部署工作量和复用证据模板，把目标毛利率稳在 70% 以上。
      - 建立至少 1 个渠道合作，让产品进入现有仿真或遥测工作流。
  - horizon: 24-36 个月
    items:
      - 拿下 12-15 个账户，并逼近研究估算的第 3 年 $9.0M SOM。
      - 发布运行时策略检查或认证工作流，让野外事件之间也产生持续使用频率。
      - 通过现有美国客户或合作伙伴关系，拓展到至少 1 个盟友项目。
      - 证明真正的护城河是基准数据和审批逻辑，而不是定制服务人力。
risks:
  - risk: 国防采购与项目预算节奏可能慢到超出创业公司的烧钱承受力。
    likelihood: Medium
    impact: High
    mitigation: 先从有风险投资支持的 OEM 和主承包试点切入，那里的野外事件预算和决策人更容易触达。
  - risk: 安全部署、数据权属和 classified 工作流需求，可能把实施成本抬到计划之外。
    likelihood: High
    impact: High
    mitigation: 先用脱敏遥测证明 ROI，并在大规模扩张前把本地和 air-gapped 部署标准化。
  - risk: 现有仿真或自主厂商可能打包足够多的相邻保障能力，从而阻断采用。
    likelihood: Medium
    impact: High
    mitigation: 坚持平台中立，占住可评审证据物这一层，并聚焦现有厂商难以标准化的混编编队审批工作流。
  - risk: 客户可能仍更偏好内部脚本和服务式交付，而不是产品化的证据层。
    likelihood: Medium
    impact: High
    mitigation: 收窄 ICP，证明更快出材料和更省靶场日，并拒绝那些不能提升共享模板库的定制工作。
  - risk: 产品可能始终扩展不出一个利基的事件前工具。
    likelihood: Medium
    impact: Medium
    mitigation: 尽早跟踪客户对基准、工作流管理和运行时模块的拉力；如果拉力不出现，就及时下调公司野心。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月的现金跑道应足以支撑核心产品团队、air-gapped 部署能力、3-4 个 design partner 或试点部署，并积累足够客户证明，把至少 2 个项目转成年度订阅。