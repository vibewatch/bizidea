slug: autonomy-mission-assurance
date: '2026-04-30'
executiveSummary: >-
  Autonomy Mission Assurance 面向那些即将开展实地演训、OTA 里程碑或客户演示，且无法承受混编编队自主系统在稀缺靶场时间内失效的陆军相关国防机器人团队销售。产品是一层供应商中立的保障软件，叠加在现有仿真器和遥测之上，对通信退化与 GPS 丢失进行压力测试，并生成可供内部评审委员会与政府客户复用的就绪度材料包。这一切入点与调研到的购买触发点一致：有预算、且由临近事件驱动的 Autonomy VP、项目经理或测试与评估负责人，而不是进行前瞻性平台评估的团队。滩头市场被刻意收窄为 50-500 人规模、面向陆军里程碑的 UGV/UAS OEM 与主承包项目，因为这一工作流验证周期短、ROI 可见，而且比直接售卖自主系统大脑更少引发平台层面的正面冲突。作为独立应用品类，调研估算的市场规模并不大（SAM 为 $45.0M，year-3 SOM 为 $9.0M），因此风险投资逻辑取决于公司能否在早期部署后，从部署前保障扩展到运行时策略执行、遥测基准评测与认证工作流。基于此，定价与交付应设计为围绕实地事件的付费试点，并进一步转化为按项目收取的年度订阅，以对齐客户真实预算科目，并在集成模板成熟后将毛利率维持在 70% 以上。最主要的反证性风险在于，买方可能将证据生成视为内部职责、安全部署与集成耗时过长，或者 Applied Intuition、Shield AI、Anduril 等现有厂商捆绑足够多的相邻能力，从而堵死这一切入点。公开定价基准在输入资料中仍较有限，因此 ACV、转化率与资金需求仍是需要在前 6 个月验证的经营假设。
problem:
  - 混编 UGV/UAS 项目仍依赖临时仿真、有限靶场时间以及人工拼装的评审材料来证明就绪度，因此故障暴露得太晚并消耗排期。
  - 由士兵监督的编队自主系统引入了通信退化、GPS 丢失、交接失败和人工接管等边缘场景，比单车自主更难测试。
  - 项目团队需要能在内部与客户评审中站得住的证据，但当前材料几乎要为每个里程碑从头重做。
solution:
  - 在实地任务前接入任务计划、载具画像、自主系统输出、遥测和通信假设，并针对退化运行条件执行可重复的场景扫测。
  - 生成就绪度评分、推荐防护约束、遥测回放和可导出的证据包，供评审、演示和里程碑闸口复用。
  - 将实兵演训遥测回灌至场景库，使每次部署都能改进跨平台失效基准和后续任务模板。
whyWeWin:
  - 产品被定位为供应商中立的审批层，比依赖直接平台竞争对手的自主系统栈更容易获得 OEM 与项目办公室信任。
  - 首个切入点绑定在已有预算、且 ROI 明确可见的事件上，也就是避免靶场日失败并压缩里程碑准备时间，而不是做长期平台替换。
  - 专有失效案例、人工接管基准和证据模板，能比通用仿真器或内部脚本更快地在项目间积累复利。
strategicChoices:
  beachhead: 面向陆军的自主系统测试总监、首席工程师和项目经理，他们所在的 50-500 人 UGV/UAS OEM 或主承包混编编队项目，计划在 90-120 days 内开展实地演训、OTA 里程碑或客户演示。
  wedgeRationale: 这一切入口具备最明确的购买触发点、最短的验证闭环，以及客户能够立刻判断价值的交付物，也就是软件是否能在消耗稀缺靶场时间前发现足以毁掉任务的问题，并生成可审阅的材料包。更广泛的自主系统平台销售或面向全政府的销售，要么需要替换核心控制软件，要么必须经历更慢的采购周期。
  sequencingRationale: >-
    先以叠加在现有仿真与遥测工作流之上的证据层切入，从而在不替换现有自主系统栈的前提下落地；随后增加行动后对账、可重复的基准看板；最后在获得专有任务数据和客户信任后，扩展到运行时策略执行。招聘节奏也应遵循同一顺序：先建立产品与领域可信度，再在试点转化后增加前线交付与可复制销售能力。
  notYet:
    - 销售完整的自主系统大脑、C2 记录系统或硬件平台。
    - 在尚未用 OEM 和主承包项目预算验证价值前，直接追逐正式列装项目。
    - 扩展到非国防机器人或通用商业自主系统验证。
    - 在部署前证据工作流尚未可重复之前，过早构建运行时自主控制。
market:
  tam: 基于大约 150 个美军及盟友无人自主项目或账户、以及每年约 $2.0M 的保障支出估算，TAM 为 $0.3B。
  sam: 基于大约 60 个美国陆军相关 OEM、主承包商和测试与评估账户、以及每年约 $0.75M 的滩头支出估算，SAM 为 $45.0M。
  som: 基于到 year-3 落地 15 个账户、试点转化后 blended ACV 约 $0.6M 估算，year-3 SOM 为 $9.0M。
  segments:
    - 主要细分市场是将自主 UGV 或 ISR 无人机投入试点、OTA 和实地演训的陆军相关国防机器人 OEM。
    - 次级细分市场是协调混编无人编队和里程碑评审的国防主承包商与政府测试与评估组织。
  buyingProcess: 创始人主导销售应从实地任务前 60-120 days 联系自主系统测试总监或首席工程师开始，再在团队看到与真实里程碑绑定的证据包草稿后推进至 Autonomy VP 或项目经理。交易应被包装成降低进度风险的付费试点，并仅在材料包被用于第二次事件或评审周期后再转为年度合同。
product:
  mvp: MVP 覆盖任务计划接入、针对失联、GPS 拒止、交接失败和人工接管延迟的场景扫测，以及面向单一 UGV/UAS 混编工作流的就绪度报告与证据导出。它应集成一个开源自主系统栈和一个现有仿真或遥测工作流，而不是试图替换其中任何一方。
  sixMonth: 支持一个付费试点工作流，包含行动后遥测对账、一个开源连接器、一个商业仿真器或遥测导出接口，以及气隙本地部署选项。
  twelveMonth: 增加可重复的审批模板、多项目看板、跨任务基准对比，以及对第二类载具家族或自主系统栈的支持。
  twentyFourMonth: 扩展至运行时策略检查、供应商认证工作流，以及横跨多个项目和盟友部署的就绪度权威记录系统。
  keyBets:
    - 买方愿意为证据打包与任务预演付费，而无需公司替换其仿真器或自主系统栈。
    - 净化后的或非密级遥测，足以在公司拿到更敏感任务数据之前证明 ROI。
    - 同一套核心失效库既能服务使用开源栈的小型 OEM，也能服务使用商业仿真工具的大型项目。
    - 部署前保障数据，未来能够支撑运行时策略执行和认证等更高价值模块。
gtm:
  wedge: 向面向陆军的 UGV/UAS 项目销售付费的部署前保障试点，这些项目必须在一个季度内完成实地演训或里程碑；随后在证据包获得复用且遥测对账证明持续价值后，转为按项目收取的年度订阅。
  channels:
    - 由创始人与国防领域专家直接销售给自主系统负责人、测试与评估负责人和项目经理。
    - 借助已嵌入测试工作流的仿真、数字工程和遥测供应商建立集成合作。
    - 在首个证据模板被客户接受后，通过陆军快速采购与无人机市场渠道切入项目周边流程。
  funnelTargets: 10-15 个目标账户每季度，discovery-to-qualified-pilot 25-35%，qualified-pilot-to-paid-pilot 40%+，paid-pilot-to-annual-production 50%+，以及在 12 个月内 production-to-second-program expansion 30%+。
  pricing: 单次付费试点定价为 $150k-$300k，对应一个实地事件周期；随后转为 $600k-$1.2M 的年度按项目订阅，对于新增载具类型或安全部署环境另收导入费用。这比按席位计费更符合调研所得的项目预算购买路径。
businessModel:
  revenueStreams:
    - 与实地演训、演示和 OTA 里程碑绑定的付费试点。
    - 按自主系统项目计价的年度软件订阅。
    - 对新增载具类型、遥测来源和安全环境收取导入与集成费用。
    - 当项目进入生产阶段后，对高频任务预演包收取基于用量的费用。
  unitOfValue: 一个已被保障的自主系统项目或一次实地事件周期。
  targetGrossMarginPct: 72
  expansionLevers:
    - 在每个 OEM 或主承包账户中增加更多项目、载具家族和任务模板。
    - 在初始试点成功后，上售遥测基准评测、审批工作流管理和行动后分析。
    - 在公司掌握足够有意义的失效语料库后，扩展到运行时策略执行和供应商认证。
strategyMap:
  northStarMetric: 在两个或以上连续里程碑周期中使用平台的生产项目数量。
  inputMetrics:
    - 从 kickoff 到首个可用证据包的天数。
    - 付费试点到年度合同的转化率。
    - 每个活跃项目运行的任务场景数。
    - 证据包在里程碑之间的复用率。
    - 新增自主系统栈或载具类型的接入时间。
  moatsToBuild:
    - 覆盖通信退化、EW、GPS 丢失和人工接管失效模式的跨平台语料库。
    - 可复用的陆军式证据模板与审批逻辑。
    - 覆盖多项目的操作员监督与混编编队就绪度基准数据集。
  killCriteria:
    - 在专注陆军相关销售 12 个月后，付费试点少于 2 个。
    - 前 4 个付费试点之后，pilot-to-production 转化率低于 30%。
    - 第三次部署之后，平均每个账户的集成时间仍高于 6 engineer-weeks。
    - 客户不允许在任何内部评审或面向客户的里程碑中使用该证据包。
  mermaid: |
    flowchart LR
      Wedge[陆军实地事件保障试点] --> MVP[任务预演与证据包]
      MVP --> Proof[付费试点在靶场日前发现问题]
      Proof --> Expansion[按项目计费的年度订阅]
      Expansion --> Moat[遥测基准与认证工作流]
investorMemo:
  verdict:
    call: 约见 / 继续尽调
    conviction: 这是一个切入紧迫国防工作流的强切口，但前提是早期客户把证据层视为可重复产品，而不是定制化服务。
    whyBelieve: 该计划针对的是一个已有预算、且买方紧迫度明确的里程碑风险问题；它处在可被工作流层替换的现有竞争者之间，并且具备从跨项目失效证据中形成数据护城河的合理路径。
    whyDoubt: 单独的滩头市场本身规模不足够大，而安全或集成摩擦可能把公司困在缓慢且服务化程度过高的部署模式里。
    nextDiligence: 与 10-15 位陆军相关的测试与评估及自主系统负责人验证两点：他们是否会在获得密级数据前为付费试点买单，以及他们是否愿意在真实里程碑中复用第三方提供的证据包。
  firstCustomer:
    title: 面向陆军的机器人 OEM 测试与评估总监
    profile: 一家拥有 50-500 名员工的 UGV 或 ISR 无人机公司，运行着 1-3 个陆军试点项目，并同时使用内部仿真、开源工具链和实地靶场预演。
    trigger: 在未来 90-120 days 内即将进行实地演训、OTA 里程碑或客户演示，且要求单一操作员在通信退化条件下监督多项自主资产。
    buyer: 自主系统副总裁或机器人系统项目经理
    initialContract: 单次演训的 $150k-$300k 付费试点；若在两个里程碑中被复用，则转为 $600k-$1.2M 的年度按项目订阅。
  mustBeTrue:
    - 前 10 个目标测试与评估或自主系统负责人中，至少有 5 人确认失败的靶场日或延迟的审批材料包是当前已有预算的问题。
    - 至少 3 个设计合作伙伴愿意在公司尚未获得密级任务数据前就签署付费试点。
    - 同一种证据包格式在两个独立账户中都被用于内部评审或面向客户的里程碑。
    - 当证据包在第二次事件中被复用时，pilot-to-production 转化率至少达到 50%。
    - 一条开源路径加上一种商业仿真器或遥测连接器，能覆盖 first-year pipeline 的 60% 以上。
  diligenceQuestions:
    - 当前究竟是哪一种产物真正推动了里程碑进展，是就绪度评分、安全论证、遥测回放，还是行动后材料包？
    - 在不经历完整政府采购周期的情况下，究竟有多少部署前预算能在一个季度内花出去？
    - 如果 Applied、Shield 或 Anduril 在同一交易中提供相邻能力，客户是否仍会购买供应商中立的保障层？
    - 在可用安全或密级部署之前，证明价值所需的最小遥测与任务数据集是什么？
    - 接入过程能否足够标准化，以把毛利率维持在 70% 以上，还是每个项目都会演变成一次定制集成？
  riskHeatmap:
    - risk: 采购和预算时点滑出部署前销售窗口。
      likelihood: Medium
      impact: High
      leadingIndicator: Discovery call 表达兴趣，但能在一个季度内为试点拨款的合格账户少于 25%。
      mitigation: 先卖给拥有自主裁量项目预算、且绑定近期实地事件的风险投资支持 OEM 和主承包试点项目。
    - risk: 安全部署与数据权要求拖慢价值兑现速度。
      likelihood: High
      impact: High
      leadingIndicator: 超过一半的高意向机会在批准试点前就要求访问密级或 CUI 数据。
      mitigation: 从第一版产品起就以净化遥测、本地部署和气隙产品路径为前导方案。
    - risk: 内部工具或现有仿真器对首个工作流已经“够用”。
      likelihood: Medium
      impact: High
      leadingIndicator: 潜在客户主要把产品与现有脚本或仿真报告比较，并拒绝为证据打包付费。
      mitigation: 证明更快的材料包生成速度、混编编队就绪度评分以及通用仿真输出无法提供的跨项目基准价值。
    - risk: 公司演变成高服务化集成商，而不是软件供应商。
      likelihood: Medium
      impact: High
      leadingIndicator: 平均部署工作量始终高于 6 engineer-weeks，且每笔交易都要求定制证据格式。
      mitigation: 标准化前两个连接器，缩窄滩头市场，并拒绝那些不能提升通用材料包模板的定制需求。
    - risk: 这一品类最终只停留在部署前分析，无法扩展。
      likelihood: Medium
      impact: Medium
      leadingIndicator: 客户只在单次事件中使用工具，且对遥测基准评测、工作流管理或运行时控制没有明显拉力。
      mitigation: 尽早埋点扩展需求，并优先建设能在实地事件之间提高持续使用频次的路线图项目。
operatingAssumptions:
  - assumption: 当陆军相关 OEM 与主承包项目面临临近实地事件时，可以在 90-120 days 内用项目预算为付费试点拨款。
    basis: research.yaml
    validationTest: 在不等待完整政府采购载体或跨季度流程的前提下，从临近里程碑机会中签下 2 个付费试点。
    decisionImpact: 如果该假设不成立，就转向已有合同载体的大型主承包伙伴，或重新考虑滩头市场。
  - assumption: 净化后的或非密级遥测足以在首批部署中展示部署前 ROI。
    basis: research.yaml
    validationTest: 使用脱敏遥测运行一次试点，并确认客户仍认可至少一个实质性就绪度发现及其生成的材料包。
    decisionImpact: 如果不成立，公司就必须更早投入安全环境、承受更长销售周期并提高融资需求。
  - assumption: 窄连接器策略足以在不替换客户仿真栈的情况下接入大多数早期客户。
    basis: operator judgment
    validationTest: 支持一个开源自主系统工作流和一个商业仿真器或遥测导出，并把每个账户的接入时间控制在 20 engineer-days 以内。
    decisionImpact: 如果不成立，目标毛利率和销售速度都会失真，公司将被迫走服务模式或进一步收窄 ICP。
  - assumption: 客户愿意支付 $150k-$300k 的试点费，因为避免一次失败演训带来的价值高于试点价格。
    basis: idea.yaml
    validationTest: 至少从 2 个设计合作伙伴处拿到位于提议价格区间内的签字报价。
    decisionImpact: 如果不成立，公司需要更低成本的自助式打包方式、不同定价，或更换买方。
  - assumption: 滩头市场可以扩展到遥测基准评测、认证和运行时策略执行，从而支撑风险投资级回报。
    basis: idea.yaml
    validationTest: 在前 6 个生产部署中，至少有 3 个客户在续约前请求上述扩展模块之一。
    decisionImpact: 如果不成立，投资人应把公司按狭窄工作流业务承保，而不是广义自主系统保障平台。
experimentRoadmap:
  - horizon: 0-90 days
    experiment: 访谈 12-15 位自主系统测试总监、首席工程师和项目经理，并收集他们当前的里程碑材料包产物。
    hypothesis: 第一类买方愿意付费，是为了压缩材料包制作时间并降低靶场日失败风险，而不仅仅是为了多跑几次仿真。
    successMetric: 至少 8 位受访者把证据生成或评审延迟列为前三痛点，且有 3 个账户愿意提供现有材料供逐行修改。
    owner: CEO
  - horizon: 0-90 days
    experiment: 基于一份样例任务计划和一份遥测日志，在产品背后用人工分析支持原型化生成就绪度材料包。
    hypothesis: 即便尚未完全自动化，客户仍会根据输出是否足以进入真实评审委员会做决策来判断价值。
    successMetric: 3 个设计合作伙伴确认该材料包明显优于他们当前的幻灯片做法，并承诺进入付费试点时间表。
    owner: 创始工程师
  - horizon: 90-180 days
    experiment: 为 pipeline 中已经存在的一条 PX4 或 ROS 风格工作流，以及一个商业仿真器或遥测导出构建连接器。
    hypothesis: 覆盖这两条路径就能解锁大部分 first-year opportunities，而无需做定制平台替换。
    successMetric: 超过 60% 的合格机会落在这两条连接器路径之内，且接入时间控制在 20 engineer-days 以下。
    owner: 创始工程师
  - horizon: 90-180 days
    experiment: 围绕一次真实实地演训运行首个付费试点，并比较部署前发现与演训后结果。
    hypothesis: 产品能在靶场日前发现至少一个实质性问题，并生成一个在事件后仍被复用的材料包。
    successMetric: 客户确认至少避免了一次故障或节省了排期，并在 30 days 内提出生产环境方案请求。
    owner: 国防测试与评估负责人
  - horizon: 180-360 days
    experiment: 为第二个付费账户交付一套气隙本地部署与安全评审。
    hypothesis: 安全部署可以被标准化到足以避免沦为一次性定制集成项目。
    successMetric: 第二次安全部署在 4 weeks 或更短时间内完成，并沿用与首个账户相同的发布流程。
    owner: 安全或平台工程师
  - horizon: 180-540 days
    experiment: 将首批试点转为年度订阅，并测试客户对基准评测或审批工作流模块的扩展需求。
    hypothesis: 客户续约的原因，是工具能跨里程碑持续复用，而不是依赖一次性的服务支持。
    successMetric: 至少签下 2 份年度生产合同，且至少有 1 个客户在续约前请求扩展模块。
    owner: CEO
operations:
  - 从一开始就标准化本地与气隙部署模式，采用可重复容器发布和审计日志。
  - 维护一套版本化的任务模板、失效场景和证据包 schema 库，并绑定到客户已批准的工作流。
  - 构建轻量连接器接入遥测存储、仿真器和开源自主系统栈，而不是替换客户基础设施。
  - 使用前线交付 playbook，让复盘、功能需求和基准数据每个季度都能回流到核心产品。
team:
  - role: CEO 或创始人
    startTiming: Month 0
    rationale: 负责创始人主导销售、设计合作伙伴招募，以及与仿真和遥测供应商的合作关系。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 构建保障引擎、首批连接器和证据包生成工作流。
  - role: 国防自主系统或测试与评估负责人
    startTiming: Month 1
    rationale: 将陆军相关里程碑工作流转化为可信的材料包模板，并负责客户试点交付。
  - role: 前线交付工程师
    startTiming: Month 4
    rationale: 缩短试点接入时间、管理集成，并防止客户特定工作拖慢产品速度。
  - role: 安全或平台工程师
    startTiming: Month 6
    rationale: 产品化本地部署、气隙部署与审计日志要求，以支撑更广泛的国防采用。
  - role: 客户经理或商务拓展负责人
    startTiming: Month 9
    rationale: 仅在首个付费试点 playbook 和标杆账户建立后，再增加可重复的 pipeline 生成能力。
milestones:
  - horizon: 0-12 months
    items:
      - 签下 3 个设计合作伙伴，并围绕真实实地事件完成至少 2 个付费试点。
      - 交付任务计划接入、核心退化运行场景库、证据包导出和行动后遥测对账。
      - 支持 1 个开源连接器、1 个商业仿真或遥测连接器，以及 1 个气隙部署。
      - 至少将 1 个试点转为年度订阅，并基于避免故障或加快签字放行形成可重复 ROI 案例。
  - horizon: 12-24 months
    items:
      - 在 OEM 与主承包账户中达到 5-7 个生产项目。
      - 发布基准看板、可复用审批工作流，并支持第二类载具家族或自主系统栈。
      - 通过降低部署工作量和复用证据模板，将目标毛利率维持在 70% 以上。
      - 建立至少 1 个渠道合作，把产品带入现有仿真或遥测工作流。
  - horizon: 24-36 months
    items:
      - 落地 12-15 个账户，并接近调研中的 $9.0M year-3 SOM。
      - 发布运行时策略检查或认证工作流，在实地事件之间创造持续使用场景。
      - 通过现有美国客户或合作伙伴关系，扩展到至少 1 个盟友项目。
      - 证明真正的护城河是基准数据与审批逻辑，而不是定制服务人力。
risks:
  - risk: 国防采购与项目预算节奏可能与初创公司的 burn profile 不匹配。
    likelihood: Medium
    impact: High
    mitigation: 先从风险投资支持的 OEM 与主承包试点项目切入，因为其现场事件预算与决策者更容易触达。
  - risk: 安全部署、数据权与密级工作流要求，可能把实施成本推高到超出既定模型。
    likelihood: High
    impact: High
    mitigation: 先用净化遥测证明 ROI，并在大规模扩张前标准化本地和气隙部署。
  - risk: 现有仿真或自主系统供应商可能捆绑足够多的相邻保障能力，从而阻止采用。
    likelihood: Medium
    impact: High
    mitigation: 保持供应商中立，掌握可供评审的证据产物，并聚焦那些现有厂商不擅长标准化的混编编队审批工作流。
  - risk: 客户可能更偏好内部脚本与服务，而不是产品化的证据层。
    likelihood: Medium
    impact: High
    mitigation: 缩窄 ICP，证明材料包生成速度和靶场日节省效果，并拒绝那些无法改善共享模板库的定制工作。
  - risk: 产品可能无法超出狭窄的部署前工具范畴。
    likelihood: Medium
    impact: Medium
    mitigation: 尽早跟踪客户对基准评测、工作流管理和运行时模块的拉力，并在拉力不足时调整公司野心。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月 runway 应足以支持核心产品团队、气隙部署能力、3-4 个设计合作伙伴或试点部署，以及把至少 2 个项目转成年订阅所需的客户验证。