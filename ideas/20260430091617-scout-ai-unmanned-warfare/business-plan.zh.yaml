slug: autonomy-mission-assurance
date: '2026-04-30'
executiveSummary: >-
  自主任务保障卖给的是陆军相关的国防机器人团队：他们马上就要跑外场演训、OTA 里程碑或客户演示，稀缺的靶场时间经不起一次混编自主编队失手。产品定位是一层中立保障层，压在现有仿真器和遥测系统之上，专门压测通信退化、GPS 丢失等场景，并产出一份可复用的就绪材料包，交给内部评审委员会和政府客户。这个切口和调研里看到的购买触发点是对得上的：真正会拍板的人，是手里有预算、眼前又有关键事件要过的自主副总裁、项目经理或测试与评估负责人，而不是在做远期平台评估的人。滩头刻意收窄到 50-500 人规模、面向陆军里程碑的 UGV/UAS OEM 与主承包项目，因为这类工作流验证周期短、ROI 看得见，而且比直接去卖“自主大脑”更少正面撞上平台厂商。以独立应用来算，这个市场本身不算大——调研给出的 SAM 是 $45.0M，第 3 年 SOM 是 $9.0M——所以能不能撑起风险投资逻辑，关键不在首个模块，而在公司能否从部署前保障，顺势长到运行时策略约束、遥测基准和认证工作流。定价和交付因此都围绕“付费外场试点”来设计：先按一次关键事件收费，再转成年费制的按项目订阅。这样既能对上客户真实预算科目，也有机会在接入模板成熟后把毛利稳在 70% 以上。最值得反证的风险有三条：采购方会不会把证据生成始终视为内部职责、安全部署和系统接入会不会拖得太久，以及 Applied Intuition、Shield AI、Anduril 这些现有厂商会不会把相邻能力打包到一起，直接把切口堵死。公开价格基准仍然不多，所以 ACV、转化率和融资需求，现在都还是需要在前 6 个月里尽快打实的经营假设。
problem:
  - 混编 UGV/UAS 项目今天证明系统就绪，仍靠临时仿真、有限靶场时间和人肉拼出来的评审材料；问题暴露得太晚，进度也因此被烧掉。
  - 由士兵监督的编队自主系统，会引入通信退化、GPS 丢失、任务交接和人工接管等边界情况，测试难度远高于单车自主。
  - 项目团队需要的是能扛过内部评审和客户审查的证据，但今天这些材料几乎每过一个里程碑都要从头重做。
solution:
  - 在外场事件前吃进任务计划、车辆画像、自主输出、遥测数据和通信假设，围绕退化工况跑可重复的场景扫描。
  - 生成就绪评分、建议护栏、遥测回放和一套可导出的证据包，供团队在评审、演示与里程碑闸门里反复复用。
  - 把真实演训遥测回灌进场景库，让每一次部署都能反过来增厚跨平台失败基准与后续任务模板。
whyWeWin:
  - 产品卖的是中立审批层，OEM 和项目办公室更容易信它，而不是把审批逻辑和遥测语料交给直接的平台竞争对手。
  - 第一刀切在一个已经有预算、ROI 又看得见的事件上——避免靶场日翻车、压缩里程碑准备时间——而不是去打一个周期极长的平台替换案。
  - 专有失败案例、操作员接管基准和证据模板，会比通用仿真器或内部脚本更快在跨项目里复利。
strategicChoices:
  beachhead: 面向 50-500 人规模、正在为 90-120 天内的外场演训、OTA 里程碑或客户演示做准备的陆军相关自主测试负责人、总工程师和项目经理，覆盖 UGV/UAS OEM 与主承包主导的混编编队项目。
  wedgeRationale: 这个入口的购买触发最清楚，验证闭环最短，客户也能立刻判断交付物有没有价值——软件到底能不能在稀缺靶场时间被烧掉前，先抓出会毁掉任务的问题，并吐出一份能拿去评审的材料包。要是上来就卖更宽的平台能力，或者直冲政府级销售，不是得替换核心控制软件，就是得等更慢的采购周期。
  sequencingRationale: >-
    先做一层压在现有仿真和遥测工作流之上的证据层，这样落地时不需要推翻现有 autonomy stack；等拿到专有任务数据和客户信任后，再往上加事后回溯、可重复的基准看板，最后才碰运行时策略约束。招聘顺序也照着这个节奏走：先把产品和领域可信度立住，再在试点能稳定转付费后，加前线交付和可复制销售。
  notYet:
    - 不卖完整 autonomy brain、C2 系统或硬件平台。
    - 在 OEM 和主承包项目预算没验证前，不直接扑向正式 programs of record。
    - 不扩去非国防机器人，也不做泛化的商用自主验证。
    - 在部署前证据工作流还没跑顺前，不提前做运行时自主控制。
market:
  tam: 估算 TAM 为 $0.3B，按大约 150 个美国及盟友的无人自主项目或账户、每个账户约 $2.0M 的年度保障支出来算。
  sam: 估算 SAM 为 $45.0M，按约 60 个贴着美国陆军跑的 OEM、主承包和测试与评估账户、每个账户约 $0.75M 的年度滩头支出来算。
  som: 估算第 3 年 SOM 为 $9.0M，按 15 个落地账户、每个账户约 $0.6M 的混合 ACV 来算。
  segments:
    - 核心客群，是把自主 UGV 或 ISR drones 推进试点、OTA 和外场演训的陆军相关国防机器人 OEM。
    - 次级客群，是负责混编无人编队与里程碑评审的国防主承包商和政府测试与评估组织。
  buyingProcess: 销售起点应该是外场事件前 60-120 天，由创始人亲自去找自主测试负责人或总工程师；当团队看到一版贴着真实里程碑的证据包草稿后，再把单子推进到自主副总裁或项目经理。第一单应当被包装成一次付费试点，卖的是进度风险下降；只有当材料包在第二次事件或评审里被复用后，才转成年费订阅。
product:
  mvp: MVP 覆盖任务计划导入、失联、GPS 拒止、交接失败和接管延迟等场景扫描，再给出一份就绪报告和证据导出，先支持一条 UGV/UAS 混编工作流。第一版应该接好一条开源 autonomy stack 和一条既有仿真或遥测工作流，而不是妄图把两者都替掉。
  sixMonth: 支持一条付费试点工作流，补上事后遥测回灌、一条开源连接器、一条商业仿真器或遥测导出链路，以及隔离网络下的本地部署选项。
  twelveMonth: 加上可复用审批模板、跨项目看板、跨任务基准对比，以及对第二类车辆家族或 autonomy stack 的支持。
  twentyFourMonth: 扩到运行时策略检查、供应商认证工作流，以及横跨多个项目和盟友部署的自主就绪系统记录层。
  keyBets:
    - 采购方愿意为证据打包和任务预演付钱，而不要求公司先替掉他们现有的仿真器或 autonomy stack。
    - 净化过或非密级的遥测，足以在拿到更敏感任务数据前先把 ROI 证明出来。
    - 同一套核心失败库，既能服务跑开源栈的小 OEM，也能服务依赖商用仿真工具的大项目。
    - 部署前保障沉淀下来的数据，后面能顺势撑起更高价值的运行时策略与认证模块。
gtm:
  wedge: 卖一单付费的部署前保障试点，目标是那些一个季度内就有真实演训或里程碑要过的陆军相关 UGV/UAS 项目；一旦证据包被复用，且遥测回灌证明这是个持续需求，再转成年费制的按项目订阅。
  channels:
    - 由创始人和国防领域专家直接去卖给自主负责人、测试与评估负责人和项目经理。
    - 借仿真、数字工程和遥测厂商已在场的工作流做集成式合作。
    - 在第一版证据模板被客户接受后，再借陆军快速采购与无人机采购平台切入更靠近项目的一侧。
  funnelTargets: 目标是每季度触达 10-15 个账户；从初次沟通到合格试点 25-35%，从合格试点到付费试点 40%+，从付费试点转年费生产 50%+，再在 12 个月内把 30%+ 的生产客户扩到第二个项目。
  pricing: 付费试点定价 $150k-$300k，对应一次外场事件周期；转生产后，按项目收 $600k-$1.2M 年费；新车辆类型或安全部署环境，再单独收接入费。对照调研里看到的项目预算采购方式，这比按席位收费更对路。
businessModel:
  revenueStreams:
    - 围绕外场演训、演示和 OTA 里程碑收取的付费试点费。
    - 按自主项目收取的年度软件订阅。
    - 为新车辆类型、遥测源和安全环境收取的接入与集成费。
    - 当项目进入生产后，对高频任务预演包收取 usage fee。
  unitOfValue: 一个被保障的自主项目，或一次外场事件周期。
  targetGrossMarginPct: 72
  expansionLevers:
    - 在每个 OEM 或主承包账户里，加更多项目、车辆家族和任务模板。
    - 首次试点成功后，向上卖遥测基准、审批工作流管理和事后分析。
    - 一旦手里有足够厚的失败语料，再扩到运行时策略约束和供应商认证。
strategyMap:
  northStarMetric: 连续两个及以上里程碑周期里，持续使用平台的生产项目数。
  inputMetrics:
    - 从 kickoff 到第一份可用证据包的天数。
    - 付费试点转年费的比例。
    - 每个活跃项目运行的任务场景数。
    - 证据包跨里程碑的复用率。
    - 接入一个新 autonomy stack 或车辆类型所需的时间。
  moatsToBuild:
    - 跨平台的通信退化、EW、GPS 丢失和接管失败语料库。
    - 可复用的陆军式证据模板与审批逻辑。
    - 横跨多项目的操作员监督与混编编队就绪基准数据集。
  killCriteria:
    - 聚焦陆军相关销售 12 个月后，仍拿不下 2 单以上付费试点。
    - 前 4 单付费试点之后，试点转生产低于 30%。
    - 第三次部署之后，平均接入时间仍高于每个账户 6 个工程师周。
    - 客户始终不允许把证据包用于任何内部评审或对外里程碑。
  mermaid: |
    flowchart LR
      Wedge[陆军外场事件保障试点] --> MVP[任务预演加证据包]
      MVP --> Proof[付费试点在靶场日前抓出问题]
      Proof --> Expansion[按项目收年费订阅]
      Expansion --> Moat[遥测基准与认证工作流]
investorMemo:
  verdict:
    call: 继续约谈并深入调研
    conviction: 这是个扎进高紧迫国防工作流的强切口，但前提是早期客户真的把这层证据层当产品来复用，而不是把它当一单一议的服务项目。
    whyBelieve: 方案对准的是一个有明确预算、而且里程碑风险真会痛的买点；要替代的是工作流层，而不是整个平台；跨项目失败证据也确实有可能长成数据护城河。
    whyDoubt: 单看滩头，这门生意还不够大；如果安全和接入摩擦太重，公司很容易滑进交付慢、服务重的泥潭。
    nextDiligence: 先找 10-15 位陆军相关的测试与评估负责人和自主负责人，验证他们愿不愿意在还拿不到密级数据前，就为一次付费试点拨预算；同时确认第三方证据包能不能在真实里程碑里被复用。
  firstCustomer:
    title: 面向陆军的机器人 OEM 测试与评估负责人
    profile: 一家 50-500 人规模的 UGV 或 ISR-drone 公司，手里有 1-3 个陆军试点，内部同时跑着自建仿真、开源工具链和真实靶场预演。
    trigger: 未来 90-120 天内有一场外场演训、OTA 里程碑或客户演示，而现场要求是一名操作员在通信受损条件下管住多台自主平台。
    buyer: 自主副总裁或机器人系统项目经理
    initialContract: 先签一单 $150k-$300k 的付费试点，对应一次演训；如果在两个里程碑里被复用，再转成 $600k-$1.2M 的按项目年费订阅。
  mustBeTrue:
    - 前 10 个目标测试与评估或自主负责人里，至少有 5 个明确承认：靶场日翻车或证据包延误，已经是一个有预算的问题。
    - 在还拿不到密级任务数据前，至少有 3 个共创客户愿意签付费试点。
    - 同一类证据包格式，至少在两个账户里被内部评审或对客里程碑接受一次。
    - 当证据包在第二次事件里被复用时，试点转生产至少要跑到 50%。
    - 一条开源路径加一条商业仿真器或遥测连接器，要能覆盖首年 60% 以上的销售管线。
  diligenceQuestions:
    - 今天真正能推里程碑往前走的，到底是哪种交付物——就绪评分、安全论证、遥测回放，还是事后证据包？
    - 在不走完整政府采购流程的前提下，一个季度内究竟有多少部署前预算真的花得出去？
    - 如果 Applied、Shield 或 Anduril 在同一张单子里顺手带上相邻能力，客户还会不会单买一层中立保障层？
    - 在可用安全或密级部署前，最少需要哪些遥测与任务数据，才能把价值讲清楚？
    - 接入流程能不能被标准化到足以把毛利稳在 70% 以上，还是每个项目最终都会变成一单定制集成？
  riskHeatmap:
    - risk: 采购与项目预算节奏，可能慢到错过部署前销售窗口。
      likelihood: Medium
      impact: High
      leadingIndicator: 初聊有兴趣，但合格账户里真正能在一个季度内拨出试点预算的不到 25%。
      mitigation: 先卖给风投支持的 OEM 和主承包试点，这些团队围绕近期开演训事件通常更有自主预算。
    - risk: 安全部署和数据权利要求，会把起效时间拖得过长。
      likelihood: High
      impact: High
      leadingIndicator: 超过一半的高意向机会，都要求先拿到密级或 CUI 数据访问，才肯批试点。
      mitigation: 第一版就支持净化遥测、本地部署和隔离网络路径，先把价值跑出来。
    - risk: 内部工具或现有仿真器，对第一版工作流来说已经“足够好”。
      likelihood: Medium
      impact: High
      leadingIndicator: 意向客户总把产品拿去和现有脚本或仿真报告比，并拒绝为证据打包付钱。
      mitigation: 重点证明更快出包、混编编队就绪评分，以及跨项目基准这些通用仿真结果给不了的东西。
    - risk: 公司最后变成一个以服务为主的集成交付商，而不是软件公司。
      likelihood: Medium
      impact: High
      leadingIndicator: 平均部署工作量长期高于 6 个工程师周，而且每一单都要定制证据格式。
      mitigation: 把前两条连接器和第一版证据模板标准化；持续收窄 ICP；对不会增强共用模板库的定制需求直接说不。
    - risk: 这个品类最后只停在部署前分析工具，扩不出去。
      likelihood: Medium
      impact: Medium
      leadingIndicator: 客户只在每次外场前用一次，之后对遥测基准、工作流管理和运行时控制都没有拉力。
      mitigation: 尽早埋点扩张需求，优先做能把使用频率从“事件前一次”抬到“事件间持续使用”的模块。
operatingAssumptions:
  - assumption: 只要绑到近在眼前的外场事件，陆军相关 OEM 与主承包项目就能在 90-120 天内，从项目预算里拨出一单付费试点。
    basis: 基于 research.yaml
    validationTest: 靠近里程碑机会，在不等完整政府采购载具或跨季度审批的前提下，先签下 2 单付费试点。
    decisionImpact: 如果这条不成立，就得转向已有合同载具的大型主承包伙伴，或者重想滩头。
  - assumption: 净化过或非密级的遥测，足以在第一批部署里证明部署前 ROI。
    basis: 基于 research.yaml
    validationTest: 用脱敏遥测跑一单试点，并确认客户依然认可至少一个关键就绪发现以及最后生成的证据包。
    decisionImpact: 如果不成立，公司必须更早投入安全环境、更长销售周期和更大的融资需求。
  - assumption: 靠一套收窄后的连接器策略，就能接住大部分早期客户，而不用替掉他们现有仿真栈。
    basis: 运营判断
    validationTest: 支持一条开源自主工作流和一条商业仿真器或遥测导出路径，并把每个账户的接入时间压到 20 个工程日以内。
    decisionImpact: 如果做不到，目标毛利和销售速度都会塌掉，公司要么转成服务模式，要么继续收窄 ICP。
  - assumption: 客户愿意为一单 $150k-$300k 的试点付钱，因为只要避免一次外场失败，回报就已经高过试点价格。
    basis: 基于 idea.yaml
    validationTest: 至少 2 个共创客户以不低于提议区间的价格签字。
    decisionImpact: 如果做不到，公司就得把产品改成更低成本的轻量封装，或者换定价、换采购方。
  - assumption: 滩头最终能长到遥测基准、认证和运行时策略约束，才足以支持风险投资回报。
    basis: 基于 idea.yaml
    validationTest: 前 6 个生产部署里，至少有 3 个客户在续约前主动要其中一个扩展模块。
    decisionImpact: 如果没有这股拉力，投资人就该把它按一个细分工作流业务来承保，而不是宽平台故事。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 12-15 位自主测试负责人、总工程师和项目经理，并把他们现在的里程碑材料包收上来拆一遍。
    hypothesis: 第一批采购方真正愿意付钱的，是压缩证据包生成时间、减少靶场日翻车风险，而不是单纯多跑几轮仿真。
    successMetric: 至少 8 位受访者把证据生成或评审拖延列进前三大痛点，且有 3 个账户愿意拿出现有材料让团队 redline。
    owner: CEO
  - horizon: 0–90 天
    experiment: 用一份样本任务计划和一份遥测日志，先在产品背后靠人工辅助做出一版就绪材料包原型。
    hypothesis: 即便自动化还不完整，只要输出足够接近真实评审材料，客户也会先按“能不能用来决策”判断价值。
    successMetric: 3 个共创客户明确认可，这份材料包明显好过他们现在的 PPT 式材料，并愿意给出付费试点时间表。
    owner: Founding eng
  - horizon: 90–180 天
    experiment: 接好一条 PX4 或 ROS 风格工作流，再接一条销售管线里已经出现的商业仿真器或遥测导出链路。
    hypothesis: 只要先覆盖这两条路径，就足以接住首年大部分机会，而不需要做平台替换式定制开发。
    successMetric: 超过 60% 的合格机会都能落进这两条接入路径，且导入工作控制在 20 个工程日以内。
    owner: Founding eng
  - horizon: 90–180 天
    experiment: 围绕一次真实外场演训跑首个付费试点，把演训前发现和演训后结果对一遍。
    hypothesis: 产品能在靶场日前抓到至少一个关键问题，并产出一份会在事后继续复用的证据包。
    successMetric: 客户确认至少规避了一次重要失败或省下了一段关键进度，并在 30 天内要求提交生产版方案。
    owner: Defense T&E lead
  - horizon: 180–360 天
    experiment: 为第二个付费账户交付一套隔离网络下的本地部署，并完成相应安全审查。
    hypothesis: 安全部署能被标准化，不至于把公司拖成一单一议的定制集成项目。
    successMetric: 第二套安全部署在 4 周内完成，且沿用第一套账户的相同发布流程。
    owner: 安全或平台工程师
  - horizon: 180–540 天
    experiment: 把首批试点转成年费订阅，并测试客户对基准看板或审批工作流模块的扩展拉力。
    hypothesis: 客户续约是因为工具会在多个里程碑里持续复用，而不是因为团队在卖一次性服务。
    successMetric: 至少签下 2 份年费生产合同，且至少 1 个客户在续约前主动点名要扩展模块。
    owner: CEO
operations:
  - 从一开始就把本地部署与隔离网络方案做标准化，确保容器发布、审计日志和升级流程可重复。
  - 维护一套有版本的任务模板、失败场景和证据包 schema，并把它们和客户已经接受的工作流绑紧。
  - 轻量接入客户已有的遥测库、仿真器和开源自主栈，而不是试图替掉现有基础设施。
  - 用前线交付方法手册，把复盘、功能请求和基准数据按季度灌回核心产品。
team:
  - role: 创始人 / 首席执行官
    startTiming: Month 0
    rationale: 亲自负责销售、共创客户招募，以及与仿真和遥测厂商的合作。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 负责保障引擎、第一批连接器和证据包生成工作流。
  - role: 国防自主 / 测试评估负责人
    startTiming: Month 1
    rationale: 把陆军相关里程碑流程翻译成可信的证据模板，并陪客户把试点交付跑通。
  - role: 前线交付工程师
    startTiming: Month 4
    rationale: 缩短试点接入时间、扛住集成工作，同时避免客户特定需求把产品节奏带偏。
  - role: 安全 / 平台工程师
    startTiming: Month 6
    rationale: 把本地部署、隔离网络和审计日志要求产品化，支持更广的国防采用。
  - role: 客户经理 / 商务拓展主管
    startTiming: Month 9
    rationale: 只有在第一套付费试点打法和可背书客户跑出来后，才开始搭可复制的销售引擎。
milestones:
  - horizon: 0–12 个月
    items:
      - 签下 3 个共创客户，并围绕真实外场事件拿下至少 2 单付费试点。
      - 交付任务计划导入、核心退化工况场景库、证据包导出和事后遥测回灌。
      - 支持一条开源连接器、一条商业仿真或遥测连接器，以及一套隔离网络部署。
      - 至少把 1 单试点转成年费订阅，并沉淀一个基于“避免失败或更快签字”的可重复 ROI 案例。
  - horizon: 12–24 个月
    items:
      - 跑出 5-7 个生产项目，覆盖 OEM 与主承包账户。
      - 上线基准看板、可复用审批工作流，以及对第二类车辆家族或 autonomy stack 的支持。
      - 通过复用证据模板和降低部署工作量，把目标毛利稳在 70% 以上。
      - 拿下一家渠道伙伴，把产品嵌进既有仿真或遥测工作流里。
  - horizon: 24–36 个月
    items:
      - 拿下 12-15 个账户，逼近调研里的第 3 年 $9.0M SOM。
      - 发布运行时策略检查或认证工作流，让使用频率从“外场前一次”变成“事件之间持续使用”。
      - 借美国现有客户或合作关系，进入至少 1 个盟友项目。
      - 证明真正的护城河是基准数据和审批逻辑，而不是重服务人力。
risks:
  - risk: 国防采购和项目预算节奏，可能慢到和创业公司的 burn profile 不匹配。
    likelihood: Medium
    impact: High
    mitigation: 先从风投支持的 OEM 和主承包试点切入，这些团队更容易拿到贴着外场事件的预算。
  - risk: 安全部署、数据权利和密级工作流，可能把实施成本推得高过原先模型。
    likelihood: High
    impact: High
    mitigation: 先用净化遥测把 ROI 证明出来，并尽早把本地部署和隔离网络方案标准化。
  - risk: 现有仿真或自主厂商，可能把足够多的相邻保障能力一起打包，拦住采用。
    likelihood: Medium
    impact: High
    mitigation: 坚持中立，牢牢占住“可评审证据产物”这一层，并深耕混编编队审批工作流这种现有厂商最难标准化的部分。
  - risk: 客户可能更愿意继续用内部脚本和人工服务，而不是买一层产品化证据层。
    likelihood: Medium
    impact: High
    mitigation: 继续收窄 ICP，用更快出包和节省靶场日的结果说话，同时拒绝不会增厚共享模板库的定制工作。
  - risk: 产品可能始终扩不出一个细分部署前工具。
    likelihood: Medium
    impact: Medium
    mitigation: 尽早跟踪客户对基准、工作流管理和运行时模块的拉力；如果这股拉力始终不存在，就及时下调公司野心。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月跑道，足够养起核心产品团队、补齐隔离网络部署能力、跑 3-4 个共创客户或试点部署，并把至少 2 个项目转成年费订阅，拿出下一轮融资需要的客户证据。
