  validationPlan:
  - priority: high
    question: Will autonomy test directors pay for evidence packaging before they trust a new simulator-side layer?
    evidenceToGather: 10-15 interviews with Army-adjacent OEM T&E leads; collect current approval packets, simulation scripts, and live-test postmortems.
  - priority: high
    question: 'Which artifact actually unblocks procurement: safety case, readiness score, telemetry replay, or after-action evidence pack?'
    evidenceToGather: Redline three real milestone workflows with a prime, a venture-backed OEM, and a government test team.
  - priority: medium
    question: How much classified or CUI data is required to prove value in the first deployment?
    evidenceToGather: Pilot with sanitized range telemetry and confirm what accuracy drops when mission data is redacted.
  - priority: medium
    question: Can the product attach to existing simulation stacks rather than replacing them?
    evidenceToGather: Build connectors into one Applied/ReSim-style workflow and one open-source PX4/ROS workflow; measure onboarding time.
