problem: 陆军相关的国防机器人团队，正在被推着让一名操作员同时管住一支混编无人编队；但今天他们证明系统安全与可控的办法，还是临时拼出来的仿真、有限的靶场时间，以及一套 PPT 式汇报材料。结果就是，每一次外场演训、OTA 里程碑和客户演示，都会变成一次高风险集成事件。等模型驱动的自主系统铺开后，真正卡住项目的，不再是把“大脑”做出来，而是拿出可信证据，证明这个“大脑”在任务约束、通信受损和交战规则之下依然不会出格。
targetUser:
  primary: 为美国陆军项目研发 UGV 与 UAS 系统的国防 OEM 内部，自主测试负责人。
  secondary: 在陆军创新单位内部，负责试点混编无人编队的测试与评估团队。
  buyer: 国防主承包商或风投支持 OEM 内部，负责机器人系统的自主副总裁或项目经理。
startupThesis:
  nonObviousInsight: 下一道真正的瓶颈，不是把车辆智能再做强一点，而是证明异构机器人编队在通信受损、任务临时变化、硬件混编的情况下，士兵依然控得住。一旦自主能力变成基础模型层，保障本身就会长成一个独立软件品类。
  beachhead: 面向以陆军为主的 UGV 与 UAS OEM。这些团队正准备排级外场演训或采购里程碑，而现场要求是一名操作员同时监督多台自主车辆。
  wedge: 一层从仿真通到外场的任务保障软件：先预演任务，再压测通信中断与 GPS 丢失，最后自动生成安全论证和事后证据包，交给项目办公室或评审团队。
  whyNowCatalyst: Scout AI 这一轮大融资，加上基地内训练信号，说明面向士兵的自主编队控制正从样板戏走向有预算的真实部署；保障现在已经成了预算里看得见的卡点。
  ventureScalePath: 先从部署前测试的证据层切进去，再扩到运行时策略约束、编队遥测基准、供应商认证，以及跨主承包商、OEM 与项目办公室的自主就绪系统记录层。
solution: 自主任务保障软件会在外场事件之前，吃进任务计划、车辆能力、自主控制栈输出和通信假设。系统随后对混编 UGV/UAS 编队，跑一轮任务场景扫描，覆盖失联、GPS 退化、目标混淆、交接失败和人工接管延迟等情况。产品最后给出通过/失败就绪评分、建议护栏，以及一份证据包，测试团队可以直接交给内部评审委员会或政府客户。等真实演训结束后，系统再把遥测回灌到仿真包络里，用来改进下一次任务包。时间一长，公司会积累起一套专有的失败模式库、任务模板库和自主就绪基准库。
goToMarketSeed:
  firstCustomer: 一家 50-500 人规模的国防机器人公司里的测试与评估负责人，这家公司正把自主 UGV 或 ISR 无人机推进到陆军试点里。
  buyingTrigger: 即将到来的陆军外场演训、OTA 里程碑或客户演示，要求混编编队在通信受损条件下也能跑通自主任务。
  currentAlternative: 手工测试脚本、定制仿真、真实外场演练、内部工具，以及用 PowerPoint 做的安全评审。
  switchingReason: 这个切口能把几周的人肉准备，压缩成一套可复用的证据包；它还能在稀缺的靶场时间真正烧掉之前，先把会毁掉任务的问题抓出来，并给项目团队留下一份跨里程碑复用的文档资产。
  pricingHypothesis: 按项目收年费的平台订阅，再叠加按任务预演包或新车辆类型接入计费的按量费用。
