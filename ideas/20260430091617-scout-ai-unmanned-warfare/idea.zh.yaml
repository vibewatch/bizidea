- point: 控制问题正从单一机器人转向由士兵监督的机器人编队，这显著提高了部署前开展任务级验证的必要性。
  signalRefs:
  - 操作员管理的将是编队，而不是单一载具
  sourceRefs:
  - 2
- point: 面向无人作战的基础模型让自主行为更强大，但也更难解释，因此独立保障层的价值随之上升。
  signalRefs:
  - 基础模型正在成为控制层
  sourceRefs:
  - 1
  - 3
- point: 在美国军事基地使用自主 ATV 进行训练，意味着真实野外数据和接近采购流程的试验已经出现，因此就绪度证据可以绑定真实运行条件，而不再只是实验室演示。
  signalRefs:
  - 野外训练数据正在进入基地内闭环
  sourceRefs:
  - 4
differentiator: 这不是另一个自主系统大脑，也不是通用国防仿真工具。产品掌握的是混编编队在任务规划、靶场执行和客户审批之间的保障工作流，而今天时间和合同往往就耗在这里。它的护城河来自一套不断增长的跨平台失效案例库、人工接管基准以及证据模板，且随着每新增一个项目和一次实地演训，复制难度都会上升。
