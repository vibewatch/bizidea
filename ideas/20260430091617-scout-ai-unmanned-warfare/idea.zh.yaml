jobsToBeDone:
- job: 当即将到来的外场演训要求一名操作员同时管理多台自主车辆时，帮助自主测试负责人在靶场日之前先证明任务已具备就绪度，这样就能避开高成本失败与审批拖延。
  currentAlternative: 在内部仿真器和真实测试之间手工反复预演。
  successMetric: 真实演训里暴露出的关键失败更少，而且里程碑前的签字速度更快。
- job: 当项目办公室要求拿出证据，证明自主系统会在任务约束内运行时，帮助机器人项目经理生成一套可复用的安全论证材料，这样他们就不用每次评审都重造文档。
  currentAlternative: 由工程团队拼幻灯片、表格和定制报告。
  successMetric: 评审周期更短，证据跨演示与里程碑的复用率更高。
