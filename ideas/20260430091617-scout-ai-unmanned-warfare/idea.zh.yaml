  - point: 控制问题正从“管好一台机器人”转向“让士兵监督一整个机器人编队”，这会在部署前显著抬高任务级验证的必要性。
    signalRefs:
      - 操作员管理的将是编队而非单车
    sourceRefs:
      - 2
  - point: 面向无人作战的基础模型让自主行为更强大，但也更难解释，因此独立保障层的价值会同步上升。
    signalRefs:
      - 基础模型正成为控制层
    sourceRefs:
      - 1
      - 3
  - point: 在美国军方基地用自主 ATV 训练，意味着真实野外数据和贴近采购的试验如今已经存在，因此准备度证据可以锚定真实运行条件，而不是实验室演示。
    signalRefs:
      - 野外训练数据正在进入基地内闭环
    sourceRefs:
      - 4
differentiator: >-
  这不是另一个自主“大脑”，也不是通用型国防仿真工具。产品真正占住的是混编编队在任务规划、靶场执行和客户批准之间的保障工作流——今天合同签不下来，时间往往就耗在这里。它的护城河来自不断扩大的跨平台失效案例库、操作员接管基准和证据模板；每多一个项目、每多一场野外演训，这套资产就更难被复制。
