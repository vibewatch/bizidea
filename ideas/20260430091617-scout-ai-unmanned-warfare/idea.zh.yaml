    rationale: 自主测试一旦失败，不仅会烧掉稀缺靶场时间、拖慢合同进度，还会让军方买家对部署失去信任。
  wedgeClarity:
    score: 5
    rationale: 面向混编无人编队的部署前任务保障，是一个边界清楚的窄工作流，用户、触发条件和交付物都很明确。
  defensibility:
    score: 4
    rationale: 专有的任务失效语料、接管基准和证据模板会持续复利，不过现有厂商也可能尝试复制这个品类。
  ventureScale:
    score: 5
    rationale: 这个滩头市场可以从测试扩展到运行时控制、供应商认证，以及覆盖大量国防自主项目的数据网络。
topRisks:
  - name: 采购推进缓慢
    description: 国防销售周期可能慢到让一家年轻公司在形成可重复收入前先被现金流拖垮。
    mitigation: 先从有风险投资支持的 OEM 和主承包商切入，再碰正式编制项目，把销售押在紧迫的野外演训和里程碑准备上——这些地方本来就有预算。
  - name: 敏感数据带来摩擦
    description: 任务数据和遥测可能受限，从而挡住价值最高的工作流。
    mitigation: 支持 air-gapped 和本地部署，先从非密级测试靶场和脱敏遥测流入手证明 ROI。
  - name: 内部自研压力
    description: 大型主承包商可能会扩展自己的仿真堆栈，而不是购买外部保障产品。
    mitigation: 聚焦跨平台证据生成、混编编队工作流，以及内部工具缺乏且难以标准化的基准数据。