jobsToBeDone:
- job: 当即将到来的实地演训要求一名操作员负责多台自主载具时，帮助自主系统测试总监在靶场日之前证明任务已具备就绪度，从而避免高成本失败和审批延迟。
  currentAlternative: 通过内部仿真器和实兵测试进行人工预演。
  successMetric: 在实兵演练中发现的关键故障更少，且里程碑前签字放行更快。
- job: 当项目办公室要求拿出证据证明自主系统会在任务约束内运行时，帮助机器人项目经理生成可复用的安全论证，从而无需每次都重建文档就能通过评审。
  currentAlternative: 由工程团队拼装幻灯片、电子表格和定制报告。
  successMetric: 评审周期更短，且证据在演示和里程碑之间的复用率更高。
