topRisks:
- name: 采购拖期
  description: 国防销售周期可能慢到在形成可重复收入前，就先把年轻公司拖垮。
  mitigation: 先卖给风投支持的 OEM 与主承包商试点，而不是一上来就碰正式项目；优先打那些外场演训和里程碑准备已经有预算的急单。
- name: 敏感数据摩擦
  description: 任务数据和遥测可能受限，导致最高价值工作流拿不到数据。
  mitigation: 支持隔离网络与本地部署，先从非密级测试靶场和净化过的遥测源切进去，把 ROI 跑出来。
- name: 内部自研压力
  description: 大型主承包商可能会扩展自己的仿真栈，而不是外购一套保障产品。
  mitigation: 盯住跨平台证据生成、混编编队工作流和基准数据，这些恰恰是内部工具最难标准化、也最缺的部分。
