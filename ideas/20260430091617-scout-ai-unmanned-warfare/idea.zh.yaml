- point: 控制问题正在从“管一台机器人”切到“管一支由士兵监督的机器人编队”，部署前先做任务级验证的必要性因此大幅上升。
  signalRefs:
  - 士兵要管的是编队，不再是一台车
  sourceRefs:
  - 2
- point: 面向无人作战的基础模型，让自主行为更强，但也更难解释；独立保障层的价值因此被抬高。
  signalRefs:
  - 基础模型正变成控制层
  sourceRefs:
  - 1
  - 3
- point: 在美国军事基地里训练自主 ATV，说明真实外场数据和贴着采购走的试验已经出现；就绪证据终于可以直接绑到真实工况，而不只是实验室演示。
  signalRefs:
  - 训练数据开始搬进基地里
  sourceRefs:
  - 4
differentiator: 这不是另一个自主“大脑”，也不是通用国防仿真工具。产品真正拿下的，是混编编队在任务规划、靶场执行与客户审批之间的保障工作流——今天合同签不下来，时间往往就丢在这里。它的护城河，来自一座越滚越厚的跨平台失败案例库、操作员接管基准库和证据模板库；每多一个项目、每多一次外场演训，这套东西就更难被别人重建。
