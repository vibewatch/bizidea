problem: >-
  国防机器人团队正被要求让一名操作员同时控制混编无人编队，但他们证明安全性与可控性的方式，依旧是临时拼出来的仿真、靶场时间和汇报材料。这会让每一次野外演训、OTA 里程碑和客户演示都变成高风险的系统集成时刻。随着模型驱动的自主控制扩散，真正卡住进度的不再是“把脑子做出来”，而是怎么拿出可信证据，证明这个“脑子”在任务、通信和交战规则约束下不会越界。
targetUser:
  primary: 面向美国陆军项目、开发 UGV 和 UAS 系统的国防 OEM 内部自主测试负责人。
  secondary: 在陆军创新单位内部，负责混编无人编队试点的测试与评估团队。
  buyer: 国防主承包商或风险投资支持的 OEM 内部，负责机器人系统的自主业务副总裁或项目经理。
startupThesis:
  nonObviousInsight: 国防自主领域下一个真正的瓶颈，不是把单车智能再做强一点，而是证明在通信退化、任务计划变化和硬件混杂的情况下，异构机器人编队依然能被士兵稳定控制。一旦自主能力变成基础模型层，保障就会独立成一个新的软件品类。
  beachhead: 正在为排级野外演训或采购里程碑做准备、且需要一名操作员监督多台自主车辆的陆军导向型 UGV 和 UAS OEM。
  wedge: 一层从仿真延伸到野外的任务保障层，先演练任务、压力测试通信和 GPS 丢失，再自动生成安全论证与事后证据包，交给项目办公室。
  whyNowCatalyst: Scout AI 的大额融资和基地内训练信号说明，面向士兵的自主编队控制正从原型展示走向有预算的部署阶段，因此保障已经变成眼下就要花钱解决的卡点。
  ventureScalePath: 先从部署前测试的证据层切入，再扩展到运行时策略执行、编队遥测基准、供应商认证，以及覆盖主承包商、OEM 和项目办公室的自主准备度系统记录层。
solution: >-
  Autonomy Mission Assurance 会在一次野外事件发生前，接入任务计划、车辆能力、自主堆栈输出以及通信假设。系统会围绕混编 UGV 与 UAS 编队，批量跑失链、GPS 退化、目标混淆、交接失败和人工接管延迟等场景。随后，产品输出通过/失败准备度评分、推荐护栏，以及一份测试团队可以直接交给内部评审委员会或政府客户的证据包。演训结束后，它还会把实际遥测与仿真包络对齐，用来改进下一次任务包。时间一长，公司会沉淀出一套专有的失效模式库、任务模板和准备度基准，服务整个国防自主项目生态。
goToMarketSeed:
  firstCustomer: 一家 50-500 人规模、正把自主 UGV 或 ISR 无人机送进陆军试点项目的国防机器人公司测试与评估负责人。
  buyingTrigger: 即将到来的陆军野外演训、OTA 里程碑，或要求混编自主编队在退化通信条件下完成任务的客户演示。
  currentAlternative: 人工测试脚本、定制仿真、实地演训、内部工具，以及基于 PowerPoint 的安全评审。
  switchingReason: 这个切口能把数周的人工准备压缩成可重复交付的证据包，在稀缺靶场时间被消耗前先揪出会毁掉任务的问题，并为项目团队提供可跨里程碑复用的文档。
  pricingHypothesis: 按项目收取年度平台订阅费，再按任务演练包数量或接入的车辆类型收取使用费。
whyNow:
  - point: 一笔创纪录且超额认购的 Series A 说明，国防买方和投资人正在迅速给自主软件拨款，也顺带为围绕它的保障层释放预算。
    signalRefs:
