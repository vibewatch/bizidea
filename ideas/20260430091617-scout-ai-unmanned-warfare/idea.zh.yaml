jobsToBeDone:
  - job: 当一次即将到来的野外演训让一名操作员要同时负责多台自主车辆时，帮自主测试负责人在靶场日之前证明任务已准备就绪，从而避免高成本失败和审批延误。
    currentAlternative: 依靠内部仿真器和实地测试做人工演练。
    successMetric: 在实地演训中发现的关键故障更少，且里程碑前拿到签字更快。
  - job: 当项目办公室要求证明自主系统会在任务约束内运行时，帮机器人项目经理生成一份可复用的安全论证，从而不用每次评审都把文档重做一遍。
    currentAlternative: 由工程团队拼出来的幻灯片、电子表格和定制报告。
    successMetric: 评审周期更短，且证据在演示和里程碑之间复用率更高。
