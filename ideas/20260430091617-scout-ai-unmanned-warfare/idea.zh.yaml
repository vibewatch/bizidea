topRisks:
- name: 采购拖延
  description: 国防销售周期可能慢到让一家年轻公司在实现可重复收入前就耗尽现金。
  mitigation: 先从风险投资支持的 OEM 和主承包商入手，而不是正式列装项目；优先出售给已有预算、且面临紧迫实地演训与里程碑准备的团队。
- name: 敏感数据摩擦
  description: 任务数据与遥测可能受限，从而限制对最高价值工作流的访问。
  mitigation: 支持气隙与本地部署，并先从非密级测试靶场和净化后的遥测流切入，以证明 ROI。
- name: 内部自研压力
  description: 大型主承包商可能会选择扩展自己的仿真栈，而不是购买外部保障产品。
  mitigation: 聚焦跨平台证据生成、混编编队工作流以及内部工具缺失且难以标准化的基准数据。