topRisks:
- name: Procurement drag
  description: Defense sales cycles can be slow enough to starve a young company before it reaches repeatable revenue.
  mitigation: Start with venture-backed OEMs and primes before programs of record, selling into urgent field exercises and milestone prep where budgets already exist.
- name: Sensitive-data friction
  description: Mission data and telemetry may be restricted, limiting access to the highest-value workflows.
  mitigation: Support air-gapped and on-prem deployments, and begin with unclassified test ranges plus sanitized telemetry feeds to prove ROI.
- name: Internal-build pressure
  description: Large primes may try to extend their own simulation stacks instead of buying an external assurance product.
  mitigation: Focus on cross-platform evidence generation, mixed-fleet workflows, and benchmark data that internal tools lack and struggle to standardize.
