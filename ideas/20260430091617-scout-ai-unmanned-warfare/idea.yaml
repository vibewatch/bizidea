jobsToBeDone:
- job: When an upcoming field exercise puts one operator in charge of multiple autonomous vehicles, help the autonomy test director prove mission readiness before range day, so they can avoid expensive failures and approval delays.
  currentAlternative: Manual rehearsal across internal simulators and live tests.
  successMetric: Fewer critical failures discovered during live exercises and faster sign-off before milestones.
- job: When a program office asks for evidence that autonomy will behave inside mission constraints, help the robotics program manager generate a reusable safety case, so they can clear reviews without rebuilding documentation every time.
  currentAlternative: Slide decks, spreadsheets, and bespoke reports assembled by engineering teams.
  successMetric: Shorter review cycles and higher reuse of evidence across demos and milestones.
