problem: Defense robotics teams are being pushed to put one operator in control of mixed unmanned fleets, but they still prove safety and controllability with ad hoc simulation, range time, and slideware. That makes every field exercise, OTA milestone, and customer demo a high-risk integration event. As model-driven autonomy spreads, the bottleneck shifts from building the brain to generating credible evidence that the brain will stay inside mission, comms, and rules-of-engagement constraints.
targetUser:
  primary: Autonomy test directors at defense OEMs building UGV and UAS systems for U.S. Army programs.
  secondary: T&E teams inside Army innovation units piloting mixed unmanned fleets.
  buyer: VP of Autonomy or program manager for robotic systems at defense primes and venture-backed OEMs.
startupThesis:
  nonObviousInsight: The next choke point in defense autonomy is not better vehicle intelligence; it is proving that heterogeneous robot fleets remain controllable by a soldier across degraded comms, changing mission plans, and mixed hardware. Once autonomy becomes a foundation-model layer, assurance becomes a separate software category.
  beachhead: Army-focused UGV and UAS OEMs preparing platoon-level field exercises or procurement milestones where a single operator must supervise multiple autonomous vehicles.
  wedge: A simulation-to-field assurance layer that rehearses missions, stress-tests comms and GPS loss, and auto-generates a safety case plus after-action evidence package for program offices.
  whyNowCatalyst: Scout AI’s large round and on-base training signal that soldier-facing autonomous fleet control is moving from prototype theater into funded deployment, making assurance a budgeted blocker now.
  ventureScalePath: Start as the evidence layer for pre-deployment testing, then expand into runtime policy enforcement, fleet telemetry benchmarking, supplier certification, and the system of record for autonomy readiness across primes, OEMs, and program offices.
solution: Autonomy Mission Assurance ingests mission plans, vehicle capabilities, autonomy stack outputs, and communications assumptions before a field event. It runs scenario sweeps for lost-link, GPS degradation, target confusion, handoff failures, and human override latency across mixed UGV and UAS fleets. The product then produces a pass-fail readiness score, recommended guardrails, and an evidence packet that test teams can hand to internal review boards or government customers. After live exercises, it reconciles telemetry against the simulated envelope to improve the next mission package. Over time, the company builds the proprietary corpus of failure modes, mission templates, and readiness benchmarks for defense autonomy programs.
goToMarketSeed:
  firstCustomer: Director of test and evaluation at a 50-500 person defense robotics company shipping autonomous UGVs or ISR drones into Army pilots.
  buyingTrigger: An upcoming Army field exercise, OTA milestone, or customer demo that requires mixed-fleet autonomy to work under degraded comms.
  currentAlternative: Manual test scripts, bespoke simulation, live exercises, internal tools, and PowerPoint-based safety reviews.
  switchingReason: The wedge cuts weeks of manual prep into a repeatable evidence package, catches mission-killing failures before scarce range time, and gives program teams documentation they can reuse across milestones.
  pricingHypothesis: Annual platform subscription priced by program, plus usage-based fees per mission rehearsal package or vehicle type onboarded.
