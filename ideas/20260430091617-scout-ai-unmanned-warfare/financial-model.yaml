assumptions:
- id: A1
  name: Model start month
  value: 2026-05
  unit: month
  source: '[BP date 2026-04-30] Model starts the month after the plan date.'
- id: A2
  name: Starting cash before round
  value: '200'
  unit: USD K
  source: 'Startup-finance heuristic: assume founder/angel cash covers incorporation and pre-close costs before a pre-seed round.'
- id: A3
  name: Pre-seed closes in M1
  value: '3200'
  unit: USD K
  source: '[BP fundingAsk] stage pre-seed, target range $2-4M, runway target 18 months; base case uses $3.2M midpoint-plus to fund air-gapped productization and pilots.'
- id: A4
  name: Target accounts prospected per quarter
  value: '12'
  unit: accounts per quarter
  source: '[BP gtm.funnelTargets] midpoint of 10-15 target accounts per quarter.'
- id: A5
  name: Sales cycle
  value: '4'
  unit: months
  source: '[BP operatingAssumptions + market.buyingProcess] 90-120 day budget-to-pilot motion modeled at the midpoint.'
- id: A6
  name: Qualified opportunity to paid pilot conversion
  value: '45'
  unit: percent
  source: '[BP gtm.funnelTargets] qualified-pilot-to-paid-pilot 40%+; base case uses 45%.'
- id: A7
  name: Paid pilot to annual production conversion
  value: '50'
  unit: percent
  source: '[BP gtm.funnelTargets] paid-pilot-to-annual-production 50%+; base case uses 50%.'
- id: A8
  name: Steady-state ACV per paying program
  value: '600'
  unit: USD K per year
  source: '[BP gtm.pricing, investorMemo.firstCustomer, market.som] bottom of $600k-$1.2M annual subscription range and consistent with 15 accounts ~ $9.0M exit ARR.'
- id: A9
  name: Revenue recognition simplification
  value: '50'
  unit: USD K per active paying program per month
  source: '[Derived from A8] Conservative ratable recognition; onboarding and usage fees are excluded from base case revenue to avoid double counting.'
- id: A10
  name: Y1 active paying-program ramp
  value: 0,0,0,1,1,1,1,2,2,3,3,4
  unit: customers EOP by month
  source: '[BP milestones 0-12 months] supports 2 paid pilots, 1 conversion, and 4 active paying programs by M12.'
- id: A11
  name: Y2 and Y3 exit customers
  value: 10 in Q4Y2; 15 in Q4Y3
  unit: customers EOP
  source: '[BP milestones] 5-7 production programs by 12-24 months and 12-15 accounts by 24-36 months; base case exits Y2 at 10 and Y3 at 15.'
- id: A12
  name: Gross margin ramp
  value: 55% Y1; 68% Y2; 72% Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 72] Early pilots are modeled below target because delivery is more services-heavy; mature margin reaches target in Y3.'
- id: A13
  name: Hiring plan basis
  value: Founder M0; founding eng M0; domain lead M1; FDE M4; security/platform M6; AE M9; later hires in line with milestone expansion
  unit: timing
  source: '[BP team] explicit role timing plus startup-finance heuristic for Y2-Y3 follow-on hires to support 10 then 15 programs.'
- id: A14
  name: Loaded founder compensation
  value: '240'
  unit: USD K annual
  source: 'Startup-finance heuristic (high-compliance B2B defense software): founder cash comp plus payroll tax/benefit load.'
- id: A15
  name: Loaded engineering or security compensation
  value: '220'
  unit: USD K annual per FTE
  source: Startup-finance heuristic for U.S. senior software/security talent in defense-adjacent enterprise software.
- id: A16
  name: Loaded domain T&E compensation
  value: '210'
  unit: USD K annual per FTE
  source: Startup-finance heuristic for defense autonomy/T&E specialist with field credibility.
- id: A17
  name: Loaded forward-deployed engineer compensation
  value: '190'
  unit: USD K annual per FTE
  source: Startup-finance heuristic for implementation-heavy defense software engineering roles.
- id: A18
  name: Loaded sales or BD compensation
  value: '230'
  unit: USD K annual per FTE
  source: Startup-finance heuristic including base salary, commission, and benefits for enterprise defense sales.
- id: A19
  name: Loaded G&A or ops compensation
  value: '180'
  unit: USD K annual per FTE
  source: Startup-finance heuristic for finance/ops support in a venture-backed startup.
- id: A20
  name: Non-payroll overhead
  value: Meaningful cloud, travel, legal, insurance, and security-compliance spend layered on top of payroll
  unit: qualitative
  source: '[BP operations, risks, fundingAsk] air-gapped deployment, audit logs, and field deployment support make non-payroll opex materially higher than a generic SaaS startup.'
- id: A21
  name: Steady-state CAC
  value: '250'
  unit: USD K per new production customer
  source: Startup-finance heuristic anchored to founder-led high-ACV enterprise sales with a small but targeted funnel and defense travel costs.
- id: A22
  name: Steady-state monthly churn
  value: '1.5'
  unit: percent
  source: 'Startup-finance heuristic: low logo churn for sticky program software, tempered upward for budget concentration and contract lumpiness.'
- id: A23
  name: Next-round milestone
  value: 10 active programs, repeatable air-gapped deployment, and at least 2 annualized reference accounts by end of Y2
  unit: milestone
  source: '[BP milestones + fundingAsk] this is the proof package used to size the round and runway.'
