scenarios:
  downside:
    description: Two quarters of slower defense budget timing extend pilot close and reduce production conversion.
    y3RevenueK: 5400.0
    y3EbitdaK: -450.0
    cashLowPointK: -150.0
    keyAssumptionChanges:
    - sales cycle extends from 4 to 6 months
    - pilot-to-production conversion falls from 50% to 35%
    - steady-state ACV falls from $600K to $500K
  base:
    description: Founder-led pilots convert on plan, gross margin reaches target by Y3, and the company exits Y3 at 15 active programs / $9.0M ARR.
    y3RevenueK: 7500.0
    y3EbitdaK: 900.0
    cashLowPointK: 1226.0
    keyAssumptionChanges:
    - sales cycle holds at 4 months
    - pilot-to-production conversion stays at 50%
    - steady-state ACV stays at $600K
  upside:
    description: Shorter pilot cycles and stronger expansion lift both customer count and ACV without materially raising headcount.
    y3RevenueK: 9300.0
    y3EbitdaK: 1800.0
    cashLowPointK: 1350.0
    keyAssumptionChanges:
    - sales cycle compresses from 4 to 3 months
    - pilot-to-production conversion rises from 50% to 60%
    - steady-state ACV rises from $600K to $650K
