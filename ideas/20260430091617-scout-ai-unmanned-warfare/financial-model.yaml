modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base case exits Y3 with 15 active programs and $9.0M ARR, driven by $600K ACV and roughly 50% pilot-to-production conversion.
- checkName: Must go right
  finding: Onboarding has to stay template-based enough to hold gross margin at ~72% while the company adds programs faster than services labor.
- checkName: Model breaks if
  finding: If the sales cycle stretches to 6 months or ACV falls to $500K, the downside case needs bridge financing before Y3 profitability.
- checkName: Next-round proof
  finding: A credible next round is supported by reaching 10 active programs, an air-gapped reference deployment, and repeatable ROI by the end of Y2.
sanityChecks:
  ruleOf40: Y3 growth 89.9% + EBITDA margin 12.0% = 101.9%
  burnMultiple: Y2 burn multiple 0.22x (-$0.8M EBITDA on $3.6M net new ARR from $2.4M to $6.0M exit ARR).
  revenuePerFte: $469K Y3 ($7.5M / 16 end-of-year FTE; heuristic vertical SaaS benchmark ~$200-400K, lifted here by high ACV).
  flags:
  - Public pricing comps are sparse, so ACV and CAC are anchored to the business plan plus clearly labeled startup-finance heuristics rather than disclosed contracts.
  - Revenue is modeled as ratable $600K per active program and excludes onboarding or usage upside, so actual bookings could be lumpier than this P&L.
  - Gross margin assumes sanitized telemetry, reusable connectors, and limited custom work; classified or bespoke deployments could push the model toward services.
  - The customer base is concentrated, so one slipped Army-adjacent program can move quarterly revenue and cash materially.
