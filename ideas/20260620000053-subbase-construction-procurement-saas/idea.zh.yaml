    - 区域承包商客户销售
jobsToBeDone:
  - job: 项目团队正在为新中标项目采购骨料和排水材料包——帮财务主管在首次配送前就将承诺锁定到预算，从而更早地相信完工成本预测。
    currentAlternative: 电子表格发包台账加滞后的 ERP 发票录入
    successMetric: 首次配送前已录入承诺的材料比例，以及按成本科目统计的预算偏差
  - job: 现场团队在项目中期调整数量、供应商或交货时间——帮运营负责人即时路由审批并更新预测敞口，从而在月末前守住毛利。
    currentAlternative: 邮件往来、短信沟通和手动预测更新
    successMetric: 发现超预算材料敞口的提前天数，以及意外成本超支的减少量
