topRisks:
  - name: 公开来源证明较薄弱
    description: 公开证据确认了融资和路线图方向，但未显示客户采用深度或迁移意愿。
    mitigation: 围绕一个工种包开展早期共创客户销售，要求在大规模扩展前量化验证开票前承诺的偏差减少效果。
  - name: ERP 与工作流集成拖拽
    description: 如果产品造成重复数据录入或破坏既有财务管控流程，承包商会抵制。
    mitigation: 先从单向承诺同步和契合现有 ERP 流程的审批工作流起步，再深入推进双向自动化。
  - name: 现有厂商或分销商捆绑销售
    description: 建筑 ERP 厂商或大型分销商一旦发现切口有价值，可能添加轻量级采购功能。
    mitigation: 凭借更快的工种专属落地、构建面向分销商的配送数据闭环，并持有现有厂商尚未结构化捕捉的承诺级数据资产。
