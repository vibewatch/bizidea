problem: >-
  区域性场地工程分包商通过本地供应商、邮件报价、电话和电子表格采购台账，以碎片化方式购买骨料、排水管、土工布等重型材料。项目经理一旦承诺支出，财务往往要等到收到票据、发票或配送纠纷后才能看到成本——这让项目成本预测严重滞后，并将数量或时间上的小失误变成利润漏损。通用采购套件对于现场主导的采购流程太慢、太宽泛；而建筑 ERP 大多在材料到场后才记录成本，而非在开票前管控承诺。
targetUser:
  primary: 美国土建与场地工程分包商（100–400 人规模）的财务主管或采购总监，同时管理 10–50 个在建项目
  secondary: 负责发包采购、交货时间安排及完工成本准确性的项目执行官和项目经理
  buyer: CFO、财务主管或运营副总
startupThesis:
  nonObviousInsight: >-
    建筑采购领域真正持久的切口不是再造一个供应商交易平台，而是在现场发包与 ERP 之间建立一道承诺管控层——专业工种承包商的利润往往在材料决策还停留在邮件和短信里、财务系统根本看不到这笔敞口时就已悄悄流失。
  beachhead: >-
    美国土建与场地工程分包商的发包与交货管控，年采购额 500 万至 5000 万美元，材料涵盖骨料、排水材料和土工布，横跨多个在建项目
  wedge: >-
    一张物料承诺台账——在报价、审批、替换、交货安排和数量偏差成为 ERP 成本分录之前，将它们全部记录在案
  whyNowCatalyst: >-
    SubBase 的融资和路线图表明，建筑买家终于开始采用带有 ERP 连接和预测分析的专业工种采购工作流，这为一款聚焦的行动系统产品打开了窗口——而不是又一套后台记录系统。
  ventureScalePath: >-
    从场地工程材料起步，逐步拓展至相邻专业工种、供应商绩效基准测试、多项目支出预测，以及面向分销商和承包商的嵌入式融资或返利工作流。
solution: >-
  产品给每个项目团队提供一张共享的物料承诺台账，与预估行项、成本科目和交货窗口挂钩。买家可请求并比较供应商报价，锁定选定承诺，并在卡车发车前将替换、加急运费或数量超标等例外情况路由至审批流程。每笔承诺都以实时敞口的形式同步进入承包商的 ERP，让财务在发票到来前就能看到已承诺与已预算的支出对比。预测层会标记出那些因采购时间、价格漂移或现场数量变化而可能突破剩余预算的项目。供应商可通过轻量级门户确认配送和票据详情，无需被迫接入完整的交易平台迁移。
goToMarketSeed:
  firstCustomer: >-
    一家多分支机构的美国场地工程分包商，100–400 人，有 10–50 个在建市政或商业项目，骨料、管材和土工布年采购额逾 1000 万美元，目前通过邮件、电子表格和老旧建筑会计 ERP 管理采购
  buyingTrigger: 新财年利润提升专项推动，或因材料承诺暴露过晚导致一两个项目超预算后的复盘
  currentAlternative: 电话与邮件报价收集、电子表格发包跟踪，以及只有在发票录入建筑 ERP 后才能看到的项目成本视图
  switchingReason: >-
    首批客户会为这个切口买单，因为它在不替换 ERP、也不逼迫供应商接入新交易平台的前提下改善了利润管控——它只是让开票前的承诺变得可见、可治理、可预测。
  pricingHypothesis: 按分支机构和在建项目量定价的年度 SaaS 订阅，设预测性偏差预警高级版
