scenarios:
  downside:
    description: 合作伙伴渠道爬坡慢于预期，分支机构扩展未达 40% 目标，变现水平低于定价区间上限，同时人员规模保持不变。
    y3RevenueK: 1485.9
    y3EbitdaK: -740.8
    cashLowPointK: -12.8
    keyAssumptionChanges:
    - Y2–Y3 分支机构新增放缓至 8 个后 17 个，而非 11 个后 25 个。
    - Y3 每活跃分支机构混合收入降至约 $74K 年化。
    - 毛利率因集成工作保持定制化而低于基准约 2 个百分点。
  base:
    description: 公司在 Q4Y2 达到 14 个付费分支机构，维持 9 人 FTE，并在不需要第二位 GTM 人员的情况下于 Q4Y3 接近盈亏平衡。
    y3RevenueK: 2194.2
    y3EbitdaK: -217.0
    cashLowPointK: 592.4
    keyAssumptionChanges:
    - Q4Y2 达到 14 个付费分支机构，Q4Y3 达到约 35 个。
    - 随着分析模块接入，混合分支机构变现升至既定 $50K–$80K ARR 区间上限。
    - Y3 末毛利率达到 71%，接近 70% 目标模型。
  upside:
    description: 第二分支机构扩展和顾问转介提前一个季度加速，使公司更早进入全年 EBITDA 正值。
    y3RevenueK: 2573.4
    y3EbitdaK: 73.5
    cashLowPointK: 809.4
    keyAssumptionChanges:
    - Y2–Y3 分支机构新增因合作伙伴吞吐量更强而升至 12 个后 29 个。
    - 凭借高级分析模块渗透，Y3 每活跃分支机构混合收入达到约 $84K 年化。
    - 随着入驻模板压缩服务工作，毛利率较基准提高约 1 个百分点。
