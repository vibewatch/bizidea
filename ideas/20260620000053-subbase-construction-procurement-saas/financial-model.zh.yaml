modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionBranches
      ProductionBranches --> ExpansionBranches
      ExpansionBranches --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自 Q4Y3 约 35 个活跃付费分支机构，处于既定分支机构定价区间上限，第二分支机构扩展与净新增客户的贡献相当。
- checkName: 必须做对的事
  finding: 打包 ERP 连接器和每周偏差复盘工作流必须足够快地将付费试点转化为正式客户，以维持 60%+ 转化率和 40% 扩展假设的可信度。
- checkName: 模型崩溃条件
  finding: 若合作伙伴来源的新增向下行情景偏移，现金将在盈亏平衡前转负，种子轮融资必须早于 Q2Y3 进行。
- checkName: 下轮融资证明
  finding: Q2Y3 显示约 25 个付费分支机构、预测预警上线、季度亏损低于 $100K，此时种子轮具有合理性。
sanityChecks:
