slug: sitework-material-commit-ledger
date: '2026-06-20'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-20] 模型从业务计划日期后的第一个完整月份开始。'
- id: A2
  name: 初始现金 / 天使前轮融资
  value: $2.5M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP runwayMonths 18 + model cash trough] 使用中间区间的天使前轮融资额，计划在 Q2Y3 种子轮里程碑时还有六个月缓冲。'
- id: A3
  name: 起始付费活跃分支机构数
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months + BP experimentRoadmap] 公司从零收入起步，必须先将共创客户转化为付费试点。'
- id: A4
  name: 客户单元定义
  value: 运行付费试点或正式订阅的活跃付费分支机构
  unit: definition
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] 模型追踪付费分支机构当量，因为定价是以分支机构为单位而非以座位为单位。'
- id: A5
  name: 付费试点价格
  value: $30K over roughly 3 months
  unit: USD/branch
  source: '[BP gtm.pricing $20k-$40k paid pilot for 60-90 days] 试点合同中点价值。'
- id: A6
  name: 正式分支机构订阅区间
  value: $60K-$80K ARR
  unit: USD/branch/year
  source: '[BP gtm.pricing + BP operatingAssumptions] 试点转化后，分支机构方案维持在既定的正式定价区间内。'
- id: A7
  name: 每活跃付费分支机构确认收入
  value: Y1 $78K annualized, Y2 $72K annualized, Y3 $80K annualized
  unit: USD/branch/year
  source: '[BP gtm.pricing + BP businessModel.revenueStreams + BP businessModel.expansionLevers] Y1 以试点为主，Y2 转向年度订阅，Y3 在计划定价区间内增加分析/扩展收入。'
- id: A8
  name: 第二分支机构扩展率
  value: 40% of production accounts add another branch within 12 months
  unit: pct of production accounts
  source: '[BP milestones 12-24 months] 直接对应第二分支机构扩展里程碑。'
- id: A9
  name: 新增分支机构计划
  value: Y1 4 starts; Y2 11 starts by quarter 2/2/3/4; Y3 25 starts by quarter 7/6/6/6
  unit: gross new paying branches
  source: '[BP milestones 0-12, 12-24, and 24-36 months + Research market.som 60 customers at ~$60k ARR] 增速在 Q4Y2 达到 14 个分支机构，Q4Y3 约 35 个，低于研究报告中第 3 年 SOM 上限。'
- id: A10
  name: 月度分支机构流失率
  value: 1.5%
  unit: pct/month
  source: '[startup-finance heuristic for early vertical SaaS + BP risks] 假设工作流软件粘性较高，但允许项目驱动的分支机构流失和试点续约失败。'
- id: A11
  name: 毛利率爬坡
  value: Y1 52-58%, Y2 62-66%, Y3 68-71%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on packaged integrations] 随着首套连接器包趋于标准化，实施拖拽逐渐消退。'
- id: A12
  name: 创始人含税薪酬
  value: $150K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic] 精简的创始人薪酬加薪资税和福利。'
- id: A13
  name: 工程师含税薪酬
  value: $185K
  unit: USD/FTE/year
  source: '[BP team Founding eng + startup-finance heuristic] 反映集成型高级工程人才的含税薪酬。'
- id: A14
  name: 解决方案工程师含税薪酬
  value: $140K
  unit: USD/FTE/year
  source: '[BP team Solutions engineer + startup-finance heuristic] 反映部署和入驻职责，不配备大型服务团队。'
- id: A15
  name: 产品 / 分析岗含税薪酬
  value: $160K
  unit: USD/FTE/year
  source: '[BP team Product and analytics lead + startup-finance heuristic] 涵盖预测预警和报告职责。'
- id: A16
  name: 合作关系岗含税薪酬
  value: $170K
  unit: USD/FTE/year
  source: '[BP team Head of partnerships + BP gtm.channels + startup-finance heuristic] 含出差费用和渠道销售浮动薪酬。'
- id: A17
  name: 行政管理 / 运营岗含税薪酬
  value: $115K
  unit: USD/FTE/year
  source: '[BP operations + startup-finance heuristic] 涵盖精简财务、保险和客户运营支持。'
- id: A18
  name: 招聘时间线
  value: M1 founder and founding engineer; M3 solutions; M6 product/analytics; M9 partnerships; M15 second engineer; M18 ops; M28 second solutions; M31 third engineer
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale] 遵循计划中产品优先、部署优先的序列，延迟额外 GTM 招聘至渠道验证后。'
- id: A19
  name: 薪酬分配至 P&L 科目
  value: Founder 70% S&M / 30% G&A; solutions 50% S&M / 50% R&D; engineering and product 100% R&D; partnerships 100% S&M; ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] 将薪酬映射至 P&L 中使用的职能科目。'
- id: A20
  name: 非薪酬支出爬坡
  value: S&M $6K/$8K/$11K/$13K/$16K/$20K by 6-month block; R&D $6K/$8K/$10K by stage; G&A $5K/$7K/$9K by stage
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] 涵盖出差、云服务、法务、保险和合作伙伴赋能，不假设大规模付费获客。'
- id: A21
  name: CAC 口径
  value: $51.0K per converted production branch
  unit: USD/branch
  source: '[BP gtm.funnelTargets paid pilot→production 60%+ + model calc] 使用 Y2–Y3 销售与市场支出除以 21.6 个正式客户当量（36 个新增起点 × 60% 转化率）。'
- id: A22
  name: 现金换算口径
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] 天使前轮规模下，资本支出、债务偿还、税款和营运资金时间差假设为不重要项。'
- id: A23
  name: 下轮融资里程碑
  value: Q2Y3 with about 25 paying branches, predictive alerts live, and quarterly burn below $100K
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + model cash curve] 这是滩头市场看起来足够可复制、可启动种子轮的第一个时间节点。'
