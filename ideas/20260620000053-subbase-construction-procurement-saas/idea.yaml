problem: >-
  Regional sitework subcontractors buy aggregates, drainage pipe, geotextiles, and other heavy materials through a
  fragmented mix of local vendors, emailed quotes, phone calls, and spreadsheet buyout logs. Once a project manager
  commits spend, accounting often sees the cost only after tickets, invoices, or delivery disputes arrive, which makes
  job-cost forecasts stale and turns small quantity or timing errors into margin leaks. Generic procurement suites are too
  slow and broad for field-led buying, while construction ERPs mostly record costs after the fact instead of controlling
  commitments before material hits the jobsite.
targetUser:
  primary: Controller or procurement director at a 100-400 employee U.S. civil and sitework subcontractor running 10-50 concurrent projects
  secondary: Project executives and project managers responsible for buyout, delivery timing, and cost-to-complete accuracy
  buyer: CFO, controller, or VP Operations
startupThesis:
  nonObviousInsight: >-
    The durable wedge in construction procurement is not another supplier marketplace. It is a commitment-control layer
    between field buyout and the ERP, because specialty trade contractors lose margin when material decisions are made in
    email and text days before accounting systems ever see the exposure.
  beachhead: >-
    Buyout and delivery control for U.S. civil and sitework subcontractors buying $5 million to $50 million per year of
    aggregates, drainage materials, and geotextiles across multiple active jobs
  wedge: >-
    A material commitment ledger that captures quotes, approvals, substitutions, delivery schedules, and quantity
    variances before they become ERP cost entries
  whyNowCatalyst: >-
    SubBase's funding and roadmap show that construction buyers are finally adopting trade-specific procurement workflows
    with ERP links and predictive analytics, creating an opening for a narrow system-of-action product instead of another
    back-office record system.
  ventureScalePath: >-
    Start with sitework materials, then expand into adjacent specialty trades, supplier performance benchmarking,
    multi-project spend forecasting, and embedded financing or rebate workflows for distributors and contractors.
solution: >-
  The product gives each project team a shared material commitment ledger tied to estimate line items, cost codes, and
  delivery windows. Buyers request and compare vendor quotes, lock the selected commitment, and route exceptions such as
  substitutions, rush freight, or quantity overages for approval before trucks roll. Every commitment syncs into the
  contractor's ERP as a live exposure, so finance can see committed-versus-budgeted spend before invoices arrive. A
  predictive layer flags jobs where purchase timing, price drift, or field quantity changes are likely to blow the
  remaining budget. Suppliers can confirm deliveries and ticket details through a lightweight portal without forcing a full
  marketplace migration.
goToMarketSeed:
  firstCustomer: >-
    A multi-branch U.S. sitework subcontractor with 100-400 employees, 10-50 active municipal or commercial jobs, and
    more than $10 million of annual spend on aggregates, pipe, and geotextiles managed through email, spreadsheets, and a
    legacy construction accounting ERP
  buyingTrigger: A new fiscal year margin-improvement push or a postmortem after one or two projects miss budget because material commitments surfaced too late
  currentAlternative: Phone and email quote collection, spreadsheet buyout trackers, and job-cost visibility that appears only when invoices are entered into a construction ERP
  switchingReason: >-
    The first customer switches because this wedge improves margin control without replacing the ERP or forcing suppliers
    into a new marketplace; it simply makes pre-invoice commitments visible, governed, and forecastable.
  pricingHypothesis: Annual SaaS subscription priced by branch and active project volume, with a premium tier for predictive variance alerts
