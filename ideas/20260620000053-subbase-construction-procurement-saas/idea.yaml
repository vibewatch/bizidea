differentiator: >-
  Most construction software either starts in accounting after the commitment is made or tries to win as a broad supplier
  marketplace. This company starts at the moment a field team chooses a vendor and creates a live financial commitment,
  which is where specialty contractors actually lose control. The defensible data asset is a trade-specific graph of
  quotes, substitutions, lead times, delivery performance, and committed-versus-final cost outcomes across local material
  categories that generic suites rarely capture cleanly.
