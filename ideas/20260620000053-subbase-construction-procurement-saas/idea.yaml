topRisks:
  - name: Thin proof from public sources
    description: Public evidence confirms funding and roadmap direction but does not show customer adoption depth or willingness to switch.
    mitigation: Run early design-partner sales around one trade package and require measurable pre-invoice variance reduction before broad expansion.
  - name: ERP and workflow integration drag
    description: Contractors will resist if the product adds duplicate data entry or breaks established accounting controls.
    mitigation: Start with one-way commitment sync and approval workflows that fit existing ERP processes before deeper bidirectional automation.
  - name: Incumbent or distributor bundling
    description: Construction ERP vendors or major distributors could add lightweight procurement features once the wedge proves valuable.
    mitigation: Win with faster trade-specific execution, build distributor-facing delivery data loops, and own the commitment-level dataset incumbents do not already capture.
