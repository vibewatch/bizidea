jobsToBeDone:
  - job: When a project team is buying aggregate and drainage packages for a newly awarded job, help the controller lock commitments against budget before the first delivery, so they can trust cost-to-complete earlier.
    currentAlternative: Spreadsheet buyout log plus delayed ERP invoice entry
    successMetric: Percent of material commitments captured before first delivery and variance to budget by cost code
  - job: When a field team changes quantities, vendors, or delivery timing mid-project, help the operations leader route approvals and update forecasted exposure instantly, so they can protect gross margin before month-end.
    currentAlternative: Email threads, text messages, and manual forecast updates
    successMetric: Days faster to detect over-budget material exposure and reduction in surprise cost overruns
