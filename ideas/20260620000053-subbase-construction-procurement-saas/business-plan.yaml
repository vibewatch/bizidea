slug: sitework-material-commit-ledger
date: "2026-06-20"
executiveSummary: >-
  Sitework Material Commit Ledger is a pre-invoice commitment-control system for
  U.S. civil and sitework subcontractors that buy aggregates, drainage pipe,
  geotextiles, and related heavy materials across many live jobs. The beachhead
  is 100-400 employee subcontractors with 10-50 concurrent projects and at
  least $10M of annual material spend, because they are large enough to feel
  margin leakage from fragmented buying but still poorly served by generic
  procurement suites. The first product is not a marketplace and not a new ERP;
  it is a system-of-action layer that captures quote selection, approvals,
  substitutions, delivery windows, and quantity variance before invoices hit
  Sage, Vista, Foundation, or Procore-connected accounting workflows. That
  wedge matches the researched buying trigger: a margin-improvement mandate or a
  recent job miss where finance learned about material exposure too late to
  react. Go-to-market should start with founder-led branch pilots and ERP- or
  consultant-led introductions, because deployment credibility matters more than
  broad top-of-funnel volume at this stage. Public research supports a real and
  growing category, but it does not provide strong public proof on customer
  retention, exact willingness to switch, or pricing for a sitework-specific
  entrant, so the first 12 months must focus on paid pilots, implementation
  speed, and pilot-to-production conversion. The strongest strategic risk is
  that broad suites and adjacent specialists close enough of the workflow gap
  before the startup earns a trusted commitment dataset and repeatable channel.
problem:
  - Regional sitework subcontractors commit material spend through calls, texts, emails, and spreadsheets days or weeks before the ERP records the cost.
  - Controllers and project executives discover substitutions, rush freight, and quantity drift too late to protect cost-to-complete forecasts or job margin.
solution:
  - A material commitment ledger records quotes, approvals, selected vendors, delivery windows, substitutions, and quantity changes against estimate line items and cost codes before trucks arrive.
  - One-way ERP sync and exception alerts turn each field buying decision into visible committed exposure so finance can review budget risk before invoices, tickets, and month-end surprises.
whyWeWin:
  - We start at the exact control gap where specialty contractors lose margin first: quote award through delivery commitment, before formal PO and invoice workflows in broader systems.
  - Each deployment builds trade-specific data on quotes, lead times, substitutions, delivery reliability, and committed-versus-final cost outcomes that generic suites rarely structure cleanly.
strategicChoices:
  beachhead: U.S. civil and sitework subcontractors with 100-400 employees, 10-50 active municipal or commercial jobs, and $10M+ annual spend on aggregates, pipe, drainage, and geotextiles.
  wedgeRationale: This buyer feels urgent pain from direct-material margin leakage, already runs a construction ERP that cannot see commitments early enough, and can approve a one-branch pilot faster than a broader suite replacement.
  sequencingRationale: Start with one branch, one-way ERP sync, and approval control because duplicate entry and finance trust are the biggest adoption blockers; add predictive variance alerts only after commitment capture is reliable; add supplier and distributor workflows only after the contractor-side record becomes trusted.
  notYet:
    - Self-perform general contractors and multi-trade enterprise rollouts that require a broader workflow and buyer motion.
    - Embedded payments, financing, or rebate products before the core commitment ledger proves durable daily usage.
    - Full AP automation or invoice reconciliation suites that would dilute the pre-invoice wedge.
market:
  tam: "$288.2M estimated TAM based on 9,606 U.S. firms across target civil and sitework NAICS codes and roughly $30k annual software spend."
  sam: "$73.7M estimated SAM based on 1,474 U.S. firms with 100-499 employees in the beachhead and roughly $50k annual spend."
  som: "$3.6M illustrative year-3 SOM based on 60 customers at about $60k ARR from a branch-led land-and-expand motion."
  segments:
    - Primary segment: regional civil and sitework subcontractors with high direct-material spend and legacy accounting ERPs.
    - Secondary segment: adjacent specialty trade contractors with similar procurement-control pain once the sitework motion is repeatable.
  buyingProcess: >-
    The user motion usually starts with a controller, procurement lead, or
    project executive after a forecast miss, ERP cleanup, or new-year margin
    initiative. Budget approval sits with the CFO, controller, or VP Operations,
    and the deal closes only if the product fits existing ERP controls without
    forcing suppliers or field teams into a heavy new system.
product:
  mvp: >-
    MVP covers quote intake, vendor comparison, commitment approval, delivery
    window tracking, substitution and quantity-variance logging, and one-way
    sync of committed exposure into one accounting stack for one branch. It
    deliberately excludes marketplace liquidity, AP automation, and deep
    bidirectional ERP editing.
  sixMonth: Ship one packaged integration path for Procore-connected Sage 300 or Vista accounts, mobile-friendly commitment capture for project managers, and weekly variance review dashboards for finance.
  twelveMonth: Add predictive budget-risk alerts, reusable workflow templates for public-sector compliance attachments, and lightweight supplier confirmation flows for top vendors.
  twentyFourMonth: Expand into adjacent specialty trades, multi-branch benchmarking, supplier performance analytics, and broader distributor-connected ordering workflows while keeping the commitment ledger as system of record.
  keyBets:
    - Buyers will adopt a new workflow if one-way ERP sync removes duplicate entry and surfaces exposure before invoice entry.
    - The first three accounts will share enough ERP and material workflow overlap to make implementation meaningfully faster by customer three.
    - Controllers will pay more for forecast accuracy and approval control than for a generic sourcing or supplier-discovery experience.
gtm:
  wedge: Sell a paid branch-level pilot that proves more than 90% of material commitments are captured before first delivery and that finance can act on exceptions before month-end.
  channels:
    - Founder-led outbound to CFOs, controllers, VPs of Operations, and procurement leaders at regional sitework subcontractors.
    - Referral partnerships with Procore, Sage, Vista, and Foundation consultants that already own accounting and process-change projects.
    - Distributor and supplier introductions into contractor accounts where order confusion, delivery timing, or invoice mismatch is already painful.
  funnelTargets: "Lead→qualified pilot 20-30%, qualified pilot→paid pilot 50%+, paid pilot→production 60%+, and first branch→second branch expansion within 12 months in 40%+ of production accounts."
  pricing: Annual SaaS subscription priced by branch and active project volume, with a 60-90 day paid pilot in the $20k-$40k range that converts into roughly $50k-$80k annual recurring revenue when the first branch goes live; this matches the buyer's branch P&L and avoids per-seat friction.
businessModel:
  revenueStreams:
    - Annual platform subscription for active branches and project volume.
    - Implementation and ERP integration fees.
    - Premium predictive variance and supplier-performance analytics modules.
  unitOfValue: Active branch running live projects with committed material exposure captured against budget and cost codes.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add branches, projects, and regional operating groups inside the same contractor.
    - Expand from sitework materials into adjacent specialty trade packages with similar buying patterns.
    - Sell predictive analytics and supplier benchmarking once baseline commitment capture is trusted.
strategyMap:
  northStarMetric: Share of active jobs where more than 90% of material commitments are captured before first delivery and visible to finance.
  inputMetrics:
    - Qualified pilot rate from ICP outreach.
    - Paid pilot to production conversion rate.
    - Median days from kickoff to first ERP-synced commitment.
    - Percent of commitments captured before first delivery.
    - Percent of commitment exceptions that trigger action before month-end forecast review.
    - Net branch expansion rate inside production accounts.
  moatsToBuild:
    - Sitework-specific dataset linking quotes, substitutions, delivery timing, and final cost outcomes by material category and cost code.
    - Reusable ERP and branch-onboarding templates for the most common beachhead stacks.
    - Supplier-performance benchmarks that show which vendors create repeat quantity, timing, or pricing variance.
  killCriteria:
    - Fewer than 3 of the first 10 qualified design partners agree that pre-invoice commitment visibility is a top-three margin-control problem with current budget.
    - Fewer than 2 paid pilots convert to production at "$50k+" annualized value within 12 months.
    - Median deployment time stays above 45 days to first live ERP-synced commitment after the first three customers.
  mermaid: |
    flowchart LR
      Wedge[Sitework commitment-control wedge] --> MVP[Branch pilot with one-way ERP sync]
      MVP --> Proof[Captured commitments and earlier variance alerts]
      Proof --> Expansion[More branches, adjacent trades, and analytics]
investorMemo:
  verdict:
    call: Watch
    conviction: Credible wedge and real pain, but conviction is limited until the company proves buyers switch for a narrow control layer despite strong adjacent competitors.
    whyBelieve: The startup targets a concrete operational gap between field buying and ERP visibility that public-market, funding, and competitor evidence all suggest remains poorly served.
    whyDoubt: The launch market is modest, incumbents and funded specialists are close enough to bundle substitutes, and public research does not yet show strong switching evidence for a sitework-first entrant.
    nextDiligence: Validate with 8-10 target contractors that one branch pilot can close inside one budget cycle and convert to production based on measurable variance reduction.
  firstCustomer:
    title: Controller at a multi-branch sitework subcontractor
    profile: A 150-300 employee U.S. sitework contractor running 15-30 active municipal, utility, and commercial jobs on Sage 300 or Vista with project managers still buying core materials through email and phone.
    trigger: One or two recent projects miss material budget or forecast because commitments, substitutions, or freight exceptions surface only after delivery or invoice entry.
    buyer: CFO, controller, or VP Operations
    initialContract: A 60-90 day paid pilot for one branch and 10-20 active jobs at roughly $20k-$40k, converting to a $50k-$80k annual subscription plus light integration fees if commitment capture and forecast control targets are met.
  mustBeTrue:
    - At least one beachhead segment will fund a branch-level pilot from an operating budget tied to margin control rather than a broad software transformation budget.
    - The product can capture more than 90% of target commitments before first delivery without creating duplicate entry that finance rejects.
    - One-way ERP sync into the top beachhead stacks is sufficient to win the first sale before deeper bidirectional automation exists.
    - Paid pilots convert to production at 50%+ because variance alerts and approval controls change forecast behavior, not just reporting.
    - Incumbents and adjacent specialists do not neutralize the wedge before the startup earns data and workflow depth in sitework-heavy accounts.
  diligenceQuestions:
    - Which ERP and project-system combination appears most often in the first 20 qualified sitework accounts?
    - What measurable margin leakage do target buyers attribute to late commitment visibility versus price inflation alone?
    - How much supplier participation is required for a branch pilot to feel complete, and which intake mode works best first?
    - Do controllers trust commitment-based alerts enough to change WIP reviews and approval behavior?
    - Can distributor or consultant channels repeatedly source qualified pilots without turning the company into a custom implementation shop?
operatingAssumptions:
  - assumption: Buyers will purchase a narrow commitment-control layer before they are ready to replace or heavily reconfigure their ERP.
    basis: idea.yaml
    validationTest: Close at least 3 paid pilots where the existing ERP remains in place and the buyer still funds the new workflow from an operations or finance budget.
    decisionImpact: If false, the company must reposition as a services-led ERP enhancement or abandon the standalone wedge.
  - assumption: The beachhead will accept annual pricing in the $50k-$80k range once a paid pilot proves forecast and approval improvement.
    basis: research.yaml
    validationTest: Win 2 production conversions at or above $50k ARR after showing commitment-capture and variance-reduction results in pilot.
    decisionImpact: If false, the modeled SAM and payback profile weaken, so the ICP or product scope must narrow further.
  - assumption: One packaged integration bundle can serve a meaningful share of the first customers without bespoke engineering.
    basis: operator judgment
    validationTest: Complete 3 deployments with less than 2 engineer-weeks of custom work each after the initial connector set is built.
    decisionImpact: If false, gross margin and sales efficiency break, requiring either higher implementation pricing or a tighter ICP.
  - assumption: Controllers will trust commitment-based forecasts when each alert is tied to a quote, approval, ticket, or delivery artifact.
    basis: research.yaml
    validationTest: In the first 2 pilots, show that monthly forecast reviews use platform alerts and artifacts to change at least 3 decisions per branch.
    decisionImpact: If false, the product may still help project teams operationally but loses the finance-led ROI story that supports pricing.
  - assumption: Sitework is the fastest path to proof because material categories, supplier fragmentation, and public-work documentation pressure are tighter than in broader trade rollouts.
    basis: idea.yaml
    validationTest: Compare pilot-cycle time and pain clarity across at least 8 sitework prospects before expanding discovery to adjacent trades.
    decisionImpact: If false, the company should move earlier into the adjacent trade where proof and ACV are stronger.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 25 target contractors and map their material-buying workflow, ERP stack, and last material-related forecast miss.
    hypothesis: At least 10 qualified accounts describe pre-invoice commitment visibility as a top-three margin-control problem with a named budget owner.
    successMetric: 10+ qualified accounts with recent pain event, named buyer, and willingness to evaluate a branch pilot.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build a workflow prototype covering quote comparison, approval, and commitment-to-ERP sync for one representative branch.
    hypothesis: Buyers will prefer a narrow control workflow with one-way sync over a broader but slower procurement suite replacement.
    successMetric: 4+ design-partner prospects agree to pilot scoping after seeing the prototype and workflow map.
    owner: Founding eng
  - horizon: 0–90 days
    experiment: Implement the first packaged integration for one Procore-connected Sage 300 or Vista customer.
    hypothesis: First live value can be shown within 30 days through ERP-synced commitments and exception alerts.
    successMetric: One design partner sees live committed exposure against budget within 30 days of kickoff.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Run 3 paid branch pilots across 10-20 live jobs each with weekly variance reviews.
    hypothesis: The product can capture more than 90% of target commitments before first delivery and materially improve forecast discipline.
    successMetric: 3 paid pilots signed and at least 2 show commitment capture above 90% plus documented forecast-action changes.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Launch predictive variance alerts tied to quantity drift, substitutions, and rush freight in two production pilots.
    hypothesis: Finance teams will pay a premium for earlier risk detection once base commitment capture is trusted.
    successMetric: 2 production customers enable premium alerts and reference at least one saved or mitigated overrun.
    owner: Product lead
  - horizon: 6–12 months
    experiment: Recruit 3 ERP or process consultants and 2 distributor partners into a referral motion.
    hypothesis: Channel partners can source qualified pilots faster than cold outbound once deployment credibility is proven.
    successMetric: 5 signed partners and 3 partner-sourced qualified pilots with acceptable implementation scope.
    owner: Head of partnerships
operations:
  - Maintain a repeatable branch-onboarding playbook covering cost-code mapping, approval thresholds, supplier intake, and ERP sync ownership.
  - Run weekly variance reviews in early accounts so finance and operations jointly validate whether commitment alerts change real decisions.
  - Support supplier participation through email, portal, or CSV intake before asking the market to adopt a full marketplace workflow.
  - Refuse custom implementations that replace the ERP or require the company to own payments, lien releases, or regulated funds flow.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales, design-partner recruitment, and pricing because the first wins depend on buyer-language precision and tight feedback loops.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the commitment ledger, core data model, and first ERP sync path required for credible pilots.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Shorten deployment time, codify onboarding templates, and keep engineering focused on reusable product work.
  - role: Product and analytics lead
    startTiming: Month 6
    rationale: Turn pilot learnings into predictive variance logic, workflow templates, and reporting that finance teams trust.
  - role: Head of partnerships
    startTiming: Month 9
    rationale: Scale referrals from ERP consultants and distributors once the first connector bundle and pilot motion are repeatable.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 6-8 qualified design partners and convert at least 3 into paid branch pilots.
      - Ship the first packaged ERP sync for a common beachhead stack and reach first live value in under 30 days.
      - Convert at least 2 paid pilots into production accounts at $50k+ annualized value.
      - Prove commitment capture above 90% before first delivery on pilot jobs and document finance workflow changes.
  - horizon: 12–24 months
    items:
      - Expand into 10-15 paying customers with repeatable branch rollout and partner-sourced pipeline.
      - Launch predictive variance alerts, supplier benchmarking, and public-work documentation workflows.
      - Achieve meaningful second-branch expansion in at least 40% of production accounts.
      - Test adjacent trade expansion only after the sitework motion shows repeatable sales and onboarding efficiency.
  - horizon: 24–36 months
    items:
      - Expand into adjacent specialty trades while keeping sitework as the strongest proof base.
      - Build multi-branch and supplier-performance benchmarks that strengthen retention and upsell.
      - Establish the company as the default pre-invoice commitment layer in the target contractor stack rather than a generic sourcing tool.
risks:
  - risk: Broad suites or funded specialists extend upstream into enough pre-invoice workflow to blunt differentiation.
    likelihood: High
    impact: High
    mitigation: Differentiate on sitework-specific workflow depth, fastest branch deployment, and better commitment-versus-outcome data at cost-code level.
  - risk: ERP integration and workflow setup become too custom, turning the company into a services-heavy integrator.
    likelihood: Medium
    impact: High
    mitigation: Constrain the first motion to one packaged connector bundle, one-way sync, and a narrow ICP until implementation time falls predictably.
  - risk: Field users keep buying through calls and texts without entering commitments early enough for finance value.
    likelihood: Medium
    impact: High
    mitigation: Make mobile capture and approval faster than current ad hoc workflows and require pilot success metrics around pre-delivery capture rate.
  - risk: The true pain is more price volatility than workflow control, reducing willingness to pay once inflation moderates.
    likelihood: Medium
    impact: Medium
    mitigation: Prove ROI through approval speed, quantity-variance control, compliance traceability, and forecast accuracy rather than price shock alone.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the founding product and solutions team, 3-5 paid pilots, one packaged ERP integration path, predictive variance v1, and the proof needed to show repeatable pilot-to-production conversion in the beachhead.
