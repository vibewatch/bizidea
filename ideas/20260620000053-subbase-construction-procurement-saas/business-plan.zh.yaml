slug: sitework-material-commit-ledger
date: "2026-06-20"
executiveSummary: >-
  Sitework Material Commit Ledger 是一套面向美国土建与场地工程分包商的开票前承诺管控系统，目标客户采购骨料、排水管、土工布等重型材料，横跨多个在建项目。滩头市场锁定 100–400 人、同时管理 10–50 个项目、年物料支出超过 1000 万美元的分包商——他们规模足以感受到碎片化采购带来的利润漏损，却又没有被通用采购套件很好覆盖。首款产品既不是交易平台，也不是新 ERP；而是一个行动系统层，在发票进入 Sage、Vista、Foundation 或 Procore 连接的财务工作流之前，捕获报价选择、审批、替换、交货窗口和数量偏差。这个切口正对应研究发现的购买触发条件：一项利润改善授权，或一次财务因物料敞口暴露过晚而无法反应的项目超支复盘。市场拓展应从创始人主导的分支机构试点和 ERP 或顾问引荐起步，因为在这一阶段，部署可信度比顶部漏斗规模更重要。公开研究支持一个真实且在增长的赛道，但尚未就客户留存、迁移意愿或场地工程专属进入者的定价提供有力的公开证明——因此前 12 个月必须聚焦于付费试点、实施速度和试点转正式客户的转化率。最大战略风险在于：大型套件和相邻专业工具在创业公司建立可信承诺数据集和可复制渠道之前，已足够填补工作流缺口。
problem:
  - 区域性场地工程分包商通过电话、短信、邮件和电子表格，在 ERP 记录成本的数天乃至数周前就已承诺物料支出。
  - 财务主管和项目执行官发现替换、加急运费和数量偏差时往往为时已晚，完工成本预测和项目毛利已无法保护。
solution:
  - 物料承诺台账在货车到场之前，将报价、审批、选定供应商、交货窗口、替换和数量变更记录至预估行项和成本科目。
  - 单向 ERP 同步和例外预警将每个现场采购决策转化为可见的已承诺敞口，让财务能在发票、票据和月末惊喜出现前审查预算风险。
whyWeWin:
  - 从专业承包商最先失控的确切位置切入：报价授标到交货承诺——早于更广泛系统中的正式采购单和发票工作流。
  - 每次部署都在报价、交货期、替换、配送可靠性和"承诺成本与最终成本"差异方面积累工种专属数据——通用套件几乎无法干净地结构化这些数据。
strategicChoices:
  beachhead: 美国土建与场地工程分包商，100–400 人，10–50 个在建市政或商业项目，骨料、管材、排水材料和土工布年采购额超 1000 万美元。
  wedgeRationale: 这类买家对直接材料利润漏损有迫切感，已在运行一套看不到足够早期承诺的建筑 ERP，而且审批一个分支机构试点比替换更大的套件要快得多。
  sequencingRationale: 先从单一分支机构、单向 ERP 同步和审批管控起步——重复录入和财务信任是最大的采用障碍；只有当承诺捕获可靠后才添加预测性偏差预警；只有当承包商侧记录被信任后才加入供应商和分销商工作流。
  notYet:
    - 需要更广泛工作流和买家动作的自施工总承包商和多工种企业级推广。
    - 核心承诺台账证明持续日常使用之前的嵌入式付款、融资或返利产品。
    - 会稀释开票前切口的完整 AP 自动化或发票对账套件。
market:
  tam: "$288.2M 估算 TAM，基于目标土建与场地工程 NAICS 代码下 9,606 家美国企业，假设年均软件支出约 $30k。"
  sam: "$73.7M 估算 SAM，基于同一 NAICS 集合中 100–499 人规模的 1,474 家企业，假设需要 ERP 集成的多项目承包商年均支出约 $50k。"
  som: "$3.6M 第 3 年可实现 SOM，基于 60 个客户、约 $60k ARR，来自分支机构主导的占地扩张模式。"
  segments:
    - "主要细分市场：直接材料支出高、使用传统会计 ERP 的区域性土建与场地工程分包商。"
    - "次要细分市场：一旦场地工程动作可复制，具有类似采购管控痛点的相邻专业工种承包商。"
  buyingProcess: >-
    用户动作通常始于一次预测超支、ERP 清理或新年利润举措之后的财务主管、采购负责人或项目执行官。预算审批权在 CFO、财务主管或运营副总手中，只有当产品在不强迫供应商或现场团队接入笨重新系统的前提下契合现有 ERP 管控时，交易才能成交。
product:
  mvp: >-
    MVP 涵盖报价录入、供应商比价、承诺审批、交货窗口跟踪、替换和数量偏差记录，以及已承诺敞口单向同步至单一分支机构的单一财务系统。有意排除交易平台流动性、AP 自动化和深度双向 ERP 编辑。
  sixMonth: 为基于 Procore 连接的 Sage 300 或 Vista 客户交付一套打包集成路径，为项目经理提供移动端友好的承诺录入，并为财务提供每周偏差复盘仪表板。
  twelveMonth: 添加预测性预算风险预警、公共部门合规附件的可复用工作流模板，以及面向头部供应商的轻量级配送确认流程。
  twentyFourMonth: 拓展至相邻专业工种、多分支机构基准测试、供应商绩效分析，以及更广泛的分销商连接订单工作流，同时保持承诺台账作为记录系统的核心地位。
  keyBets:
    - 只要单向 ERP 同步消除重复录入并在发票录入前暴露敞口，买家就会采用新工作流。
    - 前三个客户共享足够多的 ERP 和物料工作流重叠，使第三个客户的实施速度明显更快。
    - 财务主管为预测准确性和审批管控的付费意愿，高于通用询价或供应商发现体验。
gtm:
  wedge: 出售付费分支机构级试点，证明超过 90% 的物料承诺在首次配送前已被捕获，且财务能在月末前对例外情况采取行动。
  channels:
    - 创始人主导向区域性场地工程分包商的 CFO、财务主管、运营副总和采购负责人发起外拓。
    - 通过 Procore、Sage、Vista 和 Foundation 顾问建立转介合作，这些顾问已掌握财务和流程变更项目。
    - 分销商和供应商向承包商客户导入——尤其是在订单混乱、交货时间或发票不匹配已是痛点之处。
  funnelTargets: "线索→合格试点 20–30%，合格试点→付费试点 50%+，付费试点→正式客户 60%+，首个分支机构→12 个月内第二分支机构扩展占正式客户的 40%+。"
  pricing: 按分支机构和在建项目量定价的年度 SaaS 订阅，60–90 天付费试点范围 $20k–$40k，首个分支机构上线后转化为约 $50k–$80k 年经常性收入；与买家分支机构损益表挂钩，避免按座位计费的摩擦。
businessModel:
  revenueStreams:
    - 在建分支机构和项目量的年度平台订阅。
    - 实施与 ERP 集成服务费。
    - 高级预测性偏差和供应商绩效分析模块。
  unitOfValue: 在建项目已承诺物料敞口对应预算和成本科目的活跃分支机构。
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一承包商内增加分支机构、项目和区域运营组。
    - 从场地工程材料拓展至具有类似采购模式的相邻专业工种包。
    - 基线承诺捕获获得信任后，出售预测分析和供应商基准测试。
strategyMap:
  northStarMetric: 超过 90% 的物料承诺在首次配送前已被捕获且对财务可见的在建项目占比。
  inputMetrics:
    - ICP 外拓的合格试点转化率。
    - 付费试点转正式客户的转化率。
    - 从启动到首个 ERP 同步承诺的中位天数。
    - 首次配送前已捕获的承诺比例。
    - 在月末预测复盘前触发行动的承诺例外比例。
    - 正式客户内的净分支机构扩展率。
  moatsToBuild:
    - 按材料类别和成本科目链接报价、替换、交货时间和最终成本结果的场地工程专属数据集。
    - 针对最常见滩头技术栈的可复用 ERP 和分支机构入驻模板。
    - 揭示哪些供应商反复造成数量、时间或价格偏差的供应商绩效基准。
  killCriteria:
    - 前 10 个合格共创客户中，不足 3 个认同开票前承诺可见性是当前预算下的前三大利润管控问题。
    - 12 个月内不足 2 个付费试点以超过 $50k 年化价值转化为正式客户。
    - 前三个客户之后，达到首个实时 ERP 同步承诺的中位部署时间仍超过 45 天。
  mermaid: |
    flowchart LR
      Wedge[Sitework commitment-control wedge] --> MVP[Branch pilot with one-way ERP sync]
      MVP --> Proof[Captured commitments and earlier variance alerts]
      Proof --> Expansion[More branches, adjacent trades, and analytics]
investorMemo:
  verdict:
    call: Watch
    conviction: 切口可信、痛点真实，但在公司证明买家愿意为窄幅管控层迁移——尽管相邻竞争对手实力强劲——之前，信念度有限。
    whyBelieve: 创业公司瞄准的是现场采购与 ERP 可见性之间的具体运营缺口，公开市场、融资和竞争对手证据均表明这一缺口仍未被很好覆盖。
    whyDoubt: 进入市场规模偏小，有资金支持的专业工具足够接近可以捆绑替代品，且公开研究尚未显示场地工程专属进入者的有力迁移证据。
    nextDiligence: 向 8–10 家目标承包商验证：一个分支机构试点能否在一个预算周期内成交并基于可量化的偏差减少结果转化为正式客户。
  firstCustomer:
    title: 多分支机构场地工程分包商的财务主管
    profile: 一家 150–300 人的美国场地工程承包商，在 Sage 300 或 Vista 上管理 15–30 个在建市政、公用事业和商业项目，项目经理仍通过邮件和电话采购核心材料。
    trigger: 最近一两个项目因承诺、替换或运费例外在配送或发票录入后才浮出水面而超出物料预算或预测。
    buyer: CFO、财务主管或运营副总
    initialContract: 针对一个分支机构和 10–20 个在建项目的 60–90 天付费试点，约 $20k–$40k，若承诺捕获和预测管控目标达成则转化为 $50k–$80k 年度订阅加轻量集成费。
  mustBeTrue:
    - 至少一个滩头市场细分将用与利润管控挂钩的运营预算资助分支机构级试点，而非宽泛的软件转型预算。
    - 产品在不造成财务拒绝的重复录入的情况下，能在首次配送前捕获超过 90% 的目标承诺。
    - 单向 ERP 同步进入主要滩头技术栈，足以在更深度双向自动化存在之前赢得第一笔销售。
    - 付费试点以 50%+ 的比例转化为正式客户，因为偏差预警和审批管控改变了预测行为，而不仅仅是报告。
    - 现有厂商和相邻专业工具在创业公司在场地工程重度客户中建立数据和工作流深度之前，不能中和这个切口。
  diligenceQuestions:
    - 前 20 个合格场地工程客户中，最常出现哪种 ERP 和项目系统组合？
    - 目标买家将多少可量化的利润漏损归因于承诺可见性滞后，而非单纯的价格通胀？
    - 分支机构试点感觉完整需要多少供应商参与，哪种录入模式最先奏效？
    - 财务主管是否足够信任基于承诺的预警，以改变 WIP 复盘和审批行为？
    - 分销商或顾问渠道能否反复产生合格试点，而不将公司变成定制实施商？
operatingAssumptions:
  - assumption: 买家在准备好替换或大幅重新配置 ERP 之前，会购买一个窄幅承诺管控层。
    basis: idea.yaml
    validationTest: 至少成交 3 个付费试点，现有 ERP 保持原位，买家仍从运营或财务预算中资助新工作流。
    decisionImpact: 若为假，公司必须重新定位为服务主导的 ERP 增强方案，或放弃独立切口。
  - assumption: 一旦付费试点证明了预测和审批改善，滩头市场将接受 $50k–$80k 范围的年度定价。
    basis: research.yaml
    validationTest: 在试点中展示承诺捕获和偏差减少结果后，赢得 2 个正式客户转化，ARR 达到或超过 $50k。
    decisionImpact: 若为假，建模的 SAM 和回收期弱化，ICP 或产品范围需进一步收窄。
  - assumption: 一套打包集成包能在不需要定制工程的情况下服务有意义比例的首批客户。
    basis: operator judgment
    validationTest: 初始连接器集合构建后，完成 3 次部署，每次自定义工程工作量不超过 2 工程师周。
    decisionImpact: 若为假，毛利率和销售效率崩溃，需要更高的实施定价或更严格的 ICP。
  - assumption: 当每个预警都与报价、审批、票据或配送凭证挂钩时，财务主管会信任基于承诺的预测。
    basis: research.yaml
    validationTest: 前 2 个试点中，证明月度预测复盘使用平台预警和凭证，每个分支机构至少改变 3 个决策。
    decisionImpact: 若为假，产品可能在运营上仍对项目团队有帮助，但会失去支持定价的财务主导 ROI 故事。
  - assumption: 场地工程是最快的验证路径，因为材料类别、供应商碎片化和公共工程文档压力比更广泛的工种推广更紧迫。
    basis: idea.yaml
    validationTest: 在将发现拓展至相邻工种之前，至少对 8 个场地工程潜在客户比较试点周期时间和痛点清晰度。
    decisionImpact: 若为假，公司应更早进入验证和 ACV 更强的相邻工种。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 25 家目标承包商，绘制其物料采购工作流、ERP 技术栈，以及最近一次物料相关预测超支情况。
    hypothesis: 至少 10 个合格客户将开票前承诺可见性描述为当前预算下的前三大利润管控问题，并有具名预算负责人。
    successMetric: 10 个以上合格客户有近期痛点事件、具名买家，且愿意评估分支机构试点。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 为一个典型分支机构构建涵盖报价比较、审批和承诺转 ERP 同步的工作流原型。
    hypothesis: 买家会倾向于带有单向同步的窄幅管控工作流，而非更宽泛但更慢的采购套件替换。
    successMetric: 4 个以上共创客户候选人在看到原型和工作流图后同意进入试点范围讨论。
    owner: 创始工程师
  - horizon: 0–90 天
    experiment: 为第一个基于 Procore 连接的 Sage 300 或 Vista 客户实施首套打包集成。
    hypothesis: 可通过 ERP 同步承诺和例外预警在 30 天内展示首个实时价值。
    successMetric: 一个共创客户在启动后 30 天内看到已承诺敞口对应预算的实时数据。
    owner: 创始工程师
  - horizon: 3–6 个月
    experiment: 在 10–20 个在建项目上运行 3 个付费分支机构试点，配合每周偏差复盘。
    hypothesis: 产品能在首次配送前捕获超过 90% 的目标承诺，并实质性改善预测纪律。
    successMetric: 3 个付费试点签约，至少 2 个展示超过 90% 的承诺捕获率以及有文档记录的预测行动改变。
    owner: 创始人/CEO
  - horizon: 6–12 个月
    experiment: 在两个正式客户试点中发布与数量偏差、替换和加急运费挂钩的预测性偏差预警。
    hypothesis: 一旦基础承诺捕获获得信任，财务团队愿意为更早的风险检测支付溢价。
    successMetric: 2 个正式客户启用高级预警，并参考至少一次已节省或缓解的超支案例。
    owner: 产品负责人
  - horizon: 6–12 个月
    experiment: 招募 3 家 ERP 或流程顾问和 2 家分销商合作伙伴进入转介模式。
    hypothesis: 一旦部署可信度得到验证，渠道合作伙伴能比冷外拓更快地产生合格试点。
    successMetric: 5 个已签约合作伙伴，3 个合作伙伴来源的合格试点，实施范围可接受。
    owner: 合作关系负责人
operations:
  - 维护涵盖成本科目映射、审批阈值、供应商录入和 ERP 同步归属的可复用分支机构入驻手册。
  - 在早期客户中开展每周偏差复盘，让财务和运营共同验证承诺预警是否改变了实际决策。
  - 在要求市场采用完整交易平台体验之前，先通过邮件、门户或 CSV 录入支持供应商参与。
  - 拒绝替换 ERP 或要求公司承接付款、留置权释放或受监管资金流转的定制实施需求。
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 主导创始人销售、共创客户招募和定价，因为最初的赢单取决于买家语言精准度和紧密的反馈闭环。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 构建承诺台账、核心数据模型和可信试点所需的首条 ERP 同步路径。
  - role: 解决方案工程师
    startTiming: Month 3
    rationale: 缩短部署时间、固化入驻模板，让工程专注于可复用产品工作。
  - role: 产品与分析负责人
    startTiming: Month 6
    rationale: 将试点洞察转化为财务团队信任的预测偏差逻辑、工作流模板和报告。
  - role: 合作关系负责人
    startTiming: Month 9
    rationale: 一旦首套连接器包和试点动作可复制，扩大来自 ERP 顾问和分销商的转介。
milestones:
  - horizon: 0–12 个月
    items:
      - 签约 6–8 个合格共创客户，至少 3 个转化为付费分支机构试点。
      - 为常见滩头技术栈交付首套打包 ERP 同步，并在 30 天内实现首个实时价值。
      - 至少 2 个付费试点以超过 $50k 年化价值转化为正式客户。
      - 在试点项目中证明首次配送前承诺捕获率超过 90%，并记录财务工作流变化。
  - horizon: 12–24 个月
    items:
      - 通过可复制分支机构推广和合作伙伴来源渠道，拓展至 10–15 个付费客户。
      - 发布预测性偏差预警、供应商基准测试和公共工程文档工作流。
      - 至少 40% 的正式客户实现有意义的第二分支机构扩展。
      - 仅在场地工程动作显示出可复制的销售和入驻效率后，才测试相邻工种拓展。
  - horizon: 24–36 个月
    items:
      - 拓展至相邻专业工种，同时保持场地工程作为最强验证基础。
      - 构建多分支机构和供应商绩效基准，强化留存和增售。
      - 将公司确立为目标承包商技术栈中默认的开票前承诺层，而非通用询价工具。
risks:
  - risk: 大型套件或有资金支持的专业工具向上游延伸至足够多的开票前工作流，钝化差异化优势。
    likelihood: High
    impact: High
    mitigation: 在工种专属工作流深度、最快分支机构部署和成本科目级"承诺与结果"数据方面形成差异化。
  - risk: ERP 集成和工作流搭建过于定制化，将公司变成服务重型集成商。
    likelihood: Medium
    impact: High
    mitigation: 将首个动作限制在一套打包连接器、单向同步和严格 ICP，直至实施时间可预期地缩短。
  - risk: 现场用户继续通过电话和短信采购，没有足够早地录入承诺，使财务价值无从体现。
    likelihood: Medium
    impact: High
    mitigation: 使移动端询价、报价比较和订单跟踪明显快于现有的临时沟通方式，并要求试点成功指标围绕配送前捕获率。
  - risk: 真正的痛点更多来自价格波动而非工作流管控，一旦通胀缓和则付费意愿降低。
    likelihood: Medium
    impact: Medium
    mitigation: 通过审批速度、数量偏差管控、合规可追溯性和预测准确性证明 ROI，而非仅靠价格冲击叙事。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 18 个月资金支持创始产品和解决方案团队、3–5 个付费试点、一套打包 ERP 集成路径、预测性偏差 v1，以及在滩头市场展示可复制试点转正式客户转化所需的证明。
