bottomUpSizingDrivers:
- driver: 总可寻址单元
  value: 9,606 U.S. firms with 20-499 employees across NAICS 237110, 237310, 237990, and 238910
  source: '[1]'
- driver: 滩头市场单元
  value: 1,474 firms with 100-499 employees in the same NAICS set
