competitors:
- name: SubBase
  stage: scale-up
  wedge: 面向专业工种的建筑材料采购，含 RFQ、订单和承诺管理。
  pricing: 定制 / 联系销售
  strength: 与本论文最接近的公开对标，直接定位于材料采购、订单管理和 ERP 联动预测分析。
  weaknessVsUs: 公开材料仍为更深度的场地工程优先数量偏差、交货窗口管控和成本科目级承诺预测留有空间。
  sourceRefs:
  - 16
  - 18
  - 19
  - 20
- name: Kojo
  stage: scale-up
  wedge: 跨采购、库存、发票和付款的专业承包商材料管理。
  pricing: 定制 / 联系销售
  strength: 强劲融资、分销商和 ERP 集成，以及覆盖多个工种（含场地准备）的牵引力。
  weaknessVsUs: 更宽的材料运营范围可能淡化面向财务主管和土建项目经理的场地工程专属承诺管控叙事。
  sourceRefs:
  - 21
  - 22
  - 23
  - 24
  - 25
- name: ProcurePro
  stage: scale-up
  wedge: 建筑包的采购调度和工作流管控。
  pricing: 年度订阅 / 定制
  strength: 清晰的可见性叙事，对需要更好采购状态管控的承包商契合度高。
  weaknessVsUs: 公开证据在调度编排方面更强，场地材料的配送单、票据和发票匹配深度相对不足。
  sourceRefs:
  - 26
  - 27
- name: Trimble Materials
  stage: incumbent
  wedge: Trimble 生态系统内面向专业承包商的采购和材料管理。
  pricing: 定制 / 联系销售
  strength: 在位厂商生态系统杠杆，加上来自 StructShare 的成熟采购产品谱系。
  weaknessVsUs: 公开定位以 MEP 为中心，并未针对土建/场地工程物料承诺和本地重型材料供应商作明显优化。
  sourceRefs:
  - 28
  - 29
- name: Procore
  stage: incumbent
  wedge: 含承诺和财务集成的大型建筑综合套件。
  pricing: 定制 / 套餐
  strength: 强大的安装基础和可信的预算、承诺、发票及财务同步记录系统地位。
  weaknessVsUs: 可见性从正式采购单/分包合同阶段开始，而非更早期的报价比较、交货时间或替换管控。
  sourceRefs:
  - 12
  - 13
  - 14
