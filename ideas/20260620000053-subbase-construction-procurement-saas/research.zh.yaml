  fiveForces:
    supplierPower:
      score: 3
      rationale: ERP 和供应商集成很重要，因为买家期望 Procore、Sage、Vista 和 Foundation 连通性以及配送票据数据，但生态系统碎片化程度足以让任何单一供应商都无法完全控制访问权。
      sourceRefs:
      - 4
      - 13
      - 24
      - 25
    buyerPower:
      score: 4
      rationale: 目标承包商毛利薄、回款周期长，因此在引入新工作流系统之前会要求快速 ROI 和低实施摩擦。
      sourceRefs:
      - 10
      - 11
      - 27
    threatOfEntrants:
      score: 3
      rationale: 这一工作流并非前沿技术，但可信的进入者仍需要花时间构建工种专属数据模型、供应商入驻和工作成本集成。
      sourceRefs:
      - 19
      - 21
      - 23
      - 30
    threatOfSubstitutes:
      score: 4
      rationale: 电子表格、邮件、Procore 承诺模块和更广泛的材料平台已经足够好地解决了许多企业的部分问题。
      sourceRefs:
      - 12
      - 19
      - 21
      - 26
      - 28
    competitiveRivalry:
      score: 4
      rationale: 有资金支持的专业工具已在相邻层面从采购、材料运营和财务自动化方向发起攻势，现有厂商也可以将功能捆绑进更宽的套件。
      sourceRefs:
      - 16
      - 21
      - 22
      - 29
      - 30
      - 32
  pestle:
  - factor: political
    impact: positive
    point: 联邦基础设施和水务项目持续支撑土建与场地工程承包商大量采购重型材料的项目体量。
    sourceRefs:
    - 33
    - 34
    - 35
  - factor: economic
    impact: negative
    point: 材料通胀、回款慢和资金占用成本使承包商现金纪律趋紧，软件采购变得高度 ROI 敏感。
    sourceRefs:
    - 7
    - 10
    - 11
  - factor: social
    impact: neutral
    point: 现场团队仍严重依赖电话、短信和邮件习惯，行为变革依然是真实的采用障碍。
    sourceRefs:
    - 19
    - 26
    - 31
  - factor: technological
    impact: positive
    point: ERP 连接器、数字票据和供应商侧数据规范化降低了构建承诺管控层的技术门槛。
    sourceRefs:
    - 4
    - 13
    - 24
    - 25
    - 30
  - factor: legal
    impact: negative
    point: 及时付款、留置权和 BABA 文档压力提高了工作流可追溯性和可审计性的门槛。
    sourceRefs:
    - 5
    - 9
    - 10
  - factor: environmental
    impact: positive
    point: 废料减少和材料溯源正作为软件采购叙事，与成本管控并行兴起。
    sourceRefs:
    - 21
    - 31
  adoptionFrictionMatrix:
  - friction: 与财务系统的重复录入
    severity: high
    affectedBuyer: 财务主管或项目会计
    mitigation: 从 ERP 单向承诺同步起步，仅在减少手工重录的地方保留新层面的审批。
    sourceRefs:
    - 13
    - 14
    - 25
  - friction: 供应商入驻和配送单规范化
    severity: high
    affectedBuyer: 采购总监
    mitigation: 在推动供应商接入完整交易平台体验之前，先支持邮件、门户和轻量适配器录入。
    sourceRefs:
    - 20
    - 30
    - 31
  - friction: 现场行为从电话和短信转向应用内询价
    severity: medium
    affectedBuyer: 项目经理或现场监理
    mitigation: 使移动端 RFQ、报价比较和订单跟踪明显快于现有临时沟通方式。
    sourceRefs:
    - 19
    - 22
    - 26
  - friction: 财务对预测承诺的信任
    severity: high
    affectedBuyer: CFO 或财务主管
    mitigation: 每个预警都附上采购单、报价、票据或配送凭证，使预测变更在 WIP 复盘中可审计。
    sourceRefs:
    - 11
    - 12
    - 15
  - friction: 公共项目合规和记录留存
    severity: medium
    affectedBuyer: 运营副总
    mitigation: 将 BABA、电子票据和审批附件捆绑进承诺记录，而非分散在邮件链中。
    sourceRefs:
    - 4
    - 5
    - 9
