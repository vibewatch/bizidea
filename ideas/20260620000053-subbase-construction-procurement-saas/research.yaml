competitors:
- name: SubBase
  stage: scale-up
  wedge: Trade-specific construction material procurement with RFQs, ordering, and commitments.
  pricing: Custom / contact sales
  strength: Closest public match to the thesis, with direct positioning around material procurement, ordering, and ERP-linked predictive analytics.
  weaknessVsUs: Public materials still leave room for deeper sitework-first quantity variance, delivery-window control, and cost-code-level commitment forecasting.
  sourceRefs:
  - 16
  - 18
  - 19
  - 20
- name: Kojo
  stage: scale-up
  wedge: Trade-contractor materials management across procurement, inventory, invoices, and payments.
  pricing: Custom / contact sales
  strength: Strong funding, distributor and ERP integrations, and traction across multiple trades including site preparation.
  weaknessVsUs: Broader materials-ops scope can dilute a sitework-specific commitment-control story for controllers and civil PMs.
  sourceRefs:
  - 21
  - 22
  - 23
  - 24
  - 25
- name: ProcurePro
  stage: scale-up
  wedge: Procurement schedule and workflow control for construction packages.
  pricing: Annual subscription / custom
  strength: Clear visibility narrative and strong fit for contractors that need better procurement status control.
  weaknessVsUs: Public evidence is stronger on schedule orchestration than on delivery-note, ticket, and invoice-matching depth for site materials.
  sourceRefs:
  - 26
  - 27
- name: Trimble Materials
  stage: incumbent
  wedge: Procurement and material management inside the Trimble ecosystem for specialty contractors.
  pricing: Custom / contact sales
  strength: Incumbent ecosystem leverage plus a proven procurement product lineage from StructShare.
  weaknessVsUs: Public positioning is MEP-centric rather than clearly optimized for civil/sitework material commitments and local heavy-material suppliers.
  sourceRefs:
  - 28
  - 29
- name: Procore
  stage: incumbent
  wedge: Broad construction suite with commitments and accounting integrations.
  pricing: Custom / bundle-based
  strength: Installed base and credible system-of-record status for budgets, commitments, invoices, and accounting sync.
  weaknessVsUs: Visibility starts at the formal PO/subcontract stage, not at earlier quote comparison, delivery timing, or substitution control.
  sourceRefs:
  - 12
  - 13
  - 14
