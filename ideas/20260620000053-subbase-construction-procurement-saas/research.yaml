openQuestions:
- What share of total pain in sitework materials comes from price drift versus quantity variance, freight, substitutions, or approval delay?
- 'Which first integration bundle wins most often in the beachhead: Procore plus Sage 300, Procore plus Vista, or Foundation-led accounts?'
- How much supplier data can be ingested without custom engineering once the startup expands beyond a single branch or region?
- Will the best initial wedge be regional sitework subcontractors, concrete contractors, or self-perform GCs with site-prep crews?
- How much additional budget can be unlocked from distributors or financing partners once commitment data is in place?
