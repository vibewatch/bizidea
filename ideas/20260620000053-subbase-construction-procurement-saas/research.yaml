  adoptionFrictionMatrix:
  - friction: Duplicate entry versus the accounting system
    severity: high
    affectedBuyer: Controller or project accountant
    mitigation: Start with one-way commitment sync into the ERP and keep approvals in the new layer only where they reduce manual rekeying.
    sourceRefs:
    - 13
    - 14
    - 25
  - friction: Supplier onboarding and delivery-note normalization
    severity: high
    affectedBuyer: Procurement director
    mitigation: Support email, portal, and lightweight adapter ingestion before pushing suppliers into a full marketplace experience.
    sourceRefs:
    - 20
    - 30
    - 31
  - friction: Field behavior change from calls and texts to in-app requisitions
    severity: medium
    affectedBuyer: Project manager or superintendent
    mitigation: Make mobile RFQs, quote comparison, and order tracking materially faster than current ad hoc communication.
    sourceRefs:
    - 19
    - 22
    - 26
  - friction: Finance trust in forecasted commitments
    severity: high
    affectedBuyer: CFO or controller
    mitigation: Attach every alert to a PO, quote, note, or delivery artifact so forecast changes are auditable in WIP reviews.
    sourceRefs:
    - 11
    - 12
    - 15
  - friction: Public-job compliance and record retention
    severity: medium
    affectedBuyer: VP Operations
    mitigation: Bundle BABA, e-ticketing, and approval attachments into the commitment record instead of scattering them across email chains.
    sourceRefs:
    - 4
    - 5
    - 9
