problem: >-
  癌症诊断实验室越来越需要判断罕见非编码或调控变异是否真正有临床意义，但相关证据散布在
  DNA 和 RNA 读数、历史病例、功能注释、文献及内部 QC 记录中。现有工作流混合使用注释
  流程、电子表格整理和专家会议，遇到难判案例往往拖延报告发布，或将问题推入模糊的"不确定
  桶"。随着前沿生物模型开始产出有价值的假设，真正的瓶颈变成了合规审签：证明一个判断为何
  可信、还需要哪些确认检测，以及谁批准了这个决定。
targetUser:
  primary: 风险投资支持的癌症诊断公司中负责变异科学或医学基因组学的部门负责人或医学主任，正在交付涵盖实体瘤 DNA+RNA 的综合检测方案
  secondary: 负责非编码变异整理和验证的临床生物信息学及检测开发团队
  buyer: VP 研发、首席医学官，或肿瘤诊断业务负责人
startupThesis:
  nonObviousInsight: >-
    新赛道的赢家不是拥有最大生物模型的实验室，而是在诊断团队必须决定"模型推荐的难判变异
    是否具有临床真实性、是否可报告、能否安全落地"这一关键时刻抢占工作流的公司。生物模型
    已足够好，能产出候选解读；稀缺的层是那套能将这些建议转化为可辩护临床或产品决策的
    审计级审签系统。
  beachhead: >-
    美国和欧盟癌症诊断公司以及大型分子参考实验室，正在推出每周遭遇罕见非编码变异的实体瘤
    DNA+RNA 综合检测方案，必须在报告发布或检测版本更新前完成变异审签
  wedge: >-
    一个生物安全级多组学审查工作台，摄入检测输出、历史病例、RNA 证据、文献和质控规则，
    返回排序后的调控变异解读、确认性检测建议以及已签署的证据包
  whyNowCatalyst: >-
    Radical Numerics 在因果调控变异上的早期声明、癌症诊断领域的在线合作伙伴关系，以及国家
    实验室病原体试点，共同表明生物模型推理的商业化速度正在超越合规审查工作流的适应速度。
  ventureScalePath: >-
    从肿瘤诊断审签出发，再扩展到遗传病基因板、伴随诊断检测设计、感染性疾病检测和公共卫生
    病原体筛查——同一套溯源与审查引擎可在任何需要人工审批高风险生物模型输出的场景中复用。
solution: >-
  这家初创公司销售一个安全审查层，位于生物模型输出与最终诊断决策之间。产品摄入 DNA 和 RNA
  发现、历史病例数据、检测元数据、QC 记录及相关文献，生成一个排序视图，显示哪些非编码或
  调控变异值得升级处理、什么内容与模型相矛盾，以及下一步应执行哪些确认检测或人工核查。
  每个病例都生成一份审计就绪的数据包，包含模型版本、证据溯源、审查员意见和最终审签状态，
  而非一张不透明的截图或电子表格记录。对于检测开发团队，同一工作台会突出显示应推动面板
  更新、验证工作或新报告规则的反复出现的边界案例和证据空白。随着时间推移，公司建立起一个
  专有结果图谱，将模型辅助解读与湿实验室验证、报告发布和上市后纠正相关联。
goToMarketSeed:
  firstCustomer: >-
    一家 Series B+ 肿瘤诊断公司或前 10 名分子参考实验室，正在升级实体瘤 DNA+RNA 检测
    方案，拥有 5–20 名变异科学家，且每周有罕见非编码判断积压待处理
  buyingTrigger: >-
    新检测方案发布、向非编码或全基因组报告扩展，或 CLIA/IVDR 检查周期暴露了缓慢且不一致
    的难判变异审签问题
  currentAlternative: >-
    人工变异科学家整理、注释流程、一次性模型输出、文献查阅，以及电子表格或 LIMS 审签记录
  switchingReason: >-
    产品将零散的证据和模型建议整合为一份可审计的审查数据包，在缩短审签周期的同时，让难判
    决策更易向 QA、病理学家和监管机构辩护。
  pricingHypothesis: >-
    按活跃检测项目或审查病例量计费的年度订阅，加上实施费及验证研究、监管申请和上市后监测
    高级模块的溢价
whyNow:
  - point: 多模态、长上下文生物模型让在单一工作流中审查 DNA、RNA、蛋白质和病例上下文成为可能，不再需要在多个点工具之间来回切换。
    signalRefs: ["生物模型正走向多模态与长上下文"]
    sourceRefs: [1, 3]
  - point: 早期在因果调控变异上的最优声明，将难判非编码解读从 R&D 好奇心变成了具体的软件切口。
    signalRefs: ["难判释义任务已进入模型能力范围"]
    sourceRefs: [2]
  - point: 一个未披露的癌症诊断合作伙伴关系表明，商业买家已在真实的检测和解读工作流中测试生物 AI。
    signalRefs: ["商业诊断试点已率先启动"]
    sourceRefs: [1]
  - point: 美国国家实验室的生物监测试点意味着，一旦诊断切口被验证，同一套审查与溯源堆栈可以扩展到病原体工作流。
    signalRefs: ["生物监测买家已提前入场"]
    sourceRefs: [2, 3]
  - point: 如果生物 AI 现在既是设计机遇也是防御义务，那么信任、可审计性和滥用防控从第一天起就是产品必要条件。
    signalRefs: ["生物安全正成为产品必要条件"]
    sourceRefs: [3]
differentiator: >-
  注释工具商给变异评分，LIMS 工具商追踪病例，基础模型实验室出售原始生物推理，但没有谁拥有
  那个"难判决策变成已发布报告或检测规则更新"的合规审签时刻。这家初创公司将多组学证据综合、
  矛盾处理、确认工作规划和生物安全级溯源集于一体，为变异科学团队而非通用 AI 用户量身打造
  工作流。随着更多客户贡献已解决的边界案例、验证结果和审查员在最难变异类别上的行为，其
  护城河将持续加深。
