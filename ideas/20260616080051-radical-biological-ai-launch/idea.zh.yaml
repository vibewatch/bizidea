    - 生成确认计划和审签数据包
    - 从验证和上市后结果中学习，持续提升审查质量
  keyPartners:
    - 分子诊断共创客户
    - 参考实验室和病理科团队
    - 测序、注释和 LIMS 工具商
    - 外部验证、能力测试及临床证据合作伙伴
  costStructure:
    - 模型与产品工程
    - 生物信息学和临床实施
    - 安全、合规与生物安全管控
    - 科学型客户成功与监管支持
jobsToBeDone:
  - job: >-
      当肿瘤 profile 出现罕见非编码变异时，帮助变异科学团队判断其是否有因果关系、是否可报告，
      从而按时发布可辩护的检测结果。
    currentAlternative: 人工整理会议、注释流程和一次性文献查阅
    successMetric: 难判变异审签的周转时间，以及未解决判断积压的减少量
  - job: >-
      在准备检测更新或接受检查时，帮助实验室证明每个模型辅助的难判决策是如何做出的、执行了
      哪些确认检测，从而让 QA 和监管机构信任整个工作流。
    currentAlternative: 电子表格、LIMS 备注、邮件记录和临时验证文档
    successMetric: 组装审计或验证数据包的时间，以及每次检查的审查发现数量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 该聚类包含经核实的融资、具体的基准测试声明，以及诊断合作伙伴和国家实验室合作伙伴两类信号，而非泛泛的生物 AI 炒作。
  painIntensity:
    score: 4
    rationale: 难判变异审签直接影响诊断团队处理临床高风险边界案例时的报告周转、检测范围和审计风险。
  wedgeClarity:
    score: 5
    rationale: 滩头市场锁定一个买家群体、一个审查瓶颈和一个具体输出——即针对难判变异的可审计审签数据包。
  defensibility:
    score: 4
    rationale: 已解决边界案例、验证结果和审查员行为构成的专有语料库，可围绕工作流建立难以复制的反馈护城河。
  ventureScale:
    score: 5
    rationale: 同一套审查与溯源层可从肿瘤诊断扩展到遗传病检测、感染性疾病、伴随诊断和生物监测。
topRisks:
  - name: 验证负担
    description: 诊断团队可能拒绝模型辅助的难判决策，除非回顾性和前瞻性证据能证明工作流在不增加临床风险的情况下提升了准确性或速度。
    mitigation: 从影子模式启动，人工保留最终决策权，专注于单一检测类别，并将每条建议与透明证据和确认步骤建议绑定。
  - name: 工作流集成阻力
    description: LIMS、注释和报告系统高度分散，缓慢或脆弱的集成路径可能拖延价值实现并扼杀试点。
    mitigation: 以导出-导入工作流和最常见肿瘤诊断栈的连接器启动，只有在证明审签 ROI 后才深化集成。
  - name: 生物安全与监管审查
    description: 买家或监管机构可能担忧前沿生物模型会产生不安全的输出，或在敏感工作流中留下不可接受的溯源空白。
    mitigation: 从第一天起就将访问控制、限制输出策略、完整审计日志和模型版本可追溯性内置到产品中，并将其定位为决策支持工具而非自主解读。
