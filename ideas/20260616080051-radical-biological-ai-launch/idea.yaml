problem: >-
  Cancer diagnostics labs increasingly need to decide whether rare noncoding or regulatory variants actually matter, but the
  evidence is scattered across DNA and RNA readouts, prior cases, functional annotations, literature, and internal QC notes.
  Today's workflow mixes annotation pipelines, spreadsheet curation, and specialist meetings, so hard calls can delay report
  release or get deferred into vague uncertainty buckets. As frontier biology models start producing useful hypotheses, the
  real bottleneck becomes regulated signoff: proving why a call is credible, what confirmatory work is still needed, and who
  approved it.
targetUser:
  primary: Head of variant science or medical director of genomics at a venture-backed cancer diagnostics company shipping comprehensive tumor DNA+RNA assays
  secondary: Clinical bioinformatics and assay-development teams responsible for noncoding-variant curation and validation
  buyer: VP R&D, Chief Medical Officer, or GM of oncology diagnostics
startupThesis:
  nonObviousInsight: >-
    The new category winner is not the lab with the biggest biology model. It is the workflow company that owns the moment a
    diagnostics team must decide whether a model-suggested hard variant is clinically real, reportable, and safe to
    operationalize. Biology models are becoming good enough to create candidate interpretations; the scarce layer is the
    audit-grade signoff system that turns those suggestions into defensible clinical or product decisions.
  beachhead: >-
    U.S. and EU cancer diagnostics companies plus large molecular reference labs launching comprehensive solid-tumor DNA+RNA
    assays that encounter rare noncoding variants weekly and must clear them before report release or assay-version updates
  wedge: >-
    A biosecurity-grade multiomic review workspace that ingests assay outputs, historical cases, RNA evidence, literature, and
    QA rules, then returns ranked regulatory-variant interpretations, confirmatory-test suggestions, and a signed evidence
    packet
  whyNowCatalyst: >-
    Radical Numerics' early claims on causal regulatory variants, live cancer-diagnostics partnership, and national-lab
    pathogen pilot show that biology-model inference is becoming commercially relevant faster than regulated review workflows
    are adapting.
  ventureScalePath: >-
    Start with oncology diagnostics signoff, then expand into hereditary disease panels, companion-diagnostic assay design,
    infectious-disease testing, and public-health pathogen screening, using the same provenance and review engine wherever
    high-stakes biological model outputs need human approval.
solution: >-
  The startup sells a secure review layer that sits between biology-model outputs and final diagnostics decisions. It pulls in
  DNA and RNA findings, historical case data, assay metadata, QC notes, and relevant literature to produce a ranked view of
  which noncoding or regulatory variants deserve escalation, what contradicts the model, and which confirmatory assays or
  manual checks should happen next. Each case becomes an audit-ready packet with model version, evidence provenance, reviewer
  comments, and final signoff status rather than an opaque screenshot or spreadsheet trail. For assay-development teams, the
  same workspace highlights recurring edge cases and evidence gaps that should drive panel updates, validation work, or new
  reporting rules. Over time, the company builds a proprietary outcomes graph linking model-assisted interpretations to wet-lab
  validation, report release, and post-market corrections.
goToMarketSeed:
  firstCustomer: >-
    A Series B+ oncology diagnostics company or top-10 molecular reference lab launching a solid-tumor DNA+RNA assay upgrade
    with 5-20 variant scientists and a weekly backlog of rare noncoding calls
  buyingTrigger: >-
    A new assay release, expansion into noncoding or whole-genome reporting, or a CLIA/IVDR inspection cycle that exposes slow
    and inconsistent hard-variant signoff
  currentAlternative: >-
    Manual variant-scientist curation, annotation pipelines, one-off model outputs, literature review, and spreadsheet or LIMS
    signoff notes
  switchingReason: >-
    The product turns scattered evidence and model suggestions into one auditable review packet, cutting signoff time while
    making hard calls easier to defend to QA, pathologists, and regulators.
  pricingHypothesis: >-
    Annual subscription priced by active assay program or reviewed case volume, plus implementation fees and premium modules
    for validation studies, regulatory submissions, and post-market monitoring
