jobsToBeDone:
  - job: >-
      When a rare noncoding variant appears on a tumor profile, help the variant-science team decide whether it is causal and
      reportable, so they can release a defensible result on time.
    currentAlternative: Manual curation meetings, annotation pipelines, and one-off literature searches
    successMetric: Turnaround time for hard-variant signoff and reduction in backlog of unresolved calls
  - job: >-
      When we prepare an assay update or inspection, help our lab show why each model-assisted hard call was made and what
      confirmatory checks were performed, so QA and regulators can trust the workflow.
    currentAlternative: Spreadsheets, LIMS comments, email trails, and ad hoc validation binders
    successMetric: Time to assemble audit or validation packets and number of review findings per inspection
