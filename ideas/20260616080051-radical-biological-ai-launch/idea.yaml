topRisks:
  - name: Validation burden
    description: Diagnostics teams may reject model-assisted hard calls unless retrospective and prospective evidence proves the workflow improves accuracy or speed without increasing clinical risk.
    mitigation: Start in shadow mode with human-final decisions, focus on one assay class, and tie every suggestion to transparent evidence plus confirmatory-step recommendations.
  - name: Workflow integration drag
    description: LIMS, annotation, and reporting systems are fragmented, so a slow or brittle integration path could delay time to value and kill pilots.
    mitigation: Launch with export-import workflows and connectors for the most common oncology diagnostics stacks, then deepen integrations only after proving signoff ROI.
  - name: Biosecurity and regulatory scrutiny
    description: Buyers or regulators may worry that frontier biology models could generate unsafe outputs or create unacceptable provenance gaps in sensitive workflows.
    mitigation: Build access controls, restricted-output policies, full audit logs, and model-version traceability into the product from day one and position it as decision support rather than autonomous interpretation.
