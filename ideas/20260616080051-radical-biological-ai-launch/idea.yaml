differentiator: >-
  Annotation vendors score variants, LIMS vendors track cases, and foundation-model labs sell raw biological inference, but
  none of them owns the regulated signoff moment where a difficult call becomes a shipped report or an assay rule change. This
  startup combines multiomic evidence synthesis, contradiction handling, confirmatory-work planning, and biosecurity-grade
  provenance in one workflow built for variant-science teams rather than generic AI users. Its moat compounds as more customers
  contribute resolved edge cases, validation outcomes, and reviewer behavior on the hardest classes of variants.
