  "searchedQueries":
  - "寻找关于肿瘤分子诊断实验室解读非编码或调控变异的权威和近期来源，包括工作流瓶颈、变异科学家工作量、周转时间、RNA 整合，以及证据包或审签要求。"
  - "寻找与 AI 辅助癌症诊断解读工作流相关的美国和欧盟监管及质量要求的权威来源：CLIA、CAP 分子病理学清单、FDA 实验室自研检测政策、EU IVDR，以及来自 AMP、ACMG、ASCO、CAP 和 ClinGen 的变异解读指南。"
  - "寻找临床基因组学解读和肿瘤诊断审查工作流领域软件或平台竞争对手的公司和产品来源及独立分析，尤其是 SOPHiA GENETICS、QIAGEN Clinical Insight、Velsera/Pierian、Genomenon、Tempus 及相关平台。"
  - "寻找肿瘤分子诊断、综合基因组分析、临床基因组学解读软件和癌症基因组检测实验室的市场规模和行业来源，以及可用于 TAM/SAM/SOM 估算的公开数据。"
  - "寻找分子诊断软件在肿瘤实验室中买家需求、采用触发因素、采购模式和实施痛点的证据，包括案例研究、职位发布、评测、会议资料、类 RFP 语言或实验室工作流现代化来源。"
  - "寻找美国和欧洲执行二代测序或综合基因组分析的肿瘤分子诊断实验室或检测项目数量的公开来源或可信代理，尤其是 CAP 或能力测试参与者数量、CLIA 高复杂度分子实验室或类似自下而上的规模代理数据。"
  - "寻找 RNA 测序整合到癌症诊断中的权威来源和研究，以及临床工作流中剪接、调控或非编码变异的解读。"
  - "寻找临床基因组实验室中变异解读工作量、积压或人员配置的公开证据，包括变异科学家、临床生物信息学和分子诊断职位或调查。"
  - "寻找 SOPHiA GENETICS、QIAGEN Clinical Insight、Velsera 临床基因组工作台、Genomenon Mastermind 和 Tempus 在肿瘤或临床基因组工作流中的官方产品页面、文档和案例研究。"
  - "寻找关于临床基因组解读软件或肿瘤 NGS 工作流痛点的公开评测、用户反馈或社区讨论，尤其涉及集成、人工整理和报告方面的问题。"
