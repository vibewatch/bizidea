slug: noncoding-variant-signoff-os
date: "2026-06-16"
executiveSummary: >-
  Cancer diagnostics labs running solid-tumor DNA+RNA assays encounter rare
  noncoding and regulatory variants weekly that require multi-person review
  before report release, but no single tool assembles DNA evidence, RNA splice
  context, historical cases, QA rules, and literature into one ranked signoff
  workspace. This company builds a biosecurity-grade multiomic review OS that
  sits between biology-model outputs and final clinical decisions, producing
  ranked interpretations, contradiction flags, confirmatory-test plans, and an
  audit-ready evidence packet for every hard call. The beachhead is
  venture-backed U.S. oncology diagnostics companies and top-10 molecular
  reference labs with active solid-tumor DNA+RNA assay programs and weekly
  noncoding backlogs. Radical Numerics' $50M seed, live cancer-diagnostics
  partnership, and early state-of-the-art claims on causal regulatory variants
  confirm that foundation-model inference is commercially ahead of regulated
  review tooling—creating the wedge. No incumbent (QIAGEN, Velsera, Genomenon,
  Golden Helix, or Franklin) owns the rare noncoding adjudication loop with
  contradiction handling, confirmatory-plan generation, and QA provenance in
  one purpose-built product. The startup compounds a proprietary outcomes corpus
  linking model-assisted interpretations to wet-lab validation, final sign-out,
  and post-market corrections—a data moat incumbents cannot replicate from
  knowledge bases or broad workflow platforms. The business scales from oncology
  diagnostics into hereditary testing, companion diagnostics, infectious disease,
  and biosurveillance using the same provenance and review engine. Target
  fundraise is $2–4M pre-seed to reach production deployments at 2+ accounts
  and $1M+ ARR before a seed round.

problem:
  - "Hard noncoding and regulatory variants in solid-tumor DNA+RNA assays require multi-person review, but evidence is scattered across annotation pipelines, spreadsheets, LIMS comments, and one-off literature searches—no single tool ranks what matters, flags contradictions, or tracks confirmatory steps."
  - "Audit and regulatory exposure is growing: CLIA, CAP, AMP, and FDA LDT scrutiny require documented evidence, human sign-out, and confirmatory-test justification for every hard call, yet current workflows leave a trail of email and ad hoc notes that cannot survive a CAP inspection."
  - "Noncoding and splice variants are a rising share of the curation backlog as oncology assays expand into RNA-aware and whole-genome reporting, but existing interpretation software optimizes for common coding variants and lacks contradiction handling or confirmatory-step tracking."
  - "Variant-scientist hiring is a structural bottleneck: labs report guideline churn and inconsistent standardization as persistent pain, making it attractive to compress expert review time without weakening QA—but no targeted product exists for this compression."

solution:
  - "A secure multiomic review workspace that ingests assay outputs, historical cases, RNA and splice evidence, literature, and QC rules to rank which noncoding and regulatory variants deserve escalation, surface contradictions between DNA and RNA signals, and suggest next confirmatory assays or manual checks."
  - "Each case closes as an audit-ready packet containing model version, evidence provenance, reviewer comments, confirmatory-step log, and final sign-out status—replacing spreadsheet trails with a CLIA/CAP/IVDR-defensible record that survives inspection."
  - "An assay-intelligence layer surfaces recurring edge cases and evidence gaps across cases, directing panel updates, validation studies, and new reporting rules—turning individual sign-outs into institutional knowledge."
  - "Over time, a closed-loop outcomes corpus links model-assisted interpretations to wet-lab validation, report release, and post-market corrections, compounding review quality with every resolved hard variant."

whyWeWin:
  - "No incumbent owns the rare noncoding adjudication loop: annotation vendors score variants, LIMS vendors track cases, foundation-model labs sell raw inference, and broad workflow platforms cover generic sign-out—none combines contradiction handling, confirmatory-plan logic, and QA provenance in one product built for variant-science teams."
  - "The outcomes corpus is a durable data moat: only a purpose-built signoff OS accumulates paired DNA/RNA/splice evidence linked to reviewer edits, confirmatory work, and final sign-out across multiple labs—data incumbents expose as knowledge bases, not local outcomes graphs."
  - "Biosecurity-grade provenance is a day-one architectural requirement, not a retrofit: Radical Numerics and the broader market signal that biology AI safety is a product mandate from launch; building access controls, restricted-output policies, and model-version traceability into the core stack from day one is a structural advantage."
  - "Buying urgency aligns with a natural procurement cycle: assay upgrades, CLIA/IVDR inspection prep, and noncoding-scope expansions create recurring budget events where labs already expect validation and integration spend, removing the need to create a new budget category."
  - "Multiomic contradiction handling compounds faster with DNA+RNA evidence: open tools like RegTools and SpliceAI validate that RNA-aware interpretation is actionable; a product fusing both modalities into contradiction-aware review creates a harder-to-replicate corpus than DNA-only classifiers."

strategicChoices:
  beachhead: >-
    U.S. venture-backed oncology diagnostics companies and top-10 molecular
    reference labs with active solid-tumor DNA+RNA assay programs, 5–20 variant
    scientists, and a weekly backlog of rare noncoding calls that must be cleared
    before report release or assay-version updates.
  wedgeRationale: >-
    Rare noncoding adjudication is the hardest, highest-stakes, and least-tooled
    moment in the diagnostics workflow. Owning it with contradiction handling and
    confirmatory-step tracking creates faster proof of value than competing on
    generic interpretation speed or report formatting, where incumbents already
    hold enterprise contracts and installed base.
  sequencingRationale: >-
    Shadow-mode pilots come first to build retrospective concordance evidence
    without displacing human sign-out, which is the primary trust and regulatory
    blocker. Once concordance thresholds are met on one assay, the product earns
    a production role and expands to additional assay programs within the same
    account before new-logo selling begins at scale. LIMS and reporting
    integrations follow proof of signoff ROI—not the reverse—to avoid
    integration drag killing pilots before value is demonstrated.
  notYet:
    - "Germline hereditary disease panels (different variant classification frameworks and buyer persona; address after oncology signoff corpus is established)"
    - "Companion-diagnostic assay design workflows (more complex regulatory pathway; opens after production oncology deployments provide reimbursement and validation evidence)"
    - "Pathogen and biosurveillance workflows (national-lab and public-sector sales cycles are long and specialized; reserve for year 2+ once oncology signoff moat is proven)"
    - "Building or competing with foundation biology models (Radical Numerics and peers are potential API partners, not targets)"

market:
  tam: "$200M estimated (approximately 800 U.S./EU solid-tumor DNA+RNA assay programs at approximately $250k annual interpretation-workflow budget; roughly 5% of the $4.03B oncology molecular diagnostics market per DataM Intelligence 2026–2033 report)"
  sam: "$62.5M estimated (approximately 250 large U.S./EU reference-lab or diagnostics-company programs with active solid-tumor DNA+RNA expansion and complex signoff needs at approximately $250k annual budget)"
  som: "$6M estimated (20 design-partner and scaled accounts at approximately $300k annual spend each within 36 months, based on research.yaml SOM sizing)"
  segments:
    - "Venture-backed oncology diagnostics companies with 5–20 variant scientists launching or upgrading solid-tumor DNA+RNA assays"
    - "Top-10 molecular reference labs with high-throughput NGS programs and weekly noncoding curation backlogs"
  buyingProcess: >-
    The economic buyer is the VP R&D, CMO, or GM of oncology diagnostics; the
    technical champion is the head of variant science or the clinical
    bioinformatics lead. Budget approval typically attaches to an assay-upgrade
    project, CLIA/CAP inspection cycle, or backlog-relief initiative—not a
    standalone AI line item—with enterprise sales cycles of 3–9 months and a
    shadow-mode pilot before production commitment.

product:
  mvp: >-
    A secure web workspace that ingests VCF and RNA evidence from one solid-tumor
    DNA+RNA assay, ranks hard noncoding and regulatory variants by evidence
    strength, flags DNA/RNA contradictions, suggests confirmatory tests, and
    exports a structured review packet with reviewer sign-out log—running in
    shadow mode alongside existing workflows from day one.
  sixMonth: "Configurable QA rules engine, LIMS export connectors for the top two oncology stacks, structured AMP/ASCO/CAP-aligned report output, and retrospective concordance dashboard for pilot accounts."
  twelveMonth: "Bidirectional LIMS integration, multi-assay program support within one account, assay-intelligence layer surfacing recurring edge cases, and first audit-ready validation binder generation for CLIA/CAP inspection prep."
  twentyFourMonth: "Multi-account anonymized edge-case corpus with network effects, RNA splicing evidence fusion from external tools (RegTools, SpliceAI), API ingestion of biology-model outputs (e.g., Radical Numerics Omnii), and biosurveillance module beta."
  keyBets:
    - "Contradiction handling and confirmatory-plan logic is the core product differentiation—invest disproportionately in the reasoning layer over report templates."
    - "Shadow mode is the trust-building mechanism: never require labs to replace human sign-out; position as decision support with full provenance."
    - "Data-sharing agreements with design partners from day one are a strategic asset; the outcomes corpus compounds only if case-level outcomes are captured contractually from the start."

gtm:
  wedge: >-
    Founder-led design-partner engagements with 3–5 oncology diagnostics companies
    during an assay upgrade or noncoding-scope expansion, structured as paid
    shadow-mode pilots tied to a specific backlog problem and a pre-agreed
    retrospective concordance threshold.
  channels:
    - "Founder-led direct sales to variant-science leaders and medical directors at target diagnostics companies and reference labs"
    - "Scientific-advisor and pathology-network introductions from founders and advisory board members"
    - "Standards-aligned educational content in AMP/CAP/ACMG circles to enter quality-improvement and inspection-prep conversations"
    - "Co-sell with NGS workflow and bioinformatics partners already helping labs stand up or scale in-house programs"
  funnelTargets: "Outreach-to-qualified-pilot 10–15% (high validation bar in diagnostics); pilot-to-production 50%+ after shadow-mode concordance threshold met; account expansion via additional assay programs targeting 120%+ NRR."
  pricing: >-
    Annual subscription per active assay program ($200–350k/year, anchored to
    variant-scientist time savings and inspection-readiness value), plus one-time
    implementation and data-integration fees ($25–50k). Premium modules for
    regulatory-submission packages, audit binder generation, and validation study
    design priced separately. Framed as validation and compliance acceleration to
    align with existing budget lines rather than discretionary AI spend.

businessModel:
  revenueStreams:
    - "Annual SaaS subscription per active assay program or laboratory account"
    - "One-time implementation and data-integration fees"
    - "Premium modules for validation studies, regulatory submissions, and audit binder generation"
  unitOfValue: "Active assay program under review (number of hard noncoding variant cases processed and signed off per year)"
  targetGrossMarginPct: 72
  expansionLevers:
    - "Expand from one oncology assay to additional solid-tumor programs within the same account"
    - "Expand from oncology into hereditary disease, companion-diagnostic, and infectious-disease panels once oncology corpus is established"
    - "Biosurveillance and pathogen-screening module for national-lab and public-sector accounts in year 2+"
    - "Anonymized outcomes corpus licensed to assay manufacturers and research consortia as a data product"

strategyMap:
  northStarMetric: "Hard noncoding variant cases signed off per month across all production accounts"
  inputMetrics:
    - "Median time from variant flagging to audit-ready sign-out (target: less than 50% of current manual baseline)"
    - "Shadow-mode concordance rate with retrospective human decisions on hard cases (target: greater than 90%)"
    - "Pilot-to-production conversion rate (target: 50%+)"
    - "Number of active assay programs per account (expansion proxy)"
    - "Net revenue retention rate (target: 120%+)"
  moatsToBuild:
    - "Proprietary closed-loop corpus of resolved noncoding edge cases linked to DNA/RNA evidence, confirmatory outcomes, and reviewer behavior across multiple labs"
    - "Biosecurity-grade provenance and model-version traceability architecture that is costly to retrofit"
    - "Assay-specific QA rule libraries and review templates co-developed with design partners"
    - "Integration depth with dominant oncology LIMS and reporting stacks creating switching cost"
  killCriteria:
    - "Fewer than 3 design-partner pilots signed within 12 months of product launch"
    - "Shadow-mode concordance below 85% on retrospective hard-case cohorts after 6 months of tuning"
    - "Pilot-to-production conversion below 30% across the first 5 completed pilots"
    - "A major incumbent ships a dedicated rare noncoding adjudication module with contradiction handling within 18 months before the outcomes corpus creates switching cost"
  mermaid: |
    flowchart LR
      Wedge[Assay-upgrade design partner] --> Shadow[Shadow-mode pilot]
      Shadow --> Concordance[Retrospective concordance evidence]
      Concordance --> Production[Production sign-out deployment]
      Production --> Expansion[Multi-assay account expansion]
      Expansion --> Corpus[Outcomes corpus moat]
      Corpus --> NewLogo[New-logo conviction and co-sell]
      NewLogo --> Expansion

investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Credible wedge with a natural procurement hook and a real data moat potential, contingent on confirming that weekly noncoding case volume at beachhead accounts is high enough to justify dedicated tooling."
    whyBelieve: "The rare noncoding adjudication loop is genuinely untooled, the buying trigger maps to recurring assay-upgrade budget events, and a closed-loop outcomes corpus creates a durable moat that no incumbent currently builds."
    whyDoubt: "If median accounts have fewer than 5 hard noncoding calls per week requiring multi-person review, per-case ROI may not justify a six-figure subscription without a broader interpretation platform story."
    nextDiligence: "Shadow-mode backlog audit at 3 target solid-tumor DNA+RNA labs to confirm weekly hard-variant volume, current sign-out time, and whether concordance between reviewer decisions and model-assisted suggestions reaches 85%+ on retrospective cases."
  firstCustomer:
    title: "Head of variant science at a Series B+ oncology diagnostics company"
    profile: "A 50–200 person U.S. diagnostics company with an active solid-tumor DNA+RNA assay, 5–20 variant scientists, and a weekly backlog of rare noncoding calls holding up report release."
    trigger: "Launching a new noncoding or RNA-aware assay version, preparing for a CAP or CLIA inspection, or facing variant-scientist hiring pressure that makes manual curation unsustainable at current assay scope."
    buyer: "VP R&D or Chief Medical Officer"
    initialContract: "$25–50k shadow-mode pilot converting to $200–300k annual subscription after concordance threshold is met, with implementation fees on top."
  mustBeTrue:
    - "The median beachhead account has at least 5–10 hard noncoding or splice calls per week requiring multi-person review before report release."
    - "Medical directors will approve a shadow-mode pilot within 6–9 months if a retrospective concordance study on their own historical cases meets a pre-agreed threshold of 90%+."
    - "No major incumbent ships a purpose-built rare noncoding adjudication module with contradiction handling and confirmatory-plan logic within 18 months of company launch."
    - "The outcomes corpus from 5+ design partners provides a measurable review-quality advantage—faster sign-out or fewer re-reviews—demonstrable in a prospective study."
    - "The company can hire 2–3 founding engineers and 1–2 clinical bioinformatics specialists within 6 months capable of building a pilot-quality evidence-ranking and contradiction engine."
  diligenceQuestions:
    - "How many hard noncoding or splice calls per week does each target lab currently escalate to multi-person review, and what fraction require retrospective board discussion?"
    - "What concordance and time-saved thresholds would medical directors and VP R&Ds require before moving from shadow mode to production sign-out responsibility?"
    - "Which LIMS, secondary-analysis, and report-generation stacks dominate the first 20 target accounts, and where are integration blockers highest?"
    - "Does the founding team have direct prior relationships with 3+ target diagnostics labs willing to be paid design partners within 6 months?"
    - "How are Velsera and QIAGEN currently serving the rare noncoding cases at these accounts, and what workflow gaps do they specifically leave?"
    - "Is the annual software budget for this workflow at target accounts in a software, validation, or compliance-readiness line item, and what is the typical approval process?"

operatingAssumptions:
  - assumption: "The median design-partner account has 5–10+ hard noncoding or splice calls per week requiring multi-person review."
    basis: research.yaml
    validationTest: "Shadow-mode backlog audit across 3 target solid-tumor DNA+RNA assay programs within the first 90 days, segmented by variant class and assay release cycle."
    decisionImpact: "If fewer than 5 calls per week, the per-case throughput ROI framing shifts to inspection-readiness and assay-change management; pilot structure and pricing floor change accordingly."
  - assumption: "A $200–350k annual subscription per assay program is within willingness-to-pay when framed as validation or compliance acceleration."
    basis: research.yaml
    validationTest: "Budget interviews with VP R&D and CMO leads during 3–5 initial pilot conversations, asking directly about software, validation, and compliance line-item sizes."
    decisionImpact: "If WTP is below $100k per program, the business model must shift to per-case pricing or a broader platform story to achieve viable unit economics."
  - assumption: "Shadow-mode pilots can reach greater than 90% retrospective concordance on hard cases within 6 months on one assay program."
    basis: "operator judgment"
    validationTest: "Retrospective concordance study comparing model-assisted ranked interpretations against archived human decisions on 200+ hard cases from design partners."
    decisionImpact: "If concordance ceiling is below 85%, production sign-out adoption stalls and the product must reframe as evidence-retrieval augmentation rather than a signoff OS, which changes the competitive positioning and pricing."
  - assumption: "LIMS and reporting integration can be delivered through export-first connectors in the first 6 months without custom bidirectional API work."
    basis: research.yaml
    validationTest: "Integration scoping with 3 design-partner accounts in the first 60 days to confirm that structured export to their LIMS covers the minimum viable handoff."
    decisionImpact: "If all target accounts require bidirectional API integration before any pilot value is realized, engineering capacity must be allocated earlier and time-to-value extends 3–6 months, increasing burn before first revenue."
  - assumption: "Founders can close 3–5 design-partner agreements within the first 9 months using existing pathology and variant-science networks."
    basis: "operator judgment"
    validationTest: "LOI or paid-pilot agreement with at least 2 accounts within 6 months of product launch."
    decisionImpact: "If sales cycle exceeds 12 months for the first 3 pilots, runway requirements increase materially and the funding ask must be sized up or the beachhead narrowed to accounts with imminent assay-upgrade projects."

experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Backlog audit at 3 target labs"
    hypothesis: "The median solid-tumor DNA+RNA program has 5–10+ hard noncoding calls per week requiring multi-person review, validating the per-case ROI framing."
    successMetric: "3 labs confirm 5+ hard noncoding calls per week and provide access to 200+ historical cases for a concordance study."
    owner: "CEO"
  - horizon: "0–90 days"
    experiment: "Retrospective concordance study on archived cases"
    hypothesis: "Model-assisted ranked interpretations reach greater than 85% agreement with archived human decisions on hard noncoding cases from one design-partner assay program."
    successMetric: "85%+ concordance on 200+ retrospective cases; result documented in a shareable validation summary ready for medical-director review."
    owner: "CTO / clinical bioinformatics lead"
  - horizon: "0–90 days"
    experiment: "Willingness-to-pay interview series"
    hypothesis: "VP R&D and CMO leads at target accounts will allocate $150–350k per assay program annually when the purchase is framed as validation or inspection-readiness spend."
    successMetric: "5+ interviews confirm a relevant budget line and a verbal price-range acceptance in the $150–350k range."
    owner: "CEO"
  - horizon: "90–180 days"
    experiment: "Shadow-mode pilot with first design partner"
    hypothesis: "Running the signoff OS in parallel with manual review will reduce median sign-out time for hard noncoding calls by 30%+ without increasing re-review or escalation rate."
    successMetric: "30%+ reduction in median sign-out time on hard cases; no increase in re-review rate; pilot sponsor signs production LOI."
    owner: "CEO and CTO"
  - horizon: "90–180 days"
    experiment: "LIMS export connector prototype"
    hypothesis: "Structured VCF-plus-review-packet export to the two most common oncology LIMS stacks covers the minimum viable handoff for shadow-mode pilots without custom API work."
    successMetric: "2 design partners accept the export connector as sufficient for pilot launch; no integration blocker identified in scoping."
    owner: "CTO"
  - horizon: "180–365 days"
    experiment: "Inspection-readiness module beta"
    hypothesis: "Generating an audit binder from accumulated sign-out packets reduces time to assemble a CAP or CLIA audit package by 50%+ versus manual assembly."
    successMetric: "2 accounts use the binder in a real audit or mock inspection and confirm 50%+ time reduction; cited in renewal or expansion discussion."
    owner: "Product lead"
  - horizon: "180–365 days"
    experiment: "Second and third design-partner onboarding"
    hypothesis: "Onboarding a second and third account on the validated shadow-mode workflow takes 60 days or fewer per account with the connector library built for account one."
    successMetric: "2 additional accounts in shadow mode within 12 months of product launch; combined pipeline of 5+ accounts at various stages."
    owner: "CEO"

operations:
  - "Secure multi-tenant cloud deployment with HIPAA BAA and SOC 2 Type II roadmap from day one to meet clinical-lab data requirements."
  - "Evidence-ingestion pipeline supporting VCF, BAM/CRAM region exports, RNA-seq junction files, and structured LIMS exports from the top 2–3 oncology stacks."
  - "Model-agnostic biology-model API layer so outputs from Radical Numerics Omnii or equivalent can be ingested without platform lock-in."
  - "Outcomes graph database linking model suggestion, reviewer edits, confirmatory-step log, final sign-out, and post-market corrections per resolved case."
  - "QA and regulatory advisory process for CLIA, CAP, AMP, and FDA LDT alignment, supported by a medical-director advisor and regulatory consultant from month 6."

team:
  - role: "CEO / commercial lead with variant science or clinical bioinformatics background and diagnostics industry relationships"
    startTiming: "Month 0"
    rationale: "Design-partner sales and founder-led pilots require direct credibility with medical directors and variant-science leads; this role owns the first 3–5 customer relationships."
  - role: "CTO / bioinformatics engineering lead with ML and bioinformatics background"
    startTiming: "Month 0"
    rationale: "The evidence-ranking and contradiction engine is the core technical bet; a founding engineer is required to build a pilot-quality product within 6 months."
  - role: "Senior clinical bioinformatics scientist"
    startTiming: "Month 2"
    rationale: "Retrospective concordance studies, QA rule logic, and LIMS integration scoping require domain expertise that cannot be outsourced in the pilot phase."
  - role: "Full-stack product engineer"
    startTiming: "Month 3"
    rationale: "Frontend workspace, review packet generation, and export connectors need a dedicated engineer once the core evidence-ranking prototype is functional."
  - role: "Regulatory and compliance advisor (fractional)"
    startTiming: "Month 6"
    rationale: "CLIA, CAP, and FDA LDT alignment guidance is needed before first production sign-out deployment; fractional engagement is sufficient at pre-seed stage."

