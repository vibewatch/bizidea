      - "1–2 accounts in full production sign-out mode with first annual renewals at $200k+ ARR per account"
      - "Total ARR at $1.5M+ from 5+ paying production and shadow-mode accounts"
      - "Multi-assay expansion within at least 2 accounts with second assay program under contract"
      - "Inspection-readiness module shipped and used in at least 1 live CAP or CLIA audit package"
      - "Outcomes corpus at 2,000+ resolved hard-variant cases across 3+ accounts"
      - "SOC 2 Type II certification complete"
  - horizon: "24–36 months"
    items:
      - "Total ARR at $5M+ from 15+ accounts with NRR of 115%+"
      - "Biosurveillance and pathogen-screening module in paid beta with 1–2 national-lab or public-sector accounts"
      - "Biology-model API integration live enabling direct ingestion of outputs from Radical Numerics Omnii or equivalent"
      - "First hereditary disease or companion-diagnostic module in design-partner stage"
      - "Anonymized outcomes corpus available as a licensed data product to assay manufacturers or research consortia"

risks:
  - risk: "Weekly noncoding backlog is smaller than expected at beachhead accounts, weakening per-case throughput ROI."
    likelihood: Medium
    impact: High
    mitigation: "Validate backlog volume via shadow-mode audits within the first 90 days before pilot pricing is finalized; if low, reframe ROI around inspection-readiness and assay-change management rather than throughput speed."
  - risk: "Retrospective concordance ceiling is below 90%, preventing medical-director trust for production sign-out."
    likelihood: Medium
    impact: High
    mitigation: "Launch in hard shadow mode with human-final decisions and transparent evidence packets; set concordance thresholds in pilot contracts so failure is bounded and expectations are pre-agreed."
  - risk: "LIMS and reporting integration drag delays pilots because fragmented stacks require custom work per account."
    likelihood: High
    impact: Medium
    mitigation: "Lead with export-first connectors and structured report outputs before deeper bidirectional integration; scope integration requirements in the first 60 days and build connectors only for accounts with confirmed pilot commitments."
  - risk: "Velsera or QIAGEN extends their platforms to cover rare noncoding adjudication with contradiction handling within 18 months."
    likelihood: Low
    impact: High
    mitigation: "Build the outcomes corpus and assay-specific QA rule library fast enough that the data moat creates switching cost before incumbent catch-up; differentiate on multiomic contradiction handling and local outcomes learning, not workflow breadth."
  - risk: "FDA LDT oversight or CAP inspection requirements create deployment blockers for production sign-out use."
    likelihood: Medium
    impact: High
    mitigation: "Position as decision-support tool with documented human sign-out, full audit logs, and model-version traceability from day one; engage a regulatory advisor by month 6 to track evolving LDT guidance and proactively align the product with CLIA/CAP documentation norms."
  - risk: "Founding team cannot close 3+ design partners within 9 months due to long diagnostics sales cycles."
    likelihood: Medium
    impact: High
    mitigation: "Prioritize accounts with an active assay-upgrade or inspection-prep project already in motion; use warm pathology-network and scientific-advisor introductions rather than cold outbound to compress the sales cycle."

fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: "18 months of runway funds the founding team (CEO, CTO, 2 engineers, 1 clinical bioinformatics scientist), 3–5 shadow-mode design-partner pilots, retrospective concordance studies, LIMS connector development, SOC 2 Type II initiation, and regulatory advisory—enough to reach $1M+ ARR and production deployments at 2+ accounts, the evidence base required for a seed raise."
