scenarios:
  downside:
    description: "集成和监管审查耗时超预期，试点转化和多检测扩展双双延误。"
    y3RevenueK: 3270.0
    y3EbitdaK: -560.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - "试点转生产转化率从约 50%+ 降至约 35%。"
      - "第三年第四季度付费检测项目数止步于 12 个，而非 16 个。"
      - "成熟客户价值停留在 $275K 订阅中值附近，高级模块挂载寥寥。"
      - "毛利率上限约 66%——实施和审查员支持工作仍偏服务性质。"
  base:
    description: "基础情景：第一年签下 4 个付费试点，第二年转化早期账户，第三年第四季度达到 16 个付费项目，部分多检测扩展已发生。"
    y3RevenueK: 4410.0
    y3EbitdaK: 10.9
    cashLowPointK: 874.4
    keyAssumptionChanges:
      - "付费试点定价约 $45K，从第一年末到第二年陆续转换为 $275K 年度订阅。"
      - "第三年第四季度付费项目达 16 个，部分账户内第二检测项目扩展支撑 NRR 120%+。"
      - "含实施费和模块扩展挂载后，成熟客户混合年均价值约 $330K ARR。"
      - "毛利率在第三年第四季度达到商业计划目标 72%。"
  upside:
    description: "参考账户和标准化连接器缩短实施周期，高级模块挂载提前。"
    y3RevenueK: 5400.0
    y3EbitdaK: 620.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
      - "试点转生产转化率升至约 65%。"
      - "第三年第四季度付费项目达 18 个，比基础情景提前约两个季度。"
      - "审计文件夹和验证研究模块提前挂载，成熟客户价值约 $360K ARR。"
      - "集成标准化加快，毛利率约 74%。"
sensitivity:
  - variable: ARPU
    downsideCase: "每个生产项目成熟 ARR $275K"
    baseCase: "每个生产项目成熟 ARR $330K"
    upsideCase: "$360K（高级模块提前挂载且多检测扩展较早）"
    y3RevenueImpactK: -740.0
    cashImpactK: -530.0
  - variable: CAC
    downsideCase: "每个生产项目 $380K"
    baseCase: "每个生产项目 $300K"
    upsideCase: "$240K（暖转介绍更多、尽调周期更短）"
    y3RevenueImpactK: 0.0
    cashImpactK: -430.0
  - variable: 流失率
    downsideCase: "早期部署未达预期时月流失率 2.5%"
    baseCase: "月流失率 1.5%"
    upsideCase: "质控工作流高度黏性时月流失率 1.0%"
    y3RevenueImpactK: -230.0
    cashImpactK: -170.0
  - variable: 销售周期
    downsideCase: "医学主任审批较慢时 12 个月周期"
    baseCase: "从试点签约到付费部署 6–9 个月"
    upsideCase: "首批参考客户胜出后 4–6 个月"
    y3RevenueImpactK: -980.0
    cashImpactK: -700.0
  - variable: 试点转化率
    downsideCase: "试点转生产转化率 35%"
    baseCase: "试点转生产转化率 50%+"
    upsideCase: "一致性证据更强时转化率 65%"
    y3RevenueImpactK: -840.0
    cashImpactK: -600.0
  - variable: 毛利率
    downsideCase: "稳态毛利率 66%"
    baseCase: "目标毛利率 72%"
    upsideCase: "支持负载更轻时 74%"
    y3RevenueImpactK: 0.0
    cashImpactK: -310.0
  - variable: 招聘节奏
    downsideCase: "将一名工程师和一名实施岗提前两个季度入职"
    baseCase: "按商业计划里程碑顺序达到证明点后招聘"
    upsideCase: "在 2 个生产部署完成前延迟一名规模化 GTM 招聘"
    y3RevenueImpactK: 0.0
    cashImpactK: -260.0
modelDiagram:
  title: "单位经济模型流转图"
  mermaid: |
    flowchart LR
      Leads[Target labs] --> Pilots[Paid shadow-mode pilots]
      Pilots --> Production[Production sign-off programs]
      Production --> Expansion[Second assays and premium modules]
      Expansion --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash]
modelSanity:
  - checkName: "收入引擎"
    finding: "基础情景收入由第一年 4 个付费试点驱动，到第三年第四季度转化为 16 个付费项目，多检测扩展和模块挂载将成熟客户价值拉升至约 $330K ARR。"
  - checkName: "必须正确推进"
    finding: "试点转生产转化率必须保持在商业计划 50%+ 目标附近，且第二个检测项目扩展必须在第二年启动，公司才能达到隐含的年末 $500 万+ ARR。"
