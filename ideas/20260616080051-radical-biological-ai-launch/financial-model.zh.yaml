slug: noncoding-variant-signoff-os
date: "2026-06-16"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-07"
    unit: month
    source: "[BP date 2026-06-16] 模型从商业计划日期之后的第一个完整月份开始。"
  - id: A2
    name: "pre-seed 完成后期初现金"
    value: "$3.2M"
    unit: usdM
    source: "[BP fundingAsk target $2–4M; BP fundingAsk.runwayMonths 18] 基础情景使用 pre-seed 中偏高位的融资额，以便公司在种子轮前完成 2 个生产部署，并保留约 6 个月缓冲资金。"
  - id: A3
    name: "起始付费客户数（第 1 个月）"
    value: "0"
    unit: count
    source: "[BP gtm.wedge; BP milestones] 计划起始时尚无任何付费影子模式试点上线。"
  - id: A4
    name: "付费影子模式试点定价"
    value: "$45K per pilot over about 3 months"
    unit: usdK_per_pilot
    source: "[BP investorMemo.firstCustomer.initialContract $25–50k] 模型取首个付费共创客户合同区间中值。"
  - id: A5
    name: "生产订阅价格"
    value: "$275K ARR per active assay program"
    unit: usdK_arr_per_customer_year
    source: "[BP gtm.pricing $200–350k/year] 基础情景取年度订阅区间中值。"
  - id: A6
    name: "实施费与扩展附加值"
    value: "$35K implementation fee at go-live and roughly $330K mature ARR after second-assay or module expansion"
    unit: usdK
    source: "[BP gtm.pricing implementation $25–50k; BP gtm.funnelTargets 120%+ NRR; BP milestones multi-assay expansion] 早期账户增加第二个检测项目或高级验证工作流后，成熟客户价值超过基础订阅价格。"
  - id: A7
    name: "客户增长节奏"
    value: "4 paid pilots by M12, 7 paying programs by Q4Y2, and 16 by Q4Y3"
    unit: customers
    source: "[BP milestones; research.market.som $6.0M across 20 programs] 基础情景低于 research SOM 天花板，同时符合商业计划 24–36 个月内 15+ 个账户的目标。"
  - id: A8
    name: "毛利率爬坡"
    value: "30%-45% in pilot-heavy Y1 months, 55%-68% through Y2, and 70%-72% through Y3"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 72; BP strategicChoices.sequencingRationale; BP operatingAssumptions] 早期试点在集成和审查员支持上成本较高，产品需要时间才能达到软件级毛利率。"
  - id: A9
    name: "月流失率"
    value: "1.5%"
    unit: percent
    source: "针对将人工审签嵌入流程的黏性临床工作流软件的初创公司财务基准；检测项目上线后流失率应较低，但早期产品风险需要非零假设。"
  - id: A10
    name: "全包 CAC"
    value: "$300K per production program"
    unit: usdK_per_customer
    source: "[BP gtm.channels; BP gtm.funnelTargets; BP risks] 创始人主导销售、回顾性验证研究以及安全合规尽调使 CAC 明显高于中端市场 SaaS。"
  - id: A11
    name: "薪资水平区间"
    value: "CEO/commercial $180K; engineering $190K; clinical bioinformatics $170K; implementation $155K; sales $160K; ops/G&A $130K"
    unit: usdK_per_fte_year
    source: "美国诊断软件招聘的初创公司财务基准，对应 [BP team] 中列出的岗位。"
  - id: A12
    name: "人员编制快照爬坡"
    value: "CEO/commercial 1/1/1/1/1/1; engineering 1/2/2/3/4/5; clinical bioinformatics 0/1/1/1/2/3; implementation 0/0/0/0/1/2; sales 0/0/0/0/1/2; ops/G&A 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3"
    unit: fte
    source: "[BP team; BP milestones; BP strategicChoices.sequencingRationale] 创始人和技术验证岗位优先招聘；实施、销售和运营岗位等到试点验证后再跟进。"
  - id: A13
    name: "招聘时间节点（季度薪资滞后）"
    value: "Sales M15, ops M16, second clinical scientist M18, first implementation hire M19, fourth engineer M21, then one engineer M27, one clinical scientist M29, second implementation hire M31, and second sales hire M33"
    unit: timing
    source: "[BP team; BP milestones] 季度薪资支出根据最近的人员快照，按商业计划顺序平滑招聘节奏。"
  - id: A14
    name: "监管顾问处理方式"
    value: "Fractional from month 6 and modeled inside G&A rather than headcount"
    unit: method
    source: "[BP team regulatory and compliance advisor (fractional); BP operations] 顾问成本真实存在，但在 pre-seed 模型中不足以单独列为全职员工。"
  - id: A15
    name: "非薪资运营预算"
    value: "Y1 non-salary opex $24K-$43K per month, Y2 $145K-$205K per quarter, and Y3 $235K-$270K per quarter"
    unit: usdK
    source: "叠加在薪资之上的云计算、安全、差旅、法务、保险和合规支出的初创公司财务基准，适用于临床工作流初创公司。"
  - id: A16
    name: "现金换算简化"
    value: "EBITDA approximates cash movement after the financing close"
    unit: method
    source: "轻资产软件公司在此阶段不单独建模债务或资本支出的初创公司财务基准。"
  - id: A17
    name: "下行情景参数变化"
    value: "Pilot-to-production conversion falls to about 35%, Q4Y3 paying programs end at 12, and steady-state gross margin tops out near 66%"
    unit: scenario_inputs
    source: "[BP risks; research.reportMemo.sensitivityCases] 主要下行风险是验证速度变慢及交付工作服务性质更重。"
  - id: A18
    name: "上行情景参数变化"
    value: "Pilot-to-production conversion rises to about 65%, Q4Y3 paying programs reach 18, and steady-state gross margin reaches about 74%"
    unit: scenario_inputs
    source: "[BP milestones; BP businessModel.expansionLevers] 上行来自参考客户拉动销售加速和高级模块提前挂载。"
