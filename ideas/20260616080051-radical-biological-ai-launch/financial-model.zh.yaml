  amountM: 3.2
  runwayMonths: 24
  milestone: "完成 2 个生产审签部署、突破 $1M ARR 并验证多检测项目扩展的可重复性后进行种子轮。"
  useOfFunds:
    - bucket: 工程
      amountUsd: 1280000
      percentage: 40
    - bucket: GTM
      amountUsd: 800000
      percentage: 25
    - bucket: "G&A"
      amountUsd: 320000
      percentage: 10
