slug: noncoding-variant-signoff-os
date: "2026-06-16"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-07"
    unit: month
    source: "[BP date 2026-06-16] The model starts in the first full month after the business-plan date."
  - id: A2
    name: Starting cash after pre-seed close
    value: "$3.2M"
    unit: usdM
    source: "[BP fundingAsk target $2–4M; BP fundingAsk.runwayMonths 18] The base case uses an upper-mid pre-seed close so the company can reach 2 production deployments and still carry roughly 6 months of buffer before the seed round."
  - id: A3
    name: Starting paid customers (M1)
    value: "0"
    unit: count
    source: "[BP gtm.wedge; BP milestones] The plan begins before any paid shadow-mode pilot is live."
  - id: A4
    name: Paid shadow-mode pilot pricing
    value: "$45K per pilot over about 3 months"
    unit: usdK_per_pilot
    source: "[BP investorMemo.firstCustomer.initialContract $25–50k] The model uses the midpoint for the first paid design-partner contract."
  - id: A5
    name: Production subscription price
    value: "$275K ARR per active assay program"
    unit: usdK_arr_per_customer_year
    source: "[BP gtm.pricing $200–350k/year] The base case uses the midpoint of the annual subscription range."
  - id: A6
    name: Implementation and expansion attach
    value: "$35K implementation fee at go-live and roughly $330K mature ARR after second-assay or module expansion"
    unit: usdK
    source: "[BP gtm.pricing implementation $25–50k; BP gtm.funnelTargets 120%+ NRR; BP milestones multi-assay expansion] Mature customer value rises above the base subscription once early accounts add a second assay or premium validation workflow."
  - id: A7
    name: Customer ramp
    value: "4 paid pilots by M12, 7 paying programs by Q4Y2, and 16 by Q4Y3"
    unit: customers
    source: "[BP milestones; research.market.som $6.0M across 20 programs] The base case stays below the research SOM ceiling while matching the BP goal of 15+ accounts by months 24-36."
  - id: A8
    name: Gross margin ramp
    value: "30%-45% in pilot-heavy Y1 months, 55%-68% through Y2, and 70%-72% through Y3"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 72; BP strategicChoices.sequencingRationale; BP operatingAssumptions] Early pilots carry heavy integration and reviewer-support cost before the product reaches software-like margins."
  - id: A9
    name: Monthly churn
    value: "1.5%"
    unit: percent
    source: "Startup-finance heuristic for sticky clinical workflow software with human sign-out embedded in the process; churn should be low once an assay program is live, but early-product risk warrants a non-zero assumption."
  - id: A10
    name: Fully loaded CAC
    value: "$300K per production program"
    unit: usdK_per_customer
    source: "[BP gtm.channels; BP gtm.funnelTargets; BP risks] Founder-led selling, retrospective validation studies, and security or compliance diligence make CAC materially higher than mid-market SaaS."
  - id: A11
    name: Loaded salary bands
    value: "CEO/commercial $180K; engineering $190K; clinical bioinformatics $170K; implementation $155K; sales $160K; ops/G&A $130K"
    unit: usdK_per_fte_year
    source: "Startup-finance heuristic for U.S. diagnostics software hiring, mapped to the roles listed in [BP team]."
  - id: A12
    name: Headcount snapshot ramp
    value: "CEO/commercial 1/1/1/1/1/1; engineering 1/2/2/3/4/5; clinical bioinformatics 0/1/1/1/2/3; implementation 0/0/0/0/1/2; sales 0/0/0/0/1/2; ops/G&A 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3"
    unit: fte
    source: "[BP team; BP milestones; BP strategicChoices.sequencingRationale] Founders and technical validation hires come first, while implementation, sales, and ops hires wait for pilot proof."
  - id: A13
    name: Hiring timing behind quarterly payroll
    value: "Sales M15, ops M16, second clinical scientist M18, first implementation hire M19, fourth engineer M21, then one engineer M27, one clinical scientist M29, second implementation hire M31, and second sales hire M33"
    unit: timing
    source: "[BP team; BP milestones] Quarterly salary expense is smoothed from the most recent headcount snapshot using hires that follow the BP sequence."
  - id: A14
    name: Regulatory advisor treatment
    value: "Fractional from month 6 and modeled inside G&A rather than headcount"
    unit: method
    source: "[BP team regulatory and compliance advisor (fractional); BP operations] The advisory cost is real but does not justify a full FTE in the pre-seed model."
  - id: A15
    name: Non-payroll operating budgets
    value: "Y1 non-salary opex $24K-$43K per month, Y2 $145K-$205K per quarter, and Y3 $235K-$270K per quarter"
    unit: usdK
    source: "Startup-finance heuristic for cloud compute, security, travel, legal, insurance, and compliance spend layered on top of payroll for a clinical workflow startup."
  - id: A16
    name: Cash conversion simplification
    value: "EBITDA approximates cash movement after the financing close"
    unit: method
    source: "Startup-finance heuristic for an asset-light software company with no debt or capex line modeled separately at this stage."
  - id: A17
    name: Downside scenario deltas
    value: "Pilot-to-production conversion falls to about 35%, Q4Y3 paying programs end at 12, and steady-state gross margin tops out near 66%"
    unit: scenario_inputs
    source: "[BP risks; research.reportMemo.sensitivityCases] The main downside is slower validation and a more services-heavy delivery burden."
  - id: A18
    name: Upside scenario deltas
    value: "Pilot-to-production conversion rises to about 65%, Q4Y3 paying programs reach 18, and steady-state gross margin reaches about 74%"
    unit: scenario_inputs
    source: "[BP milestones; BP businessModel.expansionLevers] The upside comes from faster reference selling and earlier premium-module attach."
