modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Target labs] --> Pilots[Paid shadow-mode pilots]
      Pilots --> Production[Production sign-off programs]
      Production --> Expansion[Second assays and premium modules]
      Expansion --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by 4 paid pilots in Y1 converting into 16 paying programs by Q4Y3, with multi-assay expansion and module attach lifting mature customer value toward $330K ARR.
  - checkName: Must go right
    finding: Pilot-to-production conversion has to stay near the BP's 50%+ target and second-assay expansion has to begin by Y2 for the company to reach the implied $5M+ year-end ARR.
  - checkName: Model breaks if
    finding: The downside case appears if sales cycles stretch past 12 months or gross margin stalls near 66%, because that pushes cash toward roughly $180K before the model can self-fund.
  - checkName: Next-round proof
    finding: The next round is justified once 2 production deployments, more than $1M ARR, and repeatable audit-ready ROI create confidence that multi-assay expansion is repeatable.
sanityChecks:
  ruleOf40: "Y3 growth 191.1% + EBITDA margin 0.2% = 191.3%."
  burnMultiple: "Approximate Y2 burn multiple is 0.8x using about $1.13M of burn against about $1.44M of Q4 ARR expansion; Y3 is approximately cash breakeven while adding about $3.36M of ARR run-rate."
  revenuePerFte: "$315K Y3 using $4.41M revenue and 14 year-end FTE (benchmark $200–400K SaaS)."
  flags:
    - "The model uses a $3.2M pre-seed, near the upper half of the BP range, because long validation cycles delay meaningful production revenue until year 2."
    - "Q4Y3 revenue assumes multi-assay expansion and premium-module attach inside early accounts, so a one-program-only motion would miss the base case even if logo count lands."
    - "Y2 burn remains heavy because payroll, compliance, and integration work are front-loaded before the product reaches the BP's target 72% gross margin."
    - "Customer concentration is still material in Y3 because 16 paying programs remain a narrow base for a regulated enterprise workflow company."
