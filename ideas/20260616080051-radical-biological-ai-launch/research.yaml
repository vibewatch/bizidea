  "regulatoryLandscape": "Any deployment in live diagnostics has to coexist with CLIA/CMS quality obligations, CAP/AMP reporting norms, FDA LDT scrutiny, and EU IVDR-style evidence and traceability expectations; New York's ONCO guidance shows how granular documentation can get around covered regions, QC, bioinformatics, and confirmatory testing [3][6][7][8][9][10][11][12][33]."
  "technologyLandscape": "The enabling stack is converging: RNA-seq can lift diagnostic yield for splicing and noncoding questions, open tools like RegTools and PCGR already combine DNA/RNA and actionability, and shared resources such as ClinVar and ClinGen normalize evidence exchange. The remaining gap is not raw inference alone but lab-specific review orchestration [16][27][28][29][30]."
