  "competitiveLandscape": "Incumbents split the space between knowledge-base-first tools (QIAGEN, Genomenon), workflow/reporting suites (Velsera, Golden Helix), and low-friction classification tools (Franklin). Manual curation and in-house pipelines remain credible substitutes. A new wedge only exists if the product owns rare noncoding adjudication and audit packets rather than generic interpretation [18][19][20][22][23][24][26]."
  "incumbentThesis":
  - "incumbentClass": "Foundation model labs"
    "point": "Inference vendors can surface candidate biology, but FDA/CAP/AMP-style reporting, confirmatory logic, and human sign-out remain separate workflow and quality problems."
    "sourceRefs":
