slug: noncoding-variant-signoff-os
date: "2026-06-16"
executiveSummary: >-
  运行实体瘤 DNA+RNA 检测方案的癌症诊断实验室每周都会遇到罕见非编码和调控变异，这些变异
  在报告发布前需要多人审查，但没有任何单一工具能将 DNA 证据、RNA 剪接背景、历史病例、
  质控规则和文献整合进一个排序审签工作台。这家公司构建一个生物安全级多组学审查操作系统，
  位于生物模型输出与最终临床决策之间，为每一个难判案例生成排序解读、矛盾标记、确认检测
  计划和审计就绪证据包。滩头市场是风险投资支持的美国肿瘤诊断公司和前 10 名分子参考实验室，
  这些机构拥有活跃的实体瘤 DNA+RNA 检测项目，且每周都有非编码积压待处理。Radical
  Numerics $50M 种子融资、在线癌症诊断合作伙伴关系，以及在因果调控变异上的早期最优声明，
  共同确认基础模型推理在商业上已领先于合规审查工具——由此形成切口。没有任何现有厂商
  （QIAGEN、Velsera、Genomenon、Golden Helix 或 Franklin）在一个专用产品中同时拥有
  矛盾处理、确认计划生成和质控溯源的罕见非编码裁定闭环。公司通过一个专有结果语料库持续
  积累护城河，将模型辅助解读与湿实验室验证、最终审签和上市后纠正相关联——这是现有厂商
  无法从知识库或宽泛工作流平台复制的数据壁垒。业务从肿瘤诊断扩展到遗传病检测、伴随诊断、
  感染性疾病和生物监测，复用同一套溯源与审查引擎。目标融资为 $2–4M pre-seed，以在 2+
  个账户实现生产部署、突破 $1M ARR 后进行种子轮。

problem:
  - "实体瘤 DNA+RNA 检测方案中的难判非编码和调控变异需要多人审查，但证据散布在注释流程、电子表格、LIMS 备注和一次性文献查阅中——没有任何工具能排序关键内容、标记矛盾或追踪确认步骤。"
  - "审计和监管风险不断上升：CLIA、CAP、AMP 和 FDA LDT 审查要求为每个难判案例提供书面证据、人工审签和确认检测依据，而当前工作流留下的邮件和临时记录无法通过 CAP 检查。"
  - "随着肿瘤检测扩展到 RNA 感知和全基因组报告，非编码和剪接变异在整理积压中占比不断上升，但现有解读软件针对常见编码变异优化，缺乏矛盾处理或确认步骤追踪。"
  - "变异科学家招聘是结构性瓶颈：实验室将指南变更频繁和标准化不一致列为持续痛点，这使在不弱化 QA 的情况下压缩专家审查时间变得有吸引力——但针对这种压缩的专用产品尚不存在。"

solution:
  - "一个安全的多组学审查工作台，摄入检测输出、历史病例、RNA 和剪接证据、文献和质控规则，排序哪些非编码和调控变异值得升级处理，浮现 DNA 和 RNA 信号之间的矛盾，并建议下一步确认检测或人工核查。"
  - "每个案例以审计就绪数据包的形式结案，包含模型版本、证据溯源、审查员意见、确认步骤日志和最终审签状态——用 CLIA/CAP/IVDR 可辩护的记录取代电子表格记录，能够通过检查。"
  - "一个检测智能层跨案例浮现反复出现的边界案例和证据空白，指导面板更新、验证研究和新报告规则——将单次审签转化为机构知识。"
  - "随着时间推移，一个闭环结果语料库将模型辅助解读与湿实验室验证、报告发布和上市后纠正关联，随每个已解决的难判变异持续提升审查质量。"

whyWeWin:
  - "没有现有厂商拥有罕见非编码裁定闭环：注释工具商给变异评分，LIMS 工具商追踪病例，基础模型实验室出售原始推理，宽泛工作流平台覆盖通用审签——没有任何一家在一个为变异科学团队构建的产品中同时具备矛盾处理、确认计划逻辑和质控溯源。"
  - "结果语料库是持久数据护城河：只有专用审签操作系统才能积累跨多个实验室的配对 DNA/RNA/剪接证据，这些证据与审查员编辑、确认工作和最终审签相关联——现有厂商主要以知识库或报告形式公开数据，而非本地结果图谱。"
  - "生物安全级溯源是第一天的架构要求，而非事后加装：Radical Numerics 和更广泛的市场信号表明，生物 AI 安全从启动之日起就是产品使命；从第一天起将访问控制、限制输出策略和模型版本可追溯性内置到核心技术栈是结构性优势。"
  - "购买紧迫性与自然采购周期对齐：检测升级、CLIA/IVDR 检查准备和非编码范围扩展创造了反复出现的预算事件，实验室在这些事件中已预期验证和集成支出，无需创建新的预算类别。"
  - "多组学矛盾处理在 DNA+RNA 证据下积累更快：RegTools 和 SpliceAI 等开源工具验证了 RNA 感知解读的可操作性；一个将两种模态融入矛盾感知审查的产品比 DNA 单一分类器构建出更难复制的语料库。"

strategicChoices:
  beachhead: >-
    拥有活跃实体瘤 DNA+RNA 检测项目的美国风险投资支持肿瘤诊断公司和前 10 名分子参考实验室，
    拥有 5–20 名变异科学家，每周有必须在报告发布或检测版本更新前清除的罕见非编码判断积压。
  wedgeRationale: >-
    罕见非编码裁定是诊断工作流中最难、风险最高、工具最匮乏的时刻。以矛盾处理和确认步骤
    追踪拿下这一时刻，比在通用解读速度或报告格式上竞争能更快证明价值——现有厂商在那些领域
    已持有企业合同和安装基础。
  sequencingRationale: >-
    影子模式试点优先，在不取代人工审签的情况下构建回顾性一致性证据——这是首要的信任和监管
    障碍。一旦在一个检测方案上达到一致性阈值，产品便获得生产角色，并在同一账户内扩展至
    更多检测项目，之后才开始规模化新客户销售。LIMS 和报告集成跟随审签 ROI 的证明——
    而非相反——以避免集成阻力在价值展示前扼杀试点。
  notYet:
    - "胚系遗传病基因板（不同的变异分类框架和买家人群；在肿瘤审签语料库建立后处理）"
    - "伴随诊断检测设计工作流（监管路径更复杂；在生产肿瘤部署提供报销和验证证据后开放）"
    - "病原体和生物监测工作流（国家实验室和公共部门销售周期长且专业化；在肿瘤审签护城河建立后留待第 2 年+）"
    - "构建或与基础生物模型竞争（Radical Numerics 及同类公司是潜在 API 合作伙伴，而非竞争目标）"

market:
  tam: "估算 $200M（约 800 个美国/欧盟实体瘤 DNA+RNA 检测项目，每年约 $250K 解读工作流预算；约为 DataM Intelligence 2026–2033 报告中 $40.3 亿肿瘤分子诊断市场的 5%）"
  sam: "估算 $62.5M（约 250 个拥有活跃实体瘤 DNA+RNA 扩展和复杂审签需求的大型美国/欧盟参考实验室或诊断公司项目，每年约 $250K 预算）"
  som: "估算 $600 万（36 个月内 20 个共创客户和规模化账户，每年约 $300K 支出，基于 research.yaml SOM 规模估算）"
  segments:
    - "拥有 5–20 名变异科学家、正在启动或升级实体瘤 DNA+RNA 检测方案的风险投资支持肿瘤诊断公司"
    - "拥有高通量 NGS 项目和每周非编码整理积压的前 10 名分子参考实验室"
  buyingProcess: >-
    经济买家是 VP 研发、首席医学官或肿瘤诊断 GM；技术支持者是变异科学负责人或临床生物信息
    学负责人。预算审批通常附在检测升级项目、CLIA/CAP 检查周期或积压缓解计划上——而非独立
    的 AI 预算条目——企业销售周期为 3–9 个月，生产承诺前需完成影子模式试点。

product:
  mvp: >-
    一个安全的 Web 工作台，从一个实体瘤 DNA+RNA 检测方案摄入 VCF 和 RNA 证据，按证据强度
    排序难判非编码和调控变异，标记 DNA/RNA 矛盾，建议确认检测，并导出包含审查员审签日志的
    结构化审查数据包——从第一天起以影子模式与现有工作流并行运行。
  sixMonth: "可配置的质控规则引擎、前两大肿瘤栈的 LIMS 导出连接器、符合 AMP/ASCO/CAP 的结构化报告输出，以及面向试点账户的回顾性一致性仪表板。"
  twelveMonth: "双向 LIMS 集成、同一账户内多检测项目支持、浮现反复边界案例的检测智能层，以及用于 CLIA/CAP 检查准备的首个审计就绪验证文件夹生成。"
  twentyFourMonth: "具有网络效应的多账户匿名边界案例语料库、来自外部工具（RegTools、SpliceAI）的 RNA 剪接证据融合、生物模型输出 API 摄入（如 Radical Numerics Omnii），以及生物监测模块测试版。"
  keyBets:
    - "矛盾处理和确认计划逻辑是核心产品差异化——在推理层的投入应远超报告模板。"
    - "影子模式是建立信任的机制：绝不要求实验室替换人工审签；定位为具有完整溯源的决策支持。"
    - "从第一天起与共创客户签订数据共享协议是战略资产；结果语料库只有在从一开始就合同性地捕获案例级结果时才能复利增长。"

gtm:
  wedge: >-
    在检测升级或非编码范围扩展期间，与 3–5 家肿瘤诊断公司开展创始人主导的共创客户合作，
    结构化为绑定特定积压问题和预设回顾性一致性阈值的付费影子模式试点。
  channels:
    - "创始人主导的直接销售，面向目标诊断公司和参考实验室的变异科学负责人和医学主任"
    - "来自创始人和顾问委员会成员的科学顾问和病理网络引荐"
    - "在 AMP/CAP/ACMG 圈子中符合标准的教育内容，进入质量改进和检查准备对话"
    - "与已协助实验室建立或扩展内部项目的 NGS 工作流和生物信息学合作伙伴联合销售"
  funnelTargets: "外展到合格试点转化率 10–15%（诊断领域验证门槛高）；影子模式一致性阈值达标后试点转生产率 50%+；通过额外检测项目实现账户扩展，目标 NRR 120%+。"
  pricing: >-
    按活跃检测项目计费的年度订阅（$200–350K/年，以变异科学家时间节省和检查准备价值为锚），
    加上一次性实施和数据集成费（$25–50K）。监管提交文件包、审计文件夹生成和验证研究设计的
    高级模块单独定价。框定为验证和合规加速，以与现有预算条目对齐，而非可自由支配的 AI 支出。

businessModel:
  revenueStreams:
    - "按活跃检测项目或实验室账户计费的年度 SaaS 订阅"
    - "一次性实施和数据集成费"
    - "验证研究、监管提交和审计文件夹生成的高级模块"
  unitOfValue: "审查中的活跃检测项目（每年处理和审签的难判非编码变异案例数量）"
  targetGrossMarginPct: 72
  expansionLevers:
    - "从同一账户内的一个肿瘤检测扩展到更多实体瘤项目"
    - "肿瘤语料库建立后，从肿瘤扩展到遗传病、伴随诊断和感染性疾病基因板"
    - "第 2 年+面向国家实验室和公共部门账户的生物监测和病原体筛查模块"
    - "向检测制造商和研究联盟授权的匿名结果语料库数据产品"

strategyMap:
  northStarMetric: "每月所有生产账户审签的难判非编码变异案例数"
  inputMetrics:
    - "从变异标记到审计就绪审签的中位时间（目标：低于当前人工基准的 50%）"
    - "难判案例上与回顾性人工决策的影子模式一致性率（目标：大于 90%）"
    - "试点转生产转化率（目标：50%+）"
    - "每账户活跃检测项目数（扩展代理指标）"
    - "净收入留存率（目标：120%+）"
  moatsToBuild:
    - "跨多个实验室，链接 DNA/RNA 证据、确认结果和审查员行为的已解决非编码边界案例专有闭环语料库"
    - "成本高昂、难以事后加装的生物安全级溯源和模型版本可追溯性架构"
    - "与共创客户共同开发的检测特定质控规则库和审查模板"
    - "与主流肿瘤 LIMS 和报告栈的深度集成，形成切换成本"
  killCriteria:
    - "产品上线 12 个月内签署的共创客户试点少于 3 个"
    - "调优 6 个月后在回顾性难判案例队列上的影子模式一致性低于 85%"
    - "前 5 个完成试点的试点转生产转化率低于 30%"
    - "主要现有厂商在公司成立 18 个月内推出具有矛盾处理功能的专用罕见非编码裁定模块，且在结果语料库形成切换成本之前"
  mermaid: |
    flowchart LR
      Wedge[Assay-upgrade design partner] --> Shadow[Shadow-mode pilot]
      Shadow --> Concordance[Retrospective concordance evidence]
      Concordance --> Production[Production sign-out deployment]
      Production --> Expansion[Multi-assay account expansion]
      Expansion --> Corpus[Outcomes corpus moat]
      Corpus --> NewLogo[New-logo conviction and co-sell]
      NewLogo --> Expansion

investorMemo:
  verdict:
    call: "值得深入调研"
    conviction: "切口可信、采购钩子自然、数据护城河潜力真实，取决于确认滩头账户每周非编码案例量足以支撑专用工具的投入。"
    whyBelieve: "罕见非编码裁定闭环真正缺乏工具，购买触发因素对应反复发生的检测升级预算事件，而闭环结果语料库构建出目前没有任何现有厂商正在建立的持久护城河。"
    whyDoubt: "如果中位账户每周需要多人审查的难判非编码判断少于 5 个，在没有更宽泛解读平台故事的情况下，单案例 ROI 可能无法支撑六位数订阅。"
    nextDiligence: "在 3 个目标实体瘤 DNA+RNA 实验室进行影子模式积压审计，确认每周难判变异量、当前审签时间，以及审查员决策与模型辅助建议在回顾性案例上的一致性是否达到 85%+。"
  firstCustomer:
    title: "Series B+ 肿瘤诊断公司的变异科学负责人"
    profile: "一家拥有 50–200 人的美国诊断公司，拥有活跃的实体瘤 DNA+RNA 检测方案、5–20 名变异科学家，以及每周积压的罕见非编码判断延迟报告发布。"
    trigger: "推出新的非编码或 RNA 感知检测版本、准备 CAP 或 CLIA 检查，或面临变异科学家招聘压力，使人工整理在当前检测范围下难以为继。"
    buyer: "VP 研发或首席医学官"
    initialContract: "$25–50K 影子模式试点，在达到一致性阈值后转换为 $200–300K 年度订阅，另加实施费。"
  mustBeTrue:
    - "中位滩头账户每周至少有 5–10 个难判非编码或剪接判断需要在报告发布前进行多人审查。"
    - "如果对其自身历史案例的回顾性一致性研究满足预设的 90%+ 阈值，医学主任将在 6–9 个月内批准影子模式试点。"
    - "在公司成立 18 个月内，没有主要现有厂商推出具有矛盾处理和确认计划逻辑的专用罕见非编码裁定模块。"
    - "5+ 个共创客户的结果语料库提供了可量化的审查质量优势——更快审签或更少重审——可在前瞻性研究中展示。"
    - "公司能在 6 个月内招募到 2–3 名创始工程师和 1–2 名临床生物信息学专家，能够构建试点质量的证据排序和矛盾引擎。"
  diligenceQuestions:
    - "每个目标实验室目前每周将多少难判非编码或剪接判断升级到多人审查，其中有多少需要回顾性委员会讨论？"
    - "医学主任和 VP 研发要求什么样的一致性和节省时间阈值，才愿意从影子模式转为生产审签责任？"
    - "哪些 LIMS、二级分析和报告生成栈在前 20 个目标账户中占主导地位，集成阻力最高在哪里？"
    - "创始团队是否与 3+ 家目标诊断实验室有直接的既有关系，愿意在 6 个月内成为付费共创客户？"
    - "Velsera 和 QIAGEN 目前如何为这些账户的罕见非编码案例提供服务，他们具体留下了哪些工作流缺口？"
    - "目标账户中此工作流的年度软件预算在软件、验证还是合规准备条目中，典型审批流程是什么？"

operatingAssumptions:
  - assumption: "中位共创客户账户每周有 5–10+ 个难判非编码或剪接判断需要多人审查。"
    basis: research.yaml
    validationTest: "前 90 天内对 3 个目标实体瘤 DNA+RNA 检测项目进行影子模式积压审计，按变异类别和检测发布周期分类。"
    decisionImpact: "如果每周少于 5 个判断，单案例吞吐量 ROI 框定转向检查准备和检测变更管理；试点结构和定价底线相应调整。"
  - assumption: "当框定为验证或合规加速时，每检测项目 $200–350K 年度订阅在付费意愿范围内。"
    basis: research.yaml
    validationTest: "在 3–5 次初始试点对话中与 VP 研发和首席医学官负责人进行预算访谈，直接询问软件、验证和合规预算条目规模。"
    decisionImpact: "如果每项目付费意愿低于 $100K，商业模式必须转向按案例定价或更宽泛的平台故事，以实现可行的单位经济模型。"
  - assumption: "影子模式试点能在一个检测项目的 6 个月内在难判案例上达到大于 90% 的回顾性一致性。"
    basis: "创始人经验判断"
    validationTest: "在来自共创客户的 200+ 个难判案例的归档人工决策上，将模型辅助排序解读与回顾性一致性研究进行比较。"
    decisionImpact: "如果一致性上限低于 85%，生产审签采用停滞，产品必须重新框定为证据检索增强而非审签操作系统，这改变了竞争定位和定价。"
  - assumption: "LIMS 和报告集成可以通过导出优先连接器在前 6 个月内交付，无需自定义双向 API 工作。"
    basis: research.yaml
    validationTest: "前 60 天内与 3 个共创客户账户进行集成范围确认，确认结构化导出到其 LIMS 覆盖最低可行交接。"
    decisionImpact: "如果所有目标账户在实现任何试点价值之前都需要双向 API 集成，工程能力必须提前分配，价值实现时间延长 3–6 个月，在首次收入前增加消耗。"
  - assumption: "创始人能在前 9 个月内利用现有病理和变异科学网络签署 3–5 个共创客户协议。"
    basis: "创始人经验判断"
    validationTest: "产品上线 6 个月内与至少 2 个账户签署意向书或付费试点协议。"
    decisionImpact: "如果前 3 个试点的销售周期超过 12 个月，现金跑道要求大幅增加，融资规模必须提高，或将滩头市场缩窄至已有在进行中检测升级项目的账户。"

experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "3 个目标实验室的积压审计"
    hypothesis: "中位实体瘤 DNA+RNA 项目每周有 5–10+ 个难判非编码判断需要多人审查，验证单案例 ROI 框定。"
    successMetric: "3 个实验室确认每周 5+ 个难判非编码判断，并提供 200+ 个历史案例用于一致性研究。"
    owner: "CEO"
  - horizon: "0–90 天"
    experiment: "归档案例的回顾性一致性研究"
    hypothesis: "模型辅助排序解读在一个共创客户检测项目的难判非编码案例上与归档人工决策达到 85%+ 的一致性。"
    successMetric: "200+ 个回顾性案例上 85%+ 的一致性；结果记录在可供医学主任审查的可共享验证摘要中。"
    owner: "CTO / 临床生物信息学负责人"
  - horizon: "0–90 天"
    experiment: "付费意愿访谈系列"
    hypothesis: "目标账户的 VP 研发和首席医学官负责人在购买被框定为验证或检查准备支出时，将每年为每个检测项目分配 $150–350K。"
    successMetric: "5+ 次访谈确认相关预算条目和 $150–350K 范围内的口头价格接受。"
    owner: "CEO"
  - horizon: "90–180 天"
    experiment: "与第一个共创客户的影子模式试点"
    hypothesis: "将审签操作系统与人工审查并行运行，将难判非编码判断的中位审签时间减少 30%+，且不增加重审或升级率。"
    successMetric: "难判案例中位审签时间减少 30%+；重审率不增加；试点发起人签署生产意向书。"
    owner: "CEO 和 CTO"
  - horizon: "90–180 天"
    experiment: "LIMS 导出连接器原型"
    hypothesis: "向两种最常见肿瘤 LIMS 栈的结构化 VCF 加审查数据包导出，覆盖影子模式试点最低可行交接，无需自定义 API 工作。"
    successMetric: "2 个共创客户接受导出连接器作为试点启动的充分条件；范围确认中未发现集成阻力。"
    owner: "CTO"
  - horizon: "180–365 天"
    experiment: "检查准备模块测试版"
    hypothesis: "从累积的审签数据包生成审计文件夹，将组装 CAP 或 CLIA 审计包的时间比人工组装减少 50%+。"
    successMetric: "2 个账户在真实审计或模拟检查中使用文件夹，确认时间减少 50%+；在续约或扩展讨论中被引用。"
    owner: "产品负责人"
  - horizon: "180–365 天"
    experiment: "第二和第三个共创客户入驻"
    hypothesis: "使用为第一个账户构建的连接器库，在验证的影子模式工作流上入驻第二和第三个账户每个不超过 60 天。"
    successMetric: "产品上线 12 个月内 2 个额外账户进入影子模式；组合管道有 5+ 个处于不同阶段的账户。"
    owner: "CEO"

operations:
  - "从第一天起部署具有 HIPAA BAA 和 SOC 2 Type II 路线图的安全多租户云，以满足临床实验室数据要求。"
  - "支持来自前 2–3 个肿瘤栈的 VCF、BAM/CRAM 区域导出、RNA-seq 连接文件和结构化 LIMS 导出的证据摄入流程。"
  - "模型无关的生物模型 API 层，使 Radical Numerics Omnii 或同类工具的输出可以在无平台锁定的情况下摄入。"
  - "链接模型建议、审查员编辑、确认步骤日志、最终审签和上市后每个已解决案例纠正的结果图数据库。"
  - "针对 CLIA、CAP、AMP 和 FDA LDT 对齐的质控和监管顾问流程，由医学主任顾问和监管顾问从第 6 个月起提供支持。"

team:
  - role: "CEO / 商业负责人（具备变异科学或临床生物信息学背景，拥有诊断行业关系网络）"
    startTiming: "第 0 个月"
    rationale: "共创客户销售和创始人主导试点需要与医学主任和变异科学负责人的直接信誉；该角色拥有前 3–5 个客户关系。"
  - role: "CTO / 生物信息学工程负责人（机器学习与生物信息学背景）"
    startTiming: "第 0 个月"
    rationale: "证据排序和矛盾引擎是核心技术赌注；需要创始工程师在 6 个月内构建试点质量产品。"
  - role: "高级临床生物信息学科学家"
    startTiming: "第 2 个月"
    rationale: "回顾性一致性研究、质控规则逻辑和 LIMS 集成范围确认需要在试点阶段无法外包的领域专业知识。"
  - role: "全栈产品工程师"
    startTiming: "第 3 个月"
    rationale: "一旦核心证据排序原型可用，前端工作台、审查数据包生成和导出连接器需要专属工程师。"
  - role: "法规与合规顾问（兼职）"
    startTiming: "第 6 个月"
    rationale: "首次生产审签部署前需要 CLIA、CAP 和 FDA LDT 对齐指导；pre-seed 阶段兼职参与已足够。"

milestones:
  - horizon: "0–12 个月"
    items:
      - "与实体瘤 DNA+RNA 检测项目签署 3–5 个共创客户意向书或付费影子模式试点"
      - "在 2+ 个共创客户完成回顾性一致性研究，在难判非编码案例上显示 85%+ 的一致性"
      - "1–2 个账户的影子模式试点上线，展示难判变异审签时间减少 30%+"
      - "前 2 大肿瘤栈的 LIMS 导出连接器正常运行"
      - "SOC 2 Type II 审计启动，所有试点账户签署 HIPAA BAA"
      - "4–5 人创始团队到位（CEO、CTO、2 名工程师、1 名临床生物信息学科学家）"
  - horizon: "12–24 个月"
    items:
      - "1–2 个账户进入完整生产审签模式，首次年度续约达 $200K+ ARR 每账户"
      - "来自 5+ 个付费生产和影子模式账户的总 ARR 达 $1.5M+"
      - "至少 2 个账户内实现多检测扩展，第二个检测项目签约"
      - "检查准备模块推出，在至少 1 个真实 CAP 或 CLIA 审计包中使用"
      - "结果语料库达 2,000+ 个已解决难判变异案例，覆盖 3+ 个账户"
      - "SOC 2 Type II 认证完成"
  - horizon: "24–36 个月"
    items:
      - "来自 15+ 个账户的总 ARR 达 $500 万+，NRR 达 115%+"
      - "生物监测和病原体筛查模块与 1–2 个国家实验室或公共部门账户进入付费测试版"
      - "生物模型 API 集成上线，实现 Radical Numerics Omnii 或同类工具输出的直接摄入"
      - "首个遗传病或伴随诊断模块进入共创客户阶段"
      - "匿名结果语料库作为授权数据产品向检测制造商或研究联盟提供"

risks:
  - risk: "滩头账户每周非编码积压量低于预期，削弱单案例吞吐量 ROI。"
    likelihood: Medium
    impact: High
    mitigation: "在试点定价确定前通过前 90 天内的影子模式审计验证积压量；如果量少，将 ROI 框定转向检查准备和检测变更管理，相应调整试点结构和定价底线。"
  - risk: "回顾性一致性上限低于 90%，阻止医学主任对生产审签的信任。"
    likelihood: Medium
    impact: High
    mitigation: "以硬影子模式启动，人工保留最终决策权，提供透明证据包；在试点合同中设定一致性阈值，使失败有边界且预期已预先约定。"
  - risk: "LIMS 和报告集成阻力拖延试点，因为分散的栈每个账户都需要自定义工作。"
    likelihood: High
    impact: Medium
    mitigation: "在深化双向集成之前，优先提供导出优先连接器和结构化报告输出；在前 60 天内确定集成要求范围，仅为已确认试点承诺的账户构建连接器。"
  - risk: "Velsera 或 QIAGEN 在 18 个月内将其平台扩展到覆盖矛盾处理的罕见非编码裁定。"
    likelihood: Low
    impact: High
    mitigation: "以足够快的速度构建结果语料库和检测特定质控规则库，使数据护城河在现有厂商追赶前形成切换成本；以多组学矛盾处理和本地结果学习而非工作流广度作为差异化。"
  - risk: "FDA LDT 监管或 CAP 检查要求为生产审签使用创造部署障碍。"
    likelihood: Medium
    impact: High
    mitigation: "从第一天起定位为具有记录人工审签、完整审计日志和模型版本可追溯性的决策支持工具；第 6 个月起聘请监管顾问追踪 LDT 指南演变，并主动使产品与 CLIA/CAP 文档规范对齐。"
  - risk: "由于诊断销售周期长，创始团队无法在 9 个月内签署 3+ 个共创客户。"
    likelihood: Medium
    impact: High
    mitigation: "优先考虑已有进行中检测升级或检查准备项目的账户；使用温热的病理网络和科学顾问引荐而非冷外展来压缩销售周期。"

fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: "18 个月现金跑道为创始团队（CEO、CTO、2 名工程师、1 名临床生物信息学科学家）、3–5 个影子模式共创客户试点、回顾性一致性研究、LIMS 连接器开发、SOC 2 Type II 启动和监管顾问提供资金——足以达到 $1M+ ARR 和 2+ 个账户的生产部署，这是种子轮所需的证据基础。"
