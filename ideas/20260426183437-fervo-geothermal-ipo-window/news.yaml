signals:
- title: Public markets are reopening for enhanced geothermal
  summary: TechCrunch says Fervo has filed an S-1 and that investors are again willing to fund energy startups that can show
    utility-scale execution.
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
  - 5
- title: Data centers are the near-term demand pull
  summary: DOE and Fervo both frame geothermal as a fit for always-on data-center load and cooling, which gives the category
    a buyer with urgent pain.
  sourceRefs:
  - 2
  - 6
  - 7
  - 8
  - 9
  - 10
  - 16
- title: Exploration data is becoming a product layer
  summary: DOE’s data, play-fairway, GeoFlight, and regional partnership pages show that resource mapping and permitting data
    are becoming core infrastructure.
  sourceRefs:
  - 7
  - 18
  - 19
  - 20
  - 21
- title: Drilling and well design remain the main bottlenecks
  summary: DOE says drilling drives most project cost, and Fervo’s technology page shows why horizontal drilling, sensing,
    and reservoir analytics matter economically.
  sourceRefs:
  - 4
  - 13
  - 15
  - 17
  - 18
  - 24
- title: Geothermal is widening into heat, storage, and lithium
  summary: Heating/cooling, low-temperature systems, heat pumps, RTES, and lithium extraction suggest the category has multiple
    monetization paths beyond electricity.
  sourceRefs:
  - 10
  - 11
  - 12
  - 23
  - 24
  - 25
- title: Public-sector pilots are de-risking commercialization
  summary: DOE pilot demonstrations, federal partnerships, and utility-facing market reports show a path from lab proof to
    repeatable project finance.
  sourceRefs:
  - 14
  - 20
  - 22
  - 25
