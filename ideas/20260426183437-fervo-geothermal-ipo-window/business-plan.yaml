slug: geothermal-well-design-os
date: '2026-04-26'
executiveSummary: >-
  This company should start as the planning and underwriting system for North
  American enhanced geothermal developers approaching appraisal or first
  commercial-pad decisions. The pain is acute because drilling can exceed half
  of project cost, while buyers still stitch together DOE datasets, oil-and-gas
  tools, consultants, and spreadsheets to decide where to drill and how to
  defend that choice to internal investment committees and external financiers.
  The proposed wedge is narrow enough to sell into a real trigger event: a new
  field-development decision, pilot expansion, or project-finance process tied
  to utility or data-center offtake. Near-term market size is modest, with
  researched North American SAM around $8.0M and year-3 reachable SOM around
  $1.8M, so the company should be built for lighthouse-account penetration and
  data moat creation rather than a broad horizontal SaaS story. The product
  should first win on workflow compression, audit trail, and lender-ready
  outputs instead of claiming superior predictive accuracy before enough
  proprietary post-drill data exists. If customers share plan-vs-actual
  telemetry, the company can compound into benchmarking, contractor comparison,
  and underwriting infrastructure across pads and basins. If they do not, the
  business risks becoming a services-heavy planning tool with limited
  defensibility. Direct willingness-to-pay data is still sparse, so pricing and
  data-rights assumptions must be validated in the first 90 days.
problem:
  - Buyers face high-cost drilling decisions with fragmented geothermal, permitting, and offset-well data.
  - Current workflows rely on consultants, generic petrotechnical tools, and spreadsheets that are slow to update and hard to defend in financing.
solution:
  - Build a geothermal-specific planning workspace that ingests public and customer data to rank targets, design candidate wells, and surface basin-specific constraints.
  - Export auditable drilling packages and lender-ready technical memos, then ingest plan-vs-actual drilling and production data to improve the next pad.
whyWeWin:
  - The company focuses on first commercial-pad bankability, where generic oil-and-gas suites and consultants are weakest.
  - DOE data infrastructure and customer telemetry can compound into a proprietary benchmark layer spanning design choices, contractor performance, and basin outcomes.
strategicChoices:
  beachhead: Western U.S. venture-backed or project-backed EGS developers planning their first multi-well commercial pad outside legacy hydrothermal fields.
  wedgeRationale: The first-pad workflow has a clear user, a board-visible capital decision, and an artifact the product can replace quickly; broader geothermal software categories would dilute proof and slow sales.
  sequencingRationale: Start with workflow software that compresses target ranking and memo creation, use paid implementations to integrate incumbent tools and secure data rights, then add plan-vs-actual benchmarking once real wells are flowing.
  notYet:
    - International expansion before the product is proven in western U.S. permitting and geology.
    - Plant O&M, dispatch optimization, or grid-trading software.
    - A broad contractor marketplace before benchmark data is credible.
market:
  tam: $36.0M
  sam: $8.0M
  som: $1.8M
  segments:
    - North American enhanced geothermal developers approaching appraisal or first commercial-pad design.
    - Drilling contractors, infrastructure investors, and lenders participating in those same projects.
  buyingProcess: >-
    Sales should begin with the subsurface lead or VP Drilling, but close only
    when the CTO or Chief Development Officer agrees the workflow will improve a
    live appraisal or financing process. Procurement will require technical
    validation, interoperability with incumbent tools, and agreement on data
    rights for benchmarking.
product:
  mvp: >-
    Version one should cover prospect intake, DOE and customer data
    normalization, risk-ranked target screening, candidate well-trajectory
    planning, permitting overlays, collaboration history, and export of a
    finance-ready drilling memo. It should not promise autonomous well design;
    it should make expert judgment faster, traceable, and easier to defend.
  sixMonth: Import DOE and customer datasets for one basin, support Petrel and DecisionSpace imports and exports, generate lender-ready memo templates, and complete two paid field-program pilots.
  twelveMonth: Add plan-vs-actual ingestion for drilling and early production data, contractor and cost benchmark views, and basin-specific permitting and seismicity checklists for western U.S. projects.
  twentyFourMonth: Expand into multi-basin benchmarking, reusable underwriting packages, and contractor-performance comparisons that support renewals and cross-project expansion.
  keyBets:
    - Customers will buy workflow compression and financing readiness before they require statistically strong predictive models.
    - Interoperability with incumbent oilfield tools is enough to enter the stack without rip-and-replace behavior.
    - Post-drill telemetry rights can be negotiated through pilots and renewals.
gtm:
  wedge: Sell a geothermal field-planning and lender-memo workflow for imminent appraisal or first commercial-pad decisions.
  channels:
    - Founder-led direct sales to western U.S. EGS developers.
    - Referral and implementation partnerships with geothermal consultants and drilling contractors already inside field-planning work.
    - Credibility-driven introductions through DOE pilot networks and project-finance advisors.
  funnelTargets: Outbound or referral intro to qualified discovery 30%+, qualified discovery to paid pilot 25%+, paid pilot to annual production contract 60%+, first field renewal 80%+.
  pricing: Paid pilot or implementation fee of $75k-$150k for one field program, converting to a $300k-$450k annual subscription per active field plus premium monitored-well analytics; price against avoided consultant spend and shorter diligence cycles.
businessModel:
  revenueStreams:
    - Annual subscription per active field program.
    - Implementation and data-onboarding fees.
    - Premium benchmarking and monitored-well analytics modules.
  unitOfValue: Active field-development program under planning or early drilling.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add benchmarking and underwriting modules after the first production deployment.
    - Expand from developer teams into lenders, insurers, and drilling partners working on the same project.
    - Reuse basin-specific data models across additional North American geothermal programs.
strategyMap:
  northStarMetric: Active commercial-pad or appraisal field programs under annual contract.
  inputMetrics:
    - Qualified opportunities tied to a live field-development or financing event.
    - Paid pilots launched per half-year.
    - Pilot to annual conversion rate.
    - Percentage of pilots granting reusable anonymized data rights.
    - Memo generation time reduced versus incumbent workflow.
  moatsToBuild:
    - Proprietary plan-versus-actual well and production benchmark dataset.
    - Archive of lender-ready geothermal memos and underwriting checklists.
    - Basin-specific permitting and seismicity workflow templates embedded in customer process.
  killCriteria:
    - Fewer than 3 paid pilots signed after 12 months of founder-led sales.
    - Less than 50% of pilot customers grant usable anonymized benchmarking rights.
    - Pilot to annual conversion below 40% after the first 4 pilots.
    - No measurable reduction of at least 30% in memo-preparation cycle time versus status quo.
  mermaid: |
    flowchart LR
      Wedge[First commercial-pad planning workflow] --> MVP[Target ranking plus lender memo MVP]
      MVP --> Proof[Paid pilots and shorter diligence cycles]
      Proof --> Expansion[Benchmarking, underwriting, and contractor comparison]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong pain and credible timing, but the buyer universe and data-rights moat are not yet proven enough for a partner meeting.
    whyBelieve: Drilling economics, DOE data availability, and Fervo-led financing momentum create a real opening for software that standardizes first-pad planning and underwriting.
    whyDoubt: The initial market is measured in dozens of programs, and incumbents or consultants can absorb the job if the startup fails to secure proprietary post-drill data.
    nextDiligence: Validate willingness to pay, data-rights terms, and pilot conversion with 10 buyer conversations and at least 2 paid design-partner commitments.
  firstCustomer:
    title: Western U.S. EGS developer entering first commercial-pad design.
    profile: Venture-backed or project-backed developer with pilot-well data, an upcoming appraisal or financing gate, and a utility or hyperscaler-linked offtake path.
    trigger: A field-development investment decision, DOE-supported pilot expansion, or lender diligence process for the first multi-well commercial pad.
    buyer: CTO or Chief Development Officer
    initialContract: $75k-$150k pilot or implementation tied to one field program, with conversion to $300k-$450k annual subscription once the workflow is used in production planning.
  mustBeTrue:
    - At least 10 North American geothermal programs will face first commercial-pad or comparable appraisal decisions within 24 months.
    - Buyers will pay at least $300k annualized for software that shortens planning and underwriting cycles without replacing incumbent interpretation tools.
    - At least half of early customers will grant anonymized rights to use plan-vs-actual well data in benchmarks.
    - Lenders, utilities, or internal investment committees will accept a standardized memo workflow as materially better than bespoke consultant packages.
    - Halliburton, SLB, and consultant-led substitutes will not close the geothermal-specific workflow gap fast enough to block the first 5 lighthouse accounts.
  diligenceQuestions:
    - Which geothermal developers have live first-pad decisions in the next 12 to 24 months?
    - What do those teams currently spend on consultants, internal labor, and incumbent software per field program?
    - What exact data rights can be secured in pilot contracts, and under what anonymization terms?
    - Which financing artifacts do lenders or infrastructure advisors already require for geothermal projects?
    - How hard is Petrel and DecisionSpace interoperability in a customer implementation?
  riskHeatmap:
    - risk: Near-term buyer universe is too small for efficient venture-scale growth.
      likelihood: High
      impact: High
      leadingIndicator: Fewer than 10 credible North American first-pad or appraisal programs are identified for the next 24 months.
      mitigation: Win lighthouse developer accounts first, then expand into adjacent buyer seats such as lenders, insurers, and drillers on the same projects.
    - risk: Customers refuse post-drill data sharing, preventing a benchmark moat.
      likelihood: High
      impact: High
      leadingIndicator: Pilot redlines remove anonymized benchmark rights or limit data access to static exports only.
      mitigation: Make data-rights terms part of initial pilot pricing and offer clear anonymization, benchmark reciprocity, and customer-controlled permissions.
    - risk: Incumbent oilfield suites or consultants bundle geothermal templates before the startup establishes proof.
      likelihood: Medium
      impact: High
      leadingIndicator: Buyers report new geothermal-specific DecisionSpace, Petrel, or consultant workflows as sufficient substitutes in active deals.
      mitigation: Differentiate on geothermal-specific lender outputs, speed to deployment, and cross-project benchmark data rather than raw modeling breadth.
    - risk: Permitting or induced-seismicity delays push projects out and defer software budgets.
      likelihood: Medium
      impact: Medium
      leadingIndicator: Qualified opportunities slip more than 2 quarters due to basin-specific regulatory issues.
      mitigation: Focus pipeline on projects already tied to financing or appraisal milestones and encode permitting and seismicity workflows into the product.
operatingAssumptions:
  - assumption: Buyers will fund a paid pilot before the product has broad predictive benchmarking.
    basis: research.yaml
    validationTest: Close 2 paid pilots within 90 days using a memo-generation and workflow-compression value proposition rather than model-accuracy claims.
    decisionImpact: If false, narrow the offer to consulting-enabled software or reduce product scope before adding full platform engineering.
  - assumption: A credible annual contract can land in the $300k-$450k range per active field program.
    basis: idea.yaml
    validationTest: Collect 5 budget benchmarks from active developers and secure at least 3 verbal pricing confirmations above $250k annualized.
    decisionImpact: If false, the company must either expand services revenue, lower burn, or target adjacent buyer budgets sooner.
  - assumption: Post-drill telemetry and production data rights can be negotiated from early customers.
    basis: research.yaml
    validationTest: Get signed pilot language from at least 2 customers granting anonymized benchmark use of plan, drilling, and early production data.
    decisionImpact: If false, defensibility weakens and the roadmap should prioritize workflow utility over data-network effects.
  - assumption: Interoperability with Petrel and DecisionSpace is sufficient to avoid rip-and-replace resistance.
    basis: research.yaml
    validationTest: Complete 2 imports and 2 exports using real customer data without manual rework exceeding one day per project.
    decisionImpact: If false, implementation cost rises and the company may need deeper services capacity or a different product wedge.
  - assumption: The western U.S. first-pad beachhead is large enough to generate 5 lighthouse accounts.
    basis: operator judgment
    validationTest: Build an account map of at least 12 target programs with named buyers, trigger dates, and current workflow alternatives.
    decisionImpact: If false, the company should expand sooner into adjacent geothermal segments or broader subsurface bankability workflows.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Build an account map and run 10 structured buyer interviews with western U.S. EGS developers and finance stakeholders.
    hypothesis: A live appraisal or financing event creates enough urgency to fund a pilot around planning and memo generation.
    successMetric: 6 of 10 buyers confirm a live trigger in the next 12 months and 2 agree to paid pilot proposals.
    owner: CEO
  - horizon: 0–90 days
    experiment: Prototype lender-ready drilling memo export from one public-plus-customer dataset workflow.
    hypothesis: Memo generation is the fastest path to proving value without claiming full predictive superiority.
    successMetric: Pilot users rate the output good enough to replace at least one consultant or internal memo cycle.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Deliver 2 paid pilots in one western U.S. basin with Petrel or DecisionSpace interoperability.
    hypothesis: Buyers will adopt the product if it fits into existing subsurface workflows instead of requiring replacement.
    successMetric: Two pilots completed with less than 2 weeks of implementation time and one annual conversion.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Negotiate anonymized data-rights clauses into all pilot contracts.
    hypothesis: Customers will trade benchmark data rights for discounted pilot pricing and comparative analytics.
    successMetric: At least 50% of signed pilots include reusable anonymized data rights for plan-versus-actual benchmarking.
    owner: CEO
  - horizon: 180–360 days
    experiment: Launch contractor and cost benchmark view using plan-versus-actual data from pilots and public sources.
    hypothesis: Benchmarking creates renewal and expansion leverage beyond the initial memo workflow.
    successMetric: Two customers use benchmark views in a renewal or second-field expansion decision.
    owner: Product lead
  - horizon: 180–360 days
    experiment: Formalize 2 channel partnerships with geothermal consultants or drilling contractors.
    hypothesis: Partners already inside technical workflows can lower customer acquisition cost and improve implementation speed.
    successMetric: Two sourced opportunities from partners and one closed paid pilot from the channel.
    owner: CEO
operations:
  - Maintain a governed geothermal data pipeline that separates public inputs, customer-confidential layers, and anonymized benchmark outputs.
  - Standardize pilot delivery around one basin template, one memo template, and a defined weekly implementation cadence.
  - Use contract language that defines data rights, benchmark usage, and model-liability limits before any custom work begins.
  - Build a partner operating model for consultants and drillers that rewards sourced pilots without turning the company into a reseller-dependent services firm.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Own the data pipeline, workflow application, and incumbent-tool interoperability needed for the first pilots.
  - role: Geothermal domain lead
    startTiming: Month 0
    rationale: Translate subsurface and drilling workflows into credible product logic and help close technical buyers.
  - role: CEO
    startTiming: Month 0
    rationale: Run founder-led enterprise sales, pricing validation, partnerships, and pilot contract negotiation around data rights.
  - role: Product and implementation lead
    startTiming: Month 6
    rationale: Turn custom pilot work into repeatable onboarding, basin templates, and renewal-ready benchmark workflows.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2 paid pilot customers in the western U.S.
      - Ship basin-specific MVP with memo export and incumbent-tool interoperability.
      - Convert at least 1 pilot into an annual production contract.
      - Secure anonymized data rights from at least 1 customer.
  - horizon: 12–24 months
    items:
      - Reach 5 active field programs under contract.
      - Launch plan-versus-actual benchmark views and contractor comparison module.
      - Establish 2 repeatable referral or implementation partnerships.
      - Prove renewal on the first annual customer contract.
  - horizon: 24–36 months
    items:
      - Expand into multiple western U.S. basins and adjacent finance-side users.
      - Build a reusable underwriting dataset spanning at least 10 field programs.
      - Demonstrate benchmark-driven expansion revenue beyond the initial planning seat.
risks:
  - risk: Near-term buyer universe is too small for efficient venture-scale growth.
    likelihood: High
    impact: High
    mitigation: Concentrate on imminent first-pad events, then expand into lenders, insurers, and drilling partners attached to the same workflows.
  - risk: Customers refuse post-drill data sharing, preventing a benchmark moat.
    likelihood: High
    impact: High
    mitigation: Tie discounts and premium analytics to anonymized data-rights clauses from the first contract.
  - risk: Incumbent oilfield suites or consultants bundle geothermal templates before the startup establishes proof.
    likelihood: Medium
    impact: High
    mitigation: Win on geothermal-specific underwriting outputs, deployment speed, and compounding benchmark data rather than broad modeling coverage.
  - risk: Permitting or induced-seismicity delays push projects out and defer software budgets.
    likelihood: Medium
    impact: Medium
    mitigation: Target opportunities already entering appraisal or financing gates and encode basin-specific compliance workflows into the product.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of product build, domain hiring, founder-led sales, and pilot delivery to reach 2 paid pilots, 1 to 2 annual production contracts, and the first reusable benchmarking dataset.
