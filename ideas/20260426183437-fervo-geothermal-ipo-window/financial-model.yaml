scenarios:
  downside:
    description: Pilots slip by roughly one quarter, realized ACV lands at $360K, and gross margin stays services-heavy at 65%.
    y3RevenueK: 1350.0
    y3EbitdaK: -886.5
    cashLowPointK: -908.5
    keyAssumptionChanges:
      - ACV drops from $420K to $360K.
      - Customer ramp ends Y3 at 4 active programs instead of 6.
      - Gross margin falls from 70% to 65%.
  base:
    description: Founder-led sales close 2 paid programs in Y1, expand to 5 by Y2, and end Y3 with 6 active programs at $420K ACV and 70% gross margin.
    y3RevenueK: 2310.0
    y3EbitdaK: -147.0
    cashLowPointK: 550.0
    keyAssumptionChanges:
      - Active paid programs scale from 0 to 6 over 36 months.
      - Blended ACV holds at $420K per field program.
      - Gross margin stays at the BP target of 70%.
  upside:
    description: First paid deal closes earlier, benchmark add-ons lift ACV to $450K, and the company reaches 7 active programs by Y3 with modest margin lift.
    y3RevenueK: 2962.5
    y3EbitdaK: 369.0
    cashLowPointK: 1052.0
    keyAssumptionChanges:
      - ACV rises from $420K to $450K.
      - Customer ramp ends Y3 at 7 active programs instead of 6.
      - Gross margin improves from 70% to 72%.
