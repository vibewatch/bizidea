modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified opportunities] --> ClosedWon[Active field programs]
      ClosedWon --> Revenue[Subscription and pilot revenue]
      Revenue --> COGS[Hosting, data, onboarding]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Opex[R&D + S&M + G&A]
      Opex --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue reaches $2.31M in Y3 by landing 6 active field programs at a blended $420K ACV, which is consistent with the BP pricing band and the milestone of 5 active programs by year 2.
  - checkName: Must go right
    finding: The company must close its first 2 paid programs by month 10 and convert that proof into 5 contracted programs by month 24, because the model does not support a long no-revenue product build.
  - checkName: Model breaks if
    finding: If ACV compresses to $360K or the sales cycle stretches toward 9 months, downside cash turns negative before breakeven and the pre-seed round stops covering the first renewal milestone.
  - checkName: Next-round proof
    finding: The next financing is justified when the team has 5 active programs, one renewal, benchmark data rights, and evidence that benchmark modules can push Y3 toward the upside case.
sanityChecks:
  ruleOf40: "Y3 growth 37.5% + EBITDA margin -6.4% = 31.1%"
  burnMultiple: "Approx. 0.4x in Y2 and 0.4x in Y3 using EBITDA as a proxy for net burn divided by net new ARR."
  revenuePerFte: "$330K Y3 (benchmark $200–400K SaaS)"
  flags:
    - Base case assumes no realized logo churn through Y3 because the sample is too small to model fractional renewals cleanly; churn risk is instead handled in unit economics, sensitivity, and downside.
    - The business is still slightly EBITDA-negative in Y3, so the seed case depends more on lighthouse-account quality and renewal proof than on standalone profitability.
    - Six active programs by Y3 implies meaningful penetration of a roughly 20-program North American SAM, so missed lighthouse wins materially reduce the next-round story.
    - Cash flow is simplified to EBITDA and does not model taxes, capex, or working-capital timing, which is acceptable at pre-seed but should be upgraded before a priced seed process.
