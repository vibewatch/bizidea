    "summary": "直接定价证据仍然稀缺，但付费意愿更可能由项目经济性而不是软件对标决定：DOE 说钻井可能占项目成本一半以上，Fervo 披露了显著的钻井效率提升，而项目融资和 PPA 流程现在都更依赖技术可信度，因此如果产品能实质提升首井把握或缩短尽调周期，中六位数的年支出是成立的 [3][5][9][13][20]。"
