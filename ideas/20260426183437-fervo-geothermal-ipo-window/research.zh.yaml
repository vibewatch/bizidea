"categoryDynamics":
  "growthRate": "与其说是可信的 fetched CAGR，不如说是由项目管线驱动的增长：仅 Fervo 就披露了 3.65 GW 的项目管线，而 DOE 认为当前美国地热已装机仅略高于 4 GW，这意味着如果执行顺利，下一代项目规模可能逼近今天的存量装机 [2][29]。"
  "growthRateSourceRefs":
  - 2
  - 29
  "tailwinds":
  - "point": "数据中心和公用事业对稳定清洁电力的需求，正在把地热项目往前拉 [6][7][8]。"
    "sourceRefs":
    - 6
    - 7
    - 8
  - "point": "DOE 试点、资料库和技术工具，正在降低拼装地热开发输入的成本 [10][11][12]。"
    "sourceRefs":
    - 10
    - 11
    - 12
  - "point": "Fervo 公布的钻井和运营数据说明，井位表现和执行效率确实存在学习曲线 [13][14]。"
    "sourceRefs":
    - 13
    - 14
  "headwinds":
  - "point": "已装机基础和活跃买方群仍然很小，因此软件预算依然可能被延后，或被并入服务支出 [2][29]。"
    "sourceRefs":
    - 2
    - 29
  - "point": "买方已经拥有或熟悉现有油服工具和顾问工作流，切换摩擦高 [19][20][21][27]。"
    "sourceRefs":
    - 19
    - 20
    - 21
    - 27
  - "point": "许可和诱发地震问题可能拖慢项目，进而推迟软件采购 [23][28]。"
    "sourceRefs":
    - 23
    - 28
"competitors":
- "name": "Halliburton DecisionSpace 365"
  "stage": "incumbent"
  "wedge": "面向可审计 E&P 工作流的云端井建、地下和场地开发规划。"
  "pricing": "定制企业定价"
  "strength": "已深度部署在地下和井位规划组织中，工作流覆盖广，集成能力强。"
  "weaknessVsUs": "这是横向 E&P 产品，并非原生地热，也不以融资备忘录为中心；相较聚焦切口，通常更重、更贵。"
  "sourceRefs":
  - 19
  - 20
  - 26
- "name": "SLB Petrel / Delfi + geothermal services"
  "stage": "incumbent"
  "wedge": "一流的地下解释能力，叠加地热勘探、钻井和顾问服务。"
  "pricing": "定制企业 / 服务定价"
  "strength": "技术深度强、装机基础深，还能把软件和地热现场服务打包。"
  "weaknessVsUs": "仍然偏向广义地下与服务交付，而不是服务首个商业化井场可融资性的轻量地热规划 OS。"
  "sourceRefs":
  - 21
  - 22
  - 27
- "name": "In-house reservoir engineering stack"
  "stage": "substitute"
  "wedge": "内部专家使用既有 petrotechnical 工具、GIS 图层和电子表格。"
  "pricing": "内部人头成本 + 现有软件支出"
  "strength": "技术团队信任度最高，也能直接掌控专有数据。"
  "weaknessVsUs": "知识沉淀在孤岛里，工作流很难复用，输出也少有面向贷款方或跨项目基准的标准化。"
  "sourceRefs":
  - 17
  - 19
  - 20
- "name": "Consultant-led geothermal studies"
  "stage": "substitute"
  "wedge": "由外部专家和服务公司拼出来的项目制研究和备忘录。"
  "pricing": "按项目收费的服务费"
  "strength": "适合一次性尽调或复杂研究的可信专业能力。"
  "weaknessVsUs": "高度定制、不会复利，也不适合跨井场和跨盆地做持续基准分析。"
  "sourceRefs":
  - 20
  - 27
"regulatoryTechnicalConstraints":
- "point": "诱发地震监测和运营协议仍是地热商业化风险的一部分，尤其对 EGS 更是如此。"
  "sourceRefs":
  - 28
- "point": "公共数据虽在改善，但仍不完整；要从可视化走向有说服力的基准预测，仍需要专有井数据和运营数据。"
  "sourceRefs":
  - 11
  - 12
  - 14
- "point": "要想被采用，与 Petrel 和 DecisionSpace 等现有系统互通是门槛，而不是加分项。"
  "sourceRefs":
  - 19
  - 21
  - 26
- "point": "许可、社区沟通和分盆地地质差异，使得工作流天然具备地点敏感性，无法完全标准化。"
  "sourceRefs":
  - 23
  - 28
"validationSignals":
- "point": "Fervo 已公开提交 IPO 申请，这是下一代地热跨过资本市场新门槛的强信号。"
  "sourceRefs":
  - 1
  - 2
- "point": "Fervo 为 Cape Station 拿到 $421M 无追索项目融资，说明贷款方已愿意为公用事业级 EGS 提供资金。"
  "sourceRefs":
  - 3
  - 4
- "point": "Fervo 与 Southern California Edison 签下 320 MW PPA，证明公用事业对可调度地热电力存在真实需求。"
  "sourceRefs":
  - 5
- "point": "Google 的合作以及 NV Energy 的 tariff 流程，说明围绕数据中心的 hyperscaler 需求正在拉动地热。"
  "sourceRefs":
  - 6
  - 7
- "point": "DOE 正在资助 4 个由 IIJA 支持的 EGS 试点示范，表明公共部门正在支持场级商业化。"
  "sourceRefs":
  - 10
- "point": "Fervo 披露 Cape Station 的钻井时间同比改善 70%，说明执行效率确实在沿着学习曲线前进。"
  "sourceRefs":
  - 13
"openQuestions":
- "未来 24–36 个月里，北美究竟会有多少地热开发商真正走到首个商业化井场决策，而不是继续停留在试点阶段？"
- "一家创业公司能否拿到足够多的钻后数据权，建立有防御性的基准护城河，而不是沦为以顾问交付为主的点工具？"
- "贷款方和基础设施投资人会不会采用标准化钻井备忘录，还是仍更偏好定制第三方研究？"
- "一旦软件预算开始显性化，Halliburton、SLB 或服务公司能多快补上地热专用模板？"
