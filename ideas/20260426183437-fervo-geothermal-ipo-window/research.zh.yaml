  "competitiveLandscape": "竞争强度主要来自现有工作流和买方惯性，而不是拥挤的地热软件赛道。Halliburton 销售数字化井建和场地开发规划产品，明确强调可审计决策关口和一体化资产规划 [19][20]。SLB 提供 Petrel/Delfi 以及地热钻井和井建服务，可以把地热工作吸收进更大的 E&P 工具栈 [21][22][27]。这些系统真正留下的空白，是面向地热的数据标准化、可直接给贷款方的备忘录生成，以及专为首个商业化井场而不是成熟油气项目设计的跨项目基准能力 [11][12][18]。"
