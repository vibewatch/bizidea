    "rationale": "北美可服务市场：约 20 个正接近评估或首个商业化井场决策的开发商项目，每个项目每年支出约 $0.4M。这里锚定的是 DOE 的示范项目管线和美国下一代地热的可见商业化动能，而不是总地热装机 [3][5][10][29]。"
    "isEstimate": true
    "sourceRefs":
    - 3
    - 5
    - 10
    - 29
  "som":
    "value": "$1.8M"
    "rationale": "示意性的第三年可触达份额：5 个灯塔场地项目 × 经实施折扣后的混合 ACV 约 $0.36M。这个假设建立在围绕紧迫评估/融资工作流的狭窄创始人主导销售动作上，而不是广泛市场采用 [17][19][20]。"
    "isEstimate": true
    "sourceRefs":
    - 17
    - 19
    - 20
