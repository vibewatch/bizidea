"reportMemo":
  "executiveTakeaways":
  - "需求侧验证已经成立：Fervo 已签下 320 MW 的公用事业 PPA，Google 也已围绕内华达数据中心负载与其合作推进地热项目，监管方还批准了清洁电力 tariff，为更多可调度供给打开通道 [5][6][7]。"
  - "可融资性正在改善，但滩头市场仍然很小：DOE 认为当前美国地热装机仅略高于 4 GW，而 Fervo 也只是刚走到无追索项目融资和公共市场就绪这一步 [1][3][4][29]。"
  - "钻井仍是控制点。DOE 表示钻井成本可能超过项目总成本的一半，而 Fervo 披露 Cape Station 的钻井时间同比缩短了 70% [9][13]。"
  - "真正的竞争威胁来自替代方案，而不是拥挤的垂直 SaaS 赛道。买方今天默认使用 Halliburton、SLB、顾问团队和内部储层团队来完成可审计的场地开发工作流 [19][20][21][26][27]。"
  - "这家创业公司的初始软件 TAM 确实存在，但并不大：短期买方大概率只对应几十个场地项目，因此要想赢，靠的是灯塔客户和快速扩展到基准分析与承保工作流，而不是讲一个独立超大品类的故事 [2][10][23][24][29]。"
  - "公共数据基础设施终于到了可用阶段。DOE 现在提供资料库、地图、play-fairway 工具和试点数据，软件工作流产品已经可以直接调用这些输入 [11][12][23]。"
  - "关键反证风险在于：如果开发商不愿共享钻后数据，或者商业化井场启动仍然稀少，产品可能会一直停留在重服务形态，无法建立会复利的基准护城河 [3][10][14][19]。"
  "marketDefinition": "这个市场指的是面向北美开发商、服务于从机会筛选到首个商业化井场设计阶段的地热地下规划与可融资性软件。它覆盖数据标准化、机会排序、井轨迹设计、钻井风险打包，以及面向增强型和下一代地热项目、可直接交给贷款方的技术备忘录 [8][9][11][12][17][18]。它不包括通用 GIS、不带地热专用工作流的通用横向油气解释套件、电站 O&M 软件，也不包括更大的地热发电市场本身 [19][20][21][29]。"
  "customerAndBuyer": "ICP 是一家获得风投或项目资金支持、正接近评估井或首个商业化井场决策的地热开发商；日常用户是 VP Drilling、储层、地质和地下团队，而经济买方通常是 CTO 或 Chief Development Officer，财务和开发相关方也会参与 [17][18][25]。最紧迫的工作是对目标排序、设计经得起质疑的井，并在投入数亿美元项目资本前，为投资委员会、公用事业购电方或贷款方尽调准备一份可审计的资料包 [3][5][9][20]。采购摩擦很高，因为这些团队本就有内部工程师和企业级 petrotechnical 工具，因此一定会要求互通能力和可追溯性 [19][20][21][26]。"
  "buyingTriggers":
  - "point": "试验井成功或绿地评估活动，会立刻带来在首个商业化井场前把目标排序和井组设计标准化的需求 [10, 13, 25]。"
    "sourceRefs":
