  "regulatoryLandscape": "联邦层面的政策环境是支持性的——DOE 正在为 EGS 试点、数据项目和地热部署基础设施提供资金 [10][11][12]。但商业化仍会撞上各州不同的许可流程、社区沟通要求和诱发地震协议，因此软件必须把这些约束编码进规划流程，而不能事后补救 [28][23]。"
  "technologyLandscape": "技术动能是可信的：Fervo 已公开井测、钻井表现和多年产量数据，Google 与公用事业方也愿意为可调度地热供给签约 [5][6][13][14]。但整条技术栈依然分散在公共资料库、许可图层、油服软件和顾问研究之间，因此只要能比现有厂商更快拿住钻后反馈和基准数据，工作流 OS 仍有切入口 [11][12][18][19][21]。"
