- driver: 北美短期内的首个井场/资源评价项目
  value: ~20 个项目
  source: '[3,5,10,29] + calc'
- driver: 每个活跃项目的年度软件 + 工作流支出
  value: $0.36M-$0.60M
  source: '[9,19,20] + calc'
categoryDynamics:
  growthRate: 这里应看项目管线驱动的增长，而不是依赖一个不够可信的抓取 CAGR：仅 Fervo 就披露了 3.65 GW 的项目管线，而 DOE 认为当前美国地热装机略高于 4 GW，这意味着若执行顺利，下一代项目的规模可能逼近今天的已装机基数 [2][29]。
  growthRateSourceRefs:
  - 2
  - 29
  tailwinds:
  - point: 数据中心和公用事业对稳定清洁电力的需求，正在把地热项目向前拉动 [6][7][8]。
    sourceRefs:
    - 6
    - 7
    - 8
  - point: DOE 的试点、资料库和技术工具正在降低整合地热开发输入的成本 [10][11][12]。
    sourceRefs:
    - 10
    - 11
    - 12
  - point: Fervo 公开的钻井和运营数据表明，井表现和执行能力存在真实学习曲线 [13][14]。
    sourceRefs:
    - 13
    - 14
  headwinds:
  - point: 已装机基数和活跃买方群体仍然很小，因此软件预算仍可能被推迟，或被吸收到服务费用中 [2][29]。
    sourceRefs:
    - 2
    - 29
  - point: 买方本就拥有或熟悉现有油田工具和顾问工作流，这提高了切换摩擦 [19][20][21][27]。
    sourceRefs:
    - 19
    - 20
    - 21
    - 27
  - point: 许可和诱发地震问题可能拖慢项目，并延后软件采购 [23][28]。
    sourceRefs:
    - 23
    - 28
competitors:
- name: Halliburton DecisionSpace 365
  stage: 现有厂商
  wedge: 面向可审计 E&P 工作流的云端井建设、地下资源与场址开发规划。
  pricing: 定制化企业定价
  strength: 在地下资源和井规划组织中已有深度部署，工作流覆盖广，集成能力强。
  weaknessVsUs: 这是横向 E&P 产品，显然不是地热原生，也并非针对融资备忘录；相比聚焦切口，通常更重、更贵。
  sourceRefs:
  - 19
  - 20
  - 26
- name: SLB Petrel / Delfi + geothermal services
  stage: 现有厂商
  wedge: 一流的地下资源解释能力，加上地热勘探、钻井和咨询服务。
  pricing: 定制化企业/服务定价
  strength: 具备技术深度、装机基础，以及将软件与地热现场服务打包销售的能力。
  weaknessVsUs: 其导向仍然是广义地下资源与服务交付，而非面向首个井场可融资性的轻量级地热规划 OS。
  sourceRefs:
  - 21
  - 22
  - 27
- name: In-house reservoir engineering stack
  stage: 替代方案
  wedge: 由内部专家使用现有岩土技术工具、GIS 图层和电子表格。
  pricing: 内部人力成本加现有软件支出
  strength: 最受技术团队信任，并能直接控制专有数据。
  weaknessVsUs: 知识仍然孤岛化，工作流难以复用，产出也很少为贷款方或跨项目对标实现标准化。
  sourceRefs:
  - 17
  - 19
  - 20
- name: Consultant-led geothermal studies
  stage: 替代方案
  wedge: 由外部专家和服务公司拼装的项目定制研究与备忘录。
  pricing: 按项目计费的服务费用
  strength: 在一次性尽调或复杂研究中具备可信专业能力。
  weaknessVsUs: 高度定制、无法累积，也不适合跨井场和跨盆地的持续对标。
  sourceRefs:
  - 20
  - 27
regulatoryTechnicalConstraints:
- point: 诱发地震监测与运行协议仍然是地热商业化风险的一部分，尤其对 EGS 而言。
  sourceRefs:
  - 28
- point: 公开数据正在改善但仍不完整；若要从可视化迈向可被辩护的对标预测，仍需要专有井数据和运营数据。
  sourceRefs:
  - 11
  - 12
  - 14
- point: 与 Petrel、DecisionSpace 等现有系统的互操作是被采纳的基本门槛。
  sourceRefs:
  - 19
  - 21
  - 26
- point: 许可、社区参与和盆地特定地质，使工作流更依赖具体地点，而非可以完全标准化。
  sourceRefs:
  - 23
  - 28
validationSignals:
- point: Fervo 已公开提交 IPO 文件，这是下一代地热触及新资本市场门槛的强烈信号。
  sourceRefs:
  - 1
  - 2
- point: Fervo 为 Cape Station 获得了 $421M 的无追索项目融资，表明贷款方对公用事业级 EGS 有明确兴趣。
  sourceRefs:
  - 3
  - 4
- point: Fervo 与 Southern California Edison 签下 320 MW PPA，表明公用事业对可调度地热存在需求。
  sourceRefs:
  - 5
- point: Google 的合作以及 NV Energy 的电价机制流程，说明围绕数据中心的超大规模客户需求正在拉动地热。
  sourceRefs:
  - 6
  - 7
- point: DOE 正在资助四个由 IIJA 支持的 EGS 试点示范项目，表明公共部门支持场站级商业化。
  sourceRefs:
  - 10
- point: Fervo 报告 Cape Station 的钻井时间同比改善 70%，显示出真实的执行学习曲线。
  sourceRefs:
  - 13
openQuestions:
- 未来 24–36 个月内，究竟有多少北美地热开发商会真正进入首个商业化井场决策，而不是停留在试点阶段？
- 初创公司能否拿到足够多的钻后数据权利，从而建立可防御的对标护城河，而不是停留在顾问驱动的点工具？
- 贷款方和基础设施投资者会采用标准化钻井备忘录，还是继续偏好定制化第三方研究？
- 一旦软件预算变得清晰，Halliburton、SLB 或服务公司会多快补上地热专用模板？
