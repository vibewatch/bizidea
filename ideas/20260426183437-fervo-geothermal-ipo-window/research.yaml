  "willingnessToPay":
    "summary": "Direct pricing evidence is scarce, but willingness to pay should be driven by project economics rather than software benchmarks: DOE says drilling can exceed half of total project cost, Fervo reported large drilling-time gains, and both project-finance and PPA processes now hinge on technical credibility, making a mid-six-figure annual spend plausible if the product measurably improves first-well confidence or shortens diligence [3][5][9][13][20]."
    "sourceRefs":
    - 3
    - 5
    - 9
