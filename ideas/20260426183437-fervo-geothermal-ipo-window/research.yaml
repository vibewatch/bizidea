    - 20
  "competitiveLandscape": "Competitive intensity comes from incumbent workflows and buyer inertia, not from a crowded geothermal-software field. Halliburton sells digital well construction and field-development-planning products explicitly positioned around auditable decision gates and integrated asset planning [19][20]. SLB offers Petrel/Delfi plus geothermal drilling and well-construction services that can absorb geothermal work inside a larger E&P stack [21][22][27]. The core gap those systems leave is geothermal-specific data normalization, lender-ready memo generation, and cross-project benchmarking tuned for first commercial pads rather than mature oil-and-gas programs [11][12][18]."
  "incumbentThesis":
  - "incumbentClass": "Oilfield software suites"
    "point": "Halliburton and SLB are powerful defaults, but their workflows are horizontal and built for broad E&P use cases; they do not win by default if a startup packages geothermal-specific ranking, well-design, and financing outputs that sit above raw interpretation [19, 20, 21, 22]."
    "sourceRefs":
    - 19
    - 20
    - 21
    - 22
  - "incumbentClass": "Geothermal service firms and consultants"
    "point": "Consultants can produce project studies, but they monetize one-off analysis rather than a persistent benchmark layer; the startup can win if customers want repeatable, continuously updated workflows instead of bespoke deliverables [20, 27]."
    "sourceRefs":
    - 20
    - 27
  - "incumbentClass": "Cloud/data platforms"
    "point": "Raw repositories and maps are improving through DOE, but data access alone does not create a drill-target ranking engine, trajectory design workflow, or lender memo; workflow productization remains open [11, 12, 23]."
    "sourceRefs":
    - 11
    - 12
    - 23
  - "incumbentClass": "In-house teams"
    "point": "Developers retain strong internal subsurface expertise, yet scarce geothermal talent and rapid project pacing create a gap for software that compresses manual synthesis and preserves organizational memory across pads [17, 18, 19]."
    "sourceRefs":
    - 17
    - 18
    - 19
  "regulatoryLandscape": "Policy is supportive at the federal level—DOE is funding EGS pilots, data programs, and geothermal deployment infrastructure [10][11][12]. But commercialization still runs into state-by-state permitting, community engagement requirements, and induced-seismicity protocols that software must encode into planning rather than treat as afterthoughts [28][23]."
  "technologyLandscape": "Technology momentum is credible: Fervo has published well-test, drilling-performance, and multi-year production data, while Google and utilities are willing to contract for dispatchable geothermal supply [5][6][13][14]. Yet the stack remains fragmented across public repositories, permitting layers, oilfield software, and consultant studies, leaving room for a workflow OS if it captures post-drill feedback and benchmark data faster than incumbents [11][12][18][19][21]."
