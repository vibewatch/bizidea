"reportMemo":
  "executiveTakeaways":
  - "Demand-side validation is real: Fervo has signed 320 MW of utility PPAs, Google has already partnered on geothermal for Nevada data-center load, and regulators approved a clean tariff to bring more dispatchable supply online [5][6][7]."
  - "Bankability is improving, but the beachhead is still small: DOE pegs current U.S. geothermal capacity at just over 4 GW while Fervo is only now reaching non-recourse project finance and public-market readiness [1][3][4][29]."
  - "Drilling remains the control point. DOE says drilling can exceed half of total project cost, and Fervo reported a 70% year-over-year reduction in drilling times at Cape Station [9][13]."
  - "The competitive threat is substitutes, not a dense vertical-SaaS field. Buyers already default to Halliburton, SLB, consultants, and internal reservoir teams for auditable field-development workflows [19][20][21][26][27]."
  - "The startup’s initial software TAM is real but not large: near-term buyers are likely measured in dozens of field programs, so winning requires lighthouse accounts and fast expansion into benchmarking and underwriting workflows rather than a standalone giant category narrative [2][10][23][24][29]."
  - "Public data infrastructure is finally usable. DOE now provides repositories, maps, play-fairway tools, and pilot data that a workflow product can operationalize [11][12][23]."
  - "Key disconfirming risk: if developers do not share post-drill data or if commercial-pad starts remain sparse, the product may stay services-heavy and fail to build a compounding benchmark moat [3][10][14][19]."
  "marketDefinition": "This market is geothermal subsurface planning and bankability software for developers moving from prospect screening to first commercial-pad design in North America. It includes data normalization, prospect ranking, well-trajectory design, drilling-risk packaging, and lender-ready technical memos for enhanced and next-generation geothermal projects [8][9][11][12][17][18]. It excludes commodity GIS, generic horizontal oil-and-gas interpretation suites sold without geothermal-specific workflows, plant O&M software, and the much larger market for geothermal power generation itself [19][20][21][29]."
  "customerAndBuyer": "The ICP is a venture-backed or project-backed geothermal developer approaching appraisal or first commercial-pad decisions; daily users are VP Drilling, reservoir, geology, and subsurface teams, while the economic buyer is usually the CTO or Chief Development Officer with finance/development stakeholders in the loop [17][18][25]. The urgent jobs are to rank targets, design defensible wells, and produce an auditable package for investment committee, utility offtake, or lender diligence before hundreds of millions of dollars of project capital are committed [3][5][9][20]. Procurement friction is high because these teams already use internal engineers plus enterprise petrotechnical tools and will demand interoperability and traceability [19][20][21][26]."
  "buyingTriggers":
  - "point": "A pilot-well success or greenfield appraisal campaign creates an immediate need to standardize target ranking and well-program design before the first commercial pad [10, 13, 25]."
    "sourceRefs":
    - 10
    - 13
    - 25
  - "point": "Utility or data-center offtake processes increase pressure for a financeable, dispatchable-resource diligence package [5, 6, 7, 8]."
    "sourceRefs":
