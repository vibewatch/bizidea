slug: geothermal-well-design-os
date: '2026-04-26'
executiveSummary: >-
  这家公司应从北美增强型地热开发商的规划与承销系统起步，聚焦于正在进行评价或首个商业井台决策的客户。
  痛点尖锐：钻探成本可占项目总成本的一半以上，而采购方至今仍靠拼凑 DOE 数据集、油气工具、顾问和电子表格，
  来决定打哪口井、以及如何向内部投委会和外部融资方交代这个选择。
  提议的切入点够窄——可以卖入真实的触发事件：区块开发决策、试点扩展，或与公用事业商、数据中心签订购电协议的项目融资流程。
  近期市场体量有限，北美 SAM 约 $8.0M，第 3 年可及 SOM 约 $1.8M，因此公司应聚焦于灯塔客户渗透和数据护城河构建，而非讲一个宽泛的横向 SaaS 故事。
  产品应首先凭借工作流压缩、审计轨迹和面向贷款方的输出物取胜，而不是在够的专有钻后数据积累之前声称拥有更强的预测准确性。
  如果客户共享计划与实际对比的遥测数据，公司可以在多个井台和盆地间复利积累基准、承包商比较和承销基础设施。
  若客户不共享，业务将面临沦为重服务规划工具、防御性有限的风险。
  直接的付费意愿数据目前仍匮乏，因此定价和数据权利假设必须在前 90 天内得到验证。
problem:
  - 采购方面临高成本钻探决策，但地热、许可证和偏移井数据却高度碎片化。
  - 既有工作流依赖顾问、通用石技术工具和电子表格——更新慢、在融资中难以自圆其说。
solution:
  - 构建一个专属地热的规划工作台，接入公共和客户数据，对靶区排序、设计候选井眼，并呈现盆地专属约束条件。
  - 导出可审计的钻探方案包和面向贷款方的技术备忘录，再接入计划与实际的钻探及生产数据，优化下一个井台设计。
whyWeWin:
  - 公司专注于首口商业井台的可融资性——这恰恰是通用油气套件和顾问最薄弱的环节。
  - DOE 数据基础设施与客户遥测数据可以复利积累为一个专有基准层，覆盖设计选择、承包商表现和盆地成果。
strategicChoices:
  beachhead: 美国西部风投或项目支持的 EGS 开发商，正在规划传统热液田以外的首个多井商业井台。
  wedgeRationale: 首井台工作流有清晰的用户、董事会可见的资本决策，以及产品可以快速替代的特定交付物；更宽泛的地热软件类别只会稀释证明路径、拖慢销售。
  sequencingRationale: 先发布能压缩目标排序和备忘录生成的工作流软件，通过付费实施整合既有工具并争取数据授权，再在真实井出产后增加计划与实际对比的基准功能。
  notYet:
    - 在美国西部许可证和地质条件验证完毕之前，不推进国际扩张。
    - 不做电厂运维、调度优化或电网交易软件。
    - 在基准数据够可信之前，不建立宽泛的承包商市场。
market:
  tam: $36.0M
  sam: $8.0M
  som: $1.8M
  segments:
    - 正在进行评价或首个商业井台设计的北美增强型地热开发商。
    - 参与这些项目的钻探承包商、基础设施投资人和贷款方。
  buyingProcess: >-
    销售应从地下负责人或钻探副总裁切入，但只有在 CTO 或首席开发官认可该工作流
    能改善既有评价或融资流程后才能成单。采购环节需要技术验证、与既有工具的互操作性，
    以及对基准数据权利的书面约定。
product:
  mvp: >-
    第一版应涵盖：勘探目标录入、DOE 及客户数据规范化、风险排序目标筛选、候选井眼轨迹规划、
    许可证叠层、协作记录，以及可融资钻探备忘录的导出。
    不应承诺自主井身设计；产品应让专家判断更快、更可追溯、更易在融资中站得住脚。
  sixMonth: 在一个盆地接入 DOE 和客户数据集，支持 Petrel 和 DecisionSpace 的导入导出，生成面向贷款方的备忘录模板，完成两个付费区块项目试点。
  twelveMonth: 增加钻探和早期生产数据的计划与实际对比接入、承包商和成本基准视图，以及面向美国西部项目的盆地专属许可证和诱发地震核查清单。
  twentyFourMonth: 扩展至多盆地基准、能复用承销方案包，以及支持续约和跨项目扩展的承包商绩效比较。
  keyBets:
    - 客户会在统计意义上的预测模型成熟之前，为工作流压缩和融资就绪性买单。
    - 与既有油田工具的互操作性足以进入技术栈，无需"换掉既有系统"。
    - 钻后遥测数据权利可以通过试点和续约谈判获得。
gtm:
  wedge: 针对即将进行的评价或首口商业井台决策，销售地热区块规划和贷款方备忘录工作流。
  channels:
    - 创始人主导的向美国西部 EGS 开发商的直接销售。
    - 与已深入区块规划工作的地热顾问和钻探承包商建立推荐与实施合作关系。
    - 通过 DOE 试点网络和项目融资顾问建立可信度驱动的客户引荐。
  funnelTargets: 定向触达或推荐引入到合格发现转化率 30%+，合格发现到付费试点 25%+，付费试点到年度生产合同 60%+，首次区块续约 80%+。
  pricing: 单个区块项目的付费试点或实施费 $75k–$150k，转换为每活跃区块 $300k–$450k 年度订阅加高级监测井分析费；对标顾问费用节省和更短的尽调周期进行定价。
businessModel:
  revenueStreams:
    - 按活跃区块项目计费的年度订阅。
    - 实施和数据接入费。
    - 高级基准和监测井分析模块。
  unitOfValue: 处于规划或早期钻探阶段的活跃区块开发项目。
  targetGrossMarginPct: 70
  expansionLevers:
    - 在首个生产部署后增加基准和承销模块。
    - 从开发商团队扩展至同一项目中的贷款方、保险商和钻探合作方。
    - 在更多北美地热项目中复用盆地专属数据模型。
strategyMap:
  northStarMetric: 年度合同下的活跃商业井台或评价区块项目数量。
  inputMetrics:
    - 与活跃区块开发或融资事件挂钩的合格机会数。
    - 每半年启动的付费试点数。
    - 试点到年度合同转化率。
    - 授予能复用匿名基准数据权利的试点比例。
    - 与既有工作流相比备忘录生成时间的缩减量。
  moatsToBuild:
    - 专有的计划与实际井眼及生产基准数据集。
    - 面向贷款方的地热备忘录和承销核查清单存档。
    - 嵌入客户流程的盆地专属许可证和诱发地震工作流模板。
  killCriteria:
    - 创始人亲自打单 12 个月后签约付费试点少于 3 个。
    - 前 4 个试点中试点到年度合同转化率低于 40%。
    - 少于 50% 的试点客户授予可用的匿名基准数据权利。
    - 备忘录准备周期相比现状无法实现至少 30% 的可测量缩减。
  mermaid: |
    flowchart LR
      Wedge[First commercial-pad planning workflow] --> MVP[Target ranking plus lender memo MVP]
      MVP --> Proof[Paid pilots and shorter diligence cycles]
      Proof --> Expansion[Benchmarking, underwriting, and contractor comparison]
investorMemo:
  verdict:
    call: Watch
    conviction: 痛点强烈、时机可信，但采购方群体规模和数据权利护城河尚未得到充分验证，暂不足以支持合伙人会议。
    whyBelieve: 钻探经济学、DOE 数据可用性以及 Fervo 引领的融资势头，为标准化首台井台规划与承销的软件打开了真实窗口。
    whyDoubt: 初始市场以数十个项目计，若公司未能获取专有钻后数据，在位厂商或顾问可能吸走这部分工作。
    nextDiligence: 通过 10 次采购方访谈和至少 2 个付费共创伙伴承诺，验证付费意愿、数据权利条款和试点转化率。
  firstCustomer:
    title: 进入首口商业井台设计阶段的美国西部 EGS 开发商。
    profile: 拥有试验井数据、即将面临评价或融资节点、并与公用事业商或超大规模云厂商签有购电协议的风投支持或项目支持开发商。
    trigger: 区块开发投资决策、DOE 支持的试点扩展，或首个多井商业井台的贷款方尽调流程。
    buyer: 首席技术官或首席开发官
    initialContract: $75k–$150k 的试点或实施费（绑定一个区块项目），成功后转换为每年 $300k–$450k 的年度订阅。
  mustBeTrue:
    - 未来 24 个月内，北美至少有 10 个地热项目面临首口商业井台或同等评价决策。
    - 采购方愿意为能缩短规划和承销周期、同时不替换既有解释工具的软件支付至少 $300k 年化费用。
    - 至少一半的早期客户愿意将匿名的计划与实际井眼数据授权用于基准比较。
    - 贷款方、公用事业商或内部投委会会将标准化备忘录工作流视为明显优于顾问定制方案的选择。
    - Halliburton、SLB 和顾问主导的替代方案无法在前 5 个灯塔账户形成之前补上地热专属工作流的缺口。
  diligenceQuestions:
    - 未来 12–24 个月内，哪些地热开发商有现实的首台决策？
    - 这些团队目前每个区块项目在顾问、内部人工和既有软件上各花多少钱？
    - 试点合同中能争取到哪些数据权利，以及在何种匿名条件下？
    - 贷款方或基础设施顾问已要求地热项目提供哪些融资文件？
    - Petrel 和 DecisionSpace 的互操作性在客户实施中有多复杂？
  riskHeatmap:
    - risk: 近期采购方群体规模太小，难以支撑高效的风险投资规模增长。
      likelihood: High
      impact: High
      leadingIndicator: 未来 24 个月内可识别的北美首台或评价项目少于 10 个。
      mitigation: 优先赢下灯塔开发商客户，再向同一项目中的贷款方、保险商和钻探商扩展。
    - risk: 客户拒绝共享钻后数据，无法构建基准护城河。
      likelihood: High
      impact: High
      leadingIndicator: 试点合同谈判中匿名基准权利被删除，或数据访问被限定为仅静态导出。
      mitigation: 将数据权利条款纳入初始试点定价，并提供清晰的匿名规则、基准互惠和客户自主权限管理。
    - risk: 既有油田套件或顾问在初创公司建立证明之前就捆绑了地热模板。
      likelihood: Medium
      impact: High
      leadingIndicator: 采购方在活跃交易中反映新版 DecisionSpace、Petrel 或顾问工作流已是够的替代方案。
      mitigation: 围绕地热专属贷款方输出、部署速度以及跨项目基准数据建立差异化，而非靠建模广度竞争。
    - risk: 许可证或诱发地震延误推迟项目、冻结软件预算。
      likelihood: Medium
      impact: Medium
      leadingIndicator: 合格机会因盆地专属监管问题滑期超过两个季度。
      mitigation: 将销售管线聚焦于已与融资或评价节点挂钩的项目，并将许可证和诱发地震工作流编入产品。
operatingAssumptions:
  - assumption: 在产品尚未具备广泛预测基准功能之前，采购方愿意为付费试点买单。
    basis: research.yaml
    validationTest: 在 90 天内以备忘录生成和工作流压缩价值主张——而非模型精度主张——签下 2 个付费试点。
    decisionImpact: 若为假，则将产品收窄为咨询赋能软件，或在全面平台工程之前缩减产品范围。
  - assumption: 每个活跃区块项目的可信年度合同可以落在 $300k–$450k 区间。
    basis: idea.yaml
    validationTest: 从活跃开发商处收集 5 个预算基准，并获得至少 3 个年化超过 $250k 的口头定价确认。
    decisionImpact: 若为假，公司必须扩大服务收入、降低燃烧率，或提前瞄准周边采购方预算。
  - assumption: 早期客户可协商出钻后遥测和生产数据权利。
    basis: research.yaml
    validationTest: 从至少 2 个客户获得签字试点条款，授权将计划、钻探和早期生产数据匿名用于基准比较。
    decisionImpact: 若为假，防御性减弱，路线图应优先提升工作流实用性而非数据网络效应。
  - assumption: 与 Petrel 和 DecisionSpace 的互操作性足以在不触发"换掉既有系统"阻力的前提下进入技术栈。
    basis: research.yaml
    validationTest: 使用真实客户数据完成 2 次导入和 2 次导出，且每个项目的人工修复不超过一天。
    decisionImpact: 若为假，实施成本上升，公司可能需要更强的服务能力或不同的产品切入点。
  - assumption: 美国西部首台市场够大，能产生 5 个灯塔客户。
    basis: operator judgment
    validationTest: 建立一份包含至少 12 个目标项目的账户地图，注明采购方姓名、触发时间和当前工作流替代方案。
    decisionImpact: 若为假，公司应尽早扩展至邻近地热细分市场或更宽泛的地下可融资性工作流。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 建立账户地图，对美国西部 EGS 开发商和融资相关方开展 10 次结构化采购方访谈。
    hypothesis: 活跃的评价或融资事件能够产生够紧迫感，推动围绕规划和备忘录生成启动一个付费试点。
    successMetric: 10 位采购方中有 6 位确认未来 12 个月内存在现实触发事件，且有 2 位同意接受付费试点提案。
    owner: CEO
  - horizon: 0–90 天
    experiment: 从一个公共数据加客户数据的组合工作流中，原型出面向贷款方的钻探备忘录导出功能。
    hypothesis: 备忘录生成是在不声称完全预测优越性的前提下最快证明价值的路径。
    successMetric: 试点用户评价输出品质足以替代至少一次顾问或内部备忘录周期。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 在美国西部一个盆地交付 2 个付费试点，实现与 Petrel 或 DecisionSpace 的互操作。
    hypothesis: 如果产品能嵌入既有地下工作流而非要求替换，采购方会主动采用。
    successMetric: 两个试点均在不超过 2 周的实施时间内完成，且有一个转化为年度合同。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 在所有试点合同中谈入匿名数据权利条款。
    hypothesis: 客户愿意以基准数据权利换取折扣试点定价和比较分析。
    successMetric: 至少 50% 的签约试点包含计划与实际基准比较的能复用匿名数据权利。
    owner: CEO
  - horizon: 180–360 天
    experiment: 利用试点及公共来源的计划与实际数据，发布承包商和成本基准视图。
    hypothesis: 基准功能能在初始备忘录工作流之外创造续约和扩展杠杆。
    successMetric: 有两个客户在续约或第二区块扩展决策中使用了基准视图。
    owner: 产品负责人
  - horizon: 180–360 天
    experiment: 与地热顾问或钻探承包商正式建立 2 个渠道合作关系。
    hypothesis: 已深入技术工作流的合作伙伴能降低客户获取成本并提升实施速度。
    successMetric: 来自合作伙伴的 2 个机会线索，以及通过渠道完成的 1 个付费试点。
    owner: CEO
operations:
  - 维护受治理的地热数据管道，严格区分公共输入层、客户保密层和匿名基准输出层。
  - 围绕一套盆地模板、一套备忘录模板和固定的每周实施节奏，标准化试点交付流程。
  - 在任何定制化工作开始之前，通过合同语言明确数据权利、基准用途和模型责任限制。
  - 为顾问和钻探商建立合作运营模式，激励项目来源介绍，同时避免公司沦为依赖经销商的服务公司。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 负责数据管道、工作流应用和首批试点所需的既有工具互操作性。
  - role: 地热领域负责人
    startTiming: Month 0
    rationale: 将地下和钻探工作流转化为可信的产品逻辑，协助赢下技术型采购方。
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 主导创始人驱动的企业销售、定价验证、合作关系拓展以及数据权利试点合同谈判。
  - role: 产品与实施负责人
    startTiming: Month 6
    rationale: 将定制化试点工作转化为能重复的接入流程、盆地模板和面向续约的基准工作流。
milestones:
  - horizon: 0–12 个月
    items:
      - 在美国西部签约 2 个付费试点客户。
      - 交付带备忘录导出和既有工具互操作性的盆地专属 MVP。
      - 将至少 1 个试点转化为年度生产合同。
      - 从至少 1 个客户获得匿名数据权利。
  - horizon: 12–24 个月
    items:
      - 将合同下的活跃区块项目扩展至 5 个。
      - 发布计划与实际基准视图及承包商比较模块。
      - 建立 2 个能重复的推荐或实施合作关系。
      - 证明首个年度客户合同的续约。
  - horizon: 24–36 个月
    items:
      - 扩展至美国西部多个盆地及融资端周边用户。
      - 建立覆盖至少 10 个区块项目的能复用承销数据集。
      - 证明基准驱动的扩展收入已超出初始规划席位。
risks:
  - risk: 近期采购方群体规模太小，难以支撑高效的风险投资规模增长。
    likelihood: High
    impact: High
    mitigation: 集中攻克即将到来的首台事件，再向同一工作流中的贷款方、保险商和钻探合作方延伸。
  - risk: 客户拒绝共享钻后数据，无法构建基准护城河。
    likelihood: High
    impact: High
    mitigation: 从首份合同起，将折扣和高级分析与匿名数据权利条款挂钩。
  - risk: 既有油田套件或顾问在初创公司建立证明之前就捆绑了地热模板。
    likelihood: Medium
    impact: High
    mitigation: 凭借地热专属承销输出、部署速度和不断积累的基准数据取胜，而非靠建模覆盖广度竞争。
  - risk: 许可证或诱发地震延误推迟项目、冻结软件预算。
    likelihood: Medium
    impact: Medium
    mitigation: 将目标机会集中于已进入评价或融资节点的项目，并将盆地专属合规工作流编入产品。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 资助 18 个月的产品构建、领域人才招募、创始人亲自打单和试点交付，目标是完成 2 个付费试点、1–2 个年度生产合同，以及首个能复用的基准数据集。
