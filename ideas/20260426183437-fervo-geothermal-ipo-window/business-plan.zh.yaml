slug: geothermal-well-design-os
date: '2026-04-26'
executiveSummary: >-
  这家公司应先从北美增强型地热开发商的规划与承保系统做起，服务对象是正进入评估井或首个商业化井场决策阶段的团队。痛点很硬，因为钻井成本可占项目总成本一半以上，而买方今天仍要把 DOE 数据集、油气工具、顾问意见和电子表格拼在一起，才能决定在哪里钻井，以及如何向内部投资委员会和外部资金方证明这个决策站得住。这个切口足够窄，可以嵌入真实触发事件：新场地开发决策、试点扩建，或与公用事业、数据中心购电挂钩的项目融资流程。近期市场规模并不大，研究给出的北美 SAM 约为 $8.0M、第三年可触达的 SOM 约为 $1.8M，因此公司不能按泛化横向 SaaS 故事来建，而要围绕灯塔客户渗透和数据护城河打造。产品第一步应靠压缩工作流、补齐审计链路和输出可直接给贷款方的材料取胜，而不是在专有钻后数据尚未积累前，就宣称预测精度更强。如果客户愿意共享计划与实际偏差的遥测数据，公司就能逐步复利成覆盖井场与盆地的基准、承包商对比和承保基础设施；如果不愿共享，业务就可能退化成以服务为主、可防御性有限的规划工具。眼下直接的付费意愿证据仍然稀缺，因此前 90 天必须优先验证定价和数据权假设。
problem:
  - 买方要面对高成本钻井决策，但地热、许可和邻井数据都非常碎片化。
  - 现有工作流依赖顾问、通用 petrotechnical 工具和电子表格，更新慢，也很难在融资场景里自圆其说。
solution:
  - 构建面向地热的专用规划工作台，接入公共和客户数据，对目标排序、设计候选井位，并标出分盆地约束。
  - 导出可审计的钻井资料包和可直接给贷款方的技术备忘录，再接入计划与实际偏差的钻井和产量数据，反过来优化下一块井场。
whyWeWin:
  - 公司聚焦首个商业化井场的可融资性，这正是通用油气套件和顾问最弱的环节。
  - DOE 数据基础设施加上客户遥测数据，可以复利沉淀成专有基准层，覆盖设计选择、承包商表现和盆地结果。
strategicChoices:
  beachhead: 美国西部获风投或项目资金支持、计划在传统热液田之外建设首个多井商业化井场的 EGS 开发商。
  wedgeRationale: 首个井场工作流用户明确、资本决策会被董事会看到，而且产品能很快替换掉具体产物；如果一开始就讲更宽泛的地热软件故事，只会稀释验证效率、拖慢销售。
  sequencingRationale: 先做能压缩目标排序和备忘录生成的软件工作流，用付费实施把现有工具接进来并拿下数据权，再在真实井开始产出后补上计划与实际偏差基准层。
  notYet:
    - 在产品尚未于美国西部许可环境和地质条件中跑通前，不做国际扩张。
    - 不做电站 O&M、调度优化或电网交易软件。
    - 在基准数据尚不可信前，不做广义承包商市场平台。
market:
  tam: $36.0M
  sam: $8.0M
  som: $1.8M
  segments:
    - 正接近评估井或首个商业化井场设计节点的北美增强型地热开发商。
    - 参与同一批项目的钻井承包商、基础设施投资人和贷款方。
  buyingProcess: >-
    销售应从地下负责人或 VP Drilling 切入，但只有当 CTO 或 Chief Development Officer 认定该工作流能改善一项真实的评估或融资流程时，交易才会成交。采购过程会要求技术验证、与现有工具的互通能力，以及围绕基准分析的数据权约定。
product:
  mvp: >-
    第一版应覆盖项目机会接入、DOE 与客户数据标准化、按风险排序的目标筛选、候选井轨迹规划、许可叠图、协作历史，以及导出可直接用于融资的钻井备忘录。它不该承诺自动化井位设计；它要做的是让专家判断更快、更可追溯，也更容易自证。
  sixMonth: 在一个盆地内导入 DOE 与客户数据集，支持 Petrel 和 DecisionSpace 的导入导出，生成可直接给贷款方的备忘录模板，并完成两个付费场地试点。
  twelveMonth: 新增钻井与早期产量数据的计划/实际偏差接入、承包商与成本基准视图，以及面向美国西部项目的分盆地许可与地震活动检查清单。
  twentyFourMonth: 扩展到跨盆地基准分析、可复用承保资料包，以及支持续约和跨项目扩张的承包商表现对比。
  keyBets:
    - 在客户要求统计意义足够强的预测模型之前，他们就会先为压缩工作流和提升融资就绪度买单。
    - 只要能与现有油服工具互通，就足以进入工作流，而不必推动 rip-and-replace。
    - 可以通过试点和续约谈下钻后遥测数据权。
gtm:
  wedge: 为即将到来的评估井或首个商业化井场决策，销售一个地热场地规划加贷款方备忘录工作流。
  channels:
    - 由创始人主导，直接销售给美国西部 EGS 开发商。
    - 与已经嵌入场地规划工作的地热顾问和钻井承包商建立转介绍与实施合作。
    - 通过 DOE 试点网络和项目融资顾问拿到增强可信度的引荐。
  funnelTargets: 从外呼或转介绍到合格发现会 30%+，合格发现会到付费试点 25%+，付费试点到年度生产合同 60%+，首个场地续约 80%+。
  pricing: 单个场地项目先收 $75k-$150k 的付费试点或实施费，再转成每个活跃场地 $300k-$450k 的年度订阅，并对监测井分析收取高级费用；定价锚点是顾问支出的减少和尽调周期的缩短。
businessModel:
  revenueStreams:
    - 按活跃场地项目收年度订阅费。
    - 实施和数据接入费用。
    - 高级基准分析和监测井分析模块。
  unitOfValue: 处于规划或早期钻井阶段的活跃场地开发项目。
  targetGrossMarginPct: 70
  expansionLevers:
    - 在首次生产部署后补上基准分析和承保模块。
    - 从开发商团队扩到同一项目中的贷款方、保险方和钻井合作方。
    - 将分盆地数据模型复用到更多北美地热项目。
strategyMap:
  northStarMetric: 签有年度合同的活跃商业化井场或评估项目数量。
  inputMetrics:
    - 与真实场地开发或融资事件绑定的合格机会数。
    - 每半年启动的付费试点数。
    - 试点转年度合同的转化率。
    - 给予可复用匿名数据权的试点占比。
    - 相比现有流程，备忘录生成时间的缩短幅度。
  moatsToBuild:
    - 专有的井位计划与实际产量表现基准数据集。
    - 面向贷款方的地热备忘录与承保检查清单档案。
    - 嵌入客户流程中的分盆地许可与地震活动模板。
  killCriteria:
    - 创始人主导销售 12 个月后，付费试点仍少于 3 个。
    - 试点客户中，给予可用匿名基准权的比例低于 50%。
    - 前 4 个试点后，试点到年度合同转化率仍低于 40%。
    - 相比现状，备忘录准备周期没有至少缩短 30%。
  mermaid: |
    flowchart LR
      Wedge[首个商业化井场规划工作流] --> MVP[目标排序 + 贷款方备忘录 MVP]
      MVP --> Proof[付费试点与更短尽调周期]
      Proof --> Expansion[基准分析、承保与承包商对比]
investorMemo:
  verdict:
    call: 观察
    conviction: 痛点很强、时点也可信，但买方规模和数据权护城河还没被证明到足以进合伙人会议。
    whyBelieve: 钻井经济性、DOE 数据可得性，以及 Fervo 带动的融资动能，共同打开了一个让软件标准化首井规划与承保的窗口。
    whyDoubt: 初始市场只有几十个项目，若拿不到专有钻后数据，现有厂商或顾问完全可以吸收这项工作。
    nextDiligence: 通过 10 次买方访谈和至少 2 个付费共创客户承诺，验证付费意愿、数据权条款和试点转化。
  firstCustomer:
    title: 进入首个商业化井场设计阶段的美国西部 EGS 开发商。
    profile: 获风投或项目资金支持，拥有试验井数据，即将进入评估或融资节点，并具备公用事业或 hyperscaler 挂钩的购电路径。
    trigger: 场地开发投资决策、DOE 支持的试点扩建，或首个多井商业化井场的贷款方尽调流程。
    buyer: CTO 或 Chief Development Officer
    initialContract: 单个场地项目收取 $75k-$150k 试点或实施费；一旦工作流进入生产规划，就转为 $300k-$450k 年订阅。
  mustBeTrue:
    - 未来 24 个月内，北美至少有 10 个地热项目会进入首个商业化井场或同等级评估决策。
    - 买方愿意为能缩短规划和承保周期、又不替换现有解释工具的软件支付至少 $300k 的年化费用。
    - 至少一半早期客户愿意授权匿名使用井位计划与实际表现数据做基准分析。
    - 贷款方、公用事业方或内部投资委员会会接受标准化备忘录工作流，并认为它明显优于定制顾问资料包。
    - Halliburton、SLB 和顾问型替代方案无法在公司拿下前 5 个灯塔客户前，迅速补齐地热专用工作流。
  diligenceQuestions:
    - 未来 12 到 24 个月里，哪些地热开发商真的会进入首井场决策？
    - 这些团队目前在顾问、内部人力和现有软件上，每个场地项目实际花多少钱？
    - 试点合同里到底能拿到哪些数据权，匿名化条款能谈到什么程度？
    - 贷款方或基础设施顾问目前已经要求哪些地热融资材料？
    - 在客户实施中，Petrel 和 DecisionSpace 的互通到底有多难？
  riskHeatmap:
    - risk: 短期买方规模过小，撑不起高效的风险投资式增长。
      likelihood: High
      impact: High
      leadingIndicator: 未来 24 个月内，可识别的北美首井场或评估项目少于 10 个。
      mitigation: 先拿下开发商灯塔客户，再向同一项目中的贷款方、保险方和钻井方扩展。
    - risk: 客户拒绝共享钻后数据，导致基准护城河无法形成。
      likelihood: High
      impact: High
      leadingIndicator: 试点合同删掉匿名基准权，或只允许访问静态导出数据。
      mitigation: 从首个试点定价开始就把数据权写进去，并提供清晰的匿名化、基准互惠和客户可控权限。
    - risk: 公司还没形成证明前，现有油服套件或顾问就先把地热模板打包出来。
      likelihood: Medium
      impact: High
      leadingIndicator: 买方在活跃项目里反馈新的地热版 DecisionSpace、Petrel 或顾问流程已经够用。
      mitigation: 围绕地热专用贷款方输出、上线速度和跨项目基准数据做差异化，而不是比拼原始建模广度。
    - risk: 许可或诱发地震延误把项目推迟，软件预算也随之往后拖。
      likelihood: Medium
      impact: Medium
      leadingIndicator: 合格机会因盆地级监管问题而延后超过 2 个季度。
      mitigation: 聚焦已经进入融资或评估节点的项目，并把许可和地震活动工作流编码进产品。
operatingAssumptions:
  - assumption: 在产品尚未形成广泛预测基准前，买方也愿意先为付费试点埋单。
    basis: research.yaml
    validationTest: 在 90 天内，用备忘录生成和工作流压缩的价值主张而非模型精度主张，拿下 2 个付费试点。
    decisionImpact: 如果不成立，就要把方案收窄成顾问增强型软件，或在扩展成完整平台前先缩小产品范围。
  - assumption: 每个活跃场地项目的可信年合同金额能落在 $300k-$450k。
    basis: idea.yaml
    validationTest: 从活跃开发商处收集 5 个预算基准，并拿到至少 3 个高于 $250k 年化的口头定价确认。
    decisionImpact: 如果不成立，公司要么更早扩大服务收入，要么降低 burn，要么更快切向相邻预算池。
  - assumption: 能从早期客户那里谈下钻后遥测和产量数据权。
    basis: research.yaml
    validationTest: 至少 2 个客户签署试点条款，授权匿名使用计划、钻井和早期产量数据做基准分析。
    decisionImpact: 如果不成立，可防御性会变弱，路线图应把重点放回工作流效用，而不是数据网络效应。
  - assumption: 与 Petrel 和 DecisionSpace 的互通能力足以避免 rip-and-replace 阻力。
    basis: research.yaml
    validationTest: 用真实客户数据完成 2 次导入和 2 次导出，且每个项目的手工返工不超过一天。
    decisionImpact: 如果不成立，实施成本会上升，公司可能需要更强的服务能力或改换产品切口。
  - assumption: 美国西部的首井场滩头市场足够大，能支撑拿下 5 个灯塔客户。
    basis: operator judgment
    validationTest: 建立至少 12 个目标项目的账户地图，写清买方姓名、触发时间和当前替代方案。
    decisionImpact: 如果不成立，公司应更早扩展到相邻地热细分领域或更广义的地下可融资工作流。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 建立账户地图，并对美国西部 EGS 开发商及财务相关方做 10 次结构化买方访谈。
    hypothesis: 只要碰上真实评估或融资事件，团队就有足够紧迫性为规划和备忘录生成试点付费。
    successMetric: 10 个买方中有 6 个确认未来 12 个月存在真实触发事件，且其中 2 个愿意接收付费试点方案。
    owner: CEO
  - horizon: 0–90 天
    experiment: 用一套公共数据 + 客户数据工作流，做出可直接给贷款方的钻井备忘录导出原型。
    hypothesis: 在不宣称预测能力全面领先的前提下，备忘录生成是最快验证价值的路径。
    successMetric: 试点用户认为该输出足以替代至少一次顾问或内部备忘录循环。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 在美国西部同一盆地交付 2 个付费试点，并完成与 Petrel 或 DecisionSpace 的互通。
    hypothesis: 只要产品能嵌入现有地下工作流，而不是要求整体替换，买方就会采用。
    successMetric: 两个试点都在少于 2 周的实施时间内完成，且至少有 1 个转成年合同。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 在所有试点合同中谈入匿名数据权条款。
    hypothesis: 客户愿意用折扣试点价格和对比分析能力来交换基准数据权。
    successMetric: 已签试点中，至少 50% 包含可复用的匿名计划/实际偏差基准数据权。
    owner: CEO
  - horizon: 180–360 天
    experiment: 基于试点和公共数据中的计划/实际偏差数据，上线承包商与成本基准视图。
    hypothesis: 基准分析能在初始备忘录工作流之外，为续约和扩张提供新的杠杆。
    successMetric: 两个客户在续约或第二个场地扩张决策中使用基准视图。
    owner: 产品负责人
  - horizon: 180–360 天
    experiment: 与地热顾问或钻井承包商正式建立 2 个渠道合作。
    hypothesis: 已经嵌入技术工作流的合作方，能降低获客成本并提升实施速度。
    successMetric: 合作方带来 2 个机会，并至少通过渠道成交 1 个付费试点。
    owner: CEO
operations:
  - 维护一条受治理的地热数据管线，明确区分公共输入、客户机密图层和匿名基准输出。
  - 把试点交付标准化为一个盆地模板、一个备忘录模板和固定的每周实施节奏。
  - 在任何定制工作开始前，就用合同语言定义数据权、基准用途和模型责任边界。
  - 建立面向顾问和钻井方的合作伙伴运营模型，奖励其带来试点，但避免公司变成依赖分销的服务商。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 负责首批试点所需的数据管线、工作流应用和现有工具互通。
  - role: 地热领域负责人
    startTiming: Month 0
    rationale: 把地下和钻井工作流翻译成可信的产品逻辑，并协助拿下技术买方。
  - role: CEO / 首席执行官
    startTiming: Month 0
    rationale: 负责创始人主导的企业销售、定价验证、合作拓展，以及围绕数据权的试点合同谈判。
  - role: 产品与实施负责人
    startTiming: Month 6
    rationale: 把定制试点沉淀为可复用的 onboarding、盆地模板和可续约的基准工作流。
milestones:
  - horizon: 0–12 个月
    items:
      - 在美国西部签下 2 个付费试点客户。
      - 交付带备忘录导出和现有工具互通能力的分盆地 MVP。
      - 至少把 1 个试点转成年度生产合同。
      - 至少从 1 个客户那里拿到匿名数据权。
  - horizon: 12–24 个月
    items:
      - 达到 5 个签约活跃场地项目。
      - 上线计划/实际偏差基准视图和承包商对比模块。
      - 建立 2 个可复用的转介绍或实施合作关系。
      - 在首个年合同客户上证明续约能力。
  - horizon: 24–36 个月
    items:
      - 扩展到美国西部多个盆地及相邻的金融侧用户。
      - 建立覆盖至少 10 个场地项目的可复用承保数据集。
      - 证明除初始规划席位外，基准驱动的扩张收入也能成立。
risks:
  - risk: 短期买方规模过小，撑不起高效的风险投资式增长。
    likelihood: High
    impact: High
    mitigation: 聚焦临近首井场事件，再向同一工作流中的贷款方、保险方和钻井合作方扩展。
  - risk: 客户拒绝共享钻后数据，导致基准护城河无法形成。
    likelihood: High
    impact: High
    mitigation: 从第一份合同开始就把折扣和高级分析与匿名数据权条款绑定。
  - risk: 公司还没形成证明前，现有油服套件或顾问就先把地热模板打包出来。
    likelihood: Medium
    impact: High
    mitigation: 以地热专用承保输出、上线速度和不断复利的基准数据取胜，而不是靠广覆盖建模。
  - risk: 许可或诱发地震延误把项目推迟，软件预算也随之往后拖。
    likelihood: Medium
    impact: Medium
    mitigation: 锁定已经进入评估或融资节点的机会，并把分盆地合规工作流编码进产品。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月完成产品搭建、领域招聘、创始人主导销售和试点交付，目标是拿下 2 个付费试点、1 到 2 个年度生产合同，并形成首个可复用基准数据集。
