slug: geothermal-well-design-os
date: '2026-04-26'
executiveSummary: 这家公司应先成为面向北美增强型地热开发商、服务于资源评价阶段或首个商业化井场决策的规划与融资审查系统。痛点非常强烈，因为钻井成本可能超过项目总成本的一半，而买方如今仍需拼接 DOE 数据集、油气工具、顾问意见和电子表格，才能决定在哪里钻井，以及如何向内部投资委员会和外部融资方证明该决策合理。拟议切入口足够聚焦，可切入真实触发事件：新的场址开发决策、试点扩张，或与公用事业/数据中心承购相关的项目融资流程。短期市场规模不大，研究得出的北美 SAM 约为 $8.0M、第三年可触达的 SOM 约为 $1.8M，因此公司应围绕灯塔客户渗透和数据护城河构建，而不是讲一个泛化的横向 SaaS 大故事。在积累足够专有钻后数据之前，产品应先靠压缩工作流、完善审计轨迹和输出适合贷方审阅的材料取胜，而不是过早宣称预测准确性更强。如果客户愿意共享计划与实际对比的遥测数据，公司就能进一步沉淀为跨井场、跨盆地的对标、承包商比较和融资审查基础设施；如果不能，业务就可能沦为一个服务驱动、可防御性有限的规划工具。当前关于支付意愿的直接数据仍然稀缺，因此定价和数据权利假设必须在前 90 天内完成验证。
problem:
- 买方面临高成本钻井决策，而地热、许可和邻井数据又高度碎片化。
- 现有工作流依赖顾问、通用岩土技术工具和电子表格，更新缓慢，也难以在融资场景中自证合理。
solution:
- 构建地热专用规划工作空间，接入公开数据和客户数据，对目标进行排序、设计候选井，并呈现盆地特定约束。
- 输出可审计的钻井资料包和适合贷方审阅的技术备忘录，再接入计划与实际对比的钻井和产量数据，优化下一个井场。
whyWeWin:
- 公司聚焦首个商业化井场的可融资性，这是通用油气套件和顾问最薄弱的环节。
- DOE 数据基础设施和客户遥测数据可持续累积为专有对标层，覆盖设计选择、承包商表现和盆地结果。
strategicChoices:
  beachhead: 在传统水热田之外规划首个多井商业化井场的美国西部风投支持型或项目支持型 EGS 开发商。
  wedgeRationale: 首个井场工作流拥有明确用户、董事会可见的资本决策节点，以及产品可以快速替代的具体产出物；更宽泛的地热软件类别只会稀释验证效果并拖慢销售。
  sequencingRationale: 先从压缩目标排序和备忘录生成周期的工作流软件切入，通过付费实施集成现有工具并获取数据权利，待真实井开始产出后再加入计划与实际对比的对标分析。
  notYet:
  - 在产品尚未在美国西部许可和地质环境中验证前就进行国际扩张。
  - 电站运维、调度优化或电网交易软件。
  - 在对标数据尚未建立可信度之前就打造广泛的承包商市场。
market:
  tam: $36.0M
  sam: $8.0M
  som: $1.8M
  segments:
  - 处于资源评价或首个商业化井场设计阶段的北美增强型地热开发商。
  - 参与同一批项目的钻井承包商、基础设施投资者和贷款方。
  buyingProcess: 销售应从地下资源负责人或钻井副总裁切入，但只有当 CTO 或首席开发官认可该工作流能改善正在进行的资源评价或融资流程时，交易才会真正成交。采购还需要技术验证、与现有工具的互操作能力，以及对对标数据权利的明确约定。
product:
  mvp: 第一版应覆盖机会录入、DOE 与客户数据标准化、按风险排序的目标筛选、候选井轨迹规划、许可叠图、协作历史，以及输出融资就绪的钻井备忘录。它不应承诺自动化井设计，而应让专家判断更快、更可追溯、更易被证明合理。
  sixMonth: 在一个盆地内导入 DOE 与客户数据集，支持 Petrel 和 DecisionSpace 的导入导出，生成适合贷方审阅的备忘录模板，并完成两个付费场址项目试点。
  twelveMonth: 增加钻井及早期产量数据的计划与实际对比接入、承包商与成本对标视图，以及适用于美国西部项目的盆地特定许可与诱发地震检查清单。
  twentyFourMonth: 扩展到多盆地对标、可复用的融资审查资料包，以及支持续约和跨项目扩张的承包商绩效比较。
  keyBets:
  - 在要求统计上足够强的预测模型之前，客户会先为压缩工作流和提升融资就绪度买单。
  - 只要能与现有油田工具互操作，就足以切入客户栈，而无需“推倒重来”式替换。
  - 钻后遥测数据权利可以通过试点和续约谈下来。
gtm:
  wedge: 销售一套面向临近资源评价或首个商业化井场决策的地热场址规划与贷方备忘录工作流。
  channels:
  - 由创始人主导，直接销售给美国西部 EGS 开发商。
  - 与已深度参与场址规划工作的地热顾问和钻井承包商建立转介和实施合作。
  - 通过 DOE 试点网络和项目融资顾问，以信誉背书驱动客户引荐。
  funnelTargets: 外呼或转介介绍到合格发现 30%+，合格发现到付费试点 25%+，付费试点到年度正式合同 60%+，首个场址续约 80%+。
  pricing: 单个场址项目收取 $75k-$150k 的付费试点或实施费，随后转化为每个活跃场址 $300k-$450k 的年度订阅费，外加监测井分析高级模块；定价依据是节省的顾问费用和缩短的尽调周期。
businessModel:
  revenueStreams:
  - 按活跃场址项目收取年度订阅费。
  - Implementation and data-onboarding fees.
  - 高级对标与监测井分析模块。
  unitOfValue: 处于规划或早期钻井阶段的活跃场址开发项目。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在首个正式生产部署后增加对标与融资审查模块。
  - 从开发商团队扩展到参与同一项目的贷款方、保险方和钻井合作伙伴。
  - 将盆地特定数据模型复用于更多北美地热项目。
strategyMap:
  northStarMetric: 签署年度合同的活跃商业化井场或资源评价项目数。
  inputMetrics:
  - 与正在进行的场址开发或融资事件相关的合格商机。
  - 每半年启动的付费试点数。
  - 试点转年度合同的转化率。
  - 授予可复用匿名化数据权利的试点占比。
  - 相较现有工作流，备忘录生成时间的缩短幅度。
  moatsToBuild:
  - 专有的井与产量“计划-实际”对标数据集。
  - 适合贷方审阅的地热备忘录与融资审查清单档案。
  - 嵌入客户流程的盆地特定许可与诱发地震工作流模板。
  killCriteria:
  - 创始人主导销售 12 个月后，签下的付费试点少于 3 个。
  - 授予可用匿名化对标权利的试点客户比例低于 50%。
  - 前 4 个试点结束后，试点转年度合同的转化率低于 40%。
  - 相较现状，备忘录准备周期没有可测得的至少 30% 缩短。
  mermaid: "flowchart LR\n  Wedge[首个商业化井场规划工作流] --> MVP[目标排序 + 贷方备忘录 MVP]\n  MVP --> Proof[付费试点与更短尽调周期]\n  Proof --> Expansion[对标、融资审查与承包商比较]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 痛点强烈、时机可信，但买方群体规模和数据权利护城河尚未被验证到足以进入合伙人会议。
    whyBelieve: 钻井经济性、DOE 数据可得性以及 Fervo 带动的融资动能，共同为标准化首个井场规划和融资审查的软件创造了真实窗口。
    whyDoubt: 初始市场规模仅以数十个项目计，如果初创公司无法拿到专有钻后数据，现有厂商或顾问就能吸收这项工作。
    nextDiligence: 通过 10 次买方访谈和至少 2 个付费设计合作伙伴承诺，验证支付意愿、数据权利条款和试点转化率。
  firstCustomer:
    title: 进入首个商业化井场设计阶段的美国西部 EGS 开发商。
    profile: 拥有试验井数据、即将进入资源评价或融资关口，并具备与公用事业或超大规模客户承购相关路径的风投支持型或项目支持型开发商。
    trigger: 场址开发投资决策、DOE 支持的试点扩张，或首个多井商业化井场的贷款方尽调流程。
    buyer: CTO 或首席开发官
    initialContract: 围绕单个场址项目收取 $75k-$150k 的试点或实施费用，一旦工作流进入正式生产规划阶段，则转为 $300k-$450k 的年度订阅。
  mustBeTrue:
  - 未来 24 个月内，至少有 10 个北美地热项目会面临首个商业化井场或同等级别的资源评价决策。
  - 买方会愿意为一款在不替换现有解释工具的前提下缩短规划和融资审查周期的软件，支付至少 $300k 的年化费用。
  - 至少一半的早期客户会授予将井的计划-实际数据匿名化用于对标的权利。
  - 贷款方、公用事业公司或内部投资委员会会认可标准化备忘录工作流明显优于定制顾问资料包。
  - Halliburton、SLB 以及顾问主导的替代方案，无法在足够短时间内补上地热专用工作流差距，从而阻断前 5 个灯塔客户。
  diligenceQuestions:
  - 未来 12 到 24 个月内，哪些地热开发商会有正在发生的首个井场决策？
  - 这些团队目前每个场址项目在顾问、内部人力和现有软件上的支出分别是多少？
  - 在试点合同中究竟能拿到哪些数据权利，匿名化条款又是什么？
  - 贷款方或基础设施顾问目前对地热项目已经要求哪些融资材料？
  - 在客户实施中，实现 Petrel 与 DecisionSpace 互操作到底有多难？
  riskHeatmap:
  - risk: 短期买方群体过小，不足以支撑高效率的风险投资级增长。
    likelihood: 高
    impact: 高
    leadingIndicator: 未来 24 个月内，被识别出的可信北美首个井场或资源评价项目少于 10 个。
    mitigation: 先赢下开发商灯塔客户，再扩展到同一项目中的贷款方、保险方和钻井方等相邻买方席位。
  - risk: 客户拒绝共享钻后数据，导致无法建立对标护城河。
    likelihood: 高
    impact: 高
    leadingIndicator: 试点合同红线删掉匿名化对标权利，或把数据访问限制为静态导出。
    mitigation: 把数据权利条款纳入初始试点定价，并提供清晰的匿名化、对标回馈和客户可控权限机制。
  - risk: 在初创公司建立验证之前，现有油田套件或顾问已打包推出地热模板。
    likelihood: 中
    impact: 高
    leadingIndicator: 买方在进行中的项目中反馈，新的地热专用 DecisionSpace、Petrel 或顾问工作流已足以作为替代方案。
    mitigation: 差异化应建立在地热专用贷方输出、部署速度和跨项目对标数据上，而不是单纯的建模广度。
  - risk: 许可或诱发地震相关延迟会推迟项目进度，并延后软件预算。
    likelihood: 中
    impact: 中
    leadingIndicator: 由于盆地特定监管问题，合格商机推迟超过 2 个季度。
    mitigation: 将销售管道聚焦于已绑定融资或资源评价里程碑的项目，并把许可和地震相关工作流编码进产品。
operatingAssumptions:
- assumption: 在产品尚未具备广泛预测性对标能力前，买方就会为付费试点买单。
  basis: research.yaml
  validationTest: 在 90 天内，以“备忘录生成 + 压缩工作流”的价值主张而非模型准确性承诺，签下 2 个付费试点。
  decisionImpact: 若该假设不成立，应将产品收窄为顾问增强型软件，或在投入完整平台工程前先缩小范围。
- assumption: 可信的年度合同价格可以落在每个活跃场址项目 $300k-$450k 的区间。
  basis: idea.yaml
  validationTest: 从活跃开发商处收集 5 个预算基准，并获得至少 3 个高于 $250k 年化价格的口头确认。
  decisionImpact: 若该假设不成立，公司就必须扩大服务收入、降低烧钱速度，或更早转向相邻买方预算。
- assumption: 钻后遥测和产量数据权利可以从早期客户那里谈下来。
  basis: research.yaml
  validationTest: 至少从 2 个客户处拿到已签署的试点条款，授予对计划、钻井和早期产量数据进行匿名化对标使用的权利。
  decisionImpact: 若该假设不成立，可防御性会减弱，路线图应优先强调工作流效用而非数据网络效应。
- assumption: 与 Petrel 和 DecisionSpace 的互操作能力足以避免“大拆大换”式阻力。
  basis: research.yaml
  validationTest: 使用真实客户数据完成 2 次导入和 2 次导出，且每个项目的人工返工不超过一天。
  decisionImpact: 若该假设不成立，实施成本会上升，公司可能需要更强的服务能力或改换产品切入口。
- assumption: 美国西部首个井场滩头市场足够大，能支撑 5 个灯塔客户。
  basis: 运营方判断
  validationTest: 建立至少覆盖 12 个目标项目的账户地图，标明具体买方、触发日期和当前替代工作流。
  decisionImpact: 若该假设不成立，公司应更早扩展到相邻地热细分领域或更广泛的地下资源可融资性工作流。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 建立账户地图，并与美国西部 EGS 开发商及融资相关方进行 10 次结构化买方访谈。
  hypothesis: 正在发生的资源评价或融资事件足以形成紧迫感，支持围绕规划和备忘录生成的试点付费。
  successMetric: 10 个买方中有 6 个确认未来 12 个月存在真实触发事件，且其中 2 个同意付费试点方案。
  owner: CEO
- horizon: 0–90 天
  experiment: 基于一条“公开数据 + 客户数据”工作流，做出适合贷方审阅的钻井备忘录导出原型。
  hypothesis: 在不宣称全面预测优势的前提下，备忘录生成是最快证明价值的路径。
  successMetric: 试点用户认为该输出足以替代至少一次顾问或内部备忘录制作周期。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 在美国西部一个盆地内交付 2 个付费试点，并实现与 Petrel 或 DecisionSpace 的互操作。
  hypothesis: 如果产品能嵌入现有地下资源工作流而非要求替换，买方就会采纳。
  successMetric: 完成 2 个试点，实施时间均少于 2 周，并实现 1 个年度合同转化。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 将匿名化数据权利条款谈入所有试点合同。
  hypothesis: 客户会用对标数据权利来换取折扣试点价格和比较分析能力。
  successMetric: 至少 50% 的已签试点包含可复用的匿名化数据权利，可用于计划-实际对标。
  owner: CEO
- horizon: 180–360 天
  experiment: 利用试点和公开来源的计划-实际数据，推出承包商与成本对标视图。
  hypothesis: 对标能力能在初始备忘录工作流之外，创造续约和扩张杠杆。
  successMetric: 有 2 个客户在续约或第二场址扩张决策中使用对标视图。
  owner: Product lead
- horizon: 180–360 天
  experiment: 与地热顾问或钻井承包商正式建立 2 个渠道合作关系。
  hypothesis: 已嵌入技术工作流的合作伙伴可以降低获客成本并提升实施速度。
  successMetric: 来自合作伙伴的 2 个有效商机，以及通过渠道成交的 1 个付费试点。
  owner: CEO
operations:
- 维护一条受治理的地热数据管线，区分公开输入、客户机密图层和匿名化对标输出。
- 围绕单一盆地模板、单一备忘录模板和明确的每周实施节奏，标准化试点交付。
- 在任何定制工作开始前，先以合同条款明确数据权利、对标使用权限和模型责任边界。
- 建立面向顾问和钻井方的合作伙伴运营模式，在奖励导入试点的同时，不让公司沦为依赖转售商的服务型企业。
team:
- role: 创始工程师
  startTiming: 第 0 月
  rationale: 负责首批试点所需的数据管线、工作流应用和现有工具互操作。
- role: 地热领域负责人
  startTiming: 第 0 月
  rationale: 将地下资源与钻井工作流转化为可信的产品逻辑，并协助拿下技术型买方。
- role: CEO
  startTiming: 第 0 月
  rationale: 负责创始人主导的企业销售、定价验证、合作伙伴拓展，以及围绕数据权利的试点合同谈判。
- role: 产品与实施负责人
  startTiming: 第 6 月
  rationale: 把定制试点工作沉淀为可重复的客户导入、盆地模板和可支持续约的对标工作流。
milestones:
- horizon: 0–12 个月
  items:
  - 在美国西部签下 2 个付费试点客户。
  - 交付具备备忘录导出与现有工具互操作能力的盆地专用 MVP。
  - 至少将 1 个试点转化为年度正式合同。
  - 至少从 1 个客户处拿到匿名化数据权利。
- horizon: 12–24 个月
  items:
  - 实现 5 个活跃场址项目签约。
  - 推出计划-实际对标视图和承包商比较模块。
  - 建立 2 个可复制的转介或实施合作关系。
  - 在首个年度客户合同上验证续约。
- horizon: 24–36 个月
  items:
  - 扩展到美国西部多个盆地及相邻金融侧用户。
  - 构建覆盖至少 10 个场址项目的可复用融资审查数据集。
  - 证明对标驱动的扩张收入能够超越最初的规划席位。
risks:
- risk: 短期买方群体过小，不足以支撑高效率的风险投资级增长。
  likelihood: 高
  impact: 高
  mitigation: 聚焦临近发生的首个井场事件，再扩展到绑定同一工作流的贷款方、保险方和钻井伙伴。
- risk: 客户拒绝共享钻后数据，导致无法建立对标护城河。
  likelihood: 高
  impact: 高
  mitigation: 从首份合同开始，就把折扣和高级分析与匿名化数据权利条款绑定起来。
- risk: 在初创公司建立验证之前，现有油田套件或顾问已打包推出地热模板。
  likelihood: 中
  impact: 高
  mitigation: 靠地热专用融资审查输出、部署速度和持续累积的对标数据取胜，而不是依赖大而全的建模覆盖。
- risk: 许可或诱发地震相关延迟会推迟项目进度，并延后软件预算。
  likelihood: 中
  impact: 中
  mitigation: 瞄准已进入资源评价或融资关口的机会，并把盆地特定合规工作流编码进产品。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 为 18 个月的产品研发、领域招聘、创始人主导销售和试点交付提供资金，以实现 2 个付费试点、1 到 2 个年度正式合同，以及首个可复用对标数据集。
