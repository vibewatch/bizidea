slug: geothermal-well-design-os
date: 2026-04-26
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-05"
    unit: month
    source: "[BP date 2026-04-26] 模型从下一个月开始"
  - id: A2
    name: 融资前期初现金
    value: "$0"
    unit: USD
    source: "保守的创业公司融资假设；模型将本轮融资视为在 M1 完成"
  - id: A3
    name: 模型开始时的 pre-seed 融资
    value: "$2.0M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M] 按已给区间下限建模"
  - id: A4
    name: 期初付费场地项目数
    value: "0"
    unit: count
    source: "[BP executiveSummary + milestones] 模型起点未描述任何在营客户"
  - id: A5
    name: 每个活跃付费场地项目的混合年度收入
    value: "$420K"
    unit: USD per customer-year
    source: "[BP gtm pricing $300k-$450k annual] 取中位略偏上的混合值，同时落在 [research bottomUpSizingDrivers $0.36M-$0.60M] 区间内"
  - id: A6
    name: 每个活跃付费场地项目的混合月收入
    value: "$35K"
    unit: USD per customer-month
    source: "由 A5 推导"
  - id: A7
    name: 基准情景客户爬坡
    value: "M12 达到 2 个活跃项目，M24 达到 5 个，M36 达到 6 个"
    unit: count
    source: "[BP milestones] 12 个月内 2 个付费试点、12-24 个月内 5 个活跃场地项目；[research SOM] 第三年可触达份额为 5 个灯塔项目"
  - id: A8
    name: 经营模型中的显式流失
    value: "基准情景下到 Y3 没有 logo 流失"
    unit: count
    source: "在样本极小的情况下采用保守建模；流失不在基准情景里做小数化处理，而放到 downside 和 sensitivity 中测试"
  - id: A9
    name: 稳态毛利率目标
    value: "70%"
    unit: percent
    source: "[BP businessModel targetGrossMarginPct]"
  - id: A10
    name: COGS 占收入比例
    value: "30%"
    unit: percent
    source: "由 A9 推导"
  - id: A11
    name: LTV 计算使用的月流失率
    value: "1.5%"
    unit: percent
    source: "在拿到首轮续约数据前，采用种子期企业垂直 SaaS 经验值"
  - id: A12
    name: 每新增一个场地项目客户的 CAC
    value: "$147K"
    unit: USD per customer
    source: "由 M24 前的销售与市场费用模型值 ($734.4K) 除以累计赢得的 5 个客户推导"
  - id: A13
    name: 平均初始销售周期
    value: "6 months"
    unit: months
    source: "[BP market buyingProcess + gtm funnelTargets] 技术验证和采购摩擦意味着这是较长的企业销售周期"
  - id: A14
    name: CEO 全额现金薪酬
    value: "$216K"
    unit: USD per year
    source: "创业公司薪酬经验值：$180K 现金 + 20% 薪资税和福利负担"
  - id: A15
    name: 创始工程师全额现金薪酬
    value: "$216K"
    unit: USD per year
    source: "创业公司薪酬经验值：$180K 现金 + 20% 薪资税和福利负担"
  - id: A16
    name: 地热领域负责人全额现金薪酬
    value: "$228K"
    unit: USD per year
    source: "面向稀缺地热/钻井人才的创业公司薪酬经验值：$190K 现金 + 20% 负担"
  - id: A17
    name: 产品与实施负责人入职时点及全额现金薪酬
    value: "M7 at $192K"
    unit: USD per year
    source: "[BP team] 该岗位约在第 6 个月开始；薪酬按 $160K 现金 + 20% 负担估算"
  - id: A18
    name: 额外工程师入职时点及全额现金薪酬
    value: "M10 at $204K"
    unit: USD per year
    source: "[BP product sixMonth/twelveMonth interoperability roadmap] 加上创业公司薪酬经验值：$170K 现金 + 20% 负担"
  - id: A19
    name: 销售与合作负责人入职时点及全额现金薪酬
    value: "M13 at $180K"
    unit: USD per year
    source: "[BP milestones + gtm channels] 首批付费试点后再招；薪酬按 $150K 现金 + 20% 负担估算"
  - id: A20
    name: 基准分析师 / 客户成功负责人入职时点及全额现金薪酬
    value: "M16 at $156K"
    unit: USD per year
    source: "[BP product twelveMonth benchmark views] 加上创业公司薪酬经验值：$130K 现金 + 20% 负担"
  - id: A21
    name: 薪资在各职能间的分摊
    value: "CEO 60% S&M / 40% G&A; domain lead 80% R&D / 20% S&M; product lead 60% R&D / 40% G&A; benchmark analyst 40% R&D / 60% G&A"
    unit: allocation
    source: "为将团队角色映射到 P&L 职能而采用的建模经验值"
  - id: A22
    name: 非薪酬 R&D 支出
    value: "$5K/mo in Y1, $6K/mo in Y2, $7K/mo in Y3"
    unit: USD per month
    source: "种子期软件公司的经验值，用于覆盖云、开发工具和数据处理开销"
  - id: A23
    name: 非薪酬销售与市场支出
    value: "$7K/mo in Y1, $10K/mo in Y2, $12K/mo in Y3"
    unit: USD per month
    source: "创始人主导企业 GTM 的经验值，用于差旅、行业活动和销售工具"
  - id: A24
    name: 非薪酬 G&A 支出
    value: "$9K/mo in Y1, $10K/mo in Y2, $12K/mo in Y3"
    unit: USD per month
    source: "创业公司运营经验值，用于法务、会计、行政软件和保险"
  - id: A25
    name: 现金流简化方法
    value: "Cash movement equals financing plus EBITDA"
    unit: method
    source: "未建模债务、capex、税项或营运资金时点；对早期公司来说这是可接受的简化"
  - id: A26
    name: 下一轮融资证明点
    value: "5 active field programs, first renewal, benchmark module live, and data-rights evidence by month 24"
    unit: milestone
    source: "[BP milestones 12-24 months and 24-36 months]"
