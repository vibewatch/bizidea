modelDiagram:
  title: 单元经济性流转
  mermaid: "flowchart LR\n  Leads[合格商机] --> ClosedWon[活跃场址项目]\n  ClosedWon --> Revenue[订阅与试点收入]\n  Revenue --> COGS[托管、数据、导入实施]\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Opex[R&D + S&M + G&A]\n  Opex --> Cash[期末现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下，Y3 通过拿下 6 个活跃场址项目、实现综合 $420K ACV，收入达到 $2.31M；这与 BP 定价区间和第 2 年达到 5 个活跃项目的里程碑一致。
- checkName: 必须做对
  finding: 公司必须在第 10 个月前签下前 2 个付费项目，并在第 24 个月前将这一验证转化为 5 个签约项目，因为该模型无法支撑长期零收入的产品建设。
- checkName: 模型失效条件
  finding: 如果 ACV 被压缩到 $360K，或销售周期拉长至接近 9 个月，则下行情景下公司会在盈亏平衡前出现现金为负，pre-seed 轮资金也无法覆盖首次续约里程碑。
- checkName: 下一轮融资验证
  finding: 当团队拥有 5 个活跃项目、1 次续约、对标数据权利，以及证明对标模块能把 Y3 推向上行情景的证据时，下一轮融资才具备充分依据。
sanityChecks:
  ruleOf40: Y3 growth 37.5% + EBITDA margin -6.4% = 31.1%
  burnMultiple: 以 EBITDA 作为净烧钱替代指标并除以净新增 ARR 估算，Y2 约为 0.4x，Y3 约为 0.4x。
  revenuePerFte: $330K Y3 (benchmark $200–400K SaaS)
  flags:
  - 基准情景假设到 Y3 没有已实现的客户流失，因为样本过小，无法清晰建模分数化续约；流失风险转而在单元经济性、敏感性分析和下行情景中处理。
  - 该业务到 Y3 仍略为 EBITDA 负值，因此种子轮故事更依赖灯塔客户质量和续约验证，而非独立盈利能力。
  - Y3 达到 6 个活跃项目意味着对约 20 个项目规模的北美 SAM 已有显著渗透，因此错失灯塔客户会实质性削弱下一轮融资叙事。
  - 现金流被简化为 EBITDA，未建模税项、资本开支或营运资金时序；这在 pre-seed 阶段可以接受，但应在定价种子轮前升级。
