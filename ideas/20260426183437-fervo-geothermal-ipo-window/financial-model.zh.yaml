    baseCase: "Hire to milestone timing"
    upsideCase: "Delay one non-core hire until after first renewal"
    y3RevenueImpactK: 0.0
    cashImpactK: -168.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads[合格机会] --> ClosedWon[活跃场地项目]
      ClosedWon --> Revenue[订阅与试点收入]
      Revenue --> COGS[托管、数据、实施]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Opex[R&D + S&M + G&A]
      Opex --> Cash[期末现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景下，Y3 收入达到 $2.31M，来源是 6 个活跃场地项目乘以混合 $420K ACV，这与 BP 定价区间以及第 2 年实现 5 个活跃项目的里程碑一致。
  - checkName: 必须做对的事
    finding: 公司必须在第 10 个月前拿下前 2 个付费项目，并在第 24 个月前把这份证明扩展成 5 个签约项目，因为模型撑不起长时间零收入的产品建设期。
  - checkName: 模型会失效的情况
    finding: 如果 ACV 压缩到 $360K，或销售周期拉长到 9 个月，downside 情景下公司会在盈亏平衡前现金转负，pre-seed 轮就撑不到首轮续约证明点。
  - checkName: 下一轮融资证明点
    finding: 当团队拿到 5 个活跃项目、至少一次续约、基准数据权，并证明基准模块能把 Y3 推向 upside 情景时，下一轮融资才更站得住。
sanityChecks:
  ruleOf40: "Y3 growth 37.5% + EBITDA margin -6.4% = 31.1%"
  burnMultiple: "Approx. 0.4x in Y2 and 0.4x in Y3 using EBITDA as a proxy for net burn divided by net new ARR."
  revenuePerFte: "$330K Y3 (benchmark $200–400K SaaS)"
  flags:
    - 基准情景假设到 Y3 没有实际 logo 流失，因为样本太小，不适合干净地建模分数化续约；相关风险已在单位经济、敏感性和 downside 中处理。
    - 业务到 Y3 仍略为 EBITDA 负值，因此种子轮故事更依赖灯塔客户质量和续约证明，而不是独立盈利能力。
    - Y3 达到 6 个活跃项目，意味着已吃下约 20 个北美 SAM 项目中的相当份额，因此错失灯塔客户会明显削弱下一轮融资故事。
    - 现金流简化为 EBITDA，未建模税项、capex 或营运资金时点；对 pre-seed 阶段来说可以接受，但在正式 seed 融资前应升级。
