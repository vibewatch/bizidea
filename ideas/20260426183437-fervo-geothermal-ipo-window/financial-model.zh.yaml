slug: geothermal-well-design-os
date: 2026-04-26
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-05"
    unit: month
    source: "[BP date 2026-04-26] 模型从次月起算"
  - id: A2
    name: 融资前期初现金
    value: "$0"
    unit: USD
    source: "保守的初创融资启发式假设；模型假设本轮融资于 M1 完成交割"
  - id: A3
    name: 模型起始时的 pre-seed 融资额
    value: "$2.0M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M] 按区间低端建模"
  - id: A4
    name: 起始付费区块项目数
    value: "0"
    unit: count
    source: "[BP executiveSummary + milestones] 模型起始时无在手客户"
  - id: A5
    name: 每活跃付费区块项目的混合年收入
    value: "$420K"
    unit: USD per customer-year
    source: "[BP gtm pricing $300k-$450k annual] 偏中值混合，落在 [research bottomUpSizingDrivers $0.36M-$0.60M] 区间内"
  - id: A6
    name: 每活跃付费区块项目的混合月收入
    value: "$35K"
    unit: USD per customer-month
    source: "由 A5 推导"
  - id: A7
    name: 基准情形客户增长节奏
    value: "M12 达 2 个活跃项目，M24 达 5 个，M36 达 6 个"
    unit: count
    source: "[BP milestones] 12 个月内签 2 个付费试点，12–24 个月内达 5 个活跃区块项目；[research SOM] 第 3 年可及份额为 5 个灯塔项目"
  - id: A8
    name: 运营模型中的显式流失
    value: "基准情形下 Y3 前无客户流失"
    unit: count
    source: "针对极小样本量的保守建模选择；流失风险通过下行情景和敏感性分析处理，而非强行拆分分数客户"
  - id: A9
    name: 稳态毛利率目标
    value: "70%"
    unit: percent
    source: "[BP businessModel targetGrossMarginPct]"
  - id: A10
    name: 收入中的 COGS 占比
    value: "30%"
    unit: percent
    source: "由 A9 推导"
  - id: A11
    name: LTV 计算用月流失率
    value: "1.5%"
    unit: percent
    source: "种子阶段企业垂直 SaaS 启发式假设，待首次续约数据后校准"
  - id: A12
    name: 每个新区块项目客户的 CAC
    value: "$147K"
    unit: USD per customer
    source: "由 M24 前模拟的 S&M 支出（$734.4K）除以 5 个累计赢单推导"
  - id: A13
    name: 平均初始销售周期
    value: "6 months"
    unit: months
    source: "[BP market buyingProcess + gtm funnelTargets] 技术验证和采购摩擦意味着较长的企业销售周期"
  - id: A14
    name: CEO 含税现金薪酬
    value: "$216K"
    unit: USD per year
    source: "初创薪酬启发式：$180K 现金加 20% 薪资税和福利负担"
  - id: A15
    name: 创始工程师含税现金薪酬
    value: "$216K"
    unit: USD per year
    source: "初创薪酬启发式：$180K 现金加 20% 薪资税和福利负担"
  - id: A16
    name: 地热领域负责人含税现金薪酬
    value: "$228K"
    unit: USD per year
    source: "针对稀缺地热/钻探人才的初创薪酬启发式：$190K 现金加 20% 负担"
  - id: A17
    name: 产品与实施负责人入职时间及含税现金薪酬
    value: "M7 入职，$192K"
    unit: USD per year
    source: "[BP team] 职位约在第 6 个月启动；薪酬按 $160K 现金加 20% 负担"
  - id: A18
    name: 追加工程师入职时间及含税现金薪酬
    value: "M10 入职，$204K"
    unit: USD per year
    source: "[BP product sixMonth/twelveMonth interoperability roadmap] 加初创薪酬启发式：$170K 现金加 20% 负担"
  - id: A19
    name: 销售与合作负责人入职时间及含税现金薪酬
    value: "M13 入职，$180K"
    unit: USD per year
    source: "[BP milestones + gtm channels] 首批付费试点后入职；薪酬按 $150K 现金加 20% 负担"
  - id: A20
    name: 基准分析师/客户成功入职时间及含税现金薪酬
    value: "M16 入职，$156K"
    unit: USD per year
    source: "[BP product twelveMonth benchmark views] 加初创薪酬启发式：$130K 现金加 20% 负担"
  - id: A21
    name: 薪酬跨职能分配
    value: "CEO 60% S&M / 40% G&A；领域负责人 80% R&D / 20% S&M；产品负责人 60% R&D / 40% G&A；基准分析师 40% R&D / 60% G&A"
    unit: allocation
    source: "将团队角色映射到 P&L 职能的建模启发式"
  - id: A22
    name: 非薪酬 R&D 支出
    value: "$5K/mo in Y1, $6K/mo in Y2, $7K/mo in Y3"
    unit: USD per month
    source: "云服务、开发工具和数据处理开销的种子阶段软件启发式"
  - id: A23
    name: 非薪酬销售与市场支出
    value: "$7K/mo in Y1, $10K/mo in Y2, $12K/mo in Y3"
    unit: USD per month
    source: "出行、行业会议和销售工具的创始人主导企业 GTM 启发式"
  - id: A24
    name: 非薪酬 G&A 支出
    value: "$9K/mo in Y1, $10K/mo in Y2, $12K/mo in Y3"
    unit: USD per month
    source: "法务、会计、管理软件和保险的初创运营启发式"
  - id: A25
    name: 现金流简化处理
    value: "现金变动等于融资额加 EBITDA"
    unit: method
    source: "未建模债务、资本支出、税项或营运资金时序差异；在早期阶段属可接受的简化处理"
  - id: A26
    name: 下轮融资证明节点
    value: "第 24 个月前达到 5 个活跃区块项目、首次续约、基准模块上线并有数据权利证明"
    unit: milestone
    source: "[BP milestones 12-24 months and 24-36 months]"
