modelDiagram:
  title: 单位经济模型流向
  mermaid: |
    flowchart LR
      Leads[Qualified opportunities] --> ClosedWon[Active field programs]
      ClosedWon --> Revenue[Subscription and pilot revenue]
      Revenue --> COGS[Hosting, data, onboarding]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Opex[R&D + S&M + G&A]
      Opex --> Cash[Ending cash]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形下，Y3 以 6 个活跃区块项目、混合 ACV $420K 实现 $2.31M 收入，与 BP 定价区间一致，也与第 2 年 5 个活跃项目的里程碑吻合。
  - checkName: 必须做对的事
    finding: 公司必须在第 10 个月前关闭前 2 个付费项目，并将这一证明转化为第 24 个月前的 5 个签约项目——模型无法支撑漫长的无收入产品构建阶段。
  - checkName: 模型会失效的情况
    finding: 若 ACV 压缩至 $360K 或销售周期拉长至 9 个月，下行情景现金将在达到盈亏平衡前转负，pre-seed 融资将不足以覆盖首次续约里程碑。
  - checkName: 下轮融资证明节点
    finding: 当团队拥有 5 个活跃项目、一次续约、基准数据权利，以及基准模块有望将 Y3 推向上行情景的证据时，方可合理支撑下轮融资。
sanityChecks:
  ruleOf40: "Y3 增长率 37.5% + EBITDA 利润率 -6.4% = 31.1%"
  burnMultiple: "Y2 和 Y3 约 0.4x，以 EBITDA 作为净消耗率的代理，除以净新增 ARR。"
  revenuePerFte: "$330K Y3（SaaS 基准 $200–400K）"
  flags:
    - 基准情形假设 Y3 前无实际客户流失，因为样本量太小无法干净地对分数续约建模；流失风险通过单位经济模型、敏感性分析和下行情景处理。
    - Y3 的 EBITDA 仍轻微为负，因此种子情景更多依赖灯塔客户质量和续约证明，而非独立盈利能力。
    - Y3 末 6 个活跃项目意味着对约 20 个北美 SAM 项目的显著渗透，因此灯塔客户的任何失手都会实质性削弱下轮融资故事。
    - 现金流简化为 EBITDA，未建模税项、资本支出或营运资金时序差异——在 pre-seed 阶段可接受，但在启动定价种子轮之前应予升级。
