scenarios:
  downside:
    description: 试点大约延后一季度，实际 ACV 落到 $360K，毛利率因服务占比偏高只能维持在 65%。
    y3RevenueK: 1350.0
    y3EbitdaK: -886.5
    cashLowPointK: -908.5
    keyAssumptionChanges:
      - ACV 从 $420K 降到 $360K。
      - Y3 结束时活跃项目数只有 4 个，而不是 6 个。
      - 毛利率从 70% 降到 65%。
  base:
    description: 创始人主导销售在 Y1 拿下 2 个付费项目，Y2 扩到 5 个，Y3 以 $420K ACV 和 70% 毛利率结束于 6 个活跃项目。
    y3RevenueK: 2310.0
    y3EbitdaK: -147.0
    cashLowPointK: 550.0
    keyAssumptionChanges:
      - 活跃付费项目在 36 个月内从 0 增长到 6。
      - 混合 ACV 稳定在每个场地项目 $420K。
      - 毛利率维持在 BP 目标的 70%。
  upside:
    description: 首笔付费交易更早落地，基准增购把 ACV 抬到 $450K，公司到 Y3 达到 7 个活跃项目，且毛利率小幅改善。
    y3RevenueK: 2962.5
    y3EbitdaK: 369.0
    cashLowPointK: 1052.0
    keyAssumptionChanges:
      - ACV 从 $420K 升到 $450K。
      - Y3 结束时活跃项目数达到 7 个，而不是 6 个。
      - 毛利率从 70% 提升到 72%。
