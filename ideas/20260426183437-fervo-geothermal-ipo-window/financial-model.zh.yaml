scenarios:
  downside:
    description: 试点推迟约一个季度，实际 ACV 落在 $360K，毛利率因服务比重较高停留在 65%。
    y3RevenueK: 1350.0
    y3EbitdaK: -886.5
    cashLowPointK: -908.5
    keyAssumptionChanges:
      - ACV 从 $420K 降至 $360K。
      - Y3 末活跃项目数从 6 个缩减至 4 个。
      - 毛利率从 70% 降至 65%。
  base:
    description: 创始人主导销售在 Y1 关闭 2 个付费项目，Y2 扩展至 5 个，Y3 末以 $420K ACV 和 70% 毛利率完成 6 个活跃项目。
    y3RevenueK: 2310.0
    y3EbitdaK: -147.0
    cashLowPointK: 550.0
    keyAssumptionChanges:
      - 36 个月内活跃付费项目从 0 扩展至 6 个。
      - 混合 ACV 稳定在每区块项目 $420K。
      - 毛利率维持在 BP 目标的 70%。
  upside:
    description: 首笔付费交易提前完成，基准附加模块将 ACV 提升至 $450K，Y3 末达到 7 个活跃项目并实现边际毛利率改善。
    y3RevenueK: 2962.5
    y3EbitdaK: 369.0
    cashLowPointK: 1052.0
    keyAssumptionChanges:
      - ACV 从 $420K 提升至 $450K。
      - Y3 末活跃项目数从 6 个增至 7 个。
      - 毛利率从 70% 改善至 72%。
