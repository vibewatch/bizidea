    upsideCase: "$450K ACV"
    y3RevenueImpactK: -330.0
    cashImpactK: -434.0
  - variable: CAC
    downsideCase: "$200K per logo"
    baseCase: "$147K per logo"
    upsideCase: "$120K per logo"
    y3RevenueImpactK: 0.0
    cashImpactK: -265.0
  - variable: churn
    downsideCase: "2.5% monthly logo churn after first renewals"
    baseCase: "1.5% monthly heuristic"
    upsideCase: "1.0% monthly"
    y3RevenueImpactK: -315.0
    cashImpactK: -220.5
  - variable: sales cycle
    downsideCase: "9 months"
    baseCase: "6 months"
    upsideCase: "4 months"
    y3RevenueImpactK: -105.0
