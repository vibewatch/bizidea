jobsToBeDone:
- job: 在评估新的地热机会时，帮助地下资源团队完成目标排序并起草首版钻井方案，以判断是否投入开发资本。
  currentAlternative: 在顾问、公开数据资料库和通用岩土技术工具之间进行人工汇总
  successMetric: 从机会录入到形成可提交投资委员会的钻井资料包所需时间
- job: 在为商业化井场融资（债务或股权）时，帮助开发负责人产出可信的地热风险备忘录，以缩短尽调并更快完成交割。
  currentAlternative: 定制化顾问研究和基于电子表格的项目备忘录
  successMetric: 融资获批前外部尽调轮次的减少幅度
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 多条高质量来源共同指向：地热市场重新开放、数据中心需求紧迫、公共数据集更丰富，而钻井仍是主导瓶颈。
  painIntensity:
    score: 5
    rationale: 糟糕的井设计或薄弱的勘探资料包会直接破坏项目经济性并拖慢融资，因此这不是锦上添花的工具，而是关键任务工作流。
  wedgeClarity:
    score: 5
    rationale: 首个井场的井规划是一个边界清晰的工作流，用户明确、预算负责人清晰，且产品能替换具体产出物。
  defensibility:
    score: 4
    rationale: 护城河来自累积的地热设计结果与融资审查基准，但公司必须尽早获取专有数据访问权。
  ventureScale:
    score: 4
    rationale: 初始市场较为垂直，但一旦成功，可扩展为地热开发及相邻地下基础设施类别的默认运营层。
topRisks:
- name: 初始客户基础狭窄
  description: 处于商业阶段的 EGS 开发商仍然相对较少，可能拖慢早期营收增长。
  mitigation: 先拿下开发商中的灯塔客户，再向参与同一项目的钻井方、投资者和保险方销售相邻模块。
- name: 数据获取受限
  description: 如果缺少专有现场数据，仅靠公开数据集可能不足以超越现有工程工作流。
  mitigation: 以钻后监测和对标服务换取客户数据权利，并优先从公开数据已能减少人工工作的工作流切入。
- name: 现有工具重叠竞争
  description: 一旦地热软件预算变得清晰，油气软件供应商或大型服务公司可能快速调整其平台。
  mitigation: 围绕地热专用融资输出、与 DOE 相关的数据标准化以及现有厂商并不天然拥有的跨项目绩效基准实现差异化。
