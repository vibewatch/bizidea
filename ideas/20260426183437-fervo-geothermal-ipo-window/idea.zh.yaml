problem: >-
  增强型地热已在资本市场获得真实动能，公用事业商和数据中心的需求也已明朗，
  但每个新区块在钻探阶段依然高度定制化。DOE 指出钻探成本占项目总成本的一半以上，
  且盲系统（blind systems）的勘探和测试仍然昂贵。目前，开发商靠拼凑公共数据集、
  油气类比井、顾问报告和电子表格来决定打哪口井、如何向融资方交代这个选择。
targetUser:
  primary: 北美增强型地热开发商的钻探副总裁、地下工程负责人或储层工程团队
  secondary: 承销首口商业井的地热钻探承包商和基础设施投资人
  buyer: 首席技术官或首席开发官
startupThesis:
  nonObviousInsight: >-
    最大的解锁点不再是证明采购方想要地热电力。Fervo 的 IPO 步骤和 DOE
    的商业化工作表明，需求与资本涌入的速度，已超过了地热专业知识传播的速度。
    这让能重复的井身设计、勘探目标排序和可融资的钻探方案包，成为整个技术栈的新控制点。
  beachhead: 计划在传统热液田以外开发首个多井商业井台的北美 EGS 开发商
  wedge: 一个地热地下规划平台——整合 DOE 数据集、油气类比井、许可证图层和运营数据，输出排序后的钻探目标、候选井眼轨迹和面向融资方的钻探备忘录
  whyNowCatalyst: Fervo 的 S-1 和 DOE 的现场规模 EGS 试点，说明更多项目将立即寻求资本——而此时钻探设计仍是地热行业最昂贵、标准化程度最低的工作流程。
  ventureScalePath: 从 EGS 井规划的系统记录起步，逐步延伸至钻探采购基准、运营优化、项目融资承销，以及热储、共生井、锂盐水等邻近地下市场。
solution: >-
  产品接入地热数据库、远景平面图（play-fairway maps）、地球物理数据、偏移井测井记录、
  土地与许可证约束以及客户用电场景，对勘探目标进行筛选并设计初始井位方案。
  输出一个供地质、钻探和财务团队协同使用的工作空间，内含风险排序目标、拟定侧钻路径、
  预期成本区间，以及一份面向贷款方的数据室备忘录。
  开钻后，平台持续接入流量、温度和光纤传感数据，将实际表现与方案对比并指导下一个井台设计。
  随着时间推移，它将成为一个基准层——告诉市场哪些设计、承包商和盆地真正具备能重复性。
goToMarketSeed:
  firstCustomer: 美国西部风投支持的增强型地热开发商，拥有试验井数据且即将启动与公用事业商或数据中心签约的商业井台
  buyingTrigger: 新的区块开发决策、DOE 支持的试点扩展，或首个商业井台的项目融资流程
  currentAlternative: 内部储层工程，辅以油气石技术软件、外部地球科学顾问和基于电子表格的投资备忘录
  switchingReason: 该平台把数周的人工整合压缩为专属地热的工作流程，提升首口井的置信度，并产出通用油气工具无法提供的融资文件
  pricingHypothesis: 按活跃区块项目计费的年度订阅，加上实施费和监测井分析模块的溢价收费
whyNow:
  - point: 公开市场对增强型地热的信心正在回归，这将把新资本和新参与者引入一个仍缺乏标准化区块开发软件的赛道。
    signalRefs: [公开市场正向增强型地热重新开放]
    sourceRefs: [1, 2, 4]
  - point: 数据中心和公用事业商对全天候清洁电力的迫切需求，要求开发商从定制化试点转向能重复的商业钻探项目。
    signalRefs: []
    sourceRefs: [3, 6, 9, 16]
  - point: DOE 的数据库、远景平面分析和区域数据计划，意味着勘探与许可证输入数据终于以软件可操作的形式呈现。
    signalRefs: []
    sourceRefs: [7, 19, 20, 21]
  - point: 钻探仍主导地热经济，使井身设计与勘探目标排序成为技术栈中价值最高的软件切入点。
    signalRefs: [钻探与井身设计仍是主要瓶颈]
    sourceRefs: [4, 13, 15, 18, 24]
  - point: 公共试点和联邦合作正将 EGS 从研究推向可融资项目，提升了标准化尽职调查和承销输出的价值。
    signalRefs: [公共部门试点正在降低商业化风险]
    sourceRefs: [14, 20, 22]
differentiator: >-
  既有油气地下工具功能强大，但不针对地热热流假设、EGS 储层行为、地热许可证语境或项目融资工作流。
  顾问可以完成一次性研究，却无法在多个区块间构建持续更新的基准层。
  这家公司的胜出之道：把分散的公共地热数据和钻后运营反馈，转化为一个不断积累的设计与承销数据集。
