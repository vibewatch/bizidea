problem: >-
  增强型地热如今既有真实的资本市场动能，也有来自公用事业和数据中心的明确需求，但每一个新场地到了钻井阶段，仍然像定制项目一样难以复制。DOE 指出，钻井占项目成本一半以上，而隐伏地热系统的发现和验证依然昂贵。如今，开发商还在把公开数据、油气类比井、顾问意见和电子表格硬拼在一起，来决定该在哪里钻井，以及如何为首个商业化井场做承保。
targetUser:
  primary: 北美增强型地热开发商中的钻井副总裁、地下团队负责人或储层工程团队
  secondary: 为首个商业化井场做承保的地热钻井承包商和基础设施投资人
  buyer: CTO 或 Chief Development Officer
startupThesis:
  nonObviousInsight: >-
    现在最大的解锁点，已经不是证明买方想要地热电力。Fervo 的 IPO 动作和 DOE 的商业化推进都说明，需求和资本进入市场的速度，正在快过地热 know-how 的扩散速度。因此，可复制的井位设计、勘探优先级排序，以及可直接交给贷款方的钻井资料包，正在成为产业栈里新的控制点。
  beachhead: 计划在传统热液田之外建设首个多井商业化井场的北美 EGS 开发商
  wedge: 一个地热地下规划平台，把 DOE 数据集、油气类比井、许可图层和运营数据整合成钻井目标排序、候选井轨迹和可融资钻井备忘录
  whyNowCatalyst: Fervo 的 S-1 和 DOE 的场级 EGS 试点说明，未来会有更多项目开始融资，而钻井设计依然是地热里最贵、最不标准化的工作流。
  ventureScalePath: 先成为 EGS 井位规划的系统记录层，再扩展到钻井采购基准、运营优化、项目融资承保，以及热储能、伴生井和锂卤水等相邻地下市场。
solution: >-
  产品接入地热资料库数据、play-fairway 地图、地球物理数据、邻井测井、土地和许可约束，以及客户负载背景，用于筛选项目机会并设计初始井组方案。输出则是一个供地质、钻井和财务负责人协同的共享工作空间，包含按风险排序的目标、建议井眼路径、预期成本区间，以及可直接给贷款方的数据室备忘录。钻井开始后，平台再接入流量、温度和光纤传感数据，把实际表现与方案对比，反过来优化下一块井场设计。时间一长，它会变成行业基准层，告诉市场究竟哪些设计、承包商和盆地正在真正变得可复制。
goToMarketSeed:
  firstCustomer: 美国西部一家获风投支持的增强型地热开发商，既有试验井数据，又即将围绕公用事业或数据中心购电协议推进商业化井场
  buyingTrigger: 新场地开发决策、DOE 支持的试点扩建，或首个商业化井场的项目融资流程
  currentAlternative: 内部储层工程团队配合油气 petrotechnical 软件、外部地学顾问和基于表格的投资备忘录
  switchingReason: 该平台把原本需要数周的人工整合压缩成面向地热的专用工作流，既提升首井信心，也能产出通用油气工具做不到的融资材料
  pricingHypothesis: 按活跃场地项目收年订阅费，另收实施费，并对监测井分析收取高级模块费用
whyNow:
  - point: 增强型地热重新获得公共市场背书，会把新资金和新进入者拉进一个仍缺少标准化场地开发软件的赛道。
    signalRefs: [公共市场正重新向增强型地热开放]
    sourceRefs: [1, 2, 4]
  - point: 数据中心和公用事业正在急需全天候清洁电力，开发商必须从一次性试点，转向可复制的商业化钻井项目。
    signalRefs: [钻井与井位设计仍是主要瓶颈]
    sourceRefs: [3, 6, 9, 16]
  - point: DOE 的资料库、play-fairway 分析和区域数据项目，让勘探和许可输入终于以软件可直接调用的形式出现。
    signalRefs: [公共部门试点正在为商业化降风险]
    sourceRefs: [7, 19, 20, 21]
  - point: 钻井仍然主导地热经济模型，因此井位设计和勘探排序是整条栈里价值最高的软件切口。
    signalRefs: [钻井与井位设计仍是主要瓶颈]
    sourceRefs: [4, 13, 15, 18, 24]
  - point: 公共试点和联邦合作正把 EGS 从科研推向可融资项目，这会提高标准化尽调和承保输出的价值。
    signalRefs: [公共部门试点正在为商业化降风险]
    sourceRefs: [14, 20, 22]
differentiator: >-
  现有油气地下工具很强，但并不是为地热热流假设、EGS 储层行为、地热许可背景或项目融资工作流而生。顾问可以拼出一次性研究，但不会在不同场地之间沉淀出持续演进的基准层。这个公司真正的优势，是把分散的公共地热数据和钻后运营反馈，变成会不断复利的设计与承保数据集。
