problem: 增强型地热如今已具备真实的资本市场动能，并且获得了公用事业和数据中心的明确需求，但每一个新场址在钻井阶段仍然高度定制化。DOE 指出，钻井占项目成本的一半以上，而隐藏型系统的发现与测试成本仍然很高。如今，开发商仍需拼接公开数据集、油气类比、咨询顾问和电子表格，来决定在哪里钻井，以及如何为首个商业化井场完成融资审查。
targetUser:
  primary: 北美增强型地热开发商中的钻井副总裁、地下资源负责人或储层工程团队
  secondary: 为首个商业化井场做融资审查的地热钻井承包商和基础设施投资者
  buyer: CTO 或首席开发官
startupThesis:
  nonObviousInsight: 最大的突破口已不再是证明买方需要地热电力。Fervo 的 IPO 动作与 DOE 的商业化推进表明，需求和资本到来的速度快于地热 专业能力 的扩散速度。因此，可重复的井设计、勘探排序以及适合贷方审阅的钻井资料包，正在成为这条价值链中的新控制点。
  beachhead: 在传统水热田之外规划首个多井商业化井场的北美 EGS 开发商
  wedge: 一个地热地下资源规划平台，将 DOE 数据集、油气类比井、许可图层和运营数据整合为钻井目标排序、候选井轨迹以及融资就绪的钻井备忘录。
  whyNowCatalyst: Fervo 的 S-1 文件以及 DOE 的场站级 EGS 试点表明，会有更多项目在当前时点寻求资本，而钻井设计恰恰仍是地热领域成本最高、标准化程度最低的工作流。
  ventureScalePath: 先成为 EGS 井规划的记录系统，再扩展到钻井采购基准、运营优化、项目融资审查，以及热储能、伴生井和锂卤水等相邻地下资源市场。
solution: 产品将接入地热资料库数据、有利区带图、地球物理数据、邻井测井、土地与许可约束以及客户负荷背景，用于筛选潜在场址并设计初始井方案。它会为地质人员、钻井团队和财务负责人输出一个共享工作空间，其中包含按风险排序的目标、建议井轨迹、预期成本区间以及适合贷方审阅的数据室备忘录。钻井开始后，平台再接入流量、温度和光纤传感数据，对比实际表现与规划差异，并改进下一井场设计。长期来看，它将成为对标层，告诉市场哪些设计、承包商和盆地真正开始具备可重复性。
