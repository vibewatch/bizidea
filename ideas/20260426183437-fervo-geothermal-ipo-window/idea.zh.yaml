jobsToBeDone:
  - job: 当团队评估一个新的地热机会时，帮助地下团队给目标排序并起草首版钻井计划，以便判断是否要投入开发资本。
    currentAlternative: 在顾问、公共数据仓库和通用 petrotechnical 工具之间手工整合
    successMetric: 从接收项目到形成可提交投资委员会的钻井资料包所需时间
  - job: 当团队为商业化井场融资时，帮助开发负责人产出可信的地热风险备忘录，以便缩短尽调周期、更快完成交割。
    currentAlternative: 定制顾问研究和基于表格的项目备忘录
    successMetric: 融资获批前外部尽调轮次的减少幅度
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 多个高质量信源共同指向地热市场重启、数据中心需求紧迫、公共数据更丰富，以及钻井仍是主要瓶颈。
  painIntensity:
    score: 5
    rationale: 糟糕的井位设计或薄弱的勘探资料包会直接毁掉项目经济性并拖住融资，因此这不是可有可无的工具，而是关键工作流。
  wedgeClarity:
    score: 5
    rationale: 首个井场规划是一个用户明确、预算所有者明确、替代物也明确的狭窄工作流。
  defensibility:
    score: 4
    rationale: 护城河来自累积的地热设计结果与承保基准，但公司必须尽早拿到专有数据访问权。
  ventureScale:
    score: 4
    rationale: 初始市场很垂直，但如果做成，就有机会扩展为地热开发及相邻地下基础设施类别的默认运营层。
topRisks:
  - name: 初始客户群过窄
    description: 进入商业阶段的 EGS 开发商仍然不多，可能拖慢早期收入增长。
    mitigation: 先拿下开发商灯塔客户，再向同一项目中的钻井方、投资人和保险方销售相邻模块。
  - name: 数据获取受限
    description: 如果拿不到专有现场数据，仅靠公共数据集可能不足以明显优于现有工程工作流。
    mitigation: 以钻后监测和基准分析换取客户数据权，并优先从公共数据已能显著减少人工工作的环节切入。
  - name: 与现有工具重叠
    description: 一旦地热软件预算变得清晰，油气软件厂商或大型服务公司可能会迅速改造其平台。
    mitigation: 围绕地热专用融资输出、与 DOE 相关的数据标准化，以及现有厂商原生不掌握的跨项目表现基准来建立差异化。
