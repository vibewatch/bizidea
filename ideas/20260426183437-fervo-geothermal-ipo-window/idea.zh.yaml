jobsToBeDone:
  - job: 当评估新地热勘探目标时，帮助地下团队对靶区排序并起草首个钻探方案，让他们能够决定是否投入开发资本。
    currentAlternative: 跨顾问、公共数据库和通用石技术工具的人工整合
    successMetric: 从勘探目标录入到投资委员会可用钻探方案包所需的时间
  - job: 当为商业井台募集债权或股权时，帮助开发负责人出具一份可信的地热风险备忘录，以缩短尽调周期、加快完成融资交割。
    currentAlternative: 顾问定制研究和基于电子表格的项目备忘录
    successMetric: 融资审批前外部尽调轮次的减少量
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 多个高质量来源共同指向地热市场的重新开放、数据中心端的迫切需求、更丰富的公共数据集，以及钻探作为主导瓶颈的核心地位。
  painIntensity:
    score: 5
    rationale: 糟糕的井身设计或薄弱的勘探方案可能摧毁项目经济性并阻断融资，使这一工作流成为关键任务，而非可有可无的工具。
  wedgeClarity:
    score: 5
    rationale: 首台商业井台规划是一个边界清晰的工作流——有已知用户、明确的预算 owner，以及产品可以直接替代的特定交付物。
  defensibility:
    score: 4
    rationale: 护城河来自积累的地热设计成果和承销基准数据，但公司必须在早期赢得专有数据的访问权。
  ventureScale:
    score: 4
    rationale: 初始市场较为专业化，但成功后可扩展为地热开发和邻近地下基础设施赛道的默认运营层。
topRisks:
  - name: 初期客户群体规模有限
    description: 商业阶段的 EGS 开发商目前数量仍然偏少，可能拖慢早期收入增长。
    mitigation: 先赢下灯塔客户，再向参与同一项目的钻探商、投资人和保险商销售周边模块。
  - name: 数据获取受限
    description: 仅凭公共数据集可能不足以在不获取专有区块数据的情况下超越既有工程工作流。
    mitigation: 以钻后监测和基准服务换取客户数据授权，并优先从公共数据已能减少人工工作量的工作流切入。
  - name: 既有工具竞争重叠
    description: 一旦地热软件预算变得可见，油气软件厂商或大型服务公司可能改造其平台。
    mitigation: 围绕地热专属的融资输出、DOE 关联数据规范化以及跨项目绩效基准建立差异化——这些是在位厂商原生能力的缺口。
