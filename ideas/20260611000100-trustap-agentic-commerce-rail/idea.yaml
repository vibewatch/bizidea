topRisks:
  - name: Marketplace platform resistance
    description: Large marketplaces may hesitate to expose policy and listing data to third-party agent-checkout infrastructure or may prefer to build their own rails.
    mitigation: Start with independent multi-channel merchants and specialty recommerce platforms, then use conversion and dispute metrics to negotiate deeper marketplace access.
  - name: Thin early agent demand
    description: Consumer agent shopping volume may arrive unevenly, making it hard to justify integration work before meaningful GMV shifts.
    mitigation: Price the initial product on merchant trust-data standardization and direct-checkout benefits that improve human conversion too, so ROI does not depend solely on agent traffic.
  - name: Dispute liability concentration
    description: Acting as the trust rail for graded-device purchases could expose the company to losses if condition data or release rules are wrong.
    mitigation: Keep merchants as the warranting party, store immutable offer snapshots, and roll out payment guarantees only after collecting enough dispute-performance data by category and seller.
