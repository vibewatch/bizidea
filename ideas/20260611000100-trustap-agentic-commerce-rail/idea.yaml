jobsToBeDone:
  - job: When a shopping agent wants to buy a graded refurbished device, help the merchant expose the exact trust terms in machine-readable form, so the purchase can happen without hidden condition risk.
    currentAlternative: Human-written listing descriptions and marketplace templates interpreted manually by shoppers or ops teams
    successMetric: Higher conversion on agent-routed sessions with no increase in dispute rate
  - job: When a buyer challenges the delivered device or warranty coverage, help the merchant prove what offer was accepted and under what payment-release rules, so they can resolve disputes faster and cheaper.
    currentAlternative: Manual case review across listing screenshots, payment logs, and support tickets
    successMetric: Lower dispute-resolution time and lower loss rate on graded-device transactions
