problem: >-
  In refurbished electronics, the details that decide whether a buyer should trust a listing live in scattered grade notes,
  warranty PDFs, seller policies, and marketplace-specific payment rules that AI agents cannot read or compare cleanly.
  That means the first generation of shopping agents will either avoid high-consideration recommerce purchases or send risky,
  low-conviction traffic that creates disputes, returns, and fraud exposure for merchants. The pain is not search alone; it is
  that condition, trust, and settlement terms are not packaged as a machine-actionable offer.
targetUser:
  primary: GM or Head of Marketplace Operations at a refurbished-electronics marketplace or multi-channel recommerce seller
  secondary: Head of trust and safety or payments operations responsible for seller verification, disputes, and warranty policy
  buyer: COO, GM Recommerce, or VP Marketplace at a scaled recommerce platform
startupThesis:
  nonObviousInsight: >-
    Agentic commerce will not break first on recommendation quality; it will break on ambiguous offer terms in categories where
    every unit has different condition, warranty coverage, and fraud risk. Refurbished electronics are the right beachhead
    because the listing already encodes a trust decision, so turning that decision into a machine-readable passport creates new
    conversion and lower dispute cost at the same time.
  beachhead: >-
    North American and UK refurbished-electronics merchants and recommerce marketplaces selling 5,000 or more graded devices
    per month across their own storefront plus channels like eBay and Back Market, starting with smartphones, laptops, and
    tablets that carry condition grades, limited warranties, and material counterfeit or return risk
  wedge: >-
    An offer-passport API that converts each graded device listing into a signed, agent-readable record of condition, warranty,
    seller verification, shipping SLA, and payment-release terms, paired with an escrow-style checkout flow for agent-initiated
    purchases
  whyNowCatalyst: >-
    Same-day funding news around Trustap Index and escrow-grade agent payments shows the market has shifted from asking whether
    AI agents will shop to asking what listing and settlement infrastructure they need to do it safely.
  ventureScalePath: >-
    Start with refurbished electronics, then expand the passport and checkout standard into luxury resale, collectibles,
    auto-parts, managed marketplaces, and eventually the broader identity, risk, dispute, and settlement backbone for
    cross-platform agentic commerce.
solution: >-
  The product ingests merchant catalog data, grading outputs, warranty rules, seller KYC state, shipping commitments, and
  marketplace policy data to generate an offer passport for every SKU or serialized unit. Each passport exposes a normalized
  schema that AI shopping agents can use to compare devices across sellers without guessing at condition language or hidden
  post-purchase terms. When an agent wants to buy, the checkout API routes the transaction through human-confirmed release
  logic, captures the exact offer snapshot used for the purchase, and stores dispute evidence if the item arrives mismatched.
  Merchants get a control plane to decide which agents can transact, what fields are visible, and when off-platform offers must
  fall back to manual review. The first release stays tightly focused on recommerce because every improvement in trust metadata
  should show up in conversion, dispute rate, and return-cost metrics quickly.
goToMarketSeed:
  firstCustomer: >-
    A refurbished-electronics marketplace or large merchant with 50,000 or more monthly sessions, 5,000 or more graded-device
    sales per month, and active distribution across both its own storefront and third-party marketplaces
  buyingTrigger: >-
    Launching AI-shopping-agent support, expanding into off-marketplace direct checkout, or seeing rising dispute and return
    costs on high-value graded devices creates urgency to standardize listing trust data
  currentAlternative: >-
    Marketplace-native listing templates, manual merchandising fields, incumbent payment processors, and trust or operations
    teams that resolve condition ambiguity and disputes after purchase
  switchingReason: >-
    This wedge lets the merchant expose a transaction-ready trust object instead of a marketing listing, so agent traffic can
    convert on higher-value devices without creating blind fraud and returns risk or forcing the merchant to build a custom
    agent integration stack
  pricingHypothesis: >-
    SaaS platform fee tied to active monthly offer passports plus a basis-point fee on GMV routed through the escrow checkout
    flow
