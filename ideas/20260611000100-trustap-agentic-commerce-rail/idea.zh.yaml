jobsToBeDone:
  - job: 当购物智能体想购买一台分级翻新设备时，帮助商户以机器可读的形式暴露精确的信任条款，使交易能在没有隐藏成色风险的情况下完成。
    currentAlternative: 人工书写的商品描述和平台模板，由购物者或运营团队手动解读
    successMetric: 智能体路由会话的转化率提升，同时纠纷率不上升
  - job: 当买家就收到的设备或质保覆盖范围提出异议时，帮助商户证明接受的是哪份报价、适用哪些资金释放规则，从而更快、更低成本地解决纠纷。
    currentAlternative: 跨商品截图、支付日志和工单的人工案件审查
    successMetric: 分级设备交易的纠纷解决时间缩短和损失率降低
