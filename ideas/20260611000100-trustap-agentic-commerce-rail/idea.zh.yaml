  - point: 机器可读的商品列表已成为智能体商务的先决条件——基础设施公司正在明确地将平台数据从面向人类重构为面向智能体。
    signalRefs: ["商品列表须转变为机器可读报价"]
    sourceRefs: [1, 2]
  - point: 人工确认资金释放表明自主购物仍需交易管控，这为托管式结账基础设施打开了新的机会窗口。
    signalRefs: ["智能体结账需要托管式资金释放控制"]
    sourceRefs: [1]
  - point: 碎片化平台数据已被点名为核心瓶颈，这意味着商户侧的数据标准化层可以在面向消费者的购物智能体之前率先胜出。
    signalRefs: ["碎片化平台数据是最大障碍"]
    sourceRefs: [2, 3]
  - point: 现有安全交易量和超预期的零售商需求表明，信任基础层可以在短期内货币化真实 GMV，而无需等待遥远的行为拐点。
    signalRefs: ["信任基础设施已处理相当可观的交易量", "零售需求已先于基础设施就位"]
    sourceRefs: [1, 3]
differentiator: >-
  大多数智能体商务产品会在界面层竞争，帮助消费者搜索、比较或谈价。这家公司深一层，站在商户侧，标准化那些真正决定自主购买是否应该发生的信任关键字段。护城河来自三处：为非同质化商品构建报价本体论、沉淀成色与质保描述如何对应纠纷和退货的数据，以及成为商户用来管控哪些智能体有权使用哪些交易权限的核心系统。
