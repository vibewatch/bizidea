slug: recommerce-agent-offer-passport
date: 2026-06-11
executiveSummary: >-
  Trustap 智能体商务基础层瞄准北美和英国的翻新电子产品商户及专业平台——这些玩家在 AI 购物智能体能安全购买分级设备之前，必须先解决机器可读的报价条款问题。首个产品是报价通行证 API 加治理层，将成色、电池健康度、质保范围、卖家资质核验、发货 SLA 和资金释放条款打包进每件上架设备的签名记录。滩头市场是每月通过自有店铺加至少一个第三方渠道销售 5,000 件以上分级智能手机、笔记本和平板的商户，因为成色条款歧义已在这个品类产生可量化的纠纷、退货和转化损失。GTM 应从一个商户自控结账流程的付费试点起步，验证通行证报价能提升转化或降低纠纷损失，且无需要求商户替换现有支付轨道。研究支持一个真实但初期较窄的市场——估算滩头 SAM $36.8M、第 3 年 SOM 约 $4.8M——规模化路径依赖后续向其他非同质化商品品类扩张。刻意的非目标包括：自主资金释放、资产负债表风险、以及在商户自控流程获得可引用案例之前深度接入大型平台。最有研究支撑的优势是品类专属信任元数据，而非通用结账管道；最大的证伪风险是大型平台持续封闭智能体访问权限，商户将本产品视为支付平台的捆绑功能而非独立预算项。首个董事会级证明点是三个付费试点——在 90 天内，至少两个商户转化为年度合同，并证明合格流程转化率提升 10% 以上或纠纷相关损失减少 15% 以上。
problem:
  - "翻新设备商品列表将信任关键信息——定级备注、电池披露、质保条款、卖家审核和渠道特定支付规则——分散埋藏，智能体根本无法自信地比较或完成高价值设备的交易。"
  - "商户一旦开放直购渠道或智能体接入，就会因为没有可携带的报价快照或资金释放管控层来将接受的商品列表与支付和售后证据挂钩，而继承更高的纠纷、退货和欺诈风险。"
solution:
  - "为每台序列号或分级设备生成签名报价通行证，将成色、电池、质保、卖家资质核验、发货 SLA 和资金释放条款标准化为一个智能体可读的对象。"
  - "通过治理与结账管控层路由经授权的智能体购买请求——记录精确的报价快照、执行人工确认的资金释放逻辑，并在现有支付轨道之上为纠纷存储证据。"
whyWeWin:
  - "Trustap、Stripe 和 Adyen 已分别持有相邻的支付或托管原语，但没有任何一家以中立的商户侧通行证形式，覆盖卖家全渠道混合中的翻新设备信任语义。"
  - "在智能体 GMV 体量仍小时，产品就能通过改善相同商品列表上的人工和智能体结账信任来证明价值，降低对单一不确定需求曲线的依赖。"
  - "每次生产部署都在积累再售商务专属的本体论和证据数据集，将通行证字段与转化率、纠纷和退货挂钩——这比通用结账封装壳更难复制。"
strategicChoices:
  beachhead: "北美和英国的多渠道翻新商和专业平台，每月通过自有店铺加至少一个第三方渠道销售 5,000 件以上分级智能手机、笔记本或平板。"
  wedgeRationale: "这个切片最先感受到痛点——每台设备都有可变的成色、质保和欺诈风险，但买家仍可比大范围水平智能体商务部署更快地审批单一商户自控流程上的窄幅试点。"
  sequencingRationale: "从商户自控的店铺和直购流程切入，因为目录数据、审批逻辑和 ROI 在那里都可触达；以集成合作替代触碰受监管的资金流转；只有在首批试点证明通行证改变了转化率和纠纷结果之后，才接入渠道连接器和合作伙伴主导的分发。招聘顺序相同：先是产品和集成工程，再是实施，当部署可重复后才添加合作伙伴。"
  notYet:
    - "在商户自控试点可引用之前，深度接入大型封闭平台。"
    - "在翻新电子产品通行证 schema 被验证之前，扩展至奢侈品二手、收藏品或汽车零部件。"
    - "自主资金释放、支付保障，或任何让公司承担主体风险的模式。"
market:
  tam: "估算北美/英国 TAM $105.0M，基于约 225 家符合资质的翻新商或平台、每账户月均约 10,000 台设备、建模信任基础层支出约 $3.89/台。"
  sam: "估算滩头 SAM $36.8M，假设约 35% 的 TAM 在近期有意愿开放商户自控直购或智能体友好店铺流程。"
  som: "第 3 年 SOM 约 $4.8M——40 家客户，每账户年均通行证、治理和结账管控支出约 $120K。"
  segments:
    - "主要：多渠道翻新电子产品商户和拥有商户自控结账的专业平台。"
    - "次要：大型再售平台内的信任安全和支付运营团队，需要跨渠道的可携带报价证据。"
  buyingProcess: >-
    运营推动者通常是平台运营、信任安全或支付运营团队，但预算审批在商户启动智能体支持、开放直购渠道或吸收日益上涨的纠纷和退货成本时，由总经理、COO 或平台副总裁拍板。转化的前提是在不承担新的受监管资金或质保责任的情况下，在一个结账流程上证明可量化的改善。
product:
  mvp: >-
    MVP 应摄入一个商户目录加质保、卖家资质核验和发货政策数据，为智能手机、笔记本和平板生成通行证，通过读取 API 向经授权的智能体暴露这些通行证，并存储与结账事件挂钩的不可篡改报价快照。第一版应通过现有支付合作伙伴支持人工确认的资金释放逻辑，避免自主结算、深度平台集成或资产负债表担保。
  sixMonth: "在一个商户自控店铺上线付费试点，包含通行证生成、经授权智能体访问控制、报价快照存储，以及在现有支付栈之上的人工确认结账释放。"
  twelveMonth: "为首批商务和支付栈添加可重复的连接器，提供通行证完整度、转化率、纠纷和退货的仪表盘，并添加渠道级管控，让商户可跨店铺和一个外部数据源治理智能体访问权限。"
  twentyFourMonth: "扩展为跨渠道信任管控平台，提供更丰富的纠纷基准测试、智能体权限治理，以及可复用的通行证模板——在翻新电子产品可重复后，支持相邻的非同质化品类。"
  keyBets:
    - "商户会在智能体路由 GMV 变得可观之前，率先为信任数据标准化买单。"
    - "最小通行证 schema 可以用现有目录、定级、质保和卖家核验数据覆盖至少 80% 的合格商品列表。"
    - "人工确认的资金释放管控足以赢得首批客户；完全自主释放可以等待。"
    - "一个成功的店铺试点在 12 个月内可以扩展到同一账户的至少一个额外渠道或品类。"
gtm:
  wedge: "针对商户自控结账流程的一个子集——涵盖商户已在准备 AI 智能体流量或试图削减成色驱动纠纷的分级智能手机、笔记本和平板——售卖付费试点。"
  channels:
    - "创始人主导对多渠道翻新商和专业平台的总经理、COO 和平台副总裁的出向销售。"
    - "来自支付、KYC 和托管合作伙伴的转介绍——他们已在向平台销售基础设施。"
    - "首批试点指标可引用后，通过再售和平台运营社区精准触达。"
  funnelTargets: "目标账户→合格发现 30% 以上；发现→付费试点 20% 以上；付费试点→年度生产合同 50% 以上；首个生产流程→12 个月内第二个渠道或品类 50% 以上。"
  pricing: "首次目录映射收取实施费，之后按活跃月度报价通行证收取年度平台订阅费，并对通过结账管控路由的 GMV 收取基点费率；这与现有平台运营和支付预算匹配，将支出同时与商品列表复杂度和受保护的交易量挂钩。"
businessModel:
  revenueStreams:
    - "首次目录映射、管控面板设置和结账政策配置的实施费。"
    - "通行证生成、治理和商户分析的年度 SaaS 订阅费。"
    - "智能体路由或通行证治理结账交易的 GMV 抽佣。"
  unitOfValue: "活跃月度报价通行证。"
  targetGrossMarginPct: 70
  expansionLevers:
    - "增加每个商户的通行证商品列表数量和序列号设备品类。"
    - "从一个商户自控流程扩展到额外渠道、店铺或卖家项目。"
    - "销售通行证完整度、纠纷基准和智能体绩效治理的高级分析模块。"
    - "在翻新电子产品可重复后，将本体论复用到相邻的非同质化品类。"
strategyMap:
  northStarMetric: "通过通行证报价路由的年化 GMV，同时将商户纠纷损失率维持在基线水平以下。"
  inputMetrics:
    - "合格商品列表转化为完整通行证的比例。"
    - "付费试点到生产的转化率。"
    - "通行证结账流程相对基线的转化率提升。"
    - "通行证订单相对基线的纠纷损失率。"
    - "每位生产客户的活跃渠道数。"
  moatsToBuild:
    - "再售商务专属本体论：将成色、电池健康度、质保范围、卖家核验和发货承诺与实际纠纷结果挂钩。"
    - "不可篡改的报价快照和证据台账：记录智能体所见、商户授权的内容，以及交易最终的解决方式。"
    - "建立在现有支付和平台基础设施之上的合作伙伴分发和集成模板。"
  killCriteria:
    - "前 10 家目标商户中不足 3 家同意付费试点。"
    - "前 2 个试点在 90 天内无法证明合格订单转化率提升 10% 以上或纠纷相关损失减少 15% 以上。"
    - "第 12 个月时，不足 80% 的合格商品列表能在不进行定制化人工清洗的情况下完成通行证生成。"
    - "不足 40% 的付费试点转化为年度生产合同。"
  mermaid: |
    flowchart LR
      Wedge[Refurbished-device passport wedge] --> MVP[Offer passport plus governed checkout MVP]
      MVP --> Proof[Higher conversion with controlled dispute loss]
      Proof --> Expansion[More channels, analytics, and adjacent categories]
investorMemo:
  verdict:
    call: Watch
    conviction: "商户侧切口引人信服，品类痛点清晰可见，但在商户于智能体 GMV 可观之前率先为试点买单、产品证明自身不只是一个支付功能之前，定论暂缓。"
    whyBelieve: "研究表明翻新商务已在品类定级、质保和退货信任上充分竞争，为可携带的商户侧通行证和结账治理层提供了合理的切入点。"
    whyDoubt: "平台访问可能持续封闭，替代方案可信度高，且目前尚无证据表明商户会独立购买信任层，而不是等待 Trustap、Stripe、Adyen 或平台捆绑足够的功能。"
    nextDiligence: "在商户自控流程上获得三个付费试点，并验证其中至少两个在转化率或纠纷改善后转化为年度合同。"
  firstCustomer:
    title: "多渠道翻新电子产品商户的总经理或平台副总裁。"
    profile: "北美或英国的再售运营商，每月通过自有店铺加一个主要平台销售 5,000 件以上分级设备，运营团队已在追踪成色纠纷、质保索赔和退货成本。"
    trigger: "商户上线 AI 购物智能体支持、向封闭平台以外开放直购渠道，或在高价值设备上看到成色相关纠纷和退货上升。"
    buyer: "总经理、COO 或平台副总裁"
    initialContract: "单目录单结账流程的付费试点，合同金额 $30K–$50K，转化后升至约 $90K–$150K 年度经常性软件费加结账基点费——随着商户添加更多通行证商品和渠道而增长。"
  mustBeTrue:
    - "前 10 家目标商户中至少 3 家在智能体路由 GMV 超过其销售额 5% 之前，愿意为试点付费。"
    - "前 2 个试点在 90 天内能证明合格流程转化率提升 10% 以上，或纠纷相关损失减少 15% 以上。"
    - "现有商户系统无需定制集成项目，即可为合格商品列表填充至少 80% 的必要通行证字段。"
    - "支付和 KYC 合作伙伴可支持人工确认的资金释放管控，无需初创公司承担主体风险。"
    - "至少一个生产客户在 12 个月内从一个商户自控流程扩展到第二个渠道或品类。"
  diligenceQuestions:
    - "在大型平台开放 API 之前，有多少目标商户已有足够的商户自控结账量来支撑这笔投入？"
    - "哪些通行证字段对纠纷、退货和转化率影响最大——按设备品类拆分？"
    - "在前五个客户中，对定级、电池、质保和卖家核验数据进行标准化需要多大的实施工作量？"
    - "支付和平台基础设施合作伙伴会联合销售这个层次，还是将其视为竞争重叠？"
    - "什么样的证据才能让总经理将本产品视为有预算的操作系统，而不是向现有支付厂商的功能需求？"
operatingAssumptions:
  - assumption: "大型翻新商在智能体路由 GMV 可观之前，如果产品同样能改善人工结账信任，就会为信任数据标准化买单。"
    basis: research.yaml
    validationTest: "完成 10 次买家访谈，并获得至少 3 个付费试点——其中智能体流量仍是合格订单的少数。"
    decisionImpact: "若不成立，公司必须重新定位为纯智能体基础设施层或等待更晚的市场时机，这会削弱种子前轮的投资逻辑。"
  - assumption: "现有商户目录、定级、质保和卖家核验数据能在 4–6 周内填充最小通行证 schema。"
    basis: operator judgment
    validationTest: "与前 3 家共创客户完成技术尽调，证明至少 80% 的合格商品列表可在有限人工清洗下完成通行证生成。"
    decisionImpact: "若不成立，实施工作变得过于服务化，公司必须收窄 ICP 或大幅提高接入费。"
  - assumption: "初创公司可作为软件和治理层，由支付、KYC 和清算合作伙伴负责受监管的资金流转。"
    basis: research.yaml
    validationTest: "确保 2 个合作伙伴支撑的试点架构，支持人工确认资金释放、证据捕获和纠纷工作流，且无需初创公司持有资金。"
    decisionImpact: "若不成立，监管范围和资本需求将急剧增加，需要不同的团队、融资方案，乃至不同的商业模式。"
  - assumption: "一次生产部署可在 12 个月内从一个店铺流程扩展到至少一个额外渠道或设备品类。"
    basis: idea.yaml
    validationTest: "追踪前 5 个生产账户，要求至少 2 个在一年内新增第二个流程、卖家群或设备品类。"
    decisionImpact: "若不成立，ACV 过低，公司必须上移客单价、提高定价，或重新审视规模化路径。"
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "访谈 10 位目标翻新商的总经理、平台运营和支付运营负责人，了解近期纠纷、退货损失和直购计划。"
    hypothesis: "买方痛点已紧迫到在智能体 GMV 放量前愿意为付费试点买单。"
    successMetric: "至少 6 次访谈确认有实际预算负责人，至少 3 家同意付费试点条款。"
    owner: "CEO"
  - horizon: "0–90 天"
    experiment: "将一个样本商户目录映射到智能手机、笔记本和平板的最小通行证 schema。"
    hypothesis: "现有商户数据可覆盖核心通行证字段，无需定制数据工程项目。"
    successMetric: "至少 80% 的合格商品列表在有限人工清洗下映射为可用通行证。"
    owner: "创始工程师"
  - horizon: "90–180 天"
    experiment: "在一个商户自控结账流程上运行首个付费试点，包含授权智能体访问和人工确认资金释放。"
    hypothesis: "窄幅治理结账部署能在足够快的时间内改善转化率或降低纠纷损失，以支撑年度软件支出。"
    successMetric: "试点在 90 天内证明转化率提升 10% 以上或纠纷相关损失减少 15% 以上。"
    owner: "CEO"
  - horizon: "90–180 天"
    experiment: "与一家支付或托管提供商及一家 KYC/接入合作伙伴设计并测试合作架构。"
    hypothesis: "初创公司无需承担受监管资金或承销风险，即可提供结账管控和证据捕获。"
    successMetric: "一个试点以合作伙伴管理的资金流转端到端运行，无需初创公司持有资金。"
    owner: "支付与风控产品负责人"
  - horizon: "180–365 天"
    experiment: "将首个生产客户从一个店铺流程扩展到第二个渠道、卖家项目或设备品类。"
    hypothesis: "账户扩展是首个证明点之后实现持久 ACV 的最快路径。"
    successMetric: "首个生产客户签署扩展合同，将年度经常性价值提升至少 50%。"
    owner: "落地实施负责人"
  - horizon: "180–365 天"
    experiment: "使用相同的通行证 schema 和接入手册，在另外两家商户复制部署。"
    hypothesis: "首次实施产出的工作物料可复用，足以支撑软件级毛利率。"
    successMetric: "第三次部署在 6 周或更短时间内上线，人工映射工作量明显少于第一次。"
    owner: "落地实施负责人"
operations:
  - "维护商户接入手册，将定级、电池、质保、卖家核验和发货字段映射到通行证 schema。"
  - "为每笔生产交易存储不可篡改的报价快照和与结账及支持事件挂钩的纠纷证据。"
  - "集成现有支付、KYC 和清算栈，而非重建受监管的资金流转。"
  - "与每个生产商户每月进行一次转化率、纠纷、退货和通行证覆盖率的 ROI 复盘。"
  - "在启用英国或欧盟跨境流程前，须完成合规审查——涉及额外的产品安全、质保或隐私义务。"
team:
  - role: "创始人/CEO"
    startTiming: "第 0 个月"
    rationale: "主导创始人直销、共创客户发现和合作伙伴开发，因为买方语言、定价和平台访问限制仍是最大的未知量。"
  - role: "创始工程师"
    startTiming: "第 0 个月"
    rationale: "构建通行证 schema、核心 API、报价快照台账和付费试点所需的首批商户连接器。"
  - role: "产品与集成工程师"
    startTiming: "第 2–4 个月"
    rationale: "将首批客户专属映射转化为可复用的连接器和工作流，使首批部署后的接入时间缩短。"
  - role: "落地实施负责人"
    startTiming: "第 4–6 个月"
    rationale: "主导商户接入、字段映射和生产上线，使产品学习不拖垮创始工程团队。"
  - role: "支付与风控产品负责人"
    startTiming: "第 7–9 个月"
    rationale: "在公司有了实际结账量之后，定义资金释放管控、纠纷证据工作流和合作伙伴要求。"
  - role: "合作与销售负责人"
    startTiming: "第 9–12 个月"
    rationale: "只有在公司拥有可复用的试点方案、可引用的指标和至少一个有效合作伙伴渠道后，才增加专职销售能力。"
milestones:
  - horizon: "0–12 个月"
    items:
      - "完成 10–12 次 ICP 访谈，获得至少 3 个付费共创客户试点。"
      - "交付通行证生成、授权智能体治理、报价快照存储和合作伙伴管理人工确认资金释放的 MVP。"
      - "在可量化的转化率或纠纷改善后，将至少 2 个试点转化为年度生产合同。"
      - "建立首个可复用的接入手册，将第三个客户的部署时间缩短到 6 周以内。"
  - horizon: "12–24 个月"
    items:
      - "在翻新电子产品滩头市场达到 8–10 个生产客户。"
      - "至少半数生产客户扩展到第二个渠道、卖家群或设备品类。"
      - "在核心基础层之上发布通行证完整度、纠纷基准和智能体绩效治理分析功能。"
      - "通过支付或平台基础设施合作关系获得合作伙伴主导的销售线索。"
  - horizon: "24–36 个月"
    items:
      - "通过滩头执行和账户扩张，达到约 40 个客户和建模的 $4.8M 第 3 年 SOM。"
      - "证明本体论和证据模型可延伸到至少一个相邻的非同质化商品品类。"
      - "在纠纷数据集足够扎实之前，决策是否保持纯软件层，还是增加更深的风险产品。"
risks:
  - risk: "大型平台持续封闭智能体访问权限，初创公司在商户自控店铺流程上停留的时间比预期更长。"
    likelihood: High
    impact: High
    mitigation: "优先在商户自控结账上立足，将平台作为后续连接器而非上线依赖，并用已验证的商户 ROI 来谈判更深的平台访问权限。"
  - risk: "商户将产品视为对 Trustap、Stripe、Adyen 或平台的功能需求，而非独立的软件预算。"
    likelihood: Medium
    impact: High
    mitigation: "用通行证完整度、转化率和纠纷降幅的品类专属 ROI 来证明价值，并在现有厂商结构性较窄的渠道中保持中立。"
  - risk: "跨卖家和渠道的目录及政策数据质量过于参差不齐，无法在软件级毛利率下生成可靠通行证。"
    likelihood: Medium
    impact: High
    mitigation: "强制执行最小通行证 schema，从已维护结构化定级和质保数据的商户起步，并从第一次部署开始埋点映射工作量。"
  - risk: "早期智能体购物需求到来慢于预期，削弱 GMV 端的上行空间。"
    likelihood: Medium
    impact: Medium
    mitigation: "在人工主导和直购的信任改善上证明价值，使业务不完全依赖近期的自主购物量。"
  - risk: "纠纷或责任敞口迫使初创公司比预期更早承担受监管资金、储备金或质保义务。"
    likelihood: Medium
    impact: High
    mitigation: "保持商户作为质保方，通过合作伙伴路由资金流转，并在公司有足够证据定价该风险之前推迟担保。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "支持 18 个月的现金跑道，用于构建核心通行证和证据产品、完成 3–5 个付费试点、招募集成和实施人才、建立支付和 KYC 合作伙伴关系，并在不承担主体风险的前提下达到首批 8–10 个生产客户。"
