slug: recommerce-agent-offer-passport
date: '2026-06-11'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: 模型起始月
    value: 2026-07
    unit: month
    source: '[BP date] 基准情景在计划日期后一个月起步，以便融资完成和招聘启动。'
  - id: A2
    name: 种子前轮完成后的初始现金
    value: '2.0'
    unit: USDM
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 基准情景取低端，因为按序推进能在可重复性验证之前保持团队精简。'
  - id: A3
    name: 每活跃客户年均混合收入
    value: '120.0'
    unit: USDK per customer-year
    source: '[BP market.som; BP investorMemo.initialContract; BP gtm.pricing] 使用计划中约 $120K 的年均账户支出，混合了订阅费、实施费和 GMV 挂钩结账费。'
  - id: A4
    name: 收入确认政策
    value: New logos contribute half of the landing month or quarter
    unit: policy
    source: '[Startup-finance heuristic] 收入按期间平均客户数计算，新合同即时起贡献收入，但不计入完整期间。'
  - id: A5
    name: 目标毛利率
    value: '70'
    unit: percent
    source: '[BP businessModel targetGrossMarginPct]'
  - id: A6
    name: 月度客户流失率
    value: '2.0'
    unit: percent
    source: '[Startup-finance heuristic] 拥有年度合同和实施锁定的早期 B2B 基础设施，但在产品证明深度扩展持久性之前。'
  - id: A7
    name: 第 1 年客户获取节奏
    value: 'Month-end customers: 0, 0, 0, 1, 1, 1, 2, 2, 2, 3, 3, 3'
    unit: count
    source: '[BP milestones 0-12 months] 对应第 1 年三个付费试点，其中两个在年底前转化为年度生产合同。'
  - id: A8
    name: 第 2 年季末客户数
    value: Q1Y2 4; Q2Y2 6; Q3Y2 8; Q4Y2 10
    unit: count
    source: '[BP milestones 12-24 months] 取第 2 年末 8–10 个生产客户目标的高端。'
  - id: A9
    name: 第 3 年季末客户数
    value: Q1Y3 16; Q2Y3 24; Q3Y3 32; Q4Y3 40
    unit: count
    source: '[BP market.som; BP milestones 24-36 months] 在第 3 年年末（而非年初）达到计划中图示的 40 个客户 SOM。'
  - id: A10
    name: 创始人/CEO 含附加负担的现金薪酬
    value: '90.0'
    unit: USDK per year
    source: '[BP team Founder/CEO] 种子前阶段低于市场水平的创始人薪酬启发式估算。'
  - id: A11
    name: 创始工程师含附加负担的现金薪酬
    value: '150.0'
    unit: USDK per year
    source: '[BP team Founding eng] 高级产品/集成工程现金薪酬加薪资负担的启发式估算。'
  - id: A12
    name: 产品与集成工程师含附加负担的现金薪酬
    value: '135.0'
    unit: USDK per year
    source: '[BP team Product and integration engineer] 支持商户连接器的全栈集成招聘启发式估算。'
  - id: A13
    name: 落地实施负责人含附加负担的现金薪酬
    value: '105.0'
    unit: USDK per year
    source: '[BP team Implementation lead] 接入和上线负责人的启发式估算。'
  - id: A14
    name: 支付与风控产品负责人含附加负担的现金薪酬
    value: '125.0'
    unit: USDK per year
    source: '[BP team Payments and risk product lead] 专业支付和风控产品招聘的启发式估算。'
  - id: A15
    name: 合作与销售负责人含附加负担的现金薪酬
    value: '120.0'
    unit: USDK per year
    source: '[BP team Partnerships or account executive] 首位带指标的销售或合作负责人的启发式估算。'
  - id: A16
    name: 平台与数据工程师含附加负担的现金薪酬
    value: '145.0'
    unit: USDK per year
    source: '[BP product twelveMonth; BP operations] 第 2 年加固本体论、分析和连接器的工程招聘启发式估算。'
  - id: A17
    name: 落地实施经理含附加负担的现金薪酬
    value: '100.0'
    unit: USDK per year
    source: '[BP milestones 12-24 months] 客户数超过五个后第二位部署侧招聘的启发式估算。'
  - id: A18
    name: 客户成功与合作运营含附加负担的现金薪酬
    value: '95.0'
    unit: USDK per year
    source: '[BP operations; BP milestones 12-24 months] 月度 ROI 复盘、合作伙伴支持和账户扩展工作的启发式估算。'
  - id: A19
    name: 销售总监 2 含附加负担的现金薪酬
    value: '125.0'
    unit: USDK per year
    source: '[BP milestones 12-24 months] 仅在首套方案可重复后增加第二位 GTM 销售的启发式估算。'
  - id: A20
    name: 数据分析工程师含附加负担的现金薪酬
    value: '140.0'
    unit: USDK per year
    source: '[BP product twentyFourMonth] 第 3 年更丰富的纠纷基准测试和通行证分析的启发式估算。'
  - id: A21
    name: 解决方案工程师含附加负担的现金薪酬
    value: '110.0'
    unit: USDK per year
    source: '[BP milestones 24-36 months] GTM 规模化后技术售前和合作伙伴部署支持的启发式估算。'
  - id: A22
    name: 财务与运营经理含附加负担的现金薪酬
    value: '90.0'
    unit: USDK per year
    source: '[BP fundingAsk; BP operations] 公司接近种子规模时基础财务、合规和供应商管理的启发式估算。'
  - id: A23
    name: 合作开发经理含附加负担的现金薪酬
    value: '115.0'
    unit: USDK per year
    source: '[BP milestones 12-24 months; BP gtm channels] 首个转介渠道被验证后合作伙伴主导销售线索支持的启发式估算。'
  - id: A24
    name: 招聘节奏
    value: Founder and founding engineer in M1; product and integration engineer in M3; implementation lead in M5; payments and risk product lead in M8; first AE in M11; platform/data engineer in M14; implementation manager in M17; customer success in M20; second AE in M24; analytics engineer in M28; solutions engineer in M30; finance/ops in M32; partnerships manager in M34
    unit: timing
    source: '[BP team; BP strategicChoices sequencingRationale] 产品和集成招聘领先于销售和合作伙伴，在试点转化后增加可重复性招聘。'
  - id: A25
    name: 职能薪资分摊
    value: Founder 60% S&M / 40% G&A; engineers and payments/risk lead 100% R&D; implementation lead 60% R&D / 40% G&A; implementation manager 50% R&D / 50% G&A; customer success 70% S&M / 30% G&A; solutions engineer 40% S&M / 60% R&D; finance/ops 100% G&A; sales and partnerships roles 100% S&M
    unit: allocation
    source: '[BP team rationales; BP operations] 分摊优先反映创始人主导销售，其次是工程主导实施，再是合作伙伴和客户扩展工作。'
  - id: A26
    name: 非薪资运营支出
    value: S&M tools and travel 4K monthly pre-AE, 8K after first AE, 12K after customer-success scaling, 16K after partner-led scale; R&D infrastructure 6K initially, 8K after payments/risk, 10K after platform hardening, 12K after analytics; G&A 5K monthly in Y1, 7K through most of Y2-Y3, 9K after finance/ops hire
    unit: USDK per month
    source: '[Startup-finance heuristic] 针对受监管相邻 B2B 软件初创公司云计算、安全、差旅、法律和合规的精简但可信支出。'
  - id: A27
    name: 现金转换政策
    value: EBITDA approximates cash movement
    unit: policy
    source: '[Startup-finance heuristic] 本种子前软件业务不建模债务、资本支出、税务或重大营运资金波动。'
  - id: A28
    name: 下轮融资里程碑
    value: Reach 8-10 production customers, prove at least half can expand to a second flow or category, and keep six months of buffer for a seed process
    unit: milestone
    source: '[BP milestones 12-24 months; BP fundingAsk runwayMonths] 种子前轮围绕首个可重复生产证明点定规模，而非完整盈利。'
