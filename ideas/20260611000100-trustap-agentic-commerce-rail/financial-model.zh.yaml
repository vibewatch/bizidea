scenarios:
  downside:
    description: 付费试点仍能落地，但平台访问持续收紧，试点转化更慢，公司以 28 个客户结束第 3 年，混合客户年价值 $105K，毛利率降至 65%。
    y3RevenueK: 1863.8
    y3EbitdaK: -602.0
    cashLowPointK: -223.1
    keyAssumptionChanges:
      - 第 2 年季末客户数从 4、6、8、10 降至 3、4、5、8，第 3 年年末客户数从 40 降至 28。
      - 混合年均客户收入从 $120K 降至 $105K，因为商户购买了更窄的订阅，GMV 费用滞后。
      - 毛利率从 70% 降至 65%，因为接入和证据处理仍更多依赖人工服务。
  base:
    description: 三个付费试点转化为可重复的商户方案，公司以 10 个生产客户结束第 2 年，第 3 年末达到 40 个客户，混合客户年价值 $120K。
    y3RevenueK: 2910.0
    y3EbitdaK: 223.7
    cashLowPointK: 518.8
    keyAssumptionChanges:
      - 客户数按 A7 至 A9 增长，在第 3 年末达到 40 个活跃账户。
      - 毛利率维持在商业计划目标的 70%。
      - 招聘按 A24 执行，不增加资本密集型风险产品或主体敞口。
  upside:
    description: 试点转化和合作伙伴转介比预期更早奏效，第 3 年末达到 46 个客户，混合客户年价值 $130K，毛利率 72%。
    y3RevenueK: 3607.5
    y3EbitdaK: 783.9
    cashLowPointK: 925.1
    keyAssumptionChanges:
      - 第 2 年末客户数从 10 提升至 12，第 3 年末客户数通过更快的合作伙伴主导获客从 40 升至 46。
      - 混合年均客户收入因第二流程扩展和用量费提前挂钩，从 $120K 增至 $130K。
      - 接入模板和纠纷工作流标准化后，毛利率从 70% 提升至 72%。
sensitivity:
  - variable: ARPU
    downsideCase: 混合客户年价值稳定在 $105K，因为商户购买了窄幅信任层，GMV 费用挂钩有限。
    baseCase: 混合客户年价值按建模维持在 $120K。
    upsideCase: 第二流程扩展和 GMV 费用提前挂钩，混合客户年价值达到 $130K。
    y3RevenueImpactK: -363.8
    cashImpactK: -254.7
  - variable: CAC
    downsideCase: CAC 上升至约 $50K，因为创始人主导的出向销售未能顺利转化为合作伙伴主导的销售线索。
    baseCase: 中端市场试点销售的 CAC 维持在约 $36K。
    upsideCase: 客户推荐和合作伙伴转介温热漏斗后，CAC 降至约 $28K。
    y3RevenueImpactK: -180.0
    cashImpactK: -196.0
  - variable: 客户流失率
    downsideCase: 月度流失率升至 3.0%，因为部分试点始终未扩展到单一窄幅结账流程之外。
    baseCase: 月度流失率按建模维持在 2.0%。
    upsideCase: 商户新增第二个渠道和品类后，月度流失率降至 1.5%。
    y3RevenueImpactK: -145.0
    cashImpactK: -102.0
  - variable: 销售周期
    downsideCase: 试点到生产拉长至 6–7 个月，因为合规和平台访问审查拖慢了上线。
    baseCase: 试点到生产约 4–5 个月，与商业计划的试点动作一致。
    upsideCase: 参考客户和合作伙伴方案将周期缩短至约 3–4 个月。
    y3RevenueImpactK: -420.0
    cashImpactK: -294.0
  - variable: 毛利率
    downsideCase: 毛利率维持在 65%，因为部署工作和证据运营仍偏服务型。
    baseCase: 毛利率维持在商业计划目标的 70%。
    upsideCase: 模板消除更多人工实施工作后，毛利率达到 72%。
    y3RevenueImpactK: 0.0
    cashImpactK: -145.5
  - variable: 招聘节奏
    downsideCase: 第二位客户总监和第 3 年支持岗位提前两个季度入职，早于可重复性验证。
    baseCase: 招聘按 A24 执行，滞后于证明节点。
    upsideCase: 非关键招聘推迟，因为合作伙伴渠道承接了更多接入和客源工作。
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 营收引擎
    finding: 基准情景收入主要由第 2 年末到第 3 年末活跃商户从 10 增至 40、混合客户年价值 $120K 驱动。
  - checkName: 必须成立的前提
    finding: 试点到生产的转化率须维持在商业计划 50% 目标附近，同时接入须足够标准化以将毛利率稳定在 70%。
  - checkName: 模型崩溃条件
    finding: 若销售周期拉长且混合 ARPU 向悲观情景下滑，现金在第 3 年末前转负，种子前轮资金不再充足。
  - checkName: 下轮融资的证明
    finding: 种子轮逻辑成立的前提是公司达到 8–10 个生产客户，证明其中至少半数实现第二流程扩展，并以充足现金缓冲进入融资。
sanityChecks:
  ruleOf40: "第 3 年增速 295.9% + EBITDA 利润率 7.7% = 303.6%（方向性强，但受第 2 年基数小的放大效应影响）。"
  burnMultiple: "第 2 年净新增 ARR 的消耗倍数约 0.9 倍，第 3 年 EBITDA 转正后实际趋负。"
  revenuePerFte: "第 3 年每位年末 FTE 收入 $207.9K（对比 B2B SaaS 基准约 $200K–$400K）。"
  flags:
    - 基准情景仅在第 3 年末才达到商业计划图示的 40 个客户完整滩头 SOM，任何客户获取的滑坡都会迅速推迟种子轮叙事。
    - 每 FTE 收入仅达到典型 B2B SaaS 基准的低端，接入须更加模板化，而非陷入服务化漂移。
    - GMV 端抽佣的上行空间嵌入在混合 ARPU 中，而非单独建模，这意味着智能体路由量仍需在尽调中得到验证。
    - 悲观情景现金耗尽，招聘须严格以试点转化和合作伙伴主导的需求为门控，而非凭乐观预期提前锁定。
