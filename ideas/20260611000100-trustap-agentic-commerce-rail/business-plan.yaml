slug: recommerce-agent-offer-passport
date: 2026-06-11
executiveSummary: >-
  Trustap Agentic Commerce Rail targets North American and UK refurbished-electronics
  merchants and specialty marketplaces that need machine-readable offer terms before
  AI shopping agents can buy graded devices safely. The first product is an
  offer-passport API and governance layer that packages condition, battery health,
  warranty scope, seller verification, shipping SLA, and payment-release terms into
  a signed record for each listed unit. The beachhead is merchants selling 5,000+
  graded smartphones, laptops, and tablets per month across their own storefront
  plus at least one third-party channel, because ambiguous trust terms already drive
  measurable disputes, returns, and conversion loss there. Go-to-market should start
  with a paid pilot on one merchant-controlled checkout flow where the company can
  prove that passported offers improve conversion or reduce dispute loss without
  asking the merchant to replace existing payment rails. Research supports a real
  but narrow initial market, with an estimated $36.8M beachhead SAM and $4.8M
  illustrative year-3 SOM, while the venture case depends on later expansion into
  other non-fungible commerce categories. The deliberate non-goals are autonomous
  fund release, balance-sheet risk, and deep large-marketplace integrations before
  the company proves merchants will pay for trust standardization on merchant-owned
  flows. The main evidence-backed advantage is category-specific trust metadata, not
  generic checkout plumbing, while the biggest disconfirming risk is that large
  platforms keep agent access closed and merchants treat this as a bundled payments
  feature rather than a standalone system. The first board-level proof point is
  three paid pilots that convert at least two merchants into annual contracts after
  showing either a 10%+ lift in eligible-flow conversion or a 15%+ reduction in
  dispute-related loss within 90 days.
problem:
  - "Refurbished-device listings bury trust-critical facts across grading notes, battery disclosures, warranty terms, seller checks, and channel-specific payment rules, so agents cannot compare or transact on high-value devices with confidence."
  - "When merchants open direct checkout or agent support, they inherit higher dispute, return, and fraud risk because there is no portable offer snapshot or release-control layer tying the accepted listing to payment and post-sale evidence."
solution:
  - "Generate a signed offer passport for each serialized or graded device that normalizes condition, battery, warranty, seller verification, shipping SLA, and release terms into an agent-readable object."
  - "Route approved agent-initiated purchases through a governance and checkout-control layer that records the exact offer snapshot, applies human-confirmed release logic, and stores evidence for disputes on top of existing payment rails."
whyWeWin:
  - "Trustap, Stripe, and Adyen already own adjacent payments or escrow primitives, but none is positioned as the neutral merchant-side passport for refurbished-device trust semantics across a seller's full channel mix."
  - "The product can prove value before agent GMV is large by improving human and agent checkout trust on the same listings, which lowers dependence on one uncertain demand curve."
  - "Each production deployment builds a recommerce-specific ontology and evidence dataset linking passport fields to conversion, disputes, and returns, which is harder to replicate than a generic checkout wrapper."
strategicChoices:
  beachhead: "North American and UK multichannel refurbishers and specialty marketplaces selling 5,000 or more graded smartphones, laptops, or tablets per month across their own storefront plus at least one third-party channel."
  wedgeRationale: "This slice feels the pain first because every unit carries variable condition, warranty, and fraud risk, yet the buyer can still approve a narrow pilot on one merchant-controlled flow faster than a broad horizontal agent-commerce deployment."
  sequencingRationale: "Start with merchant-owned storefront and direct-checkout flows where catalog data, approval logic, and ROI are accessible; layer in payment and KYC partners instead of touching regulated money movement; add channel connectors and partner-led distribution only after the first pilots prove that passports change conversion and dispute outcomes. Hiring follows the same order: product and integration engineering first, then implementation, then partnerships once deployments are repeatable."
  notYet:
    - "Deep integrations into large closed marketplaces before merchant-owned pilots are referenceable."
    - "Luxury resale, collectibles, or auto parts before the refurbished-electronics passport schema is proven."
    - "Autonomous fund release, payment guarantees, or any model that puts the company on principal risk."
market:
  tam: "$105.0M estimated NA/UK TAM based on roughly 225 qualified refurbishers or marketplaces, about 10,000 sold devices per month per account, and a modeled $3.89 trust-rail spend per completed device."
  sam: "$36.8M estimated beachhead SAM assuming about 35% of TAM is ready to expose merchant-controlled direct checkout or agent-ready storefront flows in the near term."
  som: "$4.8M illustrative year-3 SOM based on 40 customers at roughly $120k annual passport, governance, and checkout-control spend per account."
  segments:
    - "Primary: Multichannel refurbished-electronics merchants and specialty marketplaces with merchant-controlled checkout."
    - "Secondary: Trust-and-safety and payments-operations teams inside larger recommerce platforms that need portable offer evidence across channels."
  buyingProcess: >-
    The operational champion is usually marketplace operations, trust-and-safety, or
    payments operations, but budget approval sits with the GM, COO, or VP
    Marketplace when the merchant is launching agent support, opening direct
    checkout, or absorbing rising dispute and return costs. Conversion depends on
    proving measurable improvement on one checkout flow without taking on new
    regulated-money or warranty liability.
product:
  mvp: >-
    The MVP should ingest one merchant catalog plus warranty, seller-verification,
    and shipping-policy data to generate passports for smartphones, laptops, and
    tablets, expose those passports through a read API for approved agents, and
    store immutable offer snapshots tied to checkout events. It should support
    human-confirmed release logic through an existing payments partner and avoid
    autonomous settlement, large-marketplace deep integrations, or balance-sheet
    guarantees in v1.
  sixMonth: "Ship a production pilot for one merchant-owned storefront with passport generation, approved-agent access controls, offer snapshot storage, and human-confirmed checkout release on top of an existing payment stack."
  twelveMonth: "Add repeatable connectors for the first commerce and payments stacks, dashboards for passport completeness, conversion, disputes, and returns, and channel-level controls that let a merchant govern agent access across storefront plus one external feed."
  twentyFourMonth: "Expand into a cross-channel trust control plane with richer dispute benchmarking, agent permission governance, and reusable passport templates that support adjacent non-fungible categories once refurbished electronics is repeatable."
  keyBets:
    - "Merchants will fund trust-data standardization before agent-routed GMV becomes material."
    - "A minimum passport schema can cover at least 80% of eligible listings using existing catalog, grading, warranty, and seller-verification data."
    - "Human-confirmed release controls are enough to win the first customers; full autonomous release can wait."
    - "One successful storefront pilot can expand to at least one more channel or category inside the same account within 12 months."
gtm:
  wedge: "Sell a paid pilot for one merchant-controlled checkout flow covering a subset of graded smartphones, laptops, and tablets where the merchant is already preparing for AI-agent traffic or trying to cut condition-driven disputes."
  channels:
    - "Founder-led outbound to GMs, COOs, and VP Marketplace leaders at multichannel refurbishers and specialty marketplaces."
    - "Referrals from payment, KYC, and escrow partners already selling marketplace infrastructure."
    - "Targeted outreach through recommerce and marketplace-operations communities once the first pilot metrics are referenceable."
  funnelTargets: "Target account→qualified discovery 30%+, discovery→paid pilot 20%+, paid pilot→annual production contract 50%+, first production flow→second channel or category within 12 months 50%+."
  pricing: "Charge an implementation fee for the first catalog mapping, then an annual platform subscription based on active monthly offer passports plus a basis-point fee on GMV routed through checkout controls; this matches existing marketplace-ops and payments budgets and ties spend to both listing complexity and protected transaction volume."
businessModel:
  revenueStreams:
    - "Implementation fees for first catalog mapping, control-plane setup, and checkout policy configuration."
    - "Annual SaaS subscription for passport generation, governance, and merchant analytics."
    - "GMV-based take rate on agent-routed or passport-governed checkout transactions."
  unitOfValue: "Active monthly offer passport."
  targetGrossMarginPct: 70
  expansionLevers:
    - "Increase the number of passported listings and serialized-device categories per merchant."
    - "Extend from one merchant-controlled flow to additional channels, storefronts, or seller programs."
    - "Sell premium analytics on passport completeness, dispute benchmarks, and agent-performance governance."
    - "Reuse the ontology in adjacent non-fungible categories after refurbished electronics is repeatable."
strategyMap:
  northStarMetric: "Annualized GMV routed through passported offers at or below the merchant's baseline dispute-loss rate."
  inputMetrics:
    - "Percent of eligible listings converted into complete passports."
    - "Paid pilot to production conversion rate."
    - "Conversion lift on passported checkout flows versus baseline."
    - "Dispute-loss rate on passported orders versus baseline."
    - "Channels live per production customer."
  moatsToBuild:
    - "Recommerce-specific ontology linking grades, battery health, warranty scope, seller verification, and shipping promises to actual dispute outcomes."
    - "Immutable offer snapshot and evidence ledger showing what the agent saw, what the merchant approved, and how the transaction resolved."
    - "Partner distribution and integration templates layered on top of existing payment and marketplace infrastructure."
  killCriteria:
    - "Fewer than 3 of the first 10 target merchants agree to a paid pilot."
    - "The first 2 pilots fail to show either a 10%+ conversion lift or a 15%+ reduction in dispute-related loss on eligible orders within 90 days."
    - "Less than 80% of eligible listings can be passported without bespoke manual cleanup by month 12."
    - "Fewer than 40% of paid pilots convert into annual production contracts."
  mermaid: |
    flowchart LR
      Wedge[Refurbished-device passport wedge] --> MVP[Offer passport plus governed checkout MVP]
      MVP --> Proof[Higher conversion with controlled dispute loss]
      Proof --> Expansion[More channels, analytics, and adjacent categories]
investorMemo:
  verdict:
    call: Watch
    conviction: "Compelling merchant-side wedge with visible category pain, but conviction stays capped until merchants fund pilots before agent GMV is material and the product proves it is more than a payments feature."
    whyBelieve: "The research shows refurbished commerce already competes on grading, warranty, and return trust, creating a plausible opening for a portable merchant-side passport and checkout-governance layer."
    whyDoubt: "Platform access could stay closed, substitutes are credible, and there is no proof yet that merchants will buy a standalone trust layer instead of waiting for Trustap, Stripe, Adyen, or marketplaces to bundle enough functionality."
    nextDiligence: "Secure three paid pilots on merchant-owned flows and verify that at least two convert to annual contracts after measurable conversion or dispute improvements."
  firstCustomer:
    title: "GM or VP Marketplace at a multichannel refurbished-electronics merchant."
    profile: "A North American or UK recommerce operator selling 5,000+ graded devices per month across its own storefront plus one major marketplace, with operations teams already tracking condition disputes, warranty claims, and return cost."
    trigger: "The merchant launches AI-shopping-agent support, opens direct checkout beyond a closed marketplace, or sees condition-related disputes and returns rise on higher-value devices."
    buyer: "GM, COO, or VP Marketplace"
    initialContract: "A $30k-$50k paid pilot for one catalog and one checkout flow, converting to roughly $90k-$150k annual recurring software plus basis-point checkout fees as the merchant adds more passported listings and channels."
  mustBeTrue:
    - "At least 3 of the first 10 target merchants will pay for a pilot before agent-routed GMV exceeds 5% of their sales."
    - "The first 2 pilots can show either a 10%+ lift in eligible-flow conversion or a 15%+ reduction in dispute-related loss within 90 days."
    - "Existing merchant systems can populate at least 80% of the required passport fields for eligible listings without a bespoke integration project."
    - "Payment and KYC partners can support human-confirmed release controls without forcing the startup to take principal risk."
    - "At least one production customer expands from one merchant-owned flow to a second channel or category within 12 months."
  diligenceQuestions:
    - "How many target merchants already run enough merchant-controlled checkout volume to justify this before large marketplaces open their APIs?"
    - "Which passport fields most influence dispute, return, and conversion outcomes by device category?"
    - "What implementation effort is required to normalize grading, battery, warranty, and seller-verification data across the first five customers?"
    - "Will payment and marketplace-infrastructure partners co-sell this layer or treat it as competitive overlap?"
    - "What proof would make a GM treat this as a funded operating system rather than a feature request for an incumbent payments vendor?"
operatingAssumptions:
  - assumption: "Scaled refurbishers will buy trust-data standardization before agent-routed GMV is material if it also improves human checkout trust."
    basis: research.yaml
    validationTest: "Close 10 buyer interviews and at least 3 paid pilots where agent traffic is still a minority of eligible orders."
    decisionImpact: "If false, the company must reposition as an agent-only infrastructure layer or wait for later market timing, which weakens the pre-seed case."
  - assumption: "Existing merchant catalog, grading, warranty, and seller-verification data can populate a minimum passport schema in 4-6 weeks."
    basis: operator judgment
    validationTest: "Complete technical discovery with the first 3 design partners and show that at least 80% of eligible listings can be passported with limited manual cleanup."
    decisionImpact: "If false, implementation becomes too services-heavy and the company must narrow the ICP or charge materially higher onboarding fees."
  - assumption: "The startup can remain a software and governance layer while payment, KYC, and payout partners own regulated money movement."
    basis: research.yaml
    validationTest: "Secure 2 partner-backed pilot architectures that support human-confirmed release, evidence capture, and dispute workflows without the startup holding funds."
    decisionImpact: "If false, regulatory scope and capital needs increase sharply, requiring a different team, funding plan, and potentially a different business."
  - assumption: "One production deployment can expand from one storefront flow to at least one more channel or device category within 12 months."
    basis: idea.yaml
    validationTest: "Track the first 5 production accounts and require at least 2 to add a second flow, seller group, or device category within a year."
    decisionImpact: "If false, ACV stays too low and the company must move upmarket, raise prices, or reconsider the venture-scale thesis."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Interview 10 GMs, marketplace-ops leaders, and payments-ops leads at target refurbishers about recent disputes, return losses, and direct-checkout plans."
    hypothesis: "The buyer pain is urgent enough to fund a paid pilot before agent GMV is large."
    successMetric: "At least 6 interviews confirm a live budget owner and at least 3 agree to paid pilot terms."
    owner: "CEO"
  - horizon: "0-90 days"
    experiment: "Map one sample merchant catalog into the minimum passport schema for smartphones, laptops, and tablets."
    hypothesis: "Existing merchant data can cover the core passport fields without a custom data-engineering project."
    successMetric: "At least 80% of eligible listings map into a usable passport with limited manual cleanup."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Run the first paid pilot on one merchant-owned checkout flow with approved-agent access and human-confirmed release."
    hypothesis: "A narrow governed-checkout deployment can improve conversion or reduce dispute loss fast enough to justify annual software spend."
    successMetric: "The pilot shows either a 10%+ conversion lift or a 15%+ reduction in dispute-related loss within 90 days."
    owner: "CEO"
  - horizon: "90-180 days"
    experiment: "Design and test a partner architecture with one payments or escrow provider plus one KYC/onboarding partner."
    hypothesis: "The startup can deliver checkout controls and evidence capture without taking regulated-money or underwriting risk."
    successMetric: "One pilot runs end-to-end with partner-managed money movement and no requirement for the startup to hold funds."
    owner: "Payments and risk product lead"
  - horizon: "180-365 days"
    experiment: "Expand the first production customer from one storefront flow to a second channel, seller program, or device category."
    hypothesis: "Account expansion is the fastest path to durable ACV after the first proof point."
    successMetric: "The first production customer signs an expansion that lifts annual recurring value by at least 50%."
    owner: "Implementation lead"
  - horizon: "180-365 days"
    experiment: "Replicate deployment across two additional merchants using the same passport schema and onboarding playbook."
    hypothesis: "The first implementation work product is reusable enough to support software-like gross margins."
    successMetric: "The third deployment reaches production in 6 weeks or less with materially less custom mapping than the first."
    owner: "Implementation lead"
operations:
  - "Maintain a merchant onboarding playbook that maps grading, battery, warranty, seller-verification, and shipping fields into the passport schema."
  - "Store immutable offer snapshots and dispute evidence tied to checkout and support events for every production transaction."
  - "Integrate with existing payment, KYC, and payout stacks rather than rebuilding regulated money movement."
  - "Run monthly ROI reviews on conversion, disputes, returns, and passport coverage with each production merchant."
  - "Require compliance review before enabling UK or EU cross-border flows with additional product-safety, warranty, or privacy obligations."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, design-partner discovery, and partner development because buyer language, pricing, and platform-access constraints are still the main unknowns."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the passport schema, core APIs, offer snapshot ledger, and first merchant connectors required for paid pilots."
  - role: "Product and integration engineer"
    startTiming: "Month 2-4"
    rationale: "Turn the first customer-specific mappings into reusable connectors and workflows so onboarding time falls after the first deployments."
  - role: "Implementation lead"
    startTiming: "Month 4-6"
    rationale: "Own merchant onboarding, field mapping, and production rollout so product learning does not overwhelm the founding engineering team."
  - role: "Payments and risk product lead"
    startTiming: "Month 7-9"
    rationale: "Define release controls, dispute evidence workflows, and partner requirements once the company has live checkout volume."
  - role: "Partnerships or account executive"
    startTiming: "Month 9-12"
    rationale: "Add dedicated selling capacity only after the company has repeatable pilot packaging, reference metrics, and at least one productive partner channel."
milestones:
  - horizon: "0-12 months"
    items:
      - "Complete 10-12 ICP interviews and secure at least 3 paid design-partner pilots."
      - "Ship MVP for passport generation, approved-agent governance, offer snapshot storage, and partner-managed human-confirmed release."
      - "Convert at least 2 pilots into annual production contracts after measurable conversion or dispute improvements."
      - "Stand up the first repeatable onboarding playbook and reduce third-customer deployment time to 6 weeks or less."
  - horizon: "12-24 months"
    items:
      - "Reach 8-10 production customers in the refurbished-electronics beachhead."
      - "Expand at least half of production customers to a second channel, seller group, or device category."
      - "Launch analytics for passport completeness, dispute benchmarks, and agent-performance governance on top of the core rail."
      - "Secure partner-led pipeline from payment or marketplace-infrastructure relationships."
  - horizon: "24-36 months"
    items:
      - "Reach roughly 40 customers and the modeled $4.8M year-3 SOM through beachhead execution and account expansion."
      - "Demonstrate that the ontology and evidence model can extend into at least one adjacent non-fungible commerce category."
      - "Decide whether to remain a pure software layer or add deeper risk products only after the dispute dataset is strong enough to price that move."
risks:
  - risk: "Large marketplaces and platforms keep agent access closed, limiting the startup to merchant-owned storefront flows for longer than planned."
    likelihood: High
    impact: High
    mitigation: "Land first on merchant-controlled checkout, treat marketplaces as later connectors rather than launch dependencies, and use proven merchant ROI to negotiate deeper access."
  - risk: "Merchants view the product as a feature request for Trustap, Stripe, Adyen, or a marketplace rather than a separate software budget."
    likelihood: Medium
    impact: High
    mitigation: "Show category-specific ROI tied to passport completeness, conversion, and dispute reduction, and stay neutral across channels where incumbents are structurally narrower."
  - risk: "Catalog and policy data quality is too inconsistent across sellers and channels to generate reliable passports at software-like margins."
    likelihood: Medium
    impact: High
    mitigation: "Enforce a minimum passport schema, start with merchants that already maintain structured grading and warranty data, and instrument mapping effort from the first deployment."
  - risk: "Early agent-shopping demand arrives slower than expected, weakening the GMV-based upside."
    likelihood: Medium
    impact: Medium
    mitigation: "Prove value on human-led and direct-checkout trust improvements so the business does not rely solely on near-term autonomous shopping volume."
  - risk: "Dispute or liability exposure pushes the startup into regulated-money, reserve, or warranty obligations earlier than planned."
    likelihood: Medium
    impact: High
    mitigation: "Keep merchants as the warranting party, route money movement through partners, and postpone guarantees until the company has enough evidence to price that risk."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of runway to build the core passport and evidence product, complete 3-5 paid pilots, hire integration and implementation capacity, secure payments and KYC partnerships, and reach the first 8-10 production customers without taking principal risk."
