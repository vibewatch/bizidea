scenarios:
  downside:
    description: Paid pilots still land, but platform access stays tight, pilots convert more slowly, and the company exits Y3 with 28 customers at a $105K blended customer-year value and lower 65% gross margin.
    y3RevenueK: 1863.8
    y3EbitdaK: -602.0
    cashLowPointK: -223.1
    keyAssumptionChanges:
      - Y2 quarter-end customers shift from 4, 6, 8, 10 to 3, 4, 5, 8 and Y3 exit customers drop from 40 to 28.
      - Blended annual revenue per customer falls from $120K to $105K as merchants buy a narrower subscription and GMV fees lag.
      - Gross margin slips from 70% to 65% because onboarding and evidence handling stay more manual.
  base:
    description: Three paid pilots convert into a repeatable merchant playbook, the company exits Y2 with 10 production customers, and reaches 40 customers by Y3 exit at a $120K blended customer-year value.
    y3RevenueK: 2910.0
    y3EbitdaK: 223.7
    cashLowPointK: 518.8
    keyAssumptionChanges:
      - Customer counts follow A7 through A9, reaching 40 active accounts at Y3 exit.
      - Gross margin holds at the BP target of 70%.
      - Hiring follows A24 with no additional capital-intensive risk products or principal exposure.
  upside:
    description: Pilot conversion and partner referrals work earlier than expected, lifting the business to 46 customers by Y3 exit at a $130K blended customer-year value and a 72% gross margin.
    y3RevenueK: 3607.5
    y3EbitdaK: 783.9
    cashLowPointK: 925.1
    keyAssumptionChanges:
      - Year-end Y2 customers improve from 10 to 12 and Y3 exit customers rise from 40 to 46 through faster partner-led acquisition.
      - Blended annual revenue per customer increases from $120K to $130K as second-flow expansion and usage fees attach sooner.
      - Gross margin improves from 70% to 72% as onboarding templates and dispute workflows become more standardized.
sensitivity:
  - variable: ARPU
    downsideCase: Blended customer-year value settles at $105K because merchants buy a narrow trust layer with limited GMV-fee attachment.
    baseCase: Blended customer-year value stays at $120K as modeled.
    upsideCase: Blended customer-year value reaches $130K as second-flow expansion and GMV fees attach.
    y3RevenueImpactK: -363.8
    cashImpactK: -254.7
  - variable: CAC
    downsideCase: CAC rises to about $50K because founder-led outbound does not translate cleanly into partner-sourced pipeline.
    baseCase: CAC stays around $36K for mid-market pilot sales.
    upsideCase: CAC falls to about $28K once references and partner referrals warm the funnel.
    y3RevenueImpactK: -180.0
    cashImpactK: -196.0
  - variable: churn
    downsideCase: Monthly churn rises to 3.0% because some pilots never expand beyond one narrow checkout flow.
    baseCase: Monthly churn stays at 2.0% as modeled.
    upsideCase: Monthly churn falls to 1.5% once merchants add second channels and categories.
    y3RevenueImpactK: -145.0
    cashImpactK: -102.0
  - variable: sales cycle
    downsideCase: Pilot-to-production stretches toward 6-7 months because compliance and platform-access reviews slow launches.
    baseCase: Pilot-to-production is roughly 4-5 months, consistent with the BP pilot motion.
    upsideCase: Reference customers and partner packaging shorten the cycle to roughly 3-4 months.
    y3RevenueImpactK: -420.0
    cashImpactK: -294.0
  - variable: gross margin
    downsideCase: Gross margin holds at 65% because deployment work and evidence operations remain more services-heavy.
    baseCase: Gross margin stays at the BP target of 70%.
    upsideCase: Gross margin reaches 72% once templates remove more manual implementation work.
    y3RevenueImpactK: 0.0
    cashImpactK: -145.5
  - variable: hiring pace
    downsideCase: The second AE and year-3 support hires are pulled forward by two quarters before repeatability is proven.
    baseCase: Hiring follows A24 and stays behind proof points.
    upsideCase: Noncritical hires slip later because partner channels absorb more onboarding and sourcing work.
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven mainly by growing from 10 to 40 active merchants between Y2 exit and Y3 exit at a $120K blended customer-year value.
  - checkName: Must go right
    finding: Pilot-to-production conversion must stay near the BP's 50% target while onboarding becomes repeatable enough to hold gross margin at 70%.
  - checkName: Model breaks if
    finding: If sales cycles stretch and blended ARPU slips toward the downside case, cash turns negative before Y3 exit and the pre-seed is no longer sufficient.
  - checkName: Next-round proof
    finding: The seed story works once the company reaches 8-10 production customers, shows second-flow expansion in at least half of them, and enters fundraising with buffer intact.
sanityChecks:
  ruleOf40: Y3 growth 295.9% + EBITDA margin 7.7% = 303.6% (directionally strong but flattered by the small Y2 base).
  burnMultiple: About 0.9x in Y2 on net new ARR, turning effectively negative in Y3 as EBITDA becomes positive.
  revenuePerFte: $207.9K Y3 revenue per end-of-year FTE (vs. roughly $200K-$400K B2B SaaS benchmark).
  flags:
    - The base case reaches the BP's full illustrative 40-customer beachhead SOM only at Y3 exit, so any slippage in logo acquisition pushes out the seed narrative quickly.
    - Revenue per FTE only reaches the low end of typical B2B SaaS benchmarks, so onboarding has to become more templatized rather than drifting into services work.
    - The GMV-based take-rate upside is embedded inside blended ARPU rather than modeled separately, which means agent-routed volume still needs to be validated in diligence.
    - The downside case runs out of cash, so hiring should stay tightly gated to pilot conversion and partner-led demand rather than booked on hope.
