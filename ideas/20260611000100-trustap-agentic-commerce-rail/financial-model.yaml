slug: recommerce-agent-offer-passport
date: '2026-06-11'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: month
    source: '[BP date] Base case starts one month after the plan date so the raise can close and hiring can begin.'
  - id: A2
    name: Starting cash after pre-seed close
    value: '2.0'
    unit: USDM
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M] Base case uses the low end because sequencing keeps the team lean through repeatability.'
  - id: A3
    name: Blended annual revenue per active customer
    value: '120.0'
    unit: USDK per customer-year
    source: '[BP market.som; BP investorMemo.initialContract; BP gtm.pricing] Uses the plan''s stated ~$120K annual spend per account, blending subscription, implementation, and GMV-linked checkout fees.'
  - id: A4
    name: Revenue recognition policy
    value: New logos contribute half of the landing month or quarter
    unit: policy
    source: '[Startup-finance heuristic] Revenue uses period-average customers so a new contract starts contributing immediately but not for a full period.'
  - id: A5
    name: Target gross margin
    value: '70'
    unit: percent
    source: '[BP businessModel targetGrossMarginPct]'
  - id: A6
    name: Monthly logo churn
    value: '2.0'
    unit: percent
    source: '[Startup-finance heuristic] Early B2B infrastructure with annual contracts and implementation lock-in, but before the product proves deep expansion durability.'
  - id: A7
    name: Y1 customer landing pattern
    value: 'Month-end customers: 0, 0, 0, 1, 1, 1, 2, 2, 2, 3, 3, 3'
    unit: count
    source: '[BP milestones 0-12 months] Maps to three paid pilots in year 1 with two converting to annual production contracts by year-end.'
  - id: A8
    name: Y2 quarter-end customers
    value: Q1Y2 4; Q2Y2 6; Q3Y2 8; Q4Y2 10
    unit: count
    source: '[BP milestones 12-24 months] Uses the high end of the stated 8-10 production-customer goal by the end of year 2.'
  - id: A9
    name: Y3 quarter-end customers
    value: Q1Y3 16; Q2Y3 24; Q3Y3 32; Q4Y3 40
    unit: count
    source: '[BP market.som; BP milestones 24-36 months] Reaches the plan''s illustrative 40-customer year-3 SOM by year-end, not on day one of the year.'
  - id: A10
    name: Founder/CEO loaded cash compensation
    value: '90.0'
    unit: USDK per year
    source: '[BP team Founder/CEO] Startup-finance heuristic for a below-market founder salary at pre-seed stage.'
  - id: A11
    name: Founding engineer loaded cash compensation
    value: '150.0'
    unit: USDK per year
    source: '[BP team Founding eng] Startup-finance heuristic for senior product/integration engineering cash compensation plus payroll burden.'
  - id: A12
    name: Product and integration engineer loaded cash compensation
    value: '135.0'
    unit: USDK per year
    source: '[BP team Product and integration engineer] Startup-finance heuristic for a full-stack integration hire supporting merchant connectors.'
  - id: A13
    name: Implementation lead loaded cash compensation
    value: '105.0'
    unit: USDK per year
    source: '[BP team Implementation lead] Startup-finance heuristic for an onboarding and rollout owner.'
  - id: A14
    name: Payments and risk product lead loaded cash compensation
    value: '125.0'
    unit: USDK per year
    source: '[BP team Payments and risk product lead] Startup-finance heuristic for a specialized payments and risk product hire.'
  - id: A15
    name: Partnerships or account executive loaded cash compensation
    value: '120.0'
    unit: USDK per year
    source: '[BP team Partnerships or account executive] Startup-finance heuristic for the first quota-carrying seller or partner lead.'
  - id: A16
    name: Platform and data engineer loaded cash compensation
    value: '145.0'
    unit: USDK per year
    source: '[BP product twelveMonth; BP operations] Startup-finance heuristic for a year-2 engineering hire to harden the ontology, analytics, and connectors.'
  - id: A17
    name: Implementation manager loaded cash compensation
    value: '100.0'
    unit: USDK per year
    source: '[BP milestones 12-24 months] Startup-finance heuristic for the second deployment-facing hire once customer count passes five.'
  - id: A18
    name: Customer success and partner ops loaded cash compensation
    value: '95.0'
    unit: USDK per year
    source: '[BP operations; BP milestones 12-24 months] Startup-finance heuristic for monthly ROI reviews, partner support, and account expansion work.'
  - id: A19
    name: Account executive 2 loaded cash compensation
    value: '125.0'
    unit: USDK per year
    source: '[BP milestones 12-24 months] Startup-finance heuristic for a second GTM seller added only after the first playbook is repeatable.'
  - id: A20
    name: Analytics engineer loaded cash compensation
    value: '140.0'
    unit: USDK per year
    source: '[BP product twentyFourMonth] Startup-finance heuristic for richer dispute benchmarking and passport analytics in year 3.'
  - id: A21
    name: Solutions engineer loaded cash compensation
    value: '110.0'
    unit: USDK per year
    source: '[BP milestones 24-36 months] Startup-finance heuristic for technical pre-sales and partner deployment support once GTM scales.'
  - id: A22
    name: Finance and ops manager loaded cash compensation
    value: '90.0'
    unit: USDK per year
    source: '[BP fundingAsk; BP operations] Startup-finance heuristic for basic finance, compliance, and vendor management once the company nears seed scale.'
  - id: A23
    name: Partnerships manager loaded cash compensation
    value: '115.0'
    unit: USDK per year
    source: '[BP milestones 12-24 months; BP gtm channels] Startup-finance heuristic for partner-led pipeline support after the first referral channel proves productive.'
  - id: A24
    name: Hiring cadence
    value: Founder and founding engineer in M1; product and integration engineer in M3; implementation lead in M5; payments and risk product lead in M8; first AE in M11; platform/data engineer in M14; implementation manager in M17; customer success in M20; second AE in M24; analytics engineer in M28; solutions engineer in M30; finance/ops in M32; partnerships manager in M34
    unit: timing
    source: '[BP team; BP strategicChoices sequencingRationale] Keeps product and integration hiring ahead of sales and partnerships, then adds repeatability hires after pilots convert.'
  - id: A25
    name: Functional payroll allocation
    value: Founder 60% S&M / 40% G&A; engineers and payments/risk lead 100% R&D; implementation lead 60% R&D / 40% G&A; implementation manager 50% R&D / 50% G&A; customer success 70% S&M / 30% G&A; solutions engineer 40% S&M / 60% R&D; finance/ops 100% G&A; sales and partnerships roles 100% S&M
    unit: allocation
    source: '[BP team rationales; BP operations] Allocation follows founder-led sales first, then engineering-led implementation, then partner and customer expansion work.'
  - id: A26
    name: Non-payroll operating spend
    value: S&M tools and travel 4K monthly pre-AE, 8K after first AE, 12K after customer-success scaling, 16K after partner-led scale; R&D infrastructure 6K initially, 8K after payments/risk, 10K after platform hardening, 12K after analytics; G&A 5K monthly in Y1, 7K through most of Y2-Y3, 9K after finance/ops hire
    unit: USDK per month
    source: '[Startup-finance heuristic] Lean but credible spend for cloud, security, travel, legal, and compliance on a regulated-adjacent B2B software startup.'
  - id: A27
    name: Cash conversion policy
    value: EBITDA approximates cash movement
    unit: policy
    source: '[Startup-finance heuristic] No debt, capex, taxes, or material working-capital swings are modeled for this pre-seed software business.'
  - id: A28
    name: Funding milestone for the next round
    value: Reach 8-10 production customers, prove at least half can expand to a second flow or category, and keep six months of buffer for a seed process
    unit: milestone
    source: '[BP milestones 12-24 months; BP fundingAsk runwayMonths] Sizes the pre-seed around the first repeatable production proof point rather than full profitability.'
