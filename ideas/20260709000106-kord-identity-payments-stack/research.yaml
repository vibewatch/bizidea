  adoptionFrictionMatrix:
  - friction: Integrating with case-management and cashiering systems without creating new admin work
    severity: high
    affectedBuyer: Head of Conveyancing
    mitigation: Start with a narrow release-checklist layer and pre-built connectors into the systems firms already use.
    sourceRefs:
    - 54
    - 71
    - 72
  - friction: Owning payment-release workflow without drifting into regulated custody or payment complexity too early
    severity: high
    affectedBuyer: COO / COLP
    mitigation: Land first as a non-custodial approval and evidence layer connected to existing client accounts and settlement rails.
    sourceRefs:
    - 26
    - 30
    - 36
    - 76
  - friction: Making source-of-funds decisions audit-ready when client narratives and documents are often incomplete
    severity: high
    affectedBuyer: MLRO / Compliance Lead
    mitigation: Use structured questionnaires, open-banking evidence where possible, and explicit escalation paths rather than binary pass/fail rules.
    sourceRefs:
    - 14
    - 15
    - 20
    - 36
    - 79
  - friction: Coordinating evidence across external parties in a transaction chain that still defaults to inboxes
    severity: medium
    affectedBuyer: Operations Manager
    mitigation: Win first by reducing internal cashiering friction, then add reusable passes for brokers and estate agents after the internal process is stable.
    sourceRefs:
    - 23
    - 52
    - 68
