openQuestions:
- How many mid-market conveyancing firms still release completion funds outside a unified approval-and-evidence workflow?
- What percentage of matters require late source-of-funds escalation, and how often does that delay completion by 24–72 hours?
- Will buyers prefer a neutral non-custodial clearance layer, or only a provider that also owns safeguarded client-money movement?
- Which case-management and cashiering systems dominate the 300–2,000 matters-per-year segment, and how open are their APIs?
