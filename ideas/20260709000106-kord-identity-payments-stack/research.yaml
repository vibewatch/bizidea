competitors:
- name: Kord
  stage: scale-up
  wedge: Unified AML, identity, source-of-funds, and payments infrastructure for estate agents, law firms, and conveyancers.
  pricing: Custom / not public
  strength: Closest evidence that the market will buy a combined property compliance-and-payments rail.
  weaknessVsUs: Broader platform posture; the proposed startup is narrower on the matter-level release decision and non-custodial clearance orchestration.
  sourceRefs:
  - 49
  - 50
- name: Thirdfort
  stage: scale-up
  wedge: Client due diligence for conveyancers with ID verification, AML, source-of-funds, and case-management integrations.
  pricing: Custom / not public
  strength: Large legal-sector footprint and credible proof that firms pay for faster digital CDD.
  weaknessVsUs: Stops at evidence gathering and reporting rather than owning the final cashiering release state.
  sourceRefs:
  - 52
  - 53
  - 54
- name: Armalytix
  stage: scale-up
  wedge: Open-banking-led source-of-funds and statement analysis for legal and property workflows.
  pricing: Custom / not public
  strength: Deep specialization in provenance analysis and integration into legal workflows.
  weaknessVsUs: Narrower around funds provenance; it does not naturally become the shared release-control workspace across all parties.
  sourceRefs:
  - 63
  - 68
- name: InfoTrack
  stage: incumbent
  wedge: Broad conveyancing workflow stack covering onboarding, verification of funds, searches, and pre-completion tasks.
  pricing: Custom / module-based
  strength: Already sits in the day-to-day workflow of law firms and spans multiple adjacent tasks.
  weaknessVsUs: A broad suite can still leave the matter-level go/no-go decision fragmented rather than explicitly owned.
  sourceRefs:
  - 71
  - 72
- name: PEXA UK
  stage: incumbent
  wedge: Digital property settlement, lodgement, and completion infrastructure with automated fund movement.
  pricing: Custom platform / transaction pricing
  strength: Strongest adjacent alternative when buyers want a deeper completion and settlement rail.
  weaknessVsUs: Heavier implementation and a broader money-movement role than a neutral clearance layer can initially support.
  sourceRefs:
  - 76
  - 77
