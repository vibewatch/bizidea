slug: property-completion-clearance-rail
date: '2026-07-09'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-09] the model begins with the first full operating month after the dated business plan.'
- id: A2
  name: Planning FX shorthand
  value: £1 ≈ $1.25
  unit: FX heuristic
  source: '[startup-finance heuristic for 2026 planning translation] BP pricing is stated in GBP but this artifact must be
    in USD, so contract values use a simple planning-rate conversion rather than spot FX precision.'
- id: A3
  name: Opening cash / pre-seed raise
  value: $2.1M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash trough] the base case uses
    a low-end pre-seed raise that still reaches seed proof with roughly six months of buffer at the cash low point.'
- id: A4
  name: Starting paying accounts
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first turn design partners
    into paid pilots.'
- id: A5
  name: Paying account definition
  value: A paid pilot or a production firm paying platform, per-matter, or implementation fees.
  unit: definition
  source: '[BP businessModel.revenueStreams + BP gtm.pricing] customersEop counts any firm already paying under pilot or production
    scope so early revenue reconciles cleanly.'
- id: A6
  name: Paid pilot economics
  value: $18K over about 3 months (~$6K per month)
  unit: USD/account
  source: '[BP experimentRoadmap 90-180 days paid pilots at £10k-20k + BP investorMemo.firstCustomer.initialContract 90-day
    pilot + A2 FX heuristic] the model uses the midpoint of the pilot band for the first three paying deployments.'
- id: A7
  name: Production contract and expansion economics
  value: Production firms begin near $45K ARR and exit Y3 near $58K ARR as per-cleared-matter fees, implementation revenue,
    and multi-office rollout attach.
  unit: USD/account/year
  source: '[BP gtm.pricing £30k-50k ACV + BP businessModel.expansionLevers + Research market.som about $55k blended annual
    value + A2 FX heuristic] the base case stays inside the BP range while matching the researched SOM order of magnitude.'
- id: A8
  name: Customer ramp
  value: 3 paying accounts by M12, 10 by Q4Y2, 48 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets + Research market.som] the base case assumes
    the company reaches the lower half of the 40-60 firm year-3 milestone rather than the full researched 60-firm SOM path.'
- id: A9
  name: Revenue recognition convention
  value: Period revenue equals period-end paying accounts multiplied by a blended realized revenue per paying account for
    that period, with early quarters carrying more pilot and implementation mix.
  unit: formula
  source: '[BP businessModel.revenueStreams + BP gtm.pricing] this keeps every revenue row traceable to customersEop while
    acknowledging that Y1 and early Y2 include pilot and implementation revenue, not only steady-state subscription ARR.'
- id: A10
  name: Gross margin ramp
  value: 52%-58% in Y1, 61%-70% in Y2, and 72%-75% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 72 + BP operations + startup-finance heuristic] early manual onboarding
    and evidence-mapping work compress margin before integrations and approval packets become repeatable.'
- id: A11
  name: Base pilot-to-production cycle
  value: Roughly 90 days from paid pilot start to production decision
  unit: days
  source: '[BP investorMemo.firstCustomer.initialContract 90-day pilot + BP gtm.funnelTargets paid pilot to production 60%+
    + BP experimentRoadmap] one quarter is assumed to be enough to prove ROI and convert early buyers.'
- id: A12
  name: Hiring timeline
  value: M1 founder and founding engineer; M4 product/compliance lead; M7 implementation engineer; M10 partnerships/account
    executive; M16 second engineer; M19 ops; M27 second implementation/customer-success hire.
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + BP milestones] hiring follows the business plan exactly through
    the first five roles, then adds only the minimum scale hires needed after production proof appears.'
- id: A13
  name: Founder loaded compensation
  value: $120K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic for UK pre-seed B2B SaaS] assumes lean founder cash pay plus payroll
    taxes and benefits.'
- id: A14
  name: Engineering loaded compensation
  value: $150K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic for UK workflow/integration talent] reflects senior product and
    connector work without late-stage compensation inflation.'
- id: A15
  name: Product / compliance loaded compensation
  value: $140K
  unit: USD/year
  source: '[BP team Product and compliance lead + startup-finance heuristic] the role is senior enough to encode AML and source-of-funds
    policy but still fits a lean pre-seed team.'
- id: A16
  name: Implementation / customer success loaded compensation
  value: $110K
  unit: USD/year
  source: '[BP team Implementation engineer + startup-finance heuristic] covers onboarding, deployment, and customer support
    without assuming a large services bench.'
- id: A17
  name: Sales / partnerships loaded compensation
  value: $140K
  unit: USD/year
  source: '[BP team Partnerships and account executive + BP gtm.channels + startup-finance heuristic] includes travel and
    variable compensation for concentrated vertical selling.'
- id: A18
  name: Ops / G&A loaded compensation
  value: $85K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] covers lean finance, customer administration, and vendor management
    after the first production cohort is live.'
- id: A19
  name: Payroll allocation to P&L lines
  value: Founder 65% S&M / 15% R&D / 20% G&A; engineering 100% R&D; product/compliance 70% R&D / 30% G&A; implementation 50%
    S&M / 50% R&D; sales 100% S&M; ops 100% G&A.
  unit: allocation
  source: '[BP team role rationales + BP operations] functional allocation reflects founder-led sales, engineering-heavy product
    work, compliance design, and implementation-assisted expansion.'
- id: A20
  name: Non-payroll opex ramp
  value: Monthly non-payroll spend rises from $10K total in early Y1 to $24K by Q4Y3.
  unit: USD/month
  source: '[BP operations + BP gtm.channels + startup-finance heuristic] covers cloud hosting, legal, insurance, travel, and
    compliance tooling without assuming heavy paid-demand spend.'
- id: A21
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at
    this stage.'
- id: A22
  name: Steady-state monthly churn
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early workflow SaaS + BP businessModel.expansionLevers] once the clearance layer
    is embedded into approvals and audit packets, churn should be low but not mature-SaaS perfect.'
- id: A23
  name: CAC convention
  value: Total 36-month sales and marketing spend divided by 48 net new paying accounts
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures founder-led selling, implementation-led
    expansion, and the early partner-sourced pipeline together.'
- id: A24
  name: Next-round milestone for funding sizing
  value: Reach 10 production firms by Q4Y2 and about 23 paying firms by Q2Y3 while proving two repeatable integrations, three
    multi-office expansions, and initial partner-sourced pipeline.
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + model cash curve] the raise is sized to hit a seed-ready
    proof point and still preserve about six months of cash buffer.'
- id: A25
  name: Quarterly salary-roll convention
  value: Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only quarter-end snapshots.
  unit: convention
  source: '[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent with the hiring
    ramp even though Y2 and Y3 expose only year-end headcount snapshots.'
