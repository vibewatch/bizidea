scenarios:
  downside:
    description: Buyers still feel the pain, but more of them prefer bundled settlement vendors and conversion from pilot
      to production takes longer than planned.
    y3RevenueK: 1250.0
    y3EbitdaK: -280.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches about 32 instead of 48.
    - Exit blended annual value stays near $52K instead of about $58K.
    - Gross margin exits around 70% because implementation remains more bespoke.
  base:
    description: Design partners convert on roughly one-quarter proof cycles, firms accept the non-custodial scope, and one
      partner-led path begins to contribute in year 2.
    y3RevenueK: 1740.0
    y3EbitdaK: 19.8
    cashLowPointK: 487.0
    keyAssumptionChanges:
    - 3 paying accounts by M12, 10 by Q4Y2, and 48 by Q4Y3.
    - Production annual value starts near $45K and exits Y3 near $58K as per-matter and multi-office revenue attach.
    - Gross margin reaches the low-to-mid 70s once integrations and audit packets standardize.
  upside:
    description: Two integration paths become repeatable early, references compound inside the beachhead, and multi-office
      expansion attaches faster than planned.
    y3RevenueK: 2200.0
    y3EbitdaK: 320.0
    cashLowPointK: 650.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches about 55 instead of 48.
    - Exit blended annual value approaches $62K as more firms add higher matter volume and second-office rollout.
    - Gross margin reaches about 76% because deployment stays under eight weeks more consistently.
sensitivity:
- variable: ARPU
  downsideCase: Production pricing and expansion settle near $52K annual value instead of the base $58K.
  baseCase: Exit blended annual value is about $58K per paying firm.
  upsideCase: Per-matter volume and multi-office expansion lift exit annual value toward about $62K.
  y3RevenueImpactK: -174.0
  cashImpactK: -130.0
- variable: CAC
  downsideCase: Founder-led and partner-led sourcing underperform, pushing CAC toward $30K.
  baseCase: CAC stays near $21K because the beachhead is concentrated and references compound.
  upsideCase: Case-management referrals start to carry more of the funnel and CAC falls toward $16K.
  y3RevenueImpactK: -90.0
  cashImpactK: -170.0
- variable: churn
  downsideCase: Monthly churn rises to 3.0% if buyers view the product as a pilot-only compliance overlay.
  baseCase: Monthly churn holds at 2.0% once the workflow is embedded in approvals and audit packets.
  upsideCase: Monthly churn stays near 1.2% because cleared-matter history and multi-office rollout make the product sticky.
  y3RevenueImpactK: -120.0
  cashImpactK: -90.0
- variable: sales cycle
  downsideCase: Pilot-to-production conversion stretches from about 90 to about 150 days.
  baseCase: A paid pilot converts or closes out in roughly one quarter.
  upsideCase: A fraud trigger or audit trigger compresses conversion toward about 60 days.
  y3RevenueImpactK: -280.0
  cashImpactK: -190.0
- variable: gross margin
  downsideCase: Gross margin exits near 70% because evidence mapping and implementation stay service-heavy.
  baseCase: Y3 weighted gross margin is about 74%.
  upsideCase: Gross margin exits near 76% as integrations and approval packets become more templated.
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
- variable: hiring pace
  downsideCase: The second engineer and second implementation hire are pulled forward before conversion proof is fully established.
  baseCase: Hiring follows the business-plan sequencing and waits for repeatable two-integration deployment.
  upsideCase: The second implementation hire can wait until after 30 customers because onboarding stays under eight weeks.
  y3RevenueImpactK: -20.0
  cashImpactK: -130.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      DirectAndPartnerPipeline[Direct + partner pipeline] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionFirms[Production firms]
      ProductionFirms --> MultiOfficeExpansion[Multi-office and matter-volume expansion]
      MultiOfficeExpansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue comes from turning 3 Y1 paying pilots into 10 production firms by Q4Y2 and 48 paying firms by Q4Y3
    while blended annual value rises toward about $58K.
- checkName: Must go right
  finding: Implementations need to stay under roughly eight weeks and pilot-to-production conversion needs to stay near the
    BP target, or the sales-cycle sensitivity breaks the Y3 logo ramp.
- checkName: Model breaks if
  finding: If buyers prefer bundled settlement products or gross margin stalls near 70%, the downside case pushes the cash
    floor toward roughly $0.1M before H2Y3.
- checkName: Next-round proof
  finding: The $2.1M pre-seed is sized to reach 10 production firms by Q4Y2 and about 23 paying firms by Q2Y3 with two repeatable
    integrations and about six months of buffer.
sanityChecks:
  ruleOf40: Y3 growth 365.2% + EBITDA margin 1.1% = 366.3%
  burnMultiple: Y2 burn multiple is about 2.1x using roughly $797.4K of EBITDA burn against about $384.0K of net new ARR from
    the Y1 exit run-rate to the Q4Y2 run-rate; Q3Y3 turns EBITDA positive.
  revenuePerFte: $218K Y3 on 8 ending FTE (benchmark $200-400K SaaS)
  flags:
  - customersEop includes paid pilots in Y1, so pure production-logo count trails the headline customer count until mid-Y2.
  - The base case reaches 48 firms inside a SAM of roughly 450 beachhead firms, so references and partner leverage have to
    compound inside a concentrated buyer pool.
  - Y2 burn multiple remains around 2x, so any slip in production conversion could force a bridge or a slower hiring pace
    before the next round.
  - Gross margin only reaches the target range if one implementation hire through Q4Y2 and a second late-Y3 hire can keep
    deployments repeatable rather than bespoke.
  - Cash is modeled as EBITDA, so annual billing timing, pilot prepayments, or customer-specific legal and compliance costs
    could move actual cash timing modestly.
