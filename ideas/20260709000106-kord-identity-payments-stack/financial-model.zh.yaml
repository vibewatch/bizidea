slug: property-completion-clearance-rail
date: '2026-07-09'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-09] 模型从这份商业计划日期之后的第一个完整运营月开始。'
- id: A2
  name: 规划用汇率简写
  value: £1 ≈ $1.25
  unit: FX heuristic
  source: '[startup-finance heuristic for 2026 planning translation] BP 的定价写在 GBP 里，但这个工件必须用 USD，所以合同金额采用便于规划的换算汇率，不追求即期 FX 精度。'
- id: A3
  name: 期初现金 / pre-seed 融资
  value: $2.1M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash trough] 基准情形取 pre-seed 区间下沿，但也要保证在现金低点仍留出大约 6 个月缓冲，并能跑到 seed 证明点。'
- id: A4
  name: 起始付费账户
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，得先把共创客户转成付费试点。'
- id: A5
  name: 付费账户定义
  value: 付费试点，或已经在平台费、按件收费或实施费上开始付钱的正式上线律所。
  unit: definition
  source: '[BP businessModel.revenueStreams + BP gtm.pricing] customersEop 只要有律所在试点或正式上线范围内开始付钱，就计入付费客户，方便把早期收入对齐起来。'
- id: A6
  name: 付费试点经济模型
  value: 约 3 个月 $18K（约每月 $6K）
  unit: USD/account
  source: '[BP experimentRoadmap 90-180 days paid pilots at £10k-20k + BP investorMemo.firstCustomer.initialContract 90-day pilot + A2 FX heuristic] 模型对前三个付费部署取试点价格带中位数。'
- id: A7
  name: 正式上线合同与扩张经济模型
  value: 正式上线客户起步约 $45K ARR，到 Y3 末随按件收费、实施收入和多办公室扩张拉升到约 $58K ARR。
  unit: USD/account/year
  source: '[BP gtm.pricing £30k-50k ACV + BP businessModel.expansionLevers + Research market.som about $55k blended annual value + A2 FX heuristic] 基准情形既不超出 BP 的价格带，也和研究里 $55k 左右的混合年价值量级对得上。'
- id: A8
  name: 客户爬坡
  value: M12 末 3 个付费账户，Q4Y2 末 10 个，Q4Y3 末 48 个
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets + Research market.som] 基准情形只取第 3 年 40-60 家目标区间的下半段，不按完整 60 家 SOM 路径去推。'
- id: A9
  name: 收入确认口径
  value: 当期收入 = 当期末付费账户数 × 当期每个付费账户的混合已实现收入；早期季度里试点和实施收入占比更高。
  unit: formula
  source: '[BP businessModel.revenueStreams + BP gtm.pricing] 这样每一行收入都能回扣到 customersEop，同时承认 Y1 和 Y2 早期里，收入不只有稳态订阅 ARR，还有试点和实施收入。'
- id: A10
  name: 毛利率爬坡
  value: Y1 为 52%-58%，Y2 为 61%-70%，Y3 为 72%-75%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 72 + BP operations + startup-finance heuristic] 早期客户准入和证据映射比较重，毛利会先被压住；等集成和审批资料包标准化后才会抬上来。'
- id: A11
  name: 基准试点转正式上线周期
  value: 从付费试点启动到转正式上线，约 90 天
  unit: days
  source: '[BP investorMemo.firstCustomer.initialContract 90-day pilot + BP gtm.funnelTargets paid pilot to production 60%+ + BP experimentRoadmap] 模型假设 1 个季度足够证明 ROI，也足够推动早期客户转正。'
- id: A12
  name: 招聘节奏
  value: M1 创始人和创始工程负责人；M4 产品 / 合规负责人；M7 实施工程师；M10 合作 / 客户主管；M16 第二位工程师；M19 运营；M27 第二位实施 / 客户成功。
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + BP milestones] 招聘节奏先严格按商业计划前 5 个岗位走，之后只补最少的规模化岗位，等正式上线证明出来再加。'
- id: A13
  name: 创始人综合薪酬
  value: $120K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic for UK pre-seed B2B SaaS] 假设创始人现金薪酬偏克制，已含税负和福利。'
- id: A14
  name: 工程团队综合薪酬
  value: $150K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic for UK workflow/integration talent] 反映资深产品与连接器工程能力，但不按后期公司膨胀薪酬来算。'
- id: A15
  name: 产品 / 合规综合薪酬
  value: $140K
  unit: USD/year
  source: '[BP team Product and compliance lead + startup-finance heuristic] 这个岗位要足够资深，能把 AML 和资金来源规则编码进产品，但仍要符合 pre-seed 团队的轻量配置。'
- id: A16
  name: 实施 / 客户成功综合薪酬
  value: $110K
  unit: USD/year
  source: '[BP team Implementation engineer + startup-finance heuristic] 覆盖 部署和客户支持，但不预设一支庞大的服务团队。'
- id: A17
  name: 销售 / 合作综合薪酬
  value: $140K
  unit: USD/year
  source: '[BP team Partnerships and account executive + BP gtm.channels + startup-finance heuristic] 已把聚焦垂直销售所需的差旅和浮动薪酬打进去。'
- id: A18
  name: 运营 / G&A 综合薪酬
  value: $85K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] 覆盖轻量财务、客户管理和供应商管理，前提是第一批正式上线客户已经跑起来。'
- id: A19
  name: P&L 薪酬分摊
  value: 创始人 65% S&M / 15% R&D / 20% G&A；工程 100% R&D；产品 / 合规 70% R&D / 30% G&A；实施 50% S&M / 50% R&D；销售 100% S&M；运营 100% G&A。
  unit: allocation
  source: '[BP team role rationales + BP operations] 职能分摊反映的是：创始人主导销售、工程密集做产品、合规设计前置，以及实施协助扩张。'
- id: A20
  name: 非薪酬 opex 爬坡
  value: 月度非薪酬支出从 Y1 早期合计 $10K，逐步爬到 Q4Y3 的 $24K。
  unit: USD/month
  source: '[BP operations + BP gtm.channels + startup-finance heuristic] 覆盖云成本、法务、保险、差旅和合规工具，不假设大规模付费获客。'
- id: A21
  name: 现金转换口径
  value: 现金变动 = EBITDA
  unit: formula
  source: '[startup-finance heuristic] 现阶段把 capex、税、融资费用和营运资金时差都视作不显著。'
- id: A22
  name: 稳态月度流失率
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early workflow SaaS + BP businessModel.expansionLevers] 只要放行层真的嵌进审批和审计资料包，流失就该偏低；但也还没到成熟 SaaS 那种完美程度。'
- id: A23
  name: CAC 口径
  value: 36 个月销售与营销总支出 ÷ 48 个净新增付费账户
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] 这套口径把创始人主导销售、实施带扩张，以及早期合作方渠道，都一起算进来。'
- id: A24
  name: 下一轮融资里程碑
  value: Q4Y2 做到 10 家正式上线律所，Q2Y3 做到约 23 家付费律所，同时证明 2 条可复用集成、3 次多办公室扩张，以及初步的合作方带单。
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + model cash curve] 这笔钱的目标，是把公司推到 够得上 seed 的证明点，同时在现金最低处还留出约 6 个月缓冲。'
- id: A25
  name: 季度薪酬滚动口径
  value: Y2-Y3 的薪酬行使用季度内真实入职月份，不只看季度末快照。
  unit: convention
  source: '[Headcount column convention + BP team startTiming] 这样薪酬支出才能和招聘爬坡真正对上，即便 Y2 和 Y3 只展示了年末 headcount 快照。'
