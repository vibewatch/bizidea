scenarios:
  downside:
    description: 买方还是觉得痛，但更多客户会偏向打包结算供应商，而且试点转正式上线也比计划慢。
    y3RevenueK: 1250.0
    y3EbitdaK: -280.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 约 32 家，而不是 48 家。
    - 退出时的混合年价值停在约 $52K，而不是约 $58K。
    - 毛利率只到约 70%，因为实施仍然更偏定制。
  base:
    description: 共创客户大体按 1 个季度的节奏转正，机构接受非托管边界，而且第 2 年开始有 1 条合作方路径带来新增。
    y3RevenueK: 1740.0
    y3EbitdaK: 19.8
    cashLowPointK: 487.0
    keyAssumptionChanges:
    - M12 末 3 个付费账户，Q4Y2 末 10 个，Q4Y3 末 48 个。
    - 正式上线的年价值从约 $45K 起步，随着按件收费和多办公室扩张，Y3 末拉到约 $58K。
    - 一旦集成和审计资料包标准化，毛利率就能进到低到中 70% 区间。
  upside:
    description: 两条集成路径很早就跑通，滩头市场里的口碑开始自增长，多办公室扩张也比计划更快挂上。
    y3RevenueK: 2200.0
    y3EbitdaK: 320.0
    cashLowPointK: 650.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 约 55 家，而不是 48 家。
    - 退出时的混合年价值逼近 $62K，因为更多客户挂上更高案件量和第二办公室扩张。
    - 毛利率能到约 76%，前提是部署更稳定地压在 8 周以内。
sensitivity:
- variable: ARPU
  downsideCase: 正式上线定价和扩张只落在年价值约 $52K，而不是基准的 $58K。
  baseCase: 退出时每家付费律所的混合年价值约 $58K。
  upsideCase: 按件收费和多办公室扩张把退出年价值抬向约 $62K。
  y3RevenueImpactK: -174.0
  cashImpactK: -130.0
- variable: CAC
  downsideCase: 创始人主导和合作方带单都不及预期，CAC 被推高到接近 $30K。
  baseCase: 滩头市场买方集中、口碑可复用，所以 CAC 维持在约 $21K。
  upsideCase: 案件管理转介绍开始承担更多漏斗，CAC 下降到接近 $16K。
  y3RevenueImpactK: -90.0
  cashImpactK: -170.0
- variable: churn
  downsideCase: 如果买方把产品当成试点式合规覆盖层，月流失会升到 3.0%。
  baseCase: 一旦工作流嵌进审批和审计资料包，月流失维持在 2.0%。
  upsideCase: 清案历史和多办公室扩张让产品更黏，月流失可压到约 1.2%。
  y3RevenueImpactK: -120.0
  cashImpactK: -90.0
- variable: sales cycle
  downsideCase: 试点转正式上线从约 90 天拉长到约 150 天。
  baseCase: 一个付费试点大体在 1 个季度里转正或结束。
  upsideCase: 一次欺诈或审计触发，能把转化周期压向约 60 天。
  y3RevenueImpactK: -280.0
  cashImpactK: -190.0
- variable: gross margin
  downsideCase: 毛利率只到接近 70%，因为证据映射和实施还太像服务。
  baseCase: Y3 加权毛利率约 74%。
  upsideCase: 随着集成和审批资料包模板化，毛利率可逼近 76%。
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
- variable: hiring pace
  downsideCase: 第二位工程师和第二位实施岗位在转化证明还没完全站稳前就被提前拉进来。
  baseCase: 招聘节奏按商业计划走，等 2 条集成的可复用部署被证明后再加人。
  upsideCase: 如果部署 始终能压在 8 周内，第二位实施岗位可以拖到 30 家客户之后再招。
  y3RevenueImpactK: -20.0
  cashImpactK: -130.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      DirectAndPartnerPipeline[Direct + partner pipeline] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionFirms[Production firms]
      ProductionFirms --> MultiOfficeExpansion[Multi-office and matter-volume expansion]
      MultiOfficeExpansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准收入引擎，就是把 Y1 的 3 个付费试点，滚成 Q4Y2 的 10 家正式上线律所，再滚到 Q4Y3 的 48 家付费律所；同时混合年价值一路抬向约 $58K。
- checkName: 必须顺利发生的事
  finding: 实施周期得稳稳压在约 8 周内，试点转正式上线也得贴着 BP 目标走；否则销售周期这个敏感变量会直接打断 Y3 的客户数爬坡。
- checkName: 模型会失效，如果
  finding: 如果买方更偏好打包结算产品，或者毛利率卡在 70% 左右，下行情形会把现金底线压到 H2Y3 前约 $0.1M。
- checkName: 下一轮融资证明点
  finding: $2.1M 的 pre-seed，就是为了把公司推到 Q4Y2 的 10 家正式上线律所、Q2Y3 的约 23 家付费律所，并同时做出 2 条可复用集成和约 6 个月缓冲。
sanityChecks:
  ruleOf40: Y3 增长 365.2% + EBITDA 利润率 1.1% = 366.3%
  burnMultiple: Y2 的 burn multiple 约 2.1x：约 $797.4K 的 EBITDA burn，对应从 Y1 末 run-rate 到 Q4Y2 run-rate 约 $384.0K 的净新增 ARR；Q3Y3 开始 EBITDA 转正。
  revenuePerFte: Y3 年末 8 个 FTE，对应每个 FTE 约 $218K 收入（SaaS 基准：$200-400K）
  flags:
  - Y1 的 customersEop 把付费试点也算进去了，所以纯正式生产客户数要到 Y2 中段之后才会追上表面客户数。
  - 基准情形在约 450 家滩头律所构成的 SAM 里跑到 48 家，因此口碑和合作方杠杆必须在高度集中的买方池里持续叠加。
  - Y2 的 burn multiple 仍在约 2x，所以只要正式上线转化一滑，就可能在下一轮前逼出 过桥融资，或被迫放慢招聘。
  - 只有在 Q4Y2 之前靠 1 位实施岗位、并把第 2 位实施岗位推到 Y3 后段，仍能把部署做成可复用而非定制时，毛利率才进得去目标区间。
  - 模型把现金直接近似成 EBITDA，所以年付节奏、试点预付款，或客户定制化的法务与合规成本，都会让真实现金时点出现小幅偏移。
