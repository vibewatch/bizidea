problem: >-
  Residential property transactions force conveyancers to clear identity, AML,
  source-of-funds, and payment instructions across buyers, sellers, estate
  agents, and cashiering teams. Most firms still stitch this together with
  separate KYC tools, emails, PDFs, and online banking, so the same evidence is
  recollected and no one has a live view of whether a matter is actually safe
  to complete. As AI-driven fraud improves fake documents and payment
  instruction spoofing, these handoffs become the highest-risk moment in the
  deal.
targetUser:
  primary: >-
    Operations and compliance leaders at UK residential conveyancing firms with
    centralized cashiering teams
  secondary: Sales progression managers at regional UK estate agency groups
  buyer: COO or Head of Conveyancing at a UK residential conveyancing firm
startupThesis:
  nonObviousInsight: >-
    The scarce system of record in property is not the identity check or the
    payment itself; it is the matter-level go or no-go decision that lets
    cashiering release completion funds. A product that owns that release state
    can aggregate KYC, AML, source-of-funds evidence, and payout verification
    into one indispensable workflow.
  beachhead: >-
    UK residential conveyancing firms completing 300-2,000 matters per year,
    with centralized client-account cashiering and repeated source-of-funds
    chases in the final week before completion
  wedge: >-
    Pre-completion clearance workspace that collects identity, source-of-funds,
    and destination-account evidence once, then gates release of completion
    money
  whyNowCatalyst: >-
    Kord's funding, FCA-regulated traction, and explicit anti-fraud positioning
    show that conveyancers are now budgeting to replace manual property-deal
    clearance workflows.
  ventureScalePath: >-
    Start with UK residential conveyancing, then expand into remortgages,
    commercial property, probate distributions, developer sales, and other
    regulated high-value money-movement workflows that need shared evidence and
    controlled payout release.
solution: >-
  The product opens a matter the moment an offer is accepted and creates a
  single clearance timeline for ID, AML, funds provenance, and payout
  readiness. Buyers and sellers upload evidence once, while estate agents,
  brokers, and conveyancers can pass approved facts forward instead of
  restarting checks in each inbox. A cashiering console verifies bank details,
  enforces dual approval before money moves, and produces an audit-ready
  completion packet for each matter. Over time, the system builds a reusable
  counterparty, document, and account-risk graph that speeds clean matters and
  escalates anomalous ones earlier.
goToMarketSeed:
  firstCustomer: >-
    A UK residential conveyancing firm with 20-80 fee earners, 300-2,000
    annual completions, and a centralized cashiering team still running AML
    review and payment release in separate systems
  buyingTrigger: >-
    A payment-instruction fraud near-miss, insurer or regulator scrutiny, or a
    leadership mandate to cut last-week completion delays during peak housing
    volume
  currentAlternative: >-
    Manual email and PDF collection layered on separate KYC and AML vendors,
    case-management notes, and online-banking or client-account payment
    workflows
  switchingReason: >-
    The wedge turns scattered checks into one matter-level release decision, so
    staff stop recollecting evidence and cashiering only sends money when the
    clearance packet is complete.
  pricingHypothesis: >-
    Annual platform fee plus per matter cleared or per completion payout,
    priced against avoided rework, reduced fraud exposure, and faster file
    throughput.
