jobsToBeDone:
  - job: >-
      When a residential sale enters the final week before completion, help
      conveyancing operations teams confirm identity, AML, and source-of-funds
      evidence, so they can release client money without delaying the deal.
    currentAlternative: Email chase across fee earners, KYC vendors, and cashiering staff
    successMetric: Share of matters fully cleared 48 hours before completion
  - job: >-
      When an estate agent hands a buyer to the instructed conveyancer, help
      sales progression and legal ops teams reuse verified facts, so they can
      avoid duplicate onboarding and reduce fall-through risk.
    currentAlternative: Recollecting the same documents in separate portals and inboxes
    successMetric: Reduction in duplicate evidence requests per matter
