topRisks:
  - name: Incumbent bundling
    description: KYC vendors, case-management systems, or payment rails may add similar property workflows once demand is obvious.
    mitigation: Own the matter-level clearance decision and cross-firm handoff data, then integrate with incumbents instead of trying to replace every system.
  - name: Regulatory scope creep
    description: Touching client-money release can pull the company into heavier legal and payments obligations than a pure workflow tool.
    mitigation: Start as a non-custodial clearance and approval layer that integrates with existing client-account and payment providers, then expand permissions selectively.
  - name: Multi-party adoption friction
    description: The workflow spans buyers, sellers, estate agents, conveyancers, and cashiering teams, so rollout can stall if the product requires network-wide behavior change on day one.
    mitigation: Land inside one conveyancing firm first, deliver value without external dependencies, and add reusable handoff passes only after internal clearance wins are proven.
