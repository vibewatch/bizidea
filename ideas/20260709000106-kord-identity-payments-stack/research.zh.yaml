competitors:
- name: Kord
  stage: 成长阶段
  wedge: 面向房产中介、律所和过户团队的一体化 AML、身份核验、资金来源与支付基础设施。
  pricing: 定制 / 未公开
  strength: 最直接的市场证据：买方确实会为一条房产合规 + 支付合一的轨道买单。
  weaknessVsUs: 但它的平台姿态更宽；拟议中的创业公司切得更窄，专盯案件级放行决定和非托管编排。
  sourceRefs:
  - 49
  - 50
- name: Thirdfort
  stage: 成长阶段
  wedge: 面向过户律所的客户尽职调查，覆盖 ID 核验、AML、资金来源，以及案件管理集成。
  pricing: 定制 / 未公开
  strength: 在法律行业已有很深的落地，也证明了律所愿意为更快的数字化 CDD 付费。
  weaknessVsUs: 它更像证据收集和报告工具，还没有真正拿住最后的出纳放行状态。
  sourceRefs:
  - 52
  - 53
  - 54
- name: Armalytix
  stage: 成长阶段
  wedge: 以 开放银行 为核心，服务法律和房产工作流中的资金来源与流水分析。
  pricing: 定制 / 未公开
  strength: 在资金来路分析上很深，而且已经嵌进法律工作流。
  weaknessVsUs: 但它更窄，主要围着资金来源转；它不会自然变成跨所有参与方共享的放行工作台。
  sourceRefs:
  - 63
  - 68
- name: InfoTrack
  stage: 现有厂商
  wedge: 覆盖 客户准入、资金核验、搜索和交割前任务的广谱过户工作流栈。
  pricing: 定制 / 按模块报价
  strength: 它已经深嵌在律所日常工作流里，而且一口气横跨多个相邻任务。
  weaknessVsUs: 但再宽的套件，也可能让“这单到底能不能放”继续分散在多个步骤里，而不是被明确拿住。
  sourceRefs:
  - 71
  - 72
- name: PEXA UK
  stage: 现有厂商
  wedge: 数字化房产结算、申报和交割基础设施，并带自动化资金流转。
  pricing: 定制平台 / 按交易收费
  strength: 如果买方想要更深的交割与结算轨道，它是最强的相邻替代。
  weaknessVsUs: 可它更重，承担的资金流角色也比一层中立放行层一开始能承受的更深。
  sourceRefs:
  - 76
  - 77
regulatoryTechnicalConstraints:
- point: 一旦建立业务关系，或在房产买卖里为另一方处理事务，客户尽职调查和资金 / 财富来源审查就会成为预期动作。
  sourceRefs:
  - 1
  - 15
  - 36
- point: HMLR safe harbour 要求生物识别 + 密码学级别的数字身份核验；简单拍照或 MRZ 采集远远不够。
  sourceRefs:
  - 8
  - 40
- point: 过户业务被明确列为高风险场景，而过度依赖交易链上其他参与方，本身就是已知薄弱点。
  sourceRefs:
  - 17
  - 20
  - 46
- point: 只要产品真的碰到资金流转，收款人校验、赔付规则和结算轨道设计就都会变成控制栈的一部分。
  sourceRefs:
  - 25
  - 26
  - 28
  - 30
  - 76
validationSignals:
- point: Kord 的 Series A，直接验证了“房产工作流把身份、AML 和支付揉在一起”这条赛道。
  sourceRefs:
  - 50
- point: Thirdfort 在过户场景里的落地和案件管理集成，说明这个垂直行业已经愿意为数字化 CDD 基础设施付钱。
  sourceRefs:
  - 52
  - 53
  - 54
- point: HMLR safe harbour 消掉了远程身份核验最大的几类政策阻力之一。
  sourceRefs:
  - 8
  - 40
- point: InfoTrack 和 PEXA 证明，买方愿意把房产工作流基础设施真正嵌进日常运营。
  sourceRefs:
  - 71
  - 72
  - 76
openQuestions:
- 在没有统一审批与证据工作流的前提下，今天还有多少中型过户律所在放交割款？
- 有多少案件会在最后时刻升级资金来源审查？这种情况又有多频繁会把交割拖慢 24–72 小时？
- 买方会不会买一层中立、非托管的放行层，还是只接受同时掌管受保护客户资金流转的供应商？
- 每年 300–2,000 笔案件这个细分里，主导性的案件管理和出纳系统到底是哪几套？它们的 API 开放度如何？
