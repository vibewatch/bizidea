slug: property-completion-clearance-rail
date: '2026-07-09'
executiveSummary: 这家公司卖的是一套非托管的交割放行工作台，面向英格兰和威尔士的中型住宅房产过户律所；这些机构今天还把 KYC、资金来源、案件管理和银行打款拆成几步跑，最后再放出交割款。最锋利的切口，是案件级的“能不能交割”决定，因为合规风险、打款指令劫持风险和最后一周的运营延迟，都在这里汇合。研究已经说明预算和紧迫性都是真实存在的：过户业务被明确视作 AML 高风险场景，资金来源要求在收紧，打款指令劫持欺诈也一直没退场。第一版产品不该碰客户资金；它该做的是把证据拢起来、核验放款就绪状态、强制双重审批，并在律所现有客户账户和支付体系里产出一份可审计的交割资料包。最短的验证路径，是创始人直接卖给 20-80 位 经办人员 规模律所的过户业务负责人和 COO；案件管理和资金来源集成的角色，是缩短部署，不是第一天就拿来分发。定价应该是年平台费叠加每笔完成放行的案件收费，卖点锚定在少返工、更早看到案件何时能放行，以及更低的欺诈敞口。最好的扩张路径，是把工作流所有权继续吃进再抵押、遗嘱认证分配和其他受监管的大额出款流程；但这些相邻场景，都该等公司先证明：一层非托管放行控制，真的能把试点转成正式上线。眼下最大的缺口是，现有来源还没有量化平均延迟缩短多少、欺诈损失少掉多少，以及买方到底更偏好中立审批层还是打包结算产品。所以前 6-12 个月该按证伪项目来跑，不该当扩张计划来跑。
problem:
- 交割前最后一周，身份、AML、资金来源、银行账户和签字放行还分散在不同流程里跑，所以没有任何人真正拿着每笔案件的实时“可放款”状态。
- AI 驱动的假文件、打款指令劫持和不断加码的 AML 审查，让邮件和 PDF 交接在最需要放出客户资金的时候变得更危险。
- 机构已经给多家供应商付费，但这笔钱被切得很碎，结果还是躲不开重复收证据、最后时刻升级处理，以及交割环节审计可见性不足。
solution:
- 在报价被接受时就开一套案件级放行工作台，把 ID、AML、资金来源、银行账户核验和审批状态都拉进同一条时间线。
- 让买卖双方、经办人员、合规和出纳复用已批准证据，不再在不同系统和邮箱里反复收。
- 在保持非托管、并接入现有客户账户和支付轨道的前提下，用双重审批、异常路由和可审计交割资料包卡住交割款放行。
whyWeWin:
- 我们拿的是放还是不放的决定权——这正是点状 KYC、资金来源和支付工具一直没能收拢的地方。
- 我们可以先落在现有案件管理、AML 和银行栈之上，不逼客户重换底层系统，这让保守市场里的切换风险更低。
- 每放行一笔案件，都会沉淀对手方、银行账户、异常原因和审批结果的专有数据；这些数据会越滚越厚，让之后的放行更快、审计更稳。
strategicChoices:
  beachhead: 英格兰和威尔士拥有 20-80 位 经办人员、每年完成 300-2,000 笔交割、并设有集中式出纳的住宅房产过户律所。
  wedgeRationale: 这批客户反复碰到最后一周的放行痛点，有明确的运营和合规买方，量也足够大，能很快做出 ROI；如果一开始就往房产中介分发，或想覆盖全部受监管支付场景，部署会变慢，验证也会变糊。
  sequencingRationale: 先做一层内部、非托管的放行控制，因为它不要求整个交易网络第一天就改习惯，也不会立刻撞上支付监管；等产品先在一家律所内部证明能更快放行、审计更有把握，再往更深的集成、可复用的外部参与方通行证，以及相邻工作流扩。
  notYet:
  - 托管、受保护的客户资金处理，或直接接管结算
  - 在过户案例出来前就靠房产中介分发
  - 在住宅打法还没跑顺前就扩到商业地产、遗嘱认证和再抵押
market:
  tam: 约 $63.3M 的英国年支出：基于约 110 万笔住宅交割，以及围绕交割前放行的现有工具支出推算。
  sam: 约 $21.6M：大致对应英格兰和威尔士约 450 家设有集中式出纳的中型律所。
  som: 约 $3.3M：第 3 年如果拿下约 60 家律所、混合年价值约 $55k，可触达这一级收入。
  segments:
  - 设有集中式出纳的英格兰和威尔士住宅房产过户律所
  - 设有内部销售推进团队的区域性房产中介集团
  buyingProcess: 通常是一笔打款指令险些出事、一次 AML 审查，或一个吞吐瓶颈，触发过户业务负责人、MLRO 或 COLP，以及出纳负责人一起评估，最后由 COO 拍板商务。单子能不能赢，不在于承诺一套全新的结算栈，而在于能不能顺着现有案件管理和客户账户流程嵌进去。
product:
  mvp: 一套非托管放行控制台：开案件、收集并复用 ID、AML、资金来源和银行账户证据、路由异常、执行双重审批，并导出可审计的交割资料包。它先接一个案件管理系统、一个数字 ID 或 AML 供应商，再加一层收款人或银行账户核验，而不是去替换现有支付轨道。
  sixMonth: 把 MVP 部进 3-5 家共创客户，补上按角色审批、异常看板，以及“交割前 48 小时已放行案件占比”的基础报表。
  twelveMonth: 补上可复用的对手方与银行账户档案、面向外部参与方的证据请求，并接入滩头市场里最常见的 2 套案件管理或资金来源系统。
  twentyFourMonth: 上线决策支持型 基准对比，并把工作流延到一个相邻、重出款的场景，比如再抵押交割或遗嘱认证分配；除非客户强力拉着往更深的资金控制走，否则继续保持非托管。
  keyBets:
  - 在客户要求打包结算供应商之前，机构会先买一层非托管审批层。
  - 滩头市场里最主流的案件管理系统足够开放，实施周期能压在 8 周以内。
  - 只要拿住放行状态，就能在周期时长、异常率和重复索证上打出足够可量化的 ROI，压过手工流程的惯性。
  - 前几百笔案件之后，反复出现的对手方和银行账户数据会真的堆出风险与复用护城河。
gtm:
  wedge: 先把一套交割前放行工作台卖进一家中型过户律所里一个集中式出纳团队，再从这个团队往全所 经办人员 和各办公室扩。
  channels:
  - 创始人主导，直销给过户业务负责人、COO、MLRO 和出纳负责人
  - 先靠实施把现有客户做深，再在内部扩张
  - 更后期再通过案件管理、客户准入和资金来源合作方，做转介绍和嵌入式分发
  funnelTargets: 线索→合格探索 30%+，探索→付费试点 35%+，付费试点→正式上线 60%+，正式上线→12 个月内多办公室扩张 40%+
  pricing: 年平台费 + 每笔完成放行的案件收费；目标是让 300-2,000 笔案件规模的律所在第一年形成约 £30k-50k ACV。定价锚点是今天分散的工具支出、更少返工和更早进入交割就绪，而不是支付抽成。
businessModel:
  revenueStreams:
  - 交割放行工作台的年度平台订阅
  - 按完成放行的案件或走完审批流的交割打款收费
  - 案件管理接入与工作流梳理的实施费用
  unitOfValue: 达到可放款状态的案件
  targetGrossMarginPct: 72
  expansionLevers:
  - 从一个出纳团队扩到律所里所有过户团队和办公室
  - 提高每家律所经过放行工作流的案件量
  - 卖 基准对比、异常分析和可复用风险图谱功能
  - 等住宅打法跑通后，再延到相邻、重出款的工作流
strategyMap:
  northStarMetric: 纳入范围的案件里，计划交割前 48 小时就已完成全部放行的占比
  inputMetrics:
  - 从开案到完整证据包收齐的中位天数
  - 每笔案件的重复证据请求次数
  - 交割前 48 小时内才冒出来的晚期异常数
  - 试点转正式上线的转化率
  - 每家律所的中位实施周期
  moatsToBuild:
  - 跨案件的对手方与银行账户风险图谱
  - 把证据、审批人、升级记录和放款结果连起来的审计数据集
  - 嵌进案件管理和资金来源工作流的深度集成
  - 按案件类型和律所分组沉淀的放行速度与异常原因 基准对比
  killCriteria:
  - 如果前 8 家目标律所里，不到 4 家承认最后一周确实被放行追单和手工来回拖住，就不要做独立产品。
  - 如果前 5 个付费试点里，不到 2 个能在公司不碰客户资金的前提下，以高于 £30k ACV 转成正式上线，就改走合作方主导或打包模式。
  - 如果前两条优先集成路径都做不到 8 周内落地，就不要铺开直销，而该先收缩到一个锚点平台。
  mermaid: |
    flowchart LR
      Wedge[Mid-market conveyancing cashiering wedge] --> MVP[Non-custodial clearance workspace]
      MVP --> Proof[Faster 48-hour clearance and fewer late exceptions]
      Proof --> Expansion[Multi-office rollout and adjacent property workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: 切口足够锋利、监管痛点也真，但风投逻辑仍取决于：在不碰结算或托管的前提下，能不能把预算真正收进来。
    whyBelieve: 过户律所今天已经在为身份、AML、资金来源和工作流工具付分散预算；而放行控制缺口，正是欺诈风险和运营延迟汇合的地方。
    whyDoubt: 滩头市场的 SAM 偏窄，而且案件管理套件、Kord 和 PEXA 这类相邻厂商，一旦买方更偏好打包平台，就可能把单子拿走。
    nextDiligence: 和 5-8 家中型律所确认：一层非托管放行层能不能把最后一周异常显著压下去，从而撑起 £30k-50k ACV 和正式上线转化。
  firstCustomer:
    title: 设有集中式出纳的英格兰和威尔士中型住宅房产过户律所
    profile: 一家拥有 20-80 位 经办人员、每年完成 300-2,000 笔交割、且已在使用分散的 ID/AML、资金来源和客户账户付款工具的律所。
    trigger: 一次打款指令险些出事、一次 AML 审查，或反复出现的最后一周交割延迟，逼着管理层收紧放行控制。
    buyer: COO
    initialContract: 先签一个 90 天付费试点，覆盖一个出纳团队和 150-300 笔案件；如果“交割前 48 小时已放行案件占比”明显提升，再转成约 £30k-50k ACV。
  mustBeTrue:
  - 前 8 家滩头客户里，至少 5 家承认：每 100 笔案件在最后一周追资金来源和放行，确实要吃掉双位数工时。
  - 目标买方愿意先为一层非托管审批层签单，不要求创业公司自己持有或划转客户资金。
  - 这个细分市场里最常见的 2 套案件管理系统，能在 8 周内或更短时间里重复部署。
  - 试点能把“交割前 48 小时已放行案件占比”相对基线拉高至少 20 个百分点。
  - 混合第一年 ACV 可以高于 £30k，同时数据、合规和 部署成本仍能撑住 70% 以上的毛利。
  diligenceQuestions:
  - 今天每 100 笔案件里，最后一周到底有多少人工时间花在追资金来源、银行账户和签字放行上？
  - 一次欺诈险些出事后，最先拍预算的是 COO、过户业务负责人、MLRO，还是出纳负责人？
  - 机构会不会买一层中立审批层，还是坚持要一个同时管结算或托管客户资金的供应商？
  - 在每年 300-2,000 笔案件这个细分里，主导性的案件管理和出纳系统到底是哪几套？它们的 API 有多开放？
  - 如果客户已经用了 Thirdfort、InfoTrack、Armalytix 或类似工具，什么证据才足以让他们切换？
operatingAssumptions:
- assumption: 设有集中式出纳的英格兰和威尔士中型过户律所，数量足够支撑第一阶段直销。
  basis: research.yaml
  validationTest: 先画出 50 家目标律所，确认至少 20 家符合“每年 300-2,000 笔案件 + 集中式出纳”画像。
  decisionImpact: 如果不成立，就要更早收窄到更大的律所，或把分发提前交给案件管理合作方。
- assumption: 相比同时持有或发起客户资金流转的产品，买方会先接受一层非托管审批层。
  basis: operator judgment
  validationTest: 做 10 场结构化买方访谈，跟踪大多数人是否更偏好先部署审批层，再谈打包结算。
  decisionImpact: 如果不成立，就要更深地绑定结算或 TPMA 供应商，并重画产品边界。
- assumption: 机构会愿意付约 £30k-50k ACV，因为这接近他们今天分散支出的总和，也比继续返工和暴露在欺诈里更便宜。
  basis: research.yaml
  validationTest: 把定价打进前 5 份试点方案，要求至少拿下 2 个不靠重折扣的付费试点。
  decisionImpact: 如果不成立，就该去更大的律所、缩小实施范围，或改成现有平台里的一个模块。
- assumption: 头部案件管理和资金来源系统的集成速度，足以把部署压在 8 周以内。
  basis: research.yaml
  validationTest: 把前两条生产级连接器做出来，量从签约到试点上线到底花多久。
  decisionImpact: 如果不成立，就该聚焦一个锚点平台，或改卖一层更轻的覆盖层，少碰系统级真相源。
- assumption: 跨案件复用对手方、文件和银行账户证据，能在前几百笔之后做出可量化的差异化。
  basis: idea.yaml
  validationTest: 在 200+ 笔真实案件后，对比重复索证率和异常处理时长的前后变化。
  decisionImpact: 如果不成立，数据护城河就比想象中弱，公司应该把重心收回到工作流 ROI，而不是数据网络效应。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 在 8 家目标律所里做工作流审计，量化最后一周的放行痛点
  hypothesis: 滩头客户在最后一周确实要花掉足够多的人工时间，也确实会碰到足够多的晚期异常，值得上一套新的 权威记录系统。
  successMetric: 至少 5 家愿意分享基线指标，且其中 4 家承认每 100 笔案件要花双位数工时追放行。
  owner: 创始人/CEO
- horizon: 0-90 天
  experiment: 先用人工放行资料包和审批清单，在真实案件上跑 人工代跑 试点
  hypothesis: 就算还没深度产品化、也还没形成外部参与方网络效应，这套放行状态工作流本身就已经有价值。
  successMetric: 3 家共创客户把这套流程用在至少 50 笔案件上，并明确要求出软件版本。
  owner: 创始人/CEO
- horizon: 90-180 天
  experiment: 给 1 套案件管理系统、1 家 ID/AML 供应商，以及 1 层收款人或银行账户核验上线 MVP 集成
  hypothesis: 产品能嵌进现有工作流，而不逼客户替换现在的供应商。
  successMetric: 第一个试点在签约后 8 周内上线。
  owner: 创始工程负责人
- horizon: 90-180 天
  experiment: 向共创客户定价并卖出付费试点
  hypothesis: 买方愿意从现有合规和运营预算里直接给这款产品拨钱。
  successMetric: 至少拿下 2 个 £10k-20k 的付费试点，而且都写清楚转正式上线的标准。
  owner: 创始人/CEO
- horizon: 180-360 天
  experiment: 量产环境里跟踪“交割前 48 小时已放行案件占比”和重复索证请求
  hypothesis: 拿住放行状态，带来的是可量化的运营 ROI，不只是更顺手的工作流。
  successMetric: 试点客户把 48 小时放行率拉高 20 个点以上，并把重复索证压低 25% 以上。
  owner: 产品与合规负责人
- horizon: 180-360 天
  experiment: 通过 1 家案件管理或资金来源集成合作方，测试 合作方带来的销售管道
  hypothesis: 只有在直销已经被证明后，合作方分发才会真正把 CAC 打下来。
  successMetric: 单一合作方至少带来 3 个合格机会，或 1 份已签推荐协议。
  owner: 合作负责人
operations:
- 维护一套控制项库，覆盖 HMLR safe harbour 身份核验、资金来源审查、银行账户核验和双重审批。
- 坚持非托管架构，保留不可变审计日志、按角色访问，以及彼此隔离的审批权限。
- 把前两套案件管理系统和 1 家资金来源供应商的集成 操作手册 标准化。
- 每周和共创客户的 MLRO 或运营负责人复盘异常分类，持续收紧规则、减少误报升级。
- 盯住客户健康度：看交割前 48 小时放行率、部署周期，以及试点转正式上线。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 买方发现、试点销售和监管叙事都得自己抓，因为切口本身还在被验证。
- role: 创始工程负责人
  startTiming: 第 0 个月
  rationale: 要把工作流引擎、审计日志和首批集成做出来，产品才能在真实案件里跑起来。
- role: 产品与合规负责人
  startTiming: 第 3 个月
  rationale: 把 AML、资金来源和审批规则翻成结构化工作流与异常处理。
- role: 实施工程师
  startTiming: 第 6 个月
  rationale: 把部署周期压下去，让早期客户稳定上线，而不是让产品团队被 部署工作埋住。
- role: 合作与客户主管
  startTiming: 第 9 个月
  rationale: 只有在 2 家正式生产客户和 1 条可复用实施路径都出现后，才加 pipeline。
milestones:
- horizon: 0-12 个月
  items:
  - 在滩头市场签下 6-8 家共创客户
  - 沿着 1 条案件管理集成路径，上线 3 个付费试点
  - 在 2 个试点里证明：交割前 48 小时已放行案件占比至少提升 20 个点
  - 继续保持非托管，并把住宅交割所需的控制项库和审计资料包补齐
- horizon: 12-24 个月
  items:
  - 把 8-12 家律所转成正式上线，其中至少 3 家扩到多个团队或办公室
  - 支持目标细分里最常见的 2 套案件管理或资金来源集成
  - 上线可复用的对手方与银行账户档案，以及 基准对比 报表
  - 从 1 家工作流或合规集成合作方那里拿下首批分发客户
- horizon: 24-36 个月
  items:
  - 如果 ACV 和留存站得住，做到 40-60 家正式生产律所
  - 扩到 1 个相邻、重出款的工作流，比如再抵押交割或遗嘱认证分配
  - 根据买方拉力，决定继续保持非托管，还是加深与结算合作方的绑定
  - 拿跨案件的异常与审批数据，上线更高价的决策支持功能
risks:
- risk: 买方可能更想要打包的结算平台或受托客户资金平台，而不是一层中立放行层。
  likelihood: Medium
  impact: High
  mitigation: 先作为非托管控制层切进去，但要和支付及结算合作方深度集成；如果买方需要，公司也能借别人的底座去打包。
- risk: 案件管理、KYC 或结算端的现有厂商，可能在创业公司护城河立住前就补出一个“够用”的审批层。
  likelihood: High
  impact: High
  mitigation: 差异化要放在跨参与方证据复用、异常智能，以及最快的见效速度上，而不是只做清单式自动化。
- risk: 如果头部出纳或案件管理系统的集成太难，直销模式会被过慢的实施周期拖垮。
  likelihood: Medium
  impact: High
  mitigation: 优先打穿 1 条锚点集成路径，保留人工兜底流程，并在部署时间可预测前，不要大面积铺开销售。
- risk: 公司可能量不出足够扎实的 ROI，因而挤不掉手工流程和既有点状工具。
  likelihood: Medium
  impact: Medium
  mitigation: 每个试点都先打底记录人工工时、晚期异常和重复索证，把正式上线和量化改善直接挂钩。
- risk: 如果过早往监管建议或资金流转深处走，公司可能在产品市场契合前就把合规边界拉得过宽。
  likelihood: Medium
  impact: High
  mitigation: 第一阶段只做证据编排与审批，配合法律外审和明确的产品边界控制。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月资金应足以把非托管 MVP、首批集成、合规产品工作、6-8 家共创客户、3 个付费试点，以及“直销进中型过户律所能转成正式账户”这件事跑出证明。
