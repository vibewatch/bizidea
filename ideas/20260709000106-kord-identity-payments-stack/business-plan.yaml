slug: property-completion-clearance-rail
date: "2026-07-09"
executiveSummary: >-
  This company sells a non-custodial clearance workspace to mid-market
  residential conveyancing firms in England and Wales that still release
  completion funds through separate KYC, source-of-funds, case-management, and
  banking steps. The wedge is the matter-level clear-to-complete decision,
  because that is where compliance risk, payment-diversion risk, and last-week
  operational delay converge. Research supports real budget and urgency:
  conveyancing is treated as high-risk for AML, source-of-funds expectations
  are tightening, and payment-diversion fraud remains a live threat. The first
  product should not hold client money; it should aggregate evidence, verify
  payout readiness, enforce dual approval, and produce an audit-ready
  completion packet inside the firm's existing client-account and payment setup.
  Direct founder-led sales to Heads of Conveyancing and COOs at 20-80-fee-earner
  firms are the fastest path to proof, with case-management and source-of-funds
  integrations used to shorten deployment rather than as day-one distribution.
  Pricing should bundle an annual platform fee with a per-cleared-matter charge,
  sold against avoided rework, earlier file clearance visibility, and reduced
  fraud exposure. The best expansion path is deeper workflow ownership across
  remortgages, probate distributions, and other regulated disbursement
  processes, but those adjacencies should wait until the company proves that a
  non-custodial release-control layer can convert pilots into production. The
  main gaps are that the current source set does not quantify average delay
  reduction, fraud-loss avoidance, or exact buyer preference between a neutral
  approval layer and a bundled settlement product, so the first 6-12 months
  must be run as a falsification program, not a scale-up plan.
problem:
  - >-
    Final-week property completion still relies on separate KYC, AML,
    source-of-funds, bank-detail, and sign-off workflows, so no one owns a
    live release-ready state for each matter.
  - >-
    AI-driven document spoofing, payment-diversion fraud, and rising AML
    scrutiny make email and PDF handoffs materially riskier exactly when
    cashiering teams are asked to release client money.
  - >-
    Firms already pay multiple vendors, but that spend is fragmented and still
    leaves duplicate evidence requests, late escalations, and weak audit
    visibility at completion.
solution:
  - >-
    Open a matter-level clearance workspace at offer acceptance and track ID,
    AML, source-of-funds, bank-account verification, and approval status in one
    timeline.
  - >-
    Let buyers, sellers, fee earners, compliance, and cashiering reuse approved
    evidence instead of recollecting it across inboxes and portals.
  - >-
    Gate completion release with dual approval, exception routing, and an
    audit-ready completion packet while remaining non-custodial and integrated
    into existing client-account and payment rails.
whyWeWin:
  - >-
    We own the release or no-release decision that point KYC, source-of-funds,
    and payment tools leave fragmented.
  - >-
    We can land without asking firms to replace their case-management, AML, or
    banking stack, which lowers switching risk in a conservative market.
  - >-
    Each cleared matter compounds proprietary data on counterparties,
    bank accounts, exception reasons, and approval outcomes that can improve
    future clearance speed and auditability.
strategicChoices:
  beachhead: >-
    England-and-Wales residential conveyancing firms with 20-80 fee earners,
    300-2,000 completions per year, and centralized cashiering.
  wedgeRationale: >-
    This slice has recurrent final-week clearance pain, named operational and
    compliance buyers, and enough volume to show ROI quickly; going broader
    into estate agencies or all regulated payments would slow deployment and
    muddy proof.
  sequencingRationale: >-
    Start with an internal, non-custodial release-control layer because it
    delivers value without requiring network-wide behavior change or payment
    regulation; add deeper integrations, reusable external-party passes, and
    adjacent workflows only after the product proves faster clearance and
    higher audit confidence inside one firm.
  notYet:
    - Custody, safeguarded client-money handling, or direct settlement ownership
    - Estate-agent-led distribution before conveyancer case studies exist
    - Commercial property, probate, and remortgage workflows before the
      residential playbook is repeatable
market:
  tam: >-
    $63.3M estimated annual UK spend around pre-completion clearance, based on
    about 1.1M residential completions and inferred current tooling spend
  sam: >-
    $21.6M estimated spend in roughly 450 England-and-Wales mid-market firms
    with centralized cashiering
  som: >-
    $3.3M reachable year-3 revenue at about 60 firms and roughly $55k blended
    annual value
  segments:
    - England-and-Wales residential conveyancing firms with centralized cashiering
    - Regional estate agency groups with in-house sales progression
  buyingProcess: >-
    A payment-diversion near miss, AML review, or throughput bottleneck
    typically triggers evaluation by the Head of Conveyancing, MLRO or COLP,
    and cashiering lead, with commercial approval from the COO. The deal is
    won by fitting inside current case-management and client-account processes,
    not by promising a net-new settlement stack.
product:
  mvp: >-
    A non-custodial clearance console opens a matter, collects and reuses ID,
    AML, source-of-funds, and bank-detail evidence, routes exceptions, enforces
    dual approval, and exports an audit-ready completion packet. It integrates
    with one case-management system, one digital ID or AML provider, and payee
    or bank-detail verification rather than replacing existing payment rails.
  sixMonth: >-
    Deploy the MVP in 3-5 design-partner firms, add role-based approvals,
    exception dashboards, and baseline reporting on matters cleared 48 hours
    before completion.
  twelveMonth: >-
    Add reusable counterparty and bank-account profiles, external-party
    evidence requests, and integrations into the two most common
    case-management or source-of-funds systems in the beachhead.
  twentyFourMonth: >-
    Launch decision-support benchmarking and extend the workflow into one
    adjacent disbursement-heavy use case such as remortgage completions or
    probate distributions, while staying non-custodial unless customers pull
    hard for deeper money-movement ownership.
  keyBets:
    - >-
      Firms will buy a non-custodial approval layer before demanding a bundled
      settlement provider.
    - >-
      The top case-management systems in the beachhead are open enough to keep
      implementation under eight weeks.
    - >-
      Owning the release state will surface enough measurable ROI in cycle
      time, exception rate, and duplicate requests to overcome manual-process
      inertia.
    - >-
      Repeated counterparty and bank-account data will produce a real risk and
      reuse moat after the first few hundred matters.
gtm:
  wedge: >-
    Sell a pre-completion clearance workspace to one centralized cashiering
    team inside a mid-market conveyancing firm, then expand to the rest of the
    firm's fee earners and offices.
  channels:
    - Founder-led direct sales to Heads of Conveyancing, COOs, MLROs, and cashiering leaders
    - Implementation-led expansion within existing customers
    - Later referral and embedded distribution through case-management, onboarding, and source-of-funds partners
  funnelTargets: "lead→qualified discovery 30%+, discovery→paid pilot 35%+, paid pilot→production 60%+, production→multi-office expansion 40%+ within 12 months"
  pricing: >-
    Annual platform fee plus a per cleared matter charge; target first-year ACV
    of roughly £30k-50k for 300-2,000-matter firms, priced against fragmented
    current spend, reduced rework, and earlier completion readiness rather than
    against payment take rate.
businessModel:
  revenueStreams:
    - Annual platform subscription for the clearance workspace
    - Per matter cleared or completion release processed through the approval flow
    - Implementation and integration fees for case-management and workflow mapping
  unitOfValue: Matter cleared to release-ready status
  targetGrossMarginPct: 72
  expansionLevers:
    - Roll out from one cashiering team to all conveyancing teams and offices in the firm
    - Increase per-firm matter volume routed through the clearance workflow
    - Sell benchmarking, exception analytics, and reusable risk-graph features
    - Extend into adjacent disbursement-heavy workflows after the residential playbook is proven
strategyMap:
  northStarMetric: Percentage of in-scope matters fully cleared 48 hours before scheduled completion
  inputMetrics:
    - Median days from file open to full evidence pack completion
    - Duplicate evidence requests per matter
    - Late exceptions raised inside 48 hours of completion
    - Pilot-to-production conversion rate
    - Median implementation time per firm
  moatsToBuild:
    - Cross-matter counterparty and bank-account risk graph
    - Audit dataset linking evidence, approvers, escalations, and payout outcomes
    - Embedded integrations into case-management and source-of-funds workflows
    - Benchmarks on clearance speed and exception reasons by matter type and firm cohort
  killCriteria:
    - >-
      If fewer than 4 of the first 8 target firms report material final-week
      clearance pain or manual chasing, do not pursue a standalone product.
    - >-
      If fewer than 2 of the first 5 paid pilots convert to production at more
      than £30k ACV without the company holding client money, pivot to a
      partner-led or bundled model.
    - >-
      If the first two priority integrations cannot be deployed in under eight
      weeks, narrow to one anchor platform instead of pursuing a broad direct
      motion.
  mermaid: |
    flowchart LR
      Wedge[Mid-market conveyancing cashiering wedge] --> MVP[Non-custodial clearance workspace]
      MVP --> Proof[Faster 48-hour clearance and fewer late exceptions]
      Proof --> Expansion[Multi-office rollout and adjacent property workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: >-
      Sharp workflow wedge and real regulatory pain, but the venture case still
      depends on proving budget capture without owning settlement or custody.
    whyBelieve: >-
      Conveyancing firms already buy fragmented identity, AML, source-of-funds,
      and workflow tools, and the release-control gap is where fraud risk and
      operational delay converge.
    whyDoubt: >-
      The beachhead SAM is narrow and adjacent vendors such as case-management
      suites, Kord, and PEXA can win if buyers prefer bundled platforms.
    nextDiligence: >-
      Confirm with 5-8 mid-market firms that a non-custodial clearance layer
      can cut final-week exceptions enough to support £30k-50k ACV and
      production conversion.
  firstCustomer:
    title: Mid-market England-and-Wales residential conveyancing firm with centralized cashiering
    profile: >-
      A 20-80 fee-earner firm handling 300-2,000 annual completions, already
      using separate ID or AML, source-of-funds, and client-account payment
      tools.
    trigger: >-
      A payment-diversion near miss, AML review, or repeated last-week
      completion delays forces leadership to tighten release controls.
    buyer: COO
    initialContract: >-
      Paid 90-day pilot for one cashiering team and 150-300 matters, converting
      to roughly £30k-50k ACV if the firm sees materially more matters cleared
      48 hours before completion.
  mustBeTrue:
    - >-
      At least five of the first eight beachhead firms report double-digit
      staff-hours per 100 matters spent on final-week clearance chasing.
    - >-
      Target buyers will sign for a non-custodial approval layer without
      requiring the startup to hold or move client money.
    - >-
      The two most common case-management systems in the segment support
      repeatable deployment in eight weeks or less.
    - >-
      Pilots improve the share of matters cleared 48 hours before completion by
      at least 20 percentage points versus baseline.
    - >-
      Blended first-year ACV can exceed £30k while data, compliance, and
      onboarding costs still support gross margin above 70%.
  diligenceQuestions:
    - >-
      How much manual time per 100 matters is actually spent on final-week
      source-of-funds, bank-detail, and sign-off chasing today?
    - >-
      Who signs budget first after a fraud near miss: the COO, Head of
      Conveyancing, MLRO, or cashiering lead?
    - >-
      Will firms buy a neutral approval layer, or do they insist on a provider
      that also owns settlement or managed client money?
    - >-
      Which case-management and cashiering systems dominate the 300-2,000-matter
      segment, and how open are their APIs?
    - >-
      What proof would make a firm switch if it already uses Thirdfort,
      InfoTrack, Armalytix, or similar tools?
operatingAssumptions:
  - assumption: >-
      Mid-market England-and-Wales conveyancing firms with centralized
      cashiering are common enough to support an initial direct-sales motion.
    basis: research.yaml
    validationTest: >-
      Map 50 target firms and confirm that at least 20 match the 300-2,000-matter
      and centralized-cashiering profile.
    decisionImpact: >-
      If false, narrow to larger firms or move distribution to case-management
      partners sooner.
  - assumption: >-
      A non-custodial approval layer is easier to buy initially than a product
      that also holds or initiates client-money movement.
    basis: operator judgment
    validationTest: >-
      Run 10 structured buyer interviews and track whether the majority prefer
      approval-layer deployment before bundled settlement.
    decisionImpact: >-
      If false, partner more deeply with settlement or TPMA providers and
      redesign the product boundary.
  - assumption: >-
      Firms will pay roughly £30k-50k ACV because that is close to current
      fragmented spend and cheaper than continued rework and fraud exposure.
    basis: research.yaml
    validationTest: >-
      Test pricing on the first five pilot proposals and require at least two
      paid pilots without heavy discounting.
    decisionImpact: >-
      If false, target larger firms, reduce implementation scope, or reposition
      as a module inside existing platforms.
  - assumption: >-
      Top case-management and source-of-funds systems can be integrated fast
      enough to keep deployment under eight weeks.
    basis: research.yaml
    validationTest: >-
      Build the first two production connectors and measure time from contract
      signature to live pilot.
    decisionImpact: >-
      If false, focus on one anchor platform or sell a lighter overlay product
      with fewer systems of record.
  - assumption: >-
      Cross-matter reuse of counterparty, document, and bank-account evidence
      will create measurable differentiation after the first few hundred
      matters.
    basis: idea.yaml
    validationTest: >-
      Compare duplicate-request rates and exception-resolution time before and
      after 200+ live matters.
    decisionImpact: >-
      If false, the moat is weaker and the company should optimize for workflow
      ROI rather than data-network effects.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Quantify final-week clearance pain with workflow audits in 8 target firms
    hypothesis: >-
      Beachhead firms spend enough manual time and suffer enough late exceptions
      to justify a new system of record.
    successMetric: >-
      At least 5 firms share baseline metrics and 4 report double-digit
      staff-hours per 100 matters on clearance chasing.
    owner: Founder/CEO
  - horizon: 0-90 days
    experiment: Run a concierge pilot using a manual clearance packet and approval checklist on live matters
    hypothesis: >-
      The release-state workflow creates value before deep productization or
      external-party network effects.
    successMetric: >-
      Three design partners use the process on at least 50 matters and request
      a software version.
    owner: Founder/CEO
  - horizon: 90-180 days
    experiment: Ship MVP integrations to one case-management system, one ID or AML provider, and payee or bank-detail verification
    hypothesis: >-
      The product can fit existing workflows without forcing firms to replace
      current vendors.
    successMetric: First pilot goes live within eight weeks of contract signature.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Price and sell paid pilots to design partners
    hypothesis: Buyers will fund the product from existing compliance and operations budgets.
    successMetric: At least 2 paid pilots close at £10k-20k each with clear production conversion criteria.
    owner: Founder/CEO
  - horizon: 180-360 days
    experiment: Measure production impact on matters cleared 48 hours before completion and duplicate evidence requests
    hypothesis: >-
      Owning the release state creates measurable operational ROI, not just a
      nicer workflow.
    successMetric: >-
      Pilot firms improve 48-hour-clearance rate by 20 points and cut duplicate
      requests by 25% or more.
    owner: Product and compliance lead
  - horizon: 180-360 days
    experiment: Test partner-sourced pipeline through one case-management or source-of-funds integration partner
    hypothesis: Partner distribution will lower CAC only after direct-sales proof exists.
    successMetric: Generate 3 qualified opportunities or 1 signed referral agreement from a single partner.
    owner: Partnerships lead
operations:
  - Maintain a mapped control library for HMLR-safe-harbour identity, source-of-funds review, bank-detail verification, and dual approval.
  - Run non-custodial architecture with immutable audit logs, role-based access, and segregated approval permissions.
  - Standardize integration playbooks for the first two case-management systems and one source-of-funds provider.
  - Review exception categories weekly with design-partner MLRO or operations leads to tighten policy and reduce false escalations.
  - Track customer health on 48-hour-clearance rate, deployment time, and pilot-to-production conversion.
team:
  - role: Founder/CEO
    startTiming: Month 0
    rationale: >-
      Own buyer discovery, pilot sales, and the regulatory narrative because
      the wedge is still being proven.
  - role: Founding eng
    startTiming: Month 0
    rationale: >-
      Build the workflow engine, audit logs, and first integrations that make
      the product usable inside real matters.
  - role: Product and compliance lead
    startTiming: Month 3
    rationale: >-
      Translate AML, source-of-funds, and approval policy into structured
      workflows and exception handling.
  - role: Implementation engineer
    startTiming: Month 6
    rationale: >-
      Reduce deployment time and keep early customers live without burying the
      product team in onboarding work.
  - role: Partnerships and account executive
    startTiming: Month 9
    rationale: >-
      Add pipeline only after two production customers and one repeatable
      implementation path exist.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 6-8 design partners in the beachhead segment
      - Launch 3 paid pilots on one case-management integration path
      - Prove at least a 20-point improvement in matters cleared 48 hours before completion in two pilots
      - Stay non-custodial and complete the control library and audit packet for residential completions
  - horizon: 12-24 months
    items:
      - Convert 8-12 firms to production and expand at least 3 across multiple teams or offices
      - Support the two most common case-management or source-of-funds integrations in the target segment
      - Launch reusable counterparty and bank-account profiles with benchmark reporting
      - Win the first partner-sourced customers from a workflow or compliance integration partner
  - horizon: 24-36 months
    items:
      - Reach 40-60 production firms if ACV and retention hold
      - Expand into one adjacent disbursement-heavy workflow such as remortgage completions or probate distributions
      - Decide whether to remain non-custodial or deepen settlement partnerships based on buyer pull
      - Use cross-matter exception and approval data to launch premium decision-support features
risks:
  - risk: >-
      Buyers may prefer a bundled settlement or managed-client-money platform
      over a neutral clearance layer.
    likelihood: Medium
    impact: High
    mitigation: >-
      Land as a non-custodial control layer first, but integrate tightly with
      payment and settlement partners so the company can bundle through others
      if needed.
  - risk: >-
      Case-management, KYC, or settlement incumbents may add a satisfactory
      approval layer before the startup establishes a moat.
    likelihood: High
    impact: High
    mitigation: >-
      Differentiate on cross-party evidence reuse, exception intelligence, and
      fastest time-to-value rather than on checklist automation alone.
  - risk: >-
      Integration friction with dominant cashiering or case-management systems
      may make implementations too slow for a direct-sales model.
    likelihood: Medium
    impact: High
    mitigation: >-
      Prioritize one anchor integration path, maintain manual fallback
      workflows, and avoid selling broadly before deployment time is
      predictable.
  - risk: >-
      The company may fail to quantify ROI strongly enough to displace manual
      process and existing point tools.
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Baseline manual hours, late exceptions, and duplicate requests in every
      pilot and make production conversion contingent on quantified gains.
  - risk: >-
      Expanding too far into regulatory advice or money movement could widen the
      compliance perimeter before product-market fit.
    likelihood: Medium
    impact: High
    mitigation: >-
      Keep the initial scope to evidence orchestration and approval, with
      external legal review and explicit product-boundary controls.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Eighteen months should fund the non-custodial MVP, first integrations,
    compliance product work, 6-8 design partners, 3 paid pilots, and proof
    that direct sales into mid-market conveyancing firms can convert into
    production accounts.
