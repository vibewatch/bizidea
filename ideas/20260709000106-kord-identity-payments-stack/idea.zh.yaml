jobsToBeDone:
- job: 当一笔住宅买卖进入交割前最后一周时，帮过户运营团队把身份、AML 和资金来源证据确认清楚，这样他们既能放出客户资金，又不会把交易拖住。
  currentAlternative: 在 经办人员、KYC 供应商和出纳人员之间靠邮件来回追
  successMetric: 交割前 48 小时就已完全放行的案件占比
- job: 当房产中介把买家移交给受委托的过户团队时，帮销售推进和法律运营复用已经核验过的事实，这样就不用重复 客户准入，也能降低交易流失。
  currentAlternative: 在不同系统和邮箱里反复收同一套文件
  successMetric: 每笔案件的重复证据请求减少量
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 一条已融资、且有多来源印证的品类信号，再加上过户和房产中介里的真实落地，让时点判断非常具体。
  painIntensity:
    score: 4
    rationale: 交割最后一公里的摩擦和欺诈敞口显然很痛，但现有来源还没有量化损失率或人工审核成本。
  wedgeClarity:
    score: 5
    rationale: 初始产品被明确钉在英国过户律所的交割前案件放行与打款释放上，切口很窄也很清楚。
  defensibility:
    score: 4
    rationale: 一旦拿住放行决定，再叠加不断累积的对手方和账户数据，确实能越滚越强；但现有厂商也可能尝试打包相似能力。
  ventureScale:
    score: 4
    rationale: 只要先赢下过户场景，就有路往相邻房产流程和其他受监管资金流工作流扩；但滩头市场一开始仍局限在单一地区和垂直。
topRisks:
- name: 现有厂商打包跟进
  description: KYC 供应商、案件管理系统或支付轨道，一旦看到需求跑出来，完全可能补上类似的房产工作流。
  mitigation: 先把案件级放行决定和跨机构交接数据拿在手里，再和现有厂商做集成，而不是一开始就试图替掉所有系统。
- name: 监管边界不断外扩
  description: 只要碰到客户资金放行，公司就可能被拉进比纯工作流工具更重的法律与支付义务里。
  mitigation: 先做非托管的放行与审批层，接入现有客户账户和支付供应商；之后只在确有拉力的地方，选择性扩权限。
- name: 多方协作带来的落地摩擦
  description: 这套流程横跨买方、卖方、房产中介、过户团队和出纳，所以如果产品第一天就要求全网一起改习惯，落地很容易卡住。
  mitigation: 先落进一家过户律所内部，在没有外部依赖的前提下先做出价值；等内部放行跑通，再加可复用的外部交接能力。
