problem: 住宅房产交易里，过户律所要在买卖双方、房产中介和出纳团队之间，把身份、AML、资金来源和打款指令一项项跑通。多数机构今天还是拿分散的 KYC 工具、邮件、PDF 和网银硬拼，所以同一份证据反复收，谁也看不到一笔案子到底有没有真的清到可交割。AI 驱动的造假把假文件和打款指令冒充都做得更像，这些交接也就成了整笔交易里最危险的时点。
targetUser:
  primary: 英国住宅房产过户律所里负责运营与合规的负责人，且团队设有集中式出纳
  secondary: 英国区域性房产中介集团里的销售推进负责人
  buyer: 英国住宅房产过户律所的 COO 或过户业务负责人
startupThesis:
  nonObviousInsight: 在房产交易里，真正稀缺的权威记录，不是某次身份核验，也不是某笔付款本身，而是那句“这单现在到底能不能交割”的案件级放行决定。谁拿住这个放行状态，谁就能把 KYC、AML、资金来源证据和收款账户核验拢进一条不可或缺的工作流。
  beachhead: 英国每年完成 300-2,000 笔住宅案件的房产过户律所——团队设有集中式出纳，而且在交割前最后一周反复追资金来源。
  wedge: 一套交割前放行工作台：身份、资金来源和收款账户证据只收一次，然后用它卡住交割款放行。
  whyNowCatalyst: Kord 的融资、受 FCA 监管的真实落地，以及明确的反欺诈定位，都说明过户律所已经开始为替换人工房产交割放行流程编预算。
  ventureScalePath: 先拿下英国住宅房产过户，再扩到再抵押、商业地产、遗嘱认证分配、开发商销售，以及其他同样需要共享证据与受控放款的高金额受监管资金流工作流。
solution: 产品在报价被接受的那一刻就开一笔案件，并给 ID、AML、资金来源和放款就绪状态拉出一条统一放行时间线。买卖双方只上传一次证据，房产中介、按揭经纪和过户团队就能把已核准事实往后传，不用每个邮箱都重来一遍。出纳控制台会核验银行账户、要求资金出账前双重审批，并为每笔案件生成一份可审计的交割资料包。时间一长，系统会沉淀一张可复用的对手方、文件和账户风险图谱——干净单子跑得更快，异常单子也能更早升级。
goToMarketSeed:
  firstCustomer: 一家英国住宅房产过户律所，拥有 20-80 位 经办人员、每年完成 300-2,000 笔交割，设有集中式出纳团队，而且今天还把 AML 审核和打款放行拆在不同系统里跑。
  buyingTrigger: 一次打款指令欺诈险些出事、保险方或监管方盯上，或管理层要求在住房交易旺季削减最后一周的交割延迟。
  currentAlternative: 在分散的 KYC 和 AML 供应商、案件管理备注，以及网银或客户账户付款流程之上，再叠一层人工邮件和 PDF 收集。
  switchingReason: 这个切口把四散的检查收束成一笔案件级的放行决定，员工不再反复收证据，出纳也只在放行资料包完整时才把钱打出去。
  pricingHypothesis: 年平台费 + 每笔完成放行的案件或每次交割打款收费；定价锚点不是支付抽成，而是少返工、更低欺诈敞口和更快的案件周转。
