differentiator: 通用 KYC 供应商通常停在文件或身份状态，支付提供方也往往只在资金准备移动时才介入。这个公司拿的是最危险的中段：决定一笔房产交割到底能不能发生的案件级放行状态。因为它吃到了房产中介、过户团队和出纳之间的交接数据，所以能沉淀一张可复用的对手方与银行账户图谱，让之后每一笔案子都更快、更稳。
