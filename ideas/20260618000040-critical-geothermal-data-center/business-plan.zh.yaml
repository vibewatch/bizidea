slug: geothermal-module-delivery-os
date: "2026-06-18"
executiveSummary: >-
  地热模块交付操作系统应从内部信息总账起步——专注于模块化地热 OEM 内部的报价审批、工厂档期预留和调试偏差追踪，
  服务对象是向美国西部 AI 园区项目销售 2-10 MW 电力模块的厂商。研究揭示的痛点不是通用项目管理，
  而是防止小型交付团队在市场从试点转向首批商业合同的关键阶段，超卖稀缺涡轮机、变压器和调试产能。
  首个客户是一家不超过 50 人的模块化地热厂商，有 2-6 个活跃商业机会，COO 层面迫切需要把工程假设
  转化为贷款方和买家都认可的承诺。首个产品应专注内部，先替代电子表格驱动的报价交接，
  再向贷款方、公用事业公司或超大规模云厂商报告扩张。
  研究数据支持一个真实但狭窄的初始市场：TAM 约 $8.1M，SAM $3.0M，第 3 年 SOM $0.9M，
  因此只有当工作流可延伸至相邻模块化热力资产和外部交易对手时，公司才具备风投规模。
  最强的验证点是一次付费部署——缩短"报价到开工令"周期、防止稀缺硬件被重复销售，
  并在调试全程产出一份可供审计的项目记录。最大的否定风险是：到 2027 年前，同时管理多个商业项目的
  地热 OEM 数量太少，在相邻扩张就绪之前无法支撑一家软件公司。目前尚无客户访谈、
  实时供应商数据共享承诺或实测的部署时间，因此前 12 个月必须验证买家紧迫性、上线可重复性，
  以及能否突破单一细分赛道。
problem:
  - 小型模块化地热团队仍在用电子表格、热力模型、ERP 记录和 EPC 邮件线程拼凑报价和交付流程，导致没有人掌握一份可审计的单一真相来源，将承诺的兆瓦数、硬件分配和里程碑都纳入其中。
  - 稀缺的涡轮机、变压器和调试产能让任何一个错误假设代价高昂；一次交付延误就能让客户退回到燃气发电机或电网等待，并损坏 OEM 在贷款方和购电方面的信誉。
solution:
  - 构建地热专属的配置到报价工作流，在报价成为承诺之前，把资源测试数据、园区负荷与冷却假设、设备可用性和工厂档期承诺整合进一个经审批的项目配置。
  - 将同一份记录延伸至交付和调试阶段，让 OEM 能够对照原始报价追踪验收测试、热力性能偏差和变更单，而不是逐个项目重新总结失败经验。
whyWeWin:
  - 产品瞄准工程模型与通用项目工具之间缺失的管控层，将地热热力范围、稀缺涡轮机分配和交付审批绑定在一个工作流中。
  - 每次部署都能积累一个专有数据集——报价与交付产出的对比、组件交货周期和调试偏差——这是通用 EPC 或选址平台难以聚合的数据。
  - 初始买家已经承担来自单次项目延误的进度和融资风险，因此六位数的年度支出可以从现有的交付或商务项目预算中获得支撑，而非来自投机性的创新预算。
strategicChoices:
  beachhead: >-
    向美国西部托管和 AI 园区项目发货的北美模块化地热 OEM 及紧密 EPC 合作伙伴，
    交付规模在 3-10 个 2-5 MW 集装箱化有机朗肯循环（ORC）机组之间。
  wedgeRationale: >-
    这个切片能比更宽泛的地热或数据中心平台打法更快产出验证，因为买家、工作流和失败模式都清晰：
    一个小团队必须快速报价而不双重销售稀缺设备，成功可量化为已审批的报价、已预留的档期和准时完成的调试。
  sequencingRationale: >-
    先为一家 OEM 建立内部报价与交付管控，让公司能够验证工作流替代、数据采集和试点 ROI，
    然后再增加供应商集成、贷款方报告或相邻热力资产类别——避免在核心系统被信任之前就扩大实施范围。
  notYet:
    - 模块化 OEM 工作流范围之外的公用事业规模地热开发商项目管理
    - 在 OEM 信息总账被验证之前对外销售贷款方或保险公司产品
    - 全面替换 ERP、CAD 或通用 EPC 系统
    - 在 2-3 个地热灯塔账户上线之前扩张至余热 ORC、微电网或其他模块化热力资产
market:
  tam: "$8.1M 估算 TAM，基于 54 个美国地热开发项目，每个活跃项目约 $150k 年度交付管控支出。"
  sam: "$3.0M 估算 SAM，来自约 20 个美国西部下一代或模块化地热团队，均面向紧迫的确定性供电场景，使用相同建模支出假设。"
  som: "$0.9M 建模第 3 年 SOM，基于平台上 6 个灯塔项目，约占第一波滩头市场的三分之一。"
  segments:
    - "主要客户群：模块化地热 OEM 商务工程与项目交付团队，负责销售第一批商业 AI 园区电力模块"
    - "次要客户群：EPC 项目经理和供应商合作方，在 OEM 成为内部信息总账后接入同一项目"
  buyingProcess: >-
    日常使用者通常是商务工程负责人或项目交付副总裁，但经济购买方往往是 COO 或 CEO，
    因为一个项目延误就可能危及融资、客户信誉和工厂利用率。最可信的首单是在一个已获资助的商业项目上
    开展付费试点，待买家看到更快的报价审批、可审计的档期预留和更清晰的调试证据后，再转化为正式合同。
product:
  mvp: >-
    MVP 应覆盖一家 OEM 的 2-6 个活跃项目的报价到调试全流程，将资源假设、设备预留、
    里程碑审批和验收测试证据纳入同一条记录。它必须替代报价审批电子表格，
    按具名机会预留受约束的硬件，并导出一份供内部审查用的可审计包。
  sixMonth: >-
    在一个灯塔客户上交付报价审批、档期预留、里程碑追踪和调试偏差的内部管控层；
    完成历史项目导入；并证明首次部署可以在不替换 CAD、Aspen 或 ERP 的前提下上线。
  twelveMonth: >-
    增加供应商和合作伙伴席位工作流、标准化验收测试模板和贷款方就绪报告，
    让产品成为每个活跃项目中 OEM、EPC 和关键设备交易对手的共同真相来源。
  twentyFourMonth: >-
    将同一套调度模型延伸至相邻模块化热力资产（如余热 ORC 或微电网式基荷系统），
    同时将跨项目基准数据打包为防御性护城河，而非依赖定制实施工作。
  keyBets:
    - 如果产品能实质性减少报价交付周期和超承诺风险，买家就会真正迁移审批和预留步骤，而不只是多加一个报告看板。
    - ORC 供应商、变压器厂商和 EPC 合作伙伴会共享足够的预留和变更单数据，让平台在运营上具备权威性。
    - 六位数的年度定价是可支撑的，因为避免一次交付失误的价值远超软件费用。
    - 相邻模块化热力资产将复用足够多的工作流，使得狭窄的初始市场在在位厂商填补缺口之前就能扩张。
gtm:
  wedge: >-
    针对一个具名商业地热项目，销售付费的报价到调试试点——预留稀缺硬件、管理报价审批，
    并产出一份调试证据包，而非通用的工作流看板。
  channels:
    - 创始人主导直接销售，对接从试点转向多个并发商业项目的模块化地热 OEM CEO、COO 和商务工程负责人
    - 通过已介入美国西部地热项目的 ORC 供应商、EPC 和项目交付合作伙伴进行预热引介和联合销售
    - 后期来自贷款方、公用事业公司或超大规模云厂商尽调要求——当交易对手要求标准化的假设和调试记录时自然产生拉动
  funnelTargets: "目标账户→合格试点 20-30%，合格试点→付费试点 40-50%，付费试点→年度生产合同 50%+，试点启动→生产决策在 120-180 天内完成。"
  pricing: >-
    定价围绕每个活跃交付项目的年度平台费，另加每兆瓦调试费用和付费供应商席位，
    因为买家保护的是项目执行，而不是购买纯粹的用户席位。
    先在一个具名项目上收取付费试点或实施费，待 2-4 个活跃项目和关键合作伙伴都运行在同一信息总账上后，
    转化为六位数的年度合同。
businessModel:
  revenueStreams:
    - 每个纳管调度的活跃地热交付项目的年度订阅
    - 与平台上已调试项目挂钩的每兆瓦费用
    - 面向 ORC、变压器和 EPC 交易对手的供应商和合作伙伴席位
    - 首次部署的一次性上线和历史项目导入费用
  unitOfValue: 从报价审批到调试全程纳管的单个活跃地热交付项目
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一 OEM 账户内增加活跃项目、站点和交易对手
    - 从 OEM 内部工作流延伸至依赖同一项目记录的贷款方、保险公司和公用事业证据工作流
    - 一旦地热基准数据库具备可信度，将同一调度模型复用于相邻模块化热力资产
strategyMap:
  northStarMetric: 经由平台审批后、按照报价兆瓦数和时间表完成调试的活跃项目比例
  inputMetrics:
    - 报价到审批的中位周期时长
    - 已附上已审批配置的涡轮机和变压器档期预留的活跃机会比例
    - 逐项目的报价与交付兆瓦数偏差
    - 付费试点转化为年度生产合同的比率
    - 每个客户管理的活跃项目数和交易对手数
  moatsToBuild:
    - 模块化地热项目报价假设、交付产出和调试偏差的跨项目数据集
    - 涡轮机、变压器和 EPC 依赖项的供应商交货周期和分配历史
    - 对贷款方、保险公司和复购买家具有价值的可审计项目记录
    - 编码了第一波地热 OEM 实际审批、预留和调试模块化项目方式的工作流模板
  killCriteria:
    - 25 次合格 OEM 对话后，付费灯塔试点不足 3 个
    - 首个项目上线后 6 个月内，付费试点转化为年度订阅的比例低于 50%
    - 前 4 次试点中，首次上线工作流的中位时长超过 8 周
    - 试点账户第 6 个月时，通过平台而非传统电子表格处理的活跃机会不足 70%
    - 18 个月内没有至少 3 次客户或合作伙伴访谈验证出可信的相邻资产扩张路径
  mermaid: |
    flowchart LR
      Wedge[Modular geothermal OEM wedge] --> MVP[Quote and commissioning control plane]
      MVP --> Proof[Reserved slots and audit-ready project proof]
      Proof --> Expansion[Adjacent thermal assets and counterparty workflows]
investorMemo:
  verdict:
    call: "观察"
    conviction: 有说服力的工作流洞察和真实的痛点让这个方向令人感兴趣，但在团队证明足够多的并发地热项目存在——能在相邻扩张之前支撑一家可重复的软件公司——之前，信念度维持在中低水平。
    whyBelieve: 公司瞄准一个新近变得重要的运营瓶颈，有清晰的经济购买方、可量化的 ROI，以及围绕报价与交付地热性能对比的可信数据护城河。
    whyDoubt: 研究揭示的滩头市场极为狭窄，供应商数据访问尚未得到验证，且若干相邻平台或内部团队可能在独立赢家出现之前就消化掉这个工作流。
    nextDiligence: 确认至少 3 家美国西部模块化地热 OEM 愿意为与实际商业项目绑定的付费试点注资，且至少一家供应商愿意深度开放预留数据，让产品真正控制分配。
  firstCustomer:
    title: 模块化地热 OEM 商务工程负责人
    profile: 一家不超过 50 人的北美地热初创公司，有 2-6 个活跃的商业 AI 园区商机，ORC 和变压器库存紧张，销售工程、供应链和现场调试共用一个团队。
    trigger: 公司赢得第一个商业 AI 园区合同，或进入项目融资尽调阶段，突然需要在不超卖硬件或调试产能的前提下，为更多机会报价。
    buyer: COO 或 CEO
    initialContract: "一个具名项目上的 $30k-$75k 付费试点，在 2-4 个活跃项目和合作伙伴席位进入平台后，转化为约 $120k-$200k 的年度 ARR。"
  mustBeTrue:
    - 至少 3 家目标 OEM 必须确认，预计到 2027 年将同时管理 3 个或更多并发商业模块化地热项目。
    - 至少一半合格潜在客户必须认同，报价管理和硬件分配痛苦程度足以在项目出问题之前支付付费试点。
    - 首次部署必须替代现有的报价审批电子表格，并在 60 天内将至少 70% 的活跃机会纳入新工作流。
    - 至少一家 ORC 或设备供应商必须提供足够的预留或交货周期数据，让平台防止稀缺档期被重复销售。
    - 工作流必须在初始地热细分饱和之前，可信地延伸至至少一个相邻模块化热力资产或外部交易对手使用场景。
  diligenceQuestions:
    - 未来 24 个月内，北美真正有多少模块化地热 OEM 会同时运行多个商业项目？
    - 今天究竟哪些字段决定了报价审批，这些字段在不同 OEM 间的差异有多大？
    - ORC 和涡轮机械供应商是否愿意与第三方工作流系统共享档期、BOM 和变更单数据？
    - "实际上由谁签第一笔预算：COO、CEO，还是项目交付负责人？"
    - 一次试点能否在不深度集成 ERP、CAD 或 Aspen 的前提下上线？
operatingAssumptions:
  - assumption: 到 2027 年，足够多的模块化地热 OEM 将达到并发商业项目规模，能在相邻扩张之前支撑 3-6 个灯塔客户。
    basis: research.yaml
    validationTest: 访谈 8-12 家北美地热 OEM 和 EPC，核实至少 3 家有具名项目管道和组织能力，可同时运行 3 个或更多并发商业项目。
    decisionImpact: 若为假，将公司收窄至服务主导的细分模式，或在扩大人员规模之前提前加速向相邻模块化热力资产的扩张。
  - assumption: 当平台实质性减少报价交付周期和稀缺硬件的超承诺风险时，买家愿意支付六位数的年度费用。
    basis: research.yaml
    validationTest: 进行 8 次定价对话，以建议的方案成交至少 2 个付费试点和 1 个年度订阅或已签署的转化计划。
    decisionImpact: 若为假，简化定价、收窄产品范围至更精简的审批工作流，或放弃独立软件命题。
  - assumption: 供应商和 EPC 合作伙伴将共享足够的预留、交货周期和变更单数据，让产品成为信息总账。
    basis: 运营判断
    validationTest: 签署至少 1 份供应商数据共享协议，以及 2 个试点账户——在试点期间，真实的硬件分配更新每周进入或同步至平台。
    decisionImpact: 若为假，产品停留在部分规划层，丧失相对通用项目工具最强的差异化优势。
  - assumption: 首次部署可在 8 周内上线，无需替换 CAD、ERP 或热力建模工具。
    basis: idea.yaml
    validationTest: 测量前 3 次试点从启动到首次上线工作流的时长，要求至少 2 次在 40 个工作日内完成报价审批上线。
    decisionImpact: 若为假，上线过程变得服务密集，毛利率目标走弱，路线图必须在扩充销售产能之前收窄。
  - assumption: 相邻模块化热力资产将复用足够多的工作流，为风投规模的扩张路径奠定基础。
    basis: idea.yaml
    validationTest: 在 18 个月内完成至少 3 次相邻客户或合作伙伴访谈，并有 1 个地热之外的潜在客户或合作伙伴接受了一份有范围界定的后续试点设计。
    decisionImpact: 若为假，投资人应将该业务视为一个窄垂直 SaaS 结果，而非品类平台。
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: 访谈模块化地热 OEM 领导者，了解报价审批和交付工作流
    hypothesis: 真正的运营瓶颈是管理假设和稀缺硬件分配，而非通用项目追踪。
    successMetric: 完成 15 次访谈，其中至少 10 次确认报价审批、档期预留和调试证据今天都在孤立工具中处理。
    owner: 创始人/CEO
  - horizon: "0–90 天"
    experiment: 人工重建一个历史报价到调试项目
    hypothesis: 结构化记录能揭示假设、预留和交付证据目前在电子表格和邮件中断裂的位置。
    successMetric: 完整重建 1 个项目，识别出 5-10 个可产品化报价审批所必需的可重复数据字段。
    owner: 联合创始工程师
  - horizon: "90–180 天"
    experiment: 在一个商业地热项目上开展付费灯塔试点
    hypothesis: 一家 OEM 愿意为在生产软件完全自动化之前就能预留硬件和管理报价审批的工作流付费。
    successMetric: 签署 2 个付费试点，至少 1 个试点在第 60 天前管理实时硬件预留和里程碑审批。
    owner: 创始人/CEO
  - horizon: "90–180 天"
    experiment: 与 ORC 或涡轮机械合作伙伴进行供应商数据共享测试
    hypothesis: 至少一家供应商愿意开放足够的分配和交货周期数据，让平台在运营上具备权威性。
    successMetric: 签署 1 份数据共享协议，或在实时试点期间每周更新预留状态的周期性人工数据馈送。
    owner: 产品负责人
  - horizon: "6–12 个月"
    experiment: 在试点账户中测试定价和转化方案
    hypothesis: 基于项目的定价加合作伙伴席位的转化效果优于基于席位的定价，因为买家保护的是项目执行。
    successMetric: 偏好方案出现在至少 3 份已签署合同中，且至少 50% 的已完成试点在 6 个月内转化为年度订阅。
    owner: 创始人/CEO
  - horizon: "12–18 个月"
    experiment: 相邻资产扩张探索
    hypothesis: 余热 ORC 或类似模块化热力资产共享足够多的工作流结构，可在地热之后继续扩张。
    successMetric: 完成 3 次合格相邻访谈，并有 1 份被潜在客户或合作伙伴接受的后续试点设计方案。
    owner: GTM 负责人
operations:
  - 标准化报价审批包，将每个机会的资源假设、设备预留、里程碑负责人和验收标准统一绑定。
  - 维护一个结构化的基准数据库，记录所有活跃项目的报价与交付产出对比、变更单和调试偏差。
  - 与 ORC 供应商、EPC 和现场团队建立合作伙伴运营节奏，确保分配更新和测试证据按可预测的节奏进入平台。
  - 打包贷款方和交易对手就绪的导出文件，但不尝试替换 ERP、CAD 或工程仿真系统。
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 在品类尚未定义之际，主导创始人销售、合作伙伴拓展，以及与 OEM 高管的工作流设计。
  - role: 联合创始工程师
    startTiming: Month 0
    rationale: 构建首个报价审批、预留和调试记录工作流，并将实施范围控制到可产品化的程度。
  - role: 产品负责人
    startTiming: Month 2
    rationale: 在工程扩大范围之前，将试点反馈转化为可重复的数据模型、供应商工作流和报告层。
  - role: 解决方案工程师
    startTiming: Month 4
    rationale: 缩短部署时间，管理客户数据导入，防止灯塔试点变成定制咨询项目。
  - role: 数据与集成工程师
    startTiming: Month 6
    rationale: 负责供应商数据馈送、基准数据质量，以及能创造护城河和扩张价值的报告工作流。
milestones:
  - horizon: "0–12 个月"
    items:
      - 与绑定实际商业项目的模块化地热 OEM 签署 2 个付费灯塔试点
      - 在至少 1 个客户工作流中替代电子表格报价审批，并通过平台管理真实设备预留
      - 证明首次部署可在 8 周内完成，且不替换 ERP、CAD 或 Aspen
      - 将至少 1 个试点转化为年度订阅，平台上运行 2 个或更多活跃项目
  - horizon: "12–24 个月"
    items:
      - 与至少 1 家 ORC 或涡轮机械交易对手上线供应商和合作伙伴席位工作流
      - 发布标准化调试偏差和贷款方就绪报告模块
      - 覆盖 3 个或更多客户，达到 4-6 个灯塔项目
      - 与真实潜在客户或合作伙伴完成 1 个相邻模块化热力扩张设计验证
  - horizon: "24–36 个月"
    items:
      - 用同一调度模型扩张至至少 1 个地热之外的相邻模块化热力资产类别
      - 构建足够大的基准数据集，为各客户的报价和交付决策提供参考
      - 在第一波交易对手中，将平台确立为模块化基荷项目交付公认的信息总账
risks:
  - risk: 即期买家基础过小——模块化地热向 AI 园区的部署比预期更长时间停留在试点阶段。
    likelihood: High
    impact: High
    mitigation: 保持初始产品精简，快速赢得灯塔客户，并在扩大烧钱之前验证相邻模块化热力扩张。
  - risk: 供应商数据访问弱于预期，导致产品无法管控稀缺设备分配。
    likelihood: Medium
    impact: High
    mitigation: 在试点中先采用手动或半结构化的预留更新，在承诺自动分配管控之前优先建立供应商关系。
  - risk: 客户把软件当成报告看板，而不是真正将报价审批和调试工作流迁移进来。
    likelihood: Medium
    impact: High
    mitigation: 将试点设计为必须完成审批、预留和证据步骤——替代现有电子表格，而非对其进行汇总。
  - risk: 通用项目平台或内部工具消化了足够多的工作流，让独立产品看起来可有可无。
    likelihood: Medium
    impact: Medium
    mitigation: 在地热专属数据模型、交付产出基准和交易对手就绪证据上建立竞争优势，而不只是基础任务追踪。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 构建首个产品化的报价到调试工作流，签署 2-3 个灯塔试点，验证 8 周内部署时间，并确认供应商数据访问加相邻资产扩张能否支撑一家可重复的软件业务。
