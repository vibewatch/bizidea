- 第一个强用例究竟在地热 OEM 内部，还是贷款方、EPC 和公用事业公司比 OEM 更快推动采用？
- 如果天然气过渡电源在未来几年仍是主要市场的默认答案，数据中心切入点的持续性有多强？
