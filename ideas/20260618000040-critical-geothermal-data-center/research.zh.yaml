competitors:
- name: Sitetracker
  stage: scale-up
  wedge: 面向开发商、EPC 和运维团队的可再生能源资产生命周期和项目执行平台。
  pricing: AppExchange 公开基准起价 $150/用户/月，企业级灵活定价。
  strength: 对关键基础设施的通用部署和合规工作流覆盖扎实。
  weaknessVsUs: 没有针对地热的特化，也不围绕报价逻辑、热力假设或稀缺 ORC 档期预留展开。
  sourceRefs:
  - 34
  - 36
- name: Paces
  stage: scale-up
  wedge: 专注于选址、风险和并网的 AI 辅助能源开发工作流。
  pricing: 定制化、演示驱动的企业定价。
  strength: 快速地块筛选、项目优先排序，以及电力项目的前端尽调。
  weaknessVsUs: 侧重站点和开发智能，但在项目售出后不拥有调试或多方交付管控。
  sourceRefs:
  - 37
- name: Orennia
  stage: scale-up
  wedge: 面向并网、站点可行性和数据中心电力市场决策的能源数据与分析平台。
  pricing: 定制化、演示驱动的企业定价。
  strength: 电力市场、并网和数据中心选址分析扎实。
  weaknessVsUs: 优化站点和投资选择，而非日常地热报价审批、供应商分配和现场验收工作流。
  sourceRefs:
  - 39
  - 40
- name: AspenTech
  stage: incumbent
  wedge: 具备地热和地下建模能力的工程与过程仿真套件。
  pricing: 定制化企业授权。
  strength: 对过程和地下工程的建模深度和可信度。
  weaknessVsUs: 是一个工程工作台，而非 OEM 和 EPC 共用的商务交付信息总账。
  sourceRefs:
  - 42
