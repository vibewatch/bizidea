slug: geothermal-module-delivery-os
date: "2026-06-18"
executiveSummary: >-
  Geothermal Module Delivery OS should start as an internal system of record for
  quote approval, factory-slot reservation, and commissioning variance tracking
  inside modular geothermal OEMs selling 2-10 MW power blocks into western U.S.
  AI-campus projects. The researched pain is not generic project management; it
  is preventing small delivery teams from overpromising scarce turbines,
  transformers, and commissioning bandwidth while the market shifts from pilots
  to first commercial contracts. The first customer is a sub-50-person modular
  geothermal vendor with 2-6 live commercial opportunities and a COO-level need
  to turn engineering assumptions into lender- and buyer-credible commitments.
  The first product should stay internal-facing and replace spreadsheet-driven
  quote handoffs before expanding to lender, utility, or hyperscaler reporting.
  Input research supports a real but narrow initial market of about $8.1M TAM,
  $3.0M SAM, and $0.9M year-3 SOM, so the company only becomes venture-scale if
  it proves this workflow can expand into adjacent modular thermal assets and
  external counterparties. The strongest proof point is a paid deployment that
  shortens quote-to-notice-to-proceed time, prevents double-selling constrained
  hardware, and produces one audit-ready project record through commissioning.
  The biggest disconfirming risk is that too few geothermal OEMs will manage
  multiple concurrent commercial programs by 2027 to support a software company
  before adjacent expansion is ready. The inputs do not yet include customer
  interviews, live supplier data-sharing commitments, or measured deployment
  times, so the first 12 months must validate buyer urgency, onboarding
  repeatability, and expansion beyond a single niche.
problem:
  - Small modular geothermal teams still stitch together spreadsheets, thermodynamic models, ERP records, and EPC email threads to quote and deliver AI-campus projects, so no one owns one auditable source of truth for promised megawatts, hardware allocation, and milestones.
  - Scarce turbines, transformers, and commissioning capacity make one bad assumption expensive; a slipped delivery can push the customer back to gas generators or utility delays and damage the OEM's credibility with lenders and offtakers.
solution:
  - Create a geothermal-specific configure-to-quote workflow that combines resource-test data, campus load and cooling assumptions, equipment availability, and factory-slot commitments into one approved project configuration before a quote becomes a promise.
  - Carry the same record into delivery and commissioning so the OEM can track acceptance tests, thermal-performance deltas, and change orders against the original quote instead of relearning each failure mode project by project.
whyWeWin:
  - The product targets the missing control plane between engineering models and generic project tools by binding geothermal thermal envelopes, scarce turbomachinery allocation, and delivery approvals in one workflow.
  - Every deployment can build a proprietary dataset of quoted-versus-delivered output, component lead times, and commissioning variance that generic EPC or siting platforms are unlikely to aggregate.
  - The initial buyer already bears schedule and financing risk from a single slipped project, so six-figure annual spend can be justified from an existing delivery or commercial-program budget rather than a speculative innovation budget.
strategicChoices:
  beachhead: >-
    North American modular geothermal OEMs and close EPC partners shipping their
    first 3-10 containerized 2-5 MW Organic Rankine Cycle units into western
    U.S. colocation and AI-campus projects.
  wedgeRationale: >-
    This slice creates faster proof than a broader geothermal or data-center
    platform play because the buyer, workflow, and failure mode are all clear:
    one small team must quote fast without double-selling scarce equipment, and
    success is measurable in approved quotes, reserved slots, and on-time
    commissioning.
  sequencingRationale: >-
    Start with internal quote and delivery control for one OEM so the company
    can prove workflow replacement, data capture, and pilot ROI before adding
    supplier integrations, lender reporting, or adjacent thermal asset classes
    that would increase implementation scope before the core system is trusted.
  notYet:
    - Utility-scale geothermal developer program management outside modular OEM workflows
    - Lender or insurer products sold before the OEM system of record is proven
    - Full ERP, CAD, or generic EPC replacement
    - Expansion into waste-heat ORC, microgrids, or other modular thermal assets before 2-3 geothermal lighthouse accounts are live
market:
  tam: "$8.1M estimated TAM based on 54 U.S. geothermal development programs at roughly $150k annual delivery-control spend per active program."
  sam: "$3.0M estimated SAM from about 20 western-U.S. next-generation or modular geothermal teams selling into acute firm-power use cases at the same modeled spend."
  som: "$0.9M modeled year-3 SOM based on 6 lighthouse programs on the platform, or roughly one-third of the first-wave beachhead."
  segments:
    - "Primary segment: modular geothermal OEM commercial-engineering and project-delivery teams selling first commercial AI-campus power blocks"
    - "Secondary segment: EPC program managers and supplier counterparts attached to the same projects once the OEM becomes the internal system of record"
  buyingProcess: >-
    The day-to-day champion is usually the head of commercial engineering or VP
    project delivery, but the economic buyer is typically the COO or CEO because
    one missed project can jeopardize financing, customer credibility, and
    factory utilization. The most credible first sale is a paid pilot on one
    funded commercial program, converting once the buyer sees faster quote
    approval, auditable slot reservation, and cleaner commissioning evidence.
product:
  mvp: >-
    MVP should cover one OEM's quote-to-commissioning workflow for 2-6 active
    projects, capturing resource assumptions, equipment reservations, milestone
    approvals, and acceptance-test evidence in one record. It must replace the
    quote approval spreadsheet, reserve constrained hardware against named
    opportunities, and export an audit-ready package for internal review.
  sixMonth: >-
    Ship the internal control plane for quote approval, slot reservation,
    milestone tracking, and commissioning variance on one lighthouse customer;
    complete legacy project imports; and prove that the first deployment can go
    live without replacing CAD, Aspen, or ERP.
  twelveMonth: >-
    Add supplier and partner-seat workflows, standardized acceptance-test
    templates, and lender-ready reporting so the product becomes the source of
    truth across OEM, EPC, and key equipment counterparties for each active
    program.
  twentyFourMonth: >-
    Expand the same orchestration layer into adjacent modular thermal assets
    such as waste-heat ORC or microgrid-style baseload systems, while packaging
    cross-project benchmark data as the defensible layer rather than custom
    implementation work.
  keyBets:
    - Buyers will replace real approval and reservation steps, not just add a reporting dashboard, if the product materially reduces quote turnaround and overcommit risk.
    - ORC suppliers, transformer vendors, and EPC partners will share enough reservation and change-order data to make the platform operationally authoritative.
    - Six-figure annual pricing is supportable because one avoided delivery miss is worth materially more than the software fee.
    - Adjacent modular thermal assets will reuse enough of the workflow to make the niche initial market expandable before incumbents close the gap.
gtm:
  wedge: >-
    Sell a paid quote-to-commissioning pilot for one named commercial geothermal
    program that reserves scarce hardware, governs quote approval, and produces
    a commissioning evidence pack rather than a generic workflow dashboard.
  channels:
    - Founder-led direct sales to CEOs, COOs, and heads of commercial engineering at modular geothermal OEMs moving from pilot projects to concurrent commercial programs
    - Warm introductions and co-selling through ORC suppliers, EPCs, and project-delivery partners already attached to western-U.S. geothermal builds
    - Later pull-through from lender, utility, or hyperscaler diligence once counterparties require standardized assumption and commissioning records
  funnelTargets: "Target account→qualified pilot 20-30%, qualified pilot→paid pilot 40-50%, paid pilot→annual production 50%+, and pilot kickoff→production decision within 120-180 days."
  pricing: >-
    Price around an annual platform fee per active delivery program, plus
    per-megawatt commissioning fees and paid supplier seats, because the buyer
    is protecting program execution rather than buying pure user seats. Start
    with a paid pilot or implementation fee on one named program, then convert
    to a six-figure annual contract once 2-4 active programs and key partners
    run through the same system of record.
businessModel:
  revenueStreams:
    - Annual subscription per active geothermal delivery program under orchestration
    - Per-megawatt fees tied to commissioned projects on the platform
    - Supplier and partner seats for ORC, transformer, and EPC counterparties
    - One-time onboarding and legacy project import fees for the first deployment
  unitOfValue: Active geothermal delivery program managed from quote approval through commissioning
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more active programs, sites, and counterparties within the same OEM account
    - Expand from internal OEM workflow into lender, insurer, and utility evidence workflows that rely on the same project record
    - Reuse the orchestration model across adjacent modular thermal assets once the geothermal benchmark library is credible
strategyMap:
  northStarMetric: Percentage of active programs that commission within the quoted megawatt and timeline envelope after being approved through the platform
  inputMetrics:
    - Median quote-to-approval cycle time
    - Percentage of active opportunities with reserved turbine and transformer slots attached to an approved configuration
    - Quoted-versus-delivered megawatt variance by project
    - Paid pilot to annual production conversion rate
    - Number of active programs and counterparties managed per customer
  moatsToBuild:
    - Cross-project dataset of quoted assumptions, delivered output, and commissioning variance for modular geothermal deployments
    - Supplier lead-time and allocation history for turbines, transformers, and EPC dependencies
    - Audit-ready project records that become valuable to lenders, insurers, and repeat buyers
    - Workflow templates that encode how first-wave geothermal OEMs actually approve, reserve, and commission modular projects
  killCriteria:
    - Fewer than 3 paid lighthouse pilots after 25 qualified OEM conversations
    - Fewer than 50% of paid pilots converting to annual subscriptions within 6 months of first project go-live
    - Median time to first live workflow remaining above 8 weeks across the first 4 pilots
    - Fewer than 70% of active opportunities on pilot accounts being routed through the platform rather than legacy spreadsheets by month 6
    - No credible adjacent asset expansion path validated by at least 3 customer or partner interviews within 18 months
  mermaid: |
    flowchart LR
      Wedge[Modular geothermal OEM wedge] --> MVP[Quote and commissioning control plane]
      MVP --> Proof[Reserved slots and audit-ready project proof]
      Proof --> Expansion[Adjacent thermal assets and counterparty workflows]
investorMemo:
  verdict:
    call: "Watch"
    conviction: Promising workflow insight and real pain make this interesting, but conviction stays low-to-medium until the team proves enough concurrent geothermal programs exist to support a repeatable software business before adjacent expansion.
    whyBelieve: The company targets a newly important operational bottleneck with a clear economic buyer, measurable ROI, and a credible data moat around quoted-versus-delivered geothermal performance.
    whyDoubt: The researched beachhead is extremely narrow, supplier data access is unproven, and several adjacent platforms or internal teams could absorb the workflow before a standalone winner emerges.
    nextDiligence: Confirm at least 3 western-U.S. modular geothermal OEMs will fund paid pilots tied to live commercial programs and that at least one supplier will expose reservation data deeply enough for the product to control allocations.
  firstCustomer:
    title: Head of commercial engineering at a modular geothermal OEM
    profile: A sub-50-person North American geothermal startup with 2-6 active commercial AI-campus opportunities, scarce ORC and transformer inventory, and one team spanning sales engineering, supply chain, and field commissioning.
    trigger: The company wins its first commercial AI-campus contract or moves into project-finance diligence and suddenly needs to quote more opportunities without overcommitting hardware or commissioning bandwidth.
    buyer: COO or CEO
    initialContract: "$30k-$75k paid pilot on one named program, converting to roughly $120k-$200k annual ARR once 2-4 active programs and partner seats run through the platform."
  mustBeTrue:
    - At least 3 target OEMs must confirm they expect to manage 3 or more concurrent commercial modular geothermal programs by 2027.
    - At least half of qualified prospects must agree that quote governance and hardware allocation are painful enough to justify a paid pilot before a project slips.
    - The first deployment must replace the existing quote approval spreadsheet and carry at least 70% of active opportunities through the new workflow within 60 days.
    - At least one ORC or equipment supplier must provide enough reservation or lead-time data for the platform to prevent double-selling constrained slots.
    - The workflow must extend credibly into at least one adjacent modular thermal asset or external counterparty use case before the initial geothermal niche saturates.
  diligenceQuestions:
    - How many North American modular geothermal OEMs will really have multiple concurrent commercial programs in the next 24 months?
    - Which exact fields decide quote approval today, and how variable are they across OEMs?
    - Will ORC and turbomachinery suppliers share slot, BOM, and change-order data with a third-party workflow system?
    - Who signs the first budget in practice: COO, CEO, or head of project delivery?
    - Can a pilot go live without deep ERP, CAD, or Aspen integration work?
operatingAssumptions:
  - assumption: Enough modular geothermal OEMs will reach concurrent commercial program scale by 2027 to support 3-6 lighthouse customers before adjacent expansion is required.
    basis: research.yaml
    validationTest: Interview 8-12 North American geothermal OEMs and EPCs, then verify that at least 3 show named pipelines and org capacity for 3 or more concurrent commercial programs.
    decisionImpact: If false, narrow the company to a services-led niche or accelerate expansion into adjacent modular thermal assets before scaling headcount.
  - assumption: Buyers will pay six-figure annual spend when the platform materially reduces quote turnaround and overcommit risk on scarce hardware.
    basis: research.yaml
    validationTest: Run 8 pricing conversations and close at least 2 paid pilots plus 1 annual subscription or signed conversion plan at the proposed packaging.
    decisionImpact: If false, simplify pricing, cut product scope to a narrower approval workflow, or abandon the standalone software thesis.
  - assumption: Supplier and EPC partners will share enough reservation, lead-time, and change-order data for the product to become system of record.
    basis: operator judgment
    validationTest: Secure at least 1 supplier data-sharing agreement and 2 pilot accounts where real hardware allocation updates are entered or synced weekly.
    decisionImpact: If false, the product stays a partial planning layer and loses the strongest differentiation against generic project tools.
  - assumption: The first deployment can go live in under 8 weeks without replacing CAD, ERP, or thermodynamic modeling tools.
    basis: idea.yaml
    validationTest: Measure kickoff-to-first-live-workflow time across the first 3 pilots and require at least 2 to reach live quote approval within 40 business days.
    decisionImpact: If false, onboarding becomes services-heavy, gross-margin targets weaken, and the roadmap must narrow before hiring sales capacity.
  - assumption: Adjacent modular thermal assets will reuse enough of the workflow to create a venture-scale expansion path.
    basis: idea.yaml
    validationTest: Complete at least 3 adjacent-customer or partner interviews and 1 scoped pilot design outside geothermal within 18 months.
    decisionImpact: If false, investors should treat the business as a narrow vertical SaaS outcome rather than a category platform.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: Interview modular geothermal OEM leaders on quote approval and delivery workflows
    hypothesis: The real operational bottleneck is governing assumptions and scarce hardware allocation, not generic project tracking.
    successMetric: 15 interviews completed, with at least 10 confirming that quote approval, slot reservation, and commissioning evidence are handled in disconnected tools today.
    owner: Founder CEO
  - horizon: "0–90 days"
    experiment: Manual reconstruction of one historical quote-to-commissioning program
    hypothesis: A structured record can expose where assumptions, reservations, and delivery evidence currently break across spreadsheets and email.
    successMetric: 1 full project reconstructed and 5-10 repeatable data fields identified as mandatory for productized quote approval.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Paid lighthouse pilot on one commercial geothermal program
    hypothesis: One OEM will pay for a workflow that reserves hardware and governs quote approval before production software is fully automated.
    successMetric: 2 paid pilots signed and at least 1 pilot managing live hardware reservations and milestone approvals by day 60.
    owner: Founder CEO
  - horizon: "90–180 days"
    experiment: Supplier data-sharing test with an ORC or turbomachinery partner
    hypothesis: At least one supplier will expose enough allocation and lead-time data to make the platform operationally authoritative.
    successMetric: 1 signed data-sharing arrangement or recurring manual feed that updates reservation status weekly during a live pilot.
    owner: Product lead
  - horizon: "6–12 months"
    experiment: Pricing and conversion test across pilot accounts
    hypothesis: Program-based pricing plus partner seats converts better than seat-based pricing because the buyer is protecting project execution.
    successMetric: Preferred package appears in at least 3 signed scopes and at least 50% of completed pilots convert to annual subscriptions.
    owner: Founder CEO
  - horizon: "12–18 months"
    experiment: Adjacent asset expansion discovery
    hypothesis: Waste-heat ORC or similar modular thermal assets share enough workflow structure to justify expansion after geothermal.
    successMetric: 3 qualified adjacent interviews completed and 1 scoped follow-on pilot design accepted by a prospect or partner.
    owner: GTM lead
operations:
  - Standardize a quote approval packet that ties resource assumptions, equipment reservations, milestone owners, and acceptance criteria to each opportunity.
  - Maintain a structured benchmark library of quoted versus delivered output, change orders, and commissioning variance across all live projects.
  - Build partner operating rhythms with ORC suppliers, EPCs, and field teams so allocation updates and test evidence enter the platform on a predictable cadence.
  - Package lender- and counterparty-ready exports without trying to replace ERP, CAD, or engineering simulation systems.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales, partner development, and workflow design with OEM executives while the category is still being defined.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the first quote approval, reservation, and commissioning record workflows and keep implementation narrow enough to be productized.
  - role: Product lead
    startTiming: Month 2
    rationale: Translate pilot feedback into a repeatable data model, supplier workflow, and reporting layer before engineering expands scope.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Shorten deployment time, manage customer data imports, and prevent lighthouse pilots from becoming bespoke consulting projects.
  - role: Data and integrations engineer
    startTiming: Month 6
    rationale: Own supplier feeds, benchmark data quality, and the reporting workflows that create moat and expansion value.
milestones:
  - horizon: "0–12 months"
    items:
      - Close 2 paid lighthouse pilots with modular geothermal OEMs tied to live commercial programs
      - Replace spreadsheet quote approval on at least 1 customer workflow and manage real equipment reservations through the platform
      - Prove first-live deployment in under 8 weeks without replacing ERP, CAD, or Aspen
      - Convert at least 1 pilot into an annual subscription with 2 or more active programs on platform
  - horizon: "12–24 months"
    items:
      - Launch supplier and partner-seat workflows with at least 1 ORC or turbomachinery counterpart
      - Publish standardized commissioning variance and lender-ready reporting modules
      - Reach 4-6 lighthouse programs across 3 or more customers
      - Validate 1 adjacent modular thermal expansion design with a real prospect or partner
  - horizon: "24–36 months"
    items:
      - Expand beyond geothermal into at least 1 adjacent modular thermal asset class using the same orchestration model
      - Build a benchmark dataset large enough to inform quoting and delivery decisions across customers
      - Establish the platform as a recognized system of record for modular baseload project delivery among first-wave counterparties
risks:
  - risk: The immediate buyer base stays too small because modular geothermal deployments into AI campuses remain pilot-heavy longer than expected.
    likelihood: High
    impact: High
    mitigation: Keep the initial product narrow, win lighthouse accounts quickly, and validate adjacent modular thermal expansion before scaling burn.
  - risk: Supplier data access is weaker than expected, leaving the product unable to control scarce equipment allocation.
    likelihood: Medium
    impact: High
    mitigation: Start with manual or semi-structured reservation updates in pilots and prioritize supplier relationships before promising automated allocation control.
  - risk: Customers treat the software as a reporting dashboard instead of moving quote approval and commissioning workflows into it.
    likelihood: Medium
    impact: High
    mitigation: Design pilots around mandatory approval, reservation, and evidence steps that replace existing spreadsheets rather than summarizing them.
  - risk: Generic project platforms or internal tooling absorb enough of the workflow to make a standalone product look optional.
    likelihood: Medium
    impact: Medium
    mitigation: Compete on geothermal-specific data model, delivered-output benchmarks, and counterparty-ready evidence rather than basic task tracking.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: Build the first productized quote-to-commissioning workflow, close 2-3 lighthouse pilots, prove sub-8-week deployment, and validate whether supplier data access plus adjacent asset expansion can support a repeatable software business.
