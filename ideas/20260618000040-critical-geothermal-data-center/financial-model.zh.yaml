  upsideCase: 一名非关键岗位招聘推迟 2 个季度
  y3RevenueImpactK: 0.0
  cashImpactK: 120.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Accounts[Target OEM accounts] --> Pilots[Paid lighthouse pilots]
      Pilots --> Programs[Active programs on platform]
      Programs --> Revenue[Blended $168K annual revenue per program]
      Revenue --> GrossProfit[Gross profit at 65-72%]
      GrossProfit --> Cash[Cash runway after lean hiring]
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入由活跃项目数驱动——从第 1 年末的 2 个爬升至第 3 年末的 6 个，综合 $168K/项目。
- checkName: 必须做对的事
  finding: 公司必须在增加 GTM 成本之前，在第 2 年保持人员几乎不动，并将灯塔试点转化为可重复的生产工作流。
- checkName: 模型失效条件
  finding: 若销售周期延长至 7 个月或毛利率停留在 65% 而非正常化至 70% 以上，现金将在第 2 年第 4 季度里程碑之前转负。
- checkName: 下轮融资的证明点
  finding: 在第 2 年末前有 4 个生产项目、1 个供应商工作流和 1 个相邻资产设计上线，下轮融资条件最强。
sanityChecks:
  ruleOf40: 第 3 年增长率 53.8% + EBITDA 利润率 -107.0% = -53.2%
  burnMultiple: 第 3 年燃烧倍数约 2.7x：$899.2K 烧出 / $336K 净新增 ARR（4 个项目增至 6 个，每个 $168K）。
  revenuePerFte: '$93K（第 3 年，以第 3 年第 4 季度 9 名全职为基准；垂直 SaaS 启发式参考区间：约 $200-400K）。'
  flags:
  - 本模型中地热滩头市场的年末 ARR 上限约为 $1.0M，必须在公司达到风投效率之前大幅推进相邻资产扩张。
  - 人均收入远低于健康 SaaS 基准，因为早期以实施为主的工作吃掉了小团队的大部分产能。
  - 模型假设第 2 年刻意放缓招聘；若团队在试点转化之前提前招人，Pre-seed 融资额可能需超过 $2.5M。
  - 第 3 年末约 $253K 的剩余现金意味着融资必须在第 3 年下半年前启动，而不是等到现金快耗尽才行动。
