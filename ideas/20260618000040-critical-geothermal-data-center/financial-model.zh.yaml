scenarios:
  downside:
    description: 一个生产合同转化延迟约两个季度，综合项目收入降至研究基准下限，服务密集的上线过程使毛利率低于计划。
    y3RevenueK: 630.0
    y3EbitdaK: -1125.0
    cashLowPointK: -140.0
    keyAssumptionChanges:
    - ARPU 降至每项目 $150K
    - 毛利率维持在 65% 附近
    - 销售周期延长至约 7 个月
    - GTM 人员成本未能被足够的新增合同抵消
  base:
    description: 项目数从第 1 年末的 2 个爬坡至第 3 年末的 6 个，招聘按里程碑节奏进行，毛利率正常化至超过 70% 目标。
    y3RevenueK: 840.0
    y3EbitdaK: -899.2
    cashLowPointK: 252.9
    keyAssumptionChanges:
    - ARPU 维持 $168K
    - 毛利率从 65% 提升至 72%
    - 初始建设期后第 2 年保持零净招聘
    - 在第 3 年现金趋紧前完成下一轮融资
  upside:
    description: 两家灯塔客户比计划更快增加项目，合作伙伴席位收入拉高综合 ARPU，管理层推迟一个职位的招聘直到使用量被验证。
    y3RevenueK: 1080.0
    y3EbitdaK: -620.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - ARPU 提升至每项目 $180K
    - 第 3 年末项目数达到 7 个
    - 毛利率达到 75%
    - 一名后台岗位招聘推迟两个季度
