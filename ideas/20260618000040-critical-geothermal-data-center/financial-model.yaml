modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Accounts[Target OEM accounts] --> Pilots[Paid lighthouse pilots]
      Pilots --> Programs[Active programs on platform]
      Programs --> Revenue[Blended $168K annual revenue per program]
      Revenue --> GrossProfit[Gross profit at 65-72%]
      GrossProfit --> Cash[Cash runway after lean hiring]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by active-program count rising from 2 at Y1 exit to 6 at Y3 exit at a blended $168K per program.
- checkName: Must go right
  finding: The company has to hold hiring nearly flat through Y2 and convert lighthouse pilots into recurring production workflows before adding GTM cost.
- checkName: Model breaks if
  finding: Cash turns negative before the Q4Y2 milestone if sales cycles stretch toward 7 months or margin stays near 65% instead of normalizing above 70%.
- checkName: Next-round proof
  finding: The next financing case is strongest once 4 production programs, one supplier workflow, and an adjacent-asset design are live by the end of Y2.
sanityChecks:
  ruleOf40: Y3 growth 53.8% + EBITDA margin -107.0% = -53.2%
  burnMultiple: Y3 burn multiple is about 2.7x using $899.2K burn over $336K net new ARR (4 programs to 6 programs at $168K each).
  revenuePerFte: '$93K Y3 using 9 Q4Y3 FTE (heuristic vertical SaaS benchmark: roughly $200-400K).'
  flags:
  - The geothermal beachhead only supports about $1.0M year-end ARR in this model, so adjacent-asset expansion is required well before the company looks venture-efficient.
  - Revenue per FTE stays far below healthy SaaS benchmarks because implementation-heavy early work absorbs a small team.
  - The model assumes a deliberate Y2 hiring pause; if the team hires ahead of pilot conversion, the pre-seed round likely needs to be larger than $2.5M.
  - Ending cash of roughly $253K in Y3 means fundraising must start before the second half of Y3 rather than waiting for cash to run close to zero.
