scenarios:
  downside:
    description: One production conversion slips about two quarters, blended program revenue settles near the research floor, and services-heavy onboarding keeps margin below plan.
    y3RevenueK: 630.0
    y3EbitdaK: -1125.0
    cashLowPointK: -140.0
    keyAssumptionChanges:
    - ARPU falls to $150K per active program
    - Gross margin stays near 65%
    - Sales cycle stretches toward 7 months
    - GTM hire is not offset by enough new wins
  base:
    description: Programs ramp from 2 at the end of Y1 to 6 at the end of Y3 while hiring stays milestone-gated and gross margin normalizes above the 70% target.
    y3RevenueK: 840.0
    y3EbitdaK: -899.2
    cashLowPointK: 252.9
    keyAssumptionChanges:
    - ARPU remains $168K
    - Gross margin improves from 65% to 72%
    - Hiring stays flat through Y2 after the initial buildout
    - Next round is raised before Y3 cash gets tight
  upside:
    description: Two lighthouse customers add programs faster than planned, partner-seat revenue lifts blended ARPU, and management delays one hire until usage proves out.
    y3RevenueK: 1080.0
    y3EbitdaK: -620.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - ARPU rises to $180K per active program
    - End-of-Y3 program count reaches 7
    - Gross margin reaches 75%
    - One back-office hire shifts out by two quarters
