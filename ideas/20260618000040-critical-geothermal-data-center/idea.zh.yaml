  customerSegments:
    - 面向 AI 园区项目的模块化地热 OEM
    - 调试集装箱化地热电站的 EPC 公司
    - 处于后期阶段、部署模块化热力资产的分布式能源开发商
  valuePropositions:
    - 把定制化的地热销售工程，变成可重复的项目配置流程
    - 在团队超承诺交货之前，预先分配稀缺的涡轮机和变压器供应
    - 在多个站点间积累可复用的调试和性能基准记录
  channels:
