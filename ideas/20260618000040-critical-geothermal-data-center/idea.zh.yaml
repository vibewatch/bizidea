problem: >-
  追逐 AI 园区需求的模块化地热厂商，至今仍把每一笔交易当作定制工程项目来运作——尽管真正的约束早已变成：
  如何在截止期前，把稀缺的涡轮机套件、热力假设和交货档期，精准匹配给那些要求确定兆瓦数的买家。
  销售团队拿着电子表格承诺产出和时间表，而项目交付团队则在各自孤立的工具里，周旋于站点资源数据、
  变压器交货周期和 EPC 依赖关系之间。一旦假设出现偏差，客户就会退回到燃气发电机或等待电网，
  地热厂商的信誉也在市场刚刚打开之际化为泡影。
targetUser:
  primary: 北美模块化地热 OEM（主要服务 AI 园区项目）的项目交付副总裁或商务工程总监
  secondary: 负责在新数据中心站点调试集装箱化地热机组的 EPC 项目经理
  buyer: 正从试点项目向可重复商业部署转型的模块化地热初创公司 COO 或 CEO
startupThesis:
  nonObviousInsight: >-
    在 AI 基础设施中率先突围的地热赢家，不会仅靠更好的钻井技术或更低廉的购电合同取胜。
    他们会赢在掌控配置到交付层上——围绕稀缺兼容涡轮机、工厂产能档期和热力性能假设，
    因为模块化地热正从定制能源项目，转变为一种受约束的工业品交付流程。
  beachhead: >-
    向美国西部托管和 AI 园区项目发货的北美模块化地热 OEM 及 EPC 合作伙伴，
    交付规模在 3-10 个 2-5 MW 集装箱化有机朗肯循环（ORC）机组之间
  wedge: >-
    一个配置到报价与调试平台，把地下资源假设、园区负荷与冷却数据、涡轮机及变压器库存，
    以及工厂产能档期整合进同一个交付流程，服务每个模块化地热项目
  whyNowCatalyst: >-
    集装箱化 Apex 机组的当日报道、首个 2.5 兆瓦项目落地，以及行业涡轮机短缺，
    表明"AI 供电用地热"的机会窗口正从技术可行性，转向供给受限的商业化落地阶段。
  ventureScalePath: >-
    从模块化地热报价与交付的信息总账起步，逐步延伸至供应商市场流程、贷款方与保险公司报告、
    机队性能基准，最终成为涵盖余热 ORC、微电网和工业基荷发电等其他模块化热力资产的
    统一调度层。
solution: >-
  产品摄入资源测试数据、园区预期负荷、冷却回路温度、设备交货周期和 EPC 里程碑，
  为每笔销售生成标准化的项目配置，取代逐笔定制的电子表格模型。商务团队可以实时看到，
  哪些涡轮机套件和变压器组合能在特定站点实现承诺的产出，
  并在报价转化为承诺之前预留工厂产能和调试档期。
  部署期间，同一套流程持续追踪验收测试、热力性能偏差和变更单，
  让 OEM 在项目间积累可复用的基准数据库，而不是每次都重新踩一遍已知的坑。
  首个版本刻意面向模块化地热厂商内部——因为在这里，硬件稀缺、交付人才匮乏、AI 需求高涨，
  瓶颈感最为强烈。
goToMarketSeed:
  firstCustomer: >-
    一家美国模块化地热初创公司，在美国西部各州有 2-6 个商业 AI 园区项目在推进，
    销售工程、供应链和现场调试团队合计不超过 50 人
  buyingTrigger: >-
    赢得第一个商业 AI 园区合同或完成项目融资，会迫使团队在不超卖稀缺涡轮机库存和调试产能的前提下，
    快速为更多站点报价
  currentAlternative: >-
    电子表格报价、Aspen 或热力点模型、ERP 记录和 EPC 邮件线程，
    靠资深工程师和项目经理人工串联
  switchingReason: >-
    这个切入点能缩短"报价到开工令"的周期，防止稀缺涡轮机档期被重复销售，
    并为假设、测试结果和调试成果生成贷款方可接受的记录——
    同时无需替换现有的 CAD 或 ERP 系统
  pricingHypothesis: >-
    按活跃交付项目收取年度平台费，另加已调试项目的每兆瓦费用，
    以及面向涡轮机、变压器和 EPC 合作伙伴的付费供应商席位
whyNow:
  - point: 市场真正的隐形障碍已不再只是地热资源开发，而是稀缺的兼容涡轮机和变压器让交付承诺变得脆弱。
    signalRefs: ["涡轮机短缺才是真正的卡点"]
    sourceRefs: [1, 3]
  - point: 工厂预制并以标准集装箱运输的机组，让模块化地热更像可配置的工业设备，为软件标准化报价和交付流程创造了空间。
    signalRefs: ["模块化地热正在成为可配送的标准装备"]
    sourceRefs: [1, 2, 3]
  - point: AI 数据中心作为全天候供电的紧迫买家正在崛起，厂商需要一种更快、更可信的方式，把入站需求转化为可执行的项目。
    signalRefs: ["AI 园区正把地热拉入新的需求赛道"]
    sourceRefs: [2, 3]
  - point: 首个 2.5 兆瓦项目和 2027 年商业化目标意味着，下一个价值来源是可复制的执行数据，而不是原型故事。
    signalRefs: ["首批商业项目开始倒逼可复制的交付能力"]
    sourceRefs: [1, 2]
differentiator: >-
  现有的电力项目工具要么假定这是一个定制化的公用事业规模开发周期，要么套用通用 EPC 项目计划。
  这家公司的起点是模块化地热引入的新约束：稀缺的兼容涡轮机组、可重复的工厂预制配置，
  以及仍需在截止期内得到验证的站点特定热力性能。
  防御力随时间叠加——核心是一个独特的数据集：已交付产出、调试偏差、组件交货周期，
  以及哪些设计方案实际上能通过买家、贷款方和保险公司对模块化基荷项目的审查。
