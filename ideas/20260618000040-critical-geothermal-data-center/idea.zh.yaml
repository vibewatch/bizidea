    - 通过已介入西部美国地热项目的 ORC 供应商、EPC 和项目交付合作伙伴进行预热引介和联合销售
    - 后期来自贷款方、公用事业公司或超大规模云厂商尽调要求的被动拉动
  customerRelationships:
    - 在一个商务工程与交付团队内部进行高触达式导入
    - 就报价准确性、进度偏差和性能差异开展联合复盘
    - 从单一 OEM 延伸至供应商、贷款方和 EPC 工作流
  revenueStreams:
    - 按活跃交付项目的年度 SaaS 订阅
    - 与平台上已调试项目挂钩的每兆瓦费用
    - 供应商网络和保险方报告模块
  keyResources:
    - 热力性能与调试基准数据
    - 与 ERP、热力模型和现场测试系统的集成
    - 将组件可用性与项目假设挂钩的工作流图
  keyActivities:
    - 标准化模块化地热项目配置和报价逻辑
    - 追踪供应分配、变更单和调试证据
    - 将项目交付数据转化为基准和承保产品
  keyPartners:
    - 涡轮机和变压器供应商
    - EPC 和辅助设备（BOP）承包商
    - 项目融资方和专业保险公司
  costStructure:
    - 热力性能工作流的产品与模型工程
    - 面向早期 OEM 客户的集成与部署服务
    - 行业专项销售与客户成功
    - 现场数据采集与基准运营
jobsToBeDone:
  - job: 当模块化地热厂商收到 AI 园区的正式询盘时，帮助商务工程团队生成可信的项目配置和时间表，让他们赢得合同而不超卖稀缺硬件。
    currentAlternative: 资深工程师为每个潜在客户单独构建一套电子表格和仿真模型包
    successMetric: 报价交付周期缩短，签约后的设计变更减少
  - job: 当项目进入交付阶段时，帮助 OEM 和 EPC 实时追踪热力假设和组件分配是否仍能支撑承诺产出，以便按时完成调试并维护买家信任。
    currentAlternative: 每周例会、邮件线程、ERP 查询和手工现场报告
    successMetric: 准时完成调试的比例提升，报价与实际交付兆瓦数的偏差缩小
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 多个经过核实的来源汇聚于一个具体的融资事件、一个明确点名的涡轮机瓶颈，以及模块化地热清晰的 AI 需求拉动。
  painIntensity:
    score: 4
    rationale: 交付失误会直接损毁少数高价值项目的收入和信誉，尽管痛点集中在新兴厂商群体，而非广泛的在位市场。
  wedgeClarity:
    score: 5
    rationale: 面向模块化地热 OEM 的配置到报价加调试管控，是一个窄而有据的工作流——买家、触发事件和可量化成果都清晰可辨。
  defensibility:
    score: 4
    rationale: 专有价值来自积累的交付基准、供应分配数据和贷款方级别的绩效记录，但早期转换成本取决于工作流的深度。
  ventureScale:
    score: 4
    rationale: 滩头市场较窄，但可向跨厂商的模块化热力基础设施控制层和项目融资数据产品扩张。
topRisks:
  - name: 市场时机风险
    description: 如果模块化地热向 AI 园区的部署持续停留在试点阶段，滩头市场的成熟速度可能跟不上软件公司的需要。
    mitigation: 优先向已同时管理多个商业机会的 OEM 销售，并将产品设计成同一套工作流可延伸至余热 ORC 和其他模块化热力资产。
  - name: 工作流深度风险
    description: 如果产品无法替代足够多的实际报价和调试工作，团队可能把它当成另一个数据看板。
    mitigation: 掌控项目配置的审批路径、库存分配和验收测试证据，而不是止步于报告层面。
  - name: 数据稀缺风险
    description: 早期客户可能没有足够的历史项目数据来支撑有力的基准或自动化建议。
    mitigation: 从结构化的工作流和证据采集入手，导入历史项目文件，利用每个已交付项目逐步构建基准层，再考虑承诺优化功能。
