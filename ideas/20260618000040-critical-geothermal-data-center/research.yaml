  validationPlan:
  - priority: high
    question: How many North American modular or next-generation geothermal teams will manage at least three concurrent commercial programs by 2027?
    evidenceToGather: Live pipeline counts and org charts from 8-12 geothermal OEMs and EPCs.
  - priority: high
    question: 'Which fields actually drive quote approval today: thermal assumptions, ORC configuration, transformer availability, or permit milestones?'
    evidenceToGather: Annotated quote packages, handoff spreadsheets, and project postmortems from two design wins.
  - priority: medium
    question: Will suppliers expose enough slot, BOM, and delivery data to let a third-party orchestration layer become system of record?
    evidenceToGather: Supplier interviews plus sample reservation and change-order logs from ORC/turbomachinery vendors.
  - priority: low
    question: How reusable is the wedge across waste-heat ORC and non-geothermal modular thermal assets?
    evidenceToGather: At least three adjacent customer interviews and one pilot workflow outside geothermal.
