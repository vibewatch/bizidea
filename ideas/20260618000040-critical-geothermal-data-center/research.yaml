competitors:
- name: Sitetracker
  stage: scale-up
  wedge: Renewable asset lifecycle and project execution platform for developers, EPCs, and O&M teams.
  pricing: Public AppExchange benchmark starts at $150/user/month with enterprise flexibility.
  strength: Strong generic deployment and compliance workflow coverage across critical infrastructure.
  weaknessVsUs: Does not appear geothermal-specific or oriented around quote logic, thermal assumptions, or scarce ORC slot reservation.
  sourceRefs:
  - 34
  - 36
- name: Paces
  stage: scale-up
  wedge: AI-assisted energy development workflow focused on siting, risk, and interconnection.
  pricing: Custom, demo-led enterprise pricing.
  strength: Fast parcel screening, project prioritization, and front-end diligence for power projects.
  weaknessVsUs: Front-loads site and development intelligence but does not own commissioning or multi-party delivery control after a project is sold.
  sourceRefs:
  - 37
- name: Orennia
  stage: scale-up
  wedge: Energy data and analytics platform for interconnection, site feasibility, and data-center power-market decisions.
  pricing: Custom, demo-led enterprise pricing.
  strength: Strong power-market, interconnection, and data-center siting analytics.
  weaknessVsUs: Optimizes site and investment choices rather than day-to-day geothermal quote approval, supplier allocation, and field acceptance workflows.
  sourceRefs:
  - 39
  - 40
- name: AspenTech
  stage: incumbent
  wedge: Engineering and process-simulation suite with geothermal and subsurface modeling capability.
  pricing: Custom enterprise licensing.
  strength: Deep modeling credibility for process and subsurface engineering.
  weaknessVsUs: Acts as an engineering workbench, not a shared commercial-delivery system of record for OEMs and EPCs.
  sourceRefs:
  - 42
