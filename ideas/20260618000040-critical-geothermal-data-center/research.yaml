openQuestions:
- How many geothermal OEMs will actually run three or more concurrent commercial data-center-adjacent programs within the next 24 months?
- Will ORC/turbomachinery suppliers share slot, BOM, and lead-time data deeply enough for a third-party orchestration layer to become system of record?
- Does the first strong use case live inside geothermal OEMs, or will lenders, EPCs, and utilities force adoption faster than OEMs do?
- How durable is the data-center wedge if natural-gas bridge power remains the default answer in primary markets for several more years?
