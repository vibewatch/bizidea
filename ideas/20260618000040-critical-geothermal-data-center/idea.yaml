jobsToBeDone:
  - job: When a modular geothermal vendor receives a serious AI-campus inquiry, help the commercial engineering team produce a credible configuration and timeline, so they can win the deal without overpromising scarce hardware.
    currentAlternative: Senior engineers build one-off spreadsheet and simulation packages for each prospect
    successMetric: Reduction in quote turnaround time and fewer post-signature design revisions
  - job: When a project moves into delivery, help the OEM and EPC track whether thermal assumptions and component allocations still support promised output, so they can commission on time and preserve buyer trust.
    currentAlternative: Weekly status meetings, email threads, ERP lookups, and manual field reports
    successMetric: Higher on-time commissioning rate and lower variance between quoted and delivered megawatts
ideaScorecard:
  signalStrength:
    score: 5
    rationale: Multiple verified sources converge on a concrete funding event, a named turbine bottleneck, and a clear AI-demand pull for modular geothermal.
  painIntensity:
    score: 4
    rationale: Delivery mistakes directly kill revenue and credibility for a small number of high-value projects, though the pain is concentrated in emerging vendors rather than a broad incumbent market.
  wedgeClarity:
    score: 5
    rationale: Configure-to-quote plus commissioning control for modular geothermal OEMs is a narrow workflow with identifiable buyers, triggers, and measurable outcomes.
  defensibility:
    score: 4
    rationale: Proprietary value comes from accumulated delivery benchmarks, supply-allocation data, and lender-grade performance records, but early switching costs depend on workflow depth.
  ventureScale:
    score: 4
    rationale: The beachhead is narrow, but it can expand into a cross-vendor control plane for modular thermal infrastructure and project-finance data products.
topRisks:
  - name: Market timing risk
    description: If modular geothermal deployments into AI campuses stay stuck in pilot mode, the beachhead may mature slower than the software company needs.
    mitigation: Sell first into OEMs already managing multiple commercial opportunities and design the product so the same workflow can extend to waste-heat ORC and other modular thermal assets.
  - name: Workflow depth risk
    description: Teams may treat the product as another dashboard if it does not replace enough of the actual quoting and commissioning work.
    mitigation: Own the approval path for project configurations, inventory allocation, and acceptance-test evidence rather than stopping at reporting.
  - name: Data sparsity risk
    description: Early customers may not have enough historical project data to power strong benchmarks or automated recommendations.
    mitigation: Start with structured workflow and evidence capture, import legacy project files, and use each delivered project to build the benchmark layer before promising optimization.