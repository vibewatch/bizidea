  - point: Factory-built units that ship in standard containers make modular geothermal behave more like configurable equipment, which creates room for software to standardize quoting and delivery.
    signalRefs: ["Modular geothermal is becoming shippable equipment"]
    sourceRefs: [1, 2, 3]
  - point: AI data centers are emerging as urgency-driven buyers for always-on power, so vendors need a faster and more credible way to turn inbound demand into executable projects.
    signalRefs: ["AI campuses are pulling geothermal into a new demand lane"]
    sourceRefs: [2, 3]
  - point: A first 2.5 megawatt project and a 2027 commercial target mean the next source of value is repeatable execution data, not just prototype storytelling.
    signalRefs: ["First commercial projects are forcing operational repeatability"]
    sourceRefs: [1, 2]
differentiator: >-
  Existing power-project tools assume either a bespoke utility-scale development cycle or a generic EPC project plan. This company
  starts from the new constraint introduced by modular geothermal: scarce compatible turbomachinery, repeatable factory-built
  configurations, and site-specific thermal performance that must still be proven under deadline. Defensibility compounds through a
  unique dataset of delivered output, commissioning variance, component lead times, and which design envelopes actually clear buyer,
  lender, and insurer scrutiny for modular baseload projects.
