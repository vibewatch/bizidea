problem: >-
  Modular geothermal vendors chasing AI-campus demand still run each deal like a bespoke engineering project, even though the real
  constraint is now matching scarce turbine packages, thermal assumptions, and delivery slots to buyers who want firm megawatts on
  a deadline. Sales teams promise output and timelines from spreadsheets while project-delivery teams juggle site-specific resource
  data, transformer lead times, and EPC dependencies in disconnected tools. When those assumptions break, the customer falls back to
  gas generators or utility delays and the geothermal vendor loses credibility just as the market opens.
targetUser:
  primary: VP Project Delivery or Head of Commercial Engineering at a North American modular geothermal OEM serving AI-campus projects
  secondary: EPC program manager responsible for commissioning containerized geothermal units at new data-center sites
  buyer: COO or CEO at a modular geothermal startup moving from pilot projects to repeatable commercial deployments
startupThesis:
  nonObviousInsight: >-
    The first breakout geothermal winners in AI infrastructure will not be defined only by better drilling science or cheaper power
    contracts. They will win by controlling the configure-to-delivery layer around scarce compatible turbines, factory slots, and
    thermal-performance assumptions, because modular geothermal is turning from a custom energy project into a constrained
    industrial-product workflow.
  beachhead: >-
    North American modular geothermal OEMs and EPC partners shipping their first 3-10 containerized 2-5 MW Organic Rankine Cycle
    units to western U.S. colocation and AI campus projects
  wedge: >-
    A configure-to-quote and commissioning platform that combines subsurface assumptions, campus load and cooling data, turbine and
    transformer availability, and factory-slot commitments into one delivery workflow for each modular geothermal project
  whyNowCatalyst: >-
    Same-day reporting on containerized Apex units, a first 2.5 megawatt project, and an industry turbine shortage shows that the
    geothermal-for-AI opportunity is shifting from technical possibility to supply-constrained commercial execution.
  ventureScalePath: >-
    Start as the system of record for modular geothermal quoting and delivery, then expand into supplier marketplace workflows,
    lender and insurer reporting, fleet performance benchmarking, and eventually the orchestration layer for other modular thermal
    assets such as waste-heat ORC, microgrids, and industrial baseload generation.
solution: >-
  The product ingests resource-test data, expected campus load, cooling-loop temperatures, equipment lead times, and EPC milestones
  to generate a standardized project configuration instead of a custom spreadsheet model for every sale. It gives commercial teams a
  live view of which turbine packages and transformer combinations can meet promised output at a specific site, and reserves factory
  and commissioning capacity before a quote becomes a commitment. During deployment, the same workflow tracks acceptance tests,
  thermal-performance deltas, and change orders so the OEM builds a reusable benchmark library across projects rather than relearning
  every failure mode. The first release is intentionally internal-facing for modular geothermal vendors, because that is where a new
  market with scarce hardware, limited delivery talent, and growing AI demand feels the bottleneck most acutely.
goToMarketSeed:
  firstCustomer: >-
    A U.S. modular geothermal startup with 2-6 commercial AI-campus projects in pipeline across western states and fewer than 50
    people spanning sales engineering, supply chain, and field commissioning
  buyingTrigger: >-
    Winning a first commercial AI-campus contract or raising project capital creates pressure to quote more sites without
    overcommitting scarce turbine inventory and commissioning bandwidth
  currentAlternative: >-
    Spreadsheet-based quoting, Aspen or thermodynamic point models, ERP records, and EPC email threads stitched together by senior
    engineers and project managers
  switchingReason: >-
    This wedge shortens quote-to-notice-to-proceed time, prevents double-selling constrained turbine slots, and creates a
    lender-ready record of assumptions, test results, and commissioning outcomes without forcing the team to replace its CAD or ERP
    stack
  pricingHypothesis: >-
    Annual platform fee per active delivery program, plus per-megawatt fees for commissioned projects and paid supplier seats for
    turbine, transformer, and EPC partners
