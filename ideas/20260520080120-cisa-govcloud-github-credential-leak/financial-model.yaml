modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Assessments["Assessments / incidents"] --> Pilots["Paid pilots"]
      Pilots --> Production["Annual deployments"]
      Production --> Expansion["More repos + accounts + evidence workflows"]
      Expansion --> Revenue["Subscription + usage revenue"]
      Revenue --> GrossProfit["Gross profit"]
      GrossProfit --> Cash["Cash / runway"]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue depends on converting paid incident and audit pilots into annual subscriptions, then expanding repo and account coverage inside each contractor."
  - checkName: Must go right
    finding: "Pilot-to-production conversion has to stay near the planned 50%+ level and expansions need to happen within 12 months so founder-led selling does not outrun recurring revenue."
  - checkName: Model breaks if
    finding: "The biggest cash risk is slower federal buying plus services-heavy onboarding, because that combination pushes the downside case below zero before the next round."
  - checkName: Next-round proof
    finding: "The clearest next-financing proof is 12 paying contractors and at least 3 production deployments expanding beyond one program by Q4Y2 with partner-assisted onboarding working."
sanityChecks:
  ruleOf40: "Y3 growth 89.7% plus EBITDA margin -41.6% = 48.1%; directionally acceptable for a still-early security SaaS business."
  burnMultiple: "Y1 burn multiple is about 1.8x on roughly $0.43M exit ARR; Y2 is about 1.6x as exit ARR rises to about $0.88M; Y3 improves to about 0.8x on roughly $1.54M exit ARR."
  revenuePerFte: "$255K Y3 recognized revenue per Q4Y3 FTE, or about $307K on an exit-ARR basis (benchmark $200-400K SaaS)."
  flags:
    - "The researched year-3 SOM is narrow, so the 20-customer base case already assumes the company captures much of the early GovCloud-contractor wedge."
    - "The company remains EBITDA-negative through Y3, so a next round is still likely unless conversion speed or expansion revenue beats the base case."
    - "The hiring plan stays intentionally lean, which means founder selling and partner-assisted onboarding must work better than average for federal security software."
