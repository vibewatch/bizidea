slug: govcloud-secret-quarantine-rail
date: "2026-05-20"
currency: USD
modelStartMonth: "2026-06"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-06"
    unit: YYYY-MM
    source: "Starts the first full month after the 2026-05-20 business-plan date."
  - id: A2
    name: "Opening cash and pre-seed size"
    value: "2300.0"
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk.runwayMonths 18] Base case uses a $2.3M pre-seed at the low end of the stated range, sized to reach the Q4Y2 proof point plus about six months of buffer."
  - id: A3
    name: "Starting customers (M1)"
    value: "0"
    unit: organizations
    source: "[BP investorMemo.firstCustomer.initialContract + BP milestones 0-12 months] The company starts pre-revenue and must first sell assessments and pilots."
  - id: A4
    name: "Y1 customer ramp"
    value: "6 paying organizations by M12, with the first paid pilot in M4"
    unit: organizations
    source: "[BP milestones 0-12 months + BP experimentRoadmap 0-90 days] Anchored to 5-8 paid pilots in the first year and at least 3 pilot-to-production conversions."
  - id: A5
    name: "Y2 customer ramp"
    value: "Q1Y2 7, Q2Y2 8, Q3Y2 10, Q4Y2 12 paying organizations"
    unit: organizations
    source: "[BP milestones 12-24 months + BP gtm.funnelTargets] Assumes moderate conversion and the first multi-program expansions rather than a broad GTM scale-up."
  - id: A6
    name: "Y3 customer ramp"
    value: "Q1Y3 14, Q2Y3 16, Q3Y3 18, Q4Y3 20 paying organizations"
    unit: organizations
    source: "[BP market.som + research market.som] Keeps the base case aligned with the researched year-3 SOM of about 20 contractor customers."
  - id: A7
    name: "Pricing ladder"
    value: "$24K paid pilot over 90 days, ~$60K initial production ACV, and ~$76.8K blended exit ACV"
    unit: usdK_per_customer_year
    source: "[BP investorMemo.firstCustomer.initialContract + research willingnessToPay] Uses the lower half of the $20K-$40K pilot range and a production price inside the stated $60K-$150K annual deployment range."
  - id: A8
    name: "Y1 realized revenue schedule"
    value: "M4-M5 $8K, M6-M7 $16K, M8-M9 $20K, M10 $28K, M11 $32K, M12 $36K"
    unit: USDK_per_month
    source: "[BP milestones 0-12 months + A7] Revenue reflects a mix of paid pilots and the first production deployments rather than full-year subscriptions from day one."
  - id: A9
    name: "Y2 realized quarterly revenue"
    value: "Q1Y2 $120K, Q2Y2 $150K, Q3Y2 $183K, Q4Y2 $219K"
    unit: USDK_per_quarter
    source: "[BP milestones 12-24 months + BP businessModel.expansionLevers] Growth comes from pilot conversion, additional repositories, and more mapped GovCloud accounts inside the same contractors."
  - id: A10
    name: "Y3 realized quarterly revenue"
    value: "Q1Y3 $255K, Q2Y3 $297K, Q3Y3 $339K, Q4Y3 $384K"
    unit: USDK_per_quarter
    source: "[BP market.som + research market.som + A7] Exit ARR of about $1.54M is only modestly above the researched $1.2M SOM because later-quarter revenue includes expansion revenue in addition to logo count."
  - id: A11
    name: "Gross margin ramp"
    value: "Y1 60.7%, Y2 71.5%, Y3 75.1%, with Q4Y3 at 76.0%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 75 + BP operatingAssumptions one-program onboarding with light services] Early mapping and evidence work depress margin, then repeatable playbooks move the business toward the target margin."
  - id: A12
    name: "Monthly logo churn for unit economics"
    value: "1.2"
    unit: percent
    source: "[Startup-finance heuristic] Federal security software sold on annual contracts should churn below SMB SaaS, but the wedge is still early and exposed to platform compression."
  - id: A13
    name: "Steady-state CAC"
    value: "42.0"
    unit: USDK_per_customer
    source: "[BP gtm.channels + BP gtm.funnelTargets + research categoryDynamics.headwinds] Founder-led security selling, pilots, and federal procurement cycles justify a higher CAC than PLG SaaS."
  - id: A14
    name: "Loaded salary bands"
    value: "Founder 150; founding engineer 190; solutions engineer 155; security engineer 180; GTM lead 165"
    unit: annualK_per_FTE
    source: "[BP team + startup-finance heuristic] Assumes senior security talent but lean pre-seed cash compensation."
  - id: A15
    name: "Hiring schedule"
    value: "Solutions engineer in M4, security engineer in M7, GTM lead in Q4Y2"
    unit: timing
    source: "[BP team + BP strategicChoices.sequencingRationale] Delivery and product hardening come before dedicated GTM hiring, which begins only after the first production proof."
  - id: A16
    name: "Headcount endpoint"
    value: "2 FTE by Q1Y1, 3 by Q2Y1, 4 by Q3Y1, 5 by Q4Y2, and 5 by Q4Y3"
    unit: FTE
    source: "[BP team + BP fundingAsk] Keeps the company lean enough for a pre-seed while still covering founder sales, onboarding, product, security engineering, and one GTM hire."
  - id: A17
    name: "Non-payroll operating spend method"
    value: "Lean cloud, travel, compliance, insurance, and legal spend with no large services bench"
    unit: policy
    source: "[BP operations + startup-finance heuristic] The model assumes software-first delivery with partner help for edge cases, not a consulting-heavy implementation team."
  - id: A18
    name: "Cash flow simplification"
    value: "Ending cash equals opening cash plus cumulative EBITDA"
    unit: formula
    source: "[Startup-finance heuristic] Assumes limited working-capital swings, capex, debt, and deferred-revenue distortion for an early-stage software company."
  - id: A19
    name: "Funding sizing rule"
    value: "Raise enough to reach the Q4Y2 milestone and keep about 6 months of cash buffer"
    unit: policy
    source: "[BP fundingAsk.runwayMonths 18 + model requirement] The base case extends the stated 18-month target to milestone-plus-buffer sizing."
  - id: A20
    name: "Scenario downside deltas"
    value: "Q4Y3 customers 15, exit ACV near $68K, gross margin 70%, and sales cycle stretches toward 9 months"
    unit: scenario_inputs
    source: "[BP risks + research sensitivityCases] Captures procurement drag, more services-heavy onboarding, and stronger native platform competition."
  - id: A21
    name: "Scenario upside deltas"
    value: "Q4Y3 customers 24, exit ACV near $82K, gross margin 78%, and partner-assisted deployments pull conversions forward by roughly one quarter"
    unit: scenario_inputs
    source: "[BP experimentRoadmap + BP milestones 24-36 months] Upside assumes the AWS partner motion works without a large extra hiring step."
