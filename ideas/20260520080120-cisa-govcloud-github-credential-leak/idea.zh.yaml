differentiator: 传统 secret scanner 只能告诉团队：有东西被错误提交了。这个公司要接手的是发现之后更值钱的那段流程——理解合同边界和环境语义的隔离、轮换编排，以及拿出“政府凭证确实已经收住”的证明。它的护城河会随着一张专有图谱越滚越厚：把仓库、云账户、项目、分包商和修复步骤连起来，而这些关联恰恰只会出现在政府交付环境里。
