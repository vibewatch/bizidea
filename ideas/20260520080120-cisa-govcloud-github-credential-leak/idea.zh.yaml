topRisks:
- name: 采购细分市场偏窄
  description: 联邦承包商安全是个有价值但相对专门化的市场，增长速度可能慢于商业 DevSecOps 大类。
  mitigation: 先在承包商滩头市场站住，再把同一套响应层扩到国防、关键基础设施和其他受监管云运营方。
- name: 平台能力重叠
  description: GitHub、GitGuardian 或大型 vault 厂商都可能补上更多 secret 泄漏后的自动处置能力。
  mitigation: 差异化放在 GovCloud 账户映射、合同边界流程和审计证据生成，而不是单纯的检测能力。
- name: 集成复杂度高
  description: 承包商往往同时跑着割裂的 repo、身份系统和云账户，这会让自动轮换在落地时变得很难。
  mitigation: 先从只读发现和少量受支持的 GitHub / GovCloud playbook 起步，再通过带服务的 onboarding 扩大覆盖。
