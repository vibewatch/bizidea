problem: 给民事机构和国防周边机构交付软件的联邦承包商，常常把工作拆在总包、分包、GitHub repo 和 GovCloud 环境之间，没有哪一支安全团队能把全链路真正管住。开发者或承包商一旦把仍然生效的凭证拷进公开 repo，问题就不只是一次 secret 泄漏，而会立刻变成合同风险事件：机构系统可能暴露，共享环境要紧急轮换，还会留下审计发现，承包商和机构两边都得解释。现有的 secret scanner 和 vault 仍然卡在最危险的一段——从发现泄漏，到摸清每个受影响凭证，再到拿出政府项目能接受的修复证明，中间还有很大断层。
targetUser:
  primary: 在联邦总包商中负责 AWS GovCloud 工作负载和混合 GitHub 环境的 DevSecOps 与平台安全负责人，服务对象是民事机构交付团队
  secondary: 负责 ATO 证据、分包商访问控制，以及政府软件项目整体凭证 hygiene 的项目安全经理和云平台负责人
  buyer: 联邦系统集成商或网络安全承包商里的工程副总裁、DevSecOps 总监，或首席信息安全官
startupThesis:
  nonObviousInsight: 真正让人头疼的，已经不是基础的 secret 检测。公开扫描器和 GitHub 都证明了 secret 能被找出来。没被解决的是“承包商感知”的处置链：先判断泄漏的 key 究竟连着 GovCloud、构建系统还是机构内部系统，再跨越总包和分包边界，触发正确的轮换、证据留存和权限回滚，赶在机构升级事态之前收住局面。
  beachhead: 管理 3–20 个 AWS GovCloud 账户、20–200 个 GitHub 仓库，并在民事网络安全和现代化项目里协同多个涉密分包商的联邦网络安全总包商和系统集成商
  wedge: 一条从 GitHub 连到 GovCloud 的隔离轨：拦截含有政府关联凭证的 push，按项目和爆炸半径给泄漏的 secret 分级，再一键编排轮换和 ATO / 事件上报所需的证据包
  whyNowCatalyst: 这次 CISA 事件说明，承包商完全可能关掉原生控制、把仍然有效的 GovCloud 管理员密钥公开泄漏，而且 2 天都不处理。repo hygiene 因而不再只是工程细节，而成了紧迫的政府交付和合规问题。
  ventureScalePath: 先拿下承包商侧的 GitHub 与 GovCloud 处置切口，再把能力扩到更广的机器身份治理：覆盖 Azure Government、构建系统、工单、CI/CD，以及分包商访问流程等受监管承包商场景。
solution: GovCloud 凭证隔离轨把联邦承包商用的 GitHub 组织、secret store 和云账户清单接起来。它会在 push 之前或刚 push 之后识别政府关联凭证，判断每个 secret 能碰到哪个项目、云账户或内部系统，然后直接拉起预置的处置 playbook，而不是只开一张 ticket。第一版先盯 GovCloud 及其相邻的构建凭证：给出轮换步骤、按需撤销 repo 访问，并拼出一条能过审计的证据链，说明什么被暴露、何时被禁用、哪些系统已经检查过。这个切口的价值在于，它把原本要靠承包商和机构来回扯上几小时甚至几天的混乱协同，压缩成一条可控的响应路径。
goToMarketSeed:
  firstCustomer: 美国前 50 的联邦网络安全或系统集成承包商：至少有一个跑在 AWS GovCloud 上的民事机构项目，50+ 名工程师，同时总包和分包开发者都在用 GitHub 做基础设施和构建自动化
  buyingTrigger: 发生 secret 泄漏、被 CMMC 或机构审计点名、项目重新竞标，或内部下令要求在下一次 ATO 审核前证明承包商 repo 不会暴露仍然生效的政府凭证
  currentAlternative: GitHub secret scanning、人工审查仓库、vault 产品、基于表格的凭证盘点，以及由云安全和项目安全团队临时拼起来的事件响应
  switchingReason: 这个切口不只是把 secret 找出来，而是把它们映射到 GovCloud 账户和合同环境，再自动完成轮换与证据生成——这正是通用 AppSec 工具和 vault 做不到的。
  pricingHypothesis: 按受保护的仓库数量和政府云账户数量收年费；更高级的事件响应自动化再按轮换 secret 数量和证据工作流收费
