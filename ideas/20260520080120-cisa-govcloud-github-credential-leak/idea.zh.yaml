  sources:
  - id: 1
    title: CISA 管理员把 AWS GovCloud 密钥泄漏到 GitHub
    url: https://krebsonsecurity.com/2026/05/cisa-admin-leaked-aws-govcloud-keys-on-github
    publisher: KrebsOnSecurity
    publishedDate: '2026-05-19'
    company: CISA
    eventType: incident
    fetchVerified: true
    keyPoints:
    - Nightwing 的一名承包商维护了一个名为 “Private-CISA” 的公开 GitHub 仓库，里面含有 3 个 AWS GovCloud 账户的管理员凭证、数十个 CISA 内部系统的明文密码，以及机构代码构建用的 artifactory token。
    - GitGuardian 通过公开仓库自动扫描发现了这次暴露；而这名承包商明确关闭了 GitHub 内置的 secret detection 功能，并且从 2025 年 11 月起就一直在向这个仓库提交。
    - 安全顾问 Philippe Caturegli 证实这些 AWS GovCloud 密钥在高权限层级上仍然有效；即便 CISA 已收到通知，它们在接下来的 48 小时里仍未失效。
    - 多个资源都用了“平台名 + 当年年份”的密码模式；而 CISA 当前的人手大约只剩 2025 年前的三分之二。
