jobsToBeDone:
- job: 当开发者或分包商把代码 push 到共享仓库时，帮我们的 DevSecOps 团队在仍然生效的政府关联凭证变成需要向机构上报的事件之前，就把它们抓住并收口，这样交付就不用因为一次火线处置停摆一周。
  currentAlternative: GitHub secret scanning 加人工事件协同
  successMetric: 从发现暴露 secret 到所有受影响账户确认撤销的时间
- job: 当审计方或机构客户追问我们如何控制一次凭证暴露时，帮项目安全经理尽快拿出完整的修复记录，不让问题拖慢 ATO 里程碑或合同续签。
