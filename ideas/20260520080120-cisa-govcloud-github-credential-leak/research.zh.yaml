  adoptionFrictionMatrix:
  - friction: 要把一次暴露的 secret 映射到正确的 AWS 账户、项目负责人和下游系统，本身就很难。
    severity: 高
    affectedBuyer: DevSecOps 与项目安全经理
    mitigation: 尽早接入 credential report、CloudTrail 和账户清单，让第一版先把爆炸半径说准，再谈自动轮换。
    sourceRefs:
    - 20
    - 41
    - 43
  - friction: 如果误报太高，直接阻断 push 反而会逼出开发者绕路。
    severity: 中
    affectedBuyer: 工程经理和开发者平台团队
    mitigation: 先从 monitor mode、窄 ruleset 和明确治理过的 bypass 路径开始，再慢慢打开更激进的 blocking。
    sourceRefs:
    - 16
    - 18
    - 95
  - friction: 老式静态凭证与 role assumption 并存，让一键修复变得复杂。
    severity: 高
    affectedBuyer: 云平台负责人
    mitigation: 不要假设客户有一套绿地身份栈，而要同时提供临时凭证 / OIDC 迁移 playbook 和遗留 key 轮换 runbook。
    sourceRefs:
    - 39
    - 81
    - 99
