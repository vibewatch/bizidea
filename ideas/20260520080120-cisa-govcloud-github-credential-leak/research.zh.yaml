competitors:
- name: GitHub Advanced Security
  stage: 现有厂商
  wedge: GitHub 内部的原生 secret scanning、push protection 与仓库治理。
  pricing: Secret Protection 为每名活跃提交者每月 $19；Code Security 为每名活跃提交者每月 $30
  strength: 对已经标准化在 GitHub Enterprise 上的团队来说，分发天然嵌入，采用摩擦也最低。
  weaknessVsUs: 它不会原生把 GovCloud 账户映射、承包商边界修复和联邦证据包做成一等工作流。
  sourceRefs:
  - 11
  - 15
  - 16
  - 95
- name: GitGuardian
  stage: 成长阶段
  wedge: 从外向内的公开暴露检测，加上内部仓库扫描与修复 playbook。
  pricing: 免费层支持最多 25 名开发者；商业版需联系销售
  strength: 公开 repo 监控很强，也长期在做 secret sprawl 的思想领导。
  weaknessVsUs: 对承包商项目映射、GovCloud 特定轮换和事件后审计打包的针对性还不够。
  sourceRefs:
  - 5
  - 7
  - 8
  - 93
  - 94
- name: Truffle Security / TruffleHog
  stage: 成长阶段
  wedge: 在 repo、存储和开发者工作流里做高信号 secret 扫描。
  pricing: 开源版免费；Enterprise 定制定价
  strength: 开发者采用度高，且能跨多类数据存储做广覆盖扫描。
  weaknessVsUs: 在受监管场景下，事件编排和面向客户的证据工作流掌控力更弱。
  sourceRefs:
  - 68
  - 69
- name: CyberArk
  stage: 现有厂商
  wedge: 做 secrets management、机器身份安全和特权访问治理。
  pricing: 企业定制定价
  strength: 在高权限凭证和机器身份控制上有很深的可信度。
  weaknessVsUs: 它的重心是凭证治理，不是公开 GitHub 泄漏分流和承包商特有的响应自动化。
  sourceRefs:
  - 75
  - 76
regulatoryTechnicalConstraints:
- point: 联邦承包商买方需要的是能回扣到安全软件开发、信息保护、事件响应和 CUI 要求的控制，不只是 scanner 告警。
  sourceRefs:
  - 53
  - 54
  - 55
  - 61
  - 62
- point: AWS 本身就建议用临时凭证和 role 替代长期 access key，所以产品既要支持遗留 key 清理，也要支持目标态身份现代化。
  sourceRefs:
  - 37
  - 39
- point: 要证明爆炸半径和修复已经完成，就离不开 CloudTrail 等账户遥测和 Access Analyzer 这类分析工具，因此集成深度不会低。
  sourceRefs:
  - 43
  - 49
validationSignals:
- point: 公开 GitHub 上的 secret 泄漏依然普遍，而且修得慢，这正支撑了核心紧迫性。
  sourceRefs:
  - 2
  - 3
- point: GitHub 一边在卖面向政府的软件开发方案，一边把 secret protection 当付费增购，说明买方预算和平台基线都已经存在。
  sourceRefs:
  - 11
  - 13
- point: AWS 持续维护 GovCloud 和公共部门伙伴生态，这既能验证滩头市场，也能成为部署渠道。
  sourceRefs:
  - 31
  - 35
  - 37
openQuestions:
- 有多少目标承包商仍在公开或混合可见性的 GitHub repo 里跑着会碰到 GovCloud 或机构相邻系统的流程？
- 真实事件里，长期 AWS key 仍占多大比例？构建 token、制品库凭证或其他非云类 secret 又占多少？
- 首批客户会买纯软件，还是希望在总包与分包边界上配套服务式凭证映射？
- secret 暴露后，机构或总包到底多常要求正式证据包，而不是内部私下修完就算？
