scenarios:
  downside:
    description: 联邦采购周期拉长，更多 onboarding 持续偏服务化，而且公司拿下的多项目扩张少于计划。
    y3RevenueK: 930.0
    y3EbitdaK: -820.0
    cashLowPointK: -140.0
    keyAssumptionChanges:
    - Q4Y3 客户数只能到 15 家，而不是 20 家。
    - 由于 pilot 转生产更少、扩张更小，混合退出 ACV 停在约 $68K。
    - 因为映射和修复支持长期依赖人工，毛利率只能到 70%。
  base:
    description: 公司把由 incident 带来的 pilot 转成客户，到 Q4Y3 做到 20 家付费承包商，同时控制招聘节奏，并把大多数扩张留在原承包商账户内部。
    y3RevenueK: 1275.0
    y3EbitdaK: -530.5
    cashLowPointK: 293.6
    keyAssumptionChanges:
    - 与 A1-A21 一致，包括 M12 达到 6 家付费机构、Q4Y2 达到 12 家、Q4Y3 达到 20 家。
    - 采用 $24K pilot、约 $60K 首次生产 ACV，以及约 $76.8K 混合退出 ACV 的梯度。
    - 随着 onboarding 和证据工作流越来越可复制，毛利率从 Y1 的 60.7% 爬升到 Y3 的 75.1%。
  upside:
    description: 共创客户证明成立，再叠加 AWS 渠道帮助，转化被提前拉动，公司因此拿到更多扩张部署，而运营开支并没有明显变重。
    y3RevenueK: 1540.0
    y3EbitdaK: -340.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
    - 由于伙伴辅助 pipeline 从 Y2 开始起作用，Q4Y3 客户数能到 24 家，而不是 20 家。
    - 更多账户会加购证据、自动化和多项目覆盖，混合退出 ACV 抬到约 $82K。
    - onboarding 更标准化、创始人亲自处理的例外更少，毛利率能做到 78%。
