modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Assessments[评估 / incident] --> Pilots[付费 pilot]
      Pilots --> Production[年度部署]
      Production --> Expansion[更多 repo + 账户 + 证据工作流]
      Expansion --> Revenue[订阅 + 用量收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金 / 跑道]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入，靠的是把 incident / audit pilot 转成年费订阅，再在同一承包商内部不断加仓库和账户覆盖。
- checkName: 必须成立的条件
  finding: Pilot 转生产必须接近计划中的 50%+，而且扩张要在 12 个月内发生，否则创始人主导销售会跑得比经常性收入还快。
- checkName: 模型会失效的情况
  finding: 最大的现金风险是联邦采购更慢、同时 onboarding 更偏服务化；这两个因素一叠加，下行情景会在下一轮融资前跌到零以下。
- checkName: 下一轮融资证明点
  finding: 最清晰的下一轮融资证明，是到 Q4Y2 做到 12 家付费承包商，并至少拿下 3 个已经扩到单项目之外的生产部署，同时证明伙伴辅助 onboarding 能工作。
sanityChecks:
  ruleOf40: Y3 增长 89.7% + EBITDA 利润率 -41.6% = 48.1%；对一家仍处早期的安全 SaaS 来说，方向上可以接受。
  burnMultiple: Y1 的 burn multiple 约为 1.8x，对应约 $0.43M 的退出 ARR；Y2 在退出 ARR 升至约 $0.88M 后降到约 1.6x；Y3 则改善到约 0.8x，对应约 $1.54M 的退出 ARR。
  revenuePerFte: 按 Q4Y3 人数口径，Y3 每名 FTE 对应约 $255K 的已确认收入；若按退出 ARR 口径，则约为 $307K（SaaS 基准为 $200-400K）。
  flags:
  - 研究得到的第 3 年 SOM 本身偏窄，所以基准情形里的 20 家客户，其实已经假设公司吃下了早期 GovCloud 承包商切口的大部分份额。
  - 公司到 Y3 仍然 EBITDA 为负，因此除非转化速度或扩张收入明显跑赢基准，否则大概率还要再融一轮。
  - 招聘计划刻意保持精简，这意味着创始人销售和伙伴辅助 onboarding 必须跑得比一般联邦安全软件更顺。
