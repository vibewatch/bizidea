slug: govcloud-secret-quarantine-rail
date: '2026-05-20'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: 从 2026-05-20 business-plan 日期后的第一个完整月份开始。
- id: A2
  name: 期初现金与 pre-seed 规模
  value: '2300.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk.runwayMonths 18] 基准情形采用区间低端的 $2.3M pre-seed，融资规模以跑到 Q4Y2 证明点并额外保留约 6 个月缓冲为准。'
- id: A3
  name: 起始客户数（M1）
  value: '0'
  unit: organizations
  source: '[BP investorMemo.firstCustomer.initialContract + BP milestones 0-12 months] 公司从零收入起步，必须先卖出 assessment 和 pilot。'
- id: A4
  name: Y1 客户爬坡
  value: 到 M12 有 6 家付费机构，首个付费 pilot 在 M4
  unit: organizations
  source: '[BP milestones 0-12 months + BP experimentRoadmap 0-90 days] 锚定首年 5–8 个付费 pilot，以及至少 3 个 pilot 转生产。'
- id: A5
  name: Y2 客户爬坡
  value: Q1Y2 为 7 家、Q2Y2 为 8 家、Q3Y2 为 10 家、Q4Y2 为 12 家付费机构
  unit: organizations
  source: '[BP milestones 12-24 months + BP gtm.funnelTargets] 假设转化节奏温和，且先出现第一批多项目扩张，而不是全面放大 GTM。'
- id: A6
  name: Y3 客户爬坡
  value: Q1Y3 为 14 家、Q2Y3 为 16 家、Q3Y3 为 18 家、Q4Y3 为 20 家付费机构
  unit: organizations
  source: '[BP market.som + research market.som] 让基准情形与研究里的第 3 年 SOM 对齐，即约 20 家承包商客户。'
- id: A7
  name: 定价梯度
  value: 90 天付费 pilot 为 $24K，首年生产 ACV 约 $60K，退出时混合 ACV 约 $76.8K
  unit: usdK_per_customer_year
  source: '[BP investorMemo.firstCustomer.initialContract + research willingnessToPay] 采用 $20K-$40K pilot 区间的下半段，以及落在 $60K-$150K 年度部署区间内的生产定价。'
- id: A8
  name: Y1 已实现收入节奏
  value: M4-M5 为 $8K，M6-M7 为 $16K，M8-M9 为 $20K，M10 为 $28K，M11 为 $32K，M12 为 $36K
  unit: USDK_per_month
  source: '[BP milestones 0-12 months + A7] 收入体现的是付费 pilot 与首批生产部署的组合，而不是从第一天起就拿到全年订阅。'
- id: A9
  name: Y2 已实现季度收入
  value: Q1Y2 为 $120K，Q2Y2 为 $150K，Q3Y2 为 $183K，Q4Y2 为 $219K
  unit: USDK_per_quarter
  source: '[BP milestones 12-24 months + BP businessModel.expansionLevers] 增长来自 pilot 转化、更多仓库，以及同一承包商内部更多被映射的 GovCloud 账户。'
- id: A10
  name: Y3 已实现季度收入
  value: Q1Y3 为 $255K，Q2Y3 为 $297K，Q3Y3 为 $339K，Q4Y3 为 $384K
  unit: USDK_per_quarter
  source: '[BP market.som + research market.som + A7] 约 $1.54M 的退出 ARR 只比研究里的 $1.2M SOM 略高，因为后期季度收入除了 logo 数，还计入了扩张收入。'
- id: A11
  name: 毛利率爬坡
  value: Y1 为 60.7%，Y2 为 71.5%，Y3 为 75.1%，其中 Q4Y3 为 76.0%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 75 + BP operatingAssumptions one-program onboarding with light services] 早期映射和证据工作会压低毛利，之后靠可复制的 playbook 把业务拉向目标毛利。'
- id: A12
  name: 用于单位经济模型的月度 logo 流失率
  value: '1.2'
  unit: percent
  source: '[Startup-finance heuristic] 走年度合同的联邦安全软件，流失理应低于 SMB SaaS；但这个切口还早，也暴露在平台挤压下。'
- id: A13
  name: 稳态 CAC
  value: '42.0'
  unit: USDK_per_customer
  source: '[BP gtm.channels + BP gtm.funnelTargets + research categoryDynamics.headwinds] 创始人主导的安全销售、pilot，以及联邦采购周期，都足以让 CAC 高于 PLG SaaS。'
- id: A14
  name: 含负担的薪酬带
  value: 创始人 150；创始工程师 190；解决方案工程师 155；安全工程师 180；GTM 负责人 165
  unit: annualK_per_FTE
  source: '[BP team + startup-finance heuristic] 假设团队要招高级安全人才，但 pre-seed 现金薪酬仍保持精简。'
- id: A15
  name: 招聘节奏
  value: 解决方案工程师在 M4 入职，安全工程师在 M7 入职，GTM 负责人在 Q4Y2 入职
  unit: timing
  source: '[BP team + BP strategicChoices.sequencingRationale] 先把交付和产品打磨跑通，再上专职 GTM；后者只会在首批生产证明出来后启动。'
- id: A16
  name: 人数终点
  value: Q1Y1 为 2 名 FTE，Q2Y1 为 3 名，Q3Y1 为 4 名，Q4Y2 为 5 名，Q4Y3 仍为 5 名
  unit: FTE
  source: '[BP team + BP fundingAsk] 让公司在 pre-seed 阶段保持足够精简，同时还能覆盖创始人销售、onboarding、产品、安全工程和 1 个 GTM 岗位。'
- id: A17
  name: 非薪酬运营支出方法
  value: 云、差旅、合规、保险和法务支出保持精简，不配置大规模服务团队
  unit: policy
  source: '[BP operations + startup-finance heuristic] 模型假设交付以软件为先，边角案例靠伙伴补位，而不是养一支重咨询的实施团队。'
- id: A18
  name: 现金流简化假设
  value: 期末现金 = 期初现金 + 累计 EBITDA
  unit: formula
  source: '[Startup-finance heuristic] 假设这家早期软件公司不存在明显的营运资金波动、资本开支、债务或递延收入扭曲。'
- id: A19
  name: 融资规模规则
  value: 融资金额以跑到 Q4Y2 里程碑并保留约 6 个月现金缓冲为准
  unit: policy
  source: '[BP fundingAsk.runwayMonths 18 + model requirement] 基准情形把标注的 18 个月目标，延长成“里程碑 + 缓冲”的融资口径。'
- id: A20
  name: 下行情景参数变化
  value: Q4Y3 客户数 15 家，退出 ACV 约 $68K，毛利率 70%，销售周期拉长到接近 9 个月
  unit: scenario_inputs
  source: '[BP risks + research sensitivityCases] 覆盖采购拖延、onboarding 更偏服务化，以及原生平台竞争更强这三类压力。'
- id: A21
  name: 上行情景参数变化
  value: Q4Y3 客户数 24 家，退出 ACV 约 $82K，毛利率 78%，伙伴辅助部署会把转化大致提前 1 个季度
  unit: scenario_inputs
  source: '[BP experimentRoadmap + BP milestones 24-36 months] 上行情景假设 AWS 伙伴打法成立，且不用额外大幅扩招。'
