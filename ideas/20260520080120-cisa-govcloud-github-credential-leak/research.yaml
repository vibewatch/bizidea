      - 75
    threatOfEntrants:
      score: 3
      rationale: It is feasible for new entrants to build on existing GitHub and AWS controls, but packaging those controls into contractor-ready remediation and evidence workflows still requires meaningful product and services know-how.
      sourceRefs:
      - 15
      - 37
      - 53
    threatOfSubstitutes:
      score: 4
      rationale: Native GitHub controls, Truffle-style scanners, and CyberArk-class secrets platforms can each solve part of the problem, even if none cleanly owns the incident-response wedge.
      sourceRefs:
