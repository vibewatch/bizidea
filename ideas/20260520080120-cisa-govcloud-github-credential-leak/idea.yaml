topRisks:
  - name: Narrow procurement niche
    description: Federal contractor security is a valuable but specialized market that may grow slower than commercial DevSecOps categories.
    mitigation: Start in the contractor beachhead, then expand the same response layer into defense, critical infrastructure, and other regulated cloud operators.
  - name: Platform overlap
    description: GitHub, GitGuardian, or major vault vendors could add more automated remediation for leaked secrets.
    mitigation: Differentiate on GovCloud account mapping, contract-boundary workflows, and audit evidence generation rather than raw detection alone.
  - name: Integration complexity
    description: Contractors often run fragmented repos, identity systems, and cloud accounts that make automated rotation difficult at deployment time.
    mitigation: Begin with read-only discovery and a limited set of supported GitHub and GovCloud playbooks, then expand coverage through services-assisted onboarding.
