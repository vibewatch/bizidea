differentiator: >-
  Traditional secret scanners tell teams that something sensitive was committed.
  This company would own the higher-value workflow after discovery: contract- and
  environment-aware quarantine, rotation orchestration, and proof that exposed
  government credentials were actually contained. Its moat can compound through a
  proprietary graph linking repositories, cloud accounts, programs,
  subcontractors, and remediation steps unique to government delivery
  environments.
