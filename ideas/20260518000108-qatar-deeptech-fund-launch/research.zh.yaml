competitors:
- name: Intapp DealCloud
  stage: incumbent
  wedge: 面向私募资本机构的可配置交易和关系智能平台。
  pricing: 定制企业定价 / 演示驱动销售。
  strength: 强大的可审计性、关系管理和面向投资团队的工作流灵活性。
  weaknessVsUs: 未见专为卡塔尔本地化审核、影响力门控或主权联合投资打包而设计的可见功能。
  sourceRefs:
  - 32
- name: Affinity
  stage: scale-up
  wedge: 面向加速器、孵化器和交易团队的关系智能及创业群体/投资人工作流软件。
  pricing: 定制/演示驱动定价。
  strength: 自动捕获邮件和会议记录，帮助组织创始人、导师和投资人。
  weaknessVsUs: 公开产品叙事围绕关系工作流，而非本地化尽调、影响力证据或主权投委会包。
  sourceRefs:
  - 33
- name: Dynamo Software
  stage: incumbent
  wedge: 覆盖交易管理、募资、投资组合监控和基金核算的全周期风险投资与另类资产平台。
  pricing: 定制企业定价 / 演示驱动销售。
  strength: 广泛的单栈覆盖和面向风险投资机构的可配置模块。
  weaknessVsUs: 对于专注于投前资质审核而非完整后台替换的精简公共创新团队而言，可能功能过剩。
  sourceRefs:
  - 35
- name: DealRoom
  stage: scale-up
  wedge: 具有精细权限和 AI 辅助文件分析的协作尽调室和并购工作流平台。
  pricing: 按交易量定价；用户不限；定制方案请联系销售。
  strength: 强大的安全数据室能力和多方尽调协作问答。
  weaknessVsUs: 解决文件协作问题，但不负责上游判断——即在文件共享之前，一家创业公司是否符合卡塔尔资质且已通过影响力审核。
  sourceRefs:
  - 37
  - 38
  - 47
regulatoryTechnicalConstraints:
- point: QSTP 要求被投公司在卡塔尔注册总部并开展本地运营，且须有参与 VC 投资人，因此产品必须证明的不只是通用创业公司画像。
  sourceRefs:
  - 1
  - 2
- point: QFC 引入了独立的运营和数据保护层，包括 2021 年 QFC 数据保护法规。
  sourceRefs:
  - 10
  - 11
  - 12
  - 67
- point: 联合投资工作流要求安全的文件共享、权限和适合外部投资人及敏感尽调材料的可审计性。
  sourceRefs:
  - 37
  - 38
  - 47
- point: 影响力证据应按公认的投资标准结构化，而非随意的叙事备忘录。
  sourceRefs:
  - 39
  - 40
validationSignals:
- point: Startup Qatar 在上线六天内就展示了强烈的漏斗顶部参与：3000+ 次访问、100+ 份 QFC 注册和 150+ 份申请。
  sourceRefs:
  - 5
- point: Startup Qatar 首批投资队列吸引了近 2000 份申请，最终遴选 11 家公司获得资金和资源支持。
  sourceRefs:
  - 6
- point: QSTP 表示其首期基金已向 150+ 家创业公司部署了 $20M+ 资金，说明新基金周围已存在成熟的机构创业投资经验。
  sourceRefs:
  - 1
- point: 可比的 GCC 公共创新和风险支持平台已在阿布扎比、沙特、迪拜、阿曼和沙特主权资本网络运营。
  sourceRefs:
  - 24
  - 26
  - 28
  - 29
  - 30
  - 31
  - 65
openQuestions:
- QSTP TVF 和卡塔尔相邻创业项目每年实际的交易审查量和投委会节奏是多少？
- "谁拥有这套工作流的预算和采购权：投资、平台、IT 还是上级公共机构？"
- 备忘录、尽调请求和联合投资方共享需要多大程度的阿拉伯语-英语双语输出？
- 在 QFC 路线之外，适用哪些卡塔尔大陆隐私和数据本地化义务？
- 具名联合投资方会在共享主权托管尽调室内工作，还是继续要求各自独立的工作流系统？
