  fiveForces:
    supplierPower:
      score: 2
      rationale: 核心投入是商品化软件基础设施加标准和安全共享集成；没有任何单一上游供应商能向细分工作流供应商施压。
      sourceRefs:
      - 38
      - 39
      - 40
    buyerPower:
      score: 4
      rationale: 初始买家群体规模小、高度集中，且通常与公共部门相邻，这赋予每个账户在采购、安全审查和产品塑造方面强大的议价筹码。
      sourceRefs:
      - 1
      - 20
      - 24
      - 26
      - 67
    threatOfEntrants:
      score: 3
      rationale: 软件本身可以构建，但信任、本地流程知识以及与主权基金工作流的集成，构成了超越通用 CRM 配置的一定壁垒。
      sourceRefs:
      - 32
      - 33
      - 35
      - 39
      - 40
    threatOfSubstitutes:
      score: 4
      rationale: 很多买家可以拼凑 Startup Qatar 或 QFC 门户、电子表格、数据室和通用工作管理软件，而不是购买新平台。
      sourceRefs:
      - 20
      - 32
      - 37
      - 42
      - 43
    competitiveRivalry:
      score: 3
      rationale: 相邻竞争有实质意义，多个现有厂商覆盖了部分工作流，但针对卡塔尔特定主权资质的直接正面竞争目前有限。
      sourceRefs:
      - 32
      - 33
      - 35
      - 37
  pestle:
  - factor: political
    impact: positive
    point: 卡塔尔通过 Invest Qatar、Startup Qatar 和 QSTP 明显在推动创业公司吸引和深科技生态系统建设。
    sourceRefs:
    - 4
    - 6
    - 57
  - factor: economic
    impact: neutral
    point: 需求信号真实，但预算集中度仍高——近期支出主要由少数公共资本机构驱动。
    sourceRefs:
    - 1
    - 6
    - 24
    - 26
  - factor: social
    impact: positive
    point: 国际创始人兴趣明显，创业项目、居留支持和 Web Summit Qatar 等高知名度活动均有助推。
    sourceRefs:
    - 5
    - 6
    - 23
  - factor: technological
    impact: positive
    point: 风险投资 CRM、安全尽调室和文件共享工具的支撑技术栈已经成熟，降低了产品开发风险。
    sourceRefs:
    - 32
    - 35
    - 37
    - 38
  - factor: legal
    impact: negative
    point: 数据保护和运营规则带来真实的合规复杂性，尤其是在涉及 QFC 架构的情况下。
    sourceRefs:
    - 11
    - 12
    - 67
  adoptionFrictionMatrix:
  - friction: 初始买家宇宙极小
    severity: high
    affectedBuyer: GCC 公共创新基金的管理总监或投资负责人
    mitigation: 从第一天起就将产品和定价设计为面向 GCC 扩张，而非仅限卡塔尔的路线图。
    sourceRefs:
    - 24
    - 26
    - 28
    - 30
    - 31
    - 65
  - friction: 公共采购、安全和数据治理审查
    severity: high
    affectedBuyer: 基金运营负责人和 IT/安全审查人员
    mitigation: v1 优先引入安全数据室集成、清晰的数据处理边界和最小化敏感数据存储。
    sourceRefs:
    - 10
    - 11
    - 37
    - 67
  - friction: 本地化、双语工作流和实体专属流程映射
    severity: medium
    affectedBuyer: 协调创始人和本地合作方的项目经理
    mitigation: 按路线（QSTP、QFC、Startup Qatar）提供可配置模板，而非从头提供定制咨询。
    sourceRefs:
    - 8
    - 21
    - 23
    - 67
  - friction: 联合投资方在主权托管工作流之外的参与
    severity: medium
    affectedBuyer: 协调外部 VC 合作方的投资主管
    mitigation: 支持可导出的备忘录、结构化证据包和可选外部数据室权限，而非强制接入同一门户。
    sourceRefs:
    - 1
    - 37
    - 38
    - 63
