assumptions:
  - id: A1
    name: Model start month
    value: '2026-06'
    unit: month
    source: "[BP date] First full month after the 2026-05-18 business-plan date."
  - id: A2
    name: Opening cash after pre-seed close
    value: '2000'
    unit: USDK
    source: "[BP fundingAsk] Model uses the low end of the stated $2-3M pre-seed range."
  - id: A3
    name: Paid pilot package
    value: '$20K over 4 months'
    unit: usdK_per_pilot
    source: "[BP gtm.pricing and investorMemo.firstCustomer.initialContract] Pilot midpoint within the stated $15k-25k range."
  - id: A4
    name: Production account annual revenue
    value: '$50.4K per live fund account'
    unit: usdK_per_account_year
    source: "[BP gtm.pricing, BP market.som, Research market.som] Modeled as roughly $45K base subscription plus about $5.4K annual usage fees, consistent with the ~$50K year-3 SOM case."
  - id: A5
    name: Customer ramp
    value: '2 paying accounts by M12, 3 by Q4Y2, and 5 by Q4Y3'
    unit: accounts
    source: "[BP milestones and Research market.som] Matches one Qatar proof point, one GCC peer by Y2, and 5 live accounts by year 3."
  - id: A6
    name: Gross margin
    value: '70%'
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] Base case holds the stated steady-state target."
  - id: A7
    name: CAC per production account
    value: '$60K'
    unit: usdK_per_account
    source: "[BP gtm.funnelTargets and Research reportMemo buyerPower] Startup-finance heuristic for founder-led selling into concentrated public-sector-adjacent buyers with procurement review."
  - id: A8
    name: Monthly churn
    value: '1.5%'
    unit: percent
    source: "Startup-finance heuristic for sticky annual workflow software with small buyer count but unproven long-term retention."
  - id: A9
    name: Base sales cycle
    value: '6 months'
    unit: months
    source: "[BP operatingAssumptions and risks] Anchored to the assumption that security and procurement can stay within one budget cycle."
  - id: A10
    name: Loaded salary bands
    value: 'Founder $84K; engineering $132K; fund operations $96K; solutions $120K; partnerships $114K; G&A $72K'
    unit: usdK_per_fte_year
    source: "Startup-finance heuristic for a lean Qatar/GCC pre-seed team, anchored to the specific roles in [BP team]."
  - id: A11
    name: Headcount snapshots
    value: 'Founder 1/1/1/1/1/1; engineering 1/1/1/1/2/2; fund operations 1/1/1/1/1/1; solutions 0/1/1/1/1/1; partnerships 0/0/0/1/1/1; G&A 0/0/0/0/0/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3'
    unit: fte
    source: "[BP team and strategicChoices.sequencingRationale] Founder-led sales persists through the first two deployments, with only cautious post-proof hiring."
  - id: A12
    name: Year-1 functional opex
    value: 'Q1Y1 $35K per month, Q2-Q3Y1 $48K per month after solutions hire, and Q4Y1 $60K per month after partnerships hire'
    unit: usdK_per_month
    source: "Startup-finance heuristic for cloud, travel, legal/security review, and software spend layered on top of the BP hiring plan."
  - id: A13
    name: Year-2 and year-3 opex discipline
    value: 'Y2 opex steps from $149K to $174K per quarter; Y3 opex steps from $176K to $193K per quarter'
    unit: usdK_per_quarter
    source: "[BP strategicChoices.notYet and BP milestones] Keeps spend disciplined until GCC repeatability is proven and avoids premature scaling."
  - id: A14
    name: Revenue recognition convention
    value: 'Paid pilots recognize $5K monthly; live production accounts recognize $12.6K per quarter'
    unit: usdK
    source: "Derived from A3-A5 so revenue reconciles to the account ramp and the ~$50K steady-state annual revenue per account."
  - id: A15
    name: Cash roll-forward convention
    value: 'Ending cash equals opening cash plus EBITDA'
    unit: policy
    source: "Startup-finance heuristic for an early software company with immaterial capex, debt, and working-capital swings."
  - id: A16
    name: Downside scenario inputs
    value: 'Steady-state revenue/account falls to $45K, sales cycle stretches to 9 months, and gross margin stays at 65%'
    unit: scenario_inputs
    source: "[BP risks and Research adoptionFrictionMatrix] Mirrors the main procurement, narrow-market, and services-risk concerns."
  - id: A17
    name: Upside scenario inputs
    value: 'A second GCC peer lands 2 quarters earlier, effective annual revenue/account rises to $55K, and gross margin reaches 72%'
    unit: scenario_inputs
    source: "[BP milestones and Research geographicConsiderations] Upside assumes the Qatar template transfers cleanly to a GCC peer."
  - id: A18
    name: Quarterly payroll smoothing
    value: 'Y2 and Y3 salary expense uses the last visible headcount snapshot until the next planned hire rather than adding step-function payroll every quarter'
    unit: method
    source: "[Financial modeler instructions] Required smoothing convention for quarterly salary lines."
