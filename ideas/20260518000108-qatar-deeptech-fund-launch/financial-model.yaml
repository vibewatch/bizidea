scenarios:
  downside:
    description: Slower procurement delays the GCC peer win and keeps effective annual revenue per account closer to the low end of willingness to pay.
    y3RevenueK: 176.4
    y3EbitdaK: -623.0
    cashLowPointK: -40.0
    keyAssumptionChanges:
      - Sales cycle stretches from 6 months to 9 months.
      - Effective annual revenue per live account settles near $45K.
      - Gross margin stalls at 65% because implementation remains too bespoke.
  base:
    description: The company lands two paid pilots in year 1, converts one into production, adds one GCC peer by year 2, and reaches 5 live accounts by Q4Y3.
    y3RevenueK: 226.8
    y3EbitdaK: -570.2
    cashLowPointK: 332.1
    keyAssumptionChanges:
      - Paid pilots price at $20K and convert into about $50K effective annual production accounts.
      - Gross margin reaches the BP target of 70% once templates are reusable.
      - Hiring stays lean until the third live account is in production.
  upside:
    description: Qatar proof converts faster, one additional GCC peer comes in early, and the workflow stays productized enough to support slightly higher account value.
    y3RevenueK: 277.2
    y3EbitdaK: -500.0
    cashLowPointK: 410.0
    keyAssumptionChanges:
      - A second GCC peer lands 2 quarters earlier than base case.
      - Effective annual revenue per live account rises to about $55K through usage and template-library upsell.
      - Gross margin reaches 72% because implementation effort stays tightly templated.
