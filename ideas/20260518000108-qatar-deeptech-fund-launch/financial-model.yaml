    cashImpactK: -15.9
  - variable: CAC
    downsideCase: "$75K CAC because procurement and design work stay founder-heavy"
    baseCase: "$60K CAC"
    upsideCase: "$45K CAC after one Qatar reference shortens selling"
    y3RevenueImpactK: -12.6
    cashImpactK: -45.0
  - variable: churn
    downsideCase: "2.5% monthly churn if fund budgets are not renewed"
    baseCase: "1.5% monthly churn"
    upsideCase: "1.0% monthly churn with sticky annual workflow adoption"
    y3RevenueImpactK: -12.6
    cashImpactK: -8.8
  - variable: sales cycle
    downsideCase: "9 months because security and procurement exceed one budget cycle"
    baseCase: "6 months"
    upsideCase: "4 months after the first production proof point"
    y3RevenueImpactK: -25.2
    cashImpactK: -52.0
  - variable: gross margin
    downsideCase: "65% because implementations stay too services-heavy"
    baseCase: "70%"
    upsideCase: "72% after template reuse improves"
    y3RevenueImpactK: 0.0
    cashImpactK: -11.3
  - variable: hiring pace
    downsideCase: "Add G&A and a second solutions hire 2 quarters earlier than planned"
    baseCase: "Keep hiring flat until the third live account is in production"
    upsideCase: "Defer the G&A hire until after the next financing"
    y3RevenueImpactK: 0.0
    cashImpactK: -90.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionAccounts
      ProductionAccounts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from only 5 live sovereign-fund accounts at roughly $50K effective annual revenue by Q4Y3, so account conversion matters more than broad top-of-funnel volume.
  - checkName: Must go right
    finding: One Qatar pilot has to convert into a referenceable production workflow quickly enough to unlock a GCC peer by year 2 because the Qatar-only market ceiling is too low.
  - checkName: Model breaks if
    finding: If procurement stretches toward 9 months or gross margin stays near 65%, the downside case turns cash negative before the company proves a 5-account network.
  - checkName: Next-round proof
    finding: The cleanest next-round milestone is 3 live accounts plus a reusable GCC template set that shows implementation is still software-led rather than disguised consulting.
sanityChecks:
  ruleOf40: "Y3 growth 63.6% + EBITDA margin -251.4% = -187.8%"
  burnMultiple: "Y3 burn multiple 6.5x (-$570.2K EBITDA against $88.2K net new revenue versus Y2)."
  revenuePerFte: "$32K Y3 on 7 year-end FTE (benchmark $200-400K SaaS)."
  flags:
    - "Revenue per FTE stays far below software benchmarks because the researched year-3 SOM is only about $0.25M."
    - "The base case still burns heavily in year 3, so the company needs GCC expansion beyond 5 accounts or materially higher ACV to justify venture-style follow-on financing."
    - "The model assumes procurement and security review can stay near 6 months; if they slip, cash can go negative before the next fundraise."
    - "Gross margin reaches target only if the workflow remains template-led and does not become a bespoke fund-operations service."
