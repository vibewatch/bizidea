jobsToBeDone:
  - job: 当一家深科技创业公司申请我们的新基金时，帮助我们的投资团队判断其是否符合卡塔尔资质且已具备联合交易就绪条件，让我们无需数周的手工往返就能形成确信建议
    currentAlternative: 邮件往来、分析师电子表格、外部法律顾问和通用 CRM 备注
    successMetric: 从收到申请到形成投委会建议的天数
  - job: 当我们引入外部 VC 合作方联合投资一笔交易时，帮助我们共享一套可信的影响力和商业就绪证据包，让他们能基于相同事实更快做出承诺
    currentAlternative: 重新撰写的备忘录、临时数据室和每个合作方各自发出的尽调请求
    successMetric: 从主导基金形成确信到联合投资方做出承诺的时间
