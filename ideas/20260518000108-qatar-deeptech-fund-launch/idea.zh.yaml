topRisks:
  - name: 初始市场过窄
    description: 首批买家集中在少数主权支持基金，这可能让这一品类看起来过于小众。
    mitigation: 从卡塔尔扩展至其他面临相同本地化和联合交易工作流挑战的 GCC 及新兴市场公共创新基金。
  - name: 上手交付服务负担过重
    description: 早期客户可能期望定制化流程设计，因为每个基金都有各自的投委会规则和政策语言。
    mitigation: 围绕可配置的尽调模板和共享联合投资方数据室模式将首次落地产品化，而非提供定制咨询。
  - name: 政策依赖风险
    description: 若本地资本授权或总部规则发生变化，切口背后的紧迫感可能减弱。
    mitigation: 将产品构建在更广泛的本地内容、影响力和联合投资打包要求上，即便某个项目政策改变，这些要求在不同司法管辖区仍会持续存在。
