problem: >-
  主权支持深科技基金不只是在审核团队和产品——它们还必须核验本地总部合规性、政策契合度、可衡量的影响力，以及外部 VC 能否基于相同事实联合进入。精简的基金团队通常靠邮件线程、通用 CRM、顾问备忘录和外部法律顾问完成这一切，导致每笔交易都像一次性定制，既慢又难复制。结果就是创始人失去势头、联合交易质量变差，能真正通过本地资本准入门槛的创业公司越来越少。
targetUser:
  primary: 正在启动深科技联合投资项目的 GCC 主权创新基金投资主管，项目要求被投公司以卡塔尔为总部
  secondary: 与 GCC 公共创新基金合作的全球种子基金投资组合平台团队
  buyer: 主权支持创新基金的管理总监或投资负责人
startupThesis:
  nonObviousInsight: >-
    这个市场真正稀缺的不是原始资本，而是能快速让一家创业公司"卡塔尔可投"的能力——快到足以让主权基金和外部 VC 同意同一笔交易。一旦总部合规性、影响力证明和国家战略契合度成为门控因素，基金运营就从一次性咨询变成了可重复的软件问题。
  beachhead: >-
    正在评估首批 10–30 个卡塔尔总部深科技交易的 GCC 公共创新基金和科技园——这些交易在签署 term sheet 前需完成本地注册、影响力和联合投资方就绪审核。
  wedge: >-
    一套联合投资工作流：将单份创业公司档案转化为卡塔尔总部合规包、影响力基准，以及附带共享尽调室的合作方就绪联合备忘录。
  whyNowCatalyst: >-
    QSTP 的基金成立、具名联合投资方、影响力审核视角和卡塔尔总部要求，共同制造了立竿见影的压力——基金必须标准化如何审核本地深科技创业公司并将其打包给外部资本。
  ventureScalePath: >-
    从卡塔尔主权深科技基金起步，逐步扩展至自由区、公共风险投资项目、发展融资工具，以及 MENA、东南亚和非洲全都需要本地内容、影响力和联合投资就绪工作流的企业风险投资部门。
solution: >-
  产品嵌入创业公司申请受理与合作方承诺之间。它摄入 pitch deck、股权结构表、主体材料和影响力材料，生成本地总部合规性、政策契合度、目标影响力指标和商业尽调缺口的标准化视图。投资团队用它分配条件、请求缺失证据，并向联合投资方发布一份共享数据室加备忘录——而非针对每个合作方重写交易。创始人看到的是成为卡塔尔合格被投方的具体清单；基金团队则获得流水线仪表板，清晰显示交易在本地化、影响力证明或联合交易哪个环节卡住。随时间推移，公司将构建深科技创业公司本地化速度、尽调通过率和从公共创新资本转向多投资方轮次的基准数据层。
goToMarketSeed:
  firstCustomer: >-
    一家刚成立的 GCC 公共创新基金，授权规模 2500 万至 1 亿美元，至少有两家外部 VC 联合投资方，且要求被投公司在卡塔尔建立或维持总部
  buyingTrigger: >-
    新基金成立或首个联合交易周期，迫使精简团队批量处理跨境创业公司的本地注册和影响力要求审核
  currentAlternative: 电子表格、通用 VC CRM、邮件、外部法律顾问和顾问撰写的影响力备忘录
  switchingReason: >-
    首个客户切换，是因为这款产品把本地化尽调、影响力核查和联合投资方打包三件事合并进一套工作流，而无需增加法律或平台人手
  pricingHypothesis: >-
    按基金收取年度平台订阅费，定价档次基于活跃审核中的交易数量，高级模块包含共享联合投资方数据室和影响力报告模板
