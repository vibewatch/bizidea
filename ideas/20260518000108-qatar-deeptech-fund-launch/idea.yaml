jobsToBeDone:
  - job: When a deep-tech startup applies for our new fund, help our investment team determine whether it is Qatar-eligible and syndication-ready, so we can reach a conviction decision without weeks of manual back-and-forth
    currentAlternative: Email chains, analyst spreadsheets, outside counsel, and generic CRM notes
    successMetric: Days from application received to investment committee recommendation
  - job: When we bring in outside VC partners on a deal, help us share one trusted evidence pack on impact and commercial readiness, so they can commit faster on the same facts
    currentAlternative: Rewritten memos, ad hoc data rooms, and separate diligence requests from each partner
    successMetric: Time from lead fund conviction to co-investor commitment
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Two verified sources confirm the fund launch, eligibility design, and named co-investor structure.
  painIntensity:
    score: 3
    rationale: The pain is real for lean fund teams, but it is operationally acute rather than existential on day one.
  wedgeClarity:
    score: 5
    rationale: Local-headquarters qualification plus co-investor packaging is a narrow workflow with a clear buyer and trigger.
  defensibility:
    score: 4
    rationale: The workflow can compound through fund-specific templates, partner-network data, and benchmarks on deal conversion and localization.
  ventureScale:
    score: 4
    rationale: The beachhead is narrow, but the same system can expand across public venture funds, development-finance programs, and cross-border private-market workflows.
topRisks:
  - name: Narrow initial market
    description: The first buyers are concentrated in a small set of sovereign-backed funds, which can make the category look niche.
    mitigation: Expand from Qatar into other GCC and emerging-market public innovation funds that face the same localization and syndication workflow.
  - name: Service-heavy onboarding
    description: Early customers may expect bespoke process design because each fund has its own committee rules and policy language.
    mitigation: Productize the first implementation around configurable diligence templates and shared co-investor room patterns instead of custom consulting.
  - name: Policy dependence
    description: If local funding mandates or HQ rules change, part of the urgency behind the wedge could weaken.
    mitigation: Build the product around broader local-content, impact, and co-invest requirements that persist across jurisdictions even when one program changes.
