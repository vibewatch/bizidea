problem: >-
  Sovereign-backed deep-tech funds in emerging hubs do not just underwrite team
  and product; they also have to verify local-headquarters readiness, policy
  fit, measurable impact, and whether outside VCs can co-invest on the same
  facts. Lean fund teams usually manage that with email threads, generic CRM,
  consultant memos, and outside counsel, which makes each deal feel bespoke and
  slow. The result is lost founder momentum, weaker syndication, and a smaller
  set of startups that can actually clear the bar for local deployment capital.
targetUser:
  primary: Investment principals at sovereign-backed Gulf innovation funds launching co-investment programs for locally headquartered deep-tech startups
  secondary: Portfolio platform teams at global seed funds partnering with GCC public innovation funds
  buyer: Managing director or head of investment at a sovereign-backed innovation fund
startupThesis:
  nonObviousInsight: >-
    The scarce asset in this market is not raw capital but the ability to make
    a startup "Qatar-investable" quickly enough for a sovereign fund and
    outside VCs to approve the same deal. Once headquarters eligibility, impact
    proof, and national-strategy fit become gating factors, fund operations turn
    into a repeatable software problem rather than a one-off advisory exercise.
  beachhead: >-
    GCC public innovation funds and science parks evaluating the first 10-30
    Qatar-headquartered deep-tech deals that require local HQ, impact, and
    co-investor readiness checks before term sheets
  wedge: >-
    A co-investment workflow that converts one startup dossier into a
    Qatar-headquarters eligibility pack, impact baseline, and partner-ready
    syndication memo with a shared diligence room
  whyNowCatalyst: >-
    QSTP's launch, named co-investors, impact lens, and Qatar-headquarters rule
    create immediate pressure to standardize how funds qualify local deep-tech
    startups and package them for outside capital.
  ventureScalePath: >-
    Start with sovereign-backed deep-tech funds in Qatar, then expand to free
    zones, public venture programs, development-finance vehicles, and corporate
    venture arms across MENA, Southeast Asia, and Africa that all need local
    content, impact, and co-invest readiness workflows.
solution: >-
  The product sits between startup application intake and partner commitment. It
  ingests deck, cap-table, entity, and impact materials, then generates a
  standardized view of local-headquarters readiness, policy alignment, target
  impact metrics, and commercial diligence gaps. Investment teams use it to
  assign conditions, request missing evidence, and publish one shared data room
  plus memo set to co-investors instead of rewriting the deal for each party.
  Founders see a concrete checklist for becoming Qatar-eligible, while fund
  teams get pipeline dashboards showing where deals stall on localization,
  impact proof, or syndication. Over time, the company builds the benchmark
  layer for how fast deep-tech startups localize, clear diligence, and convert
  from public innovation capital into multi-investor rounds.
goToMarketSeed:
  firstCustomer: >-
    A newly launched GCC public innovation fund with a $25 million to $100
    million mandate, at least two outside VC co-invest partners, and a rule
    that portfolio companies establish or maintain headquarters in Qatar
  buyingTrigger: >-
    A new fund launch or first syndication cycle forces a lean team to process
    a batch of cross-border startups against local HQ and impact requirements
  currentAlternative: Spreadsheets, generic VC CRM, email, external counsel, and consultant-written impact memos
  switchingReason: >-
    The first customer switches because this product collapses localization
    diligence, impact underwriting, and co-investor packaging into one workflow
    without requiring more legal or platform headcount
  pricingHypothesis: >-
    Annual platform subscription per fund, with pricing tiers based on active
    deals under review and premium modules for shared co-investor data rooms and
    impact reporting templates
