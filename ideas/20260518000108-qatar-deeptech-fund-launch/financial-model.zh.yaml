slug: deeptech-co-invest-rail
date: '2026-05-18'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-06'
    unit: month
    source: "[BP date] 2026-05-18 商业计划日期后的第一个完整月份。"
  - id: A2
    name: pre-seed 完成后期初现金
    value: '2000'
    unit: USDK
    source: "[BP fundingAsk] 模型取声明 $2–3M pre-seed 区间的低端值。"
  - id: A3
    name: 付费试点套餐
    value: '$20K over 4 months'
    unit: usdK_per_pilot
    source: "[BP gtm.pricing 和 investorMemo.firstCustomer.initialContract] 取声明 $15k–25k 区间的中间值。"
  - id: A4
    name: 生产账户年度收入
    value: '$50.4K per live fund account'
    unit: usdK_per_account_year
    source: "[BP gtm.pricing、BP market.som、Research market.som] 建模为约 $45K 基础订阅加约 $5.4K 年度使用费，与第 3 年 SOM 约 $50K 情景一致。"
  - id: A5
    name: 客户爬坡
    value: '2 paying accounts by M12, 3 by Q4Y2, and 5 by Q4Y3'
    unit: accounts
    source: "[BP milestones 和 Research market.som] 对应一个卡塔尔验证点、第 2 年一个 GCC 同类、第 3 年共 5 个活跃账户。"
  - id: A6
    name: 毛利率
    value: '70%'
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] 基础情景保持声明的稳态目标。"
  - id: A7
    name: 每生产账户 CAC
    value: '$60K'
    unit: usdK_per_account
    source: "[BP gtm.funnelTargets 和 Research reportMemo buyerPower] 适用于创始人主导销售进入采购流程严格的公共部门相邻买家的初创公司金融经验法则。"
  - id: A8
    name: 月流失率
    value: '1.5%'
    unit: percent
    source: "适用于年度工作流软件、买家数量少但长期留存未经验证情形的初创公司金融经验法则。"
  - id: A9
    name: 基础销售周期
    value: '6 months'
    unit: months
    source: "[BP operatingAssumptions 和 risks] 锚定于安全和采购能控制在一个预算周期内的假设。"
  - id: A10
    name: 含福利薪资区间
    value: 'Founder $84K; engineering $132K; fund operations $96K; solutions $120K; partnerships $114K; G&A $72K'
    unit: usdK_per_fte_year
    source: "适用于 [BP team] 中特定职位的精简卡塔尔/GCC pre-seed 团队的初创公司金融经验法则。"
  - id: A11
    name: 人员快照
    value: 'Founder 1/1/1/1/1/1; engineering 1/1/1/1/2/2; fund operations 1/1/1/1/1/1; solutions 0/1/1/1/1/1; partnerships 0/0/0/1/1/1; G&A 0/0/0/0/0/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3'
    unit: fte
    source: "[BP team 和 strategicChoices.sequencingRationale] 创始人主导销售贯穿前两次部署，验证后才谨慎招聘。"
  - id: A12
    name: 第 1 年各职能运营费用
    value: 'Q1Y1 $35K per month, Q2-Q3Y1 $48K per month after solutions hire, and Q4Y1 $60K per month after partnerships hire'
    unit: usdK_per_month
    source: "叠加在 BP 招聘计划之上的云端、差旅、法律/安全审查和软件支出的初创公司金融经验法则。"
  - id: A13
    name: 第 2 年和第 3 年运营费用纪律
    value: 'Y2 opex steps from $149K to $174K per quarter; Y3 opex steps from $176K to $193K per quarter'
    unit: usdK_per_quarter
    source: "[BP strategicChoices.notYet 和 BP milestones] 在 GCC 可重复性得到证明之前控制支出，避免过早规模化。"
  - id: A14
    name: 收入确认惯例
    value: 'Paid pilots recognize $5K monthly; live production accounts recognize $12.6K per quarter'
    unit: usdK
    source: "由 A3–A5 推导，使收入与客户爬坡和约 $50K 稳态年度收入对账。"
  - id: A15
    name: 现金滚动惯例
    value: 'Ending cash equals opening cash plus EBITDA'
    unit: policy
    source: "适用于资本支出、债务和营运资金波动均不重要的早期软件公司的初创公司金融经验法则。"
  - id: A16
    name: 下行情景输入
    value: 'Steady-state revenue/account falls to $45K, sales cycle stretches to 9 months, and gross margin stays at 65%'
    unit: scenario_inputs
    source: "[BP risks 和 Research adoptionFrictionMatrix] 对应主要的采购、市场过窄和服务化风险。"
  - id: A17
    name: 上行情景输入
    value: 'A second GCC peer lands 2 quarters earlier, effective annual revenue/account rises to $55K, and gross margin reaches 72%'
    unit: scenario_inputs
    source: "[BP milestones 和 Research geographicConsiderations] 上行假设卡塔尔模板能顺利迁移至 GCC 同类。"
  - id: A18
    name: 季度薪资平滑
    value: 'Y2 and Y3 salary expense uses the last visible headcount snapshot until the next planned hire rather than adding step-function payroll every quarter'
    unit: method
    source: "[Financial modeler instructions] 季度薪资行所需的平滑惯例。"
