    cashImpactK: -15.9
  - variable: CAC
    downsideCase: "因采购和设计工作仍由创始人主导，CAC 为 $75K"
    baseCase: "CAC $60K"
    upsideCase: "首个卡塔尔参考案例缩短销售周期后，CAC 为 $45K"
    y3RevenueImpactK: -12.6
    cashImpactK: -45.0
  - variable: churn
    downsideCase: "若基金预算未续约，月流失率 2.5%"
    baseCase: "月流失率 1.5%"
    upsideCase: "年度工作流形成粘性，月流失率 1.0%"
    y3RevenueImpactK: -12.6
    cashImpactK: -8.8
  - variable: sales cycle
    downsideCase: "安全和采购超过一个预算周期，延长至 9 个月"
    baseCase: "6 个月"
    upsideCase: "首个生产验证点出现后，缩短至 4 个月"
    y3RevenueImpactK: -25.2
    cashImpactK: -52.0
  - variable: gross margin
    downsideCase: "因落地服务仍过重，毛利率 65%"
    baseCase: "70%"
    upsideCase: "模板复用改善后，毛利率 72%"
    y3RevenueImpactK: 0.0
    cashImpactK: -11.3
  - variable: hiring pace
    downsideCase: "比计划提前 2 个季度增加 G&A 和第二位解决方案工程师"
    baseCase: "在第三个活跃账户进入生产前保持招聘不变"
    upsideCase: "将 G&A 招聘推迟到下一轮融资之后"
    y3RevenueImpactK: 0.0
    cashImpactK: -90.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionAccounts
      ProductionAccounts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基础情景收入到第 3 年 Q4 仅来自约 5 个活跃主权基金账户，每账户有效年度收入约 $50K，因此账户转化比广泛的漏斗顶部流量更重要。
  - checkName: 必须走对的事
    finding: 一个卡塔尔试点必须快速转化为可引用的生产工作流，才能在第 2 年前解锁 GCC 同类客户——因为卡塔尔单一市场的天花板太低。
  - checkName: 模型崩溃条件
    finding: 若采购延长至 9 个月或毛利率维持在 65% 左右，下行情景将在公司证明 5 账户网络前耗尽现金。
  - checkName: 下轮融资验证点
    finding: 最干净的下轮里程碑是 3 个活跃账户加上可复用的 GCC 模板集，证明落地仍以软件为主导，而非伪装的咨询。
sanityChecks:
  ruleOf40: "第 3 年增长率 63.6% + EBITDA 利润率 -251.4% = -187.8%"
  burnMultiple: "第 3 年消耗倍数 6.5x（-$570.2K EBITDA 对比第 2 年净新增收入 $88.2K）。"
  revenuePerFte: "第 3 年末 7 名全职员工，人均收入 $32K（SaaS 基准 $200–400K）。"
  flags:
    - "人均收入远低于软件基准，因为研究支持的第 3 年 SOM 仅约 $0.25M。"
    - "基础情景第 3 年仍大量消耗现金，公司需要超过 5 个账户的 GCC 扩张或实质性更高的 ACV，才能证明风险规模的后续融资合理性。"
    - "模型假设采购和安全审查能控制在 6 个月左右；若拖延，现金可能在下一轮融资前转负。"
    - "毛利率仅在工作流保持模板化、不演变为定制基金运营服务时才能达到目标。"
