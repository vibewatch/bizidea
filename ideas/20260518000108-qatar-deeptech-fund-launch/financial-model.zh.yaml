scenarios:
  downside:
    description: 采购延迟推迟 GCC 同类客户的赢取，有效年度账户收入接近付费意愿的低端。
    y3RevenueK: 176.4
    y3EbitdaK: -623.0
    cashLowPointK: -40.0
    keyAssumptionChanges:
      - 销售周期从 6 个月拉长至 9 个月。
      - 每个活跃账户有效年度收入稳定在约 $45K。
      - 因落地服务仍过重，毛利率停滞在 65%。
  base:
    description: 公司第 1 年签下两个付费试点，将其中一个转为生产，第 2 年增加一个 GCC 同类，第 3 年 Q4 达到 5 个活跃账户。
    y3RevenueK: 226.8
    y3EbitdaK: -570.2
    cashLowPointK: 332.1
    keyAssumptionChanges:
      - 付费试点定价 $20K，转化为约 $50K 有效年度生产账户。
      - 模板可复用后毛利率达到 BP 目标 70%。
      - 在第三个活跃账户进入生产前保持精简招聘。
  upside:
    description: 卡塔尔验证点转化更快，一个额外 GCC 同类提前落地，工作流产品化程度足以支撑略高的账户价值。
    y3RevenueK: 277.2
    y3EbitdaK: -500.0
    cashLowPointK: 410.0
    keyAssumptionChanges:
      - 第二个 GCC 同类比基础情景提前 2 个季度落地。
      - 通过使用量和模板库追加销售，有效年度账户收入提升至约 $55K。
      - 因落地工作保持高度模板化，毛利率达到 72%。
