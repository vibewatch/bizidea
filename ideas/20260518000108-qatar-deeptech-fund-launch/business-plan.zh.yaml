slug: deeptech-co-invest-rail
date: '2026-05-18'
executiveSummary: >-
  Deeptech Co-Invest Rail 应作为面向主权支持的卡塔尔及 GCC 创新基金的工作流软件上线，而非通用风险投资 CRM 或创始人门户。
  首个客户是类 QSTP 基金或科技园项目，处理前 10–30 个须通过卡塔尔总部合规、可衡量影响力和外部 VC 联合投资审核的深科技交易。
  研究支持这一痛点触发器：卡塔尔已在吸引大量初创公司申请，但基金团队仍须跨多个独立工具协调本地注册步骤、政策契合度、影响力证据和合作方就绪备忘录打包。
  MVP 应将一份创业公司档案转化为本地化清单、影响力基准、投委会备忘录和可导出的联合投资方证据包，并留有审计追踪，同时尽量减少敏感数据存储。
  GTM 应从一个与基金成立或首个联合交易周期绑定的付费共创客户起步，再凭借相同的资质模板和基准数据扩展至 GCC 同类项目。
  定价应采用年度平台费加活跃交易或共享数据室使用量计费，因为买家希望软件能降低运营人头并加速投委会决策。
  公司若成为时间到资质合规、缺失文件规律和联合投资方问题的记录系统，且能在通用 CRM 厂商追上之前建立壁垒，便有望胜出。
  最大的反驳风险在于：每个基金的实际交易量太低、采购周期比预期更长，以及卡塔尔优先的滩头市场太小——除非 GCC 扩张能迅速落地。
  预算归属方和双语/数据本地化要求仍是待核实的尽调项，因此本项目应视为纪律性的 pre-seed 测试，而非大平台押注。
problem:
  - "卡塔尔主权支持深科技基金仍在用电子表格、通用 CRM、法律顾问和临时数据室来证明同一笔交易的总部合规性、政策契合度、影响力证据和联合投资方就绪。"
  - "这种碎片化拖慢了投委会决策，削弱了创始人势头，并且每次联合交易的联合都像全新定制——即便相同的本地化和影响力问题在交易间反复出现。"
solution:
  - "将一份创业公司档案转化为卡塔尔准入清单、影响力基准、投委会备忘录和结构化证据包，让基金团队在一套工作流中完成更新，而非为每个利益相关方重写交易。"
  - "提供可导出的联合投资方数据室、缺失文件追踪和审计追踪，同时尽量减少敏感数据存储，使基金能通过安全审查，而无需购置完整的后台替代系统。"
whyWeWin:
  - "产品精准切入卡塔尔总部、影响力和外部 VC 要求交汇的投前工作流，比通用风险投资 CRM 或投后报告工具的切口更尖锐。"
  - "若公司能跨卡塔尔及 GCC 同类项目积累时间到资质合规、反复出现的尽调缺口和联合投资方问题规律，就能构建广泛现有厂商难以快速复制的模板和基准数据。"
strategicChoices:
  beachhead: "正在审核首批 10–30 个深科技申请的类 QSTP 主权支持卡塔尔基金和科技园项目——这些申请须在投委会批准前证明本地总部合规性、影响力指标和 VC 联合投资方就绪。"
  wedgeRationale: >-
    这个滩头市场有清晰的购买触发器、集中的买家和可量化的 ROI——更快的投委会准备和更干净的联合交易。
    比销售通用公共部门风险软件能更快产生验证，因为一次基金成立就能暴露反复出现的资质工作，无需赢得数千名创始人或替换客户的完整投资系统。
  sequencingRationale: >-
    产品应从卡塔尔专属资质审核、影响力模板和可导出的联合投资方包起步，因为这些是 QSTP 成立产生的紧迫堵点。
    GTM 应在前两次部署中保持创始人主导，在规模化销售前招聘基金运营岗，因为采购、安全审查和工作流配置将决定这是软件还是伪装的咨询。
    GCC 扩张只应在卡塔尔生产验证点证明更短的投委会周期和可接受的落地工作量之后才启动。
  notYet:
    - "面向私募基金的通用风险投资 CRM"
    - "创始人自助注册市场"
    - "投资组合监控或 LP 报告套件"
    - "在卡塔尔和一个 GCC 同类市场上线之前不做非 GCC 扩张"
market:
  tam: "基于约 35 个可比的 MENA 公共或主权支持创新基金及创业项目账户、ACV 约 $60k，估算 TAM 为 $2.1M。"
  sam: "基于约 15 个可凭卡塔尔首批验证点触达的 GCC 账户、ACV 约 $55k，估算 SAM 为 $0.8M。"
  som: "基于 5 个活跃账户、ACV 约 $50k（若公司赢得类 QSTP 基金及少量 GCC 同类），估算第 3 年 SOM 为 $0.25M。"
  segments:
    - "卡塔尔主权支持创新基金和科技园项目"
    - "有本地化和联合投资要求的 GCC 公共创新基金和创业投资平台"
  buyingProcess: >-
    流程始于基金成立、申请量激增或首个联合交易周期——这些事件暴露了需要多少手工劳动才能完成本地注册、影响力审查和外部投资方共享。
    日常推进方通常是投资主管或项目经理，经济买家是管理总监、投资负责人或项目所有人，在 IT、法律和运营审查工作流与数据模型之后拍板。
product:
  mvp: >-
    MVP 是一套卡塔尔优先的资质审核轨道：摄入创业公司申请材料，对照本地总部和政策要求进行映射，按公认标准整理影响力证据，并输出投委会就绪备忘录和可导出的联合投资方包。
    应包含文件请求、异常路由、权限和审计日志，同时依赖集成和受控导出，而非成为完整虚拟数据室或基金核算系统。
  sixMonth: "在卡塔尔上线一个付费共创客户，带有面向 QSTP 或 QFC 关联本地化审核、影响力基准收集、投委会备忘录生成和安全证据导出的工作流模板。"
  twelveMonth: "将首次部署转为生产，为卡塔尔和一个 GCC 同类生态系统添加可复用的路线模板，并证明至少一次可量化的从受理到投委会时间缩短。"
  twentyFourMonth: "在卡塔尔和 GCC 范围内支持 3–5 个活跃公共创新基金账户，增加关于时间到资质合规和尽调瓶颈的基准报告，并有选择地扩展至相邻的投资组合和影响力报告模块。"
  keyBets:
    - "类 QSTP 基金每年处理足够多的资质审核交易，足以支撑经常性软件支出。"
    - "基金会接受带有可导出证据包的工作流产品，而非坚持为每位联合投资方建立完全独立的尽调系统。"
    - "最小化敏感数据存储加上清晰的审计追踪，能比更重的全合一平台更快通过采购和安全审查。"
    - "卡塔尔专属模板可迁移至 GCC 同类项目，无需为每个司法管辖区强制重建。"
gtm:
  wedge: "向新成立的卡塔尔或 GCC 公共创新基金在其首个联合交易周期中销售一个付费共创客户部署，再将该工作流设为从创业公司受理到投委会就绪联合投资包的默认路径。"
  channels:
    - "向主权支持创新基金和科技园的管理总监、投资负责人和项目负责人进行创始人主导的直销"
    - "与 QFC、Startup Qatar 等已处于创始人注册路径上的生态系统运营商及同类 GCC 项目经理建立落地合作关系"
    - "从参与首批联合交易周期的联合投资 VC、本地法律顾问和安全共享合作方获取定向转介"
  funnelTargets: "目标：线索→合格试点 20–30%，合格试点→付费试点 30–40%，试点→生产 50%+，生产→12 个月内 GCC 同类转介或第二账户扩张 30%+。"
  pricing: "从 $15k–25k 的付费试点或落地包起步，转化为每基金约 $40k–60k 年度订阅，并对活跃联合交易、外部证据数据室和影响力模板库收取使用或模块费；这与研究所支持的替换碎片化工作流支出的付费意愿区间相符。"
businessModel:
  revenueStreams:
    - "按基金或项目收取年度平台订阅费"
    - "对审核中的活跃交易和外部联合投资方证据数据室按使用量计费"
    - "落地实施和高级模块费：基准报告、额外司法管辖区模板及影响力证据库"
  unitOfValue: "完成资质审核的活跃创业公司交易和每份共享联合投资方证据数据室"
  targetGrossMarginPct: 70
  expansionLevers:
    - "在同一账户内增加更多工作流，从受理资质审核扩展至基准报告和投资组合影响力模板"
    - "当落地手册可复制后，从卡塔尔路线扩展至 GCC 同类司法管辖区模板"
    - "向同一主权网络内的相邻生态系统运营商销售额外席位或模块"
    - "将时间到资质合规、缺失文件规律和联合交易转化率的基准数据货币化"
strategyMap:
  northStarMetric: "从受理到投委会就绪联合投资包完成资质审核的创业公司交易数"
  inputMetrics:
    - "已签署的付费共创客户数"
    - "从申请受理到投委会就绪包的中位天数"
    - "试点转生产转化率"
    - "在 SLA 内完成的本地化和影响力必要文件占比"
    - "每生产账户共享的外部联合投资方包数量"
    - "活跃基金账户的净收入留存率"
  moatsToBuild:
    - "覆盖本地注册路线、政策门控和反复出现文件要求的卡塔尔及 GCC 资质模板库"
    - "关于时间到资质合规、缺失文件规律和联合投资方尽调问题的基准数据集"
    - "符合主权基金安全审查的可信导出与权限层，同时保留多方协作能力"
  killCriteria:
    - "创始人主导销售 9 个月内签署的卡塔尔或 GCC 付费共创客户少于 2 个"
    - "首次生产部署的中位从受理到投委会准备时间未能改善至少 30%"
    - "试点基金每年处理的可变现交易少于 15 笔，或试点后拒绝以约 $40k 以上年度 ACV 转化"
  mermaid: |
    flowchart LR
      Wedge[Qatar qualification wedge] --> MVP[MVP workflow rail]
      MVP --> Proof[Faster committee and co-invest proof]
      Proof --> Expansion[GCC expansion motion]
investorMemo:
  verdict:
    call: "观望"
    conviction: "真实的工作流痛点和可信的首个切口，但当前市场过窄、预算归属方不够明确，不足以形成强力推荐合伙人会面的建议。"
    whyBelieve: "研究显示 QSTP 成立创造了具体触发器，且通用风险软件、安全数据室与卡塔尔专属资质需求之间存在清晰的产品缺口。"
    whyDoubt: "当前假设下第 3 年 SOM 仍仅约 $0.25M，公司必须证明快速的 GCC 扩张和可重复的采购，才能赢得风险规模的确信。"
    nextDiligence: "下一个验证点是两个付费共创客户，具备可核实的交易量、可测量的周期时间缩短，以及至少一条转化为 $40k+ 年度合同的路径。"
  firstCustomer:
    title: "卡塔尔主权支持深科技基金的投资负责人或项目负责人"
    profile: "一个正在启动联合投资项目的精简公共创新基金或科技园团队，处理跨境深科技创始人，协调本地注册、影响力审查和外部 VC 联合交易。"
    trigger: "新基金成立或首个联合交易周期迫使团队在不大幅增加运营人手的情况下，批量审核创业公司的卡塔尔总部、政策和影响力要求。"
    buyer: "管理总监或投资负责人"
    initialContract: "$15k–25k 付费试点，覆盖一套从受理到投委会的工作流，一旦工作流成为基金的默认资质审核轨道，则转化为约 $40k–60k 年度订阅加使用费。"
  mustBeTrue:
    - "类 QSTP 基金或项目每年至少有 15 个可变现的资质审核周期。"
    - "至少 2 个目标买家愿意为软件付费，而非继续依赖电子表格、法律顾问和通用 CRM。"
    - "卡塔尔优先落地可以在不变成定制咨询项目的情况下上线。"
    - "外部联合投资方会接受可导出的证据包或可选的外部数据室权限，而非每次都要求单独重建。"
    - "卡塔尔验证点能在 12 个月内打开至少一个 GCC 同类市场。"
  diligenceQuestions:
    - "首个目标基金每年实际从申请推进到投委会审查的交易有多少？"
    - "在主权支持项目内部，谁拥有这套工作流的预算和采购权？"
    - "首次生产部署必须满足哪些阿拉伯语-英语双语、数据本地化和安全要求？"
    - "买家为什么会选择这套轨道，而不是 DealCloud、Affinity、DealRoom 或内部门户加法律顾问？"
    - "公司能否足够快速地扩张至 GCC 同类，以突破卡塔尔单一市场的天花板？"
operatingAssumptions:
  - assumption: "首批目标基金每年处理足够多的资质审核和联合交易周期，足以支撑经常性软件经济模型。"
    basis: research.yaml
    validationTest: "对 3 个目标卡塔尔或 GCC 项目进行访谈或获取匿名化工作流数据，确认每个目标账户每年至少有 15 笔可变现交易。"
    decisionImpact: "若不成立，则收窄至更大型的多项目机构，或重新定位为更高单价的管理工作流，而非经常性 SaaS。"
  - assumption: "买家会接受可导出的备忘录和可选外部数据室权限，而非强制每个联合投资方进入独立的尽调系统。"
    basis: research.yaml
    validationTest: "与 2 个基金和 3 个外部联合投资方进行试点设计讨论，并在构建外部共享层之前就一种共享证据包格式达成一致。"
    decisionImpact: "若不成立，则将产品范围转向文件生成和记录系统工作流，而非协作数据室产品。"
  - assumption: "最小化存储架构加清晰的审计追踪能在不超过一个预算周期的情况下通过公共部门相邻安全审查。"
    basis: research.yaml
    validationTest: "与共创客户完成一次安全和采购审查，并将从试点签署到生产批准的时间控制在 120 天以内。"
    decisionImpact: "若不成立，公司在规模化招聘前需要更重的安全路线图和更长的销售周期假设。"
  - assumption: "卡塔尔工作流模板可适配至少一个 GCC 同类市场，无需从头重建产品。"
    basis: idea.yaml
    validationTest: "将一条卡塔尔路线和一条 GCC 同类路线并排映射，工作流对象、文件请求和备忘录结构至少复用 60%。"
    decisionImpact: "若不成立，市场将过于碎片化，公司应留在小众区域服务业务。"
  - assumption: "若周期时间和协调负担得到实质改善，基金将以 $40k–60k 区间从试点转化为年度合同。"
    basis: research.yaml
    validationTest: "测量试点前后的投委会周期时间和手工协调工时，并在试点复盘后 60 天内赢得至少一份 $40k 以上的年度合同。"
    decisionImpact: "若不成立，定价或打包必须下调，进一步削弱风险投资案例。"
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "交易量和买家审计"
    hypothesis: "目标卡塔尔基金和项目每年处理足够多的资质审核交易，足以支撑经常性工作流软件。"
    successMetric: "3 次买家或运营商访谈，加上一份匿名化工作流数据集，确认每个目标账户每年至少有 15 笔可变现周期。"
    owner: "创始人/CEO"
  - horizon: "0–90 天"
    experiment: "安全边界原型"
    hypothesis: "最小化存储架构加可导出包能满足早期安全和采购顾虑。"
    successMetric: "1 个共创客户批准草案数据流和权限模型，且在 v1 中不要求完整数据室替换。"
    owner: "创始工程师"
  - horizon: "90–180 天"
    experiment: "首个付费共创客户"
    hypothesis: "新成立的基金或首个联合交易周期产生足够的紧迫感，足以购买付费试点。"
    successMetric: "以 $15k+ 签署 1 个付费试点，具名买家、明确工作流范围和目标上线日期。"
    owner: "创始人/CEO"
  - horizon: "90–180 天"
    experiment: "投委会包部署"
    hypothesis: "工作流能削减手工协调工作，并比当前电子表格加法律顾问流程更快输出投委会就绪包。"
    successMetric: "首次试点在 5 笔或以上交易中将中位从受理到投委会准备时间缩短至少 30%。"
    owner: "基金运营负责人"
  - horizon: "6–12 个月"
    experiment: "试点转生产"
    hypothesis: "若首个买家看到更快的资质审核和更干净的联合交易，它将采用该工作流作为默认轨道。"
    successMetric: "至少 1 个试点在结果复盘后 60 天内转化为 $40k ACV 以上的 12 个月合同。"
    owner: "创始人/CEO"
  - horizon: "12–18 个月"
    experiment: "GCC 可迁移性测试"
    hypothesis: "卡塔尔验证点和可复用工作流对象能赢得 GCC 的第二个市场，无需定制重建。"
    successMetric: "1 个 GCC 同类账户使用复用至少 60% 卡塔尔落地成果的模板集签署合同。"
    owner: "合作拓展负责人"
operations:
  - "维护 QSTP、QFC 和未来 GCC 路线的受控工作流模板，包括文件清单、政策审核和审批路径。"
  - "对缺失文件、政策契合缺口和联合投资方问题运行异常队列，设置明确的责任人和响应 SLA。"
  - "追踪每笔交易的周期时间、文件完成度和联合投资方交接指标，以便产品能证明 ROI 并积累基准数据。"
  - "有选择地引入安全共享和身份合作方，以在不将公司变成通用数据室经销商的前提下降低采购风险。"
team:
  - role: "创始人/CEO"
    startTiming: "第 0 个月"
    rationale: "主导创始人驱动的销售、买家发现和采购导航，因为前几个账户高度集中且依赖关系驱动。"
  - role: "创始工程师"
    startTiming: "第 0 个月"
    rationale: "构建首次安全部署所需的资质审核工作流引擎、权限模型、备忘录生成和集成。"
  - role: "基金运营负责人"
    startTiming: "第 1 个月"
    rationale: "将主权基金流程步骤、本地化要求和影响力证据请求转化为可复用模板，而非一次性服务。"
  - role: "解决方案工程师"
    startTiming: "第 5 个月"
    rationale: "缩短落地周期，避免创始人成为永久集成团队。"
  - role: "合作拓展负责人"
    startTiming: "第 10 个月"
    rationale: "仅在首个卡塔尔工作流上线且可引用后，才推进 GCC 生态系统扩张。"
milestones:
  - horizon: "0–12 个月"
    items:
      - "在卡塔尔及至多一个 GCC 同类签署 2 个付费共创客户。"
      - "部署一套覆盖受理、本地化审核、影响力基准收集和投委会包生成的生产工作流。"
      - "在首个生产账户上证明从受理到投委会准备至少加快 30%。"
      - "将至少 1 个试点转化为 $40k ACV 以上的 12 个月合同。"
  - horizon: "12–24 个月"
    items:
      - "在卡塔尔和 GCC 范围内使用可复用路线模板达到 3 个活跃账户。"
      - "推出关于时间到资质合规、缺失文件规律和联合投资方问题主题的基准报告。"
      - "证明一次复用卡塔尔工作流模型大部分内容的第二市场落地。"
      - "避免落地和支持工作占收入多数。"
  - horizon: "24–36 个月"
    items:
      - "达到 5 个活跃公共创新基金或创业项目账户，与研究所支持的第 3 年 SOM 情景一致。"
      - "有选择地向现有客户扩展投资组合影响力和报告模块。"
      - "让公司成为至少一个主权支持网络的默认资质审核系统，而非一次性咨询工具。"
risks:
  - risk: "即便产品执行出色，初始买家宇宙也太小，难以支撑风险规模的结果。"
    likelihood: High
    impact: High
    mitigation: "仅将卡塔尔作为验证地，要求早期 GCC 扩张证据，若第二市场可迁移性验证失败则停止规模化支出。"
  - risk: "安全、采购和法律审查将销售周期拉长到 pre-seed 公司难以承受的程度。"
    likelihood: High
    impact: High
    mitigation: "以最小化数据存储架构、文档化数据边界和窄范围试点为先，再尝试更宽泛的平台替换。"
  - risk: "早期部署因每个基金都想要定制工作流和本地政策解读而变成服务繁重。"
    likelihood: High
    impact: High
    mitigation: "尽早招聘基金运营负责人，将 v1 约束在基于模板的路线上，拒绝不能改善可复用核心的定制请求。"
  - risk: "外部联合投资方继续使用自己的工具，限制共享数据室层的价值。"
    likelihood: Medium
    impact: Medium
    mitigation: "优先构建可导出的证据包和集成，使公司即便协作保持碎片化也仍能掌控资质审核工作流。"
  - risk: "卡塔尔专属本地化或影响力规则发生变化，削弱原有切口的紧迫感。"
    likelihood: Medium
    impact: Medium
    mitigation: "围绕在 GCC 公共资本项目中持续存在的更广泛本地内容、政策契合和联合投资打包要求构建产品。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-3M"
  runwayMonths: 18
  useOfFundsSummary: "18 个月的现金跑道，用于支撑创始产品和基金运营团队、卡塔尔首次安全部署、一次 GCC 可迁移性测试，以及在规模化 GTM 招聘前证明试点能转化为可重复的年度合同。"
