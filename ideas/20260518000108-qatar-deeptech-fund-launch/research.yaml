  validationPlan:
  - priority: high
    question: How many target deals per year does a QSTP-like team actually move through localization and committee review?
    evidenceToGather: Interview current or former operators at QSTP, Startup Qatar, or comparable GCC programs and map batch size, approval cadence, and bottlenecks.
  - priority: high
    question: Which documents and evidence requests are most likely to stall a deal before co-investor sharing?
    evidenceToGather: Collect anonymized checklists, application forms, and diligence-request histories from 10-20 founders or fund operators.
  - priority: medium
    question: Who owns budget and procurement for this workflow inside a sovereign-backed program?
    evidenceToGather: Run buyer interviews across investment, platform, IT, and legal owners in Qatar and one GCC peer market.
  - priority: medium
    question: How much bilingual, legal, and data-residency customization is required for production deployment?
    evidenceToGather: Prototype one English-only and one bilingual diligence pack and pressure-test both with local counsel and a fund operations lead.
