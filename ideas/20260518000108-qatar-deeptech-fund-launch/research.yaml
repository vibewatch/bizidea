openQuestions:
- What is the actual annual deal-review volume and committee cadence for QSTP TVF and adjacent Qatar startup programs?
- 'Who owns budget and procurement for this workflow: investment, platform, IT, or the parent public institution?'
- How much Arabic-English bilingual output is required for memos, diligence requests, and co-investor sharing?
- What Qatar-mainland privacy and data-localization obligations apply outside the QFC route?
- Will named co-investors work inside a shared sovereign-hosted diligence room or continue to require their own separate workflow stack?
