competitors:
- name: Intapp DealCloud
  stage: incumbent
  wedge: Configurable deal and relationship intelligence platform for private-capital firms.
  pricing: Custom enterprise pricing / demo-led sale.
  strength: Strong auditability, relationship management, and workflow flexibility for investment teams.
  weaknessVsUs: Not visibly purpose-built for Qatar-localization checks, impact gating, or sovereign co-invest packaging.
  sourceRefs:
  - 32
- name: Affinity
  stage: scale-up
  wedge: Relationship intelligence and cohort/investor workflow software for accelerators, incubators, and deal teams.
  pricing: Custom/demo-led pricing.
  strength: Automates email and meeting capture and helps organize founders, mentors, and investors.
  weaknessVsUs: Public product story centers on relationship workflows, not localization diligence, impact evidence, or sovereign committee packs.
  sourceRefs:
  - 33
- name: Dynamo Software
  stage: incumbent
  wedge: Full-cycle venture and alternatives platform spanning deal management, fundraising, portfolio monitoring, and fund accounting.
  pricing: Custom enterprise pricing / demo-led sale.
  strength: Broad single-stack coverage and configurable modules for venture firms.
  weaknessVsUs: Likely overbuilt for lean public innovation teams focused on pre-deal qualification rather than full back-office replacement.
  sourceRefs:
  - 35
- name: DealRoom
  stage: scale-up
  wedge: Collaborative diligence room and M&A workflow platform with granular permissions and AI-assisted document analysis.
  pricing: Priced by deal volume; unlimited users; contact sales for tailored options.
  strength: Strong secure-room capabilities and collaborative Q&A for multi-party diligence.
  weaknessVsUs: Solves document collaboration, but not the upstream judgment of whether a startup is Qatar-eligible and impact-qualified.
  sourceRefs:
  - 37
  - 38
  - 47
