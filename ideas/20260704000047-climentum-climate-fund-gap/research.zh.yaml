  fiveForces:
    supplierPower:
      score: 3
      rationale: 产品依赖对遥测数据、技术经济模型和第三方尽调模板的获取，但这些输入分散在客户、顾问和商用系统之间，并没有被锁定在某一个主导平台里。
      sourceRefs:
      - 15
      - 18
      - 29
      - 36
    buyerPower:
      score: 4
      rationale: 滩头市场的买家数量不多、懂技术，靠 Drive、DocSend 或顾问也能勉强撑完一轮融资，这给了他们很强的议价能力。
      sourceRefs:
      - 26
      - 27
      - 30
      - 32
    threatOfEntrants:
      score: 3
      rationale: 工作流的构建模块很容易获取，相邻厂商也能加模板，但一套值得信赖的气候硬科技本体论加基准语料库，仍需要时间才能建起来。
      sourceRefs:
      - 29
      - 31
      - 36
      - 38
    threatOfSubstitutes:
      score: 5
      rationale: 替代品的压力极强，因为顾问、内部表格和通用 VDR 虽然做得不算好，但对付单独一轮融资已经够用了。
      sourceRefs:
      - 10
      - 26
      - 27
      - 30
      - 32
    competitiveRivalry:
      score: 3
      rationale: 直接的垂直竞争仍属中等：相邻工具很多，但目前专为工业气候证据打包而生的产品还很少。
      sourceRefs:
      - 26
      - 27
      - 28
      - 29
      - 31
  pestle:
  - factor: political
    impact: positive
    point: 欧盟对工业热能的支持正通过加速器项目、补贴地图和直接拍卖资金变得具体起来。
    sourceRefs:
    - 19
    - 20
    - 21
  - factor: economic
    impact: negative
    point: 欧洲在气候科技规模化上仍有缺口，机构资本深度不足，这让买家对价格更敏感，融资轮次也更慢。
    sourceRefs:
    - 3
    - 8
    - 9
  - factor: social
    impact: neutral
    point: 投资人和工业客户越来越期待经得起审计的脱碳证据，而不是只靠故事支撑的可持续性声明。
    sourceRefs:
    - 17
    - 23
    - 34
  - factor: technological
    impact: positive
    point: 工业热泵在商业上已经可信到足以规模化，但性能证据仍需要翻译成投资人看得懂的格式。
    sourceRefs:
    - 14
    - 15
    - 16
    - 22
  - factor: legal
    impact: negative
    point: EED、F 类气体和 CSRD/ESRS 相关法规，增加了客户必须维护的证据量和结构化程度。
    sourceRefs:
    - 24
    - 25
    - 34
    - 35
  - factor: environmental
    impact: positive
    point: 余热回收和电气化是脱碳的核心优先事项，即使在融资市场收紧的情况下，这个滩头市场的战略意义依然存在。
    sourceRefs:
    - 17
    - 20
    - 23
  adoptionFrictionMatrix:
  - friction: 预算只围着实时融资转，断断续续
    severity: high
    affectedBuyer: CEO/CFO
    mitigation: 把董事会报告和持续的证据维护打包在一起，让工作区在融资之间也保持有用。
    sourceRefs:
    - 3
    - 10
    - 12
  - friction: 投资人尽调清单五花八门
    severity: high
    affectedBuyer: CFO 和尽调顾问
    mitigation: 先在一个细分领域落地，与一小群气候基金和顾问共同设计框架，再考虑扩张。
    sourceRefs:
    - 2
    - 3
    - 32
  - friction: 试点、技术经济模型和供应商文件的原始数据很杂乱
    severity: medium
    affectedBuyer: CTO 或运营负责人
    mitigation: 先走文档优先路线，再围绕重复率最高的证据对象，有选择地添加集成。
    sourceRefs:
    - 15
    - 16
    - 36
  - friction: 实测节省数据的信任缺口
    severity: high
    affectedBuyer: 领投人或技术评审方
    mitigation: 把答案锚定在原始文档、明确假设和面向计量核验（M&V）的模板上，而不只是靠打磨过的摘要 PPT。
    sourceRefs:
