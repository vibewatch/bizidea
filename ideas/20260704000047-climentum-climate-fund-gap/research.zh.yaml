categoryDynamics:
  growthRate: '>15% CAGR through 2030'
  growthRateSourceRefs:
  - 15
  tailwinds:
  - point: 欧盟对工业热能的支持，如今已经体现在直接资金项目和覆盖广泛的国家补贴中。
    sourceRefs:
    - 20
    - 21
  - point: 欧洲热泵销量在 2025 年恢复增长，进一步印证了这个切口的商业相关性。
    sourceRefs:
    - 22
  - point: 私人资本稀缺让举证效率变得更有价值，因为创始人不能再指望只靠故事就能拿下一轮融资。
    sourceRefs:
    - 2
    - 3
    - 10
  headwinds:
  - point: 电力对比燃气的经济性，以及示范信任度问题，依然在拖慢工业热能的采用速度，也可能延误融资。
    sourceRefs:
    - 16
    - 18
    - 22
  - point: 通用 VDR、投资人关系工具和顾问机构，已经能让部分创始人觉得工作流够用了，从而回避新软件。
    sourceRefs:
    - 26
    - 27
    - 29
    - 30
    - 32
  - point: 除非公司把业务从融资扩展到相邻的承保和监测工作流，否则滩头市场依然狭窄。
    sourceRefs:
    - 38
    - 39
    - 40
competitors:
- name: DocSend
  stage: incumbent
  wedge: 面向融资场景、对创始人友好的文档分享、权限管理和互动分析。
  pricing: 公开的分层月度定价。
  strength: 创始人容易上手，且能追踪投资人互动情况。
  weaknessVsUs: 不会建模试点表现、技术经济模型或制造证据。
  sourceRefs:
  - 26
- name: DealRoom
  stage: scale-up
  wedge: 虚拟数据室，加上尽调请求清单和交易工作流管理。
  pricing: 定制报价。
  strength: 结构化的尽调工作流和问答管理。
  weaknessVsUs: 为通用交易和并购而生，而非气候硬科技证据本体论。
  sourceRefs:
  - 27
- name: Ansarada
  stage: incumbent
  wedge: AI 辅助的企业级 VDR，用于受控的交易执行。
  pricing: 基于报价的企业定价。
  strength: 可审计性和企业级管控功能。
  weaknessVsUs: 对小型工业气候创业公司来说太横向、太重了。
  sourceRefs:
  - 28
- name: Standard Metrics
  stage: scale-up
  wedge: 投资组合报告、公司到投资人的数据分享和基准分析。
  pricing: 定制报价。
  strength: 系统化的创始人到投资人 KPI 分享。
  weaknessVsUs: 聚焦的是持续性的公司指标，而不是实时技术尽调材料包。
  sourceRefs:
  - 29
- name: Visible
  stage: scale-up
  wedge: 投资人更新、融资工作流和创始人与投资人的沟通。
  pricing: 公开的月度套餐。
  strength: 为创始人融资动作设计的轻量工作流。
  weaknessVsUs: 不会把工业试点证据翻译成尽调答案。
  sourceRefs:
  - 30
regulatoryTechnicalConstraints:
- point: 节省数据要想扛住投资人或客户的尽调，就需要经得起推敲的计量和核验，而不只是营销式的算法。
  sourceRefs:
  - 23
  - 24
  - 36
- point: 热泵和工业热能方面的声明，会受到制冷剂等合规要求的影响，这些内容也该纳入证据包。
  sourceRefs:
  - 24
  - 25
- point: 更大的工业交易对手方和投资人，会越来越多地要求被投公司和价值链企业提供符合 CSRD 和 ESRS 的底层数据。
  sourceRefs:
  - 34
  - 35
validationSignals:
- point: Climentum 的首轮关账说明，公共锚定资本正在填补欧洲气候硬科技私人 LP 的部分缺口。
  sourceRefs:
  - 1
  - 2
- point: CTVC 的投资人脉动数据显示，FOAK 资金正好在这款产品瞄准的商业化阶段收缩。
  sourceRefs:
  - 10
- point: 欧盟和 EHPA 的资料显示，工业热能正获得积极补贴并持续扩张，滩头市场的买家理应会有持续出现的融资节点。
  sourceRefs:
  - 20
  - 21
  - 22
- point: 横向 VDR 和 IR 厂商已经在从投资人协作中变现，这在垂直专业化之前就验证了这套工作流的可行性。
  sourceRefs:
  - 26
  - 29
  - 31
openQuestions:
- CFO 会在轮次之间付费，还是只在融资流程实时进行、时间压力最紧的时候才愿意掏钱？
- 在定制化吞噬产品利润率之前，技术尽调框架能在工业热能、电网设备等气候硬科技细分领域之间标准化到什么程度？
- 基金和顾问会不会允许对举证门槛和轮次结果做匿名化基准分析，还是数据权利方面的顾虑会限制护城河的深度？
- 更有力的扩张路径，是基金和顾问席位，还是之后进军项目融资和保险验证室？
