scenarios:
  downside:
    description: "Board-approved raises slip, between-round retention remains weak, and the product behaves more like a premium data room than a standing proof system."
    y3RevenueK: 610.0
    y3EbitdaK: -490.0
    cashLowPointK: 160.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches about 13 instead of 18 because fund and adviser referrals convert more slowly."
      - "Blended annual revenue per startup account stays near the researched $51K level instead of moving into the upper half of the BP price band."
      - "Gross margin exits near 66% because document normalization and proof maintenance remain more bespoke than planned."
  base:
    description: "Channel-led selling produces steady startup conversions, workspace fees attach to stronger raises, and enough between-round usage exists to preserve renewals."
    y3RevenueK: 816.0
    y3EbitdaK: -330.6
    cashLowPointK: 523.8
    keyAssumptionChanges:
      - "3 paying startup accounts by M12, 9 by Q4Y2, and 18 by Q4Y3."
      - "Blended annual revenue per account exits near $56.7K as live-round workspace fees attach to core proof-room subscriptions."
      - "Gross margin reaches the BP target of 70% by Q4Y3 as templates and selective imports reduce manual work."
  upside:
    description: "Repeat fund channels compound earlier, more accounts buy higher-end workspace packages, and portfolio templates create modest ARPU lift without requiring separate enterprise sales."
    y3RevenueK: 980.0
    y3EbitdaK: -185.0
    cashLowPointK: 660.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches about 20 instead of 18 because fund and adviser channels each deliver multiple warm intros per year."
      - "Blended annual revenue per startup account rises into the low-$60Ks through richer workspace and review-package attach."
      - "Gross margin exits near 72% as onboarding becomes more templatized and fewer manual clean-up hours are needed per account."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Pricing realization falls back toward the researched $51K blended ACV."
    baseCase: "Exit blended annual value is about $56.7K per startup account."
    upsideCase: "Workspace and reviewer attach lift exit blended annual value into the low-$60Ks."
    y3RevenueImpactK: -82.0
    cashImpactK: -58.0
  - variable: "CAC"
    downsideCase: "Channel partners underperform and CAC drifts toward roughly $50K."
    baseCase: "CAC stays near $43.2K with founder-led and partner-led selling."
    upsideCase: "Repeat fund channels keep CAC near the high-$30Ks."
    y3RevenueImpactK: -35.0
    cashImpactK: -110.0
  - variable: "churn"
    downsideCase: "Monthly churn rises toward 4.0% because customers use the product only during live raises."
    baseCase: "Monthly churn holds near 2.5% as some accounts keep the proof room active between financings."
    upsideCase: "Monthly churn falls toward 1.5% once board reporting and proof upkeep become habit."
    y3RevenueImpactK: -70.0
    cashImpactK: -85.0
  - variable: "sales cycle"
    downsideCase: "Warm intro to paid design partner stretches toward 150 days."
    baseCase: "Warm intros convert in about 90 days around a board-approved raise."
    upsideCase: "Strong fund sponsorship shortens conversion toward 60 days."
    y3RevenueImpactK: -120.0
    cashImpactK: -140.0
  - variable: "gross margin"
    downsideCase: "Gross margin stalls near 66% because onboarding stays bespoke."
    baseCase: "Gross margin exits at 70% after templates and imports improve reuse."
    upsideCase: "Gross margin reaches roughly 72% as proof modules standardize faster."
    y3RevenueImpactK: 0.0
    cashImpactK: -60.0
  - variable: "hiring pace"
    downsideCase: "A second operations or engineering hire is pulled into Y2 before renewals are proven."
    baseCase: "The team stays at 5 FTE through Y2 and reaches 6 FTE only in Y3."
    upsideCase: "Contractor support delays the ops hire until after Q4Y3 without slowing execution."
    y3RevenueImpactK: 20.0
    cashImpactK: -100.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      WarmIntro[Warm intro from fund or adviser] --> PaidDesignPartner[Paid design partner]
      PaidDesignPartner --> ProofRoom[Startup proof room account]
      ProofRoom --> Renewal[Between-round retention]
      ProofRoom --> WorkspaceFees[Live financing workspace fees]
      Renewal --> Revenue[Revenue]
      WorkspaceFees --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base revenue comes from growing startup proof-room accounts from 3 at Y1 exit to 18 at Q4Y3 while blended annual value per account moves into the high-$50Ks through workspace attach."
  - checkName: "Must go right"
    finding: "Fund and adviser channels must repeatedly deliver live raises and at least some customers must keep the proof room active between financings, or both CAC and churn move outside the base case."
  - checkName: "Model breaks if"
    finding: "If the product is treated as a one-off premium data room and pricing falls back toward the researched $51K floor, the downside case compresses cash toward roughly $0.16M before seed proof is established."
  - checkName: "Next-round proof"
    finding: "The seed story is 3-5 paying startup accounts plus one repeat fund channel, one repeat diligence-boutique channel, and measurable between-round usage by about month 18."
sanityChecks:
  ruleOf40: "Y3 growth 154.2% + EBITDA margin -40.5% = 113.7%"
  burnMultiple: "Y2 burn multiple is about 1.8x using roughly $0.60M of EBITDA burn against about $0.34M of net new ARR; the company still needs a seed round before breakeven."
  revenuePerFte: "$136K Y3 on 6 ending FTE (below $200-400K SaaS benchmark)"
  flags:
    - "The researched beachhead SAM is only about $2.3M, so the model still depends on expansion beyond the initial industrial-heat fundraising wedge after the first proof points land."
    - "Revenue per ending FTE is about $136K in Y3, which is below typical SaaS efficiency benchmarks and signals that the company is still funding product and schema development ahead of scale."
    - "The base case assumes enough between-round usage to hold churn near 2.5% per month; if customers only buy during live financings, retention and CAC will both deteriorate quickly."
    - "Gross margin is shown on direct hosting and external support costs while much of the implementation labor still sits in opex, so fully loaded delivery margin would be lower if onboarding stays bespoke."
    - "Cash is modeled as EBITDA and ignores working-capital timing, FX effects between EUR pricing and USD reporting, and any capitalized product spend."
