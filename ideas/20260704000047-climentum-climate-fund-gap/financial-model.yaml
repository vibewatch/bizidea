slug: "factory-pilot-proof-room"
date: "2026-07-04"
currency: "USD"
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-04] the model begins with the first full operating month after the dated business plan."
  - id: A2
    name: "Opening cash / pre-seed raise"
    value: "$2.0M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2-3M + BP fundingAsk runwayMonths 18 + model burn curve] the base case uses the low end of the stated range because hiring stays at 4-6 FTE through most of the plan."
  - id: A3
    name: "Starting paying startup accounts"
    value: "0"
    unit: "count"
    source: "[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first win paid design partners."
  - id: A4
    name: "Customer counting convention"
    value: "customersEop counts paying startup proof-room accounts only, not fund or adviser partners"
    unit: "definition"
    source: "[BP businessModel.unitOfValue + BP market.segments] the base case keeps customer counts tied to startup accounts while channel partners show up through pipeline efficiency and ARPU uplift rather than separate customer rows."
  - id: A5
    name: "First-year contract economics"
    value: "~$45K annualized equivalent, modeled at about $3.8K per active account per month in Y1"
    unit: "USD/account/year"
    source: "[BP investorMemo.firstCustomer.initialContract EUR35k-EUR60k + BP gtm.pricing] the model starts near the middle of the first-year contract range while the product is still document-first and service-heavy."
  - id: A6
    name: "Y3 blended annual revenue per startup account"
    value: "~$56.7K exit annualized revenue per paying startup account"
    unit: "USD/account/year"
    source: "[Research market blended ACV $51k + BP gtm.pricing annual subscription EUR24k-EUR60k plus live workspace EUR10k-EUR25k] the base case lands slightly above the research midpoint as live-round workspace fees attach to the stronger accounts."
  - id: A7
    name: "Customer ramp"
    value: "3 paying startup accounts by M12, 9 by Q4Y2, and 18 by Q4Y3"
    unit: "customersEop"
    source: "[BP milestones 0-12, 12-24, and 24-36 months + Research market.som 18 paying accounts by year 3 + BP gtm.funnelTargets] the base case matches the stated milestone bands and researched year-3 reach."
  - id: A8
    name: "Revenue recognition convention"
    value: "Period-end startup accounts multiplied by blended realized revenue per account for that period: Y1 about $3.8K-$4.0K per month, Y2 about $12.0K-$13.3K per quarter, and Y3 about $14.0K-$14.2K per quarter."
    unit: "formula"
    source: "[A5 + A6 + BP businessModel.revenueStreams] revenue stays fully reconcilable to customers × ARPU while implicitly capturing live-round workspace attach inside the blended account value."
  - id: A9
    name: "Gross margin ramp"
    value: "Y1 about 45%-53%, Y2 about 57%-63%, and Y3 about 65%-70%"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operations + BP product.mvp document-first manual normalization] early onboarding and evidence cleanup are still high-touch before templates and selective imports improve margin."
  - id: A10
    name: "Hiring timeline"
    value: "M1 founder/product lead and founding engineer; M4 second engineer; M6 GTM/partnerships lead; M13 implementation/customer-success lead; M31 ops/finance hire"
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale + BP fundingAsk use-of-funds summary] the model keeps the team deliberately lean because the initial wedge is narrow and channel-led."
  - id: A11
    name: "Founder / climate diligence lead loaded compensation"
    value: "$115K"
    unit: "USD/year"
    source: "[BP team climate diligence / product lead + European startup-finance heuristic] assumes modest founder cash pay plus payroll taxes and benefits, with upside coming from equity rather than cash."
  - id: A12
    name: "Engineering loaded compensation"
    value: "$135K"
    unit: "USD/year"
    source: "[BP team founding eng and full-stack engineer + European startup-finance heuristic] reflects senior product engineering in a European pre-seed budget, not US enterprise-software cash rates."
  - id: A13
    name: "GTM / partnerships loaded compensation"
    value: "$120K"
    unit: "USD/year"
    source: "[BP team GTM / partnerships lead + BP gtm.channels + European startup-finance heuristic] the role is partnership-heavy with limited paid-demand spend."
  - id: A14
    name: "Implementation / customer success loaded compensation"
    value: "$100K"
    unit: "USD/year"
    source: "[BP operations + BP product.twelveMonth between-round proof-maintenance dashboards + European startup-finance heuristic] this hire owns onboarding, proof upkeep, and renewal support."
  - id: A15
    name: "G&A / ops loaded compensation"
    value: "$90K"
    unit: "USD/year"
    source: "[BP operations contracting and data-governance process + European startup-finance heuristic] back-office support is added late because the startup stays lean through the first expansion step."
  - id: A16
    name: "Payroll allocation to P&L lines"
    value: "Founder 35% S&M / 45% R&D / 20% G&A; engineering 100% R&D; GTM 100% S&M; implementation 70% S&M / 30% R&D; ops 100% G&A"
    unit: "allocation"
    source: "[BP team role rationales + BP operations] maps payroll into the functional P&L lines while reflecting founder-led selling and hands-on product/schema work."
  - id: A17
    name: "Non-payroll opex ramp"
    value: "Monthly non-payroll spend starts around S&M/R&D/G&A of $2K/$4K/$3K and rises to about $7K/$7K/$6K by Q4Y3"
    unit: "USD/month"
    source: "[BP operations + BP gtm.channels + startup-finance heuristic] covers cloud software, travel, legal, insurance, and data-room/security tooling without assuming a broad paid-marketing engine."
  - id: A18
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA"
    unit: "formula"
    source: "[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial relative to operating burn at pre-seed scale."
  - id: A19
    name: "Steady-state monthly logo churn"
    value: "2.5%"
    unit: "percent per month"
    source: "[BP operatingAssumptions between-round retention risk + startup-finance heuristic for early vertical workflow SaaS] churn is set higher than mature SaaS because budgets remain linked to financing events."
  - id: A20
    name: "Customer counts are net of churn"
    value: "The quarterly customer ramp is already net of expected churn; the schema does not model separate lost-logo rows."
    unit: "convention"
    source: "[A7 + A19] the conservative net account ramp absorbs churn implicitly so totals remain reconcilable within the required schema."
  - id: A21
    name: "CAC convention"
    value: "Total 36-month sales and marketing spend divided by 18 net new paying startup accounts"
    unit: "formula"
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures founder-led and partner-led acquisition across the full three-year buildout."
  - id: A22
    name: "Next-round milestone for funding sizing"
    value: "3-5 paying startup accounts, one repeat fund channel, one repeat diligence-boutique channel, and evidence that more than 30% of usage persists between financings by roughly month 18"
    unit: "milestone"
    source: "[BP fundingAsk runwayMonths 18 + BP milestones 0-12 months + BP investorMemo.nextDiligence] the pre-seed is sized to prove paid demand and between-round retention before a seed expansion round."
  - id: A23
    name: "Quarterly salary-roll convention"
    value: "Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only quarter-end snapshots"
    unit: "convention"
    source: "[Headcount column convention + A10] this keeps salary expense internally consistent with the monthly hiring ramp."
  - id: A24
    name: "Portfolio and adviser revenue treatment"
    value: "Base case treats fund/adviser template and portfolio usage as ARPU uplift inside startup accounts rather than separate customer counts until data-rights proof is earned"
    unit: "definition"
    source: "[BP businessModel.revenueStreams + BP milestones 12-24 months + BP operatingAssumptions benchmark-rights risk] this avoids counting unproven institutional seats too early while still reflecting some expansion value in price realization."
