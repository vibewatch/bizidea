slug: factory-pilot-proof-room
date: "2026-07-04"
executiveSummary: >-
  欧洲气候硬科技创业公司哪怕已经跑通真实的工厂试点，融资进度也在拖——不是因为缺文件，而是
  私人资本现在要求先看到技术表现、部署经济性和制造就绪度上标准化的证据，才愿意领投。
  Climentum 这次公共资本主导的关账、更广泛的欧洲气候融资缺口研究，以及气候投资人脉动数据，
  指向同一个判断：证据打包已经成了一个实时运转的经营瓶颈，而不是财务附带的行政杂务。我们从
  丹麦和德国的工业热泵、余热回收创业公司切入——它们跑完 2—5 个付费工厂试点，正准备
  1000 万—2000 万欧元的 A 轮，这个细分市场尽调痛点急、渠道触达集中、市场活跃度还有政策
  撑腰。MVP 刻意走文档优先路线：先把 Drive 文件夹、试点报告、技术经济模型、供应商文件和
  合规文档变成版本可追溯的答案和投资人工作区，再考虑深度遥测集成。研究支撑的市场规模并不
  大——约 4630 万美元 TAM、230 万美元滩头 SAM、第 3 年可触达 90 万美元 SOM，所以这是一份先
  打切口的 pre-seed 计划，扩展到投资组合监测和相邻承保工作流的机会要靠自己挣出来，不能想
  当然。打法上刻意走渠道路线：创始人和 CFO 会在董事会批准融资或领投人要求技术尽调时买单，
  但气候基金、董事会成员和尽调精品机构才是最快的分发路径，因为他们反复看到同样的证据缺口。
  最需要证伪的风险是预算断续、尽调清单五花八门，以及基准数据的数据权利尚不明朗，所以头 12
  个月要靠付费共创客户快速验证或推翻这些假设。融资规模的设定，是为了验证首份合同定价、可
  衡量的尽调周期压缩，以及足够的轮次间使用率，避免沦为一间高级数据室。
problem:
  - >-
    创始人和 CFO 得一遍遍把试点遥测、技术经济模型、供应商文件和认证证据重新组装成针对每位
    投资人或顾问的定制答案，在现金跑道紧张时还拖长了正在进行的融资周期。
  - >-
    通用 VDR 和投资人更新工具只会存文件，却对不上决定私人领投方是否推进的那些技术、商业和
    制造问题。
  - >-
    工业热能交易还会触发补贴、计量和合规方面的证据要求，创业公司只能为投资人、客户和政策
    审查方各自维护一套平行材料包，而不是一套可复用的证据系统。
solution:
  - >-
    一间文档优先的验证室，吃进 Drive、Notion 和表格里已有的报告、模型和文档，再把每份材料
    映射进一套标准尽调框架，覆盖试点表现、部署经济性、供应商就绪度、认证和政策风险。
  - >-
    一套与原始证据挂钩的答案库和外部工作区，让每一个投资人问题都能追溯到底层证据、假设和
    红旗，而不是又催生一堆新表格和邮件往来。
  - >-
    一套轮次之间的证据维护工作流，服务于董事会报告和下一轮准备——如果留存假设成立，产品就
    能从一次性融资工具走向持续运转的记录系统。
whyWeWin:
  - >-
    研究显示，横向工具已经把分享、权限和投资人更新这些环节占住了；缺口在于气候硬科技的证据
    翻译——把试点 KPI、技术经济性、供应商就绪度和合规证据变成可复用的尽调答案。
  - >-
    先扎进工业热能这一个切口，能让公司和基金、尽调顾问共同设计出一套可复用框架，而不是假装
    所有气候硬件的尽调都长一个样。
  - >-
    只要客户允许匿名化基准分析，反复出现的工作流就能沉淀成一套有护城河的请求模板和证据完整
    度数据集——这是通用 VDR 和一次性顾问天生积累不出来的东西。
strategicChoices:
  beachhead: >-
    20—60 人规模、已跑完 2—5 个付费工厂试点、计划 9 个月内启动 1000 万—2000 万欧元 A 轮的
    丹麦和德国工业热泵、余热回收创业公司。
  wedgeRationale: >-
    这个切片已经有可测量的试点数据、不简单的技术经济和供应商问题，还能通过气候基金和工业
    热能生态圈集中触达，所以一款产品就能在一轮实时融资里证明举证提速的价值。太早去卖更广泛
    的欧洲气候硬件，会在公司还没搞清楚哪些证据模块真正会重复出现之前，就让尽调本体论成倍
    膨胀。
  sequencingRationale: >-
    计划从文档优先的产品和创始人主导销售起步，因为研究把源数据杂乱和清单五花八门列为采用
    风险；第一个证明点是更快、更干净的尽调答案，而不是完整的数据管道。招聘遵循同样的逻辑：
    先补齐领域产品和实施能力，等两家以上付费创业公司验证了框架之后再拓展基金和顾问合作，
    深度集成或相邻工作流则留到更晚。
  notYet:
    - "电网设备、碳去除等工业热能以外的气候硬科技垂直领域"
    - "在创业公司融资留存被验证之前，暂不做项目融资、保险和企业试点承保工作流"
    - "把深度 ERP、SCADA 或工厂遥测集成当作首单前提条件"
    - "为非气候类公司做通用 VDR 替代品"
market:
  tam: "4630 万美元（研究测算依据：454 笔欧洲深科技交易、2.0 个工作区年生命周期，以及每个融资周期约 5.1 万美元的混合年化价值）"
  sam: "230 万美元（研究测算依据：约 45 家正处于 A 轮或延伸轮尽调阶段的欧洲工业热能与余热回收创业公司，按约 5.1 万美元混合 ACV 计算）"
  som: "90 万美元（研究测算依据：通过丹麦和德国的基金及顾问渠道，第 3 年可触达 18 个付费创业公司账户）"
  segments:
    - "主要客群：跑完 2—5 个付费试点、即将启动种子延伸轮或 A 轮的欧洲工业热泵、余热回收创业公司"
    - "次要客群：正在为被投或目标公司统一证据工作流的气候基金、CVC 团队和技术尽调顾问"
  buyingProcess: >-
    通常是董事会批准融资，或某位潜在领投人要求外部技术尽调之后，CEO 或 CFO 才会签约；现有
    投资人或董事会成员往往也会影响选型，因为他们同样会用到这个工作区。第一份合同最容易在
    实时融资预算里落地成交；能否续约，则要看这间验证室能不能变成轮次之间常态化的董事会报告
    和证据维护系统。
product:
  mvp: >-
    一间安全的验证室，吃进现有的试点报告、技术经济模型、供应商文件和合规文档，映射进一套
    固定的工业热能尽调框架，产出与答案挂钩的投资人工作区和红旗摘要。MVP 刻意走文档优先、
    人工规整路线，暂不做实时遥测集成或跨公司基准分析。
  sixMonth: >-
    上线并服务 3 家共创客户，具备试点 KPI 摘要、技术经济假设、供应商与认证证据的可复用
    模块，以及能衡量响应时间和完整度的版本可追溯问答工作流。
  twelveMonth: >-
    新增有选择的共享文件夹和模型导入集成、基金与顾问模板库，以及轮次间证据维护看板，让
    验证室在融资流程结束后仍保持活跃。
  twentyFourMonth: >-
    如果第一个切口验证了数据复用和基准数据权利，就为气候基金推出投资组合就绪度席位，并
    上线第二条工作流，比如企业试点承保或补助/项目融资就绪度评估。
  keyBets:
    - "一套工业热能尽调框架，无需定制重建就能覆盖大多数第一轮投资人问题。"
    - "在深度集成到位之前，文档优先的工作流就能大幅缩短尽调响应时间。"
    - "客户会为轮次之间的证据维护续约，而不只是在实时融资时才付费。"
    - "基金和尽调顾问愿意用分发渠道和模板输入，换取投资组合层面的可见度。"
gtm:
  wedge: >-
    在董事会批准的融资转入技术尽调的那一刻，把一间由创始人主导的 A 轮验证室卖给他们；第
    一个价值主张是替丹麦和德国的工业热能创业公司省下数周重复答复的工作，而不是做一个更好
    的通用数据室。
  channels:
    - "通过现有投资人、董事会成员和正在为被投公司筹备融资的气候基金，做创始人主导销售"
    - "与已经在手工组装同类证据的技术尽调精品机构和技术经济顾问建立转介合作"
    - "通过 DACH 和北欧地区的加速器、补贴机构和行业协会等工业热能生态网络寻找共创客户"
  funnelTargets: "热心引荐→合格线索 35—45%；合格线索→付费共创客户 25—35%；共创客户→年度订阅 60%+；年度账户→经基金或顾问转介的第二个客户 25%+。"
  pricing: >-
    每个创业公司验证室的年度订阅约 2.4 万—6 万欧元，外加每个实时融资工作区 1 万—2.5 万
    欧元；定价依据是为创始人和 CFO 省下的时间、顾问支出和融资延误成本，而不是通用存储
    空间。这份合同最容易在实时轮次预算里成交，所以计划把这个触发点和轮次之间的董事会报告、
    证据维护续约绑在一起。
businessModel:
  revenueStreams:
    - "按创业公司验证室收取的年度 SaaS 订阅费"
    - "按轮次收取的融资工作区与外部评审开通费"
    - "在拿到数据权利后，面向基金、CVC 或尽调顾问的投资组合就绪度与基准数据订阅"
  unitOfValue: "按处于实时融资或持续证据维护状态的创业公司验证室计价"
  targetGrossMarginPct: 70
  expansionLevers:
    - "在现有客户内新增融资工作区和外部评审方"
    - "向渠道内已有的气候基金和尽调顾问出售投资组合席位和模板库"
    - "把同一套证据框架延伸到企业试点、补助、项目融资或保险就绪度工作流"
strategyMap:
  northStarMetric: "24 小时内可用已链接证据答复的投资人尽调问题占比"
  inputMetrics:
    - "至少开通一个融资工作区的付费创业公司账户数"
    - "从启动到交出第一份投资就绪证据包的中位天数"
    - "无需新建表格即可答复的尽调问题占比"
    - "融资事件之间的月活跃使用率"
    - "在多个账户间复用的基金或顾问模板数量"
  moatsToBuild:
    - "覆盖试点 KPI、技术经济性、供应商就绪度、认证和政策证据的工业气候尽调本体论"
    - "关于证据完整度、投资人提问模式和轮次结果的跨交易基准数据集"
    - "与气候基金和技术尽调精品机构深度嵌入的分发关系"
  killCriteria:
    - "头 12 个月内即便有 15 个合格的共创客户机会，付费创业公司账户仍不足 3 个"
    - "前 3 个付费账户中，标准框架在不做定制重建的情况下能答复的尽调问题不到 50%"
    - "到第 15 个月，不足一半的付费账户会在没有实时融资流程时按月使用产品"
  mermaid: |
    flowchart LR
      Wedge[Industrial heat Series A wedge] --> MVP[Document first proof room MVP]
      MVP --> Proof[24 hour answers and 3 paid accounts]
      Proof --> Expansion[Fund seats plus adjacent underwriting workflows]
investorMemo:
  verdict:
    call: "观望"
    conviction: "痛点真实、切口犀利，但信心有限，还得看公司能否证明轮次之间的持续使用，以及走出这个只有 230 万美元的狭窄滩头 SAM 的路径。"
    whyBelieve: "创意和研究都指向同一个判断：一个真实存在的证据瓶颈、一个集中的首批客户群，以及横向 VDR 和投资人关系工具目前都填不上的竞争缺口。"
    whyDoubt: "替代品很强，初始市场也小，基准数据护城河还依赖尚未挣到手的数据权利和标准化程度。"
    nextDiligence: "关注是否有 3 家付费共创客户，以及某个基金或顾问渠道能持续供应合格账户、至少 30% 的使用率能在融资事件之间延续。"
  firstCustomer:
    title: "丹麦或德国工业热泵创业公司的 CEO 或 CFO"
    profile: "一家 20—60 人规模的工业热泵或余热回收公司，已完成三个付费工厂试点，没有专职财务运营岗，计划未来 9 个月内启动 1000 万—2000 万欧元的 A 轮。"
    trigger: "董事会批准融资，或领投人要求外部技术尽调，会暴露出现有的 Drive 或 Notion 数据室根本答不快试点、技术经济、供应商和合规方面的问题。"
    buyer: "CEO 或 CFO"
    initialContract: "首年合同 3.5 万—6 万欧元，包含年度验证室订阅和一个实时融资工作区，续约与董事会报告使用情况及下一次尽调事件挂钩。"
  mustBeTrue:
    - "欧洲至少有 45 家滩头工业热能创业公司，会足够频繁地进入实时 A 轮或延伸轮尽调，从而支撑研究得出的 SAM。"
    - "一套标准工业热能框架，能在前 5—10 个账户中覆盖至少 70% 的第一轮尽调请求。"
    - "CEO 或 CFO 会从现有融资或运营预算中签下 3.5 万—6 万欧元的首年合同，且不需要走冗长的企业采购流程。"
    - "相比创始人自建的基线，MVP 能把交出完整投资就绪证据包的时间至少压缩 50%。"
    - "超过一半的付费账户会在轮次之间或通过相邻承保工作流保持月度使用，证明产品不只是一次性数据室。"
  diligenceQuestions:
    - "每个季度究竟有多少家具名的丹麦、德国及周边工业热能创业公司真正进入种子延伸轮或 A 轮尽调？"
    - "真实的投资人和顾问请求清单之间有多大重合度？哪些证据模块真正可复用？"
    - "首份合同究竟从哪条预算线出：CEO/CFO 的融资支出、财务运营，还是现有投资人支持？"
    - "在搭建深度遥测集成之前，公司能否拿出可衡量的周期节省证据？"
    - "在不拖慢销售的前提下，能从创业公司、基金和顾问那里拿到多少匿名化基准数据的合同权利？"
    - "如果模板库跑得通，是否至少有一家气候基金或尽调精品机构愿意承诺持续转介被投公司？"
operatingAssumptions:
  - assumption: "只要验证室还能支持董事会报告和证据维护，创业公司就愿意在轮次之间继续付费保持它活跃。"
    basis: research.yaml
    validationTest: "在实时融资关账后至少 90 天内，追踪前 3 个付费账户的月活跃使用率和续约意愿。"
    decisionImpact: "如果融资结束后使用率骤降，定价应转向更高的按轮次收费，公司也应加快推进基金/顾问席位或相邻承保工作流。"
  - assumption: "一套工业热能框架，就能把创业公司、投资人和顾问之间大多数核心尽调请求标准化。"
    basis: research.yaml
    validationTest: "收集并规整至少 5 家气候基金或顾问的请求清单，衡量是否有 70% 以上的问题能映射到同一套通用模块。"
    decisionImpact: "如果重合度低，滩头市场就得进一步收窄，否则业务有沦为重服务定制数据室生意的风险。"
  - assumption: "创意阶段设定的 2.4 万—6 万欧元订阅加工作区费用的定价假设，落在买家的付费意愿范围内。"
    basis: idea.yaml
    validationTest: "与 10 位目标创始人或 CFO 做定价摸底，争取在提出的价格区间内拿到 2 份签署的意向书或付费试点。"
    decisionImpact: "如果买家只能接受明显更低的定价，就必须调整引导范围或客户组合以保住毛利率，融资需求也会随之上升。"
  - assumption: "在搭建深度集成之前，文档优先的 MVP 就能创造足够的投资回报。"
    basis: operator judgment
    validationTest: "在前 2 家共创客户中，对比手工基线，衡量从启动到交出证据包的耗时，以及追问的中位响应时间。"
    decisionImpact: "如果周期节省有限，集成工作就必须提前到路线图更靠前的位置，营收周期也会因此拉长。"
  - assumption: "气候基金和技术尽调精品机构会成为可持续复用的转介渠道，而不只是共创顾问。"
    basis: research.yaml
    validationTest: "拿下 2 个渠道合作伙伴，衡量每家能否在 6 个月内带来至少 2 个合格的创业公司引荐。"
    decisionImpact: "如果渠道产出乏力，公司就得更早投入直接的创始人销售，也可能需要用更低的 ACV 来冷启动获客。"
  - assumption: "客户会授予足够的匿名化数据权利，让公司能打造基准数据产品。"
    basis: research.yaml
    validationTest: "在前 3 份付费合同中谈入基准分析和匿名化条款，确认至少 2 位客户能接受且不拖慢成交。"
    decisionImpact: "如果拿不到数据权利，护城河就只能靠工作流深度独自支撑，长期扩张的逻辑也会随之减弱。"
experimentRoadmap:
  - horizon: "0—90 天"
    experiment: "访谈 12 位目标创始人或 CFO，收集 5 份实时数据室或尽调请求清单。"
    hypothesis: "董事会批准融资加外部尽调请求，是一个可靠的触发信号，能支撑 3.5 万—6 万欧元的首年合同。"
    successMetric: "12 位买家中至少 6 位确认当前支出或付费意愿落在区间内，且有 5 位分享真实请求清单。"
    owner: "创始人/CEO"
  - horizon: "0—90 天"
    experiment: "与 3 家气候基金和 2 家尽调精品机构共同设计核心工业热能框架。"
    hypothesis: "一套可复用的模块组合，能覆盖大多数第一轮尽调问题。"
    successMetric: "抽样问题中 70% 以上能映射到共享框架，每个账户所需定制字段少于 10 个。"
    owner: "气候尽调负责人"
  - horizon: "3—6 个月"
    experiment: "把文档优先的 MVP 部署给 2 家正在筹备实时融资的共创客户。"
    hypothesis: "MVP 能把交出投资就绪证据包的时间砍半，并加快追问的答复速度。"
    successMetric: "证据包组装时间缩短 50% 以上，或 70% 以上的尽调问题能在 24 小时内答复。"
    owner: "创始工程师"
  - horizon: "3—6 个月"
    experiment: "分别与一家气候基金和一家技术尽调精品机构做转介渠道试点。"
    hypothesis: "渠道合作伙伴获取合格 ICP 账户的效率，比冷外呼更高。"
    successMetric: "两个试点合计带来至少 4 个合格引荐和 1 个付费账户。"
    owner: "创始人/合作伙伴负责人"
  - horizon: "6—12 个月"
    experiment: "在前 3 个付费账户中测试轮次间证据维护和董事会报告。"
    hypothesis: "实时融资关账后，客户仍会按月使用工作区。"
    successMetric: "50% 以上的账户在融资结束后连续 3 个月保持月活跃使用。"
    owner: "产品负责人"
  - horizon: "9—15 个月"
    experiment: "用匿名化数据，向一家基金或顾问合作伙伴提供可用于基准分析的投资组合视图。"
    hypothesis: "投资组合就绪度产出，能开辟出超越单纯创业公司 ACV 的扩张路径，且不必被迫走重服务模式。"
    successMetric: "拿下一个付费试点或已签署的投资组合分析意向书，且实施工时仍符合毛利率目标。"
    owner: "创始人/产品负责人"
operations:
  - "从现有 Drive、Notion 和表格导出中安全接入证据，按投资人分级授权并留存审计日志。"
  - "版本可追溯的尽调本体论和模板治理，每季度与共创基金和顾问一起复盘。"
  - "一套标准引导手册，能在 10 个工作日内把试点报告、技术经济模型、供应商文件和合规文档规整完毕。"
  - "针对匿名化、基准数据权利和外部评审方访问的合同与数据治理流程。"
  - "与技术尽调精品机构建立合作运营节奏，共同维护红旗模板，并处理计量、核验或合规问题的升级。"
team:
  - role: "创始工程师"
    startTiming: "第 0 个月"
    rationale: "先搭建安全的文档模型、证据到问题的映射，以及外部工作区权限体系，再考虑更深的集成。"
  - role: "气候尽调/产品负责人"
    startTiming: "第 0 个月"
    rationale: "把工业热能试点 KPI、技术经济、供应商和合规模块编码进产品，并主导首批高触达引导。"
  - role: "全栈工程师"
    startTiming: "第 4 个月"
    rationale: "在前两家共创客户明确哪些环节会重复出现之后，把文档优先工作流、共享文件夹与模型导入及分析能力产品化。"
  - role: "GTM/合作伙伴负责人"
    startTiming: "第 6 个月"
    rationale: "在首批证明点跑出来之后，把董事会、基金和尽调精品机构的引荐变成可持续复用的销售管道。"
milestones:
  - horizon: "0—12 个月"
    items:
      - "在丹麦和德国工业热能领域拥有 2 家活跃共创客户和 3 个付费创业公司账户"
      - "核心框架在前 5—10 个工作流中覆盖至少 70% 的第一轮尽调问题"
      - "一个基金渠道和一个尽调精品机构渠道能持续产出合格销售管道"
      - "证据包组装时间的中位数比创始人基线至少缩短 50%"
  - horizon: "12—24 个月"
    items:
      - "8—10 个付费创业公司账户，轮次间使用带动正向续约"
      - "投资组合就绪度模块上线，服务至少 2 家基金或顾问合作伙伴"
      - "大多数新签合同都拿到可用于基准分析的匿名化权利"
      - "有选择的集成把引导周期压缩到 10 个工作日以内"
  - horizon: "24—36 个月"
    items:
      - "15—18 个付费账户，达到支撑约 90 万美元 SOM 所需的第 3 年研究触达目标"
      - "上线融资以外的第二条工作流，很可能是投资组合监测或企业试点承保"
      - "只有在基准数据和续约经济性都站得住脚时，才决定向相邻工业气候细分领域扩张"
risks:
  - risk: "预算始终只绑定实时融资，轮次一结束就消失。"
    likelihood: High
    impact: High
    mitigation: "围绕董事会报告和证据维护设计续约逻辑，并借助基金赞助的投资组合准备来平滑轮次之间的需求波动。"
  - risk: "投资人和顾问的尽调请求差异太大，一套可复用框架扛不住。"
    likelihood: Medium
    impact: High
    mitigation: "先守住工业热能这一领域，与一小群基金和顾问共同设计，并在严格的核心框架之上开放模块化自定义字段。"
  - risk: "横向 VDR、投资人关系工具或顾问类现有厂商加够了气候模板，抹平差异化。"
    likelihood: Medium
    impact: Medium
    mitigation: "靠与原始证据挂钩的证据翻译能力、请求模板深度和可用于基准分析的工作流来竞争，而不只是权限管理或文档分享。"
  - risk: "客户拒绝授予基准数据产品所需的数据权利和匿名化条款。"
    likelihood: Medium
    impact: High
    mitigation: "把基准分析设为选择性加入，先证明独立工作流本身的投资回报，头 18 个月不要假设有基准数据收入。"
  - risk: "引导过程变成重服务的集成项目，拖垮毛利率目标。"
    likelihood: Medium
    impact: High
    mitigation: "让 MVP 始终保持文档优先，严格执行标准引导手册，把深度遥测或工厂系统集成推迟到出现明确的重复模式之后。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-3M"
  runwayMonths: 18
  useOfFundsSummary: "资金用于养一个 4—6 人团队，打造文档优先的验证室产品，拿下 3—5 个付费创业公司账户和 2 个渠道合作伙伴，并在扩展到投资组合或承保工作流之前，证明轮次之间的持续使用。"
