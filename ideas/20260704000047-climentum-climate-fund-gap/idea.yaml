topRisks:
  - name: Episodic budget
    description: "Startups may view fundraising tooling as a short-term purchase and resist paying outside a live round."
    mitigation: "Anchor the product in always-on board reporting and proof maintenance between raises, and win distribution through funds that want every portfolio company prepared."
  - name: Investor heterogeneity
    description: "Different funds and diligence advisers may ask incompatible technical questions, reducing the value of a standardized workflow."
    mitigation: "Launch in one subcategory such as industrial heat and co-design the core schema with 5-10 active climate investors while allowing custom modules on top."
  - name: Generic VDR bundling
    description: "Virtual data rooms, consultants, or startup finance platforms could add lightweight diligence templates once the category proves valuable."
    mitigation: "Differentiate on climate hard-tech ontology, telemetry and TEA integrations, and benchmark data on proof thresholds that generic vendors cannot quickly replicate."
