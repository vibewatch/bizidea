problem: >-
  European climate hard-tech startups with real factory pilots still raise
  their next round through ad hoc Google Drive folders, consultant decks, and
  one-off spreadsheet answers. As private investors become more selective and
  technical proof bars rise, founders spend weeks repackaging the same pilot
  data, capex assumptions, customer savings analyses, and supply-chain evidence
  for every new diligence thread. Generic data rooms store files but do not
  translate messy industrial evidence into the specific technical, commercial,
  and manufacturing questions that now decide whether a private Series A gets
  done.
targetUser:
  primary: "CEO, CFO, or Head of Finance at a European industrial-efficiency hard-tech startup preparing a Series A after 2-5 paid factory pilots."
  secondary: "Climate seed funds, corporate venture teams, and technical diligence advisers reviewing those startups and reusing the same evidence workspace across deals."
  buyer: "CEO or CFO at a 20-80 person climate hard-tech startup running fundraising personally."
startupThesis:
  nonObviousInsight: >-
    The scarce resource in European climate hard tech is no longer only
    capital; it is standardized proof. Public anchors can tolerate bespoke
    storytelling, but private LPs and lead investors now want comparable
    evidence on pilot performance, deployment economics, and supply-chain
    readiness before they underwrite a round. The company that turns messy
    factory evidence into a repeatable diligence asset becomes infrastructure
    for both fundraising and later project finance.
  beachhead: "European waste-heat recovery and industrial heat-pump startups with 2-5 paid factory pilots and a planned Series A within 9 months."
  wedge: "A proof-room that ingests pilot telemetry, customer savings reports, techno-economic models, supplier docs, and manufacturing evidence, then maps them to investor-ready diligence questions and reusable workspaces."
  whyNowCatalyst: "Climentum’s publicly anchored first close and explicit warning about longer fundraising timelines show private climate capital now requires structured proof earlier, making diligence packaging a live bottleneck for startups before their next round."
  ventureScalePath: >-
    Start with climate hard-tech Series A raises, then expand into corporate
    pilot underwriting, project-finance readiness, insurance submissions, and
    benchmark data products for funds backing industrial decarbonization.
solution: >-
  Build a proof-room for climate hard-tech fundraising. The platform ingests
  pilot telemetry, customer savings reports, capex models, certification files,
  supplier qualification data, and board-approved fundraising materials from
  the systems founders already use. It maps each artifact to a standardized
  diligence schema covering technical performance, deployment economics,
  manufacturing readiness, and policy exposure, then generates live investor
  workspaces, version-controlled answers, and red-flag summaries. Lead funds,
  CVCs, and technical consultants get read-only portals that keep follow-up
  questions tied to the exact underlying evidence instead of spawning endless
  email chains. Over time, the company can benchmark which proofs actually
  unlock private capital across subcategories such as industrial heat, grid
  equipment, and supply-chain resilience hardware.
goToMarketSeed:
  firstCustomer: "A 20-60 person Danish or German industrial heat-pump or waste-heat recovery startup with three paid plant pilots, a €10M-€20M Series A target, and no full-time finance-ops hire."
  buyingTrigger: "The board approves a Series A process or a prospective lead investor asks for external technical diligence after partner meetings."
  currentAlternative: "Founder-built Google Drive or Notion data rooms, consultant-made techno-economic models, ad hoc pilot spreadsheets, and email-based Q&A."
  switchingReason: "The product cuts weeks of rework by turning live pilot evidence into a reusable, investor-readable proof pack that survives every new diligence request."
  pricingHypothesis: "€24,000-€60,000 annual subscription per company plus a €10,000-€25,000 fee for each live financing workspace opened to outside investors."
