scenarios:
  downside:
    description: 董事会批准的融资推迟，轮次间留存依然疲弱，产品的实际表现更像一间高级数据室，而不是一套持续运转的证据系统。
    y3RevenueK: 610.0
    y3EbitdaK: -490.0
    cashLowPointK: 160.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 约为 13 而非 18，因为基金和顾问转介的转化速度更慢。
    - 每创业公司账户的混合年营收停留在研究得出的约 $51K 水平，而没有升到业务计划定价区间的上半段。
    - 毛利率收官在约 66%，因为文档规整和证据维护比计划中更依赖定制化处理。
  base:
    description: 以渠道为主导的销售带来稳定的创业公司转化，工作区费用附加在表现更强的融资轮次上，轮次间使用率也足以撑住续约。
    y3RevenueK: 816.0
    y3EbitdaK: -330.6
    cashLowPointK: 523.8
    keyAssumptionChanges:
    - M12 达到 3 个付费创业公司账户，Q4Y2 达到 9 个，Q4Y3 达到 18 个。
    - 随着实时轮次工作区费用附加在核心验证室订阅上，每账户混合年营收收官在约 $56.7K。
    - 随着模板和有选择的导入功能减少人工工作量，毛利率在 Q4Y3 达到业务计划设定的 70% 目标。
  upside:
    description: 可复用的基金渠道更早形成复利效应，更多账户购买高端工作区套餐，投资组合模板在无需单独企业销售的情况下带来温和的 ARPU 提升。
    y3RevenueK: 980.0
    y3EbitdaK: -185.0
    cashLowPointK: 660.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 约为 20 而非 18，因为基金和顾问渠道每年各自带来多次热心引荐。
    - 凭借更丰富的工作区和评审套餐附加，每创业公司账户的混合年营收升至 $60K 出头。
    - 随着引导流程更加模板化、每账户所需的人工清理工时减少，毛利率收官在约 72%。
sensitivity:
- variable: ARPU
  downsideCase: 定价实现回落至研究得出的约 $51K 混合 ACV 附近。
  baseCase: 每创业公司账户的年化收官价值约为 $56.7K。
  upsideCase: 工作区和评审方附加把年化收官价值推高到 $60K 出头。
  y3RevenueImpactK: -82.0
  cashImpactK: -58.0
- variable: CAC
  downsideCase: 渠道合作伙伴表现不及预期，CAC 向约 $50K 漂移。
  baseCase: 在创始人主导和合作伙伴主导销售下，CAC 维持在约 $43.2K。
  upsideCase: 可复用的基金渠道让 CAC 维持在 $30K 高段。
  y3RevenueImpactK: -35.0
  cashImpactK: -110.0
- variable: churn
  downsideCase: 月度流失率升至约 4.0%，因为客户只在实时融资期间使用产品。
  baseCase: 月度流失率维持在约 2.5%，部分账户会在融资之间继续保持验证室活跃。
  upsideCase: 一旦董事会报告和证据维护成为习惯，月度流失率降至约 1.5%。
  y3RevenueImpactK: -70.0
  cashImpactK: -85.0
- variable: sales cycle
  downsideCase: 从热心引荐到成为付费共创客户的周期拉长至约 150 天。
  baseCase: 围绕董事会批准的融资，热心引荐大约 90 天内转化。
  upsideCase: 强力的基金背书把转化周期缩短至约 60 天。
  y3RevenueImpactK: -120.0
  cashImpactK: -140.0
- variable: gross margin
  downsideCase: 毛利率停滞在约 66%，因为引导流程依然高度定制化。
  baseCase: 在模板和导入功能提升复用率后，毛利率收官于 70%。
  upsideCase: 随着证据模块标准化速度加快，毛利率达到约 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -60.0
- variable: hiring pace
  downsideCase: 在续约得到验证之前，第二名运营或工程岗位就提前到 Y2 招聘。
  baseCase: 团队在 Y2 期间维持 5 名全职员工，直到 Y3 才增至 6 名。
  upsideCase: 借助外包支持，运营岗位的招聘推迟到 Q4Y3 之后，且不影响执行进度。
  y3RevenueImpactK: 20.0
  cashImpactK: -100.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      WarmIntro[Warm intro from fund or adviser] --> PaidDesignPartner[Paid design partner]
      PaidDesignPartner --> ProofRoom[Startup proof room account]
      ProofRoom --> Renewal[Between-round retention]
      ProofRoom --> WorkspaceFees[Live financing workspace fees]
      Renewal --> Revenue[Revenue]
      WorkspaceFees --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 营收引擎
  finding: 基准营收来自创业公司验证室账户从 Y1 收官的 3 个增长到 Q4Y3 的 18 个，同时通过工作区附加，每账户混合年价值升至 $50K 高段。
- checkName: 必须成立的前提
  finding: 基金和顾问渠道必须持续带来实时融资，且至少部分客户要在融资之间保持验证室活跃，否则 CAC 和流失率都会偏离基准情景。
- checkName: 模型失效的条件
  finding: 如果产品被当作一次性高级数据室使用，定价回落到研究给出的 $51K 下限，下行情景会在种子轮证明成立之前，把现金压缩到约 16 万美元。
- checkName: 下一轮的证明
  finding: 种子轮的故事是：3—5 个付费创业公司账户，加一个可复用的基金渠道、一个可复用的尽调精品机构渠道，并在约第 18 个月时展现出可衡量的轮次间使用率。
sanityChecks:
  ruleOf40: Y3 增长率 154.2% + EBITDA 利润率 -40.5% = 113.7%
  burnMultiple: Y2 消耗倍数约为 1.8x，约 60 万美元的 EBITDA 消耗对应约 34 万美元的净新增 ARR；公司在实现盈亏平衡之前仍需要一轮种子融资。
  revenuePerFte: 以 6 名 Y3 期末全职员工计，Y3 每全职营收 $136K（低于 $200K—$400K 的 SaaS 基准）
  flags:
  - 研究得出的滩头 SAM 只有约 230 万美元，所以模型在拿到首批证明点之后，仍要依赖扩展到最初工业热能融资切口之外的市场。
  - Y3 每期末全职员工营收约 $136K，低于典型 SaaS 效率基准，说明公司仍在规模化之前为产品和框架研发买单。
  - 基准情景假设轮次间使用率足以把月度流失率维持在约 2.5%；如果客户只在实时融资期间购买，留存和 CAC 都会迅速恶化。
  - 毛利率只体现直接托管和外部支持成本，大量实施人力仍计入运营支出，所以如果引导流程持续定制化，全成本交付利润率会更低。
  - 现金按 EBITDA 建模，未考虑营运资金时点、欧元定价与美元报告之间的汇率影响，以及任何资本化的产品支出。
