slug: factory-pilot-proof-room
date: '2026-07-04'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-04] 模型从已定业务计划日期之后的第一个完整运营月开始。'
- id: A2
  name: 期初现金/Pre-seed 融资
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-3M + BP fundingAsk runwayMonths 18 + model burn curve] 基准情景取所述区间低端，因为团队在计划的大部分时间里都维持在 4—6 名全职员工。'
- id: A3
  name: 期初付费创业公司账户数
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零营收起步，必须先拿下付费共创客户。'
- id: A4
  name: 客户计数口径
  value: customersEop 只计入付费创业公司验证室账户，不包括基金或顾问合作伙伴
  unit: definition
  source: '[BP businessModel.unitOfValue + BP market.segments] 基准情景把客户计数只绑定创业公司账户，渠道合作伙伴的影响体现在销售管道效率和 ARPU 提升上，而不单列客户行。'
- id: A5
  name: 首年合同经济性
  value: 约合年化 $45K，Y1 建模为每个活跃账户每月约 $3.8K
  unit: USD/account/year
  source: '[BP investorMemo.firstCustomer.initialContract EUR35k-EUR60k + BP gtm.pricing] 模型取首年合同区间中段附近，因为产品仍以文档优先、重服务为主。'
- id: A6
  name: Y3 每创业公司账户混合年营收
  value: 每个付费创业公司账户的年化出口营收约 $56.7K
  unit: USD/account/year
  source: '[Research market blended ACV $51k + BP gtm.pricing annual subscription EUR24k-EUR60k plus live workspace EUR10k-EUR25k] 基准情景略高于研究中值，因为实时轮次工作区费用会附加在表现更强的账户上。'
- id: A7
  name: 客户增长曲线
  value: M12 达到 3 个付费创业公司账户，Q4Y2 达到 9 个，Q4Y3 达到 18 个
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months + Research market.som 18 paying accounts by year 3 + BP gtm.funnelTargets] 基准情景与所述里程碑区间及研究得出的第 3 年触达目标一致。'
- id: A8
  name: 营收确认口径
  value: 期末创业公司账户数乘以当期每账户混合实现营收：Y1 每月约 $3.8K—$4.0K，Y2 每季度约 $12.0K—$13.3K，Y3 每季度约 $14.0K—$14.2K。
  unit: formula
  source: '[A5 + A6 + BP businessModel.revenueStreams] 营收始终可用“客户数 × ARPU”对账，同时把实时轮次工作区的附加值隐含在混合账户价值中。'
- id: A9
  name: 毛利率爬坡
  value: Y1 约 45%—53%，Y2 约 57%—63%，Y3 约 65%—70%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + BP product.mvp document-first manual normalization] 在模板和有选择的导入功能改善毛利率之前，早期引导和证据整理仍高度依赖人工。'
- id: A10
  name: 招聘时间线
  value: M1 创始人/产品负责人和创始工程师；M4 第二名工程师；M6 GTM/合作伙伴负责人；M13 实施/客户成功负责人；M31 运营/财务岗位
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + BP fundingAsk use-of-funds summary] 模型刻意让团队保持精简，因为最初的切口范围窄，且以渠道为主导。'
- id: A11
  name: 创始人/气候尽调负责人全成本薪酬
  value: $115K
  unit: USD/year
  source: '[BP team climate diligence / product lead + European startup-finance heuristic] 假设创始人现金薪酬适中，外加工资税和福利，上行空间来自股权而非现金。'
- id: A12
  name: 工程岗全成本薪酬
  value: $135K
  unit: USD/year
  source: '[BP team founding eng and full-stack engineer + European startup-finance heuristic] 反映的是欧洲 pre-seed 预算下的资深产品工程薪酬，而非美国企业软件的现金薪资水平。'
- id: A13
  name: GTM/合作伙伴岗全成本薪酬
  value: $120K
  unit: USD/year
  source: '[BP team GTM / partnerships lead + BP gtm.channels + European startup-finance heuristic] 该岗位以合作伙伴关系为主，付费获客支出有限。'
- id: A14
  name: 实施/客户成功岗全成本薪酬
  value: $100K
  unit: USD/year
  source: '[BP operations + BP product.twelveMonth between-round proof-maintenance dashboards + European startup-finance heuristic] 这个岗位负责客户引导、证据维护和续约支持。'
- id: A15
  name: 行政/运营岗全成本薪酬
  value: $90K
  unit: USD/year
  source: '[BP operations contracting and data-governance process + European startup-finance heuristic] 后台支持岗位加入较晚，因为公司在第一步扩张之前都保持精简。'
- id: A16
  name: 薪酬在损益表科目间的分摊
  value: 创始人 35% 计入 S&M / 45% 计入 R&D / 20% 计入 G&A；工程 100% 计入 R&D；GTM 100% 计入 S&M；实施 70% 计入 S&M / 30% 计入 R&D；运营 100% 计入 G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] 把薪酬映射进各功能损益科目，同时体现创始人主导销售和亲自动手做产品/框架的特点。'
- id: A17
  name: 非薪酬运营支出爬坡
  value: 非薪酬月度支出起始为 S&M/R&D/G&A 各约 $2K/$4K/$3K，到 Q4Y3 升至约 $7K/$7K/$6K
  unit: USD/month
  source: '[BP operations + BP gtm.channels + startup-finance heuristic] 涵盖云软件、差旅、法务、保险及数据室/安全工具，但不假设有大规模付费营销引擎。'
- id: A18
  name: 现金转换口径
  value: 现金变动等于 EBITDA
  unit: formula
  source: '[startup-finance heuristic] 假设在 pre-seed 规模下，资本支出、税费、融资费用和营运资金时点相对于经营性烧钱可以忽略不计。'
- id: A19
  name: 稳态月度客户流失率
  value: 2.5%
  unit: percent per month
  source: '[BP operatingAssumptions between-round retention risk + startup-finance heuristic for early vertical workflow SaaS] 流失率设置得比成熟 SaaS 更高，因为预算仍与融资事件绑定。'
- id: A20
  name: 客户数已扣除流失
  value: 季度客户增长曲线已经扣除预期流失；该框架不单列流失客户行。
  unit: convention
  source: '[A7 + A19] 保守的净账户增长曲线隐含吸收了流失，使总数在所需框架内始终可对账。'
- id: A21
  name: CAC 口径
  value: 36 个月销售与营销总支出除以 18 个净新增付费创业公司账户
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] 该口径涵盖三年建设期内创始人主导和合作伙伴主导的获客。'
- id: A22
  name: 确定融资规模的下一轮里程碑
  value: 到第 18 个月左右，拿下 3—5 个付费创业公司账户、一个可复用的基金渠道、一个可复用的尽调精品机构渠道，并证明超过 30% 的使用率能在融资之间延续
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 0-12 months + BP investorMemo.nextDiligence] pre-seed 轮的规模是为了在扩张至种子轮之前，验证付费需求和轮次间留存。'
- id: A23
  name: 季度薪资滚动口径
  value: Y2—Y3 的薪资行采用季度内实际逐月入职情况，而非仅取季末快照
  unit: convention
  source: '[Headcount column convention + A10] 这样能让薪资支出与逐月招聘节奏保持内部一致。'
- id: A24
  name: 投资组合与顾问营收处理方式
  value: 在数据权利得到验证之前，基准情景把基金/顾问模板和投资组合使用计为创业公司账户内的 ARPU 提升，而不单列客户数
  unit: definition
  source: '[BP businessModel.revenueStreams + BP milestones 12-24 months + BP operatingAssumptions benchmark-rights risk] 这样可以避免过早计入尚未验证的机构席位，同时仍在价格实现中体现一定的扩张价值。'
