    "customerAndBuyer": "The daily operator is usually the CEO, CFO, or finance lead at a 20–80 person climate hard-tech startup running a live raise while technical and commercial teams scramble to answer diligence. The economic buyer is most often the founder or CFO because delayed proof directly extends fundraising cycles and runway burn; secondary users are climate funds, CVCs, and diligence boutiques that want a more comparable evidence package across deals [2][10][11][12][32].",
