  "reportMemo": {
    "executiveTakeaways": [
      "Climentum's public-anchor-heavy close and World Fund's growth-stage data point to the same bottleneck: Europe still funds climate hard tech, but private capital now expects more standardized proof earlier in the round [1][2][3][5][8].",
      "Industrial heat and waste-heat startups are a credible wedge because demand and policy are moving together—McKinsey sees industrial heat pumps growing faster than 15% annually, the IEA says European heat-pump sales returned to growth in 2025, and the EU is now funding industrial-heat decarbonisation directly [15][20][22].",
      "Generic VDRs, diligence suites, and investor-relations tools already cover permissions, Q&A, and analytics, so the startup only wins if it packages climate-hard-tech evidence—telemetry, techno-economics, supplier readiness, certifications, and policy exposure—better than horizontal tools can [26][27][28][29][30][31].",
      "The initial market is real but not huge: substitute pressure is high, budgets are episodic, and venture scale depends on expanding the proof-room from live fundraising into portfolio monitoring, corporate pilots, and later project-finance workflows [10][11][12][38][39][40]."
    ],
