slug: factory-pilot-proof-room
date: "2026-07-04"
executiveSummary: >-
  European climate hard-tech startups with real factory pilots are losing
  fundraising time not because they lack files, but because private capital now
  wants standardized proof on technical performance, deployment economics, and
  manufacturing readiness before it will lead a round. Climentum's public-anchor-
  heavy close, the broader European climate funding-gap research, and the
  climate-investor pulse data all support the same premise: proof packaging has
  become a live operating bottleneck rather than a finance-adjacent admin task.
  We start with Danish and German industrial heat-pump and waste-heat recovery
  startups preparing a EUR10M-EUR20M Series A after 2-5 paid factory pilots
  because that segment has acute diligence pain, concentrated channel access,
  and policy-backed market activity. The MVP is intentionally document-first: it
  turns Drive folders, pilot reports, techno-economic models, supplier files,
  and compliance documents into version-controlled answers and investor
  workspaces before attempting deep telemetry integrations. Research-backed
  market sizing is modest at about $46.3M TAM, $2.3M beachhead SAM, and $0.9M
  reachable year-3 SOM, so this is a wedge-first pre-seed plan that must earn
  expansion into portfolio monitoring and adjacent underwriting workflows rather
  than assume it. Go-to-market is channel-led by design: founders and CFOs buy
  when the board approves a raise or a lead investor requests technical
  diligence, but climate funds, board members, and diligence boutiques are the
  fastest distribution path because they see the same evidence gaps repeatedly.
  The key disconfirming risks are episodic budget, heterogeneous diligence
  checklists, and uncertain data rights for benchmark creation, so the first 12
  months are structured to falsify those assumptions quickly with paid design
  partners. Funding is sized to prove first-contract pricing, measurable
  diligence-cycle compression, and enough between-round usage to avoid becoming
  a premium data room.
problem:
  - >-
    Founders and CFOs keep rebuilding pilot telemetry, techno-economic models,
    supplier files, and certification evidence into custom answers for each
    investor or adviser, stretching live fundraising cycles when runway is
    tight.
  - >-
    Generic VDRs and investor-update tools store files but do not map
    industrial-climate evidence to the technical, commercial, and manufacturing
    questions that decide whether a private lead progresses.
  - >-
    Industrial heat deals also trigger subsidy, measurement, and compliance
    evidence requests, so startups maintain parallel packs for investors,
    customers, and policy reviewers instead of one reusable proof system.
solution:
  - >-
    A document-first proof room that ingests existing reports, models, and
    documents from Drive, Notion, and spreadsheets, then maps each artifact to a
    standard diligence schema for pilot performance, deployment economics,
    supplier readiness, certifications, and policy exposure.
  - >-
    A source-linked answer bank and external workspaces so every investor
    question points back to the underlying evidence, assumptions, and red flags
    instead of spawning new spreadsheets and email threads.
  - >-
    A between-round proof-maintenance workflow for board reporting and next-round
    readiness, giving the product a path from live-raise utility to recurring
    system of record if the retention hypothesis proves true.
whyWeWin:
  - >-
    Research shows horizontal tools already own sharing, permissions, and
    investor updates; the gap is climate-hard-tech proof translation, where
    pilot KPIs, techno-economics, supplier readiness, and compliance evidence
    need to be turned into repeatable diligence answers.
  - >-
    Starting inside one industrial-heat wedge lets the company co-design a
    reusable schema with funds and diligence advisers instead of pretending all
    climate hardware diligence is the same.
  - >-
    Repeated workflows can compound into a defensible request-template and proof-
    completeness dataset if customers permit anonymized benchmarking, something
    generic VDRs and one-off consultants do not naturally build.
strategicChoices:
  beachhead: >-
    Danish and German industrial heat-pump and waste-heat recovery startups with
    20-60 employees, 2-5 paid factory pilots, and a planned EUR10M-EUR20M
    Series A within 9 months.
  wedgeRationale: >-
    This slice already has measurable pilot data, nontrivial techno-economic and
    supplier questions, and concentrated access through climate funds and
    industrial-heat ecosystems, so one product can show time-to-proof value
    inside a live round. Selling broader European climate hardware too early
    would multiply diligence ontologies before the company knows which evidence
    modules actually repeat.
  sequencingRationale: >-
    The plan starts with a document-first product and founder-led sales because
    research flags messy source data and heterogeneous checklists as adoption
    risks; the first proof point is faster, cleaner diligence answers, not full
    data-pipeline completeness. Hiring follows the same logic: domain product and
    implementation capability first, then fund and adviser partnerships once two
    or more paid startups validate the schema, and only later deeper integrations
    or adjacent workflows.
  notYet:
    - "Grid equipment, carbon removal, and other climate-hard-tech verticals outside industrial heat"
    - "Project-finance, insurance, and corporate pilot underwriting workflows before startup fundraising retention is proven"
    - "Deep ERP, SCADA, or plant-telemetry integrations as a prerequisite for the first sale"
    - "Generic VDR replacement for non-climate companies"
market:
  tam: "$46.3M (research estimate based on 454 European deeptech deals, a 2.0 workspace-year lifecycle, and roughly $51k blended annualized value per financing cycle)"
  sam: "$2.3M (research estimate based on about 45 European industrial-heat and waste-heat startups with live Series A or extension diligence needs at roughly $51k blended ACV)"
  som: "$0.9M (research estimate based on 18 paying startup accounts reachable by year 3 through Denmark and Germany fund and adviser channels)"
  segments:
    - "Primary: European industrial heat-pump and waste-heat recovery startups with 2-5 paid pilots and an upcoming Seed extension or Series A"
    - "Secondary: Climate funds, CVC teams, and technical diligence advisers standardizing proof workflows across portfolio or target companies"
  buyingProcess: >-
    The CEO or CFO usually signs after the board approves a raise or a
    prospective lead investor asks for external technical diligence, with
    existing investors or board members often shaping vendor selection because
    they will consume the workspace too. The first contract is easiest to close
    inside a live financing budget; renewal depends on whether the proof room
    becomes the standing board-reporting and evidence-maintenance system between
    raises.
product:
  mvp: >-
    A secure proof room that ingests existing pilot reports, techno-economic
    models, supplier files, and compliance documents, maps them to a fixed
    industrial-heat diligence schema, and produces answer-linked investor
    workspaces plus red-flag summaries. The MVP is deliberately document-first
    with manual normalization, not live telemetry integration or cross-company
    benchmarking.
  sixMonth: >-
    Live with 3 design partners, reusable modules for pilot KPI summaries,
    techno-economic assumptions, supplier and certification evidence, and a
    version-controlled Q&A workflow that measures response time and completeness.
  twelveMonth: >-
    Add selective shared-folder and model-import integrations, a fund and adviser
    template library, and between-round proof-maintenance dashboards so the proof
    room stays active after the financing process closes.
  twentyFourMonth: >-
    Launch portfolio-readiness seats for climate funds and a second workflow such
    as corporate pilot underwriting or grant and project-finance readiness if
    data reuse and benchmark rights are proven in the first wedge.
  keyBets:
    - "One industrial-heat diligence schema can cover most first-pass investor questions without bespoke rebuilding."
    - "A document-first workflow can cut diligence-response time materially before deep integrations exist."
    - "Customers will renew for between-round proof maintenance rather than only for live raises."
    - "Funds and diligence advisers will trade distribution and template input for portfolio-level visibility."
gtm:
  wedge: >-
    Sell a founder-owned Series A proof room at the moment board-approved
    fundraising turns into technical diligence; the first value proposition is
    cutting weeks of repeated answer work for Danish and German industrial-heat
    startups, not being a better generic data room.
  channels:
    - "Founder-led sales via existing investors, board members, and climate funds preparing portfolio companies to raise"
    - "Referral partnerships with technical diligence boutiques and techno-economic advisers who already assemble the same evidence manually"
    - "Design-partner sourcing through industrial-heat ecosystems such as accelerator, subsidy, and association networks in DACH and Northern Europe"
  funnelTargets: "warm intro->qualified discovery 35-45%; qualified discovery->paid design partner 25-35%; design partner->annual subscription 60%+; annual account->referred second logo through funds or advisers 25%+"
  pricing: >-
    Annual subscription per startup proof room of roughly EUR24k-EUR60k plus
    EUR10k-EUR25k per live financing workspace, priced against avoided founder
    and CFO time, consultant spend, and fundraising delay rather than generic
    storage. The contract is easiest to land inside a live-round budget, so the
    plan pairs that trigger with renewal through between-round board reporting
    and proof upkeep.
businessModel:
  revenueStreams:
    - "Annual SaaS subscription per startup proof room"
    - "Per-round financing workspace and external-review launch fees"
    - "Portfolio-readiness and benchmark subscriptions for funds, CVCs, or diligence advisers once data rights are secured"
  unitOfValue: "Per startup proof room under active financing or ongoing evidence maintenance"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add additional financing workspaces and external reviewers within an existing customer"
    - "Sell portfolio seats and template libraries to climate funds and diligence advisers already in the channel"
    - "Extend the same evidence schema into corporate pilot, grant, project-finance, or insurance-readiness workflows"
strategyMap:
  northStarMetric: "Percentage of investor diligence questions answered from linked existing evidence within 24 hours"
  inputMetrics:
    - "Paying startup accounts live with at least one financing workspace"
    - "Median days from kickoff to first investor-ready proof pack"
    - "Share of diligence questions answered without net-new spreadsheet work"
    - "Monthly active usage between financing events"
    - "Number of fund or adviser templates reused across multiple accounts"
  moatsToBuild:
    - "Industrial-climate diligence ontology spanning pilot KPIs, techno-economics, supplier readiness, certifications, and policy evidence"
    - "Cross-deal benchmark dataset on proof completeness, investor question patterns, and round outcomes"
    - "Embedded distribution relationships with climate funds and technical diligence boutiques"
  killCriteria:
    - "Fewer than 3 paid startup accounts after 15 qualified design-partner opportunities in the first 12 months"
    - "In the first 3 paid accounts, less than 50% of diligence questions can be answered from the standard schema without bespoke rebuild"
    - "By month 15, fewer than half of paid accounts use the product monthly outside a live financing process"
  mermaid: |
    flowchart LR
      Wedge[Industrial heat Series A wedge] --> MVP[Document first proof room MVP]
      MVP --> Proof[24 hour answers and 3 paid accounts]
      Proof --> Expansion[Fund seats plus adjacent underwriting workflows]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Real pain and a sharp wedge, but conviction stays limited until the company proves recurring usage between rounds and a path beyond a narrow $2.3M beachhead SAM."
    whyBelieve: "The idea and research align on a live proof bottleneck, a concentrated first customer, and a competitive gap that horizontal VDR and investor-relations tools do not fill today."
    whyDoubt: "Substitutes are strong, the initial market is small, and the benchmark-data moat depends on rights and standardization that have not yet been earned."
    nextDiligence: "Look for 3 paid design partners plus evidence that one fund or adviser channel repeatedly supplies qualified accounts and that at least 30% of usage persists between financing events."
  firstCustomer:
    title: "CEO or CFO at a Danish or German industrial heat-pump startup"
    profile: "A 20-60 person industrial heat-pump or waste-heat recovery company with three paid factory pilots, no dedicated finance-ops hire, and a planned EUR10M-EUR20M Series A in the next 9 months."
    trigger: "Board approval for the raise or a lead investor's request for external technical diligence exposes that the current Drive or Notion room cannot answer pilot, techno-economic, supplier, and compliance questions fast enough."
    buyer: "CEO or CFO"
    initialContract: "EUR35k-EUR60k first-year contract combining the annual proof-room subscription and one live financing workspace, with renewal tied to board-reporting use and the next diligence event."
  mustBeTrue:
    - "At least 45 beachhead industrial-heat startups in Europe cycle through live Series A or extension diligence often enough to support the researched SAM."
    - "A standard industrial-heat schema can cover at least 70% of first-pass diligence requests across the first 5-10 accounts."
    - "The CEO or CFO will sign a EUR35k-EUR60k first-year contract from existing fundraising or operating budget without a long enterprise procurement cycle."
    - "The MVP can cut time to produce a complete investor-ready proof pack by at least 50% versus the founder-built baseline."
    - "More than half of paid accounts retain monthly use between rounds or through adjacent underwriting workflows, proving the product is not just a one-off data room."
  diligenceQuestions:
    - "How many named Danish, German, and nearby industrial-heat startups actually enter Seed extension or Series A diligence each quarter?"
    - "What overlap exists across real investor and adviser request lists, and which evidence modules are truly reusable?"
    - "Which exact budget line funds the first contract: CEO or CFO fundraising spend, finance operations, or existing investor support?"
    - "Can the company show measurable cycle-time savings before building deep telemetry integrations?"
    - "What contractual rights to anonymized benchmark data can be secured from startups, funds, and advisers without slowing sales?"
    - "Will at least one climate fund or diligence boutique commit to repeated portfolio-company referrals if the template library works?"
operatingAssumptions:
  - assumption: "Startups will pay to keep the proof room active between rounds if it also supports board reporting and evidence maintenance."
    basis: research.yaml
    validationTest: "Track monthly active usage and renewal intent across the first 3 paid accounts for at least 90 days after the live raise closes."
    decisionImpact: "If usage collapses after financings, pricing should shift toward higher per-round fees and the company should accelerate fund or adviser seats or adjacent underwriting workflows."
  - assumption: "One industrial-heat schema can standardize most core diligence requests across startups, investors, and advisers."
    basis: research.yaml
    validationTest: "Collect and normalize request lists from at least 5 climate funds or advisers and measure whether 70% or more of questions map to a common module set."
    decisionImpact: "If overlap is low, the beachhead must narrow further or the business risks becoming a services-heavy custom-data-room operation."
  - assumption: "The idea-stage pricing hypothesis of EUR24k-EUR60k subscription plus workspace fees is within buyer willingness to pay."
    basis: idea.yaml
    validationTest: "Run pricing discovery with 10 target founders or CFOs and secure 2 signed LOIs or paid pilots inside the proposed range."
    decisionImpact: "If buyers only support materially lower pricing, onboarding scope or customer mix must change to protect gross margin and funding needs rise."
  - assumption: "A document-first MVP creates enough ROI before deep integrations are built."
    basis: operator judgment
    validationTest: "In the first 2 design partners, measure kickoff-to-proof-pack time and median response time to follow-up questions against the current manual baseline."
    decisionImpact: "If cycle-time gains are marginal, integration work must move up the roadmap and time-to-revenue will lengthen."
  - assumption: "Climate funds and technical diligence boutiques will act as repeatable referral channels, not just design advisers."
    basis: research.yaml
    validationTest: "Secure 2 channel partners and measure whether each produces at least 2 qualified startup introductions within 6 months."
    decisionImpact: "If channel output is weak, the company must invest earlier in direct founder sales and may need lower ACV to land cold."
  - assumption: "Customers will grant enough anonymized data rights to build benchmark products."
    basis: research.yaml
    validationTest: "Negotiate benchmark and anonymization clauses into the first 3 paid contracts and confirm at least 2 customers accept them without delaying close."
    decisionImpact: "If data rights are unavailable, defensibility shifts to workflow depth alone and the long-term expansion case weakens."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Interview 12 target founders or CFOs and collect 5 live data rooms or diligence request lists."
    hypothesis: "The board-approved raise plus external diligence request is a reliable trigger and supports a EUR35k-EUR60k first-year contract."
    successMetric: "At least 6 of 12 buyers confirm current spend or willingness in range and 5 share real request lists."
    owner: "Founder / CEO"
  - horizon: "0-90 days"
    experiment: "Co-design the core industrial-heat schema with 3 climate funds and 2 diligence boutiques."
    hypothesis: "A reusable module set can cover most first-pass diligence questions."
    successMetric: "70%+ of sampled questions map to a shared schema with fewer than 10 required custom fields per account."
    owner: "Climate diligence lead"
  - horizon: "3-6 months"
    experiment: "Deploy the document-first MVP to 2 design partners preparing live raises."
    hypothesis: "The MVP halves time to produce an investor-ready proof pack and speeds follow-up answers."
    successMetric: "50%+ reduction in proof-pack assembly time or 24-hour response coverage for 70%+ of diligence questions."
    owner: "Founding eng"
  - horizon: "3-6 months"
    experiment: "Run one referral-channel pilot with a climate fund and one with a technical diligence boutique."
    hypothesis: "Channel partners can source qualified ICP accounts more efficiently than cold outbound."
    successMetric: "At least 4 qualified introductions and 1 paid account from the two pilots."
    owner: "Founder / partnerships"
  - horizon: "6-12 months"
    experiment: "Test between-round proof maintenance and board reporting at the first 3 paid accounts."
    hypothesis: "Customers will use the workspace monthly after the live raise closes."
    successMetric: "50%+ of accounts record monthly active use for 3 consecutive months post-raise."
    owner: "Product lead"
  - horizon: "9-15 months"
    experiment: "Offer benchmark-ready portfolio views to one fund or adviser partner using anonymized data."
    hypothesis: "Portfolio-readiness outputs create an expansion path beyond startup-only ACV without forcing a services-heavy model."
    successMetric: "One paying pilot or signed LOI for portfolio analytics with implementation hours still consistent with the gross-margin target."
    owner: "Founder / product"
operations:
  - "Secure evidence ingestion from existing Drive, Notion, and spreadsheet exports with per-investor permissions and audit logs."
  - "Version-controlled diligence ontology and template governance reviewed quarterly with design-partner funds and advisers."
  - "Standard onboarding playbook that normalizes pilot reports, techno-economic models, supplier files, and compliance documents in under 10 business days."
  - "Contracting and data-governance process for anonymization, benchmark rights, and external reviewer access."
  - "Partner operating rhythm with technical diligence boutiques for red-flag templates and escalation on measurement, verification, or compliance questions."
team:
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the secure document model, evidence-to-question mapping, and external workspace permissions before deeper integrations."
  - role: "Climate diligence / product lead"
    startTiming: "Month 0"
    rationale: "Encode industrial-heat pilot KPI, techno-economic, supplier, and compliance modules and run the first high-touch onboardings."
  - role: "Full-stack engineer"
    startTiming: "Month 4"
    rationale: "Productize the document-first workflow, shared-folder and model imports, and analytics once the first two design partners define what repeats."
  - role: "GTM / partnerships lead"
    startTiming: "Month 6"
    rationale: "Turn board, fund, and diligence-boutique introductions into a repeatable pipeline after the first proof points exist."
milestones:
  - horizon: "0-12 months"
    items:
      - "2 active design partners and 3 paid startup accounts in Denmark and Germany industrial heat"
      - "Core schema covers at least 70% of first-pass diligence questions across the first 5-10 workflows"
      - "One fund channel and one diligence-boutique channel generate repeat qualified pipeline"
      - "Median proof-pack assembly time falls by at least 50% versus the founder baseline"
  - horizon: "12-24 months"
    items:
      - "8-10 paying startup accounts and positive renewals driven by between-round use"
      - "Portfolio-readiness module live with at least 2 fund or adviser partners"
      - "Benchmark-ready anonymization rights secured in most new contracts"
      - "Selective integrations reduce onboarding below 10 business days"
  - horizon: "24-36 months"
    items:
      - "15-18 paying accounts, matching the researched year-3 reach required for roughly $0.9M SOM"
      - "Second workflow live beyond fundraising, likely portfolio monitoring or corporate pilot underwriting"
      - "Expansion decision made on adjacent industrial-climate segments only if benchmark data and renewal economics hold"
risks:
  - risk: "Budget remains tied only to live financings and disappears once a round closes."
    likelihood: High
    impact: High
    mitigation: "Design the renewal case around board reporting and proof maintenance, and use fund-sponsored portfolio preparation to smooth demand between raises."
  - risk: "Investor and adviser diligence requests vary too much for one reusable schema."
    likelihood: Medium
    impact: High
    mitigation: "Stay inside industrial heat first, co-design with a small set of funds and advisers, and permit modular custom fields above a strict core schema."
  - risk: "Horizontal VDR, investor-relations, or consultant incumbents add enough climate templates to flatten differentiation."
    likelihood: Medium
    impact: Medium
    mitigation: "Compete on source-linked proof translation, request-template depth, and benchmark-ready workflows rather than permissions or document sharing alone."
  - risk: "Customers refuse the data-rights and anonymization terms needed for benchmark products."
    likelihood: Medium
    impact: High
    mitigation: "Make benchmarking opt-in, prove standalone workflow ROI first, and avoid assuming benchmark revenue in the first 18 months."
  - risk: "Onboarding turns into a services-heavy integration project that breaks the gross-margin target."
    likelihood: Medium
    impact: High
    mitigation: "Keep the MVP document-first, enforce a standard onboarding playbook, and defer deep telemetry or plant-system integrations until a clear repeat pattern emerges."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-3M"
  runwayMonths: 18
  useOfFundsSummary: "Fund a 4-6 person team, build the document-first proof-room product, win 3-5 paying startup accounts and 2 channel partners, and prove recurring between-round usage before expanding into portfolio or underwriting workflows."
