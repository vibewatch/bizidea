jobsToBeDone:
  - job: "启动 A 轮时，帮气候硬科技创业公司的 CFO 把试点、制造和客户证据转成一间投资就绪的尽调室，让他们能在几小时内、而不是几周内答复领投基金的问题。"
    currentAlternative: "通用数据室、顾问 PPT，以及手工拼凑的表格附件。"
    successMetric: "从收到第一条尽调请求到交出完整投资就绪证据包的耗时。"
  - job: "当投资团队一个季度要筛选好几个气候硬科技项目时，帮投资经理用同一套标准比较表现证据和部署就绪度，让基金能更快出具合伙人备忘录，减少定制化尽调的开销。"
    currentAlternative: "分析师为每个项目手搭的核对清单、邮件往来和一次性顾问备忘录。"
    successMetric: "从首次会面到形成可提交投委会的尽调备忘录所需天数。"
ideaScorecard:
  signalStrength:
    score: 4
    rationale: "两条同日来源——Climentum 官方公告加一篇印证报道——让这个融资瓶颈显得足够真实，但这仍是一个以基金为中心的信号，而非广泛的市场数据集。"
  painIntensity:
    score: 4
    rationale: "对资本密集型创业公司来说，每多一轮尽调都在烧现金跑道，哪怕付费试点已经跑通，也可能让整轮融资告吹。"
  wedgeClarity:
    score: 5
    rationale: "A 轮证据包组装是一个范围很窄的工作流，责任人明确、触发时机清晰，现有工具也很弱。"
  defensibility:
    score: 4
    rationale: "护城河来自针对该品类的尽调框架，以及关于哪些证据能真正促成成交的基准数据，而不只是通用文件存储。"
  ventureScale:
    score: 4
    rationale: "这个切口能从欧洲气候硬科技融资，扩展到项目融资、保险以及工业脱碳领域的投资组合分析。"
topRisks:
  - name: 预算断续
    description: "创业公司可能把融资工具当成短期采购，不愿在没有实时轮次时继续付费。"
    mitigation: "把产品锚定在轮次之间持续运转的董事会报告和证据维护上，并通过希望每家被投公司都准备充分的基金拿下分发渠道。"
  - name: 投资人诉求各异
    description: "不同基金和尽调顾问可能提出互不兼容的技术问题，削弱标准化工作流的价值。"
    mitigation: "先在工业热能这样单一细分领域落地，与 5—10 家活跃的气候投资人共同设计核心框架，同时在上层保留自定义模块的空间。"
  - name: 通用 VDR 捆绑冲击
    description: "一旦这个品类被证明有价值，虚拟数据室、顾问机构或创业财务平台都可能加上轻量级的尽调模板。"
    mitigation: "靠气候硬科技本体论、遥测与技术经济模型集成，以及通用厂商短期内难以复制的举证门槛基准数据来构筑差异化。"
