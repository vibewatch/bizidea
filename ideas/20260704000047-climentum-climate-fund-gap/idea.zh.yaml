problem: >-
  欧洲气候硬科技创业公司哪怕已经跑通真实的工厂试点，下一轮融资时用的还是临时拼凑的
  Google Drive 文件夹、顾问 PPT 和一次性表格答复。私人投资人越来越挑剔、技术举证门槛越来越高，
  创始人只能一遍遍重新打包同一批试点数据、资本支出假设、客户节省测算和供应链证据，来应付每一条
  新的尽调线索。通用数据室只会存文件，却翻译不出如今决定私人 A 轮能否成交的那些具体技术、商业和
  制造问题。
targetUser:
  primary: "跑完 2—5 个付费工厂试点、正筹备 A 轮的欧洲工业效率硬科技创业公司的 CEO、CFO 或财务负责人。"
  secondary: "评估这些创业公司、并在多笔交易中复用同一证据工作区的气候种子基金、企业风投团队和技术尽调顾问。"
  buyer: "亲自操盘融资的 20—80 人规模气候硬科技创业公司的 CEO 或 CFO。"
startupThesis:
  nonObviousInsight: >-
    欧洲气候硬科技如今稀缺的不只是资本，而是标准化的证据。公共锚定资本可以容忍量身定制的故事讲法，
    但私人 LP 和领投方现在要求先看到试点表现、部署经济性和供应链就绪度上可比的证据，才愿意承销
    一轮融资。谁能把杂乱的工厂证据变成可复用的尽调资产，谁就成了融资乃至后续项目融资的基础设施。
  beachhead: "跑完 2—5 个付费工厂试点、计划 9 个月内启动 A 轮的欧洲余热回收和工业热泵创业公司。"
  wedge: "一间验证室：吃进试点遥测数据、客户节省报告、技术经济模型、供应商文件和制造证据，再把它们映射成投资就绪的尽调问答和可复用工作区。"
  whyNowCatalyst: "Climentum 由公共资本锚定的首轮关账，加上其明确警告融资周期正在拉长，说明私人气候资本现在要求更早拿到结构化证据——尽调材料打包已经成为创业公司下一轮融资前的现实瓶颈。"
  ventureScalePath: >-
    先切入气候硬科技 A 轮融资，再扩展到企业试点承保、项目融资就绪度评估、保险申报，以及面向
    支持工业脱碳的基金的基准数据产品。
solution: >-
  打造一间服务气候硬科技融资的验证室。平台直接从创始人现有系统里吃进试点遥测数据、客户节省报告、
  资本支出模型、认证文件、供应商资质数据和董事会已批准的融资材料，把每一份材料映射进一套标准化
  尽调框架——覆盖技术表现、部署经济性、制造就绪度和政策风险。系统随之生成实时投资人工作区、版本
  可追溯的答案库和红旗摘要。领投基金、CVC 和技术顾问拿到的是只读门户，后续追问始终锚定在具体
  证据上，而不是没完没了的邮件往来。随着时间推移，公司还能沉淀出一套基准数据，看清工业热能、
  电网设备、供应链韧性硬件等细分领域里到底哪些证据真正能撬动私人资本。
goToMarketSeed:
  firstCustomer: "一家 20—60 人规模的丹麦或德国工业热泵/余热回收创业公司，已跑完三个付费工厂试点，A 轮目标 1000 万—2000 万欧元，还没有专职财务运营岗位。"
  buyingTrigger: "董事会批准启动 A 轮流程，或某位潜在领投人在合伙人会议后要求外部技术尽调。"
  currentAlternative: "创始人自建的 Google Drive 或 Notion 数据室、顾问制作的技术经济模型、临时拼凑的试点表格，以及靠邮件往来的问答。"
  switchingReason: "产品把实时试点证据变成一份可复用、投资人看得懂的证据包，能扛住每一轮新的尽调请求，省下数周的重复劳动。"
  pricingHypothesis: "每家公司年费 2.4 万—6 万欧元，外加每开放一个实时融资工作区给外部投资人收取 1 万—2.5 万欧元。"
whyNow:
  - point: "如果首轮 6000 万欧元里有 5500 万来自公共和半公共锚定资本，创始人就不能再指望私人跟投资本会为只靠故事撑起的轮次买单。"
    signalRefs: [公共资本主导本轮关账]
    sourceRefs: [2]
  - point: "融资周期拉长、举证门槛提高，让尽调准备从一次性财务任务变成任何计划下一轮融资的创业公司都要长期运转的工作流。"
    signalRefs: [私人 LP 的举证门槛正在提高]
    sourceRefs: [2]
  - point: "Climentum 依然在主导能源安全、工业效率和供应链稳定领域的种子轮和 A 轮，赢家会是最快跨过举证门槛的创业公司，而不是坐等市场重新开闸的那些。"
    signalRefs: [战略级气候硬科技依然拿得到钱]
    sourceRefs: [1]
  - point: "Climentum 把二期基金定位为对更严峻融资环境的回应，说明这个瓶颈已是当下的系统性问题，而不是某种假设中的未来放缓。"
    signalRefs: [基金管理人正在应对一个变了的市场]
    sourceRefs: [1]
  - point: "一家工会加入 LP 阵营，说明气候硬科技正在吸引不那么专业的资本，这提高了对非专业投资人也能快速看懂的标准化证据的需求。"
    signalRefs: [新型 LP 需要更简单的尽调]
    sourceRefs: [2]
differentiator: >-
  通用虚拟数据室不过是文件柜，融资 CRM 追踪的是人际关系，但两者都不懂气候硬科技轮次到底靠什么
  赢下来：实测试点成果、投资回收假设、BOM 风险、认证和制造就绪度。这家公司卖的是一套专为此打造的
  尽调本体论，配合协作工作流，让每一个投资人问题都锚定在底层技术证据上。随着越来越多轮次经由这套
  产品跑通，它还会沉淀出一套专有基准数据，说清楚到底哪些举证门槛能把工业气候交易从好奇心变成
  真信念——这是顾问和 VDR 厂商天生积累不出来的东西。
