differentiator: 机器人 OEM 看板优化的是单支车队的在线率，但门店运营者需要的是另一套系统：决定清洁任务什么时候跑、要不要人接手、顾客体验有没有扛住。这家公司占住的是运营侧的工作流和基准层——先跨门店，最终跨机器人厂商。它的护城河来自连锁级数据：真实公共场景里的中断率、清洁覆盖和人力产出，而 OEM 一次只能看到自己那一支车队。
