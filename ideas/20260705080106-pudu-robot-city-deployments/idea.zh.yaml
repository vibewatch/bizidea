problem: 区域性杂货连锁如今已经能签下清洁机器人的部署合同，但每家营业中门店的客流高峰、补货窗口、平面布局，以及店长对机器人绕着顾客作业的容忍度，都各不相同。多数连锁还是按固定时段或主管人工干预来跑机器人，利用率被压低，也给顾客体验埋下风险。第二个痛点是要证明到底哪些门店真省下了人力或外包清洁开支；于是想把项目扩到头 10–20 家店以外时，就会变成部门之间的政治博弈，而不是一场靠数据推进的推广。
targetUser:
  primary: 瑞士或 DACH 杂货连锁的门店运营副总裁或设施卓越负责人——所在连锁正把自主清洁机器人从试点门店推广到区域网络
  secondary: 负责多家营业中门店的作业标准与异常处理的区域设施或清洁项目经理
  buyer: COO、门店运营高级副总裁，或设施自动化负责人
startupThesis:
  nonObviousInsight: 公共空间服务机器人真正难的，已经不是证明机器人能不能在真实场馆里移动。一旦厂商能在超市、酒店、车站广场都跑起来，还能拿下 200 家门店的清洁部署，稀缺的那一层就变成运营侧的班次调度——把机器人与客流、人力安排和完工证明对齐。
  beachhead: 把自主地面清洁机器人从 10 家试点店推广到 50–300 家日间客流高的城市门店的瑞士和 DACH 杂货连锁。
  wedge: 一个厂商中立的门店运营层：围着客流和补货窗口安排清洁任务，分派人工介入，并按门店证明覆盖完成度和省下的人力。
  whyNowCatalyst: Pudu 在达沃斯的真实部署，加上 Denner 的 200 店部署，都说明下一笔采购决策不再是“服务机器人能不能用”，而是“哪家连锁能在不伤顾客体验的前提下把它跨门店标准化”。
  ventureScalePath: 先从杂货门店的地面清洁项目切入，再把同一套运营侧工作流层扩到酒店公共区域、车站通道、机场、医院，以及混合厂商车队。长期看，这家公司会成为公共空间服务机器人领域的权威记录系统，沉淀利用率基准、人力交接和扩张就绪度这些数据。
solution: Grocery Robot Shift OS 会吃进门店营业时间、清洁区域、到货窗口、排班规则和机器人遥测，为每个点位产出可复制的班次方案。它会告诉经理：机器人什么时候该自主作业、什么时候要在客流高峰先停一停、什么时候该升级给店员或清洁承包商。产品还会按门店对比覆盖完成度、中断率和省下的人力分钟，让区域负责人清楚哪些操作手册值得在全连锁推广。时间一长，公司卖的就不再是又一个 OEM 看板，而是公共空间服务机器人生产率的运营控制平面和数据集。
goToMarketSeed:
  firstCustomer: 一家在瑞士或德国拥有 40–200 家门店的杂货连锁，已经跑着 5–15 个清洁机器人试点，并且在下一个购物旺季前签了扩张计划。
  buyingTrigger: 连锁批准把项目从试点扩展到区域或全国，需要证明机器人能在营业时段清洁，又不伤客流和劳动生产率。
  currentAlternative: OEM 车队看板、固定清洁排班、主管检查清单，以及靠电话或 WhatsApp 处理异常的设施承包商
  switchingReason: 这个切口让连锁能在营业时段跑机器人、减少打扰顾客，同时沉淀 OEM 看板和清洁承包商都给不出的门店级 ROI 证据。
  pricingHypothesis: 按活跃门店收年费订阅，每接入一家机器人厂商再收一笔接入费，区域基准模块单独定价。
