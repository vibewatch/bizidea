topRisks:
- name: OEM 打包
  description: 机器人厂商可能把基础排班直接塞进车队看板里，并宣称自己已经解决了运营工作流。
  mitigation: 先从多点位运营分析和跨厂商基准切入，这些都不是 OEM 点状方案能轻易给出的。
- name: 运营数据太薄
  description: 有些门店可能拿不到可靠的客流或任务数据，动态排班只能退回粗规则，ROI 说服力也会被削弱。
  mitigation: 第一版先靠门店营业时间、到货窗口和机器人遥测这些简单输入跑通，再在条件成熟时叠加更丰富的客流数据。
- name: 预算归属不清
  description: 门店运营、设施团队和外包清洁伙伴都碰得到这个痛点，新的软件预算很容易卡在职能之间。
  mitigation: 抓住试点升级成 20+ 家门店部署或清洁合同续约的时点去卖，把产品定位成一笔能撑起推广、还能量化人力与在线率收益的支出。
