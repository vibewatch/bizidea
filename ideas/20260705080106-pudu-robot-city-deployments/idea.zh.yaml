jobsToBeDone:
- job: 当杂货连锁把机器人清洁从试点往外扩时，帮门店运营负责人围着客流把每日班次标准化，这样扩张时既不会招来顾客投诉，也不用主管一直盯着。
  currentAlternative: OEM 控制台，加上固定清洁排班和经理临时人工干预
  successMetric: 按计划安排的机器人清洁窗口里，不需要人工接管、也没有顾客被打扰事件的完成占比
- job: 当 COO 追问机器人清洁到底值不值时，帮区域设施负责人拿出按门店拆开的人工与覆盖收益，好为全国推广提供依据，或据此重新谈判清洁合同。
  currentAlternative: 承包商发票、人工审计，以及门店经理的零散反馈
  successMetric: 按门店批次统计的人工节省分钟数和清洁覆盖稳定性
