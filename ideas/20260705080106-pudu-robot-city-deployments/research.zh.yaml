competitors:
- name: Pudu Robotics
  stage: 成长型
  wedge: 面向零售、酒店和公共空间的一体化商用服务机器人，覆盖清洁和移动营销等场景。
  pricing: 通过演示或伙伴销售给出定制化硬件与方案报价
  strength: 有扎实的瑞士杂货和公共空间部署证据，装机基础也广，且产品线覆盖多个零售相关场景。
  weaknessVsUs: 它是厂商专属栈，重心仍在 Pudu 车队本身，而不是厂商中立的跨门店政策、基准和人工介入工作流。
  sourceRefs:
  - 1
  - 2
  - 4
  - 5
  - 7
- name: Brain Corp / Tennant
  stage: 在位企业
  wedge: 自主导航平台，加上 OEM 洗地机和面向大规模商用清洁的运营管理工具。
  pricing: 通过 Tennant 或伙伴渠道给企业级报价
  strength: 自主能力成熟、能进 FM 渠道，而且有可信的零售/公共空间案例。
  weaknessVsUs: 更擅长优化机器人和 OEM 生态本身，对跨混合厂商的连锁门店运营工作流并没有那么强的主见。
  sourceRefs:
  - 17
  - 18
  - 20
  - 21
  - 32
- name: Avidbots
  stage: 成长型
  wedge: 自主洗地机器人，加上 Command Center 分析层、客户成功体系和 ROI 驱动销售。
  pricing: 以 ROI 工具和演示支撑的定制化报价
  strength: 车队管理数据能力强，也有可信的零售和 FM 部署证据。
  weaknessVsUs: 它仍然锚定在 Avidbots 自家硬件上，不是一个为连锁推广治理而生的厂商中立操作系统。
  sourceRefs:
  - 37
  - 38
  - 41
  - 47
- name: Gausium
  stage: 成长型
  wedge: 面向零售和合同清洁的广谱商用清洁机器人产品线，配套大量门店业态案例。
  pricing: 通过经销商或专家报价
  strength: 零售案例扎实、合同清洁导向明确，而且形态丰富。
  weaknessVsUs: 仍然是 OEM 主导、产品导向；真正跨混合车队和连锁系统的运营侧调度仍是次要能力。
  sourceRefs:
  - 56
  - 57
  - 59
  - 60
  - 62
  - 66
