    sourceRefs:
    - 56
    - 59
  adoptionFrictionMatrix:
  - friction: 把每家门店的营业时间、补货窗口和清洁规则编码进经理真正信得过的排班里
    severity: high
    affectedBuyer: 门店运营副总裁
    mitigation: 先从区域模板和分时段政策起步，等营业时段可靠性被证明后，再叠更动态的优化。
    sourceRefs:
    - 1
    - 17
    - 18
    - 22
    - 56
  - friction: 说服门店经理相信：机器人可以在真实顾客流量下作业，而且不伤顾客体验
    severity: high
    affectedBuyer: 区域设施负责人
    mitigation: 先拿边界清晰的任务落地，配上明确的暂停/恢复规则和人工介入闭环，而不是一上来就承诺“全场景全自主”。
    sourceRefs:
    - 2
    - 22
    - 41
    - 60
    - 61
  - friction: 在买方已经觉得厂商专有看板“挺有用”的前提下，再争一笔新预算
    severity: medium
    affectedBuyer: 设施自动化负责人
    mitigation: 差异化要压在跨厂商基准、清洁完成证明和推广就绪度分析上，而不是基础车队可视化。
    sourceRefs:
    - 17
    - 38
    - 56
    - 59
    - 66
  - friction: 在不踩隐私红线的前提下，使用客流或视频推导出来的信号
    severity: medium
    affectedBuyer: CIO 或数据保护官
    mitigation: 先证明非 PII 门店信号和机器人遥测就能跑出价值；任何更丰富的感知层，都只在隐私内建控制足够强时再上。
    sourceRefs:
    - 94
    - 95
    - 97
