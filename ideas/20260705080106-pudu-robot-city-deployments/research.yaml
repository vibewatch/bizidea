    - 59
  - case: Privacy or safety constraints limit richer analytics
    impact: If buyers are uncomfortable with shopper-video or employee-monitoring implications, the product should prove value first from non-PII inputs such as hours, zones, delivery windows, and robot telemetry.
    sourceRefs:
    - 92
