openQuestions:
- How many schedule overrides or rescue events happen per store per week once robots begin daytime cleaning in DACH grocery environments?
- Do target chains require vendor neutrality before they run mixed fleets, or is a single-OEM-first control layer good enough for the first two years?
- 'Which function truly owns the budget and KPI set at rollout time: store operations, facilities excellence, or the outsourced cleaning partner?'
- Can non-PII store signals such as hours, deliveries, staffing rosters, and task logs create enough value before any richer footfall analytics are introduced?
