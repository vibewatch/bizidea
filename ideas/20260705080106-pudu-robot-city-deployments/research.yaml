  validationPlan:
  - priority: high
    question: How many manual overrides, pauses, or rescue events occur per store per week once robots start cleaning during trading hours?
    evidenceToGather: Mission logs, override tickets, and store-manager notes from 5-10 live pilot or rollout stores.
  - priority: high
    question: 'Which budget owner signs first: store operations, facilities excellence, or the FM provider?'
    evidenceToGather: Current-state spend maps, org charts, and procurement notes from 6-8 DACH chain or FM opportunities.
  - priority: medium
    question: Is vendor neutrality a day-one requirement or only valuable once mixed fleets appear?
    evidenceToGather: Robot roadmap interviews with target chains, integrators, and FM operators plus current OEM concentration data.
  - priority: medium
    question: How much value can be created without any shopper-identifying video or footfall analytics?
    evidenceToGather: A design-partner experiment comparing schedule quality from basic store inputs versus richer traffic signals.
