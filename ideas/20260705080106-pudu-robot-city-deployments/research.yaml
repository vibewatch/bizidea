  sensitivityCases:
  - case: OEM suites improve faster than expected
    impact: If OEM dashboards become meaningfully better at multi-site scheduling and benchmarking, the startup must differentiate on vendor neutrality, regional rollout governance, and outcome analytics rather than basic mission planning.
    sourceRefs:
    - 17
