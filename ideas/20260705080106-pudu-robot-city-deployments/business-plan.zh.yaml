slug: grocery-robot-shift-os
date: '2026-07-05'
executiveSummary: 杂货连锁正在把地面清洁机器人从 5–15 家试点店推向 50–300 家真实营业门店，Grocery Robot Shift OS 应先从这批客户的运营侧调度层切入。研究显示，采用触发点已经成立：Denner 正在瑞士部署 200 台 PUDU 机器人，Rossmann 披露了 200+ 家门店部署，多个厂商也开始主打营业时段门店清洁。最尖锐的痛点不是机器人会不会导航，而是每家门店怎么围着客流、补货窗口、排班和人工救场来安排清洁。MVP 应压在 OEM 看板之上，用门店营业时间、区域、到货窗口、排班规则和机器人遥测来设定分时段计划、路由异常，并按门店产出清洁完成证明和 ROI 证据。最佳首单客户是一家瑞士或德国、拥有 40–200 家门店的杂货商，或由 FM 主导的杂货项目：它已经批准在下一轮旺季或清洁合同续约前扩张。GTM 应由创始人主导，围绕事件触发来卖：连锁需要推广治理时，先卖一个付费区域试点；买方看到效果后，再沿同一客户扩到更多门店、区域和 OEM 集成。刻意取舍也很清楚：不替代机器人控制，不依赖可识别顾客的视频，也不在杂货场景跑出基准数据前追酒店、机场或医院。如果公司赢下来，护城河不是某个单一排班算法，而是一套跨真实营业门店、跨厂商归一化的数据集，记录中断率、排班执行率、覆盖完成度和人力再配置。最大的尽调缺口是：人工接管频率到底够不够高，能不能撑起一层独立软件；预算究竟归哪个职能；连锁采用混合车队之前，厂商中立到底有多重要。DACH 杂货这个滩头市场靠谱但不大，所以只有早期试点证明同一客户内扩张，并跑出切进 FM 项目和邻近公共空间场景的路径，公司才有风投故事。
problem:
- 进入推广阶段的杂货连锁，仍然靠固定窗口、主管人工干预和 OEM 看板来给地面清洁机器人排班，而这些工具根本没把每家门店的客流高峰、到货窗口和经理规则编码进去。
- 总部拿不出哪家门店真正完成了覆盖、释放了人力，所以项目一旦想从第一批门店继续扩张，就会变成运营、设施和清洁合作方之间的政治争论。
solution:
- 做一套厂商中立的班次 OS，把门店营业时间、区域、排班规则、到货窗口和机器人遥测拼起来，决定每次清洁任务什么时候跑、什么时候暂停、什么时候升级给人工。
- 给区域负责人一层证明系统，按门店、区域和 OEM 输出排班执行率、中断率、覆盖完成度和人力再分配基准，让推广决策回到数据。
whyWeWin:
- 第一笔销售直接挂在真实部署或合同续约事件上，产品可以借现成自动化预算起飞，而不用自己发明一条新预算科目。
- MVP 靠非 PII 的运营输入就能证明价值，而且能叠在现有 OEM 栈上，部署更快，也更不容易被隐私和 IT 团队卡住。
- 跨厂商、跨 FM 合作方的跨门店基准和推广治理，是 OEM 看板和人工服务天然都不拥有的工作流。
strategicChoices:
  beachhead: 瑞士和德国杂货连锁，或它们背后的 FM 运营方；它们正把自主地面清洁机器人从试点门店扩到 20–100 家日间客流高的城市门店。
  wedgeRationale: 先卖推广治理这个工作流，比卖一个泛机器人运营平台更容易尽快证明价值，因为单一区域在一个季度内就能量化人工接管、中断事件、排班执行率和人力释放。
  sequencingRationale: 先在一个杂货区域做规则驱动的排班、异常路由和 ROI 报告，因为第一道未知数是运营信任，不是自主优化。趁推广审批窗口直销给运营和设施负责人，只在真实客户需要时补 OEM 集成；等第一家连锁从试点跑到生产部署，再去招 FM 和集成商渠道。
  notYet:
  - 在杂货场景还没跑出可复制门店模板前，不碰酒店、机场、医院和交通枢纽。
  - 在非 PII 排班数据还没用尽前，不上顾客视频或客流分析，以免平白增加隐私复杂度。
  - 不做完整 OEM 替代，也不进厂商安全边界内做闭环机器人控制。
  - 不碰配送、营销或安防等更宽泛的服务机器人品类。
market:
  tam: 估算的滩头 TAM 为 $23.2M：取 DACH 6 个保守连锁品牌的 11,026 家官方门店，假设其中 35% 属于高匹配门店，再按每个活跃门店每年约 $6,000 的软件价值计算。
  sam: 估算的 SAM 为 $9.4M：把 TAM 收窄到约 12 个瑞士、奥地利和德国的初始推广项目，总计约 1,560 家门店，按每家活跃门店每年约 $6,000 计算。
  som: 估算的第 3 年 SOM 为 $2.4M：假设拿下 4–6 家连锁或 FM 主导项目中的 400 家活跃门店，每家门店年价值约 $6,000。
  segments:
  - 在多门店网络里扩张清洁机器人的 DACH 杂货连锁
  - 为这些连锁运营机器人清洁项目的 FM 服务商和集成商
  buyingProcess: 运营侧的内部推动者通常是门店运营副总裁、设施卓越负责人或区域清洁项目经理，他们负责推广一致性。等试点继续扩张，或清洁合同续约需要门店级 ROI 证明时，预算大概率由 COO、运营高级副总裁或 FM 项目负责人批准。
product:
  mvp: MVP 应该覆盖单一区域的 5–15 家门店，吃进门店营业时间、区域、到货窗口、排班规则和机器人任务遥测，产出获批的分时段排班、暂停/恢复规则、人工介入工单和每周门店评分卡。只要还没在第一家客户身上证明中断更少、推广治理更稳，就先别碰顾客可识别视频、定制 BI 和深度机器人控制功能。
  sixMonth: 上线一个付费区域试点，提供门店模板、分时段排班、人工异常路由，以及每周的清洁完成证明和人力释放复盘。
  twelveMonth: 把第一个试点转成 20+ 家门店的生产部署，接上 2 个 OEM 遥测适配器，并交付横向比较不同门店批次中断率、排班执行率和覆盖完成度的基准视图。
  twentyFourMonth: 支持混合厂商的杂货项目，为新门店和新区域增加推广就绪度评分，并在一个相邻的 FM 主导公共空间清洁项目里验证同一层运营系统。
  keyBets:
  - 不用实时顾客视频分析，只靠非 PII 输入，也能把门店级排班质量明显拉起来。
  - 买方会愿意为工作流管控和 ROI 证明付费，而不是要求 OEM 看板顺手免费打包。
  - 从一个推广区域在同一客户内扩到几十家门店，比四处追新客户更快也更便宜。
  - 跨门店、跨厂商的基准数据，最终会比排班逻辑本身更有防守力。
gtm:
  wedge: 当一家 40–200 店的杂货商或 FM 运营方，正把 5–15 家门店的机器人试点在旺季前或合同续约前往外扩时，先卖一个付费的推广治理试点。等买方看到人工介入更少、营业时段执行更稳、门店级 ROI 证明更扎实，再转成年费的按店软件。
  channels:
  - 由创始人直接销售给 DACH 杂货连锁里的门店运营、设施卓越和清洁项目负责人
  - 从一个区域试点在同一连锁内继续扩到更多门店或更多品牌
  - 等第一家杂货部署跑通可复制的接入流程和遥测访问后，再选择性引入 OEM、FM 和集成商联合销售
  funnelTargets: 每季度 8–12 个目标客户对话 -> 15–25% 付费试点率 -> 60%+ 试点转正式生产 -> 12 个月内 70%+ 的首个客户再扩 20+ 家门店。
  pricing: 8–12 周的付费试点，覆盖 5–15 家门店，价格约 $30k-$75k；之后按每个活跃门店每年约 $4k-$8k 收费，再加上每个 OEM 集成的接入费和可选的区域基准模块。这一价格带与研究里每家门店约 $6k 的混合价值一致，也让价格跟着推广规模走，而不是跟着机器人资本开支走。
businessModel:
  revenueStreams:
  - 按活跃门店收年费，提供班次调度和基准层
  - 按每个 OEM 遥测连接或大型推广批次收接入和集成费用
  - 给同时管理多个项目的连锁或 FM 运营方卖高阶区域基准和推广就绪度模块
  unitOfValue: 处于活跃班次调度和清洁完成证明报告下的活跃杂货门店。
  targetGrossMarginPct: 70
  expansionLevers:
  - 从一个试点区域继续扩到同一杂货客户里的更多门店和更多品牌
  - 把同一套控制层卖给为多个零售商运营机器人清洁项目的 FM 运营方
  - 当多个 OEM 同时在场时，增加混合厂商基准和推广就绪度分析
  - 只有在杂货操作手册和基准被信任后，才进入相邻的公共空间清洁场景
strategyMap:
  northStarMetric: 在营业时段按计划完成清洁、且没有人工接管或顾客被打扰事件的门店周数。
  inputMetrics:
  - 按计划完成的清洁窗口占比
  - 每店每周的人工暂停、救场或接管事件数
  - 按区域和分时段统计的覆盖完成度
  - 按门店批次记录的人力分钟或承包商投入再分配
  - 试点转正式生产，以及区域到区域的扩张率
  moatsToBuild:
  - 把排班设计、中断率、覆盖完成度和人力结果按门店串起来的厂商归一化数据集
  - 覆盖不同杂货业态的分时段政策、区域模板和人工介入规则库
  - 告诉连锁和 FM 运营方哪些门店、哪些项目已经可以扩张的基准层
  killCriteria:
  - 如果前 3 个付费试点在 12 周内都做不到把人工暂停或接管事件至少压低 25%，那这个调度切口就太弱。
  - 如果前 8 个合格的推广阶段线索里，不到 2 家愿意明确预算归属方并给付费试点，那说明直销杂货 GTM 路子错了。
  - 如果第一家生产客户在 9 个月内都没从初始批次继续扩张，同一客户内扩张的经济性就不够硬。
  mermaid: |
    flowchart LR
      Wedge[Rollout-stage grocery chain pilot] --> MVP[Rules-based scheduling and exception routing]
      MVP --> Proof[Lower interruptions and store-level ROI proof]
      Proof --> Expansion[Regional expansion then FM and adjacent venue programs]
investorMemo:
  verdict:
    call: 观察
    conviction: 中等兴趣：触发事件和工作流是连贯的，但独立预算、人工接管频率，以及走出 DACH 杂货后的扩张证据还偏薄。
    whyBelieve: 多门店杂货推广现在就已经在发生，而运营侧工作流也并没有被某一家 OEM 或 FM 服务商明确占住。
    whyDoubt: 滩头市场偏小、竞争也拥挤；除非早期试点真能打出明显的运营增益，否则买方很可能觉得厂商专有工具或 FM 服务就“够用了”。
    nextDiligence: 在把它当成风投级软件品类之前，先和 6–8 家处于推广阶段的 DACH 连锁或 FM 运营方核验人工接管频率、预算归属，以及对付费试点的接受度。
  firstCustomer:
    title: 一家拥有 40–200 家门店的瑞士或德国杂货连锁里的门店运营副总裁或区域设施负责人
    profile: 这家杂货连锁已经让 5–15 台清洁机器人上线，批准把项目扩到 20–100 家更高客流门店，而区域经理现在还在靠人工协调排班和异常。
    trigger: 在购物旺季前，或在需要门店级 ROI 证据的清洁合同续约期间，批准把项目从试点推进到推广。
    buyer: 门店运营高级副总裁
    initialContract: $30k-$75k 的付费区域试点，覆盖 5–15 家门店；如果中断、覆盖和人力释放目标达标，再转成覆盖 20–50 家活跃门店、年费约 $120k-$300k 的软件合同，并加上接入服务。
  mustBeTrue:
  - 进入推广阶段的杂货项目，必须有足够多的营业时段暂停、救场或接管事件，才能撑起一笔独立的调度预算。
  - 经济买方必须愿意为一层叠加式产品买单，而不是默认 OEM 看板或 FM 运营方会免费把这套工作流吸收掉。
  - 营业时间、区域、到货、排班和机器人遥测这些非 PII 输入，必须能在一个季度内把排班执行率拉起来、把中断压下去。
  - 一个成功的区域试点，必须能在 12 个月内在同一客户内继续扩到至少 20 家新门店。
  - 在 OEM 或 FM 服务商用打包工具补齐缺口前，厂商归一化基准必须先长成战略资产。
  diligenceQuestions:
  - 当前杂货清洁推广里，每家门店每周到底会发生多少次人工救场、暂停或接管？
  - 第一笔合同到底由谁签、谁续？是门店运营、设施团队，还是 FM 运营方？
  - 目标 OEM 的 API 对任务状态、排班和异常钩子的开放程度到底有多高，够不够支撑一层叠加层产品？
  - 在连锁跑混合车队之前，它们愿不愿意付费，还是说厂商中立只在后期才有价值？
  - 把接入和人工介入成本都算进去之后，还剩下多少人力或承包商节省？
operatingAssumptions:
- assumption: 营业时段的杂货清洁会产生足够多的人工异常，足以支撑“把问题压低 25%”的目标和一笔独立软件采购。
  basis: research.yaml
  validationTest: 收集 5–10 家门店的任务日志、接管工单和经理备注，验证基线是否达到每店每周至少 3 次暂停、救场或接管事件，或达到同等管理负担。
  decisionImpact: 如果不成立，公司就该把范围收窄到基准分析或报告软件，或者直接放弃把杂货当第一切口。
- assumption: 在推广或合同续约时点，必须存在一个明确的预算归属方，并且愿意从现有自动化、设施或 FM 预算里拨钱做付费试点。
  basis: research.yaml
  validationTest: 从 6–8 个潜在客户里拿到 2 份书面试点范围，明确经济买方、预算来源和成功指标。
  decisionImpact: 如果不成立，公司就得通过 OEM 或 FM 渠道落地、压低试点价格，或者接受更长的企业销售周期。
- assumption: 营业时间、区域、到货、排班规则和机器人遥测这些非 PII 数据，在引入视频分析前就足以把营业时段执行质量拉起来。
  basis: research.yaml
  validationTest: 在 5 家门店上对照当前固定排班做 A/B，证明在不使用可识别顾客数据的前提下，计划窗口完成率至少提升 10 个点，或人工介入至少下降 20%。
  decisionImpact: 如果不成立，产品范围就会被迫扩进高隐私敏感的数据采集，GTM 时间线也会明显变慢。
- assumption: 厂商中立在早期就有意义，因为连锁在还没上混合车队前，也会想要一层运营侧管控。
  basis: idea.yaml
  validationTest: 让 6 个潜在客户给跨厂商基准和 OEM 工具排优先级，并至少签下 1 个试点：即使今天只用单一 OEM，买方也接受叠加层产品。
  decisionImpact: 如果不成立，公司就该先做 OEM 专属或 FM 专属的工作流层，同时下调围绕“中立”的护城河叙事。
- assumption: 同一客户内扩张必须能多拿 20+ 家门店，而且实施工作不能吃掉第一年 ARR 的 20% 以上。
  basis: research.yaml
  validationTest: 转正第一个试点后，在 45 天内上线第二批门店，并持续跟踪实施投入占已签 ARR 的比例。
  decisionImpact: 如果不成立，毛利、招聘需求和风投经济性都会恶化，公司可能得转向更重服务的模式。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 8 家处于推广阶段的连锁和 FM 运营方，画清买入触发点、预算归属方和试点范围。
  hypothesis: 推广审批和清洁合同续约会带来短期试点紧迫性，而且经济买方可以被明确识别。
  successMetric: 6 次以上访谈确认存在真实触发点，且有 2 个账户同意进入试点范围设计。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 从 5–10 家真实门店收集任务日志，量化不同分时段的暂停、救场和接管基线。
  hypothesis: 人工异常负担足够大，足以支撑一个调度产品，而不只是报表插件。
  successMetric: 至少 1 个潜在客户的基线足以支撑 25% 的压降目标和每周高管汇报需求。
  owner: 创始产品/运营
- horizon: 3–6 个月
  experiment: 在一个 5–15 家门店的试点里，上线规则驱动排班和异常工单，不用视频或客流数据。
  hypothesis: 非 PII 输入能足够快地改善营业时段执行，从而撑起生产部署。
  successMetric: 12 周内，计划窗口完成率提升，或人工介入下降至少 20%。
  owner: 创始工程师
- horizon: 6–9 个月
  experiment: 给试点区域加上每周 ROI 评分卡和推广就绪度基准。
  hypothesis: 门店级清洁完成证明和人力释放，比单纯排班更能推动转正。
  successMetric: 试点转成年合同，且买方批准扩到 20 家以上门店。
  owner: 创始产品/运营
- horizon: 9–12 个月
  experiment: 做第二个 OEM 适配器或面向 FM 的工作流，并把接入操作手册复用到新一批门店。
  hypothesis: 集成复用能把部署时间压到足以支撑 70% 毛利目标。
  successMetric: 第二批门店在 30 天内上线，实施投入低于第一年 ARR 的 20%。
  owner: 实施负责人
- horizon: 12–18 个月
  experiment: 在第一家连锁之外，测试一个 FM 主导或混合厂商的杂货项目。
  hypothesis: 公司能把厂商中立的管控能力卖到第一家 OEM 和第一家客户之外。
  successMetric: 拿下或上线 1 个第二客户，它的 OEM 组合不同，并在采购决策里真的使用基准层。
  owner: 创始人/CEO
operations:
- 建立 OEM 遥测适配流程，把各家机器人厂商的排班状态、任务状态和异常事件统一归一化。
- 每周和门店运营一起开区域业务复盘，确认分时段规则、升级路径和门店评分卡动作。
- 制定隐私内建数据政策，让 v1 只吃非 PII 运营数据；任何视频或客流数据接入前，都必须先过 DPO 审查。
- 和 FM 或集成商伙伴一起跑部署清单，覆盖区域映射、经理培训、成功指标和推广就绪度。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 负责直销、共创客户筛选，以及围绕推广触发点做账户扩张。
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责做 OEM 集成、规则引擎，以及支撑试点所需的可审计数据模型。
- role: 创始产品/运营
  startTiming: Month 0
  rationale: 把门店工作流翻成模板，并与客户一起跑每周试点复盘。
- role: 实施负责人
  startTiming: Month 6
  rationale: 在第一个试点转正后，把接入时间压下来，防止公司滑向定制化服务。
- role: 数据与分析工程师
  startTiming: Month 9
  rationale: 等跨门店数据积累起来后，交付基准报告和推广就绪度模型。
milestones:
- horizon: 0–12 个月
  items:
  - 拿下 1–2 个和推广审批或清洁合同续约绑定的付费杂货试点。
  - 在一个真实区域里，把人工暂停或接管事件至少压低 20–25%。
  - 把一个试点转成覆盖 20+ 家门店、且有明确经济买方的年费部署。
  - 完成 2 个 OEM 集成和标准化的杂货分时段模板。
- horizon: 12–24 个月
  items:
  - 做到 150–250 家活跃门店，覆盖 2–3 家连锁或 FM 主导项目。
  - 上线会真正参与扩张决策的区域基准和推广就绪度评分。
  - 打出第一个可复用杂货接入操作手册的 FM 或集成商渠道动作。
  - 在新门店批次上，把实施投入压到第一年 ARR 的 20% 以下。
- horizon: 24–36 个月
  items:
  - 做到约 400 家活跃门店，覆盖 4–6 家连锁或 FM 主导项目，与研究里的第 3 年 SOM 对齐。
  - 至少支持 1 个混合厂商杂货部署，以及 1 个相邻公共空间清洁试点。
  - 把基准数据做大到足以对外发布不同门店业态和分时段的绩效常模。
  - 判断“杂货 + FM 扩张”是否已经大到足以支撑更宽泛的服务机器人工作流平台。
risks:
- risk: OEM 看板把排班和报表打包得足够完整，让叠加层看起来像多余的。
  likelihood: High
  impact: High
  mitigation: 差异化要落在跨厂商基准、推广就绪度分析和运营侧管控上，而不是基础任务排班。
- risk: 预算掌握在更偏服务导向的 FM 运营方或设施团队手里，它们未必愿意为软件买单。
  likelihood: Medium
  impact: High
  mitigation: 对准推广审批或合同续约卖；如果人员配置和异常工作流确实被 FM 掌握，就准备通过 FM 伙伴落地。
- risk: 非 PII 的门店输入，跑不出比固定排班更明显的效果。
  likelihood: Medium
  impact: High
  mitigation: 先在有限的分时段和区域规则里明确量化提升；只有第一家试点达不到既定改善目标时，才补更丰富的信号。
- risk: 隐私或机械合规约束拖慢数据接入和更深层集成。
  likelihood: Medium
  impact: Medium
  mitigation: 让 v1 始终待在机器人安全边界外，先吃运营遥测，并尽早把数据处理边界写清楚。
- risk: 杂货这个滩头市场太小，不加邻近扩张就撑不起风投回报。
  likelihood: High
  impact: High
  mitigation: 把同一客户内扩张，以及第一个 FM 或相邻场景验证点，设成扩编或加大融资前的硬门槛。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–3M
  runwayMonths: 18
  useOfFundsSummary: 完成 2 个 OEM 集成、上线 1–2 个付费杂货试点、把其中一个转成 20+ 家门店部署，并补齐实施和分析能力，同时不把组织做成重服务公司。
