jobsToBeDone:
  - job: When a grocery chain expands robot cleaning beyond a pilot, help store-ops leaders standardize daily shifts around shopper flow, so they can scale without customer complaints or supervisor babysitting.
    currentAlternative: OEM consoles plus static cleaning schedules and ad hoc manager overrides
    successMetric: Percentage of scheduled robot cleaning windows completed without manual override or shopper-interruption incident
  - job: When a COO asks whether robot cleaning is paying off, help the regional facilities leader prove store-level labor and coverage gains, so they can justify national rollout or renegotiate cleaning contracts.
    currentAlternative: Contractor invoices, manual audits, and anecdotal store-manager feedback
    successMetric: Measured labor minutes saved and cleaning coverage consistency by store cohort
