topRisks:
  - name: OEM bundling
    description: Robot vendors may extend fleet dashboards into basic scheduling and claim they already solve the operator workflow.
    mitigation: Start with multi-site operator analytics and cross-vendor benchmarking that OEM point solutions cannot easily offer.
  - name: Thin operating data
    description: Some stores may lack reliable traffic or task data, making dynamic scheduling revert to rough rules and weakening ROI claims.
    mitigation: Make the first product work from simple inputs such as store hours, delivery windows, and robot telemetry, then layer richer traffic feeds when available.
  - name: Budget-owner ambiguity
    description: Store operations, facilities, and outsourced cleaning partners all touch the pain, so a new software budget can get stuck between functions.
    mitigation: Sell at the moment a pilot becomes a 20-plus-store rollout or a cleaning-contract renewal, positioning the product as rollout-enabling spend with measurable labor and uptime gains.
