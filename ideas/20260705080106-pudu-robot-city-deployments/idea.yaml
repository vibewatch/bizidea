differentiator: >-
  Robot OEM dashboards optimize a fleet's uptime, but store operators need a system that decides when a cleaning mission
  should run, what human fallback is required, and whether shopper experience survived. This company owns the
  operator-side workflow and benchmarking layer across stores and, eventually, across robot vendors. Its moat comes from
  chain-level data on interruption rates, cleaning coverage, and labor outcomes in live public venues that OEMs see only
  one fleet at a time.
