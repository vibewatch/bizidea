slug: grocery-robot-shift-os
date: '2026-07-05'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-05] 模型从带日期的商业计划之后第一个完整月份开始。'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: $2.2M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2–3M + BP fundingAsk runwayMonths 18 + model 现金曲线] 基准情景使用 $2.2M 融资，这样既能到达 24 个月里程碑，也能保留超过 6 个月的现金缓冲。'
- id: A3
  name: 付费单元定义
  value: 一个处于付费试点或正式调度下的活跃杂货门店。
  unit: definition
  source: '[BP businessModel.unitOfValue] customersEop 按活跃门店计数，因为定价和 SOM 都是按单店年值表达。'
- id: A4
  name: 起始付费门店数
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months + BP experimentRoadmap] 公司从零收入起步，必须先把共创客户工作转成付费活跃门店。'
- id: A5
  name: 付费试点定价
  value: 约 $45K，覆盖约 6–8 家门店、周期约 3 个月（约合 ~$2.0K/店/月）。
  unit: USD
  source: '[BP gtm.pricing $30k-$75k for 5-15 stores] 模型取试点费用中位数，并假设第一批门店规模偏小。'
- id: A6
  name: 正式生产阶段每个活跃门店收入
  value: 核心软件价值为 $6.0K，随着接入费和基准模块挂载，混合实现收入年化提升到约 $6.8K-$7.5K。
  unit: USD/store/year
  source: '[Research bottomUpSizingDrivers ~$6,000 annual software value + BP gtm.pricing $4k-$8k per live store-year plus onboarding and benchmarking modules] 实际收入仍落在既定定价区间内。'
- id: A7
  name: 活跃门店爬坡
  value: M12 达到 28 家门店，Q4Y2 达到 200 家，Q4Y3 达到 400 家。
  unit: stores
  source: '[BP milestones 0–12, 12–24, and 24–36 months + Research market.som] 基准情景对齐 Y1 转正一个 20+ 门店的部署、Y2 退出时 150-250 家门店、Y3 退出时约 400 家门店。'
- id: A8
  name: 收入确认规则
  value: 期末活跃门店数乘以当月或当季每店的混合实现收入。
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] Y1 混合了试点定价与第一批正式门店；Y2-Y3 采用每店每季度约 $1.7K-$1.88K。'
- id: A9
  name: 毛利率爬坡
  value: Y1 为 35%-55%，Y2 为 60%-70%，Y3 为 71%-74%。
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions implementation effort below 20% of 第一年 ARR] 早期批次交付占比更高，直到适配器和推广操作手册能复用后才会改善。'
- id: A10
  name: 基准销售周期
  value: 从付费试点启动到第一批正式门店扩张，大约需要 90-120 天。
  unit: days
  source: '[BP gtm.pricing 8-12 week pilot + BP gtm.funnelTargets 60%+ 试点转正式生产 conversion + BP milestones convert one pilot into a 20+ store annual deployment] 模型假设一个季度足以验证区域推广的价值。'
- id: A11
  name: 招聘时间线
  value: M1 配齐创始人/CEO、创始工程师、创始产品/运营；M6 上实施负责人；M9 上数据/分析工程师；M11 上集成工程师；M15 上 GTM 负责人；M17 上第二名实施；M28 上 G&A；M30 上第 4 名工程师。
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 在第一个客户扩张前，团队尽量保持轻实施；之后再逐步补 GTM 和后台支持。'
- id: A12
  name: 创始人全成本薪酬
  value: $140K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic for a lean pre-seed DACH enterprise SaaS team] 反映相对克制的创始人现金薪酬，以及税费和福利。'
- id: A13
  name: 工程团队全成本薪酬
  value: $170K
  unit: USD/year
  source: '[BP team Founding eng and Data and analytics engineer + startup-finance heuristic] 假设需要资深集成和分析人才，但还没到后期公司的现金水平。'
- id: A14
  name: 产品/运营全成本薪酬
  value: $150K
  unit: USD/year
  source: '[BP team Founding product/ops + startup-finance heuristic] 覆盖工作流设计、客户复盘和运营模板建设。'
- id: A15
  name: 实施团队全成本薪酬
  value: $120K
  unit: USD/year
  source: '[BP team Implementation lead + startup-finance heuristic] 对应牵头客户接入的角色，同时避免公司走向重服务的姿态。'
- id: A16
  name: GTM 团队全成本薪酬
  value: $160K
  unit: USD/year
  source: '[BP gtm.channels + BP investorMemo.firstCustomer + startup-finance heuristic] 包含差旅和变量薪酬，对应创始人辅助下的企业销售。'
- id: A17
  name: G&A 全成本薪酬
  value: $110K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] 覆盖财务、供应商管理、保险和基础合规支持。'
- id: A18
  name: P&L 薪酬分摊规则
  value: 创始人 70% 计入 S&M / 30% 计入 G&A；工程 100% 计入 R&D；产品/运营 30% 计入 S&M / 50% 计入 R&D / 20% 计入 G&A；实施 50% 计入 COGS / 30% 计入 S&M / 20% 计入 G&A；GTM 100% 计入 S&M；G&A 100% 计入 G&A。
  unit: allocation
  source: '[BP team rationales + BP operations] 这样可以把人头成本映射进损益表，同时让交付相关薪酬的一部分留在 COGS。'
- id: A19
  name: 非薪酬运营开支爬坡
  value: Y1 前期每月非薪酬 S&M/R&D/G&A 为 $5K/$7K/$4K，到 Q4Y3 提升至 $15K/$15K/$10K。
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] 覆盖差旅、云资源、法务、保险和伙伴支持，不假设重品牌营销动作。'
- id: A20
  name: 现金转换规则
  value: 现金变动等于 EBITDA。
  unit: formula
  source: '[startup-finance heuristic] 在 pre-seed 规模下，资本开支、税费、偿债和营运资金的时间差都视为可忽略。'
- id: A21
  name: 稳态门店流失率
  value: 每月 1.5%。
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise operations SaaS] 因为项目多在已签客户内扩张，所以门店级流失率较低，但也没有成熟 SaaS 那么完美。'
- id: A22
  name: CAC 规则
  value: 36 个月总销售与营销开支除以 400 家净新增活跃门店。
  unit: formula
  source: '[model calc using 基准情景 S&M spend + BP gtm.funnelTargets + BP milestones] 对这门生意来说，同一客户内扩张让“按门店 CAC”成为最稳定的度量单元。'
- id: A23
  name: 融资规模对应的下一轮里程碑
  value: 到 Q4Y2 在 2–3 家连锁或 FM 主导项目中做到约 200 家活跃门店，完成 2 个 OEM 集成，并把超过 6 个月的现金缓冲留到 Q2Y3。
  unit: milestone
  source: '[BP milestones 12–24 months + BP fundingAsk runwayMonths 18 + model 现金曲线] 这笔融资的规模，就是为了在种子轮前跨过第 2 年证明点。'
- id: A24
  name: 季度薪酬滚动规则
  value: Y2 和 Y3 的薪酬行按照季度内实际入职月份计算，而不是只看年末人头快照。
  unit: convention
  source: '[Headcount column convention + BP team startTiming] 即使只展示 Q4Y2 和 Q4Y3 快照，也能让薪酬费用与招聘节奏保持一致。'
- id: A25
  name: 基准模块增益
  value: 到 Y3，基准和推广就绪度模块会在成熟批次上，把研究里的 $6K 核心软件价值再抬高约 10%-15%。
  unit: percent uplift
  source: '[BP businessModel.revenueStreams premium regional benchmarking + BP product.twelveMonth and twentyFourMonth + Research bottomUpSizingDrivers] 这解释了为何 Y3 的实际每店收入会略高于 $6K 基线。'
