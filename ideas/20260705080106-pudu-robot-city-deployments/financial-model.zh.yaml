scenarios:
  downside:
    description: 同一客户内扩张延后，试点转正式生产的转化率低于计划，且高阶模块的挂载速度慢于预期。
    y3RevenueK: 1710.0
    y3EbitdaK: -360.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
    - Q4Y2 结束时更接近 150 家活跃门店，Q4Y3 结束时约 300 家，而不是 400 家。
    - 因为基准和接入模块挂载更慢，每店实现收入比基准情景低约 10%。
    - 实施仍然更依赖人工，所以退出毛利率停在约 68%，而不是低 70% 区间。
  base:
    description: Y1 有一个试点转成 20+ 家门店的部署，同一客户内扩张撑起 Y2，基准模块到 Y3 对每店收入有温和抬升。
    y3RevenueK: 2444.7
    y3EbitdaK: 55.5
    cashLowPointK: 531.5
    keyAssumptionChanges:
    - M12 做到 28 家活跃门店，Q4Y2 做到 200 家，Q4Y3 做到 400 家。
    - 每店实现收入始终落在 BP 定价区间内，在接入和基准增益带动下，年化退出时接近约 $7.5K。
    - 只有当实施在 Y3 变得可复制后，毛利率才会真正爬到 70% 目标之上。
  upside:
    description: 区域试点扩张更快，FM 和集成商渠道更早贡献线索，而且基准模块的挂载率也强于计划。
    y3RevenueK: 3020.0
    y3EbitdaK: 430.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - Q4Y2 退出时约 230 家活跃门店，Q4Y3 达到约 460 家。
    - 基准和推广就绪度模块让每店实现收入比基准情景高约 8%。
    - OEM 适配器和推广操作手册更早标准化，所以退出毛利率接近 76%。
sensitivity:
- variable: ARPU
  downsideCase: 基准和接入模块的增益比计划低约 10%。
  baseCase: 稳态实现 ARPU 约为每个活跃门店年 $6.8K。
  upsideCase: 高阶模块和接入让实现 ARPU 更接近 $7.4K。
  y3RevenueImpactK: -244.5
  cashImpactK: -180.0
- variable: CAC
  downsideCase: 企业扩张需要更多创始人时间，混合 CAC 升向每个活跃门店 $4.5K。
  baseCase: 因为大部分增长来自同一客户内扩张，混合 CAC 维持在约 $3.1K。
  upsideCase: OEM、FM 和集成商转介绍把 CAC 拉向每个活跃门店 $2.4K。
  y3RevenueImpactK: -120.0
  cashImpactK: -240.0
- variable: 流失率
  downsideCase: 如果较弱门店在试点批次后流失，月度门店流失率会上升到 2.5%。
  baseCase: 账户把推广模板标准化后，月度门店流失率维持在约 1.5%。
  upsideCase: 因为推广管控深嵌进区域运营，月度门店流失率维持在约 1.0%。
  y3RevenueImpactK: -180.0
  cashImpactK: -140.0
- variable: 销售周期
  downsideCase: 试点转正式生产的周期被拉长到接近 180 天。
  baseCase: 试点转正式生产维持在 90-120 天。
  upsideCase: 推广审批会把转化周期压到 60-90 天。
  y3RevenueImpactK: -320.0
  cashImpactK: -260.0
- variable: 毛利率
  downsideCase: 由于接入仍然偏人力密集，毛利率卡在约 68%。
  baseCase: Y3 平均毛利率约 72.7%。
  upsideCase: 随着适配器和评分卡更快标准化，毛利率可以到约 76%。
  y3RevenueImpactK: 0.0
  cashImpactK: -160.0
- variable: 招聘节奏
  downsideCase: 在需求尚未被证明前，第 4 名工程师和 G&A 支持就提前两个季度入场。
  baseCase: 招聘节奏按 BP 排序推进，在前 200 家门店上线前都保持精简。
  upsideCase: 最后一名工程师等到混合厂商验证之后再入职，也不影响交付。
  y3RevenueImpactK: 60.0
  cashImpactK: -130.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Trigger[Rollout approval or contract renewal] --> Pilot[Paid regional pilot stores]
      Pilot --> Production[Production live stores]
      Production --> Benchmark[Benchmark and readiness modules]
      Benchmark --> Revenue[Per-store recurring revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准收入引擎来自活跃门店数的扩张：Y1 退出时 28 家，到 Q4Y3 做到 400 家；同时温和的模块增益让每店实现收入略高于研究里的 $6K 基线。
- checkName: 必须跑通的事
  finding: 公司必须先跑通同一客户内扩张——从第一笔 20 店部署做到 Q4Y2 的 200 家活跃门店，然后才适合去加更大的一线或销售团队。
- checkName: 模型会在哪儿断
  finding: 如果试点转正式生产的周期被拖到 180 天左右，而 Y3 卡在 300 家门店附近，下行情景会把现金低点压到约 $0.1M。
- checkName: 下一轮证明点
  finding: 种子轮故事应该是：到 Q4Y2 在 2–3 家连锁或 FM 主导项目里做到 200 家活跃门店，2 个 OEM 集成上线，而且第一条可复制渠道动作已经跑通。
sanityChecks:
  ruleOf40: Y3 增长率 196.8% + EBITDA 利润率 2.3% = 199.1%
  burnMultiple: Y2 的烧钱倍数约为 0.7x：用约 $0.8M 的 EBITDA 亏损，对应约 $1.2M 的净新增 ARR；H2Y3 起转为正向现金流。
  revenuePerFte: $245K Y3，对应期末 10 名 FTE（SaaS 基准为 $200-400K）
  flags:
  - customersEop 统计的是活跃门店，不是企业客户，所以收入集中度仍然落在少数几家连锁账户上。
  - 模型已经跑到研究里的 400 店第 3 年 SOM，所以真正的风投级上行空间仍要看杂货滩头之外的 FM 主导项目和相邻场景。
  - Y3 的每店实现收入高于研究基线，因为模型假设接入费和基准模块会在扩张过程中持续挂载。
  - 用 10 名 FTE 支撑 400 家门店，前提是实施投入确实能压在 BP 所说的第一年 ARR 20% 阈值以下，而且 OEM 遥测接入可以复用。
