scenarios:
  downside:
    description: Same-account expansion slips, pilot-to-production conversion lands below plan, and premium modules attach later than expected.
    y3RevenueK: 1710.0
    y3EbitdaK: -360.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
      - Q4Y2 ends closer to 150 live stores and Q4Y3 ends near 300 instead of 400.
      - Realized revenue per store is about 10% below base because benchmarking and onboarding attach more slowly.
      - Gross margin exits near 68% instead of the low-70s as implementation stays more manual.
  base:
    description: One pilot converts to a 20+ store rollout in Y1, same-account expansion carries Y2, and benchmark modules modestly lift per-store revenue by Y3.
    y3RevenueK: 2444.7
    y3EbitdaK: 55.5
    cashLowPointK: 531.5
    keyAssumptionChanges:
      - 28 live stores by M12, 200 by Q4Y2, and 400 by Q4Y3.
      - Realized revenue per store stays inside the BP range and exits near roughly $7.5K annualized with onboarding and benchmark uplift.
      - Gross margin climbs above the 70% target only after implementation becomes repeatable in Y3.
  upside:
    description: Regional pilots expand faster, FM and integrator channels contribute earlier, and attach-rate for benchmark modules is stronger than planned.
    y3RevenueK: 3020.0
    y3EbitdaK: 430.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - Q4Y2 exits around 230 live stores and Q4Y3 reaches about 460 stores.
      - Benchmark and rollout-readiness modules lift realized revenue per store about 8% above base.
      - Gross margin exits near 76% because OEM adapters and rollout playbooks standardize sooner.
sensitivity:
  - variable: ARPU
    downsideCase: Benchmark and onboarding uplift lands about 10% below plan.
    baseCase: Steady-state realized ARPU is about $6.8K per live store-year.
    upsideCase: Premium modules and onboarding keep realized ARPU closer to $7.4K.
    y3RevenueImpactK: -244.5
    cashImpactK: -180.0
  - variable: CAC
    downsideCase: Enterprise expansion needs more founder time and blended CAC rises toward $4.5K per live store.
    baseCase: Blended CAC stays near $3.1K because most growth comes from same-account expansion.
    upsideCase: OEM, FM, and integrator referrals pull CAC toward $2.4K per live store.
    y3RevenueImpactK: -120.0
    cashImpactK: -240.0
  - variable: churn
    downsideCase: Monthly store churn rises to 2.5% if weaker sites roll off after pilot cohorts.
    baseCase: Monthly store churn holds near 1.5% once accounts standardize rollout templates.
    upsideCase: Monthly store churn stays near 1.0% because rollout governance becomes embedded in regional ops.
    y3RevenueImpactK: -180.0
    cashImpactK: -140.0
  - variable: sales cycle
    downsideCase: Pilot-to-production conversion stretches toward 180 days.
    baseCase: Pilot-to-production conversion stays near 90-120 days.
    upsideCase: Rollout approvals compress conversion toward 60-90 days.
    y3RevenueImpactK: -320.0
    cashImpactK: -260.0
  - variable: gross margin
    downsideCase: Gross margin stalls near 68% because onboarding stays labor-heavy.
    baseCase: Gross margin averages about 72.7% in Y3.
    upsideCase: Gross margin reaches about 76% as adapters and scorecards standardize faster.
    y3RevenueImpactK: 0.0
    cashImpactK: -160.0
  - variable: hiring pace
    downsideCase: The fourth engineer and G&A support are pulled forward by two quarters before demand is proven.
    baseCase: Hiring follows the BP sequencing and stays lean until the first 200 stores are live.
    upsideCase: The final engineer hire waits until after mixed-vendor proof without hurting delivery.
    y3RevenueImpactK: 60.0
    cashImpactK: -130.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Trigger[Rollout approval or contract renewal] --> Pilot[Paid regional pilot stores]
      Pilot --> Production[Production live stores]
      Production --> Benchmark[Benchmark and readiness modules]
      Benchmark --> Revenue[Per-store recurring revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base revenue comes from expanding live stores from 28 at Y1 exit to 400 by Q4Y3 while modest module uplift keeps realized revenue per store slightly above the researched $6K baseline.
  - checkName: Must go right
    finding: Same-account expansion from the first 20-store rollout to 200 live stores by Q4Y2 has to work before the company adds a much larger field or sales team.
  - checkName: Model breaks if
    finding: If pilot-to-production cycles stretch toward 180 days and Y3 stalls near 300 stores, the downside case pushes the cash floor toward roughly $0.1M.
  - checkName: Next-round proof
    finding: The seed story is 200 live stores across 2-3 chains or FM-led programs by Q4Y2 with two OEM integrations live and the first repeatable channel motion working.
sanityChecks:
  ruleOf40: Y3 growth 196.8% + EBITDA margin 2.3% = 199.1%
  burnMultiple: Y2 burn multiple is about 0.7x using roughly $0.8M of EBITDA burn against about $1.2M of net new ARR; H2Y3 turns cash generative.
  revenuePerFte: $245K Y3 on 10 ending FTE (benchmark $200-400K SaaS)
  flags:
    - customersEop counts live stores, not enterprise logos, so revenue concentration still sits in a small number of chain accounts.
    - The model reaches the researched 400-store year-3 SOM, so venture-scale upside still depends on FM-led programs and adjacent venues after the grocery beachhead.
    - Realized Y3 revenue per store sits above the research baseline because onboarding fees and benchmark modules are assumed to keep attaching during expansion.
    - Supporting 400 stores with 10 FTE assumes implementation effort truly stays below the BP 20% of first-year ARR threshold and OEM telemetry access remains reusable.
