slug: grocery-robot-shift-os
date: '2026-07-05'
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-08"
    unit: YYYY-MM
    source: "[BP date 2026-07-05] the model starts in the first full month after the dated business plan."
  - id: A2
    name: Opening cash / pre-seed raise
    value: "$2.2M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2–3M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses a $2.2M raise to reach the 24-month milestone set with more than six months of cash buffer."
  - id: A3
    name: Paying unit definition
    value: "One live grocery store under paid pilot or production orchestration."
    unit: definition
    source: "[BP businessModel.unitOfValue] customersEop counts live stores because price and SOM are both expressed per store-year."
  - id: A4
    name: Starting paying stores
    value: "0"
    unit: count
    source: "[BP milestones 0–12 months + BP experimentRoadmap] the company begins pre-revenue and must first turn design-partner work into paid live stores."
  - id: A5
    name: Paid pilot pricing
    value: "$45K for roughly 6-8 stores over about 3 months (~$2.0K/store/month)."
    unit: USD
    source: "[BP gtm.pricing $30k-$75k for 5-15 stores] the model uses a midpoint pilot fee with a small first cohort."
  - id: A6
    name: Production revenue per live store
    value: "$6.0K base software value with blended realized revenue rising to about $6.8K-$7.5K annualized as onboarding fees and benchmark modules attach."
    unit: USD/store/year
    source: "[Research bottomUpSizingDrivers ~$6,000 annual software value + BP gtm.pricing $4k-$8k per live store-year plus onboarding and benchmarking modules] realized revenue stays inside the stated pricing envelope."
  - id: A7
    name: Live-store ramp
    value: "28 stores by M12, 200 by Q4Y2, 400 by Q4Y3."
    unit: stores
    source: "[BP milestones 0–12, 12–24, and 24–36 months + Research market.som] the base case matches one converted 20+ store rollout in Y1, 150-250 stores by Y2 exit, and roughly 400 stores by Y3 exit."
  - id: A8
    name: Revenue recognition convention
    value: "Period-end live stores multiplied by blended realized revenue per store for that month or quarter."
    unit: formula
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] Y1 mixes pilot pricing with the first production cohort; Y2-Y3 use about $1.7K-$1.88K per store per quarter."
  - id: A9
    name: Gross margin ramp
    value: "35%-55% in Y1, 60%-70% in Y2, and 71%-74% in Y3."
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions implementation effort below 20% of first-year ARR] early cohorts are delivery-heavy before adapters and rollout playbooks become reusable."
  - id: A10
    name: Base sales cycle
    value: "About 90-120 days from paid pilot start to first production-store expansion."
    unit: days
    source: "[BP gtm.pricing 8-12 week pilot + BP gtm.funnelTargets 60%+ pilot-to-production conversion + BP milestones convert one pilot into a 20+ store annual deployment] the model assumes one quarter is enough to prove a regional rollout."
  - id: A11
    name: Hiring timeline
    value: "M1 founder CEO, founding eng, and founding product/ops; M6 implementation lead; M9 data/analytics engineer; M11 integration engineer; M15 GTM lead; M17 second implementation hire; M28 G&A; M30 fourth engineer."
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] the team stays implementation-light until the first account expands, then adds GTM and back-office support gradually."
  - id: A12
    name: Founder loaded compensation
    value: "$140K"
    unit: USD/year
    source: "[BP team Founder CEO + startup-finance heuristic for a lean pre-seed DACH enterprise SaaS team] reflects modest founder cash pay plus taxes and benefits."
  - id: A13
    name: Engineering loaded compensation
    value: "$170K"
    unit: USD/year
    source: "[BP team Founding eng and Data and analytics engineer + startup-finance heuristic] assumes senior integration and analytics talent without late-stage cash levels."
  - id: A14
    name: Product/ops loaded compensation
    value: "$150K"
    unit: USD/year
    source: "[BP team Founding product/ops + startup-finance heuristic] covers workflow design, customer reviews, and operating templates."
  - id: A15
    name: Implementation loaded compensation
    value: "$120K"
    unit: USD/year
    source: "[BP team Implementation lead + startup-finance heuristic] reflects onboarding ownership while keeping the company out of a services-heavy posture."
  - id: A16
    name: GTM loaded compensation
    value: "$160K"
    unit: USD/year
    source: "[BP gtm.channels + BP investorMemo.firstCustomer + startup-finance heuristic] includes travel and variable compensation for founder-assisted enterprise selling."
  - id: A17
    name: G&A loaded compensation
    value: "$110K"
    unit: USD/year
    source: "[BP operations + startup-finance heuristic] covers finance, vendor management, insurance, and basic compliance support."
  - id: A18
    name: Payroll allocation to P&L
    value: "Founder 70% S&M / 30% G&A; engineering 100% R&D; product/ops 30% S&M / 50% R&D / 20% G&A; implementation 50% COGS / 30% S&M / 20% G&A; GTM 100% S&M; G&A 100% G&A."
    unit: allocation
    source: "[BP team rationales + BP operations] this maps headcount cost into the P&L while keeping delivery payroll partially inside COGS."
  - id: A19
    name: Non-payroll opex ramp
    value: "Monthly non-payroll S&M/R&D/G&A rises from $5K/$7K/$4K in early Y1 to $15K/$15K/$10K by Q4Y3."
    unit: USD/month
    source: "[BP operations + startup-finance heuristic] covers travel, cloud, legal, insurance, and partner support without assuming a brand-heavy marketing motion."
  - id: A20
    name: Cash conversion convention
    value: "Cash movement equals EBITDA."
    unit: formula
    source: "[startup-finance heuristic] capex, taxes, debt service, and working-capital timing are assumed immaterial at pre-seed scale."
  - id: A21
    name: Steady-state store churn
    value: "1.5% per month."
    unit: percent per month
    source: "[startup-finance heuristic for early enterprise operations SaaS] store-level churn is low because programs expand inside signed accounts, but not mature-SaaS perfect."
  - id: A22
    name: CAC convention
    value: "Total 36-month sales and marketing spend divided by 400 net new live stores."
    unit: formula
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets + BP milestones] same-account expansion makes per-store CAC the most stable unit for this business."
  - id: A23
    name: Next-round milestone for funding sizing
    value: "Reach about 200 live stores by Q4Y2 across 2-3 chains or FM-led programs, complete two OEM integrations, and preserve more than six months of cash into Q2Y3."
    unit: milestone
    source: "[BP milestones 12–24 months + BP fundingAsk runwayMonths 18 + model cash curve] the raise is sized to clear the year-2 proof point before a seed round."
  - id: A24
    name: Quarterly salary-roll convention
    value: "Y2 and Y3 salary rows use actual monthly hires inside each quarter rather than only the year-end headcount snapshots."
    unit: convention
    source: "[Headcount column convention + BP team startTiming] this keeps salary expense consistent with the hiring ramp even though only Q4Y2 and Q4Y3 snapshots are exposed."
  - id: A25
    name: Benchmark-module uplift
    value: "By Y3, benchmark and rollout-readiness modules add roughly 10%-15% to the researched $6K core software value in mature cohorts."
    unit: percent uplift
    source: "[BP businessModel.revenueStreams premium regional benchmarking + BP product.twelveMonth and twentyFourMonth + Research bottomUpSizingDrivers] this explains why realized Y3 revenue per store is slightly above the $6K baseline."
