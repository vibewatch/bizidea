topRisks:
  - name: Grid and permitting drag
    description: Utility approvals, import delays, or municipal permitting could still slow deployments even with buffered systems.
    mitigation: Start on private fleet depots with simpler approvals, pre-negotiate standard interconnection packages, and design around phased capacity upgrades.
  - name: Fleet utilization volatility
    description: Early customers may underutilize charging assets if EV expansion slows or fleet financing tightens.
    mitigation: Target fleets buying vehicles on confirmed schedules, structure minimum-commitment contracts, and reuse modular assets across sites.
  - name: Policy or payment instability
    description: Subsidy changes, FX swings, or import-policy shifts could squeeze customer budgets and hardware margins.
    mitigation: Price in hard-currency-linked contracts where possible, diversify supplier base, and add assembler partnerships that bundle charging into vehicle financing.
