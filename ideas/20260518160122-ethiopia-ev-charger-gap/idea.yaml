problem: >-
  Ethiopia's EV fleet is growing far faster than its charging footprint: 115,000+ EVs share fewer than 100 chargers in
  Addis Ababa, and there is no charging infrastructure outside the capital. Fleet operators are forced into slow,
  improvised charging workflows and risky route planning just as fuel shortages make electrification economically urgent.
  Traditional station rollouts are also slowed by blackouts and high-capacity grid connection delays, so demand is present
  before standard infrastructure can be built.
targetUser:
  primary: >-
    Operations leaders at Addis Ababa electric taxi, ride-hail, and parcel-delivery fleets running 25-150 vehicles from
    a single depot or parking yard
  secondary: >-
    Depot landlords and EV assembler partners that want to offer reliable charging capacity to commercial fleets
  buyer: Fleet owner, COO, or head of operations at a commercial EV fleet
startupThesis:
  nonObviousInsight: >-
    Ethiopia does not first need a consumer charging app; it needs a way to manufacture dependable charging capacity at
    weak-grid fleet sites. A startup that bundles battery buffering, energy management, and rapid deployment can monetize
    the shortage months before full utility upgrades or citywide public networks arrive.
  beachhead: >-
    Addis Ababa electric taxi and parcel-delivery fleets with 25-150 vehicles, a single depot, and no near-term path to
    secure a timely high-capacity grid upgrade
  wedge: >-
    Battery-buffered fast-charging depots that install at fleet yards, manage load through blackouts, and sell guaranteed
    charging uptime per vehicle
  whyNowCatalyst: >-
    The Iran-linked fuel shock has turned EV adoption into a national priority at the exact moment Ethiopia's EV base has
    already outrun charger supply and grid upgrades.
  ventureScalePath: >-
    Start with depot charging for commercial fleets in Addis, then extend into intercity corridor hubs, assembler and
    importer financing bundles, utility demand-response services, and similar weak-grid EV markets across East Africa.
solution: >-
  Build modular charging depots for fleet operators that combine DC fast chargers, on-site battery storage, and software
  that schedules charging against limited grid capacity. The battery buffer lets sites deliver useful charging power even
  where blackouts are common or utility upgrades are delayed, while the software prioritizes vehicles by shift needs and
  state of charge. Customers buy dependable fleet throughput rather than just hardware, with remote monitoring, uptime
  alerts, and maintenance bundled into the service. Over time, the network can add public access windows and corridor
  sites once fleet utilization anchors demand.
goToMarketSeed:
  firstCustomer: >-
    An Addis Ababa ride-hail or parcel-delivery fleet adding its next 20-50 EVs at one depot and currently struggling to
    secure reliable overnight charging
  buyingTrigger: >-
    The fleet signs a new EV purchase order or expansion plan but cannot get enough dependable charging capacity before
    vehicles arrive
  currentAlternative: Scarce public chargers, manual slow charging from existing site power, or an internal build waiting on a utility upgrade
  switchingReason: >-
    The startup can deploy usable charging capacity faster than a utility-led build, keep vehicles charged through power
    volatility, and give the operator an uptime SLA tied to fleet utilization instead of a one-time equipment sale.
  pricingHypothesis: Monthly fee per active charging bay plus usage-based revenue per delivered kWh and a premium for guaranteed uptime capacity
