differentiator: >-
  Most charging startups would begin by chasing public network density, but Ethiopia's hardest problem is dependable power
  at commercial sites that cannot wait for grid reinforcement. By selling buffered throughput, software scheduling, and
  uptime guarantees together, the company becomes a fleet operations partner rather than a commodity charger vendor. The
  moat compounds through site data, utility interconnection know-how, fleet demand forecasting, and preferred access to
  the best depot and corridor locations.
