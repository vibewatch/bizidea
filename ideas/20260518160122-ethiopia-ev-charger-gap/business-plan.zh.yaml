  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要撑 18 个月的客户发现、首批站点部署、充电编排软件、本地现场运维、备件库存，以及组装商或站点伙伴拓展；目标是在区域扩张前，先把一个可重复的亚的斯 depot 生意跑通。
