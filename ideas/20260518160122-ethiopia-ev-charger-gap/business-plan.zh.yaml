slug: buffered-fleet-charging-hubs
date: '2026-05-18'
executiveSummary: 埃塞俄比亚已经有 115,000+ 辆 EV，但亚的斯亚贝巴充电桩不到 100 个，其他地区几乎没有成规模网络，所以商业车队眼下最卡的是 depot 充电容量。拟议公司卖的是带电池缓冲的充电场站，装在弱电网车队场地里，签单卖的是充电可用率，不是单台硬件。第一批客户会是亚的斯的出租、网约车或包裹车队——它们在一个 depot 新增 20–50 辆 EV，但公用事业升级还没下来。这个切口是自洽的，因为购买触发、产品架构、定价逻辑和分发渠道都围着同一个运营问题转：车先到了，稳定场站电力还没到。研究给出的自下而上测算显示，埃塞俄比亚 TAM 约 $25.2M，聚焦亚的斯的 SAM 约 $5.9M，第 3 年 SOM 约 $1.0M；这足够验证区域打法，但单靠本地市场还撑不起很大的风投回报。因此计划先在 8–12 个 depot 站点快速打样，再靠组装商带单和走廊枢纽复制到东非其他弱电网市场。最关键的证伪风险不是有没有充电桩，而是亚的斯是否真有足够多的车队，已经拿到近期 EV 采购单、有预算权限、也有站点条件，能支撑可重复的付费部署。研究还没确认这类买家的确切数量，所以前 90 天必须先验证买家密度、付费意愿和并网时长，再决定是否扩团队或备硬件。
problem:
- 亚的斯的商业 EV 车队正在加车，但首都充电桩不到 100 个，首都之外几乎没有，真正卡运营的就是 depot 充电容量。
- 传统充电站 落地 会被停电和大容量并网延迟拖慢，这意味着车队可能车已经下单，稳定电力却还没落地。
solution:
- 部署模块化 depot 站点，把 DC 快充、站内电池储能和负载管理软件装在一起，让车队在电力有限或不稳定的场地里照样能充。
- 卖给车队运营团队的是签约吞吐和 uptime 报告；远程监控、预防性维护和按班次编排充电，全都打包进同一项服务。
whyWeWin:
- 产品围绕埃塞俄比亚真正的约束来设计——站点电力弱、升级也慢——而不是先铺一张广泛公共充电地图，所以它比 OEM 硬件或公用事业主导建站更快对上第一购买触发。
- 时间拉长之后，公司会在 depot 遥测、并网打法以及组装商/场地主关系里滚出本地护城河，这些都不是通用充电桩卖家和两轮车换电网络天然拥有的。
strategicChoices:
  beachhead: 亚的斯亚贝巴电动出租、网约车和包裹配送车队——车队规模 25–150 辆、从单一 depot 运营，而且短期内拿不到大容量电网升级。
  wedgeRationale: 这个滩头比公共充电或全国走廊建设更快见真章，因为需求、用户工作流和停电痛点都集中在一个场站里，部署、测量和续约能在一个合同周期内看清。
  sequencingRationale: 公司应该先靠企业直销验证一个能重复卖的 depot SKU 和一个定价模型，再叠加组装商转介绍、把现场运维标准化；只有做到这一步之后，才适合往需要更高点位密度和品牌认知的走廊枢纽或公共开放时段扩。
  notYet:
  - 面向消费者的充电平台 App
  - 全国性公共充电网络
  - 车辆融资或自营 EV 车队运营
  - 两轮车换电
market:
  tam: $25.2M
  sam: $5.9M
  som: $1.0M
  segments:
  - 单 depot 运营的亚的斯亚贝巴电动出租、网约车和包裹配送车队
  - 把充电能力打包进车队部署的 EV 组装商、进口商和 depot 场地主
  buyingProcess: 销售往往始于车队扩张或新 EV 采购单，让人意识到 depot 电力来不及到位。经济买家通常是车主、COO 或运营负责人，而做成决策之前，需要先跑站点勘察、吞吐模型、试点方案和带最低承诺量的合同。
product:
  mvp: MVP 是一套可部署到亚的斯单个车队场站的 depot 方案：2–4 个带缓冲的 DC 充电 bay、按路线排班和电量状态分配优先级的软件、远程监控，以及给调度团队看的 uptime 报告。它要在“只靠电网不够用”的站点上，证明 95%+ 的车辆都能带电发车。
  sixMonth: 把前 2–3 个付费试点站点的勘察、depot 设计、充电编排、遥测和维护工作流全部标准化。
  twelveMonth: 在 8–12 个 depot 上推出可复制的正式产品：合同带 SLA、安装手册成型、备件运转起来，还要接上组装商转介绍。
  twentyFourMonth: 补上适合走廊站点的 hub 模板、多站点车队看板，以及支持超出单 depot 安装范围的场地主/组装商伙伴包。
  keyBets:
  - 在亚的斯的运营工况下，一个缓冲 bay 大致能带 10 辆商业车辆，同时不明显伤害调度可靠性。
  - 车队愿意为带 uptime 保障的托管式充电付费，把它当运营服务来买，而不是只买硬件自己运维。
  - 在许可、投运和维护上的本地执行速度，会比专有充电桩技术更重要。
gtm:
  wedge: 把可快速部署的缓冲充电场站卖给那些 EV 已经下单、但场站电力还不稳定的车队；合同锚点不是充电桩所有权，而是车辆随时可用。
  channels:
  - 直销亚的斯车队运营商
  - 和新一批 EV 交付绑定的组装商、进口商转介绍合作
  - 第一站打样后，再做 depot 场地主和走廊站点伙伴合作
  funnelTargets: Lead→qualified pilot 20-30%, qualified pilot→paid pilot 40-50%, paid pilot→production contract 60%+, production customer→second-site expansion 30%+
  pricing: 每个活跃缓冲 bay 按月收费，再按交付 kWh 收使用费，同时设置最低量承诺和 uptime 溢价。这样定价对准的是客户真正要买的东西——稳定的车队吞吐——而且利用率越高，上行空间越大。
businessModel:
  revenueStreams:
  - 每个活跃缓冲充电 bay 的月订阅费
  - 按交付 kWh 收取的使用费
  - 安装与投运费用
  - 持续维护和 uptime 支持费
  unitOfValue: 服务合同下的活跃缓冲充电 bay
  targetGrossMarginPct: 70
  expansionLevers:
  - 随着车队 EV 数量上升，在同一 depot 增加 bay 数
  - 把单站点车队转成多 depot 合同
  - 把充电合同挂到组装商或进口商的车辆销售上
  - 把验证过的 depot 运营复制到走廊枢纽和共享车队站点
strategyMap:
  northStarMetric: 每个签约 depot 日的可带电发车车辆数
  inputMetrics:
  - 试点转正式合同的转化率
  - 带电发车率
  - 每个活跃 bay 每天交付的 kWh
  - 从签 LOI 到站点投运的天数
  - 剔除公用事业停电窗口后的站点 uptime
  moatsToBuild:
  - 亚的斯专属的并网与投运手册
  - 关于工况周期、停电和充电优先级的专有 depot 遥测
  - 拿组装商转介绍和优质 depot 点位的优先通道
  killCriteria:
  - 和 30 家合格车队谈完之后，12 个月内签下的付费试点合同少于 3 个
  - 试点站点投运后，连续 60 天都达不到 95% 的带电发车率
  - 客户拒绝托管服务定价，强行把交易推回一次性硬件销售，导致没有持续毛利路径
  mermaid: |
    flowchart LR
      Wedge[Addis fleet depot wedge] --> MVP[Buffered depot MVP]
      MVP --> Proof[95%+ charge-ready departures and paid renewals]
      Proof --> Expansion[Assembler channel and corridor hub expansion]
investorMemo:
  verdict:
    call: 观察
    conviction: 痛点很强、切口也清楚，但在亚的斯真正验证出买家密度和可重复的付费试点之前，判断上限仍被压住。
    whyBelieve: 埃塞俄比亚的 EV 对充电桩缺口、燃油冲击带来的紧迫性，以及弱电网条件，一起拼出了一个比泛化充电创业更具体、更贴运营的第一产品。
    whyDoubt: 只做埃塞俄比亚的滩头太窄，邻近替代也站得住；研究还没证明有足够多已签 EV 扩张计划的车队，能支撑风投式扩张。
    nextDiligence: 确认 10–15 家目标车队确实有近期 EV 采购计划、depot 电力受限，而且愿意签带 uptime 保障的付费试点。
  firstCustomer:
    title: 亚的斯亚贝巴电动出租或包裹车队 COO
    profile: 一支 25–150 辆车的车队，从一个 depot 运营，未来两个季度继续增加 EV 数量，但拿不到及时的电力升级。
    trigger: 车队在 depot 还没有稳定夜间充电能力之前，就先拍板了下一批 EV 采购。
    buyer: 车队车主、COO 或运营负责人
    initialContract: 先签一个 90 天付费试点，覆盖 2–3 个缓冲 bay；如果调度可靠性指标达标，再转成年化站点合同，安装费之外合同价值大约 $25k–$50k。
  mustBeTrue:
  - 未来 12 个月里，至少有 10 个亚的斯车队潜在客户要新增 EV，但缺少稳定的 depot 电力。
  - 在本地工况下，一个缓冲 bay 能稳定带动约 10 辆商业车辆，不会出现不可接受的排队。
  - 调度可靠性改善后，付费试点能以 60%+ 的比例转成年化经常性合同。
  - 组装商或进口商愿意转介绍客户，而不是把充电关系完全内化。
  - 本地现场运维团队能在不被进口零件和维护复杂度吃掉毛利的前提下，守住 SLA 级 uptime。
  diligenceQuestions:
  - 有多少车队运营商能拿出未来 12 个月已签或已预算的 EV 采购单？
  - 亚的斯最优 depot 站点今天面对的并网时长和变压器约束到底是什么？
  - 在按 bay 订阅、按 kWh 计费和 uptime SLA 最低承诺之间，买家更偏好哪种合同结构？
  - 本地部署手册面对 ABB 经销商、组装商打包方案或公用事业主导项目，到底有多难抄？
  - 最可能加速 CAC 下降的早期伙伴是哪一类：组装商、depot 场地主，还是走廊运营商？
operatingAssumptions:
- assumption: 亚的斯有足够多即将扩张 EV 的车队，可以撑起一条可重复的直销管线。
  basis: research.yaml
  validationTest: 访谈 15 家车队潜在客户，拿到至少 10 份已核实的购车计划或董事会批准的扩张预算。
  decisionImpact: 如果不成立，公司就该把重心收窄到组装商附带销售，或者暂停“先做埃塞俄比亚”的扩张。
- assumption: 一个缓冲 bay 在排班式 depot 运营里大约能服务 10 辆车。
  basis: research.yaml
  validationTest: 对一个试点站点做 60 天埋点，测日吞吐、停留时长、排队情况和误班减少幅度。
  decisionImpact: 如果不成立，定价、硬件规格和目标客户规模都得在大范围 大范围铺开 前重做。
- assumption: 只要配上 uptime 保证，车队能接受“按 bay + 按 kWh”的经常性定价。
  basis: idea.yaml
  validationTest: 向 10 个买家展示三种报价结构，并拿到至少 3 份托管服务模式的已签试点。
  decisionImpact: 如果不成立，经常性毛利假设就会走弱，公司会更像估值倍数更低的安装商或硬件转售商。
- assumption: 私有 depot 的投运速度会明显快于等一个完整的公用事业升级。
  basis: research.yaml
  validationTest: 对 5 个候选 depot 做站点勘察，记录投运时长、许可步骤和公用事业依赖项。
  decisionImpact: 如果不成立，相对公用事业或 OEM 替代方案的速度优势就没了，切口也该调整。
- assumption: 一个小型本地现场团队就能靠进口硬件和备件，把首批站点守在 SLA 阈值之上。
  basis: 运营判断
  validationTest: 在前 3 个站点完整跟踪一个季度的平均修复时长、零件更换频率和 uptime。
  decisionImpact: 如果不成立，业务就需要更重的服务基础设施、更高定价，或更窄的部署范围。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 拉出一份亚的斯车队目标账户清单，并结合 depot 勘察做创始人主导的客户发现。
  hypothesis: 市场里确实有足够多近期要加 EV、又被电力卡住的车队，能撑起一个聚焦滩头。
  successMetric: 15 场合格车队会议、10 份已核实的 EV 扩张计划，以及 5 个适合做试点部署的站点。
  owner: CEO
- horizon: 0–90 天
  experiment: 拿三种商业报价和买家、组装商伙伴做价格测试。
  hypothesis: 只要车辆可用率指标讲清楚，买家会更偏好带 uptime 保障的经常性定价，而不是一次性买充电桩。
  successMetric: 在托管服务合同结构下签下 3 份付费试点 LOI。
  owner: CEO
- horizon: 3–6 个月
  experiment: 让第一个缓冲 depot 试点投运，并从车辆到站到发车全程采集遥测。
  hypothesis: 即便站点电力弱、又会遇到停电事件，MVP 仍能做到 95%+ 的带电发车率。
  successMetric: 连续 60 个运营日，带电发车率高于 95%，站点 uptime 高于 90%。
  owner: 创始工程负责人
- horizon: 3–6 个月
  experiment: 在另外两个 depot 上验证安装、许可和备件工作流。
  hypothesis: 公司能把部署流程标准化到把“签合同到投运”的时间压到 90 天以内。
  successMetric: 再投运 2 个站点，中位部署周期低于 90 天。
  owner: 现场部署负责人
- horizon: 6–12 个月
  experiment: 做一个和新 EV 交付绑定的组装商转介绍试点。
  hypothesis: 附带式充电销售能明显拉低 CAC，也能比纯外呼缩短销售周期。
  successMetric: 签下 2 份组装商转介绍协议，并让至少 25% 的新增 pipeline 来自伙伴。
  owner: 销售工程师
- horizon: 12–18 个月
  experiment: 拿已经验证过的 depot 运营堆栈，试跑一个走廊站点或共享车队 hub。
  hypothesis: depot 产品和运营模型可以延展到更高吞吐站点，而且不打穿单位经济模型。
  successMetric: 上线 1 个付费的非 depot 站点，利用率和 uptime 与成熟 depot 基准相比偏差不超过 20%。
  owner: CEO
operations:
- 任何 depot 报价前，先把站点勘察和电力约束清单标准化。
- 从第一天起就跑远程遥测、uptime 告警和调度报告。
- 把备用电池、充电模块和关键部件留在本地，保证快修。
- 为亚的斯部署建立优先安装商和公用事业接口手册。
- 先把直销动作跑通，再有选择地用组装商、场地主和走廊伙伴去解锁更多站点。
team:
- role: 创始人/CEO
  startTiming: 第 0 月
  rationale: 在扩团队之前，必须靠创始人主导销售和伙伴拓展，先把买家密度、定价和渠道打法验证出来。
- role: 创始工程负责人
  startTiming: 第 0 月
  rationale: 公司从第一个试点开始，就需要有人把充电编排、遥测和站点级软件集成扛起来。
- role: 现场部署负责人
  startTiming: 第 1 月
  rationale: 早期执行风险主要在站点勘察、投运、安全流程和维护准备，不在纯软件。
- role: 销售工程师
  startTiming: 第 4 月
  rationale: 等第一批试点跑起来后，就需要一个懂技术的销售，把车队工作流梳理清楚、把站点报出来，并把试点转成正式合同。
- role: 服务技术员
  startTiming: 第 6 月
  rationale: 一旦有 3 个或更多站点上线，要守住可重复的 uptime，就必须尽快补齐本地维护能力和纪律化的预防性服务。
milestones:
- horizon: 0–12 个月
  items:
  - 验证 10+ 个有明确 EV 扩张计划的亚的斯合格车队买家
  - 签下 3 个付费试点，并让前 2–3 个缓冲 depot 站点投运
  - 在一个真实客户 depot 证明 95%+ 的带电发车率
  - 拿下第一份组装商或进口商转介绍协议
- horizon: 12–24 个月
  items:
  - 增长到 8–12 个签约 depot 站点，并把部署周期标准化到 90 天以内
  - 把试点转正式合同的转化率稳定拉到 60% 以上
  - 上线多站点看板和伙伴主导的站点获取机制
  - 测试 1 个走廊或共享车队扩张站点
- horizon: 24–36 个月
  items:
  - 借助伙伴主导的走廊和第二城市机会，走出亚的斯
  - 拿下覆盖东非多站点运营的车队或组装商合同
  - 在 depot 选型、停电预测和维护规划上沉淀数据护城河
  - 决定公司继续聚焦基础设施，还是加做更广的网络服务
risks:
- risk: 埃塞俄比亚直营滩头可能窄到不足以支撑快速复制。
  likelihood: Medium
  impact: High
  mitigation: 在备库存前先验证买家密度，随后只有在本地付费打样跑通后，才加组装商渠道和区域扩张。
- risk: 即便有缓冲架构，公用事业、许可或场地主审批仍可能拖慢部署。
  likelihood: High
  impact: High
  mitigation: 从审批更简单的私有 depot 起步，把标准化并网包文档化，第一年避免做过度定制的站点工程。
- risk: 买家可能拿人工充电、OEM 硬件或换电替代来比较，进而抵触经常性定价。
  likelihood: Medium
  impact: High
  mitigation: 销售时不要只讲充电桩参数，要把调度可靠性、误班减少和更快拿到容量讲透。
- risk: 进口硬件、备件延迟或维护失败，都可能把 SLA 表现打穿。
  likelihood: Medium
  impact: High
  mitigation: 在本地备足关键备件，先把第一代硬件堆栈尽量做简单，并在服务运维稳定前严格控制站点数量。
- risk: 如果车辆可负担性或融资环境恶化，EV 普及 可能放慢。
  likelihood: Medium
  impact: Medium
  mitigation: 优先服务采购计划已批下来的车队，并和能把充电打包进车辆扩张方案的组装商或金融方合作。
