  adoptionFrictionMatrix:
  - friction: depot 场站最后一公里配电太弱
    severity: 高
    affectedBuyer: 车队 COO / depot 运营方
    mitigation: 先上带电池缓冲的充电系统，用现有场站电力顶住运行，再等并网升级慢慢跟上。
    sourceRefs:
    - 1
    - 5
    - 21
  - friction: EV 购置价高，拖慢车队换车
    severity: 高
    affectedBuyer: 车队车主 / 财务负责人
    mitigation: 优先锁定已经批过购车单的车队，并和组装商或金融方合作，而不是赌投机性需求。
    sourceRefs:
    - 1
    - 2
    - 29
  - friction: 运营方不信电池寿命和充电 uptime
    severity: 中
    affectedBuyer: 车队运营负责人
    mitigation: 不要裸卖硬件，改卖带遥测、维护和发车报告的 uptime 保障试点。
    sourceRefs:
    - 2
    - 19
    - 29
  - friction: 换电、公共枢纽和人工充电等替代模式在竞争
    severity: 中
    affectedBuyer: 车队车主
    mitigation: 把单 depot 下的吞吐、发车可靠性和误班减少效果，和这些替代方案直接量化对比。
    sourceRefs:
    - 15
    - 24
    - 31
    - 35
market:
  tam:
    value: $25.2M
    rationale: 自下而上的 2030 年埃塞俄比亚测算：EV 目标保有量 500,000 辆 [2]；假设其中 6% 是需要托管充电的 depot 型商业车辆，即 30,000 辆；再假设一个缓冲快充 bay 在排班式 depot 使用场景下大约能带 10 辆车 [15, 19, 21]，对应 3,000 个 bay；每个活跃 bay 每月收入按 $700 估算，来自电费和 uptime 管理，仍低于亚的斯出租车和 EV 车主眼下已经显性的节省空间 [1, 2, 13]。3,000 x $700 x 12 = $25.2M。
    isEstimate: true
    sourceRefs:
    - 1
    - 2
    - 13
    - 15
    - 19
    - 21
  sam:
    value: $5.9M
    rationale: 滩头 SAM 按亚的斯收口：在充电仍集中于首都的前提下，假设第一波 depot 车队和组装商带动的站点一共能触达约 700 个活跃 bay。700 x $700 x 12 = $5.88M。
    isEstimate: true
    sourceRefs:
    - 1
    - 2
    - 19
    - 21
  som:
    value: $1.0M
    rationale: 更现实的第 3 年 SOM，是大约 120 个活跃 bay，分布在约 12 个车队 depot，上限相当于亚的斯滩头 bay 基盘的约 10%。120 x $700 x 12，年收入约 $1.0M。
    isEstimate: true
    sourceRefs:
    - 1
    - 2
    - 19
    - 21
