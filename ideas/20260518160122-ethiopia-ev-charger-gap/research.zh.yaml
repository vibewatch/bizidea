- 早期埃塞俄比亚车队买家更偏好按 bay 订阅、按 kWh 计费，还是带最低承诺量的捆绑式 uptime SLA？
- 中立充电运营商能不能拿下组装商合作，还是进口商会倾向自己掌控充电关系？
