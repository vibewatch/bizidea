  - 27
  - 28
- name: Roam
  stage: 扩张期
  wedge: 肯尼亚本地制造的电动摩托和电动巴士，配套充电枢纽、合作伙伴和车队支持软件。
  pricing: 项目制、融资制和伙伴制定价，未公开
  strength: 把车辆、充电、金融合作方和非洲本地运营环境一起打包，路径相当完整。
  weaknessVsUs: 当前重点仍在肯尼亚，而且更偏公交和摩托，不是亚的斯四轮车队的弱电网缓冲 depot。
