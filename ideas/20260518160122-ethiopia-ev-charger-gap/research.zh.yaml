  strength: 产品就是围绕受限电力 depot 设计，还宣称能在 4–6 周内部署，并把储能集成进来。
  weaknessVsUs: 没有针对埃塞俄比亚本地审批、站点运维或亚的斯四轮车队关系做本地化，当前产品更像美国市场导向。
  sourceRefs:
  - 19
  - 20
  - 21
- name: ABB EV Charging
  stage: 现有厂商
  wedge: 全球化 AC/DC 充电硬件、公交充电和服务软件。
  pricing: 硬件和网络均为定制定价，未公开
  strength: 品牌强、产品线全，也有大规模充电网络的现成 know-how。
  weaknessVsUs: 以硬件为中心的方案，天然不解决停电韧性、负荷平滑和受限 depot 的本地 uptime 运维。
  sourceRefs:
  - 17
  - 22
- name: Ampersand Energy
  stage: 扩张期
  wedge: 面向东非商用电动摩托的换电网络和一体化能源平台。
  pricing: 电池租赁 / 换电模式，未公开
  strength: 它证明了只要能源接入够稳定，非洲商业车队就会 买单；目前每天已超过 20,000 次换电，伙伴网络也在扩。
  weaknessVsUs: 车型特定，重点是两轮车和换电，不是给埃塞俄比亚四轮车队做中立的 depot 快充。
  sourceRefs:
