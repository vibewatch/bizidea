scenarios:
  downside:
    description: Slower buyer validation and pricing pressure delay partner-led expansion, leaving the business mostly Addis-only by Year 3.
    y3RevenueK: 662.4
    y3EbitdaK: -519.9
    cashLowPointK: 448.4
    keyAssumptionChanges:
      - End Year 3 contracted sites fall from 32 to 24.
      - Monthly site ARPU slips from $3.5K to $3.2K.
      - Gross margin compresses from 70% to 65%.
  base:
    description: Three pilots convert, assembler referrals start in Year 2, and the company expands from Addis depots into adjacent corridor and second-city sites in Year 3.
    y3RevenueK: 1008.0
    y3EbitdaK: -244.9
    cashLowPointK: 866.8
    keyAssumptionChanges:
      - Average site value remains at roughly five active bays and $42K ARR.
      - End Year 2 reaches 16 contracted sites and End Year 3 reaches 32.
      - Gross margin stays at the 70% target from the business plan.
  upside:
    description: Assembler channels work earlier, pilots scale faster, and mature sites expand above the base-case pace.
    y3RevenueK: 1299.6
    y3EbitdaK: -14.8
    cashLowPointK: 1181.0
    keyAssumptionChanges:
      - End Year 3 contracted sites rise to 40.
      - Monthly site ARPU improves to $3.8K through higher utilization and add-on services.
      - Gross margin improves to 72% as field operations standardize.
sensitivity:
  - variable: ARPU
    downsideCase: $3.2K monthly revenue per site
    baseCase: $3.5K monthly revenue per site
    upsideCase: $3.8K monthly revenue per site
    y3RevenueImpactK: 86.4
    cashImpactK: 60.5
  - variable: CAC
    downsideCase: $18K CAC per production site
    baseCase: $14K CAC per production site
    upsideCase: $10K CAC per production site
    y3RevenueImpactK: 0.0
    cashImpactK: 120.0
  - variable: churn
    downsideCase: 2.5% monthly logo churn
    baseCase: 1.5% monthly logo churn
    upsideCase: 1.0% monthly logo churn
    y3RevenueImpactK: 96.0
    cashImpactK: 85.0
  - variable: sales cycle
    downsideCase: 9-month enterprise cycle with fewer pilot conversions
    baseCase: 6-month cycle from discovery to live contract
    upsideCase: 4-5 month cycle with assembler-referral acceleration
    y3RevenueImpactK: 252.0
    cashImpactK: 180.0
  - variable: gross margin
    downsideCase: 65% margin from higher service and spare-parts cost
    baseCase: 70% target gross margin
    upsideCase: 75% margin from better standardization
    y3RevenueImpactK: 0.0
    cashImpactK: 50.4
  - variable: hiring pace
    downsideCase: Keep the Y3 team at 13 FTE even if sales ramp misses
    baseCase: Hire to the planned milestones only
    upsideCase: Delay one Y3 sales or service hire until utilization proves out
    y3RevenueImpactK: 90.0
    cashImpactK: 150.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified fleet leads] --> Pilots[Paid pilots]
      Pilots --> Contracts[Production site contracts]
      Contracts --> Bays[~5 active bays per site]
      Bays --> Revenue[$700 per bay per month]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash for deployments and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by growth from 5 live sites at the end of Year 1 to 32 sites by Q4Y3 at about $42K ARR per site.
  - checkName: Must go right
    finding: The model needs the first three pilots to convert and assembler referrals to start lowering sales friction by Year 2.
  - checkName: Model breaks if
    finding: If sales cycles stretch toward 9 months or realized ARPU drops below $3.2K per site per month, downside cash falls toward $448K.
  - checkName: Next-round proof
    finding: The next financing is justified once 16 sites are live, pilot-to-production stays above 60%, and one non-depot expansion site works at target gross margin.
sanityChecks:
  ruleOf40: "Y3 growth 115.7% + EBITDA margin -24.3% = 91.4%."
  burnMultiple: "Y3 burn multiple 0.45x (-$244.9K EBITDA on $540.7K net new revenue)."
  revenuePerFte: "$77.5K Y3 on 13 year-end FTE (well below $200-400K SaaS benchmarks and still low even allowing for infrastructure intensity)."
  flags:
    - The base case only clears the ~$1.0M Year 3 revenue mark by assuming corridor and second-city expansion beyond the Addis-only SOM.
    - Revenue per FTE stays low, so the company still needs better service productivity before a larger round looks efficient.
    - The 70% gross-margin target depends on imported hardware, spare-parts availability, and field service staying inside the 30% COGS envelope.
    - The model does not include separate equipment leasing or project-finance structures, so real working-capital needs could appear earlier than EBITDA implies.
