assumptions:
  - id: A1
    name: Model start month
    value: "2026-06"
    unit: month
    source: "[BP date 2026-05-18]; model starts the month after the business plan date."
  - id: A2
    name: Monthly revenue per active bay
    value: "700"
    unit: USD per bay per month
    source: "[Research market.bottomUpSizingDrivers monthly revenue per active bay $700] and [BP gtm.pricing]."
  - id: A3
    name: Average active bays per contracted site
    value: "5"
    unit: bays per site
    source: "[BP strategicChoices.beachhead 25-150 EV fleets] and [BP product.keyBets one bay supports ~10 vehicles]; heuristic midpoint assumes ~50 EVs per mature site."
  - id: A4
    name: Annual ARPU per contracted site
    value: "42.0"
    unit: USD K per site per year
    source: "Calc from A2 x A3 x 12 months = $42.0K annual recurring revenue per site."
  - id: A5
    name: Target gross margin
    value: "70"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]."
  - id: A6
    name: Year 1 customer ramp
    value: "0,0,0,0,1,1,2,2,3,3,4,5"
    unit: contracted sites EOP by month
    source: "[BP milestones 0-12 months: sign 3 paid pilots, commission first 2-3 sites, secure first assembler referral]; modeled as 5 live contracted sites by M12 including pilot conversions and first expansions."
  - id: A7
    name: Year 2 and Year 3 customer ramp
    value: "Q1Y2 8, Q2Y2 12, Q3Y2 14, Q4Y2 16, Q1Y3 20, Q2Y3 24, Q3Y3 28, Q4Y3 32"
    unit: contracted sites EOP by quarter
    source: "[BP milestones 12-24 months: 8-12 depots and partner-led acquisition] plus [BP milestones 24-36 months: corridor and second-city expansion]; heuristic assumes direct sales first, then second-site and regional growth."
  - id: A8
    name: Monthly churn
    value: "1.5"
    unit: percent
    source: "Startup-finance heuristic for sticky infrastructure service contracts with annual terms and [BP investorMemo.mustBeTrue pilot-to-production conversion 60%+]."
  - id: A9
    name: CAC per new production site
    value: "14.0"
    unit: USD K per site
    source: "[BP gtm.funnelTargets] plus startup-finance heuristic for founder-led consultative enterprise sales in Addis."
  - id: A10
    name: Loaded annual payroll by role
    value: "CEO 84K, Engineering 72K, Deployment/Ops 54K, Sales 48K, Service 30K, G&A/Admin 36K"
    unit: USD K per FTE per year
    source: "Startup-finance heuristic for Ethiopia/East Africa early-stage blended cash comp including benefits and payroll taxes."
  - id: A11
    name: Hiring timing
    value: "M1 CEO+Engineering+Deployment/Ops; M4 Sales1; M7 Service1; M10 Sales2+Service2+Admin; M15 Engineering2; M27 Deployment/Ops2; M29 Engineering3; M31 Sales3; M34 Service3"
    unit: hires by month
    source: "[BP team] and [BP strategicChoices.sequencingRationale]; later hires are heuristic extensions of the stated sequence."
  - id: A12
    name: Sales and marketing non-payroll spend
    value: "5-10"
    unit: USD K per month
    source: "Startup-finance heuristic for local travel, demos, partner development, and assembler/channel work; ramps with site count."
  - id: A13
    name: R&D non-payroll spend
    value: "4-6"
    unit: USD K per month
    source: "Startup-finance heuristic for telemetry cloud, software tools, testing, and remote monitoring."
  - id: A14
    name: G&A and operations non-payroll spend
    value: "8-15"
    unit: USD K per month
    source: "[BP operations] plus startup-finance heuristic for office, legal, insurance, permits, and spare-parts readiness."
  - id: A15
    name: Starting cash and round size
    value: "2000.0"
    unit: USD K
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M]; model uses the low end of range to fund 24 months to the next milestone plus buffer."
  - id: A16
    name: Cash-flow simplification
    value: "No separate debt, capex financing, taxes, or depreciation line"
    unit: modeling convention
    source: "Startup-finance heuristic for pre-seed planning; EBITDA is used as the operating cash proxy for this stage model."
