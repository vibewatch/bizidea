scenarios:
  downside:
    description: 买家验证更慢、价格承压，导致伙伴带来的扩张推迟，到第 3 年业务仍主要局限在亚的斯。
    y3RevenueK: 662.4
    y3EbitdaK: -519.9
    cashLowPointK: 448.4
    keyAssumptionChanges:
    - 第 3 年末签约站点从 32 个降到 24 个。
    - 单站点月 ARPU 从 $3.5K 下滑到 $3.2K。
    - 毛利率从 70% 压缩到 65%。
  base:
    description: 3 个试点顺利转正，组装商转介绍在第 2 年启动，公司第 3 年从亚的斯 depot 扩到相邻走廊和第二城市站点。
    y3RevenueK: 1008.0
    y3EbitdaK: -244.9
    cashLowPointK: 866.8
    keyAssumptionChanges:
    - 单站点价值维持在约 5 个活跃 bay、年 ARR 约 $42K。
    - 第 2 年末做到 16 个签约站点，第 3 年末做到 32 个。
    - 毛利率维持商业计划里的 70% 目标。
  upside:
    description: 组装商渠道更早跑通，试点放量更快，成熟站点扩张速度也超过基准情形。
    y3RevenueK: 1299.6
    y3EbitdaK: -14.8
    cashLowPointK: 1181.0
    keyAssumptionChanges:
    - 第 3 年末签约站点升到 40 个。
    - 单站点月 ARPU 提升到 $3.8K，靠更高利用率和附加服务拉动。
    - 随着现场运维标准化，毛利率提升到 72%。
