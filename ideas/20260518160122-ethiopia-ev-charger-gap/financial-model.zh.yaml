modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      Leads[Qualified fleet leads] --> Pilots[Paid pilots]
      Pilots --> Contracts[Production site contracts]
      Contracts --> Bays[~5 active bays per site]
      Bays --> Revenue[$700 per bay per month]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash for deployments and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入来自站点数增长：第 1 年末 5 个在线站点，到 Q4Y3 扩至 32 个，每个站点年 ARR 约 $42K。
- checkName: 必须跑对的事
  finding: 模型成立的前提，是前 3 个试点能转正，且组装商转介绍要在第 2 年开始降低销售摩擦。
- checkName: 模型会在哪坏掉
  finding: 如果销售周期被拉到 9 个月，或实际 ARPU 低于每站点每月 $3.2K，下行情景下现金低点会掉到约 $448K。
- checkName: 下一轮融资证明点
  finding: 当 16 个站点上线、试点转正式稳定高于 60%、且 1 个非 depot 扩张站点能跑出目标毛利率时，再融资才更站得住。
sanityChecks:
  ruleOf40: 第 3 年增长 115.7% + EBITDA 利润率 -24.3% = 91.4%。
  burnMultiple: 第 3 年现金消耗倍数为 0.45x（-$244.9K EBITDA，对应 $540.7K 净新增收入）。
  revenuePerFte: 第 3 年年末 13 个 FTE，对应每名 FTE 收入 $77.5K（明显低于 SaaS 常见的 $200-400K 基准；即便考虑基础设施重，也依然偏低）。
  flags:
  - 基准情形之所以能在第 3 年勉强跨过约 $1.0M 收入线，靠的是走出“只算亚的斯”的 SOM，开始做走廊和第二城市扩张。
  - 每名 FTE 的收入仍然偏低，所以在更大一轮融资前，公司还得继续提升服务效率。
  - 70% 的毛利率目标，取决于进口硬件、备件可得性和现场服务都能被压在 30% COGS 之内。
  - 模型没有单列设备租赁或项目融资结构，所以真实的营运资本压力可能会比 EBITDA 暗示得更早出现。
