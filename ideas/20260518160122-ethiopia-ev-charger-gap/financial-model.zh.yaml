slug: buffered-fleet-charging-hubs
date: 2026-05-18
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP 日期 2026-05-18]；模型从商业计划日期后的下一个月启动。'
- id: A2
  name: 每个活跃 bay 的月收入
  value: '700'
  unit: USD per bay per month
  source: 依据 [Research market.bottomUpSizingDrivers 每个活跃 bay 月收入 $700] 与 [BP gtm.pricing]。
- id: A3
  name: 每个签约站点的平均活跃 bay 数
  value: '5'
  unit: bays per site
  source: 依据 [BP strategicChoices.beachhead 25-150 辆 EV 车队] 与 [BP product.keyBets 一个 bay 支撑约 10 辆车]；这里取启发式中位数，假设成熟站点约 50 辆 EV。
- id: A4
  name: 每个签约站点的年化 ARPU
  value: '42.0'
  unit: USD K per site per year
  source: 由 A2 x A3 x 12 个月计算得出，每个站点年化经常性收入约 $42.0K。
- id: A5
  name: 目标毛利率
  value: '70'
  unit: percent
  source: 依据 [BP businessModel.targetGrossMarginPct]。
- id: A6
  name: 第 1 年客户爬坡
  value: 0,0,0,0,1,1,2,2,3,3,4,5
  unit: contracted sites EOP by month
  source: 依据 [BP 0-12 个月里程碑：签下 3 个付费试点、投运前 2-3 个站点、拿到首个组装商转介绍]；模型按 M12 有 5 个在线签约站点估算，包含试点转正式和第一批扩张。
- id: A7
  name: 第 2 年和第 3 年客户爬坡
  value: Q1Y2 8, Q2Y2 12, Q3Y2 14, Q4Y2 16, Q1Y3 20, Q2Y3 24, Q3Y3 28, Q4Y3 32
  unit: contracted sites EOP by quarter
  source: 依据 [BP 12-24 个月里程碑：做到 8-12 个 depot 并靠伙伴带来获客]，再叠加 [BP 24-36 个月里程碑：走廊与第二城市扩张]；启发式假设是先靠直销，再靠第二站点和区域增长。
- id: A8
  name: 月流失率
  value: '1.5'
  unit: percent
  source: 早期基础设施服务合同通常粘性较高、以年约为主，这里采用月流失 1.5% 的创业财务启发式，并参考 [BP investorMemo.mustBeTrue 试点转正式 60%+]。
- id: A9
  name: 每个新正式站点的 CAC
  value: '14.0'
  unit: USD K per site
  source: 结合 [BP gtm.funnelTargets]，并按亚的斯创始人主导、顾问式企业销售的创业财务启发式估算。
- id: A10
  name: 各岗位全成本口径年薪
  value: CEO 84K, Engineering 72K, Deployment/Ops 54K, Sales 48K, Service 30K, G&A/Admin 36K
  unit: USD K per FTE per year
  source: 埃塞俄比亚 / 东非早期创业公司的混合现金薪酬启发式，已含福利与薪资税费。
- id: A11
  name: 招聘节奏
  value: M1 CEO+Engineering+Deployment/Ops; M4 Sales1; M7 Service1; M10 Sales2+Service2+Admin; M15 Engineering2; M27 Deployment/Ops2; M29 Engineering3; M31 Sales3; M34 Service3
  unit: hires by month
  source: 依据 [BP team] 与 [BP strategicChoices.sequencingRationale]；后续招聘是对既定顺序的启发式外推。
- id: A12
  name: 销售与市场非薪酬支出
  value: 5-10
  unit: USD K per month
  source: 本地差旅、演示、伙伴拓展和组装商/渠道工作的创业财务启发式；会随站点数上升而爬坡。
- id: A13
  name: 研发非薪酬支出
  value: 4-6
  unit: USD K per month
  source: 用于遥测云、软件工具、测试和远程监控的创业财务启发式。
- id: A14
  name: 行政与运营非薪酬支出
  value: 8-15
  unit: USD K per month
  source: 依据 [BP operations]，再加办公室、法务、保险、许可和备件准备的创业财务启发式。
- id: A15
  name: 起始现金与融资规模
  value: '2000.0'
  unit: USD K
  source: 依据 [BP fundingAsk targetFundingRangeUsd $2-4M]；模型取区间下限，用来覆盖 24 个月到下一阶段里程碑所需资金并留出缓冲。
- id: A16
  name: 现金流简化假设
  value: 不单列债务、capex 融资、税项或折旧科目
  unit: modeling convention
  source: 种子前阶段的规划里，不单列债务、设备融资、税项或折旧；此处按创业财务启发式，用 EBITDA 近似经营现金流。
