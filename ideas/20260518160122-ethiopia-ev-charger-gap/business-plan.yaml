slug: buffered-fleet-charging-hubs
date: "2026-05-18"
executiveSummary: >-
  Ethiopia already has 115,000+ EVs, yet Addis Ababa has fewer than 100 chargers
  and the rest of the country has no meaningful charging network, so commercial
  fleets face an immediate depot-capacity bottleneck. The proposed company sells
  battery-buffered charging depots that install at weak-grid fleet yards and
  contract on guaranteed charging uptime rather than on stand-alone hardware. The
  first customer is an Addis taxi, ride-hail, or parcel fleet adding 20-50 EVs
  at one depot before a utility upgrade is available. This is a coherent wedge
  because the buying trigger, product architecture, pricing basis, and
  distribution channel all center on one operational problem: vehicles arriving
  before dependable site power does. Research supports a bottom-up Ethiopia TAM
  of about $25.2M, an Addis-focused SAM of about $5.9M, and a year-3 SOM of
  about $1.0M, which is enough to validate a regional playbook but not by itself
  a large venture outcome. The plan therefore prioritizes rapid proof at 8-12
  depot sites, then expansion through assembler-linked sales and corridor hubs in
  similar weak-grid East African markets. The main disconfirming risk is not
  whether chargers exist, but whether enough Addis fleets have near-term EV
  purchase orders, budget authority, and site access to support repeatable paid
  deployments. Research did not establish the exact count of fleet buyers with
  signed expansion plans, so the first 90 days must validate buyer density,
  willingness to pay, and interconnection timelines before the company scales
  headcount or hardware inventory.
problem:
  - Commercial EV fleets in Addis are adding vehicles into a market with fewer than 100 chargers in the capital and none outside it, so depot charging capacity is the operational bottleneck.
  - Traditional charger rollouts are slowed by blackouts and delayed high-capacity grid connections, which means fleets can have vehicles on order before they can secure dependable power.
solution:
  - Deploy modular depot sites that combine DC fast chargers, on-site battery storage, and load-management software so fleets can charge against limited or unstable site power.
  - Sell contracted throughput and uptime reporting for fleet operations teams, with remote monitoring, preventive maintenance, and shift-based charging orchestration bundled into one service.
whyWeWin:
  - The product is designed around Ethiopia's real constraint, weak and delayed site power, rather than around a broad public charging map, so it solves the first buying trigger faster than OEM hardware or utility-led builds.
  - Over time the company compounds a local moat in depot telemetry, interconnection playbooks, and assembler or landlord relationships that generic charger vendors and two-wheeler swap networks do not naturally own.
strategicChoices:
  beachhead: Addis Ababa electric taxi, ride-hail, and parcel-delivery fleets with 25-150 EVs operating from a single depot without a near-term high-capacity grid upgrade.
  wedgeRationale: >-
    This beachhead produces faster proof than public charging or nationwide
    corridor builds because demand, user workflow, and outage pain are
    concentrated at one yard, making deployment, measurement, and renewal
    decisions observable within one contract cycle.
  sequencingRationale: >-
    The company should first prove one repeatable depot SKU and one pricing model
    through direct enterprise sales, then add assembler referrals and standardize
    field operations, and only after that expand into corridor hubs or public
    access windows that require broader site density and brand awareness.
  notYet:
    - Consumer charging marketplace app
    - Nationwide public charging network
    - Vehicle financing or owned EV fleet operations
    - Two-wheeler battery swapping
market:
  tam: "$25.2M"
  sam: "$5.9M"
  som: "$1.0M"
  segments:
    - Addis Ababa electric taxi, ride-hail, and parcel-delivery fleets with single-depot operations
    - EV assemblers, importers, and depot landlords bundling charging capacity into fleet deployments
  buyingProcess: >-
    The sale starts when a fleet expansion or new EV purchase order exposes that
    depot power will not be ready in time. The economic buyer is typically the
    fleet owner, COO, or head of operations, and the decision requires a site
    survey, throughput model, pilot proposal, and minimum-commitment contract.
product:
  mvp: >-
    The MVP is a deployable depot package for one Addis fleet site: 2-4 buffered
    DC charging bays, software that prioritizes charging by route schedule and
    state of charge, remote monitoring, and uptime reporting for dispatch teams.
    It should prove 95%+ charge-ready vehicle departures at a site where the grid
    alone is insufficient.
  sixMonth: >-
    Standardize site survey, depot design, charging orchestration, telemetry, and
    maintenance workflows for the first 2-3 paid pilot sites.
  twelveMonth: >-
    Launch a repeatable production offer with SLA-backed contracts, installer playbooks,
    spare-parts operations, and assembler referral integrations across 8-12 depots.
  twentyFourMonth: >-
    Add corridor-ready hub templates, multi-site fleet dashboards, and landlord or
    assembler partner packages that support expansion beyond single-depot installs.
  keyBets:
    - One buffered bay can support roughly 10 commercial vehicles in Addis duty cycles without degrading dispatch reliability.
    - Fleets will pay for uptime-backed managed charging as an operating service, not just buy hardware and self-operate.
    - Local execution speed on permitting, commissioning, and maintenance will matter more than proprietary charger technology.
gtm:
  wedge: >-
    Sell a fast-to-deploy buffered charging depot to fleets that have EVs on order
    but no dependable site power, with the contract anchored on guaranteed vehicle
    readiness rather than charger ownership.
  channels:
    - Direct enterprise sales to Addis fleet operators
    - Assembler and importer referral partnerships tied to new EV batch deliveries
    - Depot landlord and corridor-site partnerships after first-site proof
  funnelTargets: "Lead→qualified pilot 20-30%, qualified pilot→paid pilot 40-50%, paid pilot→production contract 60%+, production customer→second-site expansion 30%+"
  pricing: >-
    Charge a monthly fee per active buffered bay plus usage-based revenue per
    delivered kWh, with minimum volume commitments and an uptime premium. This
    matches the customer's real buying problem, dependable fleet throughput, while
    preserving upside as utilization increases.
businessModel:
  revenueStreams:
    - Monthly subscription per active buffered charging bay
    - Usage revenue per delivered kWh
    - Installation and commissioning fees
    - Ongoing maintenance and uptime-support fees
  unitOfValue: Active buffered charging bay under service contract
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more bays at the same depot as fleet EV count rises
    - Convert single-site fleets into multi-depot contracts
    - Attach charging contracts to assembler or importer vehicle sales
    - Extend proven depot operations into corridor hubs and shared fleet sites
strategyMap:
  northStarMetric: Charge-ready vehicle departures per contracted depot-day
  inputMetrics:
    - Pilot-to-production conversion rate
    - Charge-ready departure rate
    - kWh delivered per active bay per day
    - Days from signed LOI to site commissioning
    - Site uptime excluding utility outage windows
  moatsToBuild:
    - Addis-specific interconnection and commissioning playbook
    - Proprietary depot telemetry on duty cycles, outages, and charging prioritization
    - Preferred access to assembler referrals and high-quality depot sites
  killCriteria:
    - Fewer than 3 paid pilot contracts signed within 12 months after 30 qualified fleet conversations
    - Live pilot sites fail to reach 95% charge-ready vehicle departures for 60 consecutive days after commissioning
    - Customers reject managed-service pricing and force one-time hardware sales with no recurring margin path
  mermaid: |
    flowchart LR
      Wedge[Addis fleet depot wedge] --> MVP[Buffered depot MVP]
      MVP --> Proof[95%+ charge-ready departures and paid renewals]
      Proof --> Expansion[Assembler channel and corridor hub expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong pain and wedge clarity, but conviction is capped until buyer density and repeatable paid pilots are proven in Addis.
    whyBelieve: Ethiopia's EV-to-charger gap, fuel-shock urgency, and weak-grid conditions create a concrete first product that is more operationally specific than a generic charging startup.
    whyDoubt: The Ethiopia-only beachhead is narrow, adjacent substitutes are credible, and research does not yet prove enough fleets with signed EV expansion plans to support venture-style scaling.
    nextDiligence: Confirm 10-15 target fleets with near-term EV purchase plans, depot power constraints, and willingness to sign a paid uptime-backed pilot.
  firstCustomer:
    title: Addis Ababa electric taxi or parcel fleet COO
    profile: A 25-150 vehicle fleet operating from one depot, expanding EV count in the next two quarters, and unable to secure a timely power upgrade.
    trigger: The fleet commits to its next EV batch before dependable overnight charging capacity is available at the depot.
    buyer: Fleet owner, COO, or head of operations
    initialContract: Paid 90-day pilot for 2-3 buffered bays, converting into an annual site contract worth roughly $25k-$50k before installation fees if dispatch reliability targets are met.
  mustBeTrue:
    - At least 10 Addis fleet prospects are adding EVs within 12 months and lack dependable depot power.
    - A buffered bay can reliably support about 10 commercial vehicles in local duty cycles without unacceptable queueing.
    - Paid pilots convert to annual recurring contracts at 60%+ once dispatch reliability improves.
    - Assembler or importer partners will refer customers instead of fully internalizing the charging relationship.
    - Local field operations can maintain SLA-grade uptime without margin erosion from imported parts and maintenance complexity.
  diligenceQuestions:
    - How many fleet operators can show signed or budgeted EV purchase orders for the next 12 months?
    - What interconnection lead times and transformer constraints do the best Addis depot sites face today?
    - What contract structure do buyers prefer between per-bay subscription, per-kWh pricing, and uptime SLA minimums?
    - How defensible is the local deployment playbook against ABB resellers, assembler bundles, or utility-backed projects?
    - Which early partner class is most likely to accelerate CAC reduction: assemblers, depot landlords, or corridor operators?
operatingAssumptions:
  - assumption: Enough Addis fleets have imminent EV expansion plans to create a repeatable direct-sales pipeline.
    basis: research.yaml
    validationTest: Interview 15 fleet prospects and collect at least 10 verified vehicle purchase plans or board-approved expansion budgets.
    decisionImpact: If false, the company should narrow to assembler-led attached sales or pause Ethiopia-first scaling.
  - assumption: One buffered bay can serve roughly 10 vehicles in scheduled depot operation.
    basis: research.yaml
    validationTest: Instrument one pilot site for 60 days and measure daily throughput, dwell time, queueing, and missed-trip reduction.
    decisionImpact: If false, pricing, hardware sizing, and target customer size must be reset before broad rollout.
  - assumption: Fleets will accept recurring per-bay plus kWh pricing when paired with uptime guarantees.
    basis: idea.yaml
    validationTest: Present three quote structures to 10 buyers and secure at least 3 signed pilots on the managed-service model.
    decisionImpact: If false, the recurring-margin thesis weakens and the company becomes a lower-multiple installer or hardware reseller.
  - assumption: Private depots can be commissioned materially faster than waiting for a full utility-led upgrade.
    basis: research.yaml
    validationTest: Complete site surveys on 5 candidate depots and document commissioning timelines, permit steps, and utility dependencies.
    decisionImpact: If false, the speed advantage versus utility or OEM alternatives disappears and the wedge should shift.
  - assumption: A small local field team can keep first sites above SLA thresholds with imported hardware and spare parts.
    basis: operator judgment
    validationTest: Track mean time to repair, parts replacement frequency, and uptime across the first 3 sites for one full quarter.
    decisionImpact: If false, the business needs heavier service infrastructure, higher pricing, or a narrower deployment scope.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Build a target-account list of Addis fleets and run founder-led discovery with depot site surveys.
    hypothesis: The market contains enough fleets with imminent EV orders and constrained power to support a focused beachhead.
    successMetric: 15 qualified fleet meetings, 10 verified EV expansion plans, and 5 sites suitable for pilot deployment.
    owner: CEO
  - horizon: 0–90 days
    experiment: Price-test three commercial offers with buyers and assembler partners.
    hypothesis: Buyers prefer recurring uptime-backed pricing over a one-time charger purchase when vehicle-readiness metrics are explicit.
    successMetric: 3 signed LOIs for paid pilots using the managed-service contract structure.
    owner: CEO
  - horizon: 3–6 months
    experiment: Commission the first buffered depot pilot and instrument telemetry from arrival to dispatch.
    hypothesis: The MVP can deliver 95%+ charge-ready departures despite weak site power and outage events.
    successMetric: 60 consecutive operating days above 95% charge-ready departures and above 90% site uptime.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Validate installer, permit, and spare-parts workflows on two additional depots.
    hypothesis: The company can standardize deployment enough to shorten time from signed contract to commissioning below 90 days.
    successMetric: 2 additional sites commissioned with median deployment cycle under 90 days.
    owner: Field deployment lead
  - horizon: 6–12 months
    experiment: Launch an assembler referral pilot tied to new EV deliveries.
    hypothesis: Attached charging sales materially lower CAC and shorten sales cycles versus pure outbound selling.
    successMetric: 2 assembler referral agreements and at least 25% of new pipeline sourced from partners.
    owner: Sales engineer
  - horizon: 12–18 months
    experiment: Test one corridor or shared-fleet hub using the proven depot operating stack.
    hypothesis: The depot product and operating model can extend into higher-throughput sites without breaking unit economics.
    successMetric: 1 paid non-depot site launched with utilization and uptime within 20% of mature depot benchmarks.
    owner: CEO
operations:
  - Standardize a site-survey and power-constraint checklist before quoting any depot.
  - Run remote telemetry, uptime alerting, and dispatch reporting from day one.
  - Hold spare batteries, charger modules, and critical components locally for fast repair.
  - Build a preferred-installer and utility-interface playbook for Addis deployments.
  - Use assembler, landlord, and corridor partners selectively to unlock sites after the direct-sales motion works.
team:
  - role: CEO
    startTiming: Month 0
    rationale: Founder-led sales and partnership work are required to validate buyer density, pricing, and channel strategy before headcount scales.
  - role: Founding eng
    startTiming: Month 0
    rationale: The company needs an owner for charging orchestration, telemetry, and site-level software integration from the first pilot.
  - role: Field deployment lead
    startTiming: Month 1
    rationale: Early execution risk sits in site surveys, commissioning, safety procedures, and maintenance readiness, not in pure software.
  - role: Sales engineer
    startTiming: Month 4
    rationale: Once the first pilots exist, a technical seller is needed to scope fleet workflows, quote sites, and convert pilots into production contracts.
  - role: Service technicians
    startTiming: Month 6
    rationale: Repeatable uptime requires local maintenance capacity and disciplined preventive service as soon as three or more live sites are running.
milestones:
  - horizon: 0–12 months
    items:
      - Validate 10+ qualified Addis fleet buyers with documented EV expansion plans
      - Sign 3 paid pilots and commission the first 2-3 buffered depot sites
      - Prove 95%+ charge-ready vehicle departures at one live customer depot
      - Secure the first assembler or importer referral agreement
  - horizon: 12–24 months
    items:
      - Grow to 8-12 contracted depot sites and standardize deployment under 90 days
      - Reach repeatable pilot-to-production conversion above 60%
      - Launch multi-site dashboarding and partner-led site acquisition
      - Test one corridor or shared-fleet expansion site
  - horizon: 24–36 months
    items:
      - Expand beyond Addis through partner-led corridor and second-city opportunities
      - Win multi-site contracts with fleets or assemblers operating across East Africa
      - Build a data moat in depot sizing, outage forecasting, and maintenance planning
      - Decide whether to remain infrastructure-focused or add broader network services
risks:
  - risk: The direct Ethiopia beachhead may be too narrow to support fast repeatability.
    likelihood: Medium
    impact: High
    mitigation: Validate buyer density before inventory build, then add assembler-led channels and regional expansion only after paid local proof.
  - risk: Utility, permitting, or landlord approvals may still delay deployments despite buffered architecture.
    likelihood: High
    impact: High
    mitigation: Start on private depots with simpler approvals, document standard interconnection packages, and avoid bespoke site work in the first year.
  - risk: Buyers may compare the offer against manual charging, OEM hardware, or swap alternatives and resist recurring pricing.
    likelihood: Medium
    impact: High
    mitigation: Sell on dispatch reliability, missed-trip reduction, and time-to-capacity rather than on charger specifications alone.
  - risk: Imported hardware, spare-parts delays, or maintenance failures could break SLA performance.
    likelihood: Medium
    impact: High
    mitigation: Keep local spare inventory, simplify the first hardware stack, and tightly limit site count until service operations are stable.
  - risk: EV adoption could slow if vehicle affordability or financing deteriorates.
    likelihood: Medium
    impact: Medium
    mitigation: Focus on fleets with approved purchase plans and work with assemblers or financiers that can bundle charging into vehicle expansion.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months of customer discovery, first-site deployments, charging
    orchestration software, local field operations, spare-parts inventory, and
    assembler or site-partner development needed to prove a repeatable Addis
    depot business before regional expansion.
