competitors:
  - name: OptiGrid
    stage: scale-up
    wedge: "Battery-integrated DC fast charging for fleet depots that avoids utility upgrades."
    pricing: "Custom enterprise pricing; not public"
    strength: "Purpose-built for power-constrained depots with 4-6 week deployment claims and integrated storage."
    weaknessVsUs: "Not localized for Ethiopian permitting, site operations, or four-wheeler fleet relationships in Addis; current product orientation is US-centric."
    sourceRefs: [19, 20, 21]
  - name: ABB EV Charging
    stage: incumbent
    wedge: "Global AC/DC charging hardware, bus charging, and service software."
    pricing: "Custom hardware and network pricing; not public"
    strength: "Brand credibility, broad charger portfolio, and existing know-how across large charging networks."
    weaknessVsUs: "A hardware-first offer does not inherently solve blackout resilience, demand smoothing, or local uptime operations at constrained depots."
    sourceRefs: [17, 22]
  - name: Ampersand Energy
    stage: scale-up
    wedge: "Battery-swap network and integrated energy platform for commercial electric motorcycles in East Africa."
    pricing: "Battery rental / swap model; not public"
    strength: "Proof that African commercial fleets adopt when energy access is reliable, with 20,000+ swaps/day and an expanding partner network."
    weaknessVsUs: "Vehicle-class specific and optimized for two-wheelers plus swapping, not neutral four-wheel depot fast charging in Ethiopia."
    sourceRefs: [23, 24, 27, 28]
  - name: Roam
    stage: scale-up
    wedge: "Kenya-built electric motorcycles and buses with charging hubs, partnerships, and fleet-support software."
    pricing: "Project, financing, and partner-led pricing; not public"
    strength: "Integrated approach that combines vehicles, charging, finance partners, and African operating context."
    weaknessVsUs: "Current focus is Kenya-centric and skewed toward buses and motorcycles rather than weak-grid buffered depots for Addis-based four-wheel fleets."
    sourceRefs: [29, 30, 31, 32, 35, 36]
