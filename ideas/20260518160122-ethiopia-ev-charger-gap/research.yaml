market:
  tam:
    value: "$25.2M"
    rationale: >-
      Bottom-up 2030 Ethiopia case: 500,000 EV target [2]; assume 6% are depot-based commercial vehicles that need managed charging = 30,000 vehicles; assume one buffered fast-charging bay can support ~10 vehicles in scheduled depot use [15, 19, 21] = 3,000 bays; assume $700/month revenue per active bay from energy plus uptime management, which is below the current savings envelope visible in Addis taxi and EV-owner economics [1, 2, 13]. 3,000 x $700 x 12 = $25.2M.
    isEstimate: true
    sourceRefs: [1, 2, 13, 15, 19, 21]
  sam:
    value: "$5.9M"
    rationale: >-
      Beachhead SAM applies an Addis-focused constraint: with charging still concentrated in the capital, assume about 700 active bays are reachable across the first wave of depot fleets and assembler-linked sites. 700 x $700 x 12 = $5.88M.
    isEstimate: true
    sourceRefs: [1, 2, 19, 21]
  som:
    value: "$1.0M"
    rationale: >-
      A realistic year-3 SOM is about 120 active bays across roughly a dozen fleet depots, equivalent to ~10% of the Addis beachhead bay base. 120 x $700 x 12 = about $1.0M annual revenue.
    isEstimate: true
    sourceRefs: [1, 2, 19, 21]
