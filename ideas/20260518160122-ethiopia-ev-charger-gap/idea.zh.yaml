differentiator: 大多数充电创业公司会先去追公共网络密度，但埃塞俄比亚最难的问题是：商业场站等不起电网补强，却又必须有稳定电力。把缓冲后的吞吐、软件排程和 uptime 保障一起卖出去之后，这家公司卖的就不再是大宗硬件，而是车队运营能力。护城河会顺着站点数据、公用事业并网经验、车队需求预测和优质 depot/走廊点位优先权不断加深。
