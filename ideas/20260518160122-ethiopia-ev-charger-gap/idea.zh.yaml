jobsToBeDone:
- job: 当我在亚的斯扩张电动出租或配送车队时，帮我尽快把稳定的 depot 充电能力搭起来，这样我不用等公用事业升级，也能让新车按时上路。
  currentAlternative: 人工慢充，再去稀缺的公共充电桩排队
  successMetric: 每天 95%+ 的排班车辆离开 depot 时都带着所需电量
- job: 当停电或负载上限打乱 depot 运转时，帮我按班次给车辆排充电优先级，这样我能少掉趟、少丢收入。
  currentAlternative: 靠员工手工轮充，没有软件控制
  successMetric: 每辆车因充电问题导致的误班和停运时长下降
