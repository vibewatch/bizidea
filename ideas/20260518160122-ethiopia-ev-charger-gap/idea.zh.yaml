problem: 埃塞俄比亚 EV 车队增长速度远快于充电网络：115,000+ 辆 EV 共用亚的斯亚贝巴不到 100 个充电桩，首都之外更是没有充电基础设施。燃油短缺正在把电动化的经济性推到眼前，车队运营商却还得靠低效、拼凑式的充电流程和高风险的路线规划硬扛。与此同时，停电和大容量并网延迟也在拖慢传统建站节奏——需求已经先到了，标准基础设施还没来。
targetUser:
  primary: 亚的斯亚贝巴电动出租、网约车和包裹配送车队的运营负责人——这些车队通常有 25–150 辆车，集中停在一个 depot 或停车场
  secondary: 希望把稳定充电能力一起打包卖给商业车队的 depot 场地主和 EV 组装商伙伴
  buyer: 商业 EV 车队的车主、COO 或运营负责人
startupThesis:
  nonObviousInsight: 埃塞俄比亚眼下最先需要的不是一个面向消费者的充电 App，而是一种能在弱电网车队场站里“制造”稳定充电能力的办法。把电池缓冲、能量管理和快速部署打包在一起的创业公司，可以比完整的公用事业升级或全城公共网络更早几个月把缺口变成收入。
  beachhead: 亚的斯亚贝巴电动出租和包裹配送车队——车队规模 25–150 辆、只用一个 depot，而且短期内拿不到及时的大容量电网升级
  wedge: 装在车队场站里的电池缓冲快充 depot：能在停电时管理负载，并按车辆可用充电时长来卖保障
  whyNowCatalyst: 伊朗相关的燃油冲击，恰好发生在埃塞俄比亚 EV 保有量已经跑赢充电供给、电网升级又还没跟上的时点，结果是 EV 普及一下成了国家级优先项。
  ventureScalePath: 先从亚的斯商业车队的 depot 充电切入，再往城际走廊枢纽、组装商和进口商融资捆绑、公用事业需求响应服务，以及东非其他弱电网 EV 市场延展。
solution: 为车队运营商建设模块化充电场站，把 DC 快充、站内电池储能和按有限电网容量排程的软件装进同一个系统。电池缓冲让站点在频繁停电或公用事业升级延迟时，依然能打出有用的充电功率；软件则按班次需求和电量状态给车辆排优先级。客户买到的不是一堆硬件，而是稳定的车队吞吐：远程监控、可用率告警和维护服务都打包在里面。等车队利用率把需求锚住之后，网络再叠加面向公众的开放时段和走廊站点。
goToMarketSeed:
  firstCustomer: 一家亚的斯亚贝巴网约车或包裹配送车队，准备在一个 depot 新增 20–50 辆 EV，目前还在为怎么拿到稳定的夜间充电能力发愁
  buyingTrigger: 车队签下新的 EV 采购单或扩张计划，但在车辆到场前拿不到足够稳定的充电容量
  currentAlternative: 稀缺的公共充电桩、依赖现有站点电力的人工慢充，或一边等公用事业升级一边自建
  switchingReason: 这家创业公司能比公用事业主导的建站更快把可用充电容量落地，能在电力波动里守住车辆电量，还能给运营商一份和车队利用率挂钩的 uptime SLA，而不是一次性卖完设备就结束。
  pricingHypothesis: 每个活跃充电 bay 按月收费，再加上按交付 kWh 计费，并为保证 uptime 的容量收取溢价
