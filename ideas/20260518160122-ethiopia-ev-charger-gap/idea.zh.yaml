topRisks:
- name: 电网与审批拖慢节奏
  description: 即便用了缓冲系统，公用事业审批、进口延迟或市政许可仍可能拖慢部署。
  mitigation: 先从审批更简单的私有车队 depot 做起，提前谈好标准化并网方案，并按分阶段扩容来设计系统。
- name: 车队利用率波动
  description: 如果 EV 扩张放缓或车队融资收紧，早期客户可能吃不满充电资产。
  mitigation: 优先盯住按确认节奏买车的车队，合同里加最低承诺量，并让模块化资产能跨站点复用。
- name: 政策或支付环境不稳
  description: 补贴变化、汇率波动或进口政策调整，都会同时挤压客户预算和硬件毛利。
  mitigation: 能用硬通货挂钩合同就尽量用，分散供应商，同时和组装商合作，把充电一起打进车辆融资方案。
