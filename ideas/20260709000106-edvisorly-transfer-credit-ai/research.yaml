openQuestions:
- What override rate and confidence threshold will registrars accept before they stop trusting conditional pre-admit credit maps?
- How often do target campuses have reusable machine-readable historical equivalencies versus scattered PDFs, spreadsheets, and email archives?
- Does a 24-hour conditional credit answer measurably improve transfer yield enough to justify a six-figure workflow purchase in one cycle?
- Will first buyers accept a counselor-facing overlay before SIS writeback, or will they insist on deeper system-of-record integration at launch?
