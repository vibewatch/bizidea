  validationPlan:
  - priority: high
    question: Does a 24-hour conditional credit map materially improve inquiry-to-apply and apply-to-deposit rates for transfer prospects?
    evidenceToGather: A/B pilot data across one intake cycle comparing response-time SLA, inquiry-to-apply conversion, and deposit rate versus historical baseline.
  - priority: high
    question: What override rate and confidence threshold will registrars tolerate before trust breaks?
    evidenceToGather: Blind backtest of at least 500 historical evaluations across top feeder institutions with registrar review of false positives and false negatives.
  - priority: medium
    question: How much of the first-year value depends on deep SIS writeback versus a counselor-facing overlay?
    evidenceToGather: Pilot implementation plans from 5 target campuses showing minimum required integrations for go-live.
  - priority: medium
    question: 'Who actually owns the budget in the first deal: enrollment, registrar, CIO, or system office?'
    evidenceToGather: Ten procurement and discovery interviews plus one completed budget map from a public-university buying committee.
