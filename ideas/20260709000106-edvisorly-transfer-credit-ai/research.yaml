market:
  tam:
    value: $110.0M
    rationale: Model ~1,000 of the 2,691 U.S. 4-year Title IV institutions as transfer-intensive enough for dedicated transfer-operations software; 1,000 × $110k ACV = $110.0M.
    isEstimate: true
    sourceRefs:
    - 4
    - 46
  sam:
    value: $34.1M
    rationale: Constrain TAM to ~310 Banner/Colleague-heavy public regional campuses with meaningful transfer volume; 310 × $110k ACV = $34.1M.
    isEstimate: true
    sourceRefs:
    - 29
    - 46
  som:
    value: $2.8M
    rationale: Reach 25 campuses by year 3 through one-state or one-system clusters and human-in-loop rollout; 25 × $110k ACV = $2.75M, rounded.
    isEstimate: true
    sourceRefs:
    - 10
    - 29
