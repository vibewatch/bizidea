scenarios:
  downside:
    description: "Procurement slips by one intake cycle, feeder-school data is messier than expected, and more campuses demand deeper SIS work before launch."
    y3RevenueK: 1520.0
    y3EbitdaK: -520.0
    cashLowPointK: 95.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches about 18 instead of 25."
      - "Blended realized ACV stays closer to the low $100K range because premium modules and onboarding attach more slowly."
      - "Gross margin stalls near 70 percent because deployment work remains services-heavy."
  base:
    description: "Overlay-first pilots convert on schedule, campuses accept export-first deployment, and one multi-campus cluster begins contributing logos in Y3."
    y3RevenueK: 2085.0
    y3EbitdaK: -215.6
    cashLowPointK: 326.4
    keyAssumptionChanges:
      - "3 paying campuses by M12, 8 by Q4Y2, and 25 by Q4Y3."
      - "Blended realized revenue per campus exits near the researched $2.8M ARR on 25 campuses."
      - "Gross margin reaches the mid-70s only after implementation templates and overlay-first launches become standard."
  upside:
    description: "A system-office cluster lands earlier, premium analytics attaches faster, and the delivery playbook becomes repeatable sooner than planned."
    y3RevenueK: 2500.0
    y3EbitdaK: 120.0
    cashLowPointK: 430.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches about 30 instead of 25."
      - "Blended realized ACV trends toward the high end of the $90K-$130K annual contract range as premium modules attach."
      - "Gross margin reaches roughly 77 percent as custom integration work falls faster."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Production campuses settle near about $100K annual value and expansion modules attach later."
    baseCase: "Steady-state annual value stays anchored near the researched $110K per campus."
    upsideCase: "Analytics and articulation-maintenance modules push realized value toward about $120K."
    y3RevenueImpactK: -210.0
    cashImpactK: -155.0
  - variable: "CAC"
    downsideCase: "Longer public procurement and weaker partner leverage push CAC toward about $70K."
    baseCase: "CAC holds near about $55.9K with founder-led and partner-led sourcing."
    upsideCase: "Cluster sourcing and referrals pull CAC closer to about $45K."
    y3RevenueImpactK: -70.0
    cashImpactK: -210.0
  - variable: "churn"
    downsideCase: "Monthly churn rises toward 2.5 percent if campuses treat the tool as a pilot utility instead of a core workflow."
    baseCase: "Monthly churn holds near 1.5 percent after annual contracts begin."
    upsideCase: "Monthly churn stays near 1.0 percent once the product becomes part of transfer-operations governance."
    y3RevenueImpactK: -150.0
    cashImpactK: -120.0
  - variable: "sales cycle"
    downsideCase: "Paid pilot and production conversion each slip by roughly one intake cycle."
    baseCase: "Design-partner to paid-pilot conversion happens inside the planned intake-cycle cadence."
    upsideCase: "Enrollment-led budget ownership compresses approvals by about one quarter."
    y3RevenueImpactK: -360.0
    cashImpactK: -250.0
  - variable: "gross margin"
    downsideCase: "Gross margin stalls around 70 percent because more campuses require custom SIS work."
    baseCase: "Gross margin reaches about 74 percent in Y3."
    upsideCase: "Gross margin reaches about 77 percent as onboarding templates standardize."
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: "hiring pace"
    downsideCase: "A second delivery hire and the third engineer are pulled forward by two quarters before demand is fully proven."
    baseCase: "Hiring follows the implementation-first sequence in the business plan."
    upsideCase: "The last delivery hire waits until after cluster proof without hurting customer launches."
    y3RevenueImpactK: 0.0
    cashImpactK: -140.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      TargetAccounts[Target campuses] --> PaidPilots[Paid intake-cycle pilots]
      PaidPilots --> AnnualContracts[Annual campus contracts]
      AnnualContracts --> Expansion[More feeders plus premium modules]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base revenue comes from growing from 3 paying campuses at Y1 exit to 25 by Q4Y3 while blended campus value stays near the researched $110K annual contract anchor."
  - checkName: "Must go right"
    finding: "Pilots must convert into annual contracts and at least one cluster rollout must emerge so logo growth can outrun long public-university sales cycles."
  - checkName: "Model breaks if"
    finding: "If procurement slips by one intake cycle or campuses force deeper SIS work early, the downside case drives the cash floor toward roughly $0.1M before the seed story is proven."
  - checkName: "Next-round proof"
    finding: "The next financing story is 5-8 paying campuses by Q4Y2 with 2-3 annual conversions, compliance packaged, and one repeatable cluster deployment underway."
sanityChecks:
  ruleOf40: "Y3 growth 241.8% + EBITDA margin -10.3% = 231.5%"
  burnMultiple: "Y2 burn multiple is about 2.0x using roughly $0.9M of EBITDA burn against about $0.4M of net new exit ARR; by Y3 it improves to about 0.1x as exit ARR reaches about $2.8M."
  revenuePerFte: "$208.5K Y3 on 10 ending FTE (benchmark $200-400K SaaS)"
  flags:
    - "The jump from 8 campuses at Q4Y2 to 25 at Q4Y3 assumes at least one system or state-cluster rollout; a purely one-campus-at-a-time motion would likely miss the base case."
    - "Early blended revenue per campus is lifted by paid pilots and onboarding fees, so exit ARR is a cleaner operating gauge than annual revenue until annual contracts dominate the mix."
    - "Gross margin only reaches the mid-70s if campuses keep accepting overlay-first launches instead of forcing deep SIS writeback earlier than the business plan assumes."
    - "Cash is modeled as EBITDA; delayed procurement signatures, prepayments, or implementation receivables could move the real cash curve by a few months."
