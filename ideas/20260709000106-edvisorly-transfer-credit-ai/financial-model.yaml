slug: "transfer-credit-offer-engine"
date: "2026-07-09"
currency: "USD"
modelStartMonth: "2026-08"
assumptions:
  - id: "A1"
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-09] the operating model starts in the first full month after the dated business plan."
  - id: "A2"
    name: "Opening cash / pre-seed raise"
    value: "$2.1M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] raise is sized to reach the 12-24 month milestone and keep about six months of buffer."
  - id: "A3"
    name: "Starting paying campuses"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months + BP experimentRoadmap] the company begins pre-revenue and must convert design partners into paid pilots first."
  - id: "A4"
    name: "Paying campus definition"
    value: "A campus paying either for a pilot or for an annual production contract"
    unit: "definition"
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] customersEop includes all campuses already generating cash, not only fully annualized contracts."
  - id: "A5"
    name: "Pilot package economics"
    value: "$40K over roughly 3 months (~$13.3K per month)"
    unit: "USD/campus"
    source: "[BP investorMemo.firstCustomer.initialContract $30k-$50k paid pilot] the base case uses the midpoint for the first intake-cycle pilots."
  - id: "A6"
    name: "Production ACV anchor"
    value: "$110K annual ACV by Y3 with some campuses landing between $90K and $130K"
    unit: "USD/campus/year"
    source: "[Research bottomUpSizingDrivers assumed annual contract value $110k + BP investorMemo.firstCustomer.initialContract $90k-$130k annual contract] steady-state ARPU is anchored to the researched market sizing."
  - id: "A7"
    name: "Customer ramp"
    value: "M5 first paid pilot; 3 paying campuses by M12; 4/5/6/8 by Y2 quarter; 12/16/21/25 by Y3 quarter"
    unit: "customersEop"
    source: "[BP milestones 0-12, 12-24, and 24-36 months + Research market.som 25 campuses by year 3] base case matches the stated logo milestones and SOM target."
  - id: "A8"
    name: "Revenue recognition convention"
    value: "Period-end paying campuses multiplied by blended realized revenue per campus for that period"
    unit: "formula"
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] this keeps revenue directly tied to customer count while allowing early periods to reflect pilot and onboarding mix."
  - id: "A9"
    name: "Blended revenue per paying campus ramp"
    value: "Pilot-heavy Y1 months run about $13.3K-$14.0K per campus per month; Y2-Y3 quarterly realized ARR rises from roughly $100K to about $112K per campus as annual contracts and modules take over"
    unit: "USD/campus/year equivalent"
    source: "[BP pricing basis + Research market.som 25 campuses and about $2.8M ARR] the exit run-rate stays aligned with the researched SOM while early months carry pilot and onboarding revenue."
  - id: "A10"
    name: "Gross margin ramp"
    value: "45%-52% in Y1, 63%-71% in Y2, 72%-75% in Y3"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on overlay-first deployment + Research adoptionFrictionMatrix] early policy-mapping and integration work depress margin before the package becomes repeatable."
  - id: "A11"
    name: "Hiring timeline"
    value: "M1 founder and founding engineer; M3 registrar implementation lead; M7 solutions engineer; M10 customer success/partnerships; M16 second engineer; M19 first sales hire; M22 G&A; M28 third engineer; M31 second solutions hire"
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale] hiring stays design-partner and implementation led before adding scaled sales capacity."
  - id: "A12"
    name: "Founder loaded compensation"
    value: "$145K"
    unit: "USD/year"
    source: "[BP team Founder / CEO + startup-finance heuristic] lean founder cash pay plus taxes and benefits."
  - id: "A13"
    name: "Engineering loaded compensation"
    value: "$165K"
    unit: "USD/year"
    source: "[BP team Founding eng + startup-finance heuristic] reflects senior product and data workflow talent without large-company cash levels."
  - id: "A14"
    name: "Registrar / articulation loaded compensation"
    value: "$115K"
    unit: "USD/year"
    source: "[BP team Registrar / articulation implementation lead + startup-finance heuristic] domain-heavy implementation talent is required but not at pure software-engineer rates."
  - id: "A15"
    name: "Solutions / integrations loaded compensation"
    value: "$145K"
    unit: "USD/year"
    source: "[BP team Solutions / integrations engineer + startup-finance heuristic] reflects Banner/Colleague connector work and campus deployment ownership."
  - id: "A16"
    name: "Customer success / partnerships loaded compensation"
    value: "$130K"
    unit: "USD/year"
    source: "[BP team Customer success / partnerships lead + startup-finance heuristic] covers renewals, partner management, and campus expansion support."
  - id: "A17"
    name: "Sales / GTM loaded compensation"
    value: "$155K"
    unit: "USD/year"
    source: "[BP gtm.channels + startup-finance heuristic] early enterprise GTM spend includes travel and variable compensation."
  - id: "A18"
    name: "G&A loaded compensation"
    value: "$100K"
    unit: "USD/year"
    source: "[BP operations + startup-finance heuristic] covers lean finance, vendor administration, and public-sector compliance support."
  - id: "A19"
    name: "Payroll allocation to P&L lines"
    value: "Founder 75% S&M / 25% G&A; registrar 40% S&M / 60% R&D; solutions 35% S&M / 65% R&D; engineering 100% R&D; customer success and sales 100% S&M; G&A 100% G&A"
    unit: "allocation"
    source: "[BP team role rationales + BP operations] this maps headcount cost into the functional P&L lines used in the model."
  - id: "A20"
    name: "Non-payroll operating expense ramp"
    value: "Monthly non-payroll opex rises from about $15K in early Y1 to about $39K by Q4Y3"
    unit: "USD/month"
    source: "[BP operations + Research public procurement and accessibility friction + startup-finance heuristic] covers travel, cloud, legal, ACR/VPAT, insurance, and procurement support."
  - id: "A21"
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA"
    unit: "formula"
    source: "[startup-finance heuristic] capex, debt, taxes, and working-capital timing are assumed immaterial at this pre-seed stage."
  - id: "A22"
    name: "Steady-state monthly churn"
    value: "1.5%"
    unit: "percent per month"
    source: "[startup-finance heuristic for sticky workflow SaaS + BP annual campus contract model] once embedded in registrar and enrollment workflows, the product should churn less than generic SMB SaaS."
  - id: "A23"
    name: "CAC convention"
    value: "Y2-Y3 sales and marketing spend divided by 22 net new paying campuses"
    unit: "formula"
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] captures founder-led, partner-led, and first dedicated sales capacity."
  - id: "A24"
    name: "Next-round milestone for funding sizing"
    value: "By Q4Y2: 8 paying campuses, 2-3 annual conversions, compliance package live, and one cluster deployment underway"
    unit: "milestone"
    source: "[BP milestones 12-24 months + BP fundingAsk runwayMonths 18 + model cash curve] the pre-seed raise is sized to reach the stated next proof point and preserve about six months of buffer."
