- point: Salem State 公开发布了一份招标书，覆盖成绩单处理、转学评估、学分互认和意向转学生学位审核信息。
  sourceRefs:
  - 10
- point: Santa Ana College 公开演示了 AI 辅助成绩单接入，能匹配教师批准的等值对照表并写入 Colleague。
  sourceRefs:
  - 11
- point: 犹他大学调整了治理流程，加快低年级转学评估速度，防止院系审核成为瓶颈。
  sourceRefs:
  - 9
- point: EdVisorly 的客户宣传把成绩单自动化定位为省下评估员招聘、提升处理产能，而不只是文书上的方便。
  sourceRefs:
  - 13
openQuestions:
- 教务处会接受多高的改判率和置信度阈值，超过这个界限就会不再信任预录取有条件学分认定？
- 目标校区里，有多大比例的历史等值数据是机器可读、可复用的，而不是散落在 PDF、电子表格和邮件档案里？
- 24 小时有条件学分答案能否显著提升转学转化率，以支撑一次周期内的六位数工作流采购？
- 首批买家会接受一个先于 SIS 写回的顾问端叠加层，还是一开始就坚持要更深的系统记录集成？
