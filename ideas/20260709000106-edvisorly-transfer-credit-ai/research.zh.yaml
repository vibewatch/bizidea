reportMemo:
  executiveTakeaways:
  - 切口不是成绩单 OCR 本身，而是一个招生团队敢信、教务处能改判的更快转学答案。
  - '买家痛点真实但很窄：区域性公立院校需要速度和透明度，又不想把学术政策交给黑箱。'
  - 最好的首发细分市场是社区大学生源众多、还背着 Banner/Colleague 时代学分互认沉疴的公立区域性大学。
  - 竞争已经密布在成绩单自动化、学分互认发布、学位规划和 SIS 原生工具这几层，差异化必须落在可解释性加预录取专业匹配上。
  - 州级转学门户是补充品而非替代品，因为校区专属的例外情况和学位匹配逻辑依然要落在本地解决。
  marketDefinition: '初始品类是面向美国四年制院校的预录取转学分评估和学位匹配指导软件。这个痛点体量足够大：2024 年秋季转学入学同比增长
    4.4%，约 50 万学生仍从两年制院校转入四年制院校，学生转学时平均要损失超过 40% 的已修学分 [2][4][5]。'
  customerAndBuyer: 主要使用者是转学招生评估员、学分互认经理和教务处工作人员。预算通常由招生管理副校长掌握，有时和教务处或
    CIO 共同决策，因为现有项目已经把成绩单采集、等值逻辑、学生端转学门户和 SIS 集成打包进同一次采购 [10][11][12]。
  buyingTriggers:
  - point: 季节性申请激增或转学积压，让人工审核的慢暴露在招生领导层面前。
    sourceRefs:
    - 2
    - 9
    - 13
  - point: 一次现代化项目或招标书，把成绩单采集、等值逻辑和学生端转学透明度打包进同一个采购周期。
    sourceRefs:
    - 10
    - 11
    - 12
  - point: 校方领导想要更清晰的转学路径和更有竞争力的转学宣传，而不只是更快的文书处理。
    sourceRefs:
    - 4
    - 6
    - 54
    - 59
  willingnessToPay:
    summary: 付费意愿可信，因为公立院校已经在为成绩单采集和转学自动化启动企业级采购，供应商的证明点也聚焦在省下的编制、更快的首次响应和更高的顾问产能上，而不是空泛的
      AI 新奇感。
    sourceRefs:
    - 10
    - 12
    - 13
    - 17
  competitiveLandscape: 竞争分布在 AI 成绩单评估工具、学分互认发布商、学位管理套件和 SIS 原生模块之间。大多数要么只加速信息提取，要么只在事后发布等值结果；空白地带是一个预录取决策层——把非正式成绩单数据变成当日的、院校专属的、懂专业的有条件答案
    [13][17][20][24][28][30]。
  incumbentThesis:
  - incumbentClass: SIS 与学位审核套件
    point: Ellucian 一类的现有厂商已经掌握系统记录和部分转学规划工作流，但它们并不会自动赢下这个细分市场，因为院校仍需要一层更快的叠加层来给出预录取有条件答案。
    sourceRefs:
    - 24
    - 27
    - 28
    - 29
  - incumbentClass: 学分互认与成绩单基础设施
    point: Parchment 一类的基础设施帮着搬运成绩单、发布等值结果，但它自己交不出快到能影响转化率的、针对具体申请人的学分与专业答案。
    sourceRefs:
    - 30
    - 31
    - 54
    - 57
  - incumbentClass: AI 成绩单评估点工具
    point: EdVisorly 和 DegreeSight 一类的工具证明了对更快转学答案的需求，但这也意味着新进入者必须拿出更锋利的政策图谱和可解释性切口，而不是泛泛的自动化。
    sourceRefs:
    - 13
    - 17
    - 20
  - incumbentClass: 州和系统转学门户
    point: 公共转学门户能缓解信息不对称、抬高透明度预期，但仍处理不了校区专属的例外情况和快速的院校决策。
    sourceRefs:
    - 54
    - 56
    - 57
    - 59
    - 60
  - incumbentClass: 校内教务处和教师人工流程
    point: 人工校内流程灵活、也更让人放心，但抓取到的实例说明，一旦量上来，它们就会造成积压、SLA 不一致和治理阻力。
    sourceRefs:
    - 9
    - 10
    - 11
  regulatoryLandscape: 产品必须在 FERPA 的"学校官员"模型内运行，扛得住公共部门无障碍审查，并兼容现有成绩单标准。实际操作中，这意味着合同条款要写清楚学生数据由院校掌控、要准备
    ACR/VPAT 文档应对 WCAG 和 Section 508 审查，还要用标准化的成绩单交换方式，而不是不透明的私有格式 [33][34][35][36][37][39][40]。
  technologyLandscape: 核心技术已经就绪：成绩单信息提取、基于规则的匹配、自助式规划，以及 Banner/Colleague/PeopleSoft 侧的集成。缺的不是原始
    OCR 能力，而是把这些拼件缝合成一个可解释的、能从每次改判中学习的有条件学分与专业答案，同时不逼着院校推倒重建 SIS
    [13][17][20][24][28][31]。
  distributionChannels:
  - point: 创始人主导，直接卖进招生和教务处现代化项目，是最干净的第一渠道，因为这个问题本来就已经被当作工作流基础设施来编预算。
    sourceRefs:
    - 10
    - 12
    - 13
  - point: AACRAO 和转学从业者论坛是高信号的需求生成渠道，因为它们聚集了真正管着转学分治理的运营买家。
    sourceRefs:
    - 16
    - 45
  - point: SIS、学分互认和成绩单交换合作伙伴能把产品带入现有校园项目，而不是逼着院校从零启动。
    sourceRefs:
    - 24
    - 30
    - 31
  partnershipEcosystem:
  - point: SIS 和成绩单交换合作伙伴很关键，因为初创公司必须围绕现有的 Banner、Colleague 和 PeopleSoft 时代基础设施做读写，而不是取代它们。
    sourceRefs:
    - 24
    - 31
    - 39
  - point: 州和系统转学办公室能在学分互认预期和生源路径已经明确的地方，开出成批的共创客户账号。
    sourceRefs:
    - 54
    - 57
    - 59
    - 60
  - point: AACRAO 一类的专业社群很重要，因为这个品类卖的既是自动化能力，也是政策信任和治理能力。
    sourceRefs:
    - 16
    - 45
  dataMoats:
  - point: 由真实改判和边缘案例构建的院校专属等值图谱，比通用 OCR 或路由更难被复制。
    sourceRefs:
    - 11
    - 20
    - 28
  - point: 跨生源校的课程与结果数据可以变成一层专有预测能力，判断什么大概率能转、哪里置信度低。
    sourceRefs:
    - 17
    - 19
    - 54
  - point: 把成绩单输入、决策逻辑、例外情况和最终登记结果串起来的持久审计留痕，可以复合成信任度和基准数据。
    sourceRefs:
    - 9
    - 30
    - 31
  geographicConsiderations:
  - point: 产品应该先在美国、在转学基础设施明显、社区大学生源网络密集的州上线。
    sourceRefs:
    - 54
    - 56
    - 57
    - 59
    - 60
  - point: 以 Banner 和 Colleague 为主的公立系统很有吸引力，因为集成假设和流程痛点在校区间更可复制。
    sourceRefs:
    - 27
    - 29
  - point: 跨州扩张仍需要本地政策翻译，因为州级门户统一的是可见性，而不是院校层面的例外情况。
    sourceRefs:
    - 4
    - 54
    - 59
    - 60
  sensitivityCases:
  - case: 州级转学门户和保证录取路径变得远更精细
    impact: 如果公共门户开始更早解决校区专属的适用性问题，初创公司必须把切口转向例外处理、专业匹配模拟和速度，而不是基础的透明度。
    sourceRefs:
    - 54
    - 56
    - 57
    - 59
    - 60
  - case: 现有套件推出可比拟的当日 AI 转学工作流
    impact: 如果 Ellucian 一类及相邻厂商缩小速度差距，差异化就要转向可解释性、生源网络数据和顾问友好的录取体验。
    sourceRefs:
    - 24
    - 27
    - 28
    - 29
  - case: 校区数据卫生状况比预期更差
    impact: 如果历史等值数据和项目规则过于零散，实施时间会拉长，近期 ROI 会从转化率提升转向后台省人力。
    sourceRefs:
    - 9
    - 10
    - 11
    - 31
  validationPlan:
  - priority: high
    question: 24 小时有条件学分认定方案能否实质性提升转学意向学生的咨询转申请率和申请转报到率？
    evidenceToGather: 在一个入学周期内做 A/B 试点，对比响应时长 SLA、咨询转申请转化率和报到率与历史基线。
  - priority: high
    question: 教务处能容忍什么样的改判率和置信度阈值，超过这个界限信任就会破裂？
    evidenceToGather: 对排名靠前生源院校的 500 份以上历史评估做盲测回测，由教务处审核假阳性和假阴性。
  - priority: medium
    question: 第一年的价值有多少依赖深度 SIS 写回，有多少靠顾问端叠加层就能实现？
    evidenceToGather: 收集 5 个目标校区的试点实施方案，看清楚上线所需的最低集成程度。
  - priority: medium
    question: '第一单的预算到底归谁：招生、教务处、CIO，还是系统办公室？'
    evidenceToGather: 做十次采购与初步接触访谈，加一份来自某公立大学采购委员会的完整预算图。
