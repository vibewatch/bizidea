  fiveForces:
    supplierPower:
      score: 3
      rationale: 成绩单标准和 SIS API 很重要，但产品可以跨多条技术路径运作，不依赖单一垄断供应商。
      sourceRefs:
      - 31
      - 39
      - 40
    buyerPower:
      score: 4
      rationale: 买家池集中且采购流程繁重；公立院校能靠 IT 审查、学术治理和正式招标流程把决策周期拉长。
      sourceRefs:
      - 10
      - 12
      - 46
    threatOfEntrants:
      score: 3
      rationale: 新进入者能很快拼出 OCR 加 LLM 组件，但可信的院校专属政策图谱和部署打法仍需要时间积累。
      sourceRefs:
      - 17
      - 20
      - 29
    threatOfSubstitutes:
      score: 4
      rationale: 对还没把响应速度当作战略变量的院校来说，人工审核、学位审核模块和州级转学门户都可以算是够用的替代品。
      sourceRefs:
      - 9
      - 28
      - 54
      - 59
    competitiveRivalry:
      score: 4
      rationale: 竞争已经很激烈，因为多家厂商在攻打这条工作流的相邻层，并且都能扩展到当日转学决策。
      sourceRefs:
      - 13
      - 17
      - 20
      - 24
      - 30
  pestle:
  - factor: political
    impact: positive
    point: 州级转学计划不断加码，让院校面对更大压力，要把流动性和适用性对学生讲清楚。
    sourceRefs:
    - 54
    - 57
    - 59
    - 60
  - factor: economic
    impact: positive
    point: 招生压力和评估人手稀缺，让更快的转学答案看起来更像是营收保护，而不只是后台效率提升。
    sourceRefs:
    - 2
    - 10
    - 13
  - factor: social
    impact: positive
    point: 学生的求学路径越来越非线性，但仍渴望修完学士学位，这提升了对更清晰学分流动性的需求。
    sourceRefs:
    - 4
    - 5
  - factor: technological
    impact: positive
    point: AI 成绩单信息提取、基于规则的匹配和分流审核工作流，现在已经足够可信，可以在人工参与的场景下投入生产使用。
    sourceRefs:
    - 13
    - 17
    - 20
    - 31
  - factor: legal
    impact: negative
    point: FERPA、无障碍审查和公共采购文档要求拉长了销售周期，增加了实施负担。
    sourceRefs:
    - 33
    - 34
    - 35
    - 36
    - 37
  adoptionFrictionMatrix:
  - friction: 教务处和教师对有条件决定的信任度
    severity: high
    affectedBuyer: 教务处和学分互认负责人
    mitigation: 以人工批准、置信度阈值和持续的依据/改判日志起步上线。
    sourceRefs:
    - 9
    - 11
    - 28
  - friction: 零散的历史等值数据和规则蔓延
    severity: high
    affectedBuyer: 招生运营和 CIO
    mitigation: 先导入排名靠前的生源校规则，优先处理例外队列，按生效日期给对照关系打版本号。
    sourceRefs:
    - 10
    - 11
    - 20
  - friction: 公共采购、无障碍和隐私审查
    severity: high
    affectedBuyer: CIO 和采购办公室
    mitigation: 尽早准备 ACR/VPAT、FERPA 合规合同条款和标准化的集成文档。
    sourceRefs:
    - 35
    - 36
    - 37
  - friction: 证明的是营收影响而不只是省人力
    severity: medium
    affectedBuyer: 招生管理副校长
    mitigation: 在一个周期内，围绕响应时长 SLA、咨询转申请率和节省的评估员工时做试点。
    sourceRefs:
    - 6
    - 13
    - 17
