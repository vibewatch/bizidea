  weaknessVsUs: 看起来更专注于更快的等值答案，而不是院校专属的政策治理和专业匹配方案生成。
  sourceRefs:
  - 17
  - 19
- name: Stellic Explore
  stage: scale-up
  wedge: AI 驱动的转学分加更广的学位管理工作流。
  pricing: 企业报价
  strength: 把成绩单分析和已有的规划、审核产品基础结合在一起。
  weaknessVsUs: 更宽的学位管理范围，让预录取转学答案这个切口不如专业选手聚焦。
  sourceRefs:
  - 20
- name: Ellucian
  stage: incumbent
  wedge: SIS 原生的转学规划和 Degree Works 转学等值模块。
  pricing: 企业模块 / 系统报价
  strength: 装机量大、院校信任度高，在 Banner/Colleague 上的布局很深。
  weaknessVsUs: 仍然依赖已维护的对照表和核心系统的更新节奏，而不是为当日有条件答案打造的灵活叠加层。
  sourceRefs:
  - 24
  - 27
  - 28
  - 29
- name: Parchment
  stage: incumbent
  wedge: 成绩单交换和转学学分互认基础设施。
  pricing: 企业报价
  strength: 掌握院校已经在用的关键数据搬运和等值发布通道。
  weaknessVsUs: 更专注于学分互认和数据管道，而不是可解释的、针对具体申请人的学位匹配决策。
  sourceRefs:
  - 30
  - 31
regulatoryTechnicalConstraints:
- point: 学生数据必须留在 FERPA"学校官员"框架下的院校掌控之内。
  sourceRefs:
  - 33
  - 34
- point: 公共部门交易可能要求 ACR/VPAT 文档以及 WCAG 或 Section 508 审查。
  sourceRefs:
