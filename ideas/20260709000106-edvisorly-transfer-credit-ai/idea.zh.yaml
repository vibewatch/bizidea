topRisks:
  - name: 学术信任缺口
    description: 如果系统无法解释政策逻辑，或跟不上专业例外情况，教师和教务处团队可能会拒绝自动化学分预估。
    mitigation: 先从有条件认定加人工批准起步，按生效日期给每条规则打版本号，在把更多流程自动化之前先从评估员改判中学习。
  - name: 集成阻力
    description: 高校的 Banner 或 Colleague 系统往往配置混乱，这会拖慢部署速度，让产品看起来像又一个 SIS 项目。
    mitigation: 先用非正式成绩单接入、历史决定导入和评估员工作区叠加层落地，等旺季 ROI 得到验证后再加深层集成。
  - name: 采购周期慢
    description: 高教买家可能会拖延采购，直到招生目标或人手紧缺让转学速度变得紧迫。
    mitigation: 围绕近期入学截止日期销售，配合转学转化率试点、明确的 SLA 提升，以及围绕不增编就能拿下的新增学费收入来讲投资回报。
