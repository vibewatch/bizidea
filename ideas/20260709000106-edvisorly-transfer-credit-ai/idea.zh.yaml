    - 模型质检、客户成功和政策引导上线
    - 企业销售和会议驱动的需求生成
jobsToBeDone:
  - job: >-
      截止日期临近、转学队列激增时，帮我们的招生团队把非正式成绩单变成有条件学分答案，好在意向学生流失之前把他们转化下来。
    currentAlternative: 电子表格预审、SIS 备注和评估员邮箱
    successMetric: 从收到成绩单到给出有条件录取的中位时长低于 24 小时
  - job: >-
      教务处评估员要在众多生源校之间做终审时，帮他们复用之前的等值认定，只把精力放在例外情况上，好用一致的学术政策清掉更多文件。
    currentAlternative: 老旧的学分互认对照表加各院系邮件往来
    successMetric: 每份文件的评估员工时，以及自动生成决定的改判率
