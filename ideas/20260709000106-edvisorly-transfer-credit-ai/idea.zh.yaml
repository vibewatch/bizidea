problem: >-
  高校在争抢转学生时，仍然把非正式成绩单丢进电子表格式的等值对照表、SIS 备注和各院系逐案例外处理的流程里跑。申请量上升，编制和预算却在收紧，评估员往往要花几天到几周才能告诉学生哪些学分能算、专业还转不转得过去。这个延迟同时伤害招生转化率和员工产能，因为学校没法在不把教务处专家拖进每个案例的情况下，给出一个快速、透明的答案。
targetUser:
  primary: >-
    在校生规模 6000-20000 人的美国区域性大学里，每年从 10 所以上生源社区大学招收 500-2500 名转学生、使用 Banner 或 Colleague 系统的招生副校长、转学招生主任和运营负责人。
  secondary: >-
    在高流量转学项目中维护等值对照表、审批例外情况的教务处、学分互认经理和学位审核管理员。
  buyer: 招生管理副校长
startupThesis:
  nonObviousInsight: >-
    成绩单信息提取本身正在变成标配。稀缺的是一套院校专属的政策图谱——把历史等值认定、专业规则和评估员改判都沉淀进去，变成一份可解释的预录取学分认定结果，让学校能在人工终审完成之前就先赢下转学生。
  beachhead: >-
    美国区域性大学，年转学生 500-2500 人，生源社区大学 10 所以上，使用 Banner 或 Colleague 系统，目标是在不增加评估员编制的情况下 72 小时内给出有条件学分认定结果。
  wedge: >-
    一套转学分录取引擎：导入非正式成绩单，套用院校专属的等值和 GPA 规则，24 小时内生成有条件学分认定方案和专业匹配摘要，供顾问发给意向转学生。
  whyNowCatalyst: >-
    当高校在人手不足、系统老旧的情况下要处理更多转学评估时，一个可解释的 24 小时有条件学分认定，能把转学速度从文书痛点变成招生一线的优势。
  ventureScalePath: >-
    先从有条件转学分认定切入，再扩展到学分互认维护、正式成绩单终审、先修学分认定、逆向转学，最终连成一张覆盖生源校和接收校的学生流动网络图谱。
solution: >-
  产品从意向学生上传非正式成绩单、或顾问扫描录入的那一刻开始运转。它解析课程内容，调取该校的历史等值规则和专业规则，在人工评估员碰到文件之前就生成可解释的学分预估、重新核算的 GPA，以及大概率可行的专业路径。招生顾问拿到一个带置信度标记、必要例外情况和建议下一步动作的审核队列；教务处可以批准或改判决定，并把结果反哺回政策图谱。学生收到一个带校方品牌的有条件录取页面，上面写清楚现在能转的学分、还需要复核的部分，以及最快多久能修完学位。久而久之，公司会成为这所学校及其生源网络里，捕获转学意向、维护政策、提升转化率的操作系统。
goToMarketSeed:
  firstCustomer: >-
    在校生规模 8000-15000 人、从 10-30 所生源社区大学招生、转学转化率没达标、正进入秋季或春季招生季且评估员编制没增加的美国区域性大学的招生副校长。
  buyingTrigger: >-
    季节性转学申请激增、招聘冻结，或董事会定下的招生目标，逼着学校在不增加评估员的情况下加快成绩单答复速度。
  currentAlternative: >-
    用电子表格和 SIS 备注做人工成绩单预审、老旧的学位审核或学分互认模块，以及各院系之间的例外邮件往来。
  switchingReason: >-
    这个切口能让学校在保留教务处监督权的同时，24 小时内给出可信的有条件学分和专业答案，而不是让学生排队等纯人工评估——这就是它能赢的原因。
  pricingHypothesis: >-
    按转学申请量和生源院校/规则集数量收取年度 SaaS 费用，学生端录取页面和学分互认维护模块作为增值付费选项。
whyNow:
  - point: 招生团队被明确要求用更少的人手处理更多申请和转学评估，评估积压现在已经是战略瓶颈，而不只是后台的小麻烦。
    signalRefs: ["转学申请量正在甩开人手"]
    sourceRefs: [1]
  - point: 因为许多成绩单和转学分流程仍跑在几十年前的老系统或人工审核上，一个叠加型产品不需要让高校推倒重建核心 SIS 就能赢。
    signalRefs: ["老旧成绩单流程依然当道"]
    sourceRefs: [2]
  - point: 把成绩单处理、学分认定和 GPA 重新核算自动接进同一条流程，让当日出具有条件学分认定在技术上现在站得住脚。
    signalRefs: ["AI 现在能接手最乱的中间环节"]
    sourceRefs: [1]
  - point: 更快、更透明的转学决策如今直接影响招生成效，这把成绩单评估从教务处的成本中心变成招生的营收杠杆。
    signalRefs: ["更快的决策正在决定招生成效"]
    sourceRefs: [2]
differentiator: >-
  大多数现有厂商要么只做文档解析，要么只在学生已经入学、进了学位审核系统之后才帮上忙。这家初创公司要占的是预录取决策层——学校在这里需要院校专属的学分认定逻辑、可解释性，以及快到能影响转化率的学生端答案。每一次批准或改判，都会让绑定真实转化结果的生源校等值图谱变得更准，形成通用 OCR 工具和 SIS 模块都学不来的复合数据护城河。
