slug: transfer-credit-offer-engine
date: "2026-07-09"
executiveSummary: >-
  转学分录取引擎（Transfer Credit Offer Engine）向使用 Banner/Colleague 系统的区域性大学出售一个
  24 小时有条件学分与专业答案，帮它们在不增加评估员编制的情况下处理更多转学申请人。这款产品不打算取代
  SIS 或教务处；它叠加在现有系统之上，接入非正式成绩单、院校专属的等值规则和评估员改判，产出一份人工
  可以直接批准的顾问就绪版有条件录取方案。这个滩头市场很有吸引力，因为买家角色明确、痛点具有季节性且紧迫，
  高校也已经在发招标书，把成绩单采集、转学评估和学生端规划打包在一起。研究测算的初始 TAM 约为
  $110.0M，聚焦的 SAM 约为 $34.1M，覆盖约 310 所以 Banner/Colleague 为主的公立区域性校区，三年内可
  触达的 SOM 约为 $2.8M，覆盖 25 所校区。这套打法只有在首批订单直接卖给招生副校长——围绕入学高峰或人手
  冻结、打包成单个入学周期试点、按转学量加规则复杂度而非按席位定价——才能跑通。公司能赢的前提是证明自己
  比 EdVisorly、DegreeSight、Stellic 和 Ellucian 有更锋利的切口：一个带专业匹配和教务处级改判管控的可
  解释预录取决策层，而不是通用成绩单 OCR 或录取后的学位审核。最大的悬而未决的问题是，24 小时有条件录取
  能否实质性提升咨询转申请率或申请转报到率，从而支撑六位数的年度合同；研究显示买家痛点真实存在，但独立的
  ROI 证据仍然单薄。这意味着合适的融资姿态是先做一轮种子前融资，验证回测准确度、真实转化提升幅度和叠加式
  部署速度，再去建一个更宽的转学运营平台。
problem:
  - "区域性大学仍靠电子表格、SIS 备注和各院系例外邮件来预审非正式成绩单，转学意向学生要等上几天到几周才能拿到一个能用的答案。"
  - "这个延迟同时伤害招生转化率和员工产能——招生团队没法承诺速度，教务处又必须对边缘案例和终审保留政策管控权。"
solution:
  - "导入非正式成绩单，套用院校专属的等值和 GPA 规则，24 小时内为顾问生成可解释的有条件学分认定方案加专业匹配摘要。"
  - "把低置信度的案例送进教务处改判队列，把每一次批准和例外都记入审计留痕，并复用这些决定来提升未来对生源校的覆盖度。"
whyWeWin:
  - "这个切口比大多数现有厂商站得更靠前：在最终录取之前，就给出一个当日、院校专属、懂专业的答案，而不只是成绩单采集或录取后的学位审核。"
  - "人工批准、决策依据日志和版本化规则，比黑箱 AI 或静态的州级学分互认门户更贴合教务处的治理要求。"
  - "每一次改判和最终结果都会让生源校政策图谱更准，理应随时间提升上线速度、置信度打分和防御能力。"
strategicChoices:
  beachhead: >-
    以 Banner/Colleague 为主的美国区域性公立大学，年转学生 500-2500 人，生源社区大学 10-30 所，招生副
    校长需要在不增加评估员编制的情况下 72 小时内拿到有条件转学答案。
  wedgeRationale: >-
    一个覆盖单一校区、盯住排名前 10-15 生源校的转学分叠加层，可以在一个入学周期内证明 24 小时响应速度、
    顾问采用率和教务处信任度；更宽的学位规划或全州网络玩法需要更深的集成，验证速度也更慢。
  sequencingRationale: >-
    先从非正式成绩单接入、顾问就绪的有条件录取，以及人工参与的教务处审核做起，再考虑更深的 SIS 写回、
    正式登记或多校区推广，因为研究显示信任、数据卫生和采购才是最先碰到的瓶颈。销售和共创客户的工作要先
    于组建大型工程团队，因为初版产品必须围绕真实的生源校数据和可接受的改判阈值来打磨。
  notYet:
    - "未经教务处批准就正式登记成绩单或全自动发放学分"
    - "面向非转学学生或大一新生的通用学位规划"
    - "在单校区验证之前就替换全州门户或做全国性转学市场产品"
market:
  tam: "$110.0M（研究估算：约 1,000 所转学密集型美国四年制院校，按每校约 $110k 年度合同金额计算）"
  sam: "$34.1M（研究估算：约 310 所转学量可观、以 Banner/Colleague 为主的公立区域性校区，按每校约 $110k 年度合同金额计算）"
  som: "$2.8M（研究估算：到第 3 年可触达 25 所校区，按每校约 $110k 年度价值计算）"
  segments:
    - "主要目标：以 Banner/Colleague 为主、年转学生 500-2500 人、社区大学生源网络密集的公立区域性大学"
    - "次要目标：正在多个类似校区间统一转学入学和学分互认流程的多校区公立系统"
  buyingProcess: >-
    转学招生和学分互认负责人通常是评估的发起者，但招生副校长掌握紧迫感，因为答复速度直接影响转学转化率
    和顾问产能。一旦 FERPA、ACR/VPAT 和 Banner/Colleague 集成进入范围，采购往往会扩大到教务处、CIO、
    隐私和无障碍评审人员。
product:
  mvp: >-
    面向单一校区的叠加层，导入排名靠前的生源校等值规则，解析非正式成绩单，生成有条件学分认定方案加专业
    匹配摘要，把低置信度文件送入教务处审核队列。它把结果导出到现有的顾问或 SIS 工作流里，而不是自动发放
    最终学分。
  sixMonth: "在每个校区排名前 10-15 的生源校上启动 2-3 个入学周期试点，配备教务处改判队列、顾问端录取页面和响应时长看板。"
  twelveMonth: "加入按生效日期版本化的项目规则、更深的 Banner/Colleague 连接器、按生源校拆分的模型置信度报告，以及正式成绩单终审工作区。"
  twentyFourMonth: "扩展到学分互认维护和多校区推广，只在客户已经证明信任度和数据干净度的地方，选择性加入正式登记流程。"
  keyBets:
    - "顾问端叠加层可以在不强制要求深度 SIS 写回的情况下拿下第一单。"
    - "只要能看到规则依据、置信度标记，并能改判每一个决定，教务处就能容忍上线首日的推荐结果。"
    - "专业匹配加学分认定方案，转化效果好于速度更快但通用的等值答案。"
    - "排名靠前的生源校历史数据结构化程度足够，能在一个入学周期以内把一个校区跑起来。"
gtm:
  wedge: >-
    卖一个覆盖单个入学周期、面向该校排名前列生源校的 24 小时有条件转学分加专业答案，定位为转学转化率
    保护加评估员产能纾解，而不是泛泛的 AI 自动化。
  channels:
    - "创始人主导，直接面向招生副校长、转学招生主任和教务处现代化项目发起人销售"
    - "AACRAO 及转学从业者活动，学分互认、教务处和招生负责人已经在这里讨论积压和政策信任问题"
    - "能把产品带入现有转学现代化项目的 SIS、CRM 和学分互认顾问"
  funnelTargets: "目标客户转合格试点 20-30%，合格试点转付费试点 40-50%，试点转年度正式合同 50% 以上，正式合同转追加生源校/项目扩展 50% 以上（12 个月内）"
  pricing: >-
    先卖一个覆盖单校区及其排名靠前生源校的付费单周期试点，之后转为按年转学量和生效的生源校/项目规则集
    定价的年度 SaaS，历史政策导入另收实施费。这让价格贴合招生副校长买家的紧迫感，也让首单落在一个正在
    进行的转学增长项目里，而不是一次全校 IT 替换。
businessModel:
  revenueStreams:
    - "转学分工作流的年度校区订阅费"
    - "实施和历史政策迁移费"
    - "学生端录取页面、学分互认维护和多校区分析的增值模块"
  unitOfValue: "受管理的年度转学申请人数量与生效的生源校/项目规则集"
  targetGrossMarginPct: 70
  expansionLevers:
    - "在同一校区内增加更多生源校、项目和入学周期"
    - "向上销售学生端录取页面、顾问分析和学分互认维护工作流"
    - "从单一校区扩展到多校区或系统办公室级部署"
    - "教务处信任建立后，加入正式成绩单终审工作流"
strategyMap:
  northStarMetric: "从收到非正式成绩单到教务处批准有条件学分认定方案的中位小时数"
  inputMetrics:
    - "在 24 小时内收到有条件学分认定方案的转学意向学生占比"
    - "教务处对高置信度推荐的改判率"
    - "收到有条件录取的学生，其转学咨询转申请、申请转报到的提升幅度"
    - "试点转正式合同的转化率"
    - "每个校区处于有效规则覆盖下的生源校和项目平均数量"
  moatsToBuild:
    - "按生效日期、规则来源和改判历史版本化的院校专属政策图谱"
    - "把有条件决定与真实入学和最终登记结果关联起来的跨生源校课程与结果数据集"
    - "一套比临时电子表格流程更让买家信任的 FERPA 及无障碍达标审计留痕"
  killCriteria:
    - "首批 5 所目标校区中，9 个月内从初步接触转成付费试点的不足 2 所"
    - "对 500 份以上历史评估做的盲测回测，无法把高置信度案例的教务处改判率控制在 15% 及以下"
    - "首批 3 所付费校区中，不要求强制 SIS 写回就能上线的不足 2 所"
    - "一次真实试点未能让至少 80% 的合格意向学生在 24 小时内拿到有条件答案，或未能让转学咨询转申请率比基线提升 10%"
  mermaid: |
    flowchart LR
      Wedge[24-hour conditional transfer offer wedge] --> MVP[Overlay MVP for top feeder schools]
      MVP --> Proof[24-hour SLA, low overrides, conversion proof]
      Proof --> Expansion[Articulation maintenance and multi-campus rollout]
investorMemo:
  verdict:
    call: "观察"
    conviction: "买家痛点确实存在，采购信号也真实，但目前证据还不足以说明这个新进入者能跑赢已获融资的竞争对手，也不足以说明更快的有条件答案能把转化率提升到足以支撑持久的六位数年度合同金额的程度。"
    whyBelieve: "高校已经在采购转学自动化技术栈，而预录取、懂专业的决策层，目前受到的服务仍不如成绩单采集或录取后学位审核充分。"
    whyDoubt: "初始 SAM 只有约 $34M，竞争密集，核心 ROI 主张除了供应商和采购信号之外，仍缺乏独立证据。"
    nextDiligence: "拿下一个校区试点，做一次 500 份以上文件的回测，加一个真实入学周期的验证群体，证明 24 小时 SLA、可接受的改判率和可衡量的转化率提升。"
  firstCustomer:
    title: "某 Banner/Colleague 区域性大学的招生管理副校长"
    profile: "在校生规模 8000-15000 人的公立区域性大学，从 10-30 所生源社区大学招生，转学转化率没达标，正进入评估员编制不变的入学高峰期。"
    trigger: "季节性转学申请激增、招聘冻结，或董事会级招生目标，让缓慢的成绩单答复变成一个显而易见的招生问题。"
    buyer: "招生管理副校长"
    initialContract: "为期 8-12 周的付费入学周期试点，覆盖单一校区及其排名靠前生源校，价格约 $30k-$50k；如果达到 SLA 和顾问采用率目标，可折算进一份 $90k-$130k 加实施费的年度合同。"
  mustBeTrue:
    - "首批 10 所目标校区中，至少 5 所把旺季转学积压当作招生问题，而不只是教务处的小麻烦。"
    - "顾问端叠加层可以在首单不强制要求 SIS 写回的情况下，基于排名靠前生源校的规则上线。"
    - "500 份以上文件的历史回测，能把高置信度推荐的教务处改判率维持在 15% 及以下。"
    - "收到 24 小时有条件学分认定的学生，其申请或报到转化率至少比可比历史群体高 10%。"
    - "首批 5 个付费试点中，至少 2 个在试点完成 6 个月内转为年度合同，ARR 超过 $90k。"
  diligenceQuestions:
    - "第一单由哪条预算线出钱？谁先签字：招生副校长、教务处、CIO 还是系统办公室？"
    - "目标校区有多少历史等值数据能直接用于排名靠前的生源校，而不需要几个月的清理？"
    - "教务处能接受什么样的解释格式和置信度阈值，才会信任面向学生的有条件录取？"
    - "初创公司能不能以叠加层的身份拿下首单，还是真实买家一开始就会要求 Banner/Colleague 写回和无障碍/安全审查？"
    - "如果 EdVisorly、DegreeSight、Stellic 或 Ellucian 都承诺更快的转学答案，校区为什么要选这家？"
operatingAssumptions:
  - assumption: "在项目变成 CIO 主导的平台替换之前，招生副校长能够牵头并出资拿下第一单。"
    basis: idea.yaml
    validationTest: "完成 10 通初步接触电话，拿到一份完整的预算图和一份由招生方（而非中央 IT）主导的初稿提案。"
    decisionImpact: "如果不成立，GTM 打法必须转向更长的招标周期、更早的合规打包，并放慢销售预测。"
  - assumption: "排名靠前生源校的历史等值和项目规则足够结构化，能在人工参与的叠加层下，10 周以内让一个校区上线。"
    basis: research.yaml
    validationTest: "从 3 个目标校区导入样本政策数据，在 30 天内完成排名前 10 生源校的编码，并由教务处审核。"
    decisionImpact: "如果不成立，ICP 必须收窄到数据更干净的校区，或者实施定价和服务范围必须大幅上调。"
  - assumption: "只要系统对规则做版本管理、展示决策依据、记录改判日志，教务处就会接受可解释的推荐。"
    basis: research.yaml
    validationTest: "对 500 份以上历史评估做一次盲测回测，让教务处对上线置信度阈值和例外流程签字确认。"
    decisionImpact: "如果不成立，产品就只能停留在内部决策辅助工具，学生端录取页面推迟上线。"
  - assumption: "24 小时有条件学分认定方案能足够提升转学咨询转申请或申请转报到率，从而支撑六位数的年度定价。"
    basis: research.yaml
    validationTest: "跑一次入学周期试点，将响应时长 SLA 和转化率与匹配的历史或对照群体做比较。"
    decisionImpact: "如果不成立，营销话术和定价必须转向强调省人力，年度合同金额可能因此走低，买家结构也会变化。"
  - assumption: "前 2-3 个客户会在不强制要求 SIS 写回的情况下购买叠加层。"
    basis: research.yaml
    validationTest: "从 5 个目标校区收集实施方案，确认其中至少 3 个愿意用 CRM 导出加人工登记的方式试点。"
    decisionImpact: "如果不成立，公司必须提前招聘集成人员、拉长部署周期，且很可能要在扩张前融到更多资金。"
experimentRoadmap:
  - horizon: "0-90 天"
    experiment: "对 10 个目标校区做结构化初步接触，摸清买家、触发因素、现有流程和预算归属。"
    hypothesis: "旺季转学积压足够紧迫，招生领导层愿意出资做一次付费试点。"
    successMetric: "10 个校区中至少 8 个确认既存在明显积压，也有明确的预算负责人。"
    owner: "创始人 / CEO"
  - horizon: "0-90 天"
    experiment: "用一家共创校区的排名靠前生源校规则和教务处审核，对 500 份以上历史评估做回测。"
    hypothesis: "在任何面向学生的正式上线之前，推荐引擎能把高置信度案例的改判率控制在 15% 或以下。"
    successMetric: "高置信度案例改判率达到 15% 或以下，且教务处认可初始置信度阈值。"
    owner: "创始工程师"
  - horizon: "3-6 个月"
    experiment: "在一个校区排名前 10-15 的生源校上，为一个秋季或春季入学周期上线 MVP。"
    hypothesis: "叠加式工作流可以在不做深度 SIS 写回的情况下，让大多数有条件学分认定在 24 小时内完成。"
    successMetric: "80% 及以上的合格意向学生在 24 小时内拿到教务处批准的有条件方案。"
    owner: "创始人 / 实施负责人"
  - horizon: "3-6 个月"
    experiment: "用付费入学周期试点加按量与规则复杂度定价的年度方案，测试试点转年度的定价。"
    hypothesis: "校区会接受一次付费试点，也能理解与转学量和规则覆盖挂钩的年度定价。"
    successMetric: "5 个合格意向客户中至少 3 个接受试点方案，且不拒绝年度定价基础。"
    owner: "创始人 / CEO"
  - horizon: "6-12 个月"
    experiment: "在首批 3 个付费校区验证叠加式部署与强制 Banner/Colleague 写回之间的取舍。"
    hypothesis: "大多数早期客户会先用导出加人工登记的方式上线，之后才要求更深的 SIS 集成。"
    successMetric: "首批 3 个付费校区中至少 2 个在不强制 SIS 写回的情况下上线。"
    owner: "解决方案 / 集成负责人"
  - horizon: "12-18 个月"
    experiment: "通过学分互认顾问、SIS 合作伙伴或系统办公室，试点一条渠道或集群打法。"
    hypothesis: "现有的转学现代化合作伙伴，比纯冷启动外呼更能高效带来集中的销售管道。"
    successMetric: "签下一个集群试点，或通过合作伙伴带来至少 3 个合格商机。"
    owner: "合作伙伴负责人"
operations:
  - "运行一套政策映射引导上线流程：先导入排名靠前的生源校规则，按生效日期给每条规则打版本号，学生端使用前必须经教务处批准。"
  - "在公共部门采购启动前，准备好 FERPA 合规的合同条款、基于角色的访问控制和 ACR/VPAT 材料包。"
  - "支持感知 PESC 标准的成绩单接入，加上 CRM/Banner/Colleague 导出，让校区可以试点而不必推倒重建。"
  - "每周与客户一起复核改判日志，把反复出现的例外模式变成可复用的规则和置信度阈值。"
team:
  - role: "创始人 / CEO（高教招生运营出身）"
    startTiming: "第 0 个月"
    rationale: "第一个风险是买家真实性和预算归属，所以公司需要一位能让招生负责人信服、并能把教务处的异议转化为产品范围的创始人。"
  - role: "创始工程师"
    startTiming: "第 0 个月"
    rationale: "构建成绩单接入、政策图谱引擎、置信度打分，以及试点所需的第一版顾问/教务处工作流。"
  - role: "教务处 / 学分互认实施负责人"
    startTiming: "第 2-4 个月"
    rationale: "如果没有人能梳理历史等值认定、定义例外队列并赢得教务处信任，早期部署会失败。"
  - role: "解决方案 / 集成工程师"
    startTiming: "第 6-8 个月"
    rationale: "第一个共创客户上线之后，Banner/Colleague 导出和合作伙伴集成会成为卡关项。"
  - role: "客户成功 / 合作伙伴负责人"
    startTiming: "第 9-12 个月"
    rationale: "首批试点转化之后，公司需要有人专门负责续约、生源项目扩展，以及和顾问、系统办公室的渠道关系。"
milestones:
  - horizon: "0-12 个月"
    items:
      - "拿下 2-3 个共创客户，完成一次 500 份以上文件的历史回测，高置信度案例改判率 15% 及以下。"
      - "在校区排名前 10-15 的生源校范围内，上线至少一个真实入学周期试点。"
      - "证明 80% 及以上的试点意向学生能在 24 小时内拿到教务处批准的有条件学分认定方案。"
      - "拿下第一份年度合同，交付 FERPA、ACR/VPAT 和叠加式集成套件。"
  - horizon: "12-24 个月"
    items:
      - "拓展到 5-8 个付费校区，至少把 2 个试点转为 $90k-$130k 的年度合同。"
      - "交付项目规则版本管理、Banner/Colleague 连接器，以及正式成绩单终审工作区。"
      - "拿下一个多校区或系统办公室级部署，启动学分互认维护测试版。"
      - "在两个客户身上展示可衡量的转学漏斗提升，或明确的省人力 ROI。"
  - horizon: "24-36 个月"
    items:
      - "达到研究测算的第 3 年 SOM 目标，约 25 个校区、约 $2.8M ARR。"
      - "从单校区试点扩展到可复制的系统级或州级集群推广。"
      - "上线学分互认维护和学生端录取分析的增值模块。"
      - "根据已装机客户群的信任度和数据质量，决定是否提前推进正式登记自动化。"
risks:
  - risk: "如果决策依据、置信度打分或改判管控显得薄弱，教务处和教师团队可能拒绝自动化有条件认定。"
    likelihood: High
    impact: High
    mitigation: "以人工批准起步，在每条推荐上展示规则来源，学生端录取在赢得信任阈值之前始终明确标注为有条件。"
  - risk: "历史等值数据可能过于零散，无法在一个入学周期内完成一个校区的上线。"
    likelihood: High
    impact: High
    mitigation: "先从排名靠前的生源校起步，对政策迁移收费，在数据映射完成之前不要承诺覆盖全校。"
  - risk: "公共采购、隐私和无障碍审查可能把交易拖过原本催生紧迫感的招生窗口期。"
    likelihood: Medium
    impact: High
    mitigation: "提前打包 FERPA 条款、ACR/VPAT 和集成文档，让首单能作为一个界定清楚的试点推进，而不是一次全套 IT 替换。"
  - risk: "已获融资的竞争对手或现有厂商可能在这家初创公司积累出足够的政策图谱优势之前，先推出当日转学答案。"
    likelihood: Medium
    impact: Medium
    mitigation: "在预录取专业匹配、可解释性和改判驱动的政策图谱上做出差异化，聚焦在叠加层速度比套件标准化更重要的校区。"
  - risk: "转化率提升幅度可能太小，对很多校区来说只剩下省人力这一条 ROI。"
    likelihood: Medium
    impact: High
    mitigation: "在试点中同时衡量转化率和节省的评估员工时，如果营收提升弱于预期，随时准备把定价话术转向工作流效率。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "用 18 个月验证单入学周期试点、交付叠加式集成和合规打包、把 2-3 个校区转为年度合同，并决定公司是否要扩展为更广的转学运营平台。"
