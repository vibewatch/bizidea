scenarios:
  downside:
    description: "采购推迟一个入学周期，生源校数据比预期更乱，更多校区在上线前要求做更深的 SIS 工作。"
    y3RevenueK: 1520.0
    y3EbitdaK: -520.0
    cashLowPointK: 95.0
    keyAssumptionChanges:
      - "第三年第四季度末付费校区数约为 18，而非 25。"
      - "由于增值模块和引导上线的采纳速度更慢，混合已实现年度合同金额停留在 $100K 出头的低位区间。"
      - "毛利率停滞在约 70%，因为部署工作仍然偏服务型。"
  base:
    description: "叠加式试点按计划转化，校区接受先导出后集成的部署方式，一个多校区集群在第三年开始贡献客户。"
    y3RevenueK: 2085.0
    y3EbitdaK: -215.6
    cashLowPointK: 326.4
    keyAssumptionChanges:
      - "第 12 个月 3 个付费校区，第二年第四季度末 8 个，第三年第四季度末 25 个。"
      - "以 25 个校区计算，每校区混合已实现收入最终接近研究测算的 $2.8M ARR。"
      - "只有在实施模板和叠加式上线成为标准做法之后，毛利率才会升到 70% 中段。"
  upside:
    description: "一个系统办公室级集群更早落地，增值分析模块采纳更快，交付打法比计划更早变得可复制。"
    y3RevenueK: 2500.0
    y3EbitdaK: 120.0
    cashLowPointK: 430.0
    keyAssumptionChanges:
      - "第三年第四季度末付费校区数约为 30，而非 25。"
      - "随着增值模块的采纳，混合已实现年度合同金额趋向 $90K-$130K 区间的高端。"
      - "随着定制集成工作更快减少，毛利率达到约 77%。"
sensitivity:
  - variable: "ARPU"
    downsideCase: "正式付费校区的年度价值稳定在约 $100K，增值模块采纳得更晚。"
    baseCase: "稳态年度价值保持在研究测算的每校区约 $110K 附近。"
    upsideCase: "分析和学分互认维护模块把已实现价值推向约 $120K。"
    y3RevenueImpactK: -210.0
    cashImpactK: -155.0
  - variable: "CAC"
    downsideCase: "更长的公共采购周期加合作伙伴杠杆减弱，把 CAC 推高到约 $70K。"
    baseCase: "依靠创始人主导和合作伙伴渠道获客，CAC 保持在约 $55.9K 附近。"
    upsideCase: "集群式获客和转介绍把 CAC 拉低到接近 $45K。"
    y3RevenueImpactK: -70.0
    cashImpactK: -210.0
  - variable: "churn"
    downsideCase: "如果校区把这款产品当成试点工具而非核心工作流，月流失率会升到约 2.5%。"
    baseCase: "年度合同开始后，月流失率保持在约 1.5% 附近。"
    upsideCase: "一旦产品成为转学运营治理的一部分，月流失率能维持在约 1.0%。"
    y3RevenueImpactK: -150.0
    cashImpactK: -120.0
  - variable: "sales cycle"
    downsideCase: "付费试点和正式转化都各自推迟约一个入学周期。"
    baseCase: "共创客户转付费试点的转化，发生在计划中的入学周期节奏内。"
    upsideCase: "由招生方主导的预算归属，让审批周期压缩约一个季度。"
    y3RevenueImpactK: -360.0
    cashImpactK: -250.0
  - variable: "gross margin"
    downsideCase: "因为更多校区需要定制 SIS 工作，毛利率停滞在约 70%。"
    baseCase: "第三年毛利率达到约 74%。"
    upsideCase: "随着引导上线模板标准化，毛利率达到约 77%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: "hiring pace"
    downsideCase: "在需求得到充分验证之前，第二名交付人员和第三名工程师提前两个季度到岗。"
    baseCase: "招聘按商业计划书中实施优先的顺序推进。"
    upsideCase: "最后一名交付岗位招聘等到集群验证之后才启动，且不影响客户上线。"
    y3RevenueImpactK: 0.0
    cashImpactK: -140.0
modelDiagram:
  title: "单位经济模型流程"
  mermaid: |
    flowchart LR
      TargetAccounts[Target campuses] --> PaidPilots[Paid intake-cycle pilots]
      PaidPilots --> AnnualContracts[Annual campus contracts]
      AnnualContracts --> Expansion[More feeders plus premium modules]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: "收入引擎"
    finding: "基线收入来自付费校区数从第一年末的 3 个，增长到第三年第四季度末的 25 个，期间混合校区价值保持在研究测算的 $110K 年度合同金额锚点附近。"
  - checkName: "必须跑通的环节"
    finding: "试点必须转化为年度合同，且至少要出现一次集群式推广，客户增长才能跑赢公立大学漫长的销售周期。"
  - checkName: "模型崩溃的条件"
    finding: "如果采购推迟一个入学周期，或校区提前要求做更深的 SIS 工作，下行情形会把现金底部压到约 $0.1M，届时种子轮故事还未获得验证。"
  - checkName: "下一轮融资的证据"
    finding: "下一轮融资故事是：到第二年第四季度拿下 5-8 个付费校区，2-3 个年度转化，合规套件打包完成，且有一个可复制的集群部署正在推进。"
sanityChecks:
  ruleOf40: "第三年增速 241.8% + EBITDA 利润率 -10.3% = 231.5%"
  burnMultiple: "第二年烧钱倍数约 2.0 倍，用约 $0.9M 的 EBITDA 烧钱对比约 $0.4M 的净新增退出期 ARR；到第三年改善到约 0.1 倍，退出期 ARR 达到约 $2.8M。"
  revenuePerFte: "第三年人均营收 $208.5K，对应 10 名期末 FTE（对标 SaaS 基准 $200-400K）"
  flags:
    - "从第二年第四季度的 8 个校区跳到第三年第四季度的 25 个，假设至少有一次系统或州级集群推广；如果只靠一个校区一个校区地推进，很可能达不到基线情形。"
    - "早期混合每校区收入被付费试点和引导上线费拉高，所以在年度合同占主导之前，退出期 ARR 是比年度收入更干净的运营指标。"
    - "毛利率只有在校区持续接受叠加式上线、而不是比商业计划书假设更早地强制要求深度 SIS 写回时，才能达到 70% 中段。"
    - "现金按 EBITDA 建模；采购签约延迟、预付款或实施应收款，都可能让真实现金曲线偏移几个月。"
