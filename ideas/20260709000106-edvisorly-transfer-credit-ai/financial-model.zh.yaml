slug: "transfer-credit-offer-engine"
date: "2026-07-09"
currency: "USD"
modelStartMonth: "2026-08"
assumptions:
  - id: "A1"
    name: "模型起始月份"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-09] 运营模型从商业计划书落款日期之后的第一个完整月份开始。"
  - id: "A2"
    name: "启动现金 / 种子前融资额"
    value: "$2.1M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] 融资额按能撑到 12-24 个月里程碑、并保留约六个月缓冲来定规模。"
  - id: "A3"
    name: "起始付费校区数"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months + BP experimentRoadmap] 公司从零收入起步，必须先把共创客户转化为付费试点。"
  - id: "A4"
    name: "付费校区的定义"
    value: "已经为试点或年度正式合同付费的校区"
    unit: "definition"
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 包含所有已经产生现金流的校区，不仅限于完全年度化的合同。"
  - id: "A5"
    name: "试点套餐经济模型"
    value: "约 3 个月 $40K（约每月 $13.3K）"
    unit: "USD/campus"
    source: "[BP investorMemo.firstCustomer.initialContract $30k-$50k paid pilot] 基线情形取首批入学周期试点报价区间的中位数。"
  - id: "A6"
    name: "正式年度合同金额锚点"
    value: "第 3 年年度合同金额约 $110K，部分校区落在 $90K 到 $130K 之间"
    unit: "USD/campus/year"
    source: "[Research bottomUpSizingDrivers assumed annual contract value $110k + BP investorMemo.firstCustomer.initialContract $90k-$130k annual contract] 稳态 ARPU 锚定在研究测算的市场规模上。"
  - id: "A7"
    name: "客户增长节奏"
    value: "第 5 个月拿下首个付费试点；第 12 个月累计 3 个付费校区；第二年各季度末为 4/5/6/8 个；第三年各季度末为 12/16/21/25 个"
    unit: "customersEop"
    source: "[BP milestones 0-12, 12-24, and 24-36 months + Research market.som 25 campuses by year 3] 基线情形对齐既定的客户里程碑和 SOM 目标。"
  - id: "A8"
    name: "收入确认口径"
    value: "期末付费校区数乘以该期每校区的混合已实现收入"
    unit: "formula"
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] 这让收入直接和客户数挂钩，同时允许早期各期反映试点和引导上线的收入构成。"
  - id: "A9"
    name: "每付费校区混合收入的增长曲线"
    value: "第一年以试点为主的月份，每校区每月收入约 $13.3K-$14.0K；第二到第三年，随年度合同和增值模块逐步接管，季度已实现 ARR 从每校区约 $100K 升至约 $112K"
    unit: "USD/campus/year equivalent"
    source: "[BP pricing basis + Research market.som 25 campuses and about $2.8M ARR] 退出运行速率与研究测算的 SOM 保持一致，早期月份则包含试点和引导上线收入。"
  - id: "A10"
    name: "毛利率增长曲线"
    value: "第一年 45%-52%，第二年 63%-71%，第三年 72%-75%"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on overlay-first deployment + Research adoptionFrictionMatrix] 早期的政策映射和集成工作会压低毛利率，之后这套流程才逐渐变得可复制。"
  - id: "A11"
    name: "招聘时间表"
    value: "第 1 个月：创始人和创始工程师；第 3 个月：教务处实施负责人；第 7 个月：解决方案工程师；第 10 个月：客户成功/合作伙伴；第 16 个月：第二名工程师；第 19 个月：首位销售；第 22 个月：G&A；第 28 个月：第三名工程师；第 31 个月：第二名解决方案人员"
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale] 在加大规模化销售投入之前，招聘始终围绕共创客户和实施工作展开。"
  - id: "A12"
    name: "创始人全负荷薪酬"
    value: "$145K"
    unit: "USD/year"
    source: "[BP team Founder / CEO + startup-finance heuristic] 精简的创始人现金薪酬，含税费和福利。"
  - id: "A13"
    name: "工程全负荷薪酬"
    value: "$165K"
    unit: "USD/year"
    source: "[BP team Founding eng + startup-finance heuristic] 反映资深产品和数据工作流人才的薪酬水平，但不到大公司现金薪酬那么高。"
  - id: "A14"
    name: "教务处 / 学分互认全负荷薪酬"
    value: "$115K"
    unit: "USD/year"
    source: "[BP team Registrar / articulation implementation lead + startup-finance heuristic] 需要深谙业务的实施人才，但薪酬不到纯软件工程师水平。"
  - id: "A15"
    name: "解决方案 / 集成全负荷薪酬"
    value: "$145K"
    unit: "USD/year"
    source: "[BP team Solutions / integrations engineer + startup-finance heuristic] 反映 Banner/Colleague 连接器开发和校区部署工作的责任范围。"
  - id: "A16"
    name: "客户成功 / 合作伙伴全负荷薪酬"
    value: "$130K"
    unit: "USD/year"
    source: "[BP team Customer success / partnerships lead + startup-finance heuristic] 覆盖续约、合作伙伴管理和校区扩展支持。"
  - id: "A17"
    name: "销售 / GTM 全负荷薪酬"
    value: "$155K"
    unit: "USD/year"
    source: "[BP gtm.channels + startup-finance heuristic] 早期企业级 GTM 支出包含差旅和浮动薪酬。"
  - id: "A18"
    name: "G&A 全负荷薪酬"
    value: "$100K"
    unit: "USD/year"
    source: "[BP operations + startup-finance heuristic] 覆盖精简的财务、供应商管理和公共部门合规支持。"
  - id: "A19"
    name: "薪酬在损益表科目间的分摊"
    value: "创始人 75% 计入销售与市场（S&M）/ 25% 计入 G&A；教务处人员 40% 计入 S&M / 60% 计入研发（R&D）；解决方案人员 35% 计入 S&M / 65% 计入 R&D；工程 100% 计入 R&D；客户成功和销售 100% 计入 S&M；G&A 100% 计入 G&A"
    unit: "allocation"
    source: "[BP team role rationales + BP operations] 这把人员成本映射进模型使用的各项职能损益科目。"
  - id: "A20"
    name: "非人力运营支出增长曲线"
    value: "月度非人力运营支出从第一年早期约 $15K 升至第三年第四季度约 $39K"
    unit: "USD/month"
    source: "[BP operations + Research public procurement and accessibility friction + startup-finance heuristic] 覆盖差旅、云服务、法务、ACR/VPAT、保险和采购支持。"
  - id: "A21"
    name: "现金换算口径"
    value: "现金变动等于 EBITDA"
    unit: "formula"
    source: "[startup-finance heuristic] 在这个种子前阶段，假定资本支出、债务、税务和营运资金时点影响可忽略不计。"
  - id: "A22"
    name: "稳态月流失率"
    value: "1.5%"
    unit: "percent per month"
    source: "[startup-finance heuristic for sticky workflow SaaS + BP annual campus contract model] 一旦嵌入教务处和招生工作流，这款产品的流失率理应低于一般中小企业 SaaS。"
  - id: "A23"
    name: "CAC 换算口径"
    value: "第二到第三年销售与市场支出，除以 22 个净新增付费校区"
    unit: "formula"
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] 涵盖创始人主导销售、合作伙伴渠道和首位专职销售的获客投入。"
  - id: "A24"
    name: "用于融资规模测算的下一轮里程碑"
    value: "到第二年第四季度：8 个付费校区，2-3 个年度转化，合规套件上线，且有一个集群部署正在推进"
    unit: "milestone"
    source: "[BP milestones 12-24 months + BP fundingAsk runwayMonths 18 + model cash curve] 种子前融资的规模按能到达该既定验证点、并保留约六个月缓冲来设定。"
