topRisks:
  - name: Academic trust gap
    description: Faculty and registrar teams may reject automated credit estimates if the system cannot explain policy reasoning or keep up with program exceptions.
    mitigation: Start with conditional offers and human approval, version every rule by effective date, and learn from reviewer overrides before automating broader workflows.
  - name: Integration drag
    description: Colleges often have messy Banner or Colleague setups, which can slow deployment and make the product look like another SIS project.
    mitigation: Land first with unofficial-transcript intake, historical-decision imports, and reviewer-workspace overlays, then add deeper integrations after peak-season ROI is proven.
  - name: Slow procurement cycles
    description: Higher-ed buyers may delay purchase until an enrollment target or staffing squeeze makes transfer speed urgent.
    mitigation: Sell against near-term intake deadlines with a transfer-yield pilot, explicit SLA improvement, and payback framed around net new tuition captured without added headcount.
