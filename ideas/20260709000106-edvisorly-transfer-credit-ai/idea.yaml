jobsToBeDone:
  - job: >-
      When our transfer queue spikes before a deadline, help our enrollment team turn unofficial transcripts into conditional credit answers, so we can convert interested students before they disappear.
    currentAlternative: Spreadsheet pre-reads, SIS notes, and evaluator inboxes
    successMetric: Median time from transcript receipt to conditional offer under 24 hours
  - job: >-
      When registrar reviewers must make final calls across many feeder schools, help them reuse prior equivalency decisions and focus only on exceptions, so they can clear more files with consistent academic policy.
    currentAlternative: Legacy articulation tables plus departmental email chains
    successMetric: Evaluator hours per file and override rate on auto-generated decisions
