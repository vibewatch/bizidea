differentiator: >-
  Most incumbents either parse documents or help once a student is already enrolled and inside a degree-audit system. This startup owns the pre-admit decision layer, where schools need institution-specific credit logic, explainability, and a student-ready answer fast enough to influence yield. Each approved or overridden decision improves a feeder-school equivalency graph tied to real conversion outcomes, creating a compound data moat that generic OCR tools and SIS modules lack.
