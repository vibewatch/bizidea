problem: >-
  Colleges courting transfer students still route unofficial transcripts through spreadsheet equivalency tables, SIS notes, and department-by-department exceptions. As application volume rises while headcount and budgets tighten, evaluators take days or weeks to tell a student which credits count and whether a major still pencils out. That delay hurts enrollment yield and staff throughput at the same time, because the school cannot give a fast, transparent answer without dragging registrar experts into every case.
targetUser:
  primary: >-
    Vice presidents of enrollment, transfer admissions directors, and operations leads at 6,000-20,000-student U.S. regional universities that enroll 500-2,500 transfer students per year from 10 or more feeder community colleges and run Banner or Colleague.
  secondary: >-
    Registrars, articulation managers, and degree-audit administrators who maintain equivalency tables and approve exceptions across high-volume transfer programs.
  buyer: Vice president for enrollment management
startupThesis:
  nonObviousInsight: >-
    Transcript extraction itself is becoming table stakes. The scarce asset is an institution-specific policy graph that turns historical equivalencies, program rules, and reviewer overrides into an explainable pre-admit credit decision, so schools can win transfer students before final manual review is complete.
  beachhead: >-
    U.S. regional universities with 500-2,500 annual transfer enrollments, 10 or more feeder community colleges, Banner or Colleague SIS, and a goal of returning conditional credit decisions within 72 hours without adding evaluator headcount.
  wedge: >-
    A transfer-offer engine that ingests unofficial transcripts, applies school-specific equivalency and GPA rules, and generates a 24-hour conditional credit map plus degree-fit summary for counselors to send prospective transfers.
  whyNowCatalyst: >-
    As colleges process more transfer evaluations with fewer staff on decades-old workflows, an explainable 24-hour conditional credit offer moves transfer speed from clerical pain to a frontline enrollment advantage.
  ventureScalePath: >-
    Start with conditional transfer-credit offers, then expand into articulation maintenance, final official transcript evaluation, prior-learning assessment, reverse transfer, and a networked student-mobility graph shared across feeder schools and receiving campuses.
solution: >-
  The product begins at the moment a prospect uploads an unofficial transcript or a counselor scans it in. It parses coursework, pulls the institution's historic equivalencies and program rules, and produces an explainable credit estimate, recalculated GPA view, and likely major-fit path before a human evaluator touches the file. Admissions counselors get a review queue with confidence flags, required exceptions, and suggested next actions, while registrars can approve or override decisions and feed those outcomes back into the policy graph. Students receive a branded conditional offer page showing what transfers now, what still needs review, and how quickly they could finish a degree. Over time, the company becomes the operating system for transfer-intent capture, policy maintenance, and yield conversion across the institution's feeder network.
goToMarketSeed:
  firstCustomer: >-
    The vice president for enrollment at an 8,000-15,000-student U.S. regional university drawing from 10-30 feeder community colleges, missing transfer-yield targets, and entering fall or spring intake with a flat admissions-evaluator headcount.
  buyingTrigger: >-
    A seasonal transfer-applicant spike, staff hiring freeze, or board-level enrollment target that forces the school to speed up transcript answers without adding reviewer capacity.
  currentAlternative: >-
    Manual transcript pre-reads in spreadsheets and SIS notes, legacy degree-audit or articulation modules, and department-by-department exception emails.
  switchingReason: >-
    The wedge wins because it lets the school send a credible conditional credit-and-major answer within 24 hours while keeping registrar oversight, instead of making students wait for a fully manual evaluation queue.
  pricingHypothesis: >-
    Annual SaaS fee based on transfer applicant volume and number of feeder institutions or program-rule sets, with premium modules for student-facing offer pages and articulation-rule maintenance.
