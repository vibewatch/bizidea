slug: bank-pii-safe-workbench
date: '2026-05-13'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP date] 模型从 2026-05-13 商业计划日期后的下一个月份开始。'
- id: A2
  name: pre-seed 完成后的期初现金
  value: '2500'
  unit: USD K
  source: '[BP fundingAsk] 采用计划中 $2-4M pre-seed 区间的下沿，并假设融资在模型起始时完成，因此现金可由期初现金加 EBITDA 向前滚动。'
- id: A3
  name: 每家生产银行启用的受管控用户数
  value: '50'
  unit: users per bank
  source: '[Research bottomUpSizingDrivers, BP investorMemo.initialContract] 研究把滩头市场按每家银行 50 个启用用户建模，计划里首个生产部署也写明是 30-50 个受管控用户。'
- id: A4
  name: 每个受管控用户的年度 ARR
  value: '3.48'
  unit: USD K per user per year
  source: '[BP operatingAssumptions, Research market] 定价锚定在研究里每个受管控用户每年约 $3.5K 的支出水平。'
- id: A5
  name: 每家银行的混合年合同额
  value: '174'
  unit: USD K per customer per year
  source: '[Derived from A3 x A4] 50 个受管控用户 × $3.48K ARR = $174K ACV，落在计划里 $100K-$180K 的生产合同区间内。'
- id: A6
  name: 签约当月确认收入比例
  value: '50'
  unit: percent of monthly run rate
  source: '[Startup-finance heuristic: enterprise pilot-to-production ramp] 新签银行在签约当月或当季度按半个月订阅收入计入。'
- id: A7
  name: 毛利率
  value: '75'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 计划里明确把毛利率目标定在 75%。'
- id: A8
  name: 第 1 年末付费银行数
  value: '3'
  unit: customers
  source: '[BP milestones 0-12 months] 模型假设公司到第 12 个月能签下 3 个付费共创客户试点。'
- id: A9
  name: 第 2 年末付费银行数
  value: '8'
  unit: customers
  source: '[BP milestones 12-24 months] 基准情形下，到第 24 个月能做到 8 家付费银行，来自早期试点转化和几家新 logo。'
- id: A10
  name: 第 3 年末付费银行数
  value: '15'
  unit: customers
  source: '[BP milestones 24-36 months, Research market.som] 与研究里的第 3 年 SOM 路径一致，即第 3 年做到 15 家生产银行 logo。'
- id: A11
  name: 创始人/CEO 的完全现金薪酬
  value: '110'
  unit: USD K per FTE per year
  source: '[Startup-finance heuristic: pre-seed founder cash comp] 适用于精瘦、创始人主导的垂直 SaaS 公司的保守创始人工资。'
- id: A12
  name: 工程岗位的完全现金薪酬
  value: '180'
  unit: USD K per FTE per year
  source: '[Startup-finance heuristic: early regulated-software engineering comp] 包含薪税和福利，对应银行级产品与安全开发。'
- id: A13
  name: 解决方案岗位的完全现金薪酬
  value: '140'
  unit: USD K per FTE per year
  source: '[Startup-finance heuristic: solutions engineer comp] 反映基于 Microsoft 栈的部署与客户实施工作。'
- id: A14
  name: GTM 岗位的完全现金薪酬
  value: '140'
  unit: USD K per FTE per year
  source: '[Startup-finance heuristic: early enterprise GTM generalist comp] 适用于创始人主导销售支持、以及后续银行账户覆盖的精瘦现金薪酬。'
- id: A15
  name: G&A/运营岗位的完全现金薪酬
  value: '100'
  unit: USD K per FTE per year
  source: '[Startup-finance heuristic: startup finance and ops comp] 随着客户数量增长，支撑法务、财务和供应商管理。'
- id: A16
  name: 非薪酬运营支出区间
  value: S&M 6-24 / R&D 8-16 / G&A 8-15
  unit: USD K per month
  source: '[Startup-finance heuristic: lean enterprise SaaS] 覆盖差旅、云成本、安全工具、保险和法务费用，同时保持资本效率。'
- id: A17
  name: 第 1 年后的招聘节奏
  value: Eng M15, GTM M16, Ops M19, Solutions M22, Eng M30, GTM M33
  unit: hire timing
  source: '[BP team, BP strategicChoices.sequencingRationale] 招聘故意后置，等试点转化、部署手册可复制后再加人。'
- id: A18
  name: 月度 logo 总流失率
  value: '1.2'
  unit: percent
  source: '[Startup-finance heuristic: sticky vertical workflow software] 银行业工作流软件一旦实施通常较粘，但早期也不能假设流失为零。'
- id: A19
  name: 每家付费银行的混合 CAC
  value: '135'
  unit: USD K per customer
  source: '[BP gtm funnelTargets, Startup-finance heuristic: compliance-heavy enterprise SaaS] 反映受监管销售里漫长的创始人主导调研、试点界定和转化工作。'
- id: A20
  name: 基础销售周期
  value: '6'
  unit: months
  source: '[BP buyingProcess, BP funnelTargets] 模型假设，一家合格银行若触发事件足够真实，从探索到付费试点大约要 6 个月。'
- id: A21
  name: 下一轮融资里程碑
  value: 8 paying banks plus 1 partner-led deployment by month 24
  unit: milestone
  source: '[BP milestones 12-24 months, BP fundingAsk] 融资规模按达到这一步来设计：到第 24 个月拿下 8 家付费银行和 1 次合作伙伴主导部署，同时保留约 6 个月现金缓冲。'
- id: A22
  name: 现金转换假设
  value: EBITDA approximates cash burn
  unit: modeling assumption
  source: '[Startup-finance heuristic: software startup] 模型忽略债务服务和重大 capex，因此现金按 EBITDA 向前滚动。'
