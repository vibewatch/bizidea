scenarios:
  downside:
    description: 试点转化变慢，平均席位数低于计划，买家推迟扩到更多工作流。
    y3RevenueK: 1280.0
    y3EbitdaK: -1015.0
    cashLowPointK: -310.0
    keyAssumptionChanges:
    - 第 3 年末付费银行从 15 家降到 11 家。
    - 由于银行从 45 个席位起步，平均 ACV 降到约 $158K。
    - 因为实施工作仍更偏服务型，毛利率滑到 72%。
  base:
    description: 创始人主导销售在第 1 年拿下 3 个付费试点，到第 24 个月扩到 8 家付费银行，并在第 3 年做到 15 家。
    y3RevenueK: 1935.8
    y3EbitdaK: -640.2
    cashLowPointK: 162.4
    keyAssumptionChanges:
    - 无变化；这就是上面的运营模型。
  upside:
    description: 脱敏信任、合作伙伴转介绍和第二工作流扩张一起抬高席位数和推进速度，而运营费用没有明显跳升。
    y3RevenueK: 2375.0
    y3EbitdaK: -205.0
    cashLowPointK: 645.0
    keyAssumptionChanges:
    - 第 3 年末付费银行从 15 家升到 18 家。
    - 由于用户数更高并带动附加模块，平均 ACV 升至约 $180K。
    - 随着部署越来越可复制，毛利率提升到 77%。
sensitivity:
- variable: ARPU
  downsideCase: 平均 ACV 因银行起始席位更少而降至约 $158K。
  baseCase: 平均 ACV 维持在约 $174K。
  upsideCase: 随着席位足迹扩大，平均 ACV 升至约 $180K。
  y3RevenueImpactK: -193.6
  cashImpactK: -145.2
- variable: CAC
  downsideCase: 由于调研和合规工作更吃创始人时间，CAC 上升到接近 $170K。
  baseCase: CAC 维持在约 $135K。
  upsideCase: 随着口碑和合作伙伴改善转化，CAC 降到接近 $110K。
  y3RevenueImpactK: -174.0
  cashImpactK: -420.0
- variable: 流失率
  downsideCase: 部分试点未能扩张，月度总流失率升到 1.8%。
  baseCase: 月度总流失率维持在 1.2%。
  upsideCase: 工作流嵌入后，月度总流失率降到 0.8%。
  y3RevenueImpactK: -130.5
  cashImpactK: -97.9
- variable: 销售周期
  downsideCase: 由于风控审查卡住，周期从 6 个月拉长到 9 个月。
  baseCase: 合格银行的周期维持在约 6 个月。
  upsideCase: 有成熟证据包后，周期压缩到 4-5 个月。
  y3RevenueImpactK: -348.0
  cashImpactK: -261.0
- variable: 毛利率
  downsideCase: 由于 onboarding 仍是高触达服务，毛利率停留在约 72%。
  baseCase: 毛利率维持计划目标 75%。
  upsideCase: 随着实施模板标准化，毛利率升到 77%。
  y3RevenueImpactK: 0.0
  cashImpactK: -58.1
- variable: 招聘节奏
  downsideCase: 模型里的两次计划招聘提前一个季度发生。
  baseCase: 招聘按上面的后置节奏推进。
  upsideCase: 一名 GTM 招聘推迟到首次合作伙伴辅助部署之后。
  y3RevenueImpactK: 0.0
  cashImpactK: -185.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      QualifiedBanks --> PaidPilots
      PaidPilots --> ProductionBanks
      ProductionBanks --> Seats
      Seats --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入来自做到 15 家付费银行 logo、每家约 $174K ACV，而不是依赖激进的单席位定价。
- checkName: 必须做对的事
  finding: 风险和运营买方必须足够快地批过试点，才能守住 6 个月销售周期和 50 席位部署这两个核心假设。
- checkName: 模型何时会断
  finding: 如果销售周期拉到 9 个月，或者首批部署更接近 45 个席位，那么下一轮融资前现金就会转负。
- checkName: 下一轮融资证明
  finding: 当公司做到 8 家付费银行、把早期试点转成年约，并证明 1 次合作伙伴主导部署时，下一轮融资才站得住。
sanityChecks:
  ruleOf40: 第 3 年增长率 117.0% + EBITDA 利润率 -33.1% = 83.9%。
  burnMultiple: 第 3 年 burn multiple 为 0.5x，以 $0.6M EBITDA burn 对应 $1.2M 净新增 ARR 计算。
  revenuePerFte: 按平均 FTE 计算，第 3 年人均收入为 $195K（垂直 SaaS 常见基准为 $200-400K）。
  flags:
  - 基准情形假设第 1 年能签下 3 个付费试点，尽管研究仍显示预算归属尚未被证实。
  - 由于到第 3 年部署和合规工作仍偏手把手，人均收入略低于常见 SaaS 基准。
  - 现金之所以保持为正，只因为招聘延后到参考客户出现之后；若招聘前移，跑道会明显缩短。
