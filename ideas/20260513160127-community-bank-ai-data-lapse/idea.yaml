topRisks:
  - name: "Security-platform squeeze"
    description: "Endpoint, DLP, or browser-security vendors may add lightweight AI blocking and monitoring features before a startup lands accounts."
    mitigation: "Differentiate on sanctioned workflow productivity, not just blocking, with retail-ops templates and audit trails that pure security tools lack."
  - name: "Slow regulated sales cycles"
    description: "Community and regional banks may agree with the problem but still move slowly because risk, IT, and operations all need to approve the rollout."
    mitigation: "Land with a single high-volume case workflow, offer rapid Microsoft 365 deployment, and prove handle-time reduction plus policy evidence in one business unit first."
  - name: "Model-trust skepticism"
    description: "Bank leaders may worry that even a sanctioned tool will hallucinate or mishandle customer communications in sensitive workflows."
    mitigation: "Start with constrained templates, human approval gates, deterministic redaction, and complete prompt-output logs rather than open-ended autonomous agents."
