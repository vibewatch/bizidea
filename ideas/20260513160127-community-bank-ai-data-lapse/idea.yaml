problem: >-
  Community and regional banks are under pressure to let operations staff use AI
  for dispute handling, fraud review, and complaint drafting, but the current
  reality is either blanket bans or quiet use of consumer tools. That creates a
  dangerous gap: the repetitive workflows most suited to AI are exactly where
  employees paste SSNs, account histories, and customer narratives. Once a
  major bank has had to self-disclose shadow AI misuse, smaller banks can no
  longer treat this as an abstract policy problem.
targetUser:
  primary: "Retail operations and fraud-case managers at U.S. community and regional banks"
  secondary: "Information security and compliance teams responsible for AI-use policy and customer-data controls"
  buyer: "Chief Risk Officer, Chief Operating Officer, or Chief Information Security Officer"
startupThesis:
  nonObviousInsight: "Banks do not primarily need another AI blocker; they need a sanctioned AI workspace for the exact customer-service workflows where staff are already cheating the policy with consumer tools. The first real budget will follow disclosure risk, and the winner will be the product that preserves frontline productivity while stripping PII, constraining prompts, and creating examiner-ready logs."
  beachhead: "Card-dispute, fraud-claim, and complaint-resolution teams at U.S. community banks with 5-100 branches that run customer casework in Microsoft 365, call-center notes, and core-banking systems"
  wedge: "A PII-safe AI workbench that redacts sensitive fields before inference, offers approved workflow templates for retail-case operations, and records every prompt, source, and output for audit"
  whyNowCatalyst: "US Bank's self-disclosed shadow-AI lapse turns unsanctioned employee AI use from a theoretical governance concern into a live disclosure and customer-notification trigger for every bank board and regulator."
  ventureScalePath: "Start with retail-case operations at community and regional banks, then expand into loan servicing, collections, BSA/AML investigations, wealth-service operations, credit unions, and insurers that face the same need for sanctioned AI workspaces over sensitive customer workflows."
solution: >-
  Build a secure AI workbench that sits inside the tools bank operations teams
  already use, starting with Outlook, case-management queues, and browser-based
  core systems. Before any prompt reaches a model, the product detects and
  tokenizes SSNs, account numbers, and other PII, then routes the task through
  approved prompts and model endpoints. Staff get workflow-specific assists such
  as dispute-response drafting, fraud-case summarization, complaint-letter
  generation, and next-step checklists instead of open-ended chat. Every action
  is logged with redaction evidence, user identity, approved template used, and
  final output so compliance teams can review adoption without shutting the
  workflow down.
goToMarketSeed:
  firstCustomer: "A $2B-$20B asset U.S. community or super-community bank with a 20-80 person retail operations team handling card disputes, fraud claims, and complaint responses"
  buyingTrigger: "A board or regulator asks for proof that employees are not pasting customer data into consumer AI tools, or a sanctioned-AI rollout stalls because the bank only has bans and policy documents"
  currentAlternative: "Manual case drafting plus DLP browser controls, blocked websites, generic enterprise chat pilots, and spreadsheet-based exception reviews"
  switchingReason: "The product gives operations teams an allowed path to use AI on live customer work while giving risk leaders redaction, policy enforcement, and audit evidence that generic chat tools and blocking controls do not provide."
  pricingHypothesis: "Annual SaaS fee priced by enabled operations seat and governed workflow, with implementation for policy setup and premium monitoring for unsanctioned-tool detection"
