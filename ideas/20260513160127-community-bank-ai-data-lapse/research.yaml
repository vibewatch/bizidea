competitors:
  - name: "Microsoft 365 Copilot + Microsoft Purview"
    stage: incumbent
    wedge: "Use existing Microsoft identity, permissions, labels, audit, and DLP controls to govern AI usage inside the tenant."
    pricing: "Bundled / enterprise licensing; custom by Microsoft stack"
    strength: "Deepest native access to Microsoft Graph, sensitivity labels, audit logs, and DLP for Copilot usage."
    weaknessVsUs: "Does not natively package a constrained, bank-specific dispute/fraud/complaint workspace with pre-inference redaction and operator review."
    sourceRefs: [26, 27, 28, 31, 33]
  - name: "Prompt Security"
    stage: scale-up
    wedge: "Holistic enterprise AI security spanning employee use, homegrown AI apps, code assistants, and agentic AI."
    pricing: "Custom enterprise quote"
    strength: "Purpose-built around shadow AI, prompt injection, data leaks, and runtime AI security."
    weaknessVsUs: "Broad horizontal security positioning leaves room for a community-bank workflow product that owns sanctioned case operations end to end."
    sourceRefs: [35]
  - name: "Netskope One AI Security"
    stage: incumbent
    wedge: "Secure AI discovery, data protection, and runtime control across shadow consumer AI, enterprise AI, private AI, and agentic AI."
    pricing: "Custom enterprise quote"
    strength: "Strong visibility and policy control across unmanaged AI usage, with adjacent SSE/CASB deployment leverage."
    weaknessVsUs: "Primarily a guardrail and enforcement layer, not a productivity workspace for analysts drafting regulated customer responses."
    sourceRefs: [36, 37]
  - name: "BigID AI Security & Governance"
    stage: scale-up
    wedge: "Discover AI assets, secure data pipelines, govern lineage, and enforce AI usage and access policies."
    pricing: "Custom enterprise quote"
    strength: "Compelling for sensitive-data inventory, AI lineage, and policy enforcement across models and agents."
    weaknessVsUs: "More posture-management oriented than frontline workflow oriented; banks still need a narrow allowed surface for daily casework."
    sourceRefs: [34]
  - name: "IBM Guardium"
    stage: incumbent
    wedge: "Data discovery, classification, monitoring, and compliance for sensitive data across hybrid environments."
    pricing: "Custom enterprise quote"
    strength: "Trusted data-security brand with real-time monitoring and compliance depth."
    weaknessVsUs: "Guardium secures data estates well but is not positioned as a dispute/fraud AI workbench for community-bank operations."
    sourceRefs: [39]
regulatoryTechnicalConstraints:
  - point: "A bank that suffers a qualifying computer-security incident must notify its regulator within 36 hours, raising the cost of weak AI-use controls."
    sourceRefs: [18]
  - point: "Bank AI programs must fit within existing model-risk and governance expectations, including explainability, testing, and documented oversight."
    sourceRefs: [19, 21, 22, 25]
  - point: "Prompts, responses, and referenced files need to be discoverable, auditable, and retainable if the product is to survive legal and examiner scrutiny."
    sourceRefs: [27, 31, 33]
  - point: "Microsoft-centric deployments inherit existing permission mistakes, so oversharing remediation is a prerequisite, not a nice-to-have."
    sourceRefs: [26, 31, 32, 33]
