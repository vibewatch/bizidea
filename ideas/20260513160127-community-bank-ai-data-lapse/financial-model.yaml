slug: bank-pii-safe-workbench
date: '2026-05-13'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: month
  source: '[BP date] Model starts the month after the 2026-05-13 business plan date.'
- id: A2
  name: Opening cash after pre-seed close
  value: '2500'
  unit: USD K
  source: '[BP fundingAsk] Uses the low end of the plan''s $2-4M pre-seed range and assumes the round closes at model start so cash can roll forward from opening cash plus EBITDA.'
- id: A3
  name: Enabled governed users per production bank
  value: '50'
  unit: users per bank
  source: '[Research bottomUpSizingDrivers, BP investorMemo.initialContract] Research sizes the beachhead at 50 enabled users per bank and the plan describes 30-50 governed users in the first production deployment.'
- id: A4
  name: Annual ARR per governed user
  value: '3.48'
  unit: USD K per user per year
  source: '[BP operatingAssumptions, Research market] Pricing is anchored near the researched $3.5K annual governed-user spend.'
- id: A5
  name: Blended annual contract value per bank
  value: '174'
  unit: USD K per customer per year
  source: '[Derived from A3 x A4] 50 governed users x $3.48K ARR = $174K ACV, within the plan''s $100K-$180K production range.'
- id: A6
  name: Revenue recognition in close month
  value: '50'
  unit: percent of monthly run rate
  source: '[Startup-finance heuristic: enterprise pilot-to-production ramp] New banks contribute half a month of subscription revenue in the month or quarter they close.'
- id: A7
  name: Gross margin
  value: '75'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] The plan explicitly targets 75% gross margin.'
- id: A8
  name: Year 1 end paying banks
  value: '3'
  unit: customers
  source: '[BP milestones 0-12 months] Model assumes the company closes 3 paid design-partner pilots by month 12.'
- id: A9
  name: Year 2 end paying banks
  value: '8'
  unit: customers
  source: '[BP milestones 12-24 months] Base case reaches 8 paying banks by month 24 after converting early pilots and adding several new logos.'
- id: A10
  name: Year 3 end paying banks
  value: '15'
  unit: customers
  source: '[BP milestones 24-36 months, Research market.som] Matches the research SOM path of 15 production bank logos by year 3.'
- id: A11
  name: Loaded cash compensation for Founder/CEO
  value: '110'
  unit: USD K per FTE per year
  source: '[Startup-finance heuristic: pre-seed founder cash comp] Conservative founder salary for a lean, founder-led vertical SaaS company.'
- id: A12
  name: Loaded cash compensation for Engineering
  value: '180'
  unit: USD K per FTE per year
  source: '[Startup-finance heuristic: early regulated-software engineering comp] Includes payroll taxes and benefits for bank-grade product and security work.'
- id: A13
  name: Loaded cash compensation for Solutions
  value: '140'
  unit: USD K per FTE per year
  source: '[Startup-finance heuristic: solutions engineer comp] Reflects Microsoft-stack deployment and customer implementation work.'
- id: A14
  name: Loaded cash compensation for GTM
  value: '140'
  unit: USD K per FTE per year
  source: '[Startup-finance heuristic: early enterprise GTM generalist comp] Lean cash comp for founder-led sales support and later bank account coverage.'
- id: A15
  name: Loaded cash compensation for G&A/Ops
  value: '100'
  unit: USD K per FTE per year
  source: '[Startup-finance heuristic: startup finance and ops comp] Supports legal, finance, and vendor management once customer count expands.'
- id: A16
  name: Non-payroll operating spend range
  value: S&M 6-24 / R&D 8-16 / G&A 8-15
  unit: USD K per month
  source: '[Startup-finance heuristic: lean enterprise SaaS] Covers travel, cloud, security tooling, insurance, and legal costs while keeping the team capital efficient.'
- id: A17
  name: Post-Year-1 hiring ramp
  value: Eng M15, GTM M16, Ops M19, Solutions M22, Eng M30, GTM M33
  unit: hire timing
  source: '[BP team, BP strategicChoices.sequencingRationale] Hiring stays deliberately back-loaded until pilots convert and deployment playbooks are repeatable.'
- id: A18
  name: Monthly gross logo churn
  value: '1.2'
  unit: percent
  source: '[Startup-finance heuristic: sticky vertical workflow software] Bank workflow software should be sticky after implementation, but early-stage churn is not assumed to be zero.'
- id: A19
  name: Blended CAC per paying bank
  value: '135'
  unit: USD K per customer
  source: '[BP gtm funnelTargets, Startup-finance heuristic: compliance-heavy enterprise SaaS] Reflects long founder-led discovery, pilot scoping, and conversion work in a regulated sale.'
- id: A20
  name: Base sales cycle
  value: '6'
  unit: months
  source: '[BP buyingProcess, BP funnelTargets] The model assumes a qualified bank can move from discovery to paid pilot in about six months if the trigger event is real.'
- id: A21
  name: Next-round milestone
  value: 8 paying banks plus 1 partner-led deployment by month 24
  unit: milestone
  source: '[BP milestones 12-24 months, BP fundingAsk] Funding ask is sized to reach this milestone and hold roughly 6 months of cash buffer.'
- id: A22
  name: Cash conversion
  value: EBITDA approximates cash burn
  unit: modeling assumption
  source: '[Startup-finance heuristic: software startup] Model ignores debt service and material capex, so cash rolls forward from EBITDA.'
