scenarios:
  downside:
    description: Pilot conversion slows, average seat count lands below plan, and buyers delay workflow expansion.
    y3RevenueK: 1280.0
    y3EbitdaK: -1015.0
    cashLowPointK: -310.0
    keyAssumptionChanges:
    - End-Y3 paying banks fall to 11 instead of 15.
    - Average ACV drops to about $158K as banks start with 45 seats.
    - Gross margin slips to 72% because implementation stays more services-heavy.
  base:
    description: Founder-led sales closes 3 paid pilots in year 1, scales to 8 paying banks by month 24, and reaches 15 by year 3.
    y3RevenueK: 1935.8
    y3EbitdaK: -640.2
    cashLowPointK: 162.4
    keyAssumptionChanges:
    - No change; this matches the operating model above.
  upside:
    description: Redaction trust, partner referrals, and second-workflow expansion increase seats and speed without a large opex step-up.
    y3RevenueK: 2375.0
    y3EbitdaK: -205.0
    cashLowPointK: 645.0
    keyAssumptionChanges:
    - End-Y3 paying banks rise to 18 instead of 15.
    - Average ACV rises to about $180K on larger user counts and add-on modules.
    - Gross margin improves to 77% as deployments become more repeatable.
sensitivity:
- variable: ARPU
  downsideCase: Average ACV falls to about $158K as banks start with fewer seats.
  baseCase: Average ACV stays near $174K.
  upsideCase: Average ACV rises to about $180K with larger seat footprints.
  y3RevenueImpactK: -193.6
  cashImpactK: -145.2
- variable: CAC
  downsideCase: CAC rises toward $170K because discovery and compliance work take more founder time.
  baseCase: CAC holds near $135K.
  upsideCase: CAC falls toward $110K as references and partners improve conversion.
  y3RevenueImpactK: -174.0
  cashImpactK: -420.0
- variable: churn
  downsideCase: Monthly gross churn moves to 1.8% as some pilots fail to expand.
  baseCase: Monthly gross churn stays at 1.2%.
  upsideCase: Monthly gross churn falls to 0.8% once workflows are embedded.
  y3RevenueImpactK: -130.5
  cashImpactK: -97.9
- variable: sales cycle
  downsideCase: Cycle stretches from 6 months to 9 months because risk review stalls.
  baseCase: Cycle stays near 6 months for qualified banks.
  upsideCase: Cycle compresses to 4-5 months with a proven evidence pack.
  y3RevenueImpactK: -348.0
  cashImpactK: -261.0
- variable: gross margin
  downsideCase: Gross margin stays near 72% because onboarding remains high-touch.
  baseCase: Gross margin stays at the 75% plan target.
  upsideCase: Gross margin rises to 77% as implementation templates standardize.
  y3RevenueImpactK: 0.0
  cashImpactK: -58.1
- variable: hiring pace
  downsideCase: Two planned hires are pulled one quarter earlier than the model.
  baseCase: Hiring follows the back-loaded ramp above.
  upsideCase: One GTM hire slips until after the first partner-assisted deployment.
  y3RevenueImpactK: 0.0
  cashImpactK: -185.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      QualifiedBanks --> PaidPilots
      PaidPilots --> ProductionBanks
      ProductionBanks --> Seats
      Seats --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from reaching 15 paying bank logos at about $174K ACV rather than from assuming aggressive per-seat pricing.
- checkName: Must go right
  finding: Risk and operations buyers must approve pilots fast enough to keep the 6-month sales cycle and 50-seat deployment assumption intact.
- checkName: Model breaks if
  finding: If sales cycles stretch to 9 months or first deployments land closer to 45 seats, cash turns negative before the next round.
- checkName: Next-round proof
  finding: The next financing is justified once the company reaches 8 paying banks, converts early pilots to annual contracts, and proves one partner-led deployment.
sanityChecks:
  ruleOf40: Y3 growth 117.0% + EBITDA margin -33.1% = 83.9%.
  burnMultiple: Y3 burn multiple 0.5x using $0.6M EBITDA burn against $1.2M net new ARR.
  revenuePerFte: $195K Y3 revenue per average FTE (benchmark $200-400K vertical SaaS).
  flags:
  - Base case assumes 3 paid pilots close in Year 1 even though the research still says budget ownership is unproven.
  - Revenue per FTE is slightly below the usual SaaS benchmark because deployment and compliance work stay hands-on through Year 3.
  - Cash stays positive only because hiring is delayed until reference customers exist; pulling hires forward materially compresses runway.
