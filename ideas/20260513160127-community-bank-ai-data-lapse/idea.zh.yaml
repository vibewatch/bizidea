topRisks:
- name: 安全平台挤压
  description: 端点、DLP 或浏览器安全厂商，可能在创业公司拿到账户前就补上轻量级的 AI 封堵和监测功能。
  mitigation: 把差异化放在合规工作流的生产力上，而不是单纯封堵；用零售运营模板和审计轨迹打出纯安全工具没有的能力。
- name: 受监管销售周期慢
  description: 社区银行和区域银行即便认同问题，也可能因为风险、IT 和运营都要点头，导致推进依然很慢。
  mitigation: 先落一个高量案件工作流，提供快速的 Microsoft 365 部署，并先在单一业务单元证明处理时长下降和策略证据有效。
- name: 对模型可靠性的怀疑
  description: 银行管理层可能担心，即便是合规工具，也会在敏感流程里幻觉或错误处理客户沟通。
  mitigation: 先从受约束模板、人审关口、确定性脱敏和完整的提示词/输出日志做起，而不是一上来就推开放式自主代理。
