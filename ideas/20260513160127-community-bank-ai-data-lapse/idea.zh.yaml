jobsToBeDone:
- job: 当客户争议或欺诈索赔进来时，用 AI 帮零售运营人员起草、总结并路由案件，让他们既能缩短处理时间，又不会把 SSN 或账户数据暴露给未经批准的工具。
  currentAlternative: 在邮件和案件系统里手工起草，或者在银行控制之外私下使用消费级 AI 工具
  successMetric: 平均案件处理时长下降，且 AI 辅助工作流里确认的 PII 泄露为零
