problem: 社区银行和区域银行一边被要求让运营人员在争议处理、欺诈复核和投诉起草里用上 AI，一边现实里只有两条路：全面封禁，或者员工偷偷用消费级工具。危险就在这里——最适合 AI 的重复流程，恰恰也是员工会贴入 SSN、账户历史和客户叙述的地方。既然大型银行已经因为影子 AI 误用而不得不自我披露，小银行就再也不能把这当成抽象的政策问题。
targetUser:
  primary: 美国社区银行和区域银行里负责零售运营、欺诈案件的经理
  secondary: 负责 AI 使用政策和客户数据控制的信息安全与合规团队
  buyer: 首席风险官、首席运营官或首席信息安全官
startupThesis:
  nonObviousInsight: 银行最缺的不是又一个拦截 AI 的开关，而是一个能放进真实客户服务流程里的合规 AI 工作空间——员工现在正用消费级工具偷偷绕过政策，去做的正是这些活。第一笔真正的预算会跟着披露风险走；谁能一边保住一线效率、一边把 PII 脱敏、把提示词收进边界、把日志做成可直接应对监管检查，谁就最有机会赢。
  beachhead: 美国拥有 5-100 家网点、客户案件工作主要跑在 Microsoft 365、呼叫中心记录和核心银行系统里的社区银行；先从银行卡争议、欺诈索赔和投诉处理团队切入
  wedge: 一个 PII 安全 AI 工作台：推理前先脱敏敏感字段，给零售案件运营提供已批准的流程模板，并把每一次提示词、来源和输出都记入审计记录
  whyNowCatalyst: US Bank 这次自行披露的影子 AI 事故，把未经批准的员工 AI 使用从一个理论上的治理担忧，变成了每家银行董事会和监管机构眼前真实的披露与客户通知触发器。
  ventureScalePath: 先从社区银行和区域银行的零售案件运营做起，再扩到贷款服务、催收、BSA/AML 调查、财富服务运营，以及同样需要在敏感客户流程上使用合规 AI 工作空间的信用合作社和保险公司。
solution: 先把一个安全 AI 工作台嵌进银行运营团队已经在用的工具里，从 Outlook、案件队列和浏览器里的核心系统开始。任何提示词发给模型之前，产品都会识别并令牌化 SSN、账号和其他 PII，再把任务路由到已批准的提示词和模型端点。员工拿到的不是开放式聊天，而是针对工作流的助手：争议回复起草、欺诈案件摘要、投诉函生成和下一步清单。每一次操作都会留下日志，里面有脱敏证据、用户身份、使用了哪套批准模板，以及最终输出；这样合规团队就能审 adoption，而不用把整条流程关停。
goToMarketSeed:
  firstCustomer: 一家美国社区银行或超级社区银行，资产规模 $2B-$20B，零售运营团队 20-80 人，负责银行卡争议、欺诈索赔和投诉回复
  buyingTrigger: 董事会或监管方要求证明员工没有把客户数据贴进消费级 AI 工具，或者银行想推合规 AI，但手里只有禁令和政策文件，导致 rollout 卡住
  currentAlternative: 手工起草案件材料，加上 DLP 浏览器控制、封禁网站、通用企业聊天试点，以及基于表格的例外复核
  switchingReason: 这个产品给运营团队提供了一条被允许的 AI 使用路径，可以直接处理真实客户工作；同时也让风险负责人拿到通用聊天工具和封堵控制给不了的脱敏、策略执行和审计证据。
  pricingHypothesis: 按启用席位数和受管控工作流收费的年度 SaaS 订阅，外加策略配置实施费，以及用于识别未授权工具的高级监测模块。
whyNow:
- point: 大型银行已经不得不就影子 AI 误用做自我披露，这让小银行很难再向董事会解释为什么可以继续不作为。
