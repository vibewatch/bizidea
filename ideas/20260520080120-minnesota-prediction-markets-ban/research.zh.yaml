reportMemo:
  executiveTakeaways:
  - 这个切口是真的，因为 prediction-market 合规已经不是写法律备忘录的事，而是横跨准入、广告、联盟和证据的运营控制问题。
  - 短期买方很少、也很懂行，所以创业公司只有做成执行中间件，而不是另一套研究看板，才有机会跑通。
  - 现有厂商已经在卖地理定位、反欺诈和监管情报，但市场仍缺一套干净的系统记录层，能把法律姿态直接变成跨系统动作和可辩护日志。
  - 滩头市场很窄；要想长成风投级公司，必须继续扩到 DFS、sweepstakes/social casino，以及其他被州级监管切碎的 fintech 或 gaming workflow。
  marketDefinition: 一类软件，把州与州不同的法律姿态翻成运行时准入、营销下线、合作伙伴控制和可审计证据，服务对象是那些产品在部分司法辖区合法、在另一些司法辖区被禁止或存在争议的运营商。
  customerAndBuyer: 最核心的用户，是 prediction market 及相邻真钱平台里的总法律顾问、首席合规官、产品风险负责人和增长运营负责人。真正拍板的通常是 GC 或 CCO，因为只有当法律截止日期开始带来董事会层面或监管层面的风险暴露时，预算才会被打开。
  buyingTriggers:
  - point: 某个州的新禁令或生效日，会立刻逼出对交易接入、广告投放和反规避控制的改动。
    sourceRefs:
    - 1
    - 2
    - 3
  - point: 其他州的跟进立法，或新的年龄和广告限制，会把一次性的法律工作变成可重复的多州项目。
    sourceRefs:
    - 5
    - 9
    - 10
    - 11
  - point: 联邦与州之间持续拉扯的诉讼，加上 CFTC 的执法指引，让合规团队必须证明某个时点究竟生效了什么控制，而不是只说原本想遵守什么政策。
    sourceRefs:
    - 7
    - 12
    - 13
    - 15
  willingnessToPay:
    summary: 这笔预算本来就存在，因为位置合规不是可选项，而是任务关键项：Radar 明确卖定制企业定价，BetSaracen 直接说没有 geolocation 就跑不了 sportsbook，投注平台也早已在买打包的 geo-compliance 和 anti-spoofing 能力，而不是单靠内部工具。
    sourceRefs:
    - 29
    - 31
    - 33
  competitiveLandscape: 竞争大致分三组：一类是决定用户身处何地的地理定位与反欺诈厂商，一类是解释规则是什么的监管情报厂商，剩下是把律师意见和运营动作缝在一起的人工流程。创业公司只有卡在这几层之间，成为“法律姿态变成已执行 workflow”的那一层，才有机会赢。
  incumbentThesis:
  - incumbentClass: 地理定位与反欺诈厂商
    point: GeoComply、Radar 和 Xpoint 已经能核验司法辖区、识别 spoofing，但它们不会天然赢下 workflow 编排层，因为法务团队仍需要跨非地理系统去做政策映射、营销下线和证据打包。
    sourceRefs:
    - 28
    - 30
    - 34
    - 35
    - 52
    - 53
  - incumbentClass: 监管情报厂商
    point: Vixio 一类厂商能帮团队追踪诉讼和政策变化，但它们停在“提供情报”，并不会把可执行控制推入交易、CRM 或联盟工作流。
    sourceRefs:
    - 7
    - 56
  - incumbentClass: 云与位置基础设施
    point: Cloudflare、MaxMind 和广告平台控制项确实提供了 header、IP intelligence 和地理排除等原语，但它们只是零部件，不是专为 prediction market 打造的控制平面。
    sourceRefs:
    - 38
    - 39
    - 42
    - 45
    - 48
  - incumbentClass: 外部律师与人工运营
    point: 律师可以解释法条，geofencing 供应商可以挡住用户，但两者都不能产出一套按州拆分、能同时协调产品、营销和审计证据的长期事实源。
    sourceRefs:
    - 6
    - 51
  regulatoryLandscape: 监管格局非常不稳。联邦层面在捍卫 CFTC 对 prediction market 的管辖权，州层面却不断推出禁令、年龄限制、税收或刑事执法框架，把同一产品按赌博来处理。这种不稳定，本身就是需求的核心驱动力。
  technologyLandscape: 这套产品在现有原语上能做出来，但绝不轻松。要站得住，栈里至少得有州和国家识别、VPN 与代理检测、spoofing 控制、geofence 逻辑、营销排除，以及跨多系统的证据日志，才能把政策变化真正落成执行动作，而不是停在备忘录。
  distributionChannels:
  - point: 只要州级截止日或禁令开始逼交易和营销系统一起动作，创始人主导销售打进法务和合规团队就最有效。
    sourceRefs:
    - 1
    - 2
    - 31
  - point: 监管律师和专业情报提供商天然适合转介绍，因为他们本来就在帮运营商处理州权变化和诉讼风险。
    sourceRefs:
    - 7
    - 51
    - 56
  - point: 和 geolocation、反欺诈、KYC 厂商做集成型合作，可以缩短 time-to-value，因为这些厂商本来就处在执行链路里。
    sourceRefs:
    - 23
    - 38
    - 39
    - 53
  partnershipEcosystem:
  - point: Radar、GeoComply、MaxMind、Cloudflare 这类 geo 与 IP intelligence 厂商，是最自然的技术合作伙伴，因为它们已经在提供位置、spoofing 和 header 数据。
    sourceRefs:
    - 23
    - 38
    - 39
    - 42
    - 53
  - point: 广告和 CRM workflow 也值得做合作，因为 Google 已经支持按司法辖区定向和排除，而位置感知型消息栈也已存在。
    sourceRefs:
    - 46
    - 48
    - 54
  - point: 律师事务所和监管情报厂商也能做实施伙伴，因为他们负责把模糊法条和裁决翻成具体到账户层的政策决策。
    sourceRefs:
    - 7
    - 51
    - 56
  dataMoats:
  - point: 一张把每个州、生效日、诉讼结果和实际控制配置连起来的历史政策图谱，能慢慢沉成专有运营语境。
    sourceRefs:
    - 5
    - 6
    - 7
  - point: 跨系统的封禁、override、spoofing 检测和失败推广日志，会复利成一套风险数据集，而通用法律研究产品天然抓不到这些。
    sourceRefs:
    - 23
    - 30
    - 31
    - 38
  - point: 一旦买家已经拿这套 evidence bundle 去面对监管机构或法院，把法律政策、geolocation 信号、营销动作和用户结果串起来的记录，就会形成切换成本。
    sourceRefs:
    - 13
    - 42
    - 52
    - 53
  geographicConsiderations:
  - point: 首款产品必须先聚焦美国，因为它最核心的价值，来自 CFTC 制度和各州赌博监管权之间的联邦—州冲突。
    sourceRefs:
    - 6
    - 12
    - 19
  - point: 明尼苏达是眼前的导火索，但 Illinois、North Carolina 以及 California 风格的提案说明，产品从第一天起就得支持滚动更新的多州规则簿。
    sourceRefs:
    - 3
    - 5
    - 9
    - 10
    - 11
  sensitivityCases:
  - case: 联邦排他管辖权比预期更快明朗
    impact: 如果核心交易接入上的州级硬控制没那么紧迫，产品重心就会从整套司法辖区停机逻辑，往广告、年龄门槛和证据导出倾斜。
    sourceRefs:
    - 12
    - 14
    - 15
    - 17
  - case: 各州把限制从交易继续扩到广告、联盟或“帮助犯罪”理论
    impact: 这样反而会抬高产品价值，因为控制面会进一步伸进营销和合作伙伴系统，而这恰好是买方现在最缺乏协同的地方。
    sourceRefs:
    - 2
    - 3
    - 5
    - 9
    - 10
  - case: Geo 厂商把轻量级政策层打包进现有合同
    impact: 除非创业公司在政策解释、workflow 编排和证据生成上明显快于通用 geolocation 厂商，否则 ACV 会被压缩。
    sourceRefs:
    - 30
    - 33
    - 34
    - 52
    - 53
  validationPlan:
  - priority: high
    question: Prediction-market 运营商会不会为一套独立控制平面买单，还是更希望它被打包进现有 geolocation 合同里？
    evidenceToGather: 访谈 10–12 位买家，覆盖 prediction、DFS、sportsbook 和 sweepstakes 运营商中的法务、合规和产品风险团队；重点问预算归属在哪条线，以及他们愿意替换掉哪家现有厂商。
  - priority: high
    question: 除了接入封禁之外，哪类 workflow 的 ROI 最锋利：广告、联盟、CRM 下线，还是面向监管机构的证据包？
    evidenceToGather: 拿到一家共创客户的现状流程图，再做一轮 red-team 复盘，看他们今天是怎么把某个州的新限制同步到各个渠道里的。
  - priority: medium
    question: 如果先不上深度交易引擎集成，只靠 policy API 和日志导出，第一版到底能交付多少价值？
    evidenceToGather: 和至少一家运营商、以及一家供应商伙伴开 pilot 架构工作坊，对比“看板 + 导出”的启动方案和完整运行时执行方案。
analysisModels:
  marketMapDiagram:
