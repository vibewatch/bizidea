  fiveForces:
    supplierPower:
      score: 3
      rationale: 产品确实依赖第三方 geo、IP 和广告平台原语，但买家可以在 Radar、MaxMind、Cloudflare 等供应商之间自由组合，并不受制于单一垄断者。
      sourceRefs:
      - 38
      - 39
      - 42
      - 46
    buyerPower:
      score: 4
      rationale: 滩头市场买家既少又专业，他们也很清楚有哪些替代方案——不管是人工律师流程、GeoComply 式工具，还是内部自己做。
      sourceRefs:
      - 7
      - 31
      - 34
    threatOfEntrants:
      score: 3
      rationale: 底层组件都买得到，但真正的门槛在于信任、政策解释，以及跨系统证据工作流，这些会抬高实施和可信度门槛。
      sourceRefs:
      - 28
      - 38
      - 42
      - 53
    threatOfSubstitutes:
      score: 4
      rationale: 人工法务、运营商自建 geo 控制，以及广告平台的排除能力，已经能把一部分问题凑合解决，所以有些买家会因此推迟采购新平台。
      sourceRefs:
      - 21
      - 45
      - 48
      - 51
    competitiveRivalry:
      score: 4
      rationale: 竞争已经不轻，因为 geolocation 厂商、监管情报厂商和反欺诈栈都在抢同一笔合规预算，只是眼下还没人把“政策到执行”的闭环完整打穿。
      sourceRefs:
      - 28
      - 33
      - 34
      - 56
  pestle:
  - factor: 政治
    impact: negative
    point: 州议员和总检察长正在积极主张对 prediction-style 产品的地方管辖权，政策波动和执法风险因此上升。
    sourceRefs:
    - 5
    - 25
  - factor: 经济
    impact: neutral
    point: 买方紧迫度很高，但眼前的账户基数过于集中，因此收入扩张必须依赖相邻受监管品类。
    sourceRefs:
    - 7
    - 33
  - factor: 社会
    impact: negative
    point: 围绕未成年人保护和消费者伤害的担忧，正在逼运营商把广告控制和渠道治理记录得更细。
    sourceRefs:
    - 9
    - 46
    - 49
  - factor: 技术
    impact: positive
    point: 商业 API 已经支持 geo header、spoofing 检测、州级识别和 geofence 编排，降低了控制平面产品的搭建风险。
    sourceRefs:
    - 38
    - 42
    - 52
    - 53
  - factor: 法律
    impact: negative
    point: CFTC 与各州之间的分歧仍未解决，诉讼在打、联邦指引也在变，所以法律解释必须版本化、且能审计。
    sourceRefs:
    - 6
    - 7
    - 12
    - 14
  adoptionFrictionMatrix:
  - friction: 在联邦排他问题没定案前，法务团队未必愿意把信任压在一层软件上
    severity: high
    affectedBuyer: 总法律顾问 / CCO
    mitigation: 先用人工审批的政策、严格版本控制和证据导出建立信任，再去承诺更深的自动化。
    sourceRefs:
    - 7
    - 12
    - 13
  - friction: IP 或设备信号误判会误伤合法用户，并惹怒增长团队
    severity: high
    affectedBuyer: 产品风险负责人
    mitigation: 采用分层检测、置信度评分和人工 override workflow，而不是只凭一个信号就硬挡。
    sourceRefs:
    - 38
    - 39
    - 42
  - friction: 把交易、CRM、联盟和广告系统接起来，本身就是一项重运营工程
    severity: medium
    affectedBuyer: 产品与增长运营
    mitigation: 先上 policy API、日志导出和广告/CRM 连接器，再逐步深入运行时交易集成。
    sourceRefs:
    - 48
    - 52
    - 54
  - friction: 一旦某州受限，联盟和 influencer 渠道会额外带来披露与执行工作量
    severity: medium
    affectedBuyer: 增长 / 营销负责人
    mitigation: 第一版营销模块就把渠道模板、排除同步和披露归档一起交付。
    sourceRefs:
    - 49
    - 50
    - 51
