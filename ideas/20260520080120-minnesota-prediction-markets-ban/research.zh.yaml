    sourceRefs:
    - 7
    - 56
  - point: Geolocation 在位厂商可以把政策相关功能打包进现有合同，抬高价格压力。
    sourceRefs:
    - 30
    - 33
    - 34
    - 52
competitors:
- name: GeoComply
  stage: incumbent
  wedge: 面向受监管 gaming 的标杆级 geolocation 与 anti-fraud 栈，并向相邻的 KYC/AML 模块延伸。
  pricing: 定制企业定价；geolocation、anti-fraud 和 onboarding 模块打包售卖。
  strength: Gaming 场景信誉深、装机量大，而且已有证据表明执法与迁移数据就在它的网络里流动。
  weaknessVsUs: 它看起来还不是那套跨系统执行法律政策、营销下线和按州打包证据的系统记录层。
  sourceRefs:
  - 23
  - 31
- name: Radar
  stage: scale-up
  wedge: 开发者优先的 geofencing、geo-compliance 与反欺诈工具，定价可配置，也覆盖相邻营销 workflow。
  pricing: 按月 API 调用量或月度跟踪用户数做定制定价。
  strength: 产品广度很强，覆盖 geofencing、spoofing 检测、案件处理和位置驱动消息，也有博彩和 DFS 的案例。
  weaknessVsUs: 它的重心仍是位置基础设施，而不是跨多套运营系统的法律政策解释和面向监管机构的证据层。
  sourceRefs:
  - 28
  - 29
  - 30
  - 31
  - 32
  - 52
  - 53
- name: Xpoint
  stage: scale-up
  wedge: 聚焦 gaming 的 geolocation 专家，正在向 sportsbook、fantasy 和 social/sweepstakes 运营商扩张。
  pricing: 定制企业授权；没有公开标准价格。
  strength: 为受监管 gaming 场景定制，并在更多司法辖区和相邻运营商类型中扩张。
  weaknessVsUs: 它看起来仍主要聚焦司法辖区核验，而不是这里主张的政策图谱、广告控制和证据编排层。
  sourceRefs:
  - 34
  - 35
  - 36
- name: Vixio
  stage: incumbent
  wedge: 面向 gambling 与 payments 市场的监管情报与诉讼跟踪。
  pricing: 定制订阅 / 报价制研究产品。
  strength: 在州级动态和诉讼可见性上信号很强，也是合规团队已经信任的监测工具。
  weaknessVsUs: 洞察强，但把控制推进产品、营销和合作伙伴系统的能力弱。
  sourceRefs:
  - 7
  - 56
regulatoryTechnicalConstraints:
- point: 控制层必须同时兼顾 CFTC 交易所义务和州级赌博限制，所以单靠通用 geofence 远远不够。
  sourceRefs:
  - 1
  - 12
  - 19
- point: VPN、代理和 spoofing 都是明显的绕行路径，因此系统必须采用多层检测和基于置信度的处理。
  sourceRefs:
  - 21
  - 38
  - 42
- point: 广告和获客控制还得满足博彩广告规则、国家限制和更细粒度的位置排除要求。
  sourceRefs:
  - 45
  - 46
  - 48
- point: 联盟和 influencer 渠道在活动被修改或下线时，还会带来额外的披露与留档要求。
  sourceRefs:
  - 49
  - 50
validationSignals:
- point: Polymarket 已经在做司法辖区限制并封堵 VPN 绕过，这说明按行为层做地理控制，市场是接受的。
  sourceRefs:
  - 18
  - 21
- point: BetSaracen 把 geolocation 描述成 mission-critical；它换供应商的原因是成本、支持和控制能力，而不是自己做一套。
  sourceRefs:
  - 29
  - 31
- point: Sleeper 之所以选择第三方 geo-compliance，是因为按州拆分的 DFS 规则要求它拿到可靠的位置核验和反规避控制。
  sourceRefs:
  - 32
- point: Xpoint 与 High 5 的合作说明，随着监管收紧，相邻的 sweepstakes/social 运营商也愿意为司法辖区工具买单。
  sourceRefs:
  - 35
openQuestions:
- Prediction-market 运营商会不会为独立的 policy-to-enforcement 层买单，还是坚持从已经信任的 geolocation 在位厂商那里拿？
- 第一条最有 ROI 的 workflow 到底是什么：接入封禁、广告下线、联盟治理，还是能直接上法庭的证据导出？
- 在第一起存在争议的执法案件里，什么样的证据包才真的能让州监管机构或法院买账？
- 如果纯 prediction-market 买家池始终太小，DFS、sweepstakes/social casino、sportsbook 供应商和地理敏感型 fintech 里，哪一类扩张最快？
