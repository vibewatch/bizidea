slug: prediction-market-jurisdiction-rail
date: '2026-05-20'
executiveSummary: Prediction Market Jurisdiction Rail 应该作为一套服务受 CFTC 监管的 prediction-market 运营商的控制平面启动，而不是做成通用法律研究看板或单独的 geofencing 产品。首批客户会是那类全国运营、同时覆盖零售 Web 与移动端、既做付费投放也做联盟获客、并且必须在 2026 年 8 月前挡住明尼苏达用户和相关营销动作的运营商。眼前最痛的点是运营执行：在联邦和州对管辖权仍各说各话时，法务团队得把不断变化的州级规则簿，落进注册、交易、CRM、联盟和证据留存这些系统。MVP 不该一上来就承诺深度自动化的交易引擎编排，而应先从人工审批的政策管理、广告和 CRM 下线、证据导出，以及基于 API 的封禁规则起步。创始人主导销售要围着已生效禁令、禁令听证和生效日倒计时来打，用付费 pilot 切进去，再按受控州和 workflow 的数量升级成年约。最值得相信的地方，是现有替代方案依旧碎在外部律师、地理定位供应商和人工运营之间，而首批买家本来就为 mission-critical 的 geo-compliance 掏钱。最需要警惕的地方，是滩头市场买家太集中，他们很可能更愿意让现有 geo 厂商顺手打包这项能力，而不是再买一层新控制层。输入里的市场规模是模型推演，不是外部审计结果，所以董事会真正要问的是：公司能不能足够快拿下 2–3 个付费共创客户，把这条切口先跑成可重复打法，再扩去 DFS、sweepstakes 以及其他受州级碎片化监管的金融产品。
problem:
- Prediction-market 运营商眼下要面对的是按州变化的重罪风险、禁令风险和广告风险，变化速度往往快过产品、营销和支持团队靠人工响应的能力。
- 现有替代方案把法律解释、地理定位、渠道下线和审计证据拆在不同供应商和电子表格里，结果就是运营商根本说不清某个州、某一天到底启用了哪些控制。
solution:
- 提供一套司法辖区控制平面，把版本化的州级法律姿态转成注册、交易接入、CRM 消息、付费获客、联盟活动和证据留存上的执行规则。
- 第一版先交付 policy API、分渠道下线 workflow、审批日志和面向监管机构的证据包，让买家在真正相信全自动化之前，就能先把法律决策运营化。
whyWeWin:
- 公司卡住的是“法律姿态变成线上产品和营销行为”的 workflow，这正好补上监管情报厂商与纯 geolocation 供应商之间的空档。
- 专有政策图谱，加上跨系统的执行与证据日志，会慢慢沉成切换成本——这是人工律师和单点工具天然长不出来的。
strategicChoices:
  beachhead: 受 CFTC 监管、全国分发、既有付费和联盟获客、且很快会暴露在明尼苏达式州级限制下的 prediction-market 运营商。
  wedgeRationale: 这个入口比更宽的 regulated gaming 或 fintech 市场更容易快速拿到验证，因为单一州级截止日就会逼一小批高成熟度买家同时改接入、广告和联盟 workflow。把切口收窄到 prediction market，也能让产品主张更具体：不是泛泛监控合规，而是把存在争议的州级合法性，直接落成控制动作和证据。
  sequencingRationale: 产品第一阶段要从人工审批的政策管理、营销下线、证据导出和轻量执行 API 起步，因为即便联邦排他管辖权还没定，这几条 workflow 也照样能产生价值，而且能避开最重的交易引擎集成。GTM 也应继续由创始人主导、围着事件驱动去打，直到至少有两家运营商证明愿意为独立控制平面买单；那之后，再补 geo、identity 和 CRM 合作伙伴，再谈扩大销售和跨品类扩张。
  notYet:
  - 在还没有 prediction-market 标杆客户前，就去打 sportsbook 或 casino 运营商
  - 直接卖给监管机构或律所的情报产品
  - 未经人工批准就全自动关闭交易系统
  - 在美国州级政策图谱还没跑通前就扩国际市场
market:
  tam: $72.0M 的估算 TAM：大约 240 家北美 operator group，每家每年约 $300k 的控制平面预算。
  sam: $18.0M 的估算 SAM：大约 60 家美国和加拿大运营商，既有多州零售分发，也有足够复杂的 workflow，需要政策、下线和证据工具。
  som: $5.4M 的估算第 3 年 SOM：约 18 个共创客户和扩展账户，按约 $300k 的 blended ACV 计算。
  segments:
  - 受 CFTC 监管的 prediction-market 运营商
  - 相邻的 DFS、sweepstakes 及其他被州级监管切碎的真钱平台
  buyingProcess: 只有当新禁令、生效日、禁令听证，或年龄/广告限制把风险抬到董事会层面，逼出跨部门联动时，预算才会真正松动。真正拍板的人通常是 GC 或 CCO；产品风险、增长和工程团队则会先把实施范围确认清楚，再把付费 pilot 转成年约。
product:
  mvp: MVP 是一套只做美国市场的 prediction-market 司法辖区控制平面：维护版本化州级政策图谱，把已批准规则推到注册与营销系统，标记必须执行的接入封禁，并按州和日期导出证据包。它应该先支持广告和 CRM 下线、联盟规则、人工 override 和审计日志，再逐步深入实时交易执行。
  sixMonth: 拿下一家付费共创客户，上线政策看板、州级规则版本管理、广告和 CRM 下线连接器、联盟限制模板，以及适配明尼苏达式截止日的证据导出。
  twelveMonth: 把 2–3 家运营商转成年约，补齐注册和接入封禁的 policy API，并接上至少一家 geo 或 identity 合作伙伴，让客户可以从同一控制层执行已批准的州级规则。
  twentyFourMonth: 在 prediction-market 部署证明留存、扩张和实施负担都能复用之后，把同一套政策图谱扩到 DFS、sweepstakes 以及其他州级碎片化产品。
  keyBets:
  - 即便买家已经为 geolocation 和外部律师买单，独立控制平面仍然能单独拿到预算。
  - 广告下线、联盟治理和证据导出，比一开始就深接交易引擎更容易更快做出 ROI。
  - 一套窄而深的美国政策图谱，能在不重写整个产品的前提下复用到相邻受监管品类。
  - 在法律边界未定的环境里，人工审批的 workflow 会比承诺自治式合规决策更快建立信任。
gtm:
  wedge: 把付费 pilot 卖给一家正面临已落地禁令或禁令截止日的全国性 prediction-market 运营商的法务与合规团队，再把这次部署升级成其接入、营销和证据 workflow 的默认州级政策事实源。
  channels:
  - 创始人主导直销，面向 prediction-market 运营商里的 GC、CCO 和产品风险负责人
  - 来自正在协助各州应对工作的监管律师与诉讼顾问的转介绍
  - 与 geolocation、identity 和 CRM 供应商做集成型合作，因为它们本来就在执行链路里
  funnelTargets: 目标漏斗：lead→qualified pilot 20–30%，qualified pilot→paid pilot 30–40%，pilot→production 50%+，production→第二个 workflow 扩张 12 个月内达到 50%+。
  pricing: 按受控州数量和 workflow 数量收年度平台费，联盟监测和证据导出模块另外加价；这更贴合买家围着合规覆盖面，而不是 API 调用量来做预算的方式。
businessModel:
  revenueStreams:
  - 用于政策图谱管理、workflow 编排和监管更新的年度 SaaS 订阅
  - 新系统连接器和启动州配置的实施与集成费用
  - 联盟监测、证据导出和相邻品类扩张的高级模块
  unitOfValue: 处于主动政策管理之下的一组“州 × workflow”组合
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一运营商内继续加 workflow，比如注册封禁、交易限制、CRM 下线和联盟治理
  - 从同一运营商团队扩到更多品牌、产品或司法辖区
  - 把政策图谱和证据层复用到 DFS、sweepstakes 和其他真钱平台
  - 在客户信任核心控制平面后，再逐步商业化 benchmark 报告和监管就绪证据模块
strategyMap:
  northStarMetric: 受限州的政策变化，能否在法律生效日前先于覆盖系统完成执行。
  inputMetrics:
  - 签下的 qualified pilot 数
  - 从法律变化提醒到批准政策部署的天数
  - pilot 转 production 的转化率
  - 覆盖 workflow 中采用自动化或模板化执行的比例
  - 生成一份按州拆分证据包的中位时间
  - production 客户的净收入留存
  moatsToBuild:
  - 把州级规则、生效日、诉讼状态和按 workflow 拆分的执行逻辑连起来的版本化政策图谱
  - 围绕真实政策变化沉淀的跨系统数据集，覆盖封禁、override、广告下线和联盟动作
  - 能把法律姿态、执行动作以及用户或渠道结果连成一条记录的证据模板
  killCriteria:
  - 在聚焦滩头市场做了 9 个月创始人主导销售后，仍拿不到 2 个付费共创客户
  - 最初 2 个 pilot 上线后 6 个月内，转成年约 production 合同的比例低于 50%
  - 前 2 个 pilot 跑完后，目标 workflow 里仍有一半以上要靠站外人工协同
  - 在还没建立标杆客户前，geo 在位厂商就能持续以低于目标 ACV 的价格打包出等价的政策、下线和证据能力
  mermaid: "flowchart LR\n  Wedge[Prediction-market state deadline wedge] --> MVP[Policy graph and suppression MVP]\n  MVP --> Proof[Audit evidence and pilot conversions]\n  Proof --> Expansion[Adjacent regulated-category expansion]\n"
investorMemo:
  verdict:
    call: Watch
    conviction: 客户痛点尖、切口也清楚，但在公司证明运营商愿意买一套独立控制平面，而不是等 geo 厂商把它打包进来之前，判断仍应保持中等。
    whyBelieve: 这些输入清楚指出了一个真实的运营缺口：州级法律波动很大，但产品、营销、联盟和审计证据的执行仍高度碎片化。
    whyDoubt: 滩头市场买家太少也太专业；如果早期标杆性不强，或在位厂商价格压得太狠，风投级天花板会被卡住。
    nextDiligence: 下一步最关键的验证，是拿到两个付费运营商 pilot，证明从法律变化到控制上线的时间明显缩短，而且能顺利转成年度合同。
  firstCustomer:
    title: 全国性 prediction-market 运营商中的总法律顾问或首席合规官
    profile: 一家美国运营商：既有零售 Web 和移动端分发，也做付费与联盟获客，用户遍布多州，而且产品、营销、合规团队彼此独立，需要在州级规则变化时快速协同。
    trigger: 某州禁令已经落地、已公布生效日、即将举行禁令听证，或新增年龄/广告限制，逼着团队立刻改接入和获客 workflow。
    buyer: Chief Compliance Officer or General Counsel
    initialContract: 先签一份 $30k–$75k 的付费 pilot，覆盖一家运营商和一小组 workflow；随着更多州和 workflow 纳入控制，再升级到约 $150k–$300k 的年订阅。
  mustBeTrue:
  - 前 5 个认真评估的滩头市场机会里，至少有 2 个愿意为独立 pilot 付费，而不是坚持让现有 geo 厂商来交付这项能力。
  - 在公司交付完整交易引擎自动化前，广告下线、联盟治理和证据导出本身就足够痛，值得单独立预算。
  - 至少有一家共创客户能在一个产品规划周期内把第一组 workflow 跑上线，而不是拖成跨多个季度的企业级集成。
  - Production 客户会续费并扩张，因为产品成了政策执行的系统记录层，而不只是另一条 research feed。
  - 一旦 prediction-market 证明成立，DFS 或 sweepstakes 等相邻品类也会认可同一套政策图谱架构的价值。
  diligenceQuestions:
  - 当某个州限制落地时，第一笔预算到底归谁：GC、CCO、产品风险，还是增长运营？
  - 现实里真正赢单的第一条 workflow 是什么：接入封禁、广告下线、联盟治理，还是证据导出？
  - 要把 CRM、广告平台、联盟工具和 geo 信号接进一个 pilot，需要多少实施工作量？
  - 为什么运营商会相信一套新控制平面，而不是继续扩 GeoComply、Radar、Xpoint 或人工律师流程？
  - 如果纯 prediction-market 需求太小，哪一个相邻品类会成为最快的扩张路径？
operatingAssumptions:
- assumption: Prediction-market 运营商会为一套独立的 policy-to-enforcement 层买单，而不是坚持把它打包进在位 geolocation 合同。
  basis: research.yaml
  validationTest: 跑 10–12 次买家访谈，并至少拿下 2 个付费 pilot；预算批准过程里不依赖 geo 厂商转售。
  decisionImpact: 如果不成立，就转向通过在位厂商分发的合作模式，或把产品收窄到高价证据模块。
- assumption: 第一版即便还没深接交易引擎，也能仅靠广告下线、联盟控制和证据导出交出足够明确的 ROI。
  basis: research.yaml
  validationTest: 和一家共创客户梳理现状流程，证明 MVP 在首批目标 workflow 上能去掉至少 50% 的人工协同步骤。
  decisionImpact: 如果不成立，工程优先级就得更早转向深度接入控制，销售周期也会被拉长。
- assumption: 在联邦和州法律边界未定的情况下，GC 和 CCO 买家仍会信任人工审批政策与版本控制。
  basis: idea.yaml
  validationTest: 让 pilot 用户在平台内完成至少 3 次真实或模拟的州级事件审批，而不是把站外签字当作主记录。
  decisionImpact: 如果不成立，公司就会变成一款服务驱动的 workflow 工具，自动化主张和定价野心都要下调。
- assumption: Prediction-market 标杆客户能在 12–24 个月内打开 DFS 或 sweepstakes 的相邻扩张。
  basis: research.yaml
  validationTest: 在第 15 个月前拿到 5–8 次相邻品类访谈，并至少收获 2 份意向书或付费 discovery 项目。
  decisionImpact: 如果不成立，市场仍然太集中，公司要么重审风投路径，要么考虑战略出售。
- assumption: 在 geo 和监管情报在位厂商补齐差距前，政策图谱加证据日志就能先形成防御力。
  basis: operator judgment
  validationTest: 到第 4 个 production 账户时，证明客户已在监管、董事会或诉讼复盘里直接依赖创业公司生成的证据或政策历史，而且扩张也由这些记录驱动。
  decisionImpact: 如果不成立，公司主要比的就只剩服务和速度，长期定价权会明显变弱。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 用创始人主导的方式，访谈 prediction-market 运营商和相邻真钱平台
  hypothesis: 滩头市场买家面对的是一个紧迫的运营问题，而不是泛泛的法律研究或 geolocation 需求。
  successMetric: 完成 10 次买家访谈，并让 5 个机会把跨系统政策执行排进合规优先级前三。
  owner: Founder CEO
- horizon: 0–90 天
  experiment: 和一家共创客户一起算清第一条 workflow 的 ROI
  hypothesis: 广告下线、联盟控制和证据导出，会比从最深的交易集成起步更快交出可量化价值。
  successMetric: 签下一份共创范围，明确第一类 workflow、当前人工工作量和目标上线时限。
  owner: Compliance product lead
- horizon: 0–90 天
  experiment: 上线政策看板和证据导出 MVP
  hypothesis: 人工审批的政策版本管理，加上证据生成，就足以在全自动化完成前撑起付费 pilot。
  successMetric: 至少有一个 pilot 账户用这套系统完整处理过一次真实或模拟的州级政策事件。
  owner: Founding eng
- horizon: 3–6 个月
  experiment: 把一家 geo 或 identity 合作伙伴接进 enforcement API
  hypothesis: 合作伙伴数据能缩短 time to value，也能减少创业公司自己重建底层位置基础设施的必要。
  successMetric: 一条生产级集成让第二个 pilot 的部署时间比第一个更短。
  owner: Solutions engineer
- horizon: 6–12 个月
  experiment: 把 pilots 转成年约
  hypothesis: 只要客户在真实截止日或禁令事件里用过这套产品，就会把它纳入默认的政策事实源。
  successMetric: 至少有 2 个 pilot 以不低于目标 ACV 下限的价格转成 12 个月合同。
  owner: Founder CEO
- horizon: 9–15 个月
  experiment: 测试向 DFS 或 sweepstakes 的相邻扩张
  hypothesis: 同一张州级政策图谱，在纯 prediction market 之外也能解决相似的控制问题。
  successMetric: 在不需要大改产品架构的前提下，拿到 2 个付费 discovery 项目，或 1 个相邻品类 production pilot。
  owner: Partnerships lead
operations:
- 维护一套带版本控制的州级政策库，记录生效日、诉讼状态以及按 workflow 拆分的执行备注。
- 运营法务审批与 override 流程，让每一次规则变化都有明确 owner、时间戳和下游动作日志。
- 支持接 CRM、广告平台、联盟系统以及 geo/identity 供应商，但不把公司做成纯定制集成外包。
- 产出面向监管机构的证据包，把政策版本、执行动作和受影响 workflow 串成一条可导出的记录。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 第一批买家太集中、也太看重可信度，所以必须由创始人亲自拿住销售、监管律师关系和切口纪律。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 把政策图谱、workflow 引擎、审批机制和证据架构搭起来，支撑最初几个 pilot。
- role: 合规产品负责人
  startTiming: 第 1 个月
  rationale: 把法条、禁令和运营商 workflow 翻成版本化产品规则和实施手册。
- role: 解决方案工程师
  startTiming: 第 4 个月
  rationale: 把 CRM、广告、联盟和 geo 系统之间的集成摩擦压下来，避免 pilot 演变成一锤子服务项目。
- role: 合作伙伴负责人
  startTiming: 第 10 个月
  rationale: 只有当第一条 pilot→production 路径已经可复用时，才补 geo、identity 和律师转介绍合作。
milestones:
- horizon: 0–12 个月
  items:
  - 在 prediction markets 里拿下 2 个付费共创客户。
  - 至少为 1 家运营商上线 production 级政策管理、广告下线和证据导出 workflow。
  - 至少把 2 个 pilot 转成 12 个月合同。
  - 交付一条可复用的 geo 或 identity 集成，缩短部署时间。
- horizon: 12–24 个月
  items:
  - 把 production 客户从单一 workflow 扩到接入封禁、CRM 下线和联盟治理。
  - 拿下第一个相邻品类客户，来自 DFS、sweepstakes 或其他类似的州级碎片化真钱 workflow。
  - 靠 workflow 和品类扩张，把净收入留存拉到 120% 以上。
- horizon: 24–36 个月
  items:
  - 让政策图谱和证据层成为多个受监管品类的系统记录层。
  - 利用标杆客户和合作伙伴渠道，把销售从创始人亲自打单扩到更可扩展的打法。
  - 拿到足够强的跨品类留存和扩张证明，支撑更大一轮 seed 或 series A 融资决策。
risks:
- risk: 初始的 prediction-market 买家池太小，在相邻扩张落地前撑不起风投级 ARR。
  likelihood: Medium
  impact: High
  mitigation: 围绕可复用的司法辖区政策原语来设计产品，并在滩头市场饱和前先验证相邻品类需求。
- risk: Geo 在位厂商或监管情报厂商把足够多的 workflow 功能打包进去，压缩定价并拖慢赢单速度。
  likelihood: High
  impact: High
  mitigation: 在跨系统编排和证据质量上拉开差距；在 bundling 风险更强的地方，优先用合作而不是正面替代。
- risk: 法律不确定性让买家不愿意把软件当作州级政策决策的主记录层。
  likelihood: Medium
  impact: High
  mitigation: 早期把人工放在审批环里，保留完整版本历史，把平台卖成“受控执行层”，而不是自治式法律判断。
- risk: 跨产品、CRM、广告和联盟系统的集成负担过重，把公司拖成重服务部署模式。
  likelihood: Medium
  impact: Medium
  mitigation: 第一阶段只做最少但价值最高的连接器，把模板产品化，并在 pilot 模式可复用后再扩 solutions engineering。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月跑道应当足以换来 2–3 个 production 级共创客户、一套可用的政策图谱与证据平台、1–2 条生态集成，以及相邻品类扩张的初步证明。
