    impact: ACV compresses unless the startup is faster at policy interpretation, workflow orchestration, and evidence generation than generic geolocation incumbents.
    sourceRefs:
    - 30
    - 33
    - 34
    - 52
    - 53
  validationPlan:
  - priority: high
    question: Will prediction-market operators buy a standalone control plane, or do they expect it bundled into existing geolocation contracts?
    evidenceToGather: 10-12 buyer interviews across legal, compliance, and product-risk teams at prediction, DFS, sportsbook, and sweepstakes operators; ask what budget line would own the spend and which incumbent they would displace.
  - priority: high
    question: 'Which workflows beyond access blocking create the sharpest ROI: ads, affiliates, CRM suppression, or regulator-ready evidence?'
    evidenceToGather: Current-state process maps from one design partner plus a red-team review of how they currently implement a new state restriction across channels.
  - priority: medium
    question: How much of the first release can be delivered with policy APIs and log exports before deep trading-engine integration is required?
    evidenceToGather: Pilot architecture workshops with at least one operator and one vendor partner, comparing a dashboard-and-export launch against full runtime enforcement.
