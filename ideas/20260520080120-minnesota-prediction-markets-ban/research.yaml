- point: VPNs, proxies, and spoofing create obvious circumvention vectors, requiring multilayer detection and confidence-based handling.
  sourceRefs:
  - 21
  - 38
  - 42
- point: Advertising and acquisition controls must respect gambling-ad rules, country restrictions, and granular location exclusions.
  sourceRefs:
  - 45
  - 46
  - 48
- point: Affiliate and influencer channels add disclosure and recordkeeping requirements when campaigns are changed or suppressed.
  sourceRefs:
  - 49
