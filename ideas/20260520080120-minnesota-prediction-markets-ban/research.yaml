competitors:
- name: GeoComply
  stage: incumbent
  wedge: Category-defining geolocation and anti-fraud stack for regulated gaming with adjacent KYC/AML modules.
  pricing: Custom enterprise pricing; bundled geolocation, anti-fraud, and onboarding modules.
  strength: Deep gaming credibility, massive installed base, and evidence that enforcement and migration data already flow through its network.
  weaknessVsUs: Does not appear to be the system of record for cross-system legal policy execution, marketing suppression, or state-specific evidence packaging.
  sourceRefs:
  - 23
  - 31
- name: Radar
  stage: scale-up
  wedge: Developer-first geofencing, geo-compliance, and fraud tooling with configurable pricing and adjacent marketing workflows.
  pricing: Custom pricing based on monthly API calls or monthly tracked users.
  strength: Strong product breadth across geofencing, spoof detection, case handling, and location-driven messaging, plus case studies in wagering and DFS.
  weaknessVsUs: Its center of gravity is still location infrastructure rather than legal-policy interpretation and regulator-ready evidence across multiple operating systems.
  sourceRefs:
  - 28
  - 29
  - 30
  - 31
  - 32
  - 52
  - 53
- name: Xpoint
  stage: scale-up
  wedge: Gaming-focused geolocation specialist expanding across sportsbooks, fantasy, and social/sweepstakes operators.
  pricing: Custom enterprise licensing; no public standard pricing found.
  strength: Purpose-built for regulated gaming and expanding across many jurisdictions and adjacent operator types.
  weaknessVsUs: Still looks concentrated on jurisdiction verification rather than the policy graph, ad controls, and evidence orchestration layer proposed here.
  sourceRefs:
  - 34
  - 35
  - 36
- name: Vixio
  stage: incumbent
  wedge: Regulatory intelligence and litigation tracking for gambling and payments markets.
  pricing: Custom subscription / quote-based research product.
  strength: High-signal state and litigation visibility that compliance teams already trust for monitoring.
  weaknessVsUs: Strong on insight, weak on pushing controls into product, marketing, and partner systems.
  sourceRefs:
  - 7
  - 56
regulatoryTechnicalConstraints:
- point: Controls must reconcile CFTC exchange obligations with state gambling restrictions, so a generic geofence alone is insufficient.
  sourceRefs:
