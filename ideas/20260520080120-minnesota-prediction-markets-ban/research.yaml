openQuestions:
- Will prediction-market operators buy a standalone policy-to-enforcement layer, or insist on getting it from a geolocation incumbent they already trust?
- 'Which first workflow creates the sharpest ROI: access blocking, ad suppression, affiliate governance, or court-ready evidence exports?'
- What evidence package would actually satisfy a state regulator or court in the first contested enforcement action?
- 'If the pure prediction-market buyer pool stays small, which adjacent category expands fastest: DFS, sweepstakes/social casino, sportsbook suppliers, or geo-sensitive fintechs?'
