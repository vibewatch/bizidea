  adoptionFrictionMatrix:
  - friction: Legal teams may not trust a software layer while preemption is still unsettled
    severity: high
    affectedBuyer: General counsel / CCO
    mitigation: Launch with human-approved policies, strong version control, and evidence exports before promising full automation.
    sourceRefs:
    - 7
    - 12
    - 13
  - friction: False positives from IP or device signals can block legitimate users and anger growth teams
    severity: high
    affectedBuyer: Product-risk owner
    mitigation: Use layered detection, confidence scoring, and manual override workflows instead of hard blocking on one signal.
    sourceRefs:
    - 38
    - 39
    - 42
  - friction: Integrating across trading, CRM, affiliates, and ad systems is operationally heavy
    severity: medium
    affectedBuyer: Product and growth operations
    mitigation: Start with policy APIs, log exports, and ad/CRM connectors before deeper runtime trading integrations.
    sourceRefs:
    - 48
    - 52
    - 54
  - friction: Affiliate and influencer channels create extra disclosure and enforcement work when a state becomes restricted
    severity: medium
    affectedBuyer: Growth / marketing owner
    mitigation: Ship channel-specific templates, exclusion sync, and disclosure archives as part of the first marketing module.
    sourceRefs:
    - 49
