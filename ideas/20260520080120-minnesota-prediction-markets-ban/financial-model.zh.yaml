scenarios:
  downside:
    description: 独立预算审批比预期更慢、在位厂商压低定价，而且相邻品类扩张再推迟 2–3 个季度。
    y3RevenueK: 2100.0
    y3EbitdaK: -620.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - 第 3 年期末活跃账户接近 10 个，而不是 13 个，因为销售周期被拉长到接近 9 个月。
    - 稳态 blended ARPU 停在约 $270K，而不是 $300K，因为 geo 供应商 bundling 压住了定价。
    - 毛利率期末大约停在 68%，因为实施和证据打包仍偏人工。
  base:
    description: 创始人主导销售先转化第一批 prediction-market pilots，随后伙伴转介和相邻品类扩张在第 3 年带动 logo 增长。
    y3RevenueK: 2737.5
    y3EbitdaK: -283.23
    cashLowPointK: 597.24
    keyAssumptionChanges:
    - 公司从 Y1 结束时的 3 个活跃账户，增长到 Y3 结束时的 13 个，同时仍低于调研得到的 18 个账户 SOM。
    - Blended annual ARPU 从 Y1 的 $90K 抬到 Y3 的 $300K，因为 pilot 会逐步转成 multi-workflow production 订阅。
    - 毛利率在 Y2 进入约 70% 的目标区间，并在 Y3 结束时达到 72%，因为集成越来越可复用。
  upside:
    description: 各州监管截止日接连出现，伙伴转介更早起效，而且客户在单个账户里更快标准化更多 workflow，而几乎不需要额外加人。
    y3RevenueK: 3350.0
    y3EbitdaK: 120.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
    - 第 3 年期末活跃账户接近 15 个，因为相邻品类打法提前一年落地。
    - Blended ARPU 升到约 $315K，因为更多运营商更早加购联盟治理和证据模块。
    - 毛利率期末接近 74%，因为可复用连接器降低了每次部署所需的实施人力。
