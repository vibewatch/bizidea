modelDiagram:
  title: 单位经济模型流转图
  mermaid: "flowchart LR\n  StateDeadlines --> QualifiedPilots\n  CounselReferrals --> QualifiedPilots\n  QualifiedPilots --> ProductionAccounts\n  ProductionAccounts --> WorkflowExpansion\n  WorkflowExpansion --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> OperatingCash"
modelSanity:
- checkName: 收入引擎
  finding: Base case 到 Q4Y3 会做到 13 个活跃 operator account；定价则从第 1 年接近 pilot 的收入水平，逐步扩到调研得到的 $300K blended ACV，因为更多 workflow 和州被纳入控制。
- checkName: 哪些条件必须成立
  finding: 两个付费 pilot 必须足够快完成转化，这样创始人主导销售加上一名合作伙伴负责人，才有可能在 Y2 新增约 3 个净新账户，并在随后把 Y3 交给更广的相邻品类扩张。
- checkName: 模型会在哪种情况下失效
  finding: 如果在位厂商 bundling 把 ACV 压到 $270K 左右，或者销售周期拖到 9 个月附近，downside 情境下的现金低点会下探到约 $180K，且第二市场还没被证明。
- checkName: 下一轮融资需要的证明
  finding: 要让下一轮融资说得过去，公司必须在 Y2 结束时做到 6 个 production 账户、1 个相邻品类 logo、1 条可复用的 geo 或 identity 集成，以及接近 70% 的毛利率。
sanityChecks:
  ruleOf40: 第 3 年增长 231.82% + EBITDA 利润率 -10.35% = 221.47%
  burnMultiple: Y2 burn multiple 为 1.21x，Y3 随净新增 ARR 改善到 0.10x。
  revenuePerFte: $248.86K 的 Y3 revenue per FTE，对应期末 11 名 FTE（SaaS 基准为 $200-400K）。
  flags:
  - Base case 仍然押注在一个很窄的买家池上，因此只要有一个企业单子延迟，或出现一次不续费，下一轮融资时间点都会被明显改写。
  - Y1 和 Y2 的 EBITDA 都明显为负，所以这套计划要求 pre-seed 至少按给定 $2-4M 区间的中位附近完成交割。
  - 模型假设 $30k-$75k 的 pilots 能扩成约 $300K 的 multi-workflow 年约；如果买家不愿意继续扩 workflow，收入会很快低于计划。
  - 现金低点出现在 Y3 后段，因此只要相邻品类扩张稍有延迟，公司大概率就得更早融资，即便 Q4Y3 已经轻微转正。
