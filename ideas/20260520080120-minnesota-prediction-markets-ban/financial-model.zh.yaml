fundingAsk:
  round: pre-seed
  amountM: 3.0
  runwayMonths: 24
  milestone: 在下一轮融资前，公司要在 Y2 结束时拿到 6 个 production 账户、1 个相邻品类客户、1 条可复用的 geo 或 identity 集成，并把毛利率拉到约 70%。
