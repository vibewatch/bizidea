slug: prediction-market-jurisdiction-rail
date: '2026-05-20'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP date 2026-05-20] business-plan 日期后的首个完整月份。'
- id: A2
  name: 期初现金 / 建模里的 pre-seed
  value: '3000'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M and runwayMonths 18] 模型取 $3.0M，覆盖前 24 个月并留出所需 6 个月缓冲。'
- id: A3
  name: 模型里的客户单位
  value: active paying operator account
  unit: definition
  source: '[BP investorMemo.firstCustomer] 和 [BP businessModel.unitOfValue] 支持按 operator account 建模；随着更多州和 workflow 纳入控制，账户价值会继续扩张。'
- id: A4
  name: 收入确认口径
  value: average active customers per period × blended annual ARPU
  unit: formula
  source: Startup-finance heuristic：采用 mid-period go-live 规则，新 logo 在上线当期按半期收入确认。
- id: A5
  name: 第 1 年客户爬坡
  value: '[0,0,0,0,1,1,2,2,2,2,2,3]'
  unit: customers EOP by month
  source: '[BP milestones 0-12 months] 和 [BP killCriteria] 支持前 9 个月拿下两个付费共创客户，并在 M12 拿到第 3 个付费账户。'
- id: A6
  name: 第 2 年客户爬坡
  value: Q1Y2 3; Q2Y2 4; Q3Y2 5; Q4Y2 6
  unit: customers EOP by quarter
  source: '[BP product.twelveMonth] 和 [BP milestones 12-24 months] 支持温和的 logo 增长，同时验证一个相邻品类客户和 workflow 扩张。'
- id: A7
  name: 第 3 年客户爬坡
  value: Q1Y3 7; Q2Y3 9; Q3Y3 11; Q4Y3 13
  unit: customers EOP by quarter
  source: '[BP milestones 24-36 months] 和 [RS market.som 18 accounts at ~$300k ACV] 让 base case 保持在调研得到的 SOM 之下，同时假设 partner-led scaling 在第 3 年启动。'
- id: A8
  name: 第 1 年 blended annual ARPU
  value: '90'
  unit: USDK per customer per year
  source: '[BP investorMemo.firstCustomer $30k-$75k paid pilot and $150k-$300k annual subscription] 第 1 年 base case 里，pilot 定价与少量 production 收入混合在一起。'
- id: A9
  name: 第 2 年 blended annual ARPU
  value: '200'
  unit: USDK per customer per year
  source: '[BP investorMemo.firstCustomer] 和 [BP gtm pricing] 假设随着更多 workflow 与受控州上线，收入结构会向 production 订阅倾斜。'
- id: A10
  name: 第 3 年 blended annual ARPU
  value: '300'
  unit: USDK per customer per year
  source: '[RS market.som] 和 [RS bottomUpSizingDrivers modeled enterprise ACV $300k] 共同给出 multi-workflow 部署稳定后约 $300k 的 blended ACV。'
- id: A11
  name: 毛利率路径
  value: Y1 45%-62% by month; Y2 65%-70% by quarter; Y3 70%-72% by quarter
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 加上 startup-finance heuristic：早期实施会压低第 1 年毛利率，随后连接器复用和模板成熟再把毛利率抬上来。'
- id: A12
  name: 创始人 fully loaded 薪酬
  value: '150'
  unit: USDK per year
  source: Startup-finance heuristic：美国 lean pre-seed 创始人现金薪酬，加上 payroll burden。
- id: A13
  name: 工程 fully loaded 薪酬
  value: '185'
  unit: USDK per year
  source: Startup-finance heuristic：美国 seed 阶段全栈 / platform 工程师薪酬，加上 payroll burden。
- id: A14
  name: 合规产品 fully loaded 薪酬
  value: '165'
  unit: USDK per year
  source: '[BP team compliance product lead] 加 startup-finance heuristic：适用于受监管软件的产品人才薪酬。'
- id: A15
  name: 解决方案岗位 fully loaded 薪酬
  value: '175'
  unit: USDK per year
  source: '[BP team solutions engineer] 加 startup-finance heuristic：适用于早期面向客户的实施工程岗位。'
- id: A16
  name: GTM fully loaded 薪酬
  value: '180'
  unit: USDK per year
  source: '[BP team partnerships lead] 加 startup-finance heuristic：适用于创始人辅助下的企业合作 / 销售招聘。'
- id: A17
  name: 招聘顺序
  value: Founder, founding engineer, and compliance-product lead at start; solutions in M4; second engineer in M7; partnerships in M10; third engineer in M15; second GTM in M19; second compliance in M28; second solutions in M31; fourth engineer in M34
  unit: timing
  source: '[BP team] 和 [BP strategicChoices.sequencingRationale] 要求 GTM 与支持岗位的增加，晚于 pilot→production 这条路径被验证可复用。'
- id: A18
  name: 非人力研发支出爬坡
  value: 8K/month in Q1Y1, 10K/month in Q2Y1, 12K/month in Q3Y1, 14K/month in Q4Y1, then 39/42/45/48K per quarter in Y2 and 51/54/57/60K per quarter in Y3
  unit: USDK
  source: '[BP product roadmap] 加 startup-finance heuristic：覆盖云资源、政策数据、安全和集成工具成本。'
- id: A19
  name: 非人力 GTM 支出爬坡
  value: 4K/month in Q1Y1, 5K/month in Q2Y1, 6K/month in Q3Y1, 8K/month in Q4Y1, then 24/27/30/36K per quarter in Y2 and 39/45/51/57K per quarter in Y3
  unit: USDK
  source: '[BP gtm channels and funnelTargets] 加 startup-finance heuristic：覆盖创始人主导销售、差旅、律师转介和合作伙伴拓展，在大规模销售扩张前逐步爬坡。'
- id: A20
  name: 非人力 G&A 支出爬坡
  value: 5K/month in Q1Y1, 6K/month in Q2Y1, 7K/month in Q3Y1, 8K/month in Q4Y1, then 24/27/30/33K per quarter in Y2 and 36/39/42/45K per quarter in Y3
  unit: USDK
  source: '[BP operations] 加 startup-finance heuristic：覆盖受监管 SaaS 业务中的法务、保险、合规开销和行政供应商。'
- id: A21
  name: Blended CAC
  value: '103'
  unit: USDK per customer
  source: 根据模型测算：Y2–Y3 的 GTM 支出约 $1.03M（GTM 薪资、部分创始人销售时间和非人力 S&M），对应 10 个净新增客户。
- id: A22
  name: 月流失率
  value: '2.0'
  unit: percent
  source: Startup-finance heuristic：面向粘性较强但买家集中的企业合规软件；同时参考 [BP risks] 对 bundling 和买家集中的提醒。
- id: A23
  name: 现金流口径
  value: cash approximates EBITDA
  unit: policy
  source: Startup-finance heuristic：对一家早期软件公司来说，capex、债务、税项和营运资金时差在规划模型里都不显著。
- id: A24
  name: 融资规模规则
  value: capital sized to exit Y2 milestone plus six months of buffer
  unit: policy
  source: Developer instruction 加 [BP fundingAsk runwayMonths 18]，意味着 base case 需要按 24 个月规划这一轮融资。
