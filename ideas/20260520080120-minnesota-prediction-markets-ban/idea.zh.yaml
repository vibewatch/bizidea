problem: Prediction-market 运营商现在面对的是州与州不同、且可能上升到重罪层级的法律风险，而联邦监管机构同时又在主张这些产品本身合法。合规团队不能再只靠外部律师备忘录和通用 geofencing 供应商，因为禁令会同时打到交易接入、广告投放、合作分发和反规避控制。每出现一条新法案或一纸禁令，产品、营销、支付和客服都得在截止日期前改动并留痕。
targetUser:
  primary: 面向全美零售用户、受 CFTC 监管的 prediction-market 运营商中的总法律顾问、合规负责人和产品风险负责人
  secondary: 负责受限州获客渠道的联盟营销和生命周期营销负责人
  buyer: 首席合规官或总法律顾问
startupThesis:
  nonObviousInsight: 真正疼的不是法律研究本身；一旦州政府把运营、广告和规避支持都定性，prediction market 需要的是一套运行时控制平面，把不断变化的法律姿态实时翻成准入规则、渠道下线动作和全链路审计证据。
  beachhead: 受 CFTC 监管、同时经营消费者 Web 与移动端、有联盟营销、用户遍布 50 州，且必须在 2026 年 8 月前准备好应对明尼苏达式禁令的 prediction-market 平台。
  wedge: 一套司法辖区策略引擎，把每个州实时变化的法律状态映射成 API 可执行的注册、交易接入、广告下线、联盟规则和面向监管机构与法院的证据包。
  whyNowCatalyst: 明尼苏达这个全国首例的重罪禁令、CFTC 当天提起的禁令诉讼，以及 15 个以上州仍在推进的法案队列，逼着运营商把法律姿态运营化，而不能再把它当成季度研究。
  ventureScalePath: 先服务 prediction-market 运营商，再把同一套政策图谱和执行轨道扩到其他同样被州级监管切碎的金融产品，比如 sweepstakes trading、体育事件合约，以及其他同时受联邦和州监管的消费者衍生品。
solution: 打造一套司法辖区控制平面，读入平台在各州的风险暴露，再把机器可读的政策推到注册、地理定位、钱包入金、交易、CRM 和联盟系统。产品持续维护实时的州级规则图谱，自动生成所需的封禁名单和披露版本；一旦法案通过或禁令调整范围，也能同步关停被禁止的获客渠道。它还会产出按州和生效日期拆分的证据包，说明当时到底启用了哪些控制，让法务团队在监管问询或诉讼里拿得出一套站得住脚的记录。再往后，运营商还能用这层系统在进入或退出某州前先模拟收入影响，并让外部供应商围绕同一份事实源协同。
goToMarketSeed:
  firstCustomer: 美国某家 prediction-market 运营商的法务与合规团队：它有全国性零售 App、活跃的付费投放和联盟流量，而且必须在法律生效前挡住明尼苏达用户及相关广告库存。
  buyingTrigger: 某州刚通过禁令、已公布生效日、即将举行禁令听证，或推出扩大限制范围的新法案，迫使团队立刻调整准入、营销和合作伙伴政策。
  currentAlternative: 外部律师备忘录、电子表格、通用 geofencing 供应商，以及产品和营销团队之间的人工协同。
  switchingReason: 这个切口把静态法律意见直接变成可执行的产品与营销控制，并附带时间戳证据，既缩短落地延迟，也降低某个渠道在州级限制变化后还漏着没关的风险。
  pricingHypothesis: 按活跃州数量和受控 workflow 数量收取年度 SaaS 费用；联盟监测和面向监管机构的证据导出模块单独加价。
