jobsToBeDone:
- job: 当某个州通过或提出禁令时，帮 prediction-market 合规负责人快速更新所有受影响的用户规则和渠道规则，这样他们既能在其他州继续运营，也不会因为漏控而违规。
  currentAlternative: 电子表格、应急 Slack 协调，以及产品和营销团队间的人工派单。
  successMetric: 从法律变化发生，到所有覆盖系统完成控制生效所需的时间。
- job: 当监管机构或法院质疑平台行为时，帮法务团队证明在特定州和特定日期到底生效了哪些限制，这样企业可以拿出具体证据来为自己辩护。
  currentAlternative: 事后临时拼凑的截图、供应商日志和法务备忘录。
  successMetric: 生成一份完整、按州拆分的证据包所需分钟数。
