topRisks:
- name: 市场规模过于集中
  description: Prediction-market 运营商本身就是很小的一批首批买家；如果后续扩张不顺，早期 ARR 天花板会很低。
  mitigation: 产品底层按可复用的司法辖区政策原语来设计，确保 12 个月内就能扩进相邻的受监管消费金融品类。
- name: 法律边界很快明朗
  description: 如果联邦排他管辖权迅速获胜，核心交易接入上的州级工具紧迫度可能下降。
  mitigation: 优先做那些即便在部分联邦排他前提下仍然保留州级差异的场景，包括广告、年龄限制、联盟控制和州级披露。
- name: 集成负担过重
  description: 如果系统很难接进交易、CRM 和获客栈，买家会退回人工流程和单点供应商。
  mitigation: 第一版先聚焦政策看板、营销下线和证据导出，再逐步深入运行时 API。
