    description: "If the system is too hard to wire into trading, CRM, and acquisition stacks, buyers may fall back to manual work and point vendors."
    mitigation: "Launch with a narrow first release covering policy dashboard, marketing suppression, and evidence exports before expanding into deeper runtime APIs."
