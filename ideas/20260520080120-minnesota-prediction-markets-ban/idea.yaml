problem: >-
  Prediction-market operators now face felony-level exposure that can vary by state even while federal regulators argue the products are lawful. Compliance teams cannot rely on outside-counsel memos and generic geofencing vendors when bans can touch trading access, advertising, partner referrals, and circumvention controls at once. Each new bill or injunction creates urgent product, marketing, payments, and support changes that must be implemented and documented before a deadline.
targetUser:
  primary: "General counsel, compliance leads, and product-risk owners at CFTC-regulated prediction-market operators serving retail users nationwide"
  secondary: "Affiliate and lifecycle-marketing operators responsible for acquisition channels in restricted states"
  buyer: "Chief Compliance Officer or General Counsel"
startupThesis:
  nonObviousInsight: >-
    The real pain is not legal research alone; once states criminalize hosting, advertising, and circumvention support, prediction markets need a runtime control plane that translates fast-changing legal posture into live eligibility, channel suppression, and audit evidence across the whole customer journey.
  beachhead: >-
    CFTC-regulated prediction-market venues with consumer web and mobile distribution, active affiliate marketing, and users across all 50 states that must be ready for Minnesota-style bans before August 2026.
  wedge: >-
    A jurisdiction policy engine that maps each state's live legal status into API-enforced controls for signup, trading access, ad suppression, affiliate rules, and evidence packets for regulators and courts.
  whyNowCatalyst: >-
    Minnesota's first-in-the-nation felony ban, the CFTC's immediate injunction request, and a 15-plus-state bill pipeline create a near-term need for operators to operationalize legal posture instead of treating it as quarterly research.
  ventureScalePath: >-
    Start with prediction-market operators, then expand the same policy graph and enforcement rails into adjacent state-fragmented financial products such as sweepstakes trading, sports-event contracts, and other consumer derivatives with mixed federal and state oversight.
solution: >-
  Build a jurisdiction control plane that ingests a platform's state exposure and pushes machine-readable policies into signup, geolocation, wallet funding, trading, CRM, and affiliate systems. The product would maintain a live state-by-state rule graph, generate required blocklists and disclosure variants, and automatically suppress banned acquisition channels when a bill passes or an injunction changes scope. It would produce evidence bundles showing what controls were active for each state and effective date, giving legal teams a defensible record during regulator inquiries or litigation. Over time, operators could use the same layer to simulate revenue impact before entering or exiting a state and to coordinate external vendors against a single source of truth.
goToMarketSeed:
  firstCustomer: >-
    The legal and compliance team at a U.S. prediction-market operator with a nationwide retail app, active paid acquisition, and affiliate traffic that must block Minnesota users and related ad inventory before the law takes effect.
  buyingTrigger: >-
    A newly enacted state ban, pending effective date, injunction hearing, or expansion bill that forces immediate changes to eligibility, marketing, and partner policies.
  currentAlternative: "Outside counsel memos, spreadsheets, generic geofencing vendors, and manual coordination across product and marketing teams"
  switchingReason: >-
    This wedge turns static legal advice into enforceable product and marketing controls with timestamped evidence, reducing both implementation lag and the risk that one channel stays open after a state restriction changes.
  pricingHypothesis: >-
    Annual SaaS platform fee priced by number of active states and controlled workflows, with premium modules for affiliate monitoring and regulator-ready evidence exports.
