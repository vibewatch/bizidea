topRisks:
  - name: "Market size concentration"
    description: "Prediction-market operators are still a small initial buyer pool, which could cap early ARR if expansion stalls."
    mitigation: "Design the product around reusable jurisdiction-policy primitives that can extend into adjacent regulated consumer finance categories within 12 months."
  - name: "Legal clarity arrives fast"
    description: "A decisive federal preemption win could reduce the urgency of state-by-state tooling for core trading access."
    mitigation: "Prioritize surfaces that remain state-specific even under partial preemption, including advertising, age limits, affiliate controls, and state-specific disclosures."
