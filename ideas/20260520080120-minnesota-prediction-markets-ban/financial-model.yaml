scenarios:
  downside:
    description: Standalone budget approval takes longer, incumbents compress pricing,
      and adjacent-category expansion slips by two to three quarters.
    y3RevenueK: 2100.0
    y3EbitdaK: -620.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - Year 3 exits near 10 active accounts instead of 13 because sales cycles stretch
      toward nine months.
    - Steady-state blended ARPU settles near $270K instead of $300K as geo-vendor
      bundling caps pricing.
    - Gross margin exits near 68% because implementation and evidence packaging stay
      more manual.
  base:
    description: Founder-led sales converts the first prediction-market pilots, then
      partner referrals and adjacency expansion accelerate logo growth in Y3.
    y3RevenueK: 2737.5
    y3EbitdaK: -283.23
    cashLowPointK: 597.24
    keyAssumptionChanges:
    - The company grows from 3 active accounts at Y1 exit to 13 at Y3 exit while staying
      below the researched 18-account SOM.
    - Blended annual ARPU rises from $90K in Y1 to $300K in Y3 as pilots convert into
      multi-workflow production subscriptions.
    - Gross margin reaches the 70% target range by Y2 and exits Y3 at 72% as integrations
      become more reusable.
  upside:
    description: Regulatory deadlines multiply across states, partner referrals work
      early, and customers standardize more workflows per account with little extra
      headcount.
    y3RevenueK: 3350.0
    y3EbitdaK: 120.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
    - Year 3 exits near 15 active accounts because the adjacent-category motion lands
      a year earlier.
    - Blended ARPU reaches about $315K as more operators add affiliate governance
      and evidence modules sooner.
    - Gross margin exits near 74% because reusable connectors reduce implementation
      labor per deployment.
