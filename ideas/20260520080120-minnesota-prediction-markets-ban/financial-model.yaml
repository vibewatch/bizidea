slug: prediction-market-jurisdiction-rail
date: '2026-05-20'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: month
  source: '[BP date 2026-05-20] first full month after the business-plan date.'
- id: A2
  name: Opening cash / modeled pre-seed
  value: '3000'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M and runwayMonths 18] model uses
    a $3.0M close to fund the first 24 months including the required 6-month buffer.'
- id: A3
  name: Customer unit in the model
  value: active paying operator account
  unit: definition
  source: '[BP investorMemo.firstCustomer] and [BP businessModel.unitOfValue] support
    modeling revenue by operator account that expands as more states and workflows
    move under control.'
- id: A4
  name: Revenue recognition convention
  value: average active customers per period × blended annual ARPU
  unit: formula
  source: 'Startup-finance heuristic named source: Financial Modeler mid-period go-live
    rule so new logos contribute half-period revenue in the period they start.'
- id: A5
  name: Year 1 customer ramp
  value: '[0,0,0,0,1,1,2,2,2,2,2,3]'
  unit: customers EOP by month
  source: '[BP milestones 0-12 months] and [BP killCriteria] support two paid design
    partners in the first 9 months plus a third paying account by M12.'
- id: A6
  name: Year 2 customer ramp
  value: Q1Y2 3; Q2Y2 4; Q3Y2 5; Q4Y2 6
  unit: customers EOP by quarter
  source: '[BP product.twelveMonth] and [BP milestones 12-24 months] support modest
    logo growth while the company proves one adjacent-category customer and workflow
    expansion.'
- id: A7
  name: Year 3 customer ramp
  value: Q1Y3 7; Q2Y3 9; Q3Y3 11; Q4Y3 13
  unit: customers EOP by quarter
  source: '[BP milestones 24-36 months] and [RS market.som 18 accounts at ~$300k ACV]
    keep the base case below the researched SOM while assuming partner-led scaling
    begins in Y3.'
- id: A8
  name: Year 1 blended annual ARPU
  value: '90'
  unit: USDK per customer per year
  source: '[BP investorMemo.firstCustomer $30k-$75k paid pilot and $150k-$300k annual
    subscription] base case blends pilot pricing with a small amount of production
    revenue in Y1.'
- id: A9
  name: Year 2 blended annual ARPU
  value: '200'
  unit: USDK per customer per year
  source: '[BP investorMemo.firstCustomer] and [BP gtm pricing] assume the mix shifts
    toward production subscriptions as more workflows and controlled states go live.'
- id: A10
  name: Year 3 blended annual ARPU
  value: '300'
  unit: USDK per customer per year
  source: '[RS market.som] and [RS bottomUpSizingDrivers modeled enterprise ACV $300k]
    set the steady-state blended ACV once multi-workflow deployments are established.'
- id: A11
  name: Gross margin path
  value: Y1 45%-62% by month; Y2 65%-70% by quarter; Y3 70%-72% by quarter
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] plus startup-finance heuristic
    that early implementation work depresses Y1 margin before connector reuse and
    templates mature.'
- id: A12
  name: Loaded founder compensation
  value: '150'
  unit: USDK per year
  source: 'Startup-finance heuristic: lean U.S. pre-seed founder cash salary plus
    payroll burden.'
- id: A13
  name: Loaded engineering compensation
  value: '185'
  unit: USDK per year
  source: 'Startup-finance heuristic: seed-stage U.S. full-stack / platform engineer
    plus payroll burden.'
- id: A14
  name: Loaded compliance-product compensation
  value: '165'
  unit: USDK per year
  source: '[BP team compliance product lead] plus startup-finance heuristic for regulated-software
    product talent with payroll burden.'
- id: A15
  name: Loaded solutions compensation
  value: '175'
  unit: USDK per year
  source: '[BP team solutions engineer] plus startup-finance heuristic for early customer-facing
    implementation engineering.'
- id: A16
  name: Loaded GTM compensation
  value: '180'
  unit: USDK per year
  source: '[BP team partnerships lead] plus startup-finance heuristic for founder-assisted
    enterprise partnerships / sales hiring.'
- id: A17
  name: Hiring sequence
  value: Founder, founding engineer, and compliance-product lead at start; solutions
    in M4; second engineer in M7; partnerships in M10; third engineer in M15; second
    GTM in M19; second compliance in M28; second solutions in M31; fourth engineer
    in M34
  unit: timing
  source: '[BP team] and [BP strategicChoices.sequencingRationale] keep GTM and support
    additions behind proof of repeatable pilot-to-production motion.'
- id: A18
  name: Non-payroll R&D spend ramp
  value: 8K/month in Q1Y1, 10K/month in Q2Y1, 12K/month in Q3Y1, 14K/month in Q4Y1,
    then 39/42/45/48K per quarter in Y2 and 51/54/57/60K per quarter in Y3
  unit: USDK
  source: '[BP product roadmap] and startup-finance heuristic for cloud, policy-data,
    security, and integration tooling costs.'
- id: A19
  name: Non-payroll GTM spend ramp
  value: 4K/month in Q1Y1, 5K/month in Q2Y1, 6K/month in Q3Y1, 8K/month in Q4Y1, then
    24/27/30/36K per quarter in Y2 and 39/45/51/57K per quarter in Y3
  unit: USDK
  source: '[BP gtm channels and funnelTargets] plus startup-finance heuristic for
    founder-led selling, travel, counsel referrals, and partner development before
    broad sales scaling.'
- id: A20
  name: Non-payroll G&A spend ramp
  value: 5K/month in Q1Y1, 6K/month in Q2Y1, 7K/month in Q3Y1, 8K/month in Q4Y1, then
    24/27/30/33K per quarter in Y2 and 36/39/42/45K per quarter in Y3
  unit: USDK
  source: '[BP operations] plus startup-finance heuristic for legal, insurance, compliance
    overhead, and admin vendors in a regulated SaaS business.'
- id: A21
  name: Blended CAC
  value: '103'
  unit: USDK per customer
  source: Calculated from modeled Y2-Y3 GTM spend of about $1.03M (GTM payroll, a
    portion of founder selling time, and non-payroll S&M) across 10 net new customers.
- id: A22
  name: Monthly churn
  value: '2.0'
  unit: percent
  source: Startup-finance heuristic for sticky but concentrated enterprise compliance
    software, tempered by [BP risks] on incumbent bundling and narrow buyer concentration.
- id: A23
  name: Cash flow convention
  value: cash approximates EBITDA
  unit: policy
  source: Startup-finance heuristic for an early-stage software company with immaterial
    capex, debt, taxes, and working-capital timing in the planning model.
- id: A24
  name: Funding sizing rule
  value: capital sized to exit Y2 milestone plus six months of buffer
  unit: policy
  source: Developer instruction plus [BP fundingAsk runwayMonths 18] imply a 24-month
    planning round for the base case.
