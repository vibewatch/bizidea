modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      StateDeadlines --> QualifiedPilots
      CounselReferrals --> QualifiedPilots
      QualifiedPilots --> ProductionAccounts
      ProductionAccounts --> WorkflowExpansion
      WorkflowExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: Revenue engine
  finding: The base case reaches 13 active operator accounts by Q4Y3, with pricing
    expanding from pilot-equivalent Y1 revenue to the researched $300K blended ACV
    as more workflows and states move under control.
- checkName: Must go right
  finding: Two paid pilots must convert fast enough that founder-led selling plus
    one partnerships hire can add roughly three net new accounts in Y2 before broader
    adjacent-category expansion carries Y3.
- checkName: Model breaks if
  finding: If incumbent bundling pushes ACV toward $270K or sales cycles stretch toward
    nine months, downside cash falls toward about $180K before the company proves
    a durable second market.
- checkName: Next-round proof
  finding: A credible next round requires exiting Y2 with 6 production accounts, one
    adjacent-category logo, one reusable geo or identity integration, and gross margin
    around the 70% target.
sanityChecks:
  ruleOf40: Y3 growth 231.82% + EBITDA margin -10.35% = 221.47%
  burnMultiple: Y2 burn multiple 1.21x, improving to 0.10x in Y3 on net new ARR.
  revenuePerFte: $248.86K Y3 on 11 exit FTE (benchmark $200-400K SaaS)
  flags:
  - The base case still depends on a narrow buyer pool, so one delayed enterprise
    deal or non-renewal can move the next financing date materially.
  - Y1 and Y2 remain heavily EBITDA negative, which means the plan requires closing
    the pre-seed near the midpoint of the stated $2-4M range.
  - The model assumes pilots priced at $30k-$75k can expand into roughly $300K multi-workflow
    annual accounts; if buyers resist workflow expansion, revenue undershoots quickly.
  - Cash reaches its low point late in Y3, so any delay in adjacent-category expansion
    would likely force an earlier raise even though Q4Y3 turns slightly EBITDA positive.
