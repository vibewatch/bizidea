  - "incumbentClass": "In-house field ops"
    "point": "Manual field-agent and call-center follow-up work for a few locations, but Aviva’s scale and Mexico’s correspondent footprint show that distributed assisted lending becomes a workflow-control problem once networks stretch across states."
