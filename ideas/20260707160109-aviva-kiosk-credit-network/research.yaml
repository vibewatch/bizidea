  "regulatoryLandscape": "Mexico does not let lenders treat assisted origination as a UX-only problem. SOFOM disclosures, CONDUSEF registry obligations, and the Fintech Law create a regime where customer treatment, identity, and recordkeeping must stay auditable as channels digitize.[58][75][80] A credible product therefore needs script versioning, complaint and incident handling, and lender-specific policy controls rather than a generic kiosk front end.[58][75][80][97]"
  "technologyLandscape": "The enabling components are already mature: kiosk/video flows at Aviva, composable lending cores from Mambu and LoanPro, configurable application workflows from TurnKey Lender, and remote identity / document tooling from Entrust, Incode, Trulioo, Lleida.net, and Mifiel.[2][50][97][101][106][109][111][114][116] The product opportunity is integration and operating discipline across those components, not inventing a new OCR or credit engine.[97][101][109][111][116]"
