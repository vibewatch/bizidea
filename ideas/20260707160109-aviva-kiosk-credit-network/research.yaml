  "competitiveLandscape": "Direct Mexico-first assisted-origination software still appears sparse, but substitutes are strong. Aviva proves the phygital model as a vertically integrated lender; Kueski and Klar attack borrower convenience through pure digital channels; Banco Azteca and FEMSA show the power of owned physical distribution; and TurnKey Lender, LoanPro, and Mambu already sell general lending stacks. The gap is a neutral merchant-edge control plane optimized for third-party points, not owned branches or app-only funnels.[50][95][21][39][43][109][111][116]"
  "incumbentThesis":
  - "incumbentClass": "Generic LOS / lending cores"
    "point": "Platforms such as LoanPro, Mambu, and TurnKey Lender automate origination and servicing, but they are not opinionated about merchant scripts, remote QA playback, or municipality-level rollout discipline."
    "sourceRefs":
