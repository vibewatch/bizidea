"reportMemo":
  "executiveTakeaways":
  - "Aviva’s new $18M Series A and earlier IDB Lab backing show that kiosk-assisted lending is now scaling beyond pilot stage: the company says it operates in 23 states, has processed more than 300,000 applications, and is broadening its product base.[51][95]"
  - "Demand exists because formal credit access is still thin relative to need: IDB Lab says fewer than 35% of individuals and 10.5% of businesses have formal credit, while ENIF-based summaries still put formal-credit penetration at 37.3% and heavy informal saving at 36.6%.[50][74][90]"
  - "The wedge is not better scoring alone but disciplined merchant-edge operations. Mexico already uses correspondents, OXXO, Yastás, and store-linked finance to extend reach; what most lenders still lack is a neutral workflow layer for scripts, QA, and fraud controls across distributed points.[37][43][46][49][118]"
  - "The market is real but crowded with substitutes: digital lenders, store-lenders, generic LOS vendors, and in-house field ops all attack pieces of the problem, so the startup wins only if it shortens state launches and reduces risk-ops variance faster than those alternatives.[20][21][39][109][111][116]"
  "marketDefinition": "Software and workflow infrastructure for Mexican non-bank lenders that want to launch or govern assisted small-ticket lending through merchant-hosted kiosks, tablets, or video booths—sitting between a lender’s LOS and a distributed physical network to standardize scripts, document capture, QA, routing, and compliance.[50][95][109][111][116]"
  "customerAndBuyer": "The practical buyer is the COO or head of expansion / credit operations inside a SOFOM, fintech lender, or retailer-linked credit group that is pushing beyond self-serve digital into branch-light physical access. Aviva’s SOFOM disclosure, Konfío’s SOFOM disclosure, and CONDUSEF’s SIPRES registry all point to an operating environment where process control matters as much as demand generation.[58][14][75]"
