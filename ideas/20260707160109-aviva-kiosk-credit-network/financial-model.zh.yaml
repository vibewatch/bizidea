slug: merchant-kiosk-origination-os
date: '2026-07-07'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型启动月份
  value: 2026-07
  unit: month
  source: '[BP date 2026-07-07]；融资、试点和招聘计划都是立刻启动的，所以模型从 2026 年 7 月开始。'
- id: A2
  name: Pre-seed 融资带来的期初现金
  value: '2000'
  unit: USD K
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M]；模型取区间下限，因为滩头市场规模有限，计划也明确倾向精简、以墨西哥为先的招聘节奏。'
- id: A3
  name: 客户单位定义
  value: active paying lender logo
  unit: unit
  source: '[BP market.som 第三年可触达的 8 家正式客户]；客户数按付费放贷机构客户（logo）计，而不是按商户网点计，这样收入桥接才能对上 BP 里 SOM 的口径。'
- id: A4
  name: 付费试点合同价值
  value: '30'
  unit: USD K per 90-day pilot
  source: '[BP investorMemo.firstCustomer.initialContract 90 天付费试点价值约 US$20k-$40k]；模型取中位数。'
- id: A5
  name: 稳态正式合同价值
  value: '150'
  unit: USD K per logo-year
  source: '[BP investorMemo.firstCustomer 年度转化约 US$120k-$180k]；[BP market.som 8 家客户 × 测算 $150k ACV = $1.2M]。'
- id: A6
  name: 成熟客户的使用费与高级管控加价
  value: Production MRR 从 $12.5K 涨到 Q4Y3 的 $14.0K
  unit: USD K per month
  source: '[BP businessModel.revenueStreams 年度订阅+使用费+高级反欺诈与质检模块]；模型假设只有在有正式客户验证之后，才会出现小幅追加销售。'
- id: A7
  name: 基线情形的客户上线排期
  value: M4、M6、M10、M16、M22、M28、M32、M35
  unit: new paying-logo start months
  source: '[BP milestones 第一年 2-3 个试点，24 个月 5 家客户，36 个月 8 家客户]；[BP experimentRoadmap 大规模 GTM 之前先由创始人主导验证]。'
- id: A8
  name: 转正式定价前的试点时长
  value: '3'
  unit: months
  source: '[BP gtm.wedge 90 天付费上线管控试点]；每家新客户在转入正式定价前，会先按试点价维持三个月。'
- id: A9
  name: 毛利率爬坡
  value: Y1 45-62%；Y2 64-69%；Y3 69-72%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70]；创业财务经验法则——在模板尚未完全可复用之前，试点和第二套技术栈上线阶段会更偏重服务。'
- id: A10
  name: 单位经济模型用的月度客户流失率
  value: '2.0'
  unit: percent
  source: 面向按年度合同销售的高 ACV 企业级工作流软件的创业财务经验法则；通过保守设定客户排期，运营爬坡已经隐含考虑了流失。
- id: A11
  name: 创始人满载年现金薪酬
  value: '80'
  unit: USD K per year
  source: '[BP team 创始人 CEO 第 0 个月起]；面向墨西哥为先的 pre-seed 公司、低于市场水平的创始人薪酬的创业财务经验法则。'
- id: A12
  name: 工程与产品满载薪酬
  value: '100'
  unit: USD K per FTE-year
  source: '[BP team 创始工程师，以及后续第二套集成能力]；面向墨西哥/拉美资深金融科技工程人才的创业财务经验法则。'
- id: A13
  name: 解决方案工程满载薪酬
  value: '80'
  unit: USD K per FTE-year
  source: '[BP team 解决方案工程师第 3 个月起]；面向兼顾集成与工作流梳理的实施人才的创业财务经验法则。'
- id: A14
  name: 风控与合规产品满载薪酬
  value: '85'
  unit: USD K per FTE-year
  source: '[BP team 风控/合规产品负责人第 4 个月起]；面向受监管工作流产品负责人的创业财务经验法则。'
- id: A15
  name: 客户成功与商户运营满载薪酬
  value: '60'
  unit: USD K per FTE-year
  source: '[BP team 客户成功/商户运营负责人第 8 个月起]；面向墨西哥现场运营与客户开户负责人的创业财务经验法则。'
- id: A16
  name: 合作伙伴与 GTM 满载薪酬
  value: '90'
  unit: USD K per FTE-year
  source: '[BP team 合作伙伴/GTM 负责人第 12 个月起]；面向变动薪酬较低的精简渠道拓展岗位的创业财务经验法则。'
- id: A17
  name: 销售与渠道 AE 满载薪酬
  value: '100'
  unit: USD K per FTE-year
  source: '[BP sequencingRationale 完整销售团队在拿下 2 家正式客户之后才组建]；面向仅在早期验证完成后才新增的一名企业级销售的创业财务经验法则。'
- id: A18
  name: 招聘排期
  value: M3 解决方案工程；M4 风控/合规；M8 商户运营；M12 合作伙伴；M16 工程 2 号；M19 销售/渠道 AE；到 Y3 前维持 8 名 FTE
  unit: hires
  source: '[BP team.startTiming]；[BP strategicChoices.sequencingRationale 先招实施和合规人员，再组建完整销售团队]。'
- id: A19
  name: 非薪资运营支出
  value: Y1 每月 $14K-$20K；Y2 每月 $22K-$30K；Y3 每月 $31K-$34K
  unit: USD K
  source: '[BP operations 需要差旅、培训、云服务、可审计性、法务和伙伴赋能]；面向墨西哥这种合规负担重、跨州铺开的工作流的创业财务经验法则。'
- id: A20
  name: 按职能划分的运营支出结构
  value: S&M 约 25% 到 35%；R&D 约 50% 到 40%；G&A 全程约 25%
  unit: percent of opex
  source: '[BP strategicChoices.sequencingRationale 实施和产品化先于规模化 GTM]；这个结构只有在 Y2 验证完成之后，才会逐步向 S&M 倾斜。'
- id: A21
  name: 现金流简化假设
  value: EBITDA 近似等于净现金流变动
  unit: modeling convention
  source: 面向资本支出极低、无债务偿付、也未建模营运资金波动的早期软件公司的创业财务经验法则。
- id: A22
  name: 混合 CAC
  value: '86.8'
  unit: USD K per landed paying logo
  source: '[A20]；模型推算自 Y1-Y2 约 $434K 的销售与市场支出，对应到 Month 24 前落地的 5 家付费客户。'
- id: A23
  name: 单位经济模型用的成熟年化 ARPU
  value: '160'
  unit: USD K per logo-year
  source: '[A5-A6]；单位经济视角用的是成熟正式客户，叠加小幅使用费和高级管控加价，而不是试点定价。'
- id: A24
  name: 下一轮融资的里程碑与缓冲
  value: 第 24 个月前做到 5 家正式客户、1 次伙伴协助的第二套技术栈部署，实施中位数低于 45 天，另加 6 个月现金缓冲
  unit: milestone
  source: '[BP milestones 12-24 个月]；[BP fundingAsk.runwayMonths 18]；模型延伸到 24 个月，这样公司不至于在首批验证成果刚出来时就被迫立刻融资。'
- id: A25
  name: 交付杠杆
  value: 一名解决方案工程师加一名商户运营负责人，用两套可复制的上线技术栈就能支撑 8 家客户
  unit: capacity assumption
  source: '[BP strategicChoices.sequencingRationale 先打磨一套可复制的上线技术栈]；这是把员工数维持在 8 人、贯穿 Y3 的关键效率假设。'
- id: A26
  name: 基线销售节奏
  value: 第 4 个月拿下首个付费试点，之后大约每 6 个月新增一家付费客户，直到伙伴渠道跑通为止
  unit: sales-cycle cadence
  source: '[BP gtm.funnelTargets 调研到试点转化率 20-25%，试点到正式部署转化率 50%以上]；[BP experimentRoadmap 20 场买家访谈、6 家合格客户，以及规模化之前的早期付费试点]。'
