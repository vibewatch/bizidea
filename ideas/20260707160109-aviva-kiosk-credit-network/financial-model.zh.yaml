scenarios:
  downside:
    description: 合作伙伴转介绍和试点转化都来得更晚，公司到 Y3 期末只做到 7 家客户，客户价值更低，毛利率也因为更偏服务型而更低。
    y3RevenueK: 863.0
    y3EbitdaK: -520.5
    cashLowPointK: 377.2
    keyAssumptionChanges:
    - 新付费客户上线时间推迟到 M5、M8、M12、M19、M25、M31 和 M35，Y3 期末只做到 7 家客户，而不是 8 家。
    - 正式合同价值维持在年化 $144K-$162K 左右，达不到基线路径 Q4Y3 $168K 的运行速率。
    - 因为第二套技术栈的部署模板仍偏半定制，毛利率比基线低约 3 个百分点。
  base:
    description: Y1 落地 3 家付费客户，Y2 期末做到 5 家，公司在不超过 8 名 FTE 的情况下，Q4Y3 做到 8 家客户，ARR 运行速率约 $1.3M。
    y3RevenueK: 1000.5
    y3EbitdaK: -377.8
    cashLowPointK: 660.2
    keyAssumptionChanges:
    - 客户爬坡按测算的上线排期走，Y1、Y2、Y3 期末分别做到 3、5、8 家付费客户。
    - 正式合同价值从 $150K ACV 中位数、靠使用费和高级质检或反欺诈模块，涨到 Q4Y3 $168K 的运行速率。
    - 毛利率到 Y3 达到 70% 的业务模型目标，同时全职员工维持在 8 人。
  upside:
    description: 热情的伙伴引荐把销售周期压缩了大约一个季度，公司能更早做到同样的 8 家客户终点，也能更早开始靠高级管控功能变现。
    y3RevenueK: 1143.5
    y3EbitdaK: -265.6
    cashLowPointK: 826.9
    keyAssumptionChanges:
    - 新付费客户提前到 M4、M6、M9、M14、M20、M25、M29 和 M33 上线，员工数仍维持在 8 人。
    - 随着高级管控和网点扩展使用费更早到位，成熟客户价值涨到年化约 $162K-$174K。
    - 因为第二套技术栈复用同一套实施打法，毛利率提前一个季度突破 70%。
sensitivity:
- variable: ARPU
  downsideCase: 客户年化有效价值 $145K
  baseCase: 客户年化有效价值 $160K
  upsideCase: 客户年化有效价值 $175K
  y3RevenueImpactK: -68.0
  cashImpactK: -82.5
- variable: CAC
  downsideCase: CAC $105K
  baseCase: CAC $87K
  upsideCase: CAC $70K
  y3RevenueImpactK: 0.0
  cashImpactK: -108.0
- variable: 流失率
  downsideCase: 月流失率 3.5%
  baseCase: 月流失率 2.0%
  upsideCase: 月流失率 1.0%
  y3RevenueImpactK: -61.5
  cashImpactK: -43.9
- variable: 销售周期
  downsideCase: 从调研到付费试点 6 个月
  baseCase: 从调研到付费试点 4-5 个月
  upsideCase: 有伙伴热情引荐时 3-4 个月
  y3RevenueImpactK: -81.0
  cashImpactK: -116.8
- variable: 毛利率
  downsideCase: Y3 毛利率 66%
  baseCase: Y3 毛利率 71%
  upsideCase: Y3 毛利率 73%
  y3RevenueImpactK: 0.0
  cashImpactK: -72.4
- variable: 招聘节奏
  downsideCase: 在客户验证完成前，H2Y3 就新增第二名客户成功负责人和第三名工程师
  baseCase: 全程维持 8 名全职员工到 Y3
  upsideCase: 用合同工承接超额工作，而不是新增全职员工
  y3RevenueImpactK: 0.0
  cashImpactK: -95.3
modelDiagram:
  title: 单位经济路径
  mermaid: |
    flowchart LR
      QualifiedAccounts --> PaidPilots
      PaidPilots --> ProductionLogos
      ProductionLogos --> UsageFees
      ProductionLogos --> PremiumControls
      UsageFees --> Revenue
      PremiumControls --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基线收入来自付费客户从 Y1 期末 3 家增长到 Y3 期末 8 家，同时成熟客户价值从 $150K ACV 中位数，靠使用费和高级管控加价，涨到约 $1.3M 的 ARR 运行速率。
- checkName: 必须成立的前提
  finding: 这笔融资只有在叠加层部署足够轻量、8 名 FTE 就能撑住 8 家客户、且毛利率到 Y3 末能突破 70% 的情况下才划算。
- checkName: 模型崩溃的条件
  finding: 下行情形和销售周期敏感性显示，合作伙伴转化更慢或集成更零碎，都可能把现金压到约 $0.4M，同时公司到 Y3 期末只做到 7 家客户。
- checkName: 下一轮融资的验证依据
  finding: 只要 pre-seed 能把公司带到 5 家正式客户、1 次伙伴协助的第二套技术栈部署，并把实施周期压到 45 天以内，就有一个站得住脚的种子轮故事。
sanityChecks:
  ruleOf40: Y3 增长率 69.3% + EBITDA 利润率 -37.8% = 31.5%
  burnMultiple: 从 Y2 的 1.4x 改善到 Y3 的 0.9x，年末 ARR 从 $0.74M 涨到 $1.3M。
  revenuePerFte: Y3 按 8 名 Q4Y3 FTE 计算，人均收入 $125K（垂直 SaaS 基准 $200-400K）
  flags:
  - Y3 人均收入仍只有约 $125K，低于软件行业基准，说明这套工作流在复用或相邻模块拉高 ARPU 之前，仍部分带有服务型属性。
  - A25 是个真实风险：如果一名解决方案工程师和一名商户运营负责人撑不住两套技术栈上的 8 家客户，毛利率和这笔融资的可行性都会迅速恶化。
  - 研究在买家密度和预算归属上还留有未解决的不确定性，如果符合近期上线计划的滩头市场客户不到约 6 家，CAC 和销售周期都会被拉长。
  - 研究测算的 $1.2M SOM，更适合理解为退出速率（exit-rate）而不是全年收入数字，因为第 8 家客户上线较晚，Q4Y3 的 ARR 约 $1.3M，而 Y3 全年收入约 $1.0M。
