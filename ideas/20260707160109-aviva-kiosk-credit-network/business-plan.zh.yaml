slug: merchant-kiosk-origination-os
date: '2026-07-07'
executiveSummary: Merchant Kiosk Origination OS 瞄准的是墨西哥非银行放贷机构和零售商关联信贷集团——它们想不建分支，就靠 50-200 个商户网点放出 $100 至 $1,000 的贷款。研究信号显示借款人需求是真的：Aviva 称已覆盖 23 个州，亭机申请完成量超过 30 万份；但一旦辅助获客铺到第三方网点，上线纪律、质检、反欺诈和投诉处理就会变成瓶颈。第一款产品不该替换放贷机构的 LOS 或核保技术栈，而应该在客户已有系统之上叠加引导话术、单证采集、远程质检回放、异常路由和网点级数据分析。第一个客户是一家成长期 SOFOM 或金融科技放贷机构，正在进入新州或商户项目、而总部风控团队还在人工审核辅助申请；第一份合同应该是一次付费的上线管控试点，绑定更快的网点激活速度和更少的坏申请。这个滩头市场故意收得很窄，因为墨西哥已经有强力替代品——通用 LOS 厂商、外勤团队、数字放贷平台和自营零售网络——所以公司必须靠具体的运营 KPI 取胜，而不是靠一个宽泛的 AI 信贷故事。测算出的墨西哥本土 TAM 约 $30.0M、第三年 SOM 约 $1.2M，够撑起一个切口，但还撑不起一个风投案例，除非同一套控制层在验证后能扩展到续贷、催收、相邻产品，乃至其他地理市场。最大的证伪风险，是已经运营足够大规模辅助网络、值得买软件的放贷机构可能太少，以及集成或合规要求可能让部署变得像重服务项目。研究在活跃买家数量、网点级欺诈基线和确切预算归属上还留有真实缺口，所以头 18 个月应该优先做可复制的部署和付费转化，而不是激进招聘。
problem:
- 放贷机构想在大量二三线市镇做小额获客时，分支和外勤的经济账根本算不过来；可纯自助的数字流程，依然接不住那些需要人工协助开户的借款人。
- 几十个商户网点一旦上线，申请质量、反欺诈管控、信息披露和投诉处理就会各自为政——因为通用 LOS 工具管不了商户行为，也做不了远程质检。
- 扩张团队因此陷入速度与管控的两难，拖慢新州上线的节奏——偏偏这正是线下线上结合信贷开始能融到钱的时候。
solution:
- 在放贷机构的 LOS 和每个商户端亭机、平板或视频网点之间架一层工作流叠加层，提供引导话术、单证采集、低带宽辅助、质检回放和异常路由。
- 给总部配上网点级看板、商户评分、暂停/再培训管控和审计日志，让总部风控不建分支也能把第三方网点管起来。
- 先以只读或轻集成的叠加层上线，等基础上线打法跑通、可复制之后，再把审批、续贷和相邻工作流自动化。
whyWeWin:
- 创业公司瞄准的是那层缺失的商户边缘控制层——垂直整合的放贷机构、数字 App 和通用 LOS 厂商都没有把它做成一款中立产品。
- 商户网点的转化、质检和欺诈数据会不断沉淀，滚成一套跨放贷机构的运营数据集和上线打法手册——单一放贷机构的技术栈很难复制。
- 软件优先的叠加层不用扛信贷风险，比起建分支、建自营网络或换一套获客核心系统，能更快见到价值。
strategicChoices:
  beachhead: 正通过 50-200 个第三方商户网点，把 $100 至 $1,000 辅助贷款拓展到二三线市镇的墨西哥 SOFOM、金融科技放贷机构和零售商关联信贷集团。
  wedgeRationale: 这个切片有明确的买家、看得见的上线触发点，也有能量化的运营痛点——上线速度、质检和欺诈。如果一上来就铺向自营零售网络、纯数字放贷机构或非信贷产品，反而会稀释验证效果，因为这些细分市场的激励机制、合规路径和工作流形态都不一样。
  sequencingRationale: 先打磨出一套可复制的墨西哥上线技术栈：LOS 叠加层、身份与单证采集、远程质检、商户数据分析。创始人亲自把单子打进新州和新合作伙伴的上线项目里，先招实施和风控/合规人员，再组建完整销售团队；等首批试点证明能带来更快上线、更低运营波动之后，再深化和 LOS、身份、商户网络的合作关系。
  notYet:
  - 直接做消费信贷或把信贷风险放上自己的资产负债表。
  - 全面替换 LOS 或重建核保模型。
  - 网络所有方已经倾向自营信贷经济模式的自营零售生态。
  - 在辅助信贷模板尚未跑通复制之前，就去做催收、保险或储蓄开户这类相邻产品。
  - 在墨西哥部署打法尚未跑通复制之前，就往墨西哥以外扩张地理市场。
market:
  tam: TAM 估算约 $30.0M：约 200 家墨西哥放贷机构或零售信贷集团 × 测算年 ACV $150k。
  sam: SAM 估算约 $6.8M：滩头市场里约 45 家拥有 50-200 个网点的成长期放贷机构或零售信贷集团 × 测算年 ACV $150k。
  som: 第三年 SOM 估算约 $1.2M：8 家可触达的生产环境客户 × 测算混合年 ACV $150k。
  segments:
  - 通过商户辅助网点拓展小额消费和微型企业信贷的墨西哥非银行放贷机构。
  - 相邻的零售商关联信贷集团，以及后续能复用同一控制层的商户边缘开户工作流。
  buyingProcess: 销售通常始于 COO 或扩张负责人正在筹备新州上线、商户铺开或反欺诈应对项目，而现有的分支或外勤工作流已经撑不住规模。COO 是经济买家，但风控运营负责人、合规团队，以及 LOS 或身份技术栈的技术负责人，都必须在正式上线前批准数据访问、话术和审计管控。
product:
  mvp: MVP 是搭在一个放贷机构 LOS 和一个身份技术栈上的工作流叠加层，给商户员工提供引导话术、单证采集、质检回放、异常路由和网点看板，同时保留放贷机构原有的审批系统。上线时应采用只读或窄范围回写的集成方式，让首批客户不用换掉获客技术栈，就能测试新地理市场。
  sixMonth: 签下 2-3 家共创客户，完成首批 LOS 和身份集成，在头 50-100 个商户网点跑通实盘试点，配上商户评分、暂停管控和每周与放贷机构运营团队的复盘。
  twelveMonth: 把头 2-3 个试点转成年度合同，上线话术版本管理、投诉路由和审计导出功能，加上线上转辅助渠道的混合交接，以及可复用的商户开户模板。
  twentyFourMonth: 支持第二套 LOS 或身份技术栈，加上续贷或催收交接工作流，在墨西哥扩到 5-8 家正式客户；只有部署时间和留存都稳定在目标区间内，才去测试第二个地理市场。
  keyBets:
  - 只要产品是以叠加层、而不是核心系统替换的方式起步，放贷机构就愿意为试点分享网点级漏斗和质检数据。
  - 商户治理能把申请完成率提上去、把坏申请压下来，压到足以撑起一条独立的软件预算。
  - 一到两套上线技术栈的集成，就能覆盖滩头市场足够大的一块，不至于掉进定制服务的陷阱。
  - 随着二线城市数字化采用率上升，线上转辅助渠道的混合路由会变得越来越重要。
gtm:
  wedge: 向一家正在两个新州或一个新零售伙伴处开设 50-75 个商户网点的墨西哥放贷机构，卖一个为期 90 天的付费上线管控试点。接入一套 LOS 和一套身份技术栈，跑通引导工作流和远程质检层；如果试点缩短了网点激活时间、减少了人工质检、提升了申请完成质量，就转正式合同。
  channels:
  - 创始人亲自外呼墨西哥 SOFOM 和金融科技放贷机构的 COO、扩张负责人和风控运营负责人。
  - 和已经嵌入信贷运营流程的 LOS、身份、电子签名和通讯厂商联合销售或互相转介绍。
  - 和不想再堆分支式人力、却想承接更多放贷机构项目的商户网络运营方、亭机集成商或零售服务聚合商结成伙伴关系。
  funnelTargets: 目标客户 → 合格调研阶段转化率 20-30%，调研 → 付费试点转化率 20-25%，试点 → 正式部署转化率 50%以上，正式客户 → 12 个月内扩展到第二州或第二网络的比例 40%以上。
  pricing: 先从一个 90 天付费试点起步，再转为年度平台订阅加按活跃商户网点或完成辅助申请计费的使用费，另设远程质检和反欺诈监控的高级模块。这样定价锚定的是上线速度和风控 ROI，而不是坐席数——正好贴合买家在运营和合规上的预算方式。
businessModel:
  revenueStreams:
  - 绑定新州或新伙伴上线流程的付费上线试点。
  - 面向正式放贷机构客户的年度平台订阅。
  - 按活跃商户网点或完成辅助申请计费的使用费。
  - 反欺诈监控、质检回放和合规管控的高级模块。
  - 一次性的集成和工作流配置费用。
  unitOfValue: 在放贷机构治理下处理辅助申请的活跃商户网点。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在每个现有放贷机构客户内部，增加更多州、商户网络和网点。
  - 等基础工作流赢得信任后，向上销售反欺诈、质检和合规模块。
  - 把控制层延伸到同一商户边缘上的续贷、催收交接和相邻开户产品。
  - 扩充连接器库，让 LOS 和身份合作伙伴能缩短部署时间、提高成交率。
strategyMap:
  northStarMetric: 每月通过活跃商户网点处理的合规辅助申请数。
  inputMetrics:
  - 从签约试点到首个商户网点上线的天数。
  - 每个活跃网点的申请完成率。
  - 每 100 份申请对应的人工质检触达次数。
  - 按网点划分的欺诈或高风险异常率。
  - 试点转正式的转化率。
  - 正式客户 12 个月内每个网点新增的商户数。
  moatsToBuild:
  - 按市镇和合作伙伴类型划分的跨放贷机构数据集,涵盖商户行为、流失、质检失败和审批结果。
  - 覆盖墨西哥主流上线技术栈的话术、披露文本和异常处理模板库。
  - 与 LOS、身份、商户网络合作伙伴的深度绑定关系,能缩短部署时间、提高转换成本。
  - 只做分支或纯 App 模式的放贷机构天然拿不到的网点级风险和再培训基准数据。
  killCriteria:
  - 头 15 家合格放贷机构里,愿意签付费试点或试点意向书的不到 3 家。
  - 头 3 个试点在 90 天内,人工质检触达次数降幅不到 30%,或申请完成率提升不到 15%。
  - 因为集成或合规工作变成定制项目,部署时间中位数一直高于 60 天。
  - 头 6 个试点里,试点转正式的转化率低于 33%。
  mermaid: |
    flowchart LR
      切口[50-200 网点放贷机构上线试点] --> MVP[商户边缘工作流叠加层]
      MVP --> 验证[上线更快、质检波动更低、坏申请更少]
      验证 --> 扩张[更多州、更多网点、相邻信贷工作流]
investorMemo:
  verdict:
    call: 观望
    conviction: 运营切口很扎实，但买家密度和预算证据还不够，在 2-3 个试点以健康 ACV 转化之前，信心还到不了合伙人会议级别。
    whyBelieve: 公司瞄准的是商户边缘分销和现有信贷核心系统之间一个具体的控制层缺口——连已经验证过线下线上模式的放贷机构，目前也还在自己内部解决这个问题。
    whyDoubt: 目前墨西哥的滩头市场规模有限，替代品又多，研究也还没证明有多少放贷机构运营的辅助网络，大到值得单独买软件。
    nextDiligence: 在为更大范围的 GTM 扩张背书之前，先确认至少两个带网点级漏斗基线的付费试点，以及一份可信的年度转化方案。
  firstCustomer:
    title: 墨西哥某 SOFOM 的 COO，正在上线商户辅助小额贷款。
    profile: 一家成长期非银行放贷机构，正通过 50-200 个商户网点拓展两个以上新州，而总部风控仍在人工审核辅助申请。
    trigger: 新州上线、零售伙伴铺开，或不完整/可疑申请激增，都让招募分支员工或外勤质检显得太慢。
    buyer: COO
    initialContract: 面向 50-75 个上线网点、价值约 US$20k-$40k 的 90 天付费试点；如果激活时间、质检工作量和申请质量指标都有改善，转为约 US$120k-$180k 的年度平台及使用费合同。
  mustBeTrue:
  - 前 20 家目标放贷机构或零售信贷客户里，至少有 6 家已经在运营或正在上线 50 个以上的辅助网点，且缺一层专门的治理系统。
  - 一条上线技术栈集成路径，能在不替换放贷机构 LOS 的前提下，60 天内让试点上线。
  - 产品能在头三个试点里，把人工质检触达次数降低 30% 以上，把申请完成率提高 15% 以上。
  - 因为这款软件对应的是运营和风控预算，买家会从试点转成约 US$120k 以上 ARR 的年度合同。
  - 同一套控制层能扩展到续贷、催收交接或相邻开户工作流，而不会变成一门定制服务生意。
  diligenceQuestions:
  - 目前有多少家活跃的墨西哥放贷机构在运营或计划运营 50 个以上的辅助网点？它们用的是什么工具？
  - 实际签下第一份合同的预算负责人会是谁——COO、风控运营负责人、CTO，还是零售伙伴那边的 P&L 负责人？
  - 按商户网点划分，目前的欺诈损失率、被教唆申请率、流失率和人工质检基线分别是多少？
  - 哪些 LOS 和身份厂商覆盖了滩头市场里大多数可触达客户？
  - 商户网络运营方会转介绍中立软件，还是最优质的网点会一直锁在自营生态里？
operatingAssumptions:
- assumption: 墨西哥滩头市场里有足够多的目标客户，能撑起一个可复制的首发市场。
  basis: research.yaml
  validationTest: 整理一份基于 SIPRES 的金融科技放贷机构潜客名单，完成 20 场买家访谈，确认至少 6 家客户符合 50-200 网点画像，且有近期上线计划。
  decisionImpact: 如果不成立，就收窄到已有网络的零售商关联放贷机构，或提前扩张地理市场。
- assumption: 买家会接受叠加层式部署，而不是要求替换核心 LOS。
  basis: idea.yaml
  validationTest: 用文件或 API 叠加层方式上线头 2 个试点，不替换核心系统，把部署时间中位数控制在 60 天以内。
  decisionImpact: 如果不成立，公司就会变成重服务模式，必须收窄到一套核心技术栈或一个合作渠道。
- assumption: 按网点或按申请计费的模式，能给一个 100 网点的网络带来约 US$120k-$180k ARR。
  basis: idea.yaml
  validationTest: 开展 10 场定价沟通，以相当于每月至少 US$10k 生产价值的定价，签下 2 个付费试点。
  decisionImpact: 如果不成立，就降低 ACV 预期、精简范围，或转向更大规模的放贷机构网络。
- assumption: LOS、身份和商户网络合作伙伴会缩短部署周期，而不是拖后腿。
  basis: research.yaml
  validationTest: 拿下 1 份已签署的转介绍或实施协议，并在第二个正式客户之前完成 1 次伙伴协助的部署。
  decisionImpact: 如果不成立，就提前投入直连连接器和更贵的直销打法。
- assumption: 即便数字化采用率在上升，二三线市镇仍然需要线上转辅助渠道的混合旅程。
  basis: research.yaml
  validationTest: 按市镇比较试点群组里自助与辅助完成率，确认辅助流程确实能在目标群体中明显提升完成率或信任度。
  decisionImpact: 如果不成立，就把定位调整成更宽泛的全渠道贷款工作流，而不是商户亭机控制层。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 摸清 ICP 密度，招募首批共创客户。
  hypothesis: 有足够多计划扩张到 50-200 网点的放贷机构，痛感强到愿意参与付费或近付费试点。
  successMetric: 完成 20 场买家访谈，找到 6 家合格客户，拿下 2 个付费试点或 3 份已签署的试点意向书。
  owner: 创始人 CEO
- horizon: 0–90 天
  experiment: 在一套 LOS 和一套身份技术栈上验证叠加层部署。
  hypothesis: 产品不用替换放贷机构的获客核心系统，也能顺利上线。
  successMetric: 签约后 60 天内，首个试点数据跑通，首个商户网点上线。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 用远程回放和商户评分，衡量质检和申请质量的改善程度。
  hypothesis: 集中式质检管控能快速压低坏申请，快到足以证明这笔软件开支划算。
  successMetric: 在头 500 份试点申请中，人工质检触达次数降低 30%，或质检失败率降低 25%。
  owner: 风控/合规产品负责人
- horizon: 90–180 天
  experiment: 在试点转化过程中验证定价和预算归属。
  hypothesis: 运营和风控负责人无需动用更大范围的核心软件替换预算，就能为年度合同拨款。
  successMetric: 完成 10 场定价沟通，2 个试点接受 US$120k 以上 ARR 的年度转化方案。
  owner: 创始人 CEO
- horizon: 90–180 天
  experiment: 打通一条伙伴协助的部署路径。
  hypothesis: LOS、身份或商户网络合作伙伴，能减少实施工作量、加快建立信任。
  successMetric: 签下 1 份合作伙伴协议，完成 1 次定制工程量低于两周的部署。
  owner: 解决方案工程师
- horizon: 180–365 天
  experiment: 在首个正式客户内部扩张，并测试一个相邻工作流。
  hypothesis: 同一套控制层能通过更多网点、更多州，以及至少一个相邻的续贷或催收工作流实现增长。
  successMetric: 首个正式客户的活跃网点翻倍，或新增第二个州；至少一家客户在 10% 以上的月度案例中使用相邻工作流。
  owner: 客户成功/商户运营负责人
operations:
- 商户开户、培训、认证和暂停工作流，配合各放贷机构专属的话术和披露文本。
- 每周和放贷机构运营团队复盘一次，看网点级转化、质检和异常看板。
- 面向 LOS、KYC/身份、电子签名、通讯和导出系统的连接器库。
- 统一的审计日志，记录披露文本、投诉渠道和申请步骤回放。
- 商户网络合同模板，明确佣金、质检要求和数据共享责任。
team:
- role: 创始人 CEO
  startTiming: 第 0 个月
  rationale: 把头几个试点卖给 COO 和扩张负责人，主导客户调研，并在一个规模有限、极度依赖信任的市场里主谈合作伙伴关系。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭建工作流叠加层、数据模型，以及决定部署速度的首批 LOS 和身份集成。
- role: 解决方案工程师
  startTiming: 第 3 个月
  rationale: 通过梳理放贷机构工作流、打包可复用集成、减少定制工作，让试点转化更快。
- role: 风控/合规产品负责人
  startTiming: 第 4 个月
  rationale: 负责话术版本管理、质检回放、投诉处理，以及第三方获客经审计所需的策略管控。
- role: 客户成功/商户运营负责人
  startTiming: 第 8 个月
  rationale: 在公司组建完整销售团队之前，负责首批正式客户内部的商户开户、再培训和扩张。
- role: 合作伙伴/GTM 负责人
  startTiming: 第 12 个月
  rationale: 等有 2 家正式客户、手握真实验证结果之后才加入，负责把 LOS、身份和商户网络的转介绍规模化。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2-3 家共创客户，在一套可复制的上线技术栈上跑通头 50-100 个活跃商户网点。
  - 在头三个试点中证明：部署时间低于 60 天，人工质检触达次数降低 30%，申请完成率提高 15%。
  - 至少把 2 个试点转成年度合同，并打通 1 条伙伴协助的集成路径。
- horizon: 12–24 个月
  items:
  - 拿下 5 家正式放贷机构客户，其中至少 3 家扩展到第二个州或更多商户网络。
  - 在同一平台上加入续贷或催收交接，以及线上转辅助渠道的混合路由。
  - 把第二套 LOS 或身份集成模板标准化，把实施时间中位数压到 45 天以内。
- horizon: 24–36 个月
  items:
  - 如果 ACV 假设成立，拿下 8 家正式客户，达到测算的约 $1.2M SOM。
  - 拓展进一个相邻的金融服务工作流；只有墨西哥的部署和留存指标持续强劲，才评估进入第二个拉美市场。
  - 建立跨放贷机构的商户网点转化、质检和欺诈基准数据，提升成交率和留存率。
risks:
- risk: 商户员工教唆申请人造假、处理单证不当，或伪造申请量，让产品看起来像是在放大风险，而不是管控风险。
  likelihood: High
  impact: High
  mitigation: 上线时就配好远程质检回放、单证质量检查、网点评分、审批节流，以及针对风险网点的一键暂停流程。
- risk: 拥有 50-200 网点辅助网络、又有独立软件预算的放贷机构可能太少。
  likelihood: Medium
  impact: High
  mitigation: 尽早验证 ICP 密度，只在上线或反欺诈应对的窗口期出手销售，靠伙伴转介绍聚焦潜在买家。
- risk: 放贷机构技术栈千差万别，会把部署变成一个个定制服务项目。
  likelihood: High
  impact: High
  mitigation: 坚持叠加层优先，只支持一小组集成方式，把模板产品化；在复制模式跑通之前，拒绝深度定制需求。
- risk: 自营零售网络和拥有自有分销渠道的现有厂商，会把最优质的商户点位锁死。
  likelihood: Medium
  impact: Medium
  mitigation: 聚焦需要白标经济模式、而不是自营信贷产品的独立放贷机构和商户运营方。
- risk: 合规、披露和投诉处理要求，可能拖慢上线速度，或带来责任风险敞口。
  likelihood: Medium
  impact: High
  mitigation: 把话术版本管理、同意与审计日志、各放贷机构专属的投诉路由和异常处理，直接建进 MVP，而不是当成后续附加项。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 打磨出一套可复制的墨西哥上线技术栈，完成 2-3 个共创客户试点，转化头 3-5 家放贷机构客户，补充合规和实施能力，并在不承担信贷风险的前提下，建立起 LOS、身份和商户网络方面的合作关系。
