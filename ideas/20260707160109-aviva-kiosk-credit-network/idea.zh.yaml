  firstCustomer: 一家成长期墨西哥非银行放贷机构，正在两个以上新州铺开 50-200 个商户端辅助申请网点，而总部风控仍在人工审核申请。
  buyingTrigger: 新州上线、零售伙伴铺开，或辅助申请网点的欺诈和流失率上升
  currentAlternative: 带平板的外勤代理、分支员工、通用贷款获客软件，以及靠 WhatsApp 或电话中心跟进单证
  switchingReason: 这套操作系统让放贷机构不用招分支级员工，就能开出更多辅助网点，同时给总部风控团队提供标准化话术、远程质检和更快的放款时效。
  pricingHypothesis: 年度 SaaS 订阅加按活跃商户网点或完成辅助申请计费的使用费，另设反欺诈监控和远程质检的高级模块
