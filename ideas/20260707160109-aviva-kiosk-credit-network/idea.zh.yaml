topRisks:
- name: 商户网点欺诈
  description: 第三方亭机接待方可能教唆申请人造假、处理单证不当，或制造虚假申请量，污染核保结果。
  mitigation: 一开始就上线远程质检回放、网点评分、可配置的审批阈值，以及针对风险网点的一键暂停流程。
- name: 放贷机构软件预算紧张
  description: 除非明显优于分支或外勤经济账，否则小额放贷机构可能把辅助获客工具当成成本中心。
  mitigation: 在州上线的窗口期出手销售，按活跃网点或完成申请计费，让 ROI 直接绑定更快的上线速度和更低的流失率。
- name: 工作流碎片化
  description: 各放贷机构的获客技术栈、风控规则和合规流程可能差异很大，让部署看起来像重服务项目。
  mitigation: 先以只读工作流叠加层、窄范围集成上线，等一套可复制的打法验证之后，再扩展自动化程度。
