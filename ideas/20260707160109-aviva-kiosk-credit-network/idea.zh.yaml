problem: 墨西哥非银行放贷机构能看到大城市之外的贷款需求，但要靠开分支或配备外勤团队来发放 $100-$1,000 的贷款，经济账通常算不过来。未获银行服务的消费者和非正规小微企业，往往需要人帮忙填申请、核对单证、建立信任，可大多数信贷技术栈要么是给纯自助网页流程用的，要么是给配满人手的分支用的。一旦放贷机构铺开到几十个商户网点，申请质量、反欺诈管控和客户沟通话术就会各行其是。结果就是扩张速度变慢——偏偏 Aviva 的融资信号说明，亭机放贷正在成为一个可规模化的渠道。
targetUser:
  primary: 墨西哥非银行放贷机构里，负责在大城市之外部署商户端辅助贷款申请的扩张和核保运营负责人
  secondary: 在分布式合作网点里，负责商户开户、质量保证和申请转化的渠道运营经理
  buyer: Chief Operating Officer
startupThesis:
  nonObviousInsight: 在未获银行服务人群的小额信贷里，稀缺的资产不是一套稍微好一点的评分卡，而是一层标准化的辅助获客系统——它能让一个中央风控团队，放心地把几百个社区商户网点，变成值得信赖的信贷入口。Aviva 的规模信号说明消费者需求和审批速度已经被验证过了；真正的机会缺口，是那个能让其他放贷机构复制这条渠道、而不用自己重建一整套亭机技术栈的 B2B 控制层。
  beachhead: 正通过 50-500 个社区商户网点，把 $100-$1,000 的应急和周转贷款，拓展到二三线市镇的墨西哥非银行放贷机构
  wedge: 一套辅助获客操作系统，给每个商户网点配上引导式视频申请流程、单证采集、反欺诈检查、远程质检和放贷机构专属的审批路由。
  whyNowCatalyst: Aviva 的 $18 million 融资、23 个州的覆盖范围，以及 300,000 份完成申请，说明“亭机+AI 核保”已经不再是实验，让这层赋能软件现在正好卖得出去。
  ventureScalePath: 先从小额消费和微型企业贷款的辅助获客做起，再拓展到续贷、催收、商户现金预付、保险、储蓄开户，以及跑在同一个商户边缘上的多产品金融服务网络。
solution: 这款产品架在放贷机构的贷款获客系统和每一个商户端亭机、平板或视频申请点之间。它给商户员工提供一套带脚本的辅助申请流程、实时单证质量检查、欺诈标记，以及在案件偏离正常路径时即时升级给远程信贷员的功能。总部则拿到网点级的转化率、周转时长和质量看板，外加远程质检回放，能快速再培训或暂停表现不佳的商户网点。第一版部署是叠加在放贷机构现有技术栈之上的只读工作流层，这样客户不用换掉核心系统，就能开拓一个新市镇或合作网络。随着时间推移，这家创业公司会积累一套专有数据集，涵盖商户网点行为、流失模式和审批结果，用来持续改进上线打法、路由策略和风控管理。
