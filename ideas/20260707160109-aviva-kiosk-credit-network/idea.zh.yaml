jobsToBeDone:
- job: 当我们在一个新市镇上线辅助信贷网点时，帮我们的运营团队快速部署一套一致的申请工作流，这样我们不用建新分支，也能开出商户网点。
  currentAlternative: 外勤代理、分支员工，以及通用贷款获客工作流
  successMetric: 激活一个新商户网点所需的天数，以及每个活跃网点完成的申请数
- job: 当各商户网点的申请质量参差不齐时，帮我们的中央风控团队快速找出薄弱网点、修正话术，这样我们能在不承担隐性欺诈风险的前提下，保持较高的审批速度。
  currentAlternative: 人工质检电话、表格审计，以及事后的损失复盘
  successMetric: 从审批到放款的周转时长，以及按网点划分的坏申请或欺诈率
