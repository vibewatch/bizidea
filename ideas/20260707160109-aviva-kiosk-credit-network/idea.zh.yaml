differentiator: 通用贷款获客系统要么假设是纯自助数字流程，要么假设是配满人手的分支，都管不了商户话术、申请质量、远程质检，以及一个亭机网络里网点级别的风险。这家创业公司拿下的是零售边缘辅助获客的控制层——这里有价值的数据不只是借款人属性，还有商户行为、流失模式，以及逐个市镇的上线表现。这套运营数据集会随时间复利，变成更好的上线打法、反欺诈管控，以及不断增高的转换成本。
