topRisks:
  - name: "Merchant-point fraud"
    description: "Third-party kiosk hosts can coach applicants, mishandle documents, or generate synthetic volume that poisons underwriting."
    mitigation: "Start with remote QA playback, location scoring, configurable approval thresholds, and a one-click suspend workflow for risky points."
  - name: "Thin lender software budgets"
    description: "Small-ticket lenders may treat assisted-origination tooling as a cost center unless it clearly beats branch or field-agent economics."
    mitigation: "Sell into state-launch moments and price by live point or completed application so ROI is tied to faster rollout and lower abandonment."
  - name: "Workflow fragmentation"
    description: "Each lender's origination stack, risk rules, and compliance process may differ enough to make deployments look services-heavy."
    mitigation: "Launch as a read-only workflow overlay with a narrow integration set, then expand automation only after one repeatable playbook proves out."
