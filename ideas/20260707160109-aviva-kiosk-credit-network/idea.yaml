differentiator: >-
  Generic loan-origination systems assume either self-serve digital flows or staffed branches; they do not manage
  merchant scripts, application quality, remote QA, and location-level risk across a kiosk network. This startup owns
  the control plane for assisted origination at the retail edge, where the valuable data is not just borrower
  attributes but merchant behavior, drop-off patterns, and launch performance municipality by municipality. That
  operating dataset compounds into better rollout playbooks, fraud controls, and switching costs over time.
