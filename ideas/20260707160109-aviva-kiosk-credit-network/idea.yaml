problem: >-
  Mexican non-bank lenders can see loan demand outside major metros, but opening branches or staffing field-agent teams
  to originate $100-$1,000 loans often breaks the economics. Underbanked consumers and informal small businesses
  frequently need help completing an application, verifying documents, and trusting the process, yet most lending stacks
  are built for self-serve web flows or fully staffed branches. Once a lender spreads across dozens of merchant-hosted
  points, application quality, fraud controls, and customer messaging become inconsistent. The result is slow expansion
  precisely when Aviva's funding signal suggests kiosk-led lending is becoming a scalable channel.
targetUser:
  primary: >-
    Heads of expansion and underwriting operations at Mexican non-bank lenders deploying merchant-hosted assisted loan
    applications outside major metros
  secondary: >-
    Channel-operations managers responsible for merchant onboarding, quality assurance, and application conversion across
    distributed partner locations
  buyer: "Chief Operating Officer"
startupThesis:
  nonObviousInsight: >-
    In underbanked small-ticket lending, the scarce asset is not a marginally better scorecard; it is a standardized
    assisted-origination layer that lets one central risk team safely turn hundreds of neighborhood merchant points into
    trusted credit access points. Aviva's scale signal suggests consumer demand and approval speed are already proven;
    the missing opportunity is the B2B control plane that lets other lenders copy the channel without building a full
    kiosk stack themselves.
  beachhead: >-
    Mexican non-bank lenders expanding $100-$1,000 emergency and working-capital loans into tier-2 and tier-3
    municipalities through 50-500 neighborhood merchant points
  wedge: >-
    An assisted-origination operating system that gives each merchant point a guided video application flow, document
    capture, fraud checks, remote QA, and lender-specific approval routing.
  whyNowCatalyst: >-
    Aviva's $18 million raise, 23-state footprint, and 300,000 completed applications show kiosk-plus-AI underwriting
    is no longer an experiment, making the enabling software layer newly sellable right now.
  ventureScalePath: >-
    Start with assisted origination for small-ticket consumer and micro-business loans, then expand into renewals,
    collections, merchant cash advances, insurance, savings onboarding, and multi-product financial-service networks
    that run through the same merchant edge.
solution: >-
  The product sits between a lender's loan-origination system and every merchant-hosted kiosk, tablet, or video
  application point. It gives merchant staff a scripted assisted-application flow, real-time document quality checks,
  fraud flags, and instant escalation to remote loan officers when a case falls off the happy path. Headquarters gets
  location-level conversion, turnaround, and quality dashboards plus remote QA playback to retrain or suspend weak
  merchant points quickly. The first deployment is a read-only workflow layer on top of the lender's existing stack, so
  customers can launch a new municipality or partner network without replacing their core system. Over time, the startup
  builds a proprietary dataset on merchant-point behavior, drop-off patterns, and approval outcomes that improves
  rollout, routing, and risk controls.
goToMarketSeed:
  firstCustomer: >-
    A growth-stage Mexican non-bank lender launching 50-200 merchant-hosted assisted-application points across two or
    more new states while central risk still audits applications manually
  buyingTrigger: >-
    A new state launch, a retail-partner rollout, or rising fraud and abandonment at assisted application points
  currentAlternative: >-
    Field agents with tablets, branch staff, generic loan-origination software, and WhatsApp or call-center document
    follow-up
  switchingReason: >-
    The OS lets lenders open far more assisted points without hiring branch-level staff, while giving central risk teams
    standardized scripts, remote QA, and faster time to cash.
  pricingHypothesis: >-
    Annual SaaS subscription plus usage fees per live merchant point or completed assisted application, with premium
    modules for fraud monitoring and remote QA
