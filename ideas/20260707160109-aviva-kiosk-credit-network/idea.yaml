      When we launch assisted-credit points in a new municipality, help our operations team deploy a consistent
      application workflow fast, so we can open merchant locations without building new branches.
    currentAlternative: "Field agents, branch staff, and generic loan-origination workflows"
    successMetric: "Days to activate a new merchant point and completed applications per live point"
