competitors:
- name: Aviva
  stage: scale-up
  wedge: 面向墨西哥中小城市未被充分服务的消费者和微型企业，做 AI 辅助的亭机放贷。
  pricing: 放贷额度 $100 至 $1,000；IDB Lab 引用的平均实际利率约 27%，不收取发放手续费。
  strength: 有力证明了亭机加 AI 的工作流能跨州扩张，也能覆盖低信任度借款人群体。
  weaknessVsUs: 是垂直整合的放贷机构，不是给其他放贷机构用的中立软件厂商；它的技术栈只为 Aviva 自己的贷款账本做了优化。
  sourceRefs:
  - 50
  - 95
- name: Kueski
  stage: scale-up
  wedge: App 优先的即时消费信贷与先买后付。
  pricing: 消费贷款额度最高约 2.6 万比索；官网重点宣传首笔贷款的优惠价格。
  strength: 线上审批快，消费者品牌力强，且随时可数字化接入。
  weaknessVsUs: 默认借款人能自助在 App 里完成申请，没有为需要人工引导或单证协助的借款人提供商户辅助获客。
  sourceRefs:
  - 20
  - 21
- name: Konfío
  stage: scale-up
  wedge: 在与企业的直接关系里，提供中小企业信贷、企业卡和支付服务。
  pricing: 信贷额度最高 500 万比索；截至 2026 年 4 月公开的平均综合成本年利率（CAT）为 41.36%。
  strength: 在中小企业市场品牌积淀深厚，披露了 SOFOM 身份，金融产品组合也更丰富。
  weaknessVsUs: 整套体系是为承保和服务自己的客户而建，不是为多家放贷机构编排第三方商户网点而设计。
  sourceRefs:
  - 14
  - 17
  - 53
- name: Banco Azteca / Grupo Elektra
  stage: incumbent
  wedge: 依托自有零售和银行网络，做店铺关联的辅助消费金融。
  pricing: 贷款定价按产品各异；官网的贷款页面本质是销售入口，不是中立的平台报价。
  strength: 分销网络庞大，消费者品牌信任度高，在线下辅助信贷方面经验深厚。
  weaknessVsUs: 严重依赖分支和门店，且被锁死在自家生态里；不是其他放贷机构能买来用的、不挑商户的操作系统。
  sourceRefs:
  - 39
  - 40
- name: TurnKey Lender
  stage: incumbent
  wedge: 通用的自动化贷款获客与决策平台。
  pricing: 企业定制定价，未公开。
  strength: 申请流程高度可配置，内置 KYC/AML 和反欺诈工具，信贷自动化覆盖面广。
  weaknessVsUs: 不是为外勤或商户网点治理、远程质检回放，或墨西哥本地化上线数据分析专门打造的。
  sourceRefs:
  - 116
regulatoryTechnicalConstraints:
- point: 第三方辅助获客仍然需要放贷机构级别的合规、投诉处理和清晰的责任主体披露——Aviva 和 Konfío 自己都披露了 SOFOM 身份和客服架构。
  sourceRefs:
  - 58
  - 14
  - 75
- point: 远程身份核验和单证采集必须满足 KYC 和 AML 要求；主流厂商都把这当作内置合规能力来卖，而不是可选的体验功能。
  sourceRefs:
  - 97
  - 101
  - 106
  - 114
  - 116
- point: 现金依赖度高的商户环境和农村数字鸿沟，意味着工作流必须能兼容线上线下混合的证据采集方式。
  sourceRefs:
  - 82
  - 90
  - 118
validationSignals:
- point: Aviva 称已有超过 30 万人在墨西哥 23 个州的亭机上完成了贷款申请。
  sourceRefs:
  - 95
- point: IDB Lab 在提供风险债务支持后预计，Aviva 年底前亭机数量至少能达到 150 台。
  sourceRefs:
  - 50
  - 51
- point: Yastás 把自己定位为覆盖全国的社区商店网络，提供支付、存取款等 2000 多项服务，说明消费者早已接受在商户端办理金融业务。
  sourceRefs:
  - 46
- point: FEMSA 明确把 OXXO 的全渠道触达能力，和一个专门的信贷业务加上 QED 的金融科技专长绑在了一起。
  sourceRefs:
  - 43
  - 66
openQuestions:
- 有多少家活跃的墨西哥非银行放贷机构已经运营着 50 个以上的辅助网点？其中依赖商户自有场地和依赖外勤团队的各占多少？
- 按市镇划分，商户辅助信贷网点典型的欺诈损失率、被教唆申请率和流失率分别是多少？
- FEMSA、Elektra 这类大型零售生态，会向第三方放贷机构开放网点，还是更倾向自营经济模式？
- 当商户员工提供协助、而放贷机构在远程完成审批时，责任划分适用哪些 CNBV 或 CONDUSEF 规则？
- 共创客户的投资回报中，有多少来自更快上线，又有多少来自坏申请减少或贷后服务成本降低？
