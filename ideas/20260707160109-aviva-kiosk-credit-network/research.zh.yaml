  searchedQueries:
  - Find recent authoritative sources on financial inclusion, underbanked consumers, and use of bank correspondents or retail access points in Mexico relevant to small-ticket lending.
  - Find authoritative sources on Mexican non-bank lenders (SOFOMs), small-ticket consumer or microbusiness lending, and regulation affecting assisted origination, KYC, and AML in Mexico.
  - Find sources on Aviva Mexico kiosk lending, merchant-assisted credit distribution, and comparable companies or substitutes serving underbanked borrowers in Mexico.
  - Find authoritative sources and direct URLs for Mexico financial inclusion data from 2023-2026, including ENIF, Global Findex, IMF Financial Access Survey, CNBV inclusion reports, and INEGI informal economy or SME statistics relevant to underbanked lending.
  - Find official or primary sources and direct URLs on Mexican bank correspondents, retail financial access points, and merchant networks such as corresponsales bancarios, OXXO, Yastás, and Spin by OXXO relevant to branchless finance distribution.
  - Find official or primary sources and direct URLs on Mexico SOFOM regulation, AML/KYC obligations, remote onboarding, CONDUSEF consumer rules, and any CNBV or government guidance relevant to non-bank lenders using assisted origination.
  - Find direct source URLs for major Mexico consumer or SMB lenders relevant as competitors or substitutes for assisted kiosk origination, including Aviva, Kueski, Konfío, Creditea, Banco Azteca/Elektra, and Covalto.
  - Find recent reputable reporting and primary sources on Aviva funding, IDB Lab support, credit facilities, geographic footprint, and operating model in Mexico, with direct source URLs.
  - Find direct source URLs for eKYC, document capture, video onboarding, and fraud-control technologies or technical docs commonly used in Mexican fintech or lending workflows, including vendors active in Latin America and Mexico-specific guidance.
  - Find authoritative sources and direct URLs on the size of Mexico's informal economy, unbanked or underbanked adult population, and microbusiness credit gap relevant to small-ticket lending.
  - Find official or primary sources and direct URLs on merchant or retailer financial-service networks in Mexico beyond OXXO, including Yastás, Banco Azteca/Elektra, Coppel, and others.
  - Find primary or high-quality sources and direct URLs on lending software, loan-origination systems, or embedded-lending platforms with assisted or omnichannel onboarding relevant to Latin America or Mexico.
  - Find authoritative sources with direct URLs giving growth rates or year-over-year adoption changes for Mexico fintech lending, digital payments, mobile banking adoption, or financial inclusion relevant to assisted lending from 2024-2026.
  - Find direct official sources for CNBV or Mexican-government data on the number of banking correspondents, municipalities covered, retail financial access points, and historical growth over time.
