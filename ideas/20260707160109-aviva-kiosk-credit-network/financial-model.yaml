"slug": "merchant-kiosk-origination-os"
"date": "2026-07-07"
"currency": "USD"
"modelStartMonth": "2026-07"
"assumptions":
- "id": "A1"
  "name": "Model start month"
  "value": "2026-07"
  "unit": "month"
  "source": "[BP date 2026-07-07]; the raise, pilots, and hiring plan all begin immediately, so the model starts in July 2026."
- "id": "A2"
  "name": "Opening cash from pre-seed raise"
  "value": "2000"
  "unit": "USD K"
  "source": "[BP fundingAsk.targetFundingRangeUsd $2-4M]; the model uses the low end because the beachhead is finite and the plan explicitly favors a lean, Mexico-first hiring ramp."
- "id": "A3"
  "name": "Customer unit definition"
  "value": "active paying lender logo"
  "unit": "unit"
  "source": "[BP market.som 8 reachable production logos by year three]; customer counts are modeled as paying lender logos rather than merchant points so the revenue bridge matches the BP SOM framing."
- "id": "A4"
  "name": "Paid pilot contract value"
  "value": "30"
  "unit": "USD K per 90-day pilot"
  "source": "[BP investorMemo.firstCustomer.initialContract paid 90-day pilot worth roughly US$20k-$40k]; the model uses the midpoint."
- "id": "A5"
  "name": "Steady-state production contract value"
  "value": "150"
  "unit": "USD K per logo-year"
  "source": "[BP investorMemo.firstCustomer annual conversion about US$120k-$180k]; [BP market.som 8 logos x modeled $150k ACV = $1.2M]."
- "id": "A6"
  "name": "Usage and premium-control uplift on mature logos"
  "value": "Production MRR rises from $12.5K to $14.0K by Q4Y3"
  "unit": "USD K per month"
  "source": "[BP businessModel.revenueStreams annual subscription + usage fees + premium fraud and QA modules]; the model assumes modest upsell only after production proof exists."
- "id": "A7"
  "name": "Base logo start schedule"
  "value": "M4, M6, M10, M16, M22, M28, M32, M35"
  "unit": "new paying-logo start months"
  "source": "[BP milestones 2-3 pilots in year 1, 5 logos by 24 months, 8 logos by 36 months]; [BP experimentRoadmap founder-led validation before broad GTM]."
- "id": "A8"
  "name": "Pilot duration before production pricing"
  "value": "3"
  "unit": "months"
  "source": "[BP gtm.wedge paid 90-day rollout-control pilot]; each new logo stays on pilot pricing for three months before production value begins."
- "id": "A9"
  "name": "Gross margin ramp"
  "value": "Y1 45-62%; Y2 64-69%; Y3 69-72%"
  "unit": "percent"
  "source": "[BP businessModel.targetGrossMarginPct 70]; startup-finance heuristic that pilots and second-stack launches are more services-heavy before templates are fully reusable."
- "id": "A10"
  "name": "Monthly logo churn for unit economics"
  "value": "2.0"
  "unit": "percent"
  "source": "Startup-finance heuristic for high-ACV enterprise workflow software sold on annual contracts; the operating ramp is modeled net of churn by keeping the customer schedule conservative."
- "id": "A11"
  "name": "Founder loaded annual cash compensation"
  "value": "80"
  "unit": "USD K per year"
  "source": "[BP team Founder CEO start Month 0]; startup-finance heuristic for a below-market founder salary in a Mexico-focused pre-seed company."
- "id": "A12"
  "name": "Engineering and product loaded compensation"
  "value": "100"
  "unit": "USD K per FTE-year"
  "source": "[BP team Founding eng plus later second integration capacity]; startup-finance heuristic for senior Mexico or LatAm fintech engineering talent."
- "id": "A13"
  "name": "Solutions engineering loaded compensation"
  "value": "80"
  "unit": "USD K per FTE-year"
  "source": "[BP team Solutions engineer start Month 3]; startup-finance heuristic for implementation talent that blends integration and workflow mapping."
- "id": "A14"
  "name": "Risk and compliance product loaded compensation"
  "value": "85"
  "unit": "USD K per FTE-year"
  "source": "[BP team Risk/compliance product lead start Month 4]; startup-finance heuristic for a regulated-workflow product operator."
- "id": "A15"
  "name": "Customer success and merchant ops loaded compensation"
  "value": "60"
  "unit": "USD K per FTE-year"
  "source": "[BP team Customer success / merchant ops lead start Month 8]; startup-finance heuristic for Mexico field-ops and onboarding leadership."
- "id": "A16"
  "name": "Partnerships and GTM loaded compensation"
  "value": "90"
  "unit": "USD K per FTE-year"
  "source": "[BP team Partnerships / GTM lead start Month 12]; startup-finance heuristic for a lean channel-development hire with modest variable pay."
- "id": "A17"
  "name": "Sales and channel AE loaded compensation"
  "value": "100"
  "unit": "USD K per FTE-year"
  "source": "[BP sequencingRationale broad sales team comes after 2 production logos]; startup-finance heuristic for one enterprise seller added only after early proof."
- "id": "A18"
  "name": "Hiring schedule"
  "value": "M3 Solutions Engineering; M4 Risk/Compliance; M8 Merchant Ops; M12 Partnerships; M16 Engineering 2; M19 Sales/Channel AE; hold at 8 FTE through Y3"
  "unit": "hires"
  "source": "[BP team.startTiming]; [BP strategicChoices.sequencingRationale hire implementation and compliance before a broad sales team]."
- "id": "A19"
  "name": "Non-salary operating spend"
  "value": "Y1 monthly $14K-$20K; Y2 monthly $22K-$30K; Y3 monthly $31K-$34K"
  "unit": "USD K"
  "source": "[BP operations require travel, training, cloud, auditability, legal, and partner enablement]; startup-finance heuristic for a compliance-heavy, cross-state rollout workflow in Mexico."
- "id": "A20"
  "name": "Opex mix by function"
  "value": "S&M ~25% to 35%; R&D ~50% to 40%; G&A ~25% throughout"
  "unit": "percent of opex"
  "source": "[BP strategicChoices.sequencingRationale implementation and productization come before scaled GTM]; the mix shifts gradually toward S&M only after Y2 proof."
- "id": "A21"
  "name": "Cash-movement simplification"
  "value": "EBITDA approximates net cash movement"
  "unit": "modeling convention"
  "source": "Startup-finance heuristic for an early software company with minimal capex, no debt service, and no modeled working-capital swings."
- "id": "A22"
  "name": "Blended CAC"
  "value": "86.8"
  "unit": "USD K per landed paying logo"
  "source": "[A20]; model-derived from Y1-Y2 sales and marketing spend of about $434K over 5 paying-logo starts by Month 24."
- "id": "A23"
  "name": "Mature annual ARPU for unit economics"
  "value": "160"
  "unit": "USD K per logo-year"
  "source": "[A5-A6]; the unit-economics view uses mature production logos with modest usage and premium-control uplift rather than pilot pricing."
- "id": "A24"
  "name": "Next-round milestone plus buffer"
  "value": "5 production logos, one partner-assisted second-stack deployment, and <45-day median implementations by Month 24, plus 6 months of cash buffer"
  "unit": "milestone"
  "source": "[BP milestones 12-24 months]; [BP fundingAsk.runwayMonths 18]; the model extends to 24 months so the company is not forced to raise immediately after the first proof package."
- "id": "A25"
  "name": "Delivery leverage"
  "value": "One solutions engineer plus one merchant-ops lead can support 8 logos on two repeatable launch stacks"
  "unit": "capacity assumption"
  "source": "[BP strategicChoices.sequencingRationale one repeatable launch stack first]; this is the key efficiency assumption behind holding headcount at 8 FTE through Y3."
- "id": "A26"
  "name": "Base sales cadence"
  "value": "First paid pilot in M4 and roughly one new paying logo every 6 months until partner motion proves out"
  "unit": "sales-cycle cadence"
  "source": "[BP gtm.funnelTargets discovery to pilot 20-25% and pilot to production 50%+]; [BP experimentRoadmap 20 buyer interviews, 6 qualified accounts, and early paid pilots before scale]."
