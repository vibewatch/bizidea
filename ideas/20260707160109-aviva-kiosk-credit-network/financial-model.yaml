"scenarios":
  "downside":
    "description": "Partner referrals and pilot conversions land later, so the company exits Y3 with 7 logos, lower logo value, and more services-heavy gross margin."
    "y3RevenueK": 863.0
    "y3EbitdaK": -520.5
    "cashLowPointK": 377.2
    "keyAssumptionChanges":
    - "New paying-logo starts shift to M5, M8, M12, M19, M25, M31, and M35, so Y3 exits at 7 logos instead of 8."
    - "Production value stays closer to $144K-$162K annualized instead of the base path toward a $168K Q4Y3 run-rate."
    - "Gross margin runs roughly 3 points below base because deployment templates remain semi-custom for the second stack."
  "base":
    "description": "Three paying logos land in Y1, five are live by Y2 exit, and the company reaches 8 logos plus a roughly $1.3M ARR exit rate by Q4Y3 without hiring beyond 8 FTE."
    "y3RevenueK": 1000.5
    "y3EbitdaK": -377.8
    "cashLowPointK": 660.2
    "keyAssumptionChanges":
    - "The logo ramp follows the modeled start schedule and exits Y1, Y2, and Y3 at 3, 5, and 8 paying logos respectively."
    - "Production value rises from the $150K ACV midpoint toward a $168K Q4Y3 run-rate through usage fees and premium QA or fraud modules."
    - "Gross margin reaches the 70% business-model target by Y3 while the company holds full-time headcount at 8 FTE."
  "upside":
    "description": "Warm partner intros compress the sales cycle by roughly one quarter, letting the company hit the same 8-logo endpoint sooner and monetize premium controls earlier."
    "y3RevenueK": 1143.5
    "y3EbitdaK": -265.6
    "cashLowPointK": 826.9
    "keyAssumptionChanges":
    - "New paying logos arrive earlier at M4, M6, M9, M14, M20, M25, M29, and M33 while headcount still holds at 8 FTE."
    - "Mature logo value moves toward roughly $162K-$174K annualized as premium controls and point-expansion usage arrive sooner."
    - "Gross margin clears 70% one quarter earlier because the second stack reuses the same implementation playbook."
