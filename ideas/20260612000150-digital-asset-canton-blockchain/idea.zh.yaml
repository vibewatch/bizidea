topRisks:
- name: 试点转正式生产延迟
  description: 机构可能会把代币化抵押品长期停在试点阶段，导致短期软件预算缩水。
  mitigation: 先切入 2026 年已经在跑的真实试点，围绕运营就绪度定价，并以前置覆盖层切入，在正式生产大规模到来前先把手工人力压下来。
- name: 现有厂商打包
  description: Digital Asset、托管机构或传统抵押品厂商可能加上基础适格性校验，压缩独立创业公司的空间。
  mitigation: 把优势放在跨系统规则编排、中立审计日志，以及任何单一 rail 或现有系统都天然不掌握的对手方级工作流覆盖。
- name: 规则建模复杂度
  description: 双边协议、资产限制和发行人授权逻辑差异太大，可能让实施变慢，并越来越像服务项目。
  mitigation: 先在 Canton 上只做一种资产类型和一条流程，用共创客户沉淀可复用规则模板；在模型还没被证明前，始终保留人工审批。
