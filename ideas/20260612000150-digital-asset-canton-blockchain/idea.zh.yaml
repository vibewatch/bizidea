problem: 券商和托管银行在用代币化货币市场基金或债券跑 repo、保证金流程试点时，最难的一步仍在线下：资产转出去前，得先证明这笔资产合格、授权到位，而且会在各方账簿里正确落账。这个动作横跨法务协议、抵押品附表、三方消息、托管系统和表格审批，所以试点推进慢、运营上也很脆。像 Canton 这样的许可链一旦跑出真实机构体量，卡点就不再是能不能上链，而是能不能用工作流级别的控制，把“谁能质押什么、质押给谁、按什么规则质押”管清楚。
targetUser:
  primary: 在 Canton 上试跑代币化债券或货币市场基金抵押品的券商和托管银行里，负责抵押品与证券融资运营的负责人
  secondary: 正在搭建代币化 repo、保证金或抵押品流转项目的产品与法务团队
  buyer: 抵押品管理全球负责人、市场运营 COO，或证券融资技术负责人
startupThesis:
  nonObviousInsight: 受监管机构一旦采用许可链，最稀缺的层就不再是连到链上的能力。真正卡住的是：要在结算发生前，把双边适格性规则、发行人授权和账簿义务翻成一套各方都信得过、还能机器执行的工作流。
  beachhead: 2026 年在 Canton 上用少量已批准对手方，试跑代币化货币市场基金或债券抵押品的前 25 大券商、清算银行和全球托管机构里的 repo 与双边保证金运营团队
  wedge: 一套授权与抵押品适格性引擎：在代币化抵押品转移获批前，先检查资产、对手方、协议、折扣率、集中度和发行人许可规则，再把可审计的决策日志回写给运营与合规团队。
  whyNowCatalyst: Canton 现在同时具备 $6T 的代币化发行、700+ 生态参与者，以及被点名的抵押品与 repo 用例，说明“表格时代”的适格性与授权流程，已经成了正式生产上线的当下瓶颈。
  ventureScalePath: 先拿下 Canton 上代币化抵押品的结算前控制，再延伸到生命周期事件、替换、保证金追缴、异常处理、监管报送，最后做成 repo、基金、债券和衍生品代币化资本市场流程的操作系统。
solution: 做一层控制层，夹在代币化资产网络、抵押品管理系统、托管记录和法务规则手册之间。每当有人发起一笔质押或转移，产品先判断：这项资产是否符合双边协议、是否受发行人授权或转让限制约束、折扣率和集中度规则是否满足、结算后双方账簿能否保持同步。若这笔转移有效，平台就路由审批、生成决策记录，并把证据材料打包给运营、风控和合规团队；若无效，则直接拉起异常流程，把冲突的具体政策规则指出来，而不是让员工再去邮件和表格里手工对账。起步产品足够窄，能直接嵌进真实试点；时间拉长后，它会变成代币化抵押品项目的工作流主干。
goToMarketSeed:
  firstCustomer: 首个客户应是一家美国或英国的券商、清算银行或全球托管机构：2026 年已在 Canton 上开展代币化货币市场基金抵押品的 repo 或双边保证金试点，创新团队精干，而且法务、运营和资金之间仍有手工审批环节。
  buyingTrigger: 客户从设计研讨转进真实对手方试点，需要一套可重复的办法，在不额外扩充法务和运营人手的情况下，批准代币化抵押品转移。
  currentAlternative: 人工流程：在抵押品系统、法务附表、托管导出文件、表格核对和邮件审批之间来回流转。
  switchingReason: 区块链底座能把资产搬过去，但它并不会告诉运营团队：在仍由他们负责的协议约束、集中度上限、发行人授权规则和账簿限制下，这笔具体转移到底能不能放行。
  pricingHypothesis: 按已上线的代币化抵押品项目数和接入的法实体数量收取年度企业订阅费；规则映射和托管系统集成另收实施费。
