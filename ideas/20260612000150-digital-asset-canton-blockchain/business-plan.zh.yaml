slug: tokenized-collateral-consent-engine
date: '2026-06-12'
executiveSummary: 代币化抵押品授权引擎的起步形态，不该是新结算底座、托管平台或大而全的抵押品套件，而应是一层控制覆盖层，先服务 Canton 上的代币化货币市场基金和美国国债抵押品试点。首个客户应是头部券商、清算银行或全球托管机构：它正从设计研讨转向真实的 repo 或双边保证金试点，但每笔转移仍要靠邮件、表格和法务审核放行。眼下要卖的，是一套只读决策引擎，在代币化转移放行前先检查资产适格性、对手方条款、折扣率、集中度、发行人授权以及账簿与记录限制。GTM 应该先把“带实施支持的付费试点”卖进一条真实流程、两个到三个已批准对手方，因为这条路最快能拿到可量化的验证和审计可信度。刻意取舍在于：先拿下结算前审批和证据打包，再向替换、保证金追缴、生命周期服务或多底座编排扩张。长期最强的护城河，是一套跨对手方的规则映射库和异常历史，位置压在任何单一 rail、托管人或抵押品平台之上。最大的反证风险是：在现有厂商把基础控制能力打包进去之前，试点体量和紧迫性都还不足以撑起独立预算。现有输入已经证明了流程痛点、市场切口和买方逻辑，但还没证明今天手工审批到底占多大比例、又有多少项目已经跨进受控生产环境，所以这些信号必须在前 90 天验证清楚。
problem:
- 早期代币化抵押品试点虽然能在 Canton 上搬资产，但运营团队仍得在法务附表、托管导出、抵押品规则和邮件线程之间，逐笔批准每一次转移。
- 一旦批错，高金额融资流程就可能出现结算延迟、账簿与记录不一致，或触发发行人、折扣率、集中度约束的违约。
- 现有底座和抵押品平台擅长的是发行、转移或通用流程自动化，不擅长做中立裁决——判断“这笔具体的代币化转移此刻到底能不能放行”。
solution:
- 把拟进行的代币化抵押品转移、适用的双边协议、发行人限制、托管状态和抵押品附表拉进同一条审批流程。
- 在放行前检查资产、对手方、折扣率、集中度、授权和账簿规则，然后给出一条可审计的 yes/no 决策，并明确写出政策依据。
- V1 保留人工审批兜底和异常队列，让真实试点先把手工对账压下去，而不是一上来就要求风控或法务完全信任自动化。
whyWeWin:
- 公司卡在结算前决策点上——这个位置横跨对手方和系统记录，不是底层 rail 或传统抵押品栈天然能占住的。
- 早期部署会沉淀可复用的规则模板和异常模式，单一托管机构、发行人或链提供商很难在全市场横向复制。
- 一层中立、先审计后自动化的覆盖层，比“让代币化资产自动流转”这种讲法更贴合今天机构的信任条件和监管现实。
strategicChoices:
  beachhead: 美国的券商、清算银行和全球托管机构：它们在 Canton 上以少量已批准对手方，运行受控的代币化货币市场基金或美国国债抵押品 repo / 双边保证金试点。
  wedgeRationale: repo 和双边保证金审批，是在大规模正式生产尚未成形前，最能同时暴露代币化抵押品价值、法务约束和运营痛点的窄流程，因此比一上来卖完整的代币化抵押品操作栈，更快拿到证明。
  sequencingRationale: 先围绕一种资产类型、一条流程，做只读审批与证据层，因为买方第一需求是更快的放行速度和更强的审计安心感；只有当公司证明自己能在真实试点里缩短审批时间、扛住控制审查，才值得往更深集成、可复用模板和相邻生命周期流程扩。
  notYet:
  - 在 Canton 这条切口还没跑出可复制试点前，不做 Canton 之外的跨 rail 编排。
  - 不做完整的抵押品优化、库存路由或资金流动性管理。
  - 不碰代币化衍生品、三方抵押品或面向零售的数字资产业务。
market:
  tam: 估算 TAM 为 $90.0M：全球约 120 家交易商、托管机构、FMI 和抵押品运营机构，每家年 ACV 约 $750k。
  sam: 估算 SAM 为 $16.0M：美国、英国、欧盟约 32 家机构，已显现 Canton、代币化 MMF 或代币化美国国债动能，每家年 ACV 约 $500k。
  som: 估算第 3 年 SOM 为 $2.7M：6 个正式生产 logo，在完成初始规则映射和集成后，每个付费约 $450k。
  segments:
  - 主要细分：在 Canton 上试跑代币化 MMF 或美国国债抵押品的前 25 大券商、清算银行和全球托管机构
  - 次级细分：需要把审批层以嵌入式或伙伴方式接进代币化抵押品项目的后台交易基础设施和证券融资平台
  buyingProcess: 运营 champion 很可能是抵押品管理负责人、证券融资运营负责人或代币化抵押品项目负责人；真正拍预算的通常是市场运营 COO、抵押品管理全球负责人，或证券融资技术负责人。第一单应该围绕一条真实流程做付费试点，采购重点会落在控制证据、数据接入，以及产品能否在不拿走受监管员工最终决定权的前提下，把审批时间和异常处理压下来。
product:
  mvp: MVP 应该是在 Canton 上只做一条代币化抵押品流程的只读授权与适格性引擎。它要吃进拟转移动作、双边规则输入、托管记录和发行人限制；输出带决策日志的批准或异常结果；支持人工 override；但不该在 V1 就自动化结算、替代抵押品 system of record，或承诺覆盖宽泛的多资产场景。
  sixMonth: 6 个月内交付首个可进生产环境的试点包：包含代币化 MMF 和美国国债抵押品的规则模板、决策日志、异常流程、人工 override，以及托管文件加一个抵押品或运营系统的集成。
  twelveMonth: 12 个月内补齐可复用协议模板、集中度和折扣率政策库、基于角色的权限控制、审计与合规报表，以及把试点部署时间压到 60 天以下的集成能力。
  twentyFourMonth: 24 个月内扩到替换、保证金追缴和生命周期事件流程，覆盖更多关联法实体，并通过托管机构、后台交易厂商和更多机构底座做伙伴嵌入式分发。
  keyBets:
  - 只读审批覆盖层比替换 system of record 更容易先落地。
  - 围绕“一种资产 + 一条流程”的产品包，能沉淀可复用规则模板，而不是每次都退化成定制服务。
  - 在代币化抵押品规模尚未完全放大前，买方就会为审计证据和异常减少买单。
  - 拿下 Canton 这条切口后，未来向相邻的代币化资本市场流程扩张会更有说服力。
gtm:
  wedge: 先卖一条真实的 repo 或双边保证金代币化抵押品流程的付费试点，用两个到三个对手方证明审批更快、审计证据更干净，再在客户扩项目时转成年度平台合同。
  channels:
  - 由创始人主导，直接卖给滩头客户里的抵押品管理、市场运营和证券融资技术负责人。
  - 和 Canton 生态参与者、托管机构及后台交易厂商做联合销售和转介绍，帮它们把试点推到正式生产。
  - 借助已在帮助机构搭建代币化抵押品项目的法务、监管和实施顾问获客。
  funnelTargets: 目标账户→合格试点 20-30%；合格试点→付费试点 35-45%；付费试点→正式生产 50%+；首单在 $75k-$150k 试点和 onboarding 包之后，落到 $300k-$500k ACV。
  pricing: 年度企业订阅费按已上线的代币化抵押品项目、接入的法实体和覆盖流程范围定价；规则映射与集成另收一次性 onboarding 费用。这样定价贴合买方价值，因为预算理由是运营就绪度、控制证据和更低的异常人力，而不是按席位计费。
businessModel:
  revenueStreams:
  - 审批、证据与异常管理平台的年度订阅费
  - 每个新项目或新法实体 rollout 的 onboarding 与规则映射费
  - 更多资产类别、报表模块和生命周期流程带来的扩展收入
  unitOfValue: 受审批控制覆盖的单个代币化抵押品项目，再按接入法实体数和覆盖流程数做调整。
  targetGrossMarginPct: 70
  expansionLevers:
  - 首个账户的试点被信任后，继续加更多对手方、法实体和业务单元。
  - 从初始审批扩到替换、保证金追缴处理和监管报送。
  - 模板可复制后，经由托管机构、后台交易厂商和 Canton 生态伙伴把规则层嵌进去。
strategyMap:
  northStarMetric: 每月经平台批准、且附带完整审计证据、无需平台外异常处理的代币化抵押品转移动作数。
  inputMetrics:
  - 与真实代币化抵押品流程绑定的付费试点数量
  - 从 kickoff 到首个规则覆盖审批结果的中位天数
  - 无需升级到邮件或表格即可解决的拟议转移动作占比
  - 试点转正式生产的转化率
  - 每个已上线项目的年度合同额
  - 为一笔批准或拒绝的转移生成可审计决策包所需时间
  moatsToBuild:
  - 按对手方沉淀的机器可读适格性、授权、折扣率和集中度规则库
  - 记录审批失败位置及运营团队如何处理的异常历史数据集
  - 面向受监管买方、能把托管状态、抵押品系统和共享账本事件对齐起来的集成与工作流层
  killCriteria:
  - 和目标机构聊完 25 次合格对话后，付费试点仍少于 3 个。
  - 由于规则映射或数据接入过于定制，试点部署中位时长仍超过 90 天。
  - 前 6 个付费试点的试点转正式生产比例低于 50%。
  - 没有任何早期客户能在 90 天内把审批周转时间或异常重建工作量压低至少 30%。
  mermaid: "flowchart LR\n  Wedge[代币化抵押品审批切口] --> MVP[只读授权引擎 MVP]\n  MVP --> Proof[更快审批与审计证明]\n  Proof --> Expansion[生命周期与多法实体扩张]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流逻辑和机构时机都强，但在团队证明真实付费试点、可接受的部署时长，以及能顶住现有厂商打包之前，判断仍应保持中等置信度。
    whyBelieve: 这家公司瞄准的是代币化抵押品真实试点催生出的明确控制缺口；周边现有厂商更擅长底座、流转或广义流程自动化，而不是中立的结算前授权。
    whyDoubt: 滩头市场高度集中，而且仍以试点为主；需求可能推迟，甚至在独立厂商拿到可复制的六位数正式生产合同前，就被打包成功能。
    nextDiligence: 确认至少有 3 家 Canton 周边机构愿意为绑定真实流程的试点付费，并且至少有 1 家能在审批效率有明确改善后，转成 $300k+ 的年度合同。
  firstCustomer:
    title: Canton 代币化抵押品运营负责人
    profile: 一家大型券商、清算银行或托管机构，正在以少量已批准对手方，运行代币化 MMF 或美国国债抵押品的受控 repo / 双边保证金试点。
    trigger: 这家 desk 正从研讨设计转入真实对手方融资阶段，而法务加运营的手工审批开始卡住每一次代币化转移。
    buyer: 抵押品管理全球负责人或市场运营 COO
    initialContract: $75k-$150k 的付费试点，周期 12-16 周，覆盖一条流程和两到三个对手方；当项目进入受控生产后，再转成 $300k-$500k 年度 ACV 加 onboarding 费用。
  mustBeTrue:
  - 至少要有若干目标机构把手工代币化抵押品审批视为有预算的运营问题，而不是短期试点噪音。
  - 只读覆盖层必须能在 60 天内跑出首批审批结果，且不能让定制集成吃掉每次部署。
  - 买方得愿意接受一个中立的授权引擎，而不是等 Digital Asset、托管机构或抵押品厂商把控制能力顺手打包。
  - 至少有一条试点流程能顺势扩到更多对手方、法实体或生命周期步骤，把 ACV 从首单规模抬上去。
  - 早期客户必须拿出风险、运营和合规都认可的量化改善，比如审批周转变快，或审计证据生成明显提速。
  diligenceQuestions:
  - 现在有多少个 Canton 周边的代币化抵押品项目，手工审批痛到足以立刻买一个付费试点？
  - 目标账户里，今天到底是哪套系统在掌握适格性的真相：法务附表、抵押品平台、托管记录，还是项目专用表格？
  - 哪种部署姿态最容易成交：SaaS 控制层、私有云，还是客户自管的数据平面？
  - 如果目标账户不买，替代方案到底是现有厂商打包、内部自建，还是继续手工跑？
  - 最能解锁正式生产预算的首个证明点是什么：审批提速、异常变少、审计证据更完整，还是法务与运营人力负担下降？
operatingAssumptions:
- assumption: 未来 12 个月里，会有足够多的 Canton 周边机构从设计研讨转向真实的代币化抵押品试点，足以撑起一个聚焦的滩头市场。
  basis: research.yaml
  validationTest: 调研 20 家目标机构，确认至少 8 家预计会在 12 个月内上线真实的 repo 或双边保证金代币化抵押品流程。
  decisionImpact: 若不成立，公司要么更早跳出 Canton，要么转向通过伙伴嵌入分发，而不是继续直销。
- assumption: 代币化 MMF 和美国国债抵押品的规则映射，足够标准化到能把试点部署中位时长压到 60 天内。
  basis: idea.yaml
  validationTest: 做完前 3 个试点，并要求从签约 kickoff 到首个规则覆盖审批结果的中位时长低于 60 天。
  decisionImpact: 若不成立，业务会变得过度服务化，必须缩招聘、抬 onboarding 费，或进一步收窄产品范围。
- assumption: 在代币化抵押品体量完全成熟前，买方也会先从抵押品运营或后台变革预算里给产品拨款。
  basis: research.yaml
  validationTest: 拿下 3 个付费试点，并确认预算拥有者来自运营、证券融资技术或后台变革团队，而非纯创新预算。
  decisionImpact: 若不成立，销售周期会拉长，公司可能要改成咨询带动交付，或等待更靠后的市场时点。
- assumption: 中立决策层比只嵌在单一 rail 或单一托管栈里的工作流，更容易更快获得信任。
  basis: operator judgment
  validationTest: 在 10 次目标账户评估里，确认至少 4 位买方明确偏好中立控制点，而不是单一厂商工作流。
  decisionImpact: 若不成立，公司应优先走 OEM 或伙伴渠道，而不是卖独立控制平面。
- assumption: 当试点证明价值后，首批正式生产合同能落在每年 $300k-$500k。
  basis: idea.yaml
  validationTest: 把 2 个付费试点转成目标区间内的年度软件合同，且不能靠大量定制服务把软件收入冲淡。
  decisionImpact: 若不成立，公司必须降 burn、放慢招聘，或找到更轻的部署模式来适配更低的 ACV。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 共创客户发现
  hypothesis: 目标机构会把代币化抵押品的结算前审批明确描述为当前的控制瓶颈，并且能点出预算 owner。
  successMetric: 完成 20 场访谈，8 个账户符合滩头画像，4 家同意进入试点范围界定。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 手工流程基线研究
  hypothesis: 在代币化 repo 或双边保证金里，至少有一条窄流程的审批延迟和异常处理痛点足以撑起 MVP。
  successMetric: 3 个共创客户分享现状流程图，且至少 1 条流程显示有 30% 以上的审批时间压缩空间。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: MVP 试点部署
  hypothesis: 只读规则引擎加人工 override，能在不直接触碰结算执行系统的情况下跑出首批审批结果。
  successMetric: 启动 3 个付费试点，其中至少 2 个能在 60 天内跑出首个规则覆盖决策。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 定价与打包测试
  hypothesis: 按项目加法实体定价，会比按席位定价更容易成交，因为买方的预算锚点是流程就绪度与控制能力。
  successMetric: 在 2 个已签付费试点里采用该方案，并在 8 次定价讨论里赢下 5 次。
  owner: 创始人/CEO
- horizon: 6–12 个月
  experiment: 正式生产转化证明
  hypothesis: 只要产品能缩短审批周转，并在真实流程里给出可审计证据，客户就会转正式生产。
  successMetric: 至少 2 个试点转成年度合同，并把审批时间压低 30% 以上，或显著加快审计材料生成。
  owner: 产品与实施负责人
- horizon: 12–18 个月
  experiment: 伙伴带单部署
  hypothesis: 托管机构、后台交易厂商或 Canton 生态伙伴带来的商机，会比纯创始人直销更容易建立信任。
  successMetric: 至少 25% 的合格 pipeline 来自伙伴，且转化率不低于直接外呼。
  owner: 创始人/CEO
operations:
- 把 onboarding 固化成规则录入、托管数据接入、审批流程映射，以及试点前后指标对比四个步骤。
- 从首个版本开始就保留人工 override 和异常处理流程，让受监管客户始终保有最终决策权。
- 每周复盘试点的审批时长、异常类型、未解决的数据缺口，以及审计证据完整度。
- 围绕代币化 MMF 和美国国债适格性规则搭一个可复用库，避免项目滑向一次性咨询。
- 给托管机构、法务顾问和后台交易厂商建立伙伴 playbook，缩短数据接入和采购周期。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 在首个试点和转正式生产打法跑顺之前，亲自负责滩头发现、企业销售、定价和伙伴关系。
- role: 创始工程师
  startTiming: Month 0
  rationale: 搭建规则引擎、决策日志、异常流程和首批集成；这些直接决定从启动到首个审批结果的速度。
- role: 产品与实施负责人
  startTiming: Month 2
  rationale: 把共创客户需求收敛成可复制的试点包，避免部署一路滑向定制服务。
- role: 资本市场规则负责人
  startTiming: Month 3
  rationale: 把 repo、双边保证金、发行人授权和账簿逻辑编码到足够可信，能经得住运营、风控和法务审查。
- role: 集成工程师
  startTiming: Month 6
  rationale: 在首批试点模式跑出来后，把托管、抵押品系统和报表集成产品化，继续压低部署时长。
- role: 企业客户经理
  startTiming: Month 10
  rationale: 只有在公司证明了付费试点包和至少一次正式生产转化后，才扩充 pipeline 产能。
milestones:
- horizon: 0–12 个月
  items:
  - 在滩头市场签下 5 个共创客户，并把至少 3 个转成付费试点。
  - 交付一套只读的授权引擎 MVP，覆盖一条代币化 repo 或双边保证金流程，带决策日志和人工 override。
  - 把至少 2 个试点转成目标 ACV 区间内的年度软件合同。
- horizon: 12–24 个月
  items:
  - 靠可复用规则模板和产品化集成，把部署中位时长压到 60 天以下。
  - 在现有账户里，从首条流程扩到替换、更多对手方和关联法实体。
  - 和托管机构、后台交易厂商或 Canton 生态实施方建立 2-3 条伙伴带单渠道。
- horizon: 24–36 个月
  items:
  - 做到 6 个正式生产 logo，并验证第 3 年 SOM 假设。
  - 上线保证金追缴、报表和异常分析等相邻生命周期模块，同时守住中立定位。
  - 证明模式可以从美国首个滩头市场复制到选定的英国或欧盟机构项目。
risks:
- risk: 试点转正式生产的节奏拖慢，可服务预算过小，撑不起直销式企业销售。
  likelihood: High
  impact: High
  mitigation: 只盯已经进入真实对手方流程的账户，围绕运营就绪度定价，并把 burn 控在少量高把握试点可承受的范围内。
- risk: 底层 rail、托管机构或抵押品平台把基础控制能力打包进去，压缩独立产品价值。
  likelihood: Medium
  impact: High
  mitigation: 在中立规则编排、跨系统证据，以及横跨对手方和 system of record 的异常历史上拉开差距。
- risk: 规则编码和数据接入始终过于定制，部署不断滑向咨询项目。
  likelihood: High
  impact: High
  mitigation: V1 只做 Canton 上的代币化 MMF 和美国国债抵押品，强推模板产品化，并保留人工兜底，而不是承诺完全自动化。
- risk: 对手方或控制职能部门不愿让独立厂商插进审批路径。
  likelihood: Medium
  impact: Medium
  mitigation: 把产品定位成决策支持和审计层，最终权限仍留给客户；同时提供灵活部署和日志控制。
- risk: 监管审查抬高实施成本，或拖慢客户签字放行。
  likelihood: Medium
  impact: Medium
  mitigation: 从第一天就把合规证据、角色控制和账簿支持做进核心产品，并通过已经在服务这些项目的顾问渠道销售。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 融资覆盖 18 个月：拿下共创客户、交付只读授权引擎 MVP、完成 3 个付费试点、把至少 2 个转成正式生产合同，并搭起让部署可复制所需的产品、规则和集成团队。
