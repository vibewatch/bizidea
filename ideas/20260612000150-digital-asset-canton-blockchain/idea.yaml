jobsToBeDone:
  - job: >-
      When a counterparty wants to pledge tokenized collateral in a live repo or margin pilot, help our operations team
      confirm eligibility, consent, and concentration rules fast, so we can settle without creating books-and-records
      risk.
    currentAlternative: Manual review of legal schedules, custody records, spreadsheets, and email approvals
    successMetric: Time from proposed collateral movement to approval and number of exceptions resolved without legal escalation
  - job: >-
      When risk, compliance, or internal audit asks why a tokenized collateral movement was allowed, help us produce a
      complete decision trail, so we can defend the workflow without reconstructing it by hand.
    currentAlternative: Ad hoc evidence gathering from ticketing systems, emails, custody exports, and chain activity
    successMetric: Hours to generate an audit-ready case file and percentage of movements with complete evidence attached
ideaScorecard:
  signalStrength:
    score: 4
    rationale: The cluster gives named investors, platform scale, live use cases, and a clear institutional-adoption narrative even if the startup wedge requires one layer of inference above the base rail.
  painIntensity:
    score: 4
    rationale: Collateral eligibility mistakes can delay settlement, break books and records, or trigger legal and compliance exposure for very high-value transactions.
  wedgeClarity:
    score: 5
    rationale: Pre-settlement consent and eligibility for tokenized collateral is a narrow workflow with a specific buyer, trigger, and manual alternative.
  defensibility:
    score: 4
    rationale: Counterparty rule mappings, exception data, and embedded approval workflows can become sticky institutional infrastructure even if chain providers add generic tooling.
  ventureScale:
    score: 4
    rationale: The first market is concentrated, but owning the tokenized-collateral control point can expand into the broader operating system for tokenized capital-markets workflows.
topRisks:
  - name: Pilot-to-production delay
    description: Institutions may keep tokenized collateral in pilot mode longer than expected, shrinking near-term software budgets.
    mitigation: Sell into live 2026 pilots first, price around operational readiness, and start as an overlay that reduces manual staffing before full production volume arrives.
  - name: Incumbent bundling
    description: Digital Asset, custody providers, or legacy collateral vendors could add basic eligibility checks and reduce room for an independent startup.
    mitigation: Win on cross-system rule orchestration, neutral audit logs, and counterparty-specific workflow coverage that no single rail or incumbent system naturally owns.
  - name: Rule-model complexity
    description: Bilateral agreements, asset restrictions, and issuer-consent logic may vary enough that implementation becomes slow and services-heavy.
    mitigation: Start with one asset type and one workflow on Canton, build reusable rule templates from design partners, and keep human approvals in the loop until confidence is proven.
