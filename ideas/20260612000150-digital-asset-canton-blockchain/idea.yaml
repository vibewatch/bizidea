problem: >-
  Broker-dealers and custodian banks piloting tokenized money market funds or bonds for repo and margin workflows still
  manage the hardest step off-chain: proving that a specific asset is eligible, consented, and correctly reflected in
  each party's books before it moves. That work sits across legal agreements, collateral schedules, tri-party messages,
  custody systems, and spreadsheet approvals, which makes pilots slow and operationally brittle. As permissioned rails
  like Canton gain real institutional volume, the blocker shifts from blockchain access to workflow-grade control over
  who can pledge what, to whom, and under which rules.
targetUser:
  primary: Collateral and securities-finance operations leaders at broker-dealers and custodian banks piloting tokenized bonds or money market fund collateral on Canton
  secondary: Product and legal teams standing up tokenized repo, margin, or collateral-mobility programs
  buyer: Global Head of Collateral Management, COO of Markets Operations, or head of securities-finance technology
startupThesis:
  nonObviousInsight: >-
    When regulated firms adopt permissioned blockchains, the scarce layer is not connectivity to the chain. The real
    bottleneck becomes translating bilateral eligibility rules, issuer consent, and books-and-records obligations into a
    machine-enforced workflow that every counterparty can trust before settlement occurs.
  beachhead: >-
    Repo and bilateral-margin operations teams at top-25 broker-dealers, clearing banks, and global custodians running
    2026 Canton pilots for tokenized money market fund or bond collateral between a small set of approved counterparties
  wedge: >-
    A consent and collateral-eligibility engine that checks asset, counterparty, agreement, haircut, concentration, and
    issuer-permission rules before a tokenized collateral movement is approved, then writes an audit-ready decision log
    back to operations and compliance teams
  whyNowCatalyst: >-
    Canton now combines $6T in tokenized issuance, 700-plus ecosystem participants, and named collateral and repo use
    cases, making spreadsheet-era eligibility and consent workflows an immediate barrier to production rollout.
  ventureScalePath: >-
    Start with pre-settlement control for tokenized collateral on Canton, then expand into lifecycle events, substitutions,
    margin calls, exception handling, regulatory reporting, and ultimately the operating system for tokenized capital
    markets workflows across repo, funds, bonds, and derivatives.
solution: >-
  Build a control layer that sits between tokenized-asset networks, collateral management systems, custody records, and
  legal rulebooks. For each proposed pledge or transfer, the product evaluates whether the asset is approved under the
  bilateral agreement, whether issuer consent or transfer restrictions apply, whether haircut and concentration rules are
  satisfied, and whether both parties' books will stay synchronized after settlement. If the movement is valid, the
  platform routes the approval, emits a decision record, and packages evidence for operations, risk, and compliance
  teams. If not, it opens an exception workflow with the exact policy conflict instead of leaving staff to reconcile it
  manually across emails and spreadsheets. The initial product is narrow enough to slot into live pilots, but over time
  it becomes the workflow spine for tokenized collateral programs.
goToMarketSeed:
  firstCustomer: >-
    A U.S. or UK broker-dealer, clearing bank, or global custodian with an active 2026 Canton pilot for tokenized money
    market fund collateral in repo or bilateral margin, a lean innovation team, and existing manual approval steps
    between legal, operations, and treasury
  buyingTrigger: >-
    The customer moves from a design workshop into a live counterparty pilot and needs a repeatable way to approve
    tokenized collateral movements without adding manual legal and operations headcount
  currentAlternative: Manual workflow across collateral systems, legal schedules, custody exports, spreadsheet checks, and email-based approvals
  switchingReason: >-
    The blockchain rail can move the asset, but it does not tell operations teams whether a specific movement is allowed
    under the agreement, concentration limits, issuer consent rules, and books-of-record constraints they still own.
  pricingHypothesis: >-
    Annual enterprise subscription priced by live tokenized-collateral programs and connected legal entities, with
    onboarding fees for rule mapping and custody-system integrations
