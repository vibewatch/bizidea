slug: tokenized-collateral-consent-engine
date: '2026-06-12'
executiveSummary: >-
  Tokenized Collateral Consent Engine should start as a control overlay for
  tokenized money market fund and Treasury collateral pilots on Canton, not as a
  new settlement rail, custody platform, or broad collateral suite. The first
  customer is a top-tier broker-dealer, clearing bank, or global custodian that
  is moving from design workshops into a live repo or bilateral-margin pilot and
  still relies on email, spreadsheets, and legal reviews to approve each
  movement. The immediate product is a read-only decision engine that checks
  asset eligibility, counterparty terms, haircut and concentration limits,
  issuer consent, and books-and-records constraints before a tokenized movement
  is released. Go-to-market should sell an implementation-backed paid pilot into
  one live workflow with two or three approved counterparties, because that is
  the fastest route to measurable proof and audit credibility. The deliberate
  tradeoff is to win pre-settlement approval and evidence packaging before
  expanding into substitutions, margin calls, lifecycle servicing, or
  multi-rail orchestration. The strongest long-run moat is a library of
  counterparty-specific rule maps and exception histories that sits above any
  single rail, custodian, or collateral platform. The biggest disconfirming risk
  is that pilot volumes or urgency remain too low for a standalone budget before
  incumbents bundle baseline controls. The inputs support the workflow pain,
  market wedge, and buyer logic, but they do not establish the current manual
  approval rate or number of programs already crossing into controlled
  production, so those signals must be tested in the first 90 days.
problem:
  - Early tokenized-collateral pilots can move assets on Canton, but operations teams still approve each movement across legal schedules, custody exports, collateral rules, and email threads.
  - A wrong approval can create settlement delay, books-and-records mismatches, or a breach of issuer, haircut, or concentration constraints on high-value financing flows.
  - Existing rails and collateral platforms optimize issuance, movement, or generic workflow automation, not provider-neutral adjudication of whether a specific tokenized movement is allowed right now.
solution:
  - Ingest the proposed tokenized-collateral movement, the governing bilateral agreement, issuer restrictions, custody state, and collateral schedules into one approval workflow.
  - Evaluate asset, counterparty, haircut, concentration, consent, and books-of-records rules before release, then produce an audit-ready yes/no decision with the exact policy basis.
  - Keep a human approval fallback and exception queue in v1 so live pilots can reduce manual reconciliation without asking risk or legal teams to trust full autonomy.
whyWeWin:
  - The company sits at the pre-settlement decision point that neither the rail nor the legacy collateral stack naturally owns across counterparties and systems of record.
  - Early deployments can accumulate reusable rule templates and exception patterns that become harder for a single custodian, issuer, or chain provider to replicate across the market.
  - A neutral, audit-first overlay matches current institutional trust and regulatory constraints better than a pitch centered on autonomous tokenized-asset movement.
strategicChoices:
  beachhead: U.S. broker-dealers, clearing banks, and global custodians running controlled Canton pilots for tokenized money market fund or Treasury collateral in repo or bilateral margin with a small approved counterparty set.
  wedgeRationale: Repo and bilateral-margin approval is the narrowest workflow where tokenized-collateral value, legal constraints, and operational pain all show up before broad production scale exists, so proof can come faster than selling a full tokenized-collateral operating stack.
  sequencingRationale: Start as a read-only approval and evidence layer on one asset type and one workflow, because buyers first need faster approval and audit comfort; add deeper integrations, reusable templates, and adjacent lifecycle workflows only after the company proves it can shorten approval time and survive control review inside live pilots.
  notYet:
    - Cross-rail orchestration beyond Canton before the Canton wedge produces repeatable pilots.
    - Full collateral optimization, inventory routing, or treasury-liquidity management.
    - Tokenized derivatives, tri-party collateral, or retail-facing digital-asset workflows.
market:
  tam: "$90.0M estimated TAM based on roughly 120 global dealer, custodian, FMI, and collateral-ops institutions at about $750k annual ACV."
  sam: "$16.0M estimated SAM based on about 32 U.S./UK/EU institutions with visible Canton, tokenized MMF, or tokenized Treasury momentum at roughly $500k annual ACV."
  som: "$2.7M estimated year-3 SOM based on 6 live logos paying about $450k each after initial rule mapping and integration."
  segments:
    - "Primary segment: top-25 broker-dealers, clearing banks, and global custodians piloting tokenized MMF or Treasury collateral on Canton"
    - "Secondary segment: post-trade infrastructures and securities-finance platforms that need an embedded or partner-led approval layer for tokenized collateral programs"
  buyingProcess: >-
    The operational champion is likely the head of collateral management,
    securities-finance operations, or tokenized-collateral program lead, while
    the economic buyer is usually the COO of markets operations, global head of
    collateral management, or head of securities-finance technology. The first
    deal should run as a paid pilot on one live workflow, with procurement
    focused on control evidence, data access, and whether the product can reduce
    approval time and exception handling without taking final authority away
    from regulated staff.
product:
  mvp: >-
    The MVP should be a read-only consent and eligibility engine for one
    tokenized-collateral workflow on Canton. It should ingest proposed
    movements, bilateral rule inputs, custody records, and issuer restrictions;
    return an approval or exception result with a decision log; and support
    human override, but it should not automate settlement, replace the
    collateral system of record, or promise broad multi-asset coverage in v1.
  sixMonth: Ship the first production-capable pilot package with rule templates for tokenized MMF and Treasury collateral, decision logs, exception workflow, human override, and integrations into custody files plus one collateral or operations system.
  twelveMonth: Add reusable agreement templates, concentration and haircut policy libraries, role-based controls, reporting for audit and compliance, and integrations that cut pilot deployment time below 60 days.
  twentyFourMonth: Expand into substitutions, margin-call and lifecycle-event workflows, broader connected-entity coverage, and partner-embedded distribution across custodians, post-trade vendors, and additional institutional rails.
  keyBets:
    - A read-only approval overlay can land faster than a system-of-record replacement.
    - One asset-type-plus-workflow package can produce reusable rule templates instead of bespoke services every time.
    - Buyers will value audit evidence and exception reduction enough to fund the product before tokenized-collateral volumes are fully scaled.
    - Winning the Canton wedge creates credibility to expand into adjacent tokenized capital-markets workflows later.
gtm:
  wedge: Sell a paid pilot for one live repo or bilateral-margin tokenized-collateral workflow, prove faster approvals and cleaner audit evidence with two or three counterparties, then convert to an annual platform contract as the customer expands the program.
  channels:
    - Founder-led direct sales to heads of collateral management, markets operations, and securities-finance technology at the beachhead accounts.
    - Co-sell and referral motions with Canton ecosystem participants, custodians, and post-trade vendors that need approval controls to move pilots into production.
    - Legal, regulatory, and implementation advisers already helping institutions stand up tokenized-collateral programs.
  funnelTargets: "Target account→qualified pilot 20-30%, qualified pilot→paid pilot 35-45%, paid pilot→production 50%+, first-land ACV $300k-500k after a $75k-150k pilot and onboarding package."
  pricing: Annual enterprise subscription priced by live tokenized-collateral program, connected legal entities, and workflow coverage, plus one-time onboarding for rule mapping and integrations; this matches buyer value because the budget case is operational readiness, control evidence, and lower exception labor rather than per-seat usage.
businessModel:
  revenueStreams:
    - Annual subscription for the approval, evidence, and exception-management platform.
    - Paid onboarding and rule-mapping fees for each new program or legal-entity rollout.
    - Expansion revenue from additional asset classes, reporting modules, and lifecycle workflows.
  unitOfValue: Live tokenized-collateral program under approval control, adjusted by number of connected legal entities and covered workflows.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more counterparties, legal entities, and business units inside the first account after the pilot is trusted.
    - Extend from initial approval into substitutions, margin-call handling, and regulatory reporting.
    - Embed the rules layer through custodians, post-trade vendors, and Canton ecosystem partners once the templates are repeatable.
strategyMap:
  northStarMetric: Monthly tokenized-collateral movements approved through the platform with complete audit evidence and no off-platform exception handling.
  inputMetrics:
    - Number of paid pilots tied to a live tokenized-collateral workflow
    - Median days from kickoff to first rule-covered approval decision
    - Share of proposed movements resolved without email or spreadsheet escalation
    - Pilot-to-production conversion rate
    - Annual contract value per live program
    - Time to produce an audit-ready decision packet for an approved or rejected movement
  moatsToBuild:
    - Counterparty-specific library of machine-readable eligibility, consent, haircut, and concentration rules
    - Exception-history dataset showing where approvals fail and how operations teams resolve them
    - Integration and workflow layer that reconciles custody state, collateral systems, and shared-ledger events for regulated buyers
  killCriteria:
    - Fewer than 3 paid pilots after 25 qualified conversations with target institutions
    - Median pilot deployment longer than 90 days because rule mapping or data access stays too bespoke
    - Pilot-to-production conversion below 50% across the first 6 paid pilots
    - No early customer shows at least a 30% reduction in approval turnaround time or exception-reconstruction effort within 90 days
  mermaid: |
    flowchart LR
      Wedge[Tokenized collateral approval wedge] --> MVP[Read-only consent engine MVP]
      MVP --> Proof[Faster approvals and audit proof]
      Proof --> Expansion[Lifecycle and multi-entity expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong workflow logic and institutional timing, but conviction remains moderate until the team proves real paid pilots, acceptable deployment time, and standalone budget against incumbent bundles.
    whyBelieve: The startup targets a specific control gap created by live tokenized-collateral pilots, and adjacent incumbents appear stronger at rails, movement, or broad workflow automation than at neutral pre-settlement consent.
    whyDoubt: The beachhead is concentrated and still pilot-heavy, so demand could lag or collapse into bundled features before an independent vendor earns repeatable six-figure production contracts.
    nextDiligence: Confirm that three Canton-adjacent institutions will pay for a pilot tied to a live workflow and that at least one converts to a $300k-plus annual contract after measurable approval-time improvement.
  firstCustomer:
    title: Canton tokenized-collateral operations leader
    profile: A large broker-dealer, clearing bank, or custodian running a controlled repo or bilateral-margin pilot for tokenized MMF or Treasury collateral across a small set of approved counterparties.
    trigger: The desk is moving from workshop design into live counterparty financing and manual legal plus operations approvals become the gating path to each tokenized movement.
    buyer: Global Head of Collateral Management or COO of Markets Operations
    initialContract: "$75k-$150k paid pilot over 12-16 weeks for one workflow and two or three counterparties, converting to $300k-$500k annual ACV plus onboarding once the program enters controlled production."
  mustBeTrue:
    - At least several target institutions must treat manual tokenized-collateral approval as a funded operations problem rather than a temporary pilot nuisance.
    - A read-only overlay must reach first approval decisions in under 60 days without bespoke integration work dominating every deployment.
    - Buyers must accept a provider-neutral consent engine instead of waiting for Digital Asset, custodians, or collateral vendors to bundle enough control features.
    - One pilot workflow must expand into additional counterparties, legal entities, or lifecycle steps often enough to lift ACV above the initial deployment.
    - Early customers must show measurable improvement in approval turnaround time or audit-evidence production that risk, operations, and compliance all acknowledge.
  diligenceQuestions:
    - How many active Canton-adjacent tokenized-collateral programs already have manual approval pain severe enough to justify a paid pilot now?
    - Which system actually owns eligibility truth today in the target accounts: legal schedules, collateral platforms, custody records, or program-specific spreadsheets?
    - What deployment posture closes fastest: SaaS control layer, private cloud, or customer-managed data plane?
    - When a target account declines, is the substitute an incumbent bundle, an internal build, or a decision to keep the workflow manual?
    - Which first proof point unlocks production budget fastest: faster approval time, lower exception volume, better audit evidence, or reduced legal and ops staffing load?
operatingAssumptions:
  - assumption: Enough Canton-adjacent institutions will move from design workshops to live tokenized-collateral pilots in the next 12 months to support a focused beachhead.
    basis: research.yaml
    validationTest: Interview 20 target institutions and confirm at least 8 expect a live repo or bilateral-margin tokenized-collateral workflow within 12 months.
    decisionImpact: If false, the company must either widen beyond Canton earlier or shift toward partner-embedded distribution instead of direct sales.
  - assumption: Rule mapping for tokenized MMF and Treasury collateral can be templated enough to keep median pilot deployment under 60 days.
    basis: idea.yaml
    validationTest: Build the first 3 pilots and require median time from signed kickoff to first rule-covered approval decision below 60 days.
    decisionImpact: If false, the business becomes services-heavy and needs a smaller hiring plan, higher onboarding fees, or a narrower product scope.
  - assumption: Buyers will fund the product from collateral-operations or post-trade change budgets before tokenized-collateral volumes are fully mature.
    basis: research.yaml
    validationTest: Secure 3 paid pilots where the budget owner sits in operations, securities-finance technology, or post-trade change rather than a pure innovation budget.
    decisionImpact: If false, sales cycles will lengthen and the company may need to reposition as consulting-led enablement or wait for later market timing.
  - assumption: A neutral decision layer will win trust faster than a workflow embedded only in one rail or one custodian stack.
    basis: operator judgment
    validationTest: In 10 target-account evaluations, confirm at least 4 buyers explicitly prefer a provider-neutral control point over a single-vendor workflow.
    decisionImpact: If false, the company should prioritize OEM or partner channels instead of selling an independent control plane.
  - assumption: First production contracts can land in the $300k-$500k annual range once the pilot proves value.
    basis: idea.yaml
    validationTest: Convert 2 paid pilots into annual software agreements within the target range without adding custom services that overwhelm software revenue.
    decisionImpact: If false, the company must lower burn, reduce hiring pace, or find a lighter deployment model to fit lower ACV reality.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: Design-partner discovery
    hypothesis: Target institutions will describe pre-settlement tokenized-collateral approval as a current control bottleneck with a named budget owner.
    successMetric: 20 interviews completed, 8 accounts match the beachhead, and 4 agree to pilot-scoping sessions.
    owner: Founder/CEO
  - horizon: "0–90 days"
    experiment: Manual-workflow baseline study
    hypothesis: One narrow workflow in tokenized repo or bilateral margin has enough approval delay and exception-handling pain to anchor the MVP.
    successMetric: 3 design partners share current-state workflow maps and one workflow shows at least 30% approval-time reduction potential.
    owner: Founder/CEO
  - horizon: "90–180 days"
    experiment: MVP pilot deployment
    hypothesis: A read-only rules engine plus human override can reach first approval decisions without touching settlement execution systems directly.
    successMetric: 3 paid pilots launched with first rule-covered decision in under 60 days for at least 2 of them.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Pricing and package test
    hypothesis: Program-plus-entity pricing will convert better than seat-based pricing because buyers budget around workflow readiness and control.
    successMetric: Preferred package appears in 2 signed paid pilots and wins in 5 of 8 pricing discussions.
    owner: Founder/CEO
  - horizon: "6–12 months"
    experiment: Production conversion proof
    hypothesis: Customers will convert when the product reduces approval turnaround time and delivers audit-ready evidence across a live workflow.
    successMetric: At least 2 pilots convert to annual contracts with documented approval-time improvement above 30% or materially faster audit packet creation.
    owner: Product and implementation lead
  - horizon: "12–18 months"
    experiment: Partner-sourced deployment motion
    hypothesis: Custodian, post-trade, or Canton-ecosystem partners can source deals and shorten trust-building versus founder-only sales.
    successMetric: At least 25% of qualified pipeline is partner-sourced and converts at a rate equal to or better than direct outbound.
    owner: Founder/CEO
operations:
  - Standardize onboarding around rule intake, custody-data ingestion, approval workflow mapping, and baseline-versus-post-pilot metrics.
  - Maintain a human-override and exception-resolution process from the first release so regulated customers retain final decision authority.
  - Run weekly pilot reviews on approval time, exception categories, unresolved data gaps, and audit-evidence completeness.
  - Use a reusable library for tokenized MMF and Treasury eligibility rules to avoid drifting into one-off consulting projects.
  - Build partner playbooks for custodians, legal advisers, and post-trade vendors that can shorten data access and procurement cycles.
team:
  - role: Founder/CEO
    startTiming: Month 0
    rationale: Own beachhead discovery, enterprise sales, pricing, and partner relationships until the first pilot and conversion motion are repeatable.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the rules engine, decision logging, exception workflow, and first integrations that determine time to first approval decision.
  - role: Product and implementation lead
    startTiming: Month 2
    rationale: Turn design-partner requirements into a repeatable pilot package and keep deployment from becoming bespoke services work.
  - role: Capital-markets rules lead
    startTiming: Month 3
    rationale: Encode repo, bilateral-margin, issuer-consent, and books-and-records logic credibly enough to satisfy operations, risk, and legal reviewers.
  - role: Integrations engineer
    startTiming: Month 6
    rationale: Reduce deployment time by productizing custody, collateral-system, and reporting integrations after the first pilot patterns emerge.
  - role: Enterprise account executive
    startTiming: Month 10
    rationale: Add pipeline capacity only after the company proves a paid-pilot package and at least one production conversion.
milestones:
  - horizon: "0–12 months"
    items:
      - Sign 5 design partners in the beachhead and convert at least 3 into paid pilots.
      - Ship the read-only consent-engine MVP for one tokenized repo or bilateral-margin workflow with decision logs and human override.
      - Convert at least 2 pilots into annual software contracts in the target ACV range.
  - horizon: "12–24 months"
    items:
      - Cut median deployment time below 60 days with reusable rule templates and productized integrations.
      - Expand from the first workflow into substitutions, additional counterparties, and connected legal entities within existing accounts.
      - Establish 2-3 partner-sourced channels with custodians, post-trade vendors, or Canton ecosystem implementers.
  - horizon: "24–36 months"
    items:
      - Reach 6 live production logos and validate the year-3 SOM assumption.
      - Launch adjacent lifecycle modules for margin calls, reporting, and exception analytics without losing neutral positioning.
      - Prove repeatable expansion beyond the initial U.S. beachhead into selected UK or EU institutional programs.
risks:
  - risk: Pilot-to-production timing slips and keeps the addressable budget too small for direct enterprise sales.
    likelihood: High
    impact: High
    mitigation: Focus on accounts already entering live counterparty workflows, price around operational readiness, and keep burn aligned to a small number of high-conviction pilots.
  - risk: Rail, custodian, or collateral-platform vendors bundle enough baseline controls to reduce standalone value.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on provider-neutral rule orchestration, cross-system evidence, and exception history that spans counterparties and systems of record.
  - risk: Rule encoding and data access stay too bespoke, turning deployments into consulting projects.
    likelihood: High
    impact: High
    mitigation: Limit v1 to tokenized MMF and Treasury collateral on Canton, productize templates aggressively, and require human fallback rather than promising full automation.
  - risk: Counterparties or control functions resist placing an independent vendor in the approval path.
    likelihood: Medium
    impact: Medium
    mitigation: Position the product as a decision-support and audit layer with customer-retained final authority, plus flexible deployment and logging controls.
  - risk: Regulatory scrutiny raises implementation overhead or slows customer sign-off.
    likelihood: Medium
    impact: Medium
    mitigation: Keep compliance evidence, role controls, and books-and-records support in the core product from day one and sell through advisers who already handle these programs.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to win design partners, ship the read-only consent-engine MVP, complete 3 paid pilots, convert at least 2 to production contracts, and build the product, rules, and integration team needed to make deployment repeatable.
