assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date]'
- id: A2
  name: pre-seed 交割后的起始现金
  value: '3000'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M]，这里取 $3.0M 交割额，用来覆盖前 24 个月并预留 6 个月缓冲。'
- id: A3
  name: 起始付费客户数（M1）
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months]'
- id: A4
  name: 客户里程碑爬坡
  value: M10-M12 做到 3 个付费 logo；Y2 第四季度做到 6 个正式生产 logo；Y3 全年维持 6 个 logo。
  unit: customers
  source: '[BP milestones], [BP market.som], [Research market.som]'
- id: A5
  name: 付费试点包定价
  value: 约 4 个月共 $120K，按月确认收入为 $30K。
  unit: USDK per customer
  source: '[BP investorMemo.firstCustomer.initialContract]，取已给出 $75k-$150k 试点区间的中位数。'
- id: A6
  name: 首个正式生产 ACV
  value: 年化 $390K，扩张前按月确认收入 $32.5K。
  unit: USDK per customer per year
  source: '[BP gtm.funnelTargets], [BP investorMemo.firstCustomer.initialContract]'
- id: A7
  name: 成熟期混合 ACV
  value: 到 Y3 退出时，年化混合 ACV 达到 $450K。
  unit: USDK per customer per year
  source: '[BP market.som], [Research market.som]'
- id: A8
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A9
  name: COGS 占比
  value: '30'
  unit: percent of revenue
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A10
  name: 月流失率
  value: '2.0'
  unit: percent
  source: 初创公司财务经验值：这是一个买方集中、但集成完成后切换成本会上升的资本市场工作流产品。
- id: A11
  name: 完全摊薄 CAC
  value: '150'
  unit: USDK per customer
  source: '[BP gtm.funnelTargets]，再叠加初创财务经验值：创始人主导的企业销售，面向受监管资本市场客户，采购和实施周期都偏长。'
- id: A12
  name: 创始人 / 高管完全成本薪酬
  value: '180'
  unit: USDK per year
  source: '[BP team Founder/CEO] plus pre-seed fintech compensation heuristic'
- id: A13
  name: 工程团队完全成本薪酬
  value: '160'
  unit: USDK per year
  source: '[BP team Founding eng]、[BP team Integrations engineer]，再叠加早期基础设施创业公司的薪酬经验值。'
- id: A14
  name: 产品 / 实施完全成本薪酬
  value: '145'
  unit: USDK per year
  source: '[BP team Product and implementation lead]，再叠加实施占比较高的 SaaS 招聘经验值。'
- id: A15
  name: 资本市场规则负责人完全成本薪酬
  value: '175'
  unit: USDK per year
  source: '[BP team Capital-markets rules lead]，再叠加金融科技领域专家的薪酬经验值。'
- id: A16
  name: 企业客户经理完全成本薪酬
  value: '180'
  unit: USDK per year
  source: '[BP team Enterprise account executive]，再叠加企业金融科技 OTE 经验值。'
- id: A17
  name: G&A / 合规完全成本薪酬
  value: '110'
  unit: USDK per year
  source: '[BP risks regulatory scrutiny]、[Research regulatoryLandscape]，再叠加精简 pre-seed 财务与合规支持的经验值。'
- id: A18
  name: 招聘节奏
  value: M2 招产品-实施负责人，M3 招资本市场规则负责人，M6 招集成工程师，M10 招首位 AE，M14 招第二位实施人员，M20 招第三位工程师，M22 招 G&A-合规，M25 招第二位 AE，M28 招第四位工程师。
  unit: timing
  source: '[BP team]、[BP strategicChoices.sequencingRationale]、[BP milestones]，再加一层保守平滑假设。'
- id: A19
  name: 非薪酬 OPEX 爬坡
  value: Y1 前期每月 $30K，Y1 第三季度 $32K，Y1 第四季度 $38K；Y2 每月 $42K-$53K；Y3 每月 $56K-$68K。
  unit: USDK per month
  source: '[BP operations]、[BP risks]、[Research regulatoryLandscape]，再叠加针对云资源、法务、审计、差旅和实施工具的初创财务经验值。'
- id: A20
  name: 第 3 年现有 logo 内扩张
  value: Y3 Q1 收入 $630K，Q2 $660K，Q3 $690K，Q4 $720K。
  unit: USDK per quarter
  source: '[BP businessModel.expansionLevers]、[BP product.twentyFourMonth]、[BP milestones 24-36 months]，假设同样的 6 个 logo 会继续加更多法实体、流程和报表模块。'
- id: A21
  name: 现金转换假设
  value: 假设 EBITDA 大体等于现金变动。
  unit: policy
  source: 初创财务经验值；模型未纳入债务、capex、税项或营运资金额度。
