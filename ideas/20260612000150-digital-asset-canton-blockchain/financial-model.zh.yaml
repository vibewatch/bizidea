modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  DesignPartners[共创客户] --> PaidPilots[付费试点]\n  PaidPilots --> ProductionLogos[正式生产 logo]\n  ProductionLogos --> ACV[ACV]\n  ACV --> Revenue[收入]\n  Revenue --> GrossProfit[毛利]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下，Y3 收入由 6 个正式生产 logo 驱动：它们从试点定价爬到约 $450K 的混合 ACV，并在其中加更多法实体和相邻流程。
- checkName: 必须做对的事
  finding: 公司必须把部署时长守在 60 天以内，否则在狭窄滩头市场里，试点转化还没跟上，招聘就会先跑在前面。
- checkName: 模型失效条件
  finding: 如果销售周期拉长到 12 个月附近，或成熟 ACV 落到 $400K 左右，即便 logo 计划仍然克制，现金也会朝 downside 的低点快速挤压。
- checkName: 下一轮融资证明点
  finding: 到 Y2 Q4，若已经看见 6 个正式生产 logo、可复用模板，以及至少 1 条伙伴带单渠道，下一轮融资故事会最有说服力。
sanityChecks:
  ruleOf40: Y3 增长 60.7% + EBITDA 利润率 -21.1% = 39.6%
  burnMultiple: Y2 burn multiple 为 0.5x，Y3 为 0.6x；按 EBITDA burn / 净新增收入计算。
  revenuePerFte: Y3 为 $270K（企业 SaaS 的参考区间约为 $200K-$400K）
  flags:
  - 收入依然高度集中，因为基准情景下 Y3 仍只靠 6 个 logo。
  - 模型假设一个试点密集型市场能在 Y2 Q4 跑到 6 个正式生产 logo，这比研究备忘录的谨慎口径更激进。
  - Y3 依然 EBITDA 为负，因此公司大概率还需要更强的 upsell，或在更大范围扩张前先完成下一轮融资。
  - 如果 Canton、托管机构或抵押品厂商把基础审批控制打包进去，独立预算的韧性会很快变弱。
