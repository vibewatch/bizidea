scenarios:
  downside:
    description: 试点转正式生产要晚 2-3 个季度，公司在保留大部分原定招聘计划的情况下，到 Y3 结束时仅有 5 个正式生产 logo，且 ACV 更低。
    y3RevenueK: 2050
    y3EbitdaK: -1030
    cashLowPointK: 340
    keyAssumptionChanges:
    - Y2 Q4 只做到 4 个正式生产 logo，而不是 6 个。
    - 成熟 ACV 落在约 $400K，而不是 $450K，因为法实体和流程扩张更晚到来。
    - 由于实施和支持仍偏服务化，毛利率维持在 65%。
  base:
    description: 3 个付费试点在 Y2 第四季度转成 6 个正式生产 logo，随后公司在 Y3 通过更多法实体、流程和报表模块，继续在这 6 个 logo 内做收入扩张。
    y3RevenueK: 2700
    y3EbitdaK: -569.7
    cashLowPointK: 987.2
    keyAssumptionChanges:
    - Y1 做到 3 个付费试点和 2 个正式生产转化，符合首年里程碑路径。
    - Y2 Q4 做到 6 个正式生产 logo，对齐计划和研究里的 SOM 路径。
    - Y3 的收入增长主要来自同一批 6 个 logo 的 upsell，而不是激进地继续加 logo。
  upside:
    description: 伙伴带单更早跑通，Y3 多拿下第 7 个 logo，且第一批客户的扩张模块挂得更快。
    y3RevenueK: 3300
    y3EbitdaK: -250
    cashLowPointK: 1180
    keyAssumptionChanges:
    - Y2 Q4 仍做到 6 个 logo，但 Y3 会新增第 7 个正式生产 logo。
    - 借助更快的多法实体和生命周期扩张，混合 ACV 达到 $500K。
    - 由于 onboarding 模板把实施拖累压下去，毛利率提升到 73%。
