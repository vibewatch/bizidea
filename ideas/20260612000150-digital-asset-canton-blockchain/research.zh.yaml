- 现在有多少个 Canton 周边的代币化抵押品试点，在结算前仍靠邮件、表格或口头审批？
- 发行人、托管机构和后台交易基础设施会不会开放机器可读的转让限制与授权数据，还是规则接入始终会很重服务？
- 在大型底层网络和抵押品厂商把类似控制能力打包前，独立厂商能否先赢到足够的信任，进入审批路径？
- DTC 代币化和镜像 MMF 项目，会多快从受控环境转成可重复的正式生产体量？
