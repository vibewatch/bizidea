  validationPlan:
  - priority: high
    question: 当前试点里的代币化抵押品转移，有多少笔在放行前仍需要法务或运营手工批准？
    evidenceToGather: 从 3 个 Canton 周边试点拿到匿名工作流日志，量化手工触达率、审批时长和异常类型。
  - priority: high
    question: 今天的适格性真相到底躺在哪套系统里：法务附表、抵押品引擎、托管记录，还是链上事件？
    evidenceToGather: 梳理 5 家机构的端到端审批流程，分清规则存在哪、结算状态又是在哪里被观察到。
  - priority: medium
    question: 在底层 rail 或抵押品厂商自己把类似控制能力打包前，买方会接受独立的授权引擎吗？
    evidenceToGather: 访谈正在使用 Broadridge DLR、HQLAx、Baton、CloudMargin 和 Digital Asset 方案的运营方，验证替代路径。
