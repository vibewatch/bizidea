  partnershipEcosystem:
  - point: 最有价值的产品伙伴会是 Digital Asset/Canton、BNY、Goldman、DTCC、Tradeweb 和 Broadridge，因为它们各自占住代币化抵押品栈的一段，但没人覆盖完整授权流程。
