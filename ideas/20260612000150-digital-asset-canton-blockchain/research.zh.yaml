competitors:
- name: Digital Asset / Canton
  stage: incumbent
  wedge: 面向代币化、结算和抵押品流转的许可链与同步金融基础设施。
  pricing: 保留来源中未披露公开价格，采用定制企业定价。
  strength: 占住了底层网络叙事、生态入口，以及资产标记和同步数据等产品原语。
  weaknessVsUs: 它优化的是网络采用和通用能力，不是把每份双边协议和审批路径都编码进去的中立授权引擎。
  sourceRefs:
  - 1
  - 7
  - 31
  - 32
- name: Broadridge DLR
  stage: incumbent
  wedge: 面向机构的代币化 repo 结算和大规模可审计市场数据分发。
  pricing: 保留来源中未披露公开价格，采用定制企业定价。
  strength: 已证明日均 $280B 的 repo 吞吐量，并与机构后台流程深度集成。
  weaknessVsUs: 重点在 repo 执行和结算基础设施，而不是结算前的适格性、授权和账簿裁决。
  sourceRefs:
  - 6
- name: HQLAx
  stage: scale-up
  wedge: 基于 DLT 的抵押品流转和数字化抵押品记录，不必在托管孤岛之间真的搬底层证券。
  pricing: 保留来源中未披露公开价格，采用定制企业定价。
  strength: 在日内精细调拨、跨托管流转和释放闲置抵押品方面叙事很强。
  weaknessVsUs: 它主要解决“怎么更高效地动起来”，而不是横跨发行人许可、协议逻辑和审计证据的完整规则引擎。
  sourceRefs:
  - 10
  - 12
- name: Baton Systems
  stage: scale-up
  wedge: 连接清算与结算场所的实时抵押品与流动性工作流现代化平台。
  pricing: 保留来源中未披露公开价格，采用定制企业定价。
  strength: 很适合那些围绕 treasury clearing 和实时运营升级抵押品流程的机构。
  weaknessVsUs: 保留材料把 Baton 定位成广义流程平台，而不是原生于 Canton 的代币化抵押品授权决策层。
  sourceRefs:
  - 13
  - 14
- name: CloudMargin
  stage: incumbent
  wedge: 在传统抵押品运营里提供高 STP 和分析能力的自动化抵押品与流动性管理。
  pricing: 保留来源中未披露公开价格，采用定制企业定价。
  strength: 工作流自动化成熟，在银行和资管机构里已有可信度。
  weaknessVsUs: 它服务的是广义抵押品运营，不是代币化资产限制、共享账本状态和发行人授权逻辑。
  sourceRefs:
  - 15
regulatoryTechnicalConstraints:
- point: 证券代币化并不会抹掉证券法、证券类别或账簿与记录义务。
  sourceRefs:
  - 23
  - 24
- point: 在美国受监管市场里使用代币化抵押品，可能额外触发托管、清算和隔离要求。
  sourceRefs:
  - 19
- point: 英国和欧盟的部署必须适配正在成形的加密资产托管、DLT 试点和 MiCA 框架。
  sourceRefs:
  - 20
  - 21
  - 22
- point: 机构级部署需要的是选择性可见和跨机构同步状态，而不是默认的公链透明。
  sourceRefs:
  - 32
  - 33
