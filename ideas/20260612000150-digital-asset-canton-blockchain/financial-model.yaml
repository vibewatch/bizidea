    name: Gross margin target
    value: '70'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct]'
  - id: A9
    name: COGS ratio
    value: '30'
    unit: percent of revenue
    source: '[BP businessModel.targetGrossMarginPct]'
  - id: A10
    name: Monthly churn
    value: '2.0'
    unit: percent
    source: >-
      Startup-finance heuristic for a concentrated enterprise capital-markets workflow product where
      buyer count is small but switching costs rise after integration.
  - id: A11
    name: Fully loaded CAC
    value: '150'
    unit: USDK per customer
    source: >-
      [BP gtm.funnelTargets] plus startup-finance heuristic for founder-led enterprise sales into
      regulated capital-markets accounts with long procurement and implementation cycles.
  - id: A12
    name: Founder / exec loaded compensation
    value: '180'
    unit: USDK per year
    source: '[BP team Founder/CEO] plus pre-seed fintech compensation heuristic'
  - id: A13
    name: Engineering loaded compensation
    value: '160'
    unit: USDK per year
    source: >-
      [BP team Founding eng], [BP team Integrations engineer] plus early-stage infrastructure
      startup compensation heuristic.
  - id: A14
    name: Product / implementation loaded compensation
    value: '145'
    unit: USDK per year
    source: '[BP team Product and implementation lead] plus implementation-heavy SaaS hiring heuristic'
  - id: A15
    name: Capital-markets rules lead loaded compensation
    value: '175'
    unit: USDK per year
    source: '[BP team Capital-markets rules lead] plus domain-specialist fintech compensation heuristic'
  - id: A16
    name: Enterprise account executive loaded compensation
    value: '180'
    unit: USDK per year
    source: '[BP team Enterprise account executive] plus enterprise fintech OTE heuristic'
  - id: A17
    name: G&A / compliance loaded compensation
    value: '110'
    unit: USDK per year
    source: >-
      [BP risks regulatory scrutiny], [Research regulatoryLandscape] plus lean pre-seed finance and
      compliance support heuristic.
  - id: A18
    name: Hiring sequence
    value: >-
      M2 product-implementation lead, M3 capital-markets rules lead, M6 integrations engineer, M10
      first AE, M14 second implementation hire, M20 third engineer, M22 G&A-compliance, M25 second
      AE, M28 fourth engineer.
    unit: timing
    source: '[BP team], [BP strategicChoices.sequencingRationale], [BP milestones] with a conservative smoothing heuristic'
  - id: A19
    name: Non-payroll opex ramp
    value: >-
      30K per month in early Y1, 32K in Q3Y1, 38K in Q4Y1, then 42K to 53K per month across Y2 and
      56K to 68K per month across Y3.
    unit: USDK per month
    source: >-
      [BP operations], [BP risks], [Research regulatoryLandscape] plus startup-finance heuristic for
      cloud, legal, audit, travel, and implementation tooling.
  - id: A20
    name: Y3 expansion inside existing logos
    value: Q1Y3 630K, Q2Y3 660K, Q3Y3 690K, Q4Y3 720K revenue
    unit: USDK per quarter
    source: >-
      [BP businessModel.expansionLevers], [BP product.twentyFourMonth], and [BP milestones 24-36
      months] assuming the same 6 logos add more entities, workflows, and reporting modules.
  - id: A21
    name: Cash conversion assumption
    value: EBITDA approximates cash movement
    unit: policy
    source: Startup-finance heuristic; no debt, capex, taxes, or working-capital line is modeled
