  amountM: 3
  runwayMonths: 24
  milestone: >-
    Reach 6 live production logos, keep median deployment under 60 days, and prove at least one
    partner-sourced channel with 6 months of cash buffer remaining.
  useOfFunds:
    - bucket: Engineering
      amountUsd: 1200000
      percentage: 40
    - bucket: GTM
      amountUsd: 750000
      percentage: 25
    - bucket: G&A
      amountUsd: 450000
      percentage: 15
    - bucket: Buffer (6 mo)
      amountUsd: 600000
      percentage: 20
scenarios:
  downside:
    description: >-
      Pilot-to-production conversion slips by two to three quarters and the company exits Y3 with
      only 5 live logos at lower ACV while keeping most of the planned hiring.
    y3RevenueK: 2050
    y3EbitdaK: -1030
    cashLowPointK: 340
    keyAssumptionChanges:
      - Q4Y2 reaches 4 live production logos instead of 6.
      - Mature ACV lands near 400K instead of 450K because entity and workflow expansion arrives later.
      - Gross margin stays at 65% as implementation and support remain more services-heavy.
  base:
    description: >-
      Three paid pilots convert into 6 live production logos by Q4Y2, then the company expands
      revenue inside those logos through more entities, workflows, and reporting modules in Y3.
    y3RevenueK: 2700
    y3EbitdaK: -569.7
    cashLowPointK: 987.2
    keyAssumptionChanges:
      - Y1 lands 3 paid pilots and 2 production conversions, matching the first-year milestone path.
      - Q4Y2 reaches 6 live logos, matching the SOM path in the plan and research.
      - Y3 revenue growth comes from upsell inside the same 6 logos rather than from aggressive logo count growth.
  upside:
    description: >-
      Partner-sourced distribution works earlier, a seventh logo lands in Y3, and expansion modules
      attach faster inside the first cohort.
    y3RevenueK: 3300
    y3EbitdaK: -250
    cashLowPointK: 1180
    keyAssumptionChanges:
      - Q4Y2 still reaches 6 logos, but Y3 adds a seventh production logo.
      - Blended ACV reaches 500K through faster multi-entity and lifecycle expansion.
      - Gross margin improves to 73% because onboarding templates reduce implementation drag.
