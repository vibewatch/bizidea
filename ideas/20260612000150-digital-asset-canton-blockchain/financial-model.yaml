    baseCase: Hiring follows the conservative milestone-linked ramp
    upsideCase: Two late hires are deferred until after Q2Y3 proof
    y3RevenueImpactK: -60
    cashImpactK: -220
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      DesignPartners --> PaidPilots
      PaidPilots --> ProductionLogos
      ProductionLogos --> ACV
      ACV --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case Y3 revenue is driven by 6 production logos expanding from pilot pricing into ~450K blended ACV with added entities and adjacent workflows.
  - checkName: Must go right
    finding: The company must keep deployment under 60 days so pilots convert before hiring outruns the narrow beachhead.
  - checkName: Model breaks if
    finding: If sales cycles stretch toward 12 months or mature ACV settles near 400K, cash compresses toward the downside low point despite a lean logo plan.
  - checkName: Next-round proof
    finding: The next financing case is strongest once 6 live logos, repeatable templates, and at least one partner-sourced channel are visible by Q4Y2.
sanityChecks:
  ruleOf40: 60.7% Y3 growth + -21.1% EBITDA margin = 39.6%
  burnMultiple: Y2 burn multiple 0.5x and Y3 burn multiple 0.6x using EBITDA burn divided by net new revenue.
  revenuePerFte: $270K Y3 (benchmark roughly $200K-$400K enterprise SaaS)
  flags:
    - Revenue remains highly concentrated because the base case still depends on only 6 logos in Y3.
    - The model assumes a pilot-heavy market reaches 6 live production logos by Q4Y2, which is earlier than the cautious tone in the research memo.
    - Y3 is still EBITDA negative, so the company likely needs either stronger upsell or a next round before broader geographic expansion.
    - Standalone budget durability weakens quickly if Canton, custodians, or collateral vendors bundle baseline approval controls.
