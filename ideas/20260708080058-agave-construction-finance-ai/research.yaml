    supplierPower:
      score: 3
      rationale: Integration access to ERP, payroll, and project systems matters, but multiple ecosystems are already interoperating in market and no single supplier controls every required data source.
      sourceRefs:
      - 31
      - 63
      - 92
    buyerPower:
      score: 4
      rationale: Controllers and CFOs have credible substitutes—manual closes, ERP modules, Procore, Briq, and outsourced finance help—so they can demand proof before buying.
      sourceRefs:
      - 27
      - 37
      - 52
      - 79
    threatOfEntrants:
      score: 3
      rationale: AI lowers feature-development cost, but trustable write-back, construction-specific integrations, and cross-project exception data remain meaningful entry barriers.
      sourceRefs:
      - 27
      - 30
      - 31
      - 74
    threatOfSubstitutes:
      score: 5
      rationale: Spreadsheets, ERP modules, billing software, and AP/payroll apps are abundant, so the startup must prove it is more than a convenience layer.
      sourceRefs:
      - 49
      - 52
      - 79
      - 88
    competitiveRivalry:
      score: 4
      rationale: Well-funded overlays and entrenched incumbents are all marching toward real-time finance visibility, making differentiation narrow and execution-sensitive.
