competitors:
- name: Agave
  stage: scale-up
  wedge: Integration-first AI for AP automation, analytics, and write-back across construction systems.
  pricing: Custom / quote-based; public contractor pricing page is consultative rather than list-priced.
  strength: Deep cross-system integrations, 500+ customers, and strong controller-trust case studies.
  weaknessVsUs: Broad product surface dilutes focus relative to a concrete-specific 48-hour WIP close product.
  sourceRefs:
  - 16
  - 18
  - 26
  - 27
  - 30
  - 31
- name: Briq
  stage: scale-up
  wedge: Construction FP&A, WIP, reporting, and analytics automation.
  pricing: No public list pricing; sold as enterprise finance automation.
  strength: Credible WIP/JCCM automation and strong CFO time-savings proof.
  weaknessVsUs: Public positioning leans toward forecasting and analytics more than invoice- and payroll-level close exception handling.
  sourceRefs:
  - 34
  - 37
  - 38
  - 42
  - 108
  - 109
- name: Siteline
  stage: scale-up
  wedge: Digital pay apps, waivers, and billing workflow for subcontractors.
  pricing: Custom pricing with guided onboarding.
  strength: Sharp downstream billing pain relief and a clear subcontractor finance story.
  weaknessVsUs: Starts in A/R and closeout rather than upstream in AP, payroll, and job-cost truth.
  sourceRefs:
  - 45
  - 46
  - 49
  - 52
  - 53
- name: Procore Financials
  stage: incumbent
  wedge: Broad construction suite with cost management and ERP connectors.
  pricing: Modular quote-based pricing; products are bundled rather than publicly list-priced.
  strength: Massive field footprint and strong ecosystem leverage.
  weaknessVsUs: Generic suite orientation leaves less controller-specific month-end close logic in public materials.
  sourceRefs:
  - 59
  - 60
  - 61
  - 62
  - 63
- name: hh2
  stage: scale-up
  wedge: Field-to-office middleware for time, payroll, AP, and Procore/Sage data flow.
  pricing: No public list pricing.
  strength: Concrete-friendly time/payroll/AP workflows and Sage/Procore integration.
  weaknessVsUs: Closer to data capture and sync than to a controller-facing close intelligence layer.
  sourceRefs:
  - 87
  - 88
  - 90
  - 92
regulatoryTechnicalConstraints:
- point: Prompt-payment, retainage, and waiver workflows make document state and approval history economically material, not back-office nice-to-haves.
  sourceRefs:
  - 10
  - 12
  - 88
- point: Certified payroll, prevailing wage, overtime, and union rules complicate labor-cost automation on public or union jobs.
  sourceRefs:
  - 90
  - 76
- point: ASC 606 and audit-readiness requirements mean close automation must preserve change-order and revenue-recognition evidence.
  sourceRefs:
  - 79
  - 105
- point: Reliable deployment depends on clean ERP/project-system mappings and integration governance before write-back is enabled.
  sourceRefs:
  - 30
  - 31
  - 63
  - 92
validationSignals:
- point: Agave says it has 500+ customers, 2+ years of profitability, nearly 3x year-over-year recurring revenue growth, and 80K+ projects run through its platform.
  sourceRefs:
  - 27
- point: Agave case studies show customers using approval guardrails and validation to let PMs push more financial work safely into ERP-connected workflows.
  sourceRefs:
  - 30
  - 31
- point: Metro Walls used Briq to save roughly a week of CFO time each month and avoid adding finance headcount for close/reporting work.
  sourceRefs:
  - 37
- point: Vantage Builders used Briq to automate JCCM and prepare for automated WIP reporting from Sage and Procore data.
  sourceRefs:
  - 38
- point: CMiC and Dodge report 57% ERP adoption among specialty trades, with 46% of non-users planning implementation within two years.
  sourceRefs:
  - 106
openQuestions:
- What share of the 956 U.S. 50-499 employee concrete establishments actually match the target stack of Sage 300 CRE or Vista plus Procore?
- In the concrete beachhead, is the first hard bottleneck AP packet coding, payroll/time reconciliation, or change-order/commitment hygiene?
- How much controller willingness-to-pay depends on public-work payroll complexity versus purely private-job close speed?
- Can a design-partner pilot prove measurable reduction in close days and margin-surprise frequency within one quarter?
