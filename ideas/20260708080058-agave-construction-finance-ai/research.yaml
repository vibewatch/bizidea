      - 61
      - 74
      - 106
      - 108
      - 109
  pestle:
  - factor: political
    impact: negative
    point: State payment rules and public-work requirements create region-by-region workflow complexity that slows standardization.
    sourceRefs:
    - 10
    - 90
  - factor: economic
    impact: positive
    point: Labor scarcity and thin margins increase the value of software that reduces finance rework and surfaces cost drift faster.
    sourceRefs:
    - 6
    - 7
    - 12
  - factor: social
    impact: negative
    point: Spreadsheet habits and PM reluctance to enter finance data still slow adoption, so change management is part of the product.
    sourceRefs:
    - 27
    - 37
    - 52
  - factor: technological
    impact: positive
    point: AI-assisted reporting, validation, and integration now make real-time close workflows practical on top of legacy construction systems.
    sourceRefs:
    - 18
    - 74
    - 104
  - factor: legal
    impact: negative
    point: ASC 606, audit preparation, retainage, and payroll compliance increase buyer caution around any system that touches reported financials.
    sourceRefs:
    - 52
    - 84
    - 90
    - 105
  adoptionFrictionMatrix:
  - friction: Trusting AI suggestions or write-back into the ERP
    severity: high
    affectedBuyer: CFO or controller
    mitigation: Start in shadow mode, keep approval gates, and expose an audit trail for every suggested action.
    sourceRefs:
    - 27
    - 30
    - 31
    - 105
  - friction: Messy cost-code and master-data mapping across ERP, project, and payroll systems
    severity: high
    affectedBuyer: Controller or project accounting lead
    mitigation: Launch with one ERP/payroll template, pre-validate mappings, and stop bad records before they hit the books.
    sourceRefs:
    - 30
    - 31
    - 63
    - 92
  - friction: Project-manager adoption of finance-adjacent workflows
    severity: medium
    affectedBuyer: Project managers and AP managers
    mitigation: Keep PMs in familiar project tools and add a controller-side gatekeeper or exception review role during rollout.
    sourceRefs:
    - 31
    - 37
    - 52
  - friction: Compliance-heavy payroll and payment documentation on public or union work
    severity: medium
    affectedBuyer: Payroll or AP manager
    mitigation: Bundle certified-payroll logic, prevailing-wage checks, and document-state tracking into the first implementation template.
    sourceRefs:
    - 10
    - 88
    - 90
market:
  tam:
    value: $1.0B
    rationale: CBP 20-499 employee general + specialty contractor establishments (57,634) × 30% finance-automation fit × $60k annual ACV = about $1.04B.
    isEstimate: true
    sourceRefs:
    - 3
    - 106
    - 27
  sam:
    value: $55.9M
    rationale: CBP shows 956 poured-concrete establishments with 50-499 employees; applying a 65% commercial/self-perform + legacy-stack fit and $90k ACV yields about $55.9M.
    isEstimate: true
    sourceRefs:
    - 3
    - 27
    - 37
  som:
    value: $4.3M
    rationale: 45 customers by year 3 at roughly $95k ACV is plausible for a one-trade beachhead sold through ERP/project-system channels and expanded from design partners.
    isEstimate: true
    sourceRefs:
    - 31
    - 37
    - 30
    - 92
