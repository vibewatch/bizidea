competitors:
- name: Agave
  stage: scale-up
  wedge: 以集成为先的 AI，用于建筑系统间的 AP 自动化、分析和回写。
  pricing: 定制/报价制；公开的承包商定价页面走咨询式路线，而非明码标价。
  strength: 深度跨系统集成、500 多个客户，以及扎实的财务主管信任案例。
  weaknessVsUs: 产品面铺得太广，相对一个混凝土专属的 48 小时 WIP 结账产品而言聚焦度不足。
