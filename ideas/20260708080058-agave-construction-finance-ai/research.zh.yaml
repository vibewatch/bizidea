  fiveForces:
    supplierPower:
      score: 3
      rationale: 接入 ERP、薪资和项目系统的能力很重要，但市场上已经有多套生态在互相打通，没有任何单一供应商能掌控所有必需的数据来源。
      sourceRefs:
      - 31
      - 63
      - 92
    buyerPower:
      score: 4
      rationale: 财务主管和 CFO 手上有可信的替代方案——手工结账、ERP 模块、Procore、Briq 和外包财务帮手——所以他们可以在买单前先要求证据。
      sourceRefs:
      - 27
      - 37
      - 52
      - 79
    threatOfEntrants:
      score: 3
      rationale: AI 降低了功能开发成本，但可信赖的回写、建筑专属集成和跨项目异常数据仍然是有意义的进入门槛。
      sourceRefs:
      - 27
      - 30
      - 31
      - 74
    threatOfSubstitutes:
      score: 5
      rationale: 电子表格、ERP 模块、开票软件和 AP/薪资应用比比皆是，公司必须证明自己不只是一层方便工具。
      sourceRefs:
      - 49
      - 52
      - 79
      - 88
    competitiveRivalry:
      score: 4
      rationale: 资金充足的叠加层和根深蒂固的现有厂商都在朝着实时财务可见性推进，这让差异化空间变窄、对执行力要求更高。
      sourceRefs:
      - 27
      - 42
      - 61
      - 74
      - 106
      - 108
      - 109
  pestle:
  - factor: political
    impact: negative
    point: 各州付款规则和公共工程要求带来了逐地区不同的工作流复杂度，拖慢了标准化进程。
    sourceRefs:
    - 10
    - 90
  - factor: economic
    impact: positive
    point: 劳动力短缺和微薄利润，提升了能减少财务返工、更快浮现成本漂移的软件的价值。
    sourceRefs:
    - 6
    - 7
    - 12
  - factor: social
    impact: negative
    point: 电子表格惯性和项目经理不愿录入财务数据，依然拖慢采用速度，因此变革管理本身也是产品的一部分。
    sourceRefs:
    - 27
    - 37
    - 52
  - factor: technological
    impact: positive
    point: AI 辅助的报表、校验和集成，如今让在存量建筑系统之上运行实时结账工作流变得切实可行。
    sourceRefs:
    - 18
    - 74
    - 104
  - factor: legal
    impact: negative
    point: ASC 606、审计准备、保留金和薪资合规，让买家在任何触及对外报表的系统面前都更加谨慎。
    sourceRefs:
    - 52
    - 84
    - 90
    - 105
  adoptionFrictionMatrix:
  - friction: 信任 AI 建议或对 ERP 的回写
    severity: high
    affectedBuyer: CFO 或财务主管
    mitigation: 先以影子模式起步，保留审批门槛，为每个建议动作都暴露一条审计留痕。
    sourceRefs:
    - 27
    - 30
    - 31
    - 105
  - friction: ERP、项目和薪资系统之间混乱的成本科目和主数据映射
    severity: high
    affectedBuyer: 财务主管或项目会计负责人
    mitigation: 先用一套 ERP/薪资模板起步，预先校验映射，在坏记录进账本之前就把它们拦下来。
    sourceRefs:
    - 30
    - 31
    - 63
    - 92
  - friction: 项目经理对财务相邻工作流的接受度
    severity: medium
    affectedBuyer: 项目经理和 AP 经理
    mitigation: 让项目经理留在熟悉的项目工具里，上线阶段增加一个财务主管侧的把关或异常复核角色。
    sourceRefs:
    - 31
    - 37
    - 52
  - friction: 公共或工会项目上高合规要求的薪资和付款文档
    severity: medium
    affectedBuyer: 薪资或 AP 经理
    mitigation: 在首个实施模板里就打包认证薪资逻辑、法定工资核查和文档状态追踪。
    sourceRefs:
    - 10
    - 88
    - 90
market:
  tam:
    value: $1.0B
    rationale: CBP 20-499 人规模的总承包及专业分包机构（57,634 家）× 30% 财务自动化适配度 × 6 万美元年度 ACV ≈ 10.4 亿美元。
    isEstimate: true
    sourceRefs:
    - 3
    - 106
    - 27
  sam:
    value: $55.9M
    rationale: CBP 数据显示 50-499 人规模的现浇混凝土机构有 956 家；按 65% 商业/自营及存量系统栈适配度、9 万美元 ACV 计算，约为 5590 万美元。
    isEstimate: true
    sourceRefs:
    - 3
    - 27
    - 37
  som:
    value: $4.3M
    rationale: 第 3 年拥有约 45 个客户、每个约 9.5 万美元 ACV 是合理的，前提是这是一个通过 ERP/项目系统渠道销售、并从共创客户扩展开来的单一工种滩头市场。
    isEstimate: true
    sourceRefs:
    - 31
    - 37
    - 30
    - 92
bottomUpSizingDrivers:
- driver: 美国总承包及专业分包机构数量（20-499 人）
  value: 57,634（其中专业分包 50,509 家 + 商业建筑 7,125 家）
