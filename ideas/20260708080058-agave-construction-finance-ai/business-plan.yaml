slug: contractor-job-cost-autopilot
date: "2026-07-08"
executiveSummary: >-
  This company should launch as a controller-first WIP close layer for
  self-perform commercial concrete contractors, not as another generic AP tool
  or replacement ERP. The beachhead is $50M-$250M U.S. concrete subcontractors
  running Sage 300 CRE or Vista plus Procore because they have enough invoice,
  payroll, and active-job complexity to prove value in one close cycle. The MVP
  overlays existing systems, ingests AP packets, payroll, expenses, and change
  orders, and shows which jobs have trusted WIP within 48 hours while keeping
  the ERP as system of record. GTM should sell a paid pilot tied to one
  operating company's month-end or WIP cycle because the first buyer is the
  controller reacting to a late close, margin surprise, or growth-driven
  finance bottleneck. Research supports the core pain, budget willingness, and
  overlay architecture, with category leaders already showing adoption and
  time-savings proof. The venture case is less clear on exact stack penetration
  inside the 956-establishment concrete beachhead, the dominant first bottleneck
  between AP and payroll, and whether a concrete-specific product beats adjacent
  incumbents rather than becoming a services wrapper. The plan therefore
  sequences trust before automation, solutions capacity before scaled sales, and
  adjacent trades before broader finance modules. If the company cannot reduce
  time-to-trusted WIP by at least 30%, convert at least half of pilots above
  $80k ARR, and deploy without custom mapping sprawl, it should narrow the
  market or stop.
problem:
  - Self-perform concrete contractors still reconcile AP packets, weekly payroll, expenses, change orders, and project data by hand, so WIP closes land days or weeks late and margin drift is discovered after the fact.
  - Legacy construction ERPs hold the ledger but do not own the cross-system exception workflow needed to trust job-cost numbers before executive WIP review.
  - Growth in active jobs or branches turns month-end close into a controller bottleneck and pushes finance teams toward more cleanup labor instead of better control.
solution:
  - Overlay Sage 300 CRE or Vista plus Procore with a controller-first close workspace that ingests invoice packets, payroll, expenses, and change orders into one job-cost exception graph.
  - Start in shadow mode, auto-split supplier PDFs, suggest coding, flag contract and cost-code variances, and route only unresolved exceptions for approval before any write-back.
  - After approval, sync validated entries and accrual suggestions back to the ERP and show which jobs have trusted WIP, open exceptions, and margin-drift risk inside 48 hours of period end.
whyWeWin:
  - The wedge is narrower than generic AP automation or broad FP&A because a 48-hour WIP close is a controller-owned workflow with obvious ROI in close days, avoided write-downs, and finance headcount leverage.
  - A contractor-specific dataset linking invoice patterns, payroll classes, cost codes, approvals, and close outcomes compounds into better exception handling and benchmark alerts that suites and OCR tools do not naturally collect.
  - Buyers can adopt as an overlay on existing ERP and project systems, which matches the researched market preference for write-back automation over rip-and-replace migrations.
strategicChoices:
  beachhead: U.S. self-perform commercial concrete subcontractors with $50M-$250M in revenue, 10-40 active jobs, and Sage 300 CRE or Vista plus Procore at one operating company.
  wedgeRationale: >-
    Concrete contractors combine dense AP packet volume, labor-heavy weekly
    payroll, and frequent job-cost variance risk, so one close-cycle pilot can
    prove value faster than selling a broader construction-finance suite across
    many trades and stacks.
  sequencingRationale: >-
    Start with shadow-mode close automation on one ERP, project, and payroll
    template at one operating company because trust, mapping quality, and audit
    trails are the gating factors. Only after pilot conversion should the
    company add approval-gated write-back, partner-led distribution, and
    adjacent modules or trades.
  notYet:
    - General contractors, residential trades, and small subcontractors where workflow heterogeneity or low exception volume slows proof.
    - Full ERP replacement, generic AP inbox automation, and downstream pay-app billing products that obscure the close-control wedge.
    - Surety, lender, cash-forecasting, and benchmarking products before the core WIP close motion converts and expands reliably.
market:
  tam: Estimated $1.0B ARR equivalent from about 57.6k U.S. general and specialty contractor establishments with 20-499 employees, assuming 30% finance-automation fit at roughly $60k ACV.
  sam: Estimated $55.9M ARR from about 956 U.S. poured-concrete establishments with 50-499 employees, assuming 65% commercial and legacy-stack fit at roughly $90k ACV.
  som: Estimated $4.3M year-3 ARR from roughly 45 concrete customers at about $95k ACV before broader channel scale.
  segments:
    - Midmarket self-perform commercial concrete contractors running Sage 300 CRE or Vista plus Procore.
    - Other self-perform specialty trades on legacy construction ERPs with similar WIP-close and job-cost pain once the concrete template works.
  buyingProcess: >-
    The controller or VP Finance should sponsor discovery after a late close,
    margin surprise, or branch-growth event exposes manual reconciliation as a
    bottleneck. Production approval will usually require CFO support, project
    accounting sign-off, and confidence that approval-gated write-back and
    audit trails will not compromise reported financials.
product:
  mvp: >-
    MVP covers one ERP family plus Procore and one payroll or time stack,
    ingests AP packets, payroll exports, expenses, and change orders, and
    produces a shadow-mode WIP close workspace with exception routing and
    evidence trails. It deliberately excludes autonomous posting, draw billing,
    cash forecasting, and full vendor compliance in the first release.
  sixMonth: Launch one-stack pilots that auto-split supplier PDFs, surface cost-code and contract variances, and show which jobs can be trusted for WIP within 48 hours while every write-back remains approval-gated.
  twelveMonth: Add controlled ERP write-back for low-risk entries, broader payroll and expense coverage, close-cycle benchmarking, and template deployments for the first adjacent specialty trade.
  twentyFourMonth: Expand from WIP close into vendor compliance, draw billing support, surety and lender reporting, and cash-forecast signals for multiple specialty trades on the same exception graph.
  keyBets:
    - Controllers will pay for faster close and earlier margin-drift detection before they ask for broad finance-suite replacement.
    - One concrete-specific template can reach first value in 30 days or less without turning onboarding into a bespoke data-cleanup project.
    - Approval-gated automation can earn trust quickly enough to move from shadow mode to production write-back inside the first quarter.
    - Cross-customer exception data will improve coding accuracy and benchmark value faster than incumbents can copy the surface workflow.
gtm:
  wedge: Sell a paid one-close or one-quarter pilot for a single operating company that proves 48-hour trusted WIP and fewer margin surprises without replacing the ERP.
  channels:
    - Founder-led outbound to controllers, CFOs, and VP Finance leaders at regional self-perform concrete contractors.
    - Referrals from Sage, Vista, Procore, and construction-accounting consultants already cleaning up close workflows.
    - Partnerships with construction accounting firms, surety advisers, and ERP implementation partners that care about WIP quality and audit readiness.
  funnelTargets: "Qualified discovery->paid pilot 20-30%, paid pilot->production 50%+, production account->second entity, branch, or workflow expansion within 12 months in 35%+ of accounts."
  pricing: >-
    Start with a $20k-$35k paid pilot tied to one monthly close cycle or one
    quarter, then convert to annual software priced per operating company with
    invoice-volume and active-job bands plus implementation fees for ERP,
    payroll, and project connectors. This pricing assumes buyers fund the
    product from avoided finance rework and better WIP control, so it must stay
    materially below the cost of another controller-level hire or recurring
    outsourced cleanup.
businessModel:
  revenueStreams:
    - Annual subscription priced by operating company, invoice volume, and active-job bands.
    - One-time implementation and connector setup fees for ERP, payroll, and project data normalization.
    - Premium close-cycle benchmarking, vendor-compliance, and lender or surety reporting modules after production rollout.
  unitOfValue: Operating company on the platform, metered by monthly invoice packet volume and active-job count.
  targetGrossMarginPct: 70
  expansionLevers:
    - Roll from one operating company or branch to all entities inside the same contractor.
    - Expand from close automation into vendor compliance, draw billing support, surety reporting, and cash-forecast signals.
    - Reuse the same ERP and project template in adjacent specialty trades once the concrete beachhead converts repeatably.
    - Turn accounting and ERP advisers into referral and implementation channels after the first production references.
strategyMap:
  northStarMetric: Active jobs closed to trusted WIP within 48 hours of period end.
  inputMetrics:
    - Qualified discovery to paid-pilot conversion rate.
    - Paid-pilot to production conversion rate.
    - Percentage of invoice packets and payroll exceptions cleared before executive WIP review.
    - Median days from period end to controller-approved WIP.
    - Net expansion from first operating company into additional entities or workflows.
  moatsToBuild:
    - Job-cost exception graph linking invoices, payroll, change orders, approvals, and close outcomes by vendor, cost code, and job phase.
    - Audit-grade write-back controls and rollback paths that make controllers comfortable moving from shadow mode to automation.
    - Cross-customer benchmark dataset on close delays, margin leakage, and exception hotspots by vendor and job stage.
  killCriteria:
    - Fewer than 8 of the first 20 qualified concrete buyers confirm WIP close pain severe enough to justify a paid pilot.
    - The first 3 design-partner closes fail to reduce time-to-trusted WIP by at least 30% or 2 business days.
    - Fewer than 2 of the first 4 paid pilots convert to production above $80k annualized value within 6 months.
    - Average deployment still requires more than 2 engineer-weeks of custom mapping after the first stack template is built.
  mermaid: |
    flowchart LR
      Wedge[Concrete WIP close wedge] --> MVP[Shadow-mode close workspace]
      MVP --> Proof[48-hour close and controller trust]
      Proof --> Expansion[Adjacent trades and finance modules]
investorMemo:
  verdict:
    call: "Watch"
    conviction: Strong pain and category validation, but current evidence is still too dependent on competitor traction and an unproven concrete-specific wedge.
    whyBelieve: Controllers already buy overlay software that sits on top of legacy construction systems, and the proposed 48-hour close motion ties AI directly to budgeted WIP and headcount pain.
    whyDoubt: Agave, Briq, Procore, and ERP-adjacent consultants already crowd the surface area, so the startup may be a narrow feature unless it proves faster deployment and sharper close outcomes.
    nextDiligence: Secure 3-5 design partners, measure one live close cycle in each, and confirm that a concrete-specific template can cut close time and convert at least half of pilots at software-like margins.
  firstCustomer:
    title: Controller at a regional self-perform commercial concrete subcontractor
    profile: A $75M-$150M U.S. concrete contractor with 10-20 active jobs, Sage 300 CRE or Vista, Procore, weekly payroll, and a 4-8 person accounting team that still closes WIP more than 5 business days after period end.
    trigger: A month-end write-down, backlog increase, or new branch load exposes that AP packets and payroll cannot be reconciled before executive WIP review.
    buyer: Controller
    initialContract: >-
      $20k-$35k paid pilot over one close cycle or quarter converting to roughly
      $80k-$120k annual software plus implementation once one operating company
      proves 48-hour trusted WIP and approval-gated write-back.
  mustBeTrue:
    - At least half of qualified concrete controllers report WIP close cycles longer than 5 business days and are willing to sponsor a paid pilot.
    - AP packet coding and payroll reconciliation account for most close delay in at least 3 design-partner environments.
    - A shadow-mode plus approval-gated workflow reduces time-to-trusted WIP by at least 30% within the first quarter.
    - At least 50% of paid pilots convert to production above $80k ARR without implementation work exceeding 20% of first-year contract value.
    - Early accounts expand beyond one operating company or into adjacent modules before incumbents compress pricing or bundle the workflow.
  diligenceQuestions:
    - What percentage of the 956 target concrete establishments actually run Sage 300 CRE or Vista plus Procore and a compatible payroll stack?
    - Which workflow creates the first painful bottleneck in the beachhead: AP packet coding, payroll and time reconciliation, or change-order hygiene?
    - What level of approval-gated write-back and audit evidence is required before a controller trusts the system in production?
    - How often do Agave, Briq, Procore, or ERP consultants win by extending current tooling instead of adopting a dedicated close layer?
    - Can the first template reach live value in 30 days without turning onboarding into a branch-by-branch services project?
operatingAssumptions:
  - assumption: Enough target concrete contractors already run the exact ERP, project, and payroll stack to support a focused outbound motion at $80k-$120k ACV.
    basis: research.yaml
    validationTest: Interview 15 controllers and 5 ERP consultants, then confirm that at least 10 qualified accounts match the Sage or Vista plus Procore template and accept target pricing ranges.
    decisionImpact: If false, broaden the beachhead to adjacent specialty trades or lower the ACV and template assumptions before hiring sales capacity.
  - assumption: AP packet coding and payroll reconciliation are the dominant bottlenecks inside the first beachhead close cycle.
    basis: research.yaml
    validationTest: Time every handoff across 3-5 live month-end closes and show these two workflows drive more than half of delay and rework minutes.
    decisionImpact: If false, rebuild the MVP around the actual bottleneck, even if that shifts the wedge toward change orders or billing controls.
  - assumption: Controllers will accept shadow mode first and approval-gated write-back soon after if the audit trail is explicit and error rates stay low.
    basis: idea.yaml
    validationTest: Run side-by-side pilots comparing read-only reporting and approval-gated write-back, and show more than 60% of recommended postings are approved with no material control exceptions.
    decisionImpact: If false, keep the product read-only longer and reset pricing and margin expectations around analytics rather than automation.
  - assumption: One stack-specific template can deploy in 30 days or less with less than 2 engineer-weeks of custom mapping after the first build.
    basis: operator judgment
    validationTest: Complete the first 3 implementations within 30 days while keeping custom engineering below 80 hours per account.
    decisionImpact: If false, tighten ICP to cleaner data environments or raise implementation pricing before scaling GTM.
  - assumption: Partner referrals from ERP consultants and construction accounting firms will shorten trust-building and sales cycles after the first reference customers.
    basis: research.yaml
    validationTest: Sign 3 referral partners and show that at least 2 partner-sourced opportunities reach paid pilot within 12 months.
    decisionImpact: If false, maintain a founder-led direct sales motion longer and delay channel-heavy forecast assumptions.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Interview 20 controllers, CFOs, and project-accounting leads in self-perform concrete and collect system-stack details plus close-cycle timelines.
    hypothesis: The beachhead has recurring WIP-close pain and enough stack commonality to support a single template and a paid pilot offer.
    successMetric: 10 qualified ICP accounts, 5 active opportunities, and a ranked list of the three most common ERP, payroll, and project-system combinations.
    owner: Founder CEO
  - horizon: 0-90 days
    experiment: Instrument 3 live or recent month-end closes to measure minutes spent on AP packet coding, payroll reconciliation, change-order cleanup, and approval chasing.
    hypothesis: AP packets plus payroll are the first bottlenecks and produce a measurable ROI case for the MVP.
    successMetric: Time-and-motion evidence showing more than 50% of close delay comes from workflows the product can automate or route.
    owner: Founder CEO and Construction finance product lead
  - horizon: 0-90 days
    experiment: Build a shadow-mode close workspace for one Sage or Vista plus Procore environment with supplier-PDF splitting, exception routing, and WIP trust flags.
    hypothesis: The first product can reach live value without autonomous posting and still give controllers a better WIP view inside one close cycle.
    successMetric: One design partner uses the product on live data and reviews exceptions before executive WIP within 30 days of kickoff.
    owner: Founding eng
  - horizon: 3-6 months
    experiment: Run 3 paid pilots on one operating company each with explicit scorecards for close days, exception clearance, and margin-surprise reduction.
    hypothesis: Buyers will pay for a narrow close layer if it shortens close and improves confidence before month-end review.
    successMetric: 3 paid pilots signed, 2 showing at least 30% faster time-to-trusted WIP, and at least 1 converted to production.
    owner: Founder CEO
  - horizon: 6-12 months
    experiment: Enable approval-gated ERP write-back for low-risk entries and accrual suggestions on the first 2 production accounts.
    hypothesis: Safe write-back materially improves ROI and lock-in once controllers trust the exception workflow.
    successMetric: 2 production accounts with more than 60% approved low-risk suggestions and no material audit or rollback incident.
    owner: Founding eng and Solutions engineer
  - horizon: 6-12 months
    experiment: Recruit ERP consultant, construction accounting, and surety-adjacent partners that can source or accelerate deployments.
    hypothesis: Trusted intermediaries will reduce sales friction and help the startup avoid building a large direct field team too early.
    successMetric: 3 signed partners, 2 partner-influenced pilots, and partner-sourced sales cycles at least 20% shorter than direct outbound.
    owner: Partnerships lead
operations:
  - Standardize onboarding around one required mapping set covering vendor names, cost codes, job phases, payroll classes, approval roles, and ERP posting rules.
  - Keep every automated action approval-gated at first, with evidence links, immutable audit history, and rollback controls for each ERP write-back.
  - Run weekly close reviews with the controller and project-accounting lead to convert pilot exceptions into reusable playbooks and tighter confidence thresholds.
  - Use existing payroll, OCR, and integration partners where possible instead of rebuilding every input workflow in-house.
  - Track deployment effort, exception-resolution time, and post-close rework on every account so services creep is visible before GTM scales.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own design-partner sales, WIP ROI framing, and customer discovery because early deals depend on finance credibility and rapid iteration.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build connectors, the exception graph, evidence trails, and safe write-back controls that determine whether the product is trusted.
  - role: Construction finance product lead
    startTiming: Month 0
    rationale: Translate close workflows, approval logic, and WIP reporting pain into a narrow MVP that controllers will actually use.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Shorten deployments, own data mapping, and protect the core team from turning each implementation into bespoke services work.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Convert ERP consultants, accounting firms, and surety-adjacent allies into pipeline after the first production references exist.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 3-5 design partners in the concrete beachhead and complete time-and-motion studies on their close workflows.
      - Launch 3 paid pilots, convert at least 2 to production, and prove at least 30% faster time-to-trusted WIP on the best-fit accounts.
      - Establish one repeatable Sage or Vista plus Procore deployment template that reaches first value in 30 days or less.
      - Show approval-gated write-back works safely on bounded entry types and supports $80k+ annualized production value.
  - horizon: 12-24 months
    items:
      - Expand from the first operating company into additional entities or branches inside early accounts and add the first adjacent specialty trade template.
      - Launch benchmarking, vendor-compliance, and lender or surety reporting modules that reuse the same exception graph.
      - Build a partner-led referral motion that contributes a meaningful share of qualified pilots without inflating implementation labor.
  - horizon: 24-36 months
    items:
      - Reach roughly 45 production customers and about $4.3M ARR, consistent with the researched year-3 SOM for the concrete beachhead.
      - Extend the product to multiple specialty trades while keeping the close-control wedge, not generic AP automation, as the primary sales story.
      - Prove that expansion revenue from additional entities and modules is large enough to justify moving beyond a concrete-only company.
risks:
  - risk: Controllers do not trust AI-assisted suggestions or write-back on workflows that affect WIP, margin, and external reporting.
    likelihood: High
    impact: High
    mitigation: Start in shadow mode, gate every posting through approvals, and show immutable evidence trails plus pilot benchmarks before asking for deeper automation.
  - risk: Messy cost-code, vendor, payroll, and job mappings turn onboarding into a services-heavy implementation business.
    likelihood: High
    impact: High
    mitigation: Constrain the first ICP to one stack template, reject poor-fit data environments, and make deployment effort a tracked kill metric.
  - risk: Agave, Briq, Procore, or ERP vendors bundle equivalent close workflows before the startup builds distribution or data advantage.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on controller-first 48-hour close outcomes, faster deployment on one trade, and benchmark data on margin leakage that general suites do not expose.
  - risk: The concrete beachhead is too narrow or expands too slowly to support venture outcomes.
    likelihood: Medium
    impact: High
    mitigation: Treat adjacent specialty-trade expansion as a proof-gated milestone and do not scale headcount until the first template proves both ACV and repeatability.
  - risk: Public-work payroll, retainage, or audit requirements add enough compliance complexity to slow deployments and reduce automation scope.
    likelihood: Medium
    impact: Medium
    mitigation: Prioritize private-job and lighter-compliance accounts first, while designing the audit trail and payroll rule system so public-work variants can be added deliberately.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5-3.5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months buys a 5-person team, one repeatable ERP, project, and payroll
    template, 3-5 design partners, 3 paid pilots, 2-3 production customers,
    and the audit-grade controls plus partner motion needed to prove this is a
    software business rather than construction-accounting services.
