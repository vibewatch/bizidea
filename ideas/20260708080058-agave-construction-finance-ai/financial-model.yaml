slug: contractor-job-cost-autopilot
date: '2026-07-08'
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: Opening cash after pre-seed close
    value: '2700'
    unit: usdK
    source: '[BP fundingAsk target range $2.5-3.5M; model uses a $2.7M close to reach
      the Q4Y2 proof point plus a 6-month buffer]'
  - id: A2
    name: Paid pilot revenue per logo
    value: '24'
    unit: usdK total per logo
    source: '[BP gtm.pricing says $20k-$35k paid pilot; model uses a conservative
      midpoint-lower case for a narrow first wedge]'
  - id: A3
    name: Paid pilot duration
    value: '2'
    unit: months
    source: '[BP gtm.pricing says one close cycle or one quarter; model uses two months
      as blended setup plus first close]'
  - id: A4
    name: First production-month revenue per converted logo
    value: '20'
    unit: usdK
    source: '[BP investorMemo.initialContract says annual software plus implementation;
      modeled as $8K subscription MRR plus $12K one-time implementation fee]'
  - id: A5
    name: Steady-state production subscription ACV
    value: '96'
    unit: usdK per year
    source: '[BP market.sam uses about $90k ACV, BP market.som uses about $95k ACV,
      and BP investorMemo.initialContract says $80k-$120k annual software]'
  - id: A6
    name: Net paying-logo start schedule
    value: M4, M7, M11, M13, M15, M17, M18, M20, M21, M22x2, M24x2, M25x2, M26x2,
      M27x3, M28x3, M29x3, M30x3, M31x4, M32x3, M33x3, M34x6
    unit: month index
    source: '[BP milestones call for 3 paid pilots and at least 2 production customers
      in Y1, then BP market.som targets roughly 45 customers by Y3; ramp stays muted
      until partner motion appears after first references]'
  - id: A7
    name: Pilot-to-production benchmark used to judge the ramp
    value: '55'
    unit: percent
    source: '[BP gtm.funnelTargets says paid pilot->production 50%+; model uses 55%
      as the bar that makes the net logo ramp feasible]'
  - id: A8
    name: Steady-state gross margin target
    value: '70'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct = 70]'
  - id: A9
    name: Delivery margin ramp by customer stage
    value: pilot COGS 43%, conversion-month COGS 35%, mature COGS 28%
    unit: percent of revenue
    source: '[BP strategicChoices.sequencingRationale starts trust and template-building
      before scale; heuristic stages gross margin improvement as deployments standardize]'
  - id: A10
    name: Monthly logo churn
    value: '1.8'
    unit: percent
    source: '[Heuristic: finance workflow software should be sticky once embedded,
      but the trade-specific wedge still carries point-solution risk]'
  - id: A11
    name: Blended CAC per production logo
    value: '35'
    unit: usdK
    source: '[BP gtm channels are founder-led outbound plus ERP/accounting referrals;
      heuristic assumes a lean midmarket enterprise motion rather than heavy field
      sales]'
  - id: A12
    name: Leadership loaded salary
    value: '180'
    unit: usdK annual
    source: '[Heuristic: founder cash compensation plus payroll tax and benefits load
      at pre-seed scale]'
  - id: A13
    name: Engineering loaded salary
    value: '210'
    unit: usdK annual
    source: '[Heuristic: senior U.S. vertical-SaaS engineer plus 20% load]'
  - id: A14
    name: Construction finance product lead loaded salary
    value: '180'
    unit: usdK annual
    source: '[Heuristic: domain product or operator compensation plus load]'
  - id: A15
    name: Solutions and customer success loaded salary
    value: '160'
    unit: usdK annual
    source: '[Heuristic: implementation or customer-success hybrid hire plus load]'
  - id: A16
    name: Sales and partnerships loaded salary
    value: '170'
    unit: usdK annual
    source: '[Heuristic: midmarket vertical AE or partnerships lead base compensation
      plus load; extra variable spend sits inside sales and marketing]'
  - id: A17
    name: Finance and ops loaded salary
    value: '140'
    unit: usdK annual
    source: '[Heuristic: lean finance or operations manager compensation plus load]'
  - id: A18
    name: Non-payroll R&D stack
    value: 5 / 6 / 8
    unit: usdK per month in Y1 / Y2 / Y3
    source: '[Heuristic: cloud, OCR, integration tooling, and model usage ramp with
      customer count]'
  - id: A19
    name: Non-payroll sales and marketing spend
    value: 4 / 7 / 12
    unit: usdK per month in Y1 / Y2 / Y3
    source: '[Heuristic: controller travel, trade events, partner enablement, and
      content remain lean until repeatability is proven]'
  - id: A20
    name: Non-payroll G&A spend
    value: 10 / 12 / 15
    unit: usdK per month in Y1 / Y2 / Y3
    source: '[Heuristic: legal, insurance, audit prep, IT, and back-office software
      for a regulated finance workflow]'
  - id: A21
    name: Hiring start schedule
    value: Solutions M4, Partnerships M10, Eng2 M18, AE1 M20, CSM M22, FinanceOps
      M24, Eng3 M26, AE2 M29, Solutions2 M31, Eng4 M34
    unit: month index
    source: '[BP team.startTiming plus BP fundingAsk.useOfFundsSummary, which keeps
      the team near five people early and adds scale hires only after proof]'
  - id: A22
    name: Separate premium-module revenue in the base case
    value: '0'
    unit: usdK through Y3
    source: '[BP product.twentyFourMonth puts vendor compliance, lender reporting,
      and adjacent modules after the first close-control wedge; base model excludes
      separate module revenue before Y4]'
  - id: A23
    name: Definition of customersEop in model rows
    value: Paid pilots and production logos are both counted once a logo is generating
      cash
    unit: counting policy
    source: '[BP gtm.pricing starts with a paid pilot, so rows count any paying logo
      and then step revenue up as it converts to production]'
