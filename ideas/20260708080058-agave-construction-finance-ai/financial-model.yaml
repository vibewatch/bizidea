scenarios:
  downside:
    description: Partner referrals arrive late, pricing settles near the low end of
      the BP range, and implementation stays too manual.
    y3RevenueK: 2858.0
    y3EbitdaK: -610.0
    cashLowPointK: 317.7
    keyAssumptionChanges:
      - Q4Y3 paying logos end at 36 instead of 45 because the Y3 launch ramp slips.
      - Production subscription ACV lands closer to $90K and onboarding revenue softens.
      - Mature delivery margin tops out near 67% instead of the 70% steady-state target.
  base:
    description: The base case reaches the researched concrete SOM only after one-stack
      deployments and partner referrals begin compounding in Y3.
    y3RevenueK: 3656.0
    y3EbitdaK: 27.7
    cashLowPointK: 769.7
    keyAssumptionChanges:
      - Paying-logo starts follow the modeled ramp to 45 by Q4Y3, with most scale
        arriving after Q4Y2 proof.
      - Each converted logo reaches about $96K subscription ACV with a $24K pilot
        and $12K implementation fee.
      - Gross margin improves from implementation-heavy pilots to roughly 70% steady-state
        delivery economics.
  upside:
    description: Channel trust pulls launches forward, pricing holds nearer the top
      of the researched ACV band, and template reuse improves delivery.
    y3RevenueK: 4317.0
    y3EbitdaK: 494.2
    cashLowPointK: 923.1
    keyAssumptionChanges:
      - Q4Y3 paying logos reach 50 because partner-influenced pilots convert faster
        and launch earlier.
      - Production subscription ACV holds near $102K with slightly stronger onboarding
        capture.
      - Mature delivery margin reaches about 73% as connector reuse removes more manual
        work.
sensitivity:
  - variable: ARPU
    downsideCase: Production ACV slips to about $90K and onboarding revenue compresses
      with weaker pricing power.
    baseCase: Production ACV is about $96K with a $24K paid pilot plus a $12K implementation
      fee.
    upsideCase: Production ACV reaches about $102K while the onboarding motion still
      clears quickly.
    y3RevenueImpactK: -254.0
    cashImpactK: -219.0
  - variable: CAC
    downsideCase: Blended CAC rises to roughly $45K as founder outbound carries more
      of the funnel.
    baseCase: CAC holds near $35K with founder-led selling plus referrals from ERP
      and accounting partners.
    upsideCase: CAC falls toward $30K once partner referrals supply a larger share
      of paid pilots.
    y3RevenueImpactK: 0.0
    cashImpactK: -84.0
  - variable: churn
    downsideCase: Monthly churn drifts toward 3.0% if the product stays a narrow point
      solution.
    baseCase: Monthly churn holds near 1.8% because close-cycle workflow stays sticky
      once trusted.
    upsideCase: Monthly churn improves toward 1.0% after write-back trust and module
      adjacency deepen embed.
    y3RevenueImpactK: -210.0
    cashImpactK: -160.0
  - variable: sales cycle
    downsideCase: The Y3 launch ramp slips roughly two months as partner trust and
      CFO approvals take longer.
    baseCase: Logo starts follow the modeled move from 13 paying logos at Q4Y2 to
      45 at Q4Y3.
    upsideCase: Part of the Y3 ramp pulls forward once the first stack template becomes
      referenceable.
    y3RevenueImpactK: -644.0
    cashImpactK: -440.0
  - variable: gross margin
    downsideCase: Mature delivery COGS stay near 33% because custom mapping and support
      remain manual.
    baseCase: Mature delivery COGS settle near 28% after the first ERP, payroll, and
      project template hardens.
    upsideCase: Mature delivery COGS fall toward 27% as implementation and support
      become more repeatable.
    y3RevenueImpactK: 0.0
    cashImpactK: -187.0
  - variable: hiring pace
    downsideCase: The third engineer, second AE, and second solutions hire are pulled
      roughly two quarters forward.
    baseCase: Back-half hires stay milestone-gated and follow the BP sequencing logic.
    upsideCase: At least one back-half Y3 hire waits for clearer channel proof and
      margin proof.
    y3RevenueImpactK: 0.0
    cashImpactK: -238.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified controllers] --> Pilots[Paid pilots]
      Pilots --> Production[Production logos]
      Production --> Revenue[Subscription plus onboarding revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven mainly by scaling paying logos to 45 by Q4Y3
      at about $96K subscription ACV, with pilots and onboarding fees pulling some
      cash forward.
  - checkName: Must go right
    finding: The first stack template has to become partner-referenceable by Q4Y2
      so Y3 launches can accelerate without adding a large services bench.
  - checkName: Model breaks if
    finding: If launches slip and delivery margins stall near the downside case, cash
      can compress toward roughly $318K before breakeven arrives.
  - checkName: Next-round proof
    finding: The seed-worthy proof point is about 13 paying logos, roughly 70% steady-state
      gross margin, and evidence that partner-sourced launches can repeat beyond concrete.
sanityChecks:
  ruleOf40: Y3 growth 306% + EBITDA margin 1% = 307%
  burnMultiple: Y2 burn multiple 1.2x (EBITDA burn $842K on $716K net new revenue);
    Y3 is near 0.0x at EBITDA breakeven.
  revenuePerFte: $281K Y3 using 13 year-end FTE (benchmark $200-400K SaaS)
  flags:
    - The move from 13 paying logos at Q4Y2 to 45 by Q4Y3 is the hardest assumption
      in the model and depends on partner channels working on schedule.
    - The base case reaches the researched concrete SOM without a large field team,
      so any implementation sprawl would force either slower growth or a bigger round.
    - Y3 EBITDA is only slightly positive, so a one-quarter sales slip or lower ACV
      pushes the company back toward external financing sooner than planned.
    - The model does not assume separate premium-module revenue before Y4, so the
      next round still needs adjacent-trade proof rather than just more concrete logos.
