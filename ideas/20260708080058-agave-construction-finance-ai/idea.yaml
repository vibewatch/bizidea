jobsToBeDone:
  - job: >-
      When month-end begins and cost data is scattered, help the controller close WIP within 48 hours, so they can see which jobs need intervention before the executive review.
    currentAlternative: Spreadsheet WIP schedules plus manual Sage or Viewpoint entry and reconciliation
    successMetric: Days from period end to trusted job-cost report
  - job: >-
      When a supplier invoice packet hits with mixed jobs, rentals, and materials, help the project accountant route only the true exceptions, so they can post costs accurately without reopening the close.
    currentAlternative: Manual PDF splitting, cost-code lookup, and email approval chasing
    successMetric: Share of invoices auto-coded and posted without post-close rework
