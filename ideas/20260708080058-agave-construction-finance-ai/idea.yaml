topRisks:
  - name: Financial-control trust
    description: >-
      CFOs and controllers may hesitate to let AI suggest or write back entries that affect WIP, margin, and external reporting.
    mitigation: >-
      Start in shadow mode with approval-gated write-back, immutable evidence trails, and one-close pilot benchmarks before asking for deeper automation.
  - name: Data mapping friction
    description: >-
      Cost codes, vendor names, payroll classes, and project structures are messy across branches and jobs, which can slow onboarding and reduce early accuracy.
    mitigation: >-
      Launch with one ERP-payroll stack and one trade template, then use human-reviewed mappings and confidence thresholds before broad rollout.
  - name: Incumbent adjacency
    description: >-
      Construction ERP vendors, AP automation tools, or outsourced construction-accounting firms could add similar features or influence buyer access.
    mitigation: >-
      Focus on cross-system WIP close outcomes, partner with accounting advisers as channels, and build benchmark data on close delays and margin leakage they do not naturally capture.
