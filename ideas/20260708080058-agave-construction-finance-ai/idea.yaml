problem: >-
  Self-perform contractors run weekly and monthly WIP reviews using AP invoices, payroll exports, expense logs, change orders, and project data that live in disconnected systems. Controllers wait days or weeks for project accountants to parse supplier PDF packets, code costs, chase approvals, and reconcile job numbers, which means margin problems surface after labor and material overruns are already baked in. Legacy construction ERPs remain the system of record, but they mostly capture history after the close instead of helping teams produce trustworthy job-cost truth in time to act.
targetUser:
  primary: >-
    Controller or VP Finance at a $50M-$250M U.S. self-perform commercial concrete contractor using Sage 300 CRE or Viewpoint with Procore across 10-40 active jobs
  secondary: >-
    Project accountants, AP managers, and operations leaders responsible for cost-code accuracy, approvals, and weekly WIP reviews
  buyer: CFO or controller
startupThesis:
  nonObviousInsight: >-
    The next construction-finance winner is not a new ERP and not a generic AP bot. It is a write-back exception layer that turns supplier PDFs, payroll, and field-system exhaust into trusted job-cost truth inside the contractor's existing ledger. What changed is that integration-first AI can now sit across 14-plus construction systems, validate exceptions, and deliver measurable time savings without forcing finance teams through a core-system migration.
  beachhead: >-
    48-hour WIP close and job-cost variance control for U.S. self-perform commercial concrete contractors with $50M-$250M in revenue, 10-40 active jobs, and Sage 300 CRE or Viewpoint plus Procore
  wedge: >-
    An AI close layer that ingests supplier invoice packets, payroll, expenses, and project data, then flags cost-code and contract variances before writing validated entries back to the legacy ERP
  whyNowCatalyst: >-
    Agave's 500-contractor footprint, 60-hours-per-month savings, and 10x AI-product revenue growth show contractors are finally buying write-back finance automation instead of tolerating weeks-late job-cost reports.
  ventureScalePath: >-
    Start with WIP close for self-perform trades, then expand into payables, vendor compliance, draw billing, cash forecasting, surety and lender reporting, and a cross-contractor benchmark on margin leakage by cost code and vendor type.
solution: >-
  The product pulls supplier invoices and statements, weekly payroll exports, expense logs, change orders, and project-management data into a job-cost exception graph keyed to company, job, vendor, and cost code. It auto-splits multipage supplier PDFs, suggests coding, flags mismatches between contract terms and billed amounts, and routes only unresolved exceptions to project accountants or project managers. Once approved, validated entries and accrual suggestions sync back into Sage 300 CRE or Viewpoint so the ERP remains the source of record. Controllers get a 48-hour WIP close workspace showing late costs, margin drift, missing approvals, and jobs whose reported gross profit cannot be trusted yet. Over time the system learns which vendors, invoice patterns, and project stages most often create close delays or surprise write-downs.
goToMarketSeed:
  firstCustomer: >-
    A $100M regional commercial concrete subcontractor with 15 active jobs, Sage 300 CRE, Procore, weekly payroll, and a 5-person accounting team that still closes WIP more than a week late
  buyingTrigger: >-
    A month-end margin surprise or backlog surge exposes that AP, payroll, and project data cannot be reconciled fast enough for executive WIP review
  currentAlternative: >-
    Manual invoice entry into Sage or Viewpoint, spreadsheet WIP schedules, email approval chases, and outsourced construction-accounting cleanup
  switchingReason: >-
    The wedge gives finance teams trusted job-cost reports without replacing the ERP, while catching coding and contract-variance errors before they distort WIP and gross-margin decisions.
  pricingHypothesis: >-
    Annual SaaS subscription per operating company priced by monthly invoice and active-job volume, plus implementation for ERP and payroll connectors
