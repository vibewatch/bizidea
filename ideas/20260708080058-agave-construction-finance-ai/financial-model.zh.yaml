scenarios:
  downside:
    description: 伙伴转介姗姗来迟，定价落在 BP 区间低端，实施依然过于依赖人工。
    y3RevenueK: 2858.0
    y3EbitdaK: -610.0
    cashLowPointK: 317.7
    keyAssumptionChanges:
      - "第 3 年第 4 季度付费客户数只有 36 个而非 45 个，因为第 3 年的上线节奏放缓。"
      - "生产订阅 ACV 更接近 9 万美元，上线收入也走软。"
      - "成熟期交付毛利率最高只到 67%，未能触及 70% 的稳态目标。"
  base:
    description: 基准情景要等到单一系统栈部署和伙伴转介在第 3 年开始复利累积后，才能达到研究得出的混凝土 SOM。
    y3RevenueK: 3656.0
    y3EbitdaK: 27.7
    cashLowPointK: 769.7
    keyAssumptionChanges:
      - "付费客户起始节奏按建模爬坡走，到第 3 年第 4 季度达到 45 个，大部分规模化发生在第 2 年第 4 季度验证之后。"
      - "每个转化客户达到约 9.6 万美元的订阅 ACV，外加 2.4 万美元试点费和 1.2 万美元实施费。"
      - "毛利率从实施密集的试点阶段，改善到约 70% 的稳态交付经济水平。"
  upside:
    description: 渠道信任把上线节奏提前，定价维持在研究得出 ACV 区间的高端附近，模板复用也提升了交付效率。
    y3RevenueK: 4317.0
    y3EbitdaK: 494.2
    cashLowPointK: 923.1
    keyAssumptionChanges:
      - "第 3 年第 4 季度付费客户数达到 50 个，因为伙伴影响的试点转化更快、上线更早。"
      - "生产订阅 ACV 维持在约 10.2 万美元附近，上线收入捕获略强。"
      - "成熟期交付毛利率达到约 73%，因为连接器复用去掉了更多人工工作。"
sensitivity:
  - variable: ARPU
    downsideCase: 生产 ACV 滑落到约 9 万美元，定价能力减弱，上线收入随之压缩。
    baseCase: 生产 ACV 约 9.6 万美元，外加 2.4 万美元付费试点费和 1.2 万美元实施费。
    upsideCase: 生产 ACV 达到约 10.2 万美元，上线动作依然能快速完成。
    y3RevenueImpactK: -254.0
    cashImpactK: -219.0
  - variable: churn
    downsideCase: 如果产品仍是一个窄小的单点方案，月度流失率会向 3.0% 漂移。
    baseCase: 月度流失率保持在约 1.8%，因为结账工作流一旦被信任就很有黏性。
    upsideCase: 回写信任和模块相邻性加深嵌入后，月度流失率改善到约 1.0%。
    y3RevenueImpactK: -210.0
    cashImpactK: -160.0
  - variable: sales cycle
    downsideCase: 由于伙伴信任建立和 CFO 审批耗时更长，第 3 年上线节奏大约推迟两个月。
    baseCase: 客户起始节奏按建模路径推进，从第 2 年第 4 季度的 13 个付费客户，走到第 3 年第 4 季度的 45 个。
    upsideCase: 一旦第一套系统栈模板可作为参考案例，部分第 3 年爬坡会提前到来。
    y3RevenueImpactK: -644.0
    cashImpactK: -440.0
  - variable: gross margin
    downsideCase: 由于定制映射和支持仍靠人工，成熟期交付 COGS 停留在约 33%。
    baseCase: 第一套 ERP、薪资和项目模板稳定后，成熟期交付 COGS 落在约 28%。
    upsideCase: 随着实施和支持变得更可复用，成熟期交付 COGS 降到约 27%。
    y3RevenueImpactK: 0.0
    cashImpactK: -187.0
  - variable: CAC
    downsideCase: 由于创始人外呼承担了更多漏斗工作，混合 CAC 升到约 4.5 万美元。
    baseCase: 依靠创始人主导销售加 ERP 和代账伙伴转介，CAC 维持在约 3.5 万美元附近。
    upsideCase: 一旦伙伴转介贡献更大比例的付费试点，CAC 降向 3 万美元。
    y3RevenueImpactK: 0.0
    cashImpactK: -84.0
  - variable: hiring pace
    downsideCase: 第三名工程师、第二名 AE 和第二名解决方案岗提前约两个季度招募到位。
    baseCase: 后半程招聘保持里程碑门控，遵循 BP 的排序逻辑。
    upsideCase: 至少一个后半程第 3 年岗位，会等到渠道证据和毛利证据更清晰之后才招募。
    y3RevenueImpactK: 0.0
    cashImpactK: -238.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Qualified controllers] --> Pilots[Paid pilots]
      Pilots --> Production[Production logos]
      Production --> Revenue[Subscription plus onboarding revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景的收入主要靠把付费客户数扩到第 3 年第 4 季度的 45 个、订阅 ACV 约 9.6 万美元来驱动，试点费和上线费把部分现金提前带入。
  - checkName: 必须做对的事
    finding: 第一套系统栈模板必须在第 2 年第 4 季度前变得可作为伙伴参考案例，第 3 年的上线节奏才能加速，同时又不必扩建庞大的服务团队。
  - checkName: 模型会在何时失效
    finding: 如果上线节奏推迟、交付毛利卡在下行情景附近，现金可能在盈亏平衡到来之前压缩到约 31.8 万美元。
  - checkName: 下一轮融资的验证点
    finding: 值得进入种子轮的验证点，大约是 13 个付费客户、约 70% 的稳态毛利率，以及伙伴主导的上线能在混凝土之外复制的证据。
sanityChecks:
  ruleOf40: 第 3 年增长率 306% + EBITDA 利润率 1% = 307%
  burnMultiple: 第 2 年烧钱倍数 1.2 倍（EBITDA 烧钱 84.2 万美元对应净新增收入 71.6 万美元）；第 3 年在 EBITDA 盈亏平衡附近接近 0.0 倍。
  revenuePerFte: 按第 3 年末 13 名全职员工计算，人均收入约 28.1 万美元（对标区间 20 万-40 万美元 SaaS 基准）
  flags:
    - "从第 2 年第 4 季度的 13 个付费客户走到第 3 年第 4 季度的 45 个，是模型里最难的假设，依赖伙伴渠道按计划生效。"
    - "基准情景在不建立庞大现场团队的前提下达到研究得出的混凝土 SOM，因此任何实施蔓延都会迫使公司要么放慢增长，要么融更大一轮。"
    - "第 3 年 EBITDA 只是略微转正，因此哪怕销售节奏推迟一个季度或 ACV 走低，都会把公司比计划更早地推回外部融资。"
    - "模型没有假设第 4 年之前有独立的高级模块收入，因此下一轮融资仍然需要相邻工种的验证，而不只是更多混凝土客户。"
