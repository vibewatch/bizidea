slug: contractor-job-cost-autopilot
date: '2026-07-08'
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: 种子前轮完成后的期初现金
    value: '2700'
    unit: usdK
    source: '[BP fundingAsk 目标区间 $2.5-3.5M；模型采用 270 万美元的完成额，以覆盖第 2 年第 4 季度的验证点，外加 6 个月缓冲]'
  - id: A2
    name: 每个客户的付费试点收入
    value: '24'
    unit: usdK total per logo
    source: '[BP gtm.pricing 说付费试点为 2 万至 3.5 万美元；模型对第一个窄切口采用保守的中低值]'
  - id: A3
    name: 付费试点周期
    value: '2'
    unit: months
    source: '[BP gtm.pricing 说一个结账周期或一个季度；模型按两个月计，把搭建期和首次结账合并计算]'
  - id: A4
    name: 转正客户首个生产月的收入
    value: '20'
    unit: usdK
    source: '[BP investorMemo.initialContract 说年度软件加实施费；建模为 8000 美元订阅月经常性收入加 1.2 万美元一次性实施费]'
  - id: A5
    name: 稳态生产订阅 ACV
    value: '96'
    unit: usdK per year
    source: '[BP market.sam 采用约 9 万美元 ACV，BP market.som 采用约 9.5 万美元 ACV，BP investorMemo.initialContract 说年度软件为 8 万至 12 万美元]'
  - id: A6
    name: 净付费客户起始节奏
    value: M4、M7、M11、M13、M15、M17、M18、M20、M21、M22×2、M24×2、M25×2、M26×2、M27×3、M28×3、M29×3、M30×3、M31×4、M32×3、M33×3、M34×6
    unit: month index
    source: '[BP milestones 要求第 1 年拿下 3 个付费试点和至少 2 个生产客户，随后 BP market.som 把第 3 年目标定在约 45 个客户；爬坡节奏保持克制，直到首批参考客户出现后伙伴动作才显现]'
  - id: A7
    name: 用于判断爬坡节奏的试点转生产基准
    value: '55'
    unit: percent
    source: '[BP gtm.funnelTargets 说付费试点到生产转化率为 50%以上；模型采用 55% 作为让净客户爬坡可行的门槛]'
  - id: A8
    name: 稳态毛利率目标
    value: '70'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct = 70]'
  - id: A9
    name: 按客户阶段划分的交付毛利爬坡
    value: 试点阶段 COGS 43%，转化当月 COGS 35%，成熟阶段 COGS 28%
    unit: percent of revenue
    source: '[BP strategicChoices.sequencingRationale 要求先立信任、建模板，再规模化；启发式假设部署标准化后毛利率分阶段改善]'
  - id: A10
    name: 月度客户流失率
    value: '1.8'
    unit: percent
    source: '[启发式假设：财务工作流软件一旦嵌入应该有较高黏性，但这个工种专属切口仍带有单点方案风险]'
  - id: A11
    name: 每个生产客户的混合 CAC
    value: '35'
    unit: usdK
    source: '[BP 的 GTM 渠道是创始人主导外呼加 ERP/代账转介；启发式假设采用精简的中型企业销售动作，而非重型现场销售]'
  - id: A12
    name: 管理层全成本薪酬
    value: '180'
    unit: usdK annual
    source: '[启发式假设：种子前轮规模下，创始人现金薪酬加薪资税和福利负担]'
  - id: A13
    name: 工程全成本薪酬
    value: '210'
    unit: usdK annual
    source: '[启发式假设：美国资深垂直 SaaS 工程师薪酬加 20% 负担]'
  - id: A14
    name: 建筑财务产品负责人全成本薪酬
    value: '180'
    unit: usdK annual
    source: '[启发式假设：领域产品或运营岗位薪酬加负担]'
  - id: A15
    name: 解决方案与客户成功全成本薪酬
    value: '160'
    unit: usdK annual
    source: '[启发式假设：实施与客户成功混合岗位薪酬加负担]'
  - id: A16
    name: 销售与合作伙伴全成本薪酬
    value: '170'
    unit: usdK annual
    source: '[启发式假设：中型企业垂直领域 AE 或伙伴负责人的基础薪酬加负担；额外的变动支出计入销售与市场费用]'
  - id: A17
    name: 财务与运营全成本薪酬
    value: '140'
    unit: usdK annual
    source: '[启发式假设：精简型财务或运营经理薪酬加负担]'
  - id: A18
    name: 非人力研发支出
    value: 5 / 6 / 8
    unit: usdK per month in Y1 / Y2 / Y3
    source: '[启发式假设：云、OCR、集成工具和模型使用量随客户数量爬坡]'
  - id: A19
    name: 非人力销售与市场支出
    value: 4 / 7 / 12
    unit: usdK per month in Y1 / Y2 / Y3
    source: '[启发式假设：在可重复性得到证明之前，财务主管差旅、行业展会、伙伴赋能和内容制作都保持精简]'
  - id: A20
    name: 非人力 G&A 支出
    value: 10 / 12 / 15
    unit: usdK per month in Y1 / Y2 / Y3
    source: '[启发式假设：面向受监管财务工作流的法务、保险、审计准备、IT 和后台软件支出]'
  - id: A21
    name: 招聘启动节奏
    value: 解决方案岗 M4，合作伙伴岗 M10，工程 2 号 M18，AE1 M20，CSM M22，财务运营 M24，工程 3 号 M26，AE2 M29，解决方案 2 号 M31，工程 4 号 M34
    unit: month index
    source: '[BP team.startTiming 加 BP fundingAsk.useOfFundsSummary，两者都要求早期团队维持在 5 人左右，只有在验证之后才增加规模化岗位]'
  - id: A22
    name: 基准情景下的独立高级模块收入
    value: '0'
    unit: usdK through Y3
    source: '[BP product.twentyFourMonth 把供应商合规、放贷机构报告和相邻模块放在第一个结账控制切口之后；基准模型在第 4 年之前不计入独立模块收入]'
  - id: A23
    name: 模型行内 customersEop 的定义
    value: 付费试点和生产客户只要开始产生现金，就都计为一个客户
    unit: counting policy
    source: '[BP gtm.pricing 从付费试点起步，因此各行统计的是任何已付费的客户，随后随其转化为生产环境而逐步提升收入]'
