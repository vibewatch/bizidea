    - 自营商业混凝土承包商
    - 使用存量建筑 ERP 的其他专业分包商
    - 作为渠道伙伴的建筑代账和 ERP 咨询公司
  valuePropositions:
    - 在周期结束后 48 小时内产出可信的工程成本和 WIP 报告
    - 在发票、薪资和成本科目差异扭曲利润之前先抓出来
    - 让 Sage、Viewpoint 或同类建筑 ERP 继续担任系统记录
  channels:
    - 创始人主导，直接触达承包商财务主管和 CFO
    - Sage、Viewpoint 和建筑 ERP 顾问的转介
    - 与建筑代账公司和履约保函顾问的合作
  customerRelationships:
    - 高触达试点，贯穿一个月度结账周期
    - 与财务和项目团队每周做异常复核
    - 一家运营公司验证投资回报后再扩展到多实体
  revenueStreams:
    - 按发票量和在管项目数量计费的年度软件订阅
    - 一次性的实施和连接器搭建费
    - 面向结账周期基准对标和利润流失预警的高级分析
  keyResources:
    - 建筑 ERP、薪资和项目管理连接器
    - 成本科目与合同差异异常图谱
    - 关于结账延迟、核销和审批模式的历史数据集
  keyActivities:
    - 把供应商 PDF、薪资和项目数据归一化为工程成本事件
    - 路由异常，并把校验过的分录同步回 ERP
    - 产出 WIP 结账分析和差异基准对标
  keyPartners:
    - 建筑 ERP 集成商
    - 薪资和考勤软件供应商
    - 建筑代账公司和履约保函经纪商
  costStructure:
    - 集成和实施人力
    - 模型推理和文档处理
    - 高度依赖领域知识的客户成功与销售
jobsToBeDone:
  - job: >-
      月末一到、成本数据散落各处时，帮财务主管在 48 小时内结完 WIP，这样他们能在高管复核之前就看清哪些项目需要介入。
    currentAlternative: 电子表格 WIP 排程，加上手工录入 Sage 或 Viewpoint 并对账
    successMetric: 从周期结束到拿到可信工程成本报告所用的天数
  - job: >-
      供应商发票包混着多个项目、租赁和材料一起到货时，帮项目会计只把真正的异常挑出来处理，这样他们能准确入账成本，而不用重开已结的账。
    currentAlternative: 手工拆分 PDF、查成本科目、靠邮件追审批
    successMetric: 无需结账后返工即可自动编码入账的发票占比
