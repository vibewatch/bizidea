problem: >-
  自营施工承包商每周、每月做 WIP 复核时，要用到分散在不同系统里的 AP 发票、薪资导出、费用记录、变更单和项目数据。财务主管要等上数天甚至数周，才能等到项目会计解析完供应商 PDF 包、编码成本、追完审批、对齐工程编号——这意味着等人力和材料超支已经既成事实，利润问题才会浮出水面。存量建筑 ERP 依然是系统记录，但它们大多只在结账之后捕捉历史，帮不上团队及时拿到能据以行动的可信工程成本数据。
targetUser:
  primary: >-
    年收入 5000 万至 2.5 亿美元、使用 Sage 300 CRE 或 Viewpoint 加 Procore、同时在管 10-40 个项目的美国自营商业混凝土承包商的财务主管或财务副总裁
  secondary: >-
    负责成本科目准确性、审批和每周 WIP 复核的项目会计、AP 经理和运营负责人
  buyer: CFO 或财务主管
startupThesis:
  nonObviousInsight: >-
    下一个建筑财务赢家不会是新 ERP，也不会是一个通用 AP 机器人。它是一层回写式异常处理层，把供应商 PDF、薪资和现场系统产生的数据废气，变成写进承包商现有账本里的可信工程成本真相。真正的变化是：以集成为先的 AI 如今能横跨 14 个以上的建筑系统，校验异常，并在不逼财务团队做核心系统迁移的前提下，交付可衡量的时间节省。
  beachhead: >-
    面向年收入 5000 万至 2.5 亿美元、同时在管 10-40 个项目、使用 Sage 300 CRE 或 Viewpoint 加 Procore 的美国自营商业混凝土承包商，提供 48 小时 WIP 结账和工程成本差异控制
  wedge: >-
    一层 AI 结账层：摄入供应商发票包、薪资、费用和项目数据，在把校验过的分录写回存量 ERP 之前，先标记出成本科目和合同差异
  whyNowCatalyst: >-
    Agave 覆盖 500 家承包商、每月节省 60 小时、AI 产品收入增长 10 倍的成绩说明，承包商终于开始买单回写式财务自动化，而不是继续忍受迟到数周的工程成本报告。
  ventureScalePath: >-
    先从自营工种的 WIP 结账切入，再扩展到应付账款、供应商合规、工程进度提款开票、现金预测、履约保函与放贷机构报告，以及按成本科目和供应商类型划分利润流失的跨承包商基准对标。
solution: >-
  产品把供应商发票和对账单、每周薪资导出、费用记录、变更单和项目管理数据，拉进一张按公司、项目、供应商和成本科目建索引的工程成本异常图谱。它自动拆分多页供应商 PDF、建议编码、标记合同条款与账单金额不符之处，只把无法自动解决的异常路由给项目会计或项目经理。一旦获批，校验过的分录和权责发生制建议就会同步回 Sage 300 CRE 或 Viewpoint，ERP 依然是系统记录。财务主管会得到一个 48 小时 WIP 结账工作台，看到哪些成本延迟、利润在漂移、审批缺失，以及哪些项目报出的毛利还不能被信任。随着时间推移，系统会学习哪些供应商、发票模式和项目阶段最常造成结账延迟或意外核销。
goToMarketSeed:
  firstCustomer: >-
    一家年收入 1 亿美元的区域性商业混凝土分包商，同时在管 15 个项目，使用 Sage 300 CRE、Procore、每周发薪，配有 5 人的会计团队，WIP 结账依然晚一周以上
  buyingTrigger: >-
    月末利润意外，或积压工程量骤增，暴露出 AP、薪资和项目数据快得跟不上高管的 WIP 复核节奏
  currentAlternative: >-
    手工把发票录入 Sage 或 Viewpoint、用电子表格做 WIP 排程、靠邮件追审批，以及外包建筑代账清理
  switchingReason: >-
    这个切口能在不换 ERP 的前提下，给财务团队可信的工程成本报告，还能在编码和合同差异扭曲 WIP 与毛利判断之前把它们抓出来。
  pricingHypothesis: >-
    按运营公司收取年度 SaaS 订阅费，按月度发票量和在管项目数量定价，另加 ERP 和薪资连接器的实施费
