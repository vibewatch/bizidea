      入场切口本身很具体，但它能扩展到其他专业工种，也能延伸到应付款、开票、现金预测和放贷机构报告等相邻的建筑财务工作流。
topRisks:
  - name: Financial-control trust
    description: >-
      CFO 和财务主管可能不放心让 AI 建议或回写会影响 WIP、利润和对外报表的分录。
    mitigation: >-
      先以影子模式起步，回写需审批放行，保留不可篡改的证据链，并在要求更深自动化之前先跑出一个结账周期的试点基准。
  - name: Data mapping friction
    description: >-
      各分支和项目之间的成本科目、供应商名称、薪资类别和项目结构都很混乱，这会拖慢上线速度、降低早期准确率。
    mitigation: >-
      先用一套 ERP-薪资组合和一个工种模板起步，在大范围推广前先靠人工复核映射和置信度阈值把关。
  - name: Incumbent adjacency
    description: >-
      建筑 ERP 厂商、AP 自动化工具或外包建筑代账公司，都可能加上类似功能，或影响买家的准入渠道。
    mitigation: >-
      聚焦跨系统 WIP 结账结果，把代账顾问发展成渠道伙伴，并建立起他们天然捕捉不到的结账延迟与利润流失基准数据。
