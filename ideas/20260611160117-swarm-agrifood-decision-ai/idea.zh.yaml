problem: 多工厂饲料厂商至今还把最值钱的日常决策交给资深计划员、电子表格和脆弱的 ERP 导出表。玉米、大豆、预混料供应、运价或用工约束在中午发生变化时，团队只能手工权衡原料替代、批次顺序、客户服务水平和营运资金暴露。静态 MRP 和 APS 能给出基线计划，却留不住那些真正决定工厂在波动里能否赚钱应对的厂级决策经验。
targetUser:
  primary: 北美动物饲料和预混料厂商里的供应链与工厂计划负责人——这些企业通常运营 3-12 家工厂，原料价格波动大，生产排程每天都要重排。
  secondary: 需要在区域网络内同时平衡服务水平、配方调整和原料风险敞口的厂长与采购总监。
  buyer: 区域性饲料厂商的 COO、VP Operations 或 VP Supply Chain。
startupThesis:
  nonObviousInsight: 在农食制造里，护城河不只是预测更准，而是要在波动和退休潮把决策能力打散之前，把顶级计划员脑子里的权衡逻辑编码下来。赢家不会替代 ERP，而是压在 ERP 之上，做一层决策记忆：它知道在压力之下，这家饲料厂真正会接受哪些替代方案、排产顺序和客户取舍。
  beachhead: 北美区域性动物饲料和预混料厂商，运营 3-12 家饲料厂，玉米、大豆、添加剂和运力都在波动合同里采购，每天都要重排生产和交付。
  wedge: 当大宗价格、到厂库存或运输约束变化时，一套能给出原料替代、批次重排和交付优先级调整建议的毛利控制驾驶舱。
  whyNowCatalyst: SWARM 客户披露的 40% 规划周期缩短、围绕波动的市场叙事，以及对 ERP 集成的推进，都说明农食运营方现在既有足够急迫感，也有足够的技术底座，把决策智能软件放进核心规划流程。
  ventureScalePath: 先从饲料和预混料工厂切入，再扩展到宠物食品、面粉、乳品配料等其他批次制造行业，最终成为覆盖采购、生产、物流和营运资金优化的跨工厂决策层。
solution: 产品接入 ERP 订单、库存位置、合同条款、企业内部已在用的大宗价格源、工厂约束和出库交付承诺，为每家工厂搭起一套实时决策模型。扰动一来，系统就生成一组可执行的排序剧本，比如替代原料组合、批次重排、客户重新排序或拼车整合，并在执行前把对毛利、服务和营运资金的影响讲清楚。计划员可以接受、拒绝或修改每条建议；这些选择会沉淀成可复用的决策记忆，并和工厂条件、客户分层、配方容差绑定。随后，系统把获批后的计划变更写回 ERP、TMS 和调度流程，同时保留完整审计链，记录这次决策为什么这么做。时间一长，它就会变成区域工厂网络的运营层：每个班次都能像最强的老计划员在值班一样应对波动。
goToMarketSeed:
  firstCustomer: 一家北美饲料或预混料生产商，收入规模在 $150 million 到 $1 billion，运营 3-12 家饲料厂，采购集中管理，而且每天都要开计划会去平衡原料可得性和客户交付。
  buyingTrigger: 持续性的原料价格冲击、运力中断、重大客户服务事故，或计划员退休，让管理层突然看到：毛利有多大程度还靠部落式的日常重排。
  currentAlternative: ERP 或 APS 给出的基线计划，再叠加电子表格、资深计划员电话沟通和本地团队维护的手工情景分析。
  switchingReason: 这个切口能让运营方更快、更有把握地做重排决策，在经验人员离岗前把 know-how 留下来，并且在真正改计划之前就把毛利和现金影响算出来。
  pricingHypothesis: 按工厂收年费，再叠加与计划员席位数或每月获批重排场景次数挂钩的 usage tier。
