jobsToBeDone:
- job: 当大宗价格飙升或原料短缺发生时，帮区域计划负责人选出最优的配方替代和工厂排程变更，让他们在不丢服务承诺的前提下守住毛利。
  currentAlternative: 计划员电子表格、ERP 导出表，以及采购、工厂和调度之间靠电话升级沟通。
  successMetric: 每次扰动事件保住的毛利额。
- job: 当计划员要在多家工厂和卡车约束之间重新平衡客户交付时，帮他们快速模拟并批准“伤害最小”的取舍，让重点客户准时，同时避免过多营运资金占用。
  currentAlternative: 在 APS 工具和本地调度板里做手工情景分析。
  successMetric: 从发现扰动到批准重排的分钟数。
