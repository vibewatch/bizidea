topRisks:
- name: ERP 套件挤压
  description: 现有规划厂商可能补上基础 AI 情景推演功能，并把它打包进现有 APS 或 ERP 合同。
  mitigation: 靠工厂级决策记忆、更快的上层部署速度，以及农食原生剧本取胜，而不是靠通用优化界面。
- name: 数据质量拖累
  description: 工厂的库存、配方和运输数据可能并不一致，这会在早期部署里拖低建议质量。
  mitigation: 先抓一个高价值重排工作流，把审批放在人环里，再用轻量连接器和置信度评分逐步扩自动化。
- name: 变革管理阻力
  description: 在高压扰动下，资深计划员可能不信任那些看起来在挑战本地判断的建议。
  mitigation: 把产品定位成解释取舍的决策副驾，保留计划员覆盖权，并先在复盘里证明价值，再往更深自动化推进。
