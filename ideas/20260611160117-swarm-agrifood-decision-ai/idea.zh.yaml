differentiator: 现有 ERP 和 APS 厂商也能出计划，但它们很少捕捉那些真正被团队接受的例外处理逻辑——而这正是“保住毛利的重排动作”和“把服务做砸”的分水岭。这个产品围绕的是波动型批次制造里的可执行决策剧本，而不是通用预测或看板。它的防御力来自不断扩大的知识库：在真实工厂条件下，哪些替代、排产和客户取舍曾被采纳，结果如何。每次计划员处理一次扰动，这个库都会更值钱。
