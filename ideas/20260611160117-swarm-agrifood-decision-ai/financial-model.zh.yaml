scenarios:
  downside:
    description: 试点到上线的转化变慢，客户扩工厂数更少，公司在 Y3 结束时只有约 52 个活跃工厂，而不是 72 个。
    y3RevenueK: 2280.0
    y3EbitdaK: -780.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - Q4Y3 活跃工厂约为 52 个，而不是 72 个。
    - 由于物流和采购增购走得慢，单工厂实现的 ARR 维持在约 $55K。
    - 实施工作更重、持续更久，毛利率会掉到 60% 高位。
  base:
    description: 一个网络在 Y1 扩到 4 个工厂，公司在 Y2 结束时做到约 7 家生产客户、28 个工厂，并在 Y3 结束时达到研究支持的 72 厂 SOM。
    y3RevenueK: 3090.0
    y3EbitdaK: -57.0
    cashLowPointK: 919.3
    keyAssumptionChanges:
    - 经常性价格维持在单活跃工厂约 $60K ARR。
    - 每家客户成熟后平均扩到约 4 个工厂。
    - 团队规模从 Y1 结束时的 5 FTE 增长到 Y3 结束时的 13 FTE。
  upside:
    description: 集成模板和伙伴转介绍显著缩短了部署时间，因此 Y3 结束时公司可做到约 84 个活跃工厂，并伴随适度的工作流驱动 ARPU 提升。
    y3RevenueK: 3660.0
    y3EbitdaK: 260.0
    cashLowPointK: 1120.0
    keyAssumptionChanges:
    - Q4Y3 活跃工厂达到约 84 个，而不是 72 个。
    - 随着交付和采购工作流挂上去，混合 ARR/工厂提升到接近 $65K。
    - 随着部署更模板化，毛利率提升到约 72%。
