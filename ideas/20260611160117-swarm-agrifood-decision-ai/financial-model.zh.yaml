modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Pilots[Paid pilot networks] --> Plants[Live plants]\n  Plants --> Revenue[Recurring revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Ending cash]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入，主要来自把“四厂网络扩张”这套动作不断重复，直到公司在 Q4Y3 做到约 72 个活跃工厂、单工厂约 $60K ARR。
- checkName: 必须跑通
  finding: 最早几批试点必须在约 6 个月内，从单厂扩到多厂生产上线，否则 Y2 工厂爬坡和 CAC 回收期都会恶化。
- checkName: 模型失效条件
  finding: 如果扩张停在约 52 个活跃工厂，或者实施负担让毛利率长期停在 60% 高位，现金曲线就会在拿到下一轮融资前滑向 downside。
- checkName: 下一轮融资证明点
  finding: 公司若能在 Y2 结束时做到约 28 个活跃工厂、拿出可复用集成，并证明 Y3 下半年季度 EBITDA 有望打平，就足以支撑下一轮融资。
sanityChecks:
  ruleOf40: Y3 增长 255.2% + EBITDA 利润率 -1.8% = 253.4%
  burnMultiple: Y2 burn multiple 0.8x（约 -$1.1M EBITDA，对应活跃工厂从 4 增至 28 带来的约 $1.4M 净新增 ARR）。
  revenuePerFte: $237.7K 的 Y3 revenue per FTE，按 Q4Y3 的 13 FTE 计算（落在通用 SaaS $200-400K 基准带内）。
  flags:
  - 模型假设一个样板客户能在 12 个月内从试点扩到 4 个工厂，这在保守的农食采购环境里可能偏慢。
  - 毛利率固定在 70%，但前 18 个月本来就集成重、合规重；如果定制实施过多，EBITDA 会明显低于计划。
  - 基准情景里，即使没有第二轮融资现金仍为正，但低点只剩约 $0.9M 缓冲；如果 Y2 rollout 更软，融资时间点大概率要提前。
