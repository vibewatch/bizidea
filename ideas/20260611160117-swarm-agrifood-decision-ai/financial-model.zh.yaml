date: '2026-06-11'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date 2026-06-11]；启发式假设：模型从计划生成后的下一个完整月份启动'
- id: A2
  name: pre-seed 融资后的期初现金
  value: '3200'
  unit: USD K
  source: '[BP fundingAsk round pre-seed and targetFundingRangeUsd $2-4M]；启发式假设：用 $3.2M 把公司带到 Y2 证明点，并留出 6 个月缓冲'
- id: A3
  name: 客户单位定义
  value: 活跃工厂
  unit: unit
  source: '[BP businessModel.unitOfValue Active plant under decision-memory coverage]'
- id: A4
  name: 单个完全展开客户网络的平均工厂数
  value: '4'
  unit: plants per customer
  source: '[Research market.som 18 customers averaging four plants each]'
- id: A5
  name: 单活跃工厂的年经常性收入
  value: '60'
  unit: USD K
  source: '[BP executiveSummary and gtm.pricing modeled ~$60k ARR per active plant]；[Research market TAM/SAM/SOM use $60k per plant]'
- id: A6
  name: 基准情景是否计入实施收入
  value: '0'
  unit: revenue uplift percent
  source: '[BP businessModel lists implementation and integration fees]；启发式假设：基准情景不计入一次性服务收入，这样收入能与活跃工厂 × 经常性 ARPU 干净对齐'
- id: A7
  name: 稳态毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70]'
- id: A8
  name: Y1 月末活跃工厂数
  value: 0,0,0,1,1,2,2,3,3,4,4,4
  unit: plants
  source: '[BP milestones 0-12 months convert at least 1 pilot into a multi-plant production rollout]；启发式假设：Y1 里一个网络按工厂逐步扩张'
- id: A9
  name: Y2 季末活跃工厂数
  value: 8,14,20,28
  unit: plants
  source: '[BP milestones 12-24 months reach 6-8 production customers with repeatable plant-by-plant expansion]；启发式假设：按 Q4Y2 约 7 家客户 × 平均 4 个工厂建模'
- id: A10
  name: Y3 季末活跃工厂数
  value: 40,52,64,72
  unit: plants
  source: '[BP market.som $4.3M year-3 ARR]；[Research market.som 18 customers averaging four plants each at $60k per plant]'
- id: A11
  name: 创始人或高管 FTE 的年化完全成本
  value: '180'
  unit: USD K
  source: 面向 pre-seed 垂直 SaaS 的创业财务启发式假设，包含现金薪酬、工资税和福利
- id: A12
  name: 工程 FTE 的年化完全成本
  value: '170'
  unit: USD K
  source: '[BP team requires founding eng and integration engineering talent]；创业财务启发式假设'
- id: A13
  name: 解决方案或实施 FTE 的年化完全成本
  value: '140'
  unit: USD K
  source: '[BP team includes agrifood solutions architect and customer success / implementation lead]；创业财务启发式假设'
- id: A14
  name: 销售 FTE 的年化完全成本
  value: '170'
  unit: USD K
  source: '[BP gtm is founder-led initially with one dedicated seller added later]；创业财务启发式假设'
- id: A15
  name: G&A FTE 的年化完全成本
  value: '120'
  unit: USD K
  source: 面向财务与运营支持的创业财务启发式假设
- id: A16
  name: 招聘节奏
  value: M1 创始人 CEO + 创始工程师；M2 农食解决方案架构师；M4 集成工程师；M7 客户成功 / 实施负责人；M13 首位 AE；M15 第 3 位工程师；M18 第 3 位解决方案 / 实施；M21 财务 / 运营；M25 第 2 位 AE；M28 第 4 位工程师；M31 第 4 位解决方案 / 实施；M34 第 3 位 AE
  unit: hires
  source: '[BP team startTiming list]；启发式假设：只有首个生产上线证明可复用后，才继续加 GTM 和运营岗位'
- id: A17
  name: Y1 非薪酬 Opex 爬坡
  value: 24,24,26,28,28,30,32,32,34,36,38,40
  unit: USD K per month
  source: '[BP operations, audit logging, deployment playbooks, and design-partner travel]；创业财务启发式假设'
- id: A18
  name: Y2 季度非薪酬 Opex
  value: 105,120,135,150
  unit: USD K per quarter
  source: '[BP 12-24 month milestones add channel work, more customer deployments, and reusable integration templates]；创业财务启发式假设'
- id: A19
  name: Y3 季度非薪酬 Opex
  value: 95,100,105,110
  unit: USD K per quarter
  source: '[BP 24-36 month milestones shift toward benchmarking and adjacent-template productization]；创业财务启发式假设'
- id: A20
  name: 单活跃工厂基础 CAC
  value: '25'
  unit: USD K
  source: '[BP gtm is founder-led around paid pilots and network rollout]；启发式假设：约等于每个 4 厂客户网络 $100K CAC'
- id: A21
  name: 单活跃工厂月流失率
  value: '1.2'
  unit: percent
  source: 面向高粘性但客户集中的关键垂直运营软件的创业财务启发式假设
