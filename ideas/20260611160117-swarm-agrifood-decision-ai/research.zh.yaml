competitors:
- name: SWARM Engineering
  stage: 规模化阶段
  wedge: 覆盖供应链、劳动力和物流的农食/制造决策智能
  pricing: 无公开定价；偏企业级部署
  strength: 它强有力地证明了，农食运营方愿意为场景驱动的决策软件买单，而且在意可审计结果。
  weaknessVsUs: 平台定位更宽，给一个聚焦配方、批次和交付的饲料厂决策记忆产品留出了空间。
  sourceRefs:
  - 1
  - 21
  - 22
  - 32
- name: BESTMIX
  stage: 现有厂商
  wedge: 覆盖配方、QC、ERP、采购和风险管理的饲料原生套件
  pricing: 无公开定价；看起来以询价为主
  strength: 它对饲料领域理解很深，工作流覆盖也广，从配方管理一直到 ERP 和质量控制。
  weaknessVsUs: 它更擅长优化配方和事务计划，而不是在多家工厂和客户优先级之间做实时跨部门例外剧本。
  sourceRefs:
  - 13
  - 14
  - 15
  - 28
- name: Datacor
  stage: 现有厂商
  wedge: 面向动物营养制造商的饲料 ERP 与配方/合规底座
  pricing: 无公开定价；企业软件以演示驱动
  strength: 集中数据中心、批次追踪、监管声明和多站点支持，让它在既有客户里非常黏。
  weaknessVsUs: 以 ERP 为中心的工作流，仍然填不上“有数据”和“在波动里快速做工厂级重排决策”之间的空档。
  sourceRefs:
  - 11
  - 12
  - 26
  - 27
- name: Easy Automation
  stage: 现有厂商
  wedge: 与工厂运营绑定的饲料厂自动化、订购和集成
  pricing: 以询价 / 演示驱动的自动化部署
  strength: 在工厂地面层有很强可信度，也有现成的集成面。
  weaknessVsUs: 它更靠近执行而不是决策支持，显然也不是围绕采购、配方和交付做一体化毛利控制驾驶舱。
  sourceRefs:
  - 16
  - 29
- name: AFOS
  stage: 成长期
  wedge: 带审批、审计链和按工厂订阅的高场景饲料配方软件
  pricing: 按工厂收月费或年费，并提供定制多年方案
  strength: 现代化 UX、情景推演配方、审批和跨站点协作，让它在中端市场很有时代感。
  weaknessVsUs: 它仍以配方经济性为中心，而不是把工厂、物流和客户服务串成完整网络决策闭环。
  sourceRefs:
  - 19
  - 20
  - 33
