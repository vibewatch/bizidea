openQuestions:
- 北美区域性饲料和预混料厂商里，到底有多少家真的是在 3–12 家工厂之间做集中化日常重排，而不是大多数决策仍由本地工厂自治？
- 现实里哪个工作流最容易最快释放预算：原料替代、批次重排，还是交付优先级调整？
- 买家会接受一个先从现有系统读取数据的叠加层产品，还是在愿意付出有意义 ARR 之前仍会要求更深的写回集成？
- 真正可防御的护城河，有多大来自计划员审批数据，又有多大来自现有厂商也可能收集到的大宗 / 物流结果数据？
