market:
  tam:
    value: $91.2M
    rationale: 'Bottom-up model: 5,650 U.S. animal food facilities + 429 Canadian commercial feed mills = 6,079 facilities; assume 25% are in multi-plant, centrally planned commercial networks that fit the ICP (about 1,520 plants) and $60k ARR per active plant based on plant-based subscription evidence plus quote-based mission-critical peers.'
    isEstimate: true
    sourceRefs:
    - 2
    - 4
    - 12
    - 20
  sam:
    value: $31.9M
    rationale: 'Apply a narrower beachhead filter: about 35% of modeled TAM plants are in regional 3–12 mill feed and premix networks where centralized procurement and daily replanning are acute, yielding about 532 plants at $60k ARR.'
    isEstimate: true
    sourceRefs:
    - 2
    - 4
    - 20
  som:
    value: $4.3M
    rationale: Reachable year-3 case assumes 18 customers, average 4 plants each, at $60k ARR per plant after proving one workflow and expanding plant-by-plant.
    isEstimate: true
    sourceRefs:
    - 1
    - 20
    - 21
