    - 23
  sensitivityCases:
  - case: Only 15% of North American feed facilities fit the multi-plant, centrally planned ICP rather than 25%
    impact: Modeled TAM falls from about $91.2M to about $54.7M before any pricing change, making adjacent-category expansion more important sooner.
    sourceRefs:
    - 2
