openQuestions:
- How many North American regional feed and premix producers truly operate with centralized daily replanning across 3–12 mills, rather than mostly local plant autonomy?
- 'Which workflow creates the fastest budget release in practice: ingredient substitutions, batch resequencing, or delivery reprioritization?'
- Will buyers tolerate an overlay product that reads from incumbent systems first, or will they still demand deeper write-back integrations before paying meaningful ARR?
- How much of the defensible moat comes from planner-approval data versus commodity/logistics outcome data that incumbents could also collect?
