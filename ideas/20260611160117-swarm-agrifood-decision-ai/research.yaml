  stage: incumbent
  wedge: Feed-native formulation, QC, ERP, procurement, and risk management suite
  pricing: No public pricing; suite appears quote-based
  strength: Deep feed ontology and broad workflow coverage from recipe management through ERP and quality control.
  weaknessVsUs: Optimizes formulation and transactional planning more than real-time cross-functional exception playbooks spanning mills and customer priorities.
  sourceRefs:
