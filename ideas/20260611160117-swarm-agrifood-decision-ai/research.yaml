competitors:
- name: SWARM Engineering
  stage: scale-up
  wedge: Agrifood/manufacturing decision intelligence across supply chain, labor, and logistics
  pricing: No public pricing; enterprise deployment model
  strength: Strong proof that agrifood operators will buy scenario-driven decision software and value auditable outcomes.
  weaknessVsUs: Broader platform positioning leaves room for a tighter feed-mill-specific decision-memory product centered on formulas, batches, and deliveries.
  sourceRefs:
