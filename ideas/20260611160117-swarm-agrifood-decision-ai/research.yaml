    - 20
  - case: Realized ARR lands closer to $40k per plant instead of $60k
    impact: TAM compresses to about $60.8M and year-3 SOM to about $2.9M unless the product captures additional logistics or procurement workflows.
    sourceRefs:
    - 12
    - 19
    - 20
  - case: Incumbent suites ship acceptable scenario and approval tooling faster than expected
    impact: Standalone wedge narrows, forcing differentiation around cross-functional decision memory, speed of deployment, and feed-specific playbooks rather than raw optimization.
    sourceRefs:
    - 14
    - 15
    - 21
    - 26
  validationPlan:
  - priority: high
    question: How many daily or weekly planner-call exceptions at target mills materially change margin, service level, or working capital?
    evidenceToGather: Capture 8–10 anonymized exception logs from regional feed manufacturers and quantify the dollar impact of formula, schedule, or delivery changes.
  - priority: high
    question: Can the product win without replacing incumbent formulation or ERP systems?
    evidenceToGather: Run design-partner pilots using exported formulas, inventory positions, and delivery commitments from two incumbent stacks and measure setup time to first approved recommendation.
  - priority: medium
    question: 'Which first workflow unlocks willingness to pay sooner: ingredient substitutions, batch resequencing, or delivery reprioritization?'
    evidenceToGather: Rank-order problems in interviews with COOs, supply-chain VPs, and mill planners across feed and premix operators.
  - priority: medium
    question: How much of planner trust depends on explainability versus measured margin outcomes?
    evidenceToGather: Shadow pilot sessions and postmortems that compare recommendation acceptance rates before and after adding rationale, approvals, and rollback visibility.
