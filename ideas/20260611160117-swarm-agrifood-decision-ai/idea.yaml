topRisks:
  - name: ERP suite encroachment
    description: Incumbent planning vendors could add basic AI what-if features and bundle them into existing APS or ERP contracts.
    mitigation: Win on plant-specific decision memory, faster implementation above incumbent systems, and agrifood-native playbooks rather than generic optimization screens.
  - name: Data quality drag
    description: Mills may have inconsistent inventory, formula, and transport data, which can weaken recommendation quality during early deployments.
    mitigation: Start with one high-value replanning workflow, add human-in-the-loop approval, and use lightweight connectors and confidence scoring before broad automation.
  - name: Change-management resistance
    description: Veteran planners may distrust recommendations that appear to challenge local judgment during high-pressure disruptions.
    mitigation: Position the product as a decision copilot that explains tradeoffs, preserves planner overrides, and proves value on postmortems before asking for deeper automation.
