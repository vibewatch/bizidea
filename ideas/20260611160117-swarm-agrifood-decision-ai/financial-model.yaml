scenarios:
  downside:
    description: "Pilot-to-rollout conversion slips, customers expand fewer plants, and the company exits Y3 with about 52 live plants instead of 72."
    y3RevenueK: 2280.0
    y3EbitdaK: -780.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - "Q4Y3 active plants finish around 52 instead of 72."
      - "Realized ARR per plant stays near $55K because logistics and procurement upsell lags."
      - "Gross margin falls to the high-60s as implementation work remains heavier for longer."
  base:
    description: "One network expands to four plants in Y1, the company reaches roughly seven production customers and 28 plants by Y2 exit, and it finishes Y3 at the research-backed 72-plant SOM."
    y3RevenueK: 3090.0
    y3EbitdaK: -57.0
    cashLowPointK: 919.3
    keyAssumptionChanges:
      - "Recurring price stays at about $60K ARR per active plant."
      - "Plant expansion inside each customer averages about four plants by maturity."
      - "Headcount rises from 5 FTE at Y1 exit to 13 FTE at Y3 exit."
  upside:
    description: "Integration templates and partner referrals shorten deployment time enough to finish Y3 with about 84 live plants and modest workflow-led ARPU expansion."
    y3RevenueK: 3660.0
    y3EbitdaK: 260.0
    cashLowPointK: 1120.0
    keyAssumptionChanges:
      - "Q4Y3 active plants reach about 84 instead of 72."
      - "Blended ARR per plant lifts toward $65K as delivery and procurement workflows attach."
      - "Gross margin improves to roughly 72% as deployment becomes more templated."
