modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Pilots[Paid pilot networks] --> Plants[Live plants]
      Plants --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes mainly from repeating a four-plant network rollout motion until the company reaches about 72 live plants by Q4Y3 at roughly $60K ARR per plant.
  - checkName: Must go right
    finding: The first few pilots must expand from one plant to multi-plant production within roughly six months or the Y2 plant ramp and CAC payback both deteriorate.
  - checkName: Model breaks if
    finding: If expansion stalls near 52 live plants or implementation work keeps gross margin in the high-60s, cash trends toward the downside case before the next financing is earned.
  - checkName: Next-round proof
    finding: The next round is justified by exiting Y2 with about 28 live plants, reusable integrations, and a credible path to H2 Y3 quarterly EBITDA breakeven.
sanityChecks:
  ruleOf40: "Y3 growth 255.2% + EBITDA margin -1.8% = 253.4%"
  burnMultiple: "Y2 burn multiple 0.8x (-$1.1M EBITDA on roughly $1.4M net new ARR from 4 to 28 active plants)."
  revenuePerFte: "$237.7K Y3 using Q4Y3 headcount of 13 FTE (inside the generic SaaS $200-400K benchmark band)."
  flags:
    - "The model assumes one reference customer can expand from pilot to four plants inside 12 months, which may prove slow in a conservative agrifood buying environment."
    - "Gross margin is held at 70% even though the first 18 months are integration- and compliance-heavy; too much bespoke implementation would push EBITDA meaningfully below plan."
    - "Cash stays positive without a second financing in the base case, but the buffer narrows to about $0.9M at the low point, so a softer Y2 rollout would likely force an earlier raise."
