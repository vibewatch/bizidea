differentiator: >-
  This is not another SDK generator; it is the neutral change-management and compatibility layer for the API surfaces that agents will actually use. Incumbent codegen tools help teams produce clients, but they do not help them migrate off platform-owned tooling, certify behavior across model ecosystems, or manage policy at the MCP and tool-runtime boundary. The defensible wedge is the combination of migration automation, cross-model compatibility data, and ownership of agent-specific interface telemetry across many API vendors.
