topRisks:
  - name: "Bundled platform competition"
    description: "Anthropic, OpenAI, cloud providers, or API management incumbents may bundle enough SDK and MCP tooling to narrow the independent wedge."
    mitigation: "Win on neutrality, migration support, and cross-model certification that bundled single-platform tools cannot credibly provide."
  - name: "Standards churn"
    description: "MCP, tool schemas, and agent runtime expectations may evolve quickly, making generated surfaces hard to keep stable."
    mitigation: "Treat the product as a compiler plus compatibility lab, update adapters continuously, and sell customers on managed change rather than a frozen standard."
  - name: "Narrow early market"
    description: "Only a subset of API companies may urgently need agent-ready surfaces in the next 12 months, slowing initial sales."
    mitigation: "Target late-stage API vendors already under enterprise pressure to ship MCP support and use migration services to create near-term budget."
