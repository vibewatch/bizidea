modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Targets[Target API vendors] --> Pilots[Paid migration pilots]
      Pilots --> Customers[Production API products under management]
      Customers --> Expansion[More SDKs, MCP surfaces, and policy modules]
      Customers --> Revenue[Recurring + migration revenue]
      Expansion --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash / runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by converting 3-5 paid design partners into 15 production customers by Q4Y2 and expanding to 40 managed API products at roughly $105K blended ACV by Q4Y3.
  - checkName: Must go right
    finding: Pilot-to-production conversion has to stay strong enough that recurring platform revenue scales before the second AE and later engineering hires fully hit the cost base.
  - checkName: Model breaks if
    finding: If sales cycles stretch toward 9 months or mature ACV stays closer to $95K, the downside case turns cash negative before the company earns a clean next-round story.
  - checkName: Next-round proof
    finding: The next financing case is 15 production customers, visible second-product expansion, and a roughly $1.4M ARR exit rate at Q4Y2 with six months of cash still available.
sanityChecks:
  ruleOf40: Y3 growth 208.1% + EBITDA margin -35.8% = 172.3% (directionally strong but inflated by the small Y2 revenue base).
  burnMultiple: Y2 burn multiple is about 1.7x (EBITDA burn $1.7M / net new ARR run-rate about $1.0M from Q4Y1 to Q4Y2).
  revenuePerFte: $244K Y3 revenue per year-end FTE (benchmark ~$200-400K enterprise SaaS heuristic).
  flags:
    - The model still assumes a heavy services component in the first 18 months, so gross margin only reaches the 75% target by Y3.
    - Base-case ending cash is thin by Q4Y3, which means any fundraise delay or slower pilot conversion would tighten runway quickly.
    - The jump from 15 customers at Q4Y2 to 40 by Q4Y3 requires outbound, referrals, and implementation capacity to become materially more repeatable than the first-year motion proves.
    - Year-3 EBITDA remains negative, so the next round depends on ARR quality and expansion evidence more than near-term profitability.
