assumptions:
  - id: A1
    name: Opening cash from seed close at model start
    value: '4200.0'
    unit: USDK
    source: '[BP fundingAsk targetFundingRangeUsd $3-5M] + model rule to carry the company to the Q4Y2 milestone with 6 months of cash buffer.'
  - id: A2
    name: Starting customers (M1)
    value: '0'
    unit: count
    source: '[BP executiveSummary + product] the company is pre-revenue at model start and begins with design-partner selling.'
  - id: A3
    name: Y1 customer ramp
    value: 5 customers by M12
    unit: count
    source: '[BP milestones 0-12 months] sign 3-5 paid design partners and convert at least 2 pilots into annual subscriptions; monthly interpolation heuristic.'
  - id: A4
    name: Y2 customer ramp
    value: 15 customers by Q4Y2
    unit: count
    source: '[BP milestones 12-24 months] explicit target of 10-15 production customers and multi-product expansion; quarterly path 7, 10, 13, 15.'
  - id: A5
    name: Y3 customer ramp
    value: 40 customers by Q4Y3
    unit: count
    source: '[BP market SOM + research market.som] 40 customers at roughly $105K blended ACV is the stated year-3 SOM; quarterly path 22, 28, 34, 40.'
  - id: A6
    name: Y1 blended annual revenue per active customer
    value: '84.0'
    unit: annualK
    source: '[BP gtm pricing + investorMemo firstCustomer] combines a $25K-$40K pilot/migration fee with partial-year platform subscription revenue in the land year.'
  - id: A7
    name: Y2 blended annual revenue per active customer
    value: '95.0'
    unit: annualK
    source: '[BP gtm pricing + businessModel revenueStreams] customers shift from pilots into annual platform contracts with attached certification and migration services.'
  - id: A8
    name: Y3 blended annual revenue per active customer
    value: '105.0'
    unit: annualK
    source: '[BP market SOM + research market.som] year-3 blend anchored to 40 customers × ~$105K ACV = ~$4.2M ARR run-rate.'
  - id: A9
    name: Gross margin ramp
    value: 68.0 in Y1, 73.0 in Y2, 75.0 in Y3
    unit: percent
    source: '[BP businessModel targetGrossMarginPct 75] + heuristic that early migration work and white-glove onboarding suppress gross margin before tooling matures.'
  - id: A10
    name: Monthly logo churn for unit economics
    value: '1.5'
    unit: percent
    source: '[BP strategicChoices beachhead] + seed-stage enterprise infrastructure heuristic for annual-contract customers with some early product risk.'
  - id: A11
    name: Founder-GTM loaded compensation
    value: '180.0'
    unit: annualK
    source: '[BP team Founder-GTM] + startup-finance heuristic for a modest founder cash salary plus burden.'
  - id: A12
    name: Engineering loaded compensation
    value: '210.0'
    unit: annualK
    source: '[BP team Founding eng + Compiler and integrations engineer + Compatibility and trust engineer] + startup-finance heuristic for US infrastructure engineers.'
  - id: A13
    name: Solutions engineer loaded compensation
    value: '190.0'
    unit: annualK
    source: '[BP team Solutions engineer] + startup-finance heuristic for a technical implementation hire supporting pilots and security review.'
  - id: A14
    name: Account executive loaded compensation
    value: '240.0'
    unit: annualK
    source: '[BP team Account executive] + startup-finance heuristic for seed-stage enterprise AE OTE and payroll burden.'
  - id: A15
    name: Product hire loaded compensation
    value: '200.0'
    unit: annualK
    source: '[BP sequencingRationale + product roadmap] heuristic for the first PM/platform owner added once the pilot motion is repeatable.'
  - id: A16
    name: Ops and finance loaded compensation
    value: '150.0'
    unit: annualK
    source: '[BP operations + fundingAsk useOfFundsSummary] heuristic for a late back-office hire after product-market proof improves.'
  - id: A17
    name: Hiring schedule
    value: Compiler engineer M3; solutions engineer M5; compatibility engineer M7; AE1 M10; product hire M15; AE2 M18; engineer 4 M21; engineer 5 M28; second solutions hire M31; ops hire M33
    unit: timing
    source: '[BP team startTiming + strategicChoices sequencingRationale] later hires are smoothed with finance heuristics so GTM scales only after pilot conversion is visible.'
  - id: A18
    name: Y1 non-payroll opex
    value: 28.0-46.0 per month
    unit: USDK
    source: '[BP experimentRoadmap + operations] + heuristic for cloud spend, legal, travel, security review support, and pilot implementation tooling.'
  - id: A19
    name: Y2 non-payroll opex
    value: 170.0-230.0 per quarter
    unit: USDK
    source: '[BP milestones 12-24 months + operations] heuristic for higher cloud usage, partner enablement, and customer delivery support as accounts go live.'
  - id: A20
    name: Y3 non-payroll opex
    value: 235.0-290.0 per quarter
    unit: USDK
    source: '[BP product twentyFourMonth + operations] heuristic for larger support, compliance, and telemetry costs as the platform broadens.'
  - id: A21
    name: Revenue recognition method
    value: Average active customers in period × stage ARPU
    unit: formula
    source: '[BP pricing + milestones] modeling convention so recognized revenue reconciles directly to customer counts without a separate cohort table.'
  - id: A22
    name: Steady-state CAC
    value: '55.0'
    unit: USDK
    source: '[BP gtm wedge + founder-led outbound motion] + heuristic for enterprise migration sales with paid pilots and long security review cycles.'
  - id: A23
    name: Funding ask sizing rule
    value: Reach Q4Y2 milestone plus 6 months of buffer
    unit: policy
    source: '[BP fundingAsk runwayMonths 18] extended to the explicit model requirement of 6 months of post-milestone cash buffer.'
  - id: A24
    name: Cash flow simplification
    value: Ending cash = opening cash + cumulative EBITDA
    unit: formula
    source: Heuristic for a software company with minimal capex, debt, and working-capital swings in the first 3 years.
