scenarios:
  downside:
    description: Bundled platform features slow urgency, pilot conversion falls, and the company exits Y3 at 30 customers with a lower $95K blended ACV.
    y3RevenueK: 2200.0
    y3EbitdaK: -1500.0
    cashLowPointK: -450.0
    keyAssumptionChanges:
      - Q4Y3 customers end at 30 instead of 40.
      - Mature blended ARPU is $95K instead of $105K.
      - Gross margin stalls near 72% because migration work remains service-heavy.
  base:
    description: 'Base case matches the core plan: 5 customers in Y1, 15 in Y2, and 40 by Q4Y3 at the year-3 SOM blend of about $105K ACV.'
    y3RevenueK: 2926.8
    y3EbitdaK: -1047.4
    cashLowPointK: 224.7
    keyAssumptionChanges:
      - No changes versus assumptions A1-A24.
  upside:
    description: Migration urgency converts faster, referrals accelerate new logos, and the company reaches 45 customers with richer premium-module attach by Y3.
    y3RevenueK: 3410.0
    y3EbitdaK: -620.0
    cashLowPointK: 650.0
    keyAssumptionChanges:
      - Q4Y3 customers end at 45 instead of 40.
      - Mature blended ARPU rises to $110K as certification and policy modules attach sooner.
      - Gross margin reaches 77% as onboarding and testing automation improve.
