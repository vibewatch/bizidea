scenarios:
  downside:
    description: 如果平台打包功能削弱了紧迫性、试点转化走弱，公司会在 Y3 末停在 30 个客户，blended ACV 也降到 $95K。
    y3RevenueK: 2200.0
    y3EbitdaK: -1500.0
    cashLowPointK: -450.0
    keyAssumptionChanges:
    - Q4Y3 客户数收在 30，而不是 40。
    - 成熟期 blended ARPU 变成 $95K，而不是 $105K。
    - 由于迁移工作依旧偏服务化，毛利率停在约 72%。
  base:
    description: 基准情形就是核心计划：Y1 做到 5 个客户，Y2 做到 15 个，Q4Y3 达到 40 个，并对应第 3 年约 $105K ACV 的 SOM 假设。
    y3RevenueK: 2926.8
    y3EbitdaK: -1047.4
    cashLowPointK: 224.7
    keyAssumptionChanges:
    - 与 A1-A24 假设相比，不做额外调整。
  upside:
    description: 如果迁移紧迫性能更快转化、转介绍加速拿新客户，公司在 Y3 有机会做到 45 个客户，并更早挂上高价值高级模块。
    y3RevenueK: 3410.0
    y3EbitdaK: -620.0
    cashLowPointK: 650.0
    keyAssumptionChanges:
    - Q4Y3 客户数收在 45，而不是 40。
    - 随着认证和策略模块更早 attach，成熟期 blended ARPU 提升到 $110K。
    - 随着 onboarding 和测试自动化改善，毛利率提升到 77%。
