modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Targets[Target API vendors] --> Pilots[Paid migration pilots]\n  Pilots --> Customers[Production API products under management]\n  Customers --> Expansion[More SDKs, MCP surfaces, and policy modules]\n  Customers --> Revenue[Recurring + migration revenue]\n  Expansion --> Revenue\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash / runway]"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入增长，靠的是把 3-5 个付费共创客户转成 Q4Y2 的 15 个生产客户，再在 Q4Y3 扩到 40 个受管 API 产品，blended ACV 约 $105K。
- checkName: 必须成立的前提
  finding: 试点转生产的转化必须足够强，才能让经常性平台收入在第二位 AE 和后续工程招聘把成本打满之前先长起来。
- checkName: 模型失效条件
  finding: 如果销售周期拉长到 9 个月，或成熟 ACV 更接近 $95K，downside 情形会在公司讲出清晰下一轮融资故事之前先把现金打穿。
- checkName: 下一轮融资证明点
  finding: 下一轮融资叙事要建立在 15 个生产客户、可见的第二产品扩张，以及到 Q4Y2 退出时约 $1.4M ARR、且手里仍有 6 个月现金之上。
sanityChecks:
  ruleOf40: Y3 增长 208.1% + EBITDA 利润率 -35.8% = 172.3%（方向上很强，但也被 Y2 收入基数偏小放大了）。
  burnMultiple: Y2 burn multiple 约 1.7x（EBITDA burn 为 $1.7M，而从 Q4Y1 到 Q4Y2 的净新增 ARR run-rate 约 $1.0M）。
  revenuePerFte: Y3 年末每位 FTE 对应约 $244K 收入（对比企业 SaaS 常见经验区间约 $200-400K）。
  flags:
  - 模型仍假设前 18 个月服务成分较重，所以毛利率要到 Y3 才摸到 75% 目标。
  - 基准情形下，Q4Y3 的期末现金已经很薄，融资稍有延迟或试点转化稍慢，runway 就会迅速收紧。
  - 从 Q4Y2 的 15 个客户跳到 Q4Y3 的 40 个，意味着 outbound、转介绍和实施能力都必须比第一年显著更可复制。
  - Y3 的 EBITDA 依旧为负，因此下一轮融资更依赖 ARR 质量和扩张证据，而不是短期盈利。
