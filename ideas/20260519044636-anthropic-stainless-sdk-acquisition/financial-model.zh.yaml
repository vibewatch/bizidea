slug: sdk-mcp-migration-plane
date: '2026-05-19'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份 seed 轮到账后的期初现金
  value: '4200.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $3-5M] + 模型规则：公司要跑到 Q4Y2 里程碑后仍保留 6 个月现金缓冲。'
- id: A2
  name: 起始客户数（M1）
  value: '0'
  unit: count
  source: '[BP executiveSummary + product] 模型起点时公司尚未产生收入，先从共创客户销售起步。'
- id: A3
  name: Y1 客户爬坡
  value: 5 customers by M12
  unit: count
  source: '[BP milestones 0-12 months] 明确目标是签下 3-5 个付费共创客户，并把至少 2 个试点转成年费订阅；月度路径按插值处理。'
- id: A4
  name: Y2 客户爬坡
  value: 15 customers by Q4Y2
  unit: count
  source: '[BP milestones 12-24 months] 明确目标是做到 10-15 个生产客户并实现多产品扩张；季度路径取 7、10、13、15。'
- id: A5
  name: Y3 客户爬坡
  value: 40 customers by Q4Y3
  unit: count
  source: '[BP market SOM + research market.som] 40 个客户、约 $105K blended ACV 是第 3 年 SOM 的明确假设；季度路径取 22、28、34、40。'
- id: A6
  name: Y1 单活跃客户 blended 年收入
  value: '84.0'
  unit: annualK
  source: '[BP gtm pricing + investorMemo firstCustomer] 首年 land 包含 $25K-$40K 的试点 / 迁移费，以及部分年度平台订阅收入。'
- id: A7
  name: Y2 单活跃客户 blended 年收入
  value: '95.0'
  unit: annualK
  source: '[BP gtm pricing + businessModel revenueStreams] 客户从试点转向年度平台合同，并叠加认证与迁移服务。'
- id: A8
  name: Y3 单活跃客户 blended 年收入
  value: '105.0'
  unit: annualK
  source: '[BP market SOM + research market.som] 第 3 年假设锚定为 40 个客户 × 约 $105K ACV = 约 $4.2M ARR run-rate。'
- id: A9
  name: 毛利率爬坡
  value: 68.0 in Y1, 73.0 in Y2, 75.0 in Y3
  unit: percent
  source: '[BP businessModel targetGrossMarginPct 75] + 模型假设：早期迁移服务和高触达 onboarding 会压低毛利，直到工具链成熟。'
- id: A10
  name: 单位经济模型里的月度 logo churn
  value: '1.5'
  unit: percent
  source: '[BP strategicChoices beachhead] + seed 阶段企业基础设施软件的经验值：客户以年约为主，但早期仍有一定产品风险。'
- id: A11
  name: 创始人/GTM 全包成本
  value: '180.0'
  unit: annualK
  source: '[BP team Founder-GTM] + 创业公司财务经验值：创始人现金薪资相对克制，但包含完整负担成本。'
- id: A12
  name: 工程岗位全包成本
  value: '210.0'
  unit: annualK
  source: '[BP team Founding eng + Compiler and integrations engineer + Compatibility and trust engineer] + 美国基础设施工程师的 startup-finance 经验值。'
- id: A13
  name: 解决方案工程师全包成本
  value: '190.0'
  unit: annualK
  source: '[BP team Solutions engineer] + 支持试点交付和安全评审的技术实施岗位经验值。'
- id: A14
  name: 客户经理全包成本
  value: '240.0'
  unit: annualK
  source: '[BP team Account executive] + seed 阶段企业 AE 的 OTE 与 payroll 负担经验值。'
- id: A15
  name: 产品岗位全包成本
  value: '200.0'
  unit: annualK
  source: '[BP sequencingRationale + product roadmap] 当试点打法开始可复制后，补第一个 PM / 平台 owner 的经验值假设。'
- id: A16
  name: 运营与财务全包成本
  value: '150.0'
  unit: annualK
  source: '[BP operations + fundingAsk useOfFundsSummary] 在产品市场验证更明确后，再补后台运营 / 财务岗位的经验值假设。'
- id: A17
  name: 招聘节奏
  value: Compiler engineer M3; solutions engineer M5; compatibility engineer M7; AE1 M10; product hire M15; AE2 M18; engineer 4 M21; engineer 5 M28; second solutions hire M31; ops hire M33
  unit: timing
  source: '[BP team startTiming + strategicChoices sequencingRationale] 后续招聘按财务经验值做了平滑：只有在看到试点转化后，GTM 才开始放大。'
- id: A18
  name: Y1 非薪资 opex
  value: 28.0-46.0 per month
  unit: USDK
  source: '[BP experimentRoadmap + operations] 云成本、法务、差旅、安全评审支持和试点实施工具的经验值假设。'
- id: A19
  name: Y2 非薪资 opex
  value: 170.0-230.0 per quarter
  unit: USDK
  source: '[BP milestones 12-24 months + operations] 随着账户上线，云用量、伙伴 enablement 和客户交付支持上升的经验值假设。'
- id: A20
  name: Y3 非薪资 opex
  value: 235.0-290.0 per quarter
  unit: USDK
  source: '[BP product twentyFourMonth + operations] 平台扩宽后，支持、合规和遥测成本上升的经验值假设。'
- id: A21
  name: 收入确认方法
  value: Average active customers in period × stage ARPU
  unit: formula
  source: '[BP pricing + milestones] 建模约定：按期间平均活跃客户数 × 阶段 ARPU 确认收入，不再单独建 cohort 表。'
- id: A22
  name: 稳定期 CAC
  value: '55.0'
  unit: USDK
  source: '[BP gtm wedge + founder-led outbound motion] 企业迁移销售、付费试点和长安全评审周期下的经验值。'
- id: A23
  name: 融资规模规则
  value: Reach Q4Y2 milestone plus 6 months of buffer
  unit: policy
  source: '[BP fundingAsk runwayMonths 18] 再往前延长到模型要求：到达 Q4Y2 里程碑后仍保留 6 个月现金缓冲。'
- id: A24
  name: 现金流简化规则
  value: Ending cash = opening cash + cumulative EBITDA
  unit: formula
  source: 面向软件公司的简化假设：前 3 年 capex、债务和营运资本波动都很小。
