  sensitivityCases:
  - case: Platform vendors bundle enough native admin controls
    impact: Pricing power compresses if Anthropic, OpenAI, Google, or AWS make SDK/MCP packaging good enough inside their own ecosystems; the startup then must win on neutrality, migration automation, and cross-model proof rather than raw generation.
