  validationPlan:
  - priority: high
    question: How many late-stage API companies now need to replace or de-risk a vendor-linked SDK generation workflow in the next two quarters?
    evidenceToGather: 15-20 interviews with platform leaders at API-first companies plus at least 5 active migration project plans triggered by SDK or MCP roadmap changes.
  - priority: high
    question: Will buyers pay first for migration automation, for cross-model certification, or for runtime policy controls?
    evidenceToGather: Discovery calls that force prospects to rank migration, certification, and policy modules against current internal alternatives and existing vendor spend.
  - priority: medium
    question: Do enterprise prospects want one neutral control plane for both human SDKs and agent surfaces, or do they budget those separately?
    evidenceToGather: Procurement notes from pilots plus redlined security questionnaires covering SDKs, MCP servers, and tool runtime approvals.
  - priority: medium
    question: Which regulated buyers are blocked specifically by data-retention, authorization, or remote-server trust issues?
    evidenceToGather: Security review outcomes across fintech, health, and infrastructure companies, including ZDR or self-hosting requirements.
