problem: 现在的 API 公司不只要发给开发者用的 SDK，还得一起交付 MCP server 和面向 agent 的工具接口。但很多团队依旧依赖跟厂商绑定的生成器，或者自己手搓流水线；只要规范、鉴权流程、模型平台要求一变，这套东西就会断。Anthropic 收购 Stainless，把一层被广泛采用的中立工具栈收进了自家平台基础设施，TechCrunch 还称托管生成器会被关停。偏偏这时候，企业客户正密集追问 API 能不能顺畅接入 Claude 等 agent 栈，平台团队于是直接暴露在供应商集中风险下。现有 codegen 工具会产出 client，但给不了迁移安全、跨模型兼容性测试，也给不了一套中立的 agent 接口控制平面。
targetUser:
  primary: API-first 软件公司的平台工程与开发者基础设施负责人：他们手上有多套官方 SDK，企业客户也开始要求 agent 集成。
  secondary: 负责外部 API 增长与合作伙伴集成的开发者关系和产品团队。
  buyer: VP Platform、开发者体验负责人，或 API 产品线 GM。
startupThesis:
  nonObviousInsight: 真正稀缺的已经不是 SDK 代码生成本身，而是对机器接口面的中立控制权——agents 在这里发现 API、完成鉴权，并安全发起调用。一旦模型厂商把 SDK 和 MCP 这层握在手里，独立 API 公司最容易丢掉的，就是 agent 时代最关键分发边缘上的路线图主导权、可移植性和遥测数据。
  beachhead: 首批客户锁定在 Series B 到上市阶段的 API-first SaaS 与基础设施公司：平台工程师 5-20 人、至少 3 套官方 SDK、已有 OpenAPI 规范，并且 2026 年被明确要求为评估 Claude 和 OpenAI agents 的企业客户上线 MCP server 或工具端点。
  wedge: 从一份 API 合同出发，生成带版本管理的 SDK、MCP server、鉴权策略、changelog diff 测试，以及跨模型兼容性认证的迁移与运行时控制平面。
  whyNowCatalyst: Anthropic 的收购，加上外界报道中 Stainless 托管产品将被关停，让中立的 SDK 与 MCP 基础设施一下子变成刚需；而此时模型平台又都在争夺 agent 如何连接第三方工具。
  ventureScalePath: 先做外部 API 公司，再往内扩到企业内部 API、合作伙伴生态和受监管数据服务，最后成为所有面向 agents 的机器接口面的默认控制平面。
solution: 产品导入 OpenAPI 或类似合同，把它当成唯一受治理的事实源，直接生成生产级 SDK、MCP server 和 agent 工具描述。它再补上一层迁移工具：对比生成结果、标出 breaking changes，让团队替换掉厂商自有流水线时，不必把每一次 SDK 发布流程都重写一遍。兼容性实验室会在主流模型生态上跑合同、鉴权和 tool-call 测试，让 API 团队能证明哪些端点能稳定跑在 Claude、OpenAI、Google 和后续 agent runtime 上。系统还会提供 rate limit、OAuth scope、人工审批要求，以及 agent 流量和人类开发者流量的可观测性策略。时间一长，公司就会变成 API 卖向 agent 经济时那层中立分发与质量控制基础设施。
goToMarketSeed:
  firstCustomer: 首个客户应是一家偏后期的金融科技、云基础设施或开发者工具 API 平台：它已经发布了多套自动生成 SDK，而且本季度就有一个企业共创客户要求补上 MCP 支持。
  buyingTrigger: 触发购买的节点，要么是 Stainless 被收购后的路线图复盘，要么是管理层下令：必须上线 agent-ready 接口面，但不能被单一模型厂商绑死。
  currentAlternative: 内部 codegen 脚本、Stainless 或同类 SDK 生成器、人工维护 SDK，以及由平台工程师零散维护的 MCP 原型。
  switchingReason: 首个客户会切换，因为这套产品既守住厂商中立性，又能显著缩短 SDK 与 MCP server 的上线时间，同时把鉴权损坏、版本漂移和模型特定集成失败的风险压下去。
  pricingHypothesis: 按 API 产品数量和生成出来的接口面收年费；兼容性测试与托管式迁移支持再额外收费。
