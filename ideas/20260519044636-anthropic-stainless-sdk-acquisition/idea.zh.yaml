differentiator: 这不是又一个 SDK 生成器，而是 agents 真正会调用的 API 接口面的中立变更管理与兼容性层。现有 codegen 工具能帮团队产出 client，但帮不了他们从平台自有工具迁出来、在多模型生态里做行为认证，也管不了 MCP 与 tool runtime 边界上的策略。真正能守住的切口，是迁移自动化、跨模型兼容性数据，以及跨多个 API 厂商沉淀出来的 agent 接口遥测。
