topRisks:
- name: 平台捆绑竞争
  description: Anthropic、OpenAI、云厂商或 API 管理 incumbent 可能把 SDK 与 MCP 工具打包到足够好，从而压窄独立厂商的切口。
  mitigation: 靠中立性、迁移支持和跨模型认证取胜——这些都是单平台打包工具很难有公信力做好的。
- name: 标准快速变化
  description: MCP、工具 schema 和 agent runtime 预期都可能高速演进，导致生成出来的接口面很难长期稳定。
  mitigation: 把产品当成“编译器 + 兼容性实验室”来做，持续更新 adapter，卖的是托管式变化管理，而不是一套静态标准。
- name: 早期市场偏窄
  description: 未来 12 个月里，真正急着补齐 agent-ready 接口面的 API 公司可能只占一小部分，首轮销售会慢。
  mitigation: 先盯住那些已经承受企业压力、必须上线 MCP 支持的偏后期 API 厂商，并用迁移服务先把近期预算撬出来。
