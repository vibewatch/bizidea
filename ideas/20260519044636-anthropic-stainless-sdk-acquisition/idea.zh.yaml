jobsToBeDone:
- job: 当企业客户追问我们的 API 能不能跑在 Claude 等 agents 上时，帮平台团队尽快交付一套稳定的 MCP 与 SDK 接口面，这样他们能拿下集成机会，而不用把整条发布流水线重做。
  currentAlternative: 手工 MCP 原型，加上现有 SDK 生成脚本和零散 QA。
  successMetric: 新的 agent-ready 接口面上线时间从数月压到数周，同时关键鉴权或 schema 回归为 0。
- job: 当厂商收购或工具关停威胁到 SDK 路线图时，帮我们迁到中立控制平面，而且不影响开发者体验，这样我们还能继续掌握 API 的分发权和遥测数据。
  currentAlternative: 内部重建项目，或继续依赖厂商自有生成器。
  successMetric: SDK 与 MCP 迁移不漏掉任何发布周期，迁移后缺陷率低于 1%。
