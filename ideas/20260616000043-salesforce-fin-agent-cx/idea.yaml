problem: >-
  Support leaders are being told AI agents can now resolve most repetitive
  tickets, but moving from a point tool into a suite like Agentforce means
  remapping knowledge, macros, routing, and escalation policy across every
  digital channel. One bad cutover can quietly lower resolution,
  over-escalate edge cases, or create policy breaches before weekly CSAT
  reports reveal the damage. Today teams rely on vendor demos, tiny pilots,
  systems-integrator test scripts, and manual QA on a few transcripts, which
  is too weak for a platform decision tied to millions in support spend.
targetUser:
  primary: "Support systems and CX automation leaders at B2B SaaS companies moving customer-support workflows from point AI tools into Salesforce-centered stacks."
  secondary: "Support QA managers and knowledge-operations teams that own macros, routing rules, and escalation policy."
  buyer: "VP Customer Support, VP CX Operations, or Director of Support Systems"
startupThesis:
  nonObviousInsight: >-
    Once support agents can resolve most repetitive tickets, the scarce layer is
    no longer the model; it is the neutral cutover system that can replay a
    company's own conversations, compare outcomes, and package the knowledge,
    workflow, and escalation fixes required before traffic shifts.
    Consolidation makes that layer newly urgent because the vendors selling the
    destination stack are the least trusted parties to grade the migration.
  beachhead: >-
    Series C to public B2B SaaS companies with 50 to 250 digital support
    agents, Salesforce as CRM, a separate helpdesk or chat stack already
    running AI automation, and a 2026 renewal or consolidation project to move
    customer-support workflows into Agentforce.
  wedge: >-
    A shadow-mode cutover plane that replays historical tickets and mirrors live
    text conversations through the incumbent stack and Agentforce, then
    surfaces resolution, escalation, and policy differences before launch.
  whyNowCatalyst: >-
    Salesforce buying Fin after citing 76% end-to-end autonomous resolution and
    fast deployment turns support-platform renewals into immediate migration
    decisions rather than slow lab experiments.
  ventureScalePath: >-
    Start with Agentforce migrations for support orgs already anchored on
    Salesforce, then expand into vendor-neutral benchmarking, multi-agent
    routing, and continuous regression monitoring across support, sales, and IT
    service agents.
solution: >-
  The product connects to Salesforce, the incumbent helpdesk, knowledge base,
  macros, and workflow logs, then converts historical tickets into a replay
  suite for candidate agent stacks. Before a migration, it runs side-by-side
  comparisons on the customer's own cases and scores resolution rate,
  escalation behavior, handle time, and policy adherence. During rollout, it
  mirrors a slice of live chat, messaging, or Slack conversations in shadow
  mode so the support team can see where Agentforce would answer differently
  before customers experience the change. It then generates a cutover pack:
  knowledge gaps to fix, workflows that need human fallback, and rollback
  triggers for launch week. That turns a vendor-led bake-off into a neutral,
  data-backed deployment decision.
goToMarketSeed:
  firstCustomer: >-
    A 500 to 2,000 employee B2B SaaS company with 75 to 200 support agents,
    Salesforce CRM, 20,000-plus monthly digital support conversations, and a
    Q3 or Q4 2026 renewal where the COO wants proof that moving into
    Agentforce will not reduce resolution or spike escalations.
  buyingTrigger: >-
    A helpdesk renewal, a board- or COO-driven cost review, or a post-deal
    platform review immediately after the Salesforce-Fin acquisition pushes the
    team to justify whether to consolidate onto Agentforce.
  currentAlternative: >-
    Vendor-led pilots, manual transcript QA, systems-integrator migration
    projects, and staying on the current stack because switching risk is hard
    to measure.
  switchingReason: >-
    The first customer switches because the product uses its own historical and
    live conversations to quantify resolution, escalation, and policy drift
    before a cutover, which is more credible than a demo or a tiny pilot.
  pricingHypothesis: >-
    Annual platform subscription priced by monthly mirrored conversations and
    active migration programs, plus implementation fees for connectors and
    cutover playbooks.
