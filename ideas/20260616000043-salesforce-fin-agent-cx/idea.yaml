ideaScorecard:
  signalStrength:
    score: 4
    rationale: "A $3.6 billion acquisition, a 30,000-company footprint, and a cited 76% resolution rate make the signal strong, though it is concentrated in one incumbent-led deal."
  painIntensity:
    score: 4
    rationale: "A bad support-agent migration directly threatens resolution, CSAT, and escalation load, which creates real pain for support leaders making stack decisions."
  wedgeClarity:
    score: 5
    rationale: "A shadow-mode cutover plane for AI support-agent migrations is a narrow, event-triggered product with a clear first workflow and buyer."
  defensibility:
    score: 4
    rationale: "Defensibility can build through the replay corpus, integration depth, workflow-diff engine, and benchmark data showing what breaks across real migrations."
  ventureScale:
    score: 5
    rationale: "If the company becomes the neutral control plane for benchmarking and migrating support agents, it can expand into continuous routing, QA, and adjacent service-agent categories."
topRisks:
  - name: "Incumbent bundling"
    description: "Salesforce or other suite vendors could ship basic migration dashboards and bundle them into broader platform deals."
    mitigation: "Go deeper on neutral replay, cross-vendor comparison, and post-cutover regression monitoring that no single vendor can provide credibly."
  - name: "Slow switch cycles"
    description: "Some support teams may postpone migration and keep current automations if renewal dates or executive pressure are weak."
    mitigation: "Target accounts already in renewal, M&A, or cost-reduction reviews and sell an initial paid benchmark that informs a live platform decision."
  - name: "Integration sprawl"
    description: "Connecting transcripts, macros, knowledge bases, routing rules, and action logs across support stacks can slow deployments and compress gross margin."
    mitigation: "Start with read-only connectors for Salesforce plus the most common digital support systems, keep the first wedge on text channels, and use services-assisted onboarding."
