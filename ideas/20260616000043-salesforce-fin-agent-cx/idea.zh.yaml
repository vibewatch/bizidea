problem: 客服负责人现在都在被告知，AI 智能体已经能解决大部分重复工单。但要把点状工具迁进 Agentforce 这类套件，就得把知识库、宏、路由和升级策略在所有数字渠道上重新映射一遍。一次切换做砸，解决率会悄悄掉，边缘场景会被过度升级，甚至先出现策略违规，等周报里的 CSAT 出来时才看见损失。今天团队还是靠厂商演示、小范围试点、系统集成商的测试脚本，以及抽几段对话手工做 QA；对一个一年要花数百万支持预算的平台决策来说，这套证据太弱。
targetUser:
  primary: 正在把客服工作流从点状 AI 工具迁进以 Salesforce 为核心栈的 B2B SaaS 公司里的客服系统与 CX 自动化负责人。
  secondary: 负责宏、路由规则和升级策略的客服 QA 经理与知识运营团队。
  buyer: 客服副总裁、CX 运营副总裁或客服系统总监
startupThesis:
  nonObviousInsight: 当客服智能体已经能吃掉大多数重复工单，稀缺的不再是模型，而是一套中立的切换系统：能回放公司自己的对话、对比结果，并在流量切过去之前，把知识、工作流和升级规则要补的坑打包出来。并购加速让这层突然变得更急，因为卖目标平台的厂商，恰恰最不值得信任来给这次迁移打分。
  beachhead: 从 Series C 到上市阶段的 B2B SaaS 公司：有 50 到 250 名数字化客服坐席，以 Salesforce 为 CRM，已经在独立帮助台或聊天栈里跑 AI 自动化，并且在 2026 年有续约或整合项目，要把客服工作流迁进 Agentforce。
  wedge: 一套影子模式切换平台：把历史工单回放到现有栈和 Agentforce 里，再把实时文本对话镜像过去，上线前就把解决率、升级和策略差异翻出来。
  whyNowCatalyst: Salesforce 收购 Fin，而且引用了 76% 的端到端自主解决率和快速部署能力，这让客服平台续约不再是慢悠悠的实验室评测，而是立刻要拍板的迁移决定。
  ventureScalePath: 先吃下已经以 Salesforce 为核心的客服组织的 Agentforce 迁移，再扩到供应商中立基准测试、多智能体路由，以及客服、销售和 IT 服务智能体的持续回归监控。
solution: 产品连上 Salesforce、现有帮助台、知识库、宏和工作流日志，把历史工单整理成候选智能体栈的回放套件。迁移前，它用客户自己的案例做并排对照，给解决率、升级行为、处理时长和策略遵循度打分。上线期间，它会在影子模式下镜像一部分实时聊天、消息或 Slack 对话，让客服团队先看到 Agentforce 会在哪些地方答得不一样，再决定是否放给客户。随后系统生成一份切换包：哪些知识缺口要补、哪些工作流必须有人兜底、上线周要盯哪些回滚触发器。这样一来，原本由厂商主导的比稿，就变成一场中立、拿数据说话的部署决策。
goToMarketSeed:
  firstCustomer: 一家 500 到 2,000 人的 B2B SaaS 公司：有 75 到 200 名客服坐席，CRM 用 Salesforce，每月数字客服对话超过 20,000 条，并且在 2026 年 Q3 或 Q4 面临续约，COO 需要证据证明迁进 Agentforce 不会拉低解决率或推高升级。
  buyingTrigger: 帮助台续约、董事会或 COO 发起的成本审查，或 Salesforce–Fin 收购后的平台复盘，都会逼着团队说明到底该不该并到 Agentforce 上。
  currentAlternative: 厂商主导的试点、手工转录 QA、系统集成商迁移项目，以及因为切换风险太难量化而干脆留在现有栈上。
  switchingReason: 首个客户会买单，是因为这套产品能用它自己的历史与实时对话，在切换前量化解决率、升级和策略漂移；这比演示或小试点可信得多。
  pricingHypothesis: 按月镜像对话量和活跃迁移项目数收平台年费，再加连接器和切换手册的实施费。
