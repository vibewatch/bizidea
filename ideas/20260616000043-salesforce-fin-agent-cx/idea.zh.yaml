jobsToBeDone:
  - job: 当我们必须决定要不要并到 Agentforce 上时，帮客服系统团队用自己的工单历史和实时流量做影子测试，这样切换时就不会把解决率和升级打坏。
    currentAlternative: 小规模厂商试点和手工转录复盘
    successMetric: 切换后预测解决率与实际解决率的偏差控制在 5 个点以内
  - job: 当我们把宏、知识和升级规则迁到新的客服智能体时，帮 QA 团队在上线前找出哪些工作流会出问题，好让我们在客户察觉前先修掉。
    currentAlternative: 电子表格映射和系统集成商测试脚本
    successMetric: 新客服智能体栈的上线时间，以及前 30 天里策略或升级回归的数量
