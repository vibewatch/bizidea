topRisks:
  - name: 现有厂商打包
    description: Salesforce 或其他套件厂商完全可能做出基础迁移仪表盘，再顺手打包进更大的平台交易里。
    mitigation: 往中立回放、跨厂商对比和上线后回归监控上做深，这些都不是单一厂商能有说服力地提供的。
  - name: 切换周期偏慢
    description: 如果续约节点不紧、管理层压力也不大，一些客服团队可能继续沿用现有自动化，把迁移往后拖。
    mitigation: 优先打已经处在续约、并购整合或降本审查里的账户，先卖一笔付费基准测试，让它直接服务一场正在发生的平台决策。
  - name: 集成蔓延
    description: 要把转录记录、宏、知识库、路由规则和动作日志从不同客服栈里接起来，部署就容易变慢，毛利也会被挤。
    mitigation: 先做 Salesforce 加最常见数字客服系统的只读连接器，第一刀只切文本渠道，再配服务辅助导入。
