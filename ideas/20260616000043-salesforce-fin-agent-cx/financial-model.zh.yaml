scenarios:
  downside:
    description: 伙伴带来的线索爬坡偏晚，买方把综合客单价往纯软件定价压，交付也比计划更偏服务。
    y3RevenueK: 3469
    y3EbitdaK: -1081.1
    cashLowPointK: -632.9
    keyAssumptionChanges:
      - 由于伙伴辅助商机管道到得更晚，36 个月里的总启动项目数会从基准情景的 75 个降到 58 个。
      - 随着实施和监控附加率收缩，活跃账户价值会从 $126K 滑到每年约 $122K。
      - 月度流失率会从 1.5% 升到 1.8%，而毛利率到 Y3 也只能爬到 69%。
  base:
    description: 基准情景按商业计划的节奏走：从 Y1 的 5 个共创客户，爬到靠伙伴辅助加速的 Y3，最终到 66.6 个活跃账户，退出时 ARR 等值约 $8.4M。
    y3RevenueK: 5004.2
    y3EbitdaK: 28.3
    cashLowPointK: 294.5
    keyAssumptionChanges:
      - 综合活跃账户价值维持在每年 $126K，毛利率从 Y1 的 65% 逐步爬到 Y3 的 70%。
      - 总启动项目数按 Y1 的 5 个、Y2 的 15 个、Y3 的 55 个推进，其中 60% 的付费基准测试会转成年化切换订阅。
      - 招聘在 Q4Y2 达到 10 名 FTE、在 Q4Y3 达到 15 名 FTE，同时现金在第 30 个月低点之前始终保持为正。
  upside:
    description: 早期标杆客户让伙伴打法成真，监控附加率更高，公司也能更顺畅地打到研究里的 SOM。
    y3RevenueK: 6199.6
    y3EbitdaK: 923
    cashLowPointK: 1010.2
    keyAssumptionChanges:
      - 随着 Y1 基准测试跑通，伙伴带来的需求前置，总启动项目数会从 75 个升到 82 个。
      - 随着监控和实施标准化，活跃账户价值会从 $126K 扩到 $132K，毛利率也能爬到 72%。
      - 月度流失率从 1.5% 改善到 1.0%，把 Y3 退出时的客户数抬到约 75 个活跃账户。
sensitivity:
  - variable: ARPU
    downsideCase: 每个活跃账户的综合年价值为 $120K
    baseCase: 每个活跃账户的综合年价值为 $126K
    upsideCase: 每个活跃账户的综合年价值为 $132K
    y3RevenueImpactK: -238.2
    cashImpactK: -217.5
  - variable: CAC
    downsideCase: 如果后期伙伴批次表现偏弱，且 Y3 下半年每月少签 1 个客户，CAC 会升到 $70K 以上。
    baseCase: 按 Y2-Y3 的 S&M 除以模型里的 42 次正式生产转化，CAC 约为 $61K。
    upsideCase: 如果伙伴转介绍把需求前置、减少创始人重度参与销售的时间，CAC 会往 $50K 出头走。
    y3RevenueImpactK: -215.1
    cashImpactK: -150.5
  - variable: 流失率
    downsideCase: 如果挂上监控的切换账户太少，按 1 个月等值计算的流失率会恶化到 2.0%。
    baseCase: 月度活跃账户流失率为 1.5%。
    upsideCase: 如果监控留存更强、切换后产品更贴合，月度流失率可改善到 1.0%。
    y3RevenueImpactK: -184.8
    cashImpactK: -162.8
  - variable: 销售周期
    downsideCase: 安全审查和数据映射会让 Y1 之后的大多数启动项目整体往后推约 1 个月。
    baseCase: 模型假设续约驱动的启动项目会按计划节奏落地。
    upsideCase: 伙伴手册和标准化安全包能把启动项目整体提前约 1 个月。
    y3RevenueImpactK: -521.8
    cashImpactK: -468.9
  - variable: 毛利率
    downsideCase: 如果部署长期过于依赖服务，Y3 毛利率最高只能到 68%。
    baseCase: 毛利率按计划在 Y3 爬到 70%。
    upsideCase: 如果连接器和评分卡标准化速度快于预期，毛利率能到 72%。
    y3RevenueImpactK: 0
    cashImpactK: -131.6
  - variable: 招聘节奏
    downsideCase: 如果在收入证明到来前，就把 Y2 后期和 Y3 的招聘大约提前两个季度，现金压力会明显变大。
    baseCase: 招聘按计划走：先产品，再伙伴扩张。
    upsideCase: 如果 Y2 里程碑提前被证明，少数后期岗位可以延后再招。
    y3RevenueImpactK: 0
    cashImpactK: -594.6
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Deals[续约期目标客户] --> Benchmarks[付费基准测试]
      Benchmarks --> Cutovers[切换订阅]
      Cutovers --> Monitoring[监控附加]
      Monitoring --> Revenue[收入]
      Revenue --> GrossProfit[毛利]
      GrossProfit --> Cash[经营费用后现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景的收入引擎，是把 Y1 的 5 个共创客户在 36 个月里扩成 75 个总付费启动项目，每个活跃账户的综合年价值约为 $126K。
  - checkName: 必须成立
    finding: 伙伴渠道必须在 Y1 后半段真正跑起来，公司才能在不把 GTM 支出翻倍的情况下，于 Y2 新增 15 个账户。
  - checkName: 模型失效条件
    finding: 如果平均销售周期再滑约 1 个月，模型会少掉约 $469K 的期末现金，低点时几乎耗尽基准情景的缓冲。
  - checkName: 下一轮证明
    finding: 只要公司能在第 24 个月前证明 6+ 家带监控的年订阅、21 天以内的部署，以及可复制的伙伴来源商机管道，seed 叙事就最有力。
sanityChecks:
  ruleOf40: Y3 增长率 280.3% + EBITDA 利润率 0.6% = 280.9%（被偏小的 Y2 基数放大）。
  burnMultiple: Y2 烧钱倍数约 1.36x（$1,441.2K burn / $1,056.4K 净新增收入）；Y3 达到轻微正 EBITDA。
  revenuePerFte: 按 Q4 Y3 的 15 名员工算，Y3 每名 FTE 对应收入约 $334K（落在 SaaS 常见的 $200–400K 区间内）。
  flags:
    - 模型在 Y3 仍要求 55 个总新账户，所以伙伴渠道必须从机会主义式拿单，变成可复制的供给。
    - 基准情景下现金最低点约为 $294.5K，因此只要销售周期再滑或毛利率打不到点，大概率就要接一轮过桥轮。
    - $126K 的综合客户价值，隐含前提是买方会继续为实施和监控付费；如果只剩纯软件价位，SOM 叙事就更难成立。
    - 如果部署做不到 21 天以内标准化，计划中的 Y3 70% 毛利率，对这个重交付打法来说就会过于乐观。
