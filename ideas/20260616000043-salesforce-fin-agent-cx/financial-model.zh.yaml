slug: agentforce-support-cutover
date: "2026-06-16"
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-07
    unit: YYYY-MM
    source: "[BP date 2026-06-16] 模型从计划日期后的下一个月开始。"
  - id: A2
    name: M1 期初现金
    value: $3.3M
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd + BP fundingAsk runwayMonths] 规模放在所述 pre-seed 区间的上半段附近，这样在第 24 个月证明 seed 里程碑时，仍能留出约 6 个月缓冲。"
  - id: A3
    name: 起始付费活跃账户数
    value: "0"
    unit: count
    source: "[BP milestones 0–12 months] 公司起步时尚未产生收入，先要拿下付费共创客户。"
  - id: A4
    name: 付费活跃账户定义
    value: 处在付费基准测试、切换订阅或监控状态的账户
    unit: definition
    source: "[BP gtm.wedge + BP businessModel.revenueStreams] customersEop 跟踪的是整个商业生命周期里的付费活跃账户。"
  - id: A5
    name: 单个付费活跃账户的综合年收入
    value: $126K/year (~$10.5K/month)
    unit: USD/account/year
    source: "[BP investorMemo.firstCustomer.initialContract + Research market.som] 这一数值高于纯订阅区间，因为其中包含实施和监控；因此约 67 个活跃账户就能覆盖与 SOM 等值的收入。"
  - id: A6
    name: 付费基准测试到正式生产的转化率
    value: 60%
    unit: pct of paid benchmarks
    source: "[BP gtm.funnelTargets paid benchmark→production cutover 60%+] 用于 CAC 计算和 Y2 里程碑路径。"
  - id: A7
    name: 监控附加率
    value: 50%
    unit: pct of cutover accounts
    source: "[BP gtm.funnelTargets cutover→ongoing monitoring 50%+ + BP experimentRoadmap] 已反映在综合活跃账户价值里。"
  - id: A8
    name: 新账户启动节奏
    value: M4/M6/M8/M10/M12，随后 Y2 每季度新增 2/3/4/6，Y3 每季度新增 8/11/14/22
    unit: start pattern
    source: "[BP milestones + BP strategicChoices.sequencingRationale + operator judgment] 模型设定 Y1 有 5 个共创客户，Y2 新增 15 个账户，Y3 则靠伙伴辅助加速。"
  - id: A9
    name: 月度活跃账户流失率
    value: 1.5%
    unit: pct/month
    source: "[startup-finance heuristic + BP experimentRoadmap] 流失率高于纯 SaaS，因为不是每个切换项目都会转成监控。"
  - id: A10
    name: 毛利率爬坡
    value: Y1 为 65%，Y2 为 68%，Y3 为 70%
    unit: pct of revenue
    source: "[BP businessModel.targetGrossMarginPct + BP operatingAssumptions] 起步时需要服务辅助，等连接器标准化后，毛利率会爬到计划中的 70%。"
  - id: A11
    name: 创始人 / CEO 全成本薪酬
    value: $180K
    unit: USD/year
    source: "[BP team CEO / GTM founder] 创始人现金薪酬压得较克制，并计入 payroll tax 和福利。"
  - id: A12
    name: 工程 / AI 全成本薪酬
    value: $210K
    unit: USD/year
    source: "[BP team Founding eng + Applied AI engineer] 覆盖高级 AI 与基础设施人才的薪酬及雇佣附加成本。"
  - id: A13
    name: 解决方案 / 交付全成本薪酬
    value: $180K
    unit: USD/year
    source: "[BP team Solutions architect] 面向客户的实施人才，加上雇佣附加成本。"
  - id: A14
    name: 销售 / 合作伙伴全成本薪酬
    value: $220K
    unit: USD/year
    source: "[BP team Partnerships lead + BP gtm.channels] 包含首位企业销售的 OTE 和渠道承载成本。"
  - id: A15
    name: G&A / 运营全成本薪酬
    value: $150K
    unit: USD/year
    source: "[BP operations] 精简的财务、供应商管理和人事运营支持。"
  - id: A16
    name: 招聘时间线
    value: M1 创始人 + 2 名技术人员，M4 解决方案，M9 合作伙伴，M13 销售，M15 工程师，M18 解决方案，M21 运营，M24 销售，M27 工程师，M30 解决方案，M31 渠道，M35 运营，M36 工程师
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale] 前 5 个角色与计划一致；后续招聘延续同样的顺序：先产品，后伙伴扩张。"
  - id: A17
    name: 非薪酬销售与市场支出
    value: $12K/mo M1-6, $18K/mo M7-12, $24K/mo M13-18, $28K/mo M19-24, $36K/mo M25-30, $45K/mo M31-36
    unit: USD/month
    source: "[BP gtm.channels] 用于创始人外呼、伙伴差旅、赋能，以及一支不靠大规模付费获客的小型企业 GTM 团队。"
  - id: A18
    name: 非薪酬 R&D 支出
    value: $15K/mo Y1, $20K/mo Y2, $26K/mo Y3
    unit: USD/month
    source: "[BP product + BP operations] 用于云成本、模型评估、安全和连接器基础设施。"
  - id: A19
    name: 非薪酬 G&A 支出
    value: $15K/mo Y1, $18K/mo Y2, $22K/mo Y3
    unit: USD/month
    source: "[BP operations] 用于法务、审计、保险和后台工具。"
  - id: A20
    name: 薪酬分摊到 P&L 科目
    value: 创始人 65% S&M / 35% G&A；解决方案 40% S&M / 60% R&D；工程 100% R&D；销售 100% S&M；运营 100% G&A
    unit: allocation
    source: "[BP team rationales] 把每个角色映射到 P&L 里的经营科目。"
  - id: A21
    name: CAC 计算口径
    value: $61K = Y2-Y3 S&M / 42 次正式生产转化
    unit: USD/new production customer
    source: "[BP gtm.funnelTargets + model calc] 以 Y1 之后的 70 个付费启动项目乘上 60% 的正式转化率目标得出。"
  - id: A22
    name: 现金转换口径
    value: 现金变动 = EBITDA
    unit: modeling convention
    source: "[startup-finance heuristic] 假设 capex、债务服务、税项和营运资金波动在 pre-seed 规模上都不重要。"
  - id: A23
    name: 融资规模设定
    value: $3.3M pre-seed
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd + BP milestones + model cash trough] 这笔钱足够撑到第 24 个月的 seed 里程碑，并把缓冲保到第 30 个月左右。"
