    impact: The product must invest sooner in telephony integrations, consent workflows, and voice-specific QA instead of staying text-first.
    sourceRefs:
    - 2
    - 11
    - 25
    - 31
  validationPlan:
  - priority: high
    question: Will buyers fund neutral cutover assurance as a standalone budget line, or force it into an SI or renewal scope?
    evidenceToGather: Win/loss interviews with 10 service leaders and 5 Salesforce ecosystem partners around budget ownership for AI migrations.
  - priority: high
    question: 'Which migration delta predicts launch pain most reliably: resolution, escalation, policy breach, or handle time?'
    evidenceToGather: Shadow-test pilots that compare pre-cutover predicted deltas with 30-day post-cutover outcomes.
  - priority: medium
    question: Can the beachhead win with chat and email only, or is voice required in the first enterprise package?
    evidenceToGather: Channel-by-channel demand analysis across initial design partners and renewal-stage prospects.
  - priority: medium
    question: Which ecosystem partners want to resell, co-sell, or white-label a neutral migration layer?
    evidenceToGather: Pipeline experiments with Salesforce SIs, CX consultants, and QA tooling partners.
