openQuestions:
- Will buyers fund neutral cutover assurance as a separate budget line, or insist it be folded into SI and migration scopes?
- How quickly will Salesforce bundle enough migration analytics into Agentforce or Fin to narrow the wedge?
- Is voice shadowing a day-one requirement for the first beachhead, or can the product win with chat/email/Slack first?
- 'Which artifact matters most in executive approval: resolution deltas, escalation deltas, policy-breach examples, or rollback thresholds?'
