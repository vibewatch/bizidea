competitors:
- name: Salesforce Agentforce
  stage: incumbent
  wedge: CRM-native agent platform with unified data, guardrails, and an expanding partner ecosystem.
  pricing: $2 per conversation; editions from $550/user/month and $5/user/month employee-agent license with Flex Credits.
  strength: Deep Salesforce workflow and data integration, plus a growing AgentExchange ecosystem.
  weaknessVsUs: It is the destination stack, so it is not a neutral judge of whether a migration should happen or how much quality risk remains before cutover.
  sourceRefs:
  - 5
  - 14
  - 17
- name: Zendesk AI
  stage: incumbent
  wedge: Helpdesk-native AI agents and AutoQA inside the Zendesk Resolution Platform.
  pricing: $55-$115 per agent/month for suite plans with AI, plus $50 per agent/month Copilot add-on.
  strength: Strong service UX with AI monitoring across 100% of interactions and mature support workflows.
  weaknessVsUs: It is optimized for operating inside Zendesk rather than benchmarking an Agentforce cutover across two stacks using the buyer's own history.
  sourceRefs:
  - 18
  - 19
  - 20
- name: NiCE CXone AI Agents
  stage: incumbent
  wedge: Enterprise-grade multimodal self-service and QA platform built on long-run CX data.
  pricing: Custom quote.
  strength: Voice/digital scale, technical transparency, and ability to handle very large concurrent volumes.
  weaknessVsUs: Broad CCaaS scope makes it heavier than a focused Salesforce-migration assurance layer for mid-market and upper-mid-market SaaS teams.
  sourceRefs:
  - 24
  - 25
- name: Cognigy.AI
  stage: scale-up
  wedge: Agentic CX platform with simulator-based evaluation, orchestration, and multi-model control.
  pricing: Custom quote.
  strength: Strong evaluation and orchestration tooling for complex, integration-heavy workflows.
  weaknessVsUs: It sells builder infrastructure, not a neutral buyer-side cutover verdict on real ticket history at renewal time.
  sourceRefs:
  - 26
  - 27
  - 28
- name: Cresta
  stage: scale-up
  wedge: AI-agent development, testing, and real-time supervision for hybrid contact centers.
  pricing: Custom quote.
  strength: Synthetic-customer testing, A/B releases, rollback, and live AI supervision.
  weaknessVsUs: It is best suited to optimizing deployed agents, not to cross-vendor pre-migration benchmarking around a stack-consolidation decision.
  sourceRefs:
  - 33
  - 34
