assumptions:
- id: A1
  name: Model start month
  value: "2026-07"
  unit: YYYY-MM
  source: '[BP date 2026-06-16] model starts the month after the plan date.'
- id: A2
  name: Opening cash at M1
  value: $3.3M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd + BP fundingAsk runwayMonths] sized near the upper half of the stated pre-seed range so the month-24 seed proof still leaves roughly six months of buffer.'
- id: A3
  name: Starting active paying accounts
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] the company begins pre-revenue and must first close paid design partners.'
- id: A4
  name: Active paying account definition
  value: An account under paid benchmark, cutover subscription, or monitoring
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.revenueStreams] customersEop tracks active paying accounts across the full commercial lifecycle.'
- id: A5
  name: Blended annual revenue per active paying account
  value: $126K/year (~$10.5K/month)
  unit: USD/account/year
  source: '[BP investorMemo.firstCustomer.initialContract + Research market.som] sits above the pure subscription range because it includes implementation and monitoring, so ~67 active accounts deliver SOM-equivalent revenue coverage.'
- id: A6
  name: Paid benchmark to production conversion
  value: 60%
  unit: pct of paid benchmarks
  source: '[BP gtm.funnelTargets paid benchmark→production cutover 60%+] used for CAC math and the Y2 milestone path.'
- id: A7
  name: Monitoring attach rate
  value: 50%
  unit: pct of cutover accounts
  source: '[BP gtm.funnelTargets cutover→ongoing monitoring 50%+ + BP experimentRoadmap] reflected inside the blended active-account value.'
- id: A8
  name: New account start cadence
  value: M4/M6/M8/M10/M12, then Y2 adds 2/3/4/6 by quarter and Y3 adds 8/11/14/22 by quarter
  unit: start pattern
  source: '[BP milestones + BP strategicChoices.sequencingRationale + operator judgment] models 5 design partners in Y1, 15 new accounts in Y2, and partner-assisted acceleration in Y3.'
- id: A9
  name: Monthly active-account churn
  value: 1.5%
  unit: pct/month
  source: '[startup-finance heuristic + BP experimentRoadmap] churn is higher than pure SaaS because not every cutover converts to monitoring.'
- id: A10
  name: Gross margin ramp
  value: 65% in Y1, 68% in Y2, 70% in Y3
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct + BP operatingAssumptions] launch starts services-assisted and reaches the stated 70% target once connectors standardize.'
- id: A11
  name: Founder / CEO loaded compensation
  value: $180K
  unit: USD/year
  source: '[BP team CEO / GTM founder] modest founder cash pay plus payroll taxes and benefits.'
- id: A12
  name: Engineering / AI loaded compensation
  value: $210K
  unit: USD/year
  source: '[BP team Founding eng + Applied AI engineer] senior AI and infrastructure talent with payroll load.'
- id: A13
  name: Solutions / delivery loaded compensation
  value: $180K
  unit: USD/year
  source: '[BP team Solutions architect] customer-facing implementation talent plus payroll load.'
- id: A14
  name: Sales / partnerships loaded compensation
  value: $220K
  unit: USD/year
  source: '[BP team Partnerships lead + BP gtm.channels] includes first-enterprise-seller OTE and channel carrying cost.'
- id: A15
  name: G&A / ops loaded compensation
  value: $150K
  unit: USD/year
  source: '[BP operations] lean finance, vendor-management, and people-ops support.'
- id: A16
  name: Hiring timeline
  value: M1 founder + 2 technical, M4 solutions, M9 partnerships, M13 sales, M15 engineer, M18 solutions, M21 ops, M24 sales, M27 engineer, M30 solutions, M31 channel, M35 ops, M36 engineer
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale] first five roles match the plan; later hires extend the same product-first then partner-scale sequence.'
- id: A17
  name: Non-payroll sales & marketing spend
  value: $12K/mo M1-6, $18K/mo M7-12, $24K/mo M13-18, $28K/mo M19-24, $36K/mo M25-30, $45K/mo M31-36
  unit: USD/month
  source: '[BP gtm.channels] heuristic for founder outbound, partner travel, enablement, and a small enterprise GTM team without broad paid demand gen.'
- id: A18
  name: Non-payroll R&D spend
  value: $15K/mo Y1, $20K/mo Y2, $26K/mo Y3
  unit: USD/month
  source: '[BP product + BP operations] heuristic for cloud, model-eval, security, and connector infrastructure.'
- id: A19
  name: Non-payroll G&A spend
  value: $15K/mo Y1, $18K/mo Y2, $22K/mo Y3
  unit: USD/month
  source: '[BP operations] heuristic for legal, audit, insurance, and back-office tooling.'
- id: A20
  name: Payroll allocation to P&L lines
  value: Founder 65% S&M / 35% G&A; solutions 40% S&M / 60% R&D; engineering 100% R&D; sales 100% S&M; ops 100% G&A
  unit: allocation
  source: '[BP team rationales] maps each role into the operating lines used in the P&L.'
- id: A21
  name: CAC calculation convention
  value: $61K = Y2-Y3 S&M / 42 production conversions
  unit: USD/new production customer
  source: '[BP gtm.funnelTargets + model calc] uses 70 paid starts after Y1 multiplied by the 60% production-conversion target.'
- id: A22
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: modeling convention
  source: '[startup-finance heuristic] assumes capex, debt service, taxes, and working-capital swings are immaterial at pre-seed scale.'
- id: A23
  name: Funding ask sizing
  value: $3.3M pre-seed
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd + BP milestones + model cash trough] funds the month-24 seed milestone and preserves roughly six months of buffer into month 30.'
