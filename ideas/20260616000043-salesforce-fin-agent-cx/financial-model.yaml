scenarios:
  downside:
    description: Partner sourcing ramps late, buyers push blended value closer to software-only pricing, and delivery stays more services-heavy than planned.
    y3RevenueK: 3469.0
    y3EbitdaK: -1081.1
    cashLowPointK: -632.9
    keyAssumptionChanges:
    - Gross starts fall from 75 in the base case to 58 over 36 months because partner-assisted pipeline arrives later.
    - Active-account value slips from $126K to about $122K per year as implementation and monitoring attach compress.
    - Monthly churn rises from 1.5% to 1.8% and gross margin only reaches 69% by Y3.
  base:
    description: Base case follows the business-plan sequence from 5 Y1 design partners to a partner-assisted Y3 ramp, ending at 66.6 active accounts and roughly $8.4M of exit ARR equivalent.
    y3RevenueK: 5004.2
    y3EbitdaK: 28.3
    cashLowPointK: 294.5
    keyAssumptionChanges:
    - Blended active-account value holds at $126K per year and gross margin steps from 65% in Y1 to 70% in Y3.
    - Gross starts follow 5 in Y1, 15 in Y2, and 55 in Y3, with 60% of paid benchmarks converting to annual cutover subscriptions.
    - Hiring reaches 10 FTE by Q4Y2 and 15 FTE by Q4Y3 while cash stays positive through the month-30 trough.
  upside:
    description: Early reference customers make the partner motion real, monitoring attaches more often, and the company reaches the research SOM with less friction.
    y3RevenueK: 6199.6
    y3EbitdaK: 923.0
    cashLowPointK: 1010.2
    keyAssumptionChanges:
    - Gross starts rise from 75 to 82 as successful Y1 benchmarks pull forward partner-sourced demand.
    - Active-account value expands from $126K to $132K and gross margin reaches 72% as monitoring and implementation standardize.
    - Monthly churn improves from 1.5% to 1.0%, lifting Y3 exit customers to about 75 active accounts.
sensitivity:
- variable: ARPU
  downsideCase: $120K blended annual value per active account
  baseCase: $126K blended annual value per active account
  upsideCase: $132K blended annual value per active account
  y3RevenueImpactK: -238.2
  cashImpactK: -217.5
- variable: CAC
  downsideCase: CAC rises above $70K because later partner cohorts underperform and Y3 starts fall by roughly one logo per month in H2.
  baseCase: CAC is about $61K using Y2-Y3 S&M divided by 42 modeled production conversions.
  upsideCase: CAC trends into the low-$50Ks if partner referrals pull demand forward and reduce founder-heavy selling time.
  y3RevenueImpactK: -215.1
  cashImpactK: -150.5
- variable: churn
  downsideCase: 1-month equivalent churn worsens to 2.0% because too few cutover accounts attach monitoring.
  baseCase: 1.5% monthly active-account churn.
  upsideCase: 1.0% monthly churn with stronger monitoring retention and better post-cutover product fit.
  y3RevenueImpactK: -184.8
  cashImpactK: -162.8
- variable: sales cycle
  downsideCase: Security review and data mapping push most post-Y1 starts back about one month.
  baseCase: The model assumes renewal-driven starts land on the planned cadence.
  upsideCase: Partner playbooks and standard security packs pull starts forward about one month.
  y3RevenueImpactK: -521.8
  cashImpactK: -468.9
- variable: gross margin
  downsideCase: Y3 gross margin tops out at 68% because deployments remain too services-heavy.
  baseCase: Margin ramps to the planned 70% by Y3.
  upsideCase: Margin reaches 72% once connectors and scorecards standardize faster than planned.
  y3RevenueImpactK: 0.0
  cashImpactK: -131.6
- variable: hiring pace
  downsideCase: Late-Y2 and Y3 hires are pulled forward by roughly two quarters before revenue proof arrives.
  baseCase: Hiring follows the product-first, partner-second sequence in the plan.
  upsideCase: A few late hires wait until after the Y2 milestone is already proven.
  y3RevenueImpactK: 0.0
  cashImpactK: -594.6
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Deals[Renewal-stage targets] --> Benchmarks[Paid benchmarks]
      Benchmarks --> Cutovers[Cutover subscriptions]
      Cutovers --> Monitoring[Monitoring attach]
      Monitoring --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after opex]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from scaling 5 Y1 design partners into 75 gross paid starts over 36 months at about $126K of blended annual value per active account.
- checkName: Must go right
  finding: The partner channel has to become real by late Y1 so the business can add 15 new accounts in Y2 without doubling GTM spend.
- checkName: Model breaks if
  finding: If the average sales cycle slips by roughly one month, the model gives up about $469K of ending cash and nearly exhausts the base-case buffer at the trough.
- checkName: Next-round proof
  finding: The seed story is strongest once the company shows 6+ annual subscriptions with monitoring, sub-21-day deployments, and repeatable partner-sourced pipeline before month 24.
sanityChecks:
  ruleOf40: Y3 growth 280.3% + EBITDA margin 0.6% = 280.9% (inflated by the small Y2 base).
  burnMultiple: Y2 burn multiple ~1.36x (($1,441.2K burn) / $1,056.4K net new revenue); Y3 reaches slight positive EBITDA.
  revenuePerFte: About $334K Y3 using Q4 Y3 headcount of 15 (inside the typical $200–400K SaaS range).
  flags:
  - The model still requires 55 gross new accounts in Y3, so the partner channel must become repeatable rather than opportunistic.
  - Cash bottoms around $294.5K in the base case, so a sales-cycle slip or gross-margin miss likely forces a bridge round.
  - The $126K blended customer value assumes buyers continue paying for implementation and monitoring; a software-only price point would leave the SOM narrative harder to reach.
  - If deployments do not standardize below 21 days, the planned 70% Y3 gross margin will prove too optimistic for the delivery-heavy motion.
