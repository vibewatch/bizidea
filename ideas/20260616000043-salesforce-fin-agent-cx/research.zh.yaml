competitors:
  - name: Salesforce Agentforce
    stage: 现有厂商
    wedge: CRM 原生的智能体平台，把统一数据、护栏和不断扩张的伙伴生态绑在一起。
    pricing: 按对话计费为 $2；版本从每用户每月 $550 起，员工智能体许可为每用户每月 $5，另配 Flex Credits。
    strength: Salesforce 工作流和数据集成很深，AgentExchange 生态也在扩大。
    weaknessVsUs: 它就是目标栈本身，所以没法中立地判断这次迁移该不该做，也没法评估切换前还剩多少质量风险。
    sourceRefs:
      - 5
      - 14
      - 17
  - name: Zendesk AI
    stage: 现有厂商
    wedge: Zendesk Resolution Platform 里的帮助台原生 AI 智能体和 AutoQA。
    pricing: 含 AI 的套件计划每坐席每月 $55-$115，另有 Copilot 附加包每坐席每月 $50。
    strength: 服务体验强，能对 100% 互动做 AI 监控，客服工作流也成熟。
    weaknessVsUs: 它最擅长在 Zendesk 内部运营，不擅长基于买方自己的历史数据，跨两套栈去基准测试一次 Agentforce 切换。
    sourceRefs:
      - 18
      - 19
      - 20
  - name: NiCE CXone AI Agents
    stage: 现有厂商
    wedge: 基于长期 CX 数据构建的企业级多模态自助服务与 QA 平台。
    pricing: 定制报价。
    strength: 语音和数字渠道规模大、技术透明度高，也能扛很高并发。
    weaknessVsUs: 广义 CCaaS 范围太重，不如一层聚焦 Salesforce 迁移保障的能力，更适合中端到中高端 SaaS 团队。
    sourceRefs:
      - 24
      - 25
  - name: Cognigy.AI
    stage: 成长公司
    wedge: 面向智能体 CX 的平台，主打基于模拟器的评估、编排和多模型控制。
    pricing: 定制报价。
    strength: 在复杂、集成密集型工作流里，评估和编排能力都很强。
    weaknessVsUs: 它卖的是搭建基础设施，不是站在买方一侧、在续约时基于真实工单历史给出中立的切换结论。
    sourceRefs:
      - 26
      - 27
      - 28
  - name: Cresta
    stage: 成长公司
    wedge: 面向混合呼叫中心的 AI 智能体开发、测试和实时监管平台。
    pricing: 定制报价。
    strength: 合成客户测试、A/B 发布、回滚和实时 AI 监管都很强。
    weaknessVsUs: 它更适合把已部署的智能体继续调优，不是围绕栈整合决策去做跨厂商的迁移前基准测试。
    sourceRefs:
      - 33
      - 34
