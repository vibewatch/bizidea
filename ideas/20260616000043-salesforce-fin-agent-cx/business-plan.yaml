slug: "agentforce-support-cutover"
date: "2026-06-16"
executiveSummary: >-
  Agentforce Support Cutover is a vendor-neutral cutover plane for support teams
  that need to know whether moving digital service workflows into Agentforce will
  preserve resolution, escalation behavior, and policy compliance. The first
  beachhead is North American B2B SaaS companies with 75 to 200 digital support
  agents, Salesforce CRM, an incumbent AI-enabled helpdesk, and a live renewal
  or consolidation project. The MVP replays historical chat, email, and Slack
  cases through the incumbent stack and Agentforce, scores deltas, and exports a
  cutover pack with launch gates and rollback thresholds; the next release adds
  shadow-mode live traffic and post-cutover regression monitoring. Go-to-market
  starts with founder-led sales into renewal windows and co-sell relationships
  with Salesforce implementation partners, because the buying trigger, buyer
  urgency, and deployment motion are already concentrated there. Research
  supports estimated market sizes of $1.9B TAM, $375M SAM, and $8.1M year-3
  SOM, with credible willingness to pay because destination platforms already
  charge per conversation, per outcome, or per seat. The strategic advantage is
  neutrality: suite vendors can operate the destination stack, but they cannot
  credibly issue a buyer-side migration verdict on the customer's own history.
  The biggest open questions are whether buyers will fund assurance as a
  standalone line item and whether text-first coverage is enough before voice is
  required, so the first 12 months must prove both budget ownership and
  predictive accuracy. This is investable if the company can turn three to five
  renewal-stage design partners into repeatable, partner-assisted subscriptions
  without getting collapsed into services or bundled platform analytics.
problem:
  - "Renewal-stage support teams must remap knowledge, macros, routing, and escalation logic across multiple digital channels before they can consolidate onto Agentforce."
  - "Current vendor demos, small pilots, and manual transcript QA do not predict whether a cutover will hurt resolution, inflate escalations, or create policy breaches."
  - "The destination vendor is not a neutral grader, so executives lack a trusted decision artifact for a board-visible migration."
solution:
  - "Replay historical chat, email, and Slack cases through the incumbent stack and Agentforce to score resolution, escalation, handle-time, and policy-adherence deltas."
  - "Mirror a controlled slice of live digital conversations in shadow mode before launch so support ops can see where the destination stack would answer differently."
  - "Generate a cutover pack with knowledge gaps, workflow fixes, launch gates, and rollback triggers that turns migration risk into an operational checklist."
whyWeWin:
  - "Neutrality is the wedge: the buyer can trust a cross-stack verdict that is not written by the vendor selling the destination suite."
  - "A text-first, read-only deployment model matches the fastest renewal-driven use case and avoids the integration sprawl that slows broader QA or orchestration products."
  - "Each migration builds a proprietary replay corpus and failure-pattern library that improves benchmark accuracy and creates partner trust over time."
strategicChoices:
  beachhead: >-
    North American B2B SaaS companies with 75 to 200 digital support agents,
    Salesforce CRM, an incumbent AI-enabled helpdesk, and a 2026 to 2027
    renewal or consolidation decision tied to Agentforce.
  wedgeRationale: >-
    A pre-cutover benchmark tied to a live renewal creates faster proof than a
    broad observability product because the buyer already has urgency, budget,
    and historical conversations ready for replay. It also avoids competing
    head-on with suites on runtime operations before the company has data or
    channel breadth.
  sequencingRationale: >-
    Start with read-only text-channel replay for Salesforce-centered migrations,
    add live shadow traffic and cutover governance once the benchmark is
    trusted, then expand into ongoing regression monitoring and adjacent stacks.
    This sequence keeps product scope, hiring, security review, and partner
    enablement consistent with a pre-seed company.
  notYet:
    - "Voice-heavy contact-center migrations"
    - "Non-Salesforce destination stacks as the primary sales motion"
    - "Europe-first deployments with multi-region data residency complexity"
    - "Sales or IT service-agent benchmarking before support cutovers are repeatable"
market:
  tam: "$1.9B estimated TAM from roughly 25,000 digital-support organizations at about $75k annual migration-assurance budget."
  sam: "$375M estimated SAM from roughly 5,000 North America and Europe Salesforce-centered support teams in active renewal or consolidation windows."
  som: "$8.1M year-3 SOM based on about 90 customers at roughly $90k annualized program value."
  segments:
    - "Primary: North American B2B SaaS support organizations with 75 to 200 digital agents and Salesforce-centered consolidation projects."
    - "Secondary: Digital-first fintech and multi-brand service teams that need neutral proof before moving customer support into Agentforce."
  buyingProcess: >-
    The sale starts when a VP Support, VP CX Operations, or COO faces a
    renewal, cost review, or consolidation project and needs a go or no-go
    decision before traffic moves. Support systems and QA leads run the
    technical evaluation, while security and legal review focus on conversation
    data handling and auditability.
product:
  mvp: >-
    Read-only connectors to Salesforce, one incumbent helpdesk, the knowledge
    base, macros, and routing logs; replay chat, email, and Slack history
    through both stacks and score resolution, escalation, policy, and handle
    time deltas. Export a cutover pack with knowledge fixes, launch gates, and
    rollback thresholds for a single migration program.
  sixMonth: "Ship three design-partner deployments, support two incumbent helpdesk connectors, and deliver launch-readiness dashboards for chat and email."
  twelveMonth: "Add live shadow traffic on digital channels, partner-facing implementation playbooks, and post-cutover regression monitoring for launched accounts."
  twentyFourMonth: "Expand to additional source and destination stack comparisons, benchmark libraries across migrations, and selective voice support only where demand is proven."
  keyBets:
    - "A replay-based scorecard can predict 30-day post-cutover outcomes closely enough to influence executive decisions."
    - "Read-only connector coverage is sufficient for the first benchmark and keeps security review within renewal timelines."
    - "Buyers will value rollback thresholds and workflow diffs more than generic LLM evaluation metrics."
    - "Post-cutover monitoring is the natural expansion product once the benchmark wins the initial deal."
gtm:
  wedge: "Paid benchmark and shadow-test program for renewal-stage Agentforce migrations."
  channels:
    - "Founder-led outbound into Service Cloud renewal, consolidation, and cost-review programs"
    - "Co-sell with Salesforce implementation partners and CX consultants"
    - "Land through QA and AI-operations workstreams that already own launch-readiness reviews"
  funnelTargets: "renewal-stage target account→qualified discovery 35%, discovery→paid benchmark 30%, paid benchmark→production cutover 60%+, cutover→ongoing monitoring 50%+"
  pricing: >-
    Charge a fixed implementation fee plus an annual subscription priced by
    active migration program and monthly mirrored conversations. This matches
    how buyers already budget AI support automation per conversation, outcome,
    or seat while keeping the first contract tied to a board-visible renewal
    decision.
businessModel:
  revenueStreams:
    - "Implementation and data-normalization fees for each cutover program"
    - "Annual cutover-assurance subscription for replay, scoring, and governance"
    - "Ongoing regression-monitoring subscription after launch"
    - "Expansion fees for additional channels, business units, or destination-stack comparisons"
  unitOfValue: "Monthly mirrored conversations under test per active migration program"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more channels after digital text workflows are repeatable"
    - "Expand from one migration program to ongoing monitoring across the support org"
    - "Sell additional business units or regions once compliance packaging is standardized"
    - "Broaden from Agentforce migrations into other source and destination stack comparisons"
strategyMap:
  northStarMetric: "Annualized mirrored conversations covered by production accounts that converted from paid benchmarks"
  inputMetrics:
    - "Days from data access to first replay report"
    - "Paid benchmark win rate from renewal-stage opportunities"
    - "Predicted versus actual resolution variance 30 days after cutover"
    - "Production conversion rate from paid benchmark"
    - "Partner-sourced share of qualified pipeline"
  moatsToBuild:
    - "Replay corpus of historical tickets, knowledge mappings, and cutover outcomes"
    - "Cross-vendor workflow and action diff library"
    - "Launch-readiness scorecards and rollback thresholds trusted by buyers and SIs"
    - "Compliance-ready audit trail for conversation-based migrations"
  killCriteria:
    - "Fewer than 2 of the first 10 qualified renewal-stage prospects buy a paid benchmark over the first 9 months"
    - "Shadow pilots fail to predict 30-day post-cutover resolution and escalation variance within plus or minus 5 points"
    - "More than 30% of qualified beachhead opportunities require day-one voice support"
    - "Core connector deployments remain longer than 21 days after the sixth paying customer"
  mermaid: |
    flowchart LR
      Wedge[Renewal-stage Agentforce benchmark] --> MVP[Replay plus shadow test MVP]
      MVP --> Proof[Accurate cutover verdicts]
      Proof --> Expansion[Monitoring plus more stacks and channels]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Strong wedge clarity with medium conviction until standalone budget and anti-bundling defenses are proven."
    whyBelieve: "The company targets a renewal-driven, board-visible migration problem with clear buyers, existing AI spend benchmarks, and a neutrality advantage incumbents cannot credibly offer."
    whyDoubt: "If buyers fold assurance into SI scopes or Salesforce bundles comparable migration analytics quickly, the wedge can compress before enough benchmark data is collected."
    nextDiligence: "Verify that at least two renewal-stage design partners will pay for a pre-cutover benchmark and that its predicted deltas match 30-day production results."
  firstCustomer:
    title: "VP Support Operations at a Salesforce-centered B2B SaaS company"
    profile: "500 to 2,000 employee B2B SaaS company with 75 to 200 digital support agents, 20,000-plus monthly text conversations, Salesforce CRM, and an incumbent AI-enabled helpdesk nearing renewal."
    trigger: "COO- or board-led cost and consolidation review ahead of a Q3 or Q4 helpdesk renewal or post-acquisition platform review."
    buyer: "VP Customer Support or VP CX Operations"
    initialContract: "8 to 12 week paid benchmark and shadow-test program at $30k to $50k, with pre-agreed conversion to a $75k to $100k annual subscription plus implementation fees if the team proceeds to rollout."
  mustBeTrue:
    - "At least 3 of the first 10 qualified renewal-stage prospects buy a paid benchmark instead of asking for a free pilot."
    - "Pre-cutover replay plus shadow scores predict 30-day post-cutover resolution and escalation variance within plus or minus 5 points."
    - "Chat, email, and Slack coverage satisfies at least 70% of beachhead deals before voice is required."
    - "A core connector set of Salesforce, one incumbent helpdesk, and one knowledge base can be deployed read-only in 21 days or less."
    - "Salesforce ecosystem partners refer or co-sell because neutral assurance increases migration confidence without displacing their services revenue."
  diligenceQuestions:
    - "Who owns the budget line when AI migration assurance is bought: VP Support, COO, or the SI?"
    - "Which metric actually drives executive go or no-go decisions: resolution delta, escalation delta, policy breaches, or handle time?"
    - "How many target accounts require voice or telephony coverage in phase one?"
    - "What minimum data-security and retention controls are required to clear enterprise review in under 45 days?"
    - "How quickly is Salesforce likely to ship enough native migration analytics to erode a standalone wedge?"
operatingAssumptions:
  - assumption: "Buyers will approve a standalone budget for neutral cutover assurance when a helpdesk renewal or consolidation project is active."
    basis: research.yaml
    validationTest: "Run 10 buyer interviews and convert at least 2 into paid benchmarks with separate purchase orders or explicit line items."
    decisionImpact: "If false, packaging shifts toward white-labeled partner delivery or bundled SI scopes instead of direct software-first sales."
  - assumption: "Text-channel deployments can establish repeatable proof before voice support is needed."
    basis: research.yaml
    validationTest: "In the first 5 design-partner opportunities, no more than 1 should require voice to sign the initial contract."
    decisionImpact: "If false, the roadmap must pull forward telephony integrations, QA, and compliance work, increasing capital needs."
  - assumption: "Read-only connectors to Salesforce, the incumbent helpdesk, and the knowledge base are enough to generate a credible cutover verdict."
    basis: idea.yaml
    validationTest: "Deliver first replay reports without write access in 3 pilot environments and confirm sponsors use them in go or no-go discussions."
    decisionImpact: "If false, onboarding becomes slower and more security-heavy, reducing deployment speed and gross margin."
  - assumption: "Partner-led implementation will accelerate pipeline rather than treat the product as competitive with services revenue."
    basis: research.yaml
    validationTest: "Sign 2 co-sell agreements and source at least 30% of qualified opportunities from partners by month 12."
    decisionImpact: "If false, the company must hire more direct enterprise sellers earlier and narrow geographic coverage."
  - assumption: "A services-assisted launch can still mature into 70% plus software gross margin once connectors and scorecards are standardized."
    basis: operator judgment
    validationTest: "Track deployment hours per account and reduce implementation effort by 50% between the first and sixth paying customer."
    decisionImpact: "If false, the business behaves more like a consultancy and should either raise more capital or narrow product scope."
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Budget ownership interviews"
    hypothesis: "Renewal-stage buyers will fund neutral assurance as its own decision artifact rather than only inside SI scope."
    successMetric: "10 buyer interviews, 5 partner interviews, and 2 prospects agreeing to a paid benchmark structure."
    owner: "CEO / GTM founder"
  - horizon: "0–90 days"
    experiment: "Core replay connector MVP"
    hypothesis: "Read-only access to Salesforce, one incumbent helpdesk, and one knowledge base is enough to produce the first benchmark report."
    successMetric: "First end-to-end replay report delivered in a sandbox or pilot environment within 21 days of data access."
    owner: "Founding eng"
  - horizon: "90–180 days"
    experiment: "Paid replay pilot"
    hypothesis: "A fixed-scope historical replay benchmark is easier to buy than a broad migration project."
    successMetric: "Close 2 paid pilots at $30k plus and deliver executive scorecards tied to live renewal decisions."
    owner: "CEO / GTM founder"
  - horizon: "90–180 days"
    experiment: "Shadow-mode launch readiness pilot"
    hypothesis: "Live shadow traffic surfaces enough workflow and escalation gaps to justify conversion into a production cutover contract."
    successMetric: "At least 1 pilot converts to a production cutover program and records fewer than 5 point variance versus forecast after launch."
    owner: "Solutions architect"
  - horizon: "180–365 days"
    experiment: "Partner co-sell motion"
    hypothesis: "Salesforce SIs and CX consultants will refer the product because neutral proof improves client confidence without replacing implementation revenue."
    successMetric: "2 signed co-sell partners and 30% of qualified pipeline sourced by partners."
    owner: "Partnerships lead"
  - horizon: "180–365 days"
    experiment: "Post-cutover monitoring expansion"
    hypothesis: "Accounts that used the cutover benchmark will pay for ongoing regression monitoring after launch."
    successMetric: "50% of production cutover customers add a monitoring subscription within 90 days of go-live."
    owner: "Applied AI engineer"
operations:
  - "Run a read-only data-ingestion workflow with sub-processor register, retention rules, and deletion SLAs for conversation data."
  - "Standardize connector playbooks for Salesforce, one incumbent helpdesk, and one knowledge base before accepting custom integrations."
  - "Hold weekly cutover reviews that calibrate resolution, escalation, and policy scorecards with the customer's QA lead."
  - "Require a launch gate and rollback checklist signed by the buyer sponsor, support systems lead, and implementation partner."
  - "Package partner enablement materials that define neutral-verdict responsibilities versus implementation services work."
team:
  - role: "CEO / GTM founder"
    startTiming: "Month 0"
    rationale: "Owns renewal-stage selling, design-partner discovery, and Salesforce ecosystem relationships while the market wedge is still being proven."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Builds the replay engine, core connectors, security model, and deployment tooling that determine time-to-first-report."
  - role: "Applied AI engineer"
    startTiming: "Month 1"
    rationale: "Owns scoring, workflow diffs, and calibration between predicted deltas and post-cutover outcomes."
  - role: "Solutions architect"
    startTiming: "Month 4"
    rationale: "Turns early design partners into repeatable deployments and captures the implementation playbooks partners need."
  - role: "Partnerships lead"
    startTiming: "Month 9"
    rationale: "Formalizes SI and consultant channels once at least one repeatable paid benchmark motion exists."
milestones:
  - horizon: "0–12 months"
    items:
      - "Close 3 to 5 paid design partners timed to live renewal or consolidation projects."
      - "Ship read-only connectors for Salesforce, two incumbent helpdesks, and two knowledge-base systems."
      - "Demonstrate pre-cutover resolution and escalation predictions within plus or minus 5 points of 30-day post-launch results in 2 accounts."
      - "Secure 2 Salesforce ecosystem co-sell partners."
  - horizon: "12–24 months"
    items:
      - "Convert at least 6 accounts to annual subscriptions with post-cutover monitoring."
      - "Standardize core deployments to less than 21 days from approved data access to first benchmark report."
      - "Launch a benchmark library of recurring failure patterns across migrations."
      - "Add selective voice support only for accounts where digital-first proof already works."
  - horizon: "24–36 months"
    items:
      - "Expand beyond Agentforce migrations into broader multi-stack benchmarking and regression monitoring for support organizations."
      - "Enter Europe only with packaged GDPR and AI-transparency controls."
      - "Reach the research-based year-3 path of roughly 90 annualized customers or equivalent revenue coverage."
risks:
  - risk: "Salesforce bundles sufficient pre-cutover analytics into Agentforce or Fin."
    likelihood: Medium
    impact: High
    mitigation: "Stay vendor-neutral, compare across multiple source and destination stacks, and deepen post-launch monitoring and audit workflows that suites cannot credibly arbitrate."
  - risk: "Buyers treat assurance as part of SI scope rather than standalone software."
    likelihood: Medium
    impact: High
    mitigation: "Price the first benchmark as the decision artifact and support white-label or co-sell packaging with SIs rather than fighting procurement structure."
  - risk: "Integration and data-governance work lengthens deployment beyond renewal windows."
    likelihood: High
    impact: High
    mitigation: "Limit the MVP to read-only text channels, standardized connectors, and pre-approved data handling packages."
  - risk: "Voice becomes a day-one requirement in the beachhead."
    likelihood: Medium
    impact: Medium
    mitigation: "Qualify for digital-first accounts first and use an explicit kill criterion if more than 30% of qualified deals require voice."
  - risk: "Predicted deltas fail to correlate with post-cutover outcomes strongly enough to support go or no-go decisions."
    likelihood: Medium
    impact: High
    mitigation: "Use early pilots to calibrate scorecards, tie predictions to 30-day outcomes, and drop weak metrics from the decision artifact."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund a five-person product and delivery team, build core connectors plus
    replay and shadow infrastructure, complete 3 to 5 paid design partners, and
    establish the first Salesforce-partner channel while proving budget
    ownership and prediction accuracy.
