modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads[Qualified SRE accounts] --> Pilots[Paid replay pilots]
      Pilots --> Production[Production trust layer]
      Production --> Expansion[More services plus live trust scoring]
      Production --> Revenue[Subscription and usage revenue]
      Expansion --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from four paying accounts by Y1, 24 production customers by Q4Y2, and partner-assisted expansion to 105 customers at roughly $84K blended ARPU by Q4Y3.
- checkName: Must go right
  finding: The company must keep onboarding inside the narrow Datadog or Grafana plus PagerDuty or incident.io plus Kubernetes plus GitHub bundle so pilots convert without turning solutions work into services-heavy burn.
- checkName: Model breaks if
  finding: If sales cycles drift toward nine months or buyers cap the product at replay-only ACV, the downside case runs through cash before the Y3 expansion curve arrives.
- checkName: Next-round proof
  finding: The next financing case is 24 production customers, live trust scoring with approval gates, and enough partner-sourced pipeline by Q4Y2 to support efficient Y3 growth.
sanityChecks:
  ruleOf40: Y3 growth 428.6% + EBITDA margin 2.5% = 431.1% (inflated by the very small Y2 revenue base).
  burnMultiple: Y2 burn multiple is ~0.9x (EBITDA burn $1.49M / net new ARR ~$1.63M), which looks efficient on paper but still depends on enterprise renewals and expansion holding.
  revenuePerFte: $297K Y3 revenue per year-end FTE (benchmark ~$200–400K SaaS heuristic).
  flags:
  - The jump from 24 customers at Q4Y2 to 105 at Q4Y3 requires partner-assisted pipeline and short security reviews that the company has not yet proven.
  - Gross margin only reaches target if replay onboarding, evidence-graph setup, and security packaging become repeatable enough to avoid a services-heavy implementation team.
  - Base-case cash bottoms at roughly $585K in Q2Y3, so any financing delay or hiring pull-forward would tighten runway quickly.
  - The model assumes enough prospects can supply 20-50 usable historical incidents; if data sufficiency is worse than expected, both conversion and ACV should reset lower.
