assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: '[BP date 2026-06-04] model starts the month after the business-plan date.'
- id: A2
  name: Opening cash from seed raise
  value: '3400.0'
  unit: USDK
  source: '[BP fundingAsk.targetFundingRangeUsd $3–5M][BP fundingAsk.runwayMonths 18] + model rule to reach the Q4Y2 milestone with an added 6-month buffer.'
- id: A3
  name: Starting paying customers
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] the company starts before any paid pilot is live.'
- id: A4
  name: Revenue recognition convention
  value: Average active customers in period × blended ACV for that period
  unit: formula
  source: '[BP gtm.pricing][BP investorMemo.firstCustomer] modeling convention to reconcile customer counts with pilot-to-production revenue timing.'
- id: A5
  name: Year 1 customer ramp
  value: '[0,0,0,0,1,1,2,2,3,3,4,4]'
  unit: customers EoP by month
  source: '[BP milestones 0–12 months] maps to 3-5 paid pilots during the year and at least 2 production conversions by year-end, with monthly interpolation.'
- id: A6
  name: Year 2 customer ramp
  value: '[7,11,17,24]'
  unit: customers EoP by quarter
  source: '[BP milestones 12–24 months][BP gtm.channels] assumes repeatable founder-led sales plus early partner assistance, but remains far below the research SOM path.'
- id: A7
  name: Year 3 customer ramp
  value: '[38,58,80,105]'
  unit: customers EoP by quarter
  source: '[BP market.som 160 customers][BP milestones 24–36 months] scales meaningfully in Y3 while staying below the modeled SOM and requiring partner-assisted growth.'
- id: A8
  name: Paid pilot ACV
  value: '30.0'
  unit: annualK
  source: '[BP gtm.pricing $20k-$35k paid pilot][BP investorMemo.firstCustomer] midpoint of the stated pilot range.'
- id: A9
  name: Late-Y1 blended ACV after first conversions
  value: '60.0'
  unit: annualK
  source: '[BP investorMemo.firstCustomer] months 10-12 assume a blend of pilots and the first $75k-$90k production contracts rather than full mature pricing.'
- id: A10
  name: Year 2 blended ACV
  value: '78.0'
  unit: annualK
  source: '[BP gtm.pricing][BP market.sam] low-midpoint of the stated $75k-$90k annual production value for one response organization.'
- id: A11
  name: Year 3 blended ACV
  value: '84.0'
  unit: annualK
  source: '[BP businessModel.expansionLevers][BP product.twelveMonth] assumes modest attach from live trust scoring and approval gates while remaining within the stated pricing envelope.'
- id: A12
  name: Gross margin ramp
  value: 55% Y1, 66% Y2, 70% Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] early replay onboarding and security packaging depress margin until integrations standardize.'
- id: A13
  name: Monthly logo churn for unit economics
  value: '1.5'
  unit: percent
  source: '[BP first customer profile with annual contracts] + startup-finance heuristic for seed-stage enterprise infrastructure SaaS.'
- id: A14
  name: Founder CEO loaded compensation
  value: '150.0'
  unit: annualK
  source: '[BP team Founder CEO] + startup-finance heuristic for below-market founder cash compensation at seed stage.'
- id: A15
  name: Engineering loaded compensation
  value: '200.0'
  unit: annualK
  source: '[BP team Founding eng][BP team ML/evals engineer] + startup-finance heuristic for US-based infrastructure and ML engineering talent.'
- id: A16
  name: Product or solutions loaded compensation
  value: '170.0'
  unit: annualK
  source: '[BP team Product and solutions engineer] + startup-finance heuristic for early implementation and customer workflow talent.'
- id: A17
  name: GTM loaded compensation
  value: '200.0'
  unit: annualK
  source: '[BP team GTM lead] + startup-finance heuristic for founder-led enterprise GTM plus first seller OTE and burden.'
- id: A18
  name: G&A or ops loaded compensation
  value: '140.0'
  unit: annualK
  source: Startup-finance heuristic for the first finance or operations hire added only after the product and GTM motion are clearer.
- id: A19
  name: Hiring schedule
  value: Founder CEO and founding engineer M1; product or solutions engineer M4; ML or evals engineer M7; integration engineer M10; GTM lead M12; engineer M15; AE and customer success M18; engineer M21; ops M23; customer success M25; AE M27; engineer M30; AE M33; engineer M34; ops M35
  unit: timing
  source: '[BP team.startTiming][BP strategicChoices.sequencingRationale] hiring is milestone-gated so product and onboarding capacity land before a larger sales ramp.'
- id: A20
  name: Year 1 non-payroll opex
  value: S&M $6K-$18K/mo; R&D $8K-$15K/mo; G&A $7K-$10K/mo
  unit: USDK per month
  source: '[BP operations][BP experimentRoadmap] + startup-finance heuristic for cloud spend, security review materials, travel, and legal setup during design-partner onboarding.'
- id: A21
  name: Years 2-3 non-payroll opex
  value: Y2 non-payroll opex $102K-$174K per quarter; Y3 $170K-$225K per quarter
  unit: USDK per quarter
  source: '[BP product.twelveMonth][BP operations][research reportMemo.validationPlan] assumes higher cloud costs, partner enablement, security review support, and customer success tooling as production usage grows.'
- id: A22
  name: Steady-state CAC
  value: '20.0'
  unit: USDK
  source: Derived from the modeled Y2-Y3 sales and marketing spend plus pre-sales and partner-assisted GTM overhead, divided by new logos; consistent with a focused enterprise wedge rather than a broad top-of-funnel motion.
- id: A23
  name: Funding ask sizing rule
  value: Reach the Q4Y2 production milestone plus a 6-month buffer into Q2Y3
  unit: policy
  source: '[BP fundingAsk.useOfFundsSummary] combined with the financial-model stage requirement to include a 6-month cash buffer.'
- id: A24
  name: Cash flow simplification
  value: Ending cash equals opening cash plus cumulative EBITDA
  unit: formula
  source: 'Startup-finance heuristic: capex, debt service, taxes, and working-capital swings are assumed immaterial for a software-first seed company.'
