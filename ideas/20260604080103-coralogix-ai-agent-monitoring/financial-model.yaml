scenarios:
  downside:
    description: Pilot conversion slows, buyers keep the product in replay-only mode longer, and partner channels arrive late, leaving the company short of the Y3 scale curve.
    y3RevenueK: 3195.0
    y3EbitdaK: -615.0
    cashLowPointK: -95.0
    keyAssumptionChanges:
    - Y2 quarter-end customers slow to 6, 9, 13, and 18.
    - Y3 quarter-end customers slow to 28, 40, 55, and 72.
    - Blended ACV caps near $75K and gross margin tops out near 67% because live trust scoring and onboarding automation lag.
  base:
    description: Founder-led pilots convert into 24 production customers by Q4Y2, then partner-assisted expansion carries the company to 105 customers at about $84K blended ARPU by Q4Y3.
    y3RevenueK: 5050.5
    y3EbitdaK: 127.01
    cashLowPointK: 585.12
    keyAssumptionChanges:
    - No changes versus assumptions A1-A24.
  upside:
    description: Data sufficiency is better than expected, pilots convert faster, and live trust scoring plus approval gates attach earlier, lifting both customer count and ACV.
    y3RevenueK: 6210.0
    y3EbitdaK: 720.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
    - Y2 quarter-end customers improve to 8, 13, 20, and 30.
    - Y3 quarter-end customers improve to 45, 70, 95, and 125.
    - Blended ACV reaches about $88K and gross margin reaches 72% as onboarding and trust-score delivery standardize faster.
