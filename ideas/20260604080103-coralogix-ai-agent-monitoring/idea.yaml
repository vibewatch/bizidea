differentiator: >-
  Incumbent observability vendors monitor systems and increasingly ship their own AI investigators, but they are structurally biased toward maximizing agent usage inside their platform rather than independently grading whether the investigation was good. Generic LLM eval tools understand prompts, not the sequence of production evidence an incident agent should gather across services, deploys, and telemetry types. This startup becomes the neutral certification layer for engineering agents, with a moat built from replay datasets, investigation graphs, and customer-specific failure patterns.
