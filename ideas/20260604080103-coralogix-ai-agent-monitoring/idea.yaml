jobsToBeDone:
  - job: "When we roll an AI incident assistant into on-call, help our SRE team prove it follows a defensible investigation path, so we can trust it on sev-1 incidents without slowing humans down."
    currentAlternative: "Manual postmortem sampling and ad hoc prompt tests."
    successMetric: "Percentage of replayed critical incidents where the agent reaches the approved root cause within the team's response-time target."
  - job: "When a new model, prompt, or vendor agent is proposed, help our platform team replay historical incidents against it, so we can approve changes with evidence instead of intuition."
    currentAlternative: "Trial-and-error in staging plus dashboard screenshots and spreadsheet notes."
    successMetric: "Time to approve a model or agent upgrade falls from weeks to days with no increase in incorrect incident diagnoses."
ideaScorecard:
  signalStrength:
    score: 5
    rationale: "Multiple sources confirm both enterprise spend and real user behavior, making the dashboard-to-agent shift unusually concrete for a new infrastructure wedge."
  painIntensity:
    score: 4
    rationale: "A wrong AI diagnosis in an active incident can waste precious minutes and push teams back to manual response, though the pain is strongest in organizations already adopting AI responders."
  wedgeClarity:
    score: 5
    rationale: "Incident replay and grading for AI responders is a narrow, buyer-recognizable starting point with a direct rollout trigger."
  defensibility:
    score: 4
    rationale: "Customer-specific investigation graphs, replay corpora, and trust policies can compound into a durable moat, even if observability vendors add partial features."
  ventureScale:
    score: 5
    rationale: "The same trust layer can expand from incident triage into remediation approval, engineering-agent governance, and a broader control plane for production AI agents."
topRisks:
  - name: "Observability vendor bundling"
    description: "Coralogix, Datadog, Grafana, or other platforms could add basic replay and trust scoring into their own agent products."
    mitigation: "Stay neutral across heterogeneous observability stacks and own the independent certification workflow that buyers need before trusting any single vendor's agent."
  - name: "Sparse incident history"
    description: "Mid-market teams may not have enough well-labeled historical incidents to train or benchmark agent quality quickly."
    mitigation: "Start with replay on a customer's highest-severity incidents, augment with structured postmortem imports, and productize cross-customer benchmark templates without mixing private data."
  - name: "False confidence risk"
    description: "If the platform overstates an agent's reliability, customers could trust a weak diagnosis during a live outage and lose faith in the product."
    mitigation: "Default to conservative trust thresholds, require evidence completeness checks, and keep human approval in the loop until replay coverage proves the agent is safe."
