differentiator: 现有可观测性厂商会监控系统，也越来越多地推出自己的 AI 调查 Agent，但它们天然更想提高自家平台里的 Agent 使用率，而不是中立地判断这次调查到底好不好。通用 LLM 评测工具懂提示词，却不懂事故 Agent 跨服务、部署和多种遥测类型时，应该按什么顺序收集生产证据。这个创业公司要做的是工程 Agent 的中立认证层，护城河则来自 replay 数据集、调查图谱以及每家客户独有的失败模式。
