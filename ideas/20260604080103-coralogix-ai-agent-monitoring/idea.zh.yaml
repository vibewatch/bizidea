jobsToBeDone:
- job: 当我们把 AI 事故助手接入 on-call 时，帮 SRE 团队证明它走的是一条站得住脚的调查路径，这样我们就能在 sev-1 事故里信任它，又不拖慢人。
  currentAlternative: 手工抽样复盘，加上临时的 prompt 测试。
  successMetric: 在重放过的关键事故里，Agent 能在团队设定的响应时限内命中批准根因的占比。
- job: 当团队准备切换新模型、新提示词或外部 Agent 时，帮平台团队把历史事故拿来 replay，这样审批依据就是证据，而不是感觉。
  currentAlternative: 在 staging 里反复试错，再配上仪表盘截图和表格备注。
  successMetric: 模型或 Agent 升级的审批时间从数周缩到数天，且错误事故诊断没有上升。
