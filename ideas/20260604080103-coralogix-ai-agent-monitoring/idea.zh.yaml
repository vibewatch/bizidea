problem: SRE 团队已经开始让 AI Agent 做事故调查的第一轮判断，但他们仍然说不清 Agent 有没有看对证据、漏掉关键线索，或在高压下直接幻觉出一个根因。传统可观测性工具抓的是基础设施遥测，不会衡量 Agent 穿过日志、trace、部署事件和 runbook 时，调查路径到底靠不靠谱。界面一旦从仪表盘转向聊天和 CLI，真正卡住采用的就变成了信任：工程师需要一套可复现的方法，先给 AI 主导的调查打分，再决定能不能把它用进高严重度事故。
targetUser:
  primary: 正在把 AI 辅助事故调查接到 Datadog、Grafana、CloudWatch、Kubernetes 和部署工具上的云原生 B2B SaaS 与金融科技公司的 SRE 和平台团队。
  secondary: 负责复盘质量、on-call 效率，以及内部或外部 AI 响应 Agent 落地的工程总监和事故指挥官。
  buyer: 工程副总裁、SRE 负责人或平台工程总监。
startupThesis:
  nonObviousInsight: 缺的不是又一个 observability backend，也不是又一个聊天界面。真正缺的是一层可靠性基础设施：它要衡量 AI 事故 Agent 走过的调查路径能不能自圆其说、证据是不是足够、结论是不是人类可以安全执行。
  beachhead: 首个滩头市场是中端的云原生 SaaS 和金融科技公司：工程师规模在 50–300 人，有集中式 SRE 或平台团队，且已经在 sev-1、sev-2 事故上把 AI 调查挂到现有 observability 栈上。
  wedge: 切口是一层事故 replay 与评分系统：它把历史事故重新跑给 AI Agent，看证据覆盖和根因质量是否过关，并在 Agent 成为默认响应者之前先产出审批闸门和 runbook 修补建议。
  whyNowCatalyst: Coralogix 的数据已经说明，事故调查正在从仪表盘迁到 AI 与 CLI 界面；与此同时，遥测数据量暴涨，让团队根本不可能靠人工在生产规模上逐条验证 Agent 的推理过程。
  ventureScalePath: 先从 SRE 团队的事故 Agent 认证做起，再往实时 trust score、修复动作闸门、自主响应 Agent 审计轨迹扩张，最终长成管住所有会碰生产系统的工程 Agent 的操作系统。
solution: 产品接到现有 observability 栈后，会把每次 AI 主导事故的完整调查图谱记下来：提示词、工具调用、查询过的服务、拿到的证据、怀疑过的原因以及人工覆盖。它会把历史 sev-1 和 sev-2 事故拿来重放，测试新模型、新提示词或外部 Agent，看它是否足够快地找到正确根因，且证据覆盖是否充足。只要调查链条偏弱，系统就会指出漏查了哪些查询、忽略了哪些部署变更、或是哪些 runbook 步骤太脆，并把它们直接转成 runbook 补丁或升级规则。在线上，平台会给每个实时事故打 trust score；一旦 Agent 证据太薄、互相矛盾，或落在批准模式之外，就必须让人确认。这样，中端团队就能在不替换遥测 backend 的前提下，把 Datadog、Grafana、OpenSearch 或 Coralogix 上的 AI 响应真正用起来。
goToMarketSeed:
  firstCustomer: 第一个客户应是 200–1,500 人规模的 B2B SaaS 或金融科技公司，SRE 团队 5–15 人，技术栈是 Datadog 或 Grafana 加 Kubernetes，且内部或外部的 AI 事故助手已经开始进入主要 sev-1 分诊。
  buyingTrigger: 触发购买的通常是最近一次事故里，AI 助手给出了有争议的诊断；或者管理层直接要求把 AI 变成 on-call 调查的默认第一步。
  currentAlternative: 手工复盘、来回切仪表盘、通用 LLM 评测工具，以及靠临时表格记录 Agent 到底说没说对。
  switchingReason: 首个客户愿意切过来，是因为这个切口能用他们自己的历史事故和现有技术栈，直接证明事故 Agent 靠不靠谱，而不用把已信任的 observability 平台整套推倒重来。
  pricingHypothesis: 按接入的生产服务数量和重放事故量收取年费订阅；实时 trust score 和 remediation gating 则做更高档位。
