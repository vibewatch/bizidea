topRisks:
- name: 可观测性厂商捆绑销售
  description: Coralogix、Datadog、Grafana 等平台可能会把基础版 replay 和 trust scoring 直接塞进自家的 Agent 产品。
  mitigation: 保持跨异构 observability 栈的中立位置，并拿住买家在信任任何单一厂商 Agent 之前都需要的独立认证工作流。
- name: 事故历史太稀疏
  description: 中端团队未必有足够多、标注足够好的历史事故，难以快速训练或基准化 Agent 质量。
  mitigation: 先从客户最严重的事故开始 replay，再用结构化 postmortem 导入补齐，并把跨客户的 benchmark 模板产品化，但不混用私有数据。
- name: 虚假信心风险
  description: 如果平台高估了 Agent 的可靠性，客户可能会在真实故障时相信一个很弱的诊断，随后对产品失去信任。
  mitigation: 默认采用保守阈值，要求证据完整性检查，在 replay 覆盖率证明 Agent 安全之前始终把人工审批留在环内。
