scenarios:
  downside:
    description: 试点转正变慢，买家更久地把产品停留在“只做 replay”模式，伙伴渠道也到位更晚，导致公司追不上第 3 年的放量曲线。
    y3RevenueK: 3195.0
    y3EbitdaK: -615.0
    cashLowPointK: -95.0
    keyAssumptionChanges:
    - Y2 各季度末客户数放缓至 6、9、13、18。
    - Y3 各季度末客户数放缓至 28、40、55、72。
    - 混合 ACV 被压在约 $75K，毛利率最高只能到约 67%，因为实时 trust score 与 onboarding automation 落地偏慢。
  base:
    description: 创始人主导的试点在 Q4Y2 前转成 24 个生产客户，随后依靠伙伴辅助扩张，到 Q4Y3 走到 105 个客户、约 $84K 的混合 ARPU。
    y3RevenueK: 5050.5
    y3EbitdaK: 127.01
    cashLowPointK: 585.12
    keyAssumptionChanges:
    - 与假设 A1-A24 相比无变化。
  upside:
    description: 数据充足性好于预期，试点转正更快，实时 trust score 与审批闸门更早被加购，从而同时抬高客户数和 ACV。
    y3RevenueK: 6210.0
    y3EbitdaK: 720.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
    - Y2 各季度末客户数改善到 8、13、20、30。
    - Y3 各季度末客户数改善到 45、70、95、125。
    - 随着 onboarding 和 trust score 交付更快标准化，混合 ACV 提升到约 $88K，毛利率升到 72%。
