slug: incident-agent-replay-layer
date: '2026-06-04'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date 2026-06-04] 模型从 business-plan 日期后的次月开始。'
- id: A2
  name: 种子轮融资带来的期初现金
  value: '3400.0'
  unit: USDK
  source: '[BP fundingAsk.targetFundingRangeUsd $3–5M][BP fundingAsk.runwayMonths 18] + 模型规则：跑到 Q4Y2 里程碑后，再额外留出 6 个月缓冲。'
- id: A3
  name: 起始付费客户数
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] 公司启动时还没有任何付费试点上线。'
- id: A4
  name: 收入确认口径
  value: 期间平均活跃客户数 × 当期混合 ACV
  unit: formula
  source: '[BP gtm.pricing][BP investorMemo.firstCustomer] 用这个建模口径把客户数与试点转生产的收入节奏对齐。'
- id: A5
  name: 第 1 年客户爬坡
  value: '[0,0,0,0,1,1,2,2,3,3,4,4]'
  unit: customers EoP by month
  source: '[BP milestones 0–12 months] 对应年内 3–5 个付费试点、且到年末至少转正 2 个生产客户，并按月插值。'
- id: A6
  name: 第 2 年客户爬坡
  value: '[7,11,17,24]'
  unit: customers EoP by quarter
  source: '[BP milestones 12–24 months][BP gtm.channels] 假设创始人主导销售开始可复用，并得到早期伙伴协助，但仍显著低于 research 里的 SOM 路径。'
- id: A7
  name: 第 3 年客户爬坡
  value: '[38,58,80,105]'
  unit: customers EoP by quarter
  source: '[BP market.som 160 customers][BP milestones 24–36 months] 第 3 年明显放量，但仍低于建模的 SOM，上行依赖伙伴辅助增长。'
- id: A8
  name: 付费试点 ACV
  value: '30.0'
  unit: annualK
  source: '[BP gtm.pricing $20k-$35k paid pilot][BP investorMemo.firstCustomer] 取试点价格区间中点。'
- id: A9
  name: 第 1 年后段的混合 ACV（含首批转正）
  value: '60.0'
  unit: annualK
  source: '[BP investorMemo.firstCustomer] 第 10–12 个月按试点与首批 $75k-$90k 生产合同混合计算，而不是直接按成熟定价。'
- id: A10
  name: 第 2 年混合 ACV
  value: '78.0'
  unit: annualK
  source: '[BP gtm.pricing][BP market.sam] 取“单个响应组织年值 $75k-$90k”区间的偏低中点。'
- id: A11
  name: 第 3 年混合 ACV
  value: '84.0'
  unit: annualK
  source: '[BP businessModel.expansionLevers][BP product.twelveMonth] 假设实时 trust score 和审批闸门带来适度附加值，但仍在给定定价带内。'
- id: A12
  name: 毛利率爬坡
  value: Y1 为 55%，Y2 为 66%，Y3 为 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 早期 replay 上手和安全打包会压低毛利，直到集成开始标准化。'
- id: A13
  name: 用于单位经济模型的月度 logo churn
  value: '1.5'
  unit: percent
  source: '[BP first customer profile with annual contracts] + 种子期企业基础设施 SaaS 的财务经验值。'
- id: A14
  name: 创始人/CEO 全成本薪酬
  value: '150.0'
  unit: annualK
  source: '[BP team Founder CEO] + 种子期创始人以低于市场价领取现金薪酬的财务经验值。'
- id: A15
  name: 工程岗位全成本薪酬
  value: '200.0'
  unit: annualK
  source: '[BP team Founding eng][BP team ML/evals engineer] + 面向美国基础设施与 ML 工程人才的财务经验值。'
- id: A16
  name: 产品或解决方案岗位全成本薪酬
  value: '170.0'
  unit: annualK
  source: '[BP team Product and solutions engineer] + 早期实施与客户工作流人才的财务经验值。'
- id: A17
  name: GTM 岗位全成本薪酬
  value: '200.0'
  unit: annualK
  source: '[BP team GTM lead] + 创始人主导企业 GTM 与首位销售 OTE/负担成本的财务经验值。'
- id: A18
  name: G&A / 运营岗位全成本薪酬
  value: '140.0'
  unit: annualK
  source: 第一位财务或运营岗位通常只会在产品与 GTM 路径更清晰后再补进来，这里按创业公司财务经验值估算。
- id: A19
  name: 招聘节奏
  value: 创始人/CEO 与创始工程师在 M1；产品/解决方案工程师在 M4；ML/评测工程师在 M7；集成工程师在 M10；GTM 负责人在 M12；工程师在 M15；AE 与客户成功在 M18；工程师在 M21；运营在 M23；客户成功在 M25；AE 在 M27；工程师在 M30；AE 在 M33；工程师在 M34；运营在 M35
  unit: timing
  source: '[BP team.startTiming][BP strategicChoices.sequencingRationale] 招聘按里程碑解锁，确保产品与上手能力先于更大的销售扩张到位。'
- id: A20
  name: 第 1 年非人力费用
  value: S&M 每月 $6K-$18K；R&D 每月 $8K-$15K；G&A 每月 $7K-$10K
  unit: USDK per month
  source: '[BP operations][BP experimentRoadmap] + 针对云成本、安全评审材料、差旅和法务搭建的创业财务经验值。'
- id: A21
  name: 第 2–3 年非人力费用
  value: Y2 每季度非人力费用 $102K-$174K；Y3 为 $170K-$225K
  unit: USDK per quarter
  source: '[BP product.twelveMonth][BP operations][research reportMemo.validationPlan] 假设随着生产使用扩大，云成本、伙伴赋能、安全评审支持与客户成功工具都会上升。'
- id: A22
  name: 稳态 CAC
  value: '20.0'
  unit: USDK
  source: 由模型里的 Y2–Y3 销售与市场费用，加上售前与伙伴辅助 GTM 的间接成本，除以新增 logo 得出；更接近聚焦型企业切口，而不是宽泛漏斗打法。
- id: A23
  name: 融资需求口径
  value: 跑到 Q4Y2 的生产里程碑，并额外保留 6 个月缓冲到 Q2Y3
  unit: policy
  source: '[BP fundingAsk.useOfFundsSummary] 结合 financial-model 阶段必须额外加入 6 个月现金缓冲的要求。'
- id: A24
  name: 现金流简化规则
  value: 期末现金 = 期初现金 + 累计 EBITDA
  unit: formula
  source: 创业公司财务经验值：对于以软件为主的种子公司，假设 capex、债务服务、税和营运资本波动都不构成实质影响。
