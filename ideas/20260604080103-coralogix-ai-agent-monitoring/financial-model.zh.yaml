modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads[合格的 SRE 账户] --> Pilots[付费 replay 试点]
      Pilots --> Production[生产 trust layer]
      Production --> Expansion[更多服务 + 实时 trust score]
      Production --> Revenue[订阅与用量收入]
      Expansion --> Revenue
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金与跑道]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下，第 1 年收入来自 4 个付费账户；Q4Y2 达到 24 个生产客户；到 Q4Y3 在伙伴辅助扩张下增至 105 个客户，混合 ARPU 约为 $84K。
- checkName: 必须做对的事
  finding: 公司必须把 onboarding 锁在 Datadog 或 Grafana + PagerDuty 或 incident.io + Kubernetes + GitHub 这一组窄技术栈里，否则试点转正会被沉重的解决方案工作拖成服务型 burn。
- checkName: 模型会失效的条件
  finding: 如果销售周期拖向 9 个月，或买家始终把产品限定在 replay-only ACV，悲观情形会在第 3 年扩张曲线到来前先把现金烧穿。
- checkName: 下一轮融资证明点
  finding: 下一轮融资要看的，是 Q4Y2 前做到 24 个生产客户、交付带审批闸门的实时 trust score，并证明已有足够的伙伴来源 pipeline 支撑高效的第 3 年增长。
sanityChecks:
  ruleOf40: 第 3 年增速 428.6% + EBITDA 利润率 2.5% = 431.1%（这个值被第 2 年很小的收入基数显著放大）。
  burnMultiple: Y2 burn multiple 约为 0.9x（EBITDA burn 为 $1.49M / net new ARR 约 $1.63M）；纸面上看很高效，但仍依赖企业续约和扩张成立。
  revenuePerFte: 按年末 FTE 计算，第 3 年每名员工对应收入约 $297K（对比 SaaS 常见经验区间约 $200–400K）。
  flags:
  - 从 Q4Y2 的 24 个客户跳到 Q4Y3 的 105 个客户，前提是伙伴辅助 pipeline 跑通，且安全评审足够短——这两点公司都还没证明。
  - 只有当 replay onboarding、evidence graph 搭建和安全打包足够标准化，避免组建重服务实施团队，毛利率才可能打到目标。
  - 基准情形下，现金在 Q2Y3 低点约为 $585K，因此只要融资延迟或招聘前置，跑道就会很快变紧。
  - 模型默认足够多潜在客户能拿出 20–50 起可用历史事故；如果数据充足性比预期更差，转化率和 ACV 都应下修。
