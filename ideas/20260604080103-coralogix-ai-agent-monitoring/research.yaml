openQuestions:
- Will buyers insist on an independent trust layer, or will vendor-native incident copilots become good enough for most teams?
- How much labeled historical incident data does the median mid-market SRE team actually have for high-confidence replay?
- 'Which integrations are truly mandatory in the first 90 days: observability, incident management, source control, deployment, or all of the above?'
- Will the category expand first through read-only certification, or only once customers are ready to let agents trigger remediation actions?
