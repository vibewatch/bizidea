competitors:
- name: Coralogix
  stage: 成长期
  wedge: 横跨多栈的 observability，加上 AI observability、AI Center 和类似 Olly 的 Agent 工作流。
  pricing: 销售驱动；抓取到的 AI observability 页面没有公开标价。
  strength: 遥测架构强，而且已经有企业级证据证明客户会通过 AI 与 CLI 界面查询事故。
  weaknessVsUs: 平台原生激励让它更难在 Datadog、Grafana、PagerDuty 和自研 Agent 之间做真正中立的认证。
  sourceRefs:
  - 1
  - 2
  - 21
  - 30
- name: Datadog
  stage: 在位厂商
  wedge: 把 LLM trace、评测和事故响应都收进同一套 observability 平台。
  pricing: 从抓取到的产品页面看，以定制 / 用量计费为主；LLM observability 页面没有透明价格。
  strength: 装机量巨大，且能把 Agent 行为和基础设施、服务、真实用户遥测直接串起来。
  weaknessVsUs: 最适合买家已经 All-in Datadog 的场景；一旦要做跨栈事故调查的独立裁判，优势就弱了。
  sourceRefs:
  - 31
  - 32
  - 33
  - 34
- name: PagerDuty
  stage: 在位厂商
  wedge: 围绕更快的事故协同，提供 AIOps、on-call、分析和工作流自动化。
  pricing: 事故管理套餐从免费到 enterprise 分层；AIOps 走相邻加购路径。
  strength: 在运营层面信誉深，告警路由、事故分析和“更快解决”的 ROI 故事都很成熟。
  weaknessVsUs: 更偏工作流，而不是证据本身；它原生并不会认证 AI 调查员在提出行动建议前是否已经收集足够遥测。
  sourceRefs:
  - 45
  - 46
  - 47
  - 48
- name: incident.io
  stage: 成长期
  wedge: Slack 原生事故指挥，加上 AI SRE 调查和 AI 辅助 postmortem。
  pricing: $15–$25 每用户每月，on-call 另加；enterprise 定制定价。
  strength: 非常贴近实时事故场景，且围绕 AI SRE 工作流迭代很快。
  weaknessVsUs: 核心仍是协同体验和平台内自动化，不是面向异构 observability 与 incident 栈的中立 replay。
  sourceRefs:
  - 62
  - 64
  - 65
  - 66
  - 67
- name: LangSmith
  stage: 成长期
  wedge: 面向 AI 应用构建者的通用 Agent 可观测性与评测平台。
  pricing: 付费版 $39 每 seat 每月，另加 trace 量计费。
  strength: tracing、评测和数据集工作流都很强，而且在 Agent 构建者里已有明显采用。
  weaknessVsUs: 对 AI 应用团队非常强，但不是 incident-native；缺少 outage 时间线、升级流程和批准根因真值集这些原生概念。
  sourceRefs:
  - 76
  - 77
  - 78
  - 79
regulatoryTechnicalConstraints:
- point: 可信 AI 项目越来越要求：只要 AI 系统会影响关键运营，就必须有可追溯性、监控和治理材料。
  sourceRefs:
  - 10
  - 14
- point: prompt injection 和不安全输出风险意味着，只要涉及实时 remediation 或高严重度建议，就必须上保守安全闸门和清晰审计轨迹。
  sourceRefs:
  - 12
- point: 不同云厂商暴露的监控与 Agent runtime 原语并不相同，所以跨平台归一化本身就是一道真实的工程题。
  sourceRefs:
  - 15
  - 16
  - 17
- point: 高质量 replay 的前提，是历史事故记录、工具调用 trace 和部署上下文能以一致格式被拿到。
  sourceRefs:
  - 6
  - 7
  - 45
validationSignals:
- point: Coralogix 表示，超过一半的企业客户已经通过 CLI 和 agentic 界面使用 Olly 或自有 AI 模型来调查事故。
  sourceRefs:
  - 1
- point: Google SRE 公开描述过：他们会在缓解、根因分析和 postmortem 生成等环节使用 Gemini CLI。
  sourceRefs:
  - 4
  - 6
- point: incident.io 已把 AI SRE 定位成实时事故调查引擎，而不再只是静态助手，这说明需求已经进入真实工作流。
  sourceRefs:
  - 64
- point: Datadog 关于超过一千家客户生产遥测的报告显示，多步、agentic 的 AI 工作负载已经普及到值得被系统化监控。
  sourceRefs:
  - 33
openQuestions:
- 买家会不会坚持需要一层独立 trust layer，还是说厂商原生 incident copilot 最终对大多数团队已经够用？
- 中端 SRE 团队的中位数，到底有多少带标签的历史事故能支撑高置信 replay？
- 前 90 天真正必需的集成到底是哪几类：observability、incident management、source control、deployment，还是全部都要？
- 这个品类会先靠只读认证扩张，还是必须等客户愿意让 Agent 触发 remediation 动作之后才会爆发？
