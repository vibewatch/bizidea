problem: >-
  Regulated cloud teams have written golden paths, but every non-standard data flow, IAM role, or vendor connection still triggers a manual architecture exception process. Security architects review diagrams in slide decks or Confluence, log approvals in Jira, and hope engineers later implement the promised compensating controls in Terraform and runtime policy tools. Releases slip, approved deviations linger past their expiry dates, and auditors discover that "accepted" risk was never actually enforced in production.
targetUser:
  primary: >-
    Director of cloud platform engineering or principal security architect at a U.S. regional bank or specialty insurer running centralized architecture reviews for AWS application teams
  secondary: >-
    Enterprise architecture review-board leads and DevSecOps managers responsible for Terraform guardrails, exception tickets, and audit evidence
  buyer: "CISO, Head of Cloud Platform, or Chief Architect"
startupThesis:
  nonObviousInsight: >-
    Once cloud reference architectures become enforceable code, the scarce resource is no longer another scanner; it is a trusted system for governing the exceptions every real workload needs. The winners will own the approval graph between golden-path policy, compensating controls, and live evidence, because that is where release velocity and audit risk now collide.
  beachhead: >-
    U.S. regional banks and specialty insurers with 10-50 AWS application squads, a weekly architecture review board, Terraform-based golden paths, and recurring exception requests for new data-sharing patterns, IAM designs, or third-party integrations
  wedge: >-
    A cloud design exception OS that ingests proposed architectures and Terraform changes, compares them to approved patterns, generates compensating-control requirements, and continuously proves that approved deviations remain bounded
  whyNowCatalyst: >-
    Dawnguard's public launch, 15 design partners, and push into regulated U.S. buyers show that secure-by-design cloud architecture has become a live budget category, making exception governance an immediate pain rather than a future feature request.
  ventureScalePath: >-
    Start with high-frequency exception approvals for AWS application teams in regulated enterprises, then expand into all pre-deployment architecture reviews, third-party SaaS design approvals, multi-cloud policy governance, and eventually the system of record for secure cloud change management.
solution: >-
  The startup plugs into architecture decision records, Jira requests, Backstage service catalogs, and Terraform plans to detect where a proposed design deviates from the bank's approved patterns. It generates an exception packet with the exact control gaps, required compensating controls, approvers, expiry window, and implementation tasks for engineers. After approval, it links the exception to IaC and runtime checks so the control promises are continuously verified instead of disappearing into tickets. Security leaders get a live map of active deviations, renewal deadlines, and repeat exception patterns that should become new golden paths. Over time, the company builds the highest-value dataset in the category: which exceptions are common, which controls actually contain them, and which teams create the most audit drag.
goToMarketSeed:
  firstCustomer: >-
    Head of cloud platform engineering at a $10B-$100B U.S. regional bank with 15-30 AWS product squads, a formal architecture review board, and release delays caused by exception tickets for customer-data flows or vendor integrations
  buyingTrigger: >-
    A new customer-facing workload, AI feature, or third-party integration needs a non-standard network or IAM pattern and the architecture review backlog starts threatening a committed release or upcoming audit response
  currentAlternative: >-
    Manual architecture review boards in Confluence and Jira, CSPM and IaC scanners that flag issues after design, and consulting-led control-mapping exercises
  switchingReason: >-
    The product gives security teams a faster path to "yes" by turning each exception into reusable policy, enforceable controls, and live evidence instead of another one-off document package
  pricingHypothesis: >-
    Annual subscription priced by governed cloud accounts and active application squads, with one-time onboarding for the customer's reference-pattern library and optional premium auditor workspace seats
