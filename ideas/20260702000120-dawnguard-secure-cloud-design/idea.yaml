jobsToBeDone:
  - job: >-
      When an application squad proposes a non-standard data flow or IAM design, help the security architect decide the right compensating controls and approvals, so the team can ship on time without creating hidden audit risk.
    currentAlternative: "Review-board meetings, Confluence diagrams, and Jira exception tickets"
    successMetric: "Median exception approval cycle time and percentage of approved deviations with controls implemented before release"
  - job: >-
      When audit or regulator questions hit, help the cloud platform team prove every active exception is still bounded, justified, and unexpired, so they avoid emergency remediation projects and release freezes.
    currentAlternative: "Spreadsheet inventories, screenshot collection, and manual evidence pulls from cloud consoles"
    successMetric: "Hours to produce an exception evidence pack and percentage of active exceptions with live control proof"
