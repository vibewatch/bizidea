topRisks:
  - name: "Policy trust gap"
    description: "Security leaders may not trust software-generated compensating controls enough to approve sensitive exceptions through a new system."
    mitigation: "Start with human-in-the-loop recommendations on one cloud and a few high-volume exception types, while importing the customer's own reference patterns and evidence rules."
  - name: "Integration drag"
    description: "Messy Jira, Backstage, Terraform, and architecture-document workflows could make deployment slower than the release bottlenecks the product is supposed to fix."
    mitigation: "Land first as a thin exception packet and Terraform-plan layer for teams that already use centralized review boards, then deepen integrations only after proving cycle-time savings."
  - name: "Incumbent feature creep"
    description: "CSPM, IaC policy, or enterprise-architecture vendors could add basic exception tracking once the category gets more attention."
    mitigation: "Differentiate on the full approval-to-enforcement lifecycle and the approved-deviation dataset, while integrating with detection vendors instead of trying to replace them."
