    - 64
    - 69
  - case: Architecture governance stays housed inside existing ITSM processes
    impact: If buyers keep architecture approvals inside Jira-style workflows, the startup may need to land first as an evidence and policy-orchestration layer instead of a full replacement system.
    sourceRefs:
