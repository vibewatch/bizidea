  validationPlan:
  - priority: high
    question: How many cloud architecture exceptions, renewals, and expired approvals does a target bank or insurer process per quarter?
    evidenceToGather: Exported Jira/ServiceNow exception tickets, review-board calendars, and renewal logs from 5-8 target accounts.
  - priority: high
    question: 'Which budget owner signs first: cloud platform, security architecture, or GRC/ITSM?'
    evidenceToGather: Buyer interviews plus current-state spend maps across CNAPP, ITSM, and policy-as-code tooling.
  - priority: medium
    question: Is AWS-only enough for the first 24 months, or do buyers require Azure/GCP parity at launch?
    evidenceToGather: Cloud-estate mix and landing-zone patterns from design-partner discovery calls.
  - priority: medium
    question: Will internal audit accept linked runtime evidence instead of screenshot-heavy manual packs?
    evidenceToGather: Audit-team walkthroughs using sample Config/Audit Manager-style evidence bundles and renewal reports.
