  sensitivityCases:
  - case: Native cloud exception features improve faster than expected
    impact: If AWS, Azure, and Google make waivers, approvals, and evidence more workflow-native, the startup must differentiate on cross-tool context, expiry governance, and analytics rather than basic exceptions.
    sourceRefs:
    - 43
