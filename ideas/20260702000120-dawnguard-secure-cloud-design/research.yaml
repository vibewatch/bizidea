competitors:
- name: Dawnguard
  stage: seed
  wedge: Security architecture automation from day zero through production.
  pricing: Custom enterprise plans
  strength: Direct category validation around architecture-to-IaC workflows, regulated buyers, and continuous alignment between design intent and deployed cloud state.
  weaknessVsUs: Broader secure-by-design platform; the proposed startup is narrower on exception approval graphs, compensating-control generation, and renewal governance for U.S. regulated AWS teams.
  sourceRefs:
  - 1
  - 6
  - 7
- name: AWS native governance stack
  stage: incumbent
  wedge: Landing zones, guardrails, policy controls, and audit evidence across AWS accounts.
  pricing: Usage-based AWS services
  strength: Deep preventive and detective primitives inside the target cloud estate.
  weaknessVsUs: Does not own cross-functional business approvals, expiry logic, or ticket-to-evidence workflows for legitimate deviations.
  sourceRefs:
  - 43
  - 44
  - 46
  - 49
  - 51
- name: Spacelift
  stage: scale-up
  wedge: IaC orchestration with policy, approvals, and drift detection.
  pricing: Tiered plans from Free to Enterprise
  strength: Close to the Terraform execution point with strong policy and drift workflows.
  weaknessVsUs: Owns deployment orchestration more than architecture-review system-of-record and audit-ready exception governance.
  sourceRefs:
  - 82
  - 83
- name: Prisma Cloud
  stage: incumbent
  wedge: Code-to-cloud security and CSPM across the software lifecycle.
  pricing: Custom enterprise subscription
  strength: Broad multi-cloud posture visibility and build-time security coverage.
  weaknessVsUs: Centers on misconfigurations, vulnerabilities, and policy checks rather than the human workflow for deciding when a deviation is acceptable.
  sourceRefs:
  - 58
  - 89
  - 98
- name: Jira Service Management
  stage: incumbent
  wedge: Generic change-management and approval workflow for IT teams.
  pricing: Existing ITSM subscription / seat-based workflow spend
  strength: Already embedded in enterprise CAB, change, and audit processes.
  weaknessVsUs: Manual, process-heavy, and disconnected from cloud-control state without significant customization.
  sourceRefs:
  - 93
