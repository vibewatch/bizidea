slug: cloud-design-exception-os
date: "2026-07-02"
executiveSummary: >-
  Regulated AWS teams already turn architecture into enforceable code, but the scarce resource is now the exception layer: the negotiation over which non-standard data flow, IAM role, or vendor integration is acceptable, what compensating control bounds it, and whether that control is still true in production months later. We start with a narrow wedge — a cloud design exception OS for U.S. regional banks and specialty insurers running 10-50 AWS squads with a formal weekly architecture review board — because that segment already has Terraform-based golden paths, recurring exception volume, and audit deadlines that make the pain unavoidable rather than optional. The product ingests architecture proposals, Jira tickets, and Terraform plans, diffs them against approved patterns, and produces an exception packet with required compensating controls, named approvers, and an expiry date, then keeps proving the deviation is still bounded after deployment. Dawnguard's July 2026 launch, 15 design partners, and U.S. expansion validate that secure-by-design cloud budget exists now, but research shows Dawnguard and adjacent CNAPP, IaC, and ITSM vendors stop at detection, policy enforcement, or generic ticketing rather than owning the full approval-to-enforcement lifecycle with a durable evidence chain. Research-derived market sizing puts TAM near $58M, SAM near $20M (roughly 80 AWS-heavy regional banks and insurers with formal review boards), and a reachable three-year SOM of $4.8M across 16 logos at a blended ~$300k ACV — a real but genuinely niche wedge, not a venture-scale market on its own, so the plan is explicit that expansion into broader architecture governance and multi-cloud policy is required to justify a venture return. The near-term goal is not category dominance; it is proving that one design partner can cut exception cycle time and pass an internal-audit walkthrough using live evidence instead of screenshots. The biggest open question the research could not answer is exact backlog volume and cycle time per institution, so the first 90 days are structured around getting that data directly from design partners before committing to a broader integration roadmap. Funding is scoped as a pre-seed round sized to prove this narrow claim with 2-3 paying design partners, not to build a multi-cloud platform.
problem:
  - Security architects at regulated banks and insurers manually review architecture deviations in Confluence decks and Jira tickets, with no system tying the approved exception to the compensating control an engineer actually implements in Terraform or runtime policy.
  - Approved deviations expire silently — auditors and examiners discover "accepted" risk was never enforced in production, forcing release freezes or emergency remediation instead of a routine renewal.
solution:
  - Ingest architecture decision records, Jira requests, Backstage catalog entries, and Terraform plans to detect where a proposed design deviates from the institution's approved reference patterns.
  - Generate an exception packet naming the control gap, required compensating controls, approvers, and expiry window, then link the approved exception to IaC and runtime checks so the control promise is continuously verified rather than filed away.
whyWeWin:
  - The approval-to-enforcement lifecycle (intake → risk assessment → compensating control → expiry → live proof) is not owned end-to-end by any named competitor; Dawnguard, AWS native governance, Spacelift, Prisma Cloud, and Jira Service Management each cover one segment of it, per research's competitive landscape and incumbentThesis analysis.
  - A proprietary graph of which exception types get approved, under what compensating controls, and how often they drift or expire becomes harder for generic scanners or ticketing tools to replicate the longer we run it, per research's dataMoats analysis.
strategicChoices:
  beachhead: >-
    U.S. regional banks ($10B-$100B assets) and specialty insurers with 10-50 AWS application squads, a standing weekly architecture review board, Terraform-based golden paths, and recurring exception requests for data-sharing, IAM, or third-party integration patterns.
  wedgeRationale: >-
    Architecture-review boards at this segment already generate exception tickets on a weekly cadence and already feel audit pressure, so a thin exception-packet layer can show cycle-time and evidence improvements inside one quarter — faster proof than trying to sell a full architecture-governance platform or targeting looser mid-market cloud teams without a formal review board.
  sequencingRationale: >-
    We build the pattern-diff and exception-packet workflow before deep bidirectional Terraform/Backstage sync because research's adoptionFrictionMatrix flags integration drag as a high-severity risk; landing as ticket enrichment first proves value without asking engineering teams to change their delivery pipeline on day one. Sales precedes a large engineering team because the first 2-3 design partners must shape the reference-pattern taxonomy before it can be productized.
  notYet:
    - Azure and Google Cloud parity — AWS-only for the first 24 months per research's geographicConsiderations, since AWS-heavy accounts have the most mature evidence surface (Control Tower, SCPs, Config, Audit Manager).
    - Autonomous risk-acceptance or auto-approval of exceptions — research's regulatoryLandscape and adoptionFrictionMatrix both indicate the product must stay human-in-the-loop workflow and evidence infrastructure, not an automated approver, until trust is established.
    - Expansion into all pre-deployment architecture reviews, third-party SaaS design approvals, and general enterprise change management — deferred until the exception-approval wedge is proven with paying design partners.
market:
  tam: "$58.0M (research estimate: ~232 addressable U.S. banks and P&C insurers with cloud-governance fit, at ~$250k annual platform ACV)"
  sam: "$20.0M (research estimate: ~80 AWS-heavy regional banks and specialty insurers with formal architecture review boards and Terraform-centric guardrails, at ~$250k ACV)"
  som: "$4.8M (research estimate: 16 customers reachable by year 3 at ~$300k blended annual value including onboarding and evidence modules)"
  segments:
    - U.S. regional banks ($10B-$100B assets) modernizing AWS estates with centralized architecture review boards
    - Specialty insurers and MGAs with centralized cloud architecture governance
  buyingProcess: >-
    The economic buyer (CISO, Head of Cloud Platform, or Chief Architect) sponsors the deal after a principal security architect or platform engineering director champions it internally; procurement is triggered when a committed release or upcoming audit response is blocked by the exception backlog, per goToMarketSeed.buyingTrigger.
product:
  mvp: >-
    A thin exception-packet layer that ingests a Jira ticket and a Terraform plan diff for one AWS account, compares it to a customer-supplied library of approved reference patterns, and outputs a structured exception packet (control gap, compensating control, approver, expiry date) for the review board — no autonomous approval, no multi-cloud support.
  sixMonth: >-
    Add continuous verification: link each approved exception to AWS Config/Audit Manager evidence so security leaders see a live dashboard of active deviations, renewal deadlines, and drift, validated with 2-3 design partners.
  twelveMonth: >-
    Ship bidirectional sync with Backstage and Terraform (deeper than ticket enrichment), a compensating-control template library seeded from design-partner data, and a benchmarking view of recurring exception patterns that should graduate into new golden paths.
  twentyFourMonth: >-
    Expand to a second AWS-heavy vertical or add Azure Policy exemption support if design-partner demand confirms it, and introduce a premium auditor workspace module for internal-audit and examiner evidence packs.
  keyBets:
    - The pattern-diff engine can be seeded fast enough from a customer's existing golden paths that onboarding doesn't become a multi-month professional-services project.
    - Security leaders and internal auditors will accept linked runtime evidence in place of manual screenshot-based evidence packs, per research's validationPlan open question.
gtm:
  wedge: >-
    Land as a Terraform-plan and exception-packet layer for review boards that already run a formal weekly cadence, replacing the "one-off document package" with reusable policy and enforceable controls, per goToMarketSeed.switchingReason.
  channels:
    - Founder-led direct sales to CISOs, chief architects, and cloud platform heads at target banks and insurers
    - Design-partner introductions through cloud-security consultancies and compliance advisors already advising these accounts
    - Terraform, OPA, and Backstage ecosystem partnerships as pull-through channels, since those vendors already own the policy, catalog, and developer-workflow surfaces we plug into
  funnelTargets: "lead→qualified design partner 25-30% (concentrated buyer pool of ~80 SAM accounts); design partner→paid pilot 50%+; pilot→annual contract 60%+ given high switching cost once the reference-pattern library is built"
  pricing: >-
    Annual subscription priced by governed cloud accounts and active application squads, with a one-time onboarding fee to build the customer's reference-pattern library and an optional premium auditor workspace add-on — priced to sit inside existing CNAPP/ITSM budget reallocation rather than requiring a new line item, per research's willingnessToPay analysis.
businessModel:
  revenueStreams:
    - Annual SaaS subscription by governed cloud estate and squad count
    - One-time onboarding fee for reference-pattern library and control mapping
    - Premium auditor workspace and continuous-evidence module
  unitOfValue: "Per governed AWS account / active application squad under active exception management"
  targetGrossMarginPct: 75
  expansionLevers:
    - Add application squads and governed accounts within an existing customer
    - Upsell the auditor workspace module once internal audit trusts linked evidence
    - Expand from AWS-only to multi-cloud policy support once a customer's cloud estate demands it
strategyMap:
  northStarMetric: "Median cloud-architecture-exception approval cycle time (ticket open to enforced compensating control)"
  inputMetrics:
    - Number of design partners with a live exception packet in production
    - Percentage of approved deviations with compensating controls verified before release
    - Hours required to produce an exception evidence pack for an audit or examiner request
    - Net revenue retention within existing design-partner accounts
  moatsToBuild:
    - Proprietary graph of recurring exception types, approver decisions, and accepted compensating controls across regulated AWS teams
    - Longitudinal evidence linking each approved deviation to live cloud configuration, capturing drift and renewal patterns competitors cannot see
    - Trust relationships with internal audit teams who accept the platform's evidence in place of manual packs
  killCriteria:
    - Fewer than 2 of the first 5 target accounts convert a free discovery engagement into a paid pilot within 6 months
    - Design partners cannot supply exception ticket/renewal data showing at least 10 recurring exceptions per quarter per institution, undermining the assumed pain frequency
    - Internal audit teams reject linked runtime evidence in favor of manual packs after two audit walkthroughs, indicating the trust barrier is structural rather than a rollout problem
  mermaid: |
    flowchart LR
      Wedge[AWS-heavy bank/insurer exception backlog] --> MVP[Exception-packet MVP: ticket + Terraform diff]
      MVP --> Proof[Design-partner cycle-time and audit evidence proof]
      Proof --> Expansion[Bidirectional sync, auditor workspace, multi-cloud expansion]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Credible, well-evidenced wedge with a genuinely niche near-term market; worth tracking design-partner traction before committing, given a $20M SAM and unproven willingness to switch off manual review boards."
    whyBelieve: "Three same-day sources confirm a live secure-by-design budget category, 15 enterprise design partners at a direct comparable (Dawnguard), and research independently corroborates that no named competitor owns the full exception approval-to-enforcement lifecycle."
    whyDoubt: "The SAM is concentrated in roughly 80 accounts, the research could not quantify actual exception backlog volume or cycle time at any target institution, and the adoption barrier is trust-based (getting auditors to accept automated evidence) rather than a pure feature gap that money can quickly close."
    nextDiligence: "Get exported exception-ticket and renewal-log data from 5-8 target accounts to confirm quarterly exception volume and cycle time before underwriting the pipeline assumption."
  firstCustomer:
    title: "Head of cloud platform engineering at a $10B-$100B U.S. regional bank"
    profile: "15-30 AWS product squads, a formal weekly architecture review board, Terraform-based golden paths, and release delays tied to exception tickets for customer-data flows or vendor integrations."
    trigger: "A new customer-facing workload, AI feature, or third-party integration needs a non-standard network or IAM pattern and the review-board backlog threatens a committed release date or an upcoming audit response."
    buyer: "CISO, Head of Cloud Platform, or Chief Architect"
    initialContract: "Design-partner pilot scoped to one AWS account and one exception category, targeting a $50k-$100k pilot converting to a $200k-$300k annual contract once cycle-time and evidence gains are demonstrated."
  mustBeTrue:
    - "Target institutions process at least 10+ recurring architecture exceptions per quarter that create measurable release delay or audit risk."
    - "The economic buyer (CISO/Chief Architect/Head of Cloud Platform) will reallocate existing CNAPP/ITSM/GRC budget rather than requiring new incremental spend approval."
    - "Internal audit teams will accept linked runtime evidence (Config/Audit Manager-style proof) in place of manual screenshot-based evidence packs within two pilot cycles."
    - "A pilot can demonstrably cut exception approval cycle time or improve the percentage of exceptions with implemented controls within one quarter, without requiring deep bidirectional Terraform/Backstage integration on day one."
    - "At least 2 of the first 5 target accounts convert a scoped pilot into an annual contract within 6 months of first contact."
  diligenceQuestions:
    - "What is the actual quarterly volume of architecture exceptions, renewals, and expired approvals at 5-8 named target accounts, and how was it obtained?"
    - "Which budget line will fund this — cloud platform, security architecture, or GRC/ITSM — and has that owner been directly validated as the first signer?"
    - "How does the reference-pattern library get built for a new customer, and how many weeks of professional services does onboarding realistically require?"
    - "What specifically differentiates this from Dawnguard's broader secure-by-design platform if Dawnguard adds exception-tracking features?"
    - "Has any internal-audit team agreed, even informally, to accept automated evidence in place of manual packs, or is this still a hypothesis?"
    - "Is AWS-only sufficient for the first 24 months, or will target design partners demand Azure/GCP parity before signing?"
operatingAssumptions:
  - assumption: "Target banks and insurers generate enough recurring, high-friction architecture exceptions (10+ per quarter) to justify a dedicated system rather than tolerating manual review."
    basis: research.yaml
    validationTest: "Pull exported Jira/ServiceNow exception tickets and review-board calendars from 5-8 target accounts to count actual quarterly volume and cycle time, per research's validationPlan."
    decisionImpact: "If volume is materially lower, the beachhead should narrow further to the highest-volume exception category (e.g., third-party data-sharing patterns) or widen to a broader change-management wedge."
  - assumption: "The economic buyer will fund this from existing CNAPP/ITSM/GRC budget rather than requiring a new budget line."
    basis: research.yaml
    validationTest: "Buyer interviews mapping current spend across CNAPP, ITSM, and policy-as-code tooling at target accounts before the first sales cycle closes."
    decisionImpact: "If no reallocatable budget exists, pricing and the sales motion must shift toward a smaller pilot ACV with a clearer near-term ROI case to justify new spend."
  - assumption: "Internal audit and examiner teams will accept linked runtime evidence instead of manual screenshot-based evidence packs."
    basis: research.yaml
    validationTest: "Run an audit-team walkthrough using a sample Config/Audit Manager-style evidence bundle and renewal report during the first design-partner pilot."
    decisionImpact: "If audit teams reject automated evidence, the product must add a human-attestation layer or hybrid evidence format before scaling past pilot accounts."
  - assumption: "AWS-only scope is sufficient to close and retain the first 3-5 design partners without losing deals to multi-cloud requirements."
    basis: research.yaml
    validationTest: "Track cloud-estate mix and Azure/GCP parity requirements surfaced during design-partner discovery calls."
    decisionImpact: "If more than 2 of the first 5 prospects require multi-cloud parity at signing, the roadmap must pull forward Azure Policy exemption support ahead of the planned 24-month timeline."
  - assumption: "A thin ticket-enrichment integration (no deep bidirectional Terraform/Backstage sync) is enough to demonstrate cycle-time savings in the MVP."
    basis: operator judgment
    validationTest: "Measure cycle-time delta in the first design-partner pilot using the MVP scope before building deeper integrations."
    decisionImpact: "If cycle-time gains are negligible without deeper sync, the MVP scope must expand before the first paid contract is signed, delaying time-to-revenue."
experimentRoadmap:
  - horizon: 0-90 days
    experiment: "Structured discovery calls with 5-8 target banks/insurers to pull exception-ticket volume, renewal logs, and review-board cadence data."
    hypothesis: "Target institutions process 10+ recurring, high-friction architecture exceptions per quarter."
    successMetric: "At least 5 of 8 accounts confirm 10+ quarterly exceptions with named release or audit impact."
    owner: "Founder / Head of GTM"
  - horizon: 0-90 days
    experiment: "Buyer-budget mapping interviews to identify which function (cloud platform, security architecture, or GRC/ITSM) signs first."
    hypothesis: "The CISO or Head of Cloud Platform can reallocate existing CNAPP/ITSM spend rather than requesting new budget."
    successMetric: "A single consistent buyer role identified across at least 4 of 6 interviewed accounts."
    owner: "Founder / Head of GTM"
  - horizon: 3-6 months
    experiment: "Ship the MVP exception-packet workflow to 1-2 design partners scoped to one AWS account and one exception category."
    hypothesis: "A thin ticket-enrichment layer measurably cuts exception approval cycle time within one quarter."
    successMetric: "20%+ reduction in median exception approval cycle time at the design partner."
    owner: "Founding engineer"
  - horizon: 3-6 months
    experiment: "Run an internal-audit walkthrough using a sample linked-evidence bundle at the first design partner."
    hypothesis: "Internal audit will accept linked runtime evidence over manual screenshot-based packs."
    successMetric: "Audit team signs off on the evidence format without requiring a fallback manual pack."
    owner: "Founder / domain security lead"
  - horizon: 6-12 months
    experiment: "Convert 2-3 design partners into paid annual contracts at the target $200k-$300k ACV."
    hypothesis: "Demonstrated cycle-time and evidence gains justify budget reallocation into a paid contract."
    successMetric: "2+ signed annual contracts with net-positive expansion within the account."
    owner: "Founder / Head of GTM"
  - horizon: 12-18 months
    experiment: "Pilot deeper Backstage/Terraform bidirectional sync with one existing paid customer."
    hypothesis: "Deeper integration increases the percentage of exceptions with pre-release control implementation without materially increasing engineer workload."
    successMetric: "Percentage of approved deviations with controls implemented before release rises by 15+ points versus the ticket-enrichment-only baseline."
    owner: "Founding engineer"
operations:
  - Direct, high-touch onboarding to encode each customer's existing golden paths and reference patterns into the pattern-diff engine before go-live.
  - Weekly review-board workflow support embedded alongside the customer's existing Confluence/Jira process, not a replacement system on day one.
  - Partnerships with Terraform, OPA, and Backstage ecosystems for policy translation and catalog integration.
  - Compensating-control and evidence-template library maintained centrally and reused across customers as the pattern graph grows.
team:
  - role: "Founding engineer (pattern-diff / Terraform integration)"
    startTiming: "Month 0"
    rationale: "The pattern-diff engine and Terraform-plan ingestion are the technical core of the MVP and must be built before any design-partner pilot can start."
  - role: "Founder / domain security lead (former security architect or GRC practitioner)"
    startTiming: "Month 0"
    rationale: "Regulated buyers need credibility on compensating controls and audit evidence; a founder with review-board or CISO-adjacent experience shortens the trust gap identified in research's adoptionFrictionMatrix."
  - role: "Founding sales / design-partner lead"
    startTiming: "Month 3-4"
    rationale: "Once the MVP has a working demo, a dedicated GTM hire is needed to run the concentrated ~80-account SAM outreach and manage design-partner relationships."
  - role: "Second engineer (integrations: Backstage, Jira, evidence pipeline)"
    startTiming: "Month 6-9"
    rationale: "Deepening integrations and building the auditor-workspace module requires dedicated capacity once the first design partner validates the MVP."
milestones:
  - horizon: "0-12 months"
    items:
      - "Sign 2-3 design partners at target banks/insurers with a live exception-packet MVP in production."
      - "Demonstrate 20%+ reduction in median exception approval cycle time at least one design partner."
      - "Complete one internal-audit walkthrough using linked evidence and get informal sign-off."
      - "Confirm quarterly exception volume and buyer-budget owner at 5-8 target accounts."
  - horizon: "12-24 months"
    items:
      - "Convert 2-3 design partners into paid annual contracts at $200k-$300k blended ACV."
      - "Ship bidirectional Backstage/Terraform sync and the compensating-control template library."
      - "Launch the premium auditor workspace module to at least one paying customer."
      - "Reach 5-8 total paying logos within the AWS-heavy bank/insurer beachhead."
  - horizon: "24-36 months"
    items:
      - "Reach the researched year-3 SOM target of ~16 customers at ~$300k blended annual value."
      - "Evaluate and, if design-partner demand confirms it, ship Azure Policy exemption support for multi-cloud parity."
      - "Establish the exception-pattern dataset as a defensible benchmarking product (cycle time, drift, recurring exception hotspots) sold as an analytics layer."
risks:
  - risk: "Security leaders may not trust software-generated compensating controls enough to approve sensitive exceptions through a new system."
    likelihood: High
    impact: High
    mitigation: "Start with human-in-the-loop recommendations on one cloud and a few high-volume exception types, importing the customer's own reference patterns and evidence rules rather than imposing new policy."
  - risk: "Messy Jira, Backstage, Terraform, and architecture-document workflows could make deployment slower than the release bottlenecks the product is supposed to fix."
    likelihood: Medium
    impact: High
    mitigation: "Land first as a thin exception-packet and Terraform-plan layer for teams with existing centralized review boards; deepen integrations only after proving cycle-time savings."
  - risk: "CSPM, IaC policy, or enterprise-architecture vendors (including Dawnguard) could add basic exception tracking once the category gets more attention."
    likelihood: Medium
    impact: Medium
    mitigation: "Differentiate on the full approval-to-enforcement lifecycle and the approved-deviation dataset, and integrate with detection vendors rather than trying to replace them."
  - risk: "The SAM is concentrated in roughly 80 accounts, so a slow sales cycle or a handful of lost design partners could stall the entire near-term pipeline."
    likelihood: Medium
    impact: High
    mitigation: "Run parallel discovery with both regional banks and specialty insurers to avoid single-segment dependency, and treat consultancy/advisor introductions as a primary channel to widen the top of funnel."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$1.5-3M"
  runwayMonths: 18
  useOfFundsSummary: "18 months to build the AWS-only MVP, sign and convert 2-3 design partners into paid annual contracts, and validate the exception-volume, budget-owner, and audit-evidence-acceptance assumptions before raising a seed round scoped to broader integration and multi-cloud expansion."
