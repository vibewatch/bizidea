scenarios:
  downside:
    description: Sales cycles stretch, annual ACV lands near the lower half of the BP range, and onboarding stays more bespoke than planned.
    y3RevenueK: 2480.0
    y3EbitdaK: -160.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches about 11 instead of 16.
      - Blended annual value stalls near $270K instead of the researched ~$300K level.
      - Gross margin exits around 70% because evidence mapping and onboarding remain services-heavy.
  base:
    description: Design partners convert on roughly one-quarter proof cycles, budget comes from adjacent governance spend, and reusable evidence templates lift per-logo value toward the researched SOM level.
    y3RevenueK: 3646.0
    y3EbitdaK: 775.5
    cashLowPointK: 456.6
    keyAssumptionChanges:
      - 3 paying accounts by M12, 7 by Q4Y2, and 16 by Q4Y3.
      - Blended annual value per paying logo reaches about $300K by Y3.
      - Gross margin reaches the BP target 75% by Q4Y3 as onboarding becomes more repeatable.
  upside:
    description: Consultancy channels accelerate pilots, the auditor-workspace add-on lands earlier, and reusable integrations improve margin ahead of plan.
    y3RevenueK: 4300.0
    y3EbitdaK: 1170.0
    cashLowPointK: 560.0
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches about 18 instead of 16.
      - Auditor-workspace and onboarding attach push blended annual value toward $315K.
      - Gross margin reaches about 77% as evidence templates and integrations reuse faster.
sensitivity:
  - variable: ARPU
    downsideCase: Annual-contract and module attach settle about 10% below plan.
    baseCase: Exit blended annual value reaches about $300K per paying logo.
    upsideCase: Auditor workspace and governed-account expansion lift blended annual value about 5% above plan.
    y3RevenueImpactK: -364.6
    cashImpactK: -273.0
  - variable: CAC
    downsideCase: Channel partners underperform and CAC rises toward $115K.
    baseCase: CAC stays near $92K with founder-led and advisor-led selling.
    upsideCase: Consultancy introductions hold CAC near $80K.
    y3RevenueImpactK: -140.0
    cashImpactK: -240.0
  - variable: churn
    downsideCase: Monthly churn rises to 3.0% as the wedge feels too narrow for some buyers.
    baseCase: Monthly churn holds at 2.0% once the reference-pattern library is built.
    upsideCase: Monthly churn stays near 1.2% because the evidence layer becomes embedded in audit workflow.
    y3RevenueImpactK: -180.0
    cashImpactK: -150.0
  - variable: sales cycle
    downsideCase: Pilot-to-annual conversion stretches from about 90 to about 150 days.
    baseCase: Paid pilots convert in roughly one quarter with one successful proof cycle.
    upsideCase: Budget owner and audit sign-off compress conversion toward about 60 days.
    y3RevenueImpactK: -520.0
    cashImpactK: -310.0
  - variable: gross margin
    downsideCase: Gross margin stalls near 70% because onboarding remains bespoke.
    baseCase: Gross margin exits at 75% after template reuse and evidence automation.
    upsideCase: Gross margin reaches 77%-78% as deployments standardize faster.
    y3RevenueImpactK: 0.0
    cashImpactK: -190.0
  - variable: hiring pace
    downsideCase: Two scale hires are pulled forward before annual-contract proof is established.
    baseCase: Scale hiring waits until after conversion proof and follows the BP sequencing.
    upsideCase: The second GTM hire waits until late Y3 without slowing bookings.
    y3RevenueImpactK: 90.0
    cashImpactK: -230.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts[Target banks and insurers] --> DesignPartners[Qualified design partners]
      DesignPartners --> PaidPilots[Paid pilots]
      PaidPilots --> AnnualContracts[Annual contracts]
      AnnualContracts --> Modules[Onboarding and auditor workspace]
      Modules --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base revenue is driven by moving from 3 paying accounts at Y1 exit to 16 by Q4Y3 while blended annual value per account approaches the researched ~$300K SOM level.
  - checkName: Must go right
    finding: Paid pilots must convert to annual contracts in about one quarter and the first audit walkthrough must accept linked evidence, or the narrow wedge will not support the Q2Y2 milestone.
  - checkName: Model breaks if
    finding: If conversion stretches toward 150 days or onboarding stays bespoke enough to cap gross margin near 70%, the downside case pushes the cash floor toward roughly $0.1M before seed proof is reached.
  - checkName: Next-round proof
    finding: The seed story is 5 paying logos and 2-3 annual-contract conversions by roughly Q2Y2 plus evidence that auditors will accept the platform's live proof without reverting to screenshots.
sanityChecks:
  ruleOf40: "Y3 growth 138.6% + EBITDA margin 21.3% = 159.9%"
  burnMultiple: "Y2 burn multiple is about 0.4x using roughly $0.45M of EBITDA burn against about $1.24M of net new ARR; Q1Y3 turns EBITDA positive."
  revenuePerFte: "$365K Y3 on 10 ending FTE (benchmark $200-400K SaaS)"
  flags:
    - The year-3 base case captures 16 of roughly 80 SAM accounts, so the model assumes unusually strong execution inside a concentrated buyer pool.
    - CustomersEop includes paid pilots and annual contracts, so recurring-only production logos lag the headline count through most of Y1 and early Y2.
    - Gross margin reaches the 75% target only if onboarding and evidence mapping become repeatable; prolonged bespoke work would compress EBITDA materially.
    - The wedge is intentionally niche, so adjacent expansion beyond AWS-heavy exception governance is still required after year 3 to justify venture-scale outcomes.
    - Cash is modeled as EBITDA; deferred onboarding payments, implementation prepayments, or compliance capex could shift actual cash timing.
