jobsToBeDone:
  - job: >-
      当应用团队提出非标准数据流或 IAM 方案时，帮安全架构师判断合适的补偿控制和审批路径，让团队能按时发布而不留下隐藏的审计风险。
    currentAlternative: "评审会会议、Confluence 图纸和 Jira 例外工单"
    successMetric: "例外审批周期的中位数，以及发布前已落实管控的已批准偏差占比"
  - job: >-
      当审计或监管质询到来时，帮云平台团队证明每一个活跃例外都仍处于可控边界内、有理有据且未过期，从而避免紧急整改项目和发布冻结。
    currentAlternative: "表格清单、截图收集，以及从云控制台手工提取证据"
    successMetric: "生成一份例外证据包所需的小时数，以及有实时管控证据的活跃例外占比"
ideaScorecard:
  signalStrength:
    score: 5
    rationale: >-
      三篇同日报道分别支撑了发布、融资、受监管行业定位、共创合作和美国扩张，是本轮里工作流信号最清晰的案例之一。
  painIntensity:
    score: 4
    rationale: >-
      人工例外处理会拖住发布进度，并在受监管云环境里制造真实的审计敞口，尽管报道没有量化具体的积压量或事故率。
  wedgeClarity:
    score: 5
    rationale: >-
      第一个用例非常具体：面向重度使用 AWS 的受监管应用团队，做架构例外审批和持续证明。
  defensibility:
    score: 4
    rationale: >-
      一张涵盖已批准例外模式、补偿控制措施、失效行为和证据结果的专有图谱，会让通用扫描工具或工单系统很难复制。
  ventureScale:
    score: 5
    rationale: >-
      切入口很窄，但同一个管控平面可以扩展到更广的架构治理、第三方设计审批、多云策略和企业变更管理。
topRisks:
  - name: "策略信任缺口"
    description: "安全负责人可能不够信任软件生成的补偿控制措施，不敢通过一个新系统去批准敏感例外。"
    mitigation: "先在一朵云和少数几类高频例外上采用人工把关的推荐模式，同时导入客户自己的参考模式和证据规则。"
  - name: "集成阻力"
    description: "混乱的 Jira、Backstage、Terraform 和架构文档流程，可能让部署速度比产品本该解决的发布瓶颈还要慢。"
    mitigation: "先以轻量的例外材料包和 Terraform 计划层切入已有集中评审委员会的团队，等验证了周期时间的节省效果，再加深集成。"
  - name: "现有厂商功能蚕食"
    description: "一旦这个品类受到更多关注，CSPM、IaC 策略或企业架构厂商可能会加上基础的例外跟踪功能。"
    mitigation: "在从审批到执行的完整生命周期和已批准偏差数据集上做出差异化，同时与检测类厂商合作而不是试图取代它们。"
