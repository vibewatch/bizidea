problem: >-
  受监管的云团队都写好了黄金路径，但只要出现一个非标准的数据流、IAM 角色或供应商接入，就得走一遍人工架构例外流程。安全架构师在幻灯片或 Confluence 里评审图纸，在 Jira 里记录审批，然后指望工程师日后真的在 Terraform 和运行时策略工具里落实承诺过的补偿控制措施。结果是发布一拖再拖，已批准的偏差过了失效期还挂在那里，审计时才发现所谓"已接受"的风险其实从没在生产环境里真正落地管住。
targetUser:
  primary: >-
    美国区域性银行或专业保险公司里负责 AWS 应用团队架构评审的云平台工程总监或首席安全架构师
  secondary: >-
    负责 Terraform 护栏、例外工单和审计证据的企业架构评审委员会负责人及 DevSecOps 经理
  buyer: "CISO、云平台负责人或首席架构师"
startupThesis:
  nonObviousInsight: >-
    一旦云参考架构变成可执行代码，稀缺资源就不再是又一个扫描器，而是一套能被信任的系统，用来治理每个真实业务都需要的例外情况。赢家会拿下黄金路径策略、补偿控制措施和实时证据之间的审批图谱——因为发布速度和审计风险正是在这里正面相撞。
  beachhead: >-
    拥有 10-50 个 AWS 应用团队、每周开架构评审会、用 Terraform 搭建黄金路径、并不断为新数据共享方式、IAM 设计或第三方集成提交例外申请的美国区域性银行和专业保险公司
  wedge: >-
    一套云设计例外操作系统：接入拟议架构和 Terraform 变更，与已批准模式做比对，生成补偿控制要求，并持续证明已批准的偏差始终处于可控边界内
  whyNowCatalyst: >-
    Dawnguard 的公开发布、15 家共创客户，以及对受监管美国买家的进攻，都说明安全前置的云架构已经成为一个真实存在的预算品类，例外治理因此从"未来需求"变成了"当下痛点"。
  ventureScalePath: >-
    先从受监管企业中 AWS 应用团队的高频例外审批切入，再扩展到所有部署前架构评审、第三方 SaaS 设计审批、多云策略治理，最终成为云安全变更管理的系统记录层。
solution: >-
  这家公司接入架构决策记录、Jira 工单、Backstage 服务目录和 Terraform 计划，识别拟议设计在哪些地方偏离了银行已批准的模式。它会生成一份例外材料包，写明具体的管控缺口、所需的补偿控制措施、审批人、失效窗口和工程实施任务。获批之后，系统把该例外与 IaC 及运行时检查关联起来，让管控承诺被持续验证，而不是消失在工单里。安全负责人能看到一张实时地图，上面标着当前所有活跃偏差、续期截止日，以及那些反复出现、该被沉淀为新黄金路径的例外模式。随着时间推移，公司会积累起这个品类里最有价值的数据集：哪些例外最常见、哪些管控措施真正管住了风险、哪些团队制造的审计阻力最大。
goToMarketSeed:
  firstCustomer: >-
    一家资产规模 100 亿-1000 亿美元的美国区域性银行的云平台工程负责人，该行有 15-30 个 AWS 产品团队、一个正式的架构评审委员会，且客户数据流或供应商集成的例外工单正在拖累发布进度
  buyingTrigger: >-
    一个面向客户的新业务、AI 功能或第三方集成需要非标准的网络或 IAM 方案，而架构评审的积压已经开始威胁到既定发布计划或即将到来的审计
  currentAlternative: >-
    在 Confluence 和 Jira 里开的人工架构评审会、设计完成后才报警的 CSPM 和 IaC 扫描工具，以及咨询公司主导的管控映射项目
  switchingReason: >-
    这款产品能让安全团队更快说"是"——把每一次例外都转化成可复用的策略、可执行的管控和实时证据，而不是又一份一次性的文档
  pricingHypothesis: >-
    按受管云账户数和活跃应用团队数收取年度订阅费，客户参考模式库建设收取一次性实施费，另设可选的高级审计员工作台席位
whyNow:
  - point: >-
      Dawnguard 提出的"架构可以变成可执行代码"这一发布主张，说明市场正从部署后的云扫描转向设计阶段的管控执行。
    signalRefs: ["架构正在变成可执行代码"]
    sourceRefs: [2]
  - point: >-
      Forbes 明确把受监管企业定位为安全合规云架构设计的目标买家，证实了这是一个痛点属于强制项而非可选项的细分市场。
    signalRefs: ["受监管买家想在设计阶段就做安全"]
    sourceRefs: [1]
  - point: >-
      约 15 家大型机构已经在跑共创合作，有力证明了只要能帮企业更安全地发布，它们现在就愿意改造架构评审流程。
    signalRefs: ["大型企业已在早期试点这个品类"]
    sourceRefs: [1]
  - point: >-
      新增融资、超过 550 万欧元的累计融资，以及纽约加美国的市场拓展布局，都说明创始人和投资人已经看到受监管云安全流程里存在即时的商业机会。
    signalRefs: ["资本和美国扩张正在加速这个市场"]
    sourceRefs: [1, 2, 3]
differentiator: >-
  CSPM 和 IaC 工具能告诉团队哪里违反了策略，但管不了部署前的那场谈判——一个偏差到底能不能被接受、需要什么补偿控制、什么时候该失效。GRC 系统存着风险接受记录，却和 Terraform、服务目录、运行时证据完全脱节。这家公司拿下的正是从"提出架构偏差"到"管控被真正执行"之间缺失的这段生命周期，而且它的护城河会越挖越深——因为它在不断学习受监管企业反复批准的是哪些例外模式，以及在什么样的保障条件下批准的。
