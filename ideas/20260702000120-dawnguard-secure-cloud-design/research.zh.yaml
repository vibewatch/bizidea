competitors:
- name: Dawnguard
  stage: seed
  wedge: 从第一天到生产环境全程自动化的安全架构。
  pricing: 定制企业方案
  strength: 在架构到 IaC 工作流、受监管买家和设计意图与已部署云状态的持续对齐方面，直接验证了这个品类。
  weaknessVsUs: 是一个更宽泛的安全前置平台；本项目提出的创业公司在美国受监管 AWS 团队的例外审批图谱、补偿控制生成和续期治理上做得更窄、更深。
  sourceRefs:
  - 1
  - 6
  - 7
- name: AWS 原生治理栈
  stage: incumbent
  wedge: 跨 AWS 账户的 landing zone、护栏、策略管控和审计证据。
  pricing: 按用量计费的 AWS 服务
  strength: 在目标云资产内部拥有很深的预防性和检测性基础能力。
  weaknessVsUs: 不掌管跨职能的业务审批、失效逻辑，或从工单到证据的合法偏差工作流。
  sourceRefs:
  - 43
  - 44
  - 46
  - 49
  - 51
- name: Spacelift
  stage: scale-up
  wedge: 带策略、审批和漂移检测的 IaC 编排。
  pricing: 从免费到企业级的分层套餐
  strength: 贴近 Terraform 执行环节，策略和漂移工作流很强。
  weaknessVsUs: 更偏重部署编排，而不是架构评审的系统记录层和审计就绪的例外治理。
  sourceRefs:
  - 82
  - 83
- name: Prisma Cloud
  stage: incumbent
  wedge: 覆盖软件全生命周期的"代码到云"安全和 CSPM。
  pricing: 定制企业订阅
  strength: 多云态势可见性覆盖面广，也覆盖构建阶段安全。
  weaknessVsUs: 重心在错误配置、漏洞和策略检查，而不是"一个偏差到底能不能被接受"这个人工工作流。
  sourceRefs:
  - 58
  - 89
  - 98
- name: Jira Service Management
  stage: incumbent
  wedge: 面向 IT 团队的通用变更管理和审批工作流。
  pricing: 现有 ITSM 订阅／按席位计费的工作流支出
  strength: 已经嵌入企业的 CAB、变更和审计流程之中。
  weaknessVsUs: 人工、流程繁重，且在没有大量定制的情况下与云管控状态脱节。
  sourceRefs:
  - 93
  - 94
regulatoryTechnicalConstraints:
- point: 已批准的例外必须保留安全开发、配置控制和持续监控方面的证据。
  sourceRefs:
