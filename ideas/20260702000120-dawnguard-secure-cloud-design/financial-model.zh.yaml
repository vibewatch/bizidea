scenarios:
  downside:
    description: 销售周期拉长，年度 ACV 落在业务计划区间的偏下半段，上手过程比计划更依赖定制化服务。
    y3RevenueK: 2480.0
    y3EbitdaK: -160.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
      - "Q4Y3 期末客户数约为 11 个，而不是 16 个。"
      - "混合年度价值停滞在约 27 万美元，而不是研究测算的约 30 万美元水平。"
      - "由于证据映射和上手仍然服务繁重，毛利率收于约 70%。"
  base:
    description: 共创客户大约以一个季度的证明周期完成转化，预算来自相邻的治理支出，可复用的证据模板把单客户价值拉向研究测算的 SOM 水平。
    y3RevenueK: 3646.0
    y3EbitdaK: 775.5
    cashLowPointK: 456.6
    keyAssumptionChanges:
      - "到第 12 个月有 3 个付费客户，Q4Y2 达到 7 个，Q4Y3 达到 16 个。"
      - "到第 3 年，每个付费客户的混合年度价值达到约 30 万美元。"
      - "随着上手流程越来越可复制，Q4Y3 毛利率达到业务计划目标的 75%。"
  upside:
    description: 咨询渠道加快了试点节奏，审计员工作台附加模块更早上线，可复用集成让毛利率提升快于计划。
    y3RevenueK: 4300.0
    y3EbitdaK: 1170.0
    cashLowPointK: 560.0
    keyAssumptionChanges:
      - "Q4Y3 期末客户数约为 18 个，而不是 16 个。"
      - "审计员工作台和上手服务的附加收入，把混合年度价值推高到约 31.5 万美元。"
      - "随着证据模板和集成复用更快，毛利率达到约 77%。"
sensitivity:
  - variable: ARPU
    downsideCase: 年度合同和模块附加收入落在比计划低约 10% 的水平。
    baseCase: 期末混合年度价值达到每个付费客户约 30 万美元。
    upsideCase: 审计员工作台和受管账户扩展，把混合年度价值提升到比计划高约 5%。
    y3RevenueImpactK: -364.6
    cashImpactK: -273.0
  - variable: CAC
    downsideCase: 渠道伙伴表现不及预期，CAC 升至约 11.5 万美元。
    baseCase: 依靠创始人主导销售和顾问渠道，CAC 保持在约 9.2 万美元。
    upsideCase: 咨询公司引荐让 CAC 保持在约 8 万美元。
    y3RevenueImpactK: -140.0
    cashImpactK: -240.0
  - variable: churn
    downsideCase: 因为部分买家觉得这个切口太窄，月度流失率升至 3.0%。
    baseCase: 参考模式库建成后，月度流失率维持在 2.0%。
    upsideCase: 由于证据层嵌入了审计工作流，月度流失率维持在约 1.2%。
    y3RevenueImpactK: -180.0
    cashImpactK: -150.0
  - variable: sales cycle
    downsideCase: 试点到年度合同的转化周期从约 90 天拉长到约 150 天。
    baseCase: 付费试点在大约一个季度、经过一次成功的证明周期后完成转化。
    upsideCase: 预算负责人和审计的认可，把转化周期压缩到约 60 天。
    y3RevenueImpactK: -520.0
    cashImpactK: -310.0
  - variable: gross margin
    downsideCase: 由于上手仍然高度定制化，毛利率停滞在约 70%。
    baseCase: 经过模板复用和证据自动化，毛利率收于 75%。
    upsideCase: 随着部署更快标准化，毛利率达到 77%-78%。
    y3RevenueImpactK: 0.0
    cashImpactK: -190.0
  - variable: hiring pace
    downsideCase: 两个规模化招聘岗位在年度合同得到验证之前就提前招入。
    baseCase: 规模化招聘等到转化得到验证之后才启动，按业务计划的节奏进行。
    upsideCase: 第二个 GTM 招聘推迟到第 3 年末，且不拖慢签约节奏。
    y3RevenueImpactK: 90.0
    cashImpactK: -230.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      TargetAccounts[Target banks and insurers] --> DesignPartners[Qualified design partners]
      DesignPartners --> PaidPilots[Paid pilots]
      PaidPilots --> AnnualContracts[Annual contracts]
      AnnualContracts --> Modules[Onboarding and auditor workspace]
      Modules --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景的收入来自这样一条路径：从第 1 年期末的 3 个付费客户，一路增长到 Q4Y3 的 16 个，同时每个客户的混合年度价值逼近研究测算的约 30 万美元 SOM 水平。
  - checkName: 必须跑对的环节
    finding: 付费试点必须在大约一个季度内转化为年度合同，第一次审计走查必须认可关联证据，否则这个窄切口撑不住 Q2Y2 的里程碑。
  - checkName: 模型会在哪坏掉
    finding: 如果转化周期拉长到 150 天左右，同时上手仍然定制化到把毛利率压在 70% 附近，下行情景会在拿到种子轮证明之前，把现金底部推到大约 10 万美元。
  - checkName: 下一轮融资前的证明点
    finding: 种子轮的故事是在大约 Q2Y2 前拿下 5 个付费客户、完成 2-3 个年度合同转化，并证明审计人员愿意接受平台的实时证据，而不用退回到截图。
sanityChecks:
  ruleOf40: "Y3 增长 138.6% + EBITDA 利润率 21.3% = 159.9%"
  burnMultiple: "Y2 的 burn multiple 约为 0.4 倍——约 45 万美元的 EBITDA 消耗，对应约 124 万美元的净新增 ARR；Q1Y3 起 EBITDA 转正。"
  revenuePerFte: "按第 3 年末 10 名 FTE 计算，人均收入为 36.5 万美元（对比 SaaS 基准 20 万-40 万美元）。"
  flags:
