slug: cloud-design-exception-os
date: "2026-07-02"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-08"
    unit: YYYY-MM
    source: "[BP date 2026-07-02] the model begins with the first full operating month after the dated business plan."
  - id: A2
    name: 融资前起始现金/种子前轮募资额
    value: "$1.6M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $1.5-3M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses a lower-end pre-seed sized to reach the contract-conversion milestone with more than six months of cash buffer."
  - id: A3
    name: 期初付费客户数
    value: "0"
    unit: count
    source: "[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first win paid design partners."
  - id: A4
    name: 付费客户定义
    value: A paid pilot or an annual contract under active exception management
    unit: definition
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] customersEop counts any institution already paying for pilot or production scope."
  - id: A5
    name: 付费试点经济模型
    value: "$75K over about 3 months (~$25K/mo)"
    unit: USD/account
    source: "[BP investorMemo.firstCustomer.initialContract $50k-$100k pilot] the model uses the midpoint pilot value for the first scoped AWS-account deployments."
  - id: A6
    name: 年度合同与扩展经济模型
    value: "Production contracts start around $240K ARR and blend toward ~$300K annual value by Y3 as onboarding and auditor-workspace revenue attach."
    unit: USD/account/year
    source: "[BP investorMemo.firstCustomer.initialContract $200k-$300k annual contract + BP businessModel.revenueStreams + Research market.som ~$300k blended annual value] base case lands at the middle of the BP contract range first, then reaches the researched blended SOM value."
  - id: A7
    name: 客户爬坡
    value: "3 paying accounts by M12, 7 by Q4Y2, 16 by Q4Y3"
    unit: customersEop
    source: "[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets + Research market.som] base case matches 2-3 early design partners, 5-8 paying logos by year 2, and the researched year-3 SOM of 16 customers."
  - id: A8
    name: 收入确认惯例
    value: "Period-end paying accounts multiplied by blended realized revenue per account for that period: Y1 pilot-heavy months at about $25K/account/month, Y2 at $66K-$72K/account/quarter, and Y3 at $73K-$75K/account/quarter."
    unit: formula
    source: "[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som] this keeps revenue directly traceable to customers and the planned pricing mix."
  - id: A9
    name: 毛利率爬坡
    value: "55%-62% in Y1, 64%-71% in Y2, 72%-75% in Y3"
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 75 + BP operations + Research adoptionFrictionMatrix] early onboarding and evidence mapping are services-heavy before reusable templates and integrations improve margin."
  - id: A10
    name: 招聘时间线
    value: "M1 founder/domain-security lead and founding engineer; M4 sales/design-partner lead; M8 second engineer; M10 solutions/customer-success; M15 third engineer; M18 ops; M28 fourth engineer; M31 second solutions hire; M34 second GTM hire"
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays lean until paid pilots convert, then adds delivery and GTM capacity only after the annual-contract motion is working."
  - id: A11
    name: 创始人全成本薪酬
    value: "$160K"
    unit: USD/year
    source: "[BP team founder / domain security lead + startup-finance heuristic] lean founder cash compensation plus payroll taxes and benefits."
  - id: A12
    name: 工程全成本薪酬
    value: "$195K"
    unit: USD/year
    source: "[BP team founding engineer + startup-finance heuristic] senior cloud-security and integration engineering talent is required, but pre-seed pay stays below public-company cash levels."
  - id: A13
    name: 销售/共创客户全成本薪酬
    value: "$180K"
    unit: USD/year
    source: "[BP team founding sales / design-partner lead + BP gtm.channels + startup-finance heuristic] includes travel and variable comp for concentrated enterprise outreach."
  - id: A14
    name: 解决方案/客户成功全成本薪酬
    value: "$165K"
    unit: USD/year
    source: "[BP operations high-touch onboarding + startup-finance heuristic] reflects technical implementation ownership without building a large services bench."
  - id: A15
    name: G&A/运营全成本薪酬
    value: "$120K"
    unit: USD/year
    source: "[BP operations + startup-finance heuristic] covers basic finance, vendor management, and compliance operations."
  - id: A16
    name: 薪酬在损益表科目间的分摊
    value: "Founder 50% S&M / 30% R&D / 20% G&A; engineering 100% R&D; sales 100% S&M; solutions 60% S&M / 40% R&D; ops 100% G&A"
    unit: allocation
    source: "[BP team role rationales + BP operations] maps payroll into the functional P&L lines while reflecting founder-led selling and solutions-heavy onboarding."
  - id: A17
    name: 非薪酬运营支出爬坡
    value: "Monthly non-payroll spend rises from S&M/R&D/G&A of $5K/$8K/$6K in early Y1 to $17K/$14K/$10K by Q4Y3."
    unit: USD/month
    source: "[BP operations + startup-finance heuristic] covers cloud infrastructure, travel, legal, insurance, and audit-support tooling without assuming a large paid-demand engine."
  - id: A18
    name: 现金转换惯例
    value: Cash movement equals EBITDA
    unit: formula
    source: "[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at pre-seed scale."
  - id: A19
    name: 稳态月度客户流失率
    value: "2.0%"
    unit: percent per month
    source: "[startup-finance heuristic for early enterprise workflow SaaS + BP gtm.funnelTargets high switching cost once reference patterns are built] regulated workflows should be sticky, but the model remains conservative versus mature governance software."
  - id: A20
    name: 基准销售周期
    value: Roughly 90 days from paid pilot start to annual-contract conversion
    unit: days
    source: "[BP experimentRoadmap 3-6 months + BP mustBeTrue pilot proof within one quarter] the model assumes one quarter is enough to prove cycle-time and evidence value for early conversions."
  - id: A21
    name: CAC 计算惯例
    value: Total 36-month sales and marketing spend divided by 16 net new paying accounts
    unit: formula
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures founder-led and partner-introduced enterprise acquisition across the full buildout period."
  - id: A22
    name: 用于确定融资规模的下一轮里程碑
    value: "By about Q2Y2 the company should have 5 paying logos, at least 2-3 annual-contract conversions, and one audit-evidence walkthrough accepted."
    unit: milestone
    source: "[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP experimentRoadmap 6-12 months] the pre-seed is sized to reach seed-ready proof on buyer budget, contract conversion, and audit trust."
  - id: A23
    name: 季度薪资滚动惯例
    value: Y2-Y3 salary rows use actual monthly hires inside each quarter rather than just quarter-end snapshots
    unit: convention
    source: "[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent with the monthly hiring ramp even when the headcount snapshots only show year-end points for Y2 and Y3."
