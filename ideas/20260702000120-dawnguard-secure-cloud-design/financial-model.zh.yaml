    - "customersEop 同时包含付费试点和年度合同，因此在第 1 年大部分时间和第 2 年初，纯正式生产合同的客户数会落后于这个总数。"
    - "只有当上手和证据映射变得可复制时，毛利率才能达到 75% 的目标；如果长期依赖定制化工作，EBITDA 会被明显压缩。"
    - "这个切口刻意做得很小众，因此第 3 年之后仍需要向重度使用 AWS 的例外治理之外扩展，才能撑起风险投资级别的回报。"
