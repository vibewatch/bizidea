modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Pipeline[Qualified pipeline] --> Pilots[Paid pilots]
      Pilots --> Customers[Production customers]
      CACSpend[CAC spend] --> Pilots
      Customers --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Operating cash]
      Churn[Churn and expansion] --> Customers
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入来自将试点优先切口转化为 12 个生产客户（ACV $250k），大部分增长在首批共创客户转化的第二年出现。
- checkName: 必须做对的事
  finding: 公司必须保持上线只读且可重复，使一名销售加小型实施团队能够转化试点，而不至于变成服务公司。
- checkName: 模型破裂条件
  finding: 如果销售周期延长至约 9 个月，或某个早期六位数客户在扩展收入出现前流失，现金将在下一轮融资前归零。
- checkName: 下轮融资证明
  finding: 创业公司达到 8 个生产客户、30 天以内部署和有文档记录的 50%+ 试点转生产转化率后，下轮融资即有依据。
sanityChecks:
  ruleOf40: 第三年增速 122% + EBITDA 利润率 -19% = 103%。
  burnMultiple: 第三年消耗倍数 0.35x（$0.5M 净消耗对应 $1.4M 净新增收入）。
  revenuePerFte: 第三年每人产出 $250k，基于第三年 Q4 10 名 FTE（SaaS 基准约 $200k–$400k）。
  flags:
  - 基础情景不含付费试点服务收入，因此第一年偏保守，但客户数乘以 ARPU 的对账更清晰。
  - 模型假设前 12 个生产客户中没有重大净 logo 流失；丢失单个客户将明显压缩第三年现金。
  - 独立预算风险依然存在，因为现有厂商可能在基准数据集可防御之前捆绑相邻的审核分析功能。
