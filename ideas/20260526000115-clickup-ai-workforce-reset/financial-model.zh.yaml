scenarios:
  downside:
    description: 试点转化较慢、ACV 偏低，而招聘计划不变，在公司证明可重复性之前形成现金压力。
    y3RevenueK: 1875.0
    y3EbitdaK: -860.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
    - 试点转生产转化率从 50% 降至 33%。
    - 混合 ACV 落在 $225k 而非 $250k。
    - 销售周期从约 6 个月延长至 9 个月，同时招聘计划不变。
  base:
    description: 基础情景下，第三年 Q4 达到 12 个生产客户、$250k ACV、70% 毛利率和 10 人团队。
    y3RevenueK: 2500.0
    y3EbitdaK: -476.0
    cashLowPointK: 291.0
    keyAssumptionChanges:
    - 第一年转化 2 个生产 logo，第二年 Q4 存量达到 8 个客户。
    - 混合 ACV 维持在 $250k，基准报告和工作流扩展抵消早期折扣。
    - 实施手册可重复之前保持精简招聘。
  upside:
    description: 更快的转化和更早的多工作流扩展，在团队规模基本不变的情况下带来接近盈亏平衡的第三年经济模型。
    y3RevenueK: 3200.0
    y3EbitdaK: 80.0
    cashLowPointK: 640.0
    keyAssumptionChanges:
    - 试点转生产转化率提升至 60%。
    - 基准报告提前一个季度落地，混合 ACV 扩展至 $275k。
    - 上线时间压缩至 25 天以内，相同招聘规模支撑更多收入。
