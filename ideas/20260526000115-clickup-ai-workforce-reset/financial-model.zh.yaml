slug: agent-review-economics-os
date: '2026-05-26'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月
  value: 2026-06
  unit: month
  source: 计划日期 2026-05-26 的次月起算。
- id: A2
  name: 收入确认口径
  value: 订阅收入仅在客户转化为生产环境后开始计入；付费试点收入不计入基础损益表。
  unit: policy
  source: 保守建模选择，锚定商业计划试点优先 GTM 和 $25k–$50k 试点结构。
- id: A3
  name: 混合年度 ACV
  value: $250,000
  unit: usd/year
  source: 商业计划 SOM 假设第三年 12 个客户、平均 ACV 约 $250k。
- id: A4
  name: 毛利率目标
  value: '70'
  unit: percent
  source: 商业计划 businessModel.targetGrossMarginPct。
- id: A5
  name: 净生产客户增速
  value: 第一年 2 个客户，第二年 8 个，第三年 12 个
  unit: count
  source: 商业计划里程碑和 SOM 目标：第一年完成 2 次生产转化，12–24 个月达到 8–12 个客户，第三年达到 12 个客户。
- id: A6
  name: 客户时序
  value: 第 7 个月获得首个生产客户，第 12 个月获得第二个，第二年各季度依次 +1/+1/+2/+2，第三年每季度 +1
  unit: timing
  source: 与商业计划中付费试点先行、再可重复生产转化的排序逻辑一致。
- id: A7
  name: 创始人/CEO 含税人力成本
  value: $216,000
  unit: usd/year
  source: 低于市场的创始人薪资加 20% 社保负担的创业财务经验值；商业计划要求从第 0 个月起配置该角色。
- id: A8
  name: 工程师含税人力成本
  value: $204,000
  unit: usd/year
  source: 美国 B2B SaaS 资深全栈或集成工程师加 20% 社保负担的创业财务经验值；商业计划要求尽早配置创始工程师和集成工程师。
- id: A9
  name: 产品/实施含税人力成本
  value: $168,000
  unit: usd/year
  source: 负责客户上线的产品与实施人才加 20% 社保负担的创业财务经验值；商业计划在第 2 个月加入该角色。
- id: A10
  name: 销售含税人力成本
  value: $192,000
  unit: usd/year
  source: 一名企业客户经理的含税现金成本经验值；商业计划仅在试点套餐和定价经过验证后才增加该角色。
- id: A11
  name: 运营/G&A 含税人力成本
  value: $156,000
  unit: usd/year
  source: 采购和管控扩张后财务/运营及合规支持的创业财务经验值。
- id: A12
  name: 商业计划团队之后的招聘节奏
  value: 第二年 Q2 增加第二位产品/实施负责人，第二年 Q3 增加首位运营人员，第三年 Q1 增加一名工程师，第三年 Q2 增加第二名销售，第三年 Q3 增加第二位运营人员
  unit: plan
  source: 延伸商业计划团队和排序逻辑，采用保守的后第一年扩张经验值，扩张节点与实施可重复性挂钩，早于大规模销售扩张。
- id: A13
  name: 非薪酬运营支出节奏
  value: 第一年 $266k，第二年 $396k，第三年 $492k
  unit: usd
  source: 覆盖云服务、安全、法务、差旅和工具的创业财务经验值，同时保持部署只读且产品化。
- id: A14
  name: 单位经济模型使用的月度 logo 流失率
  value: '1.5'
  unit: percent
  source: 替代品密集市场中早期企业工作流产品的保守创业财务经验值，参考研究报告的买家议价能力和替代品威胁分析。
- id: A15
  name: CAC 定义
  value: 每个净生产客户 $90,000
  unit: usd/customer
  source: 推导经验值：第二年前 8 个生产 logo 期间的 S&M 费用加 50% 创始人薪资，反映创始人主导的企业销售模式。
- id: A16
  name: 现金变动简化
  value: 现金变动等于 EBITDA；不对负债、资本支出、税务或营运资金时序做调整建模。
  unit: policy
  source: 现金转化简单的早期软件公司的创业财务经验值。
- id: A17
  name: 融资目标
  value: 通过 pre-seed 融资达到 8 个生产客户和可重复的 30 天以内部署，并在下轮融资前保留约六个月的资金缓冲。
  unit: goal
  source: 商业计划融资需求、12–24 个月里程碑和实验路线图。
