modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Pipeline[Qualified pipeline] --> Pilots[Paid pilots]
      Pilots --> Customers[Production customers]
      CACSpend[CAC spend] --> Pilots
      Customers --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Operating cash]
      Churn[Churn and expansion] --> Customers
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from turning a pilot-first wedge into 12 production customers at $250k ACV, with most growth arriving in Y2 as the first design partners convert.
- checkName: Must go right
  finding: The company must keep onboarding read-only and repeatable so one seller plus a small implementation team can convert pilots without turning into a services business.
- checkName: Model breaks if
  finding: If sales cycles stretch toward 9 months or one early six-figure logo churns before expansion revenue appears, cash falls below zero before the next raise.
- checkName: Next-round proof
  finding: The next financing is justified once the startup reaches 8 production customers, sub-30-day deployments, and documented 50%+ pilot-to-production conversion.
sanityChecks:
  ruleOf40: Y3 growth 122% + EBITDA margin -19% = 103%.
  burnMultiple: Y3 burn multiple 0.35x ($0.5M net burn on $1.4M net new revenue).
  revenuePerFte: $250K Y3 using 10 Q4Y3 FTE (benchmark roughly $200K-$400K SaaS).
  flags:
  - The base case excludes paid-pilot services revenue so Y1 is conservative but cleaner for customer-times-ARPU reconciliation.
  - The model assumes no material net logo churn inside the first 12 production customers; a single lost logo would noticeably compress Y3 cash.
  - Standalone-budget risk remains real because incumbents could bundle adjacent review analytics before the benchmark dataset is defensible.
