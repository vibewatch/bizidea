slug: agent-review-economics-os
date: '2026-05-26'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: month
  source: Next-month start after 2026-05-26 plan date [BP date].
- id: A2
  name: Revenue recognition basis
  value: Subscription revenue starts only when a customer converts to production; paid pilots are excluded from base P&L.
  unit: policy
  source: Conservative modeling choice anchored to BP pilot-first GTM and $25k-$50k pilot structure [BP gtm, investorMemo.firstCustomer.initialContract].
- id: A3
  name: Blended annual ACV
  value: $250,000
  unit: usd/year
  source: BP SOM assumes 12 customers at about $250k ACV by Year 3 [BP market.som].
- id: A4
  name: Gross margin target
  value: '70'
  unit: percent
  source: BP businessModel.targetGrossMarginPct.
- id: A5
  name: Net production-customer ramp
  value: 2 customers by Y1, 8 by Y2, 12 by Y3
  unit: count
  source: 'BP milestones and SOM target: 2 production conversions in Year 1, 8-12 customers by 12-24 months, 12 customers by Year 3 [BP milestones, BP market.som].'
- id: A6
  name: Customer timing
  value: First production logo in M7, second in M12, then +1/+1/+2/+2 across Y2 quarters and +1 per quarter in Y3
  unit: timing
  source: Matches BP sequencing around paid pilots first, then repeatable production conversions [BP experimentRoadmap, BP milestones].
- id: A7
  name: Founder/CEO loaded cash compensation
  value: $216,000
  unit: usd/year
  source: Startup-finance heuristic for a below-market founder salary with 20% payroll burden; role required from Month 0 in BP team.
- id: A8
  name: Engineering loaded cash compensation
  value: $204,000
  unit: usd/year
  source: Startup-finance heuristic for senior full-stack or integration engineers in U.S. B2B SaaS with 20% payroll burden; BP requires founding eng and integrations eng early.
- id: A9
  name: Product/implementation loaded cash compensation
  value: $168,000
  unit: usd/year
  source: Startup-finance heuristic for product and implementation talent with customer-facing onboarding ownership; BP adds this role in Month 2.
- id: A10
  name: Sales loaded cash compensation
  value: $192,000
  unit: usd/year
  source: Startup-finance heuristic for one enterprise AE on a fully loaded cash basis; BP adds AE only after pilot package and pricing are proven [BP team].
- id: A11
  name: Operations/G&A loaded cash compensation
  value: $156,000
  unit: usd/year
  source: Startup-finance heuristic for finance/ops and compliance support once procurement and controls expand.
- id: A12
  name: Hiring ramp after the named BP team
  value: Add second product/implementation lead in Q2Y2, first ops hire in Q3Y2, one engineer in Q1Y3, second sales hire in Q2Y3, and second ops hire in Q3Y3
  unit: plan
  source: Extends BP team and sequencingRationale with a conservative post-Y1 scaling heuristic tied to implementation repeatability before broad sales expansion.
- id: A13
  name: Non-payroll opex ramp
  value: $266k in Y1, $396k in Y2, and $492k in Y3
  unit: usd
  source: Startup-finance heuristic covering cloud, security, legal, travel, and tooling while keeping deployment read-only and productized [BP operations, research adoptionFrictionMatrix].
- id: A14
  name: Monthly logo churn used for unit economics
  value: '1.5'
  unit: percent
  source: Conservative startup-finance heuristic for an early enterprise workflow product in a substitute-heavy market, informed by research buyer power and threat of substitutes.
- id: A15
  name: CAC definition
  value: $90,000 per net production customer
  unit: usd/customer
  source: 'Derived heuristic: modeled S&M spend plus 50% of founder salary over the first 8 production logos through Y2, reflecting founder-led enterprise sales [BP gtm].'
- id: A16
  name: Cash movement simplification
  value: Cash changes equal EBITDA; no debt, capex, taxes, or working-capital timing adjustments are modeled.
  unit: policy
  source: Startup-finance heuristic for an early software company with simple cash conversion.
- id: A17
  name: Funding objective
  value: Raise enough pre-seed capital to reach 8 production customers and repeatable sub-30-day deployments, with roughly six months of buffer before the next raise.
  unit: goal
  source: BP funding ask, 12-24 month milestones, and experiment roadmap.
