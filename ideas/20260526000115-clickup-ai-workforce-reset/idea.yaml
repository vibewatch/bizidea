topRisks:
  - name: Budget may default to internal tooling
    description: Companies already rolling out internal agents may prefer to build dashboards themselves rather than buy a new operating layer.
    mitigation: Start with one workflow-specific pilot that surfaces hidden review cost within 30 days and proves value beyond what internal BI can show.
  - name: Political sensitivity around layoffs
    description: Teams may resist a product associated with workforce reductions, slowing adoption or distorting usage data.
    mitigation: Position the system around safe supervision, reviewer protection, and evidence-based redeployment instead of headcount cutting alone.
  - name: Fast-moving platform landscape
    description: Agent vendors and work-management incumbents may add partial analytics or review features once the need becomes obvious.
    mitigation: Move quickly on cross-tool labor accounting, reviewer-capacity benchmarks, and org-design workflows that horizontal vendors are less likely to own deeply.
