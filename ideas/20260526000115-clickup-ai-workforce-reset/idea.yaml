jobsToBeDone:
  - job: When our company is scaling internal AI agents, help operations leadership see which workflows truly save labor and which create hidden review queues, so we can make org decisions on evidence instead of hype.
    currentAlternative: Spreadsheet ROI models, team-manager anecdotes, and generic observability dashboards
    successMetric: Labor hours saved per workflow, reviewer minutes per completed task, and accepted-output rate
  - job: When managers are suddenly responsible for directing and reviewing agent output, help them allocate reviewer capacity and catch failing workflows early, so service quality does not collapse during automation rollout.
    currentAlternative: Manual spot checks in Slack, ad hoc QA, and reactive escalations after errors reach customers or internal teams
    successMetric: Review backlog SLA, exception rate, and workflow rollback rate after agent launch
