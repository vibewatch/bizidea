  coverageGap: >-
    This run verified 32 fetched URLs and retained 30 distinct sources after
    deduplication. The topic is early and poorly standardized: credible primary
    evidence clusters around one public ClickUp event, analyst survey pages,
    official governance sources, and vendor documentation, while many plausible
    secondary sources were blocked by anti-bot systems or resolved to repetitive
    marketing variants (notably Gartner, Microsoft, and ServiceNow). I did not
    pad the corpus with low-value mirrors, syndications, or generic AI think
    pieces, so the run fell short of the 100-source calibration target.
