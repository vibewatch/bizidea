topRisks:
  - name: 预算可能流向内部自建工具
    description: 已经上线内部智能体的公司可能更倾向于自己搭建仪表盘，而不是购买新的运营层。
    mitigation: 从一个能在 30 天内暴露隐性审核成本的特定工作流试点入手，证明其价值超出内部 BI 所能展示的范围。
  - name: 裁员带来的政治敏感性
    description: 团队可能对一款与裁员挂钩的产品产生抵触，拖慢采用速度或扭曲使用数据。
    mitigation: 将系统定位为保障安全监督、保护审核人员和基于证据的人员再部署，而非单纯的削减编制工具。
  - name: 平台格局快速变动
    description: 智能体厂商和工作管理领域的现有厂商一旦看清这一需求，可能会增加部分分析或审核功能。
    mitigation: 快速推进跨工具劳动力核算、审核人员容量基准和组织设计工作流，这些是横向厂商难以深度占有的领域。
