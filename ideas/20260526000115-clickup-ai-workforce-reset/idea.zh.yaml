jobsToBeDone:
  - job: 在公司扩大内部 AI 智能体规模时，帮助运营领导层看清哪些工作流真正节省了人力、哪些制造了隐性审核队列，从而基于证据而非炒作做出组织决策。
    currentAlternative: 电子表格 ROI 模型、部门经理口头反馈，以及通用可观测性仪表盘
    successMetric: 每个工作流节省的人工小时数、每个已完成任务的审核分钟数，以及输出验收率
  - job: 当管理者突然负责指导和审核智能体输出时，帮助他们分配审核人员容量、提前发现失效工作流，从而防止自动化上线期间服务质量崩溃。
    currentAlternative: Slack 中的人工抽查、临时质检，以及错误触达客户或内部团队后的被动升级处理
    successMetric: 审核积压工单 SLA、异常率，以及智能体上线后的工作流回滚率
