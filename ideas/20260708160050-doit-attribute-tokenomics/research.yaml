openQuestions:
- Can tenant identity be inferred accurately enough without SDK changes across asynchronous agents, background jobs, and support escalations?
- How much of beachhead AI COGS sits in retrieval, vector, and orchestration layers rather than raw model tokens by the time a vertical SaaS product reaches scale?
- Will CFOs buy a standalone margin-control layer, or will they insist that the capability sit inside an existing billing or FinOps relationship?
- 'Which initial vertical creates the fastest route to trusted reconciliation and renewal impact: legal-tech, healthtech operations, or fintech operations?'
