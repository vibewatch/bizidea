    - 86
    - 119
  sensitivityCases:
  - case: Model prices compress faster than expected
    impact: Cheaper tokens can reduce near-term pain, but they also encourage more usage and more provider switching; the product must position around visibility and pricing control, not just cost cutting.
    sourceRefs:
    - 104
    - 107
    - 111
  - case: Horizontal stacks bundle more of the workflow
    impact: If DoiT-like FinOps tools, billing platforms, or AI gateways add tenant-margin workflows quickly, the startup must win on fastest finance-grade deployment and vertical-specific guardrails.
    sourceRefs:
    - 1
    - 67
    - 95
  - case: Observability tools add downstream billing exports
    impact: If gateway or tracing vendors extend into margin actions, the startup will need deeper reconciliation logic and tighter billing-system workflows to stay differentiated.
    sourceRefs:
    - 75
    - 97
    - 85
  validationPlan:
  - priority: high
    question: Can we infer tenant identity accurately enough without SDK changes across synchronous requests, async jobs, and multi-step agents?
    evidenceToGather: Design-partner proxy pilots with invoice reconciliation against provider bills and existing billing events.
  - priority: high
    question: Will CFOs and Heads of AI buy a standalone margin-control layer instead of stretching existing FinOps, gateway, or billing tools?
    evidenceToGather: 15-20 buyer interviews plus at least three competitive proof-of-concept comparisons against current manual workflows.
  - priority: medium
    question: Which downstream billing integration most often determines time-to-value in the beachhead segment?
    evidenceToGather: Pipeline and partner discovery with Stripe, Orb, and Metronome implementers plus integration-scoping calls with design partners.
