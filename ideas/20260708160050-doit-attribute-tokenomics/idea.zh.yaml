    - 对接账单和 BI 平台
  keyPartners:
    - 按用量计费平台
    - LLM 网关和 API 网关厂商
  costStructure:
    - 为各服务商定制计量适配器的工程投入
    - 计量代理与台账所需的云基础设施
jobsToBeDone:
  - job: 当我们内嵌 AI copilot 的用量在客户间扩大时,帮财务团队实时看到按客户的 AI 毛利,让他们能在续约前就抓住亏损账户,而不是等一个季度业绩难看之后才发现。
    currentAlternative: 手工用表格把 LLM 服务商账单和用量日志对账
    successMetric: 从用量激增到触发毛利告警的时间,以及每季度亏损账户意外发现次数的下降
  - job: 当我们为 AI 功能设计按用量定价档位时,帮产品团队精确建模每个档位的 COGS,让他们能在续约或融资前定出站得住脚的价格。
    currentAlternative: 临时拼凑、绑死单一模型服务商 SDK 的内部脚本
    successMetric: 有真实按租户 COGS 数据支撑、而非靠估算的定价档位占比
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 两篇同日、经抓取验证的来源,记录了一起具体的收购与产品发布,外加一个量化的 ROI 盲区统计数据。
  painIntensity:
    score: 4
    rationale: AI 定价功能上线几个月后才发现某个客户细分在亏钱,这对垂直 SaaS 财务团队来说是关乎董事会、威胁营收的问题。
  wedgeClarity:
    score: 4
    rationale: 零埋点、按租户直接接入账单系统的毛利计量器,是一个具体可落地的首发产品,和 DoiT 专注的内部费用分摊明显区分开。
  defensibility:
    score: 3
    rationale: 与服务商无关的计量能力和账单系统集成会形成迁移摩擦,但如果这个细分市场做大,横向 FinOps 厂商也可能下探抢占。
  ventureScale:
    score: 4
    rationale: 每一家内嵌 LLM 智能体的垂直 SaaS 公司都需要这个,而这个切口能自然扩展成更大的定价与毛利护栏平台。
topRisks:
  - name: 现有厂商下探抢滩
    description: DoiT/Attribute 或某个横向 FinOps 平台,可能把自己的内部费用分摊产品扩展到覆盖按外部客户的毛利计量。
    mitigation: 靠账单系统原生集成和垂直场景专属的毛利护栏取胜——这些是横向分摊工具天生难以抢先做出来的。
  - name: 服务商 API 碎片化
    description: 每新增一家 LLM 服务商、智能体框架或 GPU 编排层,用量数据的暴露方式就会变,适配器可能得不停维护。
    mitigation: 构建与服务商无关的插件化计量内核,优先适配滩头市场实际用到的 3-4 家服务商。
  - name: 归因准确性争议
    description: 如果按租户的成本估算出错,客户就会不信任这份毛利台账,拒绝拿它来做定价或续约决策。
    mitigation: 在入驻阶段就发布对照实际服务商账单的对账报告,让客户在计量逻辑真正驱动账单前先自行审计。
