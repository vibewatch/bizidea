problem: >-
  垂直 SaaS 公司把 LLM 智能体或 copilot 嵌进自家产品后,一旦把多家推理服务商的 token、GPU
  和向量存储成本一并扣除,就说不清到底哪个付费客户、租户或价格档位真正赚钱。用量分散在多个推理服务商和内部微调模型之间,
  又没有统一标识能追溯回终端客户,财务只能等季度对账时才发现某个账户或细分市场在亏钱——这时功能早已上线,
  定价承诺也早已做出,已经过去了好几个月。
targetUser:
  primary: B 轮到 D 轮垂直 SaaS 公司的产品副总裁或 AI 负责人,这些公司已经把内嵌 AI 智能体或 copilot 功能交付给付费终端客户
  secondary: 同一批公司里负责毛利率和按用量定价的财务与 RevOps 负责人
  buyer: CFO 或财务副总裁,与 AI 产品负责人联合决策
startupThesis:
  nonObviousInsight: DoiT 的收购证明,零埋点、内核级的 AI 成本归因技术已经能在企业级规模上跑通,但这款产品是为企业内部跨成本中心的费用分摊(chargeback)而生的;还没有人把同样的计量技术对准垂直 SaaS 厂商真正要回答的外部问题——刨去多家 LLM 和 GPU 服务商的成本后,到底哪个付费客户或价格档位是赚钱的。
  beachhead: B 轮到 D 轮的垂直 SaaS 公司(法律科技、医疗运营、金融运营软件),过去两个季度内已经给终端客户上线了内嵌 LLM 智能体或 copilot 功能,且用量分布在 2 家以上推理服务商,或混用托管模型与微调模型
  wedge: 一个请求层代理,无需改动 SDK 就能按终端客户租户计量 token、GPU 和向量存储成本,再把每租户的 COGS 直接推送进公司现有的按用量计费引擎和 BI 系统
  whyNowCatalyst: DoiT 收购 Attribute、推出零埋点内核级计量技术的同一周,企业界就承认只有 15% 能算清 AI ROI——这证明底层归因技术和买家紧迫感已经同时到位;而 DoiT 专注内部费用分摊,把外部按客户算毛利的问题留给了专注切口的新进入者。
  ventureScalePath: 先做垂直 SaaS 的按租户 AI 毛利计量器,再扩展成面向任何嵌入第三方 AI 的 SaaS 公司的自动化按用量定价与毛利护栏引擎(告警、限流、档位提醒),最终成为 AI 原生软件公司财务体系默认的 COGS 归因与账单集成层。
solution: >-
  一个轻量代理或 sidecar 挂在模型调用层(LLM 网关、API 网关或网络抓包点),把每个请求指纹式地追溯回发起它的终端客户租户或会话,
  客户团队不用改一行代码。它汇总公司用到的每一家推理服务商的 token 数、GPU 秒数估算和向量存储查询成本,
  再把按租户实时更新的毛利台账,持续推送进公司的账单系统(Stripe Billing、Orb、Metronome)和 BI 系统。
  预置的毛利护栏规则,让产品或财务负责人能在某个客户细分陷入结构性亏损之前就发出告警、限流,
  或提醒账户升级到更高档位,把成本数据和定价动作真正连成一个闭环。
goToMarketSeed:
  firstCustomer: 一家 B 轮垂直 SaaS 公司(法律科技或金融运营),过去两个季度上线了内嵌 AI copilot,账单跨多家推理服务商结算,即将推出或需要捍卫按用量定价档位
  buyingTrigger: 财务在董事会或季度复盘中,指出某个客户细分或重点账户的 AI COGS 已经倒挂;或者公司正赶在续约周期或融资前设计按用量定价,需要站得住脚的单位经济模型
  currentAlternative: 手工在表格里把 LLM 服务商账单和内部用量日志对账,或者一套绑死单一 SDK 的脆弱内部工具,一旦接入新的模型服务商或智能体框架就崩
  switchingReason: 这个代理跨多家并发推理服务商都不用改 SDK 或加标签,几天内就能拿到按租户的毛利数据而不用等季度结账,还能直接接入公司现有的账单系统,而不是又产出一份一次性内部报告
  pricingHypothesis: 按管理的 AI 支出比例收取用量费,支出低于门槛的小公司则采用固定平台费档位
whyNow:
  - point: DoiT 刚刚证明,零埋点、内核级的 AI 成本归因能在企业级规模跑通,这为小型创业公司把同样的核心计量技术,改造用于 SaaS 租户毛利场景,大大降低了技术风险。
    signalRefs: [无需埋点的内核级归因]
    sourceRefs: [1, 2]
  - point: DoiT 自己的调查显示,85% 的企业高管无法在无重大阻碍的情况下算清 AI ROI,说明这种痛点足够普遍,能从 DoiT 专注的内部费用分摊,延伸到外部客户毛利问题上。
    signalRefs: [AI ROI 盲区已经捅到董事会层面]
    sourceRefs: [2]
  - point: 一家成熟的 FinOps 厂商选择收购归因创业公司而不是自建能力,证实企业买家现在就愿意为这个品类掏钱,即便谁能定义制胜产品形态还没有答案。
    signalRefs: ["并购验证的是紧迫性,不是市场饱和"]
    sourceRefs: [1]
  - point: 报道把归因失灵直接归因于共享 GPU 池和智能体负载——这恰恰是垂直 SaaS 公司在单一多租户后端嵌入第三方 AI 智能体后,必然会遇到的情况。
    signalRefs: [共享 GPU 和智能体负载打穿了旧成本模型]
    sourceRefs: [1]
differentiator: >-
  DoiT/Attribute 卖给的是中央 IT 和 FinOps 团队,用来在内部部门间分摊 AI 支出;这款产品卖给的则是垂直 SaaS 公司,
  它们需要按外部客户看毛利,并直接接入自己的账单和定价系统——这是横向 FinOps 平台生来就不擅长服务的更窄切口。
  因为产品接入的是按用量计费引擎,而不是内部分摊看板,它能在定价或续约决策的那一刻捕获价值,而不只是每月一次的成本报告周期。
