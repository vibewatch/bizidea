jobsToBeDone:
  - job: When our embedded AI copilot usage scales across customers, help our finance team see per-customer AI margin in real time, so they can catch unprofitable accounts before renewal instead of after a bad quarter.
    currentAlternative: Manual spreadsheet reconciliation of LLM provider invoices against usage logs
    successMetric: Time from usage spike to a flagged margin alert, and reduction in unprofitable-account surprises per quarter
  - job: When we design usage-based pricing tiers for our AI feature, help our product team model per-tier COGS accurately, so they can set defensible price points before a renewal or funding round.
    currentAlternative: Ad hoc internal script tied to a single model provider's SDK
    successMetric: Percentage of pricing tiers backed by real per-tenant COGS data instead of estimates
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Two same-day, fetch-verified sources document a concrete acquisition and product launch plus a quantified ROI-blindspot statistic.
  painIntensity:
    score: 4
    rationale: Discovering an unprofitable customer segment months after shipping a priced AI feature is a board-level, revenue-threatening problem for vertical SaaS finance teams.
  wedgeClarity:
    score: 4
    rationale: The zero-instrumentation, per-tenant margin meter feeding directly into billing systems is a specific, buildable first product distinct from DoiT's internal-chargeback focus.
  defensibility:
    score: 3
    rationale: Provider-agnostic metering and billing-system integrations create switching friction, but horizontal FinOps incumbents could extend downmarket if the niche proves large.
  ventureScale:
    score: 4
