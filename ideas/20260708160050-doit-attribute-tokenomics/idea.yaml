topRisks:
  - name: Incumbent downmarket move
    description: DoiT/Attribute or a horizontal FinOps platform could extend its internal chargeback product to cover per-external-customer margin metering.
    mitigation: Win on billing-system-native integration and vertical-specific margin guardrails that a horizontal chargeback tool is not built to ship first.
  - name: Provider API fragmentation
    description: Each new LLM provider, agent framework, or GPU orchestration layer changes how usage data is exposed, risking constant adapter maintenance.
    mitigation: Build a provider-agnostic metering core with a plugin architecture and prioritize adapters for the 3-4 providers the beachhead segment actually uses.
  - name: Attribution accuracy disputes
    description: If per-tenant cost estimates are wrong, customers will distrust the margin ledger and refuse to base pricing or renewal decisions on it.
    mitigation: Publish a reconciliation report against actual provider invoices during onboarding and let customers audit the metering logic before it drives billing.
