problem: >-
  Vertical SaaS companies that embed LLM agents or copilots into their own products cannot tell which paying
  customer, tenant, or price tier is actually profitable once multi-provider token, GPU, and vector-store costs are
  netted out. Usage spans several inference providers and internal fine-tuned models with no shared identifier back
  to the end customer, so finance only discovers a money-losing account or segment during a quarterly invoice
  reconciliation, months after the feature shipped and the pricing commitment was already made.
targetUser:
  primary: VP of Product or Head of AI at Series B-D vertical SaaS companies that ship an embedded AI agent or copilot feature to paying end customers
  secondary: Finance and RevOps leaders responsible for gross margin and usage-based pricing at the same companies
  buyer: CFO or VP of Finance acting jointly with the Head of AI Product
startupThesis:
  nonObviousInsight: DoiT's acquisition proves zero-instrumentation, kernel-level AI cost attribution now works at enterprise scale, but the product is built for internal enterprise chargeback across cost centers; nobody has pointed that same metering technique at the external question vertical SaaS vendors actually need answered, which is which paying customer or tier is profitable once multi-provider LLM and GPU cost is netted out.
  beachhead: Series B-D vertical SaaS companies (legal-tech, healthtech ops, fintech ops software) that shipped an embedded LLM agent or copilot feature to end customers within the past two quarters and route usage through 2+ inference providers or a mix of hosted and fine-tuned models
  wedge: A request-layer proxy that meters token, GPU, and vector-store cost per end-customer tenant with zero SDK changes, then pushes per-tenant COGS straight into the company's existing usage-based billing engine and BI stack
  whyNowCatalyst: DoiT's acquisition of Attribute and its zero-instrumentation kernel-level metering, launched the same week enterprises admitted only 15% can calculate AI ROI, proves the underlying attribution technology and buyer urgency now exist, while DoiT's internal-chargeback focus leaves the external per-customer margin question open for a wedge-focused entrant.
  ventureScalePath: Start as a per-tenant AI margin meter for vertical SaaS, expand into an automated usage-based pricing and margin-guardrail engine (alerts, throttling, tier nudges) for any SaaS company embedding third-party AI, then become the default COGS-attribution and billing-integration layer for AI-native software company finance stacks.
solution: >-
  A lightweight proxy or sidecar sits at the model-call layer (LLM gateway, API gateway, or network tap) and
  fingerprints each request back to the initiating end-customer tenant or session without requiring code changes
  from the client team. It aggregates token counts, GPU-second estimates, and vector-store query costs across every
  inference provider the company uses, then streams a per-tenant, real-time margin ledger into the company's
  billing system (Stripe Billing, Orb, Metronome) and BI stack. Pre-built margin-guardrail rules let a product or
  finance owner alert, throttle, or nudge an account to a higher tier before a customer segment becomes
  structurally unprofitable, closing the loop between cost data and pricing action.
goToMarketSeed:
  firstCustomer: A Series B vertical SaaS company (legal-tech or fintech-ops) that shipped an embedded AI copilot in the last two quarters, bills through multiple inference providers, and is about to introduce or defend usage-based pricing tiers
  buyingTrigger: Finance flags a specific customer segment or top account as underwater on AI COGS during a board or quarterly review, or the company is designing usage-based pricing ahead of a renewal cycle or funding round and needs defensible unit economics
  currentAlternative: Manual workflow reconciling LLM provider invoices against internal usage logs in spreadsheets, or a brittle internal build tied to one SDK that breaks whenever a new model provider or agent framework is added
  switchingReason: The proxy requires no SDK or tag changes across multiple concurrent inference providers, delivers per-tenant margin data within days instead of a quarterly close, and plugs directly into the billing system the company already runs instead of producing a one-off internal report
  pricingHypothesis: Usage-based fee set as a percentage of metered AI spend under management, with a flat platform-fee tier for smaller companies below a spend threshold
whyNow:
  - point: DoiT just proved zero-instrumentation, kernel-level AI cost attribution works at enterprise scale, derisking the core metering technique for a smaller entrant to adapt to the SaaS-tenant margin use case.
    signalRefs: [Kernel-level attribution without instrumentation]
    sourceRefs: [1, 2]
  - point: DoiT's own survey shows 85% of enterprise leaders cannot calculate AI ROI without major bottlenecks, meaning the pain is broad enough to extend past DoiT's internal-chargeback focus into the external customer-margin question.
    signalRefs: [AI ROI blind spot is board-level]
    sourceRefs: [2]
  - point: An established FinOps incumbent chose to acquire an attribution startup rather than build the capability internally, confirming enterprise buyers will pay for this category now even though the winning product surface is still being defined.
    signalRefs: [M&A validates urgency, not saturation]
    sourceRefs: [1]
  - point: Reporting ties the attribution failure directly to shared GPU pools and agentic workloads, which are exactly the conditions vertical SaaS companies face once they embed third-party AI agents behind a single multi-tenant backend.
    signalRefs: [Shared GPU and agentic workloads break old cost models]
    sourceRefs: [1]
differentiator: >-
  Unlike DoiT/Attribute, which sells into central IT and FinOps teams to chargeback AI spend across internal
  departments, this product sells to vertical SaaS companies that need per-external-customer margin visibility
  feeding directly into their own billing and pricing systems, a narrower wedge that horizontal FinOps platforms are
  not built to serve. Because the product plugs into usage-based billing engines rather than an internal chargeback
  dashboard, it captures value at the exact moment of a pricing or renewal decision, not just a monthly cost-report
  cycle.
