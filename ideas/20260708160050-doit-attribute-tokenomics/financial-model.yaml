scenarios:
  downside:
    description: Pilot conversion slips by two quarters, most customers stay single-workflow, and services-heavy implementations keep margin below plan.
    y3RevenueK: 1600.0
    y3EbitdaK: -780.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches about 18 instead of 24.
      - Exit annualized ARPU stays near $105K because usage-based expansion and second workflows attach later.
      - Gross margin exits around 66% because billing and gateway integrations stay more bespoke.
  base:
    description: Founder-led pilots convert on roughly one-quarter proof cycles, one billing integration path repeats, and second-workflow expansion begins during Y2.
    y3RevenueK: 2130.0
    y3EbitdaK: -352.0
    cashLowPointK: 248.7
    keyAssumptionChanges:
      - 3 paying accounts by M12, 10 by Q4Y2, and 24 by Q4Y3.
      - Exit annualized ARPU reaches about $124K as usage-based fees and second workflows attach.
      - Gross margin reaches the 70% BP target by Q4Y3 as integrations standardize.
  upside:
    description: Renewal-trigger outbound plus partner referrals compress conversion, and multi-workflow expansion lands earlier than planned.
    y3RevenueK: 2770.0
    y3EbitdaK: 120.0
    cashLowPointK: 430.0
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches about 28 instead of 24.
      - Exit annualized ARPU reaches about $135K because more accounts add a second workflow in Y2.
      - Gross margin exits around 72% as one billing and gateway deployment path becomes repeatable earlier.
sensitivity:
  - variable: ARPU
    downsideCase: Usage-based fees stay light and most accounts remain at one workflow.
    baseCase: Exit annualized ARPU reaches about $124K per paying logo.
    upsideCase: Second-workflow expansion and metered spend fees lift exit ARPU toward about $135K.
    y3RevenueImpactK: -380.0
    cashImpactK: -260.0
  - variable: CAC
    downsideCase: Partner channels underperform and CAC drifts toward about $85K.
    baseCase: CAC stays near $67.5K through founder-led and partner-assisted selling.
    upsideCase: Billing-vendor referrals keep CAC near about $55K.
    y3RevenueImpactK: -90.0
    cashImpactK: -210.0
  - variable: churn
    downsideCase: Monthly churn rises toward 2.5% if buyers still view the product as a point solution.
    baseCase: Monthly churn settles near 1.5% once the ledger is embedded in billing workflows.
    upsideCase: Monthly churn stays near 1.0% because finance and product both depend on the ledger.
    y3RevenueImpactK: -160.0
    cashImpactK: -120.0
  - variable: sales cycle
    downsideCase: Pilot-to-production conversion stretches from about 90 days to about 180 days.
    baseCase: Paid pilots convert in roughly one quarter when tied to a live pricing or renewal trigger.
    upsideCase: Partner-backed deals convert in about 60 days after pilot kickoff.
    y3RevenueImpactK: -470.0
    cashImpactK: -300.0
  - variable: gross margin
    downsideCase: Gross margin stalls near 66% because implementation remains services-heavy.
    baseCase: Gross margin exits at 70% after one integration path becomes repeatable.
    upsideCase: Gross margin reaches 72% as reusable reconciliation templates reduce manual work.
    y3RevenueImpactK: 0.0
    cashImpactK: -170.0
  - variable: hiring pace
    downsideCase: Two scale hires are pulled forward before partner-sourced pipeline is proven.
    baseCase: Hiring follows the BP sequencing and keeps back-office roles deferred.
    upsideCase: The final engineering hire waits until later in Y3 without slowing bookings.
    y3RevenueImpactK: -40.0
    cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      TargetAccounts[Trigger-based target accounts] --> PaidPilots[Paid pilots]
      BillingPartners[Billing and gateway partners] --> PaidPilots
      PaidPilots --> ProductionLogos[Annual production logos]
      ProductionLogos --> Expansion[Second workflow expansion]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base revenue comes from growing from 3 paying accounts at Y1 exit to 24 by Q4Y3 while exit annualized ARPU rises to about $124K through usage fees and second workflows.
  - checkName: Must go right
    finding: The company must keep pilot-to-production conversion near one quarter and show at least one repeatable partner referral path, because sales cycle is the largest revenue and runway sensitivity.
  - checkName: Model breaks if
    finding: If buyers delay standalone budget ownership and gross margin stalls near 66%, the downside case pushes cash below zero before the seed proof point arrives.
  - checkName: Next-round proof
    finding: The seed story is 6-10 production logos by late Y2, at least 3 expanded workflows, and proof that one billing or gateway channel can source repeatable qualified pipeline.
sanityChecks:
  ruleOf40: Y3 growth 220.8% + EBITDA margin -16.5% = 204.3%
  burnMultiple: Y2 burn multiple is about 1.3x using roughly $1047.9K of EBITDA burn against about $824.0K of net new ARR; Q4Y3 is modestly EBITDA positive.
  revenuePerFte: $266.3K Y3 on 8 ending FTE (benchmark $200-400K SaaS)
  flags:
    - CustomersEop includes paid pilots plus production contracts, so recurring-only production logos lag the headline account count through Y1.
    - Base-case cash bottoms near $0.25M in Q3Y3, so a two-quarter slip in pilot conversion likely forces slower hiring or an earlier seed.
    - Exit ARPU rises above the researched $60K initial ACV because the model assumes usage-based fees and second-workflow expansion; single-workflow accounts would undershoot revenue.
    - Y2 burn remains heavy while direct sales and partner channels are still being proven, so standalone budget ownership is the main commercial risk.
    - Cash is modeled as EBITDA; implementation prepayments, deferred revenue timing, or security-review capex could move actual cash collections materially.
