slug: ai-margin-metering-vertical-saas
date: '2026-07-08'
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: Model start month
    value: 2026-08
    unit: YYYY-MM
    source: '[BP date 2026-07-08] the model starts with the first full month after the dated business plan.'
  - id: A2
    name: Opening cash / pre-seed raise
    value: $2.5M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model burn curve] the base case uses a mid-range pre-seed sized to reach the first repeatable production-logo milestone with about six months of buffer.'
  - id: A3
    name: Starting paying accounts
    value: '0'
    unit: count
    source: '[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first close design-partner pilots.'
  - id: A4
    name: Paying account definition
    value: A paid pilot or a production contract that is actively using the tenant-margin ledger.
    unit: definition
    source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop counts any logo already paying for pilot or production scope.'
  - id: A5
    name: Paid pilot economics
    value: $30K over roughly 2 months (~$15K per month)
    unit: USD/account
    source: '[BP investorMemo.firstCustomer.initialContract $25k-$50k pilot] the model uses a low-midpoint pilot price because the wedge is still proving finance trust.'
  - id: A6
    name: Production contract and expansion economics
    value: Annualized production revenue starts near $72K ARR, reaches about $104K by Q4Y2, and exits near $124K annualized by Q4Y3 as usage-based fees and second-workflow expansion attach.
    unit: USD/account/year
    source: '[BP investorMemo.firstCustomer.initialContract $60k-$120k annual contract + BP businessModel.revenueStreams + BP milestones 12-24 months and 24-36 months + Research market.som $60k initial ACV] the model begins in the lower half of the BP range and steps up only after multi-workflow usage attaches.'
  - id: A7
    name: Customer ramp
    value: 3 paying accounts by M12, 10 by Q4Y2, and 24 by Q4Y3
    unit: customersEop
    source: '[BP milestones 0-12, 12-24, and 24-36 months + BP experimentRoadmap + BP market.som note] the base case hits the middle of the 20-30 logo year-3 milestone while staying well below the researched 60-logo SOM math.'
  - id: A8
    name: Revenue recognition convention
    value: 'Period-end paying accounts multiplied by blended realized revenue per account for that period: Y1 mixes $15K pilot months with roughly $6K-$8K monthly production revenue; Y2 averages $20K, $22K, $24K, and $26K per account per quarter; Y3 averages $26K, $28K, $30K, and $31K per account per quarter.'
    unit: formula
    source: '[BP gtm.pricing + BP businessModel.revenueStreams + BP milestones expansion language] this keeps P&L revenue directly traceable to customers and a conservative land-then-expand mix.'
  - id: A9
    name: Gross margin ramp
    value: 45%-55% in Y1, 58%-65% in Y2, and 67%-70% in Y3
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 70 + BP risks on services-heavy integrations + BP sequencingRationale] early pilots are implementation-heavy before reusable billing and gateway patterns lift margin toward the target.'
  - id: A10
    name: Hiring timeline
    value: M1 founder and founding engineer; M4 solutions/integration engineer; M7 product and finance systems lead; M10 GTM and partnerships lead; M15 second engineer; M22 second GTM hire; M30 third engineer; no dedicated ops hire before Y3 because the founder and outside vendors cover admin.
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] the plan adds integrations before scaled selling and keeps back-office hiring deferred until the wedge is proven.'
  - id: A11
    name: Founder loaded compensation
    value: $160K
    unit: USD/year
    source: '[BP team Founder/CEO + startup-finance heuristic] lean founder cash pay plus taxes and benefits.'
  - id: A12
    name: Engineering loaded compensation
    value: $200K
    unit: USD/year
    source: '[BP team Founding eng + startup-finance heuristic] finance-grade data reconciliation and gateway work require senior backend talent.'
  - id: A13
    name: Solutions and integration loaded compensation
    value: $175K
    unit: USD/year
    source: '[BP team Solutions and integration engineer + startup-finance heuristic] early value depends on fast implementation across billing and provider stacks.'
  - id: A14
    name: Product and finance systems loaded compensation
    value: $180K
    unit: USD/year
    source: '[BP team Product and finance systems lead + startup-finance heuristic] this role translates raw cost data into renewal, pricing, and finance workflows.'
  - id: A15
    name: GTM and partnerships loaded compensation
    value: $190K
    unit: USD/year
    source: '[BP team GTM and partnerships lead + BP gtm.channels + startup-finance heuristic] includes enterprise selling, travel, and partner-development overhead.'
  - id: A16
    name: Payroll allocation to P&L lines
    value: Founder 60% S&M / 20% R&D / 20% G&A; engineering 100% R&D; solutions 50% S&M / 50% R&D; product and finance systems 30% S&M / 70% R&D; GTM 100% S&M.
    unit: allocation
    source: '[BP team role rationales + BP operations] the founder and solutions team are customer-facing while engineering and product own the core ledger and reconciliation work.'
  - id: A17
    name: Non-payroll operating spend ramp
    value: Monthly non-payroll S&M/R&D/G&A starts at $3K/$9K/$6K, rises to $7K/$12K/$7K after the first GTM hire, to $10K/$14K/$8K after the second GTM hire, and to $12K/$15K/$8K once the third engineer is added.
    unit: USD/month
    source: '[BP operations + BP privacy and retention requirements + startup-finance heuristic] this covers cloud infrastructure, security tooling, travel, legal, and implementation support without assuming a large paid-demand engine.'
  - id: A18
    name: Cash conversion convention
    value: Cash movement equals EBITDA.
    unit: formula
    source: '[startup-finance heuristic] capex, taxes, working-capital timing, and financing fees are assumed immaterial at pre-seed scale.'
  - id: A19
    name: Steady-state monthly churn
    value: 1.5%
    unit: percent per month
    source: '[startup-finance heuristic for enterprise workflow SaaS + BP expansionLevers + BP whyWeWin switching friction] once the ledger is embedded in billing and renewal workflows, retention should be strong, but the assumption is not yet proven.'
  - id: A20
    name: Pilot-to-production cycle
    value: About 90 days from paid pilot kickoff to annual production conversion
    unit: days
    source: '[BP experimentRoadmap 90-180 days + BP investorMemo.mustBeTrue on pilot conversion] the model assumes one quarter is enough to prove invoice-grade value for the first workflow.'
  - id: A21
    name: CAC convention
    value: Total 36-month sales and marketing spend divided by 24 net new paying accounts
    unit: formula
    source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures founder-led, partner-led, and direct enterprise acquisition over the full buildout period.'
  - id: A22
    name: Next-round milestone for funding sizing
    value: By roughly late Y2 the company should have 6-10 production logos, at least 3 expanded workflows, and one repeatable referral path from a billing or gateway partner.
    unit: milestone
    source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP experimentRoadmap partnership motion] the pre-seed is sized to reach repeatable production proof and still carry about six months of buffer.'
  - id: A23
    name: Quarterly salary-roll convention
    value: Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only quarter-end snapshots.
    unit: convention
    source: '[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent with the monthly hiring ramp even though Y2 and Y3 show year-end headcount snapshots.'
