competitors:
- name: DoiT Attribute
  stage: incumbent
  wedge: 零埋点 AI 支出归因,覆盖 token、模型请求、GPU 用量和智能体,面向企业云和 FinOps 团队。
  pricing: 未公开披露
  strength: 强力证明了内核级或代理式 AI 归因在商业上真实可行,而且足够重要到被一家成熟的 FinOps 厂商收购。
  weaknessVsUs: 目前的定位聚焦于内部企业费用分摊和云智能,而不是垂直 SaaS 账单流程里的外部按客户毛利决策。
  sourceRefs:
  - 1
  - 2
- name: CloudZero
  stage: incumbent
  wedge: 面向按客户、产品、功能、团队和 AI 投资 ROI 的云单位经济模型平台。
  pricing: 需申请报价
  strength: 在成本分摊和单位经济模型上的叙事很深,能打动 CFO 和 FinOps 相关方。
  weaknessVsUs: 主要是面向内部云经济模型的报表和优化层,而不是能把 COGS 直接推进用量账单系统的请求层租户台账。
  sourceRefs:
  - 10
  - 9
- name: Finout
  stage: scale-up
  wedge: 统一的 FinOps 数据层,支持带 AI 感知的 token、多云和单位经济模型分摊。
  pricing: 按承诺支出分档的固定费用
  strength: 在 token 感知展示、多云口径统一和 AI 专属 FinOps 需求上叙事很强。
  weaknessVsUs: 重心仍在财务和基础设施可见性,而不是软件厂商营收流程里的按租户毛利行动和定价控制。
  sourceRefs:
  - 22
  - 23
- name: Portkey
  stage: scale-up
  wedge: 面向生产环境 AI 应用和智能体的 AI 网关与控制平面,具备成本归因、审计日志、路由和治理能力。
  pricing: 公开套餐加企业版
  strength: 非常贴近请求层,拥有强大的元数据、路由和治理原语,已经能做成本归因和执行控制。
  weaknessVsUs: 产品是为工程可靠性、安全性和治理而优化的,而不是一套财务拥有的按租户盈利能力台账、直接喂给账单系统。
  sourceRefs:
  - 85
  - 86
  - 95
- name: Helicone
  stage: seed
  wedge: 开源 LLM 可观测性与网关层,具备成本追踪、会话和用户指标。
  pricing: 公开套餐加企业版
  strength: 对开发者友好地捕获成本、会话和用户级指标,证明请求层归因无需重型部署即可实现。
  weaknessVsUs: 可观测性深度很有吸引力,但还没做到财务级对账、账单系统行动,以及面向 SaaS 厂商的客户毛利管理。
  sourceRefs:
  - 75
  - 76
regulatoryTechnicalConstraints:
- point: 服务商定价在输入、输出、缓存输入、区域加价和合作云变体之间高度异构,所以毛利台账必须持续统一不断变化的计价单位,而不能假设只有一种 token 价格。
  sourceRefs:
  - 104
  - 107
  - 111
  - 117
- point: 向量和检索层增加了独立的存储、读取、写入和索引压缩成本面,除了原始模型 token 之外,还会实质性影响按租户 COGS。
  sourceRefs:
  - 120
  - 119
  - 123
- point: 共享基础设施的成本分摊需要考虑工作负载、闲置和管理开销,而不能只累加直接观测到的 API 调用或 token 数。
  sourceRefs:
  - 127
  - 8
- point: 提示词、回复和租户元数据日志可能触发留存、最小化、安全和审计义务,在受监管或跨境部署中尤其如此。
  sourceRefs:
  - 105
  - 134
  - 135
  - 136
  - 137
validationSignals:
- point: DoiT 收购 Attribute 并推出零埋点 tokenomics,而不是等着自己内部搭建同等能力,验证了买家对 AI 支出归因的紧迫需求。
  sourceRefs:
  - 1
  - 2
- point: FinOps Foundation 报告称,98% 的从业者现在都在管理 AI 支出,证实 AI 经济模型已经成为标准的预算和运营议题。
  sourceRefs:
  - 6
- point: OpenAI 和 Replicate 都依赖 Metronome 做实时用量、积分和账单工作流,证明成熟的 AI 公司已经在采购外部计量基础设施。
  sourceRefs:
  - 56
  - 57
- point: Palo Alto Networks 有意收购 Portkey,说明 AI 网关是战略控制点,而不是可有可无的开发者工具。
  sourceRefs:
  - 95
openQuestions:
- 在异步智能体、后台任务和客服升级场景中,能否不改 SDK 就足够准确地推断出租户身份?
- 等垂直 SaaS 产品做到规模化时,滩头市场的 AI COGS 有多少落在检索、向量和编排层,而不是原始模型 token 上?
- CFO 会为一个独立的毛利控制层买单,还是坚持要求这项能力嵌在现有的账单或 FinOps 关系里?
- 哪个初始垂直领域——法律科技、医疗运营还是金融运营——能最快走通可信对账和续约影响?
