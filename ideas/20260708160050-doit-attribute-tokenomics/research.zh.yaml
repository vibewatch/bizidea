  adoptionFrictionMatrix:
  - friction: 无需改代码就推断租户身份,在真实生产流量中很难
    severity: high
    affectedBuyer: Head of AI or platform engineering lead
    mitigation: 先从代理或网关插入点入手,配合明确的会话和元数据关联做首批集成,再拿真实发票验证对账结果。
    sourceRefs:
    - 85
    - 76
    - 96
  - friction: 如果建模出的 COGS 对不上服务商账单,财务就不会信任
    severity: high
    affectedBuyer: CFO or VP Finance
    mitigation: 先主打对账模式,展示各服务商专属的计价逻辑,拿真实发票对比出差异,再把台账定位成系统记录。
