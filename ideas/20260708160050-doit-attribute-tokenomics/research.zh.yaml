    - 105
    - 134
    - 135
    - 136
    - 86
  - friction: 账单集成的复杂度会拖慢首次实现价值的速度
    severity: medium
    affectedBuyer: RevOps or billing systems owner
    mitigation: 优先对接 Stripe、Orb 和 Metronome,而不是要求团队替换报价到收款基础设施。
    sourceRefs:
    - 67
    - 43
    - 56
