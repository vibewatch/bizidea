scenarios:
  downside:
    description: 试点转化推迟两个季度,大多数客户仍停留在单一工作流,服务密集型实施让毛利率低于计划。
    y3RevenueK: 1600.0
    y3EbitdaK: -780.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
    - Q4Y3 期末客户数约为 18 个,而不是 24 个。
    - 退出年化 ARPU 维持在约 $105K,因为按用量扩展和第二工作流接入得更晚。
    - 毛利率退出时约为 66%,因为账单和网关集成仍然偏定制化。
  base:
    description: 创始人主导的试点,在约一个季度的验证周期内转化,一条账单集成路径可复制,第二工作流扩展从第 2 年开始。
    y3RevenueK: 2130.0
    y3EbitdaK: -352.0
    cashLowPointK: 248.7
    keyAssumptionChanges:
    - M12 有 3 个付费账户,Q4Y2 有 10 个,Q4Y3 有 24 个。
    - 随着按用量费用和第二工作流的接入,退出年化 ARPU 达到约 $124K。
    - 随着集成标准化,毛利率到 Q4Y3 达到商业计划书 70% 的目标。
  upside:
    description: 续约触发型外呼加上合作伙伴引荐,压缩了转化周期,多工作流扩展比计划更早落地。
    y3RevenueK: 2770.0
    y3EbitdaK: 120.0
    cashLowPointK: 430.0
    keyAssumptionChanges:
    - Q4Y3 期末客户数约为 28 个,而不是 24 个。
    - 由于更多账户在第 2 年加装第二工作流,退出年化 ARPU 达到约 $135K。
    - 由于一条账单与网关部署路径更早实现可复制,毛利率退出时约为 72%。
sensitivity:
- variable: ARPU
  downsideCase: 按用量费用维持轻量,大多数账户仍停留在一个工作流。
  baseCase: 退出年化 ARPU 达到每付费客户约 $124K。
  upsideCase: 第二工作流扩展和计量支出费用,把退出 ARPU 推高到约 $135K。
  y3RevenueImpactK: -380.0
  cashImpactK: -260.0
- variable: CAC
  downsideCase: 合作伙伴渠道表现不佳,CAC 逐渐升至约 $85K。
  baseCase: 通过创始人主导加合作伙伴辅助的销售,CAC 维持在约 $67.5K。
  upsideCase: 账单厂商引荐让 CAC 维持在约 $55K。
  y3RevenueImpactK: -90.0
  cashImpactK: -210.0
- variable: 流失率
  downsideCase: 如果买家仍把产品视为单点方案,月流失率会升至约 2.5%。
  baseCase: 一旦台账嵌入账单工作流,月流失率会稳定在约 1.5%。
  upsideCase: 由于财务和产品都依赖这份台账,月流失率维持在约 1.0%。
  y3RevenueImpactK: -160.0
  cashImpactK: -120.0
- variable: 销售周期
  downsideCase: 试点转生产的转化周期从约 90 天拉长到约 180 天。
  baseCase: 当与真实的定价或续约触发事件挂钩时,付费试点约在一个季度内转化。
  upsideCase: 有合作伙伴支持的交易,在试点启动后约 60 天内转化。
  y3RevenueImpactK: -470.0
  cashImpactK: -300.0
- variable: 毛利率
  downsideCase: 由于实施仍然服务密集,毛利率停滞在约 66%。
  baseCase: 在一条集成路径实现可复制后,毛利率退出时为 70%。
  upsideCase: 可复用的对账模板减少了人工工作量,毛利率达到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -170.0
- variable: 招聘节奏
  downsideCase: 在合作伙伴渠道带来的销售管道被验证之前,就提前招聘了两名规模化岗位。
  baseCase: 招聘按商业计划书的节奏进行,后台岗位保持延后。
  upsideCase: 最后一位工程师的招聘推迟到第 3 年后段,也不会拖慢签单速度。
  y3RevenueImpactK: -40.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      TargetAccounts[Trigger-based target accounts] --> PaidPilots[Paid pilots]
      BillingPartners[Billing and gateway partners] --> PaidPilots
      PaidPilots --> ProductionLogos[Annual production logos]
      ProductionLogos --> Expansion[Second workflow expansion]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准收入的来源,是付费账户数从第 1 年末的 3 个增长到 Q4Y3 的 24 个,同时退出年化 ARPU 随着用量费用和第二工作流的加入升至约 $124K。
- checkName: 必须做对的事
  finding: 公司必须把试点转生产的转化周期维持在约一个季度,并证明至少一条可复制的合作伙伴引荐路径,因为销售周期是对收入和现金跑道影响最大的敏感因素。
- checkName: 模型失效的情形
  finding: 如果买家迟迟不愿意为独立预算买单,且毛利率停滞在约 66%,下行情形会让现金在种子轮验证点到来前就跌破零。
- checkName: 下一轮融资的验证标准
  finding: 种子轮的故事是:第 2 年末前拥有 6-10 个生产客户、至少 3 个已扩展的工作流,并证明至少一条账单或网关渠道能持续带来合格销售管道。
sanityChecks:
  ruleOf40: 第 3 年增长率 220.8% + EBITDA 利润率 -16.5% = 204.3%
  burnMultiple: 第 2 年烧钱倍数约为 1.3 倍,以约 $1047.9K 的 EBITDA 消耗对应约 $824.0K 的净新增 ARR 计算;Q4Y3 时 EBITDA 已小幅转正。
  revenuePerFte: 第 3 年人均收入 $266.3K,按期末 8 名全职员工计算(SaaS 基准区间为 $200-400K)
  flags:
  - CustomersEop 既包含付费试点也包含生产合同,所以只算经常性收入的生产客户数,在整个第 1 年都会落后于账户总数这个 headline 数字。
  - 基准情形下,现金在 Q3Y3 触底至约 $0.25M,所以试点转化一旦推迟两个季度,很可能被迫放慢招聘或提前启动种子轮。
  - 退出 ARPU 高于研究测算的 $60K 初始 ACV,因为模型假设了按用量费用和第二工作流扩展;只有单一工作流的账户,收入会低于预期。
  - 第 2 年烧钱依然沉重,而直销和合作伙伴渠道都还在验证阶段,所以独立预算归属仍是最主要的商业风险。
  - 现金按 EBITDA 建模;实施预付款、递延收入时点或安全审查相关的资本支出,都可能让实际现金回收出现明显偏差。
