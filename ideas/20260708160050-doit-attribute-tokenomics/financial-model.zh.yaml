slug: ai-margin-metering-vertical-saas
date: '2026-07-08'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-08] 模型从商业计划书落款日期之后的第一个完整月份开始。'
- id: A2
  name: 期初现金/种子前轮融资额
  value: $2.5M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + 模型烧钱曲线] 基准情形采用中等规模的种子前轮融资,目标是在留有约 6 个月缓冲的情况下,达到首个可复制的生产客户里程碑。'
- id: A3
  name: 起始付费账户数
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步,必须先拿下共创客户试点。'
- id: A4
  name: 付费账户定义
  value: 正在实际使用租户毛利台账的付费试点或生产合同。
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 统计所有已经为试点或生产范围付费的客户。'
- id: A5
  name: 付费试点经济模型
  value: 约 2 个月 $30K(约每月 $15K)
  unit: USD/account
  source: '[BP investorMemo.firstCustomer.initialContract $25k-$50k pilot] 模型采用试点价格区间的中低值,因为这个切口还在证明财务信任阶段。'
- id: A6
  name: 生产合同与扩展经济模型
  value: 年化生产收入起始约为 $72K ARR,到 Q4Y2 达到约 $104K,随着按用量费用和第二工作流扩展的加入,到 Q4Y3 年化退出值约为 $124K。
  unit: USD/account/year
  source: '[BP investorMemo.firstCustomer.initialContract $60k-$120k annual contract + BP businessModel.revenueStreams + BP milestones 12-24 months and 24-36 months + Research market.som $60k initial ACV] 模型起点位于商业计划书区间的中下段,只有在多工作流用量接入后才会上调。'
- id: A7
  name: 客户爬坡节奏
  value: M12 达到 3 个付费账户,Q4Y2 达到 10 个,Q4Y3 达到 24 个
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months + BP experimentRoadmap + BP market.som note] 基准情形达到第 3 年 20-30 家客户里程碑区间的中段,同时明显低于研究测算的 60 家 SOM 数字。'
- id: A8
  name: 收入确认惯例
  value: 期末付费账户数,乘以该期间每账户的混合已实现收入:第 1 年混合了 $15K 的试点月份和约 $6K-$8K 的月度生产收入;第 2 年各季度每账户平均分别为 $20K、$22K、$24K、$26K;第 3 年各季度每账户平均分别为 $26K、$28K、$30K、$31K。
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams + BP milestones expansion language] 这样能让损益表收入直接可追溯到客户,并保持保守的先落地后扩展组合。'
- id: A9
  name: 毛利率爬坡
  value: 第 1 年 45%-55%,第 2 年 58%-65%,第 3 年 67%-70%
  unit: 毛利率百分比
  source: '[BP businessModel.targetGrossMarginPct 70 + BP risks on services-heavy integrations + BP sequencingRationale] 早期试点实施投入较重,之后可复用的账单和网关模式才会把毛利率推向目标值。'
- id: A10
  name: 招聘时间线
  value: 第 1 个月:创始人和创始工程师;第 4 个月:解决方案/集成工程师;第 7 个月:产品与财务系统负责人;第 10 个月:GTM 与合作伙伴负责人;第 15 个月:第二位工程师;第 22 个月:第二位 GTM 员工;第 30 个月:第三位工程师;第 3 年前不设专职运营岗位,行政事务由创始人和外部供应商承担。
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 计划先补齐集成能力再规模化销售,后台职能招聘推迟到切口被验证之后。'
- id: A11
  name: 创始人全成本薪酬
  value: $160K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic] 精简的创始人现金薪酬,加上税费和福利。'
- id: A12
  name: 工程师全成本薪酬
  value: $200K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] 财务级数据对账和网关开发需要资深后端人才。'
- id: A13
  name: 解决方案与集成全成本薪酬
  value: $175K
  unit: USD/year
  source: '[BP team Solutions and integration engineer + startup-finance heuristic] 早期价值取决于能否在账单和服务商技术栈上快速实施。'
- id: A14
  name: 产品与财务系统全成本薪酬
  value: $180K
  unit: USD/year
  source: '[BP team Product and finance systems lead + startup-finance heuristic] 这个角色把原始成本数据转化为续约、定价和财务工作流。'
- id: A15
  name: GTM 与合作伙伴全成本薪酬
  value: $190K
  unit: USD/year
  source: '[BP team GTM and partnerships lead + BP gtm.channels + startup-finance heuristic] 包含企业销售、差旅和合作伙伴拓展开支。'
- id: A16
  name: 工资分摊到损益表科目
  value: 创始人:60% 销售营销/20% 研发/20% 行政;工程:100% 研发;解决方案:50% 销售营销/50% 研发;产品与财务系统:30% 销售营销/70% 研发;GTM:100% 销售营销。
  unit: 分摊比例
  source: '[BP team role rationales + BP operations] 创始人和解决方案团队直接面向客户,工程和产品团队负责核心台账与对账工作。'
- id: A17
  name: 非工资运营支出爬坡
  value: 月度非工资销售营销/研发/行政支出起始为 $3K/$9K/$6K,第一位 GTM 员工到岗后升至 $7K/$12K/$7K,第二位 GTM 员工到岗后升至 $10K/$14K/$8K,第三位工程师到岗后升至 $12K/$15K/$8K。
  unit: USD/month
  source: '[BP operations + BP privacy and retention requirements + startup-finance heuristic] 覆盖云基础设施、安全工具、差旅、法务和实施支持,但不假设有大规模付费获客引擎。'
- id: A18
  name: 现金转换惯例
  value: 现金变动等于 EBITDA。
  unit: formula
  source: '[startup-finance heuristic] 假设在种子前轮规模下,资本支出、税费、营运资金时点和融资费用均可忽略不计。'
- id: A19
  name: 稳态月度流失率
  value: 1.5%
  unit: percent per month
  source: '[startup-finance heuristic for enterprise workflow SaaS + BP expansionLevers + BP whyWeWin switching friction] 一旦台账嵌入账单和续约工作流,留存率理应很强,但这一假设尚未得到验证。'
- id: A20
  name: 试点转生产周期
  value: 从付费试点启动到转化为年度生产合同,约需 90 天
  unit: days
  source: '[BP experimentRoadmap 90-180 days + BP investorMemo.mustBeTrue on pilot conversion] 模型假设一个季度足以证明首个工作流达到发票级价值。'
- id: A21
  name: CAC 计算惯例
  value: 36 个月销售与营销总支出,除以 24 个净新增付费账户
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] 涵盖整个建设期内创始人主导、合作伙伴主导和直接企业获客的全部支出。'
- id: A22
  name: 下一轮融资规模所依据的里程碑
  value: 到第 2 年末左右,公司应拥有 6-10 个生产客户、至少 3 个已扩展的工作流,以及一条来自账单或网关合作伙伴的可复制引荐路径。
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP experimentRoadmap partnership motion] 种子前轮的规模,是为了在留有约 6 个月缓冲的同时,达到可复制的生产验证。'
- id: A23
  name: 季度工资滚动惯例
  value: 第 2-3 年的工资行,按季度内实际的逐月招聘情况计算,而不是只用季末快照。
  unit: convention
  source: '[Headcount column convention + BP team startTiming] 即便第 2、3 年展示的是年末人数快照,这样也能让工资支出与逐月招聘节奏保持内部一致。'
