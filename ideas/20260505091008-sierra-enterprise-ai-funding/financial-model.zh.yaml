scenarios:
  downside:
    description: 企业销售周期延长一个季度，试点转生产转化率降至 40%，且由于实施仍然偏重服务，毛利率仅达到 65%。
    y3RevenueK: 2620.0
    y3EbitdaK: -690.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - 销售周期从 6 个月延长到 9 个月
    - 试点转生产转化率从 60% 降至 40%
    - 毛利率从 70% 降至 65%
  base:
    description: 第 1 年落地 2 到 3 个试点，转化率符合商业计划漏斗，且支付方扩展在无需深度写权限的前提下带来监控收入。
    y3RevenueK: 3720.0
    y3EbitdaK: -31.5
    cashLowPointK: 1280.0
    keyAssumptionChanges:
    - 销售周期保持在约 6 个月
    - 试点转生产转化率维持在 60%
    - 随着监控规模扩大，毛利率达到 70% 目标
  upside:
    description: 上线使能被证明非常紧迫，3 个早期试点快速转化，监控使用量推动混合 ACV 接近所述定价区间高端。
    y3RevenueK: 4580.0
    y3EbitdaK: 430.0
    cashLowPointK: 1500.0
    keyAssumptionChanges:
    - 销售周期从 6 个月压缩到 4-5 个月
    - 试点转生产转化率从 60% 提升到 75%
    - 在更强的使用量扩张下，混合 ARPU 从 $500K 提升到约 ~$560K
sensitivity:
- variable: ARPU
  downsideCase: $425K 混合年化 ARPU
  baseCase: $500K 混合年化 ARPU
  upsideCase: $575K 混合年化 ARPU
  y3RevenueImpactK: -560.0
  cashImpactK: -392.0
- variable: CAC
  downsideCase: 由于企业线索资格认定更慢，CAC 为 $220K
  baseCase: CAC 为 $180K
  upsideCase: 来自合作伙伴线索时 CAC 为 $150K
  y3RevenueImpactK: 0.0
  cashImpactK: -200.0
- variable: churn
  downsideCase: 3.0% 月度客户流失 / 续约更弱
  baseCase: 2.0% 月度流失
  upsideCase: 1.0% 月度流失 / 多意图留存更强
  y3RevenueImpactK: -280.0
  cashImpactK: -196.0
- variable: sales cycle
  downsideCase: 9 个月，因为预算负责人仍不清晰
  baseCase: 6 个月
  upsideCase: 当上线使能信息被验证后为 4-5 个月
  y3RevenueImpactK: -650.0
  cashImpactK: -455.0
- variable: gross margin
  downsideCase: 65%，因实施和支持负担更重
  baseCase: 70%
  upsideCase: 73%，因可复用策略模板降低服务成本
  y3RevenueImpactK: 0.0
  cashImpactK: -186.0
- variable: hiring pace
  downsideCase: 2 个规模化岗位提前 2 个季度招聘
  baseCase: 精简招聘，与客户里程碑绑定
  upsideCase: 将 1 个非客户前台岗位推迟到第 6 个客户之后
  y3RevenueImpactK: -100.0
  cashImpactK: -320.0
modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  QualifiedPipeline --> PaidPilots\n  PaidPilots --> ProductionCustomers\n  ProductionCustomers --> SubscriptionRevenue\n  ProductionCustomers --> UsageRevenue\n  SubscriptionRevenue --> GrossProfit\n  UsageRevenue --> GrossProfit\n  GrossProfit --> Cash\n  Opex --> Cash\n"
modelSanity:
- checkName: Revenue engine
  finding: 基准情形收入由一条狭窄的客户爬坡驱动：Y1 期末 3 个付费计划客户，到 Y3 增至 8 个，同时监控使用量把混合 ARPU 推向 $500K。
- checkName: Must go right
  finding: 这个模型成立的前提是，“上线使能”信息必须足以让试点转生产转化率维持在商业计划目标 60% 左右，同时又不引入大量写权限实施工作。
- checkName: Model breaks if
  finding: 如果预算归属持续模糊、销售周期从 6 个月拉长到 9 个月，就会出现现金风险，因为下行情形现金最低点会降至约 $180K。
- checkName: Next-round proof
  finding: 当公司达到 5 个支付方客户、2-3 个生产部署，并产出一个显示审批更快或闭环更安全的量化案例研究后，下一轮融资才更有说服力。
sanityChecks:
  ruleOf40: Y3 growth 116.3% + EBITDA margin -0.8% = 115.5%
  burnMultiple: Y2 burn multiple ~0.6x (about $751K EBITDA burn on $1.26M net new revenue); Y3 is near breakeven.
  revenuePerFte: $310K Y3 on average 12.0 FTE (benchmark $200–400K SaaS)
  flags:
  - Y3 收入仍集中在仅 8 个支付方客户上，因此只要有 1 个生产转化延迟，计划就会受到明显影响。
  - 模型假设只读集成足以支撑早期验证；如果买家要求更深写权限，毛利率和实施节奏都会恶化。
  - 成交后的 CAC 回本期很有吸引力，但现金时序仍取决于偏薄的企业销售漏斗，以及首笔预算归属尚未解决。
  - 基准情形未纳入相邻垂直行业扩张，因此超出支付方楔子的风险投资级上行仍未被证明。
