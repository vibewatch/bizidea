scenarios:
  downside:
    description: 企业销售周期延后一整个季度，试点转生产转化率降至 40%，且由于实施更偏服务化，毛利率只能落在 65%。
    y3RevenueK: 2620.0
    y3EbitdaK: -690.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - 销售周期从 6 个月拉长到 9 个月
    - 试点转生产转化率从 60% 降至 40%
    - 毛利率从 70% 降至 65%
  base:
    description: 第 1 年赢下两到三个试点，转化率符合商业计划漏斗目标，且 payer 扩容通过监控用量带来增收，而无需更深的写权限集成。
    y3RevenueK: 3720.0
    y3EbitdaK: -31.5
    cashLowPointK: 1280.0
    keyAssumptionChanges:
    - 销售周期基本维持在 6 个月
    - 试点转生产转化率保持在 60%
    - 随着监控规模放大，毛利率达到 70% 目标
  upside:
    description: 发布使能的紧迫性被迅速验证，3 个早期试点更快转正，监控用量把混合 ACV 推向既定定价区间高位。
    y3RevenueK: 4580.0
    y3EbitdaK: 430.0
    cashLowPointK: 1500.0
    keyAssumptionChanges:
    - 销售周期从 6 个月压缩到 4-5 个月
    - 试点转生产转化率从 60% 提升到 75%
    - 在更强的用量扩张下，混合 ARPU 从 $500K 提升到约 $560K
sensitivity:
- variable: 混合 ARPU
  downsideCase: $425K 的年化混合 ARPU
  baseCase: $500K 的年化混合 ARPU
  upsideCase: $575K 的年化混合 ARPU
  y3RevenueImpactK: -560.0
  cashImpactK: -392.0
- variable: CAC
  downsideCase: 企业资格筛选变慢，CAC 升至 $220K
  baseCase: CAC 为 $180K
  upsideCase: 伙伴带来的线索更多，CAC 降至 $150K
  y3RevenueImpactK: 0.0
  cashImpactK: -200.0
- variable: 流失率
  downsideCase: 月度 logo 流失率 3.0%，续约更弱
  baseCase: 月度流失率 2.0%
  upsideCase: 月度流失率 1.0%，多意图留存更黏
  y3RevenueImpactK: -280.0
  cashImpactK: -196.0
- variable: 销售周期
  downsideCase: 因预算归口不清，销售周期拉长到 9 个月
  baseCase: 6 个月
  upsideCase: 发布使能信息点讲透后，压缩到 4-5 个月
  y3RevenueImpactK: -650.0
  cashImpactK: -455.0
- variable: 毛利率
  downsideCase: 实施和支持更重，毛利率降到 65%
  baseCase: 70%
  upsideCase: 能复用策略模板降低服务成本后，毛利率升到 73%
  y3RevenueImpactK: 0.0
  cashImpactK: -186.0
- variable: 招聘节奏
  downsideCase: 两个扩编岗位提前两个季度入职
  baseCase: 保持精简招聘，并与客户里程碑绑定
  upsideCase: 一个非面向客户岗位延后到第 6 个客户之后再招
  y3RevenueImpactK: -100.0
  cashImpactK: -320.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |-
    flowchart LR
      QualifiedPipeline --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> SubscriptionRevenue
      ProductionCustomers --> UsageRevenue
      SubscriptionRevenue --> GrossProfit
      UsageRevenue --> GrossProfit
      GrossProfit --> Cash
      Opex --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基础情形收入由一条很窄的客户爬坡驱动——第 1 年末 3 家付费计划客户，到第 3 年增至 8 家，同时监控用量把混合 ARPU 推向约 $500K。
- checkName: 必须做对的事
  finding: 模型成立的前提是，把“发布使能”信息点讲透，让试点转生产转化率接近商业计划中的 60%，且不需要增加大量写权限实施工作。
- checkName: 模型失效条件
  finding: 如果预算归口始终不清、销售周期从 6 个月拖到 9 个月，现金风险会明显上升，因为 downside 情形下最低现金只剩约 $180K。
- checkName: 下一轮融资证明点
  finding: 当公司赢下 5 家 payer 客户、做出 2-3 个生产部署，并有一个量化案例证明审批更快或安全解决率更高时，下一轮融资逻辑才算站稳。
sanityChecks:
  ruleOf40: Y3 growth 116.3% + EBITDA margin -0.8% = 115.5%
  burnMultiple: Y2 burn multiple 约 ~0.6x（约 $751K EBITDA burn，对应 $1.26M 净新增收入）；Y3 已接近盈亏平衡。
  revenuePerFte: "$310K Y3，按平均 12.0 FTE 计算（benchmark $200–400K SaaS）"
  flags:
  - 第 3 年收入仍集中在仅 8 家 payer logo 上，因此只要有一个生产转正延期，计划就会被明显影响。
  - 模型假设只读集成足以证明早期价值；如果买方要求更深写权限，毛利率和实施周期都会恶化。
  - 成单后的 CAC 回本表现不错，但现金时点仍取决于一个很薄的企业销售漏斗，以及尚未解决的首笔预算归口问题。
  - 基础情形没有计入相邻垂直行业扩张，因此超越 payer 切口的风险投资级上行仍未被证明。
