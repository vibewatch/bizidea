slug: member-agent-compliance-layer
date: '2026-05-05'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-05] 计划日期后的第一个完整运营月份。'
- id: A2
  name: 付费试点合同金额
  value: '200'
  unit: USDK per pilot
  source: '[BP gtm.pricing] $150k-$250k 试点区间的中点。'
- id: A3
  name: 生产环境基础订阅 ACV
  value: '450'
  unit: USDK per customer-year
  source: '[BP market.som] 第 3 年 SOM 假设约 8 家计划客户，每家约 $450k ACV。'
- id: A4
  name: 含监控用量的稳态混合 ARPU
  value: '500'
  unit: USDK per customer-year
  source: '[BP businessModel.revenueStreams + expansionLevers] 生产订阅加上按受监控互动计费，使稳态混合 ARPU 高于 $450k 的落地价格。'
- id: A5
  name: 试点转生产转化率
  value: '60'
  unit: percent
  source: '[BP gtm.funnelTargets] 付费试点→生产环境 60%+ 的基础情形。'
- id: A6
  name: 收入确认方法
  value: 按合同期限直线确认
  unit: policy
  source: 启动期 SaaS 常用口径；这样可按月和按季度建模试点与生产合同收入。
- id: A7
  name: 客户爬坡
  value: 第 1 年末 3 个 logo，第 2 年末 5 个，第 3 年末 8 个
  unit: customers
  source: '[BP milestones + BP market.som] 首年赢下 2-3 个付费试点，12-24 个月做到 5-8 家 payer 客户，第 3 年 SOM 为 8 家灯塔计划。'
- id: A8
  name: 毛利率目标
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 稳态目标毛利率。'
- id: A9
  name: COGS 构成
  value: '30'
  unit: percent of revenue
  source: '[BP operations] 经验假设：托管、模型/推理、客户支持与实施变量成本约占收入 30%，与 70% 毛利率目标相匹配。'
- id: A10
  name: 月度 logo 流失率
  value: '2.0'
  unit: percent
  source: 受监管 SaaS 早期经验值：发布后 logo 流失较低，但在产品完全成熟前仍有一定续约风险。
- id: A11
  name: 混合 CAC
  value: '180'
  unit: USDK per new customer
  source: 以创始人主导的企业销售、6 个月销售周期和精简 GTM 团队为锚点的启动期财务经验值。
- id: A12
  name: 平均销售周期
  value: '6'
  unit: months
  source: '[BP investorMemo.riskHeatmap + research.validationPlan] payer 采购与合规审查使得低于一个季度的成单不现实；基础情形按合格机会到签约约 6 个月估算。'
- id: A13
  name: 种子前轮起始现金
  value: '3000'
  unit: USDK
  source: '[BP fundingAsk] 以所述 $2M-$4M 融资目标区间中点建模。'
- id: A14
  name: 全负担薪酬口径
  value: '20'
  unit: percent benefits/payroll tax included
  source: 启动期财务经验值；所有年化薪酬都按 fully loaded 计算，而非只算基本工资。
- id: A15
  name: 初始团队与招聘时点
  value: 起步配置为创始工程师 + 产品/合规负责人；第 1 个月补应用 AI 工程师；第 6 个月补解决方案工程师和企业销售；第 9 个月补客户成功；第 2 年再扩 4 人，第 3 年再扩 3 人
  unit: headcount plan
  source: '[BP team] 加上精简扩编经验值：为了到第 3 年支撑 8 家客户，需要在不过度招聘的前提下补足必要岗位。'
- id: A16
  name: 非薪酬运营支出
  value: 第 1 年前期约 ~$22k/月，到 Q4Y3 抬升至约 ~$66k/月
  unit: USDK per month
  source: '[BP operations + fundingAsk.useOfFundsSummary] 针对 BAA 就绪基础设施、安全/合规、差旅、软件与法务开销的经验估算。'
- id: A17
  name: 现金转换
  value: EBITDA 近似等于经营现金流
  unit: policy
  source: 启动期财务经验值：此阶段不显著建模债务、资本开支或营运资本波动。
- id: A18
  name: 融资里程碑
  value: 赢下 5 家 payer 客户，完成 2-3 个生产部署，并验证可复制的扩张动作
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary] 用于确定本轮融资规模，并额外预留 6 个月缓冲。'
