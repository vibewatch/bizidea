slug: member-agent-compliance-layer
date: '2026-05-05'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-05] 计划日期后的首个完整运营月份。'
- id: A2
  name: 付费试点合同金额
  value: '200'
  unit: USDK per pilot
  source: '[BP gtm.pricing] $150k-$250k 试点区间的中点。'
- id: A3
  name: 基础生产订阅 ACV
  value: '450'
  unit: USDK per customer-year
  source: '[BP market.som] 第 3 年 SOM 假设约 8 个计划客户、每家约 $450k ACV。'
- id: A4
  name: 包含监控使用量的稳态混合 ARPU
  value: '500'
  unit: USDK per customer-year
  source: '[BP businessModel.revenueStreams + expansionLevers] 生产订阅加上受监控互动费用，使稳态混合 ARPU 高于 $450k 的初始落地价格。'
- id: A5
  name: 试点转生产转化率
  value: '60'
  unit: percent
  source: '[BP gtm.funnelTargets] 付费试点→生产 60%+ 的基准情形。'
- id: A6
  name: 收入确认方法
  value: 在合同期内按直线法确认
  unit: policy
  source: 创业 SaaS 经验法则；用于按月和按季度建模试点与生产收入。
- id: A7
  name: 客户爬坡路径
  value: Y1 期末 3 个客户，Y2 期末 5 个，Y3 期末 8 个
  unit: customers
  source: '[BP milestones + BP market.som] 前 12 个月拿下 2-3 个付费试点，12-24 个月达到 5-8 个支付方客户，第 3 年 SOM 为 8 个灯塔计划。'
- id: A8
  name: 毛利率目标
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 稳态目标毛利率。'
- id: A9
  name: COGS 构成
  value: '30'
  unit: percent of revenue
  source: '[BP operations] 经验假设：托管、模型/推理、客户支持和实施可变成本约占收入 30%，以匹配 70% 的目标毛利率。'
- id: A10
  name: 月度客户流失率
  value: '2.0'
  unit: percent
  source: 面向早期受监管 SaaS 的企业创业经验法则：采用后客户流失较低，但在产品完全成熟前仍存在不可忽视的续约风险。
- id: A11
  name: 混合 CAC
  value: '180'
  unit: USDK per new customer
  source: 创业财务经验法则，基于创始人主导的企业销售、6 个月销售周期，以及受监管支付方软件中精简的 GTM 配置。
- id: A12
  name: 平均销售周期
  value: '6'
  unit: months
  source: '[BP investorMemo.riskHeatmap + research.validationPlan] 支付方采购和合规审查使得一个季度内成交的概率较低；基准情形假设从合格商机到签约约需 6 个月。'
- id: A13
  name: pre-seed 轮起始现金
  value: '3000'
  unit: USDK
  source: '[BP fundingAsk] 按所述 $2M-$4M 目标融资区间中点建模。'
- id: A14
  name: 全成本薪酬口径
  value: '20'
  unit: percent benefits/payroll tax included
  source: 创业财务经验法则；所有年化薪酬数字均按全成本口径计算，而非仅基础工资。
- id: A15
  name: 初始团队与招聘节奏
  value: 起步阶段配置 Founding eng + Product/compliance；第 1 个月加入 Applied AI；第 6 个月加入 Solutions + Enterprise seller；第 9 个月加入 CS；Y2 增加 4 个规模化岗位；Y3 增加 3 个规模化岗位
  unit: headcount plan
  source: '[BP team] 加上精简创业团队的经验补充，以便在不过度招聘的情况下支撑到第 3 年服务 8 个客户。'
- id: A16
  name: 非薪酬运营支出
  value: Y1 早期约 ~$22k/月，至 Q4Y3 提升至约 ~$66k/月
  unit: USDK per month
  source: '[BP operations + fundingAsk.useOfFundsSummary] 关于 BAA 就绪基础设施、安全/合规、差旅、软件和法务管理费用的经验假设。'
- id: A17
  name: 现金转化
  value: EBITDA 近似等于经营现金流
  unit: policy
  source: 创业财务经验法则：现阶段未实质性建模债务、资本开支或营运资金波动。
- id: A18
  name: 融资里程碑
  value: 达到 5 个支付方客户，完成 2-3 个生产部署，并形成可复用的扩张动作
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary] 用于测算当前轮融资规模，并留出 6 个月缓冲。'
