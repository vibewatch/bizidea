problem: >-
  健康险计划想让 AI 代理吃下海量会员服务来电，但量最大的几类意图——理赔进度、福利咨询、补发 ID 卡和申诉受理——都卡在受监管工作流里，既有细碎的保单规则，也有实打实的审计风险。通用客服代理平台能回答、能分流，却还是回答不了合规团队最关心的问题：代理到底被允许说什么、碰了哪些系统、每一次线上互动有没有老老实实守住计划规则和 CMS 级文档要求。
targetUser:
  primary: 正在部署 AI 语音或聊天代理的区域性 Blue 计划或 Medicare Advantage 保险公司会员服务副总裁
  secondary: 同一家健康险计划中的联络中心合规负责人或数字化服务运营总监
  buyer: 健康险计划的客户运营高级副总裁或首席体验官
startupThesis:
  nonObviousInsight: 企业客户 AI 里下一个真正值钱的层，不是再造一个对话代理，而是审批、监控和审计系统——只有它，才能让受监管企业放心把数十亿次互动从人工迁到 AI。
  beachhead: 自动化理赔进度、福利咨询与申诉受理互动的 Medicare Advantage 与 Blues 会员服务团队
  wedge: 在健康险计划 AI 服务代理被允许处理受监管会员意图之前，先提供被保单规则锁定的仿真、审批与实时监控
  whyNowCatalyst: Sierra 在 Fortune 50 的牵引、迅速增长的 ARR 和被点名的健康险客户都说明，部署浪潮已起来了；治理和可审计性不再是以后再说的问题，而是眼下的发布瓶颈。
  ventureScalePath: 先从健康险计划会员服务切入，再把同一控制层扩展到伤残险、寿险、房贷服务，以及任何需要可审计 AI 客户运营的受监管企业。
solution: >-
  产品部署在 Sierra 或其他代理平台旁边，把保单文件、已批准话术、福利规则和升级流程编成一张可执行的 AI 服务代理控制图谱。发布前，它会围绕理赔进度、申诉受理等目标意图跑大规模仿真，并给每个回答打分，识别保单偏移、禁止性承诺、遗漏披露和错误工作流执行。进入生产后，系统会盯住实时对话，拦截越界动作，触发人工接管，并生成逐案例审计包，清楚标出引用规则、系统动作和交接路径。团队先从一小束会员服务意图切进去，等合规团队对能量化的解决率和错误率点头，再逐步扩面。
goToMarketSeed:
  firstCustomer: 拥有 500+ 会员服务坐席、且正在为理赔与福利咨询部署 AI 代理的区域性 Blue 计划或 Medicare Advantage 保险公司
  buyingTrigger: 已获批准的试点，或董事会支持的会员服务 AI 语音/聊天代理部署计划
  currentAlternative: 叠在横向 AI 代理平台之上的人工 QA 和内部提示词测试
  switchingReason: 这个切口能缩短合规签字周期、在发布前抓出保单失误，还能给运营负责人一条通用 bot builder 和人工复核都给不了的审计轨迹。
  pricingHypothesis: 按已批准意图数量和受监控的 AI 互动量定价的年度平台费，每个计划以六位数美元的基础订阅起步
