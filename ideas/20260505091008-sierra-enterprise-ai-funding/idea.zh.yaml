jobsToBeDone:
- job: 当我们的计划正在上线 AI 会员服务代理时，帮助运营和合规团队只批准安全的理赔与福利工作流，从而在不增加监管暴露的前提下提升自动化水平。
  currentAlternative: 人工 QA、表格签批，以及有限的内部红队测试
  successMetric: 新 AI 意图的审批时间，以及线上违反政策互动的下降幅度
- job: 当一段实时 AI 对话偏离政策时，帮助主管在其造成会员伤害或审计问题前及时发现，从而在降低风险的同时维持自助闭环率。
  currentAlternative: 事后抽样 QA 和宽泛的人工升级规则
  successMetric: 政策违规拦截率，以及不必要人工转接的下降幅度
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Sierra 的融资、ARR 与《财富》50 强进展，有力证明企业 AI 客户运营已经具备预算并进入真实运行。
  painIntensity:
    score: 5
    rationale: 如果 AI 代理错误处理会员互动，健康险计划将面临真实的监管、声誉与运营下行风险。
  wedgeClarity:
    score: 5
    rationale: 围绕一小组会员服务意图的上线前模拟与实时合规监控，是一个具体明确的首个产品。
  defensibility:
    score: 4
    rationale: 计划专属策略图谱、审计历史与工作流集成会逐步累积，形成高黏性的流程与数据护城河。
  ventureScale:
    score: 4
    rationale: 初始健康险楔子可以扩展到其他面临同类 AI 治理瓶颈的受监管服务行业。
topRisks:
- name: 平台内化
  description: Sierra 或传统联络中心厂商可能自行构建原生测试与审计功能。
  mitigation: 跨多个代理平台集成，并在健康险政策逻辑、审批流程与面向监管的证据上做得比横向厂商更深。
- name: 企业销售周期缓慢
  description: 健康险计划可能要等到 AI 代理已广泛部署后才开始采购。
  mitigation: 切入已在进行的试点，以狭窄的上线前审批用例来解锁上线日期，而不是要求整体替换平台。
- name: ROI 证明不足
  description: 如果产品听起来只是合规保险，预算可能仍被锁在更大的 AI 项目中。
  mitigation: 把定价与案例研究绑定到可量化的审批时间下降、获批意图更高的自助闭环率，以及更少的升级或审计异常。
