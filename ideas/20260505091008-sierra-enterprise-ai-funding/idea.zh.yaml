    sourceRefs: [1, 2]
differentiator: >-
  这不是一个替代型代理平台，而是一个控制平面，受监管的会员服务团队无论使用 Sierra、现有厂商还是内部自建，都能把它接上。它的防守性来自把每家计划自己的保单规则、升级逻辑和审计证据编码进一张可复用的策略图谱，并随着每个获批意图和每次异常复盘不断变强。一旦某家计划把审批工作流和面向监管者的报告层标准化在这套系统上，替换成本就会很高。
