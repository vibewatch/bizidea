jobsToBeDone:
  - job: 当我们的计划在推出 AI 会员服务代理时，帮助运营与合规团队只批准够安全的理赔和福利工作流，这样他们才能在不制造监管敞口的前提下提升自动化比例。
    currentAlternative: 人工 QA、表格签字流，以及有限的内部红队测试
    successMetric: 新 AI 意图的批准时间，以及线上违反保单规则互动的减少幅度
  - job: 当一场实时 AI 对话偏离保单规则时，帮助主管在它演成为会员伤害或审计问题前及时挡下，从而在降低风险的同时维持解决率。
    currentAlternative: 通话后抽样 QA，以及宽泛的人工升级规则
    successMetric: 保单违规拦截率，以及不必要人工转接的下降幅度
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Sierra 的融资、ARR 和 Fortune 50 牵引强有力地说明，企业级 AI 客户运营已拿到预算并进入实战。
  painIntensity:
    score: 5
    rationale: 如果 AI 代理处理会员互动失当，健康险计划会面对真实的监管、声誉与运营损失。
  wedgeClarity:
    score: 5
    rationale: 先做发布前仿真，再做实时合规监控，并聚焦一小组会员服务意图，这是一个很具体的首款产品。
  defensibility:
    score: 4
    rationale: 计划级策略图谱、审计历史与工作流集成，能够逐步累积成粘性很强的数据与流程护城河。
  ventureScale:
    score: 4
    rationale: 初始的健康险计划切口可以扩展到其他受监管服务行业，这些行业都会遇到同样的 AI 治理瓶颈。
topRisks:
  - name: 平台吸收
    description: Sierra 或既有联络中心厂商可能会把原生测试和审计能力直接做进产品里。
    mitigation: 跨多个代理平台集成，并在健康险计划策略逻辑、审批工作流和面向监管者的证据产出上，做到比横向厂商更深。
  - name: 企业销售偏慢
    description: 健康险计划可能要等到 AI 代理已大范围部署后才愿意采购。
    mitigation: 瞄准正在进行的试点，先卖一个能解锁发布日期的窄场景发布前审批用例，而不是要求整体平台替换。
  - name: ROI 证明不足
    description: 如果产品听起来只是“合规保险”，预算可能仍然被困在更大的 AI 项目里。
    mitigation: 把定价和案例研究绑定到能量化的审批时间缩短、已批准意图的更高解决率，以及更少的升级或审计异常上。
