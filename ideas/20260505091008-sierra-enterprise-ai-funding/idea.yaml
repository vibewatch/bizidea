jobsToBeDone:
  - job: When our plan is rolling out AI member-service agents, help our operations and compliance teams approve only safe claims-and-benefits workflows, so they can increase automation without creating regulatory exposure.
    currentAlternative: Manual QA, spreadsheet sign-offs, and limited internal red-teaming
    successMetric: Time to approve a new AI intent and reduction in policy-violating live interactions
  - job: When a live AI conversation goes off policy, help supervisors catch it before it becomes a member harm or audit finding, so they can preserve containment while reducing risk.
    currentAlternative: Post-call QA sampling and broad human escalation rules
    successMetric: Policy-violation interception rate and reduction in unnecessary human transfers
