topRisks:
  - name: Platform absorption
    description: Sierra or incumbent contact-center vendors could build native testing and audit features.
    mitigation: Integrate across multiple agent platforms and go deeper on health-plan policy logic, approval workflows, and regulator-ready evidence than horizontal vendors can justify.
  - name: Slow enterprise sales
    description: Health plans may delay purchases until AI agents are already broadly deployed.
    mitigation: Sell into active pilots with a narrow pre-production approval use case that unlocks launch dates rather than requiring full platform replacement.
  - name: Weak ROI proof
    description: If the product only sounds like compliance insurance, budgets may stay trapped inside larger AI programs.
    mitigation: Tie pricing and case studies to measurable approval-time reduction, higher containment on approved intents, and fewer escalations or audit exceptions.
