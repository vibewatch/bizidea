differentiator: >-
  This is not a replacement agent platform; it is the control plane that regulated member-service teams can use with Sierra, incumbents, or internal builds. Its defensibility comes from encoding plan-specific policies, escalation rules, and audit evidence into a reusable policy graph that improves with every approved intent and every exception review. That makes it painful to rip out once a plan has standardized on the approval workflow and regulator-ready reporting layer.
