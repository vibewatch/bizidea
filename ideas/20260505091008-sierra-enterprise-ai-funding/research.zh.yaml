  fiveForces:
    supplierPower:
      score: 3
      rationale: 公司会依赖云、模型和平台生态，但买方真正关心的是控制结果，而不是底层到底接了哪一个基础模型。
      sourceRefs:
      - 25
      - 27
      - 31
    buyerPower:
      score: 4
      rationale: 滩头买方数量集中、采购流程重，每家计划都可能要求定制、安全审查，以及证明产品确实能显著缩短上线时间。
      sourceRefs:
      - 5
      - 9
    threatOfEntrants:
      score: 3
      rationale: 软件进入门槛不算极高，但 payer 专属策略逻辑、集成和累积下来的失败/证据数据，会让一个认真做的产品比薄仪表盘更难被复制。
      sourceRefs:
      - 10
      - 8
    threatOfSubstitutes:
      score: 4
      rationale: 人工 QA、现有 QA 套件、横向代理平台和内部控制流程都可能是替代方案，尤其当买方把产品看成附加项而不是上线闸门时。
      sourceRefs:
      - 37
      - 18
      - 35
    competitiveRivalry:
      score: 4
      rationale: 底层 AI 客服赛道已经拥挤且资金充足，因此创业公司必须把自己明确定位成控制平面，否则会迅速与更大的套件发生功能重叠。
      sourceRefs:
      - 1
      - 2
  pestle:
  - factor: 政治
    impact: neutral
    point: 政府对医疗 AI 的审视会让买方更谨慎，但也会同步提升对可审计控制能力的需求。
    sourceRefs:
    - 10
    - 7
  - factor: 经济
    impact: positive
    point: 联络中心负责人依然承受成本压力，因此只要能带来可量化的解决率或处理时长改进，自动化预算就更容易被批下来。
    sourceRefs:
    - 24
    - 26
  - factor: 社会
    impact: positive
    point: 会员越来越期待更快的自助服务，但一旦健康险计划给出错误或不合规的回答，信任也会迅速坍塌。
    sourceRefs:
    - 33
    - 6
  - factor: 技术
    impact: positive
    point: 代理工具、评估和编排能力进展很快，让现在就部署成为现实，也让需要治理的装机基数越滚越大。
    sourceRefs:
    - 30
    - 29
    - 23
  - factor: 法律
    impact: negative
    point: CMS 的时限、必备通知以及 PHI/BAA 约束都会抬高实施与采购负担。
    sourceRefs:
    - 8
    - 36
    - 25
  adoptionFrictionMatrix:
  - friction: PHI、BAA 与安全审查
    severity: high
    affectedBuyer: CISO / 合规 / 采购
    mitigation: 从 HIPAA-ready 云栈起步，签署 BAA，让被监控动作尽量确定、可回放、全量留痕。
    sourceRefs:
    - 25
    - 27
    - 36
  - friction: 不同计划与产品线之间的策略差异
    severity: high
    affectedBuyer: 会员服务合规负责人
    mitigation: 先从一小组意图切入，把计划专属规则编码进去，而不是依赖通用提示词。
    sourceRefs:
    - 8
    - 40
  - friction: 接入 CRM、理赔和管理系统
    severity: medium
    affectedBuyer: IT 与运营
    mitigation: 与现有服务技术栈厂商合作，并让 v1 尽量聚焦于只读工作流。
    sourceRefs:
    - 38
    - 39
  - friction: 买方可能觉得产品与现有 QA 工具重叠
    severity: medium
    affectedBuyer: 运营负责人
    mitigation: 定位必须围绕上线前审批和面向监管的证据包，而不是通用的通话后分析。
    sourceRefs:
    - 18
    - 20
  - friction: 生产前需要可信评估
    severity: high
    affectedBuyer: AI 项目负责人
    mitigation: 先用仿真套件、策略遵循打分和与受监管意图绑定的失败模式库打开局面。
    sourceRefs:
    - 30
    - 29
