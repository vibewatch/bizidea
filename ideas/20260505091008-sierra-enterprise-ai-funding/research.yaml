  adoptionFrictionMatrix:
  - friction: PHI, BAA, and security review
    severity: high
    affectedBuyer: CISO / compliance / procurement
    mitigation: Start on HIPAA-ready cloud stack, sign BAAs, and keep monitored actions deterministic and logged.
