slug: member-agent-compliance-layer
date: '2026-05-05'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-05] first full operating month after plan date.'
- id: A2
  name: Paid pilot contract value
  value: '200'
  unit: USDK per pilot
  source: '[BP gtm.pricing] midpoint of $150k-$250k pilot range.'
- id: A3
  name: Base production subscription ACV
  value: '450'
  unit: USDK per customer-year
  source: '[BP market.som] year-3 SOM assumes ~8 plans at ~$450k ACV.'
- id: A4
  name: Steady-state blended ARPU including monitoring usage
  value: '500'
  unit: USDK per customer-year
  source: '[BP businessModel.revenueStreams + expansionLevers] production subscription plus monitored-interaction fees lift blended steady-state ARPU above the $450k land price.'
- id: A5
  name: Pilot to production conversion
  value: '60'
  unit: percent
  source: "[BP gtm.funnelTargets] paid pilot\u2192production 60%+ base case."
- id: A6
  name: Revenue recognition method
  value: Straight-line over contract term
  unit: policy
  source: Startup SaaS heuristic; used so pilot and production revenue can be modeled monthly and quarterly.
- id: A7
  name: Customer ramp
  value: 3 logos by Y1 exit, 5 by Y2 exit, 8 by Y3 exit
  unit: customers
  source: '[BP milestones + BP market.som] 2-3 paid pilots in first 12 months, 5-8 payer customers in 12-24 months, 8 lighthouse plans in year 3 SOM.'
- id: A8
  name: Gross margin target
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] steady-state target gross margin.'
- id: A9
  name: COGS composition
  value: '30'
  unit: percent of revenue
  source: '[BP operations] heuristic that hosting, model/inference, customer support, and implementation variable cost consume ~30% of revenue to match the 70% target gross margin.'
- id: A10
  name: Monthly logo churn
  value: '2.0'
  unit: percent
  source: 'Enterprise startup heuristic for early regulated SaaS: low logo churn after adoption but non-trivial renewal risk before full product maturity.'
- id: A11
  name: Blended CAC
  value: '180'
  unit: USDK per new customer
  source: Startup-finance heuristic anchored to founder-led enterprise sales, 6-month cycles, and lean GTM staffing in regulated payer software.
- id: A12
  name: Average sales cycle
  value: '6'
  unit: months
  source: '[BP investorMemo.riskHeatmap + research.validationPlan] payer procurement and compliance review make sub-quarter closes unlikely; base case assumes ~6 months from qualified opportunity to close.'
- id: A13
  name: Opening cash from pre-seed round
  value: '3000'
  unit: USDK
  source: '[BP fundingAsk] modeled at the midpoint of the stated $2M-$4M target funding range.'
- id: A14
  name: Loaded payroll basis
  value: '20'
  unit: percent benefits/payroll tax included
  source: Startup-finance heuristic; all annualized payroll figures are fully loaded, not base salary only.
- id: A15
  name: Initial team and hire timing
  value: Founding eng + product/compliance at start; applied AI in month 1; solutions + enterprise seller in month 6; CS in month 9; four scale hires in Y2; three scale hires in Y3
  unit: headcount plan
  source: '[BP team] plus lean startup heuristic additions needed to support 8 customers by Y3 without over-hiring.'
- id: A16
  name: Non-payroll operating spend
  value: ~$22k/month in early Y1 rising to ~$66k/month by Q4Y3
  unit: USDK per month
  source: '[BP operations + fundingAsk.useOfFundsSummary] heuristic for BAA-ready infrastructure, security/compliance, travel, software, and legal overhead.'
- id: A17
  name: Cash conversion
  value: EBITDA approximates operating cash flow
  unit: policy
  source: 'Startup-finance heuristic: no debt, capex, or working-capital swings are modeled materially at this stage.'
- id: A18
  name: Funding milestone
  value: Reach 5 payer customers with 2-3 production deployments and repeatable expansion motion
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary] used to size the current round plus 6 months of buffer.'
