modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      QualifiedPipeline --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> SubscriptionRevenue
      ProductionCustomers --> UsageRevenue
      SubscriptionRevenue --> GrossProfit
      UsageRevenue --> GrossProfit
      GrossProfit --> Cash
      Opex --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by a narrow logo ramp from 3 paying plans at Y1 exit to 8 by Y3, with monitoring usage lifting blended ARPU toward $500K.
- checkName: Must go right
  finding: The model needs launch-enablement messaging to keep pilot-to-production conversion near the business-plan target of 60% without adding heavy write-access implementation work.
- checkName: Model breaks if
  finding: Cash risk appears if budget ownership stays ambiguous and sales cycles move from 6 to 9 months, because downside cash falls toward roughly $180K.
- checkName: Next-round proof
  finding: The next financing is justified once the company has 5 payer customers, 2-3 production deployments, and a quantified case study showing faster approval or safer containment.
sanityChecks:
  ruleOf40: Y3 growth 116.3% + EBITDA margin -0.8% = 115.5%
  burnMultiple: Y2 burn multiple ~0.6x (about $751K EBITDA burn on $1.26M net new revenue); Y3 is near breakeven.
  revenuePerFte: "$310K Y3 on average 12.0 FTE (benchmark $200\u2013400K SaaS)"
  flags:
  - Y3 revenue is still concentrated in only 8 payer logos, so one slipped production conversion would move the plan materially.
  - The model assumes read-only integrations are sufficient for early proof; if buyers demand deeper write access, gross margin and implementation timing worsen.
  - CAC payback is attractive after close, but cash timing still depends on a thin enterprise funnel and unresolved first-budget ownership.
  - Adjacent vertical expansion is not included in the base case, so venture-scale upside beyond the payer wedge remains unproven.
