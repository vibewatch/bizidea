scenarios:
  downside:
    description: Enterprise sales cycles stretch by one quarter, pilot-to-production conversion drops to 40%, and gross margin lands at 65% because implementations stay services-heavy.
    y3RevenueK: 2620.0
    y3EbitdaK: -690.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - Sales cycle extends from 6 to 9 months
    - Pilot-to-production conversion falls from 60% to 40%
    - Gross margin falls from 70% to 65%
  base:
    description: Two to three pilots land in year 1, conversion tracks the business-plan funnel, and payer expansions add monitoring revenue without requiring deep write access.
    y3RevenueK: 3720.0
    y3EbitdaK: -31.5
    cashLowPointK: 1280.0
    keyAssumptionChanges:
    - Sales cycle holds near 6 months
    - Pilot-to-production conversion stays at 60%
    - Gross margin reaches the 70% target as monitoring scales
  upside:
    description: Launch-enablement proves urgent, three early pilots convert quickly, and monitoring usage lifts blended ACV toward the high end of the stated pricing range.
    y3RevenueK: 4580.0
    y3EbitdaK: 430.0
    cashLowPointK: 1500.0
    keyAssumptionChanges:
    - Sales cycle compresses from 6 to 4-5 months
    - Pilot-to-production conversion rises from 60% to 75%
    - Blended ARPU rises from $500K to ~$560K on stronger usage expansion
