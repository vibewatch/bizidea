slug: glove-trained-cell-compiler
date: '2026-06-30'
executiveSummary: 手套示教工位编译器卖的是一层面向调试投运和验证的软件，客户是北美中型电子制造商——他们正为连接器插装、线缆理线和小型治具上料上线第一批灵巧机器人单元。首位客户画像是年收入 $200M-$1B、拥有 2-8 家工厂和 5-20 名自动化工程师的 EMS；它手上要么有一个 NPI（新品导入），要么有一个劳动力驱动的自动化项目，必须让一条多品种装配工位上线，且不想再多耗一个月给集成商反复调参。产品故意做窄：用手套采一位专家操作员的动作，把它编译成一套支持的灵巧手 + 协作机器人组合的任务原子步骤，并交付一套可审计的验证模板，覆盖力控、良率、恢复、IPC 工艺和 ESD 控制。这个滩头市场吸引人的地方在于，工厂本来就有预算、有硬截止期，而且只要连接器或线缆工位继续靠人工，代价可以被直接量化。研究支持一个约 $45.0M 的滩头 SAM 和第 3 年 $4.5M 的 SOM；GTM 走直销 + 渠道混合，先卖付费投运试点，再转成按在线工位计费的订阅。输入资料里没有公开的“中立编译层”定价基准，所以这里的价格是明确的运营假设——锚在单个在线工位价值和省下的集成工时上。最能推翻这套逻辑的风险，是第一代灵巧手能否在真实电子产线上扛住量产可用率和变型重调，而不是把每个部署都拖回定制服务。风投逻辑成立的前提，是先把电子装配这个切口打透，再把研究里只能定性、不能直接量化的相邻精密装配流程吃下来。在付费试点转成量产、并能在第二类工位复用之前，这更像一个值得持续观察的早期机会，而不是高确信度的种子轮下注。
problem:
- 多品种电子工厂至今还把连接器插装、线缆理线和小型治具上料留给操作员，因为标准夹爪扛不住变型，集成商调参又始终很慢。
- 灵巧手一旦变成可买的现货，瓶颈就会从硬件供应转到另一头：怎么把一位操作员的手工经验，变成一套能扛住 SKU 变化、又能过 QA 放行的可重复工位。
- 安全、工艺、ESD 和力控要求叠在一起，让通用机器人示教工具根本不够用，撑不起灵巧工位的量产放行。
solution:
- 用带传感器的手套采集专家示教，再把动作编译成抓取、插装、恢复和检测等原子步骤，映射到一套支持的灵巧手和协作机器人组合上。
- 交付可审计的验证模板，覆盖力控包络、节拍、恢复行为、IPC 工艺和 ESD 安全操作流程，让制造工程团队能先放行一类工位。
- 把漏抓、卡滞、重新抓取和变型变化都记成再训练事件，持续打磨任务包，也缩短相邻 SKU 的再验证时间。
whyWeWin:
- 公司卡在灵巧手 OEM、横向机器人软件和工厂 QA 之间那层中立位置上——而电子装配特有的验证逻辑，今天还没有谁真正吃透。
- 这个切口卖的是一场难以回避的上线事件，ROI 体现在省下几周排期、避免人工回退和加快换型，不是讲一个遥远的自治故事。
- 每次部署都会沉淀一批专有数据，把操作员示教、力窗口、失效模式和放行决策串到反复出现的连接器与线缆流程里。
strategicChoices:
  beachhead: 在北美多品种总装线为连接器插装、线缆理线或小型治具上料上线首个灵巧协作机器人单元的电子代工厂。
  wedgeRationale: 这个入口比做一个宽泛的机器人编程平台更容易更快证明价值，因为买家本来就有上线硬截止期、能量化的人工备援成本，而且一开始只要验证一类工位和一种硬件组合。
  sequencingRationale: 先在一类工位和一套支持的灵巧手/协作机器人组合上做透一个任务家族，因为真正卡住的是验证负担、ESD 规则和力控调参；在 ROI 还没变成标杆案例前，先直销打进 NPI 和自动化项目；只有拿到 2 个量产胜利后，才加 OEM 和集成商渠道；在进军医疗科技或更广义的灵巧编程之前，先认证第二套硬件组合，让招聘和产品工作都服务于可复制性，而不是把公司拖进定制服务。
  notYet:
  - 全栈机器人控制、远程操作或人形机器人硬件
  - 面向任意灵巧任务的宽泛横向机器人编程
  - 在还没有电子装配标杆客户前就去做医疗科技、实验室自动化和汽车精密装配
  - 24/7 绿地高吞吐产线——目前灵巧手的在线可用率要求大概率还超出供应商成熟度
market:
  tam: 基于约 300 家北美多品种电子或相邻精密装配工厂、每个在线工位约 $125k 混合年价值，估算得出 $150.0M 的滩头 TAM。
  sam: 基于约 120 家符合首位客户画像的工厂、每家约 3 类可寻址工位，估算得出 $45.0M 的滩头 SAM。
  som: 基于第 3 年 12 家客户、每家 3 个在线工位、每个在线工位约 $125k 混合年价值，估算得出 $4.5M 的 SOM。
  segments:
  - 在多品种总装线部署首代灵巧机器人单元的北美中型电子代工厂
  - 服务电子及相邻精密装配项目的机器人系统集成商
  buyingProcess: 日常推动者是制造自动化工程师或集成商应用工程师，但 QA 与 EHS 相关方也必须签字，因为工位放行取决于安全、工艺和 ESD 控制。最快的第一单，是围绕一次即将发生的 NPI 或 SKU 切换卖一个同类工位的付费试点，通常和 OEM 或集成商一起打包；等工位量产放行后，再转成按在线工位计费的订阅。
product:
  mvp: MVP 只覆盖一类工位、一只受支持的灵巧手、一套协作机器人组合，以及一个连接器插装或线缆理线任务包。它负责采集操作员示教、编译任务原子步骤，并交付可审计的验证与恢复流程，而不是承诺通用灵巧自治。
  sixMonth: 完成 2-3 个共创客户部署，覆盖手套采集、力控与良率验证、ESD 感知操作模板，以及一套灵巧手 + 协作机器人组合的人工复核工具。
  twelveMonth: 把早期试点转成量产工位，做出面向相邻 SKU 的变型重调能力，补上失败与再训练分析，并且只有在首个任务家族已经跑通可复制性时，才认证第二只灵巧手或第二套协作机器人组合。
  twentyFourMonth: 把经过验证的任务包库从连接器和线缆作业，扩到相邻的小型治具上料和线束预处理流程；只有当电子装配账户已经证明上线经济性可复制时，再进入一个相邻的精密装配垂直场景。
  keyBets:
  - 一类工位足够窄，能被标准化；同时又没有窄到让客户价值塌掉。
  - 只要产品锚在可审计的放行标准上，而不是泛 AI 叙事，买家就愿意为一层软件驱动的验证系统买单。
  - 同一任务包至少能在两套硬件组合间迁移，而且调参工作量要明显低于现有集成商流程。
  - 在线工位失败数据能足够快地缩短上线周期和再验证时间，在横向平台追上来之前先形成优势。
gtm:
  wedge: 围绕一次 NPI、产线迁移或 SKU 切换，卖一个 90-120 天的付费投运试点，用客户最好的操作员和一套支持的灵巧手 + 协作机器人组合，把一类工位跑到可放行。
  channels:
  - 由创始人主导，直销制造工程总监、自动化副总裁和目标 EMS 账户里的工厂自动化负责人
  - 与需要更快量产胜利的灵巧手供应商，以及协作机器人和力控伙伴联合销售
  - 和已经负责工位部署的区域机器人系统集成商做转介与交付合作
  funnelTargets: 线索→合格共创客户 15-25%，合格共创客户→付费试点 40-60%，付费试点→量产 50%+，量产账户→12 个月内扩到第二类工位或第二个单元 40%+
  pricing: 首类工位先收一次付费投运费，再按在线工位和已验证任务包收年费；这种定价更贴合买家的预算逻辑，因为价值体现在省下的上线周数、少掉的集成工时和更快的 SKU 再验证，而不是座席数。
businessModel:
  revenueStreams:
  - 围绕一类工位和一套支持硬件组合收取付费投运试点费
  - 按在线工位和已验证任务包收取软件年费
  - 在既有客户里扩到更多单元、相邻同类工位和第二套硬件认证时收扩展费用
  unitOfValue: 一类在线灵巧工位——在一套支持的灵巧手 + 协作机器人组合上跑一份已验证任务包
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一家 EMS 账户里加更多在线单元和相邻同类工位
  - 用同一任务包和验证逻辑认证更多灵巧手与协作机器人组合
  - 在基础任务库被证明后，把电子装配打法延伸到医疗科技、工业装配或实验室流程
strategyMap:
  northStarMetric: 在标准 SKU 上不再整站退回人工、且能达到良率与节拍目标的在线工位家族数量
  inputMetrics:
  - 从第一次操作员示教到工位获准上线的天数
  - 相比当前集成商主导流程，每次部署消耗的工程工时
  - 覆盖工位的首检良率和恢复率
  - 在同类工位内验证一个新 SKU 变型所需时间
  - 付费试点转量产率
  - 量产账户扩到第二个在线工位或第二个任务包的比例
  moatsToBuild:
  - 把操作员示教、力控包络、失败事件和连接器/线缆任务放行决策连在一起的数据语料
  - 面向多品种灵巧工位、可复用的 IPC 与 ESD 感知验证模板
  - 面向同类工位的受支持灵巧手与协作机器人的跨硬件适配层
  - 让公司成为灵巧手 OEM 和集成商之上默认的调试投运层的伙伴网络
  killCriteria:
  - 创始人聚焦销售 9 个月内签下的付费试点少于 2 个
  - 试点没法把从示教到合格工位的时间，相比现有集成商流程压缩至少 50%
  - 前 5 个试点里，转成量产在线工位的不到 2 个
  - 超过一半的试点机会都要求公司去做受支持同类工位之外的定制硬件或验证工作
  mermaid: |
    flowchart LR
      Wedge[Connector and cable cell wedge] --> MVP[Glove-to-cell MVP]
      MVP --> Proof[Qualified production cells]
      Proof --> Expansion[More cells, task packs, and adjacent precision assembly]
investorMemo:
  verdict:
    call: 观察
    conviction: 时机强、工作流清晰，但在证明硬件可靠性、预算归属和试点到量产的可复制转化之前，确信度仍只能算中等。
    whyBelieve: 现成灵巧手、手套采集和多品种电子装配痛点，如今第一次在一条狭窄但代价明确的工作流上汇合——上线拖延和人工回退都很贵。
    whyDoubt: 按当前证据看，滩头市场不算大；如果在线可用率、变型可移植性或渠道经济性不达预期，公司也很容易掉进服务陷阱。
    nextDiligence: 确认 2 个绑定真实 NPI 或换型事件的付费试点，并验证至少 1 个能在 14 天内上线量产工位，且标准 SKU 不再回退人工。
  firstCustomer:
    title: 北美中型电子代工厂的制造工程总监
    profile: 一家年收入 $200M-$1B、拥有 2-8 家工厂和 5-20 名自动化工程师的 EMS，正准备在多品种总装线上为连接器或线缆作业上线第一个灵巧工位。
    trigger: 一次新品导入或大规模 SKU 切换，会给首个灵巧工位压下一条硬截止上线时间，也把再来一轮集成商调参的代价暴露出来。
    buyer: 制造工程总监或自动化副总裁
    initialContract: $60k-$100k 的付费试点，覆盖一类工位；一旦工厂撤掉标准 SKU 的人工备援，并续成任务包订阅，首个在线工位第 1 年价值大约在 $125k-$175k。
  mustBeTrue:
  - 中型 EMS 买家愿意从 NPI 或自动化预算里，直接为更快的工位投运买单，而不是只把这件事算进集成商范围。
  - 一套支持的灵巧手与协作机器人组合，能在较低速的多品种电子工位上达到买家要求的可用率、良率和恢复阈值。
  - 编译器能把从示教到合格工位的时间，相比当前集成商流程压缩 50% 以上。
  - 任务包能吸收常见的连接器、线缆或治具变型，再验证工作量控制在一个班次以内。
  - 至少一半成功试点会扩到第二个单元、第二类工位或可续费订阅，而不是做成一次性服务单。
  diligenceQuestions:
  - 实际拍第一笔预算板的是谁：制造工程、自动化负责人，还是集成商？
  - 灵巧工位要达到什么在线可用率、首检良率和恢复指标，工厂才会撤掉人工备援？
  - 同类工位里一旦连接器或线缆变型，重调到底要花多少工时？
  - 哪些灵巧手与协作机器人组合，能同时满足力感知和 ESD 约束，又不把部署做成定制项目？
  - 为什么 OEM、Wandelbots、Intrinsic 或全栈具身 AI 厂商，不会在公司做出数据规模之前就把这层吃掉？
  - 北美 EMS 之外，市场到底能长到多大；哪些证据才足以支持向相邻精密装配扩张？
operatingAssumptions:
- assumption: 买家会直接从现有 NPI 或自动化预算里为更快上线和更快重调买单，而不是等一个更宽泛的机器人软件预算。
  basis: research.yaml
  validationTest: 至少拿下 3 个付费试点，而且预算都明确挂在具名的 NPI、产线迁移或降本项目上，而不是来自投机性的创新基金。
  decisionImpact: 如果这条不成立，GTM 就得转向 OEM 或集成商主导转售，直销逻辑会明显变弱。
- assumption: 第一套支持的灵巧手与协作机器人组合，能在首个滩头任务上达到可接受的可用率和恢复阈值。
  basis: research.yaml
  validationTest: 在 2 个试点工位上埋点，连续 30 天都达到事先约定的可用率、首检良率和人工干预指标，才算具备量产条件。
  decisionImpact: 如果不成立，就要把产品范围先缩回离线编程或更慢的概念验证场景，并推迟订阅定价。
- assumption: 首个任务家族能被产品化到足以避开重服务部署模型。
  basis: idea.yaml
  validationTest: 到第 4 个试点时，把从项目启动到合格工位的中位时间压在 14 天内，并限制每次部署的定制应用工程工时。
  decisionImpact: 如果不成立，毛利率和融资故事都会下台阶，公司要么继续缩范围，要么把服务正式做成业务线。
- assumption: 在拿到首批标杆部署后，产品有能力适配第二只灵巧手或第二套协作机器人组合。
  basis: operator judgment
  validationTest: 把一个已验证任务包重放到第二套受支持硬件组合上，量化调参工作量、残余误差和恢复表现，再和基线比较。
  decisionImpact: 如果不成立，公司就应更长时间维持单栈定位，把自己卖成一款强耦合应用产品，而不是中立编译层。
- assumption: 早期客户会在首个量产工位上线后续费并扩单。
  basis: research.yaml
  validationTest: 前 4 份量产提案里，至少有 2 份在上线 12 个月内扩到第二个单元或第二个任务包。
  decisionImpact: 如果不成立，就要改成围绕项目软件和部署费定价，并重新审视 ARR 驱动的风投逻辑。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 采访 15-20 位目标 EMS 账户里的制造工程总监、自动化负责人和集成商应用工程师。
  hypothesis: NPI 上线和 SKU 切换，比泛泛而谈的劳动力短缺，更能触发真实采购。
  successMetric: 至少 10 次访谈指出一个正在发生或即将发生的工位场景，足以让上线时点和人工备援成本支撑一单付费试点。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 用一套支持的灵巧手和协作机器人组合，在一条真实的连接器或线缆工位上做基准原型，并带上 ESD 安全操作流程。
  hypothesis: 一次操作员示教 + 一套验证模板，就能比现有手工编程更快地产出有决策价值的工位配方。
  successMetric: 从示教到草案配方不超过 5 天，且客户或伙伴认可结果足以进入试点范围界定。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 在真实同类工位上跑 2 个付费试点，并拿结果和现有集成商流程逐项对比。
  hypothesis: 这个切口能把日历时间和工程工时都压缩 50% 以上。
  successMetric: 2 个付费试点成功启动，且至少 1 个把从示教到合格工位的时间压缩 50% 以上。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 从 3 位 EMS 质量或自动化负责人那里收集正式上线标准，并把它们编码进产品模板。
  hypothesis: 可审计的 IPC、ESD 和恢复模板，比单纯示教 UI 更能建立买家信任。
  successMetric: 3 份已达成一致的验收清单被做成可复用验证模板，并用于真实试点。
  owner: 质量/验证负责人
- horizon: 180–365 天
  experiment: 借助 OEM 或集成商伙伴签下 1 个明确软件范围、定价和数据归属规则的试点。
  hypothesis: 渠道伙伴能放大管道，但不会把公司拖成一家白牌服务商。
  successMetric: 至少签下 1 个伙伴来源试点，折扣不超过直销价的 10%，且验证数据仍由公司作为主记录系统持有。
  owner: 合作伙伴负责人
- horizon: 180–365 天
  experiment: 通过 OEM 或集成商伙伴，把首个任务包迁移到第二套受支持硬件组合上。
  hypothesis: 中立的跨硬件适配是真实存在的，并能在不彻底重写的前提下带来渠道杠杆。
  successMetric: 1 次第二栈演示的良率和重调工作量，和基线试点相比误差控制在 20% 以内。
  owner: 机器人应用工程师
- horizon: 180–365 天
  experiment: 把第一个量产客户扩到第二个在线单元或第二类工位。
  hypothesis: 单一账户内的扩单，是经常性价值和护城河形成最干净的证明。
  successMetric: 在首份量产合同后的 12 个月内，至少拿下一笔增量 ARR 高于 30% 的扩单。
  owner: 创始人/CEO
operations:
- 建立受支持硬件的认证流程，覆盖灵巧手、协作机器人、视觉、力控和 ESD 安全手套配置。
- 形成工位导入手册，明确操作员采集、验证阈值、人工备援和放行签字责任人。
- 搭建失败复盘闭环，把卡滞、重新抓取和报废事件转成再训练工单和任务包版本更新。
- 制定伙伴交付边界，把可复用的软件范围和集成商的定制工作彻底分开。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 前两单都是强咨询式、又被死线卡住的交易，所以必须由创始人亲自负责 EMS 销售、共创客户招募和产品打包。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 先把编译器、数据模型和第一套受支持硬件集成做出来，才能跑基准试点。
- role: 机器人应用工程师
  startTiming: 第 3 个月
  rationale: 把试点经验沉淀成可复用部署手册，同时负责工位现场拉起，避免产品研发被现场服务拖住。
- role: 质量/验证负责人
  startTiming: 第 3-6 个月
  rationale: 把 IPC、线束工艺、安全和 ESD 放行标准编码成买家信得过的可审计模板。
- role: 合作伙伴负责人
  startTiming: 第 9 个月
  rationale: 等前两家量产标杆跑出来后，再把灵巧手 OEM 和集成商关系变成可放大的渠道。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2-3 个共创客户，并完成 15 次以上绑定真实 NPI 或换型项目的 ICP 访谈。
  - 启动 2 个付费试点，并至少把其中 1 个转成量产在线工位。
  - 在一类工位上把从示教到合格工位的时间压到 14 天以内，并比现有流程快 50% 以上。
  - 在第一套受支持硬件栈上交付面向连接器插装和线缆理线的可复用验证模板。
- horizon: 12–24 个月
  items:
  - 做到 4-6 家量产客户，并至少有 2 次第二单元或第二类工位扩单。
  - 认证第二只灵巧手或第二套协作机器人组合，同时把中位部署时间继续压在 14 天以内。
  - 把失败与再训练分析产品化，让常见 SKU 的变型再验证能在一个班次内完成。
  - 至少通过 OEM 或集成商伙伴签下 2 单渠道辅助成交，同时不把核心产品白牌化。
- horizon: 24–36 个月
  items:
  - 达到 10-12 家量产客户和约 30 个在线工位，与研究里的第 3 年 SOM 情景一致。
  - 把任务包库扩到相邻精密装配流程，同时继续把电子装配作为参考垂直场景。
  - 证明续费是由任务包更新和再验证工作流驱动，而不是一次性投运。
  - 基于扩单数据，决定下一条增长曲线是医疗科技精密装配、更广的工业线束作业，还是继续深挖电子装配。
risks:
- risk: 灵巧手的可用率或维护表现仍不足以长期支撑量产。
  likelihood: High
  impact: High
  mitigation: 先从低速、多品种工位下手，同时认证多家灵巧手供应商、加上健康监控，并在每个早期部署里保留人工备援。
- risk: 部署会演变成定制集成项目，软件毛利被吃掉。
  likelihood: Medium
  impact: High
  mitigation: 把产品范围锁在一类工位和几套受支持硬件组合内，超范围定制一律拒绝，并把部署时长设成止损指标。
- risk: 买家坚持只通过 OEM 或集成商采购，直接定价权被压缩。
  likelihood: Medium
  impact: Medium
  mitigation: 设计渠道交易时，确保公司仍是验证数据的主记录系统，并把软件价格和交付劳务明确拆开。
- risk: 安全、ESD 和工艺验证拉长销售周期，拖住量产放行。
  likelihood: High
  impact: Medium
  mitigation: 尽早把可审计的放行模板做出来，在试点界定阶段就拉上 QA 和 EHS，并围绕已获批的 NPI 截止期卖单。
- risk: 横向机器人平台或灵巧手 OEM 把任务采集做得足够好，价格被迅速商品化。
  likelihood: Medium
  impact: Medium
  mitigation: 把差异化牢牢钉在电子装配特有的力控包络、失败数据和放行逻辑上——这些都不是通用示教平台默认拥有的资产。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要覆盖 18 个月：做出 2-3 个付费试点、1-2 个量产转化、第一版经过验证的任务包库、一套受支持硬件栈外加第二栈验证，并配齐一支小团队，覆盖研发、应用、质量和创始人主导 GTM。
