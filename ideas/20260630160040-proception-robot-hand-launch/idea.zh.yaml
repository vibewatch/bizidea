problem: 电子代工厂至今还把连接器插装、线缆理线等精细手工作业留给人，因为标准夹爪一遇到产品变型就失灵，每个机器人试点最后都成了定制集成项目。一旦工厂买来第一只灵巧手，最难的就不再是找硬件，而是把最好的操作员动作变成一套可重复、能过质检、还能扛住 SKU 变化的工位。今天这往往意味着集成商要调几周、机器人机时稀缺，只要良率一掉就得退回人工工位。
targetUser:
  primary: 在中型电子代工厂负责首代灵巧机器人单元落地的制造自动化工程师，场景集中在多品种总装线。
  secondary: 服务电子和医疗科技装配项目的机器人系统集成商。
  buyer: 制造工程总监或自动化副总裁
startupThesis:
  nonObviousInsight: 真正的解锁点不是造出更好的人形机器人。只要供应商能把高灵巧度机器人手做成现货，又能在机器人还没上场前靠手套采集示教，灵巧自动化就不再是全栈机器人难题，而会变成工厂里的任务编译难题。
  beachhead: 先拿下北美电子代工厂在多品种总装线上上线首个灵巧协作机器人单元时最难啃的几道工序——连接器插装、线缆理线和小型治具上料。
  wedge: 把操作员的手套示教编译成同类工位可验证的灵巧机器人单元配方
  whyNowCatalyst: Proception 的首批出货、更大范围接单以及基于手套的数据采集表明，灵巧手硬件正变成可以买到的现货，也就立刻催生了把人工经验转成量产机器人任务的软件层需求。
  ventureScalePath: 先啃下一条最痛的装配流程，再把任务库和验证系统扩到医疗科技、工业装配、实验室自动化，以及所有用灵巧手替代人工微操作的多品种场景。
solution: 公司卖的是一套给多品种装配工位用的手套示教工位编译器。资深操作员戴着带传感器的手套做一遍工序，软件把动作拆成抓取、插装、恢复和检测等原子步骤，再映射到一套支持的灵巧手 + 协作机器人组合上。产品自带节拍、插入力包络和恢复行为的验证模板，让自动化团队先把一类工位放行，再往相邻 SKU 扩。上线之后，漏抓、卡滞和重新抓取都会被记成再训练事件，工厂不用自建机器人 ML 团队，也能跑起一套务实的持续改进闭环。时间一长，公司会沉淀出可复用的任务包，覆盖线束预处理、连接器就位、药瓶搬运和精细分拣配套等重复流程。
