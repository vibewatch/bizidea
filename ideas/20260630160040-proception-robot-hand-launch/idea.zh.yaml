topRisks:
- name: 硬件成熟度不够
  description: 第一代灵巧手可能还给不出工厂量产所需的在线可用率、力控能力或维护表现。
  mitigation: 先从低速、多品种工位切入，同时认证多家灵巧手供应商，并在每次部署里都带上健康监控和人工备援流程。
- name: 服务陷阱
  description: 每个工位都可能演变成一单定制机器人项目，把软件毛利拖垮，也拖慢可复制性。
  mitigation: 先死磕一类任务家族，把可复用任务包、验证模板和经常性软件收入打包出来，而不是接无限展开的定制集成活。
- name: OEM 渠道挤压
  description: 一旦灵巧部署被证明有价值，灵巧手厂商或机器人 OEM 可能会尝试把调试投运这一层自己吞掉。
  mitigation: 尽快把自己做成中立的跨硬件适配和 QA 层，优先和需要生态扩张的供应商合作，并深度接入硬件厂商拿不到的工厂系统。
