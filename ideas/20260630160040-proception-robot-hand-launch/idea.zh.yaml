jobsToBeDone:
- job: 当一条新的多品种装配工位要上自动化时，帮制造自动化工程师把专家操作员的手部动作转成能过质检的机器人程序，让他们不用写几个月定制代码也能把工位上线。
  currentAlternative: 叠在人工备援工位之上的系统集成商定制编程
  successMetric: 14 天内上线工位，首检良率达标，标准 SKU 不再整站退回人工
- job: 当连接器或线缆变型一改，帮自动化负责人快速把灵巧工位重调到位，让吞吐和良率守住，不必把整套集成重来。
  currentAlternative: 交给集成商重编程，再配合操作员侧的临时补丁
  successMetric: 新变型在一个班次内完成验证，节拍和报废率都压在线体目标内
