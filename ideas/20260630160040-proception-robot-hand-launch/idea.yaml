jobsToBeDone:
  - job: When a new high-mix assembly station needs automation, help a manufacturing automation engineer convert an expert operator's hand motions into a robot program that passes quality checks, so they can launch the cell without months of custom coding.
    currentAlternative: Systems-integrator custom programming layered onto manual backup stations
    successMetric: Cell launched in under 14 days with target first-pass yield and no full manual fallback on standard SKUs
  - job: When a connector or cable variant changes, help an automation lead retune the dexterous cell quickly, so they can keep throughput and yield without redoing the whole integration.
    currentAlternative: Reprogramming by an integrator plus operator-side workarounds
    successMetric: New variant qualified in less than one shift with cycle time and scrap inside line targets
