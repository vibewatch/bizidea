topRisks:
  - name: Hardware immaturity
    description: Early dexterous hands may not yet deliver the uptime, force control, or maintenance profile that factories need for always-on production cells.
    mitigation: Start with lower-speed high-mix stations, qualify multiple hand vendors, and include health monitoring plus manual fallback procedures in every deployment.
  - name: Services trap
    description: Every workstation could turn into a bespoke robotics project that overwhelms software margins and slows repeatability.
    mitigation: Focus on one task family first and package repeatable task packs, validation templates, and recurring software instead of open-ended custom integration work.
  - name: OEM channel squeeze
    description: Hand vendors or robot OEMs may try to absorb the commissioning layer once dexterous deployment proves valuable.
    mitigation: Become the neutral cross-hardware adaptation and QA layer, partner early with suppliers that need ecosystem adoption, and integrate into factory systems the hardware vendor does not own.
