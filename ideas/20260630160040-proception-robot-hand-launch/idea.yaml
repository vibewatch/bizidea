differentiator: >-
  Most robot software assumes the OEM owns the whole stack or forces factories
  to buy custom integration hours for every station. This company starts from
  a different market fact in the cluster: dexterous hands and glove data
  capture are becoming supplier components that many factories and integrators
  can access. By owning the task library, validation thresholds, and
  cross-hardware adaptation layer for a narrow set of fine-assembly jobs, the
  startup can sit above hand OEMs and below factory QA systems in a way
  hardware vendors are unlikely to prioritize.
