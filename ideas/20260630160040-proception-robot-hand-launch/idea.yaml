problem: >-
  Electronics contract manufacturers still rely on people for connector
  insertion, cable dressing, and other fine-hand tasks because standard
  grippers break on product variation and every robot pilot becomes a custom
  integration project. When a plant buys its first dexterous hand, the hardest
  part is no longer sourcing hardware; it is converting the best operator's
  motions into a repeatable, quality-controlled cell that survives SKU changes.
  Today that means weeks of integrator tuning, scarce robot time, and fallback
  to manual stations whenever yield drops.
targetUser:
  primary: Manufacturing automation engineers at mid-market electronics contract manufacturers deploying first-generation dexterous robot cells on high-mix final assembly lines
  secondary: Robotics systems integrators serving electronics and medtech assembly programs
  buyer: Director of Manufacturing Engineering or VP of Automation
startupThesis:
  nonObviousInsight: >-
    The real unlock is not a better humanoid. Once a supplier can ship a
    high-dexterity hand and capture demonstrations with a glove before the
    robot exists, dexterous automation stops being a full-stack robotics
    problem and becomes a task-compilation problem for factories.
  beachhead: Connector insertion, cable dressing, and small-fixture loading for North American electronics contract manufacturers adopting a first dexterous cobot cell on high-mix final-assembly lines
  wedge: Glove-captured operator demonstrations compiled into validated dexterous cell recipes for one workstation family
  whyNowCatalyst: >-
    Proception's first shipments, wider orders, and glove-based data capture
    show that dexterous hand hardware is becoming buyable off the shelf,
    creating immediate demand for the software layer that turns manual
    know-how into production-ready robot tasks.
  ventureScalePath: >-
    Start with one painful assembly workflow, then expand into a task library
    and validation system for medtech, industrial assembly, lab automation,
    and any high-mix environment where dexterous hands replace manual
    micro-operations.
solution: >-
  The startup sells a glove-to-cell compiler for high-mix assembly stations. A
  lead operator performs the task with an instrumented glove, the software
  breaks the motion into grasp, insertion, recovery, and inspection
  primitives, and then maps those primitives onto a supported dexterous hand
  and cobot stack. The product ships with validation recipes for cycle time,
  insertion force envelopes, and recovery behavior so the automation team can
  approve one workstation before moving to adjacent SKUs. Once live, misses,
  jams, and regrips are captured as retraining events, giving factories a
  practical continuous-improvement loop without hiring a robotics ML team.
  Over time the company builds reusable task packs for recurring workflows
  like cable harness prep, connector seating, vial handling, and delicate
  kitting.
goToMarketSeed:
  firstCustomer: A $200M-$1B North American electronics contract manufacturer with 2-8 plants, one pilot dexterous hand-equipped cobot cell, and 5-20 internal automation engineers responsible for final assembly bottlenecks
  buyingTrigger: A new product introduction or labor-driven automation push that forces the plant to stand up its first dexterous cell for connector or cable-handling work
  currentAlternative: Manual assembly stations plus custom systems-integrator programming and hard tooling
  switchingReason: The wedge cuts commissioning time from weeks to days and makes the cell easier to retune when SKUs change, which is more valuable than another custom integration project
  pricingHypothesis: Per commissioned workstation plus annual subscription per live cell and task pack
