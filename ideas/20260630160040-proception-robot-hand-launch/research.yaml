  validationPlan:
  - priority: high
    question: Can the compiler cut time from first operator demo to qualified connector or cable station by more than 50% versus the current integrator-led flow?
    evidenceToGather: Run one benchmark pilot on a live workstation family and compare calendar time, engineering hours, and number of tuning rounds against the incumbent process.
  - priority: high
    question: What uptime, first-pass yield, and recovery thresholds must a dexterous cell hit before the plant removes manual fallback?
    evidenceToGather: Collect go-live criteria from three EMS automation leaders and instrument pilot stations for yield, jams, recovery rate, and operator interventions.
  - priority: medium
    question: How portable are task packs across two hand OEMs and at least two cobot stacks?
    evidenceToGather: Replay the same operator demonstration across multiple supported hands and robots, then score tuning effort and residual error.
  - priority: medium
    question: 'Who really owns the first budget: manufacturing engineering, automation leadership, or the integrator?'
    evidenceToGather: Interview one mid-market EMS, one large regional integrator, and one hand OEM channel manager to map approval paths and deal packaging.
