slug: glove-trained-cell-compiler
date: '2026-06-30'
executiveSummary: >-
  Glove-trained cell compiler sells a commissioning and validation layer for
  mid-market North American electronics manufacturers deploying their first
  dexterous robot cells for connector insertion, cable dressing, and
  small-fixture loading. The first customer is a $200M-$1B EMS with 2-8
  plants, 5-20 automation engineers, and an NPI or labor-driven automation
  program that must launch one high-mix assembly workstation without another
  month of integrator tuning. The product is intentionally narrow: capture one
  expert operator's motions with a glove, compile them into task primitives for
  one supported hand and cobot stack, and ship auditable validation recipes for
  force, yield, recovery, IPC workmanship, and ESD controls. That beachhead is
  attractive because the plant already has budget, a live deadline, and a
  measurable fallback cost when a connector or cable station stays manual. The
  researched market supports an estimated $45.0M beachhead SAM and $4.5M
  year-three SOM, with a direct-plus-channel motion built around paid
  commissioning pilots that convert into per-live-cell subscriptions. Public
  pricing benchmarks for a neutral compiler layer are absent in the inputs, so
  pricing here is an explicit operating assumption anchored to modeled
  live-cell value and avoided integrator effort. The biggest disconfirming risk
  is whether first-generation dexterous hands can sustain production uptime and
  variant retuning on real electronics lines without turning every deployment
  into custom services. The venture case depends on proving that the
  electronics wedge can later expand into adjacent precision-assembly workflows
  that research describes directionally but does not size directly. Until paid
  pilots convert to production and repeat on a second workstation family, this
  should be treated as a watchlist pre-seed opportunity rather than a
  conviction seed bet.
problem:
  - High-mix electronics plants still leave connector insertion, cable dressing, and small-fixture loading to operators because standard grippers break on variation and integrator tuning stays slow.
  - Once dexterous hands become buyable, the bottleneck shifts to turning one operator's manual know-how into a repeatable, QA-ready cell that survives SKU changes.
  - Safety, workmanship, ESD, and force-control requirements make generic robot-teaching tools insufficient for releasing a dexterous station to production.
solution:
  - Capture expert demonstrations with a sensorized glove and compile them into grasp, insertion, recovery, and inspection primitives for one supported hand and cobot stack.
  - Ship auditable validation recipes for force envelopes, cycle time, recovery behavior, IPC workmanship, and ESD-safe operating procedures so manufacturing engineering can approve one workstation family.
  - Turn misses, jams, regrips, and variant changes into retraining events that improve task packs and shorten requalification for adjacent SKUs.
whyWeWin:
  - The company sits in the neutral layer between hand OEMs, horizontal robot software, and factory QA, where electronics-specific validation is still under-owned.
  - The wedge monetizes a hard launch event with visible ROI in weeks saved, manual fallback avoided, and changeover speed rather than an aspirational autonomy narrative.
  - Each deployment compounds proprietary data linking operator demonstrations, force windows, failure modes, and release decisions across recurring connector and cable workflows.
strategicChoices:
  beachhead: North American electronics contract manufacturers launching a first dexterous cobot cell for connector insertion, cable dressing, or small-fixture loading on high-mix final-assembly lines.
  wedgeRationale: This entry point creates faster proof than a broad robot-programming platform because the buyer already has a launch deadline, a measurable manual fallback cost, and only one workstation family plus one hardware combination to qualify.
  sequencingRationale: Start with one task family on one supported hand and cobot stack because validation burden, ESD rules, and force-control tuning are the real gating factors; sell direct into NPI and automation programs until the ROI story is referenceable; add OEM and integrator channels only after two production wins; certify a second hardware stack before entering medtech or broader dexterous programming so hiring and product work reinforce repeatability instead of custom services.
  notYet:
    - Full-stack robot control, teleoperation, or humanoid hardware
    - Broad horizontal robot programming for arbitrary dexterous tasks
    - Medtech, lab automation, and automotive precision assembly before electronics reference accounts exist
    - Greenfield 24/7 high-throughput lines where current hand uptime requirements likely exceed vendor maturity
market:
  tam: >-
    $150.0M estimated beachhead TAM based on roughly 300 North American
    high-mix electronics or adjacent precision-assembly facilities at about
    $125k blended annual value per live cell.
  sam: >-
    $45.0M estimated beachhead SAM based on roughly 120 facilities that match
    the first-customer profile and about three addressable workstation families
    each.
  som: >-
    $4.5M estimated year-three SOM based on 12 customers, three live cells
    each, and about $125k blended annual value per live cell.
  segments:
    - Mid-market North American electronics contract manufacturers deploying first-generation dexterous cells on high-mix final-assembly lines
    - Robotics systems integrators serving electronics and adjacent precision-assembly programs
  buyingProcess: >-
    The day-to-day champion is the manufacturing automation engineer or
    integrator application engineer, but QA and EHS stakeholders must sign off
    because cell release depends on safety, workmanship, and ESD controls. The
    fastest first sale is a paid pilot on one upcoming NPI or SKU changeover,
    often co-packaged with an OEM or integrator, then converted into a
    per-live-cell subscription once the station is released to production.
product:
  mvp: >-
    MVP covers one workstation family, one supported hand, one cobot stack, and
    one electronics task pack for connector insertion or cable dressing. It
    captures operator demonstrations, compiles task primitives, and produces
    auditable validation plus recovery workflows rather than promising generic
    dexterous autonomy.
  sixMonth: Complete 2-3 design-partner deployments with glove capture, force and yield validation, ESD-aware operating templates, and manual-review tools for one hand-and-cobot combination.
  twelveMonth: Convert early pilots into production cells, ship variant retuning for adjacent SKUs, add failure and retraining analytics, and certify a second hand or cobot combination only if the first task family is repeatable.
  twentyFourMonth: Expand the validated task-pack library from connector and cable work into adjacent small-fixture loading and harness-prep workflows, then enter one adjacent precision-assembly vertical only after electronics accounts show repeatable launch economics.
  keyBets:
    - One workstation family is narrow enough to standardize without collapsing customer value.
    - Buyers will adopt a software-led validation layer if it is anchored to auditable release criteria instead of generic AI claims.
    - Task packs can port across at least two hardware combinations with materially less tuning than incumbent integrator workflows.
    - Failure data from live stations improves launch time and requalification speed fast enough to matter before horizontal platforms catch up.
gtm:
  wedge: Sell a 90-120 day paid commissioning pilot tied to one NPI, line transfer, or SKU changeover, using the customer's best operator and a supported hand and cobot stack to qualify one workstation family.
  channels:
    - Founder-led direct sales to directors of manufacturing engineering, VPs of automation, and plant automation leads at target EMS accounts
    - Co-sell with dexterous hand suppliers plus cobot and force-control partners that need faster production wins
    - Referral and delivery partnerships with regional robotics systems integrators already responsible for cell deployment
  funnelTargets: "Lead→qualified design partner 15-25%, qualified design partner→paid pilot 40-60%, paid pilot→production 50%+, production account→second workstation family or second cell 40%+ within 12 months"
  pricing: >-
    Paid commissioning fee for the first workstation family plus annual
    subscription per live cell and per validated task pack; this fits the
    buyer's budget because value is measured in launch weeks saved, integrator
    hours avoided, and faster SKU requalification rather than user seats.
businessModel:
  revenueStreams:
    - Paid commissioning pilots for one workstation family and supported hardware stack
    - Annual software subscriptions priced per live cell and validated task pack
    - Expansion fees for additional cells, adjacent workstation families, and second hardware certifications within existing accounts
  unitOfValue: One live dexterous workstation family running a validated task pack on a supported hand and cobot stack
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more live cells and adjacent workstation families inside the same EMS account
    - Certify additional hand and cobot combinations using the same task pack and validation logic
    - Extend the electronics playbook into medtech, industrial assembly, or lab workflows once the base task library is proven
strategyMap:
  northStarMetric: Number of live workstation families meeting yield and cycle targets without full manual fallback on standard SKUs
  inputMetrics:
    - Days from first operator demonstration to qualified cell release
    - Engineering hours per deployment versus the incumbent integrator-led flow
    - First-pass yield and recovery rate on covered cells
    - Time to qualify a new SKU variant within one workstation family
    - Paid pilot to production conversion rate
    - Production accounts expanding to a second live cell or task pack
  moatsToBuild:
    - Corpus linking operator demonstrations, force envelopes, failures, and release decisions for connector and cable tasks
    - Reusable IPC- and ESD-aware validation templates for high-mix dexterous cells
    - Cross-hardware adaptation layer for supported hands and cobots in one workstation family
    - Partner network that makes the company the default commissioning layer above hand OEMs and integrators
  killCriteria:
    - Fewer than 2 paid pilots signed within 9 months of focused founder-led selling
    - Pilot deployments fail to cut time from demo to qualified cell by at least 50% versus the incumbent integrator flow
    - Fewer than 2 of the first 5 pilots convert to production live cells
    - More than half of pilot opportunities require custom hardware or validation work outside the supported workstation family
  mermaid: |
    flowchart LR
      Wedge[Connector and cable cell wedge] --> MVP[Glove-to-cell MVP]
      MVP --> Proof[Qualified production cells]
      Proof --> Expansion[More cells, task packs, and adjacent precision assembly]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong why-now and workflow clarity, but conviction stays moderate until the team proves hardware reliability, budget ownership, and repeatable pilot-to-production conversion.
    whyBelieve: Off-the-shelf dexterous hands, glove capture, and high-mix electronics pain now line up around a narrow workflow where launch delays and manual fallback are expensive.
    whyDoubt: The beachhead market is modest on today's evidence and the company can fall into a services trap if uptime, variant portability, or channel economics disappoint.
    nextDiligence: Confirm 2 paid pilots tied to live NPI or changeover events and verify at least 1 converts into a production cell with launch time under 14 days and no manual fallback on standard SKUs.
  firstCustomer:
    title: Director of manufacturing engineering at a mid-market North American electronics contract manufacturer
    profile: A $200M-$1B EMS with 2-8 plants, 5-20 automation engineers, and one upcoming dexterous cell for connector or cable work on a high-mix final-assembly line.
    trigger: A new product introduction or major SKU changeover creates a fixed launch deadline for the first dexterous workstation and exposes the cost of another integrator-led tuning cycle.
    buyer: Director of Manufacturing Engineering or VP of Automation
    initialContract: >-
      $60k-$100k paid pilot for one workstation family, converting to roughly
      $125k-$175k first-year value for the first live cell once the plant
      removes manual fallback on standard SKUs and renews into a task-pack
      subscription.
  mustBeTrue:
    - Mid-market EMS buyers will fund faster cell commissioning from NPI or automation budgets instead of treating it only as integrator scope.
    - A supported hand and cobot combination can hit buyer-required uptime, yield, and recovery thresholds on slower high-mix electronics stations.
    - The compiler can reduce demo-to-qualified-cell time by more than 50% versus the current integrator-led workflow.
    - Task packs can absorb normal connector, cable, or fixture variants with less than one shift of requalification effort.
    - At least half of successful pilots expand to a second cell, second workstation family, or renewable subscription rather than ending as one-off services.
  diligenceQuestions:
    - Who controls the first budget in practice: manufacturing engineering, automation leadership, or the integrator?
    - What uptime, first-pass yield, and recovery metrics must a dexterous cell hit before manual fallback is removed?
    - How much retuning is required when connector or cable variants change inside the same workstation family?
    - Which hand and cobot combinations can satisfy force-sensing and ESD constraints without making deployments bespoke?
    - Why will OEMs, Wandelbots, Intrinsic, or full-stack physical AI vendors not absorb this layer before the startup gets data scale?
    - How large can the market become beyond North American EMS, and what evidence will justify expansion into adjacent precision assembly?
operatingAssumptions:
  - assumption: Buyers will pay from existing NPI or automation budgets for launch-speed and retuning benefits rather than waiting for a broader robotics software budget.
    basis: research.yaml
    validationTest: Win at least 3 paid pilots where budget is approved against a named NPI, line transfer, or labor-reduction program rather than a speculative innovation fund.
    decisionImpact: If false, the GTM motion must shift toward OEM or integrator-led resale and the direct-sales thesis weakens.
  - assumption: One supported hand and cobot combination can meet acceptable uptime and recovery thresholds on the first beachhead tasks.
    basis: research.yaml
    validationTest: Instrument 2 pilot stations and require agreed uptime, first-pass yield, and intervention rates for 30 days before claiming production readiness.
    decisionImpact: If false, narrow the product to offline programming or slower proof-of-concept use cases and delay subscription pricing.
  - assumption: The first task family can be productized enough to avoid a services-heavy deployment model.
    basis: idea.yaml
    validationTest: By the fourth pilot, keep median time from kickoff to qualified cell under 14 days and cap custom application-engineering effort per deployment.
    decisionImpact: If false, gross margin and fundraising case fall, so scope must narrow further or services must become an explicit business line.
  - assumption: Cross-hardware adaptation to a second hand or cobot stack is feasible after the first reference deployments.
    basis: operator judgment
    validationTest: Replay one validated task pack on a second supported hardware combination and measure tuning effort, residual error, and recovery performance against the baseline.
    decisionImpact: If false, stay single-stack longer and position as a tightly coupled application product rather than a neutral compiler layer.
  - assumption: Early customers will renew and expand after the first production release.
    basis: research.yaml
    validationTest: In the first 4 production proposals, secure at least 2 second-cell or second-task-pack expansions within 12 months of go-live.
    decisionImpact: If false, reprice around project software and deployment fees and revisit the ARR-led venture thesis.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15-20 directors of manufacturing engineering, automation leaders, and integrator application engineers at target EMS accounts.
    hypothesis: NPI launch and SKU changeover are stronger buying triggers than general labor-shortage messaging.
    successMetric: 10 or more interviews describe a live or imminent workstation where launch timing and manual fallback justify a paid pilot.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build a benchmark prototype on one real connector or cable workstation using a supported hand and cobot pair with an ESD-safe operating procedure.
    hypothesis: One operator demonstration plus validation templates can produce a decision-useful cell recipe faster than incumbent manual programming.
    successMetric: Demo to draft recipe in under 5 days and customer or partner agreement that the output is good enough to enter pilot scoping.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run 2 paid pilots on live workstation families and compare the output against incumbent integrator-led flows.
    hypothesis: The wedge can cut calendar time and engineering hours by more than 50%.
    successMetric: 2 paid pilots launch and at least 1 shows more than 50% reduction in demo-to-qualified-cell time.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Collect formal go-live criteria from 3 EMS quality or automation leaders and encode them into product templates.
    hypothesis: Auditable IPC, ESD, and recovery templates increase buyer trust more than teaching UI alone.
    successMetric: 3 agreed acceptance checklists become reusable validation templates used in live pilots.
    owner: Quality / validation lead
  - horizon: 180–365 days
    experiment: Close 1 OEM- or integrator-assisted pilot with explicit software scope, pricing, and data ownership rules.
    hypothesis: Channel partners can widen pipeline without turning the company into a white-labeled services firm.
    successMetric: 1 partner-sourced pilot closes at no more than a 10% discount to direct pricing and preserves the startup as the system of record for validation data.
    owner: Partnerships lead
  - horizon: 180–365 days
    experiment: Port the first task pack to a second supported hardware combination through an OEM or integrator partner.
    hypothesis: Neutral cross-hardware adaptation is real and can create channel leverage without a full rewrite.
    successMetric: 1 second-stack demo reaches comparable yield and retuning effort within 20% of the baseline pilot.
    owner: Robotics applications engineer
  - horizon: 180–365 days
    experiment: Convert the first production customer into a second live cell or second workstation family.
    hypothesis: Expansion inside one account is the cleanest proof of recurring value and moat formation.
    successMetric: 1 expansion closes at 30% or greater incremental ARR over the initial production contract within 12 months.
    owner: Founder CEO
operations:
  - Supported-hardware certification process covering hand, cobot, vision, force-control, and ESD-safe glove configurations
  - Workstation-onboarding playbook with operator capture, validation thresholds, manual fallback, and release sign-off owners
  - Failure-review loop that turns jams, regrips, and scrap events into retraining tickets and updated task-pack versions
  - Partner delivery rules that separate repeatable software scope from custom integrator work
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led EMS selling, design-partner recruitment, and product packaging because the first deals are consultative and deadline-driven.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the compiler, data model, and first supported hardware integration needed for benchmark pilots.
  - role: Robotics applications engineer
    startTiming: Month 3
    rationale: Turn pilot lessons into repeatable deployment playbooks, handle cell bring-up, and keep product engineering from becoming on-site services.
  - role: Quality / validation lead
    startTiming: Month 3-6
    rationale: Encode IPC, harness-workmanship, safety, and ESD release criteria into auditable templates buyers can trust.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Convert hand OEM and integrator relationships into a scalable channel once the first two production references exist.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2-3 design partners and complete 15 or more ICP interviews tied to live NPI or changeover programs
      - Launch 2 paid pilots and convert at least 1 into a production live cell
      - Prove demo-to-qualified-cell time under 14 days and more than 50% faster than the incumbent on one workstation family
      - Ship reusable validation templates for connector insertion and cable dressing on the first supported hardware stack
  - horizon: 12–24 months
    items:
      - Reach 4-6 production customers with at least 2 second-cell or second-workstation expansions
      - Certify a second hand or cobot combination without increasing median deployment time above 14 days
      - Productize failure and retraining analytics so variant requalification fits within one shift for common SKUs
      - Close at least 2 channel-assisted deals through OEM or integrator partners without white-labeling the core product
  - horizon: 24–36 months
    items:
      - Reach 10-12 production customers and roughly 30 live cells, consistent with the researched year-three SOM case
      - Expand the task-pack library into adjacent precision-assembly workflows while keeping electronics as the reference vertical
      - Demonstrate renewals driven by task-pack updates and requalification workflow rather than one-time commissioning
      - Decide whether the next growth vector is medtech precision assembly, broader industrial harness work, or deeper electronics penetration based on expansion data
risks:
  - risk: Dexterous-hand uptime or maintenance remains too weak for sustained production use.
    likelihood: High
    impact: High
    mitigation: Start on slower high-mix stations, qualify multiple hand vendors, instrument health monitoring, and keep manual fallback in every early deployment.
  - risk: Deployments become bespoke integration projects with low software margin.
    likelihood: Medium
    impact: High
    mitigation: Constrain the product to one workstation family and supported hardware combinations, reject out-of-scope custom work, and measure deployment time as a kill criterion.
  - risk: Buyers insist on procuring only through OEMs or integrators, compressing direct pricing power.
    likelihood: Medium
    impact: Medium
    mitigation: Structure channel deals so the startup remains the system of record for validation data and software is priced separately from delivery labor.
  - risk: Safety, ESD, and workmanship validation stretch sales cycles and block production release.
    likelihood: High
    impact: Medium
    mitigation: Build auditable release templates early, involve QA and EHS in pilot scoping, and sell around specific NPI deadlines where validation effort is already funded.
  - risk: Horizontal robot platforms or hand OEMs close enough of the task-capture gap to commoditize pricing.
    likelihood: Medium
    impact: Medium
    mitigation: Differentiate on electronics-specific force envelopes, failure data, and release logic that generic teaching platforms do not own by default.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to secure 2-3 paid pilots, 1-2 production conversions, the first validated task-pack library, one supported hardware stack plus a second-stack proof, and a small team spanning engineering, applications, quality, and founder-led GTM.
