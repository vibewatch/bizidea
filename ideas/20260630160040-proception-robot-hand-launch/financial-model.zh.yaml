  y3RevenueImpactK: -209.5
  cashImpactK: -209.8
- variable: CAC
  downsideCase: $260K 完全摊销 CAC
  baseCase: $210K 完全摊销 CAC
  upsideCase: $170K（伙伴获客更强）
  y3RevenueImpactK: 0.0
  cashImpactK: -250.0
- variable: 流失率
  downsideCase: 如果续费或扩单迟迟证不出来，月流失率 2.0%
  baseCase: 月流失率 1.5%
  upsideCase: 若工作流锁定和第二单元增长成立，月流失率 1.0%
  y3RevenueImpactK: -140.0
  cashImpactK: -110.0
