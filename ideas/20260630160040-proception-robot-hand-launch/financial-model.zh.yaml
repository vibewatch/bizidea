- variable: 毛利率
  downsideCase: 65% 稳态毛利率——部署仍偏服务化
  baseCase: 70% 目标毛利率
  upsideCase: 72%——更多验证靠模板和伙伴交付
  y3RevenueImpactK: 0.0
  cashImpactK: -126.6
- variable: 招聘节奏
  downsideCase: 把第 2 名应用工程师、客户成功和运营都提前一个季度
  baseCase: 保持 A10 和 A11 的精简爬坡
  upsideCase: 把 G&A 招聘推到种子轮之后
  y3RevenueImpactK: 0.0
  cashImpactK: -146.3
modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      Leads[Founder + partner pipeline] --> Pilots[Paid pilots]
      Pilots --> Customers[Production customers]
      Customers --> Expansion[More live cells per account]
      Expansion --> Revenue[ARR revenue]
      Revenue --> GrossProfit[Gross profit after deployment COGS]
      GrossProfit --> Cash[Cash after payroll and opex]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景第 3 年收入来自 11 家付费客户，单客户稳态 ARR 约 $350K，对应约 31 个在线工位，每个在线工位价值按研究里的 $125K 测算。
- checkName: 必须做对的事
  finding: 第 1 年至少一半试点必须足够快地转成量产，才能在不提前堆大规模现场或销售团队的情况下，于 Q4Y2 到 6 家量产客户。
- checkName: 模型失效条件
  finding: 如果销售周期拖到 12 个月附近、毛利率又卡在 65% 左右，下行情景会在 Q4Y3 前把现金打到约 $36K。
- checkName: 下一轮融资证明
  finding: 只要这笔种子前资金能做出 6 家量产客户、第二工位扩单和第二硬件栈验证，同时把部署周期压在 14 天以内，种子轮故事就成立。
sanityChecks:
  ruleOf40: 第 3 年增速 109.4% + EBITDA 利润率 -1.3% = 108.1%。
  burnMultiple: 第 2 年烧钱倍数约 0.4x：2 家到 6 家客户带来约 $1.4M 新 ARR，对应 EBITDA burn 约 $610.5K。
  revenuePerFte: 按年末 9 名 FTE 算，第 3 年人均收入约 $326K，落在企业软件常见的 $200K-$400K 区间内，但前提是渠道杠杆够强。
  flags:
  - 模型仍然依赖制造工程团队足够直接地掌握预算，不会让每笔单都被 OEM 或集成商整体打包。
  - 毛利率直到 Q4Y3 才摸到 70% 目标，说明模型期的大部分时间里，公司仍带着明显的服务形状。
  - 基准情景的现金安全，建立在既有账户能扩到平均约 2.8 个在线单元之上；如果第二单元扩张变慢，下一轮融资大概率会前移。
  - 纸面上的 LTV/CAC 很漂亮，但流失和续费行为仍是经验值，因为公司还没有多年的客户队列数据。
