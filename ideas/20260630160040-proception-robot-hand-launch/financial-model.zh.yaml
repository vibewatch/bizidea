scenarios:
  downside:
    description: 渠道主导采购和硬件可靠性摩擦拉长转化周期，让部署继续偏服务化，也拖慢第二单元扩张。
    y3RevenueK: 2153.2
    y3EbitdaK: -646.4
    cashLowPointK: 35.8
    keyAssumptionChanges:
    - 稳态 ARPU 从 $350K 降到 $325K，因为单个账户内的扩张速度更慢。
    - 毛利率卡在 65% 左右，达不到 70%，因为验证和现场调参仍然很吃人。
    - 销售周期从约 9 个月拉长到 12 个月，因此 Q4Y3 期末客户数只有 8 家，而不是 11 家。
    - 更多预算被伙伴打包带走，独立软件经济性被压缩。
  base:
    description: 基准情景第 1 年拿下 2 家付费客户，Q4Y2 到 6 家量产客户，Y3 期末达到 11 家客户，对应约 31 个在线工位。
    y3RevenueK: 2931.4
    y3EbitdaK: -37.9
    cashLowPointK: 711.6
    keyAssumptionChanges:
    - 稳态 ARPU 维持在单客户约 $350K，对应约 2.8 个在线单元、每个单元价值按研究里的 $125K 计算。
    - 随着重复部署和验证模板减少重人工客户导入，毛利率在 Y3 后段向 70% 靠拢。
    - 客户数从 M12 的 2 家，增长到 Q4Y2 的 6 家、Q4Y3 的 11 家，落在 BP 里程碑区间的低中位。
    - 在做到 6 家客户之前，招聘保持精简，因此不用提前堆大销售团队，EBITDA 也能逼近盈亏平衡。
  upside:
    description: 标杆案例和 OEM/集成商转介一起加速落地后扩单，让定价与单账户扩张密度都更接近完整 SOM 叙事。
    y3RevenueK: 3609.4
    y3EbitdaK: 512.2
    cashLowPointK: 1264.1
    keyAssumptionChanges:
    - 稳态 ARPU 从 $350K 升到 $375K，因为每个账户平均能跑到约 3 个在线单元，且价格守得住。
    - 随着更多验证工作沉淀成模板、交给伙伴交付，毛利率可抬到 72%。
    - Q4Y3 客户数达到 12 家，与研究中的 SOM 情景一致。
    - OEM 和集成商渠道带来更多合格管道，而不需要大幅提前招聘。
