slug: glove-trained-cell-compiler
date: '2026-06-30'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月
  value: 2026-07
  unit: month
  source: 从 2026-06-30 的 business-plan 日期后第一个完整月份开始。
- id: A2
  name: 起始付费客户（M1）
  value: '0'
  unit: count
  source: '[BP milestones; BP investorMemo.firstCustomer] 模型启动时还没有任何付费客户，因此 M1 从 0 个付费客户起步。'
- id: A3
  name: 稳态单客户年 ARPU
  value: $350.0K ARR / 客户
  unit: usdK_per_customer_year
  source: '[BP milestones; research.market.som] BP 目标是在 24-36 个月做到约 30 个在线单元、10-12 家客户；研究又把单个在线单元价值锚在约 $125K，因此成熟客户的混合 ARR 约为 $350K。'
- id: A4
  name: 收入确认方式
  value: 按平均客户月 $29.2K 计；新客户在落地当月或当季按半个期间贡献计入
  unit: usdK_per_customer_month
  source: '[A3; BP investorMemo.firstCustomer] $350K ARR 对应每月约 $29.2K 收入；新客户按半个期间计入，能让第 1 年已实现收入更贴近 BP 里的 $60K-$100K 试点 + 首个在线工位落地节奏。'
- id: A5
  name: 基准客户爬坡
  value: M12 达到 2 个付费客户、Q4Y2 达到 6 个、Q4Y3 达到 11 个
  unit: customers
  source: '[BP milestones; BP gtm.funnelTargets] 这对应 BP 路径的低中位：第 1 年至少 1 个量产转化，12-24 个月做到 4-6 家量产客户，24-36 个月做到 10-12 家客户。'
- id: A6
  name: 毛利率爬坡
  value: Y1 后段 47%-56%，Y2 为 58%-64%，Y3 为 66%-70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct; BP operatingAssumptions; research.categoryDynamics.adoptionFrictionMatrix] 早期部署仍然很吃应用工程，等验证模板、第二单元铺开和伙伴交付更可复制后，毛利率才往 70% 目标爬。'
- id: A7
  name: 月流失率
  value: 1.5%
  unit: percent
  source: 针对黏性较强的工业工作流软件采用的创业财务经验值；虽然以年约为主，但硬件可用率、渠道控制权和续费证明都还存在真实风险。
- id: A8
  name: 完全摊销 CAC
  value: $210.0K / 量产客户
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; research.reportMemo.distributionChannels] 创始人主导的企业销售、工厂差旅、试点支持，以及对 OEM/集成商伙伴的赋能，会让 CAC 明显高于典型中型 SaaS。'
- id: A9
  name: 全成本薪资带
  value: 创始人/CEO $130K；软件/机器人研发 $175K-$180K；机器人应用 $160K；质量/验证 $150K；合作/GTM $150K；交付/客户成功 $140K；行政/运营 $110K
  unit: usdK_per_fte_year
  source: 这是一个精简、以美国为主的工业软件种子前团队的创业财务经验值——既要混合机器人、工厂领域能力和客户现场工作，又没有庞大销售团队。
- id: A10
  name: 招聘爬坡快照
  value: 创始人/CEO 1/1/1/1/1/1；软件/机器人研发 1/1/1/1/2/2；机器人应用 0/1/1/1/2/2；质量/验证 0/0/1/1/1/1；合作/GTM 0/0/0/1/1/1；交付/客户成功 0/0/0/0/0/1；行政/运营 0/0/0/0/0/1，对应 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP operations; BP strategicChoices.sequencingRationale] 第 1 年按 BP 的招聘顺序走；在出现重复部署之前，只额外加 1 名软件和 1 名应用工程师，客户成功与运营都后置。'
- id: A11
  name: 第 1 年后招聘时点
  value: 第 2 名软件/机器人工程师在 Q2Y2；第 2 名机器人应用工程师在 Q4Y2；交付/客户成功在 Q1Y3；行政/运营在 Q2Y3
  unit: timing
  source: '[BP milestones; BP operations; BP fundingAsk.useOfFundsSummary] 只有在 4-6 家客户的证据跑出来后才往后拉人，避免在交付和运营上先烧钱、后找证据。'
- id: A12
  name: 各职能非薪酬 Opex
  value: Y1 每月 $28K-$51K，Y2-Y3 每季 $114K-$188K
  unit: usdK
  source: 按创业财务经验值估算，覆盖工厂差旅、演示实验室、云工具、保险、法务、伙伴支持和客户现场验证开销。
- id: A13
  name: 种子前融资后起始现金
  value: $2.4M
  unit: usdM
  source: '[BP fundingAsk] BP 的融资需求是 $2M-$4M；模型取 $2.4M，代表能撑到 6 家客户里程碑、同时还留约 6 个月缓冲的最低可信融资额。'
- id: A14
  name: 现金转换简化
  value: 期末现金直接从 EBITDA 滚动，不单列债务、资本开支或税项
  unit: method
  source: 适用于轻资产软件公司的创业财务经验值：营运资本波动相对经营 burn 很小。
- id: A15
  name: 下行情景差异
  value: $325K ARPU、65% 稳态毛利率、更慢的客户落地，以及 Q4Y3 仅 8 家客户
  unit: scenario_inputs
  source: '[BP risks; research.reportMemo.sensitivityCases; research.openQuestions] 下行情景假设直接预算控制权弱于预期，而且部署会更像重服务项目。'
- id: A16
  name: 上行情景差异
  value: $375K ARPU、72% 稳态毛利率、更快的 OEM/集成商转介，以及 Q4Y3 达到 12 家客户
  unit: scenario_inputs
  source: '[BP market.som; BP milestones; research.market.som] 上行情景假设公司能跑到研究里 12 家客户、单账户 3 个在线单元的完整 SOM 叙事，且可引用标杆和伙伴拉力更强。'
- id: A17
  name: 敏感性校准区间
  value: ARPU $325K/$350K/$375K；CAC $260K/$210K/$170K；流失率 2.0%/1.5%/1.0%；销售周期 12/9/8 个月；毛利率 65%/70%/72%；招聘节奏分别前拉/按计划/后推一个季度
  unit: sensitivity_inputs
  source: '[A7; A8; A15; A16] 这是对收入、现金跑道和下一轮融资需求影响最大的最小一组假设变化。'
- id: A18
  name: 资金用途分配
  value: 工程 40%；GTM 25%；G&A 10%；缓冲 25%
  unit: percentage
  source: '[A10; A11; A12; A13] 工程始终是最大支出项，GTM 仍以创始人主导 + 渠道为主，25% 储备金则保证约 6 个月运营缓冲。'
