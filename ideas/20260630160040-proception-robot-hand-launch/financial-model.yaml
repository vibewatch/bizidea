slug: glove-trained-cell-compiler
date: '2026-06-30'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: Starts the first full month after the 2026-06-30 business-plan date.
- id: A2
  name: Starting paying customers (M1)
  value: '0'
  unit: count
  source: '[BP milestones; BP investorMemo.firstCustomer] The model starts before any paid pilot closes, so M1 begins with zero paying logos.'
- id: A3
  name: Steady-state annual ARPU per production customer
  value: $350.0K ARR per customer
  unit: usdK_per_customer_year
  source: '[BP milestones; research.market.som] The BP targets roughly 30 live cells across 10-12 customers by 24-36 months, and research anchors value at about $125K per live cell, implying about $350K blended ARR per mature customer.'
- id: A4
  name: Revenue recognition method
  value: $29.2K per average customer-month; new logos counted at half-period contribution in the month or quarter they land
  unit: usdK_per_customer_month
  source: '[A3; BP investorMemo.firstCustomer] $350K ARR implies about $29.2K monthly revenue, and a half-period convention keeps year-one realized revenue closer to the BPs $60K-$100K pilot plus first-cell land pattern.'
- id: A5
  name: Base customer ramp
  value: 2 paying customers by M12, 6 by Q4Y2, and 11 by Q4Y3
  unit: customers
  source: '[BP milestones; BP gtm.funnelTargets] This underwrites the low-middle of the BP path: at least 1 production conversion in year 1, 4-6 production customers in months 12-24, and 10-12 customers by months 24-36.'
- id: A6
  name: Gross margin ramp
  value: 47%-56% in late Y1, 58%-64% in Y2, and 66%-70% in Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct; BP operatingAssumptions; research.categoryDynamics.adoptionFrictionMatrix] Early deployments remain applications-heavy, then margins climb toward the 70% target as validation templates, second-cell rollouts, and partner delivery become repeatable.'
- id: A7
  name: Monthly churn
  value: 1.5%
  unit: percent
  source: Startup-finance heuristic for sticky industrial workflow software with annual contracts but real hardware-uptime, channel-control, and renewal-proof risk.
- id: A8
  name: Fully loaded CAC
  value: $210.0K per production customer
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; research.reportMemo.distributionChannels] Founder-led enterprise selling, plant travel, pilot support, and OEM or integrator enablement keep CAC well above typical mid-market SaaS norms.'
- id: A9
  name: Loaded salary bands
  value: Founder/CEO $130K; software/robotics engineering $175K-$180K; robotics applications $160K; quality/validation $150K; partnerships/GTM $150K; deployment/CS $140K; G&A/ops $110K
  unit: usdK_per_fte_year
  source: Startup-finance heuristic for a lean U.S.-based industrial software pre-seed team that mixes robotics, factory-domain, and customer-site work without a large sales bench.
- id: A10
  name: Headcount ramp snapshots
  value: Founder/CEO 1/1/1/1/1/1; software/robotics engineering 1/1/1/1/2/2; robotics applications 0/1/1/1/2/2; quality/validation 0/0/1/1/1/1; partnerships/GTM 0/0/0/1/1/1; deployment/CS 0/0/0/0/0/1; G&A/ops 0/0/0/0/0/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP operations; BP strategicChoices.sequencingRationale] The ramp follows the BP hiring order in year 1, then adds one software hire and one more applications hire before adding CS and ops only after repeat deployments exist.'
- id: A11
  name: Post-Y1 hiring timing
  value: Second software/robotics engineer in Q2Y2; second robotics applications engineer in Q4Y2; deployment/CS in Q1Y3; G&A/ops in Q2Y3
  unit: timing
  source: '[BP milestones; BP operations; BP fundingAsk.useOfFundsSummary] Later hires are pulled only after 4-6 customer proof exists so the company does not outspend evidence on delivery and operations.'
- id: A12
  name: Functional non-salary opex
  value: Y1 $28K-$51K per month and Y2-Y3 $114K-$188K per quarter
  unit: usdK
  source: Startup-finance heuristic for plant travel, demo-lab costs, cloud tooling, insurance, legal, partner support, and customer-site validation work layered on top of the BP hiring plan.
- id: A13
  name: Starting cash after pre-seed close
  value: $2.4M
  unit: usdM
  source: '[BP fundingAsk] The BP asks for $2M-$4M; the model uses $2.4M as the minimum credible raise that funds the 6-customer milestone and still leaves roughly six months of buffer.'
- id: A14
  name: Cash conversion simplification
  value: Ending cash rolls from EBITDA with no debt, capex, or tax lines
  unit: method
  source: Startup-finance heuristic for an asset-light software company where working-capital swings are small relative to operating burn.
- id: A15
  name: Downside scenario deltas
  value: $325K ARPU, 65% steady-state gross margin, slower landings, and 8 customers by Q4Y3
  unit: scenario_inputs
  source: '[BP risks; research.reportMemo.sensitivityCases; research.openQuestions] The downside assumes direct budget control proves weaker than planned and deployments remain more services-heavy.'
- id: A16
  name: Upside scenario deltas
  value: $375K ARPU, 72% steady-state gross margin, faster OEM or integrator referrals, and 12 customers by Q4Y3
  unit: scenario_inputs
  source: '[BP market.som; BP milestones; research.market.som] The upside assumes the company reaches the full 12-customer, 3-live-cell-per-account SOM framing with better referenceability and partner pull.'
- id: A17
  name: Sensitivity calibration range
  value: ARPU $325K/$350K/$375K; CAC $260K/$210K/$170K; churn 2.0%/1.5%/1.0%; sales cycle 12/9/8 months; gross margin 65%/70%/72%; hiring pace pulled forward/on-plan/delayed one quarter
  unit: sensitivity_inputs
  source: '[A7; A8; A15; A16] These are the narrowest assumption changes that materially move revenue, runway, or the next funding ask.'
- id: A18
  name: Use-of-funds allocation
  value: Engineering 40%; GTM 25%; G&A 10%; Buffer 25%
  unit: percentage
  source: '[A10; A11; A12; A13] Engineering remains the largest spend bucket, GTM stays founder-led plus partner-heavy, and a 25% reserve preserves six months of operating buffer.'
