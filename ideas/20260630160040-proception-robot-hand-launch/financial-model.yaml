modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Founder + partner pipeline] --> Pilots[Paid pilots]
      Pilots --> Customers[Production customers]
      Customers --> Expansion[More live cells per account]
      Expansion --> Revenue[ARR revenue]
      Revenue --> GrossProfit[Gross profit after deployment COGS]
      GrossProfit --> Cash[Cash after payroll and opex]
modelSanity:
- checkName: Revenue engine
  finding: Base-case Y3 revenue comes from eleven paying customers at about $350K steady-state ARR each, which is roughly thirty-one live cells at the researched $125K value per cell.
- checkName: Must go right
  finding: At least half of the first year-one pilots must convert fast enough to reach six production customers by Q4Y2 without adding a large field or sales team ahead of proof.
- checkName: Model breaks if
  finding: If sales cycles stretch toward twelve months and gross margin stays near sixty-five percent, the downside case drives cash to roughly $36K before Q4Y3.
- checkName: Next-round proof
  finding: The seed case is credible once this pre-seed capital produces six production customers, second-cell expansions, and a second-stack proof while deployment time stays at or below fourteen days.
sanityChecks:
  ruleOf40: Y3 growth 109.4% + EBITDA margin -1.3% = 108.1%.
  burnMultiple: 'Y2 burn multiple is about 0.4x: $610.5K EBITDA burn against roughly $1.4M of net-new ARR from 2 to 6 customers.'
  revenuePerFte: About $326K Y3 revenue per year-end FTE (9 FTE), which is inside a reasonable $200K-$400K enterprise-software benchmark but still assumes strong partner leverage.
  flags:
  - The model still depends on manufacturing engineering owning budget directly enough to land customers without every deal being wrapped by an OEM or integrator.
  - Gross margin does not reach the 70% target until Q4Y3, which means the company remains partially services-shaped for most of the modeled period.
  - Base-case cash safety comes from expanding existing accounts toward roughly 2.8 live cells each; if second-cell uptake stalls, the next round likely pulls forward.
  - LTV/CAC remains attractive on paper, but churn and renewal behavior are still heuristic because no multi-year cohort data exists yet.
