scenarios:
  downside:
    description: Channel-led buying and hardware-reliability friction stretch conversions, keep deployments more services-heavy, and slow second-cell expansion.
    y3RevenueK: 2153.2
    y3EbitdaK: -646.4
    cashLowPointK: 35.8
    keyAssumptionChanges:
    - Steady-state ARPU falls from $350K to $325K because customers expand more slowly inside each account.
    - Gross margin stalls near 65% instead of reaching 70% as validation and on-site tuning remain labor intensive.
    - Sales cycle stretches from roughly 9 months to 12 months, so Q4Y3 customers end at 8 instead of 11.
    - Partner-led packaging captures more budget, which compresses standalone software economics.
  base:
    description: The base case lands two paying customers in Y1, reaches six production customers by Q4Y2, and exits Y3 at eleven customers representing roughly thirty-one live cells.
    y3RevenueK: 2931.4
    y3EbitdaK: -37.9
    cashLowPointK: 711.6
    keyAssumptionChanges:
    - Steady-state ARPU holds near $350K per customer, reflecting about 2.8 live cells at the researched $125K value per cell.
    - Gross margin improves toward 70% by late Y3 as repeat deployments and validation templates reduce labor-heavy onboarding.
    - Customer count grows from 2 at M12 to 6 at Q4Y2 and 11 at Q4Y3, which sits in the low-middle of the BP milestone range.
    - Hiring stays lean until after the 6-customer milestone, so EBITDA approaches breakeven without a large sales bench.
  upside:
    description: Reference wins and OEM or integrator referrals speed up land-and-expand motion, lifting both pricing and expansion density toward the full SOM framing.
    y3RevenueK: 3609.4
    y3EbitdaK: 512.2
    cashLowPointK: 1264.1
    keyAssumptionChanges:
    - Steady-state ARPU rises from $350K to $375K as accounts reach about three live cells each and pricing holds.
    - Gross margin reaches 72% as more validation work shifts into reusable templates and partner-led delivery.
    - Customer count reaches 12 by Q4Y3, matching the researched SOM case.
    - OEM and integrator channels add qualified pipeline without requiring a large pull-forward in headcount.
