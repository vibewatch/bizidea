competitors:
- name: Proception
  stage: 种子轮
  wedge: 提供基于手套数据采集的灵巧手，主要卖给研究机构和机器人公司。
  pricing: 未公开。
  strength: 同时掌握灵巧手硬件和数据采集叙事，在接触丰富型操作上更占先手。
  weaknessVsUs: 更可能继续跟自家具身硬件深度绑定，而不是做跨多种硬件栈的中立电子工位验证层。
  sourceRefs:
  - 1
  - 3
  - 4
- name: Wandelbots
  stage: 扩张期
  wedge: 面向工业自动化的与机器人无关操作系统和部署层。
  pricing: 企业版 / 定制报价。
  strength: 在硬件无关、数字孪生和多品种快速重编程上，价值主张非常清晰。
  weaknessVsUs: 它天生就是横向平台，不明显掌控连接器与线缆工位所需的电子装配任务包、力阈值和 QA 放行逻辑。
  sourceRefs:
  - 24
  - 25
  - 26
- name: Intrinsic
  stage: 扩张期
  wedge: 为机器人提供开发环境、云基础设施和 AI 模块。
  pricing: 企业版 / 定制报价。
  strength: 具备强复用的基础设施、云服务和适应性机器人 AI 能力。
  weaknessVsUs: 它依旧更像基础设施层；工厂最后仍需要一层垂直应用，把某一类工位的验证逻辑编码进去。
  sourceRefs:
  - 27
  - 28
  - 29
- name: Dexterity
  stage: 扩张期
  wedge: 面向量产的具身 AI 与世界模型驱动自治。
  pricing: 企业版 / 定制报价。
  strength: 积累了大规模量产数据，也对真实世界自治决策提出了很强的主张。
  weaknessVsUs: 它更适合吃下更大的自动化结果，不适合做一层轻量编译器，卖给存量电子工厂和集成商。
  sourceRefs:
  - 30
  - 31
- name: Sanctuary AI
  stage: 扩张期
  wedge: 与硬件无关的具身 AI，配先进机器人手，专攻高难工业任务。
  pricing: 企业版 / 定制报价。
  strength: 在线束插接吞吐量和灵巧手路线图上，公开证明点很有说服力。
  weaknessVsUs: 它更可能直接追求自动化结果和工业机器人部署，而不是做第三方 EMS 工位的中立软件层。
  sourceRefs:
  - 32
  - 33
  - 34
