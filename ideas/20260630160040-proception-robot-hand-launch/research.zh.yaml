    impact: negative
    point: 机器人单元安全、协作作业指引、电子装配工艺和 ESD 控制，全都抬高了工位放行前的举证成本。
    sourceRefs:
    - 9
    - 10
    - 11
    - 13
    - 14
    - 15
    - 16
