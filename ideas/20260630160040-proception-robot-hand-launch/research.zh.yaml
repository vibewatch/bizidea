  pestle:
  - factor: 政治
    impact: positive
    point: 北美 EMS 的回流和区域化趋势，让本地自动化能力对制造商和客户都更具战略意义。
    sourceRefs:
    - 8
  - factor: 经济
    impact: positive
    point: 用工紧缺和产出压力抬高了 ROI，让自动化手工作业瓶颈更有吸引力。
    sourceRefs:
    - 7
    - 17
  - factor: 社会
    impact: positive
    point: 重复又别扭的装配工作很难招人也很难留人，这会持续推高对“脏累烦”工序自动化的需求。
    sourceRefs:
    - 7
    - 17
  - factor: 技术
    impact: positive
    point: 商用灵巧手、手套式采集以及共享的模仿学习工具，让灵巧工位软件比几年前更有工程可行性。
    sourceRefs:
    - 1
    - 3
    - 36
    - 37
    - 38
    - 39
