    impact: neutral
    point: 精度提升确实能减少返工和废料，但在这类采购动作里，环保价值始终让位于吞吐、用工和质量经济性。
    sourceRefs:
    - 14
    - 15
    - 22
  adoptionFrictionMatrix:
  - friction: 灵巧手的耐久性和可用率，可能仍低于量产预期
    severity: high
    affectedBuyer: 制造工程总监
    mitigation: 先从低速、多品种工位切入，同时认证多种灵巧手方案，并把健康监控和人工备援流程做成标配。
    sourceRefs:
    - 3
    - 32
    - 34
    - 35
  - friction: 不同 SKU 变型之间的示教迁移，可能仍然离不开大量重调
    severity: high
    affectedBuyer: 自动化工程师
    mitigation: 第一代产品只服务一类工位，并交付清晰的恢复与验证原语，而不是只回放原始示教。
    sourceRefs:
    - 19
    - 20
    - 21
    - 23
  - friction: 安全、工艺和 ESD 验证会把放行流程拖慢
    severity: high
    affectedBuyer: 质量与 EHS 相关方
    mitigation: 把可审计的验证配方、IPC 感知验收模板和 ESD 安全操作流程做进每次部署。
    sourceRefs:
    - 9
    - 10
    - 11
    - 13
    - 14
    - 15
    - 16
  - friction: 每次部署都可能演变成重服务的系统集成项目
    severity: medium
    affectedBuyer: 自动化副总裁
    mitigation: 通过狭窄任务包、渠道伙伴和可复用硬件组合切入，而不是承诺无限展开的定制自动化。
    sourceRefs:
    - 8
    - 17
    - 18
    - 24
    - 26
market:
  tam:
    value: $150.0M
    rationale: 自下而上估算：约 300 家北美多品种电子或相邻精密装配工厂 × 每家随时间可覆盖 4 类灵巧工位 × 每个在线工位约 $125k 混合年价值，得到约 $150M。EMSNow 的 218 个工厂调查构成经核实下限，IFR 的电子行业自动化数据则支持更宽的可自动化基础盘。
    isEstimate: true
    sourceRefs:
    - 6
    - 8
  sam:
    value: $45.0M
    rationale: 自下而上估算：约 120 家符合首位客户画像的工厂 × 每家 3 类工位 × 每个在线工位约 $125k 混合年价值，得到约 $45M。
    isEstimate: true
    sourceRefs:
    - 8
    - 23
    - 40
  som:
    value: $4.5M
    rationale: 可达第 3 年估算：12 家客户 × 每家 3 个在线工位 × 每个在线工位约 $125k 混合年价值；借助 OEM 和集成商协助的落地后扩单动作，这一目标具备可行性。
