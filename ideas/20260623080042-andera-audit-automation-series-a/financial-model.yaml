slug: fintech-sox-evidence-layer
date: '2026-06-23'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: YYYY-MM
    source: '[business-plan.yaml date] first full operating month after the 2026-06-23 business plan date.'
  - id: A2
    name: Opening cash after seed close
    value: $3.2M
    unit: USD
    source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd $3-5M + model cash trough] base case uses the lower-middle of the stated seed range to reach the Q2Y3 milestone with six months of buffer.'
  - id: A3
    name: Revenue unit
    value: Active paying logo
    unit: definition
    source: '[business-plan.yaml gtm.pricing + businessModel.revenueStreams] customersEop includes any account already paying for a live pilot or production deployment.'
  - id: A4
    name: Paid pilot pricing
    value: $75K over about 3 months (~$25K per month)
    unit: USD/logo
    source: '[business-plan.yaml investorMemo.firstCustomer.initialContract $75k-$125k paid pilot] base case uses the bottom of the stated pilot range to stay conservative on early monetization.'
  - id: A5
    name: Starting production ACV
    value: $300K
    unit: USD/logo-year
    source: '[research.yaml bottomUpSizingDrivers $300k + business-plan.yaml gtm.pricing $250k-$400k] the first production deployment prices near the researched market midpoint.'
  - id: A6
    name: Blended realized revenue per active paying logo ramp
    value: Y1 exit about $330K ARR; Y2 about $330K-$360K ARR; Y3 about $366K-$396K ARR
    unit: USD/logo-year
    source: '[A4 + A5 + business-plan.yaml businessModel.expansionLevers + investorMemo.mustBeTrue] the mix improves as pilots convert and second-control-family expansion appears in more accounts.'
  - id: A7
    name: Y1 paid logo path
    value: M1-M12 customersEop = 0,0,0,1,1,1,2,2,2,3,3,3
    unit: active paying logos
    source: '[business-plan.yaml milestones 0-12 months + experimentRoadmap] matches 3 paid pilots and 2 production conversions by the end of year 1.'
  - id: A8
    name: Y2-Y3 paid logo path
    value: Q1Y2 4; Q2Y2 6; Q3Y2 8; Q4Y2 10; Q1Y3 11; Q2Y3 13; Q3Y3 14; Q4Y3 15
    unit: active paying logos
    source: '[business-plan.yaml milestones 12-24 and 24-36 months + research.yaml market.som 15 logos at year 3] base case hits the low end of the 12-24 month logo target and the researched Y3 SOM path.'
  - id: A9
    name: Revenue recognition convention
    value: Period-end customer plan translated through midpoint active customers and period-specific realized monthly revenue per active logo
    unit: policy
    source: '[startup-finance heuristic] new logos are assumed to land around the middle of the month or quarter on average.'
  - id: A10
    name: Gross margin ramp
    value: Y1 48%-58%; Y2 60%-69%; Y3 71%-75%
    unit: gross margin percent
    source: '[business-plan.yaml businessModel.targetGrossMarginPct 70 + operatingAssumptions connector-bundle assumption] early deployments are services-heavy before packaged connectors and reviewer workflows standardize.'
  - id: A11
    name: Hiring timeline
    value: Founder CEO, founding engineer, and audit domain lead in M1; solutions engineer M3; ML/data engineer M6; head of partnerships M9; second engineer M12; second solutions hire M15; first AE M18; G&A/ops M21; third engineer M24; second ML/data hire M27; third solutions hire M30; second AE M33; fourth engineer M36
    unit: timing
    source: '[business-plan.yaml team + strategicChoices.sequencingRationale + milestones] hiring stays product-and-deployment heavy before the GTM bench expands.'
  - id: A12
    name: Founder loaded cash compensation
    value: $160K
    unit: USD/year
    source: '[business-plan.yaml team Founder CEO + startup-finance heuristic] lean but credible founder salary plus payroll taxes and benefits.'
  - id: A13
    name: Engineering loaded cash compensation
    value: $220K
    unit: USD/year
    source: '[business-plan.yaml team Founding eng + startup-finance heuristic] senior integration engineering talent is required for ERP, IAM, ticketing, and ledger connectors.'
  - id: A14
    name: Audit domain lead loaded cash compensation
    value: $200K
    unit: USD/year
    source: '[business-plan.yaml team Audit domain lead + startup-finance heuristic] reflects a senior SOX or audit operator who can encode evidence sufficiency and reviewer workflow rules.'
  - id: A15
    name: Solutions / success loaded cash compensation
    value: $170K
    unit: USD/year
    source: '[business-plan.yaml team Solutions engineer + startup-finance heuristic] covers deployment ownership and customer-side process mapping without building a large services bench.'
  - id: A16
    name: ML / data loaded cash compensation
    value: $210K
    unit: USD/year
    source: '[business-plan.yaml team ML / data engineer + startup-finance heuristic] reflects the data-normalization and evidence-retrieval depth needed for audit-grade outputs.'
  - id: A17
    name: Sales / partnerships loaded cash compensation
    value: $200K
    unit: USD/year
    source: '[business-plan.yaml team Head of partnerships + gtm.channels + startup-finance heuristic] includes enterprise travel and variable compensation for founder-led plus partner-led selling.'
  - id: A18
    name: G&A / ops loaded cash compensation
    value: $140K
    unit: USD/year
    source: '[business-plan.yaml operations + startup-finance heuristic] covers finance, vendor management, compliance coordination, and insurance overhead once the company scales past pilot stage.'
  - id: A19
    name: Functional payroll allocation
    value: Founder 70% S&M / 30% G&A; engineering 100% R&D; audit domain lead 85% R&D / 15% G&A; solutions 30% S&M / 50% R&D / 20% G&A; ML/data 100% R&D; sales/partnerships 100% S&M; G&A 100% G&A
    unit: allocation
    source: '[business-plan.yaml team role rationales + operations] payroll maps to who sells the wedge, who productizes the connector and evidence layer, and who carries company overhead.'
  - id: A20
    name: Non-payroll opex ramp
    value: Monthly S&M/R&D/G&A base spend ramps from $10K/$18K/$12K at launch to $26K/$29K/$19K by Q4Y3, plus S&M variable spend at 5% of revenue
    unit: USDK/month
    source: '[startup-finance heuristic for seed enterprise SaaS selling into public-company buyers] covers cloud, model usage, travel, legal, insurance, and security overhead.'
  - id: A21
    name: Cash conversion policy
    value: EBITDA approximates operating cash movement
    unit: policy
    source: '[startup-finance heuristic] capex, taxes, debt service, and working-capital timing are assumed immaterial at seed scale.'
  - id: A22
    name: Steady-state monthly churn
    value: 2.0%
    unit: percent per month
    source: '[startup-finance heuristic for early enterprise workflow SaaS] annual contracts and workflow stickiness support low churn, but the model stays conservative versus mature compliance software.'
  - id: A23
    name: CAC convention
    value: Y2-Y3 sales and marketing spend divided by 12 net new active paying logos
    unit: formula
    source: '[model calc using base-case S&M spend + business-plan.yaml gtm.funnelTargets] captures the cost of founder-led, partner-led, and first-AE acquisition after initial proof.'
  - id: A24
    name: Next-round milestone
    value: 10 production logos, at least 4 second-control-family expansions, standard deployments at 45 days or less, and quarterly EBITDA burn below $50K
    unit: milestone
    source: '[business-plan.yaml investorMemo.nextDiligence + milestones + fundingAsk.runwayMonths] this is the proof point used to size the seed round and six-month buffer.'
  - id: A25
    name: Runway sizing target
    value: 24 months
    unit: months
    source: '[business-plan.yaml fundingAsk.runwayMonths 18 + model cash curve] the round is sized to reach the next financing milestone with roughly six extra months of buffer.'
