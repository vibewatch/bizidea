scenarios:
  downside:
    description: Auditor acceptance moves slower, paid pilots convert later, and implementations stay more manual than planned.
    y3RevenueK: 4000.5
    y3EbitdaK: -680.5
    cashLowPointK: -117.5
    keyAssumptionChanges:
      - Q4Y3 customersEop ends near 13 instead of 15.
      - Blended annual ARPU lands closer to about $350K than the base-case $380K.
      - Gross margin exits around 72% instead of 75% because custom deployment work persists.
  base:
    description: The connector bundle becomes repeatable, pilots convert on plan, and second-control-family expansion lifts realized ARPU without requiring a large field team.
    y3RevenueK: 4846.5
    y3EbitdaK: 0.7
    cashLowPointK: 618.6
    keyAssumptionChanges:
      - Customers reach 3 paid logos by M12, 10 by Q4Y2, and 15 by Q4Y3.
      - Blended annual ARPU rises from roughly $300K land deals to about $380K in Y3 and about $396K exit ARR.
      - Gross margin climbs from the high-40s in the first pilots to 75% in Q4Y3 as deployments standardize.
  upside:
    description: Reference accounts and partner channels accelerate conversions, more customers expand to a second control family, and implementation effort productizes faster.
    y3RevenueK: 6195.8
    y3EbitdaK: 1060.3
    cashLowPointK: 1206.2
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches about 18 instead of 15.
      - Blended annual ARPU moves into the low-$400Ks as expansion happens earlier across the cohort.
      - Gross margin exits near 77% because connector reuse reduces services drag faster than planned.
sensitivity:
  - variable: ARPU
    downsideCase: Blended annual ARPU settles near $350K because buyers stay closer to one-family scope and slower expansions.
    baseCase: Blended annual ARPU reaches about $380K in Y3 and about $396K exit ARR in Q4Y3.
    upsideCase: Blended annual ARPU pushes into the low-$400Ks as more accounts add a second control family inside 12 months.
    y3RevenueImpactK: -510.0
    cashImpactK: -410.0
  - variable: CAC
    downsideCase: Effective CAC rises toward about $220K as more travel, security review, and founder hand-holding are needed per close.
    baseCase: Modeled CAC stays near $177K per net new active paying logo.
    upsideCase: Partner-sourced demand and references pull CAC closer to about $150K.
    y3RevenueImpactK: -160.0
    cashImpactK: -360.0
  - variable: churn
    downsideCase: Monthly churn behaves closer to 3.0% if the product remains a project-like tool instead of a durable operating layer.
    baseCase: Monthly churn holds near 2.0% once customers are live in production.
    upsideCase: Monthly churn stays near 1.5% because the evidence layer becomes embedded in quarter-close routines.
    y3RevenueImpactK: -260.0
    cashImpactK: -220.0
  - variable: sales cycle
    downsideCase: Pilot-to-production stretches toward about 150 days because audit, security, and procurement reviews slow approvals.
    baseCase: The base case assumes roughly a 90-120 day pilot-to-production motion tied to a live quarter-close cycle.
    upsideCase: Reference accounts compress approvals toward about 75 days and pull more logos forward.
    y3RevenueImpactK: -650.0
    cashImpactK: -430.0
  - variable: gross margin
    downsideCase: Gross margin exits around 70-72% because connector exceptions and reviewer QA stay services-heavy.
    baseCase: Gross margin reaches 75% in Q4Y3 and 73% on a unit-economics basis.
    upsideCase: Gross margin reaches 77-78% as the standard overlay path and evidence templates reduce manual effort.
    y3RevenueImpactK: 0.0
    cashImpactK: -310.0
  - variable: hiring pace
    downsideCase: Two scale hires are pulled forward by about two quarters before production proof is fully repeatable.
    baseCase: Hiring follows the deployment-first cadence in A11 and stays at 15 ending FTE by Q4Y3.
    upsideCase: The final scale hires slip until after the next round because implementations stay cleaner than planned.
    y3RevenueImpactK: 0.0
    cashImpactK: -240.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Pipeline[Design partners + referral pipeline] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionLogos[Production logos]
      ProductionLogos --> Expansion[Second control-family expansion]
      Expansion --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base revenue comes from growing active paid logos from 3 at Y1 exit to 10 at Q4Y2 and 15 at Q4Y3 while blended ARR per logo climbs from about $300K land deals to about $396K exit ARR through expansion.
  - checkName: Must go right
    finding: The standard overlay deployment has to stay inside the 45-day target so the team can support 10 production logos by Q4Y2 without gross margin stalling below plan.
  - checkName: Model breaks if
    finding: If pilot conversion slips toward the mid-40s or implementations stay too services-heavy, the downside case goes modestly negative cash before breakeven appears.
  - checkName: Next-round proof
    finding: The next financing story is 10 production logos, 4 or more second-control-family expansions, and quarterly EBITDA burn below $50K by Q2Y3.
sanityChecks:
  ruleOf40: Y3 growth 127.8% + EBITDA margin 0.0% = 127.8%
  burnMultiple: Y2 burn multiple is about 0.4x using roughly $1.2M of EBITDA burn against about $2.6M of net new ARR; the model crosses quarterly EBITDA breakeven in H2Y3.
  revenuePerFte: $323K Y3 on 15 ending FTE (benchmark $200–400K SaaS)
  flags:
    - customersEop includes paid pilots as well as production subscriptions in Y1, so true production-logo count trails the headline customer count until late Y2.
    - The blended ARPU path requires the researched $300K starting ACV to expand toward the upper half of the business-plan range as second control families attach.
    - Gross margin only reaches the business-plan target if standard deployments stay near the 45-day operating-assumption threshold and connector customization stays contained.
    - Cash is modeled as EBITDA; deferred-revenue timing, customer prepayments, or capitalized security work could move real cash modestly earlier or later.
