jobsToBeDone:
  - job: >-
      季度 SOX 测试启动时，帮助审计团队整理控制证据、只隔离真正的异常，让我们能更快
      完成认证，而不用再加一层测试人员。
    currentAlternative: 在邮件和电子表格中手工追证据，加上外包测试支持
    successMetric: 每个控制周期耗时、外部审计费超支，以及无需返工即可自动起草的控制比例
  - job: >-
      外部审计师发出 PBC 请求时，帮助财务总监和 SOX 负责人快速交付带引用的工作底稿，
      减少临时救火，避免签字环节发现控制缺陷。
    currentAlternative: GRC 任务清单加临时导出、截图和顾问代准备的工作底稿
    successMetric: PBC 周转时间、后续补充请求次数，以及签字阶段发现的滞后异常数量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 该集群有强劲的融资验证、量化的节省数据和清晰的投资人推理，但核心只围绕一家公司和三个佐证信源，尚未形成更广泛的行业浪潮。
  painIntensity:
    score: 5
    rationale: 季度控制测试是强制性要求，成本高、能见度高，财务领导层直接关注，审计费已按百万美元计量。
  wedgeClarity:
    score: 5
    rationale: 从上市金融科技 SOX 项目中三个重复性控制族切入，精准界定了第一个工作流、买家、触发条件和证据文件。
  defensibility:
    score: 4
    rationale: 控制证据映射、不确定性阈值和异常历史可以积累为切换成本，即便现有厂商能复制表面的工作流功能。
  ventureScale:
    score: 4
    rationale: 滩头市场虽然窄，但可以自然延伸到其他控制族、受监管金融子垂直行业和更广泛的企业保障流程。
topRisks:
  - name: 审计师信任鸿沟
    description: 如果产品漏掉证据或起草了有问题的工作底稿，客户可能拒绝在认证流程中依赖它。
    mitigation: 从有限的控制族开始，保持人工审批环节，为每个草稿结论附上引用的来源文件和置信度标记。
  - name: 集成蔓延
    description: 上市金融科技公司往往运行着杂乱的 ERP、IAM、工单和自研账本系统组合，可能拖慢实施进度和 ROI 交付。
    mitigation: 首先接入最常见的财务和身份管理系统，销售单控制族部署，并对早期客户使用服务主导的入职流程。
  - name: 现有厂商捆绑销售
    description: 一旦该品类证明有预算价值，GRC 厂商或联合外包机构可能打包类似的自动化功能。
    mitigation: 凭借更深的控制证据智能取胜，嵌入现有厂商的技术栈，在横向平台反应之前积累金融科技专属控制的最佳异常语料库。
