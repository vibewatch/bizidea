jobsToBeDone:
  - job: >-
      When quarter-end SOX testing starts, help our audit team assemble control
      evidence and isolate only the real exceptions, so we can certify faster
      without hiring another layer of testers.
    currentAlternative: Manual evidence chasing in email and spreadsheets plus outsourced testing support
    successMetric: Hours per control cycle, external-audit fee overage, and percentage of controls auto-drafted with no rework
  - job: >-
      When external auditors issue PBC requests, help our controller and SOX
      leads deliver cited workpapers quickly, so we can reduce scramble work
      and avoid late control deficiencies.
    currentAlternative: GRC task lists backed by ad hoc exports, screenshots, and consultant-prepared workpapers
    successMetric: PBC turnaround time, number of follow-up requests, and late exceptions discovered during sign-off
ideaScorecard:
  signalStrength:
    score: 4
    rationale: The cluster has strong funding validation, quantified savings, and explicit investor reasoning, though it centers on one company and three corroborating sources rather than a broader wave.
  painIntensity:
    score: 5
    rationale: Quarterly control testing is mandatory, expensive, and highly visible to finance leadership, with audit fees already measured in millions.
  wedgeClarity:
    score: 5
    rationale: Starting with three repetitive control families inside listed fintech SOX programs creates a precise first workflow, buyer, trigger, and artifact.
  defensibility:
    score: 4
    rationale: Control-evidence mappings, uncertainty thresholds, and exception history can compound into switching costs, even if incumbents can copy surface workflow features.
  ventureScale:
    score: 4
    rationale: The beachhead is narrow but expands naturally into other control families, regulated financial sub-verticals, and broader enterprise assurance workflows.
topRisks:
  - name: Auditor trust gap
    description: If the product misses evidence or drafts a flawed workpaper, customers may refuse to rely on it in a certification workflow.
    mitigation: Start with bounded control families, keep human approval in the loop, and expose every draft conclusion with cited source artifacts and confidence flags.
  - name: Integration sprawl
    description: Public fintechs often run a messy mix of ERP, IAM, ticketing, and homegrown ledger systems that can slow implementation and ROI.
    mitigation: Launch with the most common finance and identity systems first, sell a single control-family deployment, and use services-led onboarding for early customers.
  - name: Incumbent bundling
    description: GRC vendors or co-sourcing firms could package similar automation once the category proves budget-worthy.
    mitigation: Win on deeper control-evidence intelligence, integrate into incumbent stacks, and build the best exception corpus for fintech-specific controls before horizontals react.
