openQuestions:
  - What share of quarterly evidence labor in the beachhead sits with internal teams versus external auditors versus offshore co-sourcers?
  - How often do public-fintech buyers still need screenshots rather than APIs for the first three target control families?
  - Which audit firms will actually accept AI-drafted workpapers if provenance and reviewer sign-off are exposed cleanly?
  - Which sub-vertical has the sharpest pain today: merchant acquiring, B2B payments, or specialty lending?
