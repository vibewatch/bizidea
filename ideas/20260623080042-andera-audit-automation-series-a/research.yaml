competitors:
  - name: Andera
    stage: scale-up
    wedge: AI-native internal audit automation for multi-format control evidence and workpaper drafting.
    pricing: Not publicly disclosed.
    strength: Directly aligned with the new audit-automation thesis and already positioned around Fortune 100 control testing.
    weaknessVsUs: Starts at the very large-enterprise end of the market, leaving room for a more explicit listed-fintech and overlay-first wedge.
    sourceRefs:
      - 1
      - 2
      - 3
  - name: Optro (formerly AuditBoard)
    stage: incumbent
    wedge: Broad audit, internal-controls, and GRC workflow platform with AI layered across the suite.
    pricing: Not publicly disclosed.
    strength: Deep incumbent presence in public-company audit and internal-controls programs with an established workflow footprint.
    weaknessVsUs: Strong at workflow and control management, but less obviously purpose-built for fintech-specific evidence retrieval and exception routing.
    sourceRefs:
      - 21
      - 22
      - 23
  - name: Workiva
    stage: incumbent
    wedge: Unified reporting, GRC, and controlled collaboration platform tied into ERP, CRM, and disclosure workflows.
    pricing: Not publicly disclosed.
    strength: Strong cross-functional distribution into reporting, audit, and risk teams with a secure data-linking story.
    weaknessVsUs: Broader reporting platform scope can dilute focus on the last-mile evidence judgment problem inside quarterly testing.
    sourceRefs:
      - 20
  - name: MetricStream
    stage: incumbent
    wedge: Enterprise IRM, internal audit, and SOX program management for large regulated organizations.
    pricing: Not publicly disclosed.
    strength: Mature workflow depth for planning, testing, issue management, and centralized evidence storage.
    weaknessVsUs: Heavier enterprise implementation posture and less explicit specialization in listed-fintech artifact gathering.
    sourceRefs:
      - 24
      - 25
  - name: Big Four and co-sourcing firms
    stage: incumbent
    wedge: Services-led control testing, documentation, and remediation capacity sold as co-sourcing or managed programs.
    pricing: Retainer or time-and-materials services pricing.
    strength: High credibility with audit committees and the ability to flex human capacity into quarter-end crunches.
    weaknessVsUs: The economics still scale with labor, so the manual evidence chase remains largely intact.
    sourceRefs:
      - 14
      - 15
      - 16
      - 17
      - 18
      - 19
