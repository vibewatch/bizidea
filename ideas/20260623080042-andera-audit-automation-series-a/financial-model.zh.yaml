scenarios:
  downside:
    description: 审计师接受进展更慢，付费试点转化更晚，实施工作量比计划更多地停留在人工阶段。
    y3RevenueK: 4000.5
    y3EbitdaK: -680.5
    cashLowPointK: -117.5
    keyAssumptionChanges:
      - 第 4 季度第 3 年末客户数接近 13 而非 15。
      - 混合年度 ARPU 落在约 $350K，接近基准情形 $380K 的下方。
      - 毛利率约 72% 退出，因为定制部署工作持续存在。
  base:
    description: 连接器包变得可重复，试点按计划转化，第二控制族扩展拉升已实现 ARPU，且无需大规模现场团队。
    y3RevenueK: 4846.5
    y3EbitdaK: 0.7
    cashLowPointK: 618.6
    keyAssumptionChanges:
      - 客户在 M12 达到 3 个付费，Q4Y2 达到 10 个，Q4Y3 达到 15 个。
      - 混合年度 ARPU 从约 $300K 切入交易爬升至 Y3 约 $380K 和约 $396K 退出 ARR。
      - 毛利率从首批试点的高 40% 段爬升至 Q4Y3 的 75%，随部署标准化而改善。
  upside:
    description: 参考客户和合作伙伴渠道加速转化，更多客户扩展到第二控制族，实施工作量产品化速度快于计划。
    y3RevenueK: 6195.8
    y3EbitdaK: 1060.3
    cashLowPointK: 1206.2
    keyAssumptionChanges:
      - Q4Y3 客户数达到约 18 而非 15。
      - 混合年度 ARPU 进入低 $400K 区间，因为扩展在整个客户群中更早发生。
      - 毛利率接近 77% 退出，因为连接器复用比计划更快减少服务拖累。
sensitivity:
  - variable: ARPU
    downsideCase: 混合年度 ARPU 稳定在约 $350K，因为买家更多留在单控制族范围内，扩展更慢。
    baseCase: 混合年度 ARPU 在 Y3 达到约 $380K，Q4Y3 退出 ARR 约 $396K。
    upsideCase: 随着更多账户在 12 个月内追加第二控制族，混合年度 ARPU 推进到低 $400K 区间。
    y3RevenueImpactK: -510.0
    cashImpactK: -410.0
  - variable: CAC
    downsideCase: 有效 CAC 升至约 $220K，因为每次关单需要更多差旅、安全审查和创始人投入。
    baseCase: 模型 CAC 维持在每净新增活跃付费客户约 $177K。
    upsideCase: 合作伙伴来源的需求和参考客户将 CAC 拉近约 $150K。
    y3RevenueImpactK: -160.0
    cashImpactK: -360.0
  - variable: 流失率
    downsideCase: 若产品仍像项目式工具而非持久运营层，月度流失率接近 3.0%。
    baseCase: 客户上线生产后月度流失率维持在约 2.0%。
    upsideCase: 证据层嵌入季末关账日常后，月度流失率维持在约 1.5%。
    y3RevenueImpactK: -260.0
    cashImpactK: -220.0
  - variable: 销售周期
    downsideCase: 审计、安全和采购审查拖慢审批，试点转生产延长至约 150 天。
    baseCase: 基准情形假设与实时季末关账周期绑定的约 90–120 天试点转生产流程。
    upsideCase: 参考客户将审批压缩至约 75 天，更多客户提前落单。
    y3RevenueImpactK: -650.0
    cashImpactK: -430.0
  - variable: 毛利率
    downsideCase: 毛利率约 70–72% 退出，因为连接器例外和审查者质检持续偏重服务。
    baseCase: 毛利率 Q4Y3 达到 75%，单位经济模型基础上为 73%。
    upsideCase: 标准叠加路径和证据模板减少人工投入速度快于计划，毛利率达到 77–78%。
    y3RevenueImpactK: 0.0
    cashImpactK: -310.0
  - variable: 招聘节奏
    downsideCase: 两个规模扩张岗位提前约两个季度招聘，早于生产验证完全可重复。
    baseCase: 招聘按 A11 中以部署为先的节奏进行，Q4Y3 末 FTE 保持在 15 人。
    upsideCase: 最后一批规模扩张岗位推迟到下一轮融资后，因为实施保持比计划更干净。
    y3RevenueImpactK: 0.0
    cashImpactK: -240.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Pipeline[Design partners + referral pipeline] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionLogos[Production logos]
      ProductionLogos --> Expansion[Second control-family expansion]
      Expansion --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: 收入引擎
    finding: 基准收入来自活跃付费客户从 Y1 末 3 个增长到 Q4Y2 10 个、Q4Y3 15 个，同时每客户混合 ARR 从约 $300K 切入交易通过扩展爬升至约 $396K 退出 ARR。
  - checkName: 必须走对的事
    finding: 标准叠加部署必须保持在 45 天目标内，团队才能在毛利率不跌破计划线的前提下，在 Q4Y2 前支撑 10 个生产客户。
  - checkName: 模型失效条件
    finding: 若试点转化滑向中 40% 或实施持续过重，下行情形在盈亏平衡出现前会轻微走向负现金。
  - checkName: 下一轮融资故事
    finding: 下一次融资的论点是：10 个生产客户、4 个以上第二控制族扩展，以及 Q2Y3 前季度 EBITDA 亏损低于 $50K。
sanityChecks:
  ruleOf40: 第 3 年增长 127.8% + EBITDA 利润率 0.0% = 127.8%
  burnMultiple: Y2 消耗倍数约 0.4x，基于约 $1.2M EBITDA 亏损对应约 $2.6M 净新增 ARR；模型在 Y3 下半年实现季度 EBITDA 盈亏平衡。
  revenuePerFte: 第 3 年按期末 15 名 FTE 计算，每名 FTE 对应 $323K 收入（SaaS 基准 $200–400K）
  flags:
    - Y1 中，期末客户数（customersEop）包含付费试点和生产订阅，因此真正的生产客户数到 Y2 末才追上标题里的客户数。
    - 混合 ARPU 路径要求研究中 $300K 起始 ACV 随第二控制族附加向业务计划范围上半部分扩展。
    - 毛利率仅在标准部署保持在 45 天运营假设门槛附近且连接器定制化受控时，才能达到业务计划目标。
    - 现金按 EBITDA 建模；递延收入时间差、客户预付款或资本化安全工作可能使实际现金略提前或延后。
