slug: fintech-sox-evidence-layer
date: '2026-06-23'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-07
    unit: YYYY-MM
    source: '[business-plan.yaml date] 2026-06-23 商业计划日期后的第一个完整运营月。'
  - id: A2
    name: 种子轮关闭后期初现金
    value: $3.2M
    unit: USD
    source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd $3-5M + model cash trough] 基准情形取种子轮范围的中低端，以确保在第 2 年第 2 季度里程碑时仍有六个月缓冲。'
  - id: A3
    name: 收入单位
    value: 活跃付费客户
    unit: definition
    source: '[business-plan.yaml gtm.pricing + businessModel.revenueStreams] customersEop 包括任何已为实时试点或生产部署付费的客户。'
  - id: A4
    name: 付费试点定价
    value: 约 3 个月合计 $75K（约每月 $25K）
    unit: USD/logo
    source: '[business-plan.yaml investorMemo.firstCustomer.initialContract $75k-$125k paid pilot] 基准情形取试点区间下限，对早期变现保持保守估计。'
  - id: A5
    name: 起始生产 ACV
    value: $300K
    unit: USD/logo-year
    source: '[research.yaml bottomUpSizingDrivers $300k + business-plan.yaml gtm.pricing $250k-$400k] 首次生产部署定价接近研究市场中点。'
  - id: A6
    name: 活跃付费客户混合实现收入爬坡
    value: 第 1 年末约 $330K ARR；第 2 年约 $330K-$360K ARR；第 3 年约 $366K-$396K ARR
    unit: USD/logo-year
    source: '[A4 + A5 + business-plan.yaml businessModel.expansionLevers + investorMemo.mustBeTrue] 随着试点转化和第二控制族扩展在更多账户中出现，组合结构持续改善。'
  - id: A7
    name: 第 1 年付费客户路径
    value: M1-M12 期末付费客户数 = 0,0,0,1,1,1,2,2,2,3,3,3
    unit: active paying logos
    source: '[business-plan.yaml milestones 0-12 months + experimentRoadmap] 与第 1 年末 3 个付费试点和 2 个生产转化相吻合。'
  - id: A8
    name: 第 2–3 年付费客户路径
    value: Q1Y2 4；Q2Y2 6；Q3Y2 8；Q4Y2 10；Q1Y3 11；Q2Y3 13；Q3Y3 14；Q4Y3 15
    unit: active paying logos
    source: '[business-plan.yaml milestones 12-24 and 24-36 months + research.yaml market.som 15 logos at year 3] 基准情形触及 12–24 个月客户目标的低端和研究中 Y3 SOM 路径。'
  - id: A9
    name: 收入确认惯例
    value: 以期中活跃客户数和各期每个活跃付费客户的实际月收入折算期末客户计划
    unit: policy
    source: '[startup-finance heuristic] 假设新客户平均在月中或季中左右落单。'
  - id: A10
    name: 毛利率爬坡
    value: 第 1 年 48%-58%；第 2 年 60%-69%；第 3 年 71%-75%
    unit: gross margin percent
    source: '[business-plan.yaml businessModel.targetGrossMarginPct 70 + operatingAssumptions connector-bundle assumption] 早期部署服务偏重，直到打包连接器和审查者流程标准化后才改善。'
  - id: A11
    name: 招聘时间表
    value: M1 入职创始人/CEO、联合创始工程师和审计领域负责人；M3 解决方案工程师；M6 机器学习/数据工程师；M9 合作伙伴负责人；M12 第二名工程师；M15 第二名解决方案岗位；M18 首名 AE；M21 综合管理/运营；M24 第三名工程师；M27 第二名机器学习/数据岗位；M30 第三名解决方案岗位；M33 第二名 AE；M36 第四名工程师
    unit: timing
    source: '[business-plan.yaml team + strategicChoices.sequencingRationale + milestones] 招聘在 GTM 梯队扩张之前保持以产品和部署为重。'
  - id: A12
    name: 创始人含税现金薪酬
    value: $160K
    unit: USD/year
    source: '[business-plan.yaml team Founder CEO + startup-finance heuristic] 精简但合理的创始人薪资加工资税和福利。'
  - id: A13
    name: 工程师含税现金薪酬
    value: $220K
    unit: USD/year
    source: '[business-plan.yaml team Founding eng + startup-finance heuristic] ERP、IAM、工单和账本连接器需要高级集成工程人才。'
  - id: A14
    name: 审计领域负责人含税现金薪酬
    value: $200K
    unit: USD/year
    source: '[business-plan.yaml team Audit domain lead + startup-finance heuristic] 反映能编写证据充分性和审查者流程规则的资深 SOX 或审计运营人才。'
  - id: A15
    name: 解决方案/客户成功含税现金薪酬
    value: $170K
    unit: USD/year
    source: '[business-plan.yaml team Solutions engineer + startup-finance heuristic] 涵盖部署负责和客户侧流程梳理，无需建立大型服务团队。'
  - id: A16
    name: 机器学习/数据工程师含税现金薪酬
    value: $210K
    unit: USD/year
    source: '[business-plan.yaml team ML / data engineer + startup-finance heuristic] 反映审计级输出所需的数据标准化和证据检索深度。'
  - id: A17
    name: 销售/合作伙伴含税现金薪酬
    value: $200K
    unit: USD/year
    source: '[business-plan.yaml team Head of partnerships + gtm.channels + startup-finance heuristic] 包含企业差旅和创始人主导加合作伙伴主导销售的浮动薪酬。'
  - id: A18
    name: 综合管理/运营含税现金薪酬
    value: $140K
    unit: USD/year
    source: '[business-plan.yaml operations + startup-finance heuristic] 覆盖公司扩展到试点阶段之后的财务、供应商管理、合规协调和保险费用。'
  - id: A19
    name: 职能薪资分配
    value: 创始人 70% S&M / 30% G&A；工程 100% R&D；审计领域负责人 85% R&D / 15% G&A；解决方案 30% S&M / 50% R&D / 20% G&A；机器学习/数据 100% R&D；销售/合作伙伴 100% S&M；G&A 100% G&A
    unit: allocation
    source: '[business-plan.yaml team role rationales + operations] 薪资对应谁负责销售切口、谁负责产品化连接器和证据层、谁承担公司管理费用。'
  - id: A20
    name: 非薪资运营费用爬坡
    value: 每月 S&M/R&D/G&A 基础支出从启动时的 $10K/$18K/$12K 爬升至 Q4Y3 的 $26K/$29K/$19K，另加相当于收入 5% 的 S&M 可变支出
    unit: USDK/month
    source: '[startup-finance heuristic for seed enterprise SaaS selling into public-company buyers] 涵盖云计算、模型使用、差旅、法务、保险和安全开销。'
  - id: A21
    name: 现金转化政策
    value: EBITDA 近似代表经营现金变动
    unit: policy
    source: '[startup-finance heuristic] 在种子阶段规模下，资本支出、税务、债务服务和营运资金时差假设为非实质性影响。'
  - id: A22
    name: 稳态月度流失率
    value: 2.0%
    unit: percent per month
    source: '[startup-finance heuristic for early enterprise workflow SaaS] 年度合同和工作流粘性支撑低流失率，但模型相对成熟合规软件保持保守。'
  - id: A23
    name: CAC 计算惯例
    value: 以 Y2-Y3 的销售与营销支出除以 12 个净新增活跃付费客户
    unit: formula
    source: '[model calc using base-case S&M spend + business-plan.yaml gtm.funnelTargets] 捕捉初步验证后创始人主导、合作伙伴主导和首位客户经理的获客成本。'
  - id: A24
    name: 下一轮融资里程碑
    value: 达到 10 个生产客户、至少 4 次第二控制族扩展、标准部署不超过 45 天，且季度 EBITDA 亏损低于 $50K
    unit: milestone
    source: '[business-plan.yaml investorMemo.nextDiligence + milestones + fundingAsk.runwayMonths] 这是用于确定种子轮规模和六个月缓冲的验证关卡。'
  - id: A25
    name: 资金跑道目标
    value: 24 个月
    unit: months
    source: '[business-plan.yaml fundingAsk.runwayMonths 18 + model cash curve] 本轮规模确保在达到下一个融资里程碑时还有约六个月额外缓冲。'
