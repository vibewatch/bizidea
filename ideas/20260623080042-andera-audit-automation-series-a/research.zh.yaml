  fiveForces:
    supplierPower:
      score: 3
      rationale: 模型和云计算投入可获取，但将其转化为审计级证据处理仍需稀缺的领域专业知识和精细的控制建模。
      sourceRefs:
        - 1
        - 23
        - 29
        - 40
    buyerPower:
      score: 4
      rationale: 买家群体集中、采购流程繁琐，且已通过现有厂商和顾问支出，卖方必须相对实时的替代方案证明快速 ROI。
      sourceRefs:
        - 12
        - 13
        - 19
        - 31
        - 35
        - 36
        - 37
        - 38
        - 39
    threatOfEntrants:
      score: 3
      rationale: AI 基础组件比以前更易获取，但满足 PCAOB 证据和文档期望同时集成杂乱的企业系统，才是真正的壁垒所在。
      sourceRefs:
        - 7
        - 8
        - 9
        - 10
        - 23
        - 29
    threatOfSubstitutes:
      score: 5
      rationale: 买家已经可以组合报告平台、GRC 套件和联合外包人力来完成工作，尽管这个过程效率低下。
      sourceRefs:
        - 14
        - 16
        - 17
        - 18
        - 19
        - 20
        - 21
        - 24
        - 25
    competitiveRivalry:
      score: 4
      rationale: 相邻 GRC 和审计平台正在叠加 AI，战略买家和投资人持续投入该品类，差异化必须深入流程 UX 之下。
      sourceRefs:
        - 20
        - 21
        - 22
        - 23
        - 24
        - 25
        - 29
        - 30
  pestle:
    - factor: 政治
      impact: neutral
      point: 监管机构正在厘清技术辅助审计工作如何纳入上市公司保证体系，但并未降低证据标准。
      sourceRefs:
        - 7
        - 8
        - 9
        - 10
    - factor: 经济
      impact: positive
      point: SOX 项目成本上升和数百万美元的审计费，为能从季度测试中削减工时的自动化创造了真实的预算切口。
      sourceRefs:
        - 4
        - 31
        - 35
        - 36
        - 37
        - 38
        - 39
    - factor: 社会
      impact: positive
      point: 内部审计团队在人员更紧的情况下被要求覆盖更多领域，只要被信任，异常审查软件就具有吸引力。
      sourceRefs:
        - 12
        - 13
        - 19
    - factor: 技术
      impact: positive
      point: 多格式证据检索和智能体推理现在已足够强大，能在一套流程中处理电子表格、PDF、截图和日记账支持文件。
      sourceRefs:
        - 1
        - 2
        - 3
        - 20
        - 23
    - factor: 法律
      impact: negative
      point: 文档记录、证据充分性和内部审计独立性约束，限制了产品在认证流程中的自主程度。
      sourceRefs:
        - 8
        - 9
        - 10
        - 11
        - 40
  adoptionFrictionMatrix:
    - friction: 审计师对 AI 起草工作底稿的接受度
      severity: high
      affectedBuyer: 首席审计官或财务总监
      mitigation: 在循环中保留人工审批，并在每个草稿结论上展示引用的来源文件、IPE 核查和审查历史。
      sourceRefs:
        - 7
        - 8
        - 9
        - 10
        - 11
    - friction: 跨 ERP、IAM、工单和账本系统的集成蔓延
      severity: high
      affectedBuyer: IT 审计负责人
      mitigation: 先从三个控制族和最常见的来源系统起步，再拓展到边缘案例。
      sourceRefs:
        - 4
        - 15
        - 20
        - 24
    - friction: 现有 GRC 和报告技术栈中的叠加疲劳
      severity: medium
      affectedBuyer: SOX 项目经理
      mitigation: 作为嵌入现有控制库和报告流程的窄证据引擎来销售。
      sourceRefs:
        - 20
        - 21
        - 22
        - 24
        - 25
    - friction: 与联合外包和审计费谈判的预算竞争
      severity: medium
      affectedBuyer: 财务总监
      mitigation: 将 ROI 与避免的测试工时、降低的联合外包支出和减少的审计费超支挂钩，而非依赖通用 AI 说辞。
      sourceRefs:
        - 4
        - 19
        - 31
        - 35
        - 36
        - 37
        - 38
        - 39
market:
  tam:
    value: "$396.0M"
    rationale: >-
      以 Audit Analytics 摘要中 6600 余家注册机构为基数，筛选约 1,320 家多系统、
      非豁免上市机构，再按证据自动化叠加层约 $300k 的 ACV（捕获现有 SOX 和审计支出
