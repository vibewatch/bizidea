    mermaid: |
      quadrantChart
        title Public-company SOX automation map
        x-axis Generic workflow --> Evidence-specialized
        y-axis Low urgency --> Quarter-close urgency
        quadrant-1 Specialist urgency
        quadrant-2 Embedded platforms
        quadrant-3 Lightweight automation
        quadrant-4 Manual labor
        Workiva: [0.35, 0.58]
