jobsToBeDone:
  - job: >-
      When dozens of properties buy recurring supplies from local and national
      vendors, help our shared-services finance team catch overpriced or
      off-contract purchases before invoices are paid, so we can protect
      property margins without slowing operations.
    currentAlternative: Manual AP spot checks, distributor reports, and
      spreadsheet variance reviews after month-end
    successMetric: Dollars of leakage prevented per property and share of
      invoices reviewed before payment
  - job: >-
      When owners ask why one property's housekeeping or breakfast costs are
      drifting above plan, help our procurement and finance leaders identify the
      supplier, SKU, and workflow causing the variance, so we can fix it across
      the portfolio instead of one invoice at a time.
    currentAlternative: Property P&L reviews, ad hoc vendor calls, and manual
      cross-property comparisons
    successMetric: Time to identify root-cause supplier variance and realized
      savings from corrective actions
