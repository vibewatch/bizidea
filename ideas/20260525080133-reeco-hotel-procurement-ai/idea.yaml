topRisks:
  - name: Platform overlap
    description: Broad hotel procurement or AP suites could add basic variance alerts and make the wedge look like a feature.
    mitigation: Land above existing systems as the cross-property intelligence layer, win on faster savings proof, and focus on hotel-specific normalization and benchmarks that suites lack.
  - name: Messy supplier data
    description: Hotel invoices often arrive with inconsistent item names, local vendors, and weak PO discipline, which can slow model accuracy and trust.
    mitigation: Start with a few recurring spend categories, add human-in-the-loop category mapping, and show explainable evidence for each savings recommendation before automating more deeply.
  - name: Fragmented ownership incentives
    description: Management companies may capture the workload of rollout while property owners capture part of the savings, which can complicate purchasing decisions.
    mitigation: Price by verified savings and portfolio efficiency, target operators with centralized shared services first, and package owner-facing reporting that helps management justify adoption.
