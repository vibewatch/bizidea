problem: >-
  Hotel management companies rarely buy every room supply, linen, amenity, food
  item, and MRO part through one contract or one system. Shared-services finance
  teams still receive invoices from hundreds of local suppliers, then discover
  price drift, duplicate charges, wrong GL coding, and off-contract purchases
  only after payment or month-end review. That means margin leakage hides inside
  ordinary AP work, especially for operators managing dozens of franchised
  properties with lean corporate teams.
targetUser:
  primary: >-
    VP Finance or corporate director of procurement at a 15-80 property
    select-service or extended-stay hotel management company with centralized AP
    and decentralized property purchasing
  secondary: >-
    Shared-services AP managers and regional operations leaders responsible for
    supplier compliance, invoice review, and property-level margin targets
  buyer: CFO or chief operating officer of the hotel management company
startupThesis:
  nonObviousInsight: >-
    The next winning hotel AI company is not another broad PMS, guest chatbot,
    or generic AP bot. Reeco's traction shows hotels will first pay where messy
    supplier sprawl and invoice work directly move margins. Once invoice lines
    can be coded in seconds, the scarce product becomes a hotel-specific margin
    intelligence layer that knows which purchases are overpriced, noncompliant,
    duplicated, or substitutable across properties before cash leaves the bank.
  beachhead: >-
    Pre-payment supplier variance control for U.S. select-service and
    extended-stay hotel management companies operating 15-80 franchised
    properties across multiple brands, with centralized AP but local purchasing
    for linens, amenities, food, and maintenance supplies
  wedge: >-
    A hotel supplier margin guard that normalizes invoice lines and purchase
    requests across properties, flags price variance and off-contract buying,
    and recommends approved substitutes or vendor consolidations before payment
  whyNowCatalyst: >-
    Reeco's adoption across more than 1,000 properties and 90 management
    companies, plus sub-30-second invoice coding, shows hotel back-office data
    is now structured enough for real-time savings actions just as operators are
    actively buying software to cut labor and procurement inefficiency.
  ventureScalePath: >-
    Start with pre-payment savings and compliance for hotel management
    companies, then expand into rebate capture, supplier scorecards,
    autonomous replenishment, contract negotiation benchmarks, and eventually a
    broader hospitality spend operating system spanning hotels, resorts,
    senior-living operators, and multi-site lodging platforms.
solution: >-
  The product plugs into the invoice inbox, AP workflow, and purchasing feeds
  a management company already uses, even if properties still buy through
  email, spreadsheets, or vendor portals. It maps messy line items into a
  hotel-specific catalog, compares every invoice against prior property spend,
  approved supplier lists, and cross-property benchmarks, then sends finance a
  queue of preventable margin leaks before payment. The first automation is not
  autonomous buying; it is a high-confidence exception workflow covering price
  jumps, duplicate charges, wrong cost-center coding, and obvious substitute
  opportunities for recurring supplies. Over time, the system learns which
  vendors, SKUs, pack sizes, and property types create the most leakage and
  turns that memory into negotiated savings and better purchasing rules across
  the portfolio.
goToMarketSeed:
  firstCustomer: >-
    A 30-property U.S. hotel management company operating Hampton Inn, Holiday
    Inn Express, and Residence Inn assets under separate ownership groups, with
    a 6-12 person shared-services finance team and frequent local buying for
    housekeeping, breakfast, linen, and MRO categories
  buyingTrigger: >-
    A margin-compression quarter, ownership pressure to reduce property-level
    operating costs, or a finance transformation project that exposes how many
    supplier invoices still require manual review and post-payment cleanup
  currentAlternative: >-
    Manual AP review in email and spreadsheets, property-level purchasing
    discretion, distributor reports, and whatever controls sit inside incumbent
    procurement or accounting software
  switchingReason: >-
    The wedge surfaces immediate, property-level savings and policy exceptions
    without forcing a full rip-and-replace of the management company's existing
    PMS, ERP, or AP stack, which makes it easier to justify than a broad
    platform migration
  pricingHypothesis: >-
    Platform fee by property and monthly invoice volume, plus an optional
    savings-share module tied to verified pre-payment leakage prevented or
    vendor consolidation gains
