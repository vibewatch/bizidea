modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Outbound + partner leads] --> Pilots[Paid pilots]
      Pilots --> Rollouts[Live properties under monitoring]
      Rollouts --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash and runway]
      Rollouts --> SavingsProof[Verified savings case studies]
      SavingsProof --> Rollouts
modelSanity:
- checkName: 收入引擎
  finding: 基准情境的收入引擎，是把小规模 5–10 家物业试点转成组合 全面铺开，到 Q4Y3 达到 690 家上线物业，单价为每个物业每年 $6K。
- checkName: 必须跑顺的地方
  finding: 模型要求试点到 全面铺开 的转化率接近 BP 设定的 50%+，这样销售岗位才能站在证据之上放大，而不是背着重服务交付往前冲。
- checkName: 模型失效条件
  finding: 如果销售周期拉长 2 个季度、流失率升向 1.8%，而伙伴带来的 销售线索 还没出现，悲观情境下现金会转负。
- checkName: 下一轮融资证明点
  finding: 一旦公司到 Q4Y2 跑到约 360 家上线物业、2 个年度 全面铺开 和 1 条可复用转介绍路径，就有资格为下一轮融资给出充分证明。
sanityChecks:
  ruleOf40: 第 3 年增长率 150% + EBITDA 利润率 -5.0% = 145.0%。
  burnMultiple: 第 2 年 烧钱倍数 约 0.5x，对应 $1.68M 的净新增 ARR；第 3 年随着 铺开 扩张追上 运营费用，烧钱倍数 改善到约 0.1x。
  revenuePerFte: 第 3 年年末每个 FTE 对应 $246K 年收入；在 690 家上线物业时，退出 ARR 口径约为每个 FTE $296K（对比 SaaS 常见基准约 $200K–$400K）。
  flags:
  - 上线物业爬坡默认到 Y2H2 前至少有 2 个可引用试点完成转化，并出现 1 条伙伴辅助的 销售线索 来源；如果这些证明延后，第 3 年曲线就过于激进。
  - 收入按期末上线物业数计费，因此如果实施集中堆在季度末，真实开票时间可能会略晚。
  - CAC 和 LTV 按单个上线物业计算，但真实 GTM 支出是按管理公司 客户 发生，因此早期合同规模波动会比这套模型呈现得更大。
