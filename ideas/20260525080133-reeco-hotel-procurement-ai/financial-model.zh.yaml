slug: hotel-supplier-margin-guard
date: '2026-05-25'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: 从 2026-05-25 的商业计划日期后第一个完整月份开始。
- id: A2
  name: 每个上线物业的基础 SaaS 价格
  value: $6,000 每年 / $500 每月
  unit: USD_per_property_year
  source: '[research market.bottomUpSizingDrivers; BP gtm.pricing] 调研把这层窄覆盖估到每家物业每年约 $6,000，而 BP 也写明定价应按物业计费，并设置组合最低消费。'
- id: A3
  name: 目标毛利率
  value: 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 业务计划把目标毛利率定在 70%。'
- id: A4
  name: 基础上线物业爬坡
  value: Y1 M1-M12：0、0、0、6、8、10、16、24、32、45、60、80；Y2 Q1-Q4：120、180、260、360；Y3 Q1-Q4：450、540、620、690。
  unit: live_properties
  source: '[BP milestones; BP experimentRoadmap; research market.som] 爬坡从第 1 年的一个 5–10 家物业付费试点起步，第 2 年转成多个全面铺开项目，第 3 年年底落在调研约 700 家物业的 SOM 之下。'
- id: A5
  name: 首个付费试点范围
  value: M4 上线 6 家物业，到 M6 扩到 10 家
  unit: live_properties
  source: '[BP investorMemo.initialContract; BP milestones 0-12 months] BP 计划第 1 年先做一个 5–10 家物业的付费试点。'
- id: A6
  name: 招聘节奏
  value: M1 创始人和创始工程师；M2 产品与实施负责人；M4 酒店解决方案分析师；M7 企业销售；M8 第二名工程师；M10 客户成功负责人；Q1Y2 第三名工程师；Q2Y2 第二名销售；Q3Y2 第二名分析师；Q4Y2 G&A；Q1Y3 第四名工程师；Q2Y3 第二名产品与实施成员；Q4Y3 第二名客户成功成员。
  unit: hiring_timing
  source: '[BP team; BP strategicChoices.sequencingRationale] 团队先补产品和实施，再在证据跑通后补 GTM，最后为规模化叠加覆盖层。'
- id: A7
  name: 福利和工资税负担
  value: 现金工资上浮 20%
  unit: percent
  source: 初创公司财务经验值：美国种子期软件团队通常需要在现金工资上再加约 15–25% 的工资税和福利。
- id: A8
  name: 创始人薪酬
  value: $120,000 基本工资 / $144,000 全成本
  unit: USD_per_FTE_year
  source: 以精益 pre-seed 创始人工资为锚，并满足 BP 对 18–24 个月资本效率的要求。
- id: A9
  name: 工程薪酬
  value: $160,000 基本工资 / $192,000 全成本
  unit: USD_per_FTE_year
  source: 美国早期 垂直 SaaS 工程招聘的常见经验值。
- id: A10
  name: 产品与实施薪酬
  value: $140,000 基本工资 / $168,000 全成本
  unit: USD_per_FTE_year
  source: 企业工作流软件里“产品 + 实施”复合型人才的常见经验值。
- id: A11
  name: 解决方案分析师薪酬
  value: $110,000 基本工资 / $132,000 全成本
  unit: USD_per_FTE_year
  source: 支持上线与 QA 的酒店行业分析师常见经验值。
- id: A12
  name: 销售薪酬
  value: $150,000 基薪折算 / $180,000 全成本
  unit: USD_per_FTE_year
  source: '[BP team; BP gtm.channels] 创始人主导的企业销售，在后期再补专职销售，支撑一个全成本达到中六位数的销售岗位。'
- id: A13
  name: 客户成功薪酬
  value: $120,000 基本工资 / $144,000 全成本
  unit: USD_per_FTE_year
  source: 以铺开转化和报告复盘为重心的客户成功负责人的常见经验值。
- id: A14
  name: G&A 薪酬
  value: $100,000 基本工资 / $120,000 全成本
  unit: USD_per_FTE_year
  source: 第 1 年后再补精简财务与运营支持岗位的常见经验值。
- id: A15
  name: 非薪资运营支出
  value: 第 1 年 $257K、第 2 年 $270K、第 3 年 $456K，覆盖托管、数据工具、差旅、安全、法务、保险和软件。
  unit: USDK
  source: '[BP operations; BP fundingAsk.useOfFundsSummary] BP 需要集成、审计控制、月度节省复盘和伙伴合作，但排期上明确避免养一支重服务团队。'
- id: A16
  name: pre-seed 融资完成后的期初现金
  value: $2.4M
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2-3M] 模型采用 $2.4M，接近给定区间中位数，因为这笔钱既能跑到下一里程碑，也还能留下约 6 个月缓冲。'
- id: A17
  name: 收入确认约定
  value: 第 1 年按每个上线物业每月 $0.5K 确认收入；第 2–3 年按每个上线物业每季度 $1.5K 确认收入，计费基数取期末上线物业数。
  unit: modeling_rule
  source: 基于 A2 中每个物业每年 $6,000 的价格做建模，使收入机械地和上线物业数量绑定。
- id: A18
  name: 每个上线物业的混合 CAC
  value: $3,000
  unit: USD_per_property
  source: 初创公司财务经验值：约 $75K 的混合获客成本，除以一个首批 25 家物业铺开；与 BP 的直销加伙伴辅助打法相符。
- id: A19
  name: 单位经济模型里的月度流失率
  value: 1.2%
  unit: percent_per_month
  source: 适用于高粘性财务工作流的初创公司经验值，同时考虑到 BP 提到业主与运营方未必总能对齐的风险。
- id: A20
  name: 平均首批铺开规模
  value: 每个管理公司客户平均 25 家上线物业
  unit: properties_per_logo
  source: '[BP initialContract; research validationSignals] BP 从 5–10 家物业试点起步，再扩到 $75K–$180K 的年合约；调研里有 42 家物业运营方的案例，因此取 25 家物业作为偏保守的混合基数。'
- id: A21
  name: 融资测算规则
  value: 融资额度应足以跑到第 2 年的组合铺开里程碑，并为第 3 年保留约 6 个月缓冲。
  unit: policy
  source: '[BP fundingAsk runwayMonths 18; BP milestones 12-24 months] 业务计划要求 18 个月跑道；模型额外补上了 6 个月缓冲。'
- id: A22
  name: 现金流简化假设
  value: 期末现金 = 期初现金 + 累计 EBITDA；营运资本波动、资本开支和债务影响视为不重大。
  unit: formula
  source: 对于一套种子前软件模型来说，递延收入、资本开支和债务复杂度都很有限，因此可用这个简化。
