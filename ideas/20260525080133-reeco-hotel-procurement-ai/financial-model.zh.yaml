scenarios:
  downside:
    description: 付费试点转年度 铺开 的转化推迟，伙伴杠杆迟迟起不来，流失率又维持高位，导致公司到第 3 年仍没跨过高效规模门槛。
    y3RevenueK: 2280.0
    y3EbitdaK: -640.0
    cashLowPointK: -140.0
    keyAssumptionChanges:
    - 付费试点转年度 铺开 的比例降到约 35%，而不是 50%+。
    - 伙伴带来的 销售线索 比基准计划晚 2 个季度才出现。
    - 每月物业流失率从 1.2% 升到 1.8%。
  base:
    description: 公司按 商业计划 里程碑推进：按物业定价、毛利率 70%，并维持一条精益但稳定的招聘爬坡。
    y3RevenueK: 3450.0
    y3EbitdaK: -171.0
    cashLowPointK: 373.8
    keyAssumptionChanges:
    - 价格维持在每个上线物业每年 $6,000。
    - 上线物业爬坡到 Q4Y3 达到 690 家。
    - 招聘按 A6 排期执行，不额外补一支大服务团队。
  upside:
    description: 节省证据更快沿伙伴转介绍扩散，铺开 规模更早放大，基准层也开始推高组合扩张。
    y3RevenueK: 4290.0
    y3EbitdaK: 310.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - 到 Q2Y2，伙伴和转介绍渠道就能贡献有意义的合格 销售线索。
    - 平均 铺开 从约 25 家物业，提早扩到每个 客户 35–40 家。
    - 基准和业主报告模块在第 3 年把有效 ARPU 拉高约 10%。
