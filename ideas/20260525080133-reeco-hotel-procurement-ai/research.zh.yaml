  source: '[12]'
- driver: 相关滩头占比
  value: 精选服务与长住段约占客房供给的 ~74%；折算约 ~40.7k 家物业
  source: '[10] + 计算'
- driver: 每个物业的隐含年支出
  value: 窄层采购/AP 控制软件按每家物业 $6,000
  source: 估算
- driver: 可服务组合过滤器
  value: 假设相关物业中有 20% 位于集中化的多物业运营方组合里
  source: 计算
