topRisks:
- name: 平台能力重叠
  description: 大型酒店采购或 AP 套件可能补上基础价差提醒，让这条切口看起来只是一项功能。
  mitigation: 先叠在现有系统之上，作为跨物业 判断层切进去；靠更快拿出节省证据，以及套件没有的酒店专用标准化和基准能力取胜。
- name: 供应商数据太脏
  description: 酒店发票里的品名常常不一致，本地供应商很多，PO 纪律也弱，这会拖慢模型精度和客户信任的建立。
  mitigation: 先从少数重复性支出品类起步，加入人工校验的品类映射，并在更深自动化之前，让每条节省建议都带上可解释证据。
- name: 业主与管理方激励割裂
  description: 管理公司承担上线和推进工作，但节省的一部分可能被物业业主拿走，采购决策因此会更难推进。
  mitigation: 按核验后的节省金额和组合效率定价，优先打共享服务更集中的运营方，并配上面向业主的报告，帮助管理方把采用理由讲清楚。
