problem: 酒店管理公司很少能把所有客房用品、布草、备品、食品和 MRO 零件都放进同一份合同、同一套系统里采购。共享服务财务团队仍然要接收数百家本地供应商发来的发票，往往等到付款后或月末复盘时，才发现价格漂移、重复收费、总账编码错误和合同外采购。结果就是，利润流失藏在日常 AP 工作里，尤其是那些用精简总部团队管理几十家加盟酒店的运营方。
targetUser:
  primary: 在一家拥有 15–80 家物业的精选服务或长住型酒店管理公司里，负责集中式 AP、但采购下放到各物业的财务副总裁或集团采购总监
  secondary: 负责供应商合规、发票审核和单店利润目标的共享服务 AP 经理与区域运营负责人
  buyer: 酒店管理公司的 CFO 或 COO
startupThesis:
  nonObviousInsight: 下一家真正能打赢酒店 AI 的公司，不会是又一个大而全 PMS、住客聊天机器人，或通用 AP 机器人。Reeco 的进展说明，酒店最先愿意付费的，是供应商分散和发票处理会直接牵动利润的地方。一旦发票行项目能在几秒内完成编码，真正稀缺的产品就变成一层酒店专用的利润判断层：在现金出账前，先看出哪些采购价格过高、违规、重复，或者能在不同物业之间换品替代。
  beachhead: 面向美国精选服务与长住型酒店管理公司，先切付款前的供应商价差控制。这些公司通常运营 15–80 家跨品牌加盟酒店，AP 集中，但布草、备品、食品和维修物资仍由各物业本地采购。
  wedge: 做一层酒店供应商利润防漏系统，把各物业的发票行和采购申请拉到同一标准下，提前标出价格异常、合同外采购，并在付款前给出已批准替代品或供应商整合建议。
  whyNowCatalyst: Reeco 已覆盖 1,000 多家物业和 90 家管理公司，再加上 30 秒内完成发票编码，说明酒店后台数据已经足够结构化，能支持实时节省动作；而酒店运营方也正处在主动购买软件来压人工和采购低效的阶段。
  ventureScalePath: 先从酒店管理公司的付款前节省与合规切入，再扩到返点回收、供应商评分卡、自动补货、合同谈判基准，最终做成覆盖酒店、度假村、养老社区运营方和多点住宿平台的酒店业支出操作系统。
solution: 产品接入管理公司现有的发票邮箱、AP 流程和采购数据流，就算各物业还在用邮件、表格或供应商门户下单也能接。系统先把混乱的行项目映射成酒店专用目录，再把每张发票与历史物业支出、已批准供应商名单和跨物业基准比一遍，在付款前把本可避免的利润流失排成一个队列交给财务。第一步自动化不是自动采购，而是一套高置信度的异常流程，先盯价格跳升、重复收费、成本中心编码错误，以及重复性物料里明显可替换的机会。时间一长，系统会记住哪些供应商、SKU、包装规格和物业类型最容易漏钱，再把这份记忆变成整个组合里的谈判节省和更好的采购规则。
goToMarketSeed:
  firstCustomer: 一家拥有 30 家美国酒店的管理公司，资产分布在 Hampton Inn、Holiday Inn Express 和 Residence Inn，不同物业隶属不同业主集团，共享服务财务团队只有 6–12 人，而客房清洁、早餐、布草和 MRO 品类经常需要本地采购。
  buyingTrigger: 单季利润被压缩、业主要求降低单店运营成本，或财务转型项目把仍需人工审核和付款后补救的大量供应商发票暴露出来。
  currentAlternative: 靠邮件和表格做人工 AP 审核，允许各物业自行采购，再叠加分销商报表，以及现有采购或会计软件里那点基础控制。
  switchingReason: 这层切口能立刻把单店节省和策略例外翻出来，又不用把管理公司现有的 PMS、ERP 或 AP 系统整套替换掉，因此比推动一次大平台迁移更容易立项。
  pricingHypothesis: 按物业数和月度发票量收平台费，再叠加一个可选的节省分成模块，绑定经核验的付款前防漏金额或供应商整合收益。
