jobsToBeDone:
- job: 当几十家物业都在向本地和全国性供应商采购重复性物料时，帮我们的共享服务财务团队在发票付款前抓出买贵了或合同外采购的项目，这样既能守住单店利润，也不用拖慢运营。
  currentAlternative: 人工抽查 AP、看分销商报表，再在月末之后用表格复盘差异
  successMetric: 每家物业拦下的流失金额，以及付款前被审过的发票占比
- job: 当业主追问为什么某家物业的客房清洁或早餐成本偏离预算时，帮采购和财务负责人快速定位是哪家供应商、哪个 SKU、哪段流程造成了差异，这样我们修的是整个组合的问题，而不是逐张发票救火。
  currentAlternative: 看单店 P&L、临时打供应商电话，再手工做跨物业对比
  successMetric: 定位供应商差异根因所需时间，以及纠偏动作真正兑现的节省金额
