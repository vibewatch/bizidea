modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Outbound + partner leads] --> Pilots[Paid pilots]
      Pilots --> Rollouts[Live properties under monitoring]
      Rollouts --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash and runway]
      Rollouts --> SavingsProof[Verified savings case studies]
      SavingsProof --> Rollouts
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by turning small 5-10 property pilots into portfolio rollouts that reach 690 live properties by Q4Y3 at $6K per property per year."
  - checkName: Must go right
    finding: "The model needs pilot-to-rollout conversion near the BP's 50%+ target so sales hires can scale from proof instead of carrying a services-heavy motion."
  - checkName: Model breaks if
    finding: "Cash goes negative in the downside case if sales cycles stretch by two quarters and churn rises toward 1.8% before partner-sourced pipeline shows up."
  - checkName: Next-round proof
    finding: "The next financing is justified once the company reaches about 360 live properties, two annual rollouts, and one repeatable referral path by Q4Y2."
sanityChecks:
  ruleOf40: "Y3 growth 150% + EBITDA margin -5.0% = 145.0%."
  burnMultiple: "Y2 burn multiple is about 0.5x on $1.68M of net new ARR; Y3 burn multiple improves to about 0.1x as rollout expansion catches up to opex."
  revenuePerFte: "$246K Y3 revenue per year-end FTE; about $296K exit ARR per FTE at 690 live properties (benchmark roughly $200K-$400K SaaS)."
  flags:
    - "The live-property ramp assumes at least two referenceable pilot conversions plus one partner-assisted pipeline source by Y2H2; if those proofs slip, the Y3 curve is too aggressive."
    - "Revenue uses end-of-period live-property counts as the billing base, so real invoices could land modestly later if implementations bunch at quarter-end."
    - "CAC and LTV are measured per live property, but actual go-to-market spend will be incurred per management-company logo, so early contract-size variance will be wider than this model shows."
