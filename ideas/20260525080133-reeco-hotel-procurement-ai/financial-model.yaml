slug: hotel-supplier-margin-guard
date: "2026-05-25"
currency: USD
modelStartMonth: "2026-06"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-06"
    unit: YYYY-MM
    source: "Starts the first full month after the 2026-05-25 business-plan date."
  - id: A2
    name: "Base SaaS price per live property"
    value: "$6,000 per year / $500 per month"
    unit: USD_per_property_year
    source: "[research market.bottomUpSizingDrivers; BP gtm.pricing] Research sizes the narrow overlay at roughly $6,000 annual spend per property, and the BP says pricing should be property-based with a portfolio minimum."
  - id: A3
    name: "Gross margin target"
    value: "70%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] The business plan targets 70% gross margin."
  - id: A4
    name: "Base live-property ramp"
    value: "Y1 M1-M12: 0, 0, 0, 6, 8, 10, 16, 24, 32, 45, 60, 80; Y2 Q1-Q4: 120, 180, 260, 360; Y3 Q1-Q4: 450, 540, 620, 690."
    unit: live_properties
    source: "[BP milestones; BP experimentRoadmap; research market.som] The ramp starts with one 5-10 property paid pilot in year 1, converts multiple pilots in year 2, and finishes just under the researched ~700-property year-3 SOM."
  - id: A5
    name: "First paid pilot scope"
    value: "6 live properties in M4, scaling to 10 by M6"
    unit: live_properties
    source: "[BP investorMemo.initialContract; BP milestones 0-12 months] The BP calls for a 5-10 property paid pilot in year 1."
  - id: A6
    name: "Hiring schedule"
    value: "M1 founder and founding engineer; M2 product and implementation lead; M4 hospitality solutions analyst; M7 enterprise seller; M8 second engineer; M10 customer success lead; Q1Y2 third engineer; Q2Y2 second seller; Q3Y2 second analyst; Q4Y2 G&A; Q1Y3 fourth engineer; Q2Y3 second product and implementation hire; Q4Y3 second customer success hire."
    unit: hiring_timing
    source: "[BP team; BP strategicChoices.sequencingRationale] The plan staffs product and implementation first, then adds GTM only after proof, then layers coverage for scale."
  - id: A7
    name: "Benefits and payroll tax load"
    value: "20% on top of cash salary"
    unit: percent
    source: "Startup-finance heuristic: U.S. seed-stage software teams typically add roughly 15-25% for payroll taxes and benefits."
  - id: A8
    name: "Founder compensation"
    value: "$120,000 base / $144,000 fully loaded"
    unit: USD_per_FTE_year
    source: "Startup-finance heuristic anchored to a lean pre-seed founder salary and the BP's 18-24 month capital efficiency requirement."
  - id: A9
    name: "Engineering compensation"
    value: "$160,000 base / $192,000 fully loaded"
    unit: USD_per_FTE_year
    source: "Startup-finance heuristic for early U.S. vertical SaaS engineering hiring."
  - id: A10
    name: "Product and implementation compensation"
    value: "$140,000 base / $168,000 fully loaded"
    unit: USD_per_FTE_year
    source: "Startup-finance heuristic for product-plus-implementation talent in enterprise workflow software."
  - id: A11
    name: "Solutions analyst compensation"
    value: "$110,000 base / $132,000 fully loaded"
    unit: USD_per_FTE_year
    source: "Startup-finance heuristic for hospitality domain analysts supporting onboarding and QA."
  - id: A12
    name: "Sales compensation"
    value: "$150,000 base-equivalent / $180,000 fully loaded"
    unit: USD_per_FTE_year
    source: "[BP team; BP gtm.channels] Founder-led enterprise sales with a later dedicated seller supports a mid-six-figure loaded sales seat."
  - id: A13
    name: "Customer success compensation"
    value: "$120,000 base / $144,000 fully loaded"
    unit: USD_per_FTE_year
    source: "Startup-finance heuristic for a rollout-conversion and reporting-focused customer success lead."
  - id: A14
    name: "G&A compensation"
    value: "$100,000 base / $120,000 fully loaded"
    unit: USD_per_FTE_year
    source: "Startup-finance heuristic for lean finance and operations coverage added after year 1."
  - id: A15
    name: "Non-payroll operating spend"
    value: "Y1 $257K, Y2 $270K, Y3 $456K across hosting, data tooling, travel, security, legal, insurance, and software."
    unit: USDK
    source: "[BP operations; BP fundingAsk.useOfFundsSummary] The BP requires integrations, audit controls, monthly savings reviews, and partner work, but the sequencing explicitly avoids building a heavy services bench."
  - id: A16
    name: "Opening cash after pre-seed close"
    value: "$2.4M"
    unit: USDM
    source: "[BP fundingAsk targetFundingRangeUsd $2-3M] The model uses $2.4M, near the middle of the stated range, because it reaches the next milestone and still leaves roughly a six-month buffer."
  - id: A17
    name: "Revenue recognition convention"
    value: "Revenue equals $0.5K per live property-month in Y1 and $1.5K per live property-quarter in Y2-Y3 using the end-of-period live-property count."
    unit: modeling_rule
    source: "Modeling heuristic anchored to the $6,000 annual property price in A2 so revenue stays mechanically tied to live properties."
  - id: A18
    name: "Blended CAC per live property"
    value: "$3,000"
    unit: USD_per_property
    source: "Startup-finance heuristic: roughly $75K blended logo acquisition cost divided by an initial 25-property rollout, consistent with the BP's direct outbound plus partner-assisted motion."
  - id: A19
    name: "Monthly churn for unit economics"
    value: "1.2%"
    unit: percent_per_month
    source: "Startup-finance heuristic for sticky finance workflows, tempered by the BP risk that owners and operators may not always align."
  - id: A20
    name: "Average initial rollout size"
    value: "25 live properties per management-company logo"
    unit: properties_per_logo
    source: "[BP initialContract; research validationSignals] The BP starts with 5-10 property pilots and expands to $75K-$180K annual rollouts; the research cites a 42-property operator example, so 25 properties is a conservative blended base."
  - id: A21
    name: "Funding sizing rule"
    value: "Raise enough to reach the Y2 portfolio-rollout milestone and keep about 6 months of buffer for Y3."
    unit: policy
    source: "[BP fundingAsk runwayMonths 18; BP milestones 12-24 months] The business plan asks for 18 months; the model adds the required 6-month buffer."
  - id: A22
    name: "Cash flow simplification"
    value: "Ending cash equals opening cash plus cumulative EBITDA; working-capital swings, capex, and debt are assumed immaterial."
    unit: formula
    source: "Startup-finance heuristic for a pre-seed software model with modest deferred-revenue and capex complexity."
