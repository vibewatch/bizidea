scenarios:
  downside:
    description: "Pilot-to-rollout conversion slips, partner leverage arrives late, and churn stays elevated, leaving the company below efficient scale by year 3."
    y3RevenueK: 2280.0
    y3EbitdaK: -640.0
    cashLowPointK: -140.0
    keyAssumptionChanges:
      - "Paid-pilot to annual-rollout conversion falls to roughly 35% instead of 50%+."
      - "Partner-sourced pipeline starts two quarters later than the base plan."
      - "Monthly property churn rises from 1.2% to 1.8%."
  base:
    description: "The company hits the business-plan milestones with property-based pricing, 70% gross margin, and a lean but steady hiring ramp."
    y3RevenueK: 3450.0
    y3EbitdaK: -171.0
    cashLowPointK: 373.8
    keyAssumptionChanges:
      - "Price stays at $6,000 per live property per year."
      - "The live-property ramp reaches 690 by Q4Y3."
      - "Hiring follows the sequencing in A6 without adding a large services team."
  upside:
    description: "Savings proof travels faster through partner referrals, rollout size expands sooner, and the benchmark layer starts to lift portfolio expansion."
    y3RevenueK: 4290.0
    y3EbitdaK: 310.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
      - "Partner and referral channels contribute meaningful qualified pipeline by Q2Y2."
      - "Average rollout expands from about 25 properties toward 35-40 properties per logo."
      - "Benchmark and owner-reporting modules lift effective ARPU by about 10% in Y3."
