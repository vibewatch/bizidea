scenarios:
  downside:
    description: 预算释放更慢、适配器复用更弱，会拖慢 plant-equivalent 扩张，并让毛利率持续低于目标。
    y3RevenueK: 1987.5
    y3EbitdaK: -646.0
    cashLowPointK: -200.85
    keyAssumptionChanges:
    - 把 Y2 期末活跃单位下调到 10 个，Y3 期末下调到 18 个。
    - Y3 综合年 ARPU 维持在 $150K，而不是 $165K。
    - 成熟期毛利率维持在 65%-67%，因为部署仍然更偏服务。
  base:
    description: 创始人主导销售把 3 个付费 design partner 转成多工厂项目，随后 integrator 转介绍和 benchmark upsell 带来温和扩张。
    y3RevenueK: 2970.0
    y3EbitdaK: 113.49
    cashLowPointK: 672.73
    keyAssumptionChanges:
    - Y1 拿下 3 个付费 design partner，并在 Q4Y2 前做到 14 个活跃单位。
    - Y3 期末做到 22 个活跃 plant-equivalent rollout，综合年 ARPU 为 $165K。
    - 只有在模板和适配器认证降低部署摩擦后，毛利率才爬到 70%+。
  upside:
    description: 预算归属更早理顺，integrator 伙伴加速成交，高级 reporting upsell 的附着速度也快于模型。
    y3RevenueK: 3675.0
    y3EbitdaK: 642.59
    cashLowPointK: 755.18
    keyAssumptionChanges:
    - 依靠更快的多工厂复制，在 Q4Y2 前做到 16 个活跃单位，在 Q4Y3 前做到 26 个。
    - 借助高级 benchmark 和审计模块，把 Y3 综合年 ARPU 提升到 $175K。
    - 随着伙伴主导部署占比上升，稳定期毛利率提升到约 72%。
sensitivity:
- variable: ARPU
  downsideCase: Y3 每个活跃单位的综合年收入降到 $150K
  baseCase: Y3 每个活跃单位的综合年收入为 $165K
  upsideCase: Y3 每个活跃单位的综合年收入升到 $180K
  y3RevenueImpactK: -270.0
  cashImpactK: -190.0
- variable: CAC
  downsideCase: 如果每个新账户都要靠高强度高层销售和工厂级 proof，CAC 升到 $75K
  baseCase: CAC 为 $60K
  upsideCase: 通过伙伴导入项目和账户内扩厂，CAC 降到 $50K
  y3RevenueImpactK: -60.0
  cashImpactK: -210.0
- variable: 流失率
  downsideCase: 如果买家继续把部分预算留在 integrator SOW 里，月流失率升到 2.5%
  baseCase: 月流失率为 1.5%
  upsideCase: 当 commissioning 数据集嵌入流程后，月流失率降到 1.0%
  y3RevenueImpactK: -180.0
  cashImpactK: -140.0
- variable: 销售周期
  downsideCase: 从试点到扩张需要 9 个月
  baseCase: 综合销售周期为 6-7 个月
  upsideCase: 在 integrator 和生态伙伴暖介绍下，销售周期缩短到 5-6 个月
  y3RevenueImpactK: -430.0
  cashImpactK: -310.0
- variable: 毛利率
  downsideCase: 稳定期毛利率只有 66%，因为适配器工作仍偏定制
  baseCase: 稳定期毛利率为 70%
  upsideCase: 凭借认证模板和更多伙伴交付，稳定期毛利率升到 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -170.0
- variable: 招聘节奏
  downsideCase: 第二位 AE 和 Benchmark 产品负责人比模型提前两个季度入场
  baseCase: 额外 GTM 与产品岗位要等到 Y3 proof points 成立后再补
  upsideCase: 在伙伴转介绍能撑住管道时，第二位 AE 延后到 20 个活跃单位之后再招
  y3RevenueImpactK: -80.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      TargetAccounts[目标账户] --> PaidDesignPartners[付费 design partner]
      PaidDesignPartners --> ActivePlantEquivalents[活跃 plant-equivalents]
      IntegratorReferrals[integrator 转介绍] --> ActivePlantEquivalents
      ActivePlantEquivalents --> SubscriptionAndAdapterRevenue[订阅与适配器收入]
      SubscriptionAndAdapterRevenue --> GrossProfit[毛利润]
      GrossProfit --> OperatingCash[经营现金]
modelSanity:
- checkName: 收入引擎
  finding: 基础情景靠的是：先把 3 个付费 design partner 转成多工厂 rollout，再在同一批企业账户里继续加 plant-equivalent 扩张和 reporting upsell。
- checkName: 必须做对的事
  finding: 公司必须证明，试点后的扩张预算能为经常性软件层买单；否则一旦部署过于服务化，CAC 和流失率都会高于模型区间。
- checkName: 模型会在哪失效
  finding: 下行情景显示，如果销售周期拉向 9 个月、毛利率又因为适配器长期定制化而卡在 60% 中段，现金就会转负。
- checkName: 下一轮证明点
  finding: 只要 Y2 期末能做到约 14 个活跃单位、两条 integrator 渠道，并拿出至少 25% 的真实签核提速证据，下一轮 seed raise 就更站得住。
sanityChecks:
  ruleOf40: Y3 增长率 170.77% + EBITDA 利润率 3.82% = 174.59%
  burnMultiple: Y2 burn multiple 为 0.52x；按净新增 ARR 计算，Y3 转为 -0.07x。
  revenuePerFte: Y3 每名期末 FTE 对应收入为 $297.00K；期末团队 10 人（对比 SaaS benchmark $200-400K）。
  flags:
  - 模型把 plant-equivalent rollout，而不是 logo，作为经营层面的客户单位；如果买家坚持按单一企业 site license 采购，ARPU 和 CAC 逻辑都会明显变化。
  - 模型直到 Y3 才碰到 70% 的毛利目标，所以只要额外出现定制适配器工作或部署人力，EBITDA 很可能又会跌回盈亏平衡线下。
  - 预算归属仍是最核心的商业风险；如果 commissioning 花费继续埋在 integrator SOW 里，下行情景比基础情景更可能发生。
  - 现金流是从 EBITDA 近似出来的，没有计入递延收入时点、capex 和营运资金影响，所以这个模型适合规划，不适合做 treasury 级精算。
