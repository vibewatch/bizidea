  stage: incumbent
  wedge: 一套在现场部署前找出时序问题的数字孪生与控制测试平台。
  pricing: 定制报价 / 企业套餐；公开页面更强调 demo 和资料，而不是透明价格。
  strength: 控制测试故事强、培训场景明确，而且能量化安装/commissioning 节省。
  weaknessVsUs: 重心是数字孪生里的控制验证，而不是做跨厂商的 plant acceptance 底层记录系统。
  sourceRefs:
  - 22
  - 23
  - 24
- name: ABB RobotStudio
  stage: incumbent
  wedge: 面向 ABB 机器人单元的厂商专属离线编程和虚拟控制器高保真能力。
  pricing: ABB 授权软件；公开页面更强调试用和下载，而不是标价。
  strength: 在 ABB 生态里的保真度很强，也能提出虚拟编程大幅压缩 commissioning 时间的可信主张。
  weaknessVsUs: 当 ABB 控住机器人层时最强；但在混合型存量工厂里，要做跨厂商、能看懂 PLC/MES 的 rollout 运营层就弱一些。
  sourceRefs:
  - 25
  - 26
- name: DELMIA Virtual Commissioning
  stage: incumbent
  wedge: 覆盖机器人、PLC 逻辑和产线行为的整厂虚拟孪生与虚拟 commissioning 工作流。
  pricing: 企业报价；官方页面会把买家导向专家咨询，而不是公开定价。
  strength: 制造运营定位强，也明确点出了互操作和 commissioning 的典型难题。
  weaknessVsUs: 平台能力很强，但比面向汽车存量复制、聚焦验收与 rollout 的窄产品更重也更宽。
