    supplierPower:
      score: 4
      rationale: 一套 commissioning OS 必须依赖机器人、PLC、MES 和互操作层，而这些底层接口基本都掌握在 incumbents 手里，所以连接器可得性和厂商态度会直接决定产品边界。
      sourceRefs:
      - 14
      - 15
      - 16
      - 22
    buyerPower:
      score: 4
      rationale: 买方群体集中、交易是企业级且带工厂定制属性，很多客户也还能退回 integrator 或自建团队，因此买方议价能力很强。
      sourceRefs:
      - 31
      - 35
      - 36
      - 37
    threatOfEntrants:
      score: 3
      rationale: 软件本身并不难搭，但信任、适配器广度和专有失败模式数据，让这个生意的可信度和复用难度远高于普通 workflow SaaS。
      sourceRefs:
      - 18
      - 20
      - 23
      - 25
    threatOfSubstitutes:
      score: 5
      rationale: 系统集成商服务、OEM 套件、控制平台工具，以及每家工厂自己拼的表格，今天都在替代这家创业公司的切口。
      sourceRefs:
      - 16
      - 22
      - 25
      - 35
    competitiveRivalry:
      score: 4
      rationale: Incumbents 已经把仿真和虚拟 commissioning 卖进同一批项目，哪怕他们还没有真正占住跨站点可复用签核。
      sourceRefs:
      - 16
      - 22
      - 25
      - 27
      - 28
  pestle:
  - factor: 政治
    impact: positive
    point: 北美汽车产业政策和再工业化叙事，持续把制造升级放在议程前排。
    sourceRefs:
    - 32
    - 33
    - 44
  - factor: 经济
    impact: positive
    point: 停机和排期滑坡的代价已经高到哪怕只改善一点 commissioning，也足以支撑专门预算。
    sourceRefs:
    - 23
    - 38
