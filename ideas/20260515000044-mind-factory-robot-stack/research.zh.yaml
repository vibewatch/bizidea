  - factor: 社会
    impact: positive
    point: 控制、PLC 和自动化人才短缺，会继续推高对可复用工作流的需求，帮助团队降低对稀缺专家的依赖。
    sourceRefs:
    - 34
    - 35
    - 36
    - 37
    - 39
  - factor: 技术
    impact: positive
    point: 仿真、虚拟 commissioning 和数字孪生工具已经成熟到足以让编排层站在现有工程系统之上，而不必把它们全部替掉。
    sourceRefs:
    - 16
