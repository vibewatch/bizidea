    - 13
    - 40
    - 41
  adoptionFrictionMatrix:
  - friction: PLC/MES/机器人互操作缺口
    severity: high
    affectedBuyer: 控制工程经理
    mitigation: 先覆盖目标工厂最主流的 PLC 和 MES 栈连接器，并把 ISA-95 与 OPC UA 作为基础数据模型。
    sourceRefs:
    - 14
    - 15
    - 16
    - 22
  - friction: 安全与用户签核负担
    severity: high
    affectedBuyer: 制造工程负责人
    mitigation: 输出结构化证据包，直接对齐 guarding、lockout/tagout 和单元使用要求，而不是只给泛化仿真结果。
    sourceRefs:
    - 10
    - 11
    - 12
    - 13
    - 40
    - 41
  - friction: 安装动作过度依赖服务
    severity: medium
    affectedBuyer: 自动化项目负责人
    mitigation: 以固定范围模板和 integrator 伙伴切入，让产品替换的是调试工时，而不是凭空再加一层服务。
    sourceRefs:
    - 18
    - 19
    - 23
    - 35
  - friction: 有经验 commissioning 人才短缺
    severity: medium
    affectedBuyer: 工厂控制经理
    mitigation: 把引导式工作流、预置测试和可复用 runbook 写进产品，让经验更少的团队也能按成熟顺序执行。
    sourceRefs:
    - 34
    - 35
    - 36
    - 37
    - 39
market:
  tam:
    value: $115.8M
    rationale: 自下而上的海滩头上限：北美 6,432 个供应商地点 × 12% 的模型化筛选比例（机器人密度高、存量工厂复杂）× 每年 $150k 的合同价值等价，约等于 $115.8M。
    isEstimate: true
    sourceRefs:
    - 4
    - 5
    - 31
  sam:
    value: $23.1M
    rationale: 在 TAM 工厂池上再加一个 20% 过滤：只看多工厂一级供应商或与 OEM 紧密相关、且总部正复制已验证单元的扩张项目——772 个模型化工厂 × 20% × $150k，约等于 $23.1M。
    isEstimate: true
    sourceRefs:
    - 4
    - 31
    - 32
  som:
    value: $3.0M
    rationale: 第 3 年可触达份额，假设平台上跑着约 20 座工厂，来自 6-8 家企业账户加 integrator 带动复制，按每个 plant-equivalent 约 $150k 合同价值计算。
    isEstimate: true
    sourceRefs:
    - 18
    - 20
    - 23
    - 31
    - 35
bottomUpSizingDrivers:
- driver: 可服务总单位数
  value: 北美 6,432 个供应商地点，再按 12% 过滤到 772 座机器人密度更高的工厂
  source: '[31] + 计算'
- driver: 自动化强度
  value: 汽车行业占美国新增工业机器人安装量约 40%，也是美国自动化程度最高的制造大类
  source: '[4]'
- driver: 工厂层面的机器人相关性
  value: 人口普查的机构级数据现在会追踪机器人存量和机器人 capex，因此可以按工厂层面建模，而不是只按宏观 GDP 估算
  source: '[5]'
- driver: 模型化合同价值
  value: $150k / 年，按每座工厂或每个单元家族计价的合同价值等价
  source: 计算
