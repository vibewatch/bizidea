openQuestions:
- 目标账户里的 commissioning 花费，到底有多大比例是制造工程直接持有，而不是埋在系统集成商 SOW 里？
- 哪几种 PLC、MES 与机器人控制器组合，覆盖了海滩头前 60% 的机会？它们在不同站点之间到底有多标准化？
- 买家会不会信任一份中立证据包来做安全和回滚签核，还是仍然要求并行输出 incumbent 报告？
- 在目标供应商群体里，一个获批的机器人单元试点，12–24 个月内扩到 3 座以上工厂的频率到底有多高？
