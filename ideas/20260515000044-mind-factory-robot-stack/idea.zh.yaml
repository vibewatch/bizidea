- point: 新资金就是要投进运行中的工厂扩张，所以 rollout 的可复制性已经是近期瓶颈，而不是未来才会遇到的扩张问题。
  signalRefs:
  - 扩张已经在运行中的工厂里发生
  sourceRefs:
