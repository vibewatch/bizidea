topRisks:
- name: OEM 捆绑
  description: 机器人 OEM 可能会把 commissioning 软件打包进自家的部署栈，把独立层挤掉。
  mitigation: 聚焦跨厂商的存量工厂场景，因为买家在这里更需要中立证据，以及跨多个 OEM 和集成商都能跑通的标准化 rollout 工作流。
- name: 服务化失控
  description: 早期部署可能需要大量定制工厂工作，业务形态会慢慢长成系统集成咨询。
  mitigation: 把首批 launch 产品化成固定范围的适配器、验收模板，以及绑定具体单元类型的可复用 rollout 包。
- name: 工厂采购周期太慢
  description: 制造团队可能只有在扩张 capex 已经批下来的时候才愿意为软件埋单，导致销售周期被拉长，预算紧迫感也不够。
  mitigation: 切进试点后的扩张节点，把 ROI 直接绑定到更快签核和更少停机上，让产品搭上既有自动化预算。
