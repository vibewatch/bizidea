  signalRefs:
  - 真实工厂环境成了战略资产
  sourceRefs:
  - 1
  - 3
- point: 机器人正进入更依赖推理能力的任务，质量和安全容错也更低，临场拼凑式 commissioning 的风险越来越高。
  signalRefs:
  - 需要推理能力的工厂流程正进入自动化范围
  sourceRefs:
