jobsToBeDone:
- job: 当一个 AI 机器人单元试点获批扩张时，帮制造工程团队把更多工厂的 commissioning 标准化，这样他们复制吞吐提升时，不会再次陷入定制化 launch 混乱。
  currentAlternative: 由集成商逐厂推进 commissioning，靠表格和人工签核会议收尾
  successMetric: 从安装完成到首个达到量产资格班次的周数
- job: 当一条存量产线要上新的 AI 引导机器人单元时，帮控制经理在 go-live 前证明 PLC、MES、安全和回滚都已经准备好，从而避开上线后的停机。
  currentAlternative: OEM 清单加上真实设备上的 trial-and-error
  successMetric: 在不经历大规模返工的前提下，达到节拍和安全目标的 launch 占比
