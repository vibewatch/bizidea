differentiator: 这不是给稳定量产机器人做 fleet management，也不是一家泛化的系统集成服务公司。产品卡住的是最危险的 commissioning 交界面：OEM 软件、工厂控制、MES 工作流和安全签核都在这里碰头，然后再把每次 launch 沉淀成可复用的验收模板和证据。这会形成防守力，因为跨厂 benchmark 和失败模式数据，单一 OEM 看不全，单一集成商也拿不到全貌。
