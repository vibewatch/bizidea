scenarios:
  downside:
    description: Slower budget release and weaker adapter reuse delay plant-equivalent expansion and keep gross margin below target.
    y3RevenueK: 1987.5
    y3EbitdaK: -646.0
    cashLowPointK: -200.85
    keyAssumptionChanges:
      - Shift Y2 exit to 10 active units and Y3 exit to 18 active units.
      - Hold blended Y3 annual ARPU at $150K instead of $165K.
      - Keep mature gross margin in the 65%-67% range because deployments stay more services-heavy.
  base:
    description: Founder-led sales convert three paid design partners into multi-plant programs, then integrator referrals and benchmark upsells drive moderate expansion.
    y3RevenueK: 2970.0
    y3EbitdaK: 113.49
    cashLowPointK: 672.73
    keyAssumptionChanges:
      - Land 3 paid design partners in Y1 and reach 14 active units by Q4Y2.
      - Exit Y3 at 22 active plant-equivalent rollouts with $165K blended annual ARPU.
      - Reach 70%+ gross margin only after templates and adapter certification reduce deployment friction.
  upside:
    description: Budget ownership clarifies early, integrator partners accelerate closes, and premium reporting upsells attach faster than modeled.
    y3RevenueK: 3675.0
    y3EbitdaK: 642.59
    cashLowPointK: 755.18
    keyAssumptionChanges:
      - Reach 16 active units by Q4Y2 and 26 by Q4Y3 through faster multi-plant replication.
      - Lift blended Y3 annual ARPU to $175K via premium benchmark and audit modules.
      - Move steady-state gross margin to roughly 72% as partner-led deployment mix rises.
sensitivity:
  - variable: ARPU
    downsideCase: $150K blended annual revenue per active unit in Y3
    baseCase: $165K blended annual revenue per active unit in Y3
    upsideCase: $180K blended annual revenue per active unit in Y3
    y3RevenueImpactK: -270.0
    cashImpactK: -190.0
  - variable: CAC
    downsideCase: $75K CAC if each new account needs bespoke executive selling and plant-level proof
    baseCase: $60K CAC
    upsideCase: $50K CAC via partner-sourced programs and intra-account plant expansion
    y3RevenueImpactK: -60.0
    cashImpactK: -210.0
  - variable: churn
    downsideCase: 2.5% monthly churn as buyers keep part of spend inside integrator SOWs
    baseCase: 1.5% monthly churn
    upsideCase: 1.0% monthly churn after the commissioning dataset becomes embedded
    y3RevenueImpactK: -180.0
    cashImpactK: -140.0
  - variable: sales cycle
    downsideCase: 9-month pilot-to-expansion cycle
    baseCase: 6-7 month blended cycle
    upsideCase: 5-6 month cycle with warm integrator and ecosystem referrals
    y3RevenueImpactK: -430.0
    cashImpactK: -310.0
  - variable: gross margin
    downsideCase: 66% steady-state gross margin because adapter work stays custom
    baseCase: 70% steady-state gross margin
    upsideCase: 72% steady-state gross margin with certified templates and more partner delivery
    y3RevenueImpactK: 0.0
    cashImpactK: -170.0
  - variable: hiring pace
    downsideCase: Add the second AE and benchmark product lead two quarters earlier than modeled
    baseCase: Delay the extra GTM and product hires until Y3 proof points exist
    upsideCase: Hold the second AE until after 20 active units while partner referrals carry pipeline
    y3RevenueImpactK: -80.0
    cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidDesignPartners
      PaidDesignPartners --> ActivePlantEquivalents
      IntegratorReferrals --> ActivePlantEquivalents
      ActivePlantEquivalents --> SubscriptionAndAdapterRevenue
      SubscriptionAndAdapterRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
  - checkName: Revenue engine
    finding: The base case is driven by turning three paid design partners into multi-plant rollouts and then adding plant-equivalent expansions plus reporting upsells inside the same enterprise accounts.
  - checkName: Must go right
    finding: The company must prove that post-pilot expansion budgets can fund a recurring software layer before services-heavy deployments force CAC and churn above the modeled range.
  - checkName: Model breaks if
    finding: The downside case shows cash going negative if sales cycles stretch toward nine months and gross margin stays stuck in the mid-60s because adapter work remains bespoke.
  - checkName: Next-round proof
    finding: A credible seed raise is supported by exiting Y2 with roughly 14 active units, two integrator channels, and live evidence that sign-off time drops by at least 25%.
sanityChecks:
  ruleOf40: Y3 growth 170.77% + EBITDA margin 3.82% = 174.59%
  burnMultiple: Y2 burn multiple 0.52x, turning -0.07x in Y3 on net new ARR.
  revenuePerFte: $297.00K Y3 on 10 exit FTE (benchmark $200-400K SaaS)
  flags:
    - The model counts plant-equivalent rollouts, not logos, as the operating customer unit; if buyers insist on a single enterprise site-license structure, ARPU and CAC dynamics will change materially.
    - Gross margin does not reach the 70% target until Y3, so any extra bespoke adapter work or deployment labor would likely pull EBITDA back below breakeven.
    - Budget ownership remains the core commercial risk; if commissioning spend stays buried inside integrator SOWs, the downside scenario becomes more likely than the base case.
    - Cash flow is approximated from EBITDA and excludes deferred revenue timing, capex, and working-capital effects, so the model is suitable for planning but not treasury precision.
