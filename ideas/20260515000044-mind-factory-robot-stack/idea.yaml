differentiator: >-
  This is not fleet management for robots already in steady-state production and
  not a generic system-integrator services firm. The product owns the risky
  commissioning boundary where OEM software, plant controls, MES workflows, and
  safety sign-off meet, then converts each launch into reusable acceptance
  templates and evidence. That creates defensibility through cross-plant
  commissioning benchmarks and failure-pattern data that neither a single OEM
  nor a single integrator sees in aggregate.
