    currentAlternative: Integrator-run site-by-site commissioning with spreadsheets and manual sign-off meetings
    successMetric: Weeks from installation complete to first production-qualified shift
  - job: When a brownfield line needs a new AI-guided robot cell, help the controls manager prove PLC, MES, safety, and rollback readiness before go-live, so they can avoid post-launch downtime.
