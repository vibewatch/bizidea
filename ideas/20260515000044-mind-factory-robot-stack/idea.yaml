topRisks:
  - name: OEM bundling
    description: Robot OEMs may try to package commissioning software into their own deployment stack and squeeze out an independent layer.
    mitigation: Focus on cross-vendor brownfield plants where buyers need neutral evidence and standardized rollout workflows across multiple OEMs and integrators.
  - name: Services creep
    description: Early deployments could demand so much custom plant work that the business starts to resemble a systems-integrator consultancy.
    mitigation: Productize the first launches into fixed-scope adapters, acceptance templates, and repeatable rollout packages tied to specific cell types.
  - name: Slow plant buying cycles
    description: Manufacturing teams may only fund software when expansion capex is already approved, stretching sales cycles and limiting budget urgency.
    mitigation: Sell into post-pilot expansion moments with ROI tied to faster sign-off and reduced downtime, so the product rides existing automation budgets.
