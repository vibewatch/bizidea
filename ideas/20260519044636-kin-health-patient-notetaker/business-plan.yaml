slug: caregiver-care-plan-autopilot
date: 2026-05-19
executiveSummary: >-
  Caregiver Care-Plan Autopilot should start as a caregiver-first execution
  layer for adult children managing a parent over 70 through multi-specialist,
  medication-heavy care. The initial product is not a generic visit transcript;
  it records or imports the visit, reconciles it with the official physician
  note when available, and converts the result into assigned follow-up tasks for
  the family. The strongest buyer is the adult child who becomes the de facto
  care coordinator after a hospitalization, medication change, or new specialist
  referral and will pay to reduce missed steps, repeated calls, and medication
  confusion. Research supports a meaningful market with an estimated $6.7B TAM,
  $1.8B SAM, and $8.8M year-3 SOM, but the commercial case is constrained by
  consumer price sensitivity and many partial substitutes. The best wedge is a
  narrow one-parent household workflow, sold as a family subscription and
  distributed through caregiver communities plus selected clinic and discharge
  referrals where the pain spike is immediate. Product sequencing should defer
  broad payer sales and deep provider workflow until the team proves that manual
  upload plus selective note sync can drive repeat usage and 90-day retention.
  The defensible asset is not transcription but a longitudinal household graph
  linking what was said, what was documented, and which tasks were completed.
  The biggest evidence gap is whether high-intensity households keep paying
  after the acute episode, so retention and note-ingestion reliability should
  determine whether the company scales acquisition or stays a niche utility.
problem:
  - Families leave complex specialist visits with scattered notes, partial recall, and no shared system for who will book labs, fill prescriptions, or ask unresolved questions.
  - EHR portals, medication apps, and family texts each cover one slice of the workflow, but none reconcile visit memory, physician notes, and task completion across multiple providers.
  - The acute trigger is expensive and emotional, yet the buyer is still a price-sensitive household that can fall back to free tools if the product does not become the system of record.
solution:
  - Capture or import the visit, ingest the physician note when available, and generate a shared care plan with medication changes, referrals, due dates, and owner-level task assignment.
  - Give caregivers a longitudinal timeline that ties each task to the source conversation or note so they can act without replaying the whole visit.
  - Extend beyond one-off summaries into recurring medication, referral-closure, and next-visit preparation workflows that make the app useful between acute events.
whyWeWin:
  - The wedge focuses on a high-pain, measurable post-visit workflow rather than a broad promise to improve consumer health engagement.
  - No incumbent wins by default because portals are fragmented, ambient scribes serve clinicians, medication apps cover only one recurring job, and family coordination tools lack clinical source context.
  - If the company becomes the household layer that reconciles visit audio, official notes, and completion behavior over time, it can build data and workflow moats that are harder to copy than transcription alone.
strategicChoices:
  beachhead: Adult daughters aged 35-60 in the U.S. coordinating an independently living parent with 3 or more specialist visits per quarter and 5 or more active medications.
  wedgeRationale: >-
    This slice feels the pain often enough to justify a subscription, has a
    concrete buying trigger after care transitions, and can show proof faster
    than a broader patient app because missed labs, refills, referrals, and
    follow-up questions are visible outcomes within weeks.
  sequencingRationale: >-
    The company should first prove a manual-upload plus note-reconciliation MVP
    in self-pay households, then add referral partnerships and selective API
    ingestion, and only then test payer or provider distribution. That sequence
    keeps product scope narrow, matches the current evidence base, and avoids
    enterprise compliance and sales overhead before retention and trust are
    proven.
  notYet:
    - Generic patient visit notetaker for all adults
    - Full clinician ambient documentation workflow
    - Broad Medicare Advantage or payer-sponsored distribution before self-pay retention is proven
    - Multi-condition care navigation marketplace or community product
market:
  tam: "$6.7B estimated annual TAM from 59M adult caregivers, 47% caring for a parent or parent-in-law, and $240 modeled annual ARPU."
  sam: "$1.8B estimated annual SAM for digitally ready older-parent households using caregiver technology and caring for someone age 75 or older."
  som: "$8.8M reachable year-3 SOM based on roughly 36.6K families, or 0.5% of the SAM, at $240 annual ARPU."
  segments:
    - Adult children managing older parents through chronic multi-specialty care
    - Older adults who actively share care coordination with one or more family caregivers
  buyingProcess: >-
    The champion, daily user, and initial buyer are usually the same adult
    child, but activation still requires parent consent and practical family
    sharing. The most credible motion is a low-friction trial immediately after
    a hospitalization, new specialist sequence, or medication change, then
    annual conversion once the first care plan prevents a missed next step.
product:
  mvp: >-
    Launch mobile capture or upload, physician-note upload, task extraction,
    owner assignment, due dates, medication-change tracking, and a shared family
    timeline for one older adult. The first version should work with recordings
    and manual documents before depending on deep EHR connectivity.
  sixMonth: Production MVP for one-parent households with shared task lists, note reconciliation from manual uploads, consent controls, and baseline reminder and escalation logic.
  twelveMonth: Add selective portal or API ingestion for the highest-yield note sources, unresolved-question prep for the next visit, referral-closure tracking, and caregiver retention analytics by household intensity.
  twentyFourMonth: Expand into a household health record with cross-provider timelines, medication and referral adherence automation, and the first payer or clinic-sponsored distribution pilots for proven segments.
  keyBets:
    - Manual upload plus limited note sync can deliver enough value before broad interoperability is solved.
    - High-intensity caregiving households will use the app repeatedly across visits rather than only during one crisis.
    - Household pricing beats seat pricing because the economic buyer is paying to coordinate one parent's care, not to license individual users.
    - The same workflow can later support B2B2C distribution once self-pay retention and trust metrics are proven.
gtm:
  wedge: Self-pay family subscription for adult-child caregivers triggered by a hospitalization, new specialist referral, or medication change and activated through caregiver communities plus selected clinic and discharge referrals.
  channels:
    - Founder-led outreach and partnerships with caregiver communities, advocacy groups, and aging-focused nonprofits
    - Referral pilots with geriatrics, oncology, cardiology, and hospital discharge teams serving high-complexity older adults
    - Content and search acquisition around visit prep, medication changes, and post-discharge coordination only after retention is proven
  funnelTargets: Lead or referral→activated first care plan 25-35%, activated care plan→paid family subscription 20-30% within 30 days, paid household→90-day retained household 60%+
  pricing: $20-40 per family per month or $240-360 annual prepay, with a future premium synced-note tier once ingestion reliability is proven; household pricing matches the buyer's job to coordinate one parent across many visits.
businessModel:
  revenueStreams:
    - Family subscription for one active parent-care plan
    - Premium note-sync and longitudinal record tier for higher-intensity households
    - Later B2B2C sponsorship from providers, clinics, or payers that want to reduce missed follow-through
  unitOfValue: Active family care plan for one older adult household
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more family members and caregivers to the same household workflow
    - Expand from post-visit action plans into medication adherence, referral closure, and next-visit preparation
    - Convert self-pay proof into clinic, discharge, or payer-sponsored distribution
strategyMap:
  northStarMetric: Number of active households completing care-plan tasks on time across consecutive visits
  inputMetrics:
    - Lead or referral to first care-plan activation rate
    - 30-day paid conversion after first care plan
    - 90-day retention for households with two or more visits per quarter
    - Share of tasks completed by due date
    - Share of targeted households with a reconciled physician note within 48 hours
  moatsToBuild:
    - Longitudinal household graph connecting visit audio, official notes, tasks, and completion behavior
    - Trust layer with consent, sharing, and privacy controls built for caregiver collaboration
    - Channel partnerships and onboarding playbooks for high-complexity clinic and caregiver-referral flows
    - Workflow accuracy models tuned for medication changes, referrals, and unresolved clinical questions
  killCriteria:
    - Fewer than 100 activated households and fewer than 30 paid households after testing three acquisition channels in the first 9 months
    - 90-day retention stays below 40% for households with high visit frequency after the first two product iterations
    - Reconciled note coverage stays below 60% of targeted households within 48 hours even with manual upload and selective integrations
  mermaid: |
    flowchart LR
      Wedge[Care-transition caregiver wedge] --> MVP[Visit plus note care-plan MVP]
      MVP --> Proof[Activation retention and task-completion proof]
      Proof --> Expansion[Referral partnerships and B2B2C expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Promising category timing and clear buyer pain, but conviction stays limited until self-pay retention and note-ingestion reliability are proven.
    whyBelieve: The market has real why-now support from caregiver burden, rising patient-data access, and visible category formation around patient-side visit memory.
    whyDoubt: The buyer is a stressed consumer household with many substitutes, so the company may struggle to hold attention and pricing power after the immediate crisis.
    nextDiligence: Prove that high-intensity households convert from a trigger-driven trial to a retained paid subscription and keep using the product across at least two care episodes.
  firstCustomer:
    title: Adult child caregiver coordinating an older parent after a complex specialist visit
    profile: A U.S. household in which one daughter or son manages a parent over 70 with multiple chronic conditions, multiple portals, and frequent medication or referral changes.
    trigger: A hospitalization, postsurgical discharge, medication change, or new specialist sequence creates too many follow-up tasks to track with notes, texts, and portals.
    buyer: Adult child household healthcare decision-maker
    initialContract: "$0-30 day guided trial converting to a $240-480 annual family subscription, with upsell to a premium synced-note tier after the first successful care-transition workflow."
  mustBeTrue:
    - At least 5 of 10 high-intensity caregiver interviews say post-visit follow-through is urgent enough to justify a paid household tool now.
    - Households that complete one care plan show at least 60% 90-day retention when they face ongoing specialist or medication complexity.
    - Manual upload plus selective note ingestion delivers a reconciled care plan for at least 60% of target households within 48 hours.
    - Caregiver community or clinic referral channels acquire activated households at a CAC that leaves room for attractive payback at $20-40 monthly pricing.
    - Families trust the app enough to record visits, upload notes, and share tasks without privacy objections blocking onboarding at scale.
  diligenceQuestions:
    - Which care-transition events create the fastest paid conversion and best 90-day retention?
    - How often do target households have access to usable physician notes within 48 hours across their top portal ecosystems?
    - What share of caregivers prefer a family subscription over relying on free portals, notes, and medication apps?
    - Which referral source converts best between caregiver communities, discharge teams, and specialist clinics?
    - Where do privacy objections or clinic recording resistance most often stop activation?
operatingAssumptions:
  - assumption: High-intensity adult-child caregivers will pay $20-40 per month if the product reliably prevents missed tasks after complex visits.
    basis: idea.yaml
    validationTest: Run 30 guided trials in trigger-driven households and measure paid conversion, price sensitivity, and 90-day retention by visit complexity.
    decisionImpact: If false, narrow the product to episodic paid care-transition packages or shift earlier toward sponsored distribution instead of scaling self-pay acquisition.
  - assumption: Manual uploads and selective note ingestion are sufficient to prove value before broad EHR interoperability is available.
    basis: research.yaml
    validationTest: Track time to reconciled care plan and failure reasons across the first 50 households using recordings, PDFs, and the top portal note paths.
    decisionImpact: If false, product scope must narrow to visit memory only or the company must delay launch until stronger data-access partnerships are secured.
  - assumption: Caregiver communities and high-complexity clinic referrals will outperform broad paid consumer acquisition on CAC and retention.
    basis: research.yaml
    validationTest: Compare activation, conversion, and 90-day retention across at least three channels before committing to a scaled growth budget.
    decisionImpact: If false, the company should cut growth hiring, slow direct-to-consumer spend, and prioritize enterprise or payer-led channels sooner.
  - assumption: Privacy and consent concerns can be managed with explicit controls and patient-controlled sharing rather than becoming a structural blocker.
    basis: research.yaml
    validationTest: Measure onboarding drop-off tied to recording consent, note sharing, and caregiver access settings in the first 100 activations.
    decisionImpact: If false, the product must reduce recording dependence, add stronger compliance investment, or shift toward note-import workflows only.
  - assumption: Longitudinal caregiver workflow data can become a durable moat before incumbents add similar task layers.
    basis: operator judgment
    validationTest: Show that repeat households improve task-completion rates and that reference users return for second and third care episodes rather than using one-off summaries.
    decisionImpact: If false, the business remains a thin feature layer vulnerable to substitution and should avoid venture-scale spend.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Trigger-driven caregiver interviews and workflow mapping
    hypothesis: Hospitalizations, medication changes, and new specialist referrals create budget-worthy coordination pain for a narrow high-intensity ICP.
    successMetric: 10 target interviews completed with at least 6 naming the wedge as a top-3 pain and agreeing to a guided trial
    owner: CEO
  - horizon: 0–90 days
    experiment: Concierge MVP with manual care-plan creation from recorded visits and uploaded notes
    hypothesis: Families will share enough source material to let the product generate actionable tasks and owner assignments.
    successMetric: 20 households create a first care plan and at least 70% assign one or more tasks to another family member
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Paid conversion and pricing test across monthly versus annual household plans
    hypothesis: Annual prepay after one successful care-transition workflow improves payback without hurting conversion.
    successMetric: At least 25% of activated households convert to paid and at least one-third of paid households choose annual billing
    owner: CEO
  - horizon: 90–180 days
    experiment: Referral pilot with one caregiver community and one high-complexity clinic
    hypothesis: Referred households activate faster and retain better than broad self-serve traffic.
    successMetric: Referral cohorts beat self-serve cohorts by at least 20% on activation and 90-day retention
    owner: Growth partnerships lead
  - horizon: 180–270 days
    experiment: Selective note-ingestion rollout for top portal and document pathways
    hypothesis: Semi-automated note ingestion materially increases task accuracy and repeat usage versus recording-only workflows.
    successMetric: Reconciled note coverage reaches 60% of targeted households with no more than 48-hour median lag
    owner: Founding eng
  - horizon: 180–365 days
    experiment: Recurring workflow expansion into medication changes and next-visit prep
    hypothesis: Between-visit workflows can lift retention beyond acute episodes.
    successMetric: 90-day retention exceeds 60% for households with two or more care episodes and task completion by due date exceeds 70%
    owner: Care workflow product lead
operations:
  - Build explicit consent, sharing, and access-control flows so families understand who can record, view notes, and edit tasks.
  - Maintain a hybrid ingestion pipeline that supports recording, PDF upload, OCR, and selective API note retrieval instead of assuming perfect interoperability.
  - Run a human-in-the-loop QA process for medication changes, referrals, and unresolved questions during the first production cohorts.
  - Establish referral playbooks with caregiver groups, discharge teams, and high-complexity specialties before hiring broad paid acquisition.
  - Instrument channel, activation, retention, and note-coverage metrics at the household level to decide whether the company scales self-pay or pivots to sponsorship.
team:
  - role: CEO
    startTiming: Month 0
    rationale: Founder-led selling and discovery are required because buyer pain, trust, pricing, and channel design are tightly linked in the first year.
  - role: Founding eng
    startTiming: Month 0
    rationale: The first product risk is accurate care-plan generation across messy source inputs, so engineering must own ingestion, reconciliation, and privacy controls from day one.
  - role: Care workflow product lead
    startTiming: Month 1
    rationale: The company needs someone focused on caregiver UX, task design, and retention loops so the product does not stall at transcript generation.
  - role: Care operations lead
    startTiming: Month 3
    rationale: Early cohorts need onboarding support, trust handling, and workflow QA around sensitive health tasks before the product is fully self-serve.
  - role: Growth partnerships lead
    startTiming: Month 6
    rationale: Channel efficiency will depend on referral partnerships and community distribution, not broad paid performance marketing in the first 18 months.
milestones:
  - horizon: 0–12 months
    items:
      - Launch production MVP for one-parent households with recording, manual note upload, and shared task assignment
      - Enroll 150 activated households and convert at least 30 to paid subscriptions
      - Sign 2 referral partners across caregiver communities or high-complexity clinics
      - Reach reconciled note coverage for at least 60% of targeted households within 48 hours
  - horizon: 12–24 months
    items:
      - Exceed 1000 paying families with measurable retention in high-intensity cohorts
      - Prove task completion by due date above 70% in retained households
      - Launch premium synced-note tier and at least 1 sponsored pilot with a clinic or payer partner
      - Standardize onboarding and support playbooks so the product scales beyond concierge-heavy operations
  - horizon: 24–36 months
    items:
      - Build a longitudinal household health record across multiple providers and repeated care episodes
      - Expand distribution through 3 or more sponsored partnerships while preserving a self-pay wedge
      - Demonstrate repeatable expansion into medication adherence, referral closure, and next-visit preparation for retained households
      - Reach the modeled year-3 SOM case of roughly $8.8M annual revenue only if retention and channel economics support it
risks:
  - risk: Episodic engagement causes households to churn once the immediate care crisis passes.
    likelihood: High
    impact: High
    mitigation: Focus initial acquisition on chronic high-frequency households and ship recurring medication, referral, and next-visit workflows before scaling spend.
  - risk: Official note access and normalization are slower or less complete than the roadmap assumes.
    likelihood: High
    impact: High
    mitigation: Deliver value from recordings and manual uploads first, prioritize the highest-yield portal pathways, and track note-coverage reliability by source.
  - risk: Families or clinics resist visit recording and sensitive data sharing in a consumer app.
    likelihood: Medium
    impact: High
    mitigation: Make consent and share settings explicit, support non-recording upload paths, and position the product as a patient-controlled record rather than provider surveillance.
  - risk: Free substitutes and adjacent apps cap pricing power and make CAC unattractive.
    likelihood: High
    impact: Medium
    mitigation: Differentiate on reconciled task execution and retention outcomes, not on recording alone, and concentrate on referral channels before paid acquisition.
  - risk: The company expands into payer or provider channels before self-pay proof is strong enough.
    likelihood: Medium
    impact: Medium
    mitigation: Gate enterprise hiring and partnership build-out on retention, note-coverage, and paid conversion milestones from the core household wedge.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: Build and validate the caregiver care-plan MVP, prove retention and household willingness to pay in high-intensity cohorts, establish selective note-ingestion capability, and secure the first repeatable referral channels before broader distribution expansion.
