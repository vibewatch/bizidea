      ReferralPartners --> ActivatedCarePlans
      ActivatedCarePlans --> PaidHouseholds
      PaidHouseholds --> SubscriptionRevenue
      NoteSyncReliability --> PaidHouseholds
      SubscriptionRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下，收入来自付费家庭从 M12 的 30 个增长到 Q4Y3 的 11,000 个，同时综合 ARPU 随高级同步病历采用从 $240 抬到 $390。
- checkName: 必须跑通的环节
  finding: 转介和照护者社区渠道必须把 CAC 守在 $140 左右，并支撑大约 20 个月客户寿命，否则自费切口起量不够快。
- checkName: 模型会在哪种情况下失效
  finding: 如果使用仍然是事件型，到 Y3 结束时公司更接近 7,000 个付费家庭，下行情景的现金会在下一轮融资具备说服力之前先转负。
- checkName: 下一轮融资证明点
  finding: 只要公司在 Q4Y2 前跑到 1,000 个付费家庭、48 小时内 60% 病历覆盖、高强度分群 90 天留存 60%+，以及 2 条可复制的转介渠道，就足以支撑下一轮种子轮。
sanityChecks:
  ruleOf40: 第 3 年增长 928.7% + EBITDA 利润率 -16.0% = 912.7%
  burnMultiple: 第 2 年 burn multiple 为 2.0x，对应约 $661.8K 新增 ARR；第 3 年改善到 0.1x，对应约 $3.62M 新增 ARR。
  revenuePerFte: 第 3 年退出时 8 名 FTE 对应 $282K/FTE（SaaS 基准为 $200-400K）
  flags:
  - 模型仍然依赖到 Q4Y3 时达到约 11,000 个付费家庭，因此对消费医疗产品来说，渠道验证必须异常扎实。
  - ARPU 从 $240 抬到 $390，前提是高级同步病历档位能被采用；如果大多数家庭停在基础套餐，收入会很快掉下来。
  - 现金在 Q3Y3 附近最低只有约 $219K，所以公司应在 Q4Y3 之前很早就启动融资，而不是等到账上变紧。
  - 留存仍是最大风险，因为事件型照护行为会抹掉原本不错的 CAC，只要家庭在急性事件之间不回来。
