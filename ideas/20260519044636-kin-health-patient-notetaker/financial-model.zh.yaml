slug: caregiver-care-plan-autopilot
date: '2026-05-19'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-19] 基准情景从 BP 日期之后的第一个完整月份开始。'
- id: A2
  name: 期初现金与 pre-seed 轮规模
  value: '2800.0'
  unit: 千美元
  source: '[BP fundingAsk round pre-seed; targetFundingRangeUsd $2-4M] 模型采用 $2.8M pre-seed，落在给定区间内，足以跑到第 2 年第 4 季度验证点，并在进入第 3 年时仍保留约 6 个月缓冲。'
- id: A3
  name: 模型里的客户单位
  value: 活跃付费家庭户
  unit: 定义
  source: '[BP businessModel.unitOfValue active family care plan for one older adult household] customersEop 统计的是付费家庭户，不是免费激活或转介绍线索。'
- id: A4
  name: 收入确认方式
  value: 各期平均活跃付费家庭户
  unit: 公式
  source: 来源说明：Financial Modeler 的中期上线规则；收入等于平均活跃付费家庭户乘综合年 ARPU，再按月或季度折算。
- id: A5
  name: 第 1 年按月新增付费家庭
  value: '[0,0,1,1,2,2,3,4,4,4,4,5]'
  unit: 数量
  source: '[BP milestones 0-12 months] 第 1 年末达到 30 个付费家庭，和“150 次激活后至少拿到 30 个付费订阅”的目标底线一致。'
- id: A6
  name: 第 2 年按季度新增付费家庭
  value: '[200,300,500,1200]'
  unit: 数量
  source: '[BP milestones 12-24 months + BP gtm channels] 假设第 1 年验证跑通后，转介合作和照护者社区开始可复制，把公司在第 2 年第 4 季度抬到 1,000 个以上付费家庭。'
- id: A7
  name: 第 3 年按季度新增付费家庭
  value: '[1200,1800,2600,3170]'
  unit: 数量
  source: '[BP milestones 24-36 months + RS market.som] 到第 3 年第 4 季度达到 11,000 个付费家庭，仍明显低于研究里的 36.6K 家庭 SOM 上限。'
- id: A8
  name: 综合年 ARPU 爬坡
  value: Y1 $240; Y2 $300; Y3 $390
  unit: 美元/家庭/年
  source: '[BP gtm pricing $20-40 per month or $240-360 annual prepay + BP businessModel premium synced-note tier + later sponsorship] 基准情景从家庭定价低端起步，随后随着高级病历同步档位在 Y2-Y3 出现，把综合 ARPU 逐步抬上去。'
- id: A9
  name: 毛利率爬坡
  value: Y1 前期 55%，Y1 后期 60-63%，Y2 为 66-70%，Y3 为 71-72%
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations human-in-the-loop QA] 在病历对齐和工作流质检仍偏手工的早期，毛利率会低于目标；到 Y3 才真正越过 70%。'
- id: A10
  name: 按角色的全年全成本薪酬
  value: CEO 140；创始工程师 150；照护工作流产品 125；照护运营 90；增长合作 120；第二位工程师 145；客户成功 95；增长营销 110
  unit: 千美元/FTE/年
  source: '[BP team rationale + BP operations] 这反映了创始人主导销售、早期产品建设占比高，以及在还没形成大客服团队前就要先扛住上手支持。'
- id: A11
  name: 薪酬分摊规则
  value: CEO 50% 记入 S&M、50% 记入 G&A；增长岗位 100% 记入 S&M；客户成功 70% 记入 S&M、30% 记入 G&A；照护运营 50% 记入 S&M、20% 记入 R&D、30% 记入 G&A；产品和工程 100% 记入 R&D
  unit: 规则
  source: '[BP team rationale + BP operations] 这反映了创始人主导销售、早期产品建设占比高，以及在还没形成大客服团队前就要先扛住上手支持。'
- id: A12
  name: 招聘顺序
  value: CEO、创始工程师和照护工作流产品在 M1 入场；照护运营在 M3；增长合作在 M6；第二位工程师在 M15；客户成功在 M18；增长营销在 M29
  unit: 时间点
  source: '[BP team startTiming + BP sequencingRationale] 团队先尽量精简，只有当留存、病历覆盖和转介渠道证明成立后，才加更偏规模化的招聘。'
- id: A13
  name: 销售与市场非薪酬支出爬坡
  value: Y1 每月 $4K-$9K，Y2-Y3 每季度 $55K-$170K
  unit: 千美元
  source: '[BP gtm channels + BP operatingAssumptions on caregiver communities and referrals] 支出重点放在渠道合作，而不是大范围的付费消费者获客。'
- id: A14
  name: 研发非薪酬支出爬坡
  value: Y1 每月 $6K-$11K，Y2-Y3 每季度 $40K-$80K
  unit: 千美元
  source: '[BP product roadmap + BP operations hybrid ingestion pipeline] 主要覆盖云端推理、文档处理、QA 工具和选择性集成开发。'
- id: A15
  name: G&A 支出爬坡
  value: Y1 每月 $5K-$8K，Y2-Y3 每季度 $24K-$45K
  unit: 千美元
  source: '[BP risks privacy and consent + RS regulatoryLandscape] 主要覆盖法务、安全、保险和隐私开销，毕竟这是个处理消费级健康数据的产品。'
- id: A16
  name: 稳态月流失率
  value: '5.0'
  unit: 百分比
  source: '[BP risks episodic engagement + RS sensitivityCases usage is episodic] 这是对一个必须扛过急性照护事件之后的订阅产品，采用较保守的创业财务经验值。'
- id: A17
  name: 综合 CAC
  value: '0.14'
  unit: USDK per paid household
  source: 按模型里 Y2-Y3 的销售与市场费用除以 10,970 个新增付费家庭计算得出；这个数字只有在转介和照护者社区渠道明显优于付费消费者渠道时才站得住，对应 [BP operatingAssumptions]。
- id: A18
  name: 融资规模规则
  value: 融到 Q4Y2 里程碑，再加约 6 个月缓冲
  unit: 规则
  source: '[BP fundingAsk runwayMonths 18 + developer instruction] 这轮 pre-seed 的规模，按“跑到第 2 年验证点后，再多留大致两个季度现金”来定。'
- id: A19
  name: 现金流简化规则
  value: 期末现金 = 期初现金 + 累计 EBITDA
  unit: 公式
  source: 来源说明：早期 SaaS 规划简化法，不建债务、资本开支、税项和营运资金时点。
