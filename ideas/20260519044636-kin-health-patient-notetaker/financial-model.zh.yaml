scenarios:
  downside:
    description: 转介渠道起量更慢，高级同步病历档位的附加率偏弱，而且事件型使用让更多家庭长期停留在低价基础套餐。
    y3RevenueK: 1408.0
    y3EbitdaK: -760.0
    cashLowPointK: -155.0
    keyAssumptionChanges:
    - 到第 3 年第 4 季度，付费家庭约 7,000 个，而不是 11,000 个。
    - 综合年 ARPU 只能到约 $360，因为高级同步病历的采用滞后。
    - 稳态毛利率最多到 69% 左右，因为照护运营 QA 更长时间都得靠人工。
  base:
    description: 公司在 Y2 证明了伙伴驱动获客，Y3 叠上高级同步病历使用，到模型结束时拥有 11,000 个付费家庭，经营杠杆也在改善。
    y3RevenueK: 2252.75
    y3EbitdaK: -359.34
    cashLowPointK: 219.37
    keyAssumptionChanges:
    - 与 A1-A19 保持一致：M12 达到 30 个付费家庭，Q4Y2 达到 2,230 个，Q4Y3 达到 11,000 个。
    - 按 A8，综合年 ARPU 在 Y1 为 $240、Y2 为 $300、Y3 为 $390。
    - 随着病历接入和 QA 更产品化，毛利率从 Y1 前期的 55% 升到 Y3 后期的 72%。
  upside:
    description: 转介伙伴把需求前置，高强度家庭更快采用高级同步病历，且支持负担的增长慢于收入。
    y3RevenueK: 3020.0
    y3EbitdaK: 165.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - 到第 3 年第 4 季度，付费家庭约 13,500 个，而不是 11,000 个。
    - 随着高级同步病历和早期资助家庭更快混入，综合年 ARPU 提升到约 $420。
    - 病历对齐可靠性提升时，并不需要同等速度扩人，因此毛利率可到约 73%。
