slug: caregiver-care-plan-autopilot
date: '2026-05-19'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-19] Base case starts the first full month after the business-plan date.'
- id: A2
  name: Opening cash and pre-seed size
  value: '2800.0'
  unit: USDK
  source: '[BP fundingAsk round pre-seed; targetFundingRangeUsd $2-4M] The model uses a $2.8M pre-seed, inside the stated range, to reach the Q4Y2 proof point and still hold about six months of buffer into Y3.'
- id: A3
  name: Customer unit in the model
  value: active paid family household
  unit: definition
  source: '[BP businessModel.unitOfValue active family care plan for one older adult household] customersEop counts paying households, not free activations or referred leads.'
- id: A4
  name: Revenue recognition method
  value: average active paid households per period
  unit: formula
  source: 'Startup-finance heuristic named source: Financial Modeler mid-period go-live rule; revenue equals average active paid households times blended annual ARPU prorated by month or quarter.'
- id: A5
  name: Year 1 new paid households by month
  value: '[0,0,1,1,2,2,3,4,4,4,4,5]'
  unit: count
  source: '[BP milestones 0-12 months] Ends Y1 at 30 paid households, matching the stated floor of at least 30 paid subscriptions after 150 activations.'
- id: A6
  name: Year 2 new paid households by quarter
  value: '[200,300,500,1200]'
  unit: count
  source: '[BP milestones 12-24 months + BP gtm channels] Assumes referral partnerships and caregiver communities become repeatable after Y1 proof, lifting the company above 1,000 paying families by Q4Y2.'
- id: A7
  name: Year 3 new paid households by quarter
  value: '[1200,1800,2600,3170]'
  unit: count
  source: '[BP milestones 24-36 months + RS market.som] Reaches 11,000 paying households by Q4Y3, still well below the researched 36.6K household SOM ceiling.'
- id: A8
  name: Blended annual ARPU ramp
  value: Y1 $240; Y2 $300; Y3 $390
  unit: USD per household per year
  source: '[BP gtm pricing $20-40 per month or $240-360 annual prepay + BP businessModel premium synced-note tier + later sponsorship] The base case starts at the low end of household pricing, then lifts blend as premium note-sync adoption appears in Y2-Y3.'
- id: A9
  name: Gross margin ramp
  value: 55% in early Y1, 60-63% in late Y1, 66-70% in Y2, and 71-72% in Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations human-in-the-loop QA] Margin starts below target while note reconciliation and workflow QA are manual, then clears the 70% target in Y3.'
- id: A10
  name: Loaded annual salaries by role
  value: CEO 140; FoundingEng 150; CareWorkflowProduct 125; CareOps 90; GrowthPartnerships 120; Engineer2 145; CustomerSuccess 95; GrowthMarketing 110
  unit: USDK annual per FTE
  source: '[BP team roles] plus startup-finance heuristic for lean U.S. pre-seed compensation including payroll tax and benefits.'
- id: A11
  name: Payroll allocation policy
  value: CEO 50% S&M and 50% G&A; growth roles 100% S&M; customer success 70% S&M and 30% G&A; care ops 50% S&M 20% R&D 30% G&A; product and engineering 100% R&D
  unit: policy
  source: '[BP team rationale + BP operations] Reflects founder-led selling, product-heavy build work, and onboarding support before a large support organization exists.'
- id: A12
  name: Hiring sequence
  value: CEO, founding eng, and care workflow product at M1; care ops at M3; growth partnerships at M6; second engineer at M15; customer success at M18; growth marketing at M29
  unit: timing
  source: '[BP team startTiming + BP sequencingRationale] Hiring stays lean until retention, note coverage, and referral-channel proof justify more scale hiring.'
- id: A13
  name: Sales and marketing non-payroll spend ramp
  value: $4K-$9K monthly in Y1, then $55K-$170K quarterly in Y2-Y3
  unit: USDK
  source: '[BP gtm channels + BP operatingAssumptions on caregiver communities and referrals] Spend stays channel-partnership heavy rather than broad paid consumer acquisition.'
- id: A14
  name: Research and development non-payroll spend ramp
  value: $6K-$11K monthly in Y1, then $40K-$80K quarterly in Y2-Y3
  unit: USDK
  source: '[BP product roadmap + BP operations hybrid ingestion pipeline] Covers cloud inference, document handling, QA tooling, and selective integration work.'
- id: A15
  name: General and administrative spend ramp
  value: $5K-$8K monthly in Y1, then $24K-$45K quarterly in Y2-Y3
  unit: USDK
  source: '[BP risks privacy and consent + RS regulatoryLandscape] Covers legal, security, insurance, and privacy overhead for a consumer health-data product.'
- id: A16
  name: Steady-state monthly churn
  value: '5.0'
  unit: percent
  source: '[BP risks episodic engagement + RS sensitivityCases usage is episodic] Conservative startup-finance heuristic for a subscription product that must survive beyond acute care episodes.'
- id: A17
  name: Blended CAC
  value: '0.14'
  unit: USDK per paid household
  source: Calculated from modeled Y2-Y3 sales and marketing expense divided by 10,970 new paid households; this only works if referral and caregiver-community channels outperform paid consumer channels as assumed in [BP operatingAssumptions].
- id: A18
  name: Funding sizing rule
  value: raise to Q4Y2 milestone plus about 6 months of buffer
  unit: policy
  source: '[BP fundingAsk runwayMonths 18 + developer instruction] The pre-seed is sized to reach Y2 proof and preserve roughly two more quarters of operating cash.'
- id: A19
  name: Cash flow simplification
  value: ending cash equals opening cash plus cumulative EBITDA
  unit: formula
  source: 'Startup-finance heuristic named source: early-stage SaaS planning simplification with no debt, capex, taxes, or working-capital timing modeled.'
