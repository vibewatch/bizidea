scenarios:
  downside:
    description: Referral channels scale later, premium note-sync attachment stays weak, and episodic usage keeps more households on the lower-priced core plan.
    y3RevenueK: 1408.0
    y3EbitdaK: -760.0
    cashLowPointK: -155.0
    keyAssumptionChanges:
    - Q4Y3 paying households land near 7,000 instead of 11,000.
    - Blended annual ARPU reaches only about $360 because premium note-sync adoption lags.
    - Steady-state gross margin tops out near 69% because care-ops QA stays manual longer.
  base:
    description: The company proves partner-led acquisition in Y2, layers in premium note-sync usage in Y3, and exits the model with 11,000 paying households and improving operating leverage.
    y3RevenueK: 2252.75
    y3EbitdaK: -359.34
    cashLowPointK: 219.37
    keyAssumptionChanges:
    - Matches A1-A19 with 30 paid households by M12, 2,230 by Q4Y2, and 11,000 by Q4Y3.
    - Uses blended annual ARPU of $240 in Y1, $300 in Y2, and $390 in Y3 under A8.
    - Gross margin rises from 55% in early Y1 to 72% by late Y3 as note ingestion and QA become more productized.
  upside:
    description: Referral partners pull demand forward, higher-intensity households adopt premium note-sync faster, and support load grows slower than revenue.
    y3RevenueK: 3020.0
    y3EbitdaK: 165.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - Q4Y3 paying households reach about 13,500 instead of 11,000.
    - Blended annual ARPU rises to roughly $420 as premium note-sync and early sponsored households mix in faster.
    - Gross margin reaches about 73% because note reconciliation reliability improves without matching headcount growth.
