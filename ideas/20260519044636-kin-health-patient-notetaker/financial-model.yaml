modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      ReferralPartners --> ActivatedCarePlans
      ActivatedCarePlans --> PaidHouseholds
      PaidHouseholds --> SubscriptionRevenue
      NoteSyncReliability --> PaidHouseholds
      SubscriptionRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing from 30 paid households at M12 to 11,000 by Q4Y3 while lifting blended ARPU from $240 to $390 through premium note-sync adoption.
- checkName: Must go right
  finding: Referral and caregiver-community channels must keep CAC near $140 and support roughly 20 months of customer life, or the self-pay wedge will not scale fast enough.
- checkName: Model breaks if
  finding: If usage stays episodic and the company exits Y3 closer to 7,000 paid households, downside cash turns negative before the next financing is well supported.
- checkName: Next-round proof
  finding: A seed is justified once the company clears 1,000 paying families, 60% note coverage within 48 hours, 60%+ 90-day retention in high-intensity cohorts, and two repeatable referral channels by Q4Y2.
sanityChecks:
  ruleOf40: Y3 growth 928.7% + EBITDA margin -16.0% = 912.7%
  burnMultiple: Y2 burn multiple 2.0x on about $661.8K net new ARR, improving to 0.1x in Y3 on about $3.62M net new ARR.
  revenuePerFte: $282K Y3 on 8 exit FTE (benchmark $200-400K SaaS)
  flags:
  - The model still depends on reaching about 11,000 paying households by Q4Y3, so channel proof must be unusually strong for a consumer health product.
  - ARPU expansion from $240 to $390 assumes premium synced-note adoption; if most households stay on the core plan, revenue falls quickly.
  - Cash bottoms near $219K in Q3Y3, so the company should start fundraising well before Q4Y3 rather than wait for the balance to tighten.
  - Retention remains the biggest risk because episodic caregiving behavior can erase otherwise attractive CAC if households do not return between acute episodes.
