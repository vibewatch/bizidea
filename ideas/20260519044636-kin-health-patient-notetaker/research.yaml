  adoptionFrictionMatrix:
  - friction: Recording and privacy trust at the point of care
    severity: high
    affectedBuyer: Adult child and older parent
    mitigation: Make consent flows explicit, preserve share controls, and position the product as a patient-controlled record rather than clinic surveillance.
    sourceRefs:
    - 3
    - 27
  - friction: Shared-access setup and identity management
    severity: medium
    affectedBuyer: Adult child caregiver
    mitigation: Offer portal onboarding help, proxy-access education, and fallbacks that do not assume perfect caregiver credentials on day one.
    sourceRefs:
    - 22
    - 23
    - 24
  - friction: Fragmented portal and document ingestion
    severity: high
    affectedBuyer: Adult child managing multiple specialists
    mitigation: Combine APIs with manual upload, OCR, and note-normalization flows so the product still works when records arrive as PDFs or scans.
    sourceRefs:
    - 13
    - 18
  - friction: Episodic engagement after acute events
    severity: medium
    affectedBuyer: Consumer self-pay household
    mitigation: Extend beyond one-off summaries into medication tracking, referral closure, and unresolved-question prep for the next visit.
    sourceRefs:
    - 4
    - 26
