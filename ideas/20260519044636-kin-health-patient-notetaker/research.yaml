competitors:
- name: Kin Health
  stage: seed
  wedge: Patient-side visit recording with summaries, next steps, and family sharing.
  pricing: Free
  strength: Closest category proof that patients want a memory layer for appointments.
  weaknessVsUs: Still positioned around remembering and summarizing visits rather than becoming the shared execution system for longitudinal caregiver follow-through.
  sourceRefs:
  - 1
  - 2
  - 3
- name: Medcorder
  stage: scale-up
  wedge: Record, transcribe, and share doctor visits with family during complex care situations.
  pricing: Free
  strength: Strong family-sharing and recording workflow credibility, especially for remote relatives.
  weaknessVsUs: Stops closer to transcript capture and reminders than reconciled care-plan generation tied to official notes.
  sourceRefs:
  - 27
- name: Abridge
  stage: scale-up
  wedge: Enterprise ambient AI notes integrated into clinician and EHR workflows.
  pricing: Enterprise contact sales
  strength: Deep clinical note quality, auditability, and health-system distribution.
  weaknessVsUs: Designed for clinician productivity and billable notes, not for household task ownership and family collaboration after the visit.
  sourceRefs:
  - 30
- name: Medisafe
  stage: scale-up
  wedge: Medication adherence and Medfriend caregiver notifications.
  pricing: Free
  strength: Focused recurring workflow with scale and family support hooks.
  weaknessVsUs: Medication is only one slice of the broader care-plan problem; Medisafe does not own referrals, questions, visit memory, or note reconciliation.
  sourceRefs:
  - 28
- name: Lotsa Helping Hands
  stage: incumbent
  wedge: Care calendar and volunteer coordination for family support networks.
  pricing: Free
  strength: Useful for mobilizing friends and relatives around rides, meals, and logistics.
  weaknessVsUs: No clinical intelligence, source-linked visit context, or structured care-plan extraction.
  sourceRefs:
  - 29
regulatoryTechnicalConstraints:
- point: A patient-controlled consumer app may not be a HIPAA covered entity, so trust, consent, breach handling, and user education become product responsibilities rather than borrowed institutional guarantees.
  sourceRefs:
  - 3
  - 17
- point: 'Shared portal access is still operationally messy: many older adults are unaware of official shared access, and care partners often still use patient credentials.'
  sourceRefs:
  - 23
  - 24
- point: Patient Access APIs do not require manual transformation of every large unstructured document, which means note completeness and normalization remain technical bottlenecks.
  sourceRefs:
  - 18
validationSignals:
- point: A venture-backed startup has already raised seed funding specifically around patient-side visit memory and follow-through.
  sourceRefs:
  - 1
- point: Proxy or caregiver portal access more than doubled from 2020 to 2024, indicating real caregiver demand for health-information access.
  sourceRefs:
  - 13
- point: When health systems promote shared access, care partners view more notes and labs and schedule more visits, indicating measurable downstream action demand.
  sourceRefs:
  - 24
- point: Existing products already prove families seek point solutions for recording visits, medication management, and coordination help.
  sourceRefs:
  - 27
  - 28
  - 29
openQuestions:
- How many adult-child caregivers will trust a consumer app enough to record specialist visits and upload official notes when the app is not itself a covered entity?
- What share of high-intensity caregiving households will maintain a subscription after the acute event passes versus reverting to portals and texts?
- How quickly can official physician notes be ingested across the most common portal/EHR combinations used by older adults with multiple specialists?
- Which specialties and health systems are most likely to object to patient-side recording, slowing capture at the exact moment of need?
