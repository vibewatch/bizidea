slug: caregiver-care-plan-autopilot
date: 2026-05-19
executiveSummary: Caregiver Care-Plan Autopilot 最该先做的，不是泛患者记录工具，而是给替 70 岁以上父母跑多专科、管复杂用药的成年子女用的一层照护执行系统。第一版产品也不该停在门诊转录：它要能录下或导入门诊内容，在能拿到正式医生病历记录时把两者对齐，然后直接给家庭拆出已分配的后续任务。最强买方是那些在住院、用药调整或新专科转诊后，被迫变成事实照护协调者的成年子女；他们愿意付费，是为了减少漏项、重复沟通和用药混乱。研究显示这是个有意义的市场：TAM 约 $6.7B、SAM 约 $1.8B、第 3 年 SOM 约 $8.8M；但商业天花板同时受制于消费家庭价格敏感，以及大量只解决局部问题的替代品。最好的切口应是单个高龄父母家庭的窄工作流，用家庭订阅卖给高痛点家庭，并通过照护者社区以及部分诊所、出院转介做分发，因为这些节点的痛感最即时。产品推进上，应先证明“手动上传 + 选择性病历同步”就能拉动重复使用和 90 天留存，再去碰更广的付款方销售和更深的医疗机构工作流。真正的防守资产不是转录，而是一张长期家庭图谱：门诊里说了什么、正式记录写了什么、哪些任务最后完成了。眼下最大的证据缺口，是高强度家庭在急性阶段过后还会不会持续付费；因此留存和病历接入可靠性，应该决定公司是放大获客，还是继续停留在小而窄的工具位置。
problem:
- 复杂专科门诊一结束，家庭手里往往只剩零散笔记和残缺记忆，却没有一个共享系统知道谁去约化验、谁去配药、谁去问清还没解决的问题。
- EHR 门户、用药 App 和家人短信各自只覆盖一段流程，没有一个能把门诊记忆、医生病历记录和跨多个机构的任务完成情况真正对起来。
- 急性触发点既烧钱也耗情绪，但买方仍是价格敏感的家庭；如果产品守不住家庭主记录系统的位置，用户随时会退回免费工具。
solution:
- 录下或导入门诊，在条件允许时接入医生病历记录，再生成一份共享照护计划，里面直接带上用药变化、转诊、截止日期和任务负责人。
- 给照护者一条长期时间线，让每个任务都能回到对应的谈话或病历片段，不用重放整次门诊也能执行。
- 别只做一次性摘要，而要往持续性的用药、转诊闭环和下次门诊准备工作流延伸，让 App 在急性事件之间也有存在价值。
whyWeWin:
- 这个切口瞄准的是高痛、可量化的门诊后工作流，而不是泛泛承诺“提升消费者健康参与度”。
- 没有任何现有厂商会天然赢下这一段：门户是碎的，环境式病历服务的是医生，用药 App 只解决一项高频任务，家庭协同工具又没有临床上下文。
- 如果公司能成为把门诊录音、正式病历和长期完成行为对齐的家庭层，它就能积累比单纯转录更难复制的数据和工作流护城河。
strategicChoices:
  beachhead: 美国 35-60 岁成年女儿；她们在替独立居住的父母协调照护，父母每季度看 3 次以上专科，长期服用 5 种以上药物。
  wedgeRationale: 这一群体痛得够频繁，足以支撑订阅；在照护转换之后也有明确购买触发点，而且比起做一款更泛的患者 App，这个切口更快能拿到验证，因为漏做化验、漏配药、漏转诊和漏追问，几周内就看得见。
  sequencingRationale: 公司应该先在自费家庭里证明“手动上传 + 病历对齐”的 MVP，接着再叠加转介合作和选择性 API 接入，最后才测试付款方或医疗机构分发。这个顺序能把产品范围压窄，也更贴合当前证据，不会在留存和信任尚未跑通前就背上企业合规与销售成本。
  notYet:
  - 面向所有成年人的泛患者门诊记录工具
  - 完整的医生侧环境式病历工作流
  - 在自费留存尚未跑通前，就大规模做 Medicare Advantage 或付款方资助分发
  - 多病种照护导航市场或社区产品
market:
  tam: $6.7B 的估算年 TAM，来自 59M 成年照护者、其中 47% 在照护父母或岳父母/公婆，以及 $240 的模型年 ARPU。
  sam: $1.8B 的估算年 SAM，对应具备数字化准备度、在用照护技术、且照护对象年龄在 75 岁以上的高龄父母家庭。
  som: 第 3 年可触达 SOM 约 $8.8M，对应约 36.6K 个家庭，也就是 SAM 的 0.5%，按 $240 年 ARPU 估算。
  segments:
  - 替高龄父母处理慢病、多专科照护的成年子女
  - 会与一名或多名家属照护者共同协同照护的老年人
  buyingProcess: 倡导者、日常用户和第一位买方通常都是同一个成年子女，但激活仍然需要父母同意和现实可行的家庭分享。最可信的动作，是在住院、一次新的专科诊疗链条或用药变化之后，立刻给出低摩擦试用；等第一份照护计划真帮家庭避免漏项后，再把用户转成年付。
product:
  mvp: 先上线移动端录制/上传、医生病历上传、任务抽取、负责人分配、截止日期、用药变化追踪，以及围绕一个高龄父母的共享家庭时间线。第一版先用录音和手动文档跑通，不要一开始就把成败押在深度 EHR 连接上。
  sixMonth: 面向单个高龄父母家庭的生产级 MVP：共享任务清单、手动上传病历后的对齐、同意与分享控制，以及基础提醒和升级逻辑。
  twelveMonth: 为最高收益的病历来源加上选择性门户/API 接入，下一个门诊前的问题准备、转诊闭环追踪，以及按家庭强度拆解的照护者留存分析。
  twentyFourMonth: 扩成一份家庭健康记录：跨多个机构的时间线、用药和转诊依从性自动化，以及面向已验证分群的首批付款方或诊所资助分发试点。
  keyBets:
  - 即便广义互操作性还没解决，手动上传加有限病历同步也能先创造足够价值。
  - 高强度照护家庭会在多次门诊之间反复使用这款 App，而不只是在某一次危机里打开一次。
  - 家庭定价会比 seat 定价更合适，因为真正掏钱的是在替一个父母协调照护的家庭买方，而不是在给个人用户发许可证。
  - 一旦自费留存和信任指标跑通，同一套工作流后续可以自然接到 B2B2C 分发。
gtm:
  wedge: 先做自费家庭订阅，瞄准因住院、新专科转诊或用药变化而被触发的成年子女照护者；通过照护者社区以及部分诊所、出院转介来激活。
  channels:
  - 由创始人亲自去做照护者社区、倡议组织和老龄化非营利机构的合作与外联
  - 和服务高复杂度老年人的老年医学、肿瘤、心内科及医院出院团队做转介试点
  - 只有在留存跑通后，才围绕门诊准备、用药变化和出院后协调去做内容与搜索获客
  funnelTargets: 线索或转介→首个照护计划激活 25-35%；激活照护计划→30 天内付费家庭订阅 20-30%；付费家庭→90 天留存家庭 60%+。
  pricing: 每个家庭每月 $20-$40，或年付 $240-$360；等病历同步可靠性跑通后，再推出更高阶的同步病历档位。家庭定价更贴合买方真实要完成的任务：替一个父母跨很多次门诊把照护协调好。
businessModel:
  revenueStreams:
  - 单个活跃高龄父母照护计划的家庭订阅
  - 面向高强度家庭的高级同步病历与长期记录档位
  - 后续来自医疗机构、诊所或付款方的 B2B2C 资助分发
  unitOfValue: 一个高龄父母家庭的活跃家庭照护计划
  targetGrossMarginPct: 70
  expansionLevers:
  - 把更多家庭成员和照护者纳入同一个家庭工作流
  - 从门诊后行动计划扩到用药依从、转诊闭环和下次门诊准备
  - 把自费验证转成诊所、出院团队或付款方资助分发
strategyMap:
  northStarMetric: 在连续多次门诊里，按时完成照护计划任务的活跃家庭数
  inputMetrics:
  - 线索或转介到首个照护计划激活的转化率
  - 首次照护计划后的 30 天付费转化
  - 每季度两次及以上门诊家庭的 90 天留存
  - 到截止日期前完成的任务占比
  - 目标家庭里，48 小时内拿到已对齐医生病历记录的占比
  moatsToBuild:
  - 把门诊录音、正式病历、任务和完成行为连成一张长期家庭图谱
  - 专为照护者协作设计的信任层：同意、分享和隐私控制
  - 围绕高复杂度诊所和照护者转介路径的渠道合作与上手流程手册
  - 针对用药变化、转诊和未解决临床问题调优的工作流准确性模型
  killCriteria:
  - 前 9 个月测试 3 个获客渠道后，激活家庭少于 100 个，付费家庭少于 30 个
  - 前两轮产品迭代后，高门诊频率家庭的 90 天留存仍低于 40%
  - 即便引入手动上传和选择性集成，48 小时内完成对齐病历的目标家庭占比仍低于 60%
  mermaid: |
    flowchart LR
      Wedge[Care-transition caregiver wedge] --> MVP[Visit plus note care-plan MVP]
      MVP --> Proof[Activation retention and task-completion proof]
      Proof --> Expansion[Referral partnerships and B2B2C expansion]
investorMemo:
  verdict:
    call: 观察
    conviction: 品类时机不错、买方痛点也清晰，但在自费留存和病历接入可靠性被证明之前，信心仍然有限。
    whyBelieve: 照护者负担、患者数据访问提升，以及患者侧门诊记忆这一品类正在成形，这些时机证据都是真实存在的。
    whyDoubt: 买方是压力极大的消费家庭，替代品又多，所以公司可能很难在危机过去后继续守住注意力和定价权。
    nextDiligence: 先证明高强度家庭能从“被触发的一次试用”转成持续付费订阅，并且至少跨两次照护事件继续使用。
  firstCustomer:
    title: 在复杂专科门诊后替高龄父母协调照护的成年子女照护者
    profile: 美国一个家庭里，由一名成年女儿或儿子负责照护 70 岁以上、患有多种慢病、面对多个门户且经常出现用药或转诊变化的父母。
    trigger: 住院、术后出院、用药变化或新一轮专科转诊，会一下子带来太多后续任务，靠笔记、短信和门户已经盯不过来。
    buyer: 成年子女家庭医疗决策者
    initialContract: $0-30 天引导式试用，之后转为每年 $240-$480 的家庭订阅；首个照护转换工作流跑通后，再向高级同步病历档位加价。
  mustBeTrue:
  - 10 位高强度照护者访谈里，至少 5 位明确表示门诊后的后续执行已经痛到值得现在就为家庭工具付费。
  - 完成一份照护计划的家庭里，只要持续面临专科或用药复杂性，90 天留存至少能达到 60%。
  - 靠手动上传加选择性病历接入，至少能在 48 小时内为 60% 的目标家庭生成已对齐照护计划。
  - 照护者社区或诊所转介渠道拿到激活家庭的 CAC，能在 $20-$40 月费下留下足够好看的回本空间。
  - 家庭足够信任这款 App，愿意录门诊、上传病历并共享任务，不会因为隐私顾虑在上手阶段大面积卡住。
  diligenceQuestions:
  - 哪些照护转换事件能带来最快的付费转化和最好的 90 天留存？
  - 目标家庭在其最常用的门户生态里，多大比例能在 48 小时内拿到可用的医生病历？
  - 相比继续依赖免费门户、笔记和用药 App，有多少照护者更愿意买家庭订阅？
  - 照护者社区、出院团队和专科诊所里，哪种转介来源转化最好？
  - 隐私顾虑或诊所反对录音，最常在什么环节卡住激活？
operatingAssumptions:
- assumption: 高强度成年子女照护者只要能稳定减少复杂门诊后的漏项，就愿意每月支付 $20-$40。
  basis: idea.yaml
  validationTest: 做 30 个由触发事件驱动的引导式试用，量化付费转化、价格敏感度，以及按门诊复杂度拆解的 90 天留存。
  decisionImpact: 如果不成立，就把产品收窄成事件型付费照护转换包，或者更早转向资助式分发，而不是扩大自费获客。
- assumption: 在广义 EHR 互操作性还没到位前，手动上传加选择性病历接入已经足够把价值证明出来。
  basis: research.yaml
  validationTest: 跟踪前 50 个家庭的“已对齐照护计划生成时间”和失败原因，覆盖录音、PDF 和最常见门户路径。
  decisionImpact: 如果不成立，产品就得收缩成“只做门诊记忆”，或者等更强的数据接入合作到位后再推。
- assumption: 照护者社区和高复杂度诊所转介，在 CAC 和留存上会优于广撒网式付费消费获客。
  basis: research.yaml
  validationTest: 在承诺扩大增长预算前，先比较至少 3 个渠道的激活、转化和 90 天留存。
  decisionImpact: 如果不成立，公司就该砍增长招聘、放慢直面消费者投放，并更早把重心转向企业或付款方渠道。
- assumption: 靠明确控制和患者主导分享，隐私与同意问题是能管住的，不会变成结构性阻塞。
  basis: research.yaml
  validationTest: 在前 100 次激活里，量化因录音同意、病历分享和照护者访问设置导致的上手流失。
  decisionImpact: 如果不成立，产品必须降低对录音的依赖、加大合规投入，或转成只做病历导入工作流。
- assumption: 在现有厂商加上类似任务层之前，长期照护者工作流数据有机会先长成持久护城河。
  basis: operator judgment
  validationTest: 证明重复使用的家庭任务完成率会继续提升，而且标杆用户会在第二次、第三次照护事件里回来，而不是只用一次性摘要。
  decisionImpact: 如果不成立，业务就只是很薄的一层功能，极易被替代，不适合按风险投资规模继续砸钱。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 由触发事件驱动的照护者访谈与工作流梳理
  hypothesis: 住院、用药变化和新专科转诊，会在一个窄而高强度的 ICP 里制造足够值得掏预算的协调痛点。
  successMetric: 完成 10 次目标访谈，其中至少 6 位把这个切口列为前三大痛点，并同意参加引导式试用
  owner: CEO
- horizon: 0–90 天
  experiment: 用录音和上传病历手工生成照护计划的人工服务式 MVP
  hypothesis: 家庭愿意提供足够的原始材料，让产品生成可执行任务和负责人分配。
  successMetric: 20 个家庭生成首份照护计划，其中至少 70% 给另一名家庭成员分配过至少 1 个任务
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 家庭月付与年付方案的付费转化和定价测试
  hypothesis: 在一次成功的照护转换工作流之后推年付，能改善回本期而不伤转化。
  successMetric: 至少 25% 的激活家庭转为付费，且付费家庭中至少三分之一选择年付
  owner: CEO
- horizon: 90–180 天
  experiment: 和 1 个照护者社区、1 家高复杂度诊所做转介试点
  hypothesis: 被转介来的家庭会比广义自助流量激活更快、留存更好。
  successMetric: 转介分群在激活率和 90 天留存上，至少比自助分群高 20%
  owner: 增长合作负责人
- horizon: 180–270 天
  experiment: 针对主流门户与文档路径的选择性病历接入上线
  hypothesis: 半自动病历接入，相比只靠录音，能显著提高任务准确率和重复使用。
  successMetric: 目标家庭中，已对齐病历覆盖率达到 60%，且中位延迟不超过 48 小时
  owner: 创始工程师
- horizon: 180–365 天
  experiment: 把工作流扩到用药变化和下次门诊准备
  hypothesis: 门诊之间的持续工作流，能把留存从急性事件之后继续抬起来。
  successMetric: 对经历两次及以上照护事件的家庭，90 天留存超过 60%，到期前任务完成率超过 70%
  owner: 照护工作流产品负责人
operations:
- 把同意、分享和访问控制做清楚，让家庭知道谁能录、谁能看病历、谁能改任务。
- 维护一条混合接入管线：支持录音、PDF 上传、OCR 和选择性 API 病历获取，不假定互操作性能一步到位。
- 在首批生产分群里，对用药变化、转诊和未解决问题维持人工复核质检。
- 在大规模雇佣付费获客团队前，先把照护者组织、出院团队和高复杂度专科的转介流程手册跑顺。
- 按家庭维度埋点渠道、激活、留存和病历覆盖率，用数据决定公司该扩自费，还是转向资助分发。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 第一年里，买方痛点、信任、定价和渠道设计都高度耦合，所以创始人必须亲自打单、亲自做发现。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 第一产品风险是如何在杂乱原始输入里准确生成照护计划，因此工程从第一天就得扛住接入、对齐和隐私控制。
- role: 照护工作流产品负责人
  startTiming: 第 1 个月
  rationale: 公司需要有人专盯照护者 UX、任务设计和留存闭环，否则产品很容易停在“生成转录稿”这一步。
- role: 照护运营负责人
  startTiming: 第 3 个月
  rationale: 前几批用户需要上手支持、信任处理，以及围绕敏感健康任务的工作流质检，产品还没法完全自助。
- role: 增长合作负责人
  startTiming: 第 6 个月
  rationale: 前 18 个月的渠道效率，关键不在大水漫灌的付费投放，而在转介合作和社区分发。
milestones:
- horizon: 0–12 个月
  items:
  - 上线面向单个高龄父母家庭的生产级 MVP，支持录音、手动上传病历和共享任务分配
  - 拿到 150 个激活家庭，并至少把其中 30 个转成付费订阅
  - 在照护者社区或高复杂度诊所里签下 2 个转介伙伴
  - 让目标家庭里至少 60% 能在 48 小时内拿到已对齐病历
- horizon: 12–24 个月
  items:
  - 付费家庭突破 1000 个，并在高强度分群里看到可量化留存
  - 在留存家庭里，把到截止日期前完成任务的占比跑到 70% 以上
  - 上线高级同步病历档位，并至少启动 1 个与诊所或付款方伙伴的资助试点
  - 把上手和支持流程手册标准化，让产品能摆脱重人工服务运营继续扩大
- horizon: 24–36 个月
  items:
  - 围绕多个机构和重复照护事件，建起长期家庭健康记录
  - 在保留自费切口的同时，把资助分发扩到 3 个及以上合作伙伴
  - 在留存家庭里证明，用药依从、转诊闭环和下次门诊准备都能重复扩张
  - 只有在留存和渠道经济性都成立时，才去追模型里约 $8.8M 的第 3 年收入情景
risks:
- risk: 事件型参与会让家庭在当下照护危机过去后迅速流失。
  likelihood: High
  impact: High
  mitigation: 先聚焦慢病、高频家庭，并在扩大投入前上线持续性的用药、转诊和下次门诊工作流。
- risk: 正式病历访问和归一化的速度、完整度，都可能比路线图假设得更差。
  likelihood: High
  impact: High
  mitigation: 先用录音和手动上传把价值跑通，优先攻最高价值的门户路径，并按来源持续跟踪病历覆盖可靠性。
- risk: 家庭或诊所会抗拒在消费端 App 里录门诊、共享敏感数据。
  likelihood: Medium
  impact: High
  mitigation: 把同意和分享设置讲明白，支持不录音的上传路径，并把产品定位成患者可控记录，而不是医疗机构监控。
- risk: 免费替代品和相邻 App 会压住定价能力，让 CAC 变得不好看。
  likelihood: High
  impact: Medium
  mitigation: 把差异化押在“对齐后的任务执行”和留存结果上，而不是录音本身；在付费投放前先把转介渠道跑通。
- risk: 在自费验证还不够扎实时，公司就提前冲进付款方或医疗机构渠道。
  likelihood: Medium
  impact: Medium
  mitigation: 把企业招聘和合作扩张都卡在核心家庭切口的留存、病历覆盖和付费转化里程碑之后。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 把照护者照护计划 MVP 做出来并验证掉，先在高强度分群里跑通留存和家庭付费意愿，建立选择性病历接入能力，再拿下首批可重复的转介渠道，之后才扩更广分发。
