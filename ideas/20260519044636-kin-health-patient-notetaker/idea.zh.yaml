differentiator: 多数医疗 AI 文档产品都在替医生提效，而消费医疗 App 往往止步于科普或提醒。这个公司站在患者和家属照护者一侧，要把两套都不完美的事实源对起来：家人在诊室里听到的内容，以及医生事后写下来的记录。比起单纯转录，这个工作流更能守住，因为产品占的是任务完成、责任分配和跨多次门诊的家庭长期上下文。
