problem: 复杂门诊结束后，患者和家属照护者往往只记住一团模糊印象：药怎么改、化验怎么做、转诊找谁、还有哪些问题没问清。真正失灵的不是诊所里的文档记录，而是谈话结束之后，怎么把医嘱落到家里。对要跑多个专科的老年人，这个断点会直接变成漏做检查、重复打电话、用药出错和家属协同混乱。
targetUser:
  primary: 替 70 岁以上父母协调照护的成年子女；父母要看多个专科，也在管理多种药物
  secondary: 希望把就诊背景和下一步同步给家属照护者的老年人
  buyer: 愿意付费减轻照护协调负担的成年子女家庭医疗决策者
startupThesis:
  nonObviousInsight: 值钱的产品不是更好的患者转录稿。一旦就诊录音能和 EHR 里的医生病历记录对上，真正的切口就变成一层共享执行层，把医疗建议拆成患者和照护者各自负责、真正能落地的任务。
  beachhead: 35-60 岁、正在照护独立居住父母的成年女儿；父母每季度至少看 3 次专科、长期服用 5 种以上药物
  wedge: 先做照护者优先的 App，把就诊录音加医生病历记录转成共享照护计划，里面直接带截止日期、用药变化、后续问题和任务负责人
  whyNowCatalyst: 患者侧记录产品拿到种子轮融资，再加上 Kin Health 计划接入 EHR 病历记录，说明“就诊记忆”正在从单点录音新奇功能，变成下游照护执行的结构化输入。
  ventureScalePath: 先从高龄父母就诊后的后续执行切入，先占住家庭健康工作流，再往用药依从、照护导航、转诊预约、照护者协作和付款方资助的照护管理项目扩。
solution: 产品会录下或导入就诊对话，在条件允许时再拉入正式医生病历记录，给家庭生成的不是一份泛泛摘要，而是一套已经对齐过的照护计划。系统会把计划拆成具体动作，比如预约化验、配药、观察副作用、在下次门诊追问没解决的问题。每个任务都带负责人、截止时间和来源片段，能回溯到就诊摘要或医生记录，家属不用重听整段对话就能动手。时间一长，这个 App 就会变成家庭的长期病程记录：哪些地方变了、哪些已经做完、哪些还要升级处理，一目了然。
goToMarketSeed:
  firstCustomer: 已经在陪同或远程协调父母专科门诊的美国成年子女；父母有多种慢病
  buyingTrigger: 住院、第一次转到新专科、用药调整，或一次照护计划交接，突然把一名家属推成“下一步全都得我盯”的那个人
  currentAlternative: 手写笔记、患者门户、家人之间发短信，以及临时拼出来的表格或提醒
  switchingReason: 这个切口给家庭一个共享的单一事实源，把就诊内容和医生病历记录直接变成已分配的动作，而不是逼着家人从记忆和零散门户消息里反推下一步。
  pricingHypothesis: 每个家庭每月 $20-$40；更高档位的价值跟活跃照护计划数量和同步病历记录挂钩。
