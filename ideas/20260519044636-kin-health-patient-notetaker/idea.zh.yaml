jobsToBeDone:
- job: 当父母看完专科、带回一堆新指令时，帮我把这次门诊拆成一份全家共享的任务清单，让该做的下一步都能按时做完。
  currentAlternative: 手写笔记，再给兄弟姐妹发短信
  successMetric: 到截止日期前完成的随访任务占比
- job: 当医生病历记录在门诊后到达时，帮我把它和我们在诊室里听到的内容对起来，好把遗漏问题补出来，也避免用药出错。
  currentAlternative: 手动翻患者门户里的记录，再打电话去诊所确认
  successMetric: 每次门诊后未解决照护问题的下降幅度
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这个主题同时具备融资信号、明确工作流，以及往更深健康数据整合走的产品方向。
  painIntensity:
    score: 5
    rationale: 专科门诊后的下一步一旦漏掉，替慢病家人管病程的家庭会同时付出金钱和情绪代价。
  wedgeClarity:
