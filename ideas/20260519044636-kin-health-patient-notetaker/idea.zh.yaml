topRisks:
- name: 消费者留存
  description: 很多家庭可能只会在急性阶段使用这款产品，危机一过就流失。
  mitigation: 先抓高频慢病家庭，把价值锚在长期照护计划历史，再叠加持续性的用药和预约工作流。
- name: EHR 集成摩擦
  description: 把医生病历记录拉进消费端产品，速度和完整度都可能比路线图假设得更差。
  mitigation: 先靠录音和手动上传把价值跑通，再优先接入患者最容易拿到的病历来源。
- name: 信任与隐私顾虑
  description: 家庭可能会犹豫要不要录下门诊，或把敏感照护计划放进一个新 App。
  mitigation: 在上手阶段把同意、数据控制和分享设置讲清楚，并把产品定位成患者可控的记录，而不是医疗机构的监控工具。
