    threatOfSubstitutes:
      score: 5
      rationale: 手写笔记、患者门户、用药 App、家庭协同 App 和患者侧录音工具，都能用免费或低价的方式解决其中一段问题。
      sourceRefs:
      - 13
      - 27
      - 28
      - 29
    competitiveRivalry:
      score: 4
      rationale: 直接竞争目前还不算最激烈，但相邻品类既多又可信；一旦有人证明“后续执行”能变现，这些玩家都可能扩进来。
      sourceRefs:
      - 1
      - 2
      - 27
      - 28
      - 29
      - 30
  pestle:
  - factor: 政治
    impact: positive
    point: 联邦互操作和访问规则越来越偏向患者主导的数据访问与应用生态。
    sourceRefs:
    - 15
    - 17
  - factor: 经济
    impact: negative
    point: 照护者本来就承担大量无偿劳动和财务压力，这会限制自费订阅能铺开的范围。
    sourceRefs:
    - 4
    - 5
  - factor: 社会
    impact: positive
    point: 人口老龄化叠加门诊后记忆缺口普遍存在，让“家庭后续执行”成为越来越大的家庭问题。
    sourceRefs:
    - 6
    - 21
  - factor: 技术
    impact: positive
    point: 智能手机和患者门户的普及率已经足够高，能支撑主流照护者工作流。
    sourceRefs:
    - 10
    - 11
    - 13
  - factor: 法律
    impact: negative
    point: 即便患者有访问权，处理敏感健康数据的消费端 App 仍要面对隐私预期、病历共享例外和非正式共享账号的现实。
    sourceRefs:
    - 3
    - 20
    - 23
  adoptionFrictionMatrix:
  - friction: 就诊现场的录音与隐私信任
    severity: high
    affectedBuyer: 成年子女与高龄父母
    mitigation: 把同意流程讲清楚，保留分享控制，并把产品定位成患者可控的记录，而不是诊所监控。
    sourceRefs:
    - 3
    - 27
  - friction: 共享访问开通与身份管理
    severity: medium
    affectedBuyer: 成年子女照护者
    mitigation: 提供门户开通帮助、代理访问教育，以及第一天就算账号权限不完整也能跑通的兜底路径。
    sourceRefs:
    - 22
    - 23
    - 24
  - friction: 碎片化门户和文档接入
    severity: high
    affectedBuyer: 要协调多个专科的成年子女
    mitigation: API、手动上传、OCR 和病历归一流程一起上，让病历即便以 PDF 或扫描件形式到达，产品也还能工作。
    sourceRefs:
    - 13
    - 18
  - friction: 急性事件后的事件型参与
    severity: medium
    affectedBuyer: 自费消费家庭
    mitigation: 别只做一次性摘要，要把产品延伸到用药跟踪、转诊闭环和下次门诊前的问题准备。
    sourceRefs:
    - 4
    - 26
    - 28
