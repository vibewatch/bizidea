competitors:
- name: Kin Health
  stage: 种子期
  wedge: 面向患者的就诊录音，输出摘要、下一步动作和家庭分享。
  pricing: 免费
  strength: 是最接近的品类验证，说明患者确实想要一层门诊记忆产品。
  weaknessVsUs: 它更像“帮你记住和总结门诊”，还没真正占到面向长期照护后续执行的共享系统位置。
  sourceRefs:
  - 1
  - 2
  - 3
- name: Medcorder
  stage: 成长期
  wedge: 在复杂照护情境下录下、转录并分享医生门诊内容给家人。
  pricing: 免费
  strength: 在家庭分享和录音工作流上很可信，尤其适合异地家属。
  weaknessVsUs: 更接近转录和提醒，还没走到和正式病历对齐、再生成照护计划这一步。
  sourceRefs:
  - 27
- name: Abridge
  stage: 成长期
  wedge: 深度嵌入临床医生和 EHR 工作流的企业级环境式 AI 病历。
  pricing: 企业联系销售
  strength: 临床病历质量深、可审计性强，也有医疗系统分发能力。
  weaknessVsUs: 它解决的是医生生产力和可计费病历，不是门诊结束后家庭的任务归属和协同。
  sourceRefs:
  - 30
- name: Medisafe
  stage: 成长期
  wedge: 用药依从性管理，加上 Medfriend 照护者提醒。
  pricing: 免费
  strength: 围绕一个高频重复工作流做得很深，也已经有规模和家庭支持入口。
  weaknessVsUs: 用药只是更大照护计划问题的一小段；Medisafe 并不掌握转诊、问题追踪、门诊记忆或病历对齐。
  sourceRefs:
  - 28
- name: Lotsa Helping Hands
  stage: 现有厂商
  wedge: 面向家庭支持网络的照护日历和志愿协同。
  pricing: 免费
  strength: 很适合调动亲友去承担接送、餐食和后勤。
  weaknessVsUs: 没有临床智能、没有能追溯来源的门诊上下文，也抽不出结构化照护计划。
  sourceRefs:
  - 29
regulatoryTechnicalConstraints:
- point: 患者自控的消费端 App 可能并不属于 HIPAA 覆盖实体，因此信任、同意、泄露处理和用户教育都要变成产品自己扛的责任，而不是借用机构背书。
  sourceRefs:
  - 3
  - 17
- point: 共享门户访问在实际操作里仍然很乱：很多老年人并不知道正式的共享访问功能，照护伙伴也常常直接使用患者账号。
  sourceRefs:
  - 23
  - 24
- point: Patient Access API 并不要求手动转换所有大型非结构化文档，所以病历完整度和归一化仍然是技术瓶颈。
  sourceRefs:
  - 18
validationSignals:
- point: 已经有一家拿到风投的创业公司，专门围绕患者侧门诊记忆和后续执行完成了种子轮融资。
  sourceRefs:
  - 1
- point: 2020 到 2024 年间，代理或照护者门户访问翻了一倍以上，说明照护者对健康信息访问有真实需求。
  sourceRefs:
  - 13
- point: 当医疗系统主动推动共享访问时，照护伙伴会查看更多病历和化验，也会安排更多门诊，说明下游动作需求是可观测的。
  sourceRefs:
  - 24
- point: 现有产品已经证明，家庭确实会为录音、用药管理和协同帮助分别寻找单点工具。
  sourceRefs:
  - 27
  - 28
  - 29
openQuestions:
- 有多少成年子女照护者会信任一款消费端 App，愿意录下专科门诊并上传正式病历，即便这款 App 本身不是覆盖实体？
- 高强度照护家庭里，有多少会在急性事件过去后继续保留订阅，而不是退回门户和短信？
- 针对多专科老年人最常见的门户/EHR 组合，正式医生病历能多快被接进来？
- 哪些专科和医疗系统最可能反对患者侧录音，从而在最需要记录的那一刻卡住采集？
