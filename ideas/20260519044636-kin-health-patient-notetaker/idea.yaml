problem: >-
  After a complex visit, patients and family caregivers often leave with a fuzzy memory of medication changes, labs, referrals, and what questions remain unanswered. The failure is not documentation inside the clinic; it is the handoff from conversation to real-world follow-through at home. For older adults with multiple specialists, that gap turns into missed tests, duplicated calls, medication errors, and caregiver coordination chaos.
targetUser:
  primary: Adult children coordinating care for a parent over 70 who sees multiple specialists and manages several medications
  secondary: Older adults who want to share visit context and next steps with family caregivers
  buyer: Adult child household healthcare decision-maker paying to reduce care coordination burden
startupThesis:
  nonObviousInsight: The valuable product is not a better patient transcript. Once visit recordings can be reconciled with physician notes from the EHR, the real wedge becomes a shared execution layer that turns medical advice into assigned, completed tasks across patients and caregivers.
  beachhead: Adult daughters aged 35-60 managing an independently living parent with 3+ specialist visits per quarter and 5+ active medications
  wedge: A caregiver-first app that converts a recorded visit plus physician notes into a shared care plan with due dates, medication changes, follow-up questions, and owner-level task assignment
  whyNowCatalyst: Seed funding behind patient-side notetaking and Kin Health's planned EHR-note ingestion show that visit memory is becoming structured input for downstream care execution, not a standalone recording novelty.
  ventureScalePath: Starting with aging-parent visit follow-through creates a trusted household health workflow that can expand into medication adherence, care navigation, referral scheduling, caregiver collaboration, and payer-sponsored care management programs.
solution: >-
  The product records or imports visit conversations, pulls in the official physician note when available, and produces a reconciled care plan for the family rather than a generic summary for one patient. It breaks the plan into tasks such as booking labs, filling a prescription, watching for side effects, and asking unresolved questions at the next visit. Each task gets an owner, deadline, and context snippet tied back to the visit summary or clinician note so caregivers can act without replaying the whole conversation. Over time, the app becomes the family's longitudinal record of what changed, what was completed, and what still needs escalation.
goToMarketSeed:
  firstCustomer: U.S. adult children already accompanying or remotely coordinating specialist visits for a parent with multiple chronic conditions
  buyingTrigger: A hospitalization, new specialist referral, medication change, or care-plan handoff that suddenly makes one family member responsible for tracking many next steps
  currentAlternative: Manual notes, patient portals, texting between family members, and ad hoc spreadsheets or reminders
  switchingReason: This wedge gives families one shared source of truth that turns the visit and clinician note into assigned actions, instead of forcing them to reconstruct next steps from memory and scattered portal messages
  pricingHypothesis: $20-$40 per family per month, with premium value tied to number of active care plans and synced clinician notes
