topRisks:
  - name: Consumer retention
    description: Families may use the product only during acute episodes and churn once the immediate crisis passes.
    mitigation: Start with high-frequency chronic-care households, anchor value in longitudinal care-plan history, and add recurring medication and appointment workflows.
  - name: EHR integration friction
    description: Pulling physician notes into a consumer product may be slower or less complete than the product roadmap assumes.
    mitigation: Deliver value from recordings and manual uploads first, then prioritize note sources with the best patient-access coverage.
  - name: Trust and privacy concerns
    description: Families may hesitate to record visits or store sensitive care plans in a new app.
    mitigation: Make consent, data controls, and share settings explicit at onboarding and position the app as a patient-controlled record rather than a provider surveillance tool.
