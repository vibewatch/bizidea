jobsToBeDone:
  - job: When my parent leaves a specialist appointment with many new instructions, help me turn that visit into a shared task list, so they can complete the right next steps on time.
    currentAlternative: Writing notes by hand and texting siblings
    successMetric: Percentage of follow-up tasks completed before their due date
  - job: When the physician note arrives after the visit, help me reconcile it with what we heard in the room, so we can catch missed questions and avoid medication mistakes.
    currentAlternative: Reading portal notes manually and calling the clinic for clarification
    successMetric: Reduction in unresolved care-plan questions per visit
