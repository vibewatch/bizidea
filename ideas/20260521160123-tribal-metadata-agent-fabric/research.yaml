    - 16
  - factor: legal
    impact: negative
    point: AI-assisted enterprise changes will face more documentation and oversight demands under frameworks such as ISO 42001 and the EU AI Act.
    sourceRefs:
    - 107
    - 108
  adoptionFrictionMatrix:
  - friction: Incomplete metadata and service mapping can produce false confidence
    severity: high
    affectedBuyer: Platform owners and release managers
    mitigation: Start with narrow change classes, show confidence scores, and require review before execution while graph coverage is being proven.
    sourceRefs:
    - 102
    - 13
    - 63
  - friction: AI-governance and audit teams may resist autonomous changes
    severity: high
    affectedBuyer: CIO staff, security, and compliance stakeholders
    mitigation: Lead with review-first deployment packets and evidence aligned to NIST and ISO controls rather than promising full autonomy on day one.
    sourceRefs:
    - 75
    - 79
    - 107
  - friction: Incumbent Salesforce DevOps tools already own part of the workflow
    severity: medium
    affectedBuyer: Salesforce COEs
    mitigation: Position as the cross-system policy and evidence layer that sits above existing Salesforce tooling rather than replacing it immediately.
    sourceRefs:
    - 22
    - 40
    - 57
  - friction: Integrating CI/CD, ITSM, and approval workflows across teams is operationally heavy
    severity: medium
    affectedBuyer: Release managers and enterprise-app leaders
    mitigation: Package launch templates for Azure DevOps, GitLab, Salesforce, and ServiceNow with prebuilt approval-policy blueprints.
    sourceRefs:
    - 89
    - 92
    - 6
