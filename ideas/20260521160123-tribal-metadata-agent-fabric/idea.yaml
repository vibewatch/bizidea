jobsToBeDone:
  - job: >-
      When the business requests another workflow or approval change, help the enterprise-app admin prove impact and ship it
      safely, so they can reduce backlog without triggering release incidents.
    currentAlternative: Manual sandbox diffs, Jira tickets, spreadsheet checklists, and consultant review
    successMetric: Median cycle time from approved request to production release
  - job: >-
      When leadership asks the team to use AI for admin work, help the business-systems leader define which changes can be
      automated, so they can raise throughput without losing governance or auditability.
    currentAlternative: Blanket human review of every change or risky use of generic copilots
    successMetric: Percentage of low-risk change requests shipped with AI assistance and no rollback event
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      A fresh seed round and multiple corroborating reports validate that metadata-aware enterprise automation is a real
      category, though independent buyer evidence is still limited.
  painIntensity:
    score: 4
    rationale: >-
      Business-systems backlogs and release risk are already painful, and AI pressure makes the cost of unsafe change work
      more visible to CIO staff.
  wedgeClarity:
    score: 5
    rationale: >-
      The entry product is highly specific: dependency-checked deployment packets for Salesforce and ServiceNow change
      requests.
  defensibility:
    score: 4
    rationale: >-
      Defensibility comes from normalized metadata graphs, approval histories, and release outcomes that improve
      recommendations over time, though platform incumbents could add partial features.
  ventureScale:
    score: 5
    rationale: >-
      The same trust layer can expand from one admin workflow into a cross-enterprise authorization and execution platform
      across major systems of record.
topRisks:
  - name: Metadata coverage gaps
    description: >-
      If the graph misses custom objects, hidden dependencies, or environment-specific release rules, the product could
      recommend unsafe changes.
    mitigation: >-
      Start with tightly scoped Salesforce and ServiceNow patterns, show confidence scores on every recommendation, and keep
      human approval mandatory until coverage is verified.
  - name: Incumbent platform bundling
    description: >-
      Salesforce, ServiceNow, or major release-management vendors could ship their own AI admin tooling and compress room
      for an independent vendor.
    mitigation: >-
      Win on cross-system change logic, approval workflows, and audit evidence that spans multiple systems of record instead
      of depending on one platform's native assistant.
  - name: Slow enterprise onboarding
    description: >-
      The product can stall if customers need months of connector work and metadata cleanup before seeing any backlog
      reduction.
    mitigation: >-
      Package a 30-day launch around one well-bounded change queue, prebuilt connectors, and measurable cycle-time savings
      before expanding to broader system coverage.
