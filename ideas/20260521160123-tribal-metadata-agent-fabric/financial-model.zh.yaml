scenarios:
  downside:
    description: "销售周期拉长，实施持续重度依赖服务，更多试点在扩展至更广泛生产之前止步于一条受治理队列。"
    y3RevenueK: 1475.0
    y3EbitdaK: -1109.56
    cashLowPointK: -371.38
    keyAssumptionChanges:
      - "Y2 末客户数降至 8 个而非 10 个，因为付费试点转化更慢。"
      - "Y3 季末客户数降至 10、14、19 和 24。"
      - "混合年度 ARPU 压缩至 $100K，因为第二队列扩展落地更晚。"
  base:
    description: "创始人主导的试点转化为 Q4Y2 末 10 个客户，随后合作伙伴引荐和第二队列扩展将公司带到 Q4Y3 末模型预测的 30 客户 SOM 路径。"
    y3RevenueK: 2400.0
    y3EbitdaK: -462.06
    cashLowPointK: 404.25
    keyAssumptionChanges:
      - "Y2 季末客户数按 6、7、8、10 推进，2 至 3 个试点按计划转化。"
      - "Y3 季末客户数通过创始人主导销售加实施合作伙伴引荐升至 15、20、25、30。"
      - "混合年度 ARPU 维持在 $120K，部分客户从单一受治理队列扩展至证据或第二队列模块。"
  upside:
    description: "更简洁的入驻模板和更强的合作伙伴渠道加速转化，使多队列扩展更早落地，且团队规模不需显著扩大。"
    y3RevenueK: 3120.0
    y3EbitdaK: 41.94
    cashLowPointK: 820.7
    keyAssumptionChanges:
      - "Y2 末客户数升至 12 个而非 10 个，因为试点转化更快，队列扩展更早启动。"
      - "Y3 季末客户数改善为 18、24、30、36。"
      - "混合年度 ARPU 升至 $130K，因为证据包和第二队列治理提前绑定。"
