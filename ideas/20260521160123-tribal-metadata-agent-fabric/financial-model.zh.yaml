slug: business-systems-change-graph
date: "2026-05-21"
currency: USD
modelStartMonth: "2026-06"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-06"
    unit: "month"
    source: "[BP date 2026-05-21] 模型从商业计划日期的次月开始。"
  - id: A2
    name: "Pre-seed 轮开局现金"
    value: "3.0"
    unit: "USD M"
    source: "[BP fundingAsk.targetFundingRangeUsd $3-4M] 模型使用 $3.0M pre-seed 资金，以覆盖 Y2Q4 里程碑并保留 6 个月缓冲。"
  - id: A3
    name: "收入确认惯例"
    value: "Average active customers = (BoP + EoP) / 2"
    unit: "formula"
    source: "企业试点和订阅在期中平均激活的初创财务启发式规则。"
  - id: A4
    name: "第一年客户爬坡"
    value: "[0, 0, 0, 1, 1, 2, 2, 3, 3, 4, 4, 5]"
    unit: "customers EoP by month"
    source: "[BP milestones 0-12 months][BP gtm.funnelTargets] 映射至第 1 年末 2 至 3 个付费试点、至少 2 个生产转化。"
  - id: A5
    name: "第二年客户爬坡"
    value: "[6, 7, 8, 10]"
    unit: "customers EoP by quarter"
    source: "[BP milestones 12-24 months] 第 2 年末退出时达到 10 个付费客户，与管理 8 至 10 条生产队列及早期账户内测量扩展一致。"
  - id: A6
    name: "第三年客户爬坡"
    value: "[15, 20, 25, 30]"
    unit: "customers EoP by quarter"
    source: "[BP market.som][BP milestones 24-36 months][research market.som] 在 Q4Y3 达到模型预测的 30 客户路径，而非超越已定 SOM。"
  - id: A7
    name: "每活跃客户混合年度 ARPU"
    value: "120.0"
    unit: "USD K annual"
    source: "[BP gtm.pricing][research market.som] 使用 $120K 至 $250K 生产年度经常性收入区间的低端，与研究报告 SOM 数学 30 客户 $360 万完全吻合。"
  - id: A8
    name: "毛利率爬坡"
    value: "50% M1-M6; 58% M7-M12; 65% Y2; 70% Y3"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70] 早期试点在模型达到稳态利润率目标前，承载更重的实施和图谱维护负担。"
  - id: A9
    name: "单位经济模型月度客户流失率"
    value: "1.5"
    unit: "percent"
    source: "按年度合同销售的粘性企业工作流软件在品类验证初期的初创财务启发式规则。"
  - id: A10
    name: "创始人/CEO 综合薪资"
    value: "180.0"
    unit: "USD K annual per FTE"
    source: "pre-seed 企业软件公司低于市场水平的创始人现金薪酬初创财务启发式规则。"
  - id: A11
    name: "产品/解决方案综合薪资"
    value: "180.0"
    unit: "USD K annual per FTE"
    source: "[BP team Product / solutions lead] 加含薪资附加的企业工作流产品人才初创财务启发式规则。"
  - id: A12
    name: "工程综合薪资"
    value: "200.0"
    unit: "USD K annual per FTE"
    source: "[BP team Founding eng][BP team Metadata and integrations engineer] 加资深元数据和集成工程人才含薪资附加的初创财务启发式规则。"
  - id: A13
    name: "实施综合薪资"
    value: "160.0"
    unit: "USD K annual per FTE"
    source: "[BP team Implementation engineer] 加企业入驻和连接器配置人才含薪资附加的初创财务启发式规则。"
  - id: A14
    name: "企业销售综合薪资"
    value: "220.0"
    unit: "USD K annual per FTE"
    source: "[BP team Enterprise account executive] 加含浮动薪酬的单一企业销售人员初创财务启发式规则。"
  - id: A15
    name: "客户成功综合薪资"
    value: "140.0"
    unit: "USD K annual per FTE"
    source: "试点转化后生产入驻和账户支持覆盖的初创财务启发式规则。"
  - id: A16
    name: "招聘时间表"
    value: "Founder, product/solutions, and eng in M1; implementation in M4; AE1 in M7; eng2 in M10; customer success in M16; AE2 in M22; eng3 in M28"
    unit: "schedule"
    source: "[BP team][BP strategicChoices.sequencingRationale] 招聘以试点验证、入驻可重复性和后续多队列扩展为门控。"
  - id: A17
    name: "非薪资运营支出爬坡"
    value: "S&M $4K, $6K, $7K, $9K, $12K/mo; R&D $8K, $10K, $12K, $14K, $16K/mo; G&A $8K, $9K, $10K, $11K, $13K/mo across the five operating phases"
    unit: "USD K per month"
    source: "[BP operations][BP experimentRoadmap] 加云服务、出行、法律、安全审查和合作伙伴赋能成本的初创财务启发式规则。"
  - id: A18
    name: "CAC 计算基础"
    value: "48.9"
    unit: "USD K per customer"
    source: "由模型周期内获取 30 个客户的销售与营销支出加 50% 实施和客户成功薪资推导而得。"
  - id: A19
    name: "融资额度测算规则"
    value: "Reach 10 customers, evidence packs, reusable connectors, and multi-queue proof by Q4Y2 plus 6 months of buffer"
    unit: "policy"
    source: "开发者指令加 [BP milestones 12-24 months][BP fundingAsk.useOfFundsSummary]。"
  - id: A20
    name: "现金流简化处理"
    value: "Cash movement equals EBITDA"
    unit: "method"
    source: "初创财务启发式规则：在此阶段，资本支出、税务、债务偿还和营运资金波动均假设可忽略不计。"
