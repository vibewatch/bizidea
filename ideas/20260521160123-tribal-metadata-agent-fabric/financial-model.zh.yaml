modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[目标双平台企业] --> Pilots[付费试点]
      Pilots --> Production[生产客户]
      Production --> Revenue[经常性收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金]
      Production --> Expansion[更多队列与证据包]
      Expansion --> Revenue
modelSanity:
  - checkName: "收入引擎"
    finding: "基准情景收入由 Y1 末 5 个付费账户、Q4Y2 末 10 个账户以及 Q4Y3 末按 $120K 混合 ARPU 扩展至模型预测的 30 客户 SOM 路径驱动。"
  - checkName: "必须做对的事"
    finding: "模型假设入驻能以模板化方式运行，使得一名实施工程师和两名销售人员能将企业销售周期维持在约 9 个月。"
  - checkName: "模型失效条件"
    finding: "若试点转化推迟一个季度，或扩展持续卡在单一队列，下行情景将使现金在 Y3 增长接力之前略微转负。"
  - checkName: "下轮融资证明"
    finding: "下轮融资的依据是：公司展示 10 个客户、可重复连接器、证据包绑定率以及早期账户内的多队列扩展。"
sanityChecks:
  ruleOf40: "Y3 增长率 180.7% + EBITDA 利润率 -19.3% = 161.4%，受 Y2 较小收入基数拉高。"
  burnMultiple: "Y1 消耗乘数为 1.6 倍（$600K 退出年度经常性收入）；Y2 为 1.9 倍（$600K 净新增年度经常性收入）；Y3 改善至 0.2 倍，Q4Y3 EBITDA 转正。"
  revenuePerFte: "Y3 每 FTE 收入 $266.7K，基于年末 9 名全职员工（SaaS 基准 $200–400K）。"
  flags:
    - "基准情景在 Q4Y2 之后仍需净新增 20 个客户，合作伙伴引荐和第二队列扩展是主要执行风险。"
    - "毛利率在 Y3 之前持续低于目标，因为图谱维护和实施工作在前 10 个客户期间依然可观。"
