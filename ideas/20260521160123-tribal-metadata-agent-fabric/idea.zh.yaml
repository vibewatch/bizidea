jobsToBeDone:
  - job: >-
      当业务方提出另一条工作流或审批变更请求时，帮助企业应用管理员证明影响范围并安全发布，从而在不触发发布事故的前提下压缩积压。
    currentAlternative: 手动沙箱对比、Jira 工单、电子表格清单和顾问审阅
    successMetric: 从批准请求到生产发布的中位周期时间
  - job: >-
      当领导层要求团队将 AI 用于管理员工作时，帮助业务系统负责人界定哪些变更可以自动化，从而在不失去治理或可审计性的前提下提升吞吐量。
    currentAlternative: 对每条变更全面人工审阅，或冒险使用通用 Copilot
    successMetric: 借助 AI 完成并无回滚事件的低风险变更请求占比
