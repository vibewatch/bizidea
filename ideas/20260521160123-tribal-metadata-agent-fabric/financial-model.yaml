assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-06"
    unit: "month"
    source: "[BP date 2026-05-21] model starts the month after the business-plan date."
  - id: A2
    name: "Opening cash from pre-seed round"
    value: "3.0"
    unit: "USD M"
    source: "[BP fundingAsk.targetFundingRangeUsd $3-4M] model uses a $3.0M pre-seed to reach the Q4Y2 milestone plus a 6-month buffer."
  - id: A3
    name: "Revenue recognition convention"
    value: "Average active customers = (BoP + EoP) / 2"
    unit: "formula"
    source: "Startup-finance heuristic for enterprise pilots and subscriptions that activate mid-period on average."
  - id: A4
    name: "Year 1 customer ramp"
    value: "[0, 0, 0, 1, 1, 2, 2, 3, 3, 4, 4, 5]"
    unit: "customers EoP by month"
    source: "[BP milestones 0-12 months][BP gtm.funnelTargets] maps to 2-3 paid pilots and at least 2 production conversions by the end of Year 1."
  - id: A5
    name: "Year 2 customer ramp"
    value: "[6, 7, 8, 10]"
    unit: "customers EoP by quarter"
    source: "[BP milestones 12-24 months] exits Year 2 at 10 paying customers, consistent with 8-10 production queues under management and measured expansion inside early accounts."
  - id: A6
    name: "Year 3 customer ramp"
    value: "[15, 20, 25, 30]"
    unit: "customers EoP by quarter"
    source: "[BP market.som][BP milestones 24-36 months][research market.som] reaches the modeled 30-customer path by Q4Y3 rather than exceeding the stated SOM."
  - id: A7
    name: "Blended annual ARPU per active customer"
    value: "120.0"
    unit: "USD K annual"
    source: "[BP gtm.pricing][research market.som] uses the low end of the stated $120K-$250K production ARR range and exactly matches the research SOM math of $3.6M at 30 customers."
  - id: A8
    name: "Gross-margin ramp"
    value: "50% M1-M6; 58% M7-M12; 65% Y2; 70% Y3"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70] early pilots carry heavier implementation and graph-curation load before the model reaches the steady-state margin target."
  - id: A9
    name: "Monthly logo churn for unit economics"
    value: "1.5"
    unit: "percent"
    source: "Startup-finance heuristic for sticky enterprise workflow software sold on annual contracts but still early in category proof."
  - id: A10
    name: "Founder/CEO loaded salary"
    value: "180.0"
    unit: "USD K annual per FTE"
    source: "Startup-finance heuristic for below-market founder cash compensation in a pre-seed enterprise software company."
  - id: A11
    name: "Product/solutions loaded salary"
    value: "180.0"
    unit: "USD K annual per FTE"
    source: "[BP team Product / solutions lead] plus startup-finance heuristic for enterprise workflow product talent with payroll load."
  - id: A12
    name: "Engineering loaded salary"
    value: "200.0"
    unit: "USD K annual per FTE"
    source: "[BP team Founding eng][BP team Metadata and integrations engineer] plus startup-finance heuristic for senior metadata and integrations engineering talent."
  - id: A13
    name: "Implementation loaded salary"
    value: "160.0"
    unit: "USD K annual per FTE"
    source: "[BP team Implementation engineer] plus startup-finance heuristic for enterprise onboarding and connector setup talent."
  - id: A14
    name: "Enterprise sales loaded salary"
    value: "220.0"
    unit: "USD K annual per FTE"
    source: "[BP team Enterprise account executive] plus startup-finance heuristic for one enterprise seller with variable compensation."
  - id: A15
    name: "Customer success loaded salary"
    value: "140.0"
    unit: "USD K annual per FTE"
    source: "Startup-finance heuristic for production onboarding and account support coverage once pilots convert."
  - id: A16
    name: "Hire timing"
    value: "Founder, product/solutions, and eng in M1; implementation in M4; AE1 in M7; eng2 in M10; customer success in M16; AE2 in M22; eng3 in M28"
    unit: "schedule"
    source: "[BP team][BP strategicChoices.sequencingRationale] hiring is gated to pilot proof, onboarding repeatability, and later multi-queue expansion."
  - id: A17
    name: "Non-payroll opex ramp"
    value: "S&M $4K, $6K, $7K, $9K, $12K/mo; R&D $8K, $10K, $12K, $14K, $16K/mo; G&A $8K, $9K, $10K, $11K, $13K/mo across the five operating phases"
    unit: "USD K per month"
    source: "[BP operations][BP experimentRoadmap] plus startup-finance heuristic for cloud, travel, legal, security review, and partner enablement costs."
  - id: A18
    name: "CAC calculation basis"
    value: "48.9"
    unit: "USD K per customer"
    source: "Derived from modeled sales and marketing spend plus 50% of implementation and customer-success payroll divided by 30 customers acquired over the model horizon."
  - id: A19
    name: "Funding ask sizing rule"
    value: "Reach 10 customers, evidence packs, reusable connectors, and multi-queue proof by Q4Y2 plus 6 months of buffer"
    unit: "policy"
    source: "Developer instruction plus [BP milestones 12-24 months][BP fundingAsk.useOfFundsSummary]."
  - id: A20
    name: "Cash flow simplification"
    value: "Cash movement equals EBITDA"
    unit: "method"
    source: "Startup-finance heuristic: capex, taxes, debt service, and working-capital swings are assumed immaterial at this stage."
