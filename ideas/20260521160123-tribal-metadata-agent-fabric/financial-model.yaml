modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Target dual-platform enterprises] --> Pilots[Paid pilots]
      Pilots --> Production[Production customers]
      Production --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash]
      Production --> Expansion[More queues and evidence packs]
      Expansion --> Revenue
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue is driven by 5 paying accounts by Y1 end, 10 by Q4Y2, and expansion to the modeled 30-customer SOM path at $120K blended ARPU by Q4Y3."
  - checkName: "Must go right"
    finding: "The model assumes onboarding becomes template-driven enough that one implementation hire and two sellers can keep enterprise sales cycles near nine months."
  - checkName: "Model breaks if"
    finding: "If pilots convert a quarter later or expansion stays stuck at one queue, the downside case pushes cash slightly negative before the Y3 ramp catches up."
  - checkName: "Next-round proof"
    finding: "The next raise is justified once the company shows 10 customers, repeatable connectors, evidence-pack attach, and multi-queue expansion inside early accounts."
sanityChecks:
  ruleOf40: "Y3 growth 180.7% + EBITDA margin -19.3% = 161.4%, inflated by the small Y2 revenue base."
  burnMultiple: "Y1 burn multiple is 1.6x on $600.0K exit ARR; Y2 is 1.9x on $600.0K net new ARR; Y3 improves to 0.2x and Q4Y3 EBITDA turns positive."
  revenuePerFte: "$266.7K Y3 using 9 year-end FTE (benchmark $200-400K SaaS)"
  flags:
    - "The base case still requires 20 net new customers after Q4Y2, so partner referrals and second-queue expansion are the main execution risks."
    - "Gross margin stays below target until Year 3 because graph curation and implementation work remain material through the first 10 customers."
    - "Base-case cash bottoms near $404K and the downside case goes roughly $371K negative, so a modest slip in pilot conversion would force leaner hiring or an earlier fundraise."
