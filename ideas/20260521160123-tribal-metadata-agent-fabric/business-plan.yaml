slug: business-systems-change-graph
date: '2026-05-21'
executiveSummary: >-
  This company should start as a review-first control plane for Fortune 1000 business-systems teams that run both Salesforce
  and ServiceNow under formal release gates. The urgent pain is not drafting configs with AI; it is proving that a proposed
  workflow, permission, routing, or approval change will not break dependencies, violate policy, or create rollback risk across
  systems that still rely on spreadsheets, sandboxes, Jira, CI/CD logs, and manual CAB review. The best first product is a
  dependency-aware change packet that packages the proposed update, blast-radius analysis, test plan, approvers, and rollback
  steps into one reviewable object. The right wedge is low-risk, high-volume admin changes because they create visible backlog
  relief without asking buyers to trust autonomous execution on day one. Go-to-market should attach to one trigger: a failed
  deployment, audit finding, or executive AI mandate that forces the head of business systems to raise throughput without
  weakening controls. The company should deliberately sit above existing Salesforce DevOps and ServiceNow workflows rather than
  trying to replace them in the first release. The moat is the cross-system graph plus the corpus of approval outcomes,
  rollback events, and safe-change histories that incumbents do not naturally aggregate across both platforms. The biggest
  disconfirming risks are that buyers may prefer to extend an existing Salesforce DevOps suite instead of adding a new control
  layer, and that graph coverage may be too incomplete to support trusted recommendations on common change classes. Market-size
  figures in the research are modeled estimates rather than observed demand, so the first year must prove both standalone
  budget ownership and pilot-to-production conversion.
problem:
  - Enterprise-app teams carry large backlogs of Salesforce and ServiceNow changes, but each seemingly small update can affect permissions, workflows, integrations, CMDB relationships, approvals, and rollback paths that are still checked manually.
  - AI can increase drafting speed, yet business-systems leaders still lack a trusted control layer that shows what will change, what could break, who must approve it, and whether it is safe enough for production.
solution:
  - Build a cross-system metadata and service graph that ingests Salesforce metadata, ServiceNow workflow and approval context, ticket history, and release telemetry to generate one dependency-aware change packet per request.
  - Start with review-first automation for low-risk changes such as permissions, routing rules, workflow edits, field updates, and approval-chain adjustments, then add selective autonomous execution only after graph coverage and approval confidence are proven.
whyWeWin:
  - Salesforce-only DevOps suites and ServiceNow-native governance each solve part of the workflow, but neither naturally owns the shared approval packet and blast-radius analysis across both systems.
  - Buyers already spend on release control, backup, and approval automation, so the company can enter an existing budget line with a more specific cross-system ROI story around faster CAB throughput and fewer rollback events.
  - Every deployed packet adds proprietary data on dependency patterns, approver behavior, rollback outcomes, and safe low-risk actions, which should improve recommendations faster than model quality alone.
strategicChoices:
  beachhead: Fortune 1000 business-systems teams that run both Salesforce Service Cloud and ServiceNow, process 50-plus change requests per week, and require formal CAB or release approvals before production.
  wedgeRationale: This narrow entry point creates faster proof than a broader enterprise-agent platform because the buyer already feels measurable backlog pain, adjacent tool budget exists, and the cross-system approval gap is less well served than Salesforce-only DevOps.
  sequencingRationale: Start with human-reviewed change packets for one queue of low-risk admin changes, then add reusable policy templates, evidence packs, and deeper workflow integrations, and only then unlock autonomous execution or expansion into SAP, NetSuite, or Workday once trust and coverage are real.
  notYet:
    - SAP, Workday, NetSuite, or broad enterprise-agent orchestration before the Salesforce-plus-ServiceNow wedge converts consistently
    - High-risk autonomous production changes that bypass human approval
    - Full replacement of incumbent Salesforce DevOps suites or ServiceNow workflow tooling in the first release
    - SMB or mid-market accounts without formal governance pain or dual-platform complexity
market:
  tam: $120.0M modeled TAM based on roughly 1,000 large-enterprise business-systems teams at about $120k blended annual ACV for a cross-system control plane.
  sam: $36.0M modeled SAM focused on about 300 North American and Western European dual-platform enterprises with formal release gates.
  som: $3.6M modeled year-3 SOM assuming 30 production customers at about $120k ACV after landing through one change-queue wedge and expanding within the account.
  segments:
    - Large-enterprise Salesforce plus ServiceNow platform teams with formal release governance
    - Enterprise application COEs and IT change-management teams that must coordinate approvals and evidence across systems of record
  buyingProcess: >-
    The sale starts when a failed deployment, audit issue, or AI automation mandate exposes that spreadsheet-and-sandbox governance
    no longer scales. The operational champions are platform owners and release managers, but the economic buyer is usually the
    VP or head of business systems, enterprise applications, or a CIO staff leader who can fund a pilot tied to throughput and
    control outcomes.
product:
  mvp: >-
    The MVP is an assisted control plane for one dual-platform change queue that ingests Salesforce metadata, ServiceNow change
    and approval context, and ticket inputs to produce a reviewable change packet with dependency analysis, proposed tests,
    approvers, and rollback steps. It should optimize for explainability, confidence scoring, and workflow fit rather than full
    automation.
  sixMonth: Sign 2-3 design partners, ship packet generation for 3-5 common low-risk change classes, support export-based ingestion plus manual graph curation, and prove that one pilot queue can cut approved-request-to-production cycle time.
  twelveMonth: Add reusable connectors for common Salesforce DevOps and ServiceNow workflow inputs, launch policy templates and audit-evidence packs, and convert at least 2 pilots into production subscriptions with weekly operational use.
  twentyFourMonth: Expand from one queue into multi-queue governance inside existing customers, introduce selective autonomous execution for narrowly bounded low-risk changes, and add a third system of record only after the dual-platform model is repeatable.
  keyBets:
    - Buyers will trust review-first change packets before they trust autonomous execution.
    - A cross-system graph built from exports, APIs, and workflow telemetry can cover common low-risk changes without months of bespoke data cleanup.
    - The first customer will buy a new control layer rather than requiring the capability to come from an incumbent Salesforce DevOps vendor.
    - Audit evidence and rollback-history capture will materially increase conversion and expansion, not just improve product marketing.
gtm:
  wedge: Sell a paid pilot into one live backlog queue where a dual-platform enterprise must increase release throughput after a failed deployment, audit issue, or executive AI mandate, positioning the product as the neutral layer that makes low-risk changes reviewable and safe enough to ship faster.
  channels:
    - Founder-led direct sales to heads of business systems, enterprise applications, and CIO staff leaders
    - Salesforce and ServiceNow implementation partners that already feel release backlog and approval pain inside client accounts
    - Co-sell motions with CI/CD and governance tooling partners where ServiceNow approval workflows already sit beside Azure DevOps or GitLab
  funnelTargets: "Target account→qualified discovery 20-30%, qualified discovery→paid pilot 25-35%, paid pilot→production subscription 50%+, production account→second queue or evidence-module expansion within 12 months 50%+."
  pricing: "$40k-$75k paid pilot for one governed change queue over 8-12 weeks, converting to roughly $120k-$250k ARR priced by managed production instances and monthly approved change packets, with premium modules for policy evidence and later autonomous execution; this matches how buyers budget against rollback risk and CAB throughput instead of seat count."
businessModel:
  revenueStreams:
    - Annual subscription for governed change-packet generation, approval workflow, and production evidence across managed instances
    - One-time implementation and integration fees for new systems, policy templates, and workflow setup
    - Premium modules for audit evidence, policy libraries, and selective autonomous execution
  unitOfValue: Managed production instances and approved change packets processed through the control plane
  targetGrossMarginPct: 70
  expansionLevers:
    - Additional change queues and production instances within the same enterprise account
    - Expansion from review packets into audit evidence, policy packs, and selective autonomous execution
    - Later addition of adjacent systems of record after Salesforce-plus-ServiceNow data coverage and workflow fit are proven
strategyMap:
  northStarMetric: Monthly approved low-risk change packets shipped to production across Salesforce and ServiceNow with no rollback event
  inputMetrics:
    - Number of paid pilots in the defined dual-platform beachhead
    - Percentage of pilot tickets covered by supported low-risk change classes
    - Median reduction in approved-request-to-production cycle time per pilot queue
    - Pilot-to-production conversion rate
    - Percentage of production packets with complete approval and rollback evidence
    - Production accounts expanding to a second queue, second instance, or evidence module
  moatsToBuild:
    - Cross-system graph of metadata dependencies, service relationships, permissions, and approval paths
    - Corpus of approval outcomes, rollback events, and safe low-risk change histories
    - Reusable policy and evidence templates aligned to enterprise AI governance expectations
  killCriteria:
    - Fewer than 3 paid pilots or fewer than 2 production conversions after 12 months of focused selling into dual-platform enterprises
    - No pilot shows at least a 30% cycle-time reduction on a governed change queue without increasing rollback or exception rates
    - More than half of qualified pilots require bespoke graph-building work that cannot be reduced to a repeatable onboarding template within 30 days
  mermaid: |
    flowchart LR
      Wedge[Dual-platform low-risk change wedge] --> MVP[Review-first change packet]
      MVP --> Proof[Faster releases with audit evidence]
      Proof --> Expansion[More queues and selective autonomy]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong workflow pain and credible adjacent budget, but conviction depends on proving that a new cross-system layer wins despite entrenched Salesforce DevOps incumbents.
    whyBelieve: Enterprises already fund release governance and now face AI-driven pressure to increase throughput, creating a specific opening for a cross-system packet and evidence layer that native tools do not fully own.
    whyDoubt: Buyer willingness to add another control plane and the practical completeness of the metadata-plus-service graph are still unproven and could compress both adoption and margins.
    nextDiligence: Confirm with 10 dual-platform enterprises that they will fund a standalone pilot, identify the first safe change classes, and measure whether pilots convert into recurring production use.
  firstCustomer:
    title: VP Enterprise Applications at a Fortune 1000 dual-platform enterprise
    profile: A business-systems organization with dedicated Salesforce and ServiceNow owners, formal CAB review, and a backlog of routine workflow and approval changes across customer or employee operations.
    trigger: A failed deployment, audit finding, or executive mandate to use AI for admin work exposes that current release governance is too slow and too manual.
    buyer: VP or Head of Business Systems
    initialContract: "$40k-$75k pilot for one governed change queue over 8-12 weeks, with a written conversion path to $120k-$250k ARR once the queue runs in production with measured cycle-time and rollback outcomes."
  mustBeTrue:
    - At least 30 beachhead enterprises per year face dual-platform release pain severe enough to fund a standalone cross-system control-layer pilot.
    - One supported set of low-risk change classes can cover at least 50% of pilot queue volume without unacceptable graph gaps or false confidence.
    - The product can reduce median approved-request-to-production cycle time by at least 30% while keeping rollback rates flat or lower.
    - At least half of paid pilots convert to production subscriptions within 6 months of pilot completion.
    - Buyers will accept retention of anonymized dependency, approval, and rollback data so the recommendation moat compounds over time.
  diligenceQuestions:
    - Does the first buyer want a new cross-system layer, or expect this capability from Gearset, Copado, Blue Canvas, or ServiceNow-native tooling?
    - Which initial change classes combine the best trust, frequency, and measurable ROI: permissions, routing rules, workflow edits, field changes, or approval-chain updates?
    - Who signs the first budget most often: VP Enterprise Applications, Head of Business Systems, CIO staff, or a platform-specific owner?
    - How complete are Salesforce dependency maps and ServiceNow CMDB or approval records in real target accounts before heavy cleanup is required?
    - What proof point matters most in conversion from pilot to production: cycle-time reduction, rollback avoidance, CAB labor savings, or audit evidence quality?
operatingAssumptions:
  - assumption: Buyers will fund a standalone cross-system control layer instead of waiting for an incumbent Salesforce DevOps vendor to add similar features.
    basis: research.yaml
    validationTest: Close 2 paid pilots with teams already using at least one incumbent DevOps or ServiceNow governance tool and document why the existing stack was insufficient.
    decisionImpact: If false, the company should shift toward partner-embedded distribution, narrower add-on modules, or a services-led integration strategy instead of a full control-plane product.
  - assumption: Review-first packet generation for low-risk admin changes can create meaningful ROI before autonomous execution is available.
    basis: idea.yaml
    validationTest: In the first 3 pilots, show at least a 30% cycle-time reduction and no increase in rollback rate on supported change classes.
    decisionImpact: If false, the product may be too incremental for enterprise budgets and should narrow to evidence and approval automation or broaden into deeper execution.
  - assumption: Export-based ingestion plus targeted APIs is enough to build a trusted graph for early pilots without months of bespoke data cleanup.
    basis: research.yaml
    validationTest: Onboard 3 design partners to first packet generation within 30 days each, with less than 1 week of manual graph curation per account.
    decisionImpact: If false, implementation cost rises, gross-margin targets weaken, and the ICP must narrow to cleaner environments or larger ACVs.
  - assumption: Economic buyers care more about rollback avoidance and CAB throughput than about seat-based productivity gains.
    basis: operator judgment
    validationTest: Test 3 pricing narratives in at least 10 buyer conversations and secure 2 written pilot scopes priced against governed queues or instances rather than seats.
    decisionImpact: If false, packaging and messaging should move toward user-based pricing or team productivity positioning, which may weaken strategic differentiation.
  - assumption: Audit-evidence packs and approval-history capture will increase pilot conversion and account expansion.
    basis: research.yaml
    validationTest: In the first 2 production accounts, confirm that evidence features are used in live CAB, audit, or AI-governance reviews and support at least 1 paid upsell or renewal justification.
    decisionImpact: If false, roadmap priority should shift toward broader workflow coverage and deeper integrations rather than evidence-heavy modules.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 heads of business systems, Salesforce platform owners, and ServiceNow change leaders at dual-platform enterprises.
    hypothesis: Failed releases, audit issues, and AI mandates create urgent demand for a cross-system review packet on one backlog queue.
    successMetric: At least 10 interviews confirm an active release-governance pain point and 5 agree to share current-state ticket and approval workflows.
    owner: CEO
  - horizon: 0–90 days
    experiment: Build a concierge change-packet prototype from historical Salesforce and ServiceNow tickets for one design partner.
    hypothesis: Buyers will trust packet output for a narrow set of low-risk changes before they trust autonomous execution.
    successMetric: One design partner accepts the packet format for weekly review on at least 20 historical or live tickets.
    owner: Product lead
  - horizon: 0–90 days
    experiment: Label 200 historical change tickets by class, dependency complexity, approver path, and deployment outcome.
    hypothesis: A small number of low-risk change classes represent enough queue volume to justify the initial wedge.
    successMetric: Supported low-risk classes account for at least 50% of sampled ticket volume with clearly lower rollback risk than the queue average.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Convert 2 design partners into paid pilots with packet generation, approval routing, and rollback evidence for one live change queue.
    hypothesis: A paid pilot can be sold on throughput and control outcomes without displacing incumbent workflow tools.
    successMetric: Two paid pilots signed and at least one shows a 30% reduction in approved-request-to-production cycle time.
    owner: CEO
  - horizon: 90–180 days
    experiment: Launch reusable integrations for one Salesforce DevOps input and one ServiceNow approval workflow.
    hypothesis: Standard connectors reduce onboarding effort enough to keep the motion software-like.
    successMetric: Time from kickoff to first live packet drops below 30 days in the second pilot cohort.
    owner: Founding eng
  - horizon: 180–360 days
    experiment: Add audit-evidence packs and selective autonomous execution for one narrowly bounded change class in production.
    hypothesis: Evidence features raise conversion and retention, and selective autonomy can be introduced safely after review-first trust is established.
    successMetric: At least one production account renews or expands because of evidence features, and one approved autonomous workflow runs for 8 weeks with no rollback event.
    owner: Product lead
operations:
  - Run a weekly release-governance review that reconciles ticket intake, dependency confidence, approver status, and rollback readiness for each pilot queue.
  - Maintain a normalized graph model for Salesforce metadata, ServiceNow workflow and approval objects, and packet outcome data.
  - Keep human approval mandatory until confidence thresholds and evidence completeness are proven for each supported change class.
  - Build launch templates for incumbent tool coexistence so the product can sit above existing Salesforce DevOps and ServiceNow workflows rather than forcing rip-and-replace.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the graph ingestion, packet generation, and workflow integration core before adding go-to-market scale.
  - role: Product / solutions lead
    startTiming: Month 0
    rationale: Translate enterprise release nuance into supported change classes, packet UX, and buyer-facing pilot outcomes.
  - role: Implementation engineer
    startTiming: Month 3
    rationale: Make onboarding and connector setup repeatable so pilots do not become founder-operated consulting projects.
  - role: Enterprise account executive
    startTiming: Month 6
    rationale: Scale pilot selling once the first ICP, trigger, and conversion path are validated by founders.
  - role: Metadata and integrations engineer
    startTiming: Month 9
    rationale: Deepen Salesforce, ServiceNow, and adjacent workflow coverage after the first production accounts prove which connectors matter.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2-3 paid pilots in the defined Fortune 1000 dual-platform beachhead
      - Convert at least 2 pilots into production subscriptions with weekly operational use
      - Ship supported packet generation for 3-5 low-risk change classes plus approval and rollback evidence
      - Establish 2 repeatable partner referral paths with Salesforce or ServiceNow implementation firms
  - horizon: 12–24 months
    items:
      - Reach 8-10 production queues under management across multiple enterprise accounts
      - Launch evidence packs and prove at least one paid expansion tied to audit, CAB, or AI-governance workflows
      - Add reusable integrations for the most common Salesforce DevOps and ServiceNow workflow inputs in production accounts
      - Expand from one queue into multi-queue governance within existing customers
  - horizon: 24–36 months
    items:
      - Reach the modeled 30-customer path or revise the thesis based on observed conversion, onboarding cost, and competitive response
      - Introduce selective autonomous execution for a narrow set of low-risk changes with documented safety thresholds
      - Add a third system of record only after dual-platform retention and onboarding economics are repeatable
      - Decide whether broader enterprise-agent orchestration strengthens the moat or distracts from the control-layer wedge
risks:
  - risk: Incumbent Salesforce DevOps suites or native platform tools add enough cross-system governance to narrow the standalone wedge.
    likelihood: Medium
    impact: High
    mitigation: Win on cross-system approval packets, ServiceNow-linked evidence, and coexistence with incumbent tooling rather than head-on replacement.
  - risk: Metadata, CMDB, or approval data quality is too incomplete to support trusted packet recommendations.
    likelihood: High
    impact: High
    mitigation: Start with narrow change classes, use confidence scoring and human review, and constrain the ICP to teams with cleaner governance processes.
  - risk: Buyers treat the product as a feature request for an existing vendor instead of a new budget category.
    likelihood: Medium
    impact: High
    mitigation: Sell against a live failure or AI-governance trigger, prove measurable queue-level ROI, and use pilots that coexist with incumbent tools.
  - risk: Onboarding remains too services-heavy to support the planned gross margin and product velocity.
    likelihood: Medium
    impact: High
    mitigation: Productize launch templates, standard connectors, and supported change classes quickly, and use kill criteria tied to onboarding time and manual curation.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-4M"
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the founding product and solutions team, 2-3 design partners and 2 paid pilot conversions, core Salesforce and ServiceNow graph plus workflow integrations, evidence and policy features, and the first repeatable partner-led distribution motion needed to prove a software-like control-layer business.
