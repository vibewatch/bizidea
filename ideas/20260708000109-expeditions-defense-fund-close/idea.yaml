jobsToBeDone:
  - job: >-
      When a defense OEM is moving from prototype to its first production lot, help the head of supply chain prove that
      every critical component has an acceptable alternate and traceable supplier, so they can clear prime or ministry
      sourcing review without delaying the build.
    currentAlternative: Manual BOM reviews in spreadsheets and email with distributors and engineers
    successMetric: Days to approve a critical component substitution and release the build
  - job: >-
      When an engineering change threatens a fielded configuration, help program and quality leads route validation
      evidence and deviations, so they can ship the next lot with an auditable resilience dossier.
    currentAlternative: PLM change tickets plus consultant-built audit packs
    successMetric: Time to produce a complete configuration-level resilience dossier
ideaScorecard:
  signalStrength:
    score: 4
    rationale: The fund close is an indirect demand signal, but three corroborated sources point to durable European focus on resilience and supply security.
  painIntensity:
    score: 5
    rationale: A missing approved component or incomplete supplier evidence can halt production, procurement, and follow-on financing simultaneously.
  wedgeClarity:
    score: 5
    rationale: The first product is concrete, measurable, and tied to one painful workflow around BOM exposure, substitutions, and dossier generation.
  defensibility:
    score: 4
    rationale: Workflow alone is copyable, but the accepted-alternate graph and program-specific evidence dataset can compound into a durable moat.
  ventureScale:
    score: 4
    rationale: The beachhead is narrow, but the platform can expand into a system of record for the broader European defense industrial base.
topRisks:
  - name: Budget ownership ambiguity
    description: If the product is treated as another engineering tool instead of a production gate, buyers may defer purchase until contracts are already at risk.
    mitigation: Sell against a named release milestone and quantify the cost of one delayed lot or failed sourcing review to anchor the buyer case.
  - name: Evidence standards vary by program
    description: Different ministries and primes may ask for different sourcing, provenance, and deviation artifacts, which can weaken a generic dossier.
    mitigation: Start with German, Polish, and French UAV and tactical-radio workflows, ship template packs for specific programs, and expand only after repeated acceptance.
  - name: Incumbent PLM bundling
    description: Large PLM or QMS vendors could add basic alternate-source fields and compress the surface feature gap.
    mitigation: Build the moat in defense-specific supplier acceptance data, benchmarked alternates, and cross-company resilience workflows that incumbents cannot aggregate quickly.
