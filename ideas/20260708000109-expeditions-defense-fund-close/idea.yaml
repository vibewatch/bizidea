problem: >-
  European defense startups can win attention with a demo, but primes and ministries increasingly ask whether every
  critical board, radio, sensor, and controller can be sourced from resilient, politically acceptable suppliers. The
  evidence for alternate parts, supplier provenance, and engineering deviations still lives across spreadsheets,
  distributor emails, PLM tickets, and consultant decks. That turns every design change into weeks of manual
  re-qualification, delaying low-rate production and weakening the case for follow-on capital.
targetUser:
  primary: >-
    VP Operations or head of supply chain at a 75-300 person European small-UAS or tactical-radio OEM preparing its
    first 100-1,000 unit low-rate production run
  secondary: >-
    NPI, program delivery, or quality lead who owns engineering changes and supplier evidence
  buyer: COO or VP Operations
startupThesis:
  nonObviousInsight: >-
    Europe’s new defense-capital stack is pulling selection earlier in the lifecycle. When strategic LPs and reserved
    follow-on capital show up, the scarce asset is no longer just breakthrough hardware; it is a sovereign,
    substitutable bill of materials that can survive procurement scrutiny and scale without single-source or
    geopolitically exposed fragility.
  beachhead: >-
    Alternate-source approval and resilience dossier workflow for European small-UAS and tactical-radio OEMs shipping
    flight-control, RF, and sensing boards into their first 100-1,000 unit ministry or prime build
  wedge: >-
    A sovereign-BOM control plane that flags exposed parts, coordinates board-level revalidation, and emits a
    contract-ready resilience dossier for each product configuration
  whyNowCatalyst: >-
    Expeditions' Fund II explicitly targets Europe’s capability gaps, industrial resilience, and supply-chain
    security, so startups that can prove resilient sourcing will win budget and follow-on capital faster.
  ventureScalePath: >-
    Start with venture-backed European defense OEMs, then expand the supplier evidence graph into the default
    resilience system of record for primes, lenders, insurers, and government programs funding the continent’s defense
    industrial base.
solution: >-
  The product ingests BOMs, approved vendor lists, supplier declarations, test reports, and engineering-change tickets
  from the systems teams already use. It scores component exposure, surfaces prequalified alternates, and routes the
  exact validation tasks needed before a board or subsystem can be released again. For each configuration, it generates
  a resilience dossier that a prime, ministry, investor, or lender can review without asking the team to rebuild the
  evidence manually. Over time, the company compounds a network dataset of accepted alternates, supplier risk patterns,
  and program-specific evidence requirements that makes every new build faster.
goToMarketSeed:
  firstCustomer: >-
    A 120-person German or Polish small-UAS or tactical-radio OEM with one active national pilot, a 100-500 unit build
    plan, and 50-plus critical electronic components sourced through distributors
  buyingTrigger: >-
    Down-select into a pilot-to-production program or follow-on financing diligence that requires a sovereign-sourcing
    plan, alternate parts list, or supply resilience evidence before release to build
  currentAlternative: >-
    Manual spreadsheet workflow layered on PLM and ERP tickets, distributor email threads, and specialist sourcing
    consultants
  switchingReason: >-
    The product turns existing BOM and supplier data into a live resilience dossier and shortens alternate-source
    approval from months of tribal coordination to days.
  pricingHypothesis: >-
    Annual SaaS fee per active product line plus usage-based pricing for controlled components and supplier dossiers
    shared with primes or ministries
