scenarios:
  downside:
    description: 安全审查持续是定制化项目，伙伴转介绍也没跑出来，公司到 Y3 末只做到 8 条付费产品线。
    y3RevenueK: 1151.3
    y3EbitdaK: -915.7
    cashLowPointK: -79.9
    keyAssumptionChanges:
    - 到 Q4Y2 只做到 5 条、到 Q4Y3 只做到 8 条付费产品线，因为每次部署都需要更多定制证据工作。
    - 经常性 ARPU 从 $180K 下滑到 $165K，上线费从 $50K 降到 $40K，因为买家把首期范围压得更小。
    - 毛利率最高只到 67%，因为主权托管和服务工作迟迟没法标准化。
  base:
    description: 创始人主导销售顺利转化早期共创客户，Y2 开始有转介绍贡献，公司在 Q4Y3 按计划做到 10 条付费产品线，而且 Q4Y2 之后不再额外扩编。
    y3RevenueK: 1680.0
    y3EbitdaK: -511.2
    cashLowPointK: 679.5
    keyAssumptionChanges:
    - 新付费产品线在 M5、M8、M12 签下，之后每季度新增一条，到 Q4Y3 累计 10 条。
    - 经常性 ARPU 稳定在 $180K，上线费 $50K，且从试点签约到开始订阅只隔 1 个月。
    - Y3 毛利率达到 BP 设定的 70%，而且在人头上，Q4Y2 之后一直维持 8 FTE，直到模板复用被证明。
  upside:
    description: 模板复用更早成立，第二条产品线扩容来得更快，公司到 Y3 末做到 12 条付费产品线，价格和毛利率也略高。
    y3RevenueK: 2016.7
    y3EbitdaK: -255.2
    cashLowPointK: 1123.5
    keyAssumptionChanges:
    - 因为转介绍和扩容动作提前了一个季度，付费产品线到 Q4Y2 就做到 8 条、到 Q4Y3 做到 12 条。
    - 随着买方越来越容易看懂资料包 ROI，经常性 ARPU 从 $180K 升到 $190K，上线费从 $50K 升到 $55K。
    - Y3 毛利率提升到 71%，因为德国/波兰/法国模板包被更频繁地复用。
sensitivity:
- variable: ARPU
  downsideCase: $165K 的经常性 ARPU / 每条付费产品线。
  baseCase: $180K 的经常性 ARPU / 每条付费产品线。
  upsideCase: $190K 的经常性 ARPU / 每条付费产品线。
  y3RevenueImpactK: -127.5
  cashImpactK: -141.8
- variable: CAC
  downsideCase: 如果伙伴转介绍没跑通，而 S&M 又比计划高出 20%，CAC 会升到 $166K。
  baseCase: Y2-Y3 的 S&M 支出除以 7 条净新增产品线，得到混合 CAC 为 $138K。
  upsideCase: 如果转介绍和第二条产品线扩容降低了单次成交所需销售投入，CAC 可降到 $117K。
  y3RevenueImpactK: 0.0
  cashImpactK: -241.7
- variable: churn
  downsideCase: 月流失率 2.0%；净留存会让 Y3 后段只剩 9 条活跃产品线。
  baseCase: 月流失率 1.5%；基准节奏仍能做到 10 条产品线。
  upsideCase: 月流失率 1.0%；Q4Y3 会多留住 1 条活跃产品线。
  y3RevenueImpactK: -95.0
  cashImpactK: -66.5
- variable: sales cycle
  downsideCase: 经常性软件要在试点签约 2 个月后才开始。
  baseCase: 经常性软件在试点签约 1 个月后开始。
  upsideCase: 灯塔账户可以在试点签约当月就开始计经常性收入。
  y3RevenueImpactK: -60.0
  cashImpactK: -99.0
- variable: gross margin
  downsideCase: Y3 毛利率卡在 67%。
  baseCase: Y3 毛利率达到 70%。
  upsideCase: Y3 毛利率达到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -50.4
- variable: hiring pace
  downsideCase: 在模板复用尚未证明前，就把 finance/ops 和 AE 招进 Y3。
  baseCase: Q4Y2 之后人头维持在 8 FTE 不再增长。
  upsideCase: 后台继续靠承包支持，不在 Y3 追加任何全职招聘。
  y3RevenueImpactK: 0.0
  cashImpactK: -180.8
modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  Accounts[Target OEM accounts] --> Audits[Qualified resilience audits]\n  Audits --> Pilots[Paid design partners]\n  Pilots --> AnnualLines[Active annual product lines]\n  Pilots --> Onboarding[Onboarding fees]\n  AnnualLines --> Recurring[Recurring software + monitoring]\n  Onboarding --> Revenue[Revenue]\n  Recurring --> Revenue\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> EBITDA[EBITDA after R&D, GTM, and G&A]\n  EBITDA --> Cash[Ending cash]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下，Y3 收入来自 10 条付费产品线 × $180K 经常性 ARPU，再加上后期 3 条新增产品线各自 $50K 的上线费，而不是靠一次性服务收入提前冲高。
- checkName: 必须跑通的条件
  finding: 公司必须把试点到订阅的转化守在接近 1 个月，并让资料包模板复用足够顺，才能打到 70% 的毛利率目标。
- checkName: 模型会在哪失效
  finding: 如果安全审查和定制证据工作把新增节奏拖到 8 条产品线，并把毛利率压在 67% 左右，下行情形期末现金会掉到约 -$80K。
- checkName: 下一轮证明
  finding: 只有当 seed 轮真正做出 3 个客户、5-7 条付费产品线、可量化的模板复用，以及 1 个伙伴带来的部署时，下一轮融资才站得住。
sanityChecks:
  ruleOf40: Y3 增长 66% + EBITDA 利润率 -30% = 36%
  burnMultiple: Y2 烧钱倍数为 1.2x，Y3 为 0.9x（按净新增 ARR 计算）；虽然在改善，但仍高度依赖交付杠杆。
  revenuePerFte: Y3 为 $210K（对标垂直 SaaS 的 $200-400K）
  flags:
  - 基准情形下，Y3 的 Rule of 40 仍低于 40；所以下一轮融资要么靠第二条产品线更快扩容，要么靠交付杠杆继续抬升。
  - 模型在 Y3 恰好做到研究里假设的 10 条付费产品线 SOM，因此风投逻辑仍然依赖后续扩到战术无线电或主承包商侧场景。
  - Q4Y2 之后把人头锁死在 8 FTE 很高效，但如果没有下一轮融资，几乎不给更快的 GTM 爬坡留空间。
  - 只要试点到订阅的转化从 1 个月滑到 2 个月，下行情形在追加招聘之前就会先转成负现金。
