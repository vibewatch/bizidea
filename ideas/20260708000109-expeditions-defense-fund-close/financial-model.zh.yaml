slug: sovereign-bom-readiness
date: '2026-07-08'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: month
  source: '[BP date 2026-07-08] 财务模型从 business-plan 日期的次月开始。'
- id: A2
  name: 种子轮带来的期初现金
  value: '3.0'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $3-4M] 基准情形取种子轮区间下沿，既保持纪律，也足以覆盖安全部署工作和 6 个月缓冲。'
- id: A3
  name: 每条付费产品线的经常性年 ARPU
  value: '180'
  unit: USDK per product-line-year
  source: '[BP gtm.pricing $150k-$200k annual software fee; Research market.tam/sam modeled at ~$180k ACV] 基准情形沿用研究里锚定的 ACV。'
- id: A4
  name: 每条新产品线的上线费
  value: '50'
  unit: USDK per new line
  source: '[BP gtm.pricing $30k-$60k 上线] 基准情形取中位数，反映首个部署需要服务陪跑式的证据映射。'
- id: A5
  name: 从试点到订阅的转化时滞
  value: '1'
  unit: month
  source: '[BP product.keyBets usable dossier in six weeks or less; BP investorMemo.firstCustomer.initialContract 8-12 week 共创客户] 收入假设是：签约当月确认上线收入，经常性软件从次月开始。'
- id: A6
  name: 付费产品线爬坡节奏
  value: M5、M8、M12、M15、M18、M21、M24、M27、M30、M33；第 1 年末 3 条；Q4Y2 7 条；Q4Y3 10 条
  unit: count
  source: '[BP milestones; BP strategyMap.northStarMetric; Research market.som 10 paying program lines by Y3] customersEop 建模时按付费产品线，而不是按客户数计算；新增节奏也落在既定里程碑区间内。'
- id: A7
  name: 毛利率爬坡
  value: 58% Y1 / 66% Y2 / 70% Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70; BP operations; Research sensitivityCases on services-heavy deployments] 早期上线和安全部署更靠人工，所以毛利率会先低于软件目标值。'
- id: A8
  name: 月度流失率
  value: '1.5'
  unit: percent per month
  source: '[BP risks; startup-finance heuristic for early enterprise workflows] 基准情形假设：只要嵌进去，留存就不错；A6 里的新增节奏已经按净增口径处理。'
- id: A9
  name: 各岗位含税现金薪酬
  value: 创始人销售 150；创始工程师 165；产品/供应链负责人 150；解决方案架构师 130；安全/合规工程师 155；集成工程师 150；GTM/合作负责人 170；客户成功/实施经理 125
  unit: USDK per year
  source: '[BP team roles and sequencingRationale; startup-finance heuristic for a lean Europe-based defense-software team including payroll tax and benefits]'
- id: A10
  name: 招聘节奏
  value: M1 创始人销售、创始工程师、产品/供应链负责人；M2 解决方案架构师；M4 安全/合规工程师；M7 集成工程师；M12 GTM/合作负责人；M22 客户成功/实施经理
  unit: timing
  source: '[BP team; BP strategicChoices.sequencingRationale] 先补实施和安全，再放大 GTM；只有当可复制的部署模式出现后，才加 customer success。'
- id: A11
  name: 按职能拆分的薪酬分配
  value: 创始人销售 80% S&M / 20% G&A；创始工程师 100% R&D；产品/供应链负责人 80% R&D / 20% G&A；解决方案架构师 50% R&D / 50% G&A；安全/合规工程师 70% R&D / 30% G&A；集成工程师 100% R&D；GTM/合作负责人 100% S&M；客户成功/实施经理 40% S&M / 60% G&A
  unit: allocation
  source: '[BP team rationales; BP operations] 用来把人力成本拆回销售与营销、R&D 和 G&A 三条线上。'
- id: A12
  name: 非薪酬运营支出爬坡
  value: S&M 8-15K/mo; R&D 10-18K/mo; G&A 6-9K/mo
  unit: USDK per month
  source: '[BP operations; BP product; Research regulatoryTechnicalConstraints] 覆盖差旅、安全托管、开发工具、法务和合规，但不预设重度付费获客开支。'
- id: A13
  name: 混合 CAC
  value: '138'
  unit: USDK per new product line
  source: '[BP gtm.channels and founder-led motion; model calc] CAC 等于 Y2-Y3 的销售与营销支出 $966K，除以 7 条净新增付费产品线。'
- id: A14
  name: 现金转化规则
  value: 现金变动等于 EBITDA
  unit: modeling convention
  source: '[Startup-finance heuristic] 模型忽略种子阶段规模下的债务、capex、税和营运资本波动，默认现金变动等于 EBITDA。'
- id: A15
  name: 下一轮融资的证明里程碑
  value: 覆盖 3 个客户的 5-7 条付费产品线、拿下 1 个伙伴带来的部署、验证德国/波兰/法国模板复用，并留出足够现金启动 Series A 融资流程
  unit: milestone
  source: '[BP milestones 12-24 months; BP investorMemo.nextDiligence] 用来界定融资需求和对外讲述的里程碑。'
- id: A16
  name: Q4Y2 之后的人头纪律
  value: 把人头维持在 8 FTE，直到 Q4Y3
  unit: FTE
  source: '[BP strategicChoices.sequencingRationale; BP risks on standalone software TAM] 在模板复用和伙伴带单被证明前，基准情形会继续守住烧钱。'
- id: A17
  name: 融资规模规则
  value: $3.0M 种子轮融资
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $3-4M; startup-finance heuristic] 取区间下沿，因为招聘策略够克制，但仍要给主权托管和采购拖期留出余量。'
