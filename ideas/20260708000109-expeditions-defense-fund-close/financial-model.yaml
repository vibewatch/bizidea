scenarios:
  downside:
    description: "Security review stays bespoke, partner-led referrals do not materialize, and the company exits Y3 with only 8 paying product lines."
    y3RevenueK: 1151.3
    y3EbitdaK: -915.7
    cashLowPointK: -79.9
    keyAssumptionChanges:
      - "Paid-line additions slip to 5 lines by Q4Y2 and 8 by Q4Y3 because each deployment needs more bespoke evidence work."
      - "Recurring ARPU softens from $180K to $165K and onboarding falls from $50K to $40K as buyers narrow the first scope."
      - "Gross margin tops out at 67% because sovereign-hosting and services work do not standardize fast enough."
  base:
    description: "Founder-led sales converts early design partners, referrals contribute in Y2, and the company reaches the planned 10 paying product lines by Q4Y3 without adding more headcount after Q4Y2."
    y3RevenueK: 1680.0
    y3EbitdaK: -511.2
    cashLowPointK: 679.5
    keyAssumptionChanges:
      - "New paying lines sign in M5, M8, M12, then quarterly through M33, reaching 10 product lines by Q4Y3."
      - "Recurring ARPU stays at $180K with $50K onboarding and one-month conversion from pilot signature to subscription."
      - "Gross margin reaches the BP target of 70% and headcount stays at 8 FTE after Q4Y2 until repeatable template reuse is proven."
  upside:
    description: "Template reuse proves earlier, second-line expansions arrive faster, and the company exits Y3 with 12 paying product lines at slightly better price and margin."
    y3RevenueK: 2016.7
    y3EbitdaK: -255.2
    cashLowPointK: 1123.5
    keyAssumptionChanges:
      - "Paid-line additions pull forward to 8 lines by Q4Y2 and 12 by Q4Y3 because referral and expansion motion starts one quarter earlier."
      - "Recurring ARPU rises from $180K to $190K and onboarding from $50K to $55K as buyer-ready dossier ROI becomes easier to prove."
      - "Gross margin improves to 71% in Y3 because the German/Polish/French template pack is reused more often."
sensitivity:
  - variable: ARPU
    downsideCase: "$165K recurring ARPU per paying product line."
    baseCase: "$180K recurring ARPU per paying product line."
    upsideCase: "$190K recurring ARPU per paying product line."
    y3RevenueImpactK: -127.5
    cashImpactK: -141.8
  - variable: CAC
    downsideCase: "$166K CAC if S&M spend runs 20% above plan before partner referrals work."
    baseCase: "$138K blended CAC from Y2-Y3 S&M spend divided by 7 net new lines."
    upsideCase: "$117K CAC if referrals and second-line expansions reduce sales effort per win."
    y3RevenueImpactK: 0.0
    cashImpactK: -241.7
  - variable: churn
    downsideCase: "2.0% monthly churn; net retention leaves only 9 active lines in late Y3."
    baseCase: "1.5% monthly churn; base cadence still reaches 10 lines."
    upsideCase: "1.0% monthly churn; one extra line stays active into Q4Y3."
    y3RevenueImpactK: -95.0
    cashImpactK: -66.5
  - variable: sales cycle
    downsideCase: "Recurring software starts 2 months after pilot signature."
    baseCase: "Recurring software starts 1 month after pilot signature."
    upsideCase: "Recurring software starts in the same month for lighthouse accounts."
    y3RevenueImpactK: -60.0
    cashImpactK: -99.0
  - variable: gross margin
    downsideCase: "Y3 gross margin stalls at 67%."
    baseCase: "Y3 gross margin reaches 70%."
    upsideCase: "Y3 gross margin reaches 72%."
    y3RevenueImpactK: 0.0
    cashImpactK: -50.4
  - variable: hiring pace
    downsideCase: "Pull finance/ops and AE hires into Y3 before repeatable template reuse is proven."
    baseCase: "Hold headcount flat at 8 FTE after Q4Y2."
    upsideCase: "Keep contractor support for back office and avoid any incremental Y3 hiring."
    y3RevenueImpactK: 0.0
    cashImpactK: -180.8
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts[Target OEM accounts] --> Audits[Qualified resilience audits]
      Audits --> Pilots[Paid design partners]
      Pilots --> AnnualLines[Active annual product lines]
      Pilots --> Onboarding[Onboarding fees]
      AnnualLines --> Recurring[Recurring software + monitoring]
      Onboarding --> Revenue[Revenue]
      Recurring --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA after R&D, GTM, and G&A]
      EBITDA --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case Y3 revenue comes from 10 paying product lines at $180K recurring ARPU plus $50K onboarding on three late-period additions, not from outsized services pull-forward."
  - checkName: Must go right
    finding: "The company must keep pilot-to-subscription conversion near one month and reuse dossier templates well enough to hit the 70% gross-margin target."
  - checkName: Model breaks if
    finding: "If security review and bespoke evidence work slow additions to 8 lines and cap margin near 67%, the downside case ends with roughly -$80K of cash."
  - checkName: Next-round proof
    finding: "The next financing is justified only if the seed round produces 5-7 paying lines across 3 customers, measurable template reuse, and one partner-sourced deployment before the Series A process."
sanityChecks:
  ruleOf40: "Y3 growth 66% + EBITDA margin -30% = 36%"
  burnMultiple: "Y2 burn multiple 1.2x and Y3 burn multiple 0.9x on net new ARR; improving, but still dependent on delivery leverage."
  revenuePerFte: "$210K Y3 (benchmark $200-400K vertical SaaS)"
  flags:
    - "Base-case Rule of 40 is still below 40 in Y3, so the next round needs either faster second-line expansion or better delivery leverage."
    - "The model reaches exactly the researched Y3 SOM of 10 paying product lines, so the venture case still depends on later tactical-radio or prime-facing expansion."
    - "Holding headcount flat at 8 FTE after Q4Y2 is efficient but leaves little room for a faster GTM ramp without another raise."
    - "If the one-month pilot-to-subscription conversion slips to two months, the downside case turns cash negative even before adding more headcount."
