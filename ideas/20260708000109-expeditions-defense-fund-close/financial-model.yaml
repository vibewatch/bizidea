slug: sovereign-bom-readiness
date: "2026-07-08"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-08"
    unit: month
    source: >-
      [BP date 2026-07-08] The financial model starts in the month after the
      business-plan date.
  - id: A2
    name: Opening cash from seed round
    value: "3.0"
    unit: USDM
    source: >-
      [BP fundingAsk targetFundingRangeUsd $3-4M] Base case uses the floor of
      the stated seed range to stay disciplined while still funding secure
      deployment work and a six-month buffer.
  - id: A3
    name: Recurring annual ARPU per paying product line
    value: "180"
    unit: USDK per product-line-year
    source: >-
      [BP gtm.pricing $150k-$200k annual software fee; Research market.tam/sam
      modeled at ~$180k ACV] Base case uses the research-backed ACV anchor.
  - id: A4
    name: Onboarding fee per new product line
    value: "50"
    unit: USDK per new line
    source: >-
      [BP gtm.pricing $30k-$60k onboarding] Base case uses a midpoint to reflect
      services-assisted evidence mapping in the first deployment.
  - id: A5
    name: Pilot-to-subscription lag
    value: "1"
    unit: month
    source: >-
      [BP product.keyBets usable dossier in six weeks or less; BP
      investorMemo.firstCustomer.initialContract 8-12 week design partner]
      Revenue assumes onboarding is paid at signature and recurring software
      starts one month later.
  - id: A6
    name: Paying product-line cadence
    value: "M5, M8, M12, M15, M18, M21, M24, M27, M30, M33; Y1 end 3 lines; Q4Y2 7 lines; Q4Y3 10 lines"
    unit: count
    source: >-
      [BP milestones; BP strategyMap.northStarMetric; Research market.som 10
      paying program lines by Y3] customersEop is modeled as paying product
      lines, not logos, and the cadence stays inside the stated milestone band.
  - id: A7
    name: Gross margin ramp
    value: "58% Y1 / 66% Y2 / 70% Y3"
    unit: percent
    source: >-
      [BP businessModel.targetGrossMarginPct 70; BP operations; Research
      sensitivityCases on services-heavy deployments] Margin starts below the
      software target because onboarding and secure deployment are manual early.
  - id: A8
    name: Monthly churn
    value: "1.5"
    unit: percent per month
    source: >-
      [BP risks; startup-finance heuristic for early enterprise workflows] Base
      case assumes good retention once embedded, while customer-addition cadence
      in A6 is net of churn.
  - id: A9
    name: Loaded cash compensation by role
    value: "Founder seller 150; founding engineer 165; product/domain lead 150; solutions architect 130; security/compliance engineer 155; integration engineer 150; GTM/partnerships lead 170; customer success/implementation manager 125"
    unit: USDK per year
    source: >-
      [BP team roles and sequencingRationale; startup-finance heuristic for a
      lean Europe-based defense-software team including payroll tax and
      benefits]
  - id: A10
    name: Hiring cadence
    value: "M1 founder seller, founding engineer, product/domain lead; M2 solutions architect; M4 security/compliance engineer; M7 integration engineer; M12 GTM/partnerships lead; M22 customer success/implementation manager"
    unit: timing
    source: >-
      [BP team; BP strategicChoices.sequencingRationale] Implementation and
      security hires come before scaled GTM, and customer success is added only
      after repeatable deployment patterns appear.
  - id: A11
    name: Functional payroll allocation
    value: "Founder seller 80% S&M / 20% G&A; founding engineer 100% R&D; product/domain lead 80% R&D / 20% G&A; solutions architect 50% R&D / 50% G&A; security/compliance engineer 70% R&D / 30% G&A; integration engineer 100% R&D; GTM/partnerships lead 100% S&M; customer success/implementation manager 40% S&M / 60% G&A"
    unit: allocation
    source: >-
      [BP team rationales; BP operations] Used to reconcile headcount cost into
      sales and marketing, R&D, and G&A lines.
  - id: A12
    name: Non-payroll operating spend ramp
    value: "S&M 8-15K/mo; R&D 10-18K/mo; G&A 6-9K/mo"
    unit: USDK per month
    source: >-
      [BP operations; BP product; Research regulatoryTechnicalConstraints]
      Covers travel, secure hosting, dev tooling, legal, and compliance without
      assuming paid-demand-gen heavy spend.
  - id: A13
    name: Blended CAC
    value: "138"
    unit: USDK per new product line
    source: >-
      [BP gtm.channels and founder-led motion; model calc] CAC equals Y2-Y3
      sales and marketing spend of $966K divided by 7 net new paying product
      lines.
  - id: A14
    name: Cash conversion policy
    value: "Cash movement equals EBITDA"
    unit: modeling convention
    source: >-
      [Startup-finance heuristic] The model ignores debt, capex, taxes, and
      working-capital swings at seed scale.
  - id: A15
    name: Next-round proof milestone
    value: "5-7 paying product lines across 3 customers, one partner-sourced deployment, German/Polish/French template reuse, and enough cash to start a Series A process"
    unit: milestone
    source: >-
      [BP milestones 12-24 months; BP investorMemo.nextDiligence] Used to size
      the funding ask and the investor-facing milestone language.
  - id: A16
    name: Headcount discipline after Q4Y2
    value: "Hold at 8 FTE through Q4Y3"
    unit: FTE
    source: >-
      [BP strategicChoices.sequencingRationale; BP risks on standalone software
      TAM] The base case preserves burn until template reuse and partner-sourced
      demand are proven.
  - id: A17
    name: Funding ask sizing rule
    value: "$3.0M seed round"
    unit: USD
    source: >-
      [BP fundingAsk targetFundingRangeUsd $3-4M; startup-finance heuristic]
      Uses the bottom of the stated range because the model stays lean on hiring
      but still needs contingency for sovereign-hosting and procurement slippage.
