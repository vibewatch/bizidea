  - 35
  - 36
- name: PTC Windchill
  stage: incumbent
  wedge: Lifecycle traceability, configuration control, and secure collaboration for regulated products.
  pricing: Sales-led enterprise pricing; no public list price on the product page.
  strength: Broad PLM footprint and strong traceability language for regulated products.
  weaknessVsUs: General-purpose PLM rather than a defense-specific alternate-source and dossier workflow.
