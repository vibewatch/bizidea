openQuestions:
- How many European prime or ministry programs now require explicit sovereign-sourcing or alternate-part evidence before release-to-build?
- Which evidence fields are common enough across German, Polish, French, and UK programs to support 60%+ dossier-template reuse?
- Will buyers fund this from operations and quality budgets, or only when tied to financing diligence or a live procurement gate?
- Can the startup access enough unclassified supplier and test data early to train an accepted-alternate graph without long on-prem deployments?
