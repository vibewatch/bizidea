  validationPlan:
  - priority: high
    question: How often do primes, ministries, or investors explicitly request sovereign-sourcing or alternate-part evidence before release-to-build?
    evidenceToGather: Collect 10 recent procurement, financing, or prime-review packets from European drone and secure-communications OEMs and map which BOM, supplier, and provenance fields were mandatory.
  - priority: high
    question: Which two or three country or program families share enough structure to support 60%+ dossier-template reuse?
    evidenceToGather: Compare German, Polish, French, and UK evidence packs side by side and quantify overlap in declarations, tests, signatures, and approval steps.
  - priority: medium
    question: What is the real ACV ceiling for a first workflow deployment inside a 75-300 person defense OEM?
    evidenceToGather: Run 8-10 buyer interviews tied to current milestones and benchmark the cost of manual engineering labor, sourcing consultants, and one delayed build lot.
  - priority: medium
