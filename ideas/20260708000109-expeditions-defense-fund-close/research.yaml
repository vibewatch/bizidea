- name: Siemens Teamcenter + Polarion
  stage: incumbent
  wedge: Digital-thread stack across PLM, requirements, configuration, and compliance-heavy lifecycle management.
  pricing: Tiered Teamcenter X plans plus request-a-quote; Polarion is sales-led.
  strength: System-of-record position inside engineering, change control, and traceability.
  weaknessVsUs: Does not natively gather supplier-risk evidence or turn sovereign-BOM substitutions into accepted resilience packets.
  sourceRefs:
