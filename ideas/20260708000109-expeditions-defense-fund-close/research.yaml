  wedge: Defense-industrial-base supply-chain mapping, alternative supplier discovery, compliance, and provenance visibility to nth-tier nodes.
  pricing: Enterprise / contact-sales motion; no public list price.
  strength: Strong DIB positioning, alternative-supplier search, and provenance-led risk monitoring.
  weaknessVsUs: Broad third-party-risk posture; not purpose-built for board-level revalidation or configuration-specific build-release workflows.
