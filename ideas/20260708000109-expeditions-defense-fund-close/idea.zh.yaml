problem: 欧洲国防创业公司靠演示能吸引注意，但主承包商和政府部门越来越会追问：关键电路板、无线电、传感器和控制器，能不能从更稳、政治上也站得住脚的供应商那里拿到货？替代料、供应商来源、工程偏差的证据，现在还散在电子表格、分销商邮件、PLM 工单和顾问材料包里。结果就是，每次设计变更都要人工重做几周认证，小批量初始生产被拖慢，后续融资也更难讲圆。
targetUser:
  primary: 准备首个 100-1,000 台小批量生产的欧洲小型 UAS 或战术无线电 OEM，规模在 75-300 人之间；一号用户通常是运营副总裁或供应链负责人
  secondary: 负责工程变更和供应商证据的新产品导入、项目交付或质量负责人
  buyer: COO 或 VP Operations
startupThesis:
  nonObviousInsight: 欧洲新的国防资本结构把筛选动作前移了。战略 LP 和预留的后续资金一旦更早进场，最稀缺的资产就不再只是硬件突破，而是一份既主权可控、又能替代的 BOM：它既经得起采购审查，也能在没有单点依赖和地缘风险暴露的前提下放大生产。
  beachhead: 先切欧洲小型 UAS 和战术无线电 OEM 的替代来源审批与韧性资料包工作流——这类公司正把飞控、RF 和感知板卡推向首个 100-1,000 台的部委或主承包商批次。
  wedge: 做一层主权 BOM 控制平面：标记暴露部件、协同板级重新验证，并为每个产品配置吐出一份可直接用于合同审查的韧性资料包。
  whyNowCatalyst: Expeditions 的 Fund II 明确瞄准欧洲的能力缺口、产业韧性和供应链安全，所以谁能证明自己的采购来源更稳，谁就更容易更快拿到预算和后续资金。
  ventureScalePath: 先从欧洲有风投注资的国防 OEM 切入，再把供应商证据图谱扩成主承包商、放贷方、保险方以及政府项目的默认韧性记录系统，服务整个欧洲防务工业底盘。
solution: 产品会把 BOM、已批准供应商清单、供应商声明、测试报告和工程变更工单，从团队现有系统里接进来。它会评估元器件暴露度、找出预先合格的替代件，并把一块板卡或一个子系统重新放行前真正要补的验证任务精确派出去。针对每个配置，系统都会生成一份韧性资料包，主承包商、部委、投资人或放贷方不用再让团队把证据手工拼一遍。时间一长，公司会沉淀一张网络级数据集：哪些替代件被接受、供应商风险怎么分布、不同项目各自要什么证据；这样每次新项目都会更快。
goToMarketSeed:
  firstCustomer: 一家位于德国或波兰的小型 UAS 或战术无线电 OEM，约 120 人规模，手里已有一个国家级试点，规划生产 100-500 台，并且有 50 多个关键电子元件依赖分销商采购。
  buyingTrigger: 进入试点转量产的筛选阶段，或在做后续融资尽调时，需要在放行生产前拿出主权采购来源方案、替代件清单或供应韧性证据。
  currentAlternative: 在 PLM 和 ERP 工单之上再叠一层手工表格、分销商邮件往来和专项采购来源顾问。
  switchingReason: 这套产品能把现有 BOM 和供应商数据直接变成一份动态韧性资料包，把替代来源审批从靠人硬协调的数月，压到几天。
  pricingHypothesis: 按活跃产品线收年费，再按受控元器件数量和对外共享给主承包商或部委的供应商资料包用量计费。
