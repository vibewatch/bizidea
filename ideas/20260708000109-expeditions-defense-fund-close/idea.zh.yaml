differentiator: 通用的 PLM、ERP 和供应商风险工具会记零件，却不会把元器件暴露度翻成主承包商、部委或战略 LP 真会接受的国防韧性证据。这家公司赢面在于：围绕欧洲国防项目，持续沉淀一张“可接受替代件 + 供应商声明 + 配置级审批结果”的活图谱。每一次替代被批准、每一次供应商被否掉，都会让下一个客户的资料包更快，也更可信。
conceptDiagram:
  title: 主权 BOM 工作流
  mermaid: "flowchart LR\n  Ops[Defense OEM ops lead] --> Pain[Fragile BOM and manual supplier proof]\n  Pain --> Product[Sovereign BOM OS]\n  Product --> Output[Approved alternates and resilience dossier]\n  Output --> Outcome[Faster contract ramp and follow-on capital]\n"
