jobsToBeDone:
- job: 当一家国防 OEM 正从原型转向首个生产批次时，帮供应链负责人证明每个关键元器件都有可接受的替代项和可追溯的供应商，这样他们就能通过主承包商或部委的采购来源审查，而不耽误生产。
  currentAlternative: 工程师和分销商在表格、邮件里手工做 BOM 审查
  successMetric: 批准一个关键元器件替代方案并放行生产所需的天数
- job: 当工程变更威胁到已部署配置时，帮项目和质量负责人把验证证据与偏差流程串起来，这样下一批货还能带着可审计的韧性资料包按时发出去。
  currentAlternative: PLM 变更工单加上顾问拼出来的审计包
  successMetric: 生成完整配置级韧性资料包所需时间
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 基金募集本身是间接需求信号，但三家来源相互印证，说明欧洲对韧性和供应安全的关注不会是短噪音。
  painIntensity:
    score: 5
    rationale: 少一个获批元器件，或供应商证据补不齐，生产、采购和后续融资都可能同时卡住。
  wedgeClarity:
    score: 5
    rationale: 第一款产品足够具体、可衡量，而且直接卡在 BOM 暴露、替代和资料包生成这条痛工作流上。
  defensibility:
    score: 4
    rationale: 工作流本身容易被抄，但已获批替代件图谱和项目级证据数据会越用越厚，能慢慢变成护城河。
  ventureScale:
    score: 4
    rationale: 滩头市场不大，但平台可以往整个欧洲防务工业底盘的系统记录层扩。
topRisks:
- name: 预算归属不清
  description: 如果产品被当成又一个工程工具，而不是生产放行关口，买家可能要等到合同真要出风险时才愿意掏钱。
  mitigation: 围绕一个明确的放行里程碑去卖，并量化“一个批次延误”或“一次采购来源审查失败”的成本，把购买理由钉死。
- name: 不同项目的证据标准差异太大
  description: 不同部委和主承包商要求的采购来源、来源追踪和偏差材料并不一样，通用资料包很容易失效。
  mitigation: 先从德国、波兰、法国的 UAV 和战术无线电工作流起步，为具体项目推出模板包，反复被接受后再扩。
- name: 现有 PLM 厂商可能打包进来
  description: 大型 PLM 或 QMS 厂商完全可能补上基础的替代来源字段，压缩表层功能差距。
  mitigation: 把护城河建在国防专用的供应商接受数据、基准替代件和跨公司韧性工作流里——这些数据，现有厂商很难快速聚起来。
