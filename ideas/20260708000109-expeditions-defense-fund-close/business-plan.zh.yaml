slug: sovereign-bom-readiness
date: '2026-07-08'
executiveSummary: 如今，欧洲国防资本和采购体系都在奖励产业韧性，所以对想冲进小批量初始生产的创业公司来说，主权采购来源已经从运营烦心事变成了董事会层面的硬门槛。最尖的首批客户，是那些 75-300 人规模、拥有 50 多个关键电子元件、并且会在未来 180 天内迎来生产放行、试点转量产筛选或融资尽调的欧洲小型 UAS OEM。今天，替代来源审批依旧散在 PLM 工单、表格、分销商邮件和顾问材料包之间；结果就是，只要一个控制器、RF 元件或传感器暴露，合同爬坡和后续融资都会一起被拖住。产品第一步应该是一层主权 BOM 控制平面：把 BOM、供应商和测试证据接进来，标记暴露部件，派发板级重验证任务，并产出配置级韧性资料包。GTM、定价和上线都要围绕一条正在运行的产品线和一个迫在眉睫的放行里程碑来设计：创始人亲自卖给 COO 或 VP Operations，首个部署带服务陪跑，年费按活跃产品线收，而不是按席位。真正的护城河只会在一件事成立后出现：重复部署能否比 PLM 和供应风险现有厂商更快地沉淀出一张“已获批替代件图谱”和一套按国家划分的资料包模板库。这家公司讲得通，但现在还不到合伙人会级别，因为独立软件 TAM 不大，而且独立叠加层的预算归属还没被证明。眼下有两个缺口不能假装不存在，必须当成验证重点：德国、波兰、法国项目之间，到底有多少资料包结构真能复用；以及在必须完整上本地部署之前，靠脱敏数据到底能先交付出多大价值。
problem:
- 欧洲小型 UAS OEM 一旦进入首批 100-500 台生产，就必须证明关键电子件都有可接受的替代项、合规供应商和可追溯证据；但底层数据仍然散在 PLM、ERP、邮件和手工采购来源流程里。
- 停产、涉华依赖，以及双用途或出口管制限制，会让一个零件 EOL 或地缘风险提示立刻演变成几周人工重验证，拖慢放行生产，也削弱融资或采购环节的可信度。
- PLM、ERP 和零件风险工具能展示料单或风险信号，但它们并不会在真正卡关的时候，自动拼出主承包商、部委或投资人要看的那份“买方定制”韧性资料包和审批记忆。
solution:
- 把 BOM、已批准供应商清单、供应商声明、测试报告和工程变更工单，接进一层只覆盖单条活跃产品线的安全叠加层。
- 给暴露元器件打分，找出预先合格的替代项，并把一块板卡或一个子系统重新放行前真正需要的验证任务、签字和证据附件精准派发出去。
- 为主承包商、部委和融资尽调生成配置级韧性资料包，并把每一次被批准的替代方案沉淀成可复用的已获批替代件图谱。
whyWeWin:
- 这条切口直接绑在一个被点名的放行生产或尽调事件上，所以买家、触发点和 ROI 都比通用供应链可视化软件清楚得多。
- 叠加层架构能和现有 PLM、ERP 与质量系统协同，对安全敏感的国防团队来说，这比整套替换现实得多。
- 每一次审批都会沉淀一份专有记忆：某个买方或项目到底接受了哪些替代件、供应商和证据包。
- 先从欧洲无人机量产切入，能瞄准政策压力最强、产业爬坡最快、涉华元器件压力也最明显的细分。
strategicChoices:
  beachhead: 先做 75-300 人规模欧洲小型 UAS OEM 的替代来源审批与韧性资料包工作流——它们正准备把电子件占比很高的飞行器推进首个 100-500 台的小批量初始生产。
  wedgeRationale: 先抓小型 UAS 量产，比一上来就做更宽的国防软件切入更容易拿到证明，因为用户、触发点和痛点都集中：运营负责人已经在承受主权元器件压力、真实生产里程碑和涉华供应链担忧。要是现在就去做战术无线电、面向主承包商的全域供应商管理，或通用 BOM 治理，只会在公司还没证明一条可复制工作流前，先把买方类型和证据模式搞得更复杂。
  sequencingRationale: 产品第一步只做单条产品线的 BOM 接入、暴露部件评分、验证派单和资料包生成，因为这就是拿下第一笔“已预算化放行事件”所需的最小功能集。GTM 要继续由创始人主导、并辅以服务陪跑，直到公司证明至少两类国家或项目家族之间的模板能复用。招聘也按这个顺序走：先补实施和安全，再放大销售，因为头 18 个月真正卡公司的，是部署信任和见效速度。
  notYet:
  - 在 3 家无人机客户证明模板模型前，不做战术无线电 OEM
  - 不做面向主承包商全域铺开的供应商门户或买方侧采购分析
  - 不替换完整 PLM 或 ERP
  - 在跨客户数据集成形前，不做放贷方或保险方分析
  - 不碰涉密任务规划或指挥控制工作流
market:
  tam: $32.4M 的自下而上 TAM：约 150 个欧洲电子密集型无人系统或安全通信项目团队 × 1.2 条活跃产品线 × 每条约 $180k 的年 ACV。
  sam: $8.1M 的初始 SAM：聚焦德国、法国、英国、波兰及周边盟友集群里约 45 个最紧迫的项目，每条活跃产品线按约 $180k ACV 估算。
  som: $1.7M 的第 3 年 SOM：在长安全审查和服务陪跑上线条件下，拿下 10 条付费产品线，混合 ACV 约 $170k。
  segments:
  - 75-300 人规模、拥有 50 多个关键电子元件，且 180 天内就要到放行生产节点的欧洲小型 UAS OEM
  - 等无人机模板库跑通后，再切入拥有类似 RF 板卡和主权采购来源需求的战术无线电与安全通信 OEM
  buyingProcess: 首轮销售动作应该是：当客户已经排定生产放行、试点转量产或融资尽调节点时，由创始人带着运营负责人、质量负责人以及 NPI 或项目负责人一起做一轮韧性审计。真正掏钱的人通常是 COO 或 VP Operations；他们会在过完安全审查后，为单条产品线的部署买单；如果替代件审批和资料包准备速度肉眼可见地变快，再转成年约。
product:
  mvp: 先做一套面向单条在产无人机产品线的安全主权 BOM 工作区：把 BOM、AVL、供应商声明、测试报告和工程变更工单接进来，输出暴露部件评分、重验证任务队列和配置级韧性资料包。第一步要优先支持从现有系统导出或 API 喂数，而不是逼客户换掉现有记录系统。
  sixMonth: 6 个月内交付暴露部件评分、替代件审批工作流、审计日志、一个 PLM 或 ERP 连接器、一个质量/文档接入路径，以及适用于单租户 EU 部署的德国或波兰资料包模板。
  twelveMonth: 12 个月内补上供应商证据收集、分销商或零件风险数据流接入、跨配置的已获批替代件记忆、按角色审批，以及在前两套模板反复被接受后再推出第三个国家模板包。
  twentyFourMonth: 24 个月内扩到多产品组合视图、面向主承包商的资料包交换、能复用同一审批图谱的战术无线电工作流，以及“哪些替代件和供应商最容易通过审查”的基准报告。
  keyBets:
  - 首个客户可以在不替换 PLM、ERP 或质量系统的前提下，用 6 周或更短时间拿到一份可用的韧性资料包。
  - 首批目标国家或项目里，至少 60% 的资料包字段可以复用。
  - 已获批替代件图谱能在第二个配置或第二条产品线上显著减少人工工作，从而形成可见的切换成本。
gtm:
  wedge: 卖的是一套“正在发生”的放行准备部署：目标客户是未来 90-180 天内就要迎来量产、融资或采购来源审查的小型 UAS OEM。产品的定位要足够直白——它是把散落的 BOM 和供应商证据，最快拼成买方可接受韧性资料包的办法，而且不用改动核心工程系统。
  channels:
  - 创始人直接外呼欧洲小型 UAS OEM 的 COO、VP Operations 和供应链负责人
  - 通过聚焦国防的 VC、战略 LP 网络和主承包商生态做转介绍分发
  - 让 PLM、ERP 与质量系统实施方一起卖叠加层，而不是整套替换
  - 借元器件分销商和测试实验室切入，它们最先看到紧急替代件认证需求
  funnelTargets: 目标账户触达 -> 合格韧性审计 15-25%；韧性审计 -> 付费共创客户 25-35%；付费共创客户 -> 年度量产合同 50%+；年约 -> 12 个月内扩到第二条产品线 40%+
  pricing: 按活跃产品线-年收费，而不是按席位：单条在产产品线的软件年费目标是 $150k-$200k，外加 $30k-$60k 的服务陪跑上线费，以及按受控元器件监控或对外共享资料包计费的可选用量费。这样定价既贴近研究里的 ACV 区间，也让 COO 能直接拿价格去对比“一批货延误”或“一次采购来源审查失败”的代价。
businessModel:
  revenueStreams:
  - 按活跃产品线收取年度软件订阅
  - 首个部署的一次性上线与证据映射费用
  - 按受控元器件监控和对外资料包共享计费
  - 面向供应商协作、主权部署以及后续主承包商分析的高级模块
  unitOfValue: 处于韧性治理之下的活跃产品线-年
  targetGrossMarginPct: 70
  expansionLevers:
  - 同一 OEM 内更多产品线和配置扩容
  - 在无人机模板复用被证明后，扩到战术无线电和安全通信工作流
  - 供应商协作，以及与分销商/测试实验室的证据交换
  - 当审批记忆数据集足够宽后，再做主承包商、放贷方或保险方报告
strategyMap:
  northStarMetric: 平台内持续维护当前韧性资料包的付费量产产品线数
  inputMetrics:
  - 每季度签下的付费共创客户数
  - 从关键暴露部件出现到替代件获批的天数
  - 拥有至少一个已验证替代项的关键元器件占比
  - 付费共创客户转成年约的比例
  - 目标国家或项目模板家族之间的资料包字段复用率
  moatsToBuild:
  - 按元器件、子系统以及买方/项目沉淀的已获批替代件图谱
  - 按国家和项目划分的韧性资料包模板库
  - 打通 PLM、ERP、质量、分销商和测试证据系统的集成层
  killCriteria:
  - 前 9 个月签不下 2 个付费共创客户
  - 完成 4 次部署后，付费共创客户转年约的比例仍低于 40%
  - 第二次实施之后，拿到首份可用韧性资料包的中位时间仍高于 6 周
  - 前三类目标国家或项目模式之间，可复用的资料包结构仍不足 60%
  - 前三个转化账户之后，混合年 ACV 仍低于 $120k
  mermaid: "flowchart LR\n  Wedge[Small-UAS sovereign BOM wedge] --> MVP[BOM ingest and dossier MVP]\n  MVP --> Proof[Faster alternate approval and release readiness]\n  Proof --> Expansion[More product lines then tactical-radio expansion]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 我们对痛点和时机判断都很强，但在预算归属、ACV 和模板复用率在两个真实项目上被证明前，信心上限仍然有限。
    whyBelieve: 如果公司能在不替换核心系统的前提下，缩短真实放行节点上的替代件审批与资料包准备时间，它就会直接卡在生产收入和后续融资的主路径上。
    whyDoubt: 独立软件 TAM 不大，而相邻现有厂商已经掌握 BOM 风险、PLM 和供应商合规预算，所以这个叠加层必须证明自己不只是外包服务换了个壳。
    nextDiligence: 在两个不同的欧洲无人机项目里签下 2 个付费共创客户，至少转化 1 个为 $150k+ 年约，并证明周期时间确实下降、模板复用也开始成立。
  firstCustomer:
    title: 欧洲小型 UAS OEM 的 VP Operations
    profile: 一家位于德国、波兰、法国或周边盟友市场的 75-300 人无人机制造商，手里有一个正在推进的试点或部委项目，拥有 50 多个关键电子元件，并计划生产 100-500 台。
    trigger: 下一批次发货前，如果要完成放行生产、试点转量产筛选、零件 EOL 处置或融资尽调，就必须拿出主权采购来源方案和可接受的替代件证据。
    buyer: COO 或 VP Operations
    initialContract: 先围绕一条产品线做一个 8-12 周的付费共创客户，通常收 $30k-$60k 做上线和证据映射；如果客户能把替代件审批或资料包准备时间至少缩短 30%，并顺利过掉真实里程碑，再转成 $150k-$200k 的年约。
  mustBeTrue:
  - 前 10 个目标 OEM 里，至少有 4 家确认：未来 12 个月内，主权采购来源证据确实是与真实放行或尽调节点绑定、且已经有预算的优先事项。
  - 12 个月内，有 2 个付费共创客户能转成 ACV 高于 $150k 的年约。
  - 前 2 次部署，相比客户原本的手工流程，替代件审批或资料包准备周期至少下降 30%。
  - 在德国、波兰、法国的小型 UAS 项目之间，一套可复用的核心能覆盖 60% 以上的必需资料包字段。
  - 标准的 EU 单租户或本地部署模式，在前 3 个账户上都能一次性过安全审查，不需要每家重做架构。
  diligenceQuestions:
  - 前 10 个目标账户里，究竟是哪一个被点名的放行、采购或融资里程碑在持有预算？
  - 德国、波兰和法国的小型 UAS 项目之间，到底有多少资料包结构是真共通的，复用会在哪些地方断掉？
  - 早期部署里，哪些 BOM、供应商和测试数据可以先做脱敏，哪些必须从第一天就留在本地部署？
  - 在真实账户里，替换一个关键元器件今天到底要吃掉多少工程工时和多少自然日？
  - 只靠一个 PLM 或 ERP 连接器，再加一个质量文档接入路径，能不能在 6 周内完成上线，而且不加自定义中间件？
operatingAssumptions:
- assumption: 当销售绑在一个被点名的放行生产或融资尽调节点上时，首笔预算会由 COO 或 VP Operations 持有。
  basis: research.yaml
  validationTest: 访谈 10 个目标买家，并拿下 2 个付费试点；要求它们都有明确预算负责人和书面成功标准。
  decisionImpact: 如果不成立，就把产品改成由合作伙伴或服务主导的模块，而不是独立直销软件。
- assumption: 在必须完整上本地部署之前，首个部署可以先在标准 EU 单租户环境里，基于脱敏 BOM 和供应商证据启动。
  basis: research.yaml
  validationTest: 和 3 个共创客户做安全范围界定，并在不把涉密数据移出客户核心系统的前提下，完整跑通 1 个试点。
  decisionImpact: 如果不成立，就要更早补安全人才、为部署复杂度多融资，并把 ICP 收窄到愿意接受更长实施周期的买家。
- assumption: 德国、波兰和法国的小型 UAS 项目之间，至少 60% 的资料包字段可以复用。
  basis: 人工判断
  validationTest: 收集并对比 6 份近期证据包，量化共有字段、签字要求和审批步骤。
  decisionImpact: 如果不成立，就先收窄到一个国家模式，接受更慢、更重服务的扩张路径。
- assumption: 当定价锚定在“批次延误成本”和“采购来源审查风险”上时，买家愿意为每条活跃产品线支付 $150k-$200k 的软件年约。
  basis: idea.yaml
  validationTest: 在试点谈判里测试 4 份不同报价，覆盖两个价位，并记录接受率、折扣压力和预算来源。
  decisionImpact: 如果不成立，就往更高客单价市场走、更明确拆分软件与服务，或者承认独立风投逻辑站不住。
- assumption: 前 3-5 次部署沉淀出的已获批替代件图谱，足以把产品和 PLM / BOM-risk 现有厂商拉开差距。
  basis: idea.yaml
  validationTest: 衡量第二个配置或第二条产品线是否复用了先前已获批替代方案，并把人工证据工作至少压低 25%。
  decisionImpact: 如果不成立，公司就只是一层容易被打包掉的薄工作流，需要要么加厚服务内容，要么在放大 GTM 前止损。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 做 10 次结构化韧性审计访谈，并从目标无人机 OEM 那里拿到 3 份近期采购来源审查或放行资料包。
  hypothesis: 当生产里程碑压在 180 天内时，主权 BOM 证据已经是前三大卡点之一。
  successMetric: 10 个买家里至少 6 个确认痛点紧急，且有 3 个愿意拿出真实材料，能映射到拟议工作流。
  owner: CEO / 创始人销售
- horizon: 0-90 天
  experiment: 基于导出数据，为一条拥有 50 多个关键元器件的友好产品线做一个 MVP 资料包生成器。
  hypothesis: 不替换客户的 PLM 或 ERP，也能生成一份有用的首版韧性资料包。
  successMetric: 6 周内或更短时间交付一份端到端资料包，而且手工表格兜底不超过 3 处。
  owner: 创始工程师
- horizon: 90-180 天
  experiment: 围绕一个真实的放行生产或融资尽调节点，部署 1 个付费共创客户。
  hypothesis: 产品能把替代件审批和资料包准备时间压到足以支撑软件年费。
  successMetric: 相对客户原本的手工流程，周期时间至少下降 30%，并在里程碑关闭前递出年约方案。
  owner: 解决方案架构师
- horizon: 90-180 天
  experiment: 在 EU 单租户和本地部署两种配置下，验证 2 套标准部署模式。
  hypothesis: 安全审查能过，而不至于把每个账户都拖成定制基础设施项目。
  successMetric: 2 个客户接受其中一套标准部署模式，且没有关键安全阻塞。
  owner: 安全工程师
- horizon: 180-365 天
  experiment: 横向比较德国、波兰、法国无人机项目的资料包结构，并把共通核心产品化。
  hypothesis: 即便附件因买方不同而不同，可复用模板库依然能覆盖大多数必填字段。
  successMetric: 必填字段和签字要求的重合度达到 60% 以上，从而放出一版可复用模板。
  owner: 产品与供应链负责人
- horizon: 180-365 天
  experiment: 通过国防 VC 网络、主承包商关系或 PLM 实施伙伴，启动 1 个由伙伴带来的试点。
  hypothesis: 一旦首个证明点成立，相比冷启动外呼，可信转介绍能更快压缩 CAC 并建立安全信任。
  successMetric: 拿到 1 个由伙伴带来的付费试点，且 CAC 更低、销售周期也短于创始人直销基线。
  owner: CEO / 合作伙伴负责人
operations:
- EU 单租户部署包 + 本地部署备选路径，覆盖那些无法导出供应商证据的项目
- 围绕一条产品线、一个临近里程碑和一个明确买方负责人的服务陪跑式上线手册
- 覆盖运营、质量、NPI 和工程变更负责人的每周客户评审节奏，用来清理重验证任务
- 一套模板治理流程：决定哪些国家或项目要求应该产品化，哪些继续作为付费定制
- 一套数据伙伴流程：分销商、零件风险和测试实验室的输入只有在客户批准后才用于丰富替代件库
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责 BOM 接入层、暴露度评分和资料包生成引擎。
- role: 创始人销售
  startTiming: 第 0 个月
  rationale: 早期销售必须拿下 COO 和 VP Operations 这类买家的信任，并把一线反馈迅速打回产品范围。
- role: 产品与供应链领域负责人
  startTiming: 第 0 个月
  rationale: 把不同国家和买方的证据要求，翻译成可复用的模板与已获批替代件逻辑。
- role: 解决方案架构师
  startTiming: 第 2 个月
  rationale: 负责带服务的部署、梳理源系统，并把见效时间压在 6 周以内。
- role: 安全与合规工程师
  startTiming: 第 4 个月
  rationale: 在安全审查成为头号瓶颈前，把 EU 单租户和本地部署的标准部署路径先定下来。
milestones:
- horizon: 0-12 个月
  items:
  - 在真实欧洲无人机产品线上签下 2 个付费共创客户
  - 交付首版 BOM 接入、暴露部件评分、重验证工作流和韧性资料包 MVP
  - 打通一套标准安全部署模式，并转化出第一份年约
  - 把替代件审批或资料包准备周期缩短 30% 以上并形成文档
- horizon: 12-24 个月
  items:
  - 至少在 3 个客户身上做到 5-7 条付费产品线
  - 把德国、波兰、法国的资料包模板家族产品化，并量化字段复用率
  - 通过 VC、主承包商或 PLM 生态关系，跑通 1 个伙伴带来的部署
  - 在多个配置之间加入供应商证据交换和已获批替代件复用
- horizon: 24-36 个月
  items:
  - 做到 10 条付费产品线，并支持多产品组合报告
  - 只有在 3 家无人机客户验证模板模型后，才扩到战术无线电工作流
  - 基于装机基础推出面向主承包商的资料包交换和基准报告
  - 只有跨客户审批数据足够成规模时，才试水放贷方或保险方报告
risks:
- risk: 买家可能把主权 BOM 工作当成现有 PLM、采购来源或质量预算里的咨询项目，而不是愿意单独买单的软件层。
  likelihood: High
  impact: High
  mitigation: 围绕一个明确的放行事件卖出第一单，抓出硬的周期 ROI；在直接软件预算还不存在时，用伙伴主导的服务先切进去。
- risk: 安全、主权托管或本地部署要求，可能把部署拖成缓慢的定制项目。
  likelihood: Medium
  impact: High
  mitigation: 尽早标准化 EU 单租户和本地部署两种模式，并先从能在脱敏数据上证明价值的工作流切入。
- risk: 不同国家和项目的证据要求，可能碎得根本撑不起一套可复用模板库。
  likelihood: High
  impact: Medium
  mitigation: 先把地域收窄到重合度最高的无人机项目，其余一律按付费定制处理，直到复用被证明。
- risk: PLM、BOM-risk 或供应商合规现有厂商，可能把足够多的相邻功能直接打包，压垮独立切口。
  likelihood: Medium
  impact: High
  mitigation: 靠买方可直接使用的资料包输出、跨系统审批记忆和放行速度指标取胜——这些不是通用看板现在真正拥有的能力。
- risk: 如果公司不能从无人机 OEM 工作流扩到相邻产品线和买方群体，软件市场规模可能始终太小。
  likelihood: Medium
  impact: High
  mitigation: 先用第一年的试点证明已获批替代件数据集有价值，再只扩到能复用同一审批图谱的相邻工作流，不追和现有逻辑无关的国防工具。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月跑道会把首版生产级主权 BOM 工作流、标准安全部署模式、初始连接器、2-3 个付费共创客户，以及放大销售前必须证明的 ACV、模板复用率和数据集差异化，一次性都支撑起来。
