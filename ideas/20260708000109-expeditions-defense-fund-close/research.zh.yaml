  validationPlan:
  - priority: high
    question: 主承包商、部委或投资人，到底有多频繁会在放行生产前明确索取主权采购来源或替代件证据？
    evidenceToGather: 收集 10 份近期欧洲无人机和安全通信 OEM 的采购、融资或主承包商审查资料包，逐项标出哪些 BOM、供应商和来源字段是硬性要求。
  - priority: high
    question: 哪两到三个国家或项目家族之间，资料包结构的重合度足以支撑 60%+ 模板复用？
    evidenceToGather: 把德国、波兰、法国和英国的证据包并排比较，量化声明、测试、签字和审批步骤的重合度。
  - priority: medium
    question: 在 75-300 人规模的国防 OEM 里，第一套工作流部署的真实 ACV 上限到底在哪？
    evidenceToGather: 围绕当前真实里程碑做 8-10 次买家访谈，并对比手工工程投入、采购来源顾问成本以及“一个批次延误”的代价。
  - priority: medium
    question: 在必须做主权托管之前，已获批替代件图谱里有多少部分能先靠非涉密或脱敏数据搭起来？
    evidenceToGather: 用脱敏的零件和供应商数据先做 1 个试点原型，再记录买家拒绝从 PLM、ERP 或质量系统导出的信息到底有哪些。
