  - 32
- name: Exiger
  stage: 现有厂商
  wedge: 面向国防工业基础的供应链映射、替代供应商发现、合规与来源可视化，能下探到第 n 层。
  pricing: 企业级 / 联系销售模式；无公开标价。
  strength: 在 DIB 里的定位很强，替代供应商搜索和以来源为核心的风险监控做得成熟。
  weaknessVsUs: 更偏广义第三方风险；不是为板级重验证或配置级放行工作流量身打造。
