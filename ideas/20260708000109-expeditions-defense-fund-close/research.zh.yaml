reportMemo:
  executiveTakeaways:
  - 欧洲国防政策和资本现在都在明确奖励产业韧性、更快采购和主权产能，所以 BOM 主权已经成了有预算的议题，不再只是运营补丁。
  - 元器件层面的痛点是真实存在的：长寿命国防系统碰上短周期半导体，而无人机项目又暴露在涉华元器件卡点和手工替代认证里。
  - 最尖的首批切口，是那些正准备首批量产的欧洲电子密集型小型 UAS 与安全通信 OEM——在这里，只要一个元器件卡住，合同爬坡和融资可信度都会一起受影响。
  - 竞争主要来自相邻赛道，而不是正面对手：BOM 风险数据、PLM 和供应商合规工具都已存在，但默认都不会把一次国防 BOM 变更直接变成一份被接受的韧性资料包。
  - 单看软件 TAM 并不大，所以风投逻辑必须建立在从工作流扩成跨项目数据集：把已获批替代件、供应商声明和按买方拆分的审批模式沉淀下来。
  marketDefinition: 面向欧洲国防 OEM 的供应商侧主权 BOM 工作流软件：一层控制平面，负责标记暴露元器件、编排替代件认证，并为主承包商、部委和投资人拼出配置级韧性资料包 [4][5][6][8][10][13][14][15][18]。
  customerAndBuyer: 一线日常用户是 75-300 人规模欧洲无人机或安全通信 OEM 里的供应链、NPI、质量和项目负责人，他们正准备进入小批量初始生产。真正拍板买单的通常是 COO 或 VP Operations，因为一个卡住的零件会直接拖慢放行生产、交付以及融资可信度 [10][11][12][15][16][21][22][23][24]。
  buyingTriggers:
  - point: 当团队要从试点走向量产，或已经排定放行生产里程碑时，就必须在极短时间里证明替代来源、供应韧性和互操作证据。
    sourceRefs:
    - 10
    - 11
    - 12
    - 14
    - 21
    - 22
    - 23
  - point: 一旦收到零件 EOL 通知、贸易限制或地缘暴露警报，团队就得立刻围绕真实 BOM 做替代认证和出口管制复核。
    sourceRefs:
    - 13
    - 15
    - 16
    - 17
    - 18
    - 19
    - 20
    - 39
  - point: 融资、主承包商或部委尽调，会把主权采购来源和韧性证据从工程问题抬升成高管层面的卡关项。
    sourceRefs:
