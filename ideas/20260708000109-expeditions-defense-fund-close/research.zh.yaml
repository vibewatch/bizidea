  - 33
- name: Siemens Teamcenter + Polarion
  stage: 现有厂商
  wedge: 覆盖 PLM、需求、配置和重合规生命周期管理的数字线程栈。
  pricing: Teamcenter X 有分层套餐并支持询价；Polarion 走销售驱动。
  strength: 牢牢站在工程系统记录层里，变更控制和可追溯底座都很强。
  weaknessVsUs: 不会原生收集供应商风险证据，也不会把主权 BOM 替换动作直接变成被接受的韧性资料包。
  sourceRefs:
