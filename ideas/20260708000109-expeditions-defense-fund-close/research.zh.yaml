competitors:
- name: Z2Data
  stage: 成长阶段
  wedge: 跨 BOM 和次级制造现场的一体化零件、供应商、合规与扰动情报。
  pricing: 企业级演示驱动定价；无公开标价。
  strength: 零件数据库深、生命周期预测成熟、能做次级供应商映射，也能生成可审计的合规输出。
  weaknessVsUs: 它停在风险可视化和报告层，不掌握国防专用的替代件审批记忆，也不会生成部委可直接使用的韧性资料包。
