  - 36
- name: PTC Windchill
  stage: 现有厂商
  wedge: 面向受监管产品的生命周期可追溯、配置控制和安全协作。
  pricing: 企业级销售定价；产品页无公开标价。
  strength: PLM 足够铺开，而且对受监管产品的 traceability 叙事很强。
  weaknessVsUs: 它本质仍是通用 PLM，而不是国防专用的替代来源与资料包工作流。
