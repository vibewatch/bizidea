slug: counter-drone-site-readiness
date: '2026-06-10'
executiveSummary: >-
  Counter-Drone Site Readiness is a deployment control layer for European
  counter-UAS OEMs and integrators that need to turn fixed-site batteries live
  quickly and prove they are actually ready. The first customer is a 150-800
  person OEM or defense integrator rolling out a 3-10 site airport, port, or
  military-logistics program with a near-term acceptance deadline. Instead of
  replacing radars, interceptors, or GIS systems, the product becomes the
  auditable workflow that links site geometry, AI model versions, maintenance
  status, no-fire zones, and acceptance tests to one go-live decision. Research
  supports a narrow but credible $75.0M SAM and a reachable $3.6M year-three
  SOM if the company wins a small number of active rollout programs and expands
  from first-site acceptance into sustainment and multi-site reuse. The go to
  market system is tightly event-driven: sell immediately after a site award or
  expansion order, land with one paid deployment program, and convert to annual
  per-site subscriptions once the workflow becomes the default acceptance record.
  The core advantage is neutrality across mixed vendor stacks plus a growing
  graph of which layouts, settings, and evidence packs get sites accepted
  faster. The main disconfirming risk is that OEMs may prefer to extend internal
  mission or field-service tooling rather than buy a standalone readiness layer.
  Research also leaves two important gaps: exact current days from survey to
  accepted live coverage and how much of the workflow can run in SaaS before
  buyers require sovereign or air-gapped deployment.
problem:
  - Counter-UAS deployment teams still bring sites live through spreadsheets, GIS exports, manuals, and field-engineer checklists, so readiness evidence is fragmented when contract milestones are time-sensitive.
  - Each airport, port, or base site has different geometry, rules, model settings, and sustainment constraints, so a missed dependency can delay revenue recognition and leave the protected asset exposed.
solution:
  - Deliver a secure site-readiness board that maps sensor and effector placement, local airspace constraints, AI model versions, maintenance tasks, training status, and acceptance tests into one defended-site workflow.
  - Start with first-site contract-to-live orchestration for fixed installations, then expand inside the same account into change control, sustainment evidence, and multi-site fleet readiness.
whyWeWin:
  - Counter-UAS platform vendors optimize software for their own stack, but mixed-vendor programs still need a neutral system that answers whether one site is ready now.
  - Generic GIS, project, and maintenance tools store inputs but do not produce a defense-specific readiness decision tied to acceptance gates, no-fire zones, and sustainment proof.
  - Every accepted site adds reusable templates for layouts, model settings, evidence packs, and failure modes, creating a deployment graph that gets harder for a new entrant or internal tool to match.
strategicChoices:
  beachhead: Deployment and site-acceptance orchestration for European counter-UAS OEMs and integrators standing up 3-20 fixed-site batteries around airports, ports, and military logistics hubs within one program.
  wedgeRationale: This beachhead has an explicit milestone, a concentrated buyer, and measurable failure cost, so the company can prove value on one live site faster than by selling a broad defense operating system or going directly to ministries.
  sequencingRationale: Build exported-data and secure on-premise workflows first so one program team can cut time to accepted live coverage without replacing incumbent mission systems; use that proof to win additional sites and sustainment modules; only then expand into primes, ministries, and mobile units because those motions require more security, product scope, and procurement credibility.
  notYet:
    - Direct sales to airports, ports, or ministries before OEM and integrator references exist
    - Mobile battlefield and expeditionary air-defense workflows
    - Full replacement of mission-planning, maintenance, or GIS systems
    - Kinetic engagement optimization or interceptor-control software
market:
  tam: $0.3B
  sam: $75.0M
  som: $3.6M
  segments:
    - European counter-UAS OEMs and defense integrators deploying fixed-site batteries for airports, ports, and military logistics hubs
    - Critical-infrastructure defense primes and agencies standardizing multi-site readiness after OEM-level proof
  buyingProcess: >-
    The practical first deal starts after a site award, live-fire acceptance
    window, or rollout expansion when a program leader needs a site live within
    quarters, not years. The economic buyer is typically the VP Programs, GM Air
    Defense Solutions, or head of deployment, but security, field engineering,
    and sustainment teams influence deployment approval because the workflow
    touches sensitive operational data.
product:
  mvp: >-
    MVP covers one active fixed-site rollout for one OEM or integrator. It
    ingests exported maps and deployment records, tracks readiness blockers
    across sensors, models, approvals, and spares, and generates an auditable
    go-live evidence pack for the first defended site.
  sixMonth: Ship the readiness board, evidence-pack generator, user permissions, and first adapters for GIS exports, sensor configuration data, maintenance status, and site-specific acceptance checklists at one lighthouse customer.
  twelveMonth: Add change-control workflows for new sensors, rulesets, and model versions, plus reusable site templates that let one customer roll from site one to sites two through five with less manual rework.
  twentyFourMonth: Expand into fleet readiness across multiple programs with benchmarking, cross-site templates, sustainment analytics, and partner-certified integrations for the most common radar, RF, and effector combinations.
  keyBets:
    - Buyers will adopt an exported-data overlay before they approve deeper system integration.
    - A 25%+ reduction in days from site survey to accepted live coverage is enough to justify annual per-site pricing.
    - Neutrality across mixed vendor stacks matters more than single-stack feature depth in the first beachhead.
    - The fastest expansion comes from additional sites and sustainment workflows inside the first account rather than net-new infrastructure-owner logos.
gtm:
  wedge: Founder-led sale into a named post-award rollout where an OEM or integrator must field the first fixed site within two quarters and cannot afford acceptance drift across spreadsheets, GIS tools, and field notes.
  channels:
    - Direct founder-led sales to VP Programs, GM Air Defense Solutions, and heads of deployment at European OEMs and integrators
    - Prime and systems-integrator partnerships that pull the workflow into live critical-infrastructure programs
    - Reference-driven expansion from one accepted site to additional sites and adjacent sustainment teams inside the same account
  funnelTargets: "Target account→qualified rollout 20-30%, qualified rollout→paid pilot 50%+, paid pilot→annual program contract 60%+, first site→multi-site expansion 40%+ within 12 months"
  pricing: >-
    Charge a paid implementation and deployment pilot for the first active site,
    then convert to an annual subscription priced per defended site or active
    battery with extra fees for secure integrations and sustainment modules. The
    pricing basis is milestone delay avoided and faster acceptance, not seat
    count, because the budget is unlocked by contract-to-live pressure.
businessModel:
  revenueStreams:
    - Annual subscription per defended site or battery using the readiness workflow
    - Paid implementation, secure deployment, and data-mapping services
    - Premium sustainment, change-control, and fleet-readiness analytics modules
  unitOfValue: Defended site or active battery managed through the readiness workflow
  targetGrossMarginPct: 70
  expansionLevers:
    - Additional sites inside the same rollout program
    - Sustainment and configuration-change modules after first-site acceptance
    - Multi-program deployments with primes and large integrators
    - Cross-site benchmarking and reusable readiness templates
strategyMap:
  northStarMetric: Live defended sites accepted through the platform
  inputMetrics:
    - Days from site survey to accepted live coverage
    - Percentage of readiness artifacts generated from reusable templates
    - Paid pilot to annual contract conversion rate
    - Time from signed pilot to first customer evidence pack
    - Number of additional sites activated per customer within 12 months
  moatsToBuild:
    - Deployment graph linking site geometry, sensor and effector mix, model versions, test steps, and approval outcomes
    - Reusable evidence-pack templates for airport, port, and military-logistics environments
    - Secure deployment playbooks for sovereign, on-premise, and air-gapped customer environments
  killCriteria:
    - Fewer than 3 of the first 12 target buyers confirm that site-acceptance delay is a budget-worthy problem tied to named milestones.
    - No first pilot shows at least a 25% reduction in days to accepted live coverage within 6 months of deployment.
    - The first 2 customers require more than 8 weeks of bespoke security and data mapping before the product can support one live site.
  mermaid: |
    flowchart LR
      Wedge[Post-award site acceptance wedge] --> MVP[First-site readiness MVP]
      MVP --> Proof[Faster accepted live coverage]
      Proof --> Expansion[Multi-site and sustainment expansion]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Strong urgency and a coherent wedge, but conviction depends on proving OEMs buy a neutral layer instead of extending internal tools.
    whyBelieve: Counter-UAS deployments are scaling, acceptance work is fragmented, and no cited incumbent appears to own the neutral contract-to-live readiness workflow across mixed stacks.
    whyDoubt: The standalone market is narrow and the product could become services-heavy if secure deployment and customer-specific templates dominate implementation.
    nextDiligence: Win one paid pilot on a live 3-10 site rollout and show that the first site reaches accepted live coverage materially faster than the customer's current process.
  firstCustomer:
    title: European counter-UAS OEM deployment lead for a fixed-site rollout
    profile: 150-800 person OEM or defense integrator running a newly awarded 3-10 site airport, port, or military-logistics program with mixed sensors and effectors.
    trigger: A site award, live-fire acceptance window, or pilot expansion forces the team to prove coverage and readiness before the first site goes live.
    buyer: VP Programs or head of deployment
    initialContract: $100k-$200k paid first-site deployment program, converting to a $250k-$500k annual multi-site subscription plus implementation once the workflow becomes the program record
  mustBeTrue:
    - At least 5 of 10 target OEM or integrator buyers say first-site acceptance delays consume enough schedule risk to justify a paid pilot.
    - One lighthouse customer can cut time from survey to accepted live coverage by at least 25% using exported-data workflows before deep integration.
    - Sensitive readiness data can be deployed in a security model buyers approve without turning every deployment into a custom build.
    - At least 30% of initial customers have a credible second-site or sustainment expansion path within 12 months of the first annual contract.
    - Mixed-vendor programs are common enough that a neutral readiness layer wins more often than single-stack vendor software.
  diligenceQuestions:
    - What were the last three fixed-site rollouts at target accounts, and how many days elapsed from survey to accepted live coverage?
    - Which executive owns the software budget when a rollout milestone is at risk: programs, deployment, engineering, or sustainment?
    - What minimum dataset can the vendor host before buyers require sovereign or fully air-gapped deployment?
    - How often do target programs mix vendors enough that bundled platform software is not the default winner?
    - Which acceptance artifacts are truly reusable across airport, port, and military-logistics sites versus buyer-specific every time?
operatingAssumptions:
  - assumption: Buyers will fund the product from post-award deployment budgets when tied to a named site milestone.
    basis: research.yaml
    validationTest: Interview 10 target program leaders and secure at least 2 paid pilot LOIs tied to active rollout milestones.
    decisionImpact: If false, the company must sell through primes or bundle the workflow into broader services instead of direct software-led deals.
  - assumption: Exported GIS, telemetry, and maintenance data is sufficient to power the first site-readiness workflow before deep integrations are approved.
    basis: operator judgment
    validationTest: Reconstruct one historical site-acceptance package and auto-populate at least 70% of required fields from exported records.
    decisionImpact: If false, implementation time and burn rise materially, forcing a narrower ICP and a more services-heavy roadmap.
  - assumption: Customers will accept annual pricing in the $200k-$300k per site range once the product proves faster acceptance and reusable evidence.
    basis: idea.yaml
    validationTest: Convert one paid pilot into an annual contract within the modeled range after documenting schedule savings on the first site.
    decisionImpact: If false, the company must lower price, bundle more workflows, or move upmarket, changing the funding and hiring plan.
  - assumption: A neutral readiness layer is more valuable than a single-vendor workflow in mixed programs with radar, RF, and effector combinations.
    basis: research.yaml
    validationTest: In 8 customer interviews, confirm at least 4 target accounts use or expect mixed-vendor stacks where incumbent software leaves workflow gaps.
    decisionImpact: If false, the company should reposition as a white-label module for one OEM stack instead of an independent system of record.
  - assumption: The first customer will expand from first-site acceptance into sustainment or additional sites within 12 months.
    basis: research.yaml
    validationTest: Ensure the first two customers each identify one funded adjacent rollout or sustainment workflow at contract signature and close one expansion sale within a year.
    decisionImpact: If false, the researched SOM is harder to reach and the business may not support venture-scale returns.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Benchmark current fixed-site acceptance timelines
    hypothesis: Target OEMs and integrators experience repeatable schedule slippage large enough to justify a paid first-site pilot.
    successMetric: 10 buyer interviews completed, 3 rollout timelines documented, and 2 pilot LOIs signed
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Rebuild one historical evidence pack from exported data
    hypothesis: A readiness workflow can operate before deep mission-system integration is approved.
    successMetric: One historical site package reconstructed with at least 70% of required artifacts auto-populated
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run first live fixed-site deployment pilot
    hypothesis: The product can reduce days to accepted live coverage by at least 25% on one active rollout.
    successMetric: 25%+ faster first-site acceptance and customer approval to use the platform on a second site
    owner: Forward deployment engineer
  - horizon: 90–180 days
    experiment: Validate sovereign and air-gapped deployment boundary
    hypothesis: The first secure customer environment can go live without more than 8 weeks of bespoke security work.
    successMetric: Time from signed pilot to approved secure deployment under 8 weeks
    owner: Security lead
  - horizon: 6–12 months
    experiment: Prove multi-site template reuse
    hypothesis: Site one data and evidence templates can materially reduce setup effort for sites two through five.
    successMetric: At least 40% reduction in configuration time on the second site at the first customer
    owner: Product lead
  - horizon: 6–12 months
    experiment: Test sustainment expansion motion
    hypothesis: The easiest expansion is change control and sustainment after first-site acceptance, not a net-new logo.
    successMetric: One expansion order for sustainment or additional sites signed within 12 months of the first annual contract
    owner: Founder CEO
operations:
  - Secure deployment model that supports sovereign, on-premise, and air-gapped environments with clear data-boundary definitions
  - White-glove onboarding playbook focused on one defended site before broader rollout
  - Adapter layer for GIS exports, telemetry, maintenance systems, and acceptance checklists so pilots can launch without replacing incumbent mission software
  - Evidence-pack and audit-trail workflow embedded into every deployment so value is measured against go-live milestones
  - Partner motion with primes, OEMs, and radar or effector vendors treated as integration channels rather than product dependencies
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales, design-partner recruitment, and pricing because the first market is concentrated, trust-heavy, and event-driven.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the readiness graph, evidence-pack engine, and first adapters fast enough to support a live pilot in the first two quarters.
  - role: Forward deployment engineer
    startTiming: Month 2
    rationale: Compress customer-specific rollout mapping and turn the first two pilots into repeatable implementation playbooks.
  - role: Air-defense domain SME
    startTiming: Month 3
    rationale: Encode real acceptance criteria, no-fire-zone logic, and sustainment workflows so the product matches program reality.
  - role: Security lead
    startTiming: Month 6
    rationale: Secure deployment is a gating requirement for broader adoption and cannot remain an ad hoc founder responsibility.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2 paid lighthouse pilots with European OEM or integrator deployment teams
      - Deploy first secure environment and support one live fixed-site acceptance workflow
      - Convert 1 pilot into an annual multi-site or sustainment contract
      - Publish a repeatable template library for airport, port, and military-logistics site types
  - horizon: 12–24 months
    items:
      - Reach 3-5 active customers and 8-10 live defended sites on the platform
      - Launch change-control and sustainment modules tied to approved customer workflows
      - Formalize 2 prime or OEM integration partnerships that reduce deployment friction
      - Demonstrate second-site setup time materially below first-site setup time at multiple accounts
  - horizon: 24–36 months
    items:
      - Reach the researched year-three case of roughly 15 live defended sites across 3-5 programs
      - Expand from first-site acceptance into fleet-readiness analytics and cross-site benchmarking
      - Enter adjacent multi-site defense programs beyond the initial fixed-installation beachhead
risks:
  - risk: OEMs extend internal mission or field-service tools instead of buying a neutral readiness layer.
    likelihood: Medium
    impact: High
    mitigation: Prove faster acceptance on mixed-vendor programs where incumbent tools do not cover the full workflow and integrate with existing systems rather than trying to replace them.
  - risk: Secure deployment requirements make each implementation too bespoke to support software-like margins.
    likelihood: High
    impact: High
    mitigation: Start with exported-data workflows, define clear sovereign and air-gapped reference architectures, and hire security and forward deployment talent early.
  - risk: Budget ownership is ambiguous across programs, engineering, and sustainment teams, slowing pilot conversion.
    likelihood: Medium
    impact: Medium
    mitigation: Sell against named contract milestones and quantify delay avoided so the buyer can justify spend from post-award rollout budgets.
  - risk: Acceptance artifacts vary more by site and buyer than expected, reducing template reuse and moat formation.
    likelihood: Medium
    impact: Medium
    mitigation: Focus initial learning on one narrow site class per customer and measure reusable versus bespoke artifact share before broadening the ICP.
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3-5M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of product engineering, secure deployment capability, forward deployment, and domain hiring to win the first 2-3 lighthouse customers, prove first-site acceptance acceleration, and convert the wedge into repeatable multi-site expansion.
