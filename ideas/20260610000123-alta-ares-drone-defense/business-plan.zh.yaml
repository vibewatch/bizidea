slug: counter-drone-site-readiness
date: '2026-06-10'
executiveSummary: 反无人机站点就绪 OS 瞄准的，是那些必须尽快把固定站点炮位打上线、同时又得证明站点真的已经就绪的欧洲反无人机 OEM 和集成商。首个客户应是一家 150–800 人规模的 OEM 或防务集成商：手上有一个 3–10 站点的机场、港口或军事物流项目，而且验收节点就在眼前。产品不替换雷达、拦截器或 GIS 系统，而是做一条可审计的工作流，把站点几何、AI 模型版本、维护状态、禁射区和验收测试收进同一个上线决策。研究支撑的是一个窄但可信的 $75.0M SAM；如果公司能拿下少量真实 部署推进 项目，再从首站验收扩到保障和多站点复用，第 3 年做到 $3.6M SOM 并非空想。GTM 要高度事件驱动：站点一中标或一扩容就进场，先吃下一笔付费部署项目，再在这条工作流成为默认验收记录后，转成年付按站点订阅。核心优势，是它能跨混合厂商栈保持中立，还会不断积累一张图谱：哪些布局、参数和证据包，能让站点更快过验收。最大的反证风险在于，OEM 可能更愿意把内部任务或现场服务工具继续往前拉，而不是单独买一层就绪系统。研究还留了两个关键空白：从勘测到验收通过、形成在线覆盖目前到底要多少天，以及在买家要求 sovereign 或 air-gapped 部署之前，这条工作流究竟有多少比例能跑在 SaaS 上。
problem:
- 反无人机部署团队现在仍靠电子表格、GIS 导出、手册和现场工程师清单把站点推上线，所以一到合同里程碑卡紧时，就绪证据总是散在各处。
- 机场、港口或基地站点的几何、规则、模型参数和保障约束都不一样，只要漏掉一个依赖，就可能拖慢收入确认，也会让受保护资产继续暴露。
solution:
- 交付一块安全的站点就绪看板，把传感器和效应器布设、本地空域约束、AI 模型版本、维护任务、培训状态和验收测试收成一条受防站点工作流。
- 先从固定部署的“首站签约到上线”编排切入，再在同一账户内扩到变更控制、保障证据和多站点编队就绪。
whyWeWin:
- 反无人机平台厂商通常只会把软件优化到自家栈里，但混合厂商项目仍需要一套中立系统，来回答某个站点现在到底是否就绪。
- 通用 GIS、项目和维护工具能存输入，却给不出和验收门槛、禁射区、保障证明绑定在一起的防务专用就绪判断。
- 每多一个验收通过的站点，都会多一套可复用的布局模板、模型参数、证据包和失效模式，这会沉淀成一张越来越难被新玩家或内部工具复制的部署图谱。
strategicChoices:
  beachhead: 给欧洲反无人机 OEM 和集成商做部署与站点验收编排，服务对象是那些在单一项目里，为机场、港口和军事物流枢纽搭起 3–20 个固定站点炮位的团队。
  wedgeRationale: 这个滩头市场有明确里程碑、买家集中、失败成本可量化，所以公司能先在一个活站点上证明价值，比起上来就卖通用防务操作系统或直接去卖给部委，路径更短。
  sequencingRationale: 先把导出数据和安全本地部署工作流做扎实，让一个项目团队在不替换现有任务系统的前提下，把验收通过、形成在线覆盖的时间压下来；再拿这套证明去吃更多站点和保障模块；最后才扩到主承包商、部委和机动单元，因为那些动作对安全、产品范围和采购信用的要求都更高。
  notYet:
  - 在 OEM 和集成商参考案例还没出来前，就直接卖给机场、港口或部委
  - 面向战场机动和远征任务的机动防空工作流
  - 完整替换任务规划、维护或 GIS 系统
  - 动能交战优化或拦截器控制软件
market:
  tam: $0.3B
  sam: $75.0M
  som: $3.6M
  segments:
  - 为机场、港口和军事物流枢纽部署固定站点炮位的欧洲反无人机 OEM 与防务集成商
  - 在 OEM 层面跑通后，再把多站点就绪标准化的关键基础设施防务主承包商与机构
  buyingProcess: 第一笔实用型交易，通常发生在站点中标、实弹验收窗口打开，或 部署推进 扩容之后——此时项目负责人要在几个季度内，而不是几年内，把站点真正打上线。经济买家一般是 VP Programs、GM Air Defense Solutions 或部署负责人，但安全、现场工程和保障团队也会影响部署审批，因为这条工作流会碰到敏感运营数据。
product:
  mvp: MVP 先覆盖一个 OEM 或集成商的一条在役固定站点 部署推进。它吃进导出的地图和部署记录，跟踪传感器、模型、审批和备件上的阻塞项，再为首个受防站点生成一份可审计的上线证据包。
  sixMonth: 6 个月内，把就绪看板、证据包生成器、用户权限，以及 GIS 导出、传感器配置数据、维护状态和站点专属验收清单的首批适配器交到一个 灯塔 客户手里。
  twelveMonth: 12 个月内，补上针对新传感器、规则集和模型版本的变更控制工作流，再加上可复用的站点模板，让一个客户从站点 1 滚到站点 2–5 时，少做大量手工重复劳动。
  twentyFourMonth: 24 个月后，扩到跨多个项目的编队就绪，提供基准对比、跨站点模板、保障分析，以及针对常见雷达、RF 和效应器组合的伙伴认证集成。
  keyBets:
  - 在买家批准更深层系统集成前，他们会先接受一层基于导出数据的叠加方案。
  - 只要把从站点勘测到验收通过、形成在线覆盖的天数压缩 25% 以上，就足以支撑按站点收年费。
  - 在首个滩头市场里，跨混合厂商栈的中立性，比单一栈里的功能深度更重要。
  - 最快的扩张路径，不是直接去拿新的基础设施业主 logo，而是在首个账户里吃下更多站点和保障工作流。
gtm:
  wedge: 由创始人主导，打进一个已点名的中标后 部署推进：那里 OEM 或集成商必须在两个季度内把首个固定站点打上线，根本承受不起电子表格、GIS 工具和现场笔记带来的验收漂移。
  channels:
  - 由创始人直接卖给欧洲 OEM 与集成商里的 VP Programs、GM Air Defense Solutions 和部署负责人
  - 与主承包商和系统集成商合作，把工作流带进正在执行的关键基础设施项目
  - 靠参考案例，从一个验收通过的站点往同一账户内更多站点和相邻保障团队扩张
  funnelTargets: 目标账户→合格 部署推进 20–30%；合格 部署推进→付费 试点 50%+；付费 试点→年度项目合同 60%+；首站→12 个月内多站点扩张 40%+。
  pricing: 首个在役站点先收一笔付费实施和部署 试点 费用，之后转成按受防站点或在役火力单元计价的年度订阅；安全集成和保障模块再单独加价。定价锚点不是 席位数，而是少掉的里程碑延误和更快的验收，因为预算是被“签约到上线”的压力直接撬开的。
businessModel:
  revenueStreams:
  - 按每个受防站点或火力单元收年度订阅费，使用这条就绪工作流
  - 付费实施、安全部署和数据映射服务
  - 高级保障、变更控制和编队就绪分析模块
  unitOfValue: 通过就绪工作流管理的受防站点或在役火力单元
  targetGrossMarginPct: 70
  expansionLevers:
  - 同一 部署推进 项目里的更多站点
  - 首站验收后追加的保障与配置变更模块
  - 与主承包商和大型集成商合作的多项目部署
  - 跨站点基准对比与可复用就绪模板
strategyMap:
  northStarMetric: 通过平台完成验收的在线受防站点数
  inputMetrics:
  - 从站点勘测到验收通过、形成在线覆盖的天数
  - 由可复用模板生成的就绪工件占比
  - 付费 试点 转成年付合同的比例
  - 从 试点 签约到产出第一份客户证据包的时间
  - 每个客户在 12 个月内新增激活的站点数
  moatsToBuild:
  - 把站点几何、传感器和效应器组合、模型版本、测试步骤和审批结果连起来的部署图谱
  - 面向机场、港口和军事物流环境的可复用证据包模板
  - 适配 sovereign、本地部署和 air-gapped 环境的安全部署 操作手册
  killCriteria:
  - 前 12 个目标买家里，少于 3 个明确确认：站点验收延迟是一个值得单独花预算解决、且和已命名里程碑绑定的问题。
  - 首个 试点 上线 6 个月内，没有任何一个项目把验收通过、形成在线覆盖的时间压缩至少 25%。
  - 前 2 个客户都要求超过 8 周的定制安全和数据映射工作，产品才能支撑一个活站点。
  mermaid: |
    flowchart LR
      Wedge[Post-award site acceptance wedge] --> MVP[First-site readiness MVP]
      MVP --> Proof[Faster accepted live coverage]
      Proof --> Expansion[Multi-site and sustainment expansion]
investorMemo:
  verdict:
    call: 见面 / 继续深入
    conviction: 紧迫感很强，切口也讲得通，但最终信心取决于能不能证明 OEM 会买一层中立系统，而不是继续扩内部工具。
    whyBelieve: 反无人机部署在放量，验收工作又高度碎片化，而且现有材料里没有哪家已点名厂商真正在跨混合栈拿下中立的“签约到上线”就绪工作流。
    whyDoubt: 独立市场本身不算大；如果安全部署和客户专属模板把实施拖得很重，产品也可能迅速滑向服务生意。
    nextDiligence: 先在一个真实的 3–10 站点 部署推进 上拿下一笔付费 试点，并证明首站达到验收通过、形成在线覆盖的速度，显著快于客户当前流程。
  firstCustomer:
    title: 固定站点 部署推进 的欧洲反无人机 OEM 部署负责人
    profile: 一家 150–800 人规模的 OEM 或防务集成商，刚拿下一个 3–10 站点的机场、港口或军事物流项目，站点里混用了不同传感器和效应器。
    trigger: 站点中标、实弹验收窗口，或 试点 扩容，逼着团队在首站上线前证明覆盖和就绪都已经到位。
    buyer: VP Programs 或部署负责人
    initialContract: 先做一笔 $100k–$200k 的付费首站部署项目；等这条工作流成为项目记录，再转成每年 $250k–$500k 的多站点订阅，并另收实施费。
  mustBeTrue:
  - 10 个目标 OEM 或集成商买家里，至少有 5 个明确说：首站验收延误带来的进度风险，足以支撑一笔付费 试点。
  - 一个 灯塔 客户只靠导出数据工作流、在未做深度集成前，就能把从勘测到验收通过、形成在线覆盖的时间压缩至少 25%。
  - 敏感就绪数据能落在买家认可的安全部署模型里，而不会把每次实施都拖成定制开发。
  - 至少 30% 的初始客户，在签下第一份年付合同后 12 个月内，都有可信的第二站点或保障扩张路径。
  - 混合厂商项目足够常见，中立就绪层赢面的确高于单一栈厂商的软件。
  diligenceQuestions:
  - 目标账户最近三次固定站点 部署推进，从勘测到验收通过、形成在线覆盖，各自花了多少天？
  - 当 部署推进 里程碑有失手风险时，软件预算到底掌握在谁手里——项目、部署、工程，还是保障团队？
  - 在买家要求 sovereign 或完全 air-gapped 部署前，供应商最低能托管哪些数据？
  - 目标项目里，混合厂商栈到底有多常见，以至于打包平台软件不是天然赢家？
  - 机场、港口和军事物流站点里，哪些验收工件真的能复用，哪些每次都得按买家重做？
operatingAssumptions:
- assumption: 只要产品和一个已命名站点里程碑绑定，买家就会从中标后的部署预算里为它买单。
  basis: research.yaml
  validationTest: 访谈 10 位目标项目负责人，并拿到至少 2 份和活跃 部署推进 里程碑绑定的付费 试点 LOI。
  decisionImpact: 如果不成立，公司就得改成借主承包商来卖，或把工作流打包进更宽的服务，而不是直接做软件主导交易。
- assumption: 在更深层集成被批准前，导出的 GIS、遥测和维护数据已经足以驱动首条站点就绪工作流。
  basis: operator judgment
  validationTest: 回放一个历史站点验收包，并让导出记录自动填充至少 70% 的必填字段。
  decisionImpact: 如果不成立，实施时间和 burn 会明显抬升，ICP 也会被迫收窄，路线图会更偏服务。
- assumption: 只要产品证明验收更快、证据能复用，客户就会接受每站点每年 $200k–$300k 的定价。
  basis: idea.yaml
  validationTest: 在首站把排期收益量化出来后，把一个付费 试点 转成落在模型区间内的年付合同。
  decisionImpact: 如果不成立，公司就得降价、打包更多工作流，或往更上游市场走，融资和招聘计划也要跟着改。
- assumption: 在雷达、RF 和效应器混搭的项目里，中立就绪层的价值高于单一厂商工作流。
  basis: research.yaml
  validationTest: 在 8 次客户访谈里，至少确认 4 个目标账户现在或即将采用混合厂商栈，而现有软件确实留下工作流空档。
  decisionImpact: 如果不成立，公司就更适合转成单一 OEM 栈的白标模块，而不是独立的 主记录系统。
- assumption: 首个客户会在 12 个月内，从首站验收扩到保障或更多站点。
  basis: research.yaml
  validationTest: 确保前两个客户在签约时都明确一个已获预算的相邻 部署推进 或保障工作流，并在一年内拿下一笔扩张订单。
  decisionImpact: 如果不成立，研究里的 SOM 更难打到，这门生意也未必撑得起风险投资回报。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 基准化当前固定站点验收时间线
  hypothesis: 目标 OEM 和集成商面临的排期滑坡足够重复、足够严重，值得为首站 试点 付费。
  successMetric: 完成 10 次买家访谈、记录 3 条 部署推进 时间线，并签下 2 份 试点 LOI
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 用导出数据重建一份历史证据包
  hypothesis: 在更深的任务系统集成获批前，就绪工作流也能先跑起来。
  successMetric: 重建 1 份历史站点包，且至少 70% 的必需工件由系统自动填充
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 跑通首个活跃固定站点部署 试点
  hypothesis: 产品能在一个真实 部署推进 上，把验收通过、形成在线覆盖的时间压缩至少 25%。
  successMetric: 首站验收提速 25%+，并获得客户批准把平台用到第二个站点
  owner: 前线部署工程师
- horizon: 90–180 天
  experiment: 验证 sovereign 与 air-gapped 部署边界
  hypothesis: 首个高安全客户环境可以在不超过 8 周定制安全工作的前提下上线。
  successMetric: 从 试点 签约到安全部署获批的时间压到 8 周以内
  owner: 安全负责人
- horizon: 6–12 个月
  experiment: 证明多站点模板复用
  hypothesis: 站点 1 的数据和证据模板，能显著减少站点 2–5 的配置工作量。
  successMetric: 在首个客户的第二个站点上，把配置时间至少压缩 40%
  owner: 产品负责人
- horizon: 6–12 个月
  experiment: 验证保障扩张动作
  hypothesis: 最容易吃下的扩张，不是新 logo，而是首站验收后的变更控制和保障。
  successMetric: 第一份年付合同签下 12 个月内，拿到 1 笔保障或新增站点扩张订单
  owner: 创始人/CEO
operations:
- 做一套支持 sovereign、本地部署和 air-gapped 环境的安全部署模型，并把数据边界定义清楚。
- 围绕一个受防站点打磨高触达 入场 操作手册，再往更大 部署推进 扩。
- 给 GIS 导出、遥测、维护系统和验收清单做适配层，让 试点 无需替换现有任务软件就能启动。
- 把证据包和审计轨迹工作流嵌进每次部署，好让价值能直接对照上线里程碑来衡量。
- 和主承包商、OEM 以及雷达或效应器厂商做伙伴动作，但把它们当集成渠道，而不是产品前提。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 首个市场买家集中、信任门槛高、又高度事件驱动，所以创始人必须亲自扛销售、共创客户和定价。
- role: 创始工程师
  startTiming: Month 0
  rationale: 要尽快把就绪图谱、证据包引擎和首批适配器搭出来，才能在前两个季度支撑真实 试点。
- role: 前线部署工程师
  startTiming: Month 2
  rationale: 把客户专属 部署推进 映射压短，并把前两个 试点 沉淀成可复用的实施 操作手册。
- role: 防空领域 SME
  startTiming: Month 3
  rationale: 把真实验收标准、禁射区逻辑和保障工作流写进产品里，避免系统脱离项目现实。
- role: 安全负责人
  startTiming: Month 6
  rationale: 安全部署是大规模采用的闸门，不能长期靠创始人临时补位。
milestones:
- horizon: 0–12 个月
  items:
  - 和欧洲 OEM 或集成商部署团队签下 2 个付费 灯塔 试点
  - 落地首个安全环境，并支持 1 条真实固定站点验收工作流
  - 把 1 个 试点 转成年付多站点或保障合同
  - 发布一套适用于机场、港口和军事物流站点类型的可复用模板库
- horizon: 12–24 个月
  items:
  - 做到 3–5 个活跃客户、平台上有 8–10 个在线受防站点
  - 上线与客户获批工作流绑定的变更控制和保障模块
  - 正式建立 2 个能降低部署摩擦的主承包商或 OEM 集成伙伴关系
  - 在多个账户里证明：第二站点的搭建时间显著低于第一站点
- horizon: 24–36 个月
  items:
  - 做到研究里第 3 年约 15 个在线受防站点、分布在 3–5 个项目中
  - 从首站验收扩到编队就绪分析和跨站点基准对比
  - 进入固定部署滩头市场之外的相邻多站点防务项目
risks:
- risk: OEM 扩展自家任务或现场服务工具，而不是购买一层中立就绪系统。
  likelihood: Medium
  impact: High
  mitigation: 先在混合厂商项目上证明验收更快，因为现有工具覆盖不了整条工作流；同时接入现有系统，而不是试图全部替换。
- risk: 安全部署要求太定制化，导致每次实施都太重，撑不起软件式毛利。
  likelihood: High
  impact: High
  mitigation: 先从导出数据工作流切入，把 sovereign 和 air-gapped 参考架构定义清楚，并尽早补齐安全和前线部署人才。
- risk: 项目、工程和保障团队之间预算归属不清，拖慢 试点 转化。
  likelihood: Medium
  impact: Medium
  mitigation: 销售时直接锚定已命名的合同里程碑，并把少掉的延期成本量化出来，让买家能从中标后 部署推进 预算里为这笔钱辩护。
- risk: 验收工件的站点差异和买家差异，比预期更大，导致模板复用率和护城河都起不来。
  likelihood: Medium
  impact: Medium
  mitigation: 初期每个客户只盯一个狭窄站点类型，先把可复用与定制工件占比量出来，再决定是否放宽 ICP。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3-5M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱用于支撑 18 个月的产品工程、安全部署能力、前线部署和领域招聘，目标是拿下首批 2–3 个 灯塔 客户，证明首站验收提速，并把这个切口滚成可重复的多站点扩张。
