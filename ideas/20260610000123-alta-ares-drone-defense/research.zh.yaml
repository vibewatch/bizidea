  wedge: 固定站点无人机探测、分析和处置，服务机场、关键基础设施和政府客户。
  pricing: 定制定价 / 联系销售
  strength: 固定站点定位广、事件分析强，而且被 Axon 收购后拿到了更强的平台背书。
  weaknessVsUs: 它优化的是如何运行 Dedrone 自家空域安全栈，而不是跨混合厂商编排中立的站点验收工作流。
  sourceRefs:
  - 29
  - 32
  - 35
  - 37
- name: Fortem Technologies
  stage: 成长阶段
  wedge: 用分层雷达、拦截器和管理系统栈，保护机场、基础设施和防务站点。
  pricing: 定制定价 / 联系销售
  strength: 软硬一体栈完整，又拿到 Lockheed Martin 的强背书。
  weaknessVsUs: 它更像硬件和效应器优先的方案，不适合成为跨厂商的就绪证据 主记录系统。
  sourceRefs:
  - 40
  - 47
  - 48
- name: Sentrycs
  stage: 成长阶段
  wedge: 主打非干扰式 RF 网络接管，以及面向机场、关键基础设施和防务客户的固定套件部署。
  pricing: 定制定价 / 联系销售
  strength: 在机场安全场景定位很强，固定套件也很贴关键基础设施买家。
  weaknessVsUs: 它重心在处置技术和套件部署，不是在多厂商环境里把验收和保障整条工作流串起来。
  sourceRefs:
  - 52
  - 56
  - 57
- name: Robin Radar
  stage: 在位细分玩家
  wedge: 以雷达为中心的探测层，服务政府、军方和反无人机场景。
  pricing: 定制定价 / 联系销售
  strength: 雷达可信度强，而且已有政府规模化 traction，比如荷兰国防部 100 部雷达合同。
  weaknessVsUs: 它占的是传感器层，因此在“探测覆盖”和“站点已经就绪”的项目工作之间仍留着空档。
  sourceRefs:
  - 61
  - 64
  - 65
- name: DroneShield
  stage: 上市成长期
  wedge: 提供包含软件、分析、边缘算力和电子战部件的分层固定站点 CUxS 栈。
  pricing: 定制定价 / 联系销售
  strength: 固定站点软硬件覆盖面广，而且在资本市场有持续存在感。
  weaknessVsUs: 整栈优先的打法适合单一厂商部署，但不天然适合跨混合 OEM 项目做中立就绪层。
  sourceRefs:
  - 68
  - 69
  - 70
  - 72
regulatoryTechnicalConstraints:
- point: EU 的 U-space 规则和各国无人机框架，要求每个站点都严肃处理 geozone、授权和数字服务。
  sourceRefs:
  - 18
  - 21
  - 22
- point: 机场本身就是对无人机活动高度受限的环境，因此证据、审批和运营纪律的要求更重。
  sourceRefs:
  - 21
  - 26
  - 52
- point: 敏感站点几何、传感器参数和就绪日志，可能迫使产品采用 sovereign 或 air-gapped 架构。
  sourceRefs:
  - 17
  - 21
  - 73
- point: 混合传感器、remote ID 输入和效应器，会带来复杂的版本控制，这不是通用 PM 工具能解决的。
  sourceRefs:
  - 23
  - 29
  - 61
  - 70
validationSignals:
- point: Alta Ares 刚拿到新一轮资金，而且明确宣称已在欧洲、中东和亚洲有部署与合同，说明 部署推进 压力是真实存在的。
  sourceRefs:
  - 1
  - 2
  - 3
- point: Lockheed Martin 同时投资并选用 Fortem，证明主承包商层面对更快反无人机部署能力确有需求。
  sourceRefs:
  - 47
  - 48
- point: Robin Radar 和荷兰国防部的 100 部 IRIS 雷达合同，说明欧洲对站点级、国内空域级覆盖存在规模化需求。
  sourceRefs:
  - 64
- point: Axon 与 Motorola 的战略整合，证明反无人机软件已经重要到足以吸引大型平台买家出手。
  sourceRefs:
  - 37
  - 73
openQuestions:
- 在站点验收编排内部，究竟有多少“可避免的延误天数”；又有多少延误其实来自硬件供给或部委签批？
- 在客户坚持全 air-gapped 部署前，最小可托管的数据集到底是什么？
- 主承包商和 OEM 会买一层中立就绪系统，还是会先要求继续扩展现有任务和 PM 栈？
- 在欧洲，机场、港口和军事物流部署之间，到底有多少验收工作流是真能复用的？
