    baseCase: "1.5% monthly churn"
    upsideCase: "1.0% monthly churn"
    y3RevenueImpactK: -110.0
    cashImpactK: -90.0
  - variable: sales cycle
    downsideCase: "9 months because procurement and security reviews drag"
    baseCase: "6 months"
    upsideCase: "4 months once the ROI proof and reference architecture exist"
    y3RevenueImpactK: -420.0
    cashImpactK: -310.0
  - variable: gross margin
    downsideCase: "65% GM from services-heavy secure deployments"
    baseCase: "70% GM"
    upsideCase: "73% GM from template reuse"
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: hiring pace
    downsideCase: "Second seller and second FDE are pulled forward by two quarters"
    baseCase: "Current lean hiring plan"
    upsideCase: "Non-critical hires wait until deployment templates prove reusable"
    y3RevenueImpactK: -60.0
    cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      SiteAwards --> PaidDeployments
      PaidDeployments --> LiveSites
      LiveSites --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> OperatingCash
      LiveSites --> ExpansionSites
      ExpansionSites --> Revenue
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by the first lighthouse accounts expanding from 4 active sites at Y1 exit to 15 by Y3 on $240K site pricing, not by a broad logo-count assumption."
  - checkName: Must go right
    finding: "Pilots must convert into repeatable multi-site programs quickly enough to reach 9 live sites by Q4Y2 without hiring a large sales force ahead of proof."
  - checkName: Model breaks if
    finding: "The downside case shows the model needs more capital if sales cycles slip toward 9 months while secure deployment work drags gross margin down to the mid-60s."
  - checkName: Next-round proof
    finding: "The next financing is justified if the company reaches roughly 15 live sites across 3-5 programs and exits Q4Y3 at about break-even EBITDA with a reusable secure deployment playbook."
sanityChecks:
  ruleOf40: "Y3 growth 87.5% + EBITDA margin -7.2% = 80.3%."
  burnMultiple: "Y2 burn multiple is about 0.8x on net new ARR and improves to about 0.1x in Y3 as Q4 turns slightly EBITDA-positive."
  revenuePerFte: "$250K Y3 using 12 exit FTE (benchmark roughly $200-400K SaaS)."
  flags:
    - "The model uses active defended sites as customers, so site count grows faster than logo count because expansion inside the first few programs is a core assumption."
    - "Starting cash equals the seed round because the schema has no separate financing line, so cash roll-forward is operating EBITDA off a modeled post-close balance."
    - "Gross margin is held at the 70% business-plan target even though sovereign and air-gapped deployments may pressure real early margins below plan."
    - "Reaching 15 live sites by Y3 depends heavily on one lighthouse account expanding and on later deployments reusing templates instead of staying bespoke."
