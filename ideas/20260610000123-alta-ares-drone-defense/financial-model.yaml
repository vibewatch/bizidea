assumptions:
  - id: A1
    name: Starting cash after seed close
    value: "3000"
    unit: "$K"
    source: "[BP fundingAsk.round seed; BP fundingAsk.targetFundingRangeUsd $3-5M; BP fundingAsk.runwayMonths 18]; base case uses the low end of the stated range and relies on the required 6-month buffer to extend modeled runway to 24 months."
  - id: A2
    name: Modeled customer unit
    value: "1 active defended site or battery"
    unit: definition
    source: "[BP businessModel.unitOfValue defended site or active battery managed through the readiness workflow]."
  - id: A3
    name: Blended annual revenue per active site
    value: "240"
    unit: "$K per site per year"
    source: "[Research market.som rationale 15 live sites at roughly $240k blended ARR per site; BP operatingAssumptions annual pricing in the $200k-$300k per site range]."
  - id: A4
    name: Revenue recognition cadence
    value: "1/12 of annual site value per active month"
    unit: policy
    source: "[Startup-finance heuristic: annual B2B software contracts are recognized ratably over the service period]."
  - id: A5
    name: Year-1 active-site exit
    value: "4"
    unit: sites
    source: "[BP milestones 0–12 months 2 paid lighthouse pilots and 1 pilot converted into an annual multi-site or sustainment contract]; base case assumes one account expands to multiple sites before year-end."
  - id: A6
    name: Year-2 active-site exit
    value: "9"
    unit: sites
    source: "[BP milestones 12–24 months reach 8-10 live defended sites on the platform]; base case uses the midpoint."
  - id: A7
    name: Year-3 active-site exit
    value: "15"
    unit: sites
    source: "[BP milestones 24–36 months; Research market.som rationale year-three case assumes 15 live sites]."
  - id: A8
    name: Gross margin
    value: "70"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]."
  - id: A9
    name: Monthly churn
    value: "1.5"
    unit: percent
    source: "[Startup-finance heuristic for an early but sticky enterprise workflow product sold into multi-year defense programs]."
  - id: A10
    name: CAC per active site won
    value: "90"
    unit: "$K"
    source: "[Startup-finance heuristic anchored to BP gtm founder-led enterprise motion, travel-heavy defense sales, and the research warning that procurement and security reviews slow deals]."
  - id: A11
    name: Average sales cycle
    value: "6"
    unit: months
    source: "[Research categoryDynamics.headwinds and regulatoryTechnicalConstraints point to defense procurement cadence, secure deployment review, and prime-contractor budget control]."
  - id: A12
    name: Hiring timeline
    value: "Founder CEO and founding engineer at start; forward deployment engineer by Month 3; air-defense SME by Month 4; security lead by Month 7; first sales/BD hire by Month 10; second engineer by Month 11; engineer three, second FDE, and G&A/Ops added through Year 2; fourth engineer and second seller added in Year 3"
    unit: plan
    source: "[BP team startTiming] for the first five hires; later hires are a lean extension required to support the BP milestones and secure-deployment workload."
  - id: A13
    name: Cash salary bands
    value: "Founder/Exec $150K; engineer $190K; forward deployment $170K; domain/product $180K; security $200K; sales/BD $160K; G&A/Ops $120K"
    unit: annual salary
    source: "[Startup-finance heuristic for venture-backed defense-software teams with senior technical and deployment talent]."
  - id: A14
    name: Non-payroll opex ramp
    value: "Sales and field travel scales from $5K to $28K monthly; cloud, lab, and compliance tooling from $12K to $28K monthly; legal, security, and admin from $10K to $50K monthly"
    unit: "$K per month"
    source: "[Startup-finance heuristic anchored to BP operations secure deployment, adapter work, evidence-pack workflows, and partner-heavy field implementation]."
  - id: A15
    name: Cash flow simplification
    value: "EBITDA approximates operating cash movement"
    unit: policy
    source: "[Startup-finance heuristic: no debt, taxes, capex, or working-capital timing is modeled explicitly at the seed stage]."
  - id: A16
    name: Funding ask runway target
    value: "24"
    unit: months
    source: "[BP fundingAsk.runwayMonths 18] plus the required 6-month cash buffer."
