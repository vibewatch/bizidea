differentiator: 通用项目管理、GIS 和维护工具，各自只覆盖 部署推进 的一小段，却回答不了防务团队真正关心的问题：在本地约束下，这个站点现在到底能不能发现、分类、交战，并持续维持保障。这个公司要拿下的，是站点就绪的决策层——把几何、AI 模型、拦截器状态和证据包收进同一条工作流。它的防守力，来自一张不断长大的部署图谱：哪些布局、参数和保障模式，能在不露出覆盖空档的前提下，让站点更快过验收。
