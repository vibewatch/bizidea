problem: 反无人机 OEM 和系统集成商，靠一款有说服力的拦截器就能拿下试点，但每上一个新站点，仍然得靠 GIS 截图、现场笔记、厂商手册和临时验收清单往前推。机场周界、港口或物流枢纽的每个站点，传感器几何、禁射区、边缘模型参数和保障约束都不一样。廉价自主蜂群把采购周期压短后，真正卡住运营的，不是能不能卖系统，而是站点上线前，能不能证明这里已经真正有防护，而且经得起审计。
targetUser:
  primary: 欧洲反无人机 OEM 和系统集成商里的项目交付负责人——他们负责在机场、港口和军事物流枢纽周边部署固定站点炮位。
  secondary: 负责传感器布设、边缘模型调参和保障就绪的站点验收工程师与保障经理。
  buyer: 欧洲反无人机 OEM 或集成商里的 VP Programs、GM Air Defense Solutions，或部署负责人。
startupThesis:
  nonObviousInsight: 在 AI 原生防空里，真正稀缺的资产已经不只是拦截器。一旦系统把数据融合、边缘 AI 和效应器拼到一起，真正的瓶颈就变成：能不能把每个受防站点整理成一条经过验证的 杀伤链——几何调好了、规则批下来了、保障证据也齐了。谁能把“签约到站点上线”的就绪时间压短，谁就可能变成下一代反无人机部署里的关键基础设施。
  beachhead: 给欧洲反无人机 OEM 和集成商做部署与站点验收编排，服务对象是那些在一个国家级或公用事业支撑项目下，正为机场、港口和军事物流枢纽搭起首批 3–20 个固定站点炮位的团队。
  wedge: 做一套安全的站点就绪系统，把本地空域约束、传感器和拦截器布设、AI 模型版本、维护任务和验收测试，收进每个受防站点的一条上线工作流。
  whyNowCatalyst: Alta Ares 的新增资金、在执行合同、带有乌克兰战场烙印的产品设计和跨国扩张，都说明 AI 原生反无人机系统正从原型演示走向多站点部署。此时谁能更快上线、谁能拿出就绪证据，已经开始决定输赢。
  ventureScalePath: 先从固定站点反无人机炮位切入，再扩到机动防空单元、边境监视网络和联盟保障软件，最终成为分层防空项目里负责部署与就绪的 主记录系统。
solution: 这个产品夹在工程、前线团队和项目经理之间，做一层受防站点控制层。它把本地地图、传感器和效应器布设、数据融合规则、边缘模型版本、维护状态和培训记录吃进来，整理成一块站点就绪面板：覆盖到底有没有、还剩哪些验收测试、缺哪些备件或校准、这个站点能不能安全上线。第一个流程很窄，但痛点很硬——把一个机场、港口或基地周界，从中标或试点扩容推进到验收通过、真正带来在线覆盖。嵌进去后，系统再顺势扩到保障、事后复盘学习，以及国家级防空网络里的多站点编队就绪。
goToMarketSeed:
  firstCustomer: 一家 150–800 人规模的欧洲反无人机 OEM 或防务集成商：刚拿下一个面向机场、港口或军事物流枢纽的 3–10 站点固定部署项目，而且必须在两个季度内把首站打上线。
  buyingTrigger: 新站点中标、实弹验收窗口打开，或从单一试点炮位扩到多站点 部署推进，逼着团队尽快证明覆盖和就绪已经到位。
  currentAlternative: 继续靠 GIS 工具、电子表格、厂商手册、幻灯片和前线工程师维护的定制中间件做手工项目管理。
  switchingReason: 这个切口能赢，是因为它不要求买家更换雷达或拦截器；它只是把原本缓慢、易错的站点验收流程，压成一条和上线日期绑定的可审计就绪工作流。
  pricingHypothesis: 按每个受防站点或在役火力单元收年费，再加数字孪生建模和安全集成实施费；后续靠保障模块和新增项目扩容收费。
