topRisks:
- name: 采购周期风险
  description: 防务预算可能只有在站点中标后才会释放，这会拉长第一笔销售周期，也会拖慢扩张。
  mitigation: 先盯住中标后的部署预算，和已在合同里的 OEM、集成商绑定，并把销售锚定在近期开启的验收里程碑上。
- name: 敏感部署数据风险
  description: 如果站点几何、传感器参数或就绪数据不能放进获批的安全环境，客户就可能抗拒引入新系统。
  mitigation: 优先支持 air-gapped 和 sovereign 部署，先从非密级 部署推进 工作流切入，再通过获批导出逐步做深集成。
- name: OEM 内部工具风险
  description: 大型反无人机厂商可能会选择扩展自家的现场服务或任务规划软件，而不是购买一层新系统。
  mitigation: 把产品定位成跨传感器和效应器的中立站点就绪系统，先在一个项目上证明验收更快，同时接入现有工具，而不是试图把它们替掉。
