jobsToBeDone:
- job: 当我们拿下一个新的固定站点反无人机部署时，帮项目团队把覆盖、测试和缺失依赖理清楚，好让我们按时验收站点，不要等到上线时才发现空档。
  currentAlternative: GIS 导出、电子表格清单、厂商 PDF 和现场人工踏勘。
  successMetric: 从站点勘测到验收通过、形成在线覆盖的天数
- job: 当已部署站点新增传感器、拦截器或规则集时，帮保障团队证明这个站点仍然处于就绪状态，好让我们在不经历漫长重新认证的情况下恢复完整覆盖。
  currentAlternative: 前线团队和项目团队之间临时拉的工程评审、幻灯片和邮件链。
  successMetric: 批准一次站点配置变更并恢复完整就绪所需的时间
