  round: seed
  amountM: 3.0
  runwayMonths: 24
  milestone: 到 Q4Y2 做到 9 个在线受防站点，验证至少 1 条多站点扩张路径，同时建立一套可重复的 sovereign 或 air-gapped 部署 操作手册，并保留约 6 个月现金缓冲。
