slug: counter-drone-site-readiness
date: '2026-06-10'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: seed 到账后的期初现金
  value: '3000'
  unit: $K
  source: '[BP fundingAsk.round seed; BP fundingAsk.targetFundingRangeUsd $3-5M; BP fundingAsk.runwayMonths 18]；基准情景取区间下限，并依靠要求保留的 6 个月缓冲，把模型里的现金跑道拉到 24 个月。'
- id: A2
  name: 模型里的客户单位
  value: 1 个活跃受防站点或火力单元
  unit: 定义
  source: '[BP businessModel.unitOfValue defended site or active battery managed through the readiness workflow]。'
- id: A3
  name: 每个活跃站点的综合年收入
  value: '240'
  unit: 每站点每年 $K
  source: '[Research market.som rationale 15 live sites at roughly $240k blended ARR per site; BP operatingAssumptions annual pricing in the $200k-$300k per site range]。'
- id: A4
  name: 收入确认节奏
  value: 每个活跃月份确认全年站点价值的 1/12
  unit: 规则
  source: '[Startup-finance heuristic: annual B2B software contracts are recognized ratably over the service period]。'
- id: A5
  name: 第 1 年期末活跃站点数
  value: '4'
  unit: 站点
  source: '[BP milestones 0–12 months 2 paid 灯塔 试点s and 1 试点 converted into an annual multi-site or sustainment contract]；基准情景假设其中一个账户会在年末前扩到多个站点。'
- id: A6
  name: 第 2 年期末活跃站点数
  value: '9'
  unit: 站点
  source: '[BP milestones 12–24 months reach 8-10 live defended sites on the platform]；基准情景取中位数。'
- id: A7
  name: 第 3 年期末活跃站点数
  value: '15'
  unit: 站点
  source: '[BP milestones 24–36 months; Research market.som rationale year-three case assumes 15 live sites]。'
- id: A8
  name: 毛利率
  value: '70'
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct]。'
- id: A9
  name: 月流失率
  value: '1.5'
  unit: 百分比
  source: '[Startup-finance heuristic for an early but sticky enterprise workflow product sold into multi-year defense programs]。'
- id: A10
  name: 每赢下一个活跃站点的 CAC
  value: '90'
  unit: $K
  source: '[Startup-finance heuristic anchored to BP gtm founder-led enterprise motion, travel-heavy defense sales, and the research warning that procurement and security reviews slow deals]。'
- id: A11
  name: 平均销售周期
  value: '6'
  unit: 个月
  source: '[Research categoryDynamics.headwinds and regulatoryTechnicalConstraints point to defense procurement cadence, secure deployment review, and prime-contractor budget control]。'
- id: A12
  name: 招聘时间线
  value: 起步时是创始人/高管和创始工程师；第 3 个月补前线部署工程师；第 4 个月补防空领域 SME；第 7 个月补安全负责人；第 10 个月补首位销售/BD；第 11 个月补第二位工程师；第 2 年内再补第 3 位工程师、第二位 FDE 和 G&A/Ops；第 3 年补第 4 位工程师和第二位销售
  unit: 计划
  source: '[BP team startTiming] 覆盖前五个岗位；后续招聘是在 BP 里程碑和安全部署工作量基础上的精简延展。'
- id: A13
  name: 现金薪资区间
  value: 创始人/高管 $150K；工程师 $190K；前线部署 $170K；领域/产品 $180K；安全 $200K；销售/BD $160K；G&A/Ops $120K
  unit: 年薪
  source: '[Startup-finance heuristic for venture-backed defense-software teams with senior technical and deployment talent]。'
- id: A14
  name: 非薪资 opex 爬坡
  value: 销售与现场差旅从每月 $5K 爬到 $28K；云、实验室和合规工具从每月 $12K 爬到 $28K；法务、安全和行政从每月 $10K 爬到 $50K
  unit: 每月 $K
  source: '[Startup-finance heuristic anchored to BP operations secure deployment, adapter work, evidence-pack workflows, and partner-heavy field implementation]。'
- id: A15
  name: 现金流简化处理
  value: EBITDA 近似代表经营现金变动
  unit: 规则
  source: '[Startup-finance heuristic: no debt, taxes, capex, or working-capital timing is modeled explicitly at the seed stage]。'
- id: A16
  name: 本轮融资对应的跑道目标
  value: '24'
  unit: 个月
  source: '[BP fundingAsk.runwayMonths 18] 加上要求保留的 6 个月现金缓冲。'
