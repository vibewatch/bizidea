  baseCase: CAC 为 $90K
  upsideCase: 在伙伴协助落地时，CAC 降到 $70K
  y3RevenueImpactK: -80.0
  cashImpactK: -240.0
- variable: 流失率
  downsideCase: 月流失率 2.0%
  baseCase: 月流失率 1.5%
  upsideCase: 月流失率 1.0%
  y3RevenueImpactK: -110.0
  cashImpactK: -90.0
- variable: 销售周期
  downsideCase: 9 个月，因为采购和安全审查拖长节奏
  baseCase: 6 个月
  upsideCase: 一旦 ROI 证明和参考架构跑出来，缩到 4 个月
  y3RevenueImpactK: -420.0
  cashImpactK: -310.0
- variable: 毛利率
  downsideCase: 安全部署更偏服务化，GM 掉到 65%
  baseCase: GM 为 70%
  upsideCase: 靠模板复用，GM 到 73%
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
- variable: 招聘节奏
  downsideCase: 第二位销售和第二位 FDE 提前两个季度入场
  baseCase: 当前精简招聘计划
  upsideCase: 非关键岗位延后，等部署模板验证可复用后再招
  y3RevenueImpactK: -60.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      SiteAwards --> PaidDeployments
      PaidDeployments --> LiveSites
      LiveSites --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> OperatingCash
      LiveSites --> ExpansionSites
      ExpansionSites --> Revenue
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入，不是靠大量新 logo 堆出来的，而是靠首批 灯塔 账户从第 1 年期末 4 个活跃站点扩到第 3 年的 15 个，并维持每站点 $240K 定价。
- checkName: 必须跑通
  finding: 试点 必须足够快地转成可复制的多站点项目，公司才有机会在不提前堆大销售团队的前提下，于 Q4Y2 做到 9 个在线站点。
- checkName: 模型失效条件
  finding: 下行情景说明：如果销售周期拖到 9 个月，同时安全部署把毛利压到 60% 中段，公司就需要更多资本。
- checkName: 下一轮融资证明
  finding: 如果公司能在 3–5 个项目里做到约 15 个在线站点，并在 Q4Y3 以接近 EBITDA 盈亏平衡 收尾，同时跑出可复用的安全部署 操作手册，就有资格讲下一轮融资。
sanityChecks:
  ruleOf40: 第 3 年增长 87.5% + EBITDA 利润率 -7.2% = 80.3%。
  burnMultiple: 第 2 年 burn multiple 约 0.8x，对应净新增 ARR；到第 3 年改善到约 0.1x，因为 Q4 已略微转正。
  revenuePerFte: 第 3 年按期末 12 个 FTE 计算，人均收入约 $250K（SaaS 基准大致在 $200–400K）。
  flags:
  - 模型把活跃受防站点当作客户单位，因此站点数会比 logo 数长得更快——这是因为首批项目内扩张本就是核心假设。
  - 由于 schema 里没有单独融资行，期初现金直接等于 seed 轮金额，因此现金滚动是基于投后余额和经营 EBITDA 推出来的。
  - 模型把毛利率固定在商业计划里的 70% 目标上，但 sovereign 和 air-gapped 部署在早期完全可能把真实毛利压到计划以下。
  - 第 3 年做到 15 个在线站点，高度依赖一个 灯塔 账户顺利扩张，也依赖后续部署能复用模板，而不是继续一站一做。
