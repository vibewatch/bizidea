scenarios:
  downside:
    description: 安全审查始终高度定制化、试点 转正更慢，而且前几个项目之外的扩张速度跟不上商业计划需要。
    y3RevenueK: 2240.0
    y3EbitdaK: -760.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
    - 平均销售周期从 6 个月拉长到 9 个月。
    - 每站点综合定价从 $240K 压到 $220K，且第 3 年期末只有 12 个在线站点，而不是 15 个。
    - 由于安全部署和适配器工作仍偏服务化，毛利率降到 65%。
  base:
    description: 公司拿下 2 个付费 灯塔 试点，把其中 1 个做成多站点参考账户，并按研究支撑的站点定价，在第 3 年滚到 15 个在线受防站点。
    y3RevenueK: 3000.0
    y3EbitdaK: -215.0
    cashLowPointK: 699.0
    keyAssumptionChanges:
    - 每站点综合年收入稳定在 $240K。
    - 活跃受防站点从第 1 年期末的 4 个，涨到第 2 年期末的 9 个，再到第 3 年期末的 15 个。
    - 在招聘保持精简的前提下，毛利率守住商业计划里的 70% 目标。
  upside:
    description: 模板复用和伙伴带单一起降低部署摩擦，让公司能在早期账户内更快扩张，而不必明显抬高成本台阶。
    y3RevenueK: 3580.0
    y3EbitdaK: 260.0
    cashLowPointK: 920.0
    keyAssumptionChanges:
    - 靠保障和变更控制模块，每站点综合定价升到 $250K。
    - 由于首个账户扩张和伙伴主导 部署推进 更早落地，第 3 年期末做到 18 个在线站点。
    - 更多部署复用同一套安全模板和适配器，毛利率提升到 72%。
