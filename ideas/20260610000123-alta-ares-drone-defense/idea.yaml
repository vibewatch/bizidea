topRisks:
  - name: Procurement-cycle risk
    description: Defense budgets may be available only after a site award, which can lengthen the first sales cycle and delay expansion.
    mitigation: Focus on post-award deployment budgets, partner with OEMs and integrators already under contract, and sell against a near-term acceptance milestone.
  - name: Sensitive deployment data risk
    description: Customers may resist a new system if site geometry, sensor settings, or readiness data cannot live in approved secure environments.
    mitigation: Support air-gapped and sovereign deployments first, start with unclassified rollout workflows, and integrate through approved exports before deeper connections.
  - name: OEM internal-tool risk
    description: Large counter-UAS vendors may try to extend internal field-service or mission-planning software instead of buying a new layer.
    mitigation: Position the product as the neutral site-readiness system across mixed sensors and effectors, prove faster acceptance on one program, and integrate with incumbent tools rather than replacing them.
