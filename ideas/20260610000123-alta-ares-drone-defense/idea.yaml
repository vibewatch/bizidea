problem: >-
  Counter-drone OEMs and integrators can win pilots with a compelling
  interceptor, but they still bring each new site live through GIS screenshots,
  field notebooks, vendor manuals, and ad hoc acceptance checklists. Every
  airport perimeter, port, or logistics hub has different sensor geometry,
  no-fire zones, edge-model settings, and maintenance constraints. As cheap
  autonomous swarms compress buyer timelines, the operational bottleneck becomes
  certifying that a site is truly defended and auditable before it goes live.
targetUser:
  primary: >-
    Program delivery leads at European counter-UAS OEMs and integrators
    responsible for deploying fixed-site batteries around airports, ports, and
    military logistics hubs
  secondary: >-
    Site acceptance engineers and sustainment managers coordinating sensor
    placement, edge-model tuning, and maintenance readiness
  buyer: >-
    VP Programs, GM Air Defense Solutions, or head of deployment at a European
    counter-UAS OEM or integrator
startupThesis:
  nonObviousInsight: >-
    The scarce asset in AI-native air defense is no longer just the interceptor.
    Once systems combine data fusion, edge AI, and effectors, the real
    bottleneck becomes turning each defended site into a verified kill chain
    with tuned geometry, approved rules, and sustainment evidence. The company
    that shortens contract-to-live site readiness can become critical
    infrastructure for the next generation of counter-drone deployments.
  beachhead: >-
    Deployment and site-acceptance orchestration for European counter-UAS OEMs
    and integrators standing up their first 3-20 fixed-site batteries around
    airports, ports, and military logistics hubs under one national or
    utility-backed program
  wedge: >-
    A secure site-readiness system that maps local airspace constraints, sensor
    and interceptor placement, AI model versions, maintenance tasks, and
    acceptance tests into one go-live workflow for each defended site
  whyNowCatalyst: >-
    Alta Ares' new capital, live contracts, Ukraine-shaped product design, and
    multi-country expansion show AI-native counter-drone systems are moving from
    prototype demos to multi-site deployments where rollout speed and readiness
    evidence now decide wins.
  ventureScalePath: >-
    Start with fixed-site counter-UAS batteries, then expand into mobile
    air-defense units, border-surveillance networks, and coalition sustainment
    software, becoming the system of record for deployment and readiness across
    layered air-defense programs.
solution: >-
  The product creates a defended-site control layer between engineering, field
  teams, and program managers. It ingests local maps, sensor and effector
  placement, data-fusion rules, edge-model versions, maintenance status, and
  training records, then turns them into one site-readiness board: what
  coverage exists, what acceptance tests remain, what spares or calibrations
  are missing, and whether the site can safely go live. The first workflow is
  narrow and painful: shorten the time from contract award or pilot expansion
  to accepted live coverage at one airport, port, or base perimeter. Once
  embedded, the system expands into sustainment, after-action learning, and
  multi-site fleet readiness across national air-defense networks.
goToMarketSeed:
  firstCustomer: >-
    A 150-800 person European counter-UAS OEM or defense integrator that has
    won one 3-10 site fixed-installation program for an airport, port, or
    military logistics hub and must field the first site within two quarters
  buyingTrigger: >-
    A new site award, live-fire acceptance window, or expansion from a single
    pilot battery to a multi-site rollout that forces the team to prove
    coverage and readiness fast
  currentAlternative: >-
    Manual program management across GIS tools, spreadsheets, vendor manuals,
    slide decks, and custom middleware maintained by field engineers
  switchingReason: >-
    The wedge beats the status quo because it does not ask buyers to replace
    radars or interceptors; it collapses the slow, error-prone site-acceptance
    process into one auditable readiness workflow tied to go-live dates
  pricingHypothesis: >-
    Annual subscription per defended site or active battery, plus
    implementation for digital-twin setup and secure integrations, with
    expansion pricing for sustainment modules and additional programs
