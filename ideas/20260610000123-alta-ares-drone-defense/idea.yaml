jobsToBeDone:
  - job: >-
      When we win a new fixed-site counter-UAS deployment, help our program team
      map coverage, tests, and missing dependencies, so we can accept the site
      on time without discovering gaps during go-live.
    currentAlternative: >-
      GIS exports, spreadsheet checklists, vendor PDFs, and manual field
      walk-downs
    successMetric: Days from site survey to accepted live coverage
  - job: >-
      When a deployed site adds a new sensor, interceptor, or ruleset, help our
      sustainment team prove the site is still ready, so we can return to full
      coverage without a long re-certification cycle.
    currentAlternative: >-
      Ad hoc engineering reviews, slide decks, and email chains across field and
      program teams
    successMetric: Time to approve a site configuration change and restore full readiness
