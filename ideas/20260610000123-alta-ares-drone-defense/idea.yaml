differentiator: >-
  Generic project-management, GIS, and maintenance tools each cover one slice
  of the rollout, but none answer the defense-specific question of whether a
  particular site is ready to detect, classify, engage, and stay supportable
  under local constraints. This company owns the site-readiness decision layer
  that connects geometry, AI models, interceptor status, and evidence packs in
  one workflow. Defensibility comes from the deployment graph of which layouts,
  model settings, and sustainment patterns actually get sites accepted faster
  without opening coverage gaps.
