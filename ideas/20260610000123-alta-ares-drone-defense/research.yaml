competitors:
- name: Dedrone
  stage: scale-up
  wedge: Fixed-site drone detection, analytics, and mitigation for airports, critical infrastructure, and government users.
  pricing: Custom quote / contact sales
  strength: Broad fixed-site positioning, incident analytics, and strategic-platform backing after the Axon acquisition.
  weaknessVsUs: Optimized for operating Dedrone’s airspace-security stack, not for neutral multi-vendor site-acceptance orchestration.
  sourceRefs:
  - 29
  - 32
  - 35
  - 37
- name: Fortem Technologies
  stage: scale-up
  wedge: Layered radar, interceptor, and manager stack for defending airports, infrastructure, and defense sites.
  pricing: Custom quote / contact sales
  strength: Integrated hardware-software stack plus strong strategic validation from Lockheed Martin.
  weaknessVsUs: Hardware-and-effectors-first approach is less suited to becoming the cross-vendor system of record for readiness evidence.
  sourceRefs:
  - 40
  - 47
  - 48
- name: Sentrycs
  stage: scale-up
  wedge: Non-jamming RF-cyber takeover and fixed-kit deployments for airports, critical infrastructure, and defense customers.
  pricing: Custom quote / contact sales
  strength: Strong airport-safe positioning and fixed-site kit tailored to critical-infrastructure buyers.
  weaknessVsUs: Focused on mitigation technology and kit deployment rather than the full acceptance-and-sustainment workflow across vendors.
  sourceRefs:
  - 52
  - 56
  - 57
- name: Robin Radar
  stage: incumbent specialist
  wedge: Radar-centered detection layer for government, military, and counter-UAS environments.
  pricing: Custom quote / contact sales
  strength: Radar credibility and evidence of scaled government traction, including a 100-radar Dutch MoD contract.
  weaknessVsUs: Sensor-centric position leaves a gap between detection coverage and the program work of proving one site is fully ready.
  sourceRefs:
  - 61
  - 64
  - 65
- name: DroneShield
  stage: public scale-up
  wedge: Layered fixed-site CUxS stack with software, analytics, edge compute, and electronic-warfare components.
  pricing: Custom quote / contact sales
  strength: Breadth across fixed-site hardware and software, plus visible investor-market presence.
  weaknessVsUs: Stack-first approach may fit single-vendor deployments but is less natural as a neutral readiness layer across mixed OEM programs.
  sourceRefs:
  - 68
