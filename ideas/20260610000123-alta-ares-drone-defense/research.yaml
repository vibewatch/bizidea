    - 13
    - 47
  validationPlan:
  - priority: high
    question: How many days do OEMs and integrators currently spend from site survey to accepted live coverage on a fixed installation?
    evidenceToGather: Three post-award deployment timelines from European OEMs or primes, broken into survey, integration, testing, and sign-off steps.
  - priority: high
    question: What data can live in SaaS versus sovereign or air-gapped environments for readiness workflows?
    evidenceToGather: Security architecture reviews with one airport-focused vendor and one military program integrator.
  - priority: medium
    question: Which acceptance artifacts are common across airport, port, and base deployments, and which are buyer-specific?
    evidenceToGather: Sample acceptance checklists, no-fire-zone artifacts, and maintenance sign-off packs from at least two program types.
