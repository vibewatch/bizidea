openQuestions:
- How many days of avoidable delay sit specifically inside site-acceptance orchestration versus hardware availability or ministry sign-off?
- Which minimum dataset can be managed in a SaaS control plane before customers insist on full air-gapped deployment?
- Will primes and OEMs buy a neutral readiness layer, or will they insist on extending their existing mission and PM stacks first?
- How much of the acceptance workflow is truly repeatable across airport, port, and military-logistics deployments in Europe?
