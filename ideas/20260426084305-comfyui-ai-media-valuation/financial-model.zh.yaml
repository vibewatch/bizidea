slug: ai-likeness-rights-ops
date: '2026-04-26'
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-05
    unit: YYYY-MM
    source: '[BP date 2026-04-26] 模型从计划发布后的下个月开始。'
  - id: A2
    name: M1 期初现金
    value: $2.25M
    unit: USD
    source: '[BP fundingAsk $2–4M] 假设模型启动时完成 $2.10M pre-seed 融资，外加约 $150K 创始人资金 / 存量现金。'
  - id: A3
    name: 混合年 ARPU
    value: $19.8K
    unit: USD/customer/year
    source: '[BP operatingAssumptions + research market.som] 以 $18K 年度支出锚点为基础，并加上约 10% 来自已批准导出的使用费。'
  - id: A4
    name: 月度流失率
    value: 2.0%
    unit: pct/month
    source: '[BP annual deployment model] 针对具备年约但仍有早期产品风险的 B2B 工作流软件所采用的启发式假设。'
  - id: A5
    name: 每月新增客户爬坡
    value: Y1 months 0,0,1,1,1,1,1,1,1,2,2,2; Y2 months 1,1,2,2,2,2,2,2,2,3,3,3; Y3 months 2,2,2,2,2,2,2,3,3,3,3,4
    unit: new customers/month
    source: '[BP milestones + GTM funnelTargets] 节奏与 Y1 达成 2 个年度部署，以及第 24 个月达到 10–15 个付费代理机构账户的目标相匹配。'
  - id: A6
    name: 目标毛利率
    value: 70%
    unit: pct of revenue
    source: '[BP businessModel.targetGrossMarginPct] 模型假设所有已确认收入中有 30% 计入 COGS。'
  - id: A7
    name: 创始人 / CEO 全成本薪酬
    value: $120K
    unit: USD/year loaded
    source: '[BP team] 创业公司财务启发式：$100K 现金薪资，加 20% 薪税 / 福利负担。'
  - id: A8
    name: 创始工程师全成本薪酬
    value: $168K
    unit: USD/year loaded
    source: '[BP team] 创业公司财务启发式：$140K 薪资，加 20% 负担。'
  - id: A9
    name: 产品 / 合规工程师全成本薪酬
    value: $162K
    unit: USD/year loaded
    source: '[BP team] 创业公司财务启发式：$135K 薪资，加 20% 负担。'
  - id: A10
    name: 解决方案工程师全成本薪酬
    value: $138K
    unit: USD/year loaded
    source: '[BP team] 创业公司财务启发式：$115K 薪资，加 20% 负担。'
  - id: A11
    name: 客户成功 / 策略运营全成本薪酬
    value: $108K
    unit: USD/year loaded
    source: '[BP team] 创业公司财务启发式：$90K 薪资，加 20% 负担。'
  - id: A12
    name: 销售 / GTM 全成本薪酬
    value: $144K
    unit: USD/year loaded
    source: '[BP GTM founder-led sales] 首个商业化岗位的启发式假设：$120K 基础年薪等值，加 20% 负担；浮动佣金计入 S&M 预算。'
  - id: A13
    name: G&A / 运营全成本薪酬
    value: $120K
    unit: USD/year loaded
    source: '[BP operations] 首个财务 / 运营通才的启发式假设：$100K 薪资，加 20% 负担。'
  - id: A14
    name: 招聘时间线
    value: M1 founder and founding engineer; M4 product / compliance engineer; M7 solutions engineer; M10 customer success / policy ops; M19 first sales hire; M25 second engineer; M31 G&A / ops
    unit: timeline
    source: '[BP team] 前四个岗位遵循计划；Y1 之后的招聘基于与收入爬坡匹配的保守财务假设。'
  - id: A15
    name: 非薪资销售与市场费用爬坡
    value: $2K/mo in M1–M6, $4K/mo in M7–M12, $5K/mo in M13–M18, $7K/mo in M19–M24, $8K/mo in M25–M30, $10K/mo in M31–M36
    unit: USD/month
    source: '[BP GTM channels] 针对创始人主导外呼、节点分发、差旅和伙伴实验的启发式假设，不包含大规模付费获客。'
  - id: A16
    name: 非薪资研发工具费用爬坡
    value: $4K/mo in Y1, $5K/mo in Y2, $6K/mo in Y3
    unit: USD/month
    source: '[BP product + operations] 面向开发工具、安全、测试基础设施和 COGS 之外云环境的启发式假设。'
  - id: A17
    name: 非薪资 G&A 费用爬坡
    value: $4K/mo in Y1, $5K/mo in Y2, $6K/mo in Y3
    unit: USD/month
    source: '[BP operations] 面向法务、会计、保险和行政软件的启发式假设。'
  - id: A18
    name: 融资需求规模
    value: $2.1M pre-seed
    unit: USD
    source: '[BP fundingAsk + model calc] 资金规模按达到 12–24 个月里程碑来测算：拿下 10–15 个代理机构账户、1 个品牌工作室部署，并保留约 6 个月缓冲。'
  - id: A19
    name: CAC 计算口径
    value: $12.7K
    unit: USD/new customer
    source: '[Model calc] 以 M19–M36 期间约 $573K 的过去 18 个月销售与市场费用，除以 45 个新增客户。'
