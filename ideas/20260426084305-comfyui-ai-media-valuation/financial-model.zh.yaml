modelDiagram:
  title: 单位经济流转
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> AnnualCustomers
      AnnualCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形的收入建立在 Y3 末约 53 个活跃客户和 $19.8K 混合年 ARPU 之上，因此可得到约 $1.04M 的期末 ARR 与 $811.3K 的 Y3 确认收入。
  - checkName: 必须顺利发生的事
    finding: 模型要求创始人主导的试点足够快地转成年部署，才能支撑 13 / 25 / 30 的新增客户节奏，同时把流失率维持在约 2%。
  - checkName: 模型会失效的条件
    finding: 在 downside 情形下，更慢的新增配合 3% 流失率会让现金低点略微转负，因此公司承受不起试点到年度部署转化率偏弱。
  - checkName: 下一轮融资所需证明
    finding: 如果公司能在第 24 个月前达到 10–15 个代理机构账户、1 个品牌工作室 logo，并证明可参考的上线经济性，就有理由启动下一轮融资。
sanityChecks:
  ruleOf40: Y3 growth 98.5% + EBITDA margin -92.7% = 5.8%
  burnMultiple: Y3 burn multiple 1.9x = $751.9K net burn / $403.3K net new ARR
  revenuePerFte: $108.2K Y3 ($811.3K revenue / 7.5 average FTE vs benchmark $200–400K SaaS)
  flags:
    - 基准情形到 Y3 仍处于强投入阶段：Rule of 40 只有 5.8%，EBITDA 仍为 -$751.9K。
    - 由于模型在细分市场尚未被验证前就提前配置了实施与策略运营能力，Y3 的每 FTE 收入低于成熟 SaaS 的常见基准。
    - 建模得到的滩头 SAM 仅约 $25.9M，因此必须从代理机构扩展到品牌工作室和相邻工作流，才可能具备风险投资级上行空间。
    - 如果出现更慢的转化和 3% 流失率，现金会略微跌破零，说明下一轮融资前几乎没有犯错空间。
