modelDiagram:
  title: 单位经济性流程
  mermaid: "flowchart LR\n  Leads --> PaidPilots\n  PaidPilots --> AnnualCustomers\n  AnnualCustomers --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自在 Y3 结束时达到约 53 个活跃客户，综合年化 ARPU 为 $19.8K，从而带来约 $1.04M 的期末 ARR 和 $811.3K 的 Y3 已确认收入。
- checkName: 必须做对的事
  finding: 该模型要求创始人主导的试点能够足够快地转化为年度部署，以达到 13 / 25 / 30 的新增爬坡，同时将流失率维持在接近 2%。
- checkName: 模型失效条件
  finding: 在下行情景下，较慢的客户新增和 3% 的流失率会让现金最低点略为转负，因此公司承受不起试点到年度转化率偏弱的情况。
- checkName: 下一轮融资证明
  finding: 如果公司在第 24 个月前达到 10–15 个代理机构账户、1 个品牌工作室标杆客户，并形成可引用的导入经济性，那么下一轮融资就是合理的。
sanityChecks:
  ruleOf40: Y3 growth 98.5% + EBITDA margin -92.7% = 5.8%
  burnMultiple: Y3 burn multiple 1.9x = $751.9K net burn / $403.3K net new ARR
  revenuePerFte: $108.2K Y3 ($811.3K revenue / 7.5 average FTE vs benchmark $200–400K SaaS)
  flags:
  - 基准情景在 Y3 仍然处于深度投入阶段：Rule of 40 仅为 5.8%，EBITDA 仍为 -$751.9K。
  - Y3 的人均收入低于成熟 SaaS 基准，因为模型在细分市场尚未被验证前，就已配置了实施和策略运营能力。
  - 模型化滩头 SAM 仅约为 $25.9M，因此若想获得风投级上行空间，就必须从代理机构扩展到品牌工作室和相邻工作流。
  - 下行情景中较慢转化和 3% 流失率会使现金略低于零，因此在下一轮融资前几乎没有容错空间。
