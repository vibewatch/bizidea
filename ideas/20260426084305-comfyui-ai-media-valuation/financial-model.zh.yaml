scenarios:
  downside:
    description: 客户增长速度约慢 20%，综合 ARPU 稳定在 $18.0K，且由于试点转化更慢，流失率升至 3%。
    y3RevenueK: 560.1
    y3EbitdaK: -927.9
    cashLowPointK: -24.0
    keyAssumptionChanges:
    - 与基准情景相比，新增客户爬坡大约下降 20%。
    - 综合年化 ARPU 从 $19.8K 降至 $18.0K。
    - 月流失率从 2.0% 升至 3.0%。
  base:
    description: 在创始人主导下，试点到第 24 个月转化为 10 至 15 个代理机构账户，综合定价维持在模型中的 $18K 锚点之上，并伴随适度用量扩张。
    y3RevenueK: 811.3
    y3EbitdaK: -752.1
    cashLowPointK: 246.4
    keyAssumptionChanges:
    - 新增客户爬坡遵循模型设定，即 Y1 / Y2 / Y3 年度分别新增 13 / 25 / 30 个客户。
    - 综合年化 ARPU 保持在 $19.8K，毛利率为 70%。
    - 随着审计资料包嵌入发布工作流，月流失率维持在 2.0%。
  upside:
    description: 合作伙伴分发和更快的案例转化带动客户新增，同时用量费用使综合定价略高于计划。
    y3RevenueK: 1108.9
    y3EbitdaK: -543.8
    cashLowPointK: 541.5
    keyAssumptionChanges:
    - 由于更早获得合作伙伴辅助成交，新增客户爬坡约提升 15%。
    - 由于更高的用量附加，综合年化 ARPU 提升至约 $20.6K。
    - 一旦审批路由和仪表板上线，月流失率改善至 1.5%。
