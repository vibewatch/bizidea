scenarios:
  downside:
    description: 新增客户速度慢约 20%，混合 ARPU 降至 $18.0K，且因试点转化拉长，流失率升至 3%。
    y3RevenueK: 560.1
    y3EbitdaK: -927.9
    cashLowPointK: -24.0
    keyAssumptionChanges:
      - 与基准情形相比，每月新增客户爬坡大约下调 20%。
      - 混合年 ARPU 从 $19.8K 降到 $18.0K。
      - 月度流失率从 2.0% 升到 3.0%。
  base:
    description: 创始人主导的试点到第 24 个月转成 10–15 个代理机构账户，混合定价维持在建模的 $18K 锚点并叠加适度使用费扩张。
    y3RevenueK: 811.3
    y3EbitdaK: -752.1
    cashLowPointK: 246.4
    keyAssumptionChanges:
      - 新增客户按模型设定推进，Y1 / Y2 / Y3 分别实现 13 / 25 / 30 个新增。
      - 混合年 ARPU 维持在 $19.8K，毛利率 70%。
      - 随着审计包嵌入发布流程，月度流失率稳定在 2.0%。
  upside:
    description: 伙伴分发和更快的案例转化提升获客速度，使用费也让混合定价略高于计划。
    y3RevenueK: 1108.9
    y3EbitdaK: -543.8
    cashLowPointK: 541.5
    keyAssumptionChanges:
      - 在伙伴带动的更早成交下，每月新增客户爬坡约提升 15%。
      - 由于使用费附着更高，混合年 ARPU 提升到约 $20.6K。
      - 当审批路由和仪表盘上线后，月度流失率改善到 1.5%。
