slug: ai-likeness-rights-ops
date: '2026-04-26'
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: YYYY-MM
  source: '[BP date 2026-04-26] 模型从计划发布后的次月开始。'
- id: A2
  name: M1 期初现金
  value: $2.25M
  unit: USD
  source: '[BP fundingAsk $2–4M] 假设模型开始时完成 $2.10M pre-seed 融资，外加约 $150K 创始人现金 / 现有现金。'
- id: A3
  name: 综合年化 ARPU
  value: $19.8K
  unit: USD/customer/year
  source: '[BP operatingAssumptions + research market.som] 以 $18K 年支出锚点，加上约 10% 来自获批导出的用量费用。'
- id: A4
  name: 月流失率
  value: 2.0%
  unit: pct/month
  source: '[BP annual deployment model] 针对采用年约、但仍具早期产品风险的高粘性 B2B 工作流软件的经验性假设。'
- id: A5
  name: 新增客户爬坡
  value: Y1 各月 0,0,1,1,1,1,1,1,1,2,2,2；Y2 各月 1,1,2,2,2,2,2,2,2,3,3,3；Y3 各月 2,2,2,2,2,2,2,3,3,3,3,4
  unit: new customers/month
  source: '[BP milestones + GTM funnelTargets] 按该节奏，Y1 达成 2 个年度部署，并在第 24 个月达到 10–15 家付费代理机构。'
- id: A6
  name: 目标毛利率
  value: 70%
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct] 模型将所有已确认收入按 30% COGS 计。'
- id: A7
  name: 创始人 / CEO 全负担薪酬
  value: $120K
  unit: USD/year loaded
  source: '[BP team] 创业财务经验假设：$100K 现金薪资，加上 20% 薪资税 / 福利负担。'
- id: A8
  name: 创始工程师全负担薪酬
  value: $168K
  unit: USD/year loaded
  source: '[BP team] 创业财务经验假设：$140K 薪资，加上 20% 负担。'
- id: A9
  name: 产品 / 合规工程师全负担薪酬
  value: $162K
  unit: USD/year loaded
  source: '[BP team] 创业财务经验假设：$135K 薪资，加上 20% 负担。'
- id: A10
  name: 解决方案工程师全负担薪酬
  value: $138K
  unit: USD/year loaded
  source: '[BP team] 创业财务经验假设：$115K 薪资，加上 20% 负担。'
- id: A11
  name: 客户成功 / 策略运营全负担薪酬
  value: $108K
  unit: USD/year loaded
  source: '[BP team] 创业财务经验假设：$90K 薪资，加上 20% 负担。'
- id: A12
  name: 销售 / GTM 全负担薪酬
  value: $144K
  unit: USD/year loaded
  source: '[BP GTM founder-led sales] 对首位商业化招聘的经验假设为 $120K 基础等价薪酬加 20% 负担；浮动薪酬计入 S&M 预算。'
- id: A13
  name: 行政与运营全负担薪酬
  value: $120K
  unit: USD/year loaded
  source: '[BP operations] 对首位财务 / 运营通才的经验假设为 $100K 加 20% 负担。'
- id: A14
  name: 招聘时间线
  value: M1 创始人和创始工程师；M4 产品 / 合规工程师；M7 解决方案工程师；M10 客户成功 / 策略运营；M19 首位销售；M25 第二位工程师；M31 行政与运营
  unit: timeline
  source: '[BP team] 前四个招聘按计划执行；Y1 之后的招聘基于与收入爬坡相匹配的保守财务经验假设。'
- id: A15
  name: 非薪酬销售与营销支出爬坡
  value: M1–M6 为 $2K/mo，M7–M12 为 $4K/mo，M13–M18 为 $5K/mo，M19–M24 为 $7K/mo，M25–M30 为 $8K/mo，M31–M36 为 $10K/mo
  unit: USD/month
  source: '[BP GTM channels] 对创始人主导外呼、节点分发、差旅和合作伙伴实验的经验假设，不包含大规模付费获客。'
- id: A16
  name: 非薪酬研发工具支出爬坡
  value: Y1 为 $4K/mo，Y2 为 $5K/mo，Y3 为 $6K/mo
  unit: USD/month
  source: '[BP product + operations] 对 COGS 之外的开发工具、安全、测试基础设施和云环境的经验假设。'
- id: A17
  name: 非薪酬行政与运营支出爬坡
  value: Y1 为 $4K/mo，Y2 为 $5K/mo，Y3 为 $6K/mo
  unit: USD/month
  source: '[BP operations] 对法务、会计、保险和行政软件的经验假设。'
- id: A18
  name: 融资需求规模
  value: $2.1M pre-seed
  unit: USD
  source: '[BP fundingAsk + model calc] 融资规模按 12–24 个月达到 10–15 个代理机构账户加 1 个品牌工作室部署，并保留约 6 个月缓冲来设定。'
- id: A19
  name: CAC 计算口径
  value: $12.7K
  unit: USD/new customer
  source: '[Model calc] 以过去 18 个月约 $573K 的销售与营销支出，除以 M19–M36 期间 45 个新增客户计算。'
