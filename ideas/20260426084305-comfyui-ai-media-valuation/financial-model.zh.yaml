slug: ai-likeness-rights-ops
date: '2026-04-26'
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: YYYY-MM
  source: '[BP date 2026-04-26] 模型从计划发布后的次月启动。'
- id: A2
  name: M1 期初现金
  value: $2.25M
  unit: USD
  source: '[BP fundingAsk $2–4M] 假设模型启动时完成一笔 $2.10M pre-seed，并另有约 $150K 创始人 / 现有现金。'
- id: A3
  name: blended 年度 ARPU
  value: $19.8K
  unit: USD/customer/year
  source: '[BP operatingAssumptions + research market.som] 以每年 $18K 的支出锚点为基础，再加上约 10% 来自获批导出的 usage fee。'
- id: A4
  name: 月度流失率
  value: 2.0%
  unit: pct/month
  source: '[BP annual deployment model] 面向黏性较强的 B2B workflow 软件的启发式假设：合同按年签，但早期产品仍有风险。'
- id: A5
  name: 新增客户爬坡
  value: Y1 months 0,0,1,1,1,1,1,1,1,2,2,2; Y2 months 1,1,2,2,2,2,2,2,2,3,3,3; Y3 months 2,2,2,2,2,2,2,3,3,3,3,4
  unit: new customers/month
  source: '[BP milestones + GTM funnelTargets] 这个节奏对应 Y1 完成 2 个年度部署，并在第 24 个月前达到 10-15 家付费代理公司。'
- id: A6
  name: 目标毛利率
  value: 70%
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct] 模型里把已确认收入的 30% 计作 COGS。'
- id: A7
  name: 创始人 / CEO 全包薪酬
  value: $120K
  unit: USD/year loaded
  source: '[BP team] 创业公司财务启发式：$100K 现金工资，加 20% 薪资税 / 福利负担。'
- id: A8
  name: 创始工程师全包薪酬
  value: $168K
  unit: USD/year loaded
  source: '[BP team] 创业公司财务启发式：$140K 工资加 20% 负担。'
- id: A9
  name: 产品 / 合规工程师全包薪酬
  value: $162K
  unit: USD/year loaded
  source: '[BP team] 创业公司财务启发式：$135K 工资加 20% 负担。'
- id: A10
  name: 解决方案工程师全包薪酬
  value: $138K
  unit: USD/year loaded
  source: '[BP team] 创业公司财务启发式：$115K 工资加 20% 负担。'
- id: A11
  name: 客户成功 / 策略运营全包薪酬
  value: $108K
  unit: USD/year loaded
  source: '[BP team] 创业公司财务启发式：$90K 工资加 20% 负担。'
- id: A12
  name: 销售 / GTM 全包薪酬
  value: $144K
  unit: USD/year loaded
  source: '[BP GTM 创始人主导销售] 对首个商业岗位的启发式假设：$120K 基本薪酬等价，加 20% 负担；浮动激励放进销售与营销预算。'
- id: A13
  name: G&A / 运营全包薪酬
  value: $120K
  unit: USD/year loaded
  source: '[BP operations] 对首个财务 / 运营通才的启发式假设：$100K 工资加 20% 负担。'
- id: A14
  name: 招聘时间线
  value: M1 founder and founding engineer; M4 product / compliance engineer; M7 solutions engineer; M10 customer success / policy ops; M19 first sales hire; M25 second engineer; M31 G&A / ops
  unit: timeline
  source: '[BP team] 前四个岗位沿用计划，Y1 之后的岗位则按收入爬坡做保守财务假设。'
- id: A15
  name: 非薪酬销售与市场费用爬坡
  value: $2K/mo in M1–M6, $4K/mo in M7–M12, $5K/mo in M13–M18, $7K/mo in M19–M24, $8K/mo in M25–M30, $10K/mo in M31–M36
  unit: USD/month
  source: '[BP GTM channels] 对创始人外呼、节点分发、差旅和合作伙伴实验的启发式预算，不做大规模付费获客。'
- id: A16
  name: 非薪酬研发工具支出爬坡
  value: $4K/mo in Y1, $5K/mo in Y2, $6K/mo in Y3
  unit: USD/month
  source: '[BP product + operations] 对开发工具、安全、测试基础设施和 COGS 之外云环境的启发式预算。'
- id: A17
  name: 非薪酬 G&A 支出爬坡
  value: $4K/mo in Y1, $5K/mo in Y2, $6K/mo in Y3
  unit: USD/month
  source: '[BP operations] 对法务、会计、保险和管理软件的启发式预算。'
- id: A18
  name: 融资需求规模
  value: $2.1M pre-seed
  unit: USD
  source: '[BP fundingAsk + model calc] 以第 12-24 个月达到 10-15 家代理公司账户、1 个品牌工作室部署，并保留约 6 个月缓冲现金为目标来测算。'
- id: A19
  name: CAC 计算口径
  value: $12.7K
  unit: USD/new customer
  source: '[Model calc] 过去 18 个月约 $573K 的销售与市场支出，除以 M19-M36 期间 45 个新增客户。'
