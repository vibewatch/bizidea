scenarios:
  downside:
    description: 客户新增速度比 base case 慢约 20%，blended ARPU 回落到 $18.0K，且试点转付费更慢把月度流失率推高到 3%。
    y3RevenueK: 560.1
    y3EbitdaK: -927.9
    cashLowPointK: -24.0
    keyAssumptionChanges:
    - 新增客户爬坡相较 base case 下调约 20%。
    - blended 年度 ARPU 从 $19.8K 降到 $18.0K。
    - 月度流失率从 2.0% 升到 3.0%。
  base:
    description: 创始人主导的试点在第 24 个月前转成 10 到 15 家代理公司账户，定价维持在模型里的 $18K 锚点，并带来温和的 usage 扩张。
    y3RevenueK: 811.3
    y3EbitdaK: -752.1
    cashLowPointK: 246.4
    keyAssumptionChanges:
    - 新增客户爬坡按模型设定执行：Y1 / Y2 / Y3 分别为 13 / 25 / 30。
    - blended 年度 ARPU 保持 $19.8K，毛利率维持 70%。
    - 随着审计包嵌进发布 workflow，月度流失率稳定在 2.0%。
  upside:
    description: 合作伙伴分发和更快的案例转化抬高客户新增，usage fee 也把 blended 定价小幅推到计划之上。
    y3RevenueK: 1108.9
    y3EbitdaK: -543.8
    cashLowPointK: 541.5
    keyAssumptionChanges:
    - 在合作伙伴更早带来成交的情况下，新增客户爬坡提升约 15%。
    - 更高的 usage 附着率把 blended 年度 ARPU 推到约 $20.6K。
    - 审批路由和 dashboard 上线后，月度流失率改善到 1.5%。
