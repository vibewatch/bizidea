modelDiagram:
  title: 单位经济流转图
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> AnnualCustomers
      AnnualCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: base case 的收入，来自 Y3 末约 53 个活跃客户、每个客户 $19.8K 的 blended annual ARPU，对应约 $1.04M 的 exit ARR 和 $811.3K 的 Y3 已确认收入。
- checkName: 必须做对的地方
  finding: 公司必须足够快地把创始人主导的试点转成年部署，踩中 13 / 25 / 30 的新增客户路径，同时把流失率守在 2% 左右。
- checkName: 模型失效条件
  finding: 在 downside 情景下，新增放缓再叠加 3% 的月度流失率，会把现金低点压到略低于零，因此公司承受不起试点转年约效率偏弱。
- checkName: 下一轮融资证明点
  finding: 如果到第 24 个月，公司能拿下 10-15 家代理公司账户、1 个品牌工作室标杆客户，并证明客户上线单位经济跑通，下一轮融资就有了依据。
sanityChecks:
  ruleOf40: Y3 growth 98.5% + EBITDA margin -92.7% = 5.8%
  burnMultiple: Y3 burn multiple 1.9x = $751.9K net burn / $403.3K net new ARR
  revenuePerFte: $108.2K Y3 ($811.3K revenue / 7.5 average FTE vs benchmark $200–400K SaaS)
  flags:
  - base case 到 Y3 仍明显处在投入期：Rule of 40 只有 5.8%，EBITDA 仍为 -$751.9K。
  - Y3 的人均收入低于成熟 SaaS 基准，因为模型在细分市场被验证前就提前配了实施和策略运营能力。
  - 建模得到的滩头 SAM 只有约 $25.9M，所以若想有 venture-scale 上行，必须从代理公司扩到品牌工作室和相邻 workflow。
  - downside 情景下，转化放缓叠加 3% 流失率会让现金略微跌破零，说明下一轮融资前留给执行失误的空间很小。
