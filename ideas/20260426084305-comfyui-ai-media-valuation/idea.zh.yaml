differentiator: 大多数 AI 媒体合规产品都在创作之后才去检查成片，抓不到真正的风险源头——节点选择、模型版本和上游资产权利。这个产品直接长在工作流图里，能在导出前把高风险运行拦住，也能在工作发生时自动留证。Comfy 开放的节点生态还给了一个分发切口：机构把它当节点装进去就行，不用整栈替换。前期部署轻，等审批流程和审计历史积起来后，又会变得很难拔掉。
