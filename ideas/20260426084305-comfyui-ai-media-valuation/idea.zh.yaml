slug: ai-likeness-rights-ops
date: '2026-04-26'
sector: other
pitch: 面向 Comfy 驱动工作室的合规层，在 AI 媒体发布前证明同意、权利与溯源。
problem: AI 原生工作室正从简单提示词转向多步骤的 Comfy 工作流，将图像、视频、音频和矢量资产混合使用。一旦某个广告活动涉及真人肖像、授权音乐或第三方模型节点，团队就会失去一份清晰记录，无法说明是谁同意了使用、适用哪些权利，以及具体使用了哪些资产版本。如今这些证据分散在电子表格、共享云盘和 Slack 讨论串里，当客户或平台在上线前要求提供证明时，这套做法就会失效。随着合成代言人与真人视频工作流的普及，这不再是后台琐事，而会成为发布阻塞因素。
targetUser:
  primary: 使用 ComfyUI 制作本地化视频广告的 AI 原生效果营销机构中的创意运营负责人
  secondary: 在消费品牌内部运行基于 Comfy 资产流水线的生成式内容团队
  buyer: 创意运营负责人或 COO
startupThesis:
  nonObviousInsight: 让 Comfy 输出可控的同一套图结构，也首次让权利执行变得可行，因为每个模型、节点、输入和导出都可以被记录为与策略相关的谱系，而不是事后再去猜测。
  beachhead: 使用 ComfyUI 为移动应用和电商客户生成合成代言人广告的中型效果营销机构
  wedge: 一个原生于 Comfy 的节点与策略层，为每次工作流运行附加同意记录、使用权、模型谱系和导出审批，并自动生成可直接提供给客户的审计资料包
  whyNowCatalyst: Comfy 在 4 月推动已验证真人视频、多模态合作伙伴节点和云端工作流运维，使溯源与权利管理从可有可无的表格流程，变成产品内的必备要求。
  ventureScalePath: 先从 AI 广告代理机构切入，再扩展到品牌方、影视后期、创作者网络和模型供应商，成为多模态生成式媒体流水线中权利、溯源与策略执行的记录系统。
solution: 为 ComfyUI 构建一个权利与溯源控制平面。产品起步形态是一个自定义节点加工作流中间件，在渲染进入队列或导出之前，强制要求提供同意令牌、授权元数据和已批准的模型清单。它在本地与云端运行之间保存步骤级谱系，包括资产输入、节点版本、合作方模型、验证事件和最终交付物。针对每个项目，它都会生成一条审计轨迹，供法务、客户和分发平台审阅，而无需创意团队手动重建历史。随着时间推移，它会演化为策略引擎，为高风险任务路由审批、标记受限节点组合，并在组织内标准化 AI 媒体发布工作流。
goToMarketSeed:
  firstCustomer: 一家 20 至 100 人的 AI 原生效果营销机构，使用 ComfyUI 为消费类 App 广告主每周制作带有合成主持人的本地化视频广告
  buyingTrigger: 某个大客户或广告平台在批准广告活动前，要求提供人才同意、资产权利或 AI 溯源证明
  currentAlternative: 电子表格、共享云盘、人工法务审查以及临时内部检查清单
  switchingReason: 它可直接嵌入团队已在运行的 Comfy 工作流，因此团队能够在不拖慢创意迭代的情况下，获得自动化的发布证明与策略执行
  pricingHypothesis: 年度平台费，加上按每个已验证肖像或每次获批活动导出计费的用量定价
