slug: ai-likeness-rights-ops
date: '2026-04-26'
sector: other
pitch: 面向 Comfy 驱动工作室的合规层，在 AI 媒体发布前证明同意、权利与来源链路。
problem: Comfy 原生工作室正从简单提示词转向多步骤的 Comfy 工作流，把图像、视频、音频和矢量资产混在一起。一旦某个广告活动涉及真实人物肖像、授权音乐，或第三方模型节点，团队就很难清楚留存谁同意了、适用哪些权利，以及使用了哪些资产版本。如今这些证据散落在电子表格、共享盘和 Slack 线程里，客户或平台在上线前要求出示证明时，这套体系立刻失灵。随着合成代言人和真人视频工作流扩散，这个问题会从后台麻烦升级成发布阻塞。
targetUser:
  primary: 使用 ComfyUI 为消费应用和电商客户制作本地化视频广告的 AI 原生效果营销代理机构创意运营负责人
  secondary: 在消费品牌内部运行基于 Comfy 资产流水线的生成式内容团队
  buyer: 创意运营负责人或 COO
startupThesis:
  nonObviousInsight: Comfy 的图结构让输出更可控，也让权利管控第一次真正可行，因为每个模型、节点、输入和导出都能被记录成与策略相关的来源链路，而不是事后再去猜。
  beachhead: 使用 ComfyUI 为移动应用和电商客户批量生成合成代言人广告的中型效果营销代理机构
  wedge: 一层 Comfy 原生节点与策略层，把同意记录、使用权、模型来源链路和导出审批绑定到每次工作流运行，然后自动生成可直接交付客户的审计包
  whyNowCatalyst: Comfy 在 4 月把经过验证的真人视频、多模态合作方节点和云端工作流运营能力推向前台，使来源链路与权利管理从可选的表格流程变成产品内的刚需。
  ventureScalePath: 先从 AI 广告代理机构切入，再扩展到品牌、影视后期、创作者网络和模型供应商，成为多模态生成式媒体流水线里记录权利、来源链路和策略执行的系统底座。
solution: 构建一套面向 ComfyUI 的权利与来源控制平面。产品起步形态是一个自定义节点加工作流中间层，要求渲染任务在进入队列或导出前必须附带同意令牌、授权元数据和批准的模型清单。它会在本地与云端运行中保存步骤级来源链路，包括资产输入、节点版本、合作方模型、验证事件和最终交付物。针对每个广告活动，它都能产出一条法务、客户和分发平台都能审阅的审计轨迹，而不需要创意团队手动回溯历史。随着时间推移，它会演进成策略引擎：把高风险任务送审、标记受限节点组合，并在组织内标准化 AI 媒体发布流程。
goToMarketSeed:
  firstCustomer: 一家 20 到 100 人、使用 ComfyUI 每周制作本地化合成主持人视频广告的 AI 原生效果营销代理机构，服务对象为消费应用广告主
  buyingTrigger: 重要客户或广告平台在批准广告活动前，要求提供人才同意、资产权利或 AI 来源链路证明
  currentAlternative: 电子表格、共享盘、人工法务审核以及临时拼凑的内部检查清单
  switchingReason: 它直接嵌入团队已经在跑的 Comfy 工作流，因此无需放慢创意迭代，就能自动拿到发布证据并执行策略管控
  pricingHypothesis: 年度平台费，外加按已验证肖像或已批准广告活动导出次数计费
signals:
  - title: 创作者愿意为可控工作流付费，而不只是为提示词买单
    description: Comfy 的增长来自重视可检查、可复现工作流的团队，这说明工作流级合规更像一个自然的付费层，而不是外挂式附加功能。
    sourceRefs: [1, 3, 4]
  - title: Comfy 正在变成多模态创意操作系统
    description: 单个广告活动如今可以在 Comfy 中混合图像、视频、音乐和 SVG，因此权利追踪必须覆盖整个多模态资产面，而不能只盯住一种输出。
    sourceRefs: [2, 4, 5, 19]
  - title: 创意团队需要云端、队列、资产与注册表运营能力
    description: Comfy 已开放工作流提交、任务状态、队列和注册表 API，为审批门、来源链路采集和审计日志提供了实际可用的技术钩子。
    sourceRefs: [13, 14, 15, 16, 18]
  - title: 身份与验证正被拉进创意流水线
    description: 真人生成能力已经把身份验证与一致性检查放进创意流程本身，使企业级同意与来源基础设施的紧迫性明显上升。
    sourceRefs: [2, 8]
whyNow:
  - point: Comfy 的增长来自重视可检查、可复现工作流的团队，因此工作流级合规天然更适合作为付费层，而不是外挂式附加功能。
    signalRefs: [创作者愿意为可控工作流付费，而不只是为提示词买单]
    sourceRefs: [1, 3, 4]
  - point: 单个广告活动如今可以在 Comfy 里同时组合图像、视频、音乐和 SVG，因此权利追踪必须覆盖多模态资产，而不再只是某一种输出。
    signalRefs: [Comfy 正在变成多模态创意操作系统]
    sourceRefs: [2, 4, 5, 19]
  - point: Comfy 已经开放工作流提交、任务状态、队列和注册表 API，这些技术钩子正好能用来加审批门、采集来源链路并记录审计日志。
    signalRefs: [创意团队需要云端、队列、资产与注册表运营能力]
    sourceRefs: [13, 14, 15, 16, 18]
  - point: 真人生成如今已经把身份验证和一致性检查纳入创意流水线本身，因此企业级的同意与来源基础设施突然变得很紧迫。
    signalRefs: [身份与验证正被拉进创意流水线]
    sourceRefs: [2, 8]
differentiator: 大多数 AI 媒体合规产品都在创作完成后检查成品文件，这会错过真正的风险来源——节点选择、模型版本以及上游资产权利。本产品直接驻留在工作流图里，能在问题任务发出去之前就拦截，并在工作发生时自动留证。Comfy 开放的节点生态还提供了分发切口，因为代理机构可以把产品当作一个节点接入，而不是整套换栈。这样一来，初始产品部署轻，但一旦审批流程和审计历史积累起来，就会深度嵌入。
conceptDiagram:
  title: 媒体图谱内部的权利控制
  mermaid: |
    flowchart LR
      Buyer[创意运营负责人] --> Pain[无法证明 AI 资产的同意与权利]
      Pain --> Product[Comfy 原生权利与来源层]
      Product --> Outcome[审批更快且发布风险更低]
