slug: ai-likeness-rights-ops
date: '2026-04-26'
sector: other
pitch: 给用 Comfy 的工作室准备的一层合规控制面——AI 媒体上线前，把授权、权利和来源先交代清楚。
problem: AI 原生工作室已经从一次性提示词，走到多步骤的 Comfy 工作流，图像、视频、音频和矢量资产全都混在一条链上。只要一个广告项目里带上真人肖像、授权音乐，或第三方模型节点，团队就很难再讲清是谁同意了、适用哪些权利、到底用了哪个资产版本。现在这些证据还散在表格、共享盘和 Slack 线程里；客户或平台一旦要求上线前先补证明，这套做法立刻就会散架。随着合成代言人和真人视频工作流越来越常见，这件事已经不是后台小麻烦，而是会直接卡住发布的硬门槛。
targetUser:
  primary: 在 AI 原生效果营销代理公司负责创意运营的负责人，这类团队用 ComfyUI 批量生产本地化视频广告
  secondary: 在消费品牌内部跑 Comfy 资产流水线的生成式内容团队
  buyer: 创意运营负责人或 COO
startupThesis:
  nonObviousInsight: Comfy 的图结构既让产出更可控，也第一次让权利管控有机会真正落地——因为每个模型、节点、输入和导出都能被记成和策略直接相关的来源链，而不是事后再靠猜。
  beachhead: 用 ComfyUI 为移动应用和电商客户批量制作合成代言人广告的中型效果营销代理公司
  wedge: 一层 Comfy 原生节点加策略层，把授权记录、使用权、模型来源和导出审批绑到每次工作流运行上，再自动生成一份能直接递给客户的审计包
  whyNowCatalyst: Comfy 在 4 月连续推进经验证的真人视频、多模态合作方节点和云端工作流运维，让来源证明和权利管理从“表格里补一补”的可选流程，变成产品里必须解决的环节。
  ventureScalePath: 先拿下 AI 广告代理公司，再把系统扩到品牌方、影视后期、创作者网络和模型供应商，逐步成为多模态生成媒体流水线里的权利、来源和策略执行总账。
solution: 做一个面向 ComfyUI 的权利与来源控制平面。产品起步是一枚自定义节点，加一层工作流中间件：没有授权令牌、许可元数据和批准过的模型清单，渲染就进不了队列，也导不出去。系统会把本地和云端运行的每一步来源链都记下来，包括资产输入、节点版本、合作方模型、验证事件和最终交付件。每个广告项目都会生成一条审计轨迹，法务、客户和分发平台可以直接查看，不用再让创意团队事后手工补历史。往后，它会演进成策略引擎：把高风险任务自动送审、标记受限节点组合，并把各组织的 AI 媒体发布工作流标准化。
goToMarketSeed:
  firstCustomer: 一家 20 到 100 人的 AI 原生效果营销代理公司，用 ComfyUI 每周批量生产带合成主持人的本地化视频广告，服务消费类 App 广告主
  buyingTrigger: 某个大客户或广告平台在放行广告项目前，要求先给出人才授权、资产权利或 AI 来源证明
  currentAlternative: 表格、共享盘、人工法务审核，以及临时拼出来的内部清单
  switchingReason: 它直接长在团队已经在跑的 Comfy 工作流里，所以能在不拖慢创意迭代的前提下，把发布证据和策略执行自动化
  pricingHypothesis: 按年收平台费，再按每个已验证肖像或每次获批广告项目导出收取使用量费用
