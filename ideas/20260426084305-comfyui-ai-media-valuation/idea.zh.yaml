  costStructure:
    - 工程投入
    - 安全与合规
    - 客户成功
    - 合作伙伴集成
jobsToBeDone:
  - job: 当客户要求查看某支 AI 生成广告背后的证明时，帮助创意运营负责人快速产出完整的同意与来源记录，让团队无需手动回溯也能按时发布。
    currentAlternative: 在电子表格、网盘文件夹和 Slack 里手动搜集材料
    successMetric: 客户批准所需时间
  - job: 当制作人启动包含合成代言人或授权资产的工作流时，帮助团队在渲染前执行已批准的权利策略，从而避免返工和法务升级。
    currentAlternative: 最终导出前依赖内部检查清单和人工审核
    successMetric: 发布前被拦截的高风险任务占比
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 多个独立信号都指向一个结论：可控工作流、多模态生产和嵌入式身份验证正在变成核心产品能力。
  painIntensity:
    score: 4
    rationale: 对那些交付包含真人肖像和授权资产的客户项目的团队来说，这个痛点非常尖锐，因为审批失败会直接拖延收入确认。
  wedgeClarity:
    score: 5
    rationale: 一层 Comfy 原生节点与策略层，是一个狭窄但具体的切入口，第一条工作流和分发路径都很清晰。
  defensibility:
    score: 4
    rationale: 嵌入式工作流数据、持续累积的审计历史和策略模板会形成切换成本，但平台依赖仍然是风险。
  ventureScale:
    score: 4
    rationale: 滩头市场本身较窄，但这套控制平面可以扩展成多个垂直领域里 AI 媒体权利与来源链路的系统底座。
topRisks:
  - name: 平台依赖
    description: 如果 Comfy 调整 API 或推出原生合规能力，最初的切口可能会收窄。
    mitigation: 先构建在公开文档支持的云端与注册表钩子之上，掌握策略与审计数据层，并在工作流模型验证后扩展到相邻创意工具。
  - name: 预算归属不清
    description: 创意运营、法务和制作负责人都能感受到痛点，但未必有人明确拥有预算。
    mitigation: 围绕广告活动审批延迟和客户留存来销售，把产品包装成发布加速器而不是泛化的合规软件，并优先落地在一个人身兼多职的代理机构。
  - name: 虚假的合规感
    description: 客户可能误以为产品能在所有司法辖区和复杂权利边界情况下替代法务判断。
    mitigation: 把系统定位为工作流管控与证据基础设施，提供可配置且经过律师审阅的策略模板，并为高风险场景接入人工审批步骤。
