jobsToBeDone:
- job: 当客户追问一条 AI 广告背后的证据时，帮创意运营负责人快速拿出完整的授权和来源记录，让项目按时上线，不用再人工回补历史。
  currentAlternative: 从表格、网盘文件夹和 Slack 里手工收集材料
  successMetric: 客户批准耗时
- job: 当制作人启动一个用了合成代言人或授权资产的 workflow 时，帮团队在渲染前先把权利策略守住，避免返工和法务升级。
  currentAlternative: 最终导出前靠内部清单和人工审核
  successMetric: 在发布前拦下高风险任务的比例
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 多个独立信号都指向同一件事：可控 workflow、多模态生产和内嵌式身份验证，正在变成产品的核心能力。
  painIntensity:
    score: 4
    rationale: 对那些用真人肖像和授权资产给客户出活的团队，这个痛点很尖锐，因为审批失败会直接拖延收入。
  wedgeClarity:
    score: 5
    rationale: Comfy 原生节点加策略层，是一个够窄、够具体的入口，首个 workflow 和分发路径都很清楚。
  defensibility:
    score: 4
    rationale: 嵌在 workflow 里的数据、不断累积的审计历史和策略模板会形成切换成本，但平台依赖仍是风险。
  ventureScale:
    score: 4
    rationale: 滩头市场不大，但这层控制平面有机会扩成多行业 AI 媒体权利与来源系统的总账。
topRisks:
- name: 平台依赖
  description: 如果 Comfy 改 API，或者自己做出原生合规模块，最初的切口就会变窄。
  mitigation: 先建立在公开文档里的云和 registry 接口上，把策略与审计数据层掌握在自己手里；一旦 workflow 模型跑通，再扩到相邻创意工具。
- name: 预算归属不清
  description: 创意运营、法务和制作负责人都觉得疼，但不一定有人明确拿预算。
  mitigation: 把产品卖点锚在 campaign 审批延迟和客户留存上，把它包装成“加速发布”，而不是泛泛的合规软件；优先切进一人身兼多职的代理公司。
- name: 合规错觉
  description: 客户可能会误以为这套产品能替代所有法域和边界情形下的法务判断。
  mitigation: 把系统定位成 workflow 执行和证据基础设施，提供可配置的策略模板并引入律师复核；高风险场景必须保留人工审批。
