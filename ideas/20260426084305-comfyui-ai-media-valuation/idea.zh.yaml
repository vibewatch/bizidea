    - AI 原生效果营销代理机构
    - 品牌内部生成式 AI 工作室
    - 使用 ComfyUI 的后期制作团队
  valuePropositions:
    - 工作流级的同意与权利管控
    - 可直接交付客户的来源审计轨迹
    - 导出前的策略门控
  channels:
