jobsToBeDone:
- job: 当客户要求提供 AI 生成广告背后的证明时，帮助创意运营负责人生成完整的同意与溯源记录，使他们无需手动重建历史也能按时发布。
  currentAlternative: 在电子表格、网盘文件夹和 Slack 中手动收集文档
  successMetric: 获得客户批准所需时间
- job: 当制作人员启动一个使用合成代言人或授权资产的工作流时，帮助团队在渲染前执行已批准的权利策略，从而避免返工和法务升级。
  currentAlternative: 最终导出前的内部检查清单和人工审核
  successMetric: 在发布前被拦截的高风险任务占比
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 多条独立信号表明，可控工作流、多模态生产和嵌入式身份验证正在成为核心产品行为。
  painIntensity:
    score: 4
    rationale: 对于交付包含真人肖像和授权资产客户项目的团队，这种痛点非常强烈，因为审批失败会直接拖延收入实现。
  wedgeClarity:
    score: 5
    rationale: 原生于 Comfy 的节点与策略层是一个聚焦、具体的切入口，拥有清晰的首个工作流和分发路径。
  defensibility:
    score: 4
    rationale: 嵌入式工作流数据、累积的审计历史和策略模板会形成切换成本，但平台依赖仍是风险。
  ventureScale:
    score: 4
    rationale: 虽然滩头市场较窄，但该控制平面可以扩展为覆盖多个垂直领域的 AI 媒体权利与溯源记录系统。
topRisks:
- name: 平台依赖
  description: 如果 Comfy 更改 API 或推出原生合规功能，最初的切入口可能会收窄。
  mitigation: 先基于已文档化的云端和注册表钩子构建，掌握策略与审计数据层，并在工作流模型被验证后扩展到相邻创意工具。
- name: 预算归属不清
  description: 创意运营、法务和制作负责人都可能感受到痛点，但没有人明确拥有预算。
  mitigation: 围绕广告活动审批延迟和客户留存来销售，把产品包装为发布加速工具而非泛化合规软件，并优先切入由单一负责人身兼多职的代理机构。
- name: 虚假的合规安全感
  description: 客户可能会期待产品在所有司法辖区和权利边缘案例中取代法律判断。
  mitigation: 将系统定位为工作流执行与证据基础设施，提供可配置并经法律顾问审阅的策略模板，并为高风险场景加入人工审批步骤。
