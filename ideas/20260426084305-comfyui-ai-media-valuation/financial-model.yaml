- id: A17
  name: Non-payroll G&A spend ramp
  value: $4K/mo in Y1, $5K/mo in Y2, $6K/mo in Y3
  unit: USD/month
  source: '[BP operations] heuristic for legal, accounting, insurance, and admin software.'
