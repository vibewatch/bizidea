  name: Funding ask sizing
  value: $2.1M pre-seed
  unit: USD
  source: '[BP fundingAsk + model calc] sized to reach the 12–24 month milestone of 10–15 agency accounts plus one brand-studio deployment with roughly 6 months of buffer.'
