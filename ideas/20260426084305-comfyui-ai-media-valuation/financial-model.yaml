scenarios:
  downside:
    description: Customer adds run about 20% slower, blended ARPU settles at $18.0K, and churn rises to 3% as pilots take longer to convert.
    y3RevenueK: 560.1
    y3EbitdaK: -927.9
    cashLowPointK: -24.0
    keyAssumptionChanges:
    - Gross new-customer ramp reduced by roughly 20% versus base.
    - Blended annual ARPU falls from $19.8K to $18.0K.
    - Monthly churn rises from 2.0% to 3.0%.
  base:
    description: Founder-led pilots convert into 10 to 15 agency accounts by month 24, with blended pricing at the modeled $18K anchor plus modest usage expansion.
    y3RevenueK: 811.3
    y3EbitdaK: -752.1
    cashLowPointK: 246.4
    keyAssumptionChanges:
    - Gross new-customer ramp follows the modeled 13 / 25 / 30 annual adds across Y1 / Y2 / Y3.
    - Blended annual ARPU stays at $19.8K with 70% gross margin.
    - Monthly churn holds at 2.0% as audit packets become embedded in release workflows.
  upside:
    description: Partner distribution and faster case-study conversion lift customer adds, while usage fees push blended pricing modestly above plan.
    y3RevenueK: 1108.9
    y3EbitdaK: -543.8
    cashLowPointK: 541.5
    keyAssumptionChanges:
    - Gross new-customer ramp increases by roughly 15% with earlier partner-assisted wins.
    - Blended annual ARPU increases to about $20.6K from higher usage attach.
    - Monthly churn improves to 1.5% once approval routing and dashboards land.
