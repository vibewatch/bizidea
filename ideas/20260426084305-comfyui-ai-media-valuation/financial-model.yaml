modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> AnnualCustomers
      AnnualCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base case revenue comes from reaching about 53 active customers by Y3 exit at a $19.8K blended annual ARPU, which yields roughly $1.04M exit ARR and $811.3K recognized Y3 revenue.
- checkName: Must go right
  finding: The model needs founder-led pilots to convert into annual deployments fast enough to hit the 13 / 25 / 30 gross-add ramp while keeping churn near 2%.
- checkName: Model breaks if
  finding: In the downside case, slower adds plus 3% churn push the cash low point slightly negative, so the company cannot afford a weak pilot-to-annual conversion rate.
- checkName: Next-round proof
  finding: The next financing is justified if the company reaches 10–15 agency accounts, one brand-studio logo, and referenceable onboarding economics by month 24.
sanityChecks:
  ruleOf40: Y3 growth 98.5% + EBITDA margin -92.7% = 5.8%
  burnMultiple: Y3 burn multiple 1.9x = $751.9K net burn / $403.3K net new ARR
  revenuePerFte: $108.2K Y3 ($811.3K revenue / 7.5 average FTE vs benchmark $200–400K SaaS)
  flags:
  - 'The base case is still deeply investment mode in Y3: Rule of 40 is only 5.8% and EBITDA remains negative at -$751.9K.'
  - Y3 revenue per FTE is below mature SaaS benchmarks because the model carries implementation and policy-ops capacity before the segment is proven.
  - The modeled beachhead SAM is only about $25.9M, so expansion beyond agencies into brand studios and adjacent workflows is required for venture-scale upside.
  - Downside assumptions of slower conversions and 3% churn push cash slightly below zero, leaving limited room for execution misses before the next round.
