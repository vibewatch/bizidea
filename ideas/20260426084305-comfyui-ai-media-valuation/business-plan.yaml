slug: ai-likeness-rights-ops
date: '2026-04-26'
executiveSummary: >-
  AI-native performance marketing agencies are starting to run client-facing synthetic spokesperson and mixed-media ad workflows in ComfyUI, but their approval evidence still lives in spreadsheets, shared drives, and Slack. The first product should be a Comfy-native rights and provenance layer that blocks risky renders before export, captures workflow lineage automatically, and generates a client-ready audit packet. The buying trigger is concrete: a major client, brand legal team, or distribution platform asks for proof of consent, asset rights, or synthetic-content provenance before a campaign can launch. Research supports the technical timing because Comfy now exposes workflow, queue, asset, and registry hooks, and product launches show identity verification and multimodal asset generation moving into the workflow itself. The near-term market is real but modest, with modeled TAM, SAM, and year-3 SOM of about $450M, $25.9M, and $1.0M respectively, so the company must use the agency wedge to prove a broader control-plane opportunity rather than pretend the beachhead alone is venture scale. The plan therefore sequences narrowly: land in synthetic-video agency workflows, prove approval-cycle compression and paid conversion, then expand into in-house brand studios, post-production, and eventually adjacent creation tools. The biggest disconfirming risk is that agencies still treat this as occasional manual ops work instead of a release blocker with a clear budget owner. Market sizing and pricing are modeled estimates from the research, so the first 6 months must validate willingness to pay, budget ownership, and whether buyers prefer pre-render gates over post-export review.
problem:
  - Agencies using ComfyUI for synthetic spokesperson and multimodal ad production cannot quickly prove who consented, what rights apply, and which assets, models, and node versions were used in a shipped campaign.
  - Current alternatives such as spreadsheets, shared drives, Airtable-style ops stacks, and manual legal review are slow enough to become release blockers when a client or platform demands evidence before launch.
solution:
  - Ship a Comfy custom node plus workflow middleware that requires consent tokens, license metadata, and approved-model policies before a render enters the queue or export path.
  - Store step-level lineage across local and cloud runs and auto-generate an audit packet that legal teams, clients, and platforms can review without reconstructing history manually.
whyWeWin:
  - The workflow graph is the source of risk, so a Comfy-native product can block bad runs earlier and capture evidence more accurately than post-export inspection tools.
  - Adoption can start as a lightweight node inside an existing Comfy stack rather than a rip-and-replace platform migration, which matches how agencies already work.
  - Accumulated lineage, approval history, and reusable policy templates can become a durable compliance graph that is hard to recreate retroactively.
strategicChoices:
  beachhead: Mid-sized AI-native performance marketing agencies using ComfyUI to ship weekly localized video ads with synthetic presenters and licensed media for consumer app and ecommerce clients.
  wedgeRationale: This slice has the clearest release blocker, the shortest path to a measurable proof point, and a buyer who feels both throughput pressure and client-approval pain; broader "AI media compliance" positioning would dilute urgency and lengthen sales cycles.
  sequencingRationale: Start with a workflow gate and audit packet for one high-risk workflow because the buying trigger is campaign approval, not enterprise transformation; once the product proves it shortens approval cycles without slowing creative throughput, add policy routing, reusable templates, and broader workspace controls before expanding into adjacent customer segments or tools.
  notYet:
    - Generic DAM replacement for all creative assets
    - Standalone post-export deepfake detection product
    - Consumer creator workflows
    - Multi-tool orchestration beyond Comfy before the beachhead converts repeatably
    - Automated legal advice across jurisdictions
market:
  tam: $450.0M modeled TAM based on about 30,000 estimated commercial Comfy teams and an adjacent workflow-governance budget of roughly $15k per team per year.
  sam: $25.9M modeled SAM for agency and growth-creative teams that are Comfy-native and synthetic-video-heavy enough to feel the pain acutely.
  som: $1.0M modeled year-3 SOM assuming about 58 beachhead teams at roughly $18k annual spend.
  segments:
    - AI-native performance marketing agencies using ComfyUI for synthetic spokesperson ads
    - In-house generative content teams at consumer brands running Comfy-based asset pipelines
  buyingProcess: The initial buyer is typically the head of creative operations, COO, or production leader, but legal and client-service stakeholders influence the deal because approval evidence must satisfy external reviewers. Expect founder-led sales tied to a live workflow pilot, followed by a paid deployment if the product reduces approval packet prep time and blocks risky jobs without disrupting output.
product:
  mvp: >-
    The MVP is a Comfy-native node and middleware layer for synthetic spokesperson video campaigns. It must capture consent token, asset-license metadata, model and node lineage, and export approvals at queue time, then produce a client-ready audit packet for each campaign.
  sixMonth: >-
    Harden the capture layer for cloud and local runs, ship approval templates for synthetic presenters plus licensed music, add immutable audit logs, and complete 2 to 3 design-partner deployments with measurable approval-cycle savings.
  twelveMonth: >-
    Add role-based approval routing, policy exceptions, C2PA-compatible provenance export, workspace-level dashboards, and self-serve policy templates for the most common agency release workflows.
  twentyFourMonth: >-
    Expand from agency video workflows into in-house brand studios and selected adjacent media workflows, while adding enterprise controls such as multi-workspace governance, partner-model allowlists, and deeper asset-system integrations.
  keyBets:
    - Buyers will trust a pre-render workflow gate more than a post-export reviewer because it reduces rework instead of documenting it after the fact.
    - Comfy's workflow, queue, asset, and registry hooks are stable enough to support reliable lineage capture without excessive custom maintenance.
    - A client-ready audit packet will be valuable enough to unlock budget faster than a generic compliance dashboard.
    - A narrow policy template set for synthetic spokesperson ads will generalize into repeatable approval workflows for adjacent media types later.
gtm:
  wedge: Audit-ready release gate for Comfy-based synthetic spokesperson ad workflows sold to agency creative-ops leaders after a client approval scare or platform disclosure request.
  channels:
    - Founder-led outbound to heads of creative operations, COOs, and AI production leads at 20 to 100 person agencies
    - Comfy custom node and registry distribution for product discovery and lightweight adoption
    - Workflow consultants, node publishers, and commercially safe model vendors as integration and referral partners
  funnelTargets: lead→qualified discovery 25%+, qualified discovery→paid pilot 40%+, paid pilot→annual deployment 60%+, annual deployment→referenceable case study 50%+
  pricing: Annual platform fee plus usage-based pricing per verified likeness or approved campaign export, because buyers feel the pain at the workflow level but value scales with approval volume; start with paid pilots that convert into annual contracts if approval prep time drops materially.
businessModel:
  revenueStreams:
    - Annual SaaS subscription for workflow rights and provenance control
    - Usage fees per verified likeness or approved export
    - Premium modules for enterprise approval routing, policy templates, and integrations
  unitOfValue: Approved campaign exports and verified likeness workflows per customer workspace
  targetGrossMarginPct: 70
  expansionLevers:
    - More workspaces, campaigns, and approvals within each agency account
    - Higher-value policy modules for enterprise routing, audit retention, and partner integrations
    - Expansion from agencies into in-house brand studios and later adjacent creation tools
strategyMap:
  northStarMetric: Number of approved campaign exports processed through policy gates without manual evidence reconstruction
  inputMetrics:
    - Percentage of target workflows instrumented by the node
    - Median reduction in approval packet preparation time
    - Percentage of risky jobs blocked before export
    - Paid pilot to annual deployment conversion rate
    - Number of reusable policy templates adopted per customer
  moatsToBuild:
    - Workflow-level lineage graph across assets, nodes, models, approvals, and exports
    - Customer-specific policy templates mapped to common release workflows
    - Audit history and proof artifacts that become embedded in client review processes
    - Ecosystem distribution through Comfy nodes and partner-model integrations
  killCriteria:
    - Fewer than 3 of the first 15 ICP interviews produce a recent example of a delayed launch or client escalation caused by missing consent, rights, or provenance evidence
    - Fewer than 2 of the first 5 paid pilots convert to annual deployments at or above the modeled $18k budget anchor
    - Workflow gating adds more than 10% end-to-end latency or requires manual bypass on more than 20% of monitored jobs
    - No adjacent expansion path increases the modeled addressable market materially beyond the initial agency wedge by month 12
  mermaid: |
    flowchart LR
      Wedge[Comfy synthetic spokesperson ad workflows] --> MVP[Queue-time rights gate and audit packet]
      MVP --> Proof[Faster approvals and blocked risky exports]
      Proof --> Expansion[Agency standardization then brand-studio expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong workflow wedge and timing, but investability depends on proving budget ownership and a credible expansion path beyond a modest beachhead.
    whyBelieve: Comfy's production APIs, multimodal partner nodes, and real-human verification launches create a credible opening for an embedded rights-control layer that operates inside existing workflows.
    whyDoubt: The modeled beachhead is narrow enough that manual review or closed platforms may remain good enough unless customer pain is already a recurring release blocker.
    nextDiligence: Secure 3 paid agency pilots and show that at least 2 convert into annual deployments because audit packets and policy gates reduce approval-cycle time materially.
  firstCustomer:
    title: Head of Creative Operations at an AI-native performance marketing agency
    profile: 20 to 100 person agency using ComfyUI to produce frequent localized video ads with synthetic presenters and licensed media for consumer app or ecommerce clients.
    trigger: A major client, brand legal team, or ad platform asks for proof of talent consent, asset rights, or AI provenance before approving a campaign.
    buyer: Head of Creative Operations or COO
    initialContract: 90-day paid pilot in the low five figures that converts to roughly $18k to $40k annual platform spend plus usage if approval prep time falls and the workflow gate is adopted in production.
  mustBeTrue:
    - At least one-third of target agencies have faced a client, legal, or platform evidence request in the last 6 months.
    - A queue-time node can capture the required consent, license, and lineage data with less than 10% workflow slowdown.
    - Buyers value pre-render gating plus audit packets more than a standalone post-export verification tool.
    - Creative operations leaders can sponsor a roughly $18k plus annual purchase without waiting for a separate legal-tech budget.
    - The company can expand from the agency wedge into adjacent teams or tools large enough to justify venture-scale follow-on funding.
  diligenceQuestions:
    - How often did the last 10 target agencies lose time or revenue because approval evidence was incomplete?
    - What exact artifact closes the deal fastest: pre-render policy gates, audit packets, or reusable consent and license registries?
    - Who signs the contract in practice when a campaign is blocked: creative ops, COO, legal, or client service?
    - How sticky are Comfy APIs and node hooks for lineage capture across local and cloud deployments?
    - Which closed platforms already solve enough of this workflow that the customer could leave Comfy instead of buying a control layer?
  riskHeatmap:
    - risk: Manual workflows remain good enough for most agencies
      likelihood: High
      impact: High
      leadingIndicator: Fewer than 30% of interviewed ICPs can show a recent approval delay, client escalation, or manual packet they would pay to avoid.
      mitigation: Sell only into workflows with recent approval pain, anchor the product on release acceleration, and avoid generic compliance positioning.
    - risk: Budget owner ambiguity slows or kills deals
      likelihood: High
      impact: High
      leadingIndicator: Discovery calls end with cross-functional interest but no single owner willing to fund a paid pilot within one budget cycle.
      mitigation: Package the offer as campaign release insurance and throughput improvement, start with agencies where one operator owns ops and approvals, and require paid pilots.
    - risk: Platform dependence on Comfy narrows the wedge
      likelihood: Medium
      impact: High
      leadingIndicator: Comfy changes core APIs, limits node access, or ships native approval and provenance features that overlap the MVP.
      mitigation: Build on documented hooks first, own the policy and audit layer above the platform, and plan expansion into adjacent workflow tools after product proof.
    - risk: Product creates a false sense of legal compliance
      likelihood: Medium
      impact: High
      leadingIndicator: Prospects ask whether the software replaces legal review or guarantees jurisdiction-specific compliance.
      mitigation: Position the product as evidence and workflow enforcement infrastructure, not legal advice, and require configurable policies plus human approval steps for high-risk cases.
    - risk: Closed platforms absorb the synthetic-video workflow
      likelihood: Medium
      impact: Medium
      leadingIndicator: Target agencies standardize new work on governed platforms such as Synthesia or Adobe instead of keeping high-value workflows in Comfy.
      mitigation: Focus on customers that need open, mixed-model graphs today and build expansion options for cross-tool audit and policy coverage later.
operatingAssumptions:
  - assumption: The first paying buyer will be creative operations rather than legal because the immediate pain is launch delay and client approval friction.
    basis: research.yaml
    validationTest: Close at least 3 paid pilots where the commercial sponsor sits in creative ops or production and can authorize spend inside one quarter.
    decisionImpact: If false, reposition for legal and procurement sponsorship, extend sales-cycle assumptions, and narrow the MVP to evidence workflows that legal explicitly demands.
  - assumption: Customers will tolerate an in-workflow gate if it adds less than 10% latency and blocks visibly risky jobs.
    basis: idea.yaml
    validationTest: Instrument 2 live design-partner workflows and measure latency, bypass frequency, and blocked-job value over at least 100 production runs.
    decisionImpact: If false, move the initial product toward post-run audit generation and approval routing instead of queue-time enforcement.
  - assumption: The modeled $18k annual spend anchor is achievable for agency accounts once the product proves release acceleration.
    basis: research.yaml
    validationTest: Test willingness to pay in pilot close plans and convert at least 2 agencies to annual contracts at or above the modeled budget anchor.
    decisionImpact: If false, adopt a lighter self-serve or usage-led pricing model and re-evaluate whether the segment can support venture returns.
  - assumption: Comfy's documented workflow, queue, asset, and registry hooks are sufficient to build reliable lineage capture across local and cloud use cases.
    basis: research.yaml
    validationTest: Complete end-to-end lineage capture for one local workflow and one cloud/API workflow without unsupported platform workarounds.
    decisionImpact: If false, increase engineering scope materially, reduce roadmap ambition, or broaden to a more platform-agnostic audit layer.
  - assumption: The beachhead can expand into a larger control-plane business once agency proof points exist.
    basis: operator judgment
    validationTest: By month 12, win at least 2 serious expansion conversations with brand studios, post-production teams, or adjacent toolchain partners that map to a larger follow-on market.
    decisionImpact: If false, treat the company as a niche workflow product, reduce funding ambition, and optimize for profitability rather than venture scaling.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 agency creative-ops leaders and collect recent approval packets, escalation emails, or launch-delay examples.
    hypothesis: Rights and provenance evidence is already a repeat release blocker, not just a future concern.
    successMetric: At least 5 interviewees share a recent concrete approval incident and at least 3 agree to pilot design sessions.
    owner: Founder
  - horizon: 0–90 days
    experiment: Build a prototype Comfy node that requires consent token, asset-license fields, and approved-model metadata before queue submission.
    hypothesis: Queue-time gating can fit naturally inside existing agency workflows.
    successMetric: Two design partners install the node and complete at least 20 test runs each with no critical workflow breakage.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run 2 to 3 paid pilots on synthetic spokesperson ad campaigns and measure approval packet preparation time before and after deployment.
    hypothesis: Automated lineage capture and audit packets reduce approval prep time enough to justify paid conversion.
    successMetric: Median approval packet prep time falls by at least 50% and at least 2 pilots commit to annual deployment terms.
    owner: Founder
  - horizon: 90–180 days
    experiment: Launch a first audit packet template with C2PA-compatible provenance export and a human approval step for exceptions.
    hypothesis: Buyers need portable proof artifacts, not just an internal dashboard.
    successMetric: At least 80% of pilot stakeholders say the audit packet would satisfy a client or legal reviewer with minor edits.
    owner: Product lead
  - horizon: 180–270 days
    experiment: Test one referral or co-distribution partnership with a workflow consultant, node publisher, or commercially safe model vendor.
    hypothesis: Ecosystem partners can surface qualified buyers faster than pure cold outbound.
    successMetric: One partner channel produces at least 5 qualified meetings and 1 paid pilot inside a quarter.
    owner: Founder
  - horizon: 180–360 days
    experiment: Expand one successful customer or new pilot into an in-house brand studio workflow using the same policy engine.
    hypothesis: The product can generalize beyond agencies without a full rewrite.
    successMetric: One non-agency design partner adopts the core workflow gate and audit packet with less than 25% additional implementation effort.
    owner: Solutions engineer
operations:
  - Versioned policy-template library with documented owner, review cadence, and escalation path for high-risk edge cases
  - Immutable workflow event and audit-log pipeline tied to asset hashes, model versions, and approval actions
  - Customer onboarding playbook that maps each client release workflow before the product is turned on in production
  - Node and dependency security review process for open ecosystem integrations
  - Monthly monitoring of platform disclosure rules and digital-replica policy changes that affect templates
team:
  - role: Founder / CEO
    startTiming: Month 0
    rationale: Own founder-led sales, design-partner discovery, workflow mapping, and early packaging because buyer truth is the primary company risk.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the Comfy node, lineage capture layer, and export-gating infrastructure that the wedge depends on.
  - role: Product and compliance engineer
    startTiming: Month 3
    rationale: Translate customer approval workflows into configurable policies, audit artifacts, and provenance outputs rather than one-off code.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Shorten pilot deployment time, support agency workflow mapping, and convert bespoke setup work into reusable implementation patterns.
  - role: Customer success and policy ops
    startTiming: Month 9
    rationale: Maintain policy templates, training, and renewal support once multiple production accounts are live.
milestones:
  - horizon: 0–12 months
    items:
      - Complete 15 ICP interviews and sign 3 paid design-partner pilots in the beachhead segment
      - Ship the MVP node, lineage capture, and client-ready audit packet for synthetic spokesperson video workflows
      - Prove less than 10% workflow overhead and at least 50% reduction in approval packet preparation time in production pilots
      - Convert at least 2 pilots into annual deployments and publish 1 referenceable case study
  - horizon: 12–24 months
    items:
      - Add approval routing, policy exceptions, C2PA-compatible export, and workspace dashboards
      - Reach 10 to 15 paying agency accounts with repeatable onboarding and at least 1 ecosystem distribution partner
      - Land the first in-house brand studio deployment using the same policy engine
  - horizon: 24–36 months
    items:
      - Expand into adjacent media workflows and selected non-Comfy integrations without losing the control-plane positioning
      - Introduce enterprise governance features such as multi-workspace controls, retention policies, and partner-model allowlists
      - Demonstrate net retention through campaign-volume expansion and workspace growth inside early customers
risks:
  - risk: Manual review and existing ops tools remain good enough for most agencies
    likelihood: High
    impact: High
    mitigation: Focus only on accounts with recent client approval pain and require measurable approval-cycle ROI in pilots.
  - risk: Budget owner ambiguity slows sales and compresses pricing
    likelihood: High
    impact: High
    mitigation: Sell release acceleration and client-retention outcomes to creative-ops leaders and enforce paid pilot qualification.
  - risk: Comfy platform changes or native features reduce differentiation
    likelihood: Medium
    impact: High
    mitigation: Build on documented APIs, keep the policy and audit layer platform-owned, and prepare expansion paths beyond Comfy after proof.
  - risk: Customers overestimate the product as legal advice or full compliance coverage
    likelihood: Medium
    impact: High
    mitigation: Keep policies configurable, require human approvals for exceptions, and position the software as evidence infrastructure rather than legal judgment.
  - risk: Closed creation platforms absorb enough of the use case to shrink the open-workflow opportunity
    likelihood: Medium
    impact: Medium
    mitigation: Target customers that need open, mixed-model workflows today and build cross-tool expansion only after the beachhead is proven.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds a small founding team, 3 to 5 paid pilots, hardened Comfy integrations, audit and policy infrastructure, early partner distribution tests, and enough customer proof to decide whether this is a venture-scale control plane or a narrower workflow software business.
