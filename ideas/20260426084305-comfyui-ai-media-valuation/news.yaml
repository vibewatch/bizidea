  - 5
  - 6
  - 8
- title: Identity and verification are moving into the creative pipeline
  summary: Seedance real-human workflows add liveness checks and identity consistency, hinting that provenance and consent
    are becoming table stakes.
  sourceRefs:
  - 2
  - 7
  - 8
- title: Open ecosystems are becoming a hiring and monetization signal
  summary: The funding post and registry docs describe ComfyUI artist jobs, custom-node publishing, and a large contributor
    graph, suggesting tooling and marketplace infrastructure.
  sourceRefs:
  - 1
  - 10
  - 16
  - 17
  - 18
