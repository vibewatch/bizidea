  validationPlan:
  - priority: high
    question: Do creative-ops leaders treat consent/provenance failures as a release blocker today, or only as occasional legal hygiene?
    evidenceToGather: 10+ interviews with agency COOs / creative-ops leads; collect recent client approval requests, SLA misses, or manual packet examples.
  - priority: high
    question: Will teams install a node or middleware gate inside live Comfy workflows, or do they prefer a post-export review tool?
    evidenceToGather: Design-partner pilots with one synthetic-video workflow and one mixed-asset workflow; measure blocked jobs, added latency, and export approval time.
  - priority: medium
    question: 'Which artifact matters most to buyers: consent tokens, model allowlists, asset-license lineage, or final audit packets?'
    evidenceToGather: Rank-order survey with agencies and in-house brand studios; compare willingness to pay by feature bundle against current spend on ops software.
