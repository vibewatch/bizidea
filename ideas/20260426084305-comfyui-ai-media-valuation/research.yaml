openQuestions:
- How often do agency buyers face explicit client or platform requests for consent / provenance evidence today versus simply fearing future requirements?
- 'Which artifact is most valuable in a buying decision: pre-render policy gates, post-run audit packets, or reusable consent / license registries?'
- Can the startup win budget from creative operations directly, or will legal / procurement need to sponsor the purchase for deals to close?
- How portable can the control plane become beyond Comfy before incumbent platform vendors copy the obvious workflow hooks?
