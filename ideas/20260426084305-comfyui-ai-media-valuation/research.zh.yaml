  - incumbentClass: Closed synthetic-video vendors
    point: 当客户将流程标准化到其受治理头像工作流时，Synthesia 会胜出；但当代理机构需要多模型、多资产、混合开源与合作节点的流水线，且这些流程已经运行在 ComfyUI 中时，它并不会天然胜出。
    sourceRefs:
