reportMemo:
  executiveTakeaways:
  - Comfy 已不只是本地图片工具了：它现在宣称有 400 万用户、6 万+ 社区节点、15 万+ 日下载，并在产品层把云、注册表、资产和 工作流 API 做成生产级能力，估值也来到 $500M。 [1][6][8][9][10][11]
  - 4 月的一连串发布，说明 Comfy 正在成为多模态创作 OS：真人视频、GPT 图像编辑、SVG 和商用授权音乐都在往里长，团队在发布前要管的权利边界也随之变宽。 [2][3][4][5][7]
  - 滩头痛点很锐，但并不宽：一旦代理公司开始给付费客户交付合成代言人广告或混合媒体 广告项目，授权证明、许可来源和导出审批就会直接挡住发布。 [2][12][26][27][28]
  - 标准正在成熟——C2PA 和 CAI 已把防篡改 来源证明 工具的框架立起来了——但它们并不解决合同级授权、批准过的模型策略，或开放 Comfy 流水线 里的 工作流 级关口。 [15][16][17][18]
  - 在位厂商各自只覆盖相邻切片：Adobe 拿住创作者分发，Bria 卖商用安全生成，Synthesia 管封闭 avatar 视频，Truepic / GetReal / Reality Defender 做事后再鉴真或检测。没有谁明显是为开放、多模态、Comfy 原生的 rights ops 优化出来的。 [19][20][21][22][23][24][25]
  - 短期市场存在，但不宽：如果公司只赢下几十家、而不是几百家中型代理公司账户，模型给出的第 3 年 SOM 大约 $1.0M 是站得住的，因此上行取决于能否在滩头之外继续扩张。 [1][12][21][29]
  marketDefinition: 相关市场，是面向商业生成媒体团队的一层 工作流 级权利、授权、来源和发布运营软件；这些团队使用 ComfyUI 之类的节点式 流水线 来生产面向客户的资产。采购方是商业创意组织，不是消费者创作者。首发地理范围应放在北美和欧洲，因为这些市场对客户审批、平台披露以及数字分身的审查最严。相邻市场包括 DAM、内容真实性标准、深度伪造 检测，以及企业级安全生成媒体平台。明确排除的是通用 DAM、泛欺诈检测、消费者编辑 App，以及靠自有全栈绕开开放 工作流 问题的封闭视频生成器。 [6][12][15][16][19][21][23][25][26][27]
  customerAndBuyer: 最合适的 ICP，是一家 20–100 人、用 ComfyUI 高频生产本地化视频广告的 AI 原生效果营销代理公司；它会用到合成主持人或授权资产。经济采购方通常是创意运营负责人、COO 或掌握产能与客户审批的制作负责人；真正用系统的人，则是制片、创意技术人员、剪辑，以及法务 / 运营审核方。他们最紧的活有三件：别让不合规的渲染流出去、能迅速还原资产 / 模型来源链、还能在不放慢迭代的前提下拿出可给客户看的证据。现在的替代方案是表格、Drive 文件夹、Slack 线程、类似 Airtable 的运营栈，以及人工法务审核。采购摩擦主要来自法务对准确性的要求、运营与法务之间模糊的预算归口，以及产品必须接进既有 工作流 工具，而不是取而代之。 [2][8][9][10][12][13][31][32]
  buyingTriggers:
  - point: 某个大客户、品牌方法务，或平台审核流程开始追问某个 广告项目 是否用了修改过或合成的内容，并要求提交披露或审批证据。
    sourceRefs:
    - 28
    - 26
    - 27
  - point: 团队开始批量做真人视频或多参考视频，于是必须明确证明真人肖像的使用已完成验证，且合同上确实允许。
    sourceRefs:
    - 2
    - 26
    - 27
  - point: 工作流 量级从本地试验走向云端 / API 执行，队列可见性、资产元数据、节点治理和能重复审批因此成为日常运营需求。
    sourceRefs:
    - 8
    - 9
    - 10
    - 11
