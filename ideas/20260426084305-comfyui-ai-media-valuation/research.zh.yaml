  regulatoryLandscape: 即便规则体系仍然碎片化，法律方向已经很明确。加州 AB 2602 规定，对于新表演，如果数字替身条款仅笼统表述、且未在适当代理下具体协商，则不可执行；AB 1836 则在广告和商品场景下扩大了对未经授权使用已故名人形象的责任。平台层面的披露规范也在收紧：YouTube 明确表示，当观众可能被误导时，创作者应披露经过修改或合成的内容。在完整的联邦肖像制度尚未建立之前，这种环境就已经抬高了薄弱记录的代价。[26][27][28]
  technologyLandscape: Comfy 现已开放权利控制层所需的基础能力：工作流提交、任务状态、队列检查、资产上传与元数据、用户数据存储，以及节点注册表元数据。与此同时，C2PA 和 CAI 正在标准化基于密码学签名的溯源记录与开源实现工具。技术机会在于将这两个世界连接起来——Comfy 的图级遥测能力加上可移植的溯源标准——而无需团队放弃开放工作流。[6][8][9][10][11][15][16][17][18]
  distributionChannels:
  - point: 通过注册表分发的自定义节点是摩擦最低的切入点，因为代理机构可以在其现有运行的图中直接采用一个合规节点。
