market:
  tam:
    value: $450.0M
    rationale: 自下而上估算：400 万 Comfy 用户 × 假设其中 3% 为商业 / 专业用户 ÷ 每队 4 名重度用户 × 每队每年约 $15k 的相邻 工作流 治理预算，约等于 $450M；再用 $32.28B 的数字内容创作大盘做交叉校验。
    isEstimate: true
    sourceRefs:
    - 1
    - 12
    - 29
  sam:
    value: $25.9M
    rationale: 在 TAM 的团队基数上继续收窄：30,000 个模型化团队 × 12% 可能是代理商 / 增长创意团队 × 40% 可能是重度合成视频、且愿意早期采用 Comfy 的团队 × 每年 $18k 预算，约为 $25.9M。
    isEstimate: true
    sourceRefs:
    - 1
    - 2
    - 12
  som:
    value: $1.0M
    rationale: 按第 3 年可达份额估算：赢下模型化 SAM 的约 4%（约 58 个团队），每队每年约 $18k 支出，对应约 $1.0M ARR 等值。
    isEstimate: true
    sourceRefs:
    - 12
    - 21
    - 31
