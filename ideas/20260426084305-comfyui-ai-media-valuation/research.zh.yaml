  willingnessToPay:
    summary: 围绕生产级 AI 工作流 的相邻预算已很明确：Comfy Cloud 本身从免费到 $100/月自助档都有，Bria 靠 usage 做商用安全生成，Synthesia 先卖 $29 和 $89 的月费，再往企业版 upsell；团队也早就在为 Airtable、Bynder 这类按 seat 计费的 工作流 运营和 DAM 软件买单。换句话说，这个产品完全可能吃到既有创意运营、AI 生产或 DAM 的预算，而不是凭空去创造一条新的合规预算。 [12][20][21][31][32]
    sourceRefs:
    - 12
    - 20
    - 21
    - 31
    - 32
  competitiveLandscape: Adobe 是最接近企业默认选项的在位厂商，因为它同时握有分发、品牌信任和 来源证明 叙事，但它优化的是 Adobe 中心式创作，不是开放的 Comfy graph。Bria 是最接近的模型层类比，因为它强调授权数据、可控性、赔偿保障，甚至提供 Comfy 集成，但它终究更像模型 / 平台供应商，而不是跨 工作流 的策略系统。Synthesia 对愿意放弃开放 流水线、转向受控 avatar 栈的团队是强替代。Truepic、GetReal 和 Reality Defender 证明了真实性和 深度伪造 风险工具确实有需求，但它们站在后链路做验证或检测，而不是在渲染时就做策略执行。对很多代理公司来说，Airtable / Bynder / Drive 这套人工栈依然是现实默认选项；这既是机会，也是最直接的价格锚。 [19][20][21][22][23][24][25][31][32]
  incumbentThesis:
  - incumbentClass: 云平台
    point: Comfy Cloud 提供算力、资产和排队能力，但不提供合同级授权逻辑、批准过的模型策略，或面向开放节点图的客户可审阅审计包；真正的切口，是叠在这些 API 之上，而不是替掉它们。
    sourceRefs:
    - 8
    - 9
    - 10
    - 12
  - incumbentClass: 创意套件在位厂商
    point: Adobe 能在自己的企业栈里挂上来源证明，但代理公司之所以用 Comfy，就是因为它们需要更多模型选择、更深的图级控制，以及比封闭套件更快的生态迭代。
    sourceRefs:
    - 6
    - 19
  - incumbentClass: 封闭式合成视频厂商
    point: 当客户愿意统一到 Synthesia 这类受控 avatar 工作流 时，它会赢；但当代理公司必须跑多模型、多资产、同时混用开源与合作节点的 流水线，而且这些 流水线 已长在 ComfyUI 里时，它并不会天然胜出。
    sourceRefs:
    - 2
    - 21
    - 22
  - incumbentClass: 来源证明与检测厂商
    point: Truepic、GetReal 和 Reality Defender 擅长在媒体生成之后做验证或检测，而创业公司的切口，是把权利策略绑到 工作流 本身，在导出前就挡下高风险运行。
    sourceRefs:
    - 23
    - 24
    - 25
  - incumbentClass: 内部运营工具栈
    point: 表格、Airtable、DAM 和共享盘，在审批量还不高时依然够用；创业公司只有在不把团队赶出 Comfy 的前提下，确实把审批速度拉快、返工降下来，才有机会赢。
    sourceRefs:
    - 12
    - 31
    - 32
  regulatoryLandscape: 法律方向已很明确，虽然规则还分散。California AB 2602 规定：对未来表演的数字分身使用，如果合同条款只是笼统概括、没有被明确描述和妥善协商，就不能执行；AB 1836 则把已故人物肖像在广告和商品场景中的未授权使用责任进一步拉高。平台侧的披露要求也在收紧：YouTube 明确要求创作者在观众可能被误导时披露修改过或合成的内容。哪怕联邦层面的完整肖像权规则还没成型，这种环境也已显著抬高了记录薄弱的代价。 [26][27][28]
  technologyLandscape: Comfy 现在已露出了这类控制层需要的技术原语：工作流提交、任务状态、队列查看、资产上传与元数据、用户数据存储，以及节点注册表元数据。与此同时，C2PA 和 CAI 也在把加密签名的 来源证明 记录和开源实现工具标准化。真正的技术机会，是把这两股力量接起来——一头是 Comfy 的图级遥测，一头是可带走的 来源证明 标准——又不逼团队离开放工作流。 [6][8][9][10][11][15][16][17][18]
  distributionChannels:
  - point: 通过 注册表 分发的自定义节点，是摩擦最低的入口，因为代理公司可以直接在既有 graph 里装上一枚合规节点。
    sourceRefs:
    - 11
  - point: 直接定向触达创意运营负责人和 AI 生产负责人，最贴滩头，因为痛点爆发在客户审批环节，而不是大范围 IT 改造。
    sourceRefs:
