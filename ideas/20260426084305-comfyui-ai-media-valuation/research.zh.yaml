    rationale: 把滩头市场约束应用到 TAM 单位：30,000 个模型化团队 × 12% 可能属于代理机构 / 增长创意团队 × 40% 可能是合成视频重度用户且为原生 Comfy 的早期采用者 × $18k 年预算 ≈ $25.9M。
    isEstimate: true
    sourceRefs:
    - 1
    - 2
    - 12
  som:
    value: $1.0M
    rationale: 第 3 年可触达份额情景：拿下约 4% 的模型化 SAM（约 58 个团队），每团队年支出约 $18k，即约 $1.0M 的 ARR 等价收入。
    isEstimate: true
    sourceRefs:
    - 12
    - 21
    - 31
