reportMemo:
  executiveTakeaways:
  - Comfy 已不再只是一个本地图像工具：它如今声称拥有 4M 用户、60k+ 社区节点、150k+ 日下载量和 $500M 估值，同时正将云端、注册表、资产和工作流 API 产品化，用于生产环境。[1][6][8][9][10][11]
  - 4 月的产品发布显示，Comfy 正演变为一个多模态创意操作系统，覆盖真人视频、GPT 图像编辑、SVG 和商业授权音乐，这扩大了团队在发布前必须追踪的权利范围。[2][3][4][5][7]
  - 滩头市场的痛点既强烈又狭窄：一旦代理机构开始为付费客户交付合成代言人广告或混合媒体活动，同意证明、授权溯源和导出审批就会成为发布阻塞点。[2][12][26][27][28]
  - 标准正在成熟——C2PA 和 CAI 现已定义防篡改的溯源工具——但它们并不能解决合同特定的同意、已批准模型策略，或开放式 Comfy 流水线内部的工作流级门控问题。[15][16][17][18]
  - 现有厂商覆盖了这一问题的相邻切片：Adobe 掌握创作者分发，Bria 销售商业安全的生成能力，Synthesia 管理封闭式头像视频，Truepic / GetReal / Reality Defender 则在事后进行认证或检测。它们都没有明确为开放、多模态、原生于 Comfy 的权利运营而优化。[19][20][21][22][23][24][25]
  - 短期市场真实存在，但规模有限：如果公司赢下的是几十家而非几百家中型代理机构账户，那么约 $1.0M 的第 3 年 SOM 是合理的，因此上行空间取决于后续能否突破滩头市场。[1][12][21][29]
  marketDefinition: 相关市场是面向商业生成式媒体团队的软件，聚焦工作流级的权利、同意、溯源与发布运营；这些团队使用 ComfyUI 等基于节点的流水线来生产面向客户的资产。买方是商业创意组织，而非消费者创作者。地理上初期聚焦北美和欧洲，因为这些地区对客户审批、平台披露要求和数字替身审查最为严格。相邻市场包括 DAM、内容真实性标准、深度伪造检测和企业级安全生成媒体平台。被刻意排除在外的是通用 DAM 系统、广义欺诈检测、消费者编辑应用，以及通过掌控整套技术栈来回避开放工作流问题的封闭式视频生成器。[6][12][15][16][19][21][23][25][26][27]
  customerAndBuyer: 核心 ICP 是一家 20–100 人的 AI 原生效果营销机构，使用 ComfyUI 频繁制作包含合成主持人或授权资产的本地化视频广告。经济买方通常是负责吞吐与客户审批的创意运营负责人、COO 或制作负责人；用户则包括制片、创意技术人员、剪辑人员以及法务/运营审核者。他们最紧迫的任务，是防止不合规渲染被发布、快速重建资产/模型谱系，并在不拖慢迭代的前提下生成可直接提供给客户的证据。当前替代方案包括电子表格、Drive 文件夹、Slack 讨论串、类似 Airtable 的运营工具栈和人工法务审核。采购摩擦将来自法务准确性预期、运营与法务之间不清晰的预算归属，以及产品必须接入现有工作流工具而不是替换它们的现实。[2][8][9][10][12][13][31][32]
  buyingTriggers:
  - point: 某个大客户、品牌法务团队或平台审核流程会询问广告活动是否使用了被修改或合成的内容，并要求提供配套披露或审批证据。
