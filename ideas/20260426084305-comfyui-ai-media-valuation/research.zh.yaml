  validationPlan:
  - priority: high
    question: 今天的创意运营负责人，真的把授权 / 来源失误当成发布卡点吗，还是只把它当成偶尔需要做的法务卫生？
    evidenceToGather: 访谈 10 位以上代理公司 COO / 创意运营负责人；收集最近的客户审批请求、SLA 失误，或人工整理过的资料包样本。
  - priority: high
    question: 团队愿意把节点或中间件关口装进 真实运行的Comfy 工作流 吗，还是更偏好导出后再审的工具？
    evidenceToGather: 找共创伙伴跑两个试点：一个真人视频 工作流，一个混合资产 工作流；量化被挡下的任务、额外延迟和导出获批耗时。
  - priority: medium
    question: 采购方最在乎哪种交付物：授权 token、模型 白名单、资产许可来源链，还是最终审计包？
    evidenceToGather: 对代理公司和品牌方内部工作室做排序调查；把不同功能包和它们既有运营软件支出放在一起测试付费意愿。
