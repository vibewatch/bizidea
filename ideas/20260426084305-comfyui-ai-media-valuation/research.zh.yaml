  sensitivityCases:
  - case: Comfy 的商业用户占比只有 1%，而不是 3%
    impact: 如果 Comfy 的商业 / 专业用户占比只有 1%，而不是 3%，那么在单价假设还没起作用之前，模型里的团队基数就先被压缩，TAM 会从约 $450M 掉到约 $150M。
