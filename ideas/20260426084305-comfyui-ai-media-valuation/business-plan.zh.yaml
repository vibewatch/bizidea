slug: ai-likeness-rights-ops
date: '2026-04-26'
executiveSummary: AI 原生效果营销机构已经开始在 ComfyUI 中运行面向客户的合成代言人与混合媒体广告工作流，但它们的审批证据仍散落在电子表格、共享云盘和 Slack 中。首个产品应当是一个原生于 Comfy 的权利与溯源层，在导出前拦截高风险渲染、自动捕获工作流谱系，并生成可直接提供给客户的审计资料包。购买触发因素非常具体：某个大客户、品牌法务团队或分发平台会在广告活动上线前要求提供同意、资产权利或合成内容溯源证明。研究支持当前的技术时机，因为 Comfy 已开放工作流、队列、资产和注册表钩子，且其产品发布显示身份验证与多模态资产生成正在进入工作流本身。短期市场真实存在但规模有限，模型测算的 TAM、SAM 和第 3 年 SOM 分别约为 $450M、$25.9M 和 $1.0M，因此公司必须利用代理机构这一切入口来证明更广泛的控制平面机会，而不能假装仅靠滩头市场就具备风险投资级规模。基于这一点，计划应采用窄路径推进：先切入合成视频代理机构工作流，证明审批周期压缩和付费转化，再扩展到品牌内部工作室、后期制作团队以及最终的相邻创作工具。最大的反证风险在于，代理机构仍将此视为偶发性的人工运营工作，而非有明确预算负责人的发布阻塞点。市场规模与定价均来自研究中的模型估算，因此前 6 个月必须验证付费意愿、预算归属，以及买方究竟更偏好预渲染关卡还是导出后审查。
problem:
- 使用 ComfyUI 进行合成代言人与多模态广告制作的代理机构，无法快速证明是谁给出了同意、适用哪些权利，以及已发布广告活动中具体使用了哪些资产、模型和节点版本。
- 当前替代方案，如电子表格、共享云盘、Airtable 式运营工具栈和人工法务审核，在客户或平台上线前要求证据时，已经慢到足以成为发布阻塞因素。
solution:
- 推出一个 Comfy 自定义节点加工作流中间件，在渲染进入队列或导出路径前，强制要求提供同意令牌、授权元数据和已批准模型策略。
- 在本地和云端运行中存储步骤级谱系，并自动生成审计资料包，使法务团队、客户和平台无需手动重建历史即可审阅。
whyWeWin:
- 工作流图本身就是风险来源，因此原生于 Comfy 的产品能比导出后检查工具更早阻止问题运行，并更准确地捕获证据。
- 产品采用可以从现有 Comfy 技术栈中的一个轻量节点开始，而不是大规模的平台替换，这符合代理机构现有的工作方式。
- 累积的谱系、审批历史和可复用策略模板能够形成持久的合规图谱，且难以事后重建。
strategicChoices:
  beachhead: 使用 ComfyUI 为消费类 App 与电商客户交付每周本地化视频广告、其中包含合成主持人和授权媒体素材的中型 AI 原生效果营销机构。
  wedgeRationale: 这一细分领域拥有最明确的发布阻塞点、最短的可量化验证路径，以及同时承受产能压力与客户审批痛点的买方；若将定位泛化为“AI 媒体合规”，会稀释紧迫性并拉长销售周期。
  sequencingRationale: 先围绕一个高风险工作流提供工作流关卡与审计资料包，因为购买触发点是广告活动审批，而不是企业级转型；一旦产品证明自己能在不拖慢创意吞吐的前提下缩短审批周期，再增加策略路由、可复用模板和更广泛的工作区控制，随后再扩展到相邻客户群体或工具。
  notYet:
  - 面向所有创意资产的通用 DAM 替代方案
  - 独立的导出后深度伪造检测产品
  - 面向消费者创作者的工作流
  - 在滩头市场尚未形成可重复转化前，扩展到 Comfy 之外的多工具编排
  - 跨司法辖区的自动化法律建议
market:
  tam: 模型测算的 TAM 为 $450.0M，基于约 30,000 个估算的商业 Comfy 团队，以及每团队每年约 $15k 的相邻工作流治理预算。
  sam: $25.9M 的模型化 SAM 面向那些足够原生于 Comfy、且在合成视频上投入足够重、能够强烈感受到痛点的代理机构和增长创意团队。
  som: 模型测算的第 3 年 SOM 为 $1.0M，假设约 58 个滩头团队、每年支出约 $18k。
  segments:
  - 使用 ComfyUI 制作合成代言人广告的 AI 原生效果营销机构
  - 在消费品牌内部运行基于 Comfy 资产流水线的生成式内容团队
  buyingProcess: 初始买方通常是创意运营负责人、COO 或制作负责人，但由于审批证据必须满足外部审查者，法务和客户服务相关方也会影响交易。应预期由创始人主导、绑定真实工作流试点的销售模式；若产品能够在不扰乱产出的前提下降低审批资料包准备时间并拦截高风险任务，则试点后有望转为付费部署。
product:
  mvp: MVP 是一个面向合成代言人视频广告活动的原生 Comfy 节点与中间件层。它必须在进入队列时捕获同意令牌、资产授权元数据、模型与节点谱系以及导出审批，并为每个活动生成可直接提供给客户的审计资料包。
  sixMonth: 强化面向云端与本地运行的捕获层，推出适用于合成主持人与授权音乐的审批模板，加入不可篡改的审计日志，并完成 2 到 3 个设计合作伙伴部署，证明审批周期节省可量化。
  twelveMonth: 增加基于角色的审批路由、策略例外处理、兼容 C2PA 的溯源导出、工作区级仪表板，以及适用于最常见代理机构发布工作流的自助式策略模板。
  twentyFourMonth: 从代理机构视频工作流扩展到品牌内部工作室和选定的相邻媒体工作流，同时增加多工作区治理、合作模型白名单和更深层资产系统集成等企业级控制。
  keyBets:
  - 买方会比起导出后审查，更信任预渲染工作流关卡，因为它能够减少返工，而不是事后记录问题。
  - Comfy 的工作流、队列、资产和注册表钩子足够稳定，可以在不需要过多定制维护的情况下支持可靠的谱系捕获。
  - 可直接提供给客户的审计资料包，其价值足以比泛化合规仪表板更快撬动预算。
  - 面向合成代言人广告的一组窄策略模板，未来可以泛化为相邻媒体类型的可重复审批工作流。
gtm:
  wedge: 面向基于 Comfy 的合成代言人广告工作流的“可审计发布关卡”，在客户审批受阻或平台要求披露后，销售给代理机构的创意运营负责人。
  channels:
  - 由创始人主导外呼，面向 20 至 100 人代理机构中的创意运营负责人、COO 和 AI 制作负责人
  - 通过 Comfy 自定义节点和注册表进行产品发现与轻量采用
  - 将工作流顾问、节点发布者和商业安全模型供应商作为集成与引荐合作伙伴
  funnelTargets: 线索→合格发现 25%+，合格发现→付费试点 40%+，付费试点→年度部署 60%+，年度部署→可引用案例 50%+
  pricing: 年度平台费加上按每个已验证肖像或每次获批活动导出计费的用量定价，因为买方在工作流层面感受到痛点，而价值会随审批量扩张；先从付费试点开始，若审批准备时间显著下降，再转为年度合同。
businessModel:
  revenueStreams:
  - 用于工作流权利与溯源控制的年度 SaaS 订阅
  - 按已验证肖像或获批导出计费的用量费用
  - 面向企业审批路由、策略模板和集成的高级模块
  unitOfValue: 每个客户工作区内的获批活动导出次数与已验证肖像工作流数量
  targetGrossMarginPct: 70
  expansionLevers:
  - 在每个代理机构账户内增加更多工作区、活动和审批量
  - 面向企业路由、审计留存和合作伙伴集成的更高价值策略模块
  - 从代理机构扩展到品牌内部工作室，再到后续相邻创作工具
strategyMap:
  northStarMetric: 无需手动重建证据、通过策略关卡处理的获批活动导出数量
  inputMetrics:
  - 被该节点覆盖的目标工作流占比
  - 审批资料包准备时间的中位数降幅
  - 在导出前被拦截的高风险任务占比
  - 付费试点转年度部署的转化率
  - 每个客户采用的可复用策略模板数量
  moatsToBuild:
  - 覆盖资产、节点、模型、审批和导出的工作流级谱系图谱
  - 映射到常见发布工作流的客户专属策略模板
  - 嵌入客户审核流程的审计历史与证明产物
  - 通过 Comfy 节点与合作模型集成进行生态分发
  killCriteria:
  - 前 15 次 ICP 访谈中，少于 3 次能提供一个近期因缺失同意、权利或溯源证据而导致上线延迟或客户升级处理的案例
  - 前 5 个付费试点中，少于 2 个能以不低于模型设定的 $18k 预算锚点转为年度部署
  - 工作流门控带来的端到端延迟超过 10%，或在超过 20% 的被监控任务上需要人工绕过
  - 到第 12 个月时，没有任何相邻扩展路径能让模型可服务市场相较初始代理机构切入口实现实质扩大
  mermaid: "flowchart LR\n  Wedge[Comfy 合成代言人广告工作流] --> MVP[队列时点权利关卡与审计资料包]\n  MVP --> Proof[更快审批与被拦截的高风险导出]\n  Proof --> Expansion[先在代理机构标准化，再扩展到品牌工作室]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流切入口与时机都很强，但是否值得投资取决于能否证明预算归属，以及在有限滩头市场之外是否存在可信的扩展路径。
    whyBelieve: Comfy 的生产级 API、多模态合作节点以及真人验证产品发布，为嵌入现有工作流内部的权利控制层打开了可信机会窗口。
    whyDoubt: 模型化滩头市场足够狭窄，因此除非客户痛点已经成为反复出现的发布阻塞因素，否则人工审核或封闭平台可能仍然“足够好”。
    nextDiligence: 拿下 3 个付费代理机构试点，并证明其中至少 2 个能转为年度部署，原因是审计资料包和策略关卡显著缩短了审批周期。
  firstCustomer:
    title: AI 原生效果营销机构的创意运营负责人
    profile: 一家 20 至 100 人的代理机构，使用 ComfyUI 为消费类 App 或电商客户频繁制作带合成主持人和授权媒体素材的本地化视频广告。
    trigger: A major client, brand legal team, or ad platform asks for proof of talent consent, asset rights, or AI provenance before approving a campaign.
    buyer: 创意运营负责人或 COO
    initialContract: 为期 90 天、金额处于低五位数的付费试点；如果审批准备时间下降且工作流关卡被用于生产环境，则可转为约 $18k 至 $40k 的年度平台支出外加用量费用。
  mustBeTrue:
  - 至少三分之一的目标代理机构在过去 6 个月内遭遇过客户、法务或平台提出的证据要求。
  - 一个队列时点节点可以在工作流减速低于 10% 的情况下捕获所需的同意、授权和谱系数据。
  - 买方对预渲染门控加审计资料包的重视程度，高于独立的导出后验证工具。
  - 创意运营负责人可以在不等待单独 legal-tech 预算的情况下，推动约 $18k 以上的年度采购。
  - 公司可以从代理机构这一切入口扩展到足以支撑风险投资级后续融资的相邻团队或工具。
  diligenceQuestions:
  - 最近 10 家目标代理机构中，有多频繁因为审批证据不完整而损失时间或收入？
  - What exact artifact closes the deal fastest: pre-render policy gates, audit packets, or reusable consent and license registries?
  - Who signs the contract in practice when a campaign is blocked: creative ops, COO, legal, or client service?
  - 在本地与云端部署中，Comfy 的 API 和节点钩子对谱系捕获而言有多稳定？
  - 哪些封闭平台已经足够解决这类工作流问题，以至于客户可能离开 Comfy，而不是购买一个控制层？
  riskHeatmap:
  - risk: 人工工作流对大多数代理机构而言仍然足够好
    likelihood: High
    impact: High
    leadingIndicator: 接受访谈的 ICP 中，少于 30% 能展示一个近期审批延迟、客户升级处理事件，或一个他们愿意付费避免的人工资料包案例。
    mitigation: 只向近期出现审批痛点的工作流销售，把产品锚定为发布加速方案，并避免泛化合规定位。
  - risk: 预算归属不清会拖慢交易或直接导致交易流失
    likelihood: High
    impact: High
    leadingIndicator: 需求探索电话以跨职能兴趣收尾，但没有任何单一负责人愿意在一个预算周期内为付费试点拨款。
    mitigation: 把产品包装为广告发布保险和吞吐提升方案，优先从由单一负责人兼管运营与审批的代理机构切入，并坚持要求付费试点。
  - risk: 对 Comfy 的平台依赖会收窄切入口
    likelihood: Medium
    impact: High
    leadingIndicator: Comfy 更改核心 API、限制节点访问，或推出与 MVP 重叠的原生审批和溯源功能。
    mitigation: 先基于已文档化的钩子构建，掌握平台之上的策略与审计层，并在产品验证后规划向相邻工作流工具扩展。
  - risk: 产品造成虚假的法律合规安全感
    likelihood: Medium
    impact: High
    leadingIndicator: 潜在客户会询问软件是否能取代法律审查，或保证特定司法辖区下的合规。
    mitigation: 将产品定位为证据和工作流执行基础设施，而不是法律建议，并要求在高风险场景中配置策略并加入人工审批步骤。
  - risk: 封闭平台吸收了合成视频工作流
    likelihood: Medium
    impact: Medium
    leadingIndicator: 目标代理机构将新业务标准化到 Synthesia 或 Adobe 等受治理平台上，而不是把高价值工作流留在 Comfy 中。
    mitigation: 聚焦当下确实需要开放式混合模型图的客户，并在后续构建跨工具审计与策略覆盖的扩展选项。
operatingAssumptions:
- assumption: 第一个付费买方将更可能来自创意运营而非法务，因为眼下的直接痛点是上线延迟与客户审批摩擦。
  basis: research.yaml
  validationTest: 至少签下 3 个付费试点，且商业赞助人位于创意运营或制作岗位，并能在一个季度内批准支出。
  decisionImpact: 如果该假设不成立，应改为面向法务和采购赞助重新定位，延长销售周期假设，并把 MVP 收窄到法务明确要求的证据工作流。
- assumption: 如果工作流内关卡增加的延迟低于 10%，且能拦截明显高风险任务，客户将能够接受。
  basis: idea.yaml
  validationTest: 在 2 个真实设计合作伙伴工作流中部署并监测，跨至少 100 次生产运行测量延迟、绕过频率和被拦截任务价值。
  decisionImpact: 如果该假设不成立，应将初始产品转向运行后审计生成和审批路由，而不是队列时点执行。
- assumption: 一旦产品证明能够加速发布，模型设定的 $18k 年支出锚点对代理机构账户而言是可实现的。
  basis: research.yaml
  validationTest: 在试点成交方案中测试付费意愿，并至少将 2 家代理机构转化为不低于模型预算锚点的年度合同。
  decisionImpact: 如果该假设不成立，应采用更轻量的自助式或用量驱动定价模型，并重新评估该细分市场是否足以支撑风投回报。
- assumption: Comfy 已文档化的工作流、队列、资产和注册表钩子足以在本地和云端场景下构建可靠的谱系捕获。
  basis: research.yaml
  validationTest: 在不依赖未受支持的平台变通方案的情况下，为一个本地工作流和一个云端/API 工作流完成端到端谱系捕获。
  decisionImpact: 如果该假设不成立，应显著扩大工程范围、降低路线图雄心，或拓展为更平台无关的审计层。
- assumption: 一旦代理机构验证点建立起来，滩头市场就可以扩展为更大的控制平面业务。
  basis: 运营判断
  validationTest: 到第 12 个月时，至少拿下 2 场与品牌工作室、后期制作团队或相邻工具链合作伙伴的认真扩展对话，并能映射到更大的后续市场。
  decisionImpact: 如果该假设不成立，应将公司视为细分工作流产品，降低融资雄心，并以盈利能力而非风投扩张为优化目标。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 位代理机构创意运营负责人，并收集近期审批资料包、升级处理邮件或上线延迟案例。
  hypothesis: 权利与溯源证据已经是反复出现的发布阻塞点，而不只是未来风险。
  successMetric: 至少 5 位受访者分享近期具体审批事件，且至少 3 位同意参加试点设计会议。
  owner: 创始人
- horizon: 0–90 天
  experiment: 构建一个 Comfy 原型节点，在提交到队列前要求提供同意令牌、资产授权字段和已批准模型元数据。
  hypothesis: 队列时点门控可以自然融入现有代理机构工作流。
  successMetric: 2 家设计合作伙伴安装该节点，并各自完成至少 20 次测试运行，且没有关键工作流中断。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 在合成代言人广告活动上运行 2 到 3 个付费试点，并测量部署前后的审批资料包准备时间。
  hypothesis: 自动化谱系捕获和审计资料包能够显著减少审批准备时间，足以支撑付费转化。
  successMetric: 审批资料包准备时间的中位数至少下降 50%，且至少 2 个试点承诺转为年度部署。
  owner: 创始人
- horizon: 90–180 天
  experiment: 推出首个审计资料包模板，包含兼容 C2PA 的溯源导出以及针对例外情况的人工作审批步骤。
  hypothesis: 买方需要可移植的证明产物，而不仅仅是内部仪表板。
  successMetric: 至少 80% 的试点相关方表示，该审计资料包经过少量修改后即可满足客户或法务审查要求。
  owner: 产品负责人
- horizon: 180–270 天
  experiment: 与工作流顾问、节点发布者或商业安全模型供应商测试一项转介绍或联合分发合作。
  hypothesis: 生态合作伙伴能比纯冷启动外呼更快带来合格买家。
  successMetric: 一个合作伙伴渠道在一个季度内带来至少 5 场合格会议和 1 个付费试点。
  owner: 创始人
- horizon: 180–360 天
  experiment: 使用同一套策略引擎，将一个成功客户或新试点扩展到品牌内部工作室工作流。
  hypothesis: 该产品无需全面重写即可泛化到代理机构之外。
  successMetric: 1 家非代理机构设计合作伙伴以低于 25% 的额外实施工作量采用核心工作流关卡与审计资料包。
  owner: 解决方案工程师
operations:
- 带版本控制的策略模板库，包含文档化负责人、复审节奏，以及高风险边缘案例的升级路径
- 与资产哈希、模型版本和审批动作绑定的不可篡改工作流事件与审计日志流水线
- 在产品上线生产环境前，先映射每个客户发布工作流的客户导入作战手册
- 面向开放生态集成的节点与依赖安全审查流程
- 每月监控影响模板的平台披露规则和数字替身政策变化
team:
- role: 创始人 / CEO
  startTiming: 第 0 个月
  rationale: 负责创始人主导销售、设计合作伙伴发现、工作流映射和早期产品包装，因为买方真实需求是公司的首要风险。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 构建该切入口所依赖的 Comfy 节点、谱系捕获层和导出门控基础设施。
- role: 产品与合规工程师
  startTiming: 第 3 个月
  rationale: 将客户审批工作流转化为可配置策略、审计产物和溯源输出，而不是一次性定制代码。
- role: 解决方案工程师
  startTiming: 第 6 个月
  rationale: 缩短试点部署时间，支持代理机构工作流映射，并将定制化搭建工作转化为可复用实施模式。
- role: 客户成功与策略运营
  startTiming: 第 9 个月
  rationale: 在多个生产账户上线后，维护策略模板、培训和续约支持。
milestones:
- horizon: 0–12 个月
  items:
  - 完成 15 次 ICP 访谈，并在滩头细分市场签下 3 个付费设计合作伙伴试点
  - 推出面向合成代言人视频工作流的 MVP 节点、谱系捕获和可直接提供给客户的审计资料包
  - 在生产试点中证明工作流额外开销低于 10%，且审批资料包准备时间至少下降 50%
  - 至少将 2 个试点转为年度部署，并发布 1 个可引用案例
- horizon: 12–24 个月
  items:
  - 增加审批路由、策略例外处理、兼容 C2PA 的导出和工作区仪表板
  - 以可重复的导入流程和至少 1 个生态分发伙伴，达到 10 至 15 个付费代理机构账户
  - 利用同一套策略引擎落地首个品牌内部工作室部署
- horizon: 24–36 个月
  items:
  - 在不失去控制平面定位的前提下，扩展到相邻媒体工作流和部分非 Comfy 集成
  - 引入多工作区控制、保留策略和合作模型白名单等企业治理功能
  - 通过广告活动量扩张和早期客户内部工作区增长，证明净留存能力
risks:
- risk: 人工审核和现有运营工具对大多数代理机构而言仍然足够好
  likelihood: High
  impact: High
  mitigation: 只聚焦近期出现客户审批痛点的账户，并要求在试点中体现可量化的审批周期 ROI。
- risk: 预算归属不清会拖慢销售并压缩定价
  likelihood: High
  impact: High
  mitigation: 向创意运营负责人销售“发布加速”和“客户留存”结果，并严格要求付费试点资格。
- risk: Comfy 平台变化或原生功能会削弱差异化
  likelihood: Medium
  impact: High
  mitigation: 基于已文档化 API 构建，确保策略与审计层由公司掌控，并在验证后准备 Comfy 之外的扩展路径。
- risk: 客户会高估产品，把它当作法律建议或完整合规覆盖
  likelihood: Medium
  impact: High
  mitigation: 保持策略可配置，对例外情况要求人工审批，并将软件定位为证据基础设施而非法律判断。
- risk: 封闭创作平台吸收了足够多的使用场景，从而压缩开放工作流机会
  likelihood: Medium
  impact: Medium
  mitigation: 瞄准当前确实需要开放式混合模型工作流的客户，并仅在滩头市场被验证后再推进跨工具扩展。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月的资金将支持一个小型创始团队、3 到 5 个付费试点、强化后的 Comfy 集成、审计与策略基础设施、早期合作伙伴分发测试，以及足够的客户验证，用以判断这究竟是一个风险投资级控制平面，还是一个更窄的工作流软件业务。
