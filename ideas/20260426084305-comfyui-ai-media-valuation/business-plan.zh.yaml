slug: ai-likeness-rights-ops
date: '2026-04-26'
executiveSummary: >-
  AI 原生效果营销代理机构已经开始在 ComfyUI 中运行面向客户的合成代言人与混合媒体广告工作流，但它们的审批证明仍散落在电子表格、共享盘和 Slack 里。第一款产品应当是一层 Comfy 原生的权利与来源链路层：在导出前拦截高风险渲染，自动捕获工作流来源链路，并生成可直接交给客户的审计包。购买触发点非常具体：重要客户、品牌法务团队或分发平台会在广告活动上线前要求提供同意、资产权利或合成内容来源证明。研究表明时机已经成熟，因为 Comfy 现在开放了工作流、队列、资产和注册表钩子，而产品发布也显示身份验证与多模态资产生成正在被拉进工作流本身。短期市场真实存在，但规模不算大，建模得到的 TAM、SAM 和第 3 年 SOM 分别约为 $450M、$25.9M 和 $1.0M，因此公司必须把代理机构切口当作验证更大控制平面机会的起点，而不能假装滩头市场本身就足够支撑风险投资。相应地，计划应当按顺序推进：先落地在合成视频代理机构工作流中，证明自己能压缩审批周期并带来付费转化，再扩展到品牌内部工作室、后期制作团队，最终覆盖相邻创作工具。最大的反证风险是，代理机构仍把这件事视作偶发的人工运营工作，而不是带有明确预算负责人的发布阻塞。市场规模和定价都来自研究建模，因此前 6 个月必须验证付费意愿、预算归属，以及买方到底更偏好导出前门控还是导出后审查。
problem:
  - 使用 ComfyUI 制作合成代言人和多模态广告的代理机构，很难快速证明某个已上线广告活动里到底是谁给了同意、适用哪些权利，以及用了哪些资产、模型和节点版本。
  - 电子表格、共享盘、类 Airtable 的运营栈和人工法务审核等现有替代方案速度太慢，一旦客户或平台在上线前要求证明，就会直接变成发布阻塞。
solution:
  - 推出一个 Comfy 自定义节点和工作流中间层，要求渲染任务在进入队列或导出路径前必须带上同意令牌、授权元数据和批准的模型策略。
  - 在本地与云端运行中保存步骤级来源链路，并自动生成审计包，让法务、客户和平台无需手动回溯历史就能审阅。
whyWeWin:
  - 风险源头就在工作流图里，因此 Comfy 原生产品能比导出后检查工具更早拦住问题任务，也能更准确地留存证据。
  - 产品可以先以轻量节点形态嵌进现有 Comfy 栈，而不是要求整个平台迁移，这更符合代理机构现在的工作方式。
  - 持续积累的来源链路、审批历史和可复用策略模板，能沉淀成一张事后很难重建的耐久合规图谱。
strategicChoices:
  beachhead: 使用 ComfyUI 为消费应用和电商客户持续交付本地化合成主持人视频广告及授权媒体素材的中型 AI 原生效果营销代理机构。
  wedgeRationale: 这一细分场景的发布阻塞最明确、最容易拿到可量化的验证结果，而且买方同时承受吞吐压力和客户审批压力；如果一开始就打“AI 媒体合规”大旗，只会稀释紧迫感并拉长销售周期。
  sequencingRationale: 先为一条高风险工作流提供门控与审计包，因为真正的购买触发点是广告活动审批，而不是企业级数字化改造；一旦产品证明自己能在不拖慢创意吞吐的前提下缩短审批周期，再加入策略路由、可复用模板和更广泛的工作区控制，之后再扩展到相邻客户群体或工具。
  notYet:
    - 面向所有创意资产的通用 DAM 替代品
    - 独立的导出后深度伪造检测产品
    - 面向消费者创作者的工作流
    - 在滩头市场尚未稳定转化前，就做超出 Comfy 的多工具编排
    - 覆盖多司法辖区的自动化法律建议
market:
  tam: 基于约 30,000 个估算的商用 Comfy 团队，以及每个团队每年约 $15k 的相邻工作流治理预算，建模得到 $450.0M 的 TAM。
  sam: 针对已原生采用 Comfy、且合成视频密度足够高、痛感最强的代理机构与增长创意团队，建模得到 $25.9M 的 SAM。
  som: 假设大约拿下 58 个滩头团队、每队每年支出约 $18k，则第 3 年可实现 $1.0M 的 SOM。
  segments:
    - 使用 ComfyUI 制作合成代言人广告的 AI 原生效果营销代理机构
    - 在品牌内部运行基于 Comfy 资产流水线的生成式内容团队
  buyingProcess: 初始买方通常是创意运营负责人、COO 或制作负责人，但法务和客户服务相关方也会影响成交，因为审批证据必须说服外部审核者。预计销售方式以创始人主导、围绕真实工作流试点展开；如果产品能减少审批材料准备时间，并在不影响产出的情况下拦住高风险任务，再转入付费部署。
product:
  mvp: >-
    MVP 是一层面向合成代言人视频广告活动的 Comfy 原生节点与中间层。它必须在任务入队时捕获同意令牌、资产授权元数据、模型与节点来源链路以及导出审批信息，并为每个广告活动生成可直接交付客户的审计包。
  sixMonth: >-
    加固云端和本地运行的捕获层，为合成主持人与授权音乐提供审批模板，加入不可篡改的审计日志，并完成 2 到 3 个共创客户部署，且能量化展示审批周期节省。
  twelveMonth: >-
    增加基于角色的审批路由、策略例外处理、兼容 C2PA 的来源导出、工作区级仪表盘，以及覆盖最常见代理机构发布流程的自助策略模板。
  twentyFourMonth: >-
    从代理机构视频工作流扩展到品牌内部工作室和精选的相邻媒体工作流，同时加入多工作区治理、合作模型白名单和更深的资产系统集成等企业控制能力。
  keyBets:
    - 买方会比起导出后审核，更信任导出前的工作流门控，因为前者能减少返工，而不是事后才做记录。
    - Comfy 的工作流、队列、资产和注册表钩子足够稳定，能支持可靠的来源链路捕获，而不会带来过高的定制维护成本。
    - 可直接交付客户的审计包，比泛化的合规仪表盘更容易解锁预算。
    - 面向合成代言人广告的一套狭窄策略模板，后续可以泛化为相邻媒体类型的可复用审批工作流。
gtm:
  wedge: 面向基于 Comfy 的合成代言人广告工作流，提供具备审计就绪能力的发布门控；在客户审批受阻或平台要求披露后，卖给代理机构创意运营负责人。
  channels:
    - 创始人主导外呼，触达 20 到 100 人代理机构中的创意运营负责人、COO 和 AI 制作负责人
    - 通过 Comfy 自定义节点和注册表分发，让产品更容易被发现并轻量接入
    - 与工作流顾问、节点发布者和强调商用安全的模型供应商建立集成与转介合作
  funnelTargets: 线索→有效发现 25%+，有效发现→付费试点 40%+，付费试点→年度部署 60%+，年度部署→可公开案例 50%+
  pricing: 年度平台费，叠加按已验证肖像或已批准广告活动导出计费，因为买方在工作流层面感受到痛点，而价值会随着审批量扩大；前期先用付费试点切入，只要审批材料准备时间显著下降，就转成年度合同。
businessModel:
  revenueStreams:
    - 面向工作流权利与来源控制的年度 SaaS 订阅
    - 按已验证肖像或已批准导出计费
    - 面向企业审批路由、策略模板和集成的高级模块
  unitOfValue: 每个客户工作区中已批准的广告活动导出次数与已验证肖像工作流数量
  targetGrossMarginPct: 70
  expansionLevers:
    - 在每个代理机构账户内扩大工作区、广告活动和审批量
    - 推出更高价值的策略模块，用于企业路由、审计留存和合作方集成
    - 从代理机构扩展到品牌内部工作室，之后再进入相邻创作工具
strategyMap:
  northStarMetric: 通过策略门处理且无需手动重建证据的已批准广告活动导出数量
  inputMetrics:
    - 被节点接入的目标工作流占比
    - 审批材料准备时间的中位数下降幅度
    - 导出前被拦截的高风险任务占比
    - 付费试点转年度部署的转化率
    - 每个客户采用的可复用策略模板数量
  moatsToBuild:
    - 覆盖资产、节点、模型、审批和导出的工作流级来源图谱
    - 映射常见发布流程的客户专属策略模板
    - 深度嵌入客户审阅流程的审计历史与证明工件
    - 通过 Comfy 节点和合作模型集成形成生态分发
  killCriteria:
    - 前 15 次 ICP 访谈中，不到 3 次能拿到最近因缺失同意、权利或来源证明而导致上线延迟或客户升级的真实案例
    - 前 5 个付费试点里，不到 2 个能以不低于建模 $18k 预算锚点的价格转成年度部署
    - 工作流门控让端到端延迟增加超过 10%，或在超过 20% 的被监控任务中需要人工绕过
    - 到第 12 个月时，没有任何相邻扩展路径能把可服务市场从初始代理机构切口实质性做大
  mermaid: |
    flowchart LR
      Wedge[Comfy 合成代言人广告工作流] --> MVP[入队时权利门控与审计包]
      MVP --> Proof[审批更快且高风险导出被拦截]
      Proof --> Expansion[先在代理机构标准化，再扩展到品牌工作室]
investorMemo:
  verdict:
    call: Watch
    conviction: 工作流切口与时机都很强，但是否值得投资取决于预算归属能否跑通，以及是否存在可信的滩头市场外扩路径。
    whyBelieve: Comfy 的生产 API、多模态合作节点和真人验证能力发布，给嵌入现有工作流内部的权利控制层创造了可信窗口。
    whyDoubt: 这个滩头市场窄到一定程度，若客户痛点还没反复演变成发布阻塞，人工审核或封闭平台可能依旧“够用”。
    nextDiligence: 拿下 3 个付费代理机构试点，并证明其中至少 2 个能转成年度部署，因为审计包和策略门能显著缩短审批周期。
  firstCustomer:
    title: AI 原生效果营销代理机构的创意运营负责人
    profile: 一家 20 到 100 人的代理机构，使用 ComfyUI 为消费应用或电商客户高频制作包含合成主持人与授权媒体的本地化视频广告。
    trigger: 重要客户、品牌法务团队或广告平台在批准广告活动前，要求提供人才同意、资产权利或 AI 来源证明。
    buyer: 创意运营负责人或 COO
    initialContract: 先签一个为期 90 天、金额在低五位数的付费试点；如果审批材料准备时间下降且工作流门在生产环境被采用，再转成每年约 $18k 到 $40k 的平台合同，并叠加使用费。
  mustBeTrue:
    - 至少三分之一的目标代理机构在过去 6 个月里，确实遇到过客户、法务或平台提出证据要求。
    - 入队时节点能以不到 10% 的工作流减速，捕获所需的同意、授权和来源链路数据。
    - 买方对“导出前门控 + 审计包”的偏好高于独立的导出后验证工具。
    - 创意运营负责人可以发起一笔约 $18k+ 的年度采购，而不必等待单独的法务科技预算。
    - 公司能从代理机构切口扩展到足够大的相邻团队或工具，从而支撑下一轮风险投资融资逻辑。
  diligenceQuestions:
    - 最近接触的 10 家目标代理机构里，有多少家因审批证据不完整而损失了时间或收入？
    - 哪种工件最能加速成交：导出前策略门、审计包，还是可复用的同意与授权登记表？
    - 当广告活动卡住时，实际拍板签约的人是谁：创意运营、COO、法务还是客户服务？
    - 在本地和云端部署下，Comfy 的 API 与节点钩子对来源链路捕获到底有多稳定？
    - 目前哪些封闭平台已经解决了足够多的问题，使客户有可能直接离开 Comfy，而不是购买控制层？
  riskHeatmap:
    - risk: Manual workflows remain good enough for most agencies
      likelihood: High
      impact: High
      leadingIndicator: 受访 ICP 中不到 30% 能拿出近期审批延迟、客户升级或他们愿意付费避免的人工材料包案例。
      mitigation: 只卖给最近确实出现审批痛点的工作流，把产品锚定在发布加速上，并避免泛化合规定位。
    - risk: Budget owner ambiguity slows or kills deals
      likelihood: High
      impact: High
      leadingIndicator: 发现电话结束时虽然跨职能都有兴趣，但没有任何单一负责人愿意在一个预算周期内出资购买付费试点。
      mitigation: 把产品包装成广告活动发布保险和吞吐改进工具，优先从一人同时负责运营与审批的代理机构切入，并坚持付费试点。
    - risk: Platform dependence on Comfy narrows the wedge
      likelihood: Medium
      impact: High
      leadingIndicator: Comfy 调整核心 API、限制节点访问，或推出与 MVP 重叠的原生审批与来源功能。
      mitigation: 先基于公开文档支持的钩子开发，掌握位于平台之上的策略与审计层，并在产品验证后规划向相邻工作流工具扩展。
    - risk: Product creates a false sense of legal compliance
      likelihood: Medium
      impact: High
      leadingIndicator: 潜在客户开始追问软件是否能替代法务审核，或是否能保证各司法辖区的合规。
      mitigation: 将产品定位为证据与工作流管控基础设施，而不是法律意见；同时要求可配置策略和高风险场景下的人工审批步骤。
    - risk: Closed platforms absorb the synthetic-video workflow
      likelihood: Medium
      impact: Medium
      leadingIndicator: 目标代理机构把新项目标准化迁移到 Synthesia 或 Adobe 等受控平台，而不是继续把高价值工作流放在 Comfy 中。
      mitigation: 聚焦那些今天就需要开放、混合模型图谱的客户，并在后续为跨工具审计与策略覆盖构建扩展选项。
operatingAssumptions:
  - assumption: 第一批付费买方会来自创意运营而不是法务，因为眼前的痛点是上线延迟和客户审批摩擦。
    basis: research.yaml
    validationTest: 在一个季度内，至少关闭 3 个由创意运营或制作团队商业赞助的付费试点，并由他们授权支出。
    decisionImpact: 如果不成立，就要改为面向法务和采购赞助，拉长销售周期假设，并把 MVP 收窄到法务明确要求的证据工作流。
  - assumption: 只要增加的延迟低于 10%，且能拦下明显高风险任务，客户就愿意接受工作流内门控。
    basis: idea.yaml
    validationTest: 为 2 条真实共创客户工作流打点，连续观察至少 100 次生产运行，测量延迟、绕过频率和被拦截任务价值。
    decisionImpact: 如果不成立，初始产品就应转向导出后审计生成与审批路由，而不是入队时强制执行。
  - assumption: 一旦产品证明能加速发布，代理机构账户每年约 $18k 的预算锚点是可实现的。
    basis: research.yaml
    validationTest: 在试点成交方案中测试付费意愿，并让至少 2 家代理机构以不低于该预算锚点的价格转为年度合同。
    decisionImpact: 如果不成立，就要转成更轻量的自助式或用量驱动定价，并重新评估该细分是否足以支撑风险回报。
  - assumption: Comfy 公开文档中的工作流、队列、资产和注册表钩子，足以支撑本地与云端场景下稳定的来源链路捕获。
    basis: research.yaml
    validationTest: 在不依赖未公开平台绕路方案的前提下，为一条本地工作流和一条云端/API 工作流完成端到端来源链路捕获。
    decisionImpact: 如果不成立，工程范围会明显扩大，路线图野心需要下调，或者产品要转向更平台无关的审计层。
  - assumption: 一旦在代理机构切口拿到验证，公司就能扩展成更大的控制平面业务。
    basis: operator judgment
    validationTest: 到第 12 个月前，至少拿到 2 次严肃的扩展对话，对象来自品牌工作室、后期团队或相邻工具链伙伴，并映射到更大的后续市场。
    decisionImpact: 如果不成立，就应把公司视为小众工作流产品，降低融资野心，转向以盈利为目标。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 15 位代理机构创意运营负责人，并收集最近的审批材料包、升级邮件或上线延迟案例。
    hypothesis: 权利与来源证明已经是反复出现的发布阻塞，而不只是未来风险。
    successMetric: 至少 5 位受访者分享近期具体审批事件，且至少 3 位同意进入试点设计环节。
    owner: 创始人
  - horizon: 0–90 天
    experiment: 构建一个 Comfy 节点原型，要求在提交到队列前必须填写同意令牌、资产授权字段和批准的模型元数据。
    hypothesis: 入队时门控可以自然嵌进现有代理机构工作流。
    successMetric: 两家共创客户安装该节点，并各自完成至少 20 次测试运行，且没有关键工作流中断。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 在合成代言人广告活动上运行 2 到 3 个付费试点，并对比部署前后准备审批材料所需时间。
    hypothesis: 自动来源链路捕获与审计包能显著降低审批材料准备时间，从而支撑付费转化。
    successMetric: 审批材料准备时间的中位数至少下降 50%，且至少 2 个试点承诺转成年度部署条款。
    owner: 创始人
  - horizon: 90–180 天
    experiment: 推出首个审计包模板，支持兼容 C2PA 的来源导出，并为例外情况加入人工审批步骤。
    hypothesis: 买方真正需要的是可移植的证明工件，而不只是内部仪表盘。
    successMetric: 至少 80% 的试点相关方认为，经过少量修改后，这个审计包就足以满足客户或法务审核者。
    owner: 产品负责人
  - horizon: 180–270 天
    experiment: 与工作流顾问、节点发布者或强调商用安全的模型供应商测试一次转介或联合分发合作。
    hypothesis: 生态伙伴比纯冷启动外呼更容易带来合格买家。
    successMetric: 单一伙伴渠道在一个季度内带来至少 5 个合格会议和 1 个付费试点。
    owner: 创始人
  - horizon: 180–360 天
    experiment: 将一个成功客户或新试点扩展到品牌内部工作室工作流，继续沿用同一套策略引擎。
    hypothesis: 产品无需彻底重写，就能泛化到代理机构之外。
    successMetric: 一家非代理机构共创客户采用核心工作流门与审计包，且额外实施工作量不超过 25%。
    owner: 解决方案工程师
operations:
  - 带版本管理的策略模板库，并明确负责人、复审节奏和高风险边界场景的升级路径
  - 绑定资产哈希、模型版本和审批动作的不可篡改工作流事件与审计日志流水线
  - 在产品进入生产环境前，先映射每个客户发布流程的客户上线手册
  - 面向开放生态集成的节点与依赖安全审查流程
  - 每月监控平台披露规则和数字分身政策变化，并同步更新模板
team:
  - role: 创始人 / CEO
    startTiming: Month 0
    rationale: 负责创始人主导销售、共创客户调研、工作流映射和早期产品打包，因为买方真需求是公司当前最大的风险。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 构建决定切口成败的 Comfy 节点、来源链路捕获层和导出门控基础设施。
  - role: 产品与合规工程师
    startTiming: Month 3
    rationale: 把客户审批工作流转成可配置的策略、审计工件和来源输出，而不是不断写一次性定制代码。
  - role: 解决方案工程师
    startTiming: Month 6
    rationale: 缩短试点部署时间，支持代理机构工作流映射，并把定制化上线工作沉淀为可复用模式。
  - role: 客户成功与策略运营
    startTiming: Month 9
    rationale: 当多个生产账户上线后，维护策略模板、培训和续费支持。
milestones:
  - horizon: 0–12 个月
    items:
      - 完成 15 次 ICP 访谈，并在滩头细分签下 3 个付费共创客户试点
      - 为合成代言人视频工作流交付 MVP 节点、来源链路捕获和可直接交付客户的审计包
      - 在生产试点中证明工作流额外开销低于 10%，且审批材料准备时间至少下降 50%
      - 至少将 2 个试点转成年度部署，并发布 1 个可公开引用的案例研究
  - horizon: 12–24 个月
    items:
      - 加入审批路由、策略例外、兼容 C2PA 的导出和工作区仪表盘
      - 达到 10 到 15 个付费代理机构账户，建立可重复的上线流程，并拿下至少 1 个生态分发伙伴
      - 使用同一套策略引擎拿下首个品牌内部工作室部署
  - horizon: 24–36 个月
    items:
      - 扩展到相邻媒体工作流与精选的非 Comfy 集成，同时不丢掉控制平面定位
      - 推出多工作区控制、留存策略和合作模型白名单等企业治理能力
      - 通过广告活动量增长和工作区扩张，在早期客户中证明净留存能力
risks:
  - risk: Manual review and existing ops tools remain good enough for most agencies
    likelihood: High
    impact: High
    mitigation: 只聚焦那些最近确实被客户审批痛点击中的账户，并在试点中强制验证审批周期 ROI。
  - risk: Budget owner ambiguity slows sales and compresses pricing
    likelihood: High
    impact: High
    mitigation: 向创意运营负责人销售“发布加速”和“客户留存”结果，并严格筛选愿意付费试点的机会。
  - risk: Comfy platform changes or native features reduce differentiation
    likelihood: Medium
    impact: High
    mitigation: 基于公开 API 构建，把策略与审计层掌握在自己手里，并在拿到验证后准备向 Comfy 之外扩展。
  - risk: Customers overestimate the product as legal advice or full compliance coverage
    likelihood: Medium
    impact: High
    mitigation: 保持策略可配置，在例外场景要求人工审批，并把软件定位为证据基础设施而不是法律判断。
  - risk: Closed creation platforms absorb enough of the use case to shrink the open-workflow opportunity
    likelihood: Medium
    impact: Medium
    mitigation: 锁定今天就需要开放、混合模型工作流的客户，并在滩头市场被验证后再考虑跨工具扩展。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月资金将覆盖一个精干创始团队、3 到 5 个付费试点、加固后的 Comfy 集成、审计与策略基础设施、早期伙伴分发测试，以及足够的客户验证，用来判断这究竟会成长为风险投资级控制平面，还是一家更窄的工作流软件公司。
