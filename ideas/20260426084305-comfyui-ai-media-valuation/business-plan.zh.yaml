slug: ai-likeness-rights-ops
date: '2026-04-26'
executiveSummary: AI 原生效果营销代理公司已开始在 ComfyUI 里跑面向客户的合成代言人和混合媒体广告工作流，但审批要用的证据还散在表格、共享盘和 Slack 里。首个产品应该是一层 Comfy 原生的权利与来源控制层：在导出前挡下高风险渲染、自动记录工作流来源链，并生成可直接交给客户的审计包。触发购买的场景很具体：某个大客户、品牌方法务或分发平台，在广告项目发布前要求先看到授权、资产权利或合成内容的来源证明。研究也说明时机已成熟，因为 Comfy 现在开放了工作流、队列、资产和注册表接口，最近的产品发布又显示，身份验证和多模态资产生成正在进入工作流本身。短期市场存在，但盘子不大——模型给出的 TAM、SAM 和第 3 年 SOM 分别约为 $450M、$25.9M 和 $1.0M——所以公司必须靠代理公司这个切口，去验证更大的控制平面机会，而不是把滩头硬说成风险投资级大市场。路线也该收得很窄：先打进合成视频代理公司的工作流，证明审批周期能缩短、付费能转化，再扩展到品牌方内部工作室、后期制作，最终延伸到相邻创作工具。最大的不确定性在于，代理公司到底把这件事当成偶发的人工作业，还是已把它视作有明确预算 owner 的发布卡点。市场规模和定价都还是基于研究推导的模型，因此前 6 个月必须验证付费意愿、预算归口，以及采购方更想要导出前关口，还是导出后审核。
problem:
- 使用 ComfyUI 做合成代言人和多模态广告生产的代理公司，往往无法快速证明是谁授权了、哪些权利有效，以及一条已发布 广告项目 里具体用了哪些资产、模型和节点版本。
- 表格、共享盘、类似 Airtable 的运营栈和人工法务审核这些现行替代方案，一旦遇到客户或平台要求发布前先给证据，就慢到足以挡住发布。
solution:
- 推出一枚 Comfy 自定义节点加一层 工作流 中间件：没有授权 token、许可元数据和批准过的模型策略，渲染就进不了队列，也进不了导出路径。
- 把本地和云端运行的步骤级来源链都存下来，并自动生成一份审计包，让法务、客户和平台直接审，不用再人工补齐历史。
whyWeWin:
- 风险源头就在 工作流 图里，所以 Comfy 原生产品比导出后检查工具更早挡下坏运行，也能更准确地自动留证。
- 产品可以先以轻量节点的方式装进既有 Comfy 栈，而不是要求客户整个平台迁移，这更贴近代理公司的既有工作方式。
- 不断积累的来源链、审批历史和能复用策略模板，会沉淀成很难事后再补出来的合规图谱。
strategicChoices:
  beachhead: 用 ComfyUI 每周给消费类 App 和电商客户生产本地化视频广告的中型 AI 原生效果营销代理公司，尤其是那些会用合成主持人和授权媒体的团队。
  wedgeRationale: 这个切口的发布卡点最清楚、最容易做出能量化验证点，采购方同时承受产能压力和客户审批压力；如果开局就讲笼统的“AI 媒体合规”，紧迫性会被冲淡，销售周期也会变长。
  sequencingRationale: 先把一个高风险工作流的关口和审计包做透，因为采购方真正付钱，是为了拿到广告项目审批，不是为了做一场企业数字化转型。等产品证明既能缩短审批周期，又不放慢创意吞吐，再补上策略路由、能复用模板和更广的工作区控制，然后再扩展到相邻客户和工具。
  notYet:
  - 覆盖所有创意资产的通用 DAM 替代品
  - 独立的导出后 深度伪造 检测产品
  - 面向消费者创作者的 工作流
  - 在滩头还没重复跑顺前就做跨工具编排
  - 跨法域的自动化法律建议
market:
  tam: 基于约 30,000 个估算的商业化 Comfy 团队，以及每队每年约 $15k 的相邻 工作流 治理预算，推导出的 modeled TAM 约为 $450.0M。
  sam: 面向 Comfy 原生、且够重度使用合成视频以至于痛点明显的代理公司和增长创意团队，建模得到的 SAM 约为 $25.9M。
  som: 第 3 年的 modeled SOM 约为 $1.0M，前提是赢下约 58 个滩头团队、每队每年度支出约 $18k。
  segments:
  - 使用 ComfyUI 做合成代言人广告的 AI 原生效果营销代理公司
  - 在品牌内部运行 Comfy 资产流水线的生成式内容团队
  buyingProcess: 最初的采购方通常是创意运营负责人、COO 或制作负责人，但法务和客户服务也会影响成单，因为审批证据必须过外部审核。前期主要靠创始人亲自打单，围绕 真实运行的工作流 试点成单；如果产品能显著缩短审批资料准备时间，并在不影响产出的前提下挡下高风险任务，随后再转成付费部署。
product:
  mvp: MVP 是一层 Comfy 原生节点加中间件，先服务合成代言人视频 广告项目。它必须在排队时抓到授权 token、资产许可元数据、模型与节点来源链以及导出审批，并为每个 广告项目 生成一份可客户可直接审阅的审计包。
  sixMonth: 把云端和本地运行的抓取层磨稳定，发布面向合成主持人和授权音乐的审批模板，补上不可变审计日志，并完成 2 到 3 个共创伙伴部署，拿到能量化的审批周期节省。
  twelveMonth: 补上基于角色的审批路由、策略例外、兼容 C2PA 的来源导出、工作区级仪表板，以及面向常见代理公司发布工作流的自助模板。
  twentyFourMonth: 从代理公司视频 工作流 扩展到品牌方内部工作室和精选的相邻媒体 工作流，同时加入多 工作区 治理、合作模型 白名单 和更深的资产系统集成等企业能力。
  keyBets:
  - 采购方会更信任导出前的 工作流 关口，而不是导出后复核，因为前者能直接减少返工，而不是事后再补文档。
  - Comfy 的 工作流、队列、资产和 注册表 接口够稳定，能支撑可靠的来源链抓取，而不必陷进过度定制维护。
  - 一份能直接给客户的审计包，价值够硬，能比笼统的合规 仪表板 更快撬开预算。
  - 围绕合成代言人广告磨出来的一小套策略模板，之后能泛化成相邻媒体类型的能重复审批 工作流。
gtm:
  wedge: 面向 Comfy 合成代言人广告 工作流 的可审计发布关口；一旦客户经历过一次审批惊吓或平台披露要求，就卖给代理公司的创意运营负责人。
  channels:
  - 创始人亲自，直接定向触达 20 到 100 人代理公司的创意运营负责人、COO 和 AI 生产负责人
  - 通过 Comfy 自定义节点和 注册表 做产品发现与轻量采用
  - 把 工作流 顾问、节点发布方和商用安全模型供应商成为集成与转介绍伙伴
  funnelTargets: 线索→合格需求发现 25%+，合格需求发现→付费试点 40%+，付费试点→年度部署 60%+，年度部署→可公开引用案例 50%+
  pricing: 按年度收取平台费，再按每个已验证肖像或每次获批 广告项目 导出收 使用量费用，因为痛点发生在 工作流 层，但价值会随审批量放大；前期先做付费试点，如果审批资料准备时间显著下降，再转为年度合约。
businessModel:
  revenueStreams:
  - 面向 工作流 权利与来源控制的年度 SaaS 订阅
  - 按已验证肖像或已批准导出收取 使用量费用
  - 面向企业审批路由、策略模板和集成的高级模块
  unitOfValue: 每个客户 工作区 里的获批 广告项目 导出数，以及已验证肖像 工作流 数
  targetGrossMarginPct: 70
  expansionLevers:
  - 在单个代理公司账户内赢下更多 工作区、广告项目 和审批量
  - 把企业级路由、审计留存和合作伙伴集成做成更高单价的策略模块
  - 从代理公司扩展到品牌方内部工作室，再延伸到相邻创作工具
strategyMap:
  northStarMetric: 通过策略关口处理、且无需人工回补证据的获批 广告项目 导出数
  inputMetrics:
  - 被节点接入的目标 工作流 占比
  - 审批资料准备时间的中位降幅
  - 导出前被挡下的高风险任务占比
  - 付费试点转年度部署的转化率
  - 每个客户采用的能复用策略模板数量
  moatsToBuild:
  - 覆盖资产、节点、模型、审批和导出的 工作流 级来源图谱
  - 映射常见发布 工作流 的客户专属策略模板
  - 逐步嵌进客户审核流程的审计历史与证明材料
  - 通过 Comfy 节点和合作模型集成建立生态分发
  killCriteria:
  - 前 15 个 ICP 访谈里，少于 3 个能给出最近因为缺少授权、权利或来源证据而导致发布延迟或客户升级的案例
  - 前 5 个付费试点里，少于 2 个能以不低于模型 $18k 预算锚点的价格转为年度部署
  - 工作流 关口让端到端延迟增加超过 10%，或在超过 20% 的监控任务上必须人工绕过
  - 到第 12 个月时，仍看不到任何能把可服务市场显著拉出初始代理公司切口的相邻扩张路径
  mermaid: "flowchart LR\n  Wedge[Comfy synthetic spokesperson ad workflows] --> MVP[Queue-time rights gate and audit packet]\n  MVP --> Proof[Faster approvals and blocked risky exports]\n  Proof --> Expansion[Agency standardization then brand-studio expansion]"
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流 切口和时点都很强，但是否值得投，取决于能否证明预算归口，以及能否走出一个偏窄的滩头。
    whyBelieve: Comfy 的生产 API、多模态合作节点和真人验证发布，共同打开了一个可信窗口：一层嵌在既有 工作流 里的权利控制层，确实有机会长出来。
    whyDoubt: 模型里的滩头过窄；如果客户痛点还只是偶发人工审核，而不是经常卡发布，那么人工流程和封闭平台可能就已够用了。
    nextDiligence: 先赢下 3 个付费代理公司试点，并证明至少 2 个能转为年度部署——前提是审计包和策略关口确实显著缩短审批周期。
  firstCustomer:
    title: AI 原生效果营销代理公司的创意运营负责人
    profile: 一家 20 到 100 人的代理公司，用 ComfyUI 高频生产面向消费类 App 或电商客户的本地化视频广告，里面会用到合成主持人和授权媒体。
    trigger: 某个大客户、品牌方法务或广告平台，在批准 广告项目 前要求先给出人才授权、资产权利或 AI 来源证明。
    buyer: 创意运营负责人或 COO
    initialContract: 一个 90 天、低五位数美元级级的付费试点；如果审批资料准备时间下降、工作流 关口真正进生产，就转成约 $18k 到 $40k 的年平台费，再叠加 usage。
  mustBeTrue:
  - 至少三分之一的目标代理公司，在最近 6 个月里真的遇到过客户、法务或平台索要证据的情况。
  - 排队时的节点可以在让 工作流 放慢不到 10% 的前提下，抓到所需的授权、许可和来源数据。
  - 采购方更看重导出前关口加审计包，而不是一款独立的导出后验证工具。
  - 创意运营负责人能够为一笔约 $18k+ 的年度采购决策，不用等单独的 法律科技 预算。
  - 公司能从代理公司切口扩展到够大的相邻团队或工具，从而支撑下一轮 风险投资级 融资。
  diligenceQuestions:
  - 最近 10 家目标代理公司里，有多少家真的因为审批证据不完整而丢过时间或收入？
  - 到底哪种交付物最能加快成单：导出前策略关口、审计包，还是能复用的授权与许可登记库？
  - 当 广告项目 被挡住时，实际决策签约的人是谁：创意运营、COO、法务，还是客户服务？
  - 跨本地与云端部署时，Comfy 的 API 和节点挂点，对来源抓取到底有多稳定？
  - 哪些封闭平台已解决了够多这类 工作流 问题，以至于客户可能直接离开 Comfy，而不是买控制层？
  riskHeatmap:
  - risk: 人工流程对大多数代理公司来说依然够用
    likelihood: High
    impact: High
    leadingIndicator: 受访 ICP 里，少于 30% 能拿出最近一次审批延迟、客户升级，或他们愿意花钱避免的人工资料包。
    mitigation: 只卖给最近确实出现过审批痛点的 工作流，把价值锚在加速发布上，避免讲泛合规。
  - risk: 预算归口不清拖慢甚至拖死成单
    likelihood: High
    impact: High
    leadingIndicator: 需求发现结束后，大家都说有兴趣，但没有任何一个负责人愿意在一个预算周期内为付费试点决策。
    mitigation: 把产品打包成 广告项目 发布保险和吞吐改进工具，优先找同一个操作者既管运营又管审批的代理公司，并坚持付费试点。
  - risk: Comfy 平台依赖让切口收窄
    likelihood: Medium
    impact: High
    leadingIndicator: Comfy 修改核心 API、限制节点访问，或自己发布和 MVP 重叠的审批与 来源证明 能力。
    mitigation: 先建立在文档完备的接口上，把策略和审计层掌握在平台之上；产品跑顺后再准备扩展到相邻 工作流 工具。
  - risk: 产品制造出虚假的法律合规感
    likelihood: Medium
    impact: High
    leadingIndicator: 潜在客户开始追问这套软件是否能替代法务复核，或保证不同法域下的合规。
    mitigation: 把产品定位成证据和 工作流 执行基础设施，而不是法律建议；高风险场景必须允许可灵活配置策略和人工审批。
  - risk: 封闭平台吃掉合成视频 工作流
    likelihood: Medium
    impact: Medium
    leadingIndicator: 目标代理公司把新项目统一迁到 Synthesia 或 Adobe 这类受控平台，而不是继续把高价值 工作流 留在 Comfy。
    mitigation: 优先服务今天就需要开放、多模型 graph 的客户，并在后续准备跨工具审计和策略覆盖的扩张选项。
operatingAssumptions:
- assumption: 第一个真正的预算持有者会落在创意运营，而不是法务，因为眼前最疼的是发布延迟和客户审批摩擦。
  basis: research.yaml
  validationTest: 至少赢下 3 个付费试点，且商业赞助人都来自创意运营或制作团队，并能在一个季度内完成授权。
  decisionImpact: 如果这个判断不成立，就要转向法务和采购主导的打法、拉长销售周期假设，并把 MVP 收窄成法务明确要求的证据 工作流。
- assumption: 只要 in-工作流 关口把额外延迟控制在 10% 以内，并且确实挡下看得见的高风险任务，客户就会接受。
  basis: idea.yaml
  validationTest: 在 2 条 真实运行的共创伙伴 工作流 上完成接入，连续跑至少 100 次生产任务，量化延迟、绕过频率和被拦任务价值。
  decisionImpact: 如果做不到，初版产品就应转向运行后审计包和审批路由，而不是排队时强制执行。
- assumption: 一旦产品能证明自己在加速发布，代理公司账户愿意接受模型里的 $18k 年度支出锚点。
  basis: research.yaml
  validationTest: 在试点 close plan 里测试付费意愿，并至少让 2 家代理公司以不低于模型锚点的价格转为年度合约。
  decisionImpact: 如果不成立，就要改成更轻量的自助式或按使用量驱动的定价，并重新判断这个细分市场能否支撑风险投资级回报。
- assumption: Comfy 已公开的 工作流、队列、资产和 注册表 接口，足以支撑跨本地与云端场景的可靠来源抓取。
  basis: research.yaml
  validationTest: 不用任何未公开平台 workaround，就完成一条本地 工作流 和一条云端 / API 工作流 的端到端来源抓取。
  decisionImpact: 如果不成立，工程范围就会明显膨胀，路线图也必须收缩，或者直接转向更平台无关的审计层。
- assumption: 只要先在代理公司切口拿到验证点，这个滩头就能长成更大的控制平面生意。
  basis: 主观判断
  validationTest: 到第 12 个月前，至少拿到 2 个来自品牌工作室、后期团队或相邻工具链伙伴的严肃扩张对话，并且它们都对更大的后续市场有映射。
  decisionImpact: 如果不成立，就该把公司当成一个小众 工作流 产品，降低融资 ambition，转而围绕盈利能力优化。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 位代理公司创意运营负责人，并收集最近的审批资料包、升级邮件或发布延迟案例。
  hypothesis: 授权与来源证据今天已是反复出现的发布卡点，而不是未来才会发生的担忧。
  successMetric: 至少 5 位受访者分享最近一次具体的审批事故，且至少 3 位同意进入试点设计。
  owner: 创始人
- horizon: 0–90 天
  experiment: 做一枚原型 Comfy 节点，要求在提交队列前先填授权 token、资产许可字段和批准过的模型元数据。
  hypothesis: 排队时关口可以自然地嵌进代理公司的既有 工作流。
  successMetric: 两家共创伙伴都安装这枚节点，并各自完成至少 20 次测试运行，且没有出现致命 工作流 断裂。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 围绕合成代言人广告 广告项目 跑 2 到 3 个付费试点，并比较部署前后整理审批资料包所需的时间。
  hypothesis: 自动抓取来源链加审计包，能把审批准备时间降到足以支撑付费转化。
  successMetric: 审批资料包整理时间中位数下降至少 50%，且至少 2 个试点承诺转为年度部署。
  owner: 创始人
- horizon: 90–180 天
  experiment: 发布首版审计包模板，支持兼容 C2PA 的 来源证明 导出，并在例外场景里保留人工审批步骤。
  hypothesis: 采购方真正需要的是可带走的证明材料，而不只是内部 仪表板。
  successMetric: 至少 80% 的试点相关方认为，这份审计包经过少量修改就能满足客户或法务复核。
  owner: 产品负责人
- horizon: 180–270 天
  experiment: 测试一个转介绍或共分发合作：对象可以是 工作流 顾问、节点发布方或商用安全模型供应商。
  hypothesis: 生态伙伴能比纯冷启动定向触达更快带来合格采购方。
  successMetric: 单个伙伴渠道在一个季度内带来至少 5 场合格会议和 1 个付费试点。
  owner: 创始人
- horizon: 180–360 天
  experiment: 把一个成功客户或新试点扩展进品牌方内部工作室 工作流，继续沿用同一套策略引擎。
  hypothesis: 这个产品不用彻底重写，也能从代理公司泛化到其他客户类型。
  successMetric: 至少 1 个非代理公司的共创伙伴在只增加不到 25% 实施工作量的情况下，采用核心关口和审计包。
  owner: 解决方案工程师
operations:
- 维护一套带版本控制的策略模板库，清楚写明负责人、复审节奏，以及高风险边界场景的升级路径。
- 建立不可变的 工作流 事件与审计日志流水线，把资产 hash、模型版本和审批动作都串起来。
- 做一套客户上线手册：产品进入生产环境前，先把客户每条发布工作流映射清楚。
- 对开放生态里的节点和依赖建立安全复审流程。
- 每月跟踪一次平台披露规则和数字分身政策变化，并及时更新模板。
team:
- role: 创始人 / CEO
  startTiming: Month 0
  rationale: 亲自扛起创始人亲自打单、共创伙伴发现、工作流 映射和早期包装，因为采购方真需求才是公司当前最大的风险。
- role: 创始工程师
  startTiming: Month 0
  rationale: 把 Comfy 节点、来源抓取层和导出关口基础设施做出来，这是切口能不能成立的底座。
- role: 产品与合规工程师
  startTiming: Month 3
  rationale: 把客户的审批 工作流 翻译成可灵活配置的策略、审计产物和 来源证明 输出，而不是一堆一次性代码。
- role: 解决方案工程师
  startTiming: Month 6
  rationale: 缩短试点部署时间，支持代理公司 工作流 映射，并把定制化 配置工作 沉淀为能复用的实施模式。
- role: 客户成功与策略运营
  startTiming: Month 9
  rationale: 一旦多个生产账户同时发布，就接手模板维护、培训和续约支持。
milestones:
- horizon: 0–12 个月
  items:
  - 完成 15 个 ICP 访谈，并在滩头签下 3 个付费共创试点
  - 交付面向合成代言人视频 工作流 的 MVP 节点、来源抓取和客户可审阅审计包
  - 在生产试点里证明 工作流 额外开销低于 10%，且审批资料准备时间至少下降 50%
  - 至少把 2 个试点转为年度部署，并公开 1 个可引用案例
- horizon: 12–24 个月
  items:
  - 补上审批路由、策略例外、兼容 C2PA 的导出和 工作区 仪表板
  - 赢下 10 到 15 家付费代理公司账户，并把客户发布流程跑成能重复动作，同时建立至少 1 个生态分发伙伴
  - 用同一套策略引擎落地首个品牌方内部工作室部署
- horizon: 24–36 个月
  items:
  - 扩展到相邻媒体 工作流 和精选的非 Comfy 集成，同时守住控制平面定位
  - 发布多 工作区 控制、保留策略和合作模型 白名单 等企业治理能力
  - 通过 广告项目 量级扩张和 工作区 增长，证明早期客户存在净留存
risks:
- risk: 人工审核和既有运营工具对大多数代理公司来说依然够用
  likelihood: High
  impact: High
  mitigation: 只盯最近确实被客户审批卡过的账户，并在试点里把审批周期 ROI 做成能量化指标。
- risk: 预算归口不清会拉长成单并压低定价
  likelihood: High
  impact: High
  mitigation: 把价值包装成发布加速和客户留存结果，直接对创意运营负责人讲，并对付费试点做严格资格筛选。
- risk: Comfy 平台改动或原生功能会削弱差异化
  likelihood: Medium
  impact: High
  mitigation: 先建立在文档完备的 API 上，把策略和审计层牢牢抓在自己手里，并在产品 验证结果 之后准备向 Comfy 之外扩。
- risk: 客户会把产品高估成法律建议或完整合规覆盖
  likelihood: Medium
  impact: High
  mitigation: 策略必须可灵活配置，例外场景必须人工审批，并始终把软件定位成证据基础设施，而不是法律判断。
- risk: 封闭创作平台会吃掉够多用例，压缩开放 工作流 机会
  likelihood: Medium
  impact: Medium
  mitigation: 先服务今天就需要开放、多模型 工作流 的客户；只有滩头跑顺后，再做跨工具扩张。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这笔 18 个月资金会覆盖一支精干的创始团队、3 到 5 个付费试点、更稳的 Comfy 集成、审计与策略基础设施、早期伙伴分发测试，以及够多的客户验证，用来判断这到底会长成风险投资级控制平面，还是一个更窄的工作流软件生意。
