businessModelCanvas:
  customerSegments: [AI-native performance marketing agencies, in-house brand genAI studios, post-production teams using ComfyUI]
  valuePropositions: [Workflow-level consent and rights enforcement, client-ready provenance audit trails, policy gates before export]
  channels: [Comfy custom node distribution, direct sales to agency leaders, ecosystem partnerships with model and workflow consultants]
  customerRelationships: [High-touch onboarding, compliance playbook setup, workflow policy templates]
  revenueStreams: [Annual SaaS subscriptions, usage fees per verified likeness or approved export, premium enterprise compliance modules]
  keyResources: [Comfy node integration, rights policy engine, provenance datastore, agency design partners]
  keyActivities: [Build workflow integrations, maintain audit and policy logic, support enterprise onboarding, expand partner ecosystem coverage]
  keyPartners: [Comfy ecosystem developers, talent consent vendors, legal and IP advisors, model providers]
  costStructure: [Engineering, security and compliance, customer success, partner integrations]
jobsToBeDone:
  - job: When a client asks for proof behind an AI-generated ad, help creative operations leads produce a complete consent and provenance record, so they can ship on time without manual reconstruction.
    currentAlternative: Manual document collection across spreadsheets, drive folders, and Slack
    successMetric: Time to client approval
  - job: When a producer launches a workflow that uses a synthetic spokesperson or licensed asset, help the team enforce approved rights policies before render, so they can avoid rework and legal escalation.
    currentAlternative: Internal checklists and human review before final export
    successMetric: Percentage of risky jobs blocked before release
ideaScorecard:
  signalStrength:
    score: 5
    rationale: Multiple independent signals point to controllable workflows, multimodal production, and embedded identity verification becoming core product behavior.
  painIntensity:
    score: 4
    rationale: The pain is acute for teams shipping client work with real-person likeness and licensed assets because failed approvals directly delay revenue.
  wedgeClarity:
    score: 5
    rationale: A Comfy-native node and policy layer is a narrow, concrete entry point with a clear first workflow and distribution path.
  defensibility:
    score: 4
    rationale: Embedded workflow data, accumulated audit history, and policy templates create switching costs, though platform dependence remains a risk.
  ventureScale:
    score: 4
    rationale: The beachhead is narrow, but the control plane can expand into the broader system of record for AI media rights and provenance across many verticals.
topRisks:
  - name: Platform dependence
    description: If Comfy changes APIs or builds native compliance features, the initial wedge could narrow.
    mitigation: Build on documented cloud and registry hooks first, own the policy and audit data layer, and expand to adjacent creative tools once the workflow model is proven.
  - name: Budget owner ambiguity
    description: Creative ops, legal, and production leaders may all feel the pain without clearly owning the budget.
    mitigation: Sell against campaign approval delays and client retention, package the product as release acceleration rather than generic compliance software, and land with agencies where one operator wears multiple hats.
  - name: False sense of compliance
    description: Customers may expect the product to replace legal judgment across all jurisdictions and rights edge cases.
    mitigation: Position the system as workflow enforcement and evidence infrastructure, ship configurable policy templates with counsel review, and integrate human approval steps for high-risk cases.
