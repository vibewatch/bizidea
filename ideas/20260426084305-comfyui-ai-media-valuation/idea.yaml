differentiator: Most AI media compliance products sit after creation and inspect finished files, which misses the real source of risk in node choices, model versions, and upstream asset rights. This product lives inside the workflow graph, where it can block bad runs before they ship and capture evidence automatically as work happens. Comfy's open node ecosystem also creates a distribution wedge, because agencies can adopt the product as a node instead of replacing their stack. That makes the initial product lightweight to deploy but structurally embedded once approvals and audit history accumulate.
conceptDiagram:
  title: Rights control inside the media graph
  mermaid: |
    flowchart LR
