adoptionFrictionMatrix:
- friction: Trusting a machine to release creator payment
  severity: high
  affectedBuyer: VP Marketing / Finance
  mitigation: Start with hold-or-approve recommendations and threshold-based human review before enabling full auto-release.
  sourceRefs:
  - 24
  - 41
  - 94
  - 95
- friction: Messy contract templates and brand-specific compliance language
  severity: high
  affectedBuyer: Marketing ops lead
  mitigation: Build template onboarding, clause normalization, and exception rules per brand before promising one-click rollout.
  sourceRefs:
  - 38
  - 47
- friction: API coverage gaps across creator account types and platforms
  severity: high
  affectedBuyer: Marketing ops / systems owner
  mitigation: Prioritize creators using business or creator accounts and route ambiguous cases into human review.
  sourceRefs:
  - 86
  - 92
- friction: False positives on skincare and wellness claims
  severity: high
  affectedBuyer: Legal / brand compliance
  mitigation: Tie model outputs to an explicit FTC/FDA claim library and require manual review for low-confidence content.
  sourceRefs:
  - 76
  - 79
- friction: Existing suite or agency relationships reduce switching appetite
  severity: medium
  affectedBuyer: Head of Creator Marketing
  mitigation: Sell as an overlay with exports and alerts that fit inside existing GRIN, Aspire, or agency workflows.
  sourceRefs:
  - 48
  - 51
  - 54
  - 69
