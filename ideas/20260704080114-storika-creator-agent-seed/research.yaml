competitors:
- name: Storika
  stage: seed
  wedge: AI-native creator orchestration for D2C brands spanning discovery, outreach, and tracking.
  pricing: Private beta; pricing not public.
  strength: Strong AI-native narrative with beauty-adjacent strategic backing and clear D2C focus.
  weaknessVsUs: Broader orchestration focus makes it heavier than a vendor-neutral contract-verification and payment-release overlay.
  sourceRefs:
  - 44
  - 45
  - 46
  - 47
- name: CreatorIQ
  stage: incumbent
  wedge: Enterprise creator marketing platform focused on scale, governance, and analytics.
  pricing: Custom quote; request-demo motion.
  strength: Deep enterprise credibility and broad workflow coverage.
  weaknessVsUs: High surface area and migration cost for buyers who only need compliance proof and payout controls.
  sourceRefs:
  - 48
  - 49
- name: GRIN
  stage: scale-up
  wedge: DTC-oriented creator management spanning discovery, gifting, ambassadors, and campaigns.
  pricing: Custom quote / public pricing not surfaced.
  strength: Strong ecommerce and DTC orientation with proven customer stories.
  weaknessVsUs: Optimized for creator CRM and growth workflows rather than auditable pre-payout compliance review.
  sourceRefs:
  - 51
- name: Aspire
  stage: scale-up
  wedge: E-commerce influencer platform with campaign automation and collaboration workflows.
  pricing: Custom quote; request-demo motion.
  strength: Clear ecommerce positioning plus automation claims around manual campaign work.
  weaknessVsUs: Campaign-management-first product; verification and payout controls appear embedded rather than standalone.
  sourceRefs:
  - 54
  - 55
  - 57
- name: Modash
  stage: scale-up
  wedge: Affordable discovery and monitoring tool with public pricing and lightweight entry point.
  pricing: $299-$599/mo self-serve; enterprise from $14.7k/yr.
  strength: Pricing transparency and ease of adoption for leaner teams.
  weaknessVsUs: Lighter legal and contract-compliance depth than a dedicated audit-and-payment product.
  sourceRefs:
  - 64
  - 65
