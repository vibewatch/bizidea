jobsToBeDone:
- job: 当 D2C 品牌的网红项目规模超出人工追踪的承受范围，帮营销运营负责人核验每一份创作者交付物是否符合合同条款，让放款更有底气，不必再担心法律或财务风险。
  currentAlternative: 运营协调员靠手工截图审查和表格追踪
  successMetric: 发帖 24 小时内完成核验的创作者交付物占比，以及付款纠纷和坏账的下降幅度
- job: 当品牌法务或合规团队担心大规模创作者项目里出现 FTC 披露违规，帮他们证明每条在线帖子都满足披露要求，从而避开监管和声誉风险。
  currentAlternative: 定期人工抽查一小部分帖子
  successMetric: 已核验、合规披露覆盖的在线创作者帖子占比
ideaScorecard:
