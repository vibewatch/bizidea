  ventureScale:
    score: 4
    rationale: 这个切口能从核验扩展到跨多个垂直领域的放款编排和分析，具备走向大型多产品平台的可信路径。
topRisks:
- name: 现有厂商功能捆绑
  description: Storika、GRIN 或 CreatorIQ 都可能把交付物核验和放款功能，作为现有编排平台的一部分加进去，让这个独立切口变得没有差异化。
  mitigation: 加快速度，把自己做成合规证据的记录系统，用审计留痕制造切换成本；以厂商中立叠加层的身份接入所有主流创作者 CRM，而不是去拼发现广度。
- name: AI 核验准确率
  description: 多模态模型可能把披露、标签或交付物匹配判断错，产生的误判会侵蚀品牌对自动放款的信任。
  mitigation: 对低置信度匹配保留人工复核队列，持续用各品牌的合同模板重新训练模型，再扩大自动放款的阈值。
- name: 切口天花板偏窄
  description: 如果品牌不愿意把预算从审计工具往外扩，单靠交付物核验这一件事，产品可能撑不起创投级别的增长。
  mitigation: 从第一天起就把路线图设计成落地-再扩张：先在第一个垂直领域建立信任，再扩展到放款编排和创作者效果分析。
