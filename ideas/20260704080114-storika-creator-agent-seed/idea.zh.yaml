  painIntensity:
    score: 4
    rationale: 报道明确点名手工谈判和交付物追踪是持续存在的痛点，未付款或不合规的交付物会给品牌带来直接的财务和法律风险。
  wedgeClarity:
    score: 4
    rationale: 滩头市场和首个工作流（单一垂直领域的交付物核验与放款）足够窄、足够具体，能快速研究和试点，和大而全的平台型对手区分明显。
  defensibility:
    score: 3
