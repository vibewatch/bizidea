problem: D2C 品牌常年跑微网红项目，如今每季度要签 100 多份创作者合同；但要核实每个创作者是否真的发了约定内容、打对了话题标签、披露了合作关系、赶上了使用权窗口期，靠的还是人工翻截图、翻私信。这带来两种代价高昂的失误：品牌为根本没达标的交付物付了钱，或者在帖子缺少 FTC 要求的披露标签时依然放款，让品牌暴露在法律风险里。这两个问题，靠专注发现创作者的平台都解决不了——它们的优化目标是找人、拉新，不是核验实际交付了什么。
targetUser:
  primary: 年营收 $20M-150M 的 D2C 美妆或健康品牌的网红/创作者营销负责人
  secondary: 靠手工截图核对创作者帖子是否符合合同条款的营销运营协调员
  buyer: 掌管网红项目预算和放款审批权的市场 VP 或创作者营销负责人
startupThesis:
  nonObviousInsight: 市场正在向 Storika 这类大而全的 AI 创作者编排平台集中，品牌得把整个创作者 CRM 都搬过去才能拿到价值；但 Storika 自己这轮融资的报道里，点出的痛点是手工谈判和交付物追踪，不是发现。品牌不缺创作者，缺的是一种可信、够快的方式，能在放款前证明交付物真的达标。多模态 AI 现在已经能读懂一条公开帖子，并对照合同条款去核验，成本低到足以撑起一个独立的轻量核验放款层——不需要七百万档案的创作者数据库，也不需要触达引擎。
  beachhead: 年营收 $20M-150M、每季度在 Instagram 和 TikTok 上同时跑 100-500 份微网红合同的 D2C 美妆和健康品牌营销运营负责人
  wedge: 一款 AI 合规副驾：吃进创作者合同和实时帖子，对照签约条款核验交付物（标签、FTC 披露、使用权、发布窗口期），然后自动放款，或把异常标记给品牌的营销运营团队
  whyNowCatalyst: Storika 拿到融资的 AI 编排器证明了品牌预算确实愿意为 AI 原生创作者工具买单，而同一篇报道又点出交付物和谈判追踪——而非发现——才是还没解决的手工痛点。
  ventureScalePath: 先从一个垂直领域（D2C 美妆与健康）的核验放款叠加层做起，证明审计留痕能减少纠纷和坏账，再扩展到完整的创作者放款编排、跨平台效果分析，最终成为服务任何跑分布式创作者项目的品牌或代理机构的多垂直合规与支付主干。
solution: 产品接入品牌现有的创作者 CRM 或表格，吃进每份签约合同的交付物清单（平台、帖子类型、标签、必需披露、使用权窗口期、发布截止时间）。它通过平台 API 和计算机视觉模型监控创作者的公开帖子，自动核对实际发布内容与合同约定是否一致，在发布后几小时内（而不是几周后）标出 FTC 披露缺失、标签漏打或发帖迟到。核验通过的交付物会触发一个批准信号，接入品牌现有的支付或开票工具，让运营团队带着可审计的合规留痕放款。异常情况会路由到人工复核队列，并高亮具体的不匹配之处，这样营销运营团队只需要处理少数含糊案例，不用再一条条截图核对。
goToMarketSeed:
  firstCustomer: 年营收 $20M-150M、每季度管理 100-500 份在跑微网红合同的 D2C 美妆或健康品牌网红/创作者营销负责人
  buyingTrigger: 品牌的创作者项目规模超出一个运营人员手工截图核对的极限，或者因为给不合规帖子放了款、收到 FTC 披露投诉而吃了一次坏账
  currentAlternative: 手工表格加 Slack/私信追踪，外加 Storika、GRIN 或 CreatorIQ 这类大而全的创作者 CRM——但品牌并没有把合规流程真正迁移过去
  switchingReason: 以轻量叠加层的形式，几天内就能部署在品牌已有工具之上，只盯住最烧钱的一步——交付物核验和放款——不需要整体平台迁移
  pricingHypothesis: 按品牌订阅，价格挂钩已核验交付物/创作者合同的量级档位，放款编排作为附加模块单独收费
