categoryDynamics:
  growthRate: 2025 年美国网红营销支出增速 15.0%
  growthRateSourceRefs:
  - 2
  tailwinds:
  - point: 对很多广告主来说，创作者已经从『可以试试』变成『必须买』，创作者预算占比还在继续上升。
    sourceRefs:
    - 1
    - 7
  - point: 美妆和个护已经是社交电商里最重要的品类之一，在 TikTok Shop 上尤其如此。
    sourceRefs:
    - 21
    - 22
  - point: 纳米级和微网红在美妆领域的互动表现更好，这推高了合同数量，也让人工质检更难扛住。
    sourceRefs:
    - 12
  headwinds:
  - point: 归因和 ROI 测量依然是持续存在的痛点，可能拖慢新软件品类的预算扩张速度。
    sourceRefs:
    - 25
  - point: 政策和 API 依赖意味着，一旦平台调整披露机制或访问规则，核验覆盖率就可能跟着变化。
    sourceRefs:
    - 82
    - 86
    - 92
  - point: 市场仍在增长，但增速正在走向成熟，买家会要求看到可衡量的效率提升，而不只是功能新鲜感。
    sourceRefs:
    - 2
competitors:
- name: Storika
  stage: seed
  wedge: 面向 D2C 品牌的 AI 原生创作者编排，覆盖发现、触达和追踪。
  pricing: 私测阶段；定价未公开。
  strength: AI 原生叙事有说服力，有美妆相邻的战略投资背书，D2C 定位清晰。
  weaknessVsUs: 更宽的编排定位，让它比一层厂商中立的合同核验放款叠加层更重。
  sourceRefs:
  - 44
  - 45
  - 46
  - 47
- name: CreatorIQ
  stage: incumbent
  wedge: 面向企业级客户的创作者营销平台，聚焦规模化、治理和分析。
  pricing: 定制报价；预约演示模式。
  strength: 深厚的企业级信誉，工作流覆盖面广。
  weaknessVsUs: 对只需要合规证据和放款控制的买家来说，功能面太大、迁移成本太高。
  sourceRefs:
  - 48
  - 49
- name: GRIN
  stage: scale-up
  wedge: 面向 DTC 的创作者管理，覆盖发现、礼赠、大使和营销活动。
  pricing: 定制报价／未公开定价。
  strength: 电商和 DTC 定位突出，客户案例扎实。
  weaknessVsUs: 优化方向是创作者 CRM 和增长工作流，而不是放款前的可审计合规复核。
  sourceRefs:
  - 51
- name: Aspire
  stage: scale-up
  wedge: 电商网红平台，具备营销活动自动化和协作工作流。
  pricing: 定制报价；预约演示模式。
  strength: 电商定位清晰，并宣称能自动化大量手工营销活动工作。
  weaknessVsUs: 产品以营销活动管理为先；核验和放款控制看起来是内嵌功能，而不是独立能力。
  sourceRefs:
  - 54
  - 55
  - 57
- name: Modash
  stage: scale-up
  wedge: 价格亲民的发现与监控工具，定价公开，上手门槛低。
  pricing: 自助套餐每月 $299-$599；企业版起价每年 $14.7k。
  strength: 定价透明，对精简团队来说容易上手。
  weaknessVsUs: 法务和合同合规的深度，比一款专门的审计放款产品要浅。
  sourceRefs:
  - 64
  - 65
regulatoryTechnicalConstraints:
- point: FTC 规则要求清晰披露实质关联，广告主对遗漏或含糊的披露同样要担责。
  sourceRefs:
  - 73
  - 74
- point: 美妆与健康类创作者话术，很容易从化妆品措辞滑向药品级话术，这逼着复核逻辑更严格。
  sourceRefs:
  - 76
  - 79
- point: 当创作者使用商业或创作者账户、通过 Business Discovery 暴露公开字段时，Instagram 的核验能力最强。
  sourceRefs:
  - 86
- point: TikTok 的覆盖能力依赖官方公开视频 API 访问权限和品牌内容政策约束，而不是不受限制的抓取。
  sourceRefs:
  - 82
  - 92
- point: 自动放款需要先过身份核验和税务信息采集这两道关，资金才能安全流动。
  sourceRefs:
  - 94
  - 95
  - 97
  - 99
validationSignals:
- point: Storika 的种子轮融资和爱茉莉太平洋的参投，证明品牌和投资人依然愿意为 AI 原生创作者运营工具出资。
  sourceRefs:
  - 44
- point: LTK 和西北大学的研究发现，创作者预算已经占据数字支出的很大份额，且预计还会继续上升。
  sourceRefs:
  - 7
- point: e.l.f. 旗下 rhode 的岗位设置说明，美妆品牌仍在为手工创作者运营工作专门配备人力。
  sourceRefs:
  - 28
- point: Circana 称 TikTok Shop 已占美妆电商销售额的 10%，这让创作者帖子的质量与营收的关系更加直接。
  sourceRefs:
  - 21
- point: ASA 对 5 万条帖子的审计显示，即便平台和监管指导已经推行多年，披露失误依然常见。
  sourceRefs:
  - 23
openQuestions:
- 在头 12 个月里，有多大比例的滩头市场买家会授权自动放款，而不是只用纯提醒式审批？
- 目标创作者中，有多大比例使用能支撑 Instagram 和 TikTok 可靠核验所需的账户类型和元数据？
- 在必须切回人工复核之前，品牌法务团队对披露和护肤功效话术检查能容忍多高的误判率？
- 一个以表格为先的集成切口，能否比和现有创作者套件做正式集成落地更快？
- 代理机构会把这个产品当作内部运营基础设施，还是视为对其可计费托管服务业务的威胁？
