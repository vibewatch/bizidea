fiveForces:
  supplierPower:
    score: 3
    rationale: API 和放款服务商确实重要，但 Meta、TikTok 和 Stripe 开放的都是相对标准的接口，不是完全私有、封闭的分发通道。
    sourceRefs:
    - 86
    - 92
    - 94
  buyerPower:
    score: 4
    rationale: 品牌可以继续用手工工作流，可以外包给代理机构，也可以买更宽的创作者套件；它们本来就在给创作者支出施压，要求证明 ROI。
    sourceRefs:
    - 24
    - 25
    - 69
    - 70
  threatOfEntrants:
    score: 3
    rationale: AI 降低了产品搭建的成本，但合规专业知识、合同规范化和放款信任，仍构成不小的门槛。
    sourceRefs:
    - 76
    - 86
    - 94
  threatOfSubstitutes:
    score: 5
    rationale: 表格、代理机构和大而全的创作者套件，都是根深蒂固、足以替代一层窄口径叠加层产品的选择。
    sourceRefs:
    - 46
    - 51
    - 54
    - 69
  competitiveRivalry:
    score: 4
    rationale: 已经有多家拿到融资的套件在服务同一批买家，尽管很少有厂商主打厂商中立的合同核验和放款控制。
    sourceRefs:
    - 44
    - 48
    - 51
    - 54
    - 64
pestle:
- factor: 政治
  impact: neutral
  point: 披露审查趋严，但主要影响是让市场对可审计性的需求上升，而不是让创作者营销被叫停。
  sourceRefs:
  - 23
  - 73
- factor: 经济
  impact: negative
  point: 创作者支出仍在增长，但 eMarketer 显示这个市场正在走向成熟，软件必须证明自己的效率，不能假设预算会无限扩张。
  sourceRefs:
  - 2
- factor: 社会
  impact: positive
  point: 美妆的发现和购买越来越依赖社交和电商联动，这让保持创作者帖子合规且持续在线的价值变得更高。
  sourceRefs:
  - 21
  - 22
- factor: 技术
  impact: positive
  point: 专业账户 API 加上现代多模态复核，让一个窄口径工作流工具在帖子层面做核验变得可行。
  sourceRefs:
  - 86
  - 92
  - 94
- factor: 法律
  impact: negative
  point: 一旦创作者措辞超出获批范围，广告主在披露和健康话术方面依然要担责。
  sourceRefs:
  - 73
  - 76
  - 79
adoptionFrictionMatrix:
- friction: 信任机器来放创作者的款
  severity: high
  affectedBuyer: 市场 VP / 财务
  mitigation: 先从暂扣或批准建议做起，配合基于阈值的人工复核，再开启全面自动放款。
  sourceRefs:
  - 24
  - 41
  - 94
  - 95
- friction: 合同模板混乱，各品牌合规措辞又各不相同
  severity: high
  affectedBuyer: 营销运营负责人
  mitigation: 在承诺一键上线之前，先针对每个品牌搭建模板上线、条款规范化和异常规则。
  sourceRefs:
  - 38
  - 47
- friction: 各类创作者账户和平台间存在 API 覆盖缺口
  severity: high
  affectedBuyer: 营销运营/系统负责人
  mitigation: 优先支持使用商业或创作者账户的创作者，把含糊案例路由进人工复核。
  sourceRefs:
  - 86
  - 92
- friction: 护肤和健康功效话术的误判
  severity: high
  affectedBuyer: 法务/品牌合规
  mitigation: 把模型输出和一份明确的 FTC/FDA 话术库绑定，对低置信度内容要求人工复核。
  sourceRefs:
  - 76
  - 79
- friction: 已有的套件或代理机构关系，降低了切换意愿
  severity: medium
  affectedBuyer: 创作者营销负责人
  mitigation: 把产品当作一层带导出和提醒功能的叠加层来卖，嵌入品牌现有的 GRIN、Aspire 或代理机构工作流。
  sourceRefs:
  - 48
  - 51
  - 54
  - 69
market:
  tam:
    value: $350.0M
    rationale: 自下而上测算：$10.52B 美国网红营销支出 [2] ÷ 每个规模化品牌约 $600k 的年度创作者支出（每年 800 份创作者合同 × 按 Shopify 2026 微网红与中腰部区间估算的约 $750 混合合同价值 [42]）≈ 17,500 个项目；× 建模 $20k 的叠加层 ARR（锚定在 Modash $14.7k 企业底价和更高触达合规工作流之间 [64]）= 约 $350M。
    isEstimate: true
    sourceRefs:
    - 2
    - 42
    - 64
  sam:
    value: $18.0M
    rationale: 滩头市场筛选：17,500 个项目 × 估算 10% 的美妆与健康占比（有美妆专项创作者基准和社交电商渗透率数据支撑 [12][21][22]）× 估算 50% 的中市场/高量级筛选 ≈ 约 900 个品牌；× $20k ARR ≈ $18M。
    isEstimate: true
    sourceRefs:
    - 12
    - 21
    - 22
    - 64
  som:
    value: $1.8M
    rationale: 第 3 年可触达份额：90 个品牌，约为建模 SAM 客户数的 10%，靠创始人主导外呼加代理机构合作拿下，每个品牌 $20k ARR。
    isEstimate: true
    sourceRefs:
    - 64
    - 69
    - 70
bottomUpSizingDrivers:
