topRisks:
  - name: "Incumbent feature bundling"
    description: "Storika, Grin, or CreatorIQ could add deliverable-verification and payment-release features as part of their existing orchestration platforms, commoditizing the standalone wedge."
    mitigation: "Move fast to become the system-of-record for compliance evidence with an audit trail that creates switching cost, and integrate as a vendor-neutral overlay across all major creator CRMs rather than competing on discovery breadth."
  - name: "AI verification accuracy"
    description: "Multimodal models may misclassify disclosures, hashtags, or deliverable matches, producing false positives or negatives that erode brand trust in automated payment release."
    mitigation: "Keep a human-in-the-loop review queue for low-confidence matches and continuously retrain on brand-specific contract templates before expanding auto-release thresholds."
  - name: "Narrow wedge ceiling"
    description: "Deliverable verification alone may be too thin a product to sustain venture-scale growth if brands do not expand spend beyond audit tooling."
    mitigation: "Design the roadmap from day one to land-and-expand into payment orchestration and creator performance analytics once trust is established with the first vertical."
