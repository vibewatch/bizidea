modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Leads[Founder outbound + agency intros] --> Pilots[Paid pilots]
      Pilots --> Annuals[Annual overlay subscriptions]
      Annuals --> AddOn[Payout-control attach]
      Annuals --> Revenue[Subscription revenue]
      AddOn --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: "Revenue engine"
  finding: "Base-case revenue is driven by paid pilots converting into $24K overlay subscriptions and then lifting toward a $30K blended revenue stream as payout-control attach reaches about 35% by Q4Y3."
- checkName: "Must go right"
  finding: "Pilot-to-annual conversion and agency referrals must get Storika to 20 paying brands by Q4Y2 before the fixed team outgrows the revenue base."
- checkName: "Model breaks if"
  finding: "If the product stays alerts-only and payout-control attach misses, the downside scenario turns cash negative before the Y3 scale milestone is reached."
- checkName: "Next-round proof"
  finding: "A seed round is justified once Storika shows 20 paying brands, 3 live payout-control customers, 2 agency pilots, and low-override audit accuracy by Q4Y2."
sanityChecks:
  ruleOf40: "Y3 growth 400% + EBITDA margin -7% = 393%; mathematically strong but inflated by the very small Y2 revenue base."
  burnMultiple: "Y2 burn multiple 3.4x, improving to 0.1x in Y3 as pilot conversion and payout-control mix absorb the fixed team."
  revenuePerFte: "$239K Y3 using 8 FTE at Q4Y3 (benchmark $200-400K SaaS)."
  flags:
  - "Even with 86 paying brands, Y3 revenue is only about $1.9M, so the venture case still depends on agency volume, richer payout controls, or adjacent-category expansion beyond the initial wedge."
  - "The base case assumes payout-control attach lifts blended economics above the $20K overlay anchor from research; if buyers stay alerts-only, EBITDA remains materially negative."
  - "Q4Y3 assumes 86 paying brands supported by an 8-FTE team, so onboarding and exception review automation must work or headcount and burn will need to rise faster than modeled."
