scenarios:
  downside:
    description: "Pilot-to-annual conversion slips, payment-control trust lags, and agency referrals scale later than planned."
    y3RevenueK: 1237.2
    y3EbitdaK: -650.7
    cashLowPointK: -45.9
    keyAssumptionChanges:
    - "Y2 exits at 16 paying brands and Y3 exits at 60 instead of 86."
    - "Blended realized revenue per brand is 5%-8% lower because payout-control attach arrives later."
    - "Gross margin stays roughly 3 points below base because exception review remains more manual."
  base:
    description: "Pilots convert on time, Y2 ends at 20 paying brands, and payout-control attach plus agency mix lift blended revenue through Y3."
    y3RevenueK: 1909.2
    y3EbitdaK: -136.5
    cashLowPointK: 388.2
    keyAssumptionChanges:
    - "The company reaches 5 paying brands by M12, 20 by Q4Y2, and 86 by Q4Y3."
    - "Base subscription pricing holds at $24K ARR and payout-control attach reaches about 35% by Q4Y3."
    - "Hiring stays lean at 8 FTE by Q4Y3 so the company approaches breakeven without a large services bench."
  upside:
    description: "Agency referrals accelerate in Y2 and payout-control attach lifts both blended revenue and margin faster than planned."
    y3RevenueK: 2233.5
    y3EbitdaK: 114.9
    cashLowPointK: 548.4
    keyAssumptionChanges:
    - "Y2 exits at 24 paying brands and Y3 exits at 92 because agencies introduce more qualified programs."
    - "Blended realized revenue per brand rises to $8.2K-$9.0K per quarter in Y3 as payout-control attach lands earlier."
    - "Gross margin reaches 73% by Q4Y3 as onboarding templates and clause libraries standardize faster."
