slug: "creator-deliverable-compliance-copilot"
date: "2026-07-04"
currency: "USD"
modelStartMonth: "2026-08"
assumptions:
- id: "A1"
  name: "Model start month"
  value: "2026-08"
  unit: "YYYY-MM"
  source: "[BP date 2026-07-04] the model starts with the first full operating month after the dated business plan."
- id: "A2"
  name: "Opening cash / pre-seed raise"
  value: "$2.4M"
  unit: "USD"
  source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses a lower-end $2.4M pre-seed sized to reach the 15-20 brand milestone with roughly six months of cash buffer."
- id: "A3"
  name: "Starting paying brands"
  value: "0"
  unit: "count"
  source: "[BP executiveSummary + BP milestones 0-12 months] Storika starts pre-revenue and must first win paid design partners."
- id: "A4"
  name: "Paying brand definition"
  value: "A paid pilot, annual overlay subscription, or agency-routed brand deployment already under monitoring."
  unit: "definition"
  source: "[BP gtm.wedge + BP businessModel.revenueStreams] customersEop counts any brand already paying for pilot or production scope."
- id: "A5"
  name: "Paid pilot price"
  value: "$10K over 90 days (~$3.3K/month)"
  unit: "USD/brand"
  source: "[BP investorMemo.firstCustomer.initialContract $8k-$12k] the model uses the midpoint of the public pilot range."
- id: "A6"
  name: "Base annual overlay subscription"
  value: "$24K ARR"
  unit: "USD/brand/year"
  source: "[BP gtm.pricing anchored around roughly $20k ARR + BP investorMemo.firstCustomer.initialContract $20k-$30k annual subscription] the base case uses a slightly upmarket midpoint for brands that convert from pilot."
- id: "A7"
  name: "Payment-control add-on attach"
  value: "$10K ARR when attached; ~0% in Y1, ~15% by Q4Y2, and ~35% by Q4Y3"
  unit: "USD/brand/year"
  source: "[BP product.twelveMonth + BP milestones 0-12 and 12-24 months + Research reportMemo.partnershipEcosystem] payout controls begin only after trust is proven and then attach gradually through Y3."
- id: "A8"
  name: "Revenue recognition convention"
  value: "Period-end paying brands × blended realized revenue per brand: Y1 $2.7K-$3.5K per month, Y2 $6.9K-$7.8K per quarter, Y3 $7.8K-$8.7K per quarter."
  unit: "formula"
  source: "[A5-A7 + Research reportMemo.willingnessToPay + Research market.som] this keeps revenue directly tied to customer count and the pilot-to-annual plus add-on mix."
- id: "A9"
  name: "Y1 paying-brand ramp"
  value: "0,0,0,1,2,3,3,4,4,5,5,5"
  unit: "customersEop"
  source: "[BP milestones 0-12 months + BP gtm.funnelTargets] the base case reaches 5 paying brands by the end of Y1 after 3-5 paid pilots and at least 3 annual conversions."
- id: "A10"
  name: "Y2 paying-brand ramp"
  value: "Q1-Q4 = 6,10,15,20"
  unit: "customersEop"
  source: "[BP milestones 12-24 months reach 15-20 paying brands or 2 agencies] the base case exits Y2 at the top of the stated milestone band."
- id: "A11"
  name: "Y3 paying-brand ramp"
  value: "Q1-Q4 = 30,46,66,86"
  unit: "customersEop"
  source: "[BP milestones 24-36 months reach 75-90 paying brands + Research market.som 90 brands] the base case exits Y3 near the upper end of the modeled SOM range."
- id: "A12"
  name: "Gross margin ramp"
  value: "Y1 50%-58%; Y2 62%-68%; Y3 69%-72%"
  unit: "gross margin percent"
  source: "[BP businessModel.targetGrossMarginPct 70 + BP operations + startup-finance heuristic] onboarding and exception review are manual early, then reusable rule templates and monitoring jobs pull the model toward the 70% target."
- id: "A13"
  name: "Hiring timeline"
  value: "M1 founder and founding engineer; M3 applied AI engineer; M6 implementation lead; M9 GTM and partnerships lead; M15 third engineer; M24 G&A and ops; M33 second implementation hire"
  unit: "timeline"
  source: "[BP team startTiming + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays lean until pilot conversion, payment trust, and agency proof are visible."
- id: "A14"
  name: "Founder loaded annual compensation"
  value: "$135K"
  unit: "USD/year"
  source: "[BP team Founder / CEO + startup-finance heuristic] below-market founder cash compensation with payroll tax and benefits included."
- id: "A15"
  name: "Engineering loaded annual compensation"
  value: "$170K per FTE"
  unit: "USD/FTE/year"
  source: "[BP team Founding engineer + Applied AI engineer + startup-finance heuristic] enough to recruit senior integration and applied-AI talent while still staying pre-seed lean."
- id: "A16"
  name: "Implementation loaded annual compensation"
  value: "$125K per FTE"
  unit: "USD/FTE/year"
  source: "[BP team Implementation lead + startup-finance heuristic] reflects technical onboarding and customer-success ownership without building a services-heavy bench."
- id: "A17"
  name: "GTM loaded annual compensation"
  value: "$145K per FTE"
  unit: "USD/FTE/year"
  source: "[BP team GTM / partnerships lead + BP gtm.channels + startup-finance heuristic] covers focused outbound and agency-partnership work in a narrow market."
- id: "A18"
  name: "G&A loaded annual compensation"
  value: "$100K per FTE"
  unit: "USD/FTE/year"
  source: "[BP operations + startup-finance heuristic] covers basic finance, insurance, vendor, and compliance operations."
- id: "A19"
  name: "Payroll allocation to P&L lines"
  value: "Founder 55% S&M / 20% R&D / 25% G&A; engineering 100% R&D; implementation 60% S&M / 40% R&D; GTM 100% S&M; G&A 100% G&A."
  unit: "allocation"
  source: "[BP team role rationales + BP operations] this maps the small team into the functional expense lines while keeping total salary internally consistent."
- id: "A20"
  name: "Non-payroll opex ramp"
  value: "Monthly non-payroll spend rises from S&M/R&D/G&A of $4K/$7K/$5K to $15K/$16K/$9K by Q4Y3."
  unit: "USD/month"
  source: "[BP operations + startup-finance heuristic] covers cloud inference, social API vendors, travel, legal, insurance, and finance tooling without assuming a large paid-demand engine."
- id: "A21"
  name: "Cash conversion convention"
  value: "Cash movement equals EBITDA"
  unit: "formula"
  source: "[startup-finance heuristic] capex, taxes, financing fees, and working-capital swings are assumed immaterial at this stage."
- id: "A22"
  name: "Steady-state monthly churn"
  value: "2.0%"
  unit: "percent per month"
  source: "[startup-finance heuristic for early workflow SaaS + BP strategicChoices.sequencingRationale] once embedded into payout approvals the workflow should be sticky, but the model stays conservative versus mature compliance software."
- id: "A23"
  name: "CAC convention"
  value: "36-month sales and marketing spend divided by 86 net new paying brands = about $13K CAC"
  unit: "formula"
  source: "[model calc + BP gtm.funnelTargets] blended CAC stays low only if founder-led outbound and agency introductions keep working."
- id: "A24"
  name: "Next-round milestone for funding sizing"
  value: "20 paying brands, roughly 3 payout-control customers, and 2 agency pilots by Q4Y2"
  unit: "milestone"
  source: "[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP investorMemo.verdict.nextDiligence] the ask is sized to reach seed-ready proof on buyer budget, conversion, and payout trust."
- id: "A25"
  name: "Quarterly salary-roll convention"
  value: "Y2-Y3 salary rows use actual monthly hires inside each quarter, not just the year-end snapshots."
  unit: "convention"
  source: "[Headcount column convention + BP team startTiming] this keeps salary expense consistent with the underlying hiring ramp."
