slug: creator-deliverable-compliance-copilot
date: '2026-07-04'
executiveSummary: Storika 这轮种子融资，以及它自己对手工交付物追踪的描述，都说明 D2C 品牌早就为创作者软件留了预算，却依然卡在合同签完之后的控制这一环。这家公司要卖的是一个更窄的产品：一款 AI 合规副驾，在放款前核验 Instagram 和 TikTok 上的创作者帖子是否真的满足了签约条款。第一个切口是年营收 $20M-$150M、每季度 100-500 份创作者合同的美国美妆与健康品牌——披露失误、发帖迟到、产品功效话术走样，都会给它们带来直接的法律和财务风险。这个切口有吸引力，是因为品牌可以把它当作叠加层部署在表格、GRIN、Aspire 或代理机构工作流之上，不必把整个创作者 CRM 迁移过去。模型测算的滩头 SAM 只有约 $18M，所以只有当审计层扩展到放款编排、多品牌代理机构工作流和相邻受监管品类，公司才能长成创投级别的规模。眼下最核心的经营问题是信任：共创客户必须愿意让系统从纯提醒，升级到低改判率的暂扣与放款建议。公开研究支持预算确实存在、工作流痛点确实真实，但没能证明存在一条独立的合规软件预算科目，所以定价和转化率都得靠早期付费试点去验证。
problem:
- 营销运营团队一旦项目规模达到每季度 100-500 份合同，仍然要靠手工去核对创作者合同、截图、话题标签、披露信息和发布截止时间。
- 品牌要么为不完整或不合规的交付物付款，要么因为证据含糊而拖延放款——这两种做法都在伤害利润率和创作者关系。
- 美妆与健康类项目的风险比一般创作者营销更高，因为披露失误和产品功效话术走样都可能引来 FTC 和 FDA 的审查。
solution:
- 吃进品牌各自的合同模板或 CSV 导出，把交付物、披露规则、时间窗口、使用权和功效话术护栏，都转成机器可核验的规则。
- 监控 Instagram 和 TikTok 帖子，给每份合同附上证据，只把低置信度或缺失的匹配路由进人工复核队列。
- 向品牌现有的放款流程发送批准或暂扣信号，并保留一份营销、财务和法务都能查阅的审计留痕，供放款前审查。
whyWeWin:
- 产品贴合买家的真实处境：品牌想要的是在风险最高的一步上有证据，而不是换掉自己的创作者 CRM、发现工具栈或代理机构关系。
- 美妆与健康品类比一般创作者运营的 ROI 更清晰，因为合规失误代价格外高，社交电商的渗透率也已经很高。
- 每复核一对合同与帖子，都会沉淀进一套专有的条款库、异常数据集和放款历史——这是一个大而全的发现平台天生不会自己拥有的资产。
strategicChoices:
  beachhead: 年营收 $20M-$150M、每季度在 Instagram 或 TikTok 上跑 100-500 份创作者合同的美国 D2C 美妆与健康品牌，目前由一名运营协调员在放款前核对截图、披露和发票。
  wedgeRationale: Storika 的信号和更广的工作流研究都点名交付物核验与放款控制是最迫切、还没解决的一步，比起在发现上竞争或强推 CRM 迁移，它能更快带来可衡量的节省。
  sequencingRationale: 先做 CSV 优先的合同解析、披露和标签核验，以及影子模式下的批准建议，用这些先证明准确率和省时效果，再去要求财务部门信任放款；等审计层已经赢得信任后，再补更深的集成、基于 Stripe 的放款控制和代理机构渠道合作。
  notYet:
  - 创作者发现、触达和 CRM 替代
  - 美国以外的国际合规体系
  - 在 Instagram 和 TikTok 的证据跑通之前，先做 YouTube 和长视频多平台覆盖
  - 针对高风险健康类内容的全自动功效话术裁定
market:
  tam: 以约 $20k ARR、约 17,500 个规模化网红项目测算的美国创作者合规叠加层建模 TAM，约 $350M。
  sam: 约 900 个中市场美妆与健康品牌测算的美国滩头 SAM，约 $18M。
  som: 约 90 家付费品牌、约 $20k ARR 测算的第 3 年 SOM，约 $1.8M。
  segments:
  - 拥有内部创作者运营职能、每季度 100-500 份创作者合同的美国 D2C 美妆与健康品牌
  - 替多个品牌客户管理类似美妆与健康项目的创作者营销代理机构
  buyingProcess: 日常用户通常是营销运营协调员或网红项目经理，但预算审批权在创作者营销负责人或 VP 手里，且因为涉及放款控制和披露风险，可能还需要财务或法务签字。最可信的切入点是由项目规模、一次付款纠纷或一次披露风波触发的付费试点，卖点是叠加在现有表格或创作者套件之上，而不是替换整套系统。
product:
  mvp: 第一版吃进合同模板或 CSV，核验 Instagram 和 TikTok 帖子是否满足必需标签、披露标签、发布窗口期和基本使用权条款，产出一份证据包，附带批准或暂扣建议。它应该以影子模式上线，配合人工复核，把审批状态导出进品牌现有的支付流程，而不是自主动用资金。
  sixMonth: 上线 3-5 个设计合作试点，完成美妆与健康条款规范化、置信度评分的异常队列，以及 CSV 加轻量 GRIN 或 Aspire 导入。
  twelveMonth: 为高置信度案例加上基于阈值的自动放款、Stripe 支持的放款暂扣、W-9 与 KYC 就绪检查，以及面向生产客户的财务级审计视图。
  twentyFourMonth: 只有在美妆与健康的留存和放款附加证据点真实站住之后，才扩展到代理机构多品牌工作流、创作者可靠性评分，以及一个相邻的受监管创作者品类。
  keyBets:
  - 针对品牌的条款规范化，比完整的创作者 CRM 迁移能更快被产品化。
  - Instagram 和 TikTok 元数据加多模态复核，足以自动完成大部分（但不是全部）合同检查。
  - 人工复核的结果会沉淀成一套现有厂商还没有的差异化合规数据集。
gtm:
  wedge: 一个跟着现有放款流程走影子模式的付费试点，先在 100-200 份在跑合同上证明可审计，再转化为覆盖整个创作者项目的年度合规叠加层。
  channels:
  - 创始人主导外呼，触达数字原生美妆与健康品牌的创作者/网红营销负责人
  - 与想要更快 QA、又不想换掉服务模式的创作者营销代理机构合作
  - 从表格重度使用团队和 GRIN、Aspire、Modash 等现有套件用户处获得集成引荐
  funnelTargets: 目标客户到合格试点 20-30%，合格试点到付费影子模式部署 50%以上，部署到年度合同 60%以上，年度合同到放款编排扩展在 12 个月内达到 30%以上
  pricing: 按在跑创作者合同量级分档收取年费，中市场品牌锚定在约 $20k ARR，因为相邻工具已经支撑起约 $14.7k 的企业底价，而这个工作流还需要模板上线和持续的异常复核。一旦放款暂扣和放款逻辑得到信任，就把放款编排作为附加模块另外收费。
businessModel:
  revenueStreams:
  - 按处于合规监控下的在跑创作者合同量级收取的年度品牌订阅
  - 资金一旦流经放款暂扣和放款环节，就收取放款编排附加费
  - 面向管理多个品牌项目团队的代理机构多品牌订阅
  unitOfValue: 处于合规监控下的一份在跑创作者合同
  targetGrossMarginPct: 70
  expansionLevers:
  - 审计层赢得信任后的放款编排
  - 带共享规则库的代理机构多品牌部署
  - 从美妆与健康扩展到相邻的受监管创作者品类
  - 把创作者可靠性和异常分析卖进现有套件集成
strategyMap:
  northStarMetric: 每月在发帖 24 小时内、带审计证据完成批准或暂扣的创作者交付物数量
  inputMetrics:
  - 受支持平台上具备机器可读覆盖的受监控合同占比
  - 高置信度核验决策的精确率和改判率
  - 从签约到实时监控上线的试点启动时间
  - 试点转年度合同的转化率
  - 每 100 份受监控创作者合同的付款纠纷率
  moatsToBuild:
  - 映射到平台专属披露和功效话术规则的美妆与健康条款库
  - 异常、改判和最终放款决定的标注数据集
  - 与合同履约挂钩的创作者可靠性和放款就绪度历史
  - 嵌入在现有创作者套件和财务工作流内部的位置
  killCriteria:
  - 前 10 个目标品牌里，愿意按目标定价参与付费试点的少于 3 个。
  - 高置信度检查在 200 帖回测后精确率不到 90%，或未解决的人工复核比例仍超过 20%。
  - 付费试点在 6 个月内转化为年度合同的比例不到 50%，因为工作流被视为非必需。
  - 前 10 个客户的放款附加模块附着率停在 20% 以下，扩张逻辑站不住。
  mermaid: |
    flowchart LR
      Wedge[Beauty and wellness compliance wedge] --> MVP[Contract parsing and Instagram or TikTok verification]
      MVP --> Proof[24 hour audit trail and fewer payout disputes]
      Proof --> Expansion[Payment orchestration plus agency and adjacent category expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: 这是一个有真实紧迫性的有趣切口，但还没有足够证据说明这层控制能长成创投级别的平台，而不只是一个功能。
    whyBelieve: 创作者预算本身就不小，合同签完之后的手工工作依然存在，受监管的美妆与健康品类又比一般创作者软件有更清晰的 ROI 故事。
    whyDoubt: 建模的滩头市场偏小，现有厂商和代理机构又已经握有买家关系，一旦放款环节的信任建立不起来，产品可能被锁死在提醒软件的层级。
    nextDiligence: 拿下 3 个付费试点，证明高置信度批准节省超过 50% 人工时间、改判率低于 15%，并至少让一家品牌授权生产环境的放款暂扣。
  firstCustomer:
    title: 美国中市场美妆或健康品牌的创作者营销负责人
    profile: 年营收 $20M-$150M 的品牌，一名网红运营协调员，靠表格加一套没完全采用的创作者套件，管理每季度 100-500 份 Instagram 和 TikTok 创作者合同。
    trigger: 合同量级、发票纠纷或一次披露/功效话术风波，让基于截图的证据变得太慢、太冒险，撑不到放款那一刻。
    buyer: 创作者营销负责人
    initialContract: 针对一个团队和前 100-200 份在跑合同的 90 天付费试点，价格 $8k-$12k；影子模式达到准确率目标后，可抵扣为 $20k-$30k 的年度订阅，外加放款附加模块。
  mustBeTrue:
  - 目标品牌愿意为一层叠加层支付约 $20k ARR，而不换掉现有的创作者套件。
  - 系统能核验至少 80% 受支持的 Instagram 和 TikTok 交付物，披露、标签和时间检查的误判率低于 10%。
  - 至少一半的付费试点会在 6 个月内转为年度合同，因为省下的时间和减少的纠纷是看得见的。
  - 试点账户的财务或法务团队，会在影子模式验证期后批准放款暂扣和有限的自动放款。
  - 在公司建起有差异化的审计数据集、完成至少 25 个有意义的部署之前，现有套件不会把这个切口抹平。
  diligenceQuestions:
  - 目标创作者中，有多大比例使用能让 Instagram 和 TikTok 核验足够可靠的账户类型和元数据？
  - 一个品牌需要每季度出现多少次付款纠纷、坏账或合规升级事件，才会开出一条专属预算线？
  - 创作者营销负责人会把这当作叠加层来买，还是采购部门会让他们等现有套件出同类功能？
  - 在美妆与健康买家愿意信任基础披露和时间规则之外的功效话术核验之前，需要多少法务审查？
  - 代理机构能否引入足够的多品牌量级，又不把上线变成一门重服务的生意？
operatingAssumptions:
- assumption: 第一批客户会先接受 CSV 或表格上线，不会一上来就要求深度 GRIN 或 Aspire 集成。
  basis: idea.yaml
  validationTest: 拿下 3 个付费试点，且从导出的合同和帖子 URL 开始，2 周内完成上线。
  decisionImpact: 如果不成立，就要把集成工程提前，并放慢直销目标，直到核心连接器上线。
- assumption: 受支持的 Instagram 和 TikTok 账户类型，能提供足够数据自动核验大多数签约帖子。
  basis: research.yaml
  validationTest: 回测 3 个试点品牌的 200 份历史交付物，确认机器可读覆盖率至少 70%，高置信度检查精确率超过 90%。
  decisionImpact: 如果不成立，就把承诺收窄到审计提醒和更高触达的复核，这会拉低毛利率和定价假设。
- assumption: 创作者营销负责人愿意为约 $20k ARR 的叠加层付费，而不是等现有套件加同类功能。
  basis: research.yaml
  validationTest: 对 10 个目标账户做价格测试，至少 3 个按目标区间转化为付费试点或年度合同。
  decisionImpact: 如果不成立，就要往上市场走、通过现有厂商销售，或者重新定位成代理机构基础设施。
- assumption: 财务和法务相关方会批准放款暂扣，并在影子模式验证期后逐步批准基于阈值的放款。
  basis: operator judgment
  validationTest: 跑 90 天影子模式，改判率低于 15%，并拿到 2 个共创客户书面的生产环境批准。
  decisionImpact: 如果不成立，就把支付环节留在产品之外，把扩张路径收窄到证据与工作流软件。
- assumption: 代理机构合作伙伴会引入多品牌量级，而不会要求重服务式的定制。
  basis: research.yaml
  validationTest: 签下 2 个代理机构试点，用标准化上线流程，展示每个代理机构至少 2 个品牌引荐。
  decisionImpact: 如果不成立，就下调渠道销售的优先级，把路线图重新聚焦在直接品牌部署上。
experimentRoadmap:
- horizon: 0—90 天
  experiment: 买家紧迫度与定价测试
  hypothesis: 美妆与健康的创作者营销负责人愿意按计划入门价为付费叠加层试点掏钱，因为放款证据的痛点已经很痛。
  successMetric: 15 次买家访谈、5 个合格试点，以及按目标套餐达成 3 个付费试点或意向书。
  owner: 创始人/CEO
- horizon: 0—90 天
  experiment: 历史帖子审计回测
  hypothesis: 合同规则加公开帖子数据，能以生产级精确率核验核心的披露、标签和时间检查。
  successMetric: 200 帖评估，高置信度案例精确率超过 90%，未解决异常率低于 20%。
  owner: 创始工程师
- horizon: 90—180 天
  experiment: CSV 优先上线试点
  hypothesis: 基于表格和导出的部署，能在深度套件集成建成之前，就让第一批品牌足够快地上线。
  successMetric: 3 个试点在 14 天内启动，80% 的试点量级仅通过导出完成上线。
  owner: 实施负责人
- horizon: 90—180 天
  experiment: 影子模式放款审批试点
  hypothesis: 只要改判率够低、证据够清晰，品牌会在全面自动放款之前，先信任批准或暂扣建议。
  successMetric: 高置信度建议改判率低于 15%，且至少有 1 项经财务批准的暂扣或放款策略。
  owner: 创始人/CEO
- horizon: 6—12 个月
  experiment: Stripe 放款与税务就绪试点
  hypothesis: W-9、KYC 和放款暂扣工作流，足以在审计层落地之后解锁一个付费的放款附加模块。
  successMetric: 2 个客户启用放款模块，1 个从纯证据模式转化为放款附加模块。
  owner: 创始工程师
- horizon: 6—12 个月
  experiment: 代理机构分销试点
  hypothesis: 代理机构会把产品当作内部 QA 基础设施来用，并引荐更多品牌项目，而不需要定制化的工作流分支。
  successMetric: 2 个代理机构试点、4 次品牌引荐，且不产生任何定制产品分支。
  owner: GTM/合作伙伴负责人
operations:
- 把各品牌的网红合同模板，规范化成覆盖披露、标签、时间窗口、使用权和功效话术限制的机器可读规则。
- 每天跑 Instagram 和 TikTok 监控任务，带置信度评分，对异常设定当日人工复核 SLA。
- 在放款审批之前，为营销、法务和财务生成审计包，包含逐条款匹配和缺失证据标记。
- 只有在创作者达到放款就绪状态后，才使用 Stripe Connect 加 W-9 和 TIN 采集；否则资金保持暂扣，并提示缺失身份信息的待办事项。
- 为 CSV、表格和现有套件维护导入导出连接器，让部署不需要系统迁移。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 主导创始人销售、共创客户挖掘，以及和营销、财务、法务相关方的协同。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭建合同吃入、监控任务、证据生成和首批集成。
- role: 应用 AI 工程师
  startTiming: 第 3 个月
  rationale: 调优披露和功效话术检测、置信度阈值，以及人工复核反馈闭环。
- role: 实施负责人
  startTiming: 第 6 个月
  rationale: 为合同模板上线、培训运营用户，用可复用的部署手册推动试点转年度合同。
- role: GTM/合作伙伴负责人
  startTiming: 第 9 个月
  rationale: 在参考客户和核心证据点出现之后，把外呼和代理机构分销正式化。
milestones:
- horizon: 0—12 个月
  items:
  - 签下 3-5 个付费的美国美妆或健康设计合作试点，每个在 14 天内以影子模式上线。
  - 上线针对披露、标签、时间和基本使用权检查的 Instagram 和 TikTok 合同核验，配合人工复核。
  - 证明人工复核时间下降超过 50%，高置信度案例改判率低于 15%。
  - 至少 3 个试点转为年度订阅，并拿下第一个放款控制附加模块客户。
- horizon: 12—24 个月
  items:
  - 为 GRIN、Aspire 和基于 CSV 的工作流加上可复用导入，外加财务级审计包。
  - 达到 15-20 个付费品牌，或 2 个跑多品牌部署的代理机构。
  - 为已批准案例上线基于阈值的自动放款，以及创作者可靠性评分。
  - 只有在美妆与健康的留存和放款附加目标达成之后，才测试一个相邻的受监管品类。
- horizon: 24—36 个月
  items:
  - 通过代理机构达到 75-90 个付费品牌或等效品牌部署，验证建模的 SOM。
  - 把放款编排扩展到更大比例的客户群，让它成为默认的扩张路径。
  - 用积累的条款和异常数据，推出预测性合规基准和更深的工作流自动化。
risks:
- risk: 现有创作者套件在公司建立分销之前，就把类似核验功能打包进产品。
  likelihood: Medium
  impact: High
  mitigation: 选择集成而不是替代，靠厂商中立的审计证据取胜，在扩大范围之前先建好美妆与健康的参考客户。
- risk: 误判（假阳性或假阴性）削弱了对放款建议的信任。
  likelihood: High
  impact: High
  mitigation: 以影子模式上线，采用保守阈值，在开启自动放款之前先按规则类型公开精确率和改判率指标。
- risk: 非专业创作者账户的平台 API 覆盖不完整。
  likelihood: High
  impact: Medium
  mitigation: 按账户构成筛选试点，优先支持创作者和商业账户，在销售时如实披露覆盖限制。
- risk: 如果放款扩展和相邻品类扩展都没能实现，滩头 SAM 就显得太小。
  likelihood: Medium
  impact: High
  mitigation: 在扩大团队或路线图之前，先设定明确的附着率、留存率和扩张门槛。
- risk: 美妆与健康的功效话术复杂度，会把上线过程变成一门重服务的生意。
  likelihood: Medium
  impact: Medium
  mitigation: 先从披露、标签、时间和使用权检查做起，只在规则库范围窄、且配有人工审批的前提下，再加入模糊度更高的功效话术复核。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用一份 18 个月的计划，构建 Instagram 和 TikTok 合规 MVP，招募第一批工程和实施团队，完成 3-5 个付费设计合作试点，把表现最好的试点转化为年度订阅，并证明放款控制能把这个切口扩展成更大的工作流。
