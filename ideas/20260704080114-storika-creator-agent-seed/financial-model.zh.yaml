slug: creator-deliverable-compliance-copilot
date: '2026-07-04'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-04] 模型从业务计划落款日期之后的第一个完整运营月开始。'
- id: A2
  name: 期初现金/Pre-seed 融资
  value: $2.4M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情景取偏低端的 $2.4M pre-seed，规模刚好够到 15-20 个品牌的里程碑，并留出约六个月的现金缓冲。'
- id: A3
  name: 期初付费品牌数
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] Storika 从零营收起步，必须先拿下付费设计合作客户。'
- id: A4
  name: 付费品牌定义
  value: 已处于监控中的付费试点、年度叠加层订阅，或代理机构引入的品牌部署。
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.revenueStreams] customersEop 计入任何已经为试点或生产范围付费的品牌。'
- id: A5
  name: 付费试点价格
  value: 90 天 $10K（约每月 $3.3K）
  unit: USD/brand
  source: '[BP investorMemo.firstCustomer.initialContract $8k-$12k] 模型取公开试点区间的中点。'
- id: A6
  name: 基础年度叠加层订阅
  value: $24K ARR
  unit: USD/brand/year
  source: '[BP gtm.pricing anchored around roughly $20k ARR + BP investorMemo.firstCustomer.initialContract $20k-$30k annual subscription] 基准情景对从试点转化的品牌取略偏上市场的中点。'
- id: A7
  name: 放款控制附加模块附着率
  value: 附着时 $10K ARR；Y1 约 0%，Q4Y2 约 15%，Q4Y3 约 35%
  unit: USD/brand/year
  source: '[BP product.twelveMonth + BP milestones 0-12 and 12-24 months + Research reportMemo.partnershipEcosystem] 放款控制只有在信任建立之后才启动，随后在 Y3 之前逐步附着。'
- id: A8
  name: 营收确认口径
  value: 期末付费品牌数 × 混合已实现单品牌营收：Y1 每月 $2.7K-$3.5K，Y2 每季度 $6.9K-$7.8K，Y3 每季度 $7.8K-$8.7K。
  unit: formula
  source: '[A5-A7 + Research reportMemo.willingnessToPay + Research market.som] 这让营收始终与客户数、以及试点转年度加附加模块的组合直接挂钩。'
- id: A9
  name: Y1 付费品牌爬坡
  value: 0,0,0,1,2,3,3,4,4,5,5,5
  unit: customersEop
  source: '[BP milestones 0-12 months + BP gtm.funnelTargets] 基准情景在完成 3-5 个付费试点、至少 3 个年度转化后，于 Y1 末达到 5 个付费品牌。'
- id: A10
  name: Y2 付费品牌爬坡
  value: Q1-Q4 = 6,10,15,20
  unit: customersEop
  source: '[BP milestones 12-24 months reach 15-20 paying brands or 2 agencies] 基准情景收官于所述里程碑区间的上限。'
- id: A11
  name: Y3 付费品牌爬坡
  value: Q1-Q4 = 30,46,66,86
  unit: customersEop
  source: '[BP milestones 24-36 months reach 75-90 paying brands + Research market.som 90 brands] 基准情景收官接近建模 SOM 区间的上限。'
- id: A12
  name: 毛利率爬坡
  value: Y1 50%-58%；Y2 62%-68%；Y3 69%-72%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + startup-finance heuristic] 早期上线和异常复核仍高度依赖人工，随后可复用的规则模板和监控任务把模型拉向 70% 的目标。'
- id: A13
  name: 招聘时间线
  value: M1 创始人和创始工程师；M3 应用 AI 工程师；M6 实施负责人；M9 GTM 和合作伙伴负责人；M15 第三名工程师；M24 G&A 和运营；M33 第二名实施岗位
  unit: timeline
  source: '[BP team startTiming + BP strategicChoices.sequencingRationale + startup-finance heuristic] 在试点转化、放款信任和代理机构证据点显现之前，团队保持精简。'
- id: A14
  name: 创始人全成本年薪
  value: $135K
  unit: USD/year
  source: '[BP team Founder / CEO + startup-finance heuristic] 创始人现金薪酬低于市场水平，已含工资税和福利。'
- id: A15
  name: 工程全成本年薪
  value: 每名全职员工 $170K
  unit: USD/FTE/year
  source: '[BP team Founding engineer + Applied AI engineer + startup-finance heuristic] 足以招到资深集成和应用 AI 人才，同时仍保持 pre-seed 阶段的精简。'
- id: A16
  name: 实施全成本年薪
  value: 每名全职员工 $125K
  unit: USD/FTE/year
  source: '[BP team Implementation lead + startup-finance heuristic] 覆盖技术上线和客户成功职责，但不搭建一支重服务团队。'
- id: A17
  name: GTM 全成本年薪
  value: 每名全职员工 $145K
  unit: USD/FTE/year
  source: '[BP team GTM / partnerships lead + BP gtm.channels + startup-finance heuristic] 覆盖窄市场里聚焦的外呼和代理机构合作工作。'
- id: A18
  name: G&A 全成本年薪
  value: 每名全职员工 $100K
  unit: USD/FTE/year
  source: '[BP operations + startup-finance heuristic] 覆盖基础财务、保险、供应商和合规运营。'
- id: A19
  name: 人力成本在损益表科目间的分摊
  value: 创始人 55% 销售与市场 / 20% 研发 / 25% G&A；工程 100% 研发；实施 60% 销售与市场 / 40% 研发；GTM 100% 销售与市场；G&A 100% G&A。
  unit: allocation
  source: '[BP team role rationales + BP operations] 这把这支小团队映射进各项费用科目，同时保持薪资总额内部一致。'
- id: A20
  name: 非人力运营支出爬坡
  value: 月度非人力支出从销售与市场/研发/G&A 的 $4K/$7K/$5K，爬升到 Q4Y3 的 $15K/$16K/$9K。
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] 覆盖云推理、社交 API 供应商、差旅、法务、保险和财务工具，未假设有大规模付费获客引擎。'
- id: A21
  name: 现金换算口径
  value: 现金变动等于 EBITDA
  unit: formula
  source: '[startup-finance heuristic] 资本支出、税费、融资费用和营运资金波动，在这个阶段假设都可忽略不计。'
- id: A22
  name: 稳态月度流失率
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early workflow SaaS + BP strategicChoices.sequencingRationale] 一旦嵌入到放款审批环节，工作流应该会变得粘性更高，但模型相对成熟合规软件仍保持保守。'
- id: A23
  name: CAC 换算口径
  value: 36 个月销售与市场支出 ÷ 86 个净新增付费品牌 ≈ CAC $13K
  unit: formula
  source: '[model calc + BP gtm.funnelTargets] 只有创始人主导外呼和代理机构引荐持续有效，混合 CAC 才能维持低位。'
- id: A24
  name: 下一轮融资定规模的里程碑
  value: Q4Y2 前达到 20 个付费品牌、约 3 个放款控制客户、2 个代理机构试点
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP investorMemo.verdict.nextDiligence] 这笔融资的规模，是为了在买家预算、转化率和放款信任上跑出种子轮就绪的证据。'
- id: A25
  name: 季度薪资滚算口径
  value: Y2-Y3 的薪资行使用各季度内实际的按月招聘数据，而不仅是年末快照。
  unit: convention
  source: '[Headcount column convention + BP team startTiming] 这让薪资支出与底层招聘节奏保持一致。'
