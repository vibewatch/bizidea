scenarios:
  downside:
    description: 试点转年度合同的转化放慢，放款控制的信任建立滞后，代理机构引荐规模化的速度也比计划更晚。
    y3RevenueK: 1237.2
    y3EbitdaK: -650.7
    cashLowPointK: -45.9
    keyAssumptionChanges:
    - Y2 收官为 16 个付费品牌，Y3 收官为 60 个，而不是 86 个。
    - 混合已实现单品牌营收低 5%-8%，因为放款控制的附着更晚才到来。
    - 毛利率比基准情景低约 3 个百分点，因为异常复核依然更依赖人工。
  base:
    description: 试点按时转化，Y2 末达到 20 个付费品牌，放款控制附着加代理机构组合把混合营收一路拉到 Y3。
    y3RevenueK: 1909.2
    y3EbitdaK: -136.5
    cashLowPointK: 388.2
    keyAssumptionChanges:
    - 公司在 M12 达到 5 个付费品牌，Q4Y2 达到 20 个，Q4Y3 达到 86 个。
    - 基础订阅定价维持在 $24K ARR，放款控制附着率到 Q4Y3 达到约 35%。
    - 招聘保持精简，Q4Y3 维持 8 名全职员工，让公司在没有大型服务团队的情况下逼近盈亏平衡。
  upside:
    description: 代理机构引荐在 Y2 提速，放款控制附着比计划更快拉升混合营收和毛利率。
    y3RevenueK: 2233.5
    y3EbitdaK: 114.9
    cashLowPointK: 548.4
    keyAssumptionChanges:
    - Y2 收官为 24 个付费品牌，Y3 收官为 92 个，因为代理机构引入了更多合格项目。
    - 随着放款控制附着更早落地，混合已实现单品牌营收在 Y3 升至每季度 $8.2K-$9.0K。
    - 随着上线模板和条款库标准化提速，毛利率到 Q4Y3 达到 73%。
