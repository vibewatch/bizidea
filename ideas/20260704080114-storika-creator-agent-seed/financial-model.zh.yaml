modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Founder outbound + agency intros] --> Pilots[Paid pilots]
      Pilots --> Annuals[Annual overlay subscriptions]
      Annuals --> AddOn[Payout-control attach]
      Annuals --> Revenue[Subscription revenue]
      AddOn --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 营收引擎
  finding: 基准情景的营收来自付费试点转化为 $24K 的叠加层订阅，随后随着放款控制附着率在 Q4Y3 前升至约 35%，逐步拉向 $30K 的混合营收水平。
- checkName: 必须成立的前提
  finding: 试点转年度合同和代理机构引荐必须让 Storika 在 Q4Y2 前达到 20 个付费品牌，否则固定团队规模会超出营收基础。
- checkName: 模型失效的条件
  finding: 如果产品停留在纯提醒阶段、放款控制附着不及预期，下行情景会在到达 Y3 规模里程碑之前就把现金烧成负数。
- checkName: 下一轮的证明
  finding: 只有当 Storika 在 Q4Y2 前展示出 20 个付费品牌、3 个在用放款控制客户、2 个代理机构试点，以及低改判率的审计准确率，种子轮才站得住脚。
sanityChecks:
  ruleOf40: Y3 增长率 400% + EBITDA 利润率 -7% = 393%；数字上很亮眼，但主要是因为 Y2 营收基数太小被放大了。
  burnMultiple: Y2 消耗倍数 3.4 倍，Y3 随试点转化和放款控制组合消化固定团队而改善到 0.1 倍。
  revenuePerFte: 以 Q4Y3 的 8 名全职员工计，Y3 每全职员工营收 $239K（对标 SaaS 基准 $200K-$400K）。
  flags:
  - 即使达到 86 个付费品牌，Y3 营收也只有约 $1.9M，说明创投级别的故事仍要依赖代理机构量级、更丰富的放款控制或超出最初切口的相邻品类扩张。
  - 基准情景假设放款控制附着会把混合经济性拉到研究给出的 $20K 叠加层锚点之上；如果买家一直停留在纯提醒阶段，EBITDA 将持续大幅为负。
  - Q4Y3 假设 86 个付费品牌由一支 8 人全职团队支撑，所以上线和异常复核的自动化必须真正跑通，否则人力和烧钱速度都得比模型更快地上升。
