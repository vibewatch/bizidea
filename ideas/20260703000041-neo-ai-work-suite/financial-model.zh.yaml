scenarios:
  downside:
    description: 销售周期被拉长，扩张模块挂载也慢于预期，因此到 Q4Y3 只有 18 个正式生产账户，混合 ACV 也更低。
    y3RevenueK: 472.5
    y3EbitdaK: -1861.1
    cashLowPointK: -779.3
    keyAssumptionChanges:
    - Y3 混合 ACV 从 $40K 降到 $35K，因为挂上高级连接器或第二条工作流的账户更少。
    - Y3 末客户数从 25 降到 18，因为企业销售周期被拉长到约 9 个月。
    - 招聘计划不变，因此收入下滑并不会被更低的人头成本抵消。
  base:
    description: 3 个 Y1 共创客户试点跑通后，形成可复制的正式生产转化动作；Y2 末到 7 个账户，Y3 末到 25 个，扩张模块继续抬高混合 ACV。
    y3RevenueK: 710.0
    y3EbitdaK: -1683.0
    cashLowPointK: -601.2
    keyAssumptionChanges:
    - Y1 试点 ARPU 为 $20K/年；随着扩张模块挂上，Y2 混合年 ACV 升到 $30K，Y3 升到 $40K。
    - 客户爬坡为：Y1 末 3 个试点，Y2 末 7 个正式生产账户，Y3 末 25 个。
    - 招聘继续保持精简（Q4Y3 共 10 FTE），并按 [business-plan.yaml team] 的里程碑驱动节奏扩张。
  upside:
    description: 合作伙伴带单更快、试点转正式生产效率更高，因此公司到 Q4Y3 可冲到 32 个正式生产账户，且 ACV 因扩张更高。
    y3RevenueK: 1035.0
    y3EbitdaK: -1502.2
    cashLowPointK: -420.4
    keyAssumptionChanges:
    - Y3 混合 ACV 从 $40K 升到 $45K，因为更多账户采用高级连接器和第二条工作流。
    - Y3 末客户数从 25 升到 32，得益于合作伙伴来源交易更快、销售周期更短。
    - 同一套精简招聘计划就能消化额外 规模，因为 上线 维持标准化。
sensitivity:
- variable: ARPU
  downsideCase: Y3 混合 ACV $35K
  baseCase: Y3 混合 ACV $40K
  upsideCase: Y3 混合 ACV $45K
  y3RevenueImpactK: -88.8
  cashImpactK: -66.6
- variable: CAC
  downsideCase: 创始人主导外呼仍是主动作，因此混合 CAC 升到 $85K
  baseCase: 混合 CAC $60.7K
  upsideCase: 合作伙伴来源交易跑起来后，混合 CAC 降到 $45K
  y3RevenueImpactK: 0.0
  cashImpactK: -535.7
- variable: churn
  downsideCase: 试点转正式生产的留存偏弱，月度 logo 流失率 2.0%
  baseCase: 月度 logo 流失率 1.2%
  upsideCase: 工作流黏性很强，月度 logo 流失率 0.8%
  y3RevenueImpactK: -56.8
  cashImpactK: -42.6
- variable: sales cycle
  downsideCase: 9 个月企业销售周期，让每一批客户大致都晚一个季度成交
  baseCase: 从外呼到签下试点，销售周期约 6 个月
  upsideCase: 第一份首轮回复提速 50%+ 的案例出来后，周期缩短到 4-5 个月
  y3RevenueImpactK: -140.0
  cashImpactK: -105.0
- variable: gross margin
  downsideCase: 上线 和支持仍偏服务化，毛利率只有 65%
  baseCase: 毛利率 75%
  upsideCase: 连接器标准化 上线 后，毛利率 80%
  y3RevenueImpactK: 0.0
  cashImpactK: -71.0
- variable: hiring pace
  downsideCase: 客户经理、CS 和 growth-ops 各提前 1 个季度入职
  baseCase: 基本情景：Q4Y3 之前精简爬坡到 10 FTE
  upsideCase: 同样这些岗位推迟 1 个季度，等正式生产转化更清晰后再招
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 营收引擎
  finding: 基本情景的营收引擎，是把 3 个付费共创客户试点扩到 25 个年度正式生产客户，同时把混合 ACV 从 $20K 试点价抬到 Y3 末 $40K，主要靠扩张模块挂载。
- checkName: 必须做对的事
  finding: 公司必须在第 24 个月前，把 Year 1 共创客户转成 5-8 个账户的正式生产里程碑；否则 Year 3 的 GTM 招聘（AE、CS、growth-ops）就会靠纯 burn 硬撑，而不是由已验证的正式生产 ARR 支付。
- checkName: 模型崩溃条件
  finding: 如果销售周期拖向 9 个月，或 Y3 的 ACV 兑现只到 $35K，现金最低点会掉到 -$779.3K（基本情景为 -$601.2K），意味着 $3.5M 融资会在下一轮完成前就烧穿。
- checkName: 下一轮融资证明包
  finding: 只要在第 24 个月前证明 7 个正式生产账户、30%+ 的第二条工作流扩张，以及第一笔合作伙伴来源交易，下一轮融资就有了支点；这也早于基本情景在第 31 个月附近出现的现金低点。
sanityChecks:
  ruleOf40: Y3 增速 373.3% + EBITDA 利润率 -237.0% = 136.3%；这个数值主要被极小的 Y2 收入基数扭曲，并不代表效率真的已经优秀。
  burnMultiple: Y3 burn multiple 约 2.1x（净 burn $1,683.0K / 净新增 ARR $790.0K），落在 pre-seed / seed 常见的 1-3x 区间内，但还谈不上高效 SaaS 动作。
  revenuePerFte: Y3 ARR run-rate 折算人均约 $100.0K（10 FTE、期末 ARR $1,000K），明显低于 SaaS 常见的 $200-400K 基准。
  flags:
  - 到 Y3，人均收入仍显著低于 $200-400K 的 SaaS 基准，这既反映研究估算的 $25M SAM，也反映团队在人收证明前就先按计划搭起来了。
  - 损益表里的客户数只增不减，没有把 logo churn 从 customersEop 中扣掉；1.2% 的月流失只用于 LTV / payback 分析，所以一旦试点或早期账户不续约，真实收入和现金都可能比模型更差。
  - 在 $3.5M pre-seed 融资下，Q3Y3 和 Q4Y3 现金都会转负（基本情景低点 -$601.2K），因此无论 upside / downside，seed 轮大致都得在第 31 个月前完成。
  - 约 24.3 个月的 CAC 回收期，长于高效企业 SaaS 通常低于 18 个月的基准，这与计划里创始人主导销售、试点转年约较慢的节奏一致。
  - 研究版 SOM 假设 Y3 能触达 120 个 logo，而本模型只有 25 个 logo（约 $1.0M ARR 期末 run-rate）；要真正吃满 SOM，需要比当前 pre-seed 资金支持下大得多的 GTM 引擎。
