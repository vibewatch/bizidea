slug: trust-review-workgraph
date: '2026-07-03'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月
  value: 2026-08
  unit: YYYY-MM
  source: '[business-plan.yaml date] 模型从 2026-07-03 计划日期后的第一个完整月份开始。'
- id: A2
  name: pre-seed 轮期初现金
  value: '3500'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] 取披露 $2-4M 区间的上半段，这样现金能覆盖 12-24 个月里程碑，并在第 30-31 个月附近再多留 6 个月缓冲。'
- id: A3
  name: Y1 混合试点 ARPU
  value: '20'
  unit: USDK/year
  source: '[business-plan.yaml investorMemo.firstCustomer.initialContract] 采用披露的 $10k-$20k 付费试点区间上沿，并把收入摊在整个第一年合作窗口里，而不只算 8-12 周试点期，因为共创客户通常会一路跟到采购完成。'
- id: A4
  name: 共创客户爬坡（Y1）
  value: M1-M12 分别为 0,0,0,1,1,2,2,3,3,3,3,3
  unit: count
  source: '[business-plan.yaml milestones 0-12 months] “sign 3 paid design partners” 与 “complete 8-10 live questionnaire runs” 意味着在约 3 个月建设 / 外呼期后，M4、M6、M8 依次启动试点。'
- id: A5
  name: 目标毛利率
  value: '75'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] 模型按收入的 25% 计 COGS（托管、LLM/API 推理成本和支持）。'
- id: A6
  name: Y2 混合年 ACV（正式生产）
  value: '30'
  unit: USDK/year
  source: '[business-plan.yaml investorMemo.firstCustomer.initialContract] 取 $25k-$50k 年订阅区间下三分之一，反映早期转化时还没充分挂上高级连接器和扩张模块。'
- id: A7
  name: Y3 混合年 ACV（正式生产）
  value: '40'
  unit: USDK/year
  source: '[business-plan.yaml businessModel.expansionLevers; milestones 24-36 months] 一旦高级证据连接器、门户导出和扩张工作流（Y3 目标占 ARR 25%）拉高合同价值，就把混合客单价抬到 $25k-$50k 区间更高处。'
- id: A8
  name: 客户爬坡（正式生产账户）
  value: Y1 末 3 个试点，Y2 末 7 个，Y3 末 25 个
  unit: count
  source: '[business-plan.yaml milestones 12-24 months: "convert 5-8 accounts to annual production"; 24-36 months: "reach 20-30 production customers"] 基本情景取各区间中位数。'
- id: A9
  name: 创始人 / CEO 含税年现金成本
  value: '168'
  unit: USDK/year
  source: startup-finance heuristic：pre-seed 企业安全 SaaS 创始人兼做共创客户销售，现金薪资 $140K，加 20% 税费/福利负担。
- id: A10
  name: 创始工程师含税年现金成本
  value: '216'
  unit: USDK/year
  source: startup-finance heuristic：高级创始工程师现金薪资 $180K，加 20% 负担，负责引用引擎和连接器。
- id: A11
  name: 信任运营产品负责人含税年现金成本与入职时间
  value: 180，第 3 月入职
  unit: USDK/year
  source: '[business-plan.yaml team] 对应角色与第 3 月入职；成本按 startup-finance heuristic 取 $150K 现金 + 20% 负担，适用于前 GRC/AppSec 操盘手。'
- id: A12
  name: 集成工程师含税年现金成本与入职时间
  value: 198，第 6 月入职
  unit: USDK/year
  source: '[business-plan.yaml team] 对应角色与第 6 月入职；成本按 startup-finance heuristic 取 $165K 现金 + 20% 负担。'
- id: A13
  name: GTM / 客户成功负责人含税年现金成本与入职时间
  value: 174，第 9 月入职
  unit: USDK/year
  source: '[business-plan.yaml team] 对应角色与第 9 月入职；成本按 startup-finance heuristic 取 $145K 现金 + 20% 负担。'
- id: A14
  name: 客户经理含税年现金成本与入职时间
  value: 180，Y2 Q1 新增
  unit: USDK/year
  source: startup-finance heuristic：企业安全 AE 的 OTE 为 $150K，加 20% 负担；等 Year 1 共创客户跑起来后再加人，符合 [business-plan.yaml sequencingRationale]。
- id: A15
  name: 客户成功 / 实施负责人含税年现金成本与入职时间
  value: 156，Y2 Q3 新增
  unit: USDK/year
  source: startup-finance heuristic：现金薪资 $130K，加 20% 负担；随着正式生产转化接近 12-24 个月里程碑，再补这一岗位。
- id: A16
  name: 第二名创始工程师含税年现金成本与入职时间
  value: 216，Y2 Q4 新增
  unit: USDK/year
  source: 与 A10 同假设；用于按 [business-plan.yaml product.twentyFourMonth] 做深答案—证据图谱和扩张工作流。
- id: A17
  name: 第二名集成工程师含税年现金成本与入职时间
  value: 198，Y2 Q2 新增
  unit: USDK/year
  source: 与 A12 同假设；用于按 [business-plan.yaml product.twelveMonth / twentyFourMonth] 构建信任中心同步和更深的云证据连接器。
- id: A18
  name: 增长 / 客户运营专员含税年现金成本与入职时间
  value: 150，Y3 Q2 新增
  unit: USDK/year
  source: startup-finance heuristic：$125K 现金 + 20% 负担，兼顾合作伙伴管道与 CS 扩张，支撑正式生产账户从 15 个推到 25 个。
- id: A19
  name: 非薪酬运营开支（Y1）
  value: 销售与市场 $3.0K + $0.3K/客户/月；研发 $5.0K + $0.5K/客户/月；G&A $6.0K + $0.2K/客户/月
  unit: USDK/month
  source: startup-finance heuristic，用于覆盖差旅/外呼工具、LLM API 与云托管（产品需要起草带引用的答案），以及早期企业安全 SaaS 的法务 / SOC2 准备 / 会计成本。
- id: A20
  name: 非薪酬运营开支（Y2-3）
  value: 销售与市场 $4.0K + $0.3K/客户/月；研发 $6.0K + $0.5K/客户/月；G&A $7.0K + $0.2K/客户/月
  unit: USDK/month
  source: startup-finance heuristic：在 A19 基础上上调，用于覆盖更多差旅、会议、更高的 LLM 推理量，以及客户规模放大后的合规 / 审计成本。
- id: A21
  name: 月度 logo 流失率（单位经济模型）
  value: '1.2'
  unit: percent
  source: startup-finance heuristic：对有明确责任人审批和承诺历史的企业合规工作流 SaaS，黏性应强于通用 SMB SaaS 的流失假设。
- id: A22
  name: 混合 CAC
  value: '60.65'
  unit: USDK/customer
  source: 按模型中 Y2 + Y3 销售与市场支出 $1,334.4K，除以 22 个净新增正式生产客户（Y3 末 25 个减 Y1 末 3 个）计算。
- id: A23
  name: 现金转换时点
  value: EBITDA 近似等于经营现金流
  unit: policy
  source: startup-finance heuristic：对一家 pre-seed、轻服务型 SaaS 公司，不建模重大 capex、债务偿付或营运资金波动。
- id: A24
  name: 融资里程碑
  value: 到第 24 个月达到 7 个正式生产账户（位于 5-8 区间内），其中 30%+ 跑起第二条工作流，并拿下第一笔合作伙伴来源交易，同时保留 6 个月缓冲
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk] 用于确定 pre-seed 轮规模，以及下一轮融资的证明包。'
- id: A25
  name: 研究版 SAM/SOM 张力
  value: 研究侧 SOM 假设 Y3 有 120 个 logo、$3.0M，而本模型 Y3 末只有 25 个 logo / 约 $1.0M ARR run-rate
  unit: note
  source: '[research.yaml market.som] 研究得出的 SOM 假设可触达 logo 数远高于商业计划自身 20-30 个客户的里程碑；本模型遵循更保守的商业计划，并在 sanityChecks 中标出这道缺口。'
