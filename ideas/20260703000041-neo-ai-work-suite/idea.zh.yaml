jobsToBeDone:
- job: 当战略客户甩来一份 300 题的安全问卷时，帮信任团队尽快拼出带引用、已获批准的答案，好让他们不必把半个工程组织都拉进救火，也能把交易按计划推进。
  currentAlternative: 共享表格，加上复制粘贴的答案库和 Slack 升级求助
  successMetric: 每次评审的问卷周转时间，以及吃掉的工程师工时
- job: 当客户质疑某项控制或要求更新证据时，帮 AppSec 和 GRC 把正确材料找齐、把例外路由出去，好让团队在不靠过期文档的前提下给出有底气的答复。
  currentAlternative: 在 Jira、云控制台、共享盘和邮件之间手工翻证据
  successMetric: 有最新证据支撑的答案占比，以及解决跟进问题所需时间
