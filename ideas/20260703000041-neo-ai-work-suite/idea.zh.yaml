topRisks:
- name: 现有厂商捆绑
  description: 信任中心、GRC 和协作软件的现有厂商，可能在初创公司站稳之前就补上更轻量的问卷工作流功能。
  mitigation: 先打最疼的评审队列，接入客户现有工具，并拿出可量化的交易提速 ROI，让通用捆绑短期追不上。
- name: 证据准确性责任
  description: 一条错误或过期的 AI 生成答案，可能带来合同、安全或声誉风险。
  mitigation: 所有草稿必须带引用，外发答案必须人工审批，关联政策和控制证据自动做过期检查。
- name: 跨团队采用阻力
  description: 这套流程横跨 GRC、AppSec、法务和售前工程；如果产品像又一套需要维护的系统，全面铺开就可能卡住。
  mitigation: 先围绕一支信任团队和其入站问卷落地，保留表格和 门户导出，只在首批队列证明周转更短、工程打断更少后再扩。
