differentiator: 现有的信任中心和问卷工具大多只管存答案，不负责按交易维度去刷新证据、追责任人、审批例外这类实时协作工作。信任评审工作图谱围绕一个工作对象搭建：问题、答案、证据、责任人、截止日期和客户影响，全都连在一处。这样 agent 能在不失控的前提下真正干活，也能沉淀一套专有的带引用答案与问题解决模式库——每做完一次评审都更强。
