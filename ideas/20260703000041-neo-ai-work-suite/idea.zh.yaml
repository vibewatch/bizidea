problem: 企业客户的安全评审，看上去是一份问卷，实则是一项混乱的跨团队协作工程。Trust、GRC、AppSec、售前工程和法务团队在电子表格、共享盘、Jira 工单和政策文档之间来回跳，只为在每一笔大单里反复回答同样的问题、再补一遍最新证据。通用 AI 助手能起草文案，却管不了流程、盯不住缺失材料，也证明不了哪条答案获批、为什么获批。结果就是交易周期变慢、回复老化、工程师在公司最想拿下企业收入的时候被频繁打断。
targetUser:
  primary: Series B-D 阶段的基础设施与安全 SaaS 公司里，负责 Trust 和 GRC 的管理者——每月要处理 20 份以上企业客户安全评审。
  secondary: 需要提供技术证据和例外说明的应用安全工程师、云安全工程师和解决方案工程师。
  buyer: 安全副总裁或 GRC 总监
startupThesis:
  nonObviousInsight: AI 原生工作的第一批真正赢家，不会在第一天就把整套办公套件全替掉；它们会先拿下那些反复发生的跨团队工作，在这些场景里，agent 必须像参与者一样拥有记忆、文件、任务、审批和应用访问权。客户信任评审正是这类变化最快兑现 ROI 的高频场景之一。
  beachhead: Series B-D 阶段的基础设施与安全 SaaS 厂商：每季度拿下 10 到 50 笔企业交易，在 Salesforce、Jira、Confluence、AWS 和 Google Drive 之间，每月要处理 20+ 份客户安全评审。
  wedge: 一张信任评审工作图谱：给每份问卷一个共享协作室，由 agents 起草带引用的答案、拉取证据、创建跟进任务，同时把审批权牢牢留在人手里。
  whyNowCatalyst: Neo 的发布在传递一个信号：AI 正在变成工作里的参与者，而文档、知识、文件、项目和接入应用的 agents 收敛速度已经够快，现在可以支撑专门为协作打造的系统。
  ventureScalePath: 先从客户安全评审切入，再扩到采购问卷、续约尽调、法务 redline、实施交接以及更广泛的企业交易执行，直到产品成为售前与售后协作工作的总控层。
solution: 信任评审工作图谱先吃进客户问卷，再把每道题映射到已批准的答案、政策、历史例外和实时证据，然后为这笔具体交易拉起一个共享评审室。agents 负责起草第一版回复、标出缺失证明、给正确责任人开任务，并为每次修改、引用和审批留下审计轨迹。产品一边导出客户可直接使用的表格和可上传到门户的内容，一边持续沉淀可复用的答案—证据图谱，供后续评审复用。时间一久，它会变成公司对企业买家做过哪些承诺、哪些控制项薄弱、哪些交易总被同一类缺口卡住的系统记录。
goToMarketSeed:
  firstCustomer: 一家 300-1,500 人的云基础设施或网络安全厂商：GRC/AppSec 团队只有 3-10 人，企业销售节奏快，重复出现的安全问卷已经开始拖慢七位数交易。
  buyingTrigger: 某个大客户商机或续约突然要求重新做一轮安全评审，回复积压开始侵占工程时间，管理层也能把问卷拖延直接对应到业绩预测滑点。
  currentAlternative: GRC、AppSec 和法务之间靠共享表格、信任中心页面、旧答案库、工单队列以及临时的 Slack / 邮件追问来协同。
  switchingReason: 首个客户愿意切换，是因为产品把混乱的回复流程收拢成一张带引用的工作图谱：初稿更快、责任更清楚、证据更新鲜、对工程师的打断更少。
  pricingHypothesis: 按活跃信任评审量和内部参与人数分层收费的年度平台订阅；证据连接器和客户 门户导出作为高阶版本收费。
whyNow:
- point: 市场正在从独立 AI 助手转向嵌入协作工作的 AI 参与者，因此，一个持续存在的评审室比又一个聊天机器人更可信。
