jobsToBeDone:
  - job: >-
      When a strategic prospect sends a 300-question security questionnaire, help the trust team assemble cited, approved
      answers fast, so they can keep the deal on schedule without pulling half the engineering org into fire drills
    currentAlternative: Shared spreadsheets plus copy-paste answer libraries and Slack escalation
    successMetric: Questionnaire turnaround time and engineer hours consumed per review
  - job: >-
      When a customer challenges a control or asks for fresh evidence, help AppSec and GRC gather the right artifacts and
      route exceptions, so they can answer confidently without stale documents
    currentAlternative: Manual evidence hunts across Jira, cloud consoles, shared drives, and email
    successMetric: Percentage of answers backed by current evidence and time to resolve follow-up questions
