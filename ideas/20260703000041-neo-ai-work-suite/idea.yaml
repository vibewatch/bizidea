topRisks:
  - name: Incumbent bundling
    description: >-
      Trust-center, GRC, and collaboration incumbents could add lighter questionnaire workflow features before the startup
      is entrenched.
    mitigation: >-
      Start with the highest-pain review queues, integrate into existing tools, and prove measurable deal-speed ROI that
      generic bundling cannot match quickly.
  - name: Evidence accuracy liability
    description: >-
      A wrong or stale AI-generated answer could create contractual, security, or reputational exposure with enterprise
      buyers.
    mitigation: >-
      Require citation-backed drafts, human approval on outbound answers, and automatic staleness checks on linked policies
      and control evidence.
  - name: Cross-functional adoption drag
    description: >-
      The workflow spans GRC, AppSec, legal, and sales engineering, so a broad rollout could stall if the product feels like
      another system to maintain.
    mitigation: >-
      Land with one trust team around inbound questionnaires, preserve spreadsheet and portal exports, and expand only after
      the first queue shows shorter turnaround and fewer engineer interruptions.
