problem: >-
  Enterprise customer security reviews are messy collaborative projects disguised as questionnaires. Trust, GRC, AppSec,
  sales engineering, and legal teams bounce between spreadsheets, shared drives, Jira tickets, and policy docs to answer
  the same questions and gather fresh evidence for every large deal. Generic AI assistants can draft prose, but they do not
  own the workflow, track missing artifacts, or prove which answer was approved and why. The result is slower deal cycles,
  stale responses, and expensive engineer interruptions at the exact moment a vendor is trying to close enterprise revenue.
targetUser:
  primary: >-
    Trust and GRC managers at Series B-D infrastructure and security SaaS companies handling 20 or more enterprise customer
    security reviews per month
  secondary: >-
    Application security engineers, cloud security engineers, and solution engineers who must provide technical evidence and
    exception answers
  buyer: VP Security or Director of GRC
startupThesis:
  nonObviousInsight: >-
    The first real winners from AI-native work will not replace the whole office suite on day one; they will own recurring
    cross-functional work where the agent must behave like a participant with memory, files, tasks, approvals, and app
    access. Customer trust reviews are one of the highest-frequency places where that shift creates immediate ROI.
  beachhead: >-
    Series B-D infrastructure and security SaaS vendors closing 10 to 50 enterprise deals per quarter and fielding 20-plus
    customer security reviews per month across Salesforce, Jira, Confluence, AWS, and Google Drive
  wedge: >-
    A trust-review workgraph that gives each questionnaire a shared room where agents draft cited answers, pull evidence,
    open follow-up tasks, and keep humans in approval control
  whyNowCatalyst: >-
    Neo's launch argues that AI is becoming a participant inside work and that docs, knowledge, files, projects, and
    app-connected agents are converging fast enough to support purpose-built collaborative systems now.
  ventureScalePath: >-
    Start with customer security reviews, expand into procurement questionnaires, renewal diligence, legal redlines,
    implementation handoffs, and broader enterprise deal execution until the product becomes the control layer for all pre-
    and post-sale collaborative work.
solution: >-
  Trust Review Workgraph ingests a customer questionnaire, maps each item to approved answers, policies, past exceptions,
  and live evidence, then spins up a shared room for the specific deal. Agents draft first-pass responses, highlight
  missing proof, open tasks for the right owner, and keep an audit trail of every change, citation, and approval. The
  product exports customer-ready spreadsheets and portal uploads while continuously updating a reusable answer-and-evidence
  graph across future reviews. Over time it becomes the system of record for what the company has promised enterprise
  buyers, which controls are weak, and which deals are blocked by the same unresolved gaps.
goToMarketSeed:
  firstCustomer: >-
    A 300-1,500 employee cloud infrastructure or cybersecurity vendor with a lean 3-10 person GRC/AppSec team, a
    fast-moving enterprise sales motion, and repeated security questionnaires delaying seven-figure deals
  buyingTrigger: >-
    A major enterprise prospect or renewal demands a fresh security review, the response backlog spills into engineering
    time, and leadership can tie questionnaire delay to forecast slippage
  currentAlternative: >-
    Shared spreadsheets, trust-center pages, old answer libraries, ticket queues, and ad hoc Slack or email follow-up
    across GRC, AppSec, and legal
  switchingReason: >-
    The first customer switches because the product turns a chaotic response process into one cited work graph with faster
    first drafts, clearer ownership, fresher evidence, and less engineer interruption
  pricingHypothesis: >-
    Annual platform subscription priced by active trust-review volume and number of internal contributors, with premium
    tiers for evidence connectors and customer portal exports
