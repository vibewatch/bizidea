scenarios:
  downside:
    description: >-
      Sales cycles stretch and expansion-module attach lags, so production accounts reach only 18 by
      Q4Y3 at a lower blended ACV.
    y3RevenueK: 472.5
    y3EbitdaK: -1861.1
    cashLowPointK: -779.3
    keyAssumptionChanges:
      - Y3 blended ACV falls from $40K to $35K as fewer accounts attach premium connectors or a second
        workflow.
      - Y3 exit customer count falls from 25 to 18 as the enterprise sales cycle stretches toward 9
        months.
      - The hiring plan stays intact, so lower revenue is not offset by lower headcount cost.
  base:
    description: >-
      Three Y1 design-partner pilots convert into a repeatable production motion, reaching 7 accounts
      by Y2 exit and 25 by Y3 exit as expansion modules lift blended ACV.
    y3RevenueK: 710.0
    y3EbitdaK: -1683.0
    cashLowPointK: -601.2
    keyAssumptionChanges:
      - Y1 pilot ARPU of $20K/year, rising to $30K blended annual ACV in Y2 and $40K in Y3 as expansion
        modules attach.
      - Customer ramp reaches 3 pilots at Y1 exit, 7 production accounts at Y2 exit, and 25 at Y3 exit.
      - Hiring stays lean (10 FTE by Q4Y3) and tracks the milestone-driven scale-up in
        [business-plan.yaml team].
  upside:
    description: >-
      Partner-sourced pipeline and faster pilot-to-production conversion push the company to 32
      production accounts by Q4Y3 at a richer expansion-driven ACV.
    y3RevenueK: 1035.0
    y3EbitdaK: -1502.2
    cashLowPointK: -420.4
    keyAssumptionChanges:
      - Y3 blended ACV rises from $40K to $45K as more accounts adopt premium connectors and a second
        workflow.
      - Y3 exit customer count rises from 25 to 32 on faster partner-sourced deals and a shorter sales
        cycle.
      - The same lean hiring plan absorbs the extra volume because onboarding stays standardized.
sensitivity:
  - variable: ARPU
    downsideCase: $35K Y3 blended ACV
    baseCase: $40K Y3 blended ACV
    upsideCase: $45K Y3 blended ACV
    y3RevenueImpactK: -88.8
    cashImpactK: -66.6
  - variable: CAC
    downsideCase: $85K blended CAC as founder-led outbound stays the primary motion
    baseCase: $60.7K blended CAC
    upsideCase: $45K blended CAC once partner-sourced pipeline scales
    y3RevenueImpactK: 0.0
    cashImpactK: -535.7
  - variable: churn
    downsideCase: 2.0% monthly logo churn from weak pilot-to-production retention
    baseCase: 1.2% monthly logo churn
    upsideCase: 0.8% monthly logo churn on strong workflow stickiness
    y3RevenueImpactK: -56.8
    cashImpactK: -42.6
  - variable: sales cycle
    downsideCase: 9-month enterprise sales cycle delays every cohort by roughly one quarter
    baseCase: ~6-month sales cycle from outbound to signed pilot
    upsideCase: 4-5 month cycle after the first documented 50%+ turnaround-time case study
    y3RevenueImpactK: -140.0
    cashImpactK: -105.0
  - variable: gross margin
    downsideCase: 65% gross margin because onboarding and support stay services-heavy
    baseCase: 75% gross margin
    upsideCase: 80% gross margin once connectors standardize onboarding
    y3RevenueImpactK: 0.0
    cashImpactK: -71.0
  - variable: hiring pace
    downsideCase: Account executive, CS, and growth-ops hires each pulled 1 quarter earlier
    baseCase: Lean base-case ramp to 10 FTE at Q4Y3
    upsideCase: Same hires delayed 1 quarter until after clearer production-conversion proof
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: >-
      Base-case revenue is driven by growing from 3 paid design-partner pilots to 25 annual-production
      customers as blended ACV rises from a $20K pilot rate to $40K by Y3 exit through expansion-module
      attach.
  - checkName: Must go right
    finding: >-
      The company must convert the Year-1 design partners into the 5-8 account milestone by month 24 so
      the Year-3 GTM hires (AE, CS, growth-ops) are funded by proven production ARR rather than pure
      burn.
  - checkName: Model breaks if
    finding: >-
      If the sales cycle stretches toward 9 months or Y3 ACV realization falls to $35K, cash falls to a
      -$779.3K low point (versus -$601.2K in the base case), meaning the $3.5M raise runs out well
      before the next round can close.
  - checkName: Next-round proof
    finding: >-
      The next financing is supported once 7 production accounts, 30%+ second-workflow expansion, and
      the first partner-sourced deal are proven by month 24, ahead of the base case's cash low point
      near month 31.
sanityChecks:
  ruleOf40: >-
    Y3 growth 373.3% + EBITDA margin -237.0% = 136.3%, a figure distorted by a very small Y2 revenue
    base rather than a genuine efficiency signal.
  burnMultiple: >-
    Y3 burn multiple is ~2.1x ($1,683.0K net burn / $790.0K net new ARR), inside the 1-3x range typical
    for pre-seed/seed but not yet an efficient SaaS motion.
  revenuePerFte: >-
    $100.0K Y3 ARR run-rate per FTE (10 FTE, $1,000K exit ARR), well below the $200-400K SaaS benchmark.
  flags:
    - Revenue per FTE stays well below the $200-400K SaaS benchmark through Y3, reflecting the
      research-estimated $25M SAM and a team built ahead of revenue proof rather than a mature
      efficiency profile.
    - The P&L customer count only grows and never decrements for logo churn; the 1.2% monthly churn
      assumption is used analytically for LTV/payback but is not subtracted from customersEop, so
      realized revenue and cash could be worse than shown if pilots or early accounts do not renew.
    - Cash goes negative in Q3Y3 and Q4Y3 under the $3.5M pre-seed raise (low point -$601.2K in the base
      case), meaning a seed round must close by roughly month 31 in every scenario, including upside.
    - The CAC payback period of ~24.3 months is longer than the sub-18-month benchmark for efficient
      enterprise SaaS, consistent with the plan's own founder-led sales cycle and pilot-to-annual
      conversion lag.
    - The research-derived SOM of $3.0M assumes 120 reachable logos by Y3, far more than this model's 25
      logos (~$1.0M ARR exit run-rate); hitting the full SOM would require a materially larger GTM
      engine than the current pre-seed funds.
