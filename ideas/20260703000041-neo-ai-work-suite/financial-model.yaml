slug: trust-review-workgraph
date: "2026-07-03"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-08"
    unit: YYYY-MM
    source: >-
      [business-plan.yaml date] first full month after the 2026-07-03 plan date.
  - id: A2
    name: Opening cash from pre-seed round
    value: "3500"
    unit: USDK
    source: >-
      [business-plan.yaml fundingAsk.targetFundingRangeUsd] sized near the upper-half of the stated
      $2-4M range so cash covers the 12-24 month milestone plus a 6-month buffer near month 30-31.
  - id: A3
    name: Y1 blended pilot ARPU
    value: "20"
    unit: USDK/year
    source: >-
      [business-plan.yaml investorMemo.firstCustomer.initialContract] uses the top of the stated
      $10k-$20k paid-pilot band, spread across the full Year-1 engagement window rather than only the
      8-12 week pilot term, since design partners typically remain engaged through procurement.
  - id: A4
    name: Design-partner ramp (Y1)
    value: "0,0,0,1,1,2,2,3,3,3,3,3 across M1-M12"
    unit: count
    source: >-
      [business-plan.yaml milestones 0-12 months] "sign 3 paid design partners" and "complete 8-10 live
      questionnaire runs" imply staggered pilot starts in M4, M6, and M8 after a ~3-month build/outbound
      period.
  - id: A5
    name: Gross margin target
    value: "75"
    unit: percent
    source: >-
      [business-plan.yaml businessModel.targetGrossMarginPct] modeled as 25% COGS on revenue
      (hosting, LLM/API inference costs, and support).
  - id: A6
    name: Y2 blended annual ACV (production)
    value: "30"
    unit: USDK/year
    source: >-
      [business-plan.yaml investorMemo.firstCustomer.initialContract] lower third of the stated
      $25k-$50k annual-subscription range, reflecting early conversions before premium connectors and
      expansion modules are attached.
  - id: A7
    name: Y3 blended annual ACV (production)
    value: "40"
    unit: USDK/year
    source: >-
      [business-plan.yaml businessModel.expansionLevers; milestones 24-36 months] higher inside the
      $25k-$50k range once premium evidence connectors, portal export, and expansion workflows
      (targeted at 25% of ARR by Y3) lift the blended contract value.
  - id: A8
    name: Customer ramp (production accounts)
    value: "3 pilots at Y1 exit, 7 at Y2 exit, 25 at Y3 exit"
    unit: count
    source: >-
      [business-plan.yaml milestones 12-24 months: "convert 5-8 accounts to annual production"; 24-36
      months: "reach 20-30 production customers"] uses the midpoint of each stated range as the base
      case.
  - id: A9
    name: Founder/CEO loaded annual cash cost
    value: "168"
    unit: USDK/year
    source: >-
      startup-finance heuristic: $140K cash salary plus 20% payroll tax/benefits load for a pre-seed
      enterprise security SaaS founder doing design-partner sales.
  - id: A10
    name: Founding engineer loaded annual cash cost
    value: "216"
    unit: USDK/year
    source: >-
      startup-finance heuristic: $180K cash plus 20% load for a senior founding engineer building the
      citation engine and connectors.
  - id: A11
    name: Trust operations product lead loaded annual cash cost and start
    value: "180, starting Month 3"
    unit: USDK/year
    source: >-
      [business-plan.yaml team] role and Month-3 start timing; cost is a startup-finance heuristic of
      $150K cash plus 20% load for a former GRC/AppSec operator.
  - id: A12
    name: Integrations engineer loaded annual cash cost and start
    value: "198, starting Month 6"
    unit: USDK/year
    source: >-
      [business-plan.yaml team] role and Month-6 start timing; cost is a startup-finance heuristic of
      $165K cash plus 20% load.
  - id: A13
    name: GTM / customer success lead loaded annual cash cost and start
    value: "174, starting Month 9"
    unit: USDK/year
    source: >-
      [business-plan.yaml team] role and Month-9 start timing; cost is a startup-finance heuristic of
      $145K cash plus 20% load.
  - id: A14
    name: Account executive loaded annual cash cost and start
    value: "180, added Q1 of Year 2"
    unit: USDK/year
    source: >-
      startup-finance heuristic: $150K OTE plus 20% load for an enterprise security AE, added once the
      Year-1 design partners exist to convert per [business-plan.yaml sequencingRationale].
  - id: A15
    name: Customer success / implementation lead loaded annual cash cost and start
    value: "156, added Q3 of Year 2"
    unit: USDK/year
    source: >-
      startup-finance heuristic: $130K cash plus 20% load, added as onboarding volume scales toward the
      12-24 month production-conversion milestone.
  - id: A16
    name: Second founding engineer loaded annual cash cost and start
    value: "216, added Q4 of Year 2"
    unit: USDK/year
    source: >-
      Same heuristic as A10; added to deepen the answer-and-evidence graph and expansion workflows per
      [business-plan.yaml product.twentyFourMonth].
  - id: A17
    name: Second integrations engineer loaded annual cash cost and start
    value: "198, added Q2 of Year 2"
    unit: USDK/year
    source: >-
      Same heuristic as A12; added to build trust-center sync and deeper cloud-evidence connectors per
      [business-plan.yaml product.twelveMonth / twentyFourMonth].
  - id: A18
    name: Growth and customer-ops associate loaded annual cash cost and start
    value: "150, added Q2 of Year 3"
    unit: USDK/year
    source: >-
      startup-finance heuristic: $125K cash plus 20% load for a combined pipeline/CS scaling hire that
      supports the push from 15 to 25 production accounts.
  - id: A19
    name: Non-payroll operating spend (Year 1)
    value: "S&M $3.0K + $0.3K/customer/mo; R&D $5.0K + $0.5K/customer/mo; G&A $6.0K + $0.2K/customer/mo"
    unit: USDK/month
    source: >-
      startup-finance heuristic for travel/outbound tooling, LLM-API and cloud hosting (the product
      drafts cited answers), and legal/SOC2-prep/accounting costs for an early enterprise security SaaS.
  - id: A20
    name: Non-payroll operating spend (Year 2-3)
    value: "S&M $4.0K + $0.3K/customer/mo; R&D $6.0K + $0.5K/customer/mo; G&A $7.0K + $0.2K/customer/mo"
    unit: USDK/month
    source: >-
      startup-finance heuristic step-up from A19 for added travel, conferences, higher LLM-inference
      volume, and compliance/audit costs as the customer base scales.
  - id: A21
    name: Monthly logo churn (unit economics)
    value: "1.2"
    unit: percent
    source: >-
      startup-finance heuristic for enterprise compliance-workflow SaaS with named-owner approvals and
      commitment history, which is stickier than a generic SMB SaaS churn assumption.
  - id: A22
    name: Blended CAC
    value: "60.65"
    unit: USDK/customer
    source: >-
      calc from modeled Year-2 plus Year-3 sales & marketing spend of $1,334.4K divided by 22 net new
      production customers (25 at Y3 exit minus 3 at Y1 exit).
  - id: A23
    name: Cash-conversion timing
    value: "EBITDA approximates operating cash flow"
    unit: policy
    source: >-
      startup-finance heuristic: no material capex, debt service, or working-capital swings are modeled
      for a pre-seed services-light SaaS company.
  - id: A24
    name: Funding milestone
    value: >-
      7 production accounts (within the 5-8 range), 30%+ running a second workflow, and the first
      partner-sourced deal, reached by month 24 with 6 months of buffer
    unit: milestone
    source: >-
      [business-plan.yaml milestones 12-24 months; fundingAsk] used to size the pre-seed round and the
      proof point for the next financing.
  - id: A25
    name: Research SAM/SOM tension
    value: "SOM $3.0M at 120 logos by Y3 vs. this model's 25 logos / ~$1.0M ARR exit run-rate"
    unit: note
    source: >-
      [research.yaml market.som] the research-derived SOM assumes a much larger reachable logo count
      than the business plan's own 20-30 customer milestone; this model follows the more conservative
      business-plan milestone and flags the gap in sanityChecks.
