  sensitivityCases:
  - case: Incumbent bundling accelerates faster than expected
    impact: If Drata, Vanta, or Responsive keep absorbing more workflow depth, the startup must win on per-deal orchestration, evidence freshness, and faster cross-functional follow-through rather than generic automation.
    sourceRefs:
    - 31
    - 46
    - 65
  - case: Trust portals deflect more work than expected
    impact: If proactive portals absorb a larger share of common buyer questions, the startup needs to focus on the complex, bespoke tail where approvals and fresh evidence still dominate.
    sourceRefs:
    - 36
    - 114
    - 113
