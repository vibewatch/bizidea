competitors:
- name: Conveyor
  stage: scale-up
  wedge: 面向客户安全评审的 AI 平台，覆盖信任中心、问卷自动化和 workflow analytics。
  pricing: Business 版 $9,600/年起；企业版 / 定制版更高。
  strength: 卖方侧聚焦很强，已有可见客户结果、400+ 客户，以及多家信任中心部署。
  weaknessVsUs: 更优化答案自动化和门户自助，而不是围绕责任人、审批和跟进搭一张按交易组织的工作图谱。
  sourceRefs:
  - 1
  - 3
  - 15
- name: Drata + SafeBase
  stage: incumbent
  wedge: 把合规自动化与 SafeBase 信任中心、问卷工作流合在一起的广谱信任管理平台。
  pricing: 定制 / 企业版
  strength: 安装基数大、信任中心足迹强，收购后 捆绑 能力明确。
  weaknessVsUs: 套件广度和门户重心，仍可能在实时、按交易协调与审批记忆这层留下空白。
  sourceRefs:
  - 30
  - 31
  - 32
- name: Vanta
  stage: incumbent
  wedge: 带 agentic 能力的信任平台，覆盖问卷自动化、信任中心、客户承诺和第三方风险管理。
  pricing: 定制 / 平台打包
  strength: 横向信任工具栈已经掌握许多客户的证据、合规状态和相邻工作流。
  weaknessVsUs: 更广的合规平台重心，使它不如一间专门处理实时客户评审及其跨团队跟进的房间那样聚焦。
  sourceRefs:
  - 46
  - 43
  - 45
  - 44
- name: HyperComply
  stage: scale-up
  wedge: 快速的卖方侧问卷回复产品，加上公开信任页面和类似 data room 的分享。
  pricing: 定制 / 企业版
  strength: 动作简单聚焦，在 1 天答完问卷和信任页面分流方面定位很强。
  weaknessVsUs: 缺少足够证据表明它有深层控制图谱或跨团队任务编排层。
  sourceRefs:
  - 35
  - 36
  - 38
- name: Responsive
  stage: incumbent
  wedge: 面向 DDQ、RFP 和安全问卷的广谱响应管理平台，带 AI 和动态信任中心。
  pricing: 定制 / 企业版
  strength: 成熟的多角色协作工作流，机构采用深，相邻场景也多。
  weaknessVsUs: 更广的提案软件定位，使它在证据时效、承诺跟踪和控制证明上不够 原生安全。
  sourceRefs:
  - 65
  - 67
regulatoryTechnicalConstraints:
- point: 标准化问卷依旧映射到常见控制集，所以产品必须能干净地导入、归一化并导出 SIG、CAIQ 和 SOC 式证据。
  sourceRefs:
  - 90
  - 91
  - 92
- point: AI 辅助输出在发给客户前，必须接受成文的风险管理和人工监督。
  sourceRefs:
  - 93
  - 95
  - 73
- point: 公开信任中心能减少重复劳动，但抹不掉买方特定的追问，所以产品必须同时支持自助和实时协作。
  sourceRefs:
  - 36
  - 44
  - 114
- point: 答案能否保持最新，关键取决于是否同步已批准文档和责任系统，而不只是把文字片段塞进静态答案库。
  sourceRefs:
  - 8
  - 45
  - 113
validationSignals:
- point: Drata 为 SafeBase 花了 $250M；收购公告称，已有 1,000+ 家组织使用 SafeBase 的信任中心，累计推动约 $15B 与安全相关的收入。
  sourceRefs:
  - 30
  - 31
- point: TechCrunch 报道，Conveyor 已服务 400+ 客户，并声称其 AI 可以自主且准确地完成 90% 以上客户安全问题。
  sourceRefs:
  - 1
- point: SecurityPal 称自己已经回答过 200 多万个安全问题；Supabase 的案例则把痛点具象化为每周省下 80 小时手工工作。
  sourceRefs:
  - 85
  - 83
- point: OpenAI 和 Asana 都在维护由 SafeBase 驱动的公开信任门户，说明实时证据中心已经是现代企业软件厂商的标准配置。
  sourceRefs:
  - 114
  - 113
openQuestions:
- 目标 logo 里究竟有多少已经在用 Vanta、Drata、Conveyor 或 Responsive？他们会买一层工作流叠加层，还是宁可再开一个模块？
- 哪类集成最快跑出首月 ROI：文档仓库、工单系统、云控制证据，还是 CRM 与续约工作流？
- 在信任中心内容分流之后，还能有多少买方问题留给团队做人肉跟进和审批？
- 法务和售前工程会接受一个共享审批室，还是会坚持留在邮件和工单系统里？
