  searchedQueries:
  - 查找客户安全问卷对 SaaS 销售周期和安全团队工作负荷影响的来源。
  - 查找安全问卷自动化、信任中心、厂商产品，以及 SaaS 客户安全评审相关来源。
  - 查找 Shared Assessments SIG、CAIQ、SOC 2 等云与供应商安全评审官方来源。
  - 查找 Conveyor、SafeBase、Vanta、Drata、HyperComply、Whistic、Responsive 的官方定价、案例和融资信息。
  - 查找与信任管理软件相关的第三方风险管理和 GRC 市场增长数据。
  - 查找由 SafeBase 和 Conveyor 驱动的公开信任中心示例。
  - 查找用于安全问卷、知识库和审批工作流的 AI agents 相关来源。
  - 查找从业者关于安全问卷瓶颈和信任中心工作流的指南。
  - 查找 Drata 收购 SafeBase 的信任管理来源和客户体量信息。
  - 查找关于手工问卷耗时和加速成交的 security assurance 案例研究。
