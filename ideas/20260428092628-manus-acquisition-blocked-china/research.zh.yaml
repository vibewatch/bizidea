categoryDynamics:
  growthRate: 英国 NSIA 申报量同比 +26%；跨境中端市场并购交易数量同比 +16.7%
  growthRateSourceRefs: [12, 19]
  tailwinds:
    - point: AI 已被明确纳入美国对华相关交易的对外投资管制。
      sourceRefs: [3, 8]
    - point: 英国已将 AI 视为强制审查行业。
      sourceRefs: [9, 10]
    - point: 欧盟修订后的框架将使 AI 成为共同最低敏感类别。
      sourceRefs: [15, 16]
    - point: 交易软件 incumbents 正在训练用户期待 AI 辅助尽调和翻译。
      sourceRefs: [25, 26, 27, 30]
  headwinds:
    - point: 监管结果仍具有裁量性，而且解释往往不足。
      sourceRefs: [2, 5, 22]
    - point: 初始买方池高度集中且呈间歇性。
      sourceRefs: [19, 20, 21]
    - point: 一些英国改革旨在减少不必要申报，可能削减低端工作流量。
      sourceRefs: [11, 12]
competitors:
  - name: Datasite
    stage: incumbent
    wedge: 面向企业、银行和律所的 AI 增强型 VDR 与全生命周期交易工作流。
    pricing: 定制化企业定价；按报价提供 [25][28][29]。
    strength: 强大的交易资料室分发、审计轨迹、跟踪器、多语言支持以及广泛的企业信任。
    weaknessVsUs: 以文档为中心；不原生建模按司法辖区划分的主权风险触发、资产转移或交易结构替代方案。
    sourceRefs: [25, 28, 29, 30]
  - name: Ansarada
    stage: scale-up
    wedge: AI 驱动的 VDR，加上工作流模板、竞标方分析以及面向律所/投行的打包方案。
    pricing: 订阅制 / 在线询价；部分工作流在正式上线前免费。
    strength: 比多数 VDR 更接近结构化工作流，具备 AI 翻译、买方预测以及简洁的定价表达。
    weaknessVsUs: 仍以 VDR 为先且交易通用化；在监管特定的 AI 资产本体和主权风险情景推演上较弱。
    sourceRefs: [26, 27, 30]
  - name: Kharon
    stage: scale-up
    wedge: 通过搜索、图谱和 API 产品提供经验证的地缘政治、所有权、制裁和最终用途情报。
    pricing: 定制化企业定价。
    strength: 高质量的实体与网络情报，合规团队已信任其可辩护的筛查能力。
    weaknessVsUs: 能映射交易对手和风险网络，但不覆盖交易工作计划、交割前控制或法律结构选项。
    sourceRefs: [24]
  - name: Exiger
    stage: scale-up
    wedge: 基于证据的风险/合规图谱，覆盖第三方风险、尽调和供应链可视性。
    pricing: 定制化企业定价。
    strength: 强审计轨迹、广覆盖风险能力，以及企业/政府端信誉。
    weaknessVsUs: 属于广义合规产品，而非专为 AI 并购审批打造的通道；可辅助尽调，但无法拥有交易图谱。
    sourceRefs: [23]
regulatoryTechnicalConstraints:
  - point: 交易可能在签约后，甚至在运营整合开始后，被撤销或认定无效。
    sourceRefs: [1, 2, 9, 10]
  - point: CFIUS 及相关制度需要结构化披露、门户申报和审查时钟，因此高质量数据收集会得到回报。
    sourceRefs: [4, 7]
  - point: 处罚和缓释风险提高了虚假或不完整申报的代价。
    sourceRefs: [5]
  - point: 对外 AI 限制除了目标国筛查之外，也为投资方侧带来了尽调义务。
    sourceRefs: [3, 8]
  - point: 跨境数据传输限制和权限控制使交易材料的集中分析变得复杂。
    sourceRefs: [27, 31]
validationSignals:
  - point: 中国公开叫停并要求撤销一笔涉及 Meta 与 Manus 的标志性 AI 收购。
    sourceRefs: [1, 2]
  - point: 美国财政部推出 Known Investor 试点，并就简化外资审查流程征求公众意见。
    sourceRefs: [6, 7]
  - point: 英国报告 2024/25 年共有 1,143 起申报，同比显著增长，其中 1 起撤销令、16 起附条件批准。
    sourceRefs: [10, 12]
  - point: 欧盟正推动强制性审查机制，并将 AI 纳入范围，表明该类别仍在持续扩张。
    sourceRefs: [15, 16]
  - point: 交易软件 incumbents 正快速把 AI 搜索、翻译、摘要和竞标分析嵌入尽调工作流。
    sourceRefs: [25, 26, 27, 30]
  - point: 风险情报供应商强调经验证的图谱和通过 API 交付的证据链，验证了对机器可读风险基础设施的需求。
    sourceRefs: [23, 24]
openQuestions:
  - GC 会在真实交易公布前就购买，还是只有在排他期内紧迫性最高时才会购买？
  - 首年价值中有多少可以产品化，而不是依赖定制法律服务？
  - 在并购之外，哪些交易类型（模型许可、合资、云部署）最快转化为重复支出？
  - 在 incumbents 复制该工作流之前，创业公司能否获取足够多的真实结果数据来建立推荐护城河？
