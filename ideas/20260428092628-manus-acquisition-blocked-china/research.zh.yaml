  fiveForces:
    supplierPower:
      score: 4
      rationale: "监管专业能力和可验证的地缘政治/实体数据仍集中在顶级律所与专业风险数据厂商手里。"
      sourceRefs: [20, 21, 23, 24]
    buyerPower:
      score: 4
      rationale: "买方群体集中且很专业，替代品又很多，包括律所、VDR 和内部团队。"
      sourceRefs: [20, 21, 25, 26]
    threatOfEntrants:
      score: 3
      rationale: "工作流软件本身不难做，但真正难的是可审计的交易本体和结果数据。"
      sourceRefs: [23, 24, 25, 26]
    threatOfSubstitutes:
      score: 5
      rationale: "律所、电子表格和现有 deal room 已经解决了足够多的问题，足以挡住不够强的产品。"
      sourceRefs: [20, 21, 25, 26, 30]
    competitiveRivalry:
      score: 3
      rationale: "今天几乎没有直接的纯玩家竞争，但相邻现有厂商可以很快切进来。"
      sourceRefs: [23, 24, 25, 26]
  pestle:
    - factor: 政治
      impact: positive
      point: "经济安全政策持续外扩，提高了需要结构化审查准备的交易频率。"
      sourceRefs: [8, 15, 16]
    - factor: 经济
      impact: neutral
      point: "2025 年跨境交易活动有所恢复，但成交仍集中在规模更大、资本更充足的买方手中。"
      sourceRefs: [18, 19]
    - factor: 社会
      impact: neutral
      point: "在一笔标志性交易被撤销后，董事会和法务团队对与中国相关的 AI 交易更在意声誉反噬。"
      sourceRefs: [1, 2]
    - factor: 技术
      impact: positive
      point: "AI 原生的 VDR 与知识图谱工具让产品层的搭建成本下降，但也抬高了买方预期。"
      sourceRefs: [23, 24, 25, 26, 27]
    - factor: 法律
      impact: positive
      point: "强制申报、交易无效风险、处罚和附条件义务，把合规工作流的痛点变成了可以单独预算的支出。"
      sourceRefs: [4, 5, 9, 10]
    - factor: 环境
      impact: neutral
      point: "环境因素不是这个初始切口的核心，但更广泛的关键基础设施和原材料审查趋势会外溢到相邻的主权工作流。"
      sourceRefs: [16, 19]
  adoptionFrictionMatrix:
    - friction: "律师可能会把软件视为对法律判断边界的侵入。"
      severity: 高
      affectedBuyer: "总法律顾问与外部并购律师"
      mitigation: "把产品定位成证据准备和情景推演层，而不是法律意见替代品。"
      sourceRefs: [20, 21]
    - friction: "在排他期前，很难拿到真实 deal room 数据。"
      severity: 中
      affectedBuyer: "企业发展运营团队"
      mitigation: "先从轻量化 intake 模板和 VDR 连接器做起。"
      sourceRefs: [25, 26, 30]
    - friction: "交易量不平滑，会让年度软件预算更难立项。"
      severity: 高
      affectedBuyer: "企业发展活动呈周期性的晚期 AI 平台公司"
      mitigation: "把保留式订阅和按交易收费模块结合起来，再扩到交割后监控。"
      sourceRefs: [19, 25, 26]
    - friction: "跨境数据传输和权限控制会阻碍集中式分析。"
      severity: 中
      affectedBuyer: "安全与合规团队"
      mitigation: "提供带权限感知的导入、区域化处理选项和可审计控制。"
      sourceRefs: [27, 31]
market:
  tam:
    value: "$67.5M"
    rationale: >-
      估算方式：2025 年约有 4,143 笔跨境中端市场交易 [19]，其中 IT/医疗约占 50% [19]，再取其中 15% 作为与 AI/主权风险相关的子集 [calc, constrained by [17][18]]，约等于 311 笔中端相关交易；再加上约 139 笔大市值或准交易型的 AI 交易 / 合资 / 授权项目 [calc]；按中位数 450 个年度机会、每笔活跃客户/交易约 $150k 的混合支出建模（$50k 工作台 + $100k 交易模块，锚定企业级 VDR 定制定价和 CFIUS 费用承受能力 [4][25][28][29]）。
    isEstimate: true
    sourceRefs: [4, 17, 18, 19, 25, 28, 29]
  sam:
    value: "$23.7M"
    rationale: >-
      约束条件：假设 TAM 中有 35% 是美国和新加坡 AI 平台买方及其律师在与中国相关交易上的可触达滩头需求；450 x 35% = 158 个机会 x $150k。
    isEstimate: true
    sourceRefs: [1, 8, 17, 19, 25]
  som:
    value: "$2.4M"
    rationale: >-
      第 3 年可达份额假设为 12 个付费账户、每个账户年化混合价值约 $200k（8 个战略买方 + 4 家高频使用的律所/顾问），对一个狭窄但高单价的切口来说，这个目标激进但不离谱。
    isEstimate: true
    sourceRefs: [20, 21, 25, 26]
