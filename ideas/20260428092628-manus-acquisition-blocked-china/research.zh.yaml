competitors:
  - name: "Datasite"
    stage: "现有厂商"
    wedge: "面向企业、银行和律所的 AI 增强型 VDR 与全生命周期交易工作流。"
    pricing: "定制化企业定价；需要报价 [25][28][29]。"
    strength: "拥有深厚的 deal room 分发能力、审计轨迹、跟踪器、多语言支持，以及广泛的企业信任。"
    weaknessVsUs: "以文档为中心；不会原生建模按司法辖区划分的主权风险触发点、资产转移或备选交易结构。"
    sourceRefs: [25, 28, 29, 30]
  - name: "Ansarada"
    stage: "成长阶段"
    wedge: "AI 驱动的 VDR，加上工作流模板、竞标方分析，以及面向律所/投行的打包方案。"
    pricing: "订阅制 / 在线询价；部分工作流在 go-live 前免费。"
    strength: "比多数 VDR 更接近结构化工作流，具备 AI 翻译、买方预测和相对清晰的定价表达。"
    weaknessVsUs: "仍然是 VDR 优先、面向通用交易；在监管特定的 AI 资产本体和主权风险情景推演上很弱。"
    sourceRefs: [26, 27, 30]
  - name: "Kharon"
    stage: "成长阶段"
    wedge: "通过搜索、图谱和 API 产品提供可验证的地缘政治、所有权、制裁和最终用途情报。"
    pricing: "定制化企业定价。"
    strength: "高质量的实体和关系网络情报，合规团队已经信任，筛查结论也更可辩护。"
    weaknessVsUs: "它能映射交易对手和风险网络，但不会管理交易工作计划、交割前控制或法律结构选项。"
    sourceRefs: [24]
  - name: "Exiger"
    stage: "成长阶段"
    wedge: "基于证据的风险/合规图谱，覆盖第三方风险、尽调和供应链可视化。"
    pricing: "定制化企业定价。"
    strength: "审计轨迹强、风险覆盖广，并具备企业与政府市场信誉。"
    weaknessVsUs: "它是广义合规产品，而不是为 AI 并购审批打造的专用轨道；可以辅助尽调，但无法拥有完整交易图谱。"
    sourceRefs: [23]
regulatoryTechnicalConstraints:
  - point: "交易可能在签约后，甚至运营整合已经开始后，被要求撤销或被判无效。"
    sourceRefs: [1, 2, 9, 10]
  - point: "CFIUS 等制度要求结构化披露、门户申报和审查时钟，因此干净的数据采集会明显占优。"
    sourceRefs: [4, 7]
  - point: "处罚和附条件义务风险会抬高虚假或不完整申报的代价。"
    sourceRefs: [5]
  - point: "AI 对外投资限制会让投资方除了目标国审查外，还额外承担尽调义务。"
    sourceRefs: [3, 8]
  - point: "跨境数据传输限制与权限控制，会让集中分析交易材料变得更复杂。"
    sourceRefs: [27, 31]
validationSignals:
  - point: "中国公开叫停并要求撤销一笔涉及 Meta 与 Manus 的标志性 AI 收购案。"
    sourceRefs: [1, 2]
  - point: "财政部先推出 Known Investor 试点，随后又就简化外资审查流程征求公众意见。"
    sourceRefs: [6, 7]
  - point: "英国在 2024/25 年收到 1,143 份申报，同比大增，其中有 1 笔撤销令和 16 笔附条件批准。"
    sourceRefs: [10, 12]
  - point: "欧盟正推动强制性审查机制，并把 AI 纳入范围，说明这个类别仍在继续扩张。"
    sourceRefs: [15, 16]
  - point: "交易软件现有厂商正迅速把 AI 搜索、翻译、摘要和竞标分析嵌入尽调工作流。"
    sourceRefs: [25, 26, 27, 30]
  - point: "风险情报厂商强调可验证图谱和 API 交付的证据链，这验证了市场对机器可读风险基础设施的需求。"
    sourceRefs: [23, 24]
