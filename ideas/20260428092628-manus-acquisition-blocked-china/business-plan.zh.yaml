slug: cross-border-ai-clearance
date: 2026-04-28
executiveSummary: >-
  跨境 AI 审批正在形成一条独立工作流，因为监管机构已经开始把 AI 收购、acquihire 和相关资产转移视为国家安全事件，而不是普通并购。Manus 交易被撤销说明，这个痛点不是纸面上的：买方可能已经投入数月尽调，甚至开始团队整合，交易仍会被强制拆回去。公司应从一个更窄的产品切入，服务美国和新加坡 AI 买方中的总法律顾问与企业发展团队，帮助他们评估与中国相关的交易。MVP 是一张交易图谱，映射实体、受益所有人、工程师、代码仓库、模型资产、数据权利主张、算力依赖和计划中的转移动作，并标出潜在审查触发点和交割前禁止动作。Go-to-market 应由律师带动，围绕已签 LOI、排他期和内部整合计划等事件触发，并按活跃敏感交易定价，而不是按 seat 收费。只有当业务始终以软件为主，这门生意才有吸引力：图谱、审计轨迹和结构情景引擎必须让律师流程更快，而不是把公司变成一家定制顾问行。研究得出的滩头市场较窄，估算 TAM 为 $67.5M、SAM 为 $23.7M、第 3 年 SOM 为 $2.4M，所以能否成立，取决于它后续能否扩到模型授权、合资、云部署审批和交割后主权控制。最关键的反证风险在于：顶级律所和 VDR 现有厂商也许已经“够用”，最后让创业公司拿到的只是起伏很大的服务收入，而不是可重复的软件合同。
problem:
  - "跨境 AI 交易今天仍靠备忘录、电子表格和彼此割裂的本地律师流程推进，而这些流程并不会把代码、模型权利、工程师或计划中的转移动作当成一等交易对象来建模。"
  - "一旦监管在后期介入，买方可能白白烧掉尽调预算、过早调动员工、暴露代码或数据，最后仍被迫撤销交易。"
solution:
  - "提供一个交易审批工作台，把 deal room 材料转成一张跨司法辖区的 AI 资产、人员、所有权和控制权动态图谱。"
  - "标出潜在审查触发点，拦下高风险的交割前动作，并生成分阶段 acquihire、授权、隔离式 JV 或延后转移方案等更稳妥的结构选项。"
whyWeWin:
  - "产品正好补在 VDR 和法律意见之间的空白层，按工程师、代码仓库、模型资产、算力和控制权变化来建模主权风险。"
  - "只要律师愿意信任，每一笔交易都会带来可复用的图谱数据，以及关于哪些结构会获批、延迟或撤销的结果数据，逐步形成更难复制的推荐护城河。"
strategicChoices:
  beachhead: "面向美国和新加坡 AI 平台买方的签约前审批准备，它们正在评估与中国相关的 acquihire、资产收购或战略性 tuck-in。"
  wedgeRationale: >-
    这个切口的痛点、买方和触发条件都最清晰。只要签了 LOI 或准备迁移工程师/代码，预算就会立刻出现；同时，这个工作流也足够窄，能在单笔交易里证明价值，而不必替换客户原有的数据室、律所或更大范围的合规栈。
  sequencingRationale: >-
    公司应先把 intake、图谱构建、触发识别和交割前控制做出来，因为这是在真实交易里拿到可量化证明点的最短路径。只有先赢得律师信任，后续再叠加更深的系统集成、基于结果的推荐和交割后监控，才有机会顺势扩到复用同一张图谱的相邻交易类型。
  notYet:
    - "通用制裁与第三方风险管理。"
    - "完整的反垄断、出口管制或 VDR 替代型工作流。"
    - "SMB 和非 AI 跨境并购。"
market:
  tam: "$67.5M，约对应每年 450 个与 AI 主权风险相关的交易或项目，每个机会约 $150k 的混合支出。"
  sam: "$23.7M，来自美国和新加坡 AI 买方及其律师在与中国相关交易上的可触达滩头支出。"
  som: "$2.4M，第 3 年目标为 12 个付费账户、每个账户约 $200k 的混合年价值。"
  segments:
    - "核心细分：拥有活跃企业发展团队、正在推进与中国相关 acquihire 或资产收购的晚期 AI 平台公司。"
    - "次级细分：反复参与跨境 AI 交易的顶级并购律师与专业顾问。"
  buyingProcess: >-
    购买流程更像事件触发，而不是年度预算驱动：一旦签了 LOI、进入排他期，或者业务团队想在最终审批前先转移工程师、代码或 IP，GC/CLO 与企业发展负责人就会发起采购。外部律师对供应商选择影响极大，因此推荐背书和审计可信度，比大范围市场营销更重要。
product:
  mvp: >-
    MVP 是一个带权限控制的工作台，先导入一小批交易文档和人工上传的资产清单，再产出可直接面向监管的交易图谱、辖区触发标记、交割前限制动作日志，以及供律师评审的并列结构方案。
  sixMonth: "上线 VDR 导入、律师评审工作流、覆盖美国/中国/英国/欧盟审查的规则包，以及面向真实试点的可导出审计材料。"
  twelveMonth: "基于早期结果加入推荐评分、带审批门槛的工作流步骤，以及针对附条件批准或延迟交割交易的签约后义务跟踪。"
  twentyFourMonth: "把同一张图谱扩展到模型授权、合资、云部署审批和交割后运营限制等相邻主权工作流。"
  keyBets:
    - "客户会足够信任软件生成的交易图谱，愿意在外部律师备忘录定稿前就拿来使用。"
    - "首个价值点所需的最小数据集，可以从现有交易材料中拿到，而不必做很深的系统集成。"
    - "早期交易结果数据带来的推荐质量提升，会快于现有厂商补上通用 AI 功能的速度。"
gtm:
  wedge: "针对真实或即将发生、且与中国相关的 AI 交易，销售一套付费审批准备模块；在这里，做错的代价就是交易撤销和交割延迟。"
  channels:
    - "由创始人主导，直接触达已识别的 AI 买方中的 GC/CLO 和企业发展负责人。"
    - "与 CFIUS、FDI 及国家安全并购律师建立转介绍合作。"
    - "通过集成和实施手册，嵌入现有 VDR 工作流。"
    - "围绕已公布的 AI 交易、排他期和已知工程师迁移计划做事件驱动型触达。"
  funnelTargets: "暖介绍到合格试点 >25%，试点到付费正式部署 >50%，正式账户在 12 个月内扩展到第二笔交易或监控模块 >40%。"
  pricing: "按报价收取年度平台保留费，叠加每个活跃交易模块；首批试点必须收费，并可抵扣正式合同，确保公司先拿到紧急交易预算，而不是滑向按小时收费的服务模式。"
businessModel:
  revenueStreams:
    - "审批工作台的年度平台订阅。"
    - "按交易收取的评估与情景推演模块费用。"
    - "交割后的主权监控与义务跟踪。"
    - "通过律所和顾问部署带来的渠道收入。"
  unitOfValue: "正在管理中的活跃敏感交易或主权项目。"
  targetGrossMarginPct: 70
  expansionLevers:
    - "扩展到更多交易类型，包括授权、JV 和云部署审批。"
    - "把一次性交易账户转成持续的交割后监控。"
    - "通过每年管理多笔交易的高频律所销售。"
    - "把推荐和证据 API 授权给 VDR 或风险情报生态。"
strategyMap:
  northStarMetric: "在正式环境中管理、且已记录交割前控制动作的活跃敏感交易数量。"
  inputMetrics:
    - "每季度由律师带来的介绍数量。"
    - "从文档导入到产出首版风险地图的中位天数。"
    - "试点转正式部署的转化率。"
    - "每笔真实交易中被拦下的交割前高风险动作数量。"
    - "正式账户在第二笔交易或监控工作流上的使用占比。"
  moatsToBuild:
    - "面向 AI 资产、工程师、控制权与转移路径的交易本体。"
    - "关于获批、附条件批准、延迟和撤销结构的结果数据集。"
    - "嵌入真实交易流程、并被律师信任的审计轨迹。"
    - "通过专业律所和 VDR 集成形成的分发能力。"
  killCriteria:
    - "前 15 个目标买方里，6 个月内愿意进入付费试点的少于 3 个。"
    - "完成 6 个试点后，试点转正式部署仍低于 33%。"
    - "超过一半的试点工作都变成无法模板化的定制法律分析。"
    - "任一账户上线后 12 个月内都没有扩到第二笔交易或监控模块。"
  mermaid: |
    flowchart LR
      Wedge[与中国相关的 AI 交易准备] --> MVP[交易图谱与触发引擎]
      MVP --> Proof[付费试点与交割前失误被拦下]
      Proof --> Expansion[授权、JV 和交割后主权工作流]
investorMemo:
  verdict:
    call: 观察
    conviction: "痛点真实、切口也很锋利，但在软件支出和重复使用率真正跑赢定制法律服务重力之前，风险投资逻辑仍未被证明。"
    whyBelieve: "一笔公开被撤销的 AI 交易、不断扩大的美英欧审查范围，以及尚无直接工作流现有厂商占位，共同构成了一个可信的窄切口机会。"
    whyDoubt: "买方群体集中，律师掌控流程，而相邻的 VDR 或风险数据厂商也可能吸走大部分价值。"
    nextDiligence: "验证 3 到 5 笔真实或刚刚完成的交易里，产品是否能更早识别关键问题，并让 GC 或其律师愿意为试点买单。"
  firstCustomer:
    title: "由 GC 主导的企业发展团队，所在公司为 Series B 到上市阶段的 AI 平台买方"
    profile: "一家设在美国或新加坡的 AI 公司，具备积极并购意愿、内部法务团队不大，且正推进一笔与中国相关的交易，工程师、代码或模型权利可能在审批前发生转移。"
    trigger: "已签 LOI、进入排他期，或内部压力要求在跨境安全审查尚未明朗前先开始整合。"
    buyer: "总法律顾问或首席法务官"
    initialContract: "$40k-$75k 的付费准备试点，可抵扣后续 $125k-$250k 年度工作台合同及按交易收费模块。"
  mustBeTrue:
    - "15 位目标 GC 中，至少有 5 位表示，在处理真实敏感交易时，他们会在外部律师意见之前或同时购买软件。"
    - "MVP 能在 7 个自然日内，基于现有交易文档产出一张有用的交易图谱。"
    - "至少一半试点用户承认，产品比他们过去的“备忘录 + 电子表格”流程更早识别出关键触发点或阻断动作。"
    - "律所合伙人愿意共同销售，至少不会阻止使用，因为产品能提升他们的工作效率和审计轨迹质量。"
    - "有意义的一部分账户会在 12 个月内从单笔交易扩展到重复交易或交割后监控。"
  diligenceQuestions:
    - "真正会在一年内多次遇到这个问题的 AI 买方到底有多少？"
    - "在无法完整访问 deal room 前，首个价值点需要的最小数据集是什么？"
    - "哪些律所会主动推动这个平台，哪些会把它看成抢走法律意见工作？"
    - "在客户开始要求定制法律分析前，推荐层里有多少内容可以自动化？"
    - "并购准备之后，哪个相邻工作流转化最快：授权、JV 设立，还是交割后监控？"
  riskHeatmap:
    - risk: "实施过程过于服务化"
      likelihood: High
      impact: High
      leadingIndicator: "试点中反复需要定制备忘录撰写或合伙人级法律解释，无法沉淀为产品工作流。"
      mitigation: "把法律意见工作留给外部合伙人律师，产品只负责图谱、触发识别、工作流控制和审计输出。"
    - risk: "交易量过于集中"
      likelihood: High
      impact: High
      leadingIndicator: "连续两个季度内，目标 ICP 管道里都不到 10 个合格的真实机会。"
      mitigation: "维持高 ACV 定价，加入高频使用的律所渠道，并在切口被验证后扩展到授权、JV 和交割后监控。"
    - risk: "律师阻碍采用"
      likelihood: Medium
      impact: High
      leadingIndicator: "转介绍能带来演示，但进不了试点，因为律所坚持继续用电子表格和备忘录。"
      mitigation: "把产品定位成让律师更强的基础设施，提供白标输出，并尽早招募专业律所设计伙伴。"
    - risk: "现有厂商的相邻进入"
      likelihood: Medium
      impact: Medium
      leadingIndicator: "VDR 或风险情报厂商在创业公司积累结果数据前，就先上线主权风险图谱与可供律师直接使用的情景输出。"
      mitigation: "尽快把 AI 专用本体、渠道合作和交易结果采集做深，这是通用现有厂商最缺的。"
    - risk: "监管不透明削弱预测价值"
      likelihood: Medium
      impact: High
      leadingIndicator: "用户只把产品当文档存储，因为触发标记噪音太大、无法形成动作。"
      mitigation: "销售“准备度 + 结构情景推演”，而不是确定性的审批预测，再通过人工复核和结果跟踪不断提高逻辑质量。"
operatingAssumptions:
  - assumption: "目标买方会从交易预算或外部律师预算中批准付费试点，而不是要求走正式的年度软件采购周期。"
    basis: research.yaml
    validationTest: "在 6 个月内完成 15 次买方访谈，并拿下至少 3 个与真实或近期交易挂钩的付费试点。"
    decisionImpact: "如果不成立，公司就得转向律所主导销售或服务优先模式，烧钱更快，风险投资吸引力也会下降。"
  - assumption: "无需深度企业集成，只用 VDR 导出、股权表、团队名单和代码仓库清单，就能搭出首个有价值的图谱。"
    basis: 创始团队判断
    validationTest: "用轻量连接器和上传模板完成 3 个试点入驻，并把首版风险地图产出时间压到 7 天以内。"
    decisionImpact: "如果不成立，实施成本就会上升，产品需要收窄到更小的文档集，或只服务高 ACV 的大客户。"
  - assumption: "只要产品能输出可审计的证据包，并把最终法律判断留在软件之外，律师就会信任它。"
    basis: research.yaml
    validationTest: "招募 2 家设计伙伴律所，衡量它们的律师是否在真实案件中使用导出的图谱和审计日志。"
    decisionImpact: "如果不成立，分发会被压缩，公司只能更直接卖给企业内法务团队，路径会更慢、壁垒也更弱。"
  - assumption: "客户在处理一笔敏感交易后，12 个月内很可能再买一套授权、JV 或交割后监控工作流。"
    basis: idea.yaml
    validationTest: "跟踪前 6 个正式账户的扩展行为，至少要有 2 个账户扩展到多工作流使用。"
    decisionImpact: "如果不成立，这个市场就会过于事件驱动，公司需要重新评估单靠滩头市场是否足以支撑风险投资回报。"
  - assumption: "在不把产品推向定制顾问经济学的前提下，混合年合同价值可以达到约 $150k-$200k。"
    basis: research.yaml
    validationTest: "签下 3 份正式合同，基础合同不低于 $125k，并叠加按交易收费模块，同时把服务收入控制在合同价值的 20% 以下。"
    decisionImpact: "如果不成立，公司就需要更低成本的自助产品，或更大的市场空间才能达到规模。"
experimentRoadmap:
  - horizon: 0–90 天
    experiment: "围绕 10 笔真实或近期敏感交易，访谈 15 位 GC、企业发展负责人和 CFIUS/FDI 律师。"
    hypothesis: "购买紧迫性最高的时点是 LOI 阶段或整合前，只要能更快识别问题，律师会允许客户上付费软件试点。"
    successMetric: "至少 5 位潜在客户确认预算权，且有 3 位同意明确的付费试点范围。"
    owner: CEO
  - horizon: 0–90 天
    experiment: "用 2 份历史交易档案和 1 份模拟的中国相关 acquihire，原型化交易图谱。"
    hypothesis: "MVP 能从混乱的源文档中映射出敏感资产、人员和控制权，且人工清洗量有限。"
    successMetric: "每个案例都能在 7 天内交付有用图谱，包含至少 10 个关键对象和 3 个可执行标记。"
    owner: 创始工程师
  - horizon: 3–6 个月
    experiment: "在真实或刚完成的交易上，运行 3 个由律师审阅输出的付费试点。"
    hypothesis: "相比现有“备忘录 + 电子表格”流程，这套工作流能更早发现关键触发点、阻断动作或给出替代结构。"
    successMetric: "至少 2 个试点识别出客户认可的早期问题，且至少 1 个转为正式部署。"
    owner: CEO
  - horizon: 3–6 个月
    experiment: "上线轻量化 VDR 导入和权限控制，与一个集成伙伴合作，或通过人工导出流程先跑通。"
    hypothesis: "挂接现有尽调工作流后，入驻摩擦会下降到足以提升试点转化。"
    successMetric: "试点配置时间降到 2 个工作日以下，文档导入错误率保持在 10% 以下。"
    owner: 创始工程师
  - horizon: 6–12 个月
    experiment: "向那些面临附条件批准或延迟整合的试点客户，提供一套签约后义务跟踪器。"
    hypothesis: "一旦交易图谱已经存在，同一买方会愿意为持续监控付费。"
    successMetric: "至少 2 个正式账户在 go-live 后 90 天内加购监控模块。"
    owner: 产品负责人
  - horizon: 12–18 个月
    experiment: "基于现有客户关系，分别测试 1 个模型授权和 1 个 JV 结构设计的相邻工作流。"
    hypothesis: "复用同一张图谱的相邻场景，可以扩大市场，而不必重置销售动作。"
    successMetric: "至少 1 个相邻工作流进入付费正式部署，且转化率不低于并购试点。"
    owner: CEO
operations:
  - "建立按周更新的监管规则流程，覆盖美国、中国、英国和欧盟的审查逻辑。"
  - "标准化律师评审包，清楚展示来源证据、触发标记、被拦下的动作以及备选结构。"
  - "为敏感交易材料建立带权限感知的导入能力和区域化处理控制。"
  - "用 CRM 加交易阶段标签，围绕真实交易信号做事件驱动型外呼。"
  - "与专业律所形成转介绍协议，并至少与一个 VDR 生态伙伴沉淀集成手册。"
team:
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: "负责图谱架构、导入、权限控制，以及第一版可审计产品表面。"
  - role: 监管产品负责人
    startTiming: 第 0 个月
    rationale: "把跨境审查流程翻译成产品规则、模板和设计伙伴需求。"
  - role: 解决方案律师 / 交易运营
    startTiming: 第 3 个月
    rationale: "确保试点保持产品化，支撑律师信任，并从真实项目里沉淀可复用的工作流模式。"
  - role: 企业客户经理
    startTiming: 第 9 个月
    rationale: "只有在创始人主导销售验证出律师带动路径和标杆客户后，才开始增加可重复的管道管理能力。"
  - role: 数据 / ML 工程师
    startTiming: 第 12 个月
    rationale: "待试点数据足够多、值得自动化后，再提高抽取质量和情景推荐能力。"
milestones:
  - horizon: 0–12 个月
    items:
      - "完成 15 次 ICP 访谈、3 个付费试点，并拿下 2 家专业律所设计伙伴。"
      - "上线 v1 交易图谱、触发引擎、交割前动作控制和审计包导出。"
      - "至少把 2 个试点转成基础价值 $125k+ 的正式合同。"
      - "上线 1 套 VDR 挂接流程，并把可重复实施手册压到 7 天以内。"
  - horizon: 12–24 个月
    items:
      - "把付费账户做到 8 到 12 个，其中包括高频使用的律所或顾问。"
      - "为附条件批准交易增加交割后监控和带审批门槛的工作流。"
      - "在授权或 JV 结构中验证 1 个相邻扩展工作流。"
      - "建立首版结果数据集，把不同结构与各司法辖区审批结果关联起来。"
  - horizon: 24–36 个月
    items:
      - "成为敏感 AI 交易中默认的交易图谱层，覆盖并购、授权和 JV 工作流。"
      - "建立多区域处理与企业级控制能力，服务更大的上市公司买方。"
      - "证明持续监控和第二工作流采用能带来稳定扩展收入。"
      - "通过专有结果数据和伙伴渠道分发，展示真正的防御力。"
risks:
  - risk: "产品最终沦为定制法律服务的外壳，而不是可重复的软件系统。"
    likelihood: High
    impact: High
    mitigation: "把范围约束在图谱、工作流控制和证据输出，把法律意见工作交给外部律师。"
  - risk: "滩头市场太小且起伏太大，撑不起风险投资级增长。"
    likelihood: High
    impact: High
    mitigation: "采用高单价、按交易定价，通过高频律所销售，并尽早验证向授权、JV 和交割后控制扩展。"
  - risk: "律师和现有厂商继续成为默认赢家。"
    likelihood: Medium
    impact: High
    mitigation: "让律师更高效，而不是让他们失去相关性；同时嵌入 VDR 工作流，并建立更强的审计轨迹和结果数据集。"
  - risk: "监管结果过于不透明，导致推荐层难以建立信任。"
    likelihood: Medium
    impact: High
    mitigation: "把产品定位成准备度和情景推演支持，而不是审批预测工具，再用结构化人工复核和结果采集持续提高可信度。"
