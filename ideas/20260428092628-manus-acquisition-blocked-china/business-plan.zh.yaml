slug: cross-border-ai-clearance
date: 2026-04-28
executiveSummary: >-
  跨境 AI 审批正逐渐形成一条独立工作流，因为监管机构如今把 AI 收购、人才收购以及相关资产转移视为国家安全事件，而非普通并购。Manus 交易被撤销表明，这种痛点并非理论上的：买方可能在尽调上投入数月，甚至开始团队整合，最终仍被迫撤销交易。公司应从一个狭窄切口切入，服务于美国和新加坡 AI 买方中负责交易的总法律顾问和企业发展团队。MVP 是一张交易图谱，用于映射实体、受益所有人、工程师、代码仓库、模型资产、数据声明、算力依赖以及计划中的转移动作，然后标记可能的审查触发点和被禁止的交割前行为。市场进入策略应由律师驱动、以事件为驱动，围绕已签署的 LOI、排他期和内部整合计划展开，并将定价绑定到活跃的敏感交易，而非按席位收费。只有在保持“软件优先”的前提下，这门生意才具备吸引力：图谱、审计轨迹与结构情景引擎必须缩短律师工作流，而不能把公司变成一家定制顾问机构。经研究的切入市场较窄，估算 TAM 为 $67.5M、SAM 为 $23.7M、第三年 SOM 为 $2.4M，因此其风险投资逻辑依赖于扩展到模型许可、合资企业、云部署审批以及交割后主权控制。最大的反证风险在于，顶级律师和 VDR 现有厂商依旧“足够好”，从而使创业公司获得的只是波动较大的服务收入，而不是可重复的软件合同。
problem:
  - 跨境 AI 交易仍依赖备忘录、电子表格和分散的本地律师工作流，这些工具无法把代码、模型权利、工程师或计划中的转移建模为一等交易对象。
  - 当监管机构在后期介入时，买方可能白白浪费尽调支出、过早迁移员工、暴露代码或数据，最终仍被迫撤销交易。
solution:
  - 提供一个交易审批工作空间，将交易资料室材料转化为关于 AI 资产、人员、所有权和跨司法辖区控制权的实时图谱。
  - 标记可能的审查触发点，阻止高风险的交割前动作，并生成更低风险的结构选项，例如分阶段人才收购、许可、设防合资企业或延迟转移计划。
whyWeWin:
  - 产品位于 VDR 与法律意见之间缺失的一层，通过在工程师、代码仓库、模型资产、算力和控制权变化层面对主权风险建模来建立差异化。
  - 如果能得到律师信任，每一笔交易都会增加可复用的图谱数据，以及关于何种结构会获批、延迟或撤销的结果数据，从而形成更难复制的推荐护城河。
strategicChoices:
  beachhead: 面向美国和新加坡 AI 平台买方的签约前审批准备，这些买方正在评估与中国相关的人才收购、资产交易或战略补强收购。
  wedgeRationale: >-
    这个切口拥有最清晰的痛点、买方与触发条件。已签署的 LOI
    或计划中的工程师/代码转移会立刻释放预算，而该工作流又足够狭窄，
    能在单笔交易中证明价值，同时无需替换客户的资料室、律所或更广泛的合规栈。
  sequencingRationale: >-
    公司应先交付录入、图谱化、触发检测与交割前控制，因为这些是
    在真实交易中实现可衡量证明点的最短路径。只有在赢得律师信任后，
    才应增加更深的集成、基于结果的推荐以及交割后监控，随后扩展到
    能复用同一张图谱的相邻交易类型。
  notYet:
    - 通用制裁与第三方风险管理。
    - 完整的反垄断、出口管制或 VDR 替代型工作流。
    - SMB 和非 AI 跨境并购。
market:
  tam: 约 $67.5M 的年度支出，覆盖约 450 个与 AI 主权风险相关的交易或项目机会，按每个机会约 $150k 的混合支出测算。
  sam: 约 $23.7M 的可触达切入市场支出，来自聚焦中国关联交易的美国和新加坡 AI 买方及其律师。
  som: 第三年目标为 $2.4M，基于 12 个付费账户、每个账户约 $200k 的混合年价值。
  segments:
    - 主要细分：拥有活跃企业发展团队、正在进行与中国相关人才收购或资产交易的晚期 AI 平台公司。
    - 次要细分：支持重复性跨境 AI 交易的顶级并购律师和专业顾问。
  buyingProcess: >-
    该购买流程由事件触发，而非预算周期驱动：当 LOI 签署、排他期开始，
    或业务团队希望在最终审批前转移工程师、代码或 IP 时，GC/CLO 和企业发展团队会发起采购。
    外部律师对供应商选择影响很大，因此转介绍和审计可信度比宽泛的漏斗顶端营销更重要。
product:
  mvp: >-
    MVP 是一个带权限控制的工作空间，接入少量交易文档和人工上传的资产清单，
    然后生成一张可供监管者审阅的交易图谱、司法辖区触发标记、一份交割前限制动作日志，
    以及供律师审阅的并列结构情景方案。
  sixMonth: 为真实试点交付 VDR 接入、律师审阅工作流、面向美国/中国/英国/欧盟审查的规则包，以及可导出的审计资料包。
  twelveMonth: 增加基于早期结果的推荐评分、按审批门槛控制的工作流步骤，以及针对附条件或延迟交易的签后义务跟踪。
  twentyFourMonth: 将同一张图谱扩展到模型许可、合资企业、云部署审批以及交割后运营限制等相邻主权工作流。
  keyBets:
    - 客户会足够信任软件生成的交易图谱，在外部律师备忘录定稿前就使用它。
    - 产生首个价值所需的最小数据集，可以从现有交易材料中获取，而无需深度系统集成。
    - 来自早期交易的结果数据，会比现有厂商添加通用 AI 功能更快地提升情景推荐质量。
gtm:
  wedge: 针对真实或即将发生的中国关联 AI 交易，出售一个付费审批准备模块；在这些交易中，出错的代价体现为被迫撤销风险和交割延迟。
  channels:
    - 面向已识别 AI 买方的 GC/CLO 和企业发展负责人，由创始人主导外联。
    - 与 CFIUS、FDI 及国家安全并购律师建立转介合作。
    - 通过集成和实施作战手册嵌入现有 VDR 工作流。
    - 围绕已宣布的 AI 交易、排他期和已知工程师迁移计划进行事件驱动外联。
  funnelTargets: 从暖介绍到合格试点 25%+，从试点到付费生产 50%+，生产账户在 12 个月内扩展到第二笔交易或监控模块 40%+。
  pricing: 采用报价式年度平台保留费加每笔活跃交易模块；初始试点应为付费，并可抵扣正式生产合同，以便公司抓住紧急交易预算，同时避免退化为按小时计费的服务模式。
businessModel:
  revenueStreams:
    - 审批工作空间的年度平台订阅。
    - 单笔交易评估与情景推演模块。
    - 交割后主权监控与义务跟踪。
    - 来自律所和顾问部署的伙伴渠道收入。
  unitOfValue: 正在管理中的活跃敏感交易或主权项目。
  targetGrossMarginPct: 70
  expansionLevers:
    - 增加更多交易类型，包括许可、合资和云部署审批。
    - 把一次性交易账户转化为持续性的交割后监控。
    - 通过每年管理多笔交易的重复使用型律所进行销售。
    - 将推荐与证据 API 授权给 VDR 或风险情报生态。
strategyMap:
  northStarMetric: 在生产环境中管理、并且有文档记录其交割前动作得到控制的活跃敏感交易数量。
  inputMetrics:
    - 每季度来自律师渠道的介绍数量。
    - 从文档录入到首张风险图谱的中位天数。
    - 从试点到生产的转化率。
    - 每笔真实交易中被阻止的交割前高风险动作数量。
    - 在第二笔交易或监控工作流中继续使用平台的生产账户占比。
  moatsToBuild:
    - 面向 AI 资产、工程师、控制权和转移路径的交易本体。
    - 关于已获批、附条件批准、延迟和撤销结构的结果数据集。
    - 嵌入真实交易流程、并被律师信任的审计轨迹。
    - 通过专业律所和 VDR 集成形成的分发渠道。
  killCriteria:
    - 前 15 个目标买方中，若在 6 个月内同意付费试点的少于 3 个。
    - 完成 6 个试点后，若试点到生产转化率仍低于 33%。
    - 超过一半的试点工作量变成了无法模板化进产品的定制法律分析。
    - 上线后 12 个月内，没有任何账户扩展到第二笔交易或监控模块。
  mermaid: |
    flowchart LR
      Wedge[中国关联 AI 交易准备] --> MVP[交易图谱与触发引擎]
      MVP --> Proof[付费试点与被阻止的交割前错误]
      Proof --> Expansion[许可、合资和交割后主权工作流]
investorMemo:
  verdict:
    call: 观察
    conviction: 真实痛点和清晰切口都存在，但只有当软件支出与重复使用能胜过定制法律服务的重力时，这个风险投资逻辑才成立。
    whyBelieve: 一起公开的 AI 交易撤销事件、不断扩大的美英欧审查范围，以及缺少直接工作流现有厂商，共同创造了一个可信的狭窄高溢价产品窗口。
    whyDoubt: 买方群体高度集中、律师掌控工作流，而且相邻的 VDR 或风险数据供应商可能吸收其中很大一部分价值。
    nextDiligence: 测试 3 到 5 笔真实或近期交割交易，看看它是否能带来可衡量的更早问题识别，并从 GC 或其律师那里获得付费试点需求。
  firstCustomer:
    title: 由 GC 领导的企业发展团队，服务于一家从 Series B 到上市阶段的 AI 平台买方
    profile: 一家位于美国或新加坡、具备活跃并购意愿、内部法务团队精简，并且正在进行一笔与中国相关、可能在审批前转移工程师、代码或模型权利的 AI 交易的公司。
    trigger: 已签署 LOI、进入排他期，或内部存在在跨境安全审查明朗前就开始整合的压力。
    buyer: 总法律顾问或首席法务官
    initialContract: "$40k-$75k 的付费准备试点，可抵扣进 $125k-$250k 的年度工作空间合同以及单笔交易模块，只要工作流进入生产环境。"
  mustBeTrue:
    - 在 15 个目标 GC 中，至少有 5 个表示他们愿意在真实敏感交易中，于外部律师意见之前或同时购买软件。
    - MVP 能在 7 个自然日内利用现有交易文档生成一张有用的交易图谱。
    - 至少一半的试点用户反馈称，该产品比他们过去的“备忘录 + 电子表格”流程更早暴露了重要触发点或阻止了高风险动作。
    - 律所合伙人会共同销售，或至少不阻止使用，因为产品能改善他们的工作流和审计轨迹。
    - 有相当比例的账户会在 12 个月内从单笔交易扩展到重复交易或交割后监控。
  diligenceQuestions:
    - 实际上一年内会不止一次遇到这个问题的 AI 买方有多少？
    - 在未完全开放交易资料室前，产生首个价值所需的最小数据集是什么？
    - 哪些律所会积极支持该平台，哪些又会将其视为侵占法律意见工作？
    - 在客户开始要求定制法律分析之前，推荐层有多少可以自动化？
    - 在并购准备之后，哪条相邻工作流转化最快：许可、合资设立，还是交割后监控？
  riskHeatmap:
    - risk: 实施过程过于服务化
      likelihood: High
      impact: High
      leadingIndicator: 试点需要反复撰写定制备忘录或进行无法模板化进产品工作流的合伙人级法律解释。
      mitigation: 将法律意见工作留给合作律师，只让产品负责图谱化、触发检测、工作流控制和审计输出。
    - risk: 低交易量集中度
      likelihood: High
      impact: High
      leadingIndicator: 连续两个季度，目标 ICP 管道中出现的合格真实机会少于 10 个。
      mitigation: 采用高溢价 ACV，纳入重复使用的律所，并在切口获得信任后扩展到许可、合资和交割后监控。
    - risk: 律师阻碍采用
      likelihood: Medium
      impact: High
      leadingIndicator: 转介沟通能转成演示，但不能转成试点，因为律所坚持沿用电子表格和备忘录。
      mitigation: 将产品定位为赋能律师的基础设施，提供白标输出，并尽早从专业律所招募设计伙伴。
    - risk: incumbent 相邻挤压
      likelihood: Medium
      impact: Medium
      leadingIndicator: 在创业公司积累结果数据之前，VDR 或风险情报供应商就推出了主权风险图谱和面向律师的情景输出。
      mitigation: 快速推进 AI 特定本体、伙伴分发和交易结果捕获，这是通用 incumbents 缺乏的。
    - risk: 监管不透明削弱预测价值
      likelihood: Medium
      impact: High
      leadingIndicator: 用户只把产品当作文档存储，因为触发标记噪声过大或不可执行。
      mitigation: 销售“准备度”和结构情景推演支持，而非确定性审批预测，并通过人工审核闭环和结果追踪改进逻辑。
operatingAssumptions:
  - assumption: 目标买方会从交易预算或外部律师预算中批准付费试点，而不是要求走正式年度软件采购周期。
    basis: research.yaml
    validationTest: 在 6 个月内完成 15 次买方访谈，并拿下至少 3 个绑定真实或近期交易的付费试点。
    decisionImpact: 如果不成立，公司必须转向由律所主导销售或服务优先的模式，从而提高 burn 并降低风险投资吸引力。
  - assumption: 首个价值图谱可以通过 VDR 导出、股权结构表、团队名单和代码仓库清单构建，无需深度企业集成。
    basis: operator judgment
    validationTest: 用轻量连接器和上传模板完成 3 个试点接入，并把首次风险图谱时间控制在 7 天内。
    decisionImpact: 如果不成立，实施成本会上升，产品应缩小文档范围或只面向高 ACV 企业账户。
  - assumption: 只要平台能提供可审计的证据包，并把最终法律判断留在软件之外，律师就会信任它。
    basis: research.yaml
    validationTest: 招募 2 家设计伙伴律所，并衡量其律师是否在真实案件中使用导出的图谱和审计日志。
    decisionImpact: 如果不成立，分发会收缩，公司必须直接面向内部法务团队销售，导致速度更慢、护城河更弱。
  - assumption: 面对一笔敏感交易的客户，很可能在 12 个月内再购买许可、合资或交割后监控中的第二条工作流。
    basis: idea.yaml
    validationTest: 跟踪前 6 个生产账户的扩展行为，并要求至少 2 个多工作流扩展。
    decisionImpact: 如果不成立，市场将过于低频，公司应重新评估这个切口本身能否支撑风险投资回报。
  - assumption: 在不把产品推向定制顾问经济学的前提下，混合年合同价值能达到约 $150k-$200k。
    basis: research.yaml
    validationTest: 签下 3 份不低于 $125k 基础价加模块化交易费用的生产合同，同时将服务收入控制在合同价值的 20% 以下。
    decisionImpact: 如果不成立，公司需要更低成本的自助产品，或更广阔的市场才能实现规模化。
experimentRoadmap:
  - horizon: 0–90 days
    experiment: 与 15 位 GC、企业发展负责人和 CFIUS/FDI 律师交流，覆盖 10 笔真实或近期的敏感交易。
    hypothesis: 购买紧迫性在 LOI 或整合前最高，只要能缩短问题识别，律师会允许进行付费软件试点。
    successMetric: 至少 5 位潜在客户确认预算权限，且有 3 位同意明确的付费试点范围。
    owner: CEO
  - horizon: 0–90 days
    experiment: 用 2 份历史交易文件和 1 份合成的中国关联人才收购案例搭建交易图谱原型。
    hypothesis: MVP 可以从杂乱源文档中映射敏感资产、人员和控制权，且只需有限人工清洗。
    successMetric: 每个案例在 7 天内交付有用图谱，且至少包含 10 个重要对象和 3 个可执行标记。
    owner: 创始工程师
  - horizon: 3–6 months
    experiment: 在真实或刚刚交割的交易上，运行 3 个带律师审阅输出的付费试点。
    hypothesis: 该工作流能比当前“备忘录 + 电子表格”流程更早发现重要触发点、被阻止动作或结构替代方案。
    successMetric: 至少 2 个试点比现状更早发现客户认可的重要问题，且其中 1 个转为生产环境。
    owner: CEO
  - horizon: 3–6 months
    experiment: 通过一个集成伙伴或手动导出工作流，上线轻量级 VDR 导入和权限控制。
    hypothesis: 接入现有尽调工作流能显著降低接入摩擦，从而提升试点转化率。
    successMetric: 试点配置时间降至 2 个工作日以内，文档接入错误率低于 10%。
    owner: 创始工程师
  - horizon: 6–12 months
    experiment: 为面临附条件批准或整合延迟的试点客户提供签后义务跟踪器。
    hypothesis: 一旦交易图谱已经存在，同一买方会愿意为持续监控付费。
    successMetric: 至少 2 个生产账户在上线后 90 天内增购监控模块。
    owner: 产品负责人
  - horizon: 12–18 months
    experiment: 利用现有客户关系，分别测试一个模型许可和一个合资结构设计的相邻工作流。
    hypothesis: 复用同一张图谱的相邻工作流，可以在不重置销售动作的前提下扩大市场。
    successMetric: 有 1 条相邻工作流进入付费生产，且转化率达到或超过并购试点。
    owner: CEO
operations:
  - 维持每周一次的监管规则更新流程，覆盖美国、中国、英国和欧盟的筛查逻辑。
  - 标准化一份律师审阅资料包，展示源证据、触发标记、被阻止的动作和结构替代方案。
  - 为敏感交易材料建立带权限感知的接入和区域化处理控制。
  - 使用 CRM 加交易阶段标签，围绕真实交易信号开展事件驱动外联。
  - 与专业律所正式建立转介合作，并与至少一个 VDR 生态伙伴形成集成作战手册。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 负责图谱架构、接入、权限控制以及首个可审计产品界面。
  - role: 监管产品负责人
    startTiming: Month 0
    rationale: 将跨境审查工作流转化为产品规则、模板和设计伙伴需求。
  - role: 解决方案法务 / 交易运营
    startTiming: Month 3
    rationale: 确保试点保持产品化，支持律师信任，并从真实项目中捕获可复用的工作流模式。
  - role: 企业客户 AE
    startTiming: Month 9
    rationale: 只有在创始人主导销售已证明律师驱动模式和参考客户之后，才补充可重复的管道管理能力。
  - role: 数据 / ML 工程师
    startTiming: Month 12
    rationale: 只有当试点数据足够支撑自动化时，才提升抽取质量和情景推荐能力。
milestones:
  - horizon: 0–12 months
    items:
      - 完成 15 次 ICP 访谈、拿下 3 个付费试点，并签下 2 家专业律师设计伙伴。
      - 交付 v1 交易图谱、触发引擎、交割前动作控制以及审计资料导出。
      - 至少将 2 个试点转化为基础价值 $125k+ 的生产合同。
      - 上线一条 VDR 接入工作流和一套可重复实施的作战手册，把周期控制在 7 天内。
  - horizon: 12–24 months
    items:
      - 达到 8 到 12 个付费账户，其中包括重复使用的律所或顾问。
      - 为附条件交易增加交割后监控和按审批门槛控制的工作流。
      - 证明一条许可或合资结构设计的相邻扩展工作流。
      - 建立初步结果数据集，将结构与跨司法辖区审批结果关联起来。
  - horizon: 24–36 months
    items:
      - 成为敏感 AI 交易中默认的交易图谱层，覆盖并购、许可和合资工作流。
      - 为更大型上市公司买方建立多区域处理和企业级控制。
      - 展示来自持续监控和第二工作流采用的稳健扩张收入。
      - 通过专有结果数据和伙伴渠道分发证明防御性。
risks:
  - risk: 产品沦为定制法律服务的包装层，而不是可重复的软件系统。
    likelihood: High
    impact: High
    mitigation: 把范围限制在图谱化、工作流控制和证据输出上，同时把法律意见工作导向外部律师。
  - risk: 切入市场过小且收入波动，无法支撑风险投资级增长。
    likelihood: High
    impact: High
    mitigation: 采用高溢价按交易定价，通过重复使用型律所销售，并尽早验证许可、合资和交割后控制等扩展场景。
  - risk: 律师和现有厂商继续作为默认方案胜出。
    likelihood: Medium
    impact: High
    mitigation: 让律师更高效，而不是让他们失去相关性；接入 VDR 工作流，并建立更优的审计轨迹和结果数据集。
  - risk: 监管结果过于不透明，使推荐显得不可信。
    likelihood: Medium
    impact: High
    mitigation: 将产品框定为准备度和情景推演支持，而不是审批预测，并通过结构化人工审核和结果捕获提升置信度。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: "$2–3M"
  runwayMonths: 18
  useOfFundsSummary: 为产品、工程和监管工作流人才提供初始资金，以赢得 3 个付费试点、转化 2 个生产账户、构建律师可信的审计输出，并验证一条超越核心并购准备的可重复扩展工作流。
