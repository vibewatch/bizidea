slug: cross-border-ai-clearance
date: 2026-04-28
executiveSummary: >-
  跨境 AI 审批正在成为一条独立工作流，因为监管机构已经把 AI 收购、人才并购和相关资产转移视为国家安全事件，而不再只是普通并购。Manus 交易被撤销说明，这个痛点不是纸面风险：买方可能花了几个月做尽调，甚至已开始团队整合，最后仍被要求撤销交易。公司应先做一个窄而深的产品，服务美国和新加坡 AI 买方里的总法务与企业发展团队，专门处理涉中国交易。MVP 是一张交易图谱，把实体、受益所有人、工程师、代码仓库、模型资产、数据主张、算力依赖和计划转移全部盘清，再标出可能触发审查的点，以及哪些交割前动作会被卡住。GTM 要由律师牵引，围绕已签 LOI、排他期和内部整合计划这些事件推进；定价绑定活跃敏感交易，而不是按账号数量收费。这个生意只有保持软件优先才值得做：图谱、审计轨迹和结构场景引擎必须缩短律师工作流，而不能把公司拖成定制顾问机构。研究显示滩头市场很窄，估算 TAM 为 $67.5M、SAM 为 $23.7M、第三年 SOM 为 $2.4M，所以投资逻辑必须建立在后续扩展到模型授权、合资、云部署审批和交割后主权控制之上。最关键的反证风险是，顶级律师和 VDR 在位厂商已经“够用”，最后留下的只是起伏很大的服务收入，而不是可复制的软件合同。
problem:
  - 跨境 AI 交易仍靠备忘录、电子表格和割裂的本地律师流程推进，这些工具不会把代码、模型权利、工程师或计划转移当成一等交易对象建模。
  - 监管一旦在后段出手，买方不仅会白白消耗尽调预算、提前迁移员工、暴露代码或数据，最后交易仍可能被迫撤销。
solution:
  - 提供交易审批工作台，把交易数据室材料转成一张活图谱，梳理跨司法辖区的 AI 资产、人员、所有权和控制权。
  - 标出可能触发审查的点，拦住高风险交割前动作，并生成分阶段人才并购、授权、风险隔离合资等更稳妥的结构选项。
whyWeWin:
  - 产品补上了 VDR 和法律意见之间缺的那一层：它把主权风险拆到工程师、仓库、模型资产、算力和控制权变化这一层来建模。
  - 如果能让律师信任，每一笔交易都会沉淀可复用的图谱数据，以及哪些结构能过审、会被拖延或被撤销的结果数据，最终形成更难复制的推荐护城河。
strategicChoices:
  beachhead: 面向美国和新加坡 AI 平台买方，在签约前就把涉中国的人才并购、资产交易或战略性补强收购的审批准备做扎实。
  wedgeRationale: >-
    这个切口的痛点、买方和触发点都最清楚。只要 LOI 已签，或计划中的
    工程师/代码转移已经摆上桌，预算就会立刻出现；同时这个工作流也足够
    窄，能在单笔交易里证明价值，而不必替换客户现有的数据室、律所或更广的
    合规栈。
  sequencingRationale: >-
    公司第一步该先把资料接入、图谱生成、触发检测和交割前控制做好，因为这
    是在真实交易里最快拿到可量化证明点的路径。只有先赢得律师信任，之后才
    该加更深的集成、基于结果的推荐，以及交割后监控，再扩展到可复用同一张图
    的相邻交易类型。
  notYet:
    - 通用制裁与第三方风险管理。
    - 完整的反垄断、出口管制或 VDR 替代工作流。
    - 面向 SMB 或非 AI 的跨境并购。
market:
  tam: 估算约为 $67.5M，来自大约 450 笔与 AI 主权风险相关的交易或项目，每笔混合支出约 $150k。
  sam: 估算约为 $23.7M，对应美国和新加坡 AI 买方及其律师围绕涉中国交易的可触达滩头需求。
  som: 第三年目标为 $2.4M，基于约 12 个付费账户、每个账户约 $200k 的年化混合价值。
  segments:
    - 主要客群：拥有活跃企业发展团队、正在推进涉中国人才并购或资产交易的晚期 AI 平台公司。
    - 次级客群：持续参与敏感跨境 AI 交易的顶级并购律师和专项顾问。
  buyingProcess: >-
    采购不是按年度预算周期走，而是被事件触发：一旦 LOI 签署、排他期开始，
    或业务团队想在审批落定前就迁移工程师、代码或 IP，GC/CLO 和企业发展团
    队就会推动采购。外部律师对供应商选择影响很大，所以比起大水漫灌式营销，
    口碑推荐和审计可信度更重要。
product:
  mvp: >-
    MVP 是一个带权限控制的工作台，先接入少量交易文档和人工上传的资产清单，
    然后生成一张可直接面对监管的交易图谱、各司法辖区触发标记、一份交割前受
    限动作日志，以及供律师对比审阅的结构场景方案。
  sixMonth: 推出 VDR 接入、律师审阅工作流、覆盖美国/中国/英国/欧盟审查的规则包，以及给试点客户使用的可导出审计资料包。
  twelveMonth: 加入基于早期结果的推荐评分、需要审批放行的工作流步骤，以及针对附条件批准或延迟交割交易的签后义务追踪。
  twentyFourMonth: 把同一张图谱扩展到模型授权、合资、云部署审批和交割后运营限制等相邻主权工作流里。
  keyBets:
    - 客户会足够信任软件生成的交易图谱，愿意在外部律师备忘录还没定稿前就用起来。
    - 产生首个价值所需的最小数据集，可以直接从现有交易材料中拿到，而不必先做很深的系统集成。
    - 早期交易沉淀下来的结果数据，会比在位厂商补上一层通用 AI 功能更快地提升场景推荐效果。
gtm:
  wedge: 围绕真实或即将发生的涉中国 AI 交易，出售一个付费的审批准备模块，因为在这里“出错”的成本是交易被撤销和交割延期。
  channels:
    - 面向已识别 AI 买方的 GC/CLO 与企业发展负责人，由创始人亲自外呼。
    - 与 CFIUS、FDI 以及国家安全并购律师建立转介绍合作。
    - 通过集成和实施手册，嵌入现有 VDR 工作流。
    - 围绕已公告 AI 交易、排他期以及已知工程师迁移计划做事件驱动触达。
  funnelTargets: 从暖介绍到合格试点转化率达到 25% 以上，试点到付费生产转化率达到 50% 以上，生产账户在 12 个月内转成第二笔交易或监控模块的比例达到 40% 以上。
  pricing: 报价采用年度平台保底费加每笔活跃交易模块费；最初试点也必须收费，并可抵扣后续生产合同，这样公司能吃到紧迫交易预算，而不是默认按小时卖服务。
businessModel:
  revenueStreams:
    - 交易审批工作台的年度平台订阅。
    - 单笔交易的评估与结构场景模块。
    - 交割后主权监控与义务追踪。
    - 来自律所和顾问部署的渠道收入。
  unitOfValue: 正在管理中的敏感交易或主权项目。
  targetGrossMarginPct: 70
  expansionLevers:
    - 扩到更多交易类型，包括授权、合资和云部署审批。
    - 把一次性交易客户转成持续性的交割后监控客户。
    - 通过一年处理多笔交易的律所做放大销售。
    - 将推荐与证据 API 授权给 VDR 或风险情报生态。
strategyMap:
  northStarMetric: 在生产环境中被管理、且已记录交割前受控动作的活跃敏感交易数量。
  inputMetrics:
    - 每季度由律师带来的介绍数量。
    - 从文档接入到产出首张风险地图的中位天数。
    - 试点转生产的转化率。
    - 每笔真实交易中被拦下的高风险交割前动作数量。
    - 在第二笔交易或监控工作流中继续使用平台的生产账户占比。
  moatsToBuild:
    - 面向 AI 资产、工程师、控制权和转移路径的交易本体。
    - 关于哪些结构被批准、附条件批准、拖延或撤销的结果数据集。
    - 嵌入真实交易流程、被律师信任的审计轨迹。
    - 通过专项律所与 VDR 集成形成的渠道分发。
  killCriteria:
    - 前 15 个目标买方中，6 个月内愿意做付费试点的少于 3 个。
    - 完成 6 个试点后，试点到生产的转化率仍低于 33%。
    - 超过一半的试点工作量都落在无法模板化进产品的定制法律分析上。
    - 上线后 12 个月内，没有任何账户扩展到第二笔交易或监控模块。
  mermaid: |
    flowchart LR
      Wedge[涉中国 AI 交易准备] --> MVP[交易图谱与触发引擎]
      MVP --> Proof[付费试点与被拦下的交割前失误]
      Proof --> Expansion[授权、合资与交割后主权工作流]
investorMemo:
  verdict:
    call: 观察
    conviction: 真实痛点和切口都很锋利，但在软件预算和复用率真正跑赢定制法律服务惯性之前，风险投资逻辑还站不稳。
    whyBelieve: 公开的 AI 交易撤销案例、不断扩张的美国/英国/欧盟审查范围，以及没有直接工作流龙头的现状，共同打开了一个可信的狭窄高价入口。
    whyDoubt: 买方池子高度集中，律师牢牢卡着工作流，旁边的 VDR 或风险数据厂商也可能很快把大部分价值吸走。
    nextDiligence: 去验证 3 到 5 笔正在进行或刚结束的交易里，产品能否更早暴露关键问题，并拿到 GC 或其律师愿意付费试点的需求。
  firstCustomer:
    title: 由 GC 主导的企业发展团队，所在买方为 Series B 至上市阶段 AI 平台公司
    profile: 一家总部在美国或新加坡、积极寻求并购机会、内部法务团队不大，并且正推进一笔涉中国交易的 AI 公司；这笔交易里，工程师、代码或模型权利可能在审批前就发生转移。
    trigger: 已签 LOI、进入排他期，或内部有压力想在跨境安全审查明确前先启动整合。
    buyer: 总法务负责人或首席法务官
    initialContract: $40k-$75k 的付费准备试点，可抵扣后续 $125k-$250k 的年度工作台合同，以及进入生产后的单笔交易模块费用。
  mustBeTrue:
    - 15 个目标 GC 中，至少有 5 个表示在真实敏感交易里，他们愿意在外部律师意见之前或同时购买这类软件。
    - MVP 能在 7 个自然日内，基于现有交易文档生成一张有用的交易图谱。
    - 至少一半试点用户承认，产品比他们此前“备忘录加电子表格”的流程更早发现了实质性触发点或被禁止动作。
    - 律所合伙人愿意共同销售，或至少不阻止使用，因为产品确实让他们的工作流和审计轨迹更顺。
    - 相当比例的账户会在 12 个月内从单笔交易扩展到重复交易或交割后监控。
  diligenceQuestions:
    - 真正会在一年内多次遇到这个问题的 AI 买方，到底有多少？
    - 在拿不到完整数据室权限前，产出首个价值最少需要哪些数据？
    - 哪些律所会主动站出来推这个平台，哪些会把它视作侵占法律意见工作？
    - 在客户开始要求定制法律分析前，推荐层到底有多少可以自动化？
    - 在并购准备之后，转化最快的相邻工作流是授权、合资搭建，还是交割后监控？
  riskHeatmap:
    - risk: 实施过于服务化
      likelihood: High
      impact: High
      leadingIndicator: 试点反复需要定制备忘录撰写或合伙人级法律解释，而这些工作没法模板化进产品流程。
      mitigation: 把正式法律意见交给合作律所，只让产品负责图谱、触发检测、工作流控制和证据输出。
    - risk: 交易量过于集中
      likelihood: High
      impact: High
      leadingIndicator: 连续两个季度里，目标 ICP 管道中出现的合格真实机会少于 10 个。
      mitigation: 维持高客单价，纳入重复使用的律所，再在切口被信任后扩到授权、合资和交割后监控。
    - risk: 律师阻断采用
      likelihood: Medium
      impact: High
      leadingIndicator: 转介绍聊到了演示阶段，却始终进不了试点，因为律所坚持继续用电子表格和备忘录。
      mitigation: 把产品定位成给律师提效的基础设施，提供白标输出，并尽早从专项律所里招募共创客户。
    - risk: 在位厂商从邻近赛道切入
      likelihood: Medium
      impact: Medium
      leadingIndicator: VDR 或风险情报厂商在公司沉淀出结果数据之前，就先推出主权风险图谱和可供律师直接使用的场景输出。
      mitigation: 尽快把 AI 专属本体、合作渠道和交易结果沉淀做深，形成通用在位厂商暂时没有的积累。
    - risk: 监管不透明削弱预测价值
      likelihood: Medium
      impact: High
      leadingIndicator: 用户只把产品当文档仓库，因为触发标记太吵、也不够可执行。
      mitigation: 主打审批准备和结构场景支持，而不是确定性的批准预测，再通过人工复核和结果追踪不断提升可信度。
operatingAssumptions:
  - assumption: 目标买方会从交易预算或外部律师预算中批准付费试点，而不是要求走正式的年度软件采购周期。
    basis: research.yaml
    validationTest: 6 个月内完成 15 场买方访谈，并围绕真实或近期交易拿下至少 3 个付费试点。
    decisionImpact: 如果不成立，公司就得转向由律所主导销售或服务优先的路径，烧钱更快，风险投资吸引力也会下降。
  - assumption: 首个有价值的图谱可以基于 VDR 导出、股权结构表、团队名单和代码仓库清单搭出来，而不必先做深度企业集成。
    basis: operator judgment
    validationTest: 用轻量连接器和上传模板完成 3 次试点上线，把“首张风险地图交付时间”压到 7 天内。
    decisionImpact: 如果不成立，实施成本会上升，产品就该进一步收窄文档范围，或只服务高 ACV 的大型企业客户。
  - assumption: 只要产品能给出可审计的证据包，并把最终法律判断留在软件之外，律师就会信任它。
    basis: research.yaml
    validationTest: 招募 2 家设计合作律所，观察他们是否会在真实项目里使用导出的图谱和审计日志。
    decisionImpact: 如果不成立，分发效率就会收缩，公司只能直销给内部法务团队，速度更慢、壁垒也更弱。
  - assumption: 遇到一笔敏感交易的客户，在 12 个月内大概率还会买第二条工作流，比如授权、合资或交割后监控。
    basis: idea.yaml
    validationTest: 追踪前 6 个生产账户的扩展行为，至少要有 2 个发生多工作流扩展。
    decisionImpact: 如果不成立，市场就会过于零散，必须重新判断单靠这个滩头市场能否支撑风险投资回报。
  - assumption: 在不把产品推向定制顾问经济学的前提下，混合年合同价值可以做到大约 $150k-$200k。
    basis: research.yaml
    validationTest: 在服务收入不超过合同价值 20% 的前提下，签下 3 份不低于 $125k 基础费、且另有模块费用的生产合同。
    decisionImpact: 如果不成立，公司就需要一款更低成本、可自助的产品，或者一个更宽的市场来撑规模。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 15 位 GC、企业发展负责人和 CFIUS/FDI 律师，覆盖 10 笔真实或近期的敏感交易。
    hypothesis: 购买紧迫度在 LOI 阶段或整合前最高，只要能缩短问题定位时间，律师就会允许客户做付费软件试点。
    successMetric: 至少 5 个潜在客户确认自己有预算权限，其中 3 个同意明确的付费试点范围。
    owner: CEO
  - horizon: 0–90 天
    experiment: 用 2 份历史交易档案和 1 份合成的涉中国人才并购案例，做出交易图谱原型。
    hypothesis: 即使原始资料很乱，MVP 也能在有限人工清洗下把敏感资产、人员和控制权映射出来。
    successMetric: 每个案例都能在 7 天内交付一张有用图谱，且至少包含 10 个关键对象和 3 个可执行标记。
    owner: 创始工程师
  - horizon: 3–6 个月
    experiment: 在真实或刚刚完成的交易里，跑 3 个带律师审阅输出的付费试点。
    hypothesis: 相比现有“备忘录加电子表格”的流程，这套工作流能更早发现实质性触发点、被禁止动作或更优结构。
    successMetric: 至少 2 个试点提前发现客户认可的关键问题，且其中 1 个转成生产合同。
    owner: CEO
  - horizon: 3–6 个月
    experiment: 推出轻量版 VDR 导入和权限控制，可通过一个集成伙伴或人工导出工作流使用。
    hypothesis: 如果能挂靠现有尽调流程，试点上线摩擦会明显下降，转化率也会更高。
    successMetric: 试点配置时间压到 2 个工作日以内，文档接入错误率保持在 10% 以下。
    owner: 创始工程师
  - horizon: 6–12 个月
    experiment: 面向遇到附条件批准或延迟整合的试点客户，推出签后义务追踪器。
    hypothesis: 只要交易图谱已经存在，同一买方就会愿意为持续监控继续付费。
    successMetric: 上线后 90 天内，至少有 2 个生产账户加购监控模块。
    owner: 产品负责人
  - horizon: 12–18 个月
    experiment: 借助现有账户关系，分别验证模型授权和合资结构设计这两条相邻工作流。
    hypothesis: 只要复用同一张图谱，这些相邻场景就能在不重置销售动作的前提下放大市场。
    successMetric: 至少 1 条相邻工作流进入付费生产，且转化率不低于并购试点。
    owner: CEO
operations:
  - 维护一套每周更新的美国、中国、英国和欧盟审查规则流程。
  - 标准化律师审阅资料包，内容包括源证据、触发点、被拦动作和结构替代方案。
  - 为敏感交易材料建立带权限感知的接入与区域处理控制。
  - 通过 CRM 加交易阶段标签，对真实交易信号做事件驱动外呼。
  - 与专项律所建立转介绍协议，并至少和一个 VDR 生态伙伴形成集成实施手册。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 负责图谱架构、资料接入、权限控制，以及第一版可审计产品表层。
  - role: 监管产品负责人
    startTiming: Month 0
    rationale: 把跨境审查流程翻成产品规则、模板和设计合作客户需求。
  - role: 解决方案律师 / 交易运营
    startTiming: Month 3
    rationale: 确保试点保持产品化，帮助建立律师信任，并从真实项目中提炼可复用流程模式。
  - role: 企业客户经理
    startTiming: Month 9
    rationale: 只有在创始人亲自打单证明“律师带动销售 + 标杆客户”跑通之后，才开始把管道管理标准化。
  - role: 数据 / ML 工程师
    startTiming: Month 12
    rationale: 待试点数据足够多之后，再提升抽取质量和场景推荐自动化。
milestones:
  - horizon: 0–12 个月
    items:
      - 拿下 15 个 ICP 访谈、3 个付费试点，以及 2 家专项律师设计合作伙伴。
      - 发布 v1 交易图谱、触发引擎、交割前动作控制和审计资料导出。
      - 至少将 2 个试点转成基础价值在 $125k 以上的生产合同。
      - 跑通 1 条 VDR 挂靠工作流，并把实施手册压到 7 天内可重复交付。
  - horizon: 12–24 个月
    items:
      - 将付费账户扩到 8 至 12 个，其中包含重复使用的律所或顾问。
      - 为附条件批准交易加入交割后监控和审批门控工作流。
      - 在授权或合资结构设计中验证 1 条相邻扩展工作流。
      - 开始沉淀把不同结构和各司法辖区审批结果连起来的结果数据集。
  - horizon: 24–36 个月
    items:
      - 成为敏感 AI 交易中默认的交易图谱层，覆盖并购、授权和合资工作流。
      - 为更大型的上市公司买方建立多区域处理和企业级控制能力。
      - 证明来自持续监控和第二条工作流的扩张收入具有韧性。
      - 用专有结果数据和伙伴渠道分发建立可持续壁垒。
risks:
  - risk: 产品沦为一层定制法律服务外壳，而不是可复制的软件系统。
    likelihood: High
    impact: High
    mitigation: 把范围收紧在图谱、工作流控制和证据输出上，正式法律意见统一交给外部律师。
  - risk: 滩头市场过小且收入起伏太大，撑不起风险投资级增长。
    likelihood: High
    impact: High
    mitigation: 用高客单价的交易式定价起步，通过重复使用的律所分发，并尽早验证授权、合资和交割后控制这些扩展场景。
  - risk: 律师和在位厂商继续默认赢下大部分需求。
    likelihood: Medium
    impact: High
    mitigation: 让律师更高效，而不是削弱他们；同时嵌进 VDR 工作流，并建立更强的审计轨迹与结果数据。
  - risk: 监管结果过于不透明，导致推荐听起来不够可信。
    likelihood: Medium
    impact: High
    mitigation: 把产品定位成审批准备和场景推演支持，而不是批准预测工具，再通过结构化人工复核和结果沉淀提升可信度。
fundingAsk:
  stage: 种子前轮
  targetFundingRangeUsd: $2–3M
  runwayMonths: 18
  useOfFundsSummary: 用于搭建最初的产品、工程和监管工作流团队，拿下 3 个付费试点、转化 2 个生产账户、做出能让律师信任的审计输出，并验证 1 条超出核心并购准备之外的可复制扩展工作流。
