    stage: "incumbent"
    wedge: "AI-enhanced VDR and full-lifecycle deal workflow for corporates, banks, and law firms."
    pricing: "Custom enterprise pricing; quote-based [25][28][29]."
    strength: "Deep deal-room distribution, audit trails, trackers, multilingual support, and broad enterprise trust."
    weaknessVsUs: "Document-centric; does not natively model jurisdiction-specific sovereign-risk triggers, asset transfers, or transaction-structure alternatives."
    sourceRefs: [25, 28, 29, 30]
  - name: "Ansarada"
    stage: "scale-up"
    wedge: "AI-driven VDR plus workflow templates, bidder analytics, and law-firm/investment-banking packaging."
    pricing: "Subscription / online quote; free until go-live on some workflows."
    strength: "Closer than most VDRs to structured workflow, AI translation, bidder prediction, and simple pricing language."
    weaknessVsUs: "Still VDR-first and transaction-generic; weak on regulator-specific AI asset ontology and sovereign-risk scenarioing."
    sourceRefs: [26, 27, 30]
  - name: "Kharon"
    stage: "scale-up"
    wedge: "Verified geopolitical, ownership, sanctions, and end-use intelligence delivered through search, graph, and API products."
    pricing: "Custom enterprise pricing."
    strength: "High-quality entity and network intelligence that compliance teams already trust for defensible screening."
    weaknessVsUs: "Maps counterparties and risk networks, but not the deal workplan, pre-close controls, or legal-structure options."
