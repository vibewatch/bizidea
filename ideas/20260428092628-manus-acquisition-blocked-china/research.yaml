      sourceRefs: [16, 19]
  adoptionFrictionMatrix:
    - friction: "Counsel may view software as encroaching on legal judgment."
      severity: high
      affectedBuyer: "General Counsel and external M&A counsel"
      mitigation: "Position as evidence preparation and scenarioing layer, not legal opinion replacement."
      sourceRefs: [20, 21]
    - friction: "Data access to live deal rooms may be hard before exclusivity."
      severity: medium
      affectedBuyer: "Corp-dev operations"
      mitigation: "Start with lightweight intake templates and VDR connectors."
      sourceRefs: [25, 26, 30]
    - friction: "Deal volume is lumpy, making annual software budgets harder to justify."
      severity: high
      affectedBuyer: "Late-stage AI platforms with episodic corp-dev activity"
      mitigation: "Blend retained subscription with per-transaction modules and expand into post-close monitoring."
      sourceRefs: [19, 25, 26]
    - friction: "Cross-border data transfer and permission controls can block centralized analysis."
      severity: medium
      affectedBuyer: "Security and compliance teams"
      mitigation: "Offer permission-aware ingestion, regional processing options, and auditable controls."
      sourceRefs: [27, 31]
market:
  tam:
    value: "$67.5M"
    rationale: >-
      Estimate: ~4,143 cross-border mid-market deals in 2025 [19] x 50% IT/healthcare
      share [19] x 15% AI/sovereign-risk-relevant subset [calc, constrained by [17][18]]
      ≈ 311 mid-market relevant deals; add ~139 large-cap or quasi-transactional AI
      deals/joint-venture/licensing programs [calc]; midpoint 450 annual opportunities x
      modeled $150k blended spend per active customer/deal ($50k workspace + $100k
      transaction module, anchored by enterprise VDR/custom pricing and CFIUS fee tolerance
      [4][25][28][29]).
    isEstimate: true
    sourceRefs: [4, 17, 18, 19, 25, 28, 29]
  sam:
    value: "$23.7M"
    rationale: >-
      Constraint applied: assume 35% of TAM is reachable beachhead demand from U.S. and
      Singapore-based AI-platform buyers and counsel focused on China-linked transactions;
      450 x 35% = 158 opportunities x $150k.
    isEstimate: true
    sourceRefs: [1, 8, 17, 19, 25]
  som:
    value: "$2.4M"
    rationale: >-
      Year-3 reachable share assumes 12 paying accounts at roughly $200k blended annual
      value (8 strategic buyers + 4 repeat-use law firms/advisors), which is aggressive but
      plausible for a narrow premium wedge.
    isEstimate: true
    sourceRefs: [20, 21, 25, 26]
