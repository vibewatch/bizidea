reportMemo:
  executiveTakeaways:
    - "The customer pain is episodic but severe: China's Manus unwind shows AI deals can be canceled after integration steps begin, turning sovereign-risk from memo work into operational loss [1][2]."
    - "Regulatory scope is widening in the exact direction this product targets: U.S. outbound rules explicitly cover AI and China-linked investment, the UK already treats AI as a mandatory NSIA sector, and the EU is moving toward mandatory screening with AI on the minimum list [3][8][9][16]."
    - "No direct software incumbent owns the workflow. VDRs manage documents, risk-intelligence vendors map counterparties, and law firms provide opinions; none is built around a live graph of AI assets, engineers, code, model rights, and pre-close operational moves [20][21][23][24][25][26]."
    - "The beachhead is narrow enough to require premium pricing and sharp ICP discipline, but the expansion path into model licensing, joint ventures, cross-border data transfers, and post-close sovereignty controls is credible if the startup captures outcome data early [18][19][31]."
    - "Distribution should be counsel-led and event-driven, not generic compliance-led: signed LOIs, engineer relocation plans, and announced AI tuck-ins are the clearest buying moments [1][9][20][21]."
    - "The main risk is not product irrelevance but services gravity: buyers may still default to elite counsel unless the product demonstrably shortens issue-spotting, structures safer alternatives, and creates an audit trail lawyers can trust [20][21][22]."
  marketDefinition: >-
    This market is best defined as pre-signing and pre-integration clearance
    readiness software for cross-border AI transactions: tools used by legal,
    corp-dev, and security teams to inventory sensitive AI assets, model/control
    rights, engineers, code repositories, and planned transfers before regulators
    intervene [1][3][8][9][15][16]. It includes inbound and outbound investment
    screening preparation, transaction-structure scenarioing, and pre-close
    controls. It excludes generic antitrust software, generic virtual data rooms,
    pure sanctions screening, and export-control workflows that do not model the
    deal itself [20][23][24][25][26].
  customerAndBuyer: >-
    The primary ICP is the GC/CLO and Head of Corporate Development at late-stage
    AI, cloud, or model-platform buyers doing China-linked or otherwise sensitive
    cross-border deals. Daily users are corp-dev managers, internal compliance,
    outside counsel, and security teams. The urgent jobs are to surface review
    triggers early, stop premature code or talent movement, and preserve fallback
    structures before cost and political exposure compound [1][9][20][21][25][26].
    Budget likely sits inside deal execution, outside counsel, and transaction
    operations spend rather than a standing GRC line item [4][25][28][29].
  buyingTriggers:
    - point: "Signed LOI or exclusivity on a China-linked AI asset or acquihire."
      sourceRefs: [1, 20, 21]
    - point: "Business team wants to relocate engineers, share code, or start integration before final clearance."
      sourceRefs: [1, 9]
    - point: "Deal team identifies AI, data, semiconductor, or dual-use exposure that could trigger U.S., UK, or EU review."
      sourceRefs: [3, 8, 9, 15, 16]
  willingnessToPay:
    summary: >-
      WTP should be validated but looks real: buyers already accept filing fees
      up to $300k in CFIUS, custom-priced enterprise VDRs, and in some cases
      six-figure deal infrastructure spend. That supports a premium workflow if it
      materially reduces late-stage unwind risk and counsel hours [4][25][28][29].
    sourceRefs: [4, 25, 28, 29]
  competitiveLandscape: >-
    The landscape is adjacent rather than direct. Datasite and Ansarada own the
    document room and deal-workflow layer, with growing AI assistance, but remain
    VDR-first [25][26][27][30]. Kharon and Exiger own evidence-rich entity,
    ownership, trade, and risk-intelligence graphs, but they are not transaction
    structuring tools [23][24]. Elite counsel and in-house spreadsheets still win
    by default because they sit closest to signing risk, yet they do not create a
    reusable machine-readable asset map [20][21][22].
  incumbentThesis:
    - incumbentClass: "Cloud platforms / VDR workflow tools"
      point: "Datasite and Ansarada can summarize documents and manage diligence, but they do not natively model jurisdiction-specific AI review triggers, beneficial-control changes, or pre-close transfer prohibitions."
      sourceRefs: [25, 26, 27, 30]
    - incumbentClass: "Risk-intelligence vendors"
      point: "Kharon and Exiger are strong at ownership, sanctions, and network mapping, but they stop short of transaction design, legal workstream orchestration, and regulator-ready deal graphs."
      sourceRefs: [23, 24]
    - incumbentClass: "Elite law firms"
      point: "Counsel remains the default decision-maker, but firms sell expert time, not continuously updated software objects; the startup wins only if lawyers can trust and reuse the underlying transaction graph."
      sourceRefs: [20, 21, 22]
    - incumbentClass: "In-house spreadsheets and checklists"
      point: "Internal trackers are cheap and flexible, but they break when multiple jurisdictions, engineers, repositories, and staged-control rights must be updated across a live deal."
      sourceRefs: [1, 9, 25, 26]
  regulatoryLandscape: >-
    U.S. policy now has both inbound and outbound AI-sensitive review pressure:
    CFIUS remains discretionary and penalty-backed, while Treasury's outbound
    investment regime explicitly covers artificial intelligence in China-linked
    transactions [3][5][8]. The UK NSIA already places AI inside mandatory
    notifiable sectors and can void unnotified acquisitions [9][10]. The EU is
    moving toward a more harmonized system with AI included in the common minimum
    scope of sensitive sectors [15][16]. China's Manus order shows that the risk
    is not theoretical and can end in a forced unwind [1][2].
  technologyLandscape: >-
    The enabling stack is getting cheaper fast. Datasite and Ansarada now offer
    AI search, summarization, translation, redaction, and bidder analytics inside
    deal rooms [25][26][27][30]. Exiger and Kharon market verified knowledge
    graphs, APIs, and evidence trails for complex risk analysis [23][24]. That
    means the defensible layer is unlikely to be generic AI UX; it is the
    transaction ontology, audit trail, and outcome dataset about which structures
    clear in which contexts [23][24][25][26].
  distributionChannels:
    - point: "Referral-led selling through CFIUS/FDI counsel is the shortest path into live transactions."
      sourceRefs: [20, 21]
    - point: "Attach to existing VDR and diligence workflows used by corp-dev and law firms rather than asking buyers to replace them."
      sourceRefs: [25, 26, 30]
    - point: "Event-driven outbound around announced AI deals, signed LOIs, and engineer relocation plans is more efficient than broad GRC marketing."
      sourceRefs: [1, 17, 18]
  partnershipEcosystem:
    - point: "CFIUS/FDI law firms are necessary channel and validation partners because they already own the opinion work."
      sourceRefs: [20, 21]
    - point: "VDR providers are natural integration partners because the source documents already live there."
      sourceRefs: [25, 26, 30]
    - point: "Risk-data vendors can enrich entity, ownership, and end-use screening but do not replace the transaction-graph layer."
      sourceRefs: [23, 24]
  dataMoats:
    - point: "A reusable graph of entities, engineers, repos, model rights, and proposed transfers becomes more valuable with each reviewed transaction."
      sourceRefs: [1, 9, 20]
    - point: "Outcome data on which structures were cleared, conditioned, delayed, or unwound can compound into a differentiated recommendation engine."
      sourceRefs: [2, 10, 16]
    - point: "An evidence-backed audit trail is a moat if it is trusted by counsel and regulators, not just internal users."
      sourceRefs: [5, 23, 24]
  geographicConsiderations:
    - point: "Initial demand is strongest where U.S. review, UK/EU screening, and China-linked assets intersect."
      sourceRefs: [1, 8, 9, 15, 16]
    - point: "Cross-border AI deals add document-language and data-transfer complexity that ordinary U.S.-only diligence tools do not solve."
      sourceRefs: [1, 27, 31]
  sensitivityCases:
    - case: "More aggressive screening trend"
      impact: "If UK/EU reforms and U.S. inbound/outbound scrutiny continue broadening, SAM expands faster than base case because more deals need structured readiness."
      sourceRefs: [3, 10, 11, 16]
    - case: "Process streamlining wins"
      impact: "If CFIUS Known Investor initiatives materially reduce review friction for repeat allied acquirers, urgency shifts from filing logistics to high-risk edge cases, compressing the broad-market opportunity but preserving the China-sensitive niche."
      sourceRefs: [6, 7, 8]
    - case: "VDRs subsume the workflow"
      impact: "If Datasite or Ansarada add credible jurisdictional trigger logic and counsel-friendly audit outputs, independent software margin shrinks and the startup needs deeper legal-data specialization."
      sourceRefs: [25, 26, 27, 30]
  validationPlan:
    - priority: high
      question: "Will GCs buy software before they buy outside-counsel opinion time?"
      evidenceToGather: "10-15 interviews with corp-dev GCs on live or recent cross-border tech deals; compare software budget appetite versus counsel spend."
    - priority: high
      question: "Can a product materially change deal structure before signing?"
      evidenceToGather: "Pilot on 3-5 historical or live transactions; measure whether the graph surfaces triggers earlier than existing memo + spreadsheet process."
    - priority: medium
      question: "Which documents and systems are required for first value?"
      evidenceToGather: "Workflow mapping with VDR admins, law firms, and corp-dev operations on the minimum ingestion set."
    - priority: medium
      question: "Is the repeat-use wedge broad enough beyond M&A?"
      evidenceToGather: "Customer discovery on model licensing, JVs, and post-close sovereignty monitoring among the same legal teams."
