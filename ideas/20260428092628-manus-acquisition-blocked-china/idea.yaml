jobsToBeDone:
  - job: When we are evaluating a China-linked AI acquisition, help our legal and corp-dev team see which assets and people create sovereign-risk, so they can structure the deal before regulators force a rewrite.
    currentAlternative: Outside counsel memos plus spreadsheet diligence trackers
    successMetric: Reduction in review surprises discovered after signing or integration planning
  - job: When business teams want to move engineers or code before close, help us control pre-approval actions, so we do not create facts on the ground that worsen regulatory exposure.
    currentAlternative: Email approvals and ad hoc legal guidance
    successMetric: Zero unauthorized pre-close transfers or relocations in flagged deals
