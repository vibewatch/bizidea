problem: >-
  AI companies doing cross-border acquihires, model licensing deals, and strategic acquisitions still run diligence in law-firm memos, spreadsheet asset lists, and fragmented local counsel workflows. That breaks when regulators treat model IP, engineering teams, and related data flows as national-security questions rather than ordinary M&A. The result is late surprises, wasted integration work, and forced unwinds after employees, code access, or deal consideration have already moved.
targetUser:
  primary: General Counsel and Head of Corporate Development at U.S. or Singapore-based AI companies pursuing acquisitions or acquihires involving China-linked AI teams or assets
  secondary: External M&A counsel and internal security/compliance teams supporting cross-border AI transactions
  buyer: General Counsel or Chief Legal Officer
startupThesis:
  nonObviousInsight: The scarce asset in cross-border AI deals is no longer just technical diligence; it is a machine-readable map of which people, model assets, codebases, and control rights cross which borders before the deal is operationalized.
  beachhead: Pre-signing clearance readiness for U.S. and Singapore-based AI platforms evaluating acquihires or asset deals with China-founded model, tooling, or applied-AI teams
  wedge: A deal-clearance workspace that inventories AI-specific assets and personnel transfers, flags likely security-review triggers, and proposes lower-risk transaction structures before LOI-to-close work starts
  whyNowCatalyst: Meta's blocked Manus deal shows regulators can force cancellation even after integration steps begin, making AI-specific cross-border clearance a budgetable pain now.
  ventureScalePath: Start with AI M&A readiness, then expand into continuous sovereignty controls for model licensing, cloud deployment, joint ventures, and post-close operating restrictions across sensitive jurisdictions.
solution: >-
  Build a cross-border AI clearance platform for corp-dev and legal teams running sensitive AI transactions. The product ingests deal-room materials and creates a structured map of entities, beneficial owners, key engineers, code repositories, model assets, training-data claims, compute dependencies, and planned employee or IP transfers. It then flags which transaction elements are likely to trigger foreign investment or security review, highlights operational actions that should not happen before approval, and suggests alternative structures such as licensing, ring-fenced JVs, or staged acquihires. The first deliverable is not a generic red-yellow-green memo but a regulator-ready transaction graph that legal teams can update as the deal evolves. Over time, that graph becomes the control plane for ongoing sovereignty obligations after signing.
goToMarketSeed:
  firstCustomer: Series B to public-stage AI platform companies with active corp-dev teams in San Francisco or Singapore that are evaluating China-linked acquihires, model deals, or strategic tuck-ins
  buyingTrigger: A signed LOI, exclusivity period, or internal decision to relocate engineers or integrate code before regulatory clearance is final
  currentAlternative: Elite law firms, local counsel, internal spreadsheets, and ad hoc diligence checklists
  switchingReason: The platform gives legal and corp-dev teams a live AI-asset and personnel map early enough to restructure the deal before expensive integration or political exposure accumulates
  pricingHypothesis: Annual platform subscription plus per-transaction fees priced by active deal volume and number of jurisdictions assessed
