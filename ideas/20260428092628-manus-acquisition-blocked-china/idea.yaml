topRisks:
  - name: Low deal volume concentration
    description: The initial market is limited to companies doing sensitive cross-border AI transactions, so revenue could be lumpy.
    mitigation: Start with premium pricing on high-stakes deals, then expand into recurring monitoring for partnerships, licensing, and post-close obligations.
  - name: Services-heavy implementation
    description: Customers may expect bespoke legal analysis, which can trap the company in a consultancy model.
    mitigation: Productize the asset map, trigger detection, and pre-close controls while partnering with outside counsel for opinion work.
  - name: Regulatory opacity
    description: Security-review decisions can be discretionary, making purely rules-based predictions unreliable.
    mitigation: Position the product as clearance readiness and transaction-structuring support, then improve accuracy through outcome data and human review loops.
