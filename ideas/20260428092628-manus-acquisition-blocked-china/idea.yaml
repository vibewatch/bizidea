differentiator: >-
  Existing deal software manages documents and signatures; existing GRC tools manage ongoing policies. This company sits in the missing layer between them for AI-specific sovereign-risk: it models code, weights, training-data claims, compute, and talent movement as first-class deal objects. That creates proprietary transaction graphs and outcome data on which structures clear, which is more defensible than generic workflow software or pure legal services.
