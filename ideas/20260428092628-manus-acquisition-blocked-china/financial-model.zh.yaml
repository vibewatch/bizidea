scenarios:
  downside:
    description: 律师侧转化更慢、扩展更弱，导致公司到第 3 年底只有 10 个账户，混合 ARPU 也只有 $180K。
    y3RevenueK: 1732.5
    y3EbitdaK: -551.3
    cashLowPointK: 632.4
    keyAssumptionChanges:
      - 第 3 年混合 ARPU 从 $200K 降到 $180K。
      - 第 3 年客户爬坡在 10 个账户就停住，而不是 12 个。
      - 运营费用基本维持基准，因为合规和产品团队很难快速裁掉。
  base:
    description: 基准情形假设第 3 年底有 12 个账户、每个账户混合 ARPU 为 $200K、毛利率 70%，并把团队终局控制在 10 名 FTE。
    y3RevenueK: 2175.0
    y3EbitdaK: -241.6
    cashLowPointK: 942.0
    keyAssumptionChanges:
      - 第 1 年末 5 个账户，第 2 年末 9 个，第 3 年末 12 个。
      - 混合 ARPU 从第 1 年的 $120K，逐步提升到第 2 年的 $160K 和第 3 年的 $200K。
      - 招聘按计划推进，只有在初步验证后才额外增加 4 个扩张岗位。
  upside:
    description: 如果 LOI 驱动的转化更快、模块挂载更深，公司到第 3 年底可做到 14 个账户，混合 ARPU 提升到 $220K。
    y3RevenueK: 2557.5
    y3EbitdaK: 0.8
    cashLowPointK: 1108.2
    keyAssumptionChanges:
      - 第 3 年客户爬坡做到 14 个账户。
      - 第 3 年混合 ARPU 提升到 $220K，主要来自更多监控模块和第二条工作流的挂载。
      - 只有收入兑现后，才会在 Q4Y3 再补额外产能。
sensitivity:
  - variable: ARPU
    downsideCase: 如果试点最终只转成更小的保底合同，模块费用也挂不上去，第 3 年混合 ARPU 会滑到 $180K。
    baseCase: 第 3 年混合 ARPU 达到 $200K，与 SOM 设定一致。
    upsideCase: 借助重复使用的律所账户和监控模块挂载，第 3 年混合 ARPU 升到 $220K。
    y3RevenueImpactK: -217.5
    cashImpactK: -152.3
  - variable: CAC
    downsideCase: 如果律师转介绍无法形成复利，创始人销售又持续靠手工推进，CAC 会升到 $75K。
    baseCase: 每个新增付费账户的 CAC 为 $60K。
    upsideCase: 如果律师渠道来源可复制，CAC 可降到 $50K。
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: 如果切口仍是“一次性买完就走”，第二条工作流又挂不上去，月流失率会升到 5%。
    baseCase: 月流失率为 3%。
    upsideCase: 随着监控和第二条工作流提升留存，月流失率可降到 2%。
    y3RevenueImpactK: -240.0
    cashImpactK: -168.0
  - variable: sales cycle
    downsideCase: 如果有效销售周期拉长到 7 个月，原本预计在第 3 年签下的 2 单会顺延到下一年。
    baseCase: 从真实交易触发到成为付费账户的有效销售周期为 5 个月。
    upsideCase: 借助律师暖介绍，有效销售周期可压缩到 4 个月。
    y3RevenueImpactK: -350.0
    cashImpactK: -245.0
  - variable: gross margin
    downsideCase: 如果支持和数据处理仍更像服务，毛利率会降到 65%。
    baseCase: 毛利率为 70%。
    upsideCase: 随着工作流标准化和资料接入自动化，毛利率可提升到 75%。
    y3RevenueImpactK: 0.0
    cashImpactK: -108.8
  - variable: hiring pace
    downsideCase: 如果第二个 AE、客户成功和运营岗位都比计划提前 1–2 个季度招，现金压力会更早出现。
    baseCase: 招聘节奏按模型既定里程碑执行。
    upsideCase: 非关键岗位延后到 8 个生产账户跑起来之后再招。
    y3RevenueImpactK: -50.0
    cashImpactK: -160.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Trigger[真实 LOI 或整合触发] --> QualifiedDeals[合格的敏感交易]
      QualifiedDeals --> PayingAccounts[付费账户]
      PayingAccounts --> Revenue[订阅 + 交易收入]
      Revenue --> GrossProfit[70% 毛利]
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形的收入建立在少量高 ACV 账户之上——账户数从第 1 年末的 5 个涨到第 3 年末的 12 个，同时 ARPU 从以试点为主的 $120K 提升到 $200K。
  - checkName: 必须跑通的前提
    finding: 律师带动的分发必须尽快把真实交易的紧迫感转成付费生产账户，否则公司很难在更重的 Q4Y2 招聘动作前跑到 8–9 个账户。
  - checkName: 模型会在哪些情况下失灵
    finding: 如果销售周期拉长，且切口仍停留在一次性需求，公司就会迅速接近现金压力，因为运营费用的下降速度赶不上收入下滑。
  - checkName: 下一轮融资要看的证明点
    finding: 最清晰的下一轮融资证明，是在 8–9 个账户上跑出可重复的生产使用，并且至少有 1 条持续监控工作流，能把交易型收入的波动压下来。
sanityChecks:
  ruleOf40: Y3 growth 94.2% + EBITDA margin -11.1% = 83.1%
  burnMultiple: Y3 burn multiple 0.2x (-$241.6K EBITDA burn / +$1055.0K YoY revenue growth)
  revenuePerFte: Y3 为每名 FTE 贡献 $217.5K 收入，对应 10 名期末 FTE（对标 SaaS 常见区间约 $200–400K）
  flags:
    - 滩头市场依旧偏窄且交易驱动，因此模型仍高度依赖监控模块和第二条工作流来平滑收入。
    - 第 3 年 EBITDA 仍为负，这意味着在增加更多人之前，公司得先拿到更扎实的种子轮证明点。
    - 收入集中度很高，因为第 3 年计划只由 12 个账户驱动，任何一个账户延后或流失都会有明显影响。
    - 律师信任是硬前提；如果转介绍或共同销售起不来，CAC 和销售周期大概率都会朝 downside 走。
