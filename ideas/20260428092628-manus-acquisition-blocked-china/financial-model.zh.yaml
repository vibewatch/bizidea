scenarios:
  downside:
    description: 律师转化更慢、扩展更弱，导致公司在第 3 年末只有 10 个账户，且混合 ARPU 仅为 $180K。
    y3RevenueK: 1732.5
    y3EbitdaK: -551.3
    cashLowPointK: 632.4
    keyAssumptionChanges:
      - 第 3 年混合 ARPU 从 $200K 降到 $180K。
      - 第 3 年客户爬坡终点从 12 个账户降到 10 个。
      - 由于合规和产品编制难以快速削减，Opex 基本维持在基准水平。
  base:
    description: 基准情形假设第 3 年末有 12 个账户、混合 ARPU 为 $200K、毛利率 70%，团队保持精简并在期末达到 10 FTE。
    y3RevenueK: 2175.0
    y3EbitdaK: -241.6
    cashLowPointK: 942.0
    keyAssumptionChanges:
      - 第 1 年末 5 个账户，第 2 年末 9 个，第 3 年末 12 个。
      - 混合 ARPU 从第 1 年的 $120K，提升到第 2 年的 $160K 和第 3 年的 $200K。
      - 招聘节奏按计划推进，只有在初步证明点后才增加 4 个扩编岗位。
  upside:
    description: 由 LOI 触发的转化更快，模块挂载更丰富，因此公司在第 3 年末可达到 14 个账户、混合 ARPU 为 $220K。
    y3RevenueK: 2557.5
    y3EbitdaK: 0.8
    cashLowPointK: 1108.2
    keyAssumptionChanges:
      - 第 3 年客户爬坡终点提升到 14 个账户。
      - 第 3 年混合 ARPU 提高到 $220K，靠更多监控模块和第二工作流加购实现。
      - 只有在收入真正跑出来之后，才在 Q4Y3 增加额外产能。
sensitivity:
  - variable: ARPU
    downsideCase: 第 3 年混合 ARPU 降到 $180K，因为试点只转成更小的保留费，按模块收费也更少。
    baseCase: 第 3 年混合 ARPU 达到 $200K，与 SOM 假设一致。
    upsideCase: 第 3 年混合 ARPU 提升到 $220K，依靠高频律所账户和监控模块挂载。
    y3RevenueImpactK: -217.5
    cashImpactK: -152.3
  - variable: CAC
    downsideCase: 若律师转介绍无法形成复利、创始人销售仍高度手工化，CAC 将上升到 $75K。
    baseCase: 每个新付费账户的 CAC 为 $60K。
    upsideCase: 若律师渠道形成稳定暖介绍，CAC 可降到 $50K。
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: 如果这个切口始终停留在“一次性使用”，无法落地重复工作流，月流失率会上升到 5%。
    baseCase: 月流失率为 3%。
    upsideCase: 若监控与第二工作流采用改善留存，月流失率可降到 2%。
    y3RevenueImpactK: -240.0
    cashImpactK: -168.0
  - variable: sales cycle
    downsideCase: 有效销售周期拉长到 7 个月，导致原本预计在第 3 年赢下的 2 个账户顺延到下一年。
    baseCase: 从真实交易触发到付费账户落地的有效销售周期为 5 个月。
    upsideCase: 依靠律师带来的暖介绍，有效销售周期可压缩到 4 个月。
    y3RevenueImpactK: -350.0
    cashImpactK: -245.0
  - variable: gross margin
    downsideCase: 如果支持与数据处理仍偏服务化，毛利率会降到 65%。
    baseCase: 毛利率为 70%。
    upsideCase: 若工作流标准化、导入自动化，毛利率可提升到 75%。
    y3RevenueImpactK: 0.0
    cashImpactK: -108.8
  - variable: hiring pace
    downsideCase: 在收入证明前 1-2 个季度就提前招入第二位 AE、客户成功和运营岗位。
    baseCase: 招聘节奏按模型设定推进。
    upsideCase: 非关键招聘被推迟到 8 个正式账户上线之后。
    y3RevenueImpactK: -50.0
    cashImpactK: -160.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Trigger[真实 LOI 或整合触发信号] --> QualifiedDeals[合格的敏感交易]
      QualifiedDeals --> PayingAccounts[付费账户]
      PayingAccounts --> Revenue[订阅 + 交易收入]
      Revenue --> GrossProfit[70% 毛利润]
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形下，收入由少量高 ACV 账户驱动，账户数从第 1 年末的 5 个增长到第 3 年末的 12 个，而 ARPU 从以试点为主的 $120K 逐步提升到 $200K。
  - checkName: 必须顺利发生的事
    finding: 由律师带动的分发必须足够快地把真实交易紧迫感转成付费正式账户，让公司在更重的 Q4Y2 招聘节点前达到 8–9 个账户。
  - checkName: 模型会在哪种情况下失效
    finding: 如果销售周期拉长，而这个切口又始终停留在一次性项目，公司就会面临现金压力，因为在 downside 情形下，Opex 的下降速度赶不上收入下滑。
  - checkName: 下一轮融资需要的证明
    finding: 最清晰的下一轮融资证明点，是在 8–9 个账户上实现可重复的正式使用，并至少跑出 1 个持续性监控工作流，来降低事件驱动收入的波动。
sanityChecks:
  ruleOf40: 第 3 年增长 94.2% + EBITDA 利润率 -11.1% = 83.1%
  burnMultiple: 第 3 年 burn multiple 为 0.2x（-$241.6K EBITDA burn / +$1055.0K YoY revenue growth）
  revenuePerFte: 第 3 年为 $217.5K，对应 10 名期末 FTE（SaaS 基准大致为 $200–400K）
  flags:
    - 滩头市场依旧狭窄且呈事件驱动，因此模型仍依赖监控和第二工作流扩展来平滑收入。
    - 第 3 年 EBITDA 仍为负，这意味着公司在继续扩编前，仍需要拿出足够强的种子轮证明点。
    - 收入集中度很高，因为第 3 年计划只由 12 个账户支撑，任何一个账户延期或流失都会产生明显影响。
    - 律师信任是关键依赖；如果转介绍或联合销售起不来，CAC 和销售周期大概率都会向 downside 情形靠拢。
