scenarios:
  downside:
    description: 律师渠道转化更慢、扩展更弱，使公司在第三年末仅达到 10 个账户，且混合 ARPU 仅为 $180K。
    y3RevenueK: 1732.5
    y3EbitdaK: -551.3
    cashLowPointK: 632.4
    keyAssumptionChanges:
      - Y3 混合 ARPU 从 $200K 降至 $180K。
      - Y3 客户爬坡在 10 个账户处结束，而不是 12 个。
      - 由于合规和产品团队无法快速削减，Opex 维持在接近基线的水平。
  base:
    description: 主情景假设第三年末达到 12 个账户、混合 ARPU 为 $200K、毛利率 70%，并保持 10 FTE 的精简团队规模。
    y3RevenueK: 2175.0
    y3EbitdaK: -241.6
    cashLowPointK: 942.0
    keyAssumptionChanges:
      - Y1 末为 5 个账户，Y2 末为 9 个，Y3 末为 12 个。
      - 混合 ARPU 从 Y1 的 $120K 提升到 Y2 的 $160K，再提升到 Y3 的 $200K。
      - 招聘按计划执行，初步验证后仅新增 4 个扩张岗位。
  upside:
    description: 由 LOI 驱动的转化更快、模块挂接更丰富，使公司第三年末达到 14 个账户，且混合 ARPU 提升至 $220K。
    y3RevenueK: 2557.5
    y3EbitdaK: 0.8
    cashLowPointK: 1108.2
    keyAssumptionChanges:
      - Y3 客户爬坡在 14 个账户处结束。
      - 通过更多监控模块和第二工作流挂接，Y3 混合 ARPU 提升至 $220K。
      - 只有在收入得到验证后，才会增加额外的 Q4Y3 产能。
sensitivity:
  - variable: ARPU
    downsideCase: 由于试点转为更小的保留费、且模块费用更少，Y3 混合 ARPU 下滑至 $180K。
    baseCase: Y3 混合 ARPU 按 SOM 设定达到 $200K。
    upsideCase: 通过重复使用型律所账户和监控模块挂接，Y3 混合 ARPU 提升至 $220K。
    y3RevenueImpactK: -217.5
    cashImpactK: -152.3
  - variable: CAC
    downsideCase: 如果律师转介无法产生复利，且创始人销售仍高度手工化，CAC 将升至 $75K。
    baseCase: 每个新增付费账户的 CAC 为 $60K。
    upsideCase: 通过可重复的律师渠道获客，CAC 降至 $50K。
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: 流失率
    downsideCase: 如果该切口仍是一锤子买卖，且重复工作流未能落地，月度流失率将升至 5%。
    baseCase: 月度流失率为 3%。
    upsideCase: 随着监控和第二工作流采用提升留存，月度流失率降至 2%。
    y3RevenueImpactK: -240.0
    cashImpactK: -168.0
  - variable: 销售周期
    downsideCase: 实际销售周期延长至 7 个月，并把原本预计在 Y3 达成的两笔交易推迟到下一年。
    baseCase: 从真实交易触发到成为付费账户的有效销售周期为 5 个月。
    upsideCase: 借助律师暖介绍，有效销售周期压缩至 4 个月。
    y3RevenueImpactK: -350.0
    cashImpactK: -245.0
  - variable: 毛利率
    downsideCase: 由于支持与数据处理成本更偏服务化，毛利率降至 65%。
    baseCase: 毛利率为 70%。
    upsideCase: 随着工作流标准化和接入自动化，毛利率提升至 75%。
    y3RevenueImpactK: 0.0
    cashImpactK: -108.8
  - variable: 招聘节奏
    downsideCase: 第二位 AE、客户成功和运营岗位会在收入验证前提前 1 到 2 个季度招聘。
    baseCase: 招聘按模型中的里程碑执行。
    upsideCase: 非关键岗位推迟到 8 个生产账户上线后再招聘。
    y3RevenueImpactK: -50.0
    cashImpactK: -160.0
modelDiagram:
  title: 单位经济流程
  mermaid: |
    flowchart LR
      Trigger[真实 LOI 或整合触发] --> QualifiedDeals[合格的敏感交易]
      QualifiedDeals --> PayingAccounts[付费账户]
      PayingAccounts --> Revenue[订阅 + 交易收入]
      Revenue --> GrossProfit[70% 毛利润]
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: 基线收入由少量高 ACV 账户驱动，账户数从 Y1 末的 5 个增长到 Y3 末的 12 个，同时 ARPU 从以试点为主的 $120K 成熟到 $200K。
  - checkName: 必须做对的事
    finding: 律师驱动的分发必须足够快地把真实交易紧迫性转化为付费生产账户，以便公司在更重的人才扩张发生前达到 8–9 个账户。
  - checkName: 模型何时失效
    finding: 如果销售周期拉长、且切口仍是一锤子买卖，模型在下行情景下就会出现现金压力，因为 opex 下降速度赶不上收入滑落。
  - checkName: 下一轮融资证明点
    finding: 下一轮融资最清晰的证明，是在 8–9 个账户上展示可重复的生产使用，并至少拥有 1 个持续性的监控工作流，以降低低频收入风险。
sanityChecks:
  ruleOf40: Y3 增长 94.2% + EBITDA 利润率 -11.1% = 83.1%
  burnMultiple: Y3 现金消耗倍数 0.2x（-$241.6K EBITDA 消耗 / +$1055.0K 同比收入增长）
  revenuePerFte: Y3 每名 FTE 收入 $217.5K，对应 10 名期末 FTE（SaaS 基准约为 $200–400K）
  flags:
    - 切入市场仍然狭窄且低频，因此该模型仍依赖监控和第二工作流扩展来平滑收入。
    - Y3 EBITDA 仍为负值，这意味着公司在增加超过模型设定的人才之前，需要拿出强有力的 seed 级证明里程碑。
    - 收入集中度很高，因为 Y3 计划仅由 12 个账户驱动，因此单个账户的延迟或流失都会产生实质影响。
    - 律师信任是门槛依赖项；如果转介或联合销售无法成形，CAC 和销售周期很可能向下行情景滑落。
