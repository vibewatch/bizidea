slug: cross-border-ai-clearance
date: 2026-04-28
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-05"
    unit: month
    source: "[BP date] 模型从 2026-04-28 计划日期后的下一个月份开始。"
  - id: A2
    name: pre-seed 融资后的起始现金
    value: "2300"
    unit: USDK
    source: "[BP fundingAsk.targetFundingRangeUsd $2–3M] 基线情景假设在模型开始时完成 $2.3M 融资。"
  - id: A3
    name: 起始付费账户数
    value: "0"
    unit: count
    source: "[BP firstCustomer + milestones] 在首个付费试点签约前，不假设已有客户。"
  - id: A4
    name: 第一年每个付费账户的混合年化 ARPU
    value: "120"
    unit: USDK
    source: "[BP firstCustomer.initialContract $40k-$75k pilot credited into $125k-$250k production] 采用更保守、以试点为主的第一年混合值。"
  - id: A5
    name: 第二年每个付费账户的混合年化 ARPU
    value: "160"
    unit: USDK
    source: "[BP operatingAssumptions blended ACV roughly $150k-$200k] 假设正式生产合同更多，并包含部分单笔交易模块收入。"
  - id: A6
    name: 第三年每个付费账户的混合年化 ARPU
    value: "200"
    unit: USDK
    source: "[BP market.som] 第三年目标假设每个付费账户的混合年价值约为 $200k。"
  - id: A7
    name: 收入确认规则
    value: "每期平均活跃账户 x 年化 ARPU / 12 或 / 4"
    unit: formula
    source: "[Startup finance heuristic] 新账户会在期间内签下，因此确认收入按期初与期末账户的平均值计算。"
  - id: A8
    name: 毛利率
    value: "70"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A9
    name: 第一年客户爬坡
    value: "年末 5 个付费账户"
    unit: count
    source: "[BP milestones 0–12 months] 3 个付费试点加至少 2 个生产转化。"
  - id: A10
    name: 第二年客户爬坡
    value: "年末 9 个付费账户"
    unit: count
    source: "[BP milestones 12–24 months] 第二年末达到 8–12 个付费账户；基线情景采用 9 个。"
  - id: A11
    name: 第三年客户爬坡
    value: "年末 12 个付费账户"
    unit: count
    source: "[BP market.som] 与第三年 SOM 中 12 个付费账户的表述一致。"
  - id: A12
    name: CEO 年度现金薪酬
    value: "90"
    unit: USDK
    source: "[Startup compensation heuristic - pre-seed founder salary conservation]"
  - id: A13
    name: 工程岗位年度现金薪酬
    value: "150"
    unit: USDK
    source: "[Startup compensation heuristic - seed-stage senior engineer]"
  - id: A14
    name: 监管产品岗位年度现金薪酬
    value: "140"
    unit: USDK
    source: "[BP team regulatory product lead] [Startup compensation heuristic - niche product/regulatory operator]"
  - id: A15
    name: 解决方案法务年度现金薪酬
    value: "160"
    unit: USDK
    source: "[BP team solutions counsel / deal ops] [Startup compensation heuristic - startup legal-ops specialist]"
  - id: A16
    name: 企业 AE 年度现金薪酬
    value: "160"
    unit: USDK
    source: "[BP team enterprise account executive] [Startup compensation heuristic - modest base plus variable cash at pre-seed scale]"
  - id: A17
    name: 客户成功年度现金薪酬
    value: "120"
    unit: USDK
    source: "[Startup compensation heuristic - enterprise implementation / customer success]"
  - id: A18
    name: G&A 运营年度现金薪酬
    value: "110"
    unit: USDK
    source: "[Startup compensation heuristic - startup operations / finance]"
  - id: A19
    name: 按商业计划设定的招聘时点
    value: "M1 配置创始工程师和监管负责人；M3 配置解决方案法务；M9 配置 AE；M12 配置偏数据方向的工程岗位"
    unit: timeline
    source: "[BP team.startTiming]"
  - id: A20
    name: 初始团队后的扩张招聘
    value: "到 Q4Y2 前新增 1 名工程师、1 名 AE 和 1 名客户成功；到 Q2Y3 前新增 1 名 G&A"
    unit: timeline
    source: "[BP milestones + operations] [Startup finance heuristic] 用于支撑 8–12 个账户、实施负荷和企业级控制。"
  - id: A21
    name: 研发非人力支出
    value: "研发薪资的 15 percent"
    unit: percent
    source: "[Startup finance heuristic] 覆盖面向企业工作流创业公司的云、LLM、安全与开发工具成本。"
  - id: A22
    name: 销售与市场非人力支出
    value: "首位 AE 到岗前由创始人主导，每月 5 USDK；之后为销售与市场薪资的 40 percent"
    unit: formula
    source: "[BP GTM founder-led outbound + counsel referrals] [Startup finance heuristic] 反映以定向企业销售为主，而非大范围获客。"
  - id: A23
    name: G&A 非人力支出
    value: "G&A 薪资的 25 percent，加上每月 6 USDK 基线支出"
    unit: formula
    source: "[Startup finance heuristic] 覆盖法务、会计、软件和行政开销。"
  - id: A24
    name: 每个新增付费账户的 CAC
    value: "60"
    unit: USDK
    source: "[Startup finance heuristic anchored to counsel-led enterprise sales and high-touch pilots]"
  - id: A25
    name: 月度 logo 流失率
    value: "3.0"
    unit: percent
    source: "[Startup finance heuristic] 对一个利基、低频、但有扩张潜力且存在集中度风险的企业工作流而言，这是偏保守的假设。"
  - id: A26
    name: 下一轮融资里程碑
    value: "达到 8–9 个付费账户、2 个律师渠道，并在保留约 6 个月现金缓冲的同时跑通首个可重复的监控工作流"
    unit: milestone
    source: "[BP milestones 12–24 months + fundingAsk.useOfFundsSummary]"
