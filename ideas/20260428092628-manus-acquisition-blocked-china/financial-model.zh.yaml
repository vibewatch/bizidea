slug: cross-border-ai-clearance
date: 2026-04-28
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 模型启动月份
    value: "2026-05"
    unit: month
    source: "[BP date] 模型从 2026-04-28 计划日期后的次月开始。"
  - id: A2
    name: pre-seed 融资后的初始现金
    value: "2300"
    unit: USDK
    source: "[BP fundingAsk.targetFundingRangeUsd $2–3M] 基准情景假设模型启动时到账 $2.3M。"
  - id: A3
    name: 起始付费账户数
    value: "0"
    unit: count
    source: "[BP firstCustomer + milestones] 在首个付费试点签下前，不假设已有客户。"
  - id: A4
    name: 第 1 年单个付费账户混合年 ARPU
    value: "120"
    unit: USDK
    source: "[BP firstCustomer.initialContract $40k-$75k pilot credited into $125k-$250k production] 第一年试点占比更高，因此采用更保守的混合值。"
  - id: A5
    name: 第 2 年每个付费账户的混合年 ARPU
    value: "160"
    unit: USDK
    source: "[BP operatingAssumptions blended ACV roughly $150k-$200k] 假设更多生产合同落地，并带来部分按交易收费收入。"
  - id: A6
    name: 第 3 年每个付费账户的混合年 ARPU
    value: "200"
    unit: USDK
    source: "[BP market.som] 第三年目标假设每个付费账户约有 $200k 的年化混合价值。"
  - id: A7
    name: 收入确认口径
    value: "Average active accounts per period x annual ARPU / 12 or / 4"
    unit: formula
    source: "[创业公司财务常规] 新账户会在周期中途签下，因此确认收入按期初与期末活跃账户的平均值计算。"
  - id: A8
    name: 毛利率
    value: "70"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A9
    name: 第一年客户爬坡
    value: "5 year-end paying accounts"
    unit: count
    source: "[BP milestones 0–12 months] 包含 3 个付费试点和至少 2 个生产转化。"
  - id: A10
    name: 第二年客户爬坡
    value: "9 year-end paying accounts"
    unit: count
    source: "[BP milestones 12–24 months] 到第二年末达到 8–12 个付费账户；基准情形取 9 个。"
  - id: A11
    name: 第三年客户爬坡
    value: "12 year-end paying accounts"
    unit: count
    source: "[BP market.som] 与第三年 SOM 对应的 12 个付费账户口径一致。"
  - id: A12
    name: CEO 年现金薪酬
    value: "90"
    unit: USDK
    source: "[创业公司薪酬经验值 - 种子前轮创始人节制薪资]"
  - id: A13
    name: 工程岗位年现金薪酬
    value: "150"
    unit: USDK
    source: "[创业公司薪酬经验值 - 种子阶段资深工程师]"
  - id: A14
    name: 监管产品岗位年现金薪酬
    value: "140"
    unit: USDK
    source: "[BP team regulatory product lead] [创业公司薪酬经验值 - 兼具产品与监管背景的稀缺运营人才]"
  - id: A15
    name: 解决方案律师年现金薪酬
    value: "160"
    unit: USDK
    source: "[BP team solutions counsel / deal ops] [创业公司薪酬经验值 - 创业公司法务运营专家]"
  - id: A16
    name: 企业客户经理年现金薪酬
    value: "160"
    unit: USDK
    source: "[BP team enterprise account executive] [创业公司薪酬经验值 - 种子前阶段较克制的底薪加浮动现金]"
  - id: A17
    name: 客户成功岗位年现金薪酬
    value: "120"
    unit: USDK
    source: "[创业公司薪酬经验值 - 企业实施 / 客户成功]"
  - id: A18
    name: G&A 运营岗位年现金薪酬
    value: "110"
    unit: USDK
    source: "[创业公司薪酬经验值 - 创业公司运营 / 财务]"
  - id: A19
    name: 来自商业计划的招聘节奏
    value: "Founding eng and regulatory lead at M1; solutions counsel at M3; AE at M9; data-oriented engineering at M12"
    unit: timeline
    source: "[BP team.startTiming]"
  - id: A20
    name: 初始团队之外新增的扩张招聘
    value: "1 engineer, 1 AE, and 1 customer success hire by Q4Y2; 1 G&A hire by Q2Y3"
    unit: timeline
    source: "[BP milestones + operations] [创业公司财务经验值] 用来支撑 8–12 个账户、实施负荷和企业级控制要求。"
  - id: A21
    name: 研发非薪酬支出
    value: "15 percent of R&D payroll"
    unit: percent
    source: "[创业公司财务经验值] 覆盖面向企业工作流产品的云成本、LLM、安全与开发工具。"
  - id: A22
    name: 销售与市场非薪酬支出
    value: "5 USDK per month founder-led before first AE, then 40 percent of S&M payroll"
    unit: formula
    source: "[BP GTM founder-led outbound + counsel referrals] [创业公司财务经验值] 反映的是精准企业销售，而不是大水漫灌式获客。"
  - id: A23
    name: G&A 非薪酬支出
    value: "25 percent of G&A payroll plus 6 USDK per month baseline"
    unit: formula
    source: "[创业公司财务经验值] 覆盖法务、会计、软件和行政开销。"
  - id: A24
    name: 每个新增付费账户的 CAC
    value: "60"
    unit: USDK
    source: "[创业公司财务经验值，锚定律师带动的企业销售与高触达试点]"
  - id: A25
    name: 月度 logo churn
    value: "3.0"
    unit: percent
    source: "[创业公司财务经验值] 对于一个垂直、交易驱动、但具备扩展潜力的企业工作流产品来说，这个值算偏保守。"
  - id: A26
    name: 下一轮融资里程碑
    value: "Reach 8–9 paying accounts, 2 counsel channels, and first repeatable monitoring workflow with 6 months cash buffer"
    unit: milestone
    source: "[BP milestones 12–24 months + fundingAsk.useOfFundsSummary]"
