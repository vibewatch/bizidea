slug: cross-border-ai-clearance
date: 2026-04-28
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-05"
    unit: month
    source: "[BP date] 模型从 2026-04-28 计划日期后的下一个月份开始。"
  - id: A2
    name: pre-seed 融资后起始现金
    value: "2300"
    unit: USDK
    source: "[BP fundingAsk.targetFundingRangeUsd $2–3M] 基准情形假设模型开始时到账 $2.3M。"
  - id: A3
    name: 起始付费账户数
    value: "0"
    unit: count
    source: "[BP firstCustomer + milestones] 在首个付费试点成交前，不假设已有客户。"
  - id: A4
    name: 第 1 年每个付费账户的混合年 ARPU
    value: "120"
    unit: USDK
    source: "[BP firstCustomer.initialContract $40k-$75k pilot credited into $125k-$250k production] 第一年以试点为主，因此采用更保守的混合值。"
  - id: A5
    name: 第 2 年每个付费账户的混合年 ARPU
    value: "160"
    unit: USDK
    source: "[BP operatingAssumptions blended ACV roughly $150k-$200k] 假设正式合同占比更高，并叠加部分按交易收费模块。"
  - id: A6
    name: 第 3 年每个付费账户的混合年 ARPU
    value: "200"
    unit: USDK
    source: "[BP market.som] 第 3 年目标假设每个付费账户的混合年价值约为 $200k。"
  - id: A7
    name: 收入确认规则
    value: "Average active accounts per period x annual ARPU / 12 or / 4"
    unit: formula
    source: "[Startup finance heuristic] 新账户会在期间中途落地，因此确认收入按期初与期末账户均值计算。"
  - id: A8
    name: 毛利率
    value: "70"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A9
    name: 第 1 年客户爬坡
    value: "5 year-end paying accounts"
    unit: count
    source: "[BP milestones 0–12 months] 假设有 3 个付费试点，且至少 2 个转为正式合同。"
  - id: A10
    name: 第 2 年客户爬坡
    value: "9 year-end paying accounts"
    unit: count
    source: "[BP milestones 12–24 months] 计划在第 2 年末达到 8–12 个付费账户；基准情形取 9 个。"
  - id: A11
    name: 第 3 年客户爬坡
    value: "12 year-end paying accounts"
    unit: count
    source: "[BP market.som] 与第 3 年 SOM 假设的 12 个付费账户一致。"
  - id: A12
    name: CEO 年现金薪酬
    value: "90"
    unit: USDK
    source: "[Startup compensation heuristic - pre-seed founder salary conservation]"
  - id: A13
    name: 工程岗位年现金薪酬
    value: "150"
    unit: USDK
    source: "[Startup compensation heuristic - seed-stage senior engineer]"
  - id: A14
    name: 监管产品岗位年现金薪酬
    value: "140"
    unit: USDK
    source: "[BP team regulatory product lead] [Startup compensation heuristic - niche product/regulatory operator]"
  - id: A15
    name: 解决方案律师年现金薪酬
    value: "160"
    unit: USDK
    source: "[BP team solutions counsel / deal ops] [Startup compensation heuristic - startup legal-ops specialist]"
  - id: A16
    name: 企业 AE 年现金薪酬
    value: "160"
    unit: USDK
    source: "[BP team enterprise account executive] [Startup compensation heuristic - modest base plus variable cash at pre-seed scale]"
  - id: A17
    name: 客户成功岗位年现金薪酬
    value: "120"
    unit: USDK
    source: "[Startup compensation heuristic - enterprise implementation / customer success]"
  - id: A18
    name: G&A / 运营岗位年现金薪酬
    value: "110"
    unit: USDK
    source: "[Startup compensation heuristic - startup operations / finance]"
  - id: A19
    name: 来自商业计划的人才招聘节奏
    value: "Founding eng and regulatory lead at M1; solutions counsel at M3; AE at M9; data-oriented engineering at M12"
    unit: timeline
    source: "[BP team.startTiming]"
  - id: A20
    name: 初始团队之外的扩编招聘
    value: "1 engineer, 1 AE, and 1 customer success hire by Q4Y2; 1 G&A hire by Q2Y3"
    unit: timeline
    source: "[BP milestones + operations] [Startup finance heuristic] 用于支撑 8–12 个账户、实施负载和企业级控制要求。"
  - id: A21
    name: 研发非薪酬支出
    value: "15 percent of R&D payroll"
    unit: percent
    source: "[Startup finance heuristic] 覆盖云资源、LLM、安全和开发工具成本。"
  - id: A22
    name: 销售与市场非薪酬支出
    value: "5 USDK per month founder-led before first AE, then 40 percent of S&M payroll"
    unit: formula
    source: "[BP GTM founder-led outbound + counsel referrals] [Startup finance heuristic] 反映定向企业销售，而非大范围需求生成。"
  - id: A23
    name: G&A 非薪酬支出
    value: "25 percent of G&A payroll plus 6 USDK per month baseline"
    unit: formula
    source: "[Startup finance heuristic] 覆盖法务、会计、软件和行政成本。"
  - id: A24
    name: 每个新付费账户的 CAC
    value: "60"
    unit: USDK
    source: "[Startup finance heuristic anchored to counsel-led enterprise sales and high-touch pilots]"
  - id: A25
    name: 月度 logo 流失率
    value: "3.0"
    unit: percent
    source: "[Startup finance heuristic] 对一个细分、事件驱动但具备扩展潜力的企业工作流来说，这是偏保守的假设。"
  - id: A26
    name: 下一轮融资里程碑
    value: "Reach 8–9 paying accounts, 2 counsel channels, and first repeatable monitoring workflow with 6 months cash buffer"
    unit: milestone
    source: "[BP milestones 12–24 months + fundingAsk.useOfFundsSummary]"
