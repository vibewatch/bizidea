jobsToBeDone:
  - job: 当我们评估一项与中国相关的 AI 收购时，帮助法务和企业发展团队看清哪些资产和人员会带来主权风险，以便在监管机构强制重写交易前完成结构设计。
    currentAlternative: 外部律师备忘录加电子表格尽调追踪器
    successMetric: 签约后或整合规划阶段才发现的审查意外数量减少
  - job: 当业务团队想在交割前转移工程师或代码时，帮助我们控制批准前的动作，以免形成既成事实并恶化监管暴露。
    currentAlternative: 邮件审批和临时法律建议
    successMetric: 在被标记的交易中，未经授权的交割前转移或搬迁为零
