jobsToBeDone:
  - job: 当我们评估一笔涉及中国团队的 AI 收购时，帮法务和企业发展团队看清究竟哪些资产和人员会带来主权风险，好让我们在监管逼着重写交易之前就先把结构搭对。
    currentAlternative: 外部律师备忘录加电子表格尽调追踪器
    successMetric: 签约后或整合规划阶段才暴露的审查意外显著减少
  - job: 当业务团队想在交割前就迁移工程师或代码时，帮我们管住获批前的动作，别把既成事实先做出来，反而把监管风险越堆越高。
    currentAlternative: 邮件审批和临时法律意见
    successMetric: 在被标记的交易里，未经授权的交割前转移或迁移为零
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这个主题簇既有同日的 TechCrunch 报道，也有国家发展改革委安全审查公告作为支撑。
  painIntensity:
    score: 4
    rationale: 客户痛点不是天天发生，但一旦发生就很重，因为被叫停的交易会让几个月的工作打水漂，还可能把团队卡在整合半途。
  wedgeClarity:
    score: 5
    rationale: AI 专属的跨境交易审批是一个边界清晰、价值高、用户和触发点都很明确的工作流。
  defensibility:
    score: 4
    rationale: 专有交易图谱、审批结果数据和嵌入式工作流，能逐步叠出数据与渠道上的优势。
  ventureScale:
    score: 4
    rationale: 滩头市场虽然窄，但如果能扩到持续性的 AI 主权控制、合作伙伴管理和交割后监控，仍有机会撑起一个大平台。
topRisks:
  - name: 交易量过于集中
    description: 起步市场只覆盖做敏感跨境 AI 交易的公司，收入节奏可能会很抖。
    mitigation: 先在高风险交易上用高客单价定价，再扩到合作、授权和交割后义务监控，把收入做成更持续的形态。
  - name: 实施过程太像服务
    description: 客户可能期待量身定制的法律分析，最后把公司拖成咨询模式。
    mitigation: 把资产地图、触发检测和交割前控制产品化，把正式法律意见留给外部律师。
  - name: 监管规则不透明
    description: 安全审查带有较强裁量空间，单靠规则做预测并不可靠。
    mitigation: 把产品定位成审批准备和交易结构支持工具，再用结果数据和人工复核回路持续提升准确度。
