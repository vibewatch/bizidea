jobsToBeDone:
  - job: 当我们评估一笔与中国相关的 AI 收购时，帮法务和企业发展团队看清哪些资产和人员会带来主权风险，这样他们就能在监管要求改写交易前先把结构定好。
    currentAlternative: 外部律师备忘录加电子表格尽调跟踪器
    successMetric: 在签约后或开始整合规划后才发现审查意外的情况明显减少
  - job: 当业务团队想在交割前先转移工程师或代码时，帮我们管住审批前动作，避免造成既成事实，进一步放大监管敞口。
    currentAlternative: 邮件审批加临时法律意见
    successMetric: 在被标记的交易中，未经授权的交割前转移或搬迁为零
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 该主题既有当天的 TechCrunch 报道，也有国家发展改革委安全审查通告作为支撑。
  painIntensity:
    score: 4
    rationale: 客户痛点虽非天天发生，但一旦出现就非常严重，因为交易被叫停会让数月工作作废，还可能让团队卡在整合半途。
  wedgeClarity:
    score: 5
    rationale: AI 特有的跨境交易审批是一个边界清晰、价值很高的工作流，用户、触发点和替代方案都很明确。
  defensibility:
    score: 4
    rationale: 专有交易图谱、审批结果数据，以及嵌入工作流后的粘性，能够叠加成数据和分发优势。
  ventureScale:
    score: 4
    rationale: 初始滩头市场虽窄，但如果能扩到持续性的 AI 主权控制、合作伙伴场景和交割后监控，就有机会撑起一个更大的平台。
topRisks:
  - name: 交易量过于集中
    description: 初始市场只覆盖做敏感跨境 AI 交易的公司，因此收入可能会很不平滑。
    mitigation: 先对高风险交易采用高单价，再扩展到合作伙伴关系、授权和交割后义务的持续监控收入。
  - name: 实施过程过于服务化
    description: 客户可能期待定制化法律分析，这会把公司拖进咨询项目模式。
    mitigation: 把资产地图、触发识别和交割前控制产品化，同时把法律意见部分留给外部律师。
  - name: 监管不透明
    description: 安全审查决定往往带有较强裁量空间，单靠规则的预测并不可靠。
    mitigation: 把产品定位成审批准备和交易结构支持工具，再用结果数据与人工复核闭环持续提高准确度。
