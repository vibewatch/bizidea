problem: >-
  AI 公司做跨境人才并购、模型授权和战略收购时，尽调流程仍散在律所备忘录、电子表格资产清单和割裂的本地律师流程里。一旦监管机构把模型 IP、工程团队和相关数据流动当成国家安全问题，而不是普通并购问题，这套做法就会失灵。结果是员工已经调动、代码权限已经开放，甚至交易对价也开始转移后，团队才在后段踩雷，白白做完整合，最后还要被迫撤销交易。
targetUser:
  primary: 在美国或新加坡的 AI 公司里，负责中国相关团队或资产收购/人才并购的总法务与企业发展负责人
  secondary: 为跨境 AI 交易提供支持的外部并购律师，以及内部安全与合规团队
  buyer: 总法务负责人或首席法务官
startupThesis:
  nonObviousInsight: 跨境 AI 交易里真正稀缺的，不再只是技术尽调，而是一张可机器读取的映射图：交易真正落地前，哪些人、模型资产、代码库和控制权会跨过哪些边界。
  beachhead: 面向美国和新加坡 AI 平台买方，在签约前就把中国创立的模型、工具或应用 AI 团队相关的人才并购和资产交易审批准备好
  wedge: 做一个交易审批工作台，把 AI 特有的资产与人员转移盘清楚，提前标出可能触发安全审查的点，并在 LOI 到交割的工作真正启动前就给出风险更低的交易结构
  whyNowCatalyst: Meta 收购 Manus 被叫停说明，监管方完全可能在整合动作已经开始后仍要求取消交易，跨境 AI 审批因此第一次成了可以单列预算的现实痛点。
  ventureScalePath: 先从 AI 并购准备切入，再扩展到模型授权、云部署、合资安排以及敏感司法辖区中交割后的持续主权控制。
solution: >-
  为企业发展和法务团队搭建跨境 AI 交易审批平台。产品接入交易数据室材料后，会生成结构化地图，盘清实体、受益所有人、关键工程师、代码仓库、模型资产、训练数据主张、算力依赖，以及计划中的员工或 IP 转移。随后系统标出哪些交易要素可能触发外资投资或安全审查，提醒哪些运营动作获批前不能先做，并给出授权、风险隔离合资、分阶段人才并购等替代结构。第一份交付物不是泛泛的红黄绿备忘录，而是一张可直接面对监管的交易图谱，法务团队能随交易演进持续更新。时间拉长后，这张图谱也会变成签约后持续管理主权义务的控制平面。
goToMarketSeed:
  firstCustomer: 在旧金山或新加坡设有活跃企业发展团队、正评估中国相关人才并购、模型交易或战略性补强收购的 Series B 至上市阶段 AI 平台公司
  buyingTrigger: 已签 LOI、进入排他期，或内部决定要在监管审批最终落定前就迁移工程师或整合代码
  currentAlternative: 顶级律所、本地律师、内部电子表格，以及临时拼出来的尽调清单
  switchingReason: 这套平台能让法务和企业发展团队更早拿到一张活的 AI 资产与人员地图，从而在昂贵的整合成本和政治风险堆上来之前就重构交易
  pricingHypothesis: 采用年度平台订阅加单笔交易收费，按活跃交易量和评估司法辖区数量定价
whyNow:
