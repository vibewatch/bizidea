    signalRefs: [中国正把 AI 收购视为战略安全事项]
    sourceRefs: [2]
  - point: 员工在交易被叫停前就已搬进 Meta 新加坡办公室，因此买方需要的是能管住交割前整合动作的软件，而不只是尽调文档。
    signalRefs: [在监管未落定前，AI 团队整合就已启动]
    sourceRefs: [1]
  - point: 执法对象是 Meta 这样体量达到 $2 billion 的交易，董事会和法务团队因此会更早为预防类工具拨预算。
    signalRefs: [标志性执法会让董事会真正重视]
    sourceRefs: [1, 2]
differentiator: >-
  现有交易软件擅长管理文档和签署，现有 GRC 工具擅长管理持续性的政策要求。这家公司补的是两者之间缺失的一层，而且是专门针对 AI 主权风险：它把代码、权重、训练数据主张、算力和人才流动都建成一等交易对象。这样沉淀下来的交易图谱和审批结果数据，会告诉团队哪些结构更容易过审；这比通用工作流软件或纯法律服务更站得住脚。
