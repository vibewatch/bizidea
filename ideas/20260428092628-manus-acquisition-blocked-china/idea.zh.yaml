problem: >-
  对进行跨境人才收购、模型许可交易和战略收购的 AI 公司而言，尽调流程至今仍依赖律所备忘录、电子表格资产清单以及割裂的本地律师工作流。当监管机构把模型 IP、工程团队及相关数据流视为国家安全问题而非普通并购事项时，这套方式就会失灵。结果就是意外情况在后期才暴露、整合工作被浪费，并且在员工、代码访问权或交易对价已经发生转移后仍被迫撤销交易。
targetUser:
  primary: 在美国或新加坡的 AI 公司中，负责涉及中国关联 AI 团队或资产收购/人才收购的总法律顾问和企业发展负责人
  secondary: 支持跨境 AI 交易的外部并购律师以及内部安全/合规团队
  buyer: 总法律顾问或首席法务官
startupThesis:
  nonObviousInsight: 跨境 AI 交易中稀缺的资产不再只是技术尽调，而是一张机器可读的映射图，用来说明在交易真正落地前，哪些人员、模型资产、代码库和控制权会跨越哪些边境。
  beachhead: 面向美国和新加坡 AI 平台的签约前审批准备，这些平台正在评估收购或资产交易，目标涉及在中国创立的模型、工具或应用型 AI 团队
  wedge: 一个交易审批工作空间，用于盘点 AI 特有资产和人员转移，标记可能触发安全审查的事项，并在 LOI 到交割工作开始前提出更低风险的交易结构
  whyNowCatalyst: Meta 收购 Manus 被叫停，表明监管机构即使在整合动作开始后仍可强制取消交易，使 AI 特定的跨境审批成为当下可以列预算解决的痛点。
  ventureScalePath: 从 AI 并购准备切入，再扩展到模型许可、云部署、合资企业以及交割后在敏感司法辖区持续遵守主权约束的控制层。
solution: >-
  为执行敏感 AI 交易的企业发展和法务团队打造一套跨境 AI 审批平台。产品接入交易资料室材料，生成关于实体、受益所有人、关键工程师、代码仓库、模型资产、训练数据声明、算力依赖以及计划中的员工或 IP 转移的结构化映射。随后，它会标记交易中哪些要素可能触发外资投资或安全审查，指出哪些运营动作不应在批准前发生，并提出许可、设防合资公司或分阶段人才收购等替代结构。首个交付物不是泛泛的红黄绿备忘录，而是一张可供监管者审阅的交易图谱，法务团队可随着交易演变持续更新。长期来看，这张图谱会成为签约后持续履行主权义务的控制平面。
goToMarketSeed:
  firstCustomer: 位于旧金山或新加坡、拥有活跃企业发展团队，正在评估与中国相关的人才收购、模型交易或战略补强收购的 Series B 至上市阶段 AI 平台公司
  buyingTrigger: 已签署的 LOI、排他期，或在监管审批最终完成前内部决定迁移工程师或整合代码
  currentAlternative: 顶级律所、本地律师、内部电子表格和临时性的尽调清单
  switchingReason: 该平台能更早为法务和企业发展团队提供实时的 AI 资产与人员映射，从而在昂贵的整合或政治风险累积前重构交易。
  pricingHypothesis: 年度平台订阅费加单笔交易费用，按活跃交易量和评估司法辖区数量定价
whyNow:
  - point: 监管机构公开迫使一笔标志性的 AI 收购交易取消，证明跨境 AI 交易审批如今已是运营问题，而不只是外部律师的咨询意见。
    signalRefs: [Security review can unwind signed AI deals]
    sourceRefs: [1, 2]
  - point: 官方公告显示，AI 收购正在按正式的安全审查机制进行裁量，形成了一套创业公司可产品化的可重复合规流程。
    signalRefs: [China is treating AI acquisitions as strategic security matters]
    sourceRefs: [2]
  - point: 在交易被叫停前，员工就已迁入 Meta 新加坡办公室，因此收购方需要能管控交割前整合步骤的软件，而不只是尽调文件。
    signalRefs: [AI team integration starts before regulatory certainty]
    sourceRefs: [1]
  - point: 由于执法对象是规模达 $2 billion 的 Meta 交易，董事会和法务团队现在会更早为预防性工具提供预算支持。
    signalRefs: [Marquee enforcement makes boards pay attention]
    sourceRefs: [1, 2]
differentiator: >-
  现有交易软件管理文档和签署；现有 GRC 工具管理持续性政策。该公司位于两者之间缺失的一层，专注 AI 特有的主权风险：把代码、权重、训练数据声明、算力和人才流动都建模为交易中的一等对象。这会形成专有的交易图谱以及关于何种结构能获批的结果数据，相比通用工作流软件或纯法律服务更具可辩护性。
