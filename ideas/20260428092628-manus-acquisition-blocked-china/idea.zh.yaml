topRisks:
  - name: 低交易量集中度
    description: 初始市场仅限于进行敏感跨境 AI 交易的公司，因此收入可能波动较大。
    mitigation: 先对高风险交易采用高溢价定价，然后扩展到合作、许可和交割后义务的持续监控。
  - name: 实施过程过于服务化
    description: 客户可能期待定制化法律分析，进而把公司困在咨询模式中。
    mitigation: 将资产映射、触发检测和交割前控制产品化，同时将法律意见工作与外部律师合作完成。
  - name: 监管不透明
    description: 安全审查决定可能具有裁量性，使纯规则式预测并不可靠。
    mitigation: 将产品定位为审批准备和交易结构支持，再通过结果数据与人工审核闭环提升准确性。
