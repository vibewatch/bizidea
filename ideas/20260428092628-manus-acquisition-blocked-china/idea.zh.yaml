problem: >-
  做跨境收购式招聘、模型授权交易和战略并购的 AI 公司，如今仍在靠律所备忘录、电子表格里的资产清单，以及彼此割裂的本地律师流程来做尽调。一旦监管机构把模型 IP、工程团队以及相关数据流视为国家安全问题，而不是普通并购问题，这套做法就会失灵。结果就是临门一脚才爆雷、整合工作白做，甚至在员工、代码权限或交易对价已经转移后，被迫把交易撤销。
targetUser:
  primary: 在美国或新加坡设立、正收购或 acquihire 与中国相关的 AI 团队或资产的 AI 公司中的总法律顾问与企业发展负责人
  secondary: 为跨境 AI 交易提供支持的外部并购律师，以及内部安全与合规团队
  buyer: 总法律顾问或首席法务官
startupThesis:
  nonObviousInsight: 跨境 AI 交易里最稀缺的资产，已经不只是技术尽调能力，而是一张机器可读的地图，能标出哪些人员、模型资产、代码库和控制权会在交易真正落地前跨越哪些边界。
  beachhead: 面向美国和新加坡 AI 平台的签约前审批准备，它们正在评估收购式招聘，或收购由中国创立的模型、工具或应用型 AI 团队的资产交易
  wedge: 一个交易审批工作台，先盘点 AI 特有资产和人员转移，标出可能触发安全审查的环节，再在 LOI 到交割的工作真正开始前，给出风险更低的交易结构
  whyNowCatalyst: Meta 被叫停的 Manus 交易说明，就算整合已经启动，监管也能强制取消交易，这让 AI 特有的跨境审批从“也许会出问题”变成了现在就值得单独拨预算的痛点。
  ventureScalePath: 先从 AI 并购审批准备切入，再扩展到模型授权、云部署、合资企业以及敏感司法辖区交割后的持续主权控制。
solution: >-
  为处理敏感 AI 交易的企业发展与法务团队搭建一套跨境 AI 审批平台。产品读取 deal room 材料，生成一张结构化地图，覆盖实体、受益所有人、关键工程师、代码仓库、模型资产、训练数据权利主张、算力依赖，以及计划中的员工或 IP 转移。随后，它会标出哪些交易要素大概率会触发外资投资或安全审查，提醒哪些运营动作在批准前不能做，并建议授权、设立隔离式 JV、分阶段 acquihire 等替代结构。首个交付物不是一份泛泛的红黄绿备忘录，而是一张可随交易演进持续更新、能直接面向监管的交易图谱。随着时间推移，这张图谱还会成为签约后持续履行主权义务的控制平面。
goToMarketSeed:
  firstCustomer: 位于旧金山或新加坡、已进入 Series B 到上市阶段、拥有活跃企业发展团队的 AI 平台公司；它们正在评估与中国相关的 acquihire、模型交易或战略性 tuck-in
  buyingTrigger: 已签署 LOI、进入排他期，或公司内部决定在监管审批最终落定前先迁移工程师或整合代码
  currentAlternative: 顶级律所、本地律师、内部电子表格，以及临时拼出来的尽调清单
  switchingReason: 该平台能让法务和企业发展团队更早拿到一张动态的 AI 资产与人员地图，从而在高成本整合或政治风险累积前就重构交易方案
  pricingHypothesis: 年度平台订阅费叠加单笔交易费用，按活跃交易量与评估司法辖区数量定价
