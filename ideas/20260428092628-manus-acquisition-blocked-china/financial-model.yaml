scenarios:
  downside:
    description: Slower counsel conversion and weaker expansion keep the company at 10 year-end accounts and $180K blended ARPU in Y3.
    y3RevenueK: 1732.5
    y3EbitdaK: -551.3
    cashLowPointK: 632.4
    keyAssumptionChanges:
      - Y3 blended ARPU falls from $200K to $180K.
      - Y3 customer ramp ends at 10 accounts instead of 12.
      - Opex stays near base because compliance and product staffing cannot be cut quickly.
  base:
    description: Main case assumes 12 year-end accounts at $200K blended ARPU with 70% gross margin and a lean 10-FTE end state.
    y3RevenueK: 2175.0
    y3EbitdaK: -241.6
    cashLowPointK: 942.0
    keyAssumptionChanges:
      - 5 accounts at Y1 end, 9 at Y2 end, and 12 at Y3 end.
      - Blended ARPU steps from $120K in Y1 to $160K in Y2 and $200K in Y3.
      - Hiring follows the plan with only four scale hires after initial proof points.
  upside:
    description: Faster LOI-driven conversion and richer module attachment lift the company to 14 year-end accounts and $220K blended ARPU in Y3.
    y3RevenueK: 2557.5
    y3EbitdaK: 0.8
    cashLowPointK: 1108.2
    keyAssumptionChanges:
      - Y3 customer ramp ends at 14 accounts.
      - Y3 blended ARPU rises to $220K through more monitoring and second-workflow attachment.
      - Additional Q4Y3 capacity is added only after revenue proves out.
sensitivity:
  - variable: ARPU
    downsideCase: Y3 blended ARPU slips to $180K because pilots convert into smaller retainers and fewer module fees.
    baseCase: Y3 blended ARPU reaches $200K in line with the SOM framing.
    upsideCase: Y3 blended ARPU reaches $220K through repeat-use law-firm accounts and monitoring attach.
    y3RevenueImpactK: -217.5
    cashImpactK: -152.3
  - variable: CAC
    downsideCase: CAC rises to $75K if counsel referrals do not compound and founder selling stays manual.
    baseCase: CAC is $60K per new paying account.
    upsideCase: CAC falls to $50K with repeatable counsel-channel sourcing.
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: Monthly churn rises to 5% because the wedge stays one-and-done and repeat workflows do not land.
    baseCase: Monthly churn is 3%.
    upsideCase: Monthly churn falls to 2% as monitoring and second-workflow adoption improves retention.
    y3RevenueImpactK: -240.0
    cashImpactK: -168.0
  - variable: sales cycle
    downsideCase: Effective sales cycle extends to 7 months and pushes two expected Y3 wins into the next year.
    baseCase: Effective sales cycle is 5 months from live-deal trigger to paid account.
    upsideCase: Effective sales cycle compresses to 4 months through counsel-led warm intros.
    y3RevenueImpactK: -350.0
    cashImpactK: -245.0
  - variable: gross margin
    downsideCase: Gross margin falls to 65% because support and data-processing costs stay more services-heavy.
    baseCase: Gross margin is 70%.
    upsideCase: Gross margin improves to 75% as workflows standardize and ingestion automates.
    y3RevenueImpactK: 0.0
    cashImpactK: -108.8
  - variable: hiring pace
    downsideCase: Second AE, customer success, and ops hires are pulled forward one to two quarters before revenue proof.
    baseCase: Hiring stays on the modeled milestones.
    upsideCase: Noncritical hires are delayed until after eight production accounts are live.
    y3RevenueImpactK: -50.0
    cashImpactK: -160.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Trigger[Live LOI or integration trigger] --> QualifiedDeals[Qualified sensitive deals]
      QualifiedDeals --> PayingAccounts[Paying accounts]
      PayingAccounts --> Revenue[Subscription + transaction revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by a small number of high-ACV accounts growing from 5 at Y1 exit to 12 at Y3 exit while ARPU matures from pilot-heavy $120K to $200K.
  - checkName: Must go right
    finding: Counsel-led distribution has to convert live-deal urgency into paid production accounts quickly enough that the company reaches 8-9 accounts before the heavier Q4Y2 hiring step.
  - checkName: Model breaks if
    finding: The model gets cash-tight if sales cycles lengthen and the wedge stays one-and-done, because opex cannot be reduced as fast as revenue slips in the downside case.
  - checkName: Next-round proof
    finding: The clearest next-financing proof is showing repeatable production usage across 8-9 accounts plus at least one recurring monitoring workflow that reduces episodic revenue risk.
sanityChecks:
  ruleOf40: Y3 growth 94.2% + EBITDA margin -11.1% = 83.1%
  burnMultiple: Y3 burn multiple 0.2x (-$241.6K EBITDA burn / +$1055.0K YoY revenue growth)
  revenuePerFte: $217.5K Y3 on 10 end-state FTE (benchmark roughly $200–400K SaaS)
  flags:
    - The beachhead remains narrow and episodic, so the model still depends on monitoring and second-workflow expansion to smooth revenue.
    - EBITDA is still negative in Y3, which means the company likely needs strong seed-proof milestones before adding more headcount than modeled.
    - Revenue concentration is high because only 12 accounts drive the Y3 plan, so one delayed or churned account matters materially.
    - Counsel trust is a gating dependency; if referrals or co-selling do not materialize, CAC and cycle time will likely move toward the downside case.
