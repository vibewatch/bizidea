  validationPlan:
  - priority: high
    question: 50–300 人的推理平台实际上多频繁地在较短上游供应期限下签署 6–12 个月固定价格合同？
    evidenceToGather: 十份合同红线稿或定价政策，显示合同期限、转嫁条款及谁承担保证金风险。
  - priority: high
    question: 在客户准备好清算或交易标准化算力对冲之前，有多大比例的买家会使用该产品？
    evidenceToGather: 聚焦报价管控、预留策略和交易前保证金模拟而非执行的财务团队试点访谈。
  - priority: medium
    question: 真实工作负载到基准的映射在供应商、地域和机群配置之间有多稳定？
    evidenceToGather: 来自共创客户的历史使用量和采购数据，结合对 OCPI 类基准篮子的回溯分析。
