openQuestions:
- OCPI 挂钩算力期货在未来 12–18 个月内能实现多少真实流动性和持仓量？
- Ornn 报告的 400 个平台用户中，真正在对冲的占多大比例，其余是观察者、贷款方还是投资者？
- 精确的 50–300 人推理平台滩头市场中，6–12 个月固定价格企业容量合同有多普遍？
- 基准篮子在供应商、地域和硬件配置差异之间能收窄到什么程度，买家才会认为基差风险可接受？
