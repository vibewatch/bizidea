jobsToBeDone:
  - job: When I need to quote a multiquarter AI capacity contract, help my finance team see how much GPU exposure is unhedged, so they can price the deal without destroying gross margin.
    currentAlternative: Spreadsheet demand forecasts and manual supplier conversations
    successMetric: Gross-margin variance on signed capacity contracts
  - job: When GPU prices move suddenly, help my treasury lead understand required hedge actions and margin needs, so the company can avoid liquidity shocks.
    currentAlternative: Ad hoc analysis across finance spreadsheets and procurement dashboards
    successMetric: Time to produce an updated exposure and margin view after a price move
