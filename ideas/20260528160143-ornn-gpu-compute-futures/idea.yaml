problem: >-
  AI inference platforms and GPU capacity resellers increasingly sell fixed-price enterprise contracts while buying their
  underlying compute from volatile spot and short-duration supply. Finance teams still manage that exposure in spreadsheets,
  so they cannot see hedge coverage, margin requirements, or basis mismatch between what they sell and what standardized GPU
  contracts actually settle on. One sudden jump in H100 or H200 pricing can erase gross margin on signed customer deals.
targetUser:
  primary: CFO, VP Finance, or Head of Capacity at an AI inference platform reselling rented NVIDIA GPU capacity under fixed-price customer contracts
  secondary: Treasury and risk teams at independent GPU clouds and compute brokers launching their first hedge program
  buyer: CFO or VP Finance at an AI inference platform or GPU capacity reseller
startupThesis:
  nonObviousInsight: >-
    The big shift is not merely that GPU prices are high; it is that they are becoming benchmarked and tradeable on
    regulated rails. Once OCPI and ICE make standardized compute contracts possible, the scarce control point moves to the
    software layer that translates messy workload demand and customer SLAs into hedgeable financial exposure.
  beachhead: >-
    Treasury and pricing workflow for AI inference platforms and GPU brokers with $500k-$5M monthly H100 or H200 spend that
    already quote 6-12 month fixed-price enterprise capacity contracts
  wedge: >-
    Compute treasury system that maps real workload demand and customer commitments to OCPI-linked hedge ratios, margin
    monitoring, and fixed-price quote guardrails
  whyNowCatalyst: >-
    Ornn's ICE partnership and OCPI's live pricing for H100, H200, B200, and RTX 5090 compute mean GPU exposure is becoming
    hedgeable on regulated rails right as AI sellers are trying to lock multimonth customer pricing.
  ventureScalePath: >-
    Start with treasury software for AI compute sellers, then expand into execution, settlement, credit, and financing
    infrastructure for the broader market in standardized compute contracts across clouds, geographies, and accelerators.
solution: >-
  Build a treasury workspace that ingests GPU purchase commitments, real usage telemetry, and signed customer contracts to
  show each company's net exposure by SKU and time bucket. The product recommends hedge ratios against OCPI-linked futures,
  simulates basis risk when actual workloads differ from benchmark contracts, and tracks margin needs before finance teams put
  on trades. It also plugs into sales and pricing workflows so commercial teams know when they can safely offer fixed-price
  annual capacity versus when they should reprice or shorten terms. Over time, the system becomes the operating layer between
  GPU procurement, enterprise quoting, and regulated compute-risk markets.
goToMarketSeed:
  firstCustomer: >-
    50-300 person AI inference platform or GPU capacity broker with recurring enterprise contracts, no in-house commodity-risk
    team, and at least $1M monthly exposure to rented H100 or H200 supply
  buyingTrigger: >-
    The company signs or is about to sign a multiquarter fixed-price customer contract while its upstream GPU supply remains
    spot-priced or short duration
  currentAlternative: Spreadsheet-based capacity planning plus manual supplier negotiations and unhedged exposure
  switchingReason: >-
    The wedge gives finance and sales one shared view of hedge coverage, margin risk, and quote discipline, which is much
    faster and safer than inventing a compute-risk stack internally.
  pricingHypothesis: "$36k-$120k annual platform fee plus premium modules based on monthly hedged GPU-notional exposure"
