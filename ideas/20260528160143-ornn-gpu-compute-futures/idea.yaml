topRisks:
  - name: Liquidity timing
    description: GPU futures adoption could develop slower than expected, leaving customers interested in risk software before there is enough market depth to trade heavily.
    mitigation: Start with exposure measurement, quote controls, and hedge-policy workflows that create value even before customers execute large futures positions.
  - name: Basis mismatch
    description: Standardized OCPI-linked contracts may not perfectly match a customer's real fleet mix, geography, or workload profile.
    mitigation: Make basis-risk modeling and hedge overlays central to the product, and focus first on customers with concentrated H100 and H200 exposure.
  - name: Exchange dependency
    description: A young market centered on one benchmark and one venue could expose the company to product, regulatory, or distribution shifts outside its control.
    mitigation: Build the system as the neutral treasury layer above any single exchange so it can support bilateral forwards, brokered products, and future compute benchmarks.
