openQuestions:
- How much real liquidity and open interest will OCPI-linked compute futures achieve over the next 12 to 18 months?
- What share of Ornn's reported 400 platform users are actual hedgers rather than observers, lenders, or investors?
- How common are six- to twelve-month fixed-price enterprise capacity contracts among the exact 50-300 person inference-platform beachhead?
- How tight can benchmark baskets get across provider, geography, and hardware-configuration differences before buyers view basis risk as unacceptable?
