reportMemo:
  executiveTakeaways:
  - 'The opportunity is real but early: AI infrastructure spend is scaling into the hundreds of billions, while GPU prices still vary sharply by provider and contract type, creating genuine exposure for sellers who quote fixed-price capacity.[23][24][26][22]'
  - Ornn's OCPI benchmark, Bloomberg distribution, and explicit framing of forward curves and hedging indicate compute is starting to acquire the reference-rate infrastructure treasury software needs, even before deep futures liquidity is proven.[1][2][3]
  - Buyers already manage duration through capacity blocks, savings plans, CUDs, and reserved marketplace contracts; the missing layer is a system that turns those commitments into hedge policy, margin planning, and quote controls.[10][9][12][13][6]
  - Adjacent vendors can show spend, automate treasury, or manage traditional commodity books, but none clearly own the workload-to-benchmark translation problem for GPU-specific basis risk.[20][32][33][35][36]
  marketDefinition: Software for AI compute sellers that maps customer contract commitments and workload demand to benchmark-linked hedge exposure, margin needs, and quoting guardrails. It sits between raw cloud or marketplace procurement, standardized compute benchmarks, and internal finance workflows rather than acting as an exchange, generic TMS, or cloud cost dashboard.[1][2][17][20][32][33]
  customerAndBuyer: Primary users are CFOs, finance leads, and heads of capacity at neoclouds, GPU brokers, and inference platforms that resell external capacity under fixed-price or semi-fixed customer agreements. The buyer is usually the CFO or VP Finance because the pain spans pricing discipline, liquidity buffers, and risk policy rather than pure engineering optimization.[17][18][19][27][28]
  buyingTriggers:
  - point: A multiquarter customer deal is being quoted while upstream GPU supply is still procured through variable on-demand, spot, or short-duration commitments.
    sourceRefs:
    - 10
    - 12
    - 13
    - 6
  - point: The company sees large price dispersion between providers or contract types and needs a finance view of whether reservation choices are enough versus true hedging.
    sourceRefs:
    - 20
    - 22
    - 39
  - point: Board, lender, or treasury scrutiny increases after AI infrastructure spend becomes a structural line item rather than an experimental one.
    sourceRefs:
    - 2
    - 23
    - 26
  willingnessToPay:
    summary: 'Budget exists in adjacent systems, but public evidence suggests this will be sold as a high-trust control layer, not a lightweight developer tool: Finout, Datadog, Cloudability, HighRadius, and treasury platforms all position themselves as enterprise coordination systems with contact-sales motions, while buyers already accept long-duration commitments for compute capacity.[32][33][36][40][41][10][13]'
    sourceRefs:
    - 10
    - 13
    - 32
    - 33
    - 36
    - 40
    - 41
  competitiveLandscape: Competition is mostly indirect today. The nearest direct actor is Ornn, which is building the benchmark and hedging market itself.[1][2] The larger substitute set is split between FinOps platforms that explain cost after the fact, treasury systems that manage liquidity but not compute benchmarks, and CTRM platforms built for oil, grain, or metals rather than SKU-level GPU exposure.[20][21][32][33][35][36][40][41]
  incumbentThesis:
  - incumbentClass: Cloud platforms
    point: Clouds already sell reserved capacity, commitment discounts, and large GPU clusters, but they optimize procurement inside their own ecosystem rather than benchmark-linked hedge policy across suppliers.
    sourceRefs:
    - 9
    - 10
    - 12
    - 13
    - 39
  - incumbentClass: FinOps platforms
    point: FinOps vendors can allocate AI and cloud spend, spot waste, and connect costs to owners, yet they largely remain post-hoc cost intelligence rather than pre-trade hedge governance.
    sourceRefs:
    - 17
    - 20
    - 21
    - 36
    - 40
    - 41
  - incumbentClass: Treasury management systems
    point: Generic treasury systems are credible for liquidity, forecasting, and approvals, but they do not natively understand GPU benchmarks, SKU basis, or margining against compute contracts.
    sourceRefs:
    - 32
    - 33
  - incumbentClass: Commodity CTRM platforms
    point: Traditional commodity-risk platforms prove the value of trade-lifecycle and exposure tooling, but they are built for established physical commodities with mature contracts and heavier operating models than a 50-300 person AI cloud needs.
    sourceRefs:
    - 27
    - 28
    - 35
  regulatoryLandscape: 'Any standardized compute-futures workflow inherits familiar futures-market frictions: hedgers must understand margin as a performance bond, positions are marked to market, customer funds and controls sit inside FCM and clearing structures, and collateral efficiency matters to adoption.[27][28][29][30][31] That makes software that forecasts margin calls and hedge coverage operationally valuable, but also means onboarding will look more like treasury or risk implementation than self-serve SaaS.'
  technologyLandscape: 'The stack is converging around three layers: high-performance GPU supply built on heterogeneous NVIDIA systems, cloud and marketplace pricing with large spreads between on-demand, spot, and reserved terms, and FinOps tooling that can allocate cost but does not yet model benchmark basis risk.[14][15][16][20][22][34][39]'
  distributionChannels:
