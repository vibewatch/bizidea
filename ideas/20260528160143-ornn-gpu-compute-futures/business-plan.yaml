slug: "gpu-compute-treasury-os"
date: "2026-05-28"
executiveSummary: >-
  GPU Compute Treasury OS should start as a treasury and quote-governance layer
  for U.S.-first AI inference platforms, GPU brokers, and independent neoclouds
  that sell fixed-price enterprise capacity while buying GPU supply on spot or
  short-duration terms. The MVP should not try to be an exchange, generic FinOps
  suite, or autonomous trading system; it should map customer commitments,
  workload telemetry, and procurement contracts into exposure by SKU and time
  bucket, then show hedge coverage, basis risk, margin needs, and quote
  guardrails before finance teams commit to a price. The first buyer is the CFO
  or VP Finance at a 50-300 person compute seller with roughly $1M or more in
  monthly H100 or H200 exposure and no in-house commodity-risk stack. The buying
  trigger is concrete: the company is signing or repricing a six- to
  twelve-month customer contract while upstream supply remains variable. The
  researched near-term market is modest but real, with an estimated $58.8M TAM,
  $18.5M SAM, and $2.4M year-3 SOM for the software wedge before any expansion
  into execution, settlement, credit, or financing infrastructure. The company
  can win if it becomes the system of record that translates messy compute
  operations into benchmark-linked treasury decisions that FinOps tools, generic
  TMS platforms, and commodity CTRM suites do not natively handle. The biggest
  disconfirming risk is that buyers may want exposure analytics and quote
  discipline but delay paying for a dedicated product until compute-futures
  liquidity and basis quality improve. Two evidence gaps remain material: direct
  proof that the beachhead frequently signs fixed-price contracts on the assumed
  terms, and proof that enough early customers will buy before live hedging
  becomes routine.
problem:
  - "AI compute sellers often quote multiquarter fixed-price customer contracts while procuring H100 or H200 capacity through spot, marketplace, or short-duration commitments, so a fast price move can erase gross margin."
  - "Finance, procurement, and sales teams usually manage this risk across spreadsheets, reservation tools, and vendor dashboards, which leaves no shared view of hedge coverage, basis mismatch, collateral needs, or safe quoting limits."
solution:
  - "Ingest procurement commitments, live usage telemetry, and signed customer contracts to show net GPU exposure by SKU, provider, geography, and time bucket in one treasury workspace."
  - "Recommend hedge ratios, simulate basis and margin scenarios, and gate fixed-price quote approvals so finance teams can decide when to hedge, reprice, shorten contract duration, or refuse a deal."
whyWeWin:
  - "The product sits in the translation layer between real workload demand and standardized compute benchmarks, which is the operating gap left open by exchanges, cloud vendors, and generic treasury software."
  - "Each deployment compounds proprietary data on workload-to-benchmark mappings, hedge outcomes, quote decisions, and margin stress, creating a defensible recommendation layer over time."
strategicChoices:
  beachhead: "U.S.-first AI inference platforms, GPU brokers, and neocloud operators with 50-300 employees, at least $1M monthly external H100 or H200 exposure, and active fixed-price enterprise capacity quoting."
  wedgeRationale: "This beachhead feels the margin risk first, has a named finance buyer, and can prove ROI from one quoting and treasury workflow faster than a broader play aimed at all cloud buyers or all AI infrastructure operators."
  sequencingRationale: "Start with exposure mapping, quote guardrails, hedge-policy workflow, and margin simulation because those create value even if futures liquidity is still thin and do not require the startup to become a broker or clearer on day one. Add broker connectivity, execution support, and eventually settlement or financing workflows only after customers trust the policy layer and use it in real contract decisions."
  notYet:
    - "Serving enterprises that buy GPUs only for internal use rather than resale"
    - "Building or operating a compute exchange or benchmark venue"
    - "Supporting every GPU class, geography, and provider before H100 and H200 mappings are reliable"
    - "Autonomous hedge execution without explicit treasury approval"
market:
  tam: "Estimated $58.8M TAM based on roughly 700 global AI compute sellers, brokers, and inference platforms with material external GPU exposure at about $84k blended annual software spend."
  sam: "Estimated $18.5M SAM based on about 220 North America and Europe operators most likely to adopt benchmark-linked hedging workflows first."
  som: "Estimated $2.4M year-3 SOM based on roughly 24 reachable customers at about $100k ARR through founder-led and partner-led sales into brokered and neocloud accounts."
  segments:
    - "Primary: AI inference platforms and GPU capacity brokers selling fixed-price external compute"
    - "Secondary: Independent neoclouds and treasury teams launching their first formal hedge policy"
  buyingProcess: >-
    The daily users are usually finance leads and heads of capacity, but the
    economic buyer is typically the CFO or VP Finance because the decision spans
    pricing policy, liquidity buffers, and risk governance. Deals are triggered
    by a large customer quote, renewal, or board-level cost review, then pull in
    procurement, engineering, and sometimes treasury or legal because the product
    governs how the company takes price risk.
product:
  mvp: >-
    The MVP should ingest customer commitments, procurement contracts, and usage
    data into one exposure ledger, then produce hedge coverage views, basis-risk
    scenarios, quote guardrails, and margin forecasts for one H100/H200-heavy
    workflow. It should launch as a human-approved treasury control layer, not a
    trade execution system.
  sixMonth: "Ship paid pilots with H100 and H200 exposure mapping, quote approval workflows, scenario-based hedge recommendations, margin forecasting, and exports into the customer's finance stack."
  twelveMonth: "Add benchmark reconciliation across providers and regions, policy templates for common contract structures, broker or FCM handoff workflows, and dashboards tracking hedge coverage, gross-margin variance, and liquidity stress."
  twentyFourMonth: "Expand from treasury analytics into execution support, settlement workflows, and financing or credit modules once the policy layer is embedded in daily quoting and procurement decisions."
  keyBets:
    - "Customers will pay for exposure visibility and quote discipline before they are ready for heavy live hedging."
    - "A narrow H100/H200 beachhead produces cleaner basis models and faster proof than trying to support all accelerators immediately."
    - "One shared workflow across finance, procurement, and sales opens budget faster than pitching another cost-analytics dashboard."
    - "Broker, clearer, and treasury-advisory partners can accelerate trust and reduce customer-acquisition cost."
gtm:
  wedge: "Sell the product as the control system that lets compute sellers quote fixed-price contracts without taking blind GPU price risk, not as generic FinOps or speculative derivatives software."
  channels:
    - "Founder-led direct sales to CFOs, VP Finance leaders, and heads of capacity at triggered inference platforms, brokers, and neoclouds"
    - "Referrals from futures brokers, FCMs, treasury advisors, and compute-marketplace operators involved when a hedge policy is first designed"
    - "Selective co-sell with FinOps and cloud cost-observability partners once the startup can show why post-hoc cost visibility is insufficient"
  funnelTargets: "Target account→qualified discovery 20-30%, discovery→paid pilot 25-35%, paid pilot→production 50%+, production→expansion 40%+ within 12 months."
  pricing: "Start with a paid 8-12 week pilot and convert to an annual platform subscription priced around the researched $36k-$120k ACV range, with premium modules tied to monitored or hedged GPU-notional exposure, because the buyer values protected gross margin and quote governance more than seats."
businessModel:
  revenueStreams:
    - "Annual SaaS subscription for compute treasury, quote-policy, and risk-governance workflows"
    - "Paid onboarding and data-mapping services for the first implementation"
    - "Premium modules for advanced basis analytics, margin forecasting, and broker or FCM workflow integration"
    - "Longer-term usage or referral revenue from execution, settlement, credit, or financing workflows after the wedge is proven"
  unitOfValue: "GPU-notional exposure and fixed-price contract volume managed under treasury policy"
  targetGrossMarginPct: 70
  expansionLevers:
    - "More SKUs, providers, geographies, and legal entities within the same customer"
    - "Expansion from quote governance into live hedge operations and settlement support"
    - "Adding credit, financing, or liquidity-planning modules once margin workflows are trusted"
strategyMap:
  northStarMetric: "Monthly fixed-price GPU contract exposure managed with approved hedge or quote policy"
  inputMetrics:
    - "Percent of customer exposure mapped to a benchmark basket within five business days"
    - "Percent of quoted contract value reviewed through policy guardrails before signature"
    - "Pilot-to-production conversion rate"
    - "Observed gross-margin variance on signed contracts versus pre-product baseline"
    - "Accuracy of basis and margin forecasts versus realized outcomes"
    - "Partner-sourced qualified opportunities per quarter"
  moatsToBuild:
    - "Workload-to-benchmark mapping dataset across SKUs, providers, regions, and contract shapes"
    - "Historical basis, margin, and quote-decision outcomes that improve recommendations over time"
    - "Embedded treasury workflow sitting between sales, procurement, and finance approvals"
  killCriteria:
    - "If fewer than 3 of the first 12 qualified ICP accounts will pay for exposure and quote-control software before live futures execution, revisit or stop the wedge."
    - "If the first 5 pilots cannot map at least 80% of relevant exposure and show a credible quoting or hedge-policy decision improvement within 60 days, pause expansion."
    - "If more than half of prospects insist that existing FinOps tools, reservations, and spreadsheets are sufficient, narrow the ICP or abandon the category."
  mermaid: |
    flowchart LR
      Wedge[Compute treasury wedge] --> MVP[Exposure and quote-control MVP]
      MVP --> Proof[Margin and policy proof points]
      Proof --> Expansion[Execution and financing expansion]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Interesting category-creation wedge with a real buyer pain, but conviction remains limited until customers pay before compute-futures liquidity is clearly established."
    whyBelieve: "The startup targets a specific operational gap created by benchmarked GPU pricing and fixed-price AI capacity contracts that adjacent FinOps, treasury, and CTRM tools do not cleanly solve."
    whyDoubt: "The near-term software market is still small and buyers may postpone budget until benchmark basis quality, contract liquidity, and repeatable onboarding are proven."
    nextDiligence: "Validate 5-10 paid pilots that show customers will fund quote governance and exposure analytics before live hedging becomes mainstream, then test whether those pilots convert into annual contracts in the target ACV band."
  firstCustomer:
    title: "CFO at a 100-person AI inference platform reselling external H100 capacity"
    profile: "A U.S.-based inference or GPU broker business with recurring enterprise contracts, about $1M-$3M in monthly H100 or H200 exposure, and no dedicated commodity-risk team."
    trigger: "The company is negotiating or renewing a six- to twelve-month fixed-price customer contract while its upstream GPU procurement remains variable or short duration."
    buyer: "CFO or VP Finance"
    initialContract: "An 8-12 week paid pilot around $15k-$30k, creditable toward a $36k-$120k annual platform contract if the product maps most exposure, governs one quoting workflow, and proves usable margin or hedge-policy decisions."
  mustBeTrue:
    - "At least 30% of qualified beachhead accounts will pay for quote-control and exposure software before they trade meaningful compute futures volume."
    - "The first 5 pilots can map at least 80% of H100 and H200 exposure from existing customer, procurement, and usage data."
    - "CFOs view gross-margin protection and quote discipline as a separate budget from generic FinOps and treasury tooling."
    - "Basis-aware recommendations are accurate enough that customers trust them for real contract and hedge-policy decisions."
    - "Broker, FCM, or advisor partnerships produce qualified pipeline faster than pure outbound alone."
  diligenceQuestions:
    - "How often does the exact beachhead sign fixed-price contracts with real margin risk rather than pass-through pricing?"
    - "What budget line pays first: treasury systems, finance transformation, risk management, or cloud cost control?"
    - "How many of Ornn's 400 reported platform users are active hedgers versus passive benchmark observers?"
    - "What exposure data is consistently missing or dirty in the first customer deployments?"
    - "Which adjacent alternative wins most often in practice: spreadsheets, reservations, FinOps tools, or generic treasury software?"
operatingAssumptions:
  - assumption: "The best initial buyer is a CFO or VP Finance at a 50-300 person compute seller with at least $1M in monthly H100 or H200 exposure."
    basis: "idea.yaml"
    validationTest: "Interview 20 target accounts and confirm that at least 8 match the exposure profile and identify finance as the budget owner for the first purchase."
    decisionImpact: "If false, the ICP must move toward larger neoclouds with formal treasury teams or toward a different buyer such as head of capacity."
  - assumption: "Customers will buy exposure analytics and quote guardrails before standardized compute hedging is liquid enough to be routine."
    basis: "research.yaml"
    validationTest: "Close at least 3 paid pilots where execution support is not required for purchase and confirm at least 2 convert into annual production without live trading volume."
    decisionImpact: "If false, the product must either bundle execution support earlier or wait for a more mature market structure."
  - assumption: "A narrow H100 and H200 starting scope covers enough early customer pain to support repeatable onboarding."
    basis: "idea.yaml"
    validationTest: "Review the first 10 opportunities and confirm that at least 7 have concentrated exposure in H100 or H200 that can be modeled without bespoke data work."
    decisionImpact: "If false, implementation cost rises and the roadmap must either support more heterogeneous fleets earlier or narrow the ICP further."
  - assumption: "Existing usage, procurement, and contract data is structured well enough to map at least 80% of relevant exposure in under 45 days."
    basis: "operator judgment"
    validationTest: "Run onboarding on the first 5 pilots and measure time to first accurate exposure report plus percent of exposure captured from source systems."
    decisionImpact: "If false, the business becomes services-heavy and requires earlier implementation hiring or a different product scope."
  - assumption: "Partner channels through brokers, FCMs, and treasury advisors will produce lower-CAC opportunities than outbound alone."
    basis: "research.yaml"
    validationTest: "Sign 3 channel or referral partners and generate at least 6 qualified introductions with at least 1 closed paid pilot from partner sourcing."
    decisionImpact: "If false, the company must fund direct sales earlier and accept slower trust-building in a risk-sensitive category."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Interview 20 CFOs, finance leads, and heads of capacity across inference platforms, brokers, and neoclouds."
    hypothesis: "The urgent buying trigger is a real fixed-price contract event, not abstract interest in hedging."
    successMetric: "At least 12 interviews describe a recent quoted or signed contract with non-trivial upstream price risk and at least 8 share workflow artifacts."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Build a concierge exposure model from one design partner's procurement, usage, and contract data."
    hypothesis: "One narrow H100 or H200 workflow can be mapped accurately enough to drive a quote or hedge-policy decision."
    successMetric: "One design partner confirms the model would have changed a real quote, procurement decision, or hedge discussion."
    owner: "Founding eng"
  - horizon: "0-90 days"
    experiment: "Test pilot packaging that sells quote guardrails and margin simulation without execution connectivity."
    hypothesis: "Customers will pay for decision support before they require trade execution inside the product."
    successMetric: "At least 3 prospects accept paid pilot terms without demanding broker integration in phase one."
    owner: "Founder/CEO"
  - horizon: "90-180 days"
    experiment: "Run 2-3 paid pilots covering exposure mapping, policy setup, margin forecasting, and quote approval workflow."
    hypothesis: "The product can reach production value inside one selling cycle and become part of real contract review."
    successMetric: "At least 2 pilots are used in live customer quoting or renewal decisions and at least 1 converts to annual production."
    owner: "Product/eng lead"
  - horizon: "90-180 days"
    experiment: "Pilot one partner-led entry motion with a broker, FCM, or treasury advisor."
    hypothesis: "Trusted market-structure partners can shorten sales cycles in a category where finance buyers are cautious."
    successMetric: "At least 3 qualified partner-sourced opportunities and 1 signed pilot from the channel."
    owner: "Founder/CEO"
  - horizon: "180-360 days"
    experiment: "Add benchmark reconciliation and broker handoff workflows for early production customers."
    hypothesis: "Customers will pay expansion ACV once the product moves from internal visibility to action-ready treasury workflow."
    successMetric: "At least 2 production customers adopt an expansion module or increase ACV by 25% or more."
    owner: "Product lead"
operations:
  - "Review every quote decision, policy override, and missing data field weekly so roadmap priorities follow real treasury failure modes."
  - "Implement read-only ingestion, approval logs, and role-based permissions before any execution or broker handoff capability."
  - "Standardize onboarding around one exposure-data template covering contracts, procurement, usage, and benchmark mapping assumptions."
  - "Maintain partner playbooks for brokers, FCMs, and treasury advisors with clear referral triggers and implementation boundaries."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own customer discovery, finance-buyer sales, and market-structure partnerships because the main risk is proving the category, buyer, and trigger."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the exposure ledger, quote-policy workflow, and initial benchmark-mapping engine needed for paid pilots."
  - role: "Product and integrations engineer"
    startTiming: "Month 3-6"
    rationale: "Productize repeatable connectors into procurement, usage, and finance systems so onboarding time falls below 45 days."
  - role: "Treasury and risk lead"
    startTiming: "Month 6-9"
    rationale: "Translate customer hedge policies, margin workflows, and basis assumptions into repeatable product templates and partner processes."
  - role: "GTM lead"
    startTiming: "Month 9-12"
    rationale: "Scale pipeline only after paid-pilot conversion and partner-sourced demand show repeatable proof."
milestones:
  - horizon: "0-12 months"
    items:
      - "Complete 20 ICP interviews and secure 5-10 design partners with real procurement, usage, and contract data."
      - "Ship an MVP for H100 and H200 exposure mapping, quote guardrails, and margin simulation."
      - "Close at least 2 paid pilots and convert at least 1 customer to annual production."
      - "Establish 3 partner relationships across brokers, FCMs, or treasury advisors."
  - horizon: "12-24 months"
    items:
      - "Reach 8-12 production logos in the beachhead with onboarding under 45 days."
      - "Launch broker handoff, benchmark reconciliation, and policy-template expansion modules."
      - "Prove that partner-sourced pipeline contributes a meaningful share of qualified opportunities and that expansion ACV exists inside early accounts."
  - horizon: "24-36 months"
    items:
      - "Expand from treasury analytics into execution support, settlement workflow, and credit or financing modules."
      - "Build a differentiated dataset on benchmark basis, quote outcomes, and margin behavior across compute sellers."
      - "Reach a product position that can support a broader compute-financial-infrastructure strategy beyond the original software wedge."
risks:
  - risk: "Compute-futures liquidity develops too slowly for buyers to see treasury software as urgent."
    likelihood: "High"
    impact: "High"
    mitigation: "Lead with quote controls, exposure visibility, and reservation-versus-hedge policy decisions that create value before heavy execution volume exists."
  - risk: "Benchmark basis remains too wide across provider, geography, and workload mix for customers to trust recommended hedge ratios."
    likelihood: "High"
    impact: "High"
    mitigation: "Start with concentrated H100 and H200 fleets, make basis modeling explicit, and avoid promising straight-through hedge automation early."
  - risk: "FinOps vendors, treasury systems, or Ornn absorb the workflow before the startup establishes a distinct product boundary."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Differentiate on cross-functional quote governance, workload-to-benchmark mapping, and embedded treasury approvals rather than generic visibility or venue access."
  - risk: "Customer data is fragmented enough that onboarding becomes services-heavy and margins compress."
    likelihood: "Medium"
    impact: "Medium"
    mitigation: "Narrow the first integrations, enforce an opinionated onboarding template, and hire implementation capacity only after repeated data patterns are clear."
fundingAsk:
  round: "pre-seed"
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Use 18 months to prove the beachhead with design partners and paid pilots, ship a repeatable H100 or H200-focused product, hire the first integrations and treasury-risk talent, and validate whether partner-led distribution and annual production contracts can support a broader seed-stage expansion."
