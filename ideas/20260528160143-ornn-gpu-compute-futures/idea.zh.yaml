problem: >-
  AI 推理平台和 GPU 算力转售商越来越多地向企业签订固定价格合同，但底层算力却从波动的现货市场和短期供应中采购。
  财务团队仍依赖电子表格管理这一敞口，看不到对冲覆盖率、保证金需求，也不清楚售出合同与标准化 GPU 合约实际结算价之间的基差错配。
  H100 或 H200 价格一旦突然跳涨，已签客户合同的毛利就会被悉数吃光。
targetUser:
  primary: AI 推理平台或 GPU 算力转售商的 CFO、财务副总裁或容量负责人，负责在固定价格企业合同下转售租用的 NVIDIA GPU 算力
  secondary: 独立 GPU 云商和算力经纪商中刚刚启动首个对冲计划的司库与风控团队
  buyer: AI 推理平台或 GPU 算力转售商的 CFO 或财务副总裁
startupThesis:
  nonObviousInsight: >-
    真正的转变不只是 GPU 价格高企，而是它正在被基准化并接入受监管的交易轨道。一旦 OCPI 和 ICE 让标准化算力合约成为可能，
    稀缺的控制点就移向了那个能把混乱工作负载需求和客户 SLA 转化为可对冲金融敞口的软件层。
  beachhead: >-
    AI 推理平台和 GPU 经纪商的司库与定价工作流——月均 H100 或 H200 花销在 $500k–$5M 之间，
    且已在报 6–12 个月固定价格企业容量合同
  wedge: >-
    算力司库系统：将真实工作负载需求与客户承诺映射为 OCPI 挂钩的对冲比率、保证金监控和固定价格报价护栏
  whyNowCatalyst: >-
    Ornn 与 ICE 的合作以及 OCPI 对 H100、H200、B200 和 RTX 5090 算力的实时定价，意味着 GPU 敞口正在接入受监管轨道
    可以对冲——而 AI 卖家恰好在此时尝试锁定数月客户价格。
  ventureScalePath: >-
    从 AI 算力卖家的司库软件起步，再扩展到标准化算力合约的执行、清算、信用和融资基础设施，跨云、跨地域、跨加速器。
solution: >-
  构建一个司库工作台：摄入 GPU 采购承诺、实时使用遥测数据和已签客户合同，按 SKU 和时间桶展示每家公司的净风险敞口。
  产品针对 OCPI 挂钩期货推荐对冲比率，在实际工作负载偏离基准合约时模拟基差风险，并在财务团队下单前追踪保证金需求。
  它还嵌入销售与定价工作流，让商务团队知道何时可以安全报出固定价格年度容量，何时应重新定价或缩短合同期限。
  随着时间推移，该系统成为连接 GPU 采购、企业报价与受监管算力风险市场的运营层。
goToMarketSeed:
  firstCustomer: >-
    50–300 人的 AI 推理平台或 GPU 算力经纪商，有周期性企业合同，内部没有大宗商品风控团队，
    每月对租用 H100 或 H200 供应的风险敞口不低于 $1M
  buyingTrigger: >-
    公司正在签署或即将签署多季度固定价格客户合同，而上游 GPU 供应仍按现货价或短期合同采购
  currentAlternative: 基于电子表格的容量规划，加上人工供应商谈判与未对冲敞口
  switchingReason: >-
    切口让财务和销售共享一个视图——对冲覆盖率、保证金风险和报价纪律一目了然，比内部从零搭建算力风控体系快得多、也安全得多。
  pricingHypothesis: "年平台费 $36k–$120k，另加按月度对冲 GPU 名义敞口计费的高级模块"
whyNow:
  - point: 受监管期货至关重要——多数 AI 卖家不会围绕非正式双边 GPU 协议搭建司库项目。
    signalRefs: [监管合规的算力合约已然到来]
    sourceRefs: [1]
  - point: OCPI 实时基准使得定义对冲比率和采购护栏成为可能，而不再把 GPU 定价视为不透明的供应商谈判。
    signalRefs: [GPU 现货价格正在走向基准化]
    sourceRefs: [1]
  - point: 覆盖 H100、H200、B200 和 RTX 5090 说明这正在演变为全品类风险敞口管理问题，而非单一芯片的小众交易。
    signalRefs: [风险敞口覆盖多款旗舰 GPU 型号]
    sourceRefs: [1]
  - point: Ornn 背后 $33.7M 的融资表明生态系统已具备足够势能，可以在市场结构完全成熟前围绕算力风险运营构建软件。
    signalRefs: [资本正在向算力风险基础设施聚拢]
    sourceRefs: [1]
differentiator: >-
  这不是又一个云成本仪表板，也不是衍生品交易场所。切口是真实 AI 工作负载与标准化金融合约之间的转化层——
  包含基差风险逻辑、对冲政策规则和报价管控，通用 TMS 或云 FinOps 工具根本不懂这些。
  随着平台积累更多 GPU 卖家的敞口图谱、对冲结果和定价决策，它会形成专有数据集，揭示真实算力业务该如何对冲。
