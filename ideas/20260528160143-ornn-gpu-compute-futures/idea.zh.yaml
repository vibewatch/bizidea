topRisks:
  - name: 流动性时机
    description: GPU 期货采用速度可能慢于预期，客户在市场深度不足以大量交易之前就对风险软件感兴趣。
    mitigation: 优先做好敞口测量、报价管控和对冲政策工作流，即便客户尚未执行大量期货头寸，这些功能也能创造价值。
  - name: 基差错配
    description: 标准化 OCPI 挂钩合约可能与客户真实的 GPU 机型组合、地域或工作负载特征不完全匹配。
    mitigation: 将基差风险建模和对冲叠加层列为产品核心，优先服务集中持有 H100 和 H200 敞口的客户。
  - name: 交易所依赖
    description: 以单一基准和单一场所为核心的年轻市场，可能让公司暴露于产品、监管或分发层面的外部变化风险。
    mitigation: 将系统定位为凌驾于任何单一交易所之上的中立司库层，使其能够支持双边远期合约、经纪产品和未来的算力基准。
