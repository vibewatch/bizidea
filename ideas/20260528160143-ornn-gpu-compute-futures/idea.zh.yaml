jobsToBeDone:
  - job: 当我需要报出多季度 AI 容量合同时，帮我的财务团队看清有多少 GPU 敞口未被对冲，这样他们就能在不损毁毛利的前提下定价。
    currentAlternative: 电子表格需求预测和人工供应商沟通
    successMetric: 已签容量合同的毛利率方差
  - job: 当 GPU 价格突然波动时，帮我的司库负责人搞清楚需要采取哪些对冲行动以及保证金需求，让公司避免流动性冲击。
    currentAlternative: 跨财务电子表格和采购仪表板的临时分析
    successMetric: 价格波动后更新敞口和保证金视图所需的时间
