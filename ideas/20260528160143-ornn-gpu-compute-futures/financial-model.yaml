modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TriggeredAccounts --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by reaching 20 high-value treasury customers at roughly $120K ARR each, not by high logo volume."
  - checkName: Must go right
    finding: "The company has to turn Y1 paid pilots into a repeatable partner-assisted motion and keep onboarding below 45 days so Year 2 can scale from 3 to 10 logos."
  - checkName: Model breaks if
    finding: "If sales cycles stretch and gross margin stays below 68% because deployments remain services-heavy, the downside case runs out of cash before the next round."
  - checkName: Next-round proof
    finding: "The next financing is justified by exiting Q4Y2 with 10 production logos, faster onboarding, and credible referral flow from brokers, FCMs, or treasury advisors."
sanityChecks:
  ruleOf40: "Y3 growth 138.4% + EBITDA margin -41.8% = 96.6%"
  burnMultiple: "Y2 burn multiple 1.1x improves to Y3 burn multiple 0.6x as net new ARR grows from $840K to $1.2M."
  revenuePerFte: "$174K Y3 using Q4Y3 10 FTE (benchmark $150-250K seed-stage enterprise infrastructure SaaS)"
  flags:
    - "The base case still requires 20 customers inside a narrow ~220-account SAM, so referenceability and account selection matter more than raw outbound volume."
    - "Cash stays positive, but only $329K remains at Y3 end with no follow-on financing, so the company should plan the next round during H2Y2 to H1Y3."
    - "The 71% gross margin assumption depends on onboarding becoming standardized; if customer data remains fragmented, services mix will pressure margins quickly."
