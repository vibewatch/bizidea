  - id: A12
    name: GTM loaded cash compensation
    value: "165.0"
    unit: usdK/year
    source: "[BP team GTM lead at Month 9-12 and partner-led sales motion; startup-finance heuristic excluding upside commission]"
  - id: A13
    name: G&A/ops loaded cash compensation
    value: "120.0"
    unit: usdK/year
    source: "[BP milestones imply added finance and operations support by Year 2; startup-finance heuristic]"
