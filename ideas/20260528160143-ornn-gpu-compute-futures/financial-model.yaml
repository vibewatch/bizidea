scenarios:
  downside:
    description: "Production conversions slip by roughly two quarters, blended ARR per account stays closer to $108K, and onboarding remains services-heavy enough to hold gross margin at 68%."
    y3RevenueK: 1360.0
    y3EbitdaK: -1035.0
    cashLowPointK: -110.0
    keyAssumptionChanges:
      - "ARPU falls from $120K to $108K annualized"
      - "Year 2 and Year 3 logo adds land about two quarters later than base case"
      - "Gross margin stays at 68% because integrations do not standardize fast enough"
  base:
    description: "The company converts 3 Y1 paid logos into a repeatable partner-assisted motion that reaches 20 production customers and $2.4M exit ARR by Y3 end."
    y3RevenueK: 1740.0
    y3EbitdaK: -727.8
    cashLowPointK: 329.0
    keyAssumptionChanges:
      - "Uses assumptions A1-A21 as modeled"
      - "Hiring remains milestone-gated rather than front-loaded"
      - "Production pricing holds at the $120K ACV ceiling of the planned range"
  upside:
    description: "Partner referrals start compounding in Year 2, the product supports lighter-touch onboarding, and the company exits Year 3 with 22 customers instead of 20."
    y3RevenueK: 1960.0
    y3EbitdaK: -430.0
    cashLowPointK: 610.0
    keyAssumptionChanges:
      - "Y3 closes 2 additional customers from partner-sourced demand"
      - "Gross margin improves from 71% to 73% as deployments reuse templates"
      - "No extra hires are pulled forward versus the base plan"
