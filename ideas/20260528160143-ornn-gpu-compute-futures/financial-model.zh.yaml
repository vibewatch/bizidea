  - id: A11
    name: 司库/风控负责人含税现金薪酬
    value: "185.0"
    unit: usdK/year
    source: "[BP team Treasury and risk lead at Month 6-9; startup-finance heuristic for domain specialist]"
  - id: A12
    name: GTM 含税现金薪酬
    value: "165.0"
    unit: usdK/year
    source: "[BP team GTM lead at Month 9-12 and partner-led sales motion; startup-finance heuristic excluding upside commission]"
  - id: A13
    name: G&A/运营含税现金薪酬
    value: "120.0"
    unit: usdK/year
    source: "[BP milestones imply added finance and operations support by Year 2; startup-finance heuristic]"
  - id: A14
    name: 第 1 年招聘节奏
    value: "M1 founder plus 1 eng; M4 plus 1 product/integrations; M7 plus 1 treasury/risk; M10 plus 1 GTM lead"
    unit: schedule
    source: "[BP team.startTiming]"
  - id: A15
    name: 第 2 年招聘节奏
    value: "M14 plus 1 eng; M19 plus 1 G&A/ops"
    unit: schedule
    source: "[BP milestones 12-24 months and sequencingRationale; hiring stays conservative until paid-production proof]"
  - id: A16
    name: 第 3 年招聘节奏
    value: "M25 plus 1 GTM; M28 plus 1 eng; M31 plus 1 product/integrations"
    unit: schedule
    source: "[BP product.twentyFourMonth and 24-36 month milestones; adds roles only after the beachhead is established]"
  - id: A17
    name: 月度非薪资运营费用爬坡
    value: "S&M 2.0-12.0; R&D 6.0-13.0; G&A 5.0-9.5 monthly usdK across the phase ramps"
    unit: usdK/month
    source: "[Startup-finance heuristic for travel, cloud tooling, security, legal, and accounting needed for enterprise pilots and controlled finance workflows]"
  - id: A18
    name: 收入确认时间
    value: "Revenue starts in the month a paying customer goes live"
    unit: policy
    source: "[BP pricing begins with paid pilots that convert into annual subscriptions; simplified recognition assumption for model traceability]"
  - id: A19
    name: 每新增生产客户混合 CAC
    value: "60.0"
    unit: usdK
    source: "[BP gtm founder-led and partner-referral motion plus funnelTargets; startup-finance heuristic for narrow enterprise sales]"
  - id: A20
    name: 月度客户流失率
    value: "1.5"
    unit: percent
    source: "[Startup-finance heuristic for annual-contract enterprise infrastructure software with a small but sticky buyer set]"
  - id: A21
    name: 融资资金用途分配
    value: "40% Engineering / 25% GTM / 10% G&A / 25% Buffer"
    unit: mix
    source: "[Derived from modeled spend through the Q4Y2 milestone plus a 6-month buffer]"
