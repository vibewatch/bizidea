    name: 每生产客户混合年度 ARPU
    value: "120.0"
    unit: usdK/year
    source: "[BP gtm.pricing $36k-$120k ACV range plus premium modules tied to exposure monitored; base case uses top-of-range annual contract value for successful production deployments]"
