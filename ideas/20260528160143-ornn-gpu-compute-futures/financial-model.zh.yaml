scenarios:
  downside:
    description: "生产转化延迟约两个季度，混合 ARR 每账户维持在 $108K 附近，入驻服务密集程度使毛利率维持在 68%。"
    y3RevenueK: 1360.0
    y3EbitdaK: -1035.0
    cashLowPointK: -110.0
    keyAssumptionChanges:
      - "ARPU 从 $120K 降至 $108K（年化）"
      - "第 2 年和第 3 年新增客户比基础情景晚约两个季度"
      - "集成标准化速度不足，毛利率维持在 68%"
  base:
    description: "公司将 3 个 Y1 付费客户转化为可重复的合作伙伴辅助模式，到 Y3 末达到 20 个生产客户和 $2.4M 退出 ARR。"
    y3RevenueK: 1740.0
    y3EbitdaK: -727.8
    cashLowPointK: 329.0
    keyAssumptionChanges:
      - "使用假设 A1–A21 如建模"
      - "招聘保持里程碑门控而非前置"
      - "生产定价维持在计划区间的 $120K ACV 上限"
  upside:
    description: "合作伙伴推荐在第 2 年开始复利增长，产品支持更轻量的入驻，公司以 22 个而非 20 个客户退出第 3 年。"
    y3RevenueK: 1960.0
    y3EbitdaK: -430.0
    cashLowPointK: 610.0
    keyAssumptionChanges:
      - "Y3 通过合作伙伴来源需求额外关闭 2 个客户"
      - "毛利率因部署复用模板从 71% 提升至 73%"
      - "相比基础计划不提前任何招聘"
