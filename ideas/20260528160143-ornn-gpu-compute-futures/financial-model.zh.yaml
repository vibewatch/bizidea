    y3RevenueImpactK: 0.0
    cashImpactK: -190.0
modelDiagram:
  title: 单位经济模型流
  mermaid: |
    flowchart LR
      TriggeredAccounts --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: "基础情景收入由约 20 个高价值司库客户以约 $120K ARR 各自贡献驱动，而非依赖大量客户数量。"
  - checkName: 必须做对的事
    finding: "公司必须将 Y1 付费试点转化为可重复的合作伙伴辅助模式，并将入驻周期控制在 45 天以下，这样第 2 年才能从 3 个客户扩张到 10 个。"
  - checkName: 模型崩溃条件
    finding: "若销售周期拉长且因部署持续服务密集而毛利率维持在 68% 以下，悲观情景将在下一轮融资前耗尽现金。"
  - checkName: 下一轮融资依据
    finding: "以 10 个生产客户、更快的入驻速度和经纪商、FCM 或司库顾问的可信推荐流量退出 Q4Y2，即为下一轮融资的合理依据。"
sanityChecks:
  ruleOf40: "Y3 增长率 138.4% + EBITDA 利润率 -41.8% = 96.6%"
  burnMultiple: "Y2 消耗倍数 1.1x，随着净新增 ARR 从 $840K 增至 $1.2M，改善至 Y3 消耗倍数 0.6x。"
  revenuePerFte: "$174K Y3（使用 Q4Y3 10 名 FTE）（基准：种子阶段企业基础设施 SaaS $150–250K）"
  flags:
    - "基础情景仍需在约 220 个账户的窄口 SAM 内获取 20 个客户，因此客户可引用性和账户筛选比原始外呼量更重要。"
    - "现金维持正值，但 Y3 末在无后续融资的情况下仅剩 $329K——公司应在 H2Y2 至 H1Y3 期间规划下一轮融资。"
    - "71% 毛利率假设依赖入驻标准化；若客户数据持续碎片化，服务占比将迅速压低毛利。"
