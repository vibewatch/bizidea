scenarios:
  downside:
    description: Procurement stretches, only a minority of pilots convert, and partner referrals do not accelerate the Y3 land rate.
    y3RevenueK: 4100.0
    y3EbitdaK: -320.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
      - Sales cycle extends from 6 months to 9 months.
      - Blended annual revenue per active program falls from $300K to about $260K.
      - Y3 exit customer count falls from 30 active programs to about 22.
      - Gross margin slips from 70% to 67% because onboarding stays services-heavy.
  base:
    description: Founder-led sales convert the first two pilots, Y2 exits at nine production programs, and partner-assisted expansion carries the business onto the 30-program Y3 path.
    y3RevenueK: 5650.0
    y3EbitdaK: 781.0
    cashLowPointK: 774.0
    keyAssumptionChanges:
      - Sales cycle holds near 6 months.
      - Pilot-to-production conversion stays at roughly 50% with selective partner help.
      - Blended annual revenue per active program holds near $300K with modest expansion revenue.
  upside:
    description: References and partner channels start working in Y2, letting the company add programs faster while keeping deployment repeatable.
    y3RevenueK: 6900.0
    y3EbitdaK: 1450.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
      - Sales cycle compresses from 6 months to 4-5 months after the first reference accounts.
      - Blended annual revenue per active program improves from $300K to about $320K through hypercare and second-program mix.
      - Y3 exit customer count rises from 30 active programs to roughly 35.
sensitivity:
  - variable: ARPU
    downsideCase: $260K blended annual revenue per active program
    baseCase: $300K blended annual revenue per active program
    upsideCase: $320K blended annual revenue per active program
    y3RevenueImpactK: -750.0
    cashImpactK: -525.0
  - variable: CAC
    downsideCase: $120K CAC per new production program because deals stay founder- and solutions-heavy
    baseCase: $90K CAC per new production program
    upsideCase: $75K CAC per new production program from partner leverage and stronger references
    y3RevenueImpactK: 0.0
    cashImpactK: -900.0
  - variable: churn
    downsideCase: 3.5% monthly program churn as completed migrations do not expand into hypercare or second programs
    baseCase: 2.5% monthly program churn
    upsideCase: 1.5% monthly program churn once multi-program expansion is proven
    y3RevenueImpactK: -350.0
    cashImpactK: -245.0
  - variable: sales cycle
    downsideCase: 9 months because SI resistance and procurement reviews drag
    baseCase: 6 months
    upsideCase: 4-5 months after one strong reference account and partner referrals
    y3RevenueImpactK: -1150.0
    cashImpactK: -850.0
  - variable: gross margin
    downsideCase: 65% gross margin from heavier onboarding and support work
    baseCase: 70% gross margin
    upsideCase: 72% gross margin after template packs and controls become repeatable
    y3RevenueImpactK: 0.0
    cashImpactK: -280.0
  - variable: hiring pace
    downsideCase: Pull the second AE and data/ML hire forward by two quarters before the funnel is proven
    baseCase: Milestone-based hiring tied to customer conversions and deployment repeatability
    upsideCase: Delay one commercial hire until after 15 active programs
    y3RevenueImpactK: -100.0
    cashImpactK: -400.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ActivePrograms
      ActivePrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
      Opex --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from scaling from 3 paying programs at Y1 exit to 9 at Y2 exit and 30 at Y3 exit at roughly $300K blended annual revenue per active program.
  - checkName: Must go right
    finding: The company must deliver first value in about four weeks and keep pilot conversion near 50% so Y2 can reach 8-10 production programs without outsized sales burn.
  - checkName: Model breaks if
    finding: If sales cycles stretch toward nine months or ACV slips toward $260K, downside cash compresses toward roughly $140K before the business reaches scale.
  - checkName: Next-round proof
    finding: The next financing is justified once the company exits Y2 with 8-10 production programs, one expansion motion, and partner channels that can support the first EBITDA-positive year.
sanityChecks:
  ruleOf40: Y3 growth 253.1% + EBITDA margin 13.8% = 266.9%
  burnMultiple: Net burn is ~3.3x in Y1 and ~0.8x in Y2, then turns cash-generative in Y3 as the installed base compounds.
  revenuePerFte: $435K Y3 on 13 year-end FTE (benchmark $200–400K SaaS)
  flags:
    - The model still assumes 21 new production programs land in Y3, so partner-assisted distribution has to work on schedule.
    - Holding 70% gross margin may prove optimistic if early Oracle and SAP deployments require more custom mapping or services-heavy onboarding than planned.
    - Unit economics rely on per-program expansion into hypercare or second migrations because a pure one-and-done cutover tool would churn faster than the base case allows.
    - Revenue remains concentrated in a small number of enterprise programs through Y2, so one delayed logo can move near-term results materially.
