slug: erp-cutover-control-tower
date: '2026-05-09'
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: Model start month
    value: 2026-06
    unit: YYYY-MM
    source: '[BP date 2026-05-09] first full operating month after the business plan date.'
  - id: A2
    name: Revenue unit
    value: Active ERP migration program
    unit: customer definition
    source: '[BP businessModel.unitOfValue] revenue is monetized per active migration program under readiness management.'
  - id: A3
    name: Base production subscription price
    value: '275'
    unit: USDK per program-year
    source: '[BP investorMemo.firstCustomer.initialContract + research.bottomUpSizingDrivers] full production pricing lands inside the researched $250k-$300k annual ACV band.'
  - id: A4
    name: Blended annual revenue per active program
    value: '300'
    unit: USDK per program-year
    source: '[BP businessModel.revenueStreams + BP gtm.pricing + BP gtm.funnelTargets] model adds modest uplift above the base subscription from paid pilots, onboarding, and early hypercare or second-program expansion.'
  - id: A5
    name: Customer ramp
    value: 3 paying programs by Y1 exit, 9 by Y2 exit, and 30 by Y3 exit
    unit: active programs
    source: '[BP milestones + research.market.som] base case matches 2 production conversions in year 1, 8-10 production programs by 12-24 months, and the researched 30-program year-3 SOM path.'
  - id: A6
    name: Qualified-pilot funnel
    value: 15-20 target accounts per quarter, 25% qualified pilots, 50% pilot-to-production conversion, and 60% expansion within 12 months
    unit: funnel rates
    source: '[BP gtm.funnelTargets] base customer additions are anchored to the stated founder-led enterprise funnel and expansion targets.'
  - id: A7
    name: Average sales cycle
    value: '6'
    unit: months
    source: '[BP investorMemo.nextDiligence + BP risks + research.openQuestions] enterprise PMO purchases and SI friction imply a roughly six-month base sales cycle.'
  - id: A8
    name: Gross margin target
    value: '70'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct] steady-state target gross margin for the software-led business.'
  - id: A9
    name: COGS ratio
    value: '30'
    unit: percent of revenue
    source: '[BP businessModel.targetGrossMarginPct] COGS is set to 30% so gross margin equals the 70% target.'
  - id: A10
    name: Monthly program churn
    value: '2.5'
    unit: percent
    source: Startup-finance heuristic for per-program enterprise software where some migrations end after cutover, partially offset by hypercare and second-program expansion.
  - id: A11
    name: Opening cash from seed raise
    value: '3000'
    unit: USDK
    source: '[BP fundingAsk.targetFundingRangeUsd] model uses the low end of the stated $3M-$5M seed range.'
  - id: A12
    name: Loaded payroll basis
    value: '20'
    unit: percent benefits and payroll tax
    source: Startup-finance heuristic; headcount costs are modeled fully loaded rather than as base salary only.
  - id: A13
    name: Loaded cash compensation benchmarks
    value: Founder CEO $216k, founding eng $210k, domain product/solutions lead $186k, solutions engineer $162k, enterprise AE $198k, governance engineer $204k, customer success/implementation lead $150k, senior product engineer $186k, partner manager $168k, data/ML engineer $198k, finance/ops manager $132k
    unit: annual USDK
    source: Startup-finance heuristic for a lean US seed-stage enterprise software team selling into large accounts without big-tech cash levels.
  - id: A14
    name: Hiring ramp
    value: Founder CEO, founding eng, and domain product/solutions lead at start; solutions engineer in Q2Y1; AE in Q3Y1; governance engineer in Q4Y1; customer success, product engineering, partner, and second AE through Y2; data/ML, second solutions engineer, and finance/ops through Y3
    unit: headcount plan
    source: '[BP team + BP milestones + BP operations] hires are milestone-based and delayed until deployment and GTM proof points appear.'
  - id: A15
    name: Non-payroll operating spend ramp
    value: About $20k per month in Q1Y1 rising to about $88k per month in Q4Y3
    unit: USDK per month
    source: '[BP operations + BP fundingAsk.useOfFundsSummary] covers cloud tools, travel, legal, security reviews, accounting, and partner development without assuming heavy paid-marketing burn.'
  - id: A16
    name: Cash conversion policy
    value: EBITDA approximates operating cash flow
    unit: policy
    source: Startup-finance heuristic; no debt, capex, taxes, or material working-capital swings are modeled.
  - id: A17
    name: Funding milestone
    value: Exit Y2 with 8-10 production programs, at least one expansion sale, 2-3 productive partner channels, and enough buffer to hold commercial hiring into the first EBITDA-positive year
    unit: milestone
    source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary] used to size the current seed round and six-month buffer.'
