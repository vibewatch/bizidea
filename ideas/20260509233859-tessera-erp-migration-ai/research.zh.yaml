categoryDynamics:
  growthRate: AI 增强型 ERP 现代化工具增速大致落在高十几到二十几个百分点之间（与 ERP 及 AI in ERP 市场报告交叉校验）
  growthRateSourceRefs:
    - 11
    - 23
    - 29
  tailwinds:
    - point: 硬截止时间和已经在跑的上线项目，正在把预算真正撬开。
      sourceRefs:
        - 2
        - 12
    - point: AI 正在进入核心 ERP 工作流，使控制层软件更容易被合理化。
      sourceRefs:
        - 14
        - 15
        - 22
    - point: 咨询费和 SI 超支的痛，让“把协同工作压缩成软件”有了空间。
      sourceRefs:
        - 2
        - 7
        - 1
  headwinds:
    - point: 大型 SI 和在位工具厂商已经拿走了相当多的项目预算，而且可以顺手打包相邻能力。
      sourceRefs:
        - 13
        - 17
        - 21
    - point: 如果没有明确证据、控制和问责，采购方未必会信任 AI 给出的建议。
      sourceRefs:
        - 16
        - 24
        - 25
competitors:
  - name: Panaya
    stage: 扩张期
    wedge: 以 SAP 为中心的迁移指引、测试和变更智能
    pricing: 定制报价
    strength: 对 SAP 迁移理解深，而且围绕降低 S/4HANA 项目风险的叙事很清楚
    weaknessVsUs: 重心更偏测试 / 变更和迁移指引，而不是横跨所有工作流的 PMO 控制塔
    sourceRefs:
      - 18
      - 30
  - name: Tricentis
    stage: 现有厂商
    wedge: 覆盖广泛企业场景、且在 SAP 上很强的自动化测试
    pricing: 需询价
    strength: 装机基础大、自动化深度强，而且企业采购对它很熟
    weaknessVsUs: 测试自动化本身并不能把依赖管理、切换排序和 SI 日常执行可视性统一起来
    sourceRefs:
      - 17
      - 18
  - name: Syniti
    stage: 现有厂商
    wedge: 迁移数据质量、治理和业务可用数据
    pricing: 定制报价
    strength: 在最难的数据工作流上有可信度，而且和 SAP 生态关系深
    weaknessVsUs: 更偏数据就绪，而不是跨工作流编排、每日阻塞派发或切换指挥
    sourceRefs:
      - 19
      - 13
  - name: Celonis
    stage: 后期公司
    wedge: 面向 ERP 转型的流程挖掘和 IT 现代化智能
    pricing: 定制报价
    strength: 流程发现引擎强，也有高层能听懂的转型叙事
    weaknessVsUs: 更接近数字孪生和可观测性，而不是实时切换执行控制
    sourceRefs:
      - 20
      - 21
      - 31
regulatoryTechnicalConstraints:
  - point: 任何会影响财务控制或运营切换的建议，都必须带可审计证据、审批流和按角色划分的责任边界。
    sourceRefs:
      - 16
      - 24
  - point: 异构企业环境会抬高集成和数据模型复杂度，因此早期部署很难做到完全自治执行。
    sourceRefs:
      - 9
      - 26
  - point: 面向欧洲的部署，会面临更高的文档和监督负担，尤其是高影响的 AI 辅助工作流。
    sourceRefs:
      - 24
      - 25
validationSignals:
  - point: Tessera 的 $60M Series A 说明投资人相信，ERP 迁移自动化能成为真实的软件预算，而不只是服务特性。
    sourceRefs:
      - 1
  - point: ASUG 的数据表明，SAP 客户里的紧迫性和预算痛都已经很明显。
    sourceRefs:
      - 2
  - point: Oracle、Microsoft 和 ERP 垂媒都在讨论 AI operator 进入企业工作流，这验证了底层使能栈正在成熟。
    sourceRefs:
      - 14
      - 22
      - 28
openQuestions:
  - 除了这里拿到的偏 SAP 证据外，未来 24 个月里究竟有多少 Oracle E-Business Suite 及类似制造 / 分销项目，真正落在这个精确滩头市场里？
  - SI 会把执行控制层当成好用的副驾驶，还是把它当成威胁毛利、因此在采购环节设卡？
  - 最能预测上线失败的信号到底是什么：失败测试、数据装载质量、未解的定制代码依赖，还是责任归属缺口？
  - 共创客户能否提供足够多的历史项目材料，让模型在部署第一个月内就跑出价值？
