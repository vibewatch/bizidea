    rationale: 估算为第 3 年 30 个活跃项目 × 平均 $250k ACV，前提是先靠共创客户跑通，再经直销和有限 SI 转介扩张。
    isEstimate: true
    sourceRefs:
      - 1
      - 2
      - 18
