topRisks:
  - name: Services channel conflict
    description: System integrators may resist a product that reduces billable coordination labor or exposes schedule slippage.
    mitigation: Sell to the CIO and finance transformation office as an independent control layer and offer white-labeled workflows that help cooperative SIs deliver faster.
  - name: Integration accuracy
    description: Highly customized legacy ERP estates may make automated dependency mapping unreliable in the hardest accounts.
    mitigation: Start with SAP ECC and Oracle EBS finance migrations, require scoped discovery inputs, and keep humans approving generated plans until confidence is proven.
  - name: Outcome liability
    description: Customers may blame the platform for missed go-lives or production issues even when the root cause sits with the SI or business team.
    mitigation: Define the product as the auditable system of record for readiness, contract around recommendation support rather than execution guarantees, and tie pilots to measurable risk-detection metrics.
