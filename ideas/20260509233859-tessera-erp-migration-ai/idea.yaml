jobsToBeDone:
  - job: >-
      When a board-approved ERP go-live date is approaching, help the
      transformation PMO see true dependency and readiness risk, so they can
      prevent last-minute cutover failures.
    currentAlternative: Weekly PMO status reviews across spreadsheets and SI reports
    successMetric: Reduction in blocked critical-path items and on-time go-live confidence
  - job: >-
      When finance and operations teams keep changing requirements during a
      migration, help functional leads convert those changes into updated tests,
      owners, and cutover tasks, so they can avoid expensive rework.
    currentAlternative: Manual ticket triage and consultant-created runbooks
    successMetric: Faster turnaround from change request to validated test and cutover update
ideaScorecard:
  signalStrength:
    score: 5
    rationale: The source contains a large, verified financing event plus concrete buyer pain, timeline compression, and cost claims.
  painIntensity:
    score: 5
    rationale: ERP migration failures can disrupt finance close, plant operations, and seven-figure implementation budgets.
  wedgeClarity:
    score: 5
    rationale: A cutover and readiness command center is a narrow, budget-linked entry point inside an existing migration program.
  defensibility:
    score: 4
    rationale: Workflow data, ERP-specific playbooks, and accumulated migration patterns can compound, though large integrators remain a threat.
  ventureScale:
    score: 5
