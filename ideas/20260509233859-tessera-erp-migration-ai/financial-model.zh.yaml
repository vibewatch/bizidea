scenarios:
  downside:
    description: 采购流程拉长、只有少数试点能转正，而且伙伴转介没能把 Y3 的获客节奏拉起来。
    y3RevenueK: 4100.0
    y3EbitdaK: -320.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
      - 销售周期从 6 个月拉长到 9 个月。
      - 每个活跃项目的混合年收入从 $300K 降到约 $260K。
      - Y3 期末客户数从 30 个活跃项目降到约 22 个。
      - 由于上线仍偏服务化，毛利率从 70% 下滑到 67%。
  base:
    description: 创始人主导销售拿下前两个试点，Y2 末跑到 9 个生产项目，再靠伙伴辅助扩张走上 Y3 的 30 项目路径。
    y3RevenueK: 5650.0
    y3EbitdaK: 781.0
    cashLowPointK: 774.0
    keyAssumptionChanges:
      - 销售周期维持在约 6 个月。
      - 在精选伙伴帮助下，试点转正率保持在约 50%。
      - 每个活跃项目的混合年收入维持在约 $300K，并带有少量扩展收入。
  upside:
    description: Y2 开始样板客户和伙伴渠道真正起效，让公司能在保持部署可复制的前提下更快拿下新项目。
    y3RevenueK: 6900.0
    y3EbitdaK: 1450.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
      - 在首批样板客户出现后，销售周期从 6 个月缩短到 4-5 个月。
      - 受护航和第二项目 mix 拉动，每个活跃项目的混合年收入从 $300K 提高到约 $320K。
      - Y3 期末客户数从 30 个活跃项目提升到约 35 个。
sensitivity:
  - variable: ARPU
    downsideCase: 每个活跃项目的混合年收入为 $260K
    baseCase: 每个活跃项目的混合年收入为 $300K
    upsideCase: 每个活跃项目的混合年收入为 $320K
    y3RevenueImpactK: -750.0
    cashImpactK: -525.0
  - variable: CAC
    downsideCase: 每新增一个生产项目的 CAC 为 $120K，因为销售仍高度依赖创始人和解决方案团队
    baseCase: 每新增一个生产项目的 CAC 为 $90K
    upsideCase: 借助伙伴杠杆和更强样板客户，CAC 降到 $75K
    y3RevenueImpactK: 0.0
    cashImpactK: -900.0
  - variable: 流失率
    downsideCase: 月度项目流失率升到 3.5%，因为完成切换的客户没有扩到护航或第二个项目
    baseCase: 月度项目流失率为 2.5%
    upsideCase: 一旦多项目扩展被验证，月度项目流失率降到 1.5%
    y3RevenueImpactK: -350.0
    cashImpactK: -245.0
  - variable: 销售周期
    downsideCase: 因为 SI 阻力和采购评审拖慢，拉长到 9 个月
    baseCase: 6 个月
    upsideCase: 在一个强样板客户和伙伴转介出现后缩到 4-5 个月
    y3RevenueImpactK: -1150.0
    cashImpactK: -850.0
  - variable: 毛利率
    downsideCase: 因为上线和支持更重服务，毛利率降到 65%
    baseCase: 70%
    upsideCase: 模板包与治理控制可复制后，毛利率提高到 72%
    y3RevenueImpactK: 0.0
    cashImpactK: -280.0
  - variable: 招聘节奏
    downsideCase: 在漏斗尚未跑通前，就把第二名 AE 和数据 / ML 招聘提前两个季度
    baseCase: 按客户转正和部署可复制性来驱动招聘
    upsideCase: 把一名商业岗位延后到 15 个活跃项目之后再招
    y3RevenueImpactK: -100.0
    cashImpactK: -400.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      TargetAccounts[目标账户] --> PaidPilots[付费试点]
      PaidPilots --> ActivePrograms[活跃项目]
      ActivePrograms --> Revenue[收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金]
      Opex[运营开支] --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景下，收入来自客户数从 Y1 末的 3 个付费项目，扩大到 Y2 末的 9 个，再到 Y3 末的 30 个；每个活跃项目对应约 $300K 的混合年收入。
  - checkName: 必须做对的地方
    finding: 公司必须在约 4 周内交付第一波价值，并把试点转正率维持在约 50%，这样 Y2 才能在不把销售成本烧穿的前提下跑到 8-10 个生产项目。
  - checkName: 模型会失效的情况
    finding: 如果销售周期拉向 9 个月，或 ACV 掉到约 $260K， downside 情景下的现金低点会被压到约 $140K，业务还没做大就会先接近见底。
  - checkName: 下一轮融资的证明点
    finding: 当公司以 8-10 个生产项目、一个扩展动作，以及能支撑首个 EBITDA 转正年的伙伴渠道从 Y2 退出时，下一轮融资才真正站得住。
sanityChecks:
  ruleOf40: Y3 增长 253.1% + EBITDA 利润率 13.8% = 266.9%
  burnMultiple: Y1 的净烧钱倍数约为 3.3x，Y2 约为 0.8x；到 Y3，随着已装机基础复利，业务转为正向造血。
  revenuePerFte: Y3 年末 13 名 FTE 对应约 $435K 收入 / FTE（基准带宽 $200–400K SaaS）
  flags:
    - 模型仍然假设 Y3 能新增 21 个生产项目，所以伙伴辅助分发必须按计划生效。
    - 如果早期 Oracle 和 SAP 部署需要更重的定制映射或更服务化的上线，维持 70% 毛利率可能过于乐观。
    - 单位经济模型依赖客户把单项目切换扩到护航或第二次迁移；如果产品只是一次性切换工具，流失会比基准情景高得多。
    - 到 Y2 之前，收入仍集中在少量企业项目上，所以任何一个大 logo 延迟，都会明显撬动短期结果。
