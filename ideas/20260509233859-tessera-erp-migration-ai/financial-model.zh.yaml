scenarios:
  downside:
    description: 采购时间很长,只有少数试点皈依,伙伴推荐不会加快Y3土地费率。
    y3RevenueK: 4100.0
    y3EbitdaK: -320.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
    - 销售周期从6个月到9个月.
    - 每个执行中的方案的混合年收入从300克降至约260克。
    - Y3退出客户数从30个活动程序降至约22个.
    - 毛比值从70%下降到67%,因为在职人员仍然服务繁重。
  base:
    description: 由创始人主导的销售转换了前两名试点,Y2在9个生产方案中退出,合作伙伴协助的扩展将业务带入了30个方案Y3路径.
    y3RevenueK: 5650.0
    y3EbitdaK: 781.0
    cashLowPointK: 774.0
    keyAssumptionChanges:
    - 销售周期为近6个月。
    - 在有选择的伙伴帮助下,试点到生产转换大约保持在50%。
    - 每个实施中方案每年的混合收入持有近300克并有少量扩张收入.
  upside:
    description: 参考文献和伙伴渠道开始在Y2工作,让公司更快地增加程序,同时保持部署可重复.
    y3RevenueK: 6900.0
    y3EbitdaK: 1450.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
    - 销售周期从第一个参考账户后6个月至4至5个月进行压缩.
    - 通过hypercare和二期方案组合,每个活动方案的混合年收入从300克增加到了大约320克。
    - Y3退出客户数从30个活跃程序上升到了大约35个.
sensitivity:
- variable: 兵器
  downsideCase: 每个现行方案每年收入260 000美元
  baseCase: 每个执行中的方案每年3万美元混合收入
  upsideCase: 每个执行中的方案每年收入为320K美元
  y3RevenueImpactK: -750.0
  cashImpactK: -525.0
- variable: 中共
  downsideCase: 120K CAC 每个新的生产方案 因为交易保持创始人和解决方案的重心
  baseCase: 每个新生产方案90 000克CAC
  upsideCase: 从合作伙伴的杠杆作用和更有力的参考,每个新生产方案7 500克CAC
  y3RevenueImpactK: 0.0
  cashImpactK: -900.0
- variable: 摇摆
  downsideCase: 完成的迁移不会扩展为hypercare或第二程序时, 每月有3.5% 的程序churn
  baseCase: 每月2.5%的节目
  upsideCase: 一旦多程序扩展得到证明,每月1.5%的程序churn
  y3RevenueImpactK: -350.0
  cashImpactK: -245.0
- variable: 销售周期
  downsideCase: 9个月,因为SI抵制和采购审查拖累
  baseCase: 6个月
  upsideCase: 在一个强有力的参考账户和伙伴转介后4至5个月
  y3RevenueImpactK: -1150.0
  cashImpactK: -850.0
- variable: 毛额差值
  downsideCase: 更重的入职和支助工作总差值为65%
  baseCase: 70%毛额差值
  upsideCase: 模板包和控件后72%的毛差值可重复
  y3RevenueImpactK: 0.0
  cashImpactK: -280.0
- variable: 征聘速度
  downsideCase: 在漏斗被证实之前,先将第二个AE和数据/ML的雇用额提前两个季度
  baseCase: 基于里程碑的雇用与客户转换和部署可重复性挂钩
  upsideCase: 将一个商业雇用推迟到15个执行中的程序之后
  y3RevenueImpactK: -100.0
  cashImpactK: -400.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: 流程图 LR 目标账户 -- > 已支付皮洛茨 -- > 活动程序 活动程序 - > 收入 -- > 利润毛额 -- > 现金 现金
modelSanity:
- checkName: 收入引擎
  finding: 基数收入来自从Y1出口的3个支付方案扩大至Y2出口的9个和Y3出口的30个,每个执行中方案每年的混合收入大约为300克。
- checkName: 一定要向右转
  finding: 公司必须在大约四个星期内交付第一价值,并使试点转换率保持在50%左右,这样Y2就可以达到8-10生产程序而不会超规模的销售燃烧.
- checkName: 模式中断,如果
  finding: 如果销售周期持续到9个月,或ACV滑至260K,则下行现金压缩到约140K美元后,企业才能达到规模。
- checkName: 下一轮证明
  finding: 一旦公司以8-10个生产方案、一个扩张运动以及能够支持第一个EBITDA阳性年的伙伴渠道退出Y2,下一次融资就是合理的。
sanityChecks:
  ruleOf40: Y3增长 253.1% + EBITDA比值 13.8% = 266.9%
  burnMultiple: 净燃烧为Y1的~3.3x和Y2的~0.8x,再将Y3中的活性-生成为已安装的基化合物.
  revenuePerFte: 435K Y3,13年终FTE(基准200-400K SaaS)
  flags:
  - 该模型仍然假定有21个新的生产方案在Y3中落地,因此合作伙伴协助的分发必须按计划进行。
  - 如果早期甲骨文和SAP部署需要比计划更多的定制绘图或服务重的上船,那么持有70%的毛差可能证明是乐观的。
  - 单位经济学依赖于每个程序扩展为hypercare或二次迁移,因为纯一接一接一的切换工具会比基案允许的速度快.
  - 通过Y2,收入仍然集中在少数企业方案,因此一个被拖延的标志可以实质性地转移近期的成果。
