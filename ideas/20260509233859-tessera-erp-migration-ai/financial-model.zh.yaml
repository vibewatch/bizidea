slug: erp-cutover-control-tower
date: '2026-05-09'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模拟开始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP日期为2026-05-09] 业务计划日期后第一个完整运营月.'
- id: A2
  name: 收入单位
  value: 积极的ERP迁移方案
  unit: customer definition
  source: '[BP business Model.unit.OfValue] 收入在准备状态管理下的每个现行移民方案均货币化.'
- id: A3
  name: 基本生产订货价格
  value: '275'
  unit: USDK per program-year
  source: '[BP投资者Memo.firstCustomer. First Contact + Research. BottinUpSizingDrivers] 研究范围内的全出产定价地由每年250k-$300k的ACV波段.'
- id: A4
  name: 每个执行中的方案的混合年收入
  value: '300'
  unit: USDK per program-year
  source: '[BP business Model.revenue Streams + BP gtm.pricening + BP gtm.funnelTargets] 模型从付费的试点,上岗,以及早期的hypercare或二程序扩展中,在基础订阅之上增加了适度的提升.'
- id: A5
  name: 客户坡道
  value: 3个付费程序通过Y1出站,9个通过Y2出站,30个通过Y3出站
  unit: active programs
  source: '[BP里程碑+研究.market.som] Base 匹配了第1年,第8-10个生产方案的2个生产转换,12-24个月前,研究了30个方案年份-3 SOM路径.'
- id: A6
  name: 合格驾驶漏斗
  value: 每个季度15-20个目标账户,25%合格的试点,50%的试点转产,在12个月内扩大60%
  unit: funnel rates
  source: '[BP gtm.funnelTargets] 基础客户添加被固定在声明的由创始人主导的企业漏斗和扩展目标上.'
- id: A7
  name: 平均销售周期
  value: '6'
  unit: months
  source: '[BP投资者Memo.nextDiligency + BP风险+研究.openQuestions]企业PMO采购和SI摩擦意味着大约6个月的基础销售周期.'
- id: A8
  name: 总比值目标
  value: '70'
  unit: percent
  source: '[BP business Model.goalGross MarginPct] 软件引导业务的稳态目标总比值.'
- id: A9
  name: COGS比率
  value: '30'
  unit: percent of revenue
  source: '[BP business Model.gross MarginPct] COGS被设定为30%,所以毛比值等于70%的目标.'
- id: A10
  name: 每月节目
  value: '2.5'
  unit: percent
  source: 创业-融资heuristic用于每个方案企业软件,一些迁移在切换后结束,部分被hypercare和二方案扩展所抵消.
- id: A11
  name: 开办种子筹款现金
  value: '3000'
  unit: USDK
  source: '[BP funding Rang-Usd] 模型使用所述300-500万美元种子范围的低端。'
- id: A12
  name: 已装入薪金基数
  value: '20'
  unit: percent benefits and payroll tax
  source: 启动融资heuristic；人头计算成本的模型是满载的,而不是仅作为基薪.
- id: A13
  name: 已装入现金补偿基准
  value: 创始人CEO 216克,创始人eng 210克,域名产品/解决方案领先186克,解决方案工程师162克,企业AE 198克,治理工程师204克,客户成功/实施领先150克,高级产品工程师186克,合作伙伴经理168克,数据/ML工程师198克,财务/业务经理132克
  unit: annual USDK
  source: 一个精干的美国种子阶段企业软件团队的启动-融资heuristic 在没有大科技现金水平的情况下向大账户出售。
- id: A14
  name: 雇用坡道
  value: 创始人CEO,创始人eng和域产品/解决方案在起步时领先；解决方案工程师在Q2Y1；AE在Q3Y1；治理工程师在Q4Y1；客户成功,产品工程,合作伙伴,通过Y2实现第二AE；数据/ML,第二解决方案工程师,通过Y3实现财务/操作
  unit: headcount plan
  source: '[BP团队+BP里程碑+BP业务] 聘用基于里程碑,并被推迟,直到部署和GTM证明点出现.'
- id: A15
  name: 非薪给业务支出坡道
  value: Q1Y1每月约20克,到Q4Y3每月约88克.
  unit: USDK per month
  source: '[BP业务+BP fundingAsk.useOf Funds简 涵盖云工具,出行,法律,安全审查,会计,以及合作伙伴发展,而无需承担沉重的付费营销燃烧.'
- id: A16
  name: 现金转换政策
  value: 业务现金流量
  unit: policy
  source: 启动融资高压；没有债务、上限、税收或物质周转周转的模型。
- id: A17
  name: 筹资里程碑
  value: Y2退出8-10个生产方案,至少一个扩展销售,2-3个生产伙伴渠道,并有足够的缓冲力将商业雇用维持到第一个EBITDA阳性年份
  unit: milestone
  source: '[BP里程碑 12-24个月+BP fundsAsk.useOfFunds Summary] 用于大小当前种子回合和6个月的缓冲.'
