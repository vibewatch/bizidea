slug: erp-cutover-control-tower
date: '2026-05-09'
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-06
    unit: YYYY-MM
    source: '[BP date 2026-05-09] 取商业计划日期后的第一个完整经营月份。'
  - id: A2
    name: 收入计量单位
    value: 活跃 ERP 迁移项目
    unit: 客户定义
    source: '[BP businessModel.unitOfValue] 收入按处在就绪度管理之下的活跃迁移项目来计。'
  - id: A3
    name: 基础生产订阅价格
    value: '275'
    unit: USDK per program-year
    source: '[BP investorMemo.firstCustomer.initialContract + research.bottomUpSizingDrivers] 正式生产定价落在研究给出的 $250k-$300k 年 ACV 区间内。'
  - id: A4
    name: 每个活跃项目的混合年收入
    value: '300'
    unit: USDK per program-year
    source: '[BP businessModel.revenueStreams + BP gtm.pricing + BP gtm.funnelTargets] 在基础订阅价之上，模型额外加入少量付费试点、上线服务和早期护航 / 第二项目扩展带来的提升。'
  - id: A5
    name: 客户爬坡
    value: 3 paying programs by Y1 exit, 9 by Y2 exit, and 30 by Y3 exit
    unit: active programs
    source: '[BP milestones + research.market.som] 基准情景对齐第 1 年 2 个转正、第 2 年末 8-10 个生产项目，以及研究里的第 3 年 30 个项目 SOM 路径。'
  - id: A6
    name: 合格试点漏斗
    value: 15-20 target accounts per quarter, 25% qualified pilots, 50% pilot-to-production conversion, and 60% expansion within 12 months
    unit: funnel rates
    source: '[BP gtm.funnelTargets] 新增客户节奏锚定在商业计划里那套由创始人主导的企业销售漏斗与扩展目标上。'
  - id: A7
    name: 平均销售周期
    value: '6'
    unit: months
    source: '[BP investorMemo.nextDiligence + BP risks + research.openQuestions] 企业 PMO 采购加上 SI 摩擦，支撑约 6 个月的基准销售周期。'
  - id: A8
    name: 目标毛利率
    value: '70'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct] 软件主导业务在稳态下的目标毛利率。'
  - id: A9
    name: COGS 比例
    value: '30'
    unit: percent of revenue
    source: '[BP businessModel.targetGrossMarginPct] COGS 取 30%，使毛利率对齐到 70% 目标。'
  - id: A10
    name: 月度项目流失率
    value: '2.5'
    unit: percent
    source: 面向企业项目型软件的创业财务经验值；部分迁移会在切换后结束，但会被护航和第二项目扩展部分抵消。
  - id: A11
    name: 种子轮带来的期初现金
    value: '3000'
    unit: USDK
    source: '[BP fundingAsk.targetFundingRangeUsd] 模型取已披露 $3M-$5M 种子轮区间的下限。'
  - id: A12
    name: 全成本薪酬附加系数
    value: '20'
    unit: percent benefits and payroll tax
    source: 创业财务经验值；人力成本按全成本口径建模，而不是只算基本工资。
  - id: A13
    name: 全成本现金薪酬基准
    value: 创始人 / CEO $216k，创始工程负责人 $210k，领域产品 / 解决方案负责人 $186k，解决方案工程师 $162k，企业客户 AE $198k，治理 / 平台工程师 $204k，客户成功 / 实施负责人 $150k，高级产品工程师 $186k，伙伴 / 渠道经理 $168k，数据 / ML 工程师 $198k，财务 / 运营经理 $132k
    unit: annual USDK
    source: 面向美国种子阶段、销售大客户的精干企业软件团队所采用的创业财务经验值，不按大厂现金水平计。
  - id: A14
    name: 招聘节奏
    value: 创始人 / CEO、创始工程负责人和领域产品 / 解决方案负责人从 Day 1 配齐；Y1 Q2 招解决方案工程师；Y1 Q3 招 AE；Y1 Q4 招治理工程师；Y2 逐步加入客户成功、产品工程、伙伴经理和第二名 AE；Y3 再补数据 / ML、第二名解决方案工程师和财务 / 运营。
    unit: headcount plan
    source: '[BP team + BP milestones + BP operations] 招聘按里程碑推进，只有在部署与 GTM 证据出现后才继续扩编。'
  - id: A15
    name: 非人力运营开支爬坡
    value: About $20k per month in Q1Y1 rising to about $88k per month in Q4Y3
    unit: USDK per month
    source: '[BP operations + BP fundingAsk.useOfFundsSummary] 覆盖云资源、差旅、法务、安全审查、会计和伙伴拓展，但不假设大规模付费营销烧钱。'
  - id: A16
    name: 现金转换口径
    value: EBITDA approximates operating cash flow
    unit: policy
    source: 创业财务经验值；模型不计债务、资本开支、税项或显著营运资金波动。
  - id: A17
    name: 本轮融资要达成的里程碑
    value: Exit Y2 with 8-10 production programs, at least one expansion sale, 2-3 productive partner channels, and enough buffer to hold commercial hiring into the first EBITDA-positive year
    unit: milestone
    source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary] 用它来反推本轮种子融资规模和 6 个月缓冲垫。'
