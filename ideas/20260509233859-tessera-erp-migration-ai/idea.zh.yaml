    score: 5
    rationale: ERP 转型本身就是巨额支出品类，而控制层还可以顺势扩到周边企业现代化项目。
topRisks:
  - name: 服务渠道冲突
    description: 系统集成商可能会抵触这类产品，因为它会压缩可计费的协同人力，或者更早暴露排期滑坡。
    mitigation: 直接卖给 CIO 和财务转型办公室，把产品定位成独立控制层，同时提供可白标的工作流，帮助愿意合作的 SI 更快交付。
  - name: 集成准确性
    description: 在高度定制的旧 ERP 环境里，自动依赖映射在最难的客户上可能不够可靠。
    mitigation: 先从 SAP ECC 和 Oracle EBS 的财务迁移场景切入，要求范围明确的发现输入，在置信度被验证前始终由人工审批生成方案。
  - name: 结果责任归属
    description: 即便根因在 SI 或业务团队，客户也可能把延期上线或生产事故归咎于平台。
    mitigation: 把产品定义成记录就绪状态的可审计系统，而不是执行结果的担保方；合同上承诺的是建议支持，不是结果保证；试点则绑定可量化的风险发现指标。
