problem: >-
  ERP 迁移真正失败的原因，往往不是实施预算不够，而是财务、运营、IT 和外部集成商之间那几千个依赖关系太难协同。今天很多 PMO 还是靠电子表格、状态汇报 deck 和由顾问维护的工作条线来盯切换就绪度，结果风险总是暴露得太晚。一旦测试延期，或者漏掉某个定制项，公司就可能错过季末关账、扰乱工厂运营，还得多花数百万美元去补意料之外的服务成本。
targetUser:
  primary: 正在把 SAP ECC 或 Oracle E-Business Suite 迁到云 ERP 的中型制造商和分销商里的 ERP 转型 PMO 负责人
  secondary: 负责协调测试、数据迁移和切换工作条线的财务职能负责人，以及 SI 项目经理
  buyer: CIO 或财务转型副总裁
startupThesis:
  nonObviousInsight: >-
    ERP 现代化真正卡住的，不是代码转换，而是项目执行这套操作系统。现在的 LLM 已经足够擅长阅读配置文档、工单、测试证据和会议纪要，能够维护一张实时依赖图；与此同时，ERP 工具也已经暴露出足够多的结构化状态，让迁移协同这件事可以从表格苦工变成软件。
  beachhead: >-
    年收入 $500M-$3B 的制造商里，由财务主导的 SAP ECC 和 Oracle E-Business Suite 迁移项目；它们在未来 12 个月内已经有一个获董事会批准的云 ERP 上线节点，而且项目里至少已经有一家外部 SI 参与。
  wedge: >-
    一个 AI 迁移指挥中枢，接入配置导出、测试脚本、Jira 工单、研讨会笔记和切换计划，自动生成依赖关系图、就绪度评分、阻塞预警，以及每条工作流每天的下一步最优动作。
  whyNowCatalyst: >-
    Tessera 拿到 $60M 融资，并宣称能把 ERP 迁移做成“按周计算、成本减半”，这说明买方已经开始相信，软件可以替代这类企业 IT 大预算里相当大一块原本靠人工协同完成的工作。
  ventureScalePath: >-
    先从 ERP 替换里的切换和就绪度编排切入，再扩到数据转换保障、上线后护航，最后把控制平面延展到 CRM、HRIS 以及并购后系统整合等其他转型项目。
solution: >-
  这款产品盯的是 ERP 迁移最后 6-18 个月。它接入项目计划、工单系统、测试工具和 ERP 配置导出，然后围绕定制项、报表、集成、数据对象和业务负责人，搭出一张持续更新的依赖图。项目负责人不用再等每周一次的 PMO 会议，系统会直接告诉他们哪些工作条线真在关键路径上、哪些就绪证据还缺、下一批切换任务该怎么排。系统也会起草测试用例、会议摘要、风险日志和切换操作手册，但所有有实质影响的改动仍然由人工审批。时间一长，它还能按 ERP 版本、行业流程和 SI 方法论学习失败模式，把迁移执行从一次性的项目管理，变成可复制的软件层。
goToMarketSeed:
  firstCustomer: >-
    一家年收入 $500M-$3B 的工业制造商，正在替换 SAP ECC 或 Oracle EBS，拥有超过 50 个定制财务或工厂流程，且上线时间落在未来四个季度之内。
  buyingTrigger: >-
    当指导委员会锁定上线日期，或者发现测试与数据迁移已经滑坡，开始威胁季末关账、工厂运营或 SI 预算超支时。
  currentAlternative: >-
    由四大或区域型系统集成商（SI）主导的 PMO，用 Excel、Smartsheet、Jira、PowerPoint 和手工状态会议来管理迁移。
  switchingReason: >-
    这个切口能给项目负责人每天的依赖可视性、自动化的就绪证据和更早的风险发现，而且不用再往项目里加一层按人天计费的顾问人头。
  pricingHypothesis: >-
    按单个迁移项目收取年度平台费，再按活跃工作流或流程对象分层计费；对一次企业级上线来说，价格大概率会落在 $150k-$500k 区间。
