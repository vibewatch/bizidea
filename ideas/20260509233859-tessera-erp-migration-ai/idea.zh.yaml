jobsToBeDone:
- job: 当董事会批准的ERP启用日期临近时,帮助转型PMO看到真正的依赖性和准备状态风险,从而能够防止最后一分钟的中断。
  currentAlternative: 电子表格和社会主义国际报告的每周PMO状况审查
  successMetric: 减少被阻断的临界路径项目和及时启用的信心
- job: 当财务和业务团队在迁移期间不断改变要求时,帮助功能引导将这些变化转换为更新测试,所有者,并切换任务,从而可以避免昂贵的再工作.
  currentAlternative: 人工检票和顾问创建的跑页
  successMetric: 从更改请求更快地完成测试和切换更新
