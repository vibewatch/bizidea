topRisks:
- name: 服务渠道冲突
  description: 系统集成商可能抵制减少可计费协调劳动力的产品,或暴露出进度延误.
  mitigation: 出售给CIO和财务转型办公室作为独立的控制层,并提供白标签的工作流程来帮助合作SI更快地交付.
- name: 集成准确性
  description: 高度定制化的遗留ERP系统可能使最困难账户的依赖性自动绘图不可靠。
  mitigation: 从SAP ECC和Oracle EBS融资迁移开始,需要范围化的发现投入,并让人类批准生成的计划,直到信心得到证实.
- name: 结果责任归因
  description: 客户可能因为错过了上线或生产问题而责备平台,即使根本原因与SI或商业团队有关。
  mitigation: 将产品定义为可审计的准备状态记录系统,围绕建议支助而不是执行保证订立合同,并将试点与可衡量的风险探测指标挂钩。
