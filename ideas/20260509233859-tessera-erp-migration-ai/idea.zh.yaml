jobsToBeDone:
  - job: >-
      当董事会批准的 ERP 上线日期越来越近时，帮转型 PMO 看清真实的依赖和就绪风险，这样他们才能避免最后一刻的切换事故。
    currentAlternative: 每周靠电子表格和 SI 报告做 PMO 状态复盘
    successMetric: 关键路径阻塞项减少，上线按时完成的信心提高
  - job: >-
      当财务和运营团队在迁移过程中不断改需求时，帮职能负责人把这些变化迅速转成更新后的测试、责任人和切换任务，这样他们才能少走昂贵回头路。
    currentAlternative: 人工分拣工单，加上顾问手写的操作手册
    successMetric: 从变更请求到测试验证和切换更新的周转时间更短
