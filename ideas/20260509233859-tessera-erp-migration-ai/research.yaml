  - case: Buyers decide native vendor AI is sufficient
    impact: The startup loses unless it proves value in heterogeneous toolchains and in the messy final mile where vendor-native modules do not span SI documents, Jira, Smartsheet, and non-core systems.
    sourceRefs:
    - 14
    - 15
    - 22
  validationPlan:
  - priority: high
    question: Will PMO leaders pay for a neutral command layer, or do they expect SIs to absorb coordination inside services fees?
    evidenceToGather: Interview 10 active SAP/Oracle program sponsors and compare explicit PMO line items versus unpriced SI coordination work.
  - priority: high
    question: Which artifact combinations best predict cutover failure—tests, integrations, data loads, or ownership gaps?
    evidenceToGather: Collect anonymized status logs and issue registers from 3-5 live programs and backtest which signals predict go-live slips.
  - priority: medium
    question: Can a design-partner pilot integrate fast enough to matter before the next steering committee?
    evidenceToGather: Prototype on one workstream using Jira, spreadsheet cutover plans, and test evidence to measure time-to-first-readiness-score.
