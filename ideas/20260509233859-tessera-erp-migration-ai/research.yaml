    - 25
  - point: Manufacturing and distribution are attractive first verticals because they combine process variance, downtime sensitivity, and large integration surfaces.
    sourceRefs:
    - 15
    - 28
  sensitivityCases:
  - case: SAP meaningfully extends the practical migration runway again
    impact: Urgency softens, which lengthens sales cycles and shifts the wedge from deadline compression toward SI cost control and auditability.
    sourceRefs:
    - 10
    - 12
  - case: Testing or data vendors expand into orchestration
    impact: Differentiation shifts from connector breadth to readiness scoring quality, war-room workflows, and cross-workstream recommendations.
