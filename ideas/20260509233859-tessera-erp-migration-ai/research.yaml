competitors:
- name: Panaya
  stage: scale-up
  wedge: SAP-focused migration guidance, testing, and change intelligence
  pricing: Custom quote
  strength: Strong SAP migration orientation and a clear narrative around reducing risk in S/4HANA programs
  weaknessVsUs: Still centers more on testing/change and migration guidance than on a cross-workstream PMO control tower
  sourceRefs:
  - 18
  - 30
- name: Tricentis
  stage: incumbent
  wedge: Broad enterprise automated testing with strong SAP coverage
  pricing: Request pricing
  strength: Large installed base, strong automation depth, and enterprise procurement familiarity
  weaknessVsUs: Testing automation does not by itself unify dependency management, cutover sequencing, and daily SI execution visibility
  sourceRefs:
  - 17
  - 18
- name: Syniti
  stage: incumbent
  wedge: Migration data quality, governance, and business-ready data
  pricing: Custom quote
  strength: Credibility in the hardest data workstream and established SAP ecosystem relationships
  weaknessVsUs: Owns data readiness more than cross-workstream orchestration, daily blocker routing, or cutover command
  sourceRefs:
  - 19
  - 13
- name: Celonis
  stage: late-stage
  wedge: Process mining and IT modernization intelligence for ERP transformations
  pricing: Custom quote
  strength: Strong process-discovery engine and executive transformation narrative
  weaknessVsUs: Closer to digital-twin and observability than to live cutover execution control
  sourceRefs:
  - 20
