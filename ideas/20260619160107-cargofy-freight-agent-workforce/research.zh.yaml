    - 24
    - 25
  - point: 通过保理关联工作流积累的经纪商回款速度和争议数据，最终能沉淀成有价值的风险与优先级层。
    sourceRefs:
    - 20
    - 21
    - 22
    - 23
  geographicConsiderations:
  - point: 美国是最强的首发市场，因为 FMCSA 规则、成熟的 load board 和密集的保理生态，已经把要自动化的工作流定义清楚了。
    sourceRefs:
    - 5
