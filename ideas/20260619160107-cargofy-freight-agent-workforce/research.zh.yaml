competitors:
- name: Cargofy
  stage: 扩张期
  wedge: 面向货运调度、后台和重单证运营的 AI 劳动力
  pricing: 定制 / 未公开披露
  strength: 已有真实 traction、集成广，自动化故事也讲得通。
  weaknessVsUs: 它的产品是给现有运营团队加杠杆，而不是在移动端替单车司机做自调度。
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
- name: DAT One
  stage: 现有厂商
  wedge: 货源板、运价可视化和自调度工具
  pricing: $54-$329 / 月的公开货源板档位
  strength: 货源流动性深、市场运价数据强、车主司机认知高。
  weaknessVsUs: 做到货源发现就停住了，没有默认把单证自动化、HOS 感知工作流和发票/保理执行做完。
  sourceRefs:
  - 9
  - 10
  - 11
- name: TruckingOffice
  stage: 现有厂商
  wedge: 面向小车队的低价 TMS 与调度台账
  pricing: $25-$90 / 月的公开核心档位
  strength: 价格友好，而且明显是为小承运商做的。
  weaknessVsUs: 更偏数据录入和后台导向，不够自治，也不是移动优先。
  sourceRefs:
  - 13
- name: Truckbase
  stage: 扩张期
  wedge: 面向小承运商的现代化 TMS，覆盖调度与开票
  pricing: $290 / 月起
  strength: 体验更清爽，也把调度和开票放在同一条工作流里。
  weaknessVsUs: 仍默认有调度员或办公室用户，而且起步价比很多单车车主司机能接受的水平更高。
  sourceRefs:
  - 14
  - 15
- name: Motive
  stage: 现有厂商
  wedge: 绑定 ELD、远程信息和合规的车队调度工作流
  pricing: 定制报价 / 联系销售
  strength: 合规、遥测和运营工作流深度都很强。
  weaknessVsUs: 最适合有运营团队的车队；它不负责发起货源，也不能完整替掉自调度。
  sourceRefs:
  - 16
  - 17
regulatoryTechnicalConstraints:
- point: 任何基于 HOS 的推荐引擎，都必须把 ELD 和工时规则解释对；否则合规风险最终还是会回到承运商身上。
  sourceRefs:
  - 24
  - 25
- point: 手持手机限制意味着，车辆行驶时的驾驶舱交互必须以语音为主，或延后处理。
  sourceRefs:
  - 26
- point: 经纪商透明度和货运欺诈改革，可能改变承运商对经纪关系中可见数据的预期。
  sourceRefs:
  - 23
- point: 如果 POD 或 BOL 质量差，即便发票已经提交给保理方，回款仍可能被拖延甚至卡死。
  sourceRefs:
  - 21
  - 22
  - 27
validationSignals:
- point: Cargofy 报告自己做到 $10M ARR 和 2,000 家付费客户，验证了市场愿意为货运运营 AI 付费。
  sourceRefs:
  - 1
  - 2
  - 3
- point: DAT 公开销售面向车主司机的 load board 订阅，证明自调度工具本来就有持续支出。
  sourceRefs:
  - 9
  - 11
- point: 小车队 TMS 供应商已经能在每月 $25-$290+ 的价位上，把调度和开票工作流变现。
  sourceRefs:
  - 13
  - 14
  - 15
- point: 保理方仍在解决 24 小时现金流需求和 30–90 天回款延迟，说明开票和支付这个切口是真痛点。
  sourceRefs:
  - 20
  - 21
  - 22
- point: 独立货运报道显示，AI 已经在生产环境中自动化卡车运输单证和沟通。
  sourceRefs:
  - 27
openQuestions:
- 一家创业公司在真正做出规模、或拿到正式市场协议之前，到底能拿下多少直接的 load board 接入？
- 经纪商和车主司机会信任 AI 谈价或接单吗，还是说产品会比预期更长时间停留在辅助层？
- 有多少比例的单车车主司机会足够频繁地使用保理，以至于自动提交发票会变成任务关键能力？
- 语音优先、低干扰的界面，能否在真实运营里同时满足可用性和 FMCSA 风险约束？
