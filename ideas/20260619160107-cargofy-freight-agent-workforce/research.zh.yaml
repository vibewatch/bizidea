    - 9
    - 20
    - 24
  - point: 国际扩张当然存在，但跨境合规和本地流程差异都说明，第一刀还是应当先扎在美国。
    sourceRefs:
    - 2
    - 3
    - 4
  sensitivityCases:
  - case: Load-board or API lockout
    impact: 如果核心货源发现伙伴限制自动化或抬高接入成本，产品就会从“完整替代调度员”收缩成一层助手。
    sourceRefs:
    - 9
    - 10
    - 11
  - case: Compliance-safe UX proves harder than expected
    impact: 如果驾驶舱实时交互必须被严格约束，产品使用场景就会更偏向出车前、收车后和休息时段，而不是全天候自治。
    sourceRefs:
    - 24
    - 25
    - 26
  - case: Freight cycle stays weak
    impact: 如果弱运价环境拖得更久，即便省行政时间的 ROI 真实存在，新的 SaaS 采购也会变慢。
    sourceRefs:
    - 8
    - 28
    - 32
  validationPlan:
  - priority: high
    question: 车主司机会允许 AI 推荐甚至接受货单，还是会坚持每次订载都要人工确认？
    evidenceToGather: 收集 20–30 名车主司机的试点日志，观察接受率、覆盖率和信任阈值。
  - priority: high
    question: 没有正式的 load board 或遥测伙伴关系，实际能做成多大程度的自动化？
    evidenceToGather: 拿到至少 1 个 load board 数据伙伴和 1 个 ELD 伙伴签署的技术试点范围，并测异常率。
  - priority: medium
    question: 在滩头细分里，保理到底是任务关键，还是只是“有更好、没有也行”？
    evidenceToGather: 做 cohort 访谈，并按单车车主司机与 2–5 辆车车队切分发票提交流数据。
  - priority: medium
    question: 语音优先、低干扰的界面，能否在真实运营里同时满足可用性和 FMCSA 风险约束？
    evidenceToGather: 做结构化随车观察或模拟器测试，测完成时间、错误率和在路打断风险。
