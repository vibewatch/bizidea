jobsToBeDone:
  - job: When I accept a load, help me generate and submit a compliant BOL within two minutes so that brokers cannot reject my pickup and delay my delivery schedule.
    currentAlternative: Manually filling out a PDF BOL template and emailing it to the broker
    successMetric: BOL submitted within two minutes of load acceptance with zero broker rejections per month
  - job: When I finish a delivery, help me capture the POD and get the invoice submitted to my factoring company automatically so that I am paid within 24 hours.
    currentAlternative: Photographing a paper POD, emailing it to the factoring company, and waiting two to five business days
    successMetric: Invoice auto-submitted within five minutes of delivery confirmation and payment received in under 24 hours
  - job: When I am running low on available HOS hours mid-route, help me retime my load so that I avoid FMCSA violations and broker chargebacks for late delivery.
    currentAlternative: Manual HOS log review and a phone call to the broker to negotiate a revised delivery window
    successMetric: Zero HOS violations per month and zero broker chargebacks attributable to compliance errors
ideaScorecard:
  signalStrength:
    score: 5
    rationale: Three corroborated in-window sources on Cargofy's Series A with verified ARR, customer count, and dispatcher-leverage metrics provide maximum signal confidence for the freight operations AI space.
  painIntensity:
    score: 5
    rationale: Owner-operators lose three to four hours daily to non-driving operations work — a direct, measurable income loss that creates immediate and repeatable willingness to pay for relief.
  wedgeClarity:
    score: 4
    rationale: The load-to-payment automation cycle for owner-operators is a crisp and auditable wedge, though success depends on securing load board API access and ELD integrations, which carry negotiation risk.
  defensibility:
    score: 3
    rationale: Short-term defensibility depends on execution speed and integration depth; longer-term moats come from lane and compliance behavioral data and embedded factoring network effects, which require 18 to 24 months to accumulate.
  ventureScale:
    score: 4
    rationale: "350,000-plus US owner-operators at $200–$300 per truck per month represents an $840M–$1.26B domestic ARR ceiling before international expansion, embedded factoring, or insurance upsell."
topRisks:
  - name: Load board API access
    description: DAT and Truckstop could restrict programmatic API access, raise pricing significantly, or build competing AI dispatch features that neutralize the core integration advantage.
    mitigation: Negotiate formal API partner agreements with revenue-share terms early in the company's life and build direct carrier load-matching as a fallback channel to reduce dependency on any single load board.
  - name: FMCSA liability exposure
    description: If an AI-generated BOL, POD, or HOS recommendation contains an error that results in a regulatory violation, the company could face enforcement risk, carrier lawsuits, or reputational damage that blocks broker partnerships.
    mitigation: Position the product explicitly as decision-support requiring one-tap owner-operator confirmation for every compliance document, and carry professional liability insurance from day one.
  - name: Owner-operator tech adoption friction
    description: The owner-operator demographic skews toward older, non-technical drivers who are skeptical of subscription software and may prefer the manual workflows and load board apps they already know.
    mitigation: Design a voice-first onboarding flow that requires zero form-filling, and distribute through freight factoring companies and owner-operator associations that already hold trusted incumbent relationships with the target customer.
