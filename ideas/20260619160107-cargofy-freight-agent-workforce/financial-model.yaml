assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-19] model starts the month after the business plan date.'
- id: A2
  name: Opening cash at M1
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + model sizing] uses a mid-range pre-seed raise sized to reach the 12-24 month milestone plus roughly six months of buffer.'
- id: A3
  name: Starting paid trucks (M1)
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones] the company begins pre-revenue and must first convert the pilot into paid subscriptions.'
- id: A4
  name: Active customer definition
  value: One paying truck on a monthly software subscription
  unit: definition
  source: '[BP businessModel.unitOfValue] customersEop tracks active subscribed trucks rather than carrier logos.'
- id: A5
  name: Blended monthly ARPU ramp
  value: Y1 $229, Y2 $249, Y3 $279 per truck per month
  unit: USD/truck/month
  source: '[BP gtm.pricing $199-$299 + BP businessModel.expansionLevers + Research bottomUpSizingDrivers ARPU benchmark $249] Y1 reflects pilot-heavy discounts, Y2 lands on the market benchmark, and Y3 assumes modest mix-up into multi-truck and payments-attached cohorts while staying inside the stated price band.'
- id: A6
  name: Gross paid-truck adds cadence
  value: Y1 monthly adds 0,0,0,1,1,2,2,2,3,3,4,4; Y2 quarterly adds 30,60,105,150; Y3 quarterly adds 255,345,485,660
  unit: trucks
  source: '[BP milestones + BP gtm.channels + BP sequencingRationale] base case clears the 15 paid-truck year-1 proof point, lands inside the 250-500 subscribed-truck year-2 target, and stays below the illustrative 5,000-truck SOM to avoid a vanity year-3 ramp.'
- id: A7
  name: Monthly paid-truck churn
  value: 2.5%
  unit: pct/month
  source: '[startup-finance heuristic + BP risks + BP investorMemo.mustBeTrue retention emphasis] uses conservative SMB-style retention until the workflow proves habitual.'
- id: A8
  name: Gross margin ramp
  value: 50% M1-M6, 58% M7-M12, 68% Y2, 75% Y3
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct 75 + BP operations + Research regulatoryTechnicalConstraints] launch starts onboarding- and exception-heavy, then reaches the stated software target after integrations and document QA become repeatable.'
- id: A9
  name: Founder / CEO loaded compensation
  value: $180K
  unit: USD/year
  source: '[BP team founder-led sales and partnerships + startup-finance heuristic] modest founder cash pay plus payroll load.'
- id: A10
  name: Engineering loaded compensation
  value: $185K
  unit: USD/year/FTE
  source: '[BP team founding eng + full-stack mobile engineer + startup-finance heuristic] senior product and integration talent at seed-stage cash compensation.'
- id: A11
  name: Sales / partnerships loaded compensation
  value: $170K
  unit: USD/year/FTE
  source: '[BP team founder-led sales and partnerships + BP gtm.channels + startup-finance heuristic] covers partner-development and later GTM carrying cost.'
- id: A12
  name: Ops / compliance loaded compensation
  value: $145K
  unit: USD/year/FTE
  source: '[BP team operations and compliance lead + startup-finance heuristic] domain-heavy operations hire with benefits and payroll tax load.'
- id: A13
  name: Customer success loaded compensation
  value: $120K
  unit: USD/year/FTE
  source: '[BP team customer success and onboarding lead + startup-finance heuristic] phone-first onboarding and retention support role.'
- id: A14
  name: G&A loaded compensation
  value: $110K
  unit: USD/year/FTE
  source: '[startup-finance heuristic] lean finance/admin support added only after partner-led volume begins to scale.'
- id: A15
  name: Hiring timeline
  value: M1 founder + founding engineer; M4 mobile engineer; M7 ops/compliance lead; M10 customer success; M13 partnerships lead; M16 engineer; M19 second GTM hire; M22 second customer success; M25 integrations engineer; M28 second ops/compliance hire; M31 finance/admin; M34 data/AI engineer
  unit: timeline
  source: '[BP team + BP sequencingRationale] follows the product-first then partner-scale hiring order in the business plan, with later hires extending the same pattern.'
- id: A16
  name: Non-payroll sales and marketing spend
  value: $4K/mo M1-6, $6K/mo M7-12, $10K/mo M13-18, $15K/mo M19-24, $22K/mo M25-30, $28K/mo M31-36
  unit: USD/month
  source: '[BP gtm.channels + startup-finance heuristic] assumes partner enablement, referral programs, owner-operator communities, and light field travel rather than heavy paid demand generation.'
- id: A17
  name: Non-payroll R&D spend
  value: $8K/mo M1-6, $10K/mo M7-12, $14K/mo M13-24, $18K/mo M25-36
  unit: USD/month
  source: '[BP product + BP operations + startup-finance heuristic] covers cloud, AI tooling, document-processing vendors, and integration reliability.'
- id: A18
  name: Non-payroll G&A spend
  value: $6K/mo Y1, $8K/mo Y2, $10K/mo Y3
  unit: USD/month
  source: '[BP operations + Research regulatoryTechnicalConstraints + startup-finance heuristic] covers legal, insurance, accounting, and compliance overhead.'
- id: A19
  name: Payroll allocation to P&L lines
  value: Founder 70% S&M / 30% G&A; engineering 100% R&D; sales 100% S&M; ops/compliance 50% R&D / 50% G&A; customer success 70% S&M / 30% G&A; G&A 100% G&A
  unit: allocation
  source: '[BP team rationales + BP operations] maps the planned roles into the operating lines used in the model.'
- id: A20
  name: CAC calculation convention
  value: $0.9K per net new active truck
  unit: USD/truck
  source: '[model calc + BP gtm.funnelTargets partner-led motion] uses Y2-Y3 sales and marketing spend divided by Y2-Y3 net new active trucks, reflecting a partner-heavy acquisition mix.'
- id: A21
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: modeling convention
  source: '[startup-finance heuristic] assumes capex, debt service, taxes, and working-capital swings are immaterial at pre-seed scale.'
- id: A22
  name: Funding ask sizing
  value: $3.0M pre-seed
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP milestones + model cash trough] sized to reach 250-500 subscribed trucks, prove partner CAC, and keep about six months of buffer before the next financing.'
