modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      PartnerLeads --> Trials
      Trials --> PaidTrucks
      PaidTrucks --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by partner-led growth from 20.5 paid trucks at Y1 exit to 330.6 at Y2 exit and 1815.6 at Y3 exit, with ARPU normalizing from pilot pricing to $279 per truck per month.
- checkName: Must go right
  finding: The company must actually secure a repeatable factoring or load-board channel, because the model assumes CAC stays near $0.9K and year-2 truck adds land inside the 250-500 target window.
- checkName: Model breaks if
  finding: If partner conversion slips and churn rises to 3.5%, downside Y3 revenue falls to $1.9M and cash bottoms at -$435.9K before the company reaches scale.
- checkName: Next-round proof
  finding: The next financing is justified by proving 250-500 subscribed trucks, sub-12-month CAC payback, and positive quarterly EBITDA in the back half of year 3.
sanityChecks:
  ruleOf40: Y3 growth 705.2% + EBITDA margin -5.2% = 700.0%
  burnMultiple: Y2 burn multiple ~1.5x on new ARR, improving to ~0.0x in Y3 as Q4 turns cash generative.
  revenuePerFte: $239.1K Y3 revenue per Q4Y3 FTE (benchmark $200-400K SaaS).
  flags:
  - Base case still ends Y3 at 1815.6 trucks, well below the illustrative 5000-truck SOM; the full SOM case belongs in upside, not in the operating plan.
  - Rule-of-40 looks artificially high because the Y2 revenue base is tiny, so it is not a reliable maturity benchmark yet.
  - The model assumes one or two partner channels unlock most Y3 adds; if load-board or factoring distribution stalls, revenue slips quickly.
  - Full-year Y3 EBITDA is still slightly negative, so another round is likely before aggressive upmarket expansion or major fintech build-out.
