jobsToBeDone:
- job: 当我接下一票货时，帮我在 2 分钟内生成并提交合规的 BOL，这样经纪商就不会因为单证问题拒绝提货、打乱交付节奏。
  currentAlternative: 手工填写 PDF 格式的 BOL 模板，再通过邮件发给经纪商
  successMetric: 接货后 2 分钟内提交 BOL，且每月经纪商因单证问题拒绝提货为 0
- job: 当我完成交付后，帮我采集 POD 并自动把发票提交给保理公司，让我能在 24 小时内收到钱。
  currentAlternative: 拍下纸质 POD，邮件发给保理公司，再等 2–5 个工作日
  successMetric: 交付确认后 5 分钟内自动提交发票，且 24 小时内到账
- job: 当我在途中可用 HOS 工时快耗尽时，帮我重排货运节奏，避免 FMCSA 违规和因晚到被经纪商 chargeback。
  currentAlternative: 手工查看 HOS 日志，再打电话给经纪商协商新的交付时间窗
  successMetric: 每月 HOS 违规为 0，且因合规错误产生的经纪商 chargeback 为 0
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 围绕 Cargofy Series A 的 3 个窗口期内来源相互印证，并给出了 ARR、客户数和调度员杠杆等已核实指标，因此在货运运营 AI 赛道上信号强度拉满。
  painIntensity:
    score: 5
    rationale: 车主司机每天有 3–4 小时耗在非驾驶运营工作上——这是可直接量化的收入损失，因此他们对“把时间拿回来”的产品会有立刻且可重复的付费意愿。
  wedgeClarity:
    score: 4
    rationale: 围绕车主司机的“找货到回款”自动化闭环，本身就是一个清晰、可审计的切口；但能否拿下 load board API 和 ELD 集成，仍然带着谈判风险。
  defensibility:
    score: 3
    rationale: 短期护城河主要靠执行速度和集成深度；长期护城河来自线路与合规行为数据，以及嵌入式保理网络效应，但这些至少要 18–24 个月才能积累起来。
  ventureScale:
    score: 4
    rationale: 仅美国 350,000+ 车主司机，按每辆车每月 $200–$300 计，就有 $840M–$1.26B 的国内 ARR 天花板；国际扩张、嵌入式保理和保险加售还没算进去。
topRisks:
- name: 货源板 API 接入
  description: DAT 和 Truckstop 可能限制程序化 API 接入、大幅提价，或者自己做出竞争性的 AI 调度功能，从而抹平核心集成优势。
  mitigation: 要在公司早期就谈下正式的 API 合作协议和分成条款，并同时搭建直连承运商的货源撮合能力，降低对任何单一货源板的依赖。
- name: FMCSA 责任风险
  description: 如果 AI 生成的 BOL、POD 或 HOS 建议出现错误并导致监管违规，公司可能面临执法风险、承运商诉讼，或声誉受损，进而卡住与经纪商的合作。
  mitigation: 产品定位必须明确是决策支持；每份合规相关单证都要求车主司机一键确认，并且从第一天起就配置职业责任保险。
- name: 车主司机的技术采纳摩擦
  description: 车主司机群体年龄偏大、技术接受度偏低，往往对订阅软件保持怀疑，也更习惯已经熟悉的手工流程和 load board 应用。
  mitigation: 把 onboarding 设计成语音优先、零填表流程，并通过货运保理公司和车主司机协会分发，因为这些渠道本来就握有目标客户信任的既有关系。
