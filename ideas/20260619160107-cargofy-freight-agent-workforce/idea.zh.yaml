differentiator: Cargofy 做的是给现有调度员加杠杆，客户是有专门运营团队的车队；而这个产品面对的是从来没有调度员的人，直接把调度岗位本身替掉。移动优先、语音友好的交互是按司机设计的，不是按调度台设计——所有关键动作在驾驶舱里都是一键或一句话。嵌入式保理把按发票抽成的成本改成固定订阅，更贴合车主司机理解运营费用的方式。更关键的是，最早积累下来的货单偏好、线路模式和合规动作数据，会沉淀成个性化护城河；这是面向大承运商、通用型的车队 TMS 很难复制的。
