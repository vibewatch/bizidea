problem: 美国运营 1–5 辆车的车主司机和微型承运商，每天要花 3–4 小时处理调度协调、BOL 与 POD 单证、ELD 合规跟踪和开票，这些时间直接从驾驶和赚钱里被挤走。和大车队不同，他们没有专职调度员，只能把经纪电话、load board 搜索、纸质单据和保理服务硬拼在一起跑业务。这套碎片化流程每年会吃掉他们 $15,000–$25,000 的驾驶时间和保理费用，还会暴露在 FMCSA 合规错误里，轻则罚单，重则被经纪商 chargeback。
targetUser:
  primary: 在美国跑现货或合约线路、运营 1 辆干货箱或冷藏车的车主司机
  secondary: 拥有 2–5 辆车、车主本人兼任调度员的微型承运商
  buyer: 买单的人就是车主司机本人——预算来自运营费用，而不是单独的 IT 科目
startupThesis:
  nonObviousInsight: Cargofy 的 $10M ARR 证明 AI 已能在商业规模上复制调度员判断——但它整个产品前提是客户本来就有调度员可被增强。车主司机则完全相反：按数量算，他们占美国全部 motor carrier 实体的 96%，却一个调度员都没有，痛点更结构化——人在路上开车的同时，还得找货、提单、盯合规、开票。真正的机会不是做调度员倍增器，而是做一整套 AI 运营中台；而这恰恰是 Cargofy 有意没做的市场，因为它需要的是移动优先、语音友好的司机界面，而不是调度台仪表盘。
  beachhead: 目前仍手工在 DAT 或 Truckstop 找货、所有单证靠纸面或邮件处理、回款依赖保理公司的美国干货箱和冷藏车车主司机
  wedge: 一名移动优先的 AI 智能体，把找货到回款整个闭环自动化——在 DAT 和 Truckstop 找货并订载、生成并电子签署 BOL 和 POD、监控 ELD 工时合规，并把发票自动提交给保理公司
  whyNowCatalyst: Cargofy 的融资和 $10M ARR 已经验证两件事同时成立：AI 调度基础设施存在，市场也愿意付费；同一套 LLM 智能体底座和物流工具集成模式，现在可以转向那些被 Cargofy“调度员增强”路径结构性排除在外的车主司机。
  ventureScalePath: 先从美国跑现货的单车车主司机切入，再扩到 2–5 辆车的微型承运商，然后叠加合约线路优化、承运网络撮合、嵌入式货运保险和更低费率的保理产品，持续拿下每辆车每年总收入中的一部分。
solution: 一名移动优先的 AI 运营智能体，直接替车主司机承担全职调度员的工作。它接入 load board（DAT、Truckstop）、ELD 供应商（Motive、Samsara）和货运保理公司，把找货到回款整个流程自动跑完。车主司机每天开工时，智能体会先给出按每英里运价和返程机会排序的预筛货单；司机确认后，智能体完成订载、预填并电子签署 BOL、实时盯住 HOS 合规，并在交付后自动生成发票并提交给保理公司。整个产品运行在智能手机上，不需要桌面、不需要调度员，也不需要后台文员。定价按每辆车每月固定订阅，低于保理费和等价驾驶时间损失的合计成本。
goToMarketSeed:
  firstCustomer: 美国中西部跑干货箱现货线路、拥有 1–2 辆车的车主司机，目前用 DAT 找货，并靠区域性保理公司回款
  buyingTrigger: 经纪商因为 BOL 缺失或不完整拒绝提货，或者一周里有两小时以上驾驶时间被 paperwork 和经纪回电吃掉
  currentAlternative: 手工流程：用 DAT 或 Truckstop 找货，BOL 通过纸质或邮件 PDF 处理，发票由保理公司按发票金额 2%–4% 收费代办
  switchingReason: AI 智能体每天能拿回 3–4 小时非驾驶运营时间，还能把按单收费的保理费换成更低的月订阅费，在不增加调度员 headcount、也不改变现有工具关系的前提下，直接把净收入拉回来。
  pricingHypothesis: 每辆车每月 $199–$299，对比典型保理费用每月 $600–$1,200 加上等价驾驶时间损失；还可以加卖嵌入式保理，费率低于独立保理公司。
