openQuestions:
- How much direct load-board access can a startup secure before it has meaningful scale or a formal marketplace agreement?
- Will brokers and owner-operators trust AI to negotiate or accept loads, or will the product remain assistive for longer than expected?
- What percentage of solo owner-operators use factoring frequently enough for auto-invoice submission to feel mission-critical?
- Can a voice-first, low-distraction interface satisfy both usability and FMCSA risk constraints during live operations?
