  validationPlan:
  - priority: high
    question: Will owner-operators allow AI to recommend or accept loads, or will they insist on human confirmation for every booking?
    evidenceToGather: Pilot logs showing acceptance rates, override frequency, and trust thresholds across 20-30 owner-operators.
  - priority: high
    question: How much practical automation is possible without formal load-board or telematics partnerships?
    evidenceToGather: Signed technical pilot scopes with at least one load-board data partner and one ELD partner, plus exception-rate measurements.
  - priority: medium
    question: How often is factoring truly mission-critical in the beachhead segment versus merely nice to have?
    evidenceToGather: Cohort interviews and invoice-submission data segmented by solo owner-operators and 2-5 truck fleets.
  - priority: medium
    question: Can a voice-first, low-distraction interface satisfy both usability and FMCSA risk constraints in live operations?
    evidenceToGather: Structured ride-alongs or simulator tests measuring completion time, error rate, and on-road interruption risk.
