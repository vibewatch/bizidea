scenarios:
  downside:
    description: 伙伴转化更慢，定价停留在区间低端，且因为工作流始终没变成周度习惯，流失率维持在高位。
    y3RevenueK: 1892.7
    y3EbitdaK: -1128.2
    cashLowPointK: -435.9
    keyAssumptionChanges:
    - Y2 新增砍到基础情形的 75%，Y3 新增砍到基础情形的 70%
    - Y2 ARPU 维持在 $239，Y3 维持在 $249
    - 月流失率升到 3.5%
    - Y3 毛利率最高只能到 72%
  base:
    description: 伙伴驱动获客跑通，付费卡车增长打到第 2 年证明窗口，公司在不假设完整 5,000 辆 SOM 情形的前提下，接近第 3 年盈亏平衡。
    y3RevenueK: 3108.0
    y3EbitdaK: -160.2
    cashLowPointK: 304.2
    keyAssumptionChanges:
    - 随着定价回归常态且更高档位 cohort 混入，ARPU 从 $229 爬升到 $279
    - 月流失率稳定在 2.5%
    - Y2 期末活跃卡车为 330.6 辆，Y3 期末为 1815.6 辆
    - Y3 毛利率达到 75% 目标
  upside:
    description: 只要 1 家规模化的 load board 或保理伙伴带来加速分发，附着收入会抬高 ARPU，公司也能在第 3 年明确转正 EBITDA。
    y3RevenueK: 3793.2
    y3EbitdaK: 429.7
    cashLowPointK: 485.9
    keyAssumptionChanges:
    - 伙伴 traction 跑出后，Y3 新增节奏达到基础情形的 120%
    - Y2 ARPU 提升到 $259，Y3 提升到 $289
    - 月流失率改善到 1.8%
    - Y3 毛利率达到 77%
