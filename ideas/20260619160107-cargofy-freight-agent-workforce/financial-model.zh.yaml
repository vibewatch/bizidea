  title: 单位经济模型流转
  mermaid: "flowchart LR\n  PartnerLeads --> Trials\n  Trials --> PaidTrucks\n  PaidTrucks --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash"
