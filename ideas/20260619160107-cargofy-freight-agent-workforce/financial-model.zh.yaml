slug: owner-op-dispatch-ai
date: '2026-06-19'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-19] 模型从商业计划日期的下一个月开始。'
- id: A2
  name: M1 期初现金
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + model sizing] 取 pre-seed 融资中位数，用来覆盖 12–24 个月里程碑外加约 6 个月缓冲。'
- id: A3
  name: 起始付费卡车数（M1）
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones] 公司从零收入起步，必须先把试点转成付费订阅。'
- id: A4
  name: 活跃客户定义
  value: 每辆按月付费的软件订阅卡车记为 1 个客户
  unit: definition
  source: '[BP businessModel.unitOfValue] customersEop 统计的是活跃订阅卡车，而不是承运商品牌数。'
- id: A5
  name: 综合月度 ARPU 爬坡
  value: Y1 每辆车每月 $229，Y2 $249，Y3 $279
  unit: USD/truck/month
  source: '[BP gtm.pricing $199-$299 + BP businessModel.expansionLevers + Research bottomUpSizingDrivers ARPU benchmark $249] Y1 反映试点期折扣，Y2 回到市场基准，Y3 假设多车和附着支付 cohort 占比提升，但仍在既定价格带内。'
- id: A6
  name: 付费卡车新增节奏
  value: Y1 每月新增 0、0、0、1、1、2、2、2、3、3、4、4；Y2 每季度新增 30、60、105、150；Y3 每季度新增 255、345、485、660
  unit: trucks
  source: '[BP milestones + BP gtm.channels + BP sequencingRationale] 基础情形能跨过第 1 年 15 辆付费车的证明点，第 2 年落在 250–500 辆订阅车目标区间内，第 3 年仍低于示意性的 5,000 辆 SOM，避免做成虚荣曲线。'
- id: A7
  name: 月度付费卡车流失率
  value: 2.5%
  unit: pct/month
  source: '[startup-finance heuristic + BP risks + BP investorMemo.mustBeTrue retention emphasis] 在工作流尚未形成习惯前，先按保守的 SMB 留存来算。'
- id: A8
  name: 毛利率爬坡
  value: M1-M6 为 50%，M7-M12 为 58%，Y2 为 68%，Y3 为 75%
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct 75 + BP operations + Research regulatoryTechnicalConstraints] 上线初期 onboarding 和异常处理重，等集成和单证质检变得可复制后，再走到既定软件毛利目标。'
- id: A9
  name: 创始人 / CEO 全成本薪酬
  value: $180K
  unit: USD/year
  source: '[BP team founder-led sales and partnerships + startup-finance heuristic] 创始人现金薪酬偏克制，外加社保税负。'
- id: A10
  name: 工程岗位全成本薪酬
  value: $185K
  unit: USD/year/FTE
  source: '[BP team founding eng + full-stack mobile engineer + startup-finance heuristic] 适用于 seed 阶段高阶产品和集成人才的现金薪酬。'
- id: A11
  name: 销售 / 合作岗位全成本薪酬
  value: $170K
  unit: USD/year/FTE
  source: '[BP team founder-led sales and partnerships + BP gtm.channels + startup-finance heuristic] 覆盖伙伴拓展以及后续 GTM 的人力成本。'
- id: A12
  name: 运营 / 合规岗位全成本薪酬
  value: $145K
  unit: USD/year/FTE
  source: '[BP team operations and compliance lead + startup-finance heuristic] 适用于懂行业的运营岗位，含福利和社保税负。'
- id: A13
  name: 客户成功岗位全成本薪酬
  value: $120K
  unit: USD/year/FTE
  source: '[BP team customer success and onboarding lead + startup-finance heuristic] 负责电话优先 onboarding 和留存支持。'
- id: A14
  name: G&A 岗位全成本薪酬
  value: $110K
  unit: USD/year/FTE
  source: '[startup-finance heuristic] 精简的财务/行政支持，只在伙伴分发放量后再加。'
- id: A15
  name: 招聘时间线
  value: M1 创始人 + 创始工程师；M4 移动端工程师；M7 运营/合规负责人；M10 客户成功；M13 合作负责人；M16 工程师；M19 第 2 名 GTM；M22 第 2 名客户成功；M25 集成工程师；M28 第 2 名运营/合规；M31 财务/行政；M34 数据/AI 工程师
  unit: timeline
  source: '[BP team + BP sequencingRationale] 先产品、后伙伴放量的招聘顺序与商业计划一致，后续招聘也沿用同一逻辑。'
- id: A16
  name: 非人力销售与市场费用
  value: M1-6 每月 $4K，M7-12 每月 $6K，M13-18 每月 $10K，M19-24 每月 $15K，M25-30 每月 $22K，M31-36 每月 $28K
  unit: USD/month
  source: '[BP gtm.channels + startup-finance heuristic] 假设以伙伴 enablement、转介绍计划、车主司机社区和少量地推差旅为主，而不是重投付费投放。'
- id: A17
  name: 非人力研发费用
  value: M1-6 每月 $8K，M7-12 每月 $10K，M13-24 每月 $14K，M25-36 每月 $18K
  unit: USD/month
  source: '[BP product + BP operations + startup-finance heuristic] 覆盖云资源、AI 工具、单证处理供应商和集成稳定性成本。'
- id: A18
  name: 非人力 G&A 费用
  value: Y1 每月 $6K，Y2 每月 $8K，Y3 每月 $10K
  unit: USD/month
  source: '[BP operations + Research regulatoryTechnicalConstraints + startup-finance heuristic] 覆盖法务、保险、会计和合规开销。'
- id: A19
  name: 工资在损益表中的分摊
  value: 创始人 70% 记 S&M / 30% 记 G&A；工程 100% 记 R&D；销售 100% 记 S&M；运营/合规 50% 记 R&D / 50% 记 G&A；客户成功 70% 记 S&M / 30% 记 G&A；G&A 100% 记 G&A
  unit: allocation
  source: '[BP team rationales + BP operations] 把规划中的岗位映射到模型使用的经营科目里。'
- id: A20
  name: CAC 口径
  value: 每新增 1 辆净活跃卡车对应 $0.9K CAC
  unit: USD/truck
  source: '[model calc + BP gtm.funnelTargets partner-led motion] 用 Y2-Y3 的销售与市场费用除以 Y2-Y3 新增净活跃卡车，反映伙伴驱动获客结构。'
- id: A21
  name: 现金转换口径
  value: 现金变动等于 EBITDA
  unit: modeling convention
  source: '[startup-finance heuristic] 假设在 pre-seed 阶段，资本开支、债务服务、税费和营运资金波动都不构成关键变量。'
- id: A22
  name: 融资规模
  value: $3.0M pre-seed
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP milestones + model cash trough] 这笔钱足以把订阅卡车做到 250–500 辆、证明伙伴 CAC，并在下一轮融资前保留约 6 个月缓冲。'
