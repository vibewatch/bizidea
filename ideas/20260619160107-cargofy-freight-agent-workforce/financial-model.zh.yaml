- checkName: 收入引擎
  finding: 基础情形的收入，由伙伴驱动增长带动：Y1 期末 20.5 辆付费车，Y2 期末 330.6 辆，Y3 期末 1815.6 辆；同时 ARPU 从试点价回到每辆车每月 $279。
- checkName: 哪些事必须做对
  finding: 公司必须真的拿下一条可重复的保理或 load board 渠道，因为模型假设 CAC 可以稳定在 $0.9K 左右，且第 2 年新增卡车能落在 250–500 辆目标窗口内。
- checkName: 模型会在什么情况下失效
  finding: 如果伙伴转化放缓、月流失率升到 3.5%，下行情形下 Y3 收入会掉到 $1.9M，且公司在形成规模前现金最低会探到 -$435.9K。
- checkName: 下一轮融资要靠什么证明
  finding: 下一轮融资要靠 250–500 辆订阅卡车、低于 12 个月的 CAC 回本，以及第 3 年后半段实现季度 EBITDA 转正来支撑。
sanityChecks:
  ruleOf40: Y3 growth 705.2% + EBITDA margin -5.2% = 700.0%
  burnMultiple: Y2 burn multiple 约 1.5x，对应新增 ARR；随着 Q4 在 Y3 转成现金正向，这个值改善到约 0.0x。
  revenuePerFte: 按 Q4Y3 的 FTE 计算，Y3 每名员工对应收入为 $239.1K（SaaS 基准为 $200-400K）。
  flags:
  - 基础情形在 Y3 期末只有 1815.6 辆车，仍明显低于示意性的 5,000 辆 SOM；完整 SOM 情形更适合放在 upside，而不是经营计划里。
  - Rule of 40 看起来异常高，主要是因为 Y2 收入基数太小，所以现在还不能把它当成成熟度基准。
  - 模型假设 1–2 条伙伴渠道能解锁大部分 Y3 新增；如果 load board 或保理分发卡住，收入会很快下滑。
  - Y3 全年 EBITDA 仍略为负数，因此在激进上探更大客户或大做金融产品前，大概率还需要再融一轮。
