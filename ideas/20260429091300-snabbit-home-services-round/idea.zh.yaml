problem: 印度即时家政服务平台如今已经拥有真实的消费者需求，但它们最难的瓶颈，是在一天中的每个小时都能让每个微市场有足够多、经过验证的工人稳定在线。服务人员面临日收入波动、打款延迟和紧急现金需求，这会导致缺勤、切换多个平台以及供给缺口，从而打破 10 分钟承诺。现有打款工具只是把钱在工作完成后转出去，却无法影响出勤，也不能保障社区级供给的可靠覆盖。
targetUser:
  primary: 在印度即时家政 marketplace 中负责城市供给管理、且运营 50+ 个微市场的团队。
  secondary: 依赖日常接单收入、并且经常在打款间隔期间需要现金的服务人员。
  buyer: 即时家政服务平台的运营负责人或首席供给官。
startupThesis:
  nonObviousInsight: 一旦即时家政服务达到每天数万单，增长就不再只是纯粹的消费者获客问题，而会变成劳动力流动性问题。新的优势不只是拥有更多工人，而是能把收入数据与派单数据结合起来，按街区对可靠供给进行融资、激励和锁定。
  beachhead: 在单个城市每月有 10,000+ 单的印度即时家政帮工平台，先从清洁和洗碗品类切入，因为出勤波动会直接影响 30 分钟内 SLA。
  wedge: 一条嵌入平台现有服务人员 App 的收入通道，为服务人员提供任务后即时打款、与出勤挂钩的现金预支，以及高峰时段到岗承诺奖金。
  whyNowCatalyst: Snabbit 的融资、订单量和微市场密度表明，这个品类如今已经有了足够规模，使劳动力金融产品能够改善留存和 SLA 达成，而不只是做薪资管理。
  ventureScalePath: 先拿下家政帮工平台，再把同样的劳动力流动性基础设施扩展到上门美容、维修、上门养老等其他超本地服务，在这些服务里，工人的可靠性决定 marketplace 的增长。
solution: 产品接入家政 marketplace 的派单与打款栈，并基于已完成任务、出勤、取消历史和社区需求，为每位工人建立实时风险评分。工人可以即时提取收入、在已承诺班次前获得小额预支，并在保持出勤与质量评分时解锁更高额度。平台运营团队则能获得控制台，用于投放高峰补贴、为难以配齐人手的时段设置保底收入，并看到哪些微市场明天有供给失效风险。结果是，在无需自建金融科技团队的情况下，平台就能降低爽约率、更快补上空缺班次，并更好留住顶尖工人。
goToMarketSeed:
  firstCustomer: 孟买或班加罗尔一家即时家政平台的运营副总裁，运营密集的公寓社区微市场，并在周末或高峰时段订单满足率上承压。
  buyingTrigger: 新城市上线或融资后的扩张计划提高了 SLA 目标，并暴露出特定社区中的工人留存缺口。
  currentAlternative: 每周银行转账、临时 UPI 打款、基于表格的激励，以及与派单数据脱节的通用已赚工资预支或借贷合作方。
  switchingReason: 这个切入口把资金直接与出勤和社区级供给覆盖挂钩，因此平台只需一次集成，就能同时获得金融工具和可衡量的履约改善。
  pricingHypothesis: 按每名活跃服务人员每月收取 SaaS 费用，并对即时打款和已赚工资预支收取小额费率。
whyNow:
  - point: 大额新融资意味着品类龙头如今可以购买保护增长的基础设施，而不只是继续投放需求获取。
    signalRefs: [投资人背书的品类验证]
    sourceRefs: [1, 2]
  - point: 日单量和月单量已经足够高，可以基于真实收入历史而不是稀薄的信用数据，为工人做小额预支承保。
    signalRefs: [需求已经形成习惯性使用]
    sourceRefs: [1, 2]
  - point: 横跨 140 个微市场的超本地规模，让出勤和激励优化成为一个软件比人工运营手册更适合解决的数据问题。
    signalRefs: [超本地供给已足够密集，可进行科学化管理]
    sourceRefs: [2]
  - point: 10 分钟的消费者承诺把打款摩擦和工人现金缺口直接转化为用户流失，使这一痛点在运营上变得紧迫。
    signalRefs: [履约速度已经成为产品承诺]
    sourceRefs: [3]
differentiator: 这不是一个通用的零工钱包，也不是一个薪资工具。产品之所以有价值，是因为它嵌入在派单闭环中，只有当工人的行为能提升特定微市场的 marketplace 可靠性时才会提供资金。这围绕出勤、订单满足率和打款行为形成数据护城河，是广泛型金融科技玩家和内部运营团队都难以快速复制的。
