problem: 印度即时家政平台已经验证了真实的消费者需求，但最难的瓶颈，是如何在一天中每个时段都让每个微型市场里有足够多经过验证的工人稳定在线。服务人员的日收入波动大、打款延迟、又常有临时现金需求，结果就是错过班次、多平台切换，以及供给缺口，最终打破 10 分钟履约承诺。现有打款工具只能在工作完成后转钱，却无法提前影响出勤，也无法保障社区级供给覆盖。
targetUser:
  primary: 在印度即时家政平台负责城市供给管理、且运营 50+ 微型市场的管理者。
  secondary: 依赖日常接单收入、且经常在两次结算之间需要现金周转的服务人员。
  buyer: 即时家政服务平台的运营负责人或首席供给官。
startupThesis:
  nonObviousInsight: 一旦即时家政服务做到每天数万单，增长就不再只是拉新问题，而会变成劳动力流动性问题。新的优势不只是拥有更多工人，而是能把收入数据与派单数据放在一起，用来融资、激励，并按街区锁定稳定供给。
  beachhead: 先切入在单个城市中每月任务量达到 10,000+ 的印度即时家政平台，从清洁和洗碗这类出勤波动会直接影响 30 分钟内 SLA 的品类入手。
  wedge: 嵌入式收入通道，直接接入平台现有工人 App，提供完工即打款、与出勤挂钩的小额预支，以及高峰时段承诺奖金。
  whyNowCatalyst: Snabbit 的融资、任务量与微型市场密度说明，这个品类现在已经有足够规模，让劳动力金融产品不只是改善工资发放管理，而是真正提升留存和 SLA 达成率。
  ventureScalePath: 先拿下家政帮工平台，再把同一套劳动力流动性基础设施扩展到上门美容、维修、上门养老等其他超本地服务场景——这些场景的共同点都是，工人可靠性直接决定平台增长。
solution: 产品接入家政平台的派单与打款系统，基于完工记录、出勤情况、取消历史和社区需求，为每位工人建立实时风险评分。工人可以即时提现吗、在承诺上班前获得小额预支，并在保持出勤和服务质量时解锁更高额度。平台运营团队则获得一套控制台，可以为高峰期补贴注资、为难招人的时段保障最低收入，并提前看到哪些微型市场明天最可能出现供给失衡。结果就是更低的爽约率、更快补齐空档班次，以及在不自建金融团队的前提下留住优质工人。
goToMarketSeed:
  firstCustomer: 孟买或班加罗尔某家即时家政平台的运营副总裁，这类平台在公寓社区型微型市场里密集运营，并且在周末或高峰时段经常补位吃力。
  buyingTrigger: 新城市上线或融资后扩张计划抬高了 SLA 目标，也把特定社区里的工人留存缺口暴露出来。
  currentAlternative: 每周银行转账、临时 UPI 打款、基于表格的激励管理，以及与派单数据脱节的通用 earned-wage-access 或借贷合作方。
  switchingReason: 这个切口把资金直接和出勤及社区供给覆盖绑定，因此平台一次接入就能同时拿到金融能力和可量化的履约改善。
  pricingHypothesis: 按月向每位活跃工人收 SaaS 费用，并从即时打款和 earned-wage 预支中抽取小额费率。
whyNow:
  - point: 大额新融资意味着品类头部现在有能力购买保护增长的基础设施，而不只是继续砸钱做需求获取。
    signalRefs: [投资人背书带来的品类验证]
    sourceRefs: [1, 2]
  - point: 日单量和月单量已经高到可以基于真实收入历史为工人做小额预支，而不必依赖稀薄的信用数据。
    signalRefs: [需求已经形成习惯性使用]
    sourceRefs: [1, 2]
  - point: 覆盖 140 个微型市场的超本地规模，让出勤和激励优化变成一个更适合用软件解决的数据问题，而不是只能靠人工运营剧本。
    signalRefs: [超本地供给密度已高到可以被科学化管理]
    sourceRefs: [2]
  - point: 10 分钟的用户承诺会把打款摩擦和工人现金缺口立刻转化成客户流失，让这个痛点在运营层面变得非常紧迫。
    signalRefs: [履约速度已经变成产品承诺本身]
    sourceRefs: [3]
differentiator: 这不是通用型零工钱包，也不是工资发放工具。产品真正有价值，是因为它嵌在派单闭环里，只有当工人的行为能改善某个微型市场的可靠性时才释放资金。这会围绕出勤、补单率与打款行为形成数据护城河，通用金融科技玩家和平台内部运营团队都很难快速复制。
