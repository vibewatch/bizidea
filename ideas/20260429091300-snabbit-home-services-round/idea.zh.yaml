    - 工程与集成成本
    - 合规与支持运营成本
jobsToBeDone:
  - job: 当周末需求飙升、工人出勤变得不可预测时，帮助城市供给经理让足够多、经过验证的服务人员在线，以便在不对所有人一刀切发补贴的情况下仍然满足承诺的服务时间。
    currentAlternative: 通过 WhatsApp 人工触达、发放通用现金奖金，以及由城市运营团队被动补班。
    successMetric: 高峰时段订单满足率、爽约率，以及每个微市场留存的活跃服务人员数量。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 两篇有日期的融资报道加上在线产品网站，足以有力证明需求、供给密度和投资人信心都是真实存在的。
  painIntensity:
    score: 5
    rationale: 一旦工人可用性下滑，核心的 10 分钟价值主张会立刻失效，并伤害复购使用。
  wedgeClarity:
    score: 4
    rationale: 与出勤挂钩的即时打款和预支，是面向单一买方和单一工作流、范围明确且可测试的首个产品。
  defensibility:
    score: 4
    rationale: 将派单数据、出勤历史和资金获取能力结合起来，会形成通用金融科技玩家不具备的行为数据集。
  ventureScale:
    score: 4
    rationale: 一旦被验证，这一劳动力流动性层可以扩展到多个超本地服务品类和地理市场。
topRisks:
  - name: 信用损失
    description: 出勤波动较大或平台流失的工人，可能在预支上违约，从而抹掉单位经济效益。
    mitigation: 从已赚工资提取和极小额度、与出勤挂钩的预支开始，严格控制风险敞口，并与受监管的贷款机构合作承保。
  - name: 平台集成阻力
    description: Marketplace 运营方可能不愿让第三方介入打款和工人体验。
    mitigation: 先在单个城市和单一品类推出范围很窄的试点，证明爽约率下降、订单满足率改善，再逐步加深集成。
  - name: 监管复杂性
    description: 在印度，把打款、激励和借贷组合在一起，可能触发支付与放贷合规义务。
    mitigation: 从第一天起就把首个产品结构设定为已赚工资提取与打款编排，借贷部分则由受监管的金融合作伙伴提供。