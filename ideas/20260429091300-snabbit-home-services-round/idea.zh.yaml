jobsToBeDone:
  - job: 当周末需求激增、工人出勤变得不可预测时，帮助城市供给经理维持足够多经过验证的服务人员在线，这样他们就能在不盲目加码激励的情况下守住承诺的服务时效。
    currentAlternative: 城市运营团队通过 WhatsApp 人工拉群、发通用现金奖励，并在缺人后被动补班。
    successMetric: 高峰时段补单率、爽约率，以及每个微型市场保留下来的活跃工人数。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 两篇带日期的融资报道，加上在线产品站点，为需求、供给密度与投资人信心提供了有力证据。
  painIntensity:
    score: 5
    rationale: 只要工人可用性下滑，核心的 10 分钟价值主张就会立刻失效，并伤害复购。
  wedgeClarity:
    score: 4
    rationale: 与出勤挂钩的即时打款和预支，是面向单一买家与单一工作流的狭窄、可测试首款产品。
  defensibility:
    score: 4
    rationale: 把派单数据、出勤历史与资金可得性结合起来，会形成通用金融科技公司拿不到的行为数据集。
  ventureScale:
    score: 4
    rationale: 一旦被验证，这一劳动力流动性层可以扩展到多个超本地服务品类与地区。
topRisks:
  - name: 信贷损失
    description: 出勤波动大或频繁流失平台的工人，可能在预支后违约，吞掉单位经济模型。
    mitigation: 先从 earned-wage access 和极小额度、与出勤挂钩的预支起步，严格设限，并与受监管放贷方合作做授信支持。
  - name: 平台集成阻力
    description: 平台运营方可能不愿意让第三方插入打款链路和工人体验。
    mitigation: 先在单城、单品类做范围很窄的试点，证明爽约下降、补单率提升，再逐步加深集成。
  - name: 监管复杂度
    description: 将打款、激励和借贷放在一起，可能触发印度支付与放贷合规义务。
    mitigation: 首款产品按 earned-wage access 与打款编排来设计，借贷从第一天起就由受监管金融合作方提供。
