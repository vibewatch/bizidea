  - point: 家政服务线上渗透率仍低于 1%，因此当前数字化采购方基础还很早期。
    sourceRefs:
    - 10
  - point: 围绕工人保障的审视正在升温，尤其是在高周转家政帮工模式里。
    sourceRefs:
