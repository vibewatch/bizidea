  growthRate: 10-11% CAGR
  growthRateSourceRefs:
  - 10
  tailwinds:
  - point: 印度家政服务市场在 FY2025 规模约为 ₹5.1-5.2 trillion，预计到 FY2030 将增长至 ₹8.4-8.6 trillion。
    sourceRefs:
