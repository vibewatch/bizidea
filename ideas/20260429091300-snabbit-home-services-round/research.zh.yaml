- driver: 可触达单元总量
  value: 当前直接有证据支持的活跃工人总数为 63,169，来自 Urban Company 与 Snabbit；在纳入相邻平台和品类后，中期建模扩展至约 250k。
  source: '[2], [7], calc'
- driver: beachhead 工人池
  value: 印度主要 metro 中即时家政帮工 / 高频家政平台约 90k 名工人。
  source: '[2], [4], [6], est.'
- driver: 每名活跃服务人员年度变现
  value: $60 est.
  source: est.
- driver: Year-3 服务工人基数
  value: 20k est.
  source: calc
