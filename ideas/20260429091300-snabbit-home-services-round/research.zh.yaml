competitors:
- name: Urban Company
  stage: 现有龙头
  wedge: 全栈家政服务 marketplace，拥有服务伙伴项目、技能微市场，以及足以内部构建伙伴金融工具的规模。
  pricing: Marketplace take-rate 模式；工人金融工具暂无公开单独定价。
  strength: 以 48,169 名平均月活跃服务人员和公开的伙伴收入计划，构成最大规模的平台基准。
  weaknessVsUs: 更可能优先优化自家网络；它并不是面向整个生态的中立 B2B 软件提供方。
  sourceRefs:
  - 7
  - 8
  - 9
  - 25
- name: Refyne
  stage: 成长期
  wedge: 面向雇主的已赚工资提取与金融健康平台，依赖薪资代扣和广泛的员工分发。
  pricing: Custom / 未公开披露。
  strength: 已服务 500+ 家组织，并拥有薪资与金融合作伙伴集成。
  weaknessVsUs: 它是为雇主薪资流构建的，而不是为微市场中的派单挂钩零工可靠性而设计。
  sourceRefs:
  - 23
- name: Jify by Moneyview
  stage: 成长期
  wedge: 按需薪资与金融健康产品栈，定位为对雇主即插即用且零成本。
  pricing: Custom / 未公开披露。
  strength: 员工价值主张清晰：无息提取、即时出款、快速上线。
  weaknessVsUs: 假设存在雇主/薪资场景；没有展示派单原生的承保或与出勤挂钩的运营控制。
  sourceRefs:
  - 24
  - 28
- name: RazorpayX
  stage: 基础设施龙头
  wedge: 面向印度企业的企业银行、打款、验证和数字借贷基础设施。
  pricing: 按使用量 / 企业定价，所引页面未公开披露。
  strength: 拥有强大的出款、验证和合作伙伴生态通道。
  weaknessVsUs: 它提供的是管道，而不是 marketplace 可靠性模型或工人行为评分。
  sourceRefs:
  - 20
- name: Cashfree Payments
  stage: 基础设施龙头
  wedge: 面向工资、退款、贷款和供应商付款的批量打款及打款 API。
  pricing: 按使用量 / 企业定价，所引页面未公开披露。
  strength: 在转账、收款人管理、webhooks 和运营工具上提供强大的 API 级能力。
  weaknessVsUs: 依然是横向的打款层；它不掌握派单闭环，也不拥有家政服务运营工作流。
  sourceRefs:
  - 21
  - 22
regulatoryTechnicalConstraints:
- point: 任何预支产品都很可能需要与 RE/NBFC 对齐，并遵守 RBI 的 Digital Lending Directions，包括借款人披露和 DLA 治理要求。
  sourceRefs:
  - 17
- point: 在《社会保障法典》框架下，平台工人的社会保障义务可能继续演化，包括聚合平台潜在缴费责任。
  sourceRefs:
  - 15
- point: 创业公司需要从派单、取消、出勤和打款中获得可靠的事件数据；薄弱的集成会直接破坏承保质量。
  sourceRefs:
  - 7
  - 8
  - 9
- point: 实时打款在技术上是可行的，但资金流转本身已经商品化；差异化必须来自决策层和控制层。
  sourceRefs:
  - 18
  - 19
  - 20
  - 21
  - 22
- point: 在高周转的即时家政帮工模式中，工人信任与公众审视是实质性的设计约束。
  sourceRefs:
  - 12
  - 13
  - 27
validationSignals:
- point: Snabbit 筹集了 $56 million，并表示目前通过 15,000 名服务人员在 140 个微市场中处理 1 million 月订单。
  sourceRefs:
  - 1
  - 2
- point: Pronto 的品类势头足够真实，以至于 TechCrunch 与 ET 都报道了其快速增长和 $25 million 融资。
  sourceRefs:
  - 4
  - 5
- point: Urban Company 已提交 IPO 文件，因此该品类的服务伙伴规模和单位经济获得了少见的公开可见性。
  sourceRefs:
  - 7
  - 25
  - 26
- point: Urban Company 公开推出了 12 项伙伴收入与生计计划，表明买方已经在伙伴侧经济性上花钱。
  sourceRefs:
  - 8
- point: Jify 和 Refyne 说明，只要被包装为 employer productivity 或员工福利工具，印度买方已经接受嵌入式工资提取产品。
  sourceRefs:
  - 23
  - 24
  - 28
- point: RazorpayX 和 Cashfree 证明，即时打款基础设施、验证与 API 工具今天已经就绪。
  sourceRefs:
  - 20
  - 21
  - 22
openQuestions:
- 一个试点能否在 6-8 weeks 内展示双位数的爽约率下降或激励支出下降？
- 如果把与出勤挂钩的预支设计成 EWA，法务/合规团队会接受，还是从 day one 就要求更重的 RE 合作模式？
- 面向班次波动的家政帮工，而不是面向领固定工资的员工提供预支时，回款/违约画像究竟如何？
- 这个模型从清洁/洗碗迁移到美容、维修和照护品类时，其可移植性有多强？
