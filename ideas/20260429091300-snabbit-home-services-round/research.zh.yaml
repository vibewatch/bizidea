  tam:
    value: $15.0M
    rationale: >-
      估算：印度中期约 250k 名平台化家政服务工人 × 每位活跃工人每年约 $60 变现。工人基数以目前有直接证据支持的 Urban Company（48,169 名月均活跃服务人员）和 Snabbit（15,000 名服务人员）合计 63,169 人为基础，再按 4 倍放大，以覆盖 Pronto、Broomees、其他平台以及相邻家政品类，同时假设线上渗透率仍低于印度家政服务整体市场的 1%。
    isEstimate: true
    sourceRefs:
    - 2
    - 7
    - 10
  sam:
    value: $5.4M
    rationale: >-
      估算：印度头部都会城市中，即时家政帮工及相邻高频家政平台约 90k 名工人 × 每位活跃工人每年约 $60 变现；范围限定在当前滩头市场，即出勤波动最影响运营的那部分。
    isEstimate: true
    sourceRefs:
    - 2
    - 4
    - 6
    - 10
  som:
    value: $1.2M
    rationale: >-
      估算：到第 3 年，在 3-4 家平台上覆盖约 20k 名活跃工人 × 每位工人每年约 $60 变现，前提是假设公司拿下一个锚定客户，并在孟买 / 班加罗尔类市场继续落地两到三个后续部署。
    isEstimate: true
    sourceRefs:
    - 1
    - 2
    - 4
    - 8
bottomUpSizingDrivers:
- driver: 可触达总单元数
  value: 目前由 Urban Company 与 Snabbit 直接支持的活跃工人数为 63,169；结合相邻平台与品类，中期建模放大到约 250k。
  source: '[2], [7], calc'
- driver: 滩头工人池
  value: 印度主要都会城市中的即时家政帮工 / 高频家政平台约 90k 名工人。
  source: '[2], [4], [6], est.'
- driver: 每位活跃工人的年化变现
  value: $60 估算
  source: est.
- driver: 第 3 年服务工人规模
  value: 20k 估算
  source: calc
