  - point: 任何预支产品在上线时，都会被数字放贷合规显著增加复杂度。
    sourceRefs:
    - 17
competitors:
- name: Urban Company
  stage: incumbent
  wedge: 端到端家政服务平台，拥有服务伙伴项目、技能型微型市场，以及足以内部自建合作伙伴金融工具的规模。
  pricing: 市场平台抽成模式；工人金融工具没有公开拆分定价。
  strength: 这是最具规模的行业基准平台，月均活跃服务人员达 48,169 人，并公开推出了合作伙伴收入计划。
  weaknessVsUs: 它大概率会优先服务自有网络，而不是作为中立的 B2B 软件供应商服务整个生态。
  sourceRefs:
  - 7
  - 8
  - 9
  - 25
- name: Refyne
  stage: scale-up
  wedge: 面向雇主的 earned wage access 与金融福利平台，通过 payroll 扣款和大规模员工分发来运作。
  pricing: 定制 / 引用页面未公开披露。
  strength: 已服务 500+ 家机构，并打通 payroll 与金融合作方集成。
  weaknessVsUs: 它是围绕雇主工资流设计的，而不是围绕微型市场里的派单可靠性。
  sourceRefs:
  - 23
- name: Jify by Moneyview
  stage: scale-up
  wedge: 按需取薪与金融福利栈，主打即插即用且对雇主零成本。
  pricing: 定制 / 引用页面未公开披露。
  strength: 员工价值主张很明确：免息取薪、即时到账、快速上线。
  weaknessVsUs: 它假设的是雇主 / payroll 场景，没有展示原生派单授信或与出勤挂钩的运营控制能力。
  sourceRefs:
  - 24
  - 28
- name: RazorpayX
  stage: incumbent infrastructure
  wedge: 面向印度企业的企业银行、打款、验证和数字放贷基础设施。
  pricing: 按用量 / 企业级，引用页面未公开披露。
  strength: 拥有很强的打款、验证和合作伙伴生态底座能力。
  weaknessVsUs: 它提供的是底层水管，不是市场平台可靠性模型，也不做工人行为评分。
  sourceRefs:
  - 20
- name: Cashfree Payments
  stage: incumbent infrastructure
  wedge: 面向工资、退款、贷款和供应商付款的批量打款与打款 API。
  pricing: 按用量 / 企业级，引用页面未公开披露。
  strength: 在转账、收款人、webhook 与运营工具层面提供了很强的 API 覆盖。
  weaknessVsUs: 它仍然是横向打款层，并不掌握派单闭环，也不拥有家政服务运营工作流。
  sourceRefs:
  - 21
  - 22
regulatoryTechnicalConstraints:
- point: 任何预支产品都很可能需要与 RE / NBFC 对齐，并遵守 RBI Digital Lending Directions 中关于借款人披露与 DLA 治理的要求。
  sourceRefs:
  - 17
- point: 平台工人的社会保障义务会在《Code on Social Security》框架下持续演化，包括潜在的平台缴费责任。
  sourceRefs:
  - 15
- point: 创业公司需要来自派单、取消、出勤和打款的稳定事件数据；如果集成薄弱，授信质量就会被直接破坏。
  sourceRefs:
  - 7
  - 8
  - 9
- point: 实时打款本身已经可行，但资金流转已经商品化；真正的差异化必须来自决策层与控制层。
  sourceRefs:
  - 18
  - 19
  - 20
  - 21
  - 22
- point: 在高周转家政帮工模式下，工人信任与公众审视都是重要的产品设计约束。
  sourceRefs:
  - 12
  - 13
  - 27
validationSignals:
- point: Snabbit 融资 $56 million，并称自己通过 15,000 名服务人员、在 140 个微型市场中处理每月 1 million 单任务。
  sourceRefs:
  - 1
  - 2
- point: Pronto 的品类势头已经足够强，TechCrunch 和 ET 都报道了其快速增长及 $25 million 融资。
  sourceRefs:
  - 4
  - 5
- point: Urban Company 已提交 IPO 文件，为这个品类的服务伙伴规模和单位经济提供了少见的公开透明度。
  sourceRefs:
  - 7
  - 25
  - 26
- point: Urban Company 公开推出了 12 点合作伙伴收入与生计计划，说明买家已经会为合作伙伴端经济问题花钱。
  sourceRefs:
  - 8
- point: Jify 和 Refyne 说明，只要把产品包装成雇主生产力或福利工具，印度买家已经接受嵌入式取薪产品。
  sourceRefs:
  - 23
  - 24
  - 28
- point: RazorpayX 和 Cashfree 证明，即时打款基础设施、验证和 API 工具今天已经成熟可用。
  sourceRefs:
  - 20
  - 21
  - 22
openQuestions:
- 一个试点能否在 6-8 周内把爽约率或激励支出拉出双位数改善？
- 法务 / 合规团队会把与出勤挂钩的预支视为合规的 EWA 结构，还是从第一天起就要求更重的 RE 合作模型？
- 当预支对象变成可变班次的家政帮工，而不是领固定工资的员工时，还款 / 违约画像会变成什么样？
- 这套模式从清洁 / 洗碗迁移到美容、维修和照护场景时，真实可移植性有多强？
