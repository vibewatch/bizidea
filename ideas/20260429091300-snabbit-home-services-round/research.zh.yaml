  tam:
    value: $15.0M
    rationale: '估算：印度中期约 250k 名平台化家政服务工人 x 每名活跃服务人员约 $60 的年变现。工人基数以当前直接证据中的 63,169 人为基础，来源于 Urban Company（48,169 名平均月活跃服务人员）和 Snabbit（15,000 名服务人员），再按约 4x 外推，以覆盖 Pronto、Broomees、其他平台以及相邻家政服务品类，同时假设线上渗透率仍低于印度家政服务市场的 1%。'
    isEstimate: true
    sourceRefs:
    - 2
    - 7
    - 10
  sam:
    value: $5.4M
    rationale: '估算：印度头部 metro 中即时家政帮工及相邻高频家政平台约 90k 名工人 x 每名活跃服务人员约 $60 的年变现；范围收敛到当前 beachhead，即出勤波动最重要的高频场景。'
    isEstimate: true
    sourceRefs:
    - 2
    - 4
    - 6
    - 10
  som:
    value: $1.2M
    rationale: '估算：到 year 3 在 3-4 个平台上服务约 20k 名活跃服务人员 x 每名工人约 $60 的年变现，假设有 1 个锚定客户，再加上在类似孟买/班加罗尔市场中的 2-3 个后续部署。'
    isEstimate: true
    sourceRefs:
    - 1
    - 2
    - 4
    - 8
