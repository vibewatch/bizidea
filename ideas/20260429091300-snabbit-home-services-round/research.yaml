  validationPlan:
  - priority: high
    question: Will ops leaders pay for measurable no-show reduction, or do they still
      view worker-finance as a cost center?
    evidenceToGather: 5-10 buyer interviews plus a pilot ROI model tied to fill rate,
      no-show rate, and incentive spend before/after.
  - priority: high
    question: Can repayment/eligibility rules be structured as earned-wage access
      or RE-partnered advances without delaying launch?
    evidenceToGather: Legal memo from an RBI-focused counsel and 2-3 NBFC / RE partner
      conversations on product structure.
  - priority: medium
    question: How many jobs per active worker per day are needed for underwriting
      to be safe in cleaners/utensil-washing categories?
    evidenceToGather: Anonymized dispatch histories from one platform and cohort-level
      default/no-show analysis.
  - priority: medium
    question: Will workers trust attendance-linked advances, or perceive them as restrictive?
    evidenceToGather: Worker interviews and small in-app experiments on opt-in, uptake,
      repayment, and churn.
  - priority: low
    question: Can the same logic travel into beauty, repair, or care visits quickly
      enough to matter for venture scale?
    evidenceToGather: Cross-category pipeline data from Urban Company-like platforms
      and 2-3 design-partner conversations outside domestic help.
