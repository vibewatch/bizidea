openQuestions:
- Can one pilot show a double-digit reduction in no-shows or incentive spend within
  6-8 weeks?
- Will legal/compliance teams approve attendance-linked advances as structured EWA,
  or require a heavier RE-partner model from day one?
- What repayment/default profile emerges when advances are offered to variable-shift
  domestic-help workers rather than salaried employees?
- How portable is the model from cleaners/utensil-washing into beauty, repair, and
  care categories where job cadence differs?
