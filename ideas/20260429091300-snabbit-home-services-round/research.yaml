competitors:
- name: Urban Company
  stage: incumbent
  wedge: Full-stack home-services marketplace with service-partner programs, skill
    micro-markets, and the scale to build internal partner-finance tools.
  pricing: Marketplace take-rate model; worker-finance tooling not separately priced
    publicly.
  strength: Largest scaled platform benchmark with 48,169 average monthly active service
    professionals and public partner-earnings initiatives.
  weaknessVsUs: Likely optimizes for its own network first; not a neutral B2B software
    provider for the rest of the ecosystem.
  sourceRefs:
  - 7
  - 8
  - 9
  - 25
- name: Refyne
  stage: scale-up
  wedge: Earned wage access and financial wellness platform for employers, with payroll-linked
    deductions and large employee distribution.
  pricing: Custom / not publicly disclosed.
  strength: Trusted by 500+ organizations with payroll and financial-partner integrations.
  weaknessVsUs: Built for employer payroll flows, not for dispatch-linked gig reliability
    in micro-markets.
  sourceRefs:
  - 23
- name: Jify by Moneyview
  stage: scale-up
  wedge: On-demand salary and financial-wellness stack positioned as plug-and-play
    and zero-cost for employers.
  pricing: Custom / not publicly disclosed.
  strength: 'Clear employee-value proposition: no-interest access, instant disbursal,
    fast go-live.'
  weaknessVsUs: Assumes employer/payroll context; does not show dispatch-native underwriting
    or attendance-linked ops controls.
  sourceRefs:
  - 24
  - 28
- name: RazorpayX
  stage: incumbent infrastructure
  wedge: Business banking, payouts, verification, and digital-lending infrastructure
    for Indian businesses.
  pricing: Usage-based / enterprise, not publicly disclosed on the cited pages.
  strength: Powerful disbursement, verification, and partner-ecosystem rails.
  weaknessVsUs: Provides the plumbing, not the marketplace reliability model or worker-behavior
    scoring.
  sourceRefs:
  - 20
- name: Cashfree Payments
  stage: incumbent infrastructure
  wedge: Bulk payouts and payout APIs for wages, refunds, loans, and vendor payments.
  pricing: Usage-based / enterprise, not publicly disclosed on the cited pages.
  strength: Strong API-level coverage for transfers, beneficiaries, webhooks, and
    operational tooling.
  weaknessVsUs: Still a horizontal payout layer; it does not own the dispatch loop
    or home-service ops workflow.
  sourceRefs:
  - 21
  - 22
