jobsToBeDone:
  - job: When weekend demand spikes and worker attendance gets unpredictable, help city supply managers keep enough verified pros online, so they can hit promised service times without overspending on blanket incentives.
    currentAlternative: Manual WhatsApp outreach, generic cash bonuses, and reactive shift filling by city ops teams.
    successMetric: Peak-hour fill rate, no-show rate, and retained active workers per micro-market.
