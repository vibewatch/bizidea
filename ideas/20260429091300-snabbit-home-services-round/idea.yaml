topRisks:
  - name: Credit losses
    description: Workers with volatile attendance or platform churn could default on advances and erase unit economics.
    mitigation: Start with earned-wage access and tiny attendance-linked advances, cap exposure tightly, and partner with regulated lenders for underwriting support.
  - name: Platform integration resistance
    description: Marketplace operators may be wary of inserting a third party into payouts and worker experience.
    mitigation: Launch as a narrowly scoped pilot for one city and category, prove lower no-shows and better fill rates, then expand integration depth.
  - name: Regulatory complexity
    description: Combining payouts, incentives, and lending can trigger payments and lending compliance obligations in India.
    mitigation: Structure the first product as earned-wage access and payout orchestration, with lending provided by regulated financial partners from day one.
