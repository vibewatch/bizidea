modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> Platforms
      Platforms --> ActiveWorkers
      ActiveWorkers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
      Revenue --> COGS
      Cash --> Hiring
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by one pilot becoming 3-4 production platforms and scaling to 20000 active workers at about $60 annual ARPU.
  - checkName: Must go right
    finding: The first city-category cohort must show at least the BP's targeted 10% reliability lift quickly enough to convert into a production contract within one quarter.
  - checkName: Model breaks if
    finding: A longer sales cycle or weaker pricing is the biggest cash-risk because either pushes base-case cash below zero before the next round.
  - checkName: Next-round proof
    finding: The next financing is justified once the company has 3-4 production customers, roughly 10k active workers, and one adjacent-category deployment live.
sanityChecks:
  ruleOf40: "Y3 growth 115.8% + EBITDA margin -91.4% = 24.4%"
  burnMultiple: "Y3 net burn $907K divided by net new revenue of $533K = 1.7x"
  revenuePerFte: "$74K Y3 using average 13.5 FTE (below the $200-400K scaled-SaaS benchmark)"
  flags:
    - "The model treats customers as active workers, not enterprise logos, because BP pricing is per active worker."
    - "Y3 revenue approaches the researched SOM quickly, so real upside requires adjacent-category expansion by month 18."
    - "EBITDA stays negative through Y3, so the business still needs a follow-on round even if the current raise is executed cleanly."
    - "Gross margin assumes regulated partners remain inside 30% COGS; a stricter RBI structure would reduce take rates and worsen payback."
