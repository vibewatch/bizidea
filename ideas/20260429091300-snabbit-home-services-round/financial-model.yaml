scenarios:
  downside:
    description: "Pilot conversion slips by two quarters, ARPU lands at $54, and churn rises as worker adoption is less sticky."
    y3RevenueK: 770.0
    y3EbitdaK: -1035.0
    cashLowPointK: -280.0
    keyAssumptionChanges:
      - "ARPU drops 10% versus base."
      - "Production-worker ramp ends near 17000 rather than 20000."
      - "Monthly churn rises from 1.5% to 2.5%."
  base:
    description: "One pilot converts in year 1, the company reaches 3-4 production platforms by year 2, and worker monetization stays at the researched ~$60 annual level."
    y3RevenueK: 992.5
    y3EbitdaK: -907.25
    cashLowPointK: 75.93
    keyAssumptionChanges:
      - "ARPU stays at $60 annual per active worker."
      - "Year 3 ends at 20000 active workers across 3-4 platforms."
      - "Gross margin holds at the BP target 70%."
  upside:
    description: "The first pilot converts faster, adjacent-category rollout works by month 18, and blended monetization reaches $66 per worker annually."
    y3RevenueK: 1215.0
    y3EbitdaK: -760.0
    cashLowPointK: 310.0
    keyAssumptionChanges:
      - "ARPU increases 10% versus base."
      - "Year 3 ends near 24000 active workers."
      - "Gross margin improves to 72% as payout scale offsets partner costs."
