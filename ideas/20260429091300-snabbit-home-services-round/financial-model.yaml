  - id: A2
    name: Opening cash from pre-seed round
    value: "2.30"
    unit: USDM
    source: "[BP fundingAsk $2-3M] plus heuristic: sized near the low-middle of the stated range for a lean India-based 24 month plan"
  - id: A3
    name: Annual ARPU per active worker
    value: "60"
    unit: USD per worker per year
    source: "[BP operatingAssumptions monetization at roughly $60 annual level; research market SAM/SOM]"
  - id: A4
    name: Monthly ARPU per active worker
    value: "5"
    unit: USD per worker per month
    source: "[Derived from A3]"
  - id: A5
    name: Gross margin target
    value: "70"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A6
    name: Monthly active-worker churn
    value: "1.5"
    unit: percent
    source: "[Startup-finance heuristic: sticky B2B embedded workflow once a platform cohort is live]"
  - id: A7
    name: First paid pilot timing and scale
    value: "Month 6 with 500 active workers"
    unit: milestone
    source: "[BP investorMemo.firstCustomer initial contract 500-1500 workers; BP milestones 6-8 week pilot]"
  - id: A8
    name: Year 1 exit active workers
    value: "3000"
    unit: workers
    source: "[BP 0-12 month milestone of one converted production contract plus a second deployment; conservative midpoint of early platform rollout]"
  - id: A9
    name: Year 2 exit active workers
    value: "11500"
    unit: workers
    source: "[BP 12-24 month milestone of 3-4 production customers and roughly 10000 active workers] plus heuristic: modest overage from initial adjacent-category test"
  - id: A10
    name: Year 3 exit active workers
    value: "20000"
    unit: workers
    source: "[BP 24-36 month milestone; research.market.som assumes ~20k served workers by year 3]"
  - id: A11
    name: Loaded annual cash compensation by role
    value: "Leadership 90k; Engineering 60k; Ops/CS 36k; Risk/Compliance 54k; Sales/BD 42k; G&A/Finance 30k"
    unit: USD per FTE per year
    source: "[Startup-finance heuristic: India venture-backed seed-stage cash comp, loaded for payroll taxes and benefits]"
  - id: A12
    name: Founder time allocation
    value: "30% R&D, 40% sales/partnerships, 30% G&A"
    unit: allocation
    source: "[Startup-finance heuristic: founder-led enterprise selling during pre-seed]"
  - id: A13
    name: Non-payroll opex ramp
    value: "18k per month in Q1Y1 rising to 86k per month in Q4Y3"
    unit: USDK per month
    source: "[Startup-finance heuristic] anchored to enterprise pilot travel, cloud, compliance, legal, and customer deployment support for a regulated workflow"
  - id: A14
    name: Next-round target milestone
    value: "3-4 production customers, ~10k active workers, adjacent category live"
    unit: milestone
    source: "[BP 12-24 month milestones; BP fundingAsk useOfFundsSummary]"
  - id: A15
    name: Blended CAC per active worker
    value: "0.04"
    unit: USDK per worker
    source: "[Derived from model Y2-Y3 sales and marketing spend divided by gross active-worker additions]"
