scenarios:
  downside:
    description: "试点转化延后两个季度、ARPU 落到 $54，且因为工人采纳粘性不足，流失率上升。"
    y3RevenueK: 770.0
    y3EbitdaK: -1035.0
    cashLowPointK: -280.0
    keyAssumptionChanges:
      - "ARPU 比基准情形低 10%。"
      - "量产工人规模爬坡最终接近 17000，而不是 20000。"
      - "月度流失率从 1.5% 升到 2.5%。"
  base:
    description: "第 1 年一个试点完成转化，第 2 年公司达到 3-4 家量产平台，而工人变现维持研究中的年化约 $60。"
    y3RevenueK: 992.5
    y3EbitdaK: -907.25
    cashLowPointK: 75.93
    keyAssumptionChanges:
      - "ARPU 维持在每位活跃工人年化 $60。"
      - "第 3 年末达到 3-4 家平台、共 20000 名活跃工人。"
      - "毛利率维持在 BP 目标的 70%。"
  upside:
    description: "首个试点更快完成转化、相邻品类在第 18 个月前跑通，且综合变现提升到每位工人每年 $66。"
    y3RevenueK: 1215.0
    y3EbitdaK: -760.0
    cashLowPointK: 310.0
    keyAssumptionChanges:
      - "ARPU 比基准情形高 10%。"
      - "第 3 年末活跃工人规模接近 24000。"
      - "随着打款规模放大覆盖合作成本，毛利率提升到 72%。"
sensitivity:
  - variable: ARPU
    downsideCase: "$54 annual per worker"
    baseCase: "$60 annual per worker"
    upsideCase: "$66 annual per worker"
    y3RevenueImpactK: -99.25
    cashImpactK: -170.0
  - variable: CAC
    downsideCase: "$55 per worker enabled"
    baseCase: "$40 per worker enabled"
    upsideCase: "$30 per worker enabled"
    y3RevenueImpactK: -60.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: "2.5% monthly worker churn"
    baseCase: "1.5% monthly worker churn"
    upsideCase: "1.0% monthly worker churn"
    y3RevenueImpactK: -115.0
    cashImpactK: -140.0
  - variable: sales cycle
    downsideCase: "Two quarters from paid pilot to production"
    baseCase: "One quarter from paid pilot to production"
    upsideCase: "Pilot expands within the same quarter"
    y3RevenueImpactK: -180.0
    cashImpactK: -260.0
  - variable: gross margin
    downsideCase: "65% from higher payout and regulated-partner costs"
    baseCase: "70%"
    upsideCase: "72%"
    y3RevenueImpactK: 0.0
    cashImpactK: -135.0
  - variable: hiring pace
    downsideCase: "Three hires pulled forward before production traction"
    baseCase: "Current quarterly ramp"
    upsideCase: "Two hires delayed until after Q2Y2"
    y3RevenueImpactK: 0.0
    cashImpactK: -200.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> Platforms
      Platforms --> ActiveWorkers
      ActiveWorkers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
      Revenue --> COGS
      Cash --> Hiring
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形收入来自一个试点扩展成 3-4 家量产平台，并把活跃工人规模放大到 20000 名，年化 ARPU 约 $60。
  - checkName: 必须做对的事
    finding: 第一个单城单品类群组必须足够快地证明至少达到 BP 中设定的 10% 可靠性提升，才能在一个季度内转成量产合同。
  - checkName: 模型会失效的情况
    finding: 更长的销售周期或更弱的定价，是现金风险最大的变量，因为其中任意一个都会让基准情形在下一轮融资前现金跌破零。
  - checkName: 下一轮融资证明点
    finding: 当公司拥有 3-4 家量产客户、约 10k 名活跃工人，并且一个相邻品类已经上线时，下一轮融资逻辑才成立。
sanityChecks:
  ruleOf40: "Y3 增长 115.8% + EBITDA 利润率 -91.4% = 24.4%"
  burnMultiple: "Y3 净烧钱 $907K / 净新增收入 $533K = 1.7x"
  revenuePerFte: "Y3 基于平均 13.5 名 FTE 计算的人均收入为 $74K（低于成熟 SaaS 常见的 $200-400K 基准）"
  flags:
    - "模型把 customers 视为活跃工人数，而不是企业 logo 数，因为 BP 的定价是按活跃工人计费。"
    - "Y3 收入已经很快逼近研究中的 SOM，因此真正的上行空间要求公司在第 18 个月前就向相邻品类扩张。"
    - "到 Y3 EBITDA 仍为负，因此即便本轮融资执行顺利，公司依旧需要后续融资。"
    - "毛利率假设受监管合作伙伴成本能控制在 30% COGS 内；如果 RBI 结构更严格，抽成会下滑、回本期也会变差。"
