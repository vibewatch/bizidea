slug: domestic-worker-earnings-rail
date: 2026-04-29
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-05"
    unit: month
    source: "[BP date 2026-04-29；模型从下一个月开始]"
  - id: A2
    name: pre-seed 轮初始现金
    value: "2.30"
    unit: USDM
    source: "[BP fundingAsk $2-3M]，并采用启发式设定：对一家精简的印度早期创业公司 24 个月计划，取区间偏低中位值"
  - id: A3
    name: 每位活跃工人的年化 ARPU
    value: "60"
    unit: USD per worker per year
    source: "[BP operatingAssumptions 提到年化变现约 $60；research 市场 SAM/SOM]"
  - id: A4
    name: 每位活跃工人的月度 ARPU
    value: "5"
    unit: USD per worker per month
    source: "[由 A3 推导]"
  - id: A5
    name: 毛利率目标
    value: "70"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A6
    name: 月度活跃工人流失率
    value: "1.5"
    unit: percent
    source: "[创业财务启发式：一旦嵌入式 B2B 工作流上线，粘性较强]"
  - id: A7
    name: 首个付费试点时间与规模
    value: "Month 6 with 500 active workers"
    unit: milestone
    source: "[BP investorMemo.firstCustomer 初始合同为 500-1500 名工人；BP milestones 为 6-8 周试点]"
  - id: A8
    name: 第 1 年期末活跃工人数
    value: "3000"
    unit: workers
    source: "[BP 0-12 个月里程碑：一个量产合同转化并加一个第二部署；取早期平台铺开保守中位数]"
  - id: A9
    name: 第 2 年期末活跃工人数
    value: "11500"
    unit: workers
    source: "[BP 12-24 个月里程碑：3-4 家量产客户、约 10000 名活跃工人]，并加少量启发式增量：相邻品类初测带来的轻微超额"
  - id: A10
    name: 第 3 年期末活跃工人数
    value: "20000"
    unit: workers
    source: "[BP 24-36 个月里程碑；research.market.som 假设第 3 年服务约 20k 工人]"
  - id: A11
    name: 各岗位年度全包现金薪酬
    value: "Leadership 90k；Engineering 60k；Ops/CS 36k；Risk/Compliance 54k；Sales/BD 42k；G&A/Finance 30k"
    unit: USD per FTE per year
    source: "[创业财务启发式：印度获风投注资种子期团队的现金薪酬，已含工资税与福利]"
  - id: A12
    name: 创始人时间分配
    value: "30% R&D，40% sales/partnerships，30% G&A"
    unit: allocation
    source: "[创业财务启发式：pre-seed 阶段由创始人亲自做企业销售]"
  - id: A13
    name: 非薪酬运营支出爬坡
    value: "Y1 Q1 每月 18k，升至 Y3 Q4 每月 86k"
    unit: USDK per month
    source: "[创业财务启发式]，并锚定企业试点差旅、云成本、合规、法务与受监管工作流的客户部署支持"
  - id: A14
    name: 下一轮融资目标里程碑
    value: "3-4 production customers, ~10k active workers, adjacent category live"
    unit: milestone
    source: "[BP 12-24 个月里程碑；BP fundingAsk useOfFundsSummary]"
  - id: A15
    name: 每位活跃工人的综合 CAC
    value: "0.04"
    unit: USDK per worker
    source: "[由模型 Y2-Y3 销售与营销支出除以活跃工人毛新增数推导]"
