problem: >-
  私人助学贷款机构必须在招生和放款的时间窗口内做出还款能力决策，但收入核验往往卡在借款人沟通、第三方数据拉取和人工异常审核之间的碎片化队列里。这个队列一旦变慢，机构要么眼睁睁看借款人流失、支持团队压力陡增，要么放松风控标准。结果是在贷款可获得性、客户体验和可站得住脚的审批之间被迫做痛苦取舍。
targetUser:
  primary: >-
    美国私人助学贷款机构里负责审批运营和信贷政策的负责人，这些机构要处理季节性激增的在校生贷款申请
  secondary: >-
    同一批机构里负责借款人体验和贷后服务的负责人，他们主管文件补齐、状态更新和申请转化
  buyer: "首席信贷官或审批运营负责人"
startupThesis:
  nonObviousInsight: >-
    当 Sallie Mae 这样的放贷机构把收入核验外包出去之后，稀缺资源就不再是原始数据拉取本身，而是把已核验的收入转成快速、符合政策、又不伤害贷款可获得性的还款能力决策的那套工作流。真正能赢的公司，会拿下异常处理逻辑、借款人跟进和还款能力审计留痕，而不只是核验 API 本身。
  beachhead: >-
    拥有集中式审批团队的美国私人助学贷款机构，它们必须在招生高峰期的 24-72 小时内，为在校生贷款和职业培训贷款清掉收入类审批条件
  wedge: >-
    一套还款能力决策工作台，在助学贷款审批队列内部编排收入拉取、缺失证据跟进、政策核查，并生成可备查的决策备忘录
  whyNowCatalyst: >-
    Sallie Mae 采用 Nova Credit 用于私人贷款审批，说明主要助学贷款机构如今已经有预算去升级收入核验，这让下游的还款能力工作流眼下正好可以卖出去。
  ventureScalePath: >-
    先从私人助学贷款审批切入，再把同一套决策工作台扩展到再融资、校方关联融资、信用合作社教育贷款，以及其他还款能力核验与客户体验高度绑定、且有明确时限压力的消费信贷类别。
solution: >-
  这家初创公司接入放贷机构的贷款发放系统（LOS）、收入核验供应商和借款人沟通渠道，把散落的供应商仪表盘和人工跟进合并成一个还款能力队列。产品按截止日期风险和缺失证据给文件排优先级，为每笔申请推荐下一步动作，并把已核验的收入转成带引用来源的、符合放贷机构自身政策的还款能力规则。审批人员拿到的是一份决策备忘录，而不是原始数据包；借款人体验团队则得到结构化的状态更新，往返沟通大幅减少。随着时间推移，产品会学习哪些申请模式清得快、哪些异常反复出现、哪些政策阈值造成的可避免损失最多，从而在商品化的核验数据之上，形成一层自有的决策能力。
goToMarketSeed:
  firstCustomer: >-
    美国私人助学贷款机构的审批运营负责人，该机构正经历本科生或职业培训贷款申请的季节性激增，并在学费缴纳截止日前苦于清不完收入类审批条件
  buyingTrigger: >-
    即将到来的开学季申请激增、审批条件积压指标上升，或是要求在不放松负责任放贷把控的前提下加快审批的高层指令
  currentAlternative: >-
    贷款发放系统里的规则引擎，加上人工收集文件、供应商仪表盘、邮件或短信跟进，以及审批人员的异常队列
  switchingReason: >-
    这个切口把一个缓慢的核验子流程转成了当天可下决策的工作流，减少了申请流失和人工触达次数，同时给信贷负责人更干净的还款能力证据。
  pricingHypothesis: >-
    按放款量或已核验申请量计费的年度 SaaS 订阅，另有面向借款人沟通和政策分析的高级模块
