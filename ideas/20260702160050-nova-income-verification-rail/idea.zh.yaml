topRisks:
  - name: "平台依赖"
    description: "如果核验供应商或核心贷款发放系统进步太快，这家初创公司可能会被挤压成一层很薄的集成层。"
    mitigation: "拿下放贷机构专属的决策工作流、政策逻辑和异常数据集，而不是在原始数据拉取上竞争，并从第一天起就保持供应商中立。"
  - name: "销售季节性集中"
    description: "滩头市场绑定在开学季高峰上，可能造成买单周期忽高忽低，拖慢早期 ARR 增长。"
    mitigation: "在高峰季之前就靠积压削减和负责任放贷指标去卖，然后在每家放贷机构内部向再融资和非高峰产品扩展，把营收拉平。"
  - name: "合规信任缺口"
    description: "信贷负责人可能会因为担心文档留痕不足或监管审查而不敢让还款能力决策自动化。"
    mitigation: "先从人工在环的建议、可引用的审计留痕和可配置的政策规则起步，尽量贴近放贷机构现有的审查流程。"
