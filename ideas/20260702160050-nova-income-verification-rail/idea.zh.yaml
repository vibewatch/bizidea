jobsToBeDone:
  - job: >-
      当高峰季的助学贷款申请带着未解决的收入问题落地时，帮审批团队迅速判断下一步该做什么，让他们能在借款人错过学费缴纳截止日之前把文件清掉。
    currentAlternative: "在 LOS 里人工追文件，外加独立的供应商仪表盘和审批人员的手写记录"
    successMetric: "从核验启动到还款能力决策的中位耗时，以及截止日前的审批条件清理率"
  - job: >-
      当信贷管理层需要证明更快的决策依然经得起推敲时，帮他们把每一次还款能力判断都打包成有据可查的理由，让他们能在不拖慢队列的前提下为批准和拒绝结果做出解释。
    currentAlternative: "表格审查、QA 抽样和人工准备审计备忘录"
    successMetric: "生成可备查抽样所需的耗时，以及附带完整引用证据的决策占比"
