      rationale: 竞争很激烈，因为多家厂商已经在讲同一套广覆盖、自动化、核验更快的故事；真正空出来的地盘更薄、也更偏工作流专属。
      sourceRefs:
      - 2
      - 10
      - 20
      - 31
      - 41
      - 53
  pestle:
  - factor: political
    impact: neutral
    point: 开放银行的落地仍是活跃的政策议题，围绕消费者授权数据访问的时间表和具体操作细节仍可能变动。
    sourceRefs:
    - 71
  - factor: economic
    impact: positive
    point: 教育借款在 2024-25 年重新回升，持续给放贷机构和家庭带来高效填补学费缺口的压力。
    sourceRefs:
    - 81
  - factor: social
    impact: negative
    point: 需要按月还款的借款人以及还款逾期的借款人比例相较 2022 年都有上升，让还款能力审查一直处于聚光灯下。
    sourceRefs:
    - 80
  - factor: technological
    impact: positive
    point: 高覆盖率的银行流水、薪资和文档核验通道已经存在，降低了在其之上构建工作流层的技术门槛。
    sourceRefs:
    - 3
    - 10
    - 47
