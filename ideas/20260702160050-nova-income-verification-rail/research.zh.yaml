      score: 4
      rationale: 初创公司仍然依赖上游的银行流水、薪资、文档和核验通道，这些通道的覆盖率、刷新频率和合规用途立场都会影响产品表现。
      sourceRefs:
      - 3
      - 10
      - 31
      - 47
      - 66
