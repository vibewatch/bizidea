market:
  tam:
    value: $53.2M
    rationale: Use Sallie Mae’s $7.4B 2025 private-education originations and 63% year-end 2025 market share to infer an approximately $11.7B market, then divide by NCES’s $7.7k average annual loan amount proxy to estimate ~1.52M file-equivalents; at $35 of workflow software value per file-equivalent, TAM is about $53.2M.
    isEstimate: true
    sourceRefs:
    - 84
    - 91
    - 92
  sam:
    value: $34.6M
    rationale: Apply a 65% filter to focus on centralized in-school and career-loan workflows most likely to run dedicated underwriting queues and buy third-party verification now; 1.52M × 65% × $35 ≈ $34.6M.
    isEstimate: true
    sourceRefs:
    - 88
    - 91
    - 92
  som:
    value: $4.5M
    rationale: Year-3 SOM assumes ~150k reachable file-equivalents across 4-6 lenders or education-finance programs at ~$30 per file-equivalent, reflecting a concentrated buyer set and slower regulated deployments.
    isEstimate: true
    sourceRefs:
    - 55
    - 91
    - 92
