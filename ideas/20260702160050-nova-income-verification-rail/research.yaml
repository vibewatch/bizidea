  adoptionFrictionMatrix:
  - friction: Bank procurement and third-party risk review
    severity: high
    affectedBuyer: Chief Credit Officer and risk/compliance stakeholders
    mitigation: Lead with a vendor-risk packet, narrow data retention scope, and preserve human approval authority with cited evidence trails.
    sourceRefs:
    - 71
    - 75
  - friction: Integration into existing LOS, communications, and exception queues
    severity: high
    affectedBuyer: Underwriting operations leader
    mitigation: Use hosted sessions and thin-control-plane integrations that sit above existing systems instead of forcing a full replacement.
    sourceRefs:
    - 28
    - 55
  - friction: Coverage gaps and conflicting signals across payroll, bank, and document sources
    severity: medium
    affectedBuyer: Front-line underwriters and QA teams
    mitigation: Route by borrower type and preserve multi-source fallback with explicit escalation logic when data disagree.
