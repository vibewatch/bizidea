topRisks:
  - name: "Platform dependency"
    description: "If verification providers or core loan-origination systems improve quickly, the startup could be squeezed into a thin integration layer."
    mitigation: "Own the lender-specific decision workflow, policy logic, and exception dataset rather than competing on the raw data pull, and stay provider-agnostic from day one."
  - name: "Seasonal sales concentration"
    description: "A beachhead tied to back-to-school peaks could create lumpy buying cycles and slow early ARR growth."
    mitigation: "Sell before peak season on backlog reduction and responsible-lending metrics, then expand within each lender across refinance and off-cycle products to smooth revenue."
  - name: "Compliance trust gap"
    description: "Credit leaders may hesitate to automate affordability decisions if they fear weaker documentation or regulator scrutiny."
    mitigation: "Start with human-in-the-loop recommendations, cited audit trails, and configurable policy rules that mirror the lender's existing review process."
