differentiator: >-
  Nova Credit and similar vendors provide the verified data layer, but they do not necessarily own the lender-specific
  operating workflow that clears affordability conditions at speed. Generic loan-origination systems also miss the
  borrower messaging, queue prioritization, and exception logic needed for seasonal education-finance underwriting.
  This startup sits one layer above commodity verification and one layer inside the lender's live queue, which is where
  switching costs and proprietary performance data can accumulate.
