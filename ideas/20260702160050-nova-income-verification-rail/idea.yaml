problem: >-
  Private student lenders have to make affordability decisions fast enough for enrollment and disbursement timelines,
  but income verification often lives in a fragmented queue between borrower outreach, third-party data pulls, and
  manual exception review. When that queue slows down, lenders either create borrower drop-off and support load or
  loosen controls around responsible lending. The result is a painful tradeoff between access, customer experience, and
  defensible underwriting.
targetUser:
  primary: >-
    Underwriting-operations and credit-policy leaders at U.S. private student lenders that process seasonal surges of
    in-school loan applications
  secondary: >-
    Borrower-experience and servicing leaders at the same lenders who own document completion, status updates, and
    application conversion
  buyer: "Chief Credit Officer or Head of Underwriting Operations"
startupThesis:
  nonObviousInsight: >-
    Once a lender like Sallie Mae externalizes income verification, the scarce asset is no longer the raw data pull;
    it is the workflow that turns verified income into fast, policy-ready affordability decisions without hurting
    access. The winning company will own the exception logic, borrower follow-up, and audit trail around
    affordability, not just the verification API itself.
  beachhead: >-
    U.S. private student lenders with centralized underwriting teams that must clear income conditions for in-school and
    career-loan applications within 24-72 hours during peak enrollment months
  wedge: >-
    An affordability decision workbench that orchestrates income pulls, missing-evidence follow-up, policy checks, and
    audit-ready decision memos inside the student-loan underwriting queue
  whyNowCatalyst: >-
    Sallie Mae's adoption of Nova Credit for private-loan underwriting shows major student lenders are now budgeted to
    modernize income verification, making the downstream affordability workflow newly sellable right now.
  ventureScalePath: >-
    Start with private student loan underwriting, then expand the same decision workspace into refinance, school-linked
    financing, credit-union education loans, and other deadline-driven consumer lending categories where verified
    affordability and customer experience are tightly coupled.
solution: >-
  The startup plugs into a lender's loan-origination system, income-verification provider, and borrower communications
  stack to create one affordability queue instead of scattered vendor dashboards and manual follow-ups. It prioritizes
  files by deadline risk and missing evidence, recommends the next action for each application, and translates verified
  income into lender-specific affordability rules with a cited audit trail. Underwriters get a decision memo instead of
  a raw data payload, while borrower-experience teams get structured status updates and fewer back-and-forth requests.
  Over time, the product learns which application patterns clear quickly, which exceptions recur, and which policy
  thresholds cause the most avoidable fallout, creating a proprietary decisioning layer above commodity verification
  data.
goToMarketSeed:
  firstCustomer: >-
    Head of underwriting operations at a U.S. private student lender handling at least one peak-season surge of
    undergraduate or career-program applications and struggling to clear income conditions before school payment
    deadlines
  buyingTrigger: >-
    An upcoming back-to-school application surge, rising condition-backlog metrics, or a mandate to speed underwriting
    without weakening responsible-lending controls
  currentAlternative: >-
    Loan-origination-system rule engines plus manual document collection, vendor dashboards, email or SMS follow-up,
    and underwriter exception queues
  switchingReason: >-
    The wedge converts a slow verification sub-process into a same-day decision workflow, reducing abandonments and
    manual touches while giving credit leaders cleaner affordability evidence.
  pricingHypothesis: >-
    Annual SaaS subscription priced by funded-loan volume or verified-application volume, with premium modules for
    borrower communications and policy analytics
