jobsToBeDone:
  - job: >-
      When a peak-season student-loan application lands with unresolved income questions, help the underwriting team
      decide the next best action fast, so they can clear the file before the borrower misses a school payment
      deadline.
    currentAlternative: "Manual document chase inside the LOS plus separate vendor dashboards and underwriter notes"
    successMetric: "Median hours from verification start to affordability decision and condition-clearance rate before deadline"
  - job: >-
      When credit leadership needs proof that faster decisions are still responsible, help them package each
      affordability call with source-backed rationale, so they can defend approval and decline outcomes without slowing
      the queue.
    currentAlternative: "Spreadsheet reviews, QA sampling, and manual audit memo preparation"
    successMetric: "Hours to produce an audit-ready sample and percentage of decisions with complete cited evidence"
