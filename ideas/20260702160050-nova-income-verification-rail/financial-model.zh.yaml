fundingAsk:
  round: pre-seed
  amountM: 2.3
  runwayMonths: 18
  milestone: "拿下 5 个付费项目，把 2-3 个试点转成正式生产合同，验证一条可复用的多通道集成方案，并在冲刺种子轮之前验证一个相邻教育金融共创客户。"
