    baseCase: "满载 CAC 稳定在每个正式生产客户约 $230K。"
    upsideCase: "合作伙伴引荐和案例背书让 CAC 更接近 $190K。"
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
  - variable: "流失率"
