    upsideCase: "一个规模化岗位可以延后一个季度招聘而不拖慢交付。"
    y3RevenueImpactK: 0.0
    cashImpactK: -190.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      NamedAccounts[目标放贷机构] --> PaidPilots[付费试点]
      PaidPilots --> ProductionQueues[正式生产队列]
      ProductionQueues --> Expansion[更多队列和模块]
      Expansion --> Revenue[平台加按量收入]
      Revenue --> GrossProfit[毛利]
      GrossProfit --> Cash[现金与现金跑道]
modelSanity:
  - checkName: "收入引擎"
    finding: "基准收入的来源是付费账户数从第一年末的三个增长到第三年第四季度的六个，同时每落地一家放贷机构，都会从试点定价逐步升级到更高价值的正式生产范围。"
  - checkName: "必须走对的一步"
    finding: "头两个试点必须在大约一个审批季内转化，并在现有放贷机构内部扩张，否则这个高度集中的滩头市场撑不起第二年第四季度的收入跃升。"
  - checkName: "模型会在哪里崩掉"
    finding: "如果销售周期拉长到 150 天左右，或者毛利率停滞在约 66%，下行情景会让现金在种子轮完成前逼近约 $0.2M。"
  - checkName: "下一轮融资的证明点"
    finding: "种子轮的故事是五个付费项目、两到三个正式生产转化，以及一个用同一套控制面拿下的相邻教育金融共创客户。"
sanityChecks:
  ruleOf40: "第三年增速 103.0% + EBITDA 利润率 2.1% = 105.1%。"
  burnMultiple: "第二年的燃烧倍数约为 0.5 倍，用约 $0.60M 的 EBITDA 燃烧对比约 $1.20M 的净新增 ARR；EBITDA 在第三年第三季度转正。"
  revenuePerFte: "第三年人均营收 $305K，按 $3.05M 收入和年末 10 名全职员工计算（对标基准 $200–400K SaaS）。"
  flags:
    - "滩头市场很集中，六个付费项目仍意味着相当程度的单一客户收入集中度。"
    - "customersEop 既包含付费试点也包含正式生产合同，所以在第二年的大部分时间里，可重复的正式生产收入都落后于账户总数这个表面数字。"
    - "基准情形假设至少有一家放贷机构在第三年扩展到第一个队列之外；如果没有同账户扩张，即便客户数量不变，收入也会落空。"
    - "只有当集成和审计打包变得可复用、而不是为每家放贷机构定制时，毛利率才能达到 70% 的目标。"
    - "核心私人助学贷款机构之外的相邻市场仍未得到验证，长期的风险投资级别故事取决于再融资或校方关联融资市场能否真正打开。"
    - "现金是按 EBITDA 建模的，采购节奏、预付试点款项或意外的合规资本支出，都可能让实际现金低点发生偏移。"
