slug: student-loan-affordability-os
date: '2026-07-02'
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-08"
    unit: YYYY-MM
    source: "[BP date 2026-07-02] 模型从商业计划书日期之后的第一个完整月份开始。"
  - id: A2
    name: "pre-seed 到账后的期初现金"
    value: "$2.3M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2–4M; BP fundingAsk.runwayMonths 18] 基准情形取 pre-seed 区间的中位值，足以支撑到第一个 seed-ready 里程碑，同时仍保留六个月缓冲。"
  - id: A3
    name: "起始付费客户数"
    value: "0"
    unit: count
    source: "[BP executiveSummary; BP milestones 0–12 months] 公司从零收入起步，必须先拿下付费试点。"
  - id: A4
    name: "付费客户定义"
    value: "一家放贷机构或教育金融项目处于付费试点或正式生产合同之下"
    unit: definition
    source: "[BP gtm.pricing; BP businessModel.revenueStreams] customersEop 统计所有已经在为试点或正式生产范围付费的客户账户。"
  - id: A5
    name: "付费试点定价"
    value: "约 90 天 $60K（约合每月 $20K）"
    unit: USD_per_pilot
    source: "[BP investorMemo.firstCustomer.initialContract $40k-$80k] 模型对首个审批队列部署取试点价格区间的中位值。"
  - id: A6
    name: "正式生产合同及扩张价值"
    value: "正式生产合同起步约 $300K ARR，随着放款量、沟通模块和分析模块的附加，逐步走高到约 $500K 的年度价值"
    unit: USD_per_customer_year
    source: "[BP investorMemo.firstCustomer.initialContract $200k-$400k annual software plus volume fees; BP businessModel.expansionLevers; research.market.som] 第三年价值仍低于研究部分给出的 SOM 上限，同时假设存在一定的同账户扩张。"
  - id: A7
    name: "客户增长节奏"
    value: "第 12 个月 3 家付费客户，第二年第四季度 5 家，第三年第四季度 6 家，其中约 4 家在第三年第四季度进入完全正式生产状态"
    unit: customers
    source: "[BP milestones; BP product.twelveMonth; BP product.twentyFourMonth; BP market.som] 基准情形对应计划中转化早期试点、并在高度集中的买家群体里谨慎扩张的设定。"
  - id: A8
    name: "收入确认方式"
    value: "期末付费账户数乘以每账户已实现的混合收入：第一年每月 $20K-$25K，第二年每季度 $85K-$105K，第三年每季度 $123K-$155K"
    unit: formula
    source: "[BP gtm.pricing; BP businessModel.revenueStreams; BP investorMemo.firstCustomer.initialContract] 这让收入直接和客户数、以及试点转正式生产的比例挂钩。"
  - id: A9
    name: "毛利率爬坡"
    value: "第一年 45%-52%，第二年 58%-65%，第三年 66%-70%"
    unit: gross_margin_pct
    source: "[BP businessModel.targetGrossMarginPct 70; BP strategicChoices.sequencingRationale; BP operations] 早期阶段的实施、借款人跟进和供应商风险成本更重，模型要到后期才能达到商业计划书设定的目标毛利率。"
  - id: A10
    name: "招聘时间表"
    value: "第 1 个月：创始人、创始工程师、产品-信贷政策负责人；第 3 个月：解决方案工程师；第 9 个月：客户成功；第 16 个月：第二名工程师；第 19 个月：GTM；第 22 个月：G&A-合规；第 30 个月：第三名工程师；第 35 个月：第二名解决方案岗"
    unit: timeline
    source: "[BP team; BP strategicChoices.sequencingRationale] 招聘节奏保持精简，直到试点转化后才增加交付、GTM 和合规产能，且只在工作流证明可重复之后才补齐。"
  - id: A11
    name: "满载年度薪酬区间"
    value: "创始人 $160K；工程 $185K；产品-信贷政策 $160K；解决方案 $150K；客户成功 $135K；GTM $170K；G&A-合规 $120K"
    unit: USD_per_fte_year
    source: "[BP team roles + startup-finance heuristic for lean U.S. pre-seed enterprise software compensation] 这些薪酬区间体现出偏领域专业但仍属早期阶段的现金薪酬水平。"
  - id: A12
    name: "合规顾问的处理方式"
    value: "供应商风险支持在早期按外包 G&A 支出建模，直到第 22 个月才招入第一位全职 G&A-合规员工"
    unit: method
    source: "[BP team compliance and vendor-risk advisor startTiming Month 3; BP risks procurement and vendor-risk delays] 早期的合规需求属于顾问性质，还不需要全职岗位。"
  - id: A13
    name: "非薪酬类运营预算"
    value: "第一年非薪酬类运营支出从每月 $23K 爬升到 $40K；第二年从每季度 $108K 到 $138K；第三年从每季度 $147K 到 $165K"
    unit: USD
    source: "[BP operations + startup-finance heuristic] 预算覆盖云服务、差旅、法务、保险、审计打包和实施相关开销，且不假设有大规模付费获客引擎。"
  - id: A14
    name: "现金流简化处理"
    value: "用 EBITDA 近似现金流变动"
    unit: formula
    source: "[startup-finance heuristic] 在 pre-seed 规模上，资本支出、债务、税项和营运资金的时间差异均假设可忽略不计。"
  - id: A15
    name: "月度流失率"
    value: "2.5%"
    unit: percent_per_month
    source: "[startup-finance heuristic for early regulated workflow SaaS] 工作流一旦嵌入应该会很有粘性，但滩头市场仍偏窄，因此流失率假设保持保守。"
  - id: A16
    name: "CAC 计算方式"
    value: "满载获客支出对应每个正式生产客户约 $230K 的 CAC"
    unit: USD_per_customer
    source: "[BP gtm.channels; BP gtm.funnelTargets; BP risks] CAC 包括创始人亲自销售投入的时间、GTM 岗位薪酬和非薪酬类销售与市场支出，除以第三年第四季度大约四个正式生产转化客户。"
  - id: A17
    name: "下行情景的变化项"
    value: "第三年第四季度 5 个付费项目，年度价值约 $450K，毛利率收尾在约 66%"
    unit: scenario_inputs
    source: "[BP risks; research.reportMemo.sensitivityCases] 下行情景反映转化更慢、同账户扩张更少、交付更依赖人工服务的情况。"
  - id: A18
    name: "上行情景的变化项"
    value: "第三年第四季度 7 个付费项目，年度价值约 $560K，毛利率收尾在约 72%"
    unit: scenario_inputs
    source: "[BP businessModel.expansionLevers; BP milestones; research.validationSignals] 上行情景假设正式生产转化更快、模块附加更早、集成可复用性更高。"
  - id: A19
    name: "季度薪酬滚动方式"
    value: "第二、三年的薪酬行按每季度内实际入职月份计算，而不只用年末的人头快照"
    unit: method
    source: "[Headcount column convention; BP team startTiming] 这样能让季度薪酬支出与固定的六列人头结构保持一致。"
  - id: A20
    name: "资金用途分配"
    value: "工程 40%，GTM 25%，G&A 10%，缓冲资金 25%"
    unit: allocation
    source: "[BP fundingAsk.useOfFundsSummary; model burn curve] 大部分现金投入产品和集成开发，以及精简的放贷机构获客投入，四分之一的融资额留作六个月缓冲。"
