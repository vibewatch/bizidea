scenarios:
  downside:
    description: "试点转化更慢，到第三年第四季度只有五个付费项目在运行，实施比计划更依赖人工服务。"
    y3RevenueK: 2250.0
    y3EbitdaK: -360.0
    cashLowPointK: 210.0
    keyAssumptionChanges:
      - "第三年第四季度期末客户数为 5，而不是 6。"
      - "混合年度价值稳定在约 $450K，而不是基准情形的扩张路径。"
      - "毛利率收尾在约 66%，因为借款人跟进和审计打包的可复用性更低。"
  base:
    description: "基准情形第一年末达到三个付费账户，第二年第四季度达到五个，第三年第四季度达到六个，并伴随小幅同账户扩张。"
    y3RevenueK: 3045.0
    y3EbitdaK: 63.0
    cashLowPointK: 698.3
    keyAssumptionChanges:
      - "第 12 个月三个付费账户，第二年第四季度五个，第三年第四季度六个。"
      - "第三年第四季度约有四个账户进入完全正式生产状态，其余仍在爬坡或刚完成扩张。"
      - "随着集成和决策备忘录趋于标准化，毛利率在第三年第四季度达到商业计划书设定的 70% 目标。"
  upside:
    description: "第六个项目提前到来，第七个在第三年第四季度落地，首批正式生产队列证明 ROI 后模块附加速度加快。"
    y3RevenueK: 3660.0
    y3EbitdaK: 510.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
      - "第三年第四季度期末客户数达到 7，而不是 6。"
      - "随着沟通模块和分析模块更早附加，混合年度价值接近 $560K。"
      - "毛利率达到约 72%，因为实施打法能在各放贷机构间更快复用。"
sensitivity:
  - variable: "ARPU"
    downsideCase: "稳态年度价值收于约 $450K。"
    baseCase: "基准情形假设年度价值约 $500K，第三年第四季度的运行速率随账户扩张而更高。"
    upsideCase: "第二队列和模块附加把年度价值拉向 $560K。"
    y3RevenueImpactK: -320.0
    cashImpactK: -240.0
  - variable: "CAC"
