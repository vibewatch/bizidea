slug: student-loan-affordability-os
date: '2026-07-02'
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-08"
    unit: YYYY-MM
    source: "[BP date 2026-07-02] The model starts in the first full month after the dated business plan."
  - id: A2
    name: "Opening cash after pre-seed close"
    value: "$2.3M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2–4M; BP fundingAsk.runwayMonths 18] The base case uses a mid-range pre-seed large enough to reach the first seed-ready milestone and still hold a six-month buffer."
  - id: A3
    name: "Starting paying customers"
    value: "0"
    unit: count
    source: "[BP executiveSummary; BP milestones 0–12 months] The company starts pre-revenue and must first win paid pilots."
  - id: A4
    name: "Paying customer definition"
    value: "One lender or education-finance program under a paid pilot or production contract"
    unit: definition
    source: "[BP gtm.pricing; BP businessModel.revenueStreams] customersEop counts any account already paying for pilot or production scope."
  - id: A5
    name: "Paid pilot pricing"
    value: "$60K over about 90 days (~$20K per month)"
    unit: USD_per_pilot
    source: "[BP investorMemo.firstCustomer.initialContract $40k-$80k] The model uses the midpoint of the pilot range for the first queue deployment."
  - id: A6
    name: "Production contract and expansion value"
    value: "Production starts near $300K ARR and blends toward about $500K annual value as volume, communications, and analytics attach"
    unit: USD_per_customer_year
    source: "[BP investorMemo.firstCustomer.initialContract $200k-$400k annual software plus volume fees; BP businessModel.expansionLevers; research.market.som] Year-3 value stays below the research SOM ceiling while assuming some same-account expansion."
  - id: A7
    name: "Customer ramp"
    value: "3 paying accounts by M12, 5 by Q4Y2, and 6 by Q4Y3, with roughly 4 of the 6 in full production by Q4Y3"
    unit: customers
    source: "[BP milestones; BP product.twelveMonth; BP product.twentyFourMonth; BP market.som] The base case matches the plan to convert early pilots and expand cautiously inside a concentrated buyer set."
  - id: A8
    name: "Revenue recognition convention"
    value: "Period-end paying accounts multiplied by blended realized revenue per account: Y1 $20K-$25K per month, Y2 $85K-$105K per quarter, Y3 $123K-$155K per quarter"
    unit: formula
    source: "[BP gtm.pricing; BP businessModel.revenueStreams; BP investorMemo.firstCustomer.initialContract] This keeps revenue directly tied to customers and the pilot-to-production mix."
  - id: A9
    name: "Gross margin ramp"
    value: "45%-52% in Y1, 58%-65% in Y2, and 66%-70% in Y3"
    unit: gross_margin_pct
    source: "[BP businessModel.targetGrossMarginPct 70; BP strategicChoices.sequencingRationale; BP operations] Early periods carry heavier implementation, borrower follow-up, and vendor-risk cost before the model reaches the BP target margin."
  - id: A10
    name: "Hiring timeline"
    value: "M1 founder, founding engineer, and product-credit lead; M3 solutions engineer; M9 customer success; M16 second engineer; M19 GTM; M22 G&A-compliance; M30 third engineer; M35 second solutions hire"
    unit: timeline
    source: "[BP team; BP strategicChoices.sequencingRationale] Hiring stays lean until pilots convert, then adds delivery, GTM, and compliance capacity only after the workflow proves repeatable."
  - id: A11
    name: "Loaded annual compensation bands"
    value: "Founder $160K; engineering $185K; product-credit $160K; solutions $150K; customer success $135K; GTM $170K; G&A-compliance $120K"
    unit: USD_per_fte_year
    source: "[BP team roles + startup-finance heuristic for lean U.S. pre-seed enterprise software compensation] The bands reflect domain-heavy but still early-stage cash pay."
  - id: A12
    name: "Compliance advisor treatment"
    value: "Vendor-risk support is modeled as outsourced G&A spend through early scale, with the first full-time G&A-compliance hire only at M22"
    unit: method
    source: "[BP team compliance and vendor-risk advisor startTiming Month 3; BP risks procurement and vendor-risk delays] Early compliance needs are advisory rather than a full FTE."
  - id: A13
    name: "Non-payroll operating budget"
    value: "Y1 non-payroll opex ramps from $23K to $40K per month; Y2 from $108K to $138K per quarter; Y3 from $147K to $165K per quarter"
    unit: USD
    source: "[BP operations + startup-finance heuristic] Budget covers cloud, travel, legal, insurance, audit packaging, and implementation overhead without assuming a large paid-demand engine."
  - id: A14
    name: "Cash conversion simplification"
    value: "EBITDA approximates cash movement"
    unit: formula
    source: "[startup-finance heuristic] Capex, debt, taxes, and working-capital timing are assumed immaterial at pre-seed scale."
  - id: A15
    name: "Monthly churn"
    value: "2.5%"
    unit: percent_per_month
    source: "[startup-finance heuristic for early regulated workflow SaaS] The workflow should be sticky once embedded, but the narrow beachhead still warrants a conservative churn assumption."
  - id: A16
    name: "CAC convention"
    value: "Fully loaded acquisition spend implies about $230K CAC per production logo"
    unit: USD_per_customer
    source: "[BP gtm.channels; BP gtm.funnelTargets; BP risks] CAC includes founder-led selling time, the GTM hire, and non-payroll S&M, divided by roughly four full production conversions by Q4Y3."
  - id: A17
    name: "Downside scenario deltas"
    value: "5 paying programs by Q4Y3, about $450K annual value, and gross margin exiting near 66%"
    unit: scenario_inputs
    source: "[BP risks; research.reportMemo.sensitivityCases] The downside reflects slower conversion, less same-account expansion, and more services-heavy delivery."
  - id: A18
    name: "Upside scenario deltas"
    value: "7 paying programs by Q4Y3, about $560K annual value, and gross margin exiting near 72%"
    unit: scenario_inputs
    source: "[BP businessModel.expansionLevers; BP milestones; research.validationSignals] The upside assumes faster production conversion, earlier module attach, and more reusable integrations."
  - id: A19
    name: "Quarterly salary roll convention"
    value: "Y2-Y3 salary rows use actual month-of-hire timing inside each quarter rather than only the year-end headcount snapshots"
    unit: method
    source: "[Headcount column convention; BP team startTiming] This keeps quarterly salary expense consistent with the fixed six-column headcount schema."
  - id: A20
    name: "Use-of-funds allocation"
    value: "Engineering 40%, GTM 25%, G&A 10%, Buffer 25%"
    unit: allocation
    source: "[BP fundingAsk.useOfFundsSummary; model burn curve] Most cash funds product and integration build plus lean lender acquisition, while a quarter of the round is preserved as a six-month buffer."
