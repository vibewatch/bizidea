scenarios:
  downside:
    description: "Pilots convert more slowly, only five paying programs are live by Q4Y3, and implementation remains more services-heavy than planned."
    y3RevenueK: 2250.0
    y3EbitdaK: -360.0
    cashLowPointK: 210.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches 5 instead of 6."
      - "Blended annual value settles near $450K instead of the base expansion path."
      - "Gross margin exits near 66% because borrower follow-up and audit packaging stay less repeatable."
  base:
    description: "The base case lands three paying accounts by Y1 exit, reaches five by Q4Y2, and gets to six by Q4Y3 with modest same-account expansion."
    y3RevenueK: 3045.0
    y3EbitdaK: 63.0
    cashLowPointK: 698.3
    keyAssumptionChanges:
      - "Three paying accounts by M12, five by Q4Y2, and six by Q4Y3."
      - "About four accounts are in full production by Q4Y3, with the rest still ramping or newly expanded."
      - "Gross margin reaches the BP target of 70% by Q4Y3 as integrations and decision memos standardize."
  upside:
    description: "A sixth program arrives earlier, a seventh lands by Q4Y3, and modules attach faster once the first production queues prove ROI."
    y3RevenueK: 3660.0
    y3EbitdaK: 510.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches 7 instead of 6."
      - "Blended annual value approaches about $560K as communications and analytics attach earlier."
      - "Gross margin reaches roughly 72% because implementation playbooks reuse faster across lenders."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Steady-state annual value lands near $450K."
    baseCase: "Base case assumes about $500K annual value with a Q4Y3 run-rate above that as accounts expand."
    upsideCase: "Second-queue and module attach lift annual value toward $560K."
    y3RevenueImpactK: -320.0
    cashImpactK: -240.0
  - variable: "CAC"
    downsideCase: "Fully loaded CAC rises toward $280K per production logo."
    baseCase: "Fully loaded CAC stays near $230K per production logo."
    upsideCase: "Partner introductions and references keep CAC closer to $190K."
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
  - variable: "churn"
    downsideCase: "Monthly churn rises to 3.5% because the wedge feels too narrow for some accounts."
    baseCase: "Monthly churn holds near 2.5% once the workflow is embedded."
    upsideCase: "Monthly churn stays near 1.5% because lender policy logic and audit history create stickiness."
    y3RevenueImpactK: -180.0
    cashImpactK: -130.0
  - variable: "sales cycle"
    downsideCase: "Pilot-to-production conversion stretches toward 150 days."
    baseCase: "The first conversions happen in roughly one underwriting season, or about 90-120 days."
    upsideCase: "Reference wins compress conversion toward about 75 days."
    y3RevenueImpactK: -525.0
    cashImpactK: -340.0
  - variable: "gross margin"
    downsideCase: "Gross margin exits around 66%."
    baseCase: "Gross margin reaches the BP target of 70% by Q4Y3."
    upsideCase: "Gross margin reaches about 72% as integrations standardize sooner."
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: "hiring pace"
    downsideCase: "One GTM or delivery hire is pulled forward before production proof is complete."
    baseCase: "Scale hiring follows the lean timeline in A10."
    upsideCase: "One scale hire can be delayed by a quarter without slowing delivery."
    y3RevenueImpactK: 0.0
    cashImpactK: -190.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      NamedAccounts[Target lenders] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionQueues[Production queues]
      ProductionQueues --> Expansion[More queues and modules]
      Expansion --> Revenue[Platform + volume revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base revenue comes from moving from three paying accounts at Y1 exit to six by Q4Y3 while each landed lender expands from pilot pricing into higher-value production scope."
  - checkName: "Must go right"
    finding: "The first two pilots must convert within roughly one underwriting season and expand inside existing lenders, or the concentrated beachhead cannot support the Q4Y2 revenue step-up."
  - checkName: "Model breaks if"
    finding: "If sales cycles stretch toward 150 days or gross margin stalls near 66%, the downside case drives cash toward roughly $0.2M before a seed raise closes."
  - checkName: "Next-round proof"
    finding: "The seed story is five paying programs, two to three production conversions, and one adjacent education-finance design partner using the same control plane."
sanityChecks:
  ruleOf40: "Y3 growth 103.0% + EBITDA margin 2.1% = 105.1%."
  burnMultiple: "Y2 burn multiple is about 0.5x using roughly $0.60M of EBITDA burn against about $1.20M of net new ARR; EBITDA turns positive in Q3Y3."
  revenuePerFte: "$305K Y3 using $3.05M revenue and 10 year-end FTE (benchmark $200–400K SaaS)."
  flags:
    - "The beachhead is concentrated, so six paying programs still imply meaningful single-logo revenue concentration."
    - "customersEop includes paid pilots as well as production contracts, so recurring production revenue trails the headline account count through most of Y2."
    - "The base case assumes at least one lender expands beyond the first queue by Y3; without same-account expansion, revenue misses even if logo count holds."
    - "Gross margin only reaches the 70% target if integrations and audit packaging become reusable rather than bespoke for each lender."
    - "Adjacency beyond core private student lenders is still unproven, so the long-term venture case depends on refinance or school-linked financing opening up."
    - "Cash is modeled as EBITDA, so procurement timing, prepaid pilot cash, or unexpected compliance capex could shift the real cash trough."
