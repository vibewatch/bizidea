problem: >-
  电芯制造商在导入硅碳负极时，面对的是一套专为石墨设计的认证流程——一把完全不适配的工具。
  硅负极的体积膨胀和复杂的 SEI（固态电解质界面膜）动力学，让过去 20 年基于石墨电芯积累的每一条
  化成协议、测试矩阵模板和性能模型全部失效。工程团队每批负极材料需人工设计 50–100 个测试工况，
  把结果记在 Excel 和实验室笔记里，每个供应商认证耗费 $2–5M 的工程师工时，历时 6–18 个月——
  一颗电芯都还没出货。
targetUser:
  primary: "中国以外中型电芯制造商的电芯质量工程师和 NPI（新产品导入）负责人，正在评估或引入硅碳负极供应商"
  secondary: "需要在平台审批前获得经验证的硅负极电芯性能数据的电池包集成商和 EV OEM 电池工程团队"
  buyer: "电芯制造商的电芯研发副总裁或 NPI 总监"
startupThesis:
  nonObviousInsight: >-
    硅碳负极不只是需要更新化成协议——它让石墨时代认证流程的整个逻辑框架全部失效。
    所有假设（线性容量衰减、稳定 SEI、可预期膨胀）对硅来说都是错的；围绕石墨构建的现有质量管理工具，
    产出的是误导性结果，不只是慢。瓶颈不在实验室吞吐量，而在于根本没有一套硅负极原生的认证框架。
  beachhead: "亚太和欧洲电芯制造商中，在 2026–2027 年收到首批 Sicona SiCx 样品并启动首个硅负极认证项目的 NPI 工程团队"
  wedge: "结构化的硅特异性测试矩阵设计与化成协议库，从第一天起就以能捕捉硅原生失效模式的工作流程取代临时 Excel 记录"
  whyNowCatalyst: >-
    Sicona 获 ARENA 支持的 $45M 工厂开辟了中国以外首条商业级 SiCx 供应链，
    此前无硅负极材料可认证的电芯制造商，由此迎来了真实的认证启动信号。
  ventureScalePath: >-
    从中型电芯制造商的负极认证工作流程起步；逐步扩展至 BMS 标定数据生成、批次间质检追踪，
    以及跨客户匿名化化成协议库——最终成为硅、锂金属及更多下一代负极化学的行业标准。
solution: >-
  平台提供硅负极原生认证工作流程：NPI 工程师导入 SiCx 批次规格后，系统即生成针对 SiCx 电化学
  校准（而非石墨默认值）的硅优化测试矩阵，涵盖化成协议变体、倍率扫描、膨胀与循环寿命测试。
  来自 Neware、Arbin 和 Maccor 充放电测试仪的结果通过硬件无关连接器接入；平台按硅特异性
  合格/不合格标准追踪容量、库仑效率和膨胀指标。化成协议库以已发表文献为基础，持续从客户
  匿名运行结果中更新，按给定硅负载的预测循环寿命和首圈容量损失对化成配方排序推荐。
  供应商认证报告从积累的测试数据自动生成，将报告撰写时间从数周压缩至数小时，随时输出 OEM 就绪报告包。
