    successMetric: "2 signed pilot agreements by Day 90"
    owner: "Founder / BD lead"
  - horizon: "0–90 days"
    experiment: "Sicona co-marketing partnership conversation"
    hypothesis: "Sicona's commercial team will support a joint-customer introduction in exchange for co-branded protocol data visibility"
    successMetric: "Partnership MOU signed and at least 1 joint-customer introduction completed by Day 90"
    owner: "Founder / CEO"
  - horizon: "0–90 days"
    experiment: "Arbin and Neware connector prototype"
    hypothesis: "Raw cycler exports from Arbin and Neware can be normalized into a unified silicon-specific data model with <20 hours of per-customer configuration"
    successMetric: "Prototype ingests one real qualification dataset from each cycler OEM and outputs a normalized data model"
    owner: "Founding engineer"
  - horizon: "90–180 days"
    experiment: "First design-partner qualification program pilot"
    hypothesis: "Qualification cycle time is reduced by ≥40% versus customer's baseline graphite-era workflow"
