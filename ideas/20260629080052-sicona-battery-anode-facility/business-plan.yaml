risks:
  - risk: "Large cell makers build in-house silicon qualification tooling, shrinking the addressable mid-size market"
    likelihood: Medium
    impact: High
    mitigation: "Focus exclusively on mid-size and greenfield cell manufacturers (200–2,000 MWh/year) outside China who lack internal tooling resources; avoid pitching tier-1 makers until Series B."
  - risk: "Cycler OEMs (Arbin, Neware, Maccor) or Voltaiq ship silicon-specific qualification modules before the formation-protocol library generates defensible differentiation"
    likelihood: Medium
    impact: High
    mitigation: "Lock in hardware-agnostic multi-OEM integration and pursue cycler OEM partnerships before they ship competing features; accelerate protocol library data accumulation by signing 3+ design partners in Year 1."
  - risk: "Sicona's Port Kembla facility is delayed 12–24 months, deferring the SiCx qualification wave and the beachhead customer cohort"
    likelihood: Medium
    impact: Medium
    mitigation: "Target all commercial silicon anode suppliers — Group14, Sila, Nexeon — in parallel; the product is tied to the silicon anode adoption wave, not a single supplier's timeline."
  - risk: "Formation-protocol library accuracy is insufficient (<15% prediction error not achievable in Year 1), undermining the core product promise"
    likelihood: Medium
    impact: High
    mitigation: "Set accurate expectations in design-partner pilots; position library as advisory reference until accuracy is demonstrated; maintain scientific advisory board as a credibility backstop."
  - risk: "Cell manufacturers classify formation recipes and qualification data as sensitive IP and refuse cross-customer anonymized data sharing, blocking the library flywheel"
    likelihood: High
    impact: High
    mitigation: "Offer VPC or on-prem deployment and strict opt-in anonymization from day one; design library contribution as explicit customer consent, not default data pooling."
  - risk: "Pricing hypothesis ($80K–$150K/year per program) is too high for mid-size cell manufacturers with constrained QA tooling budgets"
    likelihood: Medium
    impact: Medium
    mitigation: "Validate ACV in first two design-partner pilots before scaling sales; prepare a lower-entry pricing tier ($30K–$50K/year) as a fallback that preserves SaaS economics at lower gross margin."

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3–5M"
  runwayMonths: 20
  useOfFundsSummary: >-
    20 months of runway buys: (1) founding team of 4 (CEO, CTO, electrochemistry lead, enterprise BD hired Month 4)
    plus second engineer (Month 6); (2) scientific advisory board retainer for formation-protocol library accuracy;
    (3) cloud infrastructure and cycler connector development; (4) design-partner program costs (travel, lab access
    for integration testing); (5) first two supplier partnership negotiations (Sicona, Group14/Sila). Target use:
    reach 2 paying customers ($80K+ ACV each) and demonstrated formation-protocol library accuracy (<15% prediction
    error) by Month 12, providing evidence base for a Series A raise at Month 18–20.
