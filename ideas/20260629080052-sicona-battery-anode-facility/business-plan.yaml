    hypothesis: "Protocols ranked by the library achieve <15% cycle-life prediction error versus full long-cycle runs on the first design-partner dataset"
    successMetric: "Blind prediction error <15% on held-out data from first design-partner program"
    owner: "Electrochemistry lead"
  - horizon: "180–365 days"
    experiment: "Group14 and Sila supplier referral channel"
    hypothesis: "Replicating the Sicona partnership model with Group14 and Sila unlocks at least 2 additional paying customers"
