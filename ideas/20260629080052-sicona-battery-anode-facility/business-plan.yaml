    experiment: "EU battery-passport evidence export feature"
    hypothesis: "European cell manufacturers will pay an incremental fee for EU Battery Regulation 2023/1542 aligned report exports"
    successMetric: "At least 1 EU customer cites compliance export as a purchase driver in closed-won analysis"
    owner: "Product lead"

operations:
  - "Cloud infrastructure: AWS or GCP for test data ingestion, storage, and cycler connector APIs; VPC and on-prem deployment option required for customers with sensitive IP concerns"
  - "Cycler hardware integration: canonical API/file connectors for Arbin MITS, Neware BTSDA, and Maccor — maintained as the primary technical moat against single-vendor incumbents"
  - "Scientific advisory board: 2–3 electrochemists from University of Wollongong and peer institutions retained to validate formation-protocol library accuracy and test-matrix templates"
  - "Data governance: strict opt-in anonymization for all cross-customer protocol benchmarking; separate VPC or on-prem deployment for customers unwilling to share data"
  - "Standards alignment: maintain prebuilt evidence templates versioned against EU Battery Regulation 2023/1542, UN 38.3, and major OEM review formats"
  - "Key partners: Sicona Battery Technologies (pilot customer and primary sample-supply referral channel); cycler OEMs Arbin, Neware, Maccor (integration and referral); ARENA and Battery Australia (regulatory and standards alignment)"

