problem: >-
  Battery cell manufacturers adopting silicon-carbon anodes face a qualification process designed for graphite —
  the wrong tool for a fundamentally different chemistry. Silicon's volumetric expansion and complex
  solid-electrolyte interphase dynamics invalidate every formation protocol, test matrix template, and performance
  model built over 20 years of graphite-cell production. Engineering teams run 50–100 manually designed test
  conditions per anode lot, log results in Excel and lab notebooks, and spend 6–18 months per supplier
  qualification at a cost of $2–5M in engineering time — before a single cell ships.
targetUser:
  primary: "Cell quality engineers and New Product Introduction leads at mid-size battery cell manufacturers outside China evaluating or onboarding silicon-carbon anode suppliers"
  secondary: "Battery pack integrators and EV OEM battery engineering teams who need validated silicon-anode cell performance data before platform approval"
  buyer: "VP of Cell R&D or Director of New Product Introduction at a battery cell manufacturer"
startupThesis:
  nonObviousInsight: >-
    Silicon-carbon anodes don't just require updated formation protocols — they invalidate the structural logic of
    graphite-era qualification workflows entirely. Every assumption (linear capacity fade, stable SEI, predictable
    swelling) is wrong for silicon, meaning incumbent QA tools built around graphite produce misleading results
    rather than merely slow ones. The bottleneck is not lab throughput; it is the absence of a silicon-anode-native
    qualification framework.
  beachhead: "NPI engineering teams at Asia-Pacific and European cell manufacturers receiving their first Sicona SiCx samples in 2026–2027 and running their first silicon anode qualification program"
  wedge: "Structured silicon-specific test-matrix design and formation-protocol library replacing ad-hoc Excel tracking with a workflow that captures silicon-native failure modes from day one"
  whyNowCatalyst: >-
    Sicona's ARENA-backed $45M facility creates the first commercial-scale SiCx supply pipeline outside China,
    triggering qualification programs at cell makers who previously had no silicon anode material to qualify.
  ventureScalePath: >-
    Start with anode qualification workflow for mid-size cell makers; expand into BMS calibration data generation,
    lot-to-lot QA tracking, and a cross-customer anonymized formation-protocol library that becomes the industry
    standard for all next-gen anode chemistries — silicon, lithium-metal, and beyond.
solution: >-
  The platform provides a silicon-anode-native qualification workflow: NPI engineers import their SiCx lot specs
  and the system generates a silicon-optimized test matrix (formation protocol variants, C-rate sweeps, swelling
  and cycle-life tests) calibrated to SiCx electrochemistry rather than graphite defaults. Results from cycler
  hardware — Neware, Arbin, and Maccor — are ingested via hardware-agnostic connectors; the platform tracks
  capacity, coulombic efficiency, and swelling metrics against silicon-specific pass/fail criteria. A formation
  protocol library seeded from published literature and continuously updated from anonymized customer runs
  suggests formation recipes ranked by predicted cycle life and first-cycle loss for a given silicon loading.
  Supplier qualification reports are auto-generated from accumulated test data, cutting report-writing from weeks
  to hours and producing OEM-ready packages on demand.
