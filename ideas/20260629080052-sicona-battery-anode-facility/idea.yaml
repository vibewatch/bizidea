topRisks:
  - name: "Large cell makers build in-house"
    description: "CATL, Samsung SDI, and LG Energy Solution have engineering resources to build proprietary silicon anode qualification workflows internally, bypassing the platform entirely."
    mitigation: "Focus exclusively on mid-size and greenfield cell manufacturers (200–2,000 MWh/year) outside China who lack internal tooling resources; avoid pitching tier-1 makers until Series B."
  - name: "Cycler OEM competitive response"
    description: "Arbin, Neware, or Maccor could extend their native software with silicon-specific modules, partially replicating test matrix and formation features inside tools customers already use."
    mitigation: "Lock in hardware-agnostic multi-OEM integration as the core differentiator and pursue cycler OEM partnerships before they ship competing features, turning potential competitors into a distribution channel."
  - name: "Sicona supply delays slow early customer activation"
    description: "If Sicona's Port Kembla facility is delayed by construction, regulatory, or technology risks, the immediate SiCx qualification wave may be pushed out 12–24 months."
    mitigation: "Target all commercial silicon anode suppliers — Group14, Sila, Nexeon — in parallel, so the product is tied to the silicon anode adoption wave rather than a single supplier's timeline."
