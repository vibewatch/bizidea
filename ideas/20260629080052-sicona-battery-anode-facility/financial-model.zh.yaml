modelSanity:
  - checkName: 营收引擎
    finding: "随着每个新硅负极供应商触发有日期的 NPI 认证浪潮，营收复利增长：从 Y1 两名试点客户各 $50K，增长至 Y3 末 14 家付费制造商、混合 ACV $145K，Y3 营收 $2.0M，由 Sicona 再到 Group14/Sila 的供应商转介叠加驱动。"
  - checkName: 必须顺利推进的事项
    finding: "至少一家硅负极供应商（Sicona、Group14 或 Sila）必须在种子轮关闭后 6 个月内激活付费客户转介渠道；若无供应商联合营销，CAC 从 $90K 升至 $180K，回收周期拉长至 22 个月，按 CAC 敏感性行延误 Series A 里程碑 8 个月以上。"
  - checkName: 模型失效条件
    finding: "若 $80K–$150K ACV 定价假设验证失败，买家将支出上限定在 $30–50K，Y3 营收跌破 $700K，种子轮现金跑道逻辑崩溃，$1.5M ARR Series A 叙事瓦解，如 ARPU 敏感性行所示（Y3 营收影响 -$897K）。"
  - checkName: 下轮融资证明
    finding: "Series A 里程碑是 M24 前 10 名付费客户产生 $1.5–1.8M ARR，毛利率超过 70%，化成协议预测误差低于 15%——这些指标基于 BP milestones 和 scenarios.base，合计支撑 5–8 倍前向 ARR 的 $7M+ Series A 估值。"

sanityChecks:
  ruleOf40: "Y3 营收增长率 104%（（$2.0M–$0.98M）/$0.98M）加 EBITDA 利润率 -108%（-$2.165M/$2.0M）= -4%（未达标；在种子轮至 Series A 成长投资阶段可接受，此时 $7M Series A 正部署至团队扩张，先于 $3M+ ARR）"
  burnMultiple: "Y3 消耗倍数 3.3x（净消耗 $2.165M / 净新增 ARR $660K = Y3 末 ARR $2.24M 减 Y2 末 ARR $1.58M）；超出 SaaS 基准 2.0x；Y4 随 $3M+ ARR 成熟、14 名员工规模稳定，必须压缩至 1.5x"
  revenuePerFte: "Y3 每全职员工营收 $157K（平均 12.7 名全职；SaaS 基准 $200–400K）；投资阶段低于基准，团队扩张领先于营收；当 Y4 ARR 在同等员工基础上达到 $3M 时，改善至 $230K 以上"
  flags:
    - "ACV 定价假设（$80K–$150K/年每项目）在模型日期尚未验证；若跌至 $30–50K，Y3 营收跌破 $700K，种子轮现金跑道逻辑失效，Series A 案例消失——这是 BP operatingAssumptions 所列的单一最大模型风险。"
    - "Series A（假设 M18 $7.0M，自 Q2Y2 起反映在 cashEopK 中）未有承诺；若推迟 6 个月以上，Q4Y2 现金耗尽，必须在错过信号 30 天内削减 $60K/月成本（推迟 1–2 名员工招募）。"
    - "Y3 消耗倍数 3.3x 超出 SaaS 基准 2.0x；在部署 Series A 推动增长阶段可接受，但 Series B 对话将要求展示每消耗美元净新增 ARR 的改善。"
    - "电芯制造商 IP 敏感性是 BP 风险部分列出的高可能性风险；拒绝共享匿名认证数据会阻塞化成协议库飞轮，降低产品粘性，将 LTV 压低至建模的 $1,354K 以下，削弱数据护城河的 Series A 叙事。"
    - "Q2Y2 起的 cashEopK 包含 +$7.0M Series A 流入（假设 A15）；若不融资，现金在 Q2Y3 耗尽，Y3 模型不成立——仅凭种子轮现金，基准消耗情景下 Q2Y3 即转负。"
