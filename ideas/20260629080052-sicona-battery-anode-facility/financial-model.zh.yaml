    baseCase: "所有招募按 BP 团队计划：电化学负责人 M1、商务拓展负责人 M4、Eng2 M6；顾问委员会 M3 前完成引导"
    upsideCase: "4 人创始团队在 M1 通过卧龙岗大学硅负极研究网络和 Sicona 介绍全部到位"
