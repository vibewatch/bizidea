scenarios:
  downside:
    description: "供应商转介渠道未能落地；需转向直接触达；M24 仅 6 名付费客户，ACV $95K，月度流失率 1.2%；Series A 推迟至 M26"
    y3RevenueK: 800.0
    y3EbitdaK: -2450.0
    cashLowPointK: 350.0
    keyAssumptionChanges:
      - "customersByM24: 6 not 10"
      - "arpuAnnualK: 95 not 145"
      - "monthlyChurnPct: 1.2 not 0.67"
      - "Series A delayed to M26 or not raised; emergency cost-cut to 7 FTE"
  base:
    description: "M24 时 10 名付费客户，混合 ACV $145K；Sicona 和 Group14/Sila 转介在 M14 前激活；Series A $7M 于 M18；Y3 毛利率达到 75%"
    y3RevenueK: 2000.0
    y3EbitdaK: -2165.0
    cashLowPointK: 1951.0
    keyAssumptionChanges:
      - "Base case; all assumptions as modeled"
  upside:
    description: "4 条硅负极供应商转介渠道在 M12 全部激活；M24 时 14 名付费客户，ACV $180K；月度流失率 0.3%；Series A $10M 于 M15"
    y3RevenueK: 3500.0
    y3EbitdaK: -1040.0
    cashLowPointK: 2800.0
    keyAssumptionChanges:
      - "customersByM24: 14 not 10"
      - "arpuAnnualK: 180 not 145"
      - "monthlyChurnPct: 0.30 not 0.67"
      - "Series A closes M15 at $10M not M18 at $7M"

sensitivity:
  - variable: ARPU
    downsideCase: "ACV $80K（定价假设失败；买家将支出上限设在最低层或扩展现有充放电仪软件）"
    baseCase: "ACV $145K（每客户 1.4 个项目，中等定价；在前两个共创客户项目中按 BP operatingAssumptions 验证）"
    upsideCase: "ACV $180K（每客户 1.5 个项目加 OEM 报告附加费；欧盟合规紧迫性推动溢价）"
    y3RevenueImpactK: -897.0
    cashImpactK: -673.0
  - variable: churn
    downsideCase: "月度 1.2%（年化 14.4%）：认证浪潮峰值后买家取消；IP 共享摩擦阻塞化成协议库飞轮"
    baseCase: "月度 0.67%（年化 8%）：因标准化充放电仪数据集成层和 OEM 报告合规产物粘性强，与 BP moatsToBuild 一致"
    upsideCase: "月度 0.25%（年化 3%）：协议库成为行业参考；客户扩展项目而非流失"
    y3RevenueImpactK: -450.0
    cashImpactK: -338.0
  - variable: CAC
    downsideCase: "每客户 $180K（4 条供应商转介全部失败；完全直接触达，企业销售周期 9 个月）"
    baseCase: "每客户 $90K（Sicona 加 Group14/Sila 联合营销：转介转化率 35%，试点转付费 50%+，与 BP funnelTargets 一致）"
    upsideCase: "每客户 $40K（4 条供应商合作全部激活；有时间约束的认证截止期带来入站需求）"
    y3RevenueImpactK: -290.0
    cashImpactK: -720.0
  - variable: sales cycle
    downsideCase: "平均 9 个月（电池行业采购放缓；副总裁审批需要多季度预算周期；无预认证转介）"
    baseCase: "4.5 个月（试点在 SiCx 样品收到时触发；副总裁通过 Sicona 联合营销关系预审批，与 BP wedgeRationale 一致）"
    upsideCase: "2 个月（供应商转介产生预认证入站；EU 电池法规 2023/1542 下合规紧迫的欧盟客户免去试点阶段）"
    y3RevenueImpactK: -620.0
    cashImpactK: -465.0
  - variable: gross margin
    downsideCase: "58%（混合 Arbin/Neware/Maccor 充放电仪机型标准化需要大量客户定制实施服务；BP 风险：连接器集成深度超预期）"
    baseCase: "75%（目标；云基础设施规模效应和自动引导以最低增量客户成功成本吸收新客户，与 BP businessModel.targetGrossMarginPct 一致）"
    upsideCase: "82%（纯 SaaS 自动化引导；协议库自助化降低 Y3 客户成功人员需求）"
    y3RevenueImpactK: 0.0
    cashImpactK: -340.0
  - variable: hiring pace
