slug: silicon-anode-integration-platform
date: '2026-06-29'
currency: USD
modelStartMonth: '2026-07'

assumptions:
  - id: A1
    name: "起始客户数（M1）"
    value: "0"
    unit: count
    source: "[BP executiveSummary] 模型起始无客户；产品于 2026 年 7 月前尚未上线"
  - id: A2
    name: "首个共创客户试点启动月份"
    value: "M4 (October 2026)"
    unit: month
    source: "[BP milestones] '第 4 个月：首个共创客户认证试点启动（1 家电芯制造商，1 批 SiCx）'"
  - id: A3
    name: "试点合同金额"
    value: "50"
    unit: "$K total for 6-month engagement"
    source: "[BP investorMemo.firstCustomer] '单项目付费试点 $40K–$60K'；中点 $50K；6 个月内均摊确认，约 $8.3K/月"
  - id: A4
    name: "第二位共创客户试点启动"
    value: "M8 (February 2027)"
    unit: month
    source: "[BP experimentRoadmap 90–180 天] 第二个共创客户实验节点暗示第二个试点在 M8–M9 运行"
  - id: A5
    name: "首笔付费 SaaS 年订阅成交"
    value: "M12 (June 2027)"
    unit: month
    source: "[BP milestones] '第 12 个月：首笔付费 SaaS 年订阅成交（$80K–$150K ACV）；2 名活跃付费客户'"
  - id: A6
    name: "每客户初始 ACV"
    value: "100"
    unit: "$K/year at launch, blended $145K by Y3"
    source: "[BP pricing] '$80K–$150K/年每个活跃认证项目'；启动时使用 $100K，随多项目扩张（平均 1.4 个项目）到 Y3 混合增至 $145K，与 research SOM 计算一致"
  - id: A7
    name: "月度客户流失率"
    value: "0.67"
    unit: "% per month (approx 8% annual)"
    source: "[startup-finance heuristic] 年流失率约 8%，适用于粘性企业合规 SaaS；低于典型 SaaS，因充放电仪数据集成层和 OEM 报告合规产物产生结构性转换成本，与 BP moatsToBuild 一致"
  - id: A8
    name: "目标毛利率"
    value: "75"
    unit: "%"
    source: "[BP businessModel.targetGrossMarginPct] 明确 75%；Y3 实现，因基础设施成本增速低于营收"
  - id: A9
    name: "最低月度 COGS（基础设施底线）"
    value: "2"
    unit: "$K/month"
    source: "[BP operations] '云基础设施：AWS 或 GCP 用于测试数据接入和存储'；无论客户数多少的最低基准；M8 起 COGS 随营收扩展至 25%"
  - id: A10
    name: "M24 客户数（Y2 末）"
    value: "10"
    unit: count
    source: "[BP milestones] '第 24 个月：10 家付费制造商；$1.5–1.8M ARR'"
  - id: A11
    name: "M36 客户数（Y3 末）"
    value: "14"
    unit: count
    source: "[BP milestones + research SOM] M24 时 10 家，Y3 经 Group14/Sila/Nexeon 转介新增 4 家；与约 $214K 混合 ACV 的 $3M+ ARR 轨迹一致；research SOM 假设 10 客户 × $182K ACV = $1.82M 稳态"
  - id: A12
    name: "Y3 混合 ARPU"
    value: "145"
    unit: "$K/year per customer"
    source: "[research SOM calc + BP pricing] research SOM：10 客户 × 1.4 项目 × $0.13M = $1.82M；本模型使用 14 客户 × $145K 均值 = $2.03M Y3；$145K 反映单项目（$100K）和多项目（$180K）账户混合，与 BP expansionLevers 深耕扩张一致"
  - id: A13
    name: "规模化 COGS 率"
    value: "25"
    unit: "% of revenue"
    source: "[startup-finance heuristic + BP businessModel.targetGrossMarginPct] 25% COGS 对应 75% 毛利率目标；覆盖 AWS/GCP 托管、客户成功开销和数据接入计算；与轻量实施的 B2B SaaS 一致"
  - id: A14
    name: "种子轮融资金额"
    value: "4.0"
    unit: "$M"
    source: "[BP fundingAsk] '$3–5M'；$4.0M 由 M1–M20 运营消耗（约 $2.3M）加 6 个月现金跑道缓冲（约 $1.0M）加应急（$0.7M）计算得出；M1 开始时存入；在 BP 说明范围内"
  - id: A15
    name: "预期 Series A 流入（仅现金模型假设）"
    value: "7.0"
    unit: "$M added to cashEopK at Q2Y2"
    source: "[BP milestones] 'Series A 于第 18–20 个月融资'；$7M 基于 $1.5M ARR × 5–7 倍前向 ARR 倍数（企业深科技 SaaS Series A 的 startup-finance 经验法则，2027–2028 年）；反映在 Q2Y2 起 cashEopK 中，但不计入 ebitdaK 或 fundingAsk；若不融资，现金在 Q2Y3 耗尽"
  - id: A16
    name: "CEO 年薪（基本工资）"
    value: "240"
    unit: "$K/year"
    source: "[startup-finance heuristic] 拥有硅电化学领域专业知识的深科技技术联合创始人；2026 年悉尼/国际市场硬件相邻 SaaS 创始人中等薪酬"
  - id: A17
    name: "CTO 年薪（基本工资）"
    value: "240"
    unit: "$K/year"
    source: "[startup-finance heuristic] 资深电池软件/数据管道工程师联合创始人；与 CEO 薪酬平等；符合 2026 年悉尼科技市场"
  - id: A18
    name: "电化学负责人年薪"
    value: "215"
    unit: "$K/year"
    source: "[startup-finance heuristic] 硅负极方向博士专家；稀缺专业知识溢价，BP 团队部分将其列为 M1 关键招募；低于联合创始人薪酬但高于标准工程师"
  - id: A19
    name: "企业销售/商务拓展负责人年度 OTE"
    value: "215"
    unit: "$K/year ($185K base + $30K variable)"
    source: "[startup-finance heuristic] 拥有电池行业网络的资深企业 SaaS 商务人员；$185K 基本工资加 $30K 浮动目标；BP 团队 startTiming 第 4 个月"
  - id: A20
    name: "第二位软件工程师年薪"
    value: "200"
    unit: "$K/year"
    source: "[startup-finance heuristic] 负责 OEM 报告管道和 Maccor 连接器的全栈数据工程师；BP 团队 startTiming 第 6 个月"
  - id: A21
    name: "工资税和福利负担率"
    value: "20"
    unit: "% of base salary"
    source: "[startup-finance heuristic] 雇主综合缴纳：澳大利亚养老金约 11%、工资税约 5%、医疗/其他约 4%；澳/美招聘背景下混合估算使用 20%"
  - id: A22
    name: "非薪资 OPEX 月度范围"
    value: "15-28"
    unit: "$K/month"
    source: "[startup-finance heuristic + BP operations] 科学顾问委员会聘用费 $3K、会议/差旅 $5K（Battery Show EU 和 EV Tech Expo 期间峰值 $10K）、法律/IP $5–8K 早期阶段、开发工具和数据库 $3K、办公室/联合办公 $3K、行政/保险 $2K；M4 和 M10 有峰值"
  - id: A23
    name: "混合 CAC（Y2 获客）"
    value: "90"
    unit: "$K per new customer"
    source: "[calc] Y2 销售营销支出约 $755K / 8 名新客户 ≈ $94K；四舍五入至 $90K；BP funnelTargets 供应商转介至合格试点 30–40%，合格试点至付费 50%+；经验法则：以联合营销为主渠道的企业 SaaS CAC 通常为 ACV 的 0.6–1.0 倍"
  - id: A24
    name: "Y2 新增人员"
    value: "Sr Eng M13, PM M15, CS Manager M16, Sales Exec 2 M18"
    unit: "FTE schedule"
    source: "[BP fundingAsk.useOfFundsSummary + BP sequencingRationale] Series A（A15）资金支持 M18 前扩张至 9 名全职；销售招募落后于营收验证；产品/客户成功随日益增长的多客户群按 BP sequencingRationale 增加"
  - id: A25
    name: "Y3 新增人员"
    value: "2x Eng M25, Data Scientist M28, Sales Exec 3 M30, G&A Controller M33"
    unit: "FTE schedule"
    source: "[BP milestones M28–M36] 批次间质检模块（M28）、BMS 标定模块共创客户阶段（M30）、锂金属负极库（M36）需要额外工程资源；Series A 支持扩张至 14 名全职"
  - id: A26
    name: "平均客户生命周期"
    value: "149"
    unit: months
    source: "[calc from A7] 平均客户生命周期月数 = 1 / 0.0067 月流失率 = 149 个月；企业 SaaS 标准指数衰减 LTV 公式"
  - id: A27
    name: "OEM 报告附加费"
    value: "8"
    unit: "$K per report"
    source: "[BP businessModel] '$5K–$15K 每份 OEM 提交报告包导出'；中点 $8K；M12 起对基础 SaaS 订阅贡献 ACV 增量"

