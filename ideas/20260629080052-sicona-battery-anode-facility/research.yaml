  validationPlan:
  - priority: high
    question: How many parallel silicon-anode qualification programs does a target cell maker run per year, and how long do they stay active?
    evidenceToGather: Structured interviews with NPI/quality leads plus anonymized program calendars from 6-8 mid-size cell manufacturers.
  - priority: high
    question: Can the product ingest enough metadata from mixed Arbin/Neware/Maccor/Voltaiq stacks to auto-generate a credible supplier qualification package?
    evidenceToGather: A design-partner pilot using one real program and its raw exports, SOPs, and report templates.
  - priority: medium
    question: Will silicon-anode suppliers actively refer customers into a neutral qualification workflow vendor?
    evidenceToGather: Partner conversations with Sicona, Group14, Sila, and Nexeon commercial/application teams, plus evidence of joint-customer introductions.
  - priority: low
    question: Which evidence fields are mandatory for European buyers versus OEM review teams outside Europe?
    evidenceToGather: Template walkthroughs with compliance advisers, testing labs, and at least two downstream battery customers.
