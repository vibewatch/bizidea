slug: silicon-anode-integration-platform
date: '2026-06-29'

executiveSummary: >-
  硅碳负极相比石墨能量密度提升 20%、充电速度提升 40%，但它让电芯制造商今天沿用的所有石墨时代认证流程
  全部失效——产出的是系统性误导结果，而不只是速度慢。ARENA 向 Sicona Battery Technologies 拨款 $45M，
  催生了中国以外首条商业级 SiCx 供应，触发了一波有日期、有资金的 NPI 认证项目。
  平台提供硅负极原生认证操作系统：针对 SiCx 电化学校准的结构化测试矩阵生成，硬件无关的充放电仪数据接入
  （Arbin、Neware、Maccor），硅特异性合格/不合格标准，以及自动生成的 OEM 就绪认证报告。
  跨客户化成协议库以已发表文献为基础，随匿名客户运行持续扩充，构建了石墨时代现有厂商不从头重来
  就无法复制的复利型数据护城河。滩头市场是 2026–2027 年收到首批 SiCx 样品的中型（200–2,000 MWh/年）
  亚太和欧洲电芯制造商 NPI 工程团队；创业路径从负极认证延伸至 BMS 标定数据、批次间质检追踪，
  以及覆盖所有下一代负极的跨化学体系协议标准。有一个待解问题：真实试点项目中的实际 ACV 转化率
  尚未测量；$80K–$150K/年的 SaaS 定价假设需在前两个共创客户项目中验证。

problem:
  - "硅碳负极让石墨时代认证框架全面失效：所有假设（线性容量衰减、稳定 SEI、可预期膨胀）对硅来说都是错的，现有质量管理工具产出的是误导性结果，而不只是慢。"
  - "NPI 工程团队每批负极材料需用 Excel、实验室笔记和并非为硅失效模式设计的充放电仪软件，手工设计 50–100 个测试工况。"
  - "一次硅负极供应商认证耗费 $2–5M 工程师工时、历时 6–18 个月——一颗电芯都还没出货。"
  - "没有硅负极原生框架：每个团队都在套用石墨模板，遗漏硅特异性失效模式（SEI 增长、体积膨胀、首圈容量损失），不断重跑测试。"
  - "OEM 提交认证报告需从充放电仪导出、Excel 摘要和 PowerPoint 幻灯片手工拼装，每份耗时 4–6 周。"

solution:
  - "硅优化测试矩阵生成器：导入 SiCx 批次规格，输出针对硅电化学（而非石墨默认值）校准的化成协议和倍率扫描矩阵。"
  - "硬件无关充放电仪数据接入：Arbin、Neware 和 Maccor 的标准连接器将碎片化原始导出标准化为统一的硅特异性数据模型。"
  - "化成协议库：以已发表文献为基础，持续从匿名跨客户认证运行中扩充，按给定硅负载的预测循环寿命和首圈容量损失排序推荐。"
  - "自动生成 OEM 认证报告：将积累的测试数据汇编成买家认可的报告包，将报告组装时间从 4–6 周压缩至数小时。"
  - "硅特异性合格/不合格标准：容量、库仑效率和膨胀指标按硅电化学第一原理构建的阈值追踪。"

whyWeWin:
  - "硅原生架构：每条测试矩阵模板、合格/不合格标准和协议推荐都以硅为第一出发点——而非从现有厂商（Voltaiq、Arbin、Neware）难以轻易翻新的石墨默认值改编。"
  - "复利型数据护城河：每个新认证项目都贡献匿名的硅特异性化成数据，改善所有客户的协议推荐；从石墨起步的现有厂商不重建数据集就无法复制。"
  - "与首批商业 SiCx 客户共同迭代：产品在 2026–2027 年与 Sicona 时代电芯制造商同步构建，而非在认证浪潮过去之后才亡羊补牢。"
  - "硬件无关跨厂商集成：混合 Arbin/Neware/Maccor 机型无处不在；单厂商硅工作流程解决不了大多数实验室的实际问题。"
  - "电池护照和 OEM 审查的证据脊梁：EU 电池法规 2023/1542 和 OEM 审查模板均要求结构化可追溯性——让报告产物成为合规驱动的持久转换成本。"

strategicChoices:
  beachhead: >-
    亚太和欧洲中型（200–2,000 MWh/年）非中国电芯制造商的 NPI 工程团队，
    在 2026–2027 年收到首批 Sicona SiCx 样品，以工程副总裁设定的 18 个月截止期
    启动首个硅负极认证项目。
  wedgeRationale: >-
    这个群体没有现成的硅特异性工具，面临具体截止期，也无法依赖一线厂商（CATL、Samsung SDI、LG）
    才有的内部工具资源。Sicona 供应事件有日期、有资金，认证项目是真实且有时间约束的——不是假设。
    从单一命名供应商的样品客户群起步，让产品能在更广泛的硅负极采用要求更通用方案之前，与首批
    真实用户共同迭代。
  sequencingRationale: >-
    先建硅测试矩阵和充放电仪连接器（团队会立即付费解决的工作流程问题），再叠加化成协议库
    （随跨客户数据积累构建护城河），再扩展至自动生成 OEM 报告（追加销售和深耕扩张杠杆）。
    GTM 遵循同样顺序：通过 Sicona 合作伙伴转介落地，扩展至 Group14/Sila/Nexeon 供应链客户，
    再经充放电仪厂商转介集成规模化。先招募电化学专业知识，后招企业销售——因为产品的硅原生
    准确性是买家从当前工作流程切换的唯一理由。
  notYet:
    - "一线电芯制造商（CATL、Samsung SDI、LG）——内部工具资源使其最早成为 Series B 目标。"
    - "BMS 标定数据生成——高价值相邻业务，但需要独特的买家运作和更长销售周期；推迟至第 18 个月以后。"
    - "锂金属负极认证——化学专业知识重叠但产品范围独立；在硅护城河建立之前推迟。"
    - "全面 LIMS 替代——与现有实验室信息管理系统竞争，可能拖慢企业采购；保持为现有技术栈之上的工作流程层。"
    - "中国大陆电芯制造商——供应链和数据主权壁垒使其成为独立的市场进入运作；完全推迟。"

market:
  tam: "$122M（2030 年电池需求基准 4,700 GWh；约 470 条产线当量，按 10 GWh/条；每条产线每年 2 个硅负极认证项目，每项目工作流程支出 $0.13M）"
  sam: "$28M（欧洲、北美、韩日和大洋洲 120 条可触达的中国以外产线当量；每条每年 1.8 个项目，$0.13M 支出）"
  som: "第 3 年收入 $1.8M——10 家付费制造商，每家平均 1.4 个活跃项目，每项目约 $0.13M；基于 research.yaml 研究的 SOM 数据"
  segments:
    - "中国以外认证硅碳负极供应商的中型电芯制造商（200–2,000 MWh/年）——核心滩头市场"
    - "需要在平台审批前获得经验证的硅负极电芯性能数据的电池包集成商和 EV OEM 电池工程团队——二级扩张"
  buyingProcess: >-
    经济买家是电芯制造商的电芯研发副总裁或 NPI 总监；日常用户是运行认证项目的 NPI 或质量工程师。
    预算最常附在现有电池分析、质量或放量项目上，而非全新创新专项——因此销售运作需要工程师的技术验证，
    加上为副总裁量身打造的以认证周期时间和工程成本降低为核心的商业论证。

product:
  mvp: >-
    硅优化测试矩阵生成器（含化成协议模板）、Arbin 和 Neware 标准数据连接器、
    容量/库仑效率/膨胀的硅特异性合格/不合格标准，以及单项目认证报告导出——
    以 Web 应用形式交付，用于 2026 年第四季度开始的首批 Sicona SiCx 共创客户认证项目。
  sixMonth: "新增 Maccor 连接器、化成协议库（50 个以上来自已发表文献的协议）、按硅负载机器学习辅助协议排序，第二位共创客户完成引导；测量认证周期时间与基准的对比。"
  twelveMonth: "自动生成 OEM 提交认证报告（对齐 EU 电池法规和 OEM 模板）；跨客户匿名协议库（3 个以上客户贡献数据）；首笔付费 SaaS 订阅按目标 ACV 成交。"
  twentyFourMonth: "扩展至 Group14、Sila 和 Nexeon 供应链客户；批次间质检追踪模块；电池护照证据导出（EU 2023/1542）；10 家付费制造商；化成协议库成为网络效应护城河。"
  keyBets:
    - "硬件无关充放电仪连接器凭借标准化元数据技术上可行——这是解锁混合机型装机基础的前提。"
    - "化成协议库推荐相比完整长循环跑数循环寿命预测误差低于 10%——这是买家信任产品的精度门槛。"
    - "硅负极供应商（Sicona、Group14、Sila）愿意主动将客户推荐给中立工作流程供应商——这是首要分发渠道假设。"
    - "EU 电池法规 2023/1542 可追溯性要求让结构化证据产物成为合规杠杆，而非仅仅是便利功能。"

gtm:
  wedge: >-
    与 Sicona Battery Technologies 合作，在样品收到的时刻——恰好是 NPI 团队启动首个硅认证项目、
    手头没有足够工作流程的确切触发点——以联合营销套餐形式向 SiCx 早期客户提供平台。
  channels:
    - "Sicona 合作：在样品和产能阶段联合营销平台给 SiCx 买家（主要渠道，前 0–12 个月）"
    - "直接触达参加 Battery Show Europe、EV Tech Expo 及亚太同类活动的电芯制造商 NPI 负责人"
    - "充放电仪厂商集成合作（Arbin、Neware、Maccor）：来自客户已使用工具的嵌入式转介——将潜在竞争者转化为分发渠道"
    - "Group14、Sila、Nexeon 供应链转介：在第 12 个月前将 Sicona 合作模式复制到所有西方硅负极供应商"
    - "欧洲合规压力切口：锁定欧盟电池护照文档负担超出工作流程效率诉求的欧盟电芯制造商"
  funnelTargets: "供应商转介至合格试点：30–40%（接触时买入触发器已激活）；合格试点至付费订阅：50%+（试点期间认证报告价值已得到验证）"
  pricing: >-
    按活跃认证项目的 SaaS 年订阅，$80K–$150K/年——以 $2–5M、6–18 个月认证项目的工程成本为锚定
    （平台捕捉不到 5% 的避免成本）。每份 OEM 提交报告包导出 $5K–$15K，将报告生成定位为
    经常性追加销售而非一次性事件。定价假设需在前两个共创客户项目中验证；
    预算预计纳入现有电池分析或 NPI 质量项目。

businessModel:
  revenueStreams:
    - "按活跃认证项目计费的 SaaS 年订阅（$80K–$150K/年）"
    - "OEM 提交报告包单次导出费（每份 $5K–$15K）"
    - "负极供应商联合品牌协议基准测试数据合作费（第 2 年起）"
  unitOfValue: "活跃硅负极认证项目（一个项目 = 一家电芯制造商 NPI 团队评估一家负极供应商）"
  targetGrossMarginPct: 75
  expansionLevers:
    - "每位客户以一个认证项目落地；随客户运行多供应商对比自然扩展（无需复购即实现 ACV 增长）"
    - "化成协议库订阅层——面向未积极运行项目但正在基准测试协议的客户"
    - "BMS 标定数据生成模块（第 18 个月起）将电池包集成商开辟为第二买家群体"
    - "电池护照证据导出模块在欧盟受监管客户中推动扩张，随 2027 年合规截止日临近"

strategyMap:
  northStarMetric: "平台上管理的活跃硅负极认证项目数量"
  inputMetrics:
    - "每季度新启动认证项目数（供应链采用的领先指标）"
    - "化成协议库规模（付费客户贡献的匿名协议数）"
    - "认证周期时间相比客户基准的缩短幅度（核心价值验证）"
    - "OEM 认证报告首次提交接受率（产品准确性信号）"
    - "供应商合作转介转化率（GTM 渠道效率）"
  moatsToBuild:
    - "跨客户化成协议库：随每次认证运行增长，改善所有客户推荐，现有厂商不从硅数据重建就无法复制"
    - "标准化充放电仪元数据层：一旦团队在平台上有历史项目，跨 Arbin/Neware/Maccor 的多厂商数据标准化便形成转换成本"
    - "OEM 报告模板库：对齐 EU 电池法规和 OEM 特定审查格式的结构化证据，产生合规驱动的留存"
    - "供应商转介网络：与 Sicona、Group14、Sila、Nexeon 的先发合作，让平台成为样品交付时的默认推荐"
  killCriteria:
    - "尽管有活跃试点项目，第 18 个月仍不足 2 名付费客户，表明认证工作流程问题不够迫切，无法取代 Excel"
    - "3 个以上试点后试点转付费转化率低于 25%，表明定价或产品契合度出现根本性偏差，需要重新定位"
    - "5 个以上贡献项目后化成协议库准确度仍高于 15% 循环寿命预测误差，表明核心技术赌注是错的"
    - "第 12 个月前两家以上二线充放电仪厂商推出硅特异性认证模块，意味着独立差异化窗口已关闭"
  mermaid: |
    flowchart LR
      Sicona[Sicona SiCx\nSupply Event] --> Trigger[NPI Program\nTrigger]
      Trigger --> Wedge[Beachhead\nDesign Partners]
      Wedge --> MVP[Test Matrix\n+ Connectors]
      MVP --> Proof[Qualification\nCycle Time -60%]
      Proof --> Library[Formation Protocol\nLibrary Grows]
      Library --> Moat[Cross-Customer\nData Moat]
      Moat --> Expansion[Multi-Supplier\nExpansion]
      Expansion --> Scale[10+ Customers\nYear 3]
      Proof --> Reports[Auto OEM\nReports]
      Reports --> Compliance[EU Battery\nPassport Wedge]
      Compliance --> Scale

investorMemo:
  verdict:
    call: "进一步了解 / 会面"
    conviction: >-
      对痛点和市场时机高度认同（有资金、有日期的供应事件）；对切口差异化的信心处于中等水平，
      待前两个试点中化成协议准确度和供应商转介率得到验证。
    whyBelieve: >-
      ARENA 向 Sicona 拨款 $45M 催生了真实、有时间约束的认证浪潮，而现有厂商（Voltaiq、充放电仪厂商）
      因其产品建立在石墨假设之上，在结构上无力应对——拥有硅电化学专业知识和充放电仪集成深度的创始团队，
      能在品类变得显而易见之前建立持久的数据护城河。
    whyDoubt: >-
      买家群体高度集中且技术老练，意味着单一大型电芯制造商决定自建或将 Voltaiq 扩展加硅模板，
      就可能在协议库产生可守护差异化之前大幅压缩可触达市场。
    nextDiligence: >-
      确认 2026 年有 3 家以上非中国中型电芯制造商收到 Sicona SiCx 样品，且愿意为平台付 $80K–$150K/年，
      而非扩展现有工具——具体而言，种子轮关闭前从一位共创客户获得已签署的 LOI 或付费试点。
  firstCustomer:
    title: "亚太或欧洲中型电芯制造商的 NPI 负责人"
    profile: "年产能 200–2,000 MWh，已收到或正式申请 Sicona SiCx 样品，已为硅负极认证项目组建 NPI 团队，具有副总裁设定的 18 个月截止期。"
    trigger: "收到来自 Sicona（或其他硅负极供应商）的首批商业 SiCx 批次，触发内部设有固定认证截止期的 NPI 项目。"
    buyer: "电芯研发副总裁或 NPI 总监"
    initialContract: "单项认证项目（3–6 个月）付费试点 $40K–$60K；认证报告交付并 OEM 接受后，转为 $80K–$150K/年年度订阅。"
  mustBeTrue:
    - "一旦商业 SiCx 供应到位，中国以外中型电芯制造商每年将运行至少 1 个付费硅负极认证项目——而不是推迟至内部工具或石墨工作流程扩展。"
    - "化成协议推荐相比完整长循环跑数循环寿命预测误差低于 10%，让协议库成为可信决策工具，而非咨询参考。"
    - "硅负极供应商（Sicona、Group14、Sila）愿意主动将电芯制造商客户引导至中立认证工作流程供应商，而不是自建专有应用支持工具。"
    - "平台能充分标准化来自混合 Arbin/Neware/Maccor 充放电仪机型的数据，无需大量人工返工即可自动生成 OEM 认可的认证报告。"
    - "$28M SAM（120 条中国以外可触达产线当量）是真实且可触达的，在一线现有厂商将硅特异性认证功能捆绑进其现有平台之前。"
  diligenceQuestions:
    - "目标中型电芯制造商每年实际同时运行多少个硅负极认证项目，每项目实际工程成本是多少？"
    - "Sicona 商务团队是否愿意主动将 SiCx 客户推荐给第三方工作流程供应商，商务条款如何？"
    - "OEM 或下游电池客户无需修改即可接受认证报告，哪些具体数据字段是必要的——欧盟、美国和亚太是否有差异？"
    - "创始团队能否用真实（即使未发表的）硅负极数据集，展示具有可量化循环寿命预测精度的化成协议推荐？"
    - "Sicona 的 Port Kembla 工厂向非澳大利亚电芯制造商交付量产级 SiCx 批次的实际时间线是什么？若延误，其他供应商能否替代？"
    - "中国以外是否有中型电芯制造商已尝试认证来自 Group14 或 Sila 的 SiCx，他们用的是什么工作流程？"

operatingAssumptions:
  - assumption: "电芯制造商每个活跃认证项目愿意付 $80K–$150K/年，而不是扩展现有充放电仪软件或通用电池分析工具。"
    basis: idea.yaml
    validationTest: "种子轮关闭前，从两位共创客户获得已签署付费试点 LOI（最低 $40K–$60K）。"
    decisionImpact: "若为假，产品必须重新定位为现有技术栈的低成本附加组件（充放电仪厂商集成优先），或定价压缩至 $20K–$40K/年，缩小 SAM 和融资需求。"
  - assumption: "硅负极供应商（Sicona、Group14、Sila、Nexeon）将主动将电芯制造商客户推荐给平台，作为联合营销套餐。"
    basis: idea.yaml
    validationTest: "种子轮关闭后 60 天内与 Sicona 商务团队开展合作对话；90 天内完成联合客户介绍。"
    decisionImpact: "若为假，GTM 必须转向直接触达和充放电仪厂商合作作为主要渠道，首客户获取时间延长 6–9 个月。"
  - assumption: "化成协议库推荐在首批客户数据获取后 12 个月内，相比完整长循环跑数循环寿命预测误差低于 10%。"
    basis: operator judgment
    validationTest: "用前两个共创客户项目的留存验证数据集进行盲测；内部发布误差率后再扩展协议库功能。"
    decisionImpact: "若为假，协议库从决策工具降级为咨询参考，削弱数据护城河叙事和定价杠杆。"
  - assumption: "Arbin、Neware 和 Maccor 的硬件无关充放电仪连接器能充分标准化元数据，无需大量人工返工即可自动生成 OEM 认可的认证报告。"
    basis: research.yaml
    validationTest: "用一个真实认证项目的原始导出、SOP 和报告模板作为共创客户试点，生成 OEM 草稿报告包；测量人工返工工时。"
    decisionImpact: "若为假，产品需要更深度的客户定制集成工作，增加实施成本和价值实现时间，可能需要服务优先的 GTM 路线。"
  - assumption: "EU 电池法规 2023/1542 和电池护照要求将按时间表执行，到 2027 年让结构化证据导出成为购买驱动力。"
    basis: research.yaml
    validationTest: "与欧盟电芯制造商合规团队确认，电池护照数据字段已在供应商认证合同中被指定为要求。"
    decisionImpact: "若为假，欧洲合规切口消失，GTM 必须完全依赖工作流程效率 ROI，销售周期更长。"

experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "共创客户招募：接触 6–8 家正在收取 Sicona SiCx 样品的中国以外中型电芯制造商"
    hypothesis: "至少 2 家愿意为首个硅负极认证项目签署付费试点（$40K–$60K）"
    successMetric: "第 90 天前签署 2 份试点协议"
    owner: "创始人 / 商务拓展负责人"
  - horizon: "0–90 天"
    experiment: "Sicona 联合营销合作对话"
    hypothesis: "Sicona 商务团队愿意支持联合客户介绍，以换取联合品牌协议数据可见性"
    successMetric: "第 90 天前签署合作备忘录，完成至少 1 次联合客户介绍"
    owner: "创始人 / CEO"
  - horizon: "0–90 天"
    experiment: "Arbin 和 Neware 连接器原型"
    hypothesis: "Arbin 和 Neware 的原始充放电仪导出，每位客户配置不超过 20 小时，即可标准化为统一硅特异性数据模型"
    successMetric: "原型从每家充放电仪厂商各接入一个真实认证数据集，输出标准化数据模型"
    owner: "创始工程师"
  - horizon: "90–180 天"
    experiment: "首个共创客户认证项目试点"
    hypothesis: "认证周期时间相比客户石墨时代基准工作流程缩短至少 40%"
    successMetric: "客户报告周期时间缩短至少 40%，并同意将自动生成的 OEM 报告作为草稿提交"
    owner: "创始人 + NPI 工程师客户负责人"
  - horizon: "90–180 天"
    experiment: "化成协议库种子准确度测试"
    hypothesis: "协议库排序的协议，相比完整长循环跑数循环寿命预测误差低于 15%"
    successMetric: "在首个共创客户项目的留存数据上盲测预测误差低于 15%"
    owner: "电化学负责人"
  - horizon: "180–365 天"
    experiment: "Group14 和 Sila 供应商转介渠道"
    hypothesis: "将 Sicona 合作模式复制到 Group14 和 Sila，可解锁至少 2 名额外付费客户"
    successMetric: "第 12 个月前通过供应商转介获得 2 名新付费客户"
    owner: "商务拓展负责人"
  - horizon: "180–365 天"
    experiment: "EU 电池护照证据导出功能"
    hypothesis: "欧洲电芯制造商愿意为对齐 EU 电池法规 2023/1542 的报告导出支付增量费用"
    successMetric: "至少 1 位欧盟客户在成交分析中将合规导出列为购买驱动力"
    owner: "产品负责人"

operations:
  - "云基础设施：AWS 或 GCP 用于测试数据接入、存储和充放电仪连接器 API；对有 IP 顾虑的客户提供 VPC 和本地部署选项"
  - "充放电仪硬件集成：Arbin MITS、Neware BTSDA 和 Maccor 的标准 API/文件连接器——作为对抗单厂商现有竞争者的核心技术护城河进行维护"
  - "科学顾问委员会：来自卧龙岗大学及同类机构的 2–3 位电化学家，受聘验证化成协议库准确度和测试矩阵模板"
  - "数据治理：所有跨客户协议基准测试严格采用选择性匿名化；对不愿分享数据的客户提供独立 VPC 或本地部署"
  - "标准对齐：维护按 EU 电池法规 2023/1542、UN 38.3 和主流 OEM 审查格式版本控制的预建证据模板"
  - "关键合作伙伴：Sicona Battery Technologies（试点客户和主要样品供应转介渠道）；充放电仪厂商 Arbin、Neware、Maccor（集成和转介）；ARENA 和 Battery Australia（监管和标准对齐）"

team:
  - role: "CEO / 联合创始人（电化学背景）"
    startTiming: "第 0 个月"
    rationale: "硅负极原生产品需要创始技术公信力，才能赢得共创客户试点和科学顾问委员会；同时主导 Sicona 合作和供应商转介 GTM。"
  - role: "CTO / 创始工程师（电池软件 / 数据管道）"
    startTiming: "第 0 个月"
    rationale: "充放电仪连接器架构和测试数据标准化是核心技术风险；必须在共创客户试点开始前解决。"
  - role: "电化学负责人（博士或同等学历，专注硅负极）"
    startTiming: "第 1 个月"
    rationale: "化成协议库准确度是首要产品差异化点；需要专职领域专家来整理文献、验证推荐并管理科学顾问委员会。"
  - role: "企业销售 / 商务拓展负责人（电池行业背景）"
    startTiming: "第 4 个月"
    rationale: "在首个共创客户试点证明工作流程价值后招募；需要将与 Group14、Sila、Nexeon 的供应商转介合作复制，并将试点转化为付费订阅。"
  - role: "第二位软件工程师（全栈，数据方向）"
    startTiming: "第 6 个月"
    rationale: "需要在 12 个月收入目标前交付自动生成 OEM 报告功能和 Maccor 连接器。"

milestones:
  - horizon: "0–12 个月"
    items:
      - "第 2 个月：Arbin 和 Neware 连接器原型完成；硅测试矩阵生成器 v1 可用"
      - "第 3 个月：Sicona 联合营销合作备忘录签署；完成首次联合客户介绍"
      - "第 4 个月：首个共创客户认证试点启动（1 家电芯制造商，1 批 SiCx）"
      - "第 6 个月：化成协议库播种完成（50 个以上来自已发表文献的协议）；盲测准确度结果内部发布"
      - "第 9 个月：首份自动生成的 OEM 认证报告被共创客户无需重大修改接受"
      - "第 12 个月：首笔付费 SaaS 年订阅成交（$80K–$150K ACV）；2 名活跃付费客户"
  - horizon: "12–24 个月"
    items:
      - "第 14 个月：Group14 和 Sila 供应商转介合作激活；转介渠道带来 2 名额外客户"
      - "第 18 个月：化成协议库准确度在 3 个以上贡献客户项目中预测误差低于 10%"
      - "第 20 个月：EU 电池法规证据导出功能上线；首位欧盟客户将合规列为购买驱动力"
      - "第 24 个月：10 家付费制造商；$1.5–1.8M ARR；批次间质检追踪模块进入 Beta"
  - horizon: "24–36 个月"
    items:
      - "第 28 个月：批次间质检追踪模块正式发布；现有客户 ACV 扩展"
      - "第 30 个月：BMS 标定数据生成模块与电池包集成商进入共创客户阶段"
      - "第 36 个月：化成协议库覆盖锂金属负极化学体系变体；Series A 就绪——$3M+ ARR 轨迹和毛利率 70% 以上已验证"

risks:
  - risk: "大型电芯制造商自建硅认证工具，压缩中型市场可触达规模"
    likelihood: Medium
    impact: High
    mitigation: "专注于中国以外缺乏内部工具资源的中型和新建电芯制造商（200–2,000 MWh/年）；Series B 之前不主动接触一线厂商。"
  - risk: "充放电仪厂商（Arbin、Neware、Maccor）或 Voltaiq 在化成协议库产生可守护差异化之前推出硅特异性认证模块"
    likelihood: Medium
    impact: High
    mitigation: "锁定硬件无关多厂商集成，并在其推出竞争功能之前积极推进充放电仪厂商合作关系；第一年签署 3 个以上共创客户，加速协议库数据积累。"
  - risk: "Sicona 的 Port Kembla 工厂推迟 12–24 个月，延后 SiCx 认证浪潮和滩头客户群"
    likelihood: Medium
    impact: Medium
    mitigation: "同步锁定所有商业硅负极供应商——Group14、Sila、Nexeon；产品绑定硅负极采用浪潮，而非单一供应商的时间线。"
  - risk: "化成协议库准确度不足（第一年无法实现低于 15% 预测误差），损害核心产品承诺"
    likelihood: Medium
    impact: High
    mitigation: "在共创客户试点中准确设定预期；在准确度验证前将协议库定位为咨询参考；科学顾问委员会作为公信力保障。"
  - risk: "电芯制造商将化成配方和认证数据视为敏感知识产权，拒绝跨客户匿名数据共享，阻塞协议库飞轮"
    likelihood: High
    impact: High
    mitigation: "从第一天起提供 VPC 或本地部署和严格的选择性匿名化；将协议库贡献设计为明确的客户同意，而非默认数据汇聚。"
  - risk: "定价假设（$80K–$150K/年每项目）对 QA 工具预算有限的中型电芯制造商过高"
    likelihood: Medium
    impact: Medium
    mitigation: "在规模化销售之前，在前两个共创客户试点中验证 ACV；准备较低入门定价层（$30K–$50K/年）作为备选，在较低毛利率下维持 SaaS 经济性。"

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3–5M"
  runwayMonths: 20
  useOfFundsSummary: >-
    20 个月现金跑道覆盖：（1）4 人创始团队（CEO、CTO、电化学负责人、第 4 个月招募的企业商务拓展）
    加第二位工程师（第 6 个月）；（2）化成协议库准确度的科学顾问委员会聘用费；
    （3）云基础设施和充放电仪连接器开发；（4）共创客户项目成本（差旅、集成测试实验室访问）；
    （5）前两次供应商合作谈判（Sicona、Group14/Sila）。目标：第 12 个月前达到 2 名付费客户
    （各 $80K+ ACV）并验证化成协议库准确度（预测误差低于 15%），为第 18–20 个月的 Series A
    融资提供证据基础。
