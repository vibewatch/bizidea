    name: CAC blended (Y2 acquisition)
    value: "90"
    unit: "$K per new customer"
    source: "[calc] Y2 S&M spend ~$755K / 8 new customers = ~$94K; rounded to $90K; BP funnelTargets 30-40% supplier-referral to qualified pilot and 50%+ pilot-to-paid; heuristic: enterprise SaaS CAC typically 0.6-1.0x ACV for co-marketing-heavy GTM channel"
