    name: Y2 headcount additions
    value: "Sr Eng M13, PM M15, CS Manager M16, Sales Exec 2 M18"
    unit: "FTE schedule"
    source: "[BP fundingAsk.useOfFundsSummary + BP sequencingRationale] Series A (A15) funds scale to 9 FTE by M18; sales hires trail revenue validation; product/CS added to manage growing multi-customer base per BP sequencingRationale"
  - id: A25
    name: Y3 headcount additions
    value: "2x Eng M25, Data Scientist M28, Sales Exec 3 M30, G&A Controller M33"
    unit: "FTE schedule"
    source: "[BP milestones M28-M36] Lot-to-lot QA module (M28), BMS calibration module in design-partner phase (M30), lithium-metal anode library (M36) require additional engineering; Series A enables 14 FTE scale"
