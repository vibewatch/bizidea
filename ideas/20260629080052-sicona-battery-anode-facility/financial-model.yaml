    value: "215"
    unit: "$K/year"
    source: "[startup-finance heuristic] PhD silicon-anode specialist; premium for rare expertise flagged in BP team section as critical M1 hire; below co-founder comp but above standard SWE"
  - id: A19
    name: Enterprise Sales/BD Lead annual OTE
    value: "215"
    unit: "$K/year ($185K base + $30K variable)"
    source: "[startup-finance heuristic] Senior enterprise SaaS BD with battery-industry network; $185K base plus $30K variable on-target; BP team startTiming Month 4"
  - id: A20
    name: Software Engineer 2 annual salary
    value: "200"
    unit: "$K/year"
    source: "[startup-finance heuristic] Full-stack data engineer for OEM report pipeline and Maccor connector; BP team startTiming Month 6"
  - id: A21
    name: Payroll tax and benefits burden rate
    value: "20"
    unit: "% of base salary"
    source: "[startup-finance heuristic] Combined employer contributions: AU superannuation ~11%, payroll tax ~5%, health/other ~4%; 20% used as blended estimate for AU/US hiring context"
  - id: A22
    name: Non-salary OPEX monthly range
    value: "15-28"
    unit: "$K/month"
    source: "[startup-finance heuristic + BP operations] Scientific advisory board retainer $3K, conference/travel $5K (spikes to $10K at Battery Show EU and EV Tech Expo), legal/IP $5-8K early stage, dev tools and databases $3K, office/coworking $3K, admin/insurance $2K; spikes in M4 and M10"
