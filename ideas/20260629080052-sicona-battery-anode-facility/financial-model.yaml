assumptions:
  - id: A1
    name: Starting customers (M1)
    value: "0"
    unit: count
    source: "[BP executiveSummary] No customers at model start; product is pre-launch July 2026"
  - id: A2
    name: First design-partner pilot launch month
    value: "M4 (October 2026)"
    unit: month
    source: "[BP milestones] 'Month 4: First design-partner qualification pilot launched (1 cell manufacturer, 1 SiCx lot)'"
  - id: A3
    name: Pilot contract value
    value: "50"
    unit: "$K total for 6-month engagement"
    source: "[BP investorMemo.firstCustomer] 'Paid pilot at $40K-$60K for one qualification program'; midpoint $50K; recognized evenly over 6 months at ~$8.3K/mo"
  - id: A4
    name: Second design-partner pilot start
    value: "M8 (February 2027)"
    unit: month
    source: "[BP experimentRoadmap 90-180 days] second design-partner experiment horizon implies second pilot running by M8-M9"
  - id: A5
    name: First paid annual SaaS subscription close
    value: "M12 (June 2027)"
    unit: month
    source: "[BP milestones] 'Month 12: First paid annual SaaS subscription closed ($80K-$150K ACV); 2 active paying customers'"
  - id: A6
    name: Launch ACV per customer
    value: "100"
    unit: "$K/year at launch, blended $145K by Y3"
    source: "[BP pricing] '$80K-$150K/year per active qualification program'; $100K used at launch growing to blended $145K by Y3 as multi-program expansion (1.4 programs avg) kicks in per research SOM calc"
  - id: A7
    name: Monthly customer churn rate
    value: "0.67"
    unit: "% per month (approx 8% annual)"
    source: "[startup-finance heuristic] ~8% annual churn for sticky enterprise compliance SaaS; lower than typical SaaS because cycler-data integration and OEM-report library create structural switching costs consistent with BP moatsToBuild"
  - id: A8
    name: Target gross margin
    value: "75"
    unit: "%"
    source: "[BP businessModel.targetGrossMarginPct] explicitly 75%; achieved by Y3 as infrastructure cost grows slower than revenue"
  - id: A9
    name: Minimum monthly COGS (infrastructure floor)
    value: "2"
    unit: "$K/month"
    source: "[BP operations] 'Cloud infrastructure: AWS or GCP for test data ingestion, storage'; minimum baseline regardless of customer count; COGS scales to 25% of revenue from M8 onward"
  - id: A10
    name: Customers at M24 (end Y2)
    value: "10"
    unit: count
    source: "[BP milestones] 'Month 24: 10 paying manufacturers; $1.5-1.8M ARR'"
  - id: A11
    name: Customers at M36 (end Y3)
    value: "14"
    unit: count
    source: "[BP milestones + research SOM] 10 at M24 plus 4 new in Y3 via Group14/Sila/Nexeon referrals; consistent with $3M+ ARR trajectory at approx $214K blended ACV; research SOM assumes 10 customers at $182K ACV = $1.82M steady-state"
  - id: A12
    name: Blended ARPU at Y3
    value: "145"
    unit: "$K/year per customer"
    source: "[research SOM calc + BP pricing] research SOM: 10 customers x 1.4 programs x $0.13M = $1.82M; this model uses 14 customers x $145K avg = $2.03M Y3; $145K reflects mix of single-program ($100K) and multi-program ($180K) accounts consistent with land-and-expand in BP expansionLevers"
  - id: A13
    name: COGS rate at scale
    value: "25"
    unit: "% of revenue"
    source: "[startup-finance heuristic + BP businessModel.targetGrossMarginPct] 25% COGS implies 75% GM target; covers AWS/GCP hosting, customer-success overhead, and data-ingestion compute; consistent with B2B SaaS with light implementation"
  - id: A14
    name: Seed raise amount
    value: "4.0"
    unit: "$M"
    source: "[BP fundingAsk] '$3-5M'; $4.0M computed from M1-M20 operating burn (~$2.3M) plus 6-month runway buffer (~$1.0M) plus contingency ($0.7M); deposited at M1 opening; within stated BP range"
  - id: A15
    name: Anticipated Series A inflow (cash-model assumption only)
    value: "7.0"
    unit: "$M added to cashEopK at Q2Y2"
    source: "[BP milestones] 'Series A raise at Month 18-20'; $7M based on $1.5M ARR x 5-7x forward ARR multiple (startup-finance heuristic for enterprise deep-tech SaaS Series A in 2027-2028); reflected in cashEopK from Q2Y2 onward but NOT in ebitdaK or fundingAsk; without this raise cash depletes in Q2Y3"
  - id: A16
    name: CEO annual salary (base)
    value: "240"
    unit: "$K/year"
    source: "[startup-finance heuristic] Deep-tech technical co-founder with silicon electrochemistry domain expertise; 2026 Sydney/international market mid-range founder comp for specialized hardware-adjacent SaaS"
  - id: A17
    name: CTO annual salary (base)
    value: "240"
    unit: "$K/year"
    source: "[startup-finance heuristic] Senior battery-software/data-pipeline engineer co-founder; co-founder parity with CEO; consistent with 2026 Sydney tech market"
  - id: A18
