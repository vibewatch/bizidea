sensitivity:
  - variable: ARPU
    downsideCase: "$80K ACV (pricing hypothesis fails; buyers cap spend at minimum tier or extend existing cycler software)"
    baseCase: "$145K ACV (1.4 programs per customer at mid-range pricing; validated in first two design-partner programs per BP operatingAssumptions)"
    upsideCase: "$180K ACV (1.5 programs per customer plus OEM report add-on fees; EU compliance urgency drives premium)"
    y3RevenueImpactK: -897.0
    cashImpactK: -673.0
  - variable: churn
    downsideCase: "1.2% monthly (14.4% annual): buyers cancel after qualification wave peaks; IP-sharing friction blocks formation-protocol library flywheel"
    baseCase: "0.67% monthly (8% annual): sticky due to normalized cycler-data integration layer and OEM-report compliance artifacts per BP moatsToBuild"
    upsideCase: "0.25% monthly (3% annual): protocol library becomes industry reference; customers expand programs rather than churn"
    y3RevenueImpactK: -450.0
    cashImpactK: -338.0
  - variable: CAC
    downsideCase: "$180K per customer (all 4 supplier referrals fail; full direct outreach with 9-month enterprise sales cycles)"
    baseCase: "$90K per customer (Sicona plus Group14/Sila co-marketing: 35% referral conversion, 50%+ pilot-to-paid per BP funnelTargets)"
    upsideCase: "$40K per customer (all 4 supplier partnerships active; inbound demand from timed qualification deadlines)"
    y3RevenueImpactK: -290.0
    cashImpactK: -720.0
  - variable: sales cycle
    downsideCase: "9 months average (battery-industry procurement slows; VP approval requires multi-quarter budget cycle; no pre-qualified referrals)"
    baseCase: "4.5 months (pilot triggered at SiCx sample receipt; VP pre-approval via Sicona co-marketing relationship per BP wedgeRationale)"
    upsideCase: "2 months (supplier referral creates pre-qualified inbound; pilot waived for compliance-urgent EU customers under EU Battery Regulation 2023/1542)"
    y3RevenueImpactK: -620.0
    cashImpactK: -465.0
  - variable: gross margin
    downsideCase: "58% (heavy per-customer implementation services required for mixed Arbin/Neware/Maccor cycler-fleet normalization; BP risk: connector integration deeper than expected)"
    baseCase: "75% (target; cloud-infra scale and auto-onboarding absorbs new customers with minimal incremental CS cost per BP businessModel.targetGrossMarginPct)"
    upsideCase: "82% (pure-SaaS automated onboarding; protocol-library self-serve reduces CS headcount requirement in Y3)"
    y3RevenueImpactK: 0.0
    cashImpactK: -340.0
  - variable: hiring pace
    downsideCase: "Electrochemistry Lead hire delayed 4 months (PhD silicon-anode talent scarce outside Wollongong and Stanford; BP team flags this as first post-founder hire)"
    baseCase: "All hires per BP team plan: Electrochemistry Lead M1, BD Lead M4, Eng2 M6; advisory board onboarded by M3"
    upsideCase: "Full founding team of 4 hired by M1 via University of Wollongong silicon-anode research network and Sicona introduction"
    y3RevenueImpactK: -350.0
    cashImpactK: -200.0

modelDiagram:
  title: Silicon-anode qualification platform unit-economics flow
  mermaid: |
    flowchart LR
      SiconaEvent["Sicona SiCx\nSupply 2026"] --> NPI["NPI Program\nTrigger"]
      NPI --> Pilot["Paid Pilot\n50K per 6 mo"]
      Pilot --> SaaS["Annual SaaS\n80K-150K ACV"]
      SaaS --> Revenue["Revenue\nY1 115K to Y3 2.0M"]
      Revenue --> GP["Gross Profit\n75pct by Y3"]
      GP --> EBITDA["EBITDA\nneg 2.2M Y3"]
      EBITDA --> Cash["Cash\n5.8M EoP Y3"]
      SaaS --> Library["Formation-Protocol\nLibrary Moat"]
      Library --> Expansion["Multi-program\nExpansion 1.4x"]
      Expansion --> SaaS

modelSanity:
  - checkName: Revenue engine
    finding: "Revenue compounds as each new silicon-anode supplier triggers a dated NPI qualification wave, growing from 2 pilot customers at $50K each in Y1 to 14 paying manufacturers at $145K blended ACV by Y3 end, delivering $2.0M Y3 revenue driven by Sicona-then-Group14/Sila supplier referral stacking."
  - checkName: Must go right
    finding: "At least one silicon-anode supplier (Sicona, Group14, or Sila) must activate a paying customer referral channel within 6 months of seed close; without supplier co-marketing, CAC rises from $90K to $180K, stretching payback to 22 months and eroding the Series A milestone timeline by 8+ months per the CAC sensitivity row."
  - checkName: Model breaks if
    finding: "If the $80K-$150K ACV pricing hypothesis fails validation and buyers cap spend at $30-50K, Y3 revenue collapses below $700K, the seed runway math breaks, and the $1.5M ARR Series A narrative disintegrates as shown in the ARPU sensitivity row (-$897K Y3 revenue impact)."
  - checkName: Next-round proof
    finding: "The Series A milestone is 10 paying customers generating $1.5-1.8M ARR by M24 with greater than 70% gross margin and less than 15% formation-protocol prediction error demonstrated - metrics grounded in BP milestones and scenarios.base - that together justify a $7M+ Series A at 5-8x forward ARR."

sanityChecks:
  ruleOf40: "Y3 revenue growth 104% (($2.0M-$0.98M)/$0.98M) + EBITDA margin -108% (-$2.165M/$2.0M) = -4% (fails; acceptable for seed-to-Series-A growth-investing phase with $7M Series A deployed into team scale-up ahead of $3M+ ARR)"
  burnMultiple: "3.3x in Y3 (net burn $2.165M / net new ARR $660K = Y3-exit ARR $2.24M minus Y2-exit ARR $1.58M); above the 2.0x SaaS benchmark; must compress toward 1.5x in Y4 as $3M+ ARR matures with stable 14-FTE headcount"
  revenuePerFte: "$157K in Y3 (12.7 avg FTE; benchmark $200-400K SaaS); below benchmark during investment phase while team is scaled ahead of revenue; improves toward $230K+ when Y4 ARR reaches $3M on the same headcount base"
  flags:
    - "ACV pricing hypothesis ($80K-$150K/yr per program) is unvalidated at model date; a miss to $30-50K collapses Y3 revenue below $700K, invalidates the seed runway math, and eliminates the Series A case - the single largest model risk per BP operatingAssumptions."
    - "Series A ($7.0M assumed at M18, reflected in cashEopK from Q2Y2 onward) is not committed; if delayed 6+ months cash depletes in Q4Y2 and a $60K/mo cost reduction (1-2 FTE deferred) is required within 30 days of miss signal."
    - "Burn multiple 3.3x in Y3 exceeds the 2.0x SaaS benchmark; acceptable while deploying Series A into growth but a Series B conversation will require demonstrated improvement in net new ARR per dollar burned."
    - "Cell manufacturer IP sensitivity is a HIGH-likelihood risk per BP risks section; refusal to share anonymized qualification data blocks the formation-protocol library flywheel, reducing product stickiness, cutting LTV below the modeled $1,354K, and weakening the data-moat Series A narrative."
    - "cashEopK for Q2Y2 onward includes a +$7.0M Series A inflow (assumption A15); without this raise, cash depletes in Q2Y3 and the Y3 model does not hold - seed-only cash turns negative by Q2Y3 at base-case burn."
