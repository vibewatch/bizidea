competitors:
- name: Voltaiq
  stage: scale-up
  wedge: 从研发到制造和质量分析的企业级电池数据和 AI 平台。
  pricing: 定制企业报价；无公开定价。
  strength: 跨职能分析叙事强劲，具备制造关联和与 AWS、Siemens、NOVONIX 的生态系统叙事。
  weaknessVsUs: 广泛的电池分析与带有协议库和买家特定报告逻辑的硅负极原生认证操作系统不是同一件事。
  sourceRefs:
  - 11
  - 12
  - 13
  - 35
- name: Arbin
  stage: incumbent
  wedge: 充放电仪硬件加统一测试控制和分析软件。
  pricing: 硬件和软件均按报价销售。
  strength: 对已标准化在 Arbin 上的团队，设备控制深度强，工作流程现代统一。
  weaknessVsUs: Arbin 优化其自身技术栈上的执行；默认不解决跨厂商硅负极认证逻辑或证据包装问题。
  sourceRefs:
  - 14
  - 15
- name: Neware
  stage: incumbent
  wedge: 低成本测试仪生态系统，搭配免费 BTSDA 分析软件。
  pricing: 硬件按报价销售；BTSDA 分析仪宣传为免费。
  strength: 装机基础庞大，基础分析工具获取门槛低。
  weaknessVsUs: 免费分析软件强化了数据碎片化，不提供企业级认证工作流程或跨供应商决策支持。
  sourceRefs:
  - 14
  - 17
- name: Maccor
  stage: incumbent
  wedge: 受信赖的电池测试系统，捆绑控制和分析软件。
  pricing: 硬件主导报价；软件随测试仪部署捆绑。
  strength: 跨化学体系和电芯格式的化成与电池测试执行口碑强劲。
  weaknessVsUs: Maccor 仍是测试控制层，而非具备可复用模板和买家facing产物的硅特异性认证操作系统。
  sourceRefs:
  - 14
  - 16
- name: Ionworks
  stage: scale-up
  wedge: 位于充放电仪和工程工作流程之间的电池仿真和自动化分析层。
  pricing: 定制报价；无公开定价。
  strength: 清晰地围绕仿真、API 和从现有测试数据中提取更多价值定位。
  weaknessVsUs: Ionworks 更接近建模和数据生产力层，而非围绕硅负极失效模式和确认包构建的供应商认证系统。
  sourceRefs:
  - 14
  - 37
