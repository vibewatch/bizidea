  validationPlan:
  - priority: high
    question: 目标电芯制造商每年同时运行多少个硅负极认证项目，这些项目活跃多久？
    evidenceToGather: 对 6–8 家中型电芯制造商 NPI/质量负责人进行结构化访谈，并获取匿名项目日历。
  - priority: high
    question: 产品能否从混合 Arbin/Neware/Maccor/Voltaiq 技术栈中接入足够元数据，自动生成可信的供应商认证包？
    evidenceToGather: 使用一个真实项目及其原始导出、SOP 和报告模板开展共创客户试点。
  - priority: medium
    question: 硅负极供应商是否会主动将客户推荐给中立认证工作流程供应商？
    evidenceToGather: 与 Sicona、Group14、Sila 和 Nexeon 商务/应用团队对话，并收集联合客户介绍的证据。
  - priority: low
    question: 欧洲买家与欧洲以外 OEM 审查团队，哪些证据字段是强制要求的？
    evidenceToGather: 与合规顾问、测试实验室以及至少两位下游电池客户核对模板字段。
