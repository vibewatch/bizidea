slug: sovereign-revisit-guarantee-os
date: '2026-05-22'
executiveSummary: 主权重访保障 OS 最该卖给欧洲国防系统集成商：他们得为那些自己没有足够 SAR 容量的部委，去投标并运营全天候 ISR 项目。滩头市场是一份位于波罗的海、北欧或东欧的海岸边境或关键基础设施监测项目——黑夜、云层和主权要求，让商业 SAR 很可信，但靠表格去管担保又特别脆。产品先从一套投标 + 交付工作台起步：把监测区域、重访目标、供应商假设和合规闸口先建进去，再把承诺覆盖和实际交付一项项对上，吐出可审计的证据包。比起一上来做宽口径地理空间平台，这个切口更窄、也更快能证明，因为第一位客户、第一触发点、预算 owner、定价基准和验证信号，都落在同一条主合同工作流里。公司应该刻意避免自己持有卫星、转售原始影像，或在还没证明系统集成商愿意为供应商中立的担保管理付费之前，就直接卖部委指挥平台。研究给出的时点判断是成立的：主权需求在涨，ICEYE 在为客户担保融资，主承包商也愿意为高级任务能力付费；但市场里还没有被点名、且明确写着重访 SLA 的招标。于是前 12 个月不能按“规模化故事”来跑，而得按“证伪计划”来跑：围绕一份真实投标、两个供应商集成和一条付费交付工作流，把假设一条条验掉。只要公司能在真实主权项目里，成为“承诺了什么 vs 交付了什么”的 system of record，它就能顺着同一批客户，继续扩到多传感器任务编排、权限控制，以及部委级运营证据。
problem:
- 国防系统集成商今天在投标主权 SAR 项目时，重访承诺、供应商担保和合规义务，很多还在用表格和邮件建模。
- 一旦项目上线，任务团队往往很难在短缺演变成罚则或信任事故之前，先把“承诺过的覆盖确实交付到了位”整理成部委可审计的形式。
- 无论是现有传感器厂商还是宽口径国防平台，都没有原生拿下基于商业 SAR 的主权合同里那条跨供应商的担保、权限和证据工作流。
solution:
- 做一套主权覆盖工作台，让 capture 团队在投标前就能把多边形、重访目标、任务窗口、供应商假设和担保阈值全部建模。
- 再把同一套工作台变成运营账本：把承诺覆盖和实际交付逐项对上，提前预警可能的 SLA 漏洞，并把每次异常和来源链都记下来。
- 自动生成部委可用的证据包、权限日志和升级流程，让主承包商在不替换现有任务系统的前提下，也能把履约表现讲清楚。
whyWeWin:
- 公司站在传感器厂商之上，能在 ICEYE、Capella、Umbra 以及相邻来源之间保持中立，而不是被某一家星座路线图绑死。
- 第一条工作流直接钩住投标风险和交付罚则，预算抓手比再卖一个影像看板清楚得多。
- 按地理区域、供应商和任务类型积累的“承诺 vs 交付”历史数据，会慢慢长成专有投标情报和切换成本。
- 先从非密的规划与报告工作流切入，安全门槛更低，但照样能解决一个直面部委的问责问题。
strategicChoices:
  beachhead: 先打一个欧洲国防系统集成商：他正在投标或重投一份位于波罗的海、北欧或东欧的海岸边境或关键基础设施监测合同；这份合同需要全天候重访可信度，也要求交付证据可审计。
  wedgeRationale: 这个入口够窄：用户、买方、触发点和 proof point 都落在同一支主权项目团队里；如果一上来卖宽口径 ISR 平台，公司得同时证明任务调度、融合、分发和认证，难度会陡增。
  sequencingRationale: 先拿中标前的覆盖建模和中标后的证据包，因为这两条工作流可以部分留在非密环境里，也能直接挂到活跃的主承包商预算上；更深的任务编排、多传感器融合和直销部委部署，要等公司先证明自己能稳稳接住一条生产级 SLA 工作流之后再加。
  notYet:
  - 在第一家由系统集成商带进来的项目还没跑到生产前，先别做面向部委的全平台直销。
  - 先别碰原始影像转售或自有卫星能力。
  - 在担保账本还没建立起信任之前，先别做完整的多传感器任务指挥软件。
  - 在国防工作流 fit 还没被证明之前，先别扩到民用灾害、保险或商业基础设施产品。
market:
  tam: $0.9B：覆盖全球主权监测项目和系统集成商主导 ISR 合同里，那些有机会承载任务控制与保障层的软件预算。
  sam: $90.0M：大约 45 个位于波罗的海、北欧和东欧的滩头项目；这些地方对主权、全天候监测的需求已经能看见。
  som: $9.0M：按第 3 年可触达 6 个项目、每个项目约 $1.5M 的软件 + 实施综合年收入估算。
  segments:
  - 在商业 SAR 之上运营主权边境、海上或关键基础设施 ISR 项目的欧洲国防系统集成商
  - 较小盟国里的主权监视项目——他们需要独立审计和覆盖保障，但无力自建完整国家星座
  buyingProcess: 最可能的路径仍然由主承包商带着走：ISR 项目 GM 先为一份真实招标或重投发起设计动作，capture 团队和任务运营团队一起验证建模工作流，随后再由安全和合同团队放行部署与证据处理，最后才会签下一轮付费试点或项目模块。
product:
  mvp: MVP 是一套围绕单个主权项目的安全工作台：它能把多边形和重访目标建模进去，存供应商假设和担保阈值，吃进至少两家供应商的交付日志，并导出可审计证据包。它应该和现有 PMO 与任务系统并排跑，而不是一上来就替换。
  sixMonth: 拿下一家共创客户，交付“投标建模 + 承诺 vs 交付报告”这一条工作流，并支持客户自控部署，用在非密规划材料上。
  twelveMonth: 补上权限跟踪、异常工作流、基于角色的审计日志，以及两家供应商的集成能力，足以支撑一份付费生产部署。
  twentyFourMonth: 扩到实时任务编排、相邻 EO 与 RF 证据接入，以及同一主承包商或盟友部委网络里的多项目绩效基准。
  keyBets:
  - 系统集成商会先为“更快投标、降低交付风险”付费，而不是先要求替换整套任务平台。
  - 至少两家上游供应商能开放足够的任务调度、交付和权限遥测，支撑独立 SLA 审计。
  - 客户自控部署或 sovereign cloud 部署能被标准化到一个程度，不会把公司拖成纯服务生意。
  - 在前两年里，历史覆盖表现数据会比任何单一分析模型更像护城河。
gtm:
  wedge: 先卖一轮付费试点：围绕一份真实在跑的主权监视投标或活跃项目，帮助主承包商在中标前建模重访担保，并在中标后为已交付覆盖做抗辩。
  channels:
  - 由创始人亲自直销给欧洲国防系统集成商里的 ISR 项目 GM、capture 负责人和任务运营主管
  - 与已经挂在主权投标书上的 SAR 供应商和任务系统集成商做联合销售和实施合作
  - 在第一个生产级 proof point 跑出来后，再沿着案例扩到相邻的波罗的海、北欧和东欧项目
  funnelTargets: 目标账户→已界定范围的共创客户 20-30%，共创客户→付费试点 40-50%，付费试点→生产级项目模块 50%+，首个 production logo→第二项目或相邻工作流扩张 12 个月内 40%+
  pricing: 先围绕一份真实项目收 $100k-$250k 的付费试点费，再转成每年 $300k-$750k 的项目订阅费，另加实施费和按监测多边形集合或保障覆盖包计费的用量收费。这样做既贴合主承包商按项目编预算的习惯，也把定价钉在“帮客户避开了多大风险”，而不是席位数。
businessModel:
  revenueStreams:
  - 按活跃项目收年度软件订阅费
  - 部署、集成和认证支持费用
  - 按用量收取的监测、报告和证据包费用
  unitOfValue: 带有计量型监测多边形和合同覆盖承诺的活跃主权项目
  targetGrossMarginPct: 70
  expansionLevers:
  - 从同一主承包商里的一个项目，扩到多个主权合同
  - 担保账本嵌进去之后，再加权限、合规和审计模块
  - 沿着同一套证据模型，把 SAR 项目扩到多传感器任务工作流
  - 把客户自控部署模板和安全集成方案卖到更多盟友地区
strategyMap:
  northStarMetric: 平台里跑着“承诺 vs 交付”跟踪的生产级主权项目的年化数量
  inputMetrics:
  - 带明确重访或交付保障痛点的真实招标/重投数量
  - 在活跃主权项目上启动的付费试点数量
  - 能吐出可用交付与权限遥测的供应商集成数量
  - 试点转生产的转化率
  - 客户无需大幅返工就能接受的月度证据包占比
  moatsToBuild:
  - 按多边形、供应商和任务类型沉淀的跨供应商历史覆盖表现与异常数据集
  - 直接挂在真实合同语言上的项目内嵌权限、合规与审计工作流
  - 被主承包商和主权买方信任的客户自控部署与安全模板
  killCriteria:
  - 做完 15 次合格主承包商项目对话、4 次已界定范围的设计动作后，仍拿不到任何付费试点
  - 到第 9 个月还拿不到至少 2 家上游供应商的可审计遥测
  - 试点生成的证据包被客户接受的比例低于 50%，且每次都要大量手工重建
  mermaid: |
    flowchart LR
      Wedge[主承包商切入的担保工作流] --> MVP[覆盖建模与证据账本]
      MVP --> Proof[带可审计 SLA 证明的付费试点]
      Proof --> Expansion[更多项目与多传感器任务工作流]
investorMemo:
  verdict:
    call: 见面 / 继续深挖
    conviction: 切口和时点都很强，但判断强不强，最后要看能不能先证明主承包商真愿意付费；否则采购拖慢和供应商依赖会先把它压住。
    whyBelieve: 公司切中的，是商业 SAR 担保能力抬头后新冒出来的一条主权工作流缺口；而现有厂商要么更擅长卖传感器，要么更擅长做宽口径数据融合。
    whyDoubt: 市场高度集中，具名招标证据还不完整，而且一旦遥测接入或安全部署比预期更难，产品很可能会塌成系统集成商的服务项目。
    nextDiligence: 先确认一份真实存在、且确实痛在覆盖保障上的主承包商投标，再拿下两家供应商的数据访问承诺，并按目标价格签出第一轮付费试点。
  firstCustomer:
    title: 欧洲某家国防系统集成商里的 ISR 项目 GM
    profile: 他带着一支 200–2,000 人规模的集成商团队，正在投标或运营一份主权边境、海岸或关键基础设施监测项目，并依赖商业 SAR 伙伴来兜住重访承诺。
    trigger: 新的招标、重投，或客户复盘，会逼主承包商在不依赖盟友情报共享的前提下，拿出全天候重访可信度和可审计交付的证明。
    buyer: ISR 项目的 VP 或总经理
    initialContract: 先围绕一个活跃项目签一轮 90–120 天、$100k-$250k 的付费试点；如果平台被用进一轮投标周期，或一次面向客户的绩效复盘，再转成每年 $300k-$750k 的项目订阅费，并另收实施费。
  mustBeTrue:
  - 至少有一家目标系统集成商，会在要求完整认证任务平台之前，先为付费试点掏钱。
  - 两家或以上的上游供应商，愿意开放足够的交付与权限遥测，让独立的“承诺 vs 交付”审计成立。
  - 客户团队会在真实项目复盘里接受平台生成的证据包，而且只需要很少的手工返工。
  - 客户自控部署能被标准化到一定程度，这样规模化后毛利仍能超过 70%。
  - 拿下一家 production logo 后，12 个月内能扩到第二个项目或相邻工作流。
  diligenceQuestions:
  - 现在到底有哪些具名的波罗的海、北欧或东欧招标，会把重访保障或可审计交付证据写进评分？
  - 这条工作流的第一笔预算，最先握在 capture、任务运营还是项目负责人手里？
  - 哪些供应商 API 或合同条款，让独立 SLA 审计变得可能；又有哪些会直接把它卡死？
  - 不同主权客户之间，到底有多少实施和安全工作可以被标准化？
  - 什么样的客户可见罚则、重投风险或信任事故，足以撑起 $300k-$750k 的 ACV？
operatingAssumptions:
- assumption: 第一条真能落地的切口，是由主承包商带着跑的主权边境、海岸或关键基础设施项目，而不是直接卖给部委的平台。
  basis: idea.yaml
  validationTest: 访谈 10 个合格的系统集成商账户；只有当至少 3 家愿意在未来 12 个月里，为真实投标或交付工作流划范围时，才继续往下做。
  decisionImpact: 如果这条假设不成立，公司就得收窄到 white-label 或分包部署，并把品牌化企业销售往后推。
- assumption: 至少两家 SAR 供应商会共享足够的任务调度、交付和权限数据，支持审计级对账。
  basis: research.yaml
  validationTest: 在承诺生产级 SLA 报告之前，先从两家供应商手里拿到样本日志和商业集成条款。
  decisionImpact: 如果不成立，产品就没法保持供应商中立，只能收窄成纯规划工作流，或者只服务单一供应商部署。
- assumption: 尽管主权安全顾虑很强，但非密的规划与报告工作流，已经足够拿下第一轮付费试点。
  basis: research.yaml
  validationTest: 和一家主承包商安全团队完成一次架构与数据边界评审，并拿到书面批准的试点范围。
  decisionImpact: 如果不成立，实施成本和销售周期都会明显抬升，招聘得放慢，融资规模也得做大。
- assumption: 一旦某个项目证明能降低投标风险或减少交付升级，买方就愿意接受 $300k-$750k 的年度定价。
  basis: idea.yaml
  validationTest: 把生产级定价直接写进试点方案里，并至少拿到一份在目标价格区间内的 LOI 或预算批准。
  decisionImpact: 如果不成立，公司就得把范围做得更轻、更多依赖服务收入，或者重置融资预期。
- assumption: 活跃项目里积累下来的历史表现与异常数据，会变成真正的护城河，而不只是实施副产物。
  basis: operator judgment
  validationTest: 在试点里埋好采集：让每个项目都能产出可复用的 benchmark 数据，覆盖不同供应商、地理区域下的覆盖偏差、短缺和升级结果。
  decisionImpact: 如果不成立，防御力就只剩工作流便利性和伙伴渠道，长期的 venture upside 会被削弱。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 12 位欧洲国防系统集成商里的 ISR 项目负责人，把一份真实招标或重投流程从头到尾画清楚。
  hypothesis: 覆盖保障的痛感足够强，至少会有 3 家账户愿意围绕当前投标或交付复盘划出 design partner 范围。
  successMetric: 完成 12 次合格访谈、拿到 3 个已界定范围的 design partner 机会，并确认 1 位带明确时间表的经济买方。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 拿样本任务调度、交付和权限日志，和 ICEYE 级别及非 ICEYE 的供应商一起做集成范围确认。
  hypothesis: 两家供应商能在不签排他性商业条款的前提下，支持独立的“承诺 vs 交付”对账。
  successMetric: 拿到 2 份供应商集成方案，附样本遥测和后续商业动作。
  owner: 创始人/CEO + 创始工程师
- horizon: 90–180 天
  experiment: 用客户表格和供应商输入，在一份历史或真实主权项目上跑一条 concierge 式投标建模工作流。
  hypothesis: 产品能缩短投标准备时间，并在提交前把重访缺口先揪出来。
  successMetric: 投标建模周期缩短 25%+，或在客户提交前发现 1 个实质性的覆盖风险问题。
  owner: 产品负责人
- horizon: 90–180 天
  experiment: 部署一轮付费试点：对比承诺覆盖和实际交付，并导出 1 份部委可用的证据包。
  hypothesis: 即便还没和完整任务系统深度集成，只要证据可追溯、可审计，买方也会先付钱。
  successMetric: 签下 1 轮 $100k+ 的付费试点，并让 1 份面向客户的证据包在只需小改的情况下被接受。
  owner: 销售负责人
- horizon: 180–365 天
  experiment: 在一份活跃项目里，验证主权云或客户自管基础设施下的客户自控部署模式。
  hypothesis: 安全部署可以被产品化，不会把公司拖进“每单都要重做”的服务陷阱。
  successMetric: 1 套获批部署模式能复用到 2 个客户机会里，而且定制工程占比低于 25%。
  owner: 平台负责人
- horizon: 180–540 天
  experiment: 把第一个 logo 从一个项目模块，扩到第二条工作流，例如权限管理或多传感器证据。
  hypothesis: 一旦担保账本建立起信任，相邻工作流的销售速度会快过重新拿下一个新 logo。
  successMetric: 在首个生产级 go-live 后 12 个月内，拿下 1 次 upsell 或第二项目扩张。
  owner: 客户成功负责人
operations:
- 围绕遥测访问、审计权和出口管制边界，管理供应商合同与权限。
- 沉淀客户自控部署手册，里面带基于角色的访问控制、审计日志和环境隔离。
- 建立 human-in-the-loop 的异常复核流程，用来处理覆盖短缺、override 和客户升级。
- 按项目生成与部委报告和续约复盘对齐的证据包。
- 每季度把试点数据沉淀成可复用的投标情报基线。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责拿下这个切口最关键的三样东西：覆盖模型、遥测接入和审计账本。
- role: 产品与任务运营负责人
  startTiming: 第 0 个月
  rationale: 把 capture 团队和交付团队的真实工作流翻成一款够窄、也经得起主权客户审视的产品。
- role: 前线部署解决方案工程师
  startTiming: 第 3 个月
  rationale: 把安全部署和集成工作收束住，别让试点一步步塌成定制项目。
- role: 企业国防销售负责人
  startTiming: 第 4-6 个月
  rationale: 把高度集中的主承包商关系转成付费试点，并接住长周期项目销售。
- role: 合规与客户成功负责人
  startTiming: 第 6-9 个月
  rationale: 负责出口管制工作流设计、证据包质量，以及在首批 logo 里把试点扩成更大范围的使用。
milestones:
- horizon: 0–12 个月
  items:
  - 打通 2 条供应商集成路径，拿到可用的任务调度与交付遥测
  - 拿下 3 家 design partner，并在真实主权项目上签出至少 1 轮付费试点
  - 交付带覆盖建模、证据导出和客户自控试点部署的 MVP
  - 证明至少有 1 份面向客户的证据包，能在真实项目复盘里被接受
- horizon: 12–24 个月
  items:
  - 转出 2-4 个生产级项目，每个项目年度订阅价值在 $300k-$750k
  - 把 1 套安全部署模式复用到多个客户机会里
  - 上线权限跟踪和异常管理模块
  - 在第一个 logo 内拿下 1 笔第二项目或相邻工作流扩张
- horizon: 24–36 个月
  items:
  - 做到约 6 个生产中的活跃主权项目
  - 证明跨供应商绩效基准能提升中标率或减少交付升级
  - 在生产级客户里加入 EO 或 RF 的多传感器证据支持
  - 把单一供应商依赖压下去，不让任何一家供应商撑起超过一半的生产收入
risks:
- risk: 上游供应商拒绝或限制开放遥测与权限数据，导致独立 SLA 审计所需的关键输入拿不到。
  likelihood: High
  impact: High
  mitigation: 尽早筛多家供应商，用合同锁定可迁移日志；如果拿不到审计级数据，就保留一个只做规划的后备产品形态。
- risk: 主权安全与部署要求过于定制化，导致试点重得撑不起软件毛利。
  likelihood: Medium
  impact: High
  mitigation: 先从非密工作流切入，把客户自控部署模式标准化，并避免那些一上来就要求替换整套任务系统的项目范围。
- risk: 由主承包商主导的采购周期太慢、太集中，学不到足够快的节奏，撑不起 venture 速度。
  likelihood: High
  impact: Medium
  mitigation: 只打痛点明确的真实招标和重投，把试点范围紧紧收在单一工作流上，并借已经在目标账户里的渠道伙伴往里走。
- risk: 一旦这个品类被看懂，传感器厂商或宽平台会直接把工作流吞进去。
  likelihood: Medium
  impact: Medium
  mitigation: 尽快把历史交付证据沉成一套中立、跨供应商的数据集和工作流护城河，而不只是做个顺手的 UI。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金要做四件事：拿下两家供应商集成、签出第一轮付费试点并跑到 2-4 个生产项目、把客户自控部署磨硬，以及把合规与客户成功能力搭起来，让主权项目交付开始可复制。
