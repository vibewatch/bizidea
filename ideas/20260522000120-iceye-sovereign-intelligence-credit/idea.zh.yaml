problem: 各部委和国防系统集成商越来越需要面向边境、海岸线和关键基础设施的主权、全天候监测，但大多数机构自己手里的太空资产，还不足以独立承诺持续覆盖。等他们基于商业 SAR 去投标时，重访承诺、任务调度假设、供应商担保和合规报告，很多仍靠表格和邮件在管。结果就是：拿单团队不敢激进承诺，交付团队一碰就脆，主权买方也很难相信一套商业化技术栈真能达到部委级 uptime 和审计要求。
targetUser:
  primary: 欧洲国防系统集成商里的 capture manager 和任务运营负责人——他们正为那些没有自有 SAR 星座的部委，投标边境、海岸或关键基础设施监测项目。
  secondary: 较小盟国主权监视项目里的地理空间任务负责人——他们必须把承诺过的覆盖能力和实际交付表现一一对上。
  buyer: 国防系统集成商里负责 ISR 项目的 VP 或总经理。
startupThesis:
  nonObviousInsight: 新的瓶颈已经不是能不能拿到 SAR 像素，而是能不能把商业星座的供给，变成一套主权买方敢签字的覆盖承诺：里面既有可审计的重访保证，也有数据权控制和交付证据。ICEYE 这次拿到银行支持的授信，说明市场正在从临时买图，转向带明确担保的服务义务；卫星之上，因此冒出了一层 system of record 的空间。
  beachhead: 滩头市场是欧洲国防系统集成商：他们正为波罗的海、北欧或东欧某个部委，投标一份海岸边境或关键基础设施监测合同；客户需要 24/7、全天候的重访覆盖，但自己没有 SAR 星座。
  wedge: 先做一个主权覆盖工作台：把监测区域、多边形、目标重访频率、供应商可用性和合同担保都建进去；随后继续跟踪“承诺了什么、实际交付了什么”，并生成部委能直接拿去审计的证据包和升级流程。
  whyNowCatalyst: ICEYE 这笔融资明确绑在客户担保上，而各国对独立、持续监视的主权需求又在同时加速。于是，“有担保的商业 SAR 覆盖”第一次从概念变成了真正可买的能力。
  ventureScalePath: 先拿下基于商业 SAR 的国防项目投标和 SLA 管理，再一路往外扩：实时任务编排、多传感器任务运营、审计轨迹，以及横跨部委、海岸警卫队、灾害机构和盟友基础设施运营方的主权情报控制层。
solution: 给那些没有自有卫星、却必须承诺持续监测的国防系统集成商和任务团队，做一套主权重访保障 OS。中标前，产品帮 capture 团队围绕多边形、重访目标、任务窗口和供应商担保，把覆盖方案先算清楚，让他们敢用可信的商业 SAR 假设去投标。中标后，它变成真正的运营层：把实际交付的影像与合同承诺逐项对账，提前预警可能的缺口，并给部委客户自动吐出可审计的覆盖报告。第一版产品不跟 ICEYE 争原始影像；它赢在另一层——把商业 SAR 供给，变成一份有工作流、有责任归属、也有证据链的可防守服务承诺。再往后，平台会长成一个多供应商任务账本，能压在 SAR、EO、RF 和机载数据之上。
goToMarketSeed:
  firstCustomer: 首个客户会是某家 200–2,000 人规模的欧洲国防系统集成商里的项目负责人：他正在投标一份部委级监测招标，覆盖对象可能是波罗的海海岸线、陆地边境或战略能源走廊，并且要靠商业 SAR 伙伴来兜住覆盖承诺。
  buyingTrigger: 触发点通常是新的主权监视招标、合同重投，或部委突然要求：在不依赖盟友情报共享的前提下，证明全天候重访覆盖和交付保障真的成立。
  currentAlternative: 今天的替代方案还是表格化容量建模、定制化供应商报价、手工合同跟踪，以及 PMO 和分析师在影像交付后拼出来的任务报告。
  switchingReason: 这套平台能让系统集成商更快投标、给出更清晰的服务级别承诺，并且在交付缺口演变成客户层面的事故或罚则之前，先把问题拦下来。
  pricingHypothesis: 按每个活跃主权项目收年度平台订阅费，外加实施费，以及按监测多边形或保障覆盖包计费的用量收费。
