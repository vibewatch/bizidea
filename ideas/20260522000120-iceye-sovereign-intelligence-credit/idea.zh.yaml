jobsToBeDone:
- job: 当部委发出一份关于全天候持续监测的招标时，帮国防系统集成商先把一套可信的商业 SAR 覆盖承诺算清楚，这样他们投标时既敢承诺，也不至于把重访表现吹过头。
  currentAlternative: capture 团队靠表格建模、给供应商打电话，并手工拼各种定制假设。
  successMetric: 投标准备时长，以及“承诺覆盖”和“建模覆盖”之间的偏差。
- job: 当一份主权监视合同正式上线后，帮任务运营团队证明：当初承诺的监测确实交付到了位，而且证据能过部委审计，这样既守住客户信任，也少打 SLA 争议。
  currentAlternative: 靠影像日志、分析师笔记和供应商状态更新，手工拼报告。
  successMetric: 生成一份部委可用绩效报告所需的时间，以及临时爆出的交付缺口升级次数。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这组信号把一手融资证据、主权需求措辞，以及围绕 SAR 持续性的实操能力放到了一起；对下游软件切口来说，这是强信号，但还处在比较早的阶段。
  painIntensity:
    score: 4
    rationale: 如果没法担保监视覆盖，国防系统集成商丢掉的不只是合同，还有主权买方对执行能力的信任；虽然来源没有拆出精确预算科目，但痛感已经够强。
  wedgeClarity:
    score: 5
    rationale: 围绕商业 SAR 支撑的主权项目去做投标和 SLA 管理，是一条足够窄、也足够具体的首个工作流：买方、触发点、替代方案和验证信号都很清楚。
  defensibility:
    score: 4
    rationale: 防御力可以来自任务级历史表现、供应商可靠性数据，以及深度嵌入工作流；但前提仍是公司能持续拿到多家供应商。
  ventureScale:
    score: 5
    rationale: 平台可以从一条国防采购工作流，一路扩到跨多传感器、多机构的主权商业情报操作系统。
topRisks:
- name: 采购集中风险
  description: 创业公司可能会在少数几个推进缓慢的主权项目上耗太久，结果合同转化还没起来，时间已经先烧光。
  mitigation: 先借已经在投真实项目的国防系统集成商切进去，优先卖付费 capture 支持和一条交付工作流，再考虑直接卖给部委。
- name: 上游供应商依赖
  description: 如果头部 SAR 供应商限制数据访问，或自己下场做担保工具，创业公司就可能被挤出这条工作流。
  mitigation: 从第一天起就把覆盖模型做成供应商无关，并用合同锁定可迁移的历史表现数据，覆盖多家 SAR 及相邻传感器来源。
- name: 安全与信任门槛
  description: 主权买方可能不愿意把任务承诺和绩效证据放进一个尚未证明自己的外部平台。
  mitigation: 先从非密的规划和报告工作流切入，支持客户自控部署，再靠可审计日志和由系统集成商主导的实施慢慢把信任拿下来。
