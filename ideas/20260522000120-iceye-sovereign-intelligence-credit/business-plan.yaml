slug: sovereign-revisit-guarantee-os
date: '2026-05-22'
executiveSummary: >-
  Sovereign Revisit Guarantee OS should sell to European defense integrators that
  must bid and operate all-weather ISR programs for ministries that do not own
  enough SAR capacity to guarantee coverage themselves. The beachhead is one
  coastal-border or critical-infrastructure monitoring program in the Baltics,
  Nordics, or Eastern Europe where darkness, cloud cover, and sovereignty
  requirements make commercial SAR credible but spreadsheet-based guarantee
  management fragile. The product starts as a bid-and-delivery workspace that
  models watch areas, revisit targets, vendor assumptions, and compliance gates,
  then tracks promised versus delivered coverage with auditable evidence packs.
  This is a narrower and faster-to-prove wedge than building a broad geospatial
  platform because the first customer, trigger, budget owner, pricing basis, and
  proof point all sit inside one prime contract workflow. The company should
  deliberately avoid owning satellites, reselling raw imagery, or selling direct
  ministry command platforms before it proves that integrators will pay for
  vendor-neutral guarantee management. Research supports the market timing:
  sovereign demand is rising, ICEYE is financing customer guarantees, and primes
  already buy premium mission capabilities, but no named tender with explicit
  revisit-SLA language is identified yet. That means the first 12 months must be
  run as a falsification program around one live bid, two vendor integrations,
  and one paid delivery workflow rather than as a scale-up story. If the company
  can become the system of record for promised versus delivered coverage on live
  sovereign programs, it can expand into multi-sensor mission orchestration,
  entitlement controls, and ministry-grade operating evidence across the same
  accounts.
problem:
  - Defense integrators still model revisit commitments, vendor guarantees, and compliance obligations in spreadsheets and email when bidding sovereign SAR-backed programs.
  - Once a program is live, mission teams struggle to prove that promised coverage was actually delivered in a ministry-auditable form before a shortfall becomes a penalty or trust event.
  - Existing sensor vendors and broad defense platforms do not natively own the cross-vendor guarantee, entitlement, and evidence workflow for commercial-SAR-backed sovereign contracts.
solution:
  - Build a sovereign coverage workspace that lets capture teams model polygons, revisit targets, tasking windows, vendor assumptions, and guarantee thresholds before bid submission.
  - Turn the same workspace into an operational ledger that compares promised versus delivered coverage, flags likely SLA misses early, and records exceptions with source traceability.
  - Generate ministry-ready evidence packs, entitlement logs, and escalation workflows so primes can defend performance without replacing their existing mission systems.
whyWeWin:
  - The company sits above sensor vendors and can stay neutral across ICEYE, Capella, Umbra, and adjacent sources instead of depending on one constellation roadmap.
  - The first workflow is tied to bid risk and delivery penalties, which is a clearer budget hook than selling another imagery dashboard.
  - Historical promised-versus-delivered performance by geography, provider, and mission type compounds into proprietary bid intelligence and switching costs.
  - Starting with unclassified planning and reporting workflows reduces the initial security barrier while still solving a ministry-facing accountability problem.
strategicChoices:
  beachhead: One European defense integrator bidding or rebidding a Baltic, Nordic, or Eastern European coastal-border or critical-infrastructure monitoring contract that requires all-weather revisit credibility and auditable delivery evidence.
  wedgeRationale: This entry point is narrow enough that the user, buyer, trigger, and proof point all sit inside one sovereign program team; selling a broader ISR platform would force the company to prove tasking, fusion, dissemination, and accreditation all at once.
  sequencingRationale: Start with pre-award coverage modeling and post-award evidence packs, because those workflows can stay partly unclassified and attach to live prime budgets; add deeper tasking orchestration, multi-sensor fusion, and ministry-direct deployments only after the company proves trusted control over one production SLA workflow.
  notYet:
    - Direct ministry-wide platform sales before one integrator-led program converts to production
    - Raw imagery resale or proprietary satellite capacity
    - Full multi-sensor mission-command software before the guarantee ledger is trusted
    - Civil disaster, insurance, or commercial infrastructure products before defense workflow fit is proven
market:
  tam: $0.9B estimated TAM across global sovereign monitoring programs and integrator-led ISR contracts that could support a mission-control and assurance layer.
  sam: $90.0M estimated SAM across roughly 45 Baltic, Nordic, and Eastern European beachhead programs where sovereign all-weather monitoring demand is already visible.
  som: $9.0M estimated year-3 SOM based on 6 reachable programs at roughly $1.5M blended annual software plus implementation revenue per program.
  segments:
    - European defense integrators running sovereign border, maritime, or critical-infrastructure ISR programs on top of commercial SAR
    - Smaller allied sovereign surveillance programs that need independent audit and coverage assurance without owning a full national constellation
  buyingProcess: >-
    The likely path is prime-led: the ISR program GM sponsors a design effort for
    one live tender or rebid, capture and mission-operations teams validate the
    modeling workflow, then security and contracts teams approve deployment and
    evidence handling before a paid pilot or program module is purchased.
product:
  mvp: >-
    MVP is a secure workspace for one sovereign program that models coverage plans
    against polygons and revisit targets, stores vendor assumptions and guarantee
    thresholds, ingests delivery logs from at least two providers, and exports an
    audit-ready evidence pack. It should run alongside existing PMO and mission
    systems rather than replace them.
  sixMonth: Close one design partner, ship bid-modeling plus promised-versus-delivered reporting for one program, and support customer-controlled deployment for unclassified planning artifacts.
  twelveMonth: Add entitlement tracking, exception workflows, role-based audit logs, and two provider integrations sufficient to support one paid production deployment.
  twentyFourMonth: Expand into live tasking orchestration, adjacent EO and RF evidence ingestion, and multi-program performance benchmarks inside the same prime or allied ministry network.
  keyBets:
    - Integrators will pay for faster bid formation and lower delivery-risk exposure before they demand a full mission platform replacement.
    - At least two upstream providers will expose enough tasking, delivery, and entitlement telemetry for credible independent SLA auditing.
    - Customer-controlled or sovereign-cloud deployment can be standardized enough to avoid a services-only business.
    - Historical coverage-performance data will become a stronger moat than any single analytics model in the first two years.
gtm:
  wedge: Paid pilot for one live sovereign surveillance bid or active program where the prime must model revisit guarantees pre-award and defend delivered coverage post-award.
  channels:
    - Founder-led direct sales to ISR program GMs, capture leaders, and mission-operations heads at European defense integrators
    - Co-sell and implementation partnerships with SAR providers and mission-system integrators already attached to sovereign bids
    - Reference-led expansion into adjacent Baltic, Nordic, and Eastern European programs after the first production proof point
  funnelTargets: "Qualified target account→scoped design partner 20-30%, design partner→paid pilot 40-50%, paid pilot→production program module 50%+, production logo→second program or workflow expansion 40%+ within 12 months"
  pricing: >-
    Start with a $100k-$250k paid pilot tied to one live program, then convert to
    a $300k-$750k annual program subscription plus implementation fees and
    metered pricing by monitored polygon set or guaranteed coverage package. This
    matches how primes already budget by program and keeps pricing tied to risk
    avoided, not seat count.
businessModel:
  revenueStreams:
    - Annual per-program software subscriptions
    - Deployment, integration, and accreditation-support fees
    - Usage-based monitoring, reporting, and evidence-pack fees
  unitOfValue: Active sovereign program with metered monitored polygons and contractual coverage commitments
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one program to multiple sovereign contracts inside the same prime
    - Add entitlement, compliance, and audit modules once the guarantee ledger is embedded
    - Broaden from SAR-backed programs into multi-sensor mission workflows using the same evidence model
    - Sell customer-controlled deployment templates and secure integrations across allied geographies
strategyMap:
  northStarMetric: Annualized sovereign programs in production where promised-versus-delivered coverage is tracked inside the platform
  inputMetrics:
    - Qualified live tenders or rebids with explicit revisit or delivery-assurance pain
    - Paid pilots launched on active sovereign programs
    - Provider integrations exposing usable delivery and entitlement telemetry
    - Pilot-to-production conversion rate
    - Share of monthly evidence packs accepted by the customer without manual rework
  moatsToBuild:
    - Cross-vendor historical coverage-performance and exception dataset by polygon, provider, and mission type
    - Program-embedded entitlement, compliance, and audit workflow tied to real contract language
    - Customer-controlled deployment and security templates trusted by primes and sovereign buyers
  killCriteria:
    - No paid pilot after 15 qualified prime-program conversations and 4 scoped design efforts
    - No access to auditable telemetry from at least 2 upstream providers by month 9
    - Less than 50% of pilot evidence packs accepted by customer teams without major manual reconstruction
  mermaid: |
    flowchart LR
      Wedge[Prime-led guarantee wedge] --> MVP[Coverage modeling and evidence ledger]
      MVP --> Proof[Paid pilot with auditable SLA proof]
      Proof --> Expansion[More programs plus multi-sensor mission workflows]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Strong wedge and timing, but conviction depends on proving prime willingness to pay before procurement drag and vendor dependency dominate.
    whyBelieve: The company targets a specific sovereign workflow gap created by rising commercial-SAR guarantees, while incumbents are optimized either for selling sensors or for broader data fusion.
    whyDoubt: The market is concentrated, named tender evidence is still incomplete, and the product may collapse into integrator services if telemetry access or secure deployment proves harder than expected.
    nextDiligence: Confirm one live prime bid with explicit coverage-assurance pain, secure two provider data-access commitments, and close one paid pilot at target pricing.
  firstCustomer:
    title: ISR program GM at a European defense integrator
    profile: Leads a 200-2,000 person integrator team bidding or operating one sovereign border, coastal, or critical-infrastructure monitoring program that relies on commercial SAR partners for revisit guarantees.
    trigger: A new tender, rebid, or customer review forces the prime to prove all-weather revisit credibility and auditable delivery without relying on allied intelligence sharing.
    buyer: VP or general manager for ISR programs
    initialContract: 90-120 day paid pilot for $100k-$250k on one active program, converting to a $300k-$750k annual program subscription plus implementation if the platform is used in one bid cycle or one customer-facing performance review.
  mustBeTrue:
    - At least one target integrator will fund a paid pilot before demanding a full accredited mission platform.
    - Two or more upstream providers will expose enough delivery and entitlement telemetry for independent promised-versus-delivered auditing.
    - Customer teams will accept platform-generated evidence packs in a real program review with minimal manual reconstruction.
    - Customer-controlled deployment can be standardized enough that gross margin can still exceed 70% at scale.
    - One production logo will expand to a second program or adjacent workflow within 12 months.
  diligenceQuestions:
    - Which named Baltic, Nordic, or Eastern European tenders currently score bidders on revisit assurance or audit-ready delivery evidence?
    - Who owns budget first between capture, mission operations, and program leadership for this workflow?
    - What provider APIs or contract terms make independent SLA auditing possible versus impossible?
    - How much implementation and security work can be standardized across sovereign customers?
    - What customer-visible penalty, rebid risk, or trust failure justifies a $300k-$750k ACV?
operatingAssumptions:
  - assumption: The first deployable wedge is one prime-led sovereign border, coastal, or critical-infrastructure program rather than a ministry-direct platform sale.
    basis: idea.yaml
    validationTest: Interview 10 qualified integrator accounts and proceed only if at least 3 will scope a live bid or delivery workflow in the next 12 months.
    decisionImpact: If false, the company must narrow to white-label or subcontracted deployments and delay branded enterprise sales.
  - assumption: At least two SAR providers will share tasking, delivery, and entitlement data sufficient for audit-grade reconciliation.
    basis: research.yaml
    validationTest: Secure sample logs and commercial integration terms from two providers before promising production SLA reporting.
    decisionImpact: If false, the product cannot stay vendor-neutral and should narrow to planning-only workflow or one-provider deployments.
  - assumption: Unclassified planning and reporting workflows are enough to land the first paid pilot despite broader sovereign security concerns.
    basis: research.yaml
    validationTest: Complete one architecture and data-boundary review with a prime security team and obtain written approval for a pilot scope.
    decisionImpact: If false, implementation cost and sales cycle rise materially, requiring slower hiring and a larger funding round.
  - assumption: Buyers will support $300k-$750k annual pricing once one program shows lower bid risk or fewer delivery escalations.
    basis: idea.yaml
    validationTest: Include production pricing in pilot proposals and obtain at least one signed LOI or budgetary approval at target range.
    decisionImpact: If false, the company must simplify scope, rely more on services revenue, or reset fundraising expectations.
  - assumption: Historical performance and exception data from active programs will become a defensible moat, not just an implementation artifact.
    basis: operator judgment
    validationTest: Instrument pilots so each program yields reusable benchmark data on coverage variance, shortfalls, and escalation outcomes across providers and geographies.
    decisionImpact: If false, defensibility rests mainly on workflow convenience and partner access, weakening long-term venture upside.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12 ISR program leaders at European defense integrators and map one live tender or rebid workflow end to end.
    hypothesis: Coverage-assurance pain is acute enough that at least 3 accounts will scope a design partner around a current bid or delivery review.
    successMetric: 12 qualified interviews, 3 scoped design-partner opportunities, and one identified economic buyer with timeline.
    owner: CEO
  - horizon: 0–90 days
    experiment: Secure integration scoping with ICEYE-class and non-ICEYE providers using sample tasking, delivery, and entitlement logs.
    hypothesis: Two providers can support independent promised-versus-delivered reconciliation without exclusive commercial terms.
    successMetric: 2 provider integration plans with sample telemetry and commercial next steps.
    owner: CEO plus founding engineer
  - horizon: 90–180 days
    experiment: Run a concierge bid-modeling workflow on one historical or live sovereign program using customer spreadsheets and vendor inputs.
    hypothesis: The product can cut bid-preparation time and surface revisit shortfalls before submission.
    successMetric: 25%+ reduction in bid-modeling cycle time or one material coverage-risk issue found before customer submission.
    owner: Product lead
  - horizon: 90–180 days
    experiment: Deploy a paid pilot that compares promised versus delivered coverage and exports one ministry-ready evidence pack.
    hypothesis: Buyers will pay before full mission-system integration if evidence is source-traceable and audit-ready.
    successMetric: One paid pilot signed at $100k+ and one customer-facing evidence pack accepted with minor edits.
    owner: Head of sales
  - horizon: 180–365 days
    experiment: Validate customer-controlled deployment in sovereign cloud or customer-managed infrastructure for one active program.
    hypothesis: Secure deployment can be productized enough to avoid a bespoke-services trap.
    successMetric: One approved deployment pattern reused across two customer opportunities with less than 25% custom engineering.
    owner: Platform lead
  - horizon: 180–540 days
    experiment: Expand the first logo from one program module into a second workflow such as entitlement management or multi-sensor evidence.
    hypothesis: Once the guarantee ledger is trusted, adjacent workflows sell faster than acquiring a new prime logo.
    successMetric: One upsell or second-program expansion within 12 months of first production go-live.
    owner: Customer success lead
operations:
  - Provider contract and entitlement management for telemetry access, audit rights, and export-control boundaries
  - Customer-controlled deployment playbooks with role-based access, audit logs, and environment segregation
  - Human-in-the-loop exception review process for coverage shortfalls, overrides, and customer escalations
  - Program-specific evidence-pack generation aligned to ministry reporting and renewal reviews
  - Quarterly performance benchmark process that turns pilot data into reusable bid-intelligence baselines
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Own the coverage model, telemetry ingestion, and audit ledger that define the wedge.
  - role: Product and mission-ops lead
    startTiming: Month 0
    rationale: Translate capture-team and delivery-team workflows into a narrow product that can survive sovereign scrutiny.
  - role: Forward-deployed solutions engineer
    startTiming: Month 3
    rationale: Reduce the risk that secure deployment and integration work turn pilots into custom projects.
  - role: Enterprise defense sales lead
    startTiming: Month 4-6
    rationale: Convert concentrated prime relationships into paid pilots and manage long-cycle program sales.
  - role: Compliance and customer success lead
    startTiming: Month 6-9
    rationale: Own export-control workflow design, evidence-pack quality, and post-pilot expansion inside the first logos.
milestones:
  - horizon: 0–12 months
    items:
      - Secure 2 provider integration paths with usable tasking and delivery telemetry
      - Close 3 design partners and at least 1 paid pilot on a live sovereign program
      - Ship MVP with coverage modeling, evidence export, and customer-controlled pilot deployment
      - Prove one customer-facing evidence pack is accepted in a real program review
  - horizon: 12–24 months
    items:
      - Convert 2-4 production programs at $300k-$750k annual subscription value
      - Reuse one secure deployment pattern across multiple customer opportunities
      - Launch entitlement tracking and exception-management modules
      - Land one expansion sale into a second program or adjacent workflow inside the first logo
  - horizon: 24–36 months
    items:
      - Reach roughly 6 active sovereign programs in production
      - Demonstrate cross-provider performance benchmarks that improve bid win rate or reduce delivery escalations
      - Add multi-sensor evidence support for EO or RF in production accounts
      - Reduce single-provider dependency so no one supplier underpins more than half of production revenue
risks:
  - risk: Upstream providers refuse or limit telemetry and entitlement access needed for independent SLA auditing.
    likelihood: High
    impact: High
    mitigation: Qualify multiple providers early, contract for portable logs, and keep a planning-only fallback product if audit-grade data is unavailable.
  - risk: Sovereign security and deployment requirements make pilots too bespoke to sustain software margins.
    likelihood: Medium
    impact: High
    mitigation: Start with unclassified workflows, standardize customer-controlled deployment patterns, and avoid program scopes that require full mission-system replacement.
  - risk: Prime-led procurement cycles remain too slow and concentrated for venture-scale learning velocity.
    likelihood: High
    impact: Medium
    mitigation: Focus on live tenders and rebids with visible pain, price pilots tightly to one workflow, and use channel partners already inside target accounts.
  - risk: Sensor vendors or broad defense platforms absorb the workflow once the category becomes obvious.
    likelihood: Medium
    impact: Medium
    mitigation: Build a neutral cross-provider dataset and workflow moat anchored in historical delivery evidence, not just UI convenience.
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: 18 months to secure two provider integrations, close the first paid pilot and 2-4 production programs, harden customer-controlled deployment, and build the compliance and customer-success muscle needed for repeatable sovereign program delivery.
