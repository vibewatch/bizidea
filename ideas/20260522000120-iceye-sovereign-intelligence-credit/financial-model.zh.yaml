modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      QualifiedPrograms[合格项目机会] --> PaidPilots[付费试点]
      PaidPilots --> ProductionPrograms[生产项目]
      ProductionPrograms --> SubscriptionRevenue[订阅收入]
      ProductionPrograms --> ImplementationFees[实施费用]
      ProductionPrograms --> MeteredEvidenceFees[计量型证据费]
      SubscriptionRevenue --> GrossProfit[毛利润]
      ImplementationFees --> GrossProfit
      MeteredEvidenceFees --> GrossProfit
      GrossProfit --> Cash[现金]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入引擎，是把 1 个 $160K 试点转成 Y2 末前的 4 个生产项目，并在 Y3 末做到 6 个活跃项目；成熟项目的年收入大致落在每个 $1.05M。
- checkName: 必须做对的事
  finding: 公司必须把 1 套安全部署模式复用到多个客户身上，毛利率才可能从试点期的 40% 爬到 Q4Y3 的 70%。
- checkName: 模型会在哪坏掉
  finding: 如果第一轮试点拖过第 12 个月，或者遥测接入始终停留在单一供应商上，downside 情景会让下一轮融资前的现金几乎见底。
- checkName: 下一轮融资证明点
  finding: 只要公司能证明 4 个活跃生产项目、2 条供应商遥测集成和 1 套可重复的主权部署模式，下一轮融资就讲得通。
sanityChecks:
  ruleOf40: Y3 增长 173.3% + EBITDA 利润率 11.3% = 184.6%（仅作方向性参考，因为收入基数仍小）。
  burnMultiple: Y2 burn multiple 约为 0.6x：用 $1.03M 的 EBITDA burn 对应 $1.65M 的增量收入；模型在 Q2Y3 转成 EBITDA 为正。
  revenuePerFte: 按年末 12 名 FTE 计算，Y3 人均收入约为 $403K（对比垂类 SaaS 常见的 $200K-$400K；略高的原因，是合同按项目而不是按席位计费）。
  flags:
  - 基准情景假设第一轮付费试点在第 10 个月签下；只要晚两个季度，融资需求就会明显抬升。
  - 第 3 年单个活跃项目的收入仍低于 research 里 $1.5M 的 SOM 基准，所以基准情景在定价上并不激进，但仍依赖实施费和计量费用。
  - 毛利率要到 Q4Y3 才能摸到 70% 目标，这说明定制化的主权部署工作在大部分模型周期里都是真风险。
  - 客户集中度依然很高：Q4Y3 只有 6 个活跃项目，只要丢掉 1 个账户，就会明显拖累收入和下一轮融资准备度。
