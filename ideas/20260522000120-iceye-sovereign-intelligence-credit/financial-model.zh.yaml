scenarios:
  downside:
    description: 试点晚了两个季度才签下，到 Q4Y3 只有 5 个活跃项目，而且高度定制化的部署工作把退出毛利率卡在 60%。
    y3RevenueK: 3450.0
    y3EbitdaK: -620.0
    cashLowPointK: 250.0
    keyAssumptionChanges:
    - 第一轮付费试点从 M10 推迟到 M16。
    - 成熟项目的年收入从 $1.05M 降到 $0.85M。
    - Y3 末毛利率只能到 60%，而不是 70%。
  base:
    description: 1 个试点按计划转正，Y2 末前跑出可复用的安全部署模式，公司在 Y3 末做到 6 个活跃项目。
    y3RevenueK: 4837.5
    y3EbitdaK: 547.25
    cashLowPointK: 1387.54
    keyAssumptionChanges:
    - 第一轮付费试点在 M10 落地，并于 Y2 转成生产。
    - 项目数在 Q4Y2 达到 4 个，在 Q4Y3 达到 6 个。
    - 借助标准化部署与集成，毛利率在 Q4Y3 爬到 70%。
  upside:
    description: 试点按时签下，首个 logo 扩张更快，而且到 Q4Y3 有 7 个活跃项目跑到了更高的用量计费水平。
    y3RevenueK: 7020.0
    y3EbitdaK: 1480.0
    cashLowPointK: 1550.0
    keyAssumptionChanges:
    - 1 家 design partner 在 M8 转成付费试点，并在 Q1Y2 转生产。
    - 成熟项目的年收入从 $1.05M 提升到 $1.25M，靠的是计量型证据费和扩张费用。
    - 由于安全部署模式更早复用，毛利率在 Y3 年中就能到 72%。
