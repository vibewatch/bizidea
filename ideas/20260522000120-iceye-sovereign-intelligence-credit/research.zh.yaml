  fiveForces:
    supplierPower:
      score: 4
      rationale: 高端 SAR 供给仍集中在少数几家厂商手里，而主权买方要的也不是普通影像，而是安全接入、任务控制和数据权。
      sourceRefs:
      - 65
      - 13
      - 128
    buyerPower:
      score: 4
      rationale: 直接买方是少数几家系统集成商和主权项目，合同金额大、采购周期长，对部署要求也有很强的话语权。
      sourceRefs:
      - 82
      - 50
      - 22
    threatOfEntrants:
      score: 3
      rationale: 做软件当然比发卫星容易，但一旦牵涉认证、集成和任务可信度，新玩家要跨过去的门槛并不低。
      sourceRefs:
      - 81
      - 45
      - 66
    threatOfSubstitutes:
      score: 4
      rationale: 主承包商完全可以用表格、供应商门户和通用数据平台先拼一套替代方案，哪怕这套东西很脆。
      sourceRefs:
      - 92
      - 128
      - 100
    competitiveRivalry:
      score: 3
      rationale: 边缘地带的竞争真实存在：传感器供应商和国防平台都会往这里延伸；但“担保 + 审计”这条精确工作流，本身还没有被充分产品化。
      sourceRefs:
      - 13
      - 101
      - 92
  pestle:
  - factor: 政治
    impact: positive
    point: 欧洲再武装和主权优先级抬升，正在加速对国家可控 ISR 能力的需求。
    sourceRefs:
    - 112
    - 122
    - 22
  - factor: 经济
    impact: positive
    point: 军费和国防科技投资都在上行，这给挂在 ISR 项目上的任务软件提供了预算遮蔽。
    sourceRefs:
    - 82
    - 112
    - 122
  - factor: 社会
    impact: positive
    point: 边境防护、海上安全和关键基础设施韧性，已经成了高度可见的公共部门优先事项。
    sourceRefs:
    - 21
    - 20
    - 84
  - factor: 技术
    impact: positive
    point: 持续、全天候的 SAR、低时延调度和更广的分发架构，已经让可审计的商业覆盖在运营上站得住。
    sourceRefs:
    - 73
    - 5
    - 85
  - factor: 法律
    impact: negative
    point: 两用出口管制和记录保存义务，确实会给跨境部署、支持和数据权工作流带来摩擦。
    sourceRefs:
    - 45
    - 48
  adoptionFrictionMatrix:
  - friction: 安全认证与客户自控部署要求
    severity: high
    affectedBuyer: 主权任务负责人和主承包商项目安全团队
    mitigation: 先从非密的投标和报告工作流切入，再为活跃项目补上客户自控部署模式。
    sourceRefs:
    - 110
    - 81
    - 66
  - friction: 跨国出口管制、经纪义务和权限复杂度
    severity: high
    affectedBuyer: 主承包商 capture 负责人，以及合同/合规团队
    mitigation: 把授权、留档和数据权检查点显式写进工作流，而不是继续靠邮件和表格兜底。
    sourceRefs:
    - 45
    - 48
  - friction: 做 SLA 审计要依赖上游供应商遥测
    severity: medium
    affectedBuyer: 任务运营负责人
    mitigation: 优先接入那些能吐出任务调度、交付和权限日志的供应商，再和客户侧证据做交叉核对。
    sourceRefs:
    - 5
    - 125
    - 128
  - friction: 主权采购周期长，而且销售常常被主承包商主导
    severity: high
    affectedBuyer: ISR 项目 GM
    mitigation: 只打真实招标和重投场景，让产品直接缩短投标编制时间，并压低交付风险暴露。
    sourceRefs:
    - 50
    - 36
    - 22
