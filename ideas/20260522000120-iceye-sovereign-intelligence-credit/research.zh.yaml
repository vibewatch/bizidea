competitors:
- name: ICEYE
  stage: scale-up
  wedge: 主权 SAR 系统、持续监测，以及带合同背书的国家级情报能力
  pricing: 按项目定制报价；公开 backlog 和主权项目形态都说明，这类合同更像多年期项目预算，而不是公开标价。
  strength: 主权叙事最强、部署速度快，而且已经证明能把融资直接包到客户担保里。
  weaknessVsUs: 它更适合卖和运营 SAR 能力本身；如果要做面向主承包商的中立、多供应商担保与证据账本，它并不是最顺手的位置。
  sourceRefs:
  - 65
  - 73
  - 56
  - 66
  - 74
- name: Capella Space
  stage: scale-up
  wedge: 面向任务的安全级 SAR、低时延调度、TCPED，以及为政府定制的交付能力
  pricing: 按项目定制报价；公开的 DIU 项目显示，新型大范围模式的合同金额最高可到 $4.2M。
  strength: 政府姿态强、安全措辞到位，而且自动化任务调度适合快速响应。
  weaknessVsUs: 它依然首先是“传感器 + 交付”厂商，而不是一套横跨投标设计、合规和审计包的中立 SLA 工作台。
  sourceRefs:
  - 13
  - 5
  - 12
- name: Umbra
  stage: scale-up
  wedge: 开放、高分辨率 SAR，价格更透明，且强调 data-first 位置
  pricing: 公开场景定价约为 $675 到 $5,650+，驻留模式基线价约为 $4,750。
  strength: 采购透明、许可姿态开放、数据可得性强，适合作为上游供给组件。
  weaknessVsUs: Umbra 更强调数据供给，而不是合同治理工作流，因此在传感器层之上仍有空间。
  sourceRefs:
  - 125
  - 128
  - 124
- name: Planet
  stage: public incumbent
  wedge: 大范围监测、AI 分析，以及面向国防和政府的可共享、非密洞察
  pricing: 政府项目按合同定价；引用页面没有披露公开费率。
  strength: 档案库巨大、覆盖广，做政府场景下的态势感知很强。
  weaknessVsUs: Planet 最强的场景，是大范围光学监测已经够用的时候；一旦部委要求在云层和黑夜里担保重访表现，这个切口就不够尖。
  sourceRefs:
  - 101
  - 100
- name: Palantir
  stage: incumbent
  wedge: 通用国防决策软件、情报融合，以及高合规企业工作流
  pricing: 企业和国防项目按合同定价；引用页面没有公开列价。
  strength: 在国防数据融合和高风险运营工作流里，Palantir 的可信度很深。
  weaknessVsUs: Palantir 是宽平台，往往还要搭很多项目设计和服务；它并不会天然拿下“带供应商感知的重访担保”这条窄问题。
  sourceRefs:
  - 92
  - 90
regulatoryTechnicalConstraints:
- point: 两用出口、经纪、技术协助和留档义务，必须跨司法辖区一路跟踪。
  sourceRefs:
  - 45
  - 48
- point: 主权买方越来越希望自己掌控任务调度、数据和运营使用权，而不是继续接一个共享商业黑箱。
  sourceRefs:
  - 110
  - 56
  - 66
- point: 任务系统必须嵌进现有 ISR 分发与保障链里，不能只把影像显示出来。
  sourceRefs:
  - 83
  - 81
  - 85
- point: 海上和边境场景往往还要把 AIS、RF 或相邻数据源一起融合，才能把影像变成可执行证据。
  sourceRefs:
  - 72
  - 23
validationSignals:
- point: ICEYE 明确把新的循环授信与“为客户合同出具担保”绑在了一起。
  sourceRefs:
  - 65
- point: 芬兰和瑞典都在采购主权 SAR 能力，这说明市场正从临时买图，转向自有或强控制的 ISR 系统。
  sourceRefs:
  - 56
  - 66
- point: Capella 的 DIU 项目说明，政府愿意为低时延、大范围监测模式买单，而不是只买零散采集。
  sourceRefs:
  - 5
- point: NATO 和 Copernicus 都把持续海上与边境监视定义成“运营协同问题”，而不只是“感知问题”。
  sourceRefs:
  - 21
  - 84
  - 85
openQuestions:
- 现在哪些具名的波罗的海、北欧或东欧招标，会把可审计的重访担保作为评分项，而不是只看泛泛的 ISR 能力？
- 第一轮部署里，有多少内容能留在非密环境，同时又不丢掉主权客户需要的运营证据？
- 至少两家 SAR 供应商会不会开放足够的任务调度、交付和权限遥测，支持独立 SLA 审计？
- 今天主承包商因为错过重访承诺，究竟会多频繁地遭遇明确罚则或重投风险？
