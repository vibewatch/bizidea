competitors:
- name: ICEYE
  stage: scale-up
  wedge: Sovereign SAR systems, persistent monitoring, and contract-backed national intelligence capability
  pricing: Custom contract pricing; public backlog and sovereign programs imply multi-year program budgets rather than posted rates.
  strength: Strongest sovereignty narrative, rapid deployment, and demonstrated ability to wrap financing around customer guarantees.
  weaknessVsUs: Optimized to sell and operate SAR capability; less naturally positioned as a neutral cross-vendor guarantee and evidence ledger for primes.
  sourceRefs:
  - 65
  - 73
  - 56
  - 66
  - 74
- name: Capella Space
  stage: scale-up
  wedge: Secure mission-grade SAR with low-latency tasking, TCPED, and government-tailored delivery
  pricing: Custom contract pricing; cited DIU work shows programmatic awards up to $4.2M for new broad-area modes.
  strength: Strong government posture, defense-grade security language, and automated tasking for rapid response.
  weaknessVsUs: Still primarily a sensor-and-delivery vendor, not a vendor-neutral SLA workspace spanning bid design, compliance, and audit packs.
  sourceRefs:
  - 13
  - 5
  - 12
- name: Umbra
  stage: scale-up
  wedge: Open, high-resolution SAR with transparent pricing and data-first positioning
  pricing: Public scene pricing from $675 to $5,650+ and $4,750 dwell baseline.
  strength: Transparent purchasing, open licensing posture, and strong data accessibility make it attractive as a supply-side component.
  weaknessVsUs: Umbra emphasizes data supply over contract-governance workflows, leaving room above the sensor layer.
  sourceRefs:
  - 125
  - 128
  - 124
- name: Planet
  stage: public incumbent
  wedge: Broad-area monitoring, AI-enabled analysis, and shareable unclassified insight for defense and government
  pricing: Custom government program pricing; cited pages do not disclose public contract rates.
  strength: Huge archive, broad-area coverage, and strong awareness workflows across government use cases.
  weaknessVsUs: Planet is strongest where broad-area optical monitoring is enough; the proposed wedge is sharper where ministries require all-weather revisit guarantees and supplier accountability.
  sourceRefs:
  - 101
  - 100
- name: Palantir
  stage: incumbent
  wedge: General defense decision software, intelligence fusion, and compliance-heavy enterprise workflows
  pricing: Custom enterprise and defense program pricing; not publicly listed on cited pages.
  strength: Deep credibility in defense data fusion and high-stakes operational workflows.
  weaknessVsUs: Palantir is a broad platform that typically requires significant program design and services; it does not own the narrow, provider-aware revisit guarantee problem by default.
  sourceRefs:
  - 92
  - 90
