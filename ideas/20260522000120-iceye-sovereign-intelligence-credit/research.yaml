openQuestions:
- Which named Baltic, Nordic, or Eastern European tenders currently score bidders on auditable revisit guarantees instead of generic ISR capability claims?
- What share of the first deployment can stay unclassified without losing the operational evidence needed by sovereign customers?
- Will at least two SAR providers expose sufficient tasking, delivery, and entitlement telemetry for independent SLA auditing?
- How often do primes face explicit financial penalties or rebid risk from missed revisit commitments today?
