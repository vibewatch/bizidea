  adoptionFrictionMatrix:
  - friction: Security accreditation and customer-controlled deployment requirements
    severity: high
    affectedBuyer: Sovereign mission owner and prime program security team
    mitigation: Start with unclassified bid and reporting workflows, then support customer-controlled deployment patterns for active programs.
    sourceRefs:
    - 110
    - 81
    - 66
  - friction: Export-control, brokering, and entitlement complexity across countries
    severity: high
    affectedBuyer: Prime capture lead and contracts/compliance team
    mitigation: Make authorizations, records, and data-right checkpoints explicit inside the workflow rather than relying on email and spreadsheets.
    sourceRefs:
    - 45
    - 48
  - friction: Dependence on upstream vendor telemetry for SLA auditing
    severity: medium
    affectedBuyer: Mission operations lead
