modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      QualifiedPrograms --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> SubscriptionRevenue
      ProductionPrograms --> ImplementationFees
      ProductionPrograms --> MeteredEvidenceFees
      SubscriptionRevenue --> GrossProfit
      ImplementationFees --> GrossProfit
      MeteredEvidenceFees --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by converting one $160K pilot into 4 production programs by late Y2 and ending Y3 with 6 active programs at roughly $1.05M mature annual revenue per program.
  - checkName: Must go right
    finding: The company must reuse one secure deployment pattern across customers so gross margin can climb from 40 percent in pilot mode to 70 percent by Q4Y3.
  - checkName: Model breaks if
    finding: If the first pilot slips past month 12 or telemetry access remains single-vendor, the downside case drives cash close to zero before the next financing.
  - checkName: Next-round proof
    finding: The next round is justified once the company shows 4 active production programs, 2 provider telemetry integrations, and one repeatable sovereign deployment pattern.
sanityChecks:
  ruleOf40: Y3 growth 173.3% + EBITDA margin 11.3% = 184.6% (directional only because the revenue base is still small).
  burnMultiple: Y2 burn multiple is about 0.6x using $1.03M EBITDA burn over $1.65M incremental revenue; the model turns EBITDA-positive in Q2Y3.
  revenuePerFte: $403K Y3 using 12 year-end FTE (benchmark about $200K-$400K vertical SaaS; slightly above because contracts are program-sized, not seat-based).
  flags:
    - Base case assumes the first paid pilot closes in month 10; a two-quarter slip is the fastest way to increase the funding need.
    - Year-3 revenue per active program remains below the research SOM benchmark of $1.5M, so the base case is conservative on pricing but still depends on implementation and metered fees.
    - Gross margin does not reach the 70 percent target until Q4Y3, which means bespoke sovereign deployment work remains a real risk through most of the model horizon.
    - 'Customer concentration stays high: with only 6 active programs by Q4Y3, losing one account would materially reduce revenue and next-round readiness.'
