  painIntensity:
    score: 4
    rationale: Failing to guarantee surveillance coverage can cost defense integrators contracts and sovereign buyers operational trust, even if the sources do not quantify the exact budget line.
  wedgeClarity:
    score: 5
    rationale: Bid and SLA management for commercial-SAR-backed sovereign programs is a narrow first workflow with a specific buyer, trigger, alternative, and proof point.
  defensibility:
