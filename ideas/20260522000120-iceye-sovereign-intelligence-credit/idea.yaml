jobsToBeDone:
  - job: >-
      When a ministry issues a tender for all-weather persistent monitoring, help a defense integrator design a credible commercial-SAR coverage commitment, so they can bid with confidence and avoid overpromising on revisit performance.
    currentAlternative: Spreadsheet modeling, vendor calls, and bespoke assumptions assembled by capture teams
    successMetric: Bid turnaround time and variance between promised and modeled coverage
  - job: >-
      When a sovereign surveillance contract goes live, help mission-operations teams prove that promised monitoring was actually delivered, so they can keep customer trust and avoid SLA disputes.
    currentAlternative: Manual report assembly from imagery logs, analyst notes, and vendor status updates
    successMetric: Time to produce a ministry-ready performance report and number of surprise shortfall escalations
ideaScorecard:
  signalStrength:
    score: 4
