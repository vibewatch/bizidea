problem: >-
  Ministries and defense integrators increasingly need sovereign, all-weather monitoring for borders, coastlines, and critical infrastructure, but most do not own enough space assets to promise persistent coverage on their own. When they bid programs built on commercial SAR, they still model revisit commitments, tasking assumptions, vendor guarantees, and compliance reporting in spreadsheets and email. That makes capture teams conservative, delivery teams brittle, and sovereign buyers skeptical that a commercial stack can meet ministry-grade uptime and audit requirements.
targetUser:
  primary: Capture managers and mission-operations leads at European defense integrators bidding on border, coastal, or critical-infrastructure monitoring programs for ministries without indigenous SAR constellations
  secondary: Geospatial mission leads inside smaller allied sovereign surveillance programs who must verify promised coverage against delivered performance
  buyer: VP or general manager for ISR programs at a defense systems integrator
startupThesis:
  nonObviousInsight: >-
    The new bottleneck is not access to SAR pixels; it is the ability to turn commercial constellation capacity into sovereign-ready coverage commitments with auditable revisit guarantees, data-rights controls, and delivery evidence. ICEYE's bank-backed facility is a signal that the market is shifting from ad hoc imagery purchases to guaranteed service obligations, creating room for a system-of-record above the satellites.
  beachhead: >-
    European defense integrators bidding on one coastal-border or critical-infrastructure surveillance contract for a Baltic, Nordic, or Eastern European ministry that needs 24-7 all-weather revisit coverage but lacks its own SAR constellation.
  wedge: >-
    A sovereign coverage workspace that models watch areas, required revisit rates, vendor availability, and contract guarantees, then tracks promised versus delivered coverage with ministry-ready evidence packs and escalation workflows.
  whyNowCatalyst: >-
    ICEYE's financing is explicitly tied to customer guarantees just as sovereign demand for independent persistent surveillance accelerates, making guaranteed commercial SAR coverage a buyable capability rather than a speculative concept.
  ventureScalePath: >-
    Start with bid and SLA management for commercial-SAR-backed defense programs, then expand into live tasking orchestration, multi-sensor mission operations, audit trails, and the sovereign intelligence control layer used across ministries, coast guards, disaster agencies, and allied infrastructure operators.
solution: >-
  Build a sovereign revisit guarantee OS for defense integrators and mission teams that need to promise continuous monitoring without owning satellites. Before award, the product helps capture teams design coverage plans around polygons, revisit targets, tasking windows, and vendor guarantees so they can bid programs with credible commercial-SAR assumptions. After award, it becomes the operating layer that tracks delivered imagery against contractual commitments, flags likely shortfalls early, and generates auditable coverage reports for the ministry customer. The initial product does not compete with ICEYE on raw imagery; it wins by turning commercial SAR capacity into a defensible service commitment with workflow, accountability, and evidence. Over time, the platform becomes a multi-vendor mission ledger that can sit above SAR, EO, RF, and airborne feeds.
goToMarketSeed:
  firstCustomer: >-
    Program director at a 200-2,000 person European defense integrator bidding on one ministry surveillance tender for a Baltic Sea coastline, land border, or strategic energy corridor and relying on commercial SAR partners for coverage guarantees.
  buyingTrigger: >-
    A new sovereign surveillance tender, contract rebid, or ministry requirement to prove all-weather revisit coverage and delivery assurance without depending on allied intelligence sharing.
  currentAlternative: >-
    Spreadsheet-based capacity modeling, bespoke vendor quotes, manual contract tracking, and mission reports assembled by PMO and analyst teams after imagery delivery.
  switchingReason: >-
    The platform lets the integrator bid faster, commit to clearer service levels, and catch delivery shortfalls before they become customer-facing failures or penalty events.
  pricingHypothesis: >-
    Annual platform subscription per active sovereign program plus implementation fees and usage-based pricing tied to monitored polygons or guaranteed coverage packages.
