differentiator: >-
  Most geospatial startups sell imagery analytics or alert dashboards after the data is already bought. This company would own the higher-leverage layer upstream and downstream of imagery: coverage design, guarantee tracking, SLA evidence, and ministry-facing accountability for sovereign programs built on commercial SAR. Defensibility comes from historical performance data by mission type, vendor, geography, and revisit promise, plus the workflow lock-in created when integrators manage live sovereign contracts inside the system.
