topRisks:
  - name: Procurement concentration
    description: A startup could spend too long chasing a small number of slow sovereign programs and run out of time before enough contracts convert.
    mitigation: Sell first through defense integrators already bidding live programs, and focus on paid capture support plus one delivery workflow before trying to sell ministries directly.
  - name: Upstream vendor dependency
    description: If a major SAR provider limits data access or offers its own guarantee tooling, the startup could be squeezed out of the workflow.
    mitigation: Build a provider-agnostic coverage model from day one and contract for portable historical performance data across multiple SAR and adjacent sensor sources.
  - name: Security and trust barrier
    description: Sovereign buyers may resist putting mission commitments and performance evidence into an unproven external platform.
    mitigation: Start with unclassified planning and reporting workflows, support customer-controlled deployments, and win trust through auditable logs and integrator-led implementations.
