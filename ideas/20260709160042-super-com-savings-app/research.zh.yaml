competitors:
  - name: Super.com
    stage: 规模化阶段
    wedge: 消费者会员服务，打包旅行折扣、返现、信用建设工具和 AI 引导的储蓄行动。
    pricing: 按月付费的 Super+ 会员；具体费用在结账时披露。
    strength: 在储蓄指导和打包价值方面，已验证的大众市场参与度和品类认可度。
    weaknessVsUs: 争的是会员关系本身，而不是维护机构自己的品牌、存款和合规所有权。
    sourceRefs:
      - 74
      - 75
      - 100
  - name: Personetics
    stage: 现有厂商
    wedge: 银行嵌入式个性化洞察、自动储蓄和下一步最佳行动式互动。
    pricing: 定制企业定价。
    strength: 在自动储蓄和个性化应用内银行指导方面有深厚的信誉。
    weaknessVsUs: 相较于给中型信用社做的"周"级轻量组件，它的平台动作更宽、也可能更重。
    sourceRefs:
      - 29
      - 33
      - 35
      - 37
      - 42
  - name: SavvyMoney
    stage: 规模化阶段
    wedge: 面向金融机构的嵌入式信用评分、信用情报、个性化优惠和财商工具。
    pricing: 定制企业定价。
    strength: 庞大的金融机构分销覆盖面，且有可量化的存款和参与度案例。
    weaknessVsUs: 在信用情报和定向优惠上很强，但不太聚焦交易级的每周理财教练。
    sourceRefs:
      - 44
      - 45
      - 46
      - 49
      - 52
      - 53
  - name: Q2 Digital Banking
    stage: 现有厂商
    wedge: 带个性化、集成能力和新 AI 扩展的核心数字银行平台。
    pricing: 定制企业平台定价。
    strength: 握着 App 外壳，和银行、信用社已有深厚关系。
    weaknessVsUs: 路线图覆盖面太广，不太可能死磕一个中低收入留存场景。
    sourceRefs:
      - 1
      - 7
      - 11
  - name: Alkami Digital Sales & Service Platform
    stage: 现有厂商
    wedge: 面向预判式银行服务的统一数字银行、导入、数据和营销技术栈。
    pricing: 定制企业平台定价。
    strength: 增速强劲、注册用户基数大，且明确聚焦数据驱动的参与度。
    weaknessVsUs: 平台的覆盖面和实施范围，反而可能让一个专注的嵌入式储蓄助手显得更快、更简单。
    sourceRefs:
      - 14
      - 17
      - 18
      - 23
      - 56
regulatoryTechnicalConstraints:
  - point: 任何在银行 App 里和存款或信贷结果挂钩的推荐引擎，都需要 UDAAP、透支和模型风险方面的控制。
    sourceRefs:
      - 65
      - 67
      - 69
      - 70
  - point: 实施速度取决于能否获批接入数字银行数据和开放银行连接器，而不只是模型质量本身。
    sourceRefs:
      - 17
      - 27
  - point: 推荐质量取决于可靠的交易增强和行为数据；分类不准或提醒太杂，很快就会侵蚀信任。
    sourceRefs:
      - 20
      - 33
      - 49
validationSignals:
  - point: Super.com 2026 年 7 月的这轮融资，验证了面向消费者的引导式储蓄品类能做到规模化。
    sourceRefs:
      - 74
      - 75
      - 100
  - point: Q2 2026 年的调研显示，伙伴驱动的 AI 现代化在目标机构中已经是主流。
    sourceRefs:
      - 1
  - point: Alkami 的指标报告显示，数字参与度能带动产品扩展和交叉销售，支撑了 ROI 叙事。
    sourceRefs:
      - 14
  - point: SavvyMoney 覆盖 1,500 家金融机构的规模证明，嵌入式财商已经不再是边缘化的采购品类。
    sourceRefs:
      - 44
openQuestions:
  - 目标会员规模段里的 294 家低收入指定信用社，有多少已经在跑 Q2 或 Alkami？又有多少能通过现有伙伴计划触达？
  - 哪个首发使用场景在试点中能最快见到 ROI：透支规避、储蓄转存、订阅清理，还是信用建设交叉销售？
  - 在产品可以提及机构自营信贷产品、而不只是存款或预算行动之前，需要经过多少合规审查？
  - 相比独立 App，会员愿意在一个白标信用社体验里，为交易级个性化服务开通多大比例的授权？
