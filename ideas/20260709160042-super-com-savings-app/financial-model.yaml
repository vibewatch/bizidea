slug: embedded-ai-savings-copilot
date: "2026-07-09"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-08"
    unit: month
    source: '[BP date 2026-07-09] The model starts in the first full month after the business-plan date.'
  - id: A2
    name: Starting cash after seed close
    value: $3.0M
    unit: usdM
    source: '[BP fundingAsk targetFundingRangeUsd $3-5M; BP fundingAsk.runwayMonths 18] The base case
      uses the floor of the stated seed range and carries roughly a 6-month buffer beyond the BPs 18-month
      operating plan.'
  - id: A3
    name: Average deployed institution size
    value: 87.5K members with 80% digital reach, or about 70K billable members
    unit: members
    source: '[BP investorMemo.firstCustomer 75,000-150,000 members; BP market.som 100k average members;
      research.bottomUpSizingDrivers digital reach 80%] The model assumes slightly smaller-than-SOM average
      institutions in the first three years.'
  - id: A4
    name: Production PMPM price
    value: $0.40 PMPM
    unit: usd_per_member_month
    source: '[BP gtm.pricing; research.bottomUpSizingDrivers software price assumption] The recurring
      production contract follows the BP and research pricing anchor.'
  - id: A5
    name: Steady-state annual subscription per live institution
    value: $336K ARR
    unit: usdK_per_customer_year
    source: '[A3 + A4] About 70K billable members x $0.40 PMPM x 12 months yields $336K ARR, which sits
      inside the BPs $200K-$400K annual production range.'
  - id: A6
    name: Pilot commercial package
    value: $25K implementation fee plus $45K pilot fee over 90 days
    unit: usdK_per_pilot
    source: '[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract] The pilot package uses a
      mid-range implementation fee and a paid 90-day pilot consistent with the BPs $30K-$75K pilot guidance.'
  - id: A7
    name: Pilot duration and production conversion timing
    value: 90-day paid pilots with production pricing starting in month 4 for successful cohorts
    unit: months
    source: '[BP gtm.wedge 90-120 days; BP gtm.funnelTargets paid pilot to production 50%+; BP product.twelveMonth]
      The base case assumes the strongest early pilots convert on roughly a one-quarter cadence so Y2
      revenue can shift from services to PMPM subscriptions.'
  - id: A8
    name: Paying-institution ramp
    value: 4 paying institutions by Y1 exit, 12 by Q4Y2, and 26 by Q4Y3
    unit: customers
    source: '[BP product.sixMonth/twelveMonth/twentyFourMonth; BP milestones] This lands at the lower-middle
      of the BPs 25-30 institution year-3 range while still requiring visible partner help by Y3.'
  - id: A9
    name: Gross margin ramp
    value: 48%-58% in Y1, 60%-67% in Y2, and 68%-70% in Y3
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 70; BP strategicChoices.sequencingRationale; research.adoptionFrictionMatrix]
      Early launches absorb more integration, review, and support work before repeatable connectors and
      compliance packets standardize delivery.'
  - id: A10
    name: Monthly churn
    value: 1.3%
    unit: percent
    source: Startup-finance heuristic for sticky but still substitutable regulated B2B fintech sold into
      midsize institutions; low churn is justified by workflow embedding, but non-zero churn reflects
      competitive and procurement risk flagged in [BP risks] and [research.incumbentThesis].
  - id: A11
    name: Loaded salary bands
    value: Founder $180K; engineering/data $195K; product/compliance $180K; implementation $165K; GTM
      $175K; customer success/analytics $155K; G&A $130K
    unit: usdK_per_fte_year
    source: Startup-finance heuristic for U.S. seed-stage fintech hiring mapped to the roles and sequencing
      in [BP team].
  - id: A12
    name: Headcount ramp snapshots
    value: Founder 1/1/1/1/1/1; engineering-data 1/2/2/2/4/5; product-compliance 1/1/1/1/2/2; implementation-partnerships
      0/0/1/1/2/3; GTM-sales 0/0/0/1/2/3; customer-success-analytics 0/0/0/0/1/2; G&A-ops 0/0/0/0/1/1
      across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
    unit: fte
    source: '[BP team; BP operations; BP strategicChoices.sequencingRationale] The model adds scale roles
      only after connectors, compliance packaging, and partner motion become repeatable constraints.'
  - id: A13
    name: Non-payroll operating budgets
    value: Y1 $40K-$64K per month, Y2 $76K-$100K per month, and Y3 $111K-$138K per month
    unit: usdK
    source: Startup-finance heuristic for a regulated fintech carrying cloud, data, security, travel,
      partner-marketing, legal, insurance, and audit overhead on top of payroll.
  - id: A14
    name: Quarterly payroll smoothing
    value: Y2 and Y3 salary lines use month-by-month hires between the required snapshot columns
    unit: method
    source: '[Financial Modeler contract] Quarterly salary expense is smoothed between q4y1, q4y2, and
      q4y3 snapshots so payroll stays consistent with the BP hiring sequence.'
  - id: A15
    name: Cash-conversion simplification
    value: EBITDA approximates cash movement after the seed close
    unit: method
    source: Startup-finance heuristic for an asset-light software business with no debt, tax, or capex
      line modeled separately at this stage.
  - id: A16
    name: Downside scenario deltas
    value: $312K ARR per live institution, 10 paying institutions by Q4Y2 and 21 by Q4Y3, and gross margin
      3 points below base
    unit: scenario_inputs
    source: '[BP risks; research.sensitivityCases] The downside reflects slower partner access, more compliance
      friction, and weaker PMPM realization if deposit outcomes take longer to prove.'
  - id: A17
    name: Upside scenario deltas
    value: $360K ARR per live institution, 13 paying institutions by Q4Y2 and 30 by Q4Y3, and gross margin
      2 points above base
    unit: scenario_inputs
    source: '[BP milestones; research.distributionChannels; research.partnershipEcosystem] The upside
      assumes partner referrals and packaged deployment patterns pull forward both launches and production
      rollouts.'
