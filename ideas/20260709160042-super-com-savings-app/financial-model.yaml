scenarios:
  downside:
    description: Partner access and compliance approval take longer, leaving fewer production launches
      and lower PMPM realization by Y3.
    y3RevenueK: 4952.0
    y3EbitdaK: -801.2
    cashLowPointK: -336.9
    keyAssumptionChanges:
      - Steady-state subscription value falls from about $336K to about $312K ARR per live institution.
      - Paying-institution count reaches only 10 by Q4Y2 and 21 by Q4Y3.
      - Gross margin stays about 3 points below base because implementation and compliance work remain
        more custom.
      - The company does not get enough partner leverage to offset slower direct-sales and launch cycles.
  base:
    description: The base case reaches 12 paying credit unions by Q4Y2 and 26 by Q4Y3 while shifting the
      mix from paid pilots to PMPM subscriptions.
    y3RevenueK: 6186.0
    y3EbitdaK: 204.6
    cashLowPointK: 602.7
    keyAssumptionChanges:
      - Steady-state subscription value stays at about $336K ARR per live institution.
      - The company exits Y1 with 4 paying institutions and reaches 12 by Q4Y2, consistent with the BP
        milestone ladder.
      - Gross margin improves from the high-40s in early pilots to 70% by H2Y3 as deployment patterns
        standardize.
      - Headcount ramps to 13 FTE by Q4Y2 and 17 by Q4Y3, with scale hires added only after the first
        partner motion is working.
  upside:
    description: Partner referrals and faster deployment templates pull forward launches and let the company
      finish Y3 close to the BP's 30-institution SOM line.
    y3RevenueK: 7310.0
    y3EbitdaK: 1132.1
    cashLowPointK: 1034.0
    keyAssumptionChanges:
      - Steady-state subscription value rises from about $336K to about $360K ARR per live institution.
      - Paying-institution count reaches 13 by Q4Y2 and 30 by Q4Y3.
      - Gross margin runs about 2 points above base because support and governance packaging standardize
        earlier.
      - Channel-sourced pipeline materially supplements founder-led selling by the second half of Y2.
sensitivity:
  - variable: ARPU
    downsideCase: $312K steady-state ARR at roughly 65K billable members per institution
    baseCase: $336K steady-state ARR at roughly 70K billable members per institution
    upsideCase: $360K steady-state ARR at roughly 75K billable members per institution
    y3RevenueImpactK: -374.0
    cashImpactK: -368.9
  - variable: CAC
    downsideCase: $260K fully loaded CAC if partner referrals underperform and outbound stays founder-heavy
    baseCase: $220K blended CAC with founder-led selling plus partner intros
    upsideCase: $180K once partner and reference pipeline lowers direct acquisition effort
    y3RevenueImpactK: 0.0
    cashImpactK: -319.5
  - variable: churn
    downsideCase: 2.0% monthly churn if outcome proof or governance trust stays uneven
    baseCase: 1.3% monthly churn
    upsideCase: 0.8% monthly churn with stronger embedded-outcome proof
    y3RevenueImpactK: -205.0
    cashImpactK: -143.5
  - variable: sales cycle
    downsideCase: Post-Y1 pilot starts and production rollouts slip by about 2 months
    baseCase: 90-day pilots with production pricing starting in roughly one quarter
    upsideCase: Partner-approved playbooks pull launches about one quarter earlier
    y3RevenueImpactK: -609.0
    cashImpactK: -689.9
  - variable: gross margin
    downsideCase: Steady-state gross margin stalls near 67%
    baseCase: Gross margin reaches 70% by H2Y3
    upsideCase: Gross margin reaches 72% with cleaner templates and lighter support load
    y3RevenueImpactK: 0.0
    cashImpactK: -281.8
  - variable: hiring pace
    downsideCase: Late-stage scale hires are pulled into Q1Y3 before revenue density catches up
    baseCase: Scale hires follow production and partner milestones
    upsideCase: One noncritical scale hire slips until after 20 live institutions
    y3RevenueImpactK: 0.0
    cashImpactK: -285.8
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Board-triggered buyer meetings] --> Pilots[Paid pilots]
      Pilots --> Production[Production credit unions]
      Pilots --> Impl[Implementation fees]
      Production --> PMPM[PMPM subscription revenue]
      Production --> Expansion[Second-module expansion]
      PMPM --> GrossProfit
      Expansion --> GrossProfit
      Impl --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case growth comes from moving from 4 paying institutions at Y1 exit to 26 by Q4Y3 on
      roughly $336K steady-state ARR, with most Y2-Y3 revenue shifting from pilots into PMPM subscriptions.
  - checkName: Must go right
    finding: The company must keep pilot-to-production conversion near one quarter and turn partner channels
      into real pipeline by Y3, or the model will not support 26 paying institutions on the planned headcount.
  - checkName: Model breaks if
    finding: If partner access and PMPM realization slip toward the downside case, Y3 revenue falls to
      about $5.0M, EBITDA turns roughly $0.8M negative, and cash drops below zero.
  - checkName: Next-round proof
    finding: The next financing is justified once 10-12 live credit unions, two repeatable deployment
      patterns, and roughly 30% partner-sourced qualified pipeline show the wedge scales beyond founder-led
      selling.
sanityChecks:
  ruleOf40: Y3 growth 135.2% + EBITDA margin 3.3% = 138.5%.
  burnMultiple: Y2 burn multiple is about 0.6x and improves to positive quarterly EBITDA by Q3Y3.
  revenuePerFte: $363.9K Y3 on 17 end-of-year FTE (healthy for vertical SaaS/fintech if partner channels
    carry seller productivity).
  flags:
    - Base-case logo growth assumes Q2, Alkami, league, or CUSO channels become material by Y3; pure founder-led
      outbound would likely not support 26 paying institutions.
    - Customer rows model net paying institutions, while churn is reflected mainly in unit economics and
      sensitivity rather than explicit quarterly logo losses.
    - Full-year Y3 EBITDA is only modestly positive, so a two-quarter delay in production conversions
      would likely force an earlier follow-on raise.
