topRisks:
  - name: 核心银行集成拖延
    description: Alkami/Q2 的 API 接入和银行合规审查可能比六周的宣传节奏慢得多，拖住试点转付费的进度。
    mitigation: 在第一个付费试点前就和 Alkami、Q2 预先谈妥合作伙伴/应用市场集成协议，v1 范围限定在只读交易数据加外发 webhook 动作，把合规敞口降到最小。
  - name: 推荐引擎面临监管审查
    description: 在受监管的银行 App 里推荐具体的信贷和储蓄产品，可能触发 UDAAP、公平放贷和模型风险管理审查，拖慢或直接挡住上线。
    mitigation: 从第一天起就建立可审计、可解释的推荐日志，并找一位熟悉 NCUA 和 CFPB 检查预期的合规/模型风险顾问合作。
  - name: 超级 App 和核心供应商抢先入局
    description: Super.com 可能把自家技术栈白标卖给同一批机构，Alkami/Q2 也可能自建一个竞品原生功能，把这个切口直接抹平。
    mitigation: 尽早和数字银行核心系统锁定独家或优先合作协议，并靠一个单一核心供应商难以复制的跨机构利率/优惠数据网络效应做出差异化。
