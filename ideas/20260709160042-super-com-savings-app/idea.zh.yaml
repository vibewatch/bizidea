jobsToBeDone:
  - job: 当信用社发现会员把代发工资转去挑战者 App 时，帮数字银行业务副总裁在现有 App 里给会员提供 Super.com 级别的储蓄指导，这样机构不用等供应商的多年路线图，就能守住存款和交叉销售收入。
    currentAlternative: 静态财商内容，或者干等核心供应商的产品路线图
    successMetric: 每季度至少采纳一次 AI 推荐储蓄或信贷行动的会员占比，以及代发工资留存率的变化
  - job: 当中低收入会员领到工资、又要应付一堆账单时，帮他们看清这一周该做的那一件最重要的理财行动，这样他们就能避开透支费和掠夺性的短期信贷。
    currentAlternative: 手动记账 App，或者透支和发薪日贷款产品
    successMetric: 每位活跃会员的透支/NSF 事件和发薪日贷款使用量的下降幅度
