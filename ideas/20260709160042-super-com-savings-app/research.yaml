openQuestions:
- What share of the 294 low-income-designated credit unions in the target member band already run Q2 or Alkami, and what fraction can be reached through existing partner programs?
- 'Which first use case produces the fastest measurable ROI in pilots: overdraft avoidance, savings transfers, subscription cleanup, or credit-builder cross-sell?'
- How much compliance review is required before a recommendation engine can mention institution-issued credit products instead of only deposit or budgeting actions?
- What percentage of members will opt into transaction-level personalization inside a white-labeled credit-union experience rather than a standalone app?
