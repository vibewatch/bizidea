competitors:
- name: Super.com
  stage: scale-up
  wedge: Consumer membership bundling travel discounts, cashback, credit-building tools, and AI-guided savings actions.
  pricing: Monthly Super+ membership; exact fee disclosed at checkout.
  strength: Proven mass-market engagement and category validation around savings guidance and bundled value.
  weaknessVsUs: Competes for the member relationship rather than preserving the institution's brand, deposits, and compliance ownership.
  sourceRefs:
  - 74
  - 75
  - 100
- name: Personetics
  stage: incumbent
  wedge: Bank-embedded personalized insights, automated savings, and next-best-action engagement.
  pricing: Custom enterprise pricing.
  strength: Deep credibility in automated savings and personalized in-app banking guidance.
  weaknessVsUs: Broader and potentially heavier platform motion than a narrow weeks-not-years widget for midsize credit unions.
  sourceRefs:
  - 29
  - 33
  - 35
  - 37
  - 42
- name: SavvyMoney
  stage: scale-up
  wedge: Embedded credit score, credit intelligence, personalized offers, and financial-wellness tooling for FIs.
  pricing: Custom enterprise pricing.
  strength: Large FI distribution footprint with measurable deposit and engagement case studies.
  weaknessVsUs: Strong on credit intelligence and targeted offers, but less centered on transaction-level weekly money-action coaching.
  sourceRefs:
  - 44
