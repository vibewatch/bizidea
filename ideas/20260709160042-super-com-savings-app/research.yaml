  - 11
- name: Alkami Digital Sales & Service Platform
  stage: incumbent
  wedge: Unified digital banking, onboarding, data, and marketing stack aimed at anticipatory banking.
  pricing: Custom enterprise platform pricing.
  strength: Strong growth, a large registered-user base, and explicit focus on data-driven engagement.
  weaknessVsUs: Platform breadth and implementation scope can make a narrow embedded savings copilot look faster and simpler.
  sourceRefs:
