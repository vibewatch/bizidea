  adoptionFrictionMatrix:
  - friction: Compliance and model-risk review
    severity: high
    affectedBuyer: Digital banking leader plus compliance and risk teams
    mitigation: Start with explainable low-risk recommendations, log every recommendation, and package model-risk documentation up front.
    sourceRefs:
    - 65
    - 69
    - 70
  - friction: Integration dependency on core and digital-banking platforms
    severity: high
    affectedBuyer: CIO, digital platform owner, and implementation team
    mitigation: Land first where Q2 or Alkami connectors already exist and keep v1 read-only with narrow action surfaces.
    sourceRefs:
    - 17
    - 27
    - 56
  - friction: Member trust and recommendation fatigue
    severity: medium
    affectedBuyer: Member experience owner
    mitigation: Launch with obvious value cases such as overdraft avoidance or savings transfers and attach plain-English explanations to every prompt.
    sourceRefs:
    - 67
    - 68
    - 71
  - friction: Budget ownership fragmentation
    severity: medium
    affectedBuyer: Digital banking, retail banking, and growth stakeholders
    mitigation: Sell through deposit growth, balance growth, and engagement metrics already visible in peer case studies.
    sourceRefs:
    - 11
    - 14
    - 52
    - 53
