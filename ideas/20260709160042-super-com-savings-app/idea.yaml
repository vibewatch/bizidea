topRisks:
  - name: Core banking integration drag
    description: Alkami/Q2 API access and bank compliance review could take much longer than the six-week pitch, stalling pilot-to-paid conversion.
    mitigation: Pre-negotiate a partner/marketplace integration agreement with Alkami and Q2 before the first paid pilot, and scope v1 to read-only transaction data plus outbound webhook actions to minimize compliance surface.
  - name: Regulatory scrutiny on recommendation engine
    description: Recommending specific credit and savings products inside a regulated bank app can trigger UDAAP, fair-lending, and model-risk-management review that slows or blocks rollout.
    mitigation: Build an auditable, explainable recommendation log from day one and partner with a compliance/model-risk advisor experienced with NCUA and CFPB exam expectations.
  - name: Super-app and core-vendor encroachment
    description: Super.com could sell a white-label version of its own stack to the same institutions, or Alkami/Q2 could build a competing native feature, eliminating the wedge.
    mitigation: Lock in exclusive or preferred-partner integration agreements with digital banking cores early, and differentiate on a cross-institution deal/rate data network effect that a single core vendor can't easily replicate.
