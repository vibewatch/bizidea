slug: embedded-ai-savings-copilot
date: '2026-07-09'
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-08
    unit: month
    source: '[BP 日期 2026-07-09] 模型从商业计划日期之后的第一个完整月份开始。'
  - id: A2
    name: 种子轮到账后的起始现金
    value: $3.0M
    unit: usdM
    source: '[BP fundingAsk targetFundingRangeUsd $3-5M；BP fundingAsk.runwayMonths 18] 基线情形采用种子轮区间的下限，在 BP 的 18 个月运营计划之外，再留出约 6 个月缓冲。'
  - id: A3
    name: 平均单机构部署规模
    value: 8.75 万会员，80% 数字触达率，约合 7 万可计费会员
    unit: members
    source: '[BP investorMemo.firstCustomer 7.5 万-15 万会员；BP market.som 平均 10 万会员；research.bottomUpSizingDrivers 数字触达率 80%] 模型假设前三年的平均机构规模略小于 SOM 水平。'
  - id: A4
    name: 正式合同 PMPM 价格
    value: $0.40 PMPM
    unit: usd_per_member_month
    source: '[BP gtm.pricing；research.bottomUpSizingDrivers 软件定价假设] 经常性正式合同沿用 BP 和研究报告的定价锚点。'
  - id: A5
    name: 每家在营机构的稳态年度订阅额
    value: $336K ARR
    unit: usdK_per_customer_year
    source: '[A3 + A4] 约 7 万可计费会员 × $0.40 PMPM × 12 个月，得出 $336K ARR，落在 BP 给出的 $200K-$400K 年度正式合同区间内。'
  - id: A6
    name: 试点商业化组合
    value: $25K 实施费，加上 90 天 $45K 试点费
    unit: usdK_per_pilot
    source: '[BP gtm.pricing；BP investorMemo.firstCustomer.initialContract] 试点组合采用中位实施费，加上一个符合 BP $30K-$75K 试点指引的付费 90 天试点。'
  - id: A7
    name: 试点时长与正式转化节奏
    value: 90 天付费试点，成功群体从第 4 个月起启用正式定价
    unit: months
    source: '[BP gtm.wedge 90-120 天；BP gtm.funnelTargets 付费试点转正式 50%+；BP product.twelveMonth] 基线假设最强的早期试点按大约一个季度的节奏转正式，让第 2 年营收能从服务费转向 PMPM 订阅。'
  - id: A8
    name: 付费机构爬坡
    value: 第 1 年期末 4 家付费机构，第 2 年第 4 季度 12 家，第 3 年第 4 季度 26 家
    unit: customers
    source: '[BP product.sixMonth/twelveMonth/twentyFourMonth；BP milestones] 落在 BP 第 3 年 25-30 家机构区间的中下段，同时仍需要在第 3 年前看到明显的伙伴助力。'
  - id: A9
    name: 毛利率爬坡
    value: 第 1 年 48%-58%，第 2 年 60%-67%，第 3 年 68%-70%
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 70；BP strategicChoices.sequencingRationale；research.adoptionFrictionMatrix] 早期上线会吸收更多集成、审查和支持工作，之后可复制的连接器和合规资料包才会让交付标准化。'
  - id: A10
    name: 月度流失率
    value: 1.3%
    unit: percent
    source: 面向中型机构销售的受监管 B2B 金融科技的创业期财务经验法则：工作流嵌入带来较强黏性，但非零流失反映了 [BP risks] 和 [research.incumbentThesis] 中标记的竞争与采购风险。
  - id: A11
    name: 满载薪资标准
    value: 创始人 $180K；工程/数据 $195K；产品/合规 $180K；实施 $165K；GTM $175K；客户成功/分析 $155K；G&A $130K
    unit: usdK_per_fte_year
    source: 面向美国种子阶段金融科技招聘的创业期财务经验法则，对应 [BP team] 里的角色和用人节奏。
  - id: A12
    name: 人员编制爬坡快照
    value: 创始人 1/1/1/1/1/1；工程数据 1/2/2/2/4/5；产品合规 1/1/1/1/2/2；实施合作 0/0/1/1/2/3；GTM销售 0/0/0/1/2/3；客户成功分析 0/0/0/0/1/2；G&A运营 0/0/0/0/1/1，对应 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
    unit: fte
    source: '[BP team；BP operations；BP strategicChoices.sequencingRationale] 只有当连接器、合规打包和伙伴动作变成可重复的约束条件后，模型才会新增扩张型岗位。'
  - id: A13
    name: 非人力运营预算
    value: 第 1 年每月 $40K-$64K，第 2 年每月 $76K-$100K，第 3 年每月 $111K-$138K
    unit: usdK
    source: 面向受监管金融科技的创业期财务经验法则，覆盖薪资之外的云、数据、安全、差旅、伙伴市场、法务、保险和审计开销。
  - id: A14
    name: 季度薪资平滑处理
    value: 第 2、3 年的薪资科目在各快照列之间按月平滑处理新增招聘
    unit: method
    source: '[财务建模合同约定] 季度薪资支出在 q4y1、q4y2、q4y3 快照之间做平滑，让薪资和 BP 的招聘节奏保持一致。'
  - id: A15
    name: 现金转换简化处理
    value: 种子轮到账后，EBITDA 近似等同于现金变动
    unit: method
    source: 面向轻资产软件业务的创业期财务经验法则，此阶段不单独建模债务、税务或资本支出科目。
  - id: A16
    name: 下行情形参数变化
    value: 每家在营机构 $312K ARR，第 2 年第 4 季度 10 家付费机构、第 3 年第 4 季度 21 家，毛利率比基线低 3 个百分点
    unit: scenario_inputs
    source: '[BP risks；research.sensitivityCases] 下行情形反映了更慢的伙伴接入、更多合规摩擦，以及存款效果证明周期拉长导致的 PMPM 兑现更弱。'
  - id: A17
    name: 上行情形参数变化
    value: 每家在营机构 $360K ARR，第 2 年第 4 季度 13 家付费机构、第 3 年第 4 季度 30 家，毛利率比基线高 2 个百分点
    unit: scenario_inputs
    source: '[BP milestones；research.distributionChannels；research.partnershipEcosystem] 上行情形假设伙伴推荐和打包部署模式，会让上线和正式转化都提前发生。'
