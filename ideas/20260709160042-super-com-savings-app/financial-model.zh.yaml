scenarios:
  downside:
    description: 伙伴接入和合规审批花的时间更长，导致正式上线数量更少，第 3 年的 PMPM 兑现也更低。
    y3RevenueK: 4952.0
    y3EbitdaK: -801.2
    cashLowPointK: -336.9
    keyAssumptionChanges:
      - 每家在营机构的稳态订阅额从约 $336K 降到约 $312K ARR。
      - 付费机构数到第 2 年第 4 季度只有 10 家，第 3 年第 4 季度 21 家。
      - 毛利率比基线低约 3 个百分点，因为实施和合规工作仍然偏定制化。
      - 公司没能获得足够的伙伴杠杆，去抵消更慢的直销和上线周期。
  base:
    description: 基线情形到第 2 年第 4 季度做到 12 家付费信用社，第 3 年第 4 季度做到 26 家，同时把结构从付费试点转向 PMPM 订阅。
    y3RevenueK: 6186.0
    y3EbitdaK: 204.6
    cashLowPointK: 602.7
    keyAssumptionChanges:
      - 每家在营机构的稳态订阅额保持约 $336K ARR。
      - 公司在第 1 年期末做到 4 家付费机构，第 2 年第 4 季度做到 12 家，符合 BP 的里程碑节奏。
      - 毛利率随着部署模式标准化，从早期试点的高 40% 提升到第 3 年下半年的 70%。
      - 人员编制到第 2 年第 4 季度做到 13 名全职员工，第 3 年第 4 季度做到 17 名，扩张型招聘只在第一波伙伴动作跑通后才增加。
  upside:
    description: 伙伴推荐和更快的部署模板，让上线提前发生，公司在第 3 年末能接近 BP 中 30 家机构的 SOM 目标线。
    y3RevenueK: 7310.0
    y3EbitdaK: 1132.1
    cashLowPointK: 1034.0
    keyAssumptionChanges:
      - 每家在营机构的稳态订阅额从约 $336K 提升到约 $360K ARR。
      - 付费机构数到第 2 年第 4 季度做到 13 家，第 3 年第 4 季度做到 30 家。
      - 毛利率比基线高约 2 个百分点，因为支持和治理打包更早实现标准化。
      - 到第 2 年下半年，渠道来源的销售线索能实质性补充创始人主导的销售。
sensitivity:
  - variable: ARPU
    downsideCase: 每家机构约 6.5 万可计费会员，稳态 ARR $312K
    baseCase: 每家机构约 7 万可计费会员，稳态 ARR $336K
    upsideCase: 每家机构约 7.5 万可计费会员，稳态 ARR $360K
    y3RevenueImpactK: -374.0
    cashImpactK: -368.9
  - variable: 获客成本 (CAC)
    downsideCase: 如果伙伴引荐表现不佳、外呼仍以创始人为主，满载 CAC 达 $260K
    baseCase: 创始人销售加伙伴引荐，混合 CAC 为 $220K
    upsideCase: 一旦伙伴和参考客户销售线索起效，直接获客成本降到 $180K
    y3RevenueImpactK: 0.0
    cashImpactK: -319.5
  - variable: 流失率
    downsideCase: 如果效果证明或治理信任始终不稳定，月流失率达 2.0%
    baseCase: 月流失率 1.3%
    upsideCase: 嵌入式效果证明更强时，月流失率降到 0.8%
    y3RevenueImpactK: -205.0
    cashImpactK: -143.5
  - variable: 销售周期
    downsideCase: 第 1 年之后，试点启动和正式上线延迟约 2 个月
    baseCase: 90 天试点，正式定价约一个季度后启用
    upsideCase: 经伙伴认证的打法让上线提前约一个季度
    y3RevenueImpactK: -609.0
    cashImpactK: -689.9
  - variable: 毛利率
    downsideCase: 稳态毛利率停滞在接近 67%
    baseCase: 毛利率到第 3 年下半年达到 70%
    upsideCase: 模板更干净、支持负担更轻，毛利率达到 72%
    y3RevenueImpactK: 0.0
    cashImpactK: -281.8
  - variable: 招聘节奏
    downsideCase: 在营收密度跟上之前，后期扩张型招聘被提前到第 3 年第 1 季度
    baseCase: 扩张型招聘跟随正式上线和伙伴里程碑推进
    upsideCase: 一个非关键的扩张型岗位推迟到做满 20 家在营机构之后
    y3RevenueImpactK: 0.0
    cashImpactK: -285.8
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Board-triggered buyer meetings] --> Pilots[Paid pilots]
      Pilots --> Production[Production credit unions]
      Pilots --> Impl[Implementation fees]
      Production --> PMPM[PMPM subscription revenue]
      Production --> Expansion[Second-module expansion]
      PMPM --> GrossProfit
      Expansion --> GrossProfit
      Impl --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 营收引擎
    finding: 基线情形的增长来自付费机构数从第 1 年期末的 4 家，做到第 3 年第 4 季度的 26 家，稳态 ARR 约 $336K；第 2-3 年大部分营收从试点转向 PMPM 订阅。
  - checkName: 必须跑通的环节
    finding: 公司必须把试点转正式的周期控制在约一个季度左右，并在第 3 年前把伙伴渠道变成真实的销售线索，否则模型无法在计划人员编制下支撑 26 家付费机构。
  - checkName: 模型会在什么情况下失效
    finding: 如果伙伴接入和 PMPM 兑现滑向下行情形，第 3 年营收会跌到约 $5.0M，EBITDA 转为约 -$0.8M，现金会跌破零。
  - checkName: 下一轮融资的验证点
    finding: 一旦做到 10-12 家在营信用社、两种可复制的部署模式，并展示约 30% 的伙伴来源合格销售线索，证明这个切口能跑赢创始人主导销售的规模，下一轮融资就站得住理由。
sanityChecks:
  ruleOf40: 第 3 年增速 135.2% + EBITDA 利润率 3.3% = 138.5%。
  burnMultiple: 第 2 年烧钱倍数约为 0.6 倍，到第 3 年第 3 季度改善为正的季度 EBITDA。
  revenuePerFte: 第 3 年人均营收 $363.9K，对应年末 17 名全职员工——如果伙伴渠道能分担销售产能，这个水平对垂直 SaaS/金融科技公司算健康。
  flags:
    - 基线情形的客户增长假设 Q2、Alkami、信用社联盟或 CUSO 渠道到第 3 年变得举足轻重；纯创始人主导的外呼大概率撑不起 26 家付费机构。
    - 客户行数建模的是净付费机构数，流失主要体现在单位经济模型和敏感性分析里，而不是逐季度的显性客户流失。
    - 第 3 年全年 EBITDA 只是小幅转正，所以正式转化延迟两个季度，很可能会逼出一轮更早的续融资。
