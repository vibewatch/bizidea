  validationPlan:
  - priority: high
    question: Can the module reduce commissioning time for one battery-pack shared station by at least 50% versus a custom integrator-led cell?
    evidenceToGather: Run one side-by-side pilot on a live pack-seal or hose-seat task and compare engineering hours, tuning rounds, and time to safety sign-off against the incumbent process.
  - priority: high
    question: What stiffness/force envelope actually passes EHS review for one hose-seat and one pack-seal workflow?
    evidenceToGather: Collect formal risk-assessment criteria from at least three customer safety teams and map them to logged force, speed, and separation thresholds during pilot trials.
  - priority: medium
    question: How durable are the soft cells under heat, dust, fluids, and shift-level duty cycles?
    evidenceToGather: Instrument early pilots for cycle count, drift, replacement interval, and cleaning/maintenance burden in production-like battery-pack environments.
  - priority: medium
    question: 'Which go-to-market path closes faster: OEM/integrator resale or direct plant sale?'
    evidenceToGather: Track first ten opportunities by channel, sales-cycle length, gross margin, and number of engineering touchpoints needed to reach PO.
