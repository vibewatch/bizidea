slug: variable-stiffness-cell-kit
date: '2026-07-01'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date 2026-07-01]；由于计划日期正好落在月初，财务模型从 2026 年 7 月立即起算。'
- id: A2
  name: 计划中 pre-seed 融资到账后的期初现金
  value: '3200'
  unit: USD K
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M + BP fundingAsk.runwayMonths 18]；模型按 $3.2M 建模，让公司既能支撑试点项目、落在既定区间内，又能在第一个硬验证点之后再多扛 6 个月缓冲。'
- id: A3
  name: 客户单位定义
  value: 正在产生收入的工位项目
  unit: definition
  source: '[BP businessModel.unitOfValue live shared station + BP investorMemo.firstCustomer.initialContract]；模型把每个付费试点工位或每个在线生产工位计作 1 个收入单位，到第 3 年再收敛为在线工位口径。'
- id: A4
  name: 付费试点价格
  value: '45'
  unit: USD K per blocked station
  source: '[BP investorMemo.firstCustomer.initialContract $30K-$60K]；模型按付费验证试点的中位数建模。'
- id: A5
  name: 首年生产工位收入
  value: '50'
  unit: USD K per live station-year
  source: '[BP executiveSummary + BP gtm.pricing + Research market.sam/som rationale]；计划里反复把每个在线工位首年收入锚定在约 $50K。'
- id: A6
  name: 稳态经常性软件与支持收入
  value: '24'
  unit: USD K per live station-year
  source: '[BP gtm.pricing hardware plus recurring software/support]；创业融资经验法则把 $50K 首年工位价值拆成大致一半硬件/实施、一半经常性软件、支持与维护。'
- id: A7
  name: 第 1 年月末在线工位爬坡
  value: M1-M12 = 0,0,0,0,1,1,1,2,2,3,4,5
  unit: active stations
  source: '[BP milestones 0-12 months + BP investorMemo.mustBeTrue first pilot account expands to 3 stations within 12 months]；模型假设 2-3 个付费试点加上早期第二工位复用，让第 1 年末做到 5 个产生收入的工位。'
- id: A8
  name: 第 2 年季末在线工位爬坡
  value: Q1-Q4 = 7,9,11,13
  unit: active stations
  source: '[BP milestones 12-24 months]；对齐第 2 年末 4 个生产客户、12 个以上在线工位的目标。'
- id: A9
  name: 第 3 年季末在线工位爬坡
  value: Q1-Q4 = 22,32,42,50
  unit: active stations
  source: '[BP market.som + BP milestones 24-36 months]；基准情景做到研究测算的约 50 个在线工位、覆盖 8-10 个客户的 SOM。'
- id: A10
  name: 第 1 年单工位月度综合收入
  value: M1-M12 = 0,0,0,0,15,15,15,18,18,20,20,22
  unit: USD K per active station-month
  source: '[A4-A6 + BP gtm.pricing]；早期月份以试点和上线费为主，因此综合工位收入远高于稳态经常性 ARPU。'
- id: A11
  name: 第 2 年单工位月度综合收入
  value: Q1-Q4 = 7.0,6.8,6.6,6.4
  unit: USD K per active station-month
  source: '[A5-A6 + BP operatingAssumptions task-pack reuse]；随着装机量增长，一次性上线费被摊薄，但新工位仍带来硬件和验证收入。'
- id: A12
  name: 第 3 年单工位月度综合收入
  value: Q1-Q4 = 6.0,6.3,6.5,6.8
  unit: USD K per active station-month
  source: '[A5-A6 + BP market.som]；第 3 年末综合收入小幅回升，因为合作伙伴主导的推广给更大的装机基数带来更多新工位硬件、适配件和任务包挂载。'
- id: A13
  name: 毛利率爬坡
  value: Y1 35-50%, Y2 55-62%, Y3 64-70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70]；创业融资经验法则假设早期试点部署以服务和验证工作为主，随后供应商学习曲线和工位复用推动模型在第 3 年第 4 季度前后逼近 70% 目标。'
- id: A14
  name: 创始人/CEO 全成本年度现金薪酬
  value: '150'
  unit: USD K per year
  source: 创业融资经验法则：约 $125K 创始人现金薪酬，加上工资税和福利，对应一位 pre-seed 阶段工业自动化 CEO。
- id: A15
  name: 工程全成本年度现金薪酬
  value: '185'
  unit: USD K per FTE-year
  source: '[BP team founding eng + mechatronics and controls engineer]；创业融资经验法则，对应资深机器人、控制与仿真人才。'
- id: A16
  name: 现场应用与安全全成本薪酬
  value: '165'
  unit: USD K per FTE-year
  source: '[BP team field applications and safety engineer]；创业融资经验法则，对应一位现场部署与安全签核专家。'
- id: A17
  name: 制造与供应链全成本薪酬
  value: '160'
  unit: USD K per FTE-year
  source: '[BP team manufacturing and supply chain lead]；创业融资经验法则，对应早期硬件运营负责人。'
- id: A18
  name: 合作与 GTM 全成本薪酬
  value: '160'
  unit: USD K per FTE-year
  source: '[BP team partner account lead]；创业融资经验法则，对应一位以合作伙伴为主导、浮动薪酬较低的工业企业销售。'
- id: A19
  name: 运营与财务全成本薪酬
  value: '125'
  unit: USD K per FTE-year
  source: 创业融资经验法则，对应一位只在部署量上升后才加入的后期运营与财务通才。
- id: A20
  name: 招聘计划
  value: M1 CEO 与创始工程师到位；M2 机电工程师；M4 现场安全工程师；M7 制造负责人；M10 合作伙伴客户负责人；M13 第 3 名工程师；M16 第 2 名现场人员；M25 第 2 名合作伙伴负责人；M28 第 4 名工程师；M31 运营/财务负责人
  unit: hires
  source: '[BP team startTiming + BP strategicChoices.sequencingRationale]；BP 的第 0 月对应模型第 1 月，因此计划中列名的招聘落在 M2/M4/M7/M10，之后的招聘都是只有在可复制性初步验证后才追加的精干创业融资式增补。'
- id: A21
  name: 非薪资销售与市场支出
  value: Y1 每月 $6K，Y2 每月 $8K，Y3 每月 $10K，另加按平均在线工位月数计算每个工位月 $0.25K
  unit: USD K per month
  source: 创业融资经验法则，对应在一个狭窄工业市场里的差旅、工厂拜访、合作伙伴赋能、演示硬件物流和少量佣金。
- id: A22
  name: 非薪资研发与验证支出
  value: Y1 每月 $12K，Y2 每月 $14K，Y3 每月 $16K，另加按平均在线工位月数计算每个工位月 $0.20K
  unit: USD K per month
  source: '[BP operations + BP experimentRoadmap safety and durability validation]；创业融资经验法则，对应仿真工具、测试材料、供应商样品和耐久性工作。'
- id: A23
  name: 非薪资管理费用
  value: Y1 每月 $5K，Y2 每月 $6K，Y3 每月 $8K，另加按平均在线工位月数计算每个工位月 $0.10K
  unit: USD K per month
  source: 创业融资经验法则，对应早期硬件公司的保险、法务、会计、审计和安全资料包管理支出。
- id: A24
  name: 薪资分摊政策
  value: CEO 50% 计入 S&M、50% 计入 G&A；工程 100% 计入 R&D；现场 80% 计入 R&D、20% 计入 G&A；制造 70% 计入 R&D、30% 计入 G&A；合作伙伴岗位 100% 计入 S&M；运营 100% 计入 G&A
  unit: allocation
  source: 创业融资经验法则，在公司还太小、无法做部门核算时，把按岗位的薪酬折算成职能损益科目。
- id: A25
  name: 单工位 CAC
  value: '21.5'
  unit: USD K per new active station
  source: 模型推算：把第 2-3 年约 $968.9K 的销售与市场支出，除以 45 个净新增在线工位；由于 BP 假设每个客户内部会多工位扩张，工位层面的 CAC 低于客户层面。
- id: A26
  name: 单位经济模型经常性 ARPU
  value: '24'
  unit: USD K per active station-year
  source: '[A6]；单位经济模型采用稳态经常性软件、支持与维护收入，而非临时的试点费或硬件上线费。'
- id: A27
  name: 在线工位月流失率
  value: '0.8'
  unit: percent
  source: 创业融资经验法则，对应一旦安全批准并投产、就很难被拆除的粘性工业自动化部署。
- id: A28
  name: 现金转化时点
  value: EBITDA 近似等于经营现金流
  unit: policy
  source: 创业融资经验法则：模型不含债务、资本支出、营运资本波动和存货融资；这一简化在 sanityChecks.flags 里再次被提示，因为硬件现金需求在现实中可能更不均匀。
- id: A29
  name: 融资里程碑加缓冲
  value: 在第 18 个月跑到试点转化和第二工位复用的验证点，并留够现金，撑到第 24 个月实现 4 个生产客户、12 个以上在线工位的目标
  unit: milestone
  source: '[BP milestones 0-12 and 12-24 months + BP fundingAsk.runwayMonths 18]；融资额按这个验证点来定规模，再额外缓冲 6 个月。'
