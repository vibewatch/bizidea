  title: 单位经济模型流转
  mermaid: "flowchart LR\n  LaunchPrograms --> PaidPilots\n  PaidPilots --> LiveStations\n  LiveStations --> Revenue\n  TaskPackReuse --> GrossProfit\n  Revenue --> GrossProfit\n  GrossProfit --> Cash\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入靠把 2-3 个付费试点转化成第 2 年末 13 个、第 3 年末 50 个在线工位来驱动，同时新推广仍持续贡献上线费收入。
- checkName: 必须跑通的事
  finding: 至少一个第 1 年试点客户必须快速扩展到第二、第三个工位，因为销售周期和 CAC 的敏感性测算都假设的是同一客户内多工位扩张，而不是一次性项目。
- checkName: 模型失效条件
  finding: 如果 EHS 签核拖成 9 个月周期，或者毛利率停滞在 60% 出头，下行情景的现金会在公司达到第 3 年工位目标之前就转负。
- checkName: 下一轮融资证明
  finding: 一旦公司证明做到 4 个生产客户下 12 个以上在线工位、第二工位部署所用工程投入不到首次部署的 25%，且 CAC 仍接近模型测算的 $21.5K 工位水平，下一轮融资就会顺理成章。
sanityChecks:
  ruleOf40: 第 3 年增长 246.3% + EBITDA 利润率 -26.1% = 220.2%。
  burnMultiple: 第 2 年烧钱倍数为 3.2x（对应年度收入扩张），到第 3 年改善至 0.4x，因为任务包复用带动毛利提升的速度超过了运营支出增速。
  revenuePerFte: 第 3 年按平均全职员工计算的人均收入为 $242.5K（对标资本效率较高的工业软件与自动化厂商 $200-400K 基准区间）。
  flags:
  - 早期客户数把付费试点工位也计算在内，如果改用纯生产口径，第 1 年收入和 CAC 会比现在展示的更难看。
  - 现金是从 EBITDA 推算的；存货、演示硬件和客户回款时点，都可能让实际现金需求比模型显示的更高。
  - 基准情景到第 3 年只需要 11 名全职员工就能支撑 50 个在线工位，因此合作伙伴认证推广和第二工位复用必须按计划跑通。
  - 毛利率要到第 3 年第 4 季度才达到 70% 目标；如果安全工作始终定制化，或更换率偏高，模型会很快滑向下行情景。
  - 下行情景会让现金转负，这意味着公司在应对 9 个月销售周期或首个扩张客户失败时，容错空间都很有限。
