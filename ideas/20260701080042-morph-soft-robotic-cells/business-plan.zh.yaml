slug: variable-stiffness-cell-kit
date: '2026-07-01'
executiveSummary: 变刚度单元套件瞄准北美 EV 电池包总装团队——冷却软管安装和电池包密封件放置这类工位，至今还得靠人工或围栏定制工位兜底，因为刚性工具没法在操作员身边，在轻柔对位和大力插入之间切换。产品是一套装在机械臂末端的改造模块，配上仿真和力记录软件，让现有机器人在接近阶段保持柔顺、到插入时再变硬，并拿出经得起审计的安全证据供工厂签核。滩头市场就是一个被卡住的共享工位，通常挂在产线上马、车型改款或人体工程学整改项目上——因为预算、紧迫感和可量化的前后对比，都集中在那里。这个切口比卖一套新机器人平台或整套交钥匙电池工位窄得多，而且在一类汽车任务跑通之前，刻意避开医疗、出行辅助和更宽泛的软体机器人应用。研究支持一个真实的买家痛点，也支持一个可信的美国滩头市场，估算 SAM 为 $41.0M；但第 3 年计划能不能成立，取决于公司能否把 1-2 个试点转成 8-10 个客户下约 50 个在线工位。定价要锚定省下的集成商工时、上线延误和人工兜底成本，目标是靠硬件销售加经常性软件与支持，把每个在线工位的首年收入做到研究测算的约 $50k。第一个决定性的验证点，是一个付费试点能把调试时间至少砍掉 50%，并在不改写客户安全 PLC 的前提下，让一个在线的冷却软管或电池包密封工位拿到安全批准并投产。眼下最大的缺口，仍然是量产工况下的耐久性、EHS 团队究竟会批准什么样的力包络，以及固定柔顺加力传感方案是不是已经足够满足大多数工厂。
problem:
- EV 电池包总装里，冷却软管安装、密封件放置这类接触密集型步骤，仍然靠人工或围栏完成，因为刚性末端执行器在人机共享工位里，做不到从柔顺对位切换到可重复插入。
- 工厂想把这些工位自动化，却要面对漫长的调试周期、安全签核摩擦，而且零件几何形状、车型变体或操作员间距一变，就得砸钱做定制工程。
solution:
- 卖一套带压力传感、力记录和失效保护控制的改造式变刚度模块，装在现有机械臂和作业工具之间，服务一个电池包共享工位。
- 打包仿真模板和可复用安全资料包，让制造工程团队能离线调试接触范围、证明风险限值经得起审计，并把验证过的任务包复用到更多工位。
whyWeWin:
- 现有厂商要么卖整套机器人或工位平台，要么只卖单一的柔顺和传感部件；这家创业公司占据的是那层缺失的工作流——把自适应刚度、仿真调优和可交付客户的安全证据，拧成一类任务的完整方案。
- 每部署一个工位，都会扩充一份专有的力包络、接触事件和已批准应急行为库，让下一次软管安装或密封件部署，比找集成商做定制更快。
strategicChoices:
  beachhead: 正在新产线、车型改款或存量人体工程学整改项目里，上马共享冷却软管安装或电池包密封工位的北美 EV 电池包总装团队。
  wedgeRationale: 一个卡住的共享工位，给买家一个已经有预算的问题、一个清晰的现有方案对比，以及一条短平快的验证路径。在已装机的机器人上验证一套改造模块，比卖一套新机器人平台或整套交钥匙电池工位快得多。
  sequencingRationale: 先从一类污染程度较低的电池包任务、一到两种机器人栈适配件，以及合作伙伴主导的部署方式做起，让团队先证明安全性、调试速度和耐久性，再谈扩张。只有验证过关之后，公司才该加相邻任务包、更深的可追溯集成，以及更大的直销团队。
  notYet:
  - 整套交钥匙电池工位或控制器替换
  - 医疗、出行辅助或其他非工业类软体机器人应用
  - 耐久性尚未验证前，高温或重度污染、会考验软材料极限的工位
market:
  tam: 面向汽车和 EV 共享工位接触密集型装配的改造式变刚度模块，估算年度 TAM 为 $0.4B。
  sam: 基于约 13,700 台美国汽车行业机器人装机、估算 6% 的任务匹配度，以及每个在线工位约 $50k 的首年收入，估算美国滩头市场 SAM 为 $41.0M。
  som: 假设 8-10 个上量客户从 1-2 个卡住的共享工位起步、逐步扩展到合计约 50 个在线工位，估算第 3 年 SOM 为 $2.5M。
  segments:
  - 正在上马共享工位总装自动化的北美 EV 整车厂和电池包制造商
  - 正在增加类似 EV 电池包工作流的电池包代工厂和汽车一级供应商
  buyingProcess: 这套动作通常始于一个已经有预算的产线上马、车型改款或人体工程学整改项目。制造工程部门牵头试点，EHS 和安全审查员用应用层风险证据把关审批，一旦创业公司能证明签核速度比定制工位更快，制造工程总监或自动化负责人就会批准工位预算。
product:
  mvp: 交付一套可试点的末端改造件，面向一个冷却软管安装或密封件工位，具备变刚度驱动、压力传感、力记录、离线仿真，以及能降级到已知安全行为的失效保护模式。只支持一小组机器人接口和可追溯性导出，而不是全工位自治或广泛的 OEM 覆盖。
  sixMonth: 在一类任务上完成两个共创客户试点，交付第一份验证过的力包络库，并为首个机器人和集成商技术栈，做出一套可复用的安全资料包加适配套件。
  twelveMonth: 为同一类电池包接触模式增加第二个任务包，支持第二种机器人栈适配件，并交付兼容 MES 的质量证据导出，让客户能在同一家工厂的多个工位上复用这套模块。
  twentyFourMonth: 扩展到需要同样"柔顺接近+刚性插入"行为的卡扣安装、内饰或线束装配等相邻任务，同时把部署方式打磨成面向北美和部分欧洲客户、经合作伙伴认证的套件。
  keyBets:
  - 在至少一类电池包任务上，变刚度在调试速度和可重复性上会胜过固定柔顺加力传感方案
  - 首个客户会在 12 个月内，从一个试点工位扩展到至少三个在线工位
  - EHS 团队会接受记录下来的力包络和可复用安全资料包，而不要求全面改写安全 PLC
  - 软体单元模块能在接近量产的工况下，作为计划性维护部件存活下来，而不是频繁地非计划更换
gtm:
  wedge: 卖一个付费试点，解锁一个已经因为安全、人体工程学或刚性工具调试时间而卡住的冷却软管安装或密封件工位。
  channels:
  - 创始人主导，直接对接正在推进的 EV 产线项目里的制造工程负责人
  - 协作机器人 OEM 和汽车集成商转介绍——它们本来就掌控着工位选型和调试
  - 安全和力控生态合作伙伴，能把这套模块包装成低风险的改造方案
  funnelTargets: OEM 或集成商引荐→合格试点 20%+；合格试点→付费试点 50%+；付费试点→生产工位合同 60%+；首个生产站点→12 个月内再增 2 个及以上工位 50%+
  pricing: 先收一笔付费验证试点的费用，再按在线工位卖硬件，加一份年度软件、仿真和支持订阅。定价基准应该瞄准研究测算的每工位约 $50k 首年收入，让买家能直接拿它和省下的集成商工时、上线延误、报废风险和人工兜底成本做对比。
businessModel:
  revenueStreams:
  - 每个在线共享工位的前期硬件收入
  - 每个在用工位的年度仿真、控制软件与支持订阅
  - 来自新增任务包、适配件，以及向新工位或新工厂验证推广的扩展收入
  unitOfValue: 配有已验证变刚度任务包的在线共享工位
  targetGrossMarginPct: 70
  expansionLevers:
  - 第一个工作流获批后，在同一条电池包产线上增加更多工位
  - 从冷却软管安装扩展到密封件放置、卡扣安装等相邻的接触密集型动作
  - 在多家工厂销售可复用安全资料包、维护计划和软件订阅
strategyMap:
  northStarMetric: 从改造件安装到达标节拍下安全批准投产之间的天数
  inputMetrics:
  - 由产线上马或人体工程学卡点事件带来的付费试点数
  - 从安装到 EHS 签核的中位天数
  - 达标节拍下密封/安装任务的首次成功率
  - 每个客户的在线工位数
  - 第二工位部署里复用现有任务包的比例
  moatsToBuild:
  - 面向电池包共享工位任务、经过验证的力与刚度包络库
  - 绑定真实生产结果的接触事件数据集和应急策略
  - 经合作伙伴认证的适配件和安全资料包，能缩短在现有机器人栈上的审批时间
  killCriteria:
  - 前 10 家目标工厂里，不到 3 家能找出一个值得出钱做付费试点的卡住工位
  - 相比客户原有的定制工位或部件组合方案，试点未能把调试时间缩短至少 50%
  - 付费试点完成后 6 个月内，转化为生产工位合同的比例不到 50%
  - 前 3 个生产试点里，有 2 个模块在客户计划维护周期之前就需要非计划更换
  mermaid: "flowchart LR\n  Wedge[Blocked EV pack shared station] --> MVP[Variable-stiffness retrofit kit]\n  MVP --> Proof[Safety sign-off plus 50 percent faster commissioning]\n  Proof --> Expansion[More stations, more plants, adjacent assembly tasks]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 深科技切口有意思，买家痛点真实，但安全签核、耐久性和定价还没在付费试点里验证之前，信心仍然有限。
    whyBelieve: 研究显示 EV 电池共享工位周围确实存在真实的自动化预算，而目前没有任何一家现有厂商明确占据这层改造式变刚度切口。
    whyDoubt: 固定柔顺、力传感或集成商定制工作，可能已经足够满足大多数工厂的需求，留给一家新硬件厂商的空间太小。
    nextDiligence: 拿下一个付费试点，并证明在一个在线的冷却软管或密封件工位上，能在不做定制安全 PLC 重写的前提下，实现更快的安全批准调试。
  firstCustomer:
    title: EV 电池包总装的制造工程负责人
    profile: 一家北美 EV 整车厂、电池包制造商或电池包代工厂，正在运营一条新产线或改款产线，其中一个人机共用的冷却软管安装或密封件工位仍然卡着节拍达成。
    trigger: 产线上马、车型改款或人体工程学审查，卡住了一个计划中的共享工位协作机器人部署，除非工厂能证明接触行为安全。
    buyer: 制造工程总监或自动化负责人
    initialContract: 针对一个卡住工位的 $30k-$60k 付费试点，一旦任务包验证通过，转化为每个在线生产工位约 $50k 的首年收入，并在 2-6 个类似工位上重复部署。
  mustBeTrue:
  - 至少一半的目标 EV 电池包工厂里，都有一个刚性工具在所需节拍下仍然无法安全自动化的共享工位任务。
  - 相比现有方案，创业公司能把一个在线的冷却软管或密封件工位的调试时间缩短 50% 或更多。
  - 客户 EHS 团队愿意凭记录下来的力包络和公司的安全资料包批准工位，而不要求全面改写控制器。
  - 软体单元模块能在客户的计划维护窗口内，扛住接近量产的工况，保持校准和正常运行。
  - 首批试点客户会在 12 个月内，从一个工位扩展到至少三个在线工位或一类相邻任务。
  diligenceQuestions:
  - 哪些具体的电池包总装工位，眼下带来最高的人体工程学、返工或调试痛点？
  - EHS 在批准一个用于人机共享作业范围的变刚度工具之前，究竟需要什么证据？
  - 前 10 个目标客户里，哪些机器人、PLC 和安全技术栈占主导地位，适配支持有多难做？
  - 相比 ATI、OnRobot、Robotiq 或集成商自建方案，这个试点在成本、签核时间和良率上表现如何？
  - 第一个工位会给软材料带来什么样的工况、流体、高温和污染状况？
operatingAssumptions:
- assumption: 买家会在产线上马或人体工程学整改预算内为这款产品出钱，而不是把它当成投机性的机器人研发支出。
  basis: research.yaml
  validationTest: 9 个月内完成 10 通探索性电话，并拿下 3 个绑定在用产线上马或整改项目的付费试点。
  decisionImpact: 如果不成立，销售周期会拉长，公司必须更早依赖 OEM 或集成商转售，或者转向预算更大的上游客户。
- assumption: 一旦试点证明省下了集成商工时、返工和人工兜底成本，每个在线工位约 $50k 的首年收入是可以接受的。
  basis: research.yaml
  validationTest: 在 5 份试点提案里给出这个定价，并至少拿下 3 个落在目标首年工位定价 20% 以内的成交。
  decisionImpact: 如果不成立，公司必须降低 ACV、卖更宽泛的交钥匙范围，或者接受更弱的毛利率。
- assumption: 一个任务包和安全资料包，能以远少于首次部署的工程量，复用到第二个类似工位上。
  basis: idea.yaml
  validationTest: 在首个生产客户那里部署第二个工位，工程工时不到首次部署的 25%。
  decisionImpact: 如果不成立，公司会掉进服务陷阱，必须收窄到更少的工作流，或者为应用工程多融一轮资。
- assumption: 客户会在现有机械臂上采用这套模块，而不是转投一整套自适应机器人平台。
  basis: research.yaml
  validationTest: 在已装机或已选定的现有机器人栈上完成 2 个付费试点，且不更换客户的控制器选型。
  decisionImpact: 如果不成立，公司必须更直接地和机器人 OEM 竞争，可能需要完全不同的产品和渠道策略。
- assumption: 软体单元模块能作为计划性维护部件，扛住污染程度较低的电池包总装工况。
  basis: operator judgment
  validationTest: 做一轮加速寿命测试，加一个接近量产的试点，确认在客户计划维护周期之前不需要非计划更换。
  decisionImpact: 如果不成立，公司必须转向更轻负载的工作流、重新设计材料，或者放弃这条硬件切口。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 10 位制造工程和 EHS 负责人，了解他们最近一次在电池包产线上被卡住的共享工位自动化项目。
  hypothesis: 冷却软管安装和密封件放置，会被列为安全和调试仍然卡住自动化的高优先级任务。
  successMetric: 10 家客户里至少 7 家报告最近有一个卡住的工位，并能量化延误、人体工程学痛点或返工成本。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 在一个代表性的软管安装或密封件放置工作流上，把变刚度模块和固定柔顺加力传感方案做台架对比测试。
  hypothesis: 变刚度能显著提升对位加插入的成功率，且不增加安全风险。
  successMetric: 相比对比方案，首次成功率至少高 20%，或者调试时间至少少 50%。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 联合一家 OEM 或集成商合作伙伴，绑定在推进的产线上马或人体工程学整改项目，启动 2 个付费试点。
  hypothesis: 有合作伙伴协助的切入方式，比直接冷启动的企业销售成交更快。
  successMetric: 2 个付费试点在 6 个月内成交，且至少 1 个由 OEM 或集成商合作伙伴带来。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 打造可交付客户的安全资料包，把试点数据提交给 3 家工厂安全团队或实验室评审。
  hypothesis: 一份可复用的证据包，能在不需要客户专属控制器重新设计的前提下缩短签核时间。
  successMetric: 3 家评审方里有 2 家批准试点推进，且不要求全面改写安全 PLC。
  owner: 现场应用与安全工程师
- horizon: 6–12 个月
  experiment: 在首个生产客户那里，把同一个任务包部署到第二个工位上。
  hypothesis: 复用是这门生意能扩展到定制项目工作之外的最清晰信号。
  successMetric: 第二工位部署使用的工程工时不到首个工位的 25%，且在 90 天内完成转化。
  owner: 机电与控制负责人
- horizon: 12–18 个月
  experiment: 对比前 10 笔交易里，直销、OEM 和集成商来源的商机表现。
  hypothesis: 即便会稀释初期毛利，OEM 和集成商渠道成交也会更快。
  successMetric: 渠道来源的交易，销售周期至少短 25%，或者试点转化率是直销的 2 倍。
  owner: 合作伙伴客户负责人
operations:
- 每个试点出货前，都跑一套标准的应用层风险评估和安全资料包流程
- 在一个部署数据库里，按工位追踪力包络、接触事件、维护周期和质量证据
- 在第二工位复用可稳定重复之前，只支持一小组机器人、PLC 和集成商适配件
- 把软体单元模块设计成可快换的现场服务件，配有明确的更换和校准流程
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭建变刚度模块、传感技术栈和仿真流水线，让硬件主张能被验证。
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 亲自抓客户开发、试点销售、OEM 和集成商合作关系，并守住滩头市场的收窄纪律。
- role: 机电与控制工程师
  startTiming: 第 1 个月
  rationale: 把原型软体驱动和刚度切换，打磨成首个目标机器人栈上可复制的任务包。
- role: 现场应用与安全工程师
  startTiming: 第 3 个月
  rationale: 跑现场试点、搭建审批资料包，把客户专属的部署工作沉淀成可复用的实施剧本。
- role: 制造与供应链负责人
  startTiming: 第 6 个月
  rationale: 把试点硬件变成有合格供应商、服务备件和目标毛利率纪律的可复制模块。
- role: 合作伙伴客户负责人
  startTiming: 第 9 个月
  rationale: 只有在首批付费试点证明可重复的生产转化之后，才扩大 OEM 和集成商来源的商机管道。
milestones:
- horizon: 0–12 个月
  items:
  - 在绑定实际 EV 产线项目的冷却软管安装或密封件工位上，拿下 2-3 个付费试点
  - 至少在 2 个试点里，证明调试速度比现有方案快至少 50%
  - 交付首个已验证的任务包、可复用安全资料包和初始机器人栈适配套件
- horizon: 12–24 个月
  items:
  - 把至少 4 个客户转化为生产使用，做到 12 个或更多在线工位
  - 以显著更低的工程投入，把一个已验证任务包复用到第二、第三个工位
  - 增加第二类任务和第二种机器人栈适配件，但不扩展成全工位集成
- horizon: 24–36 个月
  items:
  - 在 8-10 个客户下做到约 50 个在线工位，对齐研究测算的 SOM
  - 扩展到卡扣安装、内饰或线束等共享同一接触模式的相邻工作流
  - 为北美和首批部分欧洲客户，建立经合作伙伴认证的推广套件
risks:
- risk: 固定柔顺加标准力传感方案，被证明对大多数电池包任务已经够用。
  likelihood: Medium
  impact: High
  mitigation: 在每个试点里都对标 ATI、OnRobot、Robotiq 和集成商自建方案，只聚焦在变刚度能创造可衡量差值的任务上。
- risk: 安全签核耗时超过产线上马窗口期，把公司拖成一个慢吞吞的服务附加项。
  likelihood: High
  impact: High
  mitigation: 尽早搭好可复用安全资料包，在试点安装前就拉上工厂 EHS 和实验室，只接有明确审批负责人和截止日期的项目。
- risk: 软材料在量产工况、流体或污染下磨损太快。
  likelihood: Medium
  impact: High
  mitigation: 先从污染程度较低的工位起步，密集监测维护周期，把模块设计成可快换的服务件。
- risk: 客户要求窄口径任务之外的定制工程，把公司拖进服务陷阱。
  likelihood: High
  impact: Medium
  mitigation: 拒绝无边界的定制工位范围，只把可复制的适配件和任务包产品化，并把每次部署的工程工时作为董事会指标来衡量。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要买 18 个月跑道：把可试点的模块打磨定型，完成第三方安全与耐久性验证，跑 3-5 个付费产线上马试点，加上首批两种机器人或集成商适配件，并证明一个生产工位能在同一客户内扩展成多工位部署。
