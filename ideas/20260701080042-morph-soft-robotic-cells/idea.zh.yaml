problem: EV 电池包总装里，软管安装、密封件放置和别扭的推压装配这些步骤，仍然大量靠人工完成——因为刚性机器人工具没法在操作员身边，安全地从轻柔对位切换到用力插入。工厂要么让这些工位继续纯人工，由此带来人体工程学和产线平衡的痛点；要么上马围栏定制工位，一旦零件或车型变化就得花大价钱重新调试。真正缺的那一层，不只是更聪明的机器人算法，而是能在同一个工位里，物理上改变自己接触零件和接触人的方式的硬件。
targetUser:
  primary: EV 电池包总装团队里，想让人和机器人在同一作业范围内共用工位、推进自动化的制造工程负责人
  secondary: 负责人体工程学风险和共享工位安全签核的工厂 EHS 与产线运营经理
  buyer: EV 整车厂或电池包制造商的制造工程总监或自动化负责人
startupThesis:
  nonObviousInsight: 把具身 AI 真正搬上工厂产线，瓶颈已经不再只是感知或规划软件，而是机器人、零件和人之间的机械接口。一旦变刚度单元能在接近时变软、只在插入瞬间变硬，标准机械臂就能接下那些原本卡在"不安全的刚性自动化"和"昂贵的人工"之间的工作流。
  beachhead: EV 电池包总装团队，在需要机器人和一名操作员共处、且要在轻柔接触和刚性插入之间切换的工位，引入一台机器人助手来完成冷却软管安装、电池包密封件放置和推压式卡扣安装。
  wedge: 一套软体驱动单元、压力传感和仿真调优控制组成的改造模块，装到现有协作机器人工位上，让一个共享工作流既安全又可复制。
  whyNowCatalyst: morph 的发布证明，实时、富传感的软体机器人单元现在已经商业可信，而汽车行业已经被列为更安全自适应硬件的首批聚焦领域。
  ventureScalePath: 先从一类卡住的 EV 共享工位任务切入，再把同一套硬件加控制技术栈，扩展到汽车、电子和医疗器械制造里的内饰、线束和精密子装配工作，最终延伸到需要安全人机接触的医疗或出行辅助机器。
solution: 这家创业公司卖的是一套变刚度单元套件，装在标准机械臂和作业工具之间，给一个工位加上软体驱动、压力传感和实时刚度切换能力。接近和对位阶段，接口保持柔顺，能吸收对位误差和意外的人体接触；到了插入或压紧阶段，它变硬，为推压装配和密封任务提供可重复的力。部署前，一套仿真软件会先对零件几何形状、接触范围和力阈值建模，让工厂能离线调试工位，不用再花几周时间试错。首个 SKU 瞄准电池包密封件放置和冷却软管安装，之后再扩展到那些既要轻柔触碰、又要短暂用力的相邻装配动作。每个作业周期都会记录接触事件和力曲线，让客户在安全评审、换型和向下一条产线推广时都有据可查。
goToMarketSeed:
  firstCustomer: 正在上马新电池包装配线的 EV 整车厂或电池包代工厂，产线里有一个卡住的共享工位自动化任务，比如需要在人工操作员身边完成冷却软管安装。
  buyingTrigger: 新产线上马、车型改款或人体工程学审查，卡住了一个计划中的协作机器人工位，除非工厂能证明人机共处作业是安全的。
  currentAlternative: 人工装配工位，加上系统集成商搭建的围栏定制机器人工位。
  switchingReason: 这套改造切口用的是工厂现有的机器人栈，省掉定制工具的时间，让一个工位不用加围栏，就能同时处理轻柔对位和刚性插入。
  pricingHypothesis: 按工位卖硬件，再加一份年度软件和仿真订阅，定价参照省下的集成商支出，以及减少的人工配置或人体工程学成本。
