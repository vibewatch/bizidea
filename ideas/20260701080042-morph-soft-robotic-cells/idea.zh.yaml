jobsToBeDone:
- job: 当一个电池包装配工位既要精细对位又要用力插入时，帮制造工程团队在不把操作员围起来的前提下把它自动化，这样他们既能达到节拍，又能减少人工劳损。
  currentAlternative: 人工装配，或者系统集成商搭建的定制围笼机器人工位
  successMetric: 工位达到目标节拍，首次任务成功率超过 95%，且无需安全评审返工
- job: 当一条新电池包产线因为共享工位的安全顾虑卡住时，帮工厂证明机器人在人机共处下行为安全，这样工厂就能批准上线，而不用再多花几个月调试。
  currentAlternative: 用刚性工具在线试错调试，再套工厂自定义的检查清单
  successMetric: 从工位安装到生产签核之间用了多少周
