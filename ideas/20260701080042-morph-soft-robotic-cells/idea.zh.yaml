differentiator: 大多数机器人软件公司只做到感知、规划或车队看板这一层，大多数硬件厂商出的还是刚性末端执行器，逼着工厂要么上围栏工位，要么做一次性工程。这家公司占据的是那层能实时改变接触行为的物理接口，再加上让它能在不同工位反复部署所需的仿真模型和力数据。材料工艺经验、接触事件数据集和工作流专属调校库，叠在一起构成了防御力——而这些恰恰是通用机器人 OEM 不太可能为一类范围窄但很痛的共享工位任务去优先投入的。
