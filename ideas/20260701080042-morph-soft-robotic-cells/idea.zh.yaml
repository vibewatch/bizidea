topRisks:
- name: 工况耐久性
  description: 软体驱动材料在高温、油污和反复工业循环下，可能磨损得太快，拖累正常运行时间。
  mitigation: 先从发热更低的密封件和软管工位切入，密集监测寿命数据，把更换模块作为计划性维护项目通过认证。
- name: 安全签核摩擦
  description: 在拿出确凿证据证明柔顺硬件在人身边行为可预测之前，工厂 EHS 团队和保险公司可能仍然不信任这类设备。
  mitigation: 每个试点都自带接触事件记录、第三方实验室测试，以及给工厂审批委员会用的工作流专属安全证据包。
- name: 服务陷阱
  description: 早期客户可能要求定制化的工位工程，把公司拖成一家昂贵的集成商，而不是可复制的产品供应商。
  mitigation: 把滩头市场收窄到一类电池包装配任务，把适配件和仿真模板产品化，拒绝范围之外的无边界定制工作。
