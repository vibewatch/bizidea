modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by turning 2-3 paid pilots into 13 active stations by Y2 exit and 50 live stations by Y3 exit while still collecting launch-fee revenue on new rollouts."
  - checkName: Must go right
    finding: "At least one Y1 pilot must expand to second and third stations quickly, because the sales-cycle and CAC sensitivities assume multi-station account expansion rather than one-off projects."
  - checkName: Model breaks if
    finding: "If EHS sign-off drifts toward a 9-month cycle or gross margin stalls in the low 60s, downside cash turns negative before the company reaches the Y3 station target."
  - checkName: Next-round proof
    finding: "The next financing is easiest once the company shows 12-plus live stations across 4 production customers, second-station deployments using less than 25% of the original engineering effort, and CAC still near the modeled $21.5K site level."
sanityChecks:
  ruleOf40: "Y3 growth 246.3% + EBITDA margin -26.1% = 220.2%."
  burnMultiple: "Y2 burn multiple 3.2x on year-over-year revenue expansion, improving to 0.4x in Y3 as task-pack reuse lifts gross profit faster than opex."
  revenuePerFte: "$242.5K Y3 revenue per average FTE (benchmark $200-400K for capital-efficient industrial software and automation vendors)."
  flags:
    - "Early customer counts include paid pilot stations, so a production-only definition would make Y1 revenue and CAC look worse than shown."
    - "Cash is modeled from EBITDA; inventory, demo hardware, and customer payment timing could make actual cash needs higher than the model."
    - "The base case still requires only 11 FTE to support 50 live stations by Y3, so partner-certified rollouts and second-station reuse must work on schedule."
    - "Gross margin only reaches the 70% target in Q4Y3; if safety work stays bespoke or replacement rates run high, the model moves toward the downside case quickly."
    - "The downside case turns cash negative, which means the company has limited room for a 9-month sales cycle or a failed first expansion account."
