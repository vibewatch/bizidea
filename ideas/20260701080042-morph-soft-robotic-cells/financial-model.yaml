slug: variable-stiffness-cell-kit
date: '2026-07-01'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: Model start month
    value: '2026-07'
    unit: month
    source: "[BP date 2026-07-01]; because the plan date lands on the first day of the month, the financial model starts immediately in July 2026."
  - id: A2
    name: Opening cash from planned pre-seed raise
    value: '3200'
    unit: USD K
    source: "[BP fundingAsk.targetFundingRangeUsd $2-4M + BP fundingAsk.runwayMonths 18]; model uses $3.2M so the company can fund the pilot program, stay inside the stated range, and still carry a 6-month buffer beyond the first hard proof point."
  - id: A3
    name: Customer unit definition
    value: "active revenue-generating station program"
    unit: definition
    source: "[BP businessModel.unitOfValue live shared station + BP investorMemo.firstCustomer.initialContract]; the model counts one paid pilot station or one live production station as the revenue unit, then converges to live stations by Y3."
  - id: A4
    name: Paid pilot price
    value: '45'
    unit: USD K per blocked station
    source: "[BP investorMemo.firstCustomer.initialContract $30K-$60K]; model uses the midpoint for a paid validation pilot."
  - id: A5
    name: First-year production station revenue
    value: '50'
    unit: USD K per live station-year
    source: "[BP executiveSummary + BP gtm.pricing + Research market.sam/som rationale]; the plan repeatedly anchors first-year revenue at about $50K per live station."
  - id: A6
    name: Steady-state recurring software and support revenue
    value: '24'
    unit: USD K per live station-year
    source: "[BP gtm.pricing hardware plus recurring software/support]; startup-finance heuristic splits the $50K first-year station value into roughly half hardware/implementation and roughly half recurring software, support, and maintenance."
  - id: A7
    name: Y1 end-of-month active station ramp
    value: "M1-M12 = 0,0,0,0,1,1,1,2,2,3,4,5"
    unit: active stations
    source: "[BP milestones 0-12 months + BP investorMemo.mustBeTrue first pilot account expands to 3 stations within 12 months]; model assumes 2-3 paid pilots and early second-station reuse create 5 revenue-generating stations by Y1 exit."
  - id: A8
    name: Y2 quarter-end active station ramp
    value: "Q1-Q4 = 7,9,11,13"
    unit: active stations
    source: "[BP milestones 12-24 months]; aligns to 4 production customers and 12-plus live stations by the end of Y2."
  - id: A9
    name: Y3 quarter-end active station ramp
    value: "Q1-Q4 = 22,32,42,50"
    unit: active stations
    source: "[BP market.som + BP milestones 24-36 months]; the base case reaches the researched SOM of about 50 live stations across 8-10 accounts."
  - id: A10
    name: Y1 blended monthly revenue per active station
    value: "M1-M12 = 0,0,0,0,15,15,15,18,18,20,20,22"
    unit: USD K per active station-month
    source: "[A4-A6 + BP gtm.pricing]; early months are pilot and launch-fee heavy, so blended station revenue is well above steady-state recurring ARPU."
  - id: A11
    name: Y2 blended monthly revenue per active station
    value: "Q1-Q4 = 7.0,6.8,6.6,6.4"
    unit: USD K per active station-month
    source: "[A5-A6 + BP operatingAssumptions task-pack reuse]; one-time launch fees dilute as the installed base grows, but new stations still carry hardware and validation revenue."
  - id: A12
    name: Y3 blended monthly revenue per active station
    value: "Q1-Q4 = 6.0,6.3,6.5,6.8"
    unit: USD K per active station-month
    source: "[A5-A6 + BP market.som]; late-Y3 blended revenue rises modestly because partner-led rollout creates more new-station hardware, adapter, and task-pack attach inside a larger base."
  - id: A13
    name: Gross margin ramp
    value: "Y1 35-50%, Y2 55-62%, Y3 64-70%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 70]; startup-finance heuristic assumes early pilot deployments are services and validation heavy, then supplier learning and station reuse move the model toward the 70% target by Q4Y3."
  - id: A14
    name: Founder CEO loaded annual cash compensation
    value: '150'
    unit: USD K per year
    source: "Startup-finance heuristic: about $125K founder cash pay plus payroll tax and benefits for a pre-seed industrial-automation CEO."
  - id: A15
    name: Engineering loaded annual cash compensation
    value: '185'
    unit: USD K per FTE-year
    source: "[BP team founding eng + mechatronics and controls engineer]; startup-finance heuristic for senior robotics, controls, and simulation talent."
  - id: A16
    name: Field applications and safety loaded compensation
    value: '165'
    unit: USD K per FTE-year
    source: "[BP team field applications and safety engineer]; startup-finance heuristic for an on-site deployment and safety-signoff specialist."
  - id: A17
    name: Manufacturing and supply chain loaded compensation
    value: '160'
    unit: USD K per FTE-year
    source: "[BP team manufacturing and supply chain lead]; startup-finance heuristic for an early hardware operations lead."
  - id: A18
    name: Partner and GTM loaded compensation
    value: '160'
    unit: USD K per FTE-year
    source: "[BP team partner account lead]; startup-finance heuristic for a partner-led industrial enterprise seller with modest variable pay."
  - id: A19
    name: Ops and finance loaded compensation
    value: '125'
    unit: USD K per FTE-year
    source: "Startup-finance heuristic for a late-stage operations and finance generalist added only after deployment volume rises."
  - id: A20
    name: Hiring schedule
    value: "M1 CEO plus founding engineer in place; M2 mechatronics; M4 field safety; M7 manufacturing; M10 partner lead; M13 engineer 3; M16 field 2; M25 partner 2; M28 engineer 4; M31 ops/finance"
    unit: hires
    source: "[BP team startTiming + BP strategicChoices.sequencingRationale]; BP Month 0 maps to model M1, so the named BP hires land in M2/M4/M7/M10, and later hires are lean startup-finance additions only after repeatability is partly proven."
  - id: A21
    name: Non-salary sales and marketing spend
    value: "Y1 $6K/mo, Y2 $8K/mo, Y3 $10K/mo plus $0.25K per average active station-month"
    unit: USD K per month
    source: "Startup-finance heuristic for travel, plant visits, partner enablement, demo hardware logistics, and light commissions in a narrow industrial market."
  - id: A22
    name: Non-salary R&D and validation spend
    value: "Y1 $12K/mo, Y2 $14K/mo, Y3 $16K/mo plus $0.20K per average active station-month"
    unit: USD K per month
    source: "[BP operations + BP experimentRoadmap safety and durability validation]; startup-finance heuristic for simulation tooling, test materials, supplier samples, and durability work."
  - id: A23
    name: Non-salary G&A spend
    value: "Y1 $5K/mo, Y2 $6K/mo, Y3 $8K/mo plus $0.10K per average active station-month"
    unit: USD K per month
    source: "Startup-finance heuristic for insurance, legal, accounting, audit, and safety-packet administration in an early hardware company."
  - id: A24
    name: Salary allocation policy
    value: "CEO 50% S&M and 50% G&A; engineering 100% R&D; field 80% R&D and 20% G&A; manufacturing 70% R&D and 30% G&A; partner roles 100% S&M; ops 100% G&A"
    unit: allocation
    source: "Startup-finance heuristic to turn role-level payroll into functional P&L lines while the company is still too small for departmental accounting."
  - id: A25
    name: Site-level CAC
    value: '21.5'
    unit: USD K per new active station
    source: "Model-derived from rounded Y2-Y3 sales and marketing spend of $968.9K divided by 45 net new active stations; CAC is lower at the station level than at the logo level because BP assumes multi-station expansion inside each account."
  - id: A26
    name: Unit-economics recurring ARPU
    value: '24'
    unit: USD K per active station-year
    source: "[A6]; unit economics use steady-state recurring software, support, and maintenance revenue rather than temporary pilot or hardware launch fees."
  - id: A27
    name: Monthly churn for live stations
    value: '0.8'
    unit: percent
    source: "Startup-finance heuristic for sticky industrial automation deployments that are hard to rip out once safety-approved and running in production."
  - id: A28
    name: Cash conversion timing
    value: "EBITDA approximates operating cash flow"
    unit: policy
    source: "Startup-finance heuristic: the model excludes debt, capex, working-capital swings, and inventory financing; this simplification is surfaced again in sanityChecks.flags because hardware cash needs can be lumpier in reality."
  - id: A29
    name: Funding milestone plus buffer
    value: "Reach the Month-18 proof point of pilot conversion and second-station reuse, with enough cash to carry through the Month-24 target of 12-plus live stations across 4 production customers"
    unit: milestone
    source: "[BP milestones 0-12 and 12-24 months + BP fundingAsk.runwayMonths 18]; the funding ask is sized to that proof point and then buffered by six additional months."
