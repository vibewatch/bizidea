fundingAsk:
  round: pre-seed
  amountM: 3.2
  runwayMonths: 18
  milestone: >-
    Reach the Month-18 proof point of 2-3 converted paid pilots and second-
    station reuse, with the included six-month buffer carrying the company to
    the Month-24 target of 12-plus live stations across 4 production customers.
  useOfFunds:
    - bucket: Engineering
      amountUsd: 1120000
      percentage: 35
    - bucket: GTM
      amountUsd: 800000
      percentage: 25
    - bucket: "G&A"
      amountUsd: 480000
      percentage: 15
    - bucket: "Buffer (6 mo)"
      amountUsd: 800000
      percentage: 25
scenarios:
  downside:
    description: >-
      Safety review, durability tuning, and partner onboarding each slip by one
      to two quarters, so the company exits Y3 at only 38 live stations and has
      to add field capacity before true rollout reuse is proven.
    y3RevenueK: 1577.7
    y3EbitdaK: -1431.8
    cashLowPointK: -576.2
    keyAssumptionChanges:
      - "Y1 exits at 4 active stations, Y2 at 10, and Y3 at 38 instead of 50."
      - "Blended monthly revenue per active station is 8-12% lower because plants buy fewer task-pack and adapter add-ons."
      - "Gross margin tops out at 66% and one extra field hire is pulled forward because safety work stays bespoke."
  base:
    description: >-
      The base case follows the BP path from 2-3 paid pilots to 13 active
      stations by Y2 exit and 50 live stations by Y3 exit, with hardware launch
      fees and recurring software/support both contributing materially.
    y3RevenueK: 2485.2
    y3EbitdaK: -648.8
    cashLowPointK: 351.8
    keyAssumptionChanges:
      - "Customer ramp reaches 5 active stations at Y1 exit, 13 at Y2 exit, and 50 at Y3 exit."
      - "Gross margin ramps from 35-50% in Y1 to the 70% target by Q4Y3 as supplier yield and second-station reuse improve."
      - "Headcount grows only to 11 FTE by Q4Y3 because partner-led rollout absorbs much of the deployment load."
  upside:
    description: >-
      The first pilot converts early, one OEM or integrator channel works in Y2,
      and the company reaches 55 live stations by Y3 exit while keeping the team
      roughly the same size.
    y3RevenueK: 2873.0
    y3EbitdaK: -354.2
    cashLowPointK: 716.0
    keyAssumptionChanges:
      - "Y1 exits at 6 active stations, Y2 at 16, and Y3 at 55."
      - "Blended monthly revenue per active station stays 3-7% above base because more rollout kits include paid adapters and maintenance plans."
      - "Gross margin reaches 72% by Q4Y3 as repeat stations require less on-site engineering."
sensitivity:
  - variable: ARPU
    downsideCase: "$21K steady-state recurring station-year and lighter launch-fee attach"
    baseCase: "$24K recurring station-year plus the base launch-fee schedule"
    upsideCase: "$27K recurring station-year with stronger maintenance and task-pack attach"
    y3RevenueImpactK: -248.5
    cashImpactK: -174.0
  - variable: CAC
    downsideCase: "$30K per new active station because channel partners do not lower logo-acquisition cost"
    baseCase: "$21.5K per new active station"
    upsideCase: "$18K per new active station with faster second-station expansion inside each account"
    y3RevenueImpactK: -150.0
    cashImpactK: -382.5
  - variable: churn
    downsideCase: "1.5% monthly churn if one task family proves too narrow and replacement cycles disappoint"
    baseCase: "0.8% monthly churn"
    upsideCase: "0.5% monthly churn once stations are safety-approved and embedded"
    y3RevenueImpactK: -140.0
    cashImpactK: -110.0
  - variable: sales cycle
    downsideCase: "9 months because EHS sign-off and plant scheduling slip"
    baseCase: "6 months from qualified pilot to production PO"
    upsideCase: "4-5 months with an integrator or OEM champion"
    y3RevenueImpactK: -620.0
    cashImpactK: -700.0
  - variable: gross margin
