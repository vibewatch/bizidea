differentiator: >-
  Most robot software companies stop at perception, planning, or fleet
  dashboards, while most hardware vendors still ship rigid end effectors that
  force factories into fenced cells or one-off engineering. This company owns
  the physical interface layer that changes contact behavior in real time, plus
  the simulation models and force data needed to deploy it repeatedly across
  stations. That creates defensibility through material know-how, contact-event
  datasets, and workflow-specific tuning libraries that generic robot OEMs are
  unlikely to prioritize for a narrow but painful class of shared-station
  tasks.
