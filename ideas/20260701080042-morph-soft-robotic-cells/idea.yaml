problem: >-
  EV battery-pack final assembly still keeps many hose-seating, seal-placement,
  and awkward push-fit steps in human hands because rigid robot tooling cannot
  switch from gentle alignment to forceful insertion safely beside an operator.
  Plants either leave those stations manual, which creates ergonomic and
  line-balancing pain, or commission fenced custom cells that are expensive to
  retune when parts or model variants change. The missing layer is not more
  robot intelligence alone; it is hardware that can physically change how it
  touches both parts and people inside the same station.
targetUser:
  primary: Manufacturing engineering leaders at EV battery-pack final-assembly teams trying to automate shared stations with people and robots in the same reach envelope
  secondary: Plant EHS and line-operations managers responsible for ergonomic risk and shared-station safety sign-off
  buyer: Director of Manufacturing Engineering or Head of Automation at an EV OEM or battery-pack manufacturer
startupThesis:
  nonObviousInsight: >-
    The bottleneck in bringing physical AI onto live factory lines is no longer
    just perception or planning software; it is the mechanical interface between
    robot, part, and person. Once variable-stiffness cells can soften during
    approach and stiffen only at the moment of insertion, standard robot arms
    can take on workflows that were previously trapped between unsafe rigid
    automation and expensive manual labor.
  beachhead: >-
    EV battery-pack final-assembly teams introducing one robotic helper for
    cooling-hose seating, pack-seal placement, and push-fit clip installs in
    stations where the robot must alternate between gentle contact and rigid
    insertion beside one operator.
  wedge: >-
    A retrofit module of soft actuator cells, pressure sensing, and
    simulation-tuned control that mounts on an existing cobot station to make
    one shared workflow safe and repeatable
  whyNowCatalyst: >-
    morph's launch shows real-time, sensor-rich soft robotic cells are now
    commercially credible, and automotive is already identified as an initial
    focus area for safer adaptive hardware.
  ventureScalePath: >-
    Start with one blocked EV shared-station task family, then expand the same
    hardware-plus-control stack into trim, harness, and delicate subassembly
    work across automotive, electronics, medical-device manufacturing, and
    eventually healthcare or mobility-assist machines that need safe human
    contact.
solution: >-
  The startup sells a variable-stiffness cell kit that mounts between a
  standard robot arm and task tooling, adding soft actuation, pressure sensing,
  and real-time stiffness switching to one workstation. During approach and
  alignment the interface stays compliant, absorbing misalignment and
  incidental human contact; at insertion or compression it stiffens to deliver
  repeatable force for push-fit and seal tasks. A simulation package models
  part geometry, contact envelopes, and force thresholds before deployment so
  the plant can tune the station off-line instead of through weeks of trial and
  error. The first SKU would target pack-seal placement and cooling-hose
  seating, then expand into adjacent assembly motions that mix delicate touch
  with brief forceful engagement. Every cycle logs contact events and force
  profiles so the customer has evidence for safety reviews, changeovers, and
  rollout to the next line.
goToMarketSeed:
  firstCustomer: An EV OEM or battery-pack contract manufacturer commissioning a new pack-assembly line with one blocked shared-station automation task such as cooling-hose seating beside a manual operator
  buyingTrigger: A new line launch, model refresh, or ergonomic review that blocks a planned cobot station until the plant can prove safe human-adjacent operation
  currentAlternative: Manual assembly stations plus custom fenced robot cells from systems integrators
  switchingReason: The retrofit wedge uses the plant's existing robot stack, cuts custom tooling time, and lets one station handle both gentle alignment and rigid insertion without adding a cage
  pricingHypothesis: Per-station hardware sale plus annual software and simulation subscription priced against avoided integrator spend and reduced manual staffing or ergonomic cost
