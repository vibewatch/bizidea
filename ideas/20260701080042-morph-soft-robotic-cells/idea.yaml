topRisks:
  - name: Duty-cycle durability
    description: Soft actuator materials may wear too quickly under heat, oil, and repetitive industrial cycles, hurting uptime.
    mitigation: Start with lower-heat pack-seal and hose stations, instrument lifetime aggressively, and qualify replacement modules as planned maintenance items.
  - name: Safety-signoff friction
    description: Plant EHS teams and insurers may still distrust compliant hardware until there is hard evidence that it behaves predictably around people.
    mitigation: Ship every pilot with contact-event logging, third-party lab testing, and workflow-specific safety evidence packages for plant approval committees.
  - name: Services trap
    description: Early customers may demand bespoke station engineering that turns the company into an expensive integrator instead of a repeatable product vendor.
    mitigation: Narrow the beachhead to one family of pack-assembly tasks, productize adapters and simulation templates, and refuse open-ended custom work outside that scope.
