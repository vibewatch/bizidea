    rationale: 2024 年全球工业机器人新增装机 54.2 万台 [4] × 汽车/EV 相关份额约 25%（估算，参照美国汽车行业占新增装机 40% 的份额 [3]）× 接触密集型共享工位任务份额约 6%（依据电池、卡扣插接、压装、点胶和总装证据测算 [19][20][21][22][26][29][31]）× 每工位首年预计收入 $50k ≈ $4.06 亿。
