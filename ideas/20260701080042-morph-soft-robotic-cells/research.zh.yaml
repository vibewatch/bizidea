competitors:
- name: morph
  stage: 种子轮
  wedge: 能感知、自适应并实时改变刚度的软体机器人单元，应用于多种具身 AI 场景。
  pricing: 定制化平台合作；未公开定价。
  strength: 在软材料与传感这套叙事上占据主导地位，和本创业公司的核心技术主张最接近。
  weaknessVsUs: 目前定位宽泛、偏平台化，不是针对某个制造工作流、专攻电池包场景的改造产品。
  sourceRefs:
  - 1
  - 2
- name: Flexiv
  stage: 成长期
  wedge: 面向接触密集型工业任务的自适应机器人与力控自动化。
  pricing: 机器人加应用包，按报价销售。
  strength: 已验证的力控叙事加上面向汽车的定位，让它成为可信的全栈替代方案。
  weaknessVsUs: 需要客户整套买下机器人平台，而不是用更轻的模块去改造已装机的机械臂。
  sourceRefs:
  - 32
  - 33
- name: ATI Industrial Automation
  stage: 现有厂商
  wedge: 面向插接与装配的力/力矩传感器和远心柔顺装置。
  pricing: 通过分销商销售部件或直接报价。
  strength: 在工业装配的插接、柔顺和末端工具领域有深厚的信誉。
  weaknessVsUs: 解决的是固定柔顺和传感问题，而不是变刚度转换加仿真与部署这一整套工作流。
  sourceRefs:
  - 34
  - 35
- name: Universal Robots + UR ecosystem
  stage: 现有厂商
  wedge: 通用型协作机器人平台，配有汽车应用模板和合作伙伴附加件。
  pricing: 机器人硬件加合作伙伴工具与软件，通常按报价销售。
  strength: 装机基数庞大、渠道成熟，并且为 EV 电池、卡扣插接、压装和点胶都做了明确的应用页面。
  weaknessVsUs: 处理最难的接触转换动作时，仍然要靠应用工程和合作伙伴工具。
  sourceRefs:
  - 18
  - 19
  - 20
  - 21
  - 22
  - 23
- name: ABB Robotics
  stage: 现有厂商
  wedge: 交钥匙的电池与汽车装配自动化，搭配集成力控和功能模块。
  pricing: 按交钥匙项目报价。
  strength: 深厚的汽车行业关系，加上围绕电池装配与力感知自动化的可信打包能力。
  weaknessVsUs: 更适合大范围项目和全工位自动化，而不是能直接嵌进已装机协作机器人工位的窄口径改造型 SKU。
  sourceRefs:
  - 25
  - 26
  - 27
regulatoryTechnicalConstraints:
- point: 共享工位的部署，必须依据 OSHA 指南和更新后的 ISO/A3 机器人安全框架，在应用层面做出风险评估论证。
  sourceRefs:
  - 7
  - 8
  - 9
  - 10
  - 11
  - 12
- point: 任何能改变刚度的末端执行器，在操作员进入共享作业范围之前，都需要经过验证的力/压力限值、失效保护行为和书面记录的协作模式。
  sourceRefs:
  - 8
  - 9
  - 10
  - 11
  - 12
  - 27
- point: 电池包的连接与密封质量容不得差错，因为封装完成后，进潮和后期返工的代价都很高。
  sourceRefs:
  - 29
  - 30
  - 31
- point: 存量电池工位越来越要求可追溯性和与 MES 联动的质量证据，这套改造方案不能表现得像个黑箱配件。
  sourceRefs:
  - 24
