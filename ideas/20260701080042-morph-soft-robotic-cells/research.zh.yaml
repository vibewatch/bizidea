  regulatoryLandscape: 能真正落地的部署，靠的不是"协作机器人"这个标签，而是应用层面的风险评估。A3 在 2025 年更新的 R15.06 采纳了新版 ISO 10218 修订内容，ISO/TS 15066 仍是协作力/压力场景的参照基准，OSHA 则把买方拉回到标准、危害识别和有据可查的机器人系统缓解措施上。[7][8][9][10][11][12]
  technologyLandscape: 支撑这件事的技术栈已经站得住：OEM 开放了力控功能，ABB 把集成力控打包成产品，ATI/OnRobot/Robotiq/PushCorp 卖传感和柔顺部件，Flexiv 卖自适应机器人，NVIDIA 也在发布接触密集型装配仿真工作流。缺的那一层，是把这些原料拧成一款工作流产品，让某一类电池包任务能在共享工位上被反复复制部署。[23][27][32][34][35][36][37][38][39]
  distributionChannels:
  - point: 直销在挂靠一个已经由制造工程部门认领的产线上马或自动化卡点时效果最好。
    sourceRefs:
