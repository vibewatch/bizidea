openQuestions:
- 一套软管安装和一套电池包密封工作流，到底要在什么力/刚度包络下才能通过客户的 EHS 审查？
- 哪个第一站的工况最干净，软材料不会因为油污、高温或污染而成为主要失效原因？
- 这款产品能不能干净地装到最常见的 UR、ABB、KUKA 机器人栈上，而不用改写客户的安全 PLC 逻辑？
- 买家会更愿意通过集成商和 OEM 购买改造套件，还是直接向一家新厂商买模块加验证软件？
