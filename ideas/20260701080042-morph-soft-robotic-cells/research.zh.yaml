    point: 电池包质量和防潮要求，让精准、可重复的连接与密封更有价值，也让一次糟糕的返工格外昂贵。
    sourceRefs:
    - 15
    - 29
    - 30
    - 31
  adoptionFrictionMatrix:
  - friction: 证明变刚度设备在操作员周围行为安全
    severity: 高
    affectedBuyer: EHS 和制造工程负责人
    mitigation: 试点工位自带力包络记录、应用层风险评估文件，以及能降级到已知安全行为的失效保护模式。
    sourceRefs:
    - 7
    - 8
    - 9
    - 10
    - 11
    - 12
  - friction: 电池线工况、液体和污染下的耐久性
    severity: 高
    affectedBuyer: 工厂运营和维护负责人
    mitigation: 先从低发热的共享工位切入，密集监测磨损情况，把软体单元设计成可快换的维护件。
    sourceRefs:
    - 19
    - 24
    - 29
    - 31
  - friction: 接入存量协作机器人、PLC 和安全系统
    severity: 中
    affectedBuyer: 自动化工程团队
    mitigation: 先只支持一小组 OEM 接口，并给模块配上可复用的仿真模板和集成商认证的适配件。
    sourceRefs:
    - 18
    - 23
    - 24
    - 26
    - 27
    - 28
    - 38
  - friction: 对比更便宜的固定柔顺或力传感方案，ROI 遭到质疑
    severity: 中
    affectedBuyer: 制造工程总监和财务审核人员
    mitigation: 把签核用时、首次通过率和省下的定制工具支出，拿去和 ATI/OnRobot/Robotiq 一类部件方案以及人工兜底做对比基准。
    sourceRefs:
    - 17
    - 34
    - 35
    - 36
    - 37
    - 39
