  - incumbentClass: 自适应全栈机器人厂商
    point: Flexiv 证明了力控自适应自动化确实有需求，但它要求客户整套买下它的机器人平台；这就给能兼容现有机械臂的改造模块留出了空间。
    sourceRefs:
