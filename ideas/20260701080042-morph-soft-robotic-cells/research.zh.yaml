  validationPlan:
  - priority: 高
    question: 相比集成商主导的定制工位，这套模块能否把某个电池包共享工位的调试时间缩短至少 50%？
    evidenceToGather: 在真实的电池包密封或软管安装任务上做一次并行试点，对比工程工时、调优轮次和安全签核用时与现有流程的差距。
  - priority: 高
    question: 一套软管安装和一套电池包密封工作流，到底要在什么刚度/力包络下才能过 EHS 审查？
    evidenceToGather: 从至少三家客户安全团队收集正式的风险评估标准，并在试点期间对应到记录下来的力、速度和间距阈值上。
  - priority: 中
    question: 软体单元在高温、粉尘、液体和整班次工况下的耐久性到底如何？
    evidenceToGather: 在接近真实生产的电池包环境里，给早期试点装上监测，记录循环次数、漂移、更换周期和清洁/维护负担。
  - priority: 中
    question: OEM/集成商转售和直接进厂销售，哪条 GTM 路径成交更快？
    evidenceToGather: 按渠道追踪前十个商机，记录销售周期长度、毛利率，以及拿到采购订单前需要多少次工程接触。
