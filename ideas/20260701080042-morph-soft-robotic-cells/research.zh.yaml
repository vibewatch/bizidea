reportMemo:
  executiveTakeaways:
  - 需求是真实的——现有厂商已经把 EV 电池装配、卡扣插接、压装、点胶和总装拆成一个个独立的自动化课题；真正空着的，是能在同一个共享工位里改变接触方式的改造层，而不是再卖一整套工位。[19][20][21][22][24][26][28][29][31]
  - 买方的紧迫感来自产线上马、用工短缺和安全审批，而不是笼统的 AI 预算；A3、DOE 和圣路易斯联储的数据都指向同一点：劳动力和竞争压力正在催生按项目走的自动化需求。[6][7][16][17]
  - 机器人本体、末端工具和交钥匙工位这几层竞争激烈，但把柔顺接近、刚性插入和可复用安全证据拼在一起、只服务一类工作流的变刚度改造层，竞争明显更轻。[18][23][27][32][34][35][36][37][39]
  - 只要公司搭上存量协作机器人和新电池产线上马的顺风车，先拿下 1-2 个卡住的共享工位，再扩展到返工和进潮成本高昂的电池包密封、软管安装、卡扣插接等相邻动作，第 3 年就有一条站得住的切口。[19][24][25][29][30][31]
  marketDefinition: 面向接触密集型汽车共享工位装配的改造式变刚度硬件，加仿真/控制软件，以末端模块形式销售，让现有机器人在柔顺接近和刚性插入之间自由切换。
  customerAndBuyer: 日常使用者是负责电池包和总装工位的制造自动化工程师、产线上马负责人和 EHS 审查员。真正的付费决策人通常是制造工程总监或自动化负责人——他们掌握共享工位的上线节奏、质量标准和资本开支。[18][19][24][25][29][31]
  buyingTriggers:
  - point: 新产线上马、车型改款或节拍瓶颈，会暴露出一个仍靠人工完成密封件放置、软管安装或卡扣插接的共享工位。
    sourceRefs:
    - 19
    - 24
    - 25
    - 29
    - 31
  - point: 重复性接触密集任务上积累的人体工程学和质量痛点越来越重——刚性工具要么损伤零件，要么把工厂逼回人工。
    sourceRefs:
    - 20
    - 21
    - 22
    - 30
    - 31
  - point: 安全审批成为卡点，因为工厂需要经得起审计的风险评估和力控证据，才能批准人机共处作业。
    sourceRefs:
    - 7
    - 8
    - 9
    - 10
    - 11
    - 12
  willingnessToPay:
    summary: 付费意愿在已经拿到预算的产线上马或人体工程学整改项目里最高。电池包一旦封装完成，粘接和密封出错的返工成本极高，同时用工短缺持续倒逼工程团队自动化。因此，一套能省掉围栏定制工位、缩短调试周期的改造方案，完全可以按集成商工时、上线延误、报废风险和人工兜底成本来编预算，而不是当成投机性的机器人研发支出。
    sourceRefs:
    - 16
    - 17
    - 19
    - 24
    - 29
    - 30
    - 31
  competitiveLandscape: 竞争集中在五类玩家：交钥匙汽车集成商（ABB、KUKA、Comau、JR）、协作机器人/OEM 生态（Universal Robots 及其合作伙伴）、力控部件供应商（ATI、OnRobot、PushCorp、Robotiq）、自适应全栈机器人（Flexiv），以及正在兴起的软体机器人平台（morph）。调研到的玩家里，没有一家专门针对"给现有共享工位加装变刚度模块、再配上可复用仿真与安全证据"这件事做深做窄。[1][18][24][26][28][29][32][34][35][36][37][39]
  incumbentThesis:
  - incumbentClass: 协作机器人平台与 OEM 生态
    point: Universal Robots 这类 OEM 生态让汽车工位部署更容易，但它们的价值仍然围着机械臂本体加合作伙伴附加件打转，并没有把某一类难啃的共享工位任务里、变刚度这个转换动作本身抓在自己手里。
    sourceRefs:
    - 18
