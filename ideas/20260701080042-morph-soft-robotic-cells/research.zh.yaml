    rationale: 2024 年美国汽车行业机器人新增装机 1.37 万台 [3]，并与 A3 公布的北美机器人市场稳定态势及协作机器人新跟踪数据交叉核对 [5][6]；假设其中 6% 符合滩头任务模式，按每工位首年预计收入 $50k 测算，约得 $4100 万。
