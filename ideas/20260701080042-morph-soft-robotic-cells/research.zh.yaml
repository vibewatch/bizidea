  - incumbentClass: 软体机器人平台创业公司
    point: morph 验证了市场对软体、富传感机器人单元的商业兴趣，但它目前的定位是一个宽泛的具身 AI 平台，而不是面向制造工程买家、专攻 EV 电池包场景的部署型产品。
    sourceRefs:
