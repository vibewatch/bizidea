  "regulatoryLandscape": "A district-facing robotics deployment platform sits inside the normal K-12 edtech compliance envelope: FERPA governs education records, COPPA matters if the product collects child data directly, and state laws such as SOPIPA sharply limit profiling, targeted advertising, and non-school-purpose data use. The safest initial posture is teacher-first workflow support with minimal direct student-data collection."
  "technologyLandscape": "The enabling stack already exists: web-based lesson portals, standards alignment, physical-computing curricula, roster exchange, and school IT allowlists are mature enough to support deployment. The hard problem is operational rather than technical — turning diverse kits, device constraints, and novice-teacher moments of failure into a reliable classroom system."
