  "competitiveLandscape": "The market breaks into five adjacent lanes: kit-plus-curriculum incumbents, competition-centric robotics ecosystems, creative/open-ended robotics kits, free lesson portals tied to specific hardware, and broader STEM curriculum substitutes. The whitespace is the cross-vendor execution layer that helps a generalist teacher actually run the lab, recover from failures, and keep inventory and pacing under control."
