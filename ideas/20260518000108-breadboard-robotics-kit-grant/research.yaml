  "willingnessToPay":
    "summary": "Schools already commit meaningful dollars to classroom robotics bundles and to teacher enablement: LEGO sells a $359.95 SPIKE Essential set for 2 students, Sphero sells a $2,999 BOLT Power Pack with 15 robots, BirdBrain sells a $4,730 classroom solution for 20-30 students, and major vendors advertise dedicated professional development programs. That is strong evidence the buyer will pay for anything that materially improves classroom completion and teacher confidence."
