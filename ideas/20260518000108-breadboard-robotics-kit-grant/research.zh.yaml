    - 33
    - 36
    - 47
  - friction: 学校 IT 兼容性、allowlist 和设备差异
    severity: high
    affectedBuyer: 学区 IT 负责人
    mitigation: 工具尽量保持浏览器化、公开设备要求，并支持 roster 标准，而不是走重定制集成。
