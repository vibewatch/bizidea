  sourceRefs:
  - 36
  - 42
  - 47
openQuestions:
- 目标学区里，有多大比例愿意单独为部署运营层付费，而不是默认支持应该包含在硬件里？
- 到底是哪几类课堂故障——电池、固件、缺件、接线错误还是节奏漂移——最能撬动对支持的付费意愿？
- 一个学区在最初靠资助上线的那一学期或那一年之后，究竟还有多少机器人课堂会保持活跃？
- 一套教师优先工作流，能不能在不碰敏感学生级数据的前提下，把结果证明给买方看？
