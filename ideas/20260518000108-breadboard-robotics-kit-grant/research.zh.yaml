competitors:
- name: LEGO Education
  stage: 现有厂商
  wedge: 一体化的小学机器人套件、与标准对齐的课程，以及和 FIRST LEGO League 的深度联动。
  pricing: 每套 SPIKE Essential 售价 $359.95；每套支持 2 名学生
  strength: 课程深度、品牌信任和通过教师资源与 FIRST 项目形成的生态拉力都很强。
  weaknessVsUs: 它公开提供的仍是自有套件生态和教师资源，而不是一套跨品牌、面向排障、节奏和补货的执行系统。
  sourceRefs:
  - 21
  - 22
  - 31
  - 33
- name: Sphero
  stage: 成长阶段
  wedge: 面向教师的友好型编程机器人和 class pack，并配套标准对齐与教师发展。
  pricing: $2,999 可买一套包含 15 台机器人的 BOLT Power Pack
  strength: 课堂就绪包装做得强，PD 也讲得很清楚，学校很容易一口气买一整套品牌化方案。
  weaknessVsUs: Sphero 本质上仍是一条产品线，而不是一层能覆盖学区现有多种套件的品牌中立运营系统。
  sourceRefs:
  - 35
  - 36
  - 37
- name: BirdBrain Technologies
  stage: 成长阶段
  wedge: 偏创意和开放式的机器人与动画装置，可搭配多种材料、设备和编程语言。
  pricing: 面向 20-30 名学生的课堂方案售价 $4,730
  strength: 很适合做表达性强、跨学科的机器人项目，教师支持材料也相当成熟。
  weaknessVsUs: 它的供给仍然围绕自家套件和教师创造力展开，因此结构化学区运营产品仍有空间。
  sourceRefs:
  - 40
  - 41
  - 42
- name: VEX IQ
  stage: 现有厂商
  wedge: 面向 4-8 年级的免工具机器人平台，把课堂、社团和竞赛通过渐进式编程串起来。
  pricing: 单套价格从 USD 469 起，小型课堂包为 USD 2,599
  strength: 非常适合初中场景，也能把课堂使用自然引向战队竞赛。
  weaknessVsUs: 竞赛体系和硬件深度，并不会自动解决通科教师在学区规模下的实时课堂支持问题。
  sourceRefs:
  - 50
  - 51
  - 52
- name: Ozobot
  stage: 成长阶段
  wedge: 轻量级编程机器人加免费教案门户，提供培训、节奏指南和全学科课程覆盖。
  pricing: 课堂门户免费；硬件经济性仍以套件销售为主，在 Classroom 页面上并未清晰展示
  strength: 老师友好度很高：700 节课程、节奏指南，以及“零 CS 经验也能上手”的培训。
  weaknessVsUs: Ozobot 依旧是单一厂商门户，看不出它掌握了跨品牌库存、排障或学区 部署 分析。
  sourceRefs:
  - 46
  - 47
  - 48
regulatoryTechnicalConstraints:
- point: 如果产品存学生作品、姓名、照片或进度记录，就必须按 FERPA 安全要求处理，并把数据用途严格限定在学校场景。
  sourceRefs:
  - 4
  - 5
- point: 如果工作流未来会直接从儿童那里收集个人信息，COPPA 的授权和产品设计就会变成硬约束。
  sourceRefs:
  - 6
- point: 学区部署必须兼容 roster 交换、浏览器/设备约束和网络 allowlist，不能假设用户能像消费应用那样直接开箱即用。
  sourceRefs:
  - 11
  - 19
  - 46
- point: 无障碍、远程/混合教学适配和课堂改造，不是边角需求，而是学校部署里的标准要求。
  sourceRefs:
  - 45
