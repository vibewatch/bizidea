problem: >-
  Districts and after-school operators increasingly want robotics in grades 4-8, but most classrooms are led by generalist
  science teachers who are not comfortable debugging circuits, sensors, or wiring mistakes in real time. That means
  grant-funded kits often become one-off club purchases, not repeatable classroom programs, because a single failed build
  can consume the whole period and erode teacher confidence. Schools end up wasting hardware budgets and losing the
  chance to turn early engineering exposure into a durable pathway.
targetUser:
  primary: >-
    Directors of STEM, curriculum, or CTE at 2,000-15,000 student U.S. K-8 and K-12 districts launching grades 4-8
    robotics classes with generalist teachers
  secondary: >-
    Regional after-school networks and youth-serving nonprofits running grant-funded robotics programs across 10-100 sites
  buyer: District STEM director or assistant superintendent for academics
startupThesis:
  nonObviousInsight: >-
    The bottleneck in school robotics is no longer student interest or even kit availability; it is teacher execution.
    Once BreadBoard-style kits can break projects into Lego-like steps with embedded video help, the winning company is
    the one that turns fragile kit usage into a district-wide classroom operating system with troubleshooting, pacing,
    replenishment, and proof of outcomes.
  beachhead: >-
    Southeastern U.S. school districts rolling out their first 10-50 grades 4-8 robotics classrooms using grant or
    philanthropy budgets and teachers without formal electronics training
  wedge: >-
    A robotics lab deployment platform that combines guided kit workflows, photo-based troubleshooting, classroom pacing,
    and replacement-part logistics for non-specialist teachers
  whyNowCatalyst: >-
    BreadBoard's Alabama Launchpad win shows buyers and funders are rewarding products that reduce robotics intimidation
    with structured instructions and video support, making district-scale classroom deployment newly practical.
  ventureScalePath: >-
    Start with elementary and middle-school robotics launch programs, then expand into broader hands-on engineering labs,
    district credentialing, after-school networks, homeschool channels, and workforce-readiness pathways that need the
    same teacher enablement and hardware-operations layer.
solution: >-
  The product starts as the system teachers open before class, not just the box students open on their desks. Each lesson
  guides kit setup, maps common wiring or assembly failures to short troubleshooting flows, and lets students submit
  checkpoint photos so a teacher can see which tables are blocked before chaos spreads. A district coordinator dashboard
  tracks completion by classroom, parts consumption, and which lessons consistently fail for novice instructors, making it
  easier to retrain staff or reorder materials before the next unit. Schools can deploy one standardized robotics program
  across dozens of classrooms without needing an expert maker educator in every building. Over time, the company owns the
  operational dataset on where hands-on STEM programs stall and how to keep them running.
goToMarketSeed:
  firstCustomer: >-
    A Southeastern U.S. district STEM director overseeing 8-30 elementary and middle-school classrooms funded to launch a
    first robotics unit in the next school year, with most sections taught by generalist science teachers
  buyingTrigger: >-
    A new STEM grant, summer spending cycle, or school-board-approved robotics rollout creates budget but also pressure to
    show the kits will actually be used across multiple classrooms
  currentAlternative: Standalone kits, teacher-made slide decks, YouTube videos, volunteer-led robotics clubs, and local reseller training days
  switchingReason: >-
    The first customer switches because this platform turns a kit purchase into a reliable classroom program with lower
    teacher anxiety, better completion rates, and concrete evidence the district can use to justify renewing or expanding
    the budget
  pricingHypothesis: >-
    Annual subscription priced per active classroom or site, with bundled starter kits, replacement-part margins, and
    premium teacher onboarding packages
