topRisks:
  - name: Budget cyclicality
    description: School robotics purchases may depend on grants and one-time funding rather than durable line items.
    mitigation: Start with districts and nonprofit networks that already have recurring STEM or enrichment budgets, then prove renewal through classroom completion and reuse metrics.
  - name: Hardware operations drag
    description: Shipping kits, replacement parts, and damaged components can turn the business into a low-margin logistics operation.
    mitigation: Keep the software layer central, standardize a narrow kit catalog, and use channel partners for fulfillment where possible.
  - name: Incumbent bundling
    description: Existing kit vendors or curriculum publishers could add lightweight teacher dashboards and claim the same category.
    mitigation: Own the live classroom execution layer with troubleshooting data, pacing analytics, and cross-site deployment workflows that simple content add-ons cannot match.
