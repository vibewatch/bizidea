differentiator: >-
  Kit vendors usually stop at curriculum content and box sales, while learning platforms rarely touch the real failure
  modes of physical classrooms: bad wiring, missing parts, pacing drift, and teacher hesitation. This company wins by
  sitting in the execution layer between hardware, lesson delivery, and district accountability. If it becomes the system
  that knows which builds fail, which teachers need intervention, and which classrooms consume what inventory, it can
  defend the account against both commodity kit makers and generic LMS tools.
