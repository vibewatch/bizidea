scenarios:
  downside:
    description: 学校学年内的上线时间整体晚了一个学期，续约仍高度依赖资助，而且因为支持仍以人工为主，毛利改善也爬不起来。
    y3RevenueK: 336.0
    y3EbitdaK: -610.0
    cashLowPointK: -80.0
    keyAssumptionChanges:
    - Y3 末只有 12 个付费学区，而不是 15 个
    - 混合年 ARPU 停在 $36K，而不是 $42K
    - 毛利率最高只到 65%，而不是 70%
  base:
    description: 两个 试点 都转成续约，学区最低收费守住，公司在 Q4Y3 做到 15 个生产学区，同时支持逐步从人工转向软件驱动。
    y3RevenueK: 425.25
    y3EbitdaK: -751.34
    cashLowPointK: 637.68
    keyAssumptionChanges:
    - Y3 末做到 15 个付费学区
    - 每个学区的混合年 ARPU 到达 $42K
    - 毛利率在 Q4Y3 到达 70%
  upside:
    description: 由伙伴带来的学区成交更快，第二个支持套件也能顺利复制，成熟学区会在不同比例扩人头的情况下继续增加课堂数。
    y3RevenueK: 520.0
    y3EbitdaK: -270.0
    cashLowPointK: 950.0
    keyAssumptionChanges:
    - Y3 末做到 18 个付费学区，而不是 15 个
    - 混合年 ARPU 到达 $45K
    - 依靠更标准化的部署打法，毛利率做到 72%
