  upsideCase: 第二名实施人员延后一季度招聘
  y3RevenueImpactK: -12.0
  cashImpactK: -82.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Grants[Grant and launch triggers] --> Pipeline[Qualified district 试点s]\n  Pipeline --> Accounts[Paying district accounts]\n  Accounts --> Revenue[Annual software and 上手支持 revenue]\n  Revenue --> GrossProfit[Gross profit after support and parts coordination]\n  GrossProfit --> Cash[Cash runway]"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入的核心驱动，是付费学区从 Y1 末的 3 个增长到 Q4Y3 的 15 个，同时更大的课堂打包把 ARPU 抬到 $42K。
- checkName: 必须跑对的事
  finding: 公司必须把前两个 试点 转成续约，这样创始人主导的销售才能有资格继续打到 Q4Y2 目标中的 4-6 个生产学区。
- checkName: 模型会在哪断
  finding: 如果学区采购整体晚一个学期，而毛利率又长期卡在 65% 左右，那么 downside 情景会在下一轮融资准备好前把现金打到零以下。
- checkName: 下一轮融资证明
  finding: 下一轮融资要讲通，关键是到 Q4Y2 拿下 6 个生产学区、出现首轮续约、支持第二套套件，并且还保留约 6 个月现金。
sanityChecks:
  ruleOf40: Y3 增长率 191% + EBITDA 利润率 -177% = 14%
  burnMultiple: 随着重复学区开始摊薄一支依旧精简的团队，burn multiple 从 Y2 约 7.4x 改善到 Y3 约 2.7x。
  revenuePerFte: 按 Q4Y3 的 7 个 FTE 计算，Y3 每个 FTE 对应收入为 $60,750（垂直 SaaS 基准为 $200-400K）。
  flags:
  - Y3 的每个 FTE 收入仍低于软件行业基准，因为学区 上手支持、实施支持和学年节奏，让这个模型仍明显带有服务属性。
  - 收入计划默认学区最低收费能够守住，即便一些首年 部署 只从 10-20 个课堂起步；如果买方坚持纯按教室定价，ARPU 会很快下滑。
  - 毛利率直到 Q4Y3 才摸到 70% 目标，所以只要对零件履约或定制化支持的直接暴露再高一点，下一轮融资就会被迫提前。
