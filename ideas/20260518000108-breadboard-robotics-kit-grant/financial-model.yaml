modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Grants[Grant and launch triggers] --> Pipeline[Qualified district pilots]
      Pipeline --> Accounts[Paying district accounts]
      Accounts --> Revenue[Annual software and onboarding revenue]
      Revenue --> GrossProfit[Gross profit after support and parts coordination]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by growing from 3 paying districts at Y1 exit to 15 at Q4Y3, with larger classroom bundles lifting ARPU to $42K.
- checkName: Must go right
  finding: The company must convert the first two pilots into renewals so founder-led selling can credibly land the 4-6 production districts targeted by Q4Y2.
- checkName: Model breaks if
  finding: If district buying slips by a semester and gross margin stays capped near 65%, the downside case drives cash below zero before the next round is ready.
- checkName: Next-round proof
  finding: The next financing case is earning 6 production districts, first renewals, and a second kit by Q4Y2 while preserving about six months of cash.
sanityChecks:
  ruleOf40: Y3 growth 191% + EBITDA margin -177% = 14%
  burnMultiple: Improves from about 7.4x in Y2 to about 2.7x in Y3 as repeat districts absorb a still-lean team.
  revenuePerFte: $60,750 Y3 using Q4Y3 headcount of 7 FTE (benchmark $200-400K vertical SaaS).
  flags:
  - Revenue per FTE is still below software benchmarks in Y3 because district onboarding, implementation support, and school-year timing keep the model services-influenced.
  - The revenue plan assumes district minimum fees hold even when some first-year rollouts start with only 10-20 classrooms; if buyers insist on pure per-classroom pricing, ARPU falls quickly.
  - Gross margin only reaches the 70% target in Q4Y3, so any direct exposure to parts fulfillment or bespoke support would pull forward the next raise.
