scenarios:
  downside:
    description: School-year launches slip by one semester, renewals stay grant-dependent, and margin improvement stalls because support remains people-heavy.
    y3RevenueK: 336.0
    y3EbitdaK: -610.0
    cashLowPointK: -80.0
    keyAssumptionChanges:
    - Y3 exits with 12 paying districts instead of 15
    - Blended annual ARPU stays at $36K instead of $42K
    - Gross margin tops out at 65% instead of 70%
  base:
    description: Two pilots convert, district minimum fees hold, and the company reaches 15 production districts by Q4Y3 while support becomes more software-led.
    y3RevenueK: 425.25
    y3EbitdaK: -751.34
    cashLowPointK: 637.68
    keyAssumptionChanges:
    - Y3 exits with 15 paying districts
    - Blended annual ARPU reaches $42K per district
    - Gross margin reaches 70% in Q4Y3
  upside:
    description: Partner-sourced districts close faster, the second supported kit repeats cleanly, and mature districts expand classroom count without matching headcount growth.
    y3RevenueK: 520.0
    y3EbitdaK: -270.0
    cashLowPointK: 950.0
    keyAssumptionChanges:
    - Y3 exits with 18 paying districts instead of 15
    - Blended annual ARPU reaches $45K
    - Gross margin reaches 72% on a more standardized deployment playbook
