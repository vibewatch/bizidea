problem: 越来越多学区和课后项目想把机器人带进 4-8 年级，但大多数课堂都由通科科学老师带，他们并不擅长在上课时实时排查电路、传感器或接线错误。结果就是，靠资助买来的套件常常只落成一次性的社团采购，变不成可复制的课堂项目，因为一次搭建失败就可能耗光整节课，也会直接打掉老师的信心。学校最后既浪费了硬件预算，也错过了把早期工程启蒙做成长期路径的机会。
targetUser:
  primary: 美国 K-8 或 K-12 学区里，学生规模约 2,000-15,000 人、正准备在 4-8 年级用通科教师开设机器人课程的 STEM、课程或 CTE 负责人
  secondary: 在 10-100 个点位运营、靠资助落地机器人项目的区域性课后网络和服务青少年的 nonprofit
  buyer: 学区 STEM 负责人，或分管教学的助理学监
startupThesis:
  nonObviousInsight: 学校机器人教育现在卡住的，已经不是学生有没有兴趣，甚至也不是有没有套件，而是老师能不能把课堂真正跑起来。只要 BreadBoard 这类套件能把项目拆成乐高式步骤，再嵌入视频帮助，最后赢的就会是那个把脆弱的套件使用场景，做成学区级课堂操作系统的公司——它能把排障、节奏、补货和结果证明都一起接住。
  beachhead: 美国东南部首批上线 10-50 个 4-8 年级机器人课堂的学区，预算来自资助或慈善资金，授课老师大多没有正式电子电路训练
  wedge: 一套面向非专业教师的机器人实验室部署平台，把引导式套件流程、看图排障、课堂节奏控制和备件物流接在一起
  whyNowCatalyst: BreadBoard 拿下 Alabama Launchpad，说明买方和资助方都在奖励那些用结构化说明和视频支持来降低机器人畏难情绪的产品，学区级课堂部署因此第一次真正具备了可操作性。
  ventureScalePath: 先从小学和初中机器人的启动项目切进去，再扩到更广的动手工程实验室、学区认证、课后网络、家庭教育渠道，以及同样需要教师赋能和硬件运营层的就业准备路径。
solution: 这款产品首先不是学生桌上要打开的盒子，而是老师上课前先打开的系统。每节课都会带老师完成套件准备，把常见接线或组装故障映射成短排障流程，还让学生提交检查点照片，这样老师能在课堂失控前先看到哪些桌卡住了。学区协调员仪表盘会按教室跟踪完成度、零件消耗，以及哪些课程最容易让新手老师翻车，从而在下个单元开始前更早安排复训或补料。学校不用每栋楼都配一位 maker 专家，也能把同一套机器人项目铺到几十个教室。时间一长，公司手里就会积累一套核心运营数据：动手式 STEM 项目到底会在哪些环节卡住，以及该怎么把它重新跑通。
goToMarketSeed:
  firstCustomer: 美国东南部某学区的 STEM 负责人，管理着 8-30 个小学和初中课堂，已经拿到预算准备在下个学年上线首个机器人单元，而大多数班都由通科科学老师授课
  buyingTrigger: 新的 STEM 资助、暑期采购周期，或校董会批准的机器人项目 部署，会把预算放出来，同时也带来压力：学区必须证明这些套件真的会在多个课堂里用起来。
  currentAlternative: 单独采购套件、老师自制幻灯片、YouTube 视频、志愿者带的机器人社团，以及本地经销商提供的培训日
  switchingReason: 首个客户会切换，是因为这套平台把一次套件采购，变成了一个更稳的课堂项目：老师焦虑更低、完成率更高，学区还能拿到实打实的证据，为续预算或扩预算背书。
  pricingHypothesis: 按活跃教室或站点收年费订阅，再叠加入门套件打包、备件毛利和高阶教师 上手支持 服务包。
