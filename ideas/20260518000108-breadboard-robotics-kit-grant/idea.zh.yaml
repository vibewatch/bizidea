topRisks:
- name: 预算周期波动
  description: 学校采购机器人，可能更依赖资助和一次性资金，而不是稳定预算科目。
  mitigation: 先切那些本来就有持续性 STEM 或拓展预算的学区和 nonprofit 网络，再用课堂完成率和复用指标去证明续约。
- name: 硬件运营拖累
  description: 发套件、补零件、处理损坏件，可能把公司拖成一个低毛利物流生意。
  mitigation: 始终让软件层站在中心，只维护一套很窄的套件目录，并在可能时把履约交给渠道伙伴。
- name: 现有厂商打包进入
  description: 已有套件厂商或课程出版社，可能补一个轻量教师仪表盘，就宣称自己覆盖了同一品类。
  mitigation: 把实时课堂执行层握在自己手里——排障数据、节奏分析和跨站点部署工作流，都是简单内容插件补不上的。
