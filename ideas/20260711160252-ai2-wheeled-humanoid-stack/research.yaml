  validationPlan:
  - priority: high
    question: Which one or two handoff workflows have enough volume and low enough risk to justify a first pilot?
    evidenceToGather: Time-motion studies and exception logs for freezer-to-bench, consumable restock, and inter-room transfer workflows at 5-8 target sites.
  - priority: high
    question: What evidence package does QA actually need before a robot-mediated handoff is accepted in site SOPs?
    evidenceToGather: Collect approval workflows, deviation templates, and audit expectations from QA/compliance leads at three design-partner labs.
  - priority: medium
    question: Does budget come from lab automation, site operations, or digital-lab transformation?
    evidenceToGather: Run pricing and budget-source discovery with 8-10 ICP buyers already evaluating workflow automation or mobile robotics.
  - priority: medium
    question: Which current wheeled mobile manipulators can reliably handle doors, labels, and freezer interactions in the ICP environment?
    evidenceToGather: Pilot teleoperation-assisted runs with OEM partners and measure intervention rate by task step.
