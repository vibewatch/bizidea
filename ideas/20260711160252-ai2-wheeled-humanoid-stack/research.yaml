openQuestions:
- How many North American biotech or CDMO campuses already have an approved mobile-manipulation or advanced AMR pilot that could buy this layer in the next 12-24 months?
- What exact evidence package must QA review before a robot-mediated handoff is accepted as part of site SOPs and deviation processes?
- Which touchpoints—freezer doors, cart docking, barcode capture, pass-throughs, or bench placement—fail most often in real pilot environments?
- Can the startup win budget from lab automation or site operations directly, or will it remain dependent on OEM-led pilot projects in year one?
