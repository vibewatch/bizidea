  searchedQueries:
  - Find authoritative recent sources on wheeled humanoid or mobile-manipulator robotics deployments and funding relevant to structured industrial and biotech environments, including primary company pages, reputable robotics trade press, and investor/news coverage.
  - Find authoritative sources on biotech lab automation pain points, especially manual sample or consumable movement, freezer-to-bench workflows, audit trails, chain of custody, and exception handling in QC or process-development labs.
  - Find official regulatory and standards sources relevant to robot-mediated handoffs and electronic traceability in biotech labs, including 21 CFR Part 11, GLP/GxP data integrity, CLIA, OSHA/robotics standards, and lab interoperability standards.
  - Find authoritative market-size and analyst sources for lab automation, life-science automation software, industrial robotics adoption, and mobile robot deployment in laboratories or regulated facilities from 2024 to 2026.
  - Find primary competitor and substitute sources for lab orchestration software, robot operations platforms, and automation control layers relevant to regulated biotech labs, including Biosero, Benchling Automation, Thermo Fisher Momentum, InOrbit, Formant, and AMR/mobile-manipulator vendors.
  - Find customer-signal sources such as case studies, surveys, job posts, or trade commentary that show biotech labs or regulated facilities are investing in lab automation, robotics, sample tracking, or workflow exception management.
  - Find official establishment-count sources for U.S. biotechnology R&D companies, CDMOs, or labs that could support a bottom-up estimate of North American biotech process-development and QC sites.
  - Find authoritative or primary sources that indicate pricing or budget levels for adjacent enterprise lab automation software, robot operations software, or validated workflow orchestration that can anchor a modeled ACV.
