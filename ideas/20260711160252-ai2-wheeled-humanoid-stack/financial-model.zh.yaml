scenarios:
  downside:
    description: 机器人 就绪度 更慢、验证更定制，导致转化延后、附加销售更浅，相邻市场扩张也大多被推迟。
    y3RevenueK: 1233.8
    y3EbitdaK: -765.2
    cashLowPointK: -251.9
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 只能到 11，而不是 15，因为试点转生产从约 90 天拉长到 120-150 天，且 OEM 主导试点的转化更慢。
    - 站点经常性价值会更贴着研究锚点约 $120K，因为很少有客户会再买第二条工作流或分析模块。
    - 退出毛利率大约只能到 68%，因为合规和集成工作仍比基准情形假设的更定制。
  base:
    description: 基准情形下，3 个付费共创客户能先后转正，到 Q4Y2 摸到商业计划里 5-8 个站点目标的上沿，并在 Y3 末做到研究中的 15 站点 SOM。
    y3RevenueK: 1922.5
    y3EbitdaK: -229.6
    cashLowPointK: 418.9
    keyAssumptionChanges:
    - 到 M12 有 3 个付费共创站点在跑，到 Q4Y2 有 8 个付费站点在线，Y3 末合计 15 个付费站点。
    - 第一批生产站点从约 $132K ARR 起步；早期客户一旦加上第二条工作流或分析模块，经常性价值会扩到约 $162K-$192K。
    - 毛利率从首批试点月份中段 30% 左右，随着证据包、连接器和 上线手册 可复用，到 Q4Y3 爬到商业计划目标 72%。
  upside:
    description: 伙伴转介绍来得更早，QA 证据包也更顺，所以更多站点提前上线，早期扩张比计划快 1-2 个季度。
    y3RevenueK: 2242.0
    y3EbitdaK: 44.7
    cashLowPointK: 733.8
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 可到 17，而不是 15，因为 OEM 与集成商转介绍把其中 2 个站点的启动时间提前了。
    - 早期扩张站点更快爬向约 $190K 的经常性价值，因为第二条工作流和分析模块更早被买下。
    - 随着证据包和连接器更快标准化，部署工作量下降更快，退出毛利率大约能到 74%。
sensitivity:
- variable: ARPU
  downsideCase: 站点经常性价值一直贴着研究锚点约 $120K，几乎没有附加模块挂上去。
  baseCase: 稳态混合站点价值约 $145K，早期批次能挂上第二条工作流。
  upsideCase: 早期站点会比计划更早扩到约 $160K+ 的经常性价值。
  y3RevenueImpactK: -260.0
  cashImpactK: -190.0
- variable: CAC
  downsideCase: 创始人差旅和 OEM 共销摩擦把首波 CAC 顶到约 $125K。
  baseCase: 前 6 个生产站点的 CAC 稳在约 $99K。
  upsideCase: 伙伴带来的热线索让 CAC 更接近 $85K。
  y3RevenueImpactK: 0.0
  cashImpactK: -130.0
- variable: 流失率
  downsideCase: 如果有一个早期站点不续约或不扩张，月流失率会往 2.0% 漂。
  baseCase: 一旦工作流写进 标准作业流程，月流失率维持在 1.2%。
  upsideCase: 由于经验证交接层深深嵌进 QA 流程，月流失率能守在 0.8% 左右。
  y3RevenueImpactK: -80.0
  cashImpactK: -60.0
- variable: 销售周期
  downsideCase: 由于 QA 评审和采购拖长，试点转生产会往 120-150 天拉。
  baseCase: 第一条工作流大约 90 天转正，后续由伙伴带动的上线可以复用同一份证据包。
  upsideCase: 到 Y2 后段，随着案例可引用，转化周期可压到 60-75 天。
  y3RevenueImpactK: -430.0
  cashImpactK: -300.0
- variable: 毛利率
  downsideCase: 部署工作仍过于定制，退出毛利率只能到 68%。
  baseCase: 到 Q4Y3，毛利率达到商业计划目标 72%。
  upsideCase: 随着连接器和证据包更快标准化，毛利率可到约 74%。
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
- variable: 招聘节奏
  downsideCase: 在伙伴复用真正跑顺前，就提前拉进第二位机器人集成人员。
  baseCase: 扩张型招聘仍按商业计划的顺序推进，只在共创客户证明之后才进场。
  upsideCase: 其中一名售后岗位会推迟到相邻受监管试点之后再招，也不会拖慢增长。
  y3RevenueImpactK: 0.0
  cashImpactK: -170.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  NamedSites[Named target sites] --> PaidPilots[Paid pilots]\n  PaidPilots --> ProductionSites[Production subscriptions]\n  ProductionSites --> WorkflowAddOns[Workflow add-ons]\n  ProductionSites --> AdjacentSites[Adjacent regulated sites]\n  WorkflowAddOns --> Revenue[Revenue]\n  AdjacentSites --> Revenue\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准收入靠三件事驱动：3 个付费共创客户顺利转正、Q4Y2 做到 8 个付费站点，以及 Y3 末做到 15 个站点；最早一批客户再叠加适度的第二条工作流附加值。
- checkName: 必须跑顺的地方
  finding: 试点转生产必须贴着 90 天目标走，模型才能在销售周期 downside 把现金打穿之前，把伙伴带来的站点补上来。
- checkName: 模型何时会坏
  finding: 如果真实站点价值一直钉在研究锚点 $120K 左右，而毛利率又卡在高 60% 上不去，downside 情形会在 Y3 证明出来之前先把现金烧穿。
- checkName: 下一轮证明点
  finding: 一旦做到 5-8 个付费站点、多个试点转生产，且有一个相邻受监管共创客户验证了“能跳出生物科技窄切口”，就有资格去讲 seed。
sanityChecks:
  ruleOf40: Y3 增长 130.2% + EBITDA 利润率 -11.9% = 118.3%（方向上很强，但也被较小的 Y2 基数抬高了）。
  burnMultiple: Y2 burn multiple 约为 0.7x：大约 $673.4K 的 EBITDA burn，对应约 $908.4K 的净新增退出 ARR；到 Y3 随着 Q4 转正，改善到约 0.2x。
  revenuePerFte: $214K Y3 / 9 名期末 FTE（落在垂直 SaaS 常见的约 $200-400K 区间）。
  flags:
  - 生物科技与 CDMO 滩头本来就很窄，所以风投故事仍取决于相邻受监管场景能否在投资人愿意大笔下注前先被证明。
  - 基准情形假设部分早期站点，会通过第二条工作流和分析模块，把站点价值抬到研究 TAM 锚点约 $120K ACV 之上；如果扩张停滞，Y3 收入会很快被压缩。
  - customersEop 同时包含付费试点和生产站点，所以在“试点+生产”混合季度里，真正的经常性生产客户数会低于对外展示的站点数。
  - Q4Y3 只实现了轻微的 EBITDA 转正，因此只要有几次部署滑期，或额外验证要求冒出来，现金低点就会明显下探。
  - 模型用 EBITDA 近似现金，所以企业回款里程碑、预付款安排或收款放缓，都可能让真实跑道前后偏几个月。
