slug: biotech-robot-handoff-os
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-11] 模型从这份商业计划日期之后的第一个完整月份开始。'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情形采用区间下沿，因为团队招聘保持精简，Q4Y3 也只做到温和的 EBITDA 转正。'
- id: A3
  name: 期初付费站点数
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] 公司从零收入起步，得先签下付费共创客户。'
- id: A4
  name: 客户定义
  value: 一个付费站点：要么在跑付费试点，要么已签经验证站点的生产合同
  unit: definition
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] 客户按付费站点统计，不按机器人数量，也不按技术员席位。'
- id: A5
  name: 付费试点单价
  value: 约 3 个月 $50K（约 $16.7K/月）
  unit: USD/site
  source: '[BP investorMemo.firstCustomer.initialContract $40K-$60K] 模型取中值，对应首条获批工作流和 QA 证据包。'
- id: A6
  name: 初始生产订阅价
  value: $132K ARR (~$11.0K/mo)
  unit: USD/site/year
  source: '[BP gtm.pricing researched roughly $120k ACV + Research market.som $120k modeled ACV] 第一份生产合同只比研究锚点略高一点，体现早期工作流附加值，但不预设客户一上来就买整个平台。'
- id: A7
  name: 早期站点的扩张附加值
  value: 第二条工作流和分析模块挂上后，成熟站点的经常性价值升到约 $162K-$192K ARR
  unit: USD/site/year
  source: '[BP businessModel.revenueStreams + BP businessModel.expansionLevers + BP product.twentyFourMonth] 到 Y3 后段，验证跑顺的站点可以买第二条获批工作流和预测性异常分析。'
- id: A8
  name: 客户爬坡节奏
  value: M12 到 3 个付费站点，Q4Y2 到 8 个，Q4Y3 到 15 个
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, 24-36 months + Research market.som 15 sites] 只有在 OEM 和伙伴转介绍开始补充创始人亲自打单之后，基准情形才会在第 3 年摸到 SOM。'
- id: A9
  name: 试点转生产周期
  value: 约 90 天
  unit: days
  source: '[BP investorMemo.firstCustomer.initialContract + BP experimentRoadmap 12-18 months] 第一条工作流必须在一个季度内过完 QA 并转生产，收入爬坡才成立。'
- id: A10
  name: 毛利率爬坡
  value: 首批试点月份约 35%，Y2 后段约 65%，到 Q4Y3 为 72%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 72 + BP risks custom-services risk + startup-finance heuristic] 早期部署验证工作很重；等模板和连接器可复用后，毛利才会抬起来。'
- id: A11
  name: 招聘时间线
  value: 起始即配创始人和首位工程师；M3 招工作流/合规；M6 招机器人集成；M9 招首位 GTM；M18 招第二位工程师；M21 招第二位 GTM；M22 招客户成功/运营；M28 招第二位机器人集成
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 只有在共创客户证明跑出来后，扩张型招聘才会进场，再为 Y3 的伙伴带动增长提前备人。'
- id: A12
  name: 创始人全包薪酬
  value: $130.0K
  unit: USD/year
  source: '[BP team Founder / lab automation lead + startup-finance heuristic] pre-seed 阶段为了保跑道，创始人现金薪酬压在市场价以下。'
- id: A13
  name: 工程全包薪酬
  value: $150.0K per FTE
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic for distributed early-stage enterprise software talent] 产品需要资深集成能力，但不必按湾区最陡的薪资曲线来配。'
- id: A14
  name: 工作流 / 合规全包薪酬
  value: $135.0K
  unit: USD/year
  source: '[BP team Workflow / compliance engineer + startup-finance heuristic] 这个岗位同时覆盖验证设计、QA 证据包复用和面向客户的工作流建模。'
- id: A15
  name: 机器人集成 / 解决方案全包薪酬
  value: $145.0K per FTE
  unit: USD/year
  source: '[BP team Robotics integration engineer + startup-finance heuristic] 部署工作横跨 robot API、扫描器和站点系统，但招聘仍以伙伴协同为主，不会过早堆重现场团队。'
- id: A16
  name: GTM / 合作伙伴全包薪酬
  value: $155.0K per FTE
  unit: USD/year
  source: '[BP team Design-partner GTM lead + Research distributionChannels founder-led plus co-sell motion] 薪酬里已包含浮动奖金和企业技术销售所需的差旅。'
- id: A17
  name: 客户成功 / 运营全包薪酬
  value: $95.0K
  unit: USD/year
  source: '[BP operations weekly exception review + startup-finance heuristic] 在更大的服务团队出现前，一位精简的售后运营就要先扛 上线、报表和 QA 复盘协同。'
- id: A18
  name: 薪酬分摊到 P&L 科目
  value: 创始人 45% S&M / 20% R&D / 35% G&A；工程 100% R&D；工作流/合规 70% R&D / 30% G&A；机器人集成 20% S&M / 80% R&D；GTM 100% S&M；客户成功/运营 35% S&M / 65% G&A
  unit: allocation
  source: '[BP team rationales + BP operations] 这样分摊后，创始人主导销售和部署支持的成本才会在各职能开支里真正露出来。'
- id: A19
  name: 非薪资 opex 爬坡
  value: 36 个月里，S&M 约 $4K-$13K/月，R&D 为 $6K-$11K/月，G&A 为 $4K-$7K/月
  unit: USD/month
  source: '[BP operations + Research partnershipEcosystem + startup-finance heuristic] 这里覆盖云资源、合规工具、差旅、法务、保险和伙伴赋能。'
- id: A20
  name: 现金折算约定
  value: 用 EBITDA 近似现金变动
  unit: formula
  source: '[startup-finance heuristic] 在 pre-seed 体量下，税、债务、capex 和营运资金时点差异都视为不重要。'
- id: A21
  name: 月流失率
  value: 1.2%
  unit: percent/month
  source: '[startup-finance heuristic for sticky lab workflow software + BP businessModel.expansionLevers] 一旦工作流写进 标准作业流程，流失应当较低，但不能假设为零。'
- id: A22
  name: CAC 口径
  value: Y1-Y2 的销售与营销开支 ÷ 前 6 个生产站点 = 约 $99K CAC
  unit: USD/site
  source: '[model calc using Y1-Y2 S&M spend + BP gtm.funnelTargets] 这个口径偏保守：既没算后期伙伴效率提升，也只把转成生产的站点算进去。'
- id: A23
  name: 下一轮融资的定价里程碑
  value: 做到 5-8 个付费站点、多个试点转生产、第二条获批工作流上线，并拿到 1 个相邻受监管试点或 LOI
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + Research validationPlan] 这就是 pre-seed 要资助出来的 seed-ready 证明包，模型也按这个目标留了缓冲。'
- id: A24
  name: 相邻市场切入时点
  value: 第一家相邻受监管站点大约会在 Y2 后段 / Y3 前段进入收入结构，并贡献 Y3 里 15 个付费站点中的 2-3 个
  unit: timeline
  source: '[BP milestones 12-24 and 24-36 months + Research executiveTakeaways expansion beyond biotech is required] 要把风投故事立住，在滩头饱和前必须先证明至少一条相邻场景。'
- id: A25
  name: 季度薪资口径
  value: Y2-Y3 的薪资行按季度内真实月度招聘推进计算，而不是只看季末快照
  unit: convention
  source: '[Headcount column convention + BP team.startTiming] 这样薪资曲线才和招聘节奏保持一致。'
- id: A26
  name: customersEop 统计口径
  value: customersEop 同时包含付费试点和生产站点
  unit: convention
  source: '[model reporting convention + BP gtm.pricing] 这样能把切口推进过程看清楚，但在“试点+生产”混合季度里，真正的经常性生产客户数会低于 对外展示的站点数。'
