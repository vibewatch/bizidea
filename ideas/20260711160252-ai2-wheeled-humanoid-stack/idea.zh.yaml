jobsToBeDone:
- job: 当生物科技实验室想把重复的冰箱到实验台或耗材转运自动化时，帮实验室自动化负责人把每一次机器人交接验证清楚，这样他们既能砍掉技术员走路时间，又不会在追溯上开口子。
  currentAlternative: 技术员手工跑腿、只在走廊工作的 AMR，以及硬套在人工作流上的条码记录。
  successMetric: 在机器人参与转运里，既拿到完整审计留痕，又让每批次耗费的技术员时间明显下降的比例。
- job: 当轮式人形机器人遇到路径被堵、标签看不清或抓取失败时，帮 QA 和运营团队把事件回放清楚、把偏差分流到位，这样他们才敢批准更大范围上线。
  currentAlternative: 在机器人日志、聊天线程和 LIMS 记录之间，临时拼凑事故复盘。
  successMetric: 关闭一次机器人相关偏差所需的时间，以及每条经验证工作流的人工介入率。
