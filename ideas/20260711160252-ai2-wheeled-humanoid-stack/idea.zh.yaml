differentiator: 这不是通用机器人机群看板，也不是 LIMS 替代品。公司卡住的是受监管交接这一层：任务模板、扫码证据、偏差分流和房间级权限，最终都要和轮式人形机器人的实际动作对齐。真正的防守来自跨站点积累下来的数据：哪些操作已经被批准、哪些异常反复出现、在为人设计的实验室里什么证据最能过审。这些东西，无论机器人 OEM 还是点状自动化厂商，都很难单独拼出来。
