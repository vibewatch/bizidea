topRisks:
- name: 市场时点
  description: 如果轮式人形机器人在生物科技里一直停在评估阶段，买方推进速度可能会比融资新闻暗示的慢得多。
  mitigation: 先盯住已经批过实验室自动化试点预算的共创客户，并在完全自治还没被证明前，先支持带远程操作兜底的工作流。
- name: 验证负担
  description: 如果证据模型贴不住现有偏差和审计流程，QA 团队可能会抵触机器人参与的交接。
  mitigation: 先从风险更低的工艺开发和 QC 工作流起步，直接交付预制验证材料包，并接入现有的 LIMS 和条码控制，而不是取代它们。
- name: OEM 挤压
  description: 人形机器人厂商可能会把基础工作流工具直接打包进自己的部署栈。
  mitigation: 坚持厂商中立，在跨站点、跨机器人类型的合规与异常层上做深，并把实验室系统接得比 OEM 看板更深。
