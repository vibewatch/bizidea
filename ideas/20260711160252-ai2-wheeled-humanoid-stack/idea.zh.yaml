problem: 生物科技实验室里，冰箱、推车、传递窗和实验台之间有大量重复的物料搬运，但这些交接今天仍靠技术员、手工记录，或一碰就碎的点状自动化。AMR 可以在走廊里搬东西，可一到真正有价值、也最受监管的人造触点，流程往往又得交回给人。轮式人形机器人一旦进入这类环境，部署真正卡住的就不再是“能不能走到那”，而是每一次机器人参与的交接，能不能在现有实验室流程里做到可追溯、可兜底、也经得起审计。
targetUser:
  primary: 北美生物科技园区里实验室自动化或技术运营负责人——公司通常有 2-10 个工艺开发和 QC 实验室，反复跑冰箱到实验台、耗材补货和跨房间物料转运。
  secondary: QA 和合规负责人——他们要给所有机器人参与的交接签偏差和审计留痕。
  buyer: 生物科技公司或 CDMO 的技术运营副总裁、实验室自动化负责人，或站点运营负责人。
startupThesis:
  nonObviousInsight: 轮式人形机器人不必先在人类环境最混乱的地方赢。它们最早能跑通的商业切口，反而是平整地面、流程高度结构化的设施：空间是给人手设计的，治理却靠严密的追溯规则。在这种场景里，真正稀缺的软件不是通用机群管理，而是经验证的交接和异常层——让机器人碰现有设备，也不把合规打穿。
  beachhead: 北美生物科技的工艺开发和 QC 实验室园区：技术员反复在冰箱、推车、传递窗和实验台之间搬样本与耗材，希望试点轮式人形机器人，但又不想改造核心实验设备。
  wedge: 一套机器人交接 OS：预先定义合规的工作流模板，用扫码和视觉校验每一步转运，记录偏差，并在现有实验室房间里为轮式人形任务保留一条可审计的保管链。
  whyNowCatalyst: AI2 的 $735M 融资、对生物科技的明确指向，以及机械上更简单的轮式设计放在一起看，说明存量实验室里的结构化工作流，正从机器人理论题变成真实的部署规划题。
  ventureScalePath: 先从生物科技实验室交接切进去，再往 GMP 支持运营、诊断实验室、医院药房后场等受监管、结构化的设施扩。凡是移动操作要先过审计这一关的地方，都可以复用这层控制面。
solution: Biotech Robot Handoff OS 会卡在实验室的 LIMS / 执行系统和轮式人形机器人机群之间。产品先给出经验证的任务模板，覆盖冰箱取件、推车交接、耗材补货和跨房间转运，并要求每一步都有扫码或视觉确认。机器人如果遇到通道被堵、标签看不清、冰箱没开、抓取不稳等情况，系统不会让流程悄悄失败，而是把任务送进人工异常队列，同时保住完整的审计留痕。运营负责人可以按房间、机器人和任务模板，看人工介入率、周期时长、偏差模式和工作流成熟度。时间一长，公司就会变成存量生物科技设施里，受监管移动操作的合规与效率控制面。
goToMarketSeed:
  firstCustomer: 一家 300-1,500 人的生物科技公司或 CDMO：只有一个北美园区，已有 2-10 个工艺开发与 QC 实验室，LIMS 已上线，也批过预算，准备让轮式人形机器人先跑冰箱到实验台或耗材转运。
  buyingTrigger: 站点批准一个试点：想砍掉技术员走路时间和夜班物料搬运，又不想为此立刻上整套实验室改造或固定自动化项目。
  currentAlternative: 实验室技术员、只会停在推车或门口的 AMR、固定自动化孤岛，以及围着 LIMS 和条码扫描打补丁的定制集成脚本。
  switchingReason: 这个切口保住了可审计的追溯和异常处理，又让轮式人形机器人能直接用现有的人类触点。走廊 AMR 做不到，孤立自动化单元也做不好。
  pricingHypothesis: 按经验证站点收年费，再叠加按已批准工作流或活跃机器人计费。理由很直接：省下人工小时、更快过完试点验证，还能少花定制自动化的钱。
