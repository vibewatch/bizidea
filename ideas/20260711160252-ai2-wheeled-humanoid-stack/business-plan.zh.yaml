slug: biotech-robot-handoff-os
date: '2026-07-11'
executiveSummary: Biotech Robot Handoff OS 抓住的是一个很具体的部署瓶颈：在开放式机器人还不可靠之前，结构化的生物科技实验室已经有条件先用轮式人形机器人或移动操作机器人去跑重复的冰箱到实验台和耗材转运，但 QA 团队仍要求每一次机器人参与的交接都能复核、也经得起审计。首个客户不是全新自动化项目的买家，而是一家 300-1,500 人的生物科技公司或 CDMO：LIMS 已在用，手上有 2-10 个工艺开发或 QC 实验室，也批过预算，要解决技术员走路和夜班物料搬运。MVP 因此应该落成一条已批准工作流上的经验证交接和异常层，而不是通用机器人机群看板、LIMS 替代品，或整套实验室操作系统。这个切口吸引人的地方在于，现有替代方案把问题拆裂了：实验室技术员和定制脚本能保住追溯，但扩不起来；AMR、固定自动化孤岛和 机器人运营平台又补不上冰箱、推车、标签和实验台这些房间级触点的合规闭环。公司只有在三件事都很快证实之后，才有资格往外扩：QA 接受一套标准证据包；单条工作流能跑出完整保管链留痕和人工异常兜底；站点愿意从付费试点转成约 $120k 的年软件支出。市场数据提醒我们别过度兴奋：按研究测算，北美生物科技/CDMO TAM 只有约 $72.0M，所以风投故事能不能成立，取决于后续能不能扩到 GMP 支持运营、诊断和医院药房后场这些同样卡在经验证交接上的场景。最大的反证风险还是时点——生物科技里的轮式人形部署，可能会比软件投资人预期更久地停在评估或 OEM 主导试点阶段。研究也没有确认真实试点数量、站点级预算，或目标触点的真实介入率，所以这个计划把轮次控制在 pre-seed 阶段、路线图保持人工在环，并把前 18 个月的重点放在证伪客户是否真准备好，而不是预设品类拉力已经存在。
problem:
- 工艺开发和 QC 实验室里，重复的冰箱到实验台、耗材补货和跨房间转运，即使站点已经上了 LIMS 和其他自动化工具，今天依然要靠技术员、手工日志和定制脚本顶着。
- 轮式人形机器人或移动操作机器人一旦开始碰冰箱、推车、门和实验台，商业瓶颈就会从运动能力转到可追溯审批、偏差闭环和异常可兜底的交接；而现有 AMR、OEM 云和工作站软件并不能一起把这件事补齐。
solution:
- 在实验室的 LIMS、ELN 或编排栈与机器人 API 之间，部署一层厂商中立的交接 OS：定义已批准工作流、房间级权限、扫码/视觉检查点，以及面向单条低风险转运流程的不可篡改保管链记录。
- 把通道被堵、标签看不清、冰箱关闭、抓取不稳或超出 标准作业流程 的动作，全都送进人工异常队列，并附带签名审计包和介入分析，让站点在不替换既有实验室软件的前提下，把机器人用量逐步放大。
whyWeWin:
- 竞争空白很具体：Benchling、Biosero 和 Thermo 分别占住了实验室编排的一部分，InOrbit、Formant 和 OEM 云占住了机器人遥测的一部分，但没有谁天然站在“受监管实验室里的房间级移动交接验证层”这个位置上。
- 每条获批工作流都会沉淀出可复用的任务模板、房间级权限、经 QA 审过的证据包，以及失败步骤数据；这些东西，单次集成项目或 OEM 看板都很难在跨站点层面复制。
- 第一笔销售绑定的是一个具体试点触发器和既有自动化预算，所以公司可以先在单条工作流上证明显性价值，再去要求买方把更广的实验室运营标准化。
strategicChoices:
  beachhead: 北美生物科技公司和 CDMO：单园区、2-10 个工艺开发或 QC 实验室、已有 LIMS，并且已经批准在平整路线里让一条冰箱到实验台或耗材转运流程试点机器人。
  wedgeRationale: 这个入口比“大而全的实验室自动化平台”更容易快速做出证明，因为流程重复、买方已有试点预算、QA 要求有边界，而且无需改造核心实验设备或替换记录系统，就能在一条已批准的转运路径上衡量成败。
  sequencingRationale: 产品先只做一条经验证工作流、一个 LIMS/ELN 接口，以及一套机器人或机群集成，这样团队能先证明 QA 会买账、试点能转生产，再决定是否扩招或兼容所有机器人类型。GTM 在 2-3 个付费共创客户跑出来之前，都应由创始人亲自打单；只有把证据包、预算负责人和定价逻辑摸清后，公司才该放大 OEM 共销、加相邻工作流，并测试 GMP 支持运营、诊断或医院药房后场。
  notYet:
  - 在工艺开发和 QC 场景还没跑出证明前，不做 GMP 生产执行、面向患者的诊断，或医院工作流。
  - 不做通用 机群管理、完整 LIMS 替代，或大而全的实验室操作系统。
  - 不做复杂实验台布置或湿实验操作；前 24 个月只盯重复转运交接，并保留人工异常兜底。
market:
  tam: $72.0M（研究估算：北美约 600 个符合 ICP 的生物科技/CDMO 园区 × 每站点约 $120k 的年度经验证订阅）
  sam: $18.0M（研究估算：约 150 个已批自动化预算、近期真有机器人试点可能的生物科技/CDMO 站点）
  som: $1.8M（研究中的第 3 年情形：15 个经验证站点 × 单条工作流落地并在站内扩张后，年软件价值约 $120k）
  segments:
  - 拥有 2-10 个工艺开发与 QC 实验室、且反复跑冰箱到实验台或耗材转运流程的生物科技公司园区
  - 在共享实验室房间里执行受监管样本与耗材转运的 CDMO 站点
  buyingProcess: 日常牵头人通常是实验室自动化负责人或技术运营负责人：站点先决定要用机器人试点去砍走路时间或夜班搬运。QA 或合规必须共同签字，只有在付费试点证明了“可叠加的集成方式、完整的审计证据，以及能转成日常使用”的路径之后，合同才最可能由技术运营副总裁或站点运营负责人批准。
product:
  mvp: 先在一个站点支持一条已批准的冰箱到实验台或耗材转运流程：能编排工作流模板、做条码和视觉确认、管房间级权限、接机器人事件、分流人工异常，并在现有 LIMS 和机器人工具之上生成不可篡改的审计包。不做自主任务规划、不做宽泛的工作流库，也不试图替换 机群管理 或实验室信息系统。
  sixMonth: 在 6 个月内完成 2-3 个共创客户试点，上线一个 LIMS/ELN 适配器和一套机器人/机群平台集成，并证明 QA 能用一套标准审计包审第一条工作流。
  twelveMonth: 在 12 个月内补上一条相邻工作流，比如跨房间转运或耗材补货；兼容第二套机器人/机群栈；并围绕介入率、周期时长和偏差关闭，放出分析能力。
  twentyFourMonth: 24 个月内把第一条工作流做成可重复售卖的经验证站点产品，再加上跨站点基准和预测性异常工具，并在 GMP 支持运营或医院药房后场这类相邻受监管环境里测试同一套证据模型。
  keyBets:
  - 早期共创客户愿意把一条低风险工作流单独买成软件，而不是坚持每次都做全定制集成。
  - 当前这代轮式人形机器人或移动操作机器人，可以先在远程操作或人工兜底配合下完成第一批触点，给工作流层争取验证空间。
  - QA 团队会接受一套面向低风险工艺开发与 QC 交接的标准证据模型。
  - 一条经验证工作流在同站点内扩到更多房间和相邻转运流程的速度，会快过公司去拿新 logo 的速度。
gtm:
  wedge: 第一份合同就围着一条已批准的冰箱到实验台或耗材转运试点来卖：站点既想砍掉技术员走路和夜班搬运，又不想改造核心设备，更不想把 OEM 看板当系统记录源。
  channels:
  - 由创始人直接卖给实验室自动化负责人、技术运营负责人和站点运营赞助人
  - 与进入生物科技试点账户的轮式人形机器人 OEM、机器人运营平台和集成商共销
  - 从已经参与自动化落地的 LIMS、实验室编排和验证顾问那里拿转介绍
  funnelTargets: 目标漏斗：目标账户→合格试点 20-30%；合格试点→付费试点 50%+；付费试点→年度生产合同 50%+，前提是一条工作流先过 QA、也被日常使用。
  pricing: 先卖付费试点，再转成年经验证站点订阅，定价锚在研究测得的约 $120k ACV；每新增一条获批工作流和后续分析模块再加价。按站点计费，贴合买方现有自动化预算；按工作流加购，则把同园区扩张的空间直接做出来。
businessModel:
  revenueStreams:
  - 首条获批转运流程的付费试点和工作流验证费
  - 年度经验证站点软件订阅
  - 新增获批工作流、房间和相邻合规分析模块的附加收费
  - 等验证数据足够多后，再卖高级的跨站点基准和预测性异常模块
  unitOfValue: 运行已批准机器人交接工作流的经验证站点
  targetGrossMarginPct: 72
  expansionLevers:
  - 在第一个站点里增加更多获批转运工作流
  - 从一个实验室区域扩到同园区的多个房间或楼栋
  - 为同一生物科技公司或 CDMO 网络复制第二站点
  - 把同一套证据模型复用到 GMP 支持运营、诊断和医院药房后场
strategyMap:
  northStarMetric: 在已批准工作流下完成、且具备完整保管链证据、没有未关闭偏差的月度机器人交接次数
  inputMetrics:
  - 付费试点转年度生产的转化率
  - 每一步都拿到完整扫码或视觉确认的交接占比
  - 每条已批准工作流的人工介入率中位数
  - 关闭一次机器人相关偏差的中位时间
  - 每个付费站点上线的额外获批工作流数量
  moatsToBuild:
  - 已批准工作流模板、房间级权限和经 QA 审过的证据包库
  - 把机器人事件、样本身份、设备状态和偏差串起来的跨系统保管链图谱
  - 覆盖冰箱、推车、门、标签和传递窗的介入与失败步骤数据集
  killCriteria:
  - 聚焦发现 9 个月后，付费共创客户签约少于 2 家。
  - 付费共创客户里，能在不做重度定制验证的前提下接受标准审计包的 QA 团队少于 2 家。
  - 第一条获批工作流记录到的完整审计数据不足 95%，或相对基线减少技术员走路/夜班手工转运不足 25%。
  - 第三个试点之后，超过一半的部署工作量仍是模板无法复用的定制集成或验证。
  - 到第 18 个月，除了生物科技工艺开发和 QC 之外，相邻市场发现仍看不到一条可信扩张路径。
  mermaid: "flowchart LR\n  Wedge[Biotech handoff wedge] --> MVP[Validated workflow MVP]\n  MVP --> Proof[QA-approved pilot proof]\n  Proof --> Expansion[More workflows and regulated adjacencies]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 合规控制切口很有意思，但在付费试点证明预算确实独立、也确实能跳出狭窄的生物科技 SAM 之前，判断强度仍然有限。
    whyBelieve: 研究显示，实验室编排套件和 机器人运营平台之间确实有一块明显空白，而第一条工作流也可以围绕一个非常具体的试点与合规瓶颈来卖。
    whyDoubt: 生物科技场景里的机器人 就绪度 仍没被证明，初始买方池子也很小；整个风投故事还得依赖那些尚未验证的相邻受监管市场。
    nextDiligence: 只有在 2-3 个付费共创客户把 QA 要求、预算负责人，以及向研究锚点约 $120k 站点订阅的转化都跑实之后，才值得真正下判断。
  firstCustomer:
    title: 生物科技工艺开发园区里的实验室自动化负责人
    profile: 一家 300-1,500 人的生物科技公司或 CDMO：单北美园区、2-10 个工艺开发与 QC 实验室、已有 LIMS，并且反复跑冰箱到实验台或耗材转运。
    trigger: 站点批准机器人试点，想砍掉技术员走路时间和夜班物料搬运，但又不想改造核心实验设备。
    buyer: 技术运营副总裁
    initialContract: 先签一个 $40k-$60k 的付费试点，覆盖一条已批准工作流和 QA 证据包；等日常使用获批后，再转成研究锚定的约 $120k 年度经验证站点订阅，并叠加工作流附加模块。
  mustBeTrue:
  - 未来 36 个月内，至少会有 15 个北美生物科技或 CDMO 站点跑出符合 ICP 的、可试点移动操作项目。
  - 早期站点的 QA 团队，会在不要求每次都全定制验证的前提下，接受一套面向低风险工艺开发和 QC 交接的标准证据模型。
  - 一条获批工作流，既能把技术员走路和夜班手工搬运至少砍掉 25%，又能拿到 95%+ 的完整审计记录。
  - 买方会在付费试点之后，直接从现有自动化或站点运营预算里，为约 $120k ACV 的经验证站点合同买单。
  - 在现有厂商或 OEM 把功能差距补平之前，同一套交接与异常模型至少还能打进一个相邻的受监管市场。
  diligenceQuestions:
  - 未来 12-24 个月里，北美到底有多少具名生物科技和 CDMO 园区，已经批了移动操作试点预算？
  - 在机器人参与的交接进入站点 标准作业流程 之前，每个目标站点究竟要求 QA 审什么证据包、走什么审批流？
  - 真实试点里，最常失败的到底是哪一步：条码采集、冰箱开关、推车对接、开门，还是实验台放置？
  - 实验室自动化负责人、技术运营副总裁、站点运营，还是 OEM 主导的试点团队——谁才是第一笔软件预算的真正持有人？
  - Benchling、Biosero、Thermo、InOrbit、Formant 或机器人 OEM，到底有什么理由在 24 个月内做不出“够用”的经验证交接能力？
operatingAssumptions:
- assumption: 未来 24 个月内，北美至少有约 150 个生物科技或 CDMO 站点，已经准备好为经验证机器人交接层做试点。
  basis: research.yaml
  validationTest: 先建一份具名账户清单，再在前 90 天里确认至少 8 个合格机会：有预算、LIMS 已上线，也确实计划做移动操作试点。
  decisionImpact: 如果这个合格池子明显更小或更慢，就要更早切进相邻受监管设施，或把生物科技只当一个细分切口，而不是风投级滩头。
- assumption: QA 团队会接受一套面向低风险工艺开发和 QC 工作流的标准审计包。
  basis: research.yaml
  validationTest: 从 3 个共创客户那里拿审批文件，并让他们书面确认一套模拟证据包足以覆盖一条冰箱到实验台或耗材工作流。
  decisionImpact: 如果不成立，产品就得先走定制验证服务路线，路线图也必须把合规工具优先级提到扩张之上。
- assumption: 买方会接受按经验证站点订阅计费，而不是按机器人数量或集成工时收费。
  basis: idea.yaml
  validationTest: 在 8-10 次发现访谈里测试 3 套价卡，看至少 4 个严肃客户是否愿意接受按站点的试点方案。
  decisionImpact: 如果不成立，在放大销售或扩招前，就要先改成按工作流收费，或围绕 OEM 打包合同重做。
- assumption: 当前这代轮式人形机器人或移动操作机器人，在远程操作或人工兜底配合下，已经能处理最简单的一批目标触点。
  basis: research.yaml
  validationTest: 在 2 个站点跑带 远程操控 辅助的试点，分别测冰箱开关、推车交接、条码采集和房间转运各步骤的人工介入率。
  decisionImpact: 如果不成立，就把工作流收窄到更简单的传递窗或推车到推车任务，或者等硬件进步后再商业化。
- assumption: 同一套证据模型能在 18 个月内扩进 GMP 支持运营、诊断或医院药房后场。
  basis: operator judgment
  validationTest: 针对相邻市场做 10 次发现访谈，并在第 12-18 个月前，拿到至少 1 份来自生物科技工艺开发/QC 之外的共创客户 LOI。
  decisionImpact: 如果不成立，公司就应维持 pre-seed 体量，按细分生物科技软件业务优化，而不是继续讲更大的风投扩张故事。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 在 5-8 个生物科技或 CDMO 目标站点里，先做一轮工作流普查和时间动作基线。
  hypothesis: 至少有一条低风险转运流程，既有足够高的频次，也浪费了足够多的技术员时间，值得单独上软件试点。
  successMetric: 至少 5 个目标站点把同一条冰箱到实验台、耗材转运或跨房间流程认成“重复且值得花预算”的流程。
  owner: 创始人 / 实验室自动化负责人
- horizon: 0-90 天
  experiment: 和 3 位合规或质量负责人一起，设计一套标准 QA 证据包。
  hypothesis: 低风险的机器人交接可以靠一套可复用的审批包来评审，而不是每次都重新定文档。
  successMetric: 3 个目标 QA 团队对同一条试点工作流认可共同的最小证据集。
  owner: 工作流 / 合规工程师
- horizon: 0-90 天
  experiment: 和 8-10 个认真客户做定价与预算负责人发现。
  hypothesis: 在付费试点之后，真正拍板的经济买方会用现有自动化或站点运营预算，为按站点订阅买单。
  successMetric: 在 6 个后期机会里，至少 4 个给出同一个主预算负责人和同一种可接受的定价口径。
  owner: 创始人 / GTM
- horizon: 3-6 个月
  experiment: 接一层 LIMS/ELN 接口，再接一套机器人或机群 API，跑一个带 远程操控 辅助的试点。
  hypothesis: 即便不替换客户的记录系统或机群栈，产品也能把经验证交接层证明出来。
  successMetric: 第一个共创客户能通过产品跑通一条工作流，完整捕获事件并把异常分给人工队列。
  owner: 创始工程师
- horizon: 6-12 个月
  experiment: 在 2 个共创客户现场跑活试点，测审计完整度、走路时间下降幅度和偏差关闭效率。
  hypothesis: 一条已批准工作流可以同时交出合规证明和运营 ROI。
  successMetric: 至少一个试点站点做到 95%+ 的完整审计捕获，并把技术员走路或夜班手工转运相对基线砍掉至少 25%。
  owner: 机器人集成工程师
- horizon: 12-18 个月
  experiment: 把一个试点转成正式生产合同，并在一个相邻受监管环境里测试同一套证据模型。
  hypothesis: 在同站点内扩张，再外溢到一个相邻垂直场景，会比反复教育全新客户更容易。
  successMetric: 到第 18 个月签下 1 份年度生产合同，并拿到 1 个相邻市场的试点或 LOI。
  owner: 创始人 / GTM
operations:
- 为每一类交接建立变更受控的已批准工作流模板库、房间权限和版本说明。
- 把事件采集、审计包生成和不可篡改存储，全部挂回现有 LIMS 或 ELN 记录。
- 试点期间每周和实验室自动化团队、QA 一起复盘异常，给失败步骤分类，并更新贴着 标准作业流程 的 操作手册。
- 围绕一套可重复的工作流包，联动 OEM、机器人运营平台 和验证顾问伙伴；不为每个客户重新定制整套部署。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 可信的事件模型、工作流引擎和首批集成就是技术内核；这些东西没做出来，任何共创客户试点都跑不起来。
- role: 创始人 / 实验室自动化负责人
  startTiming: 第 0 个月
  rationale: 早期销售、工作流选择和合作伙伴可信度，都取决于有没有人能和技术运营、QA 团队一起把第一条 标准作业流程 范围圈清楚。
- role: 工作流 / 合规工程师
  startTiming: 第 2-3 个月
  rationale: 一旦第一个试点落地，Part 11 风格的可审计性、审批流设计和验证包复用，就会立刻变成产品瓶颈。
- role: 机器人集成工程师
  startTiming: 第 4-6 个月
  rationale: 核心产品之后的第二类关键招聘，应该是把机器人 API、扫描器和站点系统之间的部署摩擦压下去，前提是第一批触点已经摸清。
- role: 共创客户 GTM 负责人
  startTiming: 第 6-9 个月
  rationale: 等第一批试点范围确定后，公司就需要一个人专门管 pipeline、盯 OEM/集成商协同，而不是一直把创始人从产品发现里拽走。
milestones:
- horizon: 0-12 个月
  items:
  - 在生物科技和 CDMO 的工艺开发/QC 滩头里，签下 2-3 个付费共创客户。
  - 在 2 个站点里，让 QA 批准一条冰箱到实验台或耗材转运工作流。
  - 在不让定制工作压垮部署的前提下，接上一层 LIMS/ELN 接口和 1-2 套机器人/机群 API。
  - 在已批准工作流上证明：完整审计捕获达到 95%+，技术员走路或夜班手工转运相对基线下降至少 25%。
  - 摸清第一位预算负责人和一套被接受的定价包。
- horizon: 12-24 个月
  items:
  - 把第一批试点转成年度经验证站点订阅，围绕研究测得的约 $120k ACV 立住价格。
  - 增加第二条相邻工作流，以及第二套机器人/机群平台集成。
  - 做到 5-8 个付费站点，同时保持 上线流程 仍以可复用模板和审计包为核心。
  - 在 GMP 支持运营或医院药房后场这类相邻垂直场景，用同一套证据模型跑通一个试点。
- horizon: 24-36 个月
  items:
  - 做到研究测得的第 3 年 SOM：约 15 个经验证站点、约 $1.8M 收入。
  - 上线跨站点基准和预测性异常分析。
  - 判断相邻受监管市场能否把机会做大到支撑更大的风投路径；如果不能，就接受公司仍是一门聚焦的生物科技工作流生意。
risks:
- risk: 生物科技里的轮式人形部署可能仍由 OEM 主导，或整体延后，导致前 18 个月里几乎没有足够多的直签软件机会。
  likelihood: High
  impact: High
  mitigation: 只盯那些已经批过试点预算的站点，支持带 远程操控 的工作流，并通过 OEM 与集成商共销切进已经在动的账户。
- risk: 不同站点的 QA 和验证要求差异过大，产品可能被拖成定制服务。
  likelihood: High
  impact: High
  mitigation: 先从低风险的工艺开发和 QC 工作流起步，尽早交付标准证据包；凡是要求在证明前就做整套定制变更控制的试点，一律不接。
- risk: 冰箱开关、条码采集、推车对接或开门这些动作，需要太多人类介入，导致第一条工作流跑不出清晰 ROI。
  likelihood: High
  impact: High
  mitigation: 先只筛最简单、最重复的路线，把每个失败步骤都打点记清，并从第一天起就把人工兜底纳入已批准工作流。
- risk: 现有编排厂商、机器人运营平台或 OEM 云，可能会把足够多的工作流工具打包进去，抹平切口。
  likelihood: Medium
  impact: Medium
  mitigation: 把差异化压在厂商中立的保管链、经 QA 审过的偏差闭环，以及跨站点基准数据上——这些单一厂商工具很难迅速拼齐。
- risk: 相邻市场扩张路径可能失败，最后只剩一个不够风投级的细分生物科技生意。
  likelihood: Medium
  impact: High
  mitigation: 在第 12-18 个月就测试 GMP 支持、诊断和医院药房需求；在至少有一条相邻路径站住之前，招聘和融资都要克制。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月把经验证交接 MVP 做出来，接上一层 LIMS/ELN 接口和 1-2 套机器人平台，拿下 2-3 个付费共创客户，证明 QA 愿意接受、试点能转生产，并验证相邻受监管市场能否把狭窄的生物科技 SAM 再往外打开。
