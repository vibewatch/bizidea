slug: biotech-robot-handoff-os
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-11] the model begins in the first full month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses the low end of the stated range because hiring stays lean and Q4Y3 reaches modest positive EBITDA.'
- id: A3
  name: Starting paying sites
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] the company starts pre-revenue and must first sign paid design partners.'
- id: A4
  name: Customer definition
  value: One paying site in a paid pilot or production validated-site contract
  unit: definition
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] customers are counted at the paying-site level rather than by robot or by technician seat.'
- id: A5
  name: Paid pilot economics
  value: $50K over roughly 3 months (~$16.7K/mo)
  unit: USD/site
  source: '[BP investorMemo.firstCustomer.initialContract $40K-$60K] the model uses the midpoint for the first approved workflow and QA evidence packet.'
- id: A6
  name: Initial production subscription
  value: $132K ARR (~$11.0K/mo)
  unit: USD/site/year
  source: '[BP gtm.pricing researched roughly $120k ACV + Research market.som $120k modeled ACV] the first production contract lands only slightly above the research anchor to reflect early workflow add-on value without assuming a full platform sale.'
- id: A7
  name: Expansion attach on early sites
  value: Mature recurring value rises to roughly $162K-$192K ARR after a second workflow and analytics attach
  unit: USD/site/year
  source: '[BP businessModel.revenueStreams + BP businessModel.expansionLevers + BP product.twentyFourMonth] late-Y3 sites that prove value can buy a second approved workflow and predictive exception analytics.'
- id: A8
  name: Customer ramp
  value: 3 paying sites by M12, 8 by Q4Y2, and 15 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, 24-36 months + Research market.som 15 sites] the base case reaches the year-3 SOM only after OEM and partner referrals start to supplement founder-led selling.'
- id: A9
  name: Pilot-to-production cycle
  value: Roughly 90 days
  unit: days
  source: '[BP investorMemo.firstCustomer.initialContract + BP experimentRoadmap 12-18 months] the first workflow must clear QA and convert inside one quarter for the revenue ramp to work.'
- id: A10
  name: Gross margin ramp
  value: About 35% in first pilot months, ~65% by late Y2, and 72% by Q4Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 72 + BP risks custom-services risk + startup-finance heuristic] early deployments are validation-heavy before templates and connectors become reusable.'
- id: A11
  name: Hiring timeline
  value: Founder and first engineer at start; workflow/compliance M3; robotics integration M6; first GTM M9; second engineer M18; second GTM M21; customer success/ops M22; second robotics integration M28
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] scale hires arrive only after design-partner proof and before the Y3 partner-led expansion push.'
- id: A12
  name: Founder loaded compensation
  value: $130.0K
  unit: USD/year
  source: '[BP team Founder / lab automation lead + startup-finance heuristic] founder pay is kept below market to preserve runway in a pre-seed robotics-software wedge.'
- id: A13
  name: Engineering loaded compensation
  value: $150.0K per FTE
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic for distributed early-stage enterprise software talent] the product needs senior integration skill but not a fully Bay Area payroll curve.'
- id: A14
  name: Workflow / compliance loaded compensation
  value: $135.0K
  unit: USD/year
  source: '[BP team Workflow / compliance engineer + startup-finance heuristic] this role mixes validation design, QA packet reuse, and customer-facing workflow modeling.'
- id: A15
  name: Robotics integration / solutions loaded compensation
  value: $145.0K per FTE
  unit: USD/year
  source: '[BP team Robotics integration engineer + startup-finance heuristic] deployment work spans robot APIs, scanners, and site systems, but hiring remains partner-assisted rather than field-heavy.'
- id: A16
  name: GTM / partnerships loaded compensation
  value: $155.0K per FTE
  unit: USD/year
  source: '[BP team Design-partner GTM lead + Research distributionChannels founder-led plus co-sell motion] compensation includes variable pay and travel for enterprise technical sales.'
- id: A17
  name: Customer success / ops loaded compensation
  value: $95.0K
  unit: USD/year
  source: '[BP operations weekly exception review + startup-finance heuristic] one lean post-sale operator supports onboarding, reporting, and QA review coordination before a larger services team exists.'
- id: A18
  name: Payroll allocation to P&L lines
  value: Founder 45% S&M / 20% R&D / 35% G&A; engineering 100% R&D; workflow/compliance 70% R&D / 30% G&A; robotics integration 20% S&M / 80% R&D; GTM 100% S&M; customer success/ops 35% S&M / 65% G&A
  unit: allocation
  source: '[BP team rationales + BP operations] this maps headcount cost into functional spend while keeping founder-led selling and deployment support visible.'
- id: A19
  name: Non-payroll opex ramp
  value: S&M roughly $4K-$13K/mo, R&D $6K-$11K/mo, and G&A $4K-$7K/mo over 36 months
  unit: USD/month
  source: '[BP operations + Research partnershipEcosystem + startup-finance heuristic] covers cloud, compliance tooling, travel, legal, insurance, and partner enablement.'
- id: A20
  name: Cash conversion convention
  value: EBITDA approximates cash movement
  unit: formula
  source: '[startup-finance heuristic] taxes, debt, capex, and working-capital timing are assumed immaterial at pre-seed scale.'
- id: A21
  name: Monthly churn
  value: 1.2%
  unit: percent/month
  source: '[startup-finance heuristic for sticky lab workflow software + BP businessModel.expansionLevers] once a workflow is approved inside SOPs, churn should be low but not treated as zero.'
- id: A22
  name: CAC convention
  value: Y1-Y2 sales and marketing spend divided by the first 6 production sites = about $99K CAC
  unit: USD/site
  source: '[model calc using Y1-Y2 S&M spend + BP gtm.funnelTargets] this is conservative because it excludes later partner efficiency gains and counts only converted production sites.'
- id: A23
  name: Next-round milestone for funding sizing
  value: 5-8 paying sites, multiple pilot-to-production conversions, a second approved workflow live, and 1 adjacent-regulated pilot or LOI
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + Research validationPlan] this is the seed-ready proof package the pre-seed is sized to finance with buffer.'
- id: A24
  name: Adjacent-market timing
  value: The first adjacent-regulated site enters the mix around late Y2 / early Y3 and contributes 2-3 of the 15 Y3 paying sites
  unit: timeline
  source: '[BP milestones 12-24 and 24-36 months + Research executiveTakeaways expansion beyond biotech is required] the venture case needs one credible adjacency before the beachhead saturates.'
- id: A25
  name: Quarterly salary convention
  value: Y2-Y3 salary rows use the actual monthly hiring inside each quarter rather than only quarter-end snapshots
  unit: convention
  source: '[Headcount column convention + BP team.startTiming] this keeps the salary line consistent with the hiring ramp.'
- id: A26
  name: customersEop reporting convention
  value: customersEop includes paid pilots and production sites
  unit: convention
  source: '[model reporting convention + BP gtm.pricing] this makes the wedge visible, but recurring-only production count trails the headline site count in mixed pilot quarters.'
