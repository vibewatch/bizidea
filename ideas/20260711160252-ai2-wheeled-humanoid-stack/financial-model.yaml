scenarios:
  downside:
    description: Slower robot readiness and more bespoke validation keep conversions late, attach rates shallow, and adjacent expansion mostly deferred.
    y3RevenueK: 1233.8
    y3EbitdaK: -765.2
    cashLowPointK: -251.9
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 11 instead of 15 because pilot-to-production stretches from roughly 90 days toward 120-150 days and OEM-led pilots convert more slowly.
    - Recurring site value stays closer to the researched ~$120K anchor because few sites buy a second workflow or analytics module.
    - Gross margin exits near 68% because compliance and integration work remain more bespoke than the base case assumes.
  base:
    description: Base case converts the first 3 paid design partners, reaches the upper end of the BP 5-8 site milestone by Q4Y2, and finishes Y3 at the researched 15-site SOM.
    y3RevenueK: 1922.5
    y3EbitdaK: -229.6
    cashLowPointK: 418.9
    keyAssumptionChanges:
    - 3 paying design-partner sites are active by M12, 8 paying sites are live by Q4Y2, and the business ends Y3 at 15 paying sites.
    - Initial production sites start near $132K ARR and early sites that add a second workflow or analytics expand toward roughly $162K-$192K recurring value.
    - Gross margin climbs from the mid-30s in the first pilot months to the BP target 72% by Q4Y3 as evidence packets, connectors, and onboarding playbooks become reusable.
  upside:
    description: Partner referrals and cleaner QA packets pull launches forward, so more sites convert and early expansions arrive one to two quarters sooner.
    y3RevenueK: 2242.0
    y3EbitdaK: 44.7
    cashLowPointK: 733.8
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 17 instead of 15 because OEM and integrator referrals pull two site launches forward.
    - Expanded early sites climb toward roughly $190K recurring value because second-workflow attach and analytics adoption happen sooner.
    - Gross margin exits near 74% as reusable evidence packets and connectors reduce deployment effort faster than planned.
sensitivity:
- variable: ARPU
  downsideCase: Recurring site value stays near the researched ~$120K anchor with little add-on attach.
  baseCase: Blended steady-state site value is about $145K with a second-workflow attach on early cohorts.
  upsideCase: Early sites expand toward roughly $160K-plus recurring value sooner than planned.
  y3RevenueImpactK: -260.0
  cashImpactK: -190.0
- variable: CAC
  downsideCase: Founder travel and OEM co-sell friction push first-wave CAC toward $125K.
  baseCase: CAC stays near about $99K on the first 6 production sites.
  upsideCase: Warm partner referrals keep CAC closer to $85K.
  y3RevenueImpactK: 0.0
  cashImpactK: -130.0
- variable: churn
  downsideCase: Monthly churn rises toward 2.0% if one early site fails to renew or expand.
  baseCase: Monthly churn holds at 1.2% once a workflow is embedded in SOPs.
  upsideCase: Monthly churn stays near 0.8% because the validated handoff layer becomes sticky inside QA processes.
  y3RevenueImpactK: -80.0
  cashImpactK: -60.0
- variable: sales cycle
  downsideCase: Pilot-to-production stretches toward 120-150 days because QA review and procurement run long.
  baseCase: The first workflow converts in about 90 days and partner-led launches reuse the same packet.
  upsideCase: Referenceability compresses conversion toward 60-75 days by late Y2.
  y3RevenueImpactK: -430.0
  cashImpactK: -300.0
- variable: gross margin
  downsideCase: Gross margin exits near 68% because deployment effort remains too bespoke.
  baseCase: Gross margin reaches the BP target of 72% by Q4Y3.
  upsideCase: Gross margin reaches about 74% as connectors and evidence packets standardize faster.
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
- variable: hiring pace
  downsideCase: A second robotics integration hire is pulled forward before partner-led reuse really works.
  baseCase: Scale hires follow the BP sequencing and arrive only after design-partner proof.
  upsideCase: One post-sale hire is deferred until after the adjacent-regulated pilot without slowing growth.
  y3RevenueImpactK: 0.0
  cashImpactK: -170.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      NamedSites[Named target sites] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionSites[Production subscriptions]
      ProductionSites --> WorkflowAddOns[Workflow add-ons]
      ProductionSites --> AdjacentSites[Adjacent regulated sites]
      WorkflowAddOns --> Revenue[Revenue]
      AdjacentSites --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue is driven by converting 3 paid design partners, reaching 8 paying sites by Q4Y2, and ending Y3 at 15 sites with modest second-workflow attach on the earliest cohorts.
- checkName: Must go right
  finding: Pilot-to-production must stay near the 90-day target so the model can add partner-led sites before the sales-cycle downside turns cash negative.
- checkName: Model breaks if
  finding: If realized site value stays pinned near the researched $120K anchor and gross margin stalls in the high-60s, the downside case runs out of cash before Y3 proof appears.
- checkName: Next-round proof
  finding: A seed round is justified once 5-8 paying sites are live, several pilots have converted to production, and one adjacent regulated design partner validates expansion beyond the narrow biotech wedge.
sanityChecks:
  ruleOf40: Y3 growth 130.2% + EBITDA margin -11.9% = 118.3% (strong directionally, though still flattered by the small Y2 base).
  burnMultiple: Y2 burn multiple is about 0.7x using roughly $673.4K of EBITDA burn against roughly $908.4K of net new exit ARR; Y3 improves to about 0.2x as Q4 turns positive.
  revenuePerFte: $214K Y3 on 9 ending FTE (within the ~$200-400K vertical SaaS benchmark).
  flags:
  - The biotech and CDMO beachhead is intentionally narrow, so the venture case still depends on adjacent-regulated proof before investors can underwrite a much larger market.
  - The base case assumes some early sites expand above the research TAM anchor of roughly $120K ACV via second-workflow and analytics attach; if expansion stalls, Y3 revenue compresses quickly.
  - customersEop includes paid pilots and production sites, so recurring production count is lower than the headline site count in mixed pilot quarters.
  - Q4Y3 only turns slightly EBITDA positive, so a few slipped deployments or extra validation requirements can move the cash low point materially.
  - Cash is modeled as EBITDA, so enterprise billing milestones, milestone prepayments, or slower collections can shift real runway by a few months.
