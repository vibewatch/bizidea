    - 26
    - 28
  - point: 在共享人类空间里运行动态稳定或移动机器人，相关安全标准仍在演化。
    sourceRefs:
    - 6
    - 10
    - 11
    - 12
competitors:
- name: Benchling Automation
  stage: 成长期
  wedge: 把仪器、自动化系统和科学记录接成一条硬件无关的闭环。
  pricing: 企业定制定价；无公开标价。
  strength: 数据模型和科学记录足迹都很强，且已连接 200+ 仪器。
  weaknessVsUs: 它不是为房间级机器人交接审批、保管链检查点或移动操作机器人偏差闭环而生。
  sourceRefs:
  - 15
  - 16
  - 17
- name: Biosero Green Button Go
  stage: 现有厂商
  wedge: 面向受监管自动化扩展的实验室工作站编排。
  pricing: 企业定制定价；无公开标价。
  strength: 在实验室工作站、调度和受监管环境里有很深的可信度。
  weaknessVsUs: 它盯的是仪器/工作站编排，而不是跨房间、跨既有人类触点的移动机器人交接。
  sourceRefs:
  - 18
  - 19
- name: Thermo Fisher Momentum
  stage: 现有厂商
  wedge: 跨仪器、机器人和数据系统的集中式工作流调度与执行。
  pricing: 企业定制定价；无公开标价。
  strength: 驱动库广、错误处理智能、API 完整，也支持 Part 11。
  weaknessVsUs: 平台更偏向整岛式实验室自动化，而不是存量实验室里、面向移动交接的机器人中立保管链层。
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
- name: InOrbit
  stage: 成长期
  wedge: 跨机器人、人员和基础设施的多车编排。
  pricing: 企业定制定价；无公开标价。
  strength: 在异构机群的调度、协同和事故管理层做得很强。
  weaknessVsUs: 缺少生物科技特有的验证语义、样本上下文和质量工作流打包。
  sourceRefs:
  - 8
- name: Formant
  stage: 成长期
  wedge: 面向物理运营的 AI 驱动事故管理、工单和运营知识沉淀。
  pricing: 企业定制定价；无公开标价。
  strength: 很适合做复杂物理系统里的遥测分诊和机构知识沉淀。
  weaknessVsUs: 它优化的是工业告警和工单流，而不是受监管样本交接和电子记录合规。
  sourceRefs:
  - 9
regulatoryTechnicalConstraints:
- point: 只要机器人参与的交接会写进 FDA 监管记录，就必须满足 Part 11 对电子记录、签名以及相关基础法规控制的要求。
  sourceRefs:
  - 24
  - 25
- point: 如果流程碰到的是非临床质量工作，GLP 和更广义的 GxP 数据完整性要求，就会要求事件历史可归因、可复核、可长期保存，也要能处理偏差。
  sourceRefs:
  - 26
  - 28
- point: 一旦扩到诊断或贴近患者的实验室，除了内部生物科技控制之外，还会再叠加 CLIA 的质量要求。
  sourceRefs:
  - 27
- point: 在共享实验室空间里做移动操作，必须按不断演化的机器人标准完成文档化风险评估、验证和保护措施。
  sourceRefs:
  - 6
  - 10
  - 11
  - 12
- point: 老设备集成仍是硬约束；SiLA 2 这类开放标准能减轻一部分连接器工作，但远远没法把它消掉。
  sourceRefs:
  - 29
  - 40
validationSignals:
- point: Benchling 与 HighRes、Automata、Ginkgo、Celltrio、Opentrons、Hamilton 一起推出硬件无关的自动化层，说明围绕既有实验室栈的厂商中立编排确实有需求。
  sourceRefs:
  - 15
- point: SLAS 2026 的报道，以及 HighRes 的产品方向，都把重点放在编排、AI 和机器人接口上，而不是孤立仪器，这进一步验证了控制面正在形成。
  sourceRefs:
  - 30
  - 31
- point: Diligent 的 Moxi 机群说明，即便完整的人形实验室部署还不常见，移动操作机器人也已经能在受监管的室内环境里积累可观的真实配送数据。
  sourceRefs:
  - 37
- point: AI2 和 Galbot 的融资说明，资本正在把筹码押在结构化环境里的移动操作，而不是开放式消费机器人。
  sourceRefs:
  - 1
  - 4
openQuestions:
- 未来 12-24 个月里，到底有多少北美生物科技或 CDMO 园区，已经批了移动操作机器人或高级 AMR 试点，并可能买这层软件？
- 在机器人参与的交接进入站点 标准作业流程 与偏差流程之前，QA 究竟要审什么证据包？
- 真实试点里，失败最多的触点到底是哪一种——冰箱门、推车对接、条码采集、传递窗，还是实验台放置？
- 创业公司能直接从实验室自动化或站点运营拿到预算，还是第一年仍要依附 OEM 主导的试点项目？
