  sensitivityCases:
  - case: 人形机器人就绪度滞后，买方继续偏向更简单的移动操作机器人或有人监督的机器人
    impact: 这层工作流控制仍然卖得出去，但起步要压在更低风险的转运任务和人工异常闸门上，而不是一上来就讲完全自治的实验室操作。
    sourceRefs:
    - 3
    - 4
    - 6
    - 37
  - case: 现有实验室软件厂商补上更多带机器人感知的工作流功能
    impact: 差异化就必须钉在经验证交接语义、房间级审批和偏差闭环上，而不是泛泛而谈“编排能力”。
    sourceRefs:
    - 15
    - 18
    - 20
    - 31
  - case: 合规团队要求每一次异常和变更都必须由人工审批
    impact: ROI 会被压缩，因为产品会先变成决策支持，再慢慢长成自动化；服务和验证内容的占比也会升高。
    sourceRefs:
    - 19
    - 24
    - 25
    - 28
  validationPlan:
  - priority: high
    question: 哪一两条交接工作流既有足够高的频次，又足够低风险，值得做第一批试点？
    evidenceToGather: 在 5-8 个目标站点上，收集冰箱到实验台、耗材补货和跨房间转运的时间动作研究与异常日志。
  - priority: high
    question: QA 真正需要看见什么证据包，才会把机器人参与的交接写进站点 标准作业流程？
    evidenceToGather: 从 3 个共创客户实验室的 QA/合规负责人那里，拿到审批流程、偏差模板和审计预期。
  - priority: medium
    question: 预算到底来自实验室自动化、站点运营，还是数字实验室转型？
    evidenceToGather: 和 8-10 个已经在评估工作流自动化或移动机器人的 ICP 买方聊定价和预算来源。
  - priority: medium
    question: 当下哪些轮式移动操作机器人，能在 ICP 环境里稳定处理门、标签和冰箱交互？
    evidenceToGather: 和 OEM 伙伴一起跑带 远程操控 辅助的试点，并按任务步骤测人工介入率。
