    - 37
  geographicConsiderations:
  - point: 北美是最干净的第一刀：实验室自动化预算更集中，生命科学自动化的大买家主要是 生物制药，而且这一带付费机构和药品相关站点也足够密。
    sourceRefs:
    - 27
