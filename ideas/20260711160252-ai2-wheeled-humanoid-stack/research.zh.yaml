    - 33
  dataMoats:
  - point: 一套已批准任务模板、房间级权限和已审偏差的资料库，最后会变成创业公司私有的一张地图：在存量实验室环境里，哪些机器人交接既安全、也经得起审计。
    sourceRefs:
    - 19
