  - point: 中国在轮式人形机器人和移动操作机器人供给侧最强，所以它很值得盯供应链和竞争动态；但对一家北美合规控制层公司来说，它并不是最容易起步的 GTM 市场。
    sourceRefs:
    - 1
    - 2
    - 4
  - point: 欧洲可以作为第二波区域，但前提是产品从第一天就把数据完整性打包和风险文档做扎实。
    sourceRefs:
    - 24
