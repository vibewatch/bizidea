  - 34
  tailwinds:
  - point: 轮式和混合式人形/移动操作机器人，越来越被看成结构化环境里最实际的第一步。
    sourceRefs:
    - 1
    - 3
    - 4
  - point: 实验室软件厂商和行业大会都在明显往编排、硬件无关集成和 AI 辅助工作流控制上走。
