  signalStrength:
    score: 4
    rationale: The round size, valuation, and explicit industrial targeting make the category real even if source depth is still limited.
  painIntensity:
    score: 4
    rationale: In regulated labs, every failed handoff creates labor waste plus compliance risk, making workflow control more painful than a normal automation pilot.
  wedgeClarity:
    score: 5
