differentiator: >-
  This is not a generic robot fleet dashboard and not a LIMS replacement. The
  company owns the regulated handoff layer where task templates, scan evidence,
  deviation routing, and room-specific permissions meet a wheeled humanoid's
  actions. Defensibility comes from the cross-site dataset of approved
  manipulations, exception patterns, and compliance evidence for human-built lab
  environments, which neither a robot OEM nor a point automation vendor can
  easily assemble alone.
