jobsToBeDone:
  - job: >-
      When a biotech lab wants to automate repetitive freezer-to-bench or
      consumable-transfer runs, help the lab-automation lead validate each robot
      handoff, so they can cut technician walking time without creating
      traceability gaps.
    currentAlternative: Manual technician runs, hallway AMRs, and barcode logging bolted onto human workflows
    successMetric: Percentage of robot-mediated transfers completed with a complete audit trail and reduced technician time per batch
  - job: >-
      When a wheeled humanoid hits a blocked path, unreadable label, or failed
      grasp, help QA and operations reconstruct the event and route the deviation
      correctly, so they can approve broader rollout with confidence.
    currentAlternative: Ad hoc incident reviews across robot logs, chat threads, and LIMS entries
