topRisks:
  - name: Market timing
    description: Biotech buyers may move slower than funding headlines imply if wheeled-humanoid pilots stay stuck in evaluation mode.
    mitigation: Start with design partners that already budgeted lab-automation pilots and support teleoperation-assisted workflows before full autonomy is proven.
  - name: Validation burden
    description: QA teams may resist robot-mediated handoffs unless the evidence model fits existing deviation and audit processes.
    mitigation: Begin with lower-risk process-development and QC workflows, ship prebuilt validation packets, and integrate with existing LIMS and barcode controls instead of replacing them.
  - name: OEM encroachment
    description: Humanoid vendors may try to bundle basic workflow tooling into their own deployment stack.
    mitigation: Stay vendor-neutral, own the compliance and exception layer across sites and robot types, and integrate more deeply into lab systems than OEM dashboards can.
