scenarios:
  downside:
    description: >-
      一个头盔发布延期，合作伙伴遥测接口接入耗时超预期，第 3 年末仅有 6 个活跃项目，毛利率停滞在 60% 中段。
    y3RevenueK: 760.0
    y3EbitdaK: -901.0
    cashLowPointK: 213.4
    keyAssumptionChanges:
      - 第 2 年和第 3 年净新增项目合计减至第 1 年后仅 4 个，而非 7 个
      - 第 3 年每活跃项目混合年化收入降至 $160K
      - 毛利率停滞在 65%，因为集成仍以定制化为主
  base:
    description: >-
      创始人主导的头盔先行按计划转化，2—3 个集成覆盖大部分需求，第一个相邻可穿戴项目在第 3 年末到来，最终达到 8 个活跃项目。
    y3RevenueK: 1192.5
    y3EbitdaK: -563.13
    cashLowPointK: 636.61
    keyAssumptionChanges:
      - 第 2 年达到 5 个活跃项目，第 3 年末达到 8 个
      - 第 3 年每活跃项目混合年化收入达到 $180K
      - 毛利率在第 3 年 Q3—Q4 提升至 70% 目标
  upside:
    description: >-
      合作伙伴转介和更快的可穿戴扩张将公司带到第 3 年末 10 个活跃项目，团队规模并未大幅增加。
    y3RevenueK: 1536.0
    y3EbitdaK: -293.92
    cashLowPointK: 950.0
    keyAssumptionChanges:
      - 第 2 年末达到 6 个活跃项目，第 3 年末达到 10 个
      - 第 3 年每活跃项目混合年化收入升至 $192K
      - 随着集成更具复用性，毛利率达到 72%
