modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Accounts[Design-freeze target accounts] --> Pilots[Paid helmet pilots]
      Pilots --> Programs[Active production programs]
      Programs --> Revenue[Subscription plus telemetry revenue]
      Revenue --> GrossProfit[Gross profit after support and integration COGS]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: 营收引擎
    finding: >-
      基准情形营收靠将 2 个付费头盔先行转化为 Q4Y3 的 8 个活跃设备项目来驱动，大部分价值来自量产定价和一个相邻可穿戴扩张，而非宽泛的漏斗顶端流量。
  - checkName: 必须做对的事
    finding: >-
      遥测接口和集成复用必须足够快速提升，使毛利率从 45% 的先行模式爬升至第 3 年 70% 的目标。
  - checkName: 模型崩溃条件
    finding: >-
      若先行成交延迟且定制化集成使毛利率停滞在 65% 附近，悲观情形将把第 3 年收入削减至约 $760K，现金低点仅剩约 $213K。
  - checkName: 下一轮融资证明
    finding: >-
      下一轮融资逻辑成立的前提是公司在第 2 年末拥有 5 个活跃项目、可复用的合作伙伴集成，以及头盔切入点可向工业或安全可穿戴拓展的证据。
sanityChecks:
  ruleOf40: 第 3 年增长率 114% + EBITDA 利润率 -47% = 67%
  burnMultiple: 从第 2 年约 2.3 倍改善至第 3 年约 0.9 倍，因为量产项目营收开始吸收固定成本。
  revenuePerFte: >-
    以 Q4Y3 的 8 名 FTE 计算，第 3 年人均收入 $149K（低于 $200K—$400K 的 SaaS 基准，仅在公司持续将定制先行工作转化为可复用集成的前提下可以接受）。
  flags:
    - >-
      第 3 年末只有 8 个活跃项目，营收高度集中，一个 OEM 发布延迟就可能影响整个季度的业绩。
    - >-
      人均收入持续低于成熟 SaaS 基准，因为模型仍承担尚未完全产品化的解决方案、集成和合规开销。
    - >-
      毛利率要到第 3 年末才达到 70% 目标；若前 3 个先行项目中任何一个需要超过商业计划中四个工程周的定制工作，本轮 pre-seed 需要加大规模或提前进行种子轮。
