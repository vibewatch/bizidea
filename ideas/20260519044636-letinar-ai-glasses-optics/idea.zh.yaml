jobsToBeDone:
  - job: AR 头盔项目临近设计冻结时，帮助产品团队针对真实骑行条件调优叠加层，让他们无需再转一轮硬件就能交付清晰体验。
    currentAlternative: 手工固件调优和反复骑行测试
    successMetric: 从最终原型到发布就绪显示配置所需的周数
  - job: 现场测试出现可读性和续航结果参差不齐时，帮助验证团队找到每种环境下正确的渲染预设，让他们有信心批准发布。
    currentAlternative: 电子表格、主观测试员反馈和顾问主导的光学评审
    successMetric: 无需额外现场测试重跑即可批准的固件构建版本占比
