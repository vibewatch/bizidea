  signalStrength:
    score: 4
    rationale: 一家已获融资、有具体量产集成的光学公司，是 AI 眼穿戴瓶颈进入预算项目的可信信号。
  painIntensity:
    score: 4
    rationale: 可读性和续航失效会卡住小型 OEM 的发布时间线，并迫使其进行代价高昂的硬件迭代。
  wedgeClarity:
    score: 5
    rationale: AR 头盔发布前校准和就绪性认证是一个窄而清晰的工作流，有明确的负责人、触发条件和可量化的 ROI。
  defensibility:
    score: 4
    rationale: 公司可积累专有数据集，将光学设置、环境和已交付性能跨多个可穿戴项目关联起来。
  ventureScale:
    score: 4
    rationale: 同一控制层可随市场成熟从 AR 头盔拓展至更广泛的头戴计算品类。
topRisks:
  - name: 初始市场规模偏小
    description: AR 头盔 OEM 是一个狭窄的滩头市场，若采用率长期处于小众水平，可能无法支撑一家独立公司。
    mitigation: 以头盔为切入口，迅速拓展至相邻的安全眼镜和现场服务可穿戴项目——这些品类面临同样的校准难题。
  - name: 固件集成负担
    description: 小型硬件团队若担心新 SDK 会威胁发布节奏或设备稳定性，可能拒绝接入。
    mitigation: 先以轻量日志和预设推荐模式切入，在现有渲染堆栈旁运行，再逐步深入运行时控制。
  - name: 硬件路线图快于产品迭代
    description: 若光学厂商解决可读性和功耗约束的速度超出预期，窄口径的校准工具可能失去紧迫性。
    mitigation: 围绕跨设备现场遥测和发布治理构建产品——即便光学组件持续改进，这两项能力仍有持久价值。
