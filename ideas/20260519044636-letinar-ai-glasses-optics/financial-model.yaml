    baseCase: >-
      Keep hires tied to pilot conversion and integration reuse
    upsideCase: >-
      Delay ops hire until after the next round
    y3RevenueImpactK: 0.0
    cashImpactK: -135.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts[Design-freeze target accounts] --> Pilots[Paid helmet pilots]
      Pilots --> Programs[Active production programs]
      Programs --> Revenue[Subscription plus telemetry revenue]
      Revenue --> GrossProfit[Gross profit after support and integration COGS]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: >-
      Base-case revenue is driven by converting 2 paid helmet pilots into 8 active device programs by Q4Y3, with most
      value coming from production pricing and one adjacent wearable expansion rather than broad top-of-funnel volume.
  - checkName: Must go right
    finding: >-
      Telemetry access and integration reuse must improve fast enough for gross margin to climb from 45% pilot mode to
      the 70% target by Y3.
  - checkName: Model breaks if
    finding: >-
      If pilot closes slip and bespoke integrations keep gross margin near 65%, the downside case cuts Y3 revenue to
      about $760K and leaves only about $213K of cash at the low point.
  - checkName: Next-round proof
    finding: >-
      The next financing story works only if the company exits Y2 with 5 active programs, reusable partner
      integrations, and evidence that the helmet wedge can expand into industrial or safety wearables.
sanityChecks:
  ruleOf40: Y3 growth 114% + EBITDA margin -47% = 67%
  burnMultiple: Improves from about 2.3x in Y2 to about 0.9x in Y3 as production-program revenue starts to absorb fixed costs.
  revenuePerFte: >-
    $149K Y3 using Q4Y3 headcount of 8 FTE (below the $200-400K SaaS benchmark, which is acceptable only if the
    company keeps converting bespoke pilot work into reusable integrations).
  flags:
    - >-
      Revenue is concentrated in only 8 active programs by Q4Y3, so one delayed OEM launch can move an entire quarter
      of results.
    - >-
      Revenue per FTE remains below mature SaaS benchmarks because the model still carries solutions, integration, and
      compliance overhead that has not yet fully productized.
    - >-
      Gross margin reaches the 70% target only late in Y3; if any of the first 3 pilots require more than the business
      plan's four engineering weeks of custom work, this pre-seed would need to be larger or followed by an earlier
      seed round.
