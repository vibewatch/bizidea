scenarios:
  downside:
    description: >-
      One helmet launch slips, partner telemetry access takes longer, and the company adds only 6 active programs by
      Q4Y3 while gross margin stalls in the mid-60s.
    y3RevenueK: 760.0
    y3EbitdaK: -901.0
    cashLowPointK: 213.4
    keyAssumptionChanges:
      - Y2 and Y3 net-new programs slow to 4 total after Y1 instead of 7
      - Y3 blended annualized revenue per active program falls to $160K
      - Gross margin stalls at 65% because integrations stay bespoke
  base:
    description: >-
      Founder-led helmet pilots convert on schedule, 2-3 integrations cover most demand, and the first adjacent
      wearable program arrives late in Y3 to reach 8 active programs.
    y3RevenueK: 1192.5
    y3EbitdaK: -563.13
    cashLowPointK: 636.61
    keyAssumptionChanges:
      - Y2 reaches 5 active programs and Y3 ends at 8
      - Y3 blended annualized revenue per active program reaches $180K
      - Gross margin improves to the 70% target by Q3-Q4Y3
  upside:
    description: >-
      Partner referrals and faster wearable expansion lift the company to 10 active programs by Q4Y3 without adding a
      much larger team.
    y3RevenueK: 1536.0
    y3EbitdaK: -293.92
    cashLowPointK: 950.0
    keyAssumptionChanges:
      - Y2 ends at 6 active programs and Y3 ends at 10
      - Y3 blended annualized revenue per active program rises to $192K
      - Gross margin reaches 72% as integrations become more reusable
