  sensitivityCases:
  - case: Optics vendors materially improve brightness and efficiency faster than expected.
    impact: The product must lean harder into release governance, cross-device analytics, and evidence capture rather than pure calibration recommendations.
    sourceRefs:
    - 2
    - 24
    - 27
    - 31
  - case: AR helmet volumes remain niche through 2028.
    impact: The company will need to expand quickly into industrial, field-service, and safety smart-glasses programs that share similar readability and full-shift constraints.
    sourceRefs:
    - 19
    - 22
    - 25
    - 29
  - case: Generic XR platforms add more QA and deployment tooling.
    impact: Differentiation must rest on cross-optics datasets, faster test workflows, and helmet-specific launch-readiness reports.
    sourceRefs:
    - 11
    - 14
