  validationPlan:
  - priority: high
    question: How many European helmet OEM or integrator programs will hit design freeze in the next 18 months?
    evidenceToGather: Interview 8-10 helmet or HUD teams, distributors, and launch-channel partners.
  - priority: high
    question: What metrics actually decide ship/no-ship for overlay readability and power draw?
    evidenceToGather: Collect current field-test templates, pass/fail thresholds, and examples of rejected firmware builds.
  - priority: medium
    question: Does changing rendering logic trigger additional homologation or safety-review burden?
    evidenceToGather: Obtain test-lab guidance and compliance counsel specific to certified helmet systems.
  - priority: medium
    question: How much integration work will OEMs tolerate before launch?
    evidenceToGather: Scope a pilot SDK with one Snapdragon Spaces or Vuforia-adjacent device stack.
