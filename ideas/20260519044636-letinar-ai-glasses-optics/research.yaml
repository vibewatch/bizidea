openQuestions:
- How many European helmet OEM or integrator programs truly have 2026-2027 commercial launch budgets rather than prototype budgets?
- Will helmet homologation or insurer requirements treat major rendering-profile changes as a compliance event that needs retesting?
- Which optics and runtime vendors will expose enough telemetry for a third-party calibration layer without long custom integrations?
- Can one product support both helmet programs and industrial smart-glasses teams without becoming a generic analytics tool?
