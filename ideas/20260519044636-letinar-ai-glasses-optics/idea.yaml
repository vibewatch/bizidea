differentiator: >-
  Most startups around AI eyewear will either sell optics components or generic XR app tooling. This wedge sits in the
  messy middle between module capability and shipped rider experience, where OEMs currently rely on manual tuning and
  fragmented field tests. By capturing environment-specific readability and battery outcomes across builds, the company
  builds a proprietary calibration dataset that gets more valuable as new optics modules and wearable form factors appear.
