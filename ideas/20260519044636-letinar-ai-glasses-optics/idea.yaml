topRisks:
  - name: Limited initial market
    description: AR helmet OEMs are a narrow beachhead and may not support a standalone company if adoption stays niche.
    mitigation: Use helmets as the entry wedge, then expand quickly into adjacent safety-glasses and field-service wearable programs that share the same calibration problem.
  - name: Firmware integration burden
    description: Small hardware teams may resist adding another SDK if it threatens launch schedules or device stability.
    mitigation: Start with lightweight logging and preset recommendation modes that work alongside existing rendering stacks before moving to deeper runtime control.
  - name: Hardware roadmaps move underneath the product
    description: If optics vendors solve readability and power constraints faster than expected, a narrow calibration tool could lose urgency.
    mitigation: Build the product around cross-device field telemetry and release governance, which remain valuable even as optics components improve.
