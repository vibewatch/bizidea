slug: helmet-vision-calibration-os
date: '2026-05-19'
executiveSummary: >-
  Helmet Vision Calibration OS targets European AR helmet OEMs that are nearing
  2026 pilot or retail launch and still failing readability, visor-tint, or
  battery tests in live riding conditions. The initial product is a device-side
  SDK plus cloud console that logs ride-condition telemetry, recommends
  rendering presets, and generates ship or no-ship release reports without
  requiring a new optics stack. Research supports a real bottleneck and no clear
  direct incumbent; today, buyers stitch together optics-vendor tooling, generic
  XR platforms, consultants, and spreadsheet-heavy field tests. The beachhead is
  intentionally narrow because one helmet program can produce fast proof on
  tuning-cycle time, field-test reruns, and launch approval before the company
  broadens into industrial smart glasses. Bottom-up research suggests an
  estimated $55.0M TAM, $8.1M SAM, and $1.2M year-3 SOM, so the company must
  earn expansion rather than raise on a broad wearables-platform story. The
  first sale should be a paid pilot tied to a design freeze or failed prelaunch
  field test, priced at the device-program level because that is where budgets
  and avoided-respin economics sit. The strongest long-term moat is a
  cross-build dataset linking visor state, environment, optics settings, and
  release outcomes across multiple device stacks. The biggest open question is
  whether enough European helmet programs have real commercial launch budgets in
  the next 18 months and whether third-party telemetry access is open enough for
  low-friction deployment. On current evidence, this is a credible pre-seed
  watch case, not yet a high-conviction meet.
problem:
  - Helmet OEM teams can demo HUD overlays in the lab but still fail daylight readability, visor-tint, motion, and battery tests close to launch.
  - The current workflow is manual firmware retuning, repeated ride tests, and spreadsheet issue tracking, which slows design freeze and increases respin risk.
  - Generic XR runtimes and optics vendors help enable devices but do not give program owners neutral ship or no-ship evidence for one helmet release.
solution:
  - Ship a lightweight SDK that captures display, environment, and power telemetry from field tests and maps those readings to recommended rendering presets by ride condition.
  - Give product, QA, and optical-validation teams a cloud console that compares builds, flags likely readability failures before another prototype spin, and produces release-readiness reports.
  - Start in logging, benchmarking, and preset-recommendation mode so OEMs can adopt the product without handing runtime control to a new vendor late in the launch cycle.
whyWeWin:
  - The company is solving one expensive prelaunch workflow instead of selling another assistant app, generic XR toolchain, or hardware-biased optics stack.
  - The product can fit beside existing firmware and test processes, which lowers switching risk compared with replacing runtime, optics, or QA systems.
  - If early pilots work, the company compounds a proprietary dataset across visor types, environments, optical stacks, and release decisions that neither consultants nor component vendors naturally own.
strategicChoices:
  beachhead: European AR motorcycle helmet OEM and integrator programs entering design freeze, pilot readiness, or first retail launch in 2026-2027.
  wedgeRationale: Helmet programs have a visible launch deadline, a concentrated buyer group, and measurable failure modes such as rerun-heavy field tests and unreadable overlays. That creates faster proof than starting with broad smart-glasses analytics, where buyers, compliance scope, and ROI are less concrete.
  sequencingRationale: Start with shadow-mode telemetry and release reporting before deeper runtime optimization because telemetry access, trust, and ROI proof are the gating risks. Sell the first 2-3 pilots directly to program owners, then add optics-partner and runtime-ecosystem channels only after one lighthouse customer shows shorter tuning cycles and pilot-to-production conversion.
  notYet:
    - Consumer AI glasses before helmet launch-readiness playbooks are repeatable
    - Runtime-level autonomous tuning that changes rendering in production without human approval
    - Support for every optical stack or XR runtime in year one
    - Horizontal analytics for post-launch rider engagement
market:
  tam: Estimated $55.0M TAM based on about 220 global head-worn device programs across AR helmets, industrial smart glasses, safety eyewear, and OEM platforms at roughly $250k annual program spend.
  sam: Estimated $8.1M SAM based on about 45 Europe-first helmet and adjacent industrial wearable programs with outdoor-readability and compliance pressure at roughly $180k annual spend.
  som: Estimated $1.2M year-3 SOM based on 8 active programs at roughly $150k average annual contract value after one to two helmet lighthouse wins and early adjacent expansion.
  segments:
    - European AR helmet OEM and integrator programs with active 2026-2027 launch schedules
    - Adjacent industrial and safety smart-glasses programs that need outdoor readability validation after the helmet wedge is proven
  buyingProcess: The likely champion is the display-software, optical-validation, or QA lead, while the economic buyer is the program owner, VP Product, or GM responsible for launch readiness. Budget is most likely unlocked by a design freeze, pilot-readiness review, or failed field test that makes another manual tuning loop more expensive than a paid calibration pilot.
product:
  mvp: Version 1 should ingest device and ride-test telemetry, compare builds, recommend environment-specific rendering presets, and generate auditable release-readiness reports for one helmet program. It should work in shadow mode first and require minimal firmware changes beyond logging and preset import.
  sixMonth: Support 2 design-partner helmet programs with telemetry capture, build comparison, preset recommendation, ride-condition tagging, and the first release-report workflow.
  twelveMonth: Convert at least 1 helmet pilot to production, add benchmark reporting across builds, and support 2-3 optics or runtime combinations that cover most qualified pipeline opportunities.
  twentyFourMonth: Expand the same calibration and governance layer into industrial or safety smart glasses, add multi-program analytics, and standardize partner-led integrations rather than becoming a custom services shop.
  keyBets:
    - OEMs will accept a logging and recommendation SDK near launch if it avoids deeper runtime replacement.
    - Release-readiness reporting is valuable enough to budget even if optics vendors continue improving core hardware.
    - A narrow set of optics and runtime integrations can cover enough near-term programs to prove a repeatable wedge.
    - Helmet proof points will transfer credibly into industrial and safety wearables with similar outdoor-readability constraints.
gtm:
  wedge: Sell an 8-12 week paid launch-readiness pilot for one helmet program when design freeze or prelaunch field testing exposes readability, battery, or visor-regression issues that the team cannot clear with another manual loop.
  channels:
    - Founder-led direct sales to helmet OEM program owners, VP Product leaders, and validation leads
    - Co-sell with optics and reference-design partners already involved in architecture discussions
    - Integration-led distribution through OpenXR, Snapdragon Spaces, or similar developer ecosystems after the first lighthouse win
  funnelTargets: Design-freeze target accounts→qualified pilot discussions 20-30%, qualified pilot discussions→paid pilots 25-35%, paid pilots→production 50%+, production logos→second program or adjacent-device expansion 40%+ within 12 months
  pricing: Charge a paid pilot of roughly $40k-$80k for one helmet program, then convert to an annual contract priced per active device program at roughly $120k-$200k plus usage-based fees for connected field-test fleets. This matches the research that budgets sit at the program level and ties ROI to avoided field-test reruns, faster launch approval, and fewer prototype respins.
businessModel:
  revenueStreams:
    - Annual software subscription per active helmet or wearable program
    - Paid pilot and deployment fees
    - Usage fees for connected field-test fleets and telemetry volume
    - Premium compliance, benchmark, and multi-program reporting modules
  unitOfValue: Active helmet or wearable program under annual contract, with telemetry usage attached for larger field-test fleets
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more helmet programs within the same OEM or integrator account
    - Expand from launch reporting into benchmark and governance modules
    - Support adjacent industrial and safety smart-glasses programs using the same calibration engine
    - Build partner-led distribution through optics and runtime ecosystems once integrations are reusable
strategyMap:
  northStarMetric: Active device programs in production using release-readiness reports to approve firmware or optical configuration changes
  inputMetrics:
    - Qualified design-freeze conversations per quarter
    - Median days from SDK kickoff to first release-readiness report
    - Percentage of builds approved without repeat field-test reruns
    - Paid pilot to production conversion rate
    - Average annual contract value per active program
    - Number of supported optics and runtime combinations covering the target pipeline
  moatsToBuild:
    - Cross-build dataset linking environment, visor state, display settings, and launch outcomes
    - Release-governance workflow embedded into firmware review and pilot sign-off
    - Reusable integrations with the highest-frequency optics modules and XR runtimes
    - Neutral benchmark layer across hardware vendors rather than a single-stack tool
  killCriteria:
    - Fewer than 2 paid pilots after 15 qualified helmet-program conversations in the first 12 months
    - No pilot shows at least a 25% reduction in tuning-loop time or repeat field-test reruns versus the customer's manual baseline
    - Integration for the first 3 pilots requires custom firmware work that exceeds 4 engineering weeks each
    - No adjacent industrial wearable program enters the qualified pipeline by month 18
  mermaid: |
    flowchart LR
      Wedge[Helmet launch-readiness wedge] --> MVP[Telemetry plus preset recommendation MVP]
      MVP --> Proof[Paid pilots with faster tuning and release proof]
      Proof --> Expansion[Multi-program and industrial wearable expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Clear workflow wedge and real pain, but conviction should stay moderate until the company proves enough launch-budgeted programs and low-friction telemetry access.
    whyBelieve: Research shows real commercialization in AR helmets, a concrete buyer trigger at design freeze, and no obvious incumbent owning prelaunch readability calibration.
    whyDoubt: The beachhead is small, partner-dependent, and vulnerable if OEMs default to manual tuning or optics vendors close the gap faster than expected.
    nextDiligence: Secure 2 paid helmet-program pilots and show one measurable reduction in reruns, tuning time, or prototype respins before underwriting a broader wearables-platform story.
  firstCustomer:
    title: VP Product or program owner at a European AR helmet OEM
    profile: A 30-150 person helmet or HUD integrator team with one commercial helmet program approaching design freeze and repeated outdoor-readability or battery regressions in field tests.
    trigger: A prelaunch field test or design-freeze review shows unreadable overlays, unstable placement, or power draw that would otherwise force another manual tuning cycle.
    buyer: VP Product or general manager at a connected-helmet manufacturer
    initialContract: 8-12 week paid pilot at roughly $40k-$80k for one helmet program, converting to a $120k-$200k annual program subscription plus telemetry usage if the pilot improves agreed launch-readiness metrics and fits the firmware process.
  mustBeTrue:
    - At least 3 of the first 10 target helmet or integrator programs say a 2026-2027 launch issue is urgent enough to fund a paid pilot this year.
    - At least 2 pilots show a 25% or better reduction in tuning-loop time or repeat field-test reruns versus the manual baseline.
    - One lighthouse customer converts to production at or above the target ACV band within 6 months of pilot completion.
    - At least 2 optics or runtime partners provide enough telemetry and integration access for production deployment without custom hardware.
    - By month 18, at least 1 adjacent industrial or safety wearable program enters the pipeline with materially similar workflow needs.
  diligenceQuestions:
    - How many European helmet or HUD programs have true commercial launch budgets in the next 18 months rather than prototype budgets?
    - What exact pass or fail metrics decide ship or no-ship for readability, overlay stability, and battery draw in target accounts?
    - Which optics and runtime vendors will expose telemetry and support third-party calibration workflows without long custom integrations?
    - Does changing rendering presets trigger any additional homologation, insurer review, or compliance burden for certified helmet systems?
    - Will buyers pay for release-readiness reporting alone, or only for a broader optimization stack that is harder to deploy?
operatingAssumptions:
  - assumption: European helmet OEM and integrator programs will fund a separate launch-readiness pilot before waiting for optics vendors or XR runtimes to solve the problem.
    basis: research.yaml
    validationTest: Run 15 target-account interviews and secure at least 2 paid pilots at the target pilot pricing from qualified launch-stage programs.
    decisionImpact: If false, the standalone category is weak and the company should shift toward partner-bundled distribution or abandon the wedge.
  - assumption: A logging and preset-recommendation mode is enough to deliver ROI before the company asks for deeper runtime control.
    basis: idea.yaml
    validationTest: In the first 2 pilots, show at least a 25% reduction in reruns or tuning time using shadow-mode telemetry and human-approved presets.
    decisionImpact: If false, the roadmap requires deeper device control earlier, increasing integration cost and slowing adoption.
  - assumption: A small number of optics and runtime integrations can cover most near-term pipeline opportunities.
    basis: research.yaml
    validationTest: Map the first 20 target programs by optical stack and runtime, then confirm that 2-3 integrations cover at least 60% of qualified demand.
    decisionImpact: If false, the product becomes too services-heavy and the company should narrow the beachhead further or delay fundraising.
  - assumption: Adjacent industrial and safety smart-glasses programs share enough of the readability-validation workflow to support expansion after helmet proof.
    basis: operator judgment
    validationTest: Win at least 5 discovery calls and 1 pilot-design discussion in industrial or safety wearables by month 12-18 using the same core demo and reporting workflow.
    decisionImpact: If false, the company remains trapped in a niche helmet market and should reset team size and capital needs.
  - assumption: Auditability and data-governance controls can satisfy EU privacy and AI-governance concerns without blocking pilots.
    basis: research.yaml
    validationTest: Complete privacy and compliance review with 2 design partners and produce an approved retention, access, and human-approval policy before production rollout.
    decisionImpact: If false, deployment will require a narrower data footprint, slower sales cycles, or a non-EU initial market.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 helmet OEM, integrator, and validation leaders about launch-readiness workflows, pass or fail metrics, and current tuning-loop cost.
    hypothesis: Design freeze and failed field tests create enough urgency to buy a paid pilot in the target segment.
    successMetric: At least 10 qualified opportunities and 2 accounts aligned on buyer, trigger, and pilot scope.
    owner: CEO / founder-sales
  - horizon: 0–90 days
    experiment: Complete telemetry and integration diligence with at least 3 optics or runtime partners tied to target accounts.
    hypothesis: Third-party access is sufficient for a shadow-mode SDK without custom hardware or long firmware projects.
    successMetric: At least 2 partners provide the interfaces and commercial support required for a pilot.
    owner: CEO / partnerships
  - horizon: 0–90 days
    experiment: Prototype the first release-readiness report and build-comparison dashboard with 8-10 target users from product, QA, and optical-validation teams.
    hypothesis: Buyers will pay for auditable ship or no-ship evidence, not just raw telemetry dashboards.
    successMetric: At least 70% of interviewees say the report would change a launch or retest decision.
    owner: Product lead
  - horizon: 90–180 days
    experiment: Launch the first shadow-mode helmet pilot and compare manual tuning cycles against telemetry-guided preset recommendations.
    hypothesis: The product can reduce repeat field-test reruns and shorten tuning cycles before taking runtime control.
    successMetric: At least a 25% reduction in reruns or tuning time versus the customer's baseline across one pilot.
    owner: Founding eng + optics lead
  - horizon: 90–180 days
    experiment: Test pricing and conversion from paid pilot to annual program subscription with the first 2 design partners.
    hypothesis: Program-level pricing is easier to approve than per-seat SaaS because value is tied to launch readiness and avoided respins.
    successMetric: One signed annual conversion at or above $120k ACV and no pricing push toward low-seat commodity software.
    owner: CEO / founder-sales
  - horizon: 180–360 days
    experiment: Reuse the helmet product and report workflow in one industrial or safety smart-glasses design-partner process.
    hypothesis: The same calibration and governance layer can expand without a full product rewrite.
    successMetric: One qualified adjacent pilot with less than 20% net-new engineering work beyond the helmet core.
    owner: Product lead + solutions engineer
operations:
  - Versioned telemetry, preset, and release-report pipeline so every recommendation ties back to build, environment, and approval state
  - Design-partner operating cadence with weekly review of reruns, pass or fail thresholds, and integration blockers
  - Partner-management process for optics vendors, runtime providers, and wearable QA labs that control key interfaces
  - Privacy and retention controls for ride telemetry, video, and tester data in EU deployments
  - Integration playbook that prioritizes the smallest set of optics and runtime combinations covering most qualified demand
team:
  - role: Founder / CEO
    startTiming: Month 0
    rationale: Own discovery, enterprise selling, design-partner management, and partner negotiations while the category is still being defined.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build telemetry ingestion, report generation, core console workflows, and the first integration backbone.
  - role: Optics and embedded integrations lead
    startTiming: Month 0-2
    rationale: Translate optical-stack and firmware constraints into a deployable SDK with minimal customer engineering burden.
  - role: Product and solutions lead
    startTiming: Month 2-4
    rationale: Turn validation-team workflows into repeatable pilot plans, release scorecards, and expansion-ready implementation playbooks.
  - role: Solutions engineer
    startTiming: Month 4-6
    rationale: Reduce deployment time once the first lighthouse pilots sign and productize partner integrations.
  - role: Privacy and compliance advisor
    startTiming: Month 0
    rationale: Address GDPR, AI-governance, and certified-device concerns before they stall pilots or production rollout.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2 paid helmet-program pilots tied to live design-freeze or prelaunch test cycles
      - Ship shadow-mode SDK, build comparison, and the first release-readiness report workflow
      - Secure 2 optics or runtime partners with production-usable telemetry access
      - Convert at least 1 pilot to an annual production contract
  - horizon: 12–24 months
    items:
      - Reach 3-5 active production programs across helmets and the first adjacent wearable accounts
      - Support 2-3 optics or runtime combinations that cover most qualified demand
      - Launch benchmark and governance modules that standardize firmware review and pilot sign-off
      - Prove one repeatable partner-led distribution motion with an optics or runtime ecosystem partner
  - horizon: 24–36 months
    items:
      - Build a multi-program calibration dataset with defensible benchmarks across environments and optical stacks
      - Establish a credible second vertical in industrial or safety smart glasses
      - Expand at least 1 logo into multiple device programs or business units
      - Reassess capital strategy based on ACV durability and adjacency pull rather than top-line prototype demand
risks:
  - risk: The initial helmet beachhead may be too small or too delayed to support venture-style growth.
    likelihood: High
    impact: High
    mitigation: Keep the team lean, price at the program level, and validate adjacent industrial wearables by month 12-18 rather than assuming expansion.
  - risk: OEMs may resist another SDK or telemetry layer close to launch.
    likelihood: High
    impact: High
    mitigation: Start with logging and reporting mode, minimize firmware work, and align pilots to existing test cycles instead of large platform migrations.
  - risk: Optics vendors or generic XR platforms may add enough calibration tooling to compress differentiation.
    likelihood: Medium
    impact: Medium
    mitigation: Focus on neutral cross-stack benchmarking, release governance, and outcome data that hardware-biased vendors do not naturally own.
  - risk: Privacy, AI-governance, or certified-device review may slow EU deployments.
    likelihood: Medium
    impact: High
    mitigation: Make human approval, retention controls, and audit trails explicit from the first pilot and involve compliance review before production.
  - risk: Telemetry access and integration coverage may take longer than planned.
    likelihood: Medium
    impact: High
    mitigation: Prioritize the few optics and runtime combinations covering the most likely lighthouse accounts and avoid broad compatibility claims early.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds a small founding team, the first 2-3 design-partner pilots, initial optics and runtime integrations, privacy and compliance work, and enough proof to decide whether the helmet wedge can expand into adjacent wearables.
