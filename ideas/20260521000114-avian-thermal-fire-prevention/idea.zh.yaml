topRisks:
  - name: 承保方接受度
    description: 如果保险公司和经纪商不能审计底层证据、也看不到赔付率层面的影响，他们可能不愿相信一家初创公司生成的风险报告。
    mitigation: 先从经纪商和 MGA 共创客户做起，开放原始事件与整改轨迹，先把产品定位成决策支持，再逐步推进到核保标准化。
  - name: 传感器碎片化
    description: 工厂里常常混用不同热像仪、维护系统和人工日志，这会让上线过程变乱，也会拖低报告质量。
    mitigation: 首发版本先做一层硬件无关的数据接入层，并把支持范围收窄到滩头垂直里最常见的热监测和 CMMS 集成。
  - name: 双边销售复杂度
    description: 如果过早同时向运营方和保险方卖产品，公司很可能卡在两边预算和两边要求之间。
    mitigation: 先围绕续保痛点拿下运营方预算，等证据包已经进入日常使用，再把经纪商和承保方工作流作为扩展模块加上去。
