    sourceRefs: [2]
differentiator: >-
  大多数热监测厂商卖的是硬件、告警，或泛化的预测性维护分析。这个公司卡住的，是场站必须向经纪商、保险公司、放贷方和董事会解释自己风险状况的那个经济时点。只要继续保持硬件无关，把重心放在核保证据、整改闭环和跨场站基准上，它就能接入现有传感器，同时沉淀一套专有数据，回答什么做法真的能守住可保性、把损失压低。
