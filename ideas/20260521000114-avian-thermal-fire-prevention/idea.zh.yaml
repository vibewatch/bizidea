    sourceRefs: [2]
  - point: 全天候监测越来越值得信任，因为按工厂定制的热基线能砍掉误报，把团队精力集中到真正的风险上。
    signalRefs:
      - 更准的基线降低了告警疲劳
    sourceRefs: [3]
  - point: 同一套可保性工作流能横向扩到多个高危行业，公司不必只困在木制品市场里。
    signalRefs:
