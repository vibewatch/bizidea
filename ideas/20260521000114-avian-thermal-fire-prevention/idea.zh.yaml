problem: >-
  高风险工业工厂做火灾预防，至今还靠按季度热成像巡检、维护表格和人工整理的续保材料。这样一来，锯木厂、托盘回收厂和各类可燃物加工厂根本没法向保险公司证明，发热的电机、轴承、输送带和电气柜一直处在持续控制之下。保险公司一旦收紧核保，这些工厂就会先碰上保费飙升、责任除外甚至失去保障，而它们还没来得及把传感器数据变成“可保性”证明。
targetUser:
  primary: 北美托盘回收商或二次木制品运营商中，负责风险与可靠性的 COO 或主管；公司有 1 到 5 个工厂，且未来 120 天内就要续保
  secondary: 在可燃物场站负责输送带、电机和电气柜的工厂维护经理
  buyer: 面对财产险保费上涨或核保审查加严的中型工业运营商 CFO 或风险负责人
startupThesis:
  nonObviousInsight: >-
    工业热 AI 的第一个杀手级应用，不是再做一块预测性维护仪表盘，而是做一条可保性工作流：把原始热信号和整改动作，变成保险公司和经纪商都能直接拿去用的证明，说明这个场站值得拿到负担得起的保障。变化在于，保险公司撤退的速度已经快过工厂升级基础设施的速度；与此同时，全天候热系统的部署速度和可信度都够高，足以支撑核保决策。
  beachhead: >-
    面向北美托盘回收厂、锯木厂和二次木制品工厂的保险就绪工作流；这些工厂往往粉尘可燃、输送带密集，而且正进入艰难的财产险续保或经纪商再营销周期
  wedge: >-
    一层硬件无关的控制平面，接入热告警、维护工单和现场检查，给高火灾风险设施生成面向保险公司的风险报告、整改时间线和续保证据包
  whyNowCatalyst: >-
    AVIAN 的融资和客户结果已经证明：全天候热数据现在既能快速部署，也能和真实的保险节省挂钩，而这恰好发生在保险公司撤离高风险场站之际。
  ventureScalePath: >-
    先从木材和回收工厂的火灾可保性切入，再扩到化工、油气、海事，以及更广的工业财产风险工作流，例如放贷尽调、停机预防、多重危险合规和承保方基准比较。
solution: >-
  易燃场站可保性 OS 会架在现有热像仪、CMMS 工具和工厂维护日志之上，为每个场站建一份实时更新的火灾风险控制记录。它不只显示热点，还会按核保相关性给事件分级、跟踪每一项风险有没有按时整改，并自动拼出一份持续更新、可直接发给经纪商和保险公司的证据包。产品还会把告警频率、未解决热异常、检查节奏和停机事件拿去和同类工厂对比，让运营方在续保前就看见哪些工厂正变得越来越难保。对保险公司和经纪商来说，同一套系统还能开放受控权限，查看可审计的原始证据，而不是只看静态 PDF 问卷。时间越久，公司越能沉淀出一套最有价值的数据：在可燃工业环境里，到底哪些运营控制真能把火灾损失压下来，并把保障守住。
goToMarketSeed:
  firstCustomer: 拥有 2 到 10 个场站的北美托盘回收商和二次木制品运营商；近期收到保险公司损失控制建议，而且至少有一条输送带供料产线已经出现过发热或火灾担忧
  buyingTrigger: 续保通知、保费冲击、责任除外威胁，或经纪商在出单前要求更强的持续火灾风险控制证明
  currentAlternative: 按季度出报告的热成像承包商、人工维护日志、经纪商问卷、现场检查资料夹，以及泛化的预测性维护仪表盘
  switchingReason: >-
    这个切口把工厂本来就会采集的热数据和维护数据，直接变成保险公司看得懂的控制叙事；客户不用等整厂改造，也能先把保障守住、把保费压下来。
  pricingHypothesis: 按场站收取年度订阅费，另加可选的保险报告模块，以及传感器与 CMMS 集成的上线费用
