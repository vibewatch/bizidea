jobsToBeDone:
  - job: 临近财产险续保时，帮可燃物工厂证明火灾风险在被持续监测并及时整改，好让它在可以接受的条款下把保障续上。
    currentAlternative: 人工问卷、热成像报告，以及经纪商主导的叙事式材料整理
    successMetric: 续保时的保费变化和保障保留情况
  - job: 当输送带、电机或电气柜反复出现热点时，帮维护和风险团队证明问题处理得足够快、也足够彻底，能经得起核保复核，从而避免下次现场检查后被加上责任除外。
    currentAlternative: 分散的告警系统、工单和邮件线程，拼不出一条能给保险公司看的审计链
    successMetric: 与核保相关的热事件完成整改闭环所需时间
