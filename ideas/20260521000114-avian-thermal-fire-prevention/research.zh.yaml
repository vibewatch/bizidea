categoryDynamics:
  growthRate: Aon Q2 2026 市场报告给出的美国财产险平均费率变化为 -17.88%
  growthRateSourceRefs:
    - 22
  tailwinds:
    - point: 持续热监测已经有可引用的 ROI，包括避免停机、抓到预测性维护问题，以及保险成本下降。
      sourceRefs:
        - 2
        - 3
        - 8
    - point: 即便整体财产险更有竞争，高风险买家在核保上仍然会被更严格筛选。
      sourceRefs:
        - 25
        - 26
        - 27
    - point: 固定热像仪、远程仪表盘和可接 PLC 的输出早已商业化，降低了聚焦工作流的新进入者的部署摩擦。
      sourceRefs:
        - 5
        - 13
        - 33
  headwinds:
    - point: 保护条件更好的被保险人正在拿到更软的价格和更多容量；如果一个场站还没真正感受到续保压力，紧迫感就会下降。
      sourceRefs:
        - 22
        - 23
        - 24
    - point: 现有相机厂商和打包式监测提供商，可以把硬件、分析和服务塞进同一张采购单里。
      sourceRefs:
        - 5
        - 31
        - 35
    - point: 监测无法替代规范要求的防护，因此价值捕获取决于产品能否嵌进更大的风险改善项目。
      sourceRefs:
        - 17
        - 18
        - 19
competitors:
  - name: AVIAN
    stage: scale-up
    wedge: 面向高风险工业场站的全天候热监测，打包提供相机、告警与支持。
    pricing: 定制订阅；对外宣传不到 6 个月回本，并提供 12 个月满意度保障。
    strength: 它是最接近目标痛点的现成证明点，有木材行业真实案例、保险节省证据和快速部署话术。
    weaknessVsUs: 仍然和自家监测栈绑定；创业公司可以靠硬件无关的保险工作流、整改闭环逻辑和经纪商证据包打出差异。
    sourceRefs:
      - 1
      - 5
      - 8
  - name: Teledyne FLIR
    stage: incumbent
    wedge: 面向木材加工及其他工业高危场景的固定热像仪和早期火灾检测系统。
    pricing: 以硬件为核心，通过产品或伙伴销售按报价成交。
    strength: 品牌可信、硬件耐用、产品线宽，而且已经深度切入状态监测与火灾预防应用。
    weaknessVsUs: 相机优先的定位，使工作流、核保叙事和整改证明仍大多留给客户或集成商自己拼。
    sourceRefs:
      - 31
      - 32
      - 33
      - 34
  - name: Opticom Technologies
    stage: scale-up
    wedge: 专门为锯木厂火灾监测设计的 AI 双传感器热像仪。
    pricing: 按硬件部署做定制报价。
    strength: 木材行业定位清晰、硬件耐用、锯木厂叙事直接。
    weaknessVsUs: 本质上还是设备加告警销售，看不到它在续保文档、承保方基准或跨系统证据管理上的控制力。
    sourceRefs:
      - 35
  - name: Viper Imaging
    stage: scale-up
    wedge: 使用 FLIR 相机加 ViperVision 软件，为木材加工场站提供早期火灾检测系统。
    pricing: 提供 HaaS、租赁、购买和短租多种方式。
    strength: 集成商式灵活度高，采购方式也更贴近想要一站式部署的工业买家。
    weaknessVsUs: 重点仍是系统部署和告警处理，而不是一套硬件无关的续保与整改记录层。
    sourceRefs:
      - 36
  - name: Augury
    stage: scale-up
    wedge: 面向工业资产预测性维护的订阅式机器健康平台。
    pricing: 定制报价；订阅模型，并宣称不到 6 个月回本。
    strength: 机器健康叙事强、工业可信度高，也已经替订阅式可靠性软件把预算教育做了一部分。
    weaknessVsUs: 它服务的是更宽的预测性维护，而不是火灾可保性工作流、经纪协作或财产险续保证据。
    sourceRefs:
      - 37
      - 38
regulatoryTechnicalConstraints:
  - point: OSHA 关于可燃粉尘的指导，把运营方指向锯木厂、通风、消防、防爆区域和 General Duty Clause，而不是某一个软件控制点。
    sourceRefs:
      - 14
      - 15
  - point: FM 的木材加工与可燃粉尘数据表说明，粉尘处理、现场整洁以及爆炸 / 火灾防护，始终是场站必须承担的核心义务。
    sourceRefs:
      - 17
      - 18
  - point: 在 IFC 和 NFPA 13 逻辑下，闲置木托盘存储被视为特殊火灾风险，所以存储布局和喷淋设计依然会实质影响可保性。
    sourceRefs:
      - 19
      - 40
  - point: 如果产品要接停机动作，停机逻辑和复机纪律应该由现场 PLC 掌握，而不是让热系统自主行动。
    sourceRefs:
      - 13
validationSignals:
  - point: AVIAN 自己的市场进展就说明拉力真实存在——大约 50 个已部署场站、9 个国家，以及超过 $50M 的已避免损失。
    sourceRefs:
      - 1
      - 2
  - point: Kamps Pallet 报告里的 10% 保险成本下降，是极少见的直接证据，说明热控制确实能影响续保经济性。
    sourceRefs:
      - 2
  - point: Sierra Pacific、Chinook 和 Rosenbaum 的案例说明，运营方看重这套系统，不只是因为能防大火，也因为它能提前抓维护问题。
    sourceRefs:
      - 8
      - 9
      - 10
  - point: 多家现有厂商都在直接面向木材和托盘场景卖火灾预防方案，这说明预算科目已经存在，买方教育曲线也不陌生。
    sourceRefs:
      - 31
      - 35
      - 36
  - point: 大型托盘设施火灾依旧需要极端应急响应，这进一步放大了继续依赖人工或被动控制的代价。
    sourceRefs:
      - 19
      - 39
openQuestions:
  - 保险公司会接受由创业公司构建的证据包作为核保支持吗，还是必须先看到具名经纪商、工程方或 OEM 伙伴背书，才愿意给出实质信用？
  - 当场站已经拥有相机、但仍需要集成和经纪支持时，纯软件证据层到底能卖到多高的年合同价值？
  - 续保结果里，到底有多少来自软件证据，又有多少来自喷淋、除尘和托盘堆放调整等物理改造？
  - "哪条初始 GTM 路径会最快赢：叠在已安装热像仪之上、和精选 OEM 打包，还是通过经纪商切进续保周期？"
