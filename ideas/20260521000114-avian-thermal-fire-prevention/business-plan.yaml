slug: combustible-site-insurability-os
date: '2026-05-21'
executiveSummary: >-
  Combustible Site Insurability OS sells into a narrow but urgent workflow:
  keeping high-risk wood and pallet facilities insurable when carriers, brokers,
  and loss-control teams demand better proof of fire-risk control. The first
  customer is a North American pallet recycler, sawmill, or secondary wood
  products operator with 2 to 10 sites, existing conveyor-heavy operations, and
  a property renewal or remarketing cycle inside roughly 120 days. The product
  is a hardware-agnostic software layer that turns thermal events, maintenance
  actions, and site inspections into an auditable evidence pack for brokers and
  carriers instead of another generic predictive-maintenance dashboard. This
  wedge is attractive because buyers already spend on thermography, thermal
  cameras, maintenance systems, and broker submissions, but they still lack a
  system of record for proving continuous control and remediation closure. The
  near-term plan is to win operator budgets first, then expand into broker,
  MGA, and carrier-facing modules once renewal evidence is part of the daily
  workflow. Evidence from the research supports the pain, deployment timing, and
  willingness to pay, but two assumptions still need proof: carriers must accept
  startup-generated evidence as decision support, and software-only overlays must
  price well even in mixed hardware environments. Market sizing in the research
  is estimate-based and modest on the initial beachhead, so expansion into
  recycling, biomass, and other hazardous property workflows is necessary for
  venture-scale upside. This is investable if early pilots show measurable
  renewal improvement, broker pull-through, and pilot-to-production conversion
  before the company broadens scope.
problem:
  - Sites still rely on quarterly thermography walks, spreadsheets, and broker questionnaires that cannot prove continuous fire-risk control to carriers.
  - Renewal pressure is acute for pallet, sawmill, and secondary wood operators because a premium spike, exclusion, or loss of coverage can occur before the plant completes physical upgrades.
  - Existing thermal vendors detect heat, but they usually do not create an auditable record of acknowledgement, remediation speed, and insurer-facing evidence across mixed systems.
solution:
  - The product ingests thermal alerts, maintenance tickets, and inspection records into a per-site control ledger that classifies events by underwriting relevance.
  - It generates broker- and carrier-ready evidence packs showing anomaly history, remediation closure, overdue actions, and site-level control trends before renewal.
  - It benchmarks monitored sites against comparable facilities so operators can prioritize the plants most likely to become hard to insure.
whyWeWin:
  - Hardware-agnostic positioning lets the company sit above installed cameras, CMMS tools, and manual logs rather than forcing a rip-and-replace deployment.
  - The wedge targets the economic moment when a CFO or risk leader needs renewal evidence, which is more urgent than buying another reliability dashboard.
  - The defensible asset is a cross-site dataset linking thermal anomaly types, remediation behavior, and renewal outcomes in combustible industrial environments.
strategicChoices:
  beachhead: North American pallet recyclers, secondary wood-products operators, and sawmills with 2 to 10 sites, conveyor-heavy processes, and a property renewal or broker remarketing event inside the next 3 to 4 months.
  wedgeRationale: >-
    This slice has visible fire exposure, existing thermal and maintenance data,
    and a near-term budget trigger tied to renewal outcomes. It should produce
    proof faster than a broader industrial launch because the buyer, trigger,
    and success metric are all concrete: keep coverage, reduce exclusions, or
    improve premium terms at the next renewal.
  sequencingRationale: >-
    The company should first ship a software overlay that works with installed
    hardware, because renewal urgency favors rapid deployment over a bundled
    hardware sale. After the workflow is used daily by plant and risk teams, the
    company can add broker collaboration, benchmark reports, and partner-led
    insurer distribution; hiring follows the same logic, with product and
    integration talent first and insurance partnerships later.
  notYet:
    - Chemical processing and oil and gas sites before renewal proof is repeatable in wood and pallet workflows
    - Full bundled camera hardware sales as a primary motion
    - Autonomous shutdown control beyond PLC-integrated warning and escalation support
    - Generic predictive-maintenance use cases that are not tied to insurability or renewal outcomes
market:
  tam: $141.0M
  sam: $27.0M
  som: $1.5M
  segments:
    - North American pallet recyclers and secondary wood-products operators under renewal pressure
    - Sawmills and adjacent combustible-material processors with existing thermal monitoring estates
  buyingProcess: >-
    The sale typically starts when a broker, carrier, or internal finance leader
    flags renewal risk and asks the plant to show stronger continuous fire-risk
    controls. The operational champion is usually maintenance or reliability,
    but the budget closes with the CFO, COO, or head of risk once the product is
    tied to a renewal submission, insurer recommendation, or premium-risk event.
product:
  mvp: >-
    MVP is a read-heavy software overlay for 1 to 2 existing thermal systems and
    one CMMS or ticketing source, plus a manual fallback input for inspections
    and remediation notes. It must produce a credible evidence pack, event
    timeline, and renewal dashboard without requiring deep control-system changes.
  sixMonth: Launch site ledger, insurer-facing evidence pack, broker review workflow, and connectors for the narrowest supported thermal and CMMS stack used in design-partner accounts.
  twelveMonth: Add cross-site benchmarking, remediation SLA analytics, broker multi-account views, and implementation playbooks that shorten deployment to less than 30 days on supported stacks.
  twentyFourMonth: Expand into recycling and biomass adjacencies, add structured carrier and MGA reporting modules, and build underwriting-grade benchmarks tied to renewal outcomes and loss-control recommendations.
  keyBets:
    - Carriers and brokers will treat live evidence packs as useful decision support before they require a fully standardized underwriting workflow.
    - Enough target sites already have usable thermal coverage that software-first deployment wins faster than bundled hardware resale.
    - Cross-site benchmark data will become more valuable than raw anomaly detection and support expansion into adjacent hazardous-property workflows.
gtm:
  wedge: Sell a renewal-readiness overlay that turns installed thermal and maintenance data into carrier-ready proof for combustible sites facing premium shock, exclusion risk, or broker remarketing.
  channels:
    - Direct sales to operators entering renewal or loss-control remediation cycles
    - Referral and co-sell partnerships with industrial insurance brokers, MGAs, and property-loss engineers
    - Channel partnerships with thermal OEMs and integrators that need a workflow layer above installed cameras
  funnelTargets: "Lead→qualified renewal account 20–30%, qualified account→paid pilot 35–50%, pilot→production 60%+, production→multi-site expansion 40%+ in 12 months"
  pricing: >-
    Annual per-site subscription with onboarding and integration fees is the
    cleanest fit because the buyer budgets around a site renewal and wants fast
    proof without capex approval. Initial pricing should target roughly $30k to
    $45k per site for software and reporting on supported integrations, with
    broker or carrier reporting modules sold as add-ons after production use.
businessModel:
  revenueStreams:
    - Annual per-site subscription for monitored renewal workflow
    - One-time onboarding and integration fees for thermal and CMMS connections
    - Premium broker, MGA, or carrier reporting modules
    - Multi-site benchmarking and portfolio analytics for larger operators or channel partners
  unitOfValue: Monitored site under an active insurer-ready fire-control workflow
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from single-site pilot to portfolio-wide rollout across 2 to 10 site operators
    - Add broker-facing portfolio views once operator evidence packs are in production
    - Extend the same control ledger into recycling, biomass, and other combustible-property verticals
    - Layer benchmark and renewal-outcome analytics on top of the installed workflow base
strategyMap:
  northStarMetric: Monitored sites that renew coverage without new fire exclusions or adverse underwriting actions
  inputMetrics:
    - Time from thermal anomaly to documented acknowledgement
    - Share of underwriting-relevant events closed within target SLA
    - Paid pilots started from renewal-qualified accounts
    - Pilot accounts converting to annual production contracts
    - Multi-site expansion rate within existing operator accounts
  moatsToBuild:
    - Cross-hardware event and remediation dataset tied to renewal outcomes
    - Broker and MGA workflow adoption that makes the evidence pack part of the renewal process
    - Benchmark models that show how control behavior varies across comparable combustible facilities
  killCriteria:
    - Fewer than 2 of the first 8 pilots produce a broker-validated renewal benefit or clear underwriting-process acceleration within 12 months
    - More than 50% of qualified prospects require bundled hardware replacement for deployment, breaking the software-first thesis
    - Pilot-to-production conversion stays below 30% after two renewal cycles on supported integrations
  mermaid: |
    flowchart LR
      Wedge[Beachhead renewal wedge] --> MVP[Evidence-pack MVP]
      MVP --> Proof[Broker and renewal proof points]
      Proof --> Expansion[Multi-site and adjacent-vertical expansion]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong wedge and real pain, but conviction depends on proving carrier acceptance and software-only deployment economics within the first pilot cohort.
    whyBelieve: Comparable market evidence shows buyers already pay to prevent fire loss, improve uptime, and defend property coverage, while no incumbent clearly owns the insurer-facing workflow layer.
    whyDoubt: The initial beachhead is not huge on its own, and the company can fail if brokers and carriers view the product as helpful reporting rather than underwriting-relevant infrastructure.
    nextDiligence: Secure 5 to 10 design-partner accounts and show that at least several produce broker-validated renewal improvement or materially faster underwriting review.
  firstCustomer:
    title: Multi-site pallet recycler or secondary wood-products operator under renewal scrutiny
    profile: A 2 to 10 site North American operator with conveyor-fed lines, combustible dust exposure, at least one recent heat or fire concern, and an upcoming property renewal.
    trigger: A broker or carrier requests stronger evidence of continuous fire-risk control before binding or renewing coverage.
    buyer: CFO, COO, or head of risk
    initialContract: Paid pilot at 1 site with onboarding plus annualized software value equivalent to roughly $25k to $50k, converting to a 2 to 5 site rollout if the next renewal or broker submission improves.
  mustBeTrue:
    - At least half of qualified beachhead sites already have usable thermal hardware or can add it without a long capex cycle.
    - Brokers and carriers value documented remediation closure enough to discuss it in renewal review or loss-control follow-up.
    - A software overlay can show payback through renewal protection, insurer responsiveness, or downtime avoidance at $30k to $45k per site pricing.
    - Plant teams will consistently maintain the event and remediation workflow instead of reverting to spreadsheets and email during busy periods.
    - The company can expand from wood and pallet workflows into adjacent hazardous-property verticals without rebuilding the product from scratch.
  diligenceQuestions:
    - Which exact evidence artifacts change broker or carrier behavior during a difficult renewal?
    - How many target sites already run thermal cameras, and which camera plus CMMS combinations dominate the beachhead?
    - What portion of renewal improvement comes from software evidence versus physical upgrades such as sprinklers, dust collection, or storage-layout changes?
    - How defensible is the broker channel if thermal OEMs decide to add a similar reporting layer?
    - What pilot structure best predicts multi-site rollout instead of one-off compliance spending?
operatingAssumptions:
  - assumption: A software-first overlay can be deployed in less than 30 days on supported camera and CMMS stacks.
    basis: research.yaml
    validationTest: Time the first 5 design-partner implementations from contract to first usable evidence pack and require at least 4 to go live within 30 days.
    decisionImpact: If false, the GTM must shift toward narrower supported stacks, higher onboarding fees, or OEM-led bundles.
  - assumption: Brokers will actively champion the evidence pack if it reduces manual renewal narrative work.
    basis: operator judgment
    validationTest: Run structured reviews with 10 brokers or MGAs and require at least 6 to request the pack for live accounts or agree to co-sell pilots.
    decisionImpact: If false, the company should keep brokers as advisors and sell directly to operators on downtime and loss-control workflow value.
  - assumption: Buyers will pay software-level pricing even when insurer savings are uncertain, as long as coverage retention and downtime avoidance are credible.
    basis: research.yaml
    validationTest: Close at least 3 paid pilots above $20k annualized software value before offering discounted multi-site bundles.
    decisionImpact: If false, pricing and packaging must move downmarket or include more services, which lowers margin and funding efficiency.
  - assumption: Renewal outcome data can be captured cleanly enough to build a benchmark moat within the first 24 months.
    basis: operator judgment
    validationTest: Track renewal result, exclusions, engineering recommendations, and remediation history across the first 25 accounts with at least 80% field completeness.
    decisionImpact: If false, the moat shifts from outcome benchmarking to workflow integration, making the business more vulnerable to incumbent copying.
  - assumption: Wood and pallet accounts provide enough repeatability to prove the product before expansion into recycling and biomass.
    basis: idea.yaml
    validationTest: Achieve at least 60% pilot-to-production conversion across the first 10 wood and pallet pilots before opening a second vertical.
    decisionImpact: If false, the company should revisit ICP selection before spending on adjacent-vertical expansion.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Recruit 5 design-partner operators with renewals inside 120 days.
    hypothesis: Renewal-timed accounts will accept paid or strongly committed pilots faster than generic reliability buyers.
    successMetric: 5 signed design partners, with at least 3 paid pilots and all 5 having a named renewal or loss-control deadline.
    owner: CEO
  - horizon: 0–90 days
    experiment: Build connectors for the top 2 thermal stacks and 1 CMMS used by design partners.
    hypothesis: Narrow connector depth will cut deployment time enough to preserve the software-first thesis.
    successMetric: 4 of first 5 accounts live with automated data ingest in less than 30 days.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run broker evidence-pack reviews on live pilot accounts.
    hypothesis: Brokers will request a standard set of evidence artifacts that can become the default renewal template.
    successMetric: At least 6 broker reviewers identify the pack as materially useful and 3 introduce additional target accounts.
    owner: CEO
  - horizon: 90–180 days
    experiment: Test pricing across software-only, software plus onboarding, and portfolio bundles.
    hypothesis: Buyers will accept per-site annual pricing when linked to renewal deadlines and measurable remediation workflow value.
    successMetric: 3 production contracts signed at $30k+ per site equivalent gross value on supported accounts.
    owner: Revenue lead
  - horizon: 180–365 days
    experiment: Launch multi-site benchmark dashboard for early production customers.
    hypothesis: Portfolio benchmarking will drive second-site and third-site expansion faster than standalone renewal reporting.
    successMetric: 40% of production accounts expand to at least one additional site within 12 months.
    owner: Product lead
  - horizon: 180–365 days
    experiment: Pilot a broker or MGA partner module with portfolio reporting.
    hypothesis: Channel partners will generate lower-cost pipeline once operator-side workflow adoption is proven.
    successMetric: 2 active channel partners generate 20% or more of qualified pipeline without reducing win rate.
    owner: CEO
operations:
  - Standardize site onboarding around asset map, camera inventory, renewal calendar, broker contacts, and loss-control recommendations.
  - Keep warning-versus-critical escalation logic configurable, with PLCs and plant SOPs retaining stop and restart authority.
  - Maintain a customer-success motion focused on remediation follow-up, evidence-pack completeness, and renewal-readiness reviews.
  - Use broker and loss-control partner feedback as a formal input to product templates instead of custom one-off reporting.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Own ingest pipeline, event ledger, evidence-pack generation, and first integrations with thermal and CMMS systems.
  - role: Product and implementation lead
    startTiming: Month 0
    rationale: Turn renewal workflow requirements into a narrow product, manage onboarding, and prevent bespoke services from overwhelming engineering.
  - role: Industrial risk partnerships lead
    startTiming: Month 6
    rationale: Build broker, MGA, and loss-control relationships once the first operator pilots produce usable evidence packs.
  - role: Customer success and data operations
    startTiming: Month 9
    rationale: Ensure remediation data quality, renewal reporting consistency, and multi-site expansion as the first cohort moves into production.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 5 to 10 design-partner accounts in the wood and pallet beachhead
      - Ship evidence-pack MVP with connectors for the narrowest supported thermal and CMMS stack
      - Convert at least 3 pilots into annual production contracts
      - Establish 2 broker or MGA design partnerships tied to live accounts
  - horizon: 12–24 months
    items:
      - Reach repeatable deployment playbooks with sub-30-day go-live on supported stacks
      - Launch cross-site benchmark reporting and portfolio views
      - Expand from single-site pilots into multi-site operator rollouts
      - Enter one adjacent combustible vertical such as recycling or biomass after wood-market proof
  - horizon: 24–36 months
    items:
      - Build renewal-outcome dataset across at least dozens of monitored sites
      - Add carrier and MGA reporting modules informed by real workflow usage
      - Demonstrate repeatable channel-sourced pipeline from brokers or OEM partners
      - Prove the product can expand beyond the initial wood and pallet market without losing deployment speed or pricing power
risks:
  - risk: Brokers and carriers may view the evidence pack as helpful but not material to underwriting decisions.
    likelihood: High
    impact: High
    mitigation: Start with design partners in broker and MGA channels, expose raw event and remediation trails, and measure actual renewal influence instead of claiming automatic premium reduction.
  - risk: Mixed hardware and maintenance environments may make onboarding too services-heavy.
    likelihood: High
    impact: High
    mitigation: Restrict the first release to a small number of supported stacks and price onboarding explicitly until productized integrations are proven.
  - risk: Buyers may prefer bundled thermal vendors if they want one accountable vendor for detection plus workflow.
    likelihood: Medium
    impact: High
    mitigation: Win where cameras already exist, partner with selected OEMs, and differentiate on insurer workflow, remediation closure, and benchmark data rather than sensor performance.
  - risk: The company may broaden into adjacent verticals before the beachhead economics are repeatable.
    likelihood: Medium
    impact: Medium
    mitigation: Gate expansion on beachhead pilot conversion, deployment speed, and multi-site expansion metrics rather than on top-of-funnel interest.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: Build the initial product and integration stack, fund 5 to 10 design-partner deployments, prove broker and renewal workflow adoption, and reach enough pilot-to-production conversion to justify multi-site expansion rather than a services-heavy business.
