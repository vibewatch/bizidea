topRisks:
  - name: Carrier acceptance
    description: Insurers and brokers may hesitate to trust a startup's risk reports unless they can audit the underlying evidence and see loss-ratio impact.
    mitigation: Start with broker and MGA design partners, expose raw event and remediation trails, and position the product as decision support before moving into underwriting standardization.
  - name: Sensor fragmentation
    description: Plants use mixed thermal cameras, maintenance systems, and manual logs, which can make onboarding messy and reduce report quality.
    mitigation: Launch with a hardware-agnostic ingestion layer and a narrow set of supported thermal and CMMS integrations for the first beachhead vertical.
  - name: Two-sided sales complexity
    description: The company could get trapped between operator budgets and insurer requirements if it tries to sell both sides too early.
    mitigation: Win operator budgets first around renewal pain, then add broker and carrier workflows as expansion modules once evidence packs are already in daily use.
