jobsToBeDone:
  - job: When a property renewal is approaching, help a combustible-material plant prove that fire risks are continuously monitored and remediated, so it can keep coverage on acceptable terms.
    currentAlternative: Manual questionnaires, thermography reports, and broker-led narrative building
    successMetric: Premium change and coverage retention at renewal
  - job: When a recurring hotspot appears on a conveyor, motor, or electrical cabinet, help the maintenance and risk team show that the issue was handled fast enough and thoroughly enough for underwriting review, so they can avoid exclusions after the next site inspection.
    currentAlternative: Separate alarm systems, work orders, and email threads with no insurer-ready audit trail
    successMetric: Time to remediation closure for underwriting-relevant thermal events
