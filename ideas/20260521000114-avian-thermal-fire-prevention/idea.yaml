problem: >-
  High-risk industrial plants still manage fire prevention through quarterly thermography walks,
  maintenance spreadsheets, and insurance renewal packets assembled by hand. That leaves sawmills,
  pallet recyclers, and combustible-material processors unable to prove to carriers that hot motors,
  bearings, conveyors, and electrical cabinets are under continuous control. As insurers tighten
  underwriting, plants face premium spikes, exclusions, or loss of coverage before they have a
  credible way to translate sensor data into insurability.
targetUser:
  primary: COO or risk and reliability leader at a North American pallet recycler or secondary wood-products operator with 1 to 5 plants and a property insurance renewal inside 120 days
  secondary: Plant maintenance manager responsible for conveyors, motors, and electrical cabinets at combustible-material sites
  buyer: CFO or head of risk for mid-market industrial operators facing rising property premiums or underwriting scrutiny
startupThesis:
  nonObviousInsight: >-
    The first killer app for industrial thermal AI is not another predictive-maintenance dashboard.
    It is an insurability workflow that converts raw heat signals and remediation actions into
    carrier- and broker-ready proof that a site deserves affordable coverage. What changed is that
    insurers are retreating faster than plants can upgrade infrastructure, while always-on thermal
    systems have become fast enough to deploy and credible enough to anchor underwriting decisions.
  beachhead: >-
    Insurance-readiness workflow for North American pallet recyclers, sawmills, and secondary
    wood-products plants with combustible dust and conveyor-heavy operations entering a difficult
    property renewal or broker remarketing cycle
  wedge: >-
    A hardware-agnostic control plane that ingests thermal alerts, maintenance tickets, and site
    inspections to generate insurer-facing risk reports, remediation timelines, and renewal evidence
    packs for fire-prone facilities
  whyNowCatalyst: >-
    AVIAN's funding and customer outcomes show that always-on thermal data can now be deployed
    quickly and tied to real insurance savings precisely as carriers pull back from high-risk sites.
  ventureScalePath: >-
    Start with fire insurability for wood and recycling plants, then expand into chemicals, oil and
    gas, maritime, and broader industrial property-risk workflows such as lender diligence, shutdown
    prevention, multi-hazard compliance, and carrier benchmarking.
solution: >-
  Combustible Site Insurability OS would sit above existing thermal cameras, CMMS tools, and plant
  maintenance logs to create a live record of fire-risk controls for each site. Instead of only
  showing hotspots, it would classify events by underwriting relevance, track whether each risk was
  remediated on time, and assemble a continuously updated evidence pack for brokers and carriers.
  The product would also benchmark alarm frequency, unresolved thermal anomalies, inspection cadence,
  and downtime events against peer facilities so operators can see which plants are becoming hard to
  insure before renewal. For insurers or brokers, the same system could provide permissioned access
  to auditable raw evidence rather than static PDF questionnaires. Over time, the company would own
  the highest-value dataset on which operational controls actually lower fire losses and preserve
  coverage in combustible industrial environments.
goToMarketSeed:
  firstCustomer: North American pallet recyclers and secondary wood-products operators with 2 to 10 sites, recent insurer loss-control recommendations, and at least one conveyor-fed process line that has already triggered heat or fire concerns
  buyingTrigger: A renewal notice, premium shock, threatened exclusion, or broker demand for stronger continuous fire-risk controls before coverage is bound
  currentAlternative: Quarterly thermography contractors, manual maintenance logs, broker questionnaires, site-inspection binders, and generic predictive-maintenance dashboards
  switchingReason: >-
    The wedge turns the same thermal and maintenance data plants already collect into an insurer-ready
    control narrative that can protect coverage and reduce premiums without waiting for a full facility
    retrofit.
  pricingHypothesis: Annual subscription priced per site plus optional insurer-reporting modules and onboarding fees for sensor and CMMS integrations
