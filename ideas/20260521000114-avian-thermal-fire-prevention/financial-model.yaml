modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      RenewalTrigger[Renewal or loss-control trigger] --> QualifiedSites[Qualified high-risk sites]
      QualifiedSites --> PaidSites[Paid monitored sites]
      PaidSites --> Revenue[Per-site subscription and reporting revenue]
      Revenue --> GrossProfit[Gross profit after onboarding and support COGS]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing from 6 paid sites at Y1 exit to 20 at Y2 exit and 50 at Y3 exit, with most of the lift coming from multi-site rollout inside wood and pallet operators.
- checkName: Must go right
  finding: The model needs the business-plan pilot-to-production threshold and 40%+ multi-site expansion to hold so each renewal-timed logo can grow from one site into a small portfolio account.
- checkName: Model breaks if
  finding: If broker and carrier acceptance stays weak and onboarding remains bespoke, the downside case stalls below 40 sites and cash turns negative before the next round.
- checkName: Next-round proof
  finding: The next financing case is strongest once the company shows 20 monitored sites by Q4Y2, sub-30-day deployments, and channel-sourced expansion that points credibly toward 50 sites in Y3.
sanityChecks:
  ruleOf40: Y3 growth 179% + EBITDA margin -47% = 132%
  burnMultiple: Improves from about 1.8x in Y2 to about 0.5x in Y3 as multi-site expansion absorbs the fixed team.
  revenuePerFte: $151K Y3 using Q4Y3 headcount of 8 FTE (below the $200–400K vertical SaaS benchmark).
  flags:
  - Revenue per FTE is still below mature vertical SaaS norms in Y3 because insurer-facing implementation and reporting remain people-assisted.
  - The model assumes broker or MGA partners begin contributing qualified pipeline by Y3; if direct sales stays the only channel, CAC and payback both worsen.
  - Gross margin only reaches the 70% target in Y3; if mixed-stack integrations stay bespoke, services hiring would arrive sooner and the round would need to be larger.
