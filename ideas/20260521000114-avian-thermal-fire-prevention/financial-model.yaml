slug: combustible-site-insurability-os
date: '2026-05-21'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-21] model starts the month after the business plan date so round cash is available before spend ramps.'
- id: A2
  name: Opening cash
  value: '2500.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M] base case uses a $2.5M pre-seed at the lower-middle of the stated range.'
- id: A3
  name: Customer unit in the model
  value: monitored paid site
  unit: definition
  source: '[BP businessModel.unitOfValue monitored site; BP pricing annual per-site subscription] customersEop tracks paid sites rather than operator logos.'
- id: A4
  name: Starting monitored paid sites (M1)
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] company begins pre-revenue and signs paid sites only after the first evidence-pack deployments.'
- id: A5
  name: Y1 new monitored paid sites by month
  value: '[0, 0, 0, 0, 1, 0, 1, 0, 1, 0, 1, 2]'
  unit: count
  source: '[BP experimentRoadmap and milestones] paced to reach 5 to 10 design partners, 3 paid pilots, and 3 production contracts by year end.'
- id: A6
  name: Y2 new monitored paid sites by quarter
  value: '[3, 4, 3, 4]'
  unit: count
  source: '[BP milestones 12–24 months] assumes repeatable sub-30-day deployments and early multi-site rollouts across wood and pallet operators.'
- id: A7
  name: Y3 new monitored paid sites by quarter
  value: '[7, 7, 8, 8]'
  unit: count
  source: '[Research SOM 25 accounts / ~50 sites; BP 24–36 month channel and expansion milestones] ends Y3 at 50 paid sites, roughly 25 operators at 2 sites each.'
- id: A8
  name: Pricing ladder by stage
  value: Y1 30.0; Y2 34.0; Y3 35.0 annual revenue per active site (USDK)
  unit: annual USDK per site
  source: '[BP pricing $30k to $45k per site; Research SAM/SOM $45k and $30k site ACV anchors] price steps up modestly as broker and reporting modules are added.'
- id: A9
  name: Revenue recognition method
  value: average active sites in period multiplied by blended annualized site revenue
  unit: formula
  source: 'Startup-finance heuristic: new sites go live mid-period on average, so revenue uses ((BoP sites + EoP sites) / 2) × realized price.'
- id: A10
  name: Gross margin ramp
  value: Y1 55% to 60%; Y2 62% to 68%; Y3 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70; BP risk on services-heavy onboarding; Research adoptionFrictionMatrix mixed-stack integration] margin reaches target only after integrations productize.'
- id: A11
  name: Loaded salary bands
  value: Founder 160; founding eng 145; product/implementation 130; partnerships 150; CS/data ops 105; platform eng 140; AE 140; benchmark analyst 115
  unit: annual USDK per FTE
  source: '[BP team roles] plus startup-finance heuristic for lean U.S. vertical SaaS cash compensation including payroll taxes and benefits.'
- id: A12
  name: Hiring schedule
  value: Founding eng M1; product/implementation lead M1; partnerships lead M6; CS/data ops M10; platform engineer M15; AE M19; benchmark analyst M28
  unit: timing
  source: '[BP team startTiming and sequencingRationale] later hires are heuristic additions made only after deployment and channel proof begins to appear.'
- id: A13
  name: Payroll allocation policy
  value: Founder 50% S&M / 50% G&A; product/implementation 50% R&D / 50% S&M; partnerships 85% S&M / 15% G&A; CS/data ops 30% R&D / 70% S&M; benchmark analyst 80% R&D / 20% S&M; engineering and AE fully allocated to their functions
  unit: policy
  source: '[BP team rationales and operations] reflects founder-led selling, implementation-heavy onboarding, and a product-first org.'
- id: A14
  name: Non-payroll operating expense ramp
  value: R&D other 5 to 10 monthly; S&M other 4 to 12 monthly; G&A other 7 to 10 monthly
  unit: USDK per month
  source: '[BP operations; Research regulatoryLandscape and distributionChannels] covers cloud, travel, insurance-industry meetings, and baseline legal/compliance support.'
- id: A15
  name: Steady-state monthly churn used for unit economics
  value: '1.5'
  unit: percent
  source: 'Startup-finance heuristic: annual contracts and renewal-linked workflows should retain well, but the narrow niche still carries some plant and insurer concentration risk.'
- id: A16
  name: Blended CAC per monitored site
  value: '26.3'
  unit: USDK
  source: Calculated from modeled Y2-Y3 sales and marketing spend of $1.156M divided by 44 new paid sites; consistent with founder-led vertical SaaS selling plus broker referrals.
- id: A17
  name: Funding sizing rule
  value: reach repeatable multi-site deployment proof and keep 6 months of buffer
  unit: policy
  source: Developer instruction plus [BP fundingAsk runwayMonths 18] round is sized to get beyond initial proof and into the next financing setup.
- id: A18
  name: Cash flow simplification
  value: ending cash equals opening cash plus cumulative EBITDA
  unit: formula
  source: 'Startup-finance heuristic: asset-light software model assumes minimal capex, debt, and working-capital distortion.'
