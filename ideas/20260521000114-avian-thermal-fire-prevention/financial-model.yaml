  downside:
    description: Broker pull-through is slower, pilots convert more slowly, and more manual integration work keeps the company services-heavy.
    y3RevenueK: 960.0
    y3EbitdaK: -760.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
    - Y3 paid sites end at 40 instead of 50
    - Blended annual site ARPU holds at $32K instead of $35K
    - Gross margin tops out at 67% instead of 70%
  base:
    description: Renewal-timed direct sales convert into multi-site rollouts, and gross margin reaches the 70% target once integrations stabilize.
    y3RevenueK: 1207.51
    y3EbitdaK: -565.0
    cashLowPointK: 317.51
    keyAssumptionChanges:
    - Y3 paid sites reach 50 by Q4Y3
    - Blended annual site ARPU reaches $35K
    - Gross margin reaches 70% in Y3
  upside:
    description: Broker referrals and faster multi-site adoption let the company add sites without meaningfully accelerating the hiring plan.
    y3RevenueK: 1491.5
    y3EbitdaK: -300.0
    cashLowPointK: 610.0
    keyAssumptionChanges:
    - Y3 paid sites end at 60 instead of 50
    - Blended annual site ARPU reaches $38K with reporting add-ons
    - Gross margin improves to 72% as onboarding becomes more standardized
