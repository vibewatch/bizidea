competitors:
  - name: AVIAN
    stage: scale-up
    wedge: Always-on thermal monitoring for high-risk industrial sites with bundled cameras, alerts, and support.
    pricing: Custom subscription; markets <6-month payback and a 12-month satisfaction guarantee.
    strength: Closest proof point for the exact pain, with live wood-industry case studies, insurer savings evidence, and fast deployment messaging.
    weaknessVsUs: Still bundled around its own monitoring stack; a startup can differentiate with hardware-agnostic insurer workflow, maintenance closure logic, and broker-facing evidence packs.
    sourceRefs:
      - 1
      - 5
      - 8
  - name: Teledyne FLIR
    stage: incumbent
    wedge: Fixed thermal cameras and early-fire-detection systems for wood processing and other industrial hazards.
    pricing: Hardware-led and quote-driven through product or partner sales.
    strength: Brand trust, rugged hardware, broad product line, and deep integration into condition-monitoring and fire-prevention applications.
    weaknessVsUs: Camera-first positioning leaves workflow, underwriting narrative, and remediation proof largely to the customer or integrator.
    sourceRefs:
      - 31
      - 32
      - 33
      - 34
  - name: Opticom Technologies
    stage: scale-up
    wedge: AI-driven dual-sensor thermal camera designed specifically for sawmill fire monitoring.
    pricing: Custom quote for hardware deployment.
    strength: Clear wood-industry positioning, rugged hardware, and straightforward sawmill messaging.
    weaknessVsUs: Primarily a device sale with alerts; it does not appear to own renewal documentation, insurer benchmarking, or cross-system evidence management.
    sourceRefs:
      - 35
  - name: Viper Imaging
    stage: scale-up
    wedge: Early fire detection systems for wood processing using FLIR cameras plus ViperVision software.
    pricing: Offers HaaS, lease, purchase, and rental options.
    strength: Integrator-style flexibility and a practical purchase model for industrial buyers who want turnkey deployment.
    weaknessVsUs: Still centered on system deployment and alarm handling rather than a hardware-agnostic renewal and remediation record.
    sourceRefs:
      - 36
  - name: Augury
    stage: scale-up
    wedge: Subscription machine-health platform for predictive maintenance across industrial assets.
    pricing: Custom quote; subscription model with <6-month payback claims.
    strength: Strong machine-health narrative, real industrial credibility, and budget precedents for subscription reliability software.
    weaknessVsUs: Built for broad predictive maintenance, not for fire-insurability workflows, broker collaboration, or property-renewal evidence.
    sourceRefs:
      - 37
      - 38
regulatoryTechnicalConstraints:
  - point: OSHA's combustible-dust guidance points operators to sawmills, ventilation, fire protection, hazardous locations, and the General Duty Clause rather than a single software control.
    sourceRefs:
      - 14
      - 15
  - point: FM's wood-processing and combustible-dust data sheets show that dust handling, housekeeping, and explosion / fire protection remain core site obligations.
    sourceRefs:
      - 17
      - 18
  - point: Idle wood pallet storage is treated as special fire-protection risk under IFC and NFPA 13 logic, so storage layout and sprinkler design still materially affect insurability.
    sourceRefs:
      - 19
      - 40
  - point: If the product connects to shutdown actions, site PLCs should own stop logic and restart discipline rather than the thermal system acting autonomously.
    sourceRefs:
      - 13
