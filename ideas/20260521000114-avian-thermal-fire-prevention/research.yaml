        - 35
  validationPlan:
    - priority: high
      question: Will brokers and carriers materially change renewal outcomes when given a live thermal-and-remediation evidence pack from a startup?
      evidenceToGather: Renewal before/after data with premium movement, exclusions avoided, and broker feedback from 5 to 10 pilot accounts.
    - priority: high
      question: What percentage of target facilities already have usable thermal hardware versus needing a bundled deployment?
      evidenceToGather: Discovery calls with pallet recyclers and secondary wood operators, broken down by installed cameras, CMMS maturity, and PLC access.
    - priority: medium
      question: Which evidence artifacts matter most to underwriters—continuous alert history, remediation SLA, housekeeping trend, or benchmark percentile?
      evidenceToGather: Structured interviews with specialty brokers, MGAs, and carrier property engineers.
    - priority: medium
      question: How much insurer credit comes from monitoring itself versus broader site improvements such as sprinklers, dust collection, and storage-layout changes?
      evidenceToGather: Joint pilots that pair the software with documented site recommendations and then track underwriting response.
