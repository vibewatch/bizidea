        - 25
        - 26
  dataMoats:
    - point: The best moat is an outcome graph that links hotspot type, affected asset, remediation speed, and downtime or fire outcome across many comparable mills and pallet plants.
      sourceRefs:
        - 8
        - 9
        - 10
    - point: A cross-hardware evidence layer becomes more valuable over time because it can compare how different sensors, thresholds, and operating practices perform under real renewal pressure.
      sourceRefs:
