  adoptionFrictionMatrix:
    - friction: Carrier skepticism toward a startup-generated evidence pack
      severity: high
      affectedBuyer: CFO or risk leader
      mitigation: Start with brokers, expose raw event history and remediation trails, and position the product as evidence support before promising underwriting automation.
      sourceRefs:
        - 22
        - 25
        - 26
    - friction: Mixed hardware, CMMS, and controls environments
      severity: high
      affectedBuyer: Maintenance and reliability leader
      mitigation: Launch with a narrow set of connectors and support staged deployments where warning-only mode proves value before deeper integration.
      sourceRefs:
        - 13
        - 31
        - 36
    - friction: Alert fatigue and fear of nuisance auto-stops
      severity: high
      affectedBuyer: Plant manager
      mitigation: Separate warning and critical logic, learn normal baselines, and keep shutdown authority with site PLC logic and SOPs.
      sourceRefs:
        - 5
        - 13
        - 35
    - friction: Software alone cannot fix poor housekeeping or pallet-storage layout
      severity: medium
      affectedBuyer: Site operations leader
      mitigation: Bundle documentation with site recommendations from brokers, fire engineers, or plant safety teams rather than overselling pure software.
      sourceRefs:
        - 17
        - 18
