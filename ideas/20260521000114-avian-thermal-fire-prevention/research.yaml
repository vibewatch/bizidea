openQuestions:
  - Will carriers accept a startup-built evidence pack as underwriting support, or will they insist on named broker, engineering, or OEM partners before giving material credit?
  - What annual contract value can a software-only evidence layer command when a site already owns cameras but still needs integrations and broker support?
  - How much of the renewal result depends on software evidence versus physical upgrades such as sprinklers, dust collection, and pallet-storage changes?
  - Which initial GTM path wins fastest: overlaying installed thermal cameras, bundling with selected OEMs, or selling through brokers into renewal cycles?
