modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      RenewalTrigger[Renewal or loss-control trigger] --> QualifiedSites[Qualified high-risk sites]
      QualifiedSites --> PaidSites[Paid monitored sites]
      PaidSites --> Revenue[Per-site subscription and reporting revenue]
      Revenue --> GrossProfit[Gross profit after onboarding and support COGS]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形下，收入来自付费场站数从 Y1 末的 6 个增长到 Y2 末的 20 个、再到 Y3 末的 50 个，其中大部分增量来自木材和托盘运营商内部的多场站铺开。
  - checkName: 必须做对的事
    finding: 这个模型要求商业计划里设定的试点→正式生产门槛和 40%+ 多场站扩张都能成立，这样每个卡在续保节点的客户账户才能从 1 个场站长成一个小型组合账户。
  - checkName: 模型会在哪儿断掉
    finding: 如果经纪商和保险公司始终不买账、而上线又一直无法标准化，downside 情形会卡在 40 个场站以下，并在下一轮融资前把现金烧成负数。
  - checkName: 下一轮融资证明
    finding: 等公司在 Q4Y2 证明 20 个已监测场站、30 天内可部署，以及渠道带来的扩张有望在 Y3 指向 50 个场站时，下一轮融资故事会最强。
sanityChecks:
  ruleOf40: Y3 growth 179% + EBITDA margin -47% = 132%
  burnMultiple: 从 Y2 约 1.8x 改善到 Y3 约 0.5x，因为多场站扩张开始摊薄固定团队成本。
  revenuePerFte: 以 Q4Y3 的 8 FTE 计算，Y3 每 FTE 收入为 $151K（低于垂直 SaaS 常见的 $200–400K 基准）。
  flags:
    - 到 Y3，每 FTE 收入仍低于成熟垂直 SaaS 常态，因为面向保险方的实施和报告仍需要较多人工协助。
    - 模型假设经纪商或 MGA 伙伴会在 Y3 开始贡献合格 pipeline；如果直销始终是唯一渠道，CAC 和回本周期都会变差。
    - 毛利率要到 Y3 才能达到 70% 目标；如果混合栈集成始终无法产品化，服务型招聘会更早到来，这轮融资规模也得更大。
