slug: combustible-site-insurability-os
date: '2026-05-21'
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-06
    unit: YYYY-MM
    source: '[BP date 2026-05-21] 模型从商业计划日期后的第一个月启动，这样融资现金会先到账，再开始放大支出。'
  - id: A2
    name: 期初现金
    value: '2500.0'
    unit: USDK
    source: '[BP fundingAsk targetFundingRangeUsd $2–4M] 基准情形采用 $2.5M pre-seed，取自区间偏下中部。'
  - id: A3
    name: 模型里的客户单位
    value: 已付费监测场站
    unit: definition
    source: '[BP businessModel.unitOfValue monitored site; BP pricing annual per-site subscription] customersEop 追踪的是付费场站，而不是运营商品牌数。'
  - id: A4
    name: 起始已付费监测场站（M1）
    value: '0'
    unit: count
    source: '[BP milestones 0–12 months] 公司从零收入起步，要等第一批证据包部署后才会签下付费场站。'
  - id: A5
    name: Y1 每月新增已付费监测场站
    value: '[0, 0, 0, 0, 1, 0, 1, 0, 1, 0, 1, 2]'
    unit: count
    source: '[BP experimentRoadmap and milestones] 按这个节奏，年底能达到 5 到 10 个共创客户、3 个付费试点，以及 3 份正式生产合同。'
  - id: A6
    name: Y2 每季度新增已付费监测场站
    value: '[3, 4, 3, 4]'
    unit: count
    source: '[BP milestones 12–24 months] 假设木材和托盘运营商里，30 天内可复制部署已跑通，早期多场站铺开开始出现。'
  - id: A7
    name: Y3 每季度新增已付费监测场站
    value: '[7, 7, 8, 8]'
    unit: count
    source: '[Research SOM 25 accounts / ~50 sites; BP 24–36 month channel and expansion milestones] 到 Y3 末达到 50 个付费场站，大致对应 25 家运营商、每家 2 个场站。'
  - id: A8
    name: 分阶段定价阶梯
    value: Y1 30.0; Y2 34.0; Y3 35.0 annual revenue per active site (USDK)
    unit: annual USDK per site
    source: '[BP pricing $30k to $45k per site; Research SAM/SOM $45k and $30k site ACV anchors] 随着经纪商与报告模块加入，单价温和上调。'
  - id: A9
    name: 收入确认方法
    value: 以期间平均活跃场站数乘以混合年化场站收入
    unit: formula
    source: '创业财务经验法则：新场站平均在期中上线，所以收入按 ((BoP sites + EoP sites) / 2) × realized price 计算。'
  - id: A10
    name: 毛利率爬坡
    value: Y1 55% to 60%; Y2 62% to 68%; Y3 70%
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 70; BP risk on services-heavy onboarding; Research adoptionFrictionMatrix mixed-stack integration] 只有当集成逐步产品化后，毛利率才能摸到目标值。'
  - id: A11
    name: 全成本薪酬带
    value: Founder 160; founding eng 145; product/implementation 130; partnerships 150; CS/data ops 105; platform eng 140; AE 140; benchmark analyst 115
    unit: annual USDK per FTE
    source: '[BP team roles] 再叠加创业财务经验法则，按精简型美国垂直 SaaS 团队的现金薪酬、工资税和福利估算。'
  - id: A12
    name: 招聘节奏
    value: Founding eng M1; product/implementation lead M1; partnerships lead M6; CS/data ops M10; platform engineer M15; AE M19; benchmark analyst M28
    unit: timing
    source: '[BP team startTiming and sequencingRationale] 后续岗位是基于经验法则补入，前提是部署和渠道验证已经开始出现。'
  - id: A13
    name: 薪资归集规则
    value: Founder 50% S&M / 50% G&A; product/implementation 50% R&D / 50% S&M; partnerships 85% S&M / 15% G&A; CS/data ops 30% R&D / 70% S&M; benchmark analyst 80% R&D / 20% S&M; engineering and AE fully allocated to their functions
    unit: policy
    source: '[BP team rationales and operations] 反映创始人主导销售、实施型上线偏重，以及产品优先的组织结构。'
  - id: A14
    name: 非薪资运营费用爬坡
    value: R&D other 5 to 10 monthly; S&M other 4 to 12 monthly; G&A other 7 to 10 monthly
    unit: USDK per month
    source: '[BP operations; Research regulatoryLandscape and distributionChannels] 覆盖云成本、差旅、保险行业会议，以及基础法务与合规支持。'
  - id: A15
    name: 用于单位经济模型的稳态月流失率
    value: '1.5'
    unit: percent
    source: '创业财务经验法则：年合同加续保驱动工作流本应带来较强留存，但这个窄市场仍有工厂集中度和承保方集中度风险。'
  - id: A16
    name: 每个已监测场站的混合 CAC
    value: '26.3'
    unit: USDK
    source: 由模型中的 Y2-Y3 销售与市场费用 $1.156M 除以 44 个新增付费场站得出；这一水平与创始人主导的垂直 SaaS 销售加经纪转介相符。
  - id: A17
    name: 融资规模规则
    value: 跑出可复制的多场站部署证明，并预留 6 个月缓冲
    unit: policy
    source: 'Developer instruction plus [BP fundingAsk runwayMonths 18] 本轮融资按“走过初步验证，并为下一轮融资准备好位置”来定。'
  - id: A18
    name: 现金流简化假设
    value: 期末现金等于期初现金加累计 EBITDA
    unit: formula
    source: '创业财务经验法则：轻资产软件模型假定资本开支、债务和营运资金扰动都很小。'
