scenarios:
  downside:
    description: 经纪渠道带来的订单更慢，试点转正式的速度更低，而且更多人工集成工作让公司一直摆脱不了重服务模式。
    y3RevenueK: 960.0
    y3EbitdaK: -760.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
      - Y3 末付费场站只有 40 个，而不是 50 个
      - 混合年化场站 ARPU 维持在 $32K，而不是 $35K
      - 毛利率最高只能到 67%，而不是 70%
  base:
    description: 卡着续保窗口的直销开始转成多场站铺开，而毛利率会在集成稳定后爬到 70% 目标。
    y3RevenueK: 1207.51
    y3EbitdaK: -565.0
    cashLowPointK: 317.51
    keyAssumptionChanges:
      - 到 Q4Y3，Y3 付费场站达到 50 个
      - 混合年化场站 ARPU 达到 $35K
      - 毛利率在 Y3 达到 70%
  upside:
    description: 经纪转介和更快的多场站采用，让公司在几乎不加快招聘节奏的情况下也能继续加站点。
    y3RevenueK: 1491.5
    y3EbitdaK: -300.0
    cashLowPointK: 610.0
    keyAssumptionChanges:
      - Y3 末付费场站达到 60 个，而不是 50 个
      - 随着报告增购项加入，混合年化场站 ARPU 达到 $38K
      - 当上线更标准化后，毛利率提升到 72%
