slug: combustible-site-insurability-os
date: '2026-05-21'
executiveSummary: >-
  易燃场站可保性 OS 卖的是一条很窄、但很急的工作流：当保险公司、经纪商和损失控制团队要求客户拿出更扎实的火灾风险控制证明时，帮高风险木材与托盘设施把可保性守住。第一批客户会是北美的托盘回收商、锯木厂或二次木制品运营商，拥有 2 到 10 个场站、现有产线高度依赖输送带，而且大约 120 天内就要续保或重新询价。产品是一层硬件无关的软件，把热事件、维护动作和现场检查变成可审计的证据包，直接给经纪商和保险公司用，而不是再做一块泛化的预测性维护仪表盘。这个切口有吸引力，因为买家本来就在热成像、热像仪、维护系统和经纪材料上花钱，但一直没有一套系统记录层，能证明风险一直在管、整改有没有闭环。短期打法是先拿下运营方预算；等续保证据真正进入日常工作流后，再扩到面向经纪商、MGA 和保险公司的模块。研究已经证明痛点、部署时机和付费意愿都成立，但还有两个假设必须补证：第一，承保方是否愿意把创业公司生成的证据当成决策支持；第二，在硬件混杂的环境里，纯软件叠加层是否依然能卖出好价格。研究里的市场规模以估算为主，初始滩头也不算特别大，所以要走到风投级体量，必须再扩到回收、生物质和其他高危财产工作流。只要早期试点能证明续保结果改善、经纪渠道带单，以及试点到正式生产合同的转化，这案子就值得投。
problem:
  - 这些场站至今还靠按季度热成像巡检、表格和经纪商问卷，根本无法向保险公司证明火灾风险一直处在持续控制中。
  - 托盘厂、锯木厂和二次木制品运营商的续保压力很尖锐，因为保费飙升、责任除外甚至失去保障，都可能在工厂完成物理改造之前就先发生。
  - 现有热监测厂商能识别热源，但通常不会在混合系统里留下可审计记录，去说明谁确认了问题、整改用了多久、哪些证据能直接给保险公司看。
solution:
  - 产品把热告警、维护工单和检查记录接进一套按场站划分的控制台账，并按核保相关性给事件分类。
  - 它会在续保前生成可直接给经纪商和承保方使用的证据包，里面有异常历史、整改闭环、逾期动作和场站级控制趋势。
  - 它还会把已监测场站和同类设施做基准比较，让运营方优先处理那些最可能变得难以承保的工厂。
whyWeWin:
  - 硬件无关的定位，让公司能架在已安装相机、CMMS 工具和人工日志之上，不必强推整套替换式部署。
  - 这个切口卡住的是 CFO 或风险负责人最焦虑的时点——他们现在就要续保证据，而不是再买一块可靠性仪表盘。
  - 真正能守住的资产，是一套跨场站数据集：把热异常类型、整改行为和续保结果连起来，覆盖可燃工业环境。
strategicChoices:
  beachhead: 北美托盘回收商、二次木制品运营商和锯木厂；这些公司拥有 2 到 10 个场站、工艺高度依赖输送带，并将在未来 3 到 4 个月内面对财产险续保或经纪商重新询价。
  wedgeRationale: >-
    这一段市场火灾暴露明确、已经有热监测和维护数据，而且预算触发点直接绑在续保结果上。相比一开始就做更宽的工业市场，这里更容易更快做出证明，因为买家、触发点和成功指标都很具体：把保障续上、减少责任除外，或者在下一次续保时拿到更好的保费条款。
  sequencingRationale: >-
    公司第一步应该先发一层能吃进现有硬件的软件叠加层，因为续保压力要的是尽快上线，不是打包卖硬件。等工厂团队和风险团队每天都在用这套工作流后，再补上经纪协作、基准报告和合作伙伴驱动的承保方分发；招聘顺序也一样，先上产品和集成人才，保险合作岗位放后面。
  notYet:
    - 在木材和托盘工作流里还没把续保证明跑通之前，不先做化工、油气等场站
    - 不把整包相机硬件销售作为主推进动作
    - 不做超出 PLC 集成告警与升级支持范围之外的自主停机控制
    - 不做那些和可保性或续保结果无关的泛化预测性维护场景
market:
  tam: $141.0M
  sam: $27.0M
  som: $1.5M
  segments:
    - 续保压力下的北美托盘回收商和二次木制品运营商
    - 已有热监测资产的锯木厂和相邻的可燃物加工设施
  buyingProcess: >-
    销售通常始于经纪商、承保方或内部财务负责人指出续保有风险，要求工厂拿出更强的持续火灾风险控制证明。业务上的牵头人往往是维护或可靠性负责人，但真正拍预算的是 CFO、COO 或风险负责人，前提是产品已经被绑进续保材料、保险建议或保费风险事件里。
product:
  mvp: >-
    MVP 要先做成一个以读取和汇总为主的软件叠加层，覆盖 1 到 2 套现有热系统和 1 个 CMMS 或工单来源，并保留人工录入检查和整改备注的兜底入口。它必须在不大改控制系统的前提下，就能产出像样的证据包、事件时间线和续保仪表盘。
  sixMonth: 上线场站台账、面向承保方的证据包、经纪复核工作流，以及面向共创客户账户中最窄支持范围的热系统和 CMMS 连接器。
  twelveMonth: 加上跨场站基准比较、整改 SLA 分析、经纪商多账户视图，以及把支持栈上线时间压到 30 天以内的实施手册。
  twentyFourMonth: 扩到回收和生物质等相邻市场，增加结构化的保险公司和 MGA 报告模块，并沉淀和续保结果、损失控制建议相连的核保级基准。
  keyBets:
    - 在完全标准化的核保工作流出现之前，保险公司和经纪商就会先把实时证据包当成有用的决策支持。
    - 足够多的目标场站已经装有可用的热监测，所以“软件先行”的部署会比转卖打包硬件更快跑通。
    - 跨场站基准数据最终会比单纯的热异常识别更值钱，并能支撑产品扩到相邻的高危财产工作流。
gtm:
  wedge: 向那些正面临保费冲击、责任除外风险或经纪商重新询价的易燃场站，卖一层续保就绪叠加层，把已安装的热监测和维护数据变成承保方可直接采用的证明。
  channels:
    - 直接卖给进入续保或损失控制整改周期的运营方
    - 与工业保险经纪商、MGA 和财产损失工程师建立转介和联合销售合作
    - 与热监测 OEM 和系统集成商做渠道合作，在已装相机之上补工作流层
  funnelTargets: "线索→合格续保账户 20–30%，合格账户→付费试点 35–50%，试点→正式生产 60%+，正式生产→12 个月内多场站扩展 40%+"
  pricing: >-
    按场站收取年度订阅费，再叠加上线和集成费用，是最顺手的定价方式，因为买家是围绕单个场站续保来编预算的，也想在不走资本开支审批的前提下尽快看到结果。初始定价应该锚在每个场站大约 $30k 到 $45k，覆盖软件和报告能力，前提是接入已支持的集成；经纪商或保险公司报告模块可以在正式生产后再作为增购项出售。
businessModel:
  revenueStreams:
    - 面向已纳入续保工作流的监测场站，按年收取订阅费
    - 热监测和 CMMS 连接的一次性上线与集成费用
    - 高级经纪商、MGA 或保险公司报告模块
    - 面向大型运营商或渠道伙伴的多场站基准与组合分析
  unitOfValue: 处在活跃保险就绪防火工作流中的已监测场站
  targetGrossMarginPct: 70
  expansionLevers:
    - 从单场站试点扩到 2 到 10 个场站运营商的整组铺开
    - 当运营方证据包进入正式生产后，增加面向经纪商的组合视图
    - 把同一套控制台账延伸到回收、生物质和其他可燃财产垂直
    - 在既有工作流底座上继续叠加基准和续保结果分析
strategyMap:
  northStarMetric: 在没有新增火灾责任除外或不利核保动作的情况下完成续保的已监测场站数
  inputMetrics:
    - 从热异常出现到被正式确认所需时间
    - 在目标 SLA 内完成闭环的核保相关事件占比
    - 从续保合格账户中启动的付费试点数
    - 试点账户转成年付正式合同的比例
    - 现有运营商账户里的多场站扩展率
  moatsToBuild:
    - 与续保结果绑定的跨硬件事件与整改数据集
    - 让证据包成为续保流程一部分的经纪商与 MGA 工作流采用
    - 展示可燃设施之间控制行为差异的基准模型
  killCriteria:
    - 前 8 个试点里，12 个月内少于 2 个带来经纪商认可的续保改善或明显更快的核保流程
    - 超过 50% 的合格潜客部署时都要求整套更换硬件，打破“软件先行”假设
    - 在已支持集成上跑完两个续保周期后，试点到正式生产的转化仍低于 30%
  mermaid: |
    flowchart LR
      Wedge[Beachhead renewal wedge] --> MVP[Evidence-pack MVP]
      MVP --> Proof[Broker and renewal proof points]
      Proof --> Expansion[Multi-site and adjacent-vertical expansion]
investorMemo:
  verdict:
    call: 见面 / 继续尽调
    conviction: 切口很强、痛点也真，但能不能把确信感做实，取决于公司能否在首批试点里证明承保方接受度，以及纯软件部署的经济性。
    whyBelieve: 同类市场证据已经说明，买家愿意为了防火灾损失、保住正常运行和守住财产保障付费，而现有厂商里还没有谁真正拿下了面向承保方的工作流层。
    whyDoubt: 初始滩头本身不算特别大；如果经纪商和保险公司只把产品当成“有帮助的报告工具”，而不是核保相关基础设施，公司就可能跑不出来。
    nextDiligence: 拿下 5 到 10 个共创客户账户，并证明其中至少有几个能带来经纪商认可的续保改善，或明显加快核保复核。
  firstCustomer:
    title: 处在续保审查下的多场站托盘回收商或二次木制品运营商
    profile: 北美运营商，拥有 2 到 10 个场站、输送带供料产线、可燃粉尘暴露、至少一次近期发热或火灾担忧，并且即将进行财产险续保。
    trigger: 经纪商或保险公司在出单或续保前，要求客户拿出更强的持续火灾风险控制证明。
    buyer: CFO、COO 或风险负责人
    initialContract: 先在 1 个场站做付费试点，含上线费用，年化软件价值大约 $25k 到 $50k；如果下一次续保或经纪材料结果改善，再扩到 2 到 5 个场站。
  mustBeTrue:
    - 至少一半合格滩头场站已经有可用热硬件，或者能在不走漫长资本开支周期的情况下补上。
    - 经纪商和保险公司足够看重整改闭环记录，愿意在续保复核或损失控制跟进里讨论这类证据。
    - 一层软件叠加层能在每场站 $30k 到 $45k 的定价下，通过续保保护、承保响应速度或停机避免拿出回报。
    - 工厂团队会持续维护事件与整改工作流，而不是一忙起来就退回表格和邮件。
    - 公司可以从木材和托盘工作流扩到相邻高危财产垂直，而不用从零重写产品。
  diligenceQuestions:
    - 到底哪些证据材料会在困难续保里改变经纪商或保险公司的行为？
    - 目标场站里有多少已经在跑热像仪？滩头市场里最常见的相机和 CMMS 组合是什么？
    - 续保改善里，有多少来自软件证据本身，又有多少来自喷淋、除尘或存储布局等物理改造？
    - 如果热监测 OEM 自己加上一层类似报告，经纪渠道的防御力到底有多强？
    - 什么样的试点结构最能预测后续多场站铺开，而不是一次性合规支出？
operatingAssumptions:
  - assumption: 在已支持的相机和 CMMS 组合上，软件先行的叠加层能在 30 天内完成部署。
    basis: research.yaml
    validationTest: 统计前 5 个共创客户从签约到产出第一份可用证据包的时间，要求至少 4 个在 30 天内上线。
    decisionImpact: 如果不成立，GTM 必须收窄到更少的支持栈、提高上线费用，或者转向 OEM 打包方案。
  - assumption: 如果证据包能减少人工整理续保叙事的工作，经纪商会主动帮忙推动。
    basis: operator judgment
    validationTest: 和 10 家经纪商或 MGA 做结构化评审，要求至少 6 家愿意把证据包用于真实账户，或同意联合销售试点。
    decisionImpact: 如果不成立，公司就该把经纪商放回顾问角色，直接向运营方卖停机避免和损失控制工作流的价值。
  - assumption: 即便保险节省还不确定，只要能合理证明保住保障和避免停机，买家依然愿意按软件级价格付费。
    basis: research.yaml
    validationTest: 在给出折扣型多场站 bundle 之前，先签下至少 3 个年化软件价值高于 $20k 的付费试点。
    decisionImpact: 如果不成立，定价和打包就得下探，或者塞进更多服务，这会压低毛利和融资效率。
  - assumption: 在前 24 个月内，公司就能把续保结果数据采得足够干净，开始搭建基准护城河。
    basis: operator judgment
    validationTest: 在前 25 个账户里跟踪续保结果、责任除外、工程建议和整改历史，并保证至少 80% 字段完整。
    decisionImpact: 如果不成立，护城河就会从结果基准转向工作流集成，业务也会更容易被现有厂商复制。
  - assumption: 木材和托盘账户已经有足够重复性，能在扩到回收和生物质之前把产品跑通。
    basis: idea.yaml
    validationTest: 在打开第二个垂直之前，先把前 10 个木材和托盘试点的试点→正式生产转化做到至少 60%。
    decisionImpact: 如果不成立，公司就该先回头重看 ICP 选择，再决定是否继续烧钱扩到相邻垂直。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 招募 5 家续保窗口在 120 天内的共创运营商。
    hypothesis: 相比泛化可靠性买家，卡在续保节点上的账户会更快接受付费或强承诺的试点。
    successMetric: 签下 5 个共创客户，其中至少 3 个是付费试点，而且 5 个都有明确的续保或损失控制截止时间。
    owner: CEO
  - horizon: 0–90 天
    experiment: 为共创客户最常见的 2 套热监测栈和 1 套 CMMS 做连接器。
    hypothesis: 把连接器范围收窄做深，能把部署时间压下来，从而守住“软件先行”假设。
    successMetric: 前 5 个账户里有 4 个能在 30 天内靠自动化数据接入上线。
    owner: Founding eng
  - horizon: 90–180 天
    experiment: 在真实试点账户上跑经纪商证据包评审。
    hypothesis: 经纪商会提出一套比较标准的证据需求，最终能沉淀成默认续保模板。
    successMetric: 至少 6 位经纪评审人认为证据包“实质上有用”，并且有 3 位愿意再介绍目标账户。
    owner: CEO
  - horizon: 90–180 天
    experiment: 测试纯软件、软件加上线、以及组合打包三种定价。
    hypothesis: 只要和续保节点、可量化的整改工作流价值挂钩，买家会接受按场站收年费。
    successMetric: 在已支持账户上签下 3 份正式生产合同，等价毛收入达到每场站 $30k+。
    owner: Revenue lead
  - horizon: 180–365 天
    experiment: 给早期正式客户上线多场站基准仪表盘。
    hypothesis: 组合基准比较会比单点续保报告更快带来第二场站、第三场站扩展。
    successMetric: 12 个月内，40% 的正式生产账户扩到至少 1 个新增场站。
    owner: Product lead
  - horizon: 180–365 天
    experiment: 试点一个带组合报告的经纪商或 MGA 合作模块。
    hypothesis: 一旦运营方侧工作流被验证，渠道伙伴会带来更低成本的合格 pipeline。
    successMetric: 2 个活跃渠道伙伴贡献 20% 以上的合格 pipeline，同时不拉低赢单率。
    owner: CEO
operations:
  - 把场站上线流程标准化，核心字段包括资产地图、相机清单、续保日历、经纪联系人和损失控制建议。
  - 让“预警”和“严重告警”的升级逻辑保持可配置，同时把停机和重启权限牢牢留在 PLC 与工厂 SOP 手里。
  - 建一套客户成功动作，重点盯整改跟进、证据包完整度和续保就绪复盘。
  - 把经纪商和损失控制伙伴的反馈正式纳入产品模板，而不是每个客户都单独定制一份报告。
team:
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 负责数据接入管道、事件台账、证据包生成，以及首批热监测和 CMMS 系统集成。
  - role: 产品与实施负责人
    startTiming: 第 0 个月
    rationale: 把续保工作流需求收敛成一个窄产品，负责上线，并避免工程团队被定制化服务拖垮。
  - role: 工业风险合作负责人
    startTiming: 第 6 个月
    rationale: 等首批运营方试点产出可用证据包后，去搭建经纪商、MGA 和损失控制关系。
  - role: 客户成功与数据运营
    startTiming: 第 9 个月
    rationale: 当首批客户进入正式生产后，保证整改数据质量、续保报告一致性和多场站扩展。
milestones:
  - horizon: 0–12 个月
    items:
      - 在木材与托盘滩头市场签下 5 到 10 个共创客户账户
      - 发出证据包 MVP，并接入最窄支持范围内的热监测与 CMMS 连接器
      - 至少把 3 个试点转成年度正式生产合同
      - 建立 2 个与真实账户绑定的经纪商或 MGA 共创合作
  - horizon: 12–24 个月
    items:
      - 跑出可复制的部署手册，在已支持栈上把上线时间压到 30 天以内
      - 上线跨场站基准报告和组合视图
      - 从单场站试点扩到多场站运营商铺开
      - 在木材市场拿到证明后，进入回收或生物质等一个相邻可燃垂直
  - horizon: 24–36 个月
    items:
      - 在至少数十个已监测场站上沉淀续保结果数据集
      - 基于真实工作流使用情况，补上保险公司和 MGA 报告模块
      - 证明来自经纪商或 OEM 伙伴的渠道 pipeline 可以稳定复制
      - 证明产品能在不牺牲部署速度和定价权的情况下，走出最初的木材与托盘市场
risks:
  - risk: 经纪商和保险公司可能觉得证据包“有帮助”，但还不足以影响核保决策。
    likelihood: High
    impact: High
    mitigation: 先和经纪商及 MGA 渠道里的共创客户合作，开放原始事件与整改轨迹，并用真实续保影响来衡量效果，而不是一上来就宣称能自动降保费。
  - risk: 硬件和维护环境混杂，可能让上线过程过度依赖服务。
    likelihood: High
    impact: High
    mitigation: 首个版本先把支持范围严格收窄到少数几套栈，并把上线费用明确报价，等产品化集成被验证后再放开。
  - risk: 如果客户想找一个厂商同时负责检测和工作流，他们可能更愿意买打包式热监测方案。
    likelihood: Medium
    impact: High
    mitigation: 优先在已有相机的场景赢单，与精选 OEM 合作，并把差异化放在保险工作流、整改闭环和基准数据上，而不是传感器性能。
  - risk: 公司可能在滩头市场经济性还没跑顺之前，就过早扩到相邻垂直。
    likelihood: Medium
    impact: Medium
    mitigation: 扩张节奏必须由滩头市场的试点转化、部署速度和多场站扩展指标来决定，而不是看漏斗顶部兴趣有多高。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 打出第一版产品与集成底座，支撑 5 到 10 个共创客户部署，验证经纪和续保工作流的采用，并把试点→正式生产转化做高到足以支撑多场站扩展，而不是变成一家重服务公司。
