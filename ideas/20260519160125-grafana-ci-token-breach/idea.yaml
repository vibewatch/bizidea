differentiator: >-
  Most developer-security products either scan code for leaked secrets or apply
  generic CI policy linting. This company would own the narrower and more
  painful control point where GitHub event context, token scope, and repo
  topology combine into real privilege escalation risk. Its moat can compound
  through organization-specific workflow graphs, token-reachability models,
  and a dataset of dangerous CI patterns observed across public-repo software
  companies.
