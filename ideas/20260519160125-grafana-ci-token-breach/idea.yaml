topRisks:
  - name: Native platform catch-up
    description: GitHub could add stronger built-in workflow simulation and ephemeral credential controls that narrow the product wedge.
    mitigation: Focus on cross-repo privilege graphing, runtime token brokering, and organization-wide policy coverage that go beyond repo-local native checks.
  - name: Developer friction backlash
    description: If the product blocks too many workflows or slows PR review, engineering teams may disable it despite the security value.
    mitigation: Start in monitor mode, ship precise high-risk policy templates for public-repo workflows, and pair blocking with one-click safe remediation suggestions.
  - name: Beachhead concentration
    description: Public-repo infrastructure companies are a sharp first customer set but may be smaller than expected if budget stays inside broader AppSec programs.
    mitigation: Land with public-repo companies first, then expand into enterprise internal platform teams using GitHub Actions for release automation and reusable workflows.
