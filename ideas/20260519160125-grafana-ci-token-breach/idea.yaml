jobsToBeDone:
  - job: >-
      When our engineering team updates a GitHub Actions workflow in a public
      repo, help our platform security lead prove that community PRs and
      third-party actions cannot reach privileged tokens, so we can merge
      faster without opening a code-exfiltration path.
    currentAlternative: Manual workflow review plus basic CI linting
    successMetric: Number of privileged workflow changes approved without later emergency rollback
  - job: >-
      When our release pipeline still needs secrets or elevated repo access,
      help our platform team replace static credentials with scoped short-lived
      access, so we can keep release automation running without leaving durable
      tokens exposed in CI.
    currentAlternative: Long-lived GitHub tokens, repository secrets, and internal scripts
    successMetric: Reduction in long-lived privileged tokens used by GitHub Actions
