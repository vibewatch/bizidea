problem: >-
  Open-source and developer-platform companies depend on GitHub Actions to let
  maintainers review community PRs, run privileged checks, and publish releases
  quickly. But a single workflow misconfiguration can turn contributor
  automation into a secret-exfiltration path that exposes source code,
  credentials, and release pipelines before any customer-facing system is
  touched. Existing AppSec tooling rarely models GitHub event semantics,
  token reachability, and blast radius well enough to stop these incidents
  before a maintainer merges the dangerous workflow.
targetUser:
  primary: >-
    Platform security and developer productivity engineers at open-core and
    infrastructure software companies that run public GitHub repos with external
    contributors and privileged Actions workflows
  secondary: >-
    Product security leads responsible for release engineering, GitHub
    administration, and incident response across engineering organizations
  buyer: >-
    Director of platform engineering, head of product security, or VP
    engineering at a software company with public repos and automated release
    pipelines
startupThesis:
  nonObviousInsight: >-
    The emerging CI security problem is not just leaked long-lived secrets. It
    is workflow privilege design. As more software companies optimize for
    outside contributors, bot automation, and GitHub-native release workflows,
    attackers can exploit event-context edge cases like pull_request_target to
    reach highly privileged tokens from seemingly normal PR activity. The winner
    will be the control layer that simulates those privilege paths before merge
    and brokers just-in-time credentials during execution.
  beachhead: >-
    Open-core and infrastructure software vendors with 10-100 public GitHub
    repositories, active outside contributors, and GitHub Actions workflows
    that use pull_request_target, reusable workflows, or GitHub App tokens for
    tests, triage, and release automation
  wedge: >-
    A GitHub Actions privilege firewall that simulates whether a workflow
    change, event trigger, or third-party action can reach sensitive tokens,
    blocks risky merges, and swaps static CI secrets for ephemeral brokered
    credentials at runtime
  whyNowCatalyst: >-
    Grafana's breach shows that one misconfigured GitHub Action can turn public
    repo automation into code theft, extortion, and workflow shutdown, making
    CI privilege design an urgent board-visible problem for engineering leaders.
  ventureScalePath: >-
    Start with GitHub Actions policy simulation and token brokering, then
    expand into GitLab, Buildkite, and cloud CI pipelines, release-signing
    controls, and machine-identity governance for the full software delivery
    stack.
solution: >-
  Workflow Privilege Firewall connects to a company's GitHub organization and
  continuously analyzes Actions YAML, repository settings, secrets, and trigger
  contexts. Before a workflow change lands, it simulates attacker paths such as
  untrusted PRs reaching pull_request_target jobs, unsafe third-party actions
  inheriting tokens, or reusable workflows escalating scopes across repos. At
  runtime it can replace static secrets with scoped, short-lived credentials
  issued only to approved jobs, while canary tokens and trace logs verify that
  no unexpected path executed. The first product is intentionally narrow: keep
  public-repo CI safe without forcing teams to disable contributor automation
  or freeze releases after an incident.
goToMarketSeed:
  firstCustomer: >-
    A Series B to public open-source infrastructure company with 20-200
    engineers, 10 or more public GitHub repos, community pull requests, and a
    release pipeline that currently relies on GitHub Actions secrets or GitHub
    App tokens
  buyingTrigger: >-
    A workflow security review, recent contributor-driven incident, or board
    request to prove that public-repo CI cannot leak tokens or source code
    before the next release cycle
  currentAlternative: >-
    Manual workflow reviews, GitHub Advanced Security and linting tools,
    internal scripts, and broad workflow shutdowns after incidents or audits
  switchingReason: >-
    This wedge models actual GitHub event semantics and secret reachability,
    then enforces ephemeral access at runtime, which is far more specific and
    less disruptive than generic code scanning or simply turning workflows off
  pricingHypothesis: >-
    Annual platform fee priced by number of protected repositories and
    privileged workflow runs, with premium pricing for runtime token brokering
    and incident-drill modules
