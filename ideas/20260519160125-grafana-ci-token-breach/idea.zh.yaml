topRisks:
- name: 原生平台追赶
  description: GitHub 可能补上更强的内建工作流仿真和临时凭证控制，把产品切口压窄。
  mitigation: 把重点放在跨仓权限图、运行时 token broker 和组织级策略覆盖上——这些都不是仓库内原生检查能接住的。
- name: 开发者摩擦反弹
  description: 如果产品拦下太多工作流或拖慢 PR 审核，即使安全价值存在，工程团队也可能把它关掉。
  mitigation: 先从 monitor mode 落地，给公共仓工作流提供精确的高风险策略模板，再把拦截和一键安全修复建议绑在一起。
- name: 滩头市场过于集中
  description: 公共仓基础设施公司是很锋利的首批客户，但如果预算始终锁在更大的 AppSec 计划里，这个群体可能比预期更小。
  mitigation: 先在公共仓公司里站稳，再沿着 GitHub Actions 的发布自动化和可复用工作流，扩到企业内部平台团队。
