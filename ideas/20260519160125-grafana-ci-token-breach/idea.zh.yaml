jobsToBeDone:
- job: 当工程团队在公共仓里更新 GitHub Actions 工作流时，帮平台安全负责人证明社区 PR 和第三方 action 触不到高权限 token，这样我们就能更快合并，也不会打开代码外流通道。
  currentAlternative: 人工审工作流，加上基础 CI lint
  successMetric: 获批的高权限工作流变更数量，且后续没有再触发紧急回滚
- job: 当发布流水线仍需要 secret 或更高仓库权限时，帮平台团队把静态凭证换成限域的短期访问，这样发布自动化还能继续跑，但 CI 里不会长期挂着高权限 token。
  currentAlternative: 长期有效的 GitHub token、仓库 secret 和内部脚本
  successMetric: GitHub Actions 使用的长期高权限 token 数量下降多少
