problem: 开源软件和开发者平台公司离不开 GitHub Actions：维护者要审社区 PR、跑高权限检查、发版本，都得靠它提速。但只要一个工作流配错，面向贡献者的自动化就会变成 secret 外流通道，在任何客户侧系统受影响之前先把源码、凭证和发布流水线暴露出去。现有 AppSec 工具很少能把 GitHub 事件语义、token 可达性和爆炸半径建模到位，因此往往拦不住这种事故在维护者合并危险工作流之前发生。
targetUser:
  primary: 开源商业化和基础设施软件公司里负责 GitHub 管理与 CI 稳定性的 platform security、developer productivity 工程师——他们运营公共 GitHub 仓库，有外部贡献者，也有高权限 Actions 工作流。
  secondary: 负责发布工程、GitHub 管理和事故响应的产品安全负责人。
  buyer: 拥有公共仓和自动化发布流水线的软件公司里的平台工程总监、产品安全负责人或 VP Engineering。
startupThesis:
  nonObviousInsight: 新冒出来的 CI 安全问题，不只是长期 secret 泄露，更关键的是工作流权限设计。越来越多软件公司为了外部贡献者、bot 自动化和 GitHub 原生发布流程去优化时，攻击者就能利用 pull_request_target 这类事件上下文边角，借看起来正常的 PR 活动摸到高权限 token。真正的赢家会是那层控制面：在合并前把这些权限路径先跑一遍，在执行时再按需发放凭证。
  beachhead: 拥有 10-100 个公共 GitHub 仓库、外部贡献者活跃，而且在测试、分诊和发布自动化里使用 pull_request_target、可复用工作流或 GitHub App token 的开源商业化与基础设施软件厂商。
  wedge: 一层 GitHub Actions 权限防火墙：仿真某次工作流变更、事件触发器或第三方 action 会不会摸到敏感 token，拦下高风险合并，并在运行时把静态 CI secret 换成临时的 broker 凭证。
  whyNowCatalyst: Grafana 的事故证明，一个配置错误的 GitHub Action 就足以把公共仓自动化变成代码窃取、勒索和工作流停摆的起点，CI 权限设计因此成了工程负责人眼前立刻要处理、而且董事会能看见的问题。
  ventureScalePath: 先从 GitHub Actions 策略仿真和 token broker 切入，之后再扩到 GitLab、Buildkite 和云 CI 流水线、发布签名控制，以及覆盖整条软件交付栈的机器身份治理。
solution: Workflow Privilege Firewall 接入公司的 GitHub organization，持续分析 Actions YAML、仓库设置、secret 和触发上下文。每次工作流变更落地前，它都会先模拟攻击者路径——比如不可信 PR 是否能打到 pull_request_target 任务、不安全的第三方 action 会不会继承 token、可复用工作流会不会跨仓把权限抬高。运行时，它还能把静态 secret 换成只发给获批任务的短期、限域凭证，再用 canary token 和 trace log 验证没有意外路径真的跑起来。首版产品刻意保持收窄：目标就是在不迫使团队关掉贡献者自动化、也不让发布在事故后被冻结的前提下，把公共仓 CI 守住。
goToMarketSeed:
  firstCustomer: 一家从 Series B 到上市区间的开源基础设施公司：20-200 名工程师、至少 10 个公共 GitHub 仓库、有社区 PR，而且当前发布流水线仍依赖 GitHub Actions secret 或 GitHub App token。
  buyingTrigger: 在下一轮发布前，团队收到工作流安全审查、刚经历过一次由贡献者触发的事故，或被董事会要求证明公共仓 CI 不会泄露 token 或源码。
  currentAlternative: 人工审工作流、GitHub Advanced Security 与 lint 工具、内部脚本，以及在事故或审计后直接大面积关闭工作流。
  switchingReason: 这套切口直接建模 GitHub 真实的事件语义和 secret 可达性，再在运行时执行临时授权，比泛化的代码扫描或干脆把工作流关掉都更准，也更不打扰研发。
  pricingHypothesis: 按受保护仓库数量和高权限工作流运行次数收年费；运行时 token broker 和事故演练模块再加价。
