differentiator: 大多数开发者安全产品，要么扫代码里的 secret，要么给 CI 跑通用策略 lint。这家公司盯的是更窄、也更疼的控制点：GitHub 事件上下文、token scope 和仓库拓扑叠在一起，才会变成真实的权限提升风险。它的护城河可以随着组织级工作流图、token 可达性模型，以及跨公共仓软件公司的危险 CI 模式数据集一起越滚越厚。
