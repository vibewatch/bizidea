competitors:
- name: GitHub Advanced Security
  stage: incumbent
  wedge: Native code security, secret protection, and software supply chain features built directly into GitHub.
  pricing: $19 per active committer/month for Secret Protection; $30 per active committer/month for Code Security.
  strength: Native distribution, low deployment friction, and strong adjacency to repository administration.
  weaknessVsUs: Does not clearly center on simulating public-fork privilege paths or brokering least-privilege runtime credentials across workflow sprawl.
  sourceRefs:
  - 10
  - 11
- name: StepSecurity
  stage: scale-up
  wedge: GitHub Actions-specific audit, runner hardening, egress control, and runtime runner telemetry.
  pricing: Free community tier for public repos; Enterprise from $16 per contributing developer/month.
  strength: Deep GitHub Actions specialization plus visible open-source adoption and audit-led entry points.
  weaknessVsUs: More focused on hardening and monitoring running jobs than on pre-merge privilege graph simulation and token brokerage across repo topology.
  sourceRefs:
  - 18
  - 19
  - 20
  - 49
- name: Endor Labs
  stage: scale-up
  wedge: Broader software supply chain and CI/CD security platform that treats GitHub Actions as part of the software factory attack surface.
  pricing: Free developer tier; full-platform pricing is sales-led / bundled.
  strength: Broad SSCS context, strong incident education content, and a credible CI/CD audit story.
  weaknessVsUs: Less narrowly focused on public-repo contributor automation and may feel heavier than buyers seeking one urgent GitHub-specific fix.
  sourceRefs:
  - 23
  - 24
  - 42
- name: Legit Security
  stage: scale-up
  wedge: Software supply chain and ASPM coverage across the broader software factory, including secrets and CI/CD processes.
  pricing: Custom enterprise pricing via demo-led sales.
  strength: Strong platform narrative for organizations trying to centralize AppSec and software-factory risk.
  weaknessVsUs: Broader platform framing can blur the very specific GitHub event-semantics and privilege-path pain that the proposed startup is targeting first.
  sourceRefs:
  - 21
  - 22
- name: Arnica
  stage: scale-up
  wedge: Developer-centric code risk, secrets mitigation, and pipelineless / behavior-based workflow security.
  pricing: Published identity-based pricing from $360 to $720 per identity per year, plus add-ons.
  strength: Connects source-code behavior, secrets, and automation workflows with an emphasis on rapid remediation.
  weaknessVsUs: Scope is broader than GitHub workflow privilege design, which may dilute a narrowly incident-driven buyer conversation.
  sourceRefs:
  - 25
  - 26
regulatoryTechnicalConstraints:
- point: Combining pull_request_target with checkout or execution of untrusted PR code can expose write permissions or secrets to attackers.
  sourceRefs:
  - 3
  - 7
- point: Least-privilege GITHUB_TOKEN settings, secret registration, and careful secret handling are necessary because workflow logs and broad permissions can leak sensitive values.
  sourceRefs:
  - 6
  - 8
  - 34
  - 39
- point: Self-hosted runners materially raise blast radius because runner isolation and network reachability become part of the trust boundary.
  sourceRefs:
  - 33
  - 45
- point: Attestations and reusable workflows improve software assurance, but they also require teams to standardize build patterns before higher-assurance policy can be enforced broadly.
  sourceRefs:
  - 16
  - 36
