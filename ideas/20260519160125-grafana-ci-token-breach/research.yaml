reportMemo:
  executiveTakeaways:
  - The Grafana incident and repeated pwn-request style disclosures show public-repo GitHub Actions has become a distinct machine-identity and workflow-privilege problem, not just a secrets-scanning problem.
  - 'Budget exists, but the market is fragmented: GitHub sells native protection, StepSecurity owns runner hardening mindshare, and broader ASPM vendors cover CI/CD as one module inside larger platforms.'
  - A focused wedge still exists around pre-merge privilege simulation plus runtime credential brokering because buyers want safer contributor automation without shutting workflows off.
  - The strongest go-to-market motion is incident-driven and audit-led, then expands into OIDC migration, reusable workflows, and organization-wide release governance.
  marketDefinition: Workflow-privilege and machine-identity security for software teams running GitHub Actions in public or semi-public repositories, especially where external contributors, reusable workflows, and privileged release jobs coexist.
  customerAndBuyer: Primary users are platform security, release engineering, and platform engineering teams that own GitHub administration and CI reliability. The likely buyer is the head of platform engineering, director of product security, or VP engineering at a software vendor with meaningful public-repo automation.
  buyingTriggers:
  - point: A contributor-driven incident, red-team finding, or board request to prove that public-repo CI cannot leak tokens or source code before the next release cycle.
    sourceRefs:
    - 1
    - 2
    - 19
  - point: An active program to replace long-lived CI secrets with OIDC or other short-lived credentials across workflows and cloud access paths.
    sourceRefs:
    - 9
    - 38
    - 44
  - point: Enterprise procurement or compliance reviews that force software vendors to evidence secure-by-design and secure development controls around the build pipeline.
    sourceRefs:
    - 13
    - 14
    - 31
  willingnessToPay:
    summary: 'Adjacent budget is already real: GitHub Secret Protection is priced at $19 per active committer per month, StepSecurity Enterprise starts at $16 per contributing developer per month, and Arnica publishes identity-based annual pricing. That supports a high-four to low-five figure annual budget for a narrower CI privilege control in the beachhead.'
    sourceRefs:
    - 11
    - 18
    - 25
  competitiveLandscape: The landscape splits into native platform controls, GitHub-specialist runner/workflow tools, and broader software-factory platforms. Buyers have alternatives, but none of them clearly own the narrow job of simulating public-fork privilege paths and then brokering least-privilege credentials at runtime.
  incumbentThesis:
  - incumbentClass: Native GitHub controls
    point: GitHub improves the baseline and will keep absorbing generic hardening, but native coverage is optimized for broad platform safety rather than cross-repo privilege simulation and retrofit remediation across existing workflow sprawl.
    sourceRefs:
    - 10
    - 28
  - incumbentClass: Broad ASPM platforms
    point: ASPM and software-factory vendors can cover CI/CD, but their value proposition is broader and heavier than the immediate pain a public-repo platform team is trying to solve after a workflow incident.
    sourceRefs:
    - 21
    - 23
  - incumbentClass: Secrets managers and cloud IAM
    point: OIDC and secret managers reduce secret sprawl, but they do not model whether a given trigger, checkout pattern, or reusable workflow can still reach privileged operations.
    sourceRefs:
    - 9
    - 44
  - incumbentClass: Manual reviews and internal scripts
    point: Teams still rely on manual workflow review and ad hoc audits, but that substitute breaks down when many repositories and contributor workflows change continuously.
    sourceRefs:
    - 19
    - 37
    - 49
  regulatoryLandscape: Regulation is not yet a direct category mandate for a GitHub-specific firewall, but secure-software frameworks and product-security laws increasingly make CI and release controls part of vendor due diligence.
  technologyLandscape: The technical stack is coalescing around least-privilege GITHUB_TOKEN settings, OIDC for short-lived cloud access, reusable workflows, SHA-pinned third-party actions, and build provenance / attestations. That lowers implementation friction for a focused control plane while also raising the bar of native alternatives.
  distributionChannels:
  - point: Incident-driven outbound using GitHub Actions audits and post-incident hardening reviews is the clearest way to open conversations with platform-security buyers.
    sourceRefs:
    - 19
    - 42
  - point: A freemium or open-source tier for public repositories can seed adoption and create expansion paths into private repos and enterprise runner environments.
    sourceRefs:
    - 18
    - 49
  - point: Compliance and security-consulting partners can attach the product to SSDF, secure-by-design, or CRA remediation programs that already touch build and release controls.
    sourceRefs:
    - 13
    - 14
    - 31
  partnershipEcosystem:
  - point: Cloud IAM and secret-management partners matter because the wedge becomes stronger when it can replace static CI secrets with OIDC or brokered credentials.
    sourceRefs:
    - 9
    - 38
    - 44
  - point: GitHub ecosystem and supply-chain standards tooling matter because reusable workflows and attestations are becoming the path to higher-assurance builds.
    sourceRefs:
    - 10
    - 35
    - 36
  - point: Incident-response and software-supply-chain specialists are a practical channel because workflow breaches create urgent, visible remediation projects.
    sourceRefs:
    - 1
    - 24
  dataMoats:
  - point: Organization-specific maps of which triggers, jobs, workflows, and API calls actually require privileged GitHub permissions can become difficult for competitors to replicate quickly.
    sourceRefs:
    - 19
    - 39
  - point: Runtime telemetry about abnormal egress, token use, and canary-style detections inside CI creates a differentiated dataset beyond static YAML scanning.
    sourceRefs:
    - 2
    - 20
    - 49
  - point: Remediation data showing which policy recommendations preserve developer flow across many repos can compound into a practical workflow-policy moat.
    sourceRefs:
    - 37
    - 49
  geographicConsiderations:
  - point: EU customers are more likely to tie CI controls to product-security and provenance expectations under the Cyber Resilience Act, which favors attestations and build-process evidence.
    sourceRefs:
    - 31
    - 36
  - point: US federal and regulated-enterprise buyers increasingly map supplier expectations back to SSDF and secure-by-design language, which helps justify pipeline-control spend.
    sourceRefs:
    - 13
    - 14
  - point: Self-hosted runners in regulated or data-residency-sensitive environments may expand ACV, but they also raise deployment scrutiny because runner isolation and network boundaries matter more.
    sourceRefs:
    - 33
    - 45
  sensitivityCases:
  - case: GitHub ships more of its 2026 Actions security roadmap quickly than expected.
    impact: Standalone monitoring value compresses; the startup must lean harder into pre-merge privilege simulation, cross-repo policy, and brokered runtime credentials.
    sourceRefs:
    - 10
    - 28
  - case: Customers accelerate OIDC and secretless workflow adoption.
    impact: Static secret-detection value falls, but the control point shifts toward policy orchestration, trust boundaries, and runtime approval flows.
    sourceRefs:
    - 9
    - 38
    - 44
  - case: Demand shifts toward self-hosted-runner-heavy enterprises rather than open-core vendors.
    impact: Average contract value rises, but onboarding and security-review cycles lengthen because runtime isolation and network policy become central.
    sourceRefs:
    - 33
    - 45
  validationPlan:
  - priority: high
    question: How many beachhead organizations currently use pull_request_target, reusable workflows, or third-party actions with write-scoped tokens in public repos?
    evidenceToGather: Run 50 design-partner GitHub org audits and quantify risky trigger / permission patterns per repo and per workflow.
  - priority: high
    question: 'Which budget owner actually buys this category: platform engineering, product security, or broader AppSec?'
    evidenceToGather: Interview 20 target buyers and compare current spend on GHAS, StepSecurity, secret managers, and internal CI hardening projects.
  - priority: medium
    question: How much developer friction will teams tolerate before they disable blocking policies?
    evidenceToGather: Pilot monitor mode and selective blocking in 10 organizations, then measure false positives, time-to-remediate, and avoided workflow shutdowns.
