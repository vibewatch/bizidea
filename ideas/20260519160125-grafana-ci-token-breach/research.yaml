  pestle:
  - factor: political
    impact: positive
    point: Secure-by-design pressure shifts more accountability to software producers, making CI and release controls easier to justify at the executive level.
    sourceRefs:
    - 13
    - 14
  - factor: legal
    impact: positive
    point: The Cyber Resilience Act pushes product makers toward stronger build and software-assurance evidence, which increases demand for provenance-aware CI controls.
    sourceRefs:
    - 31
    - 14
  - factor: social
    impact: positive
    point: Open-source contribution and AI-assisted development expand public-repo activity and workflow complexity, enlarging the exposed surface area.
    sourceRefs:
    - 1
    - 27
  - factor: technological
    impact: positive
    point: OIDC, reusable workflows, and artifact attestations create the primitives needed for more enforceable least-privilege and provenance controls in CI.
    sourceRefs:
    - 9
    - 35
    - 36
  - factor: economic
    impact: negative
    point: Security teams are under pressure to consolidate vendors, so a point solution must prove faster time-to-remediation than broader platform suites or native GitHub bundles.
    sourceRefs:
    - 10
    - 11
    - 18
  adoptionFrictionMatrix:
  - friction: False positives or noisy merge blocks on developer workflows
    severity: high
    affectedBuyer: Platform engineering leader
    mitigation: Start in monitor mode, ship precise policies for public-fork and privileged-workflow patterns, and attach one-click remediations.
    sourceRefs:
    - 19
    - 37
  - friction: Integrating OIDC or brokered credentials into existing release jobs
    severity: medium
    affectedBuyer: Product security lead
    mitigation: Prioritize the highest-privilege jobs first and pair policy findings with ready-made migration patterns.
    sourceRefs:
    - 9
    - 38
    - 44
  - friction: Limited visibility into self-hosted runner risk and network reachability
    severity: high
    affectedBuyer: Infrastructure security manager
    mitigation: Layer audit, runtime telemetry, and egress controls before enforcing policy across private runner fleets.
    sourceRefs:
    - 33
    - 45
  - friction: Confusion over overlap with GitHub’s native roadmap
    severity: medium
    affectedBuyer: CISO / VP Engineering
    mitigation: Position the product as the retrofit and cross-repo control plane for today’s workflow sprawl, not a replacement for baseline native features.
    sourceRefs:
    - 10
    - 28
