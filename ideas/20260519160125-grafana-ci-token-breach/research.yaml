openQuestions:
- How many beachhead organizations currently use pull_request_target, reusable workflows, or third-party actions with write-scoped tokens in public repositories?
- Does the budget sit primarily with platform engineering, product security, or a broader AppSec owner in mid-market and enterprise software vendors?
- How much of the proposed wedge will GitHub’s native Actions security roadmap absorb over the next 12-24 months?
- What false-positive rate or merge-delay threshold causes engineering teams to disable blocking workflow policies?
