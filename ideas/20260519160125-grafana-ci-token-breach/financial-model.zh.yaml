slug: workflow-privilege-firewall
date: '2026-05-19'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP business-plan date 2026-05-19] 从 business-plan 日期后的第一个完整月份开始。'
- id: A2
  name: 期初现金与 pre-seed 规模
  value: '2500.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 基准情景采用 $2.5M 的 pre-seed，落在给定区间内，资金规模按跑到 Q4Y2 证明点并额外留出约 6 个月缓冲来定。'
- id: A3
  name: 起始客户数（M1）
  value: '0'
  unit: organizations
  source: '[BP executiveSummary + BP investorMemo.firstCustomer.initialContract] 公司从零收入起步，先得拿下由审计带来的付费试点。'
- id: A4
  name: Y1 客户爬坡
  value: 6 paying organizations by M12, with first paid pilot in M4
  unit: organizations
  source: '[BP milestones 0-12 months] 锚定首年 5-8 个付费试点、至少 3 个试点转年付；月度节奏是创业财务上的插值。'
- id: A5
  name: Y2 客户爬坡
  value: Q1Y2 9, Q2Y2 12, Q3Y2 15, Q4Y2 18 paying organizations
  unit: organizations
  source: '[BP milestones 12-24 months + BP gtm.funnelTargets] 反映审计→试点转化开始可复制，而且首批标杆部署后出现早期多仓扩张。'
- id: A6
  name: Y3 客户爬坡
  value: Q1Y3 24, Q2Y3 32, Q3Y3 40, Q4Y3 50 paying organizations
  unit: organizations
  source: '[BP market.som + BP experimentRoadmap + research reportMemo.distributionChannels] 假设 GitHub 滩头市场验证后，伙伴会协助增长，同时仍明显低于研究里 200 客户的 SOM。'
- id: A7
  name: 定价阶梯
  value: $18K paid pilot over 3 months, ~$36K initial production ACV, and ~$55K blended exit ACV
  unit: usdK_per_customer_year
  source: '[BP investorMemo.firstCustomer.initialContract + BP gtm.pricing + research willingnessToPay] 采用 $15K-25K 试点区间的中位数，且年费仍落在研究所示的高四位到低五位数预算带内。'
- id: A8
  name: Y1 已实现收入节奏
  value: M4-M5 $6K, M6-M7 $12K, M8-M9 $18K, M10-M11 $24K, M12 $30K
  unit: USDK_per_month
  source: '[BP milestones 0-12 months + A7] 让第 1 年以试点为主，到年末形成 3 个年付部署和 3 个在跑试点。'
- id: A9
  name: Y2 已实现季度收入
  value: Q1Y2 $135K, Q2Y2 $180K, Q3Y2 $228K, Q4Y2 $288K
  unit: USDK_per_quarter
  source: '[BP milestones 12-24 months + BP businessModel.expansionLevers] 随着试点转正、受保护仓库增加、运行时凭证 broker 进入生产部署，收入逐季抬升。'
- id: A10
  name: Y3 已实现季度收入
  value: Q1Y3 $360K, Q2Y3 $465K, Q3Y3 $570K, Q4Y3 $690K
  unit: USDK_per_quarter
  source: '[BP market.som + research market.som + A7] 退出 ARR 约 $2.76M，仍低于研究里的第 3 年 SOM $4.8M，同时假设仓库覆盖更广、且高阶运行时模块开始贡献。'
- id: A11
  name: 毛利率爬坡
  value: Y1 60.7%, Y2 71.6%, Y3 77.4%, with quarterly ramp to 78% steady state
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 80 + BP strategicChoices.sequencingRationale] 早期审计和导入服务压低毛利，随后 monitor mode、拦截模板和 broker 凭证逐步产品化。'
- id: A12
  name: 用于单位经济模型的月度 logo 流失率
  value: '1.6'
  unit: percent
  source: '[Startup-finance heuristic] 卖给年付安全基础设施的产品，流失率应低于 SMB SaaS；但这个切口还早，也暴露在原生平台压缩之下。'
- id: A13
  name: 稳态 CAC
  value: '35.0'
  unit: USDK_per_customer
  source: '[BP gtm.channels + BP gtm.funnelTargets + research buyingTriggers] 创始人主导的事故销售、技术试点和安全评审周期，支撑一个全成本中五位数 CAC。'
- id: A14
  name: 全成本薪酬带
  value: Founder 140; workflow engineer 190; security engineer 180; solutions engineer 150; GTM lead 170; customer success/growth 160
  unit: annualK_per_FTE
  source: '[BP team + startup-finance heuristic] 假设要招到偏资深的安全人才，但仍保持 seed 阶段偏精简的现金薪酬。'
- id: A15
  name: 招聘节奏
  value: Solutions engineer in M4, security engineer in M7, GTM lead in M10, second engineer in Q4Y2, customer success/growth in Q3Y3
  unit: timing
  source: '[BP team + BP strategicChoices.sequencingRationale] 先做交付和产品加固，再放大 GTM；客户成功岗位要等生产客户群体变大后再补。'
- id: A16
  name: 期末团队规模
  value: 2 FTE by Q1Y1, 5 by Q4Y1, 6 by Q4Y2, and 7 by Q4Y3
  unit: FTE
  source: '[BP team + BP fundingAsk.useOfFundsSummary] 团队规模保持在 pre-seed 能承受的范围内，同时覆盖产品、导入、安全工程和创始人主导销售。'
- id: A17
  name: 非薪酬运营开支方法
  value: Lean cloud, travel, insurance, tooling, and legal spend, with no large services bench
  unit: policy
  source: '[BP operations + startup-finance heuristic] 模型假设这是一个软件控制面加创始人主导审计，而不是重咨询实施模式。'
- id: A18
  name: 现金流简化假设
  value: Ending cash equals opening cash plus cumulative EBITDA
  unit: formula
  source: '[Startup-finance heuristic] 假设一家软件优先的公司营运资金波动、capex、债务和递延收入失真都有限，因此期末现金≈期初现金+累计 EBITDA。'
- id: A19
  name: 融资规模规则
  value: Raise enough to reach the Q4Y2 milestone and preserve about 6 months of cash buffer
  unit: policy
  source: '[BP fundingAsk runwayMonths 18 + model requirement] 模型把已写明的 18 个月目标，延展成“跑到关键里程碑再多留一段缓冲”的融资规模。'
- id: A20
  name: 下行情景变化
  value: Q4Y3 customers 35, exit ACV ~$48K, gross margin 72%, and sales cycle stretches to 9 months
  unit: scenario_inputs
  source: '[BP risks + research sensitivityCases] 捕捉预算并表、GitHub 原生能力压缩，以及更偏服务化部署三种下行因素。'
- id: A21
  name: 上行情景变化
  value: Q4Y3 customers 65, exit ACV ~$58K, gross margin 80%, and partner channel pulls conversions forward by roughly one quarter
  unit: scenario_inputs
  source: '[BP experimentRoadmap + BP milestones 24-36 months] 上行情景假设 design partner 证明让审计销售和伙伴渠道都更快跑通，而不需要明显提前扩编。'
