scenarios:
  downside:
    description: GitHub 持续补强原生控制，试点转化变慢，部署也比基准情景更依赖服务。
    y3RevenueK: 1500.0
    y3EbitdaK: -620.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
    - Q4Y3 客户数只到 35 家，而不是 50 家。
    - 混合退出 ACV 卡在约 $48K，因为更少账户能扩到更广的仓库覆盖和高阶模块。
    - 毛利率最多到 72%，因为导入、修复协助和运行时支持始终偏高。
  base:
    description: 公司在 Y1 拿下 6 个付费 logo，到 Q4Y2 达到 18 个，并在 Y3 结束时以约 $2.76M ARR 服务 50 家组织，全程不需要一支庞大的服务团队。
    y3RevenueK: 2085.0
    y3EbitdaK: -254.5
    cashLowPointK: 464.5
    keyAssumptionChanges:
    - 对应 A1-A21：M12 达到 6 个付费组织、Q4Y2 达到 18 个、Q4Y3 达到 50 个。
    - 采用 $18K 试点、约 $36K 初始部署，以及约 $55K 混合退出 ACV 的阶梯。
    - 随着策略模板和 broker 凭证更标准化，毛利率从 Y1 的 60.7% 提升到 Y3 的 77.4%。
  upside:
    description: 事故驱动需求和生态伙伴加快转化速度，在不明显提前扩编的前提下，实现更广的仓库扩张和更好的利润率。
    y3RevenueK: 2600.0
    y3EbitdaK: -20.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - 由于伙伴来源 pipeline 在 Y2 后段开始起效，Q4Y3 客户数达到 65 家，而不是 50 家。
    - 更多客户采用拦截、凭证 broker 和发布治理模块，混合退出 ACV 提升到约 $58K。
    - 导入更自助、需要创始人亲自介入的例外更少，因此毛利率达到 80%。
