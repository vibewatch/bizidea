modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Incidents[事故 / 审计触发] --> Pilots[付费试点]
      Pilots --> Deployments[年付部署]
      Deployments --> Expansion[更多仓库 + broker 运行]
      Expansion --> Revenue[订阅 + 用量收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金 / 跑道]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自两步：先把审计带来的试点转成年付部署，再在每个账户内部扩张受保护仓库和 broker 工作流运行量。
- checkName: 必须跑通的环节
  finding: 模型要求试点→生产转化基本维持在计划的 6 个月周期附近，否则创始人主导审计会跑在经常性软件收入前面。
- checkName: 模型会在哪种情况下失效
  finding: 最大的现金风险是转化更慢、同时毛利更低，因为下行情景会在下一轮融资前把现金打到零以下。
- checkName: 下一轮融资证明点
  finding: 下一轮最好讲的故事，是到 Q4Y2 已有 18+ 个付费组织，拦截和凭证 broker 在生产环境里跑起来了，而且 partner-assisted 扩张路径已经清晰。
sanityChecks:
  ruleOf40: Y3 增长率 151.0% 加 EBITDA 利润率 -12.2% = 138.8%；方向上很强，但也受益于 Y2 收入基数仍小。
  burnMultiple: Y1 burn multiple 约 2.6x，对应约 $0.36M 的退出 ARR；Y2 随着退出 ARR 升至约 $1.15M，改善到约 1.1x；Y3 在约 $2.76M 的退出 ARR 下进一步改善到约 0.2x。
  revenuePerFte: $298K 的 Y3 已确认收入 / Q4Y3 每个 FTE；若按退出 ARR 口径则约为 $394K（SaaS 基准 $200-400K）。
  flags:
  - 基准情景假设，以审计带销售的动作能从创始人亲自卖，顺利过渡到 partner-assisted 获客，而在 Y3 前只新增 1 个专职 GTM 负责人。
  - 公司在 Y3 大部分时间里仍是 EBITDA 负值，因此如果 Q4Y3 的转化速度不能继续抬升，下一轮融资依旧大概率要来。
  - 定价暴露在 GitHub 原生能力扩张和更大平台打包销售之下，ARPU 可能比模型假设得更快被压缩。
