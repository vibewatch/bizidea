reportMemo:
  executiveTakeaways:
  - Grafana 事故和反复出现的 pwn-request 式披露说明，公共仓 GitHub Actions 已经是一类独立的机器身份与工作流权限问题，不只是 secret 扫描问题。
  - 预算已经存在，但市场高度分散：GitHub 卖原生防护，StepSecurity 占住 runner 加固心智，更广义的 ASPM 厂商则把 CI/CD 当成大平台里的一个模块。
  - 围绕“合并前权限仿真 + 运行时凭证 broker”仍然有一个聚焦切口，因为买方想要的是更安全的贡献者自动化，而不是把工作流整片关掉。
  - 最强的 GTM 动作是事故驱动、审计先行，再顺势扩到 OIDC 迁移、可复用工作流和组织级发布治理。
  marketDefinition: 面向在公共或半公共仓库运行 GitHub Actions 的软件团队的工作流权限与机器身份安全，尤其适用于外部贡献者、可复用工作流和高权限发布任务同时存在的场景。
  customerAndBuyer: 核心用户是负责 GitHub 管理和 CI 稳定性的 platform security、release engineering 与 platform engineering 团队。最可能的买方，是拥有明显公共仓自动化的软件厂商里的平台工程负责人、产品安全总监或 VP Engineering。
  buyingTriggers:
  - point: 一次由贡献者触发的事故、红队发现，或董事会要求团队在下一轮发布前证明公共仓 CI 不会泄露 token 或源码。
    sourceRefs:
    - 1
    - 2
    - 19
  - point: 团队正在推进把长期 CI secret 替换为 OIDC 或其他短期凭证，覆盖工作流和云访问路径。
    sourceRefs:
    - 9
    - 38
    - 44
  - point: 企业采购或合规审查要求软件厂商就构建流水线给出 secure-by-design 和 secure development 控制证据。
    sourceRefs:
    - 13
    - 14
    - 31
  willingnessToPay:
    summary: 相邻预算今天就存在：GitHub Secret Protection 定价为每活跃 committer 每月 $19，StepSecurity Enterprise 起价为每贡献开发者每月 $16，Arnica 也公开了基于身份的年费定价。这足以支撑滩头市场里一个更窄的 CI 权限控制产品拿到高四位到低五位数的年预算。
    sourceRefs:
    - 11
    - 18
    - 25
  competitiveLandscape: 市场已经分成三层：原生平台控制、GitHub 垂直 runner/工作流工具，以及更广义的软件工厂平台。买方替代方案很多，但还没有谁真正占住“先模拟公共 fork 权限路径，再在运行时 broker 最小权限凭证”这件很窄却很痛的工作。
  incumbentThesis:
  - incumbentClass: GitHub 原生控制
    point: GitHub 会持续补齐基线，并不断吸收通用加固能力；但原生覆盖更偏向大盘安全，而不是跨仓权限仿真与对存量工作流蔓延的补救。
    sourceRefs:
    - 10
    - 28
  - incumbentClass: 广义 ASPM 平台
    point: ASPM 和软件工厂厂商可以覆盖 CI/CD，但它们的价值主张更大更重，往往超出一支公共仓平台团队在工作流事故后眼下要解决的痛点。
    sourceRefs:
    - 21
    - 23
  - incumbentClass: Secret manager 与云 IAM
    point: OIDC 和 secret manager 能减少 secret 蔓延，却不会建模某个触发器、checkout 模式或可复用工作流到底还能不能摸到高权限操作。
    sourceRefs:
    - 9
    - 44
  - incumbentClass: 人工审查与内部脚本
    point: 团队今天仍大量依赖人工审工作流和零散脚本做审计，但当仓库和贡献者工作流持续变化时，这种替代方案很快就会失效。
    sourceRefs:
    - 19
    - 37
    - 49
  regulatoryLandscape: 监管还没有直接要求必须上一个 GitHub 专用防火墙，但安全软件开发框架和产品安全法规已经越来越把 CI 与发布控制纳入供应商尽调范围。
  technologyLandscape: 技术栈正在围绕最小权限 GITHUB_TOKEN 设置、用于短期云访问的 OIDC、可复用工作流、SHA 固定的第三方 action，以及 build provenance / attestation 收敛。这既降低了聚焦型控制面的落地摩擦，也抬高了原生替代方案的门槛。
  distributionChannels:
  - point: 围绕 GitHub Actions 审计和事故后加固复盘做 outbound，是打开平台安全买方对话最清晰的方式。
    sourceRefs:
    - 19
    - 42
  - point: 给公共仓提供 freemium 或开源层，能先种出采用，再往私有仓和企业 runner 环境扩。
    sourceRefs:
    - 18
    - 49
  - point: 合规与安全咨询伙伴可以把产品挂到 SSDF、secure-by-design 或 CRA 整改项目上，因为这些项目本来就会碰到构建和发布控制。
    sourceRefs:
    - 13
    - 14
    - 31
  partnershipEcosystem:
  - point: 云 IAM 和 secret 管理伙伴很关键，因为只有把静态 CI secret 换成 OIDC 或 broker 凭证，这个切口才会更有力。
    sourceRefs:
    - 9
    - 38
    - 44
  - point: GitHub 生态和供应链标准工具也很重要，因为可复用工作流和 attestation 正在成为高保证构建的主路径。
    sourceRefs:
    - 10
    - 35
    - 36
  - point: 事故响应和软件供应链专家是很现实的渠道，因为工作流泄露天然会触发紧急、而且高度可见的整改项目。
    sourceRefs:
    - 1
    - 24
  dataMoats:
  - point: 组织级地图一旦标清哪些触发器、任务、工作流和 API 调用真正需要高权限 GitHub 权限，竞争对手就很难在短时间内复制。
    sourceRefs:
    - 19
    - 39
  - point: 关于异常外连、token 使用和 CI 内部 canary 式检测的运行时遥测，会形成一套区别于静态 YAML 扫描的数据集。
    sourceRefs:
    - 2
    - 20
    - 49
  - point: 不同策略建议在哪些情况下既能把风险降下来、又不打断开发者流，这类修复数据一旦跨多仓积累起来，就会变成很实用的工作流策略护城河。
    sourceRefs:
    - 37
    - 49
  geographicConsiderations:
  - point: 欧洲客户更可能把 CI 控制和《Cyber Resilience Act》下的产品安全、provenance 要求绑在一起，因此更重视 attestation 与构建流程证据。
    sourceRefs:
    - 31
    - 36
  - point: 美国联邦和受监管企业买方也越来越会把供应商要求映射回 SSDF 和 secure-by-design 语言，这有助于为流水线控制支出找依据。
    sourceRefs:
    - 13
    - 14
  - point: 在受监管或数据驻留敏感环境里，自托管 runner 可能抬高 ACV，但也会放大部署审查，因为 runner 隔离和网络边界都会变得更重要。
    sourceRefs:
    - 33
    - 45
  sensitivityCases:
  - case: 如果 GitHub 的 2026 Actions 安全路线图落地速度快于预期。
    impact: 独立监控价值会被压缩；创业公司必须更重地押注合并前权限仿真、跨仓策略和 broker 运行时凭证。
    sourceRefs:
    - 10
    - 28
  - case: 如果客户更快转向 OIDC 和无 secret 工作流。
    impact: 静态 secret 检测价值会下降，但控制点会转向策略编排、信任边界和运行时审批流。
    sourceRefs:
    - 9
    - 38
    - 44
  - case: 如果需求更多来自自托管 runner 很重的企业，而不是开源商业化厂商。
    impact: 平均合同额会上升，但导入和安全评审周期会拉长，因为运行时隔离和网络策略会变成核心问题。
    sourceRefs:
    - 33
    - 45
  validationPlan:
  - priority: 高
    question: 有多少滩头市场组织现在还在公共仓里使用 pull_request_target、可复用工作流，或带写权限 token 的第三方 action？
    evidenceToGather: 对 50 个 design partner GitHub organization 做审计，量化每个仓库、每条工作流里的高风险触发器/权限模式。
  - priority: 高
    question: 这类预算到底由谁拍板：平台工程、产品安全，还是更广的 AppSec？
    evidenceToGather: 访谈 20 位目标买方，对比他们今天在 GHAS、StepSecurity、secret manager 和内部 CI 加固项目上的支出归属。
  - priority: 中
    question: 在团队关掉 blocking policy 之前，开发者能容忍多大的摩擦？
    evidenceToGather: 在 10 家组织里试点 monitor mode 和选择性拦截，再测误报、修复时长，以及避免了多少次工作流停摆。
