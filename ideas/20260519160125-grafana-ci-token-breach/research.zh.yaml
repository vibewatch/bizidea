  pestle:
  - factor: 政治
    impact: positive
    point: secure-by-design 压力把更多责任推回软件生产者，让 CI 和发布控制更容易在高层获得预算正当性。
    sourceRefs:
    - 13
    - 14
  - factor: 法律
    impact: positive
    point: 《Cyber Resilience Act》推动产品制造商补强构建与软件保障证据，从而增加了对带 provenance 感知的 CI 控制的需求。
    sourceRefs:
    - 31
    - 14
  - factor: 社会
    impact: positive
    point: 开源协作和 AI 辅助开发一起推高了公共仓活动与工作流复杂度，暴露面自然变大。
    sourceRefs:
    - 1
    - 27
  - factor: 技术
    impact: positive
    point: OIDC、可复用工作流和 artifact attestation 提供了在 CI 中做可执行最小权限与 provenance 控制所需的基础设施。
    sourceRefs:
    - 9
    - 35
    - 36
  - factor: 经济
    impact: negative
    point: 安全团队正承受供应商整合压力，因此点状产品必须证明它比大平台套件或 GitHub 原生组合更快把问题修掉。
    sourceRefs:
    - 10
    - 11
    - 18
  adoptionFrictionMatrix:
  - friction: False positives or noisy merge blocks on developer workflows
    severity: 高
    affectedBuyer: 平台工程负责人
    mitigation: 先从 monitor mode 开始，给公共 fork 和高权限工作流模式提供精确策略，并把一键修复建议一起带上。
    sourceRefs:
    - 19
    - 37
  - friction: Integrating OIDC or brokered credentials into existing release jobs
    severity: 中
    affectedBuyer: 产品安全负责人
    mitigation: 先抓最高权限的任务，把策略发现和现成的迁移模式一起交付。
    sourceRefs:
    - 9
    - 38
    - 44
  - friction: Limited visibility into self-hosted runner risk and network reachability
    severity: 高
    affectedBuyer: 基础设施安全经理
    mitigation: 在私有 runner 舰队全面 enforcement 之前，先叠加审计、运行时遥测和外连控制。
    sourceRefs:
    - 33
    - 45
  - friction: Confusion over overlap with GitHub’s native roadmap
    severity: 中
    affectedBuyer: CISO / VP Engineering
    mitigation: 把产品定位成今天工作流蔓延局面的 retrofit 与跨仓控制面，而不是去替代 GitHub 的原生基线功能。
    sourceRefs:
    - 10
    - 28
