competitors:
- name: GitHub Advanced Security
  stage: 现有厂商
  wedge: 直接内建在 GitHub 里的原生代码安全、secret 防护和软件供应链能力。
  pricing: $19 / 每活跃 committer / 月（Secret Protection）；$30 / 每活跃 committer / 月（Code Security）。
  strength: 原生分发、部署摩擦低，而且天然贴着仓库管理。
  weaknessVsUs: 还没有明显把公共 fork 的权限路径仿真，以及跨工作流蔓延场景下的最小权限运行时凭证 broker 放在中心。
  sourceRefs:
  - 10
  - 11
- name: StepSecurity
  stage: 成长期
  wedge: 围绕 GitHub Actions 的专用审计、runner 加固、外连控制和 runner 运行时遥测。
  pricing: 公共仓免费层；Enterprise 起价为每贡献开发者每月 $16。
  strength: GitHub Actions 专业度深，开源采用也可见，还自带审计切入点。
  weaknessVsUs: 相比我们，它更偏向加固和监控运行中的任务，而不是在多仓拓扑上做合并前权限图仿真与 token broker。
  sourceRefs:
  - 18
  - 19
  - 20
  - 49
- name: Endor Labs
  stage: 成长期
  wedge: 把 GitHub Actions 视为软件工厂攻击面一部分的更广义软件供应链与 CI/CD 安全平台。
  pricing: 开发者免费层；完整平台按销售主导 / 打包定价。
  strength: 软件供应链上下文更完整，事件教育内容强，也有可信的 CI/CD 审计故事。
  weaknessVsUs: 它没有那么死盯公共仓贡献者自动化，对只想解决一个急迫 GitHub 问题的买方来说会显得更重。
  sourceRefs:
  - 23
  - 24
  - 42
- name: Legit Security
  stage: 成长期
  wedge: 覆盖更广软件工厂的供应链与 ASPM 平台，包括 secret 和 CI/CD 流程。
  pricing: 通过 demo 驱动销售提供定制定价。
  strength: 对想把 AppSec 和软件工厂风险集中起来管理的组织，这套平台叙事很强。
  weaknessVsUs: 大平台叙事会冲淡 GitHub 事件语义与权限路径这个非常具体的痛点，而这正是拟议创业公司最先要打穿的。
  sourceRefs:
  - 21
  - 22
- name: Arnica
  stage: 成长期
  wedge: 以开发者为中心的代码风险、secret 缓解，以及无 pipeline / 基于行为的工作流安全。
  pricing: 公开的基于身份年费定价，从每身份每年 $360 到 $720 不等，另有附加模块。
  strength: 把源码行为、secret 和自动化工作流串在一起，强调快速修复。
  weaknessVsUs: 它的范围比 GitHub 工作流权限设计更宽，可能会削弱那种狭窄而事故驱动的买方对话。
  sourceRefs:
  - 25
  - 26
regulatoryTechnicalConstraints:
- point: 把 pull_request_target 和 checkout / 执行不可信 PR 代码放在一起，会把写权限或 secret 暴露给攻击者。
  sourceRefs:
  - 3
  - 7
- point: 必须把 GITHUB_TOKEN 设成最小权限、认真登记 secret 并谨慎处理，因为工作流日志和过宽权限都可能泄露敏感值。
  sourceRefs:
  - 6
  - 8
  - 34
  - 39
- point: 自托管 runner 会显著抬高爆炸半径，因为 runner 隔离和网络可达性都变成了信任边界的一部分。
  sourceRefs:
  - 33
  - 45
- point: attestation 和可复用工作流能提升软件保障，但团队也必须先把构建模式标准化，才能大范围执行更高保证的策略。
  sourceRefs:
  - 16
  - 36
validationSignals:
- point: Grafana 把一个被盗 GitHub token 变成了董事会能看见的代码泄露与勒索事件，哪怕客户系统完全没受影响，这验证了软件厂商的痛感强度。
  sourceRefs:
  - 1
  - 2
- point: GitHub 和相邻垂直玩家已经公开了按开发者或 committer 计费的定价，说明 CI 相邻安全预算今天就有人在付。
  sourceRefs:
  - 11
  - 18
  - 25
- point: StepSecurity 的免费审计打法，以及其宣称保护了 10,000 个开源仓库，都说明买方愿意在整个平台采购前先接触 GitHub Actions 专用安全工具。
  sourceRefs:
  - 19
  - 49
- point: GitGuardian 2026 年关于 28.65M 个新增硬编码 secret 以及恶意 action 攻击叙事的数据，说明底层的 secret 与第三方 action 风险还在继续扩大。
  sourceRefs:
  - 27
  - 50
openQuestions:
- 有多少滩头市场组织现在仍在公共仓里使用 pull_request_target、可复用工作流，或带写权限 token 的第三方 action？
- 这笔预算在中型和大型软件厂商里，主要归平台工程、产品安全，还是更广的 AppSec 负责人？
- 未来 12-24 个月里，GitHub 原生 Actions 安全路线图会吃掉多少拟议切口？
- 误报率或合并延迟到什么阈值时，工程团队就会把 blocking workflow policy 关掉？
