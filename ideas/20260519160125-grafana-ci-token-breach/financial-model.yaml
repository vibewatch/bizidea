scenarios:
  downside:
    description: "GitHub keeps improving native controls, pilots convert more slowly, and deployments stay more services-heavy than the base case."
    y3RevenueK: 1500.0
    y3EbitdaK: -620.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
      - "Q4Y3 customers reach 35 instead of 50."
      - "Blended exit ACV stalls near $48K because fewer accounts expand into broader repo coverage and premium modules."
      - "Gross margin only reaches 72% because onboarding, remediation help, and runtime support stay elevated."
  base:
    description: "The company lands six paying logos in Y1, reaches 18 by Q4Y2, and exits Y3 at about $2.76M ARR across 50 organizations without needing a large services team."
    y3RevenueK: 2085.0
    y3EbitdaK: -254.5
    cashLowPointK: 464.5
    keyAssumptionChanges:
      - "Matches A1-A21, including six paying organizations by M12, 18 by Q4Y2, and 50 by Q4Y3."
      - "Uses the $18K pilot, ~$36K initial deployment, and ~$55K blended exit ACV ladder."
      - "Gross margin ramps from 60.7% in Y1 to 77.4% in Y3 as policy templates and brokered credentials become more standardized."
  upside:
    description: "Incident-led demand and ecosystem partners accelerate conversions, allowing broader repo expansion and better margins without materially faster hiring."
    y3RevenueK: 2600.0
    y3EbitdaK: -20.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - "Q4Y3 customers reach 65 instead of 50 because partner-sourced pipeline becomes productive by late Y2."
      - "Blended exit ACV rises near $58K as more customers adopt blocking, credential brokering, and release-governance modules."
      - "Gross margin reaches 80% because onboarding becomes more self-serve and fewer exceptions require founder involvement."
