modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Incidents["Incidents / audit triggers"] --> Pilots["Paid pilots"]
      Pilots --> Deployments["Annual deployments"]
      Deployments --> Expansion["More repos + brokered runs"]
      Expansion --> Revenue["Subscription + usage revenue"]
      Revenue --> GrossProfit["Gross profit"]
      GrossProfit --> Cash["Cash / runway"]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by converting audit-led pilots into annual deployments and then expanding protected repositories and brokered workflow runs inside each account."
  - checkName: Must go right
    finding: "The model needs pilot-to-production conversion to stay near the planned six-month cycle so founder-led audits do not outrun recurring software revenue."
  - checkName: Model breaks if
    finding: "The biggest cash risk is slower conversion plus lower margins, because the downside case pushes cash below zero before the next round."
  - checkName: Next-round proof
    finding: "The strongest next-financing story is 18+ paying organizations with blocking and credential brokering live in production by Q4Y2 and a clear partner-assisted expansion motion."
sanityChecks:
  ruleOf40: "Y3 growth 151.0% plus EBITDA margin -12.2% = 138.8%; directionally strong but boosted by a still-small Y2 revenue base."
  burnMultiple: "Y1 burn multiple is about 2.6x on roughly $0.36M exit ARR; Y2 improves to about 1.1x as exit ARR rises to about $1.15M, and Y3 improves further to about 0.2x on roughly $2.76M exit ARR."
  revenuePerFte: "$298K Y3 recognized revenue per Q4Y3 FTE, or about $394K on an exit-ARR basis (benchmark $200-400K SaaS)."
  flags:
    - "Base case assumes the audit-led motion scales from founder selling to partner-assisted acquisition without adding more than one dedicated GTM head before Y3."
    - "The company remains EBITDA-negative through most of Y3, so a next round is still likely unless Q4Y3 conversion velocity continues."
    - "Pricing is exposed to native GitHub feature expansion and broader platform bundling, which could compress ARPU faster than the model assumes."
