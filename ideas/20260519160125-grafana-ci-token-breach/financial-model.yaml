slug: workflow-privilege-firewall
date: "2026-05-19"
currency: USD
modelStartMonth: "2026-06"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-06"
    unit: YYYY-MM
    source: "Starts the first full month after the 2026-05-19 business-plan date."
  - id: A2
    name: "Opening cash and pre-seed size"
    value: "2500.0"
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M] Base case uses a $2.5M pre-seed, inside the stated range, sized to reach the Q4Y2 proof point with roughly six months of buffer."
  - id: A3
    name: "Starting customers (M1)"
    value: "0"
    unit: organizations
    source: "[BP executiveSummary + BP investorMemo.firstCustomer.initialContract] The company starts pre-revenue and must first land audit-driven pilots."
  - id: A4
    name: "Y1 customer ramp"
    value: "6 paying organizations by M12, with first paid pilot in M4"
    unit: organizations
    source: "[BP milestones 0-12 months] Anchored to 5-8 paid pilots and at least 3 pilot-to-annual conversions in the first 12 months; monthly timing is a startup-finance interpolation."
  - id: A5
    name: "Y2 customer ramp"
    value: "Q1Y2 9, Q2Y2 12, Q3Y2 15, Q4Y2 18 paying organizations"
    unit: organizations
    source: "[BP milestones 12-24 months + BP gtm.funnelTargets] Reflects repeatable audit-to-pilot conversion and early multi-repo expansion after the first reference deployments."
  - id: A6
    name: "Y3 customer ramp"
    value: "Q1Y3 24, Q2Y3 32, Q3Y3 40, Q4Y3 50 paying organizations"
    unit: organizations
    source: "[BP market.som + BP experimentRoadmap + research reportMemo.distributionChannels] Assumes partner-assisted growth after the GitHub beachhead is proven, while staying well below the researched 200-customer SOM."
  - id: A7
    name: "Pricing ladder"
    value: "$18K paid pilot over 3 months, ~$36K initial production ACV, and ~$55K blended exit ACV"
    unit: usdK_per_customer_year
    source: "[BP investorMemo.firstCustomer.initialContract + BP gtm.pricing + research willingnessToPay] Uses the midpoint of the $15K-25K pilot and stays inside the high-four to low-five figure annual budget range cited in research."
  - id: A8
    name: "Y1 realized revenue schedule"
    value: "M4-M5 $6K, M6-M7 $12K, M8-M9 $18K, M10-M11 $24K, M12 $30K"
    unit: USDK_per_month
    source: "[BP milestones 0-12 months + A7] Keeps year 1 pilot-heavy, with three annualized deployments and three active pilots by year-end."
  - id: A9
    name: "Y2 realized quarterly revenue"
    value: "Q1Y2 $135K, Q2Y2 $180K, Q3Y2 $228K, Q4Y2 $288K"
    unit: USDK_per_quarter
    source: "[BP milestones 12-24 months + BP businessModel.expansionLevers] Revenue rises as pilots convert, more repos are protected, and runtime credential brokering becomes part of production deployments."
  - id: A10
    name: "Y3 realized quarterly revenue"
    value: "Q1Y3 $360K, Q2Y3 $465K, Q3Y3 $570K, Q4Y3 $690K"
    unit: USDK_per_quarter
    source: "[BP market.som + research market.som + A7] Exit ARR of about $2.76M remains below the researched $4.8M year-3 SOM while assuming broader repo coverage and premium runtime modules."
  - id: A11
    name: "Gross margin ramp"
    value: "Y1 60.7%, Y2 71.6%, Y3 77.4%, with quarterly ramp to 78% steady state"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 80 + BP strategicChoices.sequencingRationale] Early audit and onboarding work depress margin, then monitor mode, blocking templates, and brokered credentials become more productized."
  - id: A12
    name: "Monthly logo churn for unit economics"
    value: "1.6"
    unit: percent
    source: "[Startup-finance heuristic] Security infrastructure sold into annual contracts should churn below SMB SaaS, but the wedge is still early and exposed to native-platform compression."
  - id: A13
    name: "Steady-state CAC"
    value: "35.0"
    unit: USDK_per_customer
    source: "[BP gtm.channels + BP gtm.funnelTargets + research buyingTriggers] Founder-led incident sales, technical pilots, and security review cycles support a mid-five-figure fully loaded CAC."
  - id: A14
    name: "Loaded salary bands"
    value: "Founder 140; workflow engineer 190; security engineer 180; solutions engineer 150; GTM lead 170; customer success/growth 160"
    unit: annualK_per_FTE
    source: "[BP team + startup-finance heuristic] Assumes senior security talent but lean seed-stage cash compensation."
  - id: A15
    name: "Hiring schedule"
    value: "Solutions engineer in M4, security engineer in M7, GTM lead in M10, second engineer in Q4Y2, customer success/growth in Q3Y3"
    unit: timing
    source: "[BP team + BP strategicChoices.sequencingRationale] Delivery and product hardening come before scaled GTM, and customer success is added only after production cohorts grow."
  - id: A16
    name: "Headcount endpoint"
    value: "2 FTE by Q1Y1, 5 by Q4Y1, 6 by Q4Y2, and 7 by Q4Y3"
    unit: FTE
    source: "[BP team + BP fundingAsk.useOfFundsSummary] Keeps the company lean enough for a pre-seed while still covering product, onboarding, security engineering, and founder-led sales."
  - id: A17
    name: "Non-payroll operating spend method"
    value: "Lean cloud, travel, insurance, tooling, and legal spend, with no large services bench"
    unit: policy
    source: "[BP operations + startup-finance heuristic] The model assumes a software control plane with founder-led audits, not a consultancy-heavy implementation model."
  - id: A18
    name: "Cash flow simplification"
    value: "Ending cash equals opening cash plus cumulative EBITDA"
    unit: formula
    source: "[Startup-finance heuristic] Assumes limited working-capital swings, capex, debt, and deferred-revenue distortion for a software-first company."
  - id: A19
    name: "Funding sizing rule"
    value: "Raise enough to reach the Q4Y2 milestone and preserve about 6 months of cash buffer"
    unit: policy
    source: "[BP fundingAsk runwayMonths 18 + model requirement] The model extends the stated 18-month target to a milestone-plus-buffer raise."
  - id: A20
    name: "Scenario downside deltas"
    value: "Q4Y3 customers 35, exit ACV ~$48K, gross margin 72%, and sales cycle stretches to 9 months"
    unit: scenario_inputs
    source: "[BP risks + research sensitivityCases] Captures budget consolidation, native GitHub compression, and more services-heavy deployments."
  - id: A21
    name: "Scenario upside deltas"
    value: "Q4Y3 customers 65, exit ACV ~$58K, gross margin 80%, and partner channel pulls conversions forward by roughly one quarter"
    unit: scenario_inputs
    source: "[BP experimentRoadmap + BP milestones 24-36 months] Upside assumes design-partner proof makes the audit motion and partner channel work faster without a major hiring step-up."
