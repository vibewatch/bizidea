  validationPlan:
  - priority: 高
    question: "买方会为前测试波及范围保障付费，还是认为现有 QA 工具已经够用？"
    evidenceToGather: "开展 5 次买方访谈和一次活跃通道研讨会，将当天的测试影响流程与图谱优先规划工作流进行对比。"
  - priority: 高
    question: "共创客户能否在两周内提供只读代码、配置和集成交付物，以便搭建首条通道？"
    evidenceToGather: "收集一个近期项目的传输记录、自定义对象、接口清单、回归测试包和割接手册，以衡量采集工作量。"
  - priority: 中
    question: "系统集成商会把产品作为加速工具转售，还是将其视为对可计费发现工作的威胁而加以阻止？"
    evidenceToGather: "访谈至少 3 家 SAP 专注型系统集成商，并围绕一次活跃工厂上线测试联合销售方案。"
