  - incumbentClass: 系统集成商与内部团队
    point: "许多企业仍可付费让架构师和系统集成商制作依赖关系电子表格、召开研讨会——因此初创公司必须销售的是更快的置信度，而非通用自动化。"
    sourceRefs:
