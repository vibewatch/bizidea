    sourceRefs:
    - 17
    - 18
    - 27
    - 29
  - incumbentClass: 自定义代码修复专家
    point: "smartShift 让自定义代码转换更快更干净，但其重心在代码转换和洁净核心就绪，而非跨责任人、集成关系和上线方案包的持续波及范围决策。"
    sourceRefs:
    - 19
