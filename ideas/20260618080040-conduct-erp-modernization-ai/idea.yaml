jobsToBeDone:
  - job: When a plant is preparing for an S/4HANA rollout, help the transformation director see what will break if a local workflow changes, so they can approve cutover plans with confidence.
    currentAlternative: Manual workshops and spreadsheet-based dependency mapping
    successMetric: Days to produce a signed-off cutover and regression plan
  - job: When the SI discovers undocumented customizations late in the project, help the release manager generate an impact-backed remediation plan, so they can protect the go-live date without adding uncontrolled scope.
    currentAlternative: Senior architect fire drills and ad hoc fit-gap analysis
    successMetric: Number of surprise defects or rollback incidents during rollout
ideaScorecard:
  signalStrength:
    score: 5
    rationale: Multiple verified sources, a primary company post, strategic SAP participation, and named customers make the signal unusually strong.
  painIntensity:
    score: 5
    rationale: Missing visibility into custom dependencies can stall already-funded ERP programs and create direct cutover and budget risk.
  wedgeClarity:
    score: 5
    rationale: Starting with read-only blast-radius analysis and cutover packet generation for one SAP process corridor is narrow and buyer-legible.
  defensibility:
    score: 4
