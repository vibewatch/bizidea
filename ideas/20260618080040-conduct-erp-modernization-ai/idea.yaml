topRisks:
  - name: Services trap
    description: Each ERP landscape is unique, so the product could degrade into expensive custom project work instead of repeatable software.
    mitigation: Start with one process corridor, standardize read-only connectors and outputs, and let partners handle bespoke remediation work.
  - name: Incumbent squeeze
    description: SAP, large SIs, or adjacent ALM vendors may bundle similar modernization features into broader transformation contracts.
    mitigation: Stay cross-system, focus on independent blast-radius evidence across ERP plus MES and WMS, and build partner distribution before incumbents close the gap.
  - name: Access friction
    description: Enterprises may hesitate to connect sensitive ERP estates to a new product during high-pressure transformation programs.
    mitigation: Launch with read-only ingestion from copies and existing project artifacts, offer tight deployment boundaries, and prove value in a single rollout before broader integration.
