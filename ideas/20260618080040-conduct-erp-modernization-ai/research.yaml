  "willingnessToPay":
    "summary": "Program budgets are justified through avoided delay and rework rather than seat count: Conduct reports 10x faster design cycles and 50% to 80% cost savings, smartShift markets 253% ROI for code migration, and UiPath’s internal SAP program cites 10% faster delivery plus 60% automated test coverage. That supports a six-figure annual spend inside a live S/4 program even without public list pricing from incumbents. [1][21][30]"
