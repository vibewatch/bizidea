  - "incumbentClass": "Custom code remediation specialists"
    "point": "smartShift makes custom-code conversion faster and cleaner, yet its center of gravity is code transformation and clean-core readiness rather than ongoing blast-radius decisions across owners, integrations, and rollout packets."
