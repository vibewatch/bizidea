slug: erp-change-assurance-graph
date: "2026-06-18"
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: Starts the first full month after the 2026-06-18 business-plan date.
- id: A2
  name: Starting paying programs (M1)
  value: '0'
  unit: count
  source: '[BP milestones] The company has not yet closed a paid pilot at model start, so M1 begins with zero paying programs.'
- id: A3
  name: Blended annual ACV
  value: $250.0K per active transformation program
  unit: usdK_per_year
  source: '[BP investorMemo.firstCustomer.initialContract; BP market.som; research.bottomUpSizingDrivers] The BP frames $200K-$350K annual subscriptions and research sizes the market at a modeled $250K ACV, so the base case uses that midpoint for production pricing.'
- id: A4
  name: Recognized revenue per active customer-month
  value: $20.8K full month; 50% in the first month of a new pilot
  unit: usdK_per_customer_month
  source: '[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract] Program-based pricing plus $75K-$150K paid pilots support a blended $250K ACV, with first-month revenue halved to reflect mid-month pilot starts and procurement timing.'
- id: A5
  name: Customer ramp
  value: 4 paying programs by M12, 12 by Q4Y2, and 20 by Q4Y3
  unit: customers
  source: '[BP milestones; BP product.sixMonth; BP product.twelveMonth; BP market.som] This matches 3-5 paid design partners in year 1, multi-corridor expansion in months 12-24, and a year-three footprint that stays well below the 80-program SOM case in the BP and research.'
- id: A6
  name: Gross margin ramp
  value: 50%-65% in Y1, 66%-69% in Y2, and 70% in Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct; BP operatingAssumptions] Early deployments carry more services, security, and data-ingestion load, then converge to the BP''s 70% target once corridor templates and audit workflows standardize.'
- id: A7
  name: Monthly churn
  value: 1.2%
  unit: percent
  source: Startup-finance heuristic for sticky enterprise workflow software with annual planning cycles and high switching costs, tempered by early-product and procurement risk.
- id: A8
  name: Fully loaded CAC
  value: $150.0K per production customer
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; BP operatingAssumptions; research.reportMemo.distributionChannels] Founder-led enterprise selling, SI enablement, and pilot engineering support justify CAC above mid-market SaaS norms even before partner leverage improves it.'
- id: A9
  name: Loaded salary bands
  value: CEO $150K; engineering $190K; solutions $160K; sales/partnerships $170K; G&A $120K
  unit: usdK_per_fte_year
  source: Startup-finance heuristic for a pre-seed enterprise software company hiring into a U.S./Europe talent market, anchored to the role sequence in [BP team].
- id: A10
  name: Headcount ramp snapshots
  value: CEO 1/1/1/1/1/1; engineering 2/2/3/3/5/6; solutions 0/1/1/1/2/2; sales/partnerships 0/0/0/1/2/3; G&A 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP milestones; BP product.twelveMonth] The plan follows the BP hiring order: build ingestion and AI output reliability first, add delivery capacity, then scale partner-led GTM once pilot proof exists.'
- id: A11
  name: Additional hiring between snapshot points
  value: Solutions hire in M15; engineering hires in M17, M23, and M31; sales hires in M21 and M28; G&A hire in M22
  unit: timing
  source: '[BP team; Financial Modeler instructions] Quarterly salary expense is smoothed between snapshot columns so payroll reflects the BP sequence without hiding later-year hiring steps.'
- id: A12
  name: Non-salary operating budgets
  value: Y1 non-salary opex rises from $30K to $60K per month; Y2 from $165K to $210K per quarter; Y3 from $220K to $250K per quarter
  unit: usdK
  source: '[BP fundingAsk.useOfFundsSummary; BP operatingAssumptions; research.reportMemo.regulatoryLandscape] Enterprise travel, security review, cloud tooling, legal, and partner enablement are material because the product must be audit-ready and deploy from read-only artifacts in live programs.'
- id: A13
  name: Starting cash after pre-seed close
  value: $3.6M
  unit: usdM
  source: '[BP fundingAsk.targetFundingRangeUsd] The BP asks for $3M-$4M; the model uses $3.6M because it funds the planned enterprise delivery ramp and still keeps a year-three cash cushion.'
- id: A14
  name: Cash conversion simplification
  value: Ending cash rolls from EBITDA with no debt, tax, or capex line items
  unit: method
  source: Startup-finance heuristic for an asset-light pre-seed software company where working-capital swings are small relative to operating burn.
- id: A15
  name: Downside scenario deltas
  value: $220K ACV, 65% gross margin, 12-month sales cycle, and 16 programs by Q4Y3
  unit: scenario_inputs
  source: '[BP risks; research.reportMemo.sensitivityCases; research.categoryDynamics.headwinds] The downside reflects slower procurement, heavier services work, and weaker SI support than the BP expects.'
- id: A16
  name: Upside scenario deltas
  value: $280K ACV, 72% gross margin, 7.5-month sales cycle, and 24 programs by Q4Y3
  unit: scenario_inputs
  source: '[BP businessModel.expansionLevers; BP milestones; research.reportMemo.partnershipEcosystem] The upside assumes early cutover proof unlocks corridor expansion modules and faster partner-sourced wins.'
- id: A17
  name: Next-round milestone
  value: 6 annual production programs, 2 SI-sourced expansions, and sub-14-day corridor deployment with security review cleared
  unit: milestone
  source: '[BP milestones; BP operatingAssumptions; BP fundingAsk.useOfFundsSummary] The next financing should follow evidence that deployment speed, governance, and partner-assisted GTM are repeatable.'
