modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Targeted S/4 programs] --> Pilots[Paid corridor pilots]
      Pilots --> Programs[Annual covered programs]
      Programs --> Revenue[Program ACV + expansions]
      Revenue --> GrossProfit[Gross profit after delivery costs]
      GrossProfit --> Cash[Ending cash after payroll and opex]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from 20 active transformation programs by Q4Y3 at about $250K ACV, with expansion modules doing more of the work than seat growth.
- checkName: Must go right
  finding: The company has to deliver the first corridor from read-only artifacts in under 14 days so paid pilots convert before SI or security friction resets the sales cycle.
- checkName: Model breaks if
  finding: The biggest cash risk is the sales cycle stretching toward 12 months, because that sensitivity hurts both year-three revenue and ending cash more than any other single variable.
- checkName: Next-round proof
  finding: A credible next round is supported once six annual production programs and two SI-sourced expansions prove repeatable ACV, deployment speed, and governance acceptance.
sanityChecks:
  ruleOf40: Y3 growth 104.3% + EBITDA margin -7.3% = 97.1%.
  burnMultiple: Y2 burn multiple is about 0.4x on roughly $2.0M of net new ARR; Y3 improves to about 0.1x on roughly $2.0M of net new ARR.
  revenuePerFte: $301K Y3 using $3.92M revenue and 13 year-end FTE (benchmark $200–400K SaaS).
  flags:
  - Revenue concentration remains high because 20 enterprise programs still means a small set of large manufacturing rollouts drive most year-three revenue.
  - The model assumes SI-assisted distribution starts to matter in year 2; if partners resist the product, CAC and the sales cycle likely drift toward the downside case.
  - Year 1 and Year 2 gross margin stay below the long-run target because security review, artifact normalization, and customer-specific deployment work remain meaningfully services-influenced.
