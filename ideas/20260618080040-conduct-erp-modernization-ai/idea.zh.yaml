jobsToBeDone:
  - job: 工厂准备 S/4HANA 上线时，帮助转型总监看清本地流程变更后哪里会出问题，从而有把握地批准割接计划。
    currentAlternative: 手工研讨会和基于电子表格的依赖关系梳理
    successMetric: 出具一份签字确认的割接与回归计划所需的天数
  - job: 系统集成商在项目后期发现未记录的定制化内容时，帮助发布经理生成有影响分析支撑的补救方案，在不扩大失控范围的前提下保住上线日期。
    currentAlternative: 高级架构师紧急应对和临时差距分析
    successMetric: 上线期间发生的意外缺陷或回滚事件数量
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 多个经验证的来源、公司主动发文、SAP 战略参与和指名客户，让信号异常强烈。
  painIntensity:
    score: 5
    rationale: 对自定义依赖的不可见性可能直接叫停已立项的 ERP 项目，造成直接的割接和预算风险。
  wedgeClarity:
    score: 5
    rationale: 从单一 SAP 流程通道的只读波及范围分析和割接方案包生成切入，切口窄且对买方清晰可辨。
  defensibility:
    score: 4
    rationale: 图谱和历史割接语料库可持续积累，但如果产品过于依赖服务，现有厂商和大型系统集成商会跟进竞争。
  ventureScale:
    score: 5
    rationale: 切口可从 SAP 迁移扩展至跨多个系统和行业的每一类主要企业变更工作流。
topRisks:
  - name: 服务化陷阱
    description: 每套 ERP 环境都是独特的，产品可能退化为昂贵的定制项目工作，而非可重复的软件。
    mitigation: 从一条流程通道开始，标准化只读连接器和输出，让合作伙伴负责定制化的修复工作。
  - name: 现有厂商挤压
    description: SAP、大型系统集成商或相邻 ALM 厂商可能把类似的现代化功能捆绑进更大的转型合同。
    mitigation: 保持跨系统定位，聚焦跨 ERP、MES 和 WMS 的独立波及范围证据，并在现有厂商填补空白前建立合作伙伴分发渠道。
  - name: 准入摩擦
    description: 企业在高压转型项目期间可能不愿把敏感 ERP 系统连接到新产品上。
    mitigation: 从副本和现有项目交付物的只读采集起步，严格划定部署边界，在更深度集成前先在一次上线中证明价值。
