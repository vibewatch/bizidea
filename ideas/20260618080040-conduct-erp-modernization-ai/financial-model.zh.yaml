slug: erp-change-assurance-graph
date: "2026-06-18"
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: 从商业计划日期 2026-06-18 后的第一个完整月份开始。
- id: A2
  name: 起始付费项目数（第 1 月）
  value: '0'
  unit: count
  source: '[BP milestones] 公司在模型启动时尚未关闭付费试点，因此第 1 月以零付费项目为起点。'
- id: A3
  name: 混合年度 ACV
  value: $250.0K per active transformation program
  unit: usdK_per_year
  source: '[BP investorMemo.firstCustomer.initialContract; BP market.som; research.bottomUpSizingDrivers] BP 设定的年度订阅区间为 $200K–$350K，研究以 $250K ACV 为市场建模基准，因此基础情景取该中位值作为生产定价。'
- id: A4
  name: 每活跃客户月确认收入
  value: $20.8K full month; 50% in the first month of a new pilot
  unit: usdK_per_customer_month
  source: '[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract] 项目制定价加 $75K–$150K 付费试点，支撑 $250K 混合 ACV；首月收入减半，反映试点在月中启动和采购节奏。'
- id: A5
  name: 客户增长节奏
  value: 4 paying programs by M12, 12 by Q4Y2, and 20 by Q4Y3
  unit: customers
  source: '[BP milestones; BP product.sixMonth; BP product.twelveMonth; BP market.som] 与 BP 吻合：第 1 年 3–5 个付费共创客户，第 12–24 个月多通道扩展，第三年规模远低于 BP 和研究中 80 个项目的 SOM 预测。'
- id: A6
  name: 毛利率爬坡
  value: 50%-65% in Y1, 66%-69% in Y2, and 70% in Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct; BP operatingAssumptions] 早期部署承载更多服务、安全和数据采集负荷，随着通道模板和审计工作流标准化，逐步收敛至 BP 的 70% 目标。'
- id: A7
  name: 月度流失率
  value: 1.2%
  unit: percent
  source: 针对具有年度规划周期和高切换成本的黏性企业工作流软件的创业财务启发式估计，同时考虑早期产品和采购风险。
- id: A8
  name: 全加载 CAC
  value: $150.0K per production customer
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; BP operatingAssumptions; research.reportMemo.distributionChannels] 创始人主导的企业销售、系统集成商赋能和试点工程支持，使 CAC 高于中端市场 SaaS 基准，即便在合作伙伴杠杆改善之前也是如此。'
- id: A9
  name: 全加载薪酬区间
  value: CEO $150K; engineering $190K; solutions $160K; sales/partnerships $170K; G&A $120K
  unit: usdK_per_fte_year
  source: 面向美国/欧洲人才市场招聘的 pre-seed 企业软件公司创业财务启发式估计，以 [BP team] 的角色序列为锚点。
- id: A10
  name: 人员快照
  value: CEO 1/1/1/1/1/1; engineering 2/2/3/3/5/6; solutions 0/1/1/1/2/2; sales/partnerships 0/0/0/1/2/3; G&A 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP milestones; BP product.twelveMonth] 计划遵循 BP 招聘顺序：先保障采集和 AI 输出可靠性，再增加交付能力，待试点验证后才扩展合作伙伴主导的 GTM。'
- id: A11
  name: 快照节点之间的额外招聘
  value: Solutions hire in M15; engineering hires in M17, M23, and M31; sales hires in M21 and M28; G&A hire in M22
  unit: timing
  source: '[BP team; Financial Modeler instructions] 季度薪酬在快照列之间平滑处理，使薪资支出反映 BP 序列，同时不隐藏后期招聘步骤。'
- id: A12
  name: 非薪酬运营预算
  value: Y1 non-salary opex rises from $30K to $60K per month; Y2 from $165K to $210K per quarter; Y3 from $220K to $250K per quarter
  unit: usdK
  source: '[BP fundingAsk.useOfFundsSummary; BP operatingAssumptions; research.reportMemo.regulatoryLandscape] 企业差旅、安全审查、云工具、法务和合作伙伴赋能成本不可忽视，因为产品必须具备审计就绪性，并能在活跃项目中从只读交付物部署。'
- id: A13
  name: pre-seed 关闭后起始现金
  value: $3.6M
  unit: usdM
  source: '[BP fundingAsk.targetFundingRangeUsd] BP 申请 $3M–$4M；模型取 $3.6M，因为它能支撑计划中的企业交付爬坡，同时在第三年仍保留现金缓冲。'
- id: A14
  name: 现金转换简化
  value: Ending cash rolls from EBITDA with no debt, tax, or capex line items
  unit: method
  source: 资产轻型 pre-seed 软件公司的创业财务启发式估计，其运营周转波动相对于经营性亏损较小。
- id: A15
  name: 下行情景调整参数
  value: $220K ACV, 65% gross margin, 12-month sales cycle, and 16 programs by Q4Y3
  unit: scenario_inputs
  source: '[BP risks; research.reportMemo.sensitivityCases; research.categoryDynamics.headwinds] 下行情景反映比 BP 预期更慢的采购节奏、更重的服务工作和更弱的系统集成商支持。'
- id: A16
  name: 上行情景调整参数
  value: $280K ACV, 72% gross margin, 7.5-month sales cycle, and 24 programs by Q4Y3
  unit: scenario_inputs
  source: '[BP businessModel.expansionLevers; BP milestones; research.reportMemo.partnershipEcosystem] 上行情景假设早期割接验证解锁通道扩展模块，合作伙伴来源的赢单速度更快。'
- id: A17
  name: 下轮融资里程碑
  value: 6 annual production programs, 2 SI-sourced expansions, and sub-14-day corridor deployment with security review cleared
  unit: milestone
  source: '[BP milestones; BP operatingAssumptions; BP fundingAsk.useOfFundsSummary] 下次融资应以部署速度、治理合规性和合作伙伴辅助 GTM 可重复的证据为前提。'
