scenarios:
  downside:
    description: 安全审查拖延、系统集成商转介绍不及预期，公司以较低 ACV 关闭更少项目，交付仍然偏重服务。
    y3RevenueK: 3080.0
    y3EbitdaK: -848.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - ACV 从 $250K 降至 $220K。
    - 稳态毛利率落在 65% 而非 70%。
    - 销售周期从约 9 个月拉长至 12 个月。
    - 第四季度第三年付费项目从 20 个降至 16 个。
  base:
    description: 基础情景将第一年 4 个付费项目扩展为 Q4Y2 的 12 个和 Q4Y3 的 20 个，同时毛利率在第三年达到 BP 目标。
    y3RevenueK: 3916.8
    y3EbitdaK: -284.9
    cashLowPointK: 1451.0
    keyAssumptionChanges:
    - ACV 维持约 $250K，与 BP 和研究市场模型一致。
    - 随着只读部署和审计模板标准化，毛利率达到 BP 的 70% 目标。
    - 在系统集成商辅助贡献持续增长的情况下，销售周期维持约 9 个月。
    - Q4Y3 付费项目达到 20 个，远低于 BP 和研究中 80 个项目的 SOM 框架。
  upside:
    description: 更快的割接验证和更强的系统集成商杠杆提前赢单，提升扩展定价，并在第三年将业务推至基础情景客户增速之上。
    y3RevenueK: 5040.0
    y3EbitdaK: 628.8
    cashLowPointK: 1700.0
    keyAssumptionChanges:
    - 随着工厂和周边系统纳入覆盖，ACV 从 $250K 升至 $280K。
    - 稳态毛利率从 70% 提升至 72%。
    - 销售周期从约 9 个月压缩至 7.5 个月。
    - Q4Y3 付费项目从 20 个增至 24 个。
sensitivity:
- variable: ARPU
  downsideCase: $220K 混合 ACV
  baseCase: $250K 混合 ACV
  upsideCase: 通道和工厂扩展模块拉动至 $280K
  y3RevenueImpactK: -470.0
  cashImpactK: -329.0
- variable: CAC
  downsideCase: $190K 全加载 CAC
  baseCase: $150K 全加载 CAC
  upsideCase: 系统集成商来源管道更强时降至 $120K
  y3RevenueImpactK: 0.0
  cashImpactK: -320.0
- variable: churn
  downsideCase: 若试点未能嵌入项目治理，月度流失率升至 1.8%
  baseCase: 月度流失率 1.2%
  upsideCase: 割接工作流锁定更深时，月度流失率降至 0.8%
  y3RevenueImpactK: -190.0
  cashImpactK: -150.0
- variable: sales cycle
  downsideCase: 采购节奏和系统集成商政治拖累，销售周期延至 12 个月
  baseCase: 销售周期 9 个月
  upsideCase: 可重复的共创客户转介绍拉动，压缩至 7.5 个月
  y3RevenueImpactK: -836.8
  cashImpactK: -620.0
- variable: gross margin
  downsideCase: 入驻持续偏重服务，毛利率 65%
  baseCase: 目标毛利率 70%
  upsideCase: 可重复的采集和审计模板，毛利率 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -195.8
- variable: hiring pace
  downsideCase: 将一名工程师和一名 GTM 成员的入职时间各提前两个季度
  baseCase: 按 BP 序列招聘
  upsideCase: 合作伙伴转介绍验证前推迟一名非核心 GTM 招聘
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Targeted S/4 programs] --> Pilots[Paid corridor pilots]
      Pilots --> Programs[Annual covered programs]
      Programs --> Revenue[Program ACV + expansions]
      Revenue --> GrossProfit[Gross profit after delivery costs]
      GrossProfit --> Cash[Ending cash after payroll and opex]
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入来自 Q4Y3 的 20 个活跃转型项目，约 $250K ACV，扩展模块比席位增长承担更多增量。
- checkName: 必须做对的事
  finding: 公司必须在 14 天内从只读交付物交付首个通道，才能让付费试点在系统集成商或安全摩擦重置销售周期前完成转化。
- checkName: 模型失效条件
  finding: 最大的现金风险是销售周期延伸至 12 个月——这个敏感性对第三年收入和期末现金的伤害超过其他任何单一变量。
- checkName: 下轮融资证明
  finding: 一旦 6 个年度生产项目和 2 个系统集成商来源的扩展证明了可重复的 ACV、部署速度和治理接受度，下轮可信融资即具备基础。
sanityChecks:
  ruleOf40: 第三年增长率 104.3% + EBITDA 利润率 -7.3% = 97.1%。
  burnMultiple: 第二年亏损倍数约 0.4x（约 $2.0M 净新增 ARR）；第三年改善至约 0.1x（约 $2.0M 净新增 ARR）。
  revenuePerFte: 第三年人均收入 $301K（$3.92M 收入 / 13 名年末全职员工；SaaS 基准 $200–$400K）。
  flags:
  - 收入集中度依然偏高——20 个企业项目仍意味着少数大型制造业上线驱动大部分第三年收入。
  - 模型假设系统集成商辅助分发在第二年开始发挥作用；若合作伙伴抵制产品，CAC 和销售周期可能向下行情景漂移。
  - 第一年和第二年毛利率低于长期目标，因为安全审查、交付物规范化和客户专属部署工作仍受服务明显影响。
