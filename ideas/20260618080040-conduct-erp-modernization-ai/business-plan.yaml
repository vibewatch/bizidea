slug: erp-change-assurance-graph
date: '2026-06-18'
executiveSummary: >-
  ERP Change Assurance Graph is a read-only release-assurance layer for large
  manufacturers running SAP ECC-to-S/4HANA transformations across multiple
  plants. The first user is the SAP transformation director or release lead who
  must approve cutovers despite undocumented custom code, local plant variants,
  and MES or WMS dependencies that are still reconstructed through workshops and
  spreadsheets. The beachhead is one critical process corridor such as
  warehouse-to-plant fulfillment or order-to-cash inside a funded rollout with a
  fixed go-live window, because that creates a visible buying trigger, a narrow
  deployment scope, and measurable proof in days saved and defects avoided. The
  product wedges in before testing and transport tooling by mapping blast
  radius, missing owners, regression scope, and cutover sequence from read-only
  artifacts rather than replacing SAP ALM or the SI. Research supports the pain,
  buyer urgency, and ecosystem timing through SAP maintenance deadlines,
  continuing migration backlog, named customer ROI from category leaders, and a
  crowded but fragmented competitor set. The company should deliberately avoid
  broad cross-ERP ambitions, autonomous code generation, and heavy write-back
  workflows until the single-corridor assurance motion converts into annual
  production. The biggest disconfirming risks are that buyers see existing QA
  and ALM tools as good enough, SIs resist a product that compresses discovery
  hours, or secure read-only deployment still takes too long during live
  programs. Public incumbent pricing is not available in the research, so exact
  ACV and packaging must be validated through paid pilots rather than assumed
  from category narratives.
problem:
  - Multi-site manufacturers still approve SAP cutovers without a trustworthy view of which custom objects, local variants, and adjacent plant systems will break when a process changes.
  - Reverse-engineering those dependencies through workshops, spreadsheets, and SI interviews adds weeks of delay to already-funded S/4HANA programs and increases defect, rollback, and budget risk.
solution:
  - Ingest SAP custom code, configuration diffs, interface inventories, regression artifacts, and prior cutover documents to build a read-only graph of change dependencies for one process corridor.
  - For each requested change, generate a blast-radius view, proposed regression pack, missing-owner list, cutover sequence, and rollback checkpoints that can be reviewed inside existing program governance.
whyWeWin:
  - The wedge starts earlier than testing, transport, or code-remediation products by solving the pre-test question executives actually ask: what breaks if this plant workflow changes now.
  - Defensibility compounds from enterprise-specific dependency graphs, historical rollout outcomes, and cross-system process mappings that are hard for generic copilots or new entrants to recreate quickly.
strategicChoices:
  beachhead: Large European and North American manufacturers with 10 or more plants running phased ECC-to-S/4HANA rollouts where one corridor depends on undocumented SAP plus MES or WMS integrations.
  wedgeRationale: A single process corridor inside a funded rollout creates faster proof than a broad modernization platform because the buyer already has a deadline, a defined risk surface, and an explicit alternative of paying more SI hours for manual discovery.
  sequencingRationale: Start with read-only corridor mapping and cutover packets because that minimizes security friction and channel conflict while proving business value before expanding into broader corridor coverage, benchmark reporting, or deeper system integrations.
  notYet:
    - Full SAP ALM replacement or workflow write-back automation
    - Oracle, Salesforce, and non-manufacturing expansion before the SAP manufacturing wedge is repeatable
    - Autonomous code generation or remediation execution instead of decision-support outputs
    - Small and mid-market manufacturers without active multi-site transformation budgets
market:
  tam: $1.0B estimated TAM based on roughly 4,000 large-manufacturer transformation programs globally at about $250k modeled annual ACV per program
  sam: $300.0M estimated SAM for Europe and North America programs in the beachhead segment with heavy customization and multi-plant rollout complexity
  som: $20.0M estimated year-three SOM based on 80 paying programs at about $250k modeled ACV through direct sales plus SI-led distribution
  segments:
    - SAP transformation directors, release leads, and enterprise architects at large multi-site manufacturers
    - SAP-focused system integrators managing risky plant cutovers and template rollouts
  buyingProcess: The likely champion is the transformation director or program architect who owns rollout risk, while budget approval sits with the VP Enterprise Applications, CIO, or program sponsor already accountable for a fixed migration timeline. A credible first sale is a paid pilot around one live corridor and one upcoming cutover, converting to an annual program subscription once the steering committee uses the packet in production planning.
product:
  mvp: >-
    MVP is a read-only assurance graph for one corridor that ingests SAP custom
    objects, configuration, interface lists, regression artifacts, and prior
    cutover documents to produce a business-readable blast-radius report,
    regression scope, owner map, and cutover packet before a live rollout. It
    must work from copies or project artifacts, preserve auditability, and
    require human approval for every recommendation.
  sixMonth: Convert the MVP into a repeatable pilot package with standard SAP artifact ingestion, MES or WMS dependency capture, audit logs, and templates that support 3-5 paid deployments in active S/4 programs.
  twelveMonth: Expand from one corridor to multi-corridor program coverage, add benchmark reporting from completed rollouts, and integrate with incumbent ALM and testing workflows without becoming the system of record.
  twentyFourMonth: Extend the same graph into template rollouts, carve-outs, and adjacent-system modernization across SAP plus selected MES, WMS, and finance workflows after the SAP manufacturing wedge is trusted.
  keyBets:
    - Buyers will pay for pre-test blast-radius assurance instead of treating it as an extension of SI discovery work.
    - Read-only artifacts and copies are sufficient to create trusted first-corridor value without waiting for deep production connectivity.
    - One approved corridor packet can expand by plant and adjacent system fast enough to support six-figure annual contracts.
gtm:
  wedge: Sell a paid corridor-assurance pilot for one live rollout that compresses dependency discovery from weeks to days and produces a steering-committee-ready cutover packet before the freeze window.
  channels:
    - Founder-led direct sales into active S/4HANA program sponsors and transformation directors
    - Co-sell and referral motion through SAP-focused system integrators and transformation advisory firms
    - Design-partner deals anchored on one plant rollout with customer-specific cutover templates
  funnelTargets: lead→qualified discovery 20-30%, qualified discovery→paid pilot 25-40%, paid pilot→annual production 50%+, production→second corridor or plant 60%+ within 12 months
  pricing: Annual subscription per active transformation program with corridor or plant expansion modules and a paid implementation pilot; this matches buyer ROI because value scales with rollout risk and avoided delay, not with seat count, though exact ACV remains a pilot-stage assumption because public competitor pricing is unavailable.
businessModel:
  revenueStreams:
    - Annual platform subscription per active transformation program
    - Corridor, plant, or adjacent-system expansion modules during rollout phases
    - Implementation and assurance-reporting fees for initial deployment and governance packaging
  unitOfValue: Active transformation program under change-assurance coverage
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more corridors and plants within the same S/4 program after the first approved cutover packet
    - Expand from SAP-only scope into MES, WMS, and finance dependencies that already shape rollout risk
    - Sell through SI and advisory partners once the product is proven to accelerate rather than replace their delivery work
strategyMap:
  northStarMetric: Percent of covered rollouts whose cutover packet is approved before freeze based on graph-generated blast-radius evidence
  inputMetrics:
    - Days from customer artifact handoff to first usable corridor graph
    - Reduction in manual discovery time per rollout versus prior SI-led process
    - Paid pilot to annual production conversion rate
    - Percent of production customers expanding to a second corridor or plant within 12 months
    - Number of critical dependencies or missing owners found before test execution
  moatsToBuild:
    - Enterprise-specific graph linking business processes, custom objects, interfaces, owners, tests, and rollout outcomes
    - Workflow templates and benchmark data for repeatable plant cutover packets across industrial SAP estates
    - Partner and customer trust built around read-only deployment, auditability, and cross-system evidence rather than generic AI generation
  killCriteria:
    - Fewer than 2 paid design partners in active S/4 programs within 9 months
    - Median time to first useful corridor graph stays above 14 calendar days after the first 3 pilots
    - Pilot-to-annual conversion falls below 30% across the first 6 paid pilots
    - Fewer than half of pilot buyers use the output in an actual cutover approval or steering-committee decision
  mermaid: |
    flowchart LR
      Wedge[Single corridor rollout wedge] --> MVP[Read-only assurance graph MVP]
      MVP --> Proof[Approved cutover packet and faster discovery]
      Proof --> Expansion[Multi-plant and adjacent-system expansion]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Strong pain and timing make this worth partner-level diligence, but conviction depends on proving fast paid pilots and SI-compatible deployment.
    whyBelieve: SAP deadlines, ongoing migration backlog, and named ROI from adjacent category leaders show that large manufacturers already spend real budget to reduce modernization risk.
    whyDoubt: Incumbent ALM, QA, remediation, and SI-led substitutes may absorb the use case unless the startup proves materially faster pre-test clarity from a read-only deployment.
    nextDiligence: Confirm two paid design partners can deploy one corridor from existing artifacts in under two weeks and convert into six-figure annual subscriptions after a live rollout.
  firstCustomer:
    title: SAP transformation director at a multi-site manufacturer
    profile: A $2B+ manufacturer running a phased S/4HANA rollout across multiple plants with custom warehouse, production, or finance interfaces and an SI-led delivery team.
    trigger: A funded rollout, carve-out, or template deployment reveals undocumented local customizations that threaten a fixed go-live date.
    buyer: VP Enterprise Applications or CIO
    initialContract: $75k-$150k paid pilot for one corridor and one live rollout, converting to roughly $200k-$350k annual program subscription as additional plants or corridors come under coverage.
  mustBeTrue:
    - Transformation sponsors fund pre-test blast-radius assurance as a standalone budget line instead of treating it as SI discovery overhead.
    - One corridor can be modeled from read-only artifacts and copies in under 14 days for the first customer.
    - Pilot outputs are trusted enough to be used in a real cutover approval, regression-scope decision, or steering-committee review.
    - SI partners accept the product as delivery acceleration and do not block access to customer workflows or data.
    - Expansion from one corridor to multiple plants or adjacent systems raises ACV enough to support venture-scale account economics.
  diligenceQuestions:
    - In the last two S/4 rollouts, where exactly did undocumented customizations delay cutover approval?
    - Which buyer actually owns budget for pre-test assurance when QA, ALM, and SI contracts are already in place?
    - What artifacts can a design partner provide read-only in week one without a long security exception process?
    - How often do Tricentis, Basis, smartShift, SNP, or SAP ALM already satisfy the blast-radius question well enough for buyers?
    - Will leading SIs co-sell this as acceleration, or view it as margin compression on fit-gap and discovery work?
operatingAssumptions:
  - assumption: The first repeatable budget owner is the enterprise transformation sponsor, not the plant IT team or the SI delivery lead.
    basis: idea.yaml
    validationTest: Close at least 5 qualified opportunities and verify that 3 or more have VP Enterprise Applications, CIO, or program-sponsor budget ownership.
    decisionImpact: If false, sales motion, ACV, and procurement timing all change and the product may need a lower-priced partner-led packaging.
  - assumption: Existing project artifacts and copied metadata are enough to stand up the first corridor without direct production write access.
    basis: research.yaml
    validationTest: In the first 3 pilots, ingest required SAP and adjacent-system artifacts and deliver the first graph in 14 days or less for at least 2 customers.
    decisionImpact: If false, implementation cost and security friction rise materially and the wedge may not fit a pre-seed delivery model.
  - assumption: Buyers will accept program-based pricing with corridor or plant expansion modules instead of seat-based pricing.
    basis: idea.yaml
    validationTest: Test program-based and seat-based proposals in at least 4 live deals and compare win rate, sales-cycle length, and annualized contract value.
    decisionImpact: If false, TAM, expansion logic, and revenue predictability compress and the company may need to repackage around seats or services.
  - assumption: SI partners will treat the graph as acceleration rather than as a threat to billable discovery and fit-gap work.
    basis: research.yaml
    validationTest: Interview at least 3 SAP-focused SIs and secure 2 partner-backed pilot introductions or co-delivery agreements.
    decisionImpact: If false, direct sales burden rises and the company risks sliding into services-heavy implementations.
  - assumption: Read-only evidence, audit logs, and human approvals are enough to clear governance review in regulated or security-sensitive manufacturing accounts.
    basis: operator judgment
    validationTest: Complete security and governance review for 2 pilot customers without requiring on-prem-only custom architecture or major scope reduction.
    decisionImpact: If false, the company must narrow target sectors, invest earlier in platform security, or slow expansion into regulated accounts.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 20 transformation directors, enterprise architects, and program sponsors in active S/4HANA rollouts.
    hypothesis: Pre-test blast-radius uncertainty is the highest-urgency workflow gap versus broader migration analytics or testing automation.
    successMetric: At least 10 buyers describe a recent rollout where undocumented dependencies delayed cutover or regression planning, and 5 agree to workflow mapping.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Reconstruct one historical corridor manually from exported SAP artifacts, interface lists, and cutover documents.
    hypothesis: A buyer will value a steering-committee-ready assurance packet even before the ingestion workflow is fully automated.
    successMetric: 2 design partners review the output and at least 1 agrees to a paid pilot scope.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Time-box first-corridor ingestion using copied SAP metadata and adjacent-system artifacts from one design partner.
    hypothesis: Read-only artifacts are sufficient to build a useful first graph in 14 days or less.
    successMetric: First graph delivered inside 14 calendar days with buyer validation that it captures the majority of critical dependencies.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Launch 3 paid pilots tied to live plant rollouts or template deployments.
    hypothesis: A paid corridor pilot converts faster than a broad modernization platform sale because the deadline and ROI are already visible.
    successMetric: 3 paid pilots launched, at least 2 used in live cutover planning, and at least 1 converts to annual production.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Test partner-led distribution with 3 SAP-focused SIs or transformation advisory firms.
    hypothesis: Partners will sell the product as acceleration if it shortens discovery work without replacing their remediation scope.
    successMetric: 3 partner evaluations completed and 2 qualified pilot opportunities sourced through partners.
    owner: Founder CEO
  - horizon: 180–365 days
    experiment: Expand the first production customer from one corridor to a second plant or adjacent system.
    hypothesis: The installed graph creates enough trust and operational leverage to support account expansion within 12 months.
    successMetric: At least 1 customer expands to a second corridor or plant with incremental annual contract value above 40% of the initial subscription.
    owner: Solutions architect
operations:
  - Least-privilege read-only ingestion from SAP artifacts, copies, and adjacent-system metadata with auditable handling boundaries
  - Human approval workflow for every blast-radius report, regression pack, and cutover recommendation
  - Standard corridor template library for order-to-cash, warehouse-to-plant, and finance rollout packets
  - Weekly pilot operating cadence with source-gap review, graph QA, and cutover-readiness checkpoints
  - Security and governance playbook covering logging, retention, access review, and regulated-environment objections
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Enterprise category creation, partner development, and early sales require founder-led buyer and SI conversations.
  - role: Founding eng
    startTiming: Month 0
    rationale: The first product risk is reliable ingestion and graph construction from messy ERP artifacts, not broad commercial scaling.
  - role: Applied AI engineer
    startTiming: Month 2
    rationale: The company must turn graph evidence into usable blast-radius, regression, and cutover outputs with clear confidence and traceability.
  - role: Solutions architect
    startTiming: Month 4
    rationale: Early customers need workflow mapping, artifact collection, and deployment discipline to keep pilots inside live-program timelines.
  - role: Security and platform engineer
    startTiming: Month 8
    rationale: Procurement speed and regulated-account access depend on auditability, deployment boundaries, and connector reliability.
  - role: Partner and account lead
    startTiming: Month 12
    rationale: Add a quota-carrying commercial owner only after pilot packaging, pricing, and SI-assisted deployment show repeatability.
milestones:
  - horizon: 0–12 months
    items:
      - Win 3-5 paid design partners in active S/4HANA manufacturing programs
      - Deliver first usable corridor graph inside 14 days for at least 2 pilots
      - Convert at least 2 paid pilots into annual subscriptions
      - Prove the output is used in live cutover planning rather than only in discovery workshops
  - horizon: 12–24 months
    items:
      - Expand production customers to multiple corridors, plants, or adjacent systems
      - Establish 3-5 SI or advisory channel relationships that consistently source qualified opportunities
      - Publish benchmark reporting from completed rollouts to strengthen product differentiation and expansion
  - horizon: 24–36 months
    items:
      - Reach cross-system coverage across SAP plus selected MES or WMS workflows in the manufacturing beachhead
      - Build a reference base large enough to defend a vendor-neutral assurance category against ALM, QA, and remediation incumbents
      - Expand from rollout assurance into carve-outs, template rollouts, and other recurring enterprise change events
risks:
  - risk: The product collapses into custom services because every ERP landscape needs bespoke graph construction.
    likelihood: Medium
    impact: High
    mitigation: Standardize the first corridor template, stay read-only, and let partners own bespoke remediation and implementation work.
  - risk: SAP, Tricentis, Basis, smartShift, SNP, or large SIs answer the blast-radius problem well enough inside broader contracts.
    likelihood: High
    impact: High
    mitigation: Differentiate on vendor-neutral cross-system evidence, faster time to first packet, and expansion from one trusted corridor graph rather than on generic migration AI claims.
  - risk: Security and governance review delay pilots beyond the window of a live rollout.
    likelihood: Medium
    impact: High
    mitigation: Start from copied artifacts, document strict read-only boundaries, and package audit logs and approval controls from day one.
  - risk: SI partners block or slow adoption because the product reduces billable discovery work.
    likelihood: Medium
    impact: Medium
    mitigation: Position the product as pre-sales and delivery acceleration, share credit in the rollout workflow, and avoid entering remediation execution too early.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3–4M
  runwayMonths: 18
  useOfFundsSummary: Build the read-only graph product, complete 3-5 enterprise pilots, harden security and auditability, and prove direct plus partner-led GTM in the SAP manufacturing beachhead before broader system expansion.
