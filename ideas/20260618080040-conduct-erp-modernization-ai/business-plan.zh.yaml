slug: erp-change-assurance-graph
date: '2026-06-18'
executiveSummary: >-
  ERP 变更保障图谱是面向大型制造商的只读发布保障层，服务对象是正在多工厂推进
  SAP ECC 至 S/4HANA 转型的企业。首批用户是 SAP 转型总监或发布负责人——他们必须在
  未记录的自定义代码、本地工厂变体和 MES 或 WMS 依赖关系仍靠研讨会和电子表格重建的情况下，
  批准割接方案。滩头市场是已立项上线计划中的一条关键流程通道，
  例如仓库至工厂履约或订单至回款——因为这里有可见的购买触发点、狭窄的部署范围，
  以及可通过节省天数和减少缺陷来衡量的价值证明。产品在测试和传输工具之前切入，
  从只读交付物中映射波及范围、缺失责任人、回归范围和割接序列，
  而非替代 SAP ALM 或系统集成商。研究通过 SAP 维护截止日期、持续的迁移积压、
  类别领先者的指名客户 ROI，以及竞争激烈但高度碎片化的竞争格局，
  支撑了痛点、买方紧迫性和生态时机。公司应刻意避免宽泛的跨 ERP 雄心、
  自主代码生成和重度回写工作流，直到单通道保障动作转化为年度生产收入。
  最大的反向风险是：买方认为现有 QA 和 ALM 工具已经够用、系统集成商抵制减少发现工时的产品，
  或只读部署的安全审查在活跃项目期间仍然耗时过长。
  研究中无法获取现有厂商的公开定价，因此确切的 ACV 和打包方式必须通过付费试点来验证，
  而不能依赖类别叙事来推断。
problem:
  - 多厂区制造商在未能可靠了解哪些自定义对象、本地变体和周边工厂系统会在流程变更后出问题的情况下，仍在批准 SAP 割接。
  - 通过研讨会、电子表格和系统集成商访谈来逆向解析这些依赖关系，为已立项的 S/4HANA 项目增添数周延迟，并加剧缺陷、回滚和预算超支风险。
solution:
  - 采集 SAP 自定义代码、配置差异、接口清单、回归交付物和历史割接文档，为一条流程通道构建只读变更依赖图谱。
  - 针对每次变更请求，生成波及范围视图、建议回归测试包、缺失责任人清单、割接序列和回滚检查点，供现有项目治理体系审查。
whyWeWin:
  - 产品比测试、传输或代码修复工具更早介入，解决管理层真正在问的前测试问题：这条工厂流程现在变更后会波及什么。
  - 企业专属的依赖图谱、历史上线结果和跨系统流程映射构成复利式壁垒，通用 Copilot 或新进入者难以快速复制。
strategicChoices:
  beachhead: 欧美地区拥有 10 个及以上工厂、正在分阶段推进 ECC 至 S/4HANA 上线的大型制造商——至少一条流程通道依赖未记录的 SAP 加 MES 或 WMS 集成。
  wedgeRationale: 在已立项上线计划中从单一流程通道切入，比宽泛的现代化平台更快出结果——买方已有截止日期、明确的风险面，以及"多付系统集成商工时做手工发现"这一现成的替代方案。
  sequencingRationale: 从只读通道映射和割接方案包起步，既能最小化安全摩擦和渠道冲突，又能在扩展到更多通道覆盖、基准报告或更深系统集成之前证明业务价值。
  notYet:
    - 全面替代 SAP ALM 或引入工作流回写自动化
    - 在 SAP 制造业切口验证可重复之前扩展至 Oracle、Salesforce 及非制造领域
    - 用自主代码生成或修复执行替代决策支持输出
    - 没有活跃多厂区转型预算的中小型制造商
market:
  tam: 基于全球约 4,000 个大型制造商转型项目、每项目约 $250K 建模年 ACV，估算 TAM 为 $1.0B
  sam: 针对欧美地区重度定制化、多工厂上线复杂性的滩头细分市场，估算 SAM 为 $300.0M
  som: 基于通过直销加系统集成商分发，第三年 80 个付费项目、约 $250K 建模 ACV，估算第三年 SOM 为 $20.0M
  segments:
    - 大型多厂区制造商的 SAP 转型总监、发布负责人和企业架构师
    - 管理高风险工厂割接和模板推广的 SAP 专注型系统集成商
  buyingProcess: 最可能的推动者是掌握上线风险的转型总监或项目架构师，预算审批则在已对固定迁移时间表负责的企业应用副总裁、CIO 或项目主管处。可信的首单是围绕一条活跃通道和一次即将到来的割接开展付费试点，指导委员会将方案包用于实际规划后转化为年度项目订阅。
product:
  mvp: >-
    MVP 是针对一条通道的只读保障图谱——采集 SAP 自定义对象、配置、
    接口清单、回归交付物和历史割接文档，在活跃上线前产出可供业务人员阅读的
    波及范围报告、回归范围、责任人图谱和割接方案包。
    它必须从副本或项目交付物运行、保证可审计性，
    并对每条建议要求人工审批。
  sixMonth: 将 MVP 转化为可重复的试点包，具备标准 SAP 交付物采集、MES 或 WMS 依赖捕获、审计日志和模板，支撑 3–5 个活跃 S/4 项目的付费部署。
  twelveMonth: 从单通道扩展至多通道项目覆盖，增加已完成上线的基准报告，并与现有 ALM 和测试工作流集成，同时不成为系统记录来源。
  twentyFourMonth: 在 SAP 制造业切口获得信任后，将同一图谱延伸至模板推广、业务拆分，以及跨 SAP、部分 MES、WMS 和财务工作流的周边系统现代化改造。
  keyBets:
    - 买方会为前测试波及范围保障付费，而非将其视为系统集成商发现工作的延伸。
    - 只读交付物和副本足以在不等待深度生产连接的情况下创造第一条通道的可信价值。
    - 一个已批准的通道方案包可以按工厂和周边系统快速扩展，支撑六位数年度合同。
gtm:
  wedge: 销售一个针对一次活跃上线的付费通道保障试点，把依赖关系发现从数周压缩到数天，并在冻结窗口前产出一份指导委员会可用的割接方案包。
  channels:
    - 创始人主导向活跃 S/4HANA 项目主管和转型总监直销
    - 通过 SAP 专注型系统集成商和转型咨询公司开展联合销售和转介绍
    - 以一次工厂上线为锚点、附带客户专属割接模板的共创客户协议
  funnelTargets: 线索→合格发现 20–30%，合格发现→付费试点 25–40%，付费试点→年度生产 50%+，生产→12 个月内第二条通道或工厂 60%+
  pricing: 按活跃转型项目收取年度订阅费，附通道或工厂扩展模块和付费实施试点；这与买方 ROI 匹配，因为价值随上线风险和节省的延迟成长，而非随席位增长——但由于无法获取竞争对手公开定价，确切 ACV 仍是试点阶段假设。
businessModel:
  revenueStreams:
    - 按活跃转型项目收取年度平台订阅费
    - 上线阶段的通道、工厂或周边系统扩展模块费
    - 初始部署和治理打包的实施与保障报告费
  unitOfValue: 纳入变更保障覆盖的活跃转型项目
  targetGrossMarginPct: 70
  expansionLevers:
    - 首个已批准割接方案包后，在同一 S/4 项目内增加更多通道和工厂
    - 从 SAP 单系统范围扩展至已影响上线风险的 MES、WMS 和财务依赖关系
    - 一旦产品被证明能加速而非取代系统集成商的交付工作，通过其渠道销售
strategyMap:
  northStarMetric: 覆盖上线中，基于图谱生成的波及范围证据在冻结前获批割接方案包的比例
  inputMetrics:
    - 从客户交付物移交到首个可用通道图谱所需的天数
    - 每次上线相比此前系统集成商主导流程节省的手工发现时间
    - 付费试点转化为年度生产的比率
    - 12 个月内扩展至第二条通道或工厂的生产客户比例
    - 测试执行前发现的关键依赖关系或缺失责任人数量
  moatsToBuild:
    - 连接业务流程、自定义对象、接口、责任人、测试用例和上线结果的企业专属图谱
    - 工业 SAP 系统可重复工厂割接方案包的工作流模板和基准数据
    - 围绕只读部署、可审计性和跨系统证据建立的合作伙伴与客户信任——而非依赖通用 AI 生成
  killCriteria:
    - 9 个月内活跃 S/4 项目中的付费共创客户少于 2 个
    - 前 3 个试点后，首个可用通道图谱的中位交付时间仍超过 14 个日历天
    - 前 6 个付费试点的试点转年度转化率低于 30%
    - 少于半数的试点买方将输出用于实际割接批准或指导委员会决策
  mermaid: |
    flowchart LR
      Wedge[Single corridor rollout wedge] --> MVP[Read-only assurance graph MVP]
      MVP --> Proof[Approved cutover packet and faster discovery]
      Proof --> Expansion[Multi-plant and adjacent-system expansion]
investorMemo:
  verdict:
    call: 值得深入调研
    conviction: 强烈的痛点和时机值得合伙人级别的尽职调查，但说服力取决于能否证明快速付费试点和兼容系统集成商的部署。
    whyBelieve: SAP 截止日期、持续的迁移积压以及相邻类别领导者的指名 ROI，证明大型制造商已在为降低现代化风险投入真实预算。
    whyDoubt: 现有 ALM、QA、修复工具和系统集成商主导的替代方案可能吸收该用例，除非初创公司能从只读部署证明明显更快的前测试清晰度。
    nextDiligence: 确认两个付费共创客户能在两周内从现有交付物部署一条通道，并在一次活跃上线后转化为六位数年度订阅。
  firstCustomer:
    title: 多厂区制造商的 SAP 转型总监
    profile: 一家年营收 20 亿美元以上的制造商，正在多工厂分阶段推进 S/4HANA 上线，拥有自定义仓储、生产或财务接口，并由系统集成商主导交付。
    trigger: 已立项的上线、业务拆分或模板部署揭露了未记录的本地定制化内容，威胁到固定的上线日期。
    buyer: 企业应用副总裁或 CIO
    initialContract: $75K–$150K 付费试点，覆盖一条通道和一次活跃上线，转化后约为 $200K–$350K 的年度项目订阅（随更多工厂或通道纳入覆盖而增长）。
  mustBeTrue:
    - 转型主管将前测试波及范围保障作为独立预算项资助，而非将其视为系统集成商发现开销。
    - 第一个客户的一条通道可在 14 天内从只读交付物和副本建模完成。
    - 试点输出可信度足以用于实际割接批准、回归范围决策或指导委员会审查。
    - 系统集成商接受该产品为交付加速工具，而非阻止访问客户工作流或数据。
    - 从一条通道扩展至多工厂或周边系统，ACV 增幅足以支撑创业规模账户经济模型。
  diligenceQuestions:
    - 在最近两次 S/4 上线中，未记录的定制化内容究竟在哪个环节拖延了割接批准？
    - 当 QA、ALM 和系统集成商合同已经到位时，谁真正拥有前测试保障的预算？
    - 共创客户在第一周能提供哪些只读交付物，而无需经历漫长的安全例外审批？
    - Tricentis、Basis、smartShift、SNP 或 SAP ALM 已经在多大程度上充分回答了买方的波及范围问题？
    - 主要系统集成商会把这个产品当加速工具联合销售，还是视之为对差距分析和发现工作利润的压缩？
operatingAssumptions:
  - assumption: 第一个可重复的预算所有者是企业转型主管，而非工厂 IT 团队或系统集成商交付负责人。
    basis: idea.yaml
    validationTest: 至少关闭 5 个合格机会，并验证其中 3 个或以上拥有企业应用副总裁、CIO 或项目主管级别的预算所有权。
    decisionImpact: 若不成立，销售动作、ACV 和采购节奏均需调整，产品可能需要较低价格的合作伙伴主导打包方案。
  - assumption: 现有项目交付物和副本元数据足以搭建第一条通道，无需直接访问生产写入权限。
    basis: research.yaml
    validationTest: 在前 3 个试点中，采集所需的 SAP 和周边系统交付物，并在至少 2 个客户处于 14 天内交付首个图谱。
    decisionImpact: 若不成立，实施成本和安全摩擦将显著上升，该切口可能不适合 pre-seed 交付模型。
  - assumption: 买方会接受附通道或工厂扩展模块的项目制定价，而非席位制定价。
    basis: idea.yaml
    validationTest: 在至少 4 个活跃交易中测试项目制和席位制提案，比较赢单率、销售周期长度和年化合同价值。
    decisionImpact: 若不成立，TAM、扩展逻辑和收入可预测性将收窄，公司可能需要重新以席位或服务打包。
  - assumption: 系统集成商会把图谱视为加速工具，而非对可计费发现和差距分析工作的威胁。
    basis: research.yaml
    validationTest: 访谈至少 3 家 SAP 专注型系统集成商，并争取 2 个合作伙伴背书的试点引荐或联合交付协议。
    decisionImpact: 若不成立，直销负担上升，公司面临滑入重度服务实施的风险。
  - assumption: 只读证据、审计日志和人工审批足以通过受监管或安全敏感制造客户的治理审查。
    basis: operator judgment
    validationTest: 在 2 个试点客户处完成安全与治理审查，无需仅本地部署的定制架构或重大范围缩减。
    decisionImpact: 若不成立，公司必须收窄目标行业、提前投入平台安全建设，或放慢向受监管客户的扩展。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 20 位活跃 S/4HANA 上线项目中的转型总监、企业架构师和项目主管。
    hypothesis: 前测试波及范围的不确定性是与宽泛迁移分析或测试自动化相比最紧迫的工作流缺口。
    successMetric: 至少 10 位买方描述了近期因未记录依赖关系拖延割接批准或回归计划的上线，且 5 位同意进行工作流映射。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 从导出的 SAP 交付物、接口清单和割接文档手工重建一条历史通道。
    hypothesis: 买方即使在采集工作流完全自动化之前，也会重视一份可供指导委员会使用的保障方案包。
    successMetric: 2 位共创客户评审输出，且至少 1 位同意付费试点范围。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 使用一个共创客户复制的 SAP 元数据和周边系统交付物，对首个通道采集进行时间盒测试。
    hypothesis: 只读交付物足以在 14 天内构建出可用的首个图谱。
    successMetric: 首个图谱在 14 个日历天内交付，且买方确认捕获了大多数关键依赖关系。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 启动 3 个与活跃工厂上线或模板部署挂钩的付费试点。
    hypothesis: 付费通道试点比宽泛现代化平台的销售转化更快，因为截止日期和 ROI 已经可见。
    successMetric: 3 个付费试点启动，至少 2 个用于活跃割接规划，且至少 1 个转化为年度生产。
    owner: 创始人/CEO
  - horizon: 90–180 天
    experiment: 与 3 家 SAP 专注型系统集成商或转型咨询公司测试合作伙伴主导的分发。
    hypothesis: 如果产品能缩短发现工作而不取代修复范围，合作伙伴会将其作为加速工具销售。
    successMetric: 完成 3 次合作伙伴评估，并通过合作伙伴来源获取 2 个合格试点机会。
    owner: 创始人/CEO
  - horizon: 180–365 天
    experiment: 将第一个生产客户从一条通道扩展至第二个工厂或周边系统。
    hypothesis: 已安装的图谱建立了足够的信任和运营杠杆，可在 12 个月内支持账户扩展。
    successMetric: 至少 1 个客户扩展至第二条通道或工厂，增量年度合同价值超过初始订阅的 40%。
    owner: 方案架构师
operations:
  - 对 SAP 交付物、副本和周边系统元数据的最小权限只读采集，具备可审计的处理边界
  - 对每份波及范围报告、回归测试包和割接建议实施人工审批工作流
  - 订单至回款、仓库至工厂和财务上线方案包的标准通道模板库
  - 含来源差距审查、图谱质量检查和割接就绪检查点的每周试点运营节奏
  - 涵盖日志记录、保留期、访问审查和受监管环境异议的安全与治理手册
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 企业类别创建、合作伙伴拓展和早期销售需要创始人主导与买方和系统集成商的对话。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 第一个产品风险是从混乱的 ERP 交付物中可靠地采集和构建图谱，而非广泛的商业化扩展。
  - role: 应用 AI 工程师
    startTiming: Month 2
    rationale: 公司必须把图谱证据转化为具有清晰置信度和可追溯性的可用波及范围、回归和割接输出。
  - role: 方案架构师
    startTiming: Month 4
    rationale: 早期客户需要工作流映射、交付物采集和部署规范，以便把试点控制在活跃项目时间线内。
  - role: 安全与平台工程师
    startTiming: Month 8
    rationale: 采购速度和受监管客户的准入取决于可审计性、部署边界和连接器可靠性。
  - role: 合作伙伴与客户负责人
    startTiming: Month 12
    rationale: 只有在试点打包、定价和系统集成商辅助部署显示出可重复性之后，才增加带指标的商务负责人。
milestones:
  - horizon: 0–12 个月
    items:
      - 在活跃 S/4HANA 制造业项目中赢得 3–5 个付费共创客户
      - 至少 2 个试点在 14 天内交付首个可用通道图谱
      - 至少 2 个付费试点转化为年度订阅
      - 证明输出被用于实际割接规划，而非仅用于发现研讨会
  - horizon: 12–24 个月
    items:
      - 将生产客户扩展至多条通道、工厂或周边系统
      - 建立 3–5 个持续稳定来源合格机会的系统集成商或咨询渠道关系
      - 发布已完成上线的基准报告，强化产品差异化和扩展
  - horizon: 24–36 个月
    items:
      - 在制造业滩头市场实现跨 SAP 以及部分 MES 或 WMS 工作流的跨系统覆盖
      - 建立足够大的参考客户群，在 ALM、QA 和修复现有厂商面前捍卫中立保障类别
      - 从上线保障扩展至业务拆分、模板推广和其他周期性企业变更事件
risks:
  - risk: 产品因每套 ERP 环境都需要定制化图谱构建而退化为定制服务。
    likelihood: Medium
    impact: High
    mitigation: 标准化第一条通道模板，保持只读，让合作伙伴承担定制化修复和实施工作。
  - risk: SAP、Tricentis、Basis、smartShift、SNP 或大型系统集成商在更大合同范围内充分回答了波及范围问题。
    likelihood: High
    impact: High
    mitigation: 以供应商中立的跨系统证据、更快的首个方案包交付时间，以及从一个受信通道图谱出发的扩展路径来差异化，而非依赖通用迁移 AI 声明。
  - risk: 安全与治理审查将试点推迟到超出活跃上线窗口的时间。
    likelihood: Medium
    impact: High
    mitigation: 从副本交付物起步，记录严格的只读边界，并从第一天起打包审计日志和审批控件。
  - risk: 系统集成商因产品减少可计费发现工作而阻碍或放缓采用。
    likelihood: Medium
    impact: Medium
    mitigation: 将产品定位为售前和交付加速工具，在上线工作流中共享功劳，并避免过早进入修复执行阶段。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3–4M
  runwayMonths: 18
  useOfFundsSummary: 构建只读图谱产品，完成 3–5 个企业试点，强化安全性和可审计性，并在扩展至更大系统范围之前，在 SAP 制造业滩头市场验证直销加合作伙伴主导的 GTM 打法。
