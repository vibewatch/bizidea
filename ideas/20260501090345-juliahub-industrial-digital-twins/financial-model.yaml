scenarios:
  downside:
    description: Slower digital-maturity adoption and a 9-month sales cycle leave the company short of the 40-account SOM path.
    y3RevenueK: 1760.0
    y3EbitdaK: -1195.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
      - Sales cycle stretches from 6 months to 9 months.
      - Pilot-to-production conversion falls from 50%+ target to ~35%.
      - Second-program expansion falls below the 60% target in the business plan.
  base:
    description: Base case reaches 40 production accounts by Q4Y3 at ~$100K ACV with 70% gross margin and near-breakeven Q4Y3 EBITDA.
    y3RevenueK: 2425.0
    y3EbitdaK: -837.5
    cashLowPointK: 446.833
    keyAssumptionChanges:
      - Two paid production accounts land in Y1.
      - Production accounts scale to 12 by Q4Y2 and 40 by Q4Y3.
      - Gross margin stays at the 70% target from the business plan.
  upside:
    description: Faster onboarding, stronger partner help, and higher program expansion push the business materially above the SOM path.
    y3RevenueK: 3180.0
    y3EbitdaK: -140.0
    cashLowPointK: 910.0
    keyAssumptionChanges:
      - Sales cycle compresses to 4-5 months.
      - Pilot-to-production conversion rises to ~65%.
      - Blended ACV reaches ~$110K as more accounts standardize across multiple programs.
sensitivity:
  - variable: ARPU
    downsideCase: Blended ACV settles near $85K because buyers keep the deployment to one program longer.
    baseCase: Production accounts reach roughly $100K annualized ACV.
    upsideCase: Standardization across more programs lifts blended ACV to roughly $115K.
    y3RevenueImpactK: -365.0
    cashImpactK: -255.0
  - variable: CAC
    downsideCase: CAC rises to $90K because industrial outbound needs more founder and partner time.
    baseCase: CAC is modeled at $70K per production account.
    upsideCase: CAC falls to $55K once references and partner channels improve close rates.
    y3RevenueImpactK: -120.0
    cashImpactK: -280.0
  - variable: churn
    downsideCase: Monthly churn reaches 2.0% if onboarding quality or trust is weak.
    baseCase: Monthly churn is 1.25%.
    upsideCase: Monthly churn falls to 0.8% once the product is embedded in release workflows.
    y3RevenueImpactK: -210.0
    cashImpactK: -150.0
  - variable: sales cycle
    downsideCase: Security and architecture review push average cycle time to 9 months.
    baseCase: The model assumes roughly a 6-month cycle after early pilots.
    upsideCase: Reusable templates and references compress cycle time to 4 months.
    y3RevenueImpactK: -525.0
    cashImpactK: -300.0
  - variable: gross margin
    downsideCase: Gross margin slips to 62% if onboarding and support remain services-heavy.
    baseCase: Gross margin holds at 70%.
    upsideCase: Gross margin improves to 76% as connectors and templates standardize.
    y3RevenueImpactK: 0.0
    cashImpactK: -194.0
  - variable: hiring pace
    downsideCase: Two post-pilot hires are pulled forward into Y2 before repeatable onboarding is proven.
    baseCase: Hiring follows the conservative ramp in the business plan and this model.
    upsideCase: One non-customer-facing hire is delayed until after 10 production accounts are live.
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> QualifiedPilots
      QualifiedPilots --> PaidAccounts
      PaidAccounts --> ProgramsPerAccount
      ProgramsPerAccount --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven mainly by scaling from 2 paid accounts in Y1 to 40 by Q4Y3 at roughly $100K ACV rather than by aggressive price increases.
  - checkName: Must go right
    finding: File/API-light onboarding has to stay near the plan's sub-6-week target so pilot conversions can support the jump to 12 production accounts by Q4Y2.
  - checkName: Model breaks if
    finding: The downside case shows that a 9-month sales cycle or weak second-program expansion can push cash below zero before the next round.
  - checkName: Next-round proof
    finding: The seed story gets stronger once 10+ production accounts are live and at least 60% of early customers expand to a second program or adjacent module.
sanityChecks:
  ruleOf40: Y3 growth 259% + EBITDA margin -34.5% = 224.5% (directionally strong but inflated by a still-small revenue base).
  burnMultiple: Y3 burn multiple is about 0.3x, using $837.5K EBITDA burn against roughly $2.8M of net new ARR from $1.2M to $4.0M year-end ARR.
  revenuePerFte: $202K Y3 recognized revenue per end-of-year FTE (12), which is within the lower bound of a reasonable enterprise SaaS benchmark once the team reaches scale.
  flags:
    - The model assumes the company can hold 70% gross margin even while early deployments still need solutions-engineering help; real Y1-Y2 gross margin could be lower.
    - Reaching 40 accounts by Q4Y3 implies capturing a meaningful share of the 200-account modeled SAM quickly, so missed conversion timing would hit revenue hard.
    - Cash is modeled as EBITDA plus the opening round only; capex, deferred revenue, and working-capital swings are intentionally ignored.
    - Year 3 is not fully profitable in the base case, so the next round still depends on proving expansion efficiency rather than on reaching standalone breakeven.
