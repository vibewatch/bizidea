scenarios:
  downside:
    description: 如果数字成熟度采用更慢、销售周期拉长到 9 个月，公司将难以达到 40 个账户的 SOM 路径。
    y3RevenueK: 1760.0
    y3EbitdaK: -1195.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
      - 销售周期从 6 个月拉长到 9 个月。
      - 试点转生产的转化率从 50%+ 目标降到约 35%。
      - 相比业务计划中的 60% 目标，第二个项目扩张率明显更低。
  base:
    description: 基准情形是在 Q4Y3 达到 40 个生产账户，ACV 约 $100K，毛利率 70%，Q4Y3 EBITDA 接近盈亏平衡。
    y3RevenueK: 2425.0
    y3EbitdaK: -837.5
    cashLowPointK: 446.833
    keyAssumptionChanges:
      - 第 1 年拿下 2 个付费生产账户。
      - 生产账户在 Q4Y2 扩展到 12 个，Q4Y3 扩展到 40 个。
      - 毛利率维持在业务计划中的 70% 目标。
  upside:
    description: 如果导入更快、伙伴协同更强、项目扩张更顺，业务表现将明显跑赢 SOM 路径。
    y3RevenueK: 3180.0
    y3EbitdaK: -140.0
    cashLowPointK: 910.0
    keyAssumptionChanges:
      - 销售周期压缩到 4-5 个月。
      - 试点转生产转化率提升到约 65%。
      - 随着更多账户在多个项目上标准化，混合 ACV 提升到约 $110K。
sensitivity:
  - variable: ARPU
    downsideCase: 如果客户更长时间只在单个项目上部署，混合 ACV 会落在约 $85K。
    baseCase: 生产账户的年化 ACV 大致达到 $100K。
    upsideCase: 随着更多项目标准化，混合 ACV 提升到约 $115K。
    y3RevenueImpactK: -365.0
    cashImpactK: -255.0
  - variable: CAC
    downsideCase: 如果工业外呼需要更多创始人与伙伴投入，CAC 会上升到 $90K。
    baseCase: 模型按每个生产账户 $70K CAC 计算。
    upsideCase: 当参考案例和伙伴渠道改善成交率后，CAC 可降至 $55K。
    y3RevenueImpactK: -120.0
    cashImpactK: -280.0
  - variable: churn
    downsideCase: 如果导入质量或信任感偏弱，月流失率可能升到 2.0%。
    baseCase: 月流失率为 1.25%。
    upsideCase: 一旦产品嵌入发布流程，月流失率可降到 0.8%。
    y3RevenueImpactK: -210.0
    cashImpactK: -150.0
  - variable: sales cycle
    downsideCase: 安全与架构评审把平均销售周期推长到 9 个月。
    baseCase: 模型假设早期试点之后销售周期约为 6 个月。
    upsideCase: 可复用模板和参考案例把销售周期压缩到 4 个月。
    y3RevenueImpactK: -525.0
    cashImpactK: -300.0
  - variable: gross margin
    downsideCase: 如果导入和支持仍偏服务化，毛利率会下滑到 62%。
    baseCase: 毛利率维持在 70%。
    upsideCase: 随着连接器和模板标准化，毛利率提升到 76%。
    y3RevenueImpactK: 0.0
    cashImpactK: -194.0
  - variable: hiring pace
    downsideCase: 在导入可复制性被证明前，就把 2 个试点后的岗位提前招到第 2 年。
    baseCase: 招聘按照业务计划和本模型中的保守节奏推进。
    upsideCase: 一个非客户侧岗位延后到 10 个生产账户上线之后再招。
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Leads --> QualifiedPilots
      QualifiedPilots --> PaidAccounts
      PaidAccounts --> ProgramsPerAccount
      ProgramsPerAccount --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形下的收入增长，主要来自付费账户从第 1 年的 2 个扩张到 Q4Y3 的 40 个，而不是来自激进提价。
  - checkName: 必须跑通的前提
    finding: 文件/API 轻接入必须维持在计划中的 6 周以内首个价值，否则试点转化无法支撑到 Q4Y2 达成 12 个生产账户。
  - checkName: 模型失效条件
    finding: 下行情形表明，如果销售周期拖到 9 个月，或第二个项目扩张偏弱，公司会在下一轮融资前出现现金转负。
  - checkName: 下一轮融资的证明点
    finding: 当 10+ 个生产账户上线，且至少 60% 的早期客户扩张到第二个项目或相邻模块时，seed 轮故事会明显更强。
sanityChecks:
  ruleOf40: Y3 growth 259% + EBITDA margin -34.5% = 224.5%（方向上很强，但也受到收入基数仍然偏小的影响）。
  burnMultiple: Y3 burn multiple 约为 0.3x，按 $837.5K EBITDA burn 对比约 $2.8M 的净新增 ARR（年末 ARR 从 $1.2M 增至 $4.0M）。
  revenuePerFte: 以年末 12 名 FTE 计算，Y3 每名员工对应约 $202K 的已确认收入；对一个刚进入规模化的企业 SaaS 团队来说，处在合理区间下沿。
  flags:
    - 模型假设即便早期部署仍需要解决方案工程支撑，公司也能维持 70% 毛利率；现实中的 Y1-Y2 毛利率可能更低。
    - 到 Q4Y3 达成 40 个账户，意味着要很快拿下模型中 200 个 SAM 账户里相当可观的一部分，因此任何转化节奏延误都会明显冲击收入。
    - 现金仅按 EBITDA 加首轮融资建模；capex、递延收入和营运资本波动被有意忽略。
    - 基准情形下第 3 年仍未完全盈利，因此下一轮融资仍依赖扩张效率证明，而不是单独站上盈亏平衡。
