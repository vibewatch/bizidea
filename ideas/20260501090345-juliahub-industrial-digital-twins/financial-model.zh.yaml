  amountM: 3.6
  runwayMonths: 30
  milestone: 达到 10+ 个生产账户，证明第二个项目扩张可重复发生，并上线一个相邻 SAT/变更控制模块，同时在 seed 轮前保留 6 个月现金缓冲。
