date: '2026-05-01'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-06'
    unit: month
    source: '[idea.yaml date; startup-finance heuristic: 在报告日期后的下一个月开始建模]'
  - id: A2
    name: M1 的期初融资流入
    value: '3.6'
    unit: USDM
    source: '[business-plan fundingAsk $2-4M range; 取偏上中位数，以支撑 30 个月 runway 并留出缓冲]'
  - id: A3
    name: 起始付费生产客户数
    value: '0'
    unit: count
    source: '[business-plan milestones: 前 12 个月以共创客户和首批生产转化为主]'
  - id: A4
    name: 每个生产账户的稳态年度 ACV
    value: '100.0'
    unit: USDK
    source: '[business-plan market SOM; research.market.som: 40 accounts x ~$100k ACV]'
  - id: A5
    name: 每个活跃生产账户的月经常性收入
    value: '8.333'
    unit: USDK
    source: '[derived from A4: $100k / 12 months]'
  - id: A6
    name: 第 1 年付费生产转化计划
    value: '2 by M12'
    unit: count
    source: '[business-plan 0-12 month milestone: 至少把 2 个试点转为付费生产账户]'
  - id: A7
    name: 第 2 年客户计划
    value: '12 production accounts by Q4Y2'
    unit: count
    source: '[business-plan 12-24 month milestone: 达到 10+ production accounts; 模型略高于门槛]'
  - id: A8
    name: 第 3 年客户计划
    value: '40 production accounts by Q4Y3'
    unit: count
    source: '[business-plan market SOM; research.market.som: 第 3 年达到 40 accounts]'
  - id: A9
    name: 目标毛利率
    value: '70'
    unit: pct
    source: '[business-plan businessModel.targetGrossMarginPct]'
  - id: A10
    name: 月度 logo 流失率
    value: '1.25'
    unit: pct
    source: '[startup-finance heuristic: 上线后使用黏性较强、但实施风险并非为零的早期企业工作流软件]'
  - id: A11
    name: 每个新生产账户的全负担 CAC
    value: '70.0'
    unit: USDK
    source: '[startup-finance heuristic: 工业企业直销，验证主导的销售周期约 6-9 个月]'
  - id: A12
    name: CEO 全负担年度现金薪酬
    value: '192'
    unit: USDK
    source: '[startup-finance heuristic: pre-seed 工业软件创始人薪酬 + 20% burden]'
  - id: A13
    name: 创始工程师全负担年度现金薪酬
