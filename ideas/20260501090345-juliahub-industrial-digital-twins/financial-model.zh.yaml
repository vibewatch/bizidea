scenarios:
  downside:
    description: 数字成熟度采用更慢且销售周期拉长到 9 个月，使公司无法走上 40 账户 SOM 路径。
    y3RevenueK: 1760.0
    y3EbitdaK: -1195.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
    - 销售周期从 6 个月拉长到 9 个月。
    - 试点转正式生产的转化率从 50%+ 目标降到约 35%。
    - 第二项目扩展低于 business plan 中 60% 的目标。
  base:
    description: 基础情境在 Q4Y3 达到 40 个正式生产账户，ACV 约为 $100K，毛利率 70%，Q4Y3 EBITDA 接近盈亏平衡。
    y3RevenueK: 2425.0
    y3EbitdaK: -837.5
    cashLowPointK: 446.833
    keyAssumptionChanges:
    - Y1 落地 2 个付费正式生产账户。
    - 正式生产账户到 Q4Y2 增长至 12 个，到 Q4Y3 增长至 40 个。
    - 毛利率维持在 business plan 设定的 70% 目标。
  upside:
    description: 更快的导入、更强的伙伴助力和更高的项目扩展，使业务显著高于 SOM 路径。
    y3RevenueK: 3180.0
    y3EbitdaK: -140.0
    cashLowPointK: 910.0
    keyAssumptionChanges:
    - 销售周期压缩到 4-5 个月。
    - 试点转正式生产的转化率升至约 65%。
    - 随着更多账户在多个项目上标准化，混合 ACV 达到约 $110K。
sensitivity:
- variable: ARPU
  downsideCase: 由于买家更长时间只在单个项目上部署，混合 ACV 稳定在约 $85K。
  baseCase: 正式生产账户达到约 $100K 年化 ACV。
  upsideCase: 更多项目上的标准化把混合 ACV 提升到约 $115K。
  y3RevenueImpactK: -365.0
  cashImpactK: -255.0
- variable: CAC
  downsideCase: 工业外呼需要更多创始人与伙伴时间，导致 CAC 升至 $90K。
  baseCase: 模型按每个正式生产账户 $70K CAC 计算。
  upsideCase: 当客户案例和伙伴渠道提升成交率后，CAC 降至 $55K。
  y3RevenueImpactK: -120.0
  cashImpactK: -280.0
- variable: 流失率
  downsideCase: 若导入质量或信任不足，月流失率升至 2.0%。
  baseCase: 月流失率为 1.25%。
  upsideCase: 当产品深度嵌入发布工作流后，月流失率降至 0.8%。
  y3RevenueImpactK: -210.0
  cashImpactK: -150.0
- variable: 销售周期
  downsideCase: 安全和架构审查把平均周期推长至 9 个月。
  baseCase: 模型假设早期试点后周期约为 6 个月。
  upsideCase: 可复用模板和客户案例把周期压缩到 4 个月。
  y3RevenueImpactK: -525.0
  cashImpactK: -300.0
- variable: 毛利率
  downsideCase: 如果导入和支持仍然高度服务化，毛利率会下滑到 62%。
  baseCase: 毛利率维持在 70%。
  upsideCase: 随着连接器和模板标准化，毛利率提升到 76%。
  y3RevenueImpactK: 0.0
  cashImpactK: -194.0
- variable: 招聘节奏
  downsideCase: 在可复制导入尚未验证前，就把 2 个试点后岗位提前到 Y2 招入。
  baseCase: 招聘遵循 business plan 和本模型中的保守节奏。
  upsideCase: 1 个不直接面向客户的岗位延后到 10 个正式生产账户上线之后再招聘。
  y3RevenueImpactK: 0.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济流
  mermaid: "flowchart LR\n  Leads[线索] --> QualifiedPilots[合格试点]\n  QualifiedPilots --> PaidAccounts[付费账户]\n  PaidAccounts --> ProgramsPerAccount[每账户项目数]\n  ProgramsPerAccount --> Revenue[收入]\n  Revenue --> GrossProfit[毛利]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情境收入主要来自于付费账户从 Y1 的 2 个扩张到 Q4Y3 的 40 个、且 ACV 约为 $100K，而不是依赖激进提价。
- checkName: 必须做对的事
  finding: 轻文件/API 导入必须接近计划中的“低于 6 周”目标，这样试点转化才能支撑到 Q4Y2 达到 12 个正式生产账户。
- checkName: 模型失效条件
  finding: 下行情境显示，如果销售周期拉长到 9 个月，或第二项目扩展疲弱，下一轮融资前现金可能跌破零。
- checkName: 下一轮证明点
  finding: 一旦 10+ 个正式生产账户上线，且至少 60% 的早期客户扩展到第二项目或相邻模块，seed 融资故事就会更有说服力。
sanityChecks:
  ruleOf40: Y3 增长率 259% + EBITDA 利润率 -34.5% = 224.5%（方向上很强，但也被仍然较小的收入基数放大）。
  burnMultiple: Y3 burn multiple 约为 0.3x，计算方式为 $837.5K EBITDA burn 对应年末 ARR 从 $1.2M 增至 $4.0M 所带来的约 $2.8M 新增 ARR。
  revenuePerFte: 按年末 FTE（12）计算，Y3 每 FTE 已确认收入为 $202K；团队达到一定规模后，这处于合理企业 SaaS 基准的下界。
  flags:
  - 模型假设公司即使在早期部署仍需要解决方案工程支持时，也能维持 70% 毛利率；实际 Y1-Y2 毛利率可能更低。
  - 到 Q4Y3 达到 40 个账户，意味着要在较短时间内拿下模型中 200 账户 SAM 的可观份额，因此任何转化节奏失误都会重击收入。
  - 模型中的现金仅按 EBITDA 加初始融资轮计算；capex、递延收入和营运资金波动被有意忽略。
  - 基础情境下第 3 年仍未完全盈利，因此下一轮融资仍取决于证明扩张效率，而不是实现独立盈亏平衡。
