slug: digital-twin-fat-os
date: '2026-05-01'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[idea.yaml 日期；startup-finance 经验法则：模型从报告日期后的下一个月开始]'
- id: A2
  name: M1 初始融资流入
  value: '3.6'
  unit: USDM
  source: '[business-plan fundingAsk 的 $2-4M 区间；取偏上中位数，以覆盖 30 个月并留出缓冲]'
- id: A3
  name: 起始付费正式生产客户数
  value: '0'
  unit: count
  source: '[business-plan 里程碑：前 12 个月以设计伙伴和首批正式生产转化为主]'
- id: A4
  name: 每个正式生产账户的稳态年度 ACV
  value: '100.0'
  unit: USDK
  source: '[business-plan market SOM；research.market.som：40 个账户 × ~$100k ACV]'
- id: A5
  name: 每个活跃正式生产账户的月经常性收入
  value: '8.333'
  unit: USDK
  source: '[由 A4 推导：$100k / 12 个月]'
- id: A6
  name: 第 1 年付费正式生产转化计划
  value: 到 M12 为 2 家
  unit: count
  source: '[business-plan 0-12 个月里程碑：至少将 2 个试点转为付费正式生产账户]'
- id: A7
  name: 第 2 年客户计划
  value: 到 Q4Y2 为 12 个正式生产账户
  unit: count
  source: '[business-plan 12-24 个月里程碑：达到 10+ 个正式生产账户；模型略高于该门槛]'
- id: A8
  name: 第 3 年客户计划
  value: 到 Q4Y3 为 40 个正式生产账户
  unit: count
  source: '[business-plan market SOM；research.market.som：第 3 年达到 40 个账户]'
- id: A9
  name: 目标毛利率
  value: '70'
  unit: pct
  source: '[business-plan businessModel.targetGrossMarginPct]'
- id: A10
  name: 月度 logo 流失率
  value: '1.25'
  unit: pct
  source: '[startup-finance 经验法则：早期企业工作流软件在部署后具备黏性，但实施风险不为零]'
- id: A11
  name: 每新增一个正式生产账户的全负荷 CAC
  value: '70.0'
  unit: USDK
  source: '[startup-finance 经验法则：工业企业直销，验证主导的销售周期为 6-9 个月]'
- id: A12
  name: CEO 全负荷年度现金薪酬
  value: '192'
  unit: USDK
  source: '[startup-finance 经验法则：pre-seed 工业软件创始人薪资 + 20% 附加负担]'
- id: A13
  name: 创始工程师全负荷年度现金薪酬
  value: '204'
  unit: USDK
  source: '[startup-finance 经验法则：资深创始工程师薪资 + 20% 附加负担]'
- id: A14
  name: 领域产品 / 解决方案负责人全负荷年度现金薪酬
  value: '180'
  unit: USDK
  source: '[startup-finance 经验法则：产品/领域负责人薪资 + 20% 附加负担]'
- id: A15
  name: 解决方案工程师全负荷年度现金薪酬
  value: '168'
  unit: USDK
  source: '[startup-finance 经验法则：企业解决方案工程师薪资 + 20% 附加负担]'
- id: A16
  name: 企业 AE 全负荷年度现金薪酬
  value: '216'
  unit: USDK
  source: '[startup-finance 经验法则：企业 AE 底薪 + 浮动现金 + 附加负担]'
- id: A17
  name: 安全 / 平台工程师全负荷年度现金薪酬
  value: '198'
  unit: USDK
  source: '[startup-finance 经验法则：安全/平台工程师薪资 + 20% 附加负担]'
- id: A18
  name: 后端 / ML 工程师全负荷年度现金薪酬
  value: '192'
  unit: USDK
  source: '[startup-finance 经验法则：资深后端或 ML 工程师薪资 + 20% 附加负担]'
- id: A19
  name: 客户成功 / 实施全负荷年度现金薪酬
  value: '150'
  unit: USDK
  source: '[startup-finance 经验法则：实施/客户成功薪资 + 20% 附加负担]'
- id: A20
  name: 产品 / ML 工程师全负荷年度现金薪酬
  value: '186'
  unit: USDK
  source: '[startup-finance 经验法则：偏产品导向的 ML 工程师薪资 + 20% 附加负担]'
- id: A21
  name: 运营 / 财务行政全负荷年度现金薪酬
  value: '108'
  unit: USDK
  source: '[startup-finance 经验法则：精益创业运营/行政薪资 + 20% 附加负担]'
- id: A22
  name: 工程师 3 全负荷年度现金薪酬
  value: '192'
  unit: USDK
  source: '[startup-finance 经验法则：资深工程师薪资 + 20% 附加负担]'
- id: A23
  name: 非工资研发工具与基础设施开支
  value: Y1 为 4K/mo；Y2-Y3 为 15-27K/qtr
  unit: USDK
  source: '[startup-finance 经验法则；与在更深集成前采用轻文件/API 的 MVP 一致]'
- id: A24
  name: 非工资销售与市场开支
  value: AE 到岗前为 4K/mo，Y1 后段为 8-10K/mo，Y2-Y3 为 27-63K/qtr
  unit: USDK
  source: '[startup-finance 经验法则；先由创始人主导外呼，再做轻量企业需求获取]'
- id: A25
  name: 非工资 G&A 开支
  value: Y1 为 8K/mo；Y2-Y3 为 30-33K/qtr
  unit: USDK
  source: '[startup-finance 经验法则：法务、会计、保险和后台软件]'
- id: A26
  name: 来自计划的初始招聘时间点
  value: 创始工程师和领域负责人在 M1；解决方案工程师 M4；AE M7；安全/平台工程师 M10
  unit: timing
  source: '[business-plan 团队部分]'
- id: A27
  name: 后续招聘节奏
  value: 后端/ML Q2Y2；客户成功 Q3Y2；产品/ML Q4Y2；AE2 Q1Y3；运营/行政 Q2Y3；工程师3 Q3Y3
  unit: timing
  source: '[business-plan 里程碑 + startup-finance 关于试点后保守扩张的经验法则]'
- id: A28
  name: 季度收入确认方法
  value: 期初与期末正式生产账户平均数 × 每季度 25K
  unit: formula
  source: '[由 A4 以及季度内均匀签约时间经验法则推导]'
- id: A29
  name: 现金转化假设
  value: EBITDA 近似经营现金流；未建模债务、capex 或营运资金波动
  unit: policy
  source: '[用于早期 SaaS 规划模型的 startup-finance 经验法则]'
- id: A30
  name: 融资需求的资金用途拆分
  value: 43.0% 工程研发，26.3% GTM，14.0% G&A，16.7% 六个月缓冲
  unit: pct
  source: '[由模型中的薪酬结构、非工资运营支出和所需缓冲推导]'
