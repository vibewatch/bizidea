    value: '186'
    unit: USDK
    source: '[startup-finance heuristic: 偏产品方向的 ML 工程师薪酬 + 20% burden]'
  - id: A21
    name: 运营 / 财务行政全负担年度现金薪酬
    value: '108'
    unit: USDK
    source: '[startup-finance heuristic: 精简型初创公司运营/行政薪酬 + 20% burden]'
  - id: A22
    name: 第三位工程师全负担年度现金薪酬
    value: '192'
    unit: USDK
    source: '[startup-finance heuristic: 资深工程师薪酬 + 20% burden]'
  - id: A23
    name: 非人员 R&D 工具和基础设施支出
    value: '4K/mo in Y1; 15-27K/qtr in Y2-Y3'
    unit: USDK
    source: '[startup-finance heuristic; 对齐文件/API 轻接入的 MVP 路线，在更深集成前保持克制]'
  - id: A24
    name: 非人员销售与市场支出
    value: '4K/mo pre-AE, 8-10K/mo late Y1, 27-63K/qtr in Y2-Y3'
    unit: USDK
    source: '[startup-finance heuristic; 前期由创始人主导外呼，随后补轻量企业获客动作]'
  - id: A25
    name: 非人员 G&A 支出
    value: '8K/mo in Y1; 30-33K/qtr in Y2-Y3'
    unit: USDK
    source: '[startup-finance heuristic: 法务、会计、保险和后台软件]'
  - id: A26
    name: 来自计划的初始招聘时点
    value: 'Founding eng and domain lead at M1; solutions engineer M4; AE M7; security/platform engineer M10'
    unit: timing
    source: '[business-plan team section]'
  - id: A27
    name: 后续招聘节奏
    value: 'Backend/ML Q2Y2; Customer success Q3Y2; Product/ML Q4Y2; AE2 Q1Y3; Ops/admin Q2Y3; Engineer3 Q3Y3'
    unit: timing
    source: '[business-plan milestones plus startup-finance heuristic for conservative post-pilot scaling]'
  - id: A28
    name: 按季度确认收入的方法
    value: 'Average of beginning and ending production accounts x 25K per quarter'
    unit: formula
    source: '[derived from A4 and even-in-quarter close timing heuristic]'
  - id: A29
    name: 现金转换假设
    value: 'EBITDA approximates operating cash flow; no debt, capex, or working-capital swing modeled'
    unit: policy
    source: '[startup-finance heuristic for early SaaS planning model]'
  - id: A30
    name: 融资用途拆分
    value: '43.0% engineering, 26.3% GTM, 14.0% G&A, 16.7% six-month buffer'
    unit: pct
    source: '[derived from modeled payroll mix, non-payroll opex, and requested buffer]'
