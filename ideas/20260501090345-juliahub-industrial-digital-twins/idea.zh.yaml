problem: 定制工业设备 OEM 仍然通过电子表格、临时仿真导出和手工签核链来完成工厂验收测试。当设计参数在周期后段发生变化时，验证工程师必须重新构建测试矩阵、重新运行部分仿真，并从零开始为客户整理证据包。这会拖慢发货、消耗稀缺的控制与系统人才，并在买方质疑数字孪生是否足以证明现场就绪时引发高成本争议。
targetUser:
  primary: 面向拥有 50-500 名工程师、交付定制压缩机、泵、热系统或工艺撬装设备的中型工业设备 OEM 的验证与系统工程负责人
  secondary: 负责协调工厂验收测试的控制工程师和技术项目经理
  buyer: 拥有较长 FAT 周期的定制设备制造商中的工程副总裁或验证总监
startupThesis:
  nonObviousInsight: Agentic AI 在工业工程中的首个胜点，不会是替代 CAD 或仿真工具，而是把碎片化的孪生产出转化为可审计的发布决策，从而解除发货阻塞。
  beachhead: 面向已具备数字孪生模型、但验证流程仍高度手工化的按单工程化工业设备 OEM 团队的工厂验收测试准备
  wedge: 一个从数字孪生到 FAT 证据的中间层，可基于现有仿真模型自动生成测试计划、参数扫描、异常日志和面向客户的签核包
  whyNowCatalyst: JuliaHub 的融资与 Dyad 3.0 发布表明，agentic 工具正在降低工业数字孪生的使用门槛，因此瓶颈转移到了验证治理与发货就绪上。
  ventureScalePath: 先从定制设备 OEM 的 FAT 就绪切入，再扩展到 SAT、工程变更控制、质保根因分析，最终成为基于模型的工业发布管理记录系统。
solution: 产品会接入 OEM 仿真与 PLM 栈中的现有数字孪生输出、需求文档和历史 FAT 模板。系统将设计需求映射为可执行的虚拟测试用例，对孪生模型执行参数扫描，并在硬件进入测试区之前标出证据缺口。随后，系统生成可追溯的 FAT 包，包含假设、通过/失败标准、异常处理，以及与每个模型版本绑定的面向客户报告。随着使用积累，系统会学习哪些测试证据最常导致发货延误，并建议最少还需补做哪些仿真或台架测试，才能降低签核风险。对于模型管线不够整洁的客户，初始部署会提供面向常见仿真导出与文档库的轻量连接器，而不是要求客户先重构整套数字孪生平台。
goToMarketSeed:
  firstCustomer: 美国或欧洲、拥有 50 至 500 名工程师、生产压缩机、热系统或工艺撬装设备，并且每次发货前都已使用仿真模型的定制设备 OEM
  buyingTrigger: 周期后段的设计变更或 FAT 失败，威胁交付日期、违约赔偿或客户信任
  currentAlternative: Excel 测试矩阵、内部脚本、PLM 附件、手工重跑仿真，以及代为整理 FAT 资料夹的工程服务公司
  switchingReason: 该切入点无需更换 OEM 现有 CAD 或仿真栈，就能把现有孪生数据转成完整证据包，从而为每次发货节省数周时间。
  pricingHypothesis: 采用年度平台费加按活跃设备项目或进入 FAT 的已发货系统计费的用量模式
