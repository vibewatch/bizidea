  valuePropositions: [把数字孪生产出转成可审计的 FAT 资料包、减少后期工程变更造成的出货延迟、保留既有仿真工作流同时提升签核速度]
  channels: [直销、垂直行业系统集成商、仿真与 PLM 生态伙伴]
  customerRelationships: [高触达企业级导入、与验证团队共创工作流、从相邻发布流程扩张]
  revenueStreams: [年度软件订阅、按活跃设备项目收取使用费、初始连接器搭建服务]
  keyResources: [仿真连接器、验证知识图谱、工作流模板、行业工程经验]
  keyActivities: [集成 twin 数据源、生成可追溯测试证据、维护验证模板、支持企业级部署]
  keyPartners: [仿真软件渠道商、PLM 集成商、FAT 服务公司、工业 OEM 共创伙伴]
  costStructure: [工程、行业解决方案架构师、企业销售、客户导入]
jobsToBeDone:
  - job: 当一台定制设备在接近出货时发生设计变更，帮验证负责人快速重建测试计划和证据包，让团队能在不拖延交付的情况下完成 FAT。
    currentAlternative: 人工更新电子表格并用内部脚本重跑仿真
    successMetric: 从设计冻结到 FAT 包获批所需天数
  - job: 当客户质疑数字孪生结果是否足以支撑签核时，帮系统工程师拿出可追溯的证明，避免争议和重复测试。
    currentAlternative: 邮件线程、PDF 导出和工程服务支持
    successMetric: 无需返工即获批准的 FAT 包占比
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 一笔完成融资再加一次产品发布，足以有力证明 agentic 工业工程正在成为真实的预算科目。
  painIntensity:
    score: 4
    rationale: 验收测试失败或延期会直接打击收入确认、交付节奏和工程产能利用率。
  wedgeClarity:
    score: 5
    rationale: FAT 证据生成是一个很窄的工作流，责任人、触发条件和 ROI 都很明确。
  defensibility:
    score: 4
    rationale: 一旦产品嵌入发布流程，工作流嵌入、验证模板与结果数据都会形成黏性。
  ventureScale:
    score: 4
    rationale: 这个滩头可以从 FAT 延伸到更广泛的工业发布管理，覆盖更多设备类别和生命周期阶段。
topRisks:
  - name: 集成摩擦
    description: 只要产品要求对既有仿真或 PLM 工作流做深度改造，工程团队就可能天然抗拒。
    mitigation: 先用基于文件和轻 API 的连接器，从导出模型和文档切入，再逐步走向更深集成。
  - name: 证明负担
    description: 如果 AI 生成的测试建议每一步都讲不清、追不回，客户就不会信任。
    mitigation: 让产品输出人类可读的假设、模型谱系与明确的证据缺口，而不是黑箱答案。
  - name: 初始市场过窄
    description: 如果第一滩头只限于数字孪生成熟、且 FAT 流程正式化的 OEM，市场可能太小。
    mitigation: 把目标扩展到具有类似出货签核痛点的相邻垂类，如工艺撬装、热系统和封装式工业子系统。
