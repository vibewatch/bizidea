  painIntensity:
    score: 4
    rationale: 验收测试失败或延误会直接打击收入确认、交付计划和工程利用率。
  wedgeClarity:
    score: 5
    rationale: FAT 证据生成是一个狭窄工作流，拥有明确负责人、触发事件和可衡量 ROI。
  defensibility:
    score: 4
    rationale: 一旦产品嵌入发布流程，工作流嵌入、验证模板和结果数据会形成黏性。
  ventureScale:
    score: 4
    rationale: 滩头市场可从 FAT 扩展到更广泛的工业发布管理，覆盖多类设备和生命周期阶段。
topRisks:
- name: 集成摩擦
  description: 如果产品要求对现有仿真或 PLM 工作流做深度改动，工程团队可能会抵触。
  mitigation: 先提供基于文件和轻 API 的连接器，从导出模型和文档入手，再逐步推进更深层集成。
- name: 证明负担
  description: 如果 AI 生成的测试建议无法被解释和追溯，客户可能不会信任。
  mitigation: 产品应生成可供人阅读的假设、模型谱系和明确的证据缺口，而不是黑箱答案。
- name: 初始市场过窄
  description: 若只局限于拥有成熟数字孪生和正式 FAT 流程的 OEM，最初滩头市场可能过小。
  mitigation: 瞄准具有类似发货签核痛点的相邻垂直领域，如工艺撬装、热系统和成套工业子系统。
