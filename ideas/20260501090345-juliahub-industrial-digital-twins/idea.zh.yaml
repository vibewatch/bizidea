problem: 定制化工业设备 OEM 现在仍靠电子表格、零散的仿真导出结果和人工签核链来推进工厂验收测试。只要在周期后段改动一个设计参数，验证工程师就得重做测试矩阵、重跑部分仿真，并从零开始为客户拼装证据包。这会拖慢出货、消耗稀缺的控制工程人才，还会在买方质疑数字孪生是否真能证明现场就绪时引发昂贵争议。
targetUser:
  primary: 向中型工业设备 OEM 输出定制化压缩机、泵、热系统或工艺撬装设备的验证与系统工程负责人
  secondary: 负责协同工厂验收测试的控制工程师与技术项目经理
  buyer: 拥有长 FAT 周期的定制化设备制造商中的工程副总裁或验证总监
startupThesis:
  nonObviousInsight: Agentic AI 在工业工程里的第一场胜利，不会来自替代 CAD 或仿真工具，而会来自把割裂的数字孪生产出转成可审计的发布决策，直接解开出货卡点。
  beachhead: 面向拥有数字孪生模型、但验证流程仍高度人工化的工程定制型工业设备 OEM 的 FAT 准备环节
  wedge: 一层从 twin 到 FAT 的证据层，可基于既有仿真模型自动生成测试计划、参数扫描、异常日志与面向客户的签核包
  whyNowCatalyst: JuliaHub 的融资与 Dyad 3.0 发布表明，agentic 工具正在让工业数字孪生更容易用起来，于是瓶颈自然转向验证治理与出货就绪。
  ventureScalePath: 先从定制设备 OEM 的 FAT 就绪切入，再扩展到 SAT、工程变更控制、保修期根因分析，最终成为基于模型的工业发布管理记录系统。
solution: 产品接入 OEM 仿真与 PLM 栈中已有的数字孪生产出、需求文档和历史 FAT 模板，把设计需求映射为可执行的虚拟测试用例，对 twin 运行参数扫描，并在硬件进入测试台之前指出哪些证据仍然缺失。随后，系统会生成可追溯的 FAT 包，明确假设、通过/失败标准、异常处理与面向客户的报告，并把它们逐项回连到对应模型版本。随着数据积累，它还能学会哪些测试证据最常导致出货延迟，并推荐为降低签核风险所需补充的最小仿真或台架测试。对于模型流水线不够干净的客户，首轮部署提供的是面向常见仿真导出和文档仓库的轻量连接器，而不是要求整套 twin 平台重构。
goToMarketSeed:
  firstCustomer: 美国或欧洲的定制化设备 OEM，工程团队规模约 50 至 500 人，生产压缩机、热系统或工艺撬装设备，并且每次出货前都已使用仿真模型
  buyingTrigger: 后期设计变更或一次失败的 FAT，已威胁到交付日期、违约赔偿或客户信任
  currentAlternative: Excel 测试矩阵、内部脚本、PLM 附件、人工重跑仿真，以及由工程服务公司整理 FAT 资料夹
  switchingReason: 这个切口不需要改动 OEM 既有 CAD 或仿真栈，就能把既有 twin 数据直接整理成完整证据包，从而为每次出货节省数周时间
  pricingHypothesis: 年度平台费加按使用量计费，按处于 FAT 阶段的活跃设备项目或按已出货系统收费
whyNow:
  - point: 工业软件买方已开始为自主代理式工程平台买单，这验证了这一类新工作流软件正在获得预算和管理层关注。
    signalRefs: [自主代理式工程赛道正在吸引资本]
    sourceRefs: [1, 2]
  - point: 第一个够清晰、可变现的场景不是通用 copilots，而是设计与测试自动化，这和 FAT 准备的痛点直接对齐。
    signalRefs: [设计与测试自动化是最直接的买方切口]
    sourceRefs: [1]
  - point: 当数字孪生逐渐成为运营决策工具，每一次模型变更都会放大对可追溯验证与发布治理的需求。
    signalRefs: [工业数字孪生正成为运营系统]
    sourceRefs: [2]
  - point: 产品发布与大额融资同时出现，通常说明客户正从试点好奇心转向生产部署，而后续瓶颈也因此暴露得更清楚。
    signalRefs: [产品发布叠加融资表明窗口期正在打开]
    sourceRefs: [2]
differentiator: 大多数工业 AI 创业公司都在追逐模型创建或通用工程 copilot。这个切口故意往后走一步，卡在资金已真正在冒烟、出货延迟可以被量化的位置。产品处在仿真产出和客户签核之间，因此可以与既有工程工具集成，而不是试图替换它们，这让它更容易实现快速切入与后续扩张，并沉淀围绕验证结果的专有数据集。
