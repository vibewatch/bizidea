jobsToBeDone:
- job: 当定制机器设计在临近发货时发生变化时，帮助验证负责人快速重建测试计划与证据包，从而在不延误交付的情况下完成 FAT。
  currentAlternative: 手工更新电子表格并通过内部脚本重跑仿真
  successMetric: 从设计冻结到 FAT 包获批的天数
- job: 当客户质疑数字孪生结果是否足以签核时，帮助系统工程师提供可追溯证明，从而避免争议和重复测试。
  currentAlternative: 邮件往来、PDF 导出和工程服务支持
  successMetric: 无需返工即可获批的 FAT 包占比
ideaScorecard:
  signalStrength:
    score: 4
