    mitigation: 把产品定位为带人工审核的证据生成和缺口识别，而不是自主签核。
    sourceRefs:
    - 25
    - 26
    - 28
  - friction: OT 与网络安全审查
    severity: high
    affectedBuyer: IT / 安全和企业架构团队
    mitigation: 提供强 RBAC、审计日志、灵活部署能力和清晰的软件供应链姿态。
    sourceRefs:
    - 25
    - 27
    - 29
  - friction: 预算所有权分散在工程、验证和数字化转型团队之间
    severity: medium
    affectedBuyer: 经济买家和项目发起人
    mitigation: 把 ROI 锚定在发货风险降低上，并从现有数字孪生 / PLM / 工程软件预算中切出开支。
    sourceRefs:
    - 18
    - 19
    - 20
    - 22
    - 24
  - friction: 模型完整性不足或元数据不一致
    severity: high
    affectedBuyer: 系统工程师和控制工程师
    mitigation: 从狭窄的 FAT 模板、明确的证据缺口暴露和符合标准的归一化做起。
    sourceRefs:
    - 16
    - 17
    - 30
    - 31
    - 32
    - 33
    - 34
