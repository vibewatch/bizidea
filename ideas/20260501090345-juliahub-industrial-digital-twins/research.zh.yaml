  validationPlan:
  - priority: high
    question: 目标 OEM 在后期设计变更后，究竟多频繁需要重建 FAT 资料包？每次发货会消耗多少工程师工时？
    evidenceToGather: 与压缩机、泵、HVAC 和工艺设备 OEM 的验证负责人进行 10+ 次访谈；收集带红线修改的 FAT 资料包样本和近期返工时间线。
