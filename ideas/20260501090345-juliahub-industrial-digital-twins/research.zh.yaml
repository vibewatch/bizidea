openQuestions:
- 有多少目标 OEM 项目会在每次出货前稳定依赖数字孪生或仿真产出，而不只是把它们用在少数旗舰项目上？
- 最先让买方感到值钱的工件到底是什么：自动生成的测试矩阵、异常日志、模型谱系视图，还是可直接交付给客户的 FAT 证据包？
- 产品能否先靠导出文件和轻 API 落地，还是客户在信任工作流前一定会要求更深的 PLM / 云 twin 集成？
- 预算更多掌握在验证负责人手里，还是更偏向 broader digital thread / 工业数据项目 owner？
