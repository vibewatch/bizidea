  validationPlan:
  - priority: high
    question: 目标 OEM 在后期设计变更后，到底多频繁地重建 FAT 资料包？每次出货要耗掉多少工程工时？
    evidenceToGather: 访谈 10+ 位来自压缩机、泵、HVAC 和工艺设备 OEM 的验证负责人；收集带红线修改的 FAT 样本和近期返工时间线。
  - priority: high
    question: 在客户承诺更深度的 PLM 或 twin 栈集成之前，是否愿意先采用文件/API 轻接入的证据层？
    evidenceToGather: 用导出的仿真结果、历史 FAT 模板和文档仓库做共创伙伴试点；测量接入时间和资料包生成速度。
  - priority: medium
    question: 哪类工件最先撬动付费意愿：测试计划生成、异常日志、审批资料包，还是模型谱系追溯？
    evidenceToGather: 通过排序式访谈和试点评分卡，对比既有人工流程成本与不同功能组合的感知价值。
