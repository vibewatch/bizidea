competitors:
- name: JuliaHub Dyad
  stage: scale-up
  wedge: 面向工程与数字孪生工作流的物理原生 AI。
  pricing: 企业定价未公开。
  strength: 围绕 agentic 工业工程的叙事强、且刚完成新一轮融资。
  weaknessVsUs: 定位更偏前链路的建模与测试自动化，而不是混合技术栈中的面向客户 FAT 证据治理。
  sourceRefs:
  - 1
  - 2
  - 3
- name: Siemens Xcelerator / Teamcenter / Simcenter
  stage: incumbent
  wedge: 覆盖数字孪生、SPDM、测试与虚拟调试的端到端工业 digital thread。
  pricing: 公开的是分层云打包方案，目录价未公开。
  strength: 在 OEM 工程工作流里拥有最深、最可信的既有布局。
  weaknessVsUs: 套件太宽，针对狭窄的 FAT 证据场景往往显得过重、实施也偏慢，这给轻量覆盖层留出了空间。
  sourceRefs:
  - 15
  - 16
  - 17
  - 18
  - 36
- name: AVEVA CONNECT / PI System
  stage: incumbent
  wedge: 面向资产密集型环境的工业智能与上下文化运营数据平台。
  pricing: 企业定价未公开。
  strength: 在工业上下文与 AI 分析上拥有强数据能力和伙伴生态。
  weaknessVsUs: 更接近数据基础设施和工业智能，而不是工程定制型 OEM 所需的出货级 FAT 资料包生成。
  sourceRefs:
  - 19
  - 20
  - 35
- name: AWS IoT TwinMaker
  stage: cloud platform
  wedge: 具备用量计费的云原生运营型数字孪生平台。
  pricing: 基于用量的公开定价。
  strength: 为自建 twin 应用的团队提供灵活的平台原语、连接器和图谱能力。
  weaknessVsUs: 仍需要客户或伙伴自己搭出验证工作流逻辑、审批流程和面向客户的证据输出。
  sourceRefs:
  - 21
  - 22
- name: Azure Digital Twins
  stage: cloud platform
  wedge: 用于建模环境、关系和遥测的云图谱服务。
  pricing: 基于用量的公开定价。
  strength: 企业集成深、安全姿态强，并且有成熟的 ontology 支持。
  weaknessVsUs: 这是典型的基础设施优先产品，默认并不掌握 FAT 专属文档、异常管理或签核工作流。
  sourceRefs:
  - 23
  - 24
  - 25
