competitors:
- name: JuliaHub Dyad
  stage: scale-up
  wedge: 面向工程和数字孪生工作流的物理原生 AI。
  pricing: 企业定价未公开。
  strength: 围绕 agentic 工业工程拥有强叙事和最新融资。
  weaknessVsUs: 其定位似乎更偏上游的建模和测试自动化，而不是跨混合技术栈、面向客户的下游 FAT 证据治理。
  sourceRefs:
  - 1
  - 2
  - 3
- name: Siemens Xcelerator / Teamcenter / Simcenter
  stage: incumbent
  wedge: 覆盖数字孪生、SPDM、测试和虚拟调试的端到端工业数字线程。
  pricing: 分层云打包公开，但标价未公开。
  strength: 在 OEM 工程工作流中拥有最广泛的 incumbents 足迹与深厚可信度。
  weaknessVsUs: 套件过于厚重，会让狭窄的 FAT 证据用例显得被过度服务或实施缓慢，从而为轻量覆盖层留下空间。
  sourceRefs:
  - 15
  - 16
  - 17
  - 18
  - 36
- name: AVEVA CONNECT / PI System
  stage: incumbent
  wedge: 在资产密集型环境中提供工业智能与上下文化运营数据。
  pricing: 企业定价未公开。
  strength: 在工业上下文和 AI 分析方面拥有强数据与伙伴生态。
  weaknessVsUs: 其能力更接近数据基础设施和工业智能，而不是面向按单工程化 OEM 的发货就绪 FAT 资料包生成。
  sourceRefs:
  - 19
  - 20
  - 35
- name: AWS IoT TwinMaker
  stage: cloud platform
  wedge: 具备用量定价的云原生运营数字孪生平台。
  pricing: 公开的用量定价。
  strength: 为构建定制数字孪生应用的团队提供灵活的平台原语、连接器和图谱能力。
  weaknessVsUs: 仍要求客户或伙伴自行构建验证工作流逻辑、审批流程和面向客户的证据输出。
  sourceRefs:
  - 21
  - 22
- name: Azure Digital Twins
  stage: cloud platform
  wedge: 用于建模环境、关系和遥测的云图谱服务。
  pricing: 公开的用量定价。
  strength: 拥有强企业集成、安全姿态和本体支持。
  weaknessVsUs: 属于基础设施优先产品；默认并不拥有 FAT 特定文档、异常管理或签核工作流。
  sourceRefs:
  - 23
  - 24
  - 25
