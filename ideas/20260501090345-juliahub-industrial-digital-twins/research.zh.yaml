    question: 在承诺更深的 PLM 或数字孪生栈集成之前，买家是否愿意先采用一个轻文件/API 的证据层？
    evidenceToGather: 使用导出的仿真结果、既有 FAT 模板和文档库开展设计伙伴试点；测量部署时间和资料包生成速度。
  - priority: medium
