  - incumbentClass: 原生 twin AI 平台
    point: JuliaHub 证明了在工业模型之上叠加 AI 的需求真实存在，但它的定位更偏前链路——强调物理原生推理和设计/测试自动化——因此后链路、跨多种 twin 与仿真栈工作的证据层仍有空间。
    sourceRefs:
