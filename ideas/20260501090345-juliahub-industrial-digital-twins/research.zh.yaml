    - 34
  - friction: 对 AI 生成建议的信任
    severity: high
    affectedBuyer: VP Engineering and validation leadership
    mitigation: 把产品定位为证据生成和缺口检测工具，并保留人工复核，而不是自动签核系统。
    sourceRefs:
    - 25
    - 26
    - 28
  - friction: OT 和网络安全评审
    severity: high
    affectedBuyer: IT / security and enterprise architecture
    mitigation: 提供扎实的 RBAC、审计日志、灵活部署方式，以及清楚的软件供应链安全姿态。
    sourceRefs:
    - 25
    - 27
    - 29
  - friction: 工程、验证与数字化转型团队之间的预算归口
    severity: medium
    affectedBuyer: 经济买方与项目赞助人
    mitigation: 用降低出货风险来锚定 ROI，并优先从既有 twin / PLM / 工程软件预算中切出支出。
    sourceRefs:
    - 18
    - 19
    - 20
    - 22
    - 24
  - friction: 模型完整度差或元数据不一致
    severity: high
    affectedBuyer: 系统工程师与控制工程师
    mitigation: 从收窄的 FAT 模板切入，把证据缺口显式暴露出来，并做具备标准意识的归一化。
    sourceRefs:
    - 16
    - 17
    - 30
    - 31
    - 32
    - 33
    - 34
