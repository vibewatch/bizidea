    point: Siemens 能覆盖最广的 digital thread 面积，但这份“宽”本身也是切口：很多中型 OEM 更想要一层能接既有导出结果和工作流的轻量证据层，而不是为了解一个发布瓶颈继续买更深的套件能力。
