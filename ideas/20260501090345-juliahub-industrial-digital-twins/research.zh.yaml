  - incumbentClass: 工业数据平台
    point: AVEVA 擅长集中工业上下文，并且正积极押注工业 AI；但它的平台故事仍是从数据与智能基础设施出发，而不是从工程定制型 OEM 的出货级 FAT 治理出发。
    sourceRefs:
