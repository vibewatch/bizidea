  validationPlan:
  - priority: high
    question: How often do target OEMs rebuild FAT packets after late design changes, and how many engineer-hours does that consume per shipment?
    evidenceToGather: 10+ interviews with validation leaders at compressors, pumps, HVAC, and process-equipment OEMs; collect sample redlined FAT packets and recent rework timelines.
  - priority: high
    question: Will buyers adopt a file/API-light evidence layer before they commit to deeper PLM or twin-stack integration?
    evidenceToGather: Design-partner pilots using exported simulation results, prior FAT templates, and document repositories; measure setup time and packet-generation speed.
  - priority: medium
    question: 'Which artifact drives willingness to pay first: test-plan generation, exception logging, approval packets, or model-lineage traceability?'
    evidenceToGather: Rank-order interviews and pilot scorecards that compare current manual process cost versus perceived value by feature bundle.
