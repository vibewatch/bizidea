    - 25
  - incumbentClass: Industrial suite incumbents
    point: 'Siemens can cover the broadest digital-thread surface area, yet that breadth is also the wedge: many mid-market OEMs want a lighter evidence layer that plugs into exports and existing workflows instead of buying more suite depth to solve one release bottleneck.'
    sourceRefs:
    - 15
    - 16
    - 17
    - 18
    - 36
  - incumbentClass: Industrial data platforms
    point: AVEVA centralizes industrial context and is moving aggressively into industrial AI, but its platform story still starts at data and intelligence infrastructure rather than at shipment-ready FAT governance for engineer-to-order OEMs.
    sourceRefs:
    - 19
    - 20
    - 35
  - incumbentClass: Twin-native AI platforms
    point: JuliaHub validates demand for AI over industrial models, but its positioning is upstream—physics-native reasoning and design/testing automation—leaving room for a downstream evidence layer that works across multiple twin and simulation stacks.
    sourceRefs:
    - 1
    - 2
    - 3
  - incumbentClass: In-house workflows and services
    point: Spreadsheets, PLM attachments, and engineering-services support remain the default because they feel controllable; the startup only wins if it proves materially faster packet generation and stronger traceability without increasing audit risk.
    sourceRefs:
