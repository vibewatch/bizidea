jobsToBeDone:
  - job: When a custom machine design changes close to shipment, help validation leads rebuild the test plan and evidence pack quickly, so they can complete FAT without delaying delivery.
    currentAlternative: Manual spreadsheet updates and rerunning simulations with internal scripts
    successMetric: Days from design freeze to approved FAT package
  - job: When a customer questions whether a digital twin result is enough for signoff, help systems engineers produce traceable proof, so they can avoid disputes and repeat testing.
    currentAlternative: Email threads, PDF exports, and engineering-services support
    successMetric: Percentage of FAT packages approved without rework
