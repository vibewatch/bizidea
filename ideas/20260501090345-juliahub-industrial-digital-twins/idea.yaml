topRisks:
  - name: Integration friction
    description: Engineering teams may resist any product that requires deep changes to existing simulation or PLM workflows.
    mitigation: Start with file-based and API-light connectors that work from exported models and documents before deeper integrations.
  - name: Proof burden
    description: Customers may not trust AI-generated test recommendations unless every step is explainable and traceable.
    mitigation: Make the product generate human-readable assumptions, model lineage, and explicit evidence gaps rather than black-box answers.
  - name: Narrow initial market
    description: The first beachhead could be too small if limited to OEMs with mature digital twins and formal FAT processes.
    mitigation: Target adjacent verticals with similar shipment signoff pain such as process skids, thermal systems, and packaged industrial subsystems.
