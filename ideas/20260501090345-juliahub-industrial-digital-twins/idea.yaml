problem: Custom industrial equipment OEMs still run factory acceptance testing through spreadsheets, ad hoc simulation exports, and manual signoff chains. When a design parameter changes late in the cycle, validation engineers must rebuild test matrices, re-run subsets of simulations, and assemble evidence packets for customers from scratch. That delays shipment, burns scarce controls talent, and creates expensive disputes when buyers question whether the digital twin actually proves field readiness.
targetUser:
  primary: Validation and systems engineering leads at mid-market industrial equipment OEMs shipping custom compressors, pumps, thermal systems, or process skids
  secondary: Controls engineers and technical program managers coordinating factory acceptance testing
  buyer: VP Engineering or Director of Validation at custom equipment manufacturers with long FAT cycles
startupThesis:
  nonObviousInsight: Agentic AI will not win first in industrial engineering by replacing CAD or simulation tools; it will win by converting fragmented twin outputs into auditable release decisions that unblock shipment.
  beachhead: Factory acceptance test preparation for OEM teams delivering engineer-to-order industrial equipment with digital twin models but manual validation workflows
  wedge: A twin-to-FAT evidence layer that auto-generates test plans, parameter sweeps, exception logs, and customer-ready signoff packages from existing simulation models
  whyNowCatalyst: JuliaHub's round and Dyad 3.0 launch show that agentic tooling is making industrial twins easier to use, which shifts the bottleneck to validation governance and shipment readiness.
  ventureScalePath: Start with FAT readiness for custom equipment OEMs, expand into site acceptance testing, engineering change control, warranty root-cause analysis, and eventually the system of record for model-based industrial release management.
solution: The product ingests existing digital twin outputs, requirements documents, and prior FAT templates from an OEM's simulation and PLM stack. It maps design requirements to executable virtual test cases, runs parameter sweeps against the twin, and highlights where evidence is missing before hardware hits the test bay. The system then generates a traceable FAT package with assumptions, pass fail criteria, exception handling, and customer-facing reports tied back to each model version. Over time it learns which test evidence most often causes shipment delays and recommends the minimum additional simulation or bench testing needed to de-risk signoff. For customers without clean model pipelines, the initial deployment includes lightweight connectors to common simulation exports and document repositories rather than requiring a full twin replatform.
goToMarketSeed:
  firstCustomer: U.S. or European custom equipment OEMs with 50 to 500 engineers building compressors, thermal systems, or process skids that already use simulation models before every shipment
  buyingTrigger: A late-stage design change or failed FAT that threatens delivery dates, liquidated damages, or customer trust
  currentAlternative: Excel test matrices, internal scripts, PLM attachments, manual simulation reruns, and engineering services firms assembling FAT binders
  switchingReason: The wedge saves weeks on each shipment by turning existing twin data into a complete evidence pack without changing the OEM's incumbent CAD or simulation stack
  pricingHypothesis: Annual platform fee plus usage priced per active equipment program or per shipped system entering FAT
