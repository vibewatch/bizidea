slug: shift-reset-robot-os
date: '2026-06-17'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date 2026-06-17] 基础情景从计划日期后的第一个完整月份开始。'
- id: A2
  name: pre-seed 交割后的起始现金
  value: '2500'
  unit: USDK
  source: '[BP fundingAsk $2–4M] 基础情景采用 $2.5M，作为跑到 8-12 个上线设施验证点并额外留出 6 个月缓冲所需的资本。'
- id: A3
  name: 单设施订阅 ACV
  value: '180'
  unit: USDK per facility-year
  source: '[BP gtm.pricing] 与 [Research market.som rationale] 都把基础情景锚定在每个上线设施每年约 $180K 的软件收入。'
- id: A4
  name: 收入确认政策
  value: 仅订阅收入；不计部署费
  unit: policy
  source: '[BP businessModel.revenueStreams] 提到了部署费，但模型为保守起见将其排除，这样收入就能干净地对上“上线设施数 × 订阅 ARPU”。'
- id: A5
  name: 第 1 年上线设施爬坡
  value: 0,0,0,0,0,1,1,2,2,3,3,4
  unit: customersEop by month
  source: '[BP sixMonth]、[BP milestones 0-12 months] 和 [BP experimentRoadmap] 都指向：首个 正式上线 大约出现在第 6 个月，且在完成一次第二站扩张后，第 12 个月达到 4 个上线设施。'
- id: A6
  name: 第 2 年上线设施爬坡
  value: Q1Y2 6; Q2Y2 7; Q3Y2 9; Q4Y2 10
  unit: customersEop by quarter
  source: '[BP milestones 12-24 months: 8-12 live facilities] 基础情景采用年末 10 个上线设施，增长主要来自灯塔客户内部扩张。'
- id: A7
  name: 第 3 年上线设施爬坡
  value: Q1Y3 12; Q2Y3 14; Q3Y3 16; Q4Y3 18
  unit: customersEop by quarter
  source: '[BP market.som] 和 [BP milestones 24-36 months] 都把基础情景锚定在第 3 年末 18 个上线设施。'
- id: A8
  name: 毛利率爬坡
  value: Y1 launch months 55-65%; Y2 66-69%; Y3 71-74%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70] 叠加一个创业财务经验值：早期存量设施部署支持负担更重，只有等模板和连接器复用起来后，毛利率才会明显抬升。'
- id: A9
  name: CEO 创始人全口径现金薪酬
  value: '160'
  unit: USDK annualized per FTE
  source: '[BP team CEO founder] 采用的是 pre-seed 阶段创始人薪资经验值，低于大公司市场现金水平。'
- id: A10
  name: 工程团队全口径现金薪酬
  value: '175'
  unit: USDK annualized per FTE
  source: '[BP team founding eng and Robotics and WMS integration engineer] 再加上早期机器人软件团队的薪资经验值，已包含工资税和福利。'
- id: A11
  name: 交付成功团队全口径现金薪酬
  value: '140'
  unit: USDK annualized per FTE
  source: '[BP team Deployment success lead] 再加上面向客户导入和 KPI 建基的实施负责人薪资经验值。'
- id: A12
  name: 合作与销售全口径现金薪酬
  value: '160'
  unit: USDK annualized per FTE
  source: '[BP team Partnerships lead] 叠加创始人主导 GTM 的节奏；基础情景只在首个灯塔验证之后再补商业化 人手编制。'
- id: A13
  name: 行政与运营全口径现金薪酬
  value: '120'
  unit: USDK annualized per FTE
  source: 创业财务经验值：在灯塔部署跑起来之后，再补一位偏财务和运营的通才。
- id: A14
  name: 招聘爬坡
  value: CEO plus 2 engineers at start, deployment lead from month 2, partner lead in Q4Y1, year-end Y2 at 9 FTE, year-end Y3 at 12 FTE
  unit: timing
  source: '[BP team]、[BP sequencingRationale] 和 [BP milestones] 都说明：相比规模化 GTM，更该优先补集成与交付人员。'
- id: A15
  name: 第 1 年后平滑规则
  value: Quarterly opex uses smooth average FTE between the published Q4Y1, Q4Y2, and Q4Y3 snapshots
  unit: policy
  source: '[Financial Modeler 人手编制约定] 要求第 1 年之后的季度，按 Q4Y1、Q4Y2 和 Q4Y3 快照之间的平滑爬坡来填。'
- id: A16
  name: 非薪酬研发工具成本
  value: 5-8
  unit: USDK per month equivalent
  source: 创业财务经验值：小型企业工作流软件栈在云、集成工具、日志和测试上的月度支出。
- id: A17
  name: 非薪酬销售与市场费用
  value: 3-12
  unit: USDK per month equivalent
  source: '[BP gtm.channels] 和 [BP funnelTargets] 都指向创始人主导的企业销售动作：需要差旅、伙伴会面和少量付费获客。'
- id: A18
  name: 非薪酬行政与安全顾问费用
  value: 7-16
  unit: USDK per month equivalent
  source: '[BP team Safety and operations advisor] 再加上企业级仓储机器人部署常见的保险、法务、会计和合规开销。'
- id: A19
  name: 稳态 CAC
  value: '110'
  unit: USDK per new live-facility customer
  source: '[BP funnelTargets] 加上狭窄 3PL 企业销售动作，共同指向高成本的创始人主导销售：转化前需要大量差旅和集成调研。'
- id: A20
  name: 稳态月流失率
  value: '1.5'
  unit: percent
  source: 创业财务经验值：产品粘性较强，但客户集中度高、公司仍处早期。
- id: A21
  name: 交付成功成本归类
  value: Counted in operating expense until templates are repeatable
  unit: accounting policy
  source: '[BP sequencingRationale] 明确说重交付是近期主要风险，因此基础情景把这部分人记入 opex；毛利率则只反映第三方与支持成本。'
- id: A22
  name: 现金转换假设
  value: EBITDA approximates cash movement
  unit: policy
  source: 创业财务经验值：对一家 pre-seed 公司来说，没有债务、没有单独 capex 行、营运资本时差也不大，因此 EBITDA 可以近似现金变动。
- id: A23
  name: 本轮融资里程碑
  value: 8-12 live facilities across 2-3 lighthouse networks plus one proven second-site expansion and gross margin trending toward 70%
  unit: milestone
  source: '[BP milestones 12-24 months]、[BP fundingAsk] 和 [BP investorMemo.nextDiligence] 共同指向这个里程碑。'
