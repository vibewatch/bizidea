scenarios:
  downside:
    description: 机器人试点扩张延后，第二站部署更慢，而且存量设施集成仍比预期更定制。
    y3RevenueK: 1950.0
    y3EbitdaK: -780.0
    cashLowPointK: 40.0
    keyAssumptionChanges:
    - 第 2 年末上线设施只有 8 个，而不是 10 个。
    - 第 3 年末上线设施只有 14 个，而不是 18 个。
    - 模板和连接器复用速度不够快，毛利率最高只能到约 67%。
    - 平均销售周期从约 6 个月拉长到 9 个月。
  base:
    description: 基础情景下，公司在排除部署费 收入的前提下，以研究得到的 $180K 单设施 ACV，在第 1 年做到 4 个上线设施、第 2 年做到 10 个、第 3 年做到 18 个。
    y3RevenueK: 2520.0
    y3EbitdaK: -320.8
    cashLowPointK: 527.4
    keyAssumptionChanges:
    - 不改变 A1–A23 的基础假设。
  upside:
    description: 灯塔客户扩张更快、伙伴转介绍更早起量，而且可复用连接器让公司在不同比例增加 opex 的前提下持续加站点。
    y3RevenueK: 3000.0
    y3EbitdaK: 120.0
    cashLowPointK: 690.0
    keyAssumptionChanges:
    - 第 2 年末上线设施升到 12 个，而不是 10 个。
    - 第 3 年末上线设施升到 20 个，而不是 18 个。
    - 随着交付支持越来越模板化，Q4Y3 毛利率达到 75%。
    - 伙伴带来的 商机管线 把销售周期缩短到约 4 个月。
