modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  QualifiedAccounts --> PaidRollouts\n  PaidRollouts --> LiveFacilities\n  LiveFacilities --> SubscriptionRevenue\n  SubscriptionRevenue --> GrossProfit\n  GrossProfit --> Cash"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景里的收入，几乎全部来自 2–3 个灯塔 3PL 网络的内部扩张：上线设施数从第 1 年的 4 个增到 Q4Y3 的 18 个，单设施 ACV 约为 $180K。
- checkName: 哪些事必须做对
  finding: 灯塔客户内部的第二站扩张必须按计划发生，因为模型假设更多收入来自设施复制，而不是大规模新 logo。
- checkName: 模型在哪种情况下会断
  finding: 如果存量设施集成始终做不成可复用模板，且销售周期拉到 9 个月，公司就会在证明多站点经济性之前把现金几乎烧光。
- checkName: 下一轮融资的证明点
  finding: 只要公司在第 2 年末做出 8-12 个上线设施、至少一个明显更快的第二站部署，并让毛利率肉眼可见地向 70% 收敛，下一轮融资就有了依据。
sanityChecks:
  ruleOf40: 第 3 年收入增长 93.1% + EBITDA 利润率 -12.7% = 80.4%
  burnMultiple: 按 $725.7K 的 EBITDA 亏损和 $1,095.0K 的新增收入计算，第 2 年 burn multiple 约为 0.7x；到第 3 年改善到约 0.3x。
  revenuePerFte: 第 3 年约为每名 FTE 产出 $237K，按平均约 10.6 名 FTE 计算，落在早期 SaaS $200–400K 基准区间的低端。
  flags:
  - 客户集中度依然很高，因为 18 个上线设施大概率仍只落在 2–3 个灯塔 3PL 网络里。
  - 第 1 年依旧重交付；如果到第 5–6 个设施时，连接器复用还没跑出来，通往 70% 毛利的路径就会被推迟。
  - 基础情景为了保守起见排除了部署费 收入；这提升了收入质量，但也让公司在执行失误时更缺缓冲。
