topRisks:
  - name: OEM bundling
    description: Robot OEMs may try to absorb workflow authoring and exception control into their own deployment stack.
    mitigation: Focus on operators and integrators managing multiple facilities and eventually multiple robot vendors, where a neutral workflow layer is more valuable than an OEM point solution.
  - name: Services-heavy onboarding
    description: Early customers may require so much facility-specific workflow mapping that implementation margins disappear.
    mitigation: Productize the first ten deployments into fixed-scope WMS connectors, workflow templates, and exception packs for common replenishment and staging patterns.
  - name: Adoption timing risk
    description: If general-purpose robot deployments slip beyond 2026, software demand may arrive more slowly than expected.
    mitigation: Sell first into mixed fleets and pilot-expansion programs where mobile manipulators and AMRs already exist, so the product creates value before fully general-purpose fleets are widespread.
