jobsToBeDone:
  - job: When one distribution center proves a robot can help with overnight replenishment, help the network operations team package that workflow for more sites, so they can expand automation without rebuilding the playbook every time.
    currentAlternative: Vendor-led pilot replication with spreadsheets, supervisor SOPs, and site-by-site professional services
    successMetric: Weeks from expansion approval to first shift completed on the new workflow
  - job: When a warehouse must hand off a fully reset floor to the next shift, help the site GM verify that robot and human tasks were completed and exceptions are resolved, so they can avoid missed waves and overtime spillover.
    currentAlternative: Manual end-of-shift checklists and supervisor walk-throughs
    successMetric: Percentage of shifts that start on time with all required replenishment and staging complete
