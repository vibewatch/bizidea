differentiator: >-
  This is not fleet management for robots already doing steady-state transport,
  and it is not a generic warehouse orchestration suite. The product owns the
  workflow-definition layer between WMS tasks and physical execution, where
  operators must encode handoffs, completion standards, and fallback logic for
  long-horizon robot work. Defensibility comes from reusable cross-site shift
  templates, connector depth into warehouse systems, and a benchmark dataset on
  failure modes in real overnight operations that neither one OEM nor one 3PL
  sees alone.
