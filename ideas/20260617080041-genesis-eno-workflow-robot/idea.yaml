problem: >-
  Multi-site 3PL operators increasingly have the budget and labor pressure to
  try general-purpose robots, but the first painful work is not a single pick
  or move. It is the messy overnight reset sequence: replenishing forward
  zones, clearing exceptions, staging the next wave, and handing the site to
  the next shift without missing outbound SLAs. Today that workflow lives
  across WMS queues, supervisor checklists, temp labor, and vendor-specific
  robot playbooks, so even a promising pilot is hard to replicate across a
  network.
targetUser:
  primary: Director of network operations at a North American 3PL running 5-30 ambient or parcel distribution centers and piloting mobile-manipulator robotics for off-shift replenishment and staging work
  secondary: Site general manager or automation program leader responsible for shift handoff performance and pilot expansion
  buyer: VP operations or head of warehouse automation
startupThesis:
  nonObviousInsight: >-
    The first breakout use case for general-purpose robots is not daytime
    autonomous picking; it is off-shift reset work with a clear before-and-after
    SLA, limited customer-facing variability, and chronic labor pain. Genesis's
    own framing around long-horizon workflows and next-shift prep implies the
    scarce layer is workflow packaging and exception control, not robot
    embodiment alone.
  beachhead: >-
    Off-shift replenishment, pallet-zone reset, and next-wave staging for North
    American third-party logistics operators that already have one mobile
    manipulator or AMR-assisted pilot and need to expand it across 5-20
    facilities
  wedge: >-
    A shift-reset control plane that turns WMS tasks, floor constraints,
    replenishment rules, and human escalation paths into robot-ready overnight
    workflows with verifiable completion evidence
  whyNowCatalyst: >-
    Genesis is explicitly selling workflow-level robots into logistics with
    customer deployments targeted by the end of 2026, making off-shift workflow
    standardization an immediate buyer problem rather than a science project.
  ventureScalePath: >-
    Start with 3PL shift-reset workflows, then expand the same operating layer
    into factory line-side replenishment, hospital supply restocking, and lab
    start-of-day prep, becoming the system of record for how embodied-AI
    workflows are defined, released, and audited across physical operations.
solution: >-
  Shift Reset Robot OS would ingest WMS task queues, slotting rules, floor
  maps, replenishment thresholds, and shift-change SLAs to generate
  facility-specific robot workflow templates before a pilot goes live. The
  product would orchestrate each overnight sequence across robots and humans,
  verify that every replenishment or staging step was completed, and route
  exceptions to supervisors with fallback playbooks before the next shift
  starts. It would also compare performance across sites so operators can see
  which workflow variants actually reduce temp labor, travel time, and late
  wave starts. Over time the company builds the deepest cross-site dataset on
  where general-purpose robot workflows break in live distribution centers and
  how to make them repeatable.
goToMarketSeed:
  firstCustomer: North American 3PLs with 5-20 distribution centers, one approved mobile-manipulator or mixed robot pilot, and recurring second- or third-shift labor gaps in replenishment and wave-prep workflows
  buyingTrigger: A first robot pilot hits labor or throughput goals and headquarters approves rollout to additional shifts or sites before the next peak season
  currentAlternative: Manual supervisor-led shift reset using WMS task queues, temp labor, robot-vendor professional services, and spreadsheet-based handoff checks
  switchingReason: >-
    The wedge beats today's approach by turning fragile tribal knowledge about
    overnight reset work into reusable robot workflows, exception ladders, and
    proof-of-completion records that travel from one site to the next.
  pricingHypothesis: Annual subscription per live facility plus per-workflow setup and integration fees tied to WMS or labor-management connectors
