slug: shift-reset-robot-os
date: '2026-06-17'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: '[BP date 2026-06-17] base case starts with the first full month after plan date.'
- id: A2
  name: Starting cash after pre-seed close
  value: '2500'
  unit: USDK
  source: '[BP fundingAsk $2–4M] base case uses $2.5M as the capital needed to reach the 8-12 live-facility proof point plus a six-month buffer.'
- id: A3
  name: Facility subscription ACV
  value: '180'
  unit: USDK per facility-year
  source: '[BP gtm.pricing] and [Research market.som rationale] both anchor the base case to roughly $180K annual software per live facility.'
- id: A4
  name: Recognized revenue policy
  value: Subscription only; setup fees excluded
  unit: policy
  source: '[BP businessModel.revenueStreams] mentions setup fees, but the model excludes them for conservatism so revenue cleanly reconciles to live facilities × subscription ARPU.'
- id: A5
  name: Year-1 live facility ramp
  value: 0,0,0,0,0,1,1,2,2,3,3,4
  unit: customersEop by month
  source: '[BP sixMonth], [BP milestones 0-12 months], and [BP experimentRoadmap] imply first go-live by about month 6 and four live facilities by month 12 after one second-site expansion.'
- id: A6
  name: Year-2 live facility ramp
  value: Q1Y2 6; Q2Y2 7; Q3Y2 9; Q4Y2 10
  unit: customersEop by quarter
  source: '[BP milestones 12-24 months: 8-12 live facilities] base case uses 10 by year-end with most growth coming from lighthouse-account expansion.'
- id: A7
  name: Year-3 live facility ramp
  value: Q1Y3 12; Q2Y3 14; Q3Y3 16; Q4Y3 18
  unit: customersEop by quarter
  source: '[BP market.som] and [BP milestones 24-36 months] both anchor the base case to 18 live facilities by the end of year 3.'
- id: A8
  name: Gross margin ramp
  value: Y1 launch months 55-65%; Y2 66-69%; Y3 71-74%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70] plus a startup-finance heuristic that early brownfield deployments are more support-heavy before templates and connectors are reused.'
- id: A9
  name: CEO founder loaded cash compensation
  value: '160'
  unit: USDK annualized per FTE
  source: '[BP team CEO founder] with a pre-seed founder salary heuristic below large-company market cash.'
- id: A10
  name: Engineering loaded cash compensation
  value: '175'
  unit: USDK annualized per FTE
  source: '[BP team founding eng and Robotics and WMS integration engineer] plus an early robotics-software salary heuristic including payroll taxes and benefits.'
- id: A11
  name: Deployment success loaded cash compensation
  value: '140'
  unit: USDK annualized per FTE
  source: '[BP team Deployment success lead] plus an implementation-lead salary heuristic for customer onboarding and KPI baselining.'
- id: A12
  name: Partnerships and sales loaded cash compensation
  value: '160'
  unit: USDK annualized per FTE
  source: '[BP team Partnerships lead] and founder-led GTM sequencing; base case adds commercial headcount only after the first lighthouse proof.'
- id: A13
  name: G&A and ops loaded cash compensation
  value: '120'
  unit: USDK annualized per FTE
  source: Startup-finance heuristic for one later finance and operations generalist after lighthouse deployments are running.
- id: A14
  name: Hiring ramp
  value: CEO plus 2 engineers at start, deployment lead from month 2, partner lead in Q4Y1, year-end Y2 at 9 FTE, year-end Y3 at 12 FTE
  unit: timing
  source: '[BP team], [BP sequencingRationale], and [BP milestones] favor integration and deployment hires before scaled GTM.'
- id: A15
  name: Post-Y1 smoothing rule
  value: Quarterly opex uses smooth average FTE between the published Q4Y1, Q4Y2, and Q4Y3 snapshots
  unit: policy
  source: '[Financial Modeler headcount convention] requires post-Y1 quarters to be filled using smooth ramps consistent with the business plan.'
- id: A16
  name: Non-payroll R&D tools
  value: 5-8
  unit: USDK per month equivalent
  source: Startup-finance heuristic for cloud, integration tooling, logging, and testing on a small enterprise workflow software stack.
- id: A17
  name: Non-payroll sales and marketing spend
  value: 3-12
  unit: USDK per month equivalent
  source: '[BP gtm.channels] and [BP funnelTargets] imply founder-led enterprise selling with travel, partner meetings, and limited paid demand generation.'
- id: A18
  name: Non-payroll G&A and safety-advisor spend
  value: 7-16
  unit: USDK per month equivalent
  source: '[BP team Safety and operations advisor] plus insurance, legal, accounting, and compliance overhead typical for warehouse-robot enterprise deployments.'
- id: A19
  name: Steady-state CAC
  value: '110'
  unit: USDK per new live-facility customer
  source: '[BP funnelTargets] and the narrow 3PL enterprise motion imply expensive founder-led selling, travel, and integration discovery before conversion.'
- id: A20
  name: Steady-state monthly churn
  value: '1.5'
  unit: percent
  source: Startup-finance heuristic for sticky but still-early workflow infrastructure sold into a concentrated enterprise account base.
- id: A21
  name: Deployment-success cost classification
  value: Counted in operating expense until templates are repeatable
  unit: accounting policy
  source: '[BP sequencingRationale] says deployment-heavy execution is the near-term risk, so base case treats those people as opex while gross margin reflects third-party and support cost on revenue.'
- id: A22
  name: Cash conversion assumption
  value: EBITDA approximates cash movement
  unit: policy
  source: Startup-finance heuristic for a pre-seed company with no debt, no modeled capex line, and immaterial working-capital timing differences.
- id: A23
  name: Funding milestone for this round
  value: 8-12 live facilities across 2-3 lighthouse networks plus one proven second-site expansion and gross margin trending toward 70%
  unit: milestone
  source: '[BP milestones 12-24 months], [BP fundingAsk], and [BP investorMemo.nextDiligence].'
