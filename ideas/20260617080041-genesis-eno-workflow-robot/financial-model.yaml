modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      QualifiedAccounts --> PaidRollouts
      PaidRollouts --> LiveFacilities
      LiveFacilities --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes almost entirely from expanding 2-3 lighthouse 3PL networks from 4 live facilities in Y1 to 18 by Q4Y3 at the researched $180K facility ACV.
- checkName: Must go right
  finding: Second-site expansions inside lighthouse accounts must happen on schedule because the model assumes more revenue comes from facility replication than from broad new-logo volume.
- checkName: Model breaks if
  finding: If brownfield integrations stay bespoke and sales cycles stretch toward 9 months, downside cash falls near zero before the company proves repeatable multi-site economics.
- checkName: Next-round proof
  finding: The next financing is justified once the company exits Y2 with 8-12 live facilities, one clearly faster second-site deployment, and gross margin visibly converging toward 70%.
sanityChecks:
  ruleOf40: Y3 growth 93.1% + EBITDA margin -12.7% = 80.4%
  burnMultiple: Y2 burn multiple is about 0.7x using $725.7K EBITDA burn over $1,095.0K added revenue, improving to about 0.3x in Y3.
  revenuePerFte: $237K Y3 on about 10.6 average FTE (inside the low end of the $200-400K early SaaS benchmark).
  flags:
  - Customer concentration is high because 18 live facilities still likely sit inside only 2-3 lighthouse 3PL networks.
  - The first year remains deployment-heavy, so missing connector reuse by facility 5-6 would delay the path to the 70% gross-margin target.
  - The base case excludes setup-fee revenue for conservatism, which helps quality of revenue but leaves less room for execution slips on burn.
