scenarios:
  downside:
    description: Robot-pilot expansion slips, second-site rollouts take longer, and brownfield integrations remain more bespoke than expected.
    y3RevenueK: 1950.0
    y3EbitdaK: -780.0
    cashLowPointK: 40.0
    keyAssumptionChanges:
    - End-Y2 live facilities land at 8 instead of 10.
    - End-Y3 live facilities land at 14 instead of 18.
    - Gross margin tops out near 67% because templates and connectors do not reuse fast enough.
    - Average sales cycle stretches from roughly 6 months to 9 months.
  base:
    description: Base case reaches 4 live facilities in Y1, 10 in Y2, and 18 in Y3 at the researched $180K facility ACV while excluding setup-fee revenue.
    y3RevenueK: 2520.0
    y3EbitdaK: -320.8
    cashLowPointK: 527.4
    keyAssumptionChanges:
    - No change from A1-A23 base assumptions.
  upside:
    description: Lighthouse accounts expand faster, partner referrals work earlier, and repeatable connectors let the company add facilities without matching opex growth.
    y3RevenueK: 3000.0
    y3EbitdaK: 120.0
    cashLowPointK: 690.0
    keyAssumptionChanges:
    - End-Y2 live facilities rise to 12 instead of 10.
    - End-Y3 live facilities rise to 20 instead of 18.
    - Gross margin reaches 75% by Q4Y3 as deployment support becomes more template-driven.
    - Partner-sourced pipeline shortens the sales cycle to roughly 4 months.
