market:
  tam:
    value: $216.0M
    rationale: 'Bottom-up estimate: ~1,200 North American 3PL facilities plausibly fit the 5-30 site, robot-pilot, brownfield profile × assumed $180k annual facility subscription; cross-check equals only ~0.3% of 2024 U.S. VAWD revenue, so the estimate stays conservative versus sector size.'
    isEstimate: true
    sourceRefs:
    - 3
    - 24
    - 37
  sam:
    value: $63.0M
    rationale: Narrow TAM to ~350 facilities in operators already in an automation-expansion window over 2026-27, then apply the same $180k facility ACV.
    isEstimate: true
    sourceRefs:
    - 23
    - 32
    - 35
  som:
    value: $3.2M
    rationale: Reachable year-3 SOM assumes 18 live facilities at about $180k ACV after landing 2-3 lighthouse networks and expanding inside them; that is a tiny fraction of the estimated unit base and below the site counts shown by major 3PLs.
    isEstimate: true
    sourceRefs:
    - 23
    - 35
