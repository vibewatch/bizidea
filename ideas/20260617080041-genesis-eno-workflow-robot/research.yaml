  validationPlan:
  - priority: high
    question: How many target 3PL networks already have a mobile manipulator or heterogeneous robot pilot approved for expansion?
    evidenceToGather: Interview automation leaders and integrators; collect current-site counts and expansion roadmaps before peak season.
  - priority: high
    question: Which overnight reset steps most often break when a pilot is copied to a second or third facility?
    evidenceToGather: Obtain SOPs, exception logs, and shift-handoff checklists from two 3PL design partners.
  - priority: medium
    question: What facility-year ACV is acceptable versus robot-vendor professional services?
    evidenceToGather: Benchmark line items in pilot statements of work and compare against value of reduced rollout time and missed-shift exceptions.
