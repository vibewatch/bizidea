  sensitivityCases:
  - case: General-purpose robot deployments slip beyond the current 2026 timetable
    impact: Near-term demand narrows to mixed-fleet and pilot-expansion accounts rather than a broad greenfield wave, delaying SAM realization.
    sourceRefs:
