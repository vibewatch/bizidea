  sourceRefs:
  - 1
  - 2
- point: Brightpick already sells lights-out night shifts and replenishment in public messaging, proving that off-shift warehouse work is commercially legible today.
  sourceRefs:
  - 11
  - 12
- point: DHL says it prefers technologies that can fit multiple facilities and tasks, which aligns with a reusable cross-site workflow-template thesis.
  sourceRefs:
  - 35
- point: As warehouses automate more subsystems, WES buyers increasingly care about orchestrating people-centered and automated workflows together.
  sourceRefs:
  - 22
openQuestions:
- How many North American 3PL networks already have approved mobile-manipulator pilots versus AMR-only programs?
- Which WMS stacks dominate the most likely design-partner accounts, and how standardized are their connector requirements?
- What facility-year ACV is acceptable relative to robot-vendor professional services and integrator fees?
- Can proof-of-completion for overnight reset be tied directly to customer SLAs, claims reduction, or insurance/compliance value?
