topRisks:
- name: OEM 捆绑
  description: 机器人 OEM 可能把工作流编写和异常控制直接吸进自己的部署栈。
  mitigation: 聚焦那些同时管理多设施、最终也会管理多机器人厂商的运营方和集成商；在这类场景里，中立的工作流层比 OEM 单点方案更有价值。
- name: 重服务导入
  description: 早期客户可能需要大量按设施定制的工作流梳理，最后把实施毛利全部吃掉。
  mitigation: 把前十个部署产品化，沉淀成固定范围的 WMS 连接器、工作流模板，以及适配常见补货和备货模式的异常包。
- name: 采用时点风险
  description: 如果通用机器人部署节奏拖到 2026 年之后，软件需求的释放速度可能会低于预期。
  mitigation: 先卖给已经有移动机械臂和 AMR 的混合机群及试点扩张项目，这样即便完全通用的机群尚未普及，产品也能先创造价值。
