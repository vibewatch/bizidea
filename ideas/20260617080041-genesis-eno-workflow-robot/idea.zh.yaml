problem: 越来越多的多站点 3PL 运营商，既有预算也有招工压力，开始尝试通用机器人。但最先让人头疼的，不是一次拣选或一次搬运，而是那套混乱的夜间重置流程：给前置货位补货、清理异常、备好下一波次，还要在不影响出库 SLA 的前提下把现场完整交给下一班。现在，这套流程散落在 WMS 队列、主管清单、临时工和各家厂商专属作业剧本之间，所以哪怕单点试跑有效，也很难在整个网络里复制。
targetUser:
  primary: 北美 3PL 的网络运营总监，管理 5–30 个常温仓或包裹配送中心，并正在试点把移动机械臂用于非当班补货和备货工作
  secondary: 负责交班表现和试点扩张的站点总经理或自动化项目负责人
  buyer: 运营副总裁或仓储自动化负责人
startupThesis:
  nonObviousInsight: 通用机器人的第一个破圈场景，不会是白天的自主拣选，而是非当班重置工作：前后状态清晰、客户侧变量有限、劳动力痛点又长期存在。Genesis 自己围绕长时程工作流和下一班次准备的表述，也说明真正稀缺的不是机器人形态本身，而是工作流封装和异常控制这一层。
  beachhead: 已经跑通一套移动机械臂或 AMR 辅助试点、并需要把它扩到 5–20 个站点的北美第三方物流运营商；切入流程是非当班补货、托盘区重置和下一波次备货
  wedge: 一套换班重置控制平面，把 WMS 任务、现场约束、补货规则和人工升级路径，转成机器人可直接执行的夜间工作流，并附带可核验的完成凭证
  whyNowCatalyst: Genesis 已经明确要把工作流级机器人卖进物流场景，且客户部署目标瞄准 2026 年底；这让非当班工作流标准化从“科研项目”变成了买方眼前的问题。
  ventureScalePath: 先从 3PL 的换班重置工作流切入，再把同一套运营层扩到工厂线边补货、医院耗材补给和实验室开工前准备，最终成为实体 AI 工作流在现实运营里如何定义、发布和审计的系统记录层。
solution: Shift Reset Robot OS 会先吃进 WMS 任务队列、库位规则、平面图、补货阈值和交班 SLA，在试点上线前生成适配单个设施的机器人工作流模板。产品负责把每一段夜间流程在机器人和人工之间编排起来，核验每一步补货或备货是否完成，并在下一班开始前，按预设 兜底作业剧本把异常推给主管处理。它还会横向比较不同站点的表现，让运营方看清哪些工作流变体，真的能压低临时工成本、缩短行走时间、减少波次延迟启动。时间一长，公司就能积累业内最深的跨站点数据集：通用机器人工作流在真实配送中心到底会在哪些环节掉链子，又该怎么把它跑顺。
goToMarketSeed:
  firstCustomer: 管理 5–20 个配送中心、已经批准一套移动机械臂或混合机群试点、并在补货与波次准备流程里反复遇到二班或三班用工缺口的北美 3PL
  buyingTrigger: 首个机器人试点已经达到人效或吞吐目标，总部决定在下一个旺季前把它扩到更多班次或更多站点
  currentAlternative: 主管手工主导的换班重置：靠 WMS 队列、临时工、机器人厂商专业服务，以及基于表格的交班核查
  switchingReason: 这套切口之所以能赢过今天的做法，是因为它能把夜间重置流程里脆弱的“老师傅经验”，沉淀成可复用的机器人工作流、异常升级路径和完成凭证记录，并随站点一起迁移。
  pricingHypothesis: 按已上线设施收取年度订阅费，再叠加按工作流计费的部署和集成费用，费用与 WMS 或劳动力管理连接器挂钩
