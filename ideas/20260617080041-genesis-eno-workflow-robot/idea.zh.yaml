differentiator: 这不是给已经跑稳态运输的机器人做 fleet management，也不是一套泛化的仓储编排软件。产品真正卡位的是 WMS 任务和物理执行之间的工作流定义层——运营方必须在这里写清交接规则、完成标准，以及长时程机器人工作一旦出错时怎么兜底。护城河会来自三件事：跨站点可复用的换班模板、深入仓储系统的连接器，以及一套覆盖真实夜间运营故障模式的基准数据集；这些东西，单个 OEM 和单个 3PL 都看不全。
