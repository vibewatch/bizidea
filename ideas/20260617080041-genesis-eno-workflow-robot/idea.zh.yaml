jobsToBeDone:
- job: 当一个配送中心已经证明机器人能帮上夜间补货时，帮网络运营团队把这套工作流打包给更多站点，这样他们扩自动化时就不用每次重写作业剧本。
  currentAlternative: 由厂商主导、配合表格、主管 SOP 和逐站点专业服务去复制试点
  successMetric: 从批准扩张到新工作流完成首个班次所需的周数
- job: 当仓库必须把已经完整重置的现场交给下一班时，帮站点 GM 核验机器人和人工任务都已完成、异常都已收口，从而避免漏波次和加班外溢。
  currentAlternative: 人工交班清单和主管现场巡检
  successMetric: 所有必需补货和备货完成、且班次准时启动的比例
