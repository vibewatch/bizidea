  headwinds:
  - point: 很多仓库仍然需要“人 + 机器人”混合运营，所以软件层必须原生支持异常，而不能默认一切都能全自动。
    sourceRefs:
    - 8
    - 9
  - point: 移动机器人和协作机器人场景下，安全、防护和风险评估义务依然很重。
