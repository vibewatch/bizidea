  pricing: 官网公开价格 $1,990 / 月起；企业部署另行定制
  strength: 对存量设施友好，且明确讲“夜班自动化”故事。
  weaknessVsUs: 绑定 Brightpick 自家机器人系统，而不是一层能横跨混合机群和不同 WMS 环境的中立工作流层。
  sourceRefs:
  - 11
  - 12
  - 13
- name: Symbotic
  stage: 现有厂商
  wedge: 用 AI 编排数百台机器人的大规模仓储自动化。
  pricing: 大型企业定制报价
  strength: 软硬件深度一体，端到端控制能力强。
  weaknessVsUs: 更适合高资本开支的一体化自动化，而不是在多样化 3PL 站点里跑更轻的非当班重置工作流。
  sourceRefs:
  - 16
- name: Manhattan Associates
  stage: 现有厂商
  wedge: 以 WMS + WES 管住库存、补货和自动化执行。
  pricing: 企业级定制报价
  strength: 作为系统记录层已经深度嵌入，具备实时任务、补货和集成逻辑。
  weaknessVsUs: 平台过于宽泛，难以把焦点放在面向实体 AI 的机器人可执行工作流模板和完成凭证上。
  sourceRefs:
  - 21
  - 22
- name: Agility Arc
  stage: 扩张期
  wedge: 面向 Digit 人形机器人部署的云端指挥层与集成能力。
  pricing: 平台定制报价
  strength: 为现代 实体 AI 部署定制了控制平面、可视化和快速集成能力。
  weaknessVsUs: 它绑定的是 Digit 部署，而不是无论本地试点最终哪家机器人胜出，都能接住的中立 3PL 换班重置编排层。
  sourceRefs:
  - 17
regulatoryTechnicalConstraints:
- point: 并不存在一套单独的 OSHA 机器人规则手册；仓储部署仍要映射到一般性工作场所安全义务和应用级防护要求上。
  sourceRefs:
  - 5
  - 6
- point: 移动机器人和协作机器人部署，需要形成书面的风险评估，并按 ANSI/A3 R15.06、R15.08 等共识标准完成验证。
  sourceRefs:
  - 6
  - 33
  - 34
- point: 在“人机混合”设施里，集成难点越来越不是协议层，而是语义层：系统必须对任务状态、库存真相和异常归属形成同一套理解。
  sourceRefs:
  - 21
  - 22
- point: 即便机器人厂商宣称对存量设施友好，货架高度、地面条件和消防要求等现实约束，仍可能直接限制落地。
  sourceRefs:
  - 12
  - 31
validationSignals:
- point: Genesis 已经明确把“下一班次准备”和“长时程工作流控制”当成其通用机器人的产品表面。
  sourceRefs:
  - 1
  - 2
- point: Brightpick 已经在公开叙事里直接卖“熄灯夜班”和补货，这说明非当班仓储工作今天就具备商业可讲述性。
  sourceRefs:
  - 11
  - 12
- point: DHL 表示它偏好能适配多个设施和多个任务的技术，这与“跨站点可复用工作流模板”的命题高度一致。
  sourceRefs:
  - 35
- point: 随着仓库自动化的子系统越来越多，WES 买方也越来越在意如何把“以人为中心”的流程和自动化流程一起编排。
  sourceRefs:
  - 22
openQuestions:
- 北美 3PL 网络里，到底有多少已经获批的移动机械臂试点，而不是只有 AMR 项目？
- 最可能成为共创客户的账户里，主流 WMS 栈分别是什么，它们对连接器的要求到底有多标准化？
- 相对机器人厂商专业服务和集成商费用，客户能接受多高的单设施年 ACV？
- 夜间重置的完成凭证，能不能直接挂到客户 SLA、索赔减少或保险 / 合规价值上？
