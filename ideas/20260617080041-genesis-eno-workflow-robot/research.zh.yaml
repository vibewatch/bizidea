    sourceRefs:
    - 1
    - 2
  - point: 自动化越来越被描述成“缓解倦怠、改善工作条件”的工具，而不只是降本工具。
    sourceRefs:
    - 9
    - 30
  - point: 随着设施越来越异构，WES 式编排不会边缘化，反而会更居中。
