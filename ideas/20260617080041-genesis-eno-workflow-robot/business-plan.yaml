slug: shift-reset-robot-os
date: '2026-06-17'
executiveSummary: >-
  The strongest version of this company is a vendor-neutral shift-reset control plane for North American 3PLs that are already
  expanding a robot pilot across additional shifts or sites. The first customer is a 3PL network operations or warehouse automation
  leader overseeing 5-20 facilities where overnight replenishment, pallet-zone reset, and next-wave staging still depend on
  supervisor know-how, temp labor, and OEM-specific playbooks. The MVP should sit above WMS tasks and robot execution, package one
  off-shift workflow into reusable templates, prove proof-of-completion before the next shift starts, and escalate exceptions to a
  human before an outbound SLA is missed. Pricing, onboarding, and distribution should all match that same event: a paid one-facility
  rollout triggered when headquarters approves expansion before peak season, sold directly or through OEM and integrator referrals,
  then converted into annual per-facility software. The strategic choice is to stay narrow on off-shift reset for mixed-fleet or
  mobile-manipulator pilots until the company proves it can reduce rollout time and increase on-time shift starts across multiple
  sites. The best reason this can work is that incumbents each own only part of the workflow: WMS and WES suites own transactions,
  OEMs own their own robots, and integrators deliver custom mappings, but none productize cross-site robot-ready reset templates with
  neutral proof-of-completion. The main investor concern is timing and implementation burden: if general-purpose robot rollouts slip
  or every deployment remains services-heavy, the company becomes a niche integration layer rather than a software category. Two
  evidence gaps still matter materially: the real count of 3PL networks with approved mobile-manipulator expansion plans and the
  facility-year ACV buyers will accept relative to OEM professional services.
problem:
  - >-
    Multi-site 3PLs do not fail because they lack tasks for robots; they fail because overnight replenishment, pallet reset, and
    next-wave staging still live across WMS queues, supervisor SOPs, temp labor, and site-specific workarounds.
  - >-
    Once one site proves a robot can help, headquarters still has to rebuild the workflow, exception handling, and safety sign-off at
    the next facility, which slows rollout and weakens pilot ROI.
  - >-
    Site GMs need auditable confirmation that the floor is reset before the next shift starts, but current alternatives rely on manual
    walkthroughs, spreadsheets, and vendor professional services rather than reusable software.
solution:
  - >-
    Build a shift-reset control plane that ingests WMS task queues, replenishment rules, floor constraints, and shift SLAs, then
    releases a robot-and-human overnight workflow with explicit completion criteria and escalation paths.
  - >-
    Start with one beachhead workflow: off-shift replenishment, pallet-zone reset, and next-wave staging for a single live facility
    already running a mobile-manipulator or mixed-fleet pilot.
  - >-
    Provide proof-of-completion, exception queues, and cross-site benchmarking so operators can replicate a winning playbook faster
    than OEM-led custom deployment or manual supervisor coordination.
whyWeWin:
  - >-
    The buying trigger is concrete and urgent: a successful first robot pilot creates pressure to expand before the next peak cycle,
    which makes rollout speed and operational trust more important than broad platform ambition.
  - >-
    A neutral workflow layer fits mixed-fleet brownfield reality better than an OEM stack because large 3PLs often inherit multiple
    robot types, older buildings, and incumbent WMS systems they will not replace.
  - >-
    Each deployment compounds reusable connectors, exception ladders, and cross-site failure data that neither one OEM nor one 3PL
    can observe alone.
strategicChoices:
  beachhead: >-
    North American 3PL networks with 5-20 facilities that already have one approved mobile-manipulator or mixed-robot pilot and need
    to standardize overnight replenishment, pallet-zone reset, and next-wave staging across additional sites.
  wedgeRationale: >-
    This entry point creates faster proof than selling generic robot orchestration because the workflow has a clear owner, a defined
    start and end state, a measurable SLA handoff, and a budget trigger tied to pilot expansion rather than speculative robotics
    transformation.
  sequencingRationale: >-
    Product should begin with one narrow reset workflow, one WMS connector family, and one proof-of-completion layer because those are
    the minimum capabilities needed to win a paid rollout and gather benchmark data. GTM should stay founder-led and deployment-heavy
    until the team proves repeatable implementation in brownfield facilities, then add OEM and integrator channels once one lighthouse
    network shows multi-site expansion. Hiring follows that order: integration and deployment first, scaled sales and adjacent-market
    product later, because execution risk is mostly in workflow packaging rather than top-of-funnel volume.
  notYet:
    - Daytime autonomous picking or full warehouse orchestration
    - Greenfield warehouse automation projects that require stack-wide redesign
    - Hospitals, labs, and factory line-side replenishment before 3PL multi-site proof
    - Deep custom support for every robot OEM before one mixed-fleet template library exists
market:
  tam: "$216.0M estimated TAM based on about 1,200 North American 3PL facilities that fit the multi-site robot-expansion profile at roughly $180k annual facility ACV."
  sam: "$63.0M estimated SAM based on about 350 facilities in operators likely to be in an automation-expansion window during 2026-27 at the same ACV basis."
  som: "$3.2M estimated year-3 SOM based on 18 live facilities across 2-3 lighthouse 3PL networks at roughly $180k annual facility ACV."
  segments:
    - Multi-site North American 3PL warehouse networks expanding mobile-manipulator or mixed-fleet pilots
    - Adjacent large retailers, factory operators, and healthcare networks only after the 3PL reset template is proven
  buyingProcess: >-
    The motion starts when a first robot pilot hits labor or throughput goals and headquarters wants rollout to more shifts or sites
    before peak season or a contract reset. The network operations leader sponsors the evaluation, the site GM and EHS team sign off
    on workflow and safety assumptions, and the VP of operations or head of automation approves a one-facility paid rollout that must
    convert into measurable on-time handoff and faster site replication.
product:
  mvp: >-
    MVP is a one-facility shift-reset control plane that ingests WMS tasks and site rules, issues a reusable overnight workflow,
    records proof-of-completion for each replenishment and staging step, and routes unresolved exceptions to a supervisor before the
    next shift starts. It should support one WMS connector pattern and one mobile-manipulator or mixed-fleet deployment path rather
    than promise universal robot support on day one.
  sixMonth: >-
    Ship the first production deployment with workflow authoring, exception ladders, proof-of-completion dashboards, baseline KPI
    capture, and at least one reusable connector into a target WMS plus one approved robot stack.
  twelveMonth: >-
    Add a second WMS or execution-system connector family, cross-site template cloning, safety and risk-assessment artifacts in the
    deployment workflow, and benchmark reporting on rollout time, exception rates, and on-time shift starts across the first customer
    cohort.
  twentyFourMonth: >-
    Expand from one workflow into adjacent off-shift reset motions inside existing accounts, support mixed-fleet production rollouts
    across multiple facilities, and only then test adjacent verticals such as factory line-side replenishment or hospital supply
    restocking.
  keyBets:
    - One narrow off-shift workflow is enough to prove value before broader warehouse orchestration is needed.
    - Buyers will pay for proof-of-completion and rollout speed, not just for robot task dispatch.
    - The first 5-10 deployments can be converted into reusable connector and template packs rather than bespoke services projects.
    - Cross-site benchmark data on exception patterns and shift-handoff failures becomes a defensible dataset for embodied-AI rollout planning.
gtm:
  wedge: >-
    Sell a one-facility shift-reset rollout that turns a successful robot pilot into a repeatable cross-site operating playbook with
    auditable next-shift readiness, instead of asking the customer to buy a broad new warehouse platform.
  channels:
    - Founder-led direct sales to 3PL network operations leaders, site GMs, and automation program owners
    - Robot OEM and mobile-manipulator deployment referrals when customers want expansion beyond the first pilot
    - WMS, WES, and systems-integrator partners that already own task-queue and site-survey relationships
  funnelTargets: "Target account -> qualified expansion opportunity 20-30%; qualified opportunity -> paid one-facility rollout 25-35%; paid rollout -> annual production contract 60%+; first facility -> second facility expansion within 12 months 50%+"
  pricing: >-
    Start with a paid one-facility deployment and integration package, then convert to annual per-live-facility software priced around
    the researched $180k ACV hypothesis, with setup fees tied to WMS and execution-system connectors. This matches buyer logic because
    the customer is comparing the product against supervisor overtime, delayed rollout, and OEM services, not against seat-based SaaS.
businessModel:
  revenueStreams:
    - Annual per-live-facility software subscription
    - One-time workflow setup, connector deployment, and safety-template onboarding fees
    - Premium benchmarking and network rollout analytics
  unitOfValue: Live facility running shift-reset workflows through the control plane
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more facilities inside the same 3PL network
    - Add adjacent off-shift workflows after the reset wedge is proven
    - Sell benchmark and exception analytics to operators and integrator partners
    - Expand the same workflow-definition layer into adjacent physical-operation verticals after 3PL proof
strategyMap:
  northStarMetric: Live facilities completing overnight shift-reset workflows through the platform
  inputMetrics:
    - Paid rollout opportunities created from existing robot pilots
    - Median weeks from expansion approval to first completed shift on a new site
    - Percentage of shifts that start on time with all required replenishment and staging complete
    - Exception rate per 100 workflow tasks and percentage resolved before day-shift start
    - First-facility to second-facility expansion rate inside lighthouse accounts
  moatsToBuild:
    - Cross-site library of shift-reset templates, exception ladders, and safety assumptions
    - Reusable semantic connectors between WMS task states and robot completion states
    - Benchmark dataset on rollout speed, exception patterns, and proof-of-completion outcomes across facilities
  killCriteria:
    - Fewer than 3 paid lighthouse rollouts signed in the first 12 months
    - Median rollout time from customer approval to first completed live shift stays above 8 weeks after the first 3 deployments
    - Paid rollout to annual production conversion falls below 50% after 6 rollouts
    - More than 60% of qualified opportunities require bespoke integrations or services that prevent a path to 70% gross margin
  mermaid: |
    flowchart LR
      Wedge[3PL shift-reset wedge] --> MVP[One-facility control plane MVP]
      MVP --> Proof[Proof of on-time shift handoff and faster rollout]
      Proof --> Expansion[Multi-site expansion and adjacent off-shift workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong wedge clarity and buyer pain, but conviction remains limited until robot-pilot expansion demand and software ACV are proven in paid deployments.
    whyBelieve: The company targets a narrow workflow where urgency, measurable SLA outcomes, and repeatability all align once a first robot pilot succeeds.
    whyDoubt: Timing risk, brownfield integration cost, and incumbent bundling could keep this as a services-assisted feature layer instead of a durable software company.
    nextDiligence: Prove on 2 paid lighthouse accounts that the product cuts site-rollout time materially and converts one-facility deployments into multi-site annual software.
  firstCustomer:
    title: Director of network operations at a North American 3PL
    profile: A 3PL running 5-20 ambient or parcel facilities, already operating one approved mobile-manipulator or mixed-fleet pilot, with recurring overnight replenishment and wave-prep labor gaps.
    trigger: A first robot pilot meets labor or throughput goals and headquarters wants rollout to another shift or site before the next peak period or contract reset.
    buyer: VP operations or head of warehouse automation
    initialContract: "$40k-$80k paid one-facility rollout plus connector setup, converting to roughly $150k-$200k annual per live facility if the first site proves on-time shift starts and repeatable rollout economics."
  mustBeTrue:
    - Enough target 3PL networks must already have approved robot pilots for expansion that founder-led pipeline can produce 3 paid lighthouse rollouts within 12 months.
    - One-facility reset deployments must show measurable improvement in rollout speed and on-time shift readiness versus manual supervisor-led alternatives.
    - Buyers must accept a vendor-neutral workflow layer instead of defaulting to OEM professional services, WMS features, or integrator-built custom logic.
    - The first 5 deployments must share enough workflow structure that connector and template reuse drives a credible path to 70% gross margin.
    - At least half of lighthouse customers must expand from one facility to another within a year, proving this is a network software budget rather than a local pilot tool.
  diligenceQuestions:
    - How many target 3PL accounts today already have a mobile-manipulator or mixed-fleet pilot approved for multi-site expansion?
    - Which WMS and execution stacks dominate those accounts, and how much connector reuse is realistic across them?
    - What KPI threshold would make a VP of operations move from pilot or innovation budget into annual operating budget?
    - How often do OEM deployment teams lose credibility because a working workflow cannot be replicated cleanly at the next site?
    - Which parts of safety and risk assessment can be productized, and which remain permanently services-heavy?
operatingAssumptions:
  - assumption: A meaningful subset of North American 3PL networks already has approved robot pilots that are moving into multi-site expansion before end-2026.
    basis: research.yaml
    validationTest: Interview 15 target operators and integrators, then confirm at least 5 accounts have funded expansion plans and active site-selection work.
    decisionImpact: If false, narrow GTM to existing mixed-fleet deployments only and lower near-term revenue expectations.
  - assumption: Buyers will tolerate one WMS connector family plus one robot stack in the first deployment if the company proves shift-handoff outcomes quickly.
    basis: idea.yaml
    validationTest: Close the first 2 paid rollouts with fixed-scope integrations and measure time to first live shift plus customer willingness to expand without deeper custom work.
    decisionImpact: If false, the roadmap must prioritize broader connector coverage earlier and the company will need more implementation capital.
  - assumption: The researched ~$180k facility-year ACV is acceptable relative to OEM professional services and the value of faster rollout.
    basis: research.yaml
    validationTest: In 10 qualified opportunities, test pricing bands around the per-facility subscription hypothesis and record pilot-to-annual conversion willingness.
    decisionImpact: If false, the company may need lower ACV, a different unit of value, or a higher-services model with weaker software margins.
  - assumption: Proof-of-completion and exception visibility matter enough to site GMs and network leaders that they will fund a standalone control layer.
    basis: operator judgment
    validationTest: In the first 3 pilots, track whether on-time shift-start improvement and reduced supervisor walk-throughs are cited in renewal decisions.
    decisionImpact: If false, the product should narrow toward deployment tooling for OEMs or integrators rather than a direct enterprise application.
  - assumption: Early deployments can be productized into reusable templates, safety artifacts, and semantic mappings across similar 3PL facilities.
    basis: research.yaml
    validationTest: Compare workflow steps, exception taxonomies, and sign-off requirements across the first 5 facilities and quantify reusable versus bespoke components.
    decisionImpact: If false, implementation remains too bespoke for venture-scale economics and the company should stay a narrower deployment-services business.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12-15 3PL network operations leaders, site GMs, and integrators focused on off-shift replenishment and pilot expansion.
    hypothesis: Overnight reset replication is a top-3 blocker once a first robot pilot succeeds.
    successMetric: At least 8 interviews confirm a concrete expansion trigger and 5 share baseline shift-handoff or rollout-time data.
    owner: CEO founder
  - horizon: 0–90 days
    experiment: Run 2 concierge workflow-mapping projects using historical WMS tasks, shift checklists, and exception logs from target accounts.
    hypothesis: The company can define a reusable reset template before full product automation.
    successMetric: Two prospects receive a workflow map with quantified exception categories and at least 1 signs a paid rollout.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Deploy the first paid one-facility rollout with one WMS connector and one approved robot stack.
    hypothesis: A live site can reach first completed overnight shift in under 6 weeks without a custom software project.
    successMetric: First production workflow goes live within 6 weeks and captures baseline versus new shift-start and exception metrics.
    owner: Deployment lead
  - horizon: 90–180 days
    experiment: Test conversion from paid rollout into annual per-facility software on 3 qualified accounts.
    hypothesis: Buyers will commit to annual software if the first site proves repeatability before peak season.
    successMetric: At least 2 paid rollouts signed and 1 account pre-approves annual pricing subject to KPI hit.
    owner: CEO founder
  - horizon: 180–360 days
    experiment: Add cross-site template cloning and compare rollout time for the second facility versus the first within one lighthouse account.
    hypothesis: Template reuse can cut second-site deployment time by at least 30%.
    successMetric: Second-facility go-live is at least 30% faster than first-facility deployment in the same network.
    owner: Product lead
  - horizon: 180–540 days
    experiment: Launch one co-sell motion with a robot OEM or warehouse integrator after the first production reference.
    hypothesis: Partner-led demand will convert faster once the company has one proven lighthouse account and fixed-scope deployment package.
    successMetric: Partner-sourced opportunities reach at least 20% of qualified pipeline and produce one additional paid rollout.
    owner: Partnerships lead
operations:
  - Standardize every deployment around baseline shift-handoff KPIs, task-state mapping, safety assumptions, and a weekly exception review with the customer.
  - Maintain a reusable connector and template library for the dominant WMS and execution-system patterns in the beachhead segment.
  - Treat proof-of-completion, supervisor escalation, and risk-assessment artifacts as core product surfaces, not services side work.
  - Use OEM and integrator partners selectively for site survey, robot configuration, and safety sign-off while keeping workflow logic and benchmark data proprietary.
team:
  - role: CEO founder
    startTiming: Month 0
    rationale: Owns founder-led sales, lighthouse account selection, pricing, and partner development while the category is still being defined.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds workflow authoring, semantic task mapping, proof-of-completion, and the first connector path that determines time to value.
  - role: Robotics and WMS integration engineer
    startTiming: Month 1
    rationale: Reduces services burden by turning the first deployments into reusable connectors and deployment tools.
  - role: Deployment success lead
    startTiming: Month 2
    rationale: Owns site onboarding, KPI baselining, exception design, and conversion from first-facility rollout into multi-site expansion.
  - role: Safety and operations advisor
    startTiming: Month 3
    rationale: Ensures deployment templates reflect EHS, risk-assessment, and night-shift operating realities required for site GM trust.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Adds OEM and integrator channel capacity only after the team has one repeatable lighthouse deployment and a clear packaging model.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 paid lighthouse rollouts in the beachhead segment
      - Complete 2 live one-facility deployments with measured baseline and post-launch shift-handoff KPIs
      - Build the first reusable WMS connector family plus one repeatable robot deployment template
      - Convert at least 1 lighthouse account from first facility into approved second-facility expansion
  - horizon: 12–24 months
    items:
      - Convert at least 3 paid rollouts into annual production software contracts
      - Reach 8-12 live facilities across 2-3 lighthouse 3PL networks
      - Establish 2 repeatable referral or co-sell motions with OEMs, WMS partners, or integrators
      - Publish internal benchmark baselines for rollout time, exception rates, and on-time shift starts across the installed base
  - horizon: 24–36 months
    items:
      - Reach 18 live facilities or prove the modeled SOM is overstated and narrow the company deliberately
      - Expand from the initial reset wedge into adjacent off-shift workflows inside existing 3PL accounts
      - Demonstrate that template reuse and partner-led deployment support a path to 70% gross margin
      - Test one adjacent vertical only after multi-site 3PL expansion is repeatable
risks:
  - risk: General-purpose robot and mobile-manipulator rollouts may slip beyond current enterprise timelines, shrinking near-term demand.
    likelihood: High
    impact: High
    mitigation: Target only accounts with existing mixed-fleet or approved pilot expansions and use those deployments to validate demand before broader market bets.
  - risk: WMS incumbents, OEM stacks, or integrators may bundle enough workflow logic to weaken standalone budget appetite.
    likelihood: Medium
    impact: High
    mitigation: Win on vendor neutrality, cross-site proof-of-completion, and benchmark data that point solutions and services teams do not standardize.
  - risk: Brownfield integration and safety sign-off may stay too services-heavy for attractive software margins.
    likelihood: High
    impact: High
    mitigation: Constrain the first deployments to one workflow and a narrow connector set, then turn every implementation artifact into reusable product templates.
  - risk: Site supervisors may not trust unattended overnight execution even if robot hardware performance is acceptable.
    likelihood: Medium
    impact: Medium
    mitigation: Keep explicit human escalation, exception review, and proof-of-completion before day-shift handoff from the first deployment.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to win 3 lighthouse rollouts, ship the first reusable WMS and robot-stack connectors, prove at least one multi-site
    expansion inside a 3PL network, and turn deployment know-how into a template library that supports software rather than services
    economics.
