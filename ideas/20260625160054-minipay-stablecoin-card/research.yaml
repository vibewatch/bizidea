openQuestions:
- What share of stablecoin wallet balances in target markets converts into recurring card GMV rather than remaining savings or peer-to-peer balances?
- Which sponsor-bank and BIN partners will underwrite consumer stablecoin card programs in Nigeria, Kenya, and Ghana today, and under what reserve and reporting conditions?
- How much of operator willingness to pay sits in launch/setup fees versus ongoing FX-spread participation once local-currency conversion becomes visible to users?
- Which target countries will require sandbox or bespoke regulatory engagement before a wallet-linked stablecoin card can go live at scale?
