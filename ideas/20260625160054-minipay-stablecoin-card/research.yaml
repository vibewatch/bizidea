competitors:
- name: Gnosis Pay
  stage: scale-up
  wedge: Self-custodial white-label Visa card infrastructure for fintechs, neobanks, and exchanges.
  pricing: Free/self-serve tier with custom partnership plans.
  strength: Live proof that wallets can attach stablecoin balances to Visa merchant acceptance without becoming banks or issuers.
  weaknessVsUs: Optimized for crypto-native self-custody and platform flexibility, not for a managed emerging-market launch service that owns local compliance and sponsor execution.
  sourceRefs:
  - 2
  - 3
  - 4
  - 5
- name: Stripe / Bridge
  stage: incumbent
  wedge: Global stablecoin treasury, orchestration, and card infrastructure delivered through Stripe and Bridge APIs.
  pricing: Enterprise contracts; stablecoin card features remain private preview.
  strength: Combines stablecoin treasury, card issuance expertise, fraud tooling, and global bank/network relationships.
  weaknessVsUs: Broader global platform focus means less evidence of a tightly packaged Africa-first or Ghana/Nigeria/Kenya launch playbook.
  sourceRefs:
  - 10
  - 11
  - 12
  - 39
- name: Marqeta
  stage: incumbent
  wedge: API-first card issuing and crypto-card enablement for digital wallets and fintechs.
  pricing: Sales-led enterprise pricing; no public rate card surfaced in fetched official pages.
  strength: Strong issuer-processing controls, virtual/physical card tooling, and crypto-card positioning for large platforms.
  weaknessVsUs: Still leaves the buyer to solve stablecoin treasury, local partner selection, and emerging-market compliance orchestration.
  sourceRefs:
  - 33
  - 34
- name: Immersve
  stage: scale-up
  wedge: Mastercard-native crypto card issuing with BIN sponsorship, custodial and non-custodial options, and per-transaction pricing.
  pricing: All-inclusive per-transaction fee covering BIN sponsorship, scheme, wallet, and processing costs.
  strength: Clear card-program sponsorship offer and explicit pricing model, plus both custodial and non-custodial configurations.
  weaknessVsUs: Less evidence of country-by-country emerging-market rollout support and more emphasis on generic Mastercard access.
  sourceRefs:
  - 35
  - 36
- name: Rain
  stage: scale-up
  wedge: Full-stack enterprise stablecoin payments and card infrastructure with licensed-institution partners.
  pricing: Enterprise custom pricing; public pricing not disclosed.
  strength: Markets a full-stack enterprise story and external coverage points to strong growth, funding, and a direct role in the crypto-card payments race.
  weaknessVsUs: Appears oriented toward broad enterprise payments rather than a managed launch service for African and LATAM wallet operators navigating local rails and compliance.
  sourceRefs:
  - 37
  - 38
