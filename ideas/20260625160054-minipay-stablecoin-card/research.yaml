  adoptionFrictionMatrix:
  - friction: Securing sponsor-bank, network, and BIN relationships for each launch market
    severity: high
    affectedBuyer: CTO / payments lead
    mitigation: Pre-negotiate sponsor and network access and sell them as part of the launch package rather than leaving each wallet to source them independently.
