slug: stablecoin-card-stack-em
date: '2026-06-25'
executiveSummary: MiniPay 在 2026 年 6 月上线 Visa 卡，把稳定币可消费性从路线图概念，直接推成新兴市场钱包眼前的同台竞争问题，尤其是在非洲——这里本来就有大规模稳定币流入和成熟的数字支付习惯。最好的首个客户，是已经托管 USDC 或 USDT、用户群以汇款场景为主、又必须在一个产品周期内于尼日利亚或肯尼亚跟上 MiniPay 的非洲 B 轮及以上新银行或移动钱包。产品不该去和 Gnosis Pay、Stripe/Bridge 或 Rain 比谁把通用发卡基础设施堆得更全；它该卖的是一层托管式上线服务，把保荐银行接入、各国合规、资金管理搭建和钱包集成，打包成一个 90 天上线项目。第一单应是付费的单国上线包，定价围绕一次性搭建费加 FX 分成，因为买方想躲开的是 18 个月的内部自建，而不是再采购一个开发者 API。研究显示，面向首批运营方的切口 TAM 约 $21.0M、SAM 约 $7.0M、第 3 年 SOM 约 $2.8M，规模可信，但也不算大，所以必须尽早从服务切到多国合规和资金管理软件。更稳的节奏是：先做非洲首发卡上线服务，再沉淀可复用的资金与合规模块，最后等卡项目跑起来后，再延展到相邻消费支付轨道。最关键的反证风险有两个：一是保荐银行和卡组织接入比假设更难，二是钱包余额未必能足够快地转成持续卡片 GMV，从而撑起抽成模式。研究里还有两处尽调空白——承保方真实覆盖范围，以及买方在看不到已上线 GMV 前是否愿意签单；因此，这份计划默认必须在前 90–180 天把这两点验证清楚。
problem:
- 非洲和拉美的钱包现在都面临功能对标压力：用户得能把稳定币余额直接拿去商户消费；但要把合规卡项目真正上线，仍然要打通保荐银行接入、卡组织审批、资金管理设计，以及逐国 AML 或 VASP 合规。
- 通用发卡处理器和稳定币 API 虽然降低了技术门槛，但最难的上线工作仍在买方手里：本地合规材料打包、FX 与清算运营，以及在死线前协调多方对手盘。
solution:
- 卖一套托管式卡项目上线服务，架在现有基础设施伙伴之上，让一个钱包能在 90 天内于单一国家上线，覆盖保荐银行协调、合规打法、资金管理配置和钱包集成。
- 把可复用部分产品化成软件：国家上线模板、入驻工作流、授权与清算监控、FX 点差控制，以及上线后仍可继续使用的合规证据包。
whyWeWin:
- 竞争对手卖的是卡或稳定币基础设施模块，而这个滩头客户真正买的是在尼日利亚、肯尼亚和加纳顶着真实监管与董事会压力时，项目能不能按时上线。
- 每做成一次部署，都会沉淀特定走廊的保荐银行、合规和资金管理打法，让第二国、第三国上线更快，也更难被通用型全球厂商复制。
strategicChoices:
  beachhead: 滩头市场是非洲的 B 轮及以上新银行和移动钱包：它们已经持有稳定币余额，用户需求偏汇款，而且必须立刻在尼日利亚或肯尼亚推出面向消费者的稳定币卡。
  wedgeRationale: 这批客户的当下触发点最强，因为 MiniPay 已经上线，稳定币使用也确实连着真实支付行为；相比先搭一个跨区域大平台，先把单国上线做成，更快验证付费意愿。
  sequencingRationale: 公司必须先证明：借助伙伴基础设施，也能把一个合规项目快速上线；再把这套重服务动作沉淀成可复用的合规和资金管理软件；最后才去扩更多国家或更多消费支付轨道。
  notYet:
  - 自建面向消费者的钱包或卡品牌
  - 替代核心发卡处理器，或以卡保荐方身份承担主体资产负债表风险
  - 在尼日利亚、肯尼亚和加纳的上线打法可复用之前，就大举扩张东南亚
  - 在卡项目单位经济成立前，先做本地支付轨受理、借贷或商户收单产品
market:
  tam: TAM 约 $21.0M：假设可触达的新兴市场钱包运营方有 60 家，每家每年可贡献约 $350k 收入，来自上线费与交易分成。
  sam: SAM 约 $7.0M：假设约有 20 家非洲和拉美钱包已经符合滩头画像，并且未来三年确有可能采购。
  som: 第 3 年 SOM 约 $2.8M：对应 8 家已上线运营方，每个项目每年约 $350k 收入，和研究里的自下而上测算一致。
  segments:
  - 具备稳定币托管和汇款使用场景的非洲新银行与移动钱包
  - 在非洲跑通后，希望更快推出商户消费能力的拉美加密钱包与汇款应用
  buyingProcess: 通常是产品或支付负责人在看到竞品上线、或收到董事会要求后先意识到缺口；随后合规与资金团队会先判断是否存在可承保的上线路径，再由 COO、CPO 或 CTO 批准单国试点。整个销售过程高触达，而且锚定的是明确上线日期，不是可有可无的创新预算。
product:
  mvp: MVP 是一套单国上线控制台，加上面向已持有稳定币余额钱包的托管式实施服务。它覆盖伙伴选择、合规工作流模板、入驻、资金与清算配置，以及单个已上线卡项目的简易运营看板，而不是一整套宽而全的多产品支付平台。
  sixMonth: 在 6 个月内做出尼日利亚、肯尼亚、加纳三套可复用国家打法；把保荐银行入驻、KYC 与 AML 工作流，以及清算监控，标准化到一套核心基础设施栈上。
  twelveMonth: 在 12 个月内补上多国部署支持、可配置 FX 点差控制、合规证据包，以及把第二次上线时间较第一次至少压缩 30% 的实施工具。
  twentyFourMonth: 24 个月后，先在卡项目上建立面向新兴市场钱包消费计划的运营层，再把可复用的资金管理、合规和项目管理软件延展到相邻支付轨道。
  keyBets:
  - 买方会先为上线确定性付费，再为通用稳定币基础设施平台付费。
  - 先把单国上线和上线后监控做好，就足以验证 ROI，不必一开始就做完整的多国编排。
  - 能跑起来的不只是稳定币储蓄余额，卡消费本身也会增长到足以支撑基点收入流。
  - 即便全球厂商陆续补上更多稳定币卡能力，非洲优先的合规与保荐银行执行仍会保持差异化。
gtm:
  wedge: 先向已持有用户余额的钱包卖付费的单国稳定币卡上线项目，再把这次实施转成持续性的项目管理、合规与资金管理合同。
  channels:
  - 在竞品明显上线后，由创始人直接外呼非洲新银行和移动钱包里的产品、支付与资金负责人
  - 通过 Gnosis Pay、保荐银行、卡组织顾问和本地合规律师做伙伴带单
  - 借助 Celo 以及一批已经在推动商户消费落地的稳定币钱包生态做分发
  funnelTargets: 目标账户→合格共创沟通 20%+，合格共创沟通→付费试点 15%+，付费试点→正式生产 60%+，首国上线→12 个月内第二国扩张 40%+
  pricing: 定价为每国一次性上线费约 $30k-$75k，外加稳定币兑本币后的卡消费金额 20-50 bps 分成；若扩到更多司法辖区，可追加年度合规支持费。这符合买方心态：在 GMV 还没跑出来前，他们不想先背一笔很大的固定软件支出。
businessModel:
  revenueStreams:
  - 按国家收取上线与入驻费用
  - 从稳定币注资的卡消费或 FX 转换量中抽基点分成
  - 按年订阅合规监控、报告和资金运营工具
  - 对新增国家、钱包产品或项目变体收取扩展费用
  unitOfValue: 每个司法辖区内 1 个已上线钱包卡项目，加上每月经由平台上线与运营层处理的稳定币注资卡片 GMV。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一钱包账户里扩到第二国、第三国
  - 上线服务证明价值后，追加年度合规与资金工具
  - 从面向消费者的汇款钱包，扩到有相似消费能力需求的交易所或超级应用
strategyMap:
  northStarMetric: 通过平台上线并进入正式生产的钱包项目，其月度稳定币注资卡片 GMV。
  inputMetrics:
  - 在尼日利亚、肯尼亚和加纳签下的付费共创客户数
  - 从签约到第一笔获批卡交易的天数
  - 前 90 天的授权成功率与清算异常率
  - 已入金钱包用户中，卡片活跃用户占比
  - 从首国扩到第二国的扩张率
  moatsToBuild:
  - 面向每个目标国家的保荐银行、卡组织和合规上线打法
  - 跨走廊的资金与 FX 基准数据，覆盖转换点差、失败率与清算时效
  - 可复用的实施工作流，在每个后续项目里继续压缩上线时间和监管准备成本
  killCriteria:
  - 前 12 个月签下的可承保付费共创客户少于 3 家
  - 已上线试点里，不到 50% 能在 6 个月内转成正式生产合同
  - 项目上线后 9 个月内，已上线项目仍达不到至少 $1M 月卡片 GMV，或已入金用户里卡激活率达不到 10%
  mermaid: "flowchart LR\n  Wedge[Africa-first launch service] --> MVP[One-country card launch MVP]\n  MVP --> Proof[90-day go-live and recurring GMV proof]\n  Proof --> Expansion[Multi-country compliance and treasury expansion]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 客户时点很强、痛点也清楚，但切口市场不大，而且高度依赖保荐方与卡组织伙伴，所以整体判断上限被压住。
    whyBelieve: MiniPay 已经正式上线，加上有据可查的非洲稳定币使用上升，让竞争钱包有了一个董事会看得见、必须花钱买速度而不是继续内建的现实理由。
    whyDoubt: 全球基础设施厂商可能把同样流程吸收进去；而且只有当钱包余额真能在真实监管约束下转成有意义、可持续的卡消费时，这门生意才跑得通。
    nextDiligence: 先拿下尼日利亚和肯尼亚的已打通的保荐银行承保路径，再把两个目标钱包转成付费上线试点；做到这一步，才适合把它当作可投基础设施，而不是咨询型命题。
  firstCustomer:
    title: 在 MiniPay 对标压力下的非洲新银行支付负责人
    profile: 一家 B 轮及以上钱包或新银行，活跃用户 100 万以上，已经具备稳定币托管或汇款流量，并且内部要求它必须在一个产品周期内于尼日利亚或肯尼亚推出商户消费能力。
    trigger: 竞品上线稳定币卡后，董事会或高管团队要求拿出一个不用 18 个月内部自建的上线方案。
    buyer: 首席产品官
    initialContract: $30k-$75k 的单国上线包，外加转换后卡消费金额的 20-50 bps 分成；等第一条已上线项目证明了 GMV 和合规就绪度后，再转成多国年度运营合同。
  mustBeTrue:
  - 前 10 个滩头潜客里，至少有 5 个确认自己在 12 个月内确实有预算，要上稳定币卡。
  - 面向目标钱包画像，保荐银行和卡组织伙伴至少愿意为尼日利亚、肯尼亚、加纳中的两个市场承保，而且不要求创业公司自己成为受监管主体。
  - 单国上线能在 90 天内落到正式生产，而且实施工作可复用，而不是每次都变成定制咨询。
  - 已上线钱包项目能产生足够多的卡片 GMV，让 20-50 bps 的抽成在前 9 个月内就变得有意义。
  - 买方更愿意找一个懂非洲的托管式上线伙伴，而不是直接向 Gnosis Pay、Stripe/Bridge、Immersve 或 Rain 采购。
  diligenceQuestions:
  - 现在哪些保荐银行或 BIN 伙伴，真的能在尼日利亚、肯尼亚和加纳支持面向消费者的稳定币卡项目？
  - 在真实买方访谈里，第一份合同到底由谁出预算：产品、支付、资金，还是合规团队？
  - 目标钱包现在有多大比例已经直接和 Gnosis Pay、Bridge 或其他基础设施厂商建立关系？
  - 上线后的前 6 个月里，从已入金用户转成卡片活跃用户，现实转化率会是多少？
  - 首个客户只需要发卡，还是说要真正跑起来，本地支付轨受理也已经是必需项？
operatingAssumptions:
- assumption: 滩头钱包会在还没看到自己已上线卡片 GMV 之前，就先购买托管式上线包。
  basis: research.yaml
  validationTest: 访谈 10 家目标机构，并在正式生产数据出现前，先拿到至少 2 份绑定明确上线日期的付费试点承诺。
  decisionImpact: 如果不成立，公司就该转向上线后的运营工具，并通过现有基础设施伙伴销售，而不是继续靠创始人主导的上线服务。
- assumption: Gnosis Pay、保荐银行或同类伙伴，能覆盖首批目标国家，而且不会附带吃掉利润的排他性商业限制。
  basis: research.yaml
  validationTest: 从至少 3 家承保或基础设施伙伴处拿到书面条款清单或伙伴清单，覆盖尼日利亚、肯尼亚和加纳。
  decisionImpact: 如果不成立，滩头市场就要收缩到唯一有可行伙伴覆盖的那个国家，融资计划也应同步下修。
- assumption: 上线工作可以被充分产品化，让同一国家的第二个客户实施时间显著短于第一个。
  basis: 运营判断
  validationTest: 跟踪前 3 次部署的实施工时，确认第 3 次比第 1 次至少快 30%，且审批质量没有下降。
  decisionImpact: 如果不成立，毛利率就会一直像服务公司，公司也该按实施公司而非软件基础设施来估值和配人。
- assumption: 对汇款和美元储蓄用户来说，卡片消费会变成持续行为，而不是一次性新鲜感。
  basis: research.yaml
  validationTest: 在首个已上线项目里跟踪 90 天用户队列留存和单活跃用户月度卡片 GMV；要求首月活跃用户到第 3 个月至少保留 30%。
  decisionImpact: 如果不成立，定价就应更多转向固定订阅和合规收入，而不是交易分成。
- assumption: 在早期销售里，非洲优先定位会比非洲 + 拉美的宽泛信息更能打。
  basis: idea.yaml
  validationTest: 由创始人跑 15 场销售沟通，对比只讲非洲与讲多区域时的反馈率和试点转化率。
  decisionImpact: 如果不成立，公司就该改成围绕非洲与拉美的汇款走廊来讲故事，并更早招聘覆盖双语伙伴网络的人。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 家已经支持稳定币余额的非洲钱包、新银行和汇款应用。
  hypothesis: MiniPay 的上线，已经让至少三分之一目标名单出现明确的 12 个月产品时限。
  successMetric: 有 5 个潜客确认存在真实上线立项指令、明确预算负责人和目标国家。
  owner: CEO
- horizon: 0–90 天
  experiment: 为尼日利亚、肯尼亚和加纳拿到保荐银行、卡组织与基础设施可行性评审。
  hypothesis: 至少两个目标国家，对滩头客户画像都存在实际可行、且不带排他锁定的承保路径。
  successMetric: 每个可行国家拿到 2 条书面伙伴路径和 1 份实施清单草案。
  owner: 合作负责人
- horizon: 0–90 天
  experiment: 做出单国上线控制台原型，覆盖入驻工作流、清算监控和合规证据输出。
  hypothesis: 只要能减少伙伴协调和监管准备时间，买方就愿意接受一个范围收窄的运营产品。
  successMetric: 有 2 个潜客认可这个原型足以界定付费试点范围。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 为尼日利亚或肯尼亚的钱包跑两个付费单国上线试点。
  hypothesis: 边界收得足够紧的上线方案，比卖一个通用平台更快转进正式生产。
  successMetric: 签下 2 个付费试点，且其中 1 个能在启动后 90 天内跑出第一笔获批交易。
  owner: CEO
- horizon: 180–360 天
  experiment: 把首个试点沉淀为可复用的合规、资金和伙伴清单。
  hypothesis: 标准化打法既能降低第二次上线成本，也能守住毛利。
  successMetric: 第二次部署所需实施工时比第一次至少少 30%。
  owner: 产品与合规负责人
- horizon: 180–360 天
  experiment: 把最强的试点客户转成第二国扩张，或年度合规支持扩张。
  hypothesis: 在首个客户内部做扩张，是最直接的平台化证据，能证明公司不是一次性交付。
  successMetric: 12 个月内有 1 家客户签下至少相当于首单 50% 金额的扩张合同。
  owner: 资金与运营负责人
operations:
- 维护一套逐国上线操作手册，覆盖保荐银行审批、KYC 与 AML 控制、资金配置和清算对账。
- 为已上线项目建立日常运营流程，处理授权、清算异常、FX 点差监控和伙伴问题升级。
- 让受监管对手方继续负责发卡与受保护资金，创业公司自己只抓编排、报告和上线执行。
- 在需求未被验证前，优先把本地合规律师和卡组织顾问当成实施伙伴，而不是先搭建本地法务团队。
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责搭建上线控制台、伙伴集成和监控工作流，把重服务动作慢慢沉淀成可复用软件。
- role: 产品与合规负责人
  startTiming: Month 0
  rationale: 把逐国 VASP、AML 和消费者保护要求，翻成可部署模板和审批工作流。
- role: CEO / 创始人销售
  startTiming: Month 0
  rationale: 早期收入高度依赖信任驱动销售、伙伴谈判，以及挑对第一批共创客户。
- role: 合作负责人
  startTiming: Month 2
  rationale: 负责保荐银行、卡组织和基础设施关系；这些关系决定 90 天上线承诺是不是真的能兑现。
- role: 资金与运营负责人
  startTiming: Month 4
  rationale: 把清算、点差和对账工作流产品化，避免早期项目一直停留在定制化救火。
- role: 实施经理
  startTiming: Month 9
  rationale: 只在首个试点之后加入，用来缩短部署时间，把创始人带宽留给销售和伙伴工作。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 3 家付费共创客户，聚焦尼日利亚、肯尼亚和加纳的上线路径
  - 交付 MVP，并在试点启动后 90 天内完成 1 个已上线的单国稳定币卡上线
  - 为滩头客户画像拿下至少 2 条可信的保荐方或卡组织承保路径
  - 把 1 个试点转成年度合规、资金管理或多国正式生产合同
- horizon: 12–24 个月
  items:
  - 在非洲加上首个精选拉美账户，做到 4–6 个正式生产钱包项目
  - 依靠可复用打法和工具，把第二国上线时间至少压缩 30%
  - 推出年度合规与资金软件模块，形成可衡量、且超出上线费的经常性收入
  - 跑通 1 条由基础设施伙伴或合规顾问带来的伙伴渠道
- horizon: 24–36 个月
  items:
  - 做到 8 家正式生产运营方，与研究里的第 3 年 SOM 一致
  - 让最好的客户扩成多国项目，并延展到相邻钱包产品
  - 建立走廊级的资金与清算基准，形成差异化数据资产
  - 基于已上线 GMV 和毛利证据，决定继续聚焦托管式编排，还是扩到相邻消费支付轨道
risks:
- risk: 尼日利亚、肯尼亚和加纳的保荐银行、卡组织或 BIN 接入，可能比假设更慢、覆盖更窄。
  likelihood: High
  impact: High
  mitigation: 在收入没有跑出来前，先拿下多条承保路径，再围绕真正有已打通的伙伴覆盖的那两个国家安排滩头顺序。
- risk: 钱包用户也许会把稳定币主要拿来储蓄或点对点转账，而不是持续转成商户消费。
  likelihood: Medium
  impact: High
  mitigation: 第一批合同要把上线费和年度支持费收得足够重，同时从首个上线开始就埋点激活和留存，尽快验证 GMV 假设。
- risk: Gnosis Pay、Stripe/Bridge、Rain 或 Immersve 等全球厂商，可能把足够多的合规与上线支持打包进去，压缩差异化空间。
  likelihood: High
  impact: High
  mitigation: 保持供应商中立，专注非洲优先执行，并建立默认不会被全球平台打包出售的逐国打法。
- risk: 核心市场监管方可能收紧对稳定币或 VASP 的监管口径，拖慢上线或抬高合规成本。
  likelihood: Medium
  impact: High
  mitigation: 优先依靠持牌伙伴，维护逐国法律指引；没有可行监管路径的市场，不提前承诺。
- risk: FX 波动、脱锚或清算失败，可能带来资金损失或糟糕用户体验。
  likelihood: Medium
  impact: Medium
  mitigation: 把资金规则设得保守、限制浮仓暴露，并让伙伴而不是创业公司承担主体资产负债表风险。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 把首批国家上线打法做出来，证明保荐银行与卡组织覆盖可行，把 2–3 个试点推进到正式生产，再在更大范围扩张前，把上线执行沉淀成可复用的合规与资金软件。
