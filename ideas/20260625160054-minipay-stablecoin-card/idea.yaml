topRisks:
  - name: Visa Network Rule Changes
    description: >-
      Visa could update its network rules to restrict or prohibit stablecoin-backed
      card programs in specific EM jurisdictions, voiding BIN sponsorship
      agreements and shutting down active card programs.
    mitigation: >-
      Maintain parallel Mastercard BIN sponsorship relationships in all key
      markets and structure operator contracts to share regulatory risk; engage
      Visa's crypto policy team proactively to shape emerging network rules.
  - name: FX Reserve and Liquidity Risk
    description: >-
      Managing stablecoin-to-local-currency conversion at scale requires holding
      float positions exposed to stablecoin depegging events or sudden FX
      volatility in illiquid EM currency pairs.
    mitigation: >-
      Cap per-operator float exposure, use real-time FX forwards on liquid
      corridors, require operators to hold collateral buffers, and partner
      with a regulated treasury management firm for residual risk.
  - name: Local Regulator Crackdown
    description: >-
      Central banks in Nigeria, Kenya, or other key markets could restrict
      stablecoin card products under payment system or foreign-exchange
      regulations, shutting down active programs in the highest-priority
      markets.
    mitigation: >-
      Operate through licensed local banking partners in each market to ensure
      the product sits within existing payment regulation; pre-file regulatory
      briefs and maintain active engagement with central bank fintech sandboxes.
