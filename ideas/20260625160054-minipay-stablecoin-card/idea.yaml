problem: >-
  Stablecoin wallets in Africa, Latin America, and Southeast Asia hold billions
  in USDC and USDT, but their users cannot spend those balances at merchants.
  Building the card-issuing stack—Visa BIN sponsorship, Gnosis Pay integration,
  local-currency FX management, and AML/KYC compliance across 50-plus
  jurisdictions—requires 18 to 24 months and more than five million dollars in
  engineering investment per operator. MiniPay's live June 2026 launch with
  16 million users exposes how far behind every competing EM wallet now sits,
  and board pressure to match the feature will arrive before any in-house build
  can finish.
targetUser:
  primary: Head of Product or CTO at an African or LATAM neobank with stablecoin custody capabilities and at least one million active users
  secondary: Crypto super-app teams in Southeast Asia seeking to add a stablecoin spending card to their wallet product
  buyer: CTO or Chief Product Officer at a Series B-plus digital wallet company operating in an emerging market
startupThesis:
  nonObviousInsight: >-
    The hard part of a stablecoin card is not the crypto side—it is the
    per-jurisdiction Visa BIN sponsorship, live FX treasury management, and
    AML/KYC ruleset that generic card-issuing platforms like Marqeta and Stripe
    Issuing do not package for emerging-market regulatory environments. MiniPay
    spent years assembling that stack; competitors will not have 18 months to
    replicate it before users switch.
  beachhead: >-
    African neobanks and mobile money operators (e.g. Kuda, OPay, Wave)
    wanting to launch a USDC spending card for remittance recipients in
    Nigeria, Kenya, and Ghana
  wedge: >-
    Managed card-program launch service that handles Gnosis Pay integration,
    Visa BIN sponsorship, per-jurisdiction KYC/AML localisation, and live FX
    treasury setup as a packaged product delivered in under 90 days
  whyNowCatalyst: >-
    MiniPay's June 2026 live launch for 16 million users forces every competing
    EM wallet into an immediate feature-parity race that no in-house build can
    satisfy in time.
  ventureScalePath: >-
    Card-program launch service to per-transaction FX spread revenue, then
    ongoing treasury and compliance SaaS, then cross-border stablecoin payment
    rails, ultimately becoming the embedded finance layer for EM digital wallets
    globally.
solution: >-
  A managed API platform and white-label SDK that lets any stablecoin wallet
  operator launch a Visa-network card program in under 90 days without building
  the Gnosis Pay integration, Visa BIN sponsorship, or local FX treasury stack
  from scratch. The platform bundles jurisdiction-specific KYC/AML compliance
  modules for 50-plus EM markets, a real-time FX conversion engine that
  minimises spread leakage, and a card-program management dashboard. Operators
  pay a setup fee plus a basis-point revenue share on each transaction, aligning
  costs with card adoption. The core moat is a library of pre-negotiated Visa
  BIN sponsorship relationships and regulatory approval playbooks in Nigeria,
  Kenya, Ghana, Colombia, Peru, the Philippines, and Indonesia—the markets that
  MiniPay's launch validated first.
goToMarketSeed:
  firstCustomer: >-
    A Series B-funded African neobank with three million or more users, existing
    USDC custody integration, and a remittance-heavy deposit base in Nigeria or
    Kenya where stablecoin adoption is highest and MiniPay competition is most
    visible
  buyingTrigger: >-
    MiniPay's public launch creates immediate board-level pressure to match
    the stablecoin card feature within a product cycle; the 18-month in-house
    build timeline makes a managed launch service the fastest viable path
  currentAlternative: >-
    Build in-house by integrating Gnosis Pay, sourcing a Visa BIN sponsor,
    negotiating local KYC/AML compliance per jurisdiction, and managing FX
    treasury—a process requiring 18-plus months and more than five million
    dollars in engineering spend
  switchingReason: >-
    A 90-day launch at a 50,000-dollar setup fee and 25-bps transaction
    revenue share versus an 18-month, five-million-dollar in-house build
    with no guarantee of regulatory approval in each target market
  pricingHypothesis: >-
    30,000 to 75,000 USD one-time setup fee per market, plus 20 to 50 basis
    points on stablecoin-to-local-currency FX conversion per transaction; no
    per-seat or monthly minimums to lower the barrier to the first contract
