problem: >-
  非洲、拉美和东南亚的稳定币钱包持有数十亿美元的 USDC 和 USDT，但用户无法用这些余额在商户消费。搭建发卡技术栈——Visa BIN 保荐、Gnosis Pay 集成、本地货币 FX 管理，以及覆盖 50 余个司法管辖区的 AML/KYC 合规——每家运营商需投入 18 至 24 个月和超过 500 万美元的工程成本。MiniPay 于 2026 年 6 月面向 1600 万用户正式上线，彻底暴露了每家竞争 EM 钱包的功能差距，而追平该功能的董事会压力将在任何自建项目完工前提前来袭。
targetUser:
  primary: 非洲或拉美新银行的产品负责人或 CTO，具备稳定币托管能力且月活用户不少于 100 万
  secondary: 东南亚加密超级应用团队，希望在钱包产品中增加稳定币消费卡功能
  buyer: 新兴市场 B 轮及以后数字钱包公司的 CTO 或首席产品官
startupThesis:
  nonObviousInsight: >-
    稳定币卡的难点不在加密一侧，而在于逐司法管辖区的 Visa BIN 保荐、实时 FX 资金库管理，以及 Marqeta、Stripe Issuing 等通用发卡平台从未为新兴市场监管环境打包好的 AML/KYC 规则集。MiniPay 花了数年搭建这套架构；竞争对手不会有 18 个月来复制它——用户早就走了。
  beachhead: >-
    非洲新银行和移动支付运营商（如 Kuda、OPay、Wave），希望为尼日利亚、肯尼亚和加纳的汇款收款人推出 USDC 消费卡
  wedge: >-
    托管式卡程序启动服务：将 Gnosis Pay 集成、Visa BIN 保荐、逐司法管辖区 KYC/AML 本地化和实时 FX 资金库搭建打包为一个产品，90 天内交付
  whyNowCatalyst: >-
    MiniPay 于 2026 年 6 月面向 1600 万用户正式上线，迫使每家竞争 EM 钱包立刻展开功能追平竞赛，任何自建项目都来不及赶上。
  ventureScalePath: >-
    从卡程序启动服务到逐笔交易 FX 差价收入，再到持续性资金库与合规 SaaS，进而布局跨境稳定币支付通道，最终成为全球 EM 数字钱包的嵌入式金融底层。
solution: >-
  托管式 API 平台加白标 SDK，让任何稳定币钱包运营商无需从零搭建 Gnosis Pay 集成、Visa BIN 保荐或本地 FX 资金库，即可在 90 天内上线 Visa 网络卡程序。平台打包了覆盖 50 余个 EM 市场的司法管辖区专属 KYC/AML 合规模块、一套最小化差价损耗的实时 FX 兑换引擎，以及卡程序管理仪表盘。运营商支付启动费加逐笔交易基点收益分成，将成本与刷卡采用率挂钩。核心护城河是一套在尼日利亚、肯尼亚、加纳、哥伦比亚、秘鲁、菲律宾和印度尼西亚已预先谈妥的 Visa BIN 保荐关系库及监管审批操作手册——这些正是 MiniPay 首批验证的市场。
goToMarketSeed:
  firstCustomer: >-
    非洲某家 B 轮融资的新银行，用户规模达 300 万以上，已有 USDC 托管集成，且在尼日利亚或肯尼亚拥有以汇款为主的存款基础——这两个市场稳定币采用率最高、MiniPay 竞争压力最明显
  buyingTrigger: >-
    MiniPay 公开上线在董事会层面制造了立即追平稳定币卡功能的压力，须在一个产品周期内完成；18 个月的自建周期让托管式启动服务成为最快的可行路径
  currentAlternative: >-
    自建：集成 Gnosis Pay、寻找 Visa BIN 保荐方、逐司法管辖区谈判 KYC/AML 合规，并管理 FX 资金库——整个流程需要 18 个月以上和超过 500 万美元的工程投入
  switchingReason: >-
    90 天上线、启动费 5 万美元、每笔交易 25 个基点的收益分成，对比 18 个月、500 万美元的自建方案，且后者无法保证在每个目标市场获得监管批准
  pricingHypothesis: >-
    每个市场一次性启动费 3 万至 7.5 万美元，加每笔交易稳定币兑本地货币 FX 转换的 20 至 50 个基点；无按席位计费或月度最低消费，以降低首次签约门槛
