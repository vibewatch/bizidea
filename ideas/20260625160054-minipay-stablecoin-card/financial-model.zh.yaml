scenarios:
  downside:
    description: 保荐银行审批延后一季度，已上线 GMV 爬坡也更慢，因此到第 3 年底只有 7 家真正高产出的运营方，抽成变现也更弱。
    y3RevenueK: 2306.0
    y3EbitdaK: -744.2
    cashLowPointK: -327.7
    keyAssumptionChanges:
    - 原计划中的两个客户签约各自推迟约一个季度，因为承保和卡组织审批耗时比预期更长。
    - 每家已上线机构的成熟月收入降到约 $30K，而不是 $34K，因为卡片 GMV 更像储蓄场景，而不是消费场景。
    - 毛利率始终低于目标，因为上线工作仍更接近定制交付，伙伴成本也维持高位。
  base:
    description: 公司在第 1 年签下 3 家付费伙伴，到第 2 年底做到 6 家正式生产运营方，到第 3 年底做到 8 家，同时把上线打法标准化。
    y3RevenueK: 2810.0
    y3EbitdaK: -300.5
    cashLowPointK: 546.2
    keyAssumptionChanges:
    - 付费试点按照 M5、M9、M12、M15、M18、M21、M27 和 M33 的节奏签下。
    - 每家已上线机构的成熟经常性收入达到约 $34K / 月，单国上线费维持在 $45K。
    - 只有在正式生产项目得到验证后才继续分阶段招聘，使第 3 年末现金仍高于 6 个月运营缓冲。
  upside:
    description: 一条强势基础设施伙伴渠道把客户提前带进来，最好的客户也更早加购第二国支持，因此第 3 年的单位经济接近盈亏平衡。
    y3RevenueK: 3282.0
    y3EbitdaK: 192.7
    cashLowPointK: 1226.9
    keyAssumptionChanges:
    - 第 3 年有两个客户通过伙伴带单更早签下，而不是完全依赖创始人外呼。
    - 最强项目的成熟经常性收入升到约 $38K / 月，因为第二国支持和配套模块绑定得更快。
    - 后半程招聘继续后置到更早的收入证明出现之后，让毛利改善更直接沉到现金里。
sensitivity:
- variable: ARPU
  downsideCase: $260K 的经常性 ARPU：GMV 分成更接近 20 bps，支持模块挂载也更慢
  baseCase: $300K 的经常性 ARPU，不含一次性上线费
  upsideCase: $340K 的经常性 ARPU：头部客户加上第二国支持
  y3RevenueImpactK: -375.0
  cashImpactK: -260.0
- variable: CAC
  downsideCase: 每家机构 $120K，因为每笔交易都要走更长的伙伴与合规尽调
  baseCase: 每家机构 $90K，依赖创始人主导企业销售加部分伙伴带单
  upsideCase: 每家机构 $65K，前提是伙伴带单漏斗可复用
  y3RevenueImpactK: 0.0
  cashImpactK: -240.0
- variable: 流失率
  downsideCase: 月流失 2.0%，如果某个早期机构既不扩张也不续约
  baseCase: 月流失 1.2%，对应正式上线后粘性较强的 B2B 基础设施
  upsideCase: 月流失 0.8%，如果多国工作流深度嵌入客户体系
  y3RevenueImpactK: -220.0
  cashImpactK: -170.0
- variable: 销售周期
  downsideCase: 客户签约整体延后一季度，因为保荐银行审批比预期更慢
  baseCase: 付费试点按模型节奏签下，且上线仍能兑现 90 天承诺
  upsideCase: 一条伙伴渠道让两个签约各提前一个季度
  y3RevenueImpactK: -504.0
  cashImpactK: -874.0
- variable: 毛利率
  downsideCase: 68%，因为交付仍比产品化更偏定制
  baseCase: 72% 的稳态单位经济，第 2 年接近 BP 里的 70% 目标
  upsideCase: 76%，因为可复用模板降低了每次上线的交付负担
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
- variable: 招聘节奏
  downsideCase: 第 2 年扩张招聘提前一个季度发生，但保荐方覆盖尚未证明
  baseCase: 招聘继续按里程碑闸门推进
  upsideCase: 第 3 年后段招聘等到第二国扩张验证后再启动
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济流转图
  mermaid: "flowchart LR\n  TargetWallets --> PaidPilots\n  PaidPilots --> LivePrograms\n  LivePrograms --> LaunchFees\n  LivePrograms --> CardGMV\n  LivePrograms --> ComplianceSupport\n  CardGMV --> TakeRateRevenue\n  LaunchFees --> Revenue\n  TakeRateRevenue --> Revenue\n  ComplianceSupport --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> EBITDA\n  EBITDA --> Cash\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景的收入引擎，是按错峰节奏拿下 8 家机构，并把每家机构从一次性 $45K 上线费，推进到约 $34K 的月度正式生产收入。
- checkName: 必须成立
  finding: 尼日利亚、肯尼亚和加纳的保荐银行与卡组织覆盖必须持续可用，这样 90 天上线承诺才足够可信，试点也才能按节奏签下。
- checkName: 模型失效条件
  finding: 如果销售周期整体延后一季度，且卡片 GMV 变现停滞，悲观情景会在第 3 年结束前把现金低点压到零以下。
- checkName: 下一轮证明点
  finding: 最清晰的 A 轮证明点，是做到 6 家正式生产运营方、跑通 1 条伙伴带单渠道，并量化验证第二国上线时间缩短 30%。
sanityChecks:
  ruleOf40: 第 3 年增长 66.4% + EBITDA 利润率 -10.7% = 55.7%
  burnMultiple: 第 2 年烧钱倍数约 0.5x（$644K EBITDA 亏损，对应 $1.320M 净新增收入）；到第 3 年改善至约 0.3x。
  revenuePerFte: 第 3 年每名 FTE 收入约 $201K，按期末 14 名 FTE 计算（成熟中的 B2B 基础设施常见区间约 $200–400K）。
  flags:
  - 第 1 年毛利率只有 43.9%，因为前三个上线项目仍高度依赖实施，软件层也还没有真正做到可复用。
  - 模型默认保荐银行和卡组织接入持续可得，且没有排他限制；如果伙伴覆盖晚一季度到位，悲观情景就会出现现金缺口。
  - 直到第 2 年，收入里仍有相当部分来自一次性上线费；只有已上线 GMV 证明经常性抽成命题成立，这门生意才算真正去风险。
