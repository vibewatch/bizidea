slug: stablecoin-card-stack-em
date: '2026-06-25'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: 月
  source: '[Stage run date 2026-06-25；模型从次月启动。]'
- id: A2
  name: 种子轮到账初始现金
  value: '2500000'
  unit: USD
  source: '[BP fundingAsk] 目标区间为 $2–4M 的种子轮；模型取 $2.5M，作为到下一轮融资证明点所需资金，并预留 6 个月缓冲。]'
- id: A3
  name: 付费机构爬坡
  value: Q4Y1 达 3 家、Q4Y2 达 6 家、Q4Y3 达 8 家
  unit: 家机构
  source: '[BP milestones] 0–12 个月签下 3 家付费共创客户，12–24 个月做到 4–6 个正式生产项目，24–36 个月做到 8 家正式生产运营方。]'
- id: A4
  name: 签约节奏
  value: M5、M9、M12、M15、M18、M21、M27、M33
  unit: 月份
  source: '[BP experimentRoadmap + milestones + gtm.funnelTargets] 第一个试点在第 5 个月签下，第二个在第 9 个月，第三个在第 12 个月；之后到第 3 年，大致每季度新增一个客户。]'
- id: A5
  name: 每家新机构的单国上线费
  value: '45000'
  unit: USD
  source: '[BP gtm.pricing] 上线费区间是 $30k-$75k；模型取中位数 $45k / 国家。]'
- id: A6
  name: 上线后第 1–3 个月的单机构月收入
  value: '10000'
  unit: USD / 月
  source: '[BP gtm.pricing + BP product.mvp] 早期付费试点收入按范围较窄的托管式上线支持合同建模，此时卡片 GMV 尚未完全跑起来。]'
- id: A7
  name: 上线后第 4–6 个月的单机构月收入
  value: '24000'
  unit: USD / 月
  source: '[BP product.twelveMonth + BP businessModel.revenueStreams] 第一批获批交易出现后，随着上线支持、合规和资金运营转成经常性收入，单机构收入抬升。]'
- id: A8
  name: 正式生产阶段的单机构成熟月收入
  value: '34000'
  unit: USD / 月
  source: '[BP gtm.pricing + Research market.som] 在项目正式上线后，收入由可选合规订阅和 20-50 bps 抽成构成；方向上与研究里每家机构年收入约 $350k 的 SOM 假设一致。]'
- id: A9
  name: 规模化目标毛利率
  value: '70'
  unit: '%'
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A10
  name: 基础合规与伙伴 COGS
  value: '8000'
  unit: USD / 月
  source: '[Heuristic: startup-finance] 在规模放大前，这类受监管金融科技上线层每月最低要承担云、监控、法律顾问和伙伴项目成本。]'
- id: A11
  name: 每家已上线机构的交付与支持 COGS
  value: '5000'
  unit: USD / 月 / 家机构
  source: '[Heuristic: startup-finance] 在打法真正可复用前，对账、伙伴支持和合规服务仍需人工辅助。]'
- id: A12
  name: 可变伙伴与 FX 成本率
  value: '6'
  unit: 占收入比例 %
  source: '[Heuristic: startup-finance] 早期稳定币卡项目里，卡组织、处理器、资金和 FX 分成会吃掉收入中的中个位数比例。]'
- id: A13
  name: 每个新客户的增量上线交付成本
  value: '8000'
  unit: USD / 每家新机构
  source: '[Heuristic: startup-finance] 除经常性支持外，每次新国家上线还会额外带来承包、差旅和审批工作成本。]'
- id: A14
  name: 工资税费与福利附加
  value: '18'
  unit: '%'
  source: '[Heuristic: startup-finance] 分布式创业团队常见的税费、福利和外包附加比例。]'
- id: A15
  name: CEO / 创始人销售现金年薪
  value: '120000'
  unit: USD / 年
  source: '[BP team] 创始人主导销售角色；按种子轮阶段精简创始人现金薪酬估算。]'
- id: A16
  name: 创始工程师现金年薪
  value: '150000'
  unit: USD / 年
  source: '[BP team] 面向金融科技基础设施的资深创始工程师薪酬估算。]'
- id: A17
  name: 产品与合规负责人现金年薪
  value: '130000'
  unit: USD / 年
  source: '[BP team] 偏合规的产品运营负责人薪酬估算。]'
- id: A18
  name: 合作与 GTM 负责人现金年薪
  value: '110000'
  unit: USD / 年
  source: '[BP team + BP gtm] 种子轮阶段企业金融科技合作负责人或首位销售的薪酬估算。]'
- id: A19
  name: 资金与运营负责人现金年薪
  value: '120000'
  unit: USD / 年
  source: '[BP team] 资金与清算运营负责人的薪酬估算。]'
- id: A20
  name: 平台工程师现金年薪
  value: '140000'
  unit: USD / 年
  source: '[Heuristic: 创业公司-finance] 受监管支付技术栈的新增资深工程师薪酬估算。]'
- id: A21
  name: 实施经理现金年薪
  value: '90000'
  unit: USD / 年
  source: '[BP team] 首个试点后才加入的实施角色薪酬估算。]'
- id: A22
  name: 客户成功 / 项目运营现金年薪
  value: '85000'
  unit: USD / 年
  source: '[Heuristic: startup-finance] 企业金融科技的首位项目运营或客户成功岗位薪酬估算。]'
- id: A23
  name: 合规分析师现金年薪
  value: '100000'
  unit: USD / 年
  source: '[Heuristic: startup-finance] 在产品市场验证后加入，用于标准化证据包的内部分析师薪酬估算。]'
- id: A24
  name: 财务 / 法务运营现金年薪
  value: '95000'
  unit: USD / 年
  source: '[Heuristic: startup-finance] 到第 3 年规模时才补上的精简财务与法务运营岗位薪酬估算。]'
- id: A25
  name: 招聘时间表
  value: M1：创始人销售 + 创始工程师 + 产品/合规；M2：合作；M4：资金/运营；M7：平台工程师；M9：实施；M10：GTM；M16：客户成功；M20：合规分析师；M22：第二名平台工程师；M29：第二名实施经理；M31：第二名 GTM；M34：财务/法务运营
  unit: 时间线
  source: '[BP team + BP strategicChoices.sequencingRationale] 第 1 年团队直接按计划推进；后续招聘则是平滑外推，用来支撑先到 6 家、再到 8 家运营方。]'
- id: A26
  name: 非人力费用爬坡
  value: 销售与市场从 $5k/月起，每季度增加 $2k；研发工具/合规从 $9k/月起，每季度增加 $1k；综合管理从 $7k/月起，每季度增加 $1k
  unit: USD / 月
  source: '[Heuristic: startup-finance] 差旅、软件、法务、保险和伙伴管理支出会逐步抬升，而不是一次性跃升。]'
- id: A27
  name: 每签下 1 家机构的综合 CAC
  value: '90000'
  unit: USD
  source: '[BP gtm.channels + BP gtm.funnelTargets] 创始人主导的企业销售加伙伴带单，意味着获客高触达但相对集中；模型里的 CAC 约等于稳态经常性 ARPU 的 0.3 倍。]'
- id: A28
  name: 月度客户流失率
  value: '1.2'
  unit: '%'
  source: '[Heuristic: startup-finance] B2B 金融科技基础设施一旦正式上线，粘性通常较强；但考虑早期客户集中风险，仍按低个位数月流失建模。]'
- id: A29
  name: 单位经济测算使用的稳态经常性 ARPU
  value: '300000'
  unit: USD / 年
  source: '[Research market.som + BP businessModel.revenueStreams] 研究显示每家机构年收入约 $350k，包含上线费与抽成；模型把不含一次性上线费的经常性 ARPU 取为 $300k。]'
