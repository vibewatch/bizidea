date: '2026-06-25'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: Model start month
    value: '2026-07'
    unit: month
    source: '[Stage run date 2026-06-25; model starts the next month.]'
  - id: A2
    name: Opening cash from seed round
    value: '2500000'
    unit: USD
    source: '[BP fundingAsk] Target range is $2–4M seed; model uses $2.5M as the amount needed to reach the next financing proof point with a 6-month buffer.'
  - id: A3
    name: Paying operator ramp
    value: '3 by Q4Y1, 6 by Q4Y2, 8 by Q4Y3'
    unit: operators
    source: '[BP milestones] 3 paid design partners in 0–12 months, 4–6 production programs in 12–24 months, and 8 production operators by 24–36 months.'
  - id: A4
    name: Logo close timing
    value: 'M5, M9, M12, M15, M18, M21, M27, M33'
    unit: month
    source: '[BP experimentRoadmap + milestones + gtm.funnelTargets] First pilot signs in month 5, second in month 9, third in month 12, then expansion logos arrive roughly once per quarter until Year 3.'
  - id: A5
    name: One-country launch fee per new operator
    value: '45000'
    unit: USD
    source: '[BP gtm.pricing] Launch fee range is $30k-$75k; model uses a mid-range $45k per country.'
  - id: A6
    name: Monthly revenue per operator in launch months 1-3
    value: '10000'
    unit: USD per month
    source: '[BP gtm.pricing + BP product.mvp] Early paid pilot revenue is modeled as a narrow managed-launch support contract before card GMV is fully live.'
  - id: A7
    name: Monthly revenue per operator in months 4-6
    value: '24000'
    unit: USD per month
    source: '[BP product.twelveMonth + BP businessModel.revenueStreams] Revenue steps up after first approved transactions as launch support plus compliance and treasury operations become recurring.'
  - id: A8
    name: Mature monthly revenue per production operator
    value: '34000'
    unit: USD per month
    source: '[BP gtm.pricing + Research market.som] Blends optional compliance subscription with 20-50 bps take-rate economics once a program is live; directionally consistent with the research SOM of about $350k annual revenue per operator.'
  - id: A9
    name: Target gross margin at scale
    value: '70'
    unit: pct
    source: '[BP businessModel.targetGrossMarginPct]'
  - id: A10
    name: Base compliance and partner COGS
    value: '8000'
    unit: USD per month
    source: '[Heuristic: startup-finance] Minimum monthly cloud, monitoring, counsel, and partner-program costs for a regulated fintech launch layer before volume scales.'
  - id: A11
    name: Per-live-operator delivery and support COGS
    value: '5000'
    unit: USD per month per operator
    source: '[Heuristic: startup-finance] Ongoing reconciliation, partner support, and compliance servicing remain human-assisted until playbooks are repeatable.'
  - id: A12
    name: Variable partner and FX cost rate
    value: '6'
    unit: pct of revenue
    source: '[Heuristic: startup-finance] Scheme, processor, treasury, and FX-sharing costs consume a mid-single-digit share of revenue in early stablecoin card programs.'
  - id: A13
    name: Incremental launch-delivery cost per new logo
    value: '8000'
    unit: USD per new operator
    source: '[Heuristic: startup-finance] Contractor, travel, and approval-work costs attach to each new country launch on top of recurring support costs.'
  - id: A14
    name: Payroll tax and benefits load
    value: '18'
    unit: pct of cash salary
    source: '[Heuristic: startup-finance] Distributed startup payroll load for taxes, benefits, and contractor overhead.'
  - id: A15
    name: CEO / founder-sales cash salary
    value: '120000'
    unit: USD per year
    source: '[BP team] Founder-led selling role; lean seed-stage founder cash compensation heuristic.'
  - id: A16
    name: Founding engineer cash salary
    value: '150000'
    unit: USD per year
    source: '[BP team] Senior founding engineer compensation heuristic for fintech infrastructure.'
  - id: A17
    name: Product and compliance lead cash salary
    value: '130000'
    unit: USD per year
    source: '[BP team] Compliance-heavy product operator salary heuristic.'
  - id: A18
    name: Partnerships and GTM lead cash salary
    value: '110000'
    unit: USD per year
    source: '[BP team + BP gtm] Seed-stage enterprise fintech partnerships or first seller compensation heuristic.'
  - id: A19
    name: Treasury and ops lead cash salary
    value: '120000'
    unit: USD per year
    source: '[BP team] Treasury and settlement operator compensation heuristic.'
  - id: A20
    name: Platform engineer cash salary
    value: '140000'
    unit: USD per year
    source: '[Heuristic: startup-finance] Additional senior engineer compensation for a regulated payments stack.'
  - id: A21
    name: Implementation manager cash salary
    value: '90000'
    unit: USD per year
    source: '[BP team] Implementation role added only after first pilot; delivery-ops compensation heuristic.'
  - id: A22
    name: Customer success / program ops cash salary
    value: '85000'
    unit: USD per year
    source: '[Heuristic: startup-finance] First program-ops or customer-success hire for enterprise fintech.'
  - id: A23
    name: Compliance analyst cash salary
    value: '100000'
    unit: USD per year
    source: '[Heuristic: startup-finance] In-house analyst added after product-market proof to standardize evidence packs.'
  - id: A24
    name: Finance / legal ops cash salary
    value: '95000'
    unit: USD per year
    source: '[Heuristic: startup-finance] Lean finance and legal operations hire added only at Year 3 scale.'
  - id: A25
    name: Hiring schedule
    value: 'M1 founder-sales + founding eng + product/compliance; M2 partnerships; M4 treasury/ops; M7 platform eng; M9 implementation; M10 GTM; M16 customer success; M20 compliance analyst; M22 second platform eng; M29 second implementation; M31 second GTM; M34 finance/legal ops'
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale] The Year 1 team follows the plan directly; later hires are a smooth extension to support 6 then 8 operators.'
  - id: A26
    name: Non-payroll opex ramp
    value: 'Sales & marketing starts at $5k/mo and steps up by $2k per quarter; R&D tools/compliance starts at $9k/mo and steps up by $1k per quarter; G&A starts at $7k/mo and steps up by $1k per quarter'
    unit: USD per month
    source: '[Heuristic: startup-finance] Travel, software, legal, insurance, and partner-management spend scales gradually rather than in one large step.'
  - id: A27
    name: Blended CAC per signed operator
    value: '90000'
    unit: USD
    source: '[BP gtm.channels + BP gtm.funnelTargets] Founder-led enterprise sales with partner sourcing implies high-touch but concentrated acquisition economics; modeled CAC is roughly 0.3x steady-state recurring ARPU.'
  - id: A28
    name: Monthly customer churn
    value: '1.2'
    unit: pct
    source: '[Heuristic: startup-finance] Integrated B2B fintech infrastructure is sticky once live, but early-stage concentration risk still warrants low-single-digit monthly churn.'
  - id: A29
    name: Steady-state recurring ARPU used for unit economics
    value: '300000'
    unit: USD per year
    source: '[Research market.som + BP businessModel.revenueStreams] Research suggests about $350k annual revenue per operator including setup and take-rate economics; model uses $300k as recurring ARPU excluding one-time launch fees.'
