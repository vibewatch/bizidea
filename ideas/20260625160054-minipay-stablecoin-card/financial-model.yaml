scenarios:
  downside:
    description: Sponsor-bank approvals slip one quarter and live GMV ramps slower, so Year 3 ends with only 7 fully productive operators and weaker take-rate monetization.
    y3RevenueK: 2306.0
    y3EbitdaK: -744.2
    cashLowPointK: -327.7
    keyAssumptionChanges:
      - Two planned logo closes slip by roughly one quarter because underwriting and scheme approvals take longer than planned.
      - Mature monthly revenue per live operator falls to about $30K instead of $34K because card GMV remains more savings-like than spend-like.
      - Gross margin stays below target because launch work remains more bespoke and partner costs stay elevated.
  base:
    description: The company lands 3 paid partners in Year 1, 6 production operators by the end of Year 2, and 8 by the end of Year 3 while standardizing launch playbooks.
    y3RevenueK: 2810.0
    y3EbitdaK: -300.5
    cashLowPointK: 546.2
    keyAssumptionChanges:
      - Paid pilot closes follow the M5, M9, M12, M15, M18, M21, M27, and M33 cadence.
      - Mature recurring revenue reaches about $34K per month per live operator, with one-country launch fees staying at $45K.
      - Hiring stays staged until production-program proof exists, keeping ending Year 3 cash above a six-month operating buffer.
  upside:
    description: One strong infrastructure partner channel pulls logos forward and the best customers add second-country support earlier, creating near-breakeven Year 3 economics.
    y3RevenueK: 3282.0
    y3EbitdaK: 192.7
    cashLowPointK: 1226.9
    keyAssumptionChanges:
      - Two Year 3 logos close earlier through partner-sourced demand rather than pure founder-led outbound.
      - Mature recurring revenue rises to roughly $38K per month for the strongest programs as second-country and support modules attach faster.
      - The back-half hiring ramp is delayed until earlier revenue proof, letting margin gains flow through to cash.
