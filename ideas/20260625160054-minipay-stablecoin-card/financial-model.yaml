modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetWallets --> PaidPilots
      PaidPilots --> LivePrograms
      LivePrograms --> LaunchFees
      LivePrograms --> CardGMV
      LivePrograms --> ComplianceSupport
      CardGMV --> TakeRateRevenue
      LaunchFees --> Revenue
      TakeRateRevenue --> Revenue
      ComplianceSupport --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> EBITDA
      EBITDA --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by landing 8 operators on a staggered cadence and moving each from a $45K launch fee into roughly $34K monthly production revenue.
  - checkName: Must go right
    finding: Sponsor-bank and scheme coverage for Nigeria, Kenya, and Ghana must stay available so the 90-day launch promise remains credible enough to close pilots on schedule.
  - checkName: Model breaks if
    finding: If sales cycles slip by a quarter and card GMV monetization stalls, the downside case drives the cash low point below zero before Year 3 ends.
  - checkName: Next-round proof
    finding: The clearest Series A milestone is reaching 6 production operators with one partner-led channel and a measured 30% reduction in second-country launch time.
sanityChecks:
  ruleOf40: 'Y3 growth 66.4% + EBITDA margin -10.7% = 55.7%'
  burnMultiple: 'Y2 burn multiple ~0.5x ($644K EBITDA burn on $1.320M net new revenue), improving to ~0.3x in Y3.'
  revenuePerFte: '$201K Y3 on 14 ending FTE (benchmark roughly $200–400K for maturing B2B infrastructure).'
  flags:
    - Y1 gross margin is only 43.9% because the first three launches are still implementation-heavy and the software layer is not yet fully repeatable.
    - The model assumes sponsor-bank and scheme access remains available without exclusivity; a one-quarter delay in partner coverage creates a cash shortfall in the downside case.
    - Revenue is still partly setup-fee driven through Y2, so the business is not fully de-risked until live GMV proves the recurring take-rate thesis.
