competitors:
- name: Gnosis Pay
  stage: scale-up
  wedge: 面向金融科技公司、数字银行和交易所的自托管白标 Visa 卡基础设施。
  pricing: 提供免费 / 自助层，并有定制合作方案。
  strength: 用真实案例证明钱包可在不成为银行或发卡方的前提下，将稳定币余额接入 Visa 商户受理网络。
  weaknessVsUs: 为加密原生自托管和平台灵活性而优化，并非为承接本地合规和担保方执行工作的新兴市场托管式上线服务而设计。
  sourceRefs:
  - 2
  - 3
  - 4
  - 5
- name: Stripe / Bridge
  stage: incumbent
  wedge: 通过 Stripe 和 Bridge API 提供的全球稳定币资金管理、编排和发卡基础设施。
  pricing: 企业合同制；稳定币卡功能仍处于非公开预览阶段。
  strength: 整合了稳定币资金管理、发卡专长、反欺诈工具及全球银行/卡组织关系。
  weaknessVsUs: 作为全球通用平台，目前缺乏针对非洲或加纳/尼日利亚/肯尼亚的打包式上线操作手册的有效证明。
  sourceRefs:
  - 10
  - 11
  - 12
  - 39
- name: Marqeta
  stage: incumbent
  wedge: 面向数字钱包和金融科技公司的 API 优先发卡与加密卡赋能平台。
  pricing: 销售驱动的企业定价；官方页面无公开价格表。
  strength: 发卡处理管控扎实，虚拟 / 实体卡工具齐备，加密卡定位服务大型平台。
  weaknessVsUs: 仍将稳定币资金管理、本地伙伴遴选和新兴市场合规统筹留给买家自行解决。
  sourceRefs:
  - 33
  - 34
- name: Immersve
  stage: scale-up
  wedge: 原生 Mastercard 加密发卡平台，提供 BIN 担保、托管与非托管选项，以及按笔计费模式。
  pricing: 全包式按笔计费，涵盖 BIN 担保、卡组织、钱包及处理成本。
  strength: 卡项目担保方案清晰，定价模型透明，同时支持托管和非托管两种配置。
  weaknessVsUs: 缺乏逐国新兴市场上线支持的有力证据，更侧重通用 Mastercard 接入。
  sourceRefs:
  - 35
  - 36
- name: Rain
  stage: scale-up
  wedge: 与持牌机构合作的全栈企业级稳定币支付和发卡基础设施。
  pricing: 企业定制定价；未公开价格。
  strength: 主打全栈企业叙事，外部报道印证其强劲增长、融资实力，以及在加密卡支付竞赛中的直接角色。
  weaknessVsUs: 定位偏向广义企业支付，而非专门服务于正在摸索本地轨道和合规路径的非洲与拉美钱包运营商的托管式上线服务。
  sourceRefs:
  - 37
  - 38
regulatoryTechnicalConstraints:
- point: 稳定币卡项目在普通发卡义务之外，还承接了 AML/CFT、货币主权、消费者保护和法律确定性方面的合规要求。
  sourceRefs:
  - 24
  - 25
  - 40
- point: 各国规则越来越多地依赖 VASP 式注册和监管，扩张不能按一套全球通用卡产品处理。
  sourceRefs:
  - 27
  - 28
- point: 系统依赖持牌机构和卡组织关系；智能合约轨道并不能免除卡组织和担保方的审批要求。
  sourceRefs:
  - 12
