  adoptionFrictionMatrix:
  - friction: 为每个目标市场锁定担保银行、卡组织和 BIN 合作关系
    severity: high
    affectedBuyer: CTO / 支付负责人
    mitigation: 提前谈妥担保方和卡组织接入资源，作为上线套餐一并出售，而非让每家钱包自行搞定。
