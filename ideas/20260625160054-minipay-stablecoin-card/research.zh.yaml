      score: 4
      rationale: 钱包可以用自研、通用发卡处理商，或非卡类稳定币收款渠道（本地支付轨道和 POS 集成）来替代。
      sourceRefs:
      - 31
      - 32
      - 34
    competitiveRivalry:
      score: 4
      rationale: 赛道内已有 Gnosis Pay、Stripe/Bridge、Marqeta、Immersve 和 Rain，外部评论将这一品类定性为激烈的基础设施争夺战，而非未开垦的蓝海。
      sourceRefs:
      - 3
      - 12
      - 33
      - 35
      - 37
      - 38
