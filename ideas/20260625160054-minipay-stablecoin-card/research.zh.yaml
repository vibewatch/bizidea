    - 12
    - 35
    - 37
  - friction: 本地 AML/KYC、报告和许可证本地化
    severity: high
    affectedBuyer: 合规负责人
    mitigation: 将可复用的国别操作手册、监管报备文件和已获批的 KYC/AML 工作流打包进实施方案。
    sourceRefs:
    - 4
    - 5
    - 27
    - 28
  - friction: 横跨稳定币与本币轨道的资金管理、外汇和结算设计
    severity: high
