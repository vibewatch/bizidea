  fiveForces:
    supplierPower:
      score: 4
      rationale: 卡片项目仍依赖高度集中的上游供应商——卡组织、担保银行、合规伙伴和资金基础设施提供商——这让上游交易对手在上线范围和时间安排上握有实质性筹码。
