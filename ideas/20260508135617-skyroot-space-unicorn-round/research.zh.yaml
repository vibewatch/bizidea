reportMemo:
  executiveTakeaways:
  - 印度私营航天这条线已经成形，而且还在往上走；但眼下能打进去的发射放行软件滩头市场仍然很窄。KPMG 估算行业当前规模约为 $8.4B，到 2033 年可到 $44B；Skyroot 和 Agnikul 则说明赛道正在从资格验证项目切到商业化发射运营 [3][1][14]。
  - 真正扎手的痛点不是火箭 CAD，而是放行纪律怎么落地。Skyroot 正把新资金砸向 Vikram-1 节奏和制造扩张，还要冲 72 小时装配到发射，这会把分散的测试、供应商和偏差记录放大成更贵的问题 [2]。
  - 现有厂商已经把底层工作流需求坐实了——质量、变更、追溯和数字线程控制都有人卖——但 Siemens、PTC、Dassault 和 Tulip 卖的是宽平台，不是首批商业发射最缺的那座任务保障控制塔 [60][62][69][76]。
  - 自下而上的测算说明，印度优先的发射与航天硬件切口，本质上只是一个低个位数百万美元的软件市场。要把它讲成风投故事，必须从发射放行往卫星、国防和航空航天硬件项目扩 [3][8][9]。
  - 最靠谱的 GTM 不是做“大拆大建”的 MES，而是贴着现有 PLM/QMS/文档栈，由创始人高触达推进；因为无论标准机构还是现有厂商，都在强调正式基线、变更控制和可追溯性 [64][60][81][87]。
  marketDefinition: 这是一个面向私营发射与航天硬件运营商、以印度优先的任务放行与偏差控制软件市场。核心工作，是把资格证据、供应商历史、不合格项和最终飞行器构型拧成一份针对具体任务的可审计放行/否决包。纳入的相邻场景包括发射准备、变更控制、质量/合规、谱系追踪和跨系统证据汇总；排除项则包括发射当天的靶场软件、单独的通用 PLM，以及完整替换 MES 的项目 [2][8][60][64][77][81]。
  customerAndBuyer: ICP 是那些正从资格验证走向可重复商业运营的印度私营发射、推进、卫星或任务服务公司。日常使用者会是任务保障、制造、质量和发射运营负责人；预算通常握在 COO、制造副总裁或任务保障负责人手里，因为这套产品直接碰发射节奏、供应商风险和放行责任 [1][2][8][14][43][45]。
  buyingTriggers:
  - point: 首次商业发射任务，或试飞后的节奏爬坡，让人工准备评审变得过慢。
    sourceRefs:
    - 1
    - 2
    - 14
  - point: 新的制造设施、产线或拿到资金后的扩张，会同时放大供应商数量和偏差量。
    sourceRefs:
    - 2
    - 15
    - 16
    - 43
    - 17
  - point: 授权获批、服务上线或出口推进，会抬高对更干净审计链路和正式放行记录的需求。
    sourceRefs:
    - 5
    - 45
    - 85
    - 86
  willingnessToPay:
    summary: 抓到的现有厂商页面几乎清一色是演示驱动、面向企业：Siemens、PTC、Dassault 和 Tulip 都在讲能力，但没人挂公开自助价。这说明早期合同更适合按 ROI 来卖——每个活跃项目的年合同额大致落在高五位数到低六位数之间；不过在买方访谈真正确认预算权之前，准确 ACV 仍然只能算估值区间 [60][63][69][72]。
    sourceRefs:
    - 60
    - 63
    - 69
    - 72
  competitiveLandscape: 竞争基本分成四路。Siemens 和 Dassault 卖的是最重型的航空航天数字线程与质量套件 [60][61][68][70]。如果客户要把需求、变更和航天系统工程从设计一路串到制造，PTC 最强 [62][63][64]。Tulip 则是最近的现代运营层替代品，能覆盖不合格项、谱系追踪和一线工作流采集，但它的重心仍在工厂现场，不在任务放行 [72][76][77]。而真正的默认替代方案，依旧是内部表格、汇报材料，以及东拼西凑的 PLM/QMS/文档导出文件——因为早期买方群体既小又专业 [2][83][64]。
  incumbentThesis:
  - incumbentClass: PLM 与数字线程套件
    point: Siemens、PTC 和 Dassault 已经证明追溯、质量和工程变更控制确实有需求，但它们通常是以宽泛的转型平台形态落地，而不是一个能迅速切进去的发射放行切口。
    sourceRefs:
    - 60
    - 62
    - 64
    - 69
    - 70
  - incumbentClass: 车间层 QMS 与 MES 平台
    point: Tulip 能采集不合格项、谱系和作业指导数据，但这些能力不会自动长成一份跨测试、供应商和飞行器构型的任务专属准备包。
    sourceRefs:
    - 72
    - 76
    - 77
  - incumbentClass: ALM 与需求管理工具
    point: Windchill 和 Codebeamer 这类工具适合管需求和正式变更，但买方在临近发射时，仍然需要一座更窄的控制塔来接住偏差和放行决策。
    sourceRefs:
    - 63
    - 64
  - incumbentClass: 内部工作流栈
    point: 内部自建看上去可能更便宜，但节奏一旦拉高、授权要求一旦变严，临时拼证据这套做法会越来越扛不住。
    sourceRefs:
    - 2
    - 5
    - 81
  regulatoryLandscape: 印度向民营开放航天之后，买方不再只是供应链里的配角，而是开始出现真正的商业软件客户。Indian Space Policy 2023 正式把授权职责交给 IN-SPACe，2024 年的 NGP 又把相关航天活动的授权标准和条件写得更细 [4][5]。这意味着，本地市场哪怕还没走到出口扩张阶段，也已经会在意可审计性和受控证据；而如果未来扩到盟友市场，发射运营商还得扛起类似 FAA 的许可框架和同等级别的文档负担 [85][86]。
  technologyLandscape: 技术底座其实已经摆在那儿：现有厂商在卖数字线程、工程变更、质量、谱系追踪和不合格项工作流，NASA 与 ECSS 标准则把构型管理纪律正式化了 [60][62][64][69][77][81][83][87]。这家创业公司的机会不在于从零发明追溯，而在于把这些纪律收成一层轻量的任务放行层，让客户先从文档和导出文件跑起来，而不是马上做全栈改造。
  distributionChannels:
  - point: 由创始人主导，面向印度高度集中的私营航天生态开展外拓，覆盖发射、航天器、推进和地面基础设施。
    sourceRefs:
    - 8
    - 9
    - 7
  - point: 与已经在航空航天和国防工作流里销售的 PLM、QMS 及系统集成伙伴建立转介绍合作。
    sourceRefs:
    - 60
    - 63
    - 69
    - 72
  - point: 围绕融资轮次、产能扩张或首飞里程碑开展“事件触发式”销售。
    sourceRefs:
    - 2
    - 15
    - 17
    - 43
  partnershipEcosystem:
  - point: PLM/QMS/MES 集成伙伴之所以重要，是因为这个切口贴在现有企业系统旁边，而不是直接替代它们。
    sourceRefs:
    - 60
    - 63
    - 69
    - 76
  - point: 地面站、卫星平台和发射服务伙伴，会在相邻工作流里自然带来数据接入和渠道机会。
    sourceRefs:
    - 39
    - 41
    - 45
    - 8
  - point: 若未来扩展到受 FAA 监管的发射环境，监管与发射顾问伙伴就会变得重要。
    sourceRefs:
    - 5
    - 85
    - 86
  dataMoats:
  - point: 偏差、供应商批次、资质证据与实际放行结果之间的任务级关联，会逐步沉淀成专有的放行操作手册。
    sourceRefs:
    - 2
    - 76
    - 77
    - 83
  - point: 早期印度客户数据能够编码本地供应商、授权和评审模式，而这些在通用航空航天套件里往往只是边缘情形。
    sourceRefs:
    - 5
    - 8
    - 45
  - point: 一套跨项目的语料库，记录哪些因素拖慢、哪些因素加速任务放行，未来就能支撑风险评分和自动化。
    sourceRefs:
    - 64
    - 60
    - 81
  geographicConsiderations:
  - point: 印度之所以有吸引力，是因为政策支持明确、私营航天集群又异常集中，因此更容易触达设计伙伴。
    sourceRefs:
    - 4
    - 5
    - 8
  - point: 代价是集中度风险：印度优先的发射客户基数很小，因此地域和垂直扩张都得尽早开动。
    sourceRefs:
    - 3
    - 8
    - 9
  - point: 向盟友发射市场扩张，需要重新映射当地的许可和文档制度，而不是简单复用印度工作流。
    sourceRefs:
    - 85
    - 86
    - 87
  sensitivityCases:
  - case: 未来三年里，真正准备好采购软件的印度发射与航天硬件公司只有 10 家
    impact: 在估算 ACV 同为 $100k 的情况下，模型里的 SAM 会从约 $1.5M 降到约 $1.0M，这会迫使公司更早向相邻的航空航天与国防场景扩张。
    sourceRefs:
    - 3
    - 8
    - 9
  - case: 平均合同额更接近 $60k，而不是 $100k
    impact: 模型中的 TAM 会从约 $7.2M 降到约 $3.6M，第 3 年 SOM 也会从约 $0.4M 降到约 $0.24M。
    sourceRefs:
    - 60
    - 63
    - 69
    - 72
  - case: 现有厂商把既有数字线程套件进一步伸进放行工作流
    impact: 那样一来，独立创业公司会面对更长的销售周期，并且必须在部署速度和发射专属数据模型上做出更尖锐的差异化。
    sourceRefs:
    - 60
    - 62
    - 70
    - 76
  validationPlan:
  - priority: 高
    question: 当前一套发射准备包，会占用质量、制造和任务保障团队多少小时？
    evidenceToGather: 跟跑一整轮准备周期，并为每个证据收集、签核和偏差分流步骤计时。
  - priority: 高
    question: 关键证据现在到底存在哪些系统里：PLM、ERP、测试系统、文档库，还是电子表格？
    evidenceToGather: 收集 3–5 个设计伙伴的系统清单、评审材料样本和导出文件。
  - priority: 中
    question: 在更大规模的 PLM 或 MES 上线之前，买方会先为一层放行控制层买单吗？
    evidenceToGather: 预算负责人访谈、现有厂商合同分布图，以及对试点定价的反馈。
  - priority: 中
    question: 同一套工作流在发射之外，能卖到卫星和国防硬件项目里吗？
    evidenceToGather: 与发射之外的航天器、推进和关键硬件团队开展试点界定会议。
