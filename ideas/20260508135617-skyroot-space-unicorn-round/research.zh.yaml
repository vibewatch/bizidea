  - point: 近期融资明确绑定在发射节奏、制造产能、推进生产和星座部署上。
    sourceRefs:
    - 2
    - 15
    - 17
    - 43
  - point: 整个生态正在从“形成中”走向“商业化中”，覆盖发射、卫星、子系统和地面基础设施。
    sourceRefs:
    - 8
    - 9
  headwinds:
  - point: 印度优先的发射客户基数仍然偏小，因此仅靠滩头市场收入，很难支撑风险投资级别的结果。
    sourceRefs:
    - 3
    - 8
  - point: 在放行痛点真正变急之前，现有数字线程套件和内部工作流都算得上“够用”的替代方案。
    sourceRefs:
    - 60
    - 64
    - 70
    - 76
  - point: 发射与授权的证据要求，会提高买方谨慎程度，也会增加实施负担。
    sourceRefs:
    - 5
    - 85
    - 86
    - 87
competitors:
- name: Siemens Teamcenter / Opcenter
  stage: 现有厂商
  wedge: 覆盖项目管理、质量/合规和制造的宽泛航空航天数字线程。
  pricing: 无公开标价；以企业销售/演示驱动为主。
  strength: 在航空航天领域有很强的可信度，并覆盖从设计到制造的闭环质量范围。
  weaknessVsUs: 销售的是重型套件，转型范围很宽，也没有发射专属的放行控制切口。
  sourceRefs:
  - 57
  - 60
  - 61
- name: PTC Windchill / Codebeamer
  stage: 现有厂商
  wedge: 贯通需求、设计、仿真和制造的航天系统数字线程。
  pricing: 无公开标价；以企业销售/演示驱动为主。
  strength: 在正式工程变更和端到端航天系统追溯上很强。
  weaknessVsUs: 以工程为中心的平台打法，比轻量的发射放行控制塔更宽也更慢。
  sourceRefs:
  - 62
  - 63
  - 64
- name: Dassault Systèmes 3DEXPERIENCE / ENOVIA
  stage: 现有厂商
  wedge: 以 PLM 为中心，服务复杂项目的变更、质量和航天技术连续性。
  pricing: 无公开标价；以企业销售/演示驱动为主。
  strength: 在航天级项目中，变更和质量/合规能力表达很强。
  weaknessVsUs: 它优化的是宽泛的 PLM 连续性，而不是从凌乱创业公司数据里快速打出任务保障材料。
  sourceRefs:
  - 68
  - 69
  - 70
- name: Tulip
  stage: 成长型公司
  wedge: 用于不合格项、谱系、作业指导和生产跟踪的可组合式航空航天制造应用。
  pricing: 无公开标价；以企业销售/演示驱动为主。
  strength: 灵活的一线工作流和追溯工具，比传统 PLM 更贴近工厂运营。
  weaknessVsUs: 但它的重心仍停留在工厂现场，离任务专属的发射准备和跨职能放行/否决打包还有一步。
  sourceRefs:
  - 72
  - 76
  - 77
regulatoryTechnicalConstraints:
- point: 印度私营航天活动凡是需要授权的，都必须提供结构化证据，并满足 IN-SPACe 条件。
  sourceRefs:
  - 5
  - 4
- point: 正式的构型管理纪律，是航天系统工程和产品保障里的标准做法。
  sourceRefs:
  - 81
  - 83
  - 87
- point: 一旦扩展到盟友发射市场，就会继承类似 FAA 的许可与文档负担。
  sourceRefs:
  - 85
  - 86
- point: 技术上能否成功，取决于先与现有的质量、PLM 和追溯栈集成，而不是立刻替换它们。
  sourceRefs:
  - 60
  - 63
  - 69
  - 77
validationSignals:
- point: Skyroot 已明确把资金投向发射节奏与制造扩张，其中就包括 72 小时装配到发射的目标。
  sourceRefs:
  - 2
- point: Agnikul 已经完成了一次民营自建火箭发射里程碑，证明印度发射创业公司正在进入运营阶段。
  sourceRefs:
  - 14
- point: Bellatrix 在拿下首个印度以外的大型商业客户后融资，以提升推进系统产能。
  sourceRefs:
  - 15
- point: Dhruva 把新增资本绑定在全栈扩张和航天器制造设施建设上。
  sourceRefs:
  - 43
- point: Pixxel 仍在持续融资以部署运营中的星座，这说明相邻的私营航天工作流复杂度在上升，而不是在下降。
  sourceRefs:
  - 17
openQuestions:
- 像 Skyroot/Agnikul 这类公司，目前一份发射放行或任务准备包到底要耗费多少人、多少小时？
- 早期买方会在承诺更大规模的 PLM/MES 改造前，先为一层聚焦的放行控制层付费吗？
- 当前这条工作流到底主要压在哪些源系统上：PLM、ERP、测试台、文档库，还是电子表格？
- 在不大改产品的前提下，这个切口从发射准备迁移到卫星、推进和国防硬件放行工作流的可迁移性到底有多强？
