jobsToBeDone:
- job: 当一枚运载器临近轨道任务时，帮助任务保障负责人证明每个关键零件、测试和偏差都已闭环，好让他们有把握地下达发射放行。
  currentAlternative: 从表格、文档和工程系统拼出来的手工发射准备评审
  successMetric: 把放行包准备时间从数周压缩到数天，且关键签核零遗漏
- job: 当后期供应商批次变更或工程改动冲击某次发射任务时，帮助制造和质量团队看清哪些任务会受影响，从而在集成延误之前重排计划。
  currentAlternative: 临时 Slack 讨论串、电子表格跟踪器，以及工程师逐个核对影响
  successMetric: 评估偏差影响并更新任务计划所需时间
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 来源直接给出了融资、近期发射时间表和明确的制造扩张，这三点叠在一起，让运营瓶颈这件事站得住。
  painIntensity:
    score: 4
    rationale: 对早期发射服务商来说，放行出错就是生死攸关的问题；哪怕文章里的痛点更多是从节奏目标推出来的，而不是来自公开事故，也足够尖锐。
  wedgeClarity:
    score: 5
    rationale: 首批商业发射的任务放行与偏差控制，是一个边界清晰、可验证、买方和触发条件都明确的工作流。
  defensibility:
    score: 4
    rationale: 工作流深度、面向发射的数据模型和持续积累的放行模板，能长出超越通用 PLM 工具的黏性流程控制权。
  ventureScale:
    score: 5
    rationale: 这个滩头市场可以向更广泛的航空航天、国防以及高后果硬件放行与供应商质量软件扩展。
topRisks:
- name: 初始客户基数太小
  description: 印度私营发射服务商数量就那么多，单靠这个滩头市场，未必撑得起一家独立的风投级公司。
  mitigation: 从第一天起就按卫星、国防和航空航天硬件这些相邻场景来设计产品，同时把发射当成最先验证的战场。
- name: 企业集成推进缓慢
  description: 如果上新系统等于要在项目中途拆掉现有 PLM 或 MES，发射团队大概率会本能抗拒。
  mitigation: 先从能吃进现有导出文件和文档的轻量放行包层开始，等真把时间省下来之后，再逐步把集成做深。
- name: 现有厂商或自研替代压力
  description: 客户很可能先试着把现有 PLM 工作流往外撑，或者在内部自己搭一个准备度看板。
  mitigation: 把重点钉在发射专属的偏差逻辑、任务级放行产物和跨职能签核工作流上——这些东西不是通用系统能很快抄出来的。
