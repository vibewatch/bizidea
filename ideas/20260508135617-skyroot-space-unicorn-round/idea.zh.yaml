problem: 私营发射公司往往不是倒在火箭设计上，而是倒在把一次性的资格验证项目变成可重复商业发射的过程中。测试证据、供应商认证、不合格记录和最终飞行器构型通常散落在表格、PLM 导出文件和聊天记录里，因此每次发射放行都变成一次手工对账。随着节奏目标从数月压缩到数天，只要少一个签核或漏掉一个零件偏差，就可能拖延任务并侵蚀客户信任。
targetUser:
  primary: 印度私营发射公司里，正准备首批商业轨道任务的制造副总裁、任务保障负责人或发射运营总监
  secondary: 与其共享新兴供应商体系的卫星平台或推进创业公司中的供应链与质量负责人
  buyer: COO 或制造副总裁
startupThesis:
  nonObviousInsight: 私营发射真正卡住的，已经不只是火箭设计或融资能力，而是那条能把资质工作、供应商变更和装配状态转成高频节奏下可靠放行决策的运营数据线程。
  beachhead: 面向印度私营发射服务商、覆盖其从资格飞行走向首批 3–10 次商业轨道发射的任务放行与偏差控制工作流
  wedge: 一个把资格证据、供应商批次、不合格项和飞行器构型串成单一任务就绪放行/否决包的发射放行控制塔
  whyNowCatalyst: Skyroot 正同时推进制造扩张、瞄准 6 月轨道发射，并追求 72 小时装配到发射能力，这让提升发射可重复性的软硬件工具突然变得紧迫。
  ventureScalePath: 先从印度私营火箭的发射放行切入，再扩展到盟友市场里的卫星、国防及更广泛航空航天硬件项目所需的供应商资质、审计证据与生产控制软件。
solution: 产品位于现有 PLM、ERP、测试系统和基于表格的质量流程之间，为每一枚运载器建立面向具体任务的数字化放行线程。它接入资格测试结果、供应商文件、装配记录和后期工程变更，并映射到受影响的具体级段、发动机、航电批次与任务。团队因此获得自动化偏差影响分析、发射准备检查清单，以及一份可用于内部放行/否决评审和客户准备度更新的统一放行包。最初的切口足够轻，可以从 CSV 和文档库起步，而不是替换整套 MES；但随着时间推移，它会成为发射放行决策的系统记录。
goToMarketSeed:
  firstCustomer: 一家印度发射创业公司里的任务保障负责人：公司已有一型轨道运载器将进入商业服务，同时新制造设施或新产线正在上线
  buyingTrigger: 一次成功的资格飞行、首份已签商业发射合同，或一轮迫使管理层承诺更高发射节奏的产能扩张
  currentAlternative: 电子表格、Jira 或 Confluence、PLM 或 ERP 导出文件，以及手工整理的发射评审材料
  switchingReason: 这个切口能砍掉数周的人工准备度审查，在集成前抓住构型漂移，并让管理层拿到一份可审计的统一放行记录，而不是四处追状态。
  pricingHypothesis: 按每个活跃发射项目收取年度软件费，外加数据模型搭建和供应商追溯模板的导入费用
