problem: 私营发射公司真正容易掉链子的，往往不是火箭设计，而是怎么把一次性的资格验证项目跑成可重复的商业发射。测试证据、供应商认证、不合格记录和最终飞行器构型常常散落在表格、PLM 导出文件和聊天记录里，于是每次发射放行都像在手工对账。等节奏目标从按月算压到按天算，少一个签核、漏掉一个零件偏差，都可能把任务往后拖，也会一点点吃掉客户信任。
targetUser:
  primary: 印度私营发射公司里，正准备首批商业轨道任务的制造副总裁、任务保障负责人或发射运营总监
  secondary: 与其共享新兴供应商体系的卫星平台或推进创业公司中的供应链与质量负责人
  buyer: COO 或制造副总裁
startupThesis:
  nonObviousInsight: 私营发射现在真正卡住的，已经不只是火箭设计或拿钱能力，而是那条运营数据线程：它得把资质工作、供应商变更和装配状态拼成一套在更高节奏下也站得住的放行决策。
  beachhead: 面向印度私营发射服务商、覆盖其从资格飞行走向首批 3–10 次商业轨道发射的任务放行与偏差控制工作流
  wedge: 一座发射放行控制塔，把资质证据、供应商批次、不合格项和飞行器构型收拢成一份任务就绪的放行/否决包
  whyNowCatalyst: Skyroot 一边扩制造、一边冲 6 月轨道发射，还在追 72 小时装配到发射能力，这让提高发射可重复性的运营软件一下子变得很急。
  ventureScalePath: 先从印度私营火箭的发射放行切入，再往盟友市场里的卫星、国防和更广泛航空航天硬件项目扩，覆盖供应商资质、审计证据和生产控制软件。
solution: 产品贴在现有 PLM、ERP、测试系统和基于表格的质量流程旁边，为每一枚运载器拉出一条面向具体任务的数字化放行线程。它把资格测试结果、供应商文件、装配记录和后期工程变更接进来，再映射到受影响的具体级段、发动机、航电批次和任务。团队拿到的是自动化偏差影响分析、发射准备检查清单，以及一份能同时服务内部放行/否决评审和客户准备度更新的统一放行包。最初这套切口很轻，可以先从 CSV 和文档库起步，而不是一上来替掉整套 MES；但时间一长，它会慢慢长成发射放行决策的系统记录。
goToMarketSeed:
  firstCustomer: 一家印度发射创业公司的任务保障负责人：公司已有一型轨道运载器快要进入商业服务，同时新制造设施或新产线正在上线
  buyingTrigger: 一次成功的资格飞行、第一份已签商业发射合同，或一次逼着管理层承诺更高发射节奏的产能扩张
  currentAlternative: 电子表格、Jira 或 Confluence、PLM 或 ERP 导出文件，以及手工整理的发射评审材料
  switchingReason: 这个切口能直接砍掉几周人工准备度审查，在集成前抓住构型漂移，也让管理层拿到一份可审计的统一放行记录，不用再满世界追状态。
  pricingHypothesis: 按每个活跃发射项目收取年度软件费，外加数据模型搭建和供应商追溯模板的导入费用
