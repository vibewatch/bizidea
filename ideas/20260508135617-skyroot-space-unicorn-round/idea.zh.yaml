differentiator: 传统航空航天软件管的是工程记录或工厂执行，靶场软件管的是发射当天本身。这家公司盯住的是中间那层最折磨人的流程：创业型发射团队得先把供应商偏差、测试证据和最终飞行器构型对齐，才敢做放行决策。它若从印度私营航天运营商切入，就能把大型航空航天套件视作边角料的新航天工作流和供应商现实编码进去。
