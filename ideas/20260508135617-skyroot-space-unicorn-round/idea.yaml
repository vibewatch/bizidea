topRisks:
  - name: Small initial customer base
    description: The number of Indian private launch providers is limited, so the beachhead alone may not support a standalone venture outcome.
    mitigation: Design the product for adjacent satellite, defense, and aerospace hardware programs from day one while keeping launch as the initial proving ground.
  - name: Slow enterprise integration
    description: Launch teams may resist another system if adoption requires ripping out PLM or MES tools mid-program.
    mitigation: Start with a lightweight release-package layer that works from existing exports and documents, then deepen integrations after proving time saved.
  - name: Incumbent or internal-build pressure
    description: Customers may try to extend existing PLM workflows or build custom readiness dashboards internally.
    mitigation: Focus on launch-specific deviation logic, mission-level release artifacts, and cross-functional signoff workflows that are hard to replicate quickly in generic systems.
