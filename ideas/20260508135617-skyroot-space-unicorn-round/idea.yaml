differentiator: Legacy aerospace software manages engineering records or factory execution, while range software manages the launch day itself. This company owns the painful middle layer where startup launch teams reconcile supplier deviations, test evidence, and final vehicle configuration into a release decision. By starting with private-space operators in India, it can encode new-space workflows and vendor realities that large incumbent aerospace suites treat as edge cases.
