jobsToBeDone:
  - job: When a vehicle is approaching an orbital mission, help mission assurance leaders prove every critical part, test, and deviation is cleared so they can issue a confident launch release.
    currentAlternative: Manual launch readiness reviews assembled from spreadsheets, docs, and engineering systems
    successMetric: Release package prepared in days instead of weeks with zero missing critical signoffs
  - job: When a late supplier lot or engineering change hits a launch campaign, help manufacturing and quality teams see which missions are affected so they can rework plans before integration slips.
    currentAlternative: Ad hoc Slack threads, spreadsheet trackers, and engineer-by-engineer impact checks
    successMetric: Time to assess deviation impact and update mission plans
