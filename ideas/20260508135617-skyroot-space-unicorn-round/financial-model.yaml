    y3RevenueImpactK: 0.0
    cashImpactK: -30.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Triggers[Qualification success / facility ramp] --> Pilots[Paid pilots]
      Pilots --> Programs[Active programs]
      Programs --> Revenue[Program revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash runway to adjacency proof]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case Year-3 revenue comes from 4 active programs at roughly $96K ACV, matching the research SOM and the business-plan milestone stack.
  - checkName: Must go right
    finding: The first paid program has to land by M7 and produce reusable connector patterns fast enough to reach 3 production programs by Q4Y2 without adding a full sales team.
  - checkName: Model breaks if
    finding: If ACV drifts toward $72K or the fourth program slips out of Year 3, cash compresses toward the downside case and the India-first wedge cannot support the planned buildout.
  - checkName: Next-round proof
    finding: The next financing is justified only after 4 active production programs, sub-6-week deployments, and one adjacent spacecraft or propulsion workflow prove the wedge expands beyond Indian launch operations.
sanityChecks:
  ruleOf40: 'Y3 growth 115% + EBITDA margin -173% = -58%'
  burnMultiple: 'Y3 burn multiple 6.2x = $596.2K net burn / $96.0K net new ARR; high because spending still runs ahead of the tiny beachhead.'
  revenuePerFte: '$60K Y3 on 5.75 average FTE (well below the $200–400K SaaS benchmark)'
  flags:
    - The India-first beachhead is only about a $1.5M SAM, so the model depends on adjacent spacecraft and propulsion workflows for a venture-scale follow-on story.
    - Revenue efficiency remains weak through Year 3 because the team is intentionally built ahead of the small launch-only market.
    - Rule of 40 stays negative in Year 3; this is a proof-of-market pre-seed plan, not an efficiency case.
    - Cash low point occurs in Q4Y3 even after a $2.2M raise, so a slower first pilot or more bespoke deployments would likely pull financing forward.
