  - variable: CAC
    downsideCase: '$80K CAC from slower trust-building and more founder travel'
    baseCase: '$60K CAC'
    upsideCase: '$45K CAC via partner referrals and tighter ICP targeting'
    y3RevenueImpactK: 0.0
    cashImpactK: -80.0
  - variable: churn
    downsideCase: '2.0% monthly churn if the product is seen as a pilot overlay, not system of record'
    baseCase: '1.0% monthly churn'
    upsideCase: '0.5% monthly churn after production embed'
    y3RevenueImpactK: -20.0
    cashImpactK: -14.0
  - variable: sales cycle
    downsideCase: '6-7 months from discovery to production contract'
    baseCase: '4-5 months'
    upsideCase: '3-4 months with trigger-based selling'
    y3RevenueImpactK: -64.0
    cashImpactK: -44.8
  - variable: gross margin
    downsideCase: '65% gross margin with more bespoke deployment work'
    baseCase: '70% gross margin'
    upsideCase: '75% gross margin once connector patterns repeat'
    y3RevenueImpactK: 0.0
    cashImpactK: -17.2
  - variable: hiring pace
    downsideCase: 'Second engineer hired in Q1Y3 before adjacency proof'
