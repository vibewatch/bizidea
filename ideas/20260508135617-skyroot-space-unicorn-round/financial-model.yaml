    name: Non-payroll sales and marketing spend
    value: '$5K per month in Y1, $6K per month in months 13-27, $7K per month in months 28-36'
    unit: USD per month
    source: '[BP gtm channels + Research distributionChannels] Startup-finance heuristic for travel, events, and partner-led founder sales into a concentrated buyer set.'
  - id: A18
    name: Non-payroll R&D, cloud, and security spend
    value: '$5K per month in months 1-6, $6K per month in months 7-27, $8K per month in months 28-36'
    unit: USD per month
    source: '[BP product + BP operations + BP fundingAsk useOfFundsSummary] Startup-finance heuristic covering cloud, connector work, and procurement-ready security/compliance packaging.'
  - id: A19
    name: Non-payroll G&A spend
    value: '$4K per month in Y1, $5K per month in Y2, $6K per month in Y3'
    unit: USD per month
    source: '[Startup-finance heuristic] Lean legal, accounting, insurance, and admin overhead for a pre-seed enterprise software company.'
  - id: A20
    name: Blended CAC
    value: '60.0'
    unit: USDK per active program
    source: '[BP gtm.funnelTargets + Research buyingTriggers] High-touch founder-led enterprise sales and paid-pilot conversion in a tiny concentrated market.'
  - id: A21
    name: Cash movement simplification
    value: Cash movement approximates EBITDA
    unit: policy
    source: '[Startup-finance heuristic] No debt, taxes, capex, or material working-capital swings are modeled at this stage.'
  - id: A22
    name: Next-round proof milestone
    value: '4 active production programs, median deployment below 6 weeks, and 1 adjacent spacecraft or propulsion workflow signed by Q4Y3'
    unit: milestone
    source: '[BP milestones 12–24 months and 24–36 months] Extends the plan from launch to adjacent hardware workflows before a seed round.'
