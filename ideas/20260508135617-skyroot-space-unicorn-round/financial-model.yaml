scenarios:
  downside:
    description: One pilot slips by two quarters, realized ACV settles closer to $72K, and the Year-3 fourth program does not close.
    y3RevenueK: 228.0
    y3EbitdaK: -650.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - ARPU falls from $96K to $72K.
      - Customer exits end at 3 active programs instead of 4 by Q4Y3.
      - The second engineer is deferred because deployments remain bespoke longer.
  base:
    description: Founder-led sales lands 4 active programs at roughly $96K ACV and adds one engineer in Y3 to prove adjacency without adding a separate sales team.
    y3RevenueK: 344.0
    y3EbitdaK: -596.2
    cashLowPointK: 463.6
    keyAssumptionChanges:
      - 1 paid program is won by M7 and 3 production programs are active by Q4Y2.
      - Realized ACV stays near the low end of the stated production range at $96K.
      - Gross margin stays at the 70% target while deployment reuse improves.
  upside:
    description: Production pricing lands closer to $110K and an adjacent workflow closes a quarter earlier, taking the business to 5 active programs by Q4Y3 with the same team.
    y3RevenueK: 472.0
    y3EbitdaK: -507.0
    cashLowPointK: 555.0
    keyAssumptionChanges:
      - ARPU rises from $96K to $110K.
      - A fifth active program is added by Q4Y3 through faster adjacent-market conversion.
      - Connector reuse improves enough that no incremental headcount is needed beyond the second engineer.
