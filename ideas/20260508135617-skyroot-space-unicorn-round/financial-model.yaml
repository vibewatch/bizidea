    value: Founder 100% S&M; engineering 100% R&D; mission lead 75% R&D / 25% G&A; solutions 60% R&D / 40% G&A; customer success 100% G&A
    unit: allocation
    source: '[BP team rationales] Reflects founder-led sales, product buildout, and implementation-heavy deployment support.'
