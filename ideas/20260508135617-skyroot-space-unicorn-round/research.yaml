  stage: incumbent
  wedge: Space-systems digital thread linking requirements, design, simulation, and manufacturing.
  pricing: No public list price; enterprise/demo-led.
  strength: Strong on formal engineering change and end-to-end space-systems traceability.
  weaknessVsUs: Engineering-centric platform motion is broader and slower than a lightweight launch-release control tower.
